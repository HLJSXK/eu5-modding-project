 iv2_ideagroup_title_army_2: "Defensive Ideas"
 iv2_ga_ideagroup_army_2_1: "Architect Corps"
 iv2_ga_ideagroup_army_2_1_desc: "An Architect Corps allows us to pool the best talent our nation has to offer in the field of military technology and benefit from their unrivalled skills."
 iv2_ga_ideagroup_army_2_2: "Defensive Mindset"
 iv2_ga_ideagroup_army_2_2_desc: "It is foolish to believe that attack is the best form of defence. Instead, we should let the enemy come to us and meet them with a counterattack. Our troops will hold their ground fiercely, and our fortresses will withstand the onslaught for longer."
 iv2_ga_ideagroup_army_2_3: "Homeland Specialisation"
 iv2_ga_ideagroup_army_2_3_desc: "By training our soldiers specifically, every battle on terrain similar to that of our homeland is a sure victory."
 iv2_ga_ideagroup_army_2_4: "Guerrilla Warfare"
 iv2_ga_ideagroup_army_2_4_desc: "Sometimes the enemy is simply too overwhelming to fight head-on. In these cases, it is wiser to weaken the attackers with guerrilla tactics before our men defeat them once and for all."
 iv2_ga_ideagroup_army_2_5: "Protective Terrain"
 iv2_ga_ideagroup_army_2_5_desc: "There is little a soldier can do to avoid a bullet on the open battlefield, which is why our troops must observe their surroundings carefully and use the terrain to avoid being hit by enemy fire."
 iv2_ga_ideagroup_army_2_6: "Improved Body Armour"
 iv2_ga_ideagroup_army_2_6_desc: "Although melee weapons are falling out of fashion, they are still widely used on the battlefield. By improving the uniforms and armour of our troops, we can reduce the lethality of melee weapons."
 iv2_ga_ideagroup_army_2_7: "To the Last Man"
 iv2_ga_ideagroup_army_2_7_desc: "A battle can only have one of two outcomes: total victory or death. None of our soldiers will retreat as long as a single enemy remains standing."
 
