 iv2_ideagroup_title_army_10: "Levy Ideas"
 iv2_ga_ideagroup_army_10_1: "Peasant Militia"
 iv2_ga_ideagroup_army_10_1_desc: "A peasant militia can be useful for fighting bandits or for quickly bolstering the professional army."
 iv2_ga_ideagroup_army_10_2: "All Men to Arms"
 iv2_ga_ideagroup_army_10_2_desc: "In times of great need for our nation, every man must take up arms."
 iv2_ga_ideagroup_army_10_3: "Rudimentary Training"
 iv2_ga_ideagroup_army_10_3_desc: "If we give our recruits at least a little training, they will perform much better in battle."
 iv2_ga_ideagroup_army_10_4: "Veteran Officers"
 iv2_ga_ideagroup_army_10_4_desc: "Assigning experienced officers to our recruits will boost their morale."
 iv2_ga_ideagroup_army_10_5: "Good Food"
 iv2_ga_ideagroup_army_10_5_desc: "We ensure that our troops always have enough to eat."
 iv2_ga_ideagroup_army_10_6: "Field Doctors"
 iv2_ga_ideagroup_army_10_6_desc: "A good number of field doctors will hopefully ensure that no disease can spread in our army."
 iv2_ga_ideagroup_army_10_7: "Captured Weapons"
 iv2_ga_ideagroup_army_10_7_desc: "Our troops are allowed to keep the weapons they capture. These will make them even more powerful in the next battle."
 
