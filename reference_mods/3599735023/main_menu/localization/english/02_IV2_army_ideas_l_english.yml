 iv2_ga_ideagroup_army_13_1: "Defensive Artillery Fire"
 iv2_ga_ideagroup_army_13_1_desc: "Keep the enemy at bay with defensive artillery fire."
 iv2_ga_ideagroup_army_13_2: "Troop Quarters"
 iv2_ga_ideagroup_army_13_2_desc: "Our garrison quarters must be artillery-proof and well protected."
 iv2_ga_ideagroup_army_13_3: "Fortress Cannons"
 iv2_ga_ideagroup_army_13_3_desc: "Our forts are well equipped with cannons. If necessary, we can even dismantle them and use them in the field."
 iv2_ga_ideagroup_army_13_4: "Better Fort Management"
 iv2_ga_ideagroup_army_13_4_desc: "We manage our forts more effectively, which makes them cheaper to maintain."
 iv2_ga_ideagroup_army_13_5: "Long Endurance"
 iv2_ga_ideagroup_army_13_5_desc: "Our forts can withstand attacks for longer thanks to good preparation and modern technology."
 iv2_ga_ideagroup_army_13_6: "Rally at Control Point"
 iv2_ga_ideagroup_army_13_6_desc: "If our army is defeated in the field, it can rally and regenerate at defence points."
 iv2_ga_ideagroup_army_13_7: "Reinforcement Centres"
 iv2_ga_ideagroup_army_13_7_desc: "We can reinforce our army more easily after a bloody battle if we have built up a good infrastructure for this purpose."
 
