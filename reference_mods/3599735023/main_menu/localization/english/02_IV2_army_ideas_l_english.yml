 iv2_ideagroup_title_army_17: "Siege Ideas"
 iv2_ga_ideagroup_army_17_1: "Stormtroopers"
 iv2_ga_ideagroup_army_17_1_desc: "Our troops are particularly carefully trained when it comes to storming fortifications."
 iv2_ga_ideagroup_army_17_2: "Well-thought-out camp construction"
 iv2_ga_ideagroup_army_17_2_desc: "It is vital for the survival of our soldiers to establish camps where epidemics do not spread."
 iv2_ga_ideagroup_army_17_3: "Use all means"
 iv2_ga_ideagroup_army_17_3_desc: "We are prepared to use every trick and trick to ensure the fortress falls."
 iv2_ga_ideagroup_army_17_4: "Sophisticated Firing Positions"
 iv2_ga_ideagroup_army_17_4_desc: "By carefully choosing our firing positions, we can use our artillery most efficiently."
 iv2_ga_ideagroup_army_17_5: "Routine Assault"
 iv2_ga_ideagroup_army_17_5_desc: "Because we regularly storm fortresses, it has become a habit for our soldiers."
 iv2_ga_ideagroup_army_17_6: "Siege Artillery"
 iv2_ga_ideagroup_army_17_6_desc: "By using special guns for sieges, we can significantly speed up the process."
 iv2_ga_ideagroup_army_17_7: "Siege Experts"
 iv2_ga_ideagroup_army_17_7_desc: "Our generals are excellent siege experts. Storming a fortress is a key focus of our training."
 
