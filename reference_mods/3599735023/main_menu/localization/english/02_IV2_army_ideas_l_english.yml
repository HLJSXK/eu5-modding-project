 iv2_ideagroup_title_army_9: "Mercenary Ideas"
 iv2_ga_ideagroup_army_9_1: "Free Plundering"
 iv2_ga_ideagroup_army_9_1_desc: "We let the mercenaries off the leash and don't care what they do to the enemy's lands."
 iv2_ga_ideagroup_army_9_2: "Long-term Contracts"
 iv2_ga_ideagroup_army_9_2_desc: "We bind the mercenaries to us for the long term, which makes them more attractive in terms of price."
 iv2_ga_ideagroup_army_9_3: "Sons stay at Home"
 iv2_ga_ideagroup_army_9_3_desc: "The sons of our nation need not fear conscription. This greatly improves their morale."
 iv2_ga_ideagroup_army_9_4: "Share in the Spoils of War"
 iv2_ga_ideagroup_army_9_4_desc: "We give the mercenaries a share in the spoils of war. This allows them to forego part of their wages."
 iv2_ga_ideagroup_army_9_5: "Mercenary Commanders"
 iv2_ga_ideagroup_army_9_5_desc: "Some mercenary units remain in our service for so long that their competent leaders are practically transferred to our regular army."
 iv2_ga_ideagroup_army_9_6: "Freedom of Equipment"
 iv2_ga_ideagroup_army_9_6_desc: "Mercenaries equip themselves. We don't care what weapons they use, as long as their effectiveness remains intact."
 iv2_ga_ideagroup_army_9_7: "Mercenary Tradition"
 iv2_ga_ideagroup_army_9_7_desc: "Our country has relied on mercenaries for a long time."
 
