 iv2_ga_ideagroup_army_16_1: "Large Army"
 iv2_ga_ideagroup_army_16_1_desc: "Society expects at least a representatively large army."
 iv2_ga_ideagroup_army_16_2: "Officer Career"
 iv2_ga_ideagroup_army_16_2_desc: "All young men dream of an officer career."
 iv2_ga_ideagroup_army_16_3: "Natural Obedience"
 iv2_ga_ideagroup_army_16_3_desc: "Our youth obey our orders – unconditionally."
 iv2_ga_ideagroup_army_16_4: "Volunteer Surplus"
 iv2_ga_ideagroup_army_16_4_desc: "We have so many volunteers every year that we can barely integrate them into our army."
 iv2_ga_ideagroup_army_16_5: "Volunteer Defense Units"
 iv2_ga_ideagroup_army_16_5_desc: "Once one of our cities is under siege, volunteers flock to defend their homeland."
 iv2_ga_ideagroup_army_16_6: "Battle Enthusiasm"
 iv2_ga_ideagroup_army_16_6_desc: "Our soldiers are eager for battle."
 iv2_ga_ideagroup_army_16_7: "Resilience"
 iv2_ga_ideagroup_army_16_7_desc: "Even in adversity, our men fight to the last man."
 
