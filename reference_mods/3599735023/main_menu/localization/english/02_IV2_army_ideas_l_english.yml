 iv2_ga_ideagroup_army_18_1: "Supply Backpacks"
 iv2_ga_ideagroup_army_18_1_desc: "By equipping our soldiers with backpacks, they can carry their own supplies."
 iv2_ga_ideagroup_army_18_2: "Supply Column"
 iv2_ga_ideagroup_army_18_2_desc: "We do everything we can to ensure that supplies reach the front lines quickly. The supply column is responsible for this."
 iv2_ga_ideagroup_army_18_3: "Well-fed Soldiers"
 iv2_ga_ideagroup_army_18_3_desc: "A well-fed soldier fights better than one who is starving."
 iv2_ga_ideagroup_army_18_4: "March Rations"
 iv2_ga_ideagroup_army_18_4_desc: "By issuing marching rations, our soldiers can march faster and better."
 iv2_ga_ideagroup_army_18_5: "Perishable Rations"
 iv2_ga_ideagroup_army_18_5_desc: "We ensure that there is always enough perishable food available, which remains edible for days and, if necessary, weeks."
 iv2_ga_ideagroup_army_18_6: "Mobile Food Depots"
 iv2_ga_ideagroup_army_18_6_desc: "By making our food depots as mobile as possible, we can always follow the army."
 iv2_ga_ideagroup_army_18_7: "Foraging Squads"
 iv2_ga_ideagroup_army_18_7_desc: "Despite all these precautions, it is still prudent to search enemy territory for additional food supplies."
 
