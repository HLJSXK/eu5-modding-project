 iv2_ideagroup_title_army_6: "Ranged Combat Ideas"
 iv2_ga_ideagroup_army_6_1: "Concentrated Salvo Fire"
 iv2_ga_ideagroup_army_6_1_desc: "If an enemy rushes towards us too carelessly, we will greet them with a deadly salvo."
 iv2_ga_ideagroup_army_6_2: "Suppressive Fire"
 iv2_ga_ideagroup_army_6_2_desc: "Our cannons bombard the enemy so intensely that they cannot venture out of cover."
 iv2_ga_ideagroup_army_6_3: "Rapid reloading"
 iv2_ga_ideagroup_army_6_3_desc: "Thanks to perfect training, we can significantly reduce the reloading times of our artillery."
 iv2_ga_ideagroup_army_6_4: "Wait until the last second"
 iv2_ga_ideagroup_army_6_4_desc: "Through experience and training, our men wait to fire until they see the whites of their enemies' eyes."
 iv2_ga_ideagroup_army_6_5: "Defensive fire"
 iv2_ga_ideagroup_army_6_5_desc: "The defensive fire of our fortresses is legendary."
 iv2_ga_ideagroup_army_6_6: "Fire support"
 iv2_ga_ideagroup_army_6_6_desc: "With targeted fire support from our artillery, we will be able to advance even more efficiently."
 iv2_ga_ideagroup_army_6_7: "Ranged combat generals"
 iv2_ga_ideagroup_army_6_7_desc: "Our general training focuses on training skilled ranged combatants."
 
