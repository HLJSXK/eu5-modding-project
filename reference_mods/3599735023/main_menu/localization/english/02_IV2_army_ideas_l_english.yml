 iv2_ideagroup_title_army_3: "Quality Ideas"
 iv2_ga_ideagroup_army_3_1: "First-Class Training"
 iv2_ga_ideagroup_army_3_1_desc: "The period immediately after battle is crucial to the fate of any army. Whether victorious or defeated, the men are exhausted and vulnerable during this phase. We must ensure that our men are ready to fight again faster than the enemy."
 iv2_ga_ideagroup_army_3_2: "The best horses"
 iv2_ga_ideagroup_army_3_2_desc: "How steady the advance of the troops! How perfect the order of the cavalry! Look, all those grey horses! Who are these excellent horsemen? They are excellent troops."
 iv2_ga_ideagroup_army_3_3: "Lance Corporal to Marshal"
 iv2_ga_ideagroup_army_3_3_desc: "Basically, every lance corporal has a marshal's baton in his luggage. Not literally, of course. But those who distinguish themselves in battle can expect honours and promotions. The troops know this and are inspired by this knowledge."
 iv2_ga_ideagroup_army_3_4: "Collected Battery"
 iv2_ga_ideagroup_army_3_4_desc: "By gathering all the artillery into a single, large battery, its destructive power can be concentrated and a hole blown in the enemy line."
 iv2_ga_ideagroup_army_3_5: "Weapon maintenance"
 iv2_ga_ideagroup_army_3_5_desc: "We insist that our men keep their weapons in top condition at all times."
 iv2_ga_ideagroup_army_3_6: "Iron discipline"
 iv2_ga_ideagroup_army_3_6_desc: "Discipline is the first commandment for a soldier."
 iv2_ga_ideagroup_army_3_7: "Cool head"
 iv2_ga_ideagroup_army_3_7_desc: "A soldier must always keep a cool head, otherwise he will likely soon be dead."
 
