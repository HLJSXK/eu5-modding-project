 iv2_ideagroup_title_army_15: "Tactical Ideas"
 iv2_ga_ideagroup_army_15_1: "Column March"
 iv2_ga_ideagroup_army_15_1_desc: "New marching forms allow us to improve our marching performance."
 iv2_ga_ideagroup_army_15_2: "Charge"
 iv2_ga_ideagroup_army_15_2_desc: "The art of the charge can take an enemy by surprise and ensure a quick victory."
 iv2_ga_ideagroup_army_15_3: "Expansive Envelopment"
 iv2_ga_ideagroup_army_15_3_desc: "Sometimes you have to take risks and let the cavalry attack the enemy by surprise in a wide envelopment maneuver."
 iv2_ga_ideagroup_army_15_4: "Square"
 iv2_ga_ideagroup_army_15_4_desc: "In particularly desperate situations, it may be necessary to establish a perimeter defense."
 iv2_ga_ideagroup_army_15_5: "Practical Tactical Training"
 iv2_ga_ideagroup_army_15_5_desc: "By conducting training sessions and lessons based on the experience of our veterans, we can minimize experience loss."
 iv2_ga_ideagroup_army_15_6: "Field Medics"
 iv2_ga_ideagroup_army_15_6_desc: "Our field medics not only alleviate the suffering of our wounded, they also ensure fewer casualties on the way to battle."
 iv2_ga_ideagroup_army_15_7: "Covering Fire"
 iv2_ga_ideagroup_army_15_7_desc: "Fighting the enemy from cover is not shameful, it simply makes sense."
 
