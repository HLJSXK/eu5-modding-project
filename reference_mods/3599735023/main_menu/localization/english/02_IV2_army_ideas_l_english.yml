 iv2_ideagroup_title_army_14: "War Production Ideas"
 iv2_ga_ideagroup_army_14_1: "Infantry Weapons Manufactured Production"
 iv2_ga_ideagroup_army_14_1_desc: "Infantry weapons production in factories is considerably more efficient than in small gunsmiths."
 iv2_ga_ideagroup_army_14_2: "Professional Horse Breeding"
 iv2_ga_ideagroup_army_14_2_desc: "Horses suitable for war service must be bred. People who are knowledgeable about this should take on this task."
 iv2_ga_ideagroup_army_14_3: "War Bonds"
 iv2_ga_ideagroup_army_14_3_desc: "To pay for this infrastructure, we will issue war bonds."
 iv2_ga_ideagroup_army_14_4: "Effective Base Construction"
 iv2_ga_ideagroup_army_14_4_desc: "We need a foundation of good bases for our army so that we can ensure its overall supply."
 iv2_ga_ideagroup_army_14_5: "Quality Muskets"
 iv2_ga_ideagroup_army_14_5_desc: "The production of high-quality muskets should be given increased priority."
 iv2_ga_ideagroup_army_14_6: "Artillery Manufactory Production"
 iv2_ga_ideagroup_army_14_6_desc: "Having our artillery manufactured in manufactories allows us to produce it in larger quantities and more cheaply."
 iv2_ga_ideagroup_army_14_7: "Weapons Depots"
