 iv2_ideagroup_title_army_19: "Guard Ideas"
 iv2_ga_ideagroup_army_19_1: "Guard Idea"
 iv2_ga_ideagroup_army_19_1_desc: "The idea of elite units isn't new, but it still has its merits."
 iv2_ga_ideagroup_army_19_2: "Professional Soldiers"
 iv2_ga_ideagroup_army_19_2_desc: "Guardsmen are professional soldiers and are excellently trained accordingly."
 iv2_ga_ideagroup_army_19_3: "Marriage Incentives"
 iv2_ga_ideagroup_army_19_3_desc: "Our guardsmen are sought-after bachelors. We want to marry them off quickly so they can produce offspring who follow in their fathers' footsteps."
 iv2_ga_ideagroup_army_19_4: "Tall Guys"
 iv2_ga_ideagroup_army_19_4_desc: "By deliberately selecting tall guardsmen for the Guard, we ensure that it is particularly intimidating."
 iv2_ga_ideagroup_army_19_5: "Diverse Branches"
 iv2_ga_ideagroup_army_19_5_desc: "It's a good idea to have Guards regiments in every branch as models for other regiments."
 iv2_ga_ideagroup_army_19_6: "Cautious Campaign Use"
 iv2_ga_ideagroup_army_19_6_desc: "Even though the Guard includes our best soldiers, we should use them sparingly on the battlefield. We don't want to lose them."
 iv2_ga_ideagroup_army_19_7: "Purveyors"
 iv2_ga_ideagroup_army_19_7_desc: "Through contracts with purveyors, we can at least keep the horrendous costs for the Guard somewhat within limits."
 
