 iv2_ideagroup_title_army_4: "Quantity Ideas"
 iv2_ga_ideagroup_army_4_1: "Subsidies for horse owners"
 iv2_ga_ideagroup_army_4_1_desc: "Life may be cheap, but horses are expensive. If we establish a system of subsidies for horse owners, the supply of horses will increase."
 iv2_ga_ideagroup_army_4_2: "The Old and the Weak"
 iv2_ga_ideagroup_army_4_2_desc: "Some of the veteran sergeants are among the most despicable and corrupt individuals humanity has to offer. Nevertheless, they could be useful. Instead of living a sad existence as beggars, they could take on the training of sergeants and quartermasters after their term of service has expired, thus putting their unique skills to good use."
 iv2_ga_ideagroup_army_4_3: "The young can serve"
 iv2_ga_ideagroup_army_4_3_desc: "How old must a boy be before he becomes a man? How old must he be before he can sacrifice his life in the service of his country? Some rulers are squeamish, but on our slaughtering block, there is equal opportunity."
 iv2_ga_ideagroup_army_4_4: "Compulsory service"
 iv2_ga_ideagroup_army_4_4_desc: "The principle of generosity is the foundation of the structure of our entire army. Sometimes there are not enough volunteers. We should force people to volunteer."
 iv2_ga_ideagroup_army_4_5: "Standardised artillery"
 iv2_ga_ideagroup_army_4_5_desc: "Each iron caster jealously guards the secrets of his process and manufactures his cannons as commissioned works of art. As much as this may flatter his ego, this form of cannon production is certainly not effective. In future, we will insist that cannons are produced according to our exact specifications. This will also save costs."
 iv2_ga_ideagroup_army_4_6: "Private Weapons"
 iv2_ga_ideagroup_army_4_6_desc: "If our population is already armed, we can build a powerful army much more quickly."
 iv2_ga_ideagroup_army_4_7: "People's Army"
 iv2_ga_ideagroup_army_4_7_desc: "Until now, we have been very selective in choosing our soldiers. Only the poorest and most desperate were considered, people whom no one would miss anyway. But from now on, we will let absolutely anyone join, except for the rich."
 
