 iv2_ideagroup_title_army_7: "Conscription Ideas"
 iv2_ga_ideagroup_army_7_1: "Universal Conscription"
 iv2_ga_ideagroup_army_7_1_desc: "All able-bodied men are conscripted into the army."
 iv2_ga_ideagroup_army_7_2: "We know who we are fighting for"
 iv2_ga_ideagroup_army_7_2_desc: "Our men know that they are fighting for their country. This is a tremendous source of motivation."
 iv2_ga_ideagroup_army_7_3: "Rapid mobilisation"
 iv2_ga_ideagroup_army_7_3_desc: "Our organisation and our lists allow us to assemble our troops quickly."
 iv2_ga_ideagroup_army_7_4: "Basic training"
 iv2_ga_ideagroup_army_7_4_desc: "Our men receive solid basic training to survive on the battlefield."
 iv2_ga_ideagroup_army_7_5: "Military zeitgeist"
 iv2_ga_ideagroup_army_7_5_desc: "Our training methods and tactics keep up with the times."
 iv2_ga_ideagroup_army_7_6: "Large selection of recruits"
 iv2_ga_ideagroup_army_7_6_desc: "By conscripting all men, we have a large selection of recruits for all branches of the military."
 iv2_ga_ideagroup_army_7_7: "Standardised training"
 iv2_ga_ideagroup_army_7_7_desc: "We have standardised the training of our troops."
 
