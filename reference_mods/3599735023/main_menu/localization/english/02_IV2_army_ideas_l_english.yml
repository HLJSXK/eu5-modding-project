l_english:
 iv2_ideagroup_title_army_1: "Offensive Ideas"
 iv2_ga_ideagroup_army_1_1: "Glorious Armed Forces"
 iv2_ga_ideagroup_army_1_1_desc: "The sight of our glorious, renowned army will strike fear into the hearts of any opponent."
 iv2_ga_ideagroup_army_1_2: "Bayonet Commanders"
 iv2_ga_ideagroup_army_1_2_desc: "If men are well led, they will follow. That is why we ensure that our officers lead from the front."
 iv2_ga_ideagroup_army_1_3: "Battlefield Commissions"
 iv2_ga_ideagroup_army_1_3_desc: "Enables a special focus on military advancement, thereby enhancing our army tradition."
 iv2_ga_ideagroup_army_1_4: "Improved Flanking"
 iv2_ga_ideagroup_army_1_4_desc: "A core competence of good commanders is to make use of their troops on the battlefield. By knowing where troops need to be moved at all times, we secure an advantage in battle."
 iv2_ga_ideagroup_army_1_5: "Fortress Breaker"
 iv2_ga_ideagroup_army_1_5_desc: "Fortifications are the bane of every expansionist country. Even if it costs the lives of all our men, no fortress shall stand between us and our victory.\n"Forward! Storm this fortress and capture it for your general!"
 iv2_ga_ideagroup_army_1_6: "Glory Seeker"
 iv2_ga_ideagroup_army_1_6_desc: "Most wars these days are won through sieges and the occupation of enemy territory, but that's not for us! We meet our enemies on the battlefield and defeat them in combat!"
 iv2_ga_ideagroup_army_1_7: "Offensive Spirit"
 iv2_ga_ideagroup_army_1_7_desc: "Only by charging forward can we quickly defeat the enemy!"
 
