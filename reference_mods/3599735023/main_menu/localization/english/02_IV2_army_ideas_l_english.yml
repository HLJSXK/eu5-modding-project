 iv2_ideagroup_title_army_5: "Shock Ideas"
 iv2_ga_ideagroup_army_5_1: "Sudden Assault"
 iv2_ga_ideagroup_army_5_1_desc: "Sometimes we attack the enemy so suddenly that their ranged fighters don't have time to react."
 iv2_ga_ideagroup_army_5_2: "Overlapping Attack"
 iv2_ga_ideagroup_army_5_2_desc: "When we rout the enemy on one part of the front, we immediately throw ourselves at the next opponent, giving them no time to react."
 iv2_ga_ideagroup_army_5_3: "Cavalry Focus"
 iv2_ga_ideagroup_army_5_3_desc: "Hitting the enemy quickly and hard is the motto of our cavalry."
 iv2_ga_ideagroup_army_5_4: "Powerful Attack"
 iv2_ga_ideagroup_army_5_4_desc: "Our attack is always so powerful that the enemy usually falters after a short time."
 iv2_ga_ideagroup_army_5_5: "Dragoon Cavalry"
 iv2_ga_ideagroup_army_5_5_desc: "Our cavalry is capable of attacking quickly, dismounting if necessary and then engaging in combat on foot. However, we are also flexible enough to fight mounted and then retreat quickly."
 iv2_ga_ideagroup_army_5_6: "Wedge formation"
 iv2_ga_ideagroup_army_5_6_desc: "When our cavalry breaks through the enemy lines in wedge formation, victory is soon assured."
 iv2_ga_ideagroup_army_5_7: "Close combat generals"
 iv2_ga_ideagroup_army_5_7_desc: "Close combat is the focus of our generals' training and experience."
 
