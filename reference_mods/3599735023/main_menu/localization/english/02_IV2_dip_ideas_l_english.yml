 iv2_ideagroup_title_dip_5: "Land Trade Ideas"
 iv2_ga_ideagroup_dip_5_1: "Shrewd Business Practices"
 iv2_ga_ideagroup_dip_5_1_desc: "Allow us to use sophisticated business practices so that our merchants can gain the upper hand over their competition."
 iv2_ga_ideagroup_dip_5_2: "Free Trade"
 iv2_ga_ideagroup_dip_5_2_desc: "The existing merchant families wish that trade privileges remain their exclusive domain. We do not wish this. Instead, we will allow the merchant class to grow."
 iv2_ga_ideagroup_dip_5_3: "Risky Business Ventures"
 iv2_ga_ideagroup_dip_5_3_desc: "Allows us to tap into all the traders seeking fame and fortune. These traders eagerly offer us their help in finding new trade routes."
 iv2_ga_ideagroup_dip_5_4: "National Trade Policy"
 iv2_ga_ideagroup_dip_5_4_desc: "By establishing a national trade policy, we can increase our presence in the economy and enhance the effectiveness of our trade."
 iv2_ga_ideagroup_dip_5_5: "Trade Manipulation"
 iv2_ga_ideagroup_dip_5_5_desc: "Having the advantage during the critical phases that determine the success or failure of a business venture can be the deciding factor in increasing our trade revenue."
 iv2_ga_ideagroup_dip_5_6: "Tariff Avoidance"
 iv2_ga_ideagroup_dip_5_6_desc: "Our traders are experts at circumventing other countries' tariffs. Not entirely legal, but it increases profits!"
 iv2_ga_ideagroup_dip_5_7: "Speedy Negotiations"
 iv2_ga_ideagroup_dip_5_7_desc: "Sometimes being faster than the competition is crucial to closing a deal. We need to ensure our traders can close their deals."
 
