 iv2_ideagroup_title_dip_7: "Colonial Empire Ideas"
 iv2_ga_ideagroup_dip_7_1: "Colonial Rush"
 iv2_ga_ideagroup_dip_7_1_desc: "Space will eventually become scarce in the New World, too. We must hurry to get as much of the pie as possible."
 iv2_ga_ideagroup_dip_7_2: "Autonomous Adventurers"
 iv2_ga_ideagroup_dip_7_2_desc: "We no longer have to pay people to explore the land outside our colonies. Independent adventurers are already on their way and will report back to us."
 iv2_ga_ideagroup_dip_7_3: "Colonial Conscription"
 iv2_ga_ideagroup_dip_7_3_desc: "In return for our support of the colonies, the colonies must send us men to defend the motherland in the event of war."
 iv2_ga_ideagroup_dip_7_4: "Wage Increase"
 iv2_ga_ideagroup_dip_7_4_desc: "Through special laws, we increase profits from the colonies."
 iv2_ga_ideagroup_dip_7_5: "Faster Infrastructure Expansion"
 iv2_ga_ideagroup_dip_7_5_desc: "We are increasing our operational range and must thus ensure that we can build as much infrastructure as possible, as cheaply as possible."
 iv2_ga_ideagroup_dip_7_6: "Appropriate Fleet Strength"
 iv2_ga_ideagroup_dip_7_6_desc: "To defend our colonies, we need a certain amount of fleet strength."
 iv2_ga_ideagroup_dip_7_7: "Faster Troop Movement"
 iv2_ga_ideagroup_dip_7_7_desc: "To eliminate our rivals and any potential independence movements, we need effective ways to quickly move our troops to the hotspots. This way, we can maintain control over our colonies with minimal effort."
 
