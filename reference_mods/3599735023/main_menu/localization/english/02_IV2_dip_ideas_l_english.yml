 iv2_ideagroup_title_dip_17: "Cultural Pillar Ideas"
 iv2_ga_ideagroup_dip_17_1: "Essential Values"
 iv2_ga_ideagroup_dip_17_1_desc: "Every culture has values that are essential to it."
 iv2_ga_ideagroup_dip_17_2: "Politeness"
 iv2_ga_ideagroup_dip_17_2_desc: "Politeness is a noble quality that everyone should possess."
 iv2_ga_ideagroup_dip_17_3: "Honor"
 iv2_ga_ideagroup_dip_17_3_desc: "Without honor, we are worthless!"
 iv2_ga_ideagroup_dip_17_4: "Empathy"
 iv2_ga_ideagroup_dip_17_4_desc: "The ability to put yourself in another person's shoes and understand their actions from their perspective is a valuable skill."
 iv2_ga_ideagroup_dip_17_5: "Generosity"
 iv2_ga_ideagroup_dip_17_5_desc: "We are a generous people to our allies."
 iv2_ga_ideagroup_dip_17_6: "Hospitality"
 iv2_ga_ideagroup_dip_17_6_desc: "The values of hospitality dictate that once you have welcomed someone, you should protect them."
 iv2_ga_ideagroup_dip_17_7: "Church Asylum"
 iv2_ga_ideagroup_dip_17_7_desc: "Our religion has earned a certain special right to grant people asylum from state persecution."
 
