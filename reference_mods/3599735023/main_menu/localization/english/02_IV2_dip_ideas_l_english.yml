 iv2_ideagroup_title_dip_11: "Imperial Ambition Ideas"
 iv2_ga_ideagroup_dip_11_1: "Harvest Festival"
 iv2_ga_ideagroup_dip_11_1_desc: "At the Harvest Festival, we can always show our subjects how kind we are. By distributing free food and holding numerous festivals throughout the kingdom, we provide for the poor and promote a good atmosphere in the realm."
 iv2_ga_ideagroup_dip_11_2: "King's Lands"
 iv2_ga_ideagroup_dip_11_2_desc: "The territories directly ruled by the king must ensure they provide sufficient troop capacity to keep the vassals in check."
 iv2_ga_ideagroup_dip_11_3: "Center of Power"
 iv2_ga_ideagroup_dip_11_3_desc: "The capital is our seat, the center of power. It must have the greatest appeal above all other cities because our monarch also resides there."
 iv2_ga_ideagroup_dip_11_4: "Royal Decree"
 iv2_ga_ideagroup_dip_11_4_desc: "Through royal decrees, progress can spread throughout the empire much more quickly. Our loyal subjects will always answer the king's call."
 iv2_ga_ideagroup_dip_11_5: "Royal Navy"
 iv2_ga_ideagroup_dip_11_5_desc: "Our nation's navy must be glorious and great. Her Majesty has declared this a matter of state."
 iv2_ga_ideagroup_dip_11_6: "Royal Armory"
 iv2_ga_ideagroup_dip_11_6_desc: "Her Majesty's armory is so well-stocked that the blacksmiths never have much trouble making up for the losses when we plunder the armory to equip new troops."
 iv2_ga_ideagroup_dip_11_7: "Vassal Expansion"
 iv2_ga_ideagroup_dip_11_7_desc: "Our king, by virtue of his rank alone, is empowered to rule over lesser dukes! Subdue them all to your rule."
 
