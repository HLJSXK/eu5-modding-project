 iv2_ideagroup_title_dip_10: "Kingship Ambition Ideas"
 iv2_ga_ideagroup_dip_10_1: "Count's Dignity"
 iv2_ga_ideagroup_dip_10_1_desc: "Even if we haven't yet risen to the high nobility, we have ambitions for higher goals."
 iv2_ga_ideagroup_dip_10_2: "Small Land Acquisitions"
 iv2_ga_ideagroup_dip_10_2_desc: "We must not hesitate to grab even smaller tracts of land at the first opportunity."
 iv2_ga_ideagroup_dip_10_3: "Stable Neighborly Relations"
 iv2_ga_ideagroup_dip_10_3_desc: "Even if we are keen on our neighbors' territory, we should create a harmless impression to the outside world."
 iv2_ga_ideagroup_dip_10_4: "Political Alliances"
 iv2_ga_ideagroup_dip_10_4_desc: "We should strive to forge political alliances with those whose interests align with ours."
 iv2_ga_ideagroup_dip_10_5: "Border Skirmishes"
 iv2_ga_ideagroup_dip_10_5_desc: "Small skirmishes on the border are commonplace for us."
 iv2_ga_ideagroup_dip_10_6: "Hunting Grounds"
 iv2_ga_ideagroup_dip_10_6_desc: "By maintaining an effective group of hunters, we simultaneously have a powerful cavalry unit that we can also deploy militarily in an emergency."
 iv2_ga_ideagroup_dip_10_7: "Watchtowers"
 iv2_ga_ideagroup_dip_10_7_desc: "Watchtowers protect our borders from the greedy raids of our neighbors."
 
