 iv2_ga_ideagroup_dip_13_6: "Traveling Nobles"
 iv2_ga_ideagroup_dip_13_6_desc: "Traveling Nobles mediate between our cultures."
 iv2_ga_ideagroup_dip_13_7: "Large Cities"
 iv2_ga_ideagroup_dip_13_7_desc: "Large cities act as melting pots between cultures."
 
