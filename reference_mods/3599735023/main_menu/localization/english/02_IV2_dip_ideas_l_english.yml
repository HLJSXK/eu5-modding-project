 iv2_ideagroup_title_dip_16: "Nationalism Ideas"
 iv2_ga_ideagroup_dip_16_1: "Targeted Propaganda"
 iv2_ga_ideagroup_dip_16_1_desc: "Our propaganda is aimed at promoting the nationalism of our citizens."
 iv2_ga_ideagroup_dip_16_2: "For the Fatherland!"
 iv2_ga_ideagroup_dip_16_2_desc: "The slogan "For the Fatherland" is intended to encourage our citizens to give their all for us."
 iv2_ga_ideagroup_dip_16_3: "Volunteer Associations"
 iv2_ga_ideagroup_dip_16_3_desc: "In the event of war, volunteer associations fight alongside our regular troops."
 iv2_ga_ideagroup_dip_16_4: "Partisan Attacks"
 iv2_ga_ideagroup_dip_16_4_desc: "Should the enemy ever invade our country, our people will do everything to drive them out again."
 iv2_ga_ideagroup_dip_16_5: "Unyielding Country"
 iv2_ga_ideagroup_dip_16_5_desc: "Because of our nationalism, we will not be easily subjugated."
 iv2_ga_ideagroup_dip_16_6: "Trust in the State"
 iv2_ga_ideagroup_dip_16_6_desc: "Because of our nationalism, we have an almost unshakable trust in the state."
 iv2_ga_ideagroup_dip_16_7: "It is sweet to die for one's country"
 iv2_ga_ideagroup_dip_16_7_desc: "Our soldiers' willingness to die for their country increases their reputation throughout the world."
 
