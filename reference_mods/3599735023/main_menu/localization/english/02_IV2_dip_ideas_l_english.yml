 iv2_ideagroup_title_dip_6: "Court Relation Ideas"
 iv2_ga_ideagroup_dip_6_1: "Recognized Hierarchy"
 iv2_ga_ideagroup_dip_6_1_desc: "The Estates of our Empire must recognize the Head of State as the final authority of our court."
 iv2_ga_ideagroup_dip_6_2: "Orderly Coordination"
 iv2_ga_ideagroup_dip_6_2_desc: "Our great nation can only develop further if all members of the government coordinate in an orderly manner."
 iv2_ga_ideagroup_dip_6_3: "Long Echo"
 iv2_ga_ideagroup_dip_6_3_desc: "The influence we wield is unprecedented. A single word from our Head of State is enough to damage the reputation of even the most illustrious dynasties."
 iv2_ga_ideagroup_dip_6_4: "Magnificent Palace"
 iv2_ga_ideagroup_dip_6_4_desc: "No ruler can boast of glory without a magnificent court."
 iv2_ga_ideagroup_dip_6_5: "Welcoming Ceremonies"
 iv2_ga_ideagroup_dip_6_5_desc: "We will greet arriving dignitaries with elaborate ceremonies to display our power, wealth, and prosperity."
 iv2_ga_ideagroup_dip_6_6: "Recognized Authority"
 iv2_ga_ideagroup_dip_6_6_desc: "Our authority bears the weight of our ruler's greatness. Therefore, it brings security, prestige, and a sense of superiority."
 iv2_ga_ideagroup_dip_6_7: "Court Embassies"
 iv2_ga_ideagroup_dip_6_7_desc: "Establishment of diplomatic communication points between us and our allies is an important addition to strengthening the influence of our Court."
 
