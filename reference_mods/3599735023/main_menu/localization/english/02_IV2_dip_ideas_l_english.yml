 iv2_ideagroup_title_dip_8: "Assimilation Ideas"
 iv2_ga_ideagroup_dip_8_1: "Re-education"
 iv2_ga_ideagroup_dip_8_1_desc: "We quickly teach our new population our values and convince them of our culture."
 iv2_ga_ideagroup_dip_8_2: "Rapid Integration"
 iv2_ga_ideagroup_dip_8_2_desc: "Vassal states should be quickly integrated into our motherland."
 iv2_ga_ideagroup_dip_8_3: "Integrate foreign cultures"
 iv2_ga_ideagroup_dip_8_3_desc: "We can make our culture more diverse by incorporating elements from other cultures into ours."
 iv2_ga_ideagroup_dip_8_4: "Satisfying Nationalists"
 iv2_ga_ideagroup_dip_8_4_desc: "It can be useful to appease nationalists through very limited concessions."
 iv2_ga_ideagroup_dip_8_5: "Positive Pamphlets"
 iv2_ga_ideagroup_dip_8_5_desc: "Our own philosophers applaud our actions and praise the greatness of our culture."
 iv2_ga_ideagroup_dip_8_6: "Firm Cohesion"
 iv2_ga_ideagroup_dip_8_6_desc: "Should anyone try to tear our nation apart, we will fight resolutely."
 iv2_ga_ideagroup_dip_8_7: "No enemies, only brothers"
 iv2_ga_ideagroup_dip_8_7_desc: "On the first day after the conquest, we no longer see those we conquer as enemies, but as brothers."
 
