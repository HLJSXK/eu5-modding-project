l_english:
 iv2_ideagroup_title_dip_1: "Espionage Ideas"
 iv2_ga_ideagroup_dip_1_1: "Efficient Spies"
 iv2_ga_ideagroup_dip_1_1_desc: "Most peasants would sell their mothers for a little cash, but talented individuals capable of accomplishing something truly useful aren't so easy to find. Through experience, we learn to separate the wheat from the chaff."
 iv2_ga_ideagroup_dip_1_2: "Fair Trade Attack"
 iv2_ga_ideagroup_dip_1_2_desc: "The enemy is vulnerable on all fronts. Poison dripped into the right ear can be as deadly as an army of ten thousand soldiers. If we are to succeed, we must not shy away from any sinister device."
 iv2_ga_ideagroup_dip_1_3: "Security Clearances"
 iv2_ga_ideagroup_dip_1_3_desc: "With so many places for profit, we sometimes find that those who run our administration are vulnerable to bribes from other powers. A few simple background checks will eliminate the most obvious ones."
 iv2_ga_ideagroup_dip_1_4: "Privateers"
 iv2_ga_ideagroup_dip_1_4_desc: "The war against the enemy's economic power is the culmination of the first triad of victory. We will call upon fierce sea dogs to plunder the enemy's trade routes."
 iv2_ga_ideagroup_dip_1_5: "Dubious Recruitment"
 iv2_ga_ideagroup_dip_1_5_desc: "Our helpers come from layers so close to the dregs of society that most can't believe they did these things on our behalf. Wonderful!"
 iv2_ga_ideagroup_dip_1_6: "Destabilization Action"
 iv2_ga_ideagroup_dip_1_6_desc: "Our espionage capabilities allow us to directly target the stability of our enemies. We can turn best friends into enemies."
 iv2_ga_ideagroup_dip_1_7: "Effective Counter-Espionage"
 iv2_ga_ideagroup_dip_1_7_desc: "Through our own actions, we also learn to be cautious and effective in our counter-espionage operations."
 
