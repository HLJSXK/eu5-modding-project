 iv2_ideagroup_title_dip_14: "Internal Mediation Ideas"
 iv2_ga_ideagroup_dip_14_1: "Conflict Resolution"
 iv2_ga_ideagroup_dip_14_1_desc: "We are experts in mediating conflicts."
 iv2_ga_ideagroup_dip_14_2: "Compromise"
 iv2_ga_ideagroup_dip_14_2_desc: "The power of compromise should not be underestimated. Only through compromise can long-held enmities be resolved."
 iv2_ga_ideagroup_dip_14_3: "Courts"
 iv2_ga_ideagroup_dip_14_3_desc: "Courts play an important role in dispute resolution."
 iv2_ga_ideagroup_dip_14_4: "Judicial Independence"
 iv2_ga_ideagroup_dip_14_4_desc: "If parties appear before an impartial judge, the likelihood that a decision will be followed and respected is greater."
 iv2_ga_ideagroup_dip_14_5: "Early International Law"
 iv2_ga_ideagroup_dip_14_5_desc: "Even a few general rules that all states adhere to will help ensure that we live in a civil society."
 iv2_ga_ideagroup_dip_14_6: "Church Mediators"
 iv2_ga_ideagroup_dip_14_6_desc: "The Church, as an independent authority, can help resolve conflicts."
 iv2_ga_ideagroup_dip_14_7: "Mediation before feuding"
 iv2_ga_ideagroup_dip_14_7_desc: "By incorporating mediation into feuding law, we can prevent bloody conflicts before a mediator has been consulted."
 
