 iv2_ideagroup_title_dip_9: "Propaganda Ideas"
 iv2_ga_ideagroup_dip_9_1: "War Propaganda"
 iv2_ga_ideagroup_dip_9_1_desc: "Good propaganda can motivate the population to hold out longer."
 iv2_ga_ideagroup_dip_9_2: "Minister of Propaganda"
 iv2_ga_ideagroup_dip_9_2_desc: "A minister who focuses exclusively on propaganda can be very valuable."
 iv2_ga_ideagroup_dip_9_3: "Foreign Influence"
 iv2_ga_ideagroup_dip_9_3_desc: "Thanks to our successful propaganda, even foreign countries believe our stories."
 iv2_ga_ideagroup_dip_9_4: "Credibility"
 iv2_ga_ideagroup_dip_9_4_desc: "By telling at least some of the truth, we convey credibility."
 iv2_ga_ideagroup_dip_9_5: "Striving for the Greater Good"
 iv2_ga_ideagroup_dip_9_5_desc: "Our propaganda always includes the pursuit of the greater good."
 iv2_ga_ideagroup_dip_9_6: "Blanket justifications"
 iv2_ga_ideagroup_dip_9_6_desc: "Our arguments are so flexible that we can justify even the most ambitious political maneuvers with clever reasoning."
 iv2_ga_ideagroup_dip_9_7: "Duty to Victory"
 iv2_ga_ideagroup_dip_9_7_desc: "An important part of our propaganda strategy is to instill in the population a duty to win."
 
