 iv2_ideagroup_title_dip_2: "Diplomatic Ideas"
 iv2_ga_ideagroup_dip_2_1: "Embassies Abroad"
 iv2_ga_ideagroup_dip_2_1_desc: "Diplomacy is the delicate art of maintaining a balance between multiple aspects. Embassies abroad can provide us with reports and information that give us various options for action."
 iv2_ga_ideagroup_dip_2_2: "Fictitious Claims"
 iv2_ga_ideagroup_dip_2_2_desc: "Making a claim is easy. It becomes more difficult when everyone else needs to be convinced that the claim is justified. By expanding our diplomatic network, we can ensure that our claims are known to those who matter."
 iv2_ga_ideagroup_dip_2_3: "Adaptability"
 iv2_ga_ideagroup_dip_2_3_desc: "There is land that belongs to us and is part of our hereditary lands, and which we will never relinquish. With a little flexibility, it is quite possible to expand this category to include some regions. Should we, in an emergency, be forced to launch a crusade to reclaim these lands, the rest of the world will know that our cause is just."
 iv2_ga_ideagroup_dip_2_4: "Cabinet"
 iv2_ga_ideagroup_dip_2_4_desc: "By establishing an Executive Council, we are able to assemble our most capable diplomats."
 iv2_ga_ideagroup_dip_2_5: "Diplomatic Influence"
 iv2_ga_ideagroup_dip_2_5_desc: "By focusing on diplomacy, we can increase our strength in the diplomatic field. This strength can win us many friends."
 iv2_ga_ideagroup_dip_2_6: "Flexible Negotiations"
 iv2_ga_ideagroup_dip_2_6_desc: "You can never know exactly what can be gained from peace negotiations. Therefore, we should keep all options open when entering negotiations."
 iv2_ga_ideagroup_dip_2_7: "Revolution and Counter-Revolution"
 iv2_ga_ideagroup_dip_2_7_desc: "As the politics of our time become increasingly polarized and radical, we may have no choice but to wage wars against dissenting governments."
 
