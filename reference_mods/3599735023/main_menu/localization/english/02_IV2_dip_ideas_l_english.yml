 iv2_ideagroup_title_dip_4: "Influence Ideas"
 iv2_ga_ideagroup_dip_4_1: "Tribute System"
 iv2_ga_ideagroup_dip_4_1_desc: "Strengthen our revenues by establishing a formalized system of annual vassal tributes."
 iv2_ga_ideagroup_dip_4_2: "Integrated Elites"
 iv2_ga_ideagroup_dip_4_2_desc: "By bringing the ruling elites of our vassal states into our government, we can make the integration of their territories much smoother."
 iv2_ga_ideagroup_dip_4_3: "State Propaganda"
 iv2_ga_ideagroup_dip_4_3_desc: "As with humans, reputation is very important to a nation, and establishing an official propaganda service will ensure that our name is not tarnished by the lies of our enemies."
 iv2_ga_ideagroup_dip_4_4: "Postal Service"
 iv2_ga_ideagroup_dip_4_4_desc: "Communications technology isn't always as it should be, making it difficult to ensure the timely arrival of our diplomatic dispatches. Through a network of post offices and courier rest stops, our voice can be better heard in distant territories."
 iv2_ga_ideagroup_dip_4_5: "Marcher Lords"
 iv2_ga_ideagroup_dip_4_5_desc: "The "Marcher Lords" grant their vassals a high degree of autonomy in border regions, allowing them to raise large armies to assist us in our wars."
 iv2_ga_ideagroup_dip_4_6: "Soft Blackmail"
 iv2_ga_ideagroup_dip_4_6_desc: "Sometimes we have to take a tougher approach if we want to achieve our goals. We are willing to do so."
 iv2_ga_ideagroup_dip_4_7: "Mutual Competition"
 iv2_ga_ideagroup_dip_4_7_desc: "We are willing to surpass our rivals in every way and always strive to be the best nation with the most influence."
 
