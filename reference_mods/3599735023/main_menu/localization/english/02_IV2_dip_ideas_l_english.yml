 iv2_ga_ideagroup_dip_13_1: "Joint Celebrations"
 iv2_ga_ideagroup_dip_13_1_desc: "Where can differences be forgotten more quickly than by celebrating together?"
 iv2_ga_ideagroup_dip_13_2: "Merging Weddings"
 iv2_ga_ideagroup_dip_13_2_desc: "We promote weddings between the different cultures of our countries to reduce mutual tensions."
 iv2_ga_ideagroup_dip_13_3: "Mutual Learning"
