 iv2_ideagroup_title_dip_15: "Contract Negotiation Ideas"
 iv2_ga_ideagroup_dip_15_1: "Legal Texts"
 iv2_ga_ideagroup_dip_15_1_desc: "By studying old legal texts and understanding the old legal systems, we can reach fairer agreements for everyone, or sometimes simply to our own advantage!"
 iv2_ga_ideagroup_dip_15_2: "Pacta sunt servanda"
 iv2_ga_ideagroup_dip_15_2_desc: "Contracts must be honored, as the Romans already knew. Failure to do so leaves you vulnerable in the future."
 iv2_ga_ideagroup_dip_15_3: "Essentialia negotii"
 iv2_ga_ideagroup_dip_15_3_desc: "The essential elements of a business transaction or other agreement should always be recorded in writing."
 iv2_ga_ideagroup_dip_15_4: "Civil Arbitration Bodies"
 iv2_ga_ideagroup_dip_15_4_desc: "It is worthwhile to maintain a certain number of civil arbitration bodies that enforce the law in our country."
 iv2_ga_ideagroup_dip_15_5: "Mutual Trust"
 iv2_ga_ideagroup_dip_15_5_desc: "Our adherence to the law internally will also strengthen trust externally."
 iv2_ga_ideagroup_dip_15_6: "Long-term partners"
 iv2_ga_ideagroup_dip_15_6_desc: "Partnerships over many years strengthen mutual trust."
 iv2_ga_ideagroup_dip_15_7: "Protest note"
 iv2_ga_ideagroup_dip_15_7_desc: "Should our contractual partner ever violate an agreement, we can send them a stern protest note before hostilities arise."
 
