 iv2_ga_ideagroup_dip_12_1: "The right of the strongest"
 iv2_ga_ideagroup_dip_12_1_desc: "By the right of the strongest, we have every right to annex foreign lands to our own."
 iv2_ga_ideagroup_dip_12_2: "Long Tradition"
 iv2_ga_ideagroup_dip_12_2_desc: "Our country has a long tradition, and we know how to use it to our advantage."
 iv2_ga_ideagroup_dip_12_3: "Glorious Past"
 iv2_ga_ideagroup_dip_12_3_desc: "Our glorious past always helps us maintain the appearance of greatness."
 iv2_ga_ideagroup_dip_12_4: "Increased Taxes"
 iv2_ga_ideagroup_dip_12_4_desc: "Through the Imperial Administration, we can raise a lot of taxes, even if the population isn't particularly enthusiastic about it."
 iv2_ga_ideagroup_dip_12_5: "Imperial Fleet"
 iv2_ga_ideagroup_dip_12_5_desc: "An empire's fleet must be large."
 iv2_ga_ideagroup_dip_12_6: "Centre of Art"
 iv2_ga_ideagroup_dip_12_6_desc: "Our empire is large and so are the number of artists adding to our glory."
 iv2_ga_ideagroup_dip_12_7: "Imperial Guard"
 iv2_ga_ideagroup_dip_12_7_desc: "Only the country's finest soldiers are allowed to serve in the Imperial Guard. They will be the last to leave the battlefield."
 
