 iv2_ideagroup_title_dip_3: "Dynastic Ideas"
 iv2_ga_ideagroup_dip_3_1: "Dynastic Entanglements"
 iv2_ga_ideagroup_dip_3_1_desc: "Through our diverse family relationships, we can exert influence over many houses."
 iv2_ga_ideagroup_dip_3_2: "My cousin, your cousin"
 iv2_ga_ideagroup_dip_3_2_desc: "Sometimes we lose track of our extensive dynastic tree. But most of the time, we keep track."
 iv2_ga_ideagroup_dip_3_3: "Early Engagement"
 iv2_ga_ideagroup_dip_3_3_desc: "By engaging our children early in life, we ensure they make a good match."
 iv2_ga_ideagroup_dip_3_4: "War Against Relatives"
 iv2_ga_ideagroup_dip_3_4_desc: "If things come to the worst, we can still hope for civil treatment from our relatives should we fall into their hands."
 iv2_ga_ideagroup_dip_3_5: "Establish Cadet Lines"
 iv2_ga_ideagroup_dip_3_5_desc: "We are accustomed to our dynasty controlling several countries, which we rule jointly. Inheritance can be a tricky matter. By clearly defining roles and rights for our dynasty through Cadet Lines, we can ensure a more stable line of succession."
 iv2_ga_ideagroup_dip_3_6: "Surprise Attack"
 iv2_ga_ideagroup_dip_3_6_desc: "Our diplomatic game is at such a high level that our opponents are unaware of our attack, even though they know it's imminent. This gives us an advantage!"
 iv2_ga_ideagroup_dip_3_7: "Game of Thrones"
 iv2_ga_ideagroup_dip_3_7_desc: "Sometimes it's necessary to assert one's claims and conquer a claimed throne with fire and blood!"
 
