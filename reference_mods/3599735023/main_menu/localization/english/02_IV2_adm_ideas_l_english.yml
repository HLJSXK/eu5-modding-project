 iv2_ideagroup_title_adm_3: "Jurisprudence Ideas"
 iv2_ga_ideagroup_adm_3_1: "Collection of Laws"
 iv2_ga_ideagroup_adm_3_1_desc: "Laws give people security and foothold."ive people security and foothold. Upholding the law will make our nation strong and stable."
 iv2_ga_ideagroup_adm_3_2: "Ministry of Justice"
 iv2_ga_ideagroup_adm_3_2_desc: "The ministry of justice is occupied creating new laws and update old ones."
 iv2_ga_ideagroup_adm_3_3: "Lawyer Tradition"
 iv2_ga_ideagroup_adm_3_3_desc: "Our lawyers keep the land running."
 iv2_ga_ideagroup_adm_3_4: "Business Law"
 iv2_ga_ideagroup_adm_3_4_desc: "Business law is important to lay down some rules with the interaction with other countries."
 iv2_ga_ideagroup_adm_3_5: "Anti Usury Laws"
 iv2_ga_ideagroup_adm_3_5_desc: "Usury paralyzes the economy. We shall fight it."
 iv2_ga_ideagroup_adm_3_6: "Public International Law"
 iv2_ga_ideagroup_adm_3_6_desc: "Public international law determines some basic rules in the interactions of states."
 iv2_ga_ideagroup_adm_3_7: "Minority Rights"
 iv2_ga_ideagroup_adm_3_7_desc: "Minority rights stabilize our realm and reduce uprisings."
 
