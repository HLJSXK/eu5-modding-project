 iv2_ideagroup_title_adm_54: "Dreamtime Ideas"
 iv2_ga_ideagroup_adm_54_1: "Regional Dreamtime"
 iv2_ga_ideagroup_adm_54_1_desc: "The aspect of region is very importent for the dreamtime religion. Depending on the regional features of the surroundings the dreamtime religion will also have different features."
 iv2_ga_ideagroup_adm_54_2: "Personal Dreamtime"
 iv2_ga_ideagroup_adm_54_2_desc: "The individual dreamtime is an important aspect of the dreamtime religion."
 iv2_ga_ideagroup_adm_54_3: "Totemism"
 iv2_ga_ideagroup_adm_54_3_desc: "Totemism is important to the dreamtime religion."
 iv2_ga_ideagroup_adm_54_4: "Anti Transcendence"
 iv2_ga_ideagroup_adm_54_4_desc: "The dreamtime religion does not know the classic concept of God."
 iv2_ga_ideagroup_adm_54_5: "Origin of Law and Order"
 iv2_ga_ideagroup_adm_54_5_desc: "The Dreamtime is the origin of Law and Order."
 iv2_ga_ideagroup_adm_54_6: "Rainbow Snake"
 iv2_ga_ideagroup_adm_54_6_desc: "The Rainbow Snake is said to have merged mind and matter."
 iv2_ga_ideagroup_adm_54_7: "Soul Stadium"
 iv2_ga_ideagroup_adm_54_7_desc: "A soul must traverse three stadiums: Mind-Child, Life and Death."

