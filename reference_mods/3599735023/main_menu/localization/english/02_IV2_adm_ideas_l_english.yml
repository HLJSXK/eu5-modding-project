 iv2_ideagroup_title_adm_49: "Inti Ideas"
 iv2_ga_ideagroup_adm_49_1: "The Sun God"
 iv2_ga_ideagroup_adm_49_1_desc: "Inti is the sun god of the Incas and their highest patron."
 iv2_ga_ideagroup_adm_49_2: "Viracocha"
 iv2_ga_ideagroup_adm_49_2_desc: "Viracocha is the father of Inti and the god of civilisation."
 iv2_ga_ideagroup_adm_49_3: "Mama Killa"
 iv2_ga_ideagroup_adm_49_3_desc: "Mama Killa is the mother of Inti."
 iv2_ga_ideagroup_adm_49_4: "Willaq Umu"
 iv2_ga_ideagroup_adm_49_4_desc: "The Willaq Umu was the high priest of the Inti. He is the second most powerful person in the kingdom after the king."
 iv2_ga_ideagroup_adm_49_5: "Inti Raymi"
 iv2_ga_ideagroup_adm_49_5_desc: "The festival of Inti Raymi honors the sun god and was meant to celebrate the start of a new planting season."
 iv2_ga_ideagroup_adm_49_6: "Priesthood"
 iv2_ga_ideagroup_adm_49_6_desc: "The priesthood for Inti was both male and female."
 iv2_ga_ideagroup_adm_49_7: "The Sun"
 iv2_ga_ideagroup_adm_49_7_desc: "The sun was important to the Incas, because it was necessary for the production of crops like maize and other grains."
 
