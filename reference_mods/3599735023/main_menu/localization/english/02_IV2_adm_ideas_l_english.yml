 iv2_ga_ideagroup_adm_15_1: "Expansion of Cities"
 iv2_ga_ideagroup_adm_15_1_desc: "By founding more cities, we can increase the effectiveness and attractiveness of the empire."
 iv2_ga_ideagroup_adm_15_2: "Mercenary Contracts"
 iv2_ga_ideagroup_adm_15_2_desc: "By drawing up standing contracts with certain mercenary captains we can ensure that we will always have access to a large pool of mercenaries to draw on, should they be needed."
 iv2_ga_ideagroup_adm_15_3: "Quick reasons for war"
 iv2_ga_ideagroup_adm_15_3_desc: "If we are quick to fabricate a reason for war, our opponents will have little time to react."
 iv2_ga_ideagroup_adm_15_4: "Expansion doctrine"
 iv2_ga_ideagroup_adm_15_4_desc: "Our country is geared towards military expansion."
 iv2_ga_ideagroup_adm_15_5: "Integration of new territories"
 iv2_ga_ideagroup_adm_15_5_desc: "We are skilled at integrating newly conquered territories into the empire."
 iv2_ga_ideagroup_adm_15_6: "Population policy"
 iv2_ga_ideagroup_adm_15_6_desc: "If we enable our colonies to grow quickly, we will only benefit from it."
 iv2_ga_ideagroup_adm_15_7: "Expansion of Production"
 iv2_ga_ideagroup_adm_15_7_desc: "A strong economy is based on the production of many goods."
 
