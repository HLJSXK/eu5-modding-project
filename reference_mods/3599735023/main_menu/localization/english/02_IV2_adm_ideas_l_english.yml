 iv2_ideagroup_title_adm_42: "Manichaeism Ideas"
 iv2_ga_ideagroup_adm_42_1: "Teachings of the prophet"
 iv2_ga_ideagroup_adm_42_1_desc: "Prophet Mani taught us that every religion was 'like a river, flowing towards a single, unified faith.' While the followers of other religions have misguided ways, they must not be surpressed and should be free to practise their own version of the true path."
 iv2_ga_ideagroup_adm_42_2: "72 Bishops"
 iv2_ga_ideagroup_adm_42_2_desc: "Appointed by Mani himself, 72 Bishops were to guide our people. These were mostly village elders, religious people and others that were known in their community as trustworthy successors of Prophet. Let us introduce and appoint these Bishops once again, so they might serve our people and spread the light in these dark times."
 iv2_ga_ideagroup_adm_42_3: "Let them see the light"
 iv2_ga_ideagroup_adm_42_3_desc: "Manichaeism as a religion was extremely flexible. One of the reasons why it was spread so videly and without much bloodshed was its ability to adopt target people's practises - culture, traditions and even religion. By 'assimilating' those practises, Manichaeism seemed more attractive and less alien, while it also encouraged people to convert."
 iv2_ga_ideagroup_adm_42_4: "Struggle in the Cosmos"
 iv2_ga_ideagroup_adm_42_4_desc: "The world is in a constant state of upheaval as forces or Darkness and Light battle to decide our fate. While we can do very little to influence those processes, we can make sure that our people are safe from evil forces that come in the form of our enemies by motivating and preparing them to defend themselves."
 iv2_ga_ideagroup_adm_42_5: "Ritual Music"
 iv2_ga_ideagroup_adm_42_5_desc: "Music was a respected practise in Manichaeism and was often used during rituals. It was considered to be an echo from the heavens, a sound that could purify the soul and make both player and listener closer to the light."
 iv2_ga_ideagroup_adm_42_6: "Re-unite the diaspora"
 iv2_ga_ideagroup_adm_42_6_desc: "Due to the extreme hostility, most of the manicheans were usually in hiding and never revealed their true faith, or in some cases they formed small village communities in desolate regions where central religious authority was not very strong. As we have established Manichaeism as a state religion, it would be a good idea to invite and settle all of our persecuted brothers and sisters in faith inside our country."
 iv2_ga_ideagroup_adm_42_7: "Construct a Grand Temple"
 iv2_ga_ideagroup_adm_42_7_desc: "Manicheans had two kinds of religious buildings - Temples and monasteries. Because of the heavy influence from other religions, most of these buildings would serve as schools, libraries, some were used to house assemblies and even to house paintings. While we increase our fame and prestige, we should not forget our spiritual responsobilities - Constructing a grand temple will show both our people and other Manichaeans that we have not abandoned prophet's words all this time and are willing to contribute to the cause."
 
