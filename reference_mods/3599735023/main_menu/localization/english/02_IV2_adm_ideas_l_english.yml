 iv2_ideagroup_title_adm_7: "Monarchy Ideas"
 iv2_ga_ideagroup_adm_7_1: "Noble Knights"
 iv2_ga_ideagroup_adm_7_1_desc: "Supporting cavalry requires an economic system that produces a large number of surplus horses. If we were to guarantee the privileges of our noble class, not only would they be much happier - they would do much of the work to produce the needed horses. Our court fool described it as service guarantees serfs."
 iv2_ga_ideagroup_adm_7_2: "International Nobility"
 iv2_ga_ideagroup_adm_7_2_desc: "International relations are a tricky business. Some say that the merchant class who are used to dealing with foreigners are best for this. Those who say this ignore the kindred ties that our noble families have established through the years. These ties will help our cause diplomatically."
 iv2_ga_ideagroup_adm_7_3: "Noble Family Ties"
 iv2_ga_ideagroup_adm_7_3_desc: "Our family ties with the high nobilty will tighten our right to rule."
 iv2_ga_ideagroup_adm_7_4: "Local Nobility"
 iv2_ga_ideagroup_adm_7_4_desc: "The nobility know they are better than common people and will give their loyalty to those who are worthy. If we confirm their privileges, they will remember our largess and be more resistant to the inducements of foreign powers."
 iv2_ga_ideagroup_adm_7_5: "Dynastic Politics"
 iv2_ga_ideagroup_adm_7_5_desc: "We will keep our dynasty alive at all costs."
 iv2_ga_ideagroup_adm_7_6: "Local Militia"
 iv2_ga_ideagroup_adm_7_6_desc: "Our nobility will muster men to form militias when it comes to defending the homeland."
 iv2_ga_ideagroup_adm_7_7: "Increase of Crown Authority"
 iv2_ga_ideagroup_adm_7_7_desc: "Increasing the crown authority will make it easier for us to govern the realm."
 
