 iv2_ideagroup_title_adm_23: "Tribal Ideas"
 iv2_ga_ideagroup_adm_23_1: "The Great Law"
 iv2_ga_ideagroup_adm_23_1_desc: "By binding our people together through a set of common principles, a constitution, we can strive towards the betterment of us all."
 iv2_ga_ideagroup_adm_23_2: "Trade with Foreigners"
 iv2_ga_ideagroup_adm_23_2_desc: "By trading with people of other cultures and far away places we will be exposed to new ideas."
 iv2_ga_ideagroup_adm_23_3: "Warrior"
 iv2_ga_ideagroup_adm_23_3_desc: "Our culture has had a long tradition of rites of passages for young men to become warriors. An act of bravery to complete the journey to adulthood."
 iv2_ga_ideagroup_adm_23_4: "Controlled Burns"
 iv2_ga_ideagroup_adm_23_4_desc: "By burning fields in a controlled manner we can get greater yields of our harvests, allowing us a much greater population."
 iv2_ga_ideagroup_adm_23_5: "Village Defence"
 iv2_ga_ideagroup_adm_23_5_desc: "Everyone has their duties in defending the villages."
 iv2_ga_ideagroup_adm_23_6: "Bountiful Land"
 iv2_ga_ideagroup_adm_23_6_desc: "Our people are surrounded by vast amounts of land, untouched by humans for generations and thick with flora or fauna."
 iv2_ga_ideagroup_adm_23_7: "Irregular Warfare"
 iv2_ga_ideagroup_adm_23_7_desc: "Through the use of natural features and barriers we are accustomed to we can defeat larger enemies through raids and ambushes."
 
