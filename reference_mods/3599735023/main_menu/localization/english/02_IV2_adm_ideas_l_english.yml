 iv2_ideagroup_title_adm_11: "Religious Ideas"
 iv2_ga_ideagroup_adm_11_1: "Missionary Schools"
 iv2_ga_ideagroup_adm_11_1_desc: "Although there is no shortage of people ready to go out and spread the true faith, most of these people simply do more harm than good. However, specialist schools to train the missionaries will ensure we have more people who cannot only spread the faith, but succeed as well."
 iv2_ga_ideagroup_adm_11_2: "Church Attendance Duty"
 iv2_ga_ideagroup_adm_11_2_desc: "By adopting a mandatory church attendance policy, the emphasis on religious values and beliefs will unquestionably minimize the costs of maintaining law and order."
 iv2_ga_ideagroup_adm_11_3: "Divine Supremacy"
 iv2_ga_ideagroup_adm_11_3_desc: "It is of the utmost importance that we rid our nation and its surrounding borders from the infidels pestering our lands."
 iv2_ga_ideagroup_adm_11_4: "Deus Vult"
 iv2_ga_ideagroup_adm_11_4_desc: "Join the battle cry of the crusades, 'God wills it' and crush the infidels."
 iv2_ga_ideagroup_adm_11_5: "Devoutness"
 iv2_ga_ideagroup_adm_11_5_desc: "Religion is one of the most important bulwarks of our rulership. By public displays of piety by the rulers, the ruled will follow suit. The growing of piety amongst our people will strengthen our rule."
 iv2_ga_ideagroup_adm_11_6: "Religious Tradition"
 iv2_ga_ideagroup_adm_11_6_desc: "The strength of our faith and public displays of piety and worship are admired by other lands both near and far. This is reflected in the prestige and glory to our realm."
 iv2_ga_ideagroup_adm_11_7: "Ecumenism"
 iv2_ga_ideagroup_adm_11_7_desc: "The problem with how to deal with heretics in the realm is always difficult. Although the good old-fashioned fire and sword approach will solve most problems eventually, diplomacy can also succeed. By encouraging dialogue between the various sects, we can reduce misunderstanding and promote peace in the realm."

