 iv2_ideagroup_title_adm_32: "Norse Ideas"
 iv2_ga_ideagroup_adm_32_1: "Effective Raiding Parties"
 iv2_ga_ideagroup_adm_32_1_desc: "We must be able to disrupt our enemies trade so that we can profit from it."
 iv2_ga_ideagroup_adm_32_2: "True Norsemen"
 iv2_ga_ideagroup_adm_32_2_desc: "Our warriors are the boldest and brave yet to be seen by the world."
 iv2_ga_ideagroup_adm_32_3: "The Vinland Saga"
 iv2_ga_ideagroup_adm_32_3_desc: "We must exploit the weaker peoples of this rich foreign land."
 iv2_ga_ideagroup_adm_32_4: "Lumber Industry"
 iv2_ga_ideagroup_adm_32_4_desc: "With our great northern forests we will be able to produce ships for a reasonable price."
 iv2_ga_ideagroup_adm_32_5: "Raze it!"
 iv2_ga_ideagroup_adm_32_5_desc: "BURN THEIR GRAIN! BURN THEIR HOMES! TAKE WHAT EVER YOU CAN!"
 iv2_ga_ideagroup_adm_32_6: "Encourage Norse Temples"
 iv2_ga_ideagroup_adm_32_6_desc: "We must convert these new peoples to the true faith."
 iv2_ga_ideagroup_adm_32_7: "New Farming Techniques"
 iv2_ga_ideagroup_adm_32_7_desc: "Teaching warriors to farm is not such and easy task so we must teach our sons to farm."
 
