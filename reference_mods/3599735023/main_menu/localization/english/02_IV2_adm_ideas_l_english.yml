 iv2_ga_ideagroup_adm_4_1: "Reading"
 iv2_ga_ideagroup_adm_4_1_desc: "Reading is an important skill for an advanced society."
 iv2_ga_ideagroup_adm_4_2: "Inquisitive Mind"
 iv2_ga_ideagroup_adm_4_2_desc: "We encourage children to be inquisitive and inspire them to experiment."
 iv2_ga_ideagroup_adm_4_3: "Schools"
 iv2_ga_ideagroup_adm_4_3_desc: "When children go to school, they learn many skills that their parents cannot teach them."
 iv2_ga_ideagroup_adm_4_4: "Education at the Highest Level"
 iv2_ga_ideagroup_adm_4_4_desc: "Better education also improves the skills of our ruling class."
 iv2_ga_ideagroup_adm_4_5: "Innovative Spirit"
 iv2_ga_ideagroup_adm_4_5_desc: "We are an innovative nation!"
 iv2_ga_ideagroup_adm_4_6: "Reading Ability"
 iv2_ga_ideagroup_adm_4_6_desc: "As more and more people learn to read, social pressure on others to learn increases."
 iv2_ga_ideagroup_adm_4_7: "Education in Administration"
 iv2_ga_ideagroup_adm_4_7_desc: "Better education for our administrators increases our efficiency."

 
