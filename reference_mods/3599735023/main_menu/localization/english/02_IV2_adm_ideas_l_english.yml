 iv2_ideagroup_title_adm_10: "Theocracy Ideas"
 iv2_ga_ideagroup_adm_10_1: "Celebrate As They Fall"
 iv2_ga_ideagroup_adm_10_1_desc: "Our religious festivals will always keep our morale on a high level."
 iv2_ga_ideagroup_adm_10_2: "Divine Assault"
 iv2_ga_ideagroup_adm_10_2_desc: "With god on our side, we cannot lose."
 iv2_ga_ideagroup_adm_10_3: "Religious Supremacy"
 iv2_ga_ideagroup_adm_10_3_desc: "We will prove the supremacy of our religion. We will have it easier converting others because they have to accept our supperiority."
 iv2_ga_ideagroup_adm_10_4: "Church Law"
 iv2_ga_ideagroup_adm_10_4_desc: "Church Law will support us in all our undertakings."
 iv2_ga_ideagroup_adm_10_5: "Bless The Cannons"
 iv2_ga_ideagroup_adm_10_5_desc: "Blessing our cannons will motivate people to donate money in order for us to afford even more of them."
 iv2_ga_ideagroup_adm_10_6: "Holy War"
 iv2_ga_ideagroup_adm_10_6_desc: "In holy war we need not need be modest in our demands."
 iv2_ga_ideagroup_adm_10_7: "Divine Vindication"
 iv2_ga_ideagroup_adm_10_7_desc: "We can vindicate even ridiculous demands with our religion."
 
