 iv2_ideagroup_title_adm_25: "Protestant Ideas"
 iv2_ga_ideagroup_adm_25_1: "Religious Wars"
 iv2_ga_ideagroup_adm_25_1_desc: "We freed ourselves from the wrong ways, but they call us heretics. We must not wait to be attacked. Let's carry the fight to our enemies."
 iv2_ga_ideagroup_adm_25_2: "Missionary Schools"
 iv2_ga_ideagroup_adm_25_2_desc: "Although there is no shortage of people ready to go out and spread the true faith, most do more harm than good. Specialist schools to train missionaries will ensure we have more people who will not only try spread the faith, but succeed."
 iv2_ga_ideagroup_adm_25_3: "Enlighten the ignorant"
 iv2_ga_ideagroup_adm_25_3_desc: "Spread the word of Protestantism and convince more people to join us."
 iv2_ga_ideagroup_adm_25_4: "Divine Supremacy"
 iv2_ga_ideagroup_adm_25_4_desc: "It is of utmost importance that we rid our nation and its borders of the infidels pestering our lands."
 iv2_ga_ideagroup_adm_25_5: "Enthusiasm of resistance"
 iv2_ga_ideagroup_adm_25_5_desc: "The common people are ready to give their lives for their new religion."
 iv2_ga_ideagroup_adm_25_6: "Renaissance"
 iv2_ga_ideagroup_adm_25_6_desc: "Through our new, liberal religion, men do not have to fear persecution because they advance in technology."
 iv2_ga_ideagroup_adm_25_7: "Religious Advisor"
