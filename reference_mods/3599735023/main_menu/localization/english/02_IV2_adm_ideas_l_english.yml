 iv2_ideagroup_title_adm_46: "Anglican Ideas"
 iv2_ga_ideagroup_adm_46_1: "Missionary Schools"
 iv2_ga_ideagroup_adm_46_1_desc: "Although there is no shortage of people ready to go out and spread the true faith, most of them do more harm than good. Specialist schools to train missionaries will ensure we have more people who will not only try spread the faith, but succeed."
 iv2_ga_ideagroup_adm_46_2: "Monastery Dissolution"
 iv2_ga_ideagroup_adm_46_2_desc: "We will dissolve the corrupt monasteries and put their wealth to better use."
 iv2_ga_ideagroup_adm_46_3: "Divine Supremacy"
 iv2_ga_ideagroup_adm_46_3_desc: "It is of utmost importance that we rid our nation and its borders from the infidels pestering our lands."
 iv2_ga_ideagroup_adm_46_4: "Religious Times of Trouble"
 iv2_ga_ideagroup_adm_46_4_desc: "We learned to cope with religious uprisings to the extent that it is almost normal to us."
 iv2_ga_ideagroup_adm_46_5: "Emigration Wave"
 iv2_ga_ideagroup_adm_46_5_desc: "The religious times of trouble though will eventually lead to waves of emigration."
 iv2_ga_ideagroup_adm_46_6: "Advancement"
 iv2_ga_ideagroup_adm_46_6_desc: "We have put behind the times of regression and will advance into a new age."
 iv2_ga_ideagroup_adm_46_7: "Bless the Cannons!"
 iv2_ga_ideagroup_adm_46_7_desc: "Due to our advancement in many areas we can improve our technical efficiency and thus the power of our cannons."
 
