 iv2_ideagroup_title_adm_9: "Dictatorship Ideas"
 iv2_ga_ideagroup_adm_9_1: "High Taxes"
 iv2_ga_ideagroup_adm_9_1_desc: "Because of our power we can raise the taxes as high as we like."
 iv2_ga_ideagroup_adm_9_2: "Enforcement of Production"
 iv2_ga_ideagroup_adm_9_2_desc: "We can always force peasants to work in the manufactories, if we think it necessary."
 iv2_ga_ideagroup_adm_9_3: "Gang of Bullies"
 iv2_ga_ideagroup_adm_9_3_desc: "Our 'police' will keep the peace on the streets."
 iv2_ga_ideagroup_adm_9_4: "Loose Morals"
 iv2_ga_ideagroup_adm_9_4_desc: "We are not hesitant to soil our hands."
 iv2_ga_ideagroup_adm_9_5: "Grand Army"
 iv2_ga_ideagroup_adm_9_5_desc: "We need a big army to fight inner and outer enemies."
 iv2_ga_ideagroup_adm_9_6: "Forced Integration"
 iv2_ga_ideagroup_adm_9_6_desc: "We will not mind nationalists or religious fools that deny our ways."
 iv2_ga_ideagroup_adm_9_7: "Militarism"
 iv2_ga_ideagroup_adm_9_7_desc: "The military is very important in this land. In fact, it is the most important thing."
 
