 iv2_ideagroup_title_adm_22: "Horde Ideas"
 iv2_ga_ideagroup_adm_22_1: "Razing Parties"
 iv2_ga_ideagroup_adm_22_1_desc: "It is common knowledge that we live to raze the lands we conquer."
 iv2_ga_ideagroup_adm_22_2: "Horse Breeding"
 iv2_ga_ideagroup_adm_22_2_desc: "We are quite successful at breeding our horses."
 iv2_ga_ideagroup_adm_22_3: "Longterm Memory"
 iv2_ga_ideagroup_adm_22_3_desc: "We will always remember our great victories and defeats from the past."
 iv2_ga_ideagroup_adm_22_4: "Fighter Tradition"
 iv2_ga_ideagroup_adm_22_4_desc: "We are used to fighting for what is ours."
 iv2_ga_ideagroup_adm_22_5: "Clan Meetings"
 iv2_ga_ideagroup_adm_22_5_desc: "Clan Meetings are very important to keep everybody happy and in line."
 iv2_ga_ideagroup_adm_22_6: "Horde Territory"
 iv2_ga_ideagroup_adm_22_6_desc: "Just because we are nomads does not mean we cannot rule a big realm like Ghengis Khan once did."
 iv2_ga_ideagroup_adm_22_7: "Tributary States"
 iv2_ga_ideagroup_adm_22_7_desc: "Our tributary states will pay us when we demand it."
 
