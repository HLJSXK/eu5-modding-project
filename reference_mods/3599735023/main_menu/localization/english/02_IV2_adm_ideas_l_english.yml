 iv2_ideagroup_title_adm_50: "Totemism Ideas"
 iv2_ga_ideagroup_adm_50_1: "The Corn Mother"
 iv2_ga_ideagroup_adm_50_1_desc: "According to tradition, our corn is a gift from a goddess who sacrificed herself so that we might live. We will use her gift to stay stronger than our neighbors."
 iv2_ga_ideagroup_adm_50_2: "People of the Earth"
 iv2_ga_ideagroup_adm_50_2_desc: "We have roamed longer than even the Elders remember. Even if we settle down, our traditions will always follow."
 iv2_ga_ideagroup_adm_50_3: "Wakan Tanka"
 iv2_ga_ideagroup_adm_50_3_desc: "The Great Spirit Created all and intervenes where he finds it necessary."
 iv2_ga_ideagroup_adm_50_4: "Warrior Tribes"
 iv2_ga_ideagroup_adm_50_4_desc: "Tales are told of the great warriors of our past, and will be told of our tribe."
 iv2_ga_ideagroup_adm_50_5: "Great Elders"
 iv2_ga_ideagroup_adm_50_5_desc: "Our Elders and Shaman hold the stories of our past, and we must learn from them to secure our future."
 iv2_ga_ideagroup_adm_50_6: "The Sun Dance"
 iv2_ga_ideagroup_adm_50_6_desc: "We show our commitment to the Great Spirit through grueling physical and spiritual sacrifice, and to each other through prayer in our great ceremonies."
 iv2_ga_ideagroup_adm_50_7: "Totems"
 iv2_ga_ideagroup_adm_50_7_desc: "Our Totems are a physical representation of our tribe's histories and must be venerated as we remember our ancestors."
 
