 iv2_ideagroup_title_adm_48: "Mayan Ideas"
 iv2_ga_ideagroup_adm_48_1: "Parents of the World"
 iv2_ga_ideagroup_adm_48_1_desc: "The Parents of the World in the Mayan religion are the gods of sun and moon."
 iv2_ga_ideagroup_adm_48_2: "Way of Life"
 iv2_ga_ideagroup_adm_48_2_desc: "The Way of Life in the Mayan religion is a difficult task. The traveller is said to travel from east to west and only finishes his journey with his demise."
 iv2_ga_ideagroup_adm_48_3: "Blood Sacrifices"
 iv2_ga_ideagroup_adm_48_3_desc: "Through blood sacrifices we may appease the gods."
 iv2_ga_ideagroup_adm_48_4: "Human Sacrifices"
 iv2_ga_ideagroup_adm_48_4_desc: "The Mayan religion knows many ways of sacrificing humans. Ritual executions like beheading, drowning, hanging, stoning or burrying alive are only some examples."
 iv2_ga_ideagroup_adm_48_5: "God Preservation"
 iv2_ga_ideagroup_adm_48_5_desc: "By sacrificing humans, the Mayans believed they could keep their gods alive."
 iv2_ga_ideagroup_adm_48_6: "High Priest"
 iv2_ga_ideagroup_adm_48_6_desc: "The task of High Priest is one of the most prestegious tasks in the country."
 iv2_ga_ideagroup_adm_48_7: "Mayan Calendar"
 iv2_ga_ideagroup_adm_48_7_desc: "The calendar of the Mayans foretells events that will happen in the future."
 
