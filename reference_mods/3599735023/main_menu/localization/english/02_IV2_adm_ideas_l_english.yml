 iv2_ideagroup_title_adm_8: "Republican Ideas"
 iv2_ga_ideagroup_adm_8_1: "Roman History"
 iv2_ga_ideagroup_adm_8_1_desc: "By studying Roman history, we can learn from their state maintenance and their ability to quickly conquer and maintain new lands."
 iv2_ga_ideagroup_adm_8_2: "Abolished Serfdom"
 iv2_ga_ideagroup_adm_8_2_desc: "We know from reading the accounts of Roman times that a citizen army of free men is far more willing to fight than those who are forced. We must make our peasantry fairly free and they will fight to defend their freedom."
 iv2_ga_ideagroup_adm_8_3: "Bill of Rights"
 iv2_ga_ideagroup_adm_8_3_desc: "By granting the citizens certain fundamental rights, we reduce the likelihood of a peasant uprising."
 iv2_ga_ideagroup_adm_8_4: "Republican Tradition"
 iv2_ga_ideagroup_adm_8_4_desc: "As a long standing republic, our government will more easily face and endure challenges."
 iv2_ga_ideagroup_adm_8_5: "Free Subjects"
 iv2_ga_ideagroup_adm_8_5_desc: "Although giving a servant a damn good thrashing might be satisfying, it is not the best way to actually get them to work harder. Some natural philosopher has hit on the idea of making profit the prime motivation for people. If we replace monetary rents with payment in kind, our peasants will be incentivized to produce more."
 iv2_ga_ideagroup_adm_8_6: "Diplomatic Mission"
 iv2_ga_ideagroup_adm_8_6_desc: "We need to play the diplomatic game to ensure our freedom. Because our way of life is both a chance and a threat to our neighbours."
 iv2_ga_ideagroup_adm_8_7: "Emancipation"
 iv2_ga_ideagroup_adm_8_7_desc: "For a long time we have restricted ownership of land to only those we felt were trustworthy enough. If we were to lift these restrictions, landholding would be consolidated. This in turn would create a pool of seasonal labor for whom the army life might be worth pursuing."
 
