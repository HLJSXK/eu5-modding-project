 iv2_ga_ideagroup_adm_33_1: "The Right View"
 iv2_ga_ideagroup_adm_33_1_desc: "Viewing reality as it is, not just as it appears to be."
 iv2_ga_ideagroup_adm_33_2: "The Right Intention"
 iv2_ga_ideagroup_adm_33_2_desc: "Intention of renunciation, freedom and harmlessness."
 iv2_ga_ideagroup_adm_33_3: "The Right Speech"
 iv2_ga_ideagroup_adm_33_3_desc: "Speaking in a truthful and non-hurtful way."
 iv2_ga_ideagroup_adm_33_4: "The Right Action"
 iv2_ga_ideagroup_adm_33_4_desc: "Acting in a non-harmful way."
 iv2_ga_ideagroup_adm_33_5: "The Right Livelihood"
 iv2_ga_ideagroup_adm_33_5_desc: "A non-harmful livelihood."
 iv2_ga_ideagroup_adm_33_6: "The Right Effort"
 iv2_ga_ideagroup_adm_33_6_desc: "Making an effort to improve."
 iv2_ga_ideagroup_adm_33_7: "The Right Mindfulness"
 iv2_ga_ideagroup_adm_33_7_desc: "Awareness to see things for what they are with clear consciousness. Being aware of the present reality within oneself, without any craving or aversion."
 
