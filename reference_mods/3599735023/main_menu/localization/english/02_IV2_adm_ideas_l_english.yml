 iv2_ideagroup_title_adm_16: "Economic Ideas"
 iv2_ga_ideagroup_adm_16_1: "Capitalism"
 iv2_ga_ideagroup_adm_16_1_desc: "By implementing a more capitalist economy we will modernize our practices."
 iv2_ga_ideagroup_adm_16_2: "Debt and Loans"
 iv2_ga_ideagroup_adm_16_2_desc: "Debt is sometimes simply unavoidable, however, an organized debt market will allow us to float loans at a lower interest rate."
 iv2_ga_ideagroup_adm_16_3: "Administrative Sciences"
 iv2_ga_ideagroup_adm_16_3_desc: "By studying our administrative practices and trying to analyze where we can do better we might increase our efficiency quite considerably."
 iv2_ga_ideagroup_adm_16_4: "National Bank"
 iv2_ga_ideagroup_adm_16_4_desc: "By establishing a central authority for financial matters, we will have better control over our nation's economy."
 iv2_ga_ideagroup_adm_16_5: "Centralization"
 iv2_ga_ideagroup_adm_16_5_desc: "If we centralize the state then we will find it easier to advance the ideas and agenda of the center over the regions."
 iv2_ga_ideagroup_adm_16_6: "Smithian Economics"
 iv2_ga_ideagroup_adm_16_6_desc: "By opposing mercantilism and restricting the state's influence in economic matters, we shall support a free market that will increase our overall production efficiency."
 iv2_ga_ideagroup_adm_16_7: "Bureaucracy"
 iv2_ga_ideagroup_adm_16_7_desc: "Allows us to increase our tax revenues by adopting a more bureaucratic administrative system governed by state officials."
 
