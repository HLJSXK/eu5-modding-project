 iv2_ideagroup_title_adm_51: "Shiite Ideas"
 iv2_ga_ideagroup_adm_51_1: "Imamah"
 iv2_ga_ideagroup_adm_51_1_desc: "The first Imam always has to be a direct descended of Mohammed."
 iv2_ga_ideagroup_adm_51_2: "The Battle of Kerbala"
 iv2_ga_ideagroup_adm_51_2_desc: "The Battle of Kerbala is a milestone in shiite history after the betrayal of the Kufran people on al Husain."
 iv2_ga_ideagroup_adm_51_3: "Ahl al-bait"
 iv2_ga_ideagroup_adm_51_3_desc: "The once who can count themselves family of the prophet Mohammed varies dependent on the religious school. However both the Umayyads and the Abbasids claimed they were descendants of the prophet."
 iv2_ga_ideagroup_adm_51_4: "Isma"
 iv2_ga_ideagroup_adm_51_4_desc: "The first Imams judgement is absolute and cannot fail."
 iv2_ga_ideagroup_adm_51_5: "Tradition of Religious Schools"
 iv2_ga_ideagroup_adm_51_5_desc: "The shiite faith has many religious schools, making it more diverse at second glance."
 iv2_ga_ideagroup_adm_51_6: "Dschihad"
 iv2_ga_ideagroup_adm_51_6_desc: "The Dschihad is not alien to the shiite faith."
 iv2_ga_ideagroup_adm_51_7: "Spread of the Shia"
 iv2_ga_ideagroup_adm_51_7_desc: "It is very important for shiite faith to reclaim dominance over their rivals."
 
