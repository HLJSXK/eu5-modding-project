 iv2_ideagroup_title_adm_34: "Shinto Ideas"
 iv2_ga_ideagroup_adm_34_1: "Hachiman"
 iv2_ga_ideagroup_adm_34_1_desc: "Also known as Hachiman-shin or Yawata no Kami, he is the god of war and the divine protector of Japan and its people. Originally an agricultural deity, he later became the guardian of the Minamoto clan. His symbolic animal and messenger is the dove."
 iv2_ga_ideagroup_adm_34_2: "Inari Okami"
 iv2_ga_ideagroup_adm_34_2_desc: "The god or goddess of rice and fertility. Their messengers and symbolic animal are foxes."
 iv2_ga_ideagroup_adm_34_3: "Omoikane"
 iv2_ga_ideagroup_adm_34_3_desc: "The deity of wisdom and intelligence, who is always called upon to 'ponder' and give good counsel in the deliberations of the heavenly deities."
 iv2_ga_ideagroup_adm_34_4: "Izanagi-no-Mikoto"
 iv2_ga_ideagroup_adm_34_4_desc: "Izanagi-no-Mikoto is a deity born of the seven divine generations in Japanese mythology and Shinto, and is also referred to in the roughly translated Kojiki as 'male-who-invites' or Izanagi-no-mikoto ('Lord Izanagi'). It is also pronounced Izanagi-no-Okami (The Great God Izanagi)."
 iv2_ga_ideagroup_adm_34_5: "Susanoo-no-Mikoto"
 iv2_ga_ideagroup_adm_34_5_desc: "Alternately romanized as Susano-o, Susa-no-o, and Susanowo. Reportedly called 'Futsushi'. He is the god of storms as well as in some cases the god of the sea. He is also somewhat of a trickster god, as Japanese mythology extensively documents the 'sibling rivalry' between him and Amaterasu. Susanoo also was responsible for the slaying of the monster Yamata no Orochi and the subsequent discovery of the sacred sword Kusanagi."
 iv2_ga_ideagroup_adm_34_6: "Ame-no-Uzume"
 iv2_ga_ideagroup_adm_34_6_desc: "Commonly called Uzume, she is the goddess of dawn and revelry, instrumental to the 'missing sun motif' in Shinto. She is also known as The Great Persuader and The Heavenly Alarming Female."
 iv2_ga_ideagroup_adm_34_7: "Ninigi-no-Mikoto"
 iv2_ga_ideagroup_adm_34_7_desc: "Commonly called Ninigi, he was the grandson of Amaterasu. His great-grandson was Kan'yamato Iwarebiko, later to be known as Emperor Jimmu, first emperor of Japan."

