 iv2_ideagroup_title_adm_18: "Infrastructure Ideas"
 iv2_ga_ideagroup_adm_18_1: "Timber Construction"
 iv2_ga_ideagroup_adm_18_1_desc: "Timber is still our most important building material."
 iv2_ga_ideagroup_adm_18_2: "Expanded Infrastructure Network"
 iv2_ga_ideagroup_adm_18_2_desc: "The road network within our nation is a vital part of our commercial and administrative flourishing. As such, we should care to improve and maintain it."
 iv2_ga_ideagroup_adm_18_3: "Structural Engineer"
 iv2_ga_ideagroup_adm_18_3_desc: "By employing structural engineers we are able to ensure that our buildings dont collapse."
 iv2_ga_ideagroup_adm_18_4: "Efficient Construction Plans"
 iv2_ga_ideagroup_adm_18_4_desc: "Our efficient planning around construction allows us to complete orders of work without cutting any corners."
 iv2_ga_ideagroup_adm_18_5: "Mining Operations"
 iv2_ga_ideagroup_adm_18_5_desc: "Increasing our mining operations will increase our production of needed goods."
 iv2_ga_ideagroup_adm_18_6: "Local Infrastructure Complexes"
 iv2_ga_ideagroup_adm_18_6_desc: "Despite our focus on the country-wide scale of affairs, we must not neglect tending to our local state legislators and bailiffs."
 iv2_ga_ideagroup_adm_18_7: "City Planning"
