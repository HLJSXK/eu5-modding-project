 iv2_ideagroup_title_adm_2: "Humanist Ideas"
 iv2_ga_ideagroup_adm_2_1: "Local Traditions"
 iv2_ga_ideagroup_adm_2_1_desc: "Governing a large nation means ruling over many diverse peoples, each with their own customs and traditions. By incorporating these traditions into our official code of laws we create a happy and loyal populace."
 iv2_ga_ideagroup_adm_2_2: "Cultural Ties"
 iv2_ga_ideagroup_adm_2_2_desc: "Different cultures have different customs, and for some reason tend to resist attempts from above to change said customs. We can turn this weakness into a strength by incorporating local leaders into our system of government and having them carry out our will in a way that is palatable to them."
 iv2_ga_ideagroup_adm_2_3: "Indirect Rule"
 iv2_ga_ideagroup_adm_2_3_desc: "Sometimes the best way to get people to do what you want is to let them believe that they're making their own choices. Such a system of indirect rule will reduce the unrest in newly acquired provinces."
 iv2_ga_ideagroup_adm_2_4: "Humanist Tolerance"
 iv2_ga_ideagroup_adm_2_4_desc: "By striving towards a more tolerant society and making attempts at solving our social and religious problems in more rational ways, the risk of civil disorder will diminish."
 iv2_ga_ideagroup_adm_2_5: "Cultural Ties"
 iv2_ga_ideagroup_adm_2_5_desc: "Different cultures have different customs, and for some reason tend to resist attempts from above to change said customs. We can turn this weakness into a strength by incorporating local leaders into our system of government and having them carry out our will in a way that is palatable to them."
 iv2_ga_ideagroup_adm_2_6: "Tolerance"
 iv2_ga_ideagroup_adm_2_6_desc: "Adopting a more tolerant view towards the minority religions in our country will greatly increase our religious unity."
 iv2_ga_ideagroup_adm_2_7: "Benevolence"
 iv2_ga_ideagroup_adm_2_7_desc: "Our nation is a bastion of tolerance and enlightenment. By ensuring that all other nations know this, we can foster better relations abroad."
 
