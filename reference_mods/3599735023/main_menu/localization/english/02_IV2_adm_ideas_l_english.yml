 iv2_ideagroup_title_adm_52: "Ibadi Ideas"
 iv2_ga_ideagroup_adm_52_1: "Dschābir ibn Zaid"
 iv2_ga_ideagroup_adm_52_1_desc: "This man is the founder of the ibadi religious school and lived in the 7. century bc."
 iv2_ga_ideagroup_adm_52_2: "Desert Origin"
 iv2_ga_ideagroup_adm_52_2_desc: "The Oman region this school originated from is known for their deserts. Thus the ibadi people are hardy people."
 iv2_ga_ideagroup_adm_52_3: "Four Ways of Religion"
 iv2_ga_ideagroup_adm_52_3_desc: "The Ibadi know four ways of religion."
 iv2_ga_ideagroup_adm_52_4: "Emergence"
 iv2_ga_ideagroup_adm_52_4_desc: "Their emergence as an own branch of religious school makes them proud."
 iv2_ga_ideagroup_adm_52_5: "Defence"
 iv2_ga_ideagroup_adm_52_5_desc: "Defending ones beliefs against opponents is of great importance."
 iv2_ga_ideagroup_adm_52_6: "Self Sacrifice"
 iv2_ga_ideagroup_adm_52_6_desc: "The Ibadi will sacrifice themselves for the greater good."
 iv2_ga_ideagroup_adm_52_7: "Secrecy"
 iv2_ga_ideagroup_adm_52_7_desc: "It is important to pick your battles. Only pick those you can win."
 
