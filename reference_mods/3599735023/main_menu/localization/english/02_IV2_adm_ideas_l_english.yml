 iv2_ideagroup_title_adm_35: "Cathar Ideas"
 iv2_ga_ideagroup_adm_35_1: "Women Equal To Me"
 iv2_ga_ideagroup_adm_35_1_desc: "Catharism has been seen as giving women the greatest opportunities for independent action since women were found as being believers as well as Perfecti, who were able to administer the sacrament of the consolamentum. The Cathars believed that one would be repeatedly reincarnated until one commits to the self-denial of the material world, which meant that a man could be reincarnated as a woman and vice versa, thereby rendering gender completely meaningless."
 iv2_ga_ideagroup_adm_35_2: "The Pure People"
 iv2_ga_ideagroup_adm_35_2_desc: "Abstention from all animal food (sometimes exempting fish) was enjoined of the Perfecti. The Perfecti avoided eating anything considered to be a by-product of sexual reproduction."
 iv2_ga_ideagroup_adm_35_3: "Protective Peoples"
 iv2_ga_ideagroup_adm_35_3_desc: "Since Cathars were not prone to killing, they would defend themselves with massive walls."
 iv2_ga_ideagroup_adm_35_4: "Studying of Jesus Christ"
 iv2_ga_ideagroup_adm_35_4_desc: "Cathar ideas came from the other forms of Christianity which came from other cultures."
 iv2_ga_ideagroup_adm_35_5: "Gender Cooperation"
 iv2_ga_ideagroup_adm_35_5_desc: "Both men and women would work together weaving and doing each other's jobs."
 iv2_ga_ideagroup_adm_35_6: "Peaceful People"
 iv2_ga_ideagroup_adm_35_6_desc: "Killing was abhorrent to the Cathars. War and capital punishment were also condemned."
 iv2_ga_ideagroup_adm_35_7: "Educate The Poor"
