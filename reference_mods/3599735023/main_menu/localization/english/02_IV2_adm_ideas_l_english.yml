 iv2_ideagroup_title_adm_1: "Innovativeness Ideas"
 iv2_ga_ideagroup_adm_1_1: "Patron of the Arts"
 iv2_ga_ideagroup_adm_1_1_desc: "Our quest towards a culturally cultivated society begins here. Our artistic wonders will go down in history as the most marvelous of this era."
 iv2_ga_ideagroup_adm_1_2: "Pragmatism"
 iv2_ga_ideagroup_adm_1_2_desc: "Too many countries let the perception of the country shape their policies. That is foolish - if mercenaries are more suitable for our needs, we will use them instead of investing in an expensive standing army."
 iv2_ga_ideagroup_adm_1_3: "Scientific Revolution"
 iv2_ga_ideagroup_adm_1_3_desc: "We should strive towards a social and economic revolution marked by technological inventions and a transfer from an agricultural society into an industrial one."
 iv2_ga_ideagroup_adm_1_4: "Knowledge Transfer"
 iv2_ga_ideagroup_adm_1_4_desc: "Preserving of experience is the most important thing a country can do. We need to ensure that those who serve in combat pass on this knowledge to the younger recruits, through a system of mentoring."
 iv2_ga_ideagroup_adm_1_5: "Early Propaganda"
 iv2_ga_ideagroup_adm_1_5_desc: "By ensuring the support of our populace we can have a more stable country."
 iv2_ga_ideagroup_adm_1_6: "New Ways"
 iv2_ga_ideagroup_adm_1_6_desc: "We will be breaking new grounds and make everyones life better."
 iv2_ga_ideagroup_adm_1_7: "Innovativeness"
 iv2_ga_ideagroup_adm_1_7_desc: "We will encourage innovative thinking and progress."
 
