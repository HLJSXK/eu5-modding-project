 iv2_ideagroup_title_adm_24: "Catholic Ideas"
 iv2_ga_ideagroup_adm_24_1: "Missionary Schools"
 iv2_ga_ideagroup_adm_24_1_desc: "Although there is no shortage of people ready to go out and spread the true faith, most do more harm than good. Specialist schools to train missionaries will ensure we have more people who will not only try spread the faith, but succeed."
 iv2_ga_ideagroup_adm_24_2: "Divine Supremacy"
 iv2_ga_ideagroup_adm_24_2_desc: "It is of utmost importance that we rid our nation and its borders of the infidels pestering our lands."
 iv2_ga_ideagroup_adm_24_3: "Deus Vult"
 iv2_ga_ideagroup_adm_24_3_desc: "Join the battle cry of the Crusades, 'God wills it' and crush the infidels."
 iv2_ga_ideagroup_adm_24_4: "Devoutness"
 iv2_ga_ideagroup_adm_24_4_desc: "Religion is foundation of our authority. When rulers display devotion, the ruled will follow.  Growing piety amongst our people will strengthen our rule."
 iv2_ga_ideagroup_adm_24_5: "Religious Tradition"
 iv2_ga_ideagroup_adm_24_5_desc: "The strength of our faith and public displays of piety and worship are admired in lands near and far. This is reflects the prestige and glory to our realm."
 iv2_ga_ideagroup_adm_24_6: "Religious Authority"
 iv2_ga_ideagroup_adm_24_6_desc: "Our god-given authority amazes everyone. This cements our legitimacy and our influence."
 iv2_ga_ideagroup_adm_24_7: "The Crucifix"
 iv2_ga_ideagroup_adm_24_7_desc: "An army that raises the crucifix of Jesus Christ cannot be defeated!"

