 iv2_ideagroup_title_adm_29: "Tengrism Ideas"
 iv2_ga_ideagroup_adm_29_1: "For the clan!"
 iv2_ga_ideagroup_adm_29_1_desc: "The clan will stay united."
 iv2_ga_ideagroup_adm_29_2: "Tolerant people"
 iv2_ga_ideagroup_adm_29_2_desc: "Our nomadic peoples must be able to tolerate those who don't believe in the true faith."
 iv2_ga_ideagroup_adm_29_3: "Finest Steppe Ponies"
 iv2_ga_ideagroup_adm_29_3_desc: "We have the most hearty and strongest ponies around."
 iv2_ga_ideagroup_adm_29_4: "Nomadic Generals"
 iv2_ga_ideagroup_adm_29_4_desc: "Our generals were born and raised on the steppes."
 iv2_ga_ideagroup_adm_29_5: "Cold Winters"
 iv2_ga_ideagroup_adm_29_5_desc: "Our winters may be cold, but not to us!"
 iv2_ga_ideagroup_adm_29_6: "Steppe Missionaries"
 iv2_ga_ideagroup_adm_29_6_desc: "We sharpen our spears and patch up our vests for the battle of faith."
 iv2_ga_ideagroup_adm_29_7: "The Three Tents"
 iv2_ga_ideagroup_adm_29_7_desc: "The white tent indicated the city and people would be spared if they surrendered, the next day the red tent indicated all males would be killed, and the next day the black tent indicated death and destruction for the city and its population."
 
