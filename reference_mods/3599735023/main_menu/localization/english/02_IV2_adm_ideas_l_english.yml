 iv2_ideagroup_title_adm_47: "Nahuatl Ideas"
 iv2_ga_ideagroup_adm_47_1: "Huitzilopochtli"
 iv2_ga_ideagroup_adm_47_1_desc: "Huitzilopochtli was the main god of the aztecs. He is the god of the sun and war."
 iv2_ga_ideagroup_adm_47_2: "Quetzalcoátl"
 iv2_ga_ideagroup_adm_47_2_desc: "Quetzalcoátl the winged snake. He is the god of wind, heaven, earch and creation. He is said to have left the world with a kanu a long, long time ago."
 iv2_ga_ideagroup_adm_47_3: "Human Sacrifices"
 iv2_ga_ideagroup_adm_47_3_desc: "The human sacrifices by the Aztecs were made on a special sacrificial stone in their temples where the victims were bound and their heart carved out."
 iv2_ga_ideagroup_adm_47_4: "Blood Sacrifices"
 iv2_ga_ideagroup_adm_47_4_desc: "Through blood sacrifices we may appease the gods."
 iv2_ga_ideagroup_adm_47_5: "Sacrifices for Tlaloc"
 iv2_ga_ideagroup_adm_47_5_desc: "For Tlaloc, children were imprisoned and made to cry and then starved to death."
 iv2_ga_ideagroup_adm_47_6: "Mictlan"
 iv2_ga_ideagroup_adm_47_6_desc: "Mictlan is the nine layer Aztec underworld where people go who died a natural death."
 iv2_ga_ideagroup_adm_47_7: "Paradise of Flowers"
 iv2_ga_ideagroup_adm_47_7_desc: "People that died by drowning or were thunderstruck went into the realm of Tlaloc after their demise. The realm of Tlaloc was also known as the paradise of flowers."
 
