 iv2_ideagroup_title_adm_53: "Hussite Ideas"
 iv2_ga_ideagroup_adm_53_1: "The Sacrifice of Jan Hus"
 iv2_ga_ideagroup_adm_53_1_desc: "On 6. of Juli 1415 Jan Hus was burned at the stake condemning the sins of the roman catholic church."
 iv2_ga_ideagroup_adm_53_2: "The Articles of Prague"
 iv2_ga_ideagroup_adm_53_2_desc: "In 1420 the Articles of Prague marks a milestone of the hussite faith. The four liberties proclaimed there are the first spark of the reformation in Europe."
 iv2_ga_ideagroup_adm_53_3: "Calixtines"
 iv2_ga_ideagroup_adm_53_3_desc: "The Calixtines recruited themselves mostly from the poorest of the poor and founded the city of Tabor."
 iv2_ga_ideagroup_adm_53_4: "Taborites"
 iv2_ga_ideagroup_adm_53_4_desc: "The radical Taborites wanted to establish the Kingdom of God on earth with every means possible."
 iv2_ga_ideagroup_adm_53_5: "The Fenstersturz"
 iv2_ga_ideagroup_adm_53_5_desc: "On the 30 of Juli 1419 some Hussite fanatics stormed the city hall of prague and threw some officials out of the windows."
 iv2_ga_ideagroup_adm_53_6: "Counter Crusade"
 iv2_ga_ideagroup_adm_53_6_desc: "Despite the hussites being under constant pressure from several crusades they sometimes managed to go on the offensive."
 iv2_ga_ideagroup_adm_53_7: "Reform Attraction"
 iv2_ga_ideagroup_adm_53_7_desc: "The values and doctrines of the hussite faith did inspire other free thinking individuals."
 
