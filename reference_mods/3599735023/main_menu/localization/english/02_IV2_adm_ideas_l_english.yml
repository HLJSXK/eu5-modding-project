 iv2_ideagroup_title_adm_45: "Zoroastrian Ideas"
 iv2_ga_ideagroup_adm_45_1: "Saoshyant"
 iv2_ga_ideagroup_adm_45_1_desc: "Literally meaning 'the one who brings benefit,' Saoshyant is a prominent figure in Zoroastrianism. Prophesied to bring salvation to humanity and renovation to the world, they will resurrect the dead and battle Angra Manyu in the final battle for this world. As we await his birth, we will make sure that people that follow him will be both worthy and ready in this final struggle."
 iv2_ga_ideagroup_adm_45_2: "Avesta"
 iv2_ga_ideagroup_adm_45_2_desc: "The holy book of Zoroastrianism, the very first avesta was unfortunately lost during the invasion of Alexander the Great. The book is divided into several parts and contains prayers, hymns, invocations and other important information about religion. We should make knowledge of Avesta mandatory, as only people who know are familiar with it can truly guide us"
 iv2_ga_ideagroup_adm_45_3: "Invite Dasturs"
 iv2_ga_ideagroup_adm_45_3_desc: "Dasturs were people with deep religious education. They were upholders and promulgators of the law, translators of the textes to a more simplified versions and judges in religious cases. We would greatly benefit by inviting such people in our court."
 iv2_ga_ideagroup_adm_45_4: "Reform the Priesthood"
 iv2_ga_ideagroup_adm_45_4_desc: "The priests, 'modebds' are the ones that serve in the temple. Since ancient times, these priests also held temples and were able to extert significant influence in politics or other state affairs. By reforming the priesthood by outlawing them all these privileges, we will ensure that the mobads will be ocuppied dealing with religious matters and will not try to engage in affairs of the state."
 iv2_ga_ideagroup_adm_45_5: "The Holy Flame"
 iv2_ga_ideagroup_adm_45_5_desc: "For centuries our people have endured - We witnessed as our own kind were converted, our houses destroyed and our temples were turned into rubble. As we rise once again, the followers of Angra Mainyu will surely come after us again. We must make sure that our people are ready and motivated - These flames will no longer be extinguished!"
 iv2_ga_ideagroup_adm_45_6: "Religious Education"
 iv2_ga_ideagroup_adm_45_6_desc: "Taking the first footstep with a good thought, the second with a good word and the third with a good deed, I entered Paradise - The prophets words have influenced lives of common people since ancient times. By bringing back religious education, we will make sure that people are well acquainted with the teachings, practises and important rules of Zoroastrianism."
 iv2_ga_ideagroup_adm_45_7: "Trade and Religion"
 iv2_ga_ideagroup_adm_45_7_desc: "One of the easiest ways of spreading religion was by trade. Merchants would also bring their ideas and religions with them in foreign countries and the countries that traded with each other also exchanged these two things without their 'official' approval."
 
