 iv2_ideagroup_title_adm_17: "Administrative Ideas"
 iv2_ga_ideagroup_adm_17_1: "Administrative Efficiency"
 iv2_ga_ideagroup_adm_17_1_desc: "The most important part of any government is getting the right advice. We must ensure that we are as inclusive as possible when it comes to advisors so we can maximize the number of different viewpoints we are presented with."
 iv2_ga_ideagroup_adm_17_2: "Structures"
 iv2_ga_ideagroup_adm_17_2_desc: "State Structures will enable us to react to crisis more swiftly."
 iv2_ga_ideagroup_adm_17_3: "Efficient Process"
 iv2_ga_ideagroup_adm_17_3_desc: "By making our processes more efficient we also enable us to integrate new processes in our thinking more swiftly."
 iv2_ga_ideagroup_adm_17_4: "Resilient State"
 iv2_ga_ideagroup_adm_17_4_desc: "Every state faces down times. This is when the discontented or the excluded feel it is time to rebel. If we build up an administration that is resilient in the face of these upsets, we will be able to recover much quicker from this sad state of affairs."
 iv2_ga_ideagroup_adm_17_5: "Bookkeeping"
 iv2_ga_ideagroup_adm_17_5_desc: "Sometimes money is short and we need to borrow. Lenders always worry that they will not be paid back. By maintaining meticulous records, we will be able to ensure that everyone gets paid and that will allow us to negotiate lower rates of interest."
 iv2_ga_ideagroup_adm_17_6: "Centralization"
 iv2_ga_ideagroup_adm_17_6_desc: "If we centralize the state then we will find it easier to advance the ideas and agenda of the center over the regions."
 iv2_ga_ideagroup_adm_17_7: "War Cabinet"
 iv2_ga_ideagroup_adm_17_7_desc: "Warfare is when the country is at its most vulnerable, the stresses of wars can seriously undermine the ability to rule. By ensuring that key players are involved during time of warfare we can avoid these stresses."
 
