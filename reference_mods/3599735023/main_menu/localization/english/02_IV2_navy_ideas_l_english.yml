 iv2_ideagroup_title_navy_6: "Exploration Ideas"
 iv2_ga_ideagroup_navy_6_1: "Colonial Ventures"
 iv2_ga_ideagroup_navy_6_1_desc: "Allows us to send more colonists to unexplored areas."
 iv2_ga_ideagroup_navy_6_2: "Search for the New World"
 iv2_ga_ideagroup_navy_6_2_desc: "Allows us to enter the competition between exploring nations to explore areas beyond their borders in order to be the first country on Earth to circumnavigate the globe in search of the New World."
 iv2_ga_ideagroup_navy_6_3: " Exploration of Overseas Territories"
 iv2_ga_ideagroup_navy_6_3_desc: "The journey overseas is usually a journey of no return. For those who do not fall victim to disease are usually deterred from returning home by the long voyage. If we remind people of the riches that may await them, we may be able to encourage them to emigrate."
 iv2_ga_ideagroup_navy_6_4: "Land of opportunity"
 iv2_ga_ideagroup_navy_6_4_desc: "By portraying colonies as virgin territories where every man, and perhaps some women, can become wealthy, people will be more inclined to emigrate to the colonies. This means we will have to spend less money to persuade people to do so."
 iv2_ga_ideagroup_navy_6_5: "Vice-Kings"
 iv2_ga_ideagroup_navy_6_5_desc: "Vice-Kings in our colonies allow us to govern more efficiently. This improves the administration of our colonies and increases the revenue they generate."
 iv2_ga_ideagroup_navy_6_6: "Free Colonies"
 iv2_ga_ideagroup_navy_6_6_desc: "Unfortunately, the number of people willing to expand our great colonial empire is not unlimited. The promise of a piece of land overseas could remedy this situation. Perhaps more people would seek their fortune overseas. And the best thing about it is that there is now really enough land in the colonies."
 iv2_ga_ideagroup_navy_6_7: "Global Empire"
 iv2_ga_ideagroup_navy_6_7_desc: "Our colonial involvement has led to a change in attitude among the administrators of the colonies. They are no longer a gathering place for cutthroats with a penchant for profit maximisation, but rather the talented crème de la crème of society. This progress is also reflected in tax revenues."
 
