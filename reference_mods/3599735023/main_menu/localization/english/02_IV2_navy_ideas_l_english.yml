 iv2_ideagroup_title_navy_2: "Fleet Base Ideas"
 iv2_ga_ideagroup_navy_2_1: "Base Capture"
 iv2_ga_ideagroup_navy_2_1_desc: "As a seafaring nation, we have a great need for naval bases. \n§GKriegsgrund§W against all coastal provinces of non-primitive nations within colonial reach."
 iv2_ga_ideagroup_navy_2_2: "Necessity of Overseas Bases"
 iv2_ga_ideagroup_navy_2_2_desc: "Having a base nearby always increases the survivability of our ships and crews."
 iv2_ga_ideagroup_navy_2_3: "Garrison Fleet"
 iv2_ga_ideagroup_navy_2_3_desc: "A small, albeit insignificant, fleet protecting our bases can prove very effective."
 iv2_ga_ideagroup_navy_2_4: "Base Garrison"
 iv2_ga_ideagroup_navy_2_4_desc: "We need a large number of sailors and soldiers to man our bases."
 iv2_ga_ideagroup_navy_2_5: "Experienced Sailors"
 iv2_ga_ideagroup_navy_2_5_desc: "Our numerous bases attract experienced sailors whom we can hire."
 iv2_ga_ideagroup_navy_2_6: "Sea to land combat"
 iv2_ga_ideagroup_navy_2_6_desc: "If it becomes necessary to capture a base, it makes sense to start by bombarding the defences from the sea."
 iv2_ga_ideagroup_navy_2_7: "Overseas shipyards"
 iv2_ga_ideagroup_navy_2_7_desc: "Repairing ships is important and difficult. Having experts overseas can only prove to be a brilliant idea."
 
