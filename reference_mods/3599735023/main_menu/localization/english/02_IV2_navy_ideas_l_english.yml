 iv2_ideagroup_title_navy_12: "Marine Infantry Ideas"
 iv2_ga_ideagroup_navy_12_1: "Marine Corps"
 iv2_ga_ideagroup_navy_12_1_desc: "Specially trained marines who are trained to fight at sea and on land have a great advantage when we want to attack the enemy overseas."
 iv2_ga_ideagroup_navy_12_2: "Overseas Operations"
 iv2_ga_ideagroup_navy_12_2_desc: "Supplying and effectively commanding an army overseas presents us with many challenges."
 iv2_ga_ideagroup_navy_12_3: "Naval Logistics"
 iv2_ga_ideagroup_navy_12_3_desc: "Sometimes the only way to supply an army overseas is by sea. Our navy must be equipped for this."
 iv2_ga_ideagroup_navy_12_4: "Supply Convoys"
 iv2_ga_ideagroup_navy_12_4_desc: "Convoys carrying fresh soldiers must be protected as best as possible so that they reach their destination."
 iv2_ga_ideagroup_navy_12_5: "Dry Powder"
 iv2_ga_ideagroup_navy_12_5_desc: "Transporting artillery is just as important as transporting infantry. We must ensure that valuable goods arrive at their destination in one piece and that the powder stays dry."
 iv2_ga_ideagroup_navy_12_6: "Divided Command"
 iv2_ga_ideagroup_navy_12_6_desc: "Marines must obey both the navy and the army, depending on their commander-in-chief."
 iv2_ga_ideagroup_navy_12_7: "Tough Men"
 iv2_ga_ideagroup_navy_12_7_desc: "It is important that our marines earn a reputation that makes them known throughout the world."
 
