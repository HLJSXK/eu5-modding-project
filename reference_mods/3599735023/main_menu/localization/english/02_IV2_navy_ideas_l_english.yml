l_english:
 iv2_ideagroup_title_navy_1: "Maritime Trade Ideas"
 iv2_ga_ideagroup_navy_1_1: "Overseas Trade"
 iv2_ga_ideagroup_navy_1_1_desc: "The longer the journey, the more profitable it is likely to be."
 iv2_ga_ideagroup_navy_1_2: "Overseas Trading Posts"
 iv2_ga_ideagroup_navy_1_2_desc: "By establishing possessions far overseas in foreign lands, we can extend our trading influence far beyond our borders."
 iv2_ga_ideagroup_navy_1_3: "Storm Sails"
 iv2_ga_ideagroup_navy_1_3_desc: "We must ensure that each of our merchant ships has storm sails on board."
 iv2_ga_ideagroup_navy_1_4: "Skilled Sailors"
 iv2_ga_ideagroup_navy_1_4_desc: "As a nation that maintains many merchant ships, our sailors are also experienced and among the best in the world."
 iv2_ga_ideagroup_navy_1_5: "Promising Captains"
 iv2_ga_ideagroup_navy_1_5_desc: "We must recruit the best captains from our merchant ships for our navy."
 iv2_ga_ideagroup_navy_1_6: "Unlimited Sailors"
 iv2_ga_ideagroup_navy_1_6_desc: "Thanks to our flourishing maritime trade, we never lack sailors. If necessary, we conscript them."
 iv2_ga_ideagroup_navy_1_7: "Fair non-commissioned officers"
 iv2_ga_ideagroup_navy_1_7_desc: "Fair non-commissioned officers set the tone on board and have prevented many a mutiny."
 
