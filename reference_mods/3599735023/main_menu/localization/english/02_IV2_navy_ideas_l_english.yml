 iv2_ideagroup_title_navy_4: "Maritime Infrastructure Ideas"
 iv2_ga_ideagroup_navy_4_1: "Organised Production"
 iv2_ga_ideagroup_navy_4_1_desc: "We organise the production of important supplies for our navy and locate the production buildings close to our ports."
 iv2_ga_ideagroup_navy_4_2: "Timber Industry"
 iv2_ga_ideagroup_navy_4_2_desc: "We need a timber industry capable of supplying sufficient materials for a large fleet."
 iv2_ga_ideagroup_navy_4_3: "Tree Planting"
 iv2_ga_ideagroup_navy_4_3_desc: "We cut down many trees for our ships. Replanting the right trees will prove very valuable in the future and does not cost us much."
 iv2_ga_ideagroup_navy_4_4: "State Shipwrights"
 iv2_ga_ideagroup_navy_4_4_desc: "By hiring a large number of shipwrights for our shipyards, we can build ships quickly."
 iv2_ga_ideagroup_navy_4_5: "Industrial Shipbuilding"
 iv2_ga_ideagroup_navy_4_5_desc: "If we coordinate our production perfectly, we can build ships at an incredible speed."
 iv2_ga_ideagroup_navy_4_6: "Production Line"
 iv2_ga_ideagroup_navy_4_6_desc: "If we coordinate our production lines perfectly, we will never run out of building materials."
 iv2_ga_ideagroup_navy_4_7: "Large Warehouses"
 iv2_ga_ideagroup_navy_4_7_desc: "By maintaining large stocks of building materials and spare parts, we can repair our ships quickly or respond to losses with new constructions."
 
