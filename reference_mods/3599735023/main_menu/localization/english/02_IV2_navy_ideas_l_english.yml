 iv2_ideagroup_title_navy_3: "Maritime Ideas"
 iv2_ga_ideagroup_navy_3_1: "Copper Hulls"
 iv2_ga_ideagroup_navy_3_1_desc: "Wood may be the ideal material for shipbuilding, but it tends to rot over time. By fitting our ships with copper fittings below the waterline, we can counteract this decay, which in turn allows for longer voyages."
 iv2_ga_ideagroup_navy_3_2: "Corvettes"
 iv2_ga_ideagroup_navy_3_2_desc: "Corvettes were a class of small warships used to escort allied ships and disrupt the enemy. Their strength lay not in massive firepower, but in speed and manoeuvrability."
 iv2_ga_ideagroup_navy_3_3: "National Arsenal"
 iv2_ga_ideagroup_navy_3_3_desc: "By establishing a national arsenal to build and maintain our warships to uniform standards, we can build a larger fleet."
 iv2_ga_ideagroup_navy_3_4: "Expanded Supply Trains"
 iv2_ga_ideagroup_navy_3_4_desc: "By investing more resources in our supply trains, our army can spend more time in enemy territory."
 iv2_ga_ideagroup_navy_3_5: "Oak for Shipbuilding"
 iv2_ga_ideagroup_navy_3_5_desc: "The more our ships can withstand, the more they can dish out. We must ensure that our warships always have a supply of the best oak wood in stock."
 iv2_ga_ideagroup_navy_3_6: "Fleet Drill"
 iv2_ga_ideagroup_navy_3_6_desc: "In the chaos of a naval battle, a warship may be incapacitated for a long period of time. A well-drilled crew will be able to resume operations much faster than an average crew."
 iv2_ga_ideagroup_navy_3_7: "Merchant Fleet"
 iv2_ga_ideagroup_navy_3_7_desc: "Let all merchant ships proudly fly our merchant flag, safe in the knowledge that our fleet will protect them if they are in distress."
 
