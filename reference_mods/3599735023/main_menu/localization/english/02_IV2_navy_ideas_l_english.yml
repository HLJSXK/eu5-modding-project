 iv2_ideagroup_title_navy_14: "Merchant Fleet Ideas"
 iv2_ga_ideagroup_navy_14_1: "Merchant Navy"
 iv2_ga_ideagroup_navy_14_1_desc: "A large merchant navy not only brings us prosperity, but also a strong presence on the world's oceans."
 iv2_ga_ideagroup_navy_14_2: "Trading Posts"
 iv2_ga_ideagroup_navy_14_2_desc: "We maintain many trading posts in foreign countries."
 iv2_ga_ideagroup_navy_14_3: "Colonial Trade"
 iv2_ga_ideagroup_navy_14_3_desc: "Trade with the colonies is an important source of income for our merchants."
 iv2_ga_ideagroup_navy_14_4: "Silver Fleets"
 iv2_ga_ideagroup_navy_14_4_desc: "Is it a matter of escorting the silver fleets or raiding them? Depending on the world situation, of course."
 iv2_ga_ideagroup_navy_14_5: "Armed Merchant Fleet"
 iv2_ga_ideagroup_navy_14_5_desc: "Our merchant ships are armed to the teeth to deter pirates."
 iv2_ga_ideagroup_navy_14_6: "Dual Purpose"
