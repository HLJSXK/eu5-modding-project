 iv2_ideagroup_title_navy_11: "Admiralty Ideas"
 iv2_ga_ideagroup_navy_11_1: "Admiralty"
 iv2_ga_ideagroup_navy_11_1_desc: "We have institutionalised the leadership of our captains and established an admiralty."
 iv2_ga_ideagroup_navy_11_2: "Promotion Boards"
 iv2_ga_ideagroup_navy_11_2_desc: "Promotion boards ensure that the right people are promoted, not just those with the best connections."
 iv2_ga_ideagroup_navy_11_3: "Logbooks"
 iv2_ga_ideagroup_navy_11_3_desc: "We require our captains to keep logbooks so that we can monitor their effectiveness at all times."
 iv2_ga_ideagroup_navy_11_4: "Inspector Generals"
 iv2_ga_ideagroup_navy_11_4_desc: "The Admiralty is able to send Inspector Generals wherever our navy is active."
 iv2_ga_ideagroup_navy_11_5: "Institutionalised Training"
 iv2_ga_ideagroup_navy_11_5_desc: "By standardising the training of our officer cadets, we ensure that the fleet's capabilities remain at a high level."
 iv2_ga_ideagroup_navy_11_6: "Regional Commanders"
 iv2_ga_ideagroup_navy_11_6_desc: "When our fleet is operating in many different regions, regional commanders must be deployed to keep the chain of command short."
 iv2_ga_ideagroup_navy_11_7: "Rotation Principle"
 iv2_ga_ideagroup_navy_11_7_desc: "After a while, even the toughest sea dogs get worn out by life at sea. We need to set up a rotation system that gives our captains and crews longer breaks back home."
 
