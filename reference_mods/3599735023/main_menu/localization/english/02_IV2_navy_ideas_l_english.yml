 iv2_ideagroup_title_navy_7: "Heavy Ship Focus"
 iv2_ga_ideagroup_navy_7_1: "Large Shipyards"
 iv2_ga_ideagroup_navy_7_1_desc: "The state maintains its own shipyards in order to finance its fleet construction programme at favourable prices."
 iv2_ga_ideagroup_navy_7_2: "Oak for Shipbuilding"
 iv2_ga_ideagroup_navy_7_2_desc: "The more our ships can withstand, the more they can dish out. We must ensure that we always have a supply of the best oak wood in stock for our warships."
 iv2_ga_ideagroup_navy_7_3: "Mass production"
 iv2_ga_ideagroup_navy_7_3_desc: "We are doing everything we can to shorten the construction times of our large ships."
 iv2_ga_ideagroup_navy_7_4: "Ship Artillery"
 iv2_ga_ideagroup_navy_7_4_desc: "We can use our ships' artillery to support sieges on land."
 iv2_ga_ideagroup_navy_7_5: "Double Hulls"
 iv2_ga_ideagroup_navy_7_5_desc: "Double-reinforced hulls make our ships much more robust."
 iv2_ga_ideagroup_navy_7_6: "Winter harbour"
 iv2_ga_ideagroup_navy_7_6_desc: "We ensure that our ships are safely moored in the harbour at all times of the year. Because winter is approaching."
 iv2_ga_ideagroup_navy_7_7: "Fleet Cadets"
 iv2_ga_ideagroup_navy_7_7_desc: "If we can sell the fleet as a great career to the second and third sons of the nobility, we can establish a professional corps of fleet officers to lead our gun crews."
 
