 iv2_ideagroup_title_navy_13: "Presence Fleet Ideas"
 iv2_ga_ideagroup_navy_13_1: "Squadron"
 iv2_ga_ideagroup_navy_13_1_desc: "We want to have a squadron in every corner of the world."
 iv2_ga_ideagroup_navy_13_2: "Presence Fleet Idea"
 iv2_ga_ideagroup_navy_13_2_desc: "By maintaining a strong fleet, we prevent our enemies from even thinking about attacking us."
 iv2_ga_ideagroup_navy_13_3: "Strategic influence"
 iv2_ga_ideagroup_navy_13_3_desc: "By maintaining our fleet as a deterrent, we gain influence in all kinds of areas."
 iv2_ga_ideagroup_navy_13_4: "Ready to sail at any time"
 iv2_ga_ideagroup_navy_13_4_desc: "By being able to deploy our fleet at any time to engage the enemy, we put them under intense psychological pressure."
 iv2_ga_ideagroup_navy_13_5: "Deterrence"
 iv2_ga_ideagroup_navy_13_5_desc: "We can deter the enemy with our large fleet. This makes our coasts safer, even though our fleet is in port."
 iv2_ga_ideagroup_navy_13_6: "Maintaining Strength"
 iv2_ga_ideagroup_navy_13_6_desc: "By trying to avoid major battles through deterrence, we can usually avoid heavy losses."
 iv2_ga_ideagroup_navy_13_7: "Decisive Battle"
 iv2_ga_ideagroup_navy_13_7_desc: "If all else fails, we can still face a decisive battle with our large fleet!"
 
