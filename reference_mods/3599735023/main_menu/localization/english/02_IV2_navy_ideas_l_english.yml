 iv2_ideagroup_title_navy_15: "Boarding Ideas"
 iv2_ga_ideagroup_navy_15_1: "Firefighting Water"
 iv2_ga_ideagroup_navy_15_1_desc: "Fire at sea is deadly. Firefighting water must always be ready, even if we want to capture an enemy ship."
 iv2_ga_ideagroup_navy_15_2: "Improved Rams"
 iv2_ga_ideagroup_navy_15_2_desc: "The concept of equipping warships with rams is thousands of years old. Since then, however, metallurgy has made great strides, and we should use it to construct more solid rams."
 iv2_ga_ideagroup_navy_15_3: "Boarding Parties"
 iv2_ga_ideagroup_navy_15_3_desc: "By teaching our naval officers to carry out boarding operations against enemy ships, we can gain an advantage in naval battles, even when fighting against superior enemy fleets."
 iv2_ga_ideagroup_navy_15_4: "Saber Combat"
 iv2_ga_ideagroup_navy_15_4_desc: "The sabre is an excellent weapon for boarding combat."
 iv2_ga_ideagroup_navy_15_5: "Small-calibre weapons"
 iv2_ga_ideagroup_navy_15_5_desc: "Small-calibre pistols and smaller rifles are easy to handle and deadly in boarding combat."
 iv2_ga_ideagroup_navy_15_6: "Hull crew"
 iv2_ga_ideagroup_navy_15_6_desc: "Once a ship has been captured, the crew must be able to provide a hull crew to take over the new ship."
 iv2_ga_ideagroup_navy_15_7: "Aim for the Captain!"
 iv2_ga_ideagroup_navy_15_7_desc: "If the captain is captured or killed, the boarding is usually successful."
 
