 iv2_ideagroup_title_navy_5: "Coastal Patrol Ideas"
 iv2_ga_ideagroup_navy_5_1: "Maritime Surveillance"
 iv2_ga_ideagroup_navy_5_1_desc: "It is important to monitor our waters and protect them from pirates."
 iv2_ga_ideagroup_navy_5_2: "Beacons"
 iv2_ga_ideagroup_navy_5_2_desc: "We will install beacons along our coastline to quickly warn our population of attackers."
 iv2_ga_ideagroup_navy_5_3: "Coastal Ports"
 iv2_ga_ideagroup_navy_5_3_desc: "By maintaining many small harbours along our coastline, we will not only strengthen our fishing industry, but also improve the surveillance of our waters."
 iv2_ga_ideagroup_navy_5_4: "Coastal Fortifications"
 iv2_ga_ideagroup_navy_5_4_desc: "Just a few batteries can be enough to make an attack very risky and unattractive."
 iv2_ga_ideagroup_navy_5_5: "Regular Patrols"
 iv2_ga_ideagroup_navy_5_5_desc: "Regular patrols along our coastline strengthen trade and provide security for our merchants."
 iv2_ga_ideagroup_navy_5_6: "Pirate Courts"
 iv2_ga_ideagroup_navy_5_6_desc: "If we catch pirates, we make short work of them."
 iv2_ga_ideagroup_navy_5_7: "Attacks on Pirate Nests"
 iv2_ga_ideagroup_navy_5_7_desc: "When we locate pirate nests, we bring our full power to bear to wipe them out."
 
