 game_concept_iv2_mod: "Idea Variation 2"
 game_concept_iv2_mod_desc: "Idea Variation 2 adds an Europa Universalis IV style idea system to the game."
 
 game_concept_iv2_researcher: "Researcher"
 game_concept_iv2_researcher_desc: "Researchers are added by the [iv2_mod|e] as a special agent type. They will generate [iv2_innovation_points|e] depending on their [iv2_researcher_skill|e], while costing [iv2_researcher_upkeep|e] each month."
 
 game_concept_iv2_researchers: "Researchers"
 game_concept_iv2_researchers_desc: "$game_concept_iv2_researcher_desc$"
 
 game_concept_iv2_researcher_skill: "Researcher Skill"
 game_concept_iv2_researcher_skill_desc: "The speed of which innovation points are calculated from Researchers are as follows:\n( (Adm Ability + Dip Ability + Mil Ability) / 2) + (Dominant Ability for researching Category) * 0.015 \nTheir [iv2_researcher_upkeep|e] depends on their skill."
 
 game_concept_iv2_researcher_upkeep: "Researcher Upkeep"
 game_concept_iv2_researcher_upkeep_desc: "Researcher Upkeep is calculated as follows:\n( ( Number of researched Advances * Dominant Ability of Researcher) + Economical Base of [Player.GetNameWithNoTooltip] ) * ( Number of Researched Advances * 0.05 ) * 0.00007 * Upkeep Spending Percentage"
 
 game_concept_iv2_researcher_adm: "Administrative Researcher"
 game_concept_iv2_researcher_adm_desc: "Administrative Researchers will greatly contribute to the Administrative Innovation Points generated for your country."
 game_concept_iv2_researcher_dip: "Diplomatic Researcher"
 game_concept_iv2_researcher_dip_desc: "Diplomatic Researchers will greatly contribute to the Diplomatic Innovation Points generated for your country."
 game_concept_iv2_researcher_army: "Army Researcher"
 game_concept_iv2_researcher_army_desc: "Army Researchers will greatly contribute to the Army Innovation Points generated for your country."
 game_concept_iv2_researcher_navy: "Navy Researcher"
 game_concept_iv2_researcher_navy_desc: "Navy Researchers will greatly contribute to the Navy Innovation Points generated for your country."
 
 game_concept_iv2_gc_innovation_adm: "Administrative Innovation Points"
 game_concept_iv2_gc_innovation_adm_desc: "Administrative Innovation Points are used to unlock new Administrative Idea Groups and to buy new Administrative Ideas."
 game_concept_iv2_gc_innovation_dip: "Diplomatic Innovation Points"
 game_concept_iv2_gc_innovation_dip_desc: "Diplomatic Innovation Points are used to unlock new Diplomatic Idea Groups and to buy new Diplomatic Ideas."
 game_concept_iv2_gc_innovation_army: "Army Innovation Points"
 game_concept_iv2_gc_innovation_army_desc: "Army Innovation Points are used to unlock new Army Idea Groups and to buy new Army Ideas."
 game_concept_iv2_gc_innovation_navy: "Navy Innovation Points"
 game_concept_iv2_gc_innovation_navy_desc: "Navy Innovation Points are used to unlock new Navy Idea Groups and to buy new Navy Ideas."
 
 game_concept_iv2_gc_innovation_max_adm: "Maximum Administrative Innovation Points"
 game_concept_iv2_gc_innovation_max_adm_desc: "Only a certain number of [iv2_gc_innovation_adm|e] can be stored. You can increase the maximum number of points in the game options."
 game_concept_iv2_gc_innovation_max_dip: "Maximum Diplomatic Innovation Points"
 game_concept_iv2_gc_innovation_max_dip_desc: "Only a certain number of [iv2_gc_innovation_dip|e] can be stored. You can increase the maximum number of points in the game options."
