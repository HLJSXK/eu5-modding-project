 game_concept_iv2_gc_idea_group_limit_adm: "Limit"
 game_concept_iv2_gc_idea_group_limit_adm_desc: "The hard Idea Group limit can be increased or decreased in the game options. You can unlock new Idea Group Slots by spending [iv2_gc_innovation_adm|e]."
 game_concept_iv2_gc_idea_group_limit_dip: "Limit"
 game_concept_iv2_gc_idea_group_limit_dip_desc: "The hard Idea Group limit can be increased or decreased in the game options. You can unlock new Idea Group Slots by spending [iv2_gc_innovation_dip|e]."
