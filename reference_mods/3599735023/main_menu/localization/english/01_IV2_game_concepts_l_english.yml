 game_concept_iv2_gc_progress_adm: "Administrative Progress"
 game_concept_iv2_gc_progress_adm_desc: "Administrative Progress is gained by high [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [prestige|e] and [iv2_researcher_adm|e]. It is needed to unlock [iv2_gc_idea_group_adm|e], [iv2_gc_tradition_adm|e] and [iv2_gc_national_idea_adm|e]."
 game_concept_iv2_gc_progress_dip: "Diplomatic Progress"
 game_concept_iv2_gc_progress_dip_desc: "Diplomatic Progress is gained by high [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [prestige|e] and [iv2_researcher_dip|e]. It is needed to unlock [iv2_gc_idea_group_dip|e], [iv2_gc_tradition_dip|e] and [iv2_gc_national_idea_dip|e]."
 game_concept_iv2_gc_progress_army: "Army Progress"
 game_concept_iv2_gc_progress_army_desc: "Diplomatic Progress is gained by high [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [army_tradition|e], by being at [war|e] and [iv2_researcher_army|e]. It is needed to unlock [iv2_gc_idea_group_army|e], [iv2_gc_tradition_army|e] and [iv2_gc_national_idea_army|e]."
 game_concept_iv2_gc_progress_navy: "Navy Progress"
 game_concept_iv2_gc_progress_navy_desc: "Diplomatic Progress is gained by high [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [navy_tradition|e], by being at [war|e] while having a Navy and [iv2_researcher_navy|e]. It is needed to unlock [iv2_gc_idea_group_navy|e], [iv2_gc_tradition_navy|e] and [iv2_gc_national_idea_navy|e]."
 
 
