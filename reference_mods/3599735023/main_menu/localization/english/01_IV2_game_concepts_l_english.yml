 game_concept_iv2_innovation_points: "Innovation Points"
 game_concept_iv2_innovation_points_desc: "Innovation Points are added by [iv2_mod|e]. There are four different categories, Administrative, Diplomatic, Military and Navy Innovation points that are used to unlock their respective Ideagroups and Ideas."
 
 game_concept_iv2_gc_idea_groups_adm: "Administrative Idea Groups"
 game_concept_iv2_gc_idea_groups_adm_desc: "Administrative Idea Groups will give bonuses related to the inner state management of countries."
