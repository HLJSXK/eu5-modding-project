l_german:
 iv2_ideagroup_title_dip_1: "Spionage Idee"
 iv2_ga_ideagroup_dip_1_1: "Effiziente Spione"
 iv2_ga_ideagroup_dip_1_1_desc: "Die meisten Bauern würden ihre Mutter für ein wenig Bares verkaufen, aber Talente, die etwas wirklich Nützliches zu Wege bringen, sind nicht so leicht zu finden. Durch Erfahrung lernen wir, die Spreu vom Weizen zu trennen."
 iv2_ga_ideagroup_dip_1_2: "Kolportage-Attacke"
 iv2_ga_ideagroup_dip_1_2_desc: "Der Feind ist an allen Fronten verletzlich. Gift, das ins richtige Ohr geträufelt wird, kann ebenso tödlich sein wie eine Armee aus zehntausend Soldaten. Wenn wir erfolgreich sein wollen, so dürfen wir vor keinem finsteren Kunstgriff zurückschrecken."
 iv2_ga_ideagroup_dip_1_3: "Sicherheitsüberprüfungen"
 iv2_ga_ideagroup_dip_1_3_desc: "Mit so vielen Stellen für Profit finden wir manchmal, dass jene, die unsere Administration führen, für die Bestechungen anderer Mächte anfällig sind. Einige einfache Hintergrundüberprüfungen werden die offensichtlichsten ausschalten."
 iv2_ga_ideagroup_dip_1_4: "Freibeuter"
 iv2_ga_ideagroup_dip_1_4_desc: "Der Krieg gegen die Wirtschaftskraft des Feindes ist der Scheitelpunkt der ersten Triade des Sieges. Wir werden grimmige Seebären zur Plünderung der feindlichen Handelsrouten aufrufen."
 iv2_ga_ideagroup_dip_1_5: "Dubiose Rekrutierung"
 iv2_ga_ideagroup_dip_1_5_desc: "Unsere Helfer entstammen Schichten, die sich so nah am Bodensatz der Gesellschaft befinden, dass die meisten gar nicht glauben können, dass sie diese Dinge in unserem Auftrag getan haben. Wunderbar!"
 iv2_ga_ideagroup_dip_1_6: "Destabilisierungsaktion"
 iv2_ga_ideagroup_dip_1_6_desc: "Unsere Spionagefähigkeiten ermöglichen es uns, direkt auf die Stabilität unserer Feinde zu zielen. Wir können dafür sorgen, dass aus besten Freunden Feinde werden."
 iv2_ga_ideagroup_dip_1_7: "Effektive Gegenspionage"
 iv2_ga_ideagroup_dip_1_7_desc: "Durch unsere eigenen Aktionen lernen wir auch bei unseren Gegenspionageaktionen vorsichtig und effektiv zu sein."
 
