 iv2_ideagroup_title_dip_15: "Vertragsverhandlungsideen"
 iv2_ga_ideagroup_dip_15_1: "Rechtstexte"
 iv2_ga_ideagroup_dip_15_1_desc: "Durch das studieren alter Rechtstexte und das Verständnis der alten Rechtsordnungen können wir fairere Vereinbarungen für alle treffen, oder manchmal auch einfach nur zu unserem Vorteil!"
 iv2_ga_ideagroup_dip_15_2: "Pacta sunt servanda"
 iv2_ga_ideagroup_dip_15_2_desc: "Verträge müssen eingehalten werden, wussten schon den Römer. Tut man es nicht, macht man sich in der Zukunft angreifbar."
 iv2_ga_ideagroup_dip_15_3: "Essentialia negotii"
 iv2_ga_ideagroup_dip_15_3_desc: "Die wesentlichen Bestandteile eines Geschäfts oder einer sonstigen Vereinbarungen sollten stets schriftlich festgehalten werden."
 iv2_ga_ideagroup_dip_15_4: "Zivile Spruchkörper"
 iv2_ga_ideagroup_dip_15_4_desc: "Es lohnt sich eine gewisse Anzahl ziviler Spruchkörper zu unterhalten, die dem Recht in unserem Land Geltung verschaffen."
 iv2_ga_ideagroup_dip_15_5: "Gegenseitiges Vertrauen"
 iv2_ga_ideagroup_dip_15_5_desc: "Unsere Rechtstreue nach innen, wird auch das Vertrauen nach außen stärken."
 iv2_ga_ideagroup_dip_15_6: "Langjährige Partner"
 iv2_ga_ideagroup_dip_15_6_desc: "Partnerschaften über viele Jahre stärkt das gegenseitige Vertrauen."
 iv2_ga_ideagroup_dip_15_7: "Protestnote"
 iv2_ga_ideagroup_dip_15_7_desc: "Sollten einmal unserer Vertragspartner gegen eine Vereinbarung verstoßen, so können wir ihm eine gepfefferte Protestnote übersenden, bevor es zu Feindseligkeiten kommen muss."
 
