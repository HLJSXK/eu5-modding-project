 iv2_ideagroup_title_dip_12: "Imperialismus Ideen"
 iv2_ga_ideagroup_dip_12_1: "Das Recht des Stärkeren"
 iv2_ga_ideagroup_dip_12_1_desc: "Durch das Recht des Stärkeren haben wir jede Berechtigung, fremde Lande dem unsrigen anzuschließen."
 iv2_ga_ideagroup_dip_12_2: "Lange Tradition"
 iv2_ga_ideagroup_dip_12_2_desc: "Unser Land hat eine lange Tradition, wir wissen sie zu unserem Vorteil einzusetzen."
 iv2_ga_ideagroup_dip_12_3: "Glanzvolle Vergangenheit"
 iv2_ga_ideagroup_dip_12_3_desc: "Unsere glanzvolle Vergangenheit, hilft uns immer den Schein der Großartigkeit zu behalten."
 iv2_ga_ideagroup_dip_12_4: "Erhöhte Steuern"
 iv2_ga_ideagroup_dip_12_4_desc: "Durch die imperiale Administration können wir viele Steuern erheben, auch wenn die Bevölkerung darüber nicht sonderlich begeistert ist."
 iv2_ga_ideagroup_dip_12_5: "Imperiale Flotte"
 iv2_ga_ideagroup_dip_12_5_desc: "Die Flote eines Imperiums muss groß sein."
 iv2_ga_ideagroup_dip_12_6: "Zentrum der Kunst"
 iv2_ga_ideagroup_dip_12_6_desc: "Wir sind eine so großartige Nation, dass wir Künstler aus allen Ländern anziehen."
 iv2_ga_ideagroup_dip_12_7: "Imperiale Garde"
 iv2_ga_ideagroup_dip_12_7_desc: "In der imperialen Garde dürfen nur die besten Soldaten des Landes dienen. Sie wird das Schlachtfeld als letzte verlassen."
 
