 iv2_ideagroup_title_dip_10: "Königsambitionsideen"
 iv2_ga_ideagroup_dip_10_1: "Grafenwürde"
 iv2_ga_ideagroup_dip_10_1_desc: "Auch wenn wir noch nicht in Hochadel aufgestiegen sind, besitzen wir Ambition für höhere Ziele."
 iv2_ga_ideagroup_dip_10_2: "Kleine Landaneignungen"
 iv2_ga_ideagroup_dip_10_2_desc: "Wir dürfen nicht zögern uns bei erster Gelegenheit auch kleinere Landstriche unter den Nagel zu reißen."
 iv2_ga_ideagroup_dip_10_3: "Stabile Nachbarbeziehungen"
 iv2_ga_ideagroup_dip_10_3_desc: "Auch wenn wir auf das Territorium unserer Nachbarn scharf sind, sollten wir nach außen einen harmlosen Eindruck erwecken."
 iv2_ga_ideagroup_dip_10_4: "Politische Allianzen"
 iv2_ga_ideagroup_dip_10_4_desc: "Wir sollten danach streben politische Allianzen mit denjenigen zu schmieden, deren Interessen mit unseren übereinstimmen."
 iv2_ga_ideagroup_dip_10_5: "Grenzscharmützel"
 iv2_ga_ideagroup_dip_10_5_desc: "Kleine Scharmützel an der Grenze sind bei uns an der Tagesordnung."
 iv2_ga_ideagroup_dip_10_6: "Jagdreviere"
 iv2_ga_ideagroup_dip_10_6_desc: "Indem wir eine effektive Gruppe an Jägern unterhalten, haben wir gleichzeitig eine schlagkräftige Kavallerieeinheit, die wir im Notfall auch militärisch einsetzen können."
 iv2_ga_ideagroup_dip_10_7: "Wachtürme"
 iv2_ga_ideagroup_dip_10_7_desc: "Wachtürme schützen unsere Grenzen vor den gierigen Überfällen unserer Nachbarn."
 
