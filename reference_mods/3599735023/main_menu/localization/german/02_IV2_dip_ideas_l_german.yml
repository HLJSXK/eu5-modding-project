 iv2_ideagroup_title_dip_17: "Kulturelle Pfeiler Ideen"
 iv2_ga_ideagroup_dip_17_1: "Wesentliche Werte"
 iv2_ga_ideagroup_dip_17_1_desc: "Jede Kultur hat Werte, die für sie unverzichtbar sind."
 iv2_ga_ideagroup_dip_17_2: "Höflichkeit"
 iv2_ga_ideagroup_dip_17_2_desc: "Die Höflichkeit ist eine edle Eigenschaft, die jedermann haben sollte."
 iv2_ga_ideagroup_dip_17_3: "Ehre"
 iv2_ga_ideagroup_dip_17_3_desc: "Ohne Ehre sind wir nichts wert!"
 iv2_ga_ideagroup_dip_17_4: "Empathie"
 iv2_ga_ideagroup_dip_17_4_desc: "Die Fähigkeit sich in einen anderen Menschen hinzuversetzen und seine Handlungen aus seiner Sicht zu verstehen, ist eine wertvolle Fähigkeit."
