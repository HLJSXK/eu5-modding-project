 iv2_ideagroup_title_dip_13: "Kulturelle Kooperationsideen"
 iv2_ga_ideagroup_dip_13_1: "Gemeinsame Feste"
 iv2_ga_ideagroup_dip_13_1_desc: "Wo lassen sich Unterschiede schneller vergessen, als wenn man gemeinsam Feste feiert?"
 iv2_ga_ideagroup_dip_13_2: "Verschmelzende Hochzeiten"
 iv2_ga_ideagroup_dip_13_2_desc: "Wir fördern Hochzeiten zwischen den verschiedenen Kulturen unserer Lande um gegenseitige Spannungen abzubauen."
 iv2_ga_ideagroup_dip_13_3: "Gegenseitiges Lernen"
 iv2_ga_ideagroup_dip_13_3_desc: "Manchmal kann man von Fremden Weisheiten oder Fähigkeiten lernen, die bisher außerhalb der eigenen Vorstellungskraft lagen."
 iv2_ga_ideagroup_dip_13_4: "Gemeinsamer Kampf"
 iv2_ga_ideagroup_dip_13_4_desc: "Wir können Kulturen gegen einen gemeinsamen Feind zusammenschweißen."
 iv2_ga_ideagroup_dip_13_5: "Gemeinsame Religion"
 iv2_ga_ideagroup_dip_13_5_desc: "Beten wir den gleichen Gott an, ist das auch für unsere kulturelle Verständigung wertvoll."
 iv2_ga_ideagroup_dip_13_6: "Reisende Adlige"
 iv2_ga_ideagroup_dip_13_6_desc: "Reisende Adlige vermitteln zwischen unseren Kulturen."
 iv2_ga_ideagroup_dip_13_7: "Große Städte"
 iv2_ga_ideagroup_dip_13_7_desc: "Große Städte fungieren als Schmelztigel zwischen den Kulturen."
 
