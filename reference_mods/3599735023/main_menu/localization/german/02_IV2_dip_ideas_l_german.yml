 iv2_ideagroup_title_dip_5: "Landhandel Ideen"
 iv2_ga_ideagroup_dip_5_1: "Gerissene Geschäftspraktiken"
 iv2_ga_ideagroup_dip_5_1_desc: "Erlaubt uns den Einsatz verfeinerter Geschäftspraktiken, sodass unsere Kaufleute gegenüber ihrer Konkurrenz die Oberhand behalten."
 iv2_ga_ideagroup_dip_5_2: "Freihandel"
 iv2_ga_ideagroup_dip_5_2_desc: "Die bestehenden Kaufmannsfamilien wünschen sich, dass die Handelsprivilegien unverändert ihre exklusive Domäne bleiben. Dies wünschen wir nicht. Stattdessen werden wir ein Wachstum der Klasse der Kaufleute zulassen."
 iv2_ga_ideagroup_dip_5_3: "Riskante Geschäftsvorhaben"
 iv2_ga_ideagroup_dip_5_3_desc: "Erlaubt es uns, auf all die Händler zurückzugreifen, die sich auf der Suche nach Ruhm und Reichtum befinden. Diese Händler bieten uns voller Eifer ihre Hilfe bei der Suche nach neuen Handelsrouten an."
 iv2_ga_ideagroup_dip_5_4: "Nationale Handelspolitik"
 iv2_ga_ideagroup_dip_5_4_desc: "Durch die Festsetzung einer nationalen Handelspolitik können wir unsere Präsenz in der Wirtschaft steigern und die Effektivität unseres Handels erhöhen."
 iv2_ga_ideagroup_dip_5_5: "Handelsmanipulation"
 iv2_ga_ideagroup_dip_5_5_desc: "In den kritischen Phasen, in denen über Gelingen oder Misslingen eines Geschäftsvorhabens entschieden wird, im Vorteil zu sein, kann den Ausschlag für das Anwachsen unserer Handelseinkünfte geben."
 iv2_ga_ideagroup_dip_5_6: "Zollvermeidung"
 iv2_ga_ideagroup_dip_5_6_desc: "Unsere Händler sind Experten darin die Zölle anderer Länder zu umgehen. Nicht ganz legal, steigert aber den Profit!"
 iv2_ga_ideagroup_dip_5_7: "Schnelle Verhandlungen"
 iv2_ga_ideagroup_dip_5_7_desc: "Manchmal ist es für den Geschäftsabschluss entscheidend, einfach schneller als die Konkurrenz zu sein. Wir müssen dafür sorgen, dass unsere Händler ihre Geschäfte abschließen können."
 
