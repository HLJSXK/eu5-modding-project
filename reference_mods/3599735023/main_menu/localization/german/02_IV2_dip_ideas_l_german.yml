 iv2_ideagroup_title_dip_4: "Einflussideen"
 iv2_ga_ideagroup_dip_4_1: "Tributsystem"
 iv2_ga_ideagroup_dip_4_1_desc: "Stärkt unsere Einnahmen durch Einrichtung eines formalisierten Systems jährlicher Vasallentribute."
 iv2_ga_ideagroup_dip_4_2: "Integrierte Eliten"
 iv2_ga_ideagroup_dip_4_2_desc: "Wen wir die herrschenden Eliten unserer Vasallenstaaten in unsere Regierung einbringen, können wir die Integration ihrer Territorien viel reibungsloser gestalten."
 iv2_ga_ideagroup_dip_4_3: "Staatspropaganda"
 iv2_ga_ideagroup_dip_4_3_desc: "Wie beim Menschen, so ist auch für eine Nation der Ruf sehr wichtig, und die Einrichtung eines offiziellen Propagandadienstes wird sicherstellen, dass unser Name nicht von den Lügen unserer Feinde besudelt wird."
 iv2_ga_ideagroup_dip_4_4: "Postdienst"
 iv2_ga_ideagroup_dip_4_4_desc: "Kommunikationstechnik ist nicht immer so, wie sie sein sollte, daher ist es schwierig, das pünktliche Eintreffen unserer diplomatischen Depeschen zu gewährleisten. Über ein Netzwerk von Postämtern und Kurierraststätten kann unsere Stimme in fernen Territorien besser gehört werden."
 iv2_ga_ideagroup_dip_4_5: "Marcher Lords"
 iv2_ga_ideagroup_dip_4_5_desc: "Die "Marcher Lords" gewähren ihren Vasallen in Grenzregionen hohe Autonomie und können somit große Armeen ausheben, um uns in unseren Kriegen zur Hand zu gehen."
 iv2_ga_ideagroup_dip_4_6: "Sanfte Erpressung"
 iv2_ga_ideagroup_dip_4_6_desc: "Manchmal müssen wir eine härtere Gangart an den Tag legen, wenn wir unsere Ziele erreichen wollen. Dazu sind wir bereit."
 iv2_ga_ideagroup_dip_4_7: "Gegenseitiges Wetteifern"
 iv2_ga_ideagroup_dip_4_7_desc: "Wir sind bereit unsere Rivalen in jeder Hinsicht zu übertreffen und streben immer danach die beste Nation mit dem meisten Einfluss zu sein."
 
