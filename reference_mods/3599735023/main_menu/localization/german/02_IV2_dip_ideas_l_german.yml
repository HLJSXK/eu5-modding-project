 iv2_ideagroup_title_dip_2: "Diplomatie Ideen"
 iv2_ga_ideagroup_dip_2_1: "Botschaften im Ausland"
 iv2_ga_ideagroup_dip_2_1_desc: "Diplomatie ist die heikle Kunst, die Balance zwischen mehreren Aspekten zu halten. Botschaften im Ausland können uns mit Berichten und Informationen versorgen, durch die wir verschiedene Handlungsmöglichkeiten bekommen."
 iv2_ga_ideagroup_dip_2_2: "Fingierte Ansprüche"
 iv2_ga_ideagroup_dip_2_2_desc: "Einen Anspruch zu erheben ist einfach. Schwieriger wird es, wenn alle anderen überzeugt werden sollen, dass der Anspruch begründet ist. Durch die Ausweitung unseres diplomatischen Netzes können wir dafür sorgen, dass unsere Ansprüche denjenigen Personen, auf die es ankommt, bekannt sind."
 iv2_ga_ideagroup_dip_2_3: "Anpassungsfähigkeit"
 iv2_ga_ideagroup_dip_2_3_desc: "Es gibt Land, das uns gehört und Teil unserer Erblande ist und das wir niemals aufgeben werden. Mit ein wenig Flexibilität ist es durchaus möglich, diese Kategorie um einige Regionen zu erweitern. Sollten wir im Ernstfall gezwungen sein, einen Kreuzzug für die Rückeroberung dieser Ländereien zu veranstalten, wird der Rest der Welt wissen, dass unsere Sache gerecht ist."
 iv2_ga_ideagroup_dip_2_4: "Kabinett"
 iv2_ga_ideagroup_dip_2_4_desc: "Durch die Gründung eines Exekutivrats sind wir in der Lage, unsere fähigsten Diplomaten zu versammeln."
 iv2_ga_ideagroup_dip_2_5: "Diplomatischer Einfluss"
 iv2_ga_ideagroup_dip_2_5_desc: "Indem wir uns auf die Diplomatie konzentrieren, können wir unsere Stärke auf diplomatischem Gebiet erhöhen. Diese Stärke kann uns viele Freunde einbringen."
 iv2_ga_ideagroup_dip_2_6: "Flexible Verhandlungen"
 iv2_ga_ideagroup_dip_2_6_desc: "Man kann nie genau wissen, was bei Friedensverhandlungen gewonnen werden kann. Deshalb sollten wir uns beim Eintritt in die Verhandlungen alle Optionen offenhalten."
 iv2_ga_ideagroup_dip_2_7: "Revolution und Gegenrevolution"
 iv2_ga_ideagroup_dip_2_7_desc: "Da die Politik unserer Zeit immer polarisierter und radikaler wird, könnten wir keine andere Wahl haben, als Kriege gegen andersartige Regierungen zu führen."
 
