 iv2_ideagroup_title_dip_3: "Dynastie Ideen"
 iv2_ga_ideagroup_dip_3_1: "Dynastische Verstrickungen"
 iv2_ga_ideagroup_dip_3_1_desc: "Durch unsere vielseitigen Familienbeziehungen können wir Einfluss auf viele Häuser ausüben."
 iv2_ga_ideagroup_dip_3_2: "Mein Cousin, dein Cousin"
 iv2_ga_ideagroup_dip_3_2_desc: "Manchmal verlieren wir den Überblick über unseren weit verzweigten dynastischen Baum. Meist behalten wir aber den Überblick."
 iv2_ga_ideagroup_dip_3_3: "Frühe Verlobung"
 iv2_ga_ideagroup_dip_3_3_desc: "Indem wir unsere Kinder schon früh miteinander verloben, stellen wir sicher, dass sie eine gute Partie machen."
 iv2_ga_ideagroup_dip_3_4: "Krieg gegen Verwandte"
 iv2_ga_ideagroup_dip_3_4_desc: "Kommt es einmal zum Äußersten, können wir trotzdem noch auf eine zivile Behandlung von unseren Verwandten hoffen, sollten wir in ihre Hände fallen."
 iv2_ga_ideagroup_dip_3_5: "Kadetten-Linien einrichten"
 iv2_ga_ideagroup_dip_3_5_desc: "Wir sind es gewohnt, dass unsere Dynastie die Kontrolle über mehrere Länder hat, die wir in Personalunion regieren. Erbschaft kann eine knifflige Angelegenheit sein. Wenn wir Rollen und Rechte für unsere Dynastie durch Kadetten-Linien klar definieren, können wir eine stabilere Erbfolge sicherstellen."
 iv2_ga_ideagroup_dip_3_6: "Überraschungsangriff"
 iv2_ga_ideagroup_dip_3_6_desc: "Unser diplomatisches Spiel ist auf so hohem Level, dass unsere Gegner unseren Angriff nicht ahnen, obwohl sie wissen, dass er kurz bevor stehen müsste. Dies gibt uns einen Vorteil!"
 iv2_ga_ideagroup_dip_3_7: "Game of Thrones"
 iv2_ga_ideagroup_dip_3_7_desc: "Manchmal gilt es seine Ansprüche durchzusetzen und einen beanspruchten Thron mit Feuer und Blut zu erobern!"
 
