 iv2_ideagroup_title_dip_14: "Interne Mediationsideen"
 iv2_ga_ideagroup_dip_14_1: "Konfliktlösung"
 iv2_ga_ideagroup_dip_14_1_desc: "Wir sind Experten darin in Konflikten zu vermitteln."
 iv2_ga_ideagroup_dip_14_2: "Kompromiss"
 iv2_ga_ideagroup_dip_14_2_desc: "Die Stärke des Kompromisses darf nicht unterschätzt werden. Nur durch Kompromiss lassen sich lang gehegte Feindschaften befrieden."
 iv2_ga_ideagroup_dip_14_3: "Gerichte"
 iv2_ga_ideagroup_dip_14_3_desc: "Gerichte spielen eine wichtige Rolle bei der Streitbeilegung."
 iv2_ga_ideagroup_dip_14_4: "Richterliche Unabhängigkeit"
 iv2_ga_ideagroup_dip_14_4_desc: "Treten Parteien vor einen unparteiischen Richter, ist die Wahrscheinlichkeit größer, dass eine getroffene Entscheidung befolgt und respektiert wird."
 iv2_ga_ideagroup_dip_14_5: "Frühes Völkerrecht"
 iv2_ga_ideagroup_dip_14_5_desc: "Schon wenige allgemeine Regeln, an die sich alle Staaten halten, werden dazu beitragen, dass wir in einer zivilen Gesellschaft leben."
 iv2_ga_ideagroup_dip_14_6: "Kirchliche Mediatoren"
 iv2_ga_ideagroup_dip_14_6_desc: "Die Kirche kann als unabhängige Instanz helfen, Konflikte beizulegen."
 iv2_ga_ideagroup_dip_14_7: "Mediation vor Fehde"
 iv2_ga_ideagroup_dip_14_7_desc: "Indem wir die Mediation in das Fehdenrecht einbauen, können wir blutige Konflikte verhindern, bevor mit einem Mediator gesprochen wurde."
 
