 iv2_ideagroup_title_dip_6: "Hofbeziehungsideen"
 iv2_ga_ideagroup_dip_6_1: "Anerkannte Hierarchie"
 iv2_ga_ideagroup_dip_6_1_desc: "Die Stände unseres Reichs müssen das Staatsoberhaupt als letzte Instanz unseres Hofs anerkennen."
 iv2_ga_ideagroup_dip_6_2: "Geordnete Koordination"
 iv2_ga_ideagroup_dip_6_2_desc: "Unsere große Nation kann sich nur weiterentwickeln, wenn sich alle Mitglieder der Regierung in geordneter Weise abstimmen."
 iv2_ga_ideagroup_dip_6_3: "Langes Echo"
 iv2_ga_ideagroup_dip_6_3_desc: "Der Einfluss, den wir ausüben, ist beispiellos. Ein einziges Wort unseres Staatsoberhaupts reicht aus, um selbst dem Ansehen der berühmtesten Dynastien zu schaden."
 iv2_ga_ideagroup_dip_6_4: "Prächtiger Palast"
 iv2_ga_ideagroup_dip_6_4_desc: "Kein Herrscher kann sich mit Ruhm schmücken, ohne über einen prächtigen Hof zu verfügen."
 iv2_ga_ideagroup_dip_6_5: "Begrüßungszeremonien"
 iv2_ga_ideagroup_dip_6_5_desc: "Wir werden eintreffende Würdenträger mit aufwendigen Zeremonien begrüßen, um Macht, Reichtum und Wohlstand zur Schau zu stellen."
 iv2_ga_ideagroup_dip_6_6: "Anerkannte Autorität"
 iv2_ga_ideagroup_dip_6_6_desc: "Unsere Autorität trägt das Gewicht der Größe unseres Herrschers. Deshalb bringt sie Sicherheit, Prestige und ein Gefühl der Überlegenheit mit sich."
 iv2_ga_ideagroup_dip_6_7: "Hof-Botschaften"
 iv2_ga_ideagroup_dip_6_7_desc: "Diplomatische Kommunikationsstellen zwischen uns und unseren Verbündeten einzurichten, ist eine wichtige Ergänzung, um den Einfluss unseres Hofs zu stärken."
 
