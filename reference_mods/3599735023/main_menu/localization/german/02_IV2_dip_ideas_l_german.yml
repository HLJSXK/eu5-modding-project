 iv2_ideagroup_title_dip_9: "Propaganda Ideen"
 iv2_ga_ideagroup_dip_9_1: "Kriegspropaganda"
 iv2_ga_ideagroup_dip_9_1_desc: "Gute Propaganda kann die Bevölkerung motivieren, länger durchzuhalten."
 iv2_ga_ideagroup_dip_9_2: "Propagandaminister"
 iv2_ga_ideagroup_dip_9_2_desc: "Ein Minister, der sich ausschließlich um Propaganda kümmert, kann sehr wertvoll sein."
 iv2_ga_ideagroup_dip_9_3: "Einfluss auf das Ausland"
 iv2_ga_ideagroup_dip_9_3_desc: "Durch unsere erfolgreiche Porpaganda, glaub sogar das Ausland unsere Geschichten."
 iv2_ga_ideagroup_dip_9_4: "Glaubwürdigkeit"
 iv2_ga_ideagroup_dip_9_4_desc: "Indem wir zumindest teilweise die Wahrheit sagen, vermitteln wir Glaubwürdigkeit."
 iv2_ga_ideagroup_dip_9_5: "Streben nach Größerem"
 iv2_ga_ideagroup_dip_9_5_desc: "In unserer Propaganda findet immer das Streben nach dem größeren Wohl einen Platz."
 iv2_ga_ideagroup_dip_9_6: "Pauschale Rechtfertigungsgründe"
 iv2_ga_ideagroup_dip_9_6_desc: "Unsere Argumentationen sind so flexibel, dass wir auch die größten politischen Winkelzüge mit geschickter Argumenatation rechtfertigen können."
 iv2_ga_ideagroup_dip_9_7: "Pflicht zum Sieg"
 iv2_ga_ideagroup_dip_9_7_desc: "Ein wichtiger Teil unserer Propagandastrategie ist es, in der Bevölkerung eine Pflicht zum Sieg zu verankern."
 
