 iv2_ideagroup_title_dip_8: "Assimilationsideen"
 iv2_ga_ideagroup_dip_8_1: "Umerziehung"
 iv2_ga_ideagroup_dip_8_1_desc: "Wir bringen unserer neuen Bevölkerung schnell unsere Werte bei und überzeugen sie von unserer Kultur."
 iv2_ga_ideagroup_dip_8_2: "Schnelle Integration"
 iv2_ga_ideagroup_dip_8_2_desc: "Vasallenstaaten sollen schnell in unser Mutterland integriert werden."
 iv2_ga_ideagroup_dip_8_3: "Fremde Kulturen integrieren"
 iv2_ga_ideagroup_dip_8_3_desc: "Wir können unsere Kultur diverser machen indem wir Elemente anderer Kulturen in unsere Aufnehmen."
 iv2_ga_ideagroup_dip_8_4: "Befriedigung von Nationalisten"
 iv2_ga_ideagroup_dip_8_4_desc: "Es kann sinnvoll sein, Nationalisten durch sehr begrenzte Zugeständnisse zu besänftigen."
 iv2_ga_ideagroup_dip_8_5: "Positive Pamphlete"
 iv2_ga_ideagroup_dip_8_5_desc: "Unsere eigenen Philosophen begrüßen unser Handeln und preisen die Größe unserer Kultur."
 iv2_ga_ideagroup_dip_8_6: "Fester Zusammenhalt"
 iv2_ga_ideagroup_dip_8_6_desc: "Sollten jemand versuchen unsere Nation auseinander zu reißen, kämpfen wir jedoch entschieden."
 iv2_ga_ideagroup_dip_8_7: "Keine Feinde, nur Brüder"
 iv2_ga_ideagroup_dip_8_7_desc: "Wir sehen diejenigen, die wir erobern am ersten Tag nach der Eroberung nicht mehr als Feinde, sondern als Brüder." 
 
