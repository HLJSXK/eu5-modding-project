 iv2_ideagroup_title_dip_11: "Imperialistische Ambition Ideen"
 iv2_ga_ideagroup_dip_11_1: "Erntefest"
 iv2_ga_ideagroup_dip_11_1_desc: "Beim Erntefest können wir unseren Untertanen stets zeigen wie gütig wir sind. Durch kostenlose Verteilung von Nahrung und vielen Festen im ganzen Königreich sorgen wir für die Armen und für gute Stimmung im Reich."
 iv2_ga_ideagroup_dip_11_2: "Königslande"
 iv2_ga_ideagroup_dip_11_2_desc: "Die Gebiete über die der König direkt herrscht müssen sicherstellen, dass sie ausreichende Truppenkapazitäten bereit stellen um die Vasallen im Zaum zu halten."
 iv2_ga_ideagroup_dip_11_3: "Zentrum der Macht"
 iv2_ga_ideagroup_dip_11_3_desc: "Die Hauptstadt ist unser Sitz, das Zentrum der Macht. Sie muss vor allen anderen Städten die meiste Anziehung haben weil dort auch unser Monarch sitzt."
 iv2_ga_ideagroup_dip_11_4: "Königlicher Erlass"
 iv2_ga_ideagroup_dip_11_4_desc: "Durch köngliche Erlässe kann Fortschritt im Reich sehr viel schneller verbreitet werden. Unsere treuen Untertanen werden dem Ruf des Königs immer folgen."
 iv2_ga_ideagroup_dip_11_5: "Königliche Marine"
 iv2_ga_ideagroup_dip_11_5_desc: "Die Marine unserer Nation muss glorreich und groß sein. Ihre Majestät hat dies zur Staatsraison erklärt."
 iv2_ga_ideagroup_dip_11_6: "Köngliche Waffenkammer"
 iv2_ga_ideagroup_dip_11_6_desc: "Die Waffenkammer ihrer Majestät ist so gut gefüllt, dass die Schmiede nie große Probleme haben die Verluste auszugleichen, wenn wir die Waffenkammer plündern um neue Truppen auszurüsten."
 iv2_ga_ideagroup_dip_11_7: "Vasallenerweiterung"
 iv2_ga_ideagroup_dip_11_7_desc: "Unser König ist schon allein aus seinem Rang heraus ermächtigt über niedere Herzöge zu herrschen! Unterwerft sie alle unter eure Herrschaft."
 
