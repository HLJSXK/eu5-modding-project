 iv2_ideagroup_title_dip_7: "Kolonialimperium Ideen"
 iv2_ga_ideagroup_dip_7_1: "Kolonien-Rush"
 iv2_ga_ideagroup_dip_7_1_desc: "Der Platz wird auch in der neuen Welt irgendwann knapp. Wir müssen uns beeilen, noch so viel wie möglich vom Kuchen zu bekommen."
 iv2_ga_ideagroup_dip_7_2: "Autonome Abenteurer"
 iv2_ga_ideagroup_dip_7_2_desc: "Wir müssen keine Leute mehr bezahlen, das Land außerhalb unserer Kolonien zu erkunden. Unabhängige Abenteurer sind längst unterwegs und werden uns berichten."
 iv2_ga_ideagroup_dip_7_3: "Koloniale Wehrpflicht"
 iv2_ga_ideagroup_dip_7_3_desc: "Im Gegenzug zu unserer Unterstützung der Kolonien müssen die Kolonien uns im Kriegsfall Männer zur Verteidigung des Mutterlandes schicken."
 iv2_ga_ideagroup_dip_7_4: "Tariferhöhung"
 iv2_ga_ideagroup_dip_7_4_desc: "Durch besondere Gesetze erhöhen wir den Gewinn aus den Kolonien."
 iv2_ga_ideagroup_dip_7_5: "Schnellere Infrastruktur Ausbreitung"
 iv2_ga_ideagroup_dip_7_5_desc: "Wir erhöhen unsere Operationsreichweite und müssen so dafür sorgen, dass wir möglichst viel Infrakstruktur, möglichst billig bauen können."
 iv2_ga_ideagroup_dip_7_6: "Angemessene Flottenstärke"
 iv2_ga_ideagroup_dip_7_6_desc: "Um unsere Kolonien verteidigen zu können, brauchen wir eine gewisse Flottenstärke."
 iv2_ga_ideagroup_dip_7_7: "Schnellere Truppenverschiebung"
 iv2_ga_ideagroup_dip_7_7_desc: "Um unsere Rivalen und eventuelle Unabhängigkeitsbestrebungen auszuschalten brauchen wir effektive Wege um unsere Truppen schnell an die Brennpunkte des Geschehens zu schaffen. So können wir mit geringem Aufwand die Kontrolle über unsere Kolonien behalten." 
 
