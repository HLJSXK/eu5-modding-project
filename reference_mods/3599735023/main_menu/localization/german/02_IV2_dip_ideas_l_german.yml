 iv2_ideagroup_title_dip_16: "Nationalismusideen"
 iv2_ga_ideagroup_dip_16_1: "Gezielte Propaganda"
 iv2_ga_ideagroup_dip_16_1_desc: "Unsere Propaganda ist darauf ausgerichtet den Nationalismus unserer Bürger zu fördern."
 iv2_ga_ideagroup_dip_16_2: "Für das Vaterland!"
 iv2_ga_ideagroup_dip_16_2_desc: "Der Spruch für das Vaterland, soll unsere Bürger ermutigen, alles für uns zu geben."
 iv2_ga_ideagroup_dip_16_3: "Freiwilligenverbände"
 iv2_ga_ideagroup_dip_16_3_desc: "Im Kriegsfalle kämpfen Freiwilligenverbände an der Seite unserer regulärer Truppen."
 iv2_ga_ideagroup_dip_16_4: "Partisanenangriffe"
 iv2_ga_ideagroup_dip_16_4_desc: "Sollte einmal der Feind in unser Land eingefallen sein, wird unsere Bevölkerung alles tun, um ihn wieder hinaus zu werfen."
 iv2_ga_ideagroup_dip_16_5: "Unbeugsames Land"
 iv2_ga_ideagroup_dip_16_5_desc: "Aufgrund unseres Nationalismus, lassen wir uns nicht so leicht unterwerfen."
 iv2_ga_ideagroup_dip_16_6: "Vertrauen in den Staat"
 iv2_ga_ideagroup_dip_16_6_desc: "Durch unseren Nationalismus haben wir ein beinahe nicht zu erschütterndes Vertrauen in den Staat."
 iv2_ga_ideagroup_dip_16_7: "Es ist süß für's Vaterland zu sterben"
 iv2_ga_ideagroup_dip_16_7_desc: "Durch die Bereitschaft unserer Soldaten für ihr Land zu sterben, erhöht sich ihr Ansehen in der ganzen Welt."
 
