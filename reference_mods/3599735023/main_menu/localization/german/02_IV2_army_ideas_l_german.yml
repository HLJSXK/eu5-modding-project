l_german:
 iv2_ideagroup_title_army_1: "Offensive Ideen"
 iv2_ga_ideagroup_army_1_1: "Glorreiche Streitkräfte"
 iv2_ga_ideagroup_army_1_1_desc: "Der Anblick unserer glorreichen, renommierten Armee wird jeden Gegner in Angst und Schrecken versetzen."
 iv2_ga_ideagroup_army_1_2: "Bayonett-Kommandanten"
 iv2_ga_ideagroup_army_1_2_desc: "Werden die Männer gut geführt, so werden sie folgen. Deshalb sorgen wir dafür, dass unsere Offiziere ihr Kommando von vorderster Front aus führen."
 iv2_ga_ideagroup_army_1_3: "Schlachtfeld-Kommissionen"
 iv2_ga_ideagroup_army_1_3_desc: "Macht einen besonderen Fokus auf militärische Fortschritte möglich und erhöht daher unsere Armeetradition."
 iv2_ga_ideagroup_army_1_4: "Verbesserte Flankierung"
 iv2_ga_ideagroup_army_1_4_desc: "Eine Kernkompetenz guter Kommandanten ist es, auf dem Schlachtfeld Gebrauch von seinen Truppen zu machen. Indem wir jederzeit wissen, wohin Truppen bewegt werden müssen, sichern wir uns in der Schlacht einen Vorteil."
 iv2_ga_ideagroup_army_1_5: "Festungsbrecher"
 iv2_ga_ideagroup_army_1_5_desc: "Befestigungen sind der Fluch eines jeden expansionistischen Lands. Selbst wenn es das Leben all unserer Männer kostet, darf keine Festung zwischen uns und unserem Sieg stehen.\n"Vorwärts! Stürmt diese Festung und erobert sie für euren General!""
 iv2_ga_ideagroup_army_1_6: "Ruhmsucher"
 iv2_ga_ideagroup_army_1_6_desc: "Die meisten Kriege werden heutzutage durch Belagerungen und die Besetzung von feindlichem Territorium gewonnen, doch das ist nichts für uns! Wir begegnen unseren Feinden auf dem Schlachtfeld und besiegen sie im Kampf!"
 iv2_ga_ideagroup_army_1_7: "Offensiver Geist"
 iv2_ga_ideagroup_army_1_7_desc: "Nur wenn wir voranstürmen können wir den Feind schnell bezwingen!"
 
