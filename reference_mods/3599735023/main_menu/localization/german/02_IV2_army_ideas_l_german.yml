 iv2_ideagroup_title_army_18: "Nachschub Ideen"
 iv2_ga_ideagroup_army_18_1: "Nachschubtornister"
 iv2_ga_ideagroup_army_18_1_desc: "Indem wir unsere Soldaten mit Tornistern ausstatten, können sie ihren Nachschub selbst tragen."
 iv2_ga_ideagroup_army_18_2: "Nachschubkolonne"
 iv2_ga_ideagroup_army_18_2_desc: "Wir tun alles, damit der Nachschub schnell an die Front kommt. Dafür ist die Nachschubkolonne verantwortlich."
 iv2_ga_ideagroup_army_18_3: "Gut versorgte Soldaten"
 iv2_ga_ideagroup_army_18_3_desc: "Ein satter Soldat kämpft besser als einer, der am verhungern ist."
 iv2_ga_ideagroup_army_18_4: "Marschrationen"
 iv2_ga_ideagroup_army_18_4_desc: "Indem wir Marschrationen ausgeben, können unsere Soldaten schneller und besser marschieren."
 iv2_ga_ideagroup_army_18_5: "Haltbare Rationen"
 iv2_ga_ideagroup_army_18_5_desc: "Wir sorgen dafür, dass immer genug haltbare Nahrung verfügbar ist, die Tage und wenn nötig Wochen genießbar bleibt."
 iv2_ga_ideagroup_army_18_6: "Bewegliche Nahrungslager"
 iv2_ga_ideagroup_army_18_6_desc: "Indem wir unsere Nahrungslager so mobil wie möglich gestalten, können wir der Armee immer folgen."
 iv2_ga_ideagroup_army_18_7: "Foragiertrupps"
 iv2_ga_ideagroup_army_18_7_desc: "Trotz all dieser Vorkehrungen ist es sinnvoll das Feindesland nach zusätzlichen Nahrungsvorräten zu durchsuchen."
 
