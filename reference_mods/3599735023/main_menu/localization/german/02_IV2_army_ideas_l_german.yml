 iv2_ideagroup_title_army_3: "Qualitätsideen"
 iv2_ga_ideagroup_army_3_1: "Erstklassige Ausbildung"
 iv2_ga_ideagroup_army_3_1_desc: "Die Phase unmittelbar nach der Schlacht ist entscheidend für das Schicksal jeder Armee. Egal ob Sieger oder Besiegte, in dieser Phase sind die Männer erschöpft und verwundbar. Wir müssen dafür sorgen, dass unsere Männer schneller als der Feind wieder kampfbereit sind."
 iv2_ga_ideagroup_army_3_2: "Die besten Pferde"
 iv2_ga_ideagroup_army_3_2_desc: "Wie stetig der Vormarsch der Truppen! Wie vollkommen die Ordnung der Kavallerie! Seht, all die grauen Pferde! Wer sind diese ausgezeichneten Reiter? Es sind ausgezeichnete Truppen."
 iv2_ga_ideagroup_army_3_3: "Gefreiter zum Marschall"
 iv2_ga_ideagroup_army_3_3_desc: "Im Grunde genommen hat jeder Gefreite einen Marschallstab im Gepäck. Natürlich nicht wörtlich genommen. Doch wer sich in der Schlacht auszeichnen kann, den erwarten Ehrungen und Beförderungen. Die Truppe weiß das und wird von diesem Wissen inspiriert."
 iv2_ga_ideagroup_army_3_4: "Gesammelte Batterie"
 iv2_ga_ideagroup_army_3_4_desc: "Durch die Sammlung der gesamten Artillerie in einer einzelnen, großen Batterie kann ihre Zerstörungskraft gebündelt und ein Loch in die feindliche Linie gesprengt werden."
 iv2_ga_ideagroup_army_3_5: "Waffenpflege"
 iv2_ga_ideagroup_army_3_5_desc: "Wir halten unsere Männer unbedingt dazu an, ihre Waffen immer im Besten Zustand zu halten."
 iv2_ga_ideagroup_army_3_6: "Eiserne Disziplin"
 iv2_ga_ideagroup_army_3_6_desc: "Disziplin ist das erste Gebot für einen Soldaten."
 iv2_ga_ideagroup_army_3_7: "Kühler Kopf"
 iv2_ga_ideagroup_army_3_7_desc: "Ein Soldat muss immer einen kühlen Kopf bewahren, sonst ist er wahrscheinlich bald tot."
 
