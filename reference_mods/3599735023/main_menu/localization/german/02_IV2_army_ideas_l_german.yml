 iv2_ideagroup_title_army_10: "Aufgebote Ideen"
 iv2_ga_ideagroup_army_10_1: "Bauernmiliz"
 iv2_ga_ideagroup_army_10_1_desc: "Eine Bauernmiliz kann sinnvoll sein um gegen Banditen zu kämpfen oder um die professionelle Armee einmal schnell aufzustocken."
 iv2_ga_ideagroup_army_10_2: "Alle Mann zu den Waffen"
 iv2_ga_ideagroup_army_10_2_desc: "In Zeiten größter Not für unsere Nation, muss jeder Mann zu den Waffen greifen."
 iv2_ga_ideagroup_army_10_3: "Rudimentäre Ausbildung"
 iv2_ga_ideagroup_army_10_3_desc: "Geben wir unseren Aufgeboten wenigstens ein wenig Ausbildung, werden sie im Kampf deutlich bessere Ergebnisse erzielen."
 iv2_ga_ideagroup_army_10_4: "Veteranenoffiziere"
 iv2_ga_ideagroup_army_10_4_desc: "Stellen wir unseren Aufgeboten erfahrene Offiziere zur Seite, wird das ihre Moral steigern."
 iv2_ga_ideagroup_army_10_5: "Gute Verpflegung"
 iv2_ga_ideagroup_army_10_5_desc: "Wir sorgen dafür, dass unsere Aufgebote stets genug zu essen haben."
 iv2_ga_ideagroup_army_10_6: "Feldärzte"
 iv2_ga_ideagroup_army_10_6_desc: "Ein gute Anzahl an Felddoktoren wird hoffentlich dafür sorgen, dass sich keine Seuche in unserer Armee ausbreiten kann."
 iv2_ga_ideagroup_army_10_7: "Beutewaffen"
 iv2_ga_ideagroup_army_10_7_desc: "Unsere Aufgebote dürfen ihre erbeuteten Waffen behalten. Mit diesen werden sie in der nächsten Schlacht noch schlagkräftiger sein."
 
