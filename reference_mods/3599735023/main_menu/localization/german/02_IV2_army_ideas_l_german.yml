 iv2_ideagroup_title_army_2: "Defensive Ideen"
 iv2_ga_ideagroup_army_2_1: "Architekten-Korps"
 iv2_ga_ideagroup_army_2_1_desc: "Ein Architekten-Korps erlaubt es uns, die besten Talente, die unserer Nation im Bereich der Militärtechnologie zur Verfügung stehen, zu bündeln und von ihren unübertroffenen Fähigkeiten zu profitieren."
 iv2_ga_ideagroup_army_2_2: "Defensive Mentalität"
 iv2_ga_ideagroup_army_2_2_desc: "Es ist töricht, der Meinung zu sein, Angriff sei die beste Verteidigung. Stattdessen sollten wir den Feind auf uns zukommen lassen und ihm mit einem Gegenangriff begegnen. Unsere Truppen werden verbissen die Stellung halten und unsere Festungen länger standhalten."
 iv2_ga_ideagroup_army_2_3: "Heimatlandspezialisierung"
 iv2_ga_ideagroup_army_2_3_desc: "Indem wir unsere Soldaten gezielt drillen, ist jeder Kampf auf einem Terrain, der dem unserer Heimat ähnelt, ein sicherer Sieg."
 iv2_ga_ideagroup_army_2_4: "Guerilla-Kriegsführung"
 iv2_ga_ideagroup_army_2_4_desc: "Manchmal ist der Feind einfach zu überwältigend, um ihn frontal zu bekämpfen. In diesen Fällen ist es klüger, die Angreifer mit Guerillataktiken zu schwächen, bevor unsere Männer sie endgültig besiegen."
 iv2_ga_ideagroup_army_2_5: "Schützendes Terrain"
 iv2_ga_ideagroup_army_2_5_desc: "Es gibt wenig, was ein Soldat tun kann, um einer Kugel auf dem offenen Schlachtfeld zu entgehen, weshalb unsere Truppen ihre Umgebung aufmerksam beobachten und das Gelände nutzen müssen, um nicht von feindlichem Salvenfeuer getroffen zu werden."
 iv2_ga_ideagroup_army_2_6: "Verbesserter Körperschutz"
 iv2_ga_ideagroup_army_2_6_desc: "Obwohl Nahkampfwaffen aus der Mode kommen, sind sie auf den Schlachtfeldern weiterhin stark verbreitet. Indem wir die Uniformen und Rüstungen unserer Truppen verbessern, können wir die Tödlichkeit von Nahkampfwaffen verringern."
 iv2_ga_ideagroup_army_2_7: "Bis zum letzten Mann"
 iv2_ga_ideagroup_army_2_7_desc: "Eine Schlacht kann nur einen von zwei Ausgängen haben: den totalen Sieg oder den Tod. Keiner unserer Soldaten wird sich zurückziehen, solange auch nur ein einziger Feind steht."
 
