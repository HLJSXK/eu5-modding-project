 iv2_ga_ideagroup_army_16_5_desc: "Ist einmal eine unserer Städte unter Belagerung, strömen die Freiwilligen nur so herbei um ihre Heimat zu verteidigen."
 iv2_ga_ideagroup_army_16_6: "Schlachtbegeisterung"
 iv2_ga_ideagroup_army_16_6_desc: "Unsere Soldaten fiebern der Schlacht entgegen."
 iv2_ga_ideagroup_army_16_7: "Widerstandsfähigkeit"
