 iv2_ideagroup_title_army_7: "Wehrpflicht Ideen"
 iv2_ga_ideagroup_army_7_1: "Allgemeine Wehrpflicht"
 iv2_ga_ideagroup_army_7_1_desc: "Alle tauglichen Männer werden zum Dienst in der Armee eingezogen."
 iv2_ga_ideagroup_army_7_2: "Wir wissen, für wen wir kämpfen"
 iv2_ga_ideagroup_army_7_2_desc: "Unsere Männer wissen, das sie für ihr Land kämpfen. Dies motiviert ungemein."
 iv2_ga_ideagroup_army_7_3: "Schnelle Mobilmachung"
