 iv2_ideagroup_title_army_13: "Festungsideen"
 iv2_ga_ideagroup_army_13_1: "Defensives Artilleriefeuer"
 iv2_ga_ideagroup_army_13_1_desc: "Haltet den Feind mit defensivem Artilleriefeuer in Schach."
 iv2_ga_ideagroup_army_13_2: "Mannschaftsquartiere"
 iv2_ga_ideagroup_army_13_2_desc: "Die Quartiere unserer Garnisionen müssen Artilleriesicher und gut geschützt sein."
 iv2_ga_ideagroup_army_13_3: "Festungskanonen"
 iv2_ga_ideagroup_army_13_3_desc: "Unsere Festungen sind gut mit Kanonen ausgestattet. Bei Bedarf können wird diese sogar abbauen und im Feld benutzen."
 iv2_ga_ideagroup_army_13_4: "Bessere Fortverwaltung"
 iv2_ga_ideagroup_army_13_4_desc: "Wir verwalten unsere Forts effektiver, was deren Unterhalt günstiger macht."
 iv2_ga_ideagroup_army_13_5: "Langes Ausharren"
 iv2_ga_ideagroup_army_13_5_desc: "Unsere Forts können aufgrund guter Vorbereitung und moderner Technik länger standhalten."
 iv2_ga_ideagroup_army_13_6: "Sammeln am Kontrollpunkt"
 iv2_ga_ideagroup_army_13_6_desc: "Ist unsere Armee im Feld geschlagen, kann sie sich bei Verteidigungspunkten neu sammeln und regnerieren."
 iv2_ga_ideagroup_army_13_7: "Verstärkungsschwerpunkte"
 iv2_ga_ideagroup_army_13_7_desc: "Wir können unsere Armee nach einer blutigen Schlacht leichter wieder Verstärken, wenn wir eine gute Infrastruktur dazu aufgebaut haben."
 
