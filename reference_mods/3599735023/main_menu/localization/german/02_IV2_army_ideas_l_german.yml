 iv2_ideagroup_title_army_17: "Belagerungsideen"
 iv2_ga_ideagroup_army_17_1: "Sturmtruppen"
 iv2_ga_ideagroup_army_17_1_desc: "Unsere Truppen sind besonders sorgfältig ausgebildet, wenn es um das Erstürmen von Festungsanlagen geht."
 iv2_ga_ideagroup_army_17_2: "Durchdachter Lagerbau"
 iv2_ga_ideagroup_army_17_2_desc: "Es ist vital für das Überleben unserer Soldaten Lager zu errichten, in denen keine Seuchen um sich greifen."
 iv2_ga_ideagroup_army_17_3: "Alle Mittel einsetzen"
 iv2_ga_ideagroup_army_17_3_desc: "Wir sind bereit alle Tricks und Kniffe einzusetzen, damit die Festung fällt."
 iv2_ga_ideagroup_army_17_4: "Ausgeklügelte Feuerpositionen"
 iv2_ga_ideagroup_army_17_4_desc: "Indem wir unsere Feuerpositionen sorgfältig wählen, können wir unsere Artillerie am effizientesten einsetzen."
 iv2_ga_ideagroup_army_17_5: "Routinemäßiger Sturmangriff"
 iv2_ga_ideagroup_army_17_5_desc: "Dadurch, dass wir regelmäßig Festungen erstürmen, ist es für unsere Soldaten zur Gewohnheit geworden."
 iv2_ga_ideagroup_army_17_6: "Belagerungsartillerie"
 iv2_ga_ideagroup_army_17_6_desc: "Indem wir spezielle Geschütze für Belagerungen einsetzen, können wir den Prozess erheblich beschleunigen."
 iv2_ga_ideagroup_army_17_7: "Belagerungsexperten"
 iv2_ga_ideagroup_army_17_7_desc: "Unsere Generäle sind exzellente Belagerungsexperten. Das Erstürmen einer Festung ist Schwerpunkt in unserer Ausbildung."
 
