 iv2_ideagroup_title_army_19: "Garde Ideen"
 iv2_ga_ideagroup_army_19_1: "Idee der Garde"
 iv2_ga_ideagroup_army_19_1_desc: "Die Idee von Eliteeinheiten ist nicht neu, sie hat aber noch immer ihre Berechtigung."
 iv2_ga_ideagroup_army_19_2: "Berufssoldaten"
 iv2_ga_ideagroup_army_19_2_desc: "Gardisten sind Berufssoldaten und dementsprechend hervorragend ausgebildet."
 iv2_ga_ideagroup_army_19_3: "Heiratsanreize"
 iv2_ga_ideagroup_army_19_3_desc: "Unsere Gardisten sind begehrte Junggesellen. Wir wollen sie schnell verheiraten, damit sie Nachkommen zeugen, die in die Fußstapfen ihrer Väter treten."
 iv2_ga_ideagroup_army_19_4: "Lange Kerle"
 iv2_ga_ideagroup_army_19_4_desc: "Indem wir bewusst groß gewachsene Gardisten für die Garde aussuchen, stellen wir sicher, dass sie besonders furchteinflößend ist."
 iv2_ga_ideagroup_army_19_5: "Verschiedene Waffengattungen"
 iv2_ga_ideagroup_army_19_5_desc: "Es bietet sich an Garderegimenter in jeder Waffengattung als Vorbilder für andere Regimenter zu haben."
 iv2_ga_ideagroup_army_19_6: "Vorsichtiger Feldzugeinsatz"
 iv2_ga_ideagroup_army_19_6_desc: "Auch wenn die Garde unsere besten Soldaten umfasst, sollten wir sie auf dem Schlachtfeld sparsam einsetzen. Wir wollen sie nicht verlieren."
 iv2_ga_ideagroup_army_19_7: "Hofzulieferer"
 iv2_ga_ideagroup_army_19_7_desc: "Durch Verträge mit Hofzulieferern können wir die horrenden Kosten für die Garde wenigstens ein bisschen im Rahmen halten."
 
