 iv2_ideagroup_title_army_9: "Söldner Ideen"
 iv2_ga_ideagroup_army_9_1: "Freie Plünderung"
 iv2_ga_ideagroup_army_9_1_desc: "Wir lassen die Söldner von der Leine und kümmern uns nicht, was sie mit den gegnerischen Landen anstellen."
 iv2_ga_ideagroup_army_9_2: "Langfristige Verträge"
 iv2_ga_ideagroup_army_9_2_desc: "Wir binden die Söldner langfristig an uns, was sie im Preis attraktiver werden lässt."
 iv2_ga_ideagroup_army_9_3: "Die Söhne bleiben zu Hause"
 iv2_ga_ideagroup_army_9_3_desc: "Die Söhne unserer Nation müssen nicht fürchten eingezogen zu werden. Das steigert ihre Laune beträchtlich."
 iv2_ga_ideagroup_army_9_4: "Beteiligung an der Kriegsbeute"
 iv2_ga_ideagroup_army_9_4_desc: "Wir beteiligen die Söldner an unserer Kriegsbeute. Dies lässt sie auf einen Teil ihres Lohns verzichten."
 iv2_ga_ideagroup_army_9_5: "Söldner Kommandanten"
 iv2_ga_ideagroup_army_9_5_desc: "Manche Söldnereinheiten bleiben solange in unseren Diensten, das ihre kompetenten Anführer praktisch in unsere reguläre Armee übernommen werden."
 iv2_ga_ideagroup_army_9_6: "Ausrüstungsfreiheit"
 iv2_ga_ideagroup_army_9_6_desc: "Die Söldner rüsten sich selbst aus. Mit welchen Waffen ist uns egal, solange ihre Schlagkraft erhalten bleibt."
 iv2_ga_ideagroup_army_9_7: "Söldnertradition"
 iv2_ga_ideagroup_army_9_7_desc: "Unser Land setzt schon eine lange Zeit auf Söldner."
 
