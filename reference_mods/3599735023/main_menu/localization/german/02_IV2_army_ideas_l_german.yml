 iv2_ga_ideagroup_army_16_1: "Große Armee"
 iv2_ga_ideagroup_army_16_1_desc: "Die Gesellschaft erwartet mindestens eine repräsentativ große Armee."
 iv2_ga_ideagroup_army_16_2: "Offizierskarriere"
 iv2_ga_ideagroup_army_16_2_desc: "Alle jungen Männer träumen von einer Offizierskarriere."
 iv2_ga_ideagroup_army_16_3: "Natürlicher Gehorsam"
 iv2_ga_ideagroup_army_16_3_desc: "Unsere Jugend gehorcht unseren Befehlen - bedingungslos."
