 iv2_ideagroup_title_army_4: "Quantitätsideen"
 iv2_ga_ideagroup_army_4_1: "Zuschüsse für Pferdehalter"
 iv2_ga_ideagroup_army_4_1_desc: "Das Leben mag billig sein, Pferde hingegen sind teuer. Wenn wir ein System zur Bezuschussung von Pferdehaltern ins Leben rufen, wird sich das Angebot an Pferden erhöhen."
 iv2_ga_ideagroup_army_4_2: "Die Alten und Schwachen"
 iv2_ga_ideagroup_army_4_2_desc: "Manche der altgedienten Sergeanten gehören zum Abscheulichsten und Korruptesten, was die Menschheit zu bieten hat. Trotzdem könnten sie nützlich sein. Anstatt als Bettler ein trauriges Dasein zu fristen, könnten sie nach Ablauf ihrer Dienstzeit die Ausbildung der Sergeanten und Quartiermeister übernehmen und so ihre einzigartigen Fähigkeiten zur Anwendung bringen."
 iv2_ga_ideagroup_army_4_3: "Die Jungen können dienen"
 iv2_ga_ideagroup_army_4_3_desc: "Wie alt muss ein Junge sein, bevor er zum Mann wird? Wie alt muss er sein, bis er im Dienste des Vaterlandes sein Leben opfern darf? Manche Herrscher sind zart besaitet, doch auf unserer Schlachtbank herrscht Chancengleichheit."
 iv2_ga_ideagroup_army_4_4: "Zwangsdienst"
 iv2_ga_ideagroup_army_4_4_desc: "Das Prinzip der Freigiebigkeit ist die Grundlage der Struktur unserer gesamten Armee. Manchmal gibt es nicht genug Freiwillige. Wir sollten die Menschen zur Freiwilligkeit zwingen."
 iv2_ga_ideagroup_army_4_5: "Standardisierte Artillerie"
 iv2_ga_ideagroup_army_4_5_desc: "Eifersüchtig hütet jeder Eisengießer die Geheimnisse seines Verfahrens und fertigt seine Kanonen als Auftragswerke mit Kunstwerkcharakter. So sehr dies auch seinem Ego schmeicheln mag, effektiv ist diese Form der Kanonenproduktion sicherlich nicht. Wir werden in Zukunft darauf bestehen, dass Kanonen nach unseren genauen Spezifikationen produziert werden. So lassen sich außerdem Kosten einsparen."
 iv2_ga_ideagroup_army_4_6: "Private Waffen"
 iv2_ga_ideagroup_army_4_6_desc: "Wenn unsere Bevölkerung schon von sich aus mit Waffen ausgerüstet ist, können wir viel schneller eine schlagkräftige Armee aufbauen."
 iv2_ga_ideagroup_army_4_7: "Volksheer"
 iv2_ga_ideagroup_army_4_7_desc: "Bis heute waren wir sehr wählerisch bei der Auswahl unserer Soldaten. Nur die Ärmsten und Verzweifeltesten kamen infrage, Leute also, die ohnehin niemand vermissen würde. Doch von nun an werden wir absolut jeden hereinlassen, jedenfalls bis auf die Reichen."
 
