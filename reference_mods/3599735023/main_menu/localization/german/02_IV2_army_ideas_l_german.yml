 iv2_ideagroup_title_army_14: "Kriegsproduktionsideen"
 iv2_ga_ideagroup_army_14_1: "Infanteriewaffen Manufakturproduktion"
 iv2_ga_ideagroup_army_14_1_desc: "Die Infanteriewaffen Produktion in Manufakturen ist erheblich effizenter als bei winzigen Büchsenmachern."
 iv2_ga_ideagroup_army_14_2: "Professionelle Pferdezucht"
 iv2_ga_ideagroup_army_14_2_desc: "Pferde, die zum Kriegsdienst zu gebrauchen sind, müssen gezüchtet werden. Leute, die sich damit auskennen, sollten diese Aufgabe übernehmen."
 iv2_ga_ideagroup_army_14_3: "Kriegsanleihen"
 iv2_ga_ideagroup_army_14_3_desc: "Um diese Infrakstruktur bezahlen zu können, werden wir Kriegsanleihen ausgeben."
 iv2_ga_ideagroup_army_14_4: "Effektiver Basenbau"
 iv2_ga_ideagroup_army_14_4_desc: "Wir brauchen einen Grundstock an guten Basen für unsere Armee, damit wir ihre Versorgung insgesamt sicherstellen können."
 iv2_ga_ideagroup_army_14_5: "Musketen Qualität"
 iv2_ga_ideagroup_army_14_5_desc: "Der Produktion von Musketen in großer Qualität, erhöhte Priorität eingeräumt werden."
 iv2_ga_ideagroup_army_14_6: "Artillerie Manufakturproduktion"
 iv2_ga_ideagroup_army_14_6_desc: "Unsere Artillerie in Manufakturen fertigen zu lassen, erlaubt uns sie in größerer Stückzahl und billiger herzustellen."
 iv2_ga_ideagroup_army_14_7: "Waffendepots"
 iv2_ga_ideagroup_army_14_7_desc: "Die Schaffung von Depots macht es uns einfacher im Krieg unsere Armee schnell auszurüsten." 
 
