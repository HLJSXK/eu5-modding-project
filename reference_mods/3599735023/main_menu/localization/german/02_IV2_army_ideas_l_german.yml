 iv2_ideagroup_title_army_15: "Taktische Ideen"
 iv2_ga_ideagroup_army_15_1: "Kolonnenmarsch"
 iv2_ga_ideagroup_army_15_1_desc: "Neue Marschierformen ermöglichen uns eine bessere Marschleistung."
 iv2_ga_ideagroup_army_15_2: "Sturmangriff"
 iv2_ga_ideagroup_army_15_2_desc: "Die Kunst des Sturmangriffes kann einen Gegner überrumpeln und für einen schnellen Sieg sorgen."
 iv2_ga_ideagroup_army_15_3: "Ausschweifende Umfassung"
 iv2_ga_ideagroup_army_15_3_desc: "Manchmal muss man Risiken eingehen und die Kavallerie den Gegner in einem weiten Umfassungsmanöver überraschend angreifen lassen."
 iv2_ga_ideagroup_army_15_4: "Karree"
 iv2_ga_ideagroup_army_15_4_desc: "In besonders verzweifelten Situationen kann es notwendig sein sich zur Rundumverteidigung einzurichten."
 iv2_ga_ideagroup_army_15_5: "Praktikables Taktiktraining"
 iv2_ga_ideagroup_army_15_5_desc: "Durch die Durchführung von Trainingseinheiten und Lektionen, die auf der Erfahrung unserer Veteranen beruhen, können wir Erfahrungsverluste minimieren."
 iv2_ga_ideagroup_army_15_6: "Feldärzte"
 iv2_ga_ideagroup_army_15_6_desc: "Unsere Feldätzte verbessern nicht nur das Leiden unserer Verwundeten, sie sorgen auch dafür, dass auf dem Weg in die Schlacht weniger Ausfälle zu verzeichnen sind."
 iv2_ga_ideagroup_army_15_7: "Deckungsfeuer"
 iv2_ga_ideagroup_army_15_7_desc: "Den Feind aus der Deckung zu bekämpfen ist keine Schande, sondern nur sinnvoll."
 
