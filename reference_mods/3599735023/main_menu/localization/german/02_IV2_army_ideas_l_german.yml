 iv2_ideagroup_title_army_6: "Fernkampf Ideen"
 iv2_ga_ideagroup_army_6_1: "Konzentrietes Salvenfeuer"
 iv2_ga_ideagroup_army_6_1_desc: "Stürmt ein Gegner zu unvorsichtig auf uns los, werden wir ihn mit einer todbringenden Salve begrüßen."
 iv2_ga_ideagroup_army_6_2: "Unterdrückungsfeuer"
 iv2_ga_ideagroup_army_6_2_desc: "Unsere Kanonen beschießen den Gegner so intensiv, dass er sich nicht aus der Deckung wagen kann."
 iv2_ga_ideagroup_army_6_3: "Schnelles Nachladen"
 iv2_ga_ideagroup_army_6_3_desc: "Durch perfektes Training können wir die Nachladezeiten unserer Artillerie deutlich verringern."
 iv2_ga_ideagroup_army_6_4: "Warten bis zur letzten Sekunde"
 iv2_ga_ideagroup_army_6_4_desc: "Durch Erfahrung und Training warten unsere Männer mit dem Feuern bis sie das Weiße in den Augen ihrer Feinde sehen."
 iv2_ga_ideagroup_army_6_5: "Abwehrfeuer"
 iv2_ga_ideagroup_army_6_5_desc: "Das Abwehrfeuer unserer Festungen ist legendär."
 iv2_ga_ideagroup_army_6_6: "Feuerunterstützung"
 iv2_ga_ideagroup_army_6_6_desc: "Durch gezielte Feuerunterstützung unserer Artillerie wird es uns gelingen noch effizienter vorzurücken."
 iv2_ga_ideagroup_army_6_7: "Fernkampfgeneräle"
 iv2_ga_ideagroup_army_6_7_desc: "Unsere Generalsausbildung konzentriert sich auf die Ausbildung versierter Fernkämpfer."
 
