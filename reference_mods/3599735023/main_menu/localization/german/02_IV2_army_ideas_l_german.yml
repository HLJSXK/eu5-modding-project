 iv2_ideagroup_title_army_5: "Nahkmapf Ideen"
 iv2_ga_ideagroup_army_5_1: "Plötzlicher Sturmangriff"
 iv2_ga_ideagroup_army_5_1_desc: "Manchmal greifen wir den Feind so plötzlich an, dass seine Fernkämpfer gar keine Zeit haben zu reagieren."
 iv2_ga_ideagroup_army_5_2: "Übergreifender Angriff"
 iv2_ga_ideagroup_army_5_2_desc: "Wenn wir den Feind an einem Teil der Front in die Flucht schlagen, werfen wir uns sofort auf den nächsten Gegner und geben ihm keine Zeit zu reagieren."
 iv2_ga_ideagroup_army_5_3: "Kavalleriefokus"
 iv2_ga_ideagroup_army_5_3_desc: "Schnell und heftig den Gegner zu treffen ist das Motto unserer Kavallerie."
 iv2_ga_ideagroup_army_5_4: "Wuchtiger Angriff"
 iv2_ga_ideagroup_army_5_4_desc: "Unser Angriff ist stets so wuchtig, dass meist schon nach kurzer Zeit der Feind ins Wanken gerät."
 iv2_ga_ideagroup_army_5_5: "Dragoner Kavallerie"
 iv2_ga_ideagroup_army_5_5_desc: "Unsere Kavallerie ist in der Lage schnell anzugreifen, wenn nötig abzusitzen und dann zu Fuß den Kampf anzugehen. Wir sind aber auch so flexibel, dass sie aufgesessen kämpfen können, um sich dann schnell zurück zu ziehen."
 iv2_ga_ideagroup_army_5_6: "Keilformation"
 iv2_ga_ideagroup_army_5_6_desc: "Wenn unsere Kavallerie in Keilformation in die  Reihen der Gegner bricht ist uns der Sieg schon bald gewiss."
 iv2_ga_ideagroup_army_5_7: "Nahkampfgeneräle"
 iv2_ga_ideagroup_army_5_7_desc: "In der Ausbildung und Erfahrung unserer Generäle bildet der Nahkampf den Schwerpunkt."
 
