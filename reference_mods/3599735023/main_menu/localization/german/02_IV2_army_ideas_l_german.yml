 iv2_ideagroup_title_army_12: "Waffenqualitätsideen"
 iv2_ga_ideagroup_army_12_1: "Waffenproduktion"
 iv2_ga_ideagroup_army_12_1_desc: "Eine koordinierte Waffenproduktion ist unerlässlich um ein großes Heer auszurüsten."
 iv2_ga_ideagroup_army_12_2: " Qualitäts Infanteriebewaffnung"
 iv2_ga_ideagroup_army_12_2_desc: "Die Waffen unserer Infanterie müssen den höchsten Standards entsprechen."
 iv2_ga_ideagroup_army_12_3: "Qualitäts Kavalleriebewaffnung"
 iv2_ga_ideagroup_army_12_3_desc: "Die Waffen unserer Kavallerie müssen den höchsten Standards entsprechen."
 iv2_ga_ideagroup_army_12_4: "Waffenhändler"
 iv2_ga_ideagroup_army_12_4_desc: "Waffen sind durch die erhöhte Produktion immer leichter zugänglich und zu verkaufen. Dadurch erhöhen wir auch unsere Einnahmen."
 iv2_ga_ideagroup_army_12_5: "Modernes Belagerungsgerät"
 iv2_ga_ideagroup_army_12_5_desc: "Wir produzieren modernes Belagerungsgerät und unterstützen unsere Armee so bei Belagerungen."
 iv2_ga_ideagroup_army_12_6: "Verbesserte Produktion"
 iv2_ga_ideagroup_army_12_6_desc: "Durch die Produktion in Manufakturen können wir größere Stückzahlen herstellen."
 iv2_ga_ideagroup_army_12_7: "Qualitäts Kanonen"
 iv2_ga_ideagroup_army_12_7_desc: "Unsere Kanonen müssen die beste Qualität besitzen und sollten alle möglichst von einem Kaliber sein und alle die gleiche Munition benutzen können. Das erhöht unsere Kampfkraft auf dem Schlachtfeld."
 
