l_german:
 iv2_construction: "Baukosten" 
 iv2_ideas_category: "Ideengruppen-Gebäude"
 iv2_ideas_category_desc: "Diese Gebäude sind aus der Idea Variation Mod und werden hauptsächlich durch Ideen freigeschaltet, bzw. haben mit diesen zu tun."
 iv2_building_1_0: "Flottenbasis"
 iv2_building_1_0_desc: "Flottenbasen ermöglichen unseren Flotten einen Rückzugsort und erhöhen unsere maritime Präsenz in der Region."
 iv2_building_1_1: "Riesige Flottenbasis"
 iv2_building_1_1_desc: "$iv2_building_1_0$"
 iv2_building_1_2: "Marinefestung"
 iv2_building_1_2_desc: "Diese Flottenbasis hat eine eigene Festung, die es deutlich schwieriger machen wird die Basis einzunehmen."
 iv2_building_2_0: "Vorgelagerte Verteidigungsanlagen"
 iv2_building_2_0_desc: "Vorgelagerte Verteidigungsanlagen verlangsamen unseren Gegner und ermöglichen uns eine Gnadenfrist vor der eigentlichen Belagerung."
 iv2_building_2_1: "Festungsbarracken"
 iv2_building_2_1_desc: "Gut geschützte Festungsbarracken sind sehr wichtig um unsere Truppen während einer Belagerung Schutz und Ruhe zu gönnen."
 iv2_building_2_2: "Zusätzliche Türme"
 iv2_building_2_2_desc: "Türme spielen schon seit jeher eine große Rolle bei der Abwehr von Sturmangriffen. Ein dichteres Netz von Türmen zu haben, erschwert die Einnahme einer Festung merklich."
 iv2_building_2_3: "Defensive Artillerie"
 iv2_building_2_3_desc: "Gut ausgerichtete und eingeschossene Festungsartillerie kann sich als sehr wertvoll erweisen, wenn ein Gegner das erste Mal eine Festung berennt."
 iv2_building_2_4: "Geschützte Nachschublager"
 iv2_building_2_4_desc: "Ohne ausreichende Vorräte an Nahrung und Munition kann eine Festung nicht gehalten werden. Da ist es umso wichtiger diese wertvollen Ressourcen vor dem Feind versteckt zu halten."
 iv2_building_3_0: "Industrialisierte Schiffszubehör Produktion"
 iv2_building_3_0_desc: "Indem wir die Produktion von Gütern für den Flottenbau zentralisieren, schaffen wir eine nie dagewesene Effizienz beim Bau von Schiffen."
 iv2_building_4_0: "Garde Barracken"
 iv2_building_4_0_desc: "Unsere Garde muss als Elite unserer Armee stets wachsen. Die Gardebarracken geben unseren Regimentern Schutz und Unterkunft."
 iv2_building_5_0: "Großschiffwerft"
 iv2_building_5_0_desc: "Unsere Großschiffwerften sind auf die Produktion von Großschifften spezialisisert."
 iv2_building_6_0: "Handelsschiffwerft"
 iv2_building_6_0_desc: "Unsere Handelsschiffwerften sind auf die Produktion von Handelsschiffen spezialisisert."
 iv2_building_7_0: "Galeerenwerft"
 iv2_building_7_0_desc: "Unsere Galeerenwerften sind auf die Produktion von Galeeren spezialisisert."
 iv2_building_8_0: "Palastflügel"
 iv2_building_8_0_desc: "Immer neuere und pompösere Anbauten an unseren Herrschaftspalast pointiert und vergrößert unser Prestige."
 iv2_building_9_0: "Administrative Akademie der Wissenschaften"
 iv2_building_9_0_desc: "Die Gelehrten unseres Landes studieren hier die Künste der Verwaltung."
 iv2_building_9_1: "Diplomatische Akademie der Wissenschaften"
 iv2_building_9_1_desc: "Die Gelehrten unseres Landes studieren hier die Künste der Diplomatie."
 iv2_building_9_2: "Armee Akademie der Wissenschaften"
 iv2_building_9_2_desc: "Die Gelehrten unseres Landes studieren hier die Künste des Landkrieges."
 iv2_building_9_3: "Marine Akademie der Wissenschaften"
 iv2_building_9_3_desc: "Die Gelehrten unseres Landes studieren hier die Künste des Krieges zur See."
 
 
