 iv2_ideagroup_title_navy_13: "Präsenzflotte Ideen"
 iv2_ga_ideagroup_navy_13_1: "Geschwader"
 iv2_ga_ideagroup_navy_13_1_desc: "Wir wollen in jeder Ecke der Welt ein Geschwader haben."
 iv2_ga_ideagroup_navy_13_2: "Idee der Präsenzflotte"
 iv2_ga_ideagroup_navy_13_2_desc: "Indem wir eine starke Flotte vorhalten, hindern wir unsere Feinde schon daran überhaupt darüber nachzudenken uns anzugreifen."
 iv2_ga_ideagroup_navy_13_3: "Strategischer Einfluss"
 iv2_ga_ideagroup_navy_13_3_desc: "Indem wir unsere Flotte als Drohkulisse vorhalten, schaffen wir uns Einfluss auf allen möglichen Feldern."
 iv2_ga_ideagroup_navy_13_4: "Jederzeitiges Auslaufen"
 iv2_ga_ideagroup_navy_13_4_desc: "Indem wir in der Lage sind, dass unsere Flotte jederzeit ausfläuft, um dem Feind zu begegnen, setzen wir ihn unter starken psychologischen Druck."
 iv2_ga_ideagroup_navy_13_5: "Abschreckung"
 iv2_ga_ideagroup_navy_13_5_desc: "Wir können den Feind mit unserer großen Flotte abschrecken. Dies macht unsere Küsten sicherer, obwohl unsere Flotte im Hafen ist."
 iv2_ga_ideagroup_navy_13_6: "Stärke bewahren"
 iv2_ga_ideagroup_navy_13_6_desc: "Indem wir versuchen durch unsere Abschreckung große Schlachten zu vermeiden, können wir in der Regel auch große Verluste vermeiden."
 iv2_ga_ideagroup_navy_13_7: "Entscheidungsschlacht"
 iv2_ga_ideagroup_navy_13_7_desc: "Reißen alle Stricke, können wir uns noch immer zu einer Entscheidungsschlacht mit unserer großen Flotte stellen!"
 
