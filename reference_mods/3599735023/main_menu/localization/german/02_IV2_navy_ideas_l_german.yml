 iv2_ideagroup_title_navy_8: "Handelsschifffokus"
 iv2_ga_ideagroup_navy_8_1: "Handelsschiff-Werften"
 iv2_ga_ideagroup_navy_8_1_desc: "Der Staat unterhält eigens Werften um sein Flottenbauprogramm zu guten Preisen zu finanzieren."
 iv2_ga_ideagroup_navy_8_2: "Eichen für den Schiffsbau"
 iv2_ga_ideagroup_navy_8_2_desc: "Je mehr unsere Schiffe aushalten, desto mehr können sie austeilen. Wir müssen dafür sorgen, dass für unsere Kriegsschiffe immer ein Vorrat des besten Eichenholzes auf Lager ist."
 iv2_ga_ideagroup_navy_8_3: "Handelstradition"
 iv2_ga_ideagroup_navy_8_3_desc: "Unsere Nation ist eine Handelsnation. Der Seehandel ist ein integraler Bestandteil unserer Strategie."
 iv2_ga_ideagroup_navy_8_4: "Flottenkadetten"
 iv2_ga_ideagroup_navy_8_4_desc: "Wenn wir es schaffen, die Flotte den zweiten und dritten Söhnen des Adels als großartige Karriere zu verkaufen, können wir ein professionelles Korps von Flottenoffizieren aufstellen, um unsere Geschützmannschaften anzuführen."
 iv2_ga_ideagroup_navy_8_5: "Große Handelsflotte"
 iv2_ga_ideagroup_navy_8_5_desc: "Wir unterhalten eine große Handelsflotte."
 iv2_ga_ideagroup_navy_8_6: "Händler Spionage"
 iv2_ga_ideagroup_navy_8_6_desc: "Unsere Händler verbessern nicht nur unseren Handel, sondern sammeln auch wertvolle Informationen über die Verteidigungsanlagen unserer Feinde."
 iv2_ga_ideagroup_navy_8_7: "Überlegene Seemannskunst"
 iv2_ga_ideagroup_navy_8_7_desc: "Ermöglicht uns die Umwandlung unserer Flotte zu einer erstklassigen Seestreitmacht mit Schiffen, Kapitänen und Matrosen von höchster Qualität."
 
