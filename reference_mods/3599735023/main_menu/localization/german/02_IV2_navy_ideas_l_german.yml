l_german:
 iv2_ideagroup_title_navy_1: "Maritime Handelsideen"
 iv2_ga_ideagroup_navy_1_1: "Überseehandel"
 iv2_ga_ideagroup_navy_1_1_desc: "Je länger die Reise, desto profitabler ist sie wahrscheinlich."
 iv2_ga_ideagroup_navy_1_2: "Übsersee-Handelsquartiere"
 iv2_ga_ideagroup_navy_1_2_desc: "Indem wir Besitzungen weit in Übersee in fremden Ländern einrichten, können wir unseren Handelseinfluss weit über unsere Grenzen hinaus ausdehnen."
 iv2_ga_ideagroup_navy_1_3: "Sturmsegel"
 iv2_ga_ideagroup_navy_1_3_desc: "Wir müssen sicherstellen, damit jedes unserer Handelsschiffe Sturmsegel an Bord hat."
 iv2_ga_ideagroup_navy_1_4: "Gute Seefahrer"
 iv2_ga_ideagroup_navy_1_4_desc: "Als Nation, die viele Handelsschiffe unterhält, sind auch unsere Seefahrer erfahren und zählen zu den besten der Welt."
 iv2_ga_ideagroup_navy_1_5: "Vielversprechende Kapitäne"
 iv2_ga_ideagroup_navy_1_5_desc: "Wir müssen die besten Kapitäne unserer Handelsschiffe für unsere Kriegsflotte rekrutieren."
 iv2_ga_ideagroup_navy_1_6: "Unbegrenzte Seeleute"
 iv2_ga_ideagroup_navy_1_6_desc: "Durch unseren florierenden Seehandel, mangelt es uns nie an Seeleuten. Zur Not verfplichten wir sie zwangsweise."
 iv2_ga_ideagroup_navy_1_7: "Faire Unteroffiziere"
 iv2_ga_ideagroup_navy_1_7_desc: "Faire Unteroffiziere machen die Stimmung an Bord aus und haben schon so manche Meuterei verhindert."
 
