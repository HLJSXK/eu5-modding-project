 iv2_ideagroup_title_navy_3: "Maritime Ideen"
 iv2_ga_ideagroup_navy_3_1: "Kupferböden"
 iv2_ga_ideagroup_navy_3_1_desc: "Holz mag das ideale Material für den Schiffsbau sein, aber es tendiert dazu, mit der Zeit zu verrotten. Wenn wir unsere Schiffe unterhalb der Wasserlinie mit Kupferbeschlägen ausstatten, können wir diesem Zerfall entgegenwirken, was wiederum längere Reisen ermöglicht."
 iv2_ga_ideagroup_navy_3_2: "Korvetten"
 iv2_ga_ideagroup_navy_3_2_desc: "Korvetten waren eine Klasse kleiner Kriegsschiffe, die zur Eskortierung verbündeter Schiffe und zur Störung des Feindes dienten. Ihre Stärke lag nicht in massiver Feuerkraft, sondern in Schnelligkeit und Manövrierfähigkeit."
 iv2_ga_ideagroup_navy_3_3: "Nationales Arsenal"
 iv2_ga_ideagroup_navy_3_3_desc: "Durch Einrichtung eines nationalen Arsenals zum Bau und zur Wartung unserer Kriegsschiffe gemäß einheitlicher Standards können wir eine größere Flotte bauen."
 iv2_ga_ideagroup_navy_3_4: "Erweiterte Nachschubkolonnen"
 iv2_ga_ideagroup_navy_3_4_desc: "Wenn wir mehr Ressourcen in unsere Nachschubkolonnen stecken, kann unsere Armee längere Zeit in feindlichem Gebiet verbringen."
 iv2_ga_ideagroup_navy_3_5: "Eichen für den Schiffsbau"
 iv2_ga_ideagroup_navy_3_5_desc: "Je mehr unsere Schiffe aushalten, desto mehr können sie austeilen. Wir müssen dafür sorgen, dass für unsere Kriegsschiffe immer ein Vorrat des besten Eichenholzes auf Lager ist."
 iv2_ga_ideagroup_navy_3_6: "Flottendrill"
 iv2_ga_ideagroup_navy_3_6_desc: "Im Chaos eines Seegefechts kann es vorkommen, dass ein Kriegsschiff für längere Zeit handlungsunfähig wird. Eine gut gedrillte Mannschaft wird wesentlich schneller wieder handlungsfähig sein als eine Durchschnittsbesatzung."
 iv2_ga_ideagroup_navy_3_7: "Handelsflotte"
 iv2_ga_ideagroup_navy_3_7_desc: "Lasst alle Handelsschiffe voller Stolz unsere Handelsflagge hissen, in der Gewissheit, dass unsere Flotte sie schützen wird, wenn sie in Not geraten."
 
