 iv2_ideagroup_title_navy_7: "Großkampfschiff Fokus"
 iv2_ga_ideagroup_navy_7_1: "Großschiff-Werften"
 iv2_ga_ideagroup_navy_7_1_desc: "Der Staat unterhält eigens Werften um sein Flottenbauprogramm zu guten Preisen zu finanzieren."
 iv2_ga_ideagroup_navy_7_2: "Eichen für den Schiffsbau"
 iv2_ga_ideagroup_navy_7_2_desc: "Je mehr unsere Schiffe aushalten, desto mehr können sie austeilen. Wir müssen dafür sorgen, dass für unsere Kriegsschiffe immer ein Vorrat des besten Eichenholzes auf Lager ist."
 iv2_ga_ideagroup_navy_7_3: "Massenproduktion"
 iv2_ga_ideagroup_navy_7_3_desc: "Wir tun alles um die Bauzeiten unserer Großschiffe zu verkürzen."
 iv2_ga_ideagroup_navy_7_4: "Schiffsartillerie"
 iv2_ga_ideagroup_navy_7_4_desc: "Wir können die Artillerie unserer Schiffe benutzen um auch Belagerungen zu Land zu unterstützen."
 iv2_ga_ideagroup_navy_7_5: "Doppelte Schiffsrümpfe"
 iv2_ga_ideagroup_navy_7_5_desc: "Doppelt verstärkte Schiffsrümpfe machen unsere Schiffe viel robuster."
 iv2_ga_ideagroup_navy_7_6: "Winterhafen"
 iv2_ga_ideagroup_navy_7_6_desc: "Wir stellen sicher, dass unsere Schiffe zu jeder Jahreszeit im Hafen sicher liegen. Denn der Winter naht."
 iv2_ga_ideagroup_navy_7_7: "Flottenkadetten"
 iv2_ga_ideagroup_navy_7_7_desc: "Wenn wir es schaffen, die Flotte den zweiten und dritten Söhnen des Adels als großartige Karriere zu verkaufen, können wir ein professionelles Korps von Flottenoffizieren aufstellen, um unsere Geschützmannschaften anzuführen."
 
