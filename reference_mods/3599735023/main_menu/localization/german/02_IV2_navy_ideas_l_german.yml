 iv2_ideagroup_title_navy_14: "Handelsflottenideen"
 iv2_ga_ideagroup_navy_14_1: "Handelsmarine"
 iv2_ga_ideagroup_navy_14_1_desc: "Eine große Handelsmarine schafft uns nicht nur Wohlstand, sondern auch große Präsenz auf den Weltmeeren."
 iv2_ga_ideagroup_navy_14_2: "Handelsstützpunkte"
 iv2_ga_ideagroup_navy_14_2_desc: "Wir unterhalten viele Handelsstützpunkte in fremden Ländern."
 iv2_ga_ideagroup_navy_14_3: "Kolonialer Handel"
 iv2_ga_ideagroup_navy_14_3_desc: "Der Handel mit den Kolonien ist eine wichtige Einnahmequelle für unsere Händler."
 iv2_ga_ideagroup_navy_14_4: "Silberflotten"
 iv2_ga_ideagroup_navy_14_4_desc: "Geht es darum die Silberflotten zu eskortieren oder zu überfallen? Je nach Weltlage, versteht sich."
 iv2_ga_ideagroup_navy_14_5: "Bewaffnete Handelsflotte"
 iv2_ga_ideagroup_navy_14_5_desc: "Unsere Handelsschiffe sind bis an die Zähne bewaffnet, um Piraten abzuschrecken."
 iv2_ga_ideagroup_navy_14_6: "Zweifacher Nutzen"
 iv2_ga_ideagroup_navy_14_6_desc: "In Kriegszeiten können unsere Handelsschiffe schnell zu Kriegsschiffen umgerüstet werden."
 iv2_ga_ideagroup_navy_14_7: "Drill der Mannschaft"
 iv2_ga_ideagroup_navy_14_7_desc: "Ständiger Drill an den Schiffskanonen sorgt für eine ordentliche Schlagkraft auf den Handelsschiffen."
 
