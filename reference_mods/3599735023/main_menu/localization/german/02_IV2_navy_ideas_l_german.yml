 iv2_ideagroup_title_navy_5: "Küstenpatroullie Ideen"
 iv2_ga_ideagroup_navy_5_1: "Seeüberwachung"
 iv2_ga_ideagroup_navy_5_1_desc: "Es ist wichtig unsere Gewässer zu überwachen und vor Piraten zu schützen."
 iv2_ga_ideagroup_navy_5_2: "Leuchtfeuer"
 iv2_ga_ideagroup_navy_5_2_desc: "Wir werden an unserer Küste Leuchtfeuer installieren, um unsere Bevölkerung schnell vor Angreifern zu warnen."
 iv2_ga_ideagroup_navy_5_3: "Küstenhäfen"
 iv2_ga_ideagroup_navy_5_3_desc: "Indem wir viele kleine Häfen an unserer Küste unterhalten, stärken wir nicht nur die Fischerei, sondern auch die Überwachung unserer Gewässer."
 iv2_ga_ideagroup_navy_5_4: "Küstenbefestigungen"
 iv2_ga_ideagroup_navy_5_4_desc: "Einige wenige Batterien können schon ausreichen, um einen Angriff sehr riskant und unattraktiv zu machen."
 iv2_ga_ideagroup_navy_5_5: "Regelmäßige Patrouillen"
 iv2_ga_ideagroup_navy_5_5_desc: "Regelmäßige Patroullien an unserer Küste stärken den Handel und geben unseren Händlern Sicherheit."
 iv2_ga_ideagroup_navy_5_6: "Piratengerichte"
 iv2_ga_ideagroup_navy_5_6_desc: "Werden wir Piraten habhaft, machen wir diesen einen kurzen Prozess."
 iv2_ga_ideagroup_navy_5_7: "Angriffe auf Piratennester"
 iv2_ga_ideagroup_navy_5_7_desc: "Machen wir Piratennester ausfindig, wird unsere gesamte Macht aufgefahren, um diese auszulöschen."
 
