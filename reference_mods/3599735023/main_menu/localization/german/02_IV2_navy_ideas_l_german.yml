 iv2_ideagroup_title_navy_11: "Admiralitätsideen"
 iv2_ga_ideagroup_navy_11_1: "Admiralität"
 iv2_ga_ideagroup_navy_11_1_desc: "Wir haben die Leitung unserer Kapitäne institutionalisisert und eine Admiralität gegründet."
 iv2_ga_ideagroup_navy_11_2: "Beförderungskommissionen"
 iv2_ga_ideagroup_navy_11_2_desc: "Beförderungskommissionen tragen dafür Sorge, dass die richtigen Leute befördert werden und nicht nur diejenigen mit den besten Beziehungen."
 iv2_ga_ideagroup_navy_11_3: "Logbücher"
 iv2_ga_ideagroup_navy_11_3_desc: "Wir verpflichten unsere Kapitäne Logbücher zu führen, um ihre Effektivität jederzeit überwachen zu können."
 iv2_ga_ideagroup_navy_11_4: "Generalinspekteure"
 iv2_ga_ideagroup_navy_11_4_desc: "Die Admiralität ist in der Lage Generalinspekteure überall dort hinzuschicken, wo unsere Marine aktiv ist."
 iv2_ga_ideagroup_navy_11_5: "Institutionalisiertes Training"
 iv2_ga_ideagroup_navy_11_5_desc: "Indem wir das Training unserer Offiziersanwärter vereinheitlichen, stellen wir sicher, dass die Fähigkeiten der Flotte auf einem hohen Niveau bleibt."
 iv2_ga_ideagroup_navy_11_6: "Regionale Kommandeure"
 iv2_ga_ideagroup_navy_11_6_desc: "Ist unsere Flotte in vielen unterschiedlichen Regionen unterwegs, müssen regionale Kommandeure eingesetzt werden, um die Befehlswege kurz zu halten."
 iv2_ga_ideagroup_navy_11_7: "Rotationsprinzip"
 iv2_ga_ideagroup_navy_11_7_desc: "Die Zeit auf See zehrt auch den stärksten Seebären nach einer Zeit aus. Wir müssen ein Rotationsprinzip etablieren, welches längeren Heimaturlaub für unsere Kapitäne und Mannschaften vorsieht."
 
