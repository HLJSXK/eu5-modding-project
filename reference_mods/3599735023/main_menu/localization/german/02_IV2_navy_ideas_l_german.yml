 iv2_ideagroup_title_navy_9: "Galeerenfokus"
 iv2_ga_ideagroup_navy_9_1: "Karthagos Hafen"
 iv2_ga_ideagroup_navy_9_1_desc: "Mit unserer Entscheidung uns auf Galeeren zu fokussieren, haben wir die Notwendigkeit geschaffen sehr viele Schiffe unterbringen zu müssen."
 iv2_ga_ideagroup_navy_9_2: "Galeerenwerften"
 iv2_ga_ideagroup_navy_9_2_desc: "Der Staat unterhält eigens Werften um sein Flottenbauprogramm zu guten Preisen zu finanzieren."
 iv2_ga_ideagroup_navy_9_3: "Verbesserte Rammböcke"
 iv2_ga_ideagroup_navy_9_3_desc: "Das Konzept, Kriegsschiffe mit Rammböcken auszustatten, ist Tausende von Jahren alt. Seitdem hat die Metallurgie aber große Fortschritte gemacht, und wir sollten sie zur Konstruktion soliderer Rammböcke nutzen."
 iv2_ga_ideagroup_navy_9_4: "Schiffsartillerie"
 iv2_ga_ideagroup_navy_9_4_desc: "Wenn wir nah an die Küste fahren können wir die Kanonen unserer Galeeren einsetzen um den Belgarungsfortschritt an Land zu unterstützen."
 iv2_ga_ideagroup_navy_9_5: "Verbesserte Seegefechtskoordination"
 iv2_ga_ideagroup_navy_9_5_desc: "Ermöglicht unseren Marineveteranen die Entwicklung neuer Methoden zur Steigerung der Effizienz unserer Flotte bei Seeblockaden."
 iv2_ga_ideagroup_navy_9_6: "Doppelte Schiffsrümpfe"
 iv2_ga_ideagroup_navy_9_6_desc: "Doppelt verstärkte Schiffsrümpfe machen unsere Schiffe viel robuster."
 iv2_ga_ideagroup_navy_9_7: "Überlegene Seemannskunst"
 iv2_ga_ideagroup_navy_9_7_desc: "Ermöglicht uns die Umwandlung unserer Flotte zu einer erstklassigen Seestreitmacht mit Schiffen, Kapitänen und Matrosen von höchster Qualität."
 
