 iv2_ideagroup_title_navy_12: "Marinesoldaten Ideen"
 iv2_ga_ideagroup_navy_12_1: "Marineinfanterie"
 iv2_ga_ideagroup_navy_12_1_desc: "Speziell ausgebildete Marinesoldaten, die dafür trainiert sind auf See und auf Land zu kämpfen haben einen großen Vorteil, wenn wir den Feind in Übersee angreifen wollen."
 iv2_ga_ideagroup_navy_12_2: "Operationen in Übersee"
 iv2_ga_ideagroup_navy_12_2_desc: "Ein Heer in Übersee zu versorgen und effektiv zu befehligen, stellt uns vor viele Herausforderungen."
 iv2_ga_ideagroup_navy_12_3: "Marinelogistik"
 iv2_ga_ideagroup_navy_12_3_desc: "Manchmal ist es die einzige Möglichkeit eine Armee in Übersee auch über See zu versorgen. Unsere Marine muss dafür ausgerüstet sein."
 iv2_ga_ideagroup_navy_12_4: "Nachschubkonvois"
 iv2_ga_ideagroup_navy_12_4_desc: "Konvois mit Nachschub von frischen Soldaten müssen bestmöglichst geschützt werden, damit sie an ihrem Ziel ankommen."
 iv2_ga_ideagroup_navy_12_5: "Trockenes Pulver"
 iv2_ga_ideagroup_navy_12_5_desc: "Das Nachführen von Artillerie ist ebenso wichtig, wie das Heranführen von Infanterie. Wir müssen sicherstellen, dass die wertvolle Ware in einem Stück am Ziel ankommt und das Pulver trocken bleibt."
 iv2_ga_ideagroup_navy_12_6: "Geteiltes Kommando"
 iv2_ga_ideagroup_navy_12_6_desc: "Marinesoldaten müssen je nach ihrem Oberbefehlshaber sowohl gegenüber der Marine, wie auch gegenüber dem Heer gehorsam sein."
 iv2_ga_ideagroup_navy_12_7: "Harte Männer"
 iv2_ga_ideagroup_navy_12_7_desc: "Es ist wichtig, dass sich unsere Marinesoldaten einen Ruf erwerben, der sie in der ganzen Welt bekannt macht."
 
