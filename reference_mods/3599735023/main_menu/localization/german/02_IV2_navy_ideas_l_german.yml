 iv2_ideagroup_title_navy_10: "Maritimes Imperium Ideen"
 iv2_ga_ideagroup_navy_10_1: "Überlegene Seemannskunst"
 iv2_ga_ideagroup_navy_10_1_desc: "Ermöglicht uns die Umwandlung unserer Flotte zu einer erstklassigen Seestreitmacht mit Schiffen, Kapitänen und Matrosen von höchster Qualität."
 iv2_ga_ideagroup_navy_10_2: "Ruhmreiche Flotte"
 iv2_ga_ideagroup_navy_10_2_desc: "Der Anblick unserer glorreichen, renommierten Flotte wird jeden Gegner vor Angst erzittern lassen."
 iv2_ga_ideagroup_navy_10_3: "Stolze Flotte"
 iv2_ga_ideagroup_navy_10_3_desc: "Unsere Flotte hat jedes Recht stolz auf ihre Schlagkraft zu sein."
 iv2_ga_ideagroup_navy_10_4: "Imperiale Flotte"
 iv2_ga_ideagroup_navy_10_4_desc: "Unsere Flotte ist es wert die eines Imperiums zu sein."
 iv2_ga_ideagroup_navy_10_5: "Seetradition"
 iv2_ga_ideagroup_navy_10_5_desc: "Wir sind schon lange eine Seefahrernation und bewahren uns deshalb unsere Marinetradition."
 iv2_ga_ideagroup_navy_10_6: "Persönliches Interesse"
 iv2_ga_ideagroup_navy_10_6_desc: "Unsere Herrscher haben ein persönliches Interesse, dass die Marine alles hat, was sie braucht."
 iv2_ga_ideagroup_navy_10_7: "Flottenbauprogramme"
 iv2_ga_ideagroup_navy_10_7_desc: "Wir sind jederzeit in der Lage die Ressourcen des Staates auf ein großes Flottenbauprogramm zu konzentrieren."
 
