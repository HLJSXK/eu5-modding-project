 iv2_ideagroup_title_navy_6: "Entdecker Ideen"
 iv2_ga_ideagroup_navy_6_1: "Koloniale Unternehmungen"
 iv2_ga_ideagroup_navy_6_1_desc: "Erlaubt es uns, mehr Kolonisten in unerforschte Gebiete zu entsenden."
 iv2_ga_ideagroup_navy_6_2: "Suche nach der Neuen Welt"
 iv2_ga_ideagroup_navy_6_2_desc: "Ermöglicht uns, in den Wettstreit der Entdeckernationen zur Erforschung der Gebiete außerhalb ihrer Landesgrenzen einzutreten, um so auf der Suche nach der Neuen Welt als erstes Land der Erde die Welt zu umsegeln."
 iv2_ga_ideagroup_navy_6_3: "Erforschung der Gebiete in Übersee"
 iv2_ga_ideagroup_navy_6_3_desc: "Die Reise nach Übersee ist zumeist eine Reise ohne Wiederkehr. Denn diejenigen, die nicht einer Seuche zum Opfer fallen, werden meist von der langen Überfahrt in die Heimat abgeschreckt. Wenn wir die Menschen daran erinnern, welche Reichtümer möglicherweise auf sie warten, können wir sie vielleicht zum Auswandern animieren."
 iv2_ga_ideagroup_navy_6_4: "Land der Möglichkeiten"
 iv2_ga_ideagroup_navy_6_4_desc: "Durch die Darstellung von Kolonien als jungfräuliche Gebiete, wo jeder Mann, und vielleicht auch einige Frauen, zu Reichtum kommen kann, werden die Menschen schneller in die Kolonien emigrieren. Das bedeutet, dass wir weniger Geld ausgeben müssen, um die Leute dazu zu bewegen."
 iv2_ga_ideagroup_navy_6_5: "Vizekönige"
 iv2_ga_ideagroup_navy_6_5_desc: "Vizekönige in unseren Kolonien ermöglicht uns eine effizientere Regierung. Dies verbessert die Verwaltung unserer Kolonien und erhöht die von ihnen erzeugten Einnahmen.""
 iv2_ga_ideagroup_navy_6_6: "Freie Kolonien"
 iv2_ga_ideagroup_navy_6_6_desc: "Die Zahl der Menschen, die bereit sind, unser großartiges Kolonialreich auszubauen, ist leider nicht grenzenlos. Abhilfe könnte das Versprechen auf ein eigenes Stück Land in Übersee schaffen. So würden vielleicht mehr Menschen ihr Glück in Übersee suchen. Und was das Beste daran ist: Land gibt es in den Kolonien nun wirklich genug."
 iv2_ga_ideagroup_navy_6_7: "Weltreich"
 iv2_ga_ideagroup_navy_6_7_desc: "Unser koloniales Engagement hat bei den Verwaltern der Kolonien zu einer veränderten Einstellung geführt. Dort sammeln sich nun keine Halsabschneider mit dem Hang zur Gewinnmaximierung mehr, sondern die talentierte Crème de la Crème der Gesellschaft. Dieser Fortschritt spiegelt sich auch in den Steuereinnahmen wider."
 
