 iv2_ideagroup_title_navy_15: "Enterideen"
 iv2_ga_ideagroup_navy_15_1: "Löschwasser"
 iv2_ga_ideagroup_navy_15_1_desc: "Feuer auf See ist tödlich. Löschwasser muss stets bereit stehen, auch wenn wir ein feindliches Schiff einnehmen wollen."
 iv2_ga_ideagroup_navy_15_2: "Verbesserte Rammböcke"
 iv2_ga_ideagroup_navy_15_2_desc: "Das Konzept, Kriegsschiffe mit Rammböcken auszustatten, ist Tausende von Jahren alt. Seitdem hat die Metallurgie aber große Fortschritte gemacht, und wir sollten sie zur Konstruktion soliderer Rammböcke nutzen."
 iv2_ga_ideagroup_navy_15_3: "Entergruppen"
 iv2_ga_ideagroup_navy_15_3_desc: "Indem wir unseren Flottenoffizieren beibringen, Enteraktionen gegen Feindschiffe auszuführen, können wir selbst beim Kampf gegen überlegene feindliche Flotten Vorteile in Seeschlachten erzielen."
 iv2_ga_ideagroup_navy_15_4: "Säbelkampf"
 iv2_ga_ideagroup_navy_15_4_desc: "Der Säbel ist eine hervorragende Waffe für den Enterkampf."
 iv2_ga_ideagroup_navy_15_5: "Kleinkaliber Waffen"
 iv2_ga_ideagroup_navy_15_5_desc: "Kleinkaliber Pistolen und kleinere Gewehre sind leicht zu handhaben und tödlich im Enterkampf."
 iv2_ga_ideagroup_navy_15_6: "Rumpfbesatzung"
 iv2_ga_ideagroup_navy_15_6_desc: "Ist ein Schiff eingenommen, muss die Mannschaft in der Lage sein, eine Rumpfbesatzung zu stellen, um das neue Schiff zu übernehmen."
 iv2_ga_ideagroup_navy_15_7: "Zielt auf den Kapitän!"
 iv2_ga_ideagroup_navy_15_7_desc: "Wird der Kapitän gefangen genommen oder getötet, ist das Entern in der Regel erfolgreich."
 
