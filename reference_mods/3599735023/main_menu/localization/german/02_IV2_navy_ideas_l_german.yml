 iv2_ideagroup_title_navy_2: "Flottenbasis Ideen"
 iv2_ga_ideagroup_navy_2_1: "Baseneroberung"
 iv2_ga_ideagroup_navy_2_1_desc: "Als Seefahrernation haben wir ein großes Bedürfnis nach Marinebasen. \n§GKriegsgrund§W gegen alle Küstenprovinzen von nicht Primitiven in Kolonialreichweite."
 iv2_ga_ideagroup_navy_2_2: "Notwendigkeit von Überseebasen"
 iv2_ga_ideagroup_navy_2_2_desc: "Ist immer eine Basis in der Nähe, stärkt das die Überlebensfähigkeit unserer Schiffe und Mannschaften."
 iv2_ga_ideagroup_navy_2_3: "Garnisionsflotte"
 iv2_ga_ideagroup_navy_2_3_desc: "Eine kleine, wenn auch unbedeutende Flotte, die unsere Basen schützt, kann sich sehr effektiv erweisen."
 iv2_ga_ideagroup_navy_2_4: "Basengarnision"
 iv2_ga_ideagroup_navy_2_4_desc: "Wir brauchen eine große Anzahl an Seeleuten und Soldaten um unsere Basen zu bemannen."
 iv2_ga_ideagroup_navy_2_5: "Erfahrene Seeleute"
 iv2_ga_ideagroup_navy_2_5_desc: "Durch unsere zahlreichen Basen, ziehen wir erfahrene Seeleute an, die wir anheuern können."
 iv2_ga_ideagroup_navy_2_6: "See zu Land Gefecht"
 iv2_ga_ideagroup_navy_2_6_desc: "Ist es einmal nötig eine Basis zu erobern, ist es sinnvoll mit dem Beschuss der Verteidigungsanlagen von See zu beginnen."
 iv2_ga_ideagroup_navy_2_7: "Werften in Übersee"
 iv2_ga_ideagroup_navy_2_7_desc: "Die Reparatur von Schiffen ist wichtig und schwierig. Experten in Übersee zu haben, kann sich nur als geniale Idee erweisen."
 
