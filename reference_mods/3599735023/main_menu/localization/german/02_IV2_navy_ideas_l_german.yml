 iv2_ideagroup_title_navy_4: "Maritime Infrastrukturideen"
 iv2_ga_ideagroup_navy_4_1: "Organisierte Produktion"
 iv2_ga_ideagroup_navy_4_1_desc: "Wir organisieren die Produktion wichtiger Nachschubgüter für unsere Marine und siedeln die Produktionsgebäude nahe bei unseren Häfen an."
 iv2_ga_ideagroup_navy_4_2: "Holzindustrie"
 iv2_ga_ideagroup_navy_4_2_desc: "Wir brauchen eine Holzindustrie, die in der Lage ist ausreichend Material für eine große Flotte zu liefern."
 iv2_ga_ideagroup_navy_4_3: "Baumpflanzungen"
 iv2_ga_ideagroup_navy_4_3_desc: "Wir fällen viele Bäume für unsere Schiffe. Die richtigen Bäume nachzupflanzen wird sich einmal als sehr wertvoll erweisen und kostet uns nicht viel."
 iv2_ga_ideagroup_navy_4_4: "Staatliche Schiffszimmerleute"
 iv2_ga_ideagroup_navy_4_4_desc: "Indem wir eine große Anzahl an Zimmerleuten für unsere Werften verpflichten, können wir schnell Schiffe bauen."
 iv2_ga_ideagroup_navy_4_5: "Industrieller Schiffsbau"
 iv2_ga_ideagroup_navy_4_5_desc: "Stimmen wir unsere Produktion perfekt ab, können wir Schiffe in unglaublicher Geschwindigkeit bauen."
 iv2_ga_ideagroup_navy_4_6: "Produktionslinie"
 iv2_ga_ideagroup_navy_4_6_desc: "Stimmen wir unsere Produktionslinien perfekt aufeinander ab, werden wir niemals Mangel an Baumaterialien haben."
 iv2_ga_ideagroup_navy_4_7: "Große Lager"
 iv2_ga_ideagroup_navy_4_7_desc: "Indem wir große Lager von Baumaterialien und Ersatzteilen vorhalten, können wir unsere Schiffe schnell reparieren oder auf Verluste mit Neubauten reagieren."
 
