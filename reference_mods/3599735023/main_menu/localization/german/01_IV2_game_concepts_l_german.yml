 game_concept_iv2_gc_idea_group_limit_adm_desc: "Das harte Ideengruppenlimit kann in den Spieleinstellungen erhöht werden. Schaltet neue Ideengruppen frei in dem ihr [iv2_gc_innovation_adm|e] ausgebt."
