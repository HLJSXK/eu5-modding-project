 game_concept_iv2_innovation_points: "Innovationspunkte"
 game_concept_iv2_innovation_points_desc: "Innovationspunkte werden durch die Mod [iv2_mod|e] hinzugefügt. Es gibt vier Kategorien, Administrativ, Diplomatie, Armee und Marine. Sie werden benötigt, um die jeweiligen Ideengruppen und Ideen ihrer Kategorien freizuschalten."
 
