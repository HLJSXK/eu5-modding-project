 game_concept_iv2_gc_progress_adm: "Administrativer Fortschritt"
 game_concept_iv2_gc_progress_adm_desc: "Administrative Fortschritt iwird durch hohe [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [prestige|e] und [iv2_researcher_adm|e]. Es wird benötigt um [iv2_gc_idea_group_adm|e], [iv2_gc_tradition_adm|e] und [iv2_gc_national_idea_adm|e] freizuschalten."
 game_concept_iv2_gc_progress_dip: "Diplomatischer Fortschritt"
 game_concept_iv2_gc_progress_dip_desc: "Diplomatischer Fortschritt iwird durch hohe [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [prestige|e] und [iv2_researcher_dip|e]. Es wird benötigt um [iv2_gc_idea_group_dip|e], [iv2_gc_tradition_dip|e] und [iv2_gc_national_idea_dip|e] freizuschalten."
 game_concept_iv2_gc_progress_army: "Armee Fortschritt"
 game_concept_iv2_gc_progress_army_desc: "Diplomatischer Fortschritt iwird durch hohe [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [army_tradition|e], im [war|e], und [iv2_researcher_army|e]. Es wird benötigt um [iv2_gc_idea_group_army|e], [iv2_gc_tradition_army|e] und [iv2_gc_national_idea_army|e] freizuschalten."
 game_concept_iv2_gc_progress_navy: "Marine Fortschritt"
 game_concept_iv2_gc_progress_navy_desc: "Diplomatischer Fortschritt iwird durch hohe [legitimacy|e], [republican_tradition|e], [devotion|e], [horde_unity|e], [tribal_cohesion|e], [stability|e], [navy_tradition|e], im [war|e] bei Unterhalt einer Marine und [iv2_researcher_navy|e]. Es wird benötigt um [iv2_gc_idea_group_navy|e], [iv2_gc_tradition_navy|e] und [iv2_gc_national_idea_navy|e] freizuschalten."
 
 
 game_concept_iv2_gc_national_ideas: "Nationale Ideen"
 game_concept_iv2_gc_national_ideas_desc: "Nationale Ideen sind ein [iv2_mod|e] Feature das es Ländern ermöglicht sich individuelle Boni auszusuchen. Bei dieser Variante sind die Boni für einzelne Länder vorgegeben."
