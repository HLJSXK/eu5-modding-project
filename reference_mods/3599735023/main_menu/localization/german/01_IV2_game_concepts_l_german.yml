 game_concept_iv2_mod: "Idee Variation 2"
 game_concept_iv2_mod_desc: "Diese Mod fügt ein Ideensystem wie bei Europa Universalis IV hinzu."
 
 game_concept_iv2_researcher: "Forscher"
 game_concept_iv2_researcher_desc: "Forscher werden von der [iv2_mod|e] Mod als spezieller Agententyp hinzugefügt. Sie generieren [iv2_innovation_points|e] nach ihren [iv2_researcher_skill|e] und kosten jeden Monat [iv2_researcher_upkeep|e]."
 
 game_concept_iv2_researchers: "Forscher"
 game_concept_iv2_researchers_desc: "$game_concept_iv2_researcher_desc$"
 
 game_concept_iv2_researcher_skill: "Forscher Fähigkeiten"
 game_concept_iv2_researcher_skill_desc: "Innovationspunkte durch Forscher Fähigkeiten werden so berechnet:\n( (Adm Fähigkeit + Dip Fähigkeit + Mil Fähigkeit) / 2) + (Dominante Fähigkeit der Forschungskategorie) * 0.015 \nDie Höhe des [iv2_researcher_upkeep|e] hängt von den Fähigkeiten der Forscher ab."
 
 game_concept_iv2_researcher_upkeep: "Forscher Unterhalt"
 game_concept_iv2_researcher_upkeep_desc: "Der Forscherunterhalt wird wie folgt berechnet:\n( ( Anzahl erforschter Technologien * Dominante Fähigkeit von Forscher ) + ( Basis Wirtschaftskraft von [Player.GetNameWithNoTooltip] ) * ( Anzahl erforschter Technologien * 0.05 ) * 0.00007 * Unterhaltslevel"
 
 game_concept_iv2_researcher_adm: "Verwaltungs Forscher"
 game_concept_iv2_researcher_adm_desc: "Der Verwaltungs Forscher wird eure Verwaltungsforschungspunkte signifikant erhöhen."
 game_concept_iv2_researcher_dip: "Diplomatischer Forscher"
 game_concept_iv2_researcher_dip_desc: "Der Diplomatischer Forscher wird eure Diplomatischer Forschungspunkte signifikant erhöhen."
 game_concept_iv2_researcher_army: "Armee Forscher"
 game_concept_iv2_researcher_army_desc: "Der Armee Forscher wird eure Armee Forschungspunkte signifikant erhöhen."
 game_concept_iv2_researcher_navy: "Marine Forscher"
 game_concept_iv2_researcher_navy_desc: "Der Marine Forscher wird eure Marine Forschungspunkte signifikant erhöhen."
 
 game_concept_iv2_gc_innovation_adm: "Verwaltungsforschungspunkte"
 game_concept_iv2_gc_innovation_adm_desc: "Verwaltungs Forschungspunkte werden benötigt um neue Administrative Ideengruppen und neue Administrative Ideen freizuschalten."
 game_concept_iv2_gc_innovation_dip: "Diplomatische Forschungspunkte"
 game_concept_iv2_gc_innovation_dip_desc: "Diplomatische Forschungspunkte werden benötigt um neue Diplomatische Ideengruppen und neue Diplomatische Ideen freizuschalten."
 game_concept_iv2_gc_innovation_army: "Armee Forschungspunkte"
 game_concept_iv2_gc_innovation_army_desc: "Armee Forschungspunkte werden benötigt um neue Armee Ideengruppen und neue Armee Ideen freizuschalten."
 game_concept_iv2_gc_innovation_navy: "Marine Forschungspunkte"
 game_concept_iv2_gc_innovation_navy_desc: "Marine Forschungspunkte werden benötigt um neue Marine Ideengruppen und neue Marine Ideen freizuschalten."
 
 game_concept_iv2_gc_innovation_max_adm: "Maximale Verwaltungs Forschungspunkte"
 game_concept_iv2_gc_innovation_max_adm_desc: "Nur eine gewisse Anzahl an [iv2_gc_innovation_adm|e] kann gespeichert werden. Das Limit an speicherbaren Punkten kann in den Spieleinstellungen erhöht werden."
