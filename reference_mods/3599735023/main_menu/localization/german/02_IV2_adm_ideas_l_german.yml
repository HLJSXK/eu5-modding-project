 iv2_ideagroup_title_adm_25: "Protestantische Ideen"
 iv2_ga_ideagroup_adm_25_1: "Religionskriege"
 iv2_ga_ideagroup_adm_25_1_desc: "Gerade erst ist unsere Religion entstanden, da müssen wir uns schon als Ketzer verteidigen. Doch wir werden auch gegen unsere Feinde in die Offensive gehen."
 iv2_ga_ideagroup_adm_25_2: "Missionarsschulen"
 iv2_ga_ideagroup_adm_25_2_desc: "Es gibt zwar keinen Mangel an Menschen, die den wahren Glauben verkünden möchten, doch meist ist es so, dass diese mehr schaden als nützen. Mit speziellen Schulen zur Ausbildung der Missionare werden wir sicherstellen, dass wir mehr Menschen haben, die neben dem Wunsch auch die Fähigkeit zur Verkündung des Glaubens mitbringen."
 iv2_ga_ideagroup_adm_25_3: "Erleuchtet die im Dunkeln Gelassenen"
 iv2_ga_ideagroup_adm_25_3_desc: "Verbreitet das Wort des Protestantismus und überzeugt weitere sich uns anzuschließen."
 iv2_ga_ideagroup_adm_25_4: "Göttliche Vorherrschaft"
 iv2_ga_ideagroup_adm_25_4_desc: "Es ist von größter Wichtigkeit, dass wir unser Land und die es umgebenden Grenzen von den Ungläubigen, die unser Land belästigen, frei machen."
 iv2_ga_ideagroup_adm_25_5: "Begeisterung des Widerstands"
 iv2_ga_ideagroup_adm_25_5_desc: "Die Menschen sind bereit für ihre neue Art der Religion mit dem Leben zu bezahlen."
 iv2_ga_ideagroup_adm_25_6: "Renaissance"
 iv2_ga_ideagroup_adm_25_6_desc: "Durch unsere neue, liberalere Religion sind große Zeiten der Kultur herein gebrochen. Wissenschaftler werden nicht mehr verfolgt und können relativ frei schalten und walten."
 iv2_ga_ideagroup_adm_25_7: "Religiöse Berater"
 iv2_ga_ideagroup_adm_25_7_desc: "Kirchenmänner verstehen es immer mehr sich für den Staat profitabel einzubringen und nicht nur für ihre eigenen Interessen."
 
