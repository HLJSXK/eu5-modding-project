 iv2_ideagroup_title_adm_32: "Nordische Ideen"
 iv2_ga_ideagroup_adm_32_1: "Effektive Plündergruppen"
 iv2_ga_ideagroup_adm_32_1_desc: "Wir müssen unsere Männer in kleine, effiziente Einheiten aufteilen um den Reichtum anderer in unserem zu verwandeln. 
 iv2_ga_ideagroup_adm_32_2: "Wahre Nordmänner"
 iv2_ga_ideagroup_adm_32_2_desc: "Unsere Männer sind die tapfersten und kühnsten Krieger dieser Welt."
 iv2_ga_ideagroup_adm_32_3: "Die Vinland-Sage"
 iv2_ga_ideagroup_adm_32_3_desc: "Wir müssen die Schwachen Leute dieses Landes für unsere Zwecke nutzen."
 iv2_ga_ideagroup_adm_32_4: "Holzindustrie"
 iv2_ga_ideagroup_adm_32_4_desc: "Mit unseren großen nördlichen Wäldern werden wir in der Lage sein viele Schiffe zu günstigen Bedingungen zu bauen."
 iv2_ga_ideagroup_adm_32_5: "Nehmt alles!"
 iv2_ga_ideagroup_adm_32_5_desc: "Verbrennt ihre Felder und ihre Dörfer und nehmt so viel ihr tragen könnt!"
 iv2_ga_ideagroup_adm_32_6: "Fördert nordische Tempel"
 iv2_ga_ideagroup_adm_32_6_desc: "Wir müssen unsere neuen Untertan zum wahren Glauben führen."
 iv2_ga_ideagroup_adm_32_7: "Neue Farming Methoden"
 iv2_ga_ideagroup_adm_32_7_desc: "Wir müssen unseren Leuten beibringen ihr Land effizient zu bestellen."
 
