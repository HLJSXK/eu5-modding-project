 iv2_ideagroup_title_adm_14: "Kabinettsideen"
 iv2_ga_ideagroup_adm_14_1: "Aufstieg durch Fähigkeiten"
 iv2_ga_ideagroup_adm_14_1_desc: "Durch die Förderung von Menschen, die aufgrund ihrer Fähigkeiten aufgestiegen sind, stellen wir sicher, dass wir Kompetenz in unsere Regierungsangelegenheiten einbringen."
 iv2_ga_ideagroup_adm_14_2: "Grundlagen der Integration"
 iv2_ga_ideagroup_adm_14_2_desc: "Unser Kabinett ist in der Lage, die Integration neuer Länder in unsere Nation zu begleiten und zu unterstützen."
 iv2_ga_ideagroup_adm_14_3: "Steuereintreiber"
 iv2_ga_ideagroup_adm_14_3_desc: "Durch eine strenge, aber regelbasierte Steuererhebung schaffen wir ein faires Steuersystem."
 iv2_ga_ideagroup_adm_14_4: "Ständiges Kabinett"
 iv2_ga_ideagroup_adm_14_4_desc: "Gute Führung erfordert ausreichend Personal."
 iv2_ga_ideagroup_adm_14_5: "Bildung der Oberschicht"
 iv2_ga_ideagroup_adm_14_5_desc: "Unser Fokus liegt in erster Linie auf der Bildung unserer herrschenden Klassen."
 iv2_ga_ideagroup_adm_14_6: "Renommiertes Kabinett"
 iv2_ga_ideagroup_adm_14_6_desc: "Kompetenz im Kabinett kann durchaus auf die Nation abfärben."
 iv2_ga_ideagroup_adm_14_7: "Guter Überblick"
 iv2_ga_ideagroup_adm_14_7_desc: "Unser Kabinett ist darauf trainiert, einen guten Überblick über das Land zu behalten."
 
