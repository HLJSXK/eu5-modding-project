 iv2_ideagroup_title_adm_12: "Zentralismus Ideen"
 iv2_ga_ideagroup_adm_12_1: "Minister für Bauorganisation"
 iv2_ga_ideagroup_adm_12_1_desc: "Ein Bauminister wird unsere Projektzeit deutlich verringern."
 iv2_ga_ideagroup_adm_12_2: "Zentrale Produktion"
 iv2_ga_ideagroup_adm_12_2_desc: "Unsere Produktion an zentralen Stellen zusammen zu fassen wird unsere Produktion deutlich steigern."
 iv2_ga_ideagroup_adm_12_3: "Großstadt Ausbau"
 iv2_ga_ideagroup_adm_12_3_desc: "Wir setzen auf große Städte und haben Erfahrungen mit deren effektiven Ausbau."
 iv2_ga_ideagroup_adm_12_4: "Lokaler Handel"
 iv2_ga_ideagroup_adm_12_4_desc: "Oftmals ist der Handel in einer einzelnen Provinz schon sehr erträglich."
 iv2_ga_ideagroup_adm_12_5: "Zentrale Rekrutierung"
 iv2_ga_ideagroup_adm_12_5_desc: "Durch unsere große Bevölkerungskonzentration kommen wir schnell an einen Grundstock an Rekruten. "
 iv2_ga_ideagroup_adm_12_6: "Zentralverwaltung"
 iv2_ga_ideagroup_adm_12_6_desc: "Unsere Zentralverwaltung ist effizient, muss sich aber auch auf eine begrenzte Anzahl von Provinzen fokussieren. Wir können so mit weniger Ressourcen mehr Truppen unterhalten."
 iv2_ga_ideagroup_adm_12_7: "Manufakturexpansion"
 iv2_ga_ideagroup_adm_12_7_desc: "Wir werden unsere Manufakturen extrem dicht ausbauen und so unseren Gewinn maximieren."
 
