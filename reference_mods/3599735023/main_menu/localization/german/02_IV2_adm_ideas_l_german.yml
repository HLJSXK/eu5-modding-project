 iv2_ideagroup_title_adm_51: "Schiitische Ideen"
 iv2_ga_ideagroup_adm_51_1: "Das Imamat"
 iv2_ga_ideagroup_adm_51_1_desc: "Der oberste Imam muss immer ein Mitglied aus der Linie des Propheten sein!"
 iv2_ga_ideagroup_adm_51_2: "Die Schlacht von Kerbala"
 iv2_ga_ideagroup_adm_51_2_desc: "Die Schlacht von Kerbala markiert einen Meilenstein in der schiitischen Geschichte, nachdem die Bewohner des Ortes Kufra den Imam al Husain verrieten."
 iv2_ga_ideagroup_adm_51_3: "Ahl al-bait"
 iv2_ga_ideagroup_adm_51_3_desc: "Heute wird dieser Begriff fast ausschließlich für die Familie bzw. die Nachkommen des Propheten Mohammed verwendet, wobei die Grenze dieses Personenkreises je nach Lehrrichtung und Konfession unterschiedlich weit gezogen wird. Die Umaiyaden und Abbasiden beanspruchten diesen Teile beide für sich."
 iv2_ga_ideagroup_adm_51_4: "Isma"
 iv2_ga_ideagroup_adm_51_4_desc: "Die oberste Imame sind unfehlbar und können nicht sündigen."
 iv2_ga_ideagroup_adm_51_5: "Tradition der Religionsschulen"
 iv2_ga_ideagroup_adm_51_5_desc: "Der schiitische Glauben hat viele unterschiedliche Religionsschulen. Im gegenseitigen Austausch kann man viel voneinander lernen."
 iv2_ga_ideagroup_adm_51_6: "Dschihad"
 iv2_ga_ideagroup_adm_51_6_desc: "Auch der schiitische Glauben verlangt es die Ungläubigen auszumerzen."
 iv2_ga_ideagroup_adm_51_7: "Verbreitung der Lehre"
 iv2_ga_ideagroup_adm_51_7_desc: "Es ist wichtig die schiitische Lehre überall zu verbreiten."
 
