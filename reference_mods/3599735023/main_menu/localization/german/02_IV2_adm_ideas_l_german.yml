 iv2_ideagroup_title_adm_26: "Reformierte Ideen"
 iv2_ga_ideagroup_adm_26_1: "Erleuchtet die im Dunkeln Gelassenen"
 iv2_ga_ideagroup_adm_26_1_desc: "Verbreitet das Wort des Reformierten Protestantismus und überzeugt weitere sich uns anzuschließen."
 iv2_ga_ideagroup_adm_26_2: "Toleranz der Häretiker"
 iv2_ga_ideagroup_adm_26_2_desc: "Unsere Religion ist toleranterr gegenüber anders Gläubigen als andere Religionen."
 iv2_ga_ideagroup_adm_26_3: "Religiöser Eifer"
 iv2_ga_ideagroup_adm_26_3_desc: "Wir werden die Festen unserer Feinde erstürmen!"
 iv2_ga_ideagroup_adm_26_4: "Abbau des Protektionismus"
 iv2_ga_ideagroup_adm_26_4_desc: "Der Abbau von religiösen Vorurteilen hilft uns beim Aufbau des Freihandels."
 iv2_ga_ideagroup_adm_26_5: "Quasi-Religionsfreiheit"
 iv2_ga_ideagroup_adm_26_5_desc: "Im Grunde ist es dem Staat egal, wer eine andere Religion verfolgt."
 iv2_ga_ideagroup_adm_26_6: "Neue Ordnung"
 iv2_ga_ideagroup_adm_26_6_desc: "Unsere neue, liberale Ordnung hilft uns die Stabilität des Reiches aufrecht zu erhalten."
 iv2_ga_ideagroup_adm_26_7: "Religiöse Energie"
 iv2_ga_ideagroup_adm_26_7_desc: "Aus unserem neuen Weg ist eine Energie entwachsen, die ihres Gleichen sucht. Es ist an uns sie richtig einzusetzen." 
 
