 ## (IV 2 Ideagroup Templates 2 loc)
 
 iv2_ideagroup_title_adm_1: "Innovationsideen"
 iv2_ga_ideagroup_adm_1_1: "Mäzen der Künste"
 iv2_ga_ideagroup_adm_1_1_desc: "Unser Streben nach einer kulturell kultivierten Gesellschaft beginnt hier. Unsere künstlerischen Wunder werden als die großartigsten unserer Zeit in die Geschichte eingehen."
 iv2_ga_ideagroup_adm_1_2: "Pragmatismus"
 iv2_ga_ideagroup_adm_1_2_desc: "Zu viele Länder lassen ihre Politik von der Wahrnehmung des Landes bestimmen. Das ist töricht – wenn Söldner unseren Bedürfnissen besser entsprechen, werden wir sie einsetzen, anstatt in ein teures stehendes Heer zu investieren."
 iv2_ga_ideagroup_adm_1_3: "Wissenschaftliche Revolution"
 iv2_ga_ideagroup_adm_1_3_desc: "Wir sollten eine soziale und wirtschaftliche Revolution anstreben, die von technologischen Erfindungen und dem Übergang von einer Agrargesellschaft zu einer Industriegesellschaft geprägt ist."
 iv2_ga_ideagroup_adm_1_4: "Wissenstransfer"
 iv2_ga_ideagroup_adm_1_4_desc: "Erfahrung zu bewahren ist das Wichtigste für ein Land. Wir müssen sicherstellen, dass diejenigen, die im Kampf dienen, dieses Wissen durch ein Mentoring-System an die jüngeren Rekruten weitergeben."
 iv2_ga_ideagroup_adm_1_5: "Frühe Propaganda"
 iv2_ga_ideagroup_adm_1_5_desc: "Indem wir die Unterstützung unserer Bevölkerung sichern, können wir ein stabileres Land schaffen."
 iv2_ga_ideagroup_adm_1_6: "Neue Wege"
 iv2_ga_ideagroup_adm_1_6_desc: "Wir werden neue Wege beschreiten und das Leben aller verbessern."
 iv2_ga_ideagroup_adm_1_7: "Innovationskraft"
 iv2_ga_ideagroup_adm_1_7_desc: "Wir fördern innovatives Denken und Fortschritt."
 
