 iv2_ga_ideagroup_adm_33_1: "Der richtige Blick"
 iv2_ga_ideagroup_adm_33_1_desc: "Seht die Realität als das was sie ist und nicht wie sie erscheint."
 iv2_ga_ideagroup_adm_33_2: "Die richtige Absicht"
