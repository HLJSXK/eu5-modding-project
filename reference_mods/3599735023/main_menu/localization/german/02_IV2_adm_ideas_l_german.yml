 iv2_ideagroup_title_adm_44: "Fetischismus Ideen"
 iv2_ga_ideagroup_adm_44_1: "Geschichtenerzähler"
 iv2_ga_ideagroup_adm_44_1_desc: "Wir haben eine lange Tradition von alten Männern, die von Dorf zu Dorf wandern und die alten Geschichten verbreiten."
 iv2_ga_ideagroup_adm_44_2: "Unerschütterlicher Mut"
 iv2_ga_ideagroup_adm_44_2_desc: "Unsere Männer stürmen auch in die Feuerbrunst um einen Feind zu vernichten."
 iv2_ga_ideagroup_adm_44_3: "Kriegskameradschaft"
 iv2_ga_ideagroup_adm_44_3_desc: "Wir werden unsere Männer im Krieg immer unterstützen."
 iv2_ga_ideagroup_adm_44_4: "Gotteskrieger"
 iv2_ga_ideagroup_adm_44_4_desc: "Wir werden unsere Feinde im Namen unserer Götter töten."
 iv2_ga_ideagroup_adm_44_5: "Kampfeslust"
 iv2_ga_ideagroup_adm_44_5_desc: "Unsere Leute sind immer kampfeslustig."
 iv2_ga_ideagroup_adm_44_6: "Lagerfeuer"
 iv2_ga_ideagroup_adm_44_6_desc: "Am Lagerfeuer hören wir uns die Bitten unserer Untergebenen an."
 iv2_ga_ideagroup_adm_44_7: "Alte Geschichten"
 iv2_ga_ideagroup_adm_44_7_desc: "Wir können alle Menschen mit den Geschichten über unsere Götter faszinieren."

