 iv2_ideagroup_title_adm_35: "Katharische Ideen"
 iv2_ga_ideagroup_adm_35_1: "Gleichberechtigung der Frau"
 iv2_ga_ideagroup_adm_35_1_desc: "Die Gleichberechtigung der Frau spielt eine große Rolle i nder katharischen Ideologie."
 iv2_ga_ideagroup_adm_35_2: "Die reinen Menschen"
 iv2_ga_ideagroup_adm_35_2_desc: "All tierische Nahrung durfte den Katharern nicht über die Zunge gehen (manchmal mit der Ausnahme von Fisch)."
 iv2_ga_ideagroup_adm_35_3: "Willensstärke"
 iv2_ga_ideagroup_adm_35_3_desc: "Wir werden in unserem Glauben ausharren und sind von unserem Tun mit ganzer Kraft überzeugt."
 iv2_ga_ideagroup_adm_35_4: "Die Lehren Jesu"
 iv2_ga_ideagroup_adm_35_4_desc: "Wir werden uns auf die Lehren Jesu konzentrieren und dabei alle Quellen zu Rate ziehen, die wir finden können."
 iv2_ga_ideagroup_adm_35_5: "Geschlechterliche Kooperation"
 iv2_ga_ideagroup_adm_35_5_desc: "Männer und Frauen arbeiten in der katharischen Gesellschaft zusammen."
 iv2_ga_ideagroup_adm_35_6: "Friedliebende Menschen"
 iv2_ga_ideagroup_adm_35_6_desc: "Das Töten widerstrebt den Katharern, sie halten sich soweit sie können aus kriegerischen Auseinandersetzungen raus."
 iv2_ga_ideagroup_adm_35_7: "Bildet die Armen"
 iv2_ga_ideagroup_adm_35_7_desc: "Die Katharer glaubten, dass sie durch Bildung den Weg ins Paradies finden könnten. Darum müssen auch die Ärmsten Bildung erfahren."
 
