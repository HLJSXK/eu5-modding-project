 iv2_ideagroup_title_adm_23: "Stammesideen"
 iv2_ga_ideagroup_adm_23_1: "Das Große Gesetz"
 iv2_ga_ideagroup_adm_23_1_desc: "Indem wir unser Volk durch gemeinsame Prinzipien, eine Verfassung, zusammenhalten, können wir uns für unser aller Wohl einsetzen."
 iv2_ga_ideagroup_adm_23_2: "Handel mit Ausländern"
 iv2_ga_ideagroup_adm_23_2_desc: "Durch den Handel mit Menschen anderer Kulturen und aus fernen Ländern werden wir mit neuen Ideen konfrontiert."
 iv2_ga_ideagroup_adm_23_3: "Krieger"
 iv2_ga_ideagroup_adm_23_3_desc: "Unsere Kultur hat eine lange Tradition von Übergangsriten für junge Männer, die Krieger werden. Ein Akt der Tapferkeit, um den Weg zum Erwachsenenalter zu vollenden."
 iv2_ga_ideagroup_adm_23_4: "Kontrolliertes Abbrennen"
 iv2_ga_ideagroup_adm_23_4_desc: "Durch kontrolliertes Abbrennen der Felder können wir höhere Ernteerträge erzielen und so unsere Bevölkerung deutlich vergrößern."
 iv2_ga_ideagroup_adm_23_5: "Dorfverteidigung"
 iv2_ga_ideagroup_adm_23_5_desc: "Jeder hat seine Pflichten bei der Verteidigung der Dörfer."
 iv2_ga_ideagroup_adm_23_6: "Fruchtbares Land"
 iv2_ga_ideagroup_adm_23_6_desc: "Unser Volk ist von riesigen Landflächen umgeben, die seit Generationen von Menschen unberührt und von üppiger Flora und Fauna geprägt sind."
 iv2_ga_ideagroup_adm_23_7: "Irreguläre Kriegsführung"
 iv2_ga_ideagroup_adm_23_7_desc: "Durch die Nutzung natürlicher Gegebenheiten und gewohnter Barrieren können wir größere Feinde durch Überfälle und Hinterhalte besiegen."
 
