 iv2_ideagroup_title_adm_4: "Bildungsideen"
 iv2_ga_ideagroup_adm_4_1: "Lesen"
 iv2_ga_ideagroup_adm_4_1_desc: "Lesen ist eine wichtige Fähigkeit für eine fortschrittliche Gesellschaft."
 iv2_ga_ideagroup_adm_4_2: "Wissensdurst"
 iv2_ga_ideagroup_adm_4_2_desc: "Wir fördern die Neugier von Kindern und inspirieren sie zum Experimentieren."
 iv2_ga_ideagroup_adm_4_3: "Schulen"
 iv2_ga_ideagroup_adm_4_3_desc: "In der Schule erlernen Kinder viele Fähigkeiten, die ihre Eltern ihnen nicht vermitteln können."
 iv2_ga_ideagroup_adm_4_4: "Bildung auf höchstem Niveau"
 iv2_ga_ideagroup_adm_4_4_desc: "Bessere Bildung verbessert auch die Fähigkeiten unserer herrschenden Klasse."
 iv2_ga_ideagroup_adm_4_5: "Innovationsgeist"
 iv2_ga_ideagroup_adm_4_5_desc: "Wir sind eine innovative Nation!"
 iv2_ga_ideagroup_adm_4_6: "Lesefähigkeit"
 iv2_ga_ideagroup_adm_4_6_desc: "Da immer mehr Menschen lesen lernen, steigt der soziale Druck auf andere, ebenfalls zu lernen."
 iv2_ga_ideagroup_adm_4_7: "Ausbildung in der Verwaltung"
