 iv2_ideagroup_title_adm_17: "Administrative Ideen"
 iv2_ga_ideagroup_adm_17_1: "Administrative Effizienz"
 iv2_ga_ideagroup_adm_17_1_desc: "Das Wichtigste für jede Regierung ist die richtige Beratung. Wir müssen sicherstellen, dass wir möglichst viele verschiedene Standpunkte berücksichtigen, um möglichst viele unterschiedliche Standpunkte zu berücksichtigen."
 iv2_ga_ideagroup_adm_17_2: "Strukturen"
 iv2_ga_ideagroup_adm_17_2_desc: "Staatliche Strukturen ermöglichen es uns, schneller auf Krisen zu reagieren."
 iv2_ga_ideagroup_adm_17_3: "Effiziente Prozesse"
 iv2_ga_ideagroup_adm_17_3_desc: "Indem wir unsere Prozesse effizienter gestalten, können wir auch neue Prozesse schneller in unser Denken integrieren."
 iv2_ga_ideagroup_adm_17_4: "Resilienter Staat"
 iv2_ga_ideagroup_adm_17_4_desc: "Jeder Staat erlebt Zeiten der Krise. Dann spüren die Unzufriedenen oder Ausgeschlossenen, dass es Zeit zum Aufbegehren ist. Wenn wir eine Regierung aufbauen, die diesen Turbulenzen standhält, können wir uns viel schneller von dieser traurigen Lage erholen."
 iv2_ga_ideagroup_adm_17_5: "Buchhaltung"
 iv2_ga_ideagroup_adm_17_5_desc: "Manchmal ist das Geld knapp und wir müssen Kredite aufnehmen. Kreditgeber haben immer Angst, ihr Geld nicht zurückzubekommen. Durch eine sorgfältige Buchführung können wir sicherstellen, dass alle bezahlt werden, und so niedrigere Zinssätze aushandeln."
 iv2_ga_ideagroup_adm_17_6: "Zentralisierung"
 iv2_ga_ideagroup_adm_17_6_desc: "Wenn wir den Staat zentralisieren, können wir die Ideen und die Agenda des Zentrums leichter in den Regionen vorantreiben."
 iv2_ga_ideagroup_adm_17_7: "Kriegskabinett"
 iv2_ga_ideagroup_adm_17_7_desc: "Kriegszeiten sind die Zeit, in der ein Land am verwundbarsten ist. Die damit verbundenen Belastungen können die Regierungsfähigkeit ernsthaft beeinträchtigen. Indem wir sicherstellen, dass Schlüsselakteure in Kriegszeiten eingebunden sind, können wir diese Belastungen vermeiden."
 
