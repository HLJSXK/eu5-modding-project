 iv2_ideagroup_title_adm_8: "Republikanische Ideen"
 iv2_ga_ideagroup_adm_8_1: "Römische Vorväter"
 iv2_ga_ideagroup_adm_8_1_desc: "Wir können viel von den Römern lernen, die vor uns kamen. Sie schafften es in Zeiten der Republik ein großes Reich aufzubauen und es relativ zentral zu verwalten."
 iv2_ga_ideagroup_adm_8_2: "Abgeschaffte Leibeigenschaft"
 iv2_ga_ideagroup_adm_8_2_desc: "Wir wissen aus der Lektüre von Aufzeichnungen aus der Römerzeit, dass eine Armee, die aus freien Männer besteht, sehr viel bereitwilliger kämpft, als eine, die man zum Kämpfen zwingt. Wir müssen unserer Bauernklasse ein recht hohes Maß an Freiheit geben, denn dann werden sie kämpfen, um diese Freiheit zu verteidigen."
 iv2_ga_ideagroup_adm_8_3: "Grundrechte"
 iv2_ga_ideagroup_adm_8_3_desc: "Indem wir den Bürgern gewisse Grundrechte zubilligen, verringern wir die Gefahr von Bauernaufständen."
 iv2_ga_ideagroup_adm_8_4: "Republikanische Tradition"
 iv2_ga_ideagroup_adm_8_4_desc: "Unsere Republik ist über die Jahre gewachsen und in sich gereift, sodass sie nicht viel erschüttern kann."
 iv2_ga_ideagroup_adm_8_5: "Freie Untertanen"
 iv2_ga_ideagroup_adm_8_5_desc: "So befriedigend es auch sein mag, einem Diener eine ordentliche Tracht Prügel zu verpassen – möchte man ihren Arbeitseinsatz erhöhen, so ist dies nicht die beste Methode. Ein Naturphilosoph hatte einmal die Idee, dass die Hauptmotivation der Menschen das Streben nach Profit sei. Wenn wir Geldzahlungen durch Bezahlung in Naturalien ersetzen, hätten die Bauern einen Anreiz ihre Produktion zu steigern."
 iv2_ga_ideagroup_adm_8_6: "Diplomatische Mission"
 iv2_ga_ideagroup_adm_8_6_desc: "Wir müssen uns als Republik stärker diplomatisch absichern als manche Monarchien. Denn unsere Art zu Leben stellt Chance und Gefahr zu gleich da."
 iv2_ga_ideagroup_adm_8_7: "Befreiung"
 iv2_ga_ideagroup_adm_8_7_desc: "Seit langer Zeit ist das Recht auf Landbesitz auf diejenigen beschränkt, die wir für vertrauenswürdig halten. Wenn wir diese Beschränkung aufheben, würde ein Teil der Besitzungen miteinander verschmelzen. Dies würde saisonale Arbeitskraft freisetzen, für die eine Laufbahn in der Armee eine Option sein könnte."
 
