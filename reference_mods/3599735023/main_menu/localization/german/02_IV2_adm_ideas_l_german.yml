 iv2_ideagroup_title_adm_7: "Monarchistische Ideen"
 iv2_ga_ideagroup_adm_7_1: "Adlige Ritter"
 iv2_ga_ideagroup_adm_7_1_desc: "Vorbedingung für den Unterhalt einer Kavallerie ist ein Wirtschaftssystem, das einen Überschuss an Pferden erzeugt. Wenn wir die Privilegien unserer Adelsschicht garantieren, würde sie das nicht nur glücklicher machen, sondern sie könnte auch die Produktion der benötigten Pferde für uns übernehmen. Oder in den Worten unseres Hofnarren: 'Wer Dienste erweist, schafft Bedienstete.'"
 iv2_ga_ideagroup_adm_7_2: "Internationaler Adel"
 iv2_ga_ideagroup_adm_7_2_desc: "Internationale Beziehungen sind eine verzwickte Angelegenheit. Manche Stimmen behaupten, dass die Kaufleute, die den Umgang mit Ausländern ohnehin gewohnt sind, am ehesten ein Talent dafür hätten. Doch dabei übersehen sie, welch innige Bande unsere Adelsfamilien im Laufe der Jahre geknüpft haben. Diese Bande sollten wir ausnutzen, um unsere Sache auf diplomatischem Wege vorwärts zu treiben."
 iv2_ga_ideagroup_adm_7_3: "Adlige Familienbande"
 iv2_ga_ideagroup_adm_7_3_desc: "Unsere Verwandtschaftsbeziehungen zum Hochadel festigen unseren Herrschaftsanspruch."
 iv2_ga_ideagroup_adm_7_4: "Regionaler Adel"
 iv2_ga_ideagroup_adm_7_4_desc: "Der Adel lebt im Wissen, einfach besser zu sein als normale Menschen und seine Loyalität erhält nur derjenige, der sie verdient. Wenn wir die Privilegien des Adels bestätigen, wird man unsere Freigiebigkeit im Gedächtnis behalten und gegenüber den Verlockungen ausländischer Mächte etwas widerstandsfähiger sein."
 iv2_ga_ideagroup_adm_7_5: "Dynastische Politik"
 iv2_ga_ideagroup_adm_7_5_desc: "Wir dürfen nicht zulassen das unsere Dynastie ausstirbt. Wir müssen vielmehr alles dafür tun, dass sie gedeiht und prosperiert."
 iv2_ga_ideagroup_adm_7_6: "Adlige Millizen"
 iv2_ga_ideagroup_adm_7_6_desc: "Falls es zum Krieg kommt stellt unser Adel örtliche Millizen auf, die bei der Verteidigung des Landes helfen."
 iv2_ga_ideagroup_adm_7_7: "Erhöhung der Kronautorität"
 iv2_ga_ideagroup_adm_7_7_desc: "Durch Erhöhung unserer Autorität ist es uns einfacher die Kontrolle im Land zu behalten und dessen Stabilität zu sichern."
 
