 iv2_ideagroup_title_adm_15: "Expansionsideen"
 iv2_ga_ideagroup_adm_15_1: "Städteausbau"
 iv2_ga_ideagroup_adm_15_1_desc: "Durch die Gründung weiterer Städte können wir die Effektivität und Attraktivität des Reiches steigern."
 iv2_ga_ideagroup_adm_15_2: "Söldnerverträge"
 iv2_ga_ideagroup_adm_15_2_desc: "Durch den Abschluss von Dauerverträgen mit bestimmten Söldnerführern können wir sicherstellen, dass wir bei Bedarf jederzeit auf einen großen Pool an Söldnern zurückgreifen können."
 iv2_ga_ideagroup_adm_15_3: "Schnelle Kriegsgründe"
 iv2_ga_ideagroup_adm_15_3_desc: "Wenn wir schnell einen Kriegsgrund erfinden, bleibt unseren Gegnern kaum Zeit zu reagieren."
 iv2_ga_ideagroup_adm_15_4: "Expansionsdoktrin"
 iv2_ga_ideagroup_adm_15_4_desc: "Unser Land ist auf militärische Expansion ausgerichtet."
 iv2_ga_ideagroup_adm_15_5: "Integration neuer Gebiete"
 iv2_ga_ideagroup_adm_15_5_desc: "Wir sind geschickt darin, neu eroberte Gebiete in das Imperium zu integrieren."
 iv2_ga_ideagroup_adm_15_6: "Bevölkerungspolitik"
 iv2_ga_ideagroup_adm_15_6_desc: "Wenn wir unseren Kolonien schnelles Wachstum ermöglichen, werden wir nur davon profitieren."
 iv2_ga_ideagroup_adm_15_7: "Ausbau der Produktion"
 iv2_ga_ideagroup_adm_15_7_desc: "Eine starke Wirtschaft basiert auf der Produktion vieler Güter."
 
