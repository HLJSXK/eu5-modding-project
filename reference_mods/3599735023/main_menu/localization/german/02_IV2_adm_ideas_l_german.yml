 iv2_ideagroup_title_adm_29: "Tengrische Ideen"
 iv2_ga_ideagroup_adm_29_1: "Für den Clan!"
 iv2_ga_ideagroup_adm_29_1_desc: "Der Clan muss immer zusammen halten, sonst können wir nicht überleben."
 iv2_ga_ideagroup_adm_29_2: "Tolerante Menschen"
 iv2_ga_ideagroup_adm_29_2_desc: "Unsere Brüder und Schwestern müssen diejenigen tollerieren, die nicht an unseren Glauben glauben."
 iv2_ga_ideagroup_adm_29_3: "Wildpferde"
 iv2_ga_ideagroup_adm_29_3_desc: "Wir haben die  besten und stärksten Pferde der Welt."
 iv2_ga_ideagroup_adm_29_4: "Nomadische Generäle"
 iv2_ga_ideagroup_adm_29_4_desc: "Unsere Generäle wurden im Sattel geboren."
 iv2_ga_ideagroup_adm_29_5: "Kalte Winter"
 iv2_ga_ideagroup_adm_29_5_desc: "Unsere Winter sind sehr kalt, aber nicht für uns."
 iv2_ga_ideagroup_adm_29_6: "Steppen Missionare"
 iv2_ga_ideagroup_adm_29_6_desc: "Wir schärfen unsere Speere und schnüren unsere Rüstungen für den Kampf des Glaubens."
 iv2_ga_ideagroup_adm_29_7: "Die Drei Zelte"
 iv2_ga_ideagroup_adm_29_7_desc: "Das weiße Zelt garantierte einer belagerten Stadt Gnade, sollte sie sich am ersten Tag ergeben. Das rote Zelt war ein Hinweis, auf die Tötung sämtlicher Männer in der Stadt am zweiten Tag und das schwarze Zelt des Dritten Tages war der Hinweis auf Tod und Zerstörung für die gesamte Stadt."
 
