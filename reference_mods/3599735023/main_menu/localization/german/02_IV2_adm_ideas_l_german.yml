 iv2_ideagroup_title_adm_45: "Zororastrische Ideen"
 iv2_ga_ideagroup_adm_45_1: "Saoshyant"
 iv2_ga_ideagroup_adm_45_1_desc: "Der Saoshyant ist der, der die Erlösung bringt. Alle Zororastrier warten darauf, dass er den finalen Krieg beginnt und gewinnt."
 iv2_ga_ideagroup_adm_45_2: "Avesta"
 iv2_ga_ideagroup_adm_45_2_desc: "Die heilige zororastrische Schrift. Die erste Ausgabe ist unglücklicherweise schon bei der Invasion Alexanders des Großen verloren gegangen."
 iv2_ga_ideagroup_adm_45_3: "Ladet Dasturen ein"
 iv2_ga_ideagroup_adm_45_3_desc: "Dasturen sind weise Männer mit großem religiösem Wissen. Wir können von ihrer Weisheit nur profitieren."
 iv2_ga_ideagroup_adm_45_4: "Reformiert die Priesterschaft"
 iv2_ga_ideagroup_adm_45_4_desc: "Indem wir die Priesterschaft reformieren können wir unsere Kraft auf andere Dinge lenken."
 iv2_ga_ideagroup_adm_45_5: "Die heilige Flamme"
 iv2_ga_ideagroup_adm_45_5_desc: "Jahrhunderte mussten unsere Brüder und Schwestern ertragen verfolgt, konvertiert und abgeschlachtet zu werden, doch die Zororastrier werden überleben."
 iv2_ga_ideagroup_adm_45_6: "Religiöse Erziehung"
 iv2_ga_ideagroup_adm_45_6_desc: "Wir müssen unsere Kinder weise gemäß unserer Religion erziehen."
 iv2_ga_ideagroup_adm_45_7: "Handel und Religion"
 iv2_ga_ideagroup_adm_45_7_desc: "Die einfache Weg unsere Religion zu verbreiten ist der Handel mit anderen Völkern."
 
