 iv2_ideagroup_title_adm_41: "Hellenismus Ideen"
 iv2_ga_ideagroup_adm_41_1: "Poseidon"
 iv2_ga_ideagroup_adm_41_1_desc: "Poseidon, der Gott der Meere wird unseren Seeleuten kraft beim Kampf gegen den Feind geben."
 iv2_ga_ideagroup_adm_41_2: "Phalanx Tradition"
 iv2_ga_ideagroup_adm_41_2_desc: "Unsere Infanterie steht in der stolzen Tradition der Phalanx und ist somit besonders diszipliniert."
 iv2_ga_ideagroup_adm_41_3: "Hochkulturelle Verwaltung"
 iv2_ga_ideagroup_adm_41_3_desc: "Die religiöse Verehrung unserer Gotter stand einer effektiven Verwaltung noch nie im Weg."
 iv2_ga_ideagroup_adm_41_4: "Universitätstradition"
 iv2_ga_ideagroup_adm_41_4_desc: "Die ersten Studieninstitutionen wurden in der langen Tradition des Hellenismus gegründet. Enttäuscht dieses große Erbe nicht."
 iv2_ga_ideagroup_adm_41_5: "Poleis Tradition"
 iv2_ga_ideagroup_adm_41_5_desc: "Unsere ehemalige Kleinstaaterei hat es notwendig gemacht mit so vielen Staaten wie möglich diplomatische Beziehungen zu unterhalten."
 iv2_ga_ideagroup_adm_41_6: "Fortschritt"
 iv2_ga_ideagroup_adm_41_6_desc: "Die Götter stehen dem Fortschritt nicht im Weg. Sie begrüßen und belohnen ihn."
 iv2_ga_ideagroup_adm_41_7: "Starke Anziehungskraft"
 iv2_ga_ideagroup_adm_41_7_desc: "Unsere Tradition, unser Wohlstand und unsere Kultur haben starke Anziehungskräfte."
 
