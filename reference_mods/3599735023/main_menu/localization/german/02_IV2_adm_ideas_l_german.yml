 iv2_ideagroup_title_adm_2: "Humanismus Ideen"
 iv2_ga_ideagroup_adm_2_1: "Lokale Traditionen"
 iv2_ga_ideagroup_adm_2_1_desc: "Ein großes Land zu regieren bedeutet, über viele unterschiedliche Völker mit jeweils eigenen Bräuchen und Traditionen zu herrschen. Indem wir diese Traditionen in unser offizielles Gesetzbuch integrieren, schaffen wir eine glückliche und loyale Bevölkerung."
 iv2_ga_ideagroup_adm_2_2: "Kulturelle Bindungen"
 iv2_ga_ideagroup_adm_2_2_desc: "Verschiedene Kulturen haben unterschiedliche Bräuche und widersetzen sich aus irgendeinem Grund Versuchen von oben, diese Bräuche zu ändern. Wir können diese Schwäche in eine Stärke verwandeln, indem wir lokale Führungspersönlichkeiten in unser Regierungssystem einbinden und sie unseren Willen auf eine für sie akzeptable Weise umsetzen lassen."
 iv2_ga_ideagroup_adm_2_3: "Indirekte Herrschaft"
 iv2_ga_ideagroup_adm_2_3_desc: "Manchmal ist es am besten, Menschen glauben zu lassen, sie würden ihre eigenen Entscheidungen treffen, um sie dazu zu bewegen, das zu tun, was man will. Ein solches System indirekter Herrschaft wird die Unruhen in neu erworbenen Provinzen verringern."
 iv2_ga_ideagroup_adm_2_4: "Humanistische Toleranz"
 iv2_ga_ideagroup_adm_2_4_desc: "Durch das Streben nach einer toleranteren Gesellschaft und die Bemühungen, unsere sozialen und religiösen Probleme rationaler zu lösen, wird das Risiko ziviler Unruhen verringert."
 iv2_ga_ideagroup_adm_2_5: "Kulturelle Bindungen"
 iv2_ga_ideagroup_adm_2_5_desc: "Verschiedene Kulturen haben unterschiedliche Bräuche und widersetzen sich aus irgendeinem Grund den Versuchen von oben, diese Bräuche zu ändern. Wir können diese Schwäche in eine Stärke verwandeln, indem wir lokale Führungspersönlichkeiten in unser Regierungssystem einbinden und sie unseren Willen auf eine für sie akzeptable Weise umsetzen lassen."
 iv2_ga_ideagroup_adm_2_6: "Toleranz"
 iv2_ga_ideagroup_adm_2_6_desc: "Eine tolerantere Haltung gegenüber den Minderheitsreligionen in unserem Land wird unsere religiöse Einheit erheblich stärken."
 iv2_ga_ideagroup_adm_2_7: "Wohlwollen"
 iv2_ga_ideagroup_adm_2_7_desc: "Unser Land ist eine Bastion der Toleranz und Aufklärung. Indem wir dafür sorgen, dass alle anderen Nationen dies wissen, können wir bessere Beziehungen im Ausland fördern."
 
