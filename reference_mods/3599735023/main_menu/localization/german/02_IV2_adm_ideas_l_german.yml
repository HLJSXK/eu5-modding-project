 iv2_ideagroup_title_adm_3: "Justizideen"
 iv2_ga_ideagroup_adm_3_1: "Gesetzessammlung"
 iv2_ga_ideagroup_adm_3_1_desc: "Gesetze geben den Menschen Sicherheit und Halt."
 iv2_ga_ideagroup_adm_3_2: "Justizministerium"
 iv2_ga_ideagroup_adm_3_2_desc: "Das Justizministerium kümmert sich um die Aktualisierung und Regelung von neuen Sachverhalten."
 iv2_ga_ideagroup_adm_3_3: "Anwaltstradition"
 iv2_ga_ideagroup_adm_3_3_desc: "Die Anwälte unserer Nation haben eine lange Geschichte und halten unser Land am Laufen."
 iv2_ga_ideagroup_adm_3_4: "Handelsrecht"
 iv2_ga_ideagroup_adm_3_4_desc: "Handelsrecht ist wichtig um die Angelegenheiten mit anderen Staaten zu regeln und vom Handel zu profitieren."
 iv2_ga_ideagroup_adm_3_5: "Wucher Gesetze"
 iv2_ga_ideagroup_adm_3_5_desc: "Wucher lähmt die Wirtschaft. Wir werden diesen bekämpfen."
 iv2_ga_ideagroup_adm_3_6: "Völkerrecht"
 iv2_ga_ideagroup_adm_3_6_desc: "Das Völkerrecht sichert unsere Beziehungen zu anderen Staaten und erlaubt uns gewisse Dinge leicher zu rechtfertigen."
 iv2_ga_ideagroup_adm_3_7: "Minderheitenrechte"
 iv2_ga_ideagroup_adm_3_7_desc: "Minderheitenrechte stabilisieren unser Land und machen es weniger anfällig für Sezessionsbewegungen."
 
