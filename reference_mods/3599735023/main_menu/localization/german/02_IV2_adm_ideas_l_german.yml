 iv2_ideagroup_title_adm_13: "Dezentralismus Ideen"
 iv2_ga_ideagroup_adm_13_1: "Allgemeiner Ausbau"
 iv2_ga_ideagroup_adm_13_1_desc: "Die Ressourcen des Staates richten sich auf viele verschiedene Regionen. \nEntwicklungsmalus für viele Provinzen: §G-100%§W"
 iv2_ga_ideagroup_adm_13_2: "Dezentralisierter Verwaltungsapparat"
 iv2_ga_ideagroup_adm_13_2_desc: "Durch unser weitläufiges Staatsgebiet müssen wir viele Männer in Lohn und Brot nehmen um eine effiziente Verwaltung und die Sicherheit zu gewährleisten."
 iv2_ga_ideagroup_adm_13_3: "Verschiedene Handelszentren"
 iv2_ga_ideagroup_adm_13_3_desc: "Wir setzen bei unseren Handelszentren auf Quantität."
 iv2_ga_ideagroup_adm_13_4: "Kulturelle Zentren"
 iv2_ga_ideagroup_adm_13_4_desc: "Durch die fehlende Fokussierung auf ein kulturelles Zentrum, können viele verschiedene Zentren gedeihen und tragen zum Gelingen unseres Staates bei."
 iv2_ga_ideagroup_adm_13_5: "Großes Staatsgebiet"
 iv2_ga_ideagroup_adm_13_5_desc: "Unsere dezentrale Aufstellung ermöglicht es uns mehr Staatsgebiete zu unterhalten."
 iv2_ga_ideagroup_adm_13_6: "Mäßiges Bevölkerungswachstum"
 iv2_ga_ideagroup_adm_13_6_desc: "Wir steuern unser Bevölkerungswachstum nicht. Es wird in einigen Regionen weniger stark sein als in anderen."
 iv2_ga_ideagroup_adm_13_7: "Gute Integrierung"
 iv2_ga_ideagroup_adm_13_7_desc: "Unsere Verwaltung ist es gewohnt neues Land in unser Staatsgebiet zu integrieren."
 
