 iv2_ideagroup_title_adm_50: "Totemismus Ideen"
 iv2_ga_ideagroup_adm_50_1: "Die Getreidemutter"
 iv2_ga_ideagroup_adm_50_1_desc: "Nach unserer Tradition ist das Getreide ein Geschenk einer Göttin die sich geopfert hat damit wir leben können."
 iv2_ga_ideagroup_adm_50_2: "Menschen der Erde"
 iv2_ga_ideagroup_adm_50_2_desc: "Wir leben schon länger auf dieser Erde als sich selbst die Ältesten erinnern können. Selbst wenn wir uns irgendwo niederlassen werden unsere Traditionen uns ständig begleiten."
 iv2_ga_ideagroup_adm_50_3: "Wakan Tanka"
 iv2_ga_ideagroup_adm_50_3_desc: "Der Große Geist hat alles Erschaffen und interveniert wenn es ihm gefällt."
 iv2_ga_ideagroup_adm_50_4: "Kriegerstämme"
 iv2_ga_ideagroup_adm_50_4_desc: "Die Legenden unserer Krieger werden bis in alle Ewigkeit weitererzählt werden."
 iv2_ga_ideagroup_adm_50_5: "Stammesälteste"
 iv2_ga_ideagroup_adm_50_5_desc: "Unsere Ältesten und Schamanen erinnern sich der Geschichten unserer Vergangenheit und werden uns immer ihrer Lehren erinnern."
 iv2_ga_ideagroup_adm_50_6: "Der Sonnentanz"
 iv2_ga_ideagroup_adm_50_6_desc: "Um unsere Verehrung für den Großen Geist zu zeigen tanzen wir indem wir physische und spirituelle Opfer dabringen."
 iv2_ga_ideagroup_adm_50_7: "Totems"
 iv2_ga_ideagroup_adm_50_7_desc: "Unsere Totems sind die physische Verkörperung der Geschichte unseres Stammes. Sie müssen unter allen Umständen bewahrt und verehrt werden."
 
