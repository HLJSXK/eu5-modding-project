 iv2_ideagroup_title_adm_52: "Ibadi Ideen"
 iv2_ga_ideagroup_adm_52_1: "Dschābir ibn Zaid"
 iv2_ga_ideagroup_adm_52_1_desc: "Dieser Mann gilt als Begründer der ibadischen Rechtsschule und lebte im 7. Jahrhundert nach Christus."
 iv2_ga_ideagroup_adm_52_2: "Ursprung in der Wüste"
 iv2_ga_ideagroup_adm_52_2_desc: "Die Ibaditen fanden ihren Ursprung auf dem Gebiet des heutigen Omans."
 iv2_ga_ideagroup_adm_52_3: "Die Vier Wege der Religion"
 iv2_ga_ideagroup_adm_52_3_desc: "Die Ibaditen kennen vier Wege der Religion."
 iv2_ga_ideagroup_adm_52_4: "Hervortreten"
 iv2_ga_ideagroup_adm_52_4_desc: "Die Ibaditen sind stolz darauf als eigene Rechtsschule hervorgetreten zu sein."
 iv2_ga_ideagroup_adm_52_5: "Verteidigung"
 iv2_ga_ideagroup_adm_52_5_desc: "Es ist wichtig für die Ibaditen ihre Traditionen zu verteidigen und ihren Weg des Glaubens zu erhalten."
 iv2_ga_ideagroup_adm_52_6: "Selbstaufopferung"
 iv2_ga_ideagroup_adm_52_6_desc: "Die Ibaditen werden alles tun um sich für ihre Glaubensbrüder selbst aufzuopfern."
 iv2_ga_ideagroup_adm_52_7: "Geheimhaltung"
 iv2_ga_ideagroup_adm_52_7_desc: "Zu wissen, wann man seine Kämpfe austragen sollte oder wann man lieber in der Deckung bleibt ist eine wichtige Eigenschaft einer Minderheit."
 
