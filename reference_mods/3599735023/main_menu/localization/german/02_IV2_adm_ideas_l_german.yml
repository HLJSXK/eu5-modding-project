 iv2_ga_ideagroup_adm_30_1: "Brahma"
 iv2_ga_ideagroup_adm_30_1_desc: "Der Gott der das Wissen und schließlich das Universum erschuf."
 iv2_ga_ideagroup_adm_30_2: "Vishnu"
 iv2_ga_ideagroup_adm_30_2_desc: "Derjenige, der überall ist."
 iv2_ga_ideagroup_adm_30_3: "Shiva"
 iv2_ga_ideagroup_adm_30_3_desc: "Der glückverheißende Gott."
 iv2_ga_ideagroup_adm_30_4: "Ganesha"
