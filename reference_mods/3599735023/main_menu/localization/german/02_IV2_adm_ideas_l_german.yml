 iv2_ga_ideagroup_adm_9_1: "Hohe Steuern"
 iv2_ga_ideagroup_adm_9_1_desc: "Durch unsere unbändige Regierungsmacht, können wir Steuern erheben, wie es uns passt."
 iv2_ga_ideagroup_adm_9_2: "Produktionszwang"
 iv2_ga_ideagroup_adm_9_2_desc: "Wir können jederzeit die Bauern zwingen in den Manufakturen zu arbeiten, falls wir es für nötig halten."
 iv2_ga_ideagroup_adm_9_3: "Schlägerbanden"
 iv2_ga_ideagroup_adm_9_3_desc: "Unsere Polizei sorgt für Ordnung auf den Straßen."
 iv2_ga_ideagroup_adm_9_4: "Lockere Moralvorstellungen"
 iv2_ga_ideagroup_adm_9_4_desc: "Wir haben keine Angst davor uns die Hände schmutzig zu machen."
 iv2_ga_ideagroup_adm_9_5: "Große Armee"
 iv2_ga_ideagroup_adm_9_5_desc: "Wir brauche eine große Armee um äußere und innere Feinde zu bekämpfen."
 iv2_ga_ideagroup_adm_9_6: "Erzwungene Integration"
 iv2_ga_ideagroup_adm_9_6_desc: "Wir nehmen keine Rücksicht auf nationalistische oder religiöse Befindlichkeiten."
 iv2_ga_ideagroup_adm_9_7: "Militarismus"
 iv2_ga_ideagroup_adm_9_7_desc: "Unser Land ist stark militärisch geprägt."
 
