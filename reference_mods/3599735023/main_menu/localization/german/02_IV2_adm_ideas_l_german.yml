 iv2_ideagroup_title_adm_11: "Religiöse Ideen"
 iv2_ga_ideagroup_adm_11_1: "Missionsschulen"
 iv2_ga_ideagroup_adm_11_1_desc: "Obwohl es keinen Mangel an Menschen gibt, die bereit sind, hinauszugehen und den wahren Glauben zu verbreiten, richten die meisten von ihnen mehr Schaden an als Nutzen. Spezialisierte Schulen zur Ausbildung von Missionaren werden jedoch dafür sorgen, dass wir mehr Menschen haben, die den Glauben nicht nur verbreiten, sondern auch erfolgreich sein können."
 iv2_ga_ideagroup_adm_11_2: "Kirchenpflicht"
 iv2_ga_ideagroup_adm_11_2_desc: "Durch die Einführung einer Kirchenpflicht wird die Betonung religiöser Werte und Überzeugungen die Kosten für die Aufrechterhaltung von Recht und Ordnung zweifellos minimieren."
 iv2_ga_ideagroup_adm_11_3: "Göttliche Vorherrschaft"
 iv2_ga_ideagroup_adm_11_3_desc: "Es ist von größter Wichtigkeit, dass wir unser Land und seine Grenzen von den Ungläubigen befreien, die unser Land bedrängen."
 iv2_ga_ideagroup_adm_11_4: "Gott will es"
 iv2_ga_ideagroup_adm_11_4_desc: "Schließt euch dem Schlachtruf der Kreuzzüge an: ‚Gott will es‘, und vernichtet die Ungläubigen."
 iv2_ga_ideagroup_adm_11_5: "Frömmigkeit"
 iv2_ga_ideagroup_adm_11_5_desc: "Religion ist eines der wichtigsten Bollwerke unserer Herrschaft. Öffentliche Frömmigkeitsbekundungen der Herrscher werden die Beherrschten nachahmen. Die wachsende Frömmigkeit unseres Volkes wird unsere Herrschaft stärken."
 iv2_ga_ideagroup_adm_11_6: "Religiöse Tradition"
 iv2_ga_ideagroup_adm_11_6_desc: "Die Stärke unseres Glaubens und unsere öffentliche Frömmigkeit und Anbetung werden von anderen Ländern, nah und fern, bewundert. Dies spiegelt sich im Ansehen und Ruhm unseres Reiches wider."
 iv2_ga_ideagroup_adm_11_7: "Ökumene"
 iv2_ga_ideagroup_adm_11_7_desc: "Der Umgang mit Ketzern im Reich ist immer schwierig. Obwohl die gute alte Methode mit Feuer und Schwert die meisten Probleme letztendlich lösen wird, kann auch Diplomatie erfolgreich sein. Indem wir den Dialog zwischen den verschiedenen Sekten fördern, können wir Missverständnisse abbauen und den Frieden im Reich fördern."

