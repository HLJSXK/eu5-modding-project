 iv2_ideagroup_title_adm_24: "Katholische Ideen"
 iv2_ga_ideagroup_adm_24_1: "Missionarsschulen"
 iv2_ga_ideagroup_adm_24_1_desc: "Es gibt zwar keinen Mangel an Menschen, die den wahren Glauben verkünden möchten, doch meist ist es so, dass diese mehr schaden als nützen. Mit speziellen Schulen zur Ausbildung der Missionare werden wir sicherstellen, dass wir mehr Menschen haben, die neben dem Wunsch auch die Fähigkeit zur Verkündung des Glaubens mitbringen."
 iv2_ga_ideagroup_adm_24_2: "Göttliche Vorherrschaft"
 iv2_ga_ideagroup_adm_24_2_desc: "Es ist von größter Wichtigkeit, dass wir unser Land und die es umgebenden Grenzen von den Ungläubigen, die unser Land belästigen, frei machen."
 iv2_ga_ideagroup_adm_24_3: "Unam Sanctam"
 iv2_ga_ideagroup_adm_24_3_desc: "Fallt in den Schlachtruf der Kreuzzüge ein und vernichtet die Ungläubigen.  'Gott will es'!"
 iv2_ga_ideagroup_adm_24_4: "Frömmigkeit"
 iv2_ga_ideagroup_adm_24_4_desc: "Die Religion ist das wichtigste Bollwerk unserer Herrschaft. Demonstriert der Herrscher öffentlich Frömmigkeit, so werden die Beherrschten seinem Beispiel folgen. Das Anwachsen der Frömmigkeit unseres Volkes wird zur Stärkung unserer Herrschaft beitragen."
 iv2_ga_ideagroup_adm_24_5: "Religiöse Tradition"
 iv2_ga_ideagroup_adm_24_5_desc: "Die Stärke unseres Glaubens und die öffentlichen Demonstrationen von Frömmigkeit und Hingabe haben uns die Anerkennung anderer Länder in nah und fern eingebracht. Dies spiegelt sich wider in Ruhm und Prestige für unser Reich."
 iv2_ga_ideagroup_adm_24_6: "Religiöse Authorität"
 iv2_ga_ideagroup_adm_24_6_desc: "Unsere von Gott gegebene Authorität beeindruckt alle und jedermann. Dies untermauert unsere Legitimität und unseren Einfluss."
 iv2_ga_ideagroup_adm_24_7: "Das Kreuz Jesu"
 iv2_ga_ideagroup_adm_24_7_desc: "'Eine Armee, die das Kreuz Jesu Christi vor sich herträgt, kann nicht besiegt werden.' Unsere Soldaten wissen dies und sind auch sonst entsprechend motiviert."

