 iv2_ideagroup_title_adm_53: "Hussitische Ideen"
 iv2_ga_ideagroup_adm_53_1: "Das Opfer von Jan Hus"
 iv2_ga_ideagroup_adm_53_1_desc: "Am 6. Juli 1415 wurde Jan Hus auf dem Scheiterhaufen verbrannt nachdem er den Ablasshandel und den Reichtum der katholischen Kirche angeprangert hat."
 iv2_ga_ideagroup_adm_53_2: "Die Prager Artikel"
 iv2_ga_ideagroup_adm_53_2_desc: "Die 1420 verfassten Prager Artikel forderten die Freiheit der Predigt, die Freiheit des Kelches, die Freiheit säkularer Kirchenherrschaft und die Freiheit vor der Ungerechtigkeit weltlicher Herrschaft."
 iv2_ga_ideagroup_adm_53_3: "Kalixtiner"
 iv2_ga_ideagroup_adm_53_3_desc: "Die Kalixtiner rekrutierten sich hauptsächlich aus dem ärmlichen Teil der Bevölkerung und gründeten die Stadt Tabor."
 iv2_ga_ideagroup_adm_53_4: "Taboriten"
 iv2_ga_ideagroup_adm_53_4_desc: "Die Taboriten wollten mit Waffengewalt das Reich Gottes auf Erden erzwingen und die bekannte Ordnung der Monarchie und des Feudalismus zerstören."
 iv2_ga_ideagroup_adm_53_5: "Der Prager Fenstersturz"
 iv2_ga_ideagroup_adm_53_5_desc: "Am 30. Juli 1419 stürmten einige Hussiten das Rathaus in Prag und warfen einige Ratsherren aus dem Fenster."
 iv2_ga_ideagroup_adm_53_6: "Gegenkreuzzug"
 iv2_ga_ideagroup_adm_53_6_desc: "Trotz der Tatsache, dass die Hussiten das Ziel zahlreicher Kreuzzüge waren, schafften sie es auch einige Male in die Offensive und plünderten Städte in Österreich und Schlesien."
 iv2_ga_ideagroup_adm_53_7: "Reformistische Anziehung"
 iv2_ga_ideagroup_adm_53_7_desc: "Da die Lehren des hussitischen Glaubens einige Misstände in der katholischen Kirche anprangerten, waren sie für viele Menschen sehr attraktiv."
 
