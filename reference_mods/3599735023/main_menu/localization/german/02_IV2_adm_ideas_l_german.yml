 iv2_ideagroup_title_adm_49: "Inti Ideen"
 iv2_ga_ideagroup_adm_49_1: "Der Sonnengott"
 iv2_ga_ideagroup_adm_49_1_desc: "Inti ist der Sonnengott der Incas und deren oberster Schutzpatron."
 iv2_ga_ideagroup_adm_49_2: "Viracocha"
 iv2_ga_ideagroup_adm_49_2_desc: "Viracocha ist der Vater von Inti und der Gott der Zivilisation."
 iv2_ga_ideagroup_adm_49_3: "Mama Killa"
 iv2_ga_ideagroup_adm_49_3_desc: "Mama Killa ist die Mutter von Inti."
 iv2_ga_ideagroup_adm_49_4: "Willaq Umu "
 iv2_ga_ideagroup_adm_49_4_desc: "Der Willaq Umu ist der Hohepriester von Inti. Er ist die zweitmächtigste Person im Königreich nach dem König."
 iv2_ga_ideagroup_adm_49_5: "Inti Raymi"
 iv2_ga_ideagroup_adm_49_5_desc: "Das Fest Inti Raymi ehrt den Sonnengott und markiert den Start von einer neuen Aussährung."
 iv2_ga_ideagroup_adm_49_6: "Priesterschaft"
 iv2_ga_ideagroup_adm_49_6_desc: "Die Priesterschaft für Inti war männlich und weiblich."
 iv2_ga_ideagroup_adm_49_7: "Die Sonne"
 iv2_ga_ideagroup_adm_49_7_desc: "Die Sonne war sehr wichtig für die Incas, denn gerade im Hochland war sie essenziell für das Wachstum von Mais und anderem Getreide."
 
