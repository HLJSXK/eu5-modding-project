 iv2_ideagroup_title_adm_47: "Nahuatl Ideen"
 iv2_ga_ideagroup_adm_47_1: "Huitzilopochtli"
 iv2_ga_ideagroup_adm_47_1_desc: "Huitzilopochtli ist der Hauptgott der Azteken. Er ist der Gott der Sonne und des Krieges."
 iv2_ga_ideagroup_adm_47_2: "Quetzalcoátl"
 iv2_ga_ideagroup_adm_47_2_desc: "Quetzalcoátl, die gefiederte Schlange. Er ist der Gott des Windes, des Himmels, der Erde und der Schöpfung. Er verließ die Welt einst mit einem Kanu."
 iv2_ga_ideagroup_adm_47_3: "Menschenopfer"
 iv2_ga_ideagroup_adm_47_3_desc: "Die Menschenopfer der Azteken wurden auf einem Opferstein im Tempel festgebunden und anschließend wurde ihnen ihr Herz rausgeschnitten und anschließend das Blut rituell über die Opferstätten verteilt."
 iv2_ga_ideagroup_adm_47_4: "Blutopfer"
 iv2_ga_ideagroup_adm_47_4_desc: "Durch ein Blutopfer können wir die Götter besänftigen."
 iv2_ga_ideagroup_adm_47_5: "Opfer für Tlaloc"
 iv2_ga_ideagroup_adm_47_5_desc: "Für Tlaloc wurden Kinder in Käfige gesteckt und dort zu Ehren des Regengottes zum Weinen gebracht. Anschließend ließ man sie verhungern."
 iv2_ga_ideagroup_adm_47_6: "Mictlan"
 iv2_ga_ideagroup_adm_47_6_desc: "Mictlan, die neunschichtige aztekische Unterwelt ist der Ort wohin die Atzeken kamen die eines natürlichen Todes starben."
 iv2_ga_ideagroup_adm_47_7: "Paradies der Blumen"
 iv2_ga_ideagroup_adm_47_7_desc: "Menschen die vom Blitz erschlagen wurden oder ertranken kamen in das Reich des Regengottes Tlaloc, auch als Paradies der Blumen bekannt."
 
