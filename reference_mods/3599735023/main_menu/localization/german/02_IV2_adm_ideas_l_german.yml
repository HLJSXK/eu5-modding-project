 iv2_ideagroup_title_adm_28: "Sunnitische Ideen"
 iv2_ga_ideagroup_adm_28_1: "Dschizya-Besteuerung"
 iv2_ga_ideagroup_adm_28_1_desc: "Die nicht muslimische Bevölkerung muss eine extra Steuer bezahlen, was unsere Einnahmen erhöht."
 iv2_ga_ideagroup_adm_28_2: "Dschihad"
 iv2_ga_ideagroup_adm_28_2_desc: "Der heilige Krieg des Islam. Wir werden die Ungläubigen bekehren oder ausmerzen."
 iv2_ga_ideagroup_adm_28_3: "Missionarsschulen"
 iv2_ga_ideagroup_adm_28_3_desc: "Es gibt zwar keinen Mangel an Menschen, die den wahren Glauben verkünden möchten, doch meist ist es so, dass diese mehr schaden als nützen. Mit speziellen Schulen zur Ausbildung der Missionare werden wir sicherstellen, dass wir mehr Menschen haben, die neben dem Wunsch auch die Fähigkeit zur Verkündung des Glaubens mitbringen."
 iv2_ga_ideagroup_adm_28_4: "Islamische Eroberungstradition"
 iv2_ga_ideagroup_adm_28_4_desc: "Der Einst große Eroberungszug der ersten Muslime ist fest in unserem Gedächtnis verankert."
 iv2_ga_ideagroup_adm_28_5: "Innovativität"
 iv2_ga_ideagroup_adm_28_5_desc: "Wenn es um Problemlösung geht, suchen wir unseres Gleichen!"
 iv2_ga_ideagroup_adm_28_6: "Islamische Handelstradition"
 iv2_ga_ideagroup_adm_28_6_desc: "Durch unsere Tradition großer Reiche, war auch der Handel immer ein Eckpfeiler unserer Politik."
 iv2_ga_ideagroup_adm_28_7: "Keine Expansionsgrenze"
 iv2_ga_ideagroup_adm_28_7_desc: "Der Eifer unserer Gläubigen sucht seines gleichen und erhöht ihre Bereitschaft für den Islam zu sterben, egal wo und welche Hindernisse sich uns auch in den Weg stellen!"
 
