 iv2_ideagroup_title_adm_21: "Metropolenideen"
 iv2_ga_ideagroup_adm_21_1: "Stadt oder Hauptstadt"
 iv2_ga_ideagroup_adm_21_1_desc: "Unsere Städte sind so wichtig geworden, dass es eigentlich egal ist, ob sie Hauptstadt sind oder nicht."
 iv2_ga_ideagroup_adm_21_2: "Attraktion der Hauptstadt"
 iv2_ga_ideagroup_adm_21_2_desc: "Als Machtzentrum ist unsere Hauptstadt immer ein Magnet für viele Einwanderer."
 iv2_ga_ideagroup_adm_21_3: "Finanzviertel"
 iv2_ga_ideagroup_adm_21_3_desc: "Dank der Wirtschaftskraft und Stabilität, die unsere Hauptstadt ausstrahlt, können wir ständig neue Münzen prägen."
 iv2_ga_ideagroup_adm_21_4: "Stabile Hauptstadt, stabiles Land"
 iv2_ga_ideagroup_adm_21_4_desc: "Wenn unsere Hauptstadt stabil ist, ist das ganze Land stabil."
 iv2_ga_ideagroup_adm_21_5: "Bauarbeiter"
 iv2_ga_ideagroup_adm_21_5_desc: "Die Bauarbeiter unserer Hauptstadt können jederzeit in andere Regionen des Landes entsandt werden."
 iv2_ga_ideagroup_adm_21_6: "Nachahmer"
 iv2_ga_ideagroup_adm_21_6_desc: "Viele Städte wollen unserer Hauptstadt nacheifern."
 iv2_ga_ideagroup_adm_21_7: "Metropole"
 iv2_ga_ideagroup_adm_21_7_desc: "Unsere Hauptstadt wird eines Tages die größte Stadt der Welt sein."
 
