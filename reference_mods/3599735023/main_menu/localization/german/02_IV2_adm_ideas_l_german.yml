 iv2_ideagroup_title_adm_42: "Manichäismus Ideen"
 iv2_ga_ideagroup_adm_42_1: "Lehren des Propheten"
 iv2_ga_ideagroup_adm_42_1_desc: "Prophet Mani hat uns gelehrt, dass Religion ein Fluss der zu einem vereinten Glauben führt ist."
 iv2_ga_ideagroup_adm_42_2: "72 Bischöfe"
 iv2_ga_ideagroup_adm_42_2_desc: "Mani hat 72 Bischöfe ernannt, die die Menschen auf den richtigen Weg führen sollen."
 iv2_ga_ideagroup_adm_42_3: "Last sie das Licht sehen"
 iv2_ga_ideagroup_adm_42_3_desc: "Manichäismus ist eine sehr flexible Religion. Ihre weite und friedliche Verbreitung verdankt sie ihrer Anpassungsfähigkeit an örtliche Sitten und Gebräuche."
 iv2_ga_ideagroup_adm_42_4: "Macht des Kosmos"
 iv2_ga_ideagroup_adm_42_4_desc: "Die Welt ist in einen ständigen Kampf von Licht und Schatten verwickelt in der der Mensch sich entscheiden kann auf welcher Seite er steht."
 iv2_ga_ideagroup_adm_42_5: "Rituelle Musik"
 iv2_ga_ideagroup_adm_42_5_desc: "Musik war ein wichtiges rituelles Werkzeug im Manichäismus."
 iv2_ga_ideagroup_adm_42_6: "Wiedervereinigung der Disapora"
 iv2_ga_ideagroup_adm_42_6_desc: "Aufgrund der großen Verfolgung, die sich der Manichäismus zum Teil ausgesetzt sah, konnten viele Gemeinden nie an die Oberfläche treten. Doch eines Tages ändert sich dies vielleicht."
 iv2_ga_ideagroup_adm_42_7: "Baut einen großen Tempel"
 iv2_ga_ideagroup_adm_42_7_desc: "Aufgrund des großen Einflusses anderer Religionen auf den Manichäismus, war es immer das Ziel ein großes Monument zu erschaffen, dass allein dieser Religion gewidmet ist."
 
