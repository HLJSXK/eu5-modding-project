 iv2_ideagroup_title_adm_22: "Hordenideen"
 iv2_ga_ideagroup_adm_22_1: "Plünderbanden"
 iv2_ga_ideagroup_adm_22_1_desc: "Es ist üblich für uns die fremden Lande der schwachen Völker auszuplündern und das was wir finden für uns zu nutzen."
 iv2_ga_ideagroup_adm_22_2: "Pferdezucht"
 iv2_ga_ideagroup_adm_22_2_desc: "Wir züchten unsere Pferde seit jeher selbst und haben großen Erfolg dabei."
 iv2_ga_ideagroup_adm_22_3: "Langes Gedächtnis"
 iv2_ga_ideagroup_adm_22_3_desc: "Wir sind es gewohnt uns auch über viele Generationen uns unserer Siege und Niederlagen bewusst zu sein."
 iv2_ga_ideagroup_adm_22_4: "Kämpfertradition"
 iv2_ga_ideagroup_adm_22_4_desc: "Unsere Leute müssen kämpfen um das zu bekommen was ihnen zusteht."
 iv2_ga_ideagroup_adm_22_5: "Clanzusammenkunft"
 iv2_ga_ideagroup_adm_22_5_desc: "Wenn sich die Clans versammeln gilt es Einigkeit zwischen ihren Führern herzustellen."
 iv2_ga_ideagroup_adm_22_6: "Hordengebiet"
 iv2_ga_ideagroup_adm_22_6_desc: "Auch wenn wir Nomaden sind, so erinnern wir uns noch an die Zeiten von Genghis Khan, als wir ein Weltreich beherrschten."
 iv2_ga_ideagroup_adm_22_7: "Tributstaaten"
 iv2_ga_ideagroup_adm_22_7_desc: "Unsere Vasallen werden bereitwillig Tribute an uns entrichten."
 
