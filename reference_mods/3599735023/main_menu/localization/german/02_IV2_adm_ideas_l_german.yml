 iv2_ideagroup_title_adm_20: "Entwicklungsideen"
 iv2_ga_ideagroup_adm_20_1: "Staatliche Investitionen"
 iv2_ga_ideagroup_adm_20_1_desc: "Staatliche Investitionen sind wichtig um die Wirtschaft anzukurbeln."
 iv2_ga_ideagroup_adm_20_2: "Staatliche Standards"
 iv2_ga_ideagroup_adm_20_2_desc: "Allgemeine Standards verhindern Misswirtschaft."
 iv2_ga_ideagroup_adm_20_3: "Baupläne"
 iv2_ga_ideagroup_adm_20_3_desc: "Detaillierte Baupläne ermöglich es unseren Architekten und Arbeitern schnell mit ihren Projekten voran zu kommen."
 iv2_ga_ideagroup_adm_20_4: "Baukredite"
 iv2_ga_ideagroup_adm_20_4_desc: "Wir schaffen Anreize, dass möglichst viele Baukredite vergeben werden. Unsere Nation wird langfristig davon profitieren."
 iv2_ga_ideagroup_adm_20_5: "Bürokratie Aufbau"
 iv2_ga_ideagroup_adm_20_5_desc: "Bürokratie hilft uns Regeln aufzustellen, um die Kontrolle über unsere Provinzen zu behalten."
 iv2_ga_ideagroup_adm_20_6: "Geregelte Bauaufsicht"
 iv2_ga_ideagroup_adm_20_6_desc: "Der Ausbau unserer Infrastruktur ist ein kostspieliges Unterfangen. Wenn wir diesen Prozess in passender Weise strukturieren, können wir Kosten einsparen."
 iv2_ga_ideagroup_adm_20_7: "Imposante Strukturen"
 iv2_ga_ideagroup_adm_20_7_desc: "Unsere imposanten Bauwerke zeugen von unserem Einfluss und verschaffen uns Respekt bei den Menschen."
 
