 iv2_ideagroup_title_adm_36: "Koptische Ideen"
 iv2_ga_ideagroup_adm_36_1: "Widerstandsfähigkeit"
 iv2_ga_ideagroup_adm_36_1_desc: "Wir mussten uns schon immer gegen Widrigkeiten durchsetzen. Das hat unsere Leute sehr widerstandsfähig gemacht."
 iv2_ga_ideagroup_adm_36_2: "Gegenseitige Toleranz"
 iv2_ga_ideagroup_adm_36_2_desc: "Wir haben gelernt mit anderen Religionen und Kulturen zusammen zu leben."
 iv2_ga_ideagroup_adm_36_3: "Göttliche Vorherrschaft"
 iv2_ga_ideagroup_adm_36_3_desc: "Es ist von größter Wichtigkeit, dass wir unser Land und die es umgebenden Grenzen von den Ungläubigen, die unser Land belästigen, frei machen."
 iv2_ga_ideagroup_adm_36_4: "Sonntagsschulen"
 iv2_ga_ideagroup_adm_36_4_desc: "In den Sonntagsschulen werden unsere Kinder zu guten Christen ausgebildet."
 iv2_ga_ideagroup_adm_36_5: "Die koptische Sprache"
 iv2_ga_ideagroup_adm_36_5_desc: "Wir sprechen unsere eigene Sprache."
 iv2_ga_ideagroup_adm_36_6: "Das Bekenntnis von Nicäa"
 iv2_ga_ideagroup_adm_36_6_desc: "Das Konzil von Nicäa hat eine starke Bedeutung für koptische Christen."
 iv2_ga_ideagroup_adm_36_7: "Der Papst"
 iv2_ga_ideagroup_adm_36_7_desc: "Unser Papst wird per Losverfahren bestimmt."
 
