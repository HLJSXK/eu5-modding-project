 iv2_ideagroup_title_adm_6: "Gesundheitsideen"
 iv2_ga_ideagroup_adm_6_1: "Längere Arbeitszeiten"
 iv2_ga_ideagroup_adm_6_1_desc: "Wer länger arbeitet, kann auch mehr erwirtschaften. Durch bessere Gesundheit kann man länger arbeiten."
 iv2_ga_ideagroup_adm_6_2: "Verringerte Seuchengefahr"
 iv2_ga_ideagroup_adm_6_2_desc: "Es gibt wenig, was für die Wirtschaft schädigender wäre als eine Seuche. Wir erhöhen so auch die Widerstandskraft von unseren Festungen im Kriegsfalle."
 iv2_ga_ideagroup_adm_6_3: "Steigerung der Lebenserwartung"
 iv2_ga_ideagroup_adm_6_3_desc: "Durch Steigerung der Lebenserwartung erhöhen wir unsere Bevölkerung."
 iv2_ga_ideagroup_adm_6_4: "Körperliche Robustheit"
 iv2_ga_ideagroup_adm_6_4_desc: "Wir einen robusten Körper hat, kann besser mit Extremsituationen umgehen."
 iv2_ga_ideagroup_adm_6_5: "Verringerung der Kindersterblichkeit"
 iv2_ga_ideagroup_adm_6_5_desc: "Sterben weniger Kinder, ist unser Nachwuchs an Arbeitskräften und Soldaten viel größer."
 iv2_ga_ideagroup_adm_6_6: "Medizintechnik"
 iv2_ga_ideagroup_adm_6_6_desc: "Durch die Verbesserung der Medizintechnik bekommen wir allgemein ein besseres Verständnis von Krankheiten."
 iv2_ga_ideagroup_adm_6_7: "Öffentliche Krankenhäuser"
 iv2_ga_ideagroup_adm_6_7_desc: "Wenn medizinische Versorgung jedermann zugute kommt, erhöht das unser Ansehen in der Bevölkerung."
 
