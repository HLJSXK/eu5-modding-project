 iv2_ideagroup_title_adm_18: "Infrastrukturideen"
 iv2_ga_ideagroup_adm_18_1: "Holzbau"
 iv2_ga_ideagroup_adm_18_1_desc: "Holz ist nach wie vor unser wichtigster Baustoff."
 iv2_ga_ideagroup_adm_18_2: "Ausgebautes Infrastrukturnetz"
 iv2_ga_ideagroup_adm_18_2_desc: "Das Straßennetz unseres Landes ist ein wichtiger Bestandteil unseres wirtschaftlichen und administrativen Wohlstands. Daher sollten wir uns um dessen Verbesserung und Instandhaltung kümmern."
 iv2_ga_ideagroup_adm_18_3: "Bauingenieur"
 iv2_ga_ideagroup_adm_18_3_desc: "Durch den Einsatz von Bauingenieuren können wir sicherstellen, dass unsere Gebäude nicht einstürzen."
 iv2_ga_ideagroup_adm_18_4: "Effiziente Baupläne"
 iv2_ga_ideagroup_adm_18_4_desc: "Unsere effiziente Bauplanung ermöglicht es uns, Aufträge ohne Abstriche zu erledigen."
 iv2_ga_ideagroup_adm_18_5: "Bergbau"
 iv2_ga_ideagroup_adm_18_5_desc: "Die Ausweitung unseres Bergbaus wird unsere Produktion benötigter Güter steigern."
 iv2_ga_ideagroup_adm_18_6: "Lokale Infrastrukturkomplexe"
 iv2_ga_ideagroup_adm_18_6_desc: "Trotz unserer Konzentration auf die landesweite Dimension dürfen wir die Betreuung unserer lokalen Landtagsabgeordneten und Gerichtsvollzieher nicht vernachlässigen."
 iv2_ga_ideagroup_adm_18_7: "Stadtplanung"
 iv2_ga_ideagroup_adm_18_7_desc: "Durch sorgfältige Planung steigern wir die Effizienz unseres Städtebaus."
 
