 iv2_ideagroup_title_adm_54: "Traumzeit Ideen"
 iv2_ga_ideagroup_adm_54_1: "Regionale Traumzeit"
 iv2_ga_ideagroup_adm_54_1_desc: "Der Aspekt der Region spielt in der Traumzeit eine Rolle. Je nach unterschiedlichen Orten können sich verschiedene Aspekte der Traumzeit manifestieren."
 iv2_ga_ideagroup_adm_54_2: "Persönliche Traumzeit"
 iv2_ga_ideagroup_adm_54_2_desc: "Die ganz persönliche Ausrichtung des Traumes spielt in der Traumzeit eine große Rolle."
 iv2_ga_ideagroup_adm_54_3: "Toteismus"
 iv2_ga_ideagroup_adm_54_3_desc: "Der Toteismus spielt in der Traumzeit eine wichtige Rolle."
 iv2_ga_ideagroup_adm_54_4: "Anti Transzendenz"
 iv2_ga_ideagroup_adm_54_4_desc: "Die Traumzeit kennt kein klassisches Gottesbild."
 iv2_ga_ideagroup_adm_54_5: "Ursprüng für Recht und Gesetz"
 iv2_ga_ideagroup_adm_54_5_desc: "Die Traumzeit ist der Ursprüng für die Rechte und Gesetze der Menschheit."
 iv2_ga_ideagroup_adm_54_6: "Regenbogenschlange"
 iv2_ga_ideagroup_adm_54_6_desc: "Die Regenbogenschlange ist in der Traumzeit die Verschmelzung zwischen Geist und Materie."
 iv2_ga_ideagroup_adm_54_7: "Seelenstadien"
 iv2_ga_ideagroup_adm_54_7_desc: "Eine Seele muss drei Stadien durchlaufen: Die Geist-Kind-Seele, die Lebens- und die Totenseele."

