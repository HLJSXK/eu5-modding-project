 iv2_ideagroup_title_adm_31: "Konfuzianische Ideen"
 iv2_ga_ideagroup_adm_31_1: "Zuo Tradition"
 iv2_ga_ideagroup_adm_31_1_desc: "Die Zuo Tradition enthält 30 Kapitel und konzentriert sich auf den Zeitraum 722 bis 468 v. Chr. und handelt von politischen, diplomatischen und militärischen Zwischenfällen in der Ära."
 iv2_ga_ideagroup_adm_31_2: "Gongyáng Zhuàn"
 iv2_ga_ideagroup_adm_31_2_desc: "Gongyáng Zhuàn argumentiert, dass Chungiu nicht nur eine Geschichte, aber vielmehr ein Manifest der konfuzianischen Geschichte sei."
 iv2_ga_ideagroup_adm_31_3: "Guliang Zhuan"
 iv2_ga_ideagroup_adm_31_3_desc: "Geschrieben in Frage und Antwort Stil, beschreibt diese Arbeit die Herrschaft von Yin von Lu (722 v. Christus)."
 iv2_ga_ideagroup_adm_31_4: "Kongzi Jiayu"
 iv2_ga_ideagroup_adm_31_4_desc: "Kongzu Jiayu hat eine Sammlung der Diskussionen Konfuzius' mit seinen Schülern herausgegeben, die von diesen Schülern überliefert wurden."
 iv2_ga_ideagroup_adm_31_5: "Ching"
 iv2_ga_ideagroup_adm_31_5_desc: "Die Ching-Sage ist eine Prophezeihung, deren vermutete Entstehungsgeschichte um neunten Jahrhundert vor Christus liegt."
 iv2_ga_ideagroup_adm_31_6: "Erya"
 iv2_ga_ideagroup_adm_31_6_desc: "Die Erya ist ein Wörterbuch, Glossar, eine Wörtersammlung und eine Enzyklopädie."
 iv2_ga_ideagroup_adm_31_7: "Menicus"
 iv2_ga_ideagroup_adm_31_7_desc: "Der Menicus umfasst sieben Kapitel mit Sprichwörtern und pholosophischen Diskussionen und ist ein Schmuckstück östlicher Philosophie."
 
