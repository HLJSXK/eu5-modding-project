 iv2_ga_ideagroup_adm_43_1: "Alte Geschichten"
 iv2_ga_ideagroup_adm_43_1_desc: "Wir können alle Menschen mit den Geschichten über unsere Götter faszinieren."
 iv2_ga_ideagroup_adm_43_2: "Geschichtenerzähler"
 iv2_ga_ideagroup_adm_43_2_desc: "Wir haben eine lange Tradition von alten Männern, die von Dorf zu Dorf wandern und die alten Geschichten verbreiten."
 iv2_ga_ideagroup_adm_43_3: "Hinterhalt"
 iv2_ga_ideagroup_adm_43_3_desc: "Wir werden unsere Feinde aus dem Hinterhalt vernichten."
 iv2_ga_ideagroup_adm_43_4: "Alte Bräuche"
 iv2_ga_ideagroup_adm_43_4_desc: "Wir werden an unseren alten Bräuchen festhalten."
 iv2_ga_ideagroup_adm_43_5: "Gotteskrieger"
 iv2_ga_ideagroup_adm_43_5_desc: "Wir werden unsere Feinde im Namen unserer Götter töten."
 iv2_ga_ideagroup_adm_43_6: "Schulden?"
 iv2_ga_ideagroup_adm_43_6_desc: "Wir kennen keine Schulden."
 iv2_ga_ideagroup_adm_43_7: "Stammesobrigkeit"
 iv2_ga_ideagroup_adm_43_7_desc: "Unsere Stammesherren werden ihre Abgaben bekommen."
 
