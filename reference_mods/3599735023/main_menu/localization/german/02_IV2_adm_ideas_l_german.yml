 iv2_ideagroup_title_adm_19: "Lebensmittelproduktionsideen"
 iv2_ga_ideagroup_adm_19_1: "Jagdrecht für alle"
 iv2_ga_ideagroup_adm_19_1_desc: "Indem wir allen die Jagd auf unserem Land ermöglichen, steigern wir unsere Lebensmittelproduktion."
 iv2_ga_ideagroup_adm_19_2: "Plantagen"
 iv2_ga_ideagroup_adm_19_2_desc: "Durch die Anlage ausgedehnter Plantagen steigern wir unsere Lebensmittelproduktion."
 iv2_ga_ideagroup_adm_19_3: "Lebensmittellagerung"
 iv2_ga_ideagroup_adm_19_3_desc: "Lebensmittellager nehmen unsere Überproduktion auf und schützen sie durch die Erprobung neuer Konservierungsmethoden vor dem Verderben."
 iv2_ga_ideagroup_adm_19_4: "Bevölkerungswachstum"
 iv2_ga_ideagroup_adm_19_4_desc: "Bei Überproduktion von Nahrungsmitteln ist das Bevölkerungswachstum immer hoch."
 iv2_ga_ideagroup_adm_19_5: "Erschließung neuer Ackerflächen"
 iv2_ga_ideagroup_adm_19_5_desc: "Durch die Bewirtschaftung des Landes können wir neues landwirtschaftlich nutzbares Land gewinnen."
 iv2_ga_ideagroup_adm_19_6: "Günstige Lebensmittel"
 iv2_ga_ideagroup_adm_19_6_desc: "Da wir viele Lebensmittel selbst produzieren, wirkt sich dies positiv auf die Lebensmittelpreise aus."
 iv2_ga_ideagroup_adm_19_7: "Großstädte"
 iv2_ga_ideagroup_adm_19_7_desc: "Unsere Überproduktion an Nahrungsmitteln wird es uns ermöglichen, deutlich größere Städte zu bauen."
 
