 iv2_ideagroup_title_adm_27: "Orthodoxe Ideen"
 iv2_ga_ideagroup_adm_27_1: "Missionarsschulen"
 iv2_ga_ideagroup_adm_27_1_desc: "Es gibt zwar keinen Mangel an Menschen, die den wahren Glauben verkünden möchten, doch meist ist es so, dass diese mehr schaden als nützen. Mit speziellen Schulen zur Ausbildung der Missionare werden wir sicherstellen, dass wir mehr Menschen haben, die neben dem Wunsch auch die Fähigkeit zur Verkündung des Glaubens mitbringen."
 iv2_ga_ideagroup_adm_27_2: "Ikonen"
 iv2_ga_ideagroup_adm_27_2_desc: "Durch die Ikonenverehrung, finden viele Leute Trost im Alltag."
 iv2_ga_ideagroup_adm_27_3: "Göttliche Vorherrschaft"
 iv2_ga_ideagroup_adm_27_3_desc: "Es ist von größter Wichtigkeit, dass wir unser Land und die es umgebenden Grenzen von den Ungläubigen, die unser Land belästigen, frei machen."
 iv2_ga_ideagroup_adm_27_4: "Kulturelle Anziehung"
 iv2_ga_ideagroup_adm_27_4_desc: "Die Kombination aus Kultur und Religion hat uns schon immer anziehend für konvertiten gemacht."
 iv2_ga_ideagroup_adm_27_5: "Patriarchverwalter"
 iv2_ga_ideagroup_adm_27_5_desc: "Gebildete Patriarchen helfen das Reich zu verwalten."
 iv2_ga_ideagroup_adm_27_6: "Zusammenhalt der Lande"
 iv2_ga_ideagroup_adm_27_6_desc: "In unseren Landen herrscht schon immer ein großes Maß an Solidarität und allgemeiner Zusammenhalt, ganz gleich welcher Religion unsere Bürger angehören."
 iv2_ga_ideagroup_adm_27_7: "Vermittlung der Kirche"
 iv2_ga_ideagroup_adm_27_7_desc: "Unsere Kirchenoberen haben eine lange Tradition, Konflikte friedlich zu lösen."
 
