 iv2_ideagroup_title_adm_16: "Wirtschaftsideen"
 iv2_ga_ideagroup_adm_16_1: "Kapitalismus"
 iv2_ga_ideagroup_adm_16_1_desc: "Durch die Einführung einer stärker kapitalistischen Wirtschaft modernisieren wir unsere Praktiken."
 iv2_ga_ideagroup_adm_16_2: "Schulden und Kredite"
 iv2_ga_ideagroup_adm_16_2_desc: "Schulden sind manchmal einfach unvermeidlich. Ein organisierter Schuldenmarkt ermöglicht es uns jedoch, Kredite zu einem niedrigeren Zinssatz aufzunehmen."
 iv2_ga_ideagroup_adm_16_3: "Verwaltungswissenschaften"
 iv2_ga_ideagroup_adm_16_3_desc: "Indem wir unsere Verwaltungspraktiken untersuchen und versuchen, Verbesserungsmöglichkeiten zu analysieren, können wir unsere Effizienz erheblich steigern."
 iv2_ga_ideagroup_adm_16_4: "Nationalbank"
 iv2_ga_ideagroup_adm_16_4_desc: "Durch die Schaffung einer zentralen Finanzbehörde können wir die Wirtschaft unseres Landes besser kontrollieren."
 iv2_ga_ideagroup_adm_16_5: "Zentralisierung"
 iv2_ga_ideagroup_adm_16_5_desc: "Eine Zentralisierung des Staates erleichtert es uns, die Ideen und Ziele des Zentrums in den Regionen durchzusetzen."
 iv2_ga_ideagroup_adm_16_6: "Smithian Economics"
 iv2_ga_ideagroup_adm_16_6_desc: "Indem wir den Merkantilismus bekämpfen und den Einfluss des Staates auf wirtschaftliche Angelegenheiten einschränken, unterstützen wir einen freien Markt, der unsere allgemeine Produktionseffizienz steigert."
 iv2_ga_ideagroup_adm_16_7: "Bürokratie"
 iv2_ga_ideagroup_adm_16_7_desc: "Ermöglicht uns, unsere Steuereinnahmen durch die Einführung eines bürokratischeren Verwaltungssystems zu erhöhen, das von staatlichen Beamten gesteuert wird."
 
