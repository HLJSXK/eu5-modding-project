 iv2_ideagroup_title_adm_10: "Theokratie Ideen"
 iv2_ga_ideagroup_adm_10_1: "Feste feiern wie sie fallen"
 iv2_ga_ideagroup_adm_10_1_desc: "Das Feiern unserer Feste wird die Stimmung in unserem Land immer hoch halten."
 iv2_ga_ideagroup_adm_10_2: "Göttlicher Sturmangriff"
 iv2_ga_ideagroup_adm_10_2_desc: "Mit Gott auf unserer Seite können wir nur zum Sieg stürmen."
 iv2_ga_ideagroup_adm_10_3: "Religiöse Überlegenheit"
 iv2_ga_ideagroup_adm_10_3_desc: "Wir beweisen immer wieder die Überlegenheit unserer Religion. Es wird uns deshalb leichter fallen andere von dieser Überlegenheit zu überzeugen."
 iv2_ga_ideagroup_adm_10_4: "Kirchenrecht"
 iv2_ga_ideagroup_adm_10_4_desc: "Das Kirchenrecht bestärkt uns in unseren Unternehmungen."
 iv2_ga_ideagroup_adm_10_5: "Segnet die Kanonen"
 iv2_ga_ideagroup_adm_10_5_desc: "Durch die Segnung unserer Kanonen können wir viele zu Spenden motivieren, damit wir mehr Kanonen kaufen können."
 iv2_ga_ideagroup_adm_10_6: "Heiliger Krieg"
 iv2_ga_ideagroup_adm_10_6_desc: "In einem heiligen Krieg müssen unsere Forderungen nicht maßvoll sein."
 iv2_ga_ideagroup_adm_10_7: "Göttliche Rechtfertigung"
 iv2_ga_ideagroup_adm_10_7_desc: "Wir können auch unmäßige Forderungen vor unserer Religionen rechtfertigen."
 
