 iv2_ideagroup_title_adm_48: "Maya Ideen"
 iv2_ga_ideagroup_adm_48_1: "Weltelternpaar"
 iv2_ga_ideagroup_adm_48_1_desc: "Das Weltelternpaar in der mayanischen Religion bilden die Götter von Sonne und Mond."
 iv2_ga_ideagroup_adm_48_2: "Lebensweg"
 iv2_ga_ideagroup_adm_48_2_desc: "Der Lebensweg in der mayanischen Religion geht von Osten nach Westen. Er wird als sehr beschwerlich erachtet und endet mit dem Tod."
 iv2_ga_ideagroup_adm_48_3: "Blutopfer"
 iv2_ga_ideagroup_adm_48_3_desc: "Durch ein Blutopfer können wir die Götter besänftigen."
 iv2_ga_ideagroup_adm_48_4: "Menschenopfer"
 iv2_ga_ideagroup_adm_48_4_desc: "Die Maya Religion kannte viele Varianten der Menschenopfer. Rituelle Hinrichtungen wie Köpfen, Ertränken, Hängen, Steinigen oder lebendig Begraben sind nur einige Beispiele."
 iv2_ga_ideagroup_adm_48_5: "Göttererhaltung"
 iv2_ga_ideagroup_adm_48_5_desc: "Durch das Opfern von Menschen glaubten die Maya sie könnten ihre Götter am Leben erhalten."
 iv2_ga_ideagroup_adm_48_6: "Hohepriester"
 iv2_ga_ideagroup_adm_48_6_desc: "Das Amt eines Hohepriesters ist eines der am meisten geschätzten Ämter im ganzen Staat."
 iv2_ga_ideagroup_adm_48_7: "Kalender der Maya"
 iv2_ga_ideagroup_adm_48_7_desc: "Der Kalender der Maya sagt in Zyklen die Ereignisse der Zukunft voraus."
 
