 iv2_ideagroup_title_adm_34: "Shinto Ideen"
 iv2_ga_ideagroup_adm_34_1: "Hachiam"
 iv2_ga_ideagroup_adm_34_1_desc: "Auch bekannt als Hachiam-shin oder Yawata no Kami, ist er der Gott des Krieges und heiliger Verteidiger Japans."
 iv2_ga_ideagroup_adm_34_2: "Inari Okami"
 iv2_ga_ideagroup_adm_34_2_desc: "Die Göttin der Fruchtbarkeit und des Reises. Das symbolische Tier dieser Göttin ist der Fuchs."
 iv2_ga_ideagroup_adm_34_3: "Omoikane"
 iv2_ga_ideagroup_adm_34_3_desc: "Die Gottheit der Weisheit und Intelligenz, die einem jederzeit mit Rat zur Seite stehen wird."
 iv2_ga_ideagroup_adm_34_4: "Izanagi-no-Mikoto"
 iv2_ga_ideagroup_adm_34_4_desc: "Izanagi-no-Mikoto ist eine Gottheit die aus den sieben heiligen Generationen der japanischen Mythologie geboren wurde."
 iv2_ga_ideagroup_adm_34_5: "Susanoo-no-Mikoto"
 iv2_ga_ideagroup_adm_34_5_desc: "Der Gott des Sturmes und des Meeres, mit dem Gott Amaterasu in Rivalität lebend, markiert Susanoo das Töten des Monster Yamata no Orochi für sich und die Entdeckung des legenären Schwertes Kusanagi."
 iv2_ga_ideagroup_adm_34_6: "Ame-no-Uzume"
 iv2_ga_ideagroup_adm_34_6_desc: "Meist nur Uzume genannt, steht diese Götting für Sonnenaufgang und die Feiern."
 iv2_ga_ideagroup_adm_34_7: "Ninigi-no-Mikoto"
 iv2_ga_ideagroup_adm_34_7_desc: "Oft nur Ningiri genannt, ist Ninigi-no-Mikoto die Götting der Verfolgung und somit die 'Gefürchteste Frau des Himmels-'"

