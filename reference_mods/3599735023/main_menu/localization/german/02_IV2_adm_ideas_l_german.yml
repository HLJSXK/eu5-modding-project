 iv2_ideagroup_title_adm_46: "Anglikanische Ideen"
 iv2_ga_ideagroup_adm_46_1: "Missionarsschulen"
 iv2_ga_ideagroup_adm_46_1_desc: "Es gibt zwar keinen Mangel an Menschen, die den wahren Glauben verkünden möchten, doch meist ist es so, dass diese mehr schaden als nützen. Mit speziellen Schulen zur Ausbildung der Missionare werden wir sicherstellen, dass wir mehr Menschen haben, die neben dem Wunsch auch die Fähigkeit zur Verkündung des Glaubens mitbringen."
 iv2_ga_ideagroup_adm_46_2: "Klosterauflösung"
 iv2_ga_ideagroup_adm_46_2_desc: "Wir werden die korrupten Klöster in unseren Landen auflösen und ihr Geld besser nutzen."
 iv2_ga_ideagroup_adm_46_3: "Göttliche Vorherrschaft"
 iv2_ga_ideagroup_adm_46_3_desc: "Es ist von größter Wichtigkeit, dass wir unser Land und die es umgebenden Grenzen von den Ungläubigen, die unser Land belästigen, frei machen."
 iv2_ga_ideagroup_adm_46_4: "Religiöse Unruhen"
 iv2_ga_ideagroup_adm_46_4_desc: "Wir gewöhnen uns mit der Zeit an den ständigen Kampf zwischen den einzelnen Konfessionen in unserem Land."
 iv2_ga_ideagroup_adm_46_5: "Auswanderungswelle"
 iv2_ga_ideagroup_adm_46_5_desc: "Die religiösen Konflikte in unserem Land führen immer wieder zu Auswanderungswellen in die Kolonien."
 iv2_ga_ideagroup_adm_46_6: "Fortschritt"
 iv2_ga_ideagroup_adm_46_6_desc: "Wir haben die Fesseln des Rückschritts mit unserer neuen Konfession abgeworfen."
 iv2_ga_ideagroup_adm_46_7: "Segnet Kanonen"
 iv2_ga_ideagroup_adm_46_7_desc: "Aufgrund unseres Fortschrittdenkens und die Unterstützung der Kirche in unseren Zielen, können wir die Fähigkeiten unserer Artillerie verbessern."
 
