 iv2_ga_ideagroup_adm_33_7: "Die klare Sicht"
 iv2_ga_ideagroup_adm_33_7_desc: "Seht die Dinge mit einem klaren Verstand - seit euch euer gegenwärtigen Realität allgegenwärtig."
 
