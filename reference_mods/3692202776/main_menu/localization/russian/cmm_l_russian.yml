 CMM_REGISTERED_MODS_LABEL: "Зарегистрированные моды: 荒野求生 (Wild Survival) - Это захватывающее приключение, в котором вам предстоит выживать в дикой природе.\nВ этой игре вам нужно будет собирать ресурсы, строить убежище, охотиться на животных и бороться с опасностями, которые подстерегают вас на каждом шагу.\nИсследуйте разнообразные локации, от густых лесов до заснеженных гор, и найдите способы выжить в самых суровых условиях.\nУлучшайте свои навыки выживания, создавайте новые инструменты и оружие, чтобы стать настоящим мастером выживания.\nБудьте осторожны, ведь природа не прощает ошибок. Готовы ли вы принять вызов и доказать, что вы способны выжить в любых условиях?\nСкачайте "Зарегистрированные моды: 荒野求生 (Wild Survival)" прямо сейчас и начните свое незабываемое приключение в мире дикой природы!"
