l_simp_chinese:
 shallow_tin_mine_advance: "浅层锡矿开采技术"
 shallow_tin_mine_advance_desc: "早期金属工匠学会了直接从河床采集锡石，通过简单的挖掘和淘洗技术，可以将聚集在河床中的锡重颗粒筛选出，从而获取足够的矿石来制造最初青铜工具与装饰品。"
 galenite_extraction_advance: "改进的方铅矿处理工艺"
 galenite_extraction_advance_desc: "以前的冶炼者发现方铅矿中往往含有微量的银。通过加热矿石并分离其熔融层，冶金师能够提取出铅作为有用的副产品，同时将贵金属富集以供进一步精炼。这项技术帮助扩大了早期白银产量，并催生了一些最早的专业矿石加工方法。"
 cinnabar_refinement_advance: "朱砂汞提取"
 cinnabar_refinement_advance_desc: "早期工匠发现，在密闭容器中加热朱砂会使其中的汞蒸发，随后可冷凝成液态。这种易挥发的金属成为镀金和贵金属汞齐化的关键材料，使得采汞成为一项珍贵却危险的技艺。"
 potash_works_advance: "钾肥生产技术"
 potash_works_advance_desc: "工匠们发现，通过控制燃烧和浸析富含矿物质的土壤，能够提取出钾碱和明矾石，这两种关键的媒染可用于稳定色泽并软化皮革，使其成为早期纺织与制革行业不可或缺的材料。"
 beekeepers_hut_advance: "养蜂窍诀"
 beekeepers_hut_advance_desc: "早期养蜂人学会通过空心原木或编织的稻草制作简易蜂箱来驯养野生蜜蜂。通过管理这些蜂群，他们能够收获蜂蜜和蜂蜡——这些是用于食品、医药和制蜡的重要物资。"
 hunting_camp_advance: "有组织的狩猎技巧"
 hunting_camp_advance_desc: "随着不断完善追踪方法和野生动物的知识，猎人开始在关键迁徙路线上建立半永久性狩猎营地。这些营地支持协同狩猎，为早期聚落的生存提供了至关重要的肉类、毛皮和骨制工具。"
 native_extermination_advance: "高效驱逐"
 native_extermination_advance_desc: "殖民者发展出了系统性的方法来驱逐和灭绝原住民。这些残酷手段包括强制迁移、暴力干预以及传播疾病，其目的都是为殖民者清理土地并掠夺资源。"
 urban_housing_expansion_advance: "城镇住房开发"
 urban_housing_expansion_advance_desc: "随着城镇中商人、工匠和外来劳工的增多，城市规划者开始尝试更密集的住宅街区、标准化的街道以及多层住宅。这些新建造方式反映了商业与人口增长带来的压力，标志着从中世纪城镇景观向更有规划组织的城市街区的过渡。"
 urban_infrastucture_expansion_advance: "城镇基础设施改善"
 urban_infrastucture_expansion_advance_desc: "贸易枢纽的发展推动城市升级其基础设施，包括拓宽街道、加固桥梁、统一标识系统以及改善夜间照明。这些改进措施促进了货物与人员更顺畅的流动，体现了市政规划与城镇协调机制的日趋成熟。"
 urban_sewage_system_advance: "城镇排水系统发展"
 urban_sewage_system_advance_desc: "随着城镇人口日益密集，污染管理变得至关重要。早期工匠设计了简陋的污水系统，采用铅管、铜管和石料渠道将污水从生活区域引流出去，显著改善了新兴城市的公共卫生与环境卫生状况。"
 hydrothermal_copper_mine_advance: "热液铜矿开采"
 hydrothermal_copper_mine_advance_desc: "古代矿工发现铜矿石可在断裂岩层中由富含矿物质的热水循环形成的矿脉中找到。通过追踪这些矿脉并开采矿石，早期冶金师得以获取对工具制造和贸易至关重要的优质铜矿资源。"
 hydrothermal_copper_shaft_mine_advance: "先进的热液铜矿开采"
 hydrothermal_copper_shaft_mine_advance_desc: "随着采矿技术的进步，工人们开发出竖井采矿技术以获取更深层的热液铜矿脉。这使得高品位铜矿石的开采效率得到显著提升。"
 brine_well_advance: "卤水抽取技术"
 brine_well_advance_desc: "早期的盐生产者发现，可以通过钻井来获取地下卤水矿藏。通过汲取咸水并煮沸浓缩，他们能高效提取这种至关重要的防腐剂和调味品——盐。"
 laterite_bloomery_advance: "红土铁矿冶炼"
 laterite_bloomery_advance_desc: "在热带地区，铁匠利用富含氧化铁的红土，通过焙烧矿石，并使用木炭作为燃料建造块炼炉，他们能够将铁矿石还原成可锻的铁块，为工具和武器提供了材料。"
 laterite_bloomery_african_soils_advance: "非洲红土铁冶炼"
 laterite_bloomery_african_soils_advance_desc: "非洲本土冶金工匠开发了专门冶炼其地区丰富的红土矿石的技术。通过根据当地条件调整块炼炉设计并利用本土木炭资源，他们高效地生产出铁块，推动了早期非洲文明的发展。"
 agricultural_residue_collector_advance: "农业废弃物利用"
 agricultural_residue_collector_advance_desc: "随着燃料资源日益稀缺，农耕社会通过收集并再利用秸秆、谷壳、秸秆等农业残余物进行创新。这些材料被加工成燃料，补充了传统木材和木炭供应，用于取暖和金属加工。"
 improved_masonry_advance: "先进砌筑技术"
 improved_masonry_advance_desc: "工匠们通过开发标准化的砖块形状、改进砂浆配方以及设计更高效的窑炉来提升他们的砌筑技艺。这些创新使得建筑结构更为坚固、耐用，并加速了不断扩大的定居点中的建筑项目进度。"
 slave_auction_advance: "奴隶拍卖行"
 slave_auction_advance_desc: "随着跨大西洋奴隶贸易的扩张，殖民势力建立了专门的拍卖行以促进被奴役者的销售。"