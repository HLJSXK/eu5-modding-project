l_simp_chinese:
 religious_court: "宗教法庭"
 religious_court_desc: "这座城市中的法院由教会管理，这使教士在省份中拥有重要的政治影响力。"
 noble_court: "贵族法院"
 noble_court_desc: "这座城市中的法院由教会管理，这使贵族在省份中拥有重要的政治影响力。"
 grand_itinerant_court: "巡回法庭"
 grand_itinerant_court_desc: "该国宫廷具有流动性，君主不会长期驻留于特定宫廷，尽管可能设有主要都城，但其境内分布着众多可供施政的宫廷（仅在选择“分权统治”政体并完成“流动宫廷”改革后可用）"
 itinerant_court: "流动宫廷"
 itinerant_court_desc: "该国宫廷具有流动性，君主不会长期驻留于特定宫廷，尽管可能设有主要都城，但其境内分布着众多可供施政的宫廷（仅在选择“分权统治”政体可用）"
 urban_court: "城市法院"
 urban_court_desc: "这座城市中的法院由市民管理，这使市民在省份中拥有重要的政治影响力。"
 rural_court: "乡村法庭"
 rural_court_desc: "这座城市中的法院由农民管理，这使农民在省份中拥有重要的政治影响力。"
