l_simp_chinese:
 coin_debasement:0 "货币贬值"
 coin_debasement_desc:0 "下令铸造劣质货币，以铜镀银充盈国库。此举虽能迅速筹措资金，却会削弱民众对货币的信任并打击商人的信心。"
 coin_debasement_req_once_tt:0 "仅限每次议会会议期间使用一次。"
 coin_debasement_effect_tt:0 "国库获得相当于税基12倍的黄金（最低50）。通货膨胀按比例上升。贸易效率降低25年。"
 STATIC_MODIFIER_NAME_coin_debasement_trade_penalty:0 "劣质铸币"
 STATIC_MODIFIER_DESC_coin_debasement_trade_penalty:0 "由于货币贬值，商人们对货币失去了信心，导致整个领地的贸易效率下降。"
 recoinage:0 "重铸货币"
 recoinage_desc:0 "召回旧币或劣质货币，按足重与纯度重新铸造。此举能恢复公众对货币的信心并改善税收征收，但需要投入大量前期资金。"
 recoinage_req_once_tt:0 "仅限每次议会会议期间使用一次。"
 recoinage_req_gold_tt:0 "重铸操作需要相当于12倍税基的黄金来提供资金。"
 recoinage_req_no_bankruptcy_tt:0 "国家破产时无法执行此操作。"
 recoinage_req_precious_metals_tt:0 "需要该国生产黄金或白银。"
 recoinage_effect_tt:0 "花费相当于12倍税基的黄金。获得3点威望。每月降低通货膨胀0.001。税收收入效率提升2%，铸币门槛提高，持续10年。"
 STATIC_MODIFIER_NAME_recoinage_combined_effects:0 "重铸货币，王室币制改革"
 STATIC_MODIFIER_DESC_recoinage_combined_effects:0 "领地的货币已被召回，并以足重足纯重新铸造。人们对货币的信心增强，从而改善税收征收，降低每月通货膨胀，并在触发通胀压力前允许更高的铸币产出。"
 sell_government_offices:0 "出售官职"
 sell_government_offices_desc:0 "将政府职位和行政职务拍卖给出价最高的阶层。这是一种短期获利手段，却让阶层利益深深嵌入官僚体系之中。"
 sell_offices_req_once_tt:0 "仅限每次议会会议期间使用一次。"
 sell_offices_req_no_cooldown_tt:0 "此前出售官职后，已被禁止10年。"
 sell_offices_select_estate:0 "选择一个阶层出售官职。"
 sell_offices_no_estates:0 "没有符合条件的阶层可用。"
 trigger_no_sell_offices_no_estates:0 "没有符合条件的阶层可用。"
 sell_offices_req_estate_power_tt:0 "只有阶层力量超过10%的阶层才能购买政府官职。"
 sell_government_offices_cooldown:0 "出售官职（10年冷却时间）"
 sell_offices_effect_tt:0 "获得所选阶层50%的资金。该阶层将获得满意度与权力,代价是内阁效率、威望及军队士气在未来10年内下降。其他阶层的满意度将降低。"
 STATIC_MODIFIER_NAME_sell_offices_nobles_power:0 "贵族：官职任命"
 STATIC_MODIFIER_DESC_sell_offices_nobles_power:0 "贵族已被授予官职，其影响力延伸至政务之中。"
 STATIC_MODIFIER_NAME_sell_offices_clergy_power:0 "教士：官职任命"
 STATIC_MODIFIER_DESC_sell_offices_clergy_power:0 "教士已被授予政府官职，将其影响力延伸至行政管理领域。"
 STATIC_MODIFIER_NAME_sell_offices_burghers_power:0 "市民阶层：官职任命"
 STATIC_MODIFIER_DESC_sell_offices_burghers_power:0 "市民阶层已被授予官职，其影响力延伸至政府机构。"
 STATIC_MODIFIER_NAME_sell_offices_peasants_power:0 "平民：官职任命"
 STATIC_MODIFIER_DESC_sell_offices_peasants_power:0 "平民代表被授予政府职位，其影响力已延伸至行政体系之中。"
 STATIC_MODIFIER_NAME_sell_offices_dhimmi_power:0 "齐米：官职任命"
 STATIC_MODIFIER_DESC_sell_offices_dhimmi_power:0 "齐米们获得了政府职位，他们的影响力已延伸至行政管理层。"
 STATIC_MODIFIER_NAME_sell_offices_penalties:0 "官职售卖：官僚庇护"
 STATIC_MODIFIER_DESC_sell_offices_penalties:0 "政府职位由裙带关系而非才能决定，会降低内阁效率，加速稳定性的自然衰退，并削弱军官队伍的专业素养。"
 confiscate_estate_wealth:0 "没收阶层财富"
 confiscate_estate_wealth_desc:0 "通过议会法令夺取某阶层积累的储备。这种强征行为虽能充实国库，却会彻底摧毁王室与臣民间的信任。"
 confiscate_wealth_req_once_per_estate_tt:0 "每个阶层在议会会期内只能被没收一次。"
 confiscate_wealth_req_has_gold_tt:0 "该阶层必须持有黄金才能没收。"
 confiscate_wealth_select_estate:0 "选择一个阶层以没收其财富。"
 confiscate_wealth_no_estates:0 "没有符合条件的阶层可用。"
 trigger_no_confiscate_wealth_no_estates:0 "没有符合条件的阶层可用。"
 confiscate_wealth_effect_tt:0 "夺取所选阶层90%的黄金。获得威望并承受稳定度损失，两者均根据该阶层实力按比例增减。所选阶层将遭受持久的满意度惩罚。其他所有阶层会产生团结性不满。同时触发该阶层特有的惩罚效果。"
 confiscate_wealth_estate_lose_gold_tt:0 "所选阶层90%的黄金被没收。"
 STATIC_MODIFIER_NAME_confiscate_wealth_nobles_target_sat:0 "没收贵族财产：贵族不满"
 STATIC_MODIFIER_DESC_confiscate_wealth_nobles_target_sat:0 "贵族金库已由王室法令查封。未来数年，他们参与政务的程度将受到限制。"
 STATIC_MODIFIER_NAME_confiscate_wealth_clergy_target_sat:0 "没收教会财产：教会的不满"
 STATIC_MODIFIER_DESC_confiscate_wealth_clergy_target_sat:0 "王室挪用了神圣的资金，导致教士们不愿全力配合王室政策。"
 STATIC_MODIFIER_NAME_confiscate_wealth_burghers_target_sat:0 "没收商人财富"
 STATIC_MODIFIER_DESC_confiscate_wealth_burghers_target_sat:0 "王室以法令没收商人储备，动摇了商人对王室尊重财产的信任。"
 STATIC_MODIFIER_NAME_confiscate_wealth_peasants_target_sat:0 "没收平民财富"
 STATIC_MODIFIER_DESC_confiscate_wealth_peasants_target_sat:0 "对公有土地的掠夺在平民百姓中激起了对王室的强烈不满。"
 STATIC_MODIFIER_NAME_confiscate_wealth_dhimmi_target_sat:0 "没收齐米财富"
 STATIC_MODIFIER_DESC_confiscate_wealth_dhimmi_target_sat:0 "王室征用受保护社区资金的行为，加剧了齐米社群与王室之间的紧张关系。"
 STATIC_MODIFIER_NAME_confiscate_wealth_other_estates_target_sat:0 "没收财产，怨恨团结"
 STATIC_MODIFIER_DESC_confiscate_wealth_other_estates_target_sat:0 "其他阶层对王室通过法令攫取财富的意愿感到警惕，降低了他们的长期满意度预期。"
 STATIC_MODIFIER_NAME_confiscate_wealth_nobles_penalty:0 "没收财产，贵族阻挠"
 STATIC_MODIFIER_DESC_confiscate_wealth_nobles_penalty:0 "心怀不满的贵族在其封地中阻挠征税，降低了整个领地的税收效率。"
 STATIC_MODIFIER_NAME_confiscate_wealth_clergy_penalty:0 "没收教会财产，教会反抗"
 STATIC_MODIFIER_DESC_confiscate_wealth_clergy_penalty:0 "教会资金被没收后，学者与机构纷纷撤回合作，导致研究与学术进展放缓。"
 STATIC_MODIFIER_NAME_confiscate_wealth_burghers_penalty:0 "商人撤资"
 STATIC_MODIFIER_DESC_confiscate_wealth_burghers_penalty:0 "商人资本的没收引发了商界的恐慌，导致商业活动收缩，贸易效率也随之下降。"
 STATIC_MODIFIER_NAME_confiscate_wealth_peasants_penalty:0 "农民动乱"
 STATIC_MODIFIER_DESC_confiscate_wealth_peasants_penalty:0 "夺取农民的储备粮加剧了乡村地区的叛乱，削弱了领地的可用人力。"
 STATIC_MODIFIER_NAME_confiscate_wealth_dhimmi_penalty:0 "齐米逃亡"
 STATIC_MODIFIER_DESC_confiscate_wealth_dhimmi_penalty:0 "担心财产被进一步征用，齐米商人、学者和官员纷纷退出公共生活，导致整个领地的贸易、税收和研究活动减少。"
 AUTO_MODIFIER_NAME_parliament_session_court_costs:0 "议会召开"
 AUTO_MODIFIER_DESC_parliament_session_court_costs:0 "各阶层已在宫廷会聚。举办会议所需的仪式、宴席及住宿安排，增加了维持宫廷运作的开销。"