l_simp_chinese:
 oracle: "神谕所"
 oracle_desc: "一处圣地，神明会通过祭司传达旨意，为前来求问者赐下预言与指引。"
 gathering_place_druids: "德鲁伊之环"
 gathering_place_druids_desc: "德鲁伊仪式集会地，集宗教仪轨、法律裁决与口头传统保存于一体。"
 passage_tombs: "通道墓"
 passage_tombs_desc: "古代巨石墓葬群由土或石覆盖，常与天文事件对齐，作为与祖先连接的载体。"
 gateway: "门扉"
 gateway_desc: "一处神秘的地点，被认为是凡间与异世界的交界处，此间不同领域之间的帷幕尤为稀薄。"
 polytheistic_holy_site: "多神教圣地"
 polytheistic_holy_site_desc: "一处普遍供奉和敬拜众神的场所，是当地社区信仰生活的中心。"
 sacred_groves: "圣林"
 sacred_groves_desc: "一片森林中的自然圣所，未曾被斧头触及，诸神仿佛就在沙沙作响的树叶和古老的树木间。"
 pyramids: "金字塔"
 pyramids_desc: "为法老及其王后建造的宏伟陵墓，彰显着他们的神圣力量，也是通往来世的入口。"
 sacred_mountain: "圣山"
 sacred_mountain_desc: "一座巍峨的山峰，被尊为众神的居所，或是天地交汇的圣境。朝圣者沿着山脊拾级而上，寻求心灵的启迪，献上虔诚的祭品，或只是驻足仰望神明的威严。"
 ancient_capital: "古都"
 ancient_capital_desc: "一座历史悠久、传说众多的城市，曾为强大王朝的都城与文明中心。它的遗迹与不朽的建筑，时刻提醒着人们那段辉煌的往昔，唤起后人的敬畏之情，以及与祖先一脉相承的延续感。"