l_simp_chinese:
 roman_polytheism: "罗马多神教"
 roman_polytheism_ADJ: "罗马多神教"
 roman_polytheism_desc: "罗马宗教是一种多神教信仰，其核心在于对众神祇的敬拜。信徒认为，正确遵循仪式与献祭对于维系“众神和平”至关重要，这将确保国家的繁荣与稳定。"
 gallo_roman_polytheism: "高卢‑罗马多神教"
 gallo_roman_polytheism_ADJ: "高卢‑罗马多神教"
 gallo_roman_polytheism_desc: "高卢‑罗马多神教是一种融合性宗教，起源于高卢本土传统与罗马宗教实践的相互交融。尽管罗马诸神体系中的主要神祇受到供奉，但它们常与本土凯尔特神祇相对应，例如墨丘利与卢格斯对应，朱庇特与塔拉尼斯对应。这一信仰的特征在于融合了帝国崇拜仪式，并延续了对古老凯尔特圣地的尊崇，从而形成了一种既符合罗马规范又带有鲜明高卢特色的独特宗教形态。"
 romano_british_polytheism: "罗马‑不列颠多神教"
 romano_british_polytheism_ADJ: "罗马‑不列颠多神教"
 romano_british_polytheism_desc: "罗马‑不列颠多神教体现了罗马宗教传统与不列颠本土布立吞人信仰的融合。信徒既崇拜罗马诸神，也敬奉当地凯尔特神祇，常以巴斯的苏利斯-密涅瓦这类融合形态出现。该信仰将帝国崇拜的体系结构与对土地之灵、神圣泉水和古老丛林的深切尊崇相结合，体现出外来精神传统与本土灵性信仰的独特交融。"
 hispano_roman_polytheism: "希斯帕尼亚-罗马"
 hispano_roman_polytheism_ADJ: "希斯帕尼亚-罗马"
 hispano_roman_polytheism_desc: "伊斯帕尼亚-罗马多神教是伊比利亚半岛的一种融合性信仰，它将罗马的神祇体系与仪式同凯尔特伊比利亚与伊比利亚诸族的本土宗教相结合。在崇拜朱庇特、玛尔斯等罗马神祇的同时，人们也继续供奉与山川、森林、河流相关的本地神灵。这一宗教体现了帝国权威与根深蒂固的地方传统的交融，形成了西班牙独特的多元化宗教景观。"
 romano_germanic_polytheism: "罗马‑日耳曼多神教"
 romano_germanic_polytheism_ADJ: "罗马‑日耳曼多神教"
 romano_germanic_polytheism_desc: "罗马-日耳曼多神教是一种融合性信仰，诞生于莱茵河边境地区的文化与宗教交融。其信众奉行罗马与日耳曼传统的混合仪式，罗马神祇常通过“罗马诠释”与当地神灵相互对应。标志性例子包括将墨丘利视作沃丹、赫丘利视作多纳尔、玛尔斯视作提瓦兹进行崇拜。这一宗教既保留了罗马式的祭祀仪式（包括使用还愿祭坛），又延续了日耳曼多神教中对圣林与自然圣地的重要尊崇，在帝国边疆地带形成了独特的宗教景观。"
 gaelic_polytheism: "盖尔多神教"
 gaelic_polytheism_ADJ: "盖尔多神教"
 gaelic_polytheism_desc: "盖尔多神教是一种以达努神族为核心信仰的宗教，尊崇祖先神灵，并与自然世界保持深刻联结。信徒相信存在一个由神祇和亡者灵魂居住的“彼世”，并通过庆祝夏末节、圣烛节、五朔节和收获节这四个季节性节日，来尊崇生命与土地的循环本质。"
 brythonic_polytheism: "布立吞多神教"
 brythonic_polytheism_ADJ: "布立吞多神教"
 brythonic_polytheism_desc: "布立吞多神教是不列颠布立吞民族的多神教传统。这一信仰强调土地与其神灵之间的深刻联系，神祇常与特定部落或河流、山丘等自然特征紧密相连。其核心教义包括对“彼世”的信仰——即众神与精灵栖居的领域，以及神圣王权观，即将统治者的合法性与土地本身相联结。"
 gaulish_polytheism: "高卢多神教"
 gaulish_polytheism_ADJ: "高卢多神教"
 gaulish_polytheism_desc: "高卢多神教是高卢人民的信仰，在德鲁伊的引导下传承。这是一种与自然界深刻交融的宗教，“圣林”是重要的仪式场所。高卢人敬奉多元的神祇，例如部落守护神泰塔特斯与多才多艺的卢格斯，这些神祇常与特定部落及自然地域紧密相连。其核心信条包括灵魂转世与“彼世”的存在，实践上则以献祭供奉和繁复的仪式为主，以维系与神灵之间的平衡。"
 celtic_iberian_polytheism: "伊比利亚凯尔特多神教"
 celtic_iberian_polytheism_ADJ: "伊比利亚凯尔特多神教"
 celtic_iberian_polytheism_desc: "伊比利亚凯尔特多神教是伊比利亚半岛凯尔特部落的信仰体系。其神系多样，尤为重视战神以及与自然相关的神祇。信徒崇拜诸如卢古斯（一位掌管艺术与商业的多才多艺的神祇）等神明，以及众多与特定部落和地域紧密相连的本土神灵。仪式通常包括动物献祭和在神圣的户外场所供奉祭品，体现了这种信仰与土地、战争运势的深刻联系。"
 kemetic_polytheism: "凯麦特多神教"
 kemetic_polytheism_ADJ: "凯麦特多神教"
 kemetic_polytheism_desc: "凯麦特多神教是古埃及的多神信仰体系。该宗教以拉、伊西斯、奥西里斯、塞特和荷鲁斯等众神为核心，其教义包括世界从混沌中诞生、玛阿特（即秩序、和谐与正义）的重要性以及灵魂转世。信徒通过仪式与传统来维持与神性的平衡，并礼赞生命的循环本质。"
 atenism: "阿吞教"
 atenism_ADJ: "阿吞教"
 atenism_desc: "阿吞教是一种一神论信仰，其核心是独尊太阳圆盘“阿吞”为宇宙唯一的创造者与维持者。这一信仰摒弃了传统的埃及众神体系，只崇奉一位普世之神。信徒认为法老是阿吞与人类之间唯一的中介，而光芒则是这位神祇力量与仁慈的具体体现。"
 semitic_polytheism: "闪米特多神教"
 semitic_polytheism_ADJ: "闪米特多神教"
 semitic_polytheism_desc: "闪米特多神教涵盖了古代黎凡特民族的信仰体系。这一信仰的核心是一个以造物主以勒和强大的风暴之神巴力为首的神族体系。信徒们还崇拜其他多位神祇，包括生育与战争女神阿施塔特，以及母神亚舍拉。宗教仪式常在高地祭坛举行，旨在为丰收、繁衍和战争胜利祈求神恩。"
 punic_polytheism: "布匿多神教"
 punic_polytheism_ADJ: "布匿多神教"
 punic_polytheism_desc: "迦太基的布匿多神教信仰源自古代腓尼基宗教体系。其众神以主神天空之主巴力哈蒙及其配偶塔尼特为核心，塔尼特乃是司掌生育与战争的天界女神。迦太基人相信，唯有通过祭祀仪式与贡品取悦诸神，方能确保城邦的繁荣昌盛与战事胜利。"
 etruscan_polytheism: "伊特鲁里亚多神教"
 etruscan_polytheism_ADJ: "伊特鲁里亚多神教"
 etruscan_polytheism_desc: "伊特鲁里亚多神教是伊特鲁里亚人民的信仰，其核心是崇拜以天空之神蒂尼亚、其妻乌妮和智慧女神门尔瓦构成的神圣三联神。伊特鲁里亚人相信，通过观察闪电或检查献祭动物的内脏等复杂的占卜形式，可以解读众神的旨意。他们深信寿命是命定且预设的，并对死后世界有着精细的构想。"
 samnite_polytheism: "萨莫奈多神教"
 samnite_polytheism_ADJ: "萨莫奈多神教"
 samnite_polytheism_desc: "萨莫奈多神教是亚平宁山脉古萨莫奈部落的信仰体系。他们的神祇以战神玛尔斯为中心，体现了尚武的社会特征，同时也包含其他与土地和农业相关的意大利本土神祇。萨莫奈人奉行一种质朴而尚武的宗教仪式，常在神圣的树林和山顶举行，尤其注重“神圣之春”仪式——在此仪式中，青年男子由神圣动物引领，外出建立新的聚居地。"
 central_germanic_polytheism: "中日耳曼多神教"
 central_germanic_polytheism_ADJ: "中日耳曼多神教"
 central_germanic_polytheism_desc: "中日耳曼多神教是日耳曼部落的信仰，他们在圣林中通过献祭与仪式敬奉众神。全视的沃丹是智慧与战争之神，而强大的多纳尔执掌雷霆、护佑人类。信徒相信，生前的英勇——尤其是在战斗中表现的勇武——能在来世赢得尊荣之位。"
 anglo_saxon_polytheism: "盎格鲁‑撒克逊多神教"
 anglo_saxon_polytheism_ADJ: "盎格鲁‑撒克逊多神教"
 anglo_saxon_polytheism_desc: "Anglo-Saxon Polytheism is the faith of the Germanic peoples who settled in Britain. It is centered on a pantheon of deities including Woden, the wise and cunning leader of the gods, Þunor, the mighty god of thunder, and Tīw, the one-handed god of war and justice. The religion is deeply connected to the natural world, with sacred sites often found in groves and near wells. Adherents believe in Wyrd, a concept of fate that governs the lives of both mortals and gods."
 gothic_polytheism: "哥特多神教"
 gothic_polytheism_ADJ: "哥特多神教"
 gothic_polytheism_desc: "Gothic Polytheism is the faith of the Gothic peoples, who trace their origins to the shores of the Baltic before their great migrations across Europe. Their pantheon is a branch of the Germanic traditions, with a chief god known as the 'Ansis,' a divine ancestor from whom their kings claimed descent. The Goths worshipped a war god, Týr, and a thunder god, Donar, and their religious practices often involved sacred groves and votive offerings. Their faith reflects their history as a migratory warrior people, with a strong emphasis on ancestral glory and the fortunes of war."
 dacian_polytheism: "达契亚‑色雷斯多神教"
 dacian_polytheism_ADJ: "达契亚‑色雷斯多神教"
 dacian_polytheism_desc: "Daco-Thracian Polytheism encompasses the beliefs of the peoples inhabiting the lands of Dacia and Thrace. The pantheon is a complex one, with the Dacian prophet-god Zalmoxis, who promises immortality, at its center. The Thracians contribute a host of deities, including the horseman god Sabazios, the fierce war god Pleistoros, and the orgiastic mountain goddess Kotys. This faith is a blend of the mystical and the martial, with a strong emphasis on the afterlife and the untamed forces of nature."
 zalmoxism: "查摩西斯教"
 zalmoxism_ADJ: "查摩西斯教"
 zalmoxism_desc: "查摩西斯教是一种以先知神查摩西斯的教诲为中心的信仰。信徒们相信灵魂不朽，并且通过遵循查摩西斯的教导，他们将在来世与祂重聚。这一信仰使他们看淡肉体的死亡，并形成强烈的精神共同体意识。仪式常在隐秘处进行，强调与神性的个人连接，以及对超越物质世界的永恒存在的允诺。"
 scythian_polytheism: "斯基泰多神教"
 scythian_polytheism_ADJ: "斯基泰多神教"
 scythian_polytheism_desc: "斯基泰多神教是欧亚草原游牧民族的信仰。他们的众神以塔比蒂为首，她是灶火与原初之火的女神，也是凝聚部族的纽带。他们还崇拜天空之父帕帕伊奥斯及其妻子大地之母阿庇。该信仰一个独特之处在于将剑奉为战神的象征而加以尊崇。斯基泰宗教没有传统意义上的神庙，所有仪式与祭祀均在开阔的草原上进行。"
 lithuanian_polytheism: "立陶宛多神教"
 lithuanian_polytheism_ADJ: "立陶宛多神教"
 lithuanian_polytheism_desc: "Lithuanian Polytheism, also known as Romuva, is a faith centered on the veneration of nature and ancestors. The pantheon is led by the sky god Dievas, the thunder god Perkūnas, and the goddess of fate, Laima. Adherents believe that the sacredness of the world is expressed through nature, with holy sites found in ancient groves, on hills, and near rivers. The faith emphasizes harmony with nature, respect for ancestors, and the celebration of seasonal festivals."
 prussian_polytheism: "普鲁士多神教"
 prussian_polytheism_ADJ: "普鲁士多神教"
 prussian_polytheism_desc: "普鲁士多神教是普鲁士诸部落所信奉的信仰，他们崇拜一个掌管自然与人类事务的神灵体系。其主要神祇包括冥界之神帕托卢斯、雷神佩尔库那斯以及海洋与泉水之神波特里姆普斯这三位一体。神圣的罗姆瓦圣林是信仰的中心，由大祭司克里维-克里瓦伊托在此看护永恒圣火，解读神意。"
 latvian_polytheism: "拉脱维亚多神教"
 latvian_polytheism_ADJ: "拉脱维亚多神教"
 latvian_polytheism_desc: "Latvian Polytheism is a faith that revolves around a deep reverence for the natural world and a vast pantheon of deities, or 'Dievi'. The sky father Dievs, the thunder god Pērkons, and the sun goddess Saule are among the most important figures. A central role is played by Laima, the goddess of fate, who determines the destiny of individuals. The faith is deeply intertwined with the agricultural cycle, and adherents celebrate seasonal festivals to ensure fertility and prosperity."
 east_slavic_polytheism: "东斯拉夫多神教"
 east_slavic_polytheism_ADJ: "东斯拉夫多神教"
 east_slavic_polytheism_desc: "East Slavic Polytheism is the faith of the eastern Slavic tribes, centered on a pantheon of gods who govern the natural and cosmic order. The thunder god Perun stands as the chief deity, a warrior god of justice and storms, while the chthonic Veles rules the underworld, water, and cattle. Other key figures include Dazhbog, the sun god who brings prosperity, and Mokosh, the great mother goddess tied to fertility and fate. Adherents honor these gods through rituals in sacred groves and near rivers, seeking harmony with the forces of nature."
 west_slavic_polytheism: "西斯拉夫多神教"
 west_slavic_polytheism_ADJ: "西斯拉夫多神教"
 west_slavic_polytheism_desc: "西斯拉夫多神教是西斯拉夫民族的信仰，其特点是在精美的庙宇与圣地中供奉众神。多头神祇斯维托维德是战争、丰饶与占卜之神，为主要信仰对象，在波罗的海沿岸部落中尤为突出。其他重要神祇包括象征天空、大地与冥界的三头神特里格拉夫。祭司拥有重要权威，他们通过占卜解读神意，并监督复杂的仪式以确保战事胜利与丰收。"
 south_slavic_polytheism: "南斯拉夫多神教"
 south_slavic_polytheism_ADJ: "南斯拉夫多神教"
 south_slavic_polytheism_desc: "South Slavic Polytheism is the faith of the southern Slavic tribes, deeply intertwined with ancestor worship and the veneration of nature spirits. The supreme god is Perun, the lord of thunder and the sky, who is locked in an eternal struggle with the serpent god Veles. The faith is also populated by Vila, female nature spirits who inhabit mountains and forests, and a strong tradition of honoring the Domovoy, a household spirit who protects the family. Rituals are often tied to the agricultural calendar, celebrating the cycle of life and death."
 armenian_polytheism: "亚美尼亚多神教"
 armenian_polytheism_ADJ: "亚美尼亚多神教"
 armenian_polytheism_desc: "Armenian Polytheism is the ancient faith of the Armenian Highlands, shaped by a blend of native traditions and influences from Zoroastrianism and Greco-Roman beliefs. The pantheon is led by the creator god Aramazd, father of all gods and goddesses. Other major deities include Anahit, the goddess of fertility and wisdom, and the dragon-slaying god of war and courage, Vahagn. Adherents worship these gods to ensure protection, prosperity, and the fertility of the land, with rituals often reflecting a deep reverence for celestial bodies and natural forces."
 georgian_polytheism: "格鲁吉亚多神教"
 georgian_polytheism_ADJ: "格鲁吉亚多神教"
 georgian_polytheism_desc: "Georgian Polytheism represents the ancient beliefs of the Kartvelian peoples of the Caucasus. The faith is centered on a pantheon of gods who govern the world, with the chief god Armazi presiding over them from his idol on a mountain near Mtskheta. Other important figures include the god of fertility, Zaden, and the divine pair Gatsi and Gaim. The religion involves the worship of idols and a reverence for sacred natural sites, with practices aimed at securing the favor of the gods for the kingdom's well-being."
 illyrian_polytheism: "伊利里亚多神教"
 illyrian_polytheism_ADJ: "伊利里亚多神教"
 illyrian_polytheism_desc: "Illyrian Polytheism is the faith of the tribes of the western Balkans, centered on a pantheon of gods reflecting the natural world. The chief sky god Dei-pátrous is revered alongside a host of local deities tied to specific mountains, rivers, and forests. A prominent feature is the worship of Medaurus, a divine protector who rides on horseback, and the goddess of the hunt, Thana. The faith is deeply connected to the landscape, with rituals performed at natural sanctuaries to ensure the well-being of the tribe and the fertility of the land."
 arabic_polytheism: "阿拉伯多神教"
 arabic_polytheism_desc: "Arabic Polytheism was the faith of the Arabian Peninsula before the rise of Islam, centered on the worship of a pantheon of deities, including the chief god Hubal and the three powerful goddesses: Al-Lat, Al-Uzza, and Manat. Adherents made pilgrimages to sacred sites like the Kaaba in Mecca, which housed numerous idols, and performed rituals such as animal sacrifices and divination to seek favor from the gods. This faith was deeply tied to tribal identity, with different tribes often venerating their own specific patron deities."
 iberian_polytheism: "伊比利亚多神教"
 iberian_polytheism_ADJ: "伊比利亚多神教"
 iberian_polytheism_desc: "伊比利亚多神教是伊比利亚半岛东部和南部的前罗马信仰体系。这一宗教以尊崇与自然、生命和死亡相关的神祇为核心，信徒们崇拜一位与大地和丰产相关的女神，她在圣所中常以“女神”或“格里芬”形象出现。该信仰还包括对公牛作为力量象征的敬畏，以及对死后旅程的信念——丧葬仪式和随葬品旨在帮助逝者。圣所多位于高地，是举行仪式和凝聚社群的中心。"
 arabic_polytheism_ADJ: "阿拉伯多神教"
 assyrian_polytheism: "亚述多神教"
 assyrian_polytheism_ADJ: "亚述多神教"
 assyrian_polytheism_desc: "Assyrian Polytheism is the state religion of the Assyrian Empire, centered on the worship of the national god Ashur. He is the king of the gods and the embodiment of the Assyrian state and its military power. The pantheon also includes deities like Ishtar, the goddess of war and love, and Nabu, the god of wisdom. The faith emphasizes the divine mandate of the king to expand the empire and maintain order through conquest and ritual."
 babylonian_polytheism: "巴比伦多神教"
 babylonian_polytheism_ADJ: "巴比伦多神教"
 babylonian_polytheism_desc: "Babylonian Polytheism is the religion of Babylon, with Marduk as its supreme deity. The faith is characterized by a complex pantheon, elaborate rituals, and a strong emphasis on divination and astrology. The Babylonians believe that the gods determine the fate of individuals and nations, and that their will can be interpreted through the movement of celestial bodies. The New Year festival, Akitu, is a central event, celebrating the renewal of kingship and the cosmic order."
 sumerian_polytheism: "苏美尔多神教"
 sumerian_polytheism_ADJ: "苏美尔多神教"
 sumerian_polytheism_desc: "Sumerian Polytheism is the ancient faith of the Sumerian city-states, one of the earliest recorded religions. It honors a vast pantheon of gods, including An, the sky god, Enlil, the god of wind, and Enki, the god of water and wisdom. Each city has its own patron deity, and temples (ziggurats) serve as the dwelling places of the gods on earth. The faith emphasizes the service of humanity to the gods and the maintenance of divine order."
 zoroastrian: "拜马兹达教"
 zoroastrian_ADJ: "拜马兹达教"
 zoroastrian_desc: "Mazdayasna, known to the west as Zoroastrianism, is the ancient faith of Iran, founded by the prophet Zarathustra. It is a dualistic religion centered on the cosmic struggle between Ahura Mazda, the Wise Lord and creator of all good, and Angra Mainyu, the destructive spirit. Adherents believe in free will, the final judgment, and the ultimate triumph of good over evil. Fire is revered as a symbol of purity and divine truth, and rituals are performed to maintain the purity of the elements and support the cosmic order."
 mazdakism: "马兹达克派"
 mazdakism_ADJ: "马兹达克派"
 mazdakism_desc: "Mazdakism is a radical religious and social movement founded by the mobad Mazdak. It reinterprets Zoroastrian dualism, emphasizing the struggle between Light (good) and Darkness (evil) not just cosmically, but socially. Mazdakites advocate for the communal ownership of property and the dismantling of social hierarchies, believing that greed and inequality are manifestations of Darkness. Their goal is to restore the primal state of equality and peace, often putting them at odds with the traditional priesthood and nobility."
 gayomartianism: "伽玉玛特派"
 gayomartianism_ADJ: "伽玉玛特派"
 gayomartianism_desc: "Gayomartianism is a sect of Zoroastrianism that emphasizes the primordial figure of Gayomart, the first man. Adherents focus on the myths of creation and the role of humanity in the cosmic battle. They often hold distinct views on the nature of time and the origins of evil, sometimes incorporating elements of Zurvanite thought. This tradition places a strong emphasis on the purity of lineage and the sacred duty of mankind to combat the forces of corruption."
 arewordik: "阿雷沃尔迪派"
 arewordik_ADJ: "阿雷沃尔迪派"
 arewordik_desc: "The Arewordik, or 'Children of the Sun', are a sect found in Armenia that preserves ancient solar worship traditions. While often outwardly syncretic or existing on the fringes of the Armenian Church, they maintain distinct beliefs centered on the sun as the visible manifestation of the divine. Their faith is a survival of the pre-Christian Armenian religion, heavily influenced by Zoroastrianism, with a focus on light, purity, and the eternal struggle against darkness."
 afridunism: "阿夫里敦派"
 afridunism_ADJ: "阿夫里敦派"
 afridunism_desc: "Afridunism is a sect that reveres the mythical hero-king Fereydun (Thraetaona) as a central figure of devotion. Adherents emphasize the virtues of kingship, justice, and the restoration of order. They believe in the cyclical nature of history and the eventual return of a savior figure from the line of Fereydun to defeat the forces of the serpent-tyrant Zahhak. This faith often appeals to those seeking a restoration of ancient Iranian glory and legitimate rule."
 behafaridism: "贝哈法里德派"
 behafaridism_ADJ: "贝哈法里德派"
 behafaridism_desc: "Behafaridism is a religious movement founded by the prophet Behafarid in the 8th century. It emerged as a reformist branch of Zoroastrianism, incorporating elements of Islam while maintaining core Zoroastrian beliefs. Behafarid preached against certain traditional rituals like incestuous marriage (khwedodah) and emphasized monotheism and strict moral conduct. His followers await his return, believing he ascended to heaven and will come back to lead the faithful."
 zurvanite: "祖尔万派"
 zurvanite_ADJ: "祖尔万派"
 zurvanite_desc: "Zurvanism is a branch of Zoroastrianism that posits Zurvan, the god of Infinite Time, as the primordial creator and father of both Ahura Mazda (Good) and Angra Mainyu (Evil). This theology introduces a fatalistic worldview, where destiny is predetermined by Time. While sharing many rituals with orthodox Mazdayasna, Zurvanites place a unique emphasis on the cyclical nature of the universe and the inevitable fulfillment of fate, often leading to a more philosophical and sometimes pessimistic outlook on the cosmic struggle."
 khurmazta: "胡天派"
 khurmazta_ADJ: "胡天派"
 khurmazta_desc: "Khurmazta is the syncretic faith of the Sogdian people, blending Zoroastrianism with local Central Asian traditions and influences from Hinduism, Buddhism, and Manichaeism. While Ahura Mazda (Khurmazta) is the supreme deity, the pantheon includes a diverse array of gods such as Nana, the goddess of fertility and war, and Veshparkar, a wind god often identified with Shiva. This cosmopolitan faith reflects the Sogdians' role as Silk Road merchants, open to new ideas while maintaining their ancestral fire worship and funerary rites."