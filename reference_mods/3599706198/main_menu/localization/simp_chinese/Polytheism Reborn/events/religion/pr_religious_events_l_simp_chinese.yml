l_simp_chinese:
 pr.001: "拥抱旧神"
 pr.001.desc: "变革之风正吹拂我们的土地。一场旨在恢复我们祖先古老信仰的运动已声势渐起，为我们提供了远离现有信仰的道路。我们应向哪一位旧神寻求指引？这是后续一系列选择中的第一个。"
 pr.001.greek_roman: "希腊与罗马万神殿。"
 pr.001.etruscan: "伊特鲁里亚万神殿。"
 pr.001.egyptian: "尼罗河万神殿。"
 pr.001.celtic: "凯尔特人的神。"
 pr.001.germanic: "日耳曼部落的神。"
 pr.001.next: "查看更多选项……"
 pr.001.optout: "下次再说吧。"
 pr.002: "拥抱旧神"
 pr.002.desc: "旧神的召唤是强大的，面前有许多道路。我们将复兴哪些传统来指引我们的人民？"
 pr.002.canaanite: "黎凡特的众神。"
 pr.002.mesopotamian: "美索不达米亚的万神殿。"
 pr.002.daco_thracian: "达契亚人和色雷斯人的神。"
 pr.002.caucasus: "高加索地区的古代众神。"
 pr.002.hittite: "赫梯人的千神。"
 pr.002.scythian: "草原众神。"
 pr.002.back: "返回……"
 pr.002.next: "查看更多选项……"
 pr.002.optout: "下次再说吧。"
 pr.003: "拥抱旧神"
 pr.003.desc: "我们寻根溯源之旅仍在继续。我们将拥抱哪种古老信仰作为我们自己的？"
 pr.003.illyrian: "伊利里亚人的神。"
 pr.003.baltic: "波罗的部落的万神殿。"
 pr.003.iberian: "伊比利亚的古代众神。"
 pr.003.back: "返回……"
 pr.003.optout: "我们还没有为这一变化做好准备。"
 pr.004: "希腊-罗马众神"
 pr.004.desc: "罗马与希腊的遗产提供了许多路径。我们是该追随帝国的官方神祇、古希腊的古老传统，还是融合了我们当地习俗与罗马信仰的融合宗教？"
 pr.004.roman: "罗马众神"
 pr.004.greek: "希腊众神"
 pr.004.romano_british: "罗马-不列颠神祇"
 pr.004.gallo_roman: "高卢-罗马神祇"
 pr.004.romano_germanic: "罗马-日耳曼神祇"
 pr.004.hispano_roman: "西班牙-罗马神祇"
 pr.004.back: "返回……"
 pr.006: "伊特鲁里亚众神"
 pr.006.desc: "伊特鲁里亚人古老而神秘的信仰在召唤我们。他们对神灵和来世的复杂理解提供了一条独特的精神道路。我们应该拥抱伊特鲁里亚的方式吗？"
 pr.006.etruscan: "伊特鲁里亚众神"
 pr.006.back: "返回……"
 pr.007: "尼罗河的神祇"
 pr.007.desc: "尼罗河肥沃的河岸孕育了一种如金字塔般持久的信仰。我们是该尊奉凯美特传统中庞大的众神，还是拥抱太阳圆盘阿吞的单一愿景？"
 pr.007.kemetic: "凯美特众神"
 pr.007.atenism: "阿吞教的一神信仰"
 pr.007.back: "返回……"
 pr.008: "凯尔特众神"
 pr.008.desc: "从迷雾笼罩的岛屿到大陆的中心，凯尔特民族尊崇着广泛的神祇。我们将追随这一古老传统的哪个分支？"
 pr.008.gaelic: "盖尔神祇"
 pr.008.brythonic: "布立吞神祇"
 pr.008.gaulish: "高卢神祇"
 pr.008.celtic_iberian: "凯尔特伊比利亚神祇"
 pr.008.back: "返回……"
 pr.009: "日耳曼众神"
 pr.009.desc: "日耳曼部落的神祇是战争、智慧与自然之神。从大陆的森林到北方的海岸，他们的追随者寻求荣耀与荣誉。我们将选择哪条道路？"
 pr.009.anglo_saxon: "盎格鲁-撒克逊神祇"
 pr.009.german: "中部日耳曼神祇"
 pr.009.norse: "北欧神祇"
 pr.009.back: "返回……"
 pr.010: "黎凡特的神祇"
 pr.010.desc: "黎凡特的古老土地上曾矗立着强大的城邦和充满活力的信仰。我们应该拥抱沿海城市的传统，还是闪米特民族更广泛的众神？"
 pr.010.punic: "布匿万神殿"
 pr.010.semitic: "西闪米特万神殿"
 pr.010.back: "返回……"
 pr.012: "达契亚-色雷斯神祇"
 pr.012.desc: "山区和平原的人民长久以来崇拜着自己的众神。我们是该拥抱扎尔莫克西斯的永生教义，还是达契亚部落更广泛的传统？"
 pr.012.dacian: "达契亚众神"
 pr.012.zalmoxism: "扎尔莫克西斯教"
 pr.012.back: "返回……"
 pr.013: "高加索的神祇"
 pr.013.desc: "高加索崎岖的山脉孕育了许多古老的信仰。我们是该拥抱亚美尼亚高原的神祇，还是格鲁吉亚王国的诸神？"
 pr.013.armenian: "亚美尼亚众神"
 pr.013.georgian: "格鲁吉亚众神"
 pr.013.back: "返回……"
 pr.015: "斯基泰众神"
 pr.015.desc: "The vast steppes have long been the domain of the Scythians. Their gods reflect their fierce and nomadic lifestyle, tied to nature and war. Shall we embrace the traditions of the steppe?"
 pr.015.back: "返回……"
 pr.016: "The Gods of the Illyrians"
 pr.016.desc: "The rugged coastlines and mountains of Illyria have forged a resilient people and a unique faith. Shall we honor the gods of the sky and the wild, and embrace the traditions of the Illyrian tribes?"
 pr.016.back: "返回……"
 pr.021.t: "耳语的异端"
 pr.021.desc: "这是14世纪。世界被月亮与十字架的唯一视野所束缚，其阴影延伸到每个王国、每个灵魂。然而，在我图书馆的寂静独处中，周围是破碎的卷轴和禁书，我找到了一个不同时代的低语。关于神祇的故事，并非一位，而是多位，他们曾一度统治着这片土地。这些并非牧师口中的恶魔，而是灶台、收成和天空的神祇。\n\n这条道路是一种深刻的异端，一个若被发现，我将被定为叛教者、家族覆灭的秘密。但旧日方式的诱惑，一个充满神圣可能性的世界，是强大的。我必须选择追随哪些低语进入阴影之中。"
 pr.021.greek_roman: "奥林匹斯山与卡比托利欧山的荣耀。"
 pr.021.etruscan: "伊特鲁里亚的神秘仪式。"
 pr.021.egyptian: "尼罗河的古老奥秘。"
 pr.021.celtic: "凯尔特林地的深邃魔法。"
 pr.021.germanic: "日耳曼神祇的原始狂怒。"
 pr.021.iberian: "伊比利亚被遗忘的神祇。"
 pr.021.next: "探寻其他被遗忘的众神..."
 pr.021.optout: "这简直是疯了。风险太大了。"
 pr.022.t: "深入异端"
 pr.022.desc: "我的研究将我带离了西欧的寻常道路。异端的低语引领我前往南方烈日炙烤的土地、东方崎岖的山脉以及广袤开阔的草原。在这里，旧神也同样被铭记，他们的名字与仪式保存在零散的文本和半遗忘的民间传说中。这些更晦涩的道路中，我敢踏上哪一条？"
 pr.022.canaanite: "黎凡特的神祇。"
 pr.022.mesopotamian: "美索不达米亚的众神。"
 pr.022.daco_thracian: "达契亚与色雷斯的神祇。"
 pr.022.caucasus: "高加索的古老神祇。"
 pr.022.hittite: "赫梯的千神。"
 pr.022.scythian: "草原的神祇。"
 pr.022.illyrian: "伊利里亚人的神。"
 pr.022.baltic: "波罗的部落的万神殿。"
 pr.022.back: "返回……"
 pr.022.optout: "我已经走得够远了。"
 pr.023.t: "大理石与神话的遗产"
 pr.023.desc: "我收集的卷轴讲述了古代伟大的众神体系，其崇拜与帝国的命运交织在一起。希腊与罗马的传统是庞大而复杂的；一个充满生动神话和神圣干预的世界，另一个则是旨在确保神佑的严格国家仪式体系。要真正理解，我必须集中研究。我是该追寻罗马国教的组织力量，希腊更古老、更混沌的神话，还是将这些传统与其他信仰相融合的融合宗教？"
 pr.023.roman: "专注于罗马众神。"
 pr.023.greek: "专注于希腊众神。"
 pr.023.mycenaean: "探寻迈锡尼起源。"
 pr.023.graeco_egyptian: "研究希腊与埃及信仰的融合。"
 pr.023.back: "这条路不适合我。"
 pr.024.t: "来自伊特鲁里亚墓葬的低语"
 pr.024.desc: "伊特鲁里亚文明虽被罗马吸收，却留下了独特的精神遗产。他们对复杂来世的信仰和占卜的力量，是一条不同于希腊-罗马世界的道路。我是否应该深入伊特鲁里亚的秘密，从他们沉默的墓葬和零碎的铭文中寻求知识？"
 pr.024.etruscan: "专注于伊特鲁里亚众神。"
 pr.024.back: "这条路不适合我。"
 pr.025.t: "来自法老之国的回声"
 pr.025.desc: "埃及的宗教古老而深刻，是一个兽首神祇、神圣王权以及专注来世的世界。沙漠的沙保存了许多。我是该专注于传统的凯美特众神，还是阿肯那顿的阿吞教的激进一神论？"
 pr.025.kemetic: "专注于凯美特众神。"
 pr.025.atenism: "专注于阿吞教的一神信仰。"
 pr.025.back: "这条路不适合我。"
 pr.026.t: "凯尔特世界的声音"
 pr.026.desc: "凯尔特民族，从西方迷雾笼罩的岛屿到大陆深处的森林，共享着一个充满活力的精神世界。他们的神祇与土地、部落和自然循环紧密相连。我将探索这一古老传统的哪个分支？"
 pr.026.gaelic: "专注于盖尔神祇。"
 pr.026.brythonic: "专注于布立吞神祇。"
 pr.026.gaulish: "专注于高卢神祇。"
 pr.026.celtic_iberian: "专注于凯尔特伊比利亚神祇。"
 pr.026.back: "这条路不适合我。"
 pr.027.t: "日耳曼部落的召唤"
 pr.027.desc: "日耳曼民族的神祇是战争、智慧与未驯服自然力量的神祇。他们的崇拜关乎献祭、荣誉，以及在神祇眼中寻求荣耀。我将试图理解他们的哪个众神体系？"
 pr.027.anglo_saxon: "专注于盎格鲁-撒克逊神祇。"
 pr.027.german: "专注于中部日耳曼神祇。"
 pr.027.norse: "专注于北欧神祇。"
 pr.027.back: "这条路不适合我。"
 pr.028.t: "烈日炙烤之地的神祇"
 pr.028.desc: "古代近东是文明与信仰的摇篮。黎凡特和美索不达米亚的神祇强大而苛求，他们的故事规模宏大。我将探究这些古老信仰中的哪一个？"
 pr.028.punic: "专注于布匿众神。"
 pr.028.semitic: "专注于西闪米特众神。"
 pr.028.back: "这条路不适合我。"
 pr.029.t: "山脉与草原的信仰"
 pr.029.desc: "从崎岖的高加索到广袤的欧亚草原，独特而古老的信仰曾繁荣发展。这些是自豪而独立民族的神祇。我将选择哪条道路？"
 pr.029.dacian: "专注于达契亚众神。"
 pr.029.zalmoxism: "专注于扎尔莫克西斯教。"
 pr.029.armenian: "专注于亚美尼亚众神。"
 pr.029.georgian: "专注于格鲁吉亚众神。"
 pr.029.back: "这条路不适合我。"
 pr.030.t: "美索不达米亚的神祇"
 pr.030.desc: "两河之间的土地——美索不达米亚，诞生了世界上最早的文明和宗教之一。从古老的苏美尔人到强大的巴比伦和亚述帝国，编织了一幅丰富的神话与神祇挂毯。我将探索这些强大众神体系中的哪一个？"
 pr.030.sumerian: "专注于苏美尔众神。"
 pr.030.babylonian: "专注于巴比伦众神。"
 pr.030.assyrian: "专注于亚述众神。"
 pr.030.back: "这条路不适合我。"
 pr.031.t: "森林与雷霆的波罗的海神祇"
 pr.031.desc: "在波罗的海的密林深处，旧神比在任何地方都坚持得更久。立陶宛人、普鲁士人和拉脱维亚人的传统充满了对自然和神圣力量的崇敬。我将研究这些坚韧信仰中的哪一个？"
 pr.031.lithuanian: "专注于立陶宛众神。"
 pr.031.prussian: "专注于普鲁士众神。"
 pr.031.latvian: "专注于拉脱维亚众神。"
 pr.031.back: "这条路不适合我。"
 pr.032.t: "高加索的神祇"
 pr.032.desc: "高加索崎岖的山脉塑造了独特而坚韧的文化。亚美尼亚和格鲁吉亚民族拥有古老的历史，他们的神祇反映了当地传统与外来影响的独特融合。我将深入探究这些自豪的众神体系中的哪一个？"
 pr.032.armenian: "专注于亚美尼亚众神。"
 pr.032.georgian: "专注于格鲁吉亚众神。"
 pr.032.back: "这条路不适合我。"
 pr.033.t: "赫梯的千神"
 pr.033.desc: "建立在安纳托利亚高原上的赫梯帝国以其“千神”闻名，这是一个庞大而包容的众神体系，融合了他们所征服的众多民族的神祇。以风暴神特舒布为首，我将探索这种复杂且融合的信仰吗？"
 pr.033.hittite: "专注于赫梯众神。"
 pr.033.back: "这条路不适合我。"
 pr.034.t: "斯基泰草原的神祇"
 pr.034.desc: "斯基泰人，广袤欧亚草原的游牧主宰者，崇拜着一个反映他们凶猛游牧生活的众神体系。他们的神祇与天空、大地和炉火紧密相连，尤其崇敬象征战争之神的一把剑。我将深入探究这些游牧战士的信仰吗？"
 pr.034.scythian: "专注于斯基泰众神。"
 pr.034.back: "这条路不适合我。"
 pr.035.t: "伊利里亚人的神祇"
 pr.035.desc: "西巴尔干的伊利里亚部落崇拜着一个与其崎岖家园紧密相连的众神体系。天空之神、荒野之神以及骑马的守护神构成了他们信仰的核心。我将追寻这些凶猛而独立的民族的道路吗？"
 pr.035.illyrian: "专注于伊利里亚众神。"
 pr.035.back: "这条路不适合我。"
 pr.036.t: "古代伊比利亚的神祇"
 pr.036.desc: "在罗马人到来之前，伊比利亚半岛曾是独特信仰的汇聚地。这些宗教尊崇自然、生命与死亡的神祇，尤其强调公牛的力量和高地的神圣性。我将揭示这些前罗马神祇的秘密吗？"
 pr.036.iberian: "专注于伊比利亚众神。"
 pr.036.back: "这条路不适合我。"
 pr.037.t: "深入探究"
 pr.037.roman: "我初步的研习已阐明了罗马国教的根基——那是一套凡人与神明之间构筑的复杂契约体系，旨在维系国家的安定。若要真正复兴这些古老仪轨，仅凭只言片语是远远不够的。我必须寻得详尽的典籍，考据那些构筑了“神之和平”基石的祭仪、祭司制度以及公共庆典。此类知识希世罕见，多半深藏于基督教世界的宏大图书馆中，且由那些恨不得因我的好奇心将我送上火刑架的人严加看守。"
 pr.037.greek: "希腊人的神话交织着诸神的恩怨与凡人的抗争，如同一幅绚烂的画卷，但这仅仅是全貌的一角。若要理解这种信仰曾经鲜活的样貌，我不能仅局限于史诗与悲剧。我必须揭示密教的奥秘、那些敢于质疑诸神的哲学思想，以及各个城邦间千差万别的地方仪轨。仅凭我的私人藏书已不足以成事；我必须搜寻那些历经岁月洗礼而留存下来的隐秘知识。"
 pr.037.mycenaean: "我正探寻着那个英雄与青铜卫城的时代，即便对于古典时期的希腊人而言，那也已是远古往事。我寻得的低语并非记载于行云流水的华美篇章之中，而是铭刻在泥板那简略的物资清册之上——那是一连串向着既熟悉又陌生的诸神献上供品的清单。若要重构这原初的信仰，我必须化身为一名发掘信仰的考古学者，在宫廷档案与陵墓的无声证词间，拼凑出完整的神系。是一场对希腊宗教本源的溯求，它不仅需要呕心沥血的投入，更需要那种愿从往昔最微弱的回响中解读真意的执着。"
 pr.037.etruscan: "伊特鲁里亚人对其秘密守口如瓶，而罗马人更是费尽心机想将其抹除。如今留存下来的，唯有由墓葬铭文、祭祀礼器以及征服者们那充满偏见的记载所构成的谜团。若要复兴这种信仰，就必须化身为探寻神迹的侦探，从只言片语中拼凑出“伊特鲁里亚律令”。我必须寻得那些深藏的圣物，并破译塔孔失落的语言——正是这位先知承接了诸神的智慧。"
 pr.037.kemetic: "尼罗河的信仰是一座屹立千年的丰碑，其根基之深，犹如那条伟大的河流本身。若要复兴此道，我的目光便不能局限于宏伟的神庙与法老的祭仪。我须参透其信仰的核心：那便是“玛特”的概念——即宇宙的秩序，以及灵魂穿越冥界时的凶险旅途。这不仅需要搜罗卷轴，更需深刻领悟那些渗透进埃及生活方方面面的象征符号与魔法奥义。我必须寻得《亡灵书》、献给诸神的圣歌，以及祭司阶层秘而不宣的知识。"
 pr.037.atenism: "阿顿信仰是一场革命，是对绵延数千年的传统的彻底决裂。这是一种崇尚光明与真理的信仰，却也伴随着不宽容。若要理解它，便须读懂那位离经叛道的法老——阿肯那顿的精神世界。旧神的祭司们抹杀了一切关于他的记忆，但他那宏伟的《阿顿颂歌》仍有残篇传世，见证了他那独一无二的神学愿景。我的使命是从废墟中重构这脆弱的信仰，并非要在埃及的黄沙中，而是要在那些零星残存的艺术与文献中，寻回失落的阿玛纳城。"
 pr.037.gaelic: "盖尔人的信仰无处寻觅于宏伟的神庙之中，它隐匿于异界的迷雾深处，蕴藏在神圣的大地之上。这是一个属于传颂者与诗人的信仰，属于英雄与“奥斯·希”——那些栖身于空心丘陵之中的仙灵子民的信仰。若要复兴此道，我必须搜集古老的传说、达努神族的神话，以及“菲力”——那些守护着传统的诗人先知的智慧。我所探寻的并非铭刻经文的石板，而是一个民族鲜活的记忆；这是一场旨在重燃五月节篝火、并在风中聆听祖先低语的求索。"
 pr.037.brythonic: "布立吞人的信仰铭刻在不列颠的山川地貌之间——那是在山坡上雕凿出的白垩巨人像，亦是那些标记着四季更迭的巍峨立石。他们的神祇与大地的法统紧密相连，其神话交织着关于王权、异界，以及红龙与白龙之间永恒斗争的宏大篇章。若要复兴这种信仰，我必须寻访古老的圣地，研读《马比诺吉昂》中的传说，搜集那些在罗马人与基督徒的浪潮下幸存的德鲁伊教义残篇。这是一场旨在唤醒这座岛屿沉睡守护者的求索。"
 pr.037.gaulish: "高卢人的信仰在凯撒军团的镇压下归于死寂，其德鲁伊教的心脏被活活剜去。如今想要重寻此道，无异于追逐亡魂。罗马人笔下虽有关于高卢诸神的记载，却皆是透过罗马人的视角——他们将图塔蒂斯与塔拉尼斯生硬地比附为自家的墨丘利与朱庇特。真正的信仰必须从考古遗迹中探寻：沉入圣泉的还愿祭品、深藏林海的祭祀遗址，以及铸造在钱币上的晦涩符号。我必须从这些献给神明的供奉中拼凑出信仰的全貌，那是一个崇尚圣林、且包含了被残酷镇压的德鲁伊智慧的宗教。"
 pr.037.celtic_iberian: "凯尔特伊比利亚人是伊比利亚高地上的战士，他们崇拜战神、马神，以及守护着他们家园的崇山峻岭之神。他们的信仰交织着凯尔特与伊比利亚本土的信条，是一种独特的文化融合体。若要复兴此道，我必须考据其山堡上的铭文、那些青铜战士造型的还愿祭品，以及罗马人关于他们顽强抵抗的记载。这是一场追寻尚武民族灵魂的旅程，那种信仰正如他们闻名遐迩的铁剑一般，坚韧而恒久。"
 pr.037.anglo_saxon: "盎格鲁-撒克逊诸神远渡重洋，从日耳曼之地迁徙至英格兰寻找新家园。沃登，那位流浪的智慧求索者；图纳尔，人类的守护者；以及蒂乌，独臂的正义之神。这些神祇，属于一个正在开疆拓土、建立新王国的民族。若要复兴其信仰，我必须潜心钻研史诗《贝奥武夫》、那些残存的诗歌断章，以及关于船葬与圣地的考古铁证。这是一场旨在重塑英格兰异教之心的求索，是为了重建那属于诸神的蜜酒厅。"
 pr.037.german: "在日耳曼尼亚幽暗的森林深处，各个部落以献祭与对大自然的敬畏来供奉诸神。莱茵河彼岸的罗马人虽记载称他们崇拜墨丘利与赫拉克勒斯，但这不过是沃登与多纳尔被强加的假面罢了。若要寻得这真实的信仰，我必须将目光投向那些沼泽遗骸、祭祀奉纳物，以及幸存下来的零星卢恩铭文。这是一场对原初信仰的探求，那是一个崇尚圣林、且属于那个敢于挑战罗马强权的民族的宗教。"
 pr.037.norse: "北方人的信仰谱写着冰与火的篇章，那里的诸神注定陨落，而世界则诞生于巨人的尸骸之上。奥丁，众神之父，为求智慧献祭了一只眼睛；托尔，米德加尔特的雷霆卫士；还有洛基，那个终将给万物带来毁灭的诡计之神。若要复兴此道，便须拥抱萨迦史诗、《埃达》，以及那些星罗棋布于斯堪的纳维亚大地的卢恩石刻。这是一声冒险的号角，召唤着去探寻卢恩符文的智慧，并为那名为诸神黄昏的终末之战做好准备。"
 pr.037.punic: "迦太基的信仰源于腓尼基，却在非洲的海岸上开枝散叶。这是一个属于商贾与水手的宗教，属于那座曾为争夺地中海霸权而与罗马分庭抗礼的城市。他们的主神，巴尔·哈蒙与坦尼特，索求着献祭与绝对的虔诚。若要复兴此道，便须从敌人那充满偏见的记载，以及陀斐特墓地中那些沉默的石碑间，拼凑出一段破碎的历史。这是一场旨在重建失落信仰帝国的求索，是为了聆听那些曾在大洋之上如雷贯耳的神谕。"
 pr.037.semitic: "西闪米特诸族是腓尼基人与迦南人的先祖，他们所崇拜的神系曾深刻重塑了古代世界的宗教版图。众神之父“伊勒”与那威猛的风暴之神“巴尔”，共同主宰着那个充满了丰饶与纷争的世界。若要复兴此道，便须深潜至宗教史的最古老岩层，去揭示乌加里特的神话，并理解这种信仰的双重身份——它既是那个终将统治世界的一神教的先驱，亦是其宿敌。"
 pr.037.dacian: "达契亚人是喀尔巴阡山脉中一支骁勇的民族，他们因笃信灵魂不朽而闻名于世，那被视为其神祇扎尔莫克西斯所赐予的恩典。他们直面死亡时的那份无畏，即便是罗马人也为之胆寒。若要复兴此道，便须探寻深藏于山岳圣所中的秘密，参悟那位先知神的教诲，并重拾那种视永恒重于凡躯的灵性。这是一场对灵魂不朽的求索，是对死亡这一终局的公然蔑视。"
 pr.037.zalmoxism: "查摩西斯教不仅是一种宗教，更是一门灵魂哲学。它教导人们，此世生命不过是来世的准备，是一段通向更美好之地的旅程。信奉这一信仰，便是踏上先知之路，追寻与神性的个人联结，寻获共享同一盼望的信仰群体。我的使命是重建扎尔莫克西斯的教义，将历史人物从神性形象中剥离，开创一种不仅提供仪轨、更赋予生存意义与彼岸希望的信仰体系。"
 pr.037.armenian: "The Armenian pantheon is a reflection of its people's history, a crossroads of cultures. Aramazd, the father god, bears the mark of Persian Ahura Mazda, while Vahagn, the dragon-slaying hero, echoes the fire of the Iranian Verethragna. To revive this faith is to untangle a web of influences, to find the native heart of Armenian belief beneath layers of foreign varnish. I must seek out the pre-Christian folk tales, the fragments of ancient songs, and the ruins of the temples that were destroyed to make way for the Cross."
 pr.037.georgian: "The gods of the Kartvelian people are as rugged and ancient as the Caucasus mountains themselves. Armazi, the chief god, stood as a great idol, a warrior deity who guarded the kingdom. To restore this faith is to piece together a pantheon from the fragments left behind by Christian chroniclers, to find the gods of the earth and the sky that were replaced by a new faith. It is a search for the soul of a kingdom, a faith that was intertwined with the very identity of the Georgian people."
 pr.037.hittite: "The Hittites did not just conquer lands, they conquered gods. Their pantheon was a sprawling, multicultural assembly of deities, a testament to their empire's diversity. The Storm God of Hatti, the Sun Goddess of Arinna, and a thousand other gods from Syria, Mesopotamia, and Anatolia all had a place in their temples. To revive this faith is to become a master of religious diplomacy, to build a pantheon that is both inclusive and coherent. It is a task of immense complexity, a challenge to create unity from a thousand different voices."
 pr.037.scythian: "The Scythians left no books, no temples, only their graves and the accounts of the Greeks who viewed them as noble savages. Their gods were as wild and free as the steppe they roamed. Tabiti, the goddess of the hearth, bound their tribes together, while a nameless war god was worshipped in the form of an iron sword. To restore their faith is to embrace a religion of the open sky, of blood oaths, and of a deep connection to the horse and the bow. It is a quest to understand the soul of a nomad, a faith written not in stone, but in the wind and the stars."
 pr.037.illyrian: "The Illyrians were a people of the sea and the mountains, and their gods reflected their world. Dei-pátrous, the sky father, watched over them, while Medaurus, the protector on horseback, guarded their tribes. Their faith was local, tied to specific places and peoples. To revive it is to gather the whispers from a hundred different valleys, to piece together a pantheon from Roman inscriptions and the surviving traces of their language. It is a search for the faith of a people who were a thorn in the side of empires, a religion as resilient and fragmented as the Illyrian tribes themselves."
 pr.037.iberian: "The Iberians of the Mediterranean coast were a people of art and commerce, their faith a world away from the Celtic warriors of the interior. They worshipped a great goddess of the earth and the underworld, a lady of beasts and of the dead. Their sanctuaries were places of healing and of oracles, their writing still a mystery. To restore their faith is to decipher a lost language, to understand a religion of bull-worship and of a complex journey to the afterlife. It is a quest to give voice to a people silenced by the coming of Rome."
 pr.037.sumerian: "To seek the gods of Sumer is to travel to the dawn of history, to the very invention of religion as we know it. Inanna, the queen of heaven; Enki, the god of wisdom and magic; Enlil, the lord of the wind—these are the first gods to be written down, their myths the blueprint for so much that followed. To revive their faith is to become an archaeologist of the soul, to read the cuneiform tablets and to understand a worldview where cities were the property of the gods and humanity their servants. It is a quest to find the source of all religion, the wellspring of civilization."
 pr.037.babylonian: "The faith of Babylon is a faith of empire, of law, and of the stars. Marduk, the city's patron god, rose to become the king of all gods, his victory over the chaos-dragon Tiamat a justification for Babylon's dominion over the world. To restore this faith is to embrace a religion of cosmic order, of astrology, and of a complex legal and social system that was seen as a reflection of the divine will. It is a quest to rebuild the ziggurat of Babel, to create a faith that can unite an empire and reach for the heavens."
 pr.037.assyrian: "The faith of Assyria is a faith of war and of empire, its chief god, Ashur, a warrior deity who demanded conquest and tribute. The Assyrian kings were his high priests, their campaigns a holy war to extend the dominion of their god. To revive this faith is to embrace a religion of ruthless efficiency, of psychological warfare, and of a state that was a finely tuned instrument of divine will. It is a quest to forge a new empire in the name of a god of war, to carve out a place in the world through strength and terror."
 pr.037.a: "The cost is great, but knowledge is priceless."
 pr.038.t: "The First Acquisition"
 pr.038.desc: "The gold was well spent. My agents, sworn to secrecy, have returned from distant lands with a small collection of texts I thought lost to time. One is a partial transcription of a temple inventory, another a philosophical treatise arguing against the monotheistic tide, and a third is a collection of hymns to a forgotten goddess. These are but whispers from the past, yet they are more than I had dared hope for. The path forward is clearer now, though no less dangerous. The knowledge I seek exists, hidden in plain sight within the great monastic libraries and private collections of Europe. I must find a way to access them."
 pr.038.a: "The hunt for knowledge begins."
 pr.039.t: "大图书馆"
 pr.039.desc: "我的研究将目标锁定在离[ROOT.GetCountry.GetCapital.GetName]不远的一处宏伟图书馆，那是一座由警惕的僧侣守卫的知识堡垒。其馆内藏有基督教诞生前的文献，可能蕴藏着解开我追寻之谜的关键。获取这些文献将危机四伏。直接行动绝不可行，但或许另有他法。我该如何取得这份禁忌知识？"
 pr.039.a: "无声之手，可触及响亮之声无法企及之处。我会派出一名得力干将。"
 pr.039.b: "这风险太大了。我必须重新考虑。"
 pr.040.t: "禁忌知识"
 pr.040.desc: "成了！经过数周焦灼的等待，典籍终于送达。它们比我想象的更为恢弘壮丽。此刻在我手中的，是完整的仪轨、神圣的律法，以及古老神祇的圣史。我曾追寻的那些零碎的低语，如今已凝聚成一个清晰有力的声音。我现在拥有了一切所需，不仅能理解古老的信仰，更能复兴它。这最终的选择权，在我。"
 pr.040.a: "新时代来临了！"
 pr.003.slavic: "The gods of the Slavic tribes."
 pr.011: "The Mesopotamian Pantheons"
 pr.011.desc: "The cradle of civilization offers ancient and powerful traditions. From the first cities of Sumer to the empires of Babylon and Assyria, the gods of the two rivers have shaped history. Which path shall we follow?"
 pr.011.sumerian: "The Sumerian Pantheon"
 pr.011.babylonian: "The Babylonian Pantheon"
 pr.011.assyrian: "The Assyrian Pantheon"
 pr.011.back: "Go back..."
 pr.014: "The Hittite Pantheon"
 pr.014.desc: "The Hittites were known as the people of a thousand gods, welcoming deities from all the lands they touched. Shall we embrace this vast and syncretic pantheon, led by the mighty storm god?"
 pr.014.hittite: "The Hittite Pantheon"
 pr.014.back: "Go back..."
 pr.015.scythian: "斯基泰众神"
 pr.016.illyrian: "The Illyrian Pantheon"
 pr.017: "The Baltic Pantheons"
 pr.017.desc: "In the deep forests and along the amber shores of the Baltic, the old gods are still remembered. Shall we honor the thunder god Perkunas, the goddess Laima, or the many other deities of the Lithuanian, Prussian, and Latvian tribes?"
 pr.017.lithuanian: "The Lithuanian Pantheon"
 pr.017.prussian: "The Prussian Pantheon"
 pr.017.latvian: "The Latvian Pantheon"
 pr.017.back: "Go back..."
 pr.018: "The Slavic Pantheons"
 pr.018.desc: "From the vast plains of the east to the mountains of the south, the Slavic peoples honor a powerful pantheon. Shall we follow the thunder god Perun, the multi-headed Sventovit, or the spirits of the ancestors?"
 pr.018.east_slavic: "The East Slavic Pantheon"
 pr.018.west_slavic: "The West Slavic Pantheon"
 pr.018.south_slavic: "The South Slavic Pantheon"
 pr.018.back: "Go back..."
 pr.022.slavic: "The gods of the Slavic tribes."
 pr.037.lithuanian: "The Lithuanians, the last pagans of Europe, held fast to their gods longer than any other people. Perkunas, the thunderer, rode across the sky in his chariot, while the sacred fire of Gabija burned in every hearth. To revive this faith is to return to the sacred groves of Romuva, to honor the spirits of the ancestors, and to embrace a religion that sees the divine in every tree and stream. It is a quest to rekindle the eternal flame and to stand defiant against the encroaching tide of Christendom."
 pr.037.prussian: "The Old Prussians were a fierce and independent people, their faith centered on the sacred oak of Romowe and the high priest known as the Kriwe. They worshipped a triad of gods: Perkuns, Patrimps, and Patollos. To restore their faith is to piece together a religion that was systematically destroyed by the Teutonic Knights. I must search for the Sudovian Book, the only surviving account of their beliefs, and reconstruct the rituals of a people who fought to the death for their gods."
 pr.037.latvian: "The Latvian faith is a religion of the sun and of fate. Saule, the sun goddess, drives her chariot across the sky, while Laima, the goddess of destiny, weaves the threads of every human life. To revive this faith is to embrace the dainas, the thousands of folk songs that preserve the wisdom of the ancestors. It is a quest to find harmony with the rhythms of nature, to honor the mothers of the earth and the sea, and to understand the delicate balance of fate and free will."
 pr.037.west_slavic: "The West Slavs, dwelling from the Baltic coast to the Bohemian forests, worship powerful gods in great temples. Sventovit of Arkona, with his four heads and horn of plenty, sees all and ensures the harvest. To revive this faith is to rebuild the wooden sanctuaries, to consult the sacred white horse, and to honor a pantheon that stood as a bulwark against the crusades. It is a quest to reclaim the lost lands of the Wends and to restore the glory of the Slavic gods."
 pr.037.east_slavic: "In the vast forests and steppes of the East, the Slavs honor Perun, the thunderer, and Veles, the god of the underworld and cattle. Their idols stand on high hills, overlooking the rivers that are the lifeblood of their lands. To restore this faith is to raise the idols of Kiev once more, to offer sacrifices to the forces of nature, and to embrace a worldview where the spirits of the ancestors dwell in every home. It is a quest to unite the tribes under the banner of the old gods."
 pr.037.south_slavic: "The South Slavs, settled in the rugged Balkans, have preserved a faith rich with folklore and reverence for nature. Perun battles Veles in the storms that lash the mountains, while the Vila dance in the moonlit glades. To revive this faith is to peel back the layers of Christian syncretism, to rediscover the ancient myths in the songs of the people, and to honor the Zduhać, the weather-protectors of the tribe. It is a quest to find the old gods hiding in plain sight, in the customs and superstitions of the land."
 pr.041.t: "The Slavic Gods of Forest and Plain"
 pr.041.desc: "The Slavic lands stretch from the icy north to the warm southern seas, and their gods are as diverse as the landscape. From the temple-builders of the west to the nature-worshippers of the east and south, the Slavic soul is deeply connected to the divine. Which of these traditions shall I explore?"
 pr.041.west_slavic: "Focus on the West Slavic Pantheon."
 pr.041.east_slavic: "Focus on the East Slavic Pantheon."
 pr.041.south_slavic: "Focus on the South Slavic Pantheon."
 pr.041.back: "This is not the path for me."