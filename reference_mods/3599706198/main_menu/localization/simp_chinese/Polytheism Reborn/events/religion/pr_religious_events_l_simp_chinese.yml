 pr.016: "The Baltic Pantheons"
 pr.016.desc: "In the deep forests and along the amber shores of the Baltic, the old gods are still remembered. Shall we honor the thunder god Perkunas, the goddess Laima, or the many other deities of the Lithuanian, Prussian, and Latvian tribes?"
 pr.016.lithuanian: "The Lithuanian Pantheon"
 pr.016.prussian: "The Prussian Pantheon"
 pr.016.latvian: "The Latvian Pantheon"
 pr.016.back: "返回……"
 pr.021.t: "A Whispered Heresy"
 pr.021.desc: "It's the 14th century. The world is bound by the singular vision of the Moon and Cross, its shadow stretching across every kingdom and every soul. Yet, in the quiet solitude of my library, surrounded by crumbling scrolls and forbidden texts, I have found whispers of a different age. Tales of gods, not one, but many, who once held dominion over these very lands. These are not the demons the priests speak of, but divinities of hearth, harvest, and sky.\n\nThis path is one of profound heresy, a secret that, if discovered, would see me branded an apostate and my line ended. But the allure of the old ways, of a world teeming with divine possibilities, is a powerful one. I must choose which whispers to follow into the shadows."
 pr.021.greek_roman: "The glories of Olympus and the Capitoline Hill."
 pr.021.etruscan: "The arcane rites of the Etruscans."
 pr.021.egyptian: "The ancient mysteries of the Nile."
 pr.021.celtic: "The deep magic of the Celtic groves."
 pr.021.germanic: "The primal fury of the Germanic gods."
 pr.021.iberian: "The forgotten gods of Iberia."
 pr.021.next: "Look to other forgotten pantheons..."
 pr.021.optout: "This is madness. The risk is too great."
 pr.022.t: "Further Into Heresy"
 pr.022.desc: "My studies have taken me far from the well-trodden paths of Western Europe. The whispers of heresy have led me to the sun-scorched lands of the south, the rugged mountains of the east, and the vast, open steppes. Here, too, the old gods are remembered, their names and rites preserved in fragmented texts and half-forgotten folk tales. Which of these more obscure paths shall I dare to walk?"
 pr.022.canaanite: "The gods of the Levant."
 pr.022.mesopotamian: "The pantheons of Mesopotamia."
 pr.022.daco_thracian: "The gods of the Dacians and Thracians."
 pr.022.caucasus: "The ancient gods of the Caucasus."
 pr.022.hittite: "The thousand gods of the Hittites."
 pr.022.scythian: "The gods of the Steppe."
 pr.022.illyrian: "伊利里亚人的神。"
 pr.022.baltic: "波罗的部落的万神殿。"
 pr.022.back: "返回……"
 pr.022.optout: "I have gone far enough."
 pr.023.t: "A Legacy of Marble and Myth"
 pr.023.desc: "The scrolls I have gathered speak of the great pantheons of antiquity, whose worship was intertwined with the fate of empires. The traditions of the Greeks and Romans are vast and complex; one a world of vivid myths and divine intervention, the other a rigid system of state ritual meant to secure divine favor. To truly understand, I must focus my research. Shall I pursue the organized might of the Roman state religion, the older, more chaotic myths of the Hellenes, or the syncretic faiths that blended these traditions with others?"
 pr.023.roman: "Focus on the Roman Pantheon."
 pr.023.greek: "Focus on the Greek Pantheon."
 pr.023.mycenaean: "Uncover the Mycenaean origins."
 pr.023.graeco_egyptian: "Study the fusion of Greek and Egyptian beliefs."
 pr.023.back: "This is not the path for me."
 pr.024.t: "Whispers from the Etruscan Tombs"
 pr.024.desc: "The Etruscan civilization, though absorbed by Rome, left behind a unique spiritual legacy. Their beliefs in a complex afterlife and the power of divination are a path distinct from the Greco-Roman world. Shall I delve into the secrets of the Etruscans, seeking knowledge from their silent tombs and fragmented inscriptions?"
 pr.024.etruscan: "Focus on the Etruscan Pantheon."
 pr.024.back: "This is not the path for me."
 pr.025.t: "Echoes from the Land of the Pharaohs"
 pr.025.desc: "The religion of Egypt is ancient and profound, a world of animal-headed gods, divine kings, and a preoccupation with the afterlife. The sands of the desert have preserved much. Shall I focus my studies on the traditional Kemetic pantheon, or the radical monotheism of Akhenaten's Atenism?"
 pr.025.kemetic: "Focus on the Kemetic Pantheon."
 pr.025.atenism: "Focus on the monotheistic faith of Atenism."
 pr.025.back: "This is not the path for me."
 pr.026.t: "The Voices of the Celtic World"
 pr.026.desc: "The Celtic peoples, from the misty islands of the west to the deep forests of the continent, shared a vibrant spiritual world. Their gods were tied to the land, to the tribe, and to the cycles of nature. Which branch of this ancient tradition shall I explore?"
 pr.026.gaelic: "Focus on the Gaelic Gods."
 pr.026.brythonic: "Focus on the Brythonic Gods."
 pr.026.gaulish: "Focus on the Gaulish Gods."
 pr.026.celtic_iberian: "Focus on the Celtiberian Gods."
 pr.026.back: "This is not the path for me."
 pr.027.t: "The Call of the Germanic Tribes"
 pr.027.desc: "The gods of the Germanic peoples are deities of war, wisdom, and the untamed forces of nature. Their worship was a matter of sacrifice, of honor, and of seeking glory in the eyes of the gods. Which of their pantheons shall I seek to understand?"
 pr.027.anglo_saxon: "Focus on the Anglo-Saxon Gods."
 pr.027.german: "Focus on the Central Germanic Gods."
 pr.027.norse: "Focus on the Norse Gods."
 pr.027.back: "This is not the path for me."
 pr.028.t: "The Gods of the Sun-Scorched Lands"
 pr.028.desc: "The ancient Near East was a cradle of civilization and of faith. The gods of the Levant and Mesopotamia were powerful and demanding, their stories epic in scope. Which of these ancient faiths shall I investigate?"
 pr.028.punic: "Focus on the Punic Pantheon."
 pr.028.semitic: "Focus on the West Semitic Pantheon."
 pr.028.back: "This is not the path for me."
 pr.029.t: "The Faiths of the Mountains and Steppes"
 pr.029.desc: "From the rugged Caucasus to the vast Eurasian steppe, unique and ancient faiths have flourished. These are the gods of proud and independent peoples. Which path shall I choose?"
 pr.029.dacian: "Focus on the Dacian Pantheon."
 pr.029.zalmoxism: "Focus on the faith of Zalmoxism."
 pr.029.armenian: "Focus on the Armenian Pantheon."
 pr.029.georgian: "Focus on the Georgian Pantheon."
 pr.029.back: "This is not the path for me."
 pr.030.t: "The Gods of Mesopotamia"
 pr.030.desc: "The land between the rivers, Mesopotamia, gave birth to some of the world's first civilizations and religions. From the ancient Sumerians to the mighty empires of Babylon and Assyria, a rich tapestry of myths and deities was woven. Which of these powerful pantheons shall I explore?"
 pr.030.sumerian: "Focus on the Sumerian Pantheon."
 pr.030.babylonian: "Focus on the Babylonian Pantheon."
 pr.030.assyrian: "Focus on the Assyrian Pantheon."
 pr.030.back: "This is not the path for me."
 pr.031.t: "The Baltic Gods of Forest and Thunder"
 pr.031.desc: "In the deep forests of the Baltic, the old gods have held out longer than anywhere else. The traditions of the Lithuanians, Prussians, and Latvians are rich with reverence for nature and the power of the divine. Which of these resilient faiths shall I study?"
 pr.031.lithuanian: "Focus on the Lithuanian Pantheon."
 pr.031.prussian: "Focus on the Prussian Pantheon."
 pr.031.latvian: "Focus on the Latvian Pantheon."
 pr.031.back: "This is not the path for me."
 pr.032.t: "The Gods of the Caucasus"
 pr.032.desc: "The rugged mountains of the Caucasus have forged distinct and resilient cultures. The Armenian and Georgian peoples have ancient histories, and their gods reflect a unique blend of local tradition and foreign influence. Which of these proud pantheons shall I delve into?"
 pr.032.armenian: "Focus on the Armenian Pantheon."
 pr.032.georgian: "Focus on the Georgian Pantheon."
 pr.032.back: "This is not the path for me."
 pr.033.t: "The Thousand Gods of the Hittites"
 pr.033.desc: "The Hittite Empire, built on the Anatolian plateau, was known for its 'thousand gods,' a vast and inclusive pantheon that incorporated deities from the many peoples they conquered. Shall I explore this complex and syncretic faith, with the storm god Teshub at its head?"
 pr.033.hittite: "Focus on the Hittite Pantheon."
 pr.033.back: "This is not the path for me."
 pr.034.t: "The Gods of the Scythian Steppe"
 pr.034.desc: "The Scythians, nomadic masters of the vast Eurasian steppe, worshipped a pantheon reflecting their fierce, nomadic lifestyle. Their gods were tied to the sky, the earth, and the hearth fire, with a particular reverence for a symbolic sword of a war god. Shall I delve into the faith of these warrior nomads?"
 pr.034.scythian: "Focus on the Scythian Pantheon."
 pr.034.back: "This is not the path for me."
 pr.035.t: "The Gods of the Illyrians"
 pr.035.desc: "The Illyrian tribes of the western Balkans worshipped a pantheon deeply connected to their rugged homeland. Gods of the sky, the wild, and protector deities on horseback formed the core of their beliefs. Shall I pursue the path of these fierce and independent people?"
 pr.035.illyrian: "Focus on the Illyrian Pantheon."
 pr.035.back: "This is not the path for me."
 pr.036.t: "The Gods of Ancient Iberia"
 pr.036.desc: "Before the arrival of Rome, the Iberian peninsula was home to a unique collection of faiths. These religions venerated deities of nature, life, and death, with a strong emphasis on the power of bulls and the sanctity of high places. Shall I uncover the secrets of these pre-Roman gods?"
 pr.036.iberian: "Focus on the Iberian Pantheon."
 pr.036.back: "This is not the path for me."
 pr.037.t: "A Deeper Inquiry"
 pr.037.roman: "My initial studies have illuminated the foundations of the Roman state religion—a complex system of contracts between mortals and the divine, designed to ensure the stability of the state. To truly revive these practices, I need more than just fragments. I must find comprehensive texts on the rites, the priesthoods, and the public festivals that formed the bedrock of the *Pax Deorum*. Such knowledge is rare and likely hidden away in the great libraries of Christendom, guarded by those who would see me burn for my curiosity."
 pr.037.greek: "The myths of the Hellenes are a vibrant tapestry of divine drama and mortal struggle, but they are only part of the story. To understand the faith as it was lived, I must look beyond the epic poems and tragedies. I need to uncover the secrets of the mystery cults, the philosophies that challenged the gods, and the local rituals that varied from one polis to another. This requires access to more than just my private collection; I must seek out the hidden knowledge that has survived the ages."
 pr.037.mycenaean: "I am delving into an age of heroes and bronze citadels, a time even the classical Greeks saw as ancient. The whispers I have found are not in flowing prose, but in terse inventories on clay tablets, lists of offerings to gods both familiar and strange. To reconstruct this primordial faith, I must become an archaeologist of belief, piecing together a pantheon from palace records and the silent testimony of tombs. This is a search for the very roots of Hellenic religion, a task requiring immense dedication and a willingness to interpret the faintest of echoes from the past."
 pr.037.etruscan: "The Etruscans guarded their secrets well, and the Romans did much to erase them. What remains is a puzzle of tomb inscriptions, ritual objects, and the disapproving accounts of their conquerors. To revive this faith is to become a detective of the divine, piecing together the *disciplina etrusca* from fragments and whispers. I must seek out the hidden artifacts and decipher the lost language of the Tarchon, the prophet who received the wisdom of the gods."
 pr.037.kemetic: "The faith of the Nile is a monument of millennia, its foundations as deep as the great river itself. To restore it, I must look beyond the grand temples and the rites of the pharaohs. I need to understand the heart of their beliefs: the concept of *Ma'at*, the cosmic order, and the soul's perilous journey through the underworld. This requires not just scrolls, but a deep understanding of the symbolism and magic that permeated every aspect of Egyptian life. I must find the books of the dead, the hymns to the gods, and the secret knowledge of the priesthoods."
 pr.037.atenism: "Atenism was a revolution, a radical break from millennia of tradition. It was a faith of light and truth, but also of intolerance. To understand it is to understand the mind of a heretic king, Akhenaten. The priests of the old gods erased his memory, but fragments of his great hymn to the Aten survive, a testament to a singular vision of the divine. My task is to reconstruct this fragile faith from its ruins, to find the lost city of Amarna not in the sands of Egypt, but in the scattered remnants of its art and writings."
 pr.037.gaelic: "The Gaelic faith is not found in grand temples, but in the mists of the Otherworld and the sacredness of the land. It is a religion of storytellers and poets, of heroes and of the *Aos Sí*, the fae folk who dwell in the hollow hills. To revive it, I must gather the old tales, the myths of the Tuatha Dé Danann, and the wisdom of the filí, the poet-seers who guarded the traditions. My search is not for stone tablets, but for the living memory of a people, a quest to relight the fires of Beltane and to hear the whispers of the ancestors on the wind."
 pr.037.brythonic: "The Brythonic faith is etched into the landscape of Britain, in the chalk giants carved into hillsides and the standing stones that mark the turning of the seasons. Their gods are tied to the sovereignty of the land, their myths a tapestry of kingship, of the Otherworld, and of the eternal struggle between the red and white dragons. To restore this faith, I must seek out the sacred sites, the Mabinogion's tales, and the fragments of the druidic lore that survived the Roman and Christian tides. It is a quest to reawaken the sleeping guardians of the island."
 pr.037.gaulish: "The faith of the Gauls was silenced by Caesar's legions, its druidic heart ripped out. To find it again is to search for a ghost. The Romans wrote of their gods, but through a Roman lens, twisting Teutates and Taranis into their own Mercury and Jupiter. The true faith must be found in the archaeological remains: the votive offerings in sacred springs, the ritual sites in the depths of the forest, and the cryptic symbols on their coinage. I must piece together a faith from the offerings left to the gods, a religion of sacred groves and of a druidic wisdom that was brutally suppressed."
 pr.037.celtic_iberian: "The Celtiberians, warriors of the Iberian highlands, worshipped gods of battle, of horses, and of the rugged mountains they called home. Their faith was a tapestry of Celtic and indigenous Iberian beliefs, a unique fusion of cultures. To revive it, I must look to the inscriptions on their hillforts, the votive offerings of bronze warriors, and the Roman accounts of their fierce resistance. It is a search for the soul of a warrior people, a faith as hard and enduring as the iron of their famous swords."
 pr.037.anglo_saxon: "The gods of the Anglo-Saxons crossed the sea from Germany to find a new home in England. Woden, the wanderer and seeker of wisdom; Thunor, the defender of mankind; and Tiw, the one-handed god of justice—these are the deities of a people carving out a new kingdom. To restore their faith, I must delve into the epic of Beowulf, the surviving fragments of their poetry, and the archaeological evidence of their ship burials and sacred sites. It is a quest to reclaim the pagan heart of England, to rebuild the mead hall of the gods."
 pr.037.german: "In the dark forests of Germania, the tribes honored their gods with sacrifice and reverence for nature. The Romans, from across the Rhine, wrote of their worship of Mercury and Hercules, but these were but masks for Wodan and Donar. To find the true faith, I must look to the bog bodies, the votive deposits, and the sparse runic inscriptions that have survived. It is a search for a primal faith, a religion of sacred groves and of a people who defied the might of Rome."
 pr.037.norse: "The faith of the Northmen is a religion of ice and fire, of gods who are fated to die and of a world born from the body of a giant. Odin, the Allfather, who sacrificed an eye for wisdom; Thor, the thunderous champion of Midgard; and Loki, the trickster who will bring about the end of all things. To revive this faith is to embrace the sagas, the Eddas, and the runestones that dot the Scandinavian landscape. It is a call to adventure, to seek the wisdom of the runes, and to prepare for the final battle of Ragnarok."
 pr.037.punic: "The faith of Carthage was born in Phoenicia and found a new home on the shores of Africa. It is a religion of merchants and sailors, of a city that challenged Rome for control of the Mediterranean. Their gods, Baal Hammon and Tanit, demanded sacrifice and absolute devotion. To restore this faith is to piece together a history from the biased accounts of their enemies and the silent stelae of their tophets. It is a quest to rebuild a lost empire of faith, to hear the voices of the gods that once thundered across the sea."
 pr.037.semitic: "The West Semitic peoples, the ancestors of the Phoenicians and the peoples of Canaan, worshipped a pantheon that shaped the religious landscape of the ancient world. El, the father of the gods, and Baal, the mighty storm god, ruled over a world of fertility and conflict. To revive their faith is to delve into the oldest layers of religious history, to uncover the myths of Ugarit, and to understand a faith that was both a precursor and a rival to the monotheism that would one day dominate the world."
 pr.037.dacian: "The Dacians, a fierce people of the Carpathian mountains, were known for their belief in the immortality of the soul, a gift from their god Zalmoxis. They faced death with a courage that unnerved even the Romans. To restore their faith is to seek the secrets of their mountain sanctuaries, to understand the teachings of their prophet-god, and to reclaim a spirituality that valued the eternal over the mortal. It is a quest for the immortality of the soul, a defiance of the finality of death."
 pr.037.zalmoxism: "Zalmoxism is more than a religion; it is a philosophy of the soul. It teaches that this life is but a preparation for the next, a journey to a better place. To embrace it is to walk the path of a prophet, to seek a personal connection with the divine, and to find a community of believers who share a common hope. My task is to reconstruct the teachings of Zalmoxis, to separate the historical man from the divine being, and to create a faith that offers not just rituals, but a reason for living and a hope for what lies beyond."
 pr.037.armenian: "The Armenian pantheon is a reflection of its people's history, a crossroads of cultures. Aramazd, the father god, bears the mark of Persian Ahura Mazda, while Vahagn, the dragon-slaying hero, echoes the fire of the Iranian Verethragna. To revive this faith is to untangle a web of influences, to find the native heart of Armenian belief beneath layers of foreign varnish. I must seek out the pre-Christian folk tales, the fragments of ancient songs, and the ruins of the temples that were destroyed to make way for the Cross."
 pr.037.georgian: "The gods of the Kartvelian people are as rugged and ancient as the Caucasus mountains themselves. Armazi, the chief god, stood as a great idol, a warrior deity who guarded the kingdom. To restore this faith is to piece together a pantheon from the fragments left behind by Christian chroniclers, to find the gods of the earth and the sky that were replaced by a new faith. It is a search for the soul of a kingdom, a faith that was intertwined with the very identity of the Georgian people."
 pr.037.hittite: "The Hittites did not just conquer lands, they conquered gods. Their pantheon was a sprawling, multicultural assembly of deities, a testament to their empire's diversity. The Storm God of Hatti, the Sun Goddess of Arinna, and a thousand other gods from Syria, Mesopotamia, and Anatolia all had a place in their temples. To revive this faith is to become a master of religious diplomacy, to build a pantheon that is both inclusive and coherent. It is a task of immense complexity, a challenge to create unity from a thousand different voices."
 pr.037.scythian: "The Scythians left no books, no temples, only their graves and the accounts of the Greeks who viewed them as noble savages. Their gods were as wild and free as the steppe they roamed. Tabiti, the goddess of the hearth, bound their tribes together, while a nameless war god was worshipped in the form of an iron sword. To restore their faith is to embrace a religion of the open sky, of blood oaths, and of a deep connection to the horse and the bow. It is a quest to understand the soul of a nomad, a faith written not in stone, but in the wind and the stars."
 pr.037.illyrian: "The Illyrians were a people of the sea and the mountains, and their gods reflected their world. Dei-pátrous, the sky father, watched over them, while Medaurus, the protector on horseback, guarded their tribes. Their faith was local, tied to specific places and peoples. To revive it is to gather the whispers from a hundred different valleys, to piece together a pantheon from Roman inscriptions and the surviving traces of their language. It is a search for the faith of a people who were a thorn in the side of empires, a religion as resilient and fragmented as the Illyrian tribes themselves."
 pr.037.iberian: "The Iberians of the Mediterranean coast were a people of art and commerce, their faith a world away from the Celtic warriors of the interior. They worshipped a great goddess of the earth and the underworld, a lady of beasts and of the dead. Their sanctuaries were places of healing and of oracles, their writing still a mystery. To restore their faith is to decipher a lost language, to understand a religion of bull-worship and of a complex journey to the afterlife. It is a quest to give voice to a people silenced by the coming of Rome."
 pr.037.sumerian: "To seek the gods of Sumer is to travel to the dawn of history, to the very invention of religion as we know it. Inanna, the queen of heaven; Enki, the god of wisdom and magic; Enlil, the lord of the wind—these are the first gods to be written down, their myths the blueprint for so much that followed. To revive their faith is to become an archaeologist of the soul, to read the cuneiform tablets and to understand a worldview where cities were the property of the gods and humanity their servants. It is a quest to find the source of all religion, the wellspring of civilization."
 pr.037.babylonian: "The faith of Babylon is a faith of empire, of law, and of the stars. Marduk, the city's patron god, rose to become the king of all gods, his victory over the chaos-dragon Tiamat a justification for Babylon's dominion over the world. To restore this faith is to embrace a religion of cosmic order, of astrology, and of a complex legal and social system that was seen as a reflection of the divine will. It is a quest to rebuild the ziggurat of Babel, to create a faith that can unite an empire and reach for the heavens."
 pr.037.assyrian: "The faith of Assyria is a faith of war and of empire, its chief god, Ashur, a warrior deity who demanded conquest and tribute. The Assyrian kings were his high priests, their campaigns a holy war to extend the dominion of their god. To revive this faith is to embrace a religion of ruthless efficiency, of psychological warfare, and of a state that was a finely tuned instrument of divine will. It is a quest to forge a new empire in the name of a god of war, to carve out a place in the world through strength and terror."
 pr.037.a: "The cost is great, but knowledge is priceless."
 pr.038.t: "The First Acquisition"
 pr.038.desc: "The gold was well spent. My agents, sworn to secrecy, have returned from distant lands with a small collection of texts I thought lost to time. One is a partial transcription of a temple inventory, another a philosophical treatise arguing against the monotheistic tide, and a third is a collection of hymns to a forgotten goddess. These are but whispers from the past, yet they are more than I had dared hope for. The path forward is clearer now, though no less dangerous. The knowledge I seek exists, hidden in plain sight within the great monastic libraries and private collections of Europe. I must find a way to access them."
 pr.038.a: "The hunt for knowledge begins."
 pr.039.t: "The Great Library"
 pr.039.desc: "My research points to one place a great library not to far away from [ROOT.GetCountry.GetCapital.GetName], a bastion of knowledge guarded by watchful monks. Within its walls lies a collection of pre-Christian texts that could hold the key to my quest. Acquiring them will be perilous. A direct approach is unthinkable, but there may be other ways. How shall I retrieve the forbidden knowledge?"
 pr.039.a: "A quiet hand can retrieve what a loud voice cannot. I will send a skilled agent."
 pr.039.b: "This is too great a risk. I must reconsider."
 pr.040.t: "The Forbidden Knowledge"
 pr.040.desc: "Success! After weeks of tense waiting, the texts have arrived. They are more magnificent than I could have imagined. Here, in my hands, are the complete rites, the sacred laws, and the divine histories of the old gods. The fragmented whispers I once pursued have coalesced into a clear and powerful voice. I now possess everything needed to not only understand the old faith, but to restore it. The final choice is mine to make."
 pr.040.a: "The time has come."