l_simp_chinese:
 folk_caucasian_group: "高加索民俗组"
 folk_caucasian_group_ADJ: "高加索民俗组"
 folk_caucasian_group_desc: "高加索民俗组囊括了高加索地区本土的多神教传统。这些信仰与山地风貌联系紧密，其诸神常被认为居于巍峨群峰之上。受到邻近帝国与本土习俗的双重影响，这些宗教通过独特的仪式与祭祀，崇拜司掌太阳、战争及丰饶的神祗。"
 folk_iranian_group: "伊朗民俗组"
 folk_iranian_group_ADJ: "伊朗民俗组"
 folk_iranian_group_desc: "伊朗民俗组代表了伊朗高原及周边地区多样化的前琐罗亚斯德教与本土多神教传统。这些古老的信仰崇拜着掌管自然、元素及部落祖先的诸神。它们常流传于乡野地区与山间据点，与各大主流宗教长期共存，保留了一份植根于这片土地及其历史的独特精神遗产。"