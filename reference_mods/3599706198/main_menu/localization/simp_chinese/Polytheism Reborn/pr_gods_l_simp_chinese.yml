l_simp_chinese:
 jupiter_god: "朱庇特"
 jupiter_god_desc: "朱庇特是众神之王，掌管天空、雷霆与正义。作为罗马国家的至高神，他是神圣律法的最终裁决者，也是罗马人民的守护者。对他的崇拜维系着“神人之约”，即天神与凡人之间的和平。"
 mars_god: "玛尔斯"
 mars_god_desc: "玛尔斯是战争之神、农业之神，也是罗马的守护者。作为战神，他代表着军事力量与征服的荣耀，但同时，他也是农田与人民的守护者，确保他们的繁荣与安全。通过其子罗穆卢斯，他被视为罗马人民之父。"
 neptune_god: "涅普顿"
 neptune_god_desc: "尼普顿是掌管海洋、地震与马匹的神祇。他主宰着浩瀚而变幻莫测的大海，统御风暴，赐予丰饶。作为淡水的守护神，他也对农业生产至关重要，因而成为一位强大而备受尊崇——有时又令人畏惧——的神明。"
 ceres_god: "刻瑞斯"
 ceres_god_desc: "刻瑞斯是农业、谷物、生育与母爱的女神。她是一位仁慈的神明，掌管着丰收与人民的滋养。对她的崇拜对于土地的丰饶与家庭的福祉至关重要。"
 venus_god: "维纳斯"
 venus_god_desc: "维纳斯是爱、美、欲望、生育、繁荣与胜利的女神。作为罗马民族的神圣先祖，她是罗马的优雅与魅力的有力象征。其影响力从恋人的激情延伸至军事战役的胜利。"
 minerva_god: "密涅瓦"
 minerva_god_desc: "密涅瓦是智慧、战略战术与艺术女神。她是工匠、艺术家和教师的庇护者，也是一位卓越的军事战略家，崇尚智谋与战术，而非蛮力；其智慧在和平与战争时期都指引着城邦。"
 zeus_god: "宙斯"
 zeus_god_desc: "宙斯是众神之王，奥林匹斯山的统治者，掌管天空、雷电与正义。他对天空拥有绝对权威，闪电权杖是其力量与统治的象征。作为秩序的守护者，他确保众神与凡人都遵从神圣法则。"
 athena_god: "雅典娜"
 athena_god_desc: "雅典娜是智慧、勇气、灵感、文明、法律与正义、战略战争、数学、力量、谋略、艺术、工艺与技能的女神。她既是强大的战士，也是睿智的顾问，象征着战争中的智慧与谋略。"
 ares_god: "阿瑞斯"
 ares_god_desc: "阿瑞斯是战争之神，象征着冲突中不受约束、暴烈与肉体层面的特质。他拥有无比的力量与残暴，体现了战争纯粹的破坏力以及战场上的狂暴。"
 poseidon_god: "波塞冬"
 poseidon_god_desc: "波塞冬是海神、地震之神和赛马之神。作为海洋的统治者，他掌控着海浪和深海生物。他的性情如同大海般反复无常，既能展现出平静，也能爆发狂暴的毁灭之力。"
 demeter_god: "德墨忒尔"
 demeter_god_desc: "德墨忒尔是掌管收获、农业、丰饶与圣法的女神。她主司谷物与大地的丰产，她的庇佑对丰收至关重要。她象征着自然界中孕育、消亡与重生的循环。"
 aphrodite_god: "阿芙洛狄忒"
 aphrodite_god_desc: "阿芙洛狄忒是司掌爱、美、欢愉、激情与生育的女神。她诞生于海浪泡沫之中，拥有无穷魅力，能让诸神与凡人都心生爱慕与渴望。"
 wodan_god: "沃坦"
 wodan_god_desc: "Wodan is the god of wisdom, poetry, war, and death. He is a relentless seeker of knowledge, having sacrificed an eye for cosmic wisdom. As the leader of the Wild Hunt, he is a complex figure, representing both the divine fury of battle and the inspiration of the skalds."
 donar_god: "多纳尔"
 donar_god_desc: "Donar is the powerful god of thunder, protector of mankind and the gods from the forces of chaos. With his mighty hammer, he defends the world from giants and monsters. He is a straightforward, courageous deity, and his worship ensures strength and protection."
 ziu_god: "吉乌"
 ziu_god_desc: "Ziu is the god of law, justice, and the sky. He is an ancient and honorable deity, who sacrificed his hand to bind the monstrous wolf Fenrir, demonstrating his commitment to order and the rule of law. He is invoked in matters of oaths, treaties, and justice."
 nerthus_god: "那瑟斯"
 nerthus_god_desc: "Nerthus is an ancient earth goddess associated with fertility, peace, and prosperity. She is a deity of the Vanir, and her sacred processions bring a time of peace and celebration to the lands she visits. Her worship ensures the fertility of the earth and a bountiful harvest."
 fro_god: "弗罗"
 fro_god_desc: "Fro, also known as Freyr, is a god of the Vanir associated with virility, prosperity, sunshine, and fair weather. He is a fertility god who brings peace and plenty to the land. His worship is connected to harvests, weddings, and the well-being of the people."
 frouwa_god: "Frouwa"
 frouwa_god_desc: "Frouwa, also known as Freyja, is a goddess of the Vanir associated with love, beauty, fertility, sex, war, and death. She is a powerful and complex figure, presiding over the field of Fólkvangr, where she receives half of those who die in battle. Her worship is sought for favor in love, fertility, and war."
 woden_god: "沃登"
 woden_god_desc: "Wōden, the Anglo-Saxon counterpart to Wodan, is the god of wisdom, poetry, and war. A relentless seeker of knowledge, he is a master of runes and magic. As a war god, he inspires ecstatic fury in battle and is a leader of the slain."
 thunor_god: "Þunor"
 thunor_god_desc: "Þunor is the god of thunder, a powerful and straightforward deity who protects mankind with his mighty hammer. He is a champion of order, defending the world from the forces of chaos and destruction. His worship ensures strength and the protection of the community."
 tiw_god: "Tīw"
 tiw_god_desc: "Tīw is the god of law, justice, and the sky. He is a god of immense honor and courage, having sacrificed his hand to bind the monstrous wolf Fenrir. He is invoked in matters of oaths, treaties, and assemblies, ensuring that justice and order prevail."
 freo_god: "Freo"
 freo_god_desc: "Freo, the Anglo-Saxon goddess of love, beauty, and fertility, is a radiant and benevolent deity. She presides over matters of the heart, bringing joy and passion to the world. Her worship ensures happy marriages, healthy childbirth, and the flourishing of love in all its forms."
 frea_god: "Frea"
 frea_god_desc: "Frea, a powerful goddess in the Anglo-Saxon pantheon, is associated with love, fertility, and prophecy. As the wife of Wōden, she is a figure of great wisdom and authority, and her counsel is sought by both gods and mortals. Her worship ensures the well-being of the family and the prosperity of the community."
 gaut_god: "高特"
 gaut_god_desc: "高特是哥特人的神圣祖先，一位执掌战争与领导权的神祇。他拥有无上的力量与权威，其崇拜是哥特民族身份认同与军事成就的核心。他被尊奉为神圣的君王与部落的守护者。"
 fairguneis_god: "Fairguneis"
 fairguneis_god_desc: "Fairguneis is the Gothic god of thunder, a powerful and protective deity. He is a warrior god who defends the world from the forces of chaos. His worship ensures strength, courage, and the protection of the Gothic people from their enemies."
 teiws_god: "Teiws"
 teiws_god_desc: "Teiws is the Gothic god of law and justice. He is a god of honor and oaths, and his worship is central to the maintenance of social order. He is a brave and selfless deity, who ensures that justice is upheld and that oaths are honored."
 njorder_god: "尼奥尔德"
 njorder_god_desc: "尼奥德尔是华纳神族中的一位神祇，与海洋、风和财富相关。作为海岸之神，祂是水手和渔民的庇护者。人们祈求祂的庇佑，以期一帆风顺，鱼虾满舱。对尼奥德尔的崇拜能保障繁荣富足与海产的丰饶。"
 ingwaz_god: "英戈瓦兹"
 ingwaz_god_desc: "英戈瓦兹，亦被称为英格，是掌管丰饶、和平与繁荣之神。祂是一位仁慈的神祇，为大地带来喜悦与富足。对祂的崇拜与丰收、部落的福祉以及生命的欢庆密切相关。"
 fraujo_god: "Fraujō"
 fraujo_god_desc: "Fraujō, the Gothic goddess of love, beauty, and fertility, is a powerful and alluring deity. Her worship is sought for favor in love, marriage, and childbirth. She is a symbol of feminine power and the life-giving forces of nature."
 ra_god: "拉"
 ra_god_desc: "Ra is the ancient god of the sun, and one of the most powerful deities in the Egyptian pantheon. As the creator of the world, he sails across the sky each day in his solar barque, bringing light and life to the land. His worship is a guarantee of order and a bulwark against the forces of chaos."
 thoth_god: "托特"
 thoth_god_desc: "Thoth is the god of wisdom, writing, magic, and the moon. As the scribe of the gods, he is the master of knowledge and the divine arbiter of disputes. His wisdom is sought to guide the state, to advance learning, and to ensure that justice prevails."
 sekhmet_god: "塞赫麦特"
 sekhmet_god_desc: "Sekhmet is the goddess of war, destruction, and healing. She is the fierce 'Eye of Ra,' a lioness-headed deity who can unleash terrible plagues and devastation, but who can also be appeased to bring about miraculous cures. Her worship is a plea for both protection from her wrath and the deployment of her fury against one's enemies."
 hapi_god: "哈碧"
 hapi_god_desc: "Hapi is the god of the annual flooding of the Nile. He represents the life-giving fertility of the river, which deposits the rich black silt necessary for agriculture. His worship ensures a bountiful inundation, and thus the prosperity and survival of Egypt itself."
 osiris_god: "奥西里斯"
 osiris_god_desc: "Osiris is the god of the afterlife, the underworld, and rebirth. As the lord of the dead, he judges the souls of the deceased and presides over the realm of the blessed. His worship offers the promise of eternal life and resurrection, and he is a symbol of the enduring cycle of life, death, and renewal."
 isis_god: "伊西斯"
 isis_god_desc: "Isis is one of the most powerful and beloved goddesses of the Egyptian pantheon. She is a mother goddess, a patron of magic, and a symbol of wifely and motherly devotion. Her worship is associated with healing, protection, and the nurturing of the family and the state."
 gebeleizis_god: "Gebeleizis"
 gebeleizis_god_desc: "Gebeleizis is the Dacian god of storms, thunder, and lightning. As a powerful sky god, he is both feared and revered, his thunderbolts a symbol of his immense power. He is often seen as a parallel to Zalmoxis, or even the same deity in a different aspect, representing the more forceful and destructive side of the divine."
 zalmoxis_god: "Zalmoxis"
 zalmoxis_god_desc: "Zalmoxis is the chief deity of the Dacians, a god of the sky, the dead, and the mysteries of immortality. He is a prophet-god who taught his followers that the soul is eternal, and that death is but a journey to a better place. His worship fosters a unique spiritual resilience and a disregard for mortal peril."
 pleistoros_god: "Pleistoros"
 pleistoros_god_desc: "Pleistoros is a Thracian war god to whom horses and sometimes even humans were sacrificed. He is a fierce and demanding deity, whose favor is sought in battle to ensure victory. His worship reflects the martial values of the Thracian warrior aristocracy."
 sabazios_god: "Sabazios"
 sabazios_god_desc: "Sabazios is a Thracian and Phrygian deity, a horseman and sky father god. He is associated with fertility, healing, and the mysteries of life and death. His worship often involved ecstatic rituals and a belief in a blessed afterlife for his initiates."
 kotys_god: "Kotys"
 kotys_god_desc: "Kotys is a Thracian goddess associated with the mountains, the wild, and orgiastic rituals. Her worship, known as the Cotyttia, was a nocturnal festival of revelry and excess. She is a powerful and untamed deity, representing the primal forces of nature."
 dionysus_god: "狄俄倪索斯"
 dionysus_god_desc: "Dionysus, a god of Thracian origin, is the god of wine, revelry, and ecstatic frenzy. He represents the intoxicating power of nature and the liberation from the constraints of civilization. His worship is a celebration of life, but also a recognition of its chaotic and destructive potential."
 an_dagda_god: "达格达"
 an_dagda_god_desc: "An Dagda is the chieftain of the Tuatha Dé Danann, the god of wisdom, magic, and druidry. He is a father figure, a protector of the tribe, and a master of all arts. His harp can control the seasons and the emotions of men, and his cauldron is a source of endless sustenance."
 morrigan_god: "The Morrígan"
 morrigan_god_desc: "The Morrígan is a goddess of war, fate, and death. She is a shapeshifter, often appearing as a crow, who flies above the battlefield, deciding the fate of warriors. She is a fierce and formidable deity, a harbinger of doom and a chooser of the slain."
 neit_god: "Neit"
 neit_god_desc: "Neit is an ancient god of war, a battle-fury who embodies the brutal and chaotic nature of conflict. He is a powerful and fearsome deity, whose presence on the battlefield inspires both terror and martial frenzy. His worship is a plea for victory and the utter destruction of one's enemies."
 manannan_mac_lir_god: "Manannán mac Lir"
 manannan_mac_lir_god_desc: "Manannán mac Lir is a god of the sea, a powerful and enigmatic figure who rules over the waves and the Otherworld. He is a master of magic and illusion, a guardian of the blessed isles, and a patron of sailors and travelers. His cloak can create a mist that conceals and protects."
 aine_god: "昂雅"
 aine_god_desc: "Áine is a goddess of summer, wealth, and sovereignty. She is a radiant and benevolent deity, associated with the sun and the fertility of the land. Her worship ensures a bountiful harvest, the prosperity of the kingdom, and the legitimacy of the ruler."
 brigit_god: "Brigit"
 brigit_god_desc: "Brigit is a goddess of poetry, healing, smithcraft, and fertility. She is a beloved and multifaceted deity, a patron of the arts and a source of inspiration. Her sacred flame is a symbol of creativity and renewal, and her wells are places of healing and pilgrimage."
 taranis_god: "Taranis"
 taranis_god_desc: "Taranis is the god of thunder, a powerful and formidable deity whose name means 'thunderer.' He is often depicted with a thunderbolt and a wheel, representing the power of the storm and the turning of the heavens. His worship is a plea for protection from the destructive power of nature."
 lugus_god: "Lugus"
 lugus_god_desc: "Lugus is a god of many talents, a master of all arts and crafts. He is a god of trade and commerce, a protector of travelers, and a skilled warrior. His worship ensures prosperity, successful journeys, and victory in battle."
 andraste_god: "Andraste"
 andraste_god_desc: "Andraste is a goddess of victory, a warrior deity invoked in times of conflict. She is a figure of immense power and fury, and her worship is associated with sacred groves and the sacrifice of animals. Her favor is sought to ensure triumph over one's enemies."
 nodons_god: "Nodons"
 nodons_god_desc: "Nodons is a god of healing, the sea, and hunting. He is a benevolent deity whose sanctuary at Lydney was a place of pilgrimage for those seeking cures for their ailments. He is a protector of the waters and a master of the hunt."
 sucellos_god: "Sucellos"
 sucellos_god_desc: "Sucellos is the 'good striker,' a god of agriculture, forests, and alcoholic drinks. He is often depicted with a large hammer or mallet and a pot, symbolizing his power to both create and destroy. He is a protector of the harvest and a bringer of prosperity."
 brigantia_god: "Brigantia"
 brigantia_god_desc: "Brigantia is the goddess of the Brigantes tribe of northern Britain. She is a powerful deity of victory, wisdom, fertility, and the land itself. As a tutelary goddess, she is a protector of her people and a symbol of their sovereignty."
 teutatis_god: "Teutatis"
 teutatis_god_desc: "Teutatis is the 'god of the tribe,' a powerful deity who serves as a protector of the people. He is a god of war, wealth, and fertility, and his worship is central to the identity and well-being of the tribe. Human sacrifices were sometimes made to him to ensure his favor in battle."
 lugh_god: "Lugh"
 lugh_god_desc: "Lugh is a youthful and handsome god, a master of all arts and skills. He is a god of the sun, a skilled warrior, and a patron of craftsmen. His festival, Lughnasadh, is a celebration of the harvest and the abundance of the land."
 cicolluis_god: "Cicolluis"
 cicolluis_god_desc: "Cicolluis is a god of war, a protector of the tribe and its warriors. He is a strong and muscular deity, often depicted with a club or a hammer. His worship ensures victory in battle and the defense of the homeland."
 epona_god: "Epona"
 epona_god_desc: "Epona is the goddess of horses, a beloved and widely worshipped deity. She is a protector of cavalry, a guide for the souls of the dead, and a goddess of fertility. Her worship is a testament to the importance of the horse in Celtic society."
 arausio_god: "Arausio"
 arausio_god_desc: "Arausio is a local god of the town of Arausio (modern-day Orange, France). He is a god of water and springs, and his worship is associated with a sacred spring in the town. He is a protector of the community and a source of its prosperity."
 rosmerta_god: "Rosmerta"
 rosmerta_god_desc: "Rosmerta is a goddess of fertility and abundance. She is often depicted with a cornucopia, a symbol of her power to bring wealth and prosperity. She is a benevolent deity whose worship ensures a bountiful harvest and the well-being of the people."
 reo_god: "Reo"
 reo_god_desc: "Reo is a god of the sky and thunder, a powerful and ancient deity of the Iberian Celts. He is a warrior god, whose thunderbolts strike fear into the hearts of his enemies. His worship is a plea for strength in battle and the protection of the tribe."
 lugei_god: "Lugei"
 lugei_god_desc: "Lugei is a god of the sun and light, a youthful and radiant deity. He is a master of all arts and skills, a patron of craftsmen, and a skilled warrior. His worship ensures prosperity, successful ventures, and the flourishing of culture."
 teleno_god: "Teleno"
 teleno_god_desc: "Teleno is a god of war and mountains, a fierce and powerful protector of the Astures. He is a god of the wild, whose strength is like that of the mountains themselves. His worship is a plea for victory in battle and the defense of the homeland."
 belenus_god: "Belenus"
 belenus_god_desc: "Belenus is a god of the sun and healing, a benevolent and widely worshipped deity. He is a god of light, whose sacred fires are lit to celebrate the coming of summer. His worship is a plea for good health, a bountiful harvest, and the protection of the community."
 durius_god: "Durius"
 durius_god_desc: "Durius is the personification of the river Douro, a powerful and life-giving deity. He is a god of water, fertility, and abundance, and his worship is central to the prosperity of the lands through which he flows. He is a protector of fishermen and a source of the land's fertility."
 nabia_god: "Nabia"
 nabia_god_desc: "Nabia is a goddess of rivers and water, a nurturing and benevolent deity. She is a goddess of fertility and abundance, and her worship is associated with sacred springs and wells. She is a protector of the community and a source of its well-being."
 baal_god: "Baal"
 baal_god_desc: "Baal is a title meaning 'lord' or 'master,' often applied to the chief god of the Canaanite pantheon. He is a storm god, a bringer of rain and fertility, and a powerful warrior who defeats the forces of chaos. His worship is central to the agricultural cycle and the prosperity of the land."
 melqart_god: "Melqart"
 melqart_god_desc: "Melqart is the tutelary god of the city of Tyre and a major deity in the Phoenician and Punic world. He is a god of kingship, the underworld, and the life-death-rebirth cycle. As a patron of colonization and trade, his worship spread throughout the Mediterranean."
 tanit_god: "Tanit"
 tanit_god_desc: "Tanit is the chief goddess of Carthage, a powerful deity of the moon, fertility, and war. She is often associated with Baal Hammon and is a protector of the city and its people. Her symbol is ubiquitous in Punic art, and her worship was central to Carthaginian religious life."
 eshmun_god: "Eshmun"
 eshmun_god_desc: "Eshmun is a god of healing and tutelary god of Sidon. He is a youthful deity associated with the renewal of life and the curing of ailments. His temples were places of pilgrimage for the sick, and his worship offered hope for recovery and health."
 yam_god: "Yam"
 yam_god_desc: "Yam is the god of the sea and rivers, a chaotic and powerful force in the Canaanite pantheon. He represents the untamed waters and is often in conflict with Baal. His worship is a recognition of the power of the sea and a plea for protection from its fury."
 astarte_god: "Astarte"
 astarte_god_desc: "Astarte is a goddess of war, sexuality, and royal power. She is a fierce and alluring deity, often depicted as a warrior on horseback or a naked woman. Her worship is associated with the protection of the king and the fertility of the land and its people."
 hammon_god: "Hammon"
 hammon_god_desc: "Hammon, is a deity of the sky and vegetation. He is a powerful and ancient god, often associated with the ram and the sun. His worship was central to the Carthaginian state, and he was often invoked for protection and prosperity."
 el_god: "El"
 el_god_desc: "El is the supreme creator god of the Canaanite pantheon, the father of the gods and mankind. He is a wise and benevolent deity, often depicted as an old man with a long beard. His worship is associated with wisdom, justice, and the divine order."
 dagon_god: "达贡"
 dagon_god_desc: "达贡是谷物与农业之神，是生计与繁荣的赐予者。作为一位古老的神祇，他在整个古代近东地区受到崇拜。对他的敬奉能确保丰收与人民的安康。"
 asherah_god: "亚舍拉"
 asherah_god_desc: "Asherah is a mother goddess, the consort of El and a symbol of fertility and life. She is often associated with sacred trees and groves. Her worship is a plea for fertility, abundance, and the protection of the family."