l_simp_chinese:
 jupiter_god: "朱庇特"
 jupiter_god_desc: "朱庇特是众神之王，掌管天空、雷霆与正义。作为罗马国家的至高神，他是神圣律法的最终裁决者，也是罗马人民的守护者。对他的崇拜维系着“神人之约”，即天神与凡人之间的和平。"
 mars_god: "玛尔斯"
 mars_god_desc: "玛尔斯是战争之神、农业之神，也是罗马的守护者。作为战神，他代表着军事力量与征服的荣耀，但同时，他也是农田与人民的守护者，确保他们的繁荣与安全。通过其子罗穆卢斯，他被视为罗马人民之父。"
 neptune_god: "涅普顿"
 neptune_god_desc: "尼普顿是掌管海洋、地震与马匹的神祇。他主宰着浩瀚而变幻莫测的大海，统御风暴，赐予丰饶。作为淡水的守护神，他也对农业生产至关重要，因而成为一位强大而备受尊崇——有时又令人畏惧——的神明。"
 ceres_god: "刻瑞斯"
 ceres_god_desc: "刻瑞斯是农业、谷物、生育与母爱的女神。她是一位仁慈的神明，掌管着丰收与人民的滋养。对她的崇拜对于土地的丰饶与家庭的福祉至关重要。"
 venus_god: "维纳斯"
 venus_god_desc: "维纳斯是爱、美、欲望、生育、繁荣与胜利的女神。作为罗马民族的神圣先祖，她是罗马的优雅与魅力的有力象征。其影响力从恋人的激情延伸至军事战役的胜利。"
 minerva_god: "密涅瓦"
 minerva_god_desc: "密涅瓦是智慧、战略战术与艺术女神。她是工匠、艺术家和教师的庇护者，也是一位卓越的军事战略家，崇尚智谋与战术，而非蛮力；其智慧在和平与战争时期都指引着城邦。"
 zeus_god: "宙斯"
 zeus_god_desc: "宙斯是众神之王，奥林匹斯山的统治者，掌管天空、雷电与正义。他对天空拥有绝对权威，闪电权杖是其力量与统治的象征。作为秩序的守护者，他确保众神与凡人都遵从神圣法则。"
 athena_god: "雅典娜"
 athena_god_desc: "雅典娜是智慧、勇气、灵感、文明、法律与正义、战略战争、数学、力量、谋略、艺术、工艺与技能的女神。她既是强大的战士，也是睿智的顾问，象征着战争中的智慧与谋略。"
 ares_god: "阿瑞斯"
 ares_god_desc: "阿瑞斯是战争之神，象征着冲突中不受约束、暴烈与肉体层面的特质。他拥有无比的力量与残暴，体现了战争纯粹的破坏力以及战场上的狂暴。"
 poseidon_god: "波塞冬"
 poseidon_god_desc: "波塞冬是海神、地震之神和赛马之神。作为海洋的统治者，他掌控着海浪和深海生物。他的性情如同大海般反复无常，既能展现出平静，也能爆发狂暴的毁灭之力。"
 demeter_god: "德墨忒尔"
 demeter_god_desc: "德墨忒尔是掌管收获、农业、丰饶与圣法的女神。她主司谷物与大地的丰产，她的庇佑对丰收至关重要。她象征着自然界中孕育、消亡与重生的循环。"
 aphrodite_god: "阿芙洛狄忒"
 aphrodite_god_desc: "阿芙洛狄忒是司掌爱、美、欢愉、激情与生育的女神。她诞生于海浪泡沫之中，拥有无穷魅力，能让诸神与凡人都心生爱慕与渴望。"
 wodan_god: "沃丹"
 wodan_god_desc: "沃丹是智慧、诗歌、战争与死亡之神。祂是一位不倦的求知者，曾为获得宇宙智慧而牺牲一只眼睛。作为狂猎的领袖，他是一个复杂的存在，既代表着战场上的神怒，也象征着诗人们的创作灵感。"
 donar_god: "多纳尔"
 donar_god_desc: "多纳尔是威力强大的雷神，是人类与众神的守护者，庇护他们免受混沌之力的侵扰。祂手持磅礴神锤，保卫世界免受巨人与怪物的侵袭。这位神祇刚正不阿、勇猛无畏，对祂的崇拜能带来力量与庇护。"
 ziu_god: "吉乌"
 ziu_god_desc: "吉乌是掌管法律、正义与天空的神祇。作为一位古老而尊崇的神明，祂曾为束缚巨狼芬里尔而牺牲自己的手臂，彰显其对秩序与法治的坚定奉献。人们在誓言、缔约与正义裁决之事上常向祂祈求庇佑。"
 nerthus_god: "那瑟斯"
 nerthus_god_desc: "那瑟斯是一位古老的大地女神，司掌生育、和平与繁荣。祂属于华纳神族，其神圣的巡游会为祂所经之地带来和平与欢庆。崇拜祂可确保土地肥沃与丰收。"
 fro_god: "弗罗"
 fro_god_desc: "弗罗，又称弗雷尔，是华纳神族的神祇，执掌繁殖力、繁荣、阳光与好天气。祂是一位丰饶之神，为土地带来和平与富足。对祂的崇拜与丰收、婚礼及民众福祉密切相关。"
 frouwa_god: "弗洛瓦"
 frouwa_god_desc: "弗洛瓦，也就是弗雷娅，是瓦尼尔神族的女神，与爱情、美丽、生育、性、战争和死亡相关联。她是一位强大而复杂的人物，掌管着福尔克旺格之地，在那里她接收一半战死者的灵魂。人们寻求她的眷顾以求在爱情、生育和战争中得利。"
 woden_god: "沃登"
 woden_god_desc: "沃登是沃丹的盎格鲁-撒克逊对应神，是智慧、诗歌和战争之神。他是不懈追求知识者，是如尼文和魔法的大师。作为战神，他在战斗中激发狂喜之怒，并领导着阵亡者。"
 thunor_god: "索诺"
 thunor_god_desc: "索诺是雷神，一位强大而坦率的神祇，用他强大的锤子保护人类。他是秩序的捍卫者，保卫世界免受混乱和毁灭力量的侵袭。对他的崇拜确保了力量和社群的庇护。"
 tiw_god: "提乌"
 tiw_god_desc: "提乌是法律、正义和天空之神。他是一位无比荣誉和勇敢的神，为了束缚魔狼芬里尔而牺牲了自己的手。在誓言、条约和集会事务中，人们会祈求他，确保正义和秩序得以伸张。"
 freo_god: "弗雷奥"
 freo_god_desc: "弗雷奥是盎格鲁-撒克逊的爱情、美丽和丰饶女神，是一位光辉而仁慈的神祇。她掌管着心灵的事务，为世界带来欢乐与激情。对她的崇拜确保了美满的婚姻、健康的分娩以及爱情各种形式的蓬勃发展。"
 frea_god: "弗雷娅"
 frea_god_desc: "弗雷娅是盎格鲁-撒克逊神话中一位强大的女神，与爱情、生育和预言相关联。作为沃登的妻子，她是拥有巨大智慧和权威的人物，众神和凡人都会寻求她的建议。对她的崇拜确保了家庭的福祉和社群的繁荣。"
 gaut_god: "高特"
 gaut_god_desc: "高特是哥特人的神圣祖先，一位执掌战争与领导权的神祇。他拥有无上的力量与权威，其崇拜是哥特民族身份认同与军事成就的核心。他被尊奉为神圣的君王与部落的守护者。"
 fairguneis_god: "菲尔古尼斯"
 fairguneis_god_desc: "菲尔古尼斯是哥特人的雷神，一位强大而具有保护性的神祇。他是捍卫世界免受混沌力量侵袭的战神。对他的崇拜确保了哥特人民的力量、勇气和对敌人的抵御。"
 teiws_god: "泰乌斯"
 teiws_god_desc: "泰乌斯是哥特人的法律和正义之神。他是荣誉与誓言之神，对他的崇拜对于维持社会秩序至关重要。他是一位勇敢而无私的神，确保正义得到伸张，誓言得到遵守。"
 njorder_god: "尼奥尔德"
 njorder_god_desc: "尼奥德尔是华纳神族中的一位神祇，与海洋、风和财富相关。作为海岸之神，祂是水手和渔民的庇护者。人们祈求祂的庇佑，以期一帆风顺，鱼虾满舱。对尼奥德尔的崇拜能保障繁荣富足与海产的丰饶。"
 ingwaz_god: "英戈瓦兹"
 ingwaz_god_desc: "英戈瓦兹，亦被称为英格，是掌管丰饶、和平与繁荣之神。祂是一位仁慈的神祇，为大地带来喜悦与富足。对祂的崇拜与丰收、部落的福祉以及生命的欢庆密切相关。"
 fraujo_god: "弗劳约"
 fraujo_god_desc: "弗劳约是哥特人的爱情、美丽和生育女神，是一位强大而迷人的神祇。人们祈求她的眷顾以求在爱情、婚姻和分娩中得利。她是女性力量和自然赋予生命之力的象征。"
 ra_god: "拉"
 ra_god_desc: "拉是古老的太阳神，是埃及众神中最强大的神祇之一。作为世界的创造者，他每天驾着他的太阳船划过天空，为大地带来光明和生命。对他的崇拜是秩序的保证，也是对抗混沌力量的堡垒。"
 thoth_god: "托特"
 thoth_god_desc: "托特是智慧、写作、魔法和月亮之神。作为众神的书记官，他是知识的主宰和神圣争端的仲裁者。人们寻求他的智慧来引导国家、促进学习并确保正义得以伸张。"
 sekhmet_god: "塞赫麦特"
 sekhmet_god_desc: "塞赫美特是战争、毁灭和治愈的女神。她是凶猛的“拉之眼”，一位狮首女神，既能释放可怕的瘟疫和破坏，也能被安抚以带来奇迹般的治愈。对她的崇拜既是为了祈求免受她的愤怒，也是为了将她的怒火投向敌人。"
 hapi_god: "哈碧"
 hapi_god_desc: "哈皮是尼罗河每年泛滥之神。他代表了赋予生命的河流之丰饶，这河流沉积了农业所需的肥沃黑色淤泥。对他的崇拜确保了丰沛的洪水，从而保证了埃及自身的繁荣和生存。"
 osiris_god: "奥西里斯"
 osiris_god_desc: "奥西里斯是来世、冥界和重生之神。作为死者之主，他审判逝者的灵魂，并掌管着受祝福者的领域。对他的崇拜提供了永生和复活的承诺，他是生命、死亡和更新这一永恒循环的象征。"
 isis_god: "伊西斯"
 isis_god_desc: "伊西斯是埃及众神中最强大、最受爱戴的女神之一。她是母神，魔法守护神，以及忠贞妻母的象征。对她的崇拜与治愈、保护以及家庭和国家的滋养有关。"
 gebeleizis_god: "格贝莱齐斯"
 gebeleizis_god_desc: "格贝莱齐斯是达契亚人的风暴、雷电之神。作为强大的天空之神，他既令人恐惧又受人敬畏，他的雷电是其巨大力量的象征。他常被视为与扎尔莫克西斯平行，甚至是同一神祇的不同面貌，代表了神圣力量更具破坏性的一面。"
 zalmoxis_god: "扎尔莫克西斯"
 zalmoxis_god_desc: "扎尔莫克西斯是达契亚人的主神，是天空、亡者和永生奥秘之神。他是一位先知神，教导他的追随者灵魂是永恒的，死亡只是通往更好地方的旅程。对他的崇拜培养了独特的精神韧性和对凡人危险的漠视。"
 pleistoros_god: "普雷斯托洛斯"
 pleistoros_god_desc: "普雷斯托洛斯是色雷斯人的战神，人们向祂献祭马匹，乃至人类。祂是一位凶悍而苛刻的神祇，在战争中人们祈求祂的庇佑以确保胜利。对祂的崇拜反映了色雷斯军事贵族的尚武价值观。"
 sabazios_god: "萨巴兹乌斯"
 sabazios_god_desc: "萨巴兹乌斯是一位色雷斯和弗里吉亚的神祇，身为骑手与天父之神。祂与丰饶、治愈以及生死奥秘相关。对其的崇拜常包含狂喜仪式，并相信信徒将在来世获得蒙福的永生。"
 kotys_god: "科提斯"
 kotys_god_desc: "科提斯是一位色雷斯女神，与山脉、荒野和狂欢仪式相关联。对她的崇拜，即科提提亚节，是一个夜间举行的狂欢与放纵的节日。她是一位强大而未被驯服的神祇，代表了自然的原始力量。"
 dionysus_god: "狄俄倪索斯"
 dionysus_god_desc: "狄俄尼索斯，一位源于色雷斯的神，是酒、狂欢和狂喜之神。他代表了自然的令人陶醉的力量和从文明束缚中的解放。对他的崇拜是对生命的庆祝，但也是对其混乱和破坏潜力的认识。"
 an_dagda_god: "达格达"
 an_dagda_god_desc: "安·达格达是图阿萨·代·达南的酋长，是智慧、魔法和德鲁伊教之神。他是父亲般的人物，部落的保护者，所有艺术的大师。他的竖琴能控制季节和人的情绪，他的大锅是取之不尽的给养之源。"
 morrigan_god: "摩莉甘"
 morrigan_god_desc: "莫里根是战争、命运和死亡的女神。她是变形者，常以乌鸦的形象出现，在战场上空飞翔，决定战士的命运。她是一位凶猛而令人生畏的神祇，是厄运的先兆和亡者的选择者。"
 neit_god: "内特"
 neit_god_desc: "内特是一位古老的战神，体现了冲突中残酷和混乱本质的战斗之怒。他是一位强大而可怕的神祇，他在战场上的存在既激起恐惧，也激起战斗的狂热。对他的崇拜是为了祈求胜利和对敌人的彻底毁灭。"
 manannan_mac_lir_god: "玛纳诺·麦克·列"
 manannan_mac_lir_god_desc: "马纳南·麦克·利尔是海神，一位强大而神秘的人物，统治着波涛和彼世。他是魔法和幻象的大师，是受祝福之岛的守护者，也是水手和旅行者的守护神。他的斗篷能制造出隐藏和保护他人的迷雾。"
 aine_god: "昂雅"
 aine_god_desc: "安妮是夏天、财富和主权之女神。她是光辉而仁慈的神祇，与太阳和大地的丰饶相关联。对她的崇拜确保了丰收、王国的繁荣以及统治者的合法性。"
 brigit_god: "布里吉特"
 brigit_god_desc: "布里吉特是诗歌、治愈、锻造和生育的女神。她是受人爱戴且多才多艺的神祇，是艺术的守护神和灵感的源泉。她的圣火是创造力和更新的象征，她的水井是治愈和朝圣之地。"
 taranis_god: "塔兰"
 taranis_god_desc: "塔兰是雷神，其名意为“雷神”，是一位强大而令人生畏的神祇。他常被描绘成手持雷电和轮子，象征着风暴的力量和天空的转动。对他的崇拜是为了祈求免受自然破坏力的侵害。"
 lugus_god: "莱乌"
 lugus_god_desc: "莱乌是一位多才多艺的神，是所有艺术和工艺的大师。他是贸易和商业之神，旅行者的保护者，也是一位技艺高超的战士。对他的崇拜确保了繁荣、旅途成功和战斗胜利。"
 andraste_god: "安卓斯特"
 andraste_god_desc: "安德拉斯特是胜利女神，是在冲突时刻被祈求的女战神。她是一位拥有巨大力量和愤怒的人物，对她的崇拜与神圣树林和动物献祭有关。寻求她的眷顾是为了确保战胜敌人。"
 nodons_god: "诺登斯"
 nodons_god_desc: "诺登斯是治愈、海洋和狩猎之神。他是一位仁慈的神祇，他在莱德尼的圣所是那些寻求疾病治愈之人的朝圣地。他是水域的保护者和狩猎大师。"
 sucellos_god: "苏塞洛斯"
 sucellos_god_desc: "苏塞卢斯是“善击者”，是农业、森林和酒精饮料之神。他常被描绘成手持大锤或木槌和锅，象征着他既能创造又能毁灭的力量。他是收获的保护者和繁荣的带来者。"
 brigantia_god: "布里甘提亚"
 brigantia_god_desc: "布里甘蒂亚是不列颠北部布里甘特部落的女神。她是胜利、智慧、生育和土地本身的强大女神。作为守护女神，她是她人民的保护者和他们主权的象征。"
 teutatis_god: "图塔蒂斯"
 teutatis_god_desc: "图塔蒂斯是“部落之神”，是一位强大的神祇，作为人民的保护者。他是战争、财富和生育之神，对他的崇拜对于部落的认同和福祉至关重要。有时会向他献祭人牲以确保他在战斗中的眷顾。"
 lugh_god: "鲁格"
 lugh_god_desc: "卢格是一位年轻英俊的神，是所有艺术和技能的大师。他是太阳神，技艺高超的战士，也是工匠的守护神。他的节日卢格纳萨是庆祝收获和大地丰饶的节日。"
 cicolluis_god: "西科卢伊斯"
 cicolluis_god_desc: "奇科卢伊斯是战神，是部落及其战士的保护者。他是一位强壮而肌肉发达的神祇，常被描绘成手持棍棒或锤子。对他的崇拜确保了战斗的胜利和家园的防卫。"
 epona_god: "艾波娜"
 epona_god_desc: "埃波娜是马女神，是一位受人爱戴且被广泛崇拜的神祇。她是骑兵的保护者，亡者灵魂的向导，也是生育女神。对她的崇拜证明了马在凯尔特社会中的重要性。"
 arausio_god: "阿劳西奥"
 arausio_god_desc: "阿劳西奥是奥朗日镇的地方神。他是水和泉水之神，对他的崇拜与该镇的一处圣泉有关。他是社群的保护者和繁荣的源泉。"
 rosmerta_god: "罗斯默塔"
 rosmerta_god_desc: "罗斯默塔是丰饶与富足女神。她常被描绘成手持丰饶角，象征着她带来财富和繁荣的力量。她是一位仁慈的女神，对她的崇拜确保了丰收和人民的福祉。"
 reo_god: "雷奥"
 reo_god_desc: "雷奥是伊比利亚凯尔特人的天空和雷神，一位强大而古老的神祇。他是战神，他的雷电使敌人心惊胆寒。对他的崇拜是为了祈求战斗的力量和部落的保护。"
 lugei_god: "卢盖"
 lugei_god_desc: "卢盖是太阳与光明之神，一位年轻而光辉的神祇。他是所有艺术和技能的大师，工匠的守护神，也是一位技艺高超的战士。对他的崇拜确保了繁荣、事业成功和文化的繁荣。"
 teleno_god: "特莱诺"
 teleno_god_desc: "特莱诺是战争与山脉之神，是阿斯图雷斯人凶猛而强大的保护者。他是荒野之神，其力量如同山脉本身。对他的崇拜是为了祈求战斗的胜利和家园的防卫。"
 belenus_god: "贝莱努斯"
 belenus_god_desc: "贝莱努斯是太阳与治愈之神，一位仁慈且被广泛崇拜的神祇。他是光明之神，人们点燃他的圣火来庆祝夏日的到来。对他的崇拜是为了祈求健康、丰收和社群的庇护。"
 durius_god: "杜里乌斯"
 durius_god_desc: "杜里乌斯是杜罗河的化身，一位强大而赋予生命的神祇。他是水、丰饶和富足之神，对他的崇拜对他流经土地的繁荣至关重要。他是渔民的保护者，也是大地肥沃的源泉。"
 nabia_god: "娜比亚"
 nabia_god_desc: "纳比亚是河川与水泽女神，一位滋养而仁慈的神祇。她是丰饶和富足的女神，对她的崇拜与圣泉和水井有关。她是社群的保护者和福祉的源泉。"
 baal_god: "巴力"
 baal_god_desc: "巴力是一个意为“主”或“主人”的头衔，常被用于称呼迦南众神中的主神。他是风暴之神，带来雨水和丰饶，也是击败混沌力量的强大战士。对他的崇拜对农业周期和土地的繁荣至关重要。"
 melqart_god: "麦勒卡特"
 melqart_god_desc: "麦勒卡特是提尔城的守护神，也是腓尼基和布匿世界的主要神祇。他是王权、冥界和生命-死亡-重生循环之神。作为殖民和贸易的守护神，对他的崇拜遍布整个地中海。"
 tanit_god: "塔尼特"
 tanit_god_desc: "塔尼特是迦太基的主女神，是月亮、生育和战争的强大女神。她常与巴力·哈蒙联系在一起，是城市及其人民的保护者。她的象征在布匿艺术中无处不在，对她的崇拜是迦太基宗教生活的核心。"
 eshmun_god: "埃什蒙"
 eshmun_god_desc: "埃什蒙是治愈之神，也是西顿的守护神。他是一位年轻的神祇，与生命的更新和疾病的治愈相关联。他的神庙是病人朝圣之地，对他的崇拜为康复和健康带来希望。"
 yam_god: "亚姆"
 yam_god_desc: "雅姆是海洋与河川之神，是迦南众神中一股混乱而强大的力量。他代表了未被驯服的水域，常与巴力发生冲突。对他的崇拜是对海洋力量的认识，也是祈求免受其愤怒伤害的诉求。"
 astarte_god: "埃施塔特"
 astarte_god_desc: "阿斯塔蒂是战争、性和王权的女神。她是一位凶猛而迷人的神祇，常被描绘成骑马的战士或裸体女性。对她的崇拜与国王的保护以及土地和人民的丰饶有关。"
 hammon_god: "哈蒙"
 hammon_god_desc: "哈蒙是天空和植被之神。他是强大而古老的神祇，常与公羊和太阳相关联。对他的崇拜是迦太基国家的核心，人们常祈求他的保护和繁荣。"
 el_god: "埃尔"
 el_god_desc: "埃尔是迦南众神的至高创造神，众神和人类之父。他是智慧和仁慈的神祇，常被描绘成一位长着长胡须的老人。对他的崇拜与智慧、正义和神圣秩序有关。"
 dagon_god: "达贡"
 dagon_god_desc: "达贡是谷物与农业之神，是生计与繁荣的赐予者。作为一位古老的神祇，他在整个古代近东地区受到崇拜。对他的敬奉能确保丰收与人民的安康。"
 asherah_god: "亚舍拉"
 asherah_god_desc: "阿舍拉是母神，埃尔的配偶，也是生育和生命的象征。她常与神圣树木和树林相关联。对她的崇拜是为了祈求生育、富足和家庭的庇护。"
 shahar_god: "沙哈尔"
 shahar_god_desc: "沙哈尔是黎明之神，是黄昏之神沙利姆的孪生兄弟。他是光明和新开端之神。对他的崇拜与旭日东升和新一天的希望有关。"
 anat_god: "阿娜特"
 anat_god_desc: "阿娜特是凶猛的战争与狩猎女神，是巴力的姐妹和情人。她是一位强大的女战士，热衷于战斗和杀戮。对她的崇拜是为了祈求胜利和敌人的毁灭。"
 dievas_god: "迪耶瓦斯"
 dievas_god_desc: "迪耶瓦斯是天空、和平与友谊的至高神。他是一位仁慈而遥远的神祇，常被描绘成一位智慧的老人。对他的崇拜与维持宇宙秩序和社群的福祉有关。"
 kaukas_god: "考卡斯"
 kaukas_god_desc: "考卡斯是繁荣和财富的灵体，常与收获和家庭相关联。他是一位仁慈的形象，为尊崇他的人带来好运。对他的崇拜是为了祈求富足和成功。"
 perukunas_god: "佩尔库纳斯"
 perukunas_god_desc: "佩尔库纳斯是强大的雷、雨和正义之神。他是保护世界免受恶灵侵害并确保土地肥沃的战神。对他的崇拜是波罗的海众神信仰的核心，人们常祈求他的保护和力量。"
 bangputys_god: "邦格普蒂斯"
 bangputys_god_desc: "邦格普蒂斯是海洋和风暴之神。他是凶猛而不可预测的神祇，令水手和渔民畏惧。对他的崇拜是为了祈求平安航行和风平浪静。"
 rugutis_god: "鲁古蒂斯"
 rugutis_god_desc: "鲁古蒂斯是发酵和发酵饮料之神。他与收获以及蜂蜜酒和啤酒的酿造有关。对他的崇拜是对大地富足和社群欢乐的庆祝。"
 zemyna_god: "热米娜"
 zemyna_god_desc: "热米娜是大地和丰饶女神。她是滋养的母亲形象，负责作物的生长和所有生灵的福祉。对她的崇拜对于丰收和土地的繁荣至关重要。"
 dievs_god: "迪夫斯"
 dievs_god_desc: "迪夫斯是天空、和平与秩序的至高神。他是仁慈的父亲形象，创造了世界并注视着它。对他的崇拜与维持宇宙和谐及社群的福祉有关。"
 perkons_god: "佩尔孔斯"
 perkons_god_desc: "佩尔孔斯是强大的雷、雨和正义之神。他是保护世界免受恶灵侵害并确保土地肥沃的战神。对他的崇拜是拉脱维亚众神信仰的核心，人们常祈求他的保护和力量。"
 mara_god: "玛拉"
 mara_god_desc: "玛拉是大地、生育和物质世界的女神。她是母神，掌管着生命、死亡和重生的循环。对她的崇拜对土地的肥沃和牲畜的福祉至关重要。"
 udens_mate_god: "乌登斯·马特"
 udens_mate_god_desc: "乌登斯·马特，即“水域之母”，是水、河流和海洋的女神。她是保护神，确保水的纯净和在其上航行者的安全。对她的崇拜是为了祈求平安航行和鱼类丰产。"
 jumis_god: "尤米斯"
 jumis_god_desc: "尤米斯是收获和生育之神，常以两株谷物并生为象征。他是仁慈的神祇，为田野带来富足和繁荣。对他的崇拜是对收获和大地丰饶的庆祝。"
 ceroklis_god: "采罗克利斯"
 ceroklis_god_desc: "采罗克利斯是生育和田野之神，与作物的生长和丰收的富足有关。他是确保农民的辛勤劳作得到丰硕回报的神祇。对他的崇拜是为了祈求丰收和社群的繁荣。"
 deiws_god: "戴乌斯"
 deiws_god_desc: "戴乌斯是普鲁士神话中的天空与光明至高神。他是一位仁慈而遥远的神祇，注视着世界并确保宇宙秩序。对他的崇拜与和平、正义以及社群的福祉有关。"
 perkuns_god: "佩尔库恩斯"
 perkuns_god_desc: "佩尔库恩斯是强大的雷、雨和正义之神。他是保护世界免受恶灵侵害并确保土地肥沃的战神。对他的崇拜是普鲁士众神信仰的核心，人们常祈求他的保护和力量。"
 pilwits_god: "皮尔维茨"
 pilwits_god_desc: "皮尔维茨是财富和富足之神。他与收获和家庭的繁荣有关。对他的崇拜是为了祈求好运和物质福祉。"
 autrimps_god: "奥特林普斯"
 autrimps_god_desc: "奥特林普斯是海洋和大型水域之神。他是强大的神祇，指挥着海浪和深海生物。对他的崇拜对于寻求他保护和眷顾的水手和渔民至关重要。"
 potrimpo_god: "波特林波"
 potrimpo_god_desc: "波特林波是河流、泉水和谷物之神。他是年轻而仁慈的神祇，与生育和赋予生命之水相关。对他的崇拜是对收获和自然更新的庆祝。"
 patrimps_god: "帕特林普斯"
 patrimps_god_desc: "帕特林普斯是生育和战争胜利之神。他常与春天和生命的更新相关联。对他的崇拜是为了祈求战斗胜利和部落的繁荣。"
 tinia_god: "提尼亚"
 tinia_god_desc: "提尼亚是伊特鲁里亚众神中的天空至高神和最高权威。他是天堂的统治者，以雷电作为其力量的象征。对他的崇拜是伊特鲁里亚宗教的核心，在国家和司法事务中会祈求他。"
 turms_god: "图尔姆斯"
 turms_god_desc: "图尔姆斯是众神的使者，也是引领灵魂前往冥界的向导。他与商业、贸易和旅行有关。对他的崇拜是为了祈求旅途平安和商业成功。"
 maris_god: "马里斯"
 maris_god_desc: "马里斯是农业、生育和战争之神。他是一位复杂的神祇，常被描绘成青年或婴儿，象征着生命的更新。对他的崇拜与保护田野和军事行动的成功有关。"
 nepthuns_god: "内图恩斯"
 nepthuns_god_desc: "内图恩斯是海洋和水域之神。他是强大的神祇，指挥着海浪和深海生物。对他的崇拜对于水手和依赖海洋为生的人来说至关重要。"
 horta_god: "霍尔塔"
 horta_god_desc: "霍尔塔是农业和花园女神。她是仁慈的神祇，确保土壤的肥沃和丰收的富足。对她的崇拜是对大地果实和自然之美的庆祝。"
 nortia_god: "诺尔提亚"
 nortia_god_desc: "诺尔提亚是命运、天意和时间女神。她常与新年和时间的标记相关联。对她的崇拜是为了祈求有利的命运和社群的庇护。"
 deipaturos_god: "代帕特罗斯"
 deipaturos_god_desc: "代帕特罗斯是“天父”，伊利里亚众神中的至高神。他是天堂的统治者和众神之父，体现了天空的力量和权威。对他的崇拜是伊利里亚宗教的核心，人们祈求他的保护和指引。"
 tadenus_god: "塔德努斯"
 tadenus_god_desc: "塔德努斯是与阿波罗相关的神，常与治愈和太阳联系在一起。他是仁慈的神祇，为他的崇拜者带来光明和健康。他的神庙是寻求疾病治愈之人的朝圣地。"
 medaurus_god: "梅道鲁斯"
 medaurus_god_desc: "梅道鲁斯是里西尼乌姆城的守护神，被描绘成骑在马背上持矛的战士。他是凶猛而尚武的神祇，对他的崇拜确保了城市的安全和战斗的胜利。"
 bindus_god: "宾杜斯"
 bindus_god_desc: "宾杜斯是水和泉水之神，常与涅普顿等同。他是河流和海洋的守护者，确保它们的纯净和鱼类丰产。对他的崇拜对于依赖水域的社群的福祉至关重要。"
 vidasus_god: "维达苏斯"
 vidasus_god_desc: "维达苏斯是森林和自然之神，常与西尔瓦努斯相关联。他是荒野之地及其生物的守护者。对他的崇拜是对自然世界未被驯服之美的庆祝。"
 anzotica_god: "安佐蒂卡"
 anzotica_god_desc: "安佐蒂卡是伊利里亚的爱情和美丽女神，常与维纳斯等同。她是光辉而迷人的神祇，人们祈求她的眷顾以求在爱情和生育中得利。她代表了欲望赋予生命的力量。"
 allah_god: "安拉"
 allah_god_desc: "安拉是前伊斯兰阿拉伯众神中的至高创造神。他被认为是其他神祇之父和宇宙中的终极权威。对他的崇拜与麦加的克尔白有关，他被尊为最高的力量。"
 hubal_god: "胡巴勒"
 hubal_god_desc: "胡巴勒是麦加受人崇拜的重要神祇，尤其是在克尔白。他是占卜和月亮之神，常被描绘成拥有金色手的拟人形象。对他的崇拜涉及使用箭头进行占卜以寻求指引和答案。"
 du_i_khalasa_god: "祖·哈拉萨"
 du_i_khalasa_god_desc: "祖·哈拉萨是战争和神谕之神，在阿拉伯半岛南部受到崇拜。他的神庙被称为“也门的克尔白”，是麦加克尔白的竞争对手。他是一位凶猛的神祇，人们祈求他取得战斗胜利和保护。"
 suwa_god: "苏瓦"
 suwa_god_desc: "苏瓦是《古兰经》中提到的神祇，是诺亚的子民崇拜的偶像之一。在前伊斯兰阿拉伯，他与时间的流逝和生命的长度有关。对他的崇拜是为了祈求长寿和繁荣的生活。"
 yaghut_god: "亚古斯"
 yaghut_god_desc: "亚古斯是一位名字意为“他帮助”的神。他是保护神，常在困苦时和战斗中祈求力量和援助。对他的崇拜是为了祈求神圣的帮助和克服障碍。"
 al_lat_god: "拉特"
 al_lat_god_desc: "拉特是麦加三大主女神之一，与乌扎和玛纳特并列。她是与大地、生育和繁荣相关的母神。对她的崇拜很广泛，她被视为主宰并滋养生命的养育者形象。"
 ashur_god: "阿舒尔"
 ashur_god_desc: "阿舒尔是亚述的民族神，也是阿舒尔城的守护神。他是战争和君权之神，代表了亚述国家的神圣权威。对他的崇拜对于亚述人民的认同和军事成功至关重要。"
 nabu_god: "纳布"
 nabu_god_desc: "纳布是智慧、文学和书吏之神。他是马尔杜克之子，命运泥板的保管者。对他的崇拜与追求知识以及维护神圣和人类法律有关。"
 nergal_god: "内尔伽勒"
 nergal_god_desc: "内尔伽勒是冥界、战争和瘟疫之神。他是凶猛而具破坏性的神祇，常与太阳的炙热和疾病的破坏力联系在一起。对他的崇拜是为了祈求免受他的愤怒。"
 enirigal_god: "埃尼里伽尔"
 enirigal_god_desc: "埃尼里伽尔是与冥界和亡者相关的苏美尔神祇。他是阴影领域的守护者，确保逝者的灵魂找到安息之所。对他的崇拜是对不可避免的生命与死亡循环的认识。"
 erra_god: "埃拉"
 erra_god_desc: "埃拉是巴比伦的混乱和瘟疫之神。他是一股混沌的力量，能够向世界释放毁灭。对他的崇拜是为了祈求怜悯和避免灾难。"
 ea_god: "埃阿"
 ea_god_desc: "埃阿，即恩基，是水、智慧和魔法之神。他是仁慈的神祇，创造了人类，并教导他们文明技艺。对他的崇拜与赋予生命之淡水以及追求知识有关。"
 enki_god: "恩基"
 enki_god_desc: "恩基是苏美尔的水、知识、恶作剧、工艺和创造之神。他是一位经常帮助人类对抗其他神祇突发奇想的恶作剧之神。对他的崇拜是对创造力和智慧运用的庆祝。"
 nuddimud_god: "努迪穆德"
 nuddimud_god_desc: "努迪穆德是埃阿/恩基的别称，强调他作为世界创造者和塑造者的角色。他是从混沌中带来秩序的“塑造者”。对他的崇拜是对所有生物中神圣火花的认识。"
 ninurta_god: "尼努尔塔"
 ninurta_god_desc: "尼努尔塔是战争、狩猎和农业之神。他是众神的冠军，击败了怪物鸟安祖。对他的崇拜确保了战斗的胜利和田野的肥沃。"
 ningirsu_god: "宁吉尔苏"
 ningirsu_god_desc: "宁吉尔苏是吉尔苏城的守护神，与战争和农业有关。他是保护其城市和人民的强大战士。对他的崇拜是为了祈求力量和繁荣。"
 ishtar_god: "伊什塔尔"
 ishtar_god_desc: "伊什塔尔是爱情、美丽、性、欲望、生育、战争、正义和政治权力的女神。她是复杂而强大的神祇，以其热情且有时反复无常的天性而闻名。对她的崇拜是对驱动人类存在的强烈情感的庆祝。"
 inana_god: "伊南娜"
 inana_god_desc: "伊南娜是古代苏美尔的爱情、美丽、性、欲望、生育、战争、正义和政治权力女神。她是“天后”，拥有巨大力量和影响力的神祇。对她的崇拜是苏美尔宗教的核心。"
 an_god: "安"
 an_god_desc: "安是苏美尔神话中的天空至高神和众神之父。他是遥远而威严的形象，是一切神圣权威的源头。对他的崇拜是对宇宙秩序和宇宙等级制度的认识。"
 nisaba_god: "尼萨巴"
 nisaba_god_desc: "尼萨巴是写作、学问和收获的女神。她是书吏的守护神和记录的保管者。对她的崇拜与谷物的计量和知识的保存有关。"
 marduk_god: "马尔杜克"
 marduk_god_desc: "马尔杜克是巴比伦的守护神和众神之王。他击败了混沌怪物提亚马特，并用她的身体创造了世界。对他的崇拜是巴比伦国家的核心，他被尊为宇宙的至高统治者。"
 rod_god: "罗德"
 rod_god_desc: "罗德是斯拉夫神话中的原始创造神，与家族、命运和宇宙的诞生有关。他是所有生命的源头和家族谱系的保护者。对他的崇拜是对祖先和世代延续的庆祝。"
 perun_god: "佩伦"
 perun_god_desc: "佩伦是强大的雷、电和战争之神。他是斯拉夫众神的至高神祇，一位挥舞斧头或锤子击倒敌人和混沌力量的战士。对他的崇拜确保了战斗的力量和社群的庇护。"
 dazbog_god: "达日博格"
 dazbog_god_desc: "达日博格是给予之神，是与太阳、财富和繁荣相关的太阳神。他是仁慈的形象，为世界带来光明和温暖，确保作物生长和人民福祉。对他的崇拜是为了祈求富足和好运。"
 ziva_god: "日娃"
 ziva_god_desc: "日娃是生命、生育和爱情女神。她是滋养的神祇，掌管着自然和人类精神的活力。对她的崇拜是对流淌于所有生物中的生命力的庆祝。"
 svetovit_god: "斯维亚托维特"
 svetovit_god_desc: "斯维亚托维特是四头神，是战争、生育和富足之神，主要受波拉比亚斯拉夫人崇拜。他是无所不知的神，知晓过去、现在和未来。对他的崇拜涉及复杂的仪式和占卜，以确保胜利和繁荣。"
 yarovit_god: "亚罗维特"
 yarovit_god_desc: "亚罗维特是战争和生育之神，与春天和生命的更新有关。他是保护人民的凶猛战士，也是带来成长和富足者。对他的崇拜是为了祈求战斗的力量和丰收。"
 morana_god: "莫拉纳"
 morana_god_desc: "莫拉纳是冬季、死亡和噩梦的女神。她代表了自然中寒冷和黑暗的方面，即生命周期的终结。对她的崇拜常与驱赶冬季、迎接春天到来的仪式有关。"
 stribog_god: "斯特里博格"
 stribog_god_desc: "斯特里博格是风、风暴和空气之神。他常被描绘成控制天气的老人。对他的崇拜是为了祈求有利的风向和保护免受破坏性风暴的侵害。"
 yarilo_god: "亚里洛"
 yarilo_god_desc: "亚里洛是植被、生育和春天之神。他是年轻而充满活力的神祇，在冬季之后使大地复苏。对他的崇拜是对自然更新和青春热情的庆祝。"
 sud_god: "苏德"
 sud_god_desc: "苏德是司掌命运与审判的神明。他决定个人的命运，并确保正义得以伸张。对他的崇拜，是为了祈求拥有好命，并在来世获得公正的审判。"