l_simp_chinese:
 elven_marriage: "精灵婚姻"
 elven_marriage_desc: "很久以前，为了在面临灭绝的时期更好地联合各大精灵家族，古老的精灵们采用了让一位国王与多位王后结为连理的做法。"
 consanguinity_law: "亲缘法"
 consanguinity_law_desc: "这些法律定义了哪些亲属关系可以结婚。"
 doctrine_consanguinity_dynastic: "@1_consanguinity_law!直系禁止"
 doctrine_consanguinity_dynastic_desc: "禁止直系血脉结婚，无论血缘关系多么遥远。即使是不同姓氏但血缘关系密切的人之间的联姻也被认为是不恰当的。"
 doctrine_consanguinity_restricted: "@2_consanguinity_law!近亲禁忌"
 doctrine_consanguinity_restricted_desc: "允许近亲通婚或发生亲密关系被视为严重违反神律的行为。"
 doctrine_parameter_consanguinity_restricted_marriage: "禁止任何[extended_family_members|E]与[close_family_members|E]之间通婚。"
 doctrine_consanguinity_cousins: "@3_consanguinity_law!表亲婚姻"
 doctrine_consanguinity_cousins_desc: "尽管血缘相连，但表亲关系被认为足够疏远，因此他们之间的联姻是可接受的，尤其是在有助于维系家族传承的情况下。"
 doctrine_parameter_consanguinity_cousins_marriage: "允许同辈堂表亲间的婚姻"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece: "@4_consanguinity_law!交辈旁系亲属婚姻"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece_desc: "若非直系血亲，亲属间的联姻包括某些近亲，若有利于家族延续，亦可被允许。"
 doctrine_parameter_consanguinity_aunt_nephew_and_uncle_niece_marriage: "允许同辈和交辈旁系亲属（同辈堂表亲、姑姨/侄甥和叔舅/侄甥女）间的婚姻"
 doctrine_consanguinity_unrestricted: "@5_consanguinity_law!无限制婚姻"
 doctrine_consanguinity_unrestricted_desc: "家庭成员彼此相爱是自然而健康的，那些说爱情应限于非性关系的人都是傻瓜。"
 marry_dynasty_members: "安排宗族联姻"
 marry_dynasty_members_concept: "宗族联姻"
 marry_dynasty_members_desc_specific: "[recipient.GetName]将与[recipient.GetHerHis][dynasty|e]的一名成员[marry|e]"
 marry_dynasty_members_desc: "与宗族成员联姻。"
 marry_dynasty_members_past: "与宗族成员联姻"
 marry_dynasty_members_act: "与宗族成员联姻"
 marry_dynasty_members_act_past: "与宗族成员联姻"
 elven_law_policy: "精灵教义"
 elven_law_policy_desc: "精灵的法律古老而悠久。"
 MODIFIER_TYPE_NAME_dynastic_marriage_disabled: "[ShowCharacterInteractionName('marry_dynasty_members')][character_interaction|e]已禁用"
 MODIFIER_TYPE_DESC_dynastic_marriage_disabled: "角色不能使用[ShowCharacterInteractionName('marry_dynasty_members')][character_interaction|e]与其他同家族成员缔结婚姻。"
 MODIFIER_TYPE_NAME_dynastic_marriage_enabled: "[ShowCharacterInteractionName('marry_dynasty_members')][character_interaction|e]已启用"
 MODIFIER_TYPE_DESC_dynastic_marriage_enabled: "角色可以使用[ShowCharacterInteractionName('marry_dynasty_members')][character_interaction|e]与其他同家族成员缔结婚姻。"
 MODIFIER_TYPE_NAME_close_or_extended_family_marriage_banned: "近亲或远亲之间的婚姻是被禁止的"
 MODIFIER_TYPE_DESC_close_or_extended_family_marriage_banned: "角色不得与近亲或远亲家族成员结婚。这包括堂表兄弟姐妹、姑姨叔伯与侄甥子女，以及其他类似亲属关系。"
 MODIFIER_TYPE_NAME_cousin_marriage_allowed: "允许同辈堂表亲间的婚姻"
 MODIFIER_TYPE_DESC_cousin_marriage_allowed: "角色可以与同辈堂表亲结婚，但禁止与更近的亲属结合，例如叔伯/姑姨与侄女/侄子之间的婚姻"
 MODIFIER_TYPE_NAME_uncle_aunt_niece_nephew_marriage_allowed: "允许同辈和交辈旁系亲属（同辈堂表亲、姑姨/侄甥和叔舅/侄甥女）间的婚姻"
 MODIFIER_TYPE_DESC_uncle_aunt_niece_nephew_marriage_allowed: "角色可以与同辈和交辈旁系亲属（同辈堂表亲、姑姨/侄甥和叔舅/侄甥女）结婚"
 MODIFIER_TYPE_NAME_no_family_marriage_restrictions: "婚姻没有亲属关系限制"
 MODIFIER_TYPE_DESC_no_family_marriage_restrictions: "角色之间可以无视亲属关系，与任何其他角色结婚"