l_simp_chinese:
 armagnacs_and_burgundians.1.title: "[ShowRegionNameWithNoTooltip('france_region')]的灾难"
 armagnacs_and_burgundians.1.desc: "The feud between the Dukes of [GetCountry('BUR').GetName] and [GetCountry('ORL').GetName] that has plagued the French court for the past years has now blown in to Civil War. After the assassination of the Duke of [GetCountry('ORL').GetName] on the orders of [GetCountry('BUR').GetGovernment.GetRuler.GetName], the father-in-law of the deceased, [GetCountry('AMG').GetGovernment.GetRuler.GetName] seeks revenge and leads the [GetUniqueInternationalOrganization('armagnacs_io').GetNameWithNoTooltip] Faction. The wounds widen and [GetCountry('FRA').GetName] is thrown in to chaos."
 armagnacs_and_burgundians.1.a: "这真是场灾难"
 armagnacs_and_burgundians.1.tt: "In this situation, it is possible for [GetCountry('FRA').GetAdjective] [subjects|e] align with the [GetCountry('AMG').GetName] or [GetCountry('BUR').GetName] faction, in their struggle for dominance over the French Court."
 armagnacs_and_burgundians.2.title: "[GetUniqueInternationalOrganization('armagnacs_io').GetNameWithNoTooltip]与[GetUniqueInternationalOrganization('burgundians_io').GetNameWithNoTooltip]内战"
 armagnacs_and_burgundians.2.desc: "Now there is open conflict between the [GetUniqueInternationalOrganization('armagnacs_io').GetName] and the [GetUniqueInternationalOrganization('burgundians_io').GetName], it is not unheard of that particularly opportunistic individuals switch from one side to the other and attempt to convince neighbouring vassals, either by force or diplomatic cunning, to stand up for the rightful side... or maybe just the side with more to gain?"
 armagnacs_and_burgundians.2.a: "Let them ruin themselves."
 armagnacs_and_burgundians.2.a.tt: "Choosing this option will keep us neutral in the conflict."
 armagnacs_and_burgundians.2.b: "Side with the [GetUniqueInternationalOrganization('armagnacs_io').GetName]."
 armagnacs_and_burgundians.2.b.tt: "选择此选项将使我国与[GetUniqueInternationalOrganization('armagnacs_io').GetNameWithNoTooltip]结盟。"
 armagnacs_and_burgundians.2.c: "For the [GetUniqueInternationalOrganization('burgundians_io').GetName]."
 armagnacs_and_burgundians.2.c.tt: "Choosing this option will align ourselves with the [GetUniqueInternationalOrganization('burgundians_io').GetNameWithNoTooltip]"
 armagnacs_and_burgundians.3.title: "A House Divided"
 armagnacs_and_burgundians.3.desc: "[GetCountry('BUR').GetGovernment.GetRuler.GetName]'s brazen play for furthering his ambitions in the French court has rallied a coalitions under the [GetUniqueInternationalOrganization('armagnacs_io').GetName]. Valois feuds against Valois. Central authority is lost, and our vassal lords retreat to their holdings, to weather out the coming storm. This is a disaster, for the English are always ready to exploit weakness."
 armagnacs_and_burgundians.3.a: "Catastrophe!."
 armagnacs_and_burgundians.3.a.tt: "We can no longer rely on our vassals to aid us in our conflicts."
 armagnacs_and_burgundians.4.title: "Opportunity in [ShowRegionNameWithNoTooltip('france_region')]"
 armagnacs_and_burgundians.4.desc: "As expected, there is now open conflict between the [GetUniqueInternationalOrganization('armagnacs_io').GetName] and the [GetUniqueInternationalOrganization('burgundians_io').GetName]. No doubt this will present opportunities in a weakened [ShowRegionNameWithNoTooltip('france_region')]."
 armagnacs_and_burgundians.4.a: "We shall watch events closely."
 armagnacs_and_burgundians.5.title: "Hostilities Commence"
 armagnacs_and_burgundians.5.desc: "The [GetUniqueInternationalOrganization('armagnacs_io').GetName] have gathered their Council of War, shored up support across [ShowRegionNameWithNoTooltip('france_region')] and now strike to remove the [GetCountry('BUR').GetAdjective] cancer once and for all. Every man and woman in the country prays for a swift end to this Civil War, so they can return to the business against [GetCountry('ENG').GetName]"
 armagnacs_and_burgundians.5.a: "France is ablaze"
 armagnacs_and_burgundians.6.title: "Siphon Cash from the [GetCountry('FRA').GetAdjective] Treasury"
 armagnacs_and_burgundians.6.desc: "To fund our war efforts in this conflict, we can leverage our power in the [GetCountry('FRA').GetAdjective] Court and siphon money from the Royal Treasury."
 armagnacs_and_burgundians.6.a: "The end justifies the means"
 armagnacs_and_burgundians.7.title: "Replace Royal Advisors in the [GetCountry('FRA').GetAdjective] Court"
 armagnacs_and_burgundians.7.desc: "The Court is also a battlefield, and we must counter our opponents in any way possible. Purge those who are unstrustworthy, and ensure we have the ear of the [GetCountry('FRA').GetGovernment.GetRulerTitle]"
 armagnacs_and_burgundians.7.a: "Start arresting those who oppose us"
 armagnacs_and_burgundians.8.title: "The Conflict Resumes"
 armagnacs_and_burgundians.8.desc: "The parchment of the last treaty is not yet yellowed, but the ink has already faded in the hearts of the opposing Factions. Despite the solemn oaths sworn before God, the uneasy peace has proven to be nothing more than a desperate breathing space.\n\nAncient grievances have been polished like rusted armor. The partisans of the White Scarf and the Cross of St. Andrew have once again taken to the fields, and the cry of 'Montjoie Saint-Denis' is met only by the defiant roar of 'Burgundy!' The brief silence of the cannons is over; the next act of this tragedy begins now."
 armagnacs_and_burgundians.8.a: "Death to [GetCountry('BUR').GetGovernment.GetRuler.GetName]"
 armagnacs_and_burgundians.9.title: "The Road to Reims"
 armagnacs_and_burgundians.9.desc: "The impossible has been achieved. Led by the Maid of Orléans, our weary columns have pierced the Burgundian heartland to reach the sacred city of Reims. For years, the 'King of Bourges' was mocked by the English pretender, but today, the mockery ends.\n\nIn the nave of the great Cathedral, amidst the scent of incense and the glow of a thousand candles, the Archbishop has uncorked the Holy Ampulla. As the sacred oil touches the Dauphin's brow, the transition is instantaneous. He is no longer a disinherited exile; he is [GetCountry('FRA').GetGovernment.GetHeir.GetName], the Anointed of God, and the only true King of France. The bells of Reims ring out not just for a coronation, but for the funeral of the Burgundian cause. The pulse of the realm has returned."
 armagnacs_and_burgundians.9.a: "This will spell trouble for [GetCountry('BUR').GetName]"
 armagnacs_and_burgundians.10.title: "The Dauphin is Anointed"
 armagnacs_and_burgundians.10.desc: "The impossible has been achieved. Led by the Maid of Orléans, the weary [GetCountry('AMG').GetName] columns have pierced the Burgundian heartland to reach the sacred city of Reims. For years, the 'King of Bourges' was mocked by the English pretender, but today, the mockery ends.\n\nIn the nave of the great Cathedral, amidst the scent of incense and the glow of a thousand candles, the Archbishop has uncorked the Holy Ampulla. As the sacred oil touches the Dauphin's brow, the transition is instantaneous. He is no longer a disinherited exile; he is [GetCountry('FRA').GetGovernment.GetHeir.GetName], the Anointed of God, and the only true King of France. The bells of Reims ring out not just for a coronation, but for the funeral of the [GetUniqueInternationalOrganization('burgundians_io').GetName] cause. The pulse of the realm has returned."
 armagnacs_and_burgundians.10.a: "This will spell trouble for [GetCountry('BUR').GetName]"
 armagnacs_and_burgundians.8.b: "Disperse the [GetUniqueInternationalOrganization('armagnacs_io').GetName] from the field"
 armagnacs_and_burgundians.11.title: "The Die is Cast"
 armagnacs_and_burgundians.11.desc: "For too long, we have tried to save [GetCountry('FRA').GetName] from herself. We have humoured the 'King of Bourges' and his band of [GetCountry('AMG').GetName] butchers, watching as they lead the realm into a gutter of poverty and madness. If the Valois line has withered into insanity and incompetence, then it is our duty to find a sturdier branch to graft onto the lilies.\n\n[GetCountry('ENG').GetGovernment.GetRuler.GetName] offers what the Dauphin cannot: stability, a professional army, and a respect for our Burgundian autonomy. By recognising the House of [GetCountry('ENG').GetGovernment.GetRuler.GetDynasty.GetName], we are not betraying [GetCountry('FRA').GetName]; we are redefining her. Let the [GetUniqueInternationalOrganization('armagnacs_io').GetName] scream of treason from their shrinking castles. Today, we trade a madman for a conqueror, and in doing so, we ensure that [GetCountry('BUR').GetName] remains the true master of the West. The lions of England are at the door - let us throw them open."
 armagnacs_and_burgundians.11.a: "Better an English King than an Armagnac dog!"
 armagnacs_and_burgundians.12.title: "Voices of the Faithful"
 armagnacs_and_burgundians.12.desc: "#italic Hear the weeping of the Mother Church. The soul of [GetCountry('FRA').GetName] is no longer a garden of the Lord, but a field of tares watered by the blood of her own children. By this bitter schism, you tear the seamless garment of Christ and invite the Divine Scourge upon our lands. The plowshare is beaten into the dagger, and the peasant's prayer is drowned out by the clash of steel. We implore you: lay down the sword of vengeance before the wrath of the Almighty is made manifest. Do not let the history of this holy realm be written in the ink of kin-slaughter, for a house divided against itself cannot stand before God or man.#!\n\nThe [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] beseech the court. The [GetSituationByKey('AMGBUR_war').GetName] is an unholy act of power politics and harms the Soul of [GetCountry('FRA').GetName]. Reconcile with your brothers."
 armagnacs_and_burgundians.12.a: "Heed their call"
 armagnacs_and_burgundians.12.a.tt: "[rapprochement|e] will increase by 6.5%"
 armagnacs_and_burgundians.12.b: "War #italic is#! righteous!"
 armagnacs_and_burgundians.13.title: "Merchants Demand Stability"
 armagnacs_and_burgundians.13.desc: "The delegation of [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] stands before the council with a grim, commercial resolve, their voices cutting through the courtly tension with the cold reality of a failing economy. They argue that the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s' private feud has effectively severed the arteries of French commerce, transforming the highways into a gauntlet of lawless tolls and turning once-thriving markets into desolate squares of ash. They demand an immediate reconciliation, not out of loyalty to either house, but out of the desperate necessity to restore the flow of coin and bread before the mounting poverty ignites a fire in the streets that no army can extinguish."
 armagnacs_and_burgundians.13.a: "Guarantee safe passage"
 armagnacs_and_burgundians.13.a.tt: "[rapprochement|e] will increase by 6.5%"
 armagnacs_and_burgundians.13.b: "We all share the burden"
 armagnacs_and_burgundians.14.title: "Peasants Flight"
 armagnacs_and_burgundians.14.desc: "The landscape of the contested provinces is becoming a patchwork of ghosts, as the slow, relentless grind of the conflict hollows out the countryside village by village. The desertion is a quiet hemorrhaging; a farmstead is torched one night by foragers, a miller disappears the next, until the remaining families gather what little they have and vanish into the woods or the safety of distant city walls. These #italic villes désertes#! leave the land fallow and the manor houses without a labour force, turning once-profitable fiefs into silent wastes of weeds and ash. To halt this rot, the local commanders must either formalise 'patis'—localised truces bought with protection money—or deploy man-hunts to drag the labourers back to their plows, desperate to keep the tax base from evaporating entirely."
 armagnacs_and_burgundians.14.a: "Negotiate ceasefires locally"
 armagnacs_and_burgundians.14.a.tt: "[rapprochement|e] will increase by 6.5%"
 armagnacs_and_burgundians.14.b: "Force them back"
 armagnacs_and_burgundians.15.title: "Secret Correspondence"
 armagnacs_and_burgundians.15.desc: "The rustle of parchment and the low glow of a signet ring in a midnight tent have become the true instruments of statecraft, as high-ranking [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] from both camps begin to weave a web of secret correspondence. Weary of a war that drains their coffers and risks their ancestral titles for the sake of two bickering dukes, these #italic Men of the Middle#! exchange letters carried by trusted friars or disguised huntsmen. Their messages speak of private truces, the preservation of border estates, and the shared fear that the kingdom itself is being picked clean by opportunistic vultures. These quiet betrayals of the cause are not born of treason, but of a desperate, aristocratic pragmatism. The peers must do so in the shadows to ensure there is still a France left to rule."
 armagnacs_and_burgundians.15.a: "Encourage dialogue"
 armagnacs_and_burgundians.15.a.tt: "[rapprochement|e] will increase by 6.5%"
 armagnacs_and_burgundians.15.b: "This is treasonous behaviour"
 armagnacs_and_burgundians.16.title: "Widows and Orphans"
 armagnacs_and_burgundians.16.desc: "The clamor of the court is silenced by a sombre assembly of black-veiled women and hollow-eyed children, a collective manifestation of the war's mounting human cost that cuts across every layer of the social hierarchy. Great women in mourning weeds stand side-by-side with the wives of guild-masters and the tattered widows of the plow, their shared grief erasing the boundaries of rank. They present a grim ledger of the fallen. Their unified cry is a piercing indictment of the ambition that has turned France into a kingdom of graveyards; they demand that the living honour the dead by ceasing the slaughter, warning that if this #italic Dance of Death#! continues, there will soon be no men left to lead, no merchants to trade, and no peasants to till the blood-soaked earth."
 armagnacs_and_burgundians.16.a: "They have a point"
 armagnacs_and_burgundians.16.a.tt: "[rapprochement|e] will increase by 6.5%"
 armagnacs_and_burgundians.16.b: "Such impudence"
 armagnacs_and_burgundians.17.title: "The Sacred Calendar"
 armagnacs_and_burgundians.17.desc: "The tolling of the church bells, once the rhythmic heartbeat of French life, has fallen into a dissonant and sporadic silence. The sacred calendar, the only respite for the weary plowman and the busy merchant, has been dismantled by the exigencies of an unending war. In the besieged cities and the pillaged countryside, the Great Feasts of Christendom pass unmarked; there is no grain to bake the holy breads, no wine to pour for the parish festivals, and no safety for the processions that once wound through the streets. The [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], their churches stripped of tithes and their rectories filled with the wounded, find themselves unable to organise the rituals that bind the community to the divine. The loss of these holy days is more than a spiritual deprivation; it is the final erosion of the social order, leaving the people in a state of perpetual, joyless labor and spiritual exile."
 armagnacs_and_burgundians.17.a: "Restore the Holy days"
 armagnacs_and_burgundians.17.a.tt: "[rapprochement|e] will increase by 6.5%"
 armagnacs_and_burgundians.17.b: "They must be patient"
 armagnacs_and_burgundians.18.title: "Victory for the [GetUniqueInternationalOrganization('armagnacs_io').GetName]"
 armagnacs_and_burgundians.18.desc: "The long years of strife have ended in triumph. The [GetUniqueInternationalOrganization('armagnacs_io').GetName] have prevailed, and the [GetUniqueInternationalOrganization('burgundians_io').GetName] faction lies broken. [ROOT.GetCountry.GetGovernment.GetRuler.GetName] stands victorious, and the crown of [GetCountry('FRA').GetName] is secured for the rightful cause. The realm shall now be reshaped in our image.\n\nThe people rejoice in the streets of [ROOT.GetCountry.GetCapital.GetName]. The war is won, but the harder task of rebuilding now begins."
 armagnacs_and_burgundians.18.a: "France is ours to shape"
 armagnacs_and_burgundians.19.title: "The [GetUniqueInternationalOrganization('armagnacs_io').GetName] are Victorious"
 armagnacs_and_burgundians.19.desc: "Word reaches us from the battlefield — the [GetUniqueInternationalOrganization('armagnacs_io').GetName] have carried the day. The [GetUniqueInternationalOrganization('burgundians_io').GetName] faction is shattered, their banners trampled into the mud of [ShowRegionNameWithNoTooltip('france_region')]. Though it was not our hand that struck the final blow, we fought and bled for this cause, and the glory of this victory belongs to all who stood beneath the banner of the [GetUniqueInternationalOrganization('armagnacs_io').GetName]."
 armagnacs_and_burgundians.19.a: "We played our part"
 armagnacs_and_burgundians.20.title: "Defeat — The [GetUniqueInternationalOrganization('burgundians_io').GetName] are Broken"
 armagnacs_and_burgundians.20.desc: "The bitter cup of defeat is ours to drain. The [GetUniqueInternationalOrganization('armagnacs_io').GetName] have triumphed, and the cause of the [GetUniqueInternationalOrganization('burgundians_io').GetName] lies in ruins. Our allies have scattered, our coffers are drained, and the prestige of [ROOT.GetCountry.GetName] has been dealt a grievous wound.\n\nWe must now endure the consequences of this defeat, and consider how best to preserve what remains of our position in [GetCountry('FRA').GetName]."
 armagnacs_and_burgundians.20.a: "We shall endure this humiliation"
 armagnacs_and_burgundians.21.title: "The Civil War Ends — The [GetUniqueInternationalOrganization('armagnacs_io').GetName] Prevail"
 armagnacs_and_burgundians.21.desc: "The long nightmare of civil strife in [GetCountry('FRA').GetName] has finally drawn to a close. The [GetUniqueInternationalOrganization('armagnacs_io').GetName] have emerged victorious, and the [GetUniqueInternationalOrganization('burgundians_io').GetName] faction is no more. Whether this outcome brings stability or merely a new master to the troubled realm of [ShowRegionNameWithNoTooltip('france_region')] remains to be seen.\n\nFor now, the cannons have fallen silent."
 armagnacs_and_burgundians.21.a: "Let us hope for peace"
 armagnacs_and_burgundians.22.title: "Victory for the [GetUniqueInternationalOrganization('burgundians_io').GetName]"
 armagnacs_and_burgundians.22.desc: "Against all odds, the banners of the [GetUniqueInternationalOrganization('burgundians_io').GetName] fly over the field of victory. The [GetUniqueInternationalOrganization('armagnacs_io').GetName] faction is shattered, their great coalition dissolved into a rabble of fleeing men and broken promises. [ROOT.GetCountry.GetGovernment.GetRuler.GetName] has proven that the House of Valois of Burgundy is the true power behind the throne of [GetCountry('FRA').GetName].\n\nThe realm bends its knee. Now is the time to consolidate our gains and ensure no rival shall rise again."
 armagnacs_and_burgundians.22.a: "The future of France is ours to write"
 armagnacs_and_burgundians.23.title: "The [GetUniqueInternationalOrganization('burgundians_io').GetName] are Victorious"
 armagnacs_and_burgundians.23.desc: "The bells of victory ring from every church tower loyal to the [GetUniqueInternationalOrganization('burgundians_io').GetName] cause. The [GetUniqueInternationalOrganization('armagnacs_io').GetName] faction has been brought low, and those who stood firm in this conflict can hold their heads high. We did not waver when others counselled caution, and now the rewards of that loyalty are at hand."
 armagnacs_and_burgundians.23.a: "Loyalty has its rewards"
 armagnacs_and_burgundians.24.title: "Defeat — The [GetUniqueInternationalOrganization('armagnacs_io').GetName] are Broken"
 armagnacs_and_burgundians.24.desc: "The cause is lost. The [GetUniqueInternationalOrganization('burgundians_io').GetName] have proven stronger, and the coalition of the [GetUniqueInternationalOrganization('armagnacs_io').GetName] has crumbled beneath the weight of their ambition. Our banners are struck from the walls, our allies have made their separate peaces, and the name of [ROOT.GetCountry.GetName] has been diminished in the eyes of [ShowRegionNameWithNoTooltip('france_region')].\n\nWe must endure, and wait for better days."
 armagnacs_and_burgundians.24.a: "This is not the end"
 armagnacs_and_burgundians.25.title: "The Civil War Ends — The [GetUniqueInternationalOrganization('burgundians_io').GetName] Prevail"
 armagnacs_and_burgundians.25.desc: "The long nightmare of civil strife in [GetCountry('FRA').GetName] has drawn to a close, though not in the manner many had hoped. The [GetUniqueInternationalOrganization('burgundians_io').GetName] have emerged triumphant, and the [GetUniqueInternationalOrganization('armagnacs_io').GetName] faction is no more. The future of [ShowRegionNameWithNoTooltip('france_region')] now rests in the hands of [GetCountry('BUR').GetGovernment.GetRuler.GetName] and his allies.\n\nFor now, the cannons have fallen silent."
 armagnacs_and_burgundians.25.a: "Let us hope for peace"
 armagnacs_and_burgundians.26.title: "The Exhaustion of War — Peace at Last"
 armagnacs_and_burgundians.26.desc: "Not with a thunderclap of victory, but with the slow, weary exhalation of a realm that has simply run out of the will to fight, the conflict between the [GetUniqueInternationalOrganization('armagnacs_io').GetName] and the [GetUniqueInternationalOrganization('burgundians_io').GetName] draws to its close. No side has triumphed. No banner flies supreme. The fields of [ShowRegionNameWithNoTooltip('france_region')] are silent at last, not because justice has been served, but because the people can bear no more.\n\nFrom the highest noble to the lowliest plowman, there is a shared and exhausted relief. The Church opens her doors, the merchants reopen their ledgers, and the peasants return to their fallow fields. Whatever grievances remain unresolved, they are folded away for another generation. For now, [GetCountry('FRA').GetName] breathes again."
 armagnacs_and_burgundians.26.a: "Let the healing begin"