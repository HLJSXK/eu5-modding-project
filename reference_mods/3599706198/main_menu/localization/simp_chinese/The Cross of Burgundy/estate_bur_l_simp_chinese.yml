l_simp_chinese:
 waterschappen: "水务局"
 waterschappen_desc: "独立的农村机构负责监督低洼北部地区堤坝、水闸和排水渠的关键维护工作。这些社区通过行使征收地方圩田税和裁决水利纠纷的权利，确保土地在不断侵蚀的海水威胁下得以存续。这种分散化管理模式将危险的沼泽地转变为高产的农业核心区域，培育出一个半自治的阶层，其首要忠诚在于守护自己的土地和维持沿海基础设施的稳定。"
 urban_militia_subsidies: "城镇民兵补贴"
 urban_militia_subsidies_desc: "大都市维持着自身的专业常备连队，装备着佛兰德斯财力所能购置的最精良板甲与武器。公爵将国家资金直接注入市政军械库，从而绕过了迟缓的封建征召体系，转而倚重纪律严明、可随时投入战场的城镇步兵。这些民兵在战场上构筑起枪矛与火药组成的坚固防线，但他们的存在也让商人行会在王室军事政策与国内安全事务上获得了举足轻重的话语权。"
 vineyard_monopolies: "葡萄园垄断"
 vineyard_monopolies_desc: "修道院团体与教会主教在整个南部公国享有尊贵葡萄园的独家种植与出口权。通过控制黑皮诺葡萄的生产，教士阶层将这片丘陵地带转化为专业化的经济重地，产出基督教世界中最令人垂涎的出口商品之一。这种对葡萄酒贸易的垄断地位，既确保了财富源源不断地流入教会金库，又巩固了该区域作为顶级奢侈葡萄酒产地的声誉，从而有效地将当地景观转变为一个神圣而利润丰厚的垄断产业。"
 chambres_des_comptes: "审计庭"
 chambres_des_comptes_desc: "勃艮第的行政改革项目标志着从封建割据向中央集权主权国家的彻底转型。这一制度旨在将低地国家迥异的法律与财政体系统一于一套专业化、高度集中的官僚体制之下，以至高无上的司法权威取代地方城市习俗。通过设立如马林议会和中央审计院等常设机构，国家力求实现税收与司法的直接、高效流通，绕过传统上由贵族与地方阶层所施加的干预。归根结底，这种治理模式旨在将公爵的领地打造成一台运转协调的机器，使每一项行政职能都服务于中央的绝对权威。"