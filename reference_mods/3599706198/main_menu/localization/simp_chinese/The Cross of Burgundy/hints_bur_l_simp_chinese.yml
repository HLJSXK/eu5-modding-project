l_simp_chinese:
 hint_AMGBUR_war: "[GetSituationByKey('AMGBUR_war').GetNameWithNoTooltip]"
 hint_AMGBUR_war_hint_text: "$hint_AMGBUR_war_hint_text_1$\n\n$hint_AMGBUR_war_hint_text_2$\n\n$hint_AMGBUR_war_hint_text_3$\n\n$hint_AMGBUR_war_hint_text_4$"
 hint_AMGBUR_war_hint_text_1: "The [GetSituationByKey('AMGBUR_war').GetName] plunges [ShowRegionName('france_region')] into turmoil! This catastrophe can only spell disaster for the [GetCountry('FRA').GetAdjective] [court|e] and her efforts in the [GetSituationByKey('hundred_years_war').GetName]"
 hint_AMGBUR_war_hint_text_2: "#T Recommended Actions:#!\n@arrow_bonus_tier_3! Both [GetCountry('AMG').GetName] and [GetCountry('BUR').GetName] have access to [ShowGenericActionName('siphon_treasury')], [ShowGenericActionName('purge_advisors')] and [ShowGenericActionName('request_papal_delegates')]. These are unique ways to manipulate the status quo of the conflict or even tilt it in either country's favor."
 hint_AMGBUR_war_hint_text_3: "#T Extra Hints:#!\n@hint! The [GetSituationByKey('AMGBUR_war').GetName] is deeply unpopular with the [GetCountry('FRA').GetAdjective] [people|e]. As the war drags on, and hampers [GetCountry('FRA').GetName]'s ability wage war, [estates|e] from both Factions will begin to turn on their respective leaders."
 hint_AMGBUR_war_hint_text_4: "#T Recommended Actions#!\n@arrow_bonus_tier_3! It would be wise to end the [GetSituationByKey('AMGBUR_war').GetName] as soon as possible. This [situation|e] only serves [GetCountry('FRA').GetName]'s enemies. Crush resistance, or make peace with haste."
 hint_AMGBUR_war_diplomatic: "\"[rapprochement|e] with the opposing faction must be made. [GetCountry('FRA').GetName] is crippled by this conflict!\""
 hint_AMGBUR_war_administrative: "\"[GetCountry('FRA').GetName] is losing [control|e] within her territories. This is having catastrophic effects on her ability to defend herself from [GetCountry('ENG').GetName].\""
 hint_AMGBUR_war_military: "\"If we are to emerge from this Civil War victorious, then we must win enough [victories|e] to crush our opposition, and control the [GetCountry('FRA').GetAdjective] [court|e].\""