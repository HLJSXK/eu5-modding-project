 flavor_bur.40.title: "The Regency Council"
 flavor_bur.40.desc: "Some months have passed since the episode of the Mad [GetCountry('FRA').GetGovernment.GetRulerTitle], it is clear to all they are not of sound mind. The episodes are becoming more frequent and it is clear [GetCountry('FRA').GetGovernment.GetRuler.GetName] can no longer effectively govern the realm. A Regency Council has been put in place. It is lead by [GetCountry('BUR').GetGovernment.GetRuler.GetName] and [GetCountry('ORL').GetGovernment.GetRuler.GetName] as powerful magnates, and close relatives to the [GetCountry('FRA').GetGovernment.GetRulerTitle]. Let us hope we can turn to common cause again and fight back the [GetCountry('ENG').GetAdjective]"
 flavor_bur.40.a: "Reassurance at last"
 flavor_bur.40.historical_info: "The aftermath of the Forest of Le Mans left the throne occupied by a shadow, as Charles VI sat in a catatonic stupor, his mind seemingly shattered alongside his sword. With the King unable to recognize his own name—let alone govern a kingdom—the court at Paris became a chilling theater of ambition. Sensing the void, the two most powerful titans of the blood royal, Louis, Duke of Orléans, and Philip the Bold, Duke of Burgundy, moved with predatory speed to secure the reins of the state. The air in the council chambers grew thick with unspoken threats as the King's brother and his uncle maneuvered for the title of Regent, each claiming to be the true protector of the crown while eyeing the royal treasury with ill-disguised greed.\n\nThe resulting Regency Council was less a government and more an armed truce. While Orléans sought to centralize power through his personal influence over the Queen, Burgundy relied on his vast territorial wealth and his status as the elder statesman of the Valois dynasty to dictate policy. This fragile partnership, born of necessity and fueled by mutual loathing, effectively split France into two warring camps. Every decree signed and every tax levied became a battleground for dominance, ensuring that as the King's madness deepened, the machinery of the state would not be used to heal the fractured realm, but rather to sharpen the blades of the looming civil war between the Armagnacs and the Burgundians."
 flavor_bur.41.title: "Excluded From Court"
 flavor_bur.41.desc: "The heavy oak doors of the council chamber swing shut before [GetCountry('BUR').GetGovernment.GetRuler.GetName] can reach them, a silent but deafening declaration of his new status at court. In the wake of his father's funeral, the Duke of Burgundy finds the political landscape of Paris transformed into a fortress of Orléanist ambition. [GetCountry('ORL').GetGovernment.GetRuler.GetName] moves through the Hôtel Saint-Pol with the confidence of a king in all but name, whispering into the ear of [GetCountry('FRA').GetGovernment.GetRuler.GetName] and securing the keys to the royal treasury. Every time [GetCountry('BUR').GetGovernment.GetRuler.GetName] reaches for a quill to sign a state document or attempts to gain an audience with his drifting, golden-eyed sovereign, he finds his path blocked by a wall of smirking officials and new decrees that strip him of his hereditary influence.\n\nThe exclusion is total, a calculated strangulation of [GetCountry('BUR').GetAdjective] power that leaves him standing in the shadows of the very throne his father once steadied. While [GetCountry('ORL').GetGovernment.GetRuler.GetName] redirects the [GetCountry('FRA').GetGovernment.GetRulerTitle]'s' taxes to his own coffers, the Duke of Burgundy is left to stew in a cold, mounting fury. He watches from the periphery as his rival's grip on power holds firm, realising that his seat at the council table has been effectively abolished. The air in Paris grows thick with the scent of a coming storm; John is no longer a partner in government, but a predator waiting for the moment to strike back at the man who has made him a stranger in his own kingdom."
 flavor_bur.41.a: "Something must be done"
 flavor_bur.41.historical_info: "The death of Philip the Bold in 1404 signaled the end of a stable regency. His son and heir, John the Fearless, expected to inherit his father’s dominant position within the French government, but he was immediately met with the fierce opposition of Louis, Duke of Orléans. Unlike the elder Philip, who had managed to maintain a working relationship with his nephew Louis, John and Louis were of the same generation and possessed a mutual, visceral hatred. Louis quickly moved to monopolise the royal seal and the Queen's favor, effectively cutting John out of the decision-making process."