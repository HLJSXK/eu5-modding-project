l_simp_chinese:
 flavor_bur.1.title: "灵魂升天"
 flavor_bur.1.desc: "瘟疫终于攻破了[ROOT.GetCountry.GetCapital.GetName]的城墙。奥东四世公爵这位曾从卡塞尔的腥风血雨中幸存，又在法兰西宫廷的诡谲风云中屹立不倒的强者最终并非倒于刀剑之下，而是被疫病吞噬。\n\n他的离世让[ROOT.GetCountry.GetName]公国陷入死寂般的震惊。圣贝尼涅大教堂的丧钟为亡者不息鸣响，街道上弥漫着焚烧草药的浓烟，徒劳地试图驱散瘴疠之气。随着公爵的逝去，我们的土地治理陷入停滞：税吏逃离城镇，农民窃窃私语，称这是上帝对基督教世界权贵家族的审判。在这灰烬弥漫的时代，我们失去了领袖。"
 flavor_bur.1.a: "主已将他召回。"
 flavor_bur.1.historical_info: "奥东四世是14世纪勃艮第政治不可或缺角色，他通过与琼三世的联姻将勃艮第公国与勃艮第伯国统一。其统治以百年战争初期对法国王室的坚定忠诚，以及集权化勃艮第统治体系的努力为标志。\n\n然而，任何政治手段都无法使公爵家族免于鼠疫的侵袭。公元1349年4月，54岁的奥多之死标志着深刻动荡时期的开端。在瘟疫肆虐与英法交战的危局中，这位经验丰富的统治者猝然离世，致使勃艮第的统治机构摇摇欲坠，最终为瓦卢瓦家族接管公国铺平了道路。"
 flavor_bur.2.title: "血脉终结"
 flavor_bur.2.desc: "噩耗如晴天霹雳般骤然降临！菲利普公爵不幸坠马身亡，作为家族最后的血脉，他的逝去不仅令人哀悼，更意味着勃艮第家族将永远沉寂。\n\n根据领地古老的法律，由于缺乏直系继承人，这片伟大的封地已然归公。我们守护了数百年的独立地位就此瓦解，公国依法被重新纳入法兰西王室领地。勃艮第不再是一个主权家族，而是重新由国王本人持有的王室头衔。我们不再是命运的主宰，而是百合花旗帜下的一个省份，只能静待国王将我们的土地赐予何人——倘若他当真愿意赐予的话。"
 flavor_bur.2.a: "领地收回其所有"
 flavor_bur.2.historical_info: "菲利普一世无嗣而亡，触发了被称为“封地继承”的的法律程序——当封地缺乏合法继承人时，将自动归还给领主。法兰西国王约翰二世迅速采取行动，确保了公国的归属，他声称自己是已故公爵最近的男性亲属。\n\n这一事件标志着[ROOT.GetCountry.GetName]作为卡佩家族古老独立采邑的正式终结。通过将公国重新纳入王室领地，约翰二世实质上终结了[ROOT.GetCountry.GetName]自1032年以来享有的自治权。这次“封地继承”让勃艮第重归法兰西王室，国王才能在日后将其作为封地授予其子“大胆的”菲利普，从而开启瓦卢瓦‑勃艮第家族的崛起。"
 flavor_bur.3.title: "黄金任命"
 flavor_bur.3.desc: "哀悼期已过，王室政务的尘埃落定。约翰二世国王审视其幼子腓力，看到了足以匹配勃艮第之名的气魄。在一场令贵族阶层心驰神往的盛大典礼中，国王决定重建公国，将其作为封地授予这位如今被称为“大胆的”菲利普。\n\n瘟疫与旧王朝覆灭后的沉寂，已被银号角的鸣响与渴求英雄的人民欢呼所取代。“大胆的”菲利普并非以巴黎行政官的身份到来，而是作为拥有王室血统的公爵亲王，带来了瓦卢瓦宗族的威望与资源。[ROOT.GetCountry.GetCapital.GetName]的街道悬挂起崭新旌旗，将百合花纹章与我们土地的象征交织在一起。新的王朝已然崛起，崭新的时代就此开启。"
 flavor_bur.3.a: "公爵万岁"
 flavor_bur.3.historical_info: "1363年，法兰西国王约翰二世正式将勃艮第公国授予其四子“大胆的”腓力。这不仅是出于父爱，更是对腓力在1356年普瓦捷战役中非凡勇气的嘉奖。在那场法军败仗中，年仅十四岁的菲利普坚守在父亲身旁，在尸山血海中抵御英军进攻，由此赢得了“大胆的”的称号。\n\n虽然父子二人最终双双被俘押往英格兰，但菲利普的英勇事迹使他成为法国宫廷眼中的英雄。通过授予勃艮第领地，约翰二世建立了瓦卢瓦王朝一个强大的旁系分支。这个崭新的开端最终催生出足以与法兰西王国抗衡的勃艮第强国——菲利普及其后代凭借这份馈赠，通过精妙的联姻与钢铁般的外交手腕，建立起幅员辽阔的帝国。"
 flavor_bur.4.title: "佛兰德斯的雄狮与法兰西的百合"
 flavor_bur.4.desc: "当皮耶尔昂伊夫林的玛格丽特是富庶的佛兰德伯国女继承人，其婚约是基督教世界最令人垂涎的奖赏。多年来，英格兰国王爱德华三世一直运筹帷幄，试图让她嫁给自己的儿子兰利的埃德蒙，从而包围法兰西并掌控北方的纺织命脉。英格兰黄金储备充足，且在佛兰德羊毛城镇的影响力根深蒂固。\n\n然而，局势已然逆转。通过国王查理五世不懈的外交斡旋与教廷的强势干预，一条通途已在菲利普面前展开。这场联姻将使佛兰德、阿图瓦和弗朗什‑孔泰尽归勃艮第麾下，缔造一个从北海延伸至阿尔卑斯山的辽阔领地。我们正站在命运的十字路口：要么倾尽国库财力压倒英格兰的聘礼，夺取这片黄金疆域；要么就此抽身，任由佛兰德的继承权落入英格兰宿敌之手。"
 flavor_bur.4.a: "出价高于英格兰人！"
 flavor_bur.4.b: "由他们去吧！"
 flavor_bur.4.historical_info: "1369年，“大胆的”菲利普与佛兰德斯的玛格丽特的联姻是瓦卢瓦王朝外交的杰作。英格兰国王爱德华三世曾花费数年时间，试图为其子兰利的埃德蒙争取玛格丽特，此举本可将至关重要的佛兰德经济置于英格兰控制之下。\n\n为阻止此事，法国国王查理五世向教宗乌尔班五世施压，以血缘过近为由拒绝为英格兰王子颁发必要的婚姻特许。与此同时，法国向玛格丽特的父亲路易·德·马勒提供了巨额嫁妆和政治让步。通过在金钱和教廷影响力两方面压倒英格兰，“大胆的”菲利普最终联姻——这使勃艮第公爵们日后成为欧洲最富有的王公，从根本上改变了百年战争的权力格局。"
 flavor_bur.5.title: "欢迎"
 flavor_bur.5.desc: "本模组旨在为《EU5》中的勃艮第体验铺设一条既定轨道。它提出了这一时期[ROOT.GetCountry.GetName]公国的终极“假设”——一个在瓦卢瓦王朝领导下、从布鲁日延伸至弗朗什‑孔泰的独立勃艮第国家。\n\n若希望历史事件持续触发，请注意以下几点：首先，请勿为你的统治者安排联姻，游戏将通过事件处理此事并提供符合史实的奖励。其次，若你的历史统治者因《EU5》原版事件死亡，建议立即读取最近存档，每位角色的离世皆由事件脚本设定。最后，每个事件都为你提供挣脱历史桎梏、开辟自主道路的机会——祝你好运。"
 flavor_bur.5.a: "我们步入历史的篇章"
 flavor_bur.5.historical_info: "勃艮第国家计划是历史上最引人遐想的\"如果\"之一：它试图在法兰西与日耳曼初生的民族认同之间，塑造一个独立而中央集权的第三方势力。最初这仅是一系列分散的封建遗产，但在瓦卢瓦公爵们的统治下，逐渐演变为一场复兴古老的中法兰克王国——洛塔林吉亚的自觉努力。至15世纪中叶，这些西方大公已成功地将低地国家的工业与金融引擎，与原勃艮第公国声名显赫、盛产葡萄酒的核心领地缝合在一起。这不仅是领土的简单拼凑，更是一场精心设计的国家建设实验——它运用了全欧洲最精密的行政官僚体系、最奢华的宫廷文化，以及最先进的职业化军队。\n\n通过「好人」菲利普锲而不舍的外交手段与「大胆」查理咄咄逼人的领土扩张，这项计划几乎触及了法理上的巅峰。1473年，在与神圣罗马帝国皇帝腓特烈三世于特里尔会晤期间，勃艮第王冠之梦已近在咫尺。皇帝曾初步同意为查理加冕，使其成为复兴的洛塔林吉亚王国的国王——此举将使这个国家永远摆脱法兰西与帝国的辖制。然而，皇帝因忌惮公爵日益膨胀的权势而深夜仓皇逃离，随后查理在南锡战役中阵亡，这一切最终阻止了这个中欧帝国的永久确立。倘若计划成功，现代欧洲版图将面目全非：一个强大而统一的勃艮第，将作为永久的缓冲地带与文化桥梁，屹立于大陆的心脏地带。"
 flavor_bur.6.title: "尼科波利斯之狮"
 flavor_bur.6.desc: "在多瑙河畔，针对奥斯曼的十字军东征以一场血腥溃败告终。数千名英勇的骑士战死沙场或身陷囹圄，但在尼科波利斯的杀戮中，一个名字从绝望中崛起。年轻的约翰率领勃艮第部队时展现出的凶猛几近疯狂，即便十字军阵线在他周围崩溃，他仍拒绝投降。\n\n虽然最终被苏丹巴耶济德俘虏，但他在战场上的表现如此英勇，连俘虏他的人都带着勉强的敬意谈论他。当他被赎回到第戎后，民众看到的并非败军之将，而是一位直面死亡毫不退缩的英雄。从巴黎的宫廷到布鲁日的市集，他不再只是讷韦尔的约翰；如今他被赞誉为“无畏者”。这一新获得的威望巩固了他作为勃艮第遗产合法继承人的地位。"
 flavor_bur.6.a: "他将因此而得名"
 flavor_bur.6.historical_info: "1396年，约翰率领勃艮第军队参与了一场大规模十字军东征，旨在将拜占庭帝国从奥斯曼土耳其人手中解救出来。在尼科波利斯战役中，十字军被苏丹巴耶济德一世彻底击溃。尽管战术上遭遇失败，但约翰在战斗中的个人英勇表现已成为传奇。\n\n正是在这场战役以及随后漫长而昂贵的囚禁期间他所展现的崇高行为，使他赢得了“无畏者”的称号。这个头衔不仅是个绰号，更是“大胆的”菲利普用来将儿子塑造为欧洲首席骑士的强大政治工具。虽然十字军东征让勃艮第国库付出了高达20万杜卡特赎金的惊人代价，但它为家族赢得了军事威望，使得约翰在接下来的二十年里得以主导法国政局。"
 flavor_bur.7.title: "尚波莫尔的辉煌"
 flavor_bur.7.desc: "菲利普公爵的目光已超越其个人生命，投向了家族的永恒传承。在第戎城门之外，尚波莫尔修道院的第一批基石已然铺就——这座加尔都西会修道院将被打造为瓦卢瓦‑勃艮第家族的陵墓。\n\n来自全欧洲最杰出的建筑师、石匠与雕塑家齐聚于此，这昭示着公爵的虔诚与富庶。这不仅是座教堂，更是向世人宣告，勃艮第家族绝非法兰西王室转瞬即逝的馈赠，而是实至名归的君主。当修士们开始为历代公爵灵魂永续守夜时，第戎的威望已攀升至前所未有的巅峰。"
 flavor_bur.7.a: "一座屹立万年的丰碑"
 flavor_bur.7.b: "这笔开支我们承担不起。"
 flavor_bur.7.historical_info: "尚波莫尔修道院建于1383年，是“大胆的”菲利普文化计划的核心。通过为家族设立专属陵园，菲利普刻意效仿葬于圣但尼的法兰西国王，彰显其家族同等的地位与永恒。\n\n这里成为哥特风格的发源地，汇集了《摩西井》等杰作与宏伟的公爵陵墓——其中著名的“哀悼者”雕像，为欧洲丧葬艺术树立了新标准。除艺术价值外，尚波莫尔更肩负重要政治使命：它将瓦卢瓦‑勃艮第的认同深植于公国领土，确保即便家族势力扩展至佛兰德斯与低地国家，第戎始终是其精神与宗族根源所在。"
 flavor_bur.8.title: "[ROOT.GetCountry.GetName]的葡萄"
 flavor_bur.8.desc: "勃艮第的葡萄园世代以来都出产丰富的葡萄酒，但其中大部分是佳美葡萄——这种葡萄品种更适合追求产量而非质量。菲利普公爵凭借其敏锐的品味和对勃艮第的雄心远见意识到一款真正伟大的葡萄酒能够提升勃艮第公国在欧洲的地位。\n\n他颁布了一项开创性的法令，宣布将他称为“不忠”且普通佳美葡萄彻底铲除。取而代之的，是更为高贵且风味复杂的黑皮诺葡萄，尽管其产量较低且种植要求更为苛刻。这一大胆举措将彻底改变[ROOT.GetCountry.GetName]的声誉，为酿造无与伦比的精致葡萄酒奠定基础，并建立一个将定义我们这片土地数百年的传奇。"
 flavor_bur.8.a: "唯有最杰出者，方配得上[ROOT.GetCountry.GetName]之名。"
 flavor_bur.8.b: "这不过是一个虚荣的项目。"
 flavor_bur.8.historical_info: "1395年，“大胆的”菲利普颁布了一项关键法令，永远地塑造了勃艮第葡萄酒。由于对佳美葡萄的“过度生产”和感知上的低品质感到沮丧——这种葡萄通常酿造出更简单、不够精致的葡萄酒，菲利普著名地宣称它“背叛了人类的味蕾”，并下令将其从最好的葡萄园中拔除，转而种植黑皮诺葡萄。\n\n尽管佳美在其他地区（最著名的是博若莱）继续被种植，但这项法令巩固了黑皮诺作为勃艮第首选葡萄的地位。这是一个有远见的决定，将质量和声望置于单纯产量之上，直接促成了勃艮第未来成为世界上最受尊敬的葡萄酒产区之一，并巩固了其酿造优雅、复杂且具有陈年潜力葡萄酒的声誉。"
 flavor_bur.9.title: "灵魂升天"
 flavor_bur.9.desc: "勇者时代已然落幕，菲利普公爵在远离第戎宫廷辉煌的哈勒小镇一家简陋客栈中与世长辞。四十余年来，他作为我们伟大基业的缔造者，将一份简单的王室封赏转化为横跨法兰西与帝国边境的蓬勃领地。\n\n他的逝世震动了欧洲各国宫廷。当法兰西国王哀悼失去最有权势的叔父，佛兰德诸城屏息以待后续变局，而勃艮第人民却在痛悼。尽管他因奢华的品味与无尽的外交斡旋使得国库空虚，却为儿子约翰传承了无与伦比的威望遗产，以及广阔疆域。他所许诺的新黎明已然降临；如今轮到继承者证明自己能否经受正午烈日的炙烤。"
 flavor_bur.9.a: "历史路径：王位由[historic_heir.GetNameWithNoTooltip]继承"
 flavor_bur.9.historical_info: "“大胆的”菲利普于1404年4月27日逝世。近半个世纪以来，他始终是法兰西与勃艮第政坛最具影响力的人物，在国王查理六世精神失常期间，常以法兰西实际统治者的身份执掌朝政。他的离世标志着瓦卢瓦‑勃艮第机制第一章的落幕。\n\n菲利普的统治堪称封建制度的典范：他凭借亲王的身份壮大家族势力，屡屡挪用法国王室资金巩固其在佛兰德斯与低地国家的领地。逝世后，其灵柩在盛大仪仗护送下运抵尚波尔修道院，安葬于他生前钦定的宏伟陵墓中。他的离世为其子无畏的约翰开启了道路——这位继承者更具侵略性与对抗性的作风，将使勃艮第与奥尔良家族为争夺法国王权陷入直接而血腥的冲突。"
 flavor_bur.10.title: "玛莱区的血腥之夜"
 flavor_bur.10.desc: "The rivalry that has festered like a gangrenous wound in the heart of France has finally been lanced by a dagger's point. On a dark November evening, as [GetCountry('AMG').GetGovernment.GetRulerTitle] left the Queen's residence in Paris, he was ambushed and brutally butchered in the streets by a band of masked assassins.\n\nThe mask has now slipped. [GetCountry('BUR').GetGovernment.GetRulerTitle] has stood before the Royal Council and, far from denying the deed, has boasted of it as 'tyrannicide', claiming he saved the realm from a libertine and a sorcerer. But the blood on the cobblestones of the Rue Vieille-du-Temple will not wash away so easily. The partisans of the late Duke, now rallying behind the Count of [GetCountry('AMG').GetName], have sworn a blood feud. France is no longer a kingdom; it is a butcher's shop divided in two. We must prepare our armies, for the struggle for the soul of the Fleur-de-lis has moved from the council chamber to the battlefield."
 flavor_bur.10.a: "这是为了领地好。"
 flavor_bur.10.historical_info: "1407年11月23日，奥尔良的路易遇刺事件成为将法国推入阿马尼亚克‑勃艮第内战的决定性时刻。多年来，无畏的约翰与路易始终在争夺对疯王查理六世的控制权。路易不仅成功遏制了约翰的影响力，更耗尽国库资金以实现个人野心，最终将约翰逼至铤而走险的境地。\n\n无畏的约翰承认谋杀罪行时，是赌自己在巴黎民众中的威望，因为民众痛恨路易十四的重税。然而，事与愿违，这一举动反而使奥尔良派在阿马尼亚克伯爵伯纳德七世的领导下更加团结。这场内部崩溃发生在对法国而言最糟糕的时刻，因为它为英格兰国王亨利五世提供了再次入侵的绝佳机会，最终导致了阿金库尔战役的惨败。"
 flavor_bur.11.title: "市场区的宠儿"
 flavor_bur.11.desc: "与那些深居宫墙之后、高高在上的王室亲王不同，约翰公爵将他的事业带到了街头。他争取到了各大行会首领和巴黎市场普通劳工的支持，承诺终结其已故宿敌强加的毁灭性赋税。今日，当他进入巴黎城时，空气中弥漫的并非威胁，而是巴黎民众万岁的欢呼声。公爵找到了一种比任何骑士冲锋都更强大的武器：民众那善变却炽热的忠诚。有了巴黎作为后盾，王室枢密院别无选择，只能倾听他的声音。"
 flavor_bur.11.a: "[ROOT.GetCountry.GetName]万岁"
 flavor_bur.11.historical_info: "「无畏的」约翰是政治宣传的先驱。他深知通过倡导税制改革并争取巴黎城内勃艮第派系的支持，即便没有高等贵族的拥护也能掌控首都。这一策略最终引发了卡博什叛乱，亲勃艮第的行会势力实际控制了巴黎城。虽然这种民粹主义策略赋予他巨大影响力，却也使他成为瓦卢瓦王室其他亲王眼中的异类——他们将其依赖平民暴众的行为视作对贵族阶层的背叛。"
 flavor_bur.12.title: "蒙蔽法国人双眼"
 flavor_bur.12.desc: "根特与布鲁日的子民已明确表态：若英格兰羊毛断供，织机便将停转，街巷必血流成河。为避免佛兰德斯叛乱，约翰已与亨利五世缔结秘密商贸条约——我方保障英格兰商旅安全通航与泊港，而英方承诺不再劫掠勃艮第疆域。这份私约令我们在巴黎眼中成为叛徒，却在商人心中加冕为王。"
 flavor_bur.12.a: "不惜一切代价，也要让巴黎的织机轰鸣。"
 flavor_bur.12.b: "我们不会与王室的敌人同席共饮。"
 flavor_bur.12.historical_info: "「无畏的」约翰深知勃艮第公国的存续仰赖于英吉利‑佛兰德贸易。通过与英格兰签订局部停战协议，他确保了佛兰德斯地区的繁荣，而法兰西其余土地正陷于战火。这种经济实用主义奠定了英勃同盟的基础，证明了对于瓦卢瓦‑勃艮第公爵们而言，臣民的利益远重于对法兰西王室的封建誓言。"
 flavor_bur.13.title: "康布雷的双重婚礼"
 flavor_bur.13.desc: "菲利普公爵以精妙的宗族谋划，实现了与强大的维特尔斯巴赫家族的双重联姻。我们的继承人约翰已迎娶巴伐利亚的玛格丽特为新娘，而其妹玛格丽特则嫁予玛格丽特之兄——巴伐利亚的威廉。\n\n这不仅是联姻，更是架设在莱茵河与北海之间由黄金与血脉铸就的桥梁。通过将我们的命运与荷兰、泽兰及埃诺的领主们紧密相连，我们已确保勃艮第家族在低地国家的影响力，将再无法被法兰西王室或神圣罗马皇帝所忽视。"
 flavor_bur.13.a: "我们祝福新郎新娘"
 flavor_bur.13.historical_info: "1385年的联姻是勃艮第向低地国家扩张的基石。通过与维特尔斯巴赫家族联姻，瓦卢瓦-勃艮第公爵获得了对施特劳宾‑荷兰领地（包括荷兰、泽兰和埃诺）的合法宣称权。这些领土最终将由约翰之子「好人」菲利普继承或夺取，从而形成了统一的勃艮第尼德兰。这场婚礼极尽奢华，宴请宾客逾两万人，其铺张程度在一个世纪内都是宫廷奢华的标杆，同时宣告[ROOT.GetCountry.GetName]已然成为名副其实的欧洲强国。"
 flavor_bur.15.title: "[ROOT.GetCountry.GetName]的太阳"
 flavor_bur.15.desc: "自蒙特罗的背叛夺去约翰公爵性命不过一年，其子却已展现出与历代先王截然不同的沉稳气度，他迅速稳定了佛兰德市场，重申勃艮第核心地区的古老权利，并为曾被内乱阴云笼罩的宫廷重振骑士精神的尊严——这位年轻的公爵由此赢得了贵族与平民罕见而真挚的拥戴。从编年史家的笔端到根特织工的祈祷声中，一个象征正义与复兴时代开启的新尊号已然扎根。人们尊称他为“好人”，这个诞生于集体慰藉的称号，标志着毁灭性血仇的终结，也预示着一个成熟独立的勃艮第公国的诞生。"
 flavor_bur.15.a: "我的最大荣耀就是子民繁荣度"
 flavor_bur.15.historical_info: "「好人」菲利普在1419年继位后，立即将这一绰号用作治国理政的有力工具。通过自诩为“贤明大公”，他成功凸显了自己治下的稳定与阿马尼亚克派系所表现出的无法无天之间的对比。这种早期的政治定位对于确保富裕的荷兰和佛兰德城市的忠诚至关重要这些城市对因他父亲发动的民粹战争而导致的持续征税和不稳定感到厌倦。"
 flavor_bur.16.title: "治国之道"
 flavor_bur.16.desc: "那慕尔侯爵身负债务，他的金库空空如也，家族中也没有合法继承人来保障未来的延续。认识到这是一个将国家南北分裂领土缝合起来的黄金机会，「好人」菲利普不是以征服者的身份出现，而是以富有的资助者身份出现。通过提供巨额金币来偿还侯爵的欠款，公爵获得了继承权，实际上将一个主权领土变成了个人抵押品。尽管年迈的侯爵在余生中仍保留着他的头衔，但土地的实际管理权悄悄地转移到了勃艮第人的手中，这标志着公爵策略的一个转变，在打造统一的中部王国时，钱包和长矛一样有效。"
 flavor_bur.16.a: "确保走廊安全，扩张国家版图"
 flavor_bur.16.b: "这代价太高了。"
 flavor_bur.16.historical_info: "1421年，「好人」菲利普以十三万二千金埃居的价格成功购得那慕尔。这笔交易确立了他整个15世纪20至30年代扩张政策的基调——优先通过法律与金融手段获取领土，而非诉诸破坏性战争。通过兼并那慕尔，菲利普在其南部的世袭领地与北部蓬勃发展的商业势力之间，打通了一条至关重要的走廊。"
 flavor_bur.9.b: "打破历史路线，继续由现任继承人继位"
 flavor_bur.13.b: "打破历史路线，另觅一位配偶"
 flavor_bur.17.title: "桥上复仇"
 flavor_bur.17.desc: "An opportunity for [rapprochement|e] has arisen. The [GetUniqueInternationalOrganization('armagnacs_io').GetNameWithNoTooltip] led by the [GetCountry('FRA').GetGovernment.GetHeir.GetName] have agreed to meet [GetCountry('BUR').GetGovernment.GetRuler.GetName] on neutral ground, on the bridge at Monterau. Together they would make a stand against the [GetCountry('ENG').GetAdjective].\n\n[GetCountry('BUR').GetGovernment.GetRuler.GetName] kneels before the Dauphin, and before standing up, is struck between the shoulder blades by the stroke of an axe. Raising his hands to protect himself, another axe blow strikes. Cutting off his hand and creating a hole in his head."
 flavor_bur.17.a: "历史路径：王位由[historic_heir.GetNameWithNoTooltip]继承"
 flavor_bur.17.b: "打破历史路线，继续由现任继承人继位"
 flavor_bur.17.historical_info: "#italic It is through this hole, the English entered France#! - \n\nThe assassination of John the Fearless in 1419 is a catastrophic diplomatic failure for the French Crown. By murdering the Duke during a parley, the Dauphin Charles loses all moral authority in the eyes of the Burgundian court. This act forces the young Philip the Good to seek total independence and legal recognition from the English, effectively splitting the Kingdom of France into two rival administrations for a generation."
 flavor_bur.18.title: "双重继承"
 flavor_bur.18.desc: "圣波尔公爵菲利普之死，使布拉班特和林堡两大公国陷入无直接继承人的境地，这些富庶核心地区的命运就此落入瓦卢瓦‑勃艮第家族之手。作为最近的男性亲属，「好人」菲利普以迅雷之势正式进入布鲁塞尔，其行动之快令法兰西王室和神圣罗马皇帝措手不及。通过接受一份由布拉班特各阶层要求的《喜庆入城宪章》，公爵获得了北方最勤劳且防御最坚固城市。\n\n这次巨大的收获不仅扩张了疆域，更为国家提供了一个新的政治中心，使公爵从一个对北方感兴趣的法国亲王，真正转变为尼德兰的君主。布拉班特与林堡的双狮纹章如今与[ROOT.GetCountry.GetName]的鸢尾花徽章并置，形成了一个连绵一体的强国，主宰着默兹河与迪勒河的贸易路线。"
 flavor_bur.18.a: "接受喜庆入城并稳固王位"
 flavor_bur.18.b: "让这些穷乡僻壤留给当地人争执去吧。"
 flavor_bur.18.historical_info: "1430年布拉班特和林堡的继承，堪称菲利普统治时期最重要的领土收获。与那些购得的领地不同，布拉班特是帝国头等封邑，拥有极高的威望和发达的城镇经济。\n\n为有效治理此地，菲利普开始将宫廷和行政机构从[ROOT.GetCountry.GetCapital.GetName]迁往布鲁塞尔和里尔。这一事件标志着勃艮第尼德兰作为统一政治实体的诞生，为菲利普提供了最终宣布脱离法国实现事实独立所需的财政与军事资源。"
 flavor_bur.19.title: "马孔的割让"
 flavor_bur.19.desc: "1417年，法兰西的政治版图因疯狂与派系斗争而支离破碎，形成一场噩梦。「无畏的」约翰伺机而动，意图利用疯王查理六世无力执政留下的权力真空。这位公爵以王国唯一保护者自居，宣称要同时抵御英格兰入侵与阿马尼亚克派的腐败侵蚀，从而对王后与御前会议施加了难以抗拒的压力。通过一场恫吓与民粹诉求交织的精妙运作，他说服宫廷：若要确保勃艮第人在保卫巴黎时保持忠诚，就必须将至关重要的南部战略要地直接交由他掌控。\n\n马孔地区的割让并非通过正式和约实现，而是作为一场战略贿赂，旨在满足公爵的野心并使其强大的勃艮第继续效命疆场。约翰将这次领土转让包装为法兰西共同福祉的必要牺牲，实则为自己夺取了通往南方的君主级通道——在维持百合花王室忠诚藩属表象的同时，悄然从内部掏空了王权根基。"
 flavor_bur.19.a: "巩固我们对王室的影响力。"
 flavor_bur.19.b: "这片土地不值得费心。"
 flavor_bur.19.historical_info: "1417年，「无畏的」约翰与巴伐利亚的伊莎贝拉王后结盟，在特鲁瓦建立对立政权。通过将阿马尼亚克派描绘成绑架国王的劫匪，约翰为自己夺取王室领地和收入的行为披上合法外衣。在此期间对马孔地区的占领，实质上确立了他虽无摄政之名却行摄政之实的统治地位，使其得以掌控索恩河谷，切断王太子支持者与北方核心区域的联系。"
 flavor_bur.20.title: "代尔夫特和解"
 flavor_bur.20.desc: "为争夺低地国家海上核心的漫长而艰苦的斗争终于迎来了不可避免的结局。巴伐利亚女伯爵杰奎琳在经年内战与英国盟友背弃的双重压力下精疲力竭，最终向勃艮第公国的压倒性力量屈服。\n\n根据《代尔夫特条约》，勃艮第公爵被承认为荷兰、泽兰及埃诺伯国的最高执政官兼合法继承人。这一安排实质上终结了维特尔斯巴赫家族在北方的独立统治，将重要航运港口与莱茵河三角洲枢纽的掌控权移交至勃艮第手中。\n\n菲利普公爵以秩序重建者而非外来征服者的姿态进入沿海城市，承诺终结贵族“钩子派”与城镇“鳕鱼派”之间的血腥仇杀。通过巩固这些领土，公爵将其原本零散的封建领地整合为海上贸易强国，将勃艮第家族的命运牢牢锚定在北海沿岸的丰饶土地与繁忙港口之中。"
 flavor_bur.20.a: "北境守护者"
 flavor_bur.20.b: "我们的贪婪必将受到惩罚。"
 flavor_bur.20.historical_info: "1428年获得“杰奎琳继承权”是勃艮第成为海上强国的转折点。菲利普以摄政保护者身份接管政权，绕过了神圣罗马帝国皇帝对其扩张的反对。这三个郡县从鲱鱼贸易和荷兰商船队中获得了巨额税收，最终为公爵的宫廷奢华提供了资金支持。"
 flavor_bur.21.title: "阿拉斯条约"
 flavor_bur.21.desc: "百年战争的硝烟逐渐散去，「好人」菲利普以一场外交上的神来之笔，放弃了与英格兰的长期联盟，转而与法王查理七世和解。\n\n作为这一转变的代价，法国王室在土地与主权上付出了惊人代价，以满足勃艮第公爵的野心。蓬蒂厄与韦芒杜瓦两郡正式割让给菲利普，构筑起一道坚固的防御壁垒，使低地国家免受王室势力的侵扰。\n\n最重要的是，条约授予公爵在其有生之年免行封建效忠礼的特权，这实际上使[ROOT.GetCountry.GetName]公国在除名义之外的一切层面升格为主权国家。随着阿布维尔、亚眠和圣康坦被移交，北方边境得以稳固，而菲利普也从此不再仅仅是一位封臣，更一跃成为西欧的首要仲裁者。"
 flavor_bur.21.a: "已经取得伟大的和平"
 flavor_bur.21.b: "我们无法参与谈判。"
 flavor_bur.21.historical_info: "1435年的《阿拉斯条约》标志着中世纪晚期的决定性转折点，勃艮第从此不再是法国内战中的一方势力，而成为欧洲公认的强权。\n\n自1419年父亲遇刺后，菲利普作为英格兰不可或缺的盟友已十五年，但到1430年代中期，英格兰在法国的统治已摇摇欲坠。意识到自身利益与这场失败的占领行动不再一致，菲利普迫使查理七世坐上谈判桌。这位国王为切断勃艮第与英格兰的联系不惜代价，不仅为「无畏的」约翰遇刺事件致歉，更割让了长期护卫法国腹地的索姆河防线要塞群。尤为关键的是，免行效忠礼的条款使菲利普无需再向法国国王屈膝，这赋予他实质性的独立地位，并定义了他此后的统治轨迹。"
 flavor_bur.22.title: "获得卢森堡"
 flavor_bur.22.desc: "围绕卢森堡公国的复杂债务与继承权网络终于崩塌，落入了[ROOT.GetCountry.GetName]家族蓄势待发的手中。随着曾将领地抵押给菲利普以换取终身年金的伊丽莎白·冯·格利茨女公爵去世，公爵迅速采取行动，扑灭了日耳曼诸侯们的一切竞争性宣称。\n\n当法律层面的转让落定时，勃艮第军队发动了一场大胆的夜间突袭，夺取了卢森堡要塞，从而在现实层面巩固了这一成果。通过吞并这片崎岖且战略意义重大的领土，菲利普终于连通了其南部祖传领地与北部商业帝国之间的陆桥。此次兼并不仅为国家提供了至关重要的铁与木材资源，更重要的是获得了一座掌控默兹河与摩泽尔河交汇要冲的核心要塞，从而巩固了勃艮第在莱茵边疆的统治地位。"
 flavor_bur.22.a: "桥梁已关闭，国家保持完整。"
 flavor_bur.22.b: "此工程不过是虚荣之举。"
 flavor_bur.22.historical_info: "1443年卢森堡的并入，为「好人」菲利普完成了最后一块关键的地理拼图。多年来，勃艮第国家始终被分割为南北两大区块：南方是祖传的勃艮第公国与伯国，北方则是富庶的低地国家。军队与官员往返两地必须穿越时常怀有敌意的外国领土。\n\n菲利普通过金融解决了这一难题——他买断了膝下无子且债台高筑的伊丽莎白·冯·格尔利茨的继承权。然而当地贵族与神圣罗马皇帝均不承认这笔交易，促使菲利普发动夜袭突袭夺取了都城。作为欧洲最坚固的要塞之一，卢森堡城的陷落使菲利普获得了战略中枢，从此既能向神圣罗马帝国投射力量，又可依托东部屏障抵御日耳曼势力的干涉。"
 flavor_bur.23.title: "大西洋联姻"
 flavor_bur.23.desc: "公爵继承问题在宫廷中日益凸显，「好人」菲利普必须选择一位配偶来确保其分散领地的未来。传统路径指向与法兰西瓦卢瓦家族和解，或与帝国日耳曼诸侯建立战略联姻，但来自遥远葡萄牙海岸的新提议，提供了摆脱欧陆竞争的可能。\n\n这场潜在联姻将为低地国家带来财富与威望，或许能将北方港口转变为新兴商业网络的枢纽。然而，此举意味着背离传统的法兰西势力范围，动摇百合花徽章维系已久的秩序。公爵站在命运的十字路口：是继续做法兰西血统的亲王，还是突破王国传统疆界的局限，开辟捍卫自身主权利益的新道路？"
 flavor_bur.23.a: "但愿他这次能保持忠诚……"
 flavor_bur.23.b: "打破历史路线，另觅一位配偶"
 flavor_bur.23.historical_info: "1430年，「好人」菲利普与葡萄牙的伊莎贝拉联姻，标志着勃艮第战略的根本性转变。在经历两次未能诞育男性继承人的婚姻后，菲利普将目光投向阿维什家族，以巩固其家族统治与贸易利益。伊莎贝拉身为葡萄牙国王若昂一世之女、冈特的约翰之外孙女，本身就是一位举足轻重的政治人物。\n\n这场联姻是勃艮第外交多元化的精心布局——它不仅为菲利普打通了新兴的大西洋贸易航线，更有效化解了英法两国全面围堵的风险。伊莎贝拉迅速成为菲利普最倚重的顾问之一，常以摄政身份治理低地国家，并主导与佛兰德诸城及英格兰王室的微妙谈判。为纪念这场婚礼并彰显新统治期的高尚骑士精神，菲利普在庆典期间创立金羊毛骑士团，进一步将各方贵族凝聚于新任女公爵及其未来继承人的旗帜之下。"
 flavor_bur.24.title: "[target_artist.GetNameWithNoTooltip]的赞助！"
 flavor_bur.24.desc: "诚然，我们最富生机与辉煌的艺术作品，不过是力量与韧性的象征。然而，人类的价值恰恰在于其艺术创作与表达的能力。最能直接体现文化进步、彰显威望的途径，莫过于创造宏伟的艺术作品。如今，低地国家正逢良机——传奇艺术家[target_artist.GetName]近日已开始为其下一部杰作募集赞助资金！"
 flavor_bur.24.a: "我们将赞助[target_artist.GetHerHim]！"
 flavor_bur.24.b: "我们承担不起这笔佣金……"
 flavor_bur.24.historical_info: "「好人」菲利普任命扬·凡·艾克为公爵府的贴身侍从，这一举措标志着勃艮第国家将北方文艺复兴艺术的最前沿成果正式纳入其治国理政的工具体系。菲利普并未把这位画家仅仅视作一名工匠，而是将其视为值得信赖的外交官与心腹幕僚，破格给予他丰厚的薪酬，使他得以潜心钻研油彩罩染技法与超写实细节表现，从而开创出全新的绘画风格。\n\n这种赞助具有双重目的：既创造了一种极致奢华与君权神授的视觉语言，用以合法化公爵新获得的领土；又为菲利普提供了一位能以艺术委托为掩护、秘密出访外国宫廷的使者。通过派遣凡·艾克为潜在新娘绘制肖像或观察远方宿敌，公爵将佛兰德画派的美学光辉融入其外交与政治战略的核心架构，确保勃艮第的形象始终是西方世界最为精妙且文化主导的力量。"
 flavor_bur.25.title: "大议会的宣言"
 flavor_bur.25.desc: "勃艮第公爵颁布全面法令，正式成立大议会，使家族分散多元的领土首次置于统一行政体系之下。在宫殿的宏伟厅堂中，封建顾问们杂乱无章的临时集会，被由职业法学家、文书和财政专家组成的常设机构取代——他们效忠于国家而非地方省份。\n\n这一中央机构兼具最高上诉法院与统一审计院的职能，实质上剥夺了地方阶层解释法律、管理铸币的古老特权。从北方富庶的纺织业中心到南方盛产盐矿的郡县，新兴的公务员阶层开始推行统一的司法与税法体系，全然无视公国间的传统疆界。此举标志着松散头衔的终结，以及主权国家机器的诞生——它完全聚焦于公爵的意志及其专业官僚体系。"
 flavor_bur.25.a: "一部法律，一个国家，一位公爵"
 flavor_bur.25.historical_info: "大议会的设立是勃艮第计划超越脆弱领土共主邦联的关键一步。虽然「好人」菲利普曾采用流动顾问会议，但将其转变为永久性制度特是「好人」菲利普及其继任者「大胆的」查理。\n\n通过建立统一的司法与财政中心为历代公爵分散的领地提供了凝聚核心。这项改革使公爵们得以绕过佛兰德、布拉班特等强大且时常反叛的省级阶层会议，创建仅效忠于公爵的更高权威。这是瓦卢瓦公爵们最重大的内政成就，既为他们的野心提供了必要的结构支撑，也培育出延续至王室覆灭后的专业官僚阶层。"
 flavor_bur.26.title: "勃艮第乐派"
 flavor_bur.26.desc: "百年战争的浩劫使巴黎合唱厅归于沉寂，音乐人才大规模北迁，流向稳定富庶的北方宫廷。随着法兰西王权丧失艺术赞助能力，勃艮第公国崛起为欧陆顶尖作曲家与理论家的新圣地。这批人才的涌入催生出勃艮第乐派，他们以繁复精妙的多声部复调与澄澈辉煌的音色为特征。\n\n通过资助常设公爵礼拜堂，将公爵的巡游合唱团化作流动的主权丰碑。由此诞生的佛兰芒风格正迅速成为时代的权威之声，第戎与布鲁塞尔的殿堂从此回荡着神圣精妙的乐章，足以与王室百合花的古老威望分庭抗礼。"
 flavor_bur.26.a: "我们必须抓住这个机会。"
 flavor_bur.26.b: "这简直是浪费时间和金钱。"
 flavor_bur.26.historical_info: "勃艮第乐派的兴起，是英格兰入侵法国所造成政治真空的直接结果。\n\n欧洲音乐的前沿阵地原本以巴黎和巴黎圣母院为中心，为躲避内乱和经济崩溃而向东迁移。「好人」菲利普及其继任者抓住这一机遇，利用佛兰德斯的财富组建了由专业歌手和作曲家组成的宫廷礼拜堂，其中就包括纪尧姆·迪费这样的人物。\n\n这一思潮成为软实力的重要工具；随着勃艮第宫廷在其各领地间迁移，其音乐展现出稳定、虔诚和巨富的形象。这种国际风格最终弥合了中世纪音乐结构与文艺复兴和声之间的鸿沟，使勃艮第宫廷成为整个基督教世界的审美仲裁者。"
 flavor_bur.27.title: "[target_artist.GetNameWithNoTooltip]是一位冉冉升起的新星"
 flavor_bur.27.desc: "这位时代最负盛名的作曲家[target_artist.GetNameWithNoTooltip]已从意大利教廷回来，为勃艮第家族效力。\n\n他的回归标志着公爵礼拜堂对其宿敌的最终胜利，他带来了对“福布尔东”风格的掌握以及对复调弥撒曲的革命性诠释。\n\n杜费的存在将宫廷音乐礼仪提升至一种数学与旋律完美结合的境界，据传这乃是天界之音在尘世的回响，通过一种独特且超凡的乐音，将低地国家与勃艮第核心领地编织在一起。"
 flavor_bur.27.a: "我们将赞助[target_artist.GetHerHim]！"
 flavor_bur.27.b: "我们承担不起这笔佣金……"
 flavor_bur.27.historical_info: "纪尧姆·迪费是勃艮第乐派的核心人物，也可能是15世纪欧洲最具影响力的作曲家。尽管他长期服务于意大利教廷及马拉泰斯塔家族，但与瓦卢瓦公爵们，尤其是「好人」菲利普的深厚关系，为其伟大作品奠定了财力与政治基础。\n\n迪费的音乐融合了法国新艺术的繁复技法、英格兰风尚的流畅旋律，以及意大利文艺复兴初期的结构明晰性。在公爵势力的支持下，他受任为康布雷大教堂教士，由此成为勃艮第公国的音乐缔造者，为其最重要的外交联姻、条约缔结与宗教仪式谱写了配乐。"
 flavor_bur.28.title: "西方大公的逝世"
 flavor_bur.28.desc: "在近五十年的统治之后，「好人」菲利普漫长且繁荣的时代终于落下帷幕。这位将破碎封地整合为基督教世界最精致宫廷的公爵，在布鲁日与世长辞。在他稳健的治理下，「西方大公国」成为欧洲品味的仲裁者、艺术的庇护所、列王的金库。然而，当圣多纳廷大教堂的丧钟为他敲响时，庆典的欢愉已被阴影笼罩。"
 flavor_bur.28.a: "历史路径：[historic_heir.GetNameWithNoTooltip]将登基"
 flavor_bur.28.b: "打破历史路线，继续由现任继承人继位"
 flavor_bur.28.historical_info: "「好人」菲利普是瓦卢瓦‑勃艮第家族当之无愧的伟大公爵。他在百年战争的乱局中巧妙周旋，通过《阿拉斯条约》转换阵营，确保了勃艮第脱离法国独立。通过兼并那慕尔、布拉班特、林堡、埃诺、荷兰与泽兰，他在低地国家建立起连片的权力基地，足以与欧洲主要王国抗衡。他的宫廷是当时最奢华的，曾以盛宴」名于世；他创立的金羊毛骑士团构建了由高级贵族组成的忠诚网络，使其成员与家族形成个人依附关系。他的逝世标志着一个审慎扩张时代的终结，也开启了其子「大胆」查理那场最终导致家族覆灭的激进集权化进程。"
 flavor_bur.29.title: "莱茵边境"
 flavor_bur.29.desc: "一个连接南部核心地带与北部省份领土的战略机遇已然浮现。负债累累的上阿尔萨斯伯国和费雷特郡正以巨额黄金为抵押待价而沽。此次收购将构成沿莱茵河主干道建立连贯国家所需的关键地理纽带。\n\n掌控这些土地后，当局将直接获得丰厚的河流通行税征收权，并在对抗阿尔卑斯邦联时取得前沿阵地。然而，将国家旗帜如此深入地插进上莱茵地区，标志着影响力的扩张将引起皇帝与邻近山地省份的警觉。"
 flavor_bur.29.a: "千载难逢的机会"
 flavor_bur.29.b: "我们不会为皇帝提供资金。"
 flavor_bur.29.historical_info: "1469年，「大胆」查理利用奥地利西吉斯蒙德的财政困境，成功签订了《圣奥梅尔条约》。这次购买是公爵宏伟计划的基石，旨在将其分散的领土连接成一个统一的中间王国。为管理这片新边疆，他任命了强硬的执行官彼得·冯·哈根巴赫。\n\n随后的勃艮第统治以冷酷高效的税收现代化和镇压地方盗匪为特征，但其严苛手段疏远了莱茵河沿岸城镇。面对莱茵河畔可能出现的永久性中央集权势力，瑞士各邦、法兰西国王以及神圣罗马帝国皇帝被迫联手，共同对抗勃艮第的扩张野心。"
 flavor_bur.30.title: "特里尔会晤"
 flavor_bur.30.desc: "勃艮第公爵们毕生奋斗的目标，如今都凝聚在这场与皇帝的关键会晤之中。谈判异常激烈，一旦破裂，后果不堪设想。我们是否应以割让勃艮第为代价，谋求神圣罗马帝国皇位？抑或冒犯法兰西，甘作帝国附庸？又或者请求帝国出兵相助，以捍卫独立，并加冕称王？勃艮第的前途命运，正悬于一线之间。"
 flavor_bur.30.a: "出售公国并收买选帝侯，[GetCountry('BUR').GetGovernment.GetRuler.GetName]将成为皇帝。"
 flavor_bur.30.tt1: "[GetCountry('BUR').GetGovernment.GetRuler.GetName]实现了他的个人抱负，他将成为皇帝，并在其去世后，[target_character.GetName]将继承公爵领地。"
 flavor_bur.30.b: "勃艮第已赢得王冠"
 flavor_bur.30.tt2: "[GetCountry('BUR').GetGovernment.GetRuler.GetName]将请求[target_character.GetName]为其加冕。然而，代价高昂，无疑会招致法国的怒火。"
 flavor_bur.30.c: "换了一个主子，又来一个主子"
 flavor_bur.30.tt3: "[GetCountry('BUR').GetGovernment.GetRuler.GetName]将寻求妥协。勃艮第将保留公国地位，但加入[GetUniqueInternationalOrganization('hre').GetName]。作为回报，查理将成为西部教区总代理——守护帝国的西翼。\n\n[ShowGovernmentReformName('vicarship_of_the_west')]将允许玩家在未经皇帝许可的情况下解放神罗成员国。"
 flavor_bur.30.d: "打破历史的枷锁，我们将开辟属于自己的道路！"
 flavor_bur.30.tt4: "以上选项均为架空历史。若你希望开创自己的道路，请选择此选项。"
 flavor_bur.30.historical_info: "1473年的特里尔会晤是勃艮第公国一场决定性的外交豪赌，「大胆」查理试图用巨额财富与继承人玛丽的婚约，换取重建洛塔林吉亚王国。整整两个月，这位公爵以「勃艮第式奢华」震慑神圣罗马帝国皇帝腓特烈三世——镶嵌钻石的甲胄与描绘亚历山大大帝的挂毯，无不彰显其家族足以比肩基督教世界任何王室血脉。这场博弈的赌注，是建立一个介于法兰西与神圣罗马帝国之间的主权缓冲国「中部王国」，从而彻底改变西欧的力量平衡。\n\n然而，当皇帝被公爵激进的野心与日耳曼诸侯们的抗议所震慑，最终趁夜色逃离特里尔时，这场峰会以屈辱的僵局告终。这场「特里尔夜遁」使勃艮第的法律地位陷入岌岌可危的悬置状态——查理未能获得整合分散领土所必需的王室正统性。由于缺乏统一名分，公爵只能依靠赤裸的军事力量推进宏图，这条道路最终将他引向了与瑞士邦联及法兰西王室的致命对决。"
 flavor_bur.33.title: "冰封之地"
 flavor_bur.33.desc: "随着君主在战场上猝然离世，统一国家的愿景已然破碎。\n\n这位领袖在一场失败的围城战中殒命，其离世瞬间让中央集权机器的齿轮停止转动，导致行政体系陷入全面瘫痪。\n\n当消息从前线传开，维系南方腹地与北方商业城市的脆弱纽带开始断裂，法兰西王室的阴影比以往任何时候都更沉重地笼罩在这片群龙无首的省份之上。"
 flavor_bur.33.a: "玛丽女公爵万岁！"
 flavor_bur.33.tt1: "[historic_heir.GetName]将继承查理的王位。她目前未婚，未来几周内将面临日益增长的压力，要求她接受一项婚姻提议。"
 flavor_bur.33.b: "打破历史路线，继续沿用我当前的继承人"
 flavor_bur.33.tt2: "恭喜你，你避免了查理曾犯下的一个错误——未能诞育男性继承人。在这个时间线里，勃艮第继承问题将不复存在。继续你的征程，让勃艮第变得伟大吧。\n\n警告：这将是瓦卢瓦角色风味事件的终结。"
 flavor_bur.33.c: "打破历史路线，这不过是一场梦"
 flavor_bur.33.tt3: "[GetCountry('BUR').GetGovernment.GetRuler.GetName]逃离了死神，继续他的计划，未受历史事件的侵扰。\n\n警告：这将是瓦卢瓦角色相关特色事件的终结。"
 flavor_bur.33.historical_info: "1477年1月5日，「大胆」查理在南锡战役中阵亡，瓦卢瓦王朝的勃艮第公爵男性血脉就此断绝。\n\n查理生命的最后几年深陷与由瑞士、日耳曼及法国势力组成的同盟，进行疯狂且耗竭的战争循环。\n\n他的死立刻引发了地缘政治真空，法王路易十一旋即以封地失效为由夺取勃艮第公国，而富庶的佛兰德与布拉班特诸城则因不堪中央政权重税盘剥，正酝酿反抗。这个“中部王国”的未来，如今全系于其二十岁的女儿玛丽一身，她必须在国土分裂与寻求庇护的联姻之间作出抉择。"
 flavor_bur.34.title: "勃艮第遗产"
 flavor_bur.34.desc: "家族的未来，全系于年轻女公爵的婚姻。三级会议已在根特召开，他们的忠诚取决于王室配偶所能提供的庇护。三大强国环绕着群龙无首的省份，各自提供不同的道路：帝国的正统性、法兰西王室的强制和解，或是英格兰十字的海上屏障。这一选择将决定勃艮第的事业是作为主权国家存续，还是被邻国瓜分。\n\n历史的轨道在此终结。风味事件仍将继续，但瓦卢瓦‑勃艮第家族的历史到此为止。"
 flavor_bur.34.a: "确保获得[GetUniqueInternationalOrganization('hre').GetName]的保护"
 flavor_bur.34.tt1: "当前领地局势不稳，法国显然会试图收复失地，而佛兰德诸城则压倒性地支持皇帝。我们必须为冲突做好准备。"
 flavor_bur.34.b: "与法国和解"
 flavor_bur.34.tt2: "显然我们应该寻求与法国和解。不过，皇帝必定会试图在低地国家重新确立他的影响力。"
 flavor_bur.34.c: "勃艮第概不出售！"
 flavor_bur.34.tt3: "英格兰提出了第三条道路。我们将选择一位地位较低的贵族，确保玛丽在宫廷中保留权力。毫无疑问，我们的邻国将趁我们虚弱之际占尽便宜。为战争做好准备才是明智之举……"
 flavor_bur.34.historical_info: "“大胆的”查理去世后，勃艮第的玛丽成为欧洲最炙手可热的继承人。法国国王路易十一试图强迫其子——王太子查理与玛丽联姻，以和平吞并勃艮第领土。与此同时，佛兰德诸城邦倾向于恢复与英格兰的联盟以保护羊毛贸易。最终，玛丽将命运掌握在自己手中，向神圣罗马帝国皇帝之子、奥地利的马克西米利安寄去书信与戒指。1477年8月两人的婚姻使尼德兰免遭法国吞并，却也让该区域陷入长达数个世纪的哈布斯堡统治，并引发了法国与帝国之间世代延续的冲突。"
 flavor_bur.35.title: "[GetCountry('FRA').GetGovernment.GetRuler.GetName]勃然大怒"
 flavor_bur.35.desc: "[GetCountry('FRA').GetGovernment.GetRuler.GetName]绝不会坐视其继承人与[GetCountry('BUR').GetGovernment.GetRuler.GetName]联姻的机会白白溜走。外交官已派出，我们两国现已进入战争状态。"
 flavor_bur.35.a: "我们绝不再受巴黎的统治！"
 flavor_bur.36.title: "[GetUniqueInternationalOrganization('hre').GetName]开始动员"
 flavor_bur.36.desc: "据悉皇帝勃然大怒。[GetCountry('BUR').GetGovernment.GetRuler.GetName]的联姻选择为神圣罗马皇帝收回帝国领地提供了理由。"
 flavor_bur.36.a: "集结号角已响，捍卫东部边疆！"
 flavor_bur.37.title: "金婚"
 flavor_bur.37.desc: "1468年夏，布鲁日已化身为勃艮第无与伦比辉煌的剧场。为巩固对抗法兰西的伟大联盟，查理公爵以一场旨在震慑欧洲诸国宫廷的盛典，迎来了英格兰国王爱德华四世之妹——约克的玛格丽特。金婚不仅是浪漫的结合，更是宣言，向世界传递的信息清晰无比：勃艮第不再是法兰西的附庸，而是以英格兰王权为后盾的独立强国。"
 flavor_bur.37.a: "一场针对巴黎的大同盟"
 flavor_bur.37.b: "打破历史路线，另觅一位配偶"
 flavor_bur.37.historical_info: "“大胆的”查理与约克的玛格丽特的联姻，堪称15世纪最成功的外交谋略之一。玛格丽特成为勃艮第宫廷中举足轻重的政治人物，在英格兰出口经济与佛兰德纺织中心之间架起了桥梁。即便在查理去世后，玛格丽特依然是勃艮第独立的坚定捍卫者，并如芒刺般令法兰西国王寝食难安。"
 flavor_bur.17.a.tt: "[rapprochement|e] will be set to 0%"
 flavor_bur.17.b.tt: "[rapprochement|e] will be set to 0%"
 flavor_bur.38.title: "The Mad [GetCountry('FRA').GetGovernment.GetRulerTitle]"
 flavor_bur.38.desc: "Whilst riding on a local campaign, [GetCountry('FRA').GetGovernment.GetRuler.GetName] grew weary from the midday sun, and the long, journey. A beggar from the side of the road accosts the [GetCountry('FRA').GetGovernment.GetRulerTitle]\n\n#italic You will be betrayed!#! the beggar repeats.\n\nThe [GetCountry('FRA').GetGovernment.GetRulerTitle] gets agitated further, and in a burst of rage shouts #italic The enemies are among us!#! and drawing their sword, they cut down their closest retinue members. After some time has passed, [GetCountry('FRA').GetGovernment.GetRulerTitle] is restrained and the bout of madness is over."
 flavor_bur.38.a: "What does this mean for the realm?"
 flavor_bur.38.historical_info: "The sun beat down with a suffocating intensity as King Charles VI led his army through the Forest of Le Mans, his mind already frayed by a lingering fever and the weight of a looming campaign. The stillness of the woods was suddenly shattered when a ragged, wild-eyed beggar leaped from the shadows, seizing the King's bridle and howling a prophetic warning that he had been betrayed. Though the man was driven off, the seed of paranoia was planted. Moments later, the silence was broken again by the sharp, metallic clang of a page's lance striking a soldier's helmet. This sudden noise acted as a psychological trigger; Charles, convinced the 'traitors' were finally upon him, drew his sword and charged headlong into his own bewildered retinue.\n\nThe ensuing carnage was a grim spectacle as the King, possessed by a frantic and superhuman strength, cut down at least four of his own knights while screaming for their blood. It took several men to finally wrestle him from his horse and restrain him, marking the tragic end of his lucidity and the beginning of a long descent into a fractured reality. This singular moment of violence effectively decapitated the French leadership, transforming the once-adored and beloved king into a terrified monarch who would eventually believe his own body was made of fragile glass. His instability invited decades of civil strife and power struggles, as the Crown of France became a prize for warring factions to seize from a man who no longer recognized his own family."
 flavor_bur.39.title: "The Mad [GetCountry('FRA').GetGovernment.GetRulerTitle]"
 flavor_bur.39.desc: "Whilst riding on a local campaign, [GetCountry('FRA').GetGovernment.GetRuler.GetName] grew weary from the midday sun, and the long, journey. A beggar from the side of the road accosts the [GetCountry('FRA').GetGovernment.GetRulerTitle]\n\n#italic You will be betrayed!#! the beggar repeats.\n\nThe [GetCountry('FRA').GetGovernment.GetRulerTitle] gets agitated further, and in a burst of rage shouts #italic The enemies are among us!#! and drawing their sword, they cut down their closest retinue members. After some time has passed, [GetCountry('FRA').GetGovernment.GetRulerTitle] is restrained and the bout of madness is over."
