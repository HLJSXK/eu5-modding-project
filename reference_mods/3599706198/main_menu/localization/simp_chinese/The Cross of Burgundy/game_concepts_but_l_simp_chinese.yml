l_simp_chinese:
 game_concept_court_tension: "Court Tension"
 game_concept_court_tension_desc: "The Faction that holds sway over the [GetCountry('FRA').GetAdjective] Court can take actions what will increase or ease tensions with the opposing Faction. If tension gets too high, war will break out. If tension is low, there is the chance for reconciliation."
 game_concept_political_capital: "Political Capital"
 game_concept_political_capital_desc: "The Regency Faction can spend their hard-won Political Capital to their advantage in the ongoing conflict. The more that is spent, the higher tensions will rise. If the Factions wish to reconcile, it may be best not to antagonise."
 game_concept_the_opposition: "Opposition"
 game_concept_the_opposition_desc: "The Opposition represents the faction currently excluded from the [GetCountry('FRA').GetAdjective] Court. Whilst they lack the legal mandate to govern France, their influence remains deep within our own lands and among the disgruntled vassals of the realm.\n\nTo place themselves in [the_regency], they must increase the [court_tension] until a state of open conflict is reached. Only by defeating the current [regent] in a War for the Regency can they claim their place as the new Authority in the Kingdom."
 game_concept_the_regency: "Regency"
 game_concept_the_regency_desc: "The Regency represents the faction currently holding the King's Seal and the mandate to rule France in the monarch's name. They are the official voice of the Crown, the stewards of the Treasury, and the masters of the Royal Council.\n\nWielding this power allows for the direct exploitation of royal levies and wealth to further factional goals. However, such actions are inherently provocative, rapidly increasing [court_tension] and inviting subversion from the [the_opposition]. The Regent must eventually choose between aggressive self-interest, which risks a full-scale military coup, or pursuing a peaceful settlement to stabilize the fractured realm."
 game_concept_rapprochement: "Rapprochement"
 game_concept_rapprochement_desc: "Given time, both sides have an opportunity to reconcile their differences, return strength to the [GetCountry('FRA').GetAdjective] Court and face the English threat as a unified front. However, actions such as renewed hostilities will set the clock back."
 game_concept_victories: "Victories"
 game_concept_victories_desc: "In the ongoing struggle for control of the [GetCountry('FRA').GetAdjective] Court, each side must secure enough victories in open conflict, to claim the regency and ensure all of France's vassals fall in line."