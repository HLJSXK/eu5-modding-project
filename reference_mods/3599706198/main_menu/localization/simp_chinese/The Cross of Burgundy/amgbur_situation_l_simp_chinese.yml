l_simp_chinese:
 AMGBUR_war: "Armagnac-Burgundian Civil War"
 AMGBUR_war_desc: "The [GetUniqueInternationalOrganization('armagnacs_io').GetName] and [GetUniqueInternationalOrganization('burgundians_io').GetName] have been fighting for dominance over the [GetCountry('FRA').GetAdjective] Court for decades. Amidst the chaos of The [GetSituationByKey('hundred_years_war').GetName], this feuding has turned in to all-out war."
 armagnacs_io: "Armagnacs"
 burgundians_io: "Burgundians"
 amg_faction: "[GetUniqueInternationalOrganization('armagnacs_io').GetName] Faction"
 bur_faction: "[GetUniqueInternationalOrganization('burgundians_io').GetName] Faction"
 tension: "Court Tension"
 rapprochement: "Rapprochement"
 victories: "Victories"
 political_capital: "Political Capital"
 court_tension_tt: "The Court Tension is currently [GetReligionByKey('catholic').GetReformDesire|2%Y] and it changes monthly by [GetReligionByKey('catholic').GetModifierValue('monthly_reform_desire')|+=2]"
 political_capital_tt: "Political Capital is currently [FixedPointToFloat(SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('political_capital').GetValue)|-=2%]."
 the_opposition_tt: "The Opposition represents the faction currently excluded from the French Court. Whilst they lack the legal mandate to govern France, their influence remains deep within our own lands and among the disgruntled vassals of the realm.\n\nTo place themselves in [the_regency], they must increase the [court_tension] until a state of open conflict is reached. Only by defeating the current [regent] in a War for the Regency can they claim their place as the new Authority in the Kingdom."
 the_regency_tt: "The Regency represents the faction currently holding the King's Seal and the mandate to rule France in the monarch's name. They are the official voice of the Crown, the stewards of the Treasury, and the masters of the Royal Council.\n\nWielding this power allows for the direct exploitation of royal levies and wealth to further factional goals. However, such actions are inherently provocative, rapidly increasing [court_tension] and inviting subversion from the [the_opposition]. The Regent must eventually choose between aggressive self-interest, which risks a full-scale military coup, or pursuing a peaceful settlement to stabilize the fractured realm."
 amg_victories_tt: "[GetUniqueInternationalOrganization('armagnacs_io').GetName] have won [GetUniqueInternationalOrganization('armagnacs_io').GetVariable('amg_progress')] wars against the [GetUniqueInternationalOrganization('burgundians_io').GetName]."
 bur_victories_tt: "[GetUniqueInternationalOrganization('burgundians_io').GetName] have won [GetUniqueInternationalOrganization('burgundians_io').GetVariable('bur_progress')] wars against the [GetUniqueInternationalOrganization('armagnacs_io').GetName]."
 the_opposition: "The Opposition"
 the_regency: "The Regency"
 RAPPROCHEMENT_PROGRESS_TEXT: "The current Progress to Rapprochement is [GetSituationByKey('AMGBUR_war').MakeScope.GetVariable('rapprochement').GetValue]%\nIt is increasing each month by 0.2%"
 regent: "Regent"
 AMGBUR_AMG_LEADER: "Armagnacs Leader"
 AMGBUR_BUR_LEADER: "Burgundians Leader"
 AMGBUR_war_amg_end_trigger_tt: "The [GetUniqueInternationalOrganization('armagnacs_io').GetName] have achieved #Y 3#! [victories|e] (currently: #Y [GetUniqueInternationalOrganization('armagnacs_io').GetVariable('amg_progress')|V0]#!)"
 AMGBUR_war_bur_end_trigger_tt: "The [GetUniqueInternationalOrganization('burgundians_io').GetName] have achieved #Y 3#! [victories|e] (currently: #Y [GetUniqueInternationalOrganization('burgundians_io').GetVariable('bur_progress')|V0]#!)"
 AMGBUR_war_rapprochement_trigger_tt: "[rapprochement|e] has reached #Y 100%#!. (currently: #Y [SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('rapprochement').GetValue|Y0]%#!)"
 siphon_treasury: "Siphon [gold|e] from the [GetCountry('FRA').GetAdjective] Treasury"
 siphon_treasury_desc: "We must shore up our position and fund this conflict. We have friends at Court who can help us..."
 purge_advisors: "Replace Royal Advisors"
 purge_advisors_desc: "To ensure we have the ear of the [GetCountry('FRA').GetGovernment.GetRulerTitle], we can replace opposing advisors in the [GetCountry('FRA').GetAdjective] Court with our own."
 depart_conflict: "Depart this Conflict"
 depart_conflict_desc: "There is nothing for us to gain supporting either the [GetUniqueInternationalOrganization('burgundians_io').GetName] or the [GetUniqueInternationalOrganization('armagnacs_io').GetName]. [GetCountry('FRA').GetName] suffers too much, and we will play no further part."
 resume_conflict: "#R Resume Hostilities#!"
 resume_conflict_desc: "Victory will only be achieved through the sword. They must pay, and we shall overcome. Reconciliation can wait."
 anoint_dauphin: "#P Anoint the Dauphin#!"
 anoint_dauphin_desc: "Choosing this option is an act of desparation. It is a gamble that may unit all [GetCountry('FRA').GetAdjective] [subjects|e] against the [GetUniqueInternationalOrganization('burgundians_io').GetName]"
 bur_progress: "Victories"
 amg_progress: "Victories"
 declare_for_england: "#P Declare for England#!"
 declare_for_england_desc: "It is a desperate gamble, but appealing to the [GetCountry('ENG').GetAdjective] might be our only chance of survival. [GetCountry('FRA').GetName] needs a stable [GetCountry('FRA').GetGovernment.GetRulerTitle] and we shall deliver."
 rapprochement_reset: "[rapprochement|e] will be set to 0%"