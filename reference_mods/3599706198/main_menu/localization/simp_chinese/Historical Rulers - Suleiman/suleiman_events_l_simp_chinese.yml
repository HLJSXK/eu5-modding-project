 STATIC_MODIFIER_DESC_ottoman_ai_expansion_reduced: "奥斯曼帝国推行扩张政策，效果适度减弱。"
 STATIC_MODIFIER_NAME_mehmed_conqueror_ai_reduced: "穆罕默德的征服"
 STATIC_MODIFIER_DESC_mehmed_conqueror_ai_reduced: "在征服者穆罕默德统治时期，奥斯曼军队在战争中自动征服领土，效果适度减弱。"
