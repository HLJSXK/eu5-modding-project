l_simp_chinese:
 suleiman.1.title: "王子诞生"
 suleiman.1.desc: "苏丹喜得贵子！孩子被命名为苏莱曼，意为“和平的”或“所罗门”。宫廷占星师预言这位王子将成就非凡，整个帝国都为奥斯曼王朝的延续而欢欣鼓舞。"
 suleiman.1.a: "愿真主赐予他智慧与力量！"
 suleiman.2.title: "前途无量的王子"
 suleiman.2.desc: "苏莱曼王子已成长为一位品质非凡的年轻人。他的导师们报告称，他在武术和学术方面都表现出色。他对诗歌、书法和治国艺术展现出特别的兴趣。这位年轻的王子还精通金属加工，并已开始学习金匠工艺。许多人相信他注定会成就伟业。"
 suleiman.2.a: "他会成为一位出色的苏丹！"
 suleiman_traits_added_tt: "苏莱曼获得了“征服者”和“立法者”特质。"
 suleiman.3.title: "苏莱曼的统治开始"
 suleiman.3.desc: "苏莱曼已登上奥斯曼帝国的王座。年仅[suleiman_char.GetAgeInYears]岁的他，从父亲手中继承了一个幅员辽阔、国力强盛的帝国。这位年轻的苏丹早已展现出作为战士与统治者的卓越才能。整个帝国正满怀期待，关注着他将为统治之路选择何种方向。"
 suleiman.3.a: "苏莱曼苏丹万岁！"
 suleiman.4.title: "苏莱曼之路"
 suleiman.4.desc: "苏莱曼苏丹正站在一个十字路口，他可以奥斯曼帝国引向前所未有的巅峰。他会选择军事征服的道路，在欧洲各国赢得“”“大帝”的称号吗？抑或专注于内部改革，在自己的人民中赢得“立法者”的美名？这些选择不仅将决定他的统治，更将影响未来数代奥斯曼帝国权力的本质。"
 suleiman.4.a: "我们将成为伟大的存在！我们的军队将让世界颤抖！"
 suleiman.4.b: "我们将成为立法者！我们的国家将成为正义与秩序的灯塔！"
 suleiman_magnificent_chosen_tt: "“大帝”苏莱曼获得强大的军事加成：战争分数花费‑50%，士气+15%，攻城能力+15%。"
 suleiman_lawgiver_chosen_tt: "“立法者”苏莱曼将获得强大的行政加成：-33%外交吞并花费，+2/+1宗教容忍度，+5%识字率。"
 suleiman.5.title: "一个时代的终结"
 suleiman.5.desc: "苏莱曼的统治已经结束。"
 suleiman.5.a: "他的遗产将永存于世。"
 suleiman.6.title: "手足相残继承制"
 suleiman.6.desc: "奥斯曼帝国弑亲的传统沉重地笼罩着皇宫。苏丹日渐年迈，继承问题迫在眉睫。苏莱曼王子天赋异禀，是最有能力的继承人。然而，其他皇室王子也对王位虎视眈眈。\n\n古老的法律允许，甚至要求消灭竞争对手以避免内战。我们是否应当启用这一黑暗传统，为苏莱曼的掌权之路扫清障碍？"
 suleiman.6.a: "让兄弟相残，苏莱曼必须统治！"
 suleiman.6.b: "让命运来决定继承权。"
 suleiman_fratricide_done_tt: "所有敌对王子已被处决，苏莱曼通往王位的道路现已畅通无阻。"
 suleiman_fratricide_skipped_tt: "王子们将按照命运的旨意争夺王位。"
 STATIC_MODIFIER_NAME_suleiman_the_magnificent_character: "苏莱曼大帝"
 STATIC_MODIFIER_DESC_suleiman_the_magnificent_character: "这位传奇苏丹的统治标志着奥斯曼帝国权力的巅峰。"
 STATIC_MODIFIER_NAME_suleiman_the_magnificent_modifier: "大帝"
 STATIC_MODIFIER_DESC_suleiman_the_magnificent_modifier: "在苏莱曼大帝的统治下，奥斯曼帝国凭借压倒性的军事力量扩张疆域。如同先前的帖木儿，这位苏丹作为征服者的赫赫威名，使他在和平谈判中获得了巨大让步，并令敌军闻风丧胆。"
 STATIC_MODIFIER_NAME_suleiman_the_lawgiver_modifier: "立法者"
 STATIC_MODIFIER_DESC_suleiman_the_lawgiver_modifier: "在立法者苏莱曼的统治下，奥斯曼帝国经历了历史上最全面的法律改革。《奥斯曼法典》为整个帝国带来了秩序与公正，而宗教宽容政策则让不同民族与信仰得以共存共荣。"
 HEIR_SELECTION_SULEIMAN_DESTINY_DESC: "注定伟大"
 HEIR_SELECTION_CONQUEROR_TRAIT_DESC: "征服者"
 HEIR_SELECTION_LAWGIVER_TRAIT_DESC: "立法者"
