l_simp_chinese:
 rule_ottoman_ai_expansion: "AI奥斯曼帝国扩张"
 setting_historical_ottoman_expansion: "史实扩张"
 setting_historical_ottoman_expansion_desc: "AI奥斯曼帝国会按照历史扩张，在1683年前获得增益效果。第二次维也纳之围后，所有扩张增益将被移除以模拟奥斯曼帝国的衰落。"
 setting_historical_ottoman_expansion_reduced: "历史扩张（削弱版）"
 setting_historical_ottoman_expansion_reduced_desc: "与历史扩张相同，但所有修正效果均被适度削弱。"
 setting_aggressive_ottoman_expansion: "激进扩张"
 setting_aggressive_ottoman_expansion_desc: "AI奥斯曼帝国获得永久扩张加成，且不会触发衰落事件。奥斯曼帝国在整个游戏过程中始终保持强大。"
 setting_aggressive_ottoman_expansion_reduced: "激进扩张（削弱版）"
 setting_aggressive_ottoman_expansion_reduced_desc: "与激进扩张相同，但所有修正效果均被适度削弱。"
 setting_disabled_ottoman_expansion: "无AI加成"
 setting_disabled_ottoman_expansion_desc: "禁用所有特殊AI扩张修正和隐藏事件。AI控制的奥斯曼帝国将像其他没有特殊加成的国家一样行事。"
 rule_mehmed_ii_events: "穆罕默德二世事件"
 setting_mehmed_ii_enabled: "启用"
 setting_mehmed_ii_enabled_desc: "“征服者”穆罕默德二世将在1432年左右出生，包括完整的事件链，涵盖特质、弑兄以及传承选择（征服者/建设者路径）。"
 setting_mehmed_ii_reduced: "启用（削弱版）"
 setting_mehmed_ii_reduced_desc: "穆罕默德二世的事件将会触发，但其所有传承选择带来的修正效果将适度减弱。"
 setting_mehmed_ii_disabled: "禁用"
 setting_mehmed_ii_disabled_desc: "穆罕默德二世相关事件将不会触发。在此期间，奥斯曼不会生成特殊历史人物。"
 rule_suleiman_i_events: "苏莱曼一世事件"
 setting_suleiman_i_enabled: "启用"
 setting_suleiman_i_enabled_desc: "苏莱曼大帝将在在1494年左右出生，并有一系列完整的事件链，包括特质、弑兄以及传承选择（大帝/立法者路径）。"
 setting_suleiman_i_reduced: "启用（削弱版）"
 setting_suleiman_i_reduced_desc: "苏莱曼一世的事件将会触发，但其所有传承选择带来的修正效果将适度减弱。"
 setting_suleiman_i_disabled: "禁用"
 setting_suleiman_i_disabled_desc: "苏莱曼一世相关事件将不会触发。在此期间，奥斯曼不会生成特殊历史人物。"