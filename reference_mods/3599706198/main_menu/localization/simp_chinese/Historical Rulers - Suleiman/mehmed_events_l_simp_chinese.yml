l_simp_chinese:
 mehmed.1.title: "王子诞生"
 mehmed.1.desc: "苏丹喜得贵子！孩子被命名为穆罕默德，这是奥斯曼帝国第三位承袭此尊贵名号的苏丹。宫廷占星师预言这位皇子将拥有非凡的未来，整个帝国都为奥斯曼王朝的延续而欢欣鼓舞。 "
 mehmed.1.a: "愿真主指引他走向辉煌！"
 mehmed.2.title: "一位准备统治的王子"
 mehmed.2.desc: "穆罕默德王子已成长为一位意志坚定、抱负非凡的年轻人，而且早在十二岁时就曾被任命为苏丹，虽然不久后被召回。他的导师们报告称，他最为痴迷的目标只有一个：征服君士坦丁堡——那座数代奥斯曼人可望而不可及的伟大城市。这位年轻的王子研究着古老的城墙，学习攻城技艺，梦想着成为最终占领“第二罗马”的那个人。"
 mehmed.2.desc.conquered: "穆罕默德王子已成长为一位意志坚定、抱负非凡的年轻人，而且早在十二岁时就曾被任命为苏丹，虽然不久后被召回，如今帝国已经征服了科斯坦丁尼耶，但这位年轻王子的野心远不止于此。他梦想着继续征战，推翻东西方的强国，将奥斯曼的荣耀传遍世界。"
 mehmed.2.a: "他的野心无边无际！"
 mehmed_traits_added_tt: "苏莱曼获得了“征服者”和“勇士”特质。"
 mehmed.6.title: "手足相残继承制"
 mehmed.6.desc: "我们的苏丹日渐年迈，继承问题给宫廷蒙上了不祥的阴影。王子穆罕默德是他儿子中最能干、最有野心的，但他还有兄弟。在奥斯曼帝国，多位王子间的内战总会削弱国力。确保穆罕默德继位的唯一方法，就是清除其他王位竞争者。这习俗虽残酷，却可能是帝国稳定所必需的，穆罕默德本人日后将把这条规则编纂为法律。"
 mehmed.6.a: "为了帝国的稳定，处决这些兄弟。"
 mehmed.6.b: "让命运来决定，我们不应干预。"
 mehmed_fratricide_done_tt: "穆罕默德的兄弟对手已被处决，他的继位现已稳固。这一做法后来被制度化，成为“手足相残继承制”。"
 mehmed_fratricide_skipped_tt: "穆罕默德的兄弟们得以幸免，继承权交由命运决定。"
 mehmed.3.title: "穆罕默德二世统治开始"
 mehmed.3.desc: "穆罕默德第二次也是最后一次登上了奥斯曼帝国的王座。年仅[mehmed_char.GetAgeInYears]岁的他，继承了一个进军伟大的王国。这位年轻的苏丹有一个压倒一切的雄心——征服科斯坦丁尼耶，并将其打造为新帝国的核心。那座古老城市的雄伟城墙正静候着挑战者的到来。"
 mehmed.3.desc.conquered: "穆罕默德已第二次也是最后一次登上奥斯曼帝国的王座。年仅[mehmed_char.GetAgeInYears]岁的他继承了一个已将科斯坦蒂尼耶纳入囊中的伟大帝国。这位年轻的苏丹如今将目光投向了新的疆域。他立志向东西方扩张帝国版图，让奥斯曼之名永载世界史册，征服者的血液在他的血管中奔流不息。"
 mehmed.3.a: "穆罕默德苏丹万岁！"
 mehmed.4.title: "穆罕默德之路"
 mehmed.4.desc: "穆罕默德苏丹在梦中伫立于科斯坦丁尼耶的城墙前。征服的荣耀几乎触手可及。但通往伟大的道路不止一条。他会成为“征服者”以纯粹的军事力量粉碎城墙，扩张奥斯曼帝国疆域？还是专注于成为伟大的建设者，将科斯坦丁尼耶转变为世界上最辉煌的城市，并大力资助艺术与学术？"
 mehmed.4.desc.conquered: "穆罕默德苏丹伫立于科斯坦丁尼耶的宫殿中，这座城市如今已牢牢掌握在奥斯曼手中。大征服已然实现，但通往辉煌的道路不止一条。他将以“征服者”之名继续前行，进一步扩张疆土，击败东西方的大国吗？抑或专注于成为伟大的建设者，将征服的科斯坦丁尼耶转变为世间最宏伟的都城，并大力资助艺术与学术？"
 mehmed.4.a: "成为征服者！科斯坦丁尼耶必将臣服于我们！"
 mehmed.4.b: "成为建设者！科斯坦丁尼耶将成为世界奇观！"
 mehmed_conqueror_chosen_tt: "穆罕默德二世获称“征服者”。帝国获得强大的军事加成：战争分数花费-40%，士气+15%，围城能力+75%。"
 mehmed_builder_chosen_tt: "穆罕默德专注于发展科斯坦丁尼耶。帝国获得了强大的行政和经济加成：+15%税收，+3%繁荣度，宗教容忍度提高。"
 mehmed.5.title: "征服者休养"
 mehmed.5.desc: "穆罕默德的统治已结束，这位征服君士坦丁堡并将奥斯曼转变为世界国权的苏丹已然成为传奇。"
 mehmed.5.a: "他的征服将永载史册。"
 STATIC_MODIFIER_NAME_mehmed_the_conqueror_character: "征服者穆罕默德"
 STATIC_MODIFIER_DESC_mehmed_the_conqueror_character: "征服了科斯坦丁尼耶并终结了拜占庭帝国的传奇苏丹。"
 STATIC_MODIFIER_NAME_mehmed_the_conqueror_modifier: "征服者"
 STATIC_MODIFIER_DESC_mehmed_the_conqueror_modifier: "在征服者穆罕默德的统治下，奥斯曼迈向军事的新巅峰。这位攻陷君士坦丁堡的苏丹，如今将目光投向整个基督教世界与东方。没有城墙能抵挡这位攻城大师，也没有国家能抗拒他那无尽的野心。"
 STATIC_MODIFIER_NAME_mehmed_the_builder_modifier: "科斯坦丁尼耶的建造者"
 STATIC_MODIFIER_DESC_mehmed_the_builder_modifier: "在建设者穆罕默德统治下，科斯坦丁尼耶从废墟转变为世界上最伟大的城市。清真寺、市场和宫殿拔地而起，吸引了世界各地的学者、工匠和商人。"
 STATIC_MODIFIER_NAME_mehmed_the_conqueror_modifier_reduced: "征服者"
 STATIC_MODIFIER_DESC_mehmed_the_conqueror_modifier_reduced: "在征服者穆罕默德统治下，奥斯曼帝国获得军事优势，效果适度减弱。 "
 STATIC_MODIFIER_NAME_mehmed_the_builder_modifier_reduced: "科斯坦丁尼耶的建造者"
 STATIC_MODIFIER_DESC_mehmed_the_builder_modifier_reduced: "在建设者穆罕默德统治下，科斯坦丁尼耶持续发展，效果适度减弱。"
 HEIR_SELECTION_MEHMED_DESTINY_DESC: "注定伟大"
 HEIR_SELECTION_AMBITIOUS_TRAIT_DESC: "雄心勃勃"