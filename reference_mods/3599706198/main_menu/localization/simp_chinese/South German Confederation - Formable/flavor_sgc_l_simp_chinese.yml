l_simp_chinese:
 flavor_sgc.1.title: "为你的国家选择一种颜色"
 flavor_sgc.1.desc: "为你的国家选择一种颜色"
 flavor_sgc.1.a: "巴伐利亚蓝"
 flavor_sgc.1.b: "奥地利白"
 flavor_sgc.1.c: "弗兰肯尼亚绿"
 flavor_sgc.1.d: "施瓦本胭脂红"
 flavor_sgc.1.e: "原版深橄榄绿"
 flavor_sgc.1.z: "退出颜色选择菜单（保持当前颜色）"
 flavor_sgc.2.title: "南方土地联盟"
 flavor_sgc.2.desc: "[GetCurrentYear]年，神圣罗马帝国各邦国的代表齐聚皇帝宝座前，恳请在南德意志诸邦间建立防御与经济联盟。面对日益逼近维也纳的马扎尔人威胁，以及波希米亚日益增长的经济政治影响力，忠诚的日耳曼诸侯决心团结应对迫近的危机。蒙皇帝恩准，我们誓将守护帝国、抵御外敌，维护境内和平秩序。我们的统治者将领导这个崭新的联盟——从今往后，它将以“南德意志邦联”之名载入史册。"
 flavor_sgc.2.a: "愿我们的联盟永世长存！"
 flavor_sgc.100.title: "[GetUniqueInternationalOrganization('south_german_confederation').GetNameWithNoTooltip]的中央集权化"
 flavor_sgc.100.desc: "起初，[GetUniqueInternationalOrganization('south_german_confederation').GetName]仅仅是神圣罗马帝国南部各诸侯国之间的联盟；然而如今，它已发展成为一个拥有统一内部政策和明确边界的成熟国家。但从今日起，[GetUniqueInternationalOrganization('south_german_confederation').GetNameWithNoTooltip]将不再是一个松散的联合体，而将成为由[target_country.GetName]的[target_character.GetName]所领导的统一力量，即[GetCountry('SGC').GetLongName]。"
 flavor_sgc.100.a: "愿此引领我们走向繁荣的未来！"
 sgc_gain_cores_on_south_german_tt: "我们在[ShowAreaName('upper_austria_area')]、[ShowAreaName('austria_area')]、[ShowAreaName('salzburg_area')]、[ShowAreaName('styria_area')]、[ShowAreaName('central_switzerland_area')]、[ShowAreaName('carinthia_area')]、[ShowAreaName('upper_rhine_area')]、[ShowAreaName('swabia_area')]、[ShowAreaName('bavaria_area')]、[ShowAreaName('tirol_area')]以及[ShowAreaName('franconia_area')]的每一处地点获得一个[core|e]。"
 sgc_seize_subject_locations_tt: "这些[areas|e]中所有属于我方[subjects|e]但未加入[GetUniqueInternationalOrganization('south_german_confederation').GetName]的[location|e]将被我方接管。"
 sgc_unify_the_cantons_tt: "我们将[GetUniqueInternationalOrganization('south_german_confederation').GetName]统一为一个整体。"
 flavor_sgc.101.title: "$flavor_sgc.100.title$"
 flavor_sgc.101.desc: "投票已经结束，古老的[GetInternationalOrganizationType('south_german_confederation').GetName]将在[target_character.GetName]的审慎引领下统一为单一国家[GetCountry('SGC').GetName]——而我们[ShowCultureGroupName('german_group')]人将成为其中的一部分。"
 flavor_sgc.101.a: "[GetCountry('SGC').GetFlavorRank]万岁！"
 flavor_sgc.101.b: "我们永远不会向任何人屈膝跪伏！"
 sgc_every_core_location_breaks_away_tt: "治下所有拥有[target_country.GetName][core|e]的地点脱离我们的统治"
 flavor_sgc.110.title: "[GetUniqueInternationalOrganization('south_german_confederation').GetNameWithNoTooltip]与[ShowSituationNameWithNoTooltip('reformation')]"
 flavor_sgc.110.desc: "[ShowSituationName('reformation')]如野火般传遍[ShowContinentName('europe')]。曾经在信仰上团结一致的家人、朋友和邻居如今站在对立的战线上。宗教冲突已成为一种新常态，即使[GetUniqueInternationalOrganization('south_german_confederation').GetName]也未能从这场悲剧中幸免，各[ShowCultureGroupName('german_group')]自治州开始彼此攻击……"
 flavor_sgc.110.a: "多事之秋……"
 sgc_block_votes_on_non_religious_policies_tt: "只能提出[ShowLawName('sgc_religious_affairs')][law|e]"
 sgc_religious_chaos_tt: "#R 只要未制定[ShowLawName('sgc_religious_affairs')][policy|e]，[ShowLawName('sgc_internal_politics')]和[ShowLawName('sgc_war_politics')]]就只会对信奉彼此[religion|e]的成员生效#!"
 flavor_sgc.120.title: "[GetUniqueInternationalOrganization('south_german_confederation').GetNameWithNoTooltip]和[GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
 flavor_sgc.120.desc: "随着这场席卷[GetUniqueInternationalOrganization('hre').GetName]乃至大半个[ShowContinentName('europe')]的宗教大动荡结束，[GetUniqueInternationalOrganization('south_german_confederation').GetName]各州正在重新考虑他们与帝国的松散关系。邦联成员认为[ShowLawName('sgc_relations_with_hre')]应该进一步讨论……"
 flavor_sgc.120.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
 flavor_sgc.121.title: "[GetUniqueInternationalOrganization('south_german_confederation').GetNameWithNoTooltip]退出帝国！"
 flavor_sgc.121.desc: "[GetUniqueInternationalOrganization('south_german_confederation').GetName]抛弃了神圣罗马帝国！由于对宗教和平的不满以及与帝国机构间关系的削弱，[ShowCultureGroupName('german_group')]认为继续维持为[GetUniqueInternationalOrganization('hre').GetName]的一员已不再符合他们的利益。"
 flavor_sgc.121.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
 flavor_sgc.999.title: "[ShowCultureGroupNameWithNoTooltip('german_group')]统一运动"
 flavor_sgc.999.desc: "[ShowContinentName('europe')]和[ROOT.GetCountry.GetName]近期的发展在[GetUniqueInternationalOrganization('south_german_confederation').GetName]的传统地区引发了前所未有的运动。随着大部分非[ShowCultureGroupName('german_group')]国家被逐[ShowAreaName('upper_austria_area')]、[ShowAreaName('austria_area')]、[ShowAreaName('salzburg_area')]、[ShowAreaName('styria_area')]、[ShowAreaName('carinthia_area')]、[ShowAreaName('upper_rhine_area')]、[ShowAreaName('tirol_area')]、[ShowAreaName('swabia_area')]、[ShowAreaName('bavaria_area')]、[ShowAreaName('franconia_area')]，人民表达了建立[GetCountry('SGC').GetName]统一民族国家的渴望。"
 flavor_sgc.999.a: "人民已发声！"
 flavor_sgc_999_trigger_at: "属于[GetUniqueInternationalOrganization('south_german_confederation').GetName]成员"
 sgc_unification_movement_event_happens_tt: "为[GetUniqueInternationalOrganization('south_german_confederation').GetName]启用[ShowLawName('sgc_unification')][law|e]。"
 south_german_confederation: "南德意志邦联"
 south_german_confederation_desc: "$south_german_confederation$是由施瓦本、法兰克尼亚、巴伐利亚和奥地利等政治实体组成的联盟。为抵御波西米亚与匈牙利日益增长的影响力，[ShowCultureGroupName('german_group')]民族共同建立了这一联合体。"
 SGC_CONFEDERATION_LEADER: "统治者"
 SGC_CONFEDERATION_LEADER_MALE: "$SGC_CONFEDERATION_LEADER$"
 SGC_CONFEDERATION_LEADER_FEMALE: "$SGC_CONFEDERATION_LEADER$"
 WE_ARE_SMALL: "我们过于弱小"
 sgc_election: "日耳曼选举"
 sgc_election_desc: "[GetUniqueInternationalOrganization('south_german_confederation').GetName]成员将参与一场直接投票，选出[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]，由其在公共舞台上代表邦联。"
 sgc_election_specific: "$sgc_election$"
 sgc_election_specific_desc: "$sgc_election_desc$"
 vote_in_sgc_election: "为$sgc_election$投票"
 vote_in_sgc_election_desc: "决定我们想让谁成为[GetUniqueInternationalOrganization('south_german_confederation').GetName]的新[international_organization_leader_short|e]。"
 io_policy_vote_active_cooldown: "国际政策投票变更"
 sgc_policy_proposal_frequency: "政策提议频率"
 sgc_policy_proposal_frequency_desc: "一项旨在规范[GetInternationalOrganizationType('south_german_confederation').GetName]内执行法律提案间隔期限的法律。"
 sgc_frequent_policy_proposals: "四年一奏"
 sgc_frequent_policy_proposals_desc: "法律和政策的调整是一项经常性工作，因此[GetInternationalOrganizationType('south_german_confederation').GetName]每4年就可以进行一次调整。"
 sgc_moderate_policy_proposals: "八年一奏"
 sgc_moderate_policy_proposals_desc: "在[GetInternationalOrganizationType('south_german_confederation').GetName]内部管理法律和政策提案是一个重要的过程，需要花费大量精力，因而每8年才能提出一次法律提案。"
 sgc_religious_affairs: "宗教事务"
 sgc_religious_affairs_desc: "随着[ShowSituationName('reformation')]爆发，邦联的宗教统一岌岌可危。必须找到解决方案，否则信仰冲突可能会撕裂邦联。"
 sgc_clear_religious_chaos_tt: "[ShowLawName('sgc_internal_politics')]和[ShowLawName('sgc_war_politics')]现在无视[religion|e]对所有成员国生效"
 sgc_mending_schism: "弥合大分裂"
 sgc_mending_schism_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的稳定和安全高于[ShowSituationName('reformation')]的宗教纷争。每个成员都应避免与不同信仰的成员国发生敌对关系。"
 sgc_enforcing_religious_unity: "强迫宗教统一"
 sgc_enforcing_religious_unity_desc: "宗教在各成员国的生活中发挥着重要作用，因此，[GetInternationalOrganizationType('south_german_confederation').GetName]的宗教统一是重中之重。所有州都应以某种方式信奉相同的信仰。"
 sgc_only_defending_same_religion_allies_tt: "只有信奉同一[religion|e]的成员国能从[ShowLawName('sgc_war_politics')]政策中受益"
 sgc_relations_with_hre: "帝国关系"
 sgc_relations_with_hre_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]自创建以来就一直被视为[GetUniqueInternationalOrganization('hre').GetName]的一部分。然而，[ShowSituationName('reformation')]的风波给邦联成员带来的只有无尽的苦果……"
 sgc_remain_in_the_hre: "留在帝国"
 sgc_remain_in_the_hre_desc: "虽然[GetInternationalOrganizationType('south_german_confederation').GetName]是一个有能力保护其成员不受外国势力侵犯的联盟网络，但它在面对更强大的敌人时仍然是不够强力的。留在[GetUniqueInternationalOrganization('hre').GetName]中将为[ShowCultureName('german_group')]人提供更多急需的支持。"
 sgc_remain_in_the_hre_tt: "留在[GetUniqueInternationalOrganization('hre').GetName]"
 sgc_prestige_malus_tt: "每个成员失去[ShowNamedValue('prestige_extreme_penalty')|+=2%][prestige|e]"
 sgc_leave_the_hre: "离开帝国"
 sgc_leave_the_hre_desc: "虽然外敌并不少见，但[GetInternationalOrganizationType('south_german_confederation').GetName]面临的最大威胁正是来自[GetUniqueInternationalOrganization('hre').GetName]本身，它最初承诺保卫其成员。但如今留在帝国内部只会危及我们自身的生存能力。"
 sgc_leave_the_hre_tt: "退出[GetUniqueInternationalOrganization('hre').GetName]"
 sgc_every_member_leaves_hre_tt: "所有成员退出[GetUniqueInternationalOrganization('hre').GetName]并且无法再次加入，除非不再是[GetInternationalOrganizationType('south_german_confederation').GetName]的成员"
 sgc_representative: "[ShowCultureGroupNameWithNoTooltip('german_group')]代表"
 sgc_representative_desc: "任何组织都需要一位发言人——一位代表——作为组织内外政治实体的门面。不过，[GetInternationalOrganizationType('south_german_confederation').GetName]也可以打破这一规则……"
 sgc_canton_representative: "州代表"
 sgc_canton_representative_desc: "一些州恰巧比其他州更富有、更具影响力。因此，[GetInternationalOrganizationType('south_german_confederation').GetName]不应由一个人代表，而应由一个城邦代表。"
 sgc_councillor_representative: "个人代表"
 sgc_councillor_representative_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]各州应当放弃部分影响力，由单一个人成为邦联的代言人。"
 sgc_power_of_the_sovereign: "[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]力量"
 sgc_power_of_the_sovereign_desc: "联邦代表可以要求在联盟内获得更多权力和影响力，以加强其在公共舞台上的地位。"
 sgc_sovereign_representative_power: "代表权力"
 sgc_sovereign_representative_power_desc: "[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]有权要求[GetInternationalOrganizationType('south_german_confederation').GetName]成员提供从财政到军事的各种援助。"
 sgc_sovereign_religious_power: "宗教力量"
 sgc_sovereign_religious_power_desc: "[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]的权力受到限制，但在[GetInternationalOrganizationType('south_german_confederation').GetName]的宗教事务上除外。"
 sgc_sovereign_absolute_power: "绝对的权力"
 sgc_sovereign_absolute_power_desc: "[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]像统治单一国家一样统治[GetInternationalOrganizationType('south_german_confederation').GetName]。因此，其享有所有的特权和义务，就如同是邦联的君主一样。"
 sgc_election_method: "选举方式"
 sgc_election_method_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName][GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]]的选举程序是一个微妙的问题，需要一个严格的立法机构来妥善处理。"
 sgc_direct_vote: "直选"
 sgc_direct_vote_desc: "邦联的[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]由[GetInternationalOrganizationType('south_german_confederation').GetName]成员国直接选举产生。每个成员国都有等权重选举权，且拥有代表邦联的被选举权。"
 sgc_lottery: "抽签"
 sgc_lottery_desc: "只有上帝能决定谁应该代表[GetInternationalOrganizationType('south_german_confederation').GetName]。选举过程由无记名抽签程序产生，运气成了决定性的因素。"
 sgc_rotation: "轮替"
 sgc_rotation_desc: "邦联的[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]由成员国轮换担任。在上一任成员国重新担任邦联代表之前，每个[GetInternationalOrganizationType('south_german_confederation').GetName]成员国都必须至少代表邦联一次。"
 sgc_ruling_period: "统治时期"
 sgc_ruling_period_desc: "联邦可能有一个[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]作为其代表。然而，必须确定该[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]是否将终身为联盟服务，或者直到其任期结束。"
 sgc_timed: "限时"
 sgc_timed_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]拥有任期。任期结束后会卸任，并选举一位新[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]。"
 sgc_lifelong: "终身制"
 sgc_lifelong_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]终身统治。只有其死亡或被放逐后才会举行选举。"
 sgc_election_frequency: "选举频率"
 sgc_election_frequency_desc: "在解决了[ShowLawName('sgc_ruling_period')]的问题之后，多久重新选举新任[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]的问题便提上了议程。"
 sgc_biyearly_elections: "双年选举"
 sgc_biyearly_elections_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]每2年进行更替选举"
 sgc_four_yearly_elections: "四年选举"
 sgc_four_yearly_elections_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]每4年进行更替选举"
 sgc_eight_yearly_elections: "八年选举"
 sgc_eight_yearly_elections_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的[GetUniqueInternationalOrganization('south_german_confederation').GetLeaderTitle]每8年进行更替选举"
 sgc_internal_politics: "内部政治"
 sgc_internal_politics_desc: "虽然[GetInternationalOrganizationType('south_german_confederation').GetName]要是一个防御性联盟，但很明显邦联的内部事务也必须得到处理。"
 sgc_forbid_internal_wars: "禁止内部战争"
 sgc_forbid_internal_wars_desc: "决不能允许琐碎的争端激化为血腥的冲突。[GetInternationalOrganizationType('south_german_confederation').GetName]的所有成员国都应该依靠邦联法官解决纠纷，而不是在战场上。"
 sgc_forbid_internal_wars_tt: "[GetInternationalOrganizationType('south_german_confederation').GetName]成员不可攻击彼此"
 sgc_forbid_same_religion_internal_wars_tt: "任何[GetInternationalOrganizationType('south_german_confederation').GetName]的成员都不能攻击同一[religion|e]的其他成员。"
 sgc_allow_internal_wars: "允许内部战争"
 sgc_allow_internal_wars_desc: "尽管冲突通常并不令人向往，但它是人性的一部分，正是通过它，我们得以变得更加强大。"
 sgc_membership_regulation: "成员资格限制"
 sgc_membership_regulation_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]最初由[ShowCultureGroupName('german_group')]人民创立，旨在作为汉萨同盟以及崛起的波希米亚和匈牙利的经济制衡力量。然而，关于谁能加入的规则从未一成不变……"
 sgc_south_german_culture_and_geography: "仅限南德意志"
 sgc_south_german_culture_and_geography_desc: "邦联是[ShowCultureGroupName('german_group')]人的组织，因此只有具有其文化和地理背景的国家才能加入。"
 sgc_south_german_culture_and_geography_tt: "只有[primary_culture|e]为[ShowCultureGroupName('german_group')]文化组且[capital|e]位于[ShowAreaName('upper_austria_area')]、[ShowAreaName('austria_area')]、[ShowAreaName('salzburg_area')]、[ShowAreaName('styria_area')]、[ShowAreaName('carinthia_area')]、[ShowAreaName('upper_rhine_area')]、[ShowAreaName('swabia_area')]、[ShowAreaName('bavaria_area')]、[ShowAreaName('franconia_area')]或[ShowAreaName('tirol_area')]的国家可以加入"
 sgc_just_south_german_culture: "日耳曼文化"
 sgc_just_south_german_culture_desc: "[ShowCultureGroupName('german_group')]人民的影响力已远超[GetInternationalOrganizationType('south_german_confederation').GetName]]的历史地域范围。地理限制不再适用，因此相关法律需要重新审视。"
 sgc_just_south_german_culture_tt: "只有[primary_culture|e]为[ShowCultureGroupName('german_group')]文化组的国家可以加入"
 sgc_south_german_or_south_german_relative: "日耳曼及其近亲文化"
 sgc_south_german_or_south_german_relative_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的影响力不仅来自[ShowCultureGroupName('german_group')]人民，还包括我们视为文化近亲的国家。"
 sgc_south_german_or_south_german_relative_tt: "只有[primary_culture|e]为[ShowCultureGroupName('german_group')]或文化[language|e]与这些文化相同的国家可以加入"
 sgc_war_politics: "战争政治"
 sgc_war_politics_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]面临着众多的外部威胁。要想在政局动荡中保卫邦联的安全，就要决定[ShowCultureGroupName('german_group')]人如何团结起来防卫外敌。"
 sgc_defensive_pact: "防御同盟"
 sgc_defensive_pact_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的成员仅在抵御外部威胁的防御性战争中被征召参战。"
 sgc_alliance: "南德意志邦联"
 sgc_alliance_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的成员可以在扩张时互相召唤。而在面对外部入侵时，所有成员国都会被召唤参战保卫邦联的同伴。"
 sgc_united_war_efforts: "联合作战"
 sgc_united_war_efforts_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]对于外部国家如同单一政治实体。所有战争——无论是进攻性还是防御性——都会召唤所有邦联成员参战。"
 sgc_call_to_arms_conditions_tt: "[Custom('GetSCCallToArmsTooltip')]"
 sgc_call_to_arms_only_same_religion_tt: "$sgc_call_to_arms_always_tt$且宣战双方拥有相同的[religion|e]"
 sgc_call_to_arms_always_tt: "敌人并非[GetUniqueInternationalOrganization('south_german_confederation').GetName]成员"
 sgc_unification: "$SGC_ADJ$统一"
 sgc_unification_desc: "[ShowCultureGroupName('german_group')]人的土地已经分裂太久了。如果阿尔卑斯山的居民想要得到繁荣与安定，就必须统一在一面旗帜下。"
 sgc_unification_movement_event_happened_tt: "[event|e]“#Y $flavor_swi.999.title$#!”的触发条件为：\n\n[ShowTriggerConditions('flavor_swi_999_trigger',PlayerScope.Self)]"
 sgc_unification_same_religion_tt: "所有成员国都信奉[ShowReligionName('catholic')]、[ShowReligionName('lutheran')]或[ShowReligionName('calvinist')]"
 sgc_found_south_german_republic: "建立$SGC_ADJ$$republic$"
 sgc_found_south_german_republic_desc: "[GetInternationalOrganizationType('south_german_confederation').GetName]的规则与法律已经受到各成员的广泛接纳，在这些框架中，各州都得以各抒己见。然而，邦联的松散性质始终无法解决[ShowCultureGroupName('german_group')]人民对安全和生存的担忧。是时候在维持[ShowGovernmentTypeName('republic')]原则的统治，将邦联整合成一个统一的整体了。"
 sgc_found_south_german_republic_specific_tt: "[THIS.GetCountry.GetName]统一[GetInternationalOrganizationType('south_german_confederation').GetName]，成立一个[GetCountry('SGC').GetAdjective][ShowGovernmentTypeName('republic')]"
 sgc_found_south_german_republic_tt: "[GetInternationalOrganizationType('south_german_confederation').GetName]统一为一个[GetCountry('SGC').GetAdjective][ShowGovernmentTypeName('republic')]"
 sgc_found_south_german_monarchy: "建立$SGC_ADJ$$monarchy$"
 sgc_found_south_german_monarchy_desc: "尽管[GetInternationalOrganizationType('south_german_confederation').GetName]起初作为一个共和国联盟成立，但邦联所面临的诸多挑战已经表明，只有以适当的[ShowGovernmentTypeName('monarchy')]权威取得旧有的邦联体制，[ShowCultureGroupName('german_group')]人民的未来才得以保障。"
 sgc_found_south_german_monarchy_specific_tt: "[THIS.GetCountry.GetName]统一[GetInternationalOrganizationType('south_german_confederation').GetName]，成立一个[GetCountry('SGC').GetAdjective][ShowGovernmentTypeName('monarchy')]"
 sgc_found_south_german_monarchy_tt: "[GetInternationalOrganizationType('south_german_confederation').GetName]统一为一个[GetCountry('SGC').GetAdjective][ShowGovernmentTypeName('monarchy')]"
 sgc_found_south_german_theocracy: "建立$SGC_ADJ$$theocracy$"
 sgc_found_south_german_theocracy_desc: "无论是票选的共和制还是专制的君主制都被证明无法将[GetInternationalOrganizationType('south_german_confederation').GetName]引领到今天的地位。只有依照上帝的意志，统一在团结的[ShowGovernmentTypeName('theocracy')]旗下，[ShowCultureGroupName('german_group')]人民才能繁荣昌盛于世。"
 sgc_found_south_german_theocracy_specific_tt: "[THIS.GetCountry.GetName]统一[GetInternationalOrganizationType('south_german_confederation').GetName]，成立一个[GetCountry('SGC').GetAdjective][ShowGovernmentTypeName('theocracy')]"
 sgc_found_south_german_theocracy_tt: "[GetInternationalOrganizationType('south_german_confederation').GetName]统一为一个[GetCountry('SGC').GetAdjective][ShowGovernmentTypeName('theocracy')]"
 SGC_f_desc: "[GetUniqueInternationalOrganization('south_german_confederation').GetName]仅仅是一个由各个公国、主教区和共和国组成的小联盟。为了真正统一南部#L [ShowCultureGroupName('german_group')|l]#!民族，在这片上帝赐福的土地上应该建立一个主权国家。"
 SGC_f_tt: "[GetUniqueInternationalOrganization('south_german_confederation').GetName]存在。可以通过#TOOLTIP:LAW,sgc_unification,X #L $SGC_ADJ$统一#!#!来建立国家。"
 SGC_divided_land: "南德意志帝国圈"
 SGC_divided_land_desc: "南德意志帝国圈建立在施瓦本圈的原则之上——王公、城市与教会领地间的集体协调，共同遵守防御与贸易保护的规则。然而南方联盟进一步发展了这些机制：该圈涵盖巴伐利亚、法兰克尼亚、施瓦本及阿尔卑斯地区，统一了成员间的集市、资源开采、战略物资物流以及军事政治承诺。\n贵族、市民与神职人员定期召开会议，协调税收、征募与宗教政策。通过这一体系，南德意志圈既保留了各参与者的自治权，同时将帝国南部领土转变为统一协调的整体。施瓦本圈的这一遗产已成为该地区繁荣与经济实力的基石。"
 landsknechte_legacy: "雇佣兵传承"
 landsknechte_legacy_desc: "For centuries, the South German lower nobility sought fame and fortune not only on their own estates but also on campaigns under foreign banners. Many became captains of the Landsknechte — the famed mercenary companies first organized under Emperor Maximilian I, rightly hailed as the ‘father of the Landsknechte.’ It was he who transformed scattered bands of mercenaries into a formidable, disciplined force capable of confronting Europe’s finest armies.\nUpon returning home, these noble captains brought back a new military culture. Thus, within the Confederation, a distinct class of professionals emerged — trained, battle-hardened, and accustomed to large-scale warfare: not merely sword-bearing hereditary nobles, but true officers steeped in Maximilian’s traditions and seasoned by Landsknecht campaigns."
 Imperial_epi_south: "Imperial Bishoprics of the South"
 Imperial_epi_south_desc: "The southern regions of the Holy Roman Empire have long rested not only on the swords of secular princes and the wealth of cities, but also on the authority of ecclesiastical princes whose domains stretch from the Danube to the hills of Franconia. Augsburg, Freising, Passau, Würzburg, Bamberg, and other bishoprics served for centuries not merely as religious centers, but as among the region’s largest landowners — and as pillars of stability during the most turbulent times.\nWith the consolidation of the southern confederation, these powerful bishoprics coalesced into what is known as the ‘Spiritual Belt’ of Southern Germany — a vital link bridging secular and spiritual authority within the confederation."
 Salt_desyat: "Salt Tithes of Hallstatt and Berchtesgaden"
 Salt_desyat_desc: "Alpine salt — the ‘white gold’ of Germany — has long formed the bedrock of wealth and influence for local princes and bishoprics. Hallstatt and Berchtesgaden, two of the oldest salt-mining centers, have controlled the region’s largest salt mines since Celtic and early medieval times. From here, salt traveled via rivers and mountain roads to Bavaria, Austria, and onward to Imperial trade fairs.\nThe tradition of the salt tithe — a mandatory share of production paid to ecclesiastical and secular authorities — transformed these sites into hubs of financial and political power. For centuries, the lords of Hallstatt and the abbots of Berchtesgaden oversaw the flow of salt revenues, maintaining roads, caravans, and toll stations while reinforcing their influence in Alpine politics.\nWith the unification of Southern Germany, the traditions of salt extraction and the salt tithe have become a vital asset to the young nation’s economy."
 bamberg_ulozh: "Development of the Bamberg Criminal Code"
 bamberg_ulozh_desc: "In 1507, Prince-Bishop Georg III Schenk von Limpurg of Bamberg commissioned Baron Johann von Schwarzenberg to draft a unified criminal code for his territories. The result — the Bamberg Criminal Code — became a landmark of medieval German criminal jurisprudence.\nIts provisions, synthesizing ancient Franconian customs, chancery practices, and regional judicial traditions, swiftly became a model throughout the region. Over time, they formed the basis of Emperor Charles V’s *Constitutio Criminalis Carolina* (the General German Criminal Code), establishing uniform principles of punishment and legal procedure across the Empire.\nFollowing the creation of a unified South German state, the Bamberg Code will serve as the legal foundation for our nation’s laws."
 Gemeindeautonomie: "Gemeindeautonomie"
 Gemeindeautonomie_desc: "South German rural communes (*Gemeinden*) have preserved a remarkable degree of independence for centuries. In times of crisis, peasant *Gemeinden* autonomously managed land use, allocation of communal resources, and adjudication of minor offenses. This tradition of self-governance strengthened regional stability, maintaining order even in remote areas where princely authority was distant and rivers and roads linked scattered villages.\nAs the South German Confederation developed, communal autonomy evolved from customary practice into a vital component of the political system: it fostered a sense of civic participation among the peasantry, enhanced the efficiency of local administration, and provided the foundation for collective defense and sustainable economic management."
 sgc_money_un: "南日耳曼铸币联盟"
 sgc_money_un_desc: "克朗塔勒、先令、法郎、海勒、荷兰盾、马克、十字币、芬尼、塔勒以及数十乃至数百种其他货币目前在我们的市场上流通，让财政官员和会计师们陷入绝望。虽然这种货币多样性无疑让世界各地的钱币学家欣喜若狂，但它严重阻碍了邦联内部的州际贸易，这个问题必须立即纠正！"
 chast_integration: "通用货币的部分引入"
 chast_integration_desc: "The coinage standard shall be set at 24.5 guilders per Cologne mark of fine silver, meaning one guilder will contain approximately 9.5 grams of pure silver. The kreuzer shall serve as the subsidiary unit, with 60 kreuzers equaling one guilder. This new currency will become the foundation for interstate trade among Confederation members, while remaining a supranational medium of exchange—not mandatorily imposed as the sole legal tender across all member states."
 poln_integration: "统一货币全面介绍"
 poln_integration_desc: "货币标准应定为每科隆马克纯银兑换24.5荷兰盾，即每荷兰盾约含9.5克纯银。十字币将作为辅币单位，60十字币等于1荷兰盾。新货币既可作为邦联成员国内部贸易的结算基准，亦将成为所有成员国必须采用的法定通用货币，由此形成所谓的“南方货币区”。"
 no_germanozone: "拒绝共同货币"
 no_germanozone_desc: "尴尬。"
 SGC_contribution_pol: "通用货币的部分引入"
 SGC_contribution_pol_desc: "随着联盟内部贸易引入统一货币，我们已获得对联盟货币政策的局部掌控权——这为我们带来了可观的财政收益。"
 SGC_contribution_pol_price: "$SGC_contribution_pol$"
 SGC_contribution_full: "统一货币全面介绍"
 SGC_contribution_full_desc: "随着联盟范围内统一货币的推行，我们已完全掌控联盟的货币政策——这为我们带来了巨大的财政利益。"
 SGC_contribution_full_price: "$SGC_contribution_full$"
 SGC_mp_contr: "为联邦军队的贡献"
 SGC_mp_contr_desc: "由成员国向南德意志邦联统一军队提供的[Manpower|e]。[ShowLawName('military_contribution')]决定了各成员国需向邦联常备军提供多少士兵。"
 SGC_mp_contr_price: "$SGC_mp_contr$"
 SGC_mp_contr_price_MULTIPLIER: ""
 SGC_military_contribution: "统一联合军问题"
 SGC_military_contribution_desc: "任何精通军事科学的人都会断言，军队的战斗力不仅取决于士气或部队训练，更关键的是统一的指挥和集中的领导。即使是最强大的力量，如果分散并由众多独立的指挥官领导，也无法战胜一个协调一致、集中指挥的敌人。\n\n正是这一致命缺陷困扰着南德意志邦联：它由数十个县、公国和男爵领编织而成，深受军事地方分权之苦。每一位指挥官都倾向于将自己视为自主的战略家，将个人野心和地方利益置于联盟的集体目标之上。这种分散的军事结构是进行有效战争的主要障碍，亟需通过采用统一的军事学说和指挥层级来展开辩论并加以解决。"
 no_military_contribution_sgc: "拒绝统一军队"
 no_military_contribution_sgc_desc: "军队始终是任何政治实体主权的基石。即便在我们邦联内部，它也是维护成员核心利益的首要工具。因此，放弃建立由联盟元首统一指挥的军队这一决定是可以理解的。长远来看，这确实会削弱我们的集中防御能力——但作为妥协，各成员已承诺大幅扩充兵员储备，以更有效地应对外部威胁。"
 manpower_from_south: "统一南德意志邦联陆军"
 manpower_from_south_desc: "南德意志邦联成员有义务缴纳所谓的“血税”——为联盟的统一军队输送年轻新兵。作为回报，联盟领导人承诺全面保障每个成员的外交政策利益，同时保证尊重其主权（或内部自由），且在任何情况下都不会动用统一军队干涉成员国内政。"
 sgc_infra_law: "统一联盟基础设施"
 sgc_infra_law_desc: "自南大洲共同体成立为政治经济联盟以来，基础设施的分阶段整合已成为当务之急且势在必行。成员国间的相互资本投资、联合建设项目、运输走廊的畅通无阻以及资源货物的自由流通，对联邦的繁荣至关重要。"
 sgc_infra_law_roads: "道路网络的标准化"
 sgc_infra_law_roads_desc: "统一道路系统是迈向欧盟交通基础设施全面整合的关键——也是首要步骤。"
 sgc_infra_law_agro: "联合资源开发与开采"
 sgc_infra_law_agro_desc: "资源开采合作使成员国能够建立合资企业，在参与者之间分散财务和运营风险，同时确保每个成员国在整个联盟内以简化和安全的方式获取关键资源。"
 sgc_infra_law_mines: "资本自由流动"
 sgc_infra_law_mines_desc: "随着交通网络的整合与资源开采合作的深入，各成员国已拥有充分的相互投资机遇。下一步战略举措是全面取消限制，以激发成员国间投资活力，确保联盟内部资本流动畅通无阻。"
 sgc_town_politics: "自由城市问题"
 sgc_town_politics_desc: "在中世纪，公社革命为领主权威与新兴城市的野心划清了界限。当帝国自由城市——通常凭借皇室支持——从地方领主手中赢得独立时，较小城镇仍受封建统治。如今，这场延续数百年的争端已在神圣日耳曼联邦重新燃起。受北意大利城邦共和国繁荣景象与广泛自治的启发，我们联邦的市民阶层正强力要求确认其自古传承的权利与自由。"
 sgc_podderzhka_komm: "城镇权利法案"
 sgc_podderzhka_komm_desc: "1507年，班贝格采邑主教格奥尔格三世·申克·冯·林普格委托约翰·冯·施瓦岑贝格男爵为其领地起草统一刑法典，由此诞生了中世纪日耳曼刑法体系的基石——《班贝格法典》。\n该法典融合了法兰克古俗、文书惯例与司法判例，迅速成为地区范本，后成为查理五世皇帝《加洛林纳刑法典》的立法蓝本，为帝国统一刑事实体法与程序法奠定基础。\n如今这部法典将为新《城镇权利法案》提供法理支撑，通过扩大市议会职权显著提升城镇资产阶级的法律地位。"
 sgc_protiv_komm: "强化对城市的掌控权"
 sgc_protiv_komm_desc: ""
 sgc_diplomatic_law: "外交原则"
 sgc_diplomatic_law_desc: "Since the #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,south_german_confederation,X #L South German Confederation#!#! is led by a single sovereign, it is essential to define how diplomatic policy is conducted by member states."
 sgc_unified_external_diplomacy_policy: "Unified Foreign Policy"
 sgc_unified_external_diplomacy_policy_desc: "The sovereign exclusively determines the SGC’s diplomatic policy. Other member states do not maintain independent foreign relations."
 sgc_organized_diplomats_policy: "联盟外交官"
 sgc_organized_diplomats_policy_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,south_german_confederation,X #L 南德意志邦联#!#!的外交官服务于整个联盟，而非个别成员国。然而，各成员国仍可借助其服务来实现本国的外交政策目标。"
 sgc_parlament_1: "南德意志议会"
 sgc_parlament_1_desc: ""
 sgc_diet_law: "南德意志议会"
 sgc_diet_law_desc: "在成功统一南日耳曼地区后，正式化政治关系并建立协调治理的结构是当务之急。成立议会是迈向新联盟中央集权和稳定的关键一步——能够有效地将地方精英纳入国家行政管理中。"
 no_sgc_diet_policy: "功能失调的议会"
 no_sgc_diet_policy_desc: "南德意志议会尚未建立，且不承担任何职能。"
 sgc_early_imperial_diet_policy: "南德意志议会"
 sgc_early_imperial_diet_policy_desc: "南德意志议会作为南德意志邦联的最高代表与咨询机构，在相关法律通过后正式成立。它是协调联邦与地方利益的核心平台，其根本使命在于确保政治和谐——将地方诉求转化为统一的国家政策，重点放在实现经济繁荣与技术领先。"
 sgc_parlament_munch: "南德意志议会所在地"
 STATIC_MODIFIER_NAME_sgc_parlament_munch: "南德意志议会所在地"
 sgc_oktoberfest: "举办啤酒节"
 sgc_oktoberfest_desc: "是时候来一场真正的庆典了！让我们将巴伐利亚著名的啤酒节，转变为一场覆盖整个施瓦本关税同盟的盛大活动。这不仅仅是为畅饮啤酒找个借口——更是向世人宣告：施瓦本关税同盟不仅代表着经济与政治联盟，更承载着生机勃勃的共同文化。\n盛大的庆典、悠扬的民间音乐、充足的啤酒供应，将有力促进团结、提振士气，让每个人感受到自己正属于这场欢乐而宏伟的事业。执政者们可以走进民众，在歌曲、舞蹈和集体欢庆中增强信任。"
 sgc_germ_year: "啤酒节"
 sgc_germ_year_tt: "整整七日我们该饮何物，  \n整整七日我们该饮何物——  \n这般干渴难耐！"
 request_sgc: "提议成立南德意志邦联"
 request_sgc_desc: ""
 SGU_alpian_cav: "游吟骑士"
 SGU_alpian_cav_desc: "游吟骑士是12世纪兴起的日耳曼诗人音乐家群体，他们后来成为中欧骑士文化的象征。其名称源于“Minne”——这个词语象征着崇高典雅的宫廷之爱。在艺术传统中，他们逐渐代表着一种独特的理想典范：将骑士勇武、贵族血统与精妙的诗歌艺术融为一体。"
 SGU_benne: "本笃会中心"
 SGU_benne_desc: "南德意志地区的本笃会修道院数个世纪以来一直是该地区的知识与精神灯塔。早在文艺复兴浪潮抵达阿尔卑斯山之前，这里便已开始抄写手稿、培养神职人员、发展修道院农业，并保存着古典时代的遗产。在统一的南德意志邦联内，这些本笃会修道院再次成为文化传承、手稿制作、教育体系与档案工作的首要守护者——构成了国家真正的“智慧脊梁”。"
 SGU_union_army: "三色军"
 SGU_union_army_desc: "联邦军队，俗称三色军。得名于联邦三大主导的旗帜：奥地利、巴伐利亚和施瓦本。作为德意志首批真正意义上的职业常备军，其兵源来自联邦全境。军队结构分为三大核心兵种——骑兵、步兵与炮兵，各兵种制服颜色鲜明，既体现职能差异，亦映射创始邦国的贡献。"
 SGU_alk: "世界酒都"
 SGU_alk_desc: "巴伐利亚的啤酒、奥地利与施瓦本的烈酒，以及法兰克尼亚的酿酒传统，早已注定南德意志将成为世界的酒业中心。随着国际贸易的扩张、产量的提升，以及从葡萄酒硫处理、啤酒窖藏到蒸馏技术革新与玻璃瓶装普及等一系列技术进步，酒精饮品已迅速崛起为联邦的首要出口商品和国内主导消费品。尽管酒精饮料通常比大多数人日常饮用的普通水源更为安全，但其习惯性消费仍不可避免地给公共健康带来严重损害。"