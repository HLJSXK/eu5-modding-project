l_simp_chinese:
 dec_early_catholic_conquest_tooltip: "选择一个[country|e]以让我们的[Player.GetGovernment.GetParliament.GetName]授予我们针对他们的[ShowCasusBelliName('cb_early_catholic_conquest')]或[ShowCasusBelliName('cb_early_catholic_conquest_r')][casus_belli|e]。"
 dec_late_catholic_conquest_tooltip: "选择一个[country|e]以让我们的[Player.GetGovernment.GetParliament.GetName]授予我们针对他们的[ShowCasusBelliName('cb_early_catholic_conquest_r')]或[ShowCasusBelliName('cb_late_catholic_conquest')][casus_belli|e]。"
 dec_generic_conquest_tooltip: "选择一个[country|e]以让我们的[Player.GetGovernment.GetParliament.GetName]授予我们针对他们的[ShowCasusBelliName('cb_parliament_conquer_province')][casus_belli|e]。"
 cb_early_catholic_conquest: "早期天主教征服"
 cb_early_catholic_conquest_desc: "在一个由宗教纽带主导的封建世界中，无宣战理由而征服则为无礼。我们的主张基于家族联系，声称对这个省份有某种古老的继承权，这种主张是否真实并不重要。"
 cb_early_catholic_conquest_PROV: "早期天主教征服[PROVINCE.GetName]"
 war_goal_early_catholic_conquest: "占领[PROVINCE.GetNameWithNoTooltip]"
 war_goal_early_catholic_conquest_desc: "[war_goal|e]是占领[PROVINCE.GetNameWithNoTooltip]。"
 cb_early_catholic_conquest_r: "早期宗教征服"
 cb_early_catholic_conquest_r_desc: "对那些信仰不同的人，我们不应该用常规的交战规则与惯例。"
 cb_early_catholic_conquest_r_PROV: "对[PROVINCE.GetName]的早期宗教征服"
 war_goal_early_catholic_conquest_r: "占领[PROVINCE.GetNameWithNoTooltip]"
 war_goal_early_catholic_conquest_r_desc: "[war_goal|e]是占领[PROVINCE.GetNameWithNoTooltip]。"
 cb_late_catholic_conquest: "天主教晚期征服"
 cb_late_catholic_conquest_desc: "在一个动荡不安的封建时代里，人们对每个国家的个别征服行为关注较少。领土的夺取不必再与崇高的宗族宣称联系在一起。"
 cb_late_catholic_conquest_PROV: "[PROVINCE.GetName]的天主教晚期征服"
 war_goal_late_catholic_conquest: "占领[PROVINCE.GetNameWithNoTooltip]"
 war_goal_late_catholic_conquest_desc: "[war_goal|e]是占领[PROVINCE.GetNameWithNoTooltip]。"
 dec_request_papal_cb: "请求教宗赐予对省份的宣称"
 dec_request_papal_cb_desc: "在精神和政治纠纷中，没有比教宗本人更好的调解人了。通过利用我们在梵蒂冈的影响力，我们可以请求他让我们获得一个本应属于我们的[province|e]。"
 dec_request_papal_cb_tooltip: "选择一个教宗授予我们[ShowCasusBelliName('cb_papal_claim')][casus_belli|e]的[country|e]\n※目标必须是一个天主教[faith|e]的[country|e]，且[GetCountry('PAP').GetLongName]对其的[opinion|e]低于50"
 cb_papal_claim: "教宗批准的宣称"
 cb_papal_claim_desc: "在解决天主教国家间的领土争端上，没有比教宗更高的权威了。凭借他的权威，无人敢质疑这场战争的正义性。"
 cb_papal_claim_PROV: "教宗批准对[PROVINCE.GetName]的宣称"
 war_goal_cb_papal_claim: "占领[PROVINCE.GetNameWithNoTooltip]"
 war_goal_cb_papal_claim_desc: "[war_goal|e]是占领[PROVINCE.GetNameWithNoTooltip]。"
 rule_DEC_HRE_protection: "(DEC)神罗豁免权"
 setting_DEC_thirty_years_war: "宗教战争"
 setting_DEC_thirty_years_war_desc: "在宗教战争结束前，非天主教国家无法对神圣罗马帝国提出议会宣称。"
 setting_DEC_discovery: "地理大发现时代"
 setting_DEC_discovery_desc: "在天主教国家之外，无法对神圣罗马帝国提出议会宣称，直到地理大发现时代。"
 setting_DEC_reformation: "宗教改革时代"
 setting_DEC_reformation_desc: "在天主教国家之外，无法对神圣罗马帝国提出议会宣称，直到宗教改革时代。"
 setting_DEC_absolutism: "专制主义时代"
 setting_DEC_absolutism_desc: "在天主教国家之外，无法对神圣罗马帝国提出议会宣称，直到专制主义时代。"
