 lumber_law_CATEGORY: "RESOURCE_MANAGMENT_LAW_CATEGORY"
 lumber_law: "木材出口法"
 lumber_export_ban: "禁止木材出口"
 lumber_export_ban_desc: "禁止所有木材出口。保障国内建筑与工业供应，但会减少贸易收入，并可能激怒依赖出口的商人。"
 lumber_no_ban: "无出口禁令"
 lumber_no_ban_desc: "允许木材自由出口至国外市场。增加贸易收入并加强外交关系，但会减少国内建筑与工业的木材供应。"
