 peasants_estate_vinland: "朗斯曼"
 land_owning_farmers: "有地农民"
 land_owning_farmers_desc: "与[ShowContinentName('europe')]大部分封建地区的农民相比，斯堪的纳维亚农民拥有独特而强势的地位。他们完全拥有自己的土地，直接向王室纳税，并常在地方议会中拥有发言权，这赋予了他们相当程度的自主权与法律保障。这些农民并非农奴；许多人携带武器并应征入伍。他们的权利根植于古老的习惯法，这种相对独立性构成了斯堪的纳维亚乡村社会的基础要素。"
 vinlandic_noble_navy: "海军"
 vinlandic_noble_navy_desc: "文兰的贵族并不依靠广袤的土地维持权力，而是凭借对海洋的控制。每位酋长拥有自己的船只，用于捕鱼、贸易和探险，而在关键时刻，这些船只会组成文兰海军。"
 vinlandic_tribal_peace: "和平条约"
 vinlandic_tribal_peace_desc: "与那些因冲突而迫使北欧人离开的传说不同，文兰的存续依赖于与贝奥图克保持和平。通过贸易、通婚与相互尊重，我们建立了一种虽不稳定却长久的共存关系。斯格林教会我们这片土地的生存之道，而我们将铁器与新工艺带给他们。"
 birch_bark_runes: "桦树皮符文"
 birch_bark_runes_desc: "虽然文兰的羊皮纸稀缺，但桦树皮非常丰富，我们的斯格林邻居早已用它进行书写。通过贸易与共存，我们将符文改用于桦树皮，创造出了一个用于记录契约、信息与知识的共享符号系统。这种北欧与本土习俗的融合，使识字率超越了故土的水平。"
 vinland_fur_trade: "文兰毛皮贸易"
 vinland_fur_trade_desc: "文兰丰富的毛皮资源已成为殖民地经济的基石。文兰人建立了与土著群体和欧洲市场的贸易网络，出口的上等毛皮非常抢手。这份贸易不仅让文兰更加繁荣，也加强了它与更广阔世界的联系。"
 rank_commonwealth_vinland: "联邦"
 rank_commonwealth_vinland_ruler_male: "王公"
 rank_commonwealth_vinland_ruler_female: "女王公"
 country_flavor_parliament_althing: "阿尔廷吉"
 vinlandic_elective_succession: "文兰选举继承制"
 vinlandic_elective_succession_desc: "植根于冰岛联邦时期的传统，文兰选举继承制体现了戈达尔与王权之间独特的权力平衡。戈达尔作为王国的贵族首领，会集会推举亲王，即文兰的统治者。尽管出于血统与历史功绩的缘故，索尔芬·卡尔塞夫尼的后裔往往更受青睐，但法律允许只要能赢得同僚的尊敬与忠诚，王国内任何贵族都可被选为统治者。女性同样拥有继承王位的资格，尽管戈达尔们在传统上更偏好男性候选人。这一制度确保统治者不仅出身显赫，更需获得文兰诸大家族的认可，证明其德行与能力。它是在古老的传统与这片新大陆日益增长的中央集权需求之间，所达成的一项微妙折衷。"
 vinland_land_of_opportunity: "机会之地"
 vinland_land_of_opportunity_desc: "文兰拥有广袤无垠、未受破坏的土地，拓荒者可以在这里开创新的生活。摆脱了旧世界森严的等级制度，肥沃的土壤、丰富的资源以及创造未来的机遇吸引着无数人前仆后继。这种机遇精神促进了人口的快速增长，移民和当地居民都抓住机会，在这片新天地创造出一篇勃勃生机，万物竞发的景象。"
 vinland_startup.1.title: "文兰的扩张"
 vinland_startup.1.desc: "数个世纪以来，文兰一直是新世界灯塔。然而，我们的领地是由那些勇敢横渡大西洋、在这片未开化之地开辟生活的移民浪潮所塑造的。有人认为，文兰应继续专注于文兰湾的岛屿，保持其独特的身份和易于管理的规模。另一些人则认为，来自斯堪的纳维亚、不列颠群岛和德国北部的移民潮，为我们提供了沿大河西岸扩张的机会，建立新的定居点，比如正在兴起的集镇韦斯特胡芬。我们此刻的选择，将决定文兰的未来。"
 vinland_startup.1.a: "让文兰专注于岛屿发展。"
 vinland_startup.1.b: "沿海扩张并建立韦斯特霍芬"
 vinland_startup.2.title: "文兰的首都"
 vinland_startup.2.desc: "韦斯特霍芬的发展令人瞩目，它已成为贸易与外交的中心，吸引着定居者、商人乃至原住民涌入。有人主张首都应继续留在托瓦兹内斯——文兰的历史心脏；另一些人则认为，在这个新时代，凭借其在贸易和原住民政治中日益增长的重要性，韦斯特霍芬自然应该是是权力中枢。"
 vinland_startup.2.a: "将我们的首都保留在索尔瓦兹内斯。"
 vinland_startup.2.b: "将我们的首都迁至韦斯特霍芬。"
 vinland_startup.3.title: "旧信仰现状"
 vinland_startup.3.desc: "当诺斯人首次定居文兰时，他们带来了自己的神祇与传统。然而，历史的浪潮并未眷顾这些古老的传统。许多文兰定居者的故土——冰岛早在数个世纪前便皈依了基督教，而天主教会的影响力仍在持续增强。但在这片远离欧洲君王与主教管辖的遥远土地上，古老的信仰仍以不同形式存续着。如今的问题是——旧信仰在文兰上究竟扎得有多深？"
 vinland_startup.3.a: "旧信仰在此地已趋边缘化。"
 vinland_startup.3.b: "旧信仰依然保持着相当规模的存在。"
 vinland_startup.3.c: "旧信仰在文兰蓬勃发展。"
