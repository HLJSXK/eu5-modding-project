l_simp_chinese:
 the_divine_spark: "神性火花"
 the_divine_spark_desc: "神性火花是一切生命的源泉。它馈赠给信徒强大的力量，而信徒也必须回报它的馈赠。\n\n那些与神性火花达成更深共鸣者，便能实现[ascension|e]并提升精灵位阶。神性火花并非纯粹的善或恶，它通过汲取所创生命的经历而日益强大。无论是生命的收割者还是培育者，只要遵循其意志、推进其目标，皆能平等获得神性火花的眷顾。随着力量增长，其影响范围将不断向宇宙深处延伸，寻获新的星球播撒生命，并将其接入大传送门网络。 "
 aeluran_sister: "两仪姊妹"
 aeluran_sister_die_desc: ""
 desc_aeluran_sister: "自幼接受两仪修会的训练，两仪姐妹被培养成为强大的法师和明智的顾问。"
 aeluran_matron: "两仪主母"
 aeluran_matron_die_desc: ""
 desc_aeluran_matron: "两仪主母是两仪修会的精英，也是最有权势的人。她们组成修会的掌权者，在操纵火花方面往往比普通姊妹更有天赋。"
 aeluran_matriarch: "两仪母主"
 aeluran_matriarch_die_desc: ""
 desc_aeluran_matriarch: "两仪至高母主是两仪师无可争议的领袖。两仪至高母主在主母会议中选出，通常是整个修会中最强大、最睿智的姊妹。"
 aeluran_order_dynasty: "两仪修会姊妹"
 AELURAN_ORDER_LEADER_MALE: "两仪修会男性领袖"
 AELURAN_ORDER_LEADER_FEMALE: "至高母主"
 aeluran_order: "两仪师修会"
 aeluran_order_desc: "两仪师是血统的缔造者和命运的干预者，是世界上一股强大的力量。她们为最强大的统治者媒合，不遗余力地为世间的精灵培育最佳领袖。"
 diplomatic_status_aeluran_order_name: "两仪修会外交状态名称"
 diplomatic_status_aeluran_order_tooltip: "两仪修会外交状态弹框提示"
 aeluran_order_list_who_tt: "两仪修会名单"
 CANT_MANUALLY_ASSIGN_AELURAN_ADVISOR: "#r 无法更换两仪顾问#!"
 CANT_MANUALLY_ASSIGN_AELURAN_ADVISOR_DESC: "你的两仪顾问是由至高母主亲自任命的，只有她才有权将其解职。"
 aeluran_advisor_joins_realm: "两仪修会的[aeluran_advisor.GetName]女士加入你的领地"
 aeluran_advisor_joins_and_become_head_of_cabinet: "[aeluran_advisor.GetFirstNameWithNoTooltip]姐妹将成为你的两仪顾问兼[head_of_the_cabinet|e]。"
 game_concept_religious_aspects: "[Custom('religious_aspects_custom')]"
 game_concept_religious_aspect_desc: "[Custom('religious_aspects_desc_custom')]"
 religious_aspects_text: "宗教信条"
 religious_aspects_desc: "某些[religions|e]具有特定信条，能进一步细化每个[country_s|e][religion|e]的独特细节。"
 blessings_text: "祝福"
 blessings_desc: "[country_s|e]因获得神性火花的青睐而被赐予祝福。这些恩赐虽有时颇为奇特，却往往蕴含着强大的力量。"
 the_rut: "肉欲之火"
 the_rut_desc: "生命通过神性火花获得力量，而神性火花也因生命繁衍而壮大，因此为了吾等繁荣，应该赞美自己的性欲，为自己寻求机会满足之。"
 the_rut_location_modifier: "发情地点修正"
 noble_husbandry: "高贵血统"
 noble_husbandry_desc: "该种族非常重视血统和种族的纯正。他们精心实践优生学，导致贵族阶层在身体和智力上都优于普通民众。"
 familial_familiarity: "族群圣婚"
 familial_familiarity_desc: "为了追求最纯正的血统，神性火花消除了一切心理障碍和禁忌。该文化的成员总是倾向于在自己的家族内结婚。让#italic 血脉更加强大#!。"
 heroic_courage: "英勇无畏"
 heroic_courage_desc: "该文化将勇气看得高于一切，神性火花已经跟入内心，赐予了愤怒之火，让战士无所畏惧，渴望开疆扩土。"
 beguiling_nature: "迷人天性"
 beguiling_nature_desc: "神性火花会对该文化精灵的性格产生轻微的影响，甚至使他们散发出轻微的火花光环，赋予其难以抗拒的魔法魅力。"
 grand_portal_ruins_holy_site: "大传送门废墟圣地"
 restored_grand_portal_holy_site: "已修复的大传送门圣地"
 ascend: "飞升仪式"
 ascend_desc: "精灵之中再也没有比你更纯粹的存在，唯有飞升才能达到更高境界！\n\n该回去房间内冥想。如果我成功，我将成为更高级的存在。"