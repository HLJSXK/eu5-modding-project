l_simp_chinese:
 mythril: "秘银"
 mythril_desc: "秘银，连维拉诸神都渴望的传奇金属。即便在精灵大师中，掌握这种金属锻造技艺者也极为罕见。矮人族中较为常见，但如今又该去哪里寻得他们的踪迹呢？"
 lembas: "兰巴斯"
 lembas_desc: "兰巴斯，即精灵的行路面包，如果用叶子包裹可以保持数月不坏，并能支撑一个人长时间的劳作。"
 elven_crafts: "精灵工艺品"
 elven_crafts_desc: "精灵工艺以其精美、繁复与实用而闻名。从精工打造的武器盔甲，到纤巧的首饰与繁复的挂毯，精灵工匠们长久以来传承着创造兼具美感与实用性的艺术品的传统。"
 mythril_elven_crafts: "精灵秘银工艺品"
 mythril_elven_crafts_desc: "精灵秘银工艺品是精灵工艺的巅峰之作，将秘银的特性与精灵工匠的艺术技巧完美结合。"
 lembas_bakery_slot_0: "兰巴斯面包店槽位0"
 lembas_bakery_slot_1: "兰巴斯面包坊槽位1"
 elven_workshop_slot_0: "精灵工坊槽位0"
