 gold_elven_master_workshop_maintenance: "精灵大师工坊黄金维护"
 seat_of_the_fey_lord: "精灵之主宝座"
 seat_of_the_fey_lord_desc: "精灵之主宝座是精灵统治者的御座，象征着其的权威以及与神灵的联系。"
 sanctum: "圣所"
 sanctum_desc: "高等精灵的主要居所，供居住并处理事务的神圣之地。"
 mallorn_tree_grove: "瑁珑森林"
 mallorn_tree_grove_desc: "$recieve_greater_blessing$#emp #color_gray 一片雄伟的瑁珑森林，其金叶银干是精灵族美丽与坚韧的象征。这片树林宁静而充满灵感，精灵艺术家与诗人常在此寻求慰藉与创作源泉。#!#!"
 baths_of_starlight: "星光浴场"
 baths_of_starlight_desc: "$recieve_greater_blessing$#emp #color_gray 星光浴场是精灵贵族的休憩之所，他们可以在柔和的星光下放松身心、恢复活力。据说这些浴场具有疗愈功效，许多精灵相信浸泡其中能增强他们与神灵的联系。#!#!"
 perfume_garden_of_valinor: "瓦林诺的芬芳花园"
 perfume_garden_of_valinor_desc: "$recieve_greater_blessing$#emp #color_gray 瓦林诺的芬芳花园是一片郁郁葱葱、香气四溢的绿洲，遍布着异域花卉与珍奇植物，它们能产出世间最为精妙的芬芳。这座花园由技艺精湛的精灵调香师悉心照料，他们运用稀有珍贵的原料，调制出备受精灵贵族乃至更广泛阶层追捧的香水。#!#!"
 wine_cellar_of_elder_days: "上古酒窖"
 wine_cellar_of_elder_days_desc: "$recieve_greater_blessing$#emp #color_gray 上古酒窖是一座广阔且古老的酒窖，收藏着各个时代最精美的佳酿。据说其中一些美酒曾受维拉亲自赐福，许多精灵相信，饮用此窖藏酒能让他们窥见往昔景象，并洞悉未来。#!#!"
 feasting_hall_of_the_trees: "林间盛宴厅"
 feasting_hall_of_the_trees_desc: "$recieve_greater_blessing$#emp #color_gray 林间盛宴厅是一座建于瑁珑森林树间的宏伟壮丽大厅。这里是精灵贵族们欢庆胜利、缅怀先祖、分享功绩传说的场所。#!#!"
 grand_archives: "大图书馆"
 grand_archives_desc: "$recieve_greater_blessing$#emp #color_gray 大图书馆是一座浩瀚的知识与智慧宝库，蕴藏着精灵积累的学识与历史。它由最博学的精灵学者与抄写员维护。#!#!"
 recieve_greater_blessing: "#!#high 国家在完成后会获得[ShowModifier('greater_religious_influence_bonus')]#!"
 grand_portal_ruins: "大传送门废墟"
 grand_portal_ruins_desc: "大传送门曾位面传送工具，如今已沦为废墟。据说它掌握着释放[ShowGodName('the_divine_spark')]在这个世界全部潜能的关键。如此奇迹，是否还有重见天日之时？"
 grand_portal: "大传送门"
 grand_portal_desc: "大传送门曾位面传送工具，已经恢复了昔日的辉煌。随着宏伟之门的恢复，[ShowGodName('the_divine_spark')]在这个世界的影响得到了加强，地球如今重新与宇宙中无数其他位面相连。"
 seat_of_the_fey_lord_maintenance: "精灵之主宝座维护"
 sanctum_maintenance: "圣所维护"
 aeluran_temple: "两仪飞地"
 aeluran_temple_desc: "#!#high 国家在完成后获得[ShowModifier('increased_aeluran_influence')]#!\n\n#emp #color_gray 两仪修会绯红姊妹们的聚集地。#!#!"
 shrine_to_vana: "瓦娜神殿"
 shrine_to_vana_desc: "#high 国家完成时获得[ShowModifier('lesser_religious_influence_bonus')]#!\n\n#emp #color_gray 献给繁荣与丰饶女神瓦娜的贡品。要滋养神性火花，必须要有生命。#!#!"
 lembas_baking_rice: "兰巴斯烘焙坊"
 lembas_baking_maize: "兰巴斯烘焙坊"
 mythril_elven_master_workshop_production_gold: "秘银精灵工艺黄金生产"
 mythril_elven_master_workshop_production_silver: "秘银精灵工艺品白银生产"
 mythril_elven_master_workshop_production_jewelry: "秘银精灵工艺品珠宝生产"
 perfume_garden_production: "芬芳花园生产"
 wine_cellar_production_fruit: "葡萄酒生产"
 wine_cellar_production_multiply: "陈酿葡萄酒生产"
 prime_portal_hub: "主传送门枢纽"
 prime_portal_hub_desc: "一座宏伟的建筑，它作为传送网络的主要中枢节点，使该国能够支持更多的[ShowBuildingTypeName('lesser_portal_node')]。"
 lesser_portal_node: "小型传送门节点"
 lesser_portal_node_desc: "一座虽不宏伟但仍相当引人注目的建筑。它作为传送门网络的前哨站，将这个地点与世界相连。"
 portal_maintenance: "传送门维护费"
 mercury_patio: "混汞提炼场"
 mercury_patio_desc: "$mercury_patio$对从低品位矿石中提取的银和金进行精炼，以提高利润。"