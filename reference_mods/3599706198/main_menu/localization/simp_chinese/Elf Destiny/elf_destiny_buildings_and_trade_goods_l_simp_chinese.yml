 elven_master_workshop_slot_1: "精灵大师工坊槽位1"
 lembas_bakery: "兰巴斯面包坊"
 lembas_bakery_desc: "生产兰巴斯面包的建筑，这是一种营养极高且饱腹感强，旅人仅需一小口便能维持数日所需。"
 elven_workshop: "精灵工坊"
 elven_workshop_desc: "一座生产精灵工艺品的建筑，以其精美、繁复且实用的特点而闻名。"
 elven_master_workshop: "精灵大师工坊"
 elven_master_workshop_desc: "一座生产精灵秘银工艺品的建筑，这是精灵工艺的巅峰之作。"
 lembas_baking: "兰巴斯面包制作"
