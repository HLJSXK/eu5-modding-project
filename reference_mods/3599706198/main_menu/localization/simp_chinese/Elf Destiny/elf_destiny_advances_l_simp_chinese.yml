l_simp_chinese:
 elven_lore: "精灵传说"
 elven_lore_desc: "远古智慧，与文明同寿。"
 beast_tamers: "驯兽师"
 beast_tamers_desc: "驯养与繁育野兽，精心打造强大而忠诚的生灵，使其成为主人意志的延伸。"
 elven_artisanship: "精灵工艺"
 elven_artisanship_desc: "精灵工匠以其精湛技艺与对细节的极致追求而闻名。他们的作品备受追捧，匠人们也广受青睐。"
 mythril_working: "秘银加工"
 mythril_working_desc: "秘银，连维拉诸神都渴望的传奇金属。即便在精灵大师中，掌握这种金属锻造技艺者也极为罕见。矮人族中较为常见，但如今又该去哪里寻得他们的踪迹呢？"
 forest_dominion: "森林领地"
 herbal_mastery: "草药精通"
 herbal_mastery_desc: "精灵们对世界上的植物了如指掌，他们调配的草药疗法以其强效与显著疗效而闻名。无论是治愈疾病、疗愈创伤，甚至通过草药配方延长寿命，皆在其掌握之中。"
 level_2_magic: "精炼火花编织"
 level_2_magic_desc: "神性火花在蛮夫手中不过是一根棍棒，但在精灵法师的掌控下，却能编织成精妙的能量图纹。"
 grand_portal_restored: "大传送门已修复"
 grand_portal_restored_desc: "必须修复大传送门，以增强[ShowGodName('the_divine_spark')]在这个世界的影响力，并重新连接多元位面。#!#color_light_gray \n\n要修复大传送门：\n$BULLET_WITH_TAB$使用[ruler|e]的[ShowCharacterInteractionName('fund_expedition')][character_interaction|e]来寻找：\n  $BULLET_WITH_TAB$一件#high 贮魔方晶#!宝物\n  $BULLET_WITH_TAB$一件#high 位面传送导仪#!宝物\n$BULLET_WITH_TAB$通过一项[ShowParliamentIssueTypeName('restore_portal')][parliament_issue|e]#!"
 level_3_magic: "晶化增幅"
 level_3_magic_desc: "精灵们已掌握通过水晶物体储存神性火花，从而增强其魔法威力。 "
 level_4_magic: "环境火花收集"
 level_4_magic_desc: "精灵们已研发出收集弥漫于世界中的神性火花的技术，使其能够从现实中汲取力量。"
 level_5_magic: "魂火赋能"
 level_5_magic_desc: "精灵们发现了古老术式，能够让他们汲取灵魂的力量，从而获得强大的魔法能力，并洞悉宇宙的本质。"
 level_6_magic: "神圣化身"
 level_6_magic_desc: "精灵们已经掌握了神性火花，能够显现出神灵的化身，引导神的力量来完成惊人的壮举。"
 level_2_war: "精英精灵战术"
 level_2_war_desc: "精灵们已将他们的战斗技巧与战术磨砺至炉火纯青之境，使其能在战场上灵活机动并击败敌人。"
 level_3_war: "武力至上"
 level_3_war_desc: "精灵们已经达到了武艺的精湛境界，这使得其能够凭借卓越的战术与战斗技巧便能主宰战场。"
 honor_of_the_fay: "精灵荣耀"
 honor_of_the_fay_desc: "精灵们遵循着一套严格的骑士荣誉准则，这套准则规范着他们的行为。它强调对自然的尊重、对族群的忠诚，以及在所有事务中追求卓越。"
 found_elven_portal_artifact_1: "在探险中发现了一个贮魔方晶"
 found_elven_portal_artifact_2: "在一次探险中发现了位面传送导仪"
 passed_restore_portal_through_parliament: "通过了[ShowParliamentIssueTypeName('restore_portal')][parliament_issue|e]"
 go_on_expeditions: "\n通过使用[ShowCharacterInteractionName('fund_expedition')][character_interaction|e]在你的国家[ruler|e]身上，可以重新发现古老的精灵知识。"
 discovered_people_of_the_bow_tradition: "#high 已发现：#!被遗忘的弓箭民族荣誉准则。$go_on_expeditions$"
 discovered_beast_tamers_tradition: "#high 已发现：#!失传的驯兽技艺。$go_on_expeditions$"
 discovered_mythril_working_tradition: "#high 已发现：#!失传的秘银加工技艺。$go_on_expeditions$"
 grand_portal_has_been_restored: "大传送门已修复，世间弥漫的神性火花也随之增强。"
 cant_yet_enter_god_tier: "很少有人知道爱努的晋升方法，据说要与神性火花结合为一！\n\n#D 作者还没有做#!"
 ruler_is_fae_tier_or_higher: "该国的[ruler|e]必须晋升至[ShowTraitName('elf_tier_4')]或更高等级"
 ruler_is_celestial_tier_or_higher: "该国[ruler|e]必须晋升至[ShowTraitName('elf_tier_7')]或更高等级。"