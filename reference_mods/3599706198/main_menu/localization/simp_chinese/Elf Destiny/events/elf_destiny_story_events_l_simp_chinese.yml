 elf_destiny_story.1.title: "什么是考古学家？"
 elf_destiny_story.1.desc: "我的财政总管向走你来，脸上挂满焦虑。\n\n“大人，有个奇怪的女人来求见您，她叫茱莉娅·梅尔伍德。她声称自己是一名训练有素的‘考古学家’，但我很确定这个头衔是她编造出来的。”这位自称专家的人打翻一个花瓶时，你们都扫了一眼。\n\n你的财政总管摇摇头，继续说道：“她显然找到了与‘精灵’有关的重大发现。在我看来，这些不过是孩子们的童话人物罢了，但看她这么坚持，我觉得最好还是把她带到您这里来。我该怎么跟她说？”"
 elf_destiny_story.1.desc.elven: "我的财政总管向走你来，脸上挂满焦虑。\n\n“大人，有个奇怪的女人来求见您，她叫茱莉娅·梅尔伍德。她声称自己是一名训练有素的‘考古学家’，但我很确定这个头衔是她编造出来的。”这位自称专家的人打翻一个花瓶时，你们都扫了一眼。\n\n你的财政总管摇摇头，继续说道：“她显然找到了与‘精灵’有关的重大发现。在我看来，这些不过是孩子们的童话人物罢了，但看她这么坚持，我觉得最好还是把她带到您这里来。我该怎么跟她说？”"
 elf_destiny_story.1.a: "我会知道事情的真相，让她进来！"
 elf_destiny_story.11.title: "探索精灵遗迹"
 elf_destiny_story.11.desc: "一位年轻女士向你走来，你的财政总管挥手示意她过去。\n\n“大人，我叫茱莉娅·梅尔伍德，恕我冒昧，我是这个领域里最好的考古学家之一。”#weak 你瞥了你的财政总管一眼，他看起来显然无动于衷。#!她在桌上放了一张卷好的羊皮纸，把它平放。你注意到边界上有奇怪的文字，也许是阿拉伯语的方言？\n\n“我努力探索我们祖先留下的线索，我的专长是研究神秘的精灵族。已经发现的少数文物告诉我们，他们是一个高度先进的文明，甚至比我们还先进，而且他们已经存在了几百年甚至#EMP 上千年#!。最近我发现了这张地图上面有我无法破译的精灵文字，但它似乎显示了末代精灵皇帝要塞陵墓的几个可能位置。如果是真的，它可能深藏着被时间遗忘的巨大宝藏。我想组织一支探险队去调查这些遗迹。但我需要资金来支持这次旅行。您愿意帮助我吗？”"
 elf_destiny_story.11.desc.elven: "一位年轻女士向你走来，你的财政总管挥手示意她过去。\n\n“大人，我叫茱莉娅·梅尔伍德，恕我冒昧，我是这个领域里最好的考古学家之一。”#weak 你瞥了你的财政总管一眼，他看起来显然无动于衷。#!她在桌上放了一张卷好的羊皮纸，把它平放。你注意到边界上有奇怪的文字，也许是阿拉伯语的方言？\n\n“我努力探索我们祖先留下的线索，我的专长是研究神秘的精灵族。已经发现的少数文物告诉我们，他们是一个高度先进的文明，甚至比我们还先进，而且他们已经存在了几百年甚至上千年。最近我发现了这张地图上面有我无法破译的精灵文字，但它似乎显示了末代精灵皇帝要塞陵墓的几个可能位置。如果是真的，它可能深藏着被时间遗忘的巨大宝藏。我想组织一支探险队去调查这些遗迹。但我需要资金来支持这次旅行。您愿意帮助我吗？”"
 elf_destiny_story.11.a: "我支持你！"
 elf_destiny_story.11.b: "精灵？别浪费我的时间，这不过是个童话罢了。"
 elf_destiny_story.11.b.elves: "我绝不会让凡人侵扰我祖先的墓穴！把她赶走！"
 elf_destiny_story.2.title: "光辉的发现"
 elf_destiny_story.2.desc: "宫廷中消息传开，你雇佣的考古学家茱莉娅凯旋而归。当容光焕发的茱莉娅转向你并打开一个小箱子时，整个宫廷都聚集在大厅里。\n\n“我猜得没错，[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，那些确实是精灵遗迹：一位古代精灵皇帝的陵墓。我们发现了许多奇珍异宝，但没有一件能与这个媲美。”\n\n箱中躺着一枚光芒四射的护身符：一块散发着未知力量的水晶，然后你被一种无法抗拒的吸引力吸引了。"
 elf_destiny_story.2.a: "伸手抓住护身符"
 elf_destiny_story.21.title: "强大存在"
 elf_destiny_story.21.desc: "当你触碰宝石时，一道耀眼的光芒将你和茱莉亚包裹。你感觉自己像在狂风暴雨中漂泊的小船，唯一的慰藉是#bold 你并不孤单 #!。你意识到那不是茱莉亚，那是一个广阔而难以理解的存在。它既让你感到安慰又让你感到恐惧，在保护你免受光芒伤害的同时，用穿透一切的目光审视着你的每一丝存在。\n\n这段经历让你的感官变得更加敏锐：你能感受到自己的心跳、呼吸、血液流动以及思维活动。你的灵魂在颤抖。"
 elf_destiny_story.21.a: "这是……死亡吗？"
 elf_destiny_story.22.title: "往昔幻象"
 elf_destiny_story.22.desc: "在刺眼的光芒中，你的脑海中充满了过去的画面。你看到了古代伟大的精灵们是如何生活的，并充满了他们所感受到的各种情感。你知道，你可以继续牵着这根线，把他们的希望和信仰化为己有。\n\n你是接纳精灵文化并重新开始，还是继续发展你现有的文化？"
 elf_destiny_story.22.elven: "赞美神性火花！"
 elf_destiny_story.22.convert: "我将接纳[ShowCultureName('elven_culture')]文化。"
 elf_destiny_story.22.dontConvert: "我会以现有的文化为基础，塑造新的精灵族群。"
 all_characters_convert_to_elven: "[ROOT.GetCountry.GetName]的所有角色都接受了精灵文化"
 all_pops_convert_to_elven: "[ROOT.GetCountry.GetName]的所有人口都接受了精灵文化"
 elf_destiny_story.23.title: "惊人的变化"
 elf_destiny_story.23.desc: "光芒渐逝，世界重新聚焦。你感到自己发生了变化，随后望向朱莉娅，你注意到她的耳朵变长了。你摸了摸自己的耳尖，发现同样如此。\n\n“看来我们被转化成了精灵，就像传说中的古老种族！”\n\n这对你和你的领地意味着什么，还有待观察。"
 elf_destiny_story.23.desc.elven: "光芒渐逝，世界重新聚焦。你感到自己发生了变化，随后望向朱莉娅，你注意到她的耳朵变长了。你摸了摸自己的耳尖，发现同样如此。\n\n似乎在场的所有人都升格到了更高的精灵存在层次！"
 elf_destiny_story.23.a: "太奇妙了！"
 unlock_expedition_character_action_tooltip: "你的[ruler|e]解锁了[ShowCharacterInteractionName('fund_expedition')][character_interaction|e]"
 entire_court_turned_into_elves: "[ROOT.GetCountry.GetName]宫廷中的每个角色都转为[ShowTraitName('elf_tier_2')]！"
 all_character_ascend: "[ROOT.GetCountry.GetName]的所有角色已飞升至更高阶的精灵等级！"
 elf_destiny_story.24.title: "命运转折"
 elf_destiny_story.24.desc: "消息如潮水般涌来：不仅是你的宫廷，[ROOT.GetCountry.GetName]也已彻底改变。人民将如何适应如此天翻地覆的变革？你会攀上新的高峰，还是让敌人趁乱得利？你领地的命运，此刻正掌握在你手中。"
 elf_destiny_story.24.a: "[ROOT.GetCountry.GetName]的新时代！"
 elf_destiny_story.3.title: "梦的抉择"
 elf_destiny_story.3.desc: "你在难得的睡眠中，那个熟悉的气息又回来了——就是你触碰护身符时感受到的那个。它没有用言语，而是将一个想法直接投射到你的脑海中。\n\n#yellow_titles “仔细看。”#!\n\n无数个生命在你眼前闪过，几乎要压垮你的所有感官：人类与精灵之间的大战，建立在人类奴隶背上的帝国，以及人类和精灵国王共享的盛大宴会。那个存在又植入了另一个想法。#yellow_titles “选择。”#!"
 elf_destiny_story.3.good: "人类与精灵将在友谊中共同生活！"
 elf_destiny_story.3.evil: "精灵高于人类！除此之外皆为谬论。"
 elf_destiny_story.4.title: "绯红访客"
 elf_destiny_story.4.desc: "当我躺下准备睡时，庭院发生了骚乱。我连忙爬起唤来仆人问候是怎么回事，仆人解释道，两仪修会，也就是普通人口中的绯红女巫，出现在了庭院里，要求与我会面。并说她们知道我上次探索的发现。"
 elf_destiny_story.4.a: "我会在会议厅里听她们说的，让她们进来。"
 elf_destiny_story.41.title: "绯红访客"
 elf_destiny_story.41.desc: "我走进会议厅，发现两位看着十分年轻红衣女子正在等候，看来这就是传说中的两仪姊妹，其中一位女士走上前来。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我叫[portrait_1.GetFirstNameWithNoTooltip]，来自两仪修会，您有幸面对两仪至高母主。”\n\n听完介绍，另一位女士走上前来，与你对视，她的动作优雅自如，年轻的脸庞上不觉流露出优雅与睿智。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我知道我们的到来出乎意料，但我们是来讨论一件重要的事情，我感受到一股神圣能量，而我们在人类的土地上发现您是一个精灵也证实了这一点。我知道您已经找到了位面之主的徽章。”"
 elf_destiny_story.41.desc.elven: "我走进会议厅，发现两位看着十分年轻红衣女子正在等候，看来这就是传说中的两仪姊妹，其中一位女士走上前来。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我叫[portrait_1.GetFirstNameWithNoTooltip]，来自两仪修会，您有幸面对两仪至高母主。”\n\n听完介绍，另一位女士走上前来，与你对视，她的动作优雅自如，年轻的脸庞上不觉流露出优雅与睿智。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我知道我们的到来出乎意料，但我们是来讨论一件重要的事情，我感受到一股神圣能量，而我们在人类的土地上发现您是一个精灵也证实了这一点。我知道您已经找到了位面之主的徽章。”"
 elf_destiny_story.41.a: "你是怎么知道的？"
 elf_destiny_story.42.title: "绯红访客"
 elf_destiny_story.42.desc: "“我们并不是与您争夺徽章。徽章只对它认为有价值的人有反应，拥有它，您就是这个世界无可争议的#bold 精灵领主#!。在远古时代，精灵和人类通过一个巨大的传送门来到这个世界，从那时起，无数帝国兴起又衰落。而现在，您发现的精灵皇帝在一场大规模的叛乱中被推翻了。”\n\n而我有些感到不可思议，年轻的红衣女子只是微微叹口气继续说道：“世界上的大部分精灵不是被杀，就是通过传送门逃回了这个世界。但仍有一小部分人留在了遥远的荒野，在那里他们可以安居乐业。大逃亡之后，传送门的重要组成部分被叛军摧毁，我们通往其他位面的入口也随之失守。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，徽章选择您并在此时出现绝非巧合。它证实了神性火花，万物的伟大创造者，正在昭示它的意志。是时候修复大传送门，迎接伟大的精灵族重返这个世界了！”"
 elf_destiny_story.42.a: "这是天命！"
 elf_destiny_story.43.title: "绯红访客"
 elf_destiny_story.43.desc: "“的确如此！您需要找到被摧毁的传送门组件的替代品。我听说这种东西很稀有，但在古代仍然可以买到。您必须继续探索古代精灵遗址，找到需要的部件。”她说完，示意姊妹把地图放在桌子上，“我们带来了地图，上面详细标注了一些新的精灵遗迹，您可以去调查一下。”\n\n[portrait_1.GetFirstNameWithNoTooltip]深深地注视着你：“世界的命运掌握在你的手中。我可不是随便说说的。”\n\n“在我们踏上返回北方圣地的漫长旅途之前，我还有一件事要和您商量。按照惯例，所有精灵领主都会接受神性火花作为宇宙的真正指引力量。此外，两仪修会的姊妹也被视为其意志的牧者。我恳求您的领地接纳两仪姊妹修会。”"
 elf_destiny_story.43.desc.elven: "“的确如此！您需要找到被摧毁的传送门组件的替代品。我听说这种东西很稀有，但在古代仍然可以买到。您必须继续探索古代精灵遗址，找到需要的部件。”她说完，示意姊妹把地图放在桌子上，“我们带来了地图，上面详细标注了一些新的精灵遗迹，您可以去调查一下。”\n\n[portrait_1.GetFirstNameWithNoTooltip]深深地注视着你：“世界的命运掌握在你的手中。我可不是随便说说的。”\n\n“在我们踏上返回北方圣地的漫长旅途之前，我还有一件事要和您商量。按照惯例，所有精灵领主都会接受神性火花作为宇宙的真正指引力量。此外，两仪修会的姊妹也被视为其意志的牧者。我恳求您的领地接纳两仪姊妹修会。”"
 elf_destiny_story.43.a: "我很荣幸欢迎两仪姊妹来到我的领地。"
 elf_destiny_story.43.b: "我不想让我的领土被绯红女巫统治！"
 elf_destiny_story.43.a.elven: "我们绝不会失败！"
 all_characters_convert_to_aeluran: "[ROOT.GetCountry.GetName]的所有角色都皈依了两仪信仰"
 all_pops_convert_to_aeluran: "[ROOT.GetCountry.GetName]的所有人口都皈依了两仪信仰"
 elf_destiny_story.5.title: "转移大传送门"
 elf_destiny_story.5.desc: "所有的巨石门部件都被小心翼翼地装载到巨大的马车上，开始向你的首都[capital.GetName]进发\n\n新时代将在那里开始！"
 elf_destiny_story.5.a: "请务必小心！"
 elf_destiny_story.51.title: "转移大传送门：抵达"
 elf_destiny_story.51.desc: "承载着大传送门的最后一批马车已安然抵达首都。\n\n你是否要将其恢复至往昔的荣光？"
 elf_destiny_story.51.a: "这只是第一步，精灵必将再度辉煌！"
 grand_portal_ruins_built_in_capital_tooltip: "[grand_portal_ruins.GetName]建造在[capital.GetName]"
 elf_destiny_story.52.title: "修复大传送门"
 elf_destiny_story.52.a: "我们立刻动工！"
 elf_destiny_story.53.title: "传送门已修复！"
 elf_destiny_story.53.desc: "历经重重考验与巨大代价，大传送门终于修复完成！无数位面之间的通道再次开启。\n\n这会给你的领地带来无尽的繁荣还是巨大的危险？谁将穿越传送门而来？是新的盟友还是强大的敌人？\n\n这些问题以及更多谜团即将揭晓！\n\n#bold 你能感受到命运之线的牵引。#!如今你已是真正的位面之主，是时候在历史上留下你的印记了。\n#bold 精灵的时代再度降临！#!"
 elf_destiny_story.53.a: "新时代到来了！"
 elf_destiny_story.54.title: "感谢游玩！"
 elf_destiny_story.54.desc: "抱歉，目前故事内容就到这里！更多内容正在制作中，请访问官方Discord以获取最新更新并提交反馈！\n\n我还是想奖励你玩到这么远，所以请选择你想要的奖励！再次感谢！"
 elf_destiny_story.54.a: "免费的祝福！"
 elf_destiny_story.54.b: "黄金！"
 elf_destiny_story.54.c: "威望与稳定！"
 elf_destiny_story.54.d: "我什么都不要。"