l_simp_chinese:
 fund_expedition: "资助探险"
 fund_expedition_desc: "探险是为了重新发现古代精灵民族的秘密。\n\n一队冒险者将探索精灵遗迹，寻找失落已久的古老知识和巨大宝藏。"
 fund_expedition_desc_specific: "探险为了重新发现古代精灵民族的秘密。\n\n一支冒险者队伍将探索精灵遗迹，寻找失落的古老知识与巨大宝藏。他们可能发现：\n$BULLET_WITH_TAB$可以卖为[gold|e]的珍贵宝藏\n$BULLET_WITH_TAB$从奇特文物中获得[research|e]进度\n$BULLET_WITH_TAB$通过失落遗物获取[religious_influence|e]\n$BULLET_WITH_TAB$独特的精灵族[advances|e]与[government_reforms|e]\n$BULLET_WITH_TAB$以及更多收获！"
 fund_expedition_act: "资助探险行动"
 fund_expedition_act_past: "探险资金已到位，旅途所需的物资正在筹备中。"
 fund_expedition_past: "探险资金已到位！"
 fund_expedition_concept: "派遣一支队伍探索古代精灵遗迹"
 expedition_price: "探险价格"
 elf_destiny_expedition.1.title: "精灵遗迹探险：选择一位领队"
 elf_destiny_expedition.1.desc: "准备工作已经就绪，古老的精灵遗迹正召唤着我们。现在只剩下指派一位合适的领队来负责这项事业了。你会选择谁来领导这次远征呢？\n\n#high 提示：#!拥有[explorer|e][traits|e]且@adm![adm|e]技能较高的角色在远征中会有更高的成功概率。"
 elf_destiny_expedition.1.a: "派遣[char1.GetName]"
 elf_destiny_expedition.1.b: "派遣[char2.GetName]"
 elf_destiny_expedition.1.c: "派遣[char3.GetName]"
 elf_destiny_expedition.1.d: "谁来都行"
 elf_destiny_expedition.11.title: "精灵遗迹探险：领队已选定"
 elf_destiny_expedition.11.desc: "“大人，能得您信任，我深感荣幸。我定不负所托。”"
 elf_destiny_expedition.11.a: "祝你好运！"
 elf_destiny_expedition.21.title: "探险：取得进展"
 elf_destiny_expedition.21.desc.major: "$expedition_supplies_remaining$你收到了探险队领队的一封来信。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我们对精灵遗迹的探险已初见成果。我们发现了古代遗物，并破译了地图上部分精灵文字。我们离发现某种极其重要的事物已近在咫尺，我能感觉到。”"
 elf_destiny_expedition.21.desc.minor: "$expedition_supplies_remaining$你收到一封来自探险领队的信件。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我们对精灵遗迹的探险已取得成果。我们发掘出了一些遗物，并破译了地图上精灵文字的一小部分。我们的发现表明，我们正走在正确的道路上。”"
 elf_destiny_expedition.21.a: "好消息！"
 elf_destiny_expedition.22.title: "探险：失去进展"
 elf_destiny_expedition.22.desc.critical: "$expedition_supplies_remaining$一封来自探险队领队的信件送达，据报送信人遭受重伤，不久后便去世了。信件上血迹斑斑，难以辨认。\n\n“他们已攻占桥梁与第二大厅。我们虽已封锁大门，但无法长久坚守。大地在震动……鼓声，深渊传来鼓声。我们无法脱身。阴影在黑暗中移动。我们无法脱身，他们来了。”\n看来探险队遭遇了可怕的命运。[recipient.GetName]及其全体成员据推测已全部遇难。"
 elf_destiny_expedition.22.desc.major: "$expedition_supplies_remaining$你收到了探险队领队的一封来信。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我们在探索精灵遗迹的远征中遭遇了不幸。一场突如其来的风暴摧毁了我们大部分装备和补给，使我们损失惨重，我们需要重新集结并恢复之后才能继续搜索。”"
 elf_destiny_expedition.22.desc.minor: "$expedition_supplies_remaining$你收到一封来自探险领队的信件。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，不幸的事件阻碍了我们前往精灵遗迹的探险。一伙掠夺者伏击了我们，偷走了一些补给品并损坏了我们的装备。我们需要休整后才能继续前进。”"
 elf_destiny_expedition.22.a: "我知道了……"
 elf_destiny_expedition.22.b: "愿他们的灵魂安息……"
 elf_destiny_expedition.22.c: "……"
 minor_expedition_success_text: "探险队取得了#G 小#!进展。"
 major_expedition_success_text: "探险队取得了#G 大#!进展。"
 minor_expedition_failure_text: "探险队失去了#R 小#!进展。"
 major_expedition_failure_text: "探险队失去了#R 大#!进展。"
 critical_expedition_failure_text: "#R 探险以灾难告终#!"
 minor_expedition_success_tooltip: "\n\n$minor_expedition_success_text$"
 major_expedition_success_tooltip: "\n\n$major_expedition_success_text$"
 minor_expedition_failure_tooltip: "\n\n$minor_expedition_failure_text$"
 major_expedition_failure_tooltip: "\n\n$major_expedition_failure_text$"
 critical_expedition_failure_tooltip: "\n\n$critical_expedition_failure_text$"
 expedition_supplies_increased_1: "探险补给增加了1个月"
 expedition_supplies_remaining: "#yellow_titles 探险补给剩余：#! [SCOPE.GetValue('expedition_supplies')]个月\n"
 elf_destiny_expedition.230.title: "探险：请求援助"
 elf_destiny_expedition.230.desc: "$expedition_supplies_remaining$你收到了探险队领队的一封来信。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我们队伍中有许多人死于瘟疫。如果我们找不到更多人手来替代他们，我们的进度将大大放缓。”\n\n这要如何是好？"
 elf_destiny_expedition.230.send: "再派些人手过去"
 elf_destiny_expedition.230.dontSend: "他们只能将就着用了。"
 elf_destiny_expedition.231.title: "探险：请求援助"
 elf_destiny_expedition.231.desc: "$expedition_supplies_remaining$你收到一封来自探险队领队的信函。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，该地区的原住民对我们打扰遗址感到十分不满。恐怕如果我们不采取行动，可能会引发暴力冲突。”\n\n这要如何是好？"
 elf_destiny_expedition.231.ignore: "无视当地人"
 elf_destiny_expedition.231.diplo: "派遣外交官安抚当地民众"
 elf_destiny_expedition.231.gold: "赠送黄金以收买当地人的忠诚，并确保物资供应。"
 elf_destiny_expedition.232.title: "探险：请求援助"
 elf_destiny_expedition.232.desc: "$expedition_supplies_remaining$你收到了探险队领队的一封来信。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，在我们发掘遗址时，发现一座古老的墓地挡住了去路。移除它将是亵渎之举，但绕开挖掘又会让我们耽搁数月。”\n\n这要如何是好？"
 elf_destiny_expedition.232.dig: "挖开他们！"
 elf_destiny_expedition.232.dontDig: "不要亵渎！"
 elf_destiny_expedition.3.title: "探险成功！"
 elf_destiny_expedition.3.desc.standard: "探险队已经归来，[recipient.GetName]及其随行人员带来了令人惊叹的精灵文物与圣物。\n\n“[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]，我们的远征取得了成功！”"
 elf_destiny_expedition.3.desc.special: "\n“我们在那里发现了一些特别的东西，”[recipient.GetName]说着，将一个华丽的箱子呈现在你面前。"
 elf_destiny_expedition.3.desc.research: "\n“在我们发现的遗物中，有一本古老的精灵典籍。书页间记载着早已被遗忘的知识。我相信其中蕴藏着能极大推进我们对世界认知的奥秘。”"
 elf_destiny_expedition.3.desc.religious: "\n“在遗物中，我们发现一尊古老的精灵神像，描绘的是一位强大的维拉。它的存在散发着神圣的能量。我相信它与神性火花有着某种联系。”"
 open_special_chest_tooltip: "你打开了箱子"
 elf_destiny_expedition.3.a: "干得漂亮！我们对古代精灵的了解又加深了。"
 elf_destiny_expedition.3.b: "里面有什么！？"
 elf_destiny_expedition.31.title: "神性火花的共鸣"
 elf_destiny_expedition.31.desc: "你打开箱子，发现"
 elf_destiny_expedition.31.desc.people_of_the_bow: "一把由未知木材制成且工艺精湛的弓。"
 elf_destiny_expedition.31.desc.beast_tamers: "一本名为《王家动物园动物志与饲养指南第三版》的书。"
 elf_destiny_expedition.31.desc.mythril_working: "一套精致的金属工具，或许出自铁匠铺。"
 elf_destiny_expedition.31.desc.close: "它散发出微弱且神秘的光芒。你可以感受到神性火花的存在，这表明古代精灵与这件神秘宝物之间有着深厚的联系。\n\n一种想要伸手触摸它的冲动涌上心头。你本能地知道，通过与它接触，你可以获得失落的知识，这应该……"
 elf_destiny_expedition.31.a: "触碰宝物"
 elf_destiny_expedition.31.b: "关闭箱子"
 gain_honor_of_the_fay_research_tooltip: "获得[ShowAdvanceName('honor_of_the_fay')][advance|e]"
 gain_beast_tamers_research_tooltip: "获得[ShowAdvanceName('beast_tamers')][advance|e]"
 gain_mythril_working_research_tooltip: "获得[ShowAdvanceName('mythril_working')][advance|e]"
 elf_destiny_expedition.321.title: "大传送门：贮魔方晶"
 elf_destiny_expedition.321.desc: "你已经找回了一个恢复大传送门所需的重要部件。这个部件制作精良，蕴含着潜在的能量。有了它，我们离重新打开精灵族回归的门户又近了一步。"
 elf_destiny_expedition.321.a: "奇妙的发现！"
 elf_destiny_expedition.322.title: "大传送门：位面传送导仪"
 elf_destiny_expedition.322.desc: "你已经找回了一个恢复大传送门所需的重要部件。这个部件制作精良，蕴含着潜在的能量。有了它，我们离重新打开精灵族回归的门户又近了一步。"
 elf_destiny_expedition.322.a: "奇妙的发现！"
 elf_destiny_expedition.33.title: "神秘灵药"
 elf_destiny_expedition.33.desc: "箱子里躺着一支小瓶，里面装着闪烁的液体，领队解释说，这种药剂是在废墟的密室里发现的，其不清楚具体功效。你不太确定喝下不明液体是否明智，而且精灵药水向来以效果难以预测而闻名。或许当地的炼金术士会愿意出高价收购它。\n"
 elf_destiny_expedition.33.a: "喝下去！"
 elf_destiny_expedition.33.b: "卖掉它"
 elf_destiny_expedition.331.title: "一饮而尽"
 elf_destiny_expedition.331.desc: "你拔开瓶塞，饮下那闪烁着微光的液体。\n\n"
 elf_destiny_expedition.331.desc.stat_boosts: "你感到精力充沛，感官敏锐，思维也获得了前所未有的清晰。看来这灵药确实提升了你的心智能力。"
 elf_destiny_expedition.331.desc.extend_life: "你感到一股能量与活力在血脉中奔涌，你的寿命得以延长！"
 elf_destiny_expedition.331.desc.stat_penalties: "你几乎立刻感到一阵眩晕和恶心。头痛欲裂，你努力维持着平衡。看来这灵药对你的精神健康产生了不良影响。"
 elf_destiny_expedition.331.desc.trait_positive: "你的皮肤感到一阵刺痛，一股暖流遍布全身。你能感觉到身体正在发生变化和增强。看来这种药剂赋予了你一种新的遗传特质，真是太奇妙了！"
 elf_destiny_expedition.331.desc.trait_negative: "一股寒意顺着你的脊梁骨流下，一种不安的感觉笼罩了你。你感觉到自己体内正在发生一种奇怪的转变，改变着你的本质。看来这种药剂给你带来了一种有害的遗传特质。"
 elf_destiny_expedition.331.a: "#color_green “嗝”#!"
 gained_beauty_good_2_trait_tooltip: "获得了一个遗传特质"
 gained_physique_good_2_trait_tooltip: "获得了一个遗传特质"
 gained_intellect_good_2_trait_tooltip: "获得了一个遗传特质"
 gained_fecund_trait_tooltip: "获得了一个遗传特质"
 gained_beauty_bad_2_trait_tooltip: "获得了一个遗传特质"
 gained_physique_bad_2_trait_tooltip: "获得了一个遗传特质"
 gained_intellect_bad_2_trait_tooltip: "获得了一个遗传特质"
 elf_destiny_expedition.4.title: "探险失败"
 elf_destiny_expedition.4.desc: "探险队已耗尽补给，空手而归。\n\n“我让您失望了，[ROOT.GetCountry.GetGovernment.GetRuler.Custom('GetLadyLord')]。请宽恕我。”"
 elf_destiny_expedition.4.a: "真令人失望。"