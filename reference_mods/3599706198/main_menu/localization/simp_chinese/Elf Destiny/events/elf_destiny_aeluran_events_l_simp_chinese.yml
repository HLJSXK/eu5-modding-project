l_simp_chinese:
 aeluran_events.1.title: "一位新的绯红姊妹"
 aeluran_events.1.desc: "两仪母主已任命你为新的两仪顾问。"
 aeluran_events.1.a: "确实是一位明智的顾问"
 aeluran_events.2.ruler_desc: "两仪主母议会出现了一个空缺，议会已选定[new_matron.GetName]担任新的[ShowTraitName('aeluran_matron')]。"
 aeluran_events.2.courtier_desc: "两仪主母议会出现了一个空缺，议会已选定[new_matron.GetName]担任新的[ShowTraitName('aeluran_matron')]。"
 aeluran_events.2.a: "赞美神性火花！"
 aeluran_events.3.title: "新的母主"
 aeluran_events.3.desc: "现在是所有精灵哀悼的时刻。神圣的至高母主[target.GetName]已经归于神性火花。\n\n随着她的逝去，主母议会已经召开会议，选出了下一任至高母主。\n\n现在，红袍传到了[new_matriarch.GetName]的手中。老母主已逝，新母主万岁！"
 aeluran_events.3.a: "赞美神性火花！"
 aeluran_events.31.title: "新的母主"
 aeluran_events.31.ruler_desc: "现在是所有精灵哀悼的时刻。神圣的至高母主[target.GetName]已经归于神性火花。\n\n随着她的逝去，主母议会已经召开会议，选出了下一任至高母主。\n\n现在，红袍传到了#high 你的统治者#![new_matriarch.GetName]的手中。老母主已逝，新母主万岁！"
 aeluran_events.31.courtier_desc: "现在是所有精灵哀悼的时刻。神圣的至高母主[target.GetName]已经归于神性火花。\n\n随着她的逝去，主母议会已经召开会议，选出了下一任至高母主。\n\n现在，红袍传到了#high 你的宫廷成员#![new_matriarch.GetName]的手中。老母主已逝，新母主万岁！"
 aeluran_events.31.a: "赞美神性火花！"
 aeluran_events.4.title: "深林之女"
 aeluran_events.4.desc: "[new_sister.GetName]现已年满，可被两仪师带走接受修会的训练，她将启程前往[GetCountry('DWD').GetName]。"
 aeluran_events.4.a: "这是火花的意志"
 aeluran_events.4.refuse: "我需要[new_sister.GetName]陪着我，她绝不会披上红袍！"
 aeluran_events.41.title: "姊妹归来"
 aeluran_events.41.desc: "[new_sister.GetName]已从[GetCountry('DWD').GetName]学成归来，成为一位训练有素的[ShowTraitName('aeluran_sister')]并重返你的宫廷。"
 aeluran_events.41.a: "欢迎回来！"