l_simp_chinese:
 elf_destiny_misc.1.title: "发情期开始"
 elf_destiny_misc.1.desc: "神性火花在不安的躁动，我在空气中感到烦躁，一股席卷了[ROOT.GetCountry.GetName]的子民。"
 elf_destiny_misc.1.a: "就像人们说的兔子一样……"
 elf_destiny_misc.20.title: "感受神性火花"
 elf_destiny_misc.20.desc: "[recipient.GetName]正在过着自己的日常生活，突然间感到一股强大的存在感笼罩了其感官，然后站在神性火花面前，它认为[recipient.GetName]是值得的。为了表示认可，它赐予了一份礼物，将一部分力量注入了[recipient.GetName]的灵魂。\n\n[recipient.GetName]已经成为了一名[trait.GetName]"
 elf_destiny_misc.20.a: "神性火花保佑！"
 elf_destiny_misc.21.title: "感受神性火花"
 elf_destiny_misc.21.desc: "[recipient.GetName]正在过着自己的日常生活，突然间感到一股强大的存在感笼罩了其感官，然后站在神性火花面前，它认为[recipient.GetName]是值得的。为了表示认可，它赐予了一份礼物，将一部分力量注入了[recipient.GetName]的灵魂。\n\n[recipient.GetName]已经成为了一名[trait.GetName]"
 elf_destiny_misc.21.a: "神性火花保佑！"
 elf_destiny_misc.31.title: "忠诚的诺言"
 elf_destiny_misc.31.desc: "一位来自高贵血统的精灵领主带着他的家人来到了你的领地。他的家族近来陷入了困境，土地也被夺走了。他听说了你作为公正领主的名声，希望如果可以的话，对方愿向你宣誓效忠。"
 elf_destiny_misc.31.accept: "将他们迎入宫廷"
 elf_destiny_misc.31.refuse: "把他们赶走"
 elf_destiny_misc.31.family_leaves: "精灵家族离开了"
 elf_destiny_misc.32.title: "前途无量的孤儿"
 elf_destiny_misc.32.desc: "一个年幼的孩子独自来到你的领地，状况十分糟糕。[orphan.GetHeShe|U]声称自己出身于一个高贵的贵族家庭，[orphan.GetHerHis]的父母最近在战争中去世了。临终前，他们嘱咐[orphan.GetHerHim]前来寻求你的庇护。尽管年纪尚幼，经历了如此悲痛，这孩子谈吐依然得体，举止也相当不凡——你能感受到[orphan.GetHerHim]身上蕴藏着巨大的潜力。"
 elf_destiny_misc.32.accept: "将其迎入宫廷"
 elf_destiny_misc.32.refuse: "把这孩子赶走"
 elf_destiny_misc.32.orphan_leaves: "[orphan.GetName]离开了"
 elf_destiny_misc.41.title: "高等精灵宣誓效忠"
 elf_destiny_misc.41.desc: "一对高等精灵出现在你的领地，并宣誓向你效忠。能吸引如此的精灵，我们国家的威望必定极为显赫。"
 elf_destiny_misc.41.a: "欢迎高等精灵们"
 elf_destiny_misc.42.title: "贵族飞升"
 elf_destiny_misc.42.desc: "你的宫廷中爆发了欢庆。昨夜，[new_calaquendi.GetName]成功飞升，成为了一位[ShowTraitName('elf_tier_3')]！\n\n凭借[new_calaquendi.GetHerHis]新获得的力量与威望，[new_calaquendi.GetSheHe]从[ShowEstateTypeName('nobles_estate')]擢升至[ShowEstateTypeName('calaquendi_estate')][estate|e]。"
 elf_destiny_misc.42.a: "赞美火花！"
 elf_destiny_misc.5.title: "传送门传送"
 elf_destiny_misc.5.desc: "[unit_to_teleport.GetName]将被传送至何处？\n$teleportation_cost_explanation$$elf_destiny_debug_scroll_for_more$"
 elf_destiny_misc.5.location_1: "[location_1.GetOwner.GetName]至[location_1.GetName]"
 elf_destiny_misc.5.location_2: "[location_2.GetOwner.GetName]至[location_2.GetName]"
 elf_destiny_misc.5.location_3: "[location_3.GetOwner.GetName]至[location_3.GetName]"
 elf_destiny_misc.5.location_4: "[location_4.GetOwner.GetName]至[location_4.GetName]"
 elf_destiny_misc.5.next: "@blue_right!"
 elf_destiny_misc.5.prev: "@blue_left!"
 elf_destiny_misc.5.fallback: "没有可用的传送地点"
 elf_destiny_misc.5.cancel: "取消传送"