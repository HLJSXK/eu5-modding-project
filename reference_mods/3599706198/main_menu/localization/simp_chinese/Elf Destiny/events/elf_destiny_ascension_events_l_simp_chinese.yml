 ascension_events.2.title: "神性火花赐福术式"
 ascension_events.2.desc: "当冥想时，你感觉到一种熟悉的存在，你知道神性火花已经将目光投向了你。你再次看到无数的可能性在眼前闪过，又迅速消失，只留下一个想法的影子。\n\n#yellow_titles  “选择”#!"
 the_rut_blessing_option: "我的子民将遍地繁衍！"
 beguiling_nature_blessing_option: "我们的恩典将俘获更卑微的凡人！"
