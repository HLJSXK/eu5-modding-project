 ascension_events.11.title: "神性共融"
 ascension_events.11.desc.solo: "你退回到自己的房间，开始冥想。一股熟悉的气息能被感知到，你知道神性火花已将目光投向你。你感受到它的审视，然后是认可，力量在你周身流转，狂喜充满了你的心。"
 ascension_events.11.desc.family: "你与家人一同退入内室。你们手牵手开始冥想。一股熟悉的气息悄然降临，你知道神性火花已将目光投向你。你感受到它的审视，随后是认可，力量在你周身流转，狂喜充盈着你的内心。"
 ascension_events.11.a: "无限力量！"
 ascension_events.12.title: "你已飞升！"
