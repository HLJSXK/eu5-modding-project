 ascension_events.21.title: "神圣审判"
 ascension_events.21.desc: "\n\n一股熟悉的气息弥漫开来，你知道神性火花正注视着你。你从中感受到一种前所未有的奇异情绪……那感觉像是在审判？"
 ascension_events.21.a: "保持沉默。"
 ascension_events.211.title: "神圣审判"
 ascension_events.211.desc: "#high ……#!"
 ascension_events.211.a: "继续沉默地站着。"
 ascension_events.212.title: "神圣审判"
 ascension_events.212.desc: "#high . . .  . . .  . . . #yellow_titles 一股叹息#!"
 ascension_events.212.a: "赞……赞美火花……"
 mythril_blessing_option: "我的领土将富庶无比！"
 ascension_events.22.title: "财富祝福"
 ascension_events.22.desc: "一道璀璨夺目的神性火花光束从天而降，聚焦于[selected_location.GetName]。这蔚为奇观的景象在数英里外都清晰可见。光芒最终如乍现时那般骤然消逝，当地居民起初并未察觉异样。但不久后，关于该地发现[ShowGoodsName('mythril')]矿脉的消息便传到了首都。\n\n神性火花确已赐福你的领土，带来无尽财富。"
 ascension_events.22.a: "他们居然管这叫矿！矿？"