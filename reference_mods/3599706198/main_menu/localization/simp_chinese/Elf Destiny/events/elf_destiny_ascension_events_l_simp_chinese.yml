 ascension_events.1.title: "准备飞升"
 ascension_events.1.desc.solo: "你的神性力量已积累至足以晋升更高境界。与神性火花共鸣是一种深邃的体验，你是否准备好迎接命运中的下一程？"
 ascension_events.1.desc.family: "你心中萦绕着家人的身影，既然能以微小的力量代价在仪式中引导至亲，又何必独自飞升？"
 ascension_events.1.default: "飞升"
 ascension_events.1.solo: "独自飞升"
 ascension_events.1.family: "与家族共同飞升"
 ascension_events.1.desc.cant_afford_family: "\n\n#r 你没有足够的#high ([SCOPE.GetValue('family_ascension_price')||2])#![religious_influence|e]来与你的家族一起飞升。"
 ascension_events.1.changed_my_mind: "我改变主意了，需要再仔细考虑一下。"
