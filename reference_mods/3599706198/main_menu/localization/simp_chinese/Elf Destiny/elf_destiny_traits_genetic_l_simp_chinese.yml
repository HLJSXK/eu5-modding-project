 royal_elf_valerith: "瓦勒瑞斯之血"
 royal_elf_valerith_die_desc: "作为古老的精灵家族之一，瓦勒瑞斯家族以其标志性的银发和绝世的美貌而闻名。千百年来的繁衍使他们专注于完善肉体，以美貌诱惑世人。然而，结果却是他们自己完全无法控制自己，沉溺于放纵，很容易受到别人的诱惑。"
 desc_royal_elf_valerith: "作为古老的精灵家族之一，瓦勒瑞斯家族以其标志性的银发和绝世的美貌而闻名。千百年来的繁衍使他们专注于完善肉体，以美貌诱惑世人。然而，结果却是他们自己完全无法控制自己，沉溺于放纵，很容易受到别人的诱惑。"
 royal_elf_serelion: "塞瑞里恩之血"
 royal_elf_serelion_die_desc: "塞瑞里恩后裔的一双紫眼为世人所知。"
 desc_royal_elf_serelion: "塞瑞里恩家族是古老的精灵家族之一，以一双锐利的紫眼而闻名。塞瑞里恩家族以务实残酷和严苛统治著称。他们在臣民中引起的恐惧感使他们能更好地控制自己的土地，但他们惶恐不安的军队却很少真正忠诚，与同时代的军队相比，他们在战场上的表现更差。"
 royal_elf_gwynthorn: "格温索恩之血"
 royal_elf_gwynthorn_die_desc: "格温索恩家族是古老的精灵家族之一，以勤劳和执着著称。他们不遗余力地耕耘自己的土地，但也付出了代价，许多格温索恩家族的人压力过大，过早地离开了人世。"
 desc_royal_elf_gwynthorn: "格温索恩家族是古老的精灵家族之一，以勤劳和执着著称。他们不遗余力地耕耘自己的土地，但也付出了代价，许多格温索恩家族的人压力过大，过早地离开了人世。"
 royal_elf_thundarael: "桑达瑞尔之血"
 royal_elf_thundarael_die_desc: "桑达瑞尔家族是古老的精灵家族之一，以苍白的皮肤、智慧和狂躁的性格而闻名。桑达瑞尔家族培养了许多强大的法师且学习新事物的速度惊人。但代价也是巨大的。疯狂在桑达瑞尔家族中非常普遍，他们中的许多人都被自己的力量逼疯了。"
 desc_royal_elf_thundarael: "桑达瑞尔家族是古老的精灵家族之一，以苍白的皮肤、智慧和狂躁的性格而闻名。桑达瑞尔家族培养了许多强大的法师且学习新事物的速度惊人。但代价也是巨大的。疯狂在桑达瑞尔家族中非常普遍，他们中的许多人都被自己的力量逼疯了。"
 royal_elf_daelurin: "德露琳之血"
 royal_elf_daelurin_die_desc: "德露琳家族是古老的精灵家族之一，德露琳家族以其庞大的身躯和高超的武艺而闻名。历史上与巨人相遇的记录很可能就是德露琳家族成员。德露琳家族世世代代专注于培养战斗和征服的人才，但这种代价的后果是智力下降和行动迟缓。"
 desc_royal_elf_daelurin: "德露琳家族是古老的精灵家族之一，德露琳家族以其庞大的身躯和高超的武艺而闻名。历史上与巨人相遇的记录很可能就是德露琳家族成员。德露琳家族世世代代专注于培养战斗和征服的人才，但这种代价的后果是智力下降和行动迟缓。"
 royal_elf_lormelis: "洛梅利斯之血"
 royal_elf_lormelis_die_desc: "作为古老的精灵家族之一，洛梅利斯家族因其与海洋的深厚渊源和无与伦比的突袭能力而备受尊崇。他们的眼睛像深海一样湛蓝，既迷人又可怕。他们以强烈的独立性和雄心勃勃的精神著称，为夺回亚特兰蒂斯的荣耀而不懈追求。然而，这种一心一意的野心往往使他们缺乏变通性，对不断变化的潮流视而不见，从而导致内部纷争和外部冲突。"
 desc_royal_elf_lormelis: "作为古老的精灵家族之一，洛梅利斯家族因其与海洋的深厚渊源和无与伦比的突袭能力而备受尊崇。他们的眼睛像深海一样湛蓝，既迷人又可怕。他们以强烈的独立性和雄心勃勃的精神著称，为夺回亚特兰蒂斯的荣耀而不懈追求。然而，这种一心一意的野心往往使他们缺乏变通性，对不断变化的潮流视而不见，从而导致内部纷争和外部冲突。"
 rule_rarity_of_genetic_traits: "@elf_tier_1!精灵命运：遗传特质稀有度"
 setting_genetic_traits_normal_rarity: "@beauty_good_2!较为正常"
 setting_genetic_traits_normal_rarity_desc: "新角色生成遗传特质的速度将#high 保持正常水平#!，同时也会影响新生儿获得未遗传特质的概率。正常的遗传特质继承规则不受影响。"
 setting_genetic_traits_more_common: "@beauty_good_3!更常见"
 setting_genetic_traits_more_common_desc: "新角色生成遗传特质的概率将#high 大幅提高#!，同时也会影响新生儿获得非遗传特质的几率。正常的遗传特质继承规则不受影响。"
 setting_genetic_traits_more_rare: "@beauty_good_1!更加稀有"
 setting_genetic_traits_more_rare_desc: "新角色生成遗传特质的频率#high 降低#!，同时也会影响新生儿获得未遗传特质的概率。正常的遗传特质继承规则不受影响。"