l_simp_chinese:
 elven_high_councils: "精灵至高议会"
 elven_high_councils_desc: "任何重要决策都需先由精灵中最睿智与最强大的成员进行辩论。"
 fairest_ascendancy: "至美主导"
 fairest_ascendancy_desc: "美貌决定地位与魔法优势的等级制度。"
 calaquendi_apprenticeships: "高等精灵学徒制"
 calaquendi_apprenticeships_desc: "重要角色的后裔拜在伟大精灵导师门下学习，这份影响将持续终生。"
 elite_worship: "精英崇拜"
 elite_worship_desc: "高等精灵身边跟随着一群门徒，这些门徒将他们尊崇为近乎半神的存在。"
 personal_dominions: "个人领地"
 personal_dominions_desc: "高等精灵获赐专属领地以研习技艺，他们享有高度自治权，可随心所欲地治理领地。"
 personal_retinues: "私人扈从"
 personal_retinues_desc: "高等精灵维持着一支由精挑细选的精英战士组成的私人军队，他们为自己的战斗能力感到无比自豪。"
 war_masters: "战争大师"
 war_masters_desc: "高等精灵被授予战争事务的完全决策权。依照传统，他们常亲率军队冲锋陷阵，如矛尖般直指敌阵。"
 state_sponsored_ascendancy: "国家资助飞升"
 state_sponsored_ascendancy_desc: "国库的一部分被拨出，用于为高等精灵提供贮魔水晶及资助其宏伟工程与术式，确保我们最精锐的力量能够达到其潜能的巅峰。"
 hierarchial_authority: "等级权威"
 hierarchial_authority_desc: "精灵社会遵循着严格的等级制度。低等精灵在高等精灵面前都清楚自己的地位。"
 aeluran_advisors: "两仪顾问"
 aeluran_advisors_desc: "两仪修会被授予无可争议的权利，可指派一名修女担任[cabinet|e]中的两仪顾问，其权威仅次于统治者本人。"
 daughters_of_the_red: "红袍之女"
 daughters_of_the_red_desc: "两仪修会可以征召贵族家族女性成员并传授技能，这项权利不容置疑，且受法律保障。"
 aeluran_judiciary: "两仪司法机构"
 aeluran_judiciary_desc: "两仪姊妹担任国家法院的法官。她们的判决不容置疑，质疑她们的裁决近乎亵渎。"
 elven_superiority: "精灵至上"
 elven_superiority_desc: "神性火花亲自选定精灵作为其追随者，唯有他们才配引领领地众生的命运。至于人类？他们的职责就是侍奉与服从。"
 open_hearted: "众生平等"
 open_hearted_desc: "人类与精灵皆是神性火花之子，都应被平等对待。"
 masters_of_woodland_realms: "林地之主"
 masters_of_woodland_realms_desc: "这片森林是国家领地，精灵深知并妥善守护着它。"
 is_a_woodland_realm: "所有拥有的[location|e]若具有[ShowVegetationName('forest')]或[ShowVegetationName('woods')][vegetation|e]将获得："
 people_of_the_bow: "弓之民"
 people_of_the_bow_desc: "该文化中，没有比精通弓箭更能检验一个人是否优秀的了。大多数人从小就开始坚持不懈地练习，而这个民族在战场上的精锐卫队是无可媲美的。"
 the_old_ways: "古老训诫"
 the_old_ways_desc: "该文化历史源远流长，习惯向过去寻求指引，他们知道知道那里蕴藏着智慧，古老的方式往往是最好的。"
 aeluran_etiquette: "两仪礼仪"
 aeluran_etiquette_desc: "该国家被两仪师牢牢掌控。她们以强硬手段引导人民，使其过上真正精灵应有的生活。服从两仪姊妹，即是遵从神性火花。"