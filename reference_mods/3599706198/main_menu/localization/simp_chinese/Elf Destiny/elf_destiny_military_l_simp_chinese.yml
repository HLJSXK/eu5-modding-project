l_simp_chinese:
 army_magi: "法师"
 army_magi_desc: "强大的火花使者，法师施展魔法以摧毁战场。他们既适合作为摧毁防御工事的炮兵，也适合作为歼灭前线部队的步兵。"
 a_age_1_aeluran_magi: "两仪法师"
 a_age_1_aeluran_magi_desc: "两仪姊妹自幼接受两仪修会的训练，是两仪军团的中坚力量。"
 a_age_2_aeluran_magi: "熟练两仪法师"
 a_age_2_aeluran_magi_desc: "这些两仪法师已熟练技艺，如今在使用战争魔法方面技艺更为精湛。"
 a_age_3_aeluran_magi: "资深两仪法师"
 a_age_3_aeluran_magi_desc: "这些两仪法师在战斗中积累了丰富的经验，作战效率极高。"
 a_age_4_aeluran_magi: "精锐两仪法师"
 a_age_4_aeluran_magi_desc: "这些两仪法师是他们族群中最娴熟、最强大的存在，能够在战斗中施展毁灭性的魔法。"
 a_age_5_aeluran_magi: "王家两仪法师"
 a_age_5_aeluran_magi_desc: "这些两仪法师由精灵王室挑选，担任他们的贴身护卫与战争法师。"
 a_age_6_aeluran_magi: "两仪大法师"
 a_age_6_aeluran_magi_desc: "这些两仪法师已超越普通两仪法师的常规界限，其力量与影响力近乎神明。"
 a_age_1_traditions_magi: "第一时代传统法师"
 a_age_1_traditions_magi_desc: "咕咕咕"
 a_age_2_renaissance_magi: "第二时代传统法师"
 a_age_2_renaissance_magi_desc: "咕咕咕"
 a_age_3_discovery_magi: "第三时代传统法师"
 a_age_3_discovery_magi_desc: "咕咕咕"
 a_age_4_reformation_magi: "第四时代传统法师"
 a_age_4_reformation_magi_desc: "咕咕咕"
 a_age_5_absolutism_magi: "第五时代传统法师"
 a_age_5_absolutism_magi_desc: "咕咕咕"
 a_age_6_revolutions_magi: "第六时代传统法师"
 a_age_6_revolutions_magi_desc: "咕咕咕"
 calaquendi_high_magi: "高等精灵大法师"
 calaquendi_high_magi_desc: "精灵社会中最强大阶层——高等精灵，由他们组成的法师掌握魔法技艺的巅峰，常被召唤来率领军队，以其强大的魔法守护领地。"
 army_magi_build: "陆军法师建造"
 army_magi_reinforce: "陆军法师补员"
 army_magi_maintenance: "陆军法师维护"
 early_magi_construction: "早期法师建设"
 early_magi_maintenance: "早期法师维护"
 a_early_fey_archers: "精灵弓箭手"
 a_early_fey_archers_desc: "精灵弓箭手是技艺精湛的射手，他们利用自身的敏捷与精准从远处发起攻击。他们常被部署为散兵，或为步兵单位提供支援。"
 a_fey_archers: "精锐精灵弓箭手"
 a_fey_archers_desc: "经验丰富的精灵弓箭手技艺更为精湛，射出的箭矢既精准又强劲。"
 a_late_fey_archers: "精锐精灵弓箭手"
 a_late_fey_archers_desc: "精锐精英弓箭手是其同类中最技艺超群的存在，他们能射出箭如雨下的致命齐射，精准度惊人。"
 a_early_elf_noble_lancers: "贵族长枪骑兵"
 a_early_elf_noble_lancers_desc: "精灵贵族精通武艺，历经数十年征战，其坐骑疾如风，骑枪长似林，攻势精准无误。"
 a_elf_noble_lancers: "老练贵族长枪骑兵"
 a_elf_noble_lancers_desc: "精灵贵族的精英，行动英勇无畏，杀伐之间尽显优雅，长矛不过是他们自身的延伸。"
 a_late_elf_noble_lancers: "贵族长枪骑兵"
 wolf_riders: "狼骑兵"
 wolf_riders_desc: "令精灵与人类王国闻风丧胆，身披重甲的骑士驾驭着巨狼坐骑，以惊人的速度和战场凶悍闻名，常如利刃般突入敌阵撕裂防线，制造混乱。"
 ranger_high_guard: "巡林卫士"
 ranger_high_guard_desc: "巡林卫士是精灵中的精英战士，通常从高等贵族阶层中选拔。他们精通远程与近战技艺，常被委以保护重要人物或地点的重任。"
 mythril_plated_horse_masters_construction: "秘银板甲骑兵大师建造"
 mythril_plated_horse_masters_maintenance: "秘银板甲骑兵大师维护"
 mythril_plated_fey_vanguard_construction: "秘银披甲精灵先锋建造"
 mythril_plated_fey_vanguard_maintenance: "秘银披甲精灵先锋维护"
 mythril_plated_fey_vanguard: "秘银披甲精灵先锋"
 mythril_plated_fey_vanguard_desc: "身着秘银盔甲的精锐精灵战士，有着坚韧不拔的战斗意志与卓越战力。他们作为精灵军团的前线守护者，既能承受猛烈攻势，又能向敌军发起雷霆万钧的反击。"
 mythril_plated_horse_masters: "秘银板甲骑兵"
 mythril_plated_horse_masters_desc: "身着秘银盔甲、骑乘装甲战马的精灵骑兵部队，有着迅捷的速度、卓越的机动性，可以快速响应战场各处威胁。"
 a_late_elf_noble_lancers_desc: "精灵骑士大师如雷霆般驰骋疆场，长枪未至，敌人就胆战心惊。"