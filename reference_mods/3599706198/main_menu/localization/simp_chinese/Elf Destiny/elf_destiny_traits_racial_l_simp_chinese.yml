l_simp_chinese:
 racial_trait: "[racial_trait|e]"
 human: "人类"
 human_die_desc: ""
 desc_human: "人类是这个世界上数量最多、分布最广的种族。他们与神性火花隔绝——既无法获得其力量，也感受不到它的影响。"
 elf_tier_1: "精灵之血"
 elf_tier_1_die_desc: ""
 desc_elf_tier_1: "精灵与人类繁衍的产物。有精灵血统的人仍然是精灵，尽管力量很弱，但仍然可以走上飞升之路。"
 elf_tier_2: "精灵"
 elf_tier_2_die_desc: ""
 desc_elf_tier_2: "所有国家中最常见的精灵。虽然比人类优越，但他们处于飞升阶段和精灵社会的底层。"
 elf_tier_3: "高阶精灵"
 elf_tier_3_die_desc: ""
 desc_elf_tier_3: "迈出真正飞升第一步的精灵，在优雅和力量方面都超越同侪。"
 elf_tier_4: "真精灵"
 elf_tier_4_die_desc: ""
 desc_elf_tier_4: "已通过第一道主要飞升之门的精灵，其身体和灵魂都得到了极大的净化。"
 elf_tier_5: "妖精"
 elf_tier_5_die_desc: ""
 desc_elf_tier_5: "精灵经历了名为“蜕变”这一里程碑式的转变，他们与神性火花的契合度更高，因此可以施展更强大的魔法。"
 elf_tier_6: "光彩妖精"
 elf_tier_6_die_desc: ""
 desc_elf_tier_6: "光彩妖精拥有不可思议的力量，自带高贵的气息，让所有人都清楚地认识到他们的统治权。"
 elf_tier_7: "天使精灵"
 elf_tier_7_die_desc: ""
 desc_elf_tier_7: "飞升后的天使精灵，可以在神性火花最浓郁的位面中行走。"
 elf_tier_8: "天神精灵"
 elf_tier_8_die_desc: ""
 desc_elf_tier_8: "达到近乎天神境界的精灵。"
 elf_tier_9: "凡雅"
 elf_tier_9_die_desc: ""
 desc_elf_tier_9: "埃尔达是众神选中的高贵子民，也是飞升后的顶峰。"
 elf_tier_10: "迈雅"
 elf_tier_10_die_desc: ""
 desc_elf_tier_10: "维拉的半神仆人，也是埃努中的最低等级。"
 elf_tier_11: "维拉"
 elf_tier_11_die_desc: ""
 desc_elf_tier_11: "伟大的爱努被称为维拉，乃维系宇宙之力。"
 elf_tier_12: "维拉中力量最强者。"
 elf_tier_12_die_desc: "维拉之中最为强大的几位被选者。"
 desc_elf_tier_12: "受选维拉"