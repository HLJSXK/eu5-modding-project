 iv2_ideagroup_title_army_6: "远程作战理念"
 iv2_ga_ideagroup_army_6_1: "集中齐射"
 iv2_ga_ideagroup_army_6_1_desc: "若敌人过于鲁莽地冲向我们，我们将以致命的齐射迎接他们。"
 iv2_ga_ideagroup_army_6_2: "火力压制"
 iv2_ga_ideagroup_army_6_2_desc: "我们的大炮对敌人进行了猛烈的轰炸，以至于他们不敢冒险离开掩体。"
 iv2_ga_ideagroup_army_6_3: "快速装弹"
 iv2_ga_ideagroup_army_6_3_desc: "得益于完美的训练，我们可以大大减少火炮的装弹时间。"
 iv2_ga_ideagroup_army_6_4: "等待，直到最后一秒"
 iv2_ga_ideagroup_army_6_4_desc: "我们的士兵将在最后一刻才开火，给敌人造成最大的伤害。"
 iv2_ga_ideagroup_army_6_5: "防守火力"
 iv2_ga_ideagroup_army_6_5_desc: "我们堡垒的防御火力无可匹敌。"
 iv2_ga_ideagroup_army_6_6: "火力支援"
 iv2_ga_ideagroup_army_6_6_desc: "有了我们炮兵的有针对性的火力支援，我们将能够更有效地推进。"
 iv2_ga_ideagroup_army_6_7: "远程作战将军"
 iv2_ga_ideagroup_army_6_7_desc: "我们的将军注重训练远程兵种。"
