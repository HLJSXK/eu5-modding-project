 iv2_ga_ideagroup_army_17_5_desc: "由于我们经常攻占堡垒，这已经成了我们士兵的日常"
 iv2_ga_ideagroup_army_17_6: "攻城炮兵"
 iv2_ga_ideagroup_army_17_6_desc: "使用专门的攻城炮，我们可以显著加快进程。"
