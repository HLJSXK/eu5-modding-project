l_simp_chinese:
 iv2_ideagroup_title_army_1: "进攻理念"
 iv2_ga_ideagroup_army_1_1: "光荣武装"
 iv2_ga_ideagroup_army_1_1_desc: "使我们的陆军获得无可匹敌的荣耀与威名，令所有敌人心怀恐惧。"
 iv2_ga_ideagroup_army_1_2: "刺刀指挥官"
 iv2_ga_ideagroup_army_1_2_desc: "治兵有方的将领，士兵会愿意为他效死。因此，我们要确保军官们会在最前线上做出榜样。"
 iv2_ga_ideagroup_army_1_3: "战场委任制度"
 iv2_ga_ideagroup_army_1_3_desc: "使我们能够专注于陆军科技进步，提升陆军传统。"
 iv2_ga_ideagroup_army_1_4: "增加侧翼范围"
 iv2_ga_ideagroup_army_1_4_desc: "优秀指挥官的核心能力在于战场上的兵力调度。通过时刻掌握部队的调动方向，我们能在战斗中占据优势。"
 iv2_ga_ideagroup_army_1_5: "摧城如林"
 iv2_ga_ideagroup_army_1_5_desc: "要塞是任何一个扩张国家的克星。即使需要牺牲我们所有人的生命，也不能让任何一个要塞阻挡我们获得胜利。\n「前进！攻击这座要塞，为你们的将军征服它！」"
 iv2_ga_ideagroup_army_1_6: "荣誉追逐者"
 iv2_ga_ideagroup_army_1_6_desc: "现在大多数战争通过攻城掠地取得胜利。但这并不是我们的风格！我们要将敌人的部队击败在战场上！"
 iv2_ga_ideagroup_army_1_7: "进攻精神"
 iv2_ga_ideagroup_army_1_7_desc: "只有勇往直前，才能迅速击败敌人！"
