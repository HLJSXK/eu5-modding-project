 iv2_ideagroup_title_army_2: "防守理念"
 iv2_ga_ideagroup_army_2_1: "建筑军团"
 iv2_ga_ideagroup_army_2_1_desc: "使我们能够集中全国的军事技术人才，迅速加强陆军科技水平。"
 iv2_ga_ideagroup_army_2_2: "防御思维"
 iv2_ga_ideagroup_army_2_2_desc: "有人说进攻是最好的防御，但当他们在反击中碰得头破血流时，你将毫不怀疑这句话的荒谬。我们的军队将如磐石般进行守备，我们的要塞也会坚持更长时间。"
 iv2_ga_ideagroup_army_2_3: "保卫本土"
 iv2_ga_ideagroup_army_2_3_desc: "我们的民兵训练项目确保每位公民都准备好保卫家园，为我们的军队注入了无与伦比的士气。"
 iv2_ga_ideagroup_army_2_4: "游击战"
 iv2_ga_ideagroup_army_2_4_desc: "敌军力量有事过于强大，无法与之正面抗衡。更明智的做法应是一击脱离，不断袭扰，削弱入侵者的力量，再让我们的部队彻底击败他们。"
 iv2_ga_ideagroup_army_2_5: "保护地形"
 iv2_ga_ideagroup_army_2_5_desc: "在开阔的战场上，士兵很难避免子弹。因此，我们的部队必须观察周围环境，并利用地形躲避敌方的齐射火力。"
 iv2_ga_ideagroup_army_2_6: "改良躯体保护"
 iv2_ga_ideagroup_army_2_6_desc: "尽管近战武器已经不再流行，但它们仍然普遍存在。通过改进我军的制服和护甲，我们可以减少敌人近战武器的杀伤力。"
 iv2_ga_ideagroup_army_2_7: "战至最后一人"
 iv2_ga_ideagroup_army_2_7_desc: "战争只有两种结果：全面胜利或死亡。哪怕只剩最后一人，我们也绝不撤退。"
