 iv2_ideagroup_title_army_19: "近卫军理念"
 iv2_ga_ideagroup_army_19_1: "近卫军理念"
 iv2_ga_ideagroup_army_19_1_desc: "精锐部队的构想虽非首创，却依然具有重要价值。"
 iv2_ga_ideagroup_army_19_2: "职业化士兵"
 iv2_ga_ideagroup_army_19_2_desc: "近卫军士兵皆为职业军人，并因此接受卓越训练。"
 iv2_ga_ideagroup_army_19_3: "婚配激励"
 iv2_ga_ideagroup_army_19_3_desc: "我们的近卫军士兵是抢手的单身汉。我们希望尽快促成婚配，以便他们培育承袭父辈事业的子嗣。"
 iv2_ga_ideagroup_army_19_4: "魁梧选拔"
 iv2_ga_ideagroup_army_19_4_desc: "通过刻意选拔高大士兵加入近卫军，我们确保其能产生极强的威慑力。"
 iv2_ga_ideagroup_army_19_5: "多兵种建制"
 iv2_ga_ideagroup_army_19_5_desc: "在各兵种中设立近卫军团作为其他部队的典范是个好主意。"
 iv2_ga_ideagroup_army_19_6: "谨慎战役使用"
 iv2_ga_ideagroup_army_19_6_desc: "尽管近卫军囊括了最优秀的士兵，我们在战场上仍须有节制地投入，避免折损这些精锐。"
 iv2_ga_ideagroup_army_19_7: "军需供应商"
 iv2_ga_ideagroup_army_19_7_desc: "通过与供应商签订合约，我们至少能将近卫军的巨额开销控制在合理范围内。"
