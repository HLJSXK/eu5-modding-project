 iv2_ideagroup_title_army_18: "补给理念"
 iv2_ga_ideagroup_army_18_1: "供給包"
 iv2_ga_ideagroup_army_18_1_desc: "通过给士兵配备背包，他们可以携带自己的补给。"
 iv2_ga_ideagroup_army_18_2: "供应队"
 iv2_ga_ideagroup_army_18_2_desc: "我们尽一切努力确保物资能够迅速到达前线，这由补给队负责。"
 iv2_ga_ideagroup_army_18_3: "饱食的士兵"
 iv2_ga_ideagroup_army_18_3_desc: "吃饱的士兵就是比挨饿的士兵更能打仗。"
 iv2_ga_ideagroup_army_18_4: "三月口粮"
 iv2_ga_ideagroup_army_18_4_desc: "通过发放行军口粮，我们的士兵能够更快更好地行军。"
 iv2_ga_ideagroup_army_18_5: "便捷口粮"
 iv2_ga_ideagroup_army_18_5_desc: "我们确保始终有足够的食品供应，这些食品可食用天数长达数日，必要时甚至能维持数周。"
 iv2_ga_ideagroup_army_18_6: "移动食品站点"
 iv2_ga_ideagroup_army_18_6_desc: "通过尽可能让我们的粮食补给站保持机动，我们就能始终跟随军队行进。"
 iv2_ga_ideagroup_army_18_7: "觅食队伍"
 iv2_ga_ideagroup_army_18_7_desc: "尽管采取了所有这些预防措施，搜查敌方领土以寻找额外的食物供应仍然是明智的。"
