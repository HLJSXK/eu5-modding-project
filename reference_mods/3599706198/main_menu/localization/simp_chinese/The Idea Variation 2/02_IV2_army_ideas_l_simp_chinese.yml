 iv2_ideagroup_title_army_3: "质量理念"
 iv2_ga_ideagroup_army_3_1: "一流训练"
 iv2_ga_ideagroup_army_3_1_desc: "战斗结束后的这段时间对任何军队的命运都至关重要。无论胜败，士兵们在此阶段都精疲力竭且脆弱不堪。我们必须确保我军能比敌人更快做好再次作战的准备。"
 iv2_ga_ideagroup_army_3_2: "最好的马"
 iv2_ga_ideagroup_army_3_2_desc: "部队前进得多么整齐！骑兵的阵列多么完美！看那些灰色的战马！这些优秀的的骑士是谁？这是多么精锐的部队。"
 iv2_ga_ideagroup_army_3_3: "从士兵到元帅"
 iv2_ga_ideagroup_army_3_3_desc: "每名士兵的背包中都藏有元帅的权杖。虽然这种表述有所夸张，但对那些在战场上表现出众的士兵来说，晋升与重赏将是他们理所应得之物。这种奖赏措施为军人们所周知，并激励着他们奋勇杀敌。"
 iv2_ga_ideagroup_army_3_4: "集中炮兵"
 iv2_ga_ideagroup_army_3_4_desc: "通过将所有火炮集中到一个大型炮兵连中，可以集中其破坏力，在敌军战线上撕开一个缺口。"
 iv2_ga_ideagroup_army_3_5: "武器维护"
 iv2_ga_ideagroup_army_3_5_desc: "我们要求士兵始终将武器保养在最佳状态。"
 iv2_ga_ideagroup_army_3_6: "钢铁纪律"
 iv2_ga_ideagroup_army_3_6_desc: "纪律是士兵的第一信条。"
 iv2_ga_ideagroup_army_3_7: "冷静头脑"
 iv2_ga_ideagroup_army_3_7_desc: "士兵必须始终保持冷静的头脑，否则他可能很快就会丧命。"
