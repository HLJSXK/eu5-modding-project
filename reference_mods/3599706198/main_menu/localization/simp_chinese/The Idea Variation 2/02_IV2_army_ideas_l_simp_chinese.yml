 iv2_ga_ideagroup_army_17_1: "突击队"
 iv2_ga_ideagroup_army_17_1_desc: "我们的部队在强攻防御工事方面接受了格外精心的训练。"
 iv2_ga_ideagroup_army_17_2: "精心规划的营地建设"
 iv2_ga_ideagroup_army_17_2_desc: "为了我们士兵的生存，必须建立不会传播疫病的营地。"
 iv2_ga_ideagroup_army_17_3: "一切手段"
 iv2_ga_ideagroup_army_17_3_desc: "我们准备使用各种手段确保堡垒被攻破。"
