 iv2_ideagroup_title_army_5: "冲击理念"
 iv2_ga_ideagroup_army_5_1: "突然袭击"
 iv2_ga_ideagroup_army_5_1_desc: "我们突袭的迅猛，以至于他们的远程士兵来不及反应。"
 iv2_ga_ideagroup_army_5_2: "重叠攻击"
 iv2_ga_ideagroup_army_5_2_desc: "当我们在前线某处击溃敌军后，便立即扑向下一个对手，不给他们任何反应时间。"
 iv2_ga_ideagroup_army_5_3: "骑兵焦点"
 iv2_ga_ideagroup_army_5_3_desc: "快速而猛烈地打击敌人是我们骑兵的座右铭。"
 iv2_ga_ideagroup_army_5_4: "强力攻击"
 iv2_ga_ideagroup_army_5_4_desc: "我们的攻击总是如此强大，敌人通常很快就会溃败。"
 iv2_ga_ideagroup_army_5_5: "龙骑兵"
 iv2_ga_ideagroup_army_5_5_desc: "我们的龙骑兵可以迅速骑马进入战斗，击败敌人，再迅速撤退。必要时，我们还可以直接在马背上作战，大大增加了我们远程作战中的选择。"
 iv2_ga_ideagroup_army_5_6: "楔形阵"
 iv2_ga_ideagroup_army_5_6_desc: "当我方骑兵以楔形阵冲破敌军防线时，胜利便指日可待。"
 iv2_ga_ideagroup_army_5_7: "近战将领"
 iv2_ga_ideagroup_army_5_7_desc: "近距离作战是我们将领训练和经验的重点。"
