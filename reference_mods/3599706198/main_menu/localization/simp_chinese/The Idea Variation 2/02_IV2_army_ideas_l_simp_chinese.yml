 iv2_ideagroup_title_army_4: "数量理念"
 iv2_ga_ideagroup_army_4_1: "马主补贴"
 iv2_ga_ideagroup_army_4_1_desc: "生命虽贱，马匹却贵。如果我们为那些拥有马匹的人建立一套补贴制度，马匹的供应量将会增加。"
 iv2_ga_ideagroup_army_4_2: "老弱残兵"
 iv2_ga_ideagroup_army_4_2_desc: "有些老兵士官是人性中最卑劣腐败的代表。尽管如此，他们仍有用处。与其让他们沦为可悲的乞丐了此残生，不如让他们在服役期满后，负责培训士官和军需官，从而将其独特的技能善加利用。"
 iv2_ga_ideagroup_army_4_3: "少年亦可服役"
 iv2_ga_ideagroup_army_4_3_desc: "一个男孩要多大才算男人？要多大才能为国捐躯？有些统治者对此顾虑重重，但在我们的屠戮场上，人人机会均等。"
 iv2_ga_ideagroup_army_4_4: "义务兵役"
 iv2_ga_ideagroup_army_4_4_desc: "奉献精神是我们整个军队建制的根基。有时志愿人员不足，我们应当强征入伍。"
 iv2_ga_ideagroup_army_4_5: "标准化炮兵"
 iv2_ga_ideagroup_army_4_5_desc: "每个铁匠都会近乎偏执地固守他们的工艺秘密，这使得每一门大炮都犹如一件工艺品。虽然工匠们的虚荣心得到了满足，但这样明显不是制造火炮的最好方法。如今我们将严格规定，每门大炮都必须符合精确的规格。由此，铸炮的成本将会大大降低。"
 iv2_ga_ideagroup_army_4_6: "私人武器"
 iv2_ga_ideagroup_army_4_6_desc: "如果我国人口已经武装起来，我们就能更快地组建一支强大的军队。"
 iv2_ga_ideagroup_army_4_7: "人民军队"
 iv2_ga_ideagroup_army_4_7_desc: "迄今为止，我们一直在以严格的标准为军队招募士兵。我们只挑选那些最为贫困、最为绝望的人，因为他们已经无甚留恋。现在，军队将为所有并不富裕的人敞开大门。"
