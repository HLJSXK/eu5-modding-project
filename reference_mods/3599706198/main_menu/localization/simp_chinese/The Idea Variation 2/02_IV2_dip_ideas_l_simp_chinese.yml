l_simp_chinese:
 iv2_ideagroup_title_dip_1: "间谍理念"
 iv2_ga_ideagroup_dip_1_1: "高效的间谍"
 iv2_ga_ideagroup_dip_1_1_desc: "大多数的农民都会为了一点金钱而不惜出卖自己的母亲，但是，找到那些真正有用的间谍人员反而是很困难的。根据过往的经验，我们正在学会如何披沙拣金，从中拣选出合适的人选。"
 iv2_ga_ideagroup_dip_1_2: "公平贸易"
 iv2_ga_ideagroup_dip_1_2_desc: "敌人在各方面都很脆弱。适当的谣言可以像一万名士兵那样致命。我们必须练习好取胜所需的阴谋诡计。"
 iv2_ga_ideagroup_dip_1_3: "安全许可"
 iv2_ga_ideagroup_dip_1_3_desc: "由于有如此多的公职人员以营利为目的，我们有时发现，那些管理我们政府的人很容易受到外国势力的贿赂。一些简单的背景调查就能淘汰最容易腐败的人。"
 iv2_ga_ideagroup_dip_1_4: "私掠者"
 iv2_ga_ideagroup_dip_1_4_desc: "狠狠打击敌方的商业运转会帮助我们奏响胜利的号角。我们应当鼓励船长们去主动袭击敌方的贸易航路。"
 iv2_ga_ideagroup_dip_1_5: "可疑招募"
 iv2_ga_ideagroup_dip_1_5_desc: "我们的帮手来自社会最底层的边缘，以至于大多数人都不敢相信他们是在为我们做这些事。"
 iv2_ga_ideagroup_dip_1_6: "动荡行动"
 iv2_ga_ideagroup_dip_1_6_desc: "我们的间谍能力使我们能够以敌人的稳定为目标。我们可以让他们最好的朋友变成敌人。"
 iv2_ga_ideagroup_dip_1_7: "反向间谍活动"
 iv2_ga_ideagroup_dip_1_7_desc: "通过我们自身的行动，我们也学会了在反间谍行动中保持谨慎并提高效率。"
