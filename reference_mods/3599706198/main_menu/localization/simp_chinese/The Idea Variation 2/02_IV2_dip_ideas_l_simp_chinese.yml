 iv2_ideagroup_title_dip_12: "帝国主义理念"
 iv2_ga_ideagroup_dip_12_1: "强者权利"
 iv2_ga_ideagroup_dip_12_1_desc: "按照强者法则我们完全有权将外国土地并入自己的领土"
 iv2_ga_ideagroup_dip_12_2: "悠久传统"
 iv2_ga_ideagroup_dip_12_2_desc: "我国拥有悠久的传统，我们懂得如何将其转化为自身优势。"
 iv2_ga_ideagroup_dip_12_3: "辉煌历史"
 iv2_ga_ideagroup_dip_12_3_desc: "我们辉煌的过往总能帮助我们维系伟大的表象。"
 iv2_ga_ideagroup_dip_12_4: "加税"
 iv2_ga_ideagroup_dip_12_4_desc: "通过帝国行政体系，我们可以征收大量税款，即使民众对此并不特别热衷。"
 iv2_ga_ideagroup_dip_12_5: "帝国舰队"
 iv2_ga_ideagroup_dip_12_5_desc: "一个帝国的舰队必须庞大。"
 iv2_ga_ideagroup_dip_12_6: "艺术中心"
 iv2_ga_ideagroup_dip_12_6_desc: "我们的帝国很大，为我们增光添彩的艺术家也很多。"
 iv2_ga_ideagroup_dip_12_7: "帝国近卫军"
 iv2_ga_ideagroup_dip_12_7_desc: "只有该国最优秀的士兵才被允许在帝国近卫军服役。他们将是最后一个离开战场的人。"
