 iv2_ideagroup_title_dip_4: "影响理念"
 iv2_ga_ideagroup_dip_4_1: "朝贡体系"
 iv2_ga_ideagroup_dip_4_1_desc: "通过建立一个正式的封臣岁贡体系可以加强我们的收入。"
 iv2_ga_ideagroup_dip_4_2: "整合精英"
 iv2_ga_ideagroup_dip_4_2_desc: "通过将我们属国中的统治阶层精英整合到我们的政府中，我们可以平滑而效果显著地整合他们的领土。"
 iv2_ga_ideagroup_dip_4_3: "国家宣传"
 iv2_ga_ideagroup_dip_4_3_desc: "如同一个人的名声一样，国家的声誉就是一切，建立一个官方的宣传服务机构可以确保我们的好名声不被敌人的谎言所玷污。"
 iv2_ga_ideagroup_dip_4_4: "邮政业务"
 iv2_ga_ideagroup_dip_4_4_desc: "通讯条件现在的水平很难确保我们的外交急件及时送达。创建一个邮局和驿站的网络，将会使我们的意志能更容易地传达到偏远地区。"
 iv2_ga_ideagroup_dip_4_5: "边疆领主"
 iv2_ga_ideagroup_dip_4_5_desc: "通过给予那些在边界的封臣们高度自治权，这些「边疆领主」们将会在战争时提供更多的人力。"
 iv2_ga_ideagroup_dip_4_6: "隐性敲诈"
 iv2_ga_ideagroup_dip_4_6_desc: "有时为了实现目标，我们不得不采取更强硬的方式。"
 iv2_ga_ideagroup_dip_4_7: "相互竞争"
 iv2_ga_ideagroup_dip_4_7_desc: "我们力求在各方面超越对手，成为最具影响力的优秀国家。"
