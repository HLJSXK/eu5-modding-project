 iv2_ideagroup_title_dip_7: "殖民帝国理念"
 iv2_ga_ideagroup_dip_7_1: "殖民热潮"
 iv2_ga_ideagroup_dip_7_1_desc: "新世界最终也会变得稀缺，我们必须抓紧时间，尽可能多地分得一杯羹。"
 iv2_ga_ideagroup_dip_7_2: "独立冒险家"
 iv2_ga_ideagroup_dip_7_2_desc: "我们不需要花钱让人去发现土地。独立的冒险家会为我们做这些。"
 iv2_ga_ideagroup_dip_7_3: "殖民地征兵"
 iv2_ga_ideagroup_dip_7_3_desc: "作为我们支持殖民地的回报，殖民地必须在战争爆发时派遣人员保卫祖国。"
 iv2_ga_ideagroup_dip_7_4: "工资上涨"
 iv2_ga_ideagroup_dip_7_4_desc: "通过具体的法律，我们可以使殖民地的利润最大化。"
 iv2_ga_ideagroup_dip_7_5: "基础设施扩建"
 iv2_ga_ideagroup_dip_7_5_desc: "我们正在扩大业务范围，因此必须确保能以尽可能低的成本建设尽可能多的基础设施。"
 iv2_ga_ideagroup_dip_7_6: "适度舰队"
 iv2_ga_ideagroup_dip_7_6_desc: "为了保卫我们的殖民地，我们需要一支庞大的舰队。"
 iv2_ga_ideagroup_dip_7_7: "快速移动"
 iv2_ga_ideagroup_dip_7_7_desc: "为了打击我们的殖民对手或镇压起义，我们需要尽快运送部队。这样我们就能控制住所有人。"
