 iv2_ideagroup_title_dip_2: "外交理念"
 iv2_ga_ideagroup_dip_2_1: "驻外大使馆"
 iv2_ga_ideagroup_dip_2_1_desc: "外交是一项非常精妙的活动，它需要同时在数个方面上取得平衡。如果我们能够让那些外派的大使馆定期传达一些基本信息，就能在进行决策时参考到更多的情报了。"
 iv2_ga_ideagroup_dip_2_2: "虚构宣称"
 iv2_ga_ideagroup_dip_2_2_desc: "宣布某物属于自己非常容易，但要让每个人都信服你的这种占有权就非常难了。通过广泛地铺设外交网络，我们可以清楚地知道，谁会对你的这种占有权表示出浓厚的兴趣。"
 iv2_ga_ideagroup_dip_2_3: "灵活变通"
 iv2_ga_ideagroup_dip_2_3_desc: "我们的领土中，有的仅仅是属于我们，有的则是自古以来就拥有且永远不可分割。稍微宽松一下这个定义将使我们大量的领土被视作永远不可分割，若最糟糕的事发生了，全世界都将认可我们正当的收复失地行为。"
 iv2_ga_ideagroup_dip_2_4: "内阁责任制"
 iv2_ga_ideagroup_dip_2_4_desc: "我们完善行政机构，训练更多熟练的外交官。"
 iv2_ga_ideagroup_dip_2_5: "外交影响"
 iv2_ga_ideagroup_dip_2_5_desc: "通过努力发展外交事业，我们可以在外交舞台上长袖善舞，左右逢源。"
 iv2_ga_ideagroup_dip_2_6: "灵活谈判"
 iv2_ga_ideagroup_dip_2_6_desc: "你永远都不知道在谈判桌上会获得些什么，所以，请记得把你所有的选项带上谈判桌。"
 iv2_ga_ideagroup_dip_2_7: "革命与反革命"
 iv2_ga_ideagroup_dip_2_7_desc: "随着我们这个时代的政治日益两极分化和激进化，我们可能别无选择，只能向持不同政见的政府发动战争。"
