 iv2_ideagroup_title_dip_15: "合同谈判理念"
 iv2_ga_ideagroup_dip_15_1: "法律典籍"
 iv2_ga_ideagroup_dip_15_1_desc: "通过研读古代法律典籍并理解旧时司法体系，我们能达成对各方更公平的协议，有时甚至能争取到己方优势！"
 iv2_ga_ideagroup_dip_15_2: "有约必守"
 iv2_ga_ideagroup_dip_15_2_desc: "合同必须得到遵守，早在古罗马时代便是如此。违约将使你在未来陷入被动。"
 iv2_ga_ideagroup_dip_15_3: "交易的基本要件"
 iv2_ga_ideagroup_dip_15_3_desc: "商业交易或其他协议的核心要素始终应以书面形式记录。"
 iv2_ga_ideagroup_dip_15_4: "民事仲裁机构"
 iv2_ga_ideagroup_dip_15_4_desc: "在我国维持一定数量的民事仲裁机构来执行法律是值得的。"
 iv2_ga_ideagroup_dip_15_5: "相互信任"
 iv2_ga_ideagroup_dip_15_5_desc: "我们在国内对法律的恪守也将增强外部的信任。"
 iv2_ga_ideagroup_dip_15_6: "长期伙伴"
 iv2_ga_ideagroup_dip_15_6_desc: "经年累月的合作关系能巩固彼此信任。"
 iv2_ga_ideagroup_dip_15_7: "抗议照会"
 iv2_ga_ideagroup_dip_15_7_desc: "若缔约方违反协议，我们可在冲突爆发前向其发出严正抗议照会。"
