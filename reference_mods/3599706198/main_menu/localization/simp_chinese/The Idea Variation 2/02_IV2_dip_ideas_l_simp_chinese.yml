 iv2_ideagroup_title_dip_6: "宫廷理念"
 iv2_ga_ideagroup_dip_6_1: "定于一尊"
 iv2_ga_ideagroup_dip_6_1_desc: "国内各阶层必须承认国家元首乃宫廷内务的最终权威所在。"
 iv2_ga_ideagroup_dip_6_2: "有序协调"
 iv2_ga_ideagroup_dip_6_2_desc: "惟有政府全员有序协调，国之伟业才能得以进步发展。"
 iv2_ga_ideagroup_dip_6_3: "不胫而走"
 iv2_ga_ideagroup_dip_6_3_desc: "我们宫廷下达的通讯信函的影响力无可比拟。国家元首仅发一言就足以贬损最显赫的世家大族的威望。"
 iv2_ga_ideagroup_dip_6_4: "宏伟宫殿"
 iv2_ga_ideagroup_dip_6_4_desc: "倘若不能坐拥富丽堂皇的宫廷，统治者就无法展现荣耀与辉煌。"
 iv2_ga_ideagroup_dip_6_5: "迎宾仪式"
 iv2_ga_ideagroup_dip_6_5_desc: "我们将通过精致打磨的仪式以及权钱繁华的炫示吸引各路政要。"
 iv2_ga_ideagroup_dip_6_6: "公认权威"
 iv2_ga_ideagroup_dip_6_6_desc: "我们的权威承载着统治者的威严。不容置疑、崇高威望与至高无上便随之而来。"
 iv2_ga_ideagroup_dip_6_7: "廷内使馆"
 iv2_ga_ideagroup_dip_6_7_desc: "在我们和盟友之间建立外交通讯据点，是对我们宫廷影响力的重要加成。"
