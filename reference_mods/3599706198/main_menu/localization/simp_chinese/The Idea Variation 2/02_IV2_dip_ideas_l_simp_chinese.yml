 iv2_ideagroup_title_dip_16: "民族主义理念"
 iv2_ga_ideagroup_dip_16_1: "定向宣传"
 iv2_ga_ideagroup_dip_16_1_desc: "我们的宣传旨在加强我国人民的民族主义。"
 iv2_ga_ideagroup_dip_16_2: "为了祖国！"
 iv2_ga_ideagroup_dip_16_2_desc: "“为了祖国”口号旨在激励我们的公民为国家全力以赴。"
 iv2_ga_ideagroup_dip_16_3: "志愿协会"
 iv2_ga_ideagroup_dip_16_3_desc: "在战争发生时志愿者协会与我们的正规军并肩作战。"
 iv2_ga_ideagroup_dip_16_4: "游击队"
 iv2_ga_ideagroup_dip_16_4_desc: "如果敌人胆敢入侵我们的国家，我们的人民将不惜一切代价将他们驱逐出去。"
 iv2_ga_ideagroup_dip_16_5: "不屈之国"
 iv2_ga_ideagroup_dip_16_5_desc: "我们的民族主义让我们不会轻易被征服。"
 iv2_ga_ideagroup_dip_16_6: "相信国家"
 iv2_ga_ideagroup_dip_16_6_desc: "民族主义使我们拥有近乎不可动摇的国家信任。"
 iv2_ga_ideagroup_dip_16_7: "为国捐躯，死而无憾"
 iv2_ga_ideagroup_dip_16_7_desc: "士兵为国牺牲的意志提升了我们在全世界的声望。"
