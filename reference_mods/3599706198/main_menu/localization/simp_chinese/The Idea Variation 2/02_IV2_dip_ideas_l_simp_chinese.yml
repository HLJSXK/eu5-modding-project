 iv2_ideagroup_title_dip_14: "内部调解理念"
 iv2_ga_ideagroup_dip_14_1: "解决冲突"
 iv2_ga_ideagroup_dip_14_1_desc: "我们是调解冲突的专家。"
 iv2_ga_ideagroup_dip_14_2: "妥协"
 iv2_ga_ideagroup_dip_14_2_desc: "妥协的力量不容小觑。唯有通过妥协，方能化解积怨已久的仇隙。"
 iv2_ga_ideagroup_dip_14_3: "法庭"
 iv2_ga_ideagroup_dip_14_3_desc: "法庭在争端解决中扮演重要角色。"
 iv2_ga_ideagroup_dip_14_4: "司法独立"
 iv2_ga_ideagroup_dip_14_4_desc: "若当事双方面对公正的法官，裁决被遵从与尊重的可能性更高。"
 iv2_ga_ideagroup_dip_14_5: "早期国际法"
 iv2_ga_ideagroup_dip_14_5_desc: "即便只是各国都遵守的少量通用规则，也有助于确保我们生活在文明社会之中。"
 iv2_ga_ideagroup_dip_14_6: "教会调解人"
 iv2_ga_ideagroup_dip_14_6_desc: "教会作为独立权威，可协助解决冲突。"
 iv2_ga_ideagroup_dip_14_7: "调解优先于结怨"
 iv2_ga_ideagroup_dip_14_7_desc: "通过将调解纳入争斗法中，我们可以在咨询调解人之前防止流血冲突。"
