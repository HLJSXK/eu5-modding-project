 iv2_ideagroup_title_dip_3: "王朝理念"
 iv2_ga_ideagroup_dip_3_1: "王朝纠葛"
 iv2_ga_ideagroup_dip_3_1_desc: "通过我们多样的家族关系，我们能对许多家族施加影响力。"
 iv2_ga_ideagroup_dip_3_2: "我的表亲，我的姐妹"
 iv2_ga_ideagroup_dip_3_2_desc: "有时我们会忘记庞大的家族谱系，但多数时候我们仍铭记于心。"
 iv2_ga_ideagroup_dip_3_3: "从小培养"
 iv2_ga_ideagroup_dip_3_3_desc: "从小就让孩子们参与进来，我们就能确保他们找到合适的伴侣。"
 iv2_ga_ideagroup_dip_3_4: "手足相残"
 iv2_ga_ideagroup_dip_3_4_desc: "如果情况恶化，我们仍可指望落入亲戚手中时能受到文明对待。"
 iv2_ga_ideagroup_dip_3_5: "建立旁系血脉"
 iv2_ga_ideagroup_dip_3_5_desc: "我们习惯于由家族统治多个国家，实行共治。继承问题往往颇为棘手，通过明确界定旁系支脉在家族中的角色与权利，我们能够确保更稳定的继承序列。"
 iv2_ga_ideagroup_dip_3_6: "偷袭"
 iv2_ga_ideagroup_dip_3_6_desc: "我们的外交策略如此高明，对手即便知道攻击迫在眉睫，却依然毫无察觉。这让我们占据了先机！"
 iv2_ga_ideagroup_dip_3_7: "权力的游戏"
 iv2_ga_ideagroup_dip_3_7_desc: "有时必须用火与血来主张自己的权利，征服那宣称属于你的王座！"
