 iv2_ga_ideagroup_dip_10_1: "伯爵的尊严"
 iv2_ga_ideagroup_dip_10_1_desc: "即便我们尚未晋升为高等贵族，我们仍有远大志向。"
 iv2_ga_ideagroup_dip_10_2: "小规模土地征用"
 iv2_ga_ideagroup_dip_10_2_desc: "一旦有任何机会，无论土地多小，我们必须毫不犹豫地将其占领。"
 iv2_ga_ideagroup_dip_10_3: "稳定的邻国关系"
 iv2_ga_ideagroup_dip_10_3_desc: "即使我们对邻国的领土垂涎三尺，也应当向外界构建出一个无害的形象。"
