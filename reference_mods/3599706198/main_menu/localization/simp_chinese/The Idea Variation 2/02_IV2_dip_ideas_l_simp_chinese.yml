 iv2_ideagroup_title_dip_5: "土地贸易理念"
 iv2_ga_ideagroup_dip_5_1: "精明手段"
 iv2_ga_ideagroup_dip_5_1_desc: "使我们的商人具有更强的业务素质，压倒竞争对手。"
 iv2_ga_ideagroup_dip_5_2: "自由贸易"
 iv2_ga_ideagroup_dip_5_2_desc: "现在的商业家族们迫切希望能够确保他们对于商业专营权的垄断，但我们并不希望如此，而是希望整个商人阶层能够全面发展。"
 iv2_ga_ideagroup_dip_5_3: "风险投资"
 iv2_ga_ideagroup_dip_5_3_desc: "使我们能够充分引导本国商人追逐利益最大化，开拓新商路，开发新市场。"
 iv2_ga_ideagroup_dip_5_4: "全国性贸易政策"
 iv2_ga_ideagroup_dip_5_4_desc: "通过采用全国性的贸易政策，我国得以加强贸易存在，同时提高贸易效率。"
 iv2_ga_ideagroup_dip_5_5: "操纵贸易"
 iv2_ga_ideagroup_dip_5_5_desc: "在决定商业项目成败的关键阶段拥有优势，可能成为提升我们贸易收入的决定性因素。"
 iv2_ga_ideagroup_dip_5_6: "关税规避"
 iv2_ga_ideagroup_dip_5_6_desc: "我们的交易员擅长规避其他国家的关税。虽不完全合法，但能提高利润！"
 iv2_ga_ideagroup_dip_5_7: "快速谈判"
 iv2_ga_ideagroup_dip_5_7_desc: "有时候达成一项协议是非常迅速的，而我们要做的就是确保商人们能够切实完成我们的谈判。"
