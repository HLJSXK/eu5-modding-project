 iv2_ideagroup_title_dip_11: "帝国雄心理念"
 iv2_ga_ideagroup_dip_11_1: "丰收庆典"
 iv2_ga_ideagroup_dip_11_1_desc: "在丰收节上，我们总能向臣民展示自己的仁慈。通过在全国范围内分发免费食物、举办各种庆典，我们既接济了贫困者，又营造了全国上下良好的社会氛围。"
 iv2_ga_ideagroup_dip_11_2: "国王领地"
 iv2_ga_ideagroup_dip_11_2_desc: "国王直接统治的领地必须确保有足够的兵力以制约封臣。"
 iv2_ga_ideagroup_dip_11_3: "权力中心"
 iv2_ga_ideagroup_dip_11_3_desc: "首都是我们的权力中心。它必须拥有超越所有其他城市的魅力，因为我们的君主也居住于此。"
 iv2_ga_ideagroup_dip_11_4: "皇家敕令"
 iv2_ga_ideagroup_dip_11_4_desc: "通过皇家法令，进展能够更快地遍及整个帝国。我们忠诚的子民永远响应号召。"
 iv2_ga_ideagroup_dip_11_5: "皇家海军"
 iv2_ga_ideagroup_dip_11_5_desc: "我国海军必须光荣而伟大，女王陛下已宣布这是国家大事。"
 iv2_ga_ideagroup_dip_11_6: "君主军械库"
 iv2_ga_ideagroup_dip_11_6_desc: "女王陛下的军械库储备充足，每当我军调拨装备新部队时，铁匠们补充损耗从来不在话下。"
 iv2_ga_ideagroup_dip_11_7: "附庸扩张"
 iv2_ga_ideagroup_dip_11_7_desc: "我们的国王，仅凭其地位便有权统治各位小领主！让他们全部臣服于你的统治之下。"
