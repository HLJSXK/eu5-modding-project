 game_concept_iv2_researchers: "研究员"
 game_concept_iv2_researchers_desc: "$game_concept_iv2_researcher_desc$"
 game_concept_iv2_researcher_skill: "研究员能力"
 game_concept_iv2_researcher_skill_desc: "研究员的创新点数产生速度计算公式如下：\n（（行政能力 + 外交能力 + 军事能力）/ 2）+（研究类别的主导能力）X0.015\n他们的[iv2_researcher_upkeep|e]取决于其技能等级。"
 game_concept_iv2_researcher_upkeep: "研究员维护费"
 game_concept_iv2_researcher_upkeep_desc: "研究员维护费的计算公式如下：\n（ [Player.GetNameWithNoTooltip]的经济基础值 + （（行政能力 + 外交能力 + 军事能力） / 2） + 对应研究领域的主导能力值 ） / 100X维护费支出百分比"
 game_concept_iv2_innovation_points: "创新点数"
 game_concept_iv2_innovation_points_desc: "创新点数由[iv2_mod|e]添加。共有四种不同类型，分别是行政、外交、军事和海军创新点数，用于解锁各自对应的理念组和理念。"