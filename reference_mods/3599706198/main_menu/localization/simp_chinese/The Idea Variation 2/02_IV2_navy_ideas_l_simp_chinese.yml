 iv2_ideagroup_title_navy_15: "登船突击理念"
 iv2_ga_ideagroup_navy_15_1: "消防用水"
 iv2_ga_ideagroup_navy_15_1_desc: "海上火灾是致命的。即使意图俘获敌舰，消防用水也必须时刻待命。"
 iv2_ga_ideagroup_navy_15_2: "改进撞角"
 iv2_ga_ideagroup_navy_15_2_desc: "舾装军舰上的金属撞角的历史可以追溯到数千年前，但如今冶金技术取得长足进步，我们应当借此打造更坚固的撞角。"
 iv2_ga_ideagroup_navy_15_3: "登船突击队"
 iv2_ga_ideagroup_navy_15_3_desc: "通过训练海军军官执行登船作战，即使面对优势敌军舰队，我们也能在海战中赢得先机。"
 iv2_ga_ideagroup_navy_15_4: "军刀战斗"
 iv2_ga_ideagroup_navy_15_4_desc: "军刀是登船近战的理想武器。"
 iv2_ga_ideagroup_navy_15_5: "小口径武器"
 iv2_ga_ideagroup_navy_15_5_desc: "小口径手枪与短步枪便于操控，在登船作战中极具杀伤力。"
 iv2_ga_ideagroup_navy_15_6: "更多船员"
 iv2_ga_ideagroup_navy_15_6_desc: "一旦船只被俘获，船员必须能够提供足够人手接管新船。"
 iv2_ga_ideagroup_navy_15_7: "瞄准船长！"
 iv2_ga_ideagroup_navy_15_7_desc: "如果对方船长被俘或阵亡，登船作战通常就能成功。"
