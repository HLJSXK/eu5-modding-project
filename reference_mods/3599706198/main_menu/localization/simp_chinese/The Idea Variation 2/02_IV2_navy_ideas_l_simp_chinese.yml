 iv2_ideagroup_title_navy_2: "军港理念"
 iv2_ga_ideagroup_navy_2_1: "基地占领"
 iv2_ga_ideagroup_navy_2_1_desc: "作为一个航海国家，我们对海军基地有着巨大需求。\n对殖民范围内所有非原始国家的沿海省份§GKriegsgrund§"
 iv2_ga_ideagroup_navy_2_2: "必要性的海外基地"
 iv2_ga_ideagroup_navy_2_2_desc: "附近有基地总能提高我们战舰和船员们的生存能力。"
 iv2_ga_ideagroup_navy_2_3: "驻军舰队"
 iv2_ga_ideagroup_navy_2_3_desc: "一支小型的驻军舰队可以保护我们的港口免受海盗或孤独的敌舰的攻击。"
 iv2_ga_ideagroup_navy_2_4: "基地驻军"
 iv2_ga_ideagroup_navy_2_4_desc: "我们需要大量水手和士兵来驻守我们的基地。"
 iv2_ga_ideagroup_navy_2_5: "经验丰富的水手"
 iv2_ga_ideagroup_navy_2_5_desc: "我们众多的基地吸引了经验丰富的水手，可供我们雇佣。"
 iv2_ga_ideagroup_navy_2_6: "海对陆作战"
 iv2_ga_ideagroup_navy_2_6_desc: "若有必要攻占基地，从海上轰炸防御工事是明智之举。"
 iv2_ga_ideagroup_navy_2_7: "海外造船厂"
 iv2_ga_ideagroup_navy_2_7_desc: "维修战舰至关重要且困难重重。在海外部署专家无疑是个绝佳的主意。"
