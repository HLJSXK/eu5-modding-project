 iv2_ideagroup_title_navy_13: "存在舰队理念"
 iv2_ga_ideagroup_navy_13_1: "分舰队"
 iv2_ga_ideagroup_navy_13_1_desc: "我们希望在世界的每个角落都有一个分舰队。"
 iv2_ga_ideagroup_navy_13_2: "存在舰队理念"
 iv2_ga_ideagroup_navy_13_2_desc: "通过维持一支强大的舰队，我们让敌人根本不敢轻举妄动。"
 iv2_ga_ideagroup_navy_13_3: "战略影响力"
 iv2_ga_ideagroup_navy_13_3_desc: "通过维持舰队作为威慑力量，我们能在各领域获得影响力。"
 iv2_ga_ideagroup_navy_13_4: "随时待命"
 iv2_ga_ideagroup_navy_13_4_desc: "依靠随时能出动迎敌的舰队，我们给敌人施加了巨大的心理压力。"
 iv2_ga_ideagroup_navy_13_5: "威慑"
 iv2_ga_ideagroup_navy_13_5_desc: "我们可以用庞大的舰队震慑敌人。即使舰队停泊在港口，也能让我们的海岸线更加安全。"
 iv2_ga_ideagroup_navy_13_6: "保存实力"
 iv2_ga_ideagroup_navy_13_6_desc: "通过威慑避免大规模交战，我们通常能避免惨重损失。"
 iv2_ga_ideagroup_navy_13_7: "舰队决战"
 iv2_ga_ideagroup_navy_13_7_desc: "如果所有手段均告失效，我们仍能凭借庞大舰队绝地翻盘！"
