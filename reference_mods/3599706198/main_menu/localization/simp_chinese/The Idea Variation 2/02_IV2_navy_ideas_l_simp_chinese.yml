 iv2_ideagroup_title_navy_11: "海军部理念"
 iv2_ga_ideagroup_navy_11_1: "海军部"
 iv2_ga_ideagroup_navy_11_1_desc: "我们已经将船长的领导制度化，并建立了海军部。"
 iv2_ga_ideagroup_navy_11_2: "晋升委员会"
 iv2_ga_ideagroup_navy_11_2_desc: "晋升委员会确保提拔合适的人，而不仅仅是那些关系最好的人。"
 iv2_ga_ideagroup_navy_11_3: "航海日志"
 iv2_ga_ideagroup_navy_11_3_desc: "我们要求我们的船长保存日志，以便我们随时监控他们的效率。"
 iv2_ga_ideagroup_navy_11_4: "监察将官"
 iv2_ga_ideagroup_navy_11_4_desc: "海军部能够向我国海军活动的任何地方派遣监察军官。"
 iv2_ga_ideagroup_navy_11_5: "制度化培训"
 iv2_ga_ideagroup_navy_11_5_desc: "通过标准化军官学员的培训，我们确保舰队的能力保持在高水平。"
 iv2_ga_ideagroup_navy_11_6: "地区指挥官"
 iv2_ga_ideagroup_navy_11_6_desc: "当我们的舰队在多个不同区域行动时，必须部署地区指挥官以缩短指挥链。"
 iv2_ga_ideagroup_navy_11_7: "轮换原则"
 iv2_ga_ideagroup_navy_11_7_desc: "过不了多久，就连最坚韧的老水手也会被海上生活耗尽精力。我们需要建立轮换制度，让船长和船员们能回家休更长的假。"
