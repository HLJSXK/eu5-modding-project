 iv2_ideagroup_title_navy_4: "海事基础设施理念"
 iv2_ga_ideagroup_navy_4_1: "有组织的生产"
 iv2_ga_ideagroup_navy_4_1_desc: "我们组织生产海军所需的重要物资，并将生产设施建在靠近港口的地方。"
 iv2_ga_ideagroup_navy_4_2: "木材工业"
 iv2_ga_ideagroup_navy_4_2_desc: "我们需要一个能够为大规模舰队提供充足材料的木材工业。"
 iv2_ga_ideagroup_navy_4_3: "植树"
 iv2_ga_ideagroup_navy_4_3_desc: "我们为了造船砍伐了许多树木。重新种植合适的树木在未来将非常有价值，而且这并不会花费我们太多。"
 iv2_ga_ideagroup_navy_4_4: "国家造船工匠"
 iv2_ga_ideagroup_navy_4_4_desc: "通过雇佣大量造船工人到我们的船厂，我们可以快速建造船只。"
 iv2_ga_ideagroup_navy_4_5: "工业造船"
 iv2_ga_ideagroup_navy_4_5_desc: "如果我们完美地协调生产，我们就能以惊人的速度建造船只。"
 iv2_ga_ideagroup_navy_4_6: "生产线"
 iv2_ga_ideagroup_navy_4_6_desc: "如果我们完美地协调我们的生产线，我们永远不会用完建造材料。"
 iv2_ga_ideagroup_navy_4_7: "大型仓库"
 iv2_ga_ideagroup_navy_4_7_desc: "通过储备大量建筑材料和备用零件，我们可以快速修复船只，或通过新造来应对损失。"
