 iv2_ideagroup_title_navy_10: "海上帝国理念"
 iv2_ga_ideagroup_navy_10_1: "卓越航海技能"
 iv2_ga_ideagroup_navy_10_1_desc: "使我们的舰队成为一支拥有一流质量的船只、一流技能的船长和水手的，最强大的海军力量。"
 iv2_ga_ideagroup_navy_10_2: "光荣舰队"
 iv2_ga_ideagroup_navy_10_2_desc: "我们这支声名显赫、光荣伟大的舰队，足以令任何敌人闻风丧胆。"
 iv2_ga_ideagroup_navy_10_3: "自豪舰队"
 iv2_ga_ideagroup_navy_10_3_desc: "我们的舰队完全有理由为自身实力感到自豪。"
 iv2_ga_ideagroup_navy_10_4: "帝国舰队"
 iv2_ga_ideagroup_navy_10_4_desc: "我们的舰队配得上一个帝国。"
 iv2_ga_ideagroup_navy_10_5: "航海传统"
 iv2_ga_ideagroup_navy_10_5_desc: "源远流长的航海传统增强了海军传统，铸就了我们海军的辉煌遗产。"
 iv2_ga_ideagroup_navy_10_6: "私人投资"
