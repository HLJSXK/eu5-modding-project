 iv2_ideagroup_title_navy_9: "桨帆船焦点"
 iv2_ga_ideagroup_navy_9_1: "迦太基港口"
 iv2_ga_ideagroup_navy_9_1_desc: "我们决定专注于建造大型船只，因此需要容纳大量舰船。"
 iv2_ga_ideagroup_navy_9_2: "桨帆船造船厂"
 iv2_ga_ideagroup_navy_9_2_desc: "我们国家长期投资维持造船厂，以便更有效地生产我们想要的船只。"
 iv2_ga_ideagroup_navy_9_3: "改进撞角"
 iv2_ga_ideagroup_navy_9_3_desc: "舾装军舰上的金属撞角的历史可以追溯到数千年前，然而相较那时冶金已经有了长远的进步，我们应当利用这个优势并建造出更坚固的撞角。"
 iv2_ga_ideagroup_navy_9_4: "海军火炮"
 iv2_ga_ideagroup_navy_9_4_desc: "当我们靠近海岸航行时，我们可以使用我们的战舰大炮来支援陆地上的进攻。"
 iv2_ga_ideagroup_navy_9_5: "提升海军作战协调能力"
 iv2_ga_ideagroup_navy_9_5_desc: "让我们的海军老兵设计出新的方法来提高舰队的封锁效率。"
 iv2_ga_ideagroup_navy_9_6: "双层船体"
 iv2_ga_ideagroup_navy_9_6_desc: "双层船体将使我们的船更有弹性。"
 iv2_ga_ideagroup_navy_9_7: "优良航海技术"
 iv2_ga_ideagroup_navy_9_7_desc: "使我们的舰队成为一支拥有一流质量的船只、一流技能的船长和水手的，最强大的海军力量。"
