 iv2_ideagroup_title_navy_7: "重型战舰焦点"
 iv2_ga_ideagroup_navy_7_1: "大型造船厂"
 iv2_ga_ideagroup_navy_7_1_desc: "我们国家长期投资维持造船厂，以便更有效地生产我们想要的船只。"
 iv2_ga_ideagroup_navy_7_2: "造船橡木"
 iv2_ga_ideagroup_navy_7_2_desc: "船只能够承受的伤害越多，它们在战斗中就能输出更多的伤害。所以，我们应当确保供应稳定，保证战舰用上最优质的风干橡木。"
 iv2_ga_ideagroup_navy_7_3: "大规模生产"
 iv2_ga_ideagroup_navy_7_3_desc: "我们正在尽我们所能缩短我们的大型船只的建造时间。"
 iv2_ga_ideagroup_navy_7_4: "舰炮"
 iv2_ga_ideagroup_navy_7_4_desc: "我们可以用战舰的火炮支援陆地上的攻城。"
 iv2_ga_ideagroup_navy_7_5: "双层船体"
 iv2_ga_ideagroup_navy_7_5_desc: "双层船体将使我们的船更有弹性。"
 iv2_ga_ideagroup_navy_7_6: "温特港"
 iv2_ga_ideagroup_navy_7_6_desc: "我们必须确保我们的船只在任何时候都是安全的，无论夏天和冬天。因为冬天总是要到来。"
 iv2_ga_ideagroup_navy_7_7: "舰队学员"
 iv2_ga_ideagroup_navy_7_7_desc: "如果我们能将舰队作为一份伟大的事业推销给贵族子嗣，我们就能建立一支专业的舰队军官队伍来领导我们的炮兵。"
