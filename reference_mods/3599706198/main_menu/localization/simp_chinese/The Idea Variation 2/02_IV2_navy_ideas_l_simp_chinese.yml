 iv2_ideagroup_title_navy_8: "轻型战舰焦点"
 iv2_ga_ideagroup_navy_8_1: "商业船厂"
 iv2_ga_ideagroup_navy_8_1_desc: "国家维持自己的造船厂以便用优惠价格为其舰队建设计划提供资金。"
 iv2_ga_ideagroup_navy_8_2: "造船橡木"
 iv2_ga_ideagroup_navy_8_2_desc: "船只能够承受的伤害越多，它们在战斗中就能输出更多的伤害。所以，我们应当确保供应稳定，保证战舰用上最优质的风干橡木。"
 iv2_ga_ideagroup_navy_8_3: "贸易传统"
 iv2_ga_ideagroup_navy_8_3_desc: "我们是一个贸易国家。海上贸易是我们战略的一个组成部分。"
 iv2_ga_ideagroup_navy_8_4: "海军学员"
 iv2_ga_ideagroup_navy_8_4_desc: "通过推动海军成为贵族次子们的职业选择，我们可以建立一支专业的海军军官队伍来监督我们的水手。"
 iv2_ga_ideagroup_navy_8_5: "大型商船队"
 iv2_ga_ideagroup_navy_8_5_desc: "我们维持着一支庞大的商船队。"
 iv2_ga_ideagroup_navy_8_6: "商业间谍"
 iv2_ga_ideagroup_navy_8_6_desc: "我们的商人不仅促进了我们的贸易，而且还能让我们了解敌人的防御能力。"
 iv2_ga_ideagroup_navy_8_7: "优良航海技术"
 iv2_ga_ideagroup_navy_8_7_desc: "使我们的舰队成为一支拥有一流质量的船只、一流技能的船长和水手的，最强大的海军力量。"
