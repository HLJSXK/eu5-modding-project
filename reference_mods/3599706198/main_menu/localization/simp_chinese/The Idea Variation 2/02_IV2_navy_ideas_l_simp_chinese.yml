 iv2_ideagroup_title_navy_1: "海贸理念"
 iv2_ga_ideagroup_navy_1_1: "海外贸易"
 iv2_ga_ideagroup_navy_1_1_desc: "旅途越漫长，收益往往越丰厚。"
 iv2_ga_ideagroup_navy_1_2: "境外商埠"
 iv2_ga_ideagroup_navy_1_2_desc: "通过在外国建立宏伟的使馆，我们可以促进更好的关系，并在世界上确保我们的地位。"
 iv2_ga_ideagroup_navy_1_3: "风暴帆"
 iv2_ga_ideagroup_navy_1_3_desc: "我们必须确保每艘商船都配备风暴帆。"
 iv2_ga_ideagroup_navy_1_4: "老练水手"
 iv2_ga_ideagroup_navy_1_4_desc: "作为一个拥有众多商船的国家，我们的水手也经验丰富，享誉世界。"
 iv2_ga_ideagroup_navy_1_5: "杰出船长"
 iv2_ga_ideagroup_navy_1_5_desc: "我们必须从商船中征召最优秀的船长加入海军。"
 iv2_ga_ideagroup_navy_1_6: "无限水手"
 iv2_ga_ideagroup_navy_1_6_desc: "得益于我们蓬勃发展的海上贸易，我们从不缺少水手。如有必要，我们会征召他们。"
 iv2_ga_ideagroup_navy_1_7: "公平公正的军官"
 iv2_ga_ideagroup_navy_1_7_desc: "公平公正的军官在船上树立了良好风气，阻止了许多叛乱的发生。"
