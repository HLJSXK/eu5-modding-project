 iv2_ideagroup_title_navy_3: "航海理念"
 iv2_ga_ideagroup_navy_3_1: "铜制船体"
 iv2_ga_ideagroup_navy_3_1_desc: "木材也许是造船的理想材料，但它会随着时间的推移逐渐糟朽。通过给我们的战舰在水线下装配铜质保护壳，我们可以减少这种破坏，使它们能够更好地耐受长途旅行。"
 iv2_ga_ideagroup_navy_3_2: "轻护卫舰"
 iv2_ga_ideagroup_navy_3_2_desc: "轻护卫舰是一类被设计用来护送友方船只和骚扰敌军的小型军舰，它们依靠速度和机动性而不是集中的火力。"
 iv2_ga_ideagroup_navy_3_3: "国家军械库"
 iv2_ga_ideagroup_navy_3_3_desc: "通过建立一个国家武库，按照统一标准建造和维护我们的军舰，我们可以建立一个更大的舰队。"
 iv2_ga_ideagroup_navy_3_4: "扩充补给线"
 iv2_ga_ideagroup_navy_3_4_desc: "投入更多的资源在补给线上可以让我们的军队在敌对领土上活动更长的时间。"
 iv2_ga_ideagroup_navy_3_5: "造船橡木"
 iv2_ga_ideagroup_navy_3_5_desc: "船只能够承受的伤害越多，它们在战斗中就能输出更多的伤害。所以，我们应当确保供应稳定，保证战舰用上最优质的风干橡木。"
 iv2_ga_ideagroup_navy_3_6: "舰队演习"
 iv2_ga_ideagroup_navy_3_6_desc: "战场上的混乱会使得一艘战舰在相当长的时间内失去战斗力，而相较于普通船员来说，训练有素的船员们会更快地从混乱中恢复过来。"
 iv2_ga_ideagroup_navy_3_7: "商船舰队"
 iv2_ga_ideagroup_navy_3_7_desc: "让所有商船自豪地悬挂我们的商船旗，安全地知道，如果他们遇到困难，我们的舰队将保护他们。"
