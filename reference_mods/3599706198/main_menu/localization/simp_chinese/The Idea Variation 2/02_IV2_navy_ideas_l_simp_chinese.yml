 iv2_ideagroup_title_navy_14: "商船队理念"
 iv2_ga_ideagroup_navy_14_1: "护航商船队"
 iv2_ga_ideagroup_navy_14_1_desc: "一支庞大的商船队不仅给我们带来了繁荣，而且在世界海洋上也有强大的影响力。"
 iv2_ga_ideagroup_navy_14_2: "贸易站"
 iv2_ga_ideagroup_navy_14_2_desc: "我们在国外有许多贸易站。"
 iv2_ga_ideagroup_navy_14_3: "殖民贸易"
 iv2_ga_ideagroup_navy_14_3_desc: "与殖民地的贸易是我们商人的重要收入来源。"
 iv2_ga_ideagroup_navy_14_4: "白银舰队"
 iv2_ga_ideagroup_navy_14_4_desc: "是护送白银的舰队还是劫掠白银的舰队？当然，这取决于世界局势。"
 iv2_ga_ideagroup_navy_14_5: "武装商船舰队"
 iv2_ga_ideagroup_navy_14_5_desc: "我们的商船全副武装，以威慑海盗。"
 iv2_ga_ideagroup_navy_14_6: "两用船只"
 iv2_ga_ideagroup_navy_14_6_desc: "战争时期，我们的商船可以迅速改装为战舰。"
 iv2_ga_ideagroup_navy_14_7: "船员操练"
 iv2_ga_ideagroup_navy_14_7_desc: "商船通过经常性的舰炮训练来保持武装状态。"
