 iv2_ideagroup_title_navy_5: "沿海巡逻理念"
 iv2_ga_ideagroup_navy_5_1: "海上监视"
 iv2_ga_ideagroup_navy_5_1_desc: "监控我们的水域并保护它们免受海盗侵害非常重要。"
 iv2_ga_ideagroup_navy_5_2: "信标"
 iv2_ga_ideagroup_navy_5_2_desc: "我们将在海岸线沿线安装信标，以便迅速向民众发出袭击警报。"
 iv2_ga_ideagroup_navy_5_3: "沿海港口"
 iv2_ga_ideagroup_navy_5_3_desc: "通过维护沿海众多的小型港口，我们不仅能加强渔业发展，还能提升对水域的监控能力。"
 iv2_ga_ideagroup_navy_5_4: "海防工事"
 iv2_ga_ideagroup_navy_5_4_desc: "只需几处炮台就足以使敌人进攻变得软弱。"
 iv2_ga_ideagroup_navy_5_5: "定期巡逻"
 iv2_ga_ideagroup_navy_5_5_desc: "沿我国海岸线的定期巡逻加强了贸易往来，并为我们的商人提供了安全保障。"
 iv2_ga_ideagroup_navy_5_6: "海盗法庭"
 iv2_ga_ideagroup_navy_5_6_desc: "如果一旦抓到海盗，就会迅速解决他们。"
 iv2_ga_ideagroup_navy_5_7: "剿灭海盗"
 iv2_ga_ideagroup_navy_5_7_desc: "一旦发现海盗巢穴，我们就会动用全部力量将其彻底铲除。"
