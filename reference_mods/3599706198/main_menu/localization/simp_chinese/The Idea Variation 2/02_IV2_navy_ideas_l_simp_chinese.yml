 iv2_ideagroup_title_navy_12: "海军陆战队理念"
 iv2_ga_ideagroup_navy_12_1: "海军陆战队"
 iv2_ga_ideagroup_navy_12_1_desc: "经过特殊训练、能在海上和陆地作战的海军陆战队员，在向海外敌军发动进攻时具有极大优势。"
 iv2_ga_ideagroup_navy_12_2: "跨洋作战"
 iv2_ga_ideagroup_navy_12_2_desc: "海外部队的补给与有效指挥对我们而言充满挑战。"
 iv2_ga_ideagroup_navy_12_3: "海军后勤"
 iv2_ga_ideagroup_navy_12_3_desc: "有时向海外军队提供补给的唯一方式是通过海路。我们的海军必须为此做好准备。"
 iv2_ga_ideagroup_navy_12_4: "补员船队"
 iv2_ga_ideagroup_navy_12_4_desc: "必须尽可能保护运送新兵的车队，以便他们到达目的地。"
 iv2_ga_ideagroup_navy_12_5: "弹药防潮"
 iv2_ga_ideagroup_navy_12_5_desc: "火炮运输与步兵输送同等重要。我们必须确保贵重物资完好送达，并保持火药干燥。"
 iv2_ga_ideagroup_navy_12_6: "双重指挥"
 iv2_ga_ideagroup_navy_12_6_desc: "根据最高指挥官隶属关系，海军陆战队需同时接受海军与陆军的指令。"
 iv2_ga_ideagroup_navy_12_7: "硬汉形象"
 iv2_ga_ideagroup_navy_12_7_desc: "我们的海军陆战队必须赢得声誉，闻名世界，这至关重要。"
