 iv2_ideagroup_title_navy_6: "探索理念"
 iv2_ga_ideagroup_navy_6_1: "开拓殖民地"
 iv2_ga_ideagroup_navy_6_1_desc: "使我们能够派遣更多的移民队，开拓未知世界。"
 iv2_ga_ideagroup_navy_6_2: "探索新大陆"
 iv2_ga_ideagroup_navy_6_2_desc: "让我们加入到探索国界之外的世界的国家行列，或者努力成为第一个环游世界的国家，开始对新世界的探索。"
 iv2_ga_ideagroup_navy_6_3: "探索海外领地"
 iv2_ga_ideagroup_navy_6_3_desc: "开拓远方殖民地的旅程往往都是单程的。即使没有被未知的传染病所吞噬，归乡所需的漫漫长日也会使你望而却步。如果能够宣示出此行所能带来的巨大财富，那么我们就能够激励人们去探索更加遥远的殖民地。"
 iv2_ga_ideagroup_navy_6_4: "机会之地"
 iv2_ga_ideagroup_navy_6_4_desc: "通过将殖民地描绘成处女地，在那里每个男人，可能还有些女人，都能致富，人们会更愿意移居殖民地。这意味着我们将不必花费那么多钱去说服人们这样做。"
 iv2_ga_ideagroup_navy_6_5: "副王"
 iv2_ga_ideagroup_navy_6_5_desc: "我们殖民地的副王使我们能够更有效地治理。这改善了殖民地的行政管理，并增加了它们产生的收入。"
 iv2_ga_ideagroup_navy_6_6: "自由殖民地"
 iv2_ga_ideagroup_navy_6_6_desc: "不幸的是，愿意扩张我们伟大殖民帝国的人数并非无限。承诺在海外分得一块土地或许能改善这种状况。或许会有更多人选择去海外寻找财富。而最妙的是，如今殖民地的土地确实十分充足。"
 iv2_ga_ideagroup_navy_6_7: "全球帝国"
 iv2_ga_ideagroup_navy_6_7_desc: "我们的殖民活动已经使殖民地管理者的态度发生转变。他们不再是那些唯利是图的亡命之徒的聚集地，而是社会的精英人才。这一进步也体现在税收方面。"
