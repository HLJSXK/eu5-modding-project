 iv2_ideagroup_title_adm_23: "部落理念"
 iv2_ga_ideagroup_adm_23_1: "伟大法令"
 iv2_ga_ideagroup_adm_23_1_desc: "通过订立一套共同的原则将人民联系在一起，我们可以为了改善人民的生活而努力。"
 iv2_ga_ideagroup_adm_23_2: "与外国人贸易"
 iv2_ga_ideagroup_adm_23_2_desc: "通过与远方其它文化人民的贸易，我们认识了新的理念。"
 iv2_ga_ideagroup_adm_23_3: "女战士"
 iv2_ga_ideagroup_adm_23_3_desc: "我们的文化有一个长期传统，即为年轻人举办成为战士的仪式。他们必须证明自己的勇敢，以完成通往成人的旅程。"
 iv2_ga_ideagroup_adm_23_4: "烧荒"
 iv2_ga_ideagroup_adm_23_4_desc: "通过有控制地焚烧田地，我们可以提高收成，这使得人口大大增加。"
 iv2_ga_ideagroup_adm_23_5: "村庄防卫"
 iv2_ga_ideagroup_adm_23_5_desc: "每个人都有保卫村庄的责任。"
 iv2_ga_ideagroup_adm_23_6: "富饶土地"
 iv2_ga_ideagroup_adm_23_6_desc: "我们的人民生活在一片广袤的大地上，这里世世代代以来都未曾被开发，有着丰富的动植物资源。"
 iv2_ga_ideagroup_adm_23_7: "非常规战争"
 iv2_ga_ideagroup_adm_23_7_desc: "通过利用我们熟悉的自然特征与障碍物，发动突袭与伏击，我们可以击败远强于我们的敌人。"
