 iv2_ideagroup_title_adm_47: "纳瓦理念"
 iv2_ga_ideagroup_adm_47_1: "维齐洛波奇特利"
 iv2_ga_ideagroup_adm_47_1_desc: "维齐洛波奇特利，意为南方蜂鸟，是我们的主神，也是太阳和战争之神。"
 iv2_ga_ideagroup_adm_47_2: "魁扎尔科亚特尔"
 iv2_ga_ideagroup_adm_47_2_desc: "羽蛇神魁扎尔科亚特尔是我们的风神、天神、耳神和创世神。据说他在很久很久之前就带着卡努离开了这个世界"
 iv2_ga_ideagroup_adm_47_3: "人祭"
 iv2_ga_ideagroup_adm_47_3_desc: "我们的人祭是在寺庙中的一块特殊祭祀石上进行的，受害者被捆绑着挖出心脏。"
 iv2_ga_ideagroup_adm_47_4: "血祭"
 iv2_ga_ideagroup_adm_47_4_desc: "通过血祭，我们告慰我们的神灵"
 iv2_ga_ideagroup_adm_47_5: "祭祀特拉洛克"
 iv2_ga_ideagroup_adm_47_5_desc: "特拉洛克是我们的雨神，在儿童牺牲仪式上，我们将选中的儿童带到神社并挖出心脏"
 iv2_ga_ideagroup_adm_47_6: "米克特兰"
 iv2_ga_ideagroup_adm_47_6_desc: "米克特兰是我们的冥界，自然死亡之人都将前往那里"
 iv2_ga_ideagroup_adm_47_7: "鲜花天堂"
 iv2_ga_ideagroup_adm_47_7_desc: "淹死或被雷击死的人在死后会进入特拉洛克的领域。特拉洛克的境界也被称为鲜花天堂。"
