 iv2_ideagroup_title_adm_53: "胡斯派理念"
 iv2_ga_ideagroup_adm_53_1: "扬·胡斯的殉道"
 iv2_ga_ideagroup_adm_53_1_desc: "1415年7月6日，扬-胡斯在火刑柱上被烧死，谴责罗马天主教教会的罪恶。"
 iv2_ga_ideagroup_adm_53_2: "布拉格四条款"
 iv2_ga_ideagroup_adm_53_2_desc: "1420年颁布的《布拉格条款》标志着胡斯信仰的里程碑，其中宣告的四项自由成为欧洲宗教改革的第一缕火花。"
 iv2_ga_ideagroup_adm_53_3: "圣杯派"
 iv2_ga_ideagroup_adm_53_3_desc: "圣杯派成员多来自最贫困的底层民众，并建立了塔博尔城。"
 iv2_ga_ideagroup_adm_53_4: "塔博尔派"
 iv2_ga_ideagroup_adm_53_4_desc: "激进的塔博尔派主张不惜一切代价在人间建立上帝之国。"
 iv2_ga_ideagroup_adm_53_5: "掷出窗外事件"
 iv2_ga_ideagroup_adm_53_5_desc: "1419年7月30日，胡斯派激进分子冲进布拉格市政厅，将数名官员抛出窗外。"
 iv2_ga_ideagroup_adm_53_6: "反十字军征讨"
 iv2_ga_ideagroup_adm_53_6_desc: "尽管胡斯派长期面临多次十字军征讨的压力，他们仍不时能发起反击。"
 iv2_ga_ideagroup_adm_53_7: "改革思想的吸引力"
 iv2_ga_ideagroup_adm_53_7_desc: "胡斯信仰的价值观与教义激励着其他自由思想者。"
