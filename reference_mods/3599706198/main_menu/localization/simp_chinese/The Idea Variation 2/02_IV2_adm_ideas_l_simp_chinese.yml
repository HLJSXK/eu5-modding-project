 iv2_ideagroup_title_adm_4: "教育理念"
 iv2_ga_ideagroup_adm_4_1: "阅读"
 iv2_ga_ideagroup_adm_4_1_desc: "阅读是先进社会的一项重要技能。"
 iv2_ga_ideagroup_adm_4_2: "好奇之心"
 iv2_ga_ideagroup_adm_4_2_desc: "我们鼓励孩子们保持好奇心，并激励他们动手实验。"
 iv2_ga_ideagroup_adm_4_3: "学校"
 iv2_ga_ideagroup_adm_4_3_desc: "当孩子们上学时，他们会学到许多父母无法传授的技能。"
 iv2_ga_ideagroup_adm_4_4: "最高水平的教育"
 iv2_ga_ideagroup_adm_4_4_desc: "更好的教育也能提升我们统治阶级的技能。"
 iv2_ga_ideagroup_adm_4_5: "创新精神"
 iv2_ga_ideagroup_adm_4_5_desc: "我们是一个创新的国家！"
 iv2_ga_ideagroup_adm_4_6: "阅读能力"
 iv2_ga_ideagroup_adm_4_6_desc: "随着越来越多的人学会阅读，其他人的学习压力也随之增加。"
