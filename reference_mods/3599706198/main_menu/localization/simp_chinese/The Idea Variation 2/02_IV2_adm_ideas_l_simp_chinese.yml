 iv2_ideagroup_title_adm_31: "儒教理念"
 iv2_ga_ideagroup_adm_31_1: "左传"
 iv2_ga_ideagroup_adm_31_1_desc: "《左传》由30个密集的章节组成，涵盖了公元前722年至公元前468年的时期，主要侧重于那个时代的政治、外交和军事事务。《左传》以其'无情的现实主义'风格而闻名，记述了许多紧张和戏剧性的事件，如战斗和争斗、皇家暗杀和谋杀嫔妃、欺骗和阴谋、过度行为、公民的压迫和叛乱以及鬼魂和宇宙预言的出现"
 iv2_ga_ideagroup_adm_31_2: "公羊"
 iv2_ga_ideagroup_adm_31_2_desc: "《公羊传》认为，《春秋》不仅是一部历史著作，还是一本孔子关于社会政治秩序理想的哲学宣言。与《左传》不同的是，《公羊传》因其对历史事件的生动叙述而成为后来许多学者的最爱，《公羊传》是以对话式风格编撰的，类似于儒家学者与学生之间的课堂对话"
 iv2_ga_ideagroup_adm_31_3: "谷梁"
 iv2_ga_ideagroup_adm_31_3_desc: "《谷梁传》这部作品以问答方式写成，对《春秋》进行了注释，涵盖了从鲁国统治者鲁隐公元年（公元前722年）到后来的鲁哀公十四年（公元前481年）这段时间。与《公羊传》一样，《谷梁传》也是对《春秋》中微妙的政治和社会信息进行说教式的解释，而不是像《左传》那样采用轶事体。它是研究从战国时期到汉代的儒家思想发展的重要书籍"
 iv2_ga_ideagroup_adm_31_4: "孔语"
 iv2_ga_ideagroup_adm_31_4_desc: "在《孔子家语》的序言中，作者将这套书描述为孔子与他的弟子和其他人的讨论，由其弟子记录下来。选定的讨论内容作为《论语》出版，而其余部分则收集在《家语》中。这一描述与《家语》的内容一致，它几乎包含了《左传》、《国语》、《孟子》、《韩非子》、《礼记》、《韩诗外传》、《吕氏春秋》、《淮南子》等各种古代文献中的所有儒家传说，但《论语》、《孝经》和其他一些作品中的内容除外"
 iv2_ga_ideagroup_adm_31_5: "易经"
 iv2_ga_ideagroup_adm_31_5_desc: "《易经》的核心是西周的占卜文本，称为《周易》。不同的现代学者认为，《易经》在公元前10世纪和4世纪之间就已经形成了现在的形式。根据对《周易》语言和有年代的青铜器铭文的比较，Edward Shaughnessy将目前形式的《周易》编纂时间定为周宣王统治时期的最初几十年，即公元前9世纪的最后四分之一"
 iv2_ga_ideagroup_adm_31_6: "尔雅"
 iv2_ga_ideagroup_adm_31_6_desc: "《尔雅》被描述为一本字典、词汇表、同义词表、辞典和百科全书。卡尔格伦（1931：46）解释说，这本书 '不是一部抽象的字典，它是对古代文本中具体段落的直接注释的集合'。收录的文本包含2094个条目，涉及约4300个词，共计13113个汉字。它分为十九个部分，其中第一部分又分为两个部分"
 iv2_ga_ideagroup_adm_31_7: "孟子"
 iv2_ga_ideagroup_adm_31_7_desc: "《孟子》由7章组成，每章分为两半，短文和关于具体哲学论点的广泛对话交替进行。其基本立场，如孟子在第6A章（即《告子上》）中关于人性本善的著名论点，通常以孟子与同时代思想家之间的对话形式呈现，而关于具体问题的论证通常出现在他对不同统治者的建议和意见的记录中。"
