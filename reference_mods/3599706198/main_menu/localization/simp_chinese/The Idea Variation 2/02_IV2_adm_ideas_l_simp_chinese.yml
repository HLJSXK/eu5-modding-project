 iv2_ideagroup_title_adm_24: "天主教理念"
 iv2_ga_ideagroup_adm_24_1: "传教士学校"
 iv2_ga_ideagroup_adm_24_1_desc: "虽然不乏准备出去传播真正信仰的人，但大多数人都是失败居多。培训传教士的专业学校将确保我们有更多的人不仅会尝试传播信仰，而且会取得成功。"
 iv2_ga_ideagroup_adm_24_2: "神圣事务至上"
 iv2_ga_ideagroup_adm_24_2_desc: "最重要的事务，就是让我们的国家和疆界免受那些不信者的搅扰和侵袭。"
 iv2_ga_ideagroup_adm_24_3: "如神所愿"
 iv2_ga_ideagroup_adm_24_3_desc: "加入十字军东征的战斗口号，“如神所愿”，粉碎异教徒。"
 iv2_ga_ideagroup_adm_24_4: "献身主义"
 iv2_ga_ideagroup_adm_24_4_desc: "宗教是我们权力的基础。当统治者表现出虔诚，被统治者就会跟随。 在我们的人民中日益增长的虔诚将加强我们的统治。"
 iv2_ga_ideagroup_adm_24_5: "宗教传统"
 iv2_ga_ideagroup_adm_24_5_desc: "对信仰的坚定执著，对神明的顶礼膜拜，这些都会得到远近友邻们的艳羡，而这种艳羡便是对我们威望与荣耀的有力体现。"
 iv2_ga_ideagroup_adm_24_6: "宗教法"
 iv2_ga_ideagroup_adm_24_6_desc: "我们的神赋予的权威让所有人感到惊讶。这巩固了我们的合法性和我们的影响力。"
 iv2_ga_ideagroup_adm_24_7: "十字架"
 iv2_ga_ideagroup_adm_24_7_desc: "一支举起耶稣基督十字架的军队是不可能被打败的!"
