 iv2_ga_ideagroup_adm_13_1: "普遍的扩张"
 iv2_ga_ideagroup_adm_13_1_desc: "国家的资源并不只集中在一个地区。整个区域都将受益。"
 iv2_ga_ideagroup_adm_13_2: "分级管理"
 iv2_ga_ideagroup_adm_13_2_desc: "由于我们幅员辽阔，我们必须以分散的方式进行管理。"
 iv2_ga_ideagroup_adm_13_3: "不同的贸易中心"
