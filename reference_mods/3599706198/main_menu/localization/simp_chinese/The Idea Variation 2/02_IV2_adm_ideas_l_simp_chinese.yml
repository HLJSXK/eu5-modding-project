 iv2_ideagroup_title_adm_50: "图腾崇拜"
 iv2_ga_ideagroup_adm_50_1: "玉米母亲"
 iv2_ga_ideagroup_adm_50_1_desc: "传说我们的玉米是一位女神的礼物。她牺牲了自己，换来了我们的生存。我们将利用她的礼物来对我们邻居保持优势"
 iv2_ga_ideagroup_adm_50_2: "漫游民族"
 iv2_ga_ideagroup_adm_50_2_desc: "我们漫游的时间比最古老的长老们记载的还要长。即使我们定居了，我们不要忘记了我们的传统"
 iv2_ga_ideagroup_adm_50_3: "瓦坎坦卡"
 iv2_ga_ideagroup_adm_50_3_desc: "瓦坎坦卡创造了一切，并在他认为必要的地方进行干预"
 iv2_ga_ideagroup_adm_50_4: "战士部落"
 iv2_ga_ideagroup_adm_50_4_desc: "关于我们过去的伟大战士的故事，以及关于我们部落的故事都将被传颂"
 iv2_ga_ideagroup_adm_50_5: "大长老"
 iv2_ga_ideagroup_adm_50_5_desc: "我们的长老和萨满掌握着我们的过去，我们要向他们学习来获得我们的未来"
 iv2_ga_ideagroup_adm_50_6: "太阳之舞"
 iv2_ga_ideagroup_adm_50_6_desc: "我们通过身体和精神上的艰苦牺牲来回应我们对至高存在的承诺，并通过在伟大仪式上的祈祷来铭记我们对彼此的承诺"
 iv2_ga_ideagroup_adm_50_7: "图腾崇拜"
 iv2_ga_ideagroup_adm_50_7_desc: "我们的图腾是我们部落历史的现世代表，我们通过敬重它来缅怀我们的祖先"
