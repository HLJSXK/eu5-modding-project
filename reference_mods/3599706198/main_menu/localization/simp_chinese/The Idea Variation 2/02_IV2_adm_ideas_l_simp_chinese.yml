 iv2_ideagroup_title_adm_45: "祆教理念"
 iv2_ga_ideagroup_adm_45_1: "萨奥希扬特"
 iv2_ga_ideagroup_adm_45_1_desc: "萨奥希扬特的字面意思是受赐福之人，萨奥希扬特是琐罗亚斯德教的主要先知。被预言为给人类带来救赎，给世界带来革新，他们将使死者复活，并在这个世界的最后一战中与安哥拉曼纽作战。当我们等待他降临时，我们将确保追随者们在这场最后的战争中做好一切准备"
 iv2_ga_ideagroup_adm_45_2: "阿维斯塔"
 iv2_ga_ideagroup_adm_45_2_desc: "琐罗亚斯德教的圣书，最早的《阿维斯塔》在亚历山大大帝的入侵中不幸丢失。该书分为几个部分，包含了祈祷词、赞美诗、祈使句和其他有关宗教的重要信息。我们应该把阿维斯塔的知识作为必修课，因为只有熟悉它的人才能真正指导我们。"
 iv2_ga_ideagroup_adm_45_3: "邀请达斯特人"
 iv2_ga_ideagroup_adm_45_3_desc: "达斯特人是具有深厚宗教教育的人。他们是法律的维护者和颁布者，是将文本翻译成更通俗的版本，也是宗教案件的法官。邀请这样的人进入我们的法庭，我们会受益匪浅"
 iv2_ga_ideagroup_adm_45_4: "改革祭司阶层"
 iv2_ga_ideagroup_adm_45_4_desc: "莫德博斯，也就是祭司，是在圣殿中服务的人。自古以来，这些祭司也持有庙宇，并能在政治或其他国家事务中发挥重大影响。通过改革祭司制度，取缔他们所有的这些特权，我们将确保莫德博斯们将专注于处理宗教事务，而不是试图参与国家事务"
 iv2_ga_ideagroup_adm_45_5: "重燃圣火"
 iv2_ga_ideagroup_adm_45_5_desc: "几个世纪以来，我们的人民一直在忍受着，我们目睹了我们的同胞被改教，我们的房屋被摧毁，我们的寺庙成了废墟。当我们再次崛起时，安哥拉曼纽的追随者们肯定会再次跟上我们。我们必须确保我们的人民准备好了，并且有了目标，让圣火不再熄灭!"
 iv2_ga_ideagroup_adm_45_6: "宗教教育"
 iv2_ga_ideagroup_adm_45_6_desc: "以善念踏出第一步，以善言踏出第二步，以善行踏出第三步，我就进入了天堂。自古以来，先知们的话影响着普通人的生活。通过恢复宗教教育，我们将确保人们熟知琐罗亚斯德教的教义、实践和重要规则"
 iv2_ga_ideagroup_adm_45_7: "贸易传教"
 iv2_ga_ideagroup_adm_45_7_desc: "传播宗教的最简单的方法之一是贸易。商人在外国也会带着他们的思想和宗教，相互之间进行贸易的国家也可以任意传播这两样而不经官员准许"
