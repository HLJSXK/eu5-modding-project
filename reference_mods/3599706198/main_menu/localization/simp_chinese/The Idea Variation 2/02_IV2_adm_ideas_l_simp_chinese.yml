 iv2_ideagroup_title_adm_11: "宗教理念"
 iv2_ga_ideagroup_adm_11_1: "传教士学校"
 iv2_ga_ideagroup_adm_11_1_desc: "尽管我们从不缺乏有志于出外传播真理的人，但这些人的绝大多数人的行为都是弊大于利的。然而，专门培养传教士的学校会确保我们能够培养出这样的人才：他们不仅愿意去传播信仰，而且有能力取得成功。"
 iv2_ga_ideagroup_adm_11_2: "义务性宗教活动"
 iv2_ga_ideagroup_adm_11_2_desc: "通过制定强制性参与宗教活动的政策，我们官方信仰的权威得到维护，对宗教活动的管理得到加强，维护了社会秩序的稳定。"
 iv2_ga_ideagroup_adm_11_3: "神圣事务至上"
 iv2_ga_ideagroup_adm_11_3_desc: "最重要的事务，就是让我们的国家和疆界免受那些不信者的搅扰和侵袭。"
 iv2_ga_ideagroup_adm_11_4: "如神所愿"
 iv2_ga_ideagroup_adm_11_4_desc: "加入十字军东征的战斗口号，“如神所愿”，粉碎异教徒。"
 iv2_ga_ideagroup_adm_11_5: "献身主义"
 iv2_ga_ideagroup_adm_11_5_desc: "宗教是我们统治地位的最坚实保证。如果统治者们公开表示对神明的虔诚信仰，那么臣民们便会跟着这样做。这样，便会巩固我们的统治地位。"
 iv2_ga_ideagroup_adm_11_6: "宗教传统"
 iv2_ga_ideagroup_adm_11_6_desc: "对信仰的坚定执著，对神明的顶礼膜拜，这些都会得到远近友邻们的艳羡，而这种艳羡便是对我们威望与荣耀的有力体现。"
 iv2_ga_ideagroup_adm_11_7: "普世主义"
 iv2_ga_ideagroup_adm_11_7_desc: "如何对付国内的异端总是一个难题。尽管以前的暴力手段最终会解决大多数问题，但外交手段也能取得成功。通过鼓励不同教派之间的对话，我们可以减少误解，促进国家的和平。"
