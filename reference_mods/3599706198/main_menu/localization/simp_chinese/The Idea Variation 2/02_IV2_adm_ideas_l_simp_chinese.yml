 iv2_ga_ideagroup_adm_40_6: "文化交流"
 iv2_ga_ideagroup_adm_40_6_desc: "虽然不完全一样，但我们和其他教也是有共通之处的。"
 iv2_ga_ideagroup_adm_40_7: "战斗精神"
 iv2_ga_ideagroup_adm_40_7_desc: "我们的人民会很快从战争的重担中恢复过来。"
