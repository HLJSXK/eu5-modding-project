 iv2_ga_ideagroup_adm_49_4_desc: "维亚库姆是因蒂的最高祭祀，我们王国中仅次于国王的第二大人物"
 iv2_ga_ideagroup_adm_49_5: "因蒂太阳节"
 iv2_ga_ideagroup_adm_49_5_desc: "因蒂拉米，也就是因蒂节的意思，是为了纪念太阳神和庆祝新的种植季节的开始"
