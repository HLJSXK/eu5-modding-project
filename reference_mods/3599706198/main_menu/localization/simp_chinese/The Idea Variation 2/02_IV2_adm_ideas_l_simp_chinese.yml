 iv2_ga_ideagroup_adm_12_1: "建设部长"
 iv2_ga_ideagroup_adm_12_1_desc: "建设部长将监督我们最重要的项目，并大大缩短建设时间。"
 iv2_ga_ideagroup_adm_12_2: "集中生产"
 iv2_ga_ideagroup_adm_12_2_desc: "把我们的生产集中在某些地区将提高我们的生产能力。"
 iv2_ga_ideagroup_adm_12_3: "发展大都市"
 iv2_ga_ideagroup_adm_12_3_desc: "我们习惯于规划大城市。"
 iv2_ga_ideagroup_adm_12_4: "本土贸易"
 iv2_ga_ideagroup_adm_12_4_desc: "有时，一个省份的本土贸易本身就能带来丰厚的利润。我们会记住的。"
 iv2_ga_ideagroup_adm_12_5: "中央征兵"
 iv2_ga_ideagroup_adm_12_5_desc: "通过集中我们的人民，我们可以很容易地为军队找到人。"
 iv2_ga_ideagroup_adm_12_6: "中央政府"
 iv2_ga_ideagroup_adm_12_6_desc: "中央行政使我们能够非常有效地管理我们的省份。然而，我们只能用这种方式治理这么多省份。"
 iv2_ga_ideagroup_adm_12_7: "制造部门"
 iv2_ga_ideagroup_adm_12_7_desc: "我们将高效发展经济并兴建众多制造工坊。"
