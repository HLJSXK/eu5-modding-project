 iv2_ideagroup_title_adm_7: "君权理念"
 iv2_ga_ideagroup_adm_7_1: "贵族骑士"
 iv2_ga_ideagroup_adm_7_1_desc: "支持骑兵需要一个能够生产大量剩余马匹的经济系统。如果我们能保证我们贵族阶级的特权，他们不仅会更快乐，而且他们会做很多工作来生产所需的马匹。我们的宫廷弄臣把它说成是保障农奴的服务。"
 iv2_ga_ideagroup_adm_7_2: "国际贵族"
 iv2_ga_ideagroup_adm_7_2_desc: "国际关系错综复杂，需要小心应对。有人认为，惯于与外国人打交道的商人阶级往往精于此道。但他们忽视了一点，那就是贵族们经年累月地建立起来的亲戚关系。在外交活动中，这些宗族关系往往会为我们带来很大的帮助。"
 iv2_ga_ideagroup_adm_7_3: "贵族家庭关系"
 iv2_ga_ideagroup_adm_7_3_desc: "我们与高级贵族的家庭关系将加强我们的统治权。"
 iv2_ga_ideagroup_adm_7_4: "本地贵族"
 iv2_ga_ideagroup_adm_7_4_desc: "贵族知道他们比普通人更优秀，他们会对那些有价值的人忠诚。如果我们确认他们的特权，他们就会记住我们的慷慨，更能抵制外国势力的诱惑。"
 iv2_ga_ideagroup_adm_7_5: "王朝政治"
 iv2_ga_ideagroup_adm_7_5_desc: "我们将不惜一切代价维续我们的王朝。"
 iv2_ga_ideagroup_adm_7_6: "地方民兵"
 iv2_ga_ideagroup_adm_7_6_desc: "我们的贵族在保卫祖国的时候会召集士兵组成民兵。"
 iv2_ga_ideagroup_adm_7_7: "王室集权"
 iv2_ga_ideagroup_adm_7_7_desc: "增加王权将使我们更容易管理国家。"
