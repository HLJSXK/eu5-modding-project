 iv2_ga_ideagroup_adm_21_1: "城市或首都"
 iv2_ga_ideagroup_adm_21_1_desc: "我们的城市变得如此重要，以至于它们是否是首都并不重要。"
 iv2_ga_ideagroup_adm_21_2: "首都城市的吸引力"
 iv2_ga_ideagroup_adm_21_2_desc: "作为权力中心，我们的首都一直吸引着许多移民。"
 iv2_ga_ideagroup_adm_21_3: "金融区"
 iv2_ga_ideagroup_adm_21_3_desc: "得益于我们首都所展现的经济实力与稳定，我们能够持续铸造新币。"
 iv2_ga_ideagroup_adm_21_4: "稳定的首都，稳定的国家"
 iv2_ga_ideagroup_adm_21_4_desc: "如果我们的首都稳定，则整个国家就稳定。"
 iv2_ga_ideagroup_adm_21_5: "建筑工人"
 iv2_ga_ideagroup_adm_21_5_desc: "我们首都的建筑工人可以随时被派往国内其他地区。"
 iv2_ga_ideagroup_adm_21_6: "模范城市"
 iv2_ga_ideagroup_adm_21_6_desc: "许多城市都想效仿我们的首都。"
 iv2_ga_ideagroup_adm_21_7: "大都会"
 iv2_ga_ideagroup_adm_21_7_desc: "我们的首都总有一天会成为世界上最大的城市。"
