 iv2_ideagroup_title_adm_42: "摩尼理念"
 iv2_ga_ideagroup_adm_42_1: "先知的圣训"
 iv2_ga_ideagroup_adm_42_1_desc: "先知摩尼教导我们，每一种宗教都“像一条河流，流向单一的、统一的信仰”。尽管其他宗教的追随者行走在迷途之上，但不应压制他们，而应允许他们自由践行各自所认知的正道。"
 iv2_ga_ideagroup_adm_42_2: "七二主教"
 iv2_ga_ideagroup_adm_42_2_desc: "由摩尼亲自任命的七十二位主教将引领我们的人民。这些主教大多是村中长老、宗教人士以及在各自社群中被公认为先知可信继承者的德高望重之人。让我们重新引介并任命这些主教，使他们能在这黑暗时代服务民众、传播光明。"
 iv2_ga_ideagroup_adm_42_3: "带来光明"
 iv2_ga_ideagroup_adm_42_3_desc: "摩尼教作为一种宗教是非常灵活的。它之所以传播得如此迅速且没有太多的流血事件，原因之一是它能够采用目标人群的做法，文化、传统甚至宗教。通过同化这些习俗，摩尼教看起来更有吸引力，同时鼓励人们皈依。"
 iv2_ga_ideagroup_adm_42_4: "永恒斗争"
 iv2_ga_ideagroup_adm_42_4_desc: "世界处于不断的动荡之中，黑暗和光明的力量在争夺决定我们的命运。虽然我们几乎无法影响这些进程，但可以通过激励和训练民众自卫，确保他们免受邪恶力量侵害。"
 iv2_ga_ideagroup_adm_42_5: "祭祀音乐"
 iv2_ga_ideagroup_adm_42_5_desc: "在摩尼教中，音乐是一种受人尊重的存在，而且经常在仪式中使用。它被认为是来自天堂的回声，这种声音可以净化灵魂，使演奏者和听众都更接近光明"
 iv2_ga_ideagroup_adm_42_6: "重新统一"
 iv2_ga_ideagroup_adm_42_6_desc: "由于极端的敌意，大多数摩尼教徒通常都躲藏起来，从不透露他们的真实信仰，或者在某些情况下，他们在中央宗教权威触及不到的荒凉地区形成了小村落和社区。既然我们已经将摩尼教确立为国教，邀请并安置所有受迫害的信仰兄弟姐妹进入我国将是一个好主意。"
 iv2_ga_ideagroup_adm_42_7: "修建大庙"
 iv2_ga_ideagroup_adm_42_7_desc: "摩尼教徒拥有两类宗教建筑——寺庙与修道院。受其他宗教的深远影响，这些建筑大多兼具学校、图书馆功能，有些还用于集会场所甚至存放画作。当我们提升声望与威望时，我们不应该忘记我们的精神责任，建造一座宏伟的寺庙将向我们的人民和其他摩尼教徒表明，我们一直以来都没有放弃先知的话语，并愿意为这项事业做出贡献。 "
