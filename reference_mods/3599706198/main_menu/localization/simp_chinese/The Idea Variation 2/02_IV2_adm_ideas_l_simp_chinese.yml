 iv2_ideagroup_title_adm_2: "人文理念"
 iv2_ga_ideagroup_adm_2_1: "当地传统"
 iv2_ga_ideagroup_adm_2_1_desc: "管理一个庞大的国家，意味着需要管理很多拥有着自己的习俗和传统的不同民族。通过把这些传统整合到我们官方的法典中，我们可以得到一批幸福又忠诚的子民。"
 iv2_ga_ideagroup_adm_2_2: "文化纽带"
 iv2_ga_ideagroup_adm_2_2_desc: "不同的文化有不同的习俗，出于某种原因，往往会抵制来自上面的改变这些习俗的尝试。我们可以通过将地方领导人纳入我们的政府体系，并让他们以他们满意的方式执行我们的意愿，将这种弱点转化为优势。"
 iv2_ga_ideagroup_adm_2_3: "间接统治"
 iv2_ga_ideagroup_adm_2_3_desc: "有时候，让别人做你想让他们做的事的最好方法就是让他们相信他们是在做自己的选择。这种间接统治制度将减少新获得省份的动乱。"
 iv2_ga_ideagroup_adm_2_4: "人文宽容主义"
 iv2_ga_ideagroup_adm_2_4_desc: "建立一个更宽容的社会，开明地对待不同社会思潮与宗教信仰，大幅度地提升国家稳定程度。"
 iv2_ga_ideagroup_adm_2_5: "文化纽带"
 iv2_ga_ideagroup_adm_2_5_desc: "不同的文化有不同的习俗，出于某种原因，往往会抵制来自上面的改变这些习俗的尝试。我们可以通过将地方领导人纳入我们的政府体系，并让他们以他们满意的方式执行我们的意愿，将这种弱点转化为优势。"
 iv2_ga_ideagroup_adm_2_6: "宗教宽容"
 iv2_ga_ideagroup_adm_2_6_desc: "通过对少数宗教群体采取更加宽容的看法，可以极大地增加我们的宗教团结程度。"
 iv2_ga_ideagroup_adm_2_7: "仁慈之心"
 iv2_ga_ideagroup_adm_2_7_desc: "我们的国家是宽容和开明的堡垒。通过确保所有其他国家都知道这一点，我们可以促进更好的对外关系。"
