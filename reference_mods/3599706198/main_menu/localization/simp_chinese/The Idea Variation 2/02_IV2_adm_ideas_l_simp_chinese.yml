 iv2_ideagroup_title_adm_35: "清洁派理念"
 iv2_ga_ideagroup_adm_35_1: "女性平等"
 iv2_ga_ideagroup_adm_35_1_desc: "清洁派极大地给予了妇女独立行动的机会，因为妇女既是一般信徒，也是纯全信徒。纯全信徒有权主持卡特里派圣礼。卡特里派认为，一个人将反复转世，直到他主动承诺放弃转生物质世界。这意味着一个男人可以转世为女人，反之亦然，从而使性别完全失去意义"
 iv2_ga_ideagroup_adm_35_2: "纯洁之人"
 iv2_ga_ideagroup_adm_35_2_desc: "戒除所有动物性食物，有时鱼不包含在内，是纯全信徒的要求。纯全信徒应避免吃任何性繁殖的副产品"
 iv2_ga_ideagroup_adm_35_3: "防御至上"
 iv2_ga_ideagroup_adm_35_3_desc: "由于清洁派教徒不喜杀人，他们筑起巨大的坚壁来保护自己"
 iv2_ga_ideagroup_adm_35_4: "对耶稣基督的研究"
 iv2_ga_ideagroup_adm_35_4_desc: "清洁派的思想来源于其他形式的基督教，而这些基督教又来源于其他文化"
 iv2_ga_ideagroup_adm_35_5: "性别合作"
 iv2_ga_ideagroup_adm_35_5_desc: "男人和女人一起织布，互相做工。"
 iv2_ga_ideagroup_adm_35_6: "和平的人民"
 iv2_ga_ideagroup_adm_35_6_desc: "清洁派教徒憎恶杀戮。战争和死刑也应受到谴责。"
 iv2_ga_ideagroup_adm_35_7: "教育穷人"
 iv2_ga_ideagroup_adm_35_7_desc: "清洁派的人希望通过教育，将人民指示通往天堂之路。"
