 iv2_ideagroup_title_adm_34: "神道理念"
 iv2_ga_ideagroup_adm_34_1: "八幡神"
 iv2_ga_ideagroup_adm_34_1_desc: "他也被称为八幡神或八幡之神，是战争之神，是日本及其人民的神圣保护者。他最初是一位农业神，后来成为源氏家族的守护神。他的象征性动物和信使是鸽子。"
 iv2_ga_ideagroup_adm_34_2: "稻荷大神"
 iv2_ga_ideagroup_adm_34_2_desc: "稻米和生育的神或女神。其信使和象征性动物是狐狸。"
 iv2_ga_ideagroup_adm_34_3: "思兼神"
 iv2_ga_ideagroup_adm_34_3_desc: "思兼神，又称常世思金神，是智慧和智力之神，他总是被要求'思考'，并在天神的审议中提供良好的建议"
 iv2_ga_ideagroup_adm_34_4: "伊邪那岐"
 iv2_ga_ideagroup_adm_34_4_desc: "伊邪那岐之神是日本神话和神道中七代神所生的神灵，在粗略翻译的《古事记》中也被称为“被邀请的男人”或伊邪那岐命。它也被读作伊邪那岐大神。"
 iv2_ga_ideagroup_adm_34_5: "素盏呜尊"
 iv2_ga_ideagroup_adm_34_5_desc: "别名有须佐之男、素戋呜尊和素戔呜尊。据说也被称为“布都志”。祂是风暴之神，在某些情况下也是海洋之神，日本神话广泛记载了他与天照大神之间的“兄弟之争”。素戋呜尊还负责斩杀了怪物八岐大蛇，并随后发现了草薙剑。"
 iv2_ga_ideagroup_adm_34_6: "天钿女命"
 iv2_ga_ideagroup_adm_34_6_desc: "她通常被称为钿女，是黎明和狂欢的女神，直接引起了神道教中著名的'天照大神躲入天岩户'。她也被认为是'伟大的劝说者'和'暴风雨之神'"
 iv2_ga_ideagroup_adm_34_7: "琼琼杵尊"
 iv2_ga_ideagroup_adm_34_7_desc: "琼琼杵尊通常简称为Ninigi(ニニギ)，他是天照之神的孙子。他的曾孙是神倭伊波礼琵，后来成为神武天皇，日本的第一位天皇。"
