 iv2_ga_ideagroup_adm_40_1: "古老故事"
 iv2_ga_ideagroup_adm_40_1_desc: "我们可以用关于我们的神的古老故事来打动大家。"
 iv2_ga_ideagroup_adm_40_2: "家中鬼魂"
 iv2_ga_ideagroup_adm_40_2_desc: "每座房子都有一个鬼魂看守，在战斗中保护我们的人"
 iv2_ga_ideagroup_adm_40_3: "故事讲述者"
