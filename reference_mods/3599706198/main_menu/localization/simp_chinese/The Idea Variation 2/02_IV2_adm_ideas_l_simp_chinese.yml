 iv2_ga_ideagroup_adm_48_2: "生命之路"
 iv2_ga_ideagroup_adm_48_2_desc: "玛雅宗教中的 “生命之路”是一项艰难的任务。据说旅行者要从东到西旅行，只有在死亡时才能完成他的旅程。"
