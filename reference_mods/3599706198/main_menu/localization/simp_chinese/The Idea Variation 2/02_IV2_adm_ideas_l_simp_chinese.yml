 iv2_ideagroup_title_adm_8: "共和理念"
 iv2_ga_ideagroup_adm_8_1: "罗马历史"
 iv2_ga_ideagroup_adm_8_1_desc: "通过研究罗马历史，我们可以学习他们管理国家和迅速征服并维护新土地的能力"
 iv2_ga_ideagroup_adm_8_2: "解放农奴"
 iv2_ga_ideagroup_adm_8_2_desc: "罗马的历史告诉我们，由自由公民组成的军队在战斗意志上会远远胜过被强制拉上战场的乌合之众。因此，我们有必要赐予农民们以自由，这样他们将在战场上誓死保卫自己的自由。"
 iv2_ga_ideagroup_adm_8_3: "人权法案"
 iv2_ga_ideagroup_adm_8_3_desc: "使我们的国民享有各项基本权利，显著降低发生内乱的几率。"
 iv2_ga_ideagroup_adm_8_4: "共和传统"
 iv2_ga_ideagroup_adm_8_4_desc: "作为一个历史悠久的共和国，我们的政府将更容易面对和承受挑战。"
 iv2_ga_ideagroup_adm_8_5: "自由臣民"
 iv2_ga_ideagroup_adm_8_5_desc: "尽管对于奴仆们来说一顿暴打往往会非常合适，但这并不能有效地令他们勤奋工作。一些自然哲学家们偶然发现，提高人们的工作积极性会带来非常丰厚的回报。如果我们能够用征收实物来取代货币地租的话，我们的农民们便会更加积极地生产出更多的作物了。"
 iv2_ga_ideagroup_adm_8_6: "外交使团"
 iv2_ga_ideagroup_adm_8_6_desc: "我们需要通过外交博弈来确保我们的自由。因为我们的生活方式对邻国来说既是机遇也是威胁。"
 iv2_ga_ideagroup_adm_8_7: "解放"
 iv2_ga_ideagroup_adm_8_7_desc: "长期以来，只有那些我们认为值得信赖的人才有权拥有土地。如果我们废除这些限制，那么土地所有关系便会得到巩固。由此，那些选择从军打仗的人们便可以周期性地投入到生产活动中去了。"
