 iv2_ideagroup_title_adm_46: "圣公理念"
 iv2_ga_ideagroup_adm_46_1: "传教士学校"
 iv2_ga_ideagroup_adm_46_1_desc: "虽然不乏准备出去传播真正信仰的人，但大多数人都是失败居多。培训传教士的专业学校将确保我们有更多的人不仅会尝试传播信仰，而且会取得成功。"
 iv2_ga_ideagroup_adm_46_2: "教堂除籍"
 iv2_ga_ideagroup_adm_46_2_desc: "我们将解散已经腐化不堪的一些教堂，并将其财富用于更好的用途"
 iv2_ga_ideagroup_adm_46_3: "神圣事务至上"
 iv2_ga_ideagroup_adm_46_3_desc: "最重要的是，我们要把我们的国家和边界从纠缠我们的土地的异教徒中清除出去。"
 iv2_ga_ideagroup_adm_46_4: "镇压动乱"
 iv2_ga_ideagroup_adm_46_4_desc: "我们对宗教动乱已经如此熟悉，以至于没有它我们反而会不习惯"
 iv2_ga_ideagroup_adm_46_5: "移民热潮"
 iv2_ga_ideagroup_adm_46_5_desc: "每次宗教动乱，最终都会引起移民潮"
 iv2_ga_ideagroup_adm_46_6: "进步"
 iv2_ga_ideagroup_adm_46_6_desc: "我们已将倒退的时代抛之脑后，我们要开启一个全新的时代"
 iv2_ga_ideagroup_adm_46_7: "被赐福的大炮"
 iv2_ga_ideagroup_adm_46_7_desc: "由于我们的科技进步，我们也提高了我们大炮的威力"
