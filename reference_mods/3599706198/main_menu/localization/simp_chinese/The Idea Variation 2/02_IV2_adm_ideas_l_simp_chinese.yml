 iv2_ideagroup_title_adm_17: "行政理念"
 iv2_ga_ideagroup_adm_17_1: "行政效率"
 iv2_ga_ideagroup_adm_17_1_desc: "任何政府最重要的部分都是获得正确的建议。当涉及到顾问时，我们必须确保我们尽可能地包容，这样我们就可以最大限度地增加不同观点的数量。"
 iv2_ga_ideagroup_adm_17_2: "结构"
 iv2_ga_ideagroup_adm_17_2_desc: "国家结构将使我们能够更迅速地应对危机。"
 iv2_ga_ideagroup_adm_17_3: "高效流程"
 iv2_ga_ideagroup_adm_17_3_desc: "通过提高流程效率，我们也能更迅速地将新流程融入体系。"
 iv2_ga_ideagroup_adm_17_4: "反应体系"
 iv2_ga_ideagroup_adm_17_4_desc: "每个国家都会遇到麻烦。不满意和被驱逐的人会谋反，如果我们建立一个行政机构来镇压这些颠覆活动，我们将能从这些麻烦中尽快脱身并恢复过来。"
 iv2_ga_ideagroup_adm_17_5: "簿记系统"
 iv2_ga_ideagroup_adm_17_5_desc: "当资金短缺时，我们不得不借钱。债主通常都会担心别人会不会还钱。为了留下清白的记录，我们最好确保每一笔债务都清偿了，这样可以让我们通过谈判来降低一些利息。"
 iv2_ga_ideagroup_adm_17_6: "中央集权"
 iv2_ga_ideagroup_adm_17_6_desc: "如果对整个国家采取中央集权统治，我们将会很容易地将中央的理念与计划贯彻至全国各地。"
 iv2_ga_ideagroup_adm_17_7: "战时内阁"
 iv2_ga_ideagroup_adm_17_7_desc: "羸弱就要挨打，战争的压力能严重破坏一个国家的统治力。在战争期间，只要确保战争的主要玩家都在忙着打仗，我们就能独善其身。"
