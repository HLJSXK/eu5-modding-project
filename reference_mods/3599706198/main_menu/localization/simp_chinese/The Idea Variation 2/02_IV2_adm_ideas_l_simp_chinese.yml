 iv2_ideagroup_title_adm_51: "什叶派理念"
 iv2_ga_ideagroup_adm_51_1: "伊玛目"
 iv2_ga_ideagroup_adm_51_1_desc: "第一任伊玛目必须是穆罕默德的直系后裔。"
 iv2_ga_ideagroup_adm_51_2: "卡尔巴拉之战"
 iv2_ga_ideagroup_adm_51_2_desc: "卡尔巴拉之战是什叶派历史上的一个里程碑，因为库夫兰人背叛了侯赛因。"
 iv2_ga_ideagroup_adm_51_3: "圣裔"
 iv2_ga_ideagroup_adm_51_3_desc: "谁能算得上是先知穆罕默德的家人，因宗教流派的不同而不同。然而，倭马亚王朝和阿巴斯王朝都声称他们是先知的后裔。"
 iv2_ga_ideagroup_adm_51_4: "伊斯玛仪"
 iv2_ga_ideagroup_adm_51_4_desc: "只有第一任伊玛目的判断是公认而无悬念的。"
 iv2_ga_ideagroup_adm_51_5: "宗教学派传统"
 iv2_ga_ideagroup_adm_51_5_desc: "什叶派信仰有许多宗教学派，增加了宗教内部的多样性。"
 iv2_ga_ideagroup_adm_51_6: "吉哈德"
 iv2_ga_ideagroup_adm_51_6_desc: "什叶派信仰并不排斥“圣战”。"
 iv2_ga_ideagroup_adm_51_7: "什叶之矛"
 iv2_ga_ideagroup_adm_51_7_desc: "什叶派要重夺对异端的优势。"
