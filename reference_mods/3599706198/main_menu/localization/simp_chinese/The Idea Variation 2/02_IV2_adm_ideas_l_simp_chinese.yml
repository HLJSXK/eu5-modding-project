l_simp_chinese:
 iv2_ideagroup_title_adm_1: "创新理念"
 iv2_ga_ideagroup_adm_1_1: "赞助艺术"
 iv2_ga_ideagroup_adm_1_1_desc: "我们从此将开始追求建立文化昌盛的社会，我们的艺术巨作将万古流传，成为这一世代的人间奇迹。"
 iv2_ga_ideagroup_adm_1_2: "实用主义"
 iv2_ga_ideagroup_adm_1_2_desc: "太多的国家让对国家的看法影响了他们的政策。这是愚蠢的——如果雇佣军更适合我们的需要，我们将使用他们，而不是投资于昂贵的常备军。"
 iv2_ga_ideagroup_adm_1_3: "科学革命"
 iv2_ga_ideagroup_adm_1_3_desc: "我们应该使科技水平获得长足进步，促进社会与经济的变革，全面进入工业化时代。"
 iv2_ga_ideagroup_adm_1_4: "知识传承"
 iv2_ga_ideagroup_adm_1_4_desc: "经验的传承是每个国家的头等大事。我们需要建立严格的教导制度，以保证老兵们能够将他们的战斗知识完备地交到新兵手中。"
 iv2_ga_ideagroup_adm_1_5: "早期宣传"
 iv2_ga_ideagroup_adm_1_5_desc: "确保民众的支持，我们能够建立一个更加稳定的国家。"
 iv2_ga_ideagroup_adm_1_6: "新方法"
 iv2_ga_ideagroup_adm_1_6_desc: "我们将开辟新天地，让每个人的生活变得更美好。"
 iv2_ga_ideagroup_adm_1_7: "创新度"
 iv2_ga_ideagroup_adm_1_7_desc: "我们将鼓励创新思维与进步。"
