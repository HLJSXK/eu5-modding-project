 iv2_ga_ideagroup_adm_16_1: "资本主义"
 iv2_ga_ideagroup_adm_16_1_desc: "通过实施更加资本主义的经济我们将使我们现代化。"
 iv2_ga_ideagroup_adm_16_2: "信托借贷"
