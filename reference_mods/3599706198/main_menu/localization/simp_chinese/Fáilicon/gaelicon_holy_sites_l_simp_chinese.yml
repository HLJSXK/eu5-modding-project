 celtic_religion: "凯尔特多神教"
 celtic_religion_desc: "凯尔特多神教信仰以三曲腿符号为核心；“涅姆·格拉斯，缪尔·马斯，塔兰·凯（蔚蓝天空，美丽大海，现世土地）”。他们的“神灵”被称为仙灵，早在很久以前便被米列希安人驱逐至地下。"
