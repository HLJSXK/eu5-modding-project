 mannanan_god: "曼南南"
 dagda_god_desc: "达格达，“善神”；欧丘·奥拉塞尔，“马群之大父”；鲁阿德·罗费萨，“通晓万物的红发之神”；达格达·唐，“主宰达格达”。从其称号“善神”、“马群之大父”及“通晓万物的红发之神”可知，他是仙灵的领袖，但不同于努阿达作为国王的统治形式。据《占领仙堡》（提及昂格斯赢得博因宫之战）记载，他是五谷与乳业的守护者；而根据《埃坦求爱记》所述，他执掌天象与收成。达格达可被视为凯尔特神话中的万物之父——他是智慧的祖辈，也是达努神族的第一位德鲁伊。"
 nuada_god_desc: "达努神族之王，尤其在与弗莫尔人战争期间。如同北欧神话中的提尔，他的手被邪恶势力斩断，被迫装上银制义手。正是因这残缺之躯，他将王位输给了迫害达努神族的弗莫尔人布瑞斯。当鲁格现身时，祂重振了达努神族的士气，而此时努阿达已获新生臂膀。这位努阿达可被视为王者、战争与复仇的守护神。"
 lugh_god_desc: "鲁格节是第一次收获的庆典；需谨记，当达努神族赢得第二次柱塔平原之战时，正是鲁格从布瑞斯手中夺得了农耕的奥秘；正是在这位多才多艺的神族英雄的努力下，人类才得以生存繁衍、播种耕作。他更是传奇英雄库丘林的生父！由此可见，鲁格既是战士的守护者，也是农耕与艺术的庇护神。"
 brigid_god_desc: "布里吉德实为三胞胎姐妹，都是达格达的女儿，同叫一个名字：分别司掌诗歌、锻造与疗愈。她的庆典日称为圣烛节，用以庆贺春天的到来。后来爱尔兰的基督徒很可能将她重塑为“圣布里吉德”。布里吉德可被视为智慧、技艺与治愈的守护神。"
 morrigan_god_desc: "莫莉甘或许是仙灵中最难以理解的一位，她在凯尔特文学中拥有诸多艺能者化身（如芭德、玛查、阿南、莫瑞古、斯卡哈、梅芙等）。唯有获得她的垂青，战士方能成为君主，军队才能凯旋。她是爱尔兰女神埃尔茹的姊妹；唯有通过她的调停，艾琳，即爱尔兰，才能被各方势力所夺取。她是“津渡的浣洗者”；她是“伟大牝马女王”；她是“万物之母”。简言之，她可被视作命运、生命乃至这片土地本身的守护神。"
 mannanan_god_desc: "“曼南南”一名很可能意为“来自马恩岛的他”。这一称谓或源于马恩岛，抑或该岛因他得名。而其姓氏“麦克·利尔”则表明他是名副其实的“海洋之子”。作为居住于乐园“苹果原野“埃梅‑阿布拉赫的仙灵领主，曼南南曾在抚育之光中培养光之神鲁格，更将科马克·麦克·艾尔特引入神域授予统治权之杯！因而可将其视为海洋、仙灵与神器力量的守护者。"
 worship_eriu_god: "埃尔茹"
 worship_eriu_god_desc: "别让埃尔茹失望！"
 eriu_god: "埃尔茹"
 eriu_god_desc: "埃尔茹和她的两个姐妹——福特拉与班巴，是这片岛屿本身的仙灵，因此她们的名字都是爱尔兰的诗意称谓，其中“”是官方名称。直至今日，爱尔兰语的岛名仍是艾尔！作为爱尔兰至高王的埃尔茹，在《幻影盛宴》中将主权之杯授予爱尔兰第一位位至高王康恩。埃留、埃尔茹与班巴也正是三位技艺之神莫莉甘——即芭德布、玛查与安娜恩——的姐妹。埃尔茹可被视为主权、家庭与家园的守护者。"