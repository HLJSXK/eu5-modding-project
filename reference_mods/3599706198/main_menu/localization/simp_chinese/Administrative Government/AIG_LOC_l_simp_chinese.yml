 rural_holdfast: "边境哨站"
 rural_holdfast_desc: "边境哨站是国家在已开发疆域边缘建立的第一道防线。这类建筑坐落于偏远且往往未经开发的地区，兼具军事驻防与有限的民用设施功能，使国家得以超越其传统疆域展示统治力量。"
