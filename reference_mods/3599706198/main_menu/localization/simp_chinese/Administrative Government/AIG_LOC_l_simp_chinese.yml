l_simp_chinese:
 admin_imperial: "行政制"
 admin_imperial_desc: "行政君主制政府是基于不可分割的个人主权的原则组织起来的，在这一[government_type|e]下，[ruler|e]是精英阶层的首领和代表，并由众多官僚辅佐。。一般情况下，统治者终身执政，并且[heir|e]沿$game_concept_monarch$的[dynasty|e]世袭产生。\n\n$game_concept_monarchs$可以通过[royal_marriages|e]缔结[alliances|e]，并能进一步通过[personal_unions|e]继承其他[countries|e]。然而，继承问题是君主制下的一个难题，君主制国家时常进入[regencies|e]状态，或是受到其他$game_concept_dynasties$王朝的影响。"
 admin_imperial_de_jure_law: "“法理”法"
 admin_imperial_de_jure_law_desc: "这些是组织我国社会的法律。"
 admin_imperial_by_tradition: "传统法"
 admin_imperial_by_tradition_desc: "习惯法在我国广为人知，并得到普遍实行。著名的中世纪习俗汇编包括英格兰的#italic 《论英格兰的法律和习惯》#!、德国北部的#italic 《萨克森之鉴》#!或加泰罗尼亚的#italic 《巴塞罗那惯用法》#!。"
 admin_imperial_by_blood: "血统法"
 admin_imperial_by_blood_desc: "我国的法律反映了我们人民的本质和我们统治者的至高权威，正如那句著名格言#italic 国王是自己王国的皇帝#!所表达的那样。"
 admin_imperial_by_edict: "敕令法"
 admin_imperial_by_edict_desc: "我国法律体现了国家作为君主延伸的本质，统治者乃由上帝亲自指定。"
 admin_imperial_levy_law: "征召兵法"
 admin_imperial_levy_law_desc: "我们的军队主要由从我国特定[estates|e]招募的征召兵组成，他们会为我们作战，直到我们解散他们。"
 admin_imperial_all_cultures: "包容性征召"
 admin_imperial_all_cultures_desc: "我们的人民在战斗召唤时将共同承担负担，无论其[culture|e]如何。"
 admin_imperial_noble_levies: "贵族征召"
 admin_imperial_noble_levies_desc: "我国的[ShowEstateTypeName('nobles_estate')]将引领我们战斗的召唤，因为他们是最有意愿、最有准备参与战争的人。"
 admin_imperial_peasant_levies: "农民征召"
 admin_imperial_peasant_levies_desc: "[ShowEstateTypeName('peasants_estate')]是我们征召兵力的主要来源，因此我们必须在必要时尽可能扩大招募规模。"
 admin_imperial_militarised_merchants: "城镇征召"
 admin_imperial_militarised_merchants_desc: "[ShowEstateTypeName('burghers_estate')]在我们的征召兵中占相当大比例，因此征召行动更为迅速，且他们的装备普遍较好。"
 admin_imperial_militarised_farmers: "军事化农民"
 admin_imperial_militarised_farmers_desc: "国家为一部分[ShowEstateTypeName('peasants_estate')]提供补贴，使他们在和平时期能通过定期操练和维护装备来保持家族的“尚武传统”。"
 admin_imperial_court_customs_law: "皇家宫廷习俗"
 admin_imperial_court_customs_law_desc: "宫廷的传统和文化在行政君主制的稳定中起着重要作用。这些习俗会确保权力从统治者到继承人的平稳交接，并大幅限制宫廷阴谋。"
 admin_imperial_aristocratic_court_policy: "贵族宫廷"
 admin_imperial_aristocratic_court_policy_desc: "[ShowEstateTypeName('nobles_estate')]是我们政府不可分割的一部分。为了更好地掌控、奖赏这些古老的$nobles_estate$家族并获得他们的支持，需要将贵族，君主和宫廷更紧密地联系在一起。"
 admin_imperial_balanced_court_policy: "平衡宫廷"
 admin_imperial_balanced_court_policy_desc: "宫廷是国家和文化的中心。行政、外交和军事行动与国家的文化和内部政治一样，都是宫廷的焦点。"
 admin_imperial_court_of_culture_policy: "文化宫廷"
 admin_imperial_court_of_culture_policy_desc: "宫廷首先是皇室的居所，其次是文化和声望的中心。政府和行政事务与宫廷生活分开。"
 admin_imperial_itinerant_court_policy: "流动宫廷"
 admin_imperial_itinerant_court_policy_desc: "为有效治理广袤疆域，朝廷并非固守一处，而是巡行四方，在各地直接处理政务。"
 admin_imperial_harem_policy: "王室后宫"
 admin_imperial_harem_policy_desc: "我们宫廷生活的绝大部分都是与世隔绝，且男女有别的。以深宫为中心，卑微的奴仆和嫔妃只能生活在这一圈子内并争抢对统治者的影响力。"
 admin_imperial_power_law: "行政权力"
 admin_imperial_power_law_desc: "与其他形式的政府一样，共和国不仅需要制定决策，更需将决策付诸实践。为此，必须建立一套行政执行机制，使其权力触角能够延伸至国土的每一个角落，即便是最偏远的地区也不例外。"
 admin_imperial_broad_executive_power_policy: "扩张行政权力"
 admin_imperial_broad_executive_power_policy_desc: "随着国家的发展，我们更需要快速响应和行动。而实现这一目标的根本在于，必须赋予行政部门足够的权力，使其能够不受阻碍地采取必要措施。"
 admin_imperial_devolution_of_powers_policy: "权力下放"
 admin_imperial_devolution_of_powers_policy_desc: "没有任何个人能够治理我们如此复杂的国家。在维持中央集权体制的前提下，将部分权力与职责下放给地方政府，才是适应我们日益发展的国家需求的最佳途径。"
 admin_imperial_absolute_presidential_power_policy: "君主极权"
 admin_imperial_absolute_presidential_power_policy_desc: "君主的职责，在于统领各阶层走向繁荣，其主导地位不容置疑，仅可接受建言。"
 admin_imperial_new_men_policy: "政治素人"
 admin_imperial_new_men_policy_desc: "长期掌权者不可信赖。如今，我们的行政体制将致力于提拔新官僚——那些双手未曾沾染腐败与肮脏交易的人。"
 bureaucratic_offices: "官僚机构"
 bureaucratic_offices_desc: "官僚机构代表国家行政效率的核心，是治理与公共行政的中心枢纽。"
 rural_bureaucratic_offices: "乡村官僚机构"
 rural_bureaucratic_offices_desc: "地方政府机构，它负责制定地方条例并提供指导，作为官僚国家的具体执行机构。无论是出于畏惧还是敬畏中央朝廷的威严影响，这都是普通民众最为熟悉的层面。"
 bureaucratic_offices_maintenance: "官僚机构维护费"
