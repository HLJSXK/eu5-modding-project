l_simp_chinese:
 rule_rg_goods_distribution_rule: "资源分布"
 setting_rg_rule_option_vanilla: "史实（默认）"
 setting_rg_rule_option_vanilla_desc: "资源将严格按照史实出现。"
 setting_rg_rule_option_plausible: "合理随机"
 setting_rg_rule_option_plausible_desc: "资源分布随机生成，但遵循气候、植被与地域逻辑（例如美洲地区会出现马铃薯）。"
 setting_rg_rule_option_chaos: "完全混乱"
 setting_rg_rule_option_chaos_desc: "资源是完全随机分配的。北极有葡萄酒，沙漠里有野兽皮革！"
 randomgoodsModSituation_desc: "本模组在游戏开始时重新分配所有商品，分配方式取决于你在开始新游戏前选择的游戏规则。共有三种选项：\n1、史实模式——沿用EU5的历史文件\n2、合理随机——基于现实世界逻辑进行随机分配（例如土豆仅出现在美洲）\n3、完全混乱——一切皆有可能。这是趣味选项。"