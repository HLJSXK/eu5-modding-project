l_simp_chinese:
 flavor_bul.1.title: "特尔诺沃的继承者"
 flavor_bul.1.desc: "旧帝国的记忆并未从我们的宫廷中消逝。贵族、教士与军人皆以保存特尔诺沃的遗产自居，却各自要求不同的未来。若要在巴尔干的风暴中屹立不倒，我们必须决定权柄究竟归于君权还是封臣。"
 flavor_bul.1.historical_info: "十三世纪初，伊凡·阿森二世统治下的鼎盛时期过后，保加利亚进入了长期的分裂与家族内斗。到1337年，统治宗族正统性仍依赖于对特尔诺沃和阿森王朝家族的宣称，但实际权力取决于各大贵族家族、教会与军事指挥官之间的制衡。"
 flavor_bul.1.a: "高举阿森家族的荣光旗帜。"
 flavor_bul.1.b: "与贵族共治！"
 flavor_bul.2.title: "特尔诺沃文学流派"
 flavor_bul.2.desc: "僧侣与学者齐聚特尔诺沃，精研礼仪语言，抄录典籍，塑造着超越国界的学术传统。资助既能强化信仰与威望，却也需要耗费资源与政治。"
 flavor_bul.2.historical_info: "特尔诺沃文学学派在十四世纪围绕牧首埃夫蒂米蓬勃发展，成为东正教学术与文本改革的重要中心，其影响力远播保加利亚之外的斯拉夫宗教文学领域。"
 flavor_bul.2.a: "资助流派及其学者。"
 flavor_bul.2.b: "继续在更严格的教会监督下学习。"
 flavor_bul.3.title: "塔尔诺沃的阴影"
 flavor_bul.3.desc: "安纳托利亚的势力日益壮大，正以不断增强的军队跨越边境进入巴尔干地区。特尔诺沃宫廷内部就加强防御、外交策略与必要牺牲争论不休。无论是凭借刀剑还是审慎妥协，我们都必须抉择如何应对来自南方的威胁。"
 flavor_bul.3.historical_info: "十四世纪末，奥斯曼帝国向巴尔干半岛扩张，使保加利亚诸国承受巨大压力。这场较量并非由单一战役决定，而是通过反复的征战、围城以及变幻莫测的联盟关系，逐渐耗尽了当地政权的力量。"
 flavor_bul.3.a: "动员起来，准备迎接一场艰苦的战争。"
 flavor_bul.3.b: "通过审慎的条件来保全领地。"
 flavor_bul.4.title: "维丁的最后一顶王冠"
 flavor_bul.4.desc: "权力未定，领地动荡，维丁既是避难所，也是集结地。有人主张在多瑙河畔背水一战；有人则要求将宫廷与行政机构战略转移，以求存续。"
 flavor_bul.4.historical_info: "在中世纪保加利亚国家存在的最后阶段，维丁和特尔诺沃成为各自独立的权力中心。在奥斯曼帝国完全巩固该区域统治之前，维丁王国作为保加利亚最后的政治实体之一持续存在。"
 flavor_bul.4.a: "控制维丁并防守河流。"
 flavor_bul.4.b: "将宫廷迁至斯雷代茨。"
 flavor_bul.4.c: "巩固我们仍掌控的区域。"
 flavor_bul.5.title: "多瑙河边境将领"
 flavor_bul.5.desc: "经验丰富的边境指挥官提议迅速招募人手，以加强河流防线的防御。他们的方法虽有效却粗鲁，赋予他们权力可能会强化贵族军事网络，从而损害君权利益。"
 flavor_bul.5.a: "授予他们广泛的指挥权。"
 flavor_bul.5.b: "对指挥官们要严加看管。"
 flavor_bul.6.title: "瓦尔纳的船队"
 flavor_bul.6.desc: "瓦尔纳的商人请求为黑海护航船队提供护卫和港口担保。保护可以随着时间的推移使城市富裕起来，而更重的税收虽然现在可以充实国库，但可能会减缓贸易发展。"
 flavor_bul.6.a: "护送商船并确保航线安全。"
 flavor_bul.6.b: "趁市场行情坚挺，对商船队征税。"
 flavor_bul.7.title: "波雅尔派系纷争"
 flavor_bul.7.desc: "相互竞争的波雅尔家族主导着地方政治，如今更在宫廷中争取自己的利益。支持某一联盟或可换取短期支持，但每一次让步都将以王室权威的削弱为代价。"
 flavor_bul.7.a: "与最强的贵族和解。"
 flavor_bul.7.b: "重申王室权威。"
 flavor_bul.8.title: "修道院土地授权"
 flavor_bul.8.desc: "东正教修道院请求获得新的土地和财政特权，以维持学校、朝圣者住所和手稿工坊的运转。它们的影响力有助于稳定社会，尽管王室收入将因此减少。"
 flavor_bul.8.a: "将土地赐予修道院。"
 flavor_bul.8.b: "让这些土地归于王室之下。"
 flavor_bul.9.title: "罗多彼山口"
 flavor_bul.9.desc: "普罗夫迪夫附近山口的控制权仍不稳定。我们可以出资修建道路并派驻驻军以加强安全，或者将这一负担委托给地方权贵，接受较为松散的控制。"
 flavor_bul.9.a: "投资道路、巡逻和检查站。"
 flavor_bul.9.b: "将关隘交由当地豪强管理。"
 flavor_bul.10.title: "南方难民"
 flavor_bul.10.desc: "邻国的战乱与压迫迫使众多家庭北迁。接纳他们虽有望在将来获得劳动力和忠诚，但眼前的安置开销将给国库带来负担。"
 flavor_bul.10.a: "开放边境并安置他们。"
 flavor_bul.10.b: "暂时关闭边境。"
 flavor_bul.11.title: "特尔诺沃法律辩论"
 flavor_bul.11.desc: "法学家、教士与贵族们正激烈辩论，王国应当沿袭地方习惯法，还是强化王室直接编纂的成文法。这项抉择将决定未来数代人的社会义务与政治等级秩序。"
 flavor_bul.11.a: "保留习惯法与阶层权利。"
 flavor_bul.11.b: "以王室统一法律。"
 flavor_bul.12.title: "黑海造船匠"
 flavor_bul.12.desc: "瓦尔纳的造船大师们请求国家支持，他们声称更强大的造船厂将能拓展贸易并保障海岸安全。而另一些人则坚持认为，这些资源用于陆军建设更为妥当。"
 flavor_bul.12.a: "资助造船厂。"
 flavor_bul.12.b: "优先考虑陆军"
 flavor_bul.13.title: "来自奥斯曼宫廷的压力"
 flavor_bul.13.desc: "奥斯曼索要贡品、要求顺从，至少也要我们保持表面上的克制。有顾问主张暂且妥协以换取时间；也有人不顾风险，要求采取更强硬的姿态。"
 flavor_bul.13.a: "趁我们重建之际，购买和平。"
 flavor_bul.13.b: "拒绝并准备承担后果。"
 flavor_bul.14.title: "巴尔干要塞"
 flavor_bul.14.desc: "我们的战略家提议建立一个以多瑙河和内陆要塞为支点的协同防御体系。构建这一网络将使保加利亚成为堡垒国家，但这需要长期的投入和严明的指挥。"
 flavor_bul.14.historical_info: "保加利亚在中世纪及近代早期的战略地位，使其防御工事成为国家存续的关键。多瑙河沿岸与巴尔干内陆的要塞，曾多次作为抵御入侵的屏障和复兴的基地。"
 flavor_bul.14.a: "打造一个真正的巴尔干堡垒体系。"
 flavor_bul.14.b: "采用较为宽松的防御策略。"
 flavor_bul.15.title: "文学院的复兴"
 flavor_bul.15.desc: "作家、教师与神职人员寻求资助以复兴保加利亚学术，为教会和国家创作新典籍。文化复兴虽能强化民族认同，却可能与紧迫的行政需求产生资源竞争。"
 flavor_bul.15.historical_info: "自十六世纪起，尽管政治环境艰难，但保加利亚的宗教与文学生活仍通过修道院和地方自发活动得以延续。这些网络为后来的文化与民族复兴奠定了基础。"
 flavor_bul.15.a: "赞助学者和缮写室。"
 flavor_bul.15.b: "将人才引入国家行政管理。"
 flavor_bul.16.title: "边疆海杜克"
 flavor_bul.16.desc: "熟悉山林地形的武装团伙提供非正规作战服务。他们能有效袭扰敌军，但过度依赖这些力量可能加剧战时混乱。"
 flavor_bul.16.a: "将其用作非正规辅助部队。"
 flavor_bul.16.b: "解除他们的武装并予以镇压。"
 flavor_bul.17.title: "斯雷代茨币制改革"
 flavor_bul.17.desc: "斯雷代茨的财政官员提出两条路径：一是通过降低铸币标准来增加短期流动性，二是以财政紧缩为代价维持硬通货体系。"
 flavor_bul.17.a: "降低货币成色以获取即时资金。"
 flavor_bul.17.b: "保持严格标准。"
 flavor_bul.18.title: "普罗夫迪夫的行会特权"
 flavor_bul.18.desc: "普罗夫迪夫的手工业行会要求获得特许、税收减免和法律自治权。他们的繁荣或许能为城市带来财富，但特权的扩张将削弱中央监管。"
 flavor_bul.18.a: "授予行会广泛的特权。"
 flavor_bul.18.b: "将行会置于王室监管之下。"
 flavor_bul.19.title: "多瑙河定居计划"
 flavor_bul.19.desc: "官员提议在人口稀少的北部地区实施计划性定居。补贴性再安置政策或能及时稳定边疆，而更严格的包税制则能更快增加财政收入。"
 flavor_bul.19.a: "资金结算与土地开垦。"
 flavor_bul.19.b: "优先征税。"
 flavor_bul.20.title: "奇普罗夫齐的记忆"
 flavor_bul.20.desc: "在西北地区，抵抗与殉难的记忆依然塑造着当地政治格局。退伍军人与教士力主积极支持反王室网络，而温和派则警告公开对抗可能令该省份遭受毁灭性打击。"
 flavor_bul.20.historical_info: "1688年的奇普罗夫齐起义，以保加利亚西北部的天主教保加利亚人为核心，试图利用当时更广泛的奥斯曼‑哈布斯堡冲突。尽管军事上失败了，但它成为后世保加利亚历史记忆中一个强有力的象征。"
 flavor_bul.20.a: "以公开抵抗来纪念。"
 flavor_bul.20.b: "保存实力，避免事态升级。"
 flavor_bul.21.title: "斯拉夫‑保加利亚史"
 flavor_bul.21.desc: "一位博学的僧侣呈上了一部旨在恢复保加利亚民族尊严与历史连续性的著作。广泛传播它或许能激发信心与团结，但并非宫廷上下都乐见此类思想。"
 flavor_bul.21.historical_info: "1762年，希伦达尔的派西乌斯完成了《斯拉夫‑保加利亚史》。这部著作呼吁保加利亚人民铭记历史、拒绝文化被动性，成为保加利亚民族复兴运动的奠基文献之一。"
 flavor_bul.21.a: "将文本传遍领地。"
 flavor_bul.21.b: "保持流通有限且受控。"
 flavor_bul.22.title: "索夫仑尼奥斯与印刷文字"
 flavor_bul.22.desc: "印刷所与教会团体倡导以保加利亚语广泛地出版作品。赞助推广将提升识字率并促进公共讨论，而审查制度虽可能以牺牲活力为代价来维持秩序。"
 flavor_bul.22.historical_info: "弗拉察的索弗罗尼乌斯活跃于十八世纪末至十九世纪初，他通过使用通俗易懂的语言、手稿传阅以及印刷品发行，推动了保加利亚知识生活走向更广泛的读者群体。"
 flavor_bul.22.a: "支持更广泛的印刷与阅读圈。"
 flavor_bul.22.b: "只允许在严格监督下出版。"
 flavor_bul.23.title: "保加利亚牧首区的改革"
 flavor_bul.23.desc: "教会领袖请求深化制度革新，提升神职纪律、强化教区结构，并明确保加利亚教会形象。支持他们将加强宗教与民族认同，但也会提升神职人员的影响力。"
 flavor_bul.23.historical_info: "教会改革和争议在17至19世纪的保加利亚社会中扮演了核心角色。对教会等级、语言和教育的控制与更广泛的政治和文化抱负密不可分。"
 flavor_bul.23.a: "恢复父权制改革。"
 flavor_bul.23.b: "将教会置于国家的严密监管之下。"
 flavor_bul.24.title: "民族觉醒思潮"
 flavor_bul.24.desc: "城镇阅览室、学术圈和商人赞助者如今在保加利亚各地协调文化倡议。我们可以公开资助这些活动，将其领导者纳入国家服务体系，或在期望过高前加以约束。"
 flavor_bul.24.a: "资助学校、社团及出版物。"
 flavor_bul.24.b: "将运动引导到国家思潮中。"
 flavor_bul.24.c: "限制煽动并维持秩序。"
 flavor_bul.25.title: "巴尔干帝国的加冕典礼"
 flavor_bul.25.desc: "新生的沙皇国需要一场加冕礼，将多瑙河平原、山地领主与沿海城邦共同纳入王室治下。仅凭宫廷仪式远远不够；我们必须明确这顶皇冠所象征的，究竟是中央集权的帝国威权，还是与贵族协商达成的契约统治。"
 flavor_bul.25.historical_info: "一个统一的巴尔干沙皇国虽在历史上未曾出现，但在EU的框架下却是合理的帝国构想：它借鉴了中世纪及近代早期关于正统性、边疆军事义务与区域王权的传统。"
 flavor_bul.25.a: "确立中央集权的帝国秩序。"
 flavor_bul.25.b: "通过与大贵族的契约来统治。"
 flavor_bul.26.title: "至高王国三月宪章"
 flavor_bul.26.desc: "我们的边界现已延伸至险峻地形与异族之地，战争内阁提议正式颁布特许状：要么由王室直接指挥，配备标准化军官的边疆；要么给予地方更大的自治权，以换取快速动员。"
 flavor_bul.26.historical_info: "军政机构和边疆督军制度是前现代时期在争议边境地区常见的统治工具。此事件将这一逻辑应用于保加利亚领导的巴尔干霸权。"
 flavor_bul.26.a: "将边疆地区集中到王室之下。"
 flavor_bul.26.b: "授予边疆领主自治权。"
 flavor_bul.27.title: "阿森沙皇国的加冕典礼"
 flavor_bul.27.desc: "阿森王朝的衣钵被重新宣告。教士、法学家与将领们就复兴的真谛展开辩论：我们应当优先推行立足威望与学识的复兴计划，还是先通过审慎的妥协来确保广泛的内部共识？"
 flavor_bul.27.historical_info: "直接恢复阿森王朝在之后的几个世纪里并不符合历史，但这反映了以特尔诺沃和统治者家族记忆为核心的中世纪正统性叙事长久不衰。"
 flavor_bul.27.a: "启动全面复兴计划。"
 flavor_bul.27.b: "先通过妥协来稳定局势。"
 flavor_bul.28.title: "第二塔尔诺沃计划"
 flavor_bul.28.desc: "重掌统治权后，我们必须确立其制度化形式。改革派主张推行由宫廷主导的特尔诺沃计划，涵盖教育、行政与城镇复兴；而军事阶层则力主强化边疆的普罗尼亚体系，以武力巩固领地。"
 flavor_bul.28.historical_info: "该事件借鉴了中世纪保加利亚的宫廷与教会传统，并将其融入阿森王朝复兴背景下近代早期国家建设的抉择之中。"
 flavor_bul.28.a: "通过宫廷改革建立第二特尔诺沃。"
 flavor_bul.28.b: "将国家锚定于边疆普罗尼亚服役制度。"
 flavor_bul.29.title: "沃伊尼克改革辩论"
 flavor_bul.29.desc: "官员报告称，沃伊尼克义务可收紧为高度战备军团，但更严苛的训练与补给要求可能加剧地方疲态。采用较宽松的契约模式更为稳妥，虽然在战争中会略逊一筹。"
 flavor_bul.29.a: "立即实施严苛的操练标准。"
 flavor_bul.29.b: "保留本地契约，逐步推行改革。"
 flavor_bul.30.title: "巴尔干山脉战争理论"
 flavor_bul.30.desc: "精通山地作战的指挥官提出两种战术学说：一是先发制人的突袭，依托积极机动展开山地奇袭；二是基于消耗防御与山地筑垒的防御模式。"
 flavor_bul.30.a: "采用进攻性战术。"
 flavor_bul.30.b: "采取防御性战术"