l_simp_chinese:
 bulgarian_boyar_settlements: "波耶定居点"
 bulgarian_boyar_settlements_desc: "保加利亚的统治者学会了通过协商特权与义务，来确保与地方贵族合作。这种和解传统既强化了正统性，又将地方精英阶层与君权紧密相连。"
 bulgarian_tsardom_charter: "保加利亚沙皇国特许"
 bulgarian_tsardom_charter_desc: "宫廷法学家编纂了保加利亚沙皇国的法律基础，将贵族义务、东正教正统性与行省管理统一纳入一部宪法框架之中。"
 bulgarian_mountain_strongholds: "山地要塞"
 bulgarian_mountain_strongholds_desc: "从巴尔干山脉到罗多彼山脉的隘口，遍布的设防关隘与瞭望塔，可以在漫长战事中消耗着入侵者，并为前线部队提供了持久支撑。"
 bulgarian_tarnovo_scriptoria: "特尔诺沃缮写室"
 bulgarian_tarnovo_scriptoria_desc: "塔尔诺沃修道院的文学遗产保存了法律、编年史和礼拜仪式著作。对缮写室和学校的资助加强了教士的学术研究，同时减轻了宫廷文化项目的负担。"
 bulgarian_crown_hostage_system: "人质制度"
 bulgarian_crown_hostage_system_desc: "为确保贵族家族效忠，君权制度化了宫廷人质与监督教养体系。此举强化了中央集权，同时减少了行政动荡。"
 bulgarian_danubian_markets: "多瑙河市场"
 bulgarian_danubian_markets_desc: "多瑙河沿岸与内陆集市的保加利亚商人将农业腹地与黑海贸易连接起来。日益增长的商业密度吸引了劳动力，并增强了商人的影响力。"
 bulgarian_service_retinues: "沃伊尼克服役亲兵"
 bulgarian_service_retinues_desc: "纪律严明的沃伊尼克制度让服役人员与土地和官职绑定，为战时提供了可靠的人力保障。他们的义务确保了保加利亚军队在持续压力下能够不断补充兵员。"
 bulgarian_voinuk_musters: "沃伊尼克征兵名册"
 bulgarian_voinuk_musters_desc: "王室主导的征兵名册与巡查制度，将沃伊尼克义务转化为可靠的作战体系。更完善的记录与行军纪律降低了维持压力，同时提升了行军效率。"
 bulgarian_fortress_engineering: "尼科波尔要塞军团"
 bulgarian_fortress_engineering_desc: "以尼科波尔为中心的军事工程师团队为边境要塞开发了分层防御体系、外围工事及快速修复规程。他们的方法在长期战争中显著增强了边境的持久防御能力。"
 bulgarian_danube_river_flotillas: "多瑙河舰队"
 bulgarian_danube_river_flotillas_desc: "多瑙河上的轻型舰队巡逻确保渡口安全，护航船队，并袭扰敌人。河流防御提升了海上战备能力，并保护了内陆贸易。"
 bulgarian_state_chanceries: "特尔诺沃登记处"
 bulgarian_state_chanceries_desc: "早在文艺复兴初期，以特尔诺沃为中心的登记处就实现了法律卷宗、税务账簿和外交文书的标准化管理。这项改革提升了内阁行政效率，并切实拓展了国家的外交影响力。"
 bulgarian_black_sea_exporters: "瓦尔纳与墨森布里亚出口联盟"
 bulgarian_black_sea_exporters_desc: "围绕瓦尔纳和墨森布里亚的出口联盟将保加利亚的谷物、木材和牲畜输送到更广阔的市场。这一网络增强了商人的议价能力，并通过自有贸易路线优化了贸易流通。"
 bulgarian_chiprovtsi_gunsmiths: "奇普罗夫齐枪匠"
 bulgarian_chiprovtsi_gunsmiths_desc: "采矿与金属加工中心的工艺传统导向火炮支援。更精良的本土枪炮制造技术降低了火炮成本，并提升了战场火力。"
 bulgarian_caravanserai_reforms: "商队旅馆改革"
 bulgarian_caravanserai_reforms_desc: "一系列规范的商队旅馆和海关站点标准化了通过保加利亚的陆路贸易，更高的吞吐量提升了商人容量和贸易收益。"
 bulgarian_granary_reserves: "多布罗加粮食储备"
 bulgarian_granary_reserves_desc: "多布罗加地区的国家储备粮仓在歉收年份稳定了粮食供应。这一体系以更强的后勤纵深支持了规模更大的远征部队。"
 bulgarian_confessional_compact: "特尔诺沃宗教协定"
 bulgarian_confessional_compact_desc: "特尔诺沃宗教会议协定在争议宗教边界地区统一了教会等级与王室行政体系。这一安排强化了教士的凝聚力，并提升了组织化传教能力。"
 bulgarian_haiduk_intelligence: "海杜克游击队情报"
 bulgarian_haiduk_intelligence_desc: "地方非正规军与斥候被纳入国家情报网络，负责追踪敌人在复杂地形中的动向。他们的战场报告不仅保存了作战经验，也有效降低了战争期间的损耗。"
 bulgarian_transbalkan_caravans: "跨巴尔干商队"
 bulgarian_transbalkan_caravans_desc: "多瑙河流域、巴尔干山口与面向爱琴海的路线之间的道路连接，使得保加利亚商人得以调解陆路贸易往来，并吸引移民涌向商业定居点。"
 bulgarian_diplomatic_mediation: "大特尔诺沃使团"
 bulgarian_diplomatic_mediation_desc: "一支训练有素的外交使团可以将保加利亚的外交转变为地区制衡的可靠工具。宫廷专业素养提升了国家声望，并加快了外交活动的节奏。"
 bulgarian_provincial_centralization: "特尔诺沃省审计"
 bulgarian_provincial_centralization_desc: "效仿特尔诺沃文官制度的审计机构，强化了行省账目核查与定期呈报机制。这种早期建立的严密监管体系，在领土扩张时期有效维持了国家控制的稳定性。"
 bulgarian_strategic_supply_network: "巴尔干交通网络"
 bulgarian_strategic_supply_network_desc: "横跨保加利亚领土的一系列驿站、补给站和驿道网络，强化了后勤体系。该系统降低了长期战争中的维护压力，并确保了兵员补充的持续输送。"
 bulgarian_pass_warfare_schools: "巴尔干战争学校"
 bulgarian_pass_warfare_schools_desc: "巴尔干战争磨砺出的军官，精于时机把握、战线控制与伏击，其作战学说化险峻地势为精心谋划的战场优势。"
 bulgarian_operational_marches: "老山军区信条"
 bulgarian_operational_marches_desc: "围绕巴尔干山区路线和隘口控制构建的战争学说，实现了纪律严明的高节奏机动作战。保加利亚军队获得了更佳的行军协调能力与更强的展开态势。"
 bulgarian_revival_schools: "学校复兴"
 bulgarian_revival_schools_desc: "修道院与教区学校复兴了保加利亚文字、历史记忆及实用知识，这些学校遍布城乡各地。这场运动增强了文化影响力，并提升了普通阶层的识字率上限。"
 bulgarian_industrial_workshops: "加布罗沃制造厂"
 bulgarian_industrial_workshops_desc: "受加布罗沃手工业与商业模式启发的早期工厂，在更严格的国家监管下规范了生产和劳动力培训。这一计划提高了物质产出，并减轻了探索时代的城镇建设负担。"
 bulgarian_urban_reconstruction: "斯雷德茨城市重建"
 bulgarian_urban_reconstruction_desc: "效仿斯雷代茨市政的公民宪章，自文艺复兴阶段起优先发展道路、市场大厅和城镇管理。重建工作稳定了繁荣度，并维持了发展增长。"
 bulgarian_staff_drills: "多瑙河军事演习"
 bulgarian_staff_drills_desc: "多瑙河沿岸的常规军事演习，规范了指令信号传递、阵型协调与军官日常勤务。此类演练在高压战役环境中有效提升了部队的自主应变能力与整体士气。"
 bks_balkan_imperial_staff: "巴尔干帝国参谋部"
 bks_balkan_imperial_staff_desc: "宣布成立巴尔干沙皇国后，宫廷设立了常设帝国参谋部，统筹半岛的征兵、后勤与战役规划。这一制度显著提升了大型战争中的战场纪律与战略优势。"
 bks_overkingdom_marches: "边疆军区"
 bks_overkingdom_marches_desc: "沙皇国将边疆领主领地重组为直辖于皇室的边疆军区，实行统一指挥体系。经验丰富的军官、更强大的步兵以及整合的骑兵部队，将这个国家转变为令人畏惧的军事机器。"
 aen_asenid_restoration_court: "阿森宫廷复兴"
 aen_asenid_restoration_court_desc: "重建的阿森宫廷以家族扩张和宫廷外交为核心，重建了帝国外交部门。扩展的外交能力与吞并效率使领地得以通过谈判与施压双管齐下，巩固在巴尔干地区的影响力。"
 aen_second_tarnovo_program: "第二次特尔诺沃纲领"
 aen_second_tarnovo_program_desc: "一场宏大的重建与教育计划将特尔诺沃提升为阿森家族复兴的文化与行政中心。识字率提升、高速的发展以及商业赞助，使其成为决定性的治国方略。"