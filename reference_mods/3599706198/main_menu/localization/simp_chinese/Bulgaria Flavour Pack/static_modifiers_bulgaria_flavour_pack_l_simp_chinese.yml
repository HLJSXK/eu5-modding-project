l_simp_chinese:
 STATIC_MODIFIER_NAME_bfp_bks_coronation_core: "巴尔干加冕核心"
 STATIC_MODIFIER_DESC_bfp_bks_coronation_core: "集权化的加冕定居地将君权、军队与行政体系紧密联结，构筑起稳固的帝国架构。"
 STATIC_MODIFIER_NAME_bfp_bks_noble_compacts: "巴尔干贵族协定"
 STATIC_MODIFIER_DESC_bfp_bks_noble_compacts: "沙皇国建立在与大贵族家族及边疆领主协商达成的军事契约之上。"
 STATIC_MODIFIER_NAME_bfp_bks_marches_centralized: "中央直辖边境特许状"
 STATIC_MODIFIER_DESC_bfp_bks_marches_centralized: "边疆国由王室官员统辖，遵循标准操典，并纳入统一的战役指挥体系。"
 STATIC_MODIFIER_NAME_bfp_bks_marches_autonomous: "自治边防特许"
 STATIC_MODIFIER_DESC_bfp_bks_marches_autonomous: "边疆贵族享有广泛的战术自主权，以换取随时快速动员的能力。"
 STATIC_MODIFIER_NAME_bfp_aen_restoration_program: "阿森复兴"
 STATIC_MODIFIER_DESC_bfp_aen_restoration_program: "复兴的宫廷赞助识字、公民成长与外交存在，将其作为一项国家工程。"
 STATIC_MODIFIER_NAME_bfp_aen_dynastic_compromise: "政治妥协"
 STATIC_MODIFIER_DESC_bfp_aen_dynastic_compromise: "宫廷各派系间的协商平衡确保了治理有序，政治融合更为顺畅。"
 STATIC_MODIFIER_NAME_bfp_aen_tarnovo_court_reforms: "第二次特尔诺沃宫廷改革"
 STATIC_MODIFIER_DESC_bfp_aen_tarnovo_court_reforms: "在宫廷主导下，法律与教育改革使塔尔诺沃重焕光彩，再度成为行政与学术中心。"
 STATIC_MODIFIER_NAME_bfp_aen_frontier_pronoia: "普洛尼亚边疆计划"
 STATIC_MODIFIER_DESC_bfp_aen_frontier_pronoia: "在暴露的边境地区实行军事土地服役制度可扩充人力，但会削弱中央集权的监管力度。"
 STATIC_MODIFIER_NAME_bfp_voinuk_drilled_corps: "训练有素的军团"
 STATIC_MODIFIER_DESC_bfp_voinuk_drilled_corps: "严苛的训练与检阅能提升战场表现，但也会加重财政负担。"
 STATIC_MODIFIER_NAME_bfp_voinuk_local_contracts: "地方合作"
 STATIC_MODIFIER_DESC_bfp_voinuk_local_contracts: "地方契约执行确保了可靠的征募与增援，同时降低了对中央的干扰。"
 STATIC_MODIFIER_NAME_bfp_pass_raider_doctrine: "通过突袭者条令"
 STATIC_MODIFIER_DESC_bfp_pass_raider_doctrine: "激进的山区作战会增加调动与冲击正面宽度，但会消耗凝聚力。"
 STATIC_MODIFIER_NAME_bfp_pass_wardens: "通过监管理念"
 STATIC_MODIFIER_DESC_bfp_pass_wardens: "防御性山地作战体制注重消耗战、依托坚固山脊防线，并控制作战节奏。"
 STATIC_MODIFIER_NAME_bfp_bulgarian_event_cooldown: "保加利亚近况"
 STATIC_MODIFIER_DESC_bfp_bulgarian_event_cooldown: "政府仍在处理近期国内事务，降低了立即重复请愿和危机的可能性。"