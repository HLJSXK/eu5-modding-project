l_simp_chinese:
 flavor_teu.1.title: "普鲁士联盟叛乱"
 flavor_teu.1.desc: "尽管我们尽了最大努力，仍然无法阻止普鲁士联盟破坏[ROOT.GetCountry.GetAdjective]统治的努力。那些承诺支持联盟的城市集结了一支军队，并在公开叛乱中奋起反抗。正如我们所怀疑的，它的许多成员与波兰有联系，并且已经要求波兰干预即将到来的冲突。除非我们放弃对这些城市的统治，否则普鲁士的血腥斗争似乎是不可避免的。"
 flavor_teu.1.a: "杀了所有的叛徒！"
 prussian_confederation_support: "[ShowAreaName('prussia_area')]的所有[ShowCultureName('prussian')][ShowPopTypeName('nobles')]和[ShowPopTypeName('burghers')]都将加入[prussian_confederation.GetName]"
 flavor_teu.1.tooltip: "[prussian_confederation.GetName]会寻求[GetCountry('POL').GetAdjective]的支持"
 flavor_teu.1.b: "这是一场我们赢不了的战争。"
 prussian_confederation: "普鲁士联盟"
 flavor_teu.2.title: "普鲁士联盟寻求波兰的支持"
 flavor_teu.2.desc: "一个自称为[prussian_confederation.GetName]的组织已经起来反抗条顿统治的不公正！我们以前曾向其成员保证，如果战争爆发，我们会支持他们的事业。作为交换，联盟已经同意在暴虐的骑士被驱逐后，普鲁士的土地应该由波兰统治。我们可以从这种安排中获益匪浅，但我们应该为血腥的斗争做好准备。"
 flavor_teu.2.a: "他们将得到我们的全力支持。去战斗吧！"
 flavor_teu.2.b: "这不关我们的事。"
 flavor_teu.3.title: "蜥蜴联盟"
 flavor_teu.3.desc: "有消息传来，[ShowProvinceDefinitionName('chelmno_province')]当地的[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]建立了一个叫做“蜥蜴联盟”的组织。该联盟的官方目的是打击违法犯罪，保护他们的利益。虽然这个社团看起来合规合法，但有些人认为，他们靠近[GetCountry('POL').GetAdjective]边界，也许就是个秘密的分裂组织。"
 flavor_teu.3.historical_info: "蜥蜴联盟，拉丁语中被称为#italic Societas Lacertarum#!，是来自海乌姆诺的普鲁士骑士于1397年成立的骑士兄弟会组织。后来，在1410年的格伦瓦尔德之战期间，创立者之一的尼古拉斯·冯·雷尼斯降下海乌姆诺军团的旗帜加剧了败退。在此之后，该联盟的成员被打上了叛徒的印记。"
 flavor_teu.3.a: "允许该联盟存在。"
 flavor_teu.3.b: "他们没安什么好心！"
 STATIC_MODIFIER_NAME_teu_lizard_league: "蜥蜴联盟"
 flavor_teu.4.title: "普鲁士效忠"
 flavor_teu.4.desc: "[GetCountry('TEU').GetLongName]的战败标志着波美雷利亚大部分地区回归我们的怀抱，以及对[ShowAreaName('prussia_area')]领土的征服。尽管遭受重创，但[GetCountry('TEU').GetAdjectiveWithNoTooltip]骑士团仍然屹立，并控制着该地区的许多机构。\n\n由于东普鲁士的领土也许难以整合，有人建议强迫骑士团剩余精英世俗化，并向[pol_ruler.GetName]宣誓效忠。根据该计划，[GetCountry('TEU').GetName]过去的领土将被划分为直属王室的“[ROOT.GetCountry.GetGovernment.GetAdjective|U]普鲁士”和由世俗化普鲁士人持有的“公国普鲁士”。"
 flavor_teu.4.historical_info: "在1454-1466年波兰与条顿骑士团的十三年战争后，普鲁士被分割为由波兰王国直属的“王室普鲁士”，和由称臣的骑士团保留，被称为“公国普鲁士”的东部省份。在1525年，条顿骑士团国被其大团长阿尔贝特·冯·霍亨索伦世俗化，成为世人所知的“普鲁士公国”。"
 flavor_teu.4.a: "强迫他们屈服！"
 flavor_teu.4.b: "维持现状。"
 flavor_teu.5.title: "十字军热潮"
 flavor_teu.5.desc: "在1226年，[ROOT.GetCountry.GetAdjective]骑士受[ShowAreaName('mazovia_area')]的[GetCharacter('maz_konrad_i_piast').GetName]之邀前往[ShowAreaName('prussia_area')]。他们的目标是作为十字军战士对抗信奉原始宗教的波罗的海普鲁士人。作为这些勇敢战士的继承者，我们需要继续这场十字军，对抗[target_nation.GetLongName]的[ShowContinentName('europe')]最后的异教徒。"
 flavor_teu.5.a: "#italic 基督复活了！#!"
 flavor_teu.5.b: "我们目前不需要任何冲突。"
 flavor_teu.6.title: "[target_location.GetNameWithNoTooltip]的[ShowReligionAdjectiveWithNoTooltip('romuva')]异教徒"
 flavor_teu.6.desc: "卑鄙的[ShowReligionAdjective('romuva')]异教徒不可信任。尽管我们给予了他们一切善意和宽容，这些该死的异教徒还是在[target_location.GetName]发动叛乱。虽然规模不大，无需立即动员我们的部队，但这仍干扰了我们神圣的使命，因此必须予以镇压。如果这些无组织的暴徒汇聚成一股更强大的势力，[ROOT.GetCountry.GetAdjective]对这些异教省份的控制可能会受到威胁。"
 flavor_teu.6.a: "建造一座[ShowBuildingTypeNameWithNoTooltip('castle')]监视[target_location.GetProvince.GetNameWithNoTooltip]。"
 flavor_teu.6.b: "命令地方#italic 司令官#!解决此事。"
 teuton_6_event_trigger_information: "该[event|e]可以触发是由于：\n[ShowTriggerConditionsForScope('teu_event_6_trigger', SCOPE.sLocation('target_location').GetLocation.MakeScope.Self)]"
 flavor_teu.7.title: "[target_location.GetNameWithNoTooltip]的城市法"
 flavor_teu.7.desc: "[target_location.GetName]的[target_location.GetRank.GetName]是[ROOT.GetCountry.GetLongName]的经济命脉与主要贸易港口。与其他少数城市一样，由于与[target_country.GetLongName]的深厚联系，该城至今仍沿用$lubeck$城市法，这也成为其与[ROOT.GetCountry.GetGovernment.GetAdjective]宗主国之间的争议焦点。为了结束冲突，[ROOT.GetCountry.GetNameWithNoTooltip]愿意让[target_location.GetNameWithNoTooltip]采用[ShowEstatePrivilegeName('kulm_law')]，同时保留现行制度的一些特权，增强地方议会的权力并给予其更大的自治权。这一方案将使[target_location.GetRank.GetNameWithNoTooltip]作为[target_location.GetMarket.GetName]的商业枢纽持续繁荣。"
 flavor_teu.7.a: "推动这一解决方案。"
 flavor_teu.7.b: "维持当前秩序。"
 flavor_teu.8.title: "经济下行"
 flavor_teu.8.desc: "[ROOT.GetCountry.GetLongName]近期日子不太好过。经济下滑导致许多[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]陷入赤贫，[ROOT.GetCountry.GetNameWithNoTooltip]的国库也空得令人担忧。现实宛如噩梦，而且如果我们不做些什么，情况还会进一步恶化。为了避免陷入借债还债的境况，我们也许可以考虑对我们在[ShowContinentName('europe')]各地的地产征收一笔新税。这样的行动有前例可循，但征收的款项可以空前。[ShowBuildingTypeName('order_commandery')]不能为我们带来助力又有什么用呢？"
 flavor_teu.8.a: "征收可观的赋税。"
 flavor_teu.8.b: "征收适量的赋税。"
 flavor_teu.8.c: "我们会另寻收入来源。"
 flavor_teu.11.title: "修改[ShowEstatePrivilegeNameWithNoTooltip('kulm_law')]"
 flavor_teu.11.desc: "[ShowSituationName('black_death')]肆虐了整个[ShowContinentName('europe')]大陆，摧毁无数城镇，使聚居地沦为废墟。尽管其对[ROOT.GetCountry.GetLongName]的经济造成了可怕影响，但更糟糕的是，德国人口数量的减少降低了移民压力，致使[ShowAreaName('prussia_area')]人口增长放缓。除非我们能提供更多激励措施吸引移民迁入[ROOT.GetCountry.GetAdjectiveWithNoTooltip]领土，否则我们将失去构成我们基督教化使命重要组成部分的移民群体。"
 flavor_teu.11.a: "给予移民更多优待。"
 flavor_teu.11.b: "我们必须应对这一局面。"
 flavor_teu.12.title: "[ShowGoodsNameWithNoTooltip('amber')]垄断权"
 flavor_teu.12.desc: "[ROOT.GetCountry.GetLongName]拥有许多资源和自然财富，但鲜少有商品像[target_goods.GetName]那样重要和受欢迎。这就是为什么[ROOT.GetCountry.GetFlavorRank]将其置于[ROOT.GetCountry.GetGovernment.GetAdjective]管辖之下，并继续垄断这一宝贵资源。然而，这种贸易保护有可能激怒[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]，他们希望能参与这一珍贵资源的贸易，并从出赚取巨额利润。"
 flavor_teu.12.a: "加强我们对该资源的控制。"
 flavor_teu.12.b: "分享我们的垄断。"
 flavor_teu.12.c: "将其授予[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]。"
 flavor_teu.13.title: "[target_character.GetNameWithNoTooltip]"
 flavor_teu.13.desc: "我们收到消息，一位名叫[target_character.GetName]的女隐修士因其幻象而在整个[ROOT.GetCountry.GetFlavorRank]闻名。在她的一生中，[target_character.GetShortNameWithNoTooltip]经历了多次神启，吸引了整个[ROOT.GetCountry.GetLongName]的关注。尽管如此，许多人认为这些幻象是假的，而另一些人则信以为真。甚至有人想以巫术罪名将[target_character.GetHerHim]绑上火刑柱。\n\n目前，[target_character.GetNameWithNoTooltip]已经挺过了一次巫术审判，但这并未阻止[target_character.GetHisHer]的敌人要求再次审判。"
 flavor_teu.13.a: "这些幻象确实令人着迷。"
 flavor_teu.13.b: "听下[target_character.GetHerHis]敌人的诉求。"
 flavor_teu.14.title: "[target_character.GetNameWithNoTooltip]"
 flavor_teu.14.desc: "一位极具潜力的神职人员已在[ROOT.GetCountry.GetFlavorRank]崭露头角。常年作为[ROOT.GetCountry.GetAdjective][ROOT.GetCountry.GetGovernment.GetCourtTitle]的一员，[target_character.GetSheHe]以娴熟的编年史家身份闻名，可协助完成填补[target_work_of_art.GetName]空白的著作——该作品由[target_work_of_art.GetCreator.GetName]于[target_work_of_art.GetCreationDate]创作完成。"
 flavor_teu.14.a: "我们需要[target_character.GetHerHis]的服务！"
 flavor_teu.14.b: "解雇[target_character.GetHerHim]。"
 teu_event_within_5_to_10_years: "该[event|e]将在5至10年内触发，前提是[target_character.GetName]仍然在世。"
 flavor_teu.15.title: "$chronik_des_land_preussens$"
 flavor_teu.15.desc: "[target_character.GetName]的辛劳终得回报，[target_character.GetSheHe]已完成其终生之作，[target_work_of_art.GetName]——这部[ShowWorkOfArtTypeName('chronicle')]详尽记载了[ROOT.GetCountry.GetLongName]自1360年代至今的历史。"
 flavor_teu.15.a: "[ROOT.GetCountry.Custom('common_string_wonder')]"
 flavor_teu.16.title: "[ROOT.GetCountry.GetFlavorRank]的总商务官"
 flavor_teu.16.desc: "总商务官是[ROOT.GetCountry.GetAdjective]国外贸易利益的管理者。他们拥有巨大的责任和特权，被授予了在[ShowLocationName('gdansk')]和[ShowLocationName('konigsberg')]的港口买卖[ShowGoodsName('wheat')]和[ShowGoodsName('amber')]的独家权利。这让他们成为了[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]的眼中钉，他们坚决反对[ROOT.GetCountry.GetFlavorRank]授予他们这些特权，希望看到这些权利被撤销。另一方面，[ROOT.GetCountry.GetAdjective][ROOT.GetCountry.GetGovernment.GetCourtTitle]对总商务官带来的收入非常满意，乐意授予进一步的特权。"
 flavor_teu.16.a: "打破他们的垄断。"
 flavor_teu.16.b: "利用该机构。"
 flavor_teu.16.c: "维持现状。"
 flavor_teu.17.title: "[target_character.GetNameWithNoTooltip]"
 flavor_teu.17.desc: "[target_character.GetName]是一位[target_character.GetArtistType.GetName]，出生于[target_character.GetBirthLocation.GetName]。[target_character.GetSheHe]曾在[ShowLocationName('krakow')]的[ShowBuildingTypeName('university')]求学，且已为整个[ShowContinentName('europe')]多位政治人物效力。此人现可接受招募，或许我们也应寻求[target_character.GetHerHis]的服务。"
 flavor_teu.17.a: "成为[target_character.GetArtistType.GetNameWithNoTooltip]的赞助人。"
 flavor_teu.17.b: "我们负担不起这笔开销。"
 teu_impact_on_kulm_law: "[ShowEstatePrivilegeName('kulm_law')]的效果将：\n#g +10.0%#![ShowModifierTypeName('rural_migration_attraction')]\n#r -10.0%#![ShowModifierTypeName('burghers_estate_max_tax')]"
 teu_impact_on_kulm_law_not_revised: "[ShowEstatePrivilegeName('kulm_law')]的效果将：\n#r -50.0%#! [ShowModifierTypeName('german_migration_attraction_modifier')]"
 kulm_law_revised_tooltip: "已通过$flavor_teu.11.title$[event|e]修订了[ShowEstatePrivilegeName('kulm_law')]。"
 kulm_law_not_revised_tooltip: "已选择不通过$flavor_teu.11.title$[event|e]修订[ShowEstatePrivilegeName('kulm_law')]。"
 flavor_teu.100.title: "普鲁士十字军"
 flavor_teu.100.desc: "多年前，光荣的波罗的海十字军战士以为了基督的荣耀之名发动了普鲁士十字军。许多人听从召唤，其中就有[ROOT.GetCountry.GetAdjective]王室的骄傲：[target.GetName]。"
 flavor_teu.100.desc.crusader_returns: "$flavor_teu.100.desc$\n\n[target.GetHerHis]抛洒热血，扬名立万，邪恶的异教徒在[target.GetHerHis]的神圣之怒前恐惧地畏缩。如今，[target.GetSheHe]返回了宏伟的[ROOT.GetCountry.GetFlavorRank]的怀抱！"
 flavor_teu.100.desc.crusader_dead: "$flavor_teu.100.desc$\n\n尽管我们[ROOT.GetCountry.GetFlavorRank]对这位骑士很有信心，但主对[target.GetHerHim]却有不同的计划。该死的异教徒通过残忍卑鄙的战术打倒了这位强大的十字军战士。[ROOT.GetCountry.GetAdjectiveWithNoTooltip]人民为[target.GetHerHis]的死而哭泣。"
 flavor_teu.100.desc.fallback: "传说曾有一名骑士被[ROOT.GetCountry.GetAdjective]王室选中参加了普鲁士十字军。\n\n然而，如同所有传说一样，这个故事也只不过是个好听的童话故事罢了。"
 flavor_teu.100.a: "愿[target.GetSheHe]成为更多骑士的榜样！"
 flavor_teu.100.b: "那些野蛮人将为此付出代价！"
 flavor_teu.100.c: "不过确实是个好故事。"
 flavor_teu.101.title: "十字军之死"
 target: "[target.GetName]"
 flavor_teu.101.desc.infection_death: "人气颇高的十字军战士[target.GetName]近些日子发烧严重。尽管[ROOT.GetCountry.GetGovernment.GetRulerTitle]建议[target.GetHerHim]回家，但这名十字军战士坚持轻伤不下火线。遗憾的是，最终迎向[target.GetSheHe]的却是死神的拥抱。"
 flavor_teu.101.desc.training_accident_death: "[ROOT.GetCountry.GetAdjective]军营中发生了悲剧！训练期间，十字军战士[target.GetName]与一名扈从过招，希望提升[target.GetHerHis]和扈从两人的武艺，而且用上了真剑。对这名贵族来说实在不幸，扈从举剑过高，砍掉了[target.GetNameWithNoTooltip]的脑袋。[target.GetSheHe|U]当场死亡。"
 flavor_teu.101.desc.river_drowning_death: "我们骑士的关键特征之一就是身披重甲。这让我们的部队几乎免疫劈砍，但也有其弱点。其中一个屡次出现的问题就是重甲弱水。一旦骑士掉入河水中，这套金属盔甲就会成为其潮湿的坟墓。\n\n十字军战士[target.GetName]和[target.GetHerHis]的同伴一起突袭异教徒村庄时就学到了这一课。在旅途中，[target.GetSheHe]从马上坠落，掉进一条河里淹死了。"
 flavor_teu.101.desc.fallback: "外国十字军战士[target.GetName]今早被发现死在床上。死因对所有人都是个迷，因为[target.GetSheHe]前天晚上还活得好好的，也没有任何暴力致死的迹象……"
 flavor_teu.101.a: "愿[target.GetHerHis]的灵魂安息。"
 flavor_teu.101.b: "至少我们知道了那名扈从剑使得不错。"
 flavor_teu.101.c: "不幸但却常见。"
 flavor_teu.101.zzz: "只有主知道[target.GetHerHim]发生了什么……"
 flavor_teu.102.title: "$flavor_teu.101.title$"
 flavor_teu.102.desc: "$flavor_teu.100.desc.crusader_dead$"
 flavor_teu.102.a: "真是糟糕的消息"
 flavor_pol_teu.1.title: "1339年裁决"
 flavor_pol_teu.1.desc: "在1335年，我们向[GetCountry('PAP').GetAdjective][GetCountry('PAP').GetGovernment.GetCourtTitle]投诉了[GetCountry('TEU').GetName]。经过多年的等待，[GetCountry('PAP').GetAdjectiveWithNoTooltip]委员会终于抵达，并开始了审议。如我们所料，法官们支持我们严正的诉讼，宣布[GetCountry('TEU').GetNameWithNoTooltip]应当归还[ShowProvinceDefinitionName('danzig_province')]、[ShowProvinceDefinitionName('tuchola_province')]、[ShowProvinceDefinitionName('kuyavia_province')]、[ShowProvinceDefinitionName('dobrzyn_province')]和[ShowProvinceDefinitionName('stolp_province')]等省份。"
 flavor_pol_teu.1.historical_info: "在1319年和1335年，波兰方面向教廷提出诉讼，要求条顿骑士团将“但泽‑波美拉尼亚”归还波兰。在1335年的诉讼中，教宗国派出的委员会裁定条顿骑士团不正当侵略，应当归还土地并支付赔偿。条顿骑士团提出上诉，经教宗审议，他们只被迫归还了占领的比得哥什和多布任。"
 flavor_pol_teu.1.a: "我们还以为正义死了呢……"
 flavor_pol_teu.2.title: "$flavor_pol_teu.1.title$"
 flavor_pol_teu.2.desc: "又一次教廷裁决！如同在1319年一样，[pol_polish_side.GetName]在1335年再次向圣父教宗提出诉讼，想要羞辱我们，并强迫我们放弃通过正义的征服得来的土地。而[GetCountry('PAP').GetAdjective]委员会肯定受贿了，竟然作出荒谬的判决，宣布我们应当将[ShowProvinceDefinitionName('danzig_province')]、[ShowProvinceDefinitionName('tuchola_province')]、[ShowProvinceDefinitionName('dobrzyn_province')]、[ShowProvinceDefinitionName('kuyavia_province')]和[ShowProvinceDefinitionName('stolp_province')]归还[pol_polish_side.GetLongNameWithNoTooltip]。"
 flavor_pol_teu.2.a: "荒谬！我们必须立即向[GetCountry('PAP').GetGovernment.GetRulerTitle]上诉。"
 flavor_pol_teu.2.b: "我们不会质疑[GetCountry('PAP').GetAdjectiveWithNoTooltip]委员会的合法性。"
 flavor_pol_teu.2.c: "我们不会割让一寸土地！"
 flavor_pol_teu.3.title: "[pol_polish_side.GetNameWithNoTooltip]和[pol_teutonic_side.GetNameWithNoTooltip]的纠纷"
 flavor_pol_teu.3.desc: "[pol_polish_side.GetName]和[pol_teutonic_side.GetName]的政治斗争一如既往地激烈。[pol_teutonic_side.GetAdjectiveWithNoTooltip]夺取波美拉尼亚让[pol_polish_side.GetAdjectiveWithNoTooltip]满嘴酸味，进而多次提出对骑士团的诉讼来烦扰我们。\n\n我们派出的委员会近期在[pol_polish_side.GetNameWithNoTooltip]调查后宣布，[pol_teutonic_side.GetAdjectiveWithNoTooltip]应当将大片领土转交给[pol_polish_side.GetAdjectiveWithNoTooltip]，引起了骑士团的上诉。我们必须友好解决这件事。"
 flavor_pol_teu.3.a: "让我们寻找折衷方案。"
 flavor_pol_teu.3.b: "他们是基督的仆人，因此无责。"
 flavor_pol_teu.3.c: "你们读不懂裁决吗？"
 teu_supported_us: "支持我们"
 teu_supported_other_side: "拒绝支持我们"
 flavor_pol_teu.4.title: "[pol_teutonic_side.GetAdjectiveWithNoTooltip]的回应"
 flavor_pol_teu.4.desc: "[pol_teutonic_side.GetAdjective]的回应可谓冷淡。"
 flavor_pol_teu.4.desc.a: "$flavor_pol_teu.4.desc$面对眼前的判决，他们没有服从[GetCountry('PAP').GetAdjective]委员会的公正裁断，而是决定上诉烦扰圣父。真是浪费圣父的时间。"
 flavor_pol_teu.4.desc.b: "$flavor_pol_teu.4.desc$话虽如此，但他们承受不住压力，最终屈服于我们的要求，归还了我们的领土。"
 flavor_pol_teu.4.desc.c: "$flavor_pol_teu.4.desc$话虽如此，但他们还是交出了部分领土，虽然远未满足我们的要求。[GetCountry('PAP').GetAdjective]的干预驳回了我们的大部分投诉，只要求其将少数边境地区归还我们。尽管如此，这仍然是我们的胜利。"
 flavor_pol_teu.4.desc.d: "$flavor_pol_teu.4.desc$自命不凡的骑士团认为哪怕神圣的意志也不能让他们服从，决定公然违抗委员会的裁决。很明显，我们不会获得那些领土，如今唯一的选择只剩下血腥的战争，一场他们绝对会输的战争，我们会确保这一点。"
 flavor_pol_teu.4.desc.fallback: "$flavor_pol_teu.4.desc$我们无法确定他们真正的计划，因此也无法知道他们的反应。"
 flavor_pol_teu.4.a: "让圣父知道他们的过错。"
 flavor_pol_teu.4.b: "对他们来说这无疑是个好选择。"
 flavor_pol_teu.4.c: "能拿多少是多少。"
 flavor_pol_teu.4.d: "他们将在战场上面对我们。"
 flavor_pol_teu.5.title: "[GetCountry('PAP').GetAdjectiveWithNoTooltip]的赞许"
 flavor_pol_teu.5.desc: "我们呈交给圣父的上诉取得了重大成功。在我们的名号，以及我们提交的证据的影响下，[the_pope.GetName]裁定我们无错，[the_pope.GetHerHis]派出的委员会行为失当。[the_pope.GetSheHe]轻蔑地拒绝了[pol_polish_side.GetAdjective]一方，并让我们放心，我们获得的土地理应属于[pol_teutonic_side.GetName]。此外，我们还因为努力传播[ShowReligionGroupName('christian')]，让异教徒皈依正信而得到了赞扬。"
 flavor_pol_teu.5.a: "我们将继续十字军！"
 STATIC_MODIFIER_NAME_teu_papal_resolution: "教宗的决心"
 flavor_pol_teu.6.title: "[GetCountry('PAP').GetAdjectiveWithNoTooltip]的谴责"
 flavor_pol_teu.6.desc: "来自[GetCountry('PAP').GetName]的信件送达，谴责了我们不服从1339年裁决的决定。[the_pope.GetName]认为我们应该相信那些显然收受了贿赂的法官，真是令人遗憾。"
 flavor_pol_teu.6.a: "只能就这样了。"
 flavor_pol_teu.6.b: "什么信，我们没见到啊。"
 flavor_pol_teu.7.title: "令人遗憾的[GetCountry('PAP').GetAdjectiveWithNoTooltip]裁决"
 flavor_pol_teu.7.desc: "我们从未感受到被圣父如此背叛。就在几个月前，[the_pope.GetSheHe]派来了[the_pope.GetHerHis]的法官，他们仔细分析了每一项证据，并最终对这场烦人的冲突做出了公正的裁决。然而，在[pol_teutonic_side.GetAdjective]上诉后，[the_pope.GetName][the_pope.GetHerselfHimself]又推翻了正确的裁定。真是让人失望。"
 flavor_pol_teu.7.a: "圣父应该是永不犯错的，对吧？"
 flavor_pol_teu.8.title: "折衷"
 flavor_pol_teu.8.desc: "[GetCountry('PAP').GetLongName]的使节终于抵达，带来了圣父的最终裁决。很遗憾，回复并不完全对我们有利，但却比上一次的裁决要好。"
 flavor_pol_teu.8.a: "至少比波兰人的谋划强。"
 flavor_pol_teu.8.b: "我们不会放弃一寸土地，谁的要求都不行！"
 flavor_teu.300.title: "[GetCountry('POL').GetAdjectiveWithNoTooltip]无动于衷"
 flavor_teu.300.desc: "在过去几年间，我们与[GetCountry('POL').GetAdjective]的紧张关系一直在加剧。双方都认为战争不可避免，但双方都不愿挑起斗争。许多高级军官对[GetCountry('POL').GetAdjectiveWithNoTooltip]的意图很有自信，开始呼吁[teu_ruler.GetName]派人向他们展示两把挑衅性的出鞘之剑。"
 flavor_teu.300.historical_info: "在1410年，波兰在号称“大战”的条顿战争中的格伦瓦尔德战役中取得了对条顿骑士团的决定性胜利。据说波兰方试图通过在附近的树林林荫下休息来消耗敌方，而在条顿骑士团派遣了一位手持两把出鞘之剑的使者邀战后，战斗开始。"
 flavor_teu.300.a: "如果他们缺剑，那我们就给他们剑。"
 flavor_teu.300.b: "无视他们。"
 flavor_teu.301.title: "两把出鞘之剑"
 flavor_teu.301.desc: "[teu_from.GetLongName]的使者抵达，希望觐见[ROOT.GetCountry.GetGovernment.GetRulerTitle]。在给了对方机会后，这名使者将两把来自[teu_ruler.GetName]的出鞘之剑放在[pol_ruler.GetName]身前，仿佛我们缺少必要的装备，来抹去他们脸上的傲慢一样。如果[teu_from.GetAdjectiveWithNoTooltip][teu_from.GetGovernment.GetRulerTitle]想要战争，那[teu_ruler.GetSheHe]将得到战争。"
 flavor_teu.301.a: "如此卑劣的羞辱。"
 POL_after_next_war_is_won: "赢得下一次与[teu_from.GetName]的战争我们将获得："
 flavor_teu.302.title: "新礼器"
 flavor_teu.302.desc: "我们从[GetCountry('TEU').GetName]获得的那一对出鞘之剑如今拥有了新的象征价值。在我们最近的惩罚行动后，这一[GetCountry('TEU').GetAdjectiveWithNoTooltip]傲慢的象征也成为了我们胜利的徽记，成为了[ROOT.GetCountry.GetGovernment.GetAdjective]徽章收藏的一部分。"
 flavor_teu.302.a: "对他们的胜利值得流血。"
 flavor_swe_teu.1.title: "[target_country.GetLongNameWithNoTooltip]"
 flavor_swe_teu.1.victual_brother_info: "自古以来，波罗的海便是海盗滋生的沃土。在[target_location.GetName]的水手与渔民群体中，不少人怀揣着投身海盗生涯的野心，甚至不惜走上违法犯罪的道路。如今，[target_character.GetName]及其麾下臭名昭著的“劫富济贫者”团伙正在这片海域肆虐横行——他们妄图通过劫掠所有不幸遭遇的船只来攫取巨额财富。在这些歹徒之中，尤以自诩为“粮食兄弟会”的团伙最为猖獗，他们不仅占领了[ShowProvinceDefinitionName('gotland_province')]全岛，更在[ShowLocationName('visby')]建立了永久据点。他们持续的海盗行为导致该地区的贸易额下滑，最终将会使我们的贸易彻底消亡。"
 flavor_swe_teu.1.desc: "$flavor_swe_teu.1.victual_brother_info$我们必须在他们站稳跟脚前解决他们。"
 flavor_swe_teu.1.historical_info: "克劳斯·施特尔特贝克是14世纪末德国传奇的海盗，以其对汉萨同盟船只的袭击而闻名。他领导了名为“粮食兄弟会”的海盗团体，该团体最初受梅克伦堡公爵所雇佣，作为私掠舰队袭扰丹麦女王玛格丽特，但后来背叛了雇主。1401年，他在黑尔戈兰附近被俘，并被押往汉堡处决。关于他的处决，流传着一个引人入胜的传说：他请求在头颅被斩下后，他的无头身体走过的船员能得到赦免。据称，他在被斩首后真的站了起来，并走过了几名同伴，直到被刽子手绊倒。然而，这几名同伴最终还是被全部处决了。施特尔特贝克的名字义为“#italic 一口气喝干一杯酒#!”，这反映了他臭名昭著的酒量。"
 flavor_swe_teu.1.a: "让我们向[fief_offer_target.GetNameWithNoTooltip]寻求帮助。"
 flavor_swe_teu.1.b: "我们会自己解决他们，尽管代价可能很高昂。"
 STATIC_MODIFIER_NAME_teu_wrath_of_the_pirates: "海盗之怒"
 vtb_operates_in_the_baltic_tt: "[target_country.GetLongName]将在[ShowAreaNameWithNoTooltip('baltic_area')]沿岸开始私掠行动"
 flavor_swe_teu.2.title: "$flavor_swe_teu.1.title$"
 flavor_swe_teu.2.desc: "$flavor_swe_teu.1.victual_brother_info$为了解决这一问题，[GetCountry('SWE').GetAdjective]授予了我们接管这座岛屿的权利，只要我们能迅速展开行动，打击这些凶恶的海盗。"
 flavor_swe_teu.2.a: "我们会接受这块采邑。"
 flavor_swe_teu.2.b: "这与我们无关。"
 flavor_swe_teu.3.title: "[fief_offer_target.GetAdjectiveWithNoTooltip]的回复"
 flavor_swe_teu.3.common_desc: "一位使者终于带来了[fief_offer_target.GetName]的回复。"
 flavor_swe_teu.3.desc_success: "$flavor_swe_teu.3.common_desc$[fief_offer_target.GetAdjectiveWithNoTooltip]精英承诺派遣军队登陆[ShowProvinceDefinitionName('gotland_province')]岛，解决我们共同的敌人。按照约定，我们不会反对。"
 flavor_swe_teu.3.desc_failure: "$flavor_swe_teu.3.common_desc$很遗憾，他们拒绝了我们和平的邀请，不愿解决[pirate_nation.GetName]的邪恶海盗。看来我们必须自己上了，无论现在有多忙。"
 flavor_swe_teu.3.a: "那我们就专注于更重要的事务！"
 flavor_swe_teu.3.b: "好吧，我们会自己解决。"
 flavor_swe_teu.4.title: "粮食兄弟会"
 flavor_swe_teu.4.desc: "在被我们的[GetCountry('HSA').GetAdjective]伙伴背叛后，我们不得不干起了更卑劣的行当——海盗。我们选中了[ShowProvinceDefinitionName('gotland_province')]岛作为大本营。如果世界反对我们，那我们就面对整个世界。让我们的水手蹂躏那些弱小的商船，让那些傲慢的商人瑟瑟发抖。"
 flavor_swe_teu.4.a: "$pirate_events.1.a$"
 flavor_swe_teu.5.title: "众人垂涎之岛"
 flavor_swe_teu.5.desc: "[ShowProvinceDefinitionName('gotland_province')]岛位于波罗的海的心脏，任何希望获得#italic 波罗的海霸权#!的势力都必须占领这里。因此，肯定有其他势力正在谋划从我们手中夺取这处战略要地。随着我们的海军实力减弱，我们也许想将这座岛卖给那些势力中的一个。"
 flavor_swe_teu.5.a: "把这座岛给[first_offer.GetNameWithNoTooltip]。"
 flavor_swe_teu.5.b: "[second_offer.GetNameWithNoTooltip]肯定会接受。"
 flavor_swe_teu.5.c: "我们不会放弃我们的土地。"
 flavor_swe_teu.6.title: "关注[gutnish_province.GetNameWithNoTooltip]"
 flavor_swe_teu.6.desc: "我们对[ShowProvinceDefinitionName('gotland_province')]岛有着浓厚的兴趣。作为波罗的海的主要政权之一，控制这座位于贸易路线十字路口和波罗的海心脏的岛屿，对我们国家大有裨益。这将是我们称霸波罗的海的开端。不过，我们并不是唯一有这份雄心的国家，想要夺取这座岛屿，我们必须加快步伐。"
 flavor_swe_teu.6.a: "波罗的海会是我们的。"
 flavor_swe_teu.7.title: "[gutnish_province.GetNameWithNoTooltip]的报价"
 flavor_swe_teu.7.desc: "我们收到了[gotland_province_owner.GetName]提出的一份交易。他们愿意以许多磅黄金的价格将[ShowProvinceDefinitionName('gotland_province')]岛出售给我们。虽然我们肯定有能力自己夺取这里，但这样的和平交接不会让我们在世界眼中成为恶人，而且还避免了流血。"
 flavor_swe_teu.7.a: "听起来是笔公平的交易。"
 flavor_swe_teu.7.b: "我们为什么要付钱？"
 flavor_swe_teu.8.title: "$flavor_swe_teu.7.title$"
 flavor_swe_teu.8.common_desc: "我们终于得知了与[offer_nation.GetName]的外交行动的结果。在提议和平转交[gotland_province_owner.GetAdjective]岛后，我们认为会得到积极、感激的回应。"
 flavor_swe_teu.8.desc_success: "$flavor_swe_teu.8.common_desc$事情也确实如此，[offer_nation.GetAdjectiveWithNoTooltip]非常乐意满足我们的愿望，全额支付了黄金。"
 flavor_swe_teu.8.desc_failure: "$flavor_swe_teu.8.common_desc$但很遗憾，我们的希望落了空，[offer_nation.GetAdjectiveWithNoTooltip]讥笑了我们的使者，很明显有夺取这座岛的野心。"
 flavor_swe_teu.8.a: "希望这次交易能带来和平。"
 flavor_swe_teu.8.b: "我们必须保持警惕。"
 teu_rejected_sale: "拒绝出售提议"
 flavor_dan_teu.1.title: "圣乔治之夜起义"
 flavor_dan_teu.1.desc: "灾难降临了我们在[ShowProvinceDefinitionName('estonia_province')]的领地。当地的[ShowCultureName('estonian')]人不满我们几十年来向他们展示基督之光，发动了武装叛变。在一个平静的日子里，我们的驻军和城堡遭到了致命的袭击。他们选出了四名领袖，而且竟敢称之为“国王”。更有甚者，在邪恶的“复仇”行动中，愤怒的异教徒们开始杀害曾经的宗主和照管者。我们不会容忍如此行径，他们的叛乱将被粉碎。"
 flavor_dan_teu.1.historical_info: "在1343年的圣乔治之夜，爱沙尼亚原住民发动了对丹麦宗主和统治他们的各个异族贵族的叛乱，并选出了后来被诱杀的“四王”领导他们。这场叛乱越过了丹麦的国界，扩散到了利沃尼亚骑士团的领地和厄塞尔岛。"
 flavor_dan_teu.1.a: "该死的家伙！"
 TEU_st_georges_uprising: "在[ShowProvinceDefinitionName('estonia_province')][owned|e]的所有[ShowCultureName('estonian')][pop|e]失去[ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%][pop_satisfaction|e]，并加入[estonian_uprising.GetName]。\n他们中的#r 75.0%#!也会将[religion|e]改为[ShowReligionName('muinaisusko')]。"
 estonian_uprising: "圣乔治之夜起义"
 STATIC_MODIFIER_NAME_teu_fervor_st_georges_night_uprising: "圣乔治之夜起义"
 flavor_dan_teu.2.title: "爱沙尼亚暴动者攻击利沃尼亚"
 flavor_dan_teu.2.attack: "他们杀死看到的每一位[ShowCultureName('german_baltic')]贵族，如此漠视他们的主人和基督实在令人愤慨。他们将畏惧天堂之怒。"
 flavor_dan_teu.2.desc: "以[TEU_denmark_from.GetAdjective]的[ShowProvinceDefinitionName('estonia_province')]为中心的[ShowCultureName('estonian')]武装暴动已开始对我们的[GetCountry('LIV').GetAdjective]臣民采取行动。$flavor_dan_teu.2.attack$"
 flavor_dan_teu.2.a: "我们会给他们一个教训。"
 flavor_dan_teu.3.title: "压迫者的命运"
 flavor_dan_teu.3.desc: "最近，一支武装部队被派去镇压[target_province.GetName]的反对者。陷入仇恨的士兵开始无差别杀死当地的[ShowCultureName('german_baltic')]人，只因他们对[ShowReligionAdjective('catholic')]的信仰。"
 flavor_dan_teu.3.a: "睁一只眼闭一只眼。"
 flavor_dan_teu.3.b: "现在还不是清算的时候。"
 flavor_dan_teu.4.title: "[target_province.GetNameWithNoTooltip]的暴行"
 flavor_dan_teu.4.desc: "[teu_rebellion_tag.GetName]的杂种袭击了[target_province.GetName]无辜的[ShowCultureName('german_baltic')]人口，并展开大屠杀。我们无法阻止他们。"
 flavor_dan_teu.4.a: "他们会在地狱里偿还他们的罪行。"
 flavor_dan_teu.5.title: "我们的起义"
 flavor_dan_teu.5.desc: "我们卑劣的[ShowCultureName('german_baltic')]宗主压迫我们已经太久了。他们打压我们的信仰，将异族神灵强加给我们已经太久了，也许是时候让他们了解我们的神灵了？他们的意愿并不重要，重要的是发动斗争，摆脱他们的枷锁。"
 flavor_dan_teu.5.a: "我们不会被奴役！"
 flavor_dan_teu.6.title: "$flavor_dan_teu.2.title$"
 flavor_dan_teu.6.desc: "以[TEU_denmark_from.GetAdjective]的[ShowProvinceDefinitionName('estonia_province')]为中心的[ShowCultureName('estonian')]武装暴动对我们的盟友采取了行动。$flavor_dan_teu.2.attack$"
 flavor_dan_teu.6.a: "召集征召兵！"
 flavor_dan_teu.7.title: "麻烦的根源"
 flavor_dan_teu.7.desc: "我们在[ShowProvinceDefinitionName('estonia_province')]的领土成为了肉中的尖刺。这里与我们的首都隔着茫茫大海，我们在这里的控制力十分脆弱。如今，当地的[ShowCultureName('estonian')]人发动了突然袭击，甚至还蔓延到了邻国的[teu_receives_estonia.GetName]，也许最好尝试修复与邻国的关系，并卖掉这个破地方，反正这里已经处于[teu_receives_estonia.GetNameWithNoTooltip]的势力范围内了。"
 flavor_dan_teu.7.desc_hyperlink: "$flavor_dan_teu.7.desc$让我们和[the_deciding_nation.GetName]的决策者谈谈。"
 flavor_dan_teu.7.desc_no_hyperlink: "$flavor_dan_teu.7.desc$让我们和[the_deciding_nation.GetNameWithNoTooltip]的决策者谈谈。"
 flavor_dan_teu.7.historical_info: "在1343年的圣乔治之夜起义后，丹麦的爱沙尼亚总督和其他政府官员被亲德意志附庸囚禁，该省份的大部分地区落入条顿骑士团的控制。丹麦国王意识到他的土地难以保住，决定以1.9万科隆马克的价格将爱沙尼亚卖给骑士团。"
 flavor_dan_teu.7.a: "把这里卖了。"
 flavor_dan_teu.7.b: "我们会应对这场骚乱。"
 teu_if_teutons_accept: "如果[the_deciding_nation.GetName]接受："
 flavor_dan_teu.8.title: "出售爱沙尼亚"
 flavor_dan_teu.8.desc: "面对[ShowProvinceDefinitionName('estonia_province')]最近的叛乱，[TEU_denmark_from.GetAdjective]决定将他们在[ShowProvinceDefinitionNameWithNoTooltip('estonia_province')]的地产卖给我们。如果我们同意这一提议，这些领地将进入我们的势力范围，而[TEU_denmark_from.GetAdjectiveWithNoTooltip]会撤离战斗，让我们自己来对付这些叛徒。"
 flavor_dan_teu.8.historical_info: "$flavor_dan_teu.7.historical_info$"
 flavor_dan_teu.8.a: "我们接受这份提议。"
 flavor_dan_teu.8.b: "我们也不需要那些麻烦！"
 flavor_dan_teu.9.title: "$flavor_dan_teu.8.title$"
 flavor_dan_teu.9.desc_common: "我们关于[ShowProvinceDefinitionName('estonia_province')]所有权的慷慨提议终于得到了回复。"
 flavor_dan_teu.9.desc_success: "$flavor_dan_teu.9.desc_common$让我们高兴的是，[the_deciding_nation.GetName]接受了提议，总算不用应付这片满是叛徒的土地了。"
 flavor_dan_teu.9.desc_failure: "$flavor_dan_teu.9.desc_common$很遗憾，[the_deciding_nation.GetName]拒绝了提议，我们不仅得镇压这场叛乱，还要忍受叛乱造成的破坏，以及未来几十年的进一步骚乱。好吧，也许只要付出足够努力，这里总有一天会得到整合。"
 flavor_dan_teu.9.a: "真不错！"
 flavor_dan_teu.9.b: "该死。"
 teu_successful_dealings: "成功的交易"
 flavor_teu_special.1.title: "皮洛士式的胜利"
 flavor_teu_special.1.desc: "维尔纽斯已被武力攻占。城门破碎不堪，守军或遭屠戮或四散溃逃，城市在我们的旗帜下陷入沉寂。这座曾负隅顽抗的堡垒如今布满征服的印记，足以警示所有胆敢阻挡我们进军之人。城中百姓多有固守异教徒，他们的神殿庙已被夷平，反抗意志被刀剑与烈火碾碎，臣服已成定局。我们以铁腕推行秩序。维尔纽斯的陷落亦是向彼等传递的讯息：提醒世人我们的剑锋永不归鞘，今日维尔纽斯已倾覆；明日，其他强权也一样。愿无统治者质疑此役之深意。维尔纽斯非我们征途终点，而是迈向更广阔疆域的一步，前路早已选定。"
 flavor_teu_special.1.historical_info: "格林瓦尔德战役，于1410年7月15日在普鲁士地区爆发，战场位于坦能堡与格伦费尔德两座村庄附近。条顿骑士团在大团长乌尔里希·冯·容金根率领下，联合普鲁士各阶层武装分队、数量不明的雇佣兵以及来自西欧和中欧的骑士，在此与波兰国王瓦迪斯瓦夫二世·雅盖沃统率的波兰王国军队及维陶塔斯大公指挥的立陶宛大公国联军展开决战。自1303年持续至今的条顿骑士团‑立陶宛战争，以及条顿骑士团与自1386年起同立陶宛建立共主邦联的波兰王国之间的长期对抗，在这场战役中达到顶峰。条顿骑士团的惨败标志着其普鲁士统治走向衰落，同时开启了波兰‑立陶宛作为欧洲主要强国的崛起之路。此役被视为中世纪骑士军队间最宏大的战役之一，自19世纪以来已成为波兰与立陶宛民族史诗的重要组成部分。"
 flavor_teu_special.1.a: "天佑我主！让恐惧巩固钢铁赢得的疆土。"
 flavor_teu_special.2.title: "沃尔加斯特的陷落"
 flavor_teu_special.2.desc: "沃尔加斯特的堡垒已被攻破，其军队四散溃逃。曾飘扬旗帜之处，唯余硝烟与死寂。抵抗力量已被粉碎，统治者的权威在战败的重压下彻底崩塌。我军士兵现已占领了这片公国的城镇与道路，任何反抗的念头都被迅速扑灭。沃尔加斯特不再是宿敌，不再是威胁——它已成为被征服的土地，因胜利而重塑，凭武力而稳固。我们赢得了战争，沃尔加斯特已不复存在。下一个就是勃兰登堡！"
 flavor_teu_special.2.a: "你的就是我们的！"
 flavor_teu_special.3.title: "琥珀即黄金"
 flavor_teu_special.3.desc: "在波罗的海沿岸，琥珀长久以来被视为与黄金同等珍贵的宝藏。随着我们对沿海重镇的控制，琥珀贸易路线如今安全地贯穿我国疆域。商贾与工匠繁荣兴盛，市场因外商云集而日益壮大，市民阶层变得富足且忠诚。昔日随浪冲上岸边的散落财富，如今在我们的权威下被集中管理、规范运作并征税。琥珀贸易带来的财富巩固了我们的统治，并将沿海各城邦与我国紧密相连。我们掌控了整个波罗的海的琥珀开采产业！"
 flavor_teu_special.3.a: "让琥珀流动起来！"
 flavor_teu_special.4.title: "克拉科夫之劫"
 flavor_teu_special.4.a: "上帝已做出裁决，我们只是执行祂的旨意。"
 flavor_teu_special.5.title: "阿卡，骑士团的摇篮"
 flavor_teu_special.5.desc: "阿卡已被占领，这座对我们骑士团具有深远意义的城市重归掌控。正是在这里，条顿骑士团初具雏形——其创立初衷是为信徒带来训练、关怀与武装保护。如今阿卡再次归于我们麾下。这绝非一座可供掠夺挥霍的城市，我们依照骑士团的立身之本加固城墙、规范港口、重整行政：工程师强化防御工事，官员重建秩序，整座城市被打造为稳固的堡垒而非短暂的战利品。阿卡不仅是战略要港，更是我们源起的象征与使命的见证。"
 flavor_teu_special.5.historical_info: "条顿骑士团是一个天主教宗教组织，于1190年在耶路撒冷王国的阿卡成立，最初是一个军事团体。该组织全称为“耶路撒冷圣玛丽医院德意志兄弟骑士团”，旨在协助基督徒前往圣地朝圣并建立医院。其成员通常被称为条顿骑士，历史上曾作为十字军军事修会，在中世纪支持天主教在圣地的统治及参与北方十字军东征，同时为东欧的天主教徒提供军事保护。"
 flavor_teu_special.5.a: "我们的骑士团在此诞生——也必将在此屹立不倒。"
 flavor_teu_special.4.desc: "上帝的审判已经执行。波兰彻底覆灭，他们的世俗王冠在神的意愿与正义之师面前显得不堪一击。长久以来，其统治者选择违逆而非尽责，为立陶宛的异教徒提供庇护与援助，使他们免于应得的正义纠正。克拉科夫，这个曾为王国心脏之地，已被攻占并承受了我们胜利的全部重量。它的财富被夺取，殿堂被清空——这并非仅仅是战利品，更是对其背叛信仰事业的正当补偿。城市的毁坏是对那些将世俗联盟置于神圣秩序之上之人的惩罚。让这场毁灭既作警示，亦为报应。凡与信仰之敌为伍者，必与其同命运。波兰的陷落不仅是征服，亦是复仇——因它曾庇护异教徒，且公然蔑视神圣使命。"
 flavor_teu_special.4.b: "我们必须恢复秩序和纪律！"
 flavor_teu_special.6.title: "会堂内的声音"
 flavor_teu_special.6.desc: "在公议会堂的高墙之内，本应是纪律与传统不容挑战之地，如今却开始浮现异议之声。骑士团宗旨虽同，方法已生分歧。连年的征战、皈化与动荡，迫使领导层直面令人不安的诘问。有兄弟认为，骑士团的力量不只在于剑锋，更在于治理——保障贸易、安定城镇、以审慎权威实行统治。另一派则视此等想法为软弱，坚称骑士团生为征服与净化，绝非妥协。于他们而言，每一次退让都招致衰朽，每一次在神圣斗争中的停顿，都是对上天所托使命的辜负。这些争论绝非轻率之语。它们是在紧闭的门后说出，在发过的誓言与流过的鲜血中反复权衡。然而，议事堂已无法再假装信仰的统一必然带来愿景的一致。决议刻不容缓——因为犹豫本身，正从内部撕裂着骑士团。"
 flavor_teu_special.6.a: "骑士团必须选择自己的道路。"
 flavor_teu_special.7.title: "公议会的抉择"
 flavor_teu_special.7.a: "只有力量才能维护我们的使命。"
 flavor_teu_special.7.b: "规则必须约束刀剑。"
 flavor_teu_special.7.c: "信仰必须超脱一切世俗考量。"
 flavor_teu_special.8.title: "刀剑之路"
 flavor_teu_special.8.a: "刀剑不会质疑自己的用途。"
 flavor_teu_special.9.title: "治理之路"
 flavor_teu_special.9.desc: "公议会已做出抉择，此选择标志着一个转折点。教团不应仅靠恐怖统治，而应依靠制度、法律与延续性。各级指挥官须兼具治理者与战士的思维，不仅要通过恐惧，更要通过稳定来确保忠诚。这条道路需要耐心。道路必须维护，城镇需要管理，争端亦须审慎裁决。一些修士抱怨这是对圣战的干扰，然而另一些人则看到了教团的力量所在——一个无需依赖持续战争便能长久存续的秩序。选择治理之路，意味着教团将承受更沉重的负担——但也将对其宣称的土地，握有更稳固的掌控。"
 flavor_teu_special.9.a: "坚韧需当铸就，非一战可定。"
 flavor_teu_special.10.title: "蒙上帝恩典"
 flavor_teu_special.10.desc: "骑士团转而向内求索，不再从征伐或管理中寻求确定性，而是回归信仰本身。他们宣称，骑士团的权威仅源于上帝，唯有通过奉献、仪式与修行才能维系团结。传教士被提拔，教义得到加强，兄弟们被提醒，对神圣秩序的服从优先于一切世俗事务。这个选择可能无法平息所有争论，但它使教团更加紧密地与其神圣使命联系在一起。"
 flavor_teu_special.10.a: "吾等使命的神圣性不容置疑。"
 flavor_teu_special.11.title: "挫败的记忆"
 flavor_teu_special.11.desc: "战争已经结束，但它的阴影仍徘徊在骑士团的大厅里。兄弟们默默地聚在一起，不是为了庆祝胜利，而是为了解释损失。要塞遭弃，旗帜垂落，誓言受到失败的考验。有些人谈论背叛或厄运，另一些人则谈论蒙蔽判断的骄傲。然而，在每一种解释之下，都潜藏着同样的不安：这蒙受拣选与祝圣的修会，竟已蒙尘。这样的时刻不容忽视，因为如何记住失败可能会像任何胜利一样确定地塑造未来的道路。公议会必须决定这种损失的意义，是将其神圣化，抑或汲取教训。"
 flavor_teu_special.11.a: "吾等使命的神圣性不容置疑。"
 flavor_teu_special.11.b: "我们必须从这次失败中汲取教训。"
 flavor_teu_special.12.title: "被圣化的失败"
 flavor_teu_special.12.a: "他们的鲜血使我们的事业神圣化。"
 flavor_teu_special.13.title: "谦卑受训"
 flavor_teu_special.13.desc: "公议会选择反思而非狡辩。败绩被如实记载，未加文饰或开脱。指挥官们坦陈过失、冒进，以及将信仰误认为必然。此路并无慰藉，却带来清明。通过将失败归于己身，兄弟们申明纪律与智慧之于修会，其重要性不亚于热忱。革新并非对信仰的背叛，而是存续之道。此训虽苦——却可能确保骑士团长存。"
 flavor_teu_special.13.a: "力量始于自知。"
 flavor_teu_special.14.title: "大团长的重担"
 flavor_teu_special.14.desc: "大团长的权柄从未轻松地落于其肩，然近年来其负荷愈发沉重。他须为战时的统帅、信仰的守护者、争端的裁决人，以及远超出修道院范围的广袤领地的管理者。每一项决定都招致审视。一道旨在确保王国安全的敕令，会被斥为世俗野心；一则精神规劝，又被批评为疏于治理。修会仰望大团长寻求笃定，却无人能清晰道明这份笃定究竟应为何物。此问题已不容再缓。大团长之职本身必须被明确界定，因为若目标不清，权威恐将在疑虑中消解。"
 flavor_teu_special.14.a: "大团长首先是上帝的仆人。"
 flavor_teu_special.14.b: "大团长不仅是修士，更是君主。"
 flavor_teu_special.15.title: "精神领导权"
 flavor_teu_special.15.desc: "公议会确认，大团长的最高职责不在于行政或征服，而在于精神守护。他的权威源于信仰，也必须通过信仰来行使。仪式与教义得到加强，兄弟们被提醒，对神圣秩序的服从优先于一切世俗事务。这条道路带来道德澄明与信仰统一，却将许多实际事务交由下级官员处理。修会的目的得以净化，尽管统治的重担依然未解。"
 flavor_teu_special.15.a: "信仰指引刀剑！"
 flavor_teu_special.16.title: "世俗统治权"
 flavor_teu_special.16.desc: "公议会承认，如今骑士团所管辖的已不仅是灵魂，更是土地与人民。大团长被确认为完完全全的统治者——肩负法律、稳定与国家持久强盛之责。精神权威未被抛弃，但已为务实所调和。议会得以扩充，记录正式归档，决策的衡量标准在于其长远影响，而非即刻的正义。这一选择强化了统治体系，然而仍有弟兄低语：某些神圣之物已悄然褪色。"
 flavor_teu_special.16.a: "无论付出什么代价，都必须维持骑士团。"
 flavor_teu_special.17.title: "权威被质疑"
 flavor_teu_special.17.desc: "本应决定条顿骑士团未来的决策，反而暴露了其内在裂痕。不安情绪在各地的指挥部、要塞与治下城镇蔓延。军官质疑指令，行政官员表达忧虑，连骑士兄弟间的信心也开始动摇。有人指责既定路线使骑士团背离了真正的天职，另一些人则坚称此举未能缓解统治、战争与精神职责间日益加剧的张力。分歧已不再限于私下讨论，它正影响着命令的执行与忠诚的权衡。大团长的权威名义上依然完整，但其认同度已非普遍。骑士团将如何应对，将决定其团结是依靠强制维持——还是被彻底重塑。"
 flavor_teu_special.17.a: "异议不可容忍。"
 flavor_teu_special.17.b: "我们必须寻求可行的妥协。"
 flavor_teu_special.18.title: "权威强化"
 flavor_teu_special.18.desc: "The Grand Master acts decisively. Opposition is silenced, councils are disciplined, and the boundaries of obedience are made unmistakably clear. The Order will not fracture over indecision, nor will it allow dissent to masquerade as devotion. This show of resolve restores order — at a cost. Some brothers submit in silence, others with resentment. Unity is preserved, but it is forged through command rather than consent. The Order stands firm, though the memory of this enforcement will not soon fade."
 flavor_teu_special.18.a: "Order must be maintained."
 flavor_teu_special.19.title: "Fractured Authority"
 flavor_teu_special.19.desc: "The Order chooses accommodation over force. Authority is redistributed, councils empowered, and the Grand Master’s command reshaped to reflect a broader consensus. The immediate tension eases, and open resistance subsides. Yet compromise leaves its mark. Decisions grow slower, certainty more elusive. The Order remains united, but no longer speaks with a single voice. Authority persists — though altered, and less absolute than before. Whether this balance proves sustainable remains to be seen."
 flavor_teu_special.19.a: "力量始于自知。"
 flavor_teu_special.20.title: "The Burden of Rule"
 flavor_teu_special.20.desc: "Victory and expansion have brought the Teutonic Order dominion over lands as well as souls. Castles must be supplied, towns governed, and revenues secured. What once could be decided by command now requires administration, negotiation, and long-term planning. Different voices within the Order offer different answers. Some argue that discipline and centralized authority are the only means to preserve order. Others believe prosperity and local autonomy will bind subjects more firmly than force ever could. A third path insists that governance itself must rest upon spiritual authority, lest rule become hollow and illegitimate. The Order must decide how it will bear the weight of rule."
 flavor_teu_special.20.a: "Discipline must guide administration."
 flavor_teu_special.20.b: "Prosperity will secure loyalty."
 flavor_teu_special.20.c: "Authority must rest upon the sacred."
 flavor_teu_special.21.title: "Administrative Discipline"
 flavor_teu_special.21.desc: "The Teutonic Order imposes structure upon its lands. Registers are compiled, obligations codified, and authority flows downward through a clear chain of command. Compliance is no longer optional, nor subject to negotiation. This approach brings order and predictability, strengthening the ability of the Order to mobilize resources and enforce its will. Yet it also hardens governance. Local initiative fades, and resentment quietly grows where obedience replaces cooperation. The realm is governed efficiently — if sternly."
 flavor_teu_special.21.a: "The realm is governed efficiently — if sternly."
 flavor_teu_special.22.title: "自治与繁荣"
 flavor_teu_special.22.desc: "条顿骑士团并未加强控制，而是适当放宽管控，给予地方自主发展的空间。城镇被鼓励开展贸易，社区可自行管理事务，财富得以在境内更自由地流通。随之而来的是繁荣——市场兴盛，定居点扩张，合作取代了强制。然而，这种财富伴有一定的代价：统治者的权威不再那么直接，骑士团必须依靠激励而非命令来维持忠诚。国家日益富裕，但治理也变得更加分散。"
 flavor_teu_special.22.a: "繁荣比武力更能凝聚人心。"
 flavor_teu_special.23.title: "神圣的负担"
 flavor_teu_special.23.desc: "骑士团将信仰作为统治的基石。治理不仅被视作行政，更被塑造成一种神圣职责。神职人员地位提升，宗教机构得到强化，服从既通过法令也经由教义来巩固。这条道路赋予权威以道德分量与精神合法性，让臣民明白，服从不仅是守法，更是正义之举。然而，这种对信仰的依赖也使骑士团与宗教结构绑定得更加紧密，限制了灵活应变与妥协的空间。统治被神圣化——也因此受到约束。"
 flavor_teu_special.23.a: "信仰将支撑我们的权威。"
 flavor_teu_special.24.title: "正义的负担"
 flavor_teu_special.24.desc: "信仰长久以来都是条顿骑士团权威的基石。然而，信仰无法像领土那样被命令，强制推行也必会带来后果。在边境地区，古老的仪式与新立的誓言并存，服从往往更多出于习惯而非信念。骑士团内部，关于应如何行使神圣权威的声音并不一致。有人认为，耐心、教导与以身作则，比恐惧更能牢固地凝聚人心；另一些人则坚持，犹豫只会招致反抗，而信仰若要持久，必须由不容置疑的权威来维护。骑士团必须决定，它将如何承担这份神圣的负担。"
 flavor_teu_special.24.a: "\"我们必须以耐心与榜样引导信仰。"
 flavor_teu_special.24.b: "信仰必须强制推行，不容争论。"
 flavor_teu_special.25.title: "信仰的牧羊人"
 flavor_teu_special.25.desc: "骑士团选择了引导而非强制。传教士被派遣出去，当地习俗得到研究而非摧毁，在昔日似乎更易施以惩罚的地方，如今提供了教导。皈依成为一个过程，而非一道命令。进展缓慢，确定性难以捉摸。有人质疑这种克制是否会削弱权威。然而抵抗在软化，在许多地方，服从的滋生不再源于恐惧，而是源于熟悉。信仰悄然传播——凭借言语，而非刀剑。"
 flavor_teu_special.25.a: "信仰必须培养，而不是强迫。"
 flavor_teu_special.26.title: "信仰之剑"
 flavor_teu_special.26.desc: "骑士团果断行动。凡有信仰抗拒之处，权威必予回应。神龛被捣毁，仪式遭禁止，违逆者受到惩罚。信仰不再是良心问题，而是法律问题。秩序迅速恢复，表面的抵抗瓦解了。然而寂静之下藏着怨恨，形成的记忆是任何法令都无法抹去的。刀剑或许能强制服从，却无法命令信仰。信仰被强制执行——其代价终将偿付。"
 flavor_teu_special.26.a: "服从是信仰的基石。"
 flavor_teu_special.27.title: "Faith Under Strain"
 flavor_teu_special.27.desc: "Time has passed, and the consequences of the Order’s choice have begun to surface. In some regions, faith has taken root, strengthened by patience and understanding. In others, it endures only through silence and fear. Regardless of the path taken, the burden remains. Faith has been asserted, but unity has not come without cost. The Order stands more defined than before — and more exposed to the tensions it has chosen to create. What has been shaped cannot easily be undone."
 flavor_teu_special.27.a: "The Order must endure the consequences of faith."
 flavor_teu_special.28.title: "The Order Under Arms"
 flavor_teu_special.28.desc: "War has come swiftly, leaving little time for preparation or doubt. The banners of the Teutonic Order are raised, and brothers from across the realm are summoned to arms. Supplies are gathered, discipline reinforced, and resolve hardened by the knowledge that retreat would mean more than defeat. The Order was not founded for peace alone. In this moment, its purpose is tested — not only by the strength of its enemies, but by its own unity and will to endure. The outcome of this war will shape the Order’s future long after the fighting ends."
 flavor_teu_special.28.a: "The Order stands united."
 flavor_teu_special.28.b: "We are Warriors, not Beggars."
 flavor_teu_special.29.title: "The Frozen Supply Lines"
 flavor_teu_special.29.desc: "Winter has tightened its grip on the campaign. Roads vanish beneath snow, rivers freeze without warning, and wagons fail to arrive where they are most needed. Supplies meant for the front lie stranded far behind it. The armies of the Teutonic Order can endure hardship, but not indefinitely. Decisions made now will determine whether discipline preserves strength — or whether desperation forces harsher measures upon the land."
 flavor_teu_special.29.a: "Consolidate the army and secure what we have."
 flavor_teu_special.29.b: "Force the march, no matter the cost."
 flavor_teu_special.29.c: "Requisition supplies from the countryside."
 flavor_teu_special.30.title: "Old Rites Beneath New Churches"
 flavor_teu_special.30.desc: "Churches stand where groves once grew, and crosses rise above lands long claimed in the name of Christ. Yet beneath the surface of obedience, old customs endure. In villages newly converted, prayers are spoken in unfamiliar ways, and offerings are made beyond the sight of the altar. Reports reach the Order of rites performed quietly, beneath church walls and in forest clearings nearby. The people attend Mass, swear their oaths, and pay their dues — yet their faith remains divided, layered atop beliefs far older than the Order itself. To confront these practices risks unrest. To ignore them risks allowing faith to hollow from within. The Order must decide how deeply it will press its authority into the souls of the borderlands."
 flavor_teu_special.30.a: "Let the old customs fade in time."
 flavor_teu_special.30.b: "Strengthen the mission and guide them properly."
 flavor_teu_special.30.c: "The old rites must be eradicated."
 flavor_teu_special.31.title: "Too Many Castles, Too Few Brothers"
 flavor_teu_special.31.desc: "The Order’s banners fly from many walls, yet not every fortress stands as it should. Castles taken in war or granted in peace now stretch the brotherhood thin. Garrisons are small, commanders overburdened, and distant strongholds grow reliant on local arrangements rather than direct oversight. The Order was forged to hold what it conquers, but expansion has outpaced recruitment. Each solution carries risk withdrawal invites weakness, delegation invites disloyalty, and renewed recruitment tests the discipline of the Order itself. How the Order responds will shape not only its defenses, but its very character."
 flavor_teu_special.31.a: "Consolidate our forces and abandon lesser holdings."
 flavor_teu_special.31.b: "Entrust the lesser castles to loyal nobles"
 flavor_teu_special.31.c: "Recruit new brothers to hold every wall."
 flavor_teu_special.32.title: "Hunger Behind the Walls"
 flavor_teu_special.32.desc: "The ice has not only halted wagons and rivers — it has stalled choice itself. Supplies meant for the frontier lie frozen in distant depots, while garrisons and towns alike begin to feel the strain. Bread is weighed. Grain is counted. Every decision now determines who eats — and who does not. Commanders argue that soldiers must be fed first, for walls cannot be held by the hungry. Town officials warn that unrest will follow if civilians are left to starve. Others propose strict rationing, spreading hardship evenly and hoping discipline will hold. Winter does not negotiate. It only endures."
 flavor_teu_special.32.a: "The walls must be held, whatever the cost."
 flavor_teu_special.32.b: "The people must not be abandoned"
 flavor_teu_special.32.c: "All will endure this winter together."
 flavor_teu_special.99.title: "Judgment by Fire in Königsberg"
 flavor_teu_special.99.desc: "The investigations ordered by the Teutonic Knights have reached their conclusion. The elders of the Pruthenian clans, long suspected of preserving pagan rites, were found guilty of heresy and sedition. Though their influence was quiet, it was persistent — a defiance rooted not in arms, but in belief.  At dawn, the sentences were carried out. Before the assembled townsfolk of Königsberg, the elders were bound to the stake and burned, their idols cast into the flames alongside them. The Order proclaimed the act a necessary purification, a reminder that no faith but that of the Cross may endure within its dominion. Yet as the fires died, silence did not bring peace. Whispers spread through the countryside, and resentment took root where fear once stood. The flames that consumed the elders may yet kindle a wider defiance."
 flavor_teu_special.99.a: "Let all know the price of heresy"
 flavor_teu_special.100.title: "From Sparks to Embers"
 flavor_teu_special.100.desc: "The first signs of unrest, once dismissed as isolated acts of defiance, have not faded as expected. Instead, they have spread quietly from village to village, carried by memory, kinship, and belief. What began with a handful of executions and forced sermons has awakened forces long thought buried beneath the Order’s rule. In the wake of the initial crackdowns, elders and local leaders now move with purpose. The Romuva faith, emboldened rather than broken, finds new adherents and renewed confidence. Secret gatherings grow larger, rituals more frequent, and resistance more coordinated. The land itself seems to remember older loyalties, older gods. The measures taken to suppress dissent have contained the unrest only in appearance. Beneath the surface, something stronger is forming — a movement that waits for the moment when preparation gives way to open defiance."
 flavor_teu_special.100.a: "This cannot be allowed to fester.."
 flavor_teu_special.101.title: "The Romuva Uprising"
 flavor_teu_special.101.desc: "What began as scattered defiance has now erupted into open rebellion. Across Pruthenian and Samogitian lands, the old faith rises from secrecy into the open, carried by fury, grief, and memory. Shrines long hidden are restored, sacred groves reclaimed, and the symbols of the Cross torn down wherever the Order’s authority falters. The executions in Königsberg did not extinguish pagan belief — they forged martyrs. Elders burned by the Knights are now spoken of as holy witnesses, their deaths invoked in chants and oaths sworn against the Order. Villages refuse obedience, levies abandon their banners, and armed bands gather beneath signs older than the castles that dominate the land. This is no longer unrest that can be silenced by punishment alone. The Romuva faith has become a banner of resistance, and its followers now challenge the Order not in whispers, but in arms. Unless met with overwhelming force, the rebellion threatens to tear entire provinces from our grasp."
 flavor_teu_special.101.a: "Heresy spreads when discipline falters."
 flavor_teu_special.102.title: "火焰洗礼"
 flavor_teu_special.102.desc: "The Order has resolved that hesitation is no longer an option. Where pagan belief persists, it shall be broken — not through persuasion, but through force. Knights, priests, and magistrates are dispatched to the rebellious lands, armed with scripture and sword alike. Villages are gathered, shrines torn down, and the rites of baptism imposed upon those who resist. Many submit outwardly, accepting the sign of the Cross under threat of punishment. Yet beneath this enforced obedience, resentment festers. Faith compelled by violence breeds not devotion, but martyrs. For every soul forced into the Church, another clings more fiercely to the old gods in secret. The rebellion does not vanish — it changes form, driven now by memory, bitterness, and the promise of vengeance."
 flavor_teu_special.102.a: "Only fire can cleanse such corruption."
 flavor_teu_special.50.title: "The Shadow of Pestilence"
 flavor_teu_special.50.desc: "A silent terror spreads through the lands of the Teutonic Order. It arrives without banners or warning, carried along roads and rivers, slipping past walls and watchmen alike. Villages fall quiet, towns shutter their gates, and the sick are spoken of in whispers rather than names. No oath shields against it, no sword can strike it down. Brothers collapse in infirmaries, peasants abandon their fields, and trade slows as fear outweighs profit. Prayers are offered, remedies attempted, yet the pestilence shows little regard for rank, devotion, or discipline. As death walks the realm unchecked, the Order is forced to confront a truth long ignored: power can conquer lands, but it cannot command disease. How the Order responds to this calamity will shape not only its survival, but how it is remembered by those who endure."
 flavor_teu_special.50.a: "Seal the roads and impose order."
 flavor_teu_special.50.b: "Place our faith in prayer and mercy."
 flavor_teu_special.50.c: "Keep the markets open, whatever the cost."
 flavor_teu_special.51.title: "The Cost of Open Gates"
 flavor_teu_special.51.desc: "Trade routes remained open, markets stayed active, and the flow of goods never ceased. Yet the pestilence moved just as freely. Merchants carried profit — and contagion — from town to town, and the sickness spread faster than any decree could contain. While commerce softened the immediate shock, the long-term toll has become impossible to ignore. Prosperity withers where death lingers, and the countryside grows restless as losses mount. The Order preserved trade, but it now bears the burden of the consequences."
 flavor_teu_special.51.a: "The price of prosperity must be paid."
 flavor_teu_special.60.title: "In the Footsteps of Hermann von Salza"
 flavor_teu_special.60.desc: "Generations have passed since the days of Hermann von Salza, yet his name still lingers in the halls of the Order. Not as legend alone, but as precedent. He balanced sword and word, faith and pragmatism, binding the fate of the Order not merely to conquest, but to recognition, diplomacy, and restraint. Some within the Order speak of his legacy with reverence, others with quiet discomfort. To follow in his footsteps would demand more than courage — it would require compromise, patience, and the willingness to wield influence without force. As the Order stands at a crossroads once more, the question arises. Was Hermann von Salza an exception of his age, or a model long neglected?"
 flavor_teu_special.60.a: "Diplomacy was his sword."
 flavor_teu_special.60.c: "Faith gave him authority — not compromise."
 flavor_teu_special.71.title: "Summer’s Trade"
 flavor_teu_special.71.desc: "With the arrival of summer, roads clear and rivers grow busy once more. Merchants return to the markets, caravans move between towns, and goods long withheld by fear or hardship flow again. The warmth of the season brings opportunity — but also choices. Trade may be encouraged freely, regulated for the benefit of the Order, or redirected to ensure stability and supply above all else. Each approach promises gain, yet each carries its own cost. How the Teutonic Order guides this season of commerce will shape more than its coffers."
 flavor_teu_special.71.a: "Let the markets flourish."
 flavor_teu_special.71.c: "Secure supply before profit."
 flavor_teu_special.72.title: "Spring’s Renewal"
 flavor_teu_special.72.desc: "The thaw comes slowly, but it comes all the same. Snow recedes from the fields, roads reopen, and the land draws breath after the long stillness of winter. What was broken is not yet mended, but it may yet be made whole. Across the territories of the Teutonic Order, attention turns to renewal. Fields must be sown anew, authority reaffirmed where it faltered, and meaning found in survival itself. Spring offers no certainty — only the chance to begin again. How the Order guides this season of renewal will shape the months to come."
 flavor_teu_special.72.a: "Restore the land and the people."
 flavor_teu_special.72.b: "Restore order and administration."
 flavor_teu_special.72.c: "Give thanks and seek renewal through faith."
 flavor_teu_special.73.title: "Autumn’s Harvest"
 flavor_teu_special.73.desc: "The year turns, and with it comes the harvest. Fields are cut, barns filled, and the labor of spring and summer is weighed against the needs of the months ahead. For the lands of the Teutonic Order, this season is more than custom — it is survival. A strong harvest brings security, but also choice. Grain may be stored to guard against hardship, sold to enrich towns and merchants, or claimed to strengthen the Order itself. Each path promises stability in one form, and strain in another. The harvest will not judge the decision — winter will."
 flavor_teu_special.73.a: "Secure the granaries for the people."
 flavor_teu_special.73.b: "Sell the surplus while markets are strong."
 flavor_teu_special.73.c: "The harvest must serve the Order."
 flavor_teu_special.74.title: "Winter’s Crusade"
 flavor_teu_special.74.desc: "In the frozen borderlands, a Romuva settlement has withheld its annual dues. Messengers sent to collect the tribute returned empty-handed, bearing excuses instead of coin. The harvest, they claim, was poor. Winter came early. There is nothing left to give. Few within the Order accept this explanation at face value. The settlement lies on contested ground, far from the centers of authority, where old beliefs endure and obedience is measured by convenience rather than oath. To tolerate defiance here is to invite it elsewhere. Yet winter is a cruel season for punishment. Hunger already stalks the countryside, and force applied now will not go unanswered — by blade, by belief, or by resentment. The Order must decide how to respond."
 flavor_teu_special.74.a: "Defiance must be crushed, even in winter."
 flavor_teu_special.74.b: "Let faith finish what hunger has begun."
 flavor_teu_special.74.c: "Accept hardship and preserve the peace."
 flavor_teu_special.75.title: "The Shadow of Grunwald"
 flavor_teu_special.75.desc: "In the aftermath of the catastrophe at Grunwald, whispers of betrayal spread through the lands of the Order. Attention soon turns to the Lizard Union — a noble association founded by Nicholas von Renys, John of Pulkow, and the brothers Frederick and Nicholas of Kitnow, bound by oaths, symbols, and grievances rather than open rebellion. During the battle itself, Nicholas von Renys bore the banner of the Culmerland troops. At a critical moment, the banner was lowered. Some claimed this signaled retreat and sowed confusion among the Order’s ranks; others insisted the banner merely fell from sight amid the chaos of battle, or that its bearer was struck down. No account can be proven beyond doubt. Yet defeat demands explanation. As Polish forces pressed the siege of Marienburg, letters urging surrender circulated from Kulm, quickly attributed to the Lizard Union. Whether these messages were truly theirs, exaggerated by rumor, or seized upon for convenience remains uncertain. What is clear is that blame offered solace where answers did not.The Order now stands at a crossroads to treat the Union as deliberate traitors, to punish selectively and restore authority, or to acknowledge that defeat may not be explained by treachery alone."
 flavor_teu_special.75.historical_info: "The union was founded by Nicholas von Renys, John of Pulkow, Frederick of Kitnow, and Nicholas of Kitnow. It was named after its emblem, a lizard (German: eyne eydechse), and expanded its influence to other provinces. During the Battle of Grunwald in 1410, Nicholas von Renys carried the banner of the Culmerland troops for the Teutonic Order, but lowered the banner prematurely, which was considered a signal for retreat. Some chroniclers of the time said that this contributed to the defeat of the Knights, which Heinrich von Treitschke's thesis Das deutsche ordensland Preussen popularized, but this lacks historical support. It is also possible that von Reyns didn't intentionally lower the banner early, and that it moved out of sight or fell when a bearer was killed. After their defeat at Grunwald, the Order sought to use the Lizard League as a scapegoat; the League was also believed to have been behind messages sent from Kulm advising the Order's surrender, when at the time its capital Marienburg was under Polish siege.[1] Renys was executed by the Order after the war, causing the remaining members of the Lizard Union to flee to Poland.[2] The Union was declared illegal[citation needed] by Pope Gregory XII and Emperor Sigismund, and was subsequently dissolved in 1411. It laid the foundation, however, for the later Prussian Confederation, which requested the annexation of the State of the Teutonic Order into Poland in 1454."
 flavor_teu_special.75.a: "Treason cannot be tolerated, whatever its form."
 flavor_teu_special.75.b: "The truth is uncertain — order must be restored without spectacle."
 flavor_teu_special.75.c: "The defeat was not the work of conspirators alone."
 flavor_teu_special.76.title: "The Flight of the Lizards"
 flavor_teu_special.76.desc: "The verdict is delivered swiftly. Nicholas von Renys is condemned and executed, and with his death the message is unmistakable. Fear spreads through the ranks of the lesser nobility, particularly among those once associated with the Lizard Union. Many choose exile over submission. Estates are abandoned, loyalties transferred, and former subjects of the Order seek protection beyond its borders — most notably in Poland. The Union is broken, but the wound it leaves behind does not heal easily. The Order has demonstrated strength, yet unity has been purchased at a heavy cost."
 flavor_teu_special.76.historical_info: "The union was founded by Nicholas von Renys, John of Pulkow, Frederick of Kitnow, and Nicholas of Kitnow. It was named after its emblem, a lizard (German: eyne eydechse), and expanded its influence to other provinces. During the Battle of Grunwald in 1410, Nicholas von Renys carried the banner of the Culmerland troops for the Teutonic Order, but lowered the banner prematurely, which was considered a signal for retreat. Some chroniclers of the time said that this contributed to the defeat of the Knights, which Heinrich von Treitschke's thesis Das deutsche ordensland Preussen popularized, but this lacks historical support. It is also possible that von Reyns didn't intentionally lower the banner early, and that it moved out of sight or fell when a bearer was killed. After their defeat at Grunwald, the Order sought to use the Lizard League as a scapegoat; the League was also believed to have been behind messages sent from Kulm advising the Order's surrender, when at the time its capital Marienburg was under Polish siege.[1] Renys was executed by the Order after the war, causing the remaining members of the Lizard Union to flee to Poland.[2] The Union was declared illegal[citation needed] by Pope Gregory XII and Emperor Sigismund, and was subsequently dissolved in 1411. It laid the foundation, however, for the later Prussian Confederation, which requested the annexation of the State of the Teutonic Order into Poland in 1454."
 flavor_teu_special.76.a: "Let them flee — the Order will endure."
 flavor_teu_special.77.title: "A Union Dissolved"
 flavor_teu_special.77.desc: "The Order chooses restraint over spectacle. Rather than public trials or sweeping purges, pressure is applied quietly and decisively. External authority is invoked where possible, and in time the Lizard Union is formally declared unlawful by both Pope Gregory XII and Emperor Sigismund. Without open resistance or martyrdom, the Union dissolves. Its members scatter, some reconciling with the Order, others withdrawing from public life altogether. The threat fades without bloodshed, though its memory lingers beneath the surface. Order is restored — not by force, but by legitimacy."
 flavor_teu_special.77.historical_info: "The union was founded by Nicholas von Renys, John of Pulkow, Frederick of Kitnow, and Nicholas of Kitnow. It was named after its emblem, a lizard (German: eyne eydechse), and expanded its influence to other provinces. During the Battle of Grunwald in 1410, Nicholas von Renys carried the banner of the Culmerland troops for the Teutonic Order, but lowered the banner prematurely, which was considered a signal for retreat. Some chroniclers of the time said that this contributed to the defeat of the Knights, which Heinrich von Treitschke's thesis Das deutsche ordensland Preussen popularized, but this lacks historical support. It is also possible that von Reyns didn't intentionally lower the banner early, and that it moved out of sight or fell when a bearer was killed. After their defeat at Grunwald, the Order sought to use the Lizard League as a scapegoat; the League was also believed to have been behind messages sent from Kulm advising the Order's surrender, when at the time its capital Marienburg was under Polish siege.[1] Renys was executed by the Order after the war, causing the remaining members of the Lizard Union to flee to Poland.[2] The Union was declared illegal[citation needed] by Pope Gregory XII and Emperor Sigismund, and was subsequently dissolved in 1411. It laid the foundation, however, for the later Prussian Confederation, which requested the annexation of the State of the Teutonic Order into Poland in 1454."
 flavor_teu_special.77.a: "Let authority, not vengeance, prevail."
 flavor_teu_special.78.title: "The Question of Responsibility"
 flavor_teu_special.78.desc: "The Order resists the temptation to explain defeat through betrayal alone. No definitive proof emerges that the lowering of the banner was deliberate, nor that the Lizard Union conspired to undo the Order at Grunwald. The chaos of battle offers no certainty, only fragments of truth shaped by fear and loss. Attention turns inward. Command decisions, coordination, and overconfidence are examined with an honesty rarely afforded in times of war. This path offers no easy absolution, but it avoids the bitterness born of misplaced blame. The defeat remains — but it is understood as a failure of judgment, not merely loyalty."
 flavor_teu_special.78.historical_info: "The union was founded by Nicholas von Renys, John of Pulkow, Frederick of Kitnow, and Nicholas of Kitnow. It was named after its emblem, a lizard (German: eyne eydechse), and expanded its influence to other provinces. During the Battle of Grunwald in 1410, Nicholas von Renys carried the banner of the Culmerland troops for the Teutonic Order, but lowered the banner prematurely, which was considered a signal for retreat. Some chroniclers of the time said that this contributed to the defeat of the Knights, which Heinrich von Treitschke's thesis Das deutsche ordensland Preussen popularized, but this lacks historical support. It is also possible that von Reyns didn't intentionally lower the banner early, and that it moved out of sight or fell when a bearer was killed. After their defeat at Grunwald, the Order sought to use the Lizard League as a scapegoat; the League was also believed to have been behind messages sent from Kulm advising the Order's surrender, when at the time its capital Marienburg was under Polish siege.[1] Renys was executed by the Order after the war, causing the remaining members of the Lizard Union to flee to Poland.[2] The Union was declared illegal[citation needed] by Pope Gregory XII and Emperor Sigismund, and was subsequently dissolved in 1411. It laid the foundation, however, for the later Prussian Confederation, which requested the annexation of the State of the Teutonic Order into Poland in 1454."
 flavor_teu_special.78.a: "We must learn, not accuse."
 flavor_teu_special.79.title: "Word Against Word"
 flavor_teu_special.79.desc: "From the eastern borderlands come survivors bearing wounds, smoke-blackened clothes, and stories that do not align. A heathen raid struck without warning. The outlying village was overrun, its people slaughtered or scattered. Those who fled swear that the nearby fortress remained sealed throughout the attack. The baron who governs the land offers a different account. His gates, he claims, were closed not out of cowardice but caution. The garrison was small, the enemy numerous, and to sally forth would have meant losing the stronghold entirely. He insists that he acted in the Order’s best interest. No witnesses remain untainted by loss or fear. The peasants accuse him of abandoning his duty. The baron accuses them of panic and exaggeration. Records are incomplete. Messages arrived too late. The Order must now judge — not with certainty, but with authority."
 flavor_teu_special.79.a: "He abandoned those under our protection."
 flavor_teu_special.79.b: "He acted to preserve the Order’s hold on the border."
 flavor_teu_special.79.c: "The truth cannot be known — responsibility must be shared."
 flavor_teu_special.80.title: "A Baron Made an Example"
 flavor_teu_special.80.desc: "The Order’s judgment is swift. The baron is stripped of his charge, his lands reassigned, his fate discussed in hushed tones across the borderlands. The message is unmistakable: authority does not absolve neglect. Among the peasantry, word spreads that the Order still remembers its duty as protector. Among the lesser nobility, however, the verdict is received with unease. If caution in the face of danger is treated as failure, then service itself has become a risk. Justice has been done — but its echo carries further than intended."
 flavor_teu_special.80.a: "Duty is not just a word."
 flavor_teu_special.81.title: "The Baron’s Choice"
 flavor_teu_special.81.desc: "Another raid strikes the same lands, fiercer than before. This time, no survivors reach the fortress gates. By the time Order forces arrive, the village lies abandoned and silent. Soon after, the baron himself is gone — his household emptied, his banners lowered. Some claim he fled east, seeking protection beyond the Order’s reach. Others insist he merely vanished into the chaos he once endured behind closed gates. Whatever the truth, his absence speaks louder than any defense he once offered. The frontier has not only been breached. It has been abandoned."
 flavor_teu_special.81.a: "Find Him!"
 flavor_teu_special.82.title: "Refusal of the Tithe"
 flavor_teu_special.82.desc: "The villages along the frontier no longer resist openly — they resist quietly. Tithes arrive late, or not at all. Excuses multiply lost harvests, missing livestock, broken carts. When pressed, village elders speak of uncertainty rather than defiance. Protection, they say, was once promised. Now it is questioned. No banners are raised. No weapons taken up. Yet the Order feels the loss all the same. Authority unchallenged in law falters when obedience itself begins to fade. The border is calm — and increasingly hollow."
 flavor_teu_special.82.a: "Compliance cannot be commanded by decree alone."
 flavor_teu_special.83.title: "Who Holds the Border Now?"
 flavor_teu_special.83.desc: "The baron did not vanish beyond reach. He was found weeks later, captured by Order patrols while attempting to cross the Border to the HRE under cover of night. Brought before the Order’s authorities, his explanations rang hollow. Caution, fear, necessity — none could excuse abandonment. Judgment is swift and public. His lands are confiscated, his titles stripped, and his punishment carried out before witnesses drawn from both nobility and peasantry. The message is unmistakable the border is not held by stone alone, but by duty. In the aftermath, the Order assumes direct control of the territory. Brothers replace local authority, banners of the Order fly where personal heraldry once stood. The frontier is secured — at the cost of resentment among those who see one of their own brought low."
 flavor_teu_special.83.a: "The border is held by the Order — and by no one else."
 flavor_teu_special.84.title: "Collectors Under Guard"
 flavor_teu_special.84.desc: "The refusal of the tithe cannot be ignored indefinitely. When words fail, the Order turns to force — not in battle, but in administration. Tax collectors now travel under armed escort, their presence announced by mailed boots and drawn steel. Payments resume, but without ceremony or goodwill. Villages comply because they must, not because they believe. Elders avert their eyes as soldiers stand watch, and silence replaces argument. The coffers fill once more, yet the cost is plain. Authority enforced by guards may endure — but it does not heal."
 flavor_teu_special.84.a: "Compliance cannot be commanded by decree alone."
 flavor_teu_special.85.title: "A Border Without Lords"
 flavor_teu_special.85.desc: "The frontier stands exposed not to enemy blades, but to uncertainty. The castle remains, its walls intact, yet the authority that once governed the surrounding villages has vanished. Petitions arrive from all sides. Military commanders argue that only direct rule by the Order can secure the border. Knights of the Order see opportunity, offering to assume lordship in service and loyalty. Village elders, emboldened by the absence of their former master, quietly suggest that they might govern themselves — at least in matters of daily life. The decision will shape not only the defense of the frontier, but the nature of the Order’s rule upon it."
 flavor_teu_special.85.a: "The Order itself will govern the border."
 flavor_teu_special.85.b: "Grant the land to a knight of proven loyalty."
 flavor_teu_special.85.c: "Let the villages manage their own affairs."
 flavor_teu_special.86.title: "Knights from the Empire Answer the Call"
 flavor_teu_special.86.desc: "Word of the struggle on the eastern frontier has carried far beyond the Order’s lands. From across the Holy Roman Empire, knights arrive bearing their own arms, banners, and vows. Some come in devotion, others in search of glory, indulgence, or the testing of steel against heathen foes. They do not arrive as subjects, but as allies — bound by faith rather than command. Their presence bolsters the ranks and stiffens resolve, yet it also complicates authority. Each knight answers first to conscience, reputation, and God, and only then to the Order’s discipline. The Order must decide how these volunteers are to be received — as brothers, as auxiliaries, or not at all."
 flavor_teu_special.86.a: "They are brothers in faith — let them ride with us."
 flavor_teu_special.86.b: "They will fight, but under strict discipline."
 flavor_teu_special.86.c: "Our war is ours alone."
 flavor_teu_special.87.title: "Unruly Swords"
 flavor_teu_special.87.desc: "Reports arrive from within the Order’s own administrative lands, carried not by enemies but by frightened villagers. Armed men bearing foreign heraldry — knights and retainers who arrived under the banner of holy aid — have taken livestock, grain, and coin. Some claim the men lost their way in unfamiliar territory, mistaking Order lands for hostile ground. Others insist the plundering was deliberate, carried out under the belief that service in a holy war excused such acts. No clear orders were given, and no single commander claims responsibility.What is beyond doubt is the damage done. The villages look not to distant banners, but to the Order itself, demanding to know whether protection ends when help arrives.The Order must decide how to answer disorder born of zeal."
 flavor_teu_special.87.a: "Make an example of them — discipline above all."
 flavor_teu_special.87.b: "Repair the damage quietly and move on."
 flavor_teu_special.87.c: "War is chaos. Such things cannot always be prevented."
 flavor_teu_special.88.title: "Too Many Banners, One Command"
 flavor_teu_special.88.desc: "The host assembled beneath the Order’s banners is impressive — and unruly. Knights from across the Empire ride under their own heraldry, answer to their own captains, and measure authority by reputation rather than rank. Orders are followed when they align with honor, questioned when they do not. Disputes arise over precedence, tactics, and spoils. What should be a single force begins to resemble an alliance of armed intentions. The Order’s commanders warn that discipline cannot be improvised in the midst of war. Steel may be plentiful, but command is not."
 flavor_teu_special.88.a: "All who fight here obey the Order’s command."
 flavor_teu_special.88.b: "Let each banner fight as it sees fit."
 flavor_teu_special.88.c: "Authority must be shared, not imposed."
 flavor_teu_special.89.title: "Songs of the Crusade"
 flavor_teu_special.89.desc: "Minstrels and preachers carry tales of the war far beyond the frontier. They sing of charging knights, burning shrines, and battles framed as trials of faith. In taverns and courts alike, the Order’s struggle is reshaped into legend. These songs inspire devotion and draw new volunteers — but they also distort reality. Expectations rise, discipline loosens, and those who arrive seeking glory often lack patience for command. The Order must decide whether to ride the wave of legend, guide it carefully, or silence it before myth overtakes command."
 flavor_teu_special.89.a: "Let the songs spread — faith thrives on legend."
 flavor_teu_special.89.b: "Guide the story, lest it guide us."
 flavor_teu_special.89.c: "This war needs soldiers, not myths."
 flavor_teu_special.90.title: "Foreign Knights Take Offense"
 flavor_teu_special.90.desc: "The Order’s insistence on discipline has restored command — but not goodwill. Among the knights who arrived from the Empire, resentment spreads quietly. Men of noble birth, accustomed to autonomy and honor, bristle at public reprimand and rigid command. Some depart without ceremony, their banners folded and their service withdrawn. Others remain, but with colder hearts. Letters travel westward, carrying accounts not of holy struggle, but of insult and slight. The Order has asserted authority. Yet authority, once enforced upon allies, carries a cost beyond the battlefield."
 flavor_teu_special.90.a: "我们无法命令荣誉——只能要求服从。"
 flavor_teu_special.90.b: "伤口未溃烂前，就该及时愈合。"
 flavor_teu_special.91.title: "When the Songs Fade"
 flavor_teu_special.91.desc: "The songs that once carried the Order’s name across the Empire begin to quiet. Minstrels move on. Preachers find new causes. Those who came seeking glory depart with stories less radiant than the verses that drew them east. What remains is the work itself — garrisons to maintain, lands to govern, borders to hold. The war endures, stripped of its legend. Where enthusiasm once filled ranks, routine now sustains them. The Order stands unchanged in purpose, but no longer elevated by song. Faith and steel remain — without applause."
 flavor_teu_special.91.a: "Let deeds endure where songs do not."
 flavor_teu_special.91.b: "We must reignite the fire of legend."
 flavor_teu_special.92.title: "战争结束了？"
 flavor_teu_special.92.desc: "旗帜已经降下，条约已经签署，但土地仍未安宁。武装队伍仍然在边境地区游荡——这些老兵多年来只知道战争。有些人声称他们继续防御残存的威胁。其他人则进行劫掠，解决旧怨，或者干脆拒绝放下武器。村庄抱怨说，士兵们不再听从任何命令。指挥官坚称这些人难以召回，激怒他们很危险，而且他们太有用，不能轻易解散。现在秩序必须决定战争是否真正结束——以及要付出什么代价才能实现这一点。"
 flavor_teu_special.92.a: "解除他们的武装，必须强制执行和平。"
 flavor_teu_special.92.b: "把他们派到边境去干活。"
 flavor_teu_special.92.c: "让事情顺其自然吧。"
 flavor_teu_special.93.title: "有去无回的商人"
 flavor_teu_special.93.desc: "商队一如既往地离开骑士团的城镇——满载货物的马车、签署完毕的契约、许下承诺的商人。但近几个月来，太多人未能归来。没有哪条道路被特别点名，也没有明确的罪魁祸首。有些商队彻底消失无踪，另一些则残缺不全地返回，货物比出发时更少，护卫不见踪影，众人的说辞也矛盾重重。商人们指责是土匪、叛逃士兵或边境外的敌对民众所为。军事指挥官坚称没有敌军公开活动。地方官员在需要答案时只会耸肩推诿。贸易并未立即停止，却在逐渐萎缩。商路日益沉寂。在利润受损之前，信任已然瓦解。骑士团必须决定：是否值得用刀剑捍卫商业？抑或损失本就是不确定性的代价？"
 flavor_teu_special.93.a: "不惜一切代价保护商业。"
 flavor_teu_special.93.b: "找到原因并解决！"
 flavor_teu_special.93.c: "在动荡时期损失是不可避免的。"
 flavor_teu_special.94.title: "无目标之人"
 flavor_teu_special.94.desc: "骑士团的命令得到遵从。武器被上交，巡逻队解散，旗帜被收起，曾经列队行进的士兵们如今却漫无目的地流荡。老兵们回到不再需要他们的村庄，或是回到他们几乎认不出的故土。有人借酒消愁，有人争吵不休，少数人公开谈论那些生活尚有意义、命令清晰明确、目标毋庸置疑的岁月。战争已然结束——但并非所有参战者都在和平中找到了自己的归宿。"
 flavor_teu_special.94.a: "和平自有其代价。"
 flavor_teu_special.95.title: "边境永无宁日"
 flavor_teu_special.95.desc: "士兵们始终处于武装状态，被分配到边境沿线的巡逻队、哨所和临时指挥点。劫掠事件总能得到迅速回应，曾经的战时必需变成了日常惯例。村庄生活在持续监视之下，和平仅存于纸面。在这片边疆地带，战争只是换了一副模样。"
 flavor_teu_special.95.a: "有些地方永无宁日。"
 flavor_teu_special.96.title: "永无止境的战争"
 flavor_teu_special.96.desc: "由于没有明确的解除武装命令，武装团伙依然存在。一些人声称要防范已不存在的威胁，另一些人则四处劫掠、了结宿怨，或干脆能抢就抢。村庄再也分不清士兵与土匪，战争仅名义上结束，其暴力仍在蔓延，无人认领，也无人控制。"
 flavor_teu_special.96.a: "未竟之事，终将归来。"
 flavor_teu_special.97.title: "边境之子"
 flavor_teu_special.97.desc: "在边境地区，孩子们不再问下一场战争何时到来——只问它将在哪里发生。许多孩子在军营、劫掠和荒芜的田野中长大，在学习贸易或祈祷之前就学会了训练和怀疑。一些指挥官认为这些孩子应该从小就被塑造成士兵，以适应边疆的现实。另一些人则坚持认为，如果没有信仰和知识，秩序只会继承更多的暴力。许多家庭经过多年不确定性的折磨，只希望能被留在一旁。如何引导这些孩子将决定的不是下一次战役，而是下一代。"
 flavor_teu_special.97.a: "边境征召士兵。"
 flavor_teu_special.97.b: "他们必须先学会信仰，再学习战争。"
 flavor_teu_special.97.c: "此事不由骑士团决定。"
 flavor_teu_special.98.title: "战争的代价"
 flavor_teu_special.98.desc: "无论战争的结果如何，其影响都会长久存在。道路需要修复，驻军需要支付，要塞需要维护，因多年冲突而流离失所的人们也需要安置。即使和平也需要资源。国库在逐渐累积的义务下变得紧张，几乎难以察觉。每一次延迟或临时支付都会将负担转移到其他地方——城镇、阶层或未来本身。秩序必须决定如何承担这些费用，以及由谁来承担。"
 flavor_teu_special.98.a: "生活在我们保护下的人必须做出贡献。"
 flavor_teu_special.98.b: "我们必须量入为出。"
 flavor_teu_special.98.c: "未来会解决我们无法解决之事。"
 flavor_teu_special.120.title: "扎根的教训"
 flavor_teu_special.120.desc: "岁月流逝，老兵的话语不再像是回忆，而更像是教导。在训练场、炉火旁和道路上，同样的教训被反复讲述。有些人说训练度关乎生存，服从是生死之别。另一些人则警告不要鲁莽勇敢，敦促在曾经的热忱之处保持耐心和克制。并非所有教训都是刻意的。许多只是故事，一遍遍地复述，这一代人不仅由命令塑造，也由记忆塑造。"
 flavor_teu_special.120.a: "他们必须首先学会纪律。"
 flavor_teu_special.120.b: "他们必须学会何时不该战斗。"
 flavor_teu_special.120.c: "让故事引领他们，而非教条。"
 flavor_teu_special.121.title: "为歌而来"
 flavor_teu_special.121.desc: "并非所有响应号召的人都是出于信仰或责任。有些人是被那些传说本身吸引而来——期望获得无需付出努力的荣誉，不需服从就能得到的荣耀。随着传说的消逝，他们的热情也随之减退。随之而来的是训练问题。抱怨四起。人们悄悄离开，没有告别。虽然人数减少了，但或许留下的都是更好的人。"
 flavor_teu_special.121.a: "让那些寻找荣耀的人离去吧。"
 flavor_teu_special.122.title: "神话重燃"
 flavor_teu_special.122.desc: "沉默未必意味着屈服。在骑士团内部，有声音认为歌谣与传说的消逝并非必然，而是一种选择。传奇不会凭空出现——它们需要被培育、传颂与神圣化。有人主张将抗争本身重新定义为神圣之举，将其艰辛视为神恩的证明。另一些人则主张更审慎的方式，编纂一部语调克制的官方编年史，在保持可信度的同时塑造记忆。骑士团必须决定是否重燃其传说——以及点燃怎样的火焰。"
 flavor_teu_special.122.a: "让信仰为苦难赋予意义。"
 flavor_teu_special.122.b: "历史必须被引导，而非凭空捏造。"
 flavor_teu_special.122.c: "我们将摒弃传说来统治。"
 flavor_teu_special.123.title: "留在原地的军队"
 flavor_teu_special.123.desc: "让老兵驻守边境的决定揭示了一个意想不到的机遇。在已建立的村庄和设防城镇之外，存在着大片未开垦的土地，许多留下的士兵要么无家可归，要么一无所有。战争剥夺了他们过去的牵绊，却也赋予了他们纪律、经验和雄心。修会中部分兄弟主张，授予这些人土地能安抚他们。但也有人警告，武装拓荒者会模糊士兵与属地的界限，催生新的利益集团，终有一日将要求自己的话语权。边境究竟该由巡逻队守卫，也可以通过犁来稳固，或者两者兼而有之？"
 flavor_teu_special.123.a: "赐予他们土地，让他们建设值得守护的未来。"
 flavor_teu_special.123.b: "他们不能在这里扎根。"
 flavor_teu_special.123.c: "他们是士兵，不是移民。"
 flavor_teu_special.124.title: "他们保卫自己所拥有的东西"
 flavor_teu_special.124.desc: "The first seasons pass, and the change is visible. Fields once untouched are broken by plow, simple homes rise where tents once stood, and watchfires burn not by order, but by habit. The veterans who were granted land have taken root. When raiders approach, alarms are raised early. When disputes arise, they are settled before reaching the Order’s courts. These settlers do not wait for command — they act, not as mercenaries or subjects, but as men defending their own labor, families, and future. The frontier is quieter now. Not because it is empty of arms, but because those who bear them have something to lose."
 flavor_teu_special.124.a: "A land defended by those who belong to it."
 flavor_teu_special.125.title: "Trade Finds Other Roads"
 flavor_teu_special.125.desc: "The absence of returning merchants does not signal collapse — but change. Trade has not ceased; it has merely shifted. Caravans now follow longer routes, safer paths, and jurisdictions where authority feels predictable and risks negotiable. Towns within the Order’s lands feel the loss gradually, fewer wagons at the gates, thinner markets, quieter inns. No decree caused this. No enemy enforced it. Commerce simply adapted. The Order must now decide how — or whether — to respond to a world that has learned to trade without it."
 flavor_teu_special.125.a: "We will make our lands worth the risk again."
 flavor_teu_special.125.b: "If trade will not trust us, it will be protected."
 flavor_teu_special.125.c: "We will rely less on distant merchants."
 flavor_teu_special.125.d: "Let others grow rich on the road."
 flavor_teu_special.126.title: "The Cost of Reassurance"
 flavor_teu_special.126.desc: "The first caravans return cautiously, their wagons lighter and their contracts narrower than before. Guarantees are demanded in writing. Escorts are negotiated. Toll exemptions become permanent concessions rather than temporary measures. Trade resumes, but not as it once did. Confidence must now be purchased repeatedly, not assumed. The Order finds that restoring trust is not a single expense, but an ongoing obligation. Commerce flows again — carefully, and at a price."
 flavor_teu_special.126.a: "Trust, once broken, must be paid for."
 flavor_teu_special.127.title: "Soldiers Who Collect Tolls"
 flavor_teu_special.127.desc: "Armed escorts bring security — but also authority. Soldiers stationed along the roads begin to interpret their mandate broadly. Fees are collected with little oversight. Disputes are settled at spearpoint. Merchants pay quickly, not out of respect, but caution. Trade moves, protected by steel, yet trust continues to erode. What began as protection now resembles control, and the line between toll and extortion grows thin. The road is safe. It is no longer free."
 flavor_teu_special.127.a: "Order is maintained, whatever its form."
 flavor_teu_special.128.title: "An Economy Turned Inward"
 flavor_teu_special.128.desc: "As foreign merchants fade from the roads, local exchange fills part of the void. Towns trade with villages. Guilds rely less on distant partners and more on predictable, modest demand. Growth slows, but volatility recedes. The Order’s lands become quieter, more self-contained, and less exposed to disruption beyond their borders. Wealth accumulates slowly, unevenly, and without spectacle. The Order does not grow richer — but it grows steadier."
 flavor_teu_special.128.a: "We will endure without applause."
 flavor_teu_special.129.title: "Peace Written in Ink, Not in Trust"
 flavor_teu_special.129.desc: "The war with Poland and Lithuania has ended not with reconciliation, but with documents. Treaties have been signed, borders traced, obligations listed with careful precision. By law and seal, the conflict is over. Yet along the frontier, few believe the matter settled. Merchants cross borders only with guarantees. Local commanders watch their counterparts with caution. Villages remember burned fields and broken oaths more clearly than clauses written in distant halls. The Order finds that peace now rests not on mutual confidence, but on enforcement and vigilance. Agreements are honored because they are written — not because they are believed. The war has ended. The distrust has not."
 flavor_teu_special.129.a: "Use the Peace to Consolidate."
 flavor_teu_special.129.b: "Peace Is a Lie We Tell Ourselves."
 flavor_teu_special.129.c: "Peace will hold — because it must."
 flavor_teu_special.130.title: "A Crusade Reforged"
 flavor_teu_special.130.desc: "The call for crusade no longer comes from the frontier, but from within the Chapter House itself. The hardliners speak first. They remind the Order that Poland has marched beside the pagans of Lithuania, that Catholic banners were raised alongside heathen standards, and that Christian blood was spilled in common cause with the unbaptized. To them, such an alliance is no different from heresy itself. “Faith is not only baptism,” they argue, “but obedience to the divine order of war. Those who fight beside the heathen have already stepped outside it.” Others answer in alarm. Poland is Catholic, crowned and recognized. To name Christians as enemies of the faith is to tear at the very fabric that once justified the Order’s existence. Rome has not spoken. Indulgences are uncertain. The eyes of Christendom are no longer blind. Yet the anger remains. The wounds of past campaigns have not healed, and many brothers believe that restraint is merely surrender disguised as virtue. If this is no longer a crusade blessed by the world, then some whisper it must become a crusade defined by the Order alone."
 flavor_teu_special.130.a: "A Crusade Without Blessing."
 flavor_teu_special.130.b: "Status Quo, it will be for now..."
 flavor_teu_special.131.title: "Rome Questions Our Cause"
 flavor_teu_special.131.desc: "The reply from Rome is careful, measured, and conspicuously incomplete. There is no condemnation, but neither is there blessing. The language speaks of restraint, of proper authority, of wars that must not outpace doctrine. It reminds the Order that crusade is not proclaimed by conviction alone, and that faith cannot be reshaped to fit necessity. Poland is named without accusation. Lithuania is mentioned without urgency. The letter lingers instead on procedure — on councils, inquiries, and the dangers of scandal. What was once taken for granted now demands justification. Within the Chapter House, the silence weighs heavily. Some read the message as betrayal. Rome hesitates while enemies gather, quibbling over words while borders bleed. Others hear a warning — that the Order now stands closer to censure than to sanctification. A crusade without Rome is still war. A crusade against Rome’s wishes may become something else entirely. For the first time in generations, the Order must consider a dangerous truth, its cause may no longer be self-evident to Christendom."
 flavor_teu_special.131.a: "Rome Does Not Forbid."
 flavor_teu_special.131.b: "If Rome Will Not Bless Us..."
 flavor_teu_special.132.title: "Reaction from the Empire"
 flavor_teu_special.132.desc: "The response from the Empire does not arrive as one voice. From the courts of princes, from episcopal seats, from the councils of imperial cities, letters begin to circulate — cautious, calculating, rarely direct. No one questions the Order’s courage. Many question its judgment. Some lords express unease. Poland is Catholic, its king crowned and recognized. To cast such a realm as an enemy of the faith feels less like crusade and more like ambition clothed in piety. These voices warn that the Order risks drawing the Empire into a war that cannot be sanctified after the fact. Others speak differently. They remember Lithuanian raids, border violence, broken truces, and Polish alliances with the unbaptized. To them, the Order still stands where the Empire does not — on the edge of Christendom, bearing burdens others debate from afar. They do not bless the cause, but they do not condemn it either. The cities calculate trade. The princes weigh balance. The bishops choose their words with care. Support, where it exists, is quiet. Doubt, where it grows, is spoken in private. No banner is raised in the Emperor’s name. No command is issued to stand down. The Empire watches.And in its silence, the Order finds neither unity nor refuge — only the knowledge that it now acts largely on its own."
 flavor_teu_special.132.a: "If the Empire Will Not Stand With Us, We Stand Alone"
 flavor_teu_special.132.b: "We Must Not Become the Empire’s Problem"
 flavor_teu_special.133.title: "Reaction from the Emperor"
 flavor_teu_special.133.desc: "The Emperor’s reply is brief, formal, and carefully weighed. He acknowledges the Order’s service to Christendom and its long vigilance along the eastern marches. He recognizes the burdens borne far from the heart of the Holy Roman Empire, where borders are sharp and peace uncertain. Yet the letter offers no blessing. Poland is named as a Catholic realm, its king lawfully crowned. Matters of faith, the Emperor writes, are not to be unsettled lightly, nor are wars between Christians to be cloaked in language better reserved for true infidels. There is concern for unity. For precedent. For the danger of allowing zeal to outrun authority. The Emperor reminds the Order that imperial peace, however fragile, rests upon restraint as much as strength. At the same time, no command is issued. No prohibition is declared.The Emperor does not forbid the Order’s actions — but neither does he claim them as his own. Support is withheld, not denied. Responsibility is left where it began.The message ends with courtesy and distancethe Empire will watch developments with care.In the Chapter House, the meaning is clear enough. The Emperor will not stop them.But he will not stand with them either."
 flavor_teu_special.133.a: "We Stand Alone in This"
 flavor_teu_special.133.b: "When Emperor and Pope Both Hesitate"
 flavor_teu_special.134.title: "Knights from the Empire Arrive — Fewer Than Before"
 flavor_teu_special.134.desc: "From the Empire, knights continue to arrive at the gates — their names recorded, their vows spoken, their arms inspected as tradition demands. The forms are observed, and on parchment nothing appears amiss. Yet the reasons for their presence have changed. These men do not speak first of faith, nor of the defense of Christendom. They ask instead about pay, about spoils, about rights of plunder and ransom. They inquire which borders are weak, which towns are wealthy, and how long the campaign is expected to last. Few arrive with letters of recommendation. Fewer still with the quiet confidence of those who believe their cause beyond question. Many come alone, unencumbered by retinues or obligations — men seeking opportunity rather than absolution. The brothers take note. The crusade still attracts swords, but no longer conviction. Where belief once filled the ranks, calculation now does. The frontier remains contested. The enemy remains formidable. But the Order must now face a troubling truth, those who come no longer ask what is right — only what can be gained."
 flavor_teu_special.134.a: "Steel Is Steel, Whatever the Motive"
 flavor_teu_special.134.b: "This Is Not Why the Order Was Founded"
 flavor_teu_special.134.c: "Gold Buys Service, Not Loyalty"
 flavor_teu_special.135.title: "The Missing Census"
 flavor_teu_special.135.desc: "Reports from across the Order’s lands no longer merely contradict one another — they undermine each other entirely. In one district, officials speak of villages abandoned after years of warfare. In another, town councils report overcrowded streets filled with refugees, discharged soldiers, and families who fled lands that never recovered. Tax registers, once the backbone of administration, now tell only fragments of the truth. Parish records speak of burials that never appear in fiscal rolls. Lists of households remain unchanged in places where the Black Death passed through in silence, leaving fields untilled and names unspoken. Elsewhere, settlements that should be empty are alive again, repopulated by migrants whose origins are unknown and undocumented. The plague did not strike evenly. Some regions were emptied in a single season; others endured wave after wave of loss. War followed where the disease receded, and migration followed war in turn. In the wake of these upheavals, the Order governs a realm it can no longer clearly count, measure, or even map with confidence. Every decision now rests on estimates rather than certainty — how much tax may be demanded, how many men can be raised, where garrisons are needed, and which lands still sustain those who live upon them. To act without knowledge risks injustice and unrest. To seek knowledge, however, demands time, resources, and the reopening of wounds many would rather leave closed. The Order must decide whether clarity is worth its cost — or whether rule must continue, imperfect and uncertain, in the shadow left by war and pestilence."
 flavor_teu_special.135.a: "We will count what remains, however long it takes"
 flavor_teu_special.135.b: "Let the Church account for souls, not numbers."
 flavor_teu_special.135.c: "Local authorities will manage what they know best"
 flavor_teu_special.135.d: "We rule what we can see — the rest will reveal itself in time."
 flavor_teu_special.136.title: "The Road to Krakau"
 flavor_teu_special.136.desc: "The decision to march on Krakau is not taken lightly. The city lies far beyond the frontier, at the heart of Polish lands, protected not only by walls but by distance, population, and the weight of its political meaning. The road south stretches through regions already strained by war. Supplies must be gathered from lands that have little left to give. Rivers and forests offer cover to hostile forces, while winter threatens to turn progress into stagnation. Every mile marched deepens commitment — and narrows the path back. Commanders argue that hesitation invites resistance and emboldens the enemy. Administrators warn that without careful preparation, the march itself may exhaust the army before Krakau’s walls are ever seen. Others counsel delay, urging consolidation of gains before risking such a bold advance. Once the Order sets foot on this road, the conflict will no longer be confined to the border. The war will have a direction — and the world will take notice."
 flavor_teu_special.136.a: "We march without hesitation."
 flavor_teu_special.136.b: "This road can wait."
 flavor_teu_special.137.title: "Border Disputes"
 flavor_teu_special.137.desc: "With the war concluded and armies withdrawn, attention turns to the lines drawn on parchment. In Kuyavia and the Land of Dobrzyń, those lines remain contested. Charters, treaties, and oaths are cited by both sides, each interpreted to support a different claim.  The Order maintains that these lands, once granted and later wrongfully withheld, fall within its rightful domain. Polish officials reject this interpretation, insisting that any previous arrangements were conditional, outdated, or rendered void by later agreements. On the ground, authority is uncertain. Local nobles hedge their loyalty. Officials delay enforcement. Villages pay dues cautiously, unsure which lord will prevail. What was once a battlefield has become a legal frontier — tense, unresolved, and heavy with implication. To pursue the claim risks reopening conflict. To delay invites erosion of the Order’s position. To abandon the matter entirely would concede more than land alone. The dispute now lies not before armies, but before the Order’s judgment."
 flavor_teu_special.137.a: "These lands are ours by right, and we will say so openly."
 flavor_teu_special.137.b: "The Border is, how it is."
 flavor_teu_special.138.title: "Not Far Now"
 flavor_teu_special.138.a: "We advance. There is no other road."
 flavor_teu_special.139.title: "The Walls of Krakau"
 flavor_teu_special.139.desc: "The army halts within reach of Krakau. From distant rises, the city’s towers and fortifications are now visible — not as a target of battle, but as a problem of time, supply, and resolve. Engineers survey the ground. Timber is marked for cutting. Wagons are reorganized, and grain is counted with a care born of experience rather than optimism. Commanders debate how much can be sustained, and for how long. A siege of Krakau will not be decided by courage alone, but by patience, discipline, and the ability to endure what the city can outlast. Some argue for thorough preparation, securing supply routes, constructing works, and settling in for a long contest that favors certainty over speed. Others believe the display of force itself may suffice — that pressure, threat, and the weight of presence could compel negotiation without committing to a drawn-out siege. A third voice urges restraint, warning that the cost of maintaining such an operation may outweigh what even success could bring. The army waits. The decision made here will shape not only the fate of Krakau, but the memory of this war."
 flavor_teu_special.139.a: "Prepare the siege."