l_simp_chinese:
 polish_mission_pack:0 "波兰：联邦的崛起"
 polish_mission_pack_desc:0 "团结波兰之地，向东扩张，建立强大的波兰立陶宛联邦。"
 polish_mission_pack_BUTTON_TOOLTIP:0 "完成加强波兰并主宰东欧的任务。"
 polish_mission_pack_CRITERIA_DESCRIPTION:0 "加强波兰君权，扩张领土，建立波兰‑立陶宛联邦，解锁强大的修正与传统。"
 mission_consolidate_polish_heartland:0 "巩固波兰核心地带"
 mission_consolidate_polish_heartland_desc:0 "巩固对波兰核心领土的控制，为波兰奠定坚实基础。"
 mission_develop_krakow:0 "发展克拉科夫"
 mission_develop_krakow_desc:0 "将我们的首都打造成无愧于波兰的繁荣文化与经济中心。"
 mission_expand_krakow_influence:0 "扩大克拉科夫的影响力"
 mission_expand_krakow_influence_desc:0 "将克拉科夫打造为欧洲重要的文化、学术与商业中心。"
 mission_strengthen_szlachta:0 "加强贵族阶层"
 mission_strengthen_szlachta_desc:0 "争取波兰贵族的支持，他们是我们国家的支柱。"
 mission_secure_silesia:0 "巩固西里西亚"
 mission_secure_silesia_desc:0 "将富饶的西里西亚地区纳入掌控，以增强我国的经济与人力资源。"
 mission_challenge_bohemian_suzerainty:0 "挑战波西米亚影响"
 mission_challenge_bohemian_suzerainty_desc:0 "通过挑战波西米亚的权威，确立波兰在中欧的主导地位。"
 mission_subjugate_teutonic_order:0 "降服条顿骑士团"
 mission_subjugate_teutonic_order_desc:0 "降服条顿骑士团，稳固我国北方边境。"
 mission_develop_baltic_ports:0 "发展波罗的海港口"
 mission_develop_baltic_ports_desc:0 "建立波兰对波罗的海贸易路线的控制并发展海上基础设施。"
 mission_establish_baltic_navy:0 "建立波罗的海海军"
 mission_establish_baltic_navy_desc:0 "建立一支强大的舰队，以保护我们在波罗的海的利益并投射海军力量。"
 mission_secure_pomerania:0 "巩固波美拉尼亚"
 mission_secure_pomerania_desc:0 "通过控制波美拉尼亚海岸来获得进入波罗的海的通道。"
 mission_rival_hre_emperor:0 "与神圣罗马帝国皇帝作对"
 mission_rival_hre_emperor_desc:0 "将波兰确立为中欧对抗神圣罗马帝国势力的制衡力量。"
 mission_secure_galicia_volhynia:0 "确保加利西亚‑沃里尼亚的安全"
 mission_secure_galicia_volhynia_desc:0 "扩大波兰在东部边境地区的影响以确保我们的边疆安全。"
 mission_expand_into_red_ruthenia:0 "扩张至红鲁塞尼亚"
 mission_expand_into_red_ruthenia_desc:0 "将鲁塞尼亚的土地及其人民并入波兰王国。"
 mission_integrate_ruthenian_culture:0 "整合鲁塞尼亚文化"
 mission_integrate_ruthenian_culture_desc:0 "接纳鲁塞尼亚文化和传统，加强我们的多元文化国家。"
 mission_secure_eastern_frontier:0 "巩固东部边疆"
 mission_secure_eastern_frontier_desc:0 "加强东部边境防御，抵御东正教国家，确保边疆安全。"
 mission_form_polish_lithuanian_commonwealth:0 "建立波兰立陶宛联邦"
 mission_form_polish_lithuanian_commonwealth_desc:0 "通过与立陶宛联合，建立欧洲最大且最强大的国家之一。"
 mission_develop_agricultural_heartland:0 "开发农业核心区"
 mission_develop_agricultural_heartland_desc:0 "最大限度地提高波兰肥沃农田的生产力。"
 mission_establish_grain_trade:0 "建立粮食贸易"
 mission_establish_grain_trade_desc:0 "通过波罗的海港口主导粮食贸易，成为欧洲的粮仓。"
 mission_establish_winged_hussars:0 "建立翼骑兵"
 mission_establish_winged_hussars_desc:0 "打造欧洲最令人畏惧的骑兵部队，主宰战场。"
 mission_reform_polish_army:0 "改革波兰陆军"
 mission_reform_polish_army_desc:0 "实现军队现代化，以保持对新兴威胁的优势。"
 mission_fortify_eastern_border:0 "加强东部边境的防御"
 mission_fortify_eastern_border_desc:0 "在我们的东部边境建立坚固的防线。"
 mission_promote_polish_culture:0 "推广波兰文化"
 mission_promote_polish_culture_desc:0 "开创波兰艺术、学术与文化的黄金时代。"
 mission_establish_jagiellonian_university:0 "建立雅盖隆大学"
 mission_establish_jagiellonian_university_desc:0 "创建一个能够吸引全欧洲学者的学术中心。"
 mission_defend_christendom:0 "捍卫基督教世界"
 mission_defend_christendom_desc:0 "将波兰定位为抵御东方威胁的基督教堡垒。"
 mission_promote_counter_reformation:0 "推动反宗教改革"
 mission_promote_counter_reformation_desc:0 "领导天主教在东欧对新教改革的回应。"
 mission_promote_sarmatism:0 "推广萨尔马提亚主义"
 mission_promote_sarmatism_desc:0 "弘扬定义波兰贵族的独特萨尔马提亚文化。"
 mission_balance_szlachta_power:0 "平衡什拉赫塔权力"
 mission_balance_szlachta_power_desc:0 "平衡贵族间的利益竞争，同时巩固王室权威。"
 mission_implement_liberum_veto:0 "实施自由否决权"
 mission_implement_liberum_veto_desc:0 "确立贵族特权，使任何一位贵族都有权否决议案。"
 mission_consolidate_golden_liberty:0 "巩固贵族民主制"
 mission_consolidate_golden_liberty_desc:0 "完善构成波兰政治制度的贵族特权制度。"
 mission_develop_rural_economy:0 "发展乡村经济"
 mission_develop_rural_economy_desc:0 "提高波兰农田的生产力。"
 mission_dominate_eastern_europe:0 "主宰东欧"
 mission_dominate_eastern_europe_desc:0 "通过军事和外交手段确立波兰在东欧的霸权地位。"
 mission_polish_golden_age:0 "波兰黄金时代"
 mission_polish_golden_age_desc:0 "为波兰开启一段前所未有的文化、经济与军事繁荣时期。"
 STATIC_MODIFIER_NAME_capital_authority:0 "首都权威"
 STATIC_MODIFIER_DESC_capital_authority:0 "君主亲临首都，能加强控制并降低地方叛乱度。"
 STATIC_MODIFIER_NAME_krakow_cultural_center:0 "克拉科夫文化中心"
 STATIC_MODIFIER_DESC_krakow_cultural_center:0 "我们的首都已成为波兰文化和经济活动的中心。"
 STATIC_MODIFIER_NAME_szlachta_privileges:0 "什拉赫塔特权"
 STATIC_MODIFIER_DESC_szlachta_privileges:0 "贵族特权的扩大增强了我们的军事实力，却降低了税收效率。"
 STATIC_MODIFIER_NAME_victory_over_teutons:0 "战胜条顿骑士团"
 STATIC_MODIFIER_DESC_victory_over_teutons:0 "条顿骑士团的战败提升了军队士气与民族威望。"
 STATIC_MODIFIER_NAME_pomeranian_access:0 "连接波美拉尼亚"
 STATIC_MODIFIER_DESC_pomeranian_access:0 "波罗的海增强了我们的贸易能力和海军影响力。"
 STATIC_MODIFIER_NAME_central_european_contender:0 "中欧竞争者"
 STATIC_MODIFIER_DESC_central_european_contender:0 "波兰日益增长的影响力提升了我们在该区域的外交地位。"
 STATIC_MODIFIER_NAME_hre_counterweight:0 "制衡神圣罗马帝国"
 STATIC_MODIFIER_DESC_hre_counterweight:0 "波兰作为神圣罗马帝国权威的竞争对手，有权享有更高的外交威望。"
 STATIC_MODIFIER_NAME_multicultural_expansion:0 "多元文化拓展"
 STATIC_MODIFIER_DESC_multicultural_expansion:0 "多元文化的融合增强了我们的人口与文化基础。"
 STATIC_MODIFIER_NAME_polish_lithuanian_cooperation:0 "波兰‑立陶宛合作"
 STATIC_MODIFIER_DESC_polish_lithuanian_cooperation:0 "与立陶宛的紧密联系增强了我们的外交能力和互信。"
 STATIC_MODIFIER_NAME_polish_lithuanian_commonwealth:0 "波兰立陶宛联邦"
 STATIC_MODIFIER_DESC_polish_lithuanian_commonwealth:0 "波兰与立陶宛的联合，缔造了欧洲最强大的国家之一。"
 STATIC_MODIFIER_NAME_winged_hussars_elite:0 "翼骑兵"
 STATIC_MODIFIER_DESC_winged_hussars_elite:0 "欧洲最精锐的骑兵令敌人闻风丧胆，并保持着强大的军队传统。"
 STATIC_MODIFIER_NAME_eastern_fortification_line:0 "东部防线"
 STATIC_MODIFIER_DESC_eastern_fortification_line:0 "一道要塞网络守护着我们的东部边境，让入侵者付出惨重伤亡。"
 STATIC_MODIFIER_NAME_polish_artillery_corps:0 "波兰炮兵部队"
 STATIC_MODIFIER_DESC_polish_artillery_corps:0 "现代火炮提供了毁灭性的火力，并显著增强了攻城能力。"
 STATIC_MODIFIER_NAME_polish_cultural_hegemony:0 "波兰文化霸权"
 STATIC_MODIFIER_DESC_polish_cultural_hegemony:0 "波兰文化蓬勃发展，推动着科技进步与国家威望的提升。"
 STATIC_MODIFIER_NAME_jagiellonian_university:0 "雅盖隆大学"
 STATIC_MODIFIER_DESC_jagiellonian_university:0 "声望卓著的雅盖隆大学加速了技术进步，并传播了新思想。"
 STATIC_MODIFIER_NAME_bulwark_of_christendom:0 "基督教世界的堡垒"
 STATIC_MODIFIER_DESC_bulwark_of_christendom:0 "作为真信仰的捍卫者，我们的军队以正义和神而战。"
 STATIC_MODIFIER_NAME_counter_reformation_champion:0 "反宗教改革斗士"
 STATIC_MODIFIER_DESC_counter_reformation_champion:0 "引领天主教复兴，不仅巩固了我们的信仰，也增强了传教效率。"
 STATIC_MODIFIER_NAME_golden_liberty_balance:0 "贵族民主制平衡"
 STATIC_MODIFIER_DESC_golden_liberty_balance:0 "平衡贵族的特权确保了稳定与阶层满意度。"
 STATIC_MODIFIER_NAME_rural_development_boom:0 "乡村发展热潮"
 STATIC_MODIFIER_DESC_rural_development_boom:0 "繁荣的农业社区推动经济增长和人口扩张。"
 STATIC_MODIFIER_NAME_central_european_ambition:0 "中欧的影响力"
 STATIC_MODIFIER_DESC_central_european_ambition:0 "我们在该中二日益增长的影响力提升了军队的威望与士气。"
 STATIC_MODIFIER_NAME_ruthenian_integration_policy:0 "鲁塞尼亚融合政策"
 STATIC_MODIFIER_DESC_ruthenian_integration_policy:0 "整合鲁塞尼亚民族，巩固了我们的人口基础。"
 STATIC_MODIFIER_NAME_agricultural_development:0 "农业发展"
 STATIC_MODIFIER_DESC_agricultural_development:0 "先进的农业技术提高了粮食产量，促进了农村繁荣。"
 STATIC_MODIFIER_NAME_rural_investment:0 "农村投资"
 STATIC_MODIFIER_DESC_rural_investment:0 "乡村投资促进人口增长和税收收入。"
 STATIC_MODIFIER_NAME_baltic_marine_development:0 "波罗的海开发"
 STATIC_MODIFIER_DESC_baltic_marine_development:0 "投资我们的波罗的海舰队，既强化了海军传统，也提升了贸易能力。"
 STATIC_MODIFIER_NAME_trade_hub:0 "贸易中心"
 STATIC_MODIFIER_DESC_trade_hub:0 "该地点已成为商业与生产的核心枢纽。"
 STATIC_MODIFIER_NAME_plc_quarter_army_reforms:0 "波兰‑立陶宛陆军改革"
 STATIC_MODIFIER_DESC_plc_quarter_army_reforms:0 "军事改革提升了士气与训练度，同时削弱了贵族影响力。"
 STATIC_MODIFIER_NAME_hussar_charge_tactics:0 "骠骑兵冲锋战术"
 STATIC_MODIFIER_DESC_hussar_charge_tactics:0 "精锐骑兵战术提升了战场作战能力。"
 STATIC_MODIFIER_NAME_plc_standing_army_reforms:0 "波兰‑立陶宛常备军改革"
 STATIC_MODIFIER_DESC_plc_standing_army_reforms:0 "专业的军事改革打造出更高效的作战力量。"
 STATIC_MODIFIER_NAME_sarmatian_cultural_movement:0 "萨尔马提亚文化运动"
 STATIC_MODIFIER_DESC_sarmatian_cultural_movement:0 "萨尔马提亚理想强化了贵族文化与军事传统。"
 STATIC_MODIFIER_NAME_jesuit_mission_zeal:0 "耶稣会传教团狂热"
 STATIC_MODIFIER_DESC_jesuit_mission_zeal:0 "宗教传教士们增强了我们的传教能力。"
 STATIC_MODIFIER_NAME_golden_liberty_established:0 "贵族民主制"
 STATIC_MODIFIER_DESC_golden_liberty_established:0 "波兰政治体系所特有的贵族特权已得到全面实施。"
 STATIC_MODIFIER_NAME_noble_privileges_expanded:0 "贵族特权扩展"
 STATIC_MODIFIER_DESC_noble_privileges_expanded:0 "贵族权利的进一步扩张巩固了他们的地位，但也减少了王室收入。"
 STATIC_MODIFIER_NAME_major_cultural_hub:0 "重要文化中心"
 STATIC_MODIFIER_DESC_major_cultural_hub:0 "该地点已成为艺术与知识活动的中心。"
 STATIC_MODIFIER_NAME_baltic_naval_tradition:0 "波罗的海海军传统"
 STATIC_MODIFIER_DESC_baltic_naval_tradition:0 "强大的海军传统确保了我们掌控波罗的海航道。"
 polish_mission_events.1.t:0 "波兰核心地带的巩固"
 polish_mission_events.1.d:0 "波兰的核心地区已团结在我们的旗帜之下。一个强大国家的基础已经奠定，这种统一为未来的扩张与发展提供了必要的稳定基础。"
 polish_mission_events.1.a:0 "以经济建设为中心"
 polish_mission_events.1.b:0 "加强中央权威"
 polish_mission_events.2.t:0 "克拉科夫的发展"
 polish_mission_events.2.d:0 "克拉科夫已成为真正的首都。这座城市贸易繁荣，文化兴旺，防御严密，从而吸引着学者与艺术家，我们的首都如今彰显着波兰日益增长的君权。"
 polish_mission_events.2.a:0 "城镇繁荣投资"
 polish_mission_events.2.b:0 "促进文化繁荣"
 polish_mission_events.3.t:0 "强化贵族阶层"
 polish_mission_events.3.d:0 "波兰贵族在巩固我们王国方面发挥了关键作用。他们的军事服务和政治支持一直非常宝贵，但现在他们要求更多特权，以换取持续的忠诚。"
 polish_mission_events.3.a:0 "维护王室特权"
 polish_mission_events.3.b:0 "扩大贵族特权"
 polish_mission_events.4.t:0 "确保西里西亚安全"
 polish_mission_events.4.d:0 "西里西亚的富饶土地现已牢牢掌握在波兰手中。该地区的矿藏和农田将极大提振我国经济，其人口也为我们的军队提供了宝贵的人力资源。"
 polish_mission_events.4.a:0 "专注于整合与发展"
 polish_mission_events.4.b:0 "促进经济增长"
 polish_mission_events.5.t:0 "波西米亚权威的挑战"
 polish_mission_events.5.d:0 "我们在西里西亚成功维护波兰权益，已在欧洲中部引起震动。波希米亚君权受到削弱，其他列强正密切关注波兰日益增长的影响力。"
 polish_mission_events.5.a:0 "追求更高远的目标"
 polish_mission_events.5.b:0 "巩固我们的成果"
 polish_mission_events.6.t:0 "战胜条顿骑士团"
 polish_mission_events.6.d:0 "条顿骑士团已被制服，已臣服于波兰王权，这巩固了我国北部边疆，并消除了一个长期存在的威胁。"
 polish_mission_events.6.a:0 "以他们的支持为准则"
 polish_mission_events.6.b:0 "要求其全部领土"
 polish_mission_events.60.t:0 "黑十字的陨落"
 polish_mission_events.60.d:0 "数个世纪以来，条顿骑士团的阴影始终笼罩在我国北部边境，他们昔日的十字军狂热早已被对我们土地的觊觎所取代。如今，这片阴霾终于消散。随着他们的堡垒被拆除、旗帜被践踏入泥泞，骑士团已仅存于史册之中。波罗的海沿岸已然稳固，我国人民终于可以无惧那些铁甲修士的威胁，安然眺望大海。"
 polish_mission_events.60.a:0 "王权荣耀的一天！"
 polish_mission_events.9.t:0 "巩固东部边疆"
 polish_mission_events.9.d:0 "我们在沃里尼亚的东部领土已得到巩固，为抵御东方威胁提供了缓冲地带。这些土地不仅提供了充足的人力，还拥有战略防御阵地。"
 polish_mission_events.9.a:0 "保卫边疆"
 polish_mission_events.9.b:0 "开发经济资源"
 polish_mission_events.10.t:0 "整合红鲁塞尼亚"
 polish_mission_events.10.d:0 "鲁塞尼亚的土地已纳入波兰控制之下，融合过程既带来挑战也蕴含机遇。当地贵族力图维护自身传统，而我们的行政官员则力推全面同化。"
 polish_mission_events.10.a:0 "实施整合政策"
 polish_mission_events.10.b:0 "适应本地传统"
 polish_mission_events.14.t:0 "缔造联邦"
 polish_mission_events.14.d:0 "卢布林联合即将缔结为波兰‑立陶宛联邦。这一历史性的联盟将造就欧洲规模最庞大、实力最雄厚的国家之一，在共同的旗帜下整合波兰与立陶宛的利益。"
 polish_mission_events.14.a:0 "建立英联邦"
 polish_mission_events.15.t:0 "农业发展"
 polish_mission_events.15.d:0 "波兰肥沃的土地已转变为欧洲的粮仓。通过适当的投资和创新，我们的农业产出如今不仅滋养着各国人民，更推动着我们的经济发展。"
 polish_mission_events.15.a:0 "关注农业增长"
 polish_mission_events.15.b:0 "投资农村发展"
 polish_mission_events.16.t:0 "主导粮食贸易"
 polish_mission_events.16.d:0 "我们的粮食出口使我们成为欧洲食品供应的重要组成部分。掌控这一贸易带来了巨大的财富和影响力，来自欧洲大陆各地的商人争相竞购波兰的粮食。"
 polish_mission_events.16.a:0 "专注出口利润"
 polish_mission_events.16.b:0 "发展贸易基础设施"
 polish_mission_events.17.t:0 "波罗的海开发"
 polish_mission_events.17.d:0 "我们的波罗的海港口已成为欧洲贸易的重要枢纽。通过适当的投资，可以主导波罗的海商业活动，并将海军力量投射至整个区域。"
 polish_mission_events.17.a:0 "发展海军力量"
 polish_mission_events.17.b:0 "扩建港口设施"
 polish_mission_events.21.t:0 "军队改革进展"
 polish_mission_events.21.d:0 "我们的军事改革富有成效。军队正变得更加专业高效，但面对新兴威胁，仍需进一步变革以保持我们的优势。"
 polish_mission_events.21.a:0 "骠骑兵改革"
 polish_mission_events.21.b:0 "四分之一军制"
 polish_mission_events.24.t:0 "文化推广"
 polish_mission_events.24.d:0 "波兰文化正蓬勃发展，艺术家、作家和学者们创作的作品足以媲美欧洲任何国家。若得王室赞助，我们的文化成就必将达到前所未有的高度。"
 polish_mission_events.24.a:0 "萨尔马提亚文化运动"
 polish_mission_events.24.b:0 "文艺复兴中心"
 polish_mission_events.26.t:0 "信仰捍卫者"
 polish_mission_events.26.b:0 "耶稣会士"
 polish_mission_events.26.d:0 "当天主教会面临宗教改革和东方宗教的挑战时，波兰始终是传统基督教信仰的坚固堡垒。我们对信仰的捍卫赢得了教宗的赞许，并为我们的事业带来了神圣祝福。"
 polish_mission_events.35.t:0 "反宗教改革的斗士"
 polish_mission_events.35.d:0 "波兰已成为东欧天主教的主要捍卫者。我们的传教士不懈努力，对教会的支持也赢得了教宗的青睐。"
 polish_mission_events.35.a:0 "增强宗教狂热"
 polish_mission_events.35.b:0 "促进宗教和谐"
 polish_mission_events.40.t:0 "贵族阶层诉求"
 polish_mission_events.40.d:0 "贵族们愈发躁动不安，他们要求获得更多特权并扩大在政府中的影响力。他们的支持对维持稳定至关重要，但其日益增长的要求正不断限制着王权。"
 polish_mission_events.40.a:0 "安抚贵族"
 polish_mission_events.40.b:0 "无视他们的要求"
 polish_mission_events.41.t:0 "市民阶层忧虑"
 polish_mission_events.41.d:0 "商人阶层要求更多的贸易特权和代表权。他们的财富支撑着我们的经济，但其诉求常与贵族利益相冲突。"
 polish_mission_events.41.a:0 "平衡市民利益"
 polish_mission_events.41.b:0 "聚焦贸易增长"
 polish_mission_events.42.t:0 "农民阶层问题"
 polish_mission_events.42.d:0 "农民阶层虽然政治权力有限，却是我国经济的支柱。改善他们的生产条件或许能提高生产力，但此类改革可能会触怒贵族阶层。"
 polish_mission_events.42.a:0 "强化传统农奴制"
 polish_mission_events.42.b:0 "改善农村条件"
 polish_mission_events.43.t:0 "阶层平衡达成"
 polish_mission_events.43.d:0 "通过精心管理，我们已在各阶层相互竞争的利益间实现了稳定的平衡，这促进了高效治理，并减少了内部冲突。"
 polish_mission_events.43.a:0 "合并平衡"
 polish_mission_events.45.t:0 "自由否决权"
 polish_mission_events.45.d:0 "瑟姆正式确立了自由否决权，赋予任何一位贵族阻止立法的权力。这一史无前例的贵族特权从根本上改变了我们联邦的治理方式。"
 polish_mission_events.45.a:0 "不授予额外特权"
 polish_mission_events.45.b:0 "采取谨慎态度"
 polish_mission_events.46.t:0 "乡村发展热潮"
 polish_mission_events.46.d:0 "对我国农业的投资正带来显著回报。新技术、完善的基础设施和更好的农村条件正在改变乡村面貌。"
 polish_mission_events.46.a:0 "促进乡村繁荣"
 polish_mission_events.46.b:0 "聚焦农业创新"
 polish_mission_events.50.t:0 "波兰黄金时代"
 polish_mission_events.50.d:0 "我们正处于波兰权力和繁荣的顶峰。我们的城市在艺术和科学成就上蓬勃发展，农业丰收，军队披靡。这确实是波兰的黄金时代。"
 polish_mission_events.50.a:0 "投资文化遗产"
 polish_mission_events.50.b:0 "专注于经济繁荣"
 polish_mission_events.55.t:0 "推广萨尔马提亚主义"
 polish_mission_events.55.a:0 "贵族民主制"
 polish_mission_events.55.b:0 "萨尔马提亚普世主义"
 polish_mission_events.55.d:0 "萨尔马提亚理念已在波兰贵族中扎根，将东西方影响融合成独特的文化认同。这一意识形态强调什拉赫塔阶层的古老渊源及其在捍卫波兰自由中的特殊作用。"
 polish_mission_events.56.t:0 "巩固贵族民主制"
 polish_mission_events.56.d:0 "贵族民主制现已完全确立，贵族的特权已牢固地载入法律。自由否决权、国王自由选举以及其他贵族权利，共同构建了一套独特的政治体系，在王室权威与贵族自由之间实现了平衡。"
 polish_mission_events.56.a:0 "完成系统"
 mission_develop_agricultural_heartland_tooltip:0 "拥有五个生产小麦并配备风车的地点，以及3个高繁荣度的地点。"
 mission_establish_winged_hussars_tooltip:0 "我们需要强大的马匹供应、贵族阶层的满意以及高水平的军队传统。"
 mission_fortify_eastern_border_tooltip:0 "东部边境地区必须建造至少5座城堡。"
 polish_mission_events.26.b.tt:0 "获得耶稣会传教团热忱修正与教宗好感度"
 mission_establish_amber_trade:0 "琥珀垄断"
 mission_establish_amber_trade_desc:0 "波罗的海沿岸蕴藏着比白银更珍贵的宝藏——琥珀。通过掌控主要开采点并优化贸易路线，我们定能让每一件流经欧洲的琥珀工艺品都为波兰国库增添财富。"
 mission_eliminate_teutonic_order:0 "最终解决方案"
 mission_eliminate_teutonic_order_desc:0 "长久以来，条顿骑士团一直是波兰王国的眼中钉，通过瓦解他们的国家，收复维斯瓦河与波罗的海沿岸的土地，我们确保再不会有外来的十字军骑士对波兰人民发号施令。"
 STATIC_MODIFIER_NAME_amber_trade_monopoly:0 "琥珀贸易垄断"
 STATIC_MODIFIER_DESC_amber_trade_monopoly:0 "我们现在控制了本区域大部分的琥珀生产。"
 STATIC_MODIFIER_NAME_diplomatic_engagement:0 "外交介入"
 STATIC_MODIFIER_DESC_diplomatic_engagement:0 "我们将选择外交途径，而非诉诸战争。"
 polish_mission_events.60.a.tt:0 "波兰人民为我们的宿敌被最终铲除而欢欣鼓舞，这为王国带来了前所未有的稳定与繁荣。"
 polish_mission_events.68.t:0 "北地之金"
 polish_mission_events.68.d:0 "我们对波罗的海沿岸的统治结出了最珍贵的果实，远至意大利和拜占庭的商人都争相抢购我们的“北地之金”。市民们已建立起正式的行业协会来管理这种树脂的流通，确保我们的港口成为全球琥珀贸易无可争议的中心。"
 polish_mission_events.68.a:0 "波罗的海献上它的富饶。"
 polish_mission_events.68.a.tt:0 "五大琥珀产地的发展与繁荣度将因贸易行会的入驻而显著提升。"
 mission_establish_royal_treasury:0 "设立王家国库"
 mission_establish_royal_treasury_desc:0 "设立一个安全的国库，为我们的事业提供资金并稳定经济。"
 mission_invest_into_the_army:0 "投资军队"
 mission_invest_into_the_army_desc:0 "现代化并扩大我们的军队以保卫我们的领土并追求我们的野心。"
 mission_integrate_the_cossacks:0 "整合哥萨克"
 mission_integrate_the_cossacks_desc:0 "将凶猛的哥萨克战士纳入我们的军队中，以增强我们的骑兵力量。"
 mission_forge_lithuanian_alliance:0 "与立陶宛结盟"
 mission_forge_lithuanian_alliance_desc:0 "与立陶宛建立牢固的外交关系，以巩固我们东部侧翼的安全。"
 mission_union_of_krewo:0 "克雷沃联合"
 mission_union_of_krewo_desc:0 "通过联姻和政治协议与立陶宛建立联盟。"
 mission_expand_the_commonwealth:0 "扩张波兰立陶宛联邦"
 mission_expand_the_commonwealth_desc:0 "扩大波兰立陶宛联邦的影响力和领土。"
 mission_secure_vistula_trade:0 "确保维斯瓦河贸易"
 mission_secure_vistula_trade_desc:0 "控制重要的维斯瓦河贸易路线以主导该地区的商业。"
 mission_develop_polish_manufactories:0 "发展波兰制造业"
 mission_develop_polish_manufactories_desc:0 "建立工业生产体系以减少对外国商品的依赖。"
 mission_establish_polish_arsenal:0 "建立波兰兵工厂"
 mission_establish_polish_arsenal_desc:0 "建立军事生产设施，为我们的军队配备武器。"
 mission_reform_polish_infantry:0 "改革波兰步兵"
 mission_reform_polish_infantry_desc:0 "将我们的步兵现代化，以配合我们的精英骑兵。"
 mission_develop_polish_artillery:0 "发展波兰炮兵"
 mission_develop_polish_artillery_desc:0 "组建一支强大的炮兵部队，以粉碎敌军阵型与防御工事。"
 mission_control_black_sea_coast:0 "控制黑海沿岸"
 mission_control_black_sea_coast_desc:0 "确保进入黑海以扩大我们的贸易和海军影响力。"
 mission_defend_against_ottomans:0 "抵御奥斯曼"
 mission_defend_against_ottomans_desc:0 "加强南部防线，以应对日益增长的奥斯曼威胁。"
 mission_secure_danube_frontier:0 "确保多瑙河前线安全"
 mission_secure_danube_frontier_desc:0 "沿多瑙河加强我们的南部边境防御。"
 mission_promote_polish_language:0 "推广波兰语"
 mission_promote_polish_language_desc:0 "在我们的王国中推广波兰语和文字的使用。"
 mission_establish_polish_baroque:0 "建立波兰巴洛克风格"
 mission_establish_polish_baroque_desc:0 "发展独特的波兰巴洛克艺术和建筑风格。"
 mission_promote_religious_tolerance:0 "促进宗教宽容"
 mission_promote_religious_tolerance_desc:0 "营造宗教宽容的氛围以维持我们多元文化领域的稳定。"
 mission_control_baltic_sea:0 "控制波罗的海"
 mission_control_baltic_sea_desc:0 "确立波罗的海的制海权，以保障我们的贸易航线安全。"
 STATIC_MODIFIER_NAME_eastern_marches_secured:0 "东部边境已稳固"
 STATIC_MODIFIER_DESC_eastern_marches_secured:0 "我们东部的领土现已妥善稳固并整合完毕。"
 STATIC_MODIFIER_NAME_cossack_registers:0 "哥萨克名册"
 STATIC_MODIFIER_DESC_cossack_registers:0 "哥萨克战士已被正式纳入我们的军事体系。"
 STATIC_MODIFIER_NAME_expand_salt_mines:0 "扩建盐矿"
 STATIC_MODIFIER_DESC_expand_salt_mines:0 "盐矿的开发为我们的经济提供了宝贵的资源。"
 STATIC_MODIFIER_NAME_commonwealth_expansion:0 "联邦扩张"
 STATIC_MODIFIER_DESC_commonwealth_expansion:0 "不断扩张的联邦带来了文化与经济的双重益处。"
 STATIC_MODIFIER_NAME_krewo_union_established:0 "成立《克雷沃联合》"
 STATIC_MODIFIER_DESC_krewo_union_established:0 "《克雷沃联合条约》正式确立了波兰与立陶宛之间的关系。"
 STATIC_MODIFIER_NAME_hussar_defender_of_europe:0 "欧洲守护骠骑兵"
 STATIC_MODIFIER_DESC_hussar_defender_of_europe:0 "我们的精锐骑兵已经准备好保卫基督教世界免受所有威胁。"
 STATIC_MODIFIER_NAME_polish_language_promotion:0 "推广波兰语"
 STATIC_MODIFIER_DESC_polish_language_promotion:0 "波兰语在我们的领土上广泛传播，增强了文化统一。"
 STATIC_MODIFIER_NAME_counter_reformation_zeal:0 "反宗教改革狂热"
 STATIC_MODIFIER_DESC_counter_reformation_zeal:0 "宗教热忱推动着我们的传教事业，并坚定了信仰。"
 STATIC_MODIFIER_NAME_religious_unity_policy:0 "宗教统一政策"
 STATIC_MODIFIER_DESC_religious_unity_policy:0 "推行宗教统一的政策有助于增强我们内部的稳定。"
 STATIC_MODIFIER_NAME_cultural_patronage:0 "文化赞助"
 STATIC_MODIFIER_DESC_cultural_patronage:0 "王室对艺术的赞助丰富了我们的文化并提升了威望。"
 STATIC_MODIFIER_NAME_sarmatian_tradition:0 "萨尔马提亚传统"
 STATIC_MODIFIER_DESC_sarmatian_tradition:0 "萨马提亚的文化传统强化了贵族身份认同与军事才能。"
 STATIC_MODIFIER_NAME_vistula_trade_network:0 "维斯瓦河贸易网络"
 STATIC_MODIFIER_DESC_vistula_trade_network:0 "掌控维斯瓦河贸易路线带来了巨大的经济利益。"
 STATIC_MODIFIER_NAME_baltic_port_development:0 "波罗的海港口发展"
 STATIC_MODIFIER_DESC_baltic_port_development:0 "我们的波罗的海港口已发展成为重要的商业和海军中心。"
 STATIC_MODIFIER_NAME_rural_prosperity:0 "乡村繁荣"
 STATIC_MODIFIER_DESC_rural_prosperity:0 "乡村随着生产力的提高和人口的增长而繁荣。"
 STATIC_MODIFIER_NAME_agricultural_innovation:0 "进行农业革新"
 STATIC_MODIFIER_DESC_agricultural_innovation:0 "新的农业技术显著提高了农业产出。"
 STATIC_MODIFIER_NAME_cultural_syncretism:0 "文化融合"
 STATIC_MODIFIER_DESC_cultural_syncretism:0 "不同文化传统的交融使我们的社会更加丰富多彩。"
 STATIC_MODIFIER_NAME_black_sea_access:0 "黑海通行权"
 STATIC_MODIFIER_DESC_black_sea_access:0 "通往黑海的通道开启了新的贸易路线和战略机遇。"
 STATIC_MODIFIER_NAME_baltic_sea_dominance:0 "波罗的海霸权"
 STATIC_MODIFIER_DESC_baltic_sea_dominance:0 "我们在波罗的海的海上霸权确保了贸易安全，也守护着我们的海岸线。"
 STATIC_MODIFIER_NAME_eastern_european_hegemon:0 "东欧霸主"
 STATIC_MODIFIER_DESC_eastern_european_hegemon:0 "波兰在东欧的统治地位带来了巨大的威望和外交影响。"
 STATIC_MODIFIER_NAME_polish_lithuanian_golden_age:0 "波兰立陶宛黄金时代"
 STATIC_MODIFIER_DESC_polish_lithuanian_golden_age:0 "一个前所未有的繁荣时代推动了经济、技术和文化的发展。"
 STATIC_MODIFIER_NAME_polish_golden_age_economic:0 "波兰黄金时代的经济繁荣"
 STATIC_MODIFIER_DESC_polish_golden_age_economic:0 "在我们的黄金时代，经济繁荣达到了前所未有的高度。"
 STATIC_MODIFIER_NAME_polish_religious_tolerance:0 "波兰宗教宽容"
 STATIC_MODIFIER_DESC_polish_religious_tolerance:0 "我们的宗教宽容政策促进了社会稳定，并吸引了多元人口。"
 STATIC_MODIFIER_NAME_interfaith_cooperation:0 "跨信仰合作"
 STATIC_MODIFIER_DESC_interfaith_cooperation:0 "不同信仰之间的合作加强了我们的社会结构。"
 STATIC_MODIFIER_NAME_polish_military_industrial_complex:0 "波兰军工复合体"
 STATIC_MODIFIER_DESC_polish_military_industrial_complex:0 "国内军事装备的生产增强了我们的武装力量。"
 polish_mission_events.65.t:0 "克雷沃联合"
 polish_mission_events.65.d:0 "《克雷沃联合条约》已签署，波兰与立陶宛结成共主邦联。这一联盟使两国得以共同抵御外敌，并为未来更深层次的合作奠定基石。"
 polish_mission_events.65.a:0 "强化联盟"
 polish_mission_events.66.t:0 "扩张波兰立陶宛联邦"
 polish_mission_events.66.d:0 "波兰立陶宛联邦继续扩张，整合新的领土和人民。每一次扩张都使我们多元文化的国家变得更加强大，不过多样化的民众带来了持续的挑战。"
 polish_mission_events.66.a:0 "继续扩张"
 polish_mission_events.59.t:0 "确保维斯瓦河贸易安全"
 polish_mission_events.59.d:0 "维斯瓦河如今已成为波兰的经济命脉，将我们腹地的粮食与货物源源不断运往波罗的海港口。掌控这条至关重要的水道，确保了我国在该区域的经济主导地位。"
 polish_mission_events.59.a:0 "加强贸易控制"
 polish_mission_events.67.t:0 "发展波兰制造业"
 polish_mission_events.67.d:0 "波兰的工厂如雨后春笋般在全国涌现，生产出优质商品供国内使用和出口。这一工业发展减少了我们对外国进口的依赖，并创造了新的财富来源。"
 polish_mission_events.67.a:0 "支持工业增长"
 polish_mission_events.62.t:0 "建立翼骑兵"
 polish_mission_events.62.d:0 "精锐的翼骑兵已正式组建，成为波兰军队的骄傲。这些身披重甲、以标志性羽翼和长矛著称的骑兵，令敌人闻风丧胆，完美体现了波兰贵族的尚武精神。"
 polish_mission_events.62.a:0 "任命一名骠骑兵指挥官"
 polish_mission_events.69.t:0 "改革波兰步兵"
 polish_mission_events.69.d:0 "我们的步兵部队已经通过新的训练、装备和战术进行了现代化改革。这些改革确保了我们的步兵能够坚守阵地，同时让我们的精锐骑兵能够给予决定性的打击。"
 polish_mission_events.69.a:0 "完成改革"
 polish_mission_events.25.t:0 "建立雅盖隆大学"
 polish_mission_events.25.d:0 "雅盖隆大学已作为学术与知识中心建立。这座学府将培养波兰未来的领袖、学者与艺术家，让知识的光芒照耀我们的国土。"
 polish_mission_events.25.a:0 "任命知名学者"
 polish_mission_events.25.b:0 "专注科研"
 polish_mission_events.71.t:0 "确立波兰巴洛克风格"
 polish_mission_events.71.d:0 "一种独特的波兰巴洛克风格正在我们的艺术与建筑中崭露头角。这种新美学融合了西欧影响与本土传统，创造出令人惊叹的作品，彰显了联邦的辉煌。"
 polish_mission_events.71.a:0 "赞助巴洛克式艺术家"
 polish_mission_events.63.t:0 "抵御奥斯曼"
 polish_mission_events.63.d:0 "奥斯曼的威胁在我们南部边境日益逼近。我们的精锐骑兵已准备好捍卫基督教世界，但面对这个强大的国家，我们必须为即将到来的冲突做好周密准备。"
 polish_mission_events.63.a:0 "准备圣战"
 polish_mission_events.70.t:0 "巩固多瑙河边境防线"
 polish_mission_events.70.d:0 "我军已在多瑙河沿线巩固阵地，建立起抵御奥斯曼帝国进一步扩张的防线。这些领土不仅提供了战略纵深，更成为我军新的兵源招募地。"
 polish_mission_events.70.a:0 "巩固我们的成果"
 polish_mission_events.75.t:0 "波罗的海的控制权"
 polish_mission_events.75.d:0 "波罗的海如今已是波兰的内湖。我们的舰队在这片水域上畅通无阻地巡航，我们的港口主宰着区域贸易，而我们的海上霸权将确保北方边境在未来数代人的时间里固若金汤。"
 polish_mission_events.75.a:0 "建立海上霸权"
 polish_mission_events.77.t:0 "促进宗教宽容"
 polish_mission_events.77.d:0 "在我们多元化的联邦中，宗教宽容已被证明是力量的源泉而非弱点。通过允许不同信仰和平共处，我们保持了内部稳定，并吸引了来自欧洲各地的优秀人才。"
 polish_mission_events.77.a:0 "宗教宽容制度化"
 polish_mission_events.77.b:0 "促进跨信仰合作"
 polish_mission_events.78.t:0 "建立波罗的海贸易联盟"
 polish_mission_events.78.d:0 "波兰商人如今通过正式贸易联盟主导了波罗的海的商业活动。这一网络掌控着整个北欧的商品流通，为我们的港口带来了巨额财富，并增强了我们的经济影响力。"
 polish_mission_events.78.a:0 "巩固贸易主导地位"
 polish_mission_events.78.b:0 "发展港口基础设施"
 polish_mission_events.80.t:0 "战胜皇帝"
 polish_mission_events.80.d:0 "我们战胜神圣罗马帝国皇帝，重创了帝国的威望，确立了波兰在中欧的霸主地位。力量的天平已决定性地向我们倾斜。"
 polish_mission_events.80.a:0 "巩固我们的胜利"
