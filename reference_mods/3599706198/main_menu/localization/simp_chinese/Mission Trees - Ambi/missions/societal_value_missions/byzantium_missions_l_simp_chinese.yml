l_simp_chinese:
 byzantium_mission_pack: "拜占庭复兴"
 byzantium_mission_pack_desc: "一项专注于东罗马帝国生存、巩固并恢复昔日荣光的任务树。"
 mission_secure_constantinople: "保卫君士坦丁堡"
 mission_secure_constantinople_desc: "新罗马的首都必须坚不可摧。恢复狄奥多西城墙的昔日辉煌，确保君士坦丁堡始终是基督教世界的瑰宝。"
 mission_secure_constantinople_tooltip: "恢复君士坦丁堡的防御工事并确保其安全。"
 mission_consolidate_thrace: "巩固色雷斯"
 mission_consolidate_thrace_desc: "色雷斯是我们生存的关键。通过掌控色雷斯的乡村地区，我们就能为首都确保稳定的粮食和人力供应。"
 mission_consolidate_thrace_tooltip: "确保对色雷斯乡村的控制。"
 mission_curtail_nobles_power: "削减贵族的权力"
 mission_curtail_nobles_desc: "强大的土地贵族长久以来一直挑战着皇权。通过重新确立中央集权，巩固君主制度。"
 mission_curtail_nobles_tooltip: "削弱贵族势力，加强皇权。"
 mission_restore_greek_fire: "恢复希腊火"
 mission_restore_greek_fire_desc: "我们祖先的秘密武器——希腊火，曾让我们称霸海洋。重新发掘这项技术，恢复我们在地中海的海上霸权。"
 mission_restore_greek_fire_tooltip: "重新发现希腊火的秘密，以取得海上霸权。"
 mission_repair_golden_horn: "修复金角湾"
 mission_repair_golden_horn_desc: "金角湾的天然良港曾是世界上最大的造船中心。修复其码头和船坞，以重建我们的海军力量。"
 mission_repair_golden_horn_tooltip: "恢复金角湾的造船设施。"
 mission_rebuild_byzantine_navy: "重振拜占庭海军"
 mission_rebuild_byzantine_navy_desc: "大海一直是我们的领地。建造一支配得上罗马帝国的新舰队，能够将力量投射到整个地中海并保护我们的贸易。"
 mission_rebuild_byzantine_navy_tooltip: "组建一支强大的舰队以掌控海洋。"
 mission_dominate_bosporus: "掌控博斯普鲁斯海峡"
 mission_dominate_bosporus_desc: "谁控制了博斯普鲁斯海峡，谁就掌握了东西方的贸易命脉。确保这条关键海峡两岸的安全，便能征收通行税并掌控海上交通。"
 mission_dominate_bosporus_tooltip: "确保对博斯普鲁斯海峡的控制权。"
 mission_secure_aegean: "控制爱琴海"
 mission_secure_aegean_desc: "爱琴海是我们帝国的命脉。清除海盗与对手，重掌这条古老航道的控制权。"
 mission_secure_aegean_tooltip: "确立拜占庭对爱琴海的控制权。"
 mission_recover_thessaloniki: "收复塞萨洛尼基"
 mission_recover_thessaloniki_desc: "我们帝国的共同首都塞萨洛尼基，必须从外国占领中解放出来，恢复这座伟大城市将为我们提供第二个权力基地。"
 mission_recover_thessaloniki_tooltip: "解放并恢复伟大的塞萨洛尼基城。"
 mission_secure_athens: "保护雅典"
 mission_secure_athens_desc: "雅典是哲学与学问的诞生之地，如今已衰落。重建学园，使其再度成为希腊文化的中心。"
 mission_secure_athens_tooltip: "恢复雅典作为学习和文化的中心。"
 mission_reconstruct_hexamilion: "重建六里墙"
 mission_reconstruct_hexamilion_desc: "科林斯地峡上的长城数百年来保护了伯罗奔尼撒半岛。重建这条强大的防线以确保希腊南部的安全。"
 mission_reconstruct_hexamilion_tooltip: "重建六里墙以保卫伯罗奔尼撒半岛。"
 mission_unite_morea: "统一摩里亚"
 mission_unite_morea_desc: "伯罗奔尼撒是我们的粮仓和堡垒。将那些桀骜不驯的领主们统一在帝国权威之下，以建立一个稳固的南方据点。"
 mission_unite_morea_tooltip: "将伯罗奔尼撒统一于拜占庭控制之下。"
 mission_cross_into_anatolia: "进入安纳托利亚"
 mission_cross_into_anatolia_desc: "小亚细亚是我们帝国的心脏地带，就在博斯普鲁斯海峡对面。在安纳托利亚重建我们的存在，以开始收复东部省份。"
 mission_cross_into_anatolia_tooltip: "在安纳托利亚建立立足点。"
 mission_liberate_nicaea: "解放尼西亚"
 mission_liberate_nicaea_desc: "尼西亚是两次大公会议的举办地，是一个具有巨大宗教意义的城市。解放它将激励我们的人民，并展示我们对东正教的守护。"
 mission_liberate_nicaea_tooltip: "解放圣城尼西亚。"
 mission_recover_bithynia: "收复比提尼亚"
 mission_recover_bithynia_desc: "比提尼亚曾是帝国最富饶且最忠诚的省份之一，帝国该恢复对这片亚洲沿岸战略区域的控制权。"
 mission_recover_bithynia_tooltip: "确保比提尼亚省份的安全。"
 mission_secure_aegean_coast: "巩固爱琴海"
 mission_secure_aegean_coast_desc: "必须将安纳托利亚的爱琴海沿岸，包括其中古希腊城市和繁荣的港口，重新纳入我们的控制之下，以确保贸易路线的安全。"
 mission_secure_aegean_coast_tooltip: "确保安纳托利亚爱琴海沿岸的安全。"
 mission_break_ottoman_power: "瓦解奥斯曼势力"
 mission_break_ottoman_power_desc: "奥斯曼人一直是我们最大的敌人，要么摧毁他们，要么让其归降，以确保他们永远不再威胁我们。"
 mission_break_ottoman_power_tooltip: "永久消除奥斯曼威胁。"
 mission_restore_anatolian_themes: "恢复安纳托利亚军区"
 mission_restore_anatolian_themes_desc: "军区制曾是我们军事与行政力量的支柱。在安纳托利亚恢复这一古老制度，以巩固我们的防御与治理体系。"
 mission_restore_anatolian_themes_tooltip: "在安纳托利亚重建军区制"
 mission_subjugate_bulgaria: "征服保加利亚"
 mission_subjugate_bulgaria_desc: "几个世纪以来，保加利亚人时而是盟友，时而是敌人。我们必须通过征服或附庸的方式，将他们牢牢置于掌控之下，以巩固我国北部边境。"
 mission_subjugate_bulgaria_tooltip: "将保加利亚置于拜占庭控制之下。"
 mission_secure_serbia: "巩固塞尔维亚"
 mission_secure_serbia_desc: "塞尔维亚诸公国控制着重要的山口和资源。为确保西部安全，必须争取其效忠或将其征服。"
 mission_secure_serbia_tooltip: "在塞尔维亚建立拜占庭的影响。"
 mission_secure_bosnia: "巩固波斯尼亚"
 mission_secure_bosnia_desc: "波斯尼亚的战略位置使其成为控制西巴尔干的关键。将我们的影响力扩展至该区域，以完成我们对半岛的全面掌控。"
 mission_secure_bosnia_tooltip: "确保对波斯尼亚的控制。"
 mission_restore_hagia_sophia: "重建圣索菲亚大教堂"
 mission_restore_hagia_sophia_desc: "圣索菲亚大教堂是拜占庭建筑的最高成就，恢复它作为东正教精神中心的昔日辉煌。"
 mission_restore_hagia_sophia_tooltip: "恢复大教会昔日的荣耀。"
 mission_protect_mount_athos: "保护阿索斯山"
 mission_protect_mount_athos_desc: "圣山阿索斯是东正教修道院体系的精神之心。请守护它的独立与繁荣，使其始终成为祈祷与学术的中心。"
 mission_protect_mount_athos_tooltip: "保护和支持阿索斯山的修道院社区。"
 mission_revive_constantinople_university: "复兴君士坦丁堡大学"
 mission_revive_constantinople_university_desc: "君士坦丁堡大学曾是基督世界最伟大的学术中心。重建该学校，为我帝国培养行政官员、学者和神学家。"
 mission_revive_constantinople_university_tooltip: "重建君士坦丁堡大学。"
 mission_restore_orthodox_patriarchates: "恢复正教牧首区"
 mission_restore_orthodox_patriarchates_desc: "作为罗马的继承者，君士坦丁堡必须重申其对东正教世界的领导地位。恢复我们对古代牧首区的影响力。"
 mission_restore_orthodox_patriarchates_tooltip: "重建拜占庭对东正教的领导权。"
 mission_develop_silk_trade: "发展丝绸贸易"
 mission_develop_silk_trade_desc: "君士坦丁堡位于丝绸之路的十字路口。重振和控制这一利润丰厚的贸易，让我们的金库装满黄金。"
 mission_develop_silk_trade_tooltip: "控制丝绸贸易并从中获利。"
 mission_control_black_sea_trade: "控制黑海贸易"
 mission_control_black_sea_trade_desc: "黑海提供了通往大草原和俄罗斯财富的通道。主导其贸易，以确保粮食、毛皮和其他贵重商品的安全。"
 mission_control_black_sea_tooltip: "确立拜占庭对黑海贸易的主导地位。"
 mission_recover_antioch: "收复安条克"
 mission_recover_antioch_desc: "安条克，叙利亚古都及牧首区的所在地，必须重归正教之手。它的解放将昭示我们在东方的复兴。"
 mission_recover_antioch_tooltip: "解放伟大的安条克城。"
 mission_recover_alexandria: "收复亚历山大"
 mission_recover_alexandria_desc: "亚历山大里亚，这座拥有伟大图书馆与战略港口的城市，曾是通往埃及的门户。收复这座古老的学术与商业中心。"
 mission_recover_alexandria_tooltip: "解放亚历山大城。"
 mission_recover_jerusalem: "收复耶路撒冷"
 mission_recover_jerusalem_desc: "耶路撒冷，基督教世界最神圣的城，必须摆脱异教徒的统治。它的解放将是我等信仰与帝国最伟大的凯旋。"
 mission_recover_jerusalem_tooltip: "为基督教世界解放耶路撒冷。"
 mission_restore_pentarchy: "重建五大牧首区"
 mission_restore_pentarchy_desc: "古老的五大牧首区‑罗马、君士坦丁堡、亚历山大、安条克和耶路撒冷‑必须在正教的领导下再次团结起来。"
 mission_restore_pentarchy_tooltip: "在正教的统一下重建古老的五大牧首区。"
 mission_restore_roman_empire: "重建罗马帝国"
 mission_restore_roman_empire_desc: "这是每位拜占庭皇帝的梦想：完全恢复罗马帝国的版图。将意大利、巴尔干和安纳托利亚统一在我们的统治之下，让这个梦想成为现实。"
 mission_restore_roman_empire_tooltip: "重新统一罗马帝国的核心领土。"
 mission_establish_orthodox_hegemony: "确立正教霸权"
 mission_establish_orthodox_hegemony_desc: "使君士坦丁堡成为东正教世界无可争议的中心，统领所有忠实信徒对抗异教徒与异端。"
 mission_establish_orthodox_hegemony_tooltip: "确立拜占庭在东正教世界的领导地位。"
 mission_counter_islamic_threat: "遏制伊斯兰威胁"
 mission_counter_islamic_threat_desc: "包围我们的穆斯林势力正威胁着我们的存亡。向他们发起反击，击退伊斯兰。"
 mission_counter_islamic_threat_tooltip: "遏制穆斯林势力的扩张。"
 mission_purge_anatolian_heretics: "清除安纳托利亚异端"
 mission_purge_anatolian_heretics_desc: "安纳托利亚已变成异端与背离教会。通过皈依，并在必要时动用武力，使其重归正信。"
 mission_purge_anatolian_heretics_tooltip: "在整个安纳托利亚地区恢复东正教信仰。"
 mission_consolidate_orthodox_subjects: "整合东正教附庸国"
 mission_consolidate_orthodox_subjects_desc: "我们的东正教附庸国应成为帝国权力的忠诚延伸。加强他们与帝国的联系，并确保他们的合作。"
 mission_consolidate_orthodox_subjects_tooltip: "加强与东正教附庸国的关系。"
 mission_promote_greek_culture: "推广希腊文化"
 mission_promote_greek_culture_desc: "希腊的语言与文化是我们文明的基石。在我们的土地上推广希腊文化，以强化我们的身份认同。"
 mission_promote_greek_culture_tooltip: "在整个帝国传播希腊文化"
 mission_spread_greek_culture_anatolia: "在安纳托利亚传播希腊文化"
 mission_spread_greek_culture_anatolia_desc: "安纳托利亚曾是完全希腊化的。通过定居、教育和文化复兴，使这片土地重新希腊化。"
 mission_spread_greek_culture_anatolia_tooltip: "在安纳托利亚重建希腊文化。"
 mission_improve_subject_relations: "改善附庸关系"
 mission_improve_subject_relations_desc: "满意的附庸才是忠诚的附庸。加强与我们附属国的纽带，以确保持续获得他们的支持。"
 mission_improve_subject_relations_tooltip: "改善所有属国的关系。"
 byz_mission_events.1.t: "狄奥多西城墙已修复"
 byz_mission_events.1.d: "历经沧桑、长期失修的狄奥多西城墙如今重现昔日辉煌。三重防御体系连同塔楼与城门，再次使君士坦丁堡固若金汤，我们必须决定如何庆祝这一不朽功绩，以及在重获安全保障后应侧重何种战略方向。"
 byz_mission_events.1.a: "大修复"
 byz_mission_events.1.b: "实用维修"
 byz_mission_events.1.c: "加固海堤"
 byz_mission_events.1.a.tt: "若我们掌握相应技术，将在君士坦丁堡建造棱堡防御工事以此强化首都的防御能力。"
 byz_mission_events.1.b.tt: "一项实用且成本效益高的修复工程，将在未来十五年内为君士坦丁堡增添防御工事改进。"
 byz_mission_events.1.c.tt: "重点加强海防工事，抵御海上威胁，并在君士坦丁堡增设专门的海上防御设施。"
 byz_mission_events.2.t: "重建六里墙"
 byz_mission_events.2.d: "横跨科林斯地峡，宏伟的六里墙已重建完成。这道从科林斯湾延伸至萨罗尼克湾的坚固屏障，如今守护着伯罗奔尼撒半岛免受北方入侵。工匠呈报了不同的防御体系方案，每种方案皆有其独特优势与相应成本。"
 byz_mission_events.2.a: "基于历史的六里墙"
 byz_mission_events.2.b: "驻防地峡"
 byz_mission_events.2.c: "瞭望塔网络"
 byz_mission_events.2.a.tt: "按照历史原貌重建六里墙要塞，在科林斯的建造或升级一座要塞以守卫通往伯罗奔尼撒的通道。"
 byz_mission_events.2.b.tt: "在地峡建立要塞网络，在摩里亚的三个沿海地点修建棱堡防御工事或城堡，以实现更灵活的防御。"
 byz_mission_events.2.c.tt: "建立用于早期预警的瞭望塔网络，在整个伯罗奔尼撒半岛的五个丘陵地点增加防御设施改进。"
 byz_mission_events.3.t: "尼西亚解放"
 byz_mission_events.3.d: "尼西亚，伟大宗教会议之城，已从外国占领中解放。曾经接待过教父的教堂，再次回荡着正教的圣歌。当我们收复这座圣城时，我们必须决定如何纪念它的解放，以及它将在我们复兴的帝国中扮演什么角色。"
 byz_mission_events.3.a: "重建牧首区"
 byz_mission_events.3.b: "设防城市"
 byz_mission_events.3.c: "希腊人重新定居"
 byz_mission_events.3.a.tt: "恢复尼西亚作为拥有自己牧首区的主要宗教中心的地位，建造一座大教堂并使人口皈依正教。"
 byz_mission_events.3.b.tt: "使尼西亚成为进一步开展安纳托利亚战役的坚固桥头堡，建造城堡防御工事并宣称奥斯曼在马尔马拉区域的领土。"
 byz_mission_events.3.c.tt: "鼓励希腊人定居以使城市重新希腊化，建造一座图书馆并吸引希腊市民在尼西亚重新定居。"
 byz_mission_events.4.t: "奥斯曼威胁终结"
 byz_mission_events.4.d: "奥斯曼土耳其人，我们要几个世纪以来最大的敌人，已被彻底击败。他们的统治被摧毁，他们的军队被击溃，他们的野心被粉碎。当我们胜利地站在他们帝国的废墟上时，我们必须决定土耳其土地和人民的命运，以及如何确保我们来之不易的胜利能世代延续。"
 byz_mission_events.4.a: "最终战役"
 byz_mission_events.4.b: "屈辱的和平"
 byz_mission_events.4.c: "分而治之"
 byz_mission_events.4.a.tt: "彻底摧毁奥斯曼，开发布尔萨并宣称整个安纳托利亚的土耳其核心地区。"
 byz_mission_events.4.b.tt: "将奥斯曼降为朝贡国，榨取财富和特权，同时宣称其首都省份。"
 byz_mission_events.4.c.tt: "将土耳其领土分裂成更小、更易于管理的附庸国，同时改善与我们基督教邻国的关系。"
 byz_mission_events.5.t: "光复安条克"
 byz_mission_events.5.d: "安条克，叙利亚古都和五大牧首区之一，在经历几个世纪的异族统治后回归罗马统治。这座在奥龙特斯河畔，在丝绸之路上具有战略地位的伟大城市，再次属于我们。我们现在必须决定如何将这一战利品整合进我们的帝国，以及它将在我们的东方战略中扮演什么角色。"
 byz_mission_events.5.a: "恢复安条克牧首区"
 byz_mission_events.5.b: "将安条克打造为贸易枢纽"
 byz_mission_events.5.c: "东方要塞"
 byz_mission_events.5.a.tt: "恢复安条克正教牧首区，建造大教堂防御工事并使当地人口皈依正教。"
 byz_mission_events.5.b.tt: "将安条克发展为丝绸之路贸易的东部终点站，建造贸易集市和转口港设施以控制利润丰厚的贸易路线。"
 byz_mission_events.5.c.tt: "巩固安条克来作为我们帝国抵御穆斯林势力的东方壁垒，建造要塞防御工事并宣称黎凡特的全境领土。"
 byz_mission_events.6.t: "亚历山大复兴"
 byz_mission_events.6.d: "亚历山大，托勒密王朝的伟大城市和亚历山大牧首的驻地，已获得解放。著名的灯塔、大图书馆和城市的战略港口再次处于罗马的控制之下。我们必须决定如何将这个古老的学术和商业中心恢复至昔日的辉煌。"
 byz_mission_events.6.a: "重建图书馆和牧首区"
 byz_mission_events.6.b: "帝国粮仓"
 byz_mission_events.6.c: "南方海军基地"
 byz_mission_events.6.a.tt: "重建亚历山大的图书馆和牧首区，建造教育设施和大教堂，同时吸引希腊定居者来到这座城市。"
 byz_mission_events.6.b.tt: "将亚历山大发展为帝国的主要谷物出口地，建造谷仓和港口设施以控制埃及的谷物生产。"
 byz_mission_events.6.c.tt: "使亚历山大成为我们地中海舰队的主要海军基地，建造干船坞、港口和棱堡防御工事，同时宣称战略岛屿的所有权。"
 byz_mission_events.7.t: "耶路撒冷解放"
 byz_mission_events.7.d: "耶路撒冷，圣城，已从异教徒的统治中解放。圣墓教堂、圣殿山和所有圣地几个世纪以来首次掌握在基督徒手中。这是我们信仰和帝国最伟大的胜利，但也带来了巨大的责任和挑战。"
 byz_mission_events.7.a: "恢复正教控制"
 byz_mission_events.7.b: "对所有基督徒开放的城市"
 byz_mission_events.7.c: "信仰堡垒"
 byz_mission_events.7.a.tt: "在耶路撒冷建立稳固的正教控制，建造多座大教堂并使所有居民皈依真正的信仰。"
 byz_mission_events.7.b.tt: "使耶路撒冷成为对所有基督教派开放的城市，发展朝圣基础设施并改善所有基督教国家的关系。"
 byz_mission_events.7.c.tt: "巩固耶路撒冷来作为坚不可摧的基督教堡垒，建造广泛的防御工事并宣称黎凡特的全境领土。"
 byz_mission_events.8.t: "五大牧首区光复"
 byz_mission_events.8.d: "基督教世界的所有五个古老牧首区‑罗马、君士坦丁堡、亚历山大、安条克和耶路撒冷‑现在都在正教的控制之下。古老教会的统一在拜占庭的领导下得以恢复。这一不朽的成就迫使我们考虑基督教权威的未来结构以及我们与西方天主教的关系。"
 byz_mission_events.8.a: "至高无上的权威"
 byz_mission_events.8.b: "与罗马教宗和解"
 byz_mission_events.8.c: "权力下放"
 byz_mission_events.8.a.tt: "确立君士坦丁堡为整个基督教世界的最高权威，发展所有牧首区城市。"
 byz_mission_events.8.b.tt: "寻求与天主教会的和解与统一，与教宗国结盟并改善所有基督教国家的关系。"
 byz_mission_events.8.c.tt: "建立一个去中心化的自治教会体系，加强整个帝国所有主要的大教堂城市的教会权威。"
 byz_mission_events.9.t: "罗马帝国光复"
 byz_mission_events.9.d: "几个世纪的梦想已经实现。罗马帝国以其所有的荣耀得以恢复，意大利、巴尔干和安纳托利亚在我们的统治下统一。当我们站在成就的巅峰时，我们必须决定我们恢复的帝国将采取何种形式，以及我们将如何治理这片广阔的领土。"
 byz_mission_events.9.a: "新奥古斯都"
 byz_mission_events.9.b: "改革元老院"
 byz_mission_events.9.c: "基督教帝国"
 byz_mission_events.9.a.tt: "建立一个以皇帝为绝对统治者的新帝国君主制，发展我们的首都并宣称西欧和北非的全境领土。"
 byz_mission_events.9.b.tt: "通过强大的元老院恢复罗马共和体制，发展主要城市并宣称意大利全境领土。"
 byz_mission_events.9.c.tt: "建立一个以教会为中心的基督教神权帝国，使所有人口皈依正教并宣称黎凡特的全境领土。"
 byz_mission_events.11.t: "安纳托利亚希腊化"
 byz_mission_events.11.d: "我们在安纳托利亚恢复希腊文化的努力正在结出硕果。这片曾经完全希腊化的土地正在慢慢回归其文化根源。我们必须决定如何推进这种文化转型‑是通过积极的同化、渐进的融合，还是教育的扩张。"
 byz_mission_events.11.a: "文化同化"
 byz_mission_events.11.b: "文化融合"
 byz_mission_events.11.c: "教育扩张"
 byz_mission_events.11.a.tt: "通过使当地人口皈依、建造剧院和在安纳托利亚城市传播希腊化，积极推广希腊文化。"
 byz_mission_events.11.b.tt: "通过提倡宽容、鼓励希腊人定居和发展文化交流中心，鼓励渐进的文化融合。"
 byz_mission_events.11.c.tt: "专注于教育和识字，通过在安纳托利亚各地建立大学和图书馆，代代传播希腊文化。"
 byz_mission_events.31.t: "重开尼西亚会议"
 byz_mission_events.31.d: "随着尼西亚的解放及其教堂的修复，在这座历史名城举行新一届大公会议的时机已经成熟。这样的聚会可以加强正教的团结并解决神学问题，但这将耗资不菲，政治上也很复杂。"
 byz_mission_events.31.a: "举行会议"
 byz_mission_events.31.b: "推迟会议"
 byz_mission_events.31.b.tt: "将会议推迟到更合适的时机，虽然会让神职人员失望，但避免了眼下的开支。"
 byz_mission_events.41.t: "瓜分奥斯曼战利品"
 byz_mission_events.41.d: "黄金、珠宝、武器和领土，从奥斯曼人那里缴获的巨额财富必须被分配。帝国境内的不同派系对于如何分配这些战利品以最大程度地增强我们的国力有着强烈的意见。"
 byz_mission_events.41.a: "分发给军队"
 byz_mission_events.41.b: "资助重建"
 byz_mission_events.41.c: "赏赐贵族"
 byz_mission_events.71.t: "耶路撒冷朝圣开始"
 byz_mission_events.71.d: "随着耶路撒冷的解放，来自基督教世界各地的朝圣者开始涌向圣城。这种涌入既带来了机遇也带来了挑战‑来自朝圣贸易的经济利益，但也带来了安全隐患和基础设施需求。"
 byz_mission_events.71.a: "鼓励朝圣"
 byz_mission_events.71.b: "规范朝圣"
 byz_mission_events.100.t: "拜占庭中兴完成"
 byz_mission_events.100.d: "我们实现了许多人认为不可能的事情。东罗马帝国不仅幸存下来，而且恢复了伟大的荣光。我们的领土从意大利延伸到叙利亚，我们的信仰坚定，我们的人民繁荣昌盛。这确实是属于拜占庭的新黄金时代。"
 byz_mission_events.100.a: "宣布中兴"
