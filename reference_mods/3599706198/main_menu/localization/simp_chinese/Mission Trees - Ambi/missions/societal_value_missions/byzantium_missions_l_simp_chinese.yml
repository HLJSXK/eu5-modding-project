 byz_mission_events.31.a.tt: "在尼西亚举行新一届大公会议，以加强整个帝国的正教团结和宗教权威。"
 byz_mission_events.41.a.tt: "使用战利品奖励并加强我们的军事力量，提高我们军队的作战能力和人力储备。"
 byz_mission_events.41.b.tt: "将财富投资于重建和发展被征服的领土，改善对安纳托利亚全境的控制和繁荣。"
 byz_mission_events.41.c.tt: "将财富分发给贵族以确保他们的忠诚并维持他们对帝国统治的支持。"
 byz_mission_events.71.a.tt: "积极鼓励朝圣以促进耶路撒冷的经济并加强基督徒的团结，改善与正教国家的关系。"
 byz_mission_events.71.b.tt: "实施法规以管控朝圣者的涌入，建造收容所并确保圣城的安全。"
 byz_mission_events.100.a.tt: "庆祝我们的成就并宣称我们作为真正的罗马帝国的合法地位，结果基于我们最伟大的成就‑无论是恢复罗马帝国本身、统一五大牧首区，还是完成其他里程碑式的任务。"
 byzantium_mission_pack_BUTTON_TOOLTIP:0 "完成任务来加强拜占庭帝国。"
 byzantium_mission_pack_CRITERIA_DESCRIPTION:0 "扮演拜占庭帝国完成任务并恢复昔日的辉煌。"
 byz_mission_events.50.t: "雄鹰再起"
 byz_mission_events.50.d: "历经数个世纪的斗争，决定拜占庭能否继承罗马遗产的时刻已经到来。这一重大抉择将重塑我们在基督教世界乃至全世界的地位。"
 byz_mission_events.50.a: "宣告罗马帝国"
 byz_mission_events.50.a.tt: "宣告罗马帝国的复兴-获得威望、正统性和军事力量，但要预料到宿敌的强烈反应。"
 byz_mission_events.50.b: "推举皇位宣称者"
 byz_mission_events.50.b.tt: "提名一位罗马皇位的宣称者以集结支持，同时避免全面复辟带来的直接损失和风险。"
 byz_mission_events.50.c: "暂缓与整顿"
 byz_mission_events.50.c.tt: "推迟宣告以巩固我们的内部地位，确保帝国能够承受这一主张带来的后果。"