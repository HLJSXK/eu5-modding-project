l_simp_chinese:
 holland_expansion_mission_pack:0 "荷兰：领土扩张"
 holland_expansion_mission_pack_desc:0 "扩张荷兰领土，在荷兰的旗帜下统一低地国家。"
 holland_expansion_mission_pack_BUTTON_TOOLTIP:0 "完成扩张荷兰在低地国家的领土和影响力的任务。"
 holland_expansion_mission_pack_CRITERIA_DESCRIPTION:0 "扩张荷兰在低地国家的领土和影响力。成立尼德兰以解锁新的政体和军事传统。"
 mission_test_development:0 "发展阿姆斯特丹"
 mission_test_development_desc:0 "将我们的首都发展度提升至10，以加强我们的经济基础。"
 mission_conquer_utrecht:0 "征服乌得勒支"
 mission_conquer_utrecht_desc:0 "将乌得勒支和阿默斯福特的地点置于荷兰控制之下，以巩固我们的东部边界。"
 mission_war_preparation:0 "准备扩张"
 mission_war_preparation_desc:0 "保持稳定而强劲的经济，为向海尔德兰的进一步领土扩张做好准备。"
 mission_frisian_dominance:0 "支配弗里西亚"
 mission_frisian_dominance_desc:0 "确保弗里西亚之地处于我们的控制之下，或者弗里斯亚共和国不再是一个独立的威胁。"
 mission_dutch_unification:0 "统一荷兰之地"
 mission_dutch_unification_desc:0 "建立一支强大的军队并控制荷兰文化的核心地带，为统一的尼德兰铺平道路。"
 mission_form_netherlands:0 "锻造尼德兰"
 mission_form_netherlands_desc:0 "作为公国级以上的统一荷兰国家，建立尼德兰的军事传统。"
 netherlands_republican_reform_tt:0 "尼德兰可以将其政府改革为共和制"
 became_republican_government_tt:0 "我们的政府已改革为共和制"
 remained_monarchy_tt:0 "我们保持了君主制的传统"
 STATIC_MODIFIER_NAME_holland_territorial_expansion:0 "领土扩张"
 STATIC_MODIFIER_DESC_holland_territorial_expansion:0 "近期的征服降低了军队维护费用并加强了王权。"
 STATIC_MODIFIER_NAME_holland_war_preparation:0 "战争准备"
 STATIC_MODIFIER_DESC_holland_war_preparation:0 "军事改革提升了士气和训练度，为未来的战役做好了准备。"
 STATIC_MODIFIER_NAME_holland_regional_dominance:0 "地区强权"
 STATIC_MODIFIER_DESC_holland_regional_dominance:0 "我们对该区域的控制缓解了内部矛盾并降低了建筑维护费用。"
 STATIC_MODIFIER_NAME_holland_dutch_unification:0 "荷兰统一"
 STATIC_MODIFIER_DESC_holland_dutch_unification:0 "荷兰之地的统一提高了阶层满意度并改善了征税效率。"
 STATIC_MODIFIER_NAME_netherlands_military_traditions:0 "荷兰军事传统"
 STATIC_MODIFIER_DESC_netherlands_military_traditions:0 "尼德兰的军事传统提供了永久的训练度加成。"
 STATIC_MODIFIER_NAME_netherlands_monarchist_army:0 "君主主义传统"
 STATIC_MODIFIER_DESC_netherlands_monarchist_army:0 "君主制增加了我们的控制力、粮食产量和军队维护费用。"
 holland_expansion_events.1.t:0 "阿姆斯特丹日益繁荣"
 holland_expansion_events.1.d:0 "我们的首都达到了新的发展高度！商人和市民都在庆祝这一成就。我们该如何纪念这一里程碑？"
 holland_expansion_events.1.a:0 "庆贺胜利！"
 holland_expansion_events.1.b:0 "团结使我们强大！"
 holland_expansion_events.10.t:0 "荷兰共和国"
 holland_expansion_events.10.d:0 "随着尼德兰正式建国，我们站在了历史的十字路口。我们是应该接纳使我们的商人富有、城市繁荣的共和理念，还是维持在军事方面表现出色的传统君主制体系？"
 holland_expansion_events.10.a:0 "实行共和改革"
 holland_expansion_events.10.b:0 "保持君主制传统"
