l_simp_chinese:
 holland_mission_pack: "尼德兰共和国"
 holland_mission_pack_desc: "引导荷兰从一个小小伯国崛起为全球贸易帝国，依靠商业、海军力量与殖民扩张。"
 holland_mission_pack_BUTTON_TOOLTIP: "完成任务实现荷兰独立，建立殖民帝国，打造世界首屈一指的贸易强国。"
 holland_mission_pack_CRITERIA_DESCRIPTION: "发展阿姆斯特丹，确保独立，建立贸易网络，并建设殖民地，以解锁强大的经济和海军修正。"
 mission_hol_develop_amsterdam: "发展阿姆斯特丹"
 mission_hol_develop_amsterdam_desc: "将阿姆斯特丹从一个渔村转变为繁荣的商业中心，使之成为荷兰繁荣度的核心。"
 mission_hol_develop_amsterdam_tooltip: "发展阿姆斯特丹并建设市场基础设施，同时保持充足的收入。"
 mission_hol_secure_food_supply: "保障粮食供应"
 mission_hol_secure_food_supply_desc: "通过掌控肥沃农田，确保我们不断增长的人口获得可靠的农业生产与粮食安全。"
 mission_hol_secure_food_supply_tooltip: "控制多个生产小麦或牲畜的地点。"
 mission_hol_consolidate_holland: "整合荷兰"
 mission_hol_consolidate_holland_desc: "将荷兰伯国的所有领土置于我们的牢固控制之下，为未来的扩张奠定坚实基础。"
 mission_hol_consolidate_holland_tooltip: "在保持稳定的前提下，控制荷兰地区。"
 mission_hol_strengthen_burghers: "强化市民阶层"
 mission_hol_strengthen_burghers_desc: "扶持商人阶层，其财富与进取精神将推动荷兰的经济增长并最终实现独立。"
 mission_hol_strengthen_burghers_tooltip: "增加市民阶层的力量与满意度。"
 mission_hol_secure_utrecht: "确保乌得勒支的安全"
 mission_hol_secure_utrecht_desc: "控制战略要地乌得勒支主教区，以扩大我们向内陆的影响力并确保获得额外资源。"
 mission_hol_secure_utrecht_tooltip: "控制乌得勒支。"
 mission_hol_expand_into_friesland: "向弗里斯兰扩张"
 mission_hol_expand_into_friesland_desc: "将荷兰的影响力扩展至北弗里斯兰地区，从而获得熟练水手和沿海领土。"
 mission_hol_expand_into_friesland_tooltip: "在弗里斯兰地区建立存在。"
 mission_hol_control_zeeland: "控制泽兰"
 mission_hol_control_zeeland_desc: "掌控泽兰群岛以稳固我们南方，并为海上扩张建立关键的海军基地。"
 mission_hol_control_zeeland_tooltip: "在沿海地点建设海军基础设施。"
 mission_hol_expand_into_brabant: "向布拉班特扩张"
 mission_hol_expand_into_brabant_desc: "将影响力扩展至富裕的布拉班特省份，获取其纺织产业与商业中心的准入权。"
 mission_hol_expand_into_brabant_tooltip: "在布拉班特地区建立存在。"
 mission_hol_assert_independence: "宣布独立"
 mission_hol_assert_independence_desc: "摆脱外国宗主的统治，建立一个能够自主追求自身利益的主权荷兰国家。"
 mission_hol_assert_independence_tooltip: "在保持稳定与正统性的前提下，从勃艮第、哈布斯堡或卡斯蒂利亚手中实现独立。"
 mission_hol_embrace_protestantism: "接受新教"
 mission_hol_embrace_protestantism_desc: "接纳新教，以强化民族认同对抗天主教宗主，并与其它新教势力结盟。"
 mission_hol_embrace_protestantism_tooltip: "改信路德宗并维持宗教统一。"
 mission_hol_develop_dutch_navy: "发展荷兰海军"
 mission_hol_develop_dutch_navy_desc: "打造一支强大的舰队，以保护我们的贸易航线、挑战海上宿敌，并在海外投射力量。"
 mission_hol_develop_dutch_navy_tooltip: "建立一支强大的海军并发展港口基础设施。"
 mission_hol_establish_republic: "建立共和国"
 mission_hol_establish_republic_desc: "正式确立我们的共和政体，在商人寡头与代议制机构之间取得平衡。"
 mission_hol_establish_republic_tooltip: "维持共和政体，确保市民阶层拥有强大影响力并保持政局稳定。"
 mission_hol_promote_tolerance: "提倡宗教宽容"
 mission_hol_promote_tolerance_desc: "推行宗教宽容政策，以吸引技术移民、防止内部冲突并促进经济增长。"
 mission_hol_promote_tolerance_tooltip: "实现宗教统一与稳定。"
 mission_hol_develop_baltic_trade: "发展波罗的海贸易"
 mission_hol_develop_baltic_trade_desc: "在波罗的海建立主导贸易网络，掌控谷物、木材和海军物资的流通。"
 mission_hol_develop_baltic_trade_tooltip: "在波罗的海区域建立贸易据点，并获得足够的贸易收入。"
 mission_hol_establish_east_india_company: "成立东印度公司"
 mission_hol_establish_east_india_company_desc: "建立荷兰东印度公司，以组织并垄断我们在亚洲的贸易与殖民事业。"
 mission_hol_establish_east_india_company_tooltip: "维持一支规模庞大且传统优良的海军。"
 mission_hol_colonize_cape: "殖民开普"
 mission_hol_colonize_cape_desc: "在好望角建立定居点，作为往来亚洲船只的重要补给站。"
 mission_hol_colonize_cape_tooltip: "在戈林海科纳地区建立控制。"
 mission_hol_establish_indonesian_trade: "建立印尼贸易"
 mission_hol_establish_indonesian_trade_desc: "通过控制印尼关键岛屿及其珍贵的香料生产，主宰香料贸易。"
 mission_hol_establish_indonesian_trade_tooltip: "在印度尼西亚建立稳固的存在并控制香料生产。"
 mission_hol_establish_caribbean_trade: "建立加勒比贸易"
 mission_hol_establish_caribbean_trade_desc: "在新世界夺取利润丰厚的加勒比殖民地，以获取蔗糖、烟草和奴隶贸易的收益。"
 mission_hol_establish_caribbean_trade_tooltip: "在加勒比地区建立稳固存在并控制烟草生产。"
 mission_hol_develop_banking: "发展银行系统"
 mission_hol_develop_banking_desc: "将阿姆斯特丹打造为欧洲首屈一指的金融中心，配备先进的银行、信贷和金融工具。"
 mission_hol_develop_banking_tooltip: "研究银行业革新并实现高额贸易收入。"
 mission_hol_develop_manufacturing: "发展制造业"
 mission_hol_develop_manufacturing_desc: "扩大荷兰的纺织业和工具制造业，以减少对进口的依赖，并创造高价值的出口商品。"
 mission_hol_develop_manufacturing_tooltip: "在大量生产布匹的同时，建立布匹与工具行会。"
 mission_hol_unite_low_countries: "统一低地国家"
 mission_hol_unite_low_countries_desc: "将所有荷兰语地区统一于单一行政体系之下，以建立一个统一且强大的尼德兰。"
 mission_hol_unite_low_countries_tooltip: "在拥有足够正统性的情况下控制弗里斯兰和布拉班特地区。"
 mission_hol_form_netherlands: "成立尼德兰"
 mission_hol_form_netherlands_desc: "正式建立尼德兰王国，将所有领土统一于一个王冠之下。"
 mission_hol_form_netherlands_tooltip: "在保持正统性与稳定性的前提下成立尼德兰。"
 mission_hol_establish_global_trade: "建立全球贸易网络"
 mission_hol_establish_global_trade_desc: "建立一个全球贸易帝国，将我们的殖民地、工厂和贸易站连接起来。"
 mission_hol_establish_global_trade_tooltip: "获得高额贸易收入并发展制造工坊。"
 mission_hol_counter_british_navy: "对抗英国海军"
 mission_hol_counter_british_navy_desc: "建立一支足以挑战英国海上霸权、保护我国全球贸易航线的海军。"
 mission_hol_counter_british_navy_tooltip: "维持一支规模庞大且传统深厚的海军。"
 mission_hol_develop_science: "发展科学传统"
 mission_hol_develop_science_desc: "促进科学进步与教育，以保持技术领先地位和经济革新能力。"
 mission_hol_develop_science_tooltip: "提高识字率并建立大学。"
 mission_hol_dutch_golden_age: "尼德兰黄金时代"
 mission_hol_dutch_golden_age_desc: "为荷兰开启一段前所未有的繁荣、昌盛与全球影响力的时代。"
 mission_hol_dutch_golden_age_tooltip: "以高威望和高稳定度成为列强。"
 STATIC_MODIFIER_NAME_hol_holland_consolidated: "荷兰统一"
 STATIC_MODIFIER_DESC_hol_holland_consolidated: "牢牢掌控荷兰能有效提升行政管辖与粮食安全水平。"
 STATIC_MODIFIER_NAME_amsterdam_trading_hub: "阿姆斯特丹贸易中心"
 STATIC_MODIFIER_DESC_amsterdam_trading_hub: "阿姆斯特丹已发展成为具有强大贸易影响力的主要商业中心。"
 STATIC_MODIFIER_NAME_hol_food_supply_secured: "粮食供应已保障"
 STATIC_MODIFIER_DESC_hol_food_supply_secured: "可靠的农业生产保障了粮食安全与市场稳定。"
 STATIC_MODIFIER_NAME_hol_burgher_power: "市民阶层力量增强"
 STATIC_MODIFIER_DESC_hol_burgher_power: "强大的商人阶层通过贸易扩张推动经济增长。"
 STATIC_MODIFIER_NAME_hol_utrecht_secured: "乌得勒支已稳固"
 STATIC_MODIFIER_DESC_hol_utrecht_secured: "掌控乌得勒支能加强区域行政控制。"
 STATIC_MODIFIER_NAME_hol_frisian_lands: "弗里西亚地区已整合"
 STATIC_MODIFIER_DESC_hol_frisian_lands: "整合弗里斯兰领土带来了熟练的水手和先进的造船能力。"
 STATIC_MODIFIER_NAME_hol_zeeland_control: "控制泽兰"
 STATIC_MODIFIER_DESC_hol_zeeland_control: "掌控泽兰群岛增强了海军实力与海岸防御。"
 STATIC_MODIFIER_NAME_hol_brabant_influence: "布拉班特影响力确立"
 STATIC_MODIFIER_DESC_hol_brabant_influence: "在布拉班特的影响力可提升布匹产量和制造效率。"
 STATIC_MODIFIER_NAME_hol_independence_secured: "确保独立"
 STATIC_MODIFIER_DESC_hol_independence_secured: "主权地位可提升外交能力与文化影响力。"
 STATIC_MODIFIER_NAME_hol_protestant_reformation: "新教改革"
 STATIC_MODIFIER_DESC_hol_protestant_reformation: "接纳改革宗信仰有助于宗教皈依，并促进宗教宽容。"
 STATIC_MODIFIER_NAME_hol_naval_tradition: "荷兰海军传统"
 STATIC_MODIFIER_DESC_hol_naval_tradition: "强大的海军传统能够保留经验并加速船只建造。"
 STATIC_MODIFIER_NAME_hol_republic_established: "共和国成立"
 STATIC_MODIFIER_DESC_hol_republic_established: "共和制政府提供了额外的改革灵活性。"
 STATIC_MODIFIER_NAME_hol_religious_tolerance: "宗教宽容"
 STATIC_MODIFIER_DESC_hol_religious_tolerance: "宗教宽容政策能降低稳定成本并促进和谐。"
 STATIC_MODIFIER_NAME_hol_baltic_trade: "波罗的海贸易霸权"
 STATIC_MODIFIER_DESC_hol_baltic_trade: "控制波罗的海贸易路线可提升贸易效率与商人实力。"
 STATIC_MODIFIER_NAME_hol_east_india_company: "东印度公司"
 STATIC_MODIFIER_DESC_hol_east_india_company: "荷兰东印度公司组织并拓展殖民事业，其探索范围得以扩大。"
 STATIC_MODIFIER_NAME_hol_cape_colony: "开普殖民地建立"
 STATIC_MODIFIER_DESC_hol_cape_colony: "开普殖民地提供了重要的补给，并增强了殖民能力。"
 STATIC_MODIFIER_NAME_hol_spice_trade: "香料贸易垄断"
 STATIC_MODIFIER_DESC_hol_spice_trade: "掌控印尼香料生产带来了巨大的贸易利润。"
 STATIC_MODIFIER_NAME_hol_caribbean_trade: "加勒比贸易网络"
 STATIC_MODIFIER_DESC_hol_caribbean_trade: "加勒比地区通过烟草和受保护的贸易创造财富。"
 STATIC_MODIFIER_NAME_hol_amsterdam_banking: "阿姆斯特丹金融中心"
 STATIC_MODIFIER_DESC_hol_amsterdam_banking: "阿姆斯特丹的金融市场提供了有利的信贷和建设优势。"
 STATIC_MODIFIER_NAME_hol_dutch_manufacturing: "荷兰制造业"
 STATIC_MODIFIER_DESC_hol_dutch_manufacturing: "先进的制造能力提升了生产效率和纺织品产出。"
 STATIC_MODIFIER_NAME_hol_low_countries_united: "低地国家联合"
 STATIC_MODIFIER_DESC_hol_low_countries_united: "统一的荷兰领土可提供额外的人力与文化容量。"
 STATIC_MODIFIER_NAME_hol_kingdom_of_netherlands: "尼德兰王国"
 STATIC_MODIFIER_DESC_hol_kingdom_of_netherlands: "统一的王国拥有更高的外交声望和行政能力。"
 STATIC_MODIFIER_NAME_hol_global_trade_network: "全球贸易网络"
 STATIC_MODIFIER_DESC_hol_global_trade_network: "全球贸易连接可最大化贸易效率和商人容量。"
 STATIC_MODIFIER_NAME_hol_naval_challenge: "海军挑战"
 STATIC_MODIFIER_DESC_hol_naval_challenge: "增强的海军能力以更高的战斗效能向海上宿敌发起挑战。"
 STATIC_MODIFIER_NAME_hol_scientific_tradition: "荷兰科学传统"
 STATIC_MODIFIER_DESC_hol_scientific_tradition: "浓厚的科学文化能加速科研进程并提升教育水平。"
 STATIC_MODIFIER_NAME_hol_golden_age: "尼德兰黄金时代"
 STATIC_MODIFIER_DESC_hol_golden_age: "前所未有的繁荣时代提升了威望与大国的地位，同时减少了国际间的敌意。"
 holland_mission_events.1.t: "阿姆斯特丹发展"
 holland_mission_events.1.d: "阿姆斯特丹已从一个小渔村转变为繁华的商业中心。它的市场吸引了来自欧洲各地的商人，运河中满载着来自遥远国度的货船。"
 holland_mission_events.2.t: "荷兰独立宣言"
 holland_mission_events.2.d: "荷兰已摆脱外国统治，成为一个主权国家。我们的商人如今可以自由贸易，我们的船只悬挂本国旗帜航行，我们的命运掌握在自己手中。"
 holland_mission_events.3.t: "荷兰共和国成立"
 holland_mission_events.3.d: "荷兰共和国正式成立，开创了商人寡头与代议制机构相制衡的独特政体。这一创新体系将成为其他国家的典范。"
 holland_mission_events.4.t: "东印度公司成立"
 holland_mission_events.4.d: "荷兰东印度公司已获特许，被授予亚洲贸易的垄断权。这一强大的组织将负责组织我们的殖民事业并捍卫我们的贸易利益。"
 holland_mission_events.5.t: "开普殖民地建立"
 holland_mission_events.5.d: "好望角已建立定居点，为往来欧亚的船只提供了至关重要的补给站。这一战略要地巩固了我们通往东方的海上航线。"
 holland_mission_events.6.t: "主导香料贸易"
 holland_mission_events.6.d: "荷兰对印尼香料群岛的控制现已完成。肉豆蔻、丁香和胡椒源源不断地流入阿姆斯特丹，使我们成为全球最主要的香料供应国，并带来了巨额财富。"
 holland_mission_events.7.t: "尼德兰王国"
 holland_mission_events.7.d: "所有荷兰语地区已统一于同一王冠之下，尼德兰王国就此诞生。我们统一的国家如今在欧洲舞台上赢得了更多尊重。"
 holland_mission_events.8.t: "全球贸易网络已建立"
 holland_mission_events.8.d: "荷兰的贸易站、殖民地与商馆如今遍布全球。我们的船只连接各大洲，我们的商人主宰着国际贸易，阿姆斯特丹俨然成为世界的仓库。"
 holland_mission_events.9.t: "荷兰黄金时代开启"
 holland_mission_events.9.d: "尼德兰已进入一段前所未有的繁荣与文化昌盛时期。我们的艺术家创作出杰作，我们的科学家取得重大发现，我们的商人积累巨额财富，我们的影响力遍及全球。"