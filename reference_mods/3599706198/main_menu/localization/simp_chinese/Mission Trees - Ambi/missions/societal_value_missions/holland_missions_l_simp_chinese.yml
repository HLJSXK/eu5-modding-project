 mission_war_preparation_completion:0 "获得对海尔德兰的征服宣战理由"
 mission_frisian_dominance_completion:0 "弗里西亚之地正在并入我们的领土"
 mission_dutch_unification_completion:0 "荷兰全境的控制力得到加强"
