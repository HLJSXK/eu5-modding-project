l_simp_chinese:
 france_mission_pack: "法兰西：最虔诚的基督教王国"
 france_mission_pack_desc: "引导法国从一个四分五裂的领地，历经百年战争与意大利战争，最终建立起一个中央集权的绝对主义国家，主导欧洲的政治与文化。"
 france_mission_pack_BUTTON_TOOLTIP: "完成统一法兰西的使命，赢得百年战争，建立君主专制，构建殖民帝国，并实现欧洲霸权。"
 france_mission_pack_CRITERIA_DESCRIPTION: "巩固法国王权，强化君主集权，发展巴黎，打造强大军队，确立法兰西在文化与政治领域的支配地位。"
 mission_fra_secure_the_french_crown: "确保法兰西王位稳固"
 mission_fra_secure_the_french_crown_desc: "卡佩王朝的正统性面临挑战。我们必须通过加冕典礼与王室仪典，彰显君权神授，以巩固臣民的忠诚。"
 mission_fra_secure_the_french_crown_tooltip: "在管理贵族影响力的同时保持高稳定度和正统性。"
 mission_fra_curtail_noble_power: "削弱贵族权力"
 mission_fra_curtail_noble_power_desc: "法兰西的大贵族们拥有过多的独立权威。我们必须削弱他们的权力，将其牢牢置于王室的控制之下。"
 mission_fra_curtail_noble_power_tooltip: "削弱贵族阶层力量，同时加强王室领地影响力。"
 mission_fra_establish_parlement: "设立议会"
 mission_fra_establish_parlement_desc: "在巴黎设立王室法庭，以执行法律、登记王室法令，并制衡贵族权力。"
 mission_fra_establish_parlement_tooltip: "保持高稳定性与正统性，以维持贵族与市民阶层的高度满意度。"
 mission_fra_consolidate_ile_de_france: "整合法兰西岛"
 mission_fra_consolidate_ile_de_france_desc: "法兰西的核心地带必须牢牢掌握在王室手中。确保巴黎周边所有领土的安全，为王国建立一个稳固的根基。"
 mission_fra_consolidate_ile_de_france_tooltip: "取得法兰西岛地区的控制权，无论是直接控制还是通过附庸国实现。"
 mission_fra_develop_paris: "发展巴黎"
 mission_fra_develop_paris_desc: "巴黎必须成为配得上法兰西的首都。投资其发展，扩建基础设施，使其成为王国的经济与文化中心。"
 mission_fra_develop_paris_tooltip: "将巴黎发展至至少40点发展度，并建造大量建筑以提升贸易收入。"
 mission_fra_construct_royal_roads: "修建皇家道路"
 mission_fra_construct_royal_roads_desc: "修建皇家道路网络，连接巴黎与兰斯大教堂城以及战略要地奥尔良。"
 mission_fra_construct_royal_roads_tooltip: "修建从巴黎通往奥尔良和兰斯的道路。"
 mission_fra_connect_french_cities: "连接法国城市"
 mission_fra_connect_french_cities_desc: "扩建道路网络，连接法国北部所有主要城市，以促进贸易、军队调动和皇室行政管理。"
 mission_fra_connect_french_cities_tooltip: "在巴黎、奥尔良、沙特尔和亚眠之间建立道路连接。"
 mission_fra_promote_french_culture: "推广法兰西文化"
 mission_fra_promote_french_culture_desc: "必须在整个领地推广法语和文化。支持那些颂扬法国成就的学者、诗人和编年史家。"
 mission_fra_promote_french_culture_tooltip: "达成较高的法兰西文化传统并建造图书馆。"
 mission_fra_found_university_of_paris: "创立巴黎大学"
 mission_fra_found_university_of_paris_desc: "在巴黎建立一所大学，培养为王国服务、推动法国学术发展的行政官员、神学家和学者。"
 mission_fra_found_university_of_paris_tooltip: "在巴黎建造一所大学并实现高识字率。"
 mission_fra_prepare_for_hundred_years_war: "准备百年战争"
 mission_fra_prepare_for_hundred_years_war_desc: "英格兰国王觊觎法兰西王位。我们必须为王国做好准备，迎接这场关乎法兰西存亡的漫长且艰苦的斗争。"
 mission_fra_prepare_for_hundred_years_war_tooltip: "保持充足的黄金储备和强大的军队。"
 mission_fra_counter_english_claims: "反制英格兰宣称"
 mission_fra_counter_english_claims_desc: "那位英格兰觊觎者的宣称动摇了我们的正统性。我们必须反击英格兰的宣传，揭露其野心的不合法性。"
 mission_fra_counter_english_claims_tooltip: "超越英格兰的威望，并在英格兰维持一个间谍网络。"
 mission_fra_secure_paris_basin: "确保巴黎盆地的安全"
 mission_fra_secure_paris_basin_desc: "通往巴黎的路径必须确保安全。控制香槟区域，以保护我们的首都免受英格兰入侵。"
 mission_fra_secure_paris_basin_tooltip: "在香槟地区建立控制，并储备充足的人力资源。"
 mission_fra_liberate_normandy: "解放诺曼底"
 mission_fra_liberate_normandy_desc: "诺曼底公国是法兰西王室的古老领地，如今正遭受英格兰的占领。我们必须解放我们的诺曼兄弟。"
 mission_fra_liberate_normandy_tooltip: "控制诺曼底地区并占领鲁昂。"
 mission_fra_reconquer_guyenne: "收复吉耶纳"
 mission_fra_reconquer_guyenne_desc: "英国人仍占据着吉耶纳，这是他们庞大欧陆帝国的残余。我们必须将他们逐出这片富饶的南方省份。"
 mission_fra_reconquer_guyenne_tooltip: "控制吉耶纳地区并占领波尔多。"
 mission_fra_secure_gascony: "确保加斯科涅的安全"
 mission_fra_secure_gascony_desc: "收复吉耶纳后，我们必须确保控制加斯科涅周边领土，以巩固法国在西南地区的长期统治。"
 mission_fra_secure_gascony_tooltip: "确立对加斯科涅地区的控制。"
 mission_fra_develop_bordeaux_wine_trade: "发展波尔多葡萄酒贸易"
 mission_fra_develop_bordeaux_wine_trade_desc: "波尔多的葡萄酒在欧洲各地备受推崇。既然这座城市已归法国所有，我们必须发展这一利润丰厚的贸易，以充实王室财富。"
 mission_fra_develop_bordeaux_wine_trade_tooltip: "发展波尔多，提升葡萄酒产量，并建立强大的市场影响力。"
 mission_fra_expel_english_from_france: "将英格兰人逐出法兰西"
 mission_fra_expel_english_from_france_desc: "是时候彻底终结英格兰在法国的存在了。绝不让一座英格兰掌控的集镇继续留在我们的王国之中。"
 mission_fra_expel_english_from_france_tooltip: "将所有法国区域领土上的英格兰控制全部清除。"
 mission_fra_reclaim_calais: "收复加莱"
 mission_fra_reclaim_calais_desc: "加莱是英格兰最后的据点，犹如一把直指法兰西心脏的匕首。我们必须夺回这座战略港口，并将其巩固为法兰西的要塞。"
 mission_fra_reclaim_calais_tooltip: "占领并加固加莱。"
 mission_fra_establish_spy_network_on_burgundy: "在勃艮第建立间谍网络"
 mission_fra_establish_spy_network_on_burgundy_desc: "勃艮第公爵们已变得过于强大，统治着本应属于法兰西的广阔领土。我们必须渗透进他们的宫廷。"
 mission_fra_establish_spy_network_on_burgundy_tooltip: "在勃艮第维持强大的间谍网络。"
 mission_fra_integrate_brittany: "整合布列塔尼"
 mission_fra_integrate_brittany_desc: "布列塔尼公国虽文化独特，但必须通过联姻、外交或武力手段将其纳入法兰西的势力范围。"
 mission_fra_integrate_brittany_tooltip: "控制布列塔尼地区并占领雷恩。"
 mission_fra_develop_brittany_ports: "发展布列塔尼港口"
 mission_fra_develop_brittany_ports_desc: "布列塔尼的大西洋海岸线拥有优良的港口。发展这些港口，以支持我们日益增长的海军雄心。"
 mission_fra_develop_brittany_ports_tooltip: "在布列塔尼建造码头并组建一支强大的海军。"
 mission_fra_integrate_provence: "整合普罗旺斯"
 mission_fra_integrate_provence_desc: "普罗旺斯凭借其地中海港口，为法兰西提供了通往南方贸易的通道，并成为进军意大利的门户。"
 mission_fra_integrate_provence_tooltip: "控制普罗旺斯地区并占领马赛。"
 mission_fra_prepare_vassal_annexation: "准备附庸吞并"
 mission_fra_prepare_vassal_annexation_desc: "我们众多的附庸国最终必须完全并入王国。请为和平吞并做好行政框架准备。"
 mission_fra_prepare_vassal_annexation_tooltip: "维持附庸忠诚，使其独立倾向较低，并强化王室阶层力量。"
 mission_fra_annex_french_vassals: "吞并法国附庸国"
 mission_fra_annex_french_vassals_desc: "是时候完成法兰西的统一大业了。让我们将剩余的附庸国完全纳入王室统治之下。"
 mission_fra_annex_french_vassals_tooltip: "在控制法国大部分区域的同时减少附庸国数量。"
 mission_fra_prepare_for_italian_expedition: "准备意大利远征"
 mission_fra_prepare_for_italian_expedition_desc: "意大利富庶的城市和分裂的城邦吸引着我们。请组建一支强大的军队，准备跨越阿尔卑斯山脉进行征战。"
 mission_fra_prepare_for_italian_expedition_tooltip: "积累黄金并维持一支强大的军队。"
 mission_fra_invade_italy: "染指意大利"
 mission_fra_invade_italy_desc: "必须主张法国对那不勒斯和米兰的领土要求。跨越阿尔卑斯山脉，在意大利半岛确立法兰西的存在。"
 mission_fra_invade_italy_tooltip: "控制多个意大利地点。"
 mission_fra_secure_genoa: "确保热那亚的安全"
 mission_fra_secure_genoa_desc: "热那亚优良的地中海港口和强大的舰队对法国而言价值非凡。将这个海洋共和国纳入我们的势力范围。"
 mission_fra_secure_genoa_tooltip: "占领热那亚并维持一支强大的海军。"
 mission_fra_control_alpine_passes: "控制阿尔卑斯山隘口"
 mission_fra_control_alpine_passes_desc: "控制萨伏依和多菲内地区的山口，以确保法军能快速在法国与意大利之间调动。"
 mission_fra_control_alpine_passes_tooltip: "在萨伏依地区的关键地点设防。"
 mission_fra_counter_habsburg_influence: "对抗哈布斯堡影响力"
 mission_fra_counter_habsburg_influence_desc: "哈布斯堡家族对法国的包围威胁着我们的宏图大业。我们必须挑战他们在意大利及我国边境沿线的主导地位。"
 mission_fra_counter_habsburg_influence_tooltip: "匹配或超越哈布斯堡的军事力量。"
 mission_fra_dominate_italy: "主宰意大利"
 mission_fra_dominate_italy_desc: "历经数代纷争，法国必须在意大利半岛确立明确的统治地位，掌控其财富与战略要地。"
 mission_fra_dominate_italy_tooltip: "控制包括米兰在内的意大利重要领土。"
 mission_fra_develop_french_economy: "发展法国经济"
 mission_fra_develop_french_economy_desc: "法国的经济潜力尚未得到充分开发。鼓励贸易、建设市场，并发展我们的内部经济。"
 mission_fra_develop_french_economy_tooltip: "通过广泛的市场基础设施实现高额贸易与税收收入。"
 mission_fra_establish_wine_trade: "建立葡萄酒贸易"
 mission_fra_establish_wine_trade_desc: "法国葡萄酒是基督教世界中最优质的佳酿。发展这项出口贸易，将为王国带来财富与威望。"
 mission_fra_establish_wine_trade_tooltip: "大量生产葡萄酒并建立强大的市场影响力。"
 mission_fra_develop_silk_industry: "发展丝绸产业"
 mission_fra_develop_silk_industry_desc: "里昂和图尔的丝绸生产能减少我们对意大利进口的依赖，并建立起国内产业。"
 mission_fra_develop_silk_industry_tooltip: "实现国内丝绸生产自给自足。"
 mission_fra_secure_silk_supply: "保障丝绸供应"
 mission_fra_secure_silk_supply_desc: "要发展我们的丝绸产业，必须通过贸易或直接控制产丝区域来确保生丝原料的供应。"
 mission_fra_secure_silk_supply_tooltip: "控制多个丝绸产地并实现高额贸易价值。"
 mission_fra_establish_french_banking: "建立法国银行业"
 mission_fra_establish_french_banking_desc: "法国国王长期以来依赖意大利银行家。现在，是时候发展我们自己的银行体系，以资助王室的宏图大业了。"
 mission_fra_establish_french_banking_tooltip: "研究银行业革新并在巴黎建立银行。"
 mission_fra_establish_absolutist_monarchy: "建立绝对君主制"
 mission_fra_establish_absolutist_monarchy_desc: "国王必须成为其王国的绝对主宰。削弱贵族权力，将所有权威集中于王室。"
 mission_fra_establish_absolutist_monarchy_tooltip: "在拥有最高正统性与稳定性的情况下，实现王室阶层力量占据主导地位。"
 mission_fra_establish_intendants: "设立总督"
 mission_fra_establish_intendants_desc: "派遣王室官员前往各省，以执行王室意志、征收税款，并绕过贵族权力。"
 mission_fra_establish_intendants_tooltip: "提高识字率以组建高效的官僚体系。"
 mission_fra_centralize_administration: "中央集权"
 mission_fra_centralize_administration_desc: "完成法国行政集权化，将所有治理事务纳入王室直接掌控之下。"
 mission_fra_centralize_administration_tooltip: "在本土区域实现高控制度并获得主导性的王室阶层力量。"
 mission_fra_reform_french_army: "改革法国军队"
 mission_fra_reform_french_army_desc: "我们的封建征召兵已过时。应建立一支训练、装备和组织均标准化的职业军队。"
 mission_fra_reform_french_army_tooltip: "维持一支强大的军队，并配备完善的兵营基础设施。"
 mission_fra_establish_standing_army: "建立常备军"
 mission_fra_establish_standing_army_desc: "即使在和平时期也维持一支常备的职业军队，确保法国随时为战争做好准备。"
 mission_fra_establish_standing_army_tooltip: "建立一支庞大的常备军。"
 mission_fra_develop_french_artillery: "发展法国炮兵"
 mission_fra_develop_french_artillery_desc: "精良的火炮将使我们在围城战和野战中占据优势。建立铸造厂并训练熟练的炮手。"
 mission_fra_develop_french_artillery_tooltip: "接纳炮兵思潮并建造火炮铸造厂。"
 mission_fra_develop_atlantic_fleet: "发展大西洋舰队"
 mission_fra_develop_atlantic_fleet_desc: "法国必须挑战英国的海上霸权。从我们的布列塔尼和诺曼底港口，打造一支强大的大西洋舰队。"
 mission_fra_develop_atlantic_fleet_tooltip: "建造一支强大的海军，并配备完善的干船坞基础设施。"
 mission_fra_sponsor_exploration: "赞助探索"
 mission_fra_sponsor_exploration_desc: "法国航海家必须加入伟大的探索时代。资助航行以发现新土地和贸易路线。"
 mission_fra_sponsor_exploration_tooltip: "维持一支强大的海军，配备经验丰富的探险家并储备充足的国库资金。"
 mission_fra_discover_new_world: "探索新大陆"
 mission_fra_discover_new_world_desc: "法国探险家必须在我们的宿敌完全瓜分美洲之前抵达那里，并为王室宣称领土。"
 mission_fra_discover_new_world_tooltip: "探索加拿大东海岸。"
 mission_fra_establish_colonial_company: "建立殖民公司"
 mission_fra_establish_colonial_company_desc: "效仿对手的做法，特许成立一家殖民公司来组织和资助我们在美洲的冒险事业。"
 mission_fra_establish_colonial_company_tooltip: "建立多个殖民国家。"
 mission_fra_colonize_caribbean: "殖民加勒比地区"
 mission_fra_colonize_caribbean_desc: "加勒比海的糖岛蕴藏着巨大财富。在安的列斯群岛各处建立法国殖民地。"
 mission_fra_colonize_caribbean_tooltip: "在加勒比地区建立实质性存在。"
 mission_fra_establish_indian_trading_posts: "建立印度贸易站"
 mission_fra_establish_indian_trading_posts_desc: "印度的财富在召唤。在次大陆建立贸易站，以获取香料和纺织品贸易的利益。"
 mission_fra_establish_indian_trading_posts_tooltip: "在德干区域建立贸易基础设施，并配备强大的海军支援。"
 mission_fra_promote_french_enlightenment: "推广法国启蒙运动"
 mission_fra_promote_french_enlightenment_desc: "法兰西必须在哲学、科学与文学领域引领欧洲。支持启蒙时代的哲人与科学家。"
 mission_fra_promote_french_enlightenment_tooltip: "以高识字率和广泛的教育基础设施拥抱启蒙时代。"
 mission_fra_promote_french_language: "推广法语"
 mission_fra_promote_french_language_desc: "法语应成为文明欧洲的语言。通过文学、外交与教育推广我们的语言。"
 mission_fra_promote_french_language_tooltip: "凭借印刷基础设施，实现卓越的法国文化传统。"
 mission_fra_develop_french_arts: "发展法兰西艺术"
 mission_fra_develop_french_arts_desc: "赞助艺术家、建筑师和音乐家，将法国打造为欧洲文化之都，并为王室增添荣耀。"
 mission_fra_develop_french_arts_tooltip: "建造剧院并资助艺术发展。"
 mission_fra_counter_british_naval_power: "对抗英国海军力量"
 mission_fra_counter_british_naval_power_desc: "英国的海上霸权正威胁着我们的殖民地与贸易。必须建立一支能够挑战皇家海军的舰队。"
 mission_fra_counter_british_naval_power_tooltip: "建立一支能与英国实力相匹敌的强大海军。"
 mission_fra_establish_french_hegemony: "建立法兰西霸权"
 mission_fra_establish_french_hegemony_desc: "法国必须成为欧洲大陆的主导力量，让所有人既敬畏又尊重。"
 mission_fra_establish_french_hegemony_tooltip: "成为列强并控制大部分法兰西区域。"
 mission_fra_dominate_europe: "主宰欧洲"
 mission_fra_dominate_europe_desc: "法兰西必将成为欧洲的霸主、大陆命运的仲裁者与事务的领导者。"
 mission_fra_dominate_europe_tooltip: "以压倒性的发展度和收入成就霸主地位。"
 mission_fra_spark_french_revolution: "点燃法国大革命"
 mission_fra_spark_french_revolution_desc: "旧制度腐败且效率低下。革命思想在民众中传播。或许，是时候进行根本性的变革了。"
 mission_fra_spark_french_revolution_tooltip: "在经历动荡和低正统性的同时，接纳启蒙思想。"
 france_mission_events.1.t: "兰斯加冕"
 france_mission_events.1.d: "在兰斯大教堂中，当着齐聚一堂的法兰西贵族与教士，我们接受了神圣的涂油礼。克洛维的圣油已将我们膏立为法兰西真正的君王。万民欢呼，贵族俯首，上帝亦已赐福于我们的统治。"
 france_mission_events.2.t: "巴黎的辉煌"
 france_mission_events.2.d: "巴黎的发展已远超我们最宏伟的期许。宏伟建筑矗立街道两侧，商人云集市场，学者汇聚于大学之中。诚然，这座城市已成为配得上法兰西王冠的国都。"
 france_mission_events.3.t: "诺曼底解放"
 france_mission_events.3.d: "英格兰的旗帜最后一次在鲁昂降下，军队穿过欢呼的人群，诺曼底重归法兰西的怀抱。这片古老的公国，征服者的摇篮，如今永远属于法兰西。"
 france_mission_events.4.t: "百年战争的胜利"
 france_mission_events.4.d: "经过一个多世纪的冲突，英格兰人终于被逐出法兰西国土。加莱已然陷落，我国境内再无一名英军士兵。法兰西如今自由、统一，且比以往任何时候都更加强大。让全欧洲见证我们的胜利！"
 france_mission_events.6.t: "法国在意大利的霸权"
 france_mission_events.6.d: "从米兰到那不勒斯，法国的影响力遍布意大利半岛。我们的将领展现了非凡的勇气，外交官编织出精密的联盟网络，法兰西文化更令意大利诸宫廷为之倾倒。法国实现了其他列强未能企及的成就——真正主宰了意大利。"
 france_mission_events.9.t: "法兰西黄金时代"
 france_mission_events.9.d: "这是法兰西的黄金时代——一个在艺术、科学和军事领域取得空前成就的纪元。我们的哲学家以理性之光启迪世界，我们的军队战胜一切敌人，我们的宫廷为全欧洲树立典范。即便是太阳王本人，也会为今日法兰西的成就而惊叹。"
