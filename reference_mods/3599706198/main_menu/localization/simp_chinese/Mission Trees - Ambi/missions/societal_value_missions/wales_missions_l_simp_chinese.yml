 welsh_mountains_flavor: "威尔士的群山犹如沉默的哨兵，守护着我们古老的传统与新获得的独立。"
 welsh_longbows_flavor: "山谷中回荡着长弓的拨弦声，数百年来，这声音始终令来犯之敌闻风丧胆。"
 welsh_bards_flavor: "吟游诗人传唱着古代国王与英雄的史诗，他们的诗篇编织成威尔士认同与韧性的挂毯。"
 welsh_dragon_flavor: "红龙旗骄傲地飘扬，象征着一个民族决心主宰自己命运的如火意志。"