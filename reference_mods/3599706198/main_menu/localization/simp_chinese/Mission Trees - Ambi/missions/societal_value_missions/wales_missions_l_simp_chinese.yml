 boosted_trade_tt: "我们的贸易路线将得到加强，从而增加我们的商业收入。"
 developed_mining_tt: "我们的采矿行业将扩大，从而提高产量。"
 diplomatic_annexation_tt: "我们和平地整合了威尔士，这赢得外交优势。"
 military_coercion_tt: "我们的军事传统和士气将通过实力展示得到提升。"
 guerrilla_warfare_tt: "我们的军队将擅长游击战术并就地补给。"
 mountain_warfare_tt: "我们山地上的防御将得到加强，让威尔士坚不可摧。"
 welsh_council_tt: "通过集体统治，国库将得到充实，国家将保持稳定。"
 welsh_monarchy_tt: "建立强有力的中央政府，实行高效管理。"
 welsh_kingdom_established_tt: "威尔士王国已成立，巩固了我们在欧洲各国中的地位。"
 mission_develop_welsh_heartland_comp: "我们的核心地带已经发展起来，为威尔士发展奠定了坚实基础。"
 mission_unite_welsh_principalities_comp: "威尔士各公国团结在我们的旗帜下，巩固了我们的地位。"
 mission_centralize_welsh_rule_comp: "中央集权已经建立，让我们有效治理威尔士。"
 mission_fortify_welsh_borders_comp: "我们的边境现已由坚固的城堡和防御工事加固。"
 mission_raise_welsh_levies_comp: "威尔士的民兵队伍已经集结完毕，其中包括我们著名的长弓手。"
 mission_strengthen_welsh_identity_comp: "威尔士文化与身份认同感得到加强，团结了我们的人民。"
 mission_declare_welsh_independence_comp: "威尔士已宣布独立！斗争就此开始。"
 mission_secure_welsh_borders_comp: "威尔士的边境安全，主权得到了承认。"
 mission_establish_welsh_kingdom_comp: "威尔士王国已经建立！威尔士主权万岁！"
 welsh_cultural_revival_desc: "威尔士的文化得以复兴！文化影响力与传统正蓬勃发展。"
 welsh_trade_development_desc: "威尔士的贸易得以发展，收入与效率已得到提升。"
 welsh_infrastructure_development_desc: "威尔士的基础设施得以发展，产能与本地劳动力已实现增长。"
 welsh_unification_desc: "威尔士统一，各阶层人士表示满意，控制力正在提高。"
 centralized_welsh_rule_desc: "威尔士的中央集权使得君权与政府效率得到提升。"
 welsh_diplomatic_annexation_desc: "外交吞并，我们的外交声誉与吞并能力得到加强。"
 welsh_military_coercion_desc: "军事胁迫，陆军传统、士气与步兵作战效率获得提升。"
 welsh_mountain_defenses_desc: "威尔士山地防御工事，我们的防御设施维护成本更低，且还有卓越的防御能力。"
 welsh_longbow_traditions_desc: "威尔士长弓传统——我们的军队纪律严明、士气高昂，恪守射箭技艺的传承。"
 welsh_independence_fervor_desc: "威尔士独立热情高涨——士气高昂，厌战度迅速下降。"
 welsh_guerrilla_warfare_desc: "威尔士游击战——我军擅长游击战与就地补给。"
 secure_welsh_borders_desc: "确保威尔士边境安全——移民、控制力和繁荣在威尔士各地不断增长。"
 kingdom_of_wales_desc: "威尔士王国——我们的外交地位与君权体现了我们的王室身份。"
 welsh_strong_monarchy_desc: "强大的威尔士君主制——政府效率和建设能力得到提高。"
