l_simp_chinese:
 wales_independence_mission_pack: "威尔士独立斗争"
 wales_independence_mission_pack_desc: "带领威尔士人民走向独立，建立威尔士人的主权王国。"
 wales_independence_expansion_mission_pack_BUTTON_TOOLTIP:0 "完成掌控并统一威尔士领土的任务。"
 wales_independence_mission_pack_CRITERIA_DESCRIPTION:0 "实现威尔士脱离英格兰的统治，并独立建立一个强大且统一的威尔士王国。"
 mission_develop_welsh_heartland: "开发威尔士核心地区"
 mission_develop_welsh_heartland_desc: "加强首都，为威尔士发展奠定坚实的经济基础。"
 mission_unite_welsh_principalities: "统一威尔士诸公国"
 mission_unite_welsh_principalities_desc: "将分裂的威尔士领主们团结在同一旗帜与目标之下。"
 mission_centralize_welsh_rule: "集中威尔士统治权"
 mission_centralize_welsh_rule_desc: "建立强大的中央集权，从而有效统治威尔士。"
 mission_fortify_welsh_borders: "巩固威尔士边境"
 mission_fortify_welsh_borders_desc: "在威尔士多山边境沿线修筑城堡与防御工事，以威慑英格兰人。"
 mission_raise_welsh_levies: "征召威尔士民兵"
 mission_raise_welsh_levies_desc: "集结威尔士长弓手，为即将到来的战斗做准备。"
 mission_strengthen_welsh_identity: "强化威尔士认同"
 mission_strengthen_welsh_identity_desc: "推广威尔士文化、语言和传统，建立身份认同共同抵御外来统治。"
 mission_declare_welsh_independence: "宣布威尔士独立"
 mission_declare_welsh_identity_desc: "正式摆脱英格兰统治，并主张威尔士主权。"
 mission_secure_welsh_borders: "巩固威尔士边境"
 mission_secure_welsh_borders_desc: "巩固领土安全，确保威尔士的独立。"
 mission_establish_welsh_kingdom: "建立威尔士王国"
 mission_establish_welsh_kingdom_desc: "为威尔士君王加冕，建立一个经得起时间考验的王国。"
 wales_independence_events.1.t: "威尔士核心地区的发展"
 wales_independence_events.1.d: "随着我们的首都经济日益蓬勃，我们应当侧重于与邻国的贸易往来，还是投资于国内基础设施和采矿业？"
 wales_independence_events.2.t: "团结威尔士诸领主"
 wales_independence_events.2.d: "关于如何统一威尔士诸公国，我们遇到了难题。是运用外交手段进行协商，还是展示军事实力以确保其忠诚？"
 wales_independence_events.10.t: "独立战争"
 wales_independence_events.10.d: "威尔士独立的斗争已经开始了！我们要该如何对抗英格兰的行动？是利用我们对地形的了解进行游击战，还是依靠我们坚固的山地据点？"
 wales_independence_events.11.t: "威尔士王冠"
 wales_independence_events.11.d: "独立既已实现，我们必须决定威尔士未来的治理方式。是建立王公议会实行集体统治，还是拥立一位强大的君主来领导我们新生的王国？"
 wales_independence_events.1.a: "聚焦贸易"
