 mission_dev_heartland_rew: "奖励：\n※有75金币\n※+1要塞上限\n※首都发展力加成\n※触发事件：发展选择"
 mission_unite_principalities_rew: "奖励：\n※威尔士统一修正（5年）\n※+1外交声誉.\n※触发事件：统一方式"
 mission_centralize_rule_rew: "奖励：\n※威尔士的中央集权修正（10年）\n※25威望\n※每月控制力提升"
 mission_fortify_borders_rew: "奖励：\n※威尔士山地防御修正（永久）"
 mission_raise_levies_rew: "奖励：\n※威尔士长弓传统修正（10年）"
 mission_strengthen_identity_rew: "奖励：\n※20点文化传统\n※威尔士文化复兴修正（15年）"
 mission_declare_independence_rew: "奖励：\n※‑15厌战度\n※威尔士独立热忱修正.（5年）\n※触发事件：战争策略"
 mission_secure_borders_rew: "奖励：\n※稳固威尔士边境修正（10年）\n※30威望\n※50正统性"
 mission_establish_kingdom_rew: "奖励：\n※威尔士人的王国修正（永久）\n※75威望\n※触发事件：政府形态\n※威尔士王国已建立！"
 wales_independence_mission_pack_tooltip: "本任务包指引威尔士通过独立斗争摆脱英格兰统治，并建立主权威尔士王国。"
 wales_independence_events.1.flavor: "威尔士的群山回响着建设与商业的喧嚣，我们的人民满怀希望地展望未来。"
 wales_independence_events.2.flavor: "古老的威尔士领主聚集在一起，他们的旗帜在山风中飘扬。团结还是支配——选择权在我们手中。"
 wales_independence_events.10.flavor: "龙旗高高飘扬！从雪墩山到威尔士边疆，自由的呐喊响彻山谷。"
 wales_independence_events.11.flavor: "在祖先的殿堂中，我们将决定一个民族的命运。威尔士应该由议会统治，还是由君主统治？"
 mission_develop_flavor: "从崎岖山脉到沿海平原，我们必须建成能够支撑我们独立梦想的经济。"
 mission_unite_flavor: "长久以来，威尔士人一直因诸侯纷争而四分五裂，只有团结一致才能对抗英格兰人。"
 mission_centralize_flavor: "一个强大的中央集权政府将使我们能够发出统一的声音，并有效地治理我们的土地。"
 mission_fortify_flavor: "我们的山脉是我们最强大的防御工事，让我们用石头和钢铁将它们筑成坚不可摧的堡垒。"
 mission_raise_levies_flavor: "威尔士长弓兵一直是我们敌人的噩梦，让我们组建一支配得上我们传统的军队。"
 mission_strengthen_identity_flavor: "我们的语言、我们的诗歌、我们的法律——正是这些塑造了威尔士人的认同，让我们区别于英格兰人。"
 mission_declare_independence_flavor: "无需再忍！向世界宣告——威尔士将重获自由！"
 mission_secure_borders_flavor: "独立是在战场上赢得的，但要维持稳固，离不开强大的边疆和繁荣的国土。"
 mission_establish_kingdom_flavor: "从苦难中崛起的王国将屹立数世纪，威尔士万岁！"
