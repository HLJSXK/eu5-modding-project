l_simp_chinese:
 brandenburg_missions: "勃兰登堡任务树"
 brandenburg_missions_DESCRIPTION: "勃兰登堡最初是神圣罗马帝国的北部边疆，但近来其昔日的影响力日益衰落。统一勃兰登堡诸地，向东扩张，缔造强大的普鲁士王国吧！"
 brandenburg_missions_BUTTON_DETAILS: "强化勃兰登堡的君权，扩张领土，建立普鲁士王国，以解锁强大的修正与传统。"
 brandenburg_missions_BUTTON_TOOLTIP: "\n\n"
 brandenburg_missions_CRITERIA_DESCRIPTION: "完成任务以强化勃兰登堡，建立普鲁士王国并在德意志地区确立统治地位。"
 mission_bra_deal_with_the_robber_barons: "对付强盗贵族"
