 STATIC_MODIFIER_NAME_bra_austrian_rivalry_overcome: "奥地利宿怨化解"
 STATIC_MODIFIER_DESC_bra_austrian_rivalry_overcome: "通过成功挑战哈布斯堡王朝，我们已确立了自己作为真正大国的地位。"
 STATIC_MODIFIER_NAME_bra_enlightened_absolutism: "开明专制"
 STATIC_MODIFIER_DESC_bra_enlightened_absolutism: "国家是人民的第一公仆，以理性与效率为指引。"
 STATIC_MODIFIER_NAME_bra_efficient_prussian_bureaucracy: "高效的普鲁士官僚体系"
 STATIC_MODIFIER_DESC_bra_efficient_prussian_bureaucracy: "我们的文官体系是一台无与伦比、精密可靠的机器。"
 STATIC_MODIFIER_NAME_bra_prussian_military_tradition: "普鲁士军事传统"
 STATIC_MODIFIER_DESC_bra_prussian_military_tradition: "军事卓越乃我国与社会的基石。"
 STATIC_MODIFIER_NAME_bra_prussian_infantry_excellence: "普鲁士步兵"
 STATIC_MODIFIER_DESC_bra_prussian_infantry_excellence: "我军步兵严格的操练和坚定不移的训练度，在战斗开始前就已奠定胜局。"
 STATIC_MODIFIER_NAME_bra_modern_prussian_artillery: "现代普鲁士炮兵"
 STATIC_MODIFIER_DESC_bra_modern_prussian_artillery: "我们的火炮是世界上最先进的，能够撕裂任何抵抗。"
 STATIC_MODIFIER_NAME_prussian_economic_development: "普鲁士经济发展"
 STATIC_MODIFIER_DESC_prussian_economic_development: "普鲁士的沿海贸易与琥珀生产，为我们日益壮大的帝国提供了维持所需的财富。"
 STATIC_MODIFIER_NAME_bra_prussian_general_staff: "普鲁士总参谋部"
 STATIC_MODIFIER_DESC_bra_prussian_general_staff: "战略规划的制度化确保我们的军事领导者总能领先一步。"
 STATIC_MODIFIER_NAME_bra_prussian_military_supremacy: "普鲁士军事霸权"
 STATIC_MODIFIER_DESC_bra_prussian_military_supremacy: "普鲁士不是一个拥有军队的国家，而是一个拥有国家的军队。我们的军事实力无可争议。"
 STATIC_MODIFIER_NAME_bra_silesian_mines: "西里西亚矿场"
 STATIC_MODIFIER_DESC_bra_silesian_mines: "西里西亚山脉资源丰富，我们应当加以开发！"
 STATIC_MODIFIER_NAME_bra_prussian_golden_age: "普鲁士黄金时代"
 STATIC_MODIFIER_DESC_bra_prussian_golden_age: "日耳曼地区经历了一段前所未有的扩张、文化繁荣与军事胜利的时期。"
 brandenburg_missions_events.1.t: "霍亨索伦的崛起"
 brandenburg_missions_events.1.d: "长久以来，这片边疆领地饱受忽视与混乱之苦。维特尔斯巴赫家族给我们带来了痛苦与危机。但皇帝陛下以强有力的领导为我们提供了另一种选择。皇帝麾下一位能干的顾问——弗里德里希·冯·霍亨索伦被提议来统治我们的领地。我们是接受他的治理，还是让我们的王朝延续下去？"
 brandenburg_missions_events.1.a: "邀请霍亨索伦家族前来统治。"
 brandenburg_missions_events.1.b: "我们将找到自己的道路。"
 brandenburg_missions_events.1.a.tt: "腓特烈·冯·霍亨索伦将成为勃兰登堡的新统治者。"
 brandenburg_missions_events.1.b.tt: "维持我们当前的王朝，尽管皇帝可能会不悦。"
 brandenburg_missions_events.2.t: "发展核心地带"
 brandenburg_missions_events.2.d: "既然我们的权力已经巩固，现在必须决定如何最好地刺激经济。我们是该聚焦于蓬勃发展的城镇，还是该关注农田的生产力呢？"
 brandenburg_missions_events.2.a: "专注于城镇发展。"
 brandenburg_missions_events.2.b: "巩固我们的乡村根基。"
 brandenburg_missions_events.2.a.tt: "对我们的省份应用“城镇增长重心”修正。"
 brandenburg_missions_events.2.b.tt: "对我们的省份应用“农村生产力重心”修正。"
 brandenburg_missions_events.3.t: "藩侯官邸"
 brandenburg_missions_events.3.d: "虽然我们的城市一直为我们效力甚佳，但迅速发展的柏林却能为我们的行政提供更居中且更具战略优势的地点。我们的宫廷应设于何处？"
 brandenburg_missions_events.3.a: "柏林将成为我们的新权力中心。"
 brandenburg_missions_events.3.b: "勃兰登堡依然是马克地区的核心。"
 brandenburg_missions_events.3.a.tt: ""
 brandenburg_missions_events.3.b.tt: ""
 brandenburg_missions_events.4.t: "条顿骑士团的命运"
 brandenburg_missions_events.4.d: "条顿骑士团已不复昔日荣光。当我们望向东方，必须决定如何整合他们的土地。我们是该用笔，还是用剑？"
 brandenburg_missions_events.4.a: "寻求外交解决方案。"
 brandenburg_missions_events.4.b: "以武力征服他们。"
 brandenburg_missions_events.4.a.tt: "我们奉行和平之路，以扶植我们登上他们的王位，并通过外交手段将其纳入版图。"
 brandenburg_missions_events.4.b.tt: "围攻他们的要塞，让公爵臣服！"
 brandenburg_missions_events.5.t: "霍亨索伦的传承"
 brandenburg_missions_events.5.d: "霍亨索伦家族已在勃兰登堡深深扎根。我们的统治无可置疑，未来一片光明。"
 brandenburg_missions_events.5.a: "霍亨索伦家族万岁！"
 brandenburg_missions_events.5.a.tt: "霍亨索伦家族万岁！"
 brandenburg_missions_events.6.t: "波罗的海通行权"
 brandenburg_missions_events.6.d: "我们终于在波罗的海获得了一个港口。这扇通向世界的大门带来了新的贸易和海军力量机遇。我们该如何利用这个新的门户呢？"
 brandenburg_missions_events.6.a: "建造一座宏伟的海军基地。"
 brandenburg_missions_events.6.b: "发展港口以促进贸易。"
 brandenburg_missions_events.6.a.tt: "专注于造船与军事力量"
 brandenburg_missions_events.6.b.tt: "我们应该扩建港口以促进贸易和增加利润。"
 brandenburg_missions_events.7.t: "马克已稳固"
 brandenburg_missions_events.7.d: "我们对马克地区的控制力增强了。道路再次变得安全。"
 brandenburg_missions_events.7.a: "务必确保征收税款"
 brandenburg_missions_events.7.b: "如今商人们可以自由贸易了。"
 brandenburg_missions_events.7.a.tt: "进一步加强控制"
 brandenburg_missions_events.7.b.tt: "法律终究是利民的！"
 brandenburg_missions_events.8.t: "奥得河已掌控"
 brandenburg_missions_events.8.d: "奥得河承载着我们的贸易，飘扬着我们的旗帜。我们是这条水道的主宰。"
 brandenburg_missions_events.8.a: "为贸易与繁荣度建造一座港口"
 brandenburg_missions_events.8.b: "确保我们的侧翼"
 brandenburg_missions_events.8.a.tt: "确保商人们能够畅通无阻地渡河。"
 brandenburg_missions_events.8.b.tt: "保护我们的城市及其居民"
 brandenburg_missions_events.9.t: "西里西亚矿场"
 brandenburg_missions_events.9.d: "利用西里西亚山脉的丰富资源"
 brandenburg_missions_events.9.a: "开始挖掘吧！"
 brandenburg_missions_events.9.a.tt: "开采贵重矿物"
