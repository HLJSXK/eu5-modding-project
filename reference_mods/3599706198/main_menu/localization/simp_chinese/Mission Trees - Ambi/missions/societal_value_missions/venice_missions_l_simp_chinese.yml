l_simp_chinese:
 venice_mission_pack: "威尼斯：最尊贵的共和国"
 venice_mission_pack_desc: "引领威尼斯从潟湖之城崛起，依托贸易垄断、海上霸权与地中海扩张，铸就辉煌的海洋帝国。"
 venice_mission_pack_BUTTON_TOOLTIP: "完成任务以巩固亚得里亚海霸权，掌控地中海贸易，向大陆领土扩张。"
 venice_mission_pack_CRITERIA_DESCRIPTION: "掌控亚得里亚海，在黎凡特建立贸易据点，向意大利本土扩张，并打造无与伦比的海军，以解锁强大的海洋与贸易修正。"
 mission_secure_venetian_lagoon: "保卫威尼斯潟湖"
 mission_secure_venetian_lagoon_desc: "潟湖诸岛是我们的家园，也是我们力量的基石。通过确保威尼斯、穆拉诺和基奥贾处于稳定的治理之下，我们保障了共和国的存续。"
 mission_secure_venetian_lagoon_tooltip: "在维持高稳定度与共和传统的同时，掌控威尼斯、穆拉诺与基奥贾。"
 mission_develop_arsenal: "发展军械库"
 mission_develop_arsenal_desc: "威尼斯军械库是我们海军力量的核心。扩建这一设施将使我们能够以无与伦比的速度和效率建造战舰，从而确保我们对海洋的统治。"
 mission_develop_arsenal_tooltip: "发展首都并建造船坞，以扩大海军兵工厂的产能。"
 mission_strengthen_republic: "强化共和国"
 mission_strengthen_republic_desc: "威尼斯共和国的稳定依赖于商人阶层与贵族之间微妙的平衡。通过增强市民阶层力量并限制贵族影响，我们得以维护共和传统。"
 mission_strengthen_republic_tooltip: "在维持强大市民影响力的同时，抑制贵族权力，并保持高度的共和传统。"
 mission_develop_murano_glass: "发展穆拉诺玻璃"
 mission_develop_murano_glass_desc: "穆拉诺的玻璃工匠是全世界最顶尖的。通过保护他们的秘密并扩大生产，我们可以打造一个利润丰厚的垄断产业，为共和国带来财富与威望。"
 mission_develop_murano_glass_tooltip: "发展穆拉诺并建造玻璃工坊，以确立我们的玻璃垄断地位。"
 mission_control_adriatic: "控制亚得里亚海"
 mission_control_adriatic_desc: "亚得里亚海是威尼斯通往世界的要道。通过打造强大的桨帆船舰队并确立海上霸权，我们将使亚得里亚海成为威尼斯的专属海域，既庇护我们的商人，又威慑我们的宿敌。"
 mission_control_adriatic_tooltip: "组建一支强大的桨帆船舰队，并在亚得里亚海取得制海权。"
 mission_secure_istria_dalmatia: "确保伊斯特拉和达尔马提亚的安全"
 mission_secure_istria_dalmatia_desc: "亚得里亚海东岸提供了至关重要的港口、造船木材，以及抵御敌对势力的缓冲地带。掌控这些领土将确保我们对亚得里亚海的控制，并扩展我们的影响力。"
 mission_secure_istria_dalmatia_tooltip: "通过占领或附庸的方式，确立对伊斯特拉和达尔马提亚的控制权。"
 mission_subjugate_ragusa: "征服拉古萨"
 mission_subjugate_ragusa_desc: "拉古萨是亚得里亚海贸易的潜在宿敌。将这座城市纳入我们的势力范围后，我们既能消除竞争，又能获得一个承认威尼斯主导地位的宝贵附庸。"
 mission_subjugate_ragusa_tooltip: "将拉古萨置于威尼斯控制之下，使其成为属国或直接领土。"
 mission_secure_albania: "确保阿尔巴尼亚安全"
 mission_secure_albania_desc: "阿尔巴尼亚海岸提供了战略港口和通往巴尔干内陆的通道。控制这一区域将巩固我们在亚得里亚海的地位，并为进一步扩张提供跳板。"
 mission_secure_albania_tooltip: "控制阿尔巴尼亚地区并确保其港口安全。"
 mission_control_corfu: "控制科孚"
 mission_control_corfu_desc: "科孚岛扼守着亚得里亚海的入口。强化这座岛屿的防御，就能建立起一座坚不可摧的哨所，保护我们的海上核心地带免受敌对舰队的侵扰。"
 mission_control_corfu_tooltip: "巩固并确保科孚岛的安全，成为亚得里亚海的守护者。"
 mission_dominate_levantine_trade: "掌控黎凡特贸易"
 mission_dominate_levantine_trade_desc: "东方的香料、丝绸与奢侈品正流经黎凡特。掌控这条贸易路线，将使威尼斯成为连接欧亚的枢纽，让黄金充盈我们的国库。"
 mission_dominate_levantine_trade_tooltip: "在建立贸易城市的同时，实现高额贸易收入与强大的市场支配力。"
 mission_establish_levant_quarters: "建立黎凡特社区"
 mission_establish_levant_quarters_desc: "黎凡特地区的贸易站和商栈确保了我们的商业存在，并为我们的商人掌控当地市场提供了基地。"
 mission_establish_levant_quarters_tooltip: "在整个黎凡特区域建造商人区。"
 mission_control_cyprus: "控制塞浦路斯"
 mission_control_cyprus_desc: "塞浦路斯凭借其战略位置和宝贵资源，成为东地中海贸易的关键所在。掌控这座岛屿将为威尼斯提供一个强大的商业与海军行动基地。"
 mission_control_cyprus_tooltip: "通过占领或附庸的方式，使塞浦路斯处于威尼斯控制之下。"
 mission_secure_crete: "确保克里特岛"
 mission_secure_crete_desc: "克里特岛上的坎迪亚王国是我们威尼斯最大且最重要的海外领地。确保全岛安全并发展其首府，将巩固我们在东地中海的统治地位。"
 mission_secure_crete_tooltip: "控制克里特岛并发展其基础设施。"
 mission_develop_candia: "发展坎迪亚"
 mission_develop_candia_desc: "克里特岛首府坎迪亚必须被打造成一座强大的要塞与商业中心，以彰显威尼斯在东地中海的霸权。"
 mission_develop_candia_tooltip: "将坎迪亚发展成一座拥有坚固防御工事的重要城镇中心。"
 mission_establish_euboea_trade: "建立优卑亚贸易"
 mission_establish_euboea_trade_desc: "我们在优卑亚岛上的领地内格罗蓬特控制着至关重要的航运通道。发展其贸易基础设施将巩固我们在爱琴海的地位，并连接我们在克里特岛与大陆的领地。"
 mission_establish_euboea_trade_tooltip: "在优卑亚岛和爱琴海群岛发展贸易基础设施。"
 mission_control_ionian_islands: "控制爱奥尼亚群岛"
 mission_control_ionian_islands_desc: "爱奥尼亚群岛构成了一条连接我们亚得里亚海与希腊属地的重要战略支点链。掌控这些岛屿能确保我方舰队的安全通行，并进一步拓展我们的影响力。"
 mission_control_ionian_islands_tooltip: "确立对伊奥尼亚群岛的控制。"
 mission_acquire_terraferma: "获取内陆地区"
 mission_acquire_terraferma_desc: "威尼斯的大陆领土提供了粮食、兵源和战略纵深。向意大利半岛扩张可增强我们的共和国，并为我们的海洋帝国提供资源。"
 mission_acquire_terraferma_tooltip: "控制威尼托地区，以巩固我们在本土的领土。"
 mission_secure_friuli: "确保弗留利安全"
 mission_secure_friuli_desc: "弗留利地区守护着我们东北方向的通道，抵御日耳曼与匈牙利的侵扰。掌控这片区域将构筑起一道防御屏障，保卫我们的核心腹地。"
 mission_secure_friuli_tooltip: "控制弗留利地区，以巩固我们的阿尔卑斯边境。"
 mission_dominate_padua: "主宰帕多瓦"
 mission_dominate_padua_desc: "帕多瓦拥有古老的大学和繁荣的经济，是大陆领地的一颗明珠。掌控这座城市将为共和国带来知识与经济上的双重收益。"
 mission_dominate_padua_tooltip: "确保帕多瓦的安全并发展其大学以吸引学者。"
 mission_control_verona: "控制维罗纳"
 mission_control_verona_desc: "维罗纳掌控着波河流域的关键通道。巩固此城既能确保我们西线门户的安全，又能将势力投射至伦巴第地区。"
 mission_control_verona_tooltip: "巩固并确保维罗纳作为战略要地的安全。"
 mission_secure_brescia: "占领布雷西亚"
 mission_secure_brescia_desc: "布雷西亚凭借其武器制造业和战略位置，对掌控伦巴第地区至关重要。占领这座城市将增强我们的军事实力与区域影响力。"
 mission_secure_brescia_tooltip: "确保布雷西亚的安全并整合伦巴第领土。"
 mission_expand_arsenal: "扩建兵工厂"
 mission_expand_arsenal_desc: "兵工厂必须扩建，以满足我们不断扩张的帝国之需。新建的造船厂和干船坞将使我们能够建造并维护地中海最庞大的舰队。"
 mission_expand_arsenal_tooltip: "扩建兵工厂，配备先进的造船基础设施。"
 mission_perfect_galley_design: "完美桨帆船设计"
 mission_perfect_galley_design_desc: "威尼斯战船是我们舰队的支柱。通过完善设计并融入最新创新，我们确保自己的船只始终优于宿敌。"
 mission_perfect_galley_design_tooltip: "研究加莱赛战船技术并保持较高的海军传统。"
 mission_battle_of_lepanto_veterans: "勒班陀战役老兵"
 mission_battle_of_lepanto_veterans_desc: "我们海战胜利的老兵们拥有无价的经验。通过表彰他们的服役并传承他们的知识，我们确保威尼斯的海军传统得以延续。"
 mission_battle_of_lepanto_veterans_tooltip: "达成传奇海军传统，并传承我们海军上将的智慧。"
 mission_develop_merchant_marine: "发展商船队"
 mission_develop_merchant_marine_desc: "Our merchant fleet is the source of our prosperity. Expanding and protecting our trading vessels ensures that Venetian goods reach every corner of the Mediterranean."
 mission_develop_merchant_marine_tooltip: "Construct wharves and increase trade income to support a powerful merchant marine."
 mission_monopolize_salt_trade: "Monopolize the Salt Trade"
 mission_monopolize_salt_trade_desc: "Salt is essential for preserving food and has been a source of Venetian wealth since our earliest days. By controlling salt production across the Mediterranean, we secure a vital monopoly."
 mission_monopolize_salt_trade_tooltip: "Control multiple salt-producing locations and achieve high salt production."
 mission_control_spice_route: "Control the Spice Route"
 mission_control_spice_route_desc: "Spices from the East command premium prices in European markets. By controlling their distribution, we can set prices and reap enormous profits that fund our empire."
 mission_control_spice_route_tooltip: "Control spice-producing locations and dominate your home market."
 mission_establish_fondaco_dei_tedeschi: "Establish the Fondaco dei Tedeschi"
 mission_establish_fondaco_dei_tedeschi_desc: "The Fondaco dei Tedeschi—the German trading house—will serve as a headquarters for German merchants in Venice, centralizing our trade with Central Europe and generating enormous wealth."
 mission_establish_fondaco_dei_tedeschi_tooltip: "Build merchant quarters in Venice and maintain good relations with Germanic states."
 mission_establish_fondaco_dei_persiani: "Establish the Fondaco dei Persiani"
 mission_establish_fondaco_dei_persiani_desc: "Trade with Persia brings silk and other luxury goods to Venice. A dedicated Persian trading house will strengthen these commercial ties and bring Eastern riches to our markets."
 mission_establish_fondaco_dei_persiani_tooltip: "Maintain friendly relations with Muslim states and build merchant quarters in Venice."
 mission_challenge_genoese_power: "Challenge Genoese Power"
 mission_challenge_genoese_power_desc: "Genoa is our greatest rival for Mediterranean trade. We must challenge their supremacy, undermine their commercial networks, and prepare to settle our ancient rivalry once and for all."
 mission_challenge_genoese_power_tooltip: "Surpass Genoa in strength and trade income to challenge their position."
 mission_win_war_of_chiaoggia: "Win the War of Chioggia"
 mission_win_war_of_chiaoggia_desc: "Genoa has dared to challenge us in the Adriatic itself. We must crush their fleet, occupy their city, and demonstrate once and for all that Venice is the true mistress of the Mediterranean."
 mission_win_war_of_chiaoggia_tooltip: "Defeat Genoa and occupy their capital to end their challenge."
 mission_control_corsica_sardinia: "Control Corsica and Sardinia"
 mission_control_corsica_sardinia_desc: "With Genoa humbled, their former possessions in the western Mediterranean are ours for the taking. Controlling Corsica and Sardinia extends our influence and secures new bases for our fleet."
 mission_control_corsica_sardinia_tooltip: "Establish control over Corsica and Sardinia."
 mission_prepare_for_ottoman_threat: "Prepare for the Ottoman Threat"
 mission_prepare_for_ottoman_threat_desc: "The Ottoman Turks advance steadily through the Balkans, threatening our Greek possessions. We must prepare our defenses and strengthen our position before their armies reach our shores."
 mission_prepare_for_ottoman_threat_tooltip: "Prepare for conflict with the expanding Ottoman Empire."
 mission_fortify_naupactus: "Fortify Naupactus"
 mission_fortify_naupactus_desc: "Naupactus—Lepanto—commands the entrance to the Gulf of Corinth. Fortifying this strategic port creates a powerful naval base that can challenge Ottoman expansion in Greece."
 mission_fortify_naupactus_tooltip: "Fortify Naupactus with advanced defenses."
 mission_defend_cyprus: "Defend Cyprus"
 mission_defend_cyprus_desc: "Cyprus lies exposed to Ottoman attack. Strengthening its fortifications ensures this vital island can withstand any siege and remain a bastion of Venetian power in the eastern Mediterranean."
 mission_defend_cyprus_tooltip: "Fortify Cyprus against Ottoman aggression."
 mission_defend_crete: "Defend Crete"
 mission_defend_crete_desc: "Crete is the jewel of our maritime empire. Its fortifications must be impregnable, its garrison numerous, and its supplies abundant to resist any Ottoman assault."
 mission_defend_crete_tooltip: "Fortify Crete against potential invasion."
 mission_form_holy_league: "Form the Holy League"
 mission_form_holy_league_desc: "Against the Ottoman tide, Christian powers must unite. By forming a Holy League with the Papacy and other Catholic nations, we can combine our forces for a decisive confrontation."
 mission_form_holy_league_tooltip: "Unite Catholic powers against the Ottoman threat."
 mission_patronize_venetian_art: "Patronize Venetian Art"
 mission_patronize_venetian_art_desc: "Venice must become a center of artistic excellence. By patronizing painters, sculptors, and architects, we adorn our city with beauty and attract the finest creative minds of the age."
 mission_patronize_venetian_art_tooltip: "Build an art academy in Venice and invest in cultural patronage."
 mission_commission_bellini_titian: "Commission Bellini and Titian"
 mission_commission_bellini_titian_desc: "The Bellini family and the young Titian represent the finest of Venetian painting. Commissioning their greatest works will immortalize our Republic and elevate our cultural prestige."
 mission_commission_bellini_titian_tooltip: "Develop Venetian cultural tradition during the Renaissance."
 mission_establish_venetian_printing: "Establish Venetian Printing"
 mission_establish_venetian_printing_desc: "The printing press spreads knowledge and ideas. By establishing Venice as a center of printing, we promote literacy, disseminate learning, and enhance our reputation throughout Europe."
 mission_establish_venetian_printing_tooltip: "Develop printing infrastructure and increase literacy."
 mission_st_mark_square: "Complete St. Mark's Square"
 mission_st_mark_square_desc: "St. Mark's Square is the heart of Venice, the ceremonial center of our Republic. Completing its embellishment creates a architectural masterpiece that reflects the glory of La Serenissima."
 mission_st_mark_square_tooltip: "Fully develop Venice with grand palaces and public spaces."
 mission_limit_doge_power: "Limit the Doge's Power"
 mission_limit_doge_power_desc: "The Doge serves the Republic, not the reverse. By further limiting his authority and strengthening the councils, we ensure that Venice remains a true republic, not a veiled monarchy."
 mission_limit_doge_power_tooltip: "Reduce noble influence while maintaining high republican tradition."
 mission_establish_council_of_ten: "Establish the Council of Ten"
 mission_establish_council_of_ten_desc: "The Council of Ten will guard the security of the Republic, investigating threats and acting decisively to preserve our liberty. This powerful body ensures that conspiracies are uncovered and punished."
 mission_establish_council_of_ten_tooltip: "Adopt the Council of Ten government reform."
 mission_create_state_inquisition: "Create the State Inquisition"
 mission_create_state_inquisition_desc: "The State Inquisition—the Three Inquisitors—will watch for threats to the Republic's security. Their vigilance protects our institutions from internal subversion and foreign plots."
 mission_create_state_inquisition_tooltip: "Establish courthouses and maintain stability to create the State Inquisition."
 mission_secure_methoni_koroni: "Secure Methoni and Koroni"
 mission_secure_methoni_koroni_desc: "Methoni and Koroni—the Eyes of Venice—guard our trade routes in the southern Peloponnese. Securing these ports ensures safe passage for our ships around the Morea."
 mission_secure_methoni_koroni_tooltip: "Secure these strategic ports in the southern Peloponnese."
 mission_acquire_monemvasia: "Acquire Monemvasia"
 mission_acquire_monemvasia_desc: "Monemvasia, the Gibraltar of the East, is a fortress of incredible strength. Acquiring this rock secures our position in the Peloponnese and provides an impregnable base for our fleet."
 mission_acquire_monemvasia_tooltip: "Secure the fortress of Monemvasia."
 mission_control_thessaloniki: "Control Thessaloniki"
 mission_control_thessaloniki_desc: "Thessaloniki, the second city of the Byzantine Empire, commands vital trade routes in the northern Aegean. Its capture would extend our influence into Macedonia."
 mission_control_thessaloniki_tooltip: "Secure Thessaloniki and establish Venetian presence."
 mission_venetian_athens: "Venetian Athens"
 mission_venetian_athens_desc: "Athens, cradle of Western civilization, would be a magnificent addition to our empire. Controlling this ancient city brings immense prestige and connects us to classical heritage."
 mission_venetian_athens_tooltip: "Establish Venetian control over Athens."
 mission_establish_venetian_banking: "Establish Venetian Banking"
 mission_establish_venetian_banking_desc: "Venice must become a center of international finance. Establishing sophisticated banking institutions allows us to manage wealth, extend credit, and fund our imperial ambitions."
 mission_establish_venetian_banking_tooltip: "Research banking technology and accumulate sufficient gold reserves."
 mission_create_public_debt: "Create Public Debt"
 mission_create_public_debt_desc: "A public debt system allows citizens to invest in the Republic, providing us with funds for extraordinary expenses while giving our merchants a secure investment."
 mission_create_public_debt_tooltip: "Achieve high income and low interest rates to establish public credit."
 mission_standardize_ducat: "Standardize the Ducat"
 mission_standardize_ducat_desc: "The Venetian ducat is already respected throughout Europe. Standardizing its weight and purity ensures it becomes the preferred currency for international trade, bringing additional profits."
 mission_standardize_ducat_tooltip: "Dominate your home market and achieve high trade efficiency."
 mission_venetian_thalassocracy: "Venetian Thalassocracy"
 mission_venetian_thalassocracy_desc: "Venice must become a true thalassocracy—an empire of the seas. With unmatched naval power, control of strategic islands, and dominance of trade routes, we rule the Mediterranean waves."
 mission_venetian_thalassocracy_tooltip: "Achieve great power status with an unmatched navy and naval tradition."
 mission_most_serene_republic: "The Most Serene Republic"
 mission_most_serene_republic_desc: "La Serenissima—the Most Serene Republic—represents the ideal of Venetian civilization. With stable institutions, prosperous subjects, global influence, and unmatched prestige, we stand as a model for all republics."
 mission_most_serene_republic_tooltip: "Achieve the ultimate expression of Venetian power, stability, and prestige."
 STATIC_MODIFIER_NAME_ven_lagoon_consolidation: "Venetian Lagoon Consolidated"
 STATIC_MODIFIER_DESC_ven_lagoon_consolidation: "Firm control over the lagoon islands strengthens the crown estate and administrative control."
 STATIC_MODIFIER_NAME_ven_lagoon_fortifications: "Lagoon Fortifications"
 STATIC_MODIFIER_DESC_ven_lagoon_fortifications: "Fortifications protecting the lagoon enhance local defense and garrison growth."
 STATIC_MODIFIER_NAME_venetian_arsenal_expanded: "Venetian Arsenal Expanded"
 STATIC_MODIFIER_DESC_venetian_arsenal_expanded: "The expanded Arsenal accelerates ship construction and increases naval supply production."
 STATIC_MODIFIER_NAME_great_arsenal: "Great Arsenal of Venice"
 STATIC_MODIFIER_DESC_great_arsenal: "The Great Arsenal is the largest shipbuilding complex in the Mediterranean, providing unparalleled naval construction capabilities."
 STATIC_MODIFIER_NAME_venetian_constitution: "Venetian Constitution"
 STATIC_MODIFIER_DESC_venetian_constitution: "The balanced constitution of Venice ensures stable governance and strong republican institutions."
 STATIC_MODIFIER_NAME_murano_glass_monopoly: "Murano Glass Monopoly"
 STATIC_MODIFIER_DESC_murano_glass_monopoly: "Murano's glassmakers produce the finest glassware in Europe, commanding premium prices and bringing prestige to Venice."
 STATIC_MODIFIER_NAME_adriatic_guardian: "Guardian of the Adriatic"
 STATIC_MODIFIER_DESC_adriatic_guardian: "Venetian control of the Adriatic ensures safe passage for our merchants and enhances our naval capabilities."
 STATIC_MODIFIER_NAME_dalmatian_coast_secure: "Dalmatian Coast Secured"
 STATIC_MODIFIER_DESC_dalmatian_coast_secure: "Secure Dalmatian ports provide sailors, manpower, and bases for Adriatic patrols."
 STATIC_MODIFIER_NAME_ven_dalmatian_coast: "Venetian Dalmatia"
 STATIC_MODIFIER_DESC_ven_dalmatian_coast: "Integration of Dalmatia into the Republic accelerates assimilation and strengthens subject loyalty."
 STATIC_MODIFIER_NAME_ven_adriatic_harbor: "Adriatic Harbor"
 STATIC_MODIFIER_DESC_ven_adriatic_harbor: "This harbor serves as a vital base for Venetian operations throughout the Adriatic."
 STATIC_MODIFIER_NAME_ragusan_tributary: "Ragusan Tributary"
 STATIC_MODIFIER_DESC_ragusan_tributary: "Ragusa's submission brings tribute and eliminates a commercial rival in the Adriatic."
 STATIC_MODIFIER_NAME_adriatic_sentinel: "Adriatic Sentinel"
 STATIC_MODIFIER_DESC_adriatic_sentinel: "This fortress guards the entrance to the Adriatic, warning of hostile approach and resisting invasion."
 STATIC_MODIFIER_NAME_levant_trade_primacy: "Levantine Trade Primacy"
 STATIC_MODIFIER_DESC_levant_trade_primacy: "Venetian dominance of Levantine trade brings unparalleled commercial advantages."
 STATIC_MODIFIER_NAME_levant_trading_posts: "Levantine Trading Posts"
 STATIC_MODIFIER_DESC_levant_trading_posts: "A network of trading posts across the Levant secures Venetian commercial presence."
 STATIC_MODIFIER_NAME_ven_levantine_quarters: "Levantine Merchant Quarters"
 STATIC_MODIFIER_DESC_ven_levantine_quarters: "Dedicated merchant quarters attract Eastern traders and facilitate commerce."
