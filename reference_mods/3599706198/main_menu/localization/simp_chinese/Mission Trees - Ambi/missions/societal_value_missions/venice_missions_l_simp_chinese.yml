 venice_mission_events.1.t: "The Venetian Lagoon Secured"
 venice_mission_events.1.d: "The islands of the lagoon—Venezia, Murano, Chioggia—are firmly under our control. With stability restored and republican traditions upheld, Venice stands ready to pursue its destiny. The foundation of our maritime empire is laid."
 venice_mission_events.2.t: "The Dalmatian Coast Secured"
 venice_mission_events.2.d: "The cities of the Dalmatian coast now acknowledge Venetian authority. Zadar, Split, and the other ports of the eastern Adriatic provide us with skilled sailors,优质 timber for shipbuilding, and strategic bases for projecting power throughout the region. The Adriatic becomes a Venetian lake."
 venice_mission_events.3.t: "Levantine Trading Posts Established"
 venice_mission_events.3.d: "From Acre to Alexandria, Venetian merchants now have established quarters where they can conduct business under the protection of the Republic. These trading posts serve as nodes in a commercial network that funnels the riches of the East—spices, silks, and luxury goods—into Venetian warehouses. Our merchants speak of a young traveler named Marco Polo who dreams of venturing even further east."
 venice_mission_events.4.t: "The Crown of Cyprus"
 venice_mission_events.4.d: "Cyprus, jewel of the eastern Mediterranean, has come under Venetian rule. The island's strategic position commands the sea lanes to the Levant, while its sugar plantations and salt works add to our prosperity. The people of Cyprus look to Venice for protection against the advancing Ottoman tide."
 venice_mission_events.5.t: "The Island of Crete"
 venice_mission_events.5.d: "Crete—the Kingdom of Candia—is now fully integrated into the Venetian state. The great fortress of Candia dominates the island, while ports along the coast serve as waystations for our fleets. Cretan wine, oil, and grain flow to Venice, and our control of this strategic island secures our position in the eastern Mediterranean."
 venice_mission_events.6.t: "The Terraferma Acquired"
 venice_mission_events.6.d: "Venice has expanded onto the Italian mainland, bringing the rich cities of the Veneto under our rule. Padua, Verona, Vicenza, and Brescia now acknowledge the Lion of St. Mark. Their fertile fields provide food for our population, their workshops produce goods for our merchants, and their manpower strengthens our armies. Venice is no longer merely a maritime power but a regional state of consequence."
 venice_mission_events.7.t: "The Veterans of Lepanto"
 venice_mission_events.7.d: "The veterans of our great naval victory at Lepanto have returned to Venice, bearing the scars of battle and the wisdom of experience. Old Sebastiano Venier, who commanded our fleet with such distinction, walks slowly now but his eyes still gleam with the fire of that glorious day. These heroes will train the next generation of Venetian sailors, ensuring that our naval traditions endure."
 venice_mission_events.8.t: "Spice Route Dominance"
 venice_mission_events.8.d: "Venice now controls the flow of spices into Europe. Pepper, nutmeg, cloves, and cinnamon pass through our warehouses before being distributed to the courts and markets of the continent. Merchants come from across Europe to trade in the Rialto, and the phrase 'Venetian prices' has become synonymous with the cost of luxury. The wealth that flows into our city is almost beyond measure."
 venice_mission_events.9.t: "Victory Over Genoa"
 venice_mission_events.9.d: "The ancient rivalry with Genoa is finally settled. Our fleets have triumphed, our merchants have outcompeted theirs, and the Genoese lion lies humbled. From the shores of the Black Sea to the ports of the western Mediterranean, Venetian merchants now operate without fear of Genoese interference. The way is clear for Venetian expansion into all the seas of Europe."
 venice_mission_events.10.t: "The Holy League"
 venice_mission_events.10.d: "Venice has united the Catholic powers against the Ottoman threat. The Papal States, Spain, and other Christian nations have joined with us in a Holy League, pooling their resources for a great crusade. Cardinals bless our banners, preachers call for volunteers, and the bells of churches across Europe ring in support. The Cross shall stand against the Crescent."
 venice_mission_events.11.t: "The Venetian School of Art"
 venice_mission_events.11.d: "Venice has become a center of artistic excellence. Painters, sculptors, and architects flock to our city, attracted by the patronage of our wealthy merchants and the beauty of our canals and palaces. The Venetian School develops its own distinctive style—rich in color, luminous in atmosphere, and worldly in subject matter—that will influence art for generations."
 venice_mission_events.12.t: "Bellini and Titian"
 venice_mission_events.12.d: "The Bellini family and the young Titian have created masterpieces that will forever be associated with Venice. Their paintings adorn our churches, our palaces, and our public buildings, capturing the light and color of our city. Foreign visitors marvel at these works, and artists come from across Europe to study with the Venetian masters. Our Republic's cultural prestige rivals its commercial power."
 venice_mission_events.13.t: "The Venetian Duchy of Athens"
 venice_mission_events.13.d: "Athens, cradle of Western civilization, has fallen under Venetian rule. The Parthenon, ancient temples, and the Academy where Plato once taught now look upon the Lion of St. Mark. Scholars debate whether we should restore the ancient buildings or adapt them to our purposes. Whatever we decide, possession of this legendary city brings immense prestige to the Republic."
 venice_mission_events.14.t: "Venetian Thalassocracy"
 venice_mission_events.14.d: "Venice has achieved the status of a true thalassocracy—an empire of the seas. From the Adriatic to the Aegean, from Cyprus to Corfu, our fleets patrol waters that acknowledge Venetian supremacy. The Mediterranean has become a Venetian lake, and foreign powers must seek our permission before their ships sail with any safety. La Serenissima rules the waves."
 venice_mission_events.15.t: "The Most Serene Republic"
 venice_mission_events.15.d: "Venice stands as the Most Serene Republic—La Serenissima—the ideal of republican government, maritime power, and commercial prosperity. Our institutions are stable, our subjects loyal, our treasury full, and our prestige unmatched. From the palaces along the Grand Canal to the fortresses of Crete, from the trading posts of the Levant to the cities of the Terraferma, the Lion of St. Mark watches over a realm that embodies the highest achievements of civilization. Venice has reached its apotheosis."
