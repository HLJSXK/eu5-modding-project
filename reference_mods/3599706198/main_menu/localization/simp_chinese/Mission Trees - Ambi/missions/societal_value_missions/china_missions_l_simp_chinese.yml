l_simp_chinese:
 yuan_mission_pack:0 "大元：蒙古复兴"
 yuan_mission_pack_desc:0 "在元朝的统治下，恢复蒙古帝国的荣光，将草原传统与中华行政体系相融合，缔造历史上最庞大的陆上帝国。"
 yuan_mission_pack_BUTTON_TOOLTIP:0 "完成恢复蒙古传统、整合中国官僚体系和在欧亚大陆扩张的任务。"
 yuan_mission_pack_CRITERIA_DESCRIPTION:0 "作为大元，复兴蒙古军事传统，同时维持中华行政体系，以建立一个横跨欧亚融合东西的庞大帝国。"
 mission_establish_yuan_dynasty:0 "巩固元王朝"
 mission_establish_yuan_dynasty_desc:0 "巩固我们对中国本部的统治，在维护蒙古传统的同时，确立大元的正统地位。"
 mission_revive_mongol_traditions:0 "复兴蒙古传统"
 mission_revive_mongol_traditions_desc:0 "复兴蒙古文化，维护骑兵传统，继承我们祖先征服大陆的草原传承。"
 mission_restore_great_khanate:0 "重建大汗国"
 mission_restore_great_khanate_desc:0 "恢复大汗国！增强蒙古人的威望，让欧亚大陆再度恐惧并献上贡品。"
 mission_integrate_chinese_bureaucracy:0 "整合中国官僚体系"
 mission_integrate_chinese_bureaucracy_desc:0 "采用先进的中华行政体系来高效治理我们辽阔的帝国，同时保持蒙古人的领导地位。"
 mission_imperial_examination_system:0 "实施科举制度"
 mission_imperial_examination_system_desc:0 "设立科举制度，选拔有才能的官员和学者为元朝效力。"
 mission_construct_imperial_capital:0 "建设首都"
 mission_construct_imperial_capital_desc:0 "将大都改造成一座宏伟的帝国都城，以彰显蒙古的强大和中华的文明。"
 mission_secure_mongolia:0 "确保蒙古的安全"
 mission_secure_mongolia_desc:0 "巩固我们对蒙古故土的控制，这是我们军事力量和游牧传统的源泉。"
 mission_conquer_tibet:0 "征服吐蕃"
 mission_conquer_tibet_desc:0 "将青藏高原纳入元朝版图，巩固控制权，并扩大对藏传佛教的影响力。"
 mission_subjugate_korea:0 "降服朝鲜"
 mission_subjugate_korea_desc:0 "将朝鲜确立为忠诚的附属国，以稳固我国东部侧翼，同时获取朝鲜的造船技术。"
 mission_invade_japan:0 "入侵日本"
 mission_invade_japan_desc:0 "发起大规模海上远征，将日本诸岛纳入元朝版图，完成我们对东亚的全面掌控。"
 mission_control_silk_road:0 "控制丝绸之路"
 mission_control_silk_road_desc:0 "掌控历史悠久的丝绸之路贸易路线，确保欧亚商业财富流经我们的疆域。"
 mission_develop_silk_road_cities:0 "发展丝路城市"
 mission_develop_silk_road_cities_desc:0 "投资丝绸之路沿线的城镇，将其转变为繁荣的贸易和文化交流中心。"
 mission_establish_maritime_trade:0 "开展海上贸易"
 mission_establish_maritime_trade_desc:0 "发展我们的海军力量以控制海上贸易航线，使大元成为主要的海军强国。"
 mission_conquer_central_asia:0 "征服中亚"
 mission_conquer_central_asia_desc:0 "完成对中亚的征服，确保欧亚草原这一战略要地被掌控。"
 mission_invade_persia:0 "入侵波斯"
 mission_invade_persia_desc:0 "将富饶的波斯置于元朝控制之下，获得其先进的行政管理和丰富的文化遗产。"
 mission_push_to_europe:0 "进军欧洲"
 mission_push_to_europe_desc:0 "将元朝的统治扩展到东欧，表明没有哪片土地能逃脱大汗军队的征服。"
 mission_reform_mongol_army:0 "改革蒙古军队"
 mission_reform_mongol_army_desc:0 "在现代化军队的同时，保持蒙古的机动性和冲击力"
 mission_develop_siege_warfare:0 "发展攻城战"
 mission_develop_siege_warfare_desc:0 "掌握攻城战的艺术，将蒙古的机动性与中国先进的工程技术和火药技术相结合。"
 mission_integrate_chinese_artillery:0 "整合中国炮兵"
 mission_integrate_chinese_artillery_desc:0 "将中国的火药与火炮融入军队中，打造世界顶尖的军事力量。"
 mission_promote_buddhism:0 "推广佛教"
 mission_promote_buddhism_desc:0 "庇护佛教机构以巩固皇权正统性，促进多元文化帝国的宗教和谐。"
 mission_syncretic_culture:0 "培育融合文化"
 mission_syncretic_culture_desc:0 "鼓励蒙古、汉人及其他属民之间的文化交流与包容，以创造独特的元文明。"
 mission_imperial_academies:0 "建立帝国学院"
 mission_imperial_academies_desc:0 "建立了将蒙古实用知识与中国学术传统相结合的学习中心，以推动技术创新。"
 mission_agricultural_reforms:0 "推行农业改革"
 mission_agricultural_reforms_desc:0 "通过灌溉项目和新的农业技术提高农业生产力，以满足不断增长的人口需求。"
 mission_grand_canal_development:0 "发展大运河"
 mission_grand_canal_development_desc:0 "扩建和维护大运河网络，以促进我们辽阔帝国的内部贸易与运输。"
 mission_imperial_manufactories:0 "建立帝国工厂"
 mission_imperial_manufactories_desc:0 "设立国家资助的丝绸、瓷器及其他奢侈品作坊，以主导全球奢侈品市场。"
 mission_establish_tributary_system:0 "建立朝贡体系"
 mission_establish_tributary_system_desc:0 "将中国传统的朝贡制度正式化，要求邻国通过定期进贡承认大元的霸权。"
 mission_expand_tributary_network:0 "扩展朝贡网络"
 mission_expand_tributary_network_desc:0 "将我们的朝贡体系扩展至东南亚，在整个区域建立元朝的霸权。"
 mission_develop_naval_power:0 "发展海军力量"
 mission_develop_naval_power_desc:0 "建立一支强大的海军，保护我们的海上贸易航线。"
 mission_expedition_to_indonesia:0 "远征印度尼西亚"
 mission_expedition_to_indonesia_desc:0 "派遣海军远征印度尼西亚，确保直接获取贸易商品。"
 mission_construct_summer_palace:0 "建造夏宫"
 mission_construct_summer_palace_desc:0 "建造一座宏伟的夏宫建筑群，展现元朝的财富、权力和文化水平。"
 mission_great_wall_restoration:0 "修复长城"
 mission_great_wall_restoration_desc:0 "修复和加强长城的防御，同时使其适应以骑兵为主的军事战略。"
 mission_unify_mongol_tribes:0 "统一蒙古诸部"
 mission_unify_mongol_tribes_desc:0 "令所有尚未归顺的蒙古部落都臣服于元朝，重现成吉思汗时期的一统局面。"
 mission_steppe_confederation:0 "成立草原联盟"
 mission_steppe_confederation_desc:0 "建立元朝领导下的所有草原民族联盟，打造一个不可阻挡的游牧联合体。"
 mission_patronize_tibetan_buddhism:0 "赞助藏传佛教"
 mission_patronize_tibetan_buddhism_desc:0 "与吐蕃佛教机构建立密切关系，在中亚地区获得精神合法性和影响力。"
 mission_religious_tolerance:0 "提倡宗教宽容"
 mission_religious_tolerance_desc:0 "在帝国全境实施宗教宽容政策，防止多元文化疆域内的宗派冲突。"
 mission_establish_indian_ocean_trade:0 "开展印度洋贸易"
 mission_establish_indian_ocean_trade_desc:0 "主导印度洋贸易路线，将我们的丝绸之路网络与南亚的海上贸易联系起来。"
 mission_colonize_southeast_asia:0 "殖民东南亚"
 mission_colonize_southeast_asia_desc:0 "在东南亚建立永久性的大元定居点，确保对该地区资源和贸易的控制。"
 mission_advance_siege_technology:0 "革新攻城技术"
 mission_advance_siege_technology_desc:0 "通过开发先进的攻城武器和防御工事技术，突破军事工程的极限。"
 mission_scientific_revolution:0 "点燃科学革命"
 mission_scientific_revolution_desc:0 "融汇草原游牧民族的实践知识与中华学术传统，开创科学发现的黄金时代。"
 mission_world_domination:0 "成就世界霸权"
 mission_world_domination_desc:0 "将大元的权威延伸至所有已知文明，建立人类历史上最大的连贯陆上帝国。"
 mission_pax_mongolica:0 "建立蒙古治世"
 mission_pax_mongolica_desc:0 "在元朝统御之下，为整个欧亚大陆带来空前和平、繁荣与文化交流的时代。"
 STATIC_MODIFIER_NAME_yuan_dynasty_established:0 "巩固元王朝"
 STATIC_MODIFIER_DESC_yuan_dynasty_established:0 "元朝的建立既加强了皇权，又降低了统治成本。"
 STATIC_MODIFIER_NAME_mongol_military_traditions:0 "蒙古军事传统"
 STATIC_MODIFIER_DESC_mongol_military_traditions:0 "复兴的草原传统降低了骑兵成本，提升了军队士气。"
 STATIC_MODIFIER_NAME_great_khan_restored:0 "重建大汗国"
 STATIC_MODIFIER_DESC_great_khan_restored:0 "大可汗国的重建增加了人力，并提高了外交威望。"
 STATIC_MODIFIER_NAME_chinese_bureaucracy:0 "中国官僚体系"
 STATIC_MODIFIER_DESC_chinese_bureaucracy:0 "成熟的中国行政体制提高了税收效率，并促进了技术发展。"
 STATIC_MODIFIER_NAME_imperial_examinations:0 "科举考试"
 STATIC_MODIFIER_DESC_imperial_examinations:0 "选贤用能提高了行政效率，并加快了思潮传播。"
 STATIC_MODIFIER_NAME_pax_mongolica:0 "蒙古治世"
 STATIC_MODIFIER_DESC_pax_mongolica:0 "蒙古为欧亚大陆带来了前所未有的稳定、技术进步和人口增长。"
 yuan_mission_events.1.t:0 "元朝建立"
 yuan_mission_events.1.d:0 "随着帝都的巩固和统治合法性的确立，我们昭告天下国号大元，蒙古的武力与中国的行政管理能力的融合就此开始。我们该如何纪念这一历史性时刻呢？"
 yuan_mission_events.1.a:0 "以传统蒙古仪式庆祝"
 yuan_mission_events.1.b:0 "举行盛大中原典礼"
 yuan_mission_events.2.t:0 "复兴蒙古传统"
 yuan_mission_events.2.d:0 "我们复兴蒙古军事传统的努力已初见成效，草原传统如今重现于朝廷与军队之中。当前军事改革应着重哪些方面？"
 yuan_mission_events.2.a:0 "专注骑兵"
 yuan_mission_events.2.b:0 "发展联合作战战术"
 yuan_mission_events.3.t:0 "大蒙古国复兴"
 yuan_mission_events.3.d:0 "大汗已在整个世界重振权威，臣属国纷纷纳贡，我们的威望达到新的高度。我们该如何运用这重获的威望？"
 yuan_mission_events.3.a:0 "确立绝对的帝国权威"
 yuan_mission_events.3.b:0 "建立外交共识"
 yuan_mission_events.50.t:0 "蒙古和平实现"
 yuan_mission_events.50.d:0 "自太平洋至欧洲，从北极到印度洋，在元朝治下遍及四方。丝绸之路空前繁荣，文化交流重塑着欧亚大陆的文明图景，这黄金时代当如何被后世铭记？"
 yuan_mission_events.50.a:0 "专注于文化与科学传承"
 yuan_mission_events.50.b:0 "确保人人享有经济繁荣"
 mission_establish_yuan_dynasty_trigger:0 "我们必须以至少50点威望和60点正统性控制北京和大都。"
 mission_revive_mongol_traditions_trigger:0 "蒙古文化必须在拥有40点陆军传统和50%骑兵比例的条件下才能接受。"
 mission_restore_great_khanate_trigger:0 "我们需要80点威望、75点军事实力，以及5个附庸国。"
 mission_integrate_chinese_bureaucracy_trigger:0 "汉文化必须被接受，需要学者阶层权力达到40%且行政科技等级为12。"
 mission_control_silk_road_trigger:0 "我们必须控制中亚70%的地区，并实现75的贸易收入。"
 mission_world_domination_trigger:0 "我们需要总计3000点发展度、95点军事力量、95点威望，以及20个朝贡国。"
 mission_pax_mongolica_trigger:0 "我们必须拥有100点威望、90点稳定度、750月度贸易或税收收入，并且处于黄金时代。"
 mission_establish_yuan_dynasty_completion:0 "获得帝国权威与首都发展加成"
 mission_revive_mongol_traditions_completion:0 "蒙古军事传统因骑兵与士气加成而得到强化。"
 mission_control_silk_road_completion:0 "丝绸之路贸易主导地位确立，收入显著提升。"
 mission_world_domination_completion:0 "凭借巨大的威望和军事加成，实现了世界霸权。"
 mission_pax_mongolica_completion:0 "在整个欧亚大陆上建立了永久的和平与繁荣。"