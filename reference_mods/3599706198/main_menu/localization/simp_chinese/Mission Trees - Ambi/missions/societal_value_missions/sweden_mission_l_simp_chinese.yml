l_simp_chinese:
 mission_secure_swedish_crown: "保卫瑞典王位"
 mission_secure_swedish_crown_desc: "建立一个稳定、独立的瑞典君主制，摆脱外国统治，引领我们的国家走向伟大。"
 mission_secure_swedish_crown_tooltip: "保持独立于丹麦的同时，维持稳定与正统性。"
 mission_consolidate_svealand: "合并斯韦阿兰"
 mission_consolidate_svealand_desc: "牢牢掌控瑞典核心地区，为扩张和国家发展奠定坚实基础。"
 mission_consolidate_svealand_tooltip: "确保对斯韦阿兰区域的控制。"
 mission_unite_gotaland: "统一约塔兰"
 mission_unite_gotaland_desc: "将南方土地纳入瑞典统治之下，并争取当地贵族支持，以建立一个统一的王国。"
 mission_unite_gotaland_tooltip: "控制约塔兰并维持贵族满意度。"
 mission_develop_stockholm: "发展斯德哥尔摩"
 mission_develop_stockholm_desc: "将我们的首都打造成一个繁荣的贸易中心和行政枢纽，以匹配一个崛起大国的地位。"
 mission_develop_stockholm_tooltip: "将斯德哥尔摩建设成拥有商业基础设施的发达首都。"
 mission_reform_swedish_army: "改革瑞典军队"
 mission_reform_swedish_army_desc: "全面改革军队，实现现代化与专业化，以抗衡欧洲列强。"
 mission_reform_swedish_army_tooltip: "维持一支强大的军队，巩固王室领地权力，并传承军事传统。"
 mission_establish_caroleans: "建立卡尔军团"
 mission_establish_caroleans_desc: "建立一支以纪律严明、作战凶猛和战场战术创新而闻名的精英职业军队。"
 mission_establish_caroleans_tooltip: "保持高水平的陆军传统并建设军事基础设施。"
 mission_implement_indelta_system: "实施分配制度"
 mission_implement_indelta_system_desc: "分配制度将通过指定特定地区支援特定军团，为我们提供可靠的训练有素士兵来源。"
 mission_implement_indelta_system_tooltip: "保持充足的人力储备和皇室阶层影响力。"
 mission_build_swedish_navy: "建设瑞典海军"
 mission_build_swedish_navy_desc: "为了确保我们在波罗的海的利益，我们需要一支强大的海军。让我们打造一支能够保护海岸线、并将力量投射至远海的舰队。"
 mission_build_swedish_navy_tooltip: "建立强大的海军并发展港口基础设施。"
 mission_secure_baltic_coast: "保卫波罗的海沿岸"
 mission_secure_baltic_coast_desc: "控制整个波罗的海沿岸，以主导区域贸易并确保我们的海上疆界安全。"
 mission_secure_baltic_coast_tooltip: "控制波罗的海沿岸众多地点，并拥有一支强大的海军。"
 mission_challenge_danish_hegemony: "挑战丹麦霸权"
 mission_challenge_danish_hegemony_desc: "通过挑战丹麦在该地区的传统领导地位，确立瑞典在斯堪的纳维亚半岛的主导权。"
 mission_challenge_danish_hegemony_tooltip: "与丹麦成为宿敌并取得军事优势。"
 mission_dominate_baltic_sea: "支配波罗的海"
 mission_dominate_baltic_sea_desc: "在波罗的海建立完全的海上霸权，使其成为瑞典控制的海域。"
 mission_dominate_baltic_sea_tooltip: "以高传统实现海军霸权并控制波罗的海区域。"
 mission_develop_mining_industry: "发展采矿业"
 mission_develop_mining_industry_desc: "扩大铜矿和铁矿开采规模，打造欧洲首屈一指的金属生产中心。"
 mission_develop_mining_industry_tooltip: "发展铜铁产业以达到目标水平。"
 mission_establish_iron_exports: "建立铁出口"
 mission_establish_iron_exports_desc: "垄断高品质瑞典铁的出口，使欧洲的军工业依赖我们的资源。"
 mission_establish_iron_exports_tooltip: "掌控铁器贸易，维持市民满意度。"
 mission_develop_lumber_industry: "发展伐木业"
 mission_develop_lumber_industry_desc: "利用瑞典广阔的森林资源进行木材生产，以支持造船业和出口产业的发展。"
 mission_develop_lumber_industry_tooltip: "控制木材资源并发展木材生产。"
 mission_embrace_reformation: "拥抱改革"
 mission_embrace_reformation_desc: "采用路德宗，建立一个独立于罗马的国家教会，并与欧洲新教国家结盟。"
 mission_embrace_reformation_tooltip: "采纳路德宗并保持宗教统一。"
 mission_establish_state_church: "建立国教"
 mission_establish_state_church_desc: "建立由王室控制的瑞典教会，作为路德宗思潮，以加强国家实力。"
 mission_establish_state_church_tooltip: "建造新教教堂并实现高宗教统一。"
 mission_protestant_leadership: "新教领导力"
 mission_protestant_leadership_desc: "将瑞典定位为欧洲新教事业的首要捍卫者与推动者。"
 mission_protestant_leadership_tooltip: "与新教国家结盟并保持高威望。"
 mission_promote_swedish_culture: "推广瑞典文化"
 mission_promote_swedish_culture_desc: "通过推广瑞典语言、风俗和传统，培养强烈的民族认同感。"
 mission_promote_swedish_culture_tooltip: "确立瑞典文化主导地位并建设文化基础设施。"
 mission_establish_uppsala_university: "建立乌普萨拉大学"
 mission_establish_uppsala_university_desc: "Create a prestigious center of learning to advance knowledge and train future leaders."
 mission_establish_uppsala_university_tooltip: "Develop Uppsala with a university and achieve literacy."
 mission_promote_nordic_science: "推广北欧科学"
 mission_promote_nordic_science_desc: "Establish Scandinavia as a center of scientific innovation and technological advancement."
 mission_promote_nordic_science_tooltip: "建立大学并实现高识字率。"
 mission_secure_finland: "确保芬兰安全"
 mission_secure_finland_desc: "Firmly establish Swedish control over Finland as an eastern buffer and source of resources and manpower."
 mission_secure_finland_tooltip: "Control Finland and Norrland regions."
 mission_expand_into_baltics: "进军波罗的海地区"
 mission_expand_into_baltics_desc: "Extend Swedish influence into the eastern Baltic provinces to control trade cities and strategic positions."
 mission_expand_into_baltics_tooltip: "Gain territory in the eastern Baltic region including Riga."
 mission_intervene_in_germany: "干预日耳曼地区"
 mission_intervene_in_germany_desc: "Project Swedish power into the German states to gain influence, territory, and continental prestige."
 mission_intervene_in_germany_tooltip: "凭借高军队传统和威望在日耳曼地区站稳脚跟。"
 mission_counter_russian_expansion: "遏制俄罗斯扩张"
 mission_counter_russian_expansion_desc: "Contain Russian westward expansion to protect Swedish interests in the Baltic region."
 mission_counter_russian_expansion_tooltip: "与俄罗斯抗衡并实现军事对等。"
 mission_swedish_empire: "瑞典帝国"
 mission_swedish_empire_desc: "Establish Sweden as a recognized European great power through military might and strategic expansion."
 mission_swedish_empire_tooltip: "凭借高威望和发展确保大国地位。"
 sweden_mission_events.1.t: "瑞典王权得以稳固"
 sweden_mission_events.1.d: "With independence achieved and the monarchy stabilized, Sweden stands ready to chart its own course. The nobility's support is crucial, but the extent of their influence must be carefully managed."
 sweden_mission_events.1.a: "Reward Supportive Nobility"
 sweden_mission_events.1.b: "Strengthen Royal Authority"
 sweden_mission_events.2.t: "Götaland United"
 sweden_mission_events.2.d: "The integration of Götaland into the Swedish realm is complete. The southern provinces now contribute their resources and manpower to the strength of the unified kingdom. We must decide how best to integrate these new territories."
 sweden_mission_events.2.a: "Focus on Economic Integration"
 sweden_mission_events.2.b: "Focus on Cultural Integration"
 sweden_mission_events.3.t: "Stockholm Developed"
 sweden_mission_events.3.d: "Our capital has flourished into a true royal city. Stockholm's markets bustle with trade, its buildings reflect our growing wealth, and its strategic position on the Baltic makes it a natural hub for commerce and administration."
 sweden_mission_events.3.a: "Develop as Trade Hub"
 sweden_mission_events.3.b: "Develop as Cultural Capital"
 sweden_mission_events.4.t: "The Indelta System"
 sweden_mission_events.4.d: "The Indelta system has been successfully implemented, providing us with a reliable source of trained soldiers. Each regiment is now supported by specific farms, ensuring a steady flow of manpower. We must decide the emphasis of our military development."
 sweden_mission_events.4.a: "Quality Focus - Professional Soldiers"
 sweden_mission_events.4.b: "Quantity Focus - Mass Conscription"
 sweden_mission_events.5.t: "The Caroleans Established"
 sweden_mission_events.5.d: "The elite Carolean army now stands ready as the pride of Swedish military might. These professional soldiers, trained in innovative tactics and fierce discipline, will strike fear into our enemies across Europe."
 sweden_mission_events.5.a: "Recruit Elite Commander"
 sweden_mission_events.5.b: "Recruit Elite Units"
 sweden_mission_events.6.t: "Shipbuilding Industry Developed"
 sweden_mission_events.6.d: "Our shipbuilding capabilities have advanced dramatically, with new techniques and infrastructure making Swedish ships among the finest in Europe. Our naval power grows with each vessel launched from our yards."
 sweden_mission_events.6.a: "Develop Naval Infrastructure"
 sweden_mission_events.6.b: "Focus on Crew Training"
 sweden_mission_events.7.t: "Skåne Secured"
 sweden_mission_events.7.d: "The fertile provinces of Skåne are now firmly under Swedish control. This strategic region controls the Øresund strait and provides valuable agricultural land. We must decide how to secure and integrate this new territory."
 sweden_mission_events.7.a: "加固边境"
 sweden_mission_events.7.b: "文化融合"
 sweden_mission_events.8.t: "挪威被征服"
 sweden_mission_events.8.d: "挪威现已臣服于瑞典王权。这让我们得以掌控宝贵的大西洋港口、木材资源及战略要地。整合这个新属国需要周密规划。"
 sweden_mission_events.8.a: "Union Focus"
 sweden_mission_events.8.b: "Resource Extraction Focus"
 sweden_mission_events.9.t: "Kalmar Union Broken"
 sweden_mission_events.9.d: "The Danish-dominated Kalmar Union has been shattered, and Swedish leadership of Scandinavia is now established. This historic shift changes the balance of power in Northern Europe and opens new opportunities for Swedish expansion."
 sweden_mission_events.9.a: "Assert Swedish Hegemony"
 sweden_mission_events.9.b: "Diplomatic Settlement"
 sweden_mission_events.10.t: "Finland Secured"
 sweden_mission_events.10.d: "Complete control over Finland has been established, providing Sweden with a secure eastern frontier and valuable resources. This vast territory requires development and fortification against potential threats from the east."
 sweden_mission_events.10.a: "Military Frontier Focus"
 sweden_mission_events.10.b: "Economic Development Focus"
