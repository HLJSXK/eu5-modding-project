 STATIC_MODIFIER_DESC_nordic_scientific_tradition: "Advanced scientific research significantly improves technology advancement."
 STATIC_MODIFIER_NAME_swedish_finland: "瑞典‑芬兰"
 STATIC_MODIFIER_DESC_swedish_finland: "Secure control over Finland provides substantial manpower and defensive advantages."
