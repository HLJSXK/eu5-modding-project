 STATIC_MODIFIER_DESC_swedish_cultural_identity: "Strong national culture increases cultural tradition, influence, and preserves prestige."
 STATIC_MODIFIER_NAME_uppsala_university: "乌普萨拉大学"
 STATIC_MODIFIER_DESC_uppsala_university: "The prestigious university accelerates research, institution growth, and literacy."
