 STATIC_MODIFIER_DESC_iron_export_monopoly: "Control of high-quality iron exports brings substantial trade efficiency and merchant power."
 STATIC_MODIFIER_NAME_swedish_reformation: "瑞典宗教改革"
 STATIC_MODIFIER_DESC_swedish_reformation: "路德教会降低了维稳成本并提高了异端容忍度。"
 STATIC_MODIFIER_NAME_church_of_sweden: "瑞典教会"
 STATIC_MODIFIER_DESC_church_of_sweden: "The established state church facilitates religious conversion, stability, and legitimacy."
 STATIC_MODIFIER_NAME_protestant_leader: "新教联盟领袖"
 STATIC_MODIFIER_DESC_protestant_leader: "Leadership of the Protestant cause enhances diplomatic capabilities and reduces annexation costs."
