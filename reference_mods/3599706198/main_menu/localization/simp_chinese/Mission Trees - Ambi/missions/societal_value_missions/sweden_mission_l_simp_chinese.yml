 sweden_mission_events.11.t: "Mining Industry Boom"
 sweden_mission_events.11.d: "Swedish mining operations have expanded dramatically, with new techniques and infrastructure making our copper and iron production the envy of Europe. The wealth from these resources flows into our treasury, funding our ambitions."
 sweden_mission_events.11.a: "Copper Mining Focus"
 sweden_mission_events.11.b: "Iron Mining Focus"
 sweden_mission_events.11.a.tt: "Develop copper mines with prosperity and building bonuses"
 sweden_mission_events.11.b.tt: "Increase iron production capacity and burgher satisfaction"
 sweden_mission_events.12.t: "The Swedish Reformation"
 sweden_mission_events.12.d: "Sweden has officially embraced Protestantism, breaking with Rome and establishing a national church. This religious transformation has profound implications for our state, society, and international relations."
 sweden_mission_events.12.a: "Lutheran State Church"
 sweden_mission_events.12.b: "Reformed Church Focus"
 sweden_mission_events.12.a.tt: "Adopt Lutheranism with stability and legitimacy bonuses"
 sweden_mission_events.12.b.tt: "Adopt Reformed faith with research and burgher benefits"
 sweden_mission_events.13.t: "Finnish Territories Consolidated"
 sweden_mission_events.13.d: "Our control over Finland is now complete and secure. The eastern frontier is fortified, and Finnish resources are fully integrated into the Swedish economy. This vast territory provides both defensive depth and economic opportunity."
 sweden_mission_events.14.t: "Baltic Sea Dominated"
 sweden_mission_events.14.d: "The Baltic Sea is now effectively a Swedish lake. Our fleets patrol these waters unchallenged, our ports dominate regional trade, and our naval supremacy secures our northern borders for generations to come."
 sweden_mission_events.15.t: "Mining Industry Expanded"
 sweden_mission_events.15.d: "Swedish mining has reached industrial scale, with deep mines and advanced smelting techniques producing unprecedented quantities of copper and iron. This mineral wealth forms the foundation of our economic power."
 sweden_mission_events.16.t: "Baltic Trade League Established"
 sweden_mission_events.16.d: "The Swedish-dominated Baltic Trade League now controls commerce throughout the region. Merchants from across Northern Europe must now deal through our ports, bringing immense wealth to the Swedish treasury."
 sweden_mission_events.17.t: "Reformation Fully Embraced"
 sweden_mission_events.17.d: "The Lutheran faith is now firmly established throughout Sweden. The Church of Sweden operates independently from Rome, strengthening royal authority and creating a distinct Swedish religious identity."
 sweden_mission_events.18.t: "Protestant Leadership Assumed"
 sweden_mission_events.18.d: "Sweden has emerged as the leading defender of the Protestant cause in Europe. Other reformed nations look to us for guidance, protection, and leadership against Catholic powers."
 sweden_mission_events.19.t: "Uppsala University Founded"
 sweden_mission_events.19.d: "The University of Uppsala has been established as a center of learning and scholarship. This institution will train future generations of Swedish leaders, scientists, and theologians, spreading knowledge throughout our realm."
 sweden_mission_events.20.t: "Nordic Scientific Advancement"
 sweden_mission_events.20.d: "Swedish and Scandinavian science has advanced to the forefront of European knowledge. Our researchers make breakthroughs in multiple fields, giving us technological advantages over our rivals."
 sweden_mission_events.21.t: "Intervention in Germany"
 sweden_mission_events.21.d: "Our armies have marched into Germany, establishing a Swedish presence in the heart of Europe. This intervention brings opportunities for expansion but also risks entanglement in complex continental conflicts."
 sweden_mission_events.22.t: "Scandinavian Empire Consolidated"
 sweden_mission_events.22.d: "The Scandinavian realm has been fully integrated and strengthened. Our united kingdom stands as a major European power, with coordinated policies, shared defense, and integrated economies."
 sweden_mission_events.23.t: "Scandinavian Economic Union"
 sweden_mission_events.23.d: "The Nordic economies have been integrated into a single powerful bloc. Swedish industry, Norwegian shipping, and Danish trade combine to create an economic powerhouse dominating northern Europe."
 sweden_mission_events.24.t: "The Swedish Empire"
 sweden_mission_events.24.d: "Sweden has risen from a regional power to a true empire. Our territories span the Baltic, our armies are feared, our navy commands northern waters, and our influence extends across Europe. We stand among the great powers of the continent."
 sweden_mission_events.25.t: "Scandinavian Hegemony"
 sweden_mission_events.25.d: "Scandinavia now stands as the undisputed hegemon of northern Europe. Our control of the Baltic and North Seas, our unified military might, and our economic dominance establish our preeminence in the region."
 sweden_mission_events.26.t: "Northern Great Power"
 sweden_mission_events.26.d: "Sweden/Scandinavia has achieved comprehensive superiority as the preeminent power of northern Europe. Our military, economic, cultural, and diplomatic dominance is recognized across the continent."
 sweden_mission_events.27.t: "Scandinavian Golden Age"
 sweden_mission_events.27.d: "An unprecedented era of prosperity, cultural flourishing, and political dominance has begun for Scandinavia. Our united realm enjoys peace, wealth, and influence unmatched in our history, with achievements in every field that will be remembered for generations."
