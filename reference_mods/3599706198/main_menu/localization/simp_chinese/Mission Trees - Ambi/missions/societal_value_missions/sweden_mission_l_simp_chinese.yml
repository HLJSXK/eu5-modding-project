l_simp_chinese:
 sweden_mission_pack: "瑞典任务树"
 sweden_mission_pack_desc: "一个侧重于瑞典独立、军事改革以及支配波罗的地区的综合任务树。"
 mission_secure_swedish_crown: "保卫瑞典王位"
 mission_secure_swedish_crown_desc: "我们必须确保独立，摆脱外国统治，建立一个稳定的瑞典君主制，引领我们的国家走向伟大。"
 mission_secure_swedish_crown_tooltip: "保持独立于丹麦的同时，维持稳定与正统性。"
 mission_consolidate_svealand: "合并斯韦阿兰"
 mission_consolidate_svealand_desc: "瑞典的心脏地带必须牢牢掌握在我们手中。通过控制斯韦阿兰，我们就能建立一个强大的基地，以此扩展我们的影响力。"
 mission_consolidate_svealand_tooltip: "确保对斯韦阿兰区域的控制。"
 mission_unite_gotaland: "统一约塔兰"
 mission_unite_gotaland_desc: "约塔兰南部地区对统一瑞典至关重要。我们必须将这些领土纳入统治，并争取当地贵族的支持。"
 mission_unite_gotaland_tooltip: "控制约塔兰并维持贵族满意度。"
 mission_develop_stockholm: "发展斯德哥尔摩"
 mission_develop_stockholm_desc: "我们的首都应成为配得上大国地位的贸易与行政中心。让我们将斯德哥尔摩建设成可与欧洲伟大都城媲美的城市。"
 mission_develop_stockholm_tooltip: "将斯德哥尔摩建设成商业基础设施完善、繁荣昌盛的首都。"
 mission_reform_swedish_army: "改革瑞典军队"
 mission_reform_swedish_army_desc: "我们的军队必须现代化、专业化，以与欧洲列强竞争。让我们推行改革，使我们的军队威震整个欧洲大陆。"
 mission_reform_swedish_army_tooltip: "保持强大的军队和巩固王权。"
 mission_establish_caroleans: "建立卡尔军团"
 mission_establish_caroleans_desc: "卡尔军团将成为一支精锐军队，以高训练度与战场凶猛著称。这些职业军人将构成我们军队的中坚力量。"
 mission_establish_caroleans_tooltip: "在全国范围内建立军械库，以保持高度的军队传统。"
 mission_develop_artillery_corps: "发展炮兵部队"
 mission_develop_artillery_corps_desc: "精良的炮兵将在围城战与野战对决中为我们赢得优势。让我们建立一支专业的炮兵部队，足以粉碎敌军阵型与防御工事。"
 mission_develop_artillery_corps_tooltip: "控制铜铁资源，建立火炮生产设施。"
 mission_implement_indelta_system: "实施分配制度"
 mission_implement_indelta_system_desc: "分配制度将通过指定特定地区支援特定军团，为我们提供可靠的训练有素士兵来源。这将确保我们永远不会缺乏人力。"
 mission_implement_indelta_system_tooltip: "保持充足的人力储备和皇室阶层影响力。"
 mission_build_swedish_navy: "建立瑞典海军"
 mission_build_swedish_navy_desc: "为了确保我们在波罗的海的利益，我们需要一支强大的海军。让我们打造一支能够保护海岸线、并将力量投射至远海的舰队。"
 mission_build_swedish_navy_tooltip: "建立强大的海军并发展港口基础设施。"
 mission_establish_naval_dominance: "建立海军优势"
 mission_establish_naval_dominance_desc: "波罗的海理应成为瑞典的内湖。凭借强大的舰队和悠久的航海传统，我们能确保没有任何外国势力敢挑战我们对这里的控制权。"
 mission_establish_naval_dominance_tooltip: "达成高海军传统并维持一支庞大的舰队。"
 mission_secure_baltic_coast: "保卫波罗的海沿岸"
 mission_secure_baltic_coast_desc: "波罗的海沿岸对贸易与安全至关重要。掌控这些海岸线，我们便能主导区域贸易，并保护内陆核心地带免受海上威胁。"
 mission_secure_baltic_coast_tooltip: "控制波罗的海沿岸的战略要地。"
 mission_challenge_danish_hegemony: "挑战丹麦霸权"
 mission_challenge_danish_hegemony_desc: "丹麦人长期以来一直主导着斯堪的纳维亚。现在是时候挑战他们的地位，在北方地区确立瑞典的地位了。"
 mission_challenge_danish_hegemony_tooltip: "与丹麦竞争并实现军事对等。"
 mission_dominate_baltic_sea: "支配波罗的海"
 mission_dominate_baltic_sea_desc: "完全掌控波罗的海将使瑞典成为北欧无可争议的霸主，让我们确保这片地区的所有贸易与航行都听命于斯德哥尔摩。"
 mission_dominate_baltic_sea_tooltip: "在波罗的海区域取得制海权。"
 mission_develop_mining_industry: "发展采矿业"
 mission_develop_mining_industry_desc: "我们的土地富含铜矿和铁矿。通过开发这些资源，我们可以建立一个强大的经济基础，为我们的军事提供资金，并使瑞典变得富裕。"
 mission_develop_mining_industry_tooltip: "发展铜铁产业以达到目标水平。"
 mission_establish_iron_exports: "建立铁出口"
 mission_establish_iron_exports_desc: "瑞典的铁是欧洲最优质的，让我们垄断其出口，使我国成为欧洲大陆军火工业不可或缺的一部分。"
 mission_establish_iron_exports_tooltip: "掌控铁器贸易，维持市民满意度。"
 mission_develop_lumber_industry: "发展伐木业"
 mission_develop_lumber_industry_desc: "我们广袤的森林为造船和建筑提供了优质木材。发达的木材工业将支持我们的海军，并提供宝贵的出口资源。"
 mission_develop_lumber_industry_tooltip: "发展木材业与加工设施。"
 mission_embrace_reformation: "拥抱改革"
 mission_embrace_reformation_desc: "宗教改革为我们提供了与罗马教廷决裂、建立国家教会的契机。让我们拥抱路德宗，引领人民走向新方向。"
 mission_embrace_reformation_tooltip: "采纳路德宗并保持宗教统一。"
 mission_establish_state_church: "建立国教"
 mission_establish_state_church_desc: "建立由王室掌控的国家路德教会将巩固国家政权，减少外来宗教影响，让我们建设瑞典教会作为我们国家的支柱。"
 mission_establish_state_church_tooltip: "建造大教堂，并让民众改信路德宗。"
 mission_protestant_leadership: "新教领导力"
 mission_protestant_leadership_desc: "作为新教的主要力量，我们应该与其他改革国家结盟，保护新教免受天主教国家的侵害，瑞典将成为新教的盾牌。"
 mission_protestant_leadership_tooltip: "与新教国家结盟并保持高威望。"
 mission_promote_swedish_culture: "推广瑞典文化"
 mission_promote_swedish_culture_desc: "强烈的民族认同感将团结我们的人民，并使我们与邻国区别开来。让我们在整个王国推广瑞典的语言、习俗和传统。"
 mission_promote_swedish_culture_tooltip: "确立瑞典文化主导地位并建设文化基础设施。"
 mission_establish_uppsala_university: "建立乌普萨拉大学"
 mission_establish_uppsala_university_desc: "一所大学将推动知识进步，培养管理人才，并提升我们的威望。让我们把乌普萨拉打造成吸引全欧洲学者的学术中心。"
 mission_establish_uppsala_university_tooltip: "发展乌普萨拉，建设一所大学并推动发展。"
 mission_promote_nordic_science: "推广北欧科学"
 mission_promote_nordic_science_desc: "科学进步将推动瑞典迈向现代化。通过支持研究与教育，我们可以取得超越对手的技术优势。"
 mission_promote_nordic_science_tooltip: "建立大学并实现高识字率。"
 mission_secure_finland: "确保芬兰安全"
 mission_secure_finland_desc: "芬兰是我们东部的屏障，也是宝贵资源和劳动力的来源。我们必须确保完全控制这片领土，以保护我们的核心地带。"
 mission_secure_finland_tooltip: "确立对芬兰的稳固控制。"
 mission_expand_into_baltics: "进军波罗的海地区"
 mission_expand_into_baltics_desc: "波罗的海省份拥有富庶的贸易城市和战略要地。通过向东扩张，我们可以控制整个波罗的海海岸线及其利润丰厚的贸易路线。"
 mission_expand_into_baltics_tooltip: "在东波罗的海地区获取领土。"
 mission_intervene_in_germany: "干预日耳曼地区"
 mission_intervene_in_germany_desc: "日耳曼诸邦国分裂且实力薄弱，这为瑞典介入提供了良机，使其能在欧洲腹地获取影响力、领土与威望。"
 mission_intervene_in_germany_tooltip: "凭借高军队传统和威望在日耳曼地区站稳脚跟。"
 mission_counter_russian_expansion: "遏制俄罗斯扩张"
 mission_counter_russian_expansion_desc: "俄罗斯日益增长的力量威胁着我们的东部边境。我们必须遏制其扩张，并维持瑞典在波罗的海地区的主导地位。"
 mission_counter_russian_expansion_tooltip: "与俄罗斯抗衡并实现军事对等。"
 mission_establish_protestant_alliances: "建立新教同盟"
 mission_establish_protestant_alliances_desc: "作为领先的新教国家，我们应当与其他改革宗国家建立联盟网络，以对抗天主教霸权并保护我们的宗教利益。"
 mission_establish_protestant_alliances_tooltip: "与多个新教国家建立联盟。"
 mission_swedish_empire: "瑞典帝国"
 mission_swedish_empire_desc: "凭借军事力量、经济发展与战略扩张，瑞典已崛起为一个真正的帝国。让我们巩固现有成果，为更伟大的成就做好准备。"
 mission_swedish_empire_tooltip: "凭借高威望和发展确保大国地位。"
 mission_baltic_hegemony: "波罗的霸权"
 mission_baltic_hegemony_desc: "波罗的海由我们掌控。凭借对这片水域及其海岸线的绝对控制权，瑞典成为北欧的霸主。"
 mission_baltic_hegemony_tooltip: "在波罗的海区域实现全面主导。"
 sweden_mission_events.1.t: "瑞典王权得以稳固"
 sweden_mission_events.1.d: "王冠已稳稳戴在我们头上，贵族们的支持也已稳固，瑞典如今团结在一位君主之下。通往独立与伟大的道路已在我们面前展开。"
 sweden_mission_events.1.a: "奖赏支持王室的贵族"
 sweden_mission_events.1.b: "加强王权"
 sweden_mission_events.2.t: "军事改革已实施"
 sweden_mission_events.2.d: "我们的军队已通过新战术、训练方法和组织架构进行了全面改革。瑞典军队正转型为一支能够抗衡任何欧洲强国的专业力量。"
 sweden_mission_events.2.a: "注重质量与创新"
 sweden_mission_events.2.b: "扩充专业队伍"
 sweden_mission_events.3.t: "挑战丹麦的统治地位"
 sweden_mission_events.3.d: "是时候公开挑战丹麦在斯堪的纳维亚的霸权了。我们日益增长的实力使我们能够争夺他们对区域的控制权，并确立瑞典的卓越地位。"
 sweden_mission_events.3.a: "准备迎战"
 sweden_mission_events.3.b: "我们先巩固自己的地位。"
 sweden_mission_events.4.t: "矿业繁荣"
 sweden_mission_events.4.d: "我们的采矿业已大幅扩展，新技术和基础设施使瑞典的铜铁生产成为欧洲艳羡的对象。这些资源带来的财富正源源不断地流入国库。"
 sweden_mission_events.4.a: "投资矿业社区"
 sweden_mission_events.4.b: "专注于技术进步"
 sweden_mission_events.5.t: "瑞典帝国"
 sweden_mission_events.5.d: "瑞典已从一个地区强国崛起为真正的帝国。我们的领土横跨波罗的海，我们的军队令人敬畏，我们的影响力遍及欧洲。我们已跻身欧洲大陆的强国之列。"
 sweden_mission_events.5.a: "拥抱帝国辉煌"
 sweden_mission_events.5.b: "专注于军事优势"
 sweden_mission_events.6.t: "约塔兰联队"
 sweden_mission_events.6.d: "约塔兰地区已完全融入瑞典王国。南方各省份的资源与人力，如今正为统一王国的强大贡献力量。"
 sweden_mission_events.6.a: "促进区域一体化"
 sweden_mission_events.6.b: "鼓励经济发展"
 sweden_mission_events.7.t: "分配制度"
 sweden_mission_events.7.d: "分配制度已成功实施，为我们提供了可靠的训练有素的士兵来源。每个团现在都有特定的兵源支持，确保了人力的稳定供应。"
 sweden_mission_events.7.a: "专注效率"
 sweden_mission_events.7.b: "建立训练有素的后备力量"
 sweden_mission_events.8.t: "瑞典宗教改革"
 sweden_mission_events.8.d: "瑞典已正式接纳路德宗改革，与罗马教廷决裂并建立了国家教会。这一宗教变革对我国政治与社会产生了深远影响。"
 sweden_mission_events.8.a: "拥抱路德宗"
 sweden_mission_events.8.b: "促进宗教宽容"
 sweden_mission_events.9.t: "新教领导力"
 sweden_mission_events.9.d: "瑞典已成为欧洲新教事业的领导者。其他改革派国家视我们为对抗天主教势力的先锋。"
 sweden_mission_events.9.a: "成为新教捍卫者"
 sweden_mission_events.9.b: "团结国际新教"
 sweden_mission_events.10.t: "对日耳曼地区的干预"
 sweden_mission_events.10.d: "我们的军队已挺进日耳曼地区，在欧洲腹地建立起瑞典的势力。此次介入既带来了扩张的机遇，也伴随着卷入复杂冲突的风险。"
 sweden_mission_events.10.a: "展开一场积极的行动。"
 sweden_mission_events.10.b: "专注于战略占领"
 STATIC_MODIFIER_NAME_swedish_independent_crown: "独立的瑞典君权"
 STATIC_MODIFIER_DESC_swedish_independent_crown: "稳固的瑞典君主制确保了国家的稳定与高效的税收征收。"
 STATIC_MODIFIER_NAME_svealand_heartland: "斯韦阿兰心脏地带"
 STATIC_MODIFIER_DESC_svealand_heartland: "牢牢掌控瑞典的核心地带，能有效降低建设成本并巩固我们的核心。"
 STATIC_MODIFIER_NAME_stockholm_trading_center: "斯德哥尔摩交易中心"
 STATIC_MODIFIER_DESC_stockholm_trading_center: "斯德哥尔摩已发展成为拥有强大生产能力的主要商业中心。"
 STATIC_MODIFIER_NAME_carolean_army: "卡尔军团"
 STATIC_MODIFIER_DESC_carolean_army: "精锐的卡尔军团以其训练度、士气和战斗力而闻名。"
 STATIC_MODIFIER_NAME_swedish_artillery_corps: "瑞典炮兵部队"
 STATIC_MODIFIER_DESC_swedish_artillery_corps: "专业炮兵部队提供攻城能力和战场支援。"
 STATIC_MODIFIER_NAME_indelta_system: "分配制度"
 STATIC_MODIFIER_DESC_indelta_system: "区域招聘系统确保了受过培训的人力资源稳定供应。"
 STATIC_MODIFIER_NAME_swedish_naval_tradition: "瑞典海军传统"
 STATIC_MODIFIER_DESC_swedish_naval_tradition: "强大的海军传统和基础设施支撑着我们的海上舰队。"
 STATIC_MODIFIER_NAME_baltic_naval_supremacy: "波罗的海海军霸权"
 STATIC_MODIFIER_DESC_baltic_naval_supremacy: "完全掌控波罗的海将提升我们的海军士气与贸易实力。"
 STATIC_MODIFIER_NAME_scandinavian_contender: "斯堪的纳维亚挑战者"
 STATIC_MODIFIER_DESC_scandinavian_contender: "瑞典日益增强的实力正在挑战传统的地区等级秩序。"
 STATIC_MODIFIER_NAME_baltic_dominance: "波罗的海霸权"
 STATIC_MODIFIER_DESC_baltic_dominance: "控制波罗的海区域能带来贸易和海上优势。"
 STATIC_MODIFIER_NAME_swedish_mining_industry: "瑞典矿业"
 STATIC_MODIFIER_DESC_swedish_mining_industry: "先进的采矿作业提升了生产效率和资源产出。"
 STATIC_MODIFIER_NAME_swedish_lumber_industry: "瑞典伐木产业"
 STATIC_MODIFIER_DESC_swedish_lumber_industry: "发达的伐木产业提供了材料，并降低了造船成本。"
 STATIC_MODIFIER_NAME_iron_export_monopoly: "铁矿石垄断"
 STATIC_MODIFIER_DESC_iron_export_monopoly: "控制高品质铁出口能提升贸易效率和商人能力。"
 STATIC_MODIFIER_NAME_swedish_reformation: "瑞典宗教改革"
 STATIC_MODIFIER_DESC_swedish_reformation: "路德教会降低了维稳成本并提高了异端容忍度。"
 STATIC_MODIFIER_NAME_church_of_sweden: "瑞典教会"
 STATIC_MODIFIER_DESC_church_of_sweden: "国教制度有助于促进宗教皈依与社会稳定。"
 STATIC_MODIFIER_NAME_protestant_leader: "新教联盟领袖"
 STATIC_MODIFIER_DESC_protestant_leader: "领导新教事业能提升外交声誉，并增加条约带来的威望。"
 STATIC_MODIFIER_NAME_swedish_cultural_identity: "瑞典文化认同"
 STATIC_MODIFIER_DESC_swedish_cultural_identity: "强大的民族文化增强了文化传统，并减缓了威望的衰退。"
 STATIC_MODIFIER_NAME_uppsala_university: "乌普萨拉大学"
 STATIC_MODIFIER_DESC_uppsala_university: "声望卓著的乌普萨拉大学加速了技术进步，并传播了新思想。"
 STATIC_MODIFIER_NAME_nordic_scientific_tradition: "北欧科学传统"
 STATIC_MODIFIER_DESC_nordic_scientific_tradition: "先进的科学研究降低了技术成本，加速了创新进程。"
 STATIC_MODIFIER_NAME_swedish_finland: "瑞典‑芬兰"
 STATIC_MODIFIER_DESC_swedish_finland: "控制芬兰提供了额外的人力资源和防御优势。"
 STATIC_MODIFIER_NAME_baltic_expansion: "波罗的扩张"
 STATIC_MODIFIER_DESC_baltic_expansion: "在波罗的海区域的成功扩张提升了威望与军队传统。"
 STATIC_MODIFIER_NAME_german_intervention: "日耳曼干预"
 STATIC_MODIFIER_DESC_german_intervention: "在日耳曼地区军事存在提升了士气与威望。"
 STATIC_MODIFIER_NAME_russian_counterweight: "制衡俄罗斯"
 STATIC_MODIFIER_DESC_russian_counterweight: "有效遏制俄罗斯能提升防御能力和军队传统。"
 STATIC_MODIFIER_NAME_protestant_diplomacy: "新教外交"
