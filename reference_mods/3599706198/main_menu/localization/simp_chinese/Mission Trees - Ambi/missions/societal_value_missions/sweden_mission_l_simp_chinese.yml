 STATIC_MODIFIER_NAME_german_intervention: "日耳曼干预"
 STATIC_MODIFIER_DESC_german_intervention: "Military presence in Germany boosts morale, prestige, tradition, and movement speed."
 STATIC_MODIFIER_NAME_russian_counterweight: "制衡俄罗斯"
 STATIC_MODIFIER_DESC_russian_counterweight: "Effective containment of Russia improves defensive capabilities, artillery, and attrition against enemies."
 STATIC_MODIFIER_NAME_swedish_empire: "瑞典帝国"
 STATIC_MODIFIER_DESC_swedish_empire: "瑞典帝国凭借增强的人力、士气与外交影响，赢得了世人的尊敬。"
 sweden_mission_pack_test: "Sweden: The Lion of the North"
 sweden_mission_pack_test_desc: "Guide Sweden from independence to empire through military reforms, religious transformation, and Baltic dominance."
 sweden_mission_pack_test_BUTTON_TOOLTIP: "Complete missions to transform Sweden into a great power and establish Scandinavian hegemony."
 sweden_mission_pack_test_CRITERIA_DESCRIPTION: "Secure independence, reform the military, dominate the Baltic, and lead the Protestant cause to unlock powerful modifiers and traditions."
 mission_strengthen_royal_authority: "Strengthen Royal Authority"
 mission_strengthen_royal_authority_desc: "Consolidate power in the crown to reduce noble influence and establish a strong centralized state."
 mission_strengthen_royal_authority_tooltip: "Increase crown estate power while limiting noble influence."
 mission_swedish_establish_standing_army: "Establish Standing Army"
 mission_swedish_establish_standing_army_desc: "Create a professional standing army independent of seasonal levies to ensure constant military readiness."
 mission_swedish_establish_standing_army_tooltip: "Maintain a substantial army with high tradition and crown control."
 mission_develop_shipbuilding_industry: "Develop Shipbuilding Industry"
 mission_develop_shipbuilding_industry_desc: "Establish superior shipbuilding capabilities using Swedish timber to create a formidable naval force."
 mission_develop_shipbuilding_industry_tooltip: "Control timber resources and build shipyards."
 mission_establish_modern_navy: "Establish Modern Navy"
 mission_establish_modern_navy_desc: "Create a technologically advanced navy with dry docks, modern ships, and professional sailors."
 mission_establish_modern_navy_tooltip: "Maintain a large navy with advanced infrastructure."
 mission_secure_skane: "Secure Skåne"
 mission_secure_skane_desc: "Claim the fertile southern provinces to strengthen our agricultural base and control the Øresund strait."
 mission_secure_skane_tooltip: "Control the Skåne region including Malmö."
 mission_control_over_norway: "Control Norway"
 mission_control_over_norway_desc: "Establish control over Norway to secure its strategic Atlantic position and resources."
 mission_control_over_norway_tooltip: "Control Norwegian territories and reduce Danish influence."
 mission_subjugate_norway: "Subjugate Norway"
 mission_subjugate_norway_desc: "Bring Norway under Swedish influence to control its resources, ports, and strategic Atlantic position."
 mission_subjugate_norway_tooltip: "Reduce Norwegian territory and control Oslo."
 mission_break_kalmar_union: "Break the Kalmar Union"
 mission_break_kalmar_union_desc: "Shatter Danish-dominated Scandinavian unity and establish Swedish leadership of the Nordic region."
 mission_break_kalmar_union_tooltip: "End Danish sovereignty and control Copenhagen."
 mission_promote_scandinavian_unity: "Promote Scandinavian Unity"
 mission_promote_scandinavian_unity_desc: "Foster cultural and political integration of Scandinavian peoples under Swedish leadership."
 mission_promote_scandinavian_unity_tooltip: "Accept Danish and Norwegian cultures while promoting Swedish tradition."
 mission_form_scandinavian_kingdom: "Form Scandinavian Kingdom"
 mission_form_scandinavian_kingdom_desc: "Unite the Nordic peoples into a single powerful kingdom under the Swedish crown."
 mission_form_scandinavian_kingdom_tooltip: "Control Scandinavian capitals and achieve high prestige."
 mission_establish_baltic_trade_league: "Establish Baltic Trade League"
 mission_establish_baltic_trade_league_desc: "Create a Swedish-dominated trade network controlling commerce throughout the Baltic region."
 mission_establish_baltic_trade_league_tooltip: "Develop trade infrastructure and dominate Stockholm market."
 mission_establish_swedish_academy: "Establish Swedish Academy of Sciences"
 mission_establish_swedish_academy_desc: "Create a premier scientific institution to lead European research and innovation."
 mission_establish_swedish_academy_tooltip: "Achieve high literacy and cultural tradition with academies."
 mission_secure_ingria: "Secure Ingria"
 mission_secure_ingria_desc: "Establish control over the Ingrian territories to secure our eastern frontier and Baltic access."
 mission_secure_ingria_tooltip: "Control Ingria region including Saint Petersburg."
 mission_consolidate_scandinavian_empire: "Consolidate Scandinavian Empire"
 mission_consolidate_scandinavian_empire_desc: "Strengthen and integrate the Scandinavian realm into a cohesive and powerful empire."
 mission_consolidate_scandinavian_empire_tooltip: "As Scandinavia, achieve great power status with strong control."
 mission_promote_scandinavian_culture: "Promote Scandinavian Culture"
 mission_promote_scandinavian_culture_desc: "Develop a unified Scandinavian cultural identity that transcends individual Nordic traditions."
 mission_promote_scandinavian_culture_tooltip: "Promote Swedish culture while accepting other Scandinavian cultures."
 mission_develop_scandinavian_economy: "Develop Scandinavian Economy"
 mission_develop_scandinavian_economy_desc: "Integrate Nordic economies into a single powerful economic bloc dominating northern Europe."
 mission_develop_scandinavian_economy_tooltip: "Achieve high production in key resources and income."
 mission_establish_scandinavian_navy: "Establish Scandinavian Navy"
 mission_establish_scandinavian_navy_desc: "Create a unified Scandinavian naval force supreme in northern European waters."
 mission_establish_scandinavian_navy_tooltip: "Maintain a massive navy with high tradition."
 mission_scandinavian_hegemony: "Scandinavian Hegemony"
 mission_scandinavian_hegemony_desc: "Establish complete Scandinavian dominance over northern Europe as an undisputed hegemon."
 mission_scandinavian_hegemony_tooltip: "As Scandinavia, achieve hegemon status with control of northern seas."
 mission_northern_great_power: "Northern Great Power"
 mission_northern_great_power_desc: "Position Sweden/Scandinavia as the preeminent power of northern Europe through comprehensive superiority."
 mission_northern_great_power_tooltip: "Achieve hegemon status with military, economic, and cultural supremacy."
 mission_scandinavian_golden_age: "Scandinavian Golden Age"
 mission_scandinavian_golden_age_desc: "Usher in an era of unprecedented prosperity, cultural flourishing, and political dominance for Scandinavia."
 mission_scandinavian_golden_age_tooltip: "As Scandinavia, achieve complete unification with exceptional development."
