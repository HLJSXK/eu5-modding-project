l_simp_chinese:
 portugal_missions: "葡萄牙霸权"
 portugal_missions_DESCRIPTION: "葡萄牙任务树记载了阿维什王朝的迅速崛起，始于巩固葡萄牙的统治，以及在再征服运动末期抵御伊比利亚半岛宿敌、保卫领地的历程。它引导玩家完成宫廷内部改革，并推动萨格里什关键的海事创新，这些变革将一个大西洋沿岸的小王国转变为全球探索的先驱。从1415年首次征服休达到勇闯博哈多尔角，任务树着重强调了沿非洲海岸建立一系列商站的战略必要性，以此绕过古老的陆上贸易路线。\n"
 portugal_missions_BUTTON_DETAILS: "选择此项，引导葡萄牙成为横跨各大洲的全球贸易帝国。"
 portugal_missions_BUTTON_TOOLTIP: "\n\n"
 portugal_missions_CRITERIA_DESCRIPTION: "通过巩固伊比利亚半岛的统治地位、掌控印度贸易，并控制大西洋、印度洋与太平洋的关键贸易航线，将葡萄牙打造为全球主导力量。"
 mission_por_secure_our_homeland: "保卫我们的家园"
 mission_por_secure_our_homeland_desc: "葡萄牙从收复失地运动中崛起，成为一片充满边疆战士与雄心勃勃贵族的土地。在阿方索的领导下于1139年乌里克战役后宣布脱离莱昂王国独立——这个国家必须在对邻国伊比利亚强权的主权声索中捍卫自身。唯有巩固核心领土、强化边境防线，我们才有望作为一个独立领地存续。\n\n内部稳定与外部防御同等重要。我们必须安抚地方贵族势力，整合领土治理体系，确保从米尼奥河到特茹河的土地皆遵行国王律令。通过建立一个统一的国家，我们将为这个王国奠定基石——它不仅能在伊比利亚半岛的纷争中屹立不倒，更终将跨越地平线，迈向属于远海的命运征程。"
 mission_por_galicia_is_ours: "收复加利西亚"
 mission_por_galicia_is_ours_desc: "葡萄牙与加利西亚的历史文化渊源深厚，可追溯至罗马时期的加利西亚行省及中世纪早期的苏维汇王国。许多葡萄牙贵族对加利西亚土地拥有世袭宣称权，而我们民族间的语言相似性更印证了共同的血脉传承。通过对这些北方领土主张权利，我们将重聚因莱昂与卡斯蒂利亚王室的王朝纷争而长期分离的民族。\n\n掌控西北部的大西洋沿岸将带来显著的战略优势，巩固我国的北部侧翼。通过整合这些土地，我们将确保拉科鲁尼亚等加利西亚港口及富饶的农业谷地置于葡萄牙王冠的保护之下，从而阻止宿敌在伊比利亚半岛这一关键区域建立立足点。"
 mission_por_integrate_our_brothers: "团结我们的兄弟"
 mission_por_integrate_our_brothers_desc: "随着加利西亚落入我们掌控，行政与文化融合的艰巨任务就此展开。我们必须弥合两地行政体系的鸿沟，同时尊重连接米尼奥与加利西亚地区数百年的共同传统。这一进程将确保北部边境不仅是地图上的界线，更是王国稳定统一的核心腹地。\n\n经济合作与忠诚官员的任命，将守护这些北方省份免遭卡斯蒂利亚复仇主义的侵扰。通过将加利西亚人民视如己出并尊重其地方习俗，我们巩固了在大西洋西北部的统治，为国家在半岛内进一步无争议的扩张做好准备。"
 mission_por_conquer_iberia: "征服伊比利亚"
 mission_por_conquer_iberia_desc: "自收复失地运动以来，葡萄牙君主们始终怀抱着统一伊比利亚的雄心壮志。如今，我们要挑战卡斯蒂利亚与阿拉贡的霸权，成为半岛的主宰。这需要军事谋略、外交结盟与蚕食领土三管齐下。\n\n掌控伊比利亚腹地将使半岛资源尽归我用——从梅塞塔高原的羊毛到瓦伦西亚的地中海港口。此举既能消除邻国陆路入侵的威胁，亦可让葡萄牙王室心无旁骛地经营蓬勃发展的海上帝国，再无内顾之忧。"
 mission_por_claim_madeira: "占领马德拉"
 mission_por_claim_madeira_desc: "1419年，若昂·贡萨尔维斯·扎尔科与特里斯唐·瓦斯·特谢拉发现马德拉群岛，这些无人岛屿拥有肥沃的火山土壤，其战略位置远离地中海宿敌的势力范围。在此建立永久定居点对我们的海洋未来至关重要。\n\n通过宣称马德拉主权，我们为沿非洲海岸继续南航的船队建立了关键前哨站。农业的引入与地方治理体系的建立，将使这些岛屿转变为王室的高产省份，为未来所有海外殖民地树立典范。"
 mission_por_develop_sugar_plantations: "发展蔗糖种植园"
 mission_por_develop_sugar_plantations_desc: "马德拉群岛的火山土壤和温暖气候非常适合种植蔗糖。通过引进西西里岛的种植技术，并大力投资修建大型灌溉渠系统，我们可以将这些岛屿打造成为已知世界中利润最高的农业区域之一。\n\n开发这些甘蔗种植园需要大量劳动力以及建立复杂的贸易网络。随着马德拉群岛在15世纪成为全球蔗糖生产的领军者，它将吸引来自欧洲各地的商贾，从而牢牢确立葡萄牙在蓬勃发展的大西洋经济作物贸易体系中的中心地位。"
 mission_por_set_foot_on_the_azores: "踏上亚速尔群岛"
 mission_por_set_foot_on_the_azores_desc: "位于北大西洋中央、孤悬海外的亚速尔群岛，于1427年由迪奥戈·德·席尔维斯正式发现。这九座岛屿犹如大洋中的关键“锁扣”，为自南方或西方返航、经由“回航航线”航行的船只提供了至关重要的停靠点。\n\n群岛的开拓与定居，正是我们先驱殖民者无畏精神的最好见证。   群岛地势崎岖，气候温润，为畜牧业、菘蓝种植以及小麦生产创造了得天独厚的条件。掌控这些岛屿，便能确保葡萄牙船队在穿越“黑暗之海”的漫长而艰险航程中，拥有安全的避风港与充足的补给。"
 mission_por_greater_portugal: "大葡萄牙"
 mission_por_greater_portugal_desc: "“大葡萄牙”的构想旨在建立一个无缝连接欧洲与我们新占领的北大西洋群岛的王国。通过将本土领土与新近定居的马德拉群岛和亚速尔群岛充分整合，我们将打造一个统一而强大的海洋强国，足以将影响力深入大洋腹地。\n\n这一使命标志着我们早期大西洋扩张努力的巅峰。所谓“大葡萄牙”，绝非各处零散领地的简单拼凑，而是一个凝聚力强大的帝国——在这里，海洋与陆地的资源将协同运作，共同为阿维什王朝的荣耀与葡萄牙人民的繁荣服务。"
 mission_por_the_canary_islands: "加那利群岛"
 mission_por_the_canary_islands_desc: "加那利群岛长期以来一直是葡萄牙与卡斯蒂利亚王室之间激烈争夺的焦点。它们位于非洲西北海岸的战略要地，是任何希望探索南方国家的重要基地。我们必须通过殖民，并在必要时动用军事力量，来维护我们的历史主张。\n\n控制加那利群岛将为我们提供一个通往非洲大陆和南大西洋信风的无可争议的门户。通过确保这些岛屿的安全，我们将剥夺卡斯蒂利亚的重要立足点，并确保通往南方黄金与香料之路严格处于葡萄牙的影响之下。"
 mission_por_morocco: "穿越海格力斯之柱"
 mission_por_morocco_desc: "1415年占领休达，标志着葡萄牙海外帝国的开端。通过跨越直布罗陀海峡并夺取这座至关重要的北非港口，我们已在新的大陆上踏出了第一步。休达作为桥头堡，使我们得以监视摩洛哥军队的动向，并切断那些滋养敌人的跨撒哈拉贸易路线。\n\n这场胜利向世界宣告了我们的决心。葡萄牙不再局限于欧洲海岸，如今已成为能够将战火引向马格里布地区的十字军力量。我们必须牢牢掌控这座战略要塞，因为它是打开非洲海岸大门、通往赫拉克勒斯之柱外财富的关键钥匙。"
 mission_por_moroccan_coast: "摩洛哥海岸"
 mission_por_moroccan_coast_desc: "摩洛哥海岸线上点缀着富庶的贸易枢纽与坚固要塞，如丹吉尔、萨菲和阿加迪尔。通过在马格里布沿岸建立一系列葡萄牙要塞，我们便能掌控当地货物流通，并向内陆的柏柏尔部落征收贡赋。\n\n维持这些孤立的沿海前哨站，需要与当地瓦塔斯王朝及萨阿德王朝持续抗衡。然而，这些据点带来的威望与战略价值无可估量。牢牢掌控摩洛哥海岸线，将确保葡萄牙始终维持西地中海与东大西洋海域的绝对制海权。"
 mission_por_pass_cape_bojador: "绕过博哈多尔角"
 mission_por_pass_cape_bojador_desc: "几个世纪以来，博哈多尔角一直被称为“恐惧之角”——由于关于海水沸腾、海怪出没和磁石遍布的古老传说，没有任何航海家敢越过此处。\n\n1434年，在恩里克王子的命令下，扈从吉尔·埃阿尼什终于打破了这一心理障碍，为探索西非海岸铺平了道路。  穿过博哈多尔角，证明了世界并未止于地平线之外，南方的海域同样可以航行。这使得我们的航海家得以绘制新大陆的地图，并与撒哈拉以南非洲的各族人民建立联系。这一壮举，正是地理大发现时代的真正起点。"
 mission_por_arguin: "阿尔金"
 mission_por_arguin_desc: "阿尔金岛位于今毛里塔尼亚海岸附近，1445年成为葡萄牙在非洲建立的首个设防贸易据点。设立此据点的目的是绕过沙漠商队，直接与当地商人交易金沙、象牙和奴隶。\n\n阿尔金岛是我们大西洋前哨与非洲内陆的重要纽带。通过强化该岛防御，我们既能确保财富持续流向王室，又能为卡拉维尔帆船提供安全港湾。这种沿海贸易堡垒模式，将成为我们未来全球帝国的标准蓝图。"
 mission_por_explore_cape_verde: "探索佛得角"
 mission_por_explore_cape_verde_desc: "佛得角群岛于15世纪60年代由安东尼奥·德·诺利和迪奧戈·戈梅斯等航海家发现，为大西洋中部提供了又一极具战略价值的地点。这些岛屿位置绝佳，既适合驶向几内亚湾的船只，也为横跨大西洋前往美洲的航程提供了准备基地。\n\n尽管群岛的火山地貌与半干旱气候给农业带来严峻挑战，但其地理位置无可替代。通过精细测绘群岛地形，我们为未来殖民奠定基础，确保这些岛屿能够支撑日益壮大的深水海军后勤需求。"
 mission_por_colony_of_cabo_verde: "佛得角殖民地"
 mission_por_colony_of_cabo_verde_desc: "在佛得角建立永久殖民地对于掌控大西洋中部至关重要。最初在里贝拉格兰德建立的定居点，将成为跨大西洋奴隶贸易的关键枢纽，也是艰苦的印度航线的重要补给站。\n\n热带农业的引入与深水港的建设将使该殖民地成为繁荣的商业中心。通过全面开发佛得角，我们将建立一个稳定持久的运营基地，连接欧洲、非洲与新大陆，确保葡萄牙对大西洋贸易风带的支配地位。"
 mission_por_a_question_of_hearts: "心之所向"
 mission_por_a_question_of_hearts_desc: "14世纪，佩德罗王子与伊内斯·德·卡斯特罗的爱情悲剧几乎使王国陷入内战分裂。这场内部王朝斗争，凸显了王室私利与国家政治需求间致命的紧张关系。\n\n我们必须化解这些历史积怨，以确保君主制的统一与稳定。通过纪念伊内斯、调和贵族各分裂派系，王室得以彰显其道德与政治权威。稳定的王室是国家稳固的核心，更是海外征战的基石。"
 mission_por_reform_our_court: "改革宫廷"
 mission_por_reform_our_court_desc: "随着我们的国家从一个伊比利亚半岛的边缘王国成长为全球帝国，行政管理的复杂性也必须随之提升。改革王室宫廷意味着将权力集中于君主周围，并大幅削弱传统上拥有土地的地区贵族的势力。\n\n通过建立专业、任人唯贤的官僚体系，我们能更有效地管理来自海外领地，确保各地都遵从王室律法，从而实现迅速、单方面的决策。"
 mission_por_maritime_focus: "聚焦海洋"
 mission_por_maritime_focus_desc: "葡萄牙的未来不在欧洲那充满血腥与纷争的土地上，而在广阔无垠的海洋之中。我们必须彻底调整国家战略重心，全力追求海上霸权——大力投资新型船舶设计，并在萨格里什等航海学院培养世界顶尖的航海家。\n\n通过确立海洋优先的国策，我们清醒地认识到：真正的国力源自全球贸易与地理探索，而非欧陆争霸。这场根本性的变革将使葡萄牙转型为航海家、制图师与探险家组成的国度，举国上下都将致力于揭开世界的地理奥秘与商业密码。"
 mission_por_grant_exploration_and_trade_rights: "探索与贸易权"
 mission_por_grant_exploration_and_trade_rights_desc: "持续探索带来的财政负担惊人地高昂，王室无法独自承担每一次充满风险的远航。通过授予富有的商人财团和军事修会探索与贸易垄断权，我们能够极大加快发现新大陆的步伐。\n\n这种由斐南多·戈麦斯在15世纪70年代开创的海事契约体系，极大地激发了民间革新精神与个人能动性。它使王室得以在不耗尽国库的前提下扩张影响力、测绘数千英里海岸线，从而在君主政权与商人阶层之间铸就了强大的伙伴关系。"
 mission_por_curtail_nobility_power: "削弱贵族权力"
 mission_por_curtail_nobility_power_desc: "传统的地主贵族常常抵制权力集中以及王室对海上贸易的新关注，视其为对其封建特权的威胁。为确保君权的绝对权威，我们必须毫不留情地削弱他们的力量，正如若昂二世国王处决叛乱的布拉干萨公爵时所做的那样。\n\n削弱大领主的权力，确保君主的意志成为这片土地上唯一的法律。这种内部巩固是帝国成功不可或缺的前提，它能防止毁灭性的内战，并确保国家的全部财富都用于实现我们的帝国雄心。"
 mission_por_portuguese_captaincies: "葡萄牙总督辖区"
 mission_por_portuguese_captaincies_desc: "The system of 'Donatary Captaincies' allows the crown to rapidly settle and govern vast, untamed overseas territories by delegating authority to loyal, wealthy subjects. These captains are responsible for defending, populating, and developing their lands at their own expense in exchange for hereditary rights and profits.\n\nFirst tested in the Atlantic islands and later implemented on a massive scale in Brazil, this system decentralizes the initial financial risk of colonization. It ensures a rapid Portuguese demographic presence in new lands and provides a robust framework for the spread of Portuguese law, faith, and culture."
 mission_por_rural_development: "农村发展"
 mission_por_rural_development_desc: "即便我们目光投向海洋，也绝不能忽视滋养我们的伊比利亚土地。发展乡村腹地需要改进轮作制度、扩大灌溉面积、增加耕地规模，以供养快速扩张的沿海城市。\n\n繁荣的乡村能提供支撑庞大海军舰队所必需的大量谷物、肉类与税收收入。通过对农村基础设施的投资，我们将确保葡萄牙本土始终是开展全球事业的高产且无比稳固的基地。"
 mission_por_ports_of_our_people: "人民的港口"
 mission_por_ports_of_our_people_desc: "里斯本、波尔图和拉各斯繁忙的港口是我们国家绝对的生命线。我们必须大力投资港口基础设施建设，建造大型深水码头、坚固的石料仓库以及像贝伦塔那样雄伟的海岸防御工事来保护它们。\n\n繁荣的港口体系能吸引从佛兰德斯到热那亚的外国商人，并支撑起庞大的国内造船业。通过使我们的港口成为欧洲最高效、最安全的港口，我们确保葡萄牙继续保持国际商贸的首要枢纽地位，有效连接东西方市场。"
 mission_por_lumber_for_ship_construction: "造船木材"
 mission_por_lumber_for_ship_construction_desc: "一支遍布全球的海军需要源源不断的高品质木材供应。我们必须精心管理国内森林，尤其是迪尼斯国王栽种的莱里亚松林，以确保获得建造本时代标志性坚固卡拉维尔帆船与巨型卡拉克帆船所需的特种木材。\n\n造船业是本时代最具战略意义的产业，必须全力守护。保障木材持续稳定的安全供应，才能让里贝拉达斯瑙斯皇家造船厂全力运转，维系我们全球霸权的根本基石——绝对的海上优势。"
 mission_por_dried_fruit_of_the_algarve: "阿尔加维干果"
 mission_por_dried_fruit_of_the_algarve_desc: "阿尔加维阳光普照的南部区域以大量出产无花果、杏仁和葡萄干而闻名。这些干果不仅是北欧珍贵的奢侈品贸易商品，更是我们水手在多年海上航行中绝对必需、不易腐坏的补给品。\n\n阿尔加维物产的广泛出口为南部省份带来了巨额财富，并巩固了我们与英格兰和佛兰德的历史贸易纽带。通过主导这一农业利基市场，我们展现了葡萄牙经济的多样性及其直接支持海上后勤保障的能力。"
 mission_por_seis_marias_law: "土地分配法"
 mission_por_seis_marias_law_desc: "《土地分配法》最初由费迪南德一世国王于1375年颁布，旨在应对黑死病后严重的农业危机和劳动力短缺问题。该法令强制规定所有可耕地必须由所有者积极耕作，否则将被王室没收并重新分配。\n\n通过严格执行《土地分配法》，王室以高度直接的方式参与国家经济管理，大幅减少了贵族囤积土地的现象。这项法律确保国家保持农业自给自足，有能力供养我们舰队中成千上万的士兵。"
 mission_por_douro_river_wine: "杜罗河葡萄酒"
 mission_por_douro_river_wine_desc: "杜罗河陡峭多石的梯田河岸出产着世界上最醇厚、最优质的葡萄酒。这一葡萄种植产业是我国北方经济的重要基石，而波尔图市则是其利润丰厚的出口贸易主要枢纽。\n\n葡萄牙葡萄酒在海外市场备受追捧，已成为重要的外交与经济工具。通过严格规范生产质量并确保海上贸易航线的安全，我们将杜罗河谷转变为国家巨额财富的源泉，使之成为葡萄牙卓越农业的永恒象征。"
 mission_por_supply_our_navies: "供应海军"
 mission_por_supply_our_navies_desc: "Maintaining a global navy operating across three oceans requires incredibly complex logistics. We must ensure a massive, steady supply of hardtack (biscoito), salted meat, wine, and freshwater for our sailors. Establishing a vast network of heavily guarded supply depots is a monumental administrative task.\n\nWithout proper, reliable supplies, our ambitious voyages of discovery would swiftly end in mutiny and disaster. By professionalizing our naval logistics and utilizing our Atlantic islands as waystations, we allow our fleets to remain at sea for unprecedented periods, projecting Portuguese influence to the furthest corners of the globe."
 mission_por_discover_the_new_world: "Discover the New World"
 mission_por_discover_the_new_world_desc: "While our primary focus has historically been the eastern route to India, the vast Atlantic holds massive, uncharted secrets to the west. Expeditions like the one led by Pedro Álvares Cabral in 1500 have revealed a massive, lush landmass—Brazil. This discovery radically expands the horizons of our empire.\n\nThe New World is a land of incredible mystery and untold natural opportunity. We must aggressively map its coastlines and establish contact with its diverse indigenous peoples. By formally claiming these lands under the papal authority of the Treaty of Tordesillas, we ensure Portugal has a major, unchallengeable stake in the Americas."
 mission_por_voyage_to_greenland: "Voyage to Greenland"
 mission_por_voyage_to_greenland_desc: "Our boldest explorers are looking to the freezing northern routes once used by the Norsemen centuries ago. Venturing into the harsh, icy waters of the North Atlantic is incredibly dangerous, but it is necessary to chart the full extent of the world's oceans and search for northern passages.\n\nWhile the frozen lands of Greenland may seem inhospitable and devoid of spices, they offer a completely new frontier for our maritime ambitions. Charting these waters proves that Portuguese navigators are unparalleled in their skill, capable of conquering both the sweltering equator and the freezing arctic."
 mission_por_portuguese_greenland: "Portuguese Greenland"
 mission_por_portuguese_greenland_desc: "Though incredibly harsh and desolate, establishing a permanent Portuguese foothold in Greenland serves as a vital, strategic waypoint in the far north. It expands the absolute northern limits of our maritime reach and allows us to assert dominance over the lucrative northern whaling and fishing grounds.\n\nMaintaining a settlement here requires immense resilience and constant resupply from the mainland. However, it denies our northern European rivals a monopoly on these waters and cements the Portuguese Empire's reputation as a truly global power that spans from pole to pole."
 mission_por_labrador_and_newfoundland: "Labrador and Newfoundland"
 mission_por_labrador_and_newfoundland_desc: "The daring voyages of the Corte-Real brothers in the early 16th century have uncovered massive northern lands named Terra Nova, rich in dense timber and incredibly abundant codfish. Claiming these territories strengthens our Atlantic resource networks and feeds our growing population.\n\nThe Grand Banks offer a virtually inexhaustible supply of fish, which is salted and shipped back to Europe, becoming a staple of the Portuguese diet. By establishing seasonal fishing camps and claiming the coastlines of Labrador, we integrate the wealth of the North Atlantic directly into the Portuguese economy."
 mission_por_portuguese_great_canada: "Portuguese Great Canada"
 mission_por_portuguese_great_canada_desc: "Consolidating our disparate claims in the northern reaches of the Americas expands our global reach and directly challenges the colonial ambitions of the French and English. Portuguese Canada stands as a lasting testament to our explorers' willingness to brave the freezing, iceberg-laden seas.\n\nBy mapping the Gulf of St. Lawrence and establishing trade relations with the local native tribes for furs and timber, we create a highly profitable northern colony. This ensures that the Portuguese flag flies proudly over the snow-covered forests of the north, just as it does over the tropical beaches of the south."
 mission_por_settle_in_brazil: "Settle in Brazil"
 mission_por_settle_in_brazil_desc: "Discovery is merely the first step; we must now actively settle the vast Brazilian coast to prevent French smugglers and other rivals from gaining a foothold. By establishing the first colonial towns, like São Vicente, we turn this 'Land of the Holy Cross' into a tightly controlled part of the empire.\n\nEarly settlement relies heavily on the extraction of valuable pau-brasil (brazilwood), used for making red dye in Europe. Through the courage of pioneers and the backing of the crown, this initial settlement marks the true beginning of a centuries-long, highly lucrative Portuguese demographic and cultural presence in South America."
 mission_por_rio_da_prata: "Rio da Prata"
 mission_por_rio_da_prata_desc: "The massive estuary of the Rio da Prata, or River of Silver, is a highly strategic gateway to the deep interior of South America. It is a highly contested region where the colonial interests of Portugal and Spain constantly clash. We must explore and settle the northern banks to protect our claims.\n\nControl of the Rio da Prata allows us to monitor the movement of vast quantities of silver flowing from the Spanish mines of Potosí. It establishes a firm southern limit for our Brazilian territories, requiring constant military vigilance to maintain Portuguese sovereignty against Spanish incursions."
 mission_por_colony_of_brazil: "Colony of Brazil"
 mission_por_colony_of_brazil_desc: "From a loose collection of scattered, struggling captaincies, we must forge a unified and highly productive Colony of Brazil. The introduction of sugarcane from Madeira and the establishment of massive engenhos (sugar mills) transforms the landscape and creates an economic engine of unimaginable wealth.\n\nThis agricultural boom requires a massive workforce, leading to the tragic but economically transformative expansion of the transatlantic slave trade. Brazil rapidly evolves into the crown jewel of our empire, providing a steady, massive stream of sugar, tobacco, and eventually gold to the mother country."
 mission_por_governorate_general: "Governorate General"
 mission_por_governorate_general_desc: "To effectively manage the immense scale and growing wealth of our American holdings, the decentralized captaincy system is no longer sufficient. We must establish a central Governorate General, famously initiated by Tomé de Sousa in 1549, with a grand capital at Salvador da Bahia.\n\nThis centralized administration oversees military defense, standardizes justice, and heavily regulates trade across all Brazilian captaincies. It brings the full authority of the King of Portugal directly to the shores of the New World, ensuring that the colony can defend itself against pirate attacks and native uprisings."
 mission_por_portuguese_great_brazil: "Portuguese Great Brazil"
 mission_por_portuguese_great_brazil_desc: "From the dense jungles of the Amazon basin to the plains of the Prata, Brazil has grown into a vast, incredibly prosperous, and continent-spanning territory. It is the ultimate jewel in our colonial crown, a breathtaking testament to Portuguese daring, enterprise, and endurance.\n\nA 'Great Brazil' dominates the entire South Atlantic, deeply integrating the economies of South America, Africa, and Europe. Its massive exports fund the lavish building projects of the monarchy and ensure that Portugal remains an economic superpower long after the initial profits of the Asian spice trade begin to wane."
 mission_por_explore_the_west_african_coast: "Explore the West African Coast"
 mission_por_explore_the_west_african_coast_desc: "The systematic, grueling mapping of the West African coast is a monumental task that spans decades. From the mouth of the Senegal River to the humid Gulf of Guinea, our brave navigators must meticulously document every bay, river mouth, and local tribe they encounter.\n\nThis geographic knowledge is the ultimate key to unlocking the legendary wealth of the African interior. Exploration here is not just about cartography; it is about finding new, highly lucrative opportunities for trade and ensuring that Portugal completely monopolizes the European approach to the African continent."
 mission_por_guinea_bissau: "Guinea-Bissau"
 mission_por_guinea_bissau_desc: "The labyrinthine rivers and estuaries of Guinea offer direct, navigable access to the powerful local kingdoms of the interior. Establishing a permanent presence here, such as in Cacheu or Bissau, secures a steady flow of ivory, wax, and slaves directly to our merchant ships.\n\nNavigating these treacherous, disease-ridden waters is incredibly dangerous, but the commercial rewards are vast. By fortifying our coastal influence in Guinea, we create a vital stepping stone between our Cape Verdean colonies and the gold-rich territories further south along the coast."
 mission_por_gulf_of_guinea: "Gulf of Guinea"
 mission_por_gulf_of_guinea_desc: "Entering the stifling heat of the Gulf of Guinea brings us to the ultimate crossroads of West African trade. Known to early explorers as the 'Mina' region, here we can completely dominate the incredibly lucrative flow of gold, ivory, and slaves flowing from the deep interior to the coast.\n\nThis region is fiercely competitive, with local rulers demanding respect and high prices. However, by establishing a firm commercial and military presence in the Gulf, we guarantee that the vast majority of West Africa's wealth flows directly into the holds of Portuguese caravels."
 mission_por_settle_anomansah: "Settle Anomansah"
 mission_por_settle_anomansah_desc: "The coastal area of Anomansah, soon to be known globally as Elmina, possesses a highly strategic natural harbor located perilously close to the richest gold-producing regions of the Akan forest. We must immediately establish a permanent, heavily armed settlement here to anchor our presence.\n\nSettling Anomansah is a bold statement of our absolute intent to remain in the region permanently. It will serve as the primary staging ground for our merchants and a base for our naval patrols, ensuring that no rival European interloper can access the gold of the coast."
 mission_por_elmina_trading_post: "Elmina Trading Post"
 mission_por_elmina_trading_post_desc: "The construction of the massive Castle of São Jorge da Mina in 1482 by Diogo de Azambuja is a staggering landmark in military and commercial architecture. Pre-fabricated in Portugal and assembled on site, this formidable stone fortress serves as the heavily armed headquarters for our entire African trade.\n\nThe 'Feitoria da Mina' is far more than just a warehouse; it is the absolute center of Portuguese administration in West Africa. By garrisoning this post, we violently enforce our monopoly on the gold trade, protect our merchants from local attacks, and project unmatched royal power."
 mission_por_sao_tome_and_fernando_po: "São Tomé and Fernando Pó"
 mission_por_sao_tome_and_fernando_po_desc: "The uninhabited equatorial islands of São Tomé and Fernando Pó, discovered in the 1470s, possess incredibly fertile volcanic soil and a tropical climate perfect for sugarcane. Settling them creates a highly profitable, self-sustaining colonial cluster in the heart of the Gulf of Guinea.\n\nThese islands quickly become the center of a massive plantation economy utilizing enslaved labor from the mainland. Furthermore, their strategic location makes them vital, secure naval stations for ships resupplying before attempting the arduous journey south toward the Cape of Good Hope."
 mission_por_explore_kongo_coastline: "Explore Kongo Coastline"
 mission_por_explore_kongo_coastline_desc: "Sailing south past the massive, turbulent mouth of the Zaire (Congo) River brings us into direct contact with the powerful Kingdom of Kongo. This momentous discovery by Diogo Cão opens up entirely new, massive opportunities for diplomacy, religious conversion, and trade in Central Africa.\n\nUnlike many other coastal encounters, the Manikongo (King of Kongo) shows a profound interest in an alliance and even conversion to Christianity. We must carefully explore this coastline and cultivate this unique diplomatic relationship, which promises to yield immense wealth in slaves and copper."
 mission_por_colony_of_angola: "Colony of Angola"
 mission_por_colony_of_angola_desc: "Further south of Kongo lies the region of Ndongo. By establishing a formal colony centered around the heavily fortified port of Luanda (founded in 1575), we can project military power inland and directly control the massive, highly lucrative slave trade of the region.\n\nAngola will rapidly become a cornerstone of our South Atlantic trade network, inextricably linked to the labor demands of the sugar plantations in Brazil. The military campaigns to secure the interior are brutal and lengthy, but the economic value of Angola to the empire is incalculable."
 mission_por_round_the_cape: "Round the Cape"
 mission_por_round_the_cape_desc: "In 1488, Bartolomeu Dias achieved the impossible by surviving massive storms to round the southern tip of Africa. Originally named the Cape of Storms, King John II brilliantly renamed it the Cape of Good Hope, as it proved beyond doubt that a direct sea route to India actually existed.\n\nMastering the treacherous Cape requires a profound understanding of the 'Volta do Mar', swinging deep into the South Atlantic to catch the westerlies. By conquering this geographic barrier, we have effectively broken the Venetian and Mamluk monopoly on eastern trade, changing world history forever."
 mission_por_island_of_st_lawrence: "Island of St. Lawrence"
 mission_por_island_of_st_lawrence_desc: "The massive island of Madagascar, initially named the Island of St. Lawrence by our explorers, sits squarely along our newfound path to the East Indies. Exploring its vast, rugged coastlines provides potential alternative sailing routes and access to unique local resources.\n\nWhile Madagascar is notoriously difficult to navigate and its interior fiercely independent, its sheer size and strategic location in the western Indian Ocean cannot be ignored. Establishing outposts here provides safe havens for ships battered by the Cape storms before they cross the open ocean to India."
 mission_por_east_african_islamic_states: "East African Islamic States"
 mission_por_east_african_islamic_states_desc: "The Swahili coast is dominated by a highly sophisticated network of wealthy Islamic city-states, including Kilwa, Mombasa, and Malindi. These cities have controlled the incredibly lucrative trade of gold, ivory, and slaves between the African interior and the Indian Ocean for centuries.\n\nOur sudden arrival severely disrupts this ancient trade network. We must establish our absolute authority over these states—whether through peaceful alliances, as with Malindi, or brutal naval bombardment and conquest, as with Mombasa—to secure the vital 'India Run' for our fleets."
 mission_por_protect_fleets_in_kilwa: "Protect Fleets in Kilwa"
 mission_por_protect_fleets_in_kilwa_desc: "Once the powerful island city of Kilwa is secured and its sultan subjugated, it becomes a vital, heavily fortified sanctuary for Portuguese ships on the India Run. Maintaining a massive naval presence here protects our richly laden merchantmen from hostile local forces and opportunistic pirates.\n\nKilwa's excellent harbor and access to fresh supplies make it a cornerstone of our naval logistics in the western Indian Ocean. By heavily garrisoning this city, we ensure that our fleets can repair, refit, and wait for the shifting monsoon winds in absolute safety."
 mission_por_conquer_masquat: "Conquer Masquat"
 mission_por_conquer_masquat_desc: "Securing the heavily fortified port of Masqat (Muscat) gives us a firm, unshakeable foothold on the harsh Arabian Peninsula. Conquered by Albuquerque in 1507, it is absolutely essential for monitoring the entrance to the Persian Gulf and protecting our fleets from Omani attacks.\n\nMasqat serves as a forward operating base for our naval squadrons patrolling the Arabian Sea. Its capture severely weakens local Arab naval power and demonstrates to the entire Middle East that Portuguese naval artillery is unmatched, ensuring our total dominance over the regional waters."
 mission_por_control_the_strait: "Control the Strait"
 mission_por_control_the_strait_desc: "The island of Hormuz sits at the entrance to the Persian Gulf, acting as one of the world's most vital maritime chokepoints. By capturing it, we control the flow of immense wealth from Persia and effectively cut off the traditional trade routes that fund our Ottoman and Mamluk rivals.\n\nThe conquest of Hormuz by Albuquerque places the gateway to the Middle Eastern silk and horse trade squarely in Portuguese hands. We must build a massive, impregnable fortress here to levy crippling taxes on all passing ships, generating staggering wealth for the Estado da Índia."
 mission_por_beluchistan_coast: "Beluchistan Coast"
 mission_por_beluchistan_coast_desc: "Extending our influence along the rugged, unforgiving coast of Beluchistan secures the northern approaches to the Indian Ocean. This desolate coastline serves as a vital strategic bridge linking our operations in the Persian Gulf with our rapidly expanding holdings in India.\n\nBy mapping these shores and establishing small coastal observation posts, we ensure that no rival fleet can move between Persia and India without our immediate knowledge. It solidifies the Arabian Sea as an exclusively Portuguese lake, safe for our heavily laden carracks."
 mission_por_into_sindh: "Into Sindh"
 mission_por_into_sindh_desc: "Pushing our naval and commercial operations into the Indus Valley region of Sindh expands our reach into the northern subcontinent. This strategic depth offers access to vast new markets for textiles and reinforces our dominance in the northern Arabian Sea.\n\nOperating in Sindh brings us into contact with powerful local rulers and the edges of the Mughal Empire. By establishing highly profitable trade agreements or utilizing naval blockades, we ensure that the wealth of the Indus flows out to the sea on Portuguese terms."
 mission_por_conquer_al_qatif: "Conquer Al Qatif"
 mission_por_conquer_al_qatif_desc: "Al-Qatif, located on the Arabian coast of the Persian Gulf, is a famously wealthy center of trade and highly lucrative pearl fishing. Capturing this oasis city expands our terrestrial influence in the Gulf and secures immensely valuable local resources for the crown.\n\nDominating Al-Qatif allows us to monitor and heavily tax the movement of goods between the deep Arabian Peninsula and Persia. It provides a highly secure base for our operations in the central Gulf, ensuring that local Arab and Persian trade is conducted strictly under Portuguese supervision."
 mission_por_conquer_qatar: "Conquer Qatar"
 mission_por_conquer_qatar_desc: "Establishing absolute authority over the Qatar peninsula secures the vital shipping lanes leading to our fortress at Hormuz. It completes our unbroken chain of coastal outposts and naval stations in the central Persian Gulf, leaving no safe haven for smugglers or enemy fleets.\n\nWhile the peninsula itself may lack the immense wealth of larger cities, its geographic location is strategically invaluable. By conquering Qatar, we deny our enemies any potential staging ground and ensure that our total control of the Persian Gulf trade remains entirely unchallenged."
 mission_por_portuguese_great_arabia: "Portuguese Great Arabia"
 mission_por_portuguese_great_arabia_desc: "The realization of a 'Portuguese Great Arabia' involves establishing an ironclad network of fortresses and heavily armed trading posts along the entire coastline of the Arabian Peninsula. From the Red Sea to the Persian Gulf, we aim to be the absolute, unquestioned masters of the region.\n\nThis mission represents the zenith of our military and commercial influence in the Middle East. By securing Great Arabia, we permanently protect the 'India Run' from any Ottoman interference and ensure that the treasures of the East are safely funneled exclusively to Lisbon."
 mission_por_colony_of_mozambique: "Colony of Mozambique"
 mission_por_colony_of_mozambique_desc: "The Island of Mozambique, with its massive Fort São Sebastião, is the absolute lynchpin of our East African operations. Developing this colony provides a vital, heavily defended link between our African and Indian territories, serving as the primary wintering port for the India Armadas.\n\nMozambique is also the gateway to the Zambezi River and the legendary gold mines of Monomotapa in the deep interior. By firmly establishing this colony, we ensure a steady supply of gold to fund our Asian wars and a safe harbor to repair ships battered by the Cape storms."
 mission_por_visit_interesting_ports: "Visit Interesting Ports"
 mission_por_visit_interesting_ports_desc: "Our explorers and diplomats must meticulously document and establish contact with the key harbors of the Swahili coast and the Indian Ocean. Identifying friendly ports, such as our steadfast ally Malindi, is absolutely crucial for the survival of fleets making the months-long ocean crossings.\n\nThis diplomatic and exploratory mission lays the groundwork for our future empire. By understanding local politics and securing reliable sources of fresh water, citrus, and pilotage, we reduce the horrific mortality rates of our sailors and guarantee the success of future armadas."
 mission_por_path_to_calicut: "Path to Calicut"
 mission_por_path_to_calicut_desc: "Vasco da Gama's monumental arrival in Calicut in 1498 forever changed the course of global history. We must decisively secure this path across the Arabian Sea to establish direct, unmediated contact with the richest spice markets on earth, bypassing the Venetian monopoly entirely.\n\nSecuring the path to Calicut requires mastering the seasonal monsoon winds and projecting overwhelming naval force. The Zamorin of Calicut and local Arab merchants will violently resist our intrusion, meaning our path must be paved with both shrewd diplomacy and the devastating firepower of our galleons."
 mission_por_conquer_the_maldives: "Conquer the Maldives"
 mission_por_conquer_the_maldives_desc: "The Maldives, a sprawling archipelago of atolls in the central Indian Ocean, are a vital crossroads for trans-oceanic trade. Controlling these islands allows us to monitor and intercept shipping moving between Africa, the Red Sea, India, and the distant shores of Southeast Asia.\n\nThe Maldives are uniquely valuable for their production of cowrie shells, heavily used as currency in West Africa, and coir rope, essential for shipbuilding. Conquering these islands provides a massive logistical advantage and ensures no enemy fleet can cross the ocean without our knowledge."
 mission_por_foothold_in_india: "Foothold in India"
 mission_por_foothold_in_india_desc: "To effectively manage our desired spice monopoly, we cannot rely on temporary voyages; we must establish a permanent, heavily fortified administrative center on the Indian mainland. Capturing a secure port, such as Goa in 1510, will become the unshakeable foundation of the Estado da Índia.\n\nThis foothold provides a secure base for our Viceroys, a place to safely warehouse our spices, and massive shipyards to repair our fleets. It marks the transition from being mere foreign explorers to establishing a permanent, ruling European power on the Asian continent."
 mission_por_west_indian_influence: "Estado da India"
 mission_por_west_indian_influence_desc: "The western Malabar and Konkan coasts of India are densely dotted with incredibly wealthy states and busy ports. By establishing treaties with friendly rulers and violently capturing key ports like Diu, Daman, and Cochin, we rapidly expand our diplomatic and commercial hegemony.\n\nExpanding our influence ensures we have exclusive access to a massive variety of goods, primarily pepper, and a network of local allies to support us against the massive armies of the Deccan Sultanates. It turns the western coast into a highly profitable region where Portuguese Cartazes (naval passes) are law."
 mission_por_trade_in_the_bengal_bay: "Trade in the Bengal Bay"
 mission_por_trade_in_the_bengal_bay_desc: "The vast Bay of Bengal offers incredible wealth, including incredibly fine textiles, saltpeter, and precious stones. Establishing trading posts in Bengal, such as at Chittagong or Hooghly, diversifies our trade portfolio heavily and expands our reach to the eastern coast of the subcontinent.\n\nTrading in the Bay of Bengal requires us to compete with deeply entrenched local merchant guilds and navigate the complex politics of the Bengal Sultanate. However, the potential for staggering profit is immense, completing our commercial encirclement of the Indian subcontinent."
 mission_por_indian_base: "Indian Base"
 mission_por_indian_base_desc: "Our initial foothold must be rapidly developed into a massive, heavily fortified base of operations, the undisputed capital of our eastern empire. Goa, 'the Rome of the East,' must be filled with grand cathedrals, sprawling administrative palaces, and impregnable walls.\n\nThis base becomes the logistical and spiritual heart of the empire. From here, the Viceroy can project massive naval power across the entire Indian Ocean, from the coast of Mozambique to the distant shores of Malacca. Maintaining this base is the absolute key to our continued dominance in Asia."
 mission_por_portuguese_east_india_company: "Portuguese East India Company"
 mission_por_portuguese_east_india_company_desc: "Consolidating our massive, wildly diverse Indian holdings under a cohesive, highly structured maritime administration ensures our long-term dominance. The Estado da Índia will govern our eastern territories with overwhelming military strength and fervent religious faith.\n\nThis centralized organization maximizes the brutal efficiency of our spice monopoly and coordinates the defense of our thousands of miles of vital sea lanes. It transforms a scattered collection of forts into a truly terrifying maritime empire capable of fighting off any Asian or European challenger."
 mission_por_interest_in_ceylon: "Interest in Ceylon"
 mission_por_interest_in_ceylon_desc: "The teardrop-shaped island of Ceylon (Sri Lanka) is globally famous as the world's primary source of the finest cinnamon. Securing the maritime routes to this island and establishing a strong presence at Colombo is absolutely essential for completing our incredibly lucrative spice monopoly.\n\nThe political landscape of Ceylon is deeply fractured among rival kingdoms. By intervening in these local wars with our superior military technology, we can easily manipulate the island's politics to ensure that all cinnamon harvested flows exclusively into Portuguese galleons."
 mission_por_agreement_with_kotte: "Agreement with Kotte"
 mission_por_agreement_with_kotte_desc: "Through a masterful combination of shrewd diplomacy and overwhelming naval pressure, we must secure a highly favorable agreement with the Kingdom of Kotte. This treaty will establish our exclusive, unquestioned rights to purchase and export the cinnamon of Ceylon.\n\nBy turning the King of Kotte into a vassal or heavily dependent ally of the Portuguese Crown, we effectively secure the island's wealth without the massive cost of a full terrestrial conquest. This agreement guarantees a massive, reliable stream of revenue for the Estado da Índia."
 mission_por_control_the_strait_of_malacca: "Control the Strait of Malacca"
 mission_por_control_the_strait_of_malacca_desc: "The city of Malacca is the vital 'clasp' of the Far Eastern trade, the precise chokepoint where the heavily laden ships of China, India, and the Spice Islands meet. Capturing this city in 1511 places the gateway to the Pacific Ocean firmly in Portuguese hands.\n\nControl of Malacca allows us to dominate all trade flowing between the Indian Ocean and the South China Sea. We must build the massive A Famosa fortress to defend the city, ensuring that any merchant wishing to trade in the region must pay exorbitant taxes to the Portuguese Crown."
 mission_por_the_spice_islands: "The Spice Islands"
 mission_por_the_spice_islands_desc: "The Moluccas, hidden deep in the Indonesian archipelago, are the only place on earth where the incredibly valuable cloves and nutmeg grow. By navigating these treacherous waters and reaching Ternate and Tidore, we secure the ultimate prize of the Age of Discovery.\n\nThe competition for these islands is incredibly fierce, with Spanish expeditions attempting to claim them from the Americas. We must build strong fortresses and maintain a massive naval presence to aggressively protect our interests, securing the source of the immense wealth that fuels our Golden Age."
 mission_por_chinese_trading_ports: "Chinese Trading Ports"
 mission_por_chinese_trading_ports_desc: "The Ming Empire of China is a land of unimaginable wealth, producing the world's finest silk and porcelain. By establishing a permanent, officially sanctioned base at Macau in 1557, we link the massive markets of China with the rest of our global trade network.\n\nMacau rapidly becomes one of the most wildly profitable ports in human history, serving as the exclusive middleman for the highly lucrative silver-for-silk trade between Japan and China. Managing our relationship with the Ming emperors requires delicate diplomacy, yielding staggering profits."
 mission_por_the_spice_must_flow: "The Spice Must Flow"
 mission_por_the_spice_must_flow_desc: "Our ultimate, century-long objective—the total, monopolistic control of the global spice trade—is now complete. From the humid jungles of the Moluccas to the bustling docks of Lisbon, every step of the journey is violently secured by our ships and impregnable fortresses.\n\nAs long as the spice flows exclusively under our banner, Portugal will remain the richest and most powerful maritime nation in the world. This endless river of wealth allows us to build grand monuments, support the Renaissance arts, and ensure the Portuguese legacy endures forever."
 mission_por_portuguese_empire: "Quinto Império"
 mission_por_portuguese_empire_desc: "From the dense rainforests of the Americas to the distant shores of the Far East, Portugal stands triumphant as the first truly global empire in human history. The staggering wealth of three oceans flows directly into Lisbon, cementing our eternal legacy as masters of the sea.\n\nWe have completely rewritten the map of the world, connecting disparate continents and reshaping global commerce. The Portuguese Empire is a breathtaking monument to the courage of our explorers, the brilliance of our navigators, and the unmatched power of our armadas."
 STATIC_MODIFIER_NAME_por_portuguese_excellency: "Portuguese Excellency"
 STATIC_MODIFIER_DESC_por_portuguese_excellency: "This represents the exceptional naval and military prowess that allowed Portugal to secure its independence and forge a global empire."
 STATIC_MODIFIER_NAME_por_iberian_conquest: "Iberian Conquest"
 STATIC_MODIFIER_DESC_por_iberian_conquest: "A legacy of the Reconquista, this reflects the crown's success in consolidating and integrating territories across the peninsula."
 STATIC_MODIFIER_NAME_por_funchal_sugar_plantations: "Funchal Sugar Plantations"
 STATIC_MODIFIER_DESC_por_funchal_sugar_plantations: "The introduction of 'white gold' to Madeira transformed Funchal into a leading center of global sugar production in the 15th century."
 STATIC_MODIFIER_NAME_por_greater_potugal: "Greater Portugal"
 STATIC_MODIFIER_DESC_por_greater_potugal: "The unification of the mainland and Atlantic islands strengthens the crown’s legitimacy and administrative efficiency."
 STATIC_MODIFIER_NAME_por_canary_dyes: "Canary Island Dyes"
 STATIC_MODIFIER_DESC_por_canary_dyes: "Control over the Canary Islands provides access to valuable orchil and other dyes highly prized in European textile markets."
 STATIC_MODIFIER_NAME_por_portuguese_missionaries: "Portuguese Missionaries"
 STATIC_MODIFIER_DESC_por_portuguese_missionaries: "The zealous efforts of the Padroado Real ensured the rapid spread of the Catholic faith across four continents."
 STATIC_MODIFIER_NAME_por_colonial_stepping_stone: "Colonial Stepping Stone"
 STATIC_MODIFIER_DESC_por_colonial_stepping_stone: "Strategic Atlantic outposts serve as vital supply stations, drastically extending the reach of our maritime expeditions."
 STATIC_MODIFIER_NAME_por_royal_court_strengthened: "Royal Court Strengthened"
 STATIC_MODIFIER_DESC_por_royal_court_strengthened: "The centralization of power around the monarch ensures a more stable and unified governance within the realm."
 STATIC_MODIFIER_NAME_por_burghers_strengthened: "Burghers Strengthened"
 STATIC_MODIFIER_DESC_por_burghers_strengthened: "Empowering the merchant class of Lisbon and Porto drives the commercial prosperity that sustains our overseas ventures."
 STATIC_MODIFIER_NAME_por_nobility_reigned_in: "Nobility Reigned In"
 STATIC_MODIFIER_DESC_por_nobility_reigned_in: "By curtailing the privileges of the landed lords, the King ensures their service is directed solely to the interests of the state."
 STATIC_MODIFIER_NAME_por_subjects_represented: "Subjects Represented"
 STATIC_MODIFIER_DESC_por_subjects_represented: "Treating our subject territories with dignity and representation fosters enduring loyalty to the Portuguese Crown."
 STATIC_MODIFIER_NAME_por_rural_development: "Rural Development"
 STATIC_MODIFIER_DESC_por_rural_development: "Investment in the agricultural heartland ensures the kingdom can sustain its growing urban and naval populations."
 STATIC_MODIFIER_NAME_por_ports_of_our_people: "Ports of Our People"
 STATIC_MODIFIER_DESC_por_ports_of_our_people: "Modernized harbors serve as the vibrant lifeblood of the nation, facilitating the exchange of global wealth."
 STATIC_MODIFIER_NAME_por_algarve_dried_fruit: "Algarve Dried Fruit"
 STATIC_MODIFIER_DESC_por_algarve_dried_fruit: "The sunny Algarve provides essential non-perishable exports, such as figs and raisins, vital for both trade and naval rations."
 STATIC_MODIFIER_NAME_por_seis_marias_law: "Sesmarias Law"
 STATIC_MODIFIER_DESC_por_seis_marias_law: "The 1375 law mandates the active cultivation of land, ensuring national self-sufficiency through the production of raw materials."
 STATIC_MODIFIER_NAME_por_douro_river_wine: "Douro River Wine"
 STATIC_MODIFIER_DESC_por_douro_river_wine: "The terraced vineyards of the Douro produce world-renowned wines that are a cornerstone of our northern trade."
 STATIC_MODIFIER_NAME_por_pine_forests_for_naval_construction: "Naval Pine Forests"
 STATIC_MODIFIER_DESC_por_pine_forests_for_naval_construction: "The Pine Forest of Leiria, planted by King Denis, provides the essential timber required for our legendary shipyards."
 STATIC_MODIFIER_NAME_por_exploration_fleets: "Exploration Fleets"
 STATIC_MODIFIER_DESC_por_exploration_fleets: "Innovative ship designs and the support of the Order of Christ allow us to maintain expeditions at a lower cost."
 STATIC_MODIFIER_NAME_por_efficient_walrus_hunting: "Efficient Walrus Hunting"
 STATIC_MODIFIER_DESC_por_efficient_walrus_hunting: "Explorations into the North Atlantic have opened lucrative markets for ivory and other arctic resources."
 STATIC_MODIFIER_NAME_por_distant_trades: "Distant Trades"
 STATIC_MODIFIER_DESC_por_distant_trades: "Our mastery of the 'Volta do Mar' allows Portuguese merchants to operate across unprecedented distances."
 STATIC_MODIFIER_NAME_por_canadian_trade_monopoly: "Canadian Trade Monopoly"
 STATIC_MODIFIER_DESC_por_canadian_trade_monopoly: "Exclusive rights to the fisheries and resources of the North Atlantic strengthen our influence in European markets."
 STATIC_MODIFIER_NAME_por_first_brazilian_colonies: "First Brazilian Colonies"
 STATIC_MODIFIER_DESC_por_first_brazilian_colonies: "Early settlement efforts in Terra de Santa Cruz encourage a steady migration of pioneers to the New World."
 STATIC_MODIFIER_NAME_por_colonial_presence: "Colonial Presence"
 STATIC_MODIFIER_DESC_por_colonial_presence: "A robust network of overseas settlements ensures Portuguese maritime dominance across the Atlantic and beyond."
 STATIC_MODIFIER_NAME_por_colonial_military_integration: "Colonial Military Integration"
 STATIC_MODIFIER_DESC_por_colonial_military_integration: "The utilization of colonial resources and manpower greatly bolsters the kingdom's military capacity."
 STATIC_MODIFIER_NAME_por_great_brazil: "Great Brazil"
 STATIC_MODIFIER_DESC_por_great_brazil: "A unified and prosperous Brazil remains a steadfast and loyal pillar of the Portuguese Empire."
 STATIC_MODIFIER_NAME_por_elmina_trading_post: "Elmina Trading Post"
 STATIC_MODIFIER_DESC_por_elmina_trading_post: "The Castle of São Jorge da Mina serves as the impregnable headquarters for our lucrative West African gold trade."
 STATIC_MODIFIER_NAME_por_luanda_trading_post: "Luanda Trading Post"
 STATIC_MODIFIER_DESC_por_luanda_trading_post: "Founded in 1575, Luanda acts as a vital commercial hub linking the African interior with the plantations of Brazil."
 STATIC_MODIFIER_NAME_por_exploration_focus: "Exploration Focus"
 STATIC_MODIFIER_DESC_por_exploration_focus: "A national commitment to maritime discovery accelerates our mapping of the world's most remote corners."
 STATIC_MODIFIER_NAME_por_saffron_in_madagascar: "Madagascar Saffron"
 STATIC_MODIFIER_DESC_por_saffron_in_madagascar: "Early contact with the Island of St. Lawrence has secured access to unique local spices and resources."
 STATIC_MODIFIER_NAME_por_east_african_holdings: "East African Holdings"
 STATIC_MODIFIER_DESC_por_east_african_holdings: "Our string of outposts along the Swahili coast secures the vital 'India Run' for our trade armadas."
 STATIC_MODIFIER_NAME_por_kilwa_fortress: "Kilwa Fortress"
 STATIC_MODIFIER_DESC_por_kilwa_fortress: "The fortification of Kilwa ensures Portuguese control over the western Indian Ocean and its rich trade routes."
 STATIC_MODIFIER_NAME_por_prosperous_pearl_fishers: "Prosperous Pearl Fishers"
 STATIC_MODIFIER_DESC_por_prosperous_pearl_fishers: "Control over the Arabian coast provides the crown with a magnificent source of wealth from the pearl banks of the Gulf."
 STATIC_MODIFIER_NAME_por_portuguese_great_arabia: "Portuguese Great Arabia"
 STATIC_MODIFIER_DESC_por_portuguese_great_arabia_desc: "Establishing dominance over the Arabian Peninsula maximizes our trade efficiency and isolates our rivals."
 STATIC_MODIFIER_NAME_por_new_ports: "New Ports"
 STATIC_MODIFIER_DESC_por_new_ports: "The expansion of our naval infrastructure increases the nation's prestige and attracts legendary navigators to our cause."
 STATIC_MODIFIER_NAME_por_colonial_enthusiasm: "Colonial Enthusiasm"
 STATIC_MODIFIER_DESC_por_colonial_enthusiasm: "A surge in public interest and royal support makes the establishment of new colonial charters more affordable."
 STATIC_MODIFIER_NAME_por_indian_expansion: "Indian Expansion"
 STATIC_MODIFIER_DESC_por_indian_expansion: "Our growing presence in the subcontinent is managed through careful diplomacy to minimize local resistance."
 STATIC_MODIFIER_NAME_por_bengal_trade_influence: "Bengal Trade Influence"
 STATIC_MODIFIER_DESC_por_bengal_trade_influence: "Operating in the Bay of Bengal provides our merchants with access to the world's finest textiles and saltpeter."
 STATIC_MODIFIER_NAME_por_indian_base: "Indian Base"
 STATIC_MODIFIER_DESC_por_indian_base: "The establishment of a permanent headquarters at Goa serves as the administrative and spiritual heart of the Estado da Índia."
 STATIC_MODIFIER_NAME_por_portuguese_east_india_company: "Portuguese East India Company"
 STATIC_MODIFIER_DESC_por_portuguese_east_india_company: "The consolidation of our eastern trade under a single entity streamlines logistics and reduces maritime risks."
 STATIC_MODIFIER_NAME_por_strategic_port: "Strategic Port"
 STATIC_MODIFIER_DESC_por_strategic_port: "Occupying key chokepoints allows for absolute control over the movement of goods and naval fleets."
 STATIC_MODIFIER_NAME_por_control_the_spice_production: "Spice Production Control"
 STATIC_MODIFIER_DESC_por_control_the_spice_production: "Maintaining an iron grip on the source of cloves and nutmeg ensures the stability of our global monopoly."
 STATIC_MODIFIER_NAME_por_macau_port: "Macau Port"
 STATIC_MODIFIER_DESC_por_macau_port: "Our base at Macau facilitates the highly profitable exchange of Japanese silver for Chinese silk and porcelain."
 STATIC_MODIFIER_NAME_por_portuguese_empire: "The Portuguese Empire"
 STATIC_MODIFIER_DESC_por_portuguese_empire: "As the first truly global empire, Portugal enjoys unparalleled prestige and wealth from its domain across three oceans."
 por_our_colonial_nations_in_brazil_get_a_new_administration: "Every [ShowSubjectTypeName('colonial_nation')] in [ShowRegionName('brazil_region')|e] of us will get the following modifier: [ShowModifier('por_great_brazil')]"
 por_our_or_our_subjects_saffron_farms_will_get_the_following_mod_tt: "Every [location|E] owned by our [subject|e] or us in [ShowRegionName('madagascar_region')] that produces [ShowGoodsName('saffron')] will receive the following modifier: [ShowModifier('por_saffron_in_madagascar')]"
 por_our_or_our_subjects_cloves_farms_will_get_the_following_mod_tt: "Every [location|E] owned by our [subject|e] or us in [ShowAreaName('moluccas_area')] that produces [ShowGoodsName('cloves')] will receive the following modifier: [ShowModifier('por_control_the_spice_production')]"
 por_all_locations_in_galicia_area_change_integration_progress_by_75_tt: "Every [location|e] in the [ShowAreaName('galicia_area')] changes its [integration|E] level by #P 75%#!"
 por_construct_a_feitoria_at_half_cost_tt: "Start constructing a [ShowBuildingTypeName('por_feitoria')] [building|e] at #P -50%#! cost"
 por_construct_a_mission_at_half_cost_tt: "Start constructing a [ShowBuildingTypeName('missionary_building')] [building|e] at #P -50%#! cost"
 portugal_missions_events.1.t: "The Settlement of the Azores"
 portugal_missions_events.1.d: "The discovery of the uninhabited Azores archipelago by Portuguese navigators like Gonçalo Velho Cabral in the 1430s marked a significant step in Atlantic expansion. Prince Henry the Navigator encouraged the settlement of these volcanic islands, recognizing their strategic value as a mid-Atlantic base for further exploration.\n\nEarly settlers from the Algarve and Alentejo regions brought livestock and seeds, establishing a sustainable agrarian society despite the rugged terrain. Over time, the islands became a vital stopover for ships returning from the Indies and the Americas, providing essential supplies and a safe harbor for the 'Volta do Mar' maneuvers."
 portugal_missions_events.1.a: "Grant charters for the settlement of the islands."
 portugal_missions_events.2.t: "The Outpost at Arguin"
 portugal_missions_events.2.d: "After Gil Eanes successfully rounded Cape Bojador in 1434, the way to West Africa's coast was finally opened. The island of Arguin was identified as an ideal location for a fortified trading post, or feitoria, to tap into the lucrative trans-Saharan trade routes that reached the coast.\n\nEstablishing a permanent presence here allows the Crown to trade European goods directly for African gold and resources, bypassing traditional land-based middlemen. This small island serves as the first overseas feitoria of the Portuguese Empire, securing a vital foothold for future expeditions further south."
 portugal_missions_events.2.a: "Establish a Feitoria at Arguin."
 portugal_missions_events.2.b: "We have no interest in this desert."
 portugal_missions_events.3.t: "Foothold in Guinea"
 portugal_missions_events.3.d: "As our explorers push further south along the Upper Guinea coast, the estuaries of the Rio Grande and the surrounding islands offer new commercial opportunities. The region is rich in ivory and forest products, attracting the attention of both the Crown and adventurous private merchants looking to expand the realm's influence.\n\nSetting up outposts in Rio Grande and the Bissagos Islands will stabilize our trade relations with local rulers and provide a base for missionary work. These stations will serve as essential links in the growing network of 'feitorias' that sustain our maritime empire along the African coast."
 portugal_missions_events.3.a: "Leave some settlers behind."
 portugal_missions_events.3.b: "We have no interest in this place."
 portugal_missions_events.4.t: "Discovery of the Zaire River"
 portugal_missions_events.4.d: "In 1482, the explorer Diogo Cão became the first European to encounter the mighty mouth of the Congo River, which he named the Zaire. He erected a 'padrão'—a stone pillar—to mark Portuguese sovereignty and began diplomatic contact with the powerful Kingdom of Kongo situated further inland.\n\nSailing up this vast waterway reveals a sophisticated kingdom, opening the door to a unique alliance of trade and faith. By investing in the exploration of the interior, we can establish deep religious and commercial ties that will redefine the Portuguese presence in Central Africa for generations to come."
 portugal_missions_events.4.a: "Sail up the river."
 portugal_missions_events.4.b: "We have no interest in this place."
 portugal_missions_events.5.t: "The Gulf of Guinea Islands"
 portugal_missions_events.5.d: "The uninhabited islands of São Tomé and Fernando Po in the Gulf of Guinea offer fertile volcanic soil and a strategic location near the equator. Discovered in the early 1470s, they are perfectly positioned to serve as a hub for the growing trade between West Africa and the mainland ports of Portugal.\n\nBy settling these islands, we can develop large-scale plantations and create a secure naval station to support our southern fleets. The introduction of sugar cultivation here could mirror the success of Madeira, turning these remote outcrops into some of the most profitable territories in the Atlantic."
 portugal_missions_events.5.a: "Leave some settlers on the islands."
 portugal_missions_events.5.b: "We have no interest in these islands."
 portugal_missions_events.6.t: "The Pilot of Malindi"
 portugal_missions_events.6.d: "Upon reaching the friendly port of Malindi on the East African coast, Vasco da Gama's fleet secured the services of a highly skilled Gujarati navigator. This pilot possessed the advanced charts and precise knowledge of the monsoon winds required to successfully cross the vast Indian Ocean to the Malabar Coast.\n\nWith his expert guidance, the treacherous journey across the Arabian Sea becomes a predictable path, linking the Atlantic and Indian Oceans for the first time. This encounter is the final key to unlocking the sea route to the legendary spice markets of Calicut, fundamentally altering the world's economic balance."
 portugal_missions_events.6.a: "Follow him to the shores of India."
 portugal_missions_events.7.t: "Strengthening the East African Outposts"
 portugal_missions_events.7.d: "The Island of Mozambique and the port of Mombasa have become indispensable links in the 'Carreira da Índia'. These ports provide fresh water, essential repairs, and protection for the heavy carracks making the long and perilous voyage between Lisbon and the State of India.\n\nInvesting in the permanent infrastructure and marketplaces of these locations will secure our dominance over the East African coast. By fostering the trade of gold and ivory from the interior, we ensure these colonies remain self-sufficient and capable of defending the vital sea lanes against rival powers."
 portugal_missions_events.7.a: "Develop our colony."
 portugal_missions_events.7.b: "Let us reap the short-term benefits."
 portugal_missions_events.8.t: "The Massacre at Calicut"
 portugal_missions_events.8.d: "Relations with the Samorin of Calicut have reached a breaking point as local Arab merchants, fearing the end of their monopoly, have incited a violent uprising. Our 'feitoria' has been attacked and razed to the ground, resulting in the tragic loss of many Portuguese lives including the factor Aires Correia.\n\nThis flagrant act of aggression and the loss of our commercial hub cannot go unpunished. The destruction of the feitoria is an insult to the honor of the Portuguese Crown, and we must respond with overwhelming force to demand reparations and restore our authority in the region."
 portugal_missions_events.8.a: "They shall pay for this treachery!"
 portugal_missions_events.9.t: "The Punishment of Thatta"
 portugal_missions_events.9.d: "In 1556, a Portuguese expeditionary force under Pedro Barreto Rolim arrived at the wealthy city of Thatta in the Indus Delta. Originally intended to provide military aid, the Portuguese instead found themselves in conflict with the local administration, leading to a brutal and thorough sacking of the city.\n\nThe wealth seized during the plunder was immense, bolstering the royal treasury with the riches of the Sindh region. However, the devastation left the city in ruins and its population decimated, sparking a debate between those who value immediate gain and those who fear for the realm's long-term reputation."
 portugal_missions_events.9.a: "Let the troops sack the city."
 portugal_missions_events.9.b: "Keep our troops in check."
 portugal_missions_events.10.t: "The Journey to the Spice Islands"
 portugal_missions_events.10.d: "As our fleets venture beyond the Malabar Coast and the Bay of Bengal, the intricate geography of the Indonesian archipelago presents a formidable challenge. To reach the fabled Moluccas—the true source of the world's cloves and nutmeg—we require the expertise of those who have navigated these waters for centuries.\n\nBy enlisting specialized pilots who understand the complex currents and seasonal monsoons of the Sunda and Banda Seas, we can ensure our ships navigate the reefs and straits safely. This knowledge is the final bridge required to establish our dominance in the Far East and complete our global trade monopoly."
 portugal_missions_events.10.a: "Set sail for the Moluccas."