l_simp_chinese:
 portugal_mission_pack: "葡萄牙任务树"
 portugal_mission_pack_desc: "一个侧重于葡萄牙巩固、海上扩张和全球帝国建设的综合任务树。"
 mission_secure_portuguese_order: "巩固葡萄牙秩序"
 mission_secure_portuguese_order_desc: "过去的动荡已成云烟，我们必须巩固祖国，对所有葡萄牙领土实施稳固掌控，以确保未来的繁荣与安全。"
 mission_secure_portuguese_order_tooltip: "维持稳定需要贵族支持。"
 mission_develop_lisbon: "发展里斯本"
 mission_develop_lisbon_desc: "我们的首都里斯本坐落于欧洲与大西洋的交汇处。将其发展为商业重镇，我们便能使葡萄牙成为贸易与商业的中心。"
 mission_develop_lisbon_tooltip: "将里斯本建设成为拥有强大商业基础设施的繁荣首都。"
 mission_strengthen_monarchy: "强化君主制"
 mission_strengthen_monarchy_desc: "阿维什王朝必须巩固其权力，确立对王国的稳固统治。通过平衡贵族利益与王室权威，我们将能建立一个强大而稳定的君主国。"
 mission_strengthen_monarchy_tooltip: "巩固王室权威，维系贵族支持。"
 mission_build_portuguese_navy: "建立葡萄牙海军"
 mission_build_portuguese_navy_desc: "为探索未知海域并保护我们的贸易航线，我们必须建立一支强大海军，能够将葡萄牙的力量投射到各大洋。"
 mission_build_portuguese_navy_tooltip: "建立一支强大的海军，并配备完善的造船设施。"
 mission_explore_african_coast: "探索非洲海岸"
 mission_explore_african_coast_desc: "非洲海岸蕴藏着无尽的财富与机遇。通过向南派遣探险队，我们将能够建立贸易站，并发现通往东方财富的新航线。"
 mission_explore_african_coast_tooltip: "探索并绘制西非海岸线。"
 mission_establish_trading_posts: "建立贸易站"
 mission_establish_trading_posts_desc: "对非洲海岸的了解带来了机遇。通过建立筑起坚固的贸易站，我们可以垄断黄金、象牙和奴隶贸易，为葡萄牙带来巨大财富。"
 mission_establish_trading_posts_tooltip: "在非洲海岸建立贸易站网络。"
 mission_ceuta_expedition: "远征休达"
 mission_ceuta_expedition_desc: "休达这一战略要地扼守着地中海门户。从摩尔人手中夺取这座要塞，将使我们获得北非的立足点，并展现我们的军事实力。"
 mission_ceuta_expedition_tooltip: "从摩洛哥控制下夺取战略城市休达。"
 mission_secure_strait_of_gibraltar: "巩固直布罗陀海峡"
 mission_secure_strait_of_gibraltar_desc: "既然休达已经处于我们掌控之下，我们必须沿着海岸扩张影响力。建立堡垒并控制关键港口将保护我们的利益，为未来远征提供基地。"
 mission_secure_strait_of_gibraltar_tooltip: "建立葡萄牙对直布罗陀海峡的控制。"
 mission_discover_azores: "发现亚速尔群岛"
 mission_discover_azores_desc: "深入大西洋，发现并占领亚速尔群岛。这些岛屿将成为我们未来航行与殖民地的重要中转站。"
 mission_discover_azores_tooltip: "发现并宣称拥有亚速尔群岛。"
 mission_colonize_kongo: "殖民刚果"
 mission_colonize_kongo_desc: "现在是时候将我们的势力进一步扩展到非洲了。通过在刚果地区建立殖民地，我们将能获取宝贵的资源，并为后续扩张到非洲大陆建立立足点。"
 mission_colonize_kongo_tooltip: "是时候夺取我们在刚果的非洲立足点了。"
 mission_develop_port_wine: "发展波特酒产业"
 mission_develop_port_wine_desc: "我们独特的加度葡萄酒如今风靡欧洲。通过扩大葡萄种植规模并改进生产工艺，可以将这一地方特产转变为重要出口商品。"
 mission_develop_port_wine_tooltip: "扩大葡萄酒生产规模，使葡萄牙成为主要葡萄酒出口国。"
 mission_establish_fishing_industry: "发展渔业"
 mission_establish_fishing_industry_desc: "我国沿海富饶的渔场既能提供食物，也能带来经济机遇。发展适当的渔业将养活我国人民，并创造有价值的贸易商品。"
 mission_establish_fishing_industry_tooltip: "沿葡萄牙海岸线发展健全的捕鱼产业。"
 mission_english_alliance: "英格兰同盟"
 mission_english_alliance_desc: "英格兰与我们共享海上利益，且反对我们共同的对手。与英格兰建立牢固同盟将保障安全，并为合作开辟新机遇。"
 mission_english_alliance_tooltip: "与英国建立持久的联盟。"
 mission_counter_castilian_influence: "遏制卡斯蒂利亚势力"
 mission_counter_castilian_influence_desc: "我们的强大邻国卡斯蒂利亚长久以来一直觊觎我们的王国。通过巩固自身地位，在保持良好关系的同时坚定维护独立自主，我们将确保葡萄牙的主权完整。"
 mission_counter_castilian_influence_tooltip: "抵御卡斯蒂利亚的野心，维护葡萄牙的独立地位。"
 mission_establish_brazilian_colony: "建立巴西殖民地"
 mission_establish_brazilian_colony_desc: "大西洋彼岸的广阔土地蕴藏着前所未有机遇。通过在巴西建立殖民地，我们将能获取宝贵资源，并扩大葡萄牙在新大陆的影响力。"
 mission_establish_brazilian_colony_tooltip: "在巴西建立葡萄牙殖民地。"
 mission_establish_india_trade: "在印度开展贸易"
 mission_establish_india_trade_desc: "印度的财富——香料、丝绸与宝石——早已成为传说。通过建立直接贸易关系并确保贸易据点，我们将能绕开中间商，为葡萄牙带来巨大财富。"
 mission_establish_india_trade_tooltip: "在印度建立直接贸易航线与贸易据点。"
 mission_route_to_indies: "通往印度的航线"
 mission_route_to_indies_desc: "我们成功开辟了通往印度的海上航线，将欧洲与亚洲的财富直接相连。这番不朽功业奠定了葡萄牙全球海洋强国的地位。"
 mission_route_to_indies_tooltip: "完成通往亚洲海上航线的建立。"
 mission_portuguese_empire: "葡萄牙帝国"
 mission_portuguese_empire_desc: "从欧洲海岸到非洲、亚洲与美洲的海岸，葡萄牙的影响力遍及全球。我们缔造了一个日不落帝国。"
 mission_portuguese_empire_tooltip: "将葡萄牙建设成为一个横跨多大洲的全球帝国。"
 portugal_mission_events.1.t: "王国的巩固"
 portugal_mission_events.1.d: "随着内部局势趋于稳定，我们必须决定如何集中精力。有人主张修建基础设施以发展经济，也有人认为应当加强军备以保卫既得成果。"
 portugal_mission_events.1.a: "注重基础设施建设"
 portugal_mission_events.1.b: "加强军事力量"
 portugal_mission_events.2.t: "大海的召唤"
 portugal_mission_events.2.d: "我国海军实力显著增强，开启了新的可能性。部分顾问主张聚焦探索与发现，而其他顾问则强调通过扩大贸易网络获取即时收益。"
 portugal_mission_events.2.a: "拥抱探索"
 portugal_mission_events.2.b: "专注贸易"
 portugal_mission_events.3.t: "大西洋野心"
 portugal_mission_events.3.d: "亚速尔群岛的发现揭示了大西洋殖民的潜力。我们必须决定，是着眼于发展这些新定居点以追求长期增长，还是加强海军力量以保护我们不断扩张的利益。"
 portugal_mission_events.3.a: "发展定居点"
 portugal_mission_events.3.b: "增强海军存在"
 portugal_mission_events.10.t: "摩洛哥问题"
 portugal_mission_events.10.d: "我们在北非的立足点既带来机遇也伴随挑战。一些指挥官带着宗教热情主张激进扩张，另一些则倾向于借助坚固防御工事巩固既得成果。"
 portugal_mission_events.10.a: "十字军热忱"
 portugal_mission_events.10.b: "战略要塞"
 portugal_mission_events.11.t: "香料之路"
 portugal_mission_events.11.d: "我们正站在控制香料贸易的门槛上。抉择就在眼前：是应专注于通过贸易垄断来最大化经济收益，还是确保我们的海军优势以保护这些宝贵航线不受竞争者威胁？"
 portugal_mission_events.11.a: "贸易垄断"
 portugal_mission_events.11.b: "海上霸权"
 portugal_mission_events.12.t: "全球帝国"
 portugal_mission_events.12.d: "葡萄牙成就了鲜有国家能企及的伟业——一个真正意义上的全球帝国。展望未来，我们必须决定如何治理这片广阔疆域。有人主张实行强有力的中央集权管理，而另一些人则认为我们的贸易网络才应是重中之重。"
 portugal_mission_events.12.a: "帝国行政体系"
 portugal_mission_events.12.b: "全球贸易网络"
 portugal_mission_events.13.t: "跨越海峡"
 portugal_mission_events.13.d: "葡萄牙的旗帜现已飘扬在一座新的摩洛哥城市上空，我们掌控了直布罗陀海峡。然而，仅此一个孤立的据点不足以真正保障信仰或我们的贸易利益。我们的战地指挥官敦促我们乘胜追击，他们认为这些沿海土地依据神圣权利和战略必要性理应属于我们。他们的要求代价高昂，但回报将是完全掌控海峡。我们的商人阶层则提醒我们考虑这场战争可能给我们日益增长的帝国带来的经济压力。我们必须明智地选择下一步行动。"
 portugal_mission_events.13.a: "我们将掌控海岸，代价微不足道。"
 portugal_mission_events.13.b: "我们不需要那块土地，我们将巩固现有的据点。"
