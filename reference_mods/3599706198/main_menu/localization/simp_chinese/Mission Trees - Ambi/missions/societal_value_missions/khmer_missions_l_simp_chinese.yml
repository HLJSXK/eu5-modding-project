 STATIC_MODIFIER_NAME_angkor_wat_spiritual_center: "Angkor Wat - Spiritual Center"
 STATIC_MODIFIER_DESC_angkor_wat_spiritual_center: "Angkor Wat draws pilgrims and scholars from across the Buddhist and Hindu worlds."
 STATIC_MODIFIER_NAME_bayon_smiling_faces: "Bayon - The Smiling Faces"
 STATIC_MODIFIER_DESC_bayon_smiling_faces: "The enigmatic faces of the Bayon watch over the empire with compassion."
 STATIC_MODIFIER_NAME_citadel_of_women: "Citadel of Women"
 STATIC_MODIFIER_DESC_citadel_of_women: "Banteay Srei's exquisite craftsmanship inspires artists and artisans throughout the realm."
 STATIC_MODIFIER_NAME_temple_endowments: "Temple Endowments"
 STATIC_MODIFIER_DESC_temple_endowments: "Properly endowed temples maintain the gods' favor and ensure clerical loyalty."
 STATIC_MODIFIER_NAME_northern_sanctuary: "Northern Sanctuary"
 STATIC_MODIFIER_DESC_northern_sanctuary: "Phimai serves as a spiritual and administrative center for our northern territories."
 STATIC_MODIFIER_NAME_mun_river_development: "Mun River Development"
 STATIC_MODIFIER_DESC_mun_river_development: "The fertile Mun River valley yields abundant harvests for the empire."
 STATIC_MODIFIER_NAME_siamese_tributaries: "Siamese Tributaries"
 STATIC_MODIFIER_DESC_siamese_tributaries: "Siamese states acknowledge Khmer supremacy and send tribute to Angkor."
 STATIC_MODIFIER_NAME_cham_capital_occupied: "Cham Capital Occupied"
 STATIC_MODIFIER_DESC_cham_capital_occupied: "Vijaya, the Cham capital, is firmly under Khmer control."
 STATIC_MODIFIER_NAME_eastern_sea_trade: "Eastern Sea Trade"
 STATIC_MODIFIER_DESC_eastern_sea_trade: "Our eastern ports connect us to the lucrative trade networks of the Spice Islands."
 STATIC_MODIFIER_NAME_burmese_tributary: "Burmese Tributary"
 STATIC_MODIFIER_DESC_burmese_tributary: "Pagan acknowledges our supremacy, bringing Burmese wealth into our sphere."
 STATIC_MODIFIER_NAME_khmer_control_menam: "Khmer Control of Menam"
 STATIC_MODIFIER_DESC_khmer_control_menam: "The Menam valley is firmly under Khmer administration."
 STATIC_MODIFIER_NAME_maritime_khmer: "Maritime Khmer"
 STATIC_MODIFIER_DESC_maritime_khmer: "Our coastal provinces and developed ports make us a true maritime power."
 STATIC_MODIFIER_NAME_gulf_dominance: "Gulf of Thailand Dominance"
 STATIC_MODIFIER_DESC_gulf_dominance: "Khmer control of the Gulf of Thailand secures regional trade and naval superiority."
 STATIC_MODIFIER_NAME_chinese_tributary_trade: "Chinese Tributary Trade"
 STATIC_MODIFIER_DESC_chinese_tributary_trade: "Friendly relations with the Middle Kingdom open lucrative trade opportunities."
 STATIC_MODIFIER_NAME_cosmopolitan_angkor: "Cosmopolitan Angkor"
 STATIC_MODIFIER_DESC_cosmopolitan_angkor: "Foreign merchants from across Asia bring their goods and cultures to our capital."
 STATIC_MODIFIER_NAME_royal_road_network: "Royal Road Network"
 STATIC_MODIFIER_DESC_royal_road_network: "Well-maintained roads bind the empire together and facilitate trade and administration."
 STATIC_MODIFIER_NAME_dharmasala_network: "Dharmasala Network"
 STATIC_MODIFIER_DESC_dharmasala_network: "Rest houses along our roads provide shelter for travelers and officials."
 STATIC_MODIFIER_NAME_royal_hospitals: "Royal Hospitals"
 STATIC_MODIFIER_DESC_royal_hospitals: "Royal hospitals care for the sick and advance medical knowledge."
 STATIC_MODIFIER_NAME_khmer_craftsmanship: "Khmer Craftsmanship"
 STATIC_MODIFIER_DESC_khmer_craftsmanship: "Skilled artisans produce goods of exceptional quality throughout the empire."
 STATIC_MODIFIER_NAME_sandstone_quarries: "Sandstone Quarries"
 STATIC_MODIFIER_DESC_sandstone_quarries: "Expanded quarries ensure steady supply of high-quality stone for construction."
 STATIC_MODIFIER_NAME_khmer_military_reforms: "Khmer Military Reforms"
 STATIC_MODIFIER_DESC_khmer_military_reforms: "Reorganized and better-trained armies defend the empire more effectively."
 STATIC_MODIFIER_NAME_khmer_war_elephants: "Khmer War Elephants"
 STATIC_MODIFIER_DESC_khmer_war_elephants: "Our elite elephant corps strikes terror into enemy hearts."
 STATIC_MODIFIER_NAME_angkor_fortified: "Angkor Fortified"
 STATIC_MODIFIER_DESC_angkor_fortified: "Our capital's strengthened defenses make it a formidable stronghold."
 STATIC_MODIFIER_NAME_khmer_cultural_hegemony: "Khmer Cultural Hegemony"
 STATIC_MODIFIER_DESC_khmer_cultural_hegemony: "Khmer language, art, and traditions dominate the region."
 STATIC_MODIFIER_NAME_khmer_royal_library: "Khmer Royal Library"
 STATIC_MODIFIER_DESC_khmer_royal_library: "The royal library preserves sacred texts and advances learning."
 STATIC_MODIFIER_NAME_khmer_religious_syncretism: "Khmer Religious Syncretism"
 STATIC_MODIFIER_DESC_khmer_religious_syncretism: "The unique blend of Hindu and Buddhist traditions creates religious harmony."
 STATIC_MODIFIER_NAME_brahmin_advisors: "Brahmin Advisors"
 STATIC_MODIFIER_DESC_brahmin_advisors: "Learned Brahmins from India advise our court on ritual and governance."
 STATIC_MODIFIER_NAME_western_fortifications: "Western Fortifications"
 STATIC_MODIFIER_DESC_western_fortifications: "Fortified positions in the west deter Siamese incursions."
 STATIC_MODIFIER_NAME_monsoon_recovery: "Monsoon Recovery"
 STATIC_MODIFIER_DESC_monsoon_recovery: "Recovered from monsoon failure, our agriculture is now more resilient."
 STATIC_MODIFIER_NAME_angkorian_golden_age: "Angkorian Golden Age"
 STATIC_MODIFIER_DESC_angkorian_golden_age: "An era of unprecedented prosperity, cultural flourishing, and imperial power."
 STATIC_MODIFIER_NAME_khmer_hegemon_of_mainland: "Khmer Hegemon of the Mainland"
 STATIC_MODIFIER_DESC_khmer_hegemon_of_mainland: "All mainland Southeast Asia acknowledges Khmer supremacy."
 STATIC_MODIFIER_NAME_eternal_angkor: "Eternal Angkor"
 STATIC_MODIFIER_DESC_eternal_angkor: "Angkor's glory will endure for all time, remembered by future generations."
 STATIC_MODIFIER_NAME_khm_divine_kingship: "Divine Kingship"
 STATIC_MODIFIER_DESC_khm_divine_kingship: "The king rules by divine right, commanding unquestioning loyalty."
 STATIC_MODIFIER_NAME_khm_angkorian_capital: "Angkorian Capital"
 STATIC_MODIFIER_DESC_khm_angkorian_capital: "Our capital develops rapidly as the center of the empire."
 STATIC_MODIFIER_NAME_khm_baray_irrigation: "Baray Irrigation"
 STATIC_MODIFIER_DESC_khm_baray_irrigation: "Sophisticated irrigation systems ensure agricultural abundance."
 STATIC_MODIFIER_NAME_khm_god_king: "God-King"
 STATIC_MODIFIER_DESC_khm_god_king: "The ruler is venerated as a living deity, strengthening royal authority."
 STATIC_MODIFIER_NAME_khm_royal_temple: "Royal Temple"
 STATIC_MODIFIER_DESC_khm_royal_temple: "The royal temple complex brings prosperity to the surrounding lands."
 STATIC_MODIFIER_NAME_khm_royal_transformation: "Royal Transformation"
 STATIC_MODIFIER_DESC_khm_royal_transformation: "The king's spiritual transformation benefits the entire realm."
 STATIC_MODIFIER_NAME_khm_ancestral_rites: "Ancestral Rites"
