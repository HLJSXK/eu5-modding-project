l_simp_chinese:
 khmer_mission_pack: "高棉：吴哥帝国"
 khmer_mission_pack_desc: "带领高棉帝国从其首都吴哥出发，通过修建寺庙、发展灌溉系统和军事扩张，主宰东南亚大陆。"
 khmer_mission_pack_BUTTON_TOOLTIP: "Complete missions to develop the baray irrigation system, construct magnificent temples, expand Khmer dominance, and usher in an Angkorian Golden Age."
 khmer_mission_pack_CRITERIA_DESCRIPTION: "巩固洞里萨湖核心地带，发展巴莱水利系统，兴建寺庙，将高棉的控制力扩展至整个区域。"
 mission_consolidate_core_heartland: "巩固核心腹地"
 mission_consolidate_core_heartland_desc: "The Khmer Empire must first secure its heartland around the Tonle Sap lake. By strengthening royal authority and controlling our core territories, we lay the foundation for future greatness."
 mission_consolidate_core_heartland_tooltip: "Control at least 90% of the Tonle Sap area, maintain high stability and legitimacy, and strengthen crown estate power."
 mission_develop_yasodharapura: "Develop Yasodharapura"
 mission_develop_yasodharapura_desc: "Our capital, Yasodharapura (Angkor), must be developed into a magnificent city worthy of the Devaraja. Let us expand its markets, increase its wealth, and make it the jewel of Southeast Asia."
 mission_develop_yasodharapura_tooltip: "Develop the capital to at least 30 development, build a marketplace, and maintain strong trade income."
 mission_secure_tonle_sap: "Secure the Tonle Sap"
 mission_secure_tonle_sap_desc: "The Tonle Sap lake is the heart of our empire, providing fish and supporting our rice agriculture. We must secure full control over its shores and establish a naval presence to patrol its waters."
 mission_secure_tonle_sap_tooltip: "Control 95% of the Tonle Sap area and maintain a navy of at least 10 ships."
 mission_establish_baray_system: "Establish the Baray System"
 mission_establish_baray_system_desc: "The great baray reservoirs are essential for our water management and rice cultivation. By constructing a network of these artificial lakes, we ensure water security and agricultural abundance."
 mission_establish_baray_system_tooltip: "Construct at least 8 reservoir buildings, with at least 6 in the Tonle Sap area."
 mission_expand_rice_paddies: "Expand the Rice Paddies"
 mission_expand_rice_paddies_desc: "Rice is the foundation of Khmer wealth and power. By expanding our rice paddies across the empire, we feed our growing population and generate surplus for trade."
 mission_expand_rice_paddies_tooltip: "Produce at least 75 rice, with at least 30 locations producing rice."
 mission_establish_devaraja_cult: "Establish the Devaraja Cult"
 mission_establish_devaraja_cult_desc: "The cult of the Devaraja (God-King) legitimizes our rule and unites the empire under divine authority. We must strengthen the clergy's support for this sacred institution."
 mission_establish_devaraja_cult_tooltip: "Maintain at least 20% clergy power, 60% clergy satisfaction, and high stability."
 mission_construct_mountain_temples: "Construct Mountain Temples"
 mission_construct_mountain_temples_desc: "The gods reside on mountains, and our temples should reflect this sacred geography. Let us build temples on hills and mountains to honor the deities and assert our divine connection."
 mission_construct_mountain_temples_tooltip: "Construct at least 3 temples in mountains and 4 temples in hills."
 mission_build_phnom_bakheng: "Build Phnom Bakheng"
 mission_build_phnom_bakheng_desc: "Phnom Bakheng, the first mountain temple built in the Angkor region, will serve as a model for future temple construction and demonstrate our devotion to the gods."
 mission_build_phnom_bakheng_tooltip: "Construct a grand temple at Phnom Bakheng and maintain at least 20 prestige."
 mission_construct_baksei_chamkrong: "Construct Baksei Chamkrong"
 mission_construct_baksei_chamkrong_desc: "This small but elegant temple will honor our ancestors and house sacred relics, strengthening the spiritual foundation of our dynasty."
 mission_construct_baksei_chamkrong_tooltip: "Construct a temple at Baksei Chamkrong."
 mission_build_pre_rup: "Build Pre Rup"
 mission_build_pre_rup_desc: "Pre Rup will serve as a state temple where royal rites are performed, transforming the spiritual landscape and marking our territory as sacred ground."
 mission_build_pre_rup_tooltip: "Construct a temple at Pre Rup and maintain substantial rice production."
 mission_construct_ta_keo: "Construct Ta Keo"
 mission_construct_ta_keo_desc: "Ta Keo will be the first temple built entirely of sandstone, demonstrating our architectural innovation and the growing wealth of the empire."
 mission_construct_ta_keo_tooltip: "Construct a grand temple at Ta Keo with at least 2000 gold in reserve."
 mission_commission_angkor_wat: "Commission Angkor Wat"
 mission_commission_angkor_wat_desc: "We shall build a temple unlike any the world has seen - a magnificent structure dedicated to Vishnu that will serve as both temple and mausoleum, demonstrating Khmer power to all."
 mission_commission_angkor_wat_tooltip: "Maintain at least 3000 gold, 40 prestige, 70 legitimacy, and 60 stability to begin construction."
 mission_complete_angkor_wat: "Complete Angkor Wat"
 mission_complete_angkor_wat_desc: "Angkor Wat stands complete - the largest religious monument in the world. Its towering spires and intricate bas-reliefs proclaim Khmer greatness to the heavens and to all who behold it."
 mission_complete_angkor_wat_tooltip: "Complete both a temple complex and grand temple at Angkor Wat."
 mission_construct_bayon: "Construct the Bayon"
 mission_construct_bayon_desc: "The Bayon, with its enigmatic smiling faces, will reflect the compassion of the Bodhisattva and the king's role as protector of the realm."
 mission_construct_bayon_tooltip: "Construct a grand temple at Bayon and build at least 12 temples across the empire."
 mission_construct_banteay_srei: "Construct Banteay Srei"
 mission_construct_banteay_srei_desc: "Banteay Srei, the Citadel of Women, will showcase the finest Khmer craftsmanship with its intricate pink sandstone carvings, demonstrating our cultural sophistication."
 mission_construct_banteay_srei_tooltip: "Construct a temple at Banteay Srei and maintain high Khmer cultural tradition."
 mission_establish_temple_endowments: "Establish Temple Endowments"
 mission_establish_temple_endowments_desc: "Our temples require lands, revenues, and laborers to maintain them. By establishing proper endowments, we ensure the gods are honored and the clergy remain loyal."
 mission_establish_temple_endowments_tooltip: "Maintain strong clergy power and satisfaction with substantial income."
 mission_secure_northern_frontier: "Secure the Northern Frontier"
 mission_secure_northern_frontier_desc: "The northern territories hold valuable resources and strategic positions. We must extend Khmer control northward to secure our borders and access new lands."
 mission_secure_northern_frontier_tooltip: "Control at least 70% of the Northern Khmer area."
 mission_incorporate_phimai: "Incorporate Phimai"
 mission_incorporate_phimai_desc: "Phimai, with its strategic location and already-established temple, will serve as our northern administrative center and a bulwark against rivals."
 mission_incorporate_phimai_tooltip: "Construct a temple at Phimai and incorporate it fully into the empire."
 mission_secure_mun_river_valley: "Secure the Mun River Valley"
 mission_secure_mun_river_valley_desc: "The fertile Mun River valley offers excellent agricultural land and connects us to eastern trade routes. Control of this region will greatly enrich the empire."
 mission_secure_mun_river_valley_tooltip: "Control at least 80% of the Mun River area."
 mission_subjugate_lavo: "Subjugate Lavo"
 mission_subjugate_lavo_desc: "The Lavo kingdom to our west must be brought to heel. Whether through diplomacy or conquest, Lavo will acknowledge Khmer supremacy."
 mission_subjugate_lavo_tooltip: "Establish control over at least 60% of the Lavo area."
 mission_control_sukhothai: "Control Sukhothai"
 mission_control_sukhothai_desc: "Sukhothai, the rising Siamese power, threatens our western interests. We must bring them under our influence before they grow too strong."
 mission_control_sukhothai_tooltip: "Establish control over at least 50% of the Sukhothai area."
 mission_secure_eastern_border: "Secure the Eastern Border"
 mission_secure_eastern_border_desc: "Our eastern border with Champa requires attention. Secure these territories to protect against Cham raids and establish a base for further expansion."
 mission_secure_eastern_border_tooltip: "Control at least 80% of the Eastern Khmer area."
 mission_cham_pacification: "Pacify the Chams"
 mission_cham_pacification_desc: "The Champa kingdom has long been a rival. We must either bring them under our rule or neutralize them as a threat to secure our eastern flank."
 mission_cham_pacification_tooltip: "Subjugate or eliminate Champa, controlling at least 50% of the Champa coast."
 mission_conquer_vijaya: "Conquer Vijaya"
 mission_conquer_vijaya_desc: "Vijaya, the Cham capital, must fall. Control of this city gives us dominion over central Champa and access to vital trade routes."
 mission_conquer_vijaya_tooltip: "Control Vijaya and at least 80% of the Champa coast."
 mission_establish_eastern_trade: "Establish Eastern Trade"
 mission_establish_eastern_trade_desc: "With the Cham coast secured, we can now develop our eastern ports and establish trade networks reaching into the Spice Islands and beyond."
 mission_establish_eastern_trade_tooltip: "Build docks in at least 3 coastal locations and maintain a substantial navy."
 mission_secure_pagan_tribute: "Secure Pagan Tribute"
 mission_secure_pagan_tribute_desc: "The once-great Pagan kingdom in Burma acknowledges our power. Formalizing their tribute relationship brings prestige and wealth to the empire."
 mission_secure_pagan_tribute_tooltip: "Make Pagan a tributary state."
 mission_expand_into_menam_valley: "Expand into the Menam Valley"
 mission_expand_into_menam_valley_desc: "The Chao Phraya (Menam) valley is rich and fertile. Khmer expansion into this region will bring new subjects and resources under our control."
 mission_expand_into_menam_valley_tooltip: "Control at least 60% of the Menam Valley area."
 mission_control_ayutthaya: "Control Ayutthaya"
 mission_control_ayutthaya_desc: "Ayutthaya, situated on an island in the Menam, is perfectly positioned for trade and defense. Control of this city secures our dominance over central Siam."
 mission_control_ayutthaya_tooltip: "Control Ayutthaya and at least 80% of the Menam Valley area."
 mission_secure_coastal_provinces: "Secure Coastal Provinces"
 mission_secure_coastal_provinces_desc: "Our southern coast provides access to maritime trade. Securing these provinces ensures we can participate fully in the commercial networks of the region."
 mission_secure_coastal_provinces_tooltip: "Control at least 80% of the Southern Coast area."
 mission_develop_maritime_trade: "Develop Maritime Trade"
 mission_develop_maritime_trade_desc: "The sea offers opportunities the land cannot. By developing our ports and encouraging maritime commerce, we tap into the wealth of the Indian Ocean trade network."
 mission_develop_maritime_trade_tooltip: "Build docks in at least 6 ports and merchants quarters in at least 4 ports."
 mission_control_gulf_of_thailand: "Control the Gulf of Thailand"
 mission_control_gulf_of_thailand_desc: "The Gulf of Thailand is our maritime backyard. Dominance here allows us to control regional trade and project naval power along the coasts."
 mission_control_gulf_of_thailand_tooltip: "Maintain a strong navy with high tradition, controlling key locations in the Gulf."
 mission_establish_ties_with_china: "Establish Ties with China"
 mission_establish_ties_with_china_desc: "The Middle Kingdom is the source of immense wealth and prestige. Establishing friendly relations with the Chinese emperor opens lucrative trade opportunities."
 mission_establish_ties_with_china_tooltip: "Maintain good relations with China (opinion 50+)."
 mission_attract_foreign_merchants: "Attract Foreign Merchants"
 mission_attract_foreign_merchants_desc: "Chinese, Indian, Arab, and Malay merchants should find our ports welcoming. By establishing multicultural districts, we attract their trade and expertise."
 mission_attract_foreign_merchants_tooltip: "Build at least 3 multicultural districts and maintain strong market power."
 mission_develop_royal_roads: "Develop Royal Roads"
 mission_develop_royal_roads_desc: "Good roads bind the empire together, allowing for faster movement of armies, easier administration, and increased trade. Let us construct a network of royal roads."
 mission_develop_royal_roads_tooltip: "Build at least 20 roads, with at least 70% of Tonle Sap locations having roads."
 mission_construct_rest_houses: "Construct Rest Houses"
 mission_construct_rest_houses_desc: "Along our royal roads, we shall build rest houses where travelers and officials can find shelter. These dharmasalas demonstrate royal benevolence and facilitate movement."
 mission_construct_rest_houses_tooltip: "Construct at least 12 rest houses across the empire."
 mission_establish_hospitals: "Establish Hospitals"
 mission_establish_hospitals_desc: "Royal hospitals care for the sick and demonstrate the king's compassion. These institutions also serve as centers of medical knowledge and attract skilled practitioners."
 mission_establish_hospitals_tooltip: "Build at least 5 hospitals with strong clergy support."
 mission_promote_craft_guilds: "Promote Craft Guilds"
 mission_promote_craft_guilds_desc: "Skilled artisans produce goods of great value. By promoting craft guilds, we ensure the transmission of skills and the production of high-quality wares."
 mission_promote_craft_guilds_tooltip: "Build at least 8 artisans guilds and produce substantial luxury goods."
 mission_develop_stone_quarries: "Develop Stone Quarries"
 mission_develop_stone_quarries_desc: "Our temples require vast quantities of stone. Expanding our quarries ensures a steady supply for current and future construction projects."
 mission_develop_stone_quarries_tooltip: "Control at least 8 stone-producing locations with substantial stone output."
 mission_reform_khmer_army: "Reform the Khmer Army"
 mission_reform_khmer_army_desc: "Our army must evolve to meet new challenges. Reforms in organization, training, and equipment will produce a more effective fighting force."
 mission_reform_khmer_army_tooltip: "Maintain high army size percentage, army tradition, and build at least 8 barracks."
 mission_establish_war_elephant_corps: "Establish War Elephant Corps"
 mission_establish_war_elephant_corps_desc: "War elephants are the terror of the battlefield. By establishing a dedicated elephant corps, we gain a powerful tool against our enemies."
 mission_establish_war_elephant_corps_tooltip: "Control elephant-producing locations, maintain high army tradition, and research war elephants advance."
 mission_fortify_capital: "Fortify the Capital"
 mission_fortify_capital_desc: "Our capital must be secure against any threat. Strengthening its fortifications ensures the heart of the empire remains safe."
 mission_fortify_capital_tooltip: "Build castle and moat in the capital with fort level at least 4."
 mission_promote_khmer_culture: "Promote Khmer Culture"
 mission_promote_khmer_culture_desc: "Khmer culture - our language, art, and traditions - should flourish and spread. Cultural patronage enhances our prestige and unifies the empire."
 mission_promote_khmer_culture_tooltip: "Achieve high Khmer cultural tradition and build at least 8 libraries."
 mission_establish_royal_library: "Establish Royal Library"
 mission_establish_royal_library_desc: "A royal library preserves sacred texts, historical records, and literary works. It also serves as a center of learning for scholars and scribes."
 mission_establish_royal_library_tooltip: "Build royal library and university in the capital with high average literacy."
 mission_syncretize_hindu_buddhist_traditions: "Syncretize Hindu-Buddhist Traditions"
 mission_syncretize_hindu_buddhist_traditions_desc: "Khmer religion draws from both Hindu and Buddhist traditions. Formalizing this syncretism creates a unique spiritual identity that embraces both faiths."
 mission_syncretize_hindu_buddhist_traditions_tooltip: "Be Hindu or Buddhist with high religious unity and clergy satisfaction."
 mission_attract_brahmin_scholars: "Attract Brahmin Scholars"
 mission_attract_brahmin_scholars_desc: "Brahmin scholars from India possess sacred knowledge and ritual expertise. Attracting them to our court enhances our religious authority and learning."
 mission_attract_brahmin_scholars_tooltip: "Maintain good relations with Hindu states and high average literacy."
 mission_prevent_siamese_incursions: "Prevent Siamese Incursions"
 mission_prevent_siamese_incursions_desc: "The Siamese grow bold. We must strengthen our western defenses with forts and garrisons to prevent their incursions into Khmer territory."
 mission_prevent_siamese_incursions_tooltip: "Build at least 8 castles in the Thailand region."
 mission_stabilize_after_monsoon_failure: "Stabilize After Monsoon Failure"
 mission_stabilize_after_monsoon_failure_desc: "The monsoon has failed and crops wither. We must distribute food, dig emergency irrigation, and pray for the rains to return."
 mission_stabilize_after_monsoon_failure_tooltip: "Endure food shortage with low rice production for one year."
 mission_restore_authority_after_rebellion: "Restore Authority After Rebellion"
 mission_restore_authority_after_rebellion_desc: "Rebellion has shaken the realm. We must reassert royal authority, punish the disloyal, and win back the hearts of the people."
 mission_restore_authority_after_rebellion_tooltip: "Recover from instability with rebellious subjects for one year."
 mission_reach_angkorian_golden_age: "Reach the Angkorian Golden Age"
 mission_reach_angkorian_golden_age_desc: "All our efforts - the temples, the baray, the conquests - lead to this: a golden age of Khmer civilization. Let us ensure our time is remembered as the greatest in our history."
 mission_reach_angkorian_golden_age_tooltip: "Achieve great power status with high prestige, stability, development, and cultural tradition."
 mission_unite_mainland_sea: "Unite the Mainland Sea"
 mission_unite_mainland_sea_desc: "Mainland Southeast Asia - the 'Mainland Sea' - should acknowledge Khmer supremacy. From Burma to Vietnam, all shall look to Angkor."
 mission_unite_mainland_sea_tooltip: "Establish dominance over Thailand, Laos, Burma, and Vietnam regions."
 mission_eternal_angkor: "Eternal Angkor"
 mission_eternal_angkor_desc: "Angkor will endure forever. Our monuments will awe future generations, our name will be remembered, and our legacy will be eternal."
 mission_eternal_angkor_tooltip: "Achieve ultimate greatness with maximum prestige, stability, development, and loyal subjects."
