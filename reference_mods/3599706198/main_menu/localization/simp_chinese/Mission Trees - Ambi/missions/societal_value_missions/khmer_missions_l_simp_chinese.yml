 khmer_mission_events.1.t: "Angkor Consolidated"
 khmer_mission_events.1.d: "The Khmer heartland is now firmly under our control. With stability restored and royal authority strengthened, we can turn our attention to the great projects that will define our reign - the temples, the baray, and the expansion of our influence across the region."
 khmer_mission_events.2.t: "Yasodharapura Flourishes"
 khmer_mission_events.2.d: "Our capital, Yasodharapura, has grown beyond our expectations. Its markets bustle with merchants, its streets fill with artisans, and its temples draw pilgrims from across the land. The city truly deserves its name - 'the city that carries the glory.'"
 khmer_mission_events.3.t: "The Baray Network Complete"
 khmer_mission_events.3.d: "The great baray reservoirs now form a network across our heartland, capturing monsoon rains and releasing them through canals to the rice paddies below. Our engineers have mastered water on a scale unseen in these lands. The people celebrate, for never again will they fear drought."
 khmer_mission_events.4.t: "The Devaraja Established"
 khmer_mission_events.4.d: "The priests have performed the sacred rites, and the people now understand: our king is no mere mortal. He is the Devaraja, the God-King, embodiment of divine authority on earth. This sacred bond between crown and clergy will ensure the prosperity and stability of our realm for generations."
 khmer_mission_events.5.t: "The Transformation at Pre Rup"
 khmer_mission_events.5.d: "At Pre Rup, the king has undergone the sacred transformation, performing the rites that connect him to his ancestors and to the gods. The temple, with its distinctive brick towers rising against the sky, marks this place as forever holy. Here, kings will be transformed for centuries to come."
 khmer_mission_events.6.t: "Angkor Wat Commissioned"
 khmer_mission_events.6.d: "The king has announced his intention to build the greatest temple the world has ever seen. Dedicated to Vishnu, it will serve as both temple and future mausoleum, its towers representing the sacred Mount Meru. Architects, stone-carvers, and laborers gather from across the land. A new age of construction begins."
 khmer_mission_events.7.t: "Angkor Wat Completed"
 khmer_mission_events.7.d: "After years of labor, Angkor Wat stands complete. Its five towers rise like lotus buds against the sky, its bas-reliefs tell stories of gods and kings, and its moats reflect the heavens. Pilgrims and emissaries from distant lands come to behold this wonder. Truly, no greater monument has ever been built."
 khmer_mission_events.8.t: "The Bayon's Smiling Faces"
 khmer_mission_events.8.d: "The Bayon is complete, its towers adorned with enormous faces that smile enigmatically in all directions. Some say they represent the Bodhisattva Avalokiteshvara, others the king himself. Whatever their meaning, they watch over the empire with serene compassion, blessing all who dwell within their gaze."
 khmer_mission_events.9.t: "The Citadel of Women"
 khmer_mission_events.9.d: "Banteay Srei - the Citadel of Women - is a marvel of Khmer art. Carved from pink sandstone, its intricate decorations are of such exquisite detail that some whisper they must have been crafted by divine hands. This temple will inspire artists for centuries."
 khmer_mission_events.10.t: "Temple Endowments Established"
 khmer_mission_events.10.d: "With proper endowments of land, labor, and treasure, our temples now thrive. Priests perform daily rituals, maintain sacred texts, and educate the young. The gods are pleased, and the clergy remain loyal. Our spiritual foundation is secure."
 khmer_mission_events.11.t: "Lavo Subjugated"
 khmer_mission_events.11.d: "The kingdom of Lavo now acknowledges Khmer supremacy. Whether through diplomacy or force of arms, our authority extends westward, bringing new peoples and resources into our sphere. The way is now open for further expansion."
 khmer_mission_events.12.t: "Siamese Tributaries"
 khmer_mission_events.12.d: "The Siamese states - Sukhothai and others - now send tribute to Angkor. Their princes acknowledge our emperor as their overlord, and their treasuries contribute to our wealth. Khmer influence now extends across the Menam valley."
 khmer_mission_events.13.t: "Champa Pacified"
 khmer_mission_events.13.d: "The Cham kingdom, long our rival, has been pacified. Their raids cease, their ports open to our merchants, and their king acknowledges our supremacy. The eastern frontier is secure, and the riches of the Cham coast now flow to Angkor."
 khmer_mission_events.14.t: "The Menam Valley Settled"
 khmer_mission_events.14.d: "Khmer settlers now till the rich soils of the Menam valley. New villages dot the landscape, rice paddies spread across the floodplains, and our administration extends to these fertile lands. The wealth of the valley flows westward to Angkor."
 khmer_mission_events.15.t: "Chinese Envoys Arrive"
 khmer_mission_events.15.d: "Envoys from the Celestial Court have arrived in Angkor, bearing gifts and imperial greetings. They speak of trade, of friendship between our courts, and of the respect in which the Middle Kingdom holds our realm. New opportunities for commerce and diplomacy open before us."
 khmer_mission_events.16.t: "The War Elephant Corps"
 khmer_mission_events.16.d: "Our war elephant corps is the envy of Asia. Trained beasts, skilled mahouts, and armored towers make these units nearly unstoppable on the battlefield. Enemies flee at the thunder of their approach, and our armies march with confidence."
 khmer_mission_events.17.t: "Khmer Cultural Hegemony"
 khmer_mission_events.17.d: "Khmer culture now dominates the region. Our language is spoken at courts from Burma to Champa, our art styles are imitated by foreign craftsmen, and our religious practices spread wherever our influence reaches. We have become the cultural heart of Southeast Asia."
 khmer_mission_events.18.t: "The Synthesis of Faiths"
 khmer_mission_events.18.d: "In Khmer lands, Hindu and Buddhist traditions have merged into a unique synthesis. Shiva and Buddha are honored in the same temples, Brahmin priests and Buddhist monks serve the same king. This harmony of faiths strengthens our realm and attracts pilgrims of both traditions."
 khmer_mission_events.19.t: "Surviving the Monsoon"
 khmer_mission_events.19.d: "The monsoon failed, crops withered, and our people faced famine. But through wise management, emergency irrigation, and careful distribution of food, we have weathered the crisis. Our granaries are replenished, and we have learned valuable lessons about resilience."
 khmer_mission_events.20.t: "Authority Restored"
 khmer_mission_events.20.d: "The rebellion is crushed, the disloyal punished, and the fearful reassured. Royal authority stands stronger than before, and the realm is at peace. We have learned that crisis can be overcome through determination and wisdom."
 khmer_mission_events.21.t: "The Angkorian Golden Age"
 khmer_mission_events.21.d: "Historians will call this the Golden Age of Angkor. Our temples reach for the heavens, our rice feeds millions, our armies are undefeated, and our influence extends across Southeast Asia. Poets sing of our glory, artists capture our magnificence, and our people prosper as never before."
 khmer_mission_events.22.t: "Hegemon of the Mainland"
 khmer_mission_events.22.d: "From the mountains of Burma to the coasts of Vietnam, from the valleys of Laos to the islands of Champa - all acknowledge Khmer supremacy. Kings send tribute, princes seek our favor, and our emperor is recognized as the paramount ruler of mainland Southeast Asia."
 khmer_mission_events.23.t: "Eternal Angkor"
 khmer_mission_events.23.d: "Angkor will never be forgotten. Our monuments will stand for millennia, our name will be remembered when other kingdoms have crumbled to dust, and our legacy will inspire future generations. We have achieved what few civilizations ever do: we have made ourselves eternal."
