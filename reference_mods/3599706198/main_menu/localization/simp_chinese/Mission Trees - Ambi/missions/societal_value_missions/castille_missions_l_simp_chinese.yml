l_simp_chinese:
 castile_missions: "伊比利亚霸权"
 castile_missions_DESCRIPTION: "卡斯蒂利亚的道路，绝非仅仅统治梅塞塔高原的贫瘠土地，更要锻造统一的西班牙精神然后位于世界之巅。从收复失地运动的最终胜利，到黄金时代的巅峰辉煌，我们的天命是将伊比利亚的信仰、文化与军事输送到未知世界的尽头。无论是作为卡斯蒂利亚君王，还是统一的西班牙，我们都必须稳固欧洲腹地，同时汲取新大陆的无尽财富，以确立我们作为首个真正全球霸主的应得地位。"
 castile_missions_BUTTON_DETAILS: "点击查看统一伊比利亚与建立西班牙帝国的宏伟目标。"
 castile_missions_BUTTON_TOOLTIP: "\n\n"
