 mission_cas_internal_stability_desc: "中世纪晚期，派系纷争、贵族内讧与地方叛乱屡次动摇卡斯蒂利亚的统治根基。\n恢复内部稳定将使王室得以将精力转向行政管理、制度改革与对外扩张。"
 mission_cas_revitalize_order_of_the_band: "复兴绶带骑士团"
 mission_cas_revitalize_order_of_the_band_desc: "由阿方索十一世于1332年创立的绶带骑士团，旨在嘉奖忠诚的军事服务，并在贵族阶层中巩固王室权威。复兴此骑士团将重振尚武精神，使贵族阶层更紧密地团结在君权周围。"
 mission_cas_establish_santa_hermandad: "设立圣兄弟会"
 mission_cas_establish_santa_hermandad_desc: "经过数十年的内战与王权衰弱，卡斯蒂利亚的乡野已成为盗匪与无法无天的雇佣兵的天堂。显贵阶层日益坐大，俨然一个个小王，肆意恐吓乡间道路、扰乱至关重要的贸易路线。\n\n通过组建圣兄弟会，我们可以将各地民兵整合为欧洲首支由王室直接掌控的国家警察部队。这支“圣兄弟会”将巡逻各条道路、迅速伸张正义，并打破叛逆贵族的军事垄断，从而全面巩固我们的领地安全。"
 mission_cas_elaborate_court: "Elaborate Court"
 mission_cas_elaborate_court_desc: "The Castilian court evolved into a major center of ceremony, patronage, and political negotiation.\nA more elaborate court enhances royal prestige and mirrors the growing sophistication of European monarchies."
 mission_cas_spanish_culture: "Spanish Culture"
 mission_cas_spanish_culture_desc: "The gradual emergence of a shared Spanish identity drew from Castilian language, law, and custom. Promoting a unified culture strengthens cohesion across a realm historically divided by regional traditions."
 mission_cas_curb_the_power_of_the_clergy: "Curb the Power of the Clergy"
 mission_cas_curb_the_power_of_the_clergy_desc: "The Church wielded immense economic and political power in Castile, often rivaling royal authority. Limiting clerical autonomy brings ecclesiastical institutions into closer alignment with state interests."
 mission_cas_incorporate_military_orders: "Incorporate Military Orders"
 mission_cas_incorporate_military_orders_desc: "Orders such as Santiago, Calatrava, and Alcántara controlled vast lands and armies during the Reconquista. Their incorporation into royal authority transformed them from semi-independent powers into instruments of the state."
 mission_cas_patronato_real: "Patronato Real"
 mission_cas_patronato_real_desc: "The Patronato Real granted the Spanish Crown extensive control over church appointments in its domains. This arrangement ensured religious unity while strengthening royal oversight of ecclesiastical affairs."
 mission_cas_corregidores: "地方长官"
 mission_cas_corregidores_desc: "地方长官是王室派往各城镇代表君权进行治理的官员。他们的存在削弱了市政自治，并确保王室法律得到一贯执行。"
 mission_cas_manage_the_juros: "Manage the Juros"
 mission_cas_manage_the_juros_desc: "Juros, perpetual state bonds, formed the backbone of Castilian public finance. Proper management of this debt system was essential to avoiding insolvency and maintaining investor confidence."
 mission_cas_castrato_of_ensenada: "Castrato of Ensenada"
 mission_cas_castrato_of_ensenada_desc: "The mid-18th-century fiscal survey sought to rationalize taxation across Castile. Though controversial, it represented one of the most ambitious attempts at administrative modernization in Spanish history."
 mission_cas_constitution_of_cadiz: "Constitution of Cadiz"
 mission_cas_constitution_of_cadiz_desc: "Drafted in 1812 during the Peninsular War, the Constitution of Cádiz introduced liberal principles and national sovereignty. It marked a dramatic departure from absolutist tradition."
 mission_cas_university_of_salamanca: "University of Salamanca"
 mission_cas_university_of_salamanca_desc: "Founded in 1218, Salamanca became one of Europe’s leading centers of theology, law, and philosophy. Its scholars influenced imperial governance and debates on natural law and colonization."
 mission_cas_the_novatores: "The Novatores"
 mission_cas_the_novatores_desc: "The Novatores were reform-minded intellectuals who promoted science, rationalism, and administrative reform in late Habsburg Spain. Their ideas challenged scholastic orthodoxy and inspired Bourbon-era reforms."
 mission_cas_spanish_baroque: "Spanish Baroque"
 mission_cas_spanish_baroque_desc: "Spanish Baroque culture flourished in the 17th century, blending religious intensity with artistic innovation. Architecture, painting, and literature reinforced Catholic identity and royal authority."
 mission_cas_royal_academy_of_language: "Royal Academy of Language"
 mission_cas_royal_academy_of_language_desc: "Founded in 1713, the academy standardized Castilian Spanish and promoted linguistic unity. Language became a tool of governance and cultural cohesion across the empire."
 mission_cas_padron_real: "Padron Real"
 mission_cas_padron_real_desc: "The Padrón Real was the secret master map used by Spanish navigators and officials. Control of geographic knowledge provided Spain with a decisive advantage in overseas expansion."
 mission_cas_castilian_development: "Castilian Development"
 mission_cas_castilian_development_desc: "The Castilian heartland formed the demographic and economic core of the Spanish monarchy. Sustained investment here supported imperial administration and military recruitment."
 mission_cas_merino_wool: "Merino Wool"
 mission_cas_merino_wool_desc: "Castilian merino sheep produced Europe’s finest wool, forming a cornerstone of the medieval economy. Royal protection of transhumance routes ensured continued profitability."
 mission_cas_fairs_of_medina_del_campo: "Fairs of Medina del Campo"
 mission_cas_fairs_of_medina_del_campo_desc: "These international trade fairs linked Castile to European financial networks. Bills of exchange and credit instruments flourished alongside traditional commerce."
 mission_cas_feed_the_looms_of_flanders: "Feed the Looms of Flanders"
 mission_cas_feed_the_looms_of_flanders_desc: "Raw wool exports tied Castilian producers to Flemish textile centers. This relationship integrated Iberia into northern European manufacturing chains."
 mission_cas_expand_the_textile_industry: "Expand the Textile Industry"
 mission_cas_expand_the_textile_industry_desc: "Efforts to process wool domestically aimed to reduce dependence on foreign industry. Success promised greater value retention within the kingdom."
 mission_cas_consulado_de_burgos: "Consulado de Burgos"
 mission_cas_consulado_de_burgos_desc: "The Consulado regulated trade, shipping, and commercial law. It served as a powerful institution representing merchant interests."
 mission_cas_strengthen_the_mercheants: "Strengthen the Mercheants"
 mission_cas_strengthen_the_mercheants_desc: "Urban merchants provided vital tax revenue and credit. Empowering them encouraged commerce and reduced reliance on noble elites."
 mission_cas_work_the_land: "Work the Land"
 mission_cas_work_the_land_desc: "Agricultural productivity remained the backbone of Castilian society. Reclaiming land and improving yields supported population growth and state revenue."
 mission_cas_don_quixote: "Don Quixote"
 mission_cas_don_quixote_desc: "Published in 1605 and 1615, Cervantes’ work reflected social change and declining chivalric ideals. It became a foundational text of Spanish literature."
 mission_cas_cantabrian_iron_works: "Cantabrian Iron Works"
 mission_cas_cantabrian_iron_works_desc: "The ironworks of Cantabria and the Basque coast formed the metallurgical backbone of Castile from the late Middle Ages onward.\nHigh-quality iron from these regions supplied weapons, tools, anchors, and ship fittings essential for both military reform and Atlantic expansion."
 mission_cas_mercury_of_almaden: "Mercury of Almaden"
 mission_cas_mercury_of_almaden_desc: "The mercury mines of Almadén were among the most important in the world and became indispensable after the introduction of amalgamation in American silver mining.\n\nControl of mercury production allowed the Crown to regulate and tax silver output from Potosí and Zacatecas, directly tying Iberian resources to imperial wealth."
 mission_cas_early_industrialization: "Early Industrialization"
 mission_cas_early_industrialization_desc: "Before mechanization, Castile experienced proto-industrial growth through workshops, water-powered mills, and rural manufacturing.\nThese early industries increased output and specialization, laying the groundwork for later economic modernization despite structural limitations."
 mission_cas_domestic_manufacturing: "Domestic Manufacturing"
 mission_cas_domestic_manufacturing_desc: "Spanish reformers long sought to reduce dependence on foreign manufactured goods by encouraging domestic production.\nExpanding local manufacturing retained wealth within the realm and strengthened the fiscal base of the monarchy."
 mission_cas_arbitrista_reforms: "Arbitrista Reforms"
 mission_cas_arbitrista_reforms_desc: "The arbitristas were economic thinkers who analyzed Spain’s decline and proposed reforms ranging from tax restructuring to population policy. Though often dismissed at court, their writings deeply influenced later Bourbon-era reform programs."
 mission_cas_royal_factories: "Royal Factories"
 mission_cas_royal_factories_desc: "Royal manufactories, particularly under the Bourbon dynasty, aimed to produce strategic goods such as textiles, arms, and glass under state supervision. These factories embodied mercantilist policy and the Crown’s desire to direct economic development."
 mission_cas_bank_of_san_carlos: "Bank of San Carlos"
 mission_cas_bank_of_san_carlos_desc: "Founded in 1782, the Bank of San Carlos was established to stabilize state credit and manage public debt. It represented one of Spain’s earliest modern financial institutions and a crucial step toward fiscal reform."
 mission_cas_external_policies: "External Policies"
 mission_cas_external_policies_desc: "As Castile expanded into a global empire, coherent foreign policy became essential to managing alliances, dynastic claims, and rival powers. Diplomatic coordination increasingly complemented military force as a tool of statecraft."
 mission_cas_claim_the_crown_of_navarra: "Claim the Crown of Navarra"
 mission_cas_claim_the_crown_of_navarra_desc: "Navarra occupied a strategic position between Iberia and France, making its crown a recurring object of Castilian ambition. Dynastic claims and security concerns culminated in its eventual incorporation in the early 16th century."
 mission_cas_look_across_the_pyrenees: "Look Across the Pyrenees"
 mission_cas_look_across_the_pyrenees_desc: "Control of the Pyrenean passes was vital to both defense and diplomacy. Castilian rulers increasingly recognized that security on the peninsula required influence beyond the mountains."
 mission_cas_claim_the_pyreneean_brethren: "Claim the Pyreneean Brethren"
 mission_cas_claim_the_pyreneean_brethren_desc: "Shared cultural and dynastic ties were often invoked to justify intervention in neighboring realms. Such claims blended legal argument with military ambition in early modern diplomacy."
 mission_cas_expand_the_buffer_zone: "扩大缓冲区"
 mission_cas_expand_the_buffer_zone_desc: "缓冲领土是在被入侵时，延缓敌军的推进的区域。扩大这些区域可降低卡斯蒂利亚核心区域遭受外国攻击的脆弱性。"
 mission_cas_subdue_the_franks: "征服法兰克"
 mission_cas_subdue_the_franks_desc: "与法国势力的反复冲突塑造了卡斯蒂利亚的军事战略。消除北方威胁使王室得以专注于地中海及海外扩张。"
 mission_cas_papal_delegation: "教宗代表团"
 mission_cas_papal_delegation_desc: "与教廷的紧密合作为卡斯蒂利亚赢得了基督世界的正统承认与影响力。教宗的青睐巩固了西班牙作为天主教正统主要捍卫者的角色。"
 mission_cas_align_with_portugal: "与葡萄牙结盟"
 mission_cas_align_with_portugal_desc: "尽管存在竞争，卡斯蒂利亚与葡萄牙仍保持着联系和利益的一致。这种结盟减少了冲突，并增强了伊比利亚半岛在海外的势力。"
 mission_cas_strengthen_portuguese_ties: "加强葡萄牙关系"
 mission_cas_strengthen_portuguese_ties_desc: "婚姻联盟与政治合作深化了伊比利亚一体化进程。这些纽带最终促成了联合时期的形成，尽管往往以地方抵抗为代价。"
 mission_cas_iberian_union: "伊比利亚联盟"
 mission_cas_iberian_union_desc: "1580年西班牙与葡萄牙王室的联合造就了一个横跨大陆的帝国。尽管实力强大，但这一联合给行政管理带来了压力，并最终被证明是不稳定的。"
 mission_cas_deal_with_aragon: "处置阿拉贡"
 mission_cas_deal_with_aragon_desc: "阿拉贡王室保留了强大的法律传统与特权。要处理好其与卡斯蒂利亚的关系，需要谨慎谈判或果断改革。"
 mission_cas_seek_closer_ties_with_aragon: "寻求与阿拉贡建立更紧密的关系"
 mission_cas_seek_closer_ties_with_aragon_desc: "政治合作提供了一条无需公开冲突即可实现统一的道路。共享的思潮逐渐使各王室的利益趋于一致。"
 mission_cas_ask_for_concessions: "要求让步"
 mission_cas_ask_for_concessions_desc: "为换取忠诚与军事支持，君主常以特许权作为交换。这一做法在王室权威与政治现实之间取得了微妙平衡。"
 mission_cas_integrate_trinacria: "整合特里纳克里亚"
 mission_cas_integrate_trinacria_desc: "西西里长期饱受战乱，也是西班牙地中海战略的关键一环，行政整合强化了防御与税收。"
 mission_cas_alfonsos_legacy: "阿方索的遗产"
 mission_cas_alfonsos_legacy_desc: "阿拉贡的阿方索五世征服那不勒斯，确立了伊比利亚势力在意大利的地位。他的功绩为西班牙持续介入意大利事务提供了正当理由。"
 mission_cas_mediterranean_ports: "地中海港口"
 mission_cas_mediterranean_ports_desc: "巴塞罗那、瓦伦西亚和那不勒斯等港口是西班牙海军后勤的锚点。掌控这些枢纽确保了补给、贸易和舰队的机动性。"
 mission_cas_secure_the_mediterranean: "掌控地中海"
 mission_cas_secure_the_mediterranean_desc: "地中海地区仍由奥斯曼帝国、海盗及敌对势力争夺。西班牙的海上霸权保护了商业贸易与沿海领土的安全。"
 mission_cas_conquer_trinacria: "征服特里纳克里亚"
 mission_cas_conquer_trinacria_desc: "军事征服消除了地方反对势力和宿敌的领土主张。西西里岛由此成为地中海行动的稳固基地。"
 mission_cas_seize_naples: "夺取那不勒斯"
 mission_cas_seize_naples_desc: "那不勒斯曾是欧洲人口最稠密、最富庶的城市之一。夺取它确保了人力、税赋和战略纵深。"
 mission_cas_monopolize_genoese_trade: "垄断热那亚贸易"
 mission_cas_monopolize_genoese_trade_desc: "热那亚银行家为西班牙战争提供资金并管理帝国资金转移。掌控其贸易网络确保了信贷渠道和专业知识的获取。"
 mission_cas_prepare_the_reconquista: "Prepare the Reconquista"
 mission_cas_prepare_the_reconquista_desc: "The Reconquista forged Castilian military culture over centuries. Preparation renewed traditions of holy war and territorial expansion."
 mission_cas_legacy_of_pelayo: "Legacy of Pelayo"
 mission_cas_legacy_of_pelayo_desc: "Pelayo’s resistance at Covadonga became a foundational myth of Christian Iberia. His legacy symbolized divine favor and perseverance."
 mission_cas_guardias_viejas: "Guardias Viejas"
 mission_cas_guardias_viejas_desc: "The Guardias Viejas were elite royal troops tasked with protecting the Crown. Their discipline and loyalty strengthened central authority."
 mission_cas_combined_arms: "Combined Arms"
 mission_cas_combined_arms_desc: "Spain pioneered the integration of infantry, cavalry, and artillery in coordinated formations. This approach defined European warfare in the 16th century."
 mission_cas_expand_the_artillery_academy_of_segovia: "Expand the Artillery Academy of Segovia"
 mission_cas_expand_the_artillery_academy_of_segovia_desc: "Founded in 1764, the academy professionalized artillery training. Scientific education improved battlefield effectiveness."
 mission_cas_reform_the_tercios: "Reform the Tercios"
 mission_cas_reform_the_tercios_desc: "The Spanish tercios dominated European battlefields throughout the 16th century, combining pikes, swords, and firearms into flexible formations. Their success at battles such as Pavia and Mühlberg made them the backbone of Spanish military power, but by the 17th century changing tactics and improved enemy firepower began to expose their limitations.\n\nReforming the tercios represents a conscious effort to adapt tradition to modern warfare. By reorganizing command structures, standardizing training, and increasing the integration of firearms, Spain may preserve its military prestige—or even surpass it through innovation rather than nostalgia."
 mission_cas_colonial_military_duty: "Colonial Military Duty"
 mission_cas_colonial_military_duty_desc: "As Spain’s empire expanded across the Americas and Asia, the defense of distant territories could no longer rely solely on troops dispatched from Europe. Colonial militias, composed of settlers, indigenous auxiliaries, and free people of color, became essential to maintaining order and repelling foreign incursions.\n\nFormalizing colonial military obligations strengthens imperial cohesion and reduces reliance on overstretched metropolitan forces. At the same time, it acknowledges a historical reality: Spain’s empire was defended as much by local societies as by royal armies."
 mission_cas_spanish_military_reforms: "Spanish Military Reforms"
 mission_cas_spanish_military_reforms_desc: "From the late 17th century onward, Spanish military thinkers increasingly recognized the need for systemic reform. Defeats in wars against France and the Dutch Republic exposed weaknesses in logistics, recruitment, and command that could no longer be ignored.\n\nComprehensive military reform modernizes the army through improved discipline, standardized equipment, and professional officer corps. Whether Spain regains battlefield dominance or merely stabilizes its position depends on how decisively these reforms are implemented."
 mission_cas_undermine_dutch_defenses: "Undermine Dutch Defenses"
 mission_cas_undermine_dutch_defenses_desc: "The Dutch Republic relied on some of the most advanced fortification systems in Europe, including trace italienne designs and extensive water defenses. Spanish commanders were forced to master prolonged sieges, engineering, and attritional warfare in the Low Countries.\n\nUndermining Dutch defenses reflects a strategic shift from decisive battles to systematic pressure. Through sieges, supply disruption, and engineering expertise, Spain seeks to overcome not just armies, but entire defensive systems."
 mission_cas_threaten_the_dutch: "威胁荷兰人"
 mission_cas_threaten_the_dutch_desc: "在八十年战争中，军事压力常被用来迫使对方进行谈判。突袭、围城和海上封锁旨在耗尽荷兰的资源并打击平民士气。\n\n西班牙通过威胁荷兰核心地区，试图将叛乱的代价直接强加于其昔日臣民身上。此举或许会带来屈服，也可能激起更激烈的抵抗。"
 mission_cas_subjugate_the_netherlands: "征服尼德兰"
 mission_cas_subjugate_the_netherlands_desc: "尼德兰曾是欧洲最富庶的地区之一，其忠诚在经济上至关重要，在政治上却充满争议。宗教冲突、地方特权与外国干涉，使征服这片土地演变为一场跨越世代的斗争。\n\n征服尼德兰意味着通过武力或怀柔手段重建帝国权威。统治方式将决定这片土地是重焕繁荣，还是埋下长久怨恨的种子。"
 mission_cas_reclaim_andalucia: "收复安达卢西亚"
 mission_cas_reclaim_andalucia_desc: "1492年格拉纳达陷落后，安达卢西亚经历了深刻的人口与社会变革。土地重新分配、移民与宗教皈依重塑了这片区域的身份认同。\n\n收复安达卢西亚巩固了王室在这片必争之地的权威，其港口、农业与城镇中心构成了西班牙经济与帝国霸权的基石。"
 mission_cas_continue_the_reconquista: "继续收复失地运动"
 mission_cas_continue_the_reconquista_desc: "收复失地运动不仅是一场军事行动，更是一种塑造身份认同的意识形态框架。即便在伊比利亚半岛稳固之后，其语言与象征仍被用来为海外扩张提供正当性。\n\n继续收复失地运动体现了一条虽不符合史实却合乎情理的发展路径：西班牙将帝国征服视为神圣职责的延伸。"
 mission_cas_end_the_pirate_threat: "End the Pirate Threat"
 mission_cas_end_the_pirate_threat_desc: "Barbary corsairs, often operating with Ottoman backing, raided Spanish coasts and shipping throughout the Mediterranean. These attacks disrupted trade, depopulated coastal regions, and challenged royal authority.\n\nEnding the pirate threat secures maritime commerce and restores confidence in royal protection. It also signals Spain’s determination to dominate the western Mediterranean."
 mission_cas_integrate_the_taifas: "Integrate the Taifas"
 mission_cas_integrate_the_taifas_desc: "Former taifa territories retained distinct legal, cultural, and economic structures long after conquest. Their integration required sustained administrative effort rather than mere military victory.\n\nBy fully integrating these regions, Spain transforms conquest into governance. Stability replaces fragmentation, and local elites are drawn into imperial structures."
 mission_cas_religious_unification: "Religious Unification"
 mission_cas_religious_unification_desc: "Religious unity was widely regarded as essential to political stability in early modern Spain. Conversion campaigns, expulsions, and surveillance aimed to eliminate perceived internal threats.\n\nWhile historically divisive, religious unification offers a path to centralized authority and ideological cohesion. Its long-term consequences, however, may include depopulation and economic disruption."
 mission_cas_pablo_de_olavide: "Pablo de Olavide"
 mission_cas_pablo_de_olavide_desc: "Pablo de Olavide was a leading figure of the Spanish Enlightenment, responsible for ambitious settlement and administrative reforms in Andalusia. His projects emphasized rational planning, agricultural productivity, and civic order.\n\nSupporting such reformers offers Spain a chance to modernize internally. Yet resistance from entrenched interests may limit how far Enlightenment ideals can reshape society."
 mission_cas_join_the_counter_reformation: "Join the Counter Reformation"
 mission_cas_join_the_counter_reformation_desc: "Spain emerged as one of the foremost champions of the Counter-Reformation, enforcing doctrinal unity at home and supporting Catholic causes abroad. Its universities, clergy, and missionaries formed a global network of religious influence.\n\nBy embracing this role, Spain strengthens its moral authority within Christendom. At the same time, it binds its foreign policy ever more tightly to confessional conflict."
 mission_cas_the_spanish_inquisition: "The Spanish Inquisition"
 mission_cas_the_spanish_inquisition_desc: "Established in 1478, the Inquisition sought to police orthodoxy through investigation, censorship, and punishment. Its reach extended into daily life, shaping behavior and belief.\n\nInstitutionalizing the Inquisition reinforces ideological control but risks intellectual stagnation. The balance between unity and repression defines Spain’s internal trajectory."
 mission_cas_the_spanish_netherlands: "The Spanish Netherlands"
 mission_cas_the_spanish_netherlands_desc: "The Spanish Netherlands were both a jewel and a burden, rich in commerce yet resistant to centralized rule. Governing them required constant military presence and administrative compromise.\n\nMaintaining control here tests the limits of imperial endurance. Success promises immense wealth; failure invites decline."
 mission_cas_the_spanish_road: "The Spanish Road"
 mission_cas_the_spanish_road_desc: "The Spanish Road was a complex logistical corridor linking Italy to the Low Countries through allied and contested territories. It enabled Spain to sustain long-distance warfare despite naval threats.\n\nSecuring this route demonstrates mastery of early modern logistics. Without it, imperial commitments unravel."
 mission_cas_expand_the_ataranzanas: "Expand the Ataranzanas"
 mission_cas_expand_the_ataranzanas_desc: "Royal shipyards, particularly in Seville and Barcelona, formed the industrial base of Spanish naval power. Expansion increased ship output and standardized construction.\n\nA stronger shipbuilding sector supports both commerce and war. It anchors Spain’s maritime ambitions in material capacity."
 mission_cas_presence_in_the_ivory_coast: "Presence in the Ivory Coast"
 mission_cas_presence_in_the_ivory_coast_desc: "Spanish trading posts along the African coast facilitated access to gold, slaves, and navigational knowledge. These outposts connected Atlantic routes and imperial supply chains.\n\nEstablishing a presence here reflects Spain’s participation in early global trade networks. Control brings profit—and moral consequence."
 mission_cas_high_seas_presence: "High Seas Presence"
 mission_cas_high_seas_presence_desc: "Maintaining fleets on distant seas deterred piracy and rival powers. Permanent naval presence became a defining feature of global empires.\n\nHigh seas dominance signals Spain’s continued relevance in an increasingly maritime world."
 mission_cas_rival_the_royal_navy: "Rival the Royal Navy"
 mission_cas_rival_the_royal_navy_desc: "England’s naval rise challenged Spanish dominance in the Atlantic. Ship design, gunnery, and doctrine evolved rapidly in response.\n\nRivaling the Royal Navy demands sustained investment and innovation. The outcome determines control of the seas."
 mission_cas_the_invincible_armada: "The Invincible Armada"
 mission_cas_the_invincible_armada_desc: "The Armada of 1588 represented Spain’s most ambitious naval undertaking, intended to overthrow English resistance. Its failure revealed the limits of logistical coordination and weather-dependent strategy.\n\nReimagining the Armada offers an ahistorical opportunity to correct past mistakes. Success would alter the balance of power in Europe."
 mission_cas_explore_the_new_world: "Explore the New World"
 mission_cas_explore_the_new_world_desc: "Spanish exploration expanded geographical knowledge and imperial claims at unprecedented speed. Navigators combined inherited medieval charts with new empirical methods.\n\nContinued exploration sustains imperial momentum and opens new paths to wealth and influence."
 mission_cas_foothold_in_the_americas: "Foothold in the Americas"
 mission_cas_foothold_in_the_americas_desc: "Early colonies faced disease, resistance, and isolation. Survival required adaptation, alliances, and institutional support.\n\nA secure foothold transforms exploration into empire."
 mission_cas_across_the_pacific: "Across the Pacific"
 mission_cas_across_the_pacific_desc: "The Manila Galleons created the first regular transpacific trade route. Silver from the Americas flowed to Asia in exchange for luxury goods.\n\nThis connection completed a truly global empire."
 mission_cas_las_islas_filipinas: "菲律宾群岛"
 mission_cas_las_islas_filipinas_desc: "菲律宾将西班牙的影响力延伸至东南亚，并成为跨洋交流的枢纽，其治理在很大程度上依赖于宗教团体和地方中介。\n\n这种融合体现了西班牙在大西洋世界之外的适应能力。"
 mission_cas_secure_the_caribbean: "确保加勒比地区安全"
 mission_cas_secure_the_caribbean_desc: "加勒比海是通往美洲的门户，也是海盗与宿敌的聚集地。构筑防御工事与加强巡逻变得至关重要。\n\n掌控该区域，就是守护帝国的命脉。"
 mission_cas_sugar_of_hispaniola: "伊斯帕尼奥拉蔗糖"
 mission_cas_sugar_of_hispaniola_desc: "甘蔗种植园改变了加勒比地区的经济和劳工体系，奴隶劳动支撑起了巨大的利润。  "
 mission_cas_maya_conquest: "玛雅征服"
 mission_cas_maya_conquest_desc: "与中央集权帝国不同，玛雅城邦抵抗了数个世纪。征服过程是渐进且不均衡的。\n\n坚持与适应是西班牙在此地扩张的特点。"
 mission_cas_cuban_cigars: "古巴雪茄"
 mission_cas_cuban_cigars_desc: "古巴烟草成为帝国最有价值的奢侈品出口之一，其生产受到皇家垄断的严格管控。\n\n这一贸易使宗主国与殖民地双双获利。"
 mission_cas_aztec_conquest: "阿兹特克征服"
 mission_cas_aztec_conquest_desc: "1521年特诺奇蒂特兰的陷落重塑了美洲格局。结盟策略与疫病传播成为决定性因素。\n\n这一历史事件奠定了西班牙帝国权力的基石。"
 mission_cas_viceroyalty_new_spain: "Viceroyalty New Spain"
 mission_cas_viceroyalty_new_spain_desc: "New Spain became the administrative heart of the empire. Bureaucracy and law replaced conquest.\n\nGovernance ensured longevity."
 mission_cas_new_world_goods: "New World Goods"
 mission_cas_new_world_goods_desc: "Silver, sugar, and tobacco reshaped global markets. Spain became a central node of early globalization.\n\nEconomic power flowed across oceans."
 mission_cas_viceroyalty_new_granada: "Viceroyalty New Granada"
 mission_cas_viceroyalty_new_granada_desc: "Administrative reform improved oversight in northern South America. Gold and trade supported imperial finance.\n\nDecentralization strengthened control."
 mission_cas_viceroyalty_peru: "Viceroyalty Peru"
 mission_cas_viceroyalty_peru_desc: "Potosí’s silver financed wars across Europe. Peru was the empire’s fiscal engine.\n\nIts administration was vital to imperial survival."
 mission_cas_viceroyalty_rio_de_la_plata: "Viceroyalty Rio de la Plata"
 mission_cas_viceroyalty_rio_de_la_plata_desc: "Established in 1776, it strengthened control of the southern cone. Buenos Aires emerged as a major port.\n\nTrade reshaped the region."
 mission_cas_establish_treasure_fleets: "Establish Treasure Fleets"
 mission_cas_establish_treasure_fleets_desc: "Convoy systems protected bullion shipments from piracy. Coordination ensured revenue flow.\n\nImperial finance depended on their success."
 mission_cas_siglio_de_oro: "Siglio de Oro"
 mission_cas_siglio_de_oro_desc: "Spain’s Golden Age combined cultural brilliance with imperial reach. Art, literature, and power converged.\n\nYet success carried hidden costs."
 mission_cas_imperial_ambitions: "Imperial Ambitions"
 mission_cas_imperial_ambitions_desc: "Global dominance defined Spanish policy for centuries. Ambition strained resources and institutions.\n\nThe empire’s fate hinged on balance."
 mission_cas_colonial_administration: "Colonial Administration"
 mission_cas_colonial_administration_desc: "Bureaucracy governed vast overseas territories through councils and viceroys. Administration turned conquest into empire.\n\nOrder preserved imperial cohesion."
 mission_cas_plus_ultra: "Plus Ultra"
 mission_cas_plus_ultra_desc: "Castile has fulfilled its destiny: the Iberian kingdoms are united, Granada has fallen, and the seas bear the banners of Spanish explorers from the Indies to the Americas. Trade, culture, and faith flourish across the globe, and the crown’s power reaches heights that once seemed impossible.\n\nYet history is not finished. Beyond the known world, new lands, unknown peoples, and untold wealth await those bold enough to shape the future. Will Spain cement its legacy as the greatest empire the world has ever seen, or will ambition lead it to paths history never took? The age of 'Plus Ultra' has only just begun."
 castile_missions_events.1.t: "The Constitution of Cadiz"
 castile_missions_events.1.d: "With the winds of liberalism sweeping across Europe, the Cortes of Cadiz has drafted a radical new constitution. 'La Pepa', as it is affectionately known, aims to establish a constitutional monarchy and dismantle the old absolutist state. Crucially, this document debates the status of our vast overseas territories.\n\nHistorically, the failure to fully integrate the colonies as equal provinces accelerated the Spanish American wars of independence. We stand at a crossroads: do we embrace our colonial subjects as equal citizens to ensure their loyalty, or do we continue the ahistorical approach of exploiting their wealth as mere resources to fund the metropole?"
 castile_missions_events.1.a: "They are Spaniards of both hemispheres. Ensure their loyalty."
 castile_missions_events.1.b: "The colonies exist to enrich the Crown. Increase the quotas!"
 castile_missions_events.2.t: "The Silk Weavers of the Alpujarras"
 castile_missions_events.2.d: "Following the Reconquista, the highly lucrative silk industry of Granada remains largely in the hands of the Morisco population. Their techniques, honed over centuries of Moorish rule, produce some of the finest textiles in the Mediterranean.\n\nHistorically, cultural suppression and heavy taxation led to the devastating Morisco Revolt and their eventual expulsion, destroying this economic engine. Our advisors present an ahistorical alternative: if we grant them leniency and protect their customs, their looms could bring immense wealth to the Crown. Shall we tolerate their ways for the sake of prosperity, or enforce strict integration and extract immediate wealth?"
 castile_missions_events.2.a: "Protect the weavers. Let the silk flow, regardless of their customs."
 castile_missions_events.2.b: "Extract their wealth directly. The Crown needs gold now."
 castile_missions_events.3.t: "The Crown of Navarre"
 castile_missions_events.3.d: "The small kingdom of Navarre stands as a crucial buffer between our lands and the French, controlling the passes of the Pyrenees. Dynastic intermarriages and political maneuvering have given us a strong pretext to intervene in their succession.\n\nHistorically, Ferdinand the Catholic used controversial papal bulls and sheer military force in 1512 to conquer Navarre and bring it into the Spanish fold as a unified realm. We must decide our grand strategy: shall we press a direct dynastic claim to their throne to establish a peaceful personal union, or simply march our armies to force them into a subservient vassalage?"
 castile_missions_events.3.a: "Our blood gives us the right to rule them as equals."
 castile_missions_events.3.b: "They are but a buffer state. Force them to bend the knee."
 castile_missions_events.4.t: "The Aragonese Question"
 castile_missions_events.4.d: "The crowns of Castile and Aragon have long shared the Iberian peninsula, their destinies intertwined by the great House of [ROOT.GetDynasty.GetName].\n\nHistorically, a diplomatic union through marriage—the famed 'Iberian Wedding' of Isabella and Ferdinand—forged a peaceful, dual-monarchy that dominated Europe and the Mediterranean. However, the persistent rivalries between our courts offer an ahistorical path. We possess the military might to crush Aragonese independence entirely and forge a centralized, Castilian-dominated Spain through the fire of conquest. Which path shall we take?"
 castile_missions_events.4.a: "Let us unite our crowns in peace and holy matrimony."
 castile_missions_events.4.b: "Castile will rule Iberia alone. Prepare the armies!"
 castile_missions_events.5.t: "The Low Countries Divergence"
 castile_missions_events.5.d: "The wealthy and densely populated Low Countries are a jewel of European commerce, but their independent-minded burghers and disparate local laws make them notoriously difficult to govern.\n\nHistorically, the heavy-handed centralization efforts of Philip II sparked the devastating Eighty Years' War, birthing the Dutch Republic. To prevent this, our commanders suggest an alternative strategy: we must single out and thoroughly subjugate one key province to serve as our absolute anchor of power in the region, bringing the rest to heel through intimidation. Should we focus our wrath on the wealthy merchants of Flanders, the strategic center of Brabant, or the seafaring rebels of Holland?"
 castile_missions_events.5.a: "Subjugate Flanders and secure the ports of Bruges."
 castile_missions_events.5.b: "Brabant is the key to the region. Take Antwerp."
 castile_missions_events.5.c: "Holland is the greatest threat. Crush the Hague."
