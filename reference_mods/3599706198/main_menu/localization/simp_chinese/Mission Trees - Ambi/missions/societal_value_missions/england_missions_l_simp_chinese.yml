 STATIC_MODIFIER_DESC_protestant_leadership_desc: "英格兰领导着国际新教事业。"
 STATIC_MODIFIER_NAME_magna_carta_tradition: "《大宪章》传统"
 STATIC_MODIFIER_DESC_magna_carta_tradition_desc: "《大宪章》对王权设立了限制。"
 STATIC_MODIFIER_NAME_english_common_law: "英格兰习惯法系"
 STATIC_MODIFIER_DESC_english_common_law_desc: "习惯法提供了稳定的法律框架。"
 STATIC_MODIFIER_NAME_glorious_revolution: "光荣革命"
 STATIC_MODIFIER_DESC_glorious_revolution_desc: "光荣革命确立了君主立宪制。"
 STATIC_MODIFIER_NAME_british_constitution: "英国宪法"
 STATIC_MODIFIER_DESC_british_constitution_desc: "宪法框架规范了君主与议会之间的关系。"
 STATIC_MODIFIER_NAME_english_cultural_renaissance: "英格兰文化复兴"
 STATIC_MODIFIER_DESC_english_cultural_renaissance_desc: "英格兰的艺术与文化正蓬勃发展。"
 STATIC_MODIFIER_NAME_oxford_university: "牛津大学"
 STATIC_MODIFIER_DESC_oxford_university_desc: "牛津大学是领先的学术中心。"
 STATIC_MODIFIER_NAME_royal_society_established: "皇家学会成立"
 STATIC_MODIFIER_DESC_royal_society_established_desc: "皇家学会推动科学知识的进步。"
 STATIC_MODIFIER_NAME_redcoat_regiments: "红衫军"
 STATIC_MODIFIER_DESC_redcoat_regimens_desc: "专业红衫步兵构成军队的中坚力量。"
 STATIC_MODIFIER_NAME_industrial_revolution: "工业革命"
