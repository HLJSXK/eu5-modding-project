 STATIC_MODIFIER_DESC_parliamentary_government_desc: "运转良好的议会能提供稳定的政府与正统性。"
 STATIC_MODIFIER_NAME_balanced_constitution: "平衡宪法"
 STATIC_MODIFIER_DESC_balanced_constitution_desc: "权力在君主与议会之间得到平衡，确保了国家的稳定。"
 STATIC_MODIFIER_NAME_welsh_integration: "威尔士整合"
 STATIC_MODIFIER_DESC_welsh_integration_desc: "威尔士已被并入王国，提供了人力与资源。"
 STATIC_MODIFIER_NAME_northern_loyalty: "北方忠诚"
 STATIC_MODIFIER_DESC_northern_loyalty_desc: "英格兰北部忠诚且稳固。"
 STATIC_MODIFIER_NAME_irish_expansion: "爱尔兰扩张"
 STATIC_MODIFIER_DESC_irish_expansion_desc: "英格兰在爱尔兰的控制已建立并持续扩张。"
 STATIC_MODIFIER_NAME_norman_heritage_restored: "诺曼遗产得以恢复"
 STATIC_MODIFIER_DESC_norman_heritage_restored_desc: "诺曼底已重归英格兰掌控，与诺曼传统重新联结。"
 STATIC_MODIFIER_NAME_dual_monarchy_established: "二元君主制确立"
 STATIC_MODIFIER_DESC_dual_monarchy_established_desc: "与法兰西的联合统治缔造了二元君主制。"
 STATIC_MODIFIER_NAME_royal_navy_established: "皇家海军成立"
 STATIC_MODIFIER_DESC_royal_navy_established_desc: "一支专业的皇家海军已经建立起来。"
 STATIC_MODIFIER_NAME_naval_expansion: "海军扩张"
 STATIC_MODIFIER_DESC_naval_expansion_desc: "海军正在迅速扩张并实现现代化。"
 STATIC_MODIFIER_NAME_royal_marines_established: "皇家海军陆战队成立"
 STATIC_MODIFIER_DESC_royal_marines_established_desc: "皇家海军陆战队提供精锐的两栖作战能力。"
 STATIC_MODIFIER_NAME_ruler_of_the_waves: "海上霸主"
 STATIC_MODIFIER_DESC_ruler_of_the_waves_desc: "英国的海上霸权在全球范围内无可匹敌。"
 STATIC_MODIFIER_NAME_merchant_companies_chartered: "特许成立商人公司"
