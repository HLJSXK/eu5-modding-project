 england_mission_events.1.t: "英格兰王位稳固"
 england_mission_events.1.d: "我们的王位如今已坚不可摧。贵族们接受了我们的统治，继承顺序明确，王国也处于和平之中。既然王冠已牢牢戴在我们头上，我们必须决定如何巩固权力，建立不朽的功业。"
 england_mission_events.1.a: "确立金雀花王朝权威"
 england_mission_events.1.b: "扩大王室特权"
 england_mission_events.1.a.tt: "强调我们的宗族传承，在接下来的十五年内强化王权，建立强大的中央集权君主制。"
 england_mission_events.1.b.tt: "扩大君主权力，加强王权并巩固对王国长达十二年的统治。"
 england_mission_events.2.t: "伦敦改造"
 england_mission_events.2.d: "伦敦已从一座拥挤的中世纪城市，发展成为繁荣的大都市。市场贸易繁荣，建筑日益高耸，人口因商人、工匠和学者的涌入而不断增长。现在，我们必须决定首都发展的方向。"
 england_mission_events.2.a: "专注商业"
 england_mission_events.2.b: "推广文化"
 england_mission_events.2.a.tt: "将伦敦打造为商业重镇，拓展其市场与贸易网络，在二十五年内实现繁荣度增长。"
 england_mission_events.2.b.tt: "将伦敦打造成文化中心，通过资助艺术与学术来提升我们的威望和文化影响力。"
 england_mission_events.3.t: "金羊毛"
 england_mission_events.3.d: "英格兰羊毛冠绝欧洲，从佛兰德到佛罗伦萨的布料商人都争相求购。我们的羊群遍布山野，商人日益富足，商路繁忙。如今我们必须决定如何进一步拓展这个利润丰厚的产业。"
 england_mission_events.3.a: "拓展贸易网络"
 england_mission_events.3.b: "发展制造业"
 england_mission_events.3.a.tt: "扩大我们的羊毛出口网络，这将提升贸易收入，并在未来二十年内满足市民阶层的需求。"
 england_mission_events.3.b.tt: "发展国内布匹制造业，将更多利润留在国内并提高生产收入。"
 england_mission_events.4.t: "议会召开"
 england_mission_events.4.d: "上议院与下议院议员、骑士以及各城镇的市民代表齐聚威斯敏斯特。这个代议制议会能够使我们的统治合法化，提供治国建议，并批准税收。但这个议会应当采取何种形式，又该掌握多大的权力呢？"
 england_mission_events.4.a: "建立强大的议会"
 england_mission_events.4.b: "平衡王室与权力"
 england_mission_events.4.a.tt: "建立强大的议会传统，这将提升正统性并为政府带来二十年的稳定统治。"
 england_mission_events.4.b.tt: "制定一部平衡的宪法，在强化君主权威的同时保障国家稳定。"
 england_mission_events.5.t: "威尔士臣服"
 england_mission_events.5.d: "威尔士的诸位王公已俯首称臣，他们的城堡如今飘扬着英格兰的旗帜，英格兰的法律也延伸至斯诺登尼亚的群山之中。随着威尔士牢牢掌握在我们手中，我们必须决定如何将这片新领土纳入我们的王国。"
 england_mission_events.5.a: "完全统一"
 england_mission_events.5.b: "逐步同化"
 england_mission_events.5.a.tt: "完全整合威尔士，在所有威尔士领土上添加英格兰核心，并获得大量人力。"
 england_mission_events.5.b.tt: "推行渐进同化政策，在威尔士地区稳步提升同化进程的同时确保社会稳定。"
 england_mission_events.6.t: "北方已定"
 england_mission_events.6.d: "叛乱已被镇压，城堡得以重建，忠诚的领主遍布英格兰北部。这片曾经动荡的区域如今坚定地支持王权。现在我们必须决定如何确保其持续的忠诚与安全。"
 england_mission_events.6.a: "奖励忠诚度"
 england_mission_events.6.b: "维持军事存在"
 england_mission_events.6.a.tt: "以特权与自治嘉奖北方忠诚，确保十五年安定与支持。"
 england_mission_events.6.b.tt: "在北方维持强大的军事存在，加固城堡并通过戒严确保该区域安全。"
 england_mission_events.7.t: "爱尔兰战役开始"
 england_mission_events.7.d: "我们的军队已登陆翡翠岛，准备开始征服爱尔兰。爱尔兰诸王分裂而孱弱，无力抵抗我们纪律严明的部队。但这场战役该如何展开呢？"
 england_mission_events.7.a: "完全征服"
 england_mission_events.7.b: "建立桥头堡"
 england_mission_events.7.a.tt: "发动全面入侵，获得对爱尔兰关键领土的宣称权，并大幅提升陆军传统。"
 england_mission_events.7.b.tt: "建立一个安全的桥头堡，为未来扩张做准备，同时改善与爱尔兰统治者的关系。"
 england_mission_events.8.t: "爱尔兰被征服"
 england_mission_events.8.d: "爱尔兰最后的抵抗已被粉碎，整座岛屿如今都承认英格兰的统治。但问题依然存在：我们该如何治理这片新征服的土地？"
 england_mission_events.8.a: "爱尔兰种植园"
 england_mission_events.8.b: "盖尔式安置"
 england_mission_events.8.a.tt: "建立英格兰种植园，将忠诚的殖民者安置在爱尔兰土地上，以巩固控制并创造财富。"
 england_mission_events.8.b.tt: "顺应盖尔人的习俗与统治者，通过合作而非对抗来维持稳定。"
 england_mission_events.9.t: "对苏格兰提出宣称"
 england_mission_events.9.d: "我们的谱系学家已通过婚姻与血统记录下我们对苏格兰王位的合法主张。斯图亚特王朝日渐衰微，苏格兰正处脆弱之时。我们必须决定如何推进我们的王位宣称。"
 england_mission_events.9.a: "投资苏格兰土地"
 england_mission_events.9.b: "英格兰将统治，苏格兰将追随。"
 england_mission_events.9.a.tt: "这将会耗费我们大量资源，但从长远来看，对苏格兰地区的投资将有助于我们整体经济的发展。"
 england_mission_events.9.b.tt: "我们将利用新获得领地的资源来加强我们的军事和经济。"
 england_mission_events.10.t: "大不列颠统一"
 england_mission_events.10.d: "自罗马时代以来，不列颠全境首次统一于一位君主之下。英格兰、苏格兰与威尔士诸王国如今合为一体。我们该如何治理这个新统一的王国？"
 england_mission_events.10.a: "建立联合王国"
 england_mission_events.10.b: "拥抱岛屿身份"
 england_mission_events.10.a.tt: "不列颠群岛的心脏位于伦敦，我们将以此为中心凝聚力量。"
 england_mission_events.10.b.tt: "拥抱我们的岛屿身份，强化海军实力，赢得统治整个不列颠的正统性。"
 england_mission_events.11.t: "联合王国"
 england_mission_events.11.d: "《联合法案》已签署，英格兰与苏格兰的王权及议会正式合并。大不列颠王国就此诞生。这个新生国家的特质应当如何塑造？"
 england_mission_events.11.a: "君主立宪制"
 england_mission_events.11.b: "统一身份"
 england_mission_events.11.a.tt: "建立君主立宪制，获得永久性加成，若当前政体不是大不列颠，则可能改变政体类型。"
 england_mission_events.11.b.tt: "推广统一的英国认同，加速文化融合并显著提升正统性。"
 england_mission_events.12.t: "法兰西王冠宣称"
 england_mission_events.12.d: "我们的使者已在威斯敏斯特宫廷前宣告了我们继承法兰西王位的权利。百合花纹章理应与英格兰雄狮一同飘扬在我们的旗帜上。现在，我们必须决定如何推进这项古老的主张。"
 england_mission_events.12.a: "重燃百年战争"
 england_mission_events.12.b: "外交施压"
 england_mission_events.12.a.tt: "重燃战火，获得强力宣战理由、对关键法国领土的核心宣称，并提升陆军传统。"
 england_mission_events.12.b.tt: "施加外交压力，在维持与法国更好关系的同时强化我方宣称的正统性。"
 england_mission_events.13.t: "诺曼底光复"
 england_mission_events.13.d: "征服者威廉的故土重归英格兰掌控。鲁昂、卡昂和巴约的城墙上飘扬着我们的旗帜。我们该如何治理这片光复的公国？"
 england_mission_events.13.a: "接纳诺曼遗产"
 england_mission_events.13.b: "巩固我们的控制"
 england_mission_events.13.a.tt: "拥抱我们的诺曼底传统，更快地融入诺曼底。"
 england_mission_events.13.b.tt: "专注于巩固控制权、提升整合进程并满足贵族需求。"
 england_mission_events.14.t: "法国胜利"
 england_mission_events.14.d: "漫长的战争终于结束。我们的旗帜飘扬在巴黎上空，法国国王已承认我们的至高地位。历经数百年的冲突，英格兰终于迎来了胜利。我们应当如何定义这场胜利的性质？"
 england_mission_events.14.a: "二元君主制"
 england_mission_events.14.b: "大陆霸权"
 england_mission_events.14.a.tt: "建立双重君主制，与法国形成共主邦联，并获得法国关键领土的核心宣称。"
 england_mission_events.14.b.tt: "建立大陆霸权，向法国索取宣称，并获得对整个区域的主权要求。"
 england_mission_events.15.t: "皇家海军"
 england_mission_events.15.d: "如今，我们的港口停泊着列装战舰，洁白的船帆上印着圣乔治的红色十字。英格兰已拥有一支配得上大国地位的海军。我们应当如何继续推进海军建设？"
 england_mission_events.15.a: "扩充舰队"
 england_mission_events.15.b: "造船计划"
 england_mission_events.15.a.tt: "专注于舰队扩张，提升海军传统和沿海造船中心的繁荣度。"
 england_mission_events.15.b.tt: "启动大规模造船计划，立即获得船只及大量生产资金。"
 england_mission_events.16.t: "皇家海军陆战队"
 england_mission_events.16.d: "我们的新型两栖部队已准备就绪——这些士兵既能海战，也能突袭敌方海岸。皇家海军陆战队将赋予我们其他国家所不具备的能力。这支新部队该如何部署？"
 england_mission_events.16.a: "两栖作战专家"
 england_mission_events.16.b: "海军陆战队"
 england_mission_events.16.a.tt: "专注于两栖作战，建立永久性海军陆战队基地，并积累显著的海军传统。"
 england_mission_events.16.b.tt: "发展为海军陆战队，提升陆军传统并获得联合作战能力。"
 england_mission_events.17.t: "不列颠统治海洋"
 england_mission_events.17.d: "从加勒比海到印度洋，我们的舰船巡弋着每一片海域。没有哪支外国舰队敢挑战我们。不列颠真正统治着波涛。我们该如何运用这份海上霸权呢？"
 england_mission_events.17.a: "海军霸权"
 england_mission_events.17.b: "海上霸权"
 england_mission_events.17.a.tt: "确立完全的海上霸权，获得永久加成并探索新航线。"
 england_mission_events.17.b.tt: "专注于海上霸权，获取海军传统并提升水手容量。"
 england_mission_events.18.t: "特许贸易公司"
 england_mission_events.18.d: "手持皇家特许状，我们的贸易公司即将主宰世界贸易。他们将建立商站、签订条约，从遥远大陆运回财富。应当让他们的重心放在何处？"
 england_mission_events.18.a: "贸易垄断"
 england_mission_events.18.b: "商业扩张"
 england_mission_events.18.a.tt: "建立贸易垄断，满足市民需求并在二十年内增强首都的商人势力。"
 england_mission_events.18.b.tt: "专注于商业扩张，获取大量黄金并提升市场城镇的繁荣度。"
 england_mission_events.19.t: "香料贸易主导"
 england_mission_events.19.d: "东方的香料如今主要经由英格兰人之手流通。胡椒、肉桂、肉豆蔻和丁香充盈着我们的仓库，富足了我们的商人。我们该如何管理这笔利润丰厚的贸易？"
 england_mission_events.19.a: "完全支配"
 england_mission_events.19.b: "东方扩张"
 england_mission_events.19.a.tt: "建立完全统治，极大地满足市民阶层，并发展香料生产领地。"
 england_mission_events.19.b.tt: "拓展我们的东方贸易，获取大量黄金并在东印度群岛建立宣称。"
 england_mission_events.20.t: "伦敦证券交易所"
 england_mission_events.20.d: "在三顶王冠的纹章之下，商人与银行家齐聚一堂，交易股票与证券。伦敦已然成为世界的金融中心。我们该如何发展这个金融枢纽呢？"
 england_mission_events.20.a: "全球金融中心"
 england_mission_events.20.b: "银行业中心"
 england_mission_events.20.a.tt: "使伦敦成为全球金融中心，显著发展城市并获得大量黄金。"
 england_mission_events.20.b.tt: "发展成银行业中心，提升威望并满足市民阶层的需求。"
 england_mission_events.21.t: "地理大发现时代"
 england_mission_events.21.d: "在王室的支持下，探险家们扬帆驶向未知海域。新大陆正待发现，随之而来的是属于英格兰的财富与荣耀。在这个地理大发现时代，我们应当以何为重？"
 england_mission_events.21.a: "探索与发现"
 england_mission_events.21.b: "商人冒险家"
 england_mission_events.21.a.tt: "专注于探索，获取探险家并发现新的海上航线。"
 england_mission_events.21.b.tt: "支持商业冒险家，获取黄金并满足市民阶层。"
 england_mission_events.22.t: "新世界"
 england_mission_events.22.d: "大西洋沿岸的殖民地已初具规模。殖民者开垦土地、兴建城镇，在蛮荒之地推行英格兰律法。我们应当如何发展这些新大陆的属地？"
 england_mission_events.22.a: "新英格兰定居点"
 england_mission_events.22.b: "跨大西洋网络"
 england_mission_events.22.a.tt: "建立稳定的新英格兰定居点，降低殖民地的自由意愿并扩展殖民行政管理。"
 england_mission_events.22.b.tt: "发展跨大西洋贸易，获取大量黄金并改善殖民地贸易网络。"
 england_mission_events.23.t: "东印度公司"
 england_mission_events.23.d: "红白条纹旗帜飘扬，东印度公司扬帆起航，旨在亚洲建立英国的贸易网络与影响力。印度的财富正静候开拓。公司的使命应当如何确立？"
 england_mission_events.23.a: "主导贸易"
 england_mission_events.23.b: "领土扩张"
 england_mission_events.23.a.tt: "专注于贸易主导地位，极大满足市民阶层需求并增强在印度的贸易实力。"
 england_mission_events.23.b.tt: "追求领土扩张，在印度获取大量黄金并建立宣称。"
 england_mission_events.24.t: "日不落"
 england_mission_events.24.d: "从加拿大到澳大利亚，从印度到非洲，我们的帝国遍布全球。大英帝国的疆土上太阳永不落下，我们该如何治理这个庞大的帝国？"
 england_mission_events.24.a: "全球帝国"
 england_mission_events.24.b: "帝国巅峰"
 england_mission_events.24.a.tt: "建立全球帝国体系，降低殖民地的自由意愿，并在全球范围内获取关键战略核心。"
 england_mission_events.24.b.tt: "达到我们的帝国巅峰，获得正统性并在所有领土上建立核心。"
 england_mission_events.25.t: "与罗马决裂"
 england_mission_events.25.d: "教宗在英格兰的权威已告终结。我们现在是英格兰教会的最高元首。这一重大决裂将重塑我们的王国。我们应如何推进宗教改革？"
 england_mission_events.25.a: "王权至上"
 england_mission_events.25.b: "宗教和解"
 england_mission_events.25.a.tt: "完全确立王权至上，改宗英国国教，没收修道院财产，并与教宗国断绝关系。"
 england_mission_events.25.b.tt: "寻求宗教和解，在维持王权的同时与教廷保持更良好的关系。"
 england_mission_events.26.t: "解散修道院"
 england_mission_events.26.d: "修道院空无一人，其财宝已尽归王室。广袤的土地与巨额财富被重新分配。我们该如何运用这些资源？"
 england_mission_events.26.a: "夺取财富"
 england_mission_events.26.b: "教育改革"
 england_mission_events.26.a.tt: "没收修道院财富归王室所有，获得大量黄金并增强王室阶层权力。"
 england_mission_events.26.b.tt: "利用修道院资源发展教育，将修道院改建为学校，推动研究进步。"
 england_mission_events.27.t: "新教领导权"
 england_mission_events.27.d: "作为新教阵营的领导者，我们掌握着欧洲宗教走向的话语权。我们的支持能够巩固海外改革派同道的地位。应当如何运用这份影响力？"
 england_mission_events.27.a: "新教团结"
 england_mission_events.27.b: "宗教影响力"
 england_mission_events.27.a.tt: "建立新教团结，改善与所有新教国家的关系，并提升外交声誉。"
 england_mission_events.27.b.tt: "行使宗教影响力，获取威望并将天主教省份转化为新教省份。"
 england_mission_events.28.t: "大宪章"
 england_mission_events.28.d: "《大宪章》已在兰尼米德签署，确立了国王亦受法律约束的原则。这份文件将塑造英格兰未来数百年的政治格局。我们应着重强调其哪方面精神？"
 england_mission_events.28.a: "宪政传承"
 england_mission_events.28.b: "封建权利明确！"
 england_mission_events.28.a.tt: "建立强大的宪政传统，在分散权力的同时提升正统性并满足贵族需求。"
 england_mission_events.28.b.tt: "明确封建权利，同时增强王室地产权力。"
 england_mission_events.29.t: "权利请愿书"
 england_mission_events.29.d: "议会已通过《权利请愿书》，规定国王未经议会同意不得征税，亦不得无故监禁臣民。我们应如何落实这些新的限制？"
 england_mission_events.29.a: "议会权利"
 england_mission_events.29.b: "宪政进展"
 england_mission_events.29.a.tt: "拥护议会权利，提升国家稳定与议会支持度。"
 england_mission_events.29.b.tt: "推动宪政进步，提升正统性，同时满足贵族与市民阶层的诉求。"
 england_mission_events.30.t: "光荣革命"
 england_mission_events.30.d: "不流血的暴政已被推翻。奥兰治的威廉率军登陆，人民将他奉为解放者迎接。君主立宪制得以建立，它该采取何种形式？"
 england_mission_events.30.a: "宪法解决方案"
 england_mission_events.30.b: "权利法案"
 england_mission_events.30.a.tt: "建立完整的宪政体制，拥立威廉为国王，并创建永久性的宪政政府。"
 england_mission_events.30.b.tt: "专注于《权利法案》，提升正统性并增强市民与贵族阶层的力量。"
 england_mission_events.31.t: "英国文化复兴"
 england_mission_events.31.d: "英国艺术、文学与建筑的繁荣正在改变我们的王国。赞助与创造力正使英格兰成为文化引领者。我们该如何支持这场文艺复兴？"
 england_mission_events.31.a: "文化复兴"
 england_mission_events.31.b: "文学传统"
 england_mission_events.31.a.tt: "支持全面的文化复兴，提升文化传统，并在全国范围内发展城市。"
 england_mission_events.31.b.tt: "建立文学传统，在主要城市推进研究并建造图书馆。"
 england_mission_events.32.t: "牛津大学"
 england_mission_events.32.d: "牛津大学已发展成为重要的学术中心，吸引着全欧洲的学者。其学院与图书馆声名远扬。我们该如何发展这所学府？"
 england_mission_events.32.a: "学术卓越"
 england_mission_events.32.b: "教育中心"
 england_mission_events.32.a.tt: "追求学术卓越，大力发展牛津大学并聘请一位学者顾问。"
 england_mission_events.32.b.tt: "发展成为教育中心，提升威望并推行教育改革。"
 england_mission_events.33.t: "莎士比亚环球剧院"
 england_mission_events.33.d: "环球剧院坐落于泰晤士河南岸，威廉·莎士比亚及其他剧作家的作品在此为伦敦各界民众带来欢乐。英国戏剧已攀至新的高峰。我们该如何支持这门艺术形式？"
 england_mission_events.33.a: "戏剧传承"
 england_mission_events.33.b: "英语戏剧"
 england_mission_events.33.a.tt: "在伦敦确立莎士比亚的戏剧传承，提升文化传统的影响力。"
 england_mission_events.33.b.tt: "大力发展英国戏剧，提升威望并在主要城市建造剧院。"
 england_mission_events.34.t: "皇家学会"
 england_mission_events.34.d: "自然哲学家们聚集一堂，进行实验并探讨新理论。皇家学会将推动从物理学到生物学等所有领域的知识进步。我们应当如何支持科学研究？"
 england_mission_events.34.a: "科技发展"
 england_mission_events.34.b: "启蒙思潮"
 england_mission_events.34.a.tt: "专注于科学进步，聘请艾萨克·牛顿为顾问，并拥抱科学革命。"
 england_mission_events.34.b.tt: "推广启蒙思想，增强文化传统并推动创新。"
 england_mission_events.35.t: "专业长弓手"
 england_mission_events.35.d: "我们不再依赖封建征召兵，如今拥有一支随时待命的专业军队。这些训练有素、纪律严明的部队赋予我们军事优势。应如何组织这支新军？"
 england_mission_events.35.a: "专业部队"
 england_mission_events.35.b: "军事扩张"
 england_mission_events.35.a.tt: "发展专业军队，提升陆军传统，并建立军械库中心。"
 england_mission_events.35.b.tt: "专注于军事扩张，增加人力并建设新的兵工厂。"
 england_mission_events.36.t: "红衫军"
 england_mission_events.36.d: "身着醒目的红色制服，我们的线列步兵团已整装待发。这些职业军人将成为不列颠全球陆军力量的中流砥柱。我们应当如何发展这套新型军事体系？"
 england_mission_events.36.a: "纪律严明的步兵"
 england_mission_events.36.b: "全球部署"
 england_mission_events.36.a.tt: "专注于纪律严明的步兵，获得永久的训练度加成和强大的线列步兵作战能力。"
 england_mission_events.36.b.tt: "准备全球部署，提升陆军传统与全球作战能力。"
 england_mission_events.37.t: "采煤业"
 england_mission_events.37.d: "我们矿井中产出的黑色黄金为工业提供动力，为千家万户送去温暖。煤炭开采已成为支柱产业，不仅创造了大量就业岗位，更源源不断产生财富。应如何合理开发这一资源？"
 england_mission_events.37.a: "工业煤炭"
 england_mission_events.37.b: "煤炭生产"
 england_mission_events.37.a.tt: "发展工业煤炭生产，获得大量黄金并提升采矿区域的繁荣度。"
 england_mission_events.37.b.tt: "投资煤炭生产，推进研究并建造新窑炉。"
 england_mission_events.38.t: "铁路时代"
 england_mission_events.38.d: "蒸汽机车牵引着列车在铁轨上驰骋，连接城市并彻底改变运输方式。铁路革命正在进行中，我们应当如何发展这项新技术？"
 england_mission_events.38.a: "铁路网"
 england_mission_events.38.b: "交通革命"
 england_mission_events.38.a.tt: "建设一个全面的铁路网络，获得大量黄金并在主要城市修建铁路。"
 england_mission_events.38.b.tt: "引领一场运输革命，提升威望并改善工业运输。"
 england_mission_events.39.t: "工业革命"
 england_mission_events.39.d: "工厂烟囱喷吐浓烟，机器轰鸣作响，生产飞速攀升。英格兰已迈入工业时代，成为世界的工坊。我们该如何引领这场变革？"
 england_mission_events.39.a: "工业强国"
 england_mission_events.39.b: "科技领先"
 england_mission_events.39.a.tt: "成为工业强国，积累巨额财富，拥抱工业化进程。"
 england_mission_events.39.b.tt: "专注于技术领先，大力推动研究并发展工业技术。"
 england_mission_events.40.t: "世界霸权"
 england_mission_events.40.d: "英国作为世界主导力量的地位无可匹敌。我们的工业领先，海军称霸海洋，帝国版图遍布全球。我们应如何运用这种史无前例的全球领导力？"
 england_mission_events.40.a: "全球超级大国"
 england_mission_events.40.b: "帝国巅峰"
 england_mission_events.40.a.tt: "确立全球超级大国地位，获得威望并确保全球战略要地。"
 england_mission_events.40.b.tt: "达到帝国鼎盛，赢得全体人民的普遍满意。"
 england_mission_events.41.t: "不列颠治下的和平"
 england_mission_events.41.d: "一段相对和平与稳定的时期盛行，由英国的海军和经济优势所维系。世界仰赖英国提供领导与秩序。这个英国主导的和平应当具备怎样的特质？"
 england_mission_events.41.a: "全球维和者"
 england_mission_events.41.b: "帝国遗产"
 england_mission_events.41.a.tt: "担任全球维和者，获得终极稳定，并彻底降低殖民地的独立倾向。"
 england_mission_events.41.b.tt: "建立帝国传承，获得终极的正统性与文化传统。"
 england_mission_events.260.t: "修道院土地重新分配"
 england_mission_events.260.d: "修道院的解散仍在继续，更多宗教场所被关闭，其资产被没收。这些财富和土地的重新分配工作正在进行中。"
 england_mission_events.260.a: "保留一些修道院"
 england_mission_events.260.b: "资助教育"
 england_mission_events.260.a.tt: "继续没收修道院财富，但为教士保留一定自由。"
 england_mission_events.260.b.tt: "利用没收的资源资助教育，将修道院改建为学校并推进研究发展。"
