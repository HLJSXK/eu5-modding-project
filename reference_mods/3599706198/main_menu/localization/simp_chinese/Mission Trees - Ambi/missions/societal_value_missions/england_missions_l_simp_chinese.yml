l_simp_chinese:
 england_mission_pack: "英格兰崛起"
 england_mission_pack_desc: "一项专注于英格兰及大不列颠王权巩固、领土扩张和全球霸权的综合任务树，涵盖从稳固王权到建立世界性帝国的全过程。"
 england_mission_pack_BUTTON_TOOLTIP:0 "完成各项任务，以强化英格兰王国并建立大英帝国。"
 england_mission_pack_CRITERIA_DESCRIPTION:0 "完成英格兰或大不列颠的使命，实现帝国伟业。"
 mission_secure_the_english_crown: "确保英格兰王冠"
 mission_secure_the_english_crown_desc: "我们的王位宣称必须无可争议。加强王室权威，确保国家稳定，巩固我们作为英格兰合法统治者的地位。"
 mission_secure_the_english_crown_tooltip: "确立对英格兰君主制的稳固控制并确保我们的正统性。"
 mission_develop_london: "开发伦敦"
 mission_develop_london_desc: "我们的首都伦敦，必须发展成为繁荣的贸易与治理中心。拓展其市场，改善基础设施，使之配得上伟大王国的荣光。"
 mission_develop_london_tooltip: "将伦敦打造为重要的经济与文化中心。"
 mission_control_english_channel: "控制英吉利海峡"
 mission_control_english_channel_desc: "将我们与大陆隔开的海域既是屏障，也是通途。确立海峡制海权，以守护我们的海岸线并主宰贸易。"
 mission_control_english_channel_tooltip: "在英吉利海峡取得制海权。"
 mission_establish_wool_trade: "建立羊毛贸易"
 mission_establish_wool_trade_desc: "英格兰羊毛享誉全欧。通过高效的生产与出口网络，将这项珍贵贸易发展成为我国经济的基石。"
 mission_establish_wool_trade_tooltip: "建立繁荣的羊毛产业与贸易网络。"
 mission_summon_model_parliament: "召集模范议会"
 mission_summon_model_parliament_desc: "强大的君主制需要王国各阶层的支持。设立一个能够向王室提供建议并为我们统治赋予合法性的代议制议会。"
 mission_summon_model_parliament_tooltip: "建立一个功能完善且获得广泛支持的议会。"
 mission_subjugate_wales: "征服威尔士"
 mission_subjugate_wales_desc: "威尔士诸公国长久以来一直抗拒英格兰的统治。我们必须将其牢牢置于掌控之下，以稳固西部边境，并整合他们的人力资源。"
 mission_subjugate_wales_tooltip: "将威尔士置于英格兰控制之下。"
 mission_develop_cornwall: "发展康沃尔"
 mission_develop_cornwall_desc: "康沃尔丰富的锡矿资源和战略位置，使其成为我们王国宝贵的补充。为王室确保这个半岛及其资源。"
 mission_develop_cornwall_tooltip: "开发并整合康沃尔。"
 mission_pacify_the_north: "平定北方"
 mission_pacify_the_north_desc: "英格兰北部一直是叛乱与动荡的源头。通过军事驻防与忠诚的地方治理，建立稳固的控制。"
 mission_pacify_the_north_tooltip: "确保英格兰北部不发生叛乱。"
 mission_invade_ireland: "入侵爱尔兰"
 mission_invade_ireland_desc: "爱尔兰海对面，是一片等待征服的沃土。在爱尔兰建立立足点，这是我们掌控整个岛屿的第一步。"
 mission_invade_ireland_tooltip: "开始征服爱尔兰"
 mission_complete_irish_conquest: "完成爱尔兰征服"
 mission_complete_irish_conquest_desc: "爱尔兰必须完全臣服。完成对该岛的征服，并将其纳入我们的版图。"
 mission_complete_irish_conquest_tooltip: "完全征服并控制爱尔兰。"
 mission_claim_scottish_throne: "宣称苏格兰王位"
 mission_claim_scottish_throne_desc: "我们必须坚持对苏格兰的历史宣称。通过外交或武力，维护我们统治北部边境地区的权利。"
 mission_claim_scottish_throne_tooltip: "确立对苏格兰王位的宣称。"
 mission_unite_british_isles: "统一不列颠群岛"
 mission_unite_british_isles_desc: "整个不列颠必须统一于一位君主之下。将英格兰、威尔士、苏格兰与爱尔兰凝聚为统一而强大的王国。"
 mission_unite_british_isles_tooltip: "将不列颠群岛全部统一于英格兰统治之下。"
 mission_form_great_britain: "成立大不列颠"
 mission_form_great_britain_desc: "不列颠群岛既已统一，我们必须塑造新的身份。将我们的王国转变为统一的大不列颠联合王国，使其力量超越各部分。"
 mission_form_great_britain_tooltip: "组建大不列颠联合王国。"
 mission_secure_calais: "确保加莱安全"
 mission_secure_calais_desc: "加莱是我们在大陆的最后据点，也是与欧洲贸易的关键。加固这座桥头堡，确保它牢牢掌握在英格兰手中。"
 mission_secure_calais_tooltip: "确保并巩固英格兰对加莱的控制。"
 mission_claim_french_throne: "宣称法兰西王位"
 mission_claim_french_throne_desc: "我们的金雀花宗族先祖曾统治法兰西，我们从未放弃过这一宣称。重申我们对法国王位的权利，重启百年战争。"
 mission_claim_french_throne_tooltip: "宣称对法国王位的继承权。"
 mission_conquer_normandy: "征服诺曼底"
 mission_conquer_normandy_desc: "征服者威廉的发家地——诺曼底，必须重归英格兰治下。恢复英格兰对这一历史公国的统治。"
 mission_conquer_normandy_tooltip: "征服并控制诺曼底"
 mission_control_gascony: "控制加斯科涅"
 mission_control_gascony_desc: "加斯科涅公国曾一度由英格兰国王统治，夺回法国西南部这片富饶的领土。"
 mission_control_gascony_tooltip: "征服并控制加斯科涅地区。"
 mission_conquer_guyenne: "征服吉耶讷"
 mission_conquer_guyenne_desc: "吉耶纳的葡萄酒贸易和战略位置使其成为一块宝贵的领地。确保控制这一区域及其利润丰厚的商业活动。"
 mission_conquer_guyenne_tooltip: "确立对吉耶讷的控制权。"
 mission_win_hundred_years_war: "赢得百年战争"
 mission_win_hundred_years_war_desc: "长达几个世纪的法国争夺战必须以对我们有利的方式解决。要么征服法国，要么建立个人联盟以创建双重君主制。"
 mission_win_hundred_years_war_tooltip: "在百年战争中取得决定性胜利。"
 mission_build_royal_navy: "建立皇家海军"
 mission_build_royal_navy_desc: "英格兰的安全与繁荣仰赖海洋。打造一支强大的海军，既能守卫我们的海岸，又能向海外投射力量。"
 mission_build_royal_navy_tooltip: "建立一支强大的专业海军。"
 mission_develop_portsmouth: "发展朴茨茅斯"
 mission_develop_portsmouth_desc: "朴茨茅斯必须成为我们的首要海军基地。扩建其船坞、防御工事及配套设施，以支撑我们日益壮大的舰队。"
 mission_develop_portsmouth_tooltip: "将朴茨茅斯发展成主要的海军基地。"
 mission_dominate_north_sea: "支配北海"
 mission_dominate_north_sea_desc: "控制北海对于与北欧的贸易以及抵御斯堪的纳维亚强权至关重要。在这里建立海军优势。"
 mission_dominate_north_sea_tooltip: "在北海取得制海权。"
 mission_establish_royal_marines: "组建皇家海军陆战队"
 mission_establish_royal_marines_desc: "一支专业的海军陆战队将赋予我们无与伦比的两栖作战能力。创建皇家海军陆战队，以支持我们在全球范围内的海上行动。"
 mission_establish_royal_marines_tooltip: "组建皇家海军陆战队。"
 mission_control_gibraltar: "控制直布罗陀"
 mission_control_gibraltar_desc: "直布罗陀岩扼守地中海门户。占据这一战略要地，便能掌控大西洋与地中海之间的通道。"
 mission_control_gibraltar_tooltip: "确保对直布罗陀的控制权。"
 mission_secure_suez: "确保苏伊士的安全"
 mission_secure_suez_desc: "苏伊士地峡是通往亚洲的快捷通道的关键。控制这一重要捷径，以便快速到达我们在东方的领地。"
 mission_secure_suez_tooltip: "控制苏伊士区域。"
 mission_rule_the_waves: "统治海洋"
 mission_rule_the_waves_desc: "英国必须掌控世界海洋。建立一支如此强大的海军，让任何宿敌都无法挑战我们对海洋的控制权。"
 mission_rule_the_waves_tooltip: "实现无可争议的全球海军霸权。"
 mission_establish_merchant_companies: "建立贸易公司"
 mission_establish_merchant_companies_desc: "组织贸易公司可以拓展我们的商业版图，并在海外市场确立英格兰的主导地位。授予这些公司特许状以促进我们的经济利益。"
 mission_establish_merchant_companies_tooltip: "授予商业公司特许状。"
 mission_develop_banking: "发展银行业"
 mission_develop_banking_desc: "现代银行体系对于贸易与政府融资至关重要。建立可靠的金融机构以支撑我们日益增长的经济。"
 mission_develop_banking_tooltip: "建立一套完善的银行体系。"
 mission_control_baltic_trade: "控制波罗的海贸易"
 mission_control_baltic_trade_desc: "波罗的海提供了通往宝贵北方资源的通道。在此重要贸易区域确立英格兰的统治地位。"
 mission_control_baltic_trade_tooltip: "主导波罗的海区域的贸易。"
 mission_monopolize_spice_trade: "垄断香料贸易"
 mission_monopolize_spice_trade_desc: "东方的香料是世界上最珍贵的商品之一。掌控这条利润丰厚的贸易路线，将为我们王国带来巨大财富。"
 mission_monopolize_spice_trade_tooltip: "垄断香料贸易。"
 mission_establish_london_stock_exchange: "建立伦敦证券交易所"
 mission_establish_london_stock_exchange_desc: "伦敦必须成为世界的金融中心，建立证券交易所以促进投资和经济增长。"
 mission_establish_london_stock_exchange_tooltip: "在伦敦建立证券交易所。"
 mission_sponsor_exploration: "赞助探索"
 mission_sponsor_exploration_desc: "欧洲之外的世界蕴藏着无尽的财富。资助探险家去发现新大陆，确立英格兰在海外领土的主权。"
 mission_sponsor_exploration_tooltip: "资助探险与发现之旅。"
 mission_establish_colonial_office: "设立殖民办公室"
 mission_establish_colonial_office_desc: "随着我们的殖民领地日益扩大，我们需要一个专门的管理机构来治理它们。设立一个殖民办公室，以便高效管理我们的海外领土。"
 mission_establish_colonial_office_tooltip: "建立中央集权的殖民管理机构。"
 mission_colonize_north_america: "殖民北美"
 mission_colonize_north_america_desc: "广阔肥沃的土地在大西洋彼岸等待着。在北美建立殖民地，以获取资源并扩大英格兰的影响力。"
 mission_colonize_north_america_tooltip: "在北美建立殖民地。"
 mission_secure_caribbean: "确保加勒比地区安全"
 mission_secure_caribbean_desc: "加勒比群岛出产珍贵的糖料及其他热带物产。掌控这些利润丰厚的殖民地。"
 mission_secure_caribbean_tooltip: "在加勒比地区建立殖民地。"
 mission_establish_east_india_company: "建立东印度公司"
 mission_establish_east_india_company_desc: "印度和东印度群岛的财富堪称传奇。特许一家公司在亚洲建立英国的贸易与影响力。"
 mission_establish_east_india_company_tooltip: "建立东印度公司。"
 mission_secure_cape_colony: "确保开普殖民地安全"
 mission_secure_cape_colony_desc: "好望角是通往印度洋的门户。在此建立殖民地，以保障我们通往东方的贸易航线。"
 mission_secure_cape_colony_tooltip: "在好望角建立殖民地。"
 mission_colonize_australia: "殖民澳大利亚"
 mission_colonize_australia_desc: "南方海域中有一片广阔而人烟稀少的大陆，宣称对澳大利亚的主权，并在那里建立殖民地。"
 mission_colonize_australia_tooltip: "在澳大利亚建立殖民地。"
 mission_empire_where_sun_never_sets: "日不落帝国"
 mission_empire_where_sun_never_sets_desc: "在全球建立殖民地与领土，让日不落帝国的光辉永驻。"
 mission_empire_where_sun_never_sets_tooltip: "建立一个横跨多个大陆的全球帝国。"
 mission_break_with_rome: "与罗马决裂"
 mission_break_with_rome_desc: "教宗对英格兰事务的干涉令人无法容忍。建立以君主为最高领袖的英格兰教会。"
 mission_break_with_rome_tooltip: "建立独立的英格兰教会。"
 mission_dissolve_monasteries: "裁撤修道院"
 mission_dissolve_monasteries_desc: "修道院拥有巨额财富和土地。解散它们，将其资产收归王室，重新分配他们的资源。"
 mission_dissolve_monasteries_tooltip: "没收修道院土地与财富。"
 mission_establish_church_of_england: "建立英格兰教会"
 mission_establish_church_of_england_desc: "创建一个忠于王室的国家教会，在整个王国范围内确立其教义和组织。"
 mission_establish_church_of_england_tooltip: "正式确立英格兰国教会。"
 mission_promote_protestantism: "推广新教"
 mission_promote_protestantism_desc: "作为新教国家，我们应当支持海外的改革同道，在整个欧洲推动新教事业。"
 mission_promote_protestantism_tooltip: "支持国际新教。"
 mission_suppress_catholic_rebels: "镇压天主教叛乱"
 mission_suppress_catholic_rebels_desc: "必须粉碎天主教对我们宗教改革的抵抗，确保我们所有领地内的宗教统一。"
 mission_suppress_catholic_rebels_tooltip: "消除天主教抵抗势力。"
 mission_pass_magna_carta: "通过《大宪章》"
 mission_pass_magna_carta_desc: "确立《大宪章》，限制王权并保障特定权利，为英国法律与政府体系奠定基础。"
 mission_pass_magna_carta_tooltip: "对王权设立宪法限制。"
 mission_establish_common_law: "建立普通法"
 mission_establish_common_law_desc: "建立一套基于判例与习俗的普通法体系，为王国构建稳定的法律框架。"
 mission_establish_common_law_tooltip: "发展英格兰普通法体系。"
 mission_pass_petition_of_right: "通过《权利请愿书》"
 mission_pass_petition_of_right_desc: "进一步限制王权，规定国王未经议会同意不得征税，亦不得无故监禁臣民。"
 mission_pass_petition_of_right_tooltip: "建立议会控制税收的制度。"
 mission_glorious_revolution: "光荣革命"
 mission_glorious_revolution_desc: "推翻专制统治，建立君主权力受到明确限制、议会拥有最高权威的君主立宪制。"
 mission_glorious_revolution_tooltip: "建立君主立宪制。"
 mission_establish_constitutional_monarchy: "建立君主立宪制"
 mission_establish_constitutional_monarchy_desc: "完成向君主立宪制的过渡，君主与议会共同治理，而非凌驾于议会之上。"
 mission_establish_constitutional_monarchy_tooltip: "完全确立宪政政府。"
 mission_promote_english_culture: "推广英格兰文化"
 mission_promote_english_culture_desc: "通过赞助艺术、文学与建筑，培育独特的英格兰文化认同。"
 mission_promote_english_culture_tooltip: "发展和推广英格兰文化。"
 mission_found_oxford_university: "建立牛津大学"
 mission_found_oxford_university_desc: "在牛津建立一所大学，为王国培养学者、神职人员和行政官员。"
 mission_found_oxford_university_tooltip: "建立牛津大学。"
 mission_establish_cambridge_colleges: "建立剑桥学院"
 mission_establish_cambridge_colleges_desc: "扩建剑桥大学，增设新学院，使其在学术与威望上能与牛津大学一较高下。"
 mission_establish_cambridge_colleges_tooltip: "发展剑桥大学。"
 mission_shakespearean_theater: "莎士比亚剧院"
 mission_shakespearean_theater_desc: "赞助戏剧艺术，支持像莎士比亚这样的剧作家，开创英国戏剧的黄金时代。"
 mission_shakespearean_theater_tooltip: "支持英国戏剧的发展。"
 mission_establish_royal_society: "建立皇家学会"
 mission_establish_royal_society_desc: "建立一个致力于科学探究与实验的学会，推动所有领域的知识进步。"
 mission_establish_royal_society_tooltip: "成立了促进科学发展的皇家学会。"
 mission_promote_english_literature: "推广英格兰文学"
 mission_promote_english_literature_desc: "支持作家与诗人，共同缔造定义英格兰文化数世纪的丰厚文学传统。"
 mission_promote_english_literature_tooltip: "发展出繁荣的英格兰文学传统。"
 mission_establish_standing_army: "建立常备军"
 mission_establish_standing_army_desc: "建立一支专业的常备军，随时待命部署，而非依赖封建征召兵。"
 mission_establish_standing_army_tooltip: "建立一支专业化的常备军。"
 mission_modernize_artillery: "现代化炮兵"
 mission_modernize_artillery_desc: "投资现代火炮与炮兵训练，确保我军拥有最先进的火力装备。"
 mission_modernize_artillery_tooltip: "发展现代化炮兵部队。"
 mission_redcoat_regiments: "红衫军"
 mission_redcoat_regiments_desc: "组建红衫军，他们将成为英国的中坚力量。"
 mission_redcoat_regiments_tooltip: "建立专业的红衫军。"
 mission_establish_military_academies: "建立军事学院"
 mission_establish_military_academies_desc: "建立学院，培养军官掌握现代战术、战略与领导才能。"
 mission_establish_military_academies_tooltip: "建立专业军事教育体系。"
 mission_develop_coal_mining: "发展煤矿开采"
 mission_develop_coal_mining_desc: "利用英格兰丰富的煤炭资源，为工业提供动力，推动制造业发展。"
 mission_develop_coal_mining_tooltip: "发展煤炭开采业。"
 mission_develop_iron_industry: "发展钢铁工业"
 mission_develop_iron_industry_desc: "建立现代钢铁工业，为机械制造、武器生产和建筑工程提供所需金属。"
 mission_develop_iron_industry_tooltip: "发展钢铁生产与制造业。"
 mission_establish_factories: "建造工厂"
 mission_establish_factories_desc: "建造工厂以高效大规模生产商品，革新制造业并创造财富。"
 mission_establish_factories_tooltip: "建立现代化工厂生产体系。"
 mission_build_railroads: "修建铁路"
 mission_build_railroads_desc: "建设铁路网络，快速运输全国货物与人员，推动经济发展。"
 mission_build_railroads_tooltip: "建设国家铁路网。"
 mission_industrial_revolution: "工业革命"
 mission_industrial_revolution_desc: "以科技创新、工厂生产和经济变革引领世界步入工业时代。"
 mission_industrial_revolution_tooltip: "成为世界首个工业强国。"
 mission_british_world_hegemony: "英国世界霸权"
 mission_british_world_hegemony_desc: "将英国打造为无可争议的全球超级大国，在工业、贸易、军事力量和文化领域占据绝对主导地位。"
 mission_british_world_hegemony_tooltip: "将英国确立为世界的主导力量。"
 mission_pax_britannica: "不列颠治下的和平"
 mission_pax_britannica_desc: "建立由英国海军和经济霸权维持的相对和平与稳定时期，英国担任世界警察角色。"
 mission_pax_britannica_tooltip: "在英国领导下实现全球和平。"
