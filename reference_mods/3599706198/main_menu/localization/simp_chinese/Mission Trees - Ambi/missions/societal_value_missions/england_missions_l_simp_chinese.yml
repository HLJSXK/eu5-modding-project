 STATIC_MODIFIER_NAME_east_india_company_charter: "东印度公司特许状"
 STATIC_MODIFIER_DESC_east_india_company_charter_desc: "东印度公司已获特许，获准与亚洲进行贸易。"
 STATIC_MODIFIER_NAME_sun_never_sets_on_british_empire: "日不落帝国"
 STATIC_MODIFIER_DESC_sun_never_sets_on_british_empire_desc: "大英帝国疆域遍布全球，领土跨越所有时区。"
