l_simp_chinese:
 urban_professional_militia: "城镇职业民兵"
 urban_professional_militia_desc: "城镇民兵被重组为常设性、由职业军官领导的建制单位。地方驻军定期操练并与中央指挥系统协同配合，确保主要城镇在战争或动荡时期都能快速完成动员。"
 regulated_merchant_leagues: "受监管的商人行会"
 regulated_merchant_leagues_desc: "强大的商人行会被授予官方特许权并置于国家监管之下。作为特权和法律保护的回报，他们规范商业行为、拓展贸易，并稳定地充实国库。"
 civic_development_grants: "市政发展补助"
 civic_development_grants_desc: "国家通过定向拨款、补贴和税收减免来支持城镇发展。市场、工坊和基础设施被列为优先发展项目，让我们的城镇建设与繁荣。"
 chartered_universities: "特许大学"
 chartered_universities_desc: "根据王家或市政特许状建立的大学成为学习与辩论的中心。受过教育的官员、神学家和学者们优化了我们的行政管理和文化体系，以及长期创新能力。"
 regional_administration_offices: "地方行政部"
 regional_administration_offices_desc: "新的地方行政部将边远地区与首都更紧密地联系起来。地方长官、税务官员和法官被纳入统一的指挥体系，减少了腐败现象，加强了中央监管。"
 standardized_urban_policing: "标准化城镇警察机构"
 standardized_urban_policing_desc: "城市巡警与治安官按照统一规章、薪酬和程序完成重组。明确的职权划分与定期巡逻维护了街道秩序，遏制了犯罪活动，并使民众感到安心。"
 guild_integrated_workshops: "标准工坊"
 guild_integrated_workshops_desc: "鼓励各公会融合传统工艺标准与更组织化的生产方式。通过设立监管、改良工具并共享技术，既保持了既定特权，又能实现稳定产出。"
 state_sponsorship_for_artisans: "国家工匠坊"
 state_sponsorship_for_artisans_desc: "通过国家资助。委托及和护工匠及技艺精湛的大师们，他们得以制作奢侈品，支撑宫廷展出，并为我们领地日益增长的威望作贡献。"
 expansion_of_harbor_bureaus: "扩展港务局"
 expansion_of_harbor_bureaus_desc: "各主要港口的海关和港务局都得到了加强。它们统筹关税、引航、仓储和船舶登记等事宜，确保海上贸易和海军后勤高效运转。"
 army_quartermasters_council: "陆军军需委员会"
 army_quartermasters_council_desc: "常设军需官机构负责监督征兵、补给及装备标准，他们的账簿、仓库和合同确保我军即使在长期作战中也能获得充足的衣物和武器。"
 bureau_of_civic_representation: "市民代表办事局"
 bureau_of_civic_representation_desc: "城镇精英与乡村头人被纳入国家监管下的咨询机构。虽然他们的意见并非决定性因素，但有助于使王室政策合法化并推动新政策实施。"
 codified_labor_regulations: "成文劳动法规"
 codified_labor_regulations_desc: "通过将工作时间、义务和保护措施编入法律，国家试图在不破坏雇主权威的前提下限制滥用行为。更高的可预测性能平息叛乱度并提升长期生产力。"
 urban_clergy_mediation: "教士调解"
 urban_clergy_mediation_desc: "鼓励城市中有影响力的教士充当政府与平民之间的调解人。布道、会议和忏悔有助于将不满情绪引导至更有序的形式。"
 office_of_urban_finance: "城市财政办公室"
 office_of_urban_finance_desc: "一个专门的办公室负责监督与城镇相关的税收、费用和贷款。更好的记录、审计和谈判强化了国家的财政基础，同时遏制了赤裸裸的勒索。"
 national_military_school_system: "国立军校体系"
 national_military_school_system_desc: "全国设立了军官学校和训练学院。学员们学习操练、数学和战略，组成了一支能够训练和领导我们军队的专业队伍。"
 imperial_commercial_chambers: "帝国商会"
 imperial_commercial_chambers_desc: "商人、船主和金融家在王权的庇护下被组织成正式的商会。他们仲裁纠纷、为政府提供建议，并帮助引导贸易政策向有利于我国市场的方向发展。"
 royal_research_endowment: "王家研究津贴"
 royal_research_endowment_desc: "一项永久津贴专门用于资助学者、发明家和自然哲学家。作为获得资助与津贴的回报，他们需分享能够强化我们行政管理、经济与军事力量。"
 bureau_of_subject_integration: "附属国整合局"
 bureau_of_subject_integration_desc: "一个专门机构负责协调各附属国的管理与整合。其官员负责监控忠诚度、调整义务，并推动从半独立统治到中央集权管制的平稳过渡。"
 grand_temple_of_authority: "权威殿堂"
 grand_temple_of_authority_desc: "宏伟的神殿成为国家的象征。在那里举行的宗教仪式强化了对统治者的忠诚，激励着信徒，并有助于稳定社会秩序。"
 high_court_inspectors: "督察处"
 high_court_inspectors_desc: "受信赖的巡查官遍访国家各地，负责审查宫廷、总督与税务官员。他们的报告揭露权力滥用行为，推动法律实施更趋统一，使王室与臣民皆能受益。"
 state_influenced_economic_syndicates: "国家主导型经济联合"
 state_influenced_economic_syndicates_desc: "经济的关键部门被纳入半官方的联合体中。国家通过引导投资和生产目标，同时允许盈利，形成了政府与资本之间强有力的联盟。"
 marshal_directorate_of_war: "战争指挥部"
 marshal_directorate_of_war_desc: "将领办公室升格为正式指挥部，统筹征兵事务、指挥任免与作战规划。军事行动变得更具连贯性，军队庞大的资源也得到更高效的运用。"
 metropolitan_strategic_headquarters: "大都市战略总部"
 metropolitan_strategic_headquarters_desc: "首都成为我们军队的神经中枢。参谋、通信兵和工程人员协同工作，使我们能够以无与伦比的精确度动员和指挥军团。"
 council_of_great_houses: "大议会"
 council_of_great_houses_desc: "首都的显赫贵族们齐聚一堂，组成正式议会。为换取权势与荣誉，他们承诺支持中央政策、稳定继承秩序，并维护国家的威望。"
 metropolitan_global_trade_hub: "世界贸易中心"
 metropolitan_global_trade_hub_desc: "我们的首都坐落于世界贸易路线的交汇处。仓库、交易所和账房遍布各个城区，将这座城市变成了汇集四方货物、信贷与信息的中心。"
 supreme_academic_consortium: "学术联盟"
 supreme_academic_consortium_desc: "大学、学院与学术团体联合组成了一个权威联盟。他们为政府提供建议，培养帝国最杰出的人才，并加速新思想的传播。"
 centralized_urban_planning_authority: "中央城市规划管理局"
 centralized_urban_planning_authority_desc: "首都的街道、区域与公共设施被规划为一个有机整体。贫民区得到控制，交通得以改善，工业区供给更完善，大都市的生产与抗风险能力得到全面提升。"
 metropolitan_treasury_secretariat: "市财政局"
 metropolitan_treasury_secretariat_desc: "帝国的财政命脉汇聚于此，专业的人员谨慎管理税收、贷款与偿债事宜，在减少浪费的同时确保重大工程资金稳定流动。"
 megalopolis_imperial_legions_doctrine: "帝国军团教条"
 megalopolis_imperial_legions_doctrine_desc: "这座巨型都市维系着同等庞大的军团。征兵与补给体系围绕常备军团重组，这些军团通过操练变得坚不可摧，并得到大都会全部人力支持。"
 world_trade_directorate: "世界贸易理事会"
 world_trade_directorate_desc: "位于这座都市圈的中央政府统筹监管着遍布各地的贸易路线、特许公司和商船队。它的法令塑造着关税、垄断和护航体系，确保了我们在全球贸易中的主导地位。"
 supreme_cultural_hegemony_edict: "文化霸权法令"
 supreme_cultural_hegemony_edict_desc: "大都市将时尚、语言与知识辐射至国家的每一个角落。通过将其文化凌驾于其他文化之上，我们让文化化作利器，开启那些仅凭武力永远无法叩开的大门。"
 imperial_central_authority: "帝国中央权威"
 imperial_central_authority_desc: "所有实质性权力都被集中到一个统治中心。各部门、议会和法院皆归顺于最高权威，地方精英除服从或消亡外别无选择。"
 megalopolis_economic_overdrive: "大都市圈经济超速发展"
 megalopolis_economic_overdrive_desc: "这座大都市吞噬原材料，同时产出制成品与税收。协调的投资、基础设施和劳动力政策推动城市经济进入永久的高产状态。"
 city_of_cities_charter: "万城之城特许状"
 city_of_cities_charter_desc: "根据正式特许状，我们的首都被认定为万城之城——凌驾于所有城镇之上，其特权广泛，责任重大，其影响力渗透在决定王国命运的每一项决策中。"
 nobles_capital_garrison_rights: "首都卫戍权"
 nobles_capital_garrison_rights_desc: "贵族们获得了向首都派遣兵力和军官的正式授权。他们的私人武装增强了城防力量，但同时也提升了其在军事中的政治影响力。"
 nobles_regional_courts: "地方法院"
 nobles_regional_courts_desc: "贵族法官们主持着地方法院和仲裁庭。他们对当地习俗的熟悉加速了法律程序——同时也巩固了贵族特权。"
 nobles_extended_hunting_rights: "扩大狩猎权"
 nobles_extended_hunting_rights_desc: "贵族被授予在广阔领地内专享的狩猎与放牧特权。其领地日益繁荣，但拥有土地的精英阶层对乡村政策的影响力也随之增强。"
 nobles_martial_fiefs: "军事封地"
 nobles_martial_fiefs_desc: "大庄园被重组为军事封地，负责在战时提供士兵。征召兵变得更廉价、更迅速——然而贵族的军事身份认同却进一步加深。"
 nobles_high_council_seats: "最高议会席位"
 nobles_high_council_seats_desc: "显贵们获得最高议会的永久席位。决策过程因此获得经验与威望，但王室日益依赖贵族的参与。"
 nobles_metropolitan_guard_command: "大都会卫队司令部"
 nobles_metropolitan_guard_command_desc: "首都的精英卫队由统一的贵族指挥统辖。训练与协同作战能力显著提升，贵族阶层亦由此获得对军队的更大话语权。"
 nobles_metropolitan_military_academies: "都市军事学院"
 nobles_metropolitan_military_academies_desc: "首都拥有庞大的贵族学院网络，将才华横溢的军官锻造军事家。创新精神与训练伴随着贵族影响力同步提升。"
 nobles_metropolitan_trade_concessions: "大都会贸易特许权"
 nobles_metropolitan_trade_concessions_desc: "贵族们确保了对首都商业的垄断特权。他们的投资虽刺激了全国贸易，却将国家与贵族商业利益紧密捆绑。"
 nobles_metropolitan_court_bloc: "大都会法院集团"
 nobles_metropolitan_court_bloc_desc: "在大都市中，贵族家族在宫廷内部形成了强大的势力集团。政策变得更为尖锐、迅速且高效——却日益向贵族的目标倾斜。"
 nobles_metropolitan_infrastructure_charters: "大都会基础设施特许权"
 nobles_metropolitan_infrastructure_charters_desc: "贵族阶层资助并监管首都区域的道路建设与城镇改造工程。发展进程加速，但物流管理权逐渐向贵族圈层集中。"
 nobles_megalopolis_autonomous_marchs: "自主军事权"
 nobles_megalopolis_autonomous_marchs_desc: "最显赫的贵族家族掌控着军事自主权。他们的私人军队构成了帝国战争的中坚力量——代价是贵族阶层获得无与伦比的权势。"
 nobles_megalopolis_mercantile_oligarchy: "商业寡头"
 nobles_megalopolis_mercantile_oligarchy_desc: "贵族商人集团掌控着这座大都市的关键贸易与金融领域。财富与影响力急剧膨胀，但国家却逐渐依赖贵族资本。"
 nobles_megalopolis_court_hegemony: "宫廷霸权"
 nobles_megalopolis_court_hegemony_desc: "贵族掌控着大都市中的各个部门、文化机构与政府席位。他们决定着国家的命运——走向繁荣，或坠入深渊。"
 nobles_megalopolis_urban_fortress_rights: "城镇堡垒权利"
 nobles_megalopolis_urban_fortress_rights_desc: "贵族获得了加固街区、住宅及城镇阶层的合法权利。这座城市变得几乎坚不可摧——然而贵族军事化的趋势已不容忽视。"
 nobles_megalopolis_imperial_directors: "帝国监事"
 nobles_megalopolis_imperial_directors_desc: "最强大的贵族设立了掌控官僚体系、威望与政策的职位。治理因此变得更迅速、更严苛，并深受贵族影响。"