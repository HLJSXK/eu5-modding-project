l_simp_chinese:
 Traiding_policy: "劫掠还是贸易"
 Traiding_policy_desc: "通过贸易积累财富，还是通过武力夺取？"
 thrall_raiders: "以劫掠为核心"
 thrall_raiders_desc: "经济运行的主要组成部分是劳动力，我们需要不惜一切代价增加劳动力数量。"
 balanced_traiding: "均衡发展"
 balanced_traiding_desc: "一点贸易与劫掠无伤大雅，不过是机遇使然罢了。"
 norse_traders: "贸易聚焦"
 norse_traders_desc: "维京时代的掠夺和抢劫已经是野蛮的过去，旅行和贸易的精神更值得推崇。"
 blot_law: "血祭"
 blot_law_desc: "血祭是统治者确认与神明及社群联系的正式仪式，祭祀的规模与意义皆由律法所定。"
 restricted_blot_law: "限制血祭"
 restricted_blot_law_desc: "神明需要的是虔诚，而非铺张。简化为象征性，既维系传统，又守护资源。"
 blot_regular_law: "批准血祭"
 blot_regular_law_desc: "血祭作为社会秩序的支柱得以延续。法律规定了可接受的祭品，以确保既表现出敬意又不过度。"
 extreme_blot_law: "鼓励血祭"
 extreme_blot_law_desc: "唯有无限的牺牲才能避免毁灭。通过仪血祭，将人民与神祇以及以神之名的统治者紧密相连。"
 dueling_law: "决斗规定"
 dueling_law_desc: "决定境内决斗与死斗审判的规制方式。"
 allodial_land_law: "世袭土地权利"
 allodial_land_law_desc: "决定境内世袭土地所有权的管理方式。"
 strict_odal_rights: "严格的持有者权利"
 strict_odal_rights_desc: "传统贵族权利得到维护。未经家族同意，不得没收或出售祖传土地，这保护了贵族领地，但将税负转移到了农民身上。"
 peasant_odal_rights: "农民世袭地权"
 peasant_odal_rights_desc: "持有者权利扩展至普通农民。农民家庭获得祖传田地的保障，减轻了赋税负担，而贵族则必须向国库缴纳更多税款。"
 purchasable_allods: "可购买土地"
 purchasable_allods_desc: "祖传土地限制被解除，允许自由买卖所有地产。商人在这个新兴市场中蓬勃发展，但贵族们对传统被侵蚀感到不满，并质疑此类变革的正当性。"
 crown_land_authority: "王室领地权威"
 crown_land_authority_desc: "王室宣称对所有土地分配拥有最终决定权，削弱了古老的世袭土地传统。王权在整个领地内得到加强，这引起了贵族阶层的强烈不满。"
 duels_for_land_disputes: "土地争端决斗"
 duels_for_land_disputes_desc: "贵族间的土地纠纷可通过正式的死斗审判解决。胜者将获得争议领土的合法所有权，此举虽能减少昂贵的法律诉讼，但有时当显赫的土地持有者落败时，会扰乱治理。"
 duels_for_personal_honour: "个人荣誉决斗"
 duels_for_personal_honour_desc: "战士之间可相互挑战以挽回受损的荣誉。这维系了我们民族的尚武精神，确保侮辱必以刀剑回应，从而培养出战斗气概。"
 temple_sanctioned_duels: "教会认可的决斗"
 temple_sanctioned_duels_desc: "所有正式决斗都必须由祭司见证并赐福。教士们会在战斗前祈求神恩，并确保阵亡者得到恰当的仪式。这种安排既满足了贵族的骄傲，也维护了宗教权威。"
 royal_controlled_duels: "王室控制的决斗"
 royal_controlled_duels_desc: "王室宣布对所有正式决斗拥有管辖权。决斗者必须获得王室许可并缴纳相应费用。此举将权力集中于王权，同时减少了无管制的私斗所造成的混乱。"
 forbid_duelling: "禁止决斗"
 forbid_duelling_desc: "死斗审判与私人决斗已被明令禁止。所有争端必须通过王室法庭解决。此举虽激怒了传统战士阶层，却带来了社会稳定，并以法治取代了武治。"
 the_old_faith: "组织旧信仰"
 the_old_faith_desc: "回归北方旧信仰，古老的神祇已经苏醒，是时候让祂们回归了。"
 viking_legacy: "北境传承"
 viking_legacy_desc: "回归古老的生活方式，但究竟是作为贸易者还是掠夺者？"
 godir_Priests: "戈迪祭司制度"
 godir_Priests_desc: "改革神职人员为戈迪祭司的非正式制度，其权力不及基督教同等地位者，但需向诸神献祭。"
 warrior_culture: "尚武文化"
 warrior_culture_desc: "让我们恢复昔日战士阶层，让专业人士来承担战争的重任。"
 nature_magic: "自然的魔法"
 nature_magic_desc: "有人称之为迷信，有人视作魔法，还有人只当它是传统医术。"
 scaldic_tradition: "北境吟游诗人传统"
 scaldic_tradition_desc: "吟游诗人通过诗歌保存法律、传承和事迹，在这言语仍具力量的世界里，将记忆与权威紧密相连。"
 thing_tradition: "誓约统治"
 thing_tradition_desc: "王国的法律不再只在地方集会上被提及。通过将议事会提升为更高层次的集会，统治者将判决、权威和传统融为一体。"
 thingwomen: "女性事物"
 thingwomen_desc: "随着治理从武力转向智力，将能力出众的女性排除在权力职位之外已不再符合领地利益。唯才是举，而非性别，将决定谁能在议会中执政。"
 chosen_by_the_gods: "诸神之声"
 chosen_by_the_gods_desc: "通过君权神授，将信仰与忠诚系于王权之下。"
 vinland_saga: "重寻文兰"
 vinland_saga_desc: "让我们根据萨迦中的记载，去寻找莱夫·埃里克松四百年前发现的那片土地吧。"
 vinland_saga2: "收复文兰"
 vinland_saga2_desc: "重新夺回神话中文兰，新世界已被重新发现"
 vinland_saga3: "海上民族"
 vinland_saga3_desc: "大海不是边界而是一条道路，掌握沿海航行和海上旅行将遥远的海岸与王国的生活紧密相连。"
 vinland_saga4: "海上战团"
 vinland_saga4_desc: "解锁下一级劫掠者，为长途航行储备充足物资。"
 Protect_paganism: "保护旧信仰"
 Protect_paganism_desc: "天主教信仰正变得越来越激进，很快任何质疑信仰的人都可能被贴上异教徒的标签。最好准备好我们的信徒并保护他们。"
 raiding_parties: "现代化长船"
 raiding_parties_desc: "将旧设计改造成新的造船技术"
 nordic_enclave: "诺斯飞地"
 nordic_enclave_desc: "在其他国家的领土上设立定居点和奴隶营地，我们可以在那些力量投射的国家中建立这些设施。"
 faithsworn: "信仰誓约战团"
 faithsworn_desc: "解锁下一级劫掠者，准备击退基督教异教徒。"
 stateraiders: "皇家侍卫"
 stateraiders_desc: "解锁下一级劫掠者，由国王和神祇共同授权。"
 royalguard: "宫廷卫队"
 royalguard_desc: "解锁下一级劫掠者，誓死保卫国王和国家"
 Restoreuppsala: "重建乌普萨拉神庙"
 Restoreuppsala_desc: "我们应当重建乌普萨拉神庙"
 norse_dueling_traditions: "死斗审判传统"
 norse_dueling_traditions_desc: "古老的死斗审判是通过正式决斗解决争端，现在已被编入法典。这项传统允许战士们通过仪式化的单人对决，来解决涉及荣誉、土地和血债的冲突。"
 skaldic_propaganda: "吟游诗人宣传"
 skaldic_propaganda_desc: "吟游诗人创作了华丽的赞美诗，歌颂王权与功绩。这些诗篇传遍全境，既巩固了王室权威，又将效忠王权塑造为文化认同的核心。"
 jarldom_taxation: "雅尔国税收"
 jarldom_taxation_desc: "王室加强了对贵族领地的控制，改革税收制度以从领主手中榨取更多收入，同时削弱其独立的权力基础。"
 norse_guilds: "北欧行会"
 norse_guilds_desc: "工匠与商人组建起正式行会，在全国范围内规范贸易与生产。这些组织为市民阶层带来繁荣，同时提升了制成品质量。"
 norse_nationalism: "北欧民族主义"
 norse_nationalism_desc: "一场文化觉醒席卷了北欧大地，学者、诗人乃至普通民众重新燃起了对古老传统的自豪。这场民族主义运动强化了文化认同，并将北欧的影响力传播至海外。"
 industrial_fishing: "工业捕鱼"
 industrial_fishing_desc: "现代技术与装备革新了古老的北欧渔业。大型船只、优质渔网和规模化船队显著提升了捕捞量，为沿海社区带来繁荣并促进了贸易发展。"
 norse_hof: "大厅"
 norse_hof_desc: "大厅是一种阿萨神族神殿，既是举行法庭审判的场所，也是进行宗教仪式的圣地。"
 hof_maintenance: "大厅维护"
 norse_great_hall: "战士大厅"
 norse_great_hall_desc: "战士大厅是战士们聚会的地方，他们在这里宴饮、夸耀和歌唱。"
 local_harbour: "北欧定居点"
 local_harbour_desc: "一个为北欧定居者建造的小型定居点，设有码头，规模虽小但对海上民族非常重要"
 grand_ting: "大庭议会"
 grand_ting_desc: "大庭议会是王国的最高议事机构，在这里，法律和信仰交汇。通过公开审判和誓言，大庭议会将统治者、人民和神明联系在一起。"
 grand_ting_maintenance: "大庭议会维护"
 norse_enclave: "北欧飞地"
 norse_enclave_desc: "一处北欧先驱者的定居点，从事当地商品与奴隶贸易。"
 norse_enclave_maintenance: "北欧飞地维护"
 templeofuppsala: "乌普萨拉神庙"
 templeofuppsala_desc: "重建后的乌普萨拉神庙，把所有神祇和萨迦聚集。"
 templeofuppsala_maintenance: "乌普萨拉神庙维护"
 godir_polytheism: "戈迪多神论"
 godir_polytheism_desc: "允许神职者侍奉多位神明，宗教权威因此保持分散，并与地方习俗紧密相连。"
 warrior_clergy: "尚武教士"
 warrior_clergy_desc: "神职人员也被要求成为战士，在战争时期需要战斗、领导和牺牲。"
 norse_huscarls: "侍卫亲兵"
 norse_huscarls_desc: "通过授予贵族维持扈从军的权利，王室承认私人卫队作为军事力量的重要支柱。"
 Godir_Sanctuaries: "圣地"
 Godir_Sanctuaries_desc: "允许教士建立永久宗教场所，正式化礼拜和学习，模仿外国修道传统，可以建立修道院。"
 slavebranding: "奴隶贸易行会"
 slavebranding_desc: "奴隶贸易对我国经济至关重要，因此必须由行会进行规范管理，确保所有权登记完备，并维持稳定的奴隶供应。"
 a_norse_raiders: "北欧掠夺者"
 a_norse_raiders_desc: "专为沿海袭击、河流攻击和快速撤退而训练的轻装展示"
 a_norse_raiders2: "经验丰富的掠夺者"
 a_norse_raiders2_desc: "身经百战且装备精良的老兵"
 a_norse_raiders3: "海上战团"
 a_norse_raiders3_desc: "适应了长途航行、协调的海军运输和沿海袭击的掠夺者。"
 a_norse_raiders4: "信仰誓约战团"
 a_norse_raiders4_desc: "通过正式誓言，劫掠部队与领主、信仰或王权的联系更为紧密。"
 a_norse_raiders5: "皇家侍卫"
 a_norse_raiders5_desc: "由国家批准的掠夺者在王室授权下而非地方领导人指挥下运作"
 a_norse_raiders6: "宫廷卫队"
 a_norse_raiders6_desc: "贴身侍卫的传统仅作为精英卫队延续，已不再是核心野战力量。"
 uppsalatemple: "乌普萨拉神庙"
 ranaheim: "拉纳海姆圣殿"
 paderborn_norse: "伊尔明苏尔"
 preikestolen: "布道石"
 helgafell: "海尔加费尔"
 torghatten: "托尔哈滕"
 fairhairlocation: "哈拉尔·费尔海尔的大厅"
 oldgormrunestones: "老高姆的耶灵石"
 stiklestad: "斯蒂克莱斯塔德"
 jorviknorse: "约维克"
 kyivnorse: "基辅"
 vinlandsettlement: "文兰定居点"
 holmgardr: "霍姆加德"
 reykjavíksettlement: "雷克雅未克定居点"
 corksettlement: "科尔"
 dublinnorse: "迪弗林"
 normandycapital: "鲁德"
 mannsettlement: "曼罗"
 eystribyggd: "东定居点"
 aldegjuborg: "阿尔德居堡"
 norse_temple: "阿萨神殿"
 norse_temple_desc: "一座供奉阿斯加德信仰的圣殿"
 norse_settlement: "北欧定居点"
 norse_settlement_desc: "曾经的维京殖民地所在地，对阿萨信仰来说是一个神圣的地方，值得重新夺回"
 worship_kristr_god: "尊奉克里斯托为我们的守护神"
 worship_kristr_god_desc: "基督徒所信奉的上帝“克里斯蒂尔”，虽非传统的阿萨神祇，却已跻身万神殿，成为众神之一。"
 kristr_god: "克里斯蒂尔"
 kristr_god_desc: "基督徒所信奉的上帝“克里斯蒂尔”，虽非传统的阿萨神祇，却已跻身万神殿，成为众神之一。"
 worship_hel_god: "$worship_title1$$hel_god$$worship_title2$"
 worship_hel_god_desc: "尊奉海拉为我们的守护神"
 hel_god: "海拉"
 hel_god_desc: "一位被尊奉为冥界、死亡与巫术女神的巨灵。"
 lots_of_norse: "我们[country|e]许多[pops|e]现在正信奉[ShowReligionName('norse')]。"
 norseevents.1.title: "旧信仰觉醒"
 norseevents.1.desc: "几代人以来，旧神的名字都是在低语中被提及，它们的名字被刻在石料上，但很少大声谈论。现在，这些声音越来越大。神殿再次得到照料，祭祀被重新记起，人们不仅仰望基督，还回顾奥丁、托尔和他们祖先的神明。祖先的信仰并没有消失，它一直在等待。摆在我们面前的问题不是旧神是否已经回归，而是我们将如何回应祂们的召唤。"
 norseevents.1.a: "强制首都回归旧信仰，无视叛乱度。"
 norseevents.1.b: "允许旧信仰在民众中自然发展。"
 norseevents.1.c: "接受基督为众神之一，形成融合信仰。"
 norseevents.2.title: "天才战士"
 norseevents.2.desc: "在队伍之中，有一位战士与众不同。无论是历经无数次战斗的锤炼，还是天生具备指挥的本能，他们的存在总能激发纪律、信心与雄心。问题不在于是否该运用这份才能——而在于如何运用。"
 norseevents.2.a: "将战士编入军队"
 norseevents.2.b: "雇佣这位战士作为侍卫。"
 norseevents.3.title: "大血祭"
 norseevents.3.desc: "当圣火点燃，诸神被呼唤，王国为一场盛大的祭祀而聚集。食物、黄金与鲜血的祭品被供奉于古老神祇之前，祈求在动荡岁月中获得祂们的眷顾，无论神明还是凡人都会铭记这场祭祀的规模。"
 norseevents.3.a: "举行一场地方祭祀"
 norseevents.3.b: "邀请宫廷参加血祭"
 norseevents.3.c: "在乌普萨拉神庙举行大血祭"
 norseevents.3.d: "诸神渴求鲜血"
 norseevents.4.title: "战士之道"
 norseevents.4.desc: "战场上伟大事迹的传说在王国中流传开来，那些关于英勇、谋略与刀剑交锋的故事。老兵们聚集在蜜酒厅分享智慧，年轻的战士们则磨利刀锋，梦想着荣耀。古老萨迦讲述着每个北境人生而为战士的时代，那时力量与勇气决定了一个人的价值。这种精神正再次苏醒。\n\n我们该如何传承这份战士的传统？"
 norseevents.4.a: "以盛宴与仪式，尊崇古老之道。"
 norseevents.4.b: "训练青年掌握战争艺术。"
 norseevents.4.c: "让他们为了荣耀与掠夺而战！"
 norseevents.4.d: "大海在召唤，强化我们的海军传统。"
 norseevents.5.title: "巫师的预言"
 norseevents.5.desc: "一位流浪的巫师来到了我们的宫廷，她声称众神之父赐予了她预视——那些尚未发生的战役。古时的先知们曾受到同等的敬畏，因为他们的话语能预言毁灭或荣耀。\n\n此刻她手持法杖立于我们面前，静静等待。整个宫廷屏息凝视。我们该向她询问什么？"
 norseevents.5.a: "遵从预言——让奥丁的智慧引领我们前行。"
 norseevents.5.b: "任命她为宫廷御用占卜师。"
 norseevents.5.c: "我们不需要她的预言，让她离开。"
 norseevents.5.d: "让她占卜一下我们的敌人。"
 norseevents.6.title: "来自北方的商人"
 norseevents.6.desc.furs: "一群饱经风霜的商人从我们北部边境远道而来。他们说着陌生的语言，身披驯鹿皮制成的衣物，但意图明确——他们渴望进行贸易。他们的雪橇满载着华美的毛皮：北极狐、貂以及品质非凡的熊皮，这类奢侈品在南方市场上能卖出高价。\n\n我们该如何接待这些北方商人呢？"
 norseevents.6.desc.silver: "一群饱经风霜的商人从我们北部边境远道而来。他们说着陌生的语言，身披驯鹿皮制成的衣物，但意图明确——他们渴望进行贸易，他们携带的皮袋沉甸甸地装满了白银。\n\n我们该如何接待这些北方商人呢？"
 norseevents.6.desc.leather: "一群饱经风霜的商人从我们北部边境远道而来。他们说着陌生的语言，身披驯鹿皮制成的衣物，但意图明确——他们渴望进行贸易。他们带来的货物包括用我们工匠闻所未闻的技艺鞣制的柔软皮革——海豹皮、海象皮，以及异常坚韧的驯鹿皮革\n\n我们该如何接待这些北方商人呢？"
 norseevents.6.desc.ivory: "一群饱经风霜的商人从我们北部边境远道而来。他们说着陌生的语言，身披驯鹿皮制成的衣物，但意图明确——他们渴望进行贸易，他们携带的海象牙，对于合适的买家来说都价值连城。\n\n我们该如何接待这些北方商人呢？"
 norseevents.6.desc.jewelry: "一群饱经风霜的商人从我们北部边境远道而来。他们说着陌生的语言，身披驯鹿皮制成的衣物，但意图明确——他们渴望进行贸易。他们展示了古老北方风格打造的琥珀与银制精美首饰，上面雕刻着野兽与符文图案。这类珍品足以成为任何贵族收藏中的亮点\n\n我们该如何接待这些北方商人呢？"
 norseevents.6.a: "建立贸易站，为未来的商业往来奠定基础。"
 norseevents.6.b: "购买他们的商品供应我们的市场。"
 norseevents.6.c: "以皇室之名，没收他们的货物！"
 norseevents.6.d: "交流知识与习俗"
 norseevents.7.title: "吟游诗人的提议"
 norseevents.7.desc: "一位著名的吟游诗人来到了我们的宫廷，他背着竖琴，口中吟唱着歌谣，他收集了无数丰功伟绩与英雄萨迦，如今正在寻找一位配得上他才华的赞助者。\n\n他提出要为[scope:target_ruler.GetName]和我们的王国谱写一部传奇史诗，一部将在未来数个世纪传唱的不朽之作。他提醒我们，最伟大的史诗能让被歌颂者获得永生。君王终将逝去，但其故事将永世流传。\n\n当然，这样的艺术创作并不便宜……"
 norseevents.7.a: "谱写一部宏伟史诗！"
 norseevents.7.b: "一首简朴的诗现在就足够了。"
 norseevents.7.c: "我们的功绩不言自明，无需他人传颂。"
 norseevents.8.title: "劫掠成功！"
 norseevents.8.desc: "我们的长船已从[scope:raid_target.GetName]的海岸满载战利品归来！战士们谈论着[scope:raided_location.GetName]那里毫无防备的村庄、富庶的修道院，以及来不及躲避迟钝农民。\n\n领导这次突袭的领主正等待你决定如何分配战利品。有人主张带回奴隶耕种田地，另一些人则只想要金银财宝。少数更大胆的战士提及那些藏满金十字架和珠宝圣物的富饶修道院……"
 norseevents.8.a: "带上奴隶和战利品！"
 norseevents.8.b: "只要金银，不留活口"
 norseevents.8.c: "修道院中藏有最珍贵的宝藏……"
 norseevents.8.d: "展现仁慈，我们将来可能需要盟友。"
 viking_raid_thralls_gained_tt: "从[scope:raided_location.GetName]掠夺的奴隶已添加至首都。"
 viking_raid_monastery_loot_tt: "从[scope:raided_location.GetName]的修道院中掠夺的圣物。"
 STATIC_MODIFIER_NAME_norse_rf: "北欧宗教狂热"
 STATIC_MODIFIER_DESC_norse_rf: "一股对旧信仰的宗教热情浪潮席卷了我们的国家。"
 STATIC_MODIFIER_NAME_norse_raider_spirit: "掠袭精神"
 STATIC_MODIFIER_DESC_norse_raider_spirit: "勇士们心中对荣耀和掠夺的渴望依然炽热"
 STATIC_MODIFIER_NAME_blessed_by_odin: "受到奥丁的祝福"
 STATIC_MODIFIER_DESC_blessed_by_odin: "众神之父的目光已降临我们，胜利与智慧将与我们同行。"
 STATIC_MODIFIER_NAME_false_prophecy: "虚假预言"
 STATIC_MODIFIER_DESC_false_prophecy: "巫师预言被证实为虚妄，如今我们对先知们的信仰已蒙上疑虑的阴影。"
 STATIC_MODIFIER_NAME_visions_of_war: "战争愿景"
 STATIC_MODIFIER_DESC_visions_of_war: "巫师已揭示敌人的弱点。我们将直击其盲区。"
 STATIC_MODIFIER_NAME_northern_trade_post: "北方贸易站"
 STATIC_MODIFIER_DESC_northern_trade_post: "一个永久的贸易站将我们与寒冷北方的商人连接起来。"
 STATIC_MODIFIER_NAME_reputation_harsh_traders: "严厉的贸易声誉"
 STATIC_MODIFIER_DESC_reputation_harsh_traders: "有传言说我们对外商非常严厉。"
 STATIC_MODIFIER_NAME_saga_of_the_realm: "领地传奇"
 STATIC_MODIFIER_DESC_saga_of_the_realm: "一首萨迦颂扬了我们统治者的丰功伟绩，在北方的蜜酒厅中传唱。"
 STATIC_MODIFIER_NAME_opinion_raided_us: "劫掠了我们的土地"
 STATIC_MODIFIER_DESC_opinion_raided_us: "维京掠夺者已洗劫了我们的海岸。"
 STATIC_MODIFIER_NAME_opinion_raided_our_churches: "亵渎了我们的教堂"
 STATIC_MODIFIER_DESC_opinion_raided_our_churches: "这些异教徒从我们的圣地偷走了圣物。"
 STATIC_MODIFIER_NAME_opinion_showed_mercy: "手下留情"
 STATIC_MODIFIER_DESC_opinion_showed_mercy: "他们本可夺走一切，却放过了我们的人民。"
 saga_of_ruler: "$ADJECTIVE$$FIRST_NOUN$"
 saga_of_ruler_desc: "一部歌颂英雄事迹与伟大战役的史诗，旨在将我们统治者与领地的荣耀永世传扬。"
 poem_of_ruler: "$FIRSTNAME$$LASTNAME$的诗作"
 poem_of_ruler_desc: "一首颂扬我们统治者美德与功绩的谦逊诗篇。"
 looted_religious_icon: "来自$ORIGIN$的圣像"
 looted_religious_icon_desc: "一件在维京劫掠中夺得的圣像，如今已成为征服的战利品。"
 looted_church_regalia: "来自$ORIGIN$的教会礼器"
 looted_church_regalia_desc: "在一次劫掠中从基督教教堂夺取的珍贵礼器。"
 helevents.1.title: "海拉低语"
 helevents.1.desc: "瘟疫肆虐我们的土地之际，一位女先知从暗影中现身，声称能保护我们的子民。她提及死亡女神海拉，并说唯有通过黑暗仪式才能平息她的怒火，阻止死亡的蔓延。\n\n绝望的民众为求得一线生机，开始倾听她的言语。传统祭司警告说，这类做法已近乎危险的死灵法术，但恐惧让人们愿意尝试任何方法。"
 helevents.1.a: "允许仪式进行，我们需要所有能得到的帮助"
 helevents.1.b: "我们不会支持它，但也不会阻止它"
 helevents.1.c: "这种黑暗魔法在我们的领地没有立足之地！"
 helevents.2.title: "海拉崇拜蔓延"
 helevents.2.desc: "海拉女祭司们显然取得的成功已在领地内传开。在[scope:cult_location.GetName]，临时搭建的海拉祭坛纷纷出现，人们夜间聚集于此参与防护仪式。\n\n该教派请求我们提供官方支持——包括建造正规祭坛的资金，以及保护他们免受打压。作为回报，他们承诺将提供更强大的防护。"
 helevents.2.a: "向教派提供黄金与资源"
 helevents.2.b: "让他们继续，但我们不会提供资金支持。"
 helevents.2.c: "开始压制这些危险行为"
 helevents.3.title: "献给海拉的黑暗祭品"
 helevents.3.desc: "海拉的女祭司们提出了一个阴森的要求。她们声称，要真正获得海拉的青睐并终结瘟疫，必须献上一位地位显赫之人作为祭品——而非牲畜。\n\n她们提议将[scope:sacrifice_candidate.GetName]作为合适的祭品。这位顾问似乎已接受了自己的命运，或许认为这将拯救众多生命。传统祭司们对此感到惊恐，但绝望的民众却视其为必要之举。"
 helevents.3.a: "海拉要求鲜血，那就如祂所愿。"
 helevents.3.b: "我们将提供动物和财宝代替"
 helevents.3.c: "这已经太过分了，不允许有任何牺牲！"
 helevents.4.title: "海拉之拥"
 helevents.4.desc: "赫尔教派在我们的领地内势力日益壮大。他们的仪式似乎成功遏制了瘟疫最严重的蔓延，平民对女祭司的崇敬几乎不亚于传统神职人员。\n\n女祭司长向我们提出了前所未有的建议：将海拉完全接纳为我们领地的守护神。她将与奥丁、托尔及其他诸神并列受奉。传统祭司们对此提议愤慨不已，但该教派的影响力已不容忽视。"
 helevents.4.a: "海拉将被尊奉为守护神。"
 helevents.4.b: "我们接受祂的保护，但不完全崇拜祂"
 helevents.4.c: "瘟疫正在消退，我们不再需要这种黑暗。"
 helevents.5.title: "教士抗议"
 helevents.5.desc: "阿萨神族与华纳海姆的传统祭司们已忍无可忍。他们聚集在我们面前，要求对海拉教派采取行动，声称该教派扭曲古老传统，玷污我们的信仰。\n\n“海拉在尼弗尔海姆有位置，”大祭司宣称，“而不是活人的心中。这个邪教承诺保护，却只带来黑暗。我们必须做出选择——是古老的神祇还是这种死亡崇拜。”"
 helevents.5.a: "海拉教派已证明其价值，支持他们"
 helevents.5.b: "我们一定能找到折中的办法……"
 helevents.5.c: "祭司们说得对，必须约束这个教派。"
 helevents.6.title: "瘟疫消退"
 helevents.6.desc: "终于街道上不再堆积尸体，生者重新燃起了希望。\n\n海拉教派宣称我们的幸存归功于他们，许多人对此深信不疑。女祭司们询问，既然眼前的危险已经过去，她们该扮演何种角色。有人希望解散这个教派，而另一些人则主张应保留如此强大的庇护力量。"
 helevents.6.a: "是教派拯救了我们，他们应该留下"
 helevents.6.b: "危险已过，还是解散吧"
 helevents.6.c: "让时间来裁决他们的命运"
 helevents.7.title: "往昔之影"
 helevents.7.desc: "瘟疫期间我们达成的黑暗交易并未被遗忘——尤其是海拉本人。异象频现困扰着我们的领地：牲畜胎死腹中，庄稼无故枯萎，还有笼罩大地的反常寒意。\n\n海拉的女祭司们宣称女神要求持续的供奉，“你们在需要的时候召唤了海姆冥界的女王，”她们警告说，“这样的债务不会轻易消失。”"
 helevents.7.a: "我们必须继续安抚海拉"
 helevents.7.b: "我们将摆脱这黑暗，无论代价如何"
 norse_god_events.1.title: "奥丁的眷顾"
 norse_god_events.1.desc: "众酋长以极大的虔诚举行了神圣的祭祀，征兆已明，众神之父正以赞许的目光守护着我们的领地。渡鸦盘旋于议事会之上，智者皆言奥丁的祝福已降临我们，智慧与战争之神赐予我们祂的恩宠。"
 norse_god_events.1.a: "敬颂全父！"
 norse_god_events.2.title: "奥丁的震怒"
 norse_god_events.2.desc: "众神之父不悦，祭司已发出警告，不祥之兆四处显现——渡鸦不再环绕圣林盘旋，睿智的先知们预言奥丁之眼正从我们的领地移开。我们必须取悦这位智慧之神，否则将承受祂的怒火。"
 norse_god_events.2.a: "我们激怒了众神之父……"
 norse_god_events.3.title: "托尔的祝福"
 norse_god_events.3.desc: "雷声滚滚，闪电击中了神圣的橡树——司祭们欢欣鼓舞！守护人类的托尔将祂威严的目光投向了我们的领地。我们的战士感受到祂的力量在他们的血管中流淌，敌人将在妙尔尼尔的力量面前颤抖。"
 norse_god_events.3.a: "雷霆之主万岁！"
 norse_god_events.4.title: "雷神之怒"
 norse_god_events.4.desc: "司祭带来噩耗——索尔不再赐福，无端风暴肆虐海岸。人类守护者已背弃我们，战士们感到四肢乏力。"
 norse_god_events.4.a: "雷神不悦了……"
 norse_god_events.5.title: "弗蕾雅的恩典"
 norse_god_events.5.desc: "司祭们悉心照料着弗蕾亚的圣林，女神因此对我们的领地展露笑颜。人们看到猫在神殿里嬉戏，女先知们说弗蕾亚的爱祝福着我们的人民。凡尔尼女神的目光所及之处，将会带来生育和繁荣。"
 norse_god_events.5.a: "向瓦尼尔的女神致敬！"
 norse_god_events.6.title: "弗蕾雅之泪"
 norse_god_events.6.desc: "司祭们哀叹弗蕾亚在哭泣，神圣的树林无人照料，女先知们在幻象中只看到悲伤。华纳神族的女士已收回祂的恩典，我们的土地正变得寒冷而贫瘠。"
 norse_god_events.6.a: "女神为我们哭泣……"
 norse_god_events.7.title: "提尔的正义"
 norse_god_events.7.desc: "提尔已聆听了我们的公正裁决，司祭们宣告祂的祝福降临我们的领地。提尔将赐予我们战斗的勇气与律法的智慧。凡我们所至之处，正义必将长存。"
 norse_god_events.7.a: "赞美正义之神！"
 norse_god_events.8.title: "提尔的审判"
 norse_god_events.8.desc: "司祭们谈论着提尔的不满。誓言已被违背，不义之事已然发生，法律之神将他唯一的手转向了我们。除非我们恢复领地的荣誉与真理，否则提尔将收回祂的祝福。"
 norse_god_events.8.a: "我们辜负了正义之神……"
 norse_god_events.9.title: "尼奥尔德的恩赐"
 norse_god_events.9.desc: "海神听到了司祭们的祈祷，海面归于平静，渔获丰饶，尼奥尔德祝福着我们的船只，让渔网满载而归。贸易繁荣兴旺，水手们歌颂着慷慨的华纳神祇。"
 norse_god_events.9.a: "向海神致敬！"
 norse_god_events.10.title: "尼奥尔德风的风暴"
 norse_god_events.10.desc: "司祭们警告说，尼奥尔德已心生不悦——这位海神收回了祂的庇佑。风暴毫无预警地肆虐我们的海岸，鱼群逃离我们的水域。除非我们向这位海洋之主恢复应有的祭祀仪式，否则我们的船只将在危机中航行。"
 norse_god_events.10.a: "大海对我们不利……"
 norse_god_events.11.title: "弗雷的丰饶"
 norse_god_events.11.desc: "司祭们在丰收节上恰如其分地向弗雷神献上了敬意，亚尔夫海姆之主正对我们的田野展露笑颜。金黄的麦穗因饱满的谷粒低垂，我们的牲畜也日渐肥硕。丰饶与繁荣之神弗雷，已为我们的土地赐予了丰盛的祝福。"
 norse_god_events.11.a: "向亚尔夫海姆之主致敬！"
 norse_god_events.12.title: "弗雷的凋零"
 norse_god_events.12.desc: "司祭们带来了令人不安的消息——弗雷神已收回眷顾，如今我们的田地日渐稀疏。亚尔夫海姆之主收回了丰饶的馈赠，子民们将面临艰难岁月。"
 norse_god_events.12.a: "丰收之神抛弃了我们……"
 norse_god_events.13.title: "海拉之眷"
 norse_god_events.13.desc: "那些照看海拉秘密圣坛的司祭们带来消息，尼福尔海姆的女王感到满意，并赐予我们祂的祝福。死亡在我们的战士面前俯首，敌人的阴谋在凋零。世界之间的界限变得稀薄，海拉的力量流淌于侍奉祂的人之中。"
 norse_god_events.13.a: "向亡者女王致敬！"
 norse_god_events.14.title: "海拉之怒"
 norse_god_events.14.desc: "海拉教派的司祭们警告说，尼福尔海姆女王不悦，其触手降临我们的领地——疫病在生者间蔓延，敌人在密谋。我们必须重获祂的眷顾，否则将承受死亡女神本尊的怒火。"
 norse_god_events.14.a: "冥府女王震怒……"
 norse_deposit_events.1.title: "发现新矿藏"
 norse_deposit_events.1.desc.iron: "在[target_location.GetName]工作的勘探者取得了非凡的发现——地下深处蕴藏着丰富的铁矿脉。当地领主们对此发现兴奋不已，声称这些矿石闪烁着奥丁的光芒。然而，要妥善开采这些矿藏，需要在工具、工人和基础设施方面投入大量资金，部分商人更倾向于现在就买断开采权。"
 norse_deposit_events.1.desc.copper: "一位牧羊人在[target_location.GetName]附近放牧时，为躲避暴风雨偶然发现了一条裸露的铜矿脉。这种泛着绿光的岩石预示着可用于青铜冶炼和贸易的丰富金属资源。开发这一资源需要大量资金，但长远收益可能相当可观。已有数家商人行会表示愿意直接买断开采权。"
 norse_deposit_events.1.desc.silver: "神明眷顾了[target_location.GetName]！工人们在清理土地时发现了珍贵的银矿脉，这种金属深受工匠喜爱，亦被领主珍视。如此财富足以将这个平凡之地转变为繁荣中心——尽管正规采矿作业的代价将十分高昂。消息早已传开，富有的商人们正为获得该发现的独家开采权而开出巨额价码。"
 norse_deposit_events.1.desc.lead: "[target_location.GetName]的矿工发现了储量可观的铅矿。虽然不如银矿或铜矿那样引人注目，但铅在建筑、配重和各种手工艺品制造中仍是不可或缺的材料。若能妥善开发，这片矿藏可为数代人提供稳定的收入来源。不过，前期投资相当巨大，部分商人更倾向于现在就买断开采权。"
 norse_deposit_events.1.desc.stone: "[target_location.GetName]的丘陵地带发现了品质非凡的石料，非常适合建筑与雕刻。工匠大师们声称这种岩石易于整齐切割，从防御工事到符文石皆可胜任。建立正规采石场需要大量资金，但这些石料必将为我们的领地带来巨大助益，远道而来的建筑商已提出用黄金换取独家开采权。"
 norse_deposit_events.1.desc.amber: "一场巨大的风暴将弗雷娅的眼泪——琥珀，冲上了[target_location.GetName]的海岸，其数量之多，在人们的记忆里前所未见。这些金色的石头如同阳光般闪耀，琥珀在整个已知世界都因其价值而备受珍视。建立永久的采集和加工体系需要投资，但南方的商人已经迫不及待地想要收购我们全部的收获。"
 norse_deposit_events.1.desc.salt: "在[target_location.GetName]附近，工人们发现了一处纯度极高的天然盐泉。盐对于在漫长冬季保存食物而言比白银更珍贵。妥善开发此地需要资金与人力，但产出的盐将巩固我们的领地，经营腌鱼贸易的商人愿意支付可观费用以获取开采权。"
 norse_deposit_events.1.desc.pearls: "在[target_location.GetName]附近的潜水员发现了富含珍珠蚌的水域，这些珍珠可以与远方海域的宝石相媲美。建立一个正规的采珠作业需要投资船只和培训工人，但外国宫廷的珠宝商愿意立即支付采珠权的费用。"
 norse_deposit_events.1.desc.lumber: "[target_location.GetName]的森林中生长着品质非凡的树木——它们笔直、高大，是建造船只的完美材料。经验丰富的造船大师声称，用这些木材打造的长船足以与北方海域的任何船只媲美，建立完善的产业需要大量投资，但外国商人愿意为木材开采权支付巨额黄金，他们迫切希望为自己的造船厂供应这种优质木材。"
 norse_deposit_events.1.desc.medicaments: "[target_location.GetName]的女性们发现此地生长着大量稀有的草药与药用植物。女巫们声称这些药草承载着治愈女神的祝福。妥善培育和采收这些植物需要投入资金，但来自遥远国度的医者和商人已提出用黄金换取独家开采权。 "
 norse_deposit_events.1.a: "投资开发此资源"
 norse_deposit_events.1.b: "出售权利，换取黄金"
 hel_cult_begins_tt: "海拉教派开始在我们的领地扎根。"
 hel_cult_tolerated_tt: "海拉教派虽被容忍，却未获官方认可"
 hel_cult_rejected_tt: "海拉教派已被取缔"
 dark_sacrifice_made_tt: "向海拉献上了黑暗的祭品——此事不会被遗忘"
 hel_unlocked_as_patron_tt: "现在可以选择海拉作为守护神"
 hel_cult_embedded_tt: "海拉教派已深深植根于我们的领地之中。"
 hel_cult_tolerated_deeply_tt: "海拉教派保持着显著的影响力"
 hel_cult_permanent_presence_tt: "海拉崇拜已成为我们领地的永久组成部分"
 hel_cult_disbanded_tt: "海拉教派已被解散"
 hel_influence_reduced_tt: "经过不懈努力，我们已削弱海拉对我们领地的掌控。"
 hel_refuses_release_tt: "海拉教派拒绝放弃对我们的领地的掌控……"
 STATIC_MODIFIER_NAME_hel_rituals_beginning: "海拉的早期仪式"
 STATIC_MODIFIER_DESC_hel_rituals_beginning: "海拉信徒们举行防护仪式以抵御瘟疫。"
 STATIC_MODIFIER_NAME_hel_cult_protection: "海拉保护"
 STATIC_MODIFIER_DESC_hel_cult_protection: "海拉教派的信仰庇护我们的人民免受疫病侵袭，尽管这需要付出代价。"
 STATIC_MODIFIER_NAME_hels_dark_blessing: "赫尔的黑暗祝福"
 STATIC_MODIFIER_DESC_hels_dark_blessing: "通过黑暗的献祭，我们赢得了海拉强大的庇护。"
 STATIC_MODIFIER_NAME_embrace_of_hel: "海拉之拥"
 STATIC_MODIFIER_DESC_embrace_of_hel: "海拉已被接纳为我们领地的万神殿神祇。"
 STATIC_MODIFIER_NAME_hels_shadow: "海拉之影"
 STATIC_MODIFIER_DESC_hels_shadow: "海拉的影响笼罩着我们的领地。"
 STATIC_MODIFIER_NAME_religious_division: "宗教分裂"
 STATIC_MODIFIER_DESC_religious_division: "海拉教派与传统神职人员之间的冲突动摇了我们的信仰根基。"
 STATIC_MODIFIER_NAME_hels_price: "海拉的价格"
 STATIC_MODIFIER_DESC_hels_price: "赫尔海姆的女王要求她的追随者继续进贡。"
 STATIC_MODIFIER_NAME_odins_blessing: "奥丁的祝福"
 STATIC_MODIFIER_DESC_odins_blessing: "众神之父以智慧与机巧守护着我们的领地。"
 STATIC_MODIFIER_NAME_odins_displeasure: "奥丁的震怒"
 STATIC_MODIFIER_DESC_odins_displeasure: "众神之父已将目光从我们的领地移开。"
 STATIC_MODIFIER_NAME_thors_blessing: "托尔的祝福"
 STATIC_MODIFIER_DESC_thors_blessing: "雷霆之力灌注于我军战士体内。"
 STATIC_MODIFIER_NAME_thors_displeasure: "托尔的震怒"
 STATIC_MODIFIER_DESC_thors_displeasure: "人类的保护者保留了力量。"
 STATIC_MODIFIER_NAME_freyas_blessing: "弗蕾雅的祝福"
 STATIC_MODIFIER_DESC_freyas_blessing: "瓦尼尔女神以爱与丰饶恩泽我们的土地。"
 STATIC_MODIFIER_NAME_freyas_displeasure: "弗蕾雅的震怒"
 STATIC_MODIFIER_DESC_freyas_displeasure: "女神垂泪，大地渐寒。"
 STATIC_MODIFIER_NAME_tyrs_blessing: "提尔的祝福"
 STATIC_MODIFIER_DESC_tyrs_blessing: "独臂之神赐予我们公正与勇气。"
 STATIC_MODIFIER_NAME_tyrs_displeasure: "提尔之怒"
 STATIC_MODIFIER_DESC_tyrs_displeasure: "法律之神已判定我们有所欠缺。"
 STATIC_MODIFIER_NAME_njords_blessing: "尼奥尔德的祝福"
 STATIC_MODIFIER_DESC_njords_blessing: "海神平息了波涛，让我们的渔网满载而归。"
 STATIC_MODIFIER_NAME_njords_displeasure: "尼奥尔德的不满"
 STATIC_MODIFIER_DESC_njords_displeasure: "海神已收回他的庇佑。"
 STATIC_MODIFIER_NAME_freys_blessing: "弗雷的祝福"
 STATIC_MODIFIER_DESC_freys_blessing: "亚尔夫海姆的领主赐福我们的田野，带来丰饶。"
 STATIC_MODIFIER_NAME_freys_displeasure: "弗雷的不满"
 STATIC_MODIFIER_DESC_freys_displeasure: "丰饶之神收回了祂的恩赐。"
 STATIC_MODIFIER_NAME_hels_blessing: "赫尔的祝福"
 STATIC_MODIFIER_DESC_hels_blessing: "尼福尔海姆的女王赐予我们掌控死亡与阴影的力量。"
 STATIC_MODIFIER_NAME_hels_displeasure: "海拉的不满"
 STATIC_MODIFIER_DESC_hels_displeasure: "死亡女神已将祂的冷酷怒火转向我们。"
 religious_influence_norse: "命运"
 religious_influence_norse_desc: "命运象征着你与诺恩三女神及其编织的命运丝线之间的关联。消耗命运值可祈求众神眷顾，从而塑造你的命数。"
 dissolve_monasteries_norse: "没收教堂"
 dissolve_monasteries_norse_desc: "夺取我们领地内基督教教堂的财富。这些异教神殿神庙在信奉阿萨神族国度里没有立足之地。"
 consult_volva_norse: "请教渥尔娃"
 consult_volva_norse_desc: "寻求渥尔娃的智慧，这位女先知能窥见诺恩编织的命运之线。她的预言或许能指引我们的领地度过动荡的时光。"
 hold_blot_norse: "举行祭典"
 hold_blot_norse_desc: "举行一次血祭，这是向诸神献祭的神圣盛宴。从简单的供品到包含人祭的盛大仪式，祭祀能加强我们与神明的联系。"
 norse_trade_networks: "北欧贸易网络"
 norse_trade_networks_desc: "承袭昔日连接波罗的海与拜占庭的瓦良格商人传统，北欧商人建立起遍布已知世界的广阔贸易网络。这些贸易纽带为我国海岸带来了财富与异域商品。"
 althing_republic_reform: "阿尔庭共和国"
 althing_republic_reform_desc: "阿尔庭是自由民的集会，在此颁布法律、解决争端，并通过民众呼声推选领袖。这一古老制度确保所有自由的诺斯人，从最卑微的农夫到最强大的酋长都能参与治理。"
 thing_assembly_reform: "庭议会"
 thing_assembly_reform_desc: "庭是北欧自由民社会的治理议会，这里会宣读法律条文、解决争端并作出影响社群的重要决策。"
 norseevents.9.title: "旧信仰式微"
 norseevents.9.desc: "宫廷传来消息，年轻贵族们竟公开嘲弄古老传统。近日的宴会上，数位雅尔之子公然取笑渥尔娃及其预言，称血祭是糟蹋上好牲畜的迷信之举。更有人夸口完全跳过献给奥丁的季节祭品。\n\n年长的领主们对此等亵渎行径震怒不已，警告说诸神必将降怒于这般不敬。然而也有人私语，或许这些年轻人只是道出了众人心声——旧日传统正随着世代更迭日渐式微。"
 norseevents.9.a: "此等亵渎之举，必遭严惩！"
 norseevents.9.b: "让年轻人畅所欲言m世界因此改变。"
 norseevents.9.c: "公开传唤一位仲裁者来解决此事。"
 norseevents.10.title: "孩子们不识符文之美"
 norseevents.10.desc: "一位游吟诗人带来了令人不安的消息。当他试图用传统卢恩符文石向年轻贵族们传授西格德与法夫纳的古老传说时，发现多数人已不识神圣的符文。我们最显赫家族的子孙们茫然凝视着祖辈曾引以为豪镌刻的符号。\n\n长老们归咎于外来基督教牧师及其拉丁字母腐蚀了年轻一代。另一些人则认为，在这个变迁的世界里，卢恩符文在贸易与外交中已不实用。但若不通晓符文，我们的子孙如何阅读先人镌刻的智慧，又如何祈求诸神恰如其分的庇佑呢？"
 norseevents.10.a: "为全体人民建立符文学校。"
 norseevents.10.b: "贵族必须亲自教导子女遵循古老的传统。"
 norseevents.10.c: "符文将作为戈迪尔独有的神圣知识传承。"
 norse_runic_schools: "符文学校"
 norseevents.11.title: "远道而来的朝圣者"
 norseevents.11.desc: "边境上来了些奇怪的旅人，请求参观我们神圣的树林和古老的神殿。这些异乡人自称学者与求道者，对奥丁、索尔和阿萨神族的信仰充满好奇。\n\n他们有的来自基督教国度，从商旅口中听闻我们圣地的传说；有的则是远渡重洋的异教徒，想来朝拜他们认为与自己神祇同源的神明。戈狄尔们意见分歧——有人视此为传播信仰荣光的良机，也有人对这些外来者深怀疑虑。"
 norseevents.11.a: "欢迎他们，让他们见证我们众神的荣耀。"
 norseevents.11.b: "他们可以来访，但必须为这份殊荣付出高昂代价。"
 norseevents.11.c: "将他们赶走，我们的圣地不容外人窥视。"
 norseevents.12.title: "瓦尔哈拉在召唤"
 norseevents.12.desc: "战场上光荣牺牲的勇士们手握武器、心怀勇气的故事已传遍四方。民众以肃穆崇敬的语气传颂瓦尔基里如何降临战场，将英魂迎往奥丁的英灵殿。\n\n阵亡者的家属为其牺牲感到骄傲，深知亲人此刻正与英灵战士共宴同战直至诸神黄昏。吟游诗人为他们谱写颂歌，百姓则期待王室决定如何最好地纪念这些与众神共饮的英雄。"
 norseevents.12.a: "为英灵殿新晋勇士们举办一场盛大的葬礼盛宴。"
 norseevents.12.b: "他们的牺牲激励着我们，年轻人纷纷前来接替他们的位置！"
 norseevents.12.c: "让吟游诗人将他们的名字传唱至永恒。"
 STATIC_MODIFIER_NAME_valhalla_inspiration: "瓦尔哈拉的启迪"
 STATIC_MODIFIER_DESC_valhalla_inspiration: "我们勇士的壮烈牺牲激励着生者。如今每位士兵都更加奋勇作战，因为他们知道，光荣战死者将进入英灵殿。"
 norseevents.13.title: "狂热者执斧"
 norseevents.13.desc: "一份令人不安的报告传到了宫廷。一位自称奉奥丁之名行事的狂热战士，在[target_location.GetName]用斧头袭击了一群皈依者。此人宣称，那些背弃古老诸神的人只配一死，众神之父索要他们的鲜血。\n\n尸体被发现摆放在一座粗糙的祭坛周围，地面上刻有符文。一些戈狄尔低声议论，或许此人受到了神圣疯狂的感召，正在执行诸神的意志。另一些人则感到恐惧——这样的暴行给信仰蒙羞，并可能招致邻近基督教王国的报复。"
 norseevents.13.a: "处决这个凶手，我们绝不纵容这种野蛮行径。"
 norseevents.13.b: "将他逐出我们的土地，让他成为别人的麻烦。"
 norseevents.13.c: "赞美他对众神之父的虔诚，奥丁渴求鲜血！"
 STATIC_MODIFIER_NAME_norse_zealous_fervor: "宗教狂热"
 STATIC_MODIFIER_DESC_norse_zealous_fervor: "一股宗教狂热浪潮席卷了这片土地。信徒们备受鼓舞，而异教徒则生活在恐惧之中。"
 STATIC_MODIFIER_NAME_norse_runic_schools: "符文学校"
 STATIC_MODIFIER_DESC_norse_runic_schools: "各地已建立传授古卢恩字母的学校，为全体人民传承我们神圣的文字传统。"
 STATIC_MODIFIER_NAME_norse_noble_runic_tradition: "贵族符文传统"
 STATIC_MODIFIER_DESC_norse_noble_runic_tradition: "贵族家族承担起将符文知识传承给后代的责任，从而加强了代际之间的联系。"
 STATIC_MODIFIER_NAME_norse_sacred_runes: "戈迪多符文"
 STATIC_MODIFIER_DESC_norse_sacred_runes: "符文已被宣布为神圣奥秘，唯有戈迪多能够掌握，他们借此与诸神沟通，并守护着古老的智慧。"
 norse_monastery: "占卜圣殿"
 norse_monastery_desc: "这是一处神圣的圣所，女先知与祭司在此修习古老的魔法，制作仪式祭品，并通过符文铭刻传承众神的智慧。"
 norse_mead_brewing: "酿造蜂蜜酒"
 norse_mead_brewing_desc: "这座神殿用蜂蜜和谷物酿造神圣的蜜酒，用于祭祀和供奉阿萨神族。"
 norse_fruit_wine: "果酒"
 norse_fruit_wine_desc: "用蜂蜜调味的发酵果酒，专为祭祀神灵的仪式盛宴和庆典而备。"
 norse_ritual_jewelry: "仪式珠宝"
 norse_ritual_jewelry_desc: "工匠们用铜与琥珀打造神圣护符与臂环——雷神之锤、奥丁渡鸦，以及由女先知赐福的守护符咒。"
 norse_runic_scriptorium: "符文缮写室"
 norse_runic_scriptorium_desc: "博学的祭司将神圣的符文铭刻在树皮与羊皮纸上，传承着祖先的史诗、传说与智慧。"
 norse_hide_tanning: "鞣制皮革"
 norse_hide_tanning_desc: "该圣地将狩猎所得兽皮加工成精致皮革，用于制作祭礼仪服、鼓面和神圣绑带。"
 norse_fur_processing: "毛皮加工"
 norse_fur_processing_desc: "来自原始森林的毛皮经过加工，既用于贸易，也用于制作女巫在赛德仪式中所穿的仪式斗篷。"
 norse_weapon_smithing: "武器锻造"
 norse_weapon_smithing_desc: "神圣武器在诸神的祝福下锻造而成——刻有胜利符文的剑与献给托尔的斧。"
 norse_naval_crafting: "舰船制造"
 norse_naval_crafting_desc: "这座神殿生产绳索、焦油以及长船的配件，这些长船在尼约德的庇护下，载着战士们驶向遥远的海岸。"
 cb_thrall_raiding: "部族掠夺"
 thing_assembly2_reforms: "庭议会改革"
 thing_assembly2_reforms_desc: "古老的议事会制度得到改革与编纂，形成了更高效的治理体系——自由民在此集会以解决争端、通过法律并为统治者提供建议。这一民主传统强化了整个领地的立法进程。"
 norse_thrall_culture_advance: "斯堪的纳维亚融合"
 norse_thrall_culture_advance_desc: "长船不仅带回了白银与奴隶，更载回了十余个异族，斯堪的纳维亚因此变得愈发奇特——也愈发强大。"
 norse_exchange_of_ideas: "水上的文字"
 norse_exchange_of_ideas_desc: "维京商人不仅沿着大河与海路运送货物，更传递着疑问，并带回答案。拜占庭工匠的技艺、撒拉逊学者的数学、法兰克农民的耕作方法，每次归航都为长屋带来新的东西。"
 norse_hearths_many_peoples: "多民族的家园"
 norse_hearths_many_peoples_desc: "曾经远征异国海岸的首领们现在发现那些同样的人与他们共享家园。法兰克人、斯拉夫人和萨拉森人都在诺斯世界留下了印记，不再是作为奴隶，而是作为邻居、工匠和亲人。斯堪的纳维亚不再是一个民族，而是多元民族。"
 norse_settling_the_shores: "异国扎根"
 norse_settling_the_shores_desc: "诺斯商人所至之处，诺斯定居者接踵而至。沿着大河，横跨公海，异国海岸上建起长屋。昔日通往白银之路的中转站，如今成为家园，曾经的劫掠之地，化作村庄。"
 thing_elective_succession: "庭选举继承"
 thing_elective_succession_desc: "当统治者离世，领地的自由民酋长、长老与商人齐聚于庭，共同推选下一位领袖，推荐最看重的是心智、言辞与武力的实际展现，血统虽在商议中占一定分量，但并非首要。经庭认可的新统治者将获得极高的正统性，因其权力源于人民的共同意志。"
 HEIR_SELECTION_SAME_DYNASTY_AS_CURRENT_RULER: "统治家族"
 HEIR_SELECTION_SAME_DYNASTY_AS_CURRENT_RULER_desc: "庭重视血脉的延续，对与现任统治者有血缘关系者会给予一定优待。"
 HEIR_SELECTION_FEMALE_DESC: "女性"
 HEIR_SELECTION_FEMALE_DESC_desc: "庭或许会选择一位女性来领导，但自由民们依然首先信赖他们的兄弟。"
 runestone: "符文石"
 runestone_desc: "当地教士设立的一块符文石"
 runestone_maintenance: "符文石维护"
 warrior_lodge_clergy_desc: "当地教士设立的战士训练营，旨在提升他们的武艺。"
 warrior_lodge_clergy: "战士圣殿维护"
 worship_idunn_god: "将伊登奉为我们的守护神"
 worship_idunn_god_desc: "青春金苹果的守护者伊登，赐福我们的果园，滋养着年轻的生命。"
 worship_ran_god: "将兰恩尊奉为我们的守护神"
 worship_ran_god_desc: "海之女神冉，将溺亡者拖入祂的网中。祂的祝福带来对沿海水域与商路的掌控。"
 worship_bragi_god: "尊奉布拉吉为我们的守护神"
 worship_bragi_god_desc: "诗歌与吟游诗人之神布拉吉，将甜言蜜语赐予我们的外交官，并激励我们的艺术家成就伟业。"
 worship_var_god: "尊奉瓦尔为我们的守护神"
 worship_var_god_desc: "誓言女神瓦尔聆听人间所有的承诺,祂的祝福会加强忠诚与效忠的纽带。"
 worship_heimdall_god: "尊奉海姆达尔为我们的守护神"
 worship_heimdall_god_desc: "众神的守望者与人类始祖海姆达尔，确保所有人皆得满足，并使奴隶得以役用。"
 worship_snotr_god: "尊奉斯诺特拉为我们的守护神"
 worship_snotr_god_desc: "智慧与机敏的化身斯诺特拉，祂磨砺我们子嗣的心智，亦将狡黠赋予那些游走于暗影中的人。"
 warrior_lodge_law: "战士公会"
 warrior_lodge_law_desc: "我们土地上流淌着诺斯战士的深厚传统。建立战士公会，既是对古老方式的尊崇，也是将最勇猛的战士们凝聚于神圣盟约之中。"
 has_not_assumed_warrior_lodge_in_last_25_years_tt: "过去25年内未建立战士公会"
 lodge_of_the_wolf_policy: "狼之会"
 lodge_of_the_wolf_policy_desc: "爱尔兰猎犬是提尔的狼战士，他们是凶猛而纪律严明的斗士，身披狼皮，运用狼群的狡黠智慧。"
 lodge_of_the_bear_policy: "熊之会"
 lodge_of_the_bear_policy_desc: "狂战士在战斗中激发熊之怒火，进入近乎无可阻挡的骇人狂暴状态。"
 lodge_of_the_raven_policy: "渡鸦会"
 lodge_of_the_raven_policy_desc: "以奥丁的渡鸦命名，渡鸦会重视智慧、策略和知识的收集。"
 lodge_of_the_serpent_policy: "巨蛇会"
 lodge_of_the_serpent_policy_desc: "受到环绕米德加尔德的世界巨蛇的启发，这个战士公会尊崇海洋及其征服者。"
 lodge_of_the_boar_policy: "野猪会"
 lodge_of_the_boar_policy_desc: "以传说中的野猪阵列战法命名，野猪会重视坚定和防御能力。"
 STATIC_MODIFIER_NAME_joined_lodge_of_the_wolf: "狼之会"
 STATIC_MODIFIER_DESC_joined_lodge_of_the_wolf: "该角色已经被引入了狼之会，成立了狼战士团。"
 STATIC_MODIFIER_NAME_joined_lodge_of_the_bear: "狂战士"
 STATIC_MODIFIER_DESC_joined_lodge_of_the_bear: "该角色已加入熊之会，能够引导狂战士的战斗怒火。"
 STATIC_MODIFIER_NAME_joined_lodge_of_the_raven: "渡鸦之歌"
 STATIC_MODIFIER_DESC_joined_lodge_of_the_raven: "该角色已引入渡鸦会，这是一个追寻智慧与传统的组织。"
 STATIC_MODIFIER_NAME_joined_lodge_of_the_serpent: "耶梦加得"
 STATIC_MODIFIER_DESC_joined_lodge_of_the_serpent: "该角色已引入蛇之会，他们是海洋和海战的大师。"
 STATIC_MODIFIER_NAME_joined_lodge_of_the_boar: "野猪阵"
 STATIC_MODIFIER_DESC_joined_lodge_of_the_boar: "该角色已引了野猪会，成为了坚不可破的盾墙大师。"
 join_foreign_warrior_lodge: "加入外国战士公会"
 join_foreign_warrior_lodge_concept: "派遣一位角色加入另一个北欧领地的战士公会。"
 join_foreign_warrior_lodge_desc_specific: "派遣此角色加入外国战士公会，以加强我们两国之间的联系。"
 join_foreign_warrior_lodge_select_title: "选择一个拥有战士公会的北欧领地加入"
 join_foreign_warrior_lodge_no_countries: "没有拥有不同战士公会的北欧领地可用"
 invite_to_warrior_lodge: "邀请加入战士公会"
 invite_to_warrior_lodge_concept: "邀请一位角色加入我们的战士公会。"
 invite_to_warrior_lodge_desc_specific: "邀请这位角色加入我们领地的战士公会。"
 establish_warrior_lodge_norse: "建立战士公会"
 establish_warrior_lodge_norse_desc: "召集我们最勇猛的战士，建立一座神圣的战士公会，让他们在战争守护神的见证下结为兄弟。"
 warrior_lodge_country_cooldown: "必须等待10年才能进行下一次战士公会行动"
 character_can_join_warrior_lodge_tt: "该角色符合加入战士公会的要求。"
 opinion_joined_our_warrior_lodge: "加入我们的战士公会"
 norse_warrior_lodge.1.title: "战士公会"
 norse_warrior_lodge.1.desc: "长久以来，我国勇士们常在厅堂聚首，分享战斗故事，以荣耀诸神。如今，最负盛名的战士们决意将这些联结正式化，建立神圣的战士公会，共同侍奉战争守护灵。\n\n各战士公会遵循不同道途：狼会战士传承狼群的狡黠，熊会拥抱巨熊的怒意，渡鸦会追寻奥丁神鸦的智慧，蛇会统御海洋，而野猪会战士则铸就坚不可摧的盾墙。\n\n我们的勇士当追随哪条道途？"
 norse_warrior_lodge.1.a: "建立狼之公会——狼战士们将团结！"
 norse_warrior_lodge.1.b: "建立熊之公会——让狂暴战士的怒火尽情释放！"
 norse_warrior_lodge.1.c: "建立渡鸦公会——智慧指引长矛，一如力量般坚定。"
 norse_warrior_lodge.1.d: "建立蛇之公会——海洋是我们的领地。"
 norse_warrior_lodge.1.e: "建立野猪会——盾墙永不破裂！"
 norse_warrior_lodge.1.f: "我们不需要这样的公会，旧有的方式足矣。"
 MODIFIER_TYPE_NAME_is_in_warrior_lodge: "在战士公会中"
 MODIFIER_TYPE_DESC_is_in_warrior_lodge: "这禁止该角色加入另一个#Y 战士公会#!。"
 MODIFIER_TYPE_NAME_has_warrior_lodge: "有战士公会"
 MODIFIER_TYPE_DESC_has_warrior_lodge: "这允许我们宗教的[characters|e]加入我们的#Y 战士公会#!。作为公会成员，该角色将获得以下加成：\n-每月威望：#G +0.03#!\n-行政/外交/军事能力：#G +15#!\n- 个特定公会的修正"
 invite_to_warrior_lodge_past: "受邀加入战士公会"
 invite_to_warrior_lodge_act_past: "该角色已被接纳进入战士公会，他在诸神面前宣誓兄弟情谊，并承诺在战斗和议事中维护武士会的荣誉。"
 norse_patron.1.title: "神的恩宠"
 norse_patron.1.desc: "[Root.GetName]迎来了一位新统治者。依照诺斯人的传统，[scope:target_ruler.GetName]必须宣告将选择阿萨神族还是华纳神族作为其个人守护神。"
 norse_patron.1.a: "我献身于众神之父奥丁。"
 norse_patron.1.b: "我献身于米德加德的守护者索尔。"
 norse_patron.1.c: "我敬奉瓦尼尔女神弗雷娅"
 norse_patron.1.d: "我向独臂的提尔宣誓效忠。"
 norse_patron.1.e: "我寻求海洋之神尼约德的祝福"
 norse_patron.1.f: "我献身于丰收之神弗雷"
 norse_patron.1.hel: "我行走于海拉之路。"
 norse_patron.1.kristr: "我向白神克里斯托尔祈祷"
 norse_patron.1.idunn: "我敬奉金苹果的守护者，伊登"
 norse_patron.1.ran: "我向海洋的化身——拉恩宣誓效忠。"
 norse_patron.1.bragi: "我献身于诗歌之神布拉吉。"
 norse_patron.1.var: "我向誓言女神瓦尔起誓"
 norse_patron.1.heimdall: "我召唤海姆达尔，众神的守望者。"
 norse_patron.1.snotr: "我祈求谨慎女神思诺特的智慧。"
 STATIC_MODIFIER_NAME_pledged_to_odin: "向奥丁立誓"
 STATIC_MODIFIER_DESC_pledged_to_odin: "这位统治者已向奥丁宣誓效忠——祂是智慧的追寻者、卢恩符文的大师，也是英灵殿的主宰。"
 STATIC_MODIFIER_NAME_pledged_to_thor: "向索尔宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_thor: "这位统治者已向托尔宣誓效忠——他是雷神之锤的持有者，也是诸神与人类的守护者。"
 STATIC_MODIFIER_NAME_pledged_to_freyja: "向芙蕾雅宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_freyja: "这位统治者已向芙蕾雅宣誓效忠——祂是巫术之主、阵亡者的遴选者，亦是爱情女神。"
 STATIC_MODIFIER_NAME_pledged_to_tyr: "向提尔宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_tyr: "这位统治者已向提尔宣誓效忠——提尔为束缚恶狼芬里尔而牺牲了自己的手，祂是正义与公正之战的神祇。"
 STATIC_MODIFIER_NAME_pledged_to_njord: "向尼奥尔德宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_njord: "这位统治者已向尼奥尔德——海风之主与财富赐予者宣誓效忠。"
 STATIC_MODIFIER_NAME_pledged_to_freyr: "向弗雷宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_freyr: "这位统治者已向弗雷宣誓效忠——祂是阿尔夫海姆的领主，掌管阳光、雨水与丰收的神祇。"
 STATIC_MODIFIER_NAME_pledged_to_hel: "向海拉宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_hel: "这位统治者已向海拉宣誓效忠——祂是洛基之女、尼福尔海姆的统治者，亦是亡者的主宰。"
 STATIC_MODIFIER_NAME_pledged_to_kristr: "向克里斯蒂尔宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_kristr: "这位统治者已皈依白基督——一位宣扬宽容与秩序的外来神明。"
 STATIC_MODIFIER_NAME_pledged_to_idunn: "向伊登宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_idunn: "这位统治者已向伊登宣誓效忠——祂是守护金苹果的女神，这些金苹果赐予众神永恒的青春。"
 STATIC_MODIFIER_NAME_pledged_to_ran: "向拉恩立誓"
 STATIC_MODIFIER_DESC_pledged_to_ran: "这位统治者已向拉恩立誓——祂是那位将网撒向波涛、溺亡者的女神。"
 STATIC_MODIFIER_NAME_pledged_to_bragi: "向布拉吉宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_bragi: "这位统治者已向布拉吉——诗歌、雄辩与吟游艺术之神宣誓效忠。"
 STATIC_MODIFIER_NAME_pledged_to_var: "向瓦尔宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_var: "这位统治者已在誓言与契约女神瓦尔面前立誓，祂将严惩背信之人。"
 STATIC_MODIFIER_NAME_pledged_to_heimdall: "向海姆达尔宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_heimdall: "这位统治者已向海姆达尔宣誓效忠——祂是比弗罗斯特永不疲倦的守护者，将在诸神黄昏吹响加拉尔号角。"
 STATIC_MODIFIER_NAME_pledged_to_snotr: "向斯诺特宣誓效忠"
 STATIC_MODIFIER_DESC_pledged_to_snotr: "这位统治者已向斯诺特宣誓效忠——祂是智慧与自律的女神，也是博学者的守护神。"
 conduct_raid: "进行劫掠"
 conduct_raid_desc: "召集人手突袭异国港口，带回奴隶与黄金！"
 sponsor_hof: "赞助一场$Hof$"
 sponsor_hof_desc: "若能在我们最显赫的城镇中建造一座宫廷，我们的治理将受到尊崇。"
 finance_the_warriorhalls: "支持乡社"
 finance_the_warriorhalls_desc: "通过建造战士大厅来支持我们土地上的战士们"
 courtofjarls: "誓约领主"
 courtofjarls_desc: "作为免除赋税并派遣子嗣担任国王亲卫的交换条件，领地内的贵族如今已向国王宣誓效忠。在王室宫廷中成长，是每一位年轻贵族人生不可或缺的一部分。"
 fornsidrcaste: "诺斯古道战士阶级"
 fornsidrcaste_desc: "贵族阶级首先是战士，其次才是庄园领主。他们有责任为国王率领军队，并以盾墙与战斧之道训练新兵。作为回报，国王绝不依赖金钱雇佣之人——凡亲卫所在之处， 外人不得涉足。"
 oldgodswoken_situation: "旧信仰觉醒"
 oldgodswoken_situation_desc: "这片领地已背离罗马，转而信奉古老的北欧诸神。但此举意味着什么？信仰的纯粹程度、是否妥协、是否愿意共存仍有待定夺。古礼派要求彻底恢复旧日信仰；融合派则声称混合信仰是力量而非软弱；而那些从未停止向基督教上帝祈祷的人们，则在暗中观望、等待并组织起来。"
 OLDGODSWOKEN_FORN_SIDR_STRENGTH: "诺斯古道压力"
 OLDGODSWOKEN_FORN_SIDR_STRENGTH_DESC: "古老北欧信仰派系对纯粹复辟是不容融合、不容宽容、不容妥协。若此数值达到100，原教旨主义者将不再请愿，而是直接走上街头游行示威。"
 OLDGODSWOKEN_RETT_TRU_STRENGTH: "基督教抵抗运动"
 OLDGODSWOKEN_RETT_TRU_STRENGTH_DESC: "基督教社群在抵制皈依方面变得愈发有组织且大胆。每一次压迫行为，以及每一位送来鼓励的天主教邻邦，都会使其不断壮大。若此数值达到100，便会爆发公开叛乱。"
 OLDGODSWOKEN_REALM_STATUS: "旧信仰觉醒"
 hint_oldgodswoken: "旧信仰觉醒"
 hint_oldgodswoken_desc: "你的领地已宣布皈依诺斯信仰，但过渡过程充满争议。复古信仰派系主张彻底且毫不妥协地恢复旧制，基督教社群则抵制改宗。若能在此双重压力下维持十年不爆发内战——这条融合折衷之路将成为国家最终的答案。"
 oldgodswoken_legend_contested: "旧信仰觉醒"
 oldgodswoken_legend_converted: "近期改宗（叛乱）"
 oldgodswoken_situation.1.title: "重拾旧日之道"
 oldgodswoken_situation.1.desc: "它并非始于天降雷霆。它始于蜜酒大厅之中。在那些年轻的酋长与领主之子间——这些人曾目睹父辈向罗马屈膝，目睹教会攫取他们祖父为之浴血的土地，目睹主教们端坐在本应只有战士发言的议事会上——一种不同的言论已悄然生根。他们谨慎地宣称，这不是异端。而是记忆。那些古老的故事、古老的仪式、那些主宰命运、海洋与剑刃力量的古老名讳。这究竟是真正信仰的重燃，还是披着狼皮的野心，将成为这些大厅里世代争论的问题。或许两者皆是。或许皆非。可以确定的是，这股势头悄然积聚，而后骤然爆发——如今[ROOT.GetName]已背弃了十字架。古道信仰派系，向来缺乏耐心，已然在谈论全面复兴。融合派的声音则主张更缓慢、更广泛的皈依——不强求，而是说服。而在王国更安静的角落，那些仍在向基督上帝祈祷的人们正注视着，等待着看清这究竟是怎样一种回归。"
 oldgodswoken_situation.1.a: "那就让它彻底毁灭吧，古老的信仰不容半分妥协。"
 oldgodswoken_situation.1.a.tt: "全领地内的所有天主教人口将开始皈依诺斯信仰。基督徒们将激烈抵抗。\n#G 古道信仰压力#!#R +5#!\n#R 基督教抵抗#!#R +20#!"
 oldgodswoken_situation.1.b: "领地已做出抉择，让变革随时间而来，而非战火。"
 oldgodswoken_situation.1.b.tt: "只有首都区域会经历大规模改宗。领地的其余部分则任其自行发展。"
 oldgodswoken_situation.1.c: "原因并不重要，结果才是关键。在要求他们献上祭坛之前，先赢得他们的心。"
 oldgodswoken_situation.1.c.tt: "基督教的抵抗被彻底消灭。一项永久修正赋予稳定，但正统性受损。只有首都区域发生皈依。"
 oldgodswoken_situation.2.title: "被绞死的神"
 oldgodswoken_situation.2.desc: "一位颇有名望的吟游诗人创作了一首诗，在集市和殿堂间传播的速度比压制它的速度更快。他作了一个类比：奥丁被长矛刺穿，在世界之树上悬挂九日，为智慧献祭自身。白基督被长矛刺穿，悬于木十字架上，为其子民献祭自身。这首诗问道，或许他们只是透过不同眼睛看到的同一场献祭？古道信仰的贵族们震怒。基督教社群则以另一种方式感到不安。是否让这首歌谣继续流传，将由国王定夺。"
 oldgodswoken_situation.2.a: "让歌声传扬。这对比之中，确有值得探寻的真理。"
 oldgodswoken_situation.2.a.tt: "随着领地找到一条中间道路，两种压力都在减弱。  \n#G 古道信仰压力#!#G -4#!  \n#R 基督教抵抗#!#G -3#!"
 oldgodswoken_situation.2.b: "让吟游诗人噤声，奥丁并非基督，此等混淆只会削弱两种信仰。"
 oldgodswoken_situation.2.b.tt: "吟游诗人被囚禁，其财富遭没收。\n#G 古道信仰压力#!#R +5#!"
 oldgodswoken_situation.2.c: "让神学家们私下辩论吧，此事不宜公开讨论。"
 oldgodswoken_situation.3.title: "集镇边缘的小教堂"
 oldgodswoken_situation.3.desc: "一位长期居住于[scope:chapel_location.GetName]的商人建有一座小礼拜堂——不过就是一间雕着十字架的木屋，但确确实实存在于此。当地雅尔已将此事上报国王，并非出于冒犯之意，而是因为古道信仰派系早已获悉此事，正静观其变，欲知国王将作何处置。该商人在此定居已二十年，雇有四十名工人。他坚称并无冒犯之意。"
 oldgodswoken_situation.3.a: "拆了它，现在这里是诺斯人的领地，象征意义很重要。"
 oldgodswoken_situation.3.a.tt: "教堂被毁，信徒四散。我们的基督教邻居注意到了此事。\n#G 古道信仰压力#!#R +4#!\n#R 基督教抵抗#!#G -6#!"
 oldgodswoken_situation.3.b: "就这样吧，一扇紧闭门扉后的礼拜堂，改变不了什么。"
 oldgodswoken_situation.3.b.tt: "教堂内的贵重物品被洗劫一空。基督徒们的反抗行为愈发大胆。\n#R 基督教抵抗#!#R +5#!"
 oldgodswoken_situation.3.c: "公开允许此事，并将其作为领地宽容的典范。"
 oldgodswoken_situation.3.c.tt: "宽容能缓和双方关系，但会削弱我们的决心。\n#G 古道信仰压力#!#G -3#!\n#R 基督教抵制#!#G -3#!"
 oldgodswoken_situation.4.title: "派系要求举行血祭"
 oldgodswoken_situation.4.desc: "古道信仰派系已呈递正式请愿：他们要求举行一场盛大的血祭——一场以古神之名、在都城公开举行的神圣献祭与宴飨。绝非私密仪式，而是一份宣言。他们在请愿书中写道：这片领地既已重归真正的信仰——便当昭示天下。让罗马知晓它失去了什么。议事会中那些主张融合的声音此刻静默无声。他们心知肚明，这场盛大的公开血祭对仍生活在领地边境内的基督教社群意味着什么。"
 oldgodswoken_situation.4.a: "准了。一场公开的血祭，胜过千言万语。"
 oldgodswoken_situation.4.a.tt: "一场盛大的献祭激励了信徒。\n#G 古道信仰压力#!#R +8#!\n若基督教抵抗度高于25，还将增加#R +4#!。"
 oldgodswoken_situation.4.b: "一场简朴的仪式，无需华丽排场。神明自会明鉴我们内心的虔诚。"
 oldgodswoken_situation.4.b.tt: "微薄的祭品亦能取悦诸神。\n#G 古道信仰压力#!#R +3#!"
 oldgodswoken_situation.4.c: "祭祀何时举行，由国王决定，而非派系，提醒他们这一点。"
 oldgodswoken_situation.4.c.tt: "公会遭到拒绝。我们的克制让基督徒们备受鼓舞。\n#R 基督教抵抗#!#G -5#!"
 oldgodswoken_situation.5.title: "门前的神父"
 oldgodswoken_situation.5.desc: "一位年迈、风尘仆仆、能流利使用古诺斯语的基督教牧师，来到了[ROOT.Capital.GetName]的城门前。他身上并无武器，只携带着一本福音书和一枚十字架，自称只是寻求庇护与坦诚的辩论。他说，他听说诺斯人中不乏渴求真理之人，无论真理藏于何处。古道信仰的贵族们已纷纷向王宫发去消息。此事若再拖延，恐将演变为一场闹剧，国王必须尽快作出决断。"
 oldgodswoken_situation.5.a: "就让他发言吧，在我们的议事厅里，按我们的规矩。我们自会倾听他的言辞。"
 oldgodswoken_situation.5.a.tt: "我们试图劝化这位祭司。他有可能成为一名有用的顾问。\n#G 古道信仰压力#!#R +7#!\n#R 基督教抵抗#!#R +5#!"
 oldgodswoken_situation.5.b: "把他赶走，然后拿走他的东西。"
 oldgodswoken_situation.5.b.tt: "他的银器和圣物被没收了。\n#R 古道信仰压力#!#R +4#!"
 oldgodswoken_situation.5.c: "让他宣扬团结"
 oldgodswoken_situation.5.c.tt: "双方以稳定性和正统性为代价平息了争端。\n#R 古道信仰压力#!#G -5#!\n#R 基督教抵抗#!#G -5#!"
 oldgodswoken_situation.6.title: "象征法令"
 oldgodswoken_situation.6.desc: "国王颁布了诏令：公共场合禁止出现基督教十字架与标志。古道信仰派对此高声赞同。然而，领地境内的基督教社区听闻此讯后陷入缄默——问题在于，他们究竟是会低头顺从，还是开始奋起反抗。\n\n#color_yellow 此项决策有50%的成功概率。#!"
 oldgodswoken_situation.6.a: "法令已定，十字架从公众视野中消失。"
 oldgodswoken_situation.6.a.tt: "#G 成功#!（#color_yellow 50%#!概率）——禁令得以维持。基督教象征物被摧毁，其黄金被熔毁。\n#G 古诺斯古道压力#!#R +6#!\n#R 基督教抵抗#!#G -15#!"
 oldgodswoken_situation.6.b: "法令坚定了决心，被捕者成为象征。"
 oldgodswoken_situation.6.b.tt: "#R 失败#!（#color_yellow 50%#!概率）——禁令适得其反。基督徒们围绕他们隐藏的十字架团结起来。\n#G 古道信仰压力#!#R +4#!\n#R 基督徒抵抗#!#R +20#!"
 oldgodswoken_situation.7.title: "大清洗"
 oldgodswoken_situation.7.desc: "战士公会成员穿行于城镇乡村的街道，驱散集会、收缴基督教象征物，并直面那些不愿公开皈依古老信仰之人。此举究竟能震慑反抗者还是激化矛盾，如今已交由命运裁决。\n\n#color_yellow 此事有60%的概率在未引发严重反弹的情况下取得成功。#!"
 oldgodswoken_situation.7.a: "清洗行动维持了纪律，抵抗势力四散溃逃。"
 oldgodswoken_situation.7.a.tt: "#G 成功#!（#color_yellow 60%#!概率），基督徒的抵抗瓦解，其财富被没收。\n#G 古道信仰压力#!#R +6#!\n#R 基督徒抵抗#!#G -20#!"
 oldgodswoken_situation.7.b: "清洗行动愈演愈烈，一户人家被从家中拖走。"
 oldgodswoken_situation.7.b.tt: "#R 失败#!（#color_yellow 40%#!概率），基督徒奋起反抗，殉道者因此诞生。\n#G 古道信仰压力#!#R +4#!\n#R 基督徒抵抗#!#R +10#!"
 oldgodswoken_situation.10.title: "断层线显现"
 oldgodswoken_situation.10.desc: "事态已无法悄然掌控。在[ROOT.GetName]的各个城镇，关于复兴信仰形态的两种主张已从争论演变为对抗。古道信仰派正在武装集结，基督教社群也在组织动员。议会中的调和之声仍在发言，却无人倾听。或许尚有斡旋和平的余地——但时机正在流逝。"
 oldgodswoken_situation.10.a: "让他们来吧，诸神将决定这片领地的真正归属。"
 oldgodswoken_situation.10.a.tt: "我们接受动荡，并为即将到来的一切做好准备。"
 oldgodswoken_situation.10.b: "买下所剩的时间。寻得黄金，觅得箴言。"
 oldgodswoken_situation.10.b.tt: "巨额的金币与威望支出为我们争取了时间。\n#G 古道信仰压力#!#G -15#!\n#R 基督教抵抗#!#G -15#!"
 oldgodswoken_situation.12.title: "古道信仰的胜利"
 oldgodswoken_situation.12.desc: "战士公会的士兵穿行于城镇与村庄的街道，驱散集会、收缴基督教圣像，并公然质问那些不愿公开皈依古老信仰之人。清洗已然开始——这里没有谈判的余地，对紧握十字架者亦无丝毫怜悯，古老的神灵要求绝对的虔诚。"
 oldgodswoken_situation.12.a: "清洗行动纪律严明，反抗势力四散遁入沉寂。"
 oldgodswoken_situation.12.a.tt: "基督教人口遭到清洗。\n#color_yellow 旧信仰觉醒#!局势以胜利告终。"
 oldgodswoken_situation.13.title: "改革贵族阶层"
 oldgodswoken_situation.13.desc: "我们人民心中燃烧着古老的信仰之火。我们的酋长和亲兵们追随着先人的足迹，那时贵族的荣耀并非在宫廷与账册中铸就，而是在盾墙与蜜酒厅里锤炼而成。\n\n#color_yellow 古道信仰#!的影响力已壮大到足以让我们彻底废除旧有的封建特权，并按照祖先的典范，将其重塑为#G 纯粹的武士阶层#!。"
 oldgodswoken_situation.13.a: "改革贵族制度，重振武士阶层！"
 oldgodswoken_situation.13.a.tt: "所有现有贵族特权均被废除。贵族阶层被重组为诺斯战士种姓，享有#G 古道信仰种姓#!、#G 雅尔议会#!和#G 诺斯家臣#!特权。\n#G 古道信仰压力#!#R +10#!"
 oldgodswoken_situation.13.b: "目前的安排对我们有利。"
 oldgodswoken_situation.13.b.tt: "眼下，我们暂且维持贵族现状不变。"
 oldgodswoken_situation.14.title: "觉醒者之路"
 oldgodswoken_situation.14.desc: "自#G 旧神#!从沉睡中苏醒已过三载。领地因意志而躁动——但意志需被引导。\n\n我们应将#G 古道信仰#!的火焰播撒至疆域之外，在境内点燃知识的火种，还是磨利战斧准备征服？"
 oldgodswoken_situation.14.a: "将旧信仰传播给我们的附庸国与盟友！"
 oldgodswoken_situation.14.a.tt: "所有附庸国及与我们共享统治者的国家都皈依了#G 诺斯#!信仰。这场伟大的觉醒为我们带来了#color_yellow 500#!金币、稳定与威望。"
 oldgodswoken_situation.14.b: "专注内政，建设一个学识渊博的王国。"
 oldgodswoken_situation.14.b.tt: "持续10年：#G +0.01#!每月识字率，#G +5%#!研究速度，#G -0.025%#!稳定度衰减。"
 oldgodswoken_situation.14.c: "向外扩张，让世界见识我们的斧头！"
 oldgodswoken_situation.14.c.tt: "持续10年：#G 征兵规模+20%#!，#G 征兵作战效率+10%#!，#G 宣战成本-50%#!。"
 oldgodswoken_situation.16.title: "旧信仰的捍卫者"
 oldgodswoken_situation.16.desc: "战争已向[ROOT.GetName]宣战——时机再宿命不过。王国正处于伟大的宗教复兴进程中，民众将这场外敌入侵视为诸神亲降的试炼。\n\n农夫放下耕犁。从未握过长矛的年轻人争相索求武器。吟游诗人在蜜酒大厅里谱写诗篇，将此刻比作诸神黄昏。无论是古道信仰派还是怀疑论者，此刻都达成共识：绝不容许异国君王主宰北地的信仰。\n\n古老的火焰正在燃烧，让敌人来吧。"
 oldgodswoken_situation.16.a: "诸神注视！拿起武器！无论男女，无论老少，人人皆兵！"
 oldgodswoken_situation.16.a.tt: "For 5 years: #G +10%#! land morale, #G +10%#! levy size. The realm rallies behind its faith."
 oldgodswoken_situation.21.title: "A Third Way"
 oldgodswoken_situation.21.desc: "A decade has passed since [ROOT.GetName] declared for the old gods — and the realm endures, changed in ways no one fully predicted. The Forn Siðr faction never got its total restoration. The Christian communities never got their rebellion. And somewhere in between, quietly, a different faith has been taking shape. The skald's poem about the Hanged God now hangs in the great hall. A völva teaches that wisdom does not care what name you call the sacrifice. The White Christ — Hvítr Kristr — has found a seat among the Norse gods. Not above them. Not below them. With them. It is not what the Forn Siðr faction wanted. It is not what Rome wanted. It is something else entirely."
 oldgodswoken_situation.21.a: "Let Hvítr Kristr take his seat among the gods. Not above them. With them."
 oldgodswoken_situation.21.a.tt: "The Hvítr Kristr syncretic modifier is granted permanently. Unlocks the White Kristr Religious Aspect."
 oldgodswoken_situation.21.b: "The Christian communities owe their survival to this king's restraint. Let them repay it in loyalty and obedience."
 oldgodswoken_situation.21.b.tt: "The King of Faith modifier is granted permanently. Pushes toward Centralization."
 oldgodswoken_situation.30.title: "The Question Answered"
 oldgodswoken_situation.30.desc: "The fighting is over. The rebellion is broken — its leaders dead, fled, or silent. The realm endures, and the king still holds the throne. What it cost is another matter. What it means for the faith that started this — what kind of Norse realm this is, what it will demand of its people — that answer was written in the war just finished."
 oldgodswoken_situation.30.a: "The resistance is broken. The realm is harder for it, and the faith knows what it is."
 oldgodswoken_situation.30.b: "The faction's war is won. The old faith is restored in full. Let the realm know what that means."
 oldgodswoken_situation.31.title: "The Restoration Fails"
 oldgodswoken_situation.31.desc: "The old faith has fallen — not from weakness, but from fracture. The resistance, patient and organized and sustained by Christian neighbors who saw an opportunity, has prevailed. [ROOT.GetName] bends the knee once more to Rome. The Forn Siðr faction is scattered. The Warrior Lodges are disbanded or driven underground. The great sacred sites stand, for now — but the church is already asking questions about their future."
 oldgodswoken_situation.31.a: "The restoration is over. [ROOT.GetName] returns to Rome."
 oldgodswoken_situation.40.title: "The Jarl's Daughter"
 oldgodswoken_situation.40.desc: "Word reaches the court that Sigríðr, daughter of Jarl [Root.GetPrimaryTitle.GetHolder.GetName] of [ROOT.Capital.GetName]'s northern reaches, has opened her hall to both the old gods and Christ in equal measure. She holds Blóts on the appointed days and keeps a small gospel on her writing table. The Forn Siðr faction is furious — this is exactly the kind of creeping compromise they said the restoration would prevent. But the Jarl is loyal, wealthy, and has three hundred sword-arms. The king must decide how to answer."
 oldgodswoken_situation.40.a: "This is unacceptable. Summon her and demand she choose."
 oldgodswoken_situation.40.a.tt: "The marriage is dissolved. The old faith is upheld, but the jarl's family is humiliated.\n#G Forn Siðr Pressure#! #R +5#!"
 oldgodswoken_situation.40.b: "Let it pass. One woman's hall is not the realm's faith."
 oldgodswoken_situation.40.b.tt: "We profit from the union while tolerating it.\n#R Christian Resistance#! #R +5#!"
 oldgodswoken_situation.40.c: "Invite her to court. Let her speak for the middle path openly."
 oldgodswoken_situation.40.c.tt: "The marriage becomes a bridge between faiths, easing tensions on both sides.\n#G Forn Siðr Pressure#! #G -4#!\n#R Christian Resistance#! #G -4#!"
 oldgodswoken_situation.41.title: "The Hørgr Built on Ash"
 oldgodswoken_situation.41.desc: "Before dawn, a company of Forn Siðr men tore down a small church that had stood in [ROOT.Capital.GetName]'s outskirts for thirty years. By midday, they had raised a hørgr on the same foundation stones — a ring of standing posts, a blood-carved offering stone, a fire pit already burning. They did not ask permission. They are not sorry. The Christian families who worshipped in that church are watching the smoke. The king must rule on this before it rules itself."
 oldgodswoken_situation.41.a: "The hørgr stands. What is done in the gods' name is done."
 oldgodswoken_situation.41.a.tt: "The reclaimed temple becomes a symbol of Norse resurgence.\n#G Forn Siðr Pressure#! #R +5#!"
 oldgodswoken_situation.41.b: "Tear it down. No one rebuilds on another's sacred ground without the king's word."
 oldgodswoken_situation.41.b.tt: "The melted bell and stripped icons fetch a fine price.\n#R Christian Resistance#! #R +6#!"
 oldgodswoken_situation.42.title: "A Letter Sealed in Wax"
 oldgodswoken_situation.42.desc: "A letter arrives from [scope:catholic_neighbor.GetName], written in careful diplomatic language that leaves nothing to the imagination: the treatment of Christian communities in [ROOT.GetName] has been noted. Rome is watching. The writer does not threaten war — not yet — but the implication sits in every line like a knife left visible on a table. The Forn Siðr faction tells the king to burn the letter and send back silence. The syncretic voices say this is exactly the kind of fire that grows when left unattended."
 oldgodswoken_situation.42.a: "Burn it. We answer to our gods, not to Rome."
 oldgodswoken_situation.42.a.tt: "The relics are destroyed for their material value. Our neighbor is outraged.\n#G Forn Siðr Pressure#! #R +3#!"
 oldgodswoken_situation.42.b: "Reply with assurances. We are not persecutors — we are restoring what was ours."
 oldgodswoken_situation.42.b.tt: "The relics buy us goodwill and a lucrative arrangement.\n#R Christian Resistance#! #G -5#!\n#G Forn Siðr Pressure#! #G -3#!"
 oldgodswoken_situation.42.c: "File it away. Watch and see if words become something more."
 oldgodswoken_situation.43.title: "The Prior's Offer"
 oldgodswoken_situation.43.desc: "Prior Ásgeir — born Norse, ordained Christian, and apparently now weighing his options carefully — has sent a private message to the court. He will publicly renounce his faith, convert to the old ways with ceremony and witnesses, and preach loudly of his return to the gods. In exchange, he wants a minor lordship and a seat at the Althing. The king's council is divided. Some call it a gift — a visible defection from the Christian cause. Others call it what it is: a man selling a soul he never fully owned to the highest bidder."
 oldgodswoken_situation.43.a: "A defection is a defection. Grant him what he asks."
 oldgodswoken_situation.43.a.tt: "We accept the bribe and break the deal. Norse cunning at its finest.\n#G Forn Siðr Pressure#! #R +4#!"
 oldgodswoken_situation.43.b: "We do not buy faith. Send him away with his dignity intact."
 oldgodswoken_situation.43.b.tt: "The monastery is permitted. Christians take heart from the concession.\n#R Christian Resistance#! #R +8#!"
 oldgodswoken_situation.43.c: "He insults the gods with this transaction. Make an example of his presumption."
 oldgodswoken_situation.43.c.tt: "The prior is made an example. His monastery is razed.\n#R Forn Siðr Pressure#! #G -6#!"
 oldgodswoken_situation.44.title: "What the Strong Hand Takes"
 oldgodswoken_situation.44.desc: "Three brothers — minor nobles, members of the Forn Siðr faction's outer circle — have seized a Christian village on the edge of their estate, declaring it purged of the foreign faith by right of strength. The villagers are scattered. The brothers are rich. They sent the king a share of the plunder as a courtesy — or perhaps a test. The Forn Siðr faction watches to see if the king accepts what they are offering: a realm where strength of faith is its own justification."
 oldgodswoken_situation.44.a: "Return what was taken. The king's law stands above faction zeal."
 oldgodswoken_situation.44.a.tt: "The crown endorses the redistribution. The nobles are pleased.\n#G Forn Siðr Pressure#! #R +5#!"
 oldgodswoken_situation.44.b: "Keep the gold. The realm's faith is being established — some disorder is the price."
 oldgodswoken_situation.44.b.tt: "The nobles keep their spoils, but the crown profits handsomely.\n#R Christian Resistance#! #R +10#!"
 oldgodswoken_situation.45.title: "The Song of the Pale Carpenter"
 oldgodswoken_situation.45.desc: "A skald named Hákon Twisted-Tongue has composed a poem about Christ — mean-spirited, cleverly rhymed, and spreading through the realm faster than any decree could catch it. He calls the Christian god a pale carpenter who could not even save himself from a wooden frame. The Forn Siðr faction is delighted. The Christian communities inside the realm are not. Three neighboring Catholic rulers have already sent diplomatic inquiries. Hákon says he will perform it again tonight, unless the king tells him otherwise."
 oldgodswoken_situation.45.a: "Let him perform. The gods have a sense of humor — why shouldn't we?"
 oldgodswoken_situation.45.a.tt: "The saga becomes famous, inspiring the faithful but enraging Christians.\n#G Forn Siðr Pressure#! #R +4#!\n#R Christian Resistance#! #R +5#!"
 oldgodswoken_situation.45.b: "Silence him. This insults our neighbors and hardens the resistance inside our own walls."
 oldgodswoken_situation.45.b.tt: "The skald is paid to stop. Both sides calm down.\n#G Forn Siðr Pressure#! #G -4#!\n#R Christian Resistance#! #G -3#!"
 oldgodswoken_situation.45.c: "Send him abroad on a 'diplomatic errand.' His tongue can cause trouble somewhere else."
 oldgodswoken_situation.45.c.tt: "We redirect his talents into something more dignified."
 oldgodswoken_situation.46.title: "The Soldiers Who Will Not Kneel"
 oldgodswoken_situation.46.desc: "The Forn Siðr faction has formally complained: the company of Christian mercenaries currently in the king's service refused to kneel at the last Blót. Their captain says his men fight for gold and the king's cause, not for any god. The Forn Siðr elder who filed the complaint says this is an insult to Odin in his own restored realm and will be remembered. The company's general, who has served loyally for six years, says nothing — but he is watching the king's face."
 oldgodswoken_situation.46.a: "Dismiss them. The gods are not mocked in this realm, not even for a price."
 oldgodswoken_situation.46.a.tt: "A costly feast secures their loyalty and inspires the faithful.\n#G Forn Siðr Pressure#! #R +5#!"
 oldgodswoken_situation.46.b: "Exempt them from the rite. They fight. That is enough."
 oldgodswoken_situation.46.b.tt: "The mercenaries grumble, but the treasury swells.\n#R Christian Resistance#! #R +4#!"
 oldgodswoken_situation.46.c: "Order them to kneel. Their god or ours — they serve the king."
 oldgodswoken_situation.46.c.tt: "The veterans join our forces. The realm grows stronger.\n#R Forn Siðr Pressure#! #G -3#!"
 oldgodswoken_situation.47.title: "What the Children Will Remember"
 oldgodswoken_situation.47.desc: "The Forn Siðr faction has presented a formal demand with sixty signatures: all children born in [ROOT.GetName] must be raised in the old faith, educated in the old rites, forbidden from receiving Christian instruction of any kind. The faction calls it the only way to ensure the restoration lasts beyond this generation. The syncretic voices on the council — what few remain willing to speak — say this is not faith. It is conquest of the cradle. It will guarantee that the children of resistance grow up with a cause."
 oldgodswoken_situation.47.a: "The old ways will be taught to every child of noble blood."
 oldgodswoken_situation.47.a.tt: "The old ways will be taught to every child of noble blood.\n#G Forn Siðr Pressure#! #R +8#!"
 oldgodswoken_situation.47.b: "The old faith must take root. All children of the realm will be raised in it."
 oldgodswoken_situation.47.b.tt: "Freedom of choice — the Christian tutors bring gold into the realm.\n#R Christian Resistance#! #R +8#!"
 oldgodswoken_situation.47.c: "Noble households only. The realm leads by example, not by edict."
 oldgodswoken_situation.47.c.tt: "A costly compromise, but it eases tensions on both sides.\n#G Forn Siðr Pressure#! #G -3#!\n#R Christian Resistance#! #G -3#!"
 oldgodswoken_situation.48.title: "A Matter of Honour"
 oldgodswoken_situation.48.desc: "Two men stand before the king's court demanding satisfaction. Björn Ironhand, a Forn Siðr elder, and Leifr the Steadfast, a Christian merchant of long standing, have exchanged words that cannot be taken back — something about whose god is real and whose faith is cowardice dressed in ceremony. Both claim the right to settle it by Holmgang. The court holds its breath. A duel between a Forn Siðr champion and a Christian man, fought openly before the king, will mean something — whatever its outcome."
 oldgodswoken_situation.48.a: "Let them fight. The gods will weigh what words cannot."
 oldgodswoken_situation.48.a.tt: "A 50/50 duel. The winner's faction gains strength. Either way, the spectacle strengthens our authority."
 oldgodswoken_situation.48.b: "Enough. Neither faith is settled by brawling in the king's hall."
 oldgodswoken_situation.48.b.tt: "The duel is cancelled. Both sides are disappointed.\n#G Forn Siðr Pressure#! #G -3#!\n#R Christian Resistance#! #G -3#!"
 oldgodswoken_situation.48.forn_sidr_wins_tt: "Björn Ironhand stands over his fallen opponent. The Forn Siðr faction roars. The Christian communities inside the realm grow quietly colder.\n#G Forn Siðr Pressure#! #R +6#!"
 oldgodswoken_situation.48.rett_tru_wins_tt: "Leifr the Steadfast does not fall. The Christian communities dare to exhale. The Forn Siðr faction simmers with indignation.\n#R Christian Resistance#! #R +6#!"
 oldgodswoken_force_convert_province: "Enforce the Old Faith"
 oldgodswoken_force_convert_province_desc: "Send goðar priests and Forn Siðr adherents to a province to formally displace Christian practice. Public gatherings, symbols, and clergy are removed. The Forn Siðr faction is satisfied. Those who were Christian are not."
 oldgodswoken_force_convert_province_effect: "Costs 5 Stability. Converts ~30%% of non-Norse pops. Forn Siðr Pressure +8. Christian Resistance +10. Province gains unrest for 5 years."
 oldgodswoken_hold_pogrom: "Authorize a Purge"
 oldgodswoken_hold_pogrom_desc: "Give the Forn Siðr faction formal authority to act against Christian gatherings and symbols in a region. Swift and organized, it may drive resistance underground. But if it spirals, the names of the harmed become the argument the resistance needed."
 oldgodswoken_hold_pogrom_effect: "60%% chance: Christian Resistance -20, Forn Siðr Pressure +6, Noble satisfaction, Gold. 40%% chance: Christian Resistance +10, Forn Siðr Pressure +4, Prestige penalty."
 oldgodswoken_elevate_volva: "Elevate a Syncretic Völva"
 oldgodswoken_elevate_volva_desc: "Appoint a renowned wise-woman to the court — one who teaches that the gods are many names for the same deep truth. Her presence gives voice to the syncretic path and tells the Forn Siðr faction that the king favors wisdom over zealotry. It will cost you with both the nobles and the clergy."
 oldgodswoken_elevate_volva_effect: "Forn Siðr Pressure -8. Generates a female clergy character (high Adm/Dip). Costs Noble and Clergy estate satisfaction."
 oldgodswoken_convene_althing: "Convene the Althing"
 oldgodswoken_convene_althing_desc: "Call a great assembly of jarls, goðar priests, and lodge-masters. The king speaks plainly: the old faith is restored, but the realm is not a faction's weapon. Those who would launch a holy war do so against the king's will. The Forn Siðr faction will not forget this rebuke — but the pressure drops."
 oldgodswoken_convene_althing_effect: "Forn Siðr Pressure -12. Costs Stability and Noble estate satisfaction. 10-year cooldown."
 oldgodswoken_attend_christian_wedding: "Attend Christian Commoners invetation"
 oldgodswoken_attend_christian_wedding_desc: "Accept an invitation to a ceremony among the commoners, a wedding, a baptism, a feast. A small gesture of coexistence. The Forn Siðr faction reads it as weakness. The Christian communities read it as a signal that the king is not their enemy. The only action that eases both pressures at once."
 oldgodswoken_attend_christian_wedding_effect: "Forn Siðr Pressure -5. Christian Resistance -5. Costs Presige and 25 gold, 3 months income, Improves Peasant estate."
 oldgodswoken_bribe_warrior_lodges: "Appease the Forn Siðr Faction"
 oldgodswoken_bribe_warrior_lodges_desc: "Send coin, hunting rights, and promises to the Lodge-masters. Gold does not satisfy doctrine, but it can buy patience. The faction quiets — for now — and the pressure on the king eases."
 oldgodswoken_bribe_warrior_lodges_effect: "Costs 100 Gold. Forn Siðr Pressure -10. Always succeeds. 4-year cooldown."
 oldgodswoken_bribe_hidden_christians: "Offer Quiet Assurances"
 oldgodswoken_bribe_hidden_christians_desc: "Send quiet word to the leaders of the Christian communities — not persecution, not expulsion, just the king's personal assurance that peaceful coexistence is possible. Back it with coin. Their resistance cools, for now, and the immediate pressure drops."
 oldgodswoken_bribe_hidden_christians_effect: "Costs 100 Gold. Christian Resistance -10. Always succeeds. 4-year cooldown."
 STATIC_MODIFIER_NAME_oldgodswoken_syncretic_modifier: "Hvítr Kristr"
 STATIC_MODIFIER_DESC_oldgodswoken_syncretic_modifier: "The White Christ found a seat among the Norse gods — not above them, not below them, with them. The realm's faith is broader than Rome's, and its diplomats find unusual welcome in Christian courts."
 STATIC_MODIFIER_NAME_oldgodswoken_forn_sidr_dominant: "Forn Siðr Restored"
 STATIC_MODIFIER_DESC_oldgodswoken_forn_sidr_dominant: "The Forn Siðr faction won its war. The old faith is restored in full — uncompromising, unblended, and demanding. The Lodges hold great honor. Other faiths find no welcome here."
 STATIC_MODIFIER_NAME_oldgodswoken_forged_in_fire: "Forged in Fire"
 STATIC_MODIFIER_DESC_oldgodswoken_forged_in_fire: "The Christian resistance rose and was crushed. The realm came out harder. It knows now what the restoration cost — and it does not intend to pay that price again."
 STATIC_MODIFIER_NAME_oldgodswoken_conversion_unrest: "Enforcement Unrest"
 STATIC_MODIFIER_DESC_oldgodswoken_conversion_unrest: "The old faith was enforced here recently. Those who lost their religious community have not forgotten, and the province remains unsettled."
 STATIC_MODIFIER_NAME_oldgodswoken_syncretic_volva_modifier: "Voice of the Middle Path"
 STATIC_MODIFIER_DESC_oldgodswoken_syncretic_volva_modifier: "This völva teaches that wisdom does not care what name you call the sacrifice. Her presence at court gives the syncretic path a human face."
 STATIC_MODIFIER_NAME_oldgodswoken_adopted_kristr: "Hvítr Kristr Accepted"
 STATIC_MODIFIER_DESC_oldgodswoken_adopted_kristr: "The White Christ has been accepted into the Norse faith. This opens the White Kristr Religious Aspect."
 STATIC_MODIFIER_NAME_oldgodswoken_king_of_faith: "King of Faith"
 STATIC_MODIFIER_DESC_oldgodswoken_king_of_faith: "The realm survived its religious crisis without fire or forced conversion. The king converted that goodwill into authority — a realm where tolerance is a crown policy, not a concession, and the estates answer to the ruler who kept the peace."
 STATIC_MODIFIER_NAME_oldgodswoken_children_edict: "The Children's Edict"
 STATIC_MODIFIER_DESC_oldgodswoken_children_edict: "All children born in the realm are to be raised in the old faith. The restoration deepens — as does the resentment of those it is imposed upon."
 STATIC_MODIFIER_NAME_oldgodswoken_focus_inward: "Inward Focus of the Awakened"
 STATIC_MODIFIER_DESC_oldgodswoken_focus_inward: "The realm turns its gaze inward. Rune-schools are founded, skalds compile the old sagas, and the wise study the stars. Knowledge — not conquest — shall be the legacy of this generation."
 STATIC_MODIFIER_NAME_oldgodswoken_focus_outward: "Outward Focus of the Awakened"
 STATIC_MODIFIER_DESC_oldgodswoken_focus_outward: "The old fire burns in the blood. The levies are called, the longships creak in their berths, and the king's eye turns to foreign shores. The world shall remember the name of the North."
 STATIC_MODIFIER_NAME_oldgodswoken_religious_fervor: "Religious Fervor"
 STATIC_MODIFIER_DESC_oldgodswoken_religious_fervor: "The realm has been attacked while restoring the old faith. The people rally to the banner of the king, determined that no foreign power shall dictate the faith of the North."
 rett_tru_rebels_name: "Christian Resistance"
 oldgodswoken_purge_christians_tt: "A quarter of the remaining #color_yellow Christians#! across our realm are put to the sword. Of those who survive, one in four abandon the #color_yellow White Christ#! and embrace the #G Old Gods#!."
 OLDGODSWOKEN_FORN_SIDR_FLUFF: "Purists demand total restoration. At 100, the purges begins."
 OLDGODSWOKEN_RETT_TRU_FLUFF: "Christians grow more rebellius the higher their resistance is."
 OLDGODSWOKEN_END_CONDITION_FORN_SIDR: "If #bold Forn Siðr Pressure#! reaches 100, the purists seize control. Those who will not convert are driven out or destroyed."
 OLDGODSWOKEN_END_CONDITION_RESISTANCE: "If #bold Christian Resistance#! reaches 100,there will be severe consequences. Their patience has run out."
 OLDGODSWOKEN_END_CONDITION_SYNCRETISM: "If both pressures stay below 100 for #bold 10 years#!, neither side wins. Something new emerges — a faith that is neither the old gods nor the cross, but carries both."
 SITUATION_START_DATE: "Start Date"
 estate_privilege_courtofjarls: "Oathbound Jarls"
 estate_privilege_courtofjarls_desc: "In exchange for exemption from taxation and serving as the personal warriors of the king, the nobles of the realm are now oathsworn to the king and the country. No jarl may raise arms against the crown, and in return the crown shall never strip them of their ancestral lands."
 estate_privilege_fornsidrcaste: "Forn Siðr Warrior Caste"
 estate_privilege_fornsidrcaste_desc: "The noble class are warriors first and manor lords second. They are expected to lead armies for the king and train new ones in the ways of the shield-wall and the axe. In exchange, the king shall never rely on men bought by gold — no mercenary shall tread where the hirdmenn stand."
 oldgodswoken_situation.11.civil_war_tt: "#bold The Christians# in the realm will rise up and start a civil war!"
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_1: "Rétt Trú Suppressed"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_1: "The Christian minority has been cowed into silence. Rebel activity is diminished."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_2: "Rétt Trú Uneasy Peace"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_2: "Christians in the realm keep their heads down, but whisper prayers in the dark."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_3: "Rétt Trú Simmering Tensions"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_3: "The old faith's followers grow restless. Discontent spreads among Christian communities."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_4: "Rétt Trú Growing Unrest"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_4: "Secret Christian meetings grow bolder. Armed men gather at rural churches."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_5: "Rétt Trú Open Defiance"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_5: "Christians openly defy Norse law. Priests preach resistance from hidden pulpits."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_6: "Rétt Trú Organized Resistance"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_6: "Christian communities organize militia forces. Tax collectors are turned away at sword-point."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_7: "Rétt Trú Armed Factions"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_7: "Armed Christian bands roam the countryside. The realm teeters on the edge of open revolt."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_8: "Rétt Trú Insurrection"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_8: "Christians rise in organized insurrection. Royal authority crumbles in the provinces."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_9: "Rétt Trú Open Revolt"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_9: "The Christians have declared open war on the Norse crown. The realm bleeds."
 STATIC_MODIFIER_NAME_rett_tru_resistance_tier_10: "Rétt Trú Holy War"
 STATIC_MODIFIER_DESC_rett_tru_resistance_tier_10: "Christendom wages holy war within our borders. The very fabric of the realm is tearing apart."
 oldgodswoken_situation.11.title: "The Cross Rises"
 oldgodswoken_situation.11.desc: "The Christian faithful can endure no more. Armed bands of Rétt Trú zealots gather across the realm, brandishing crosses and calling for the blood of the heathens. Unless drastic action is taken, they will plunge the kingdom into chaos. Their numbers swell with every passing day — this is no longer mere grumbling, but the beginning of holy war."
 oldgodswoken_situation.11.a: "Let them come — the Old Gods will judge them."
 oldgodswoken_situation.11.a.tt: "#R All Christian pops lose massive satisfaction, fueling religious rebel factions.#!"
 oldgodswoken_situation.11.b: "Pay them tribute to buy time."
 oldgodswoken_situation.11.b.tt: "#Y Spend #R500#! gold to reduce Christian Resistance by #G25#!.#!"
 oldgodswoken_situation.17.title: "Forged in Fire"
 oldgodswoken_situation.17.desc: "The Christian rebels have been broken. Those who took up the cross against the Norse crown lie scattered and defeated. The realm has been tested by fire — and emerged stronger for it. The skalds will sing of this victory for generations. The Forn Siðr endures."
 oldgodswoken_situation.17.a: "Odin smiles upon the victorious!"
 oldgodswoken_situation.17.a.tt: "#GGain the permanent #YForged in Fire#! modifier. The realm is strengthened by surviving the rebellion.#!"
 OLDGODSWOKEN_RESISTANCE_TIER_LABEL: "Christian Resistance Status:"
 OLDGODSWOKEN_TIER_1: "#G Christians Cowed#!"
 OLDGODSWOKEN_TIER_2: "#G Uneasy Peace#"
 OLDGODSWOKEN_TIER_3: "Simmering Tensions"
 OLDGODSWOKEN_TIER_4: "Growing Unrest"
 OLDGODSWOKEN_TIER_5: "Open Defiance!"
 OLDGODSWOKEN_TIER_6: "#Y Organized Resistance#!"
 OLDGODSWOKEN_TIER_7: "#Y Armed Defiance#!"
 OLDGODSWOKEN_TIER_8: "#R Insurrection#!"
 OLDGODSWOKEN_TIER_9: "#R Open Rebellion#!"
 OLDGODSWOKEN_TIER_10: "#R Holy War#!"
 OLDGODSWOKEN_LOCATION_NORSE: "This land follows the #bold Forn Siðr#! — the Old Ways live here."
 OLDGODSWOKEN_LOCATION_CATHOLIC: "This land remains under the sway of #bold Catholic#! faith."
 OLDGODSWOKEN_NORSE_LAND: "Norse Land"
 OLDGODSWOKEN_CATHOLIC_LAND: "Catholic Land"
 opinion_attended_christian_wedding: "Attended Christian Wedding"
 opinion_expelled_christians: "Expelled Christians"
 opinion_religious_dismissal: "Religious Dismissal"
 opinion_diplomatic_assurance: "Diplomatic Assurance"
 oldgodswoken_select_province_title: "Select Location to Convert"
 oldgodswoken_no_provinces_available: "No locations with non-Norse population available."
 oldgodswoken_situation.15.title: "Local Conversion"
 oldgodswoken_situation.15.desc: "In [scope:target_location.GetName], the old faith stirs. The local Goðir reports that many are ready to return to the ways of their forefathers — but others cling to the cross."
 oldgodswoken_situation.15.a: "Convert them all"
 oldgodswoken_situation.15.a.tt: "Half of the Catholics in [scope:target_location.GetName] return to the old faith."
 oldgodswoken_situation.15.b: "Proceed carefully"
 oldgodswoken_situation.15.b.tt: "A tenth of the Catholics in [scope:target_location.GetName] convert, and Christian resistance eases."
 oldgodswoken_local_conversion_20_tt: "50% of Catholic pops in [scope:target_location.GetName] convert to Norse."
 oldgodswoken_local_conversion_10_tt: "10% of Catholic pops in [scope:target_location.GetName] convert to Norse."
 oldgodswoken_situation.50.title: "A Christian Wedding"
 oldgodswoken_situation.50.desc: "Word arrives that [scope:catholic_neighbor.GetName] is celebrating a grand wedding. Our attendance would be seen as a gesture of goodwill — but it would cost us standing among the faithful."
 oldgodswoken_situation.50.a: "We shall attend"
 oldgodswoken_situation.50.a.tt: "Our presence eases Christian tensions, though the Goðir disapprove."
 oldgodswoken_situation.50.b: "We have no business at Christian ceremonies"
 oldgodswoken_situation.50.b.tt: "We reject the invitation. Our resolve strengthens our reputation."
 oldgodswoken_situation.51.title: "The Thane's Tithe"
 oldgodswoken_situation.51.desc: "A loyal thane arrives at court bearing silver and grain — tribute from lands once held by the Church. He asks whether the crown wishes to claim more, or show mercy."
 oldgodswoken_situation.51.a: "Accept the tribute"
 oldgodswoken_situation.51.a.tt: "The tithe fills our coffers and heartens the faithful."
 oldgodswoken_situation.51.b: "Seize more from the Christians"
 oldgodswoken_situation.51.b.tt: "More wealth flows in, but the Christians grow restless."
 oldgodswoken_situation.51.c: "Return some to the Christians"
 oldgodswoken_situation.51.c.tt: "A gesture of goodwill eases tensions on both sides."
 oldgodswoken_situation.52.title: "Mjöd for the Masses"
 oldgodswoken_situation.52.desc: "The harvest has been bountiful and the mead halls overflow. The people are in good spirits — this is a fine time to celebrate the Old Ways, or to profit from the surplus."
 oldgodswoken_situation.52.a: "Hold a great feast in the gods' honor"
 oldgodswoken_situation.52.a.tt: "The feast strengthens the people's devotion to the Old Faith."
 oldgodswoken_situation.52.b: "Sell the surplus"
 oldgodswoken_situation.52.b.tt: "We fill our treasury instead."
 oldgodswoken_situation.52.c: "Share it with everyone, Norse and Christian alike"
 oldgodswoken_situation.52.c.tt: "A shared celebration eases tensions across the realm."
 oldgodswoken_situation.53.title: "The Runestone Carver"
 oldgodswoken_situation.53.desc: "A renowned carver has arrived at court, offering to immortalize the king's deeds in stone. His runes would stand for centuries — but what message should they carry?"
 oldgodswoken_situation.53.a: "Commission a grand runestone"
 oldgodswoken_situation.53.a.tt: "A monument to our rule, carved in the old tongue."
 oldgodswoken_situation.53.b: "Have him carve warnings against the Christians"
 oldgodswoken_situation.53.b.tt: "The stone rallies the faithful but provokes the Christians."
 oldgodswoken_situation.53.c: "Pay him to move on"
 oldgodswoken_situation.53.c.tt: "We avoid controversy and ease tensions slightly."
 oldgodswoken_situation.54.title: "The Burned Stave Church"
 oldgodswoken_situation.54.desc: "Zealous followers of the Old Faith have burned a Christian stave church to the ground. The ashes still smolder when word reaches the court. How does the crown respond?"
 oldgodswoken_situation.54.a: "Praise the act and seize the church's wealth"
 oldgodswoken_situation.54.a.tt: "The faithful are emboldened, but Christian fury grows."
 oldgodswoken_situation.54.b: "Condemn it and compensate the Christians"
 oldgodswoken_situation.54.b.tt: "Justice is served and tensions ease on both sides."
 oldgodswoken_situation.54.c: "Ignore it"
 oldgodswoken_situation.54.c.tt: "The crown looks the other way. Resistance simmers."
 oldgodswoken_situation.55.title: "The Seer's Warning"
 oldgodswoken_situation.55.desc: "A wandering seer has appeared at the gates, speaking of dark omens and the wrath of the gods. The court watches to see how the crown responds to this omen."
 oldgodswoken_situation.55.a: "Heed the warning — sacrifice to the gods"
 oldgodswoken_situation.55.a.tt: "We appease the gods with offerings of silver."
 oldgodswoken_situation.55.b: "Dismiss the seer and take his silver"
 oldgodswoken_situation.55.b.tt: "We profit, but the faithful question our devotion."
 oldgodswoken_situation.55.c: "Let the seer speak to the people"
 oldgodswoken_situation.55.c.tt: "His words calm both Norse and Christian tempers."
 oldgodswoken_situation.56.title: "The Goðir's Request"
 oldgodswoken_situation.56.desc: "A respected Goðir priest approaches the throne. He has found a suitable location and wishes to build a sacred place, somewhere the faithful may gather and the old rites be observed."
 oldgodswoken_situation.56.a: "Grant him a simple shrine"
 oldgodswoken_situation.56.b: "Fund a grand Hof temple"
 oldgodswoken_situation.56.c: "Raise a warrior lodge instead"
 oldgodswoken_situation.56.d: "Reject his request"
 oldgodswoken_situation.56.d.tt: "We turn the Goðir away. The Christians take note of our restraint.\n#R Christian Resistance#! #G -3#!"
