l_simp_chinese:
 HUSSITE_WAR_NAME: "第$NUM$$ORDER$次胡斯派运动"
 MBHW_hussite_wars.91.title: "匈牙利领袖"
 MBHW_hussite_wars.91.desc: "我们收到了来自[GetCountry('PAP').GetLongName]的重要信函。教宗陛下已号召全体基督教世界向[target_country.GetName]滋生的邪恶异端宣战，而作为毗邻该国的强大[ShowReligionAdjective('catholic')]国家，我们正是领导这场[ShowReligionAdjective('catholic')]圣战的最佳人选。"
 MBHW_hussite_wars.91.a: "我们要打垮他们！"
 MBHW_hussite_wars.91.b: "这是一项毫无意义的努力……"
 MBHW_hussite_wars.92.title: "国内异端"
 MBHW_hussite_wars.92.desc: "教宗亲自号召我们，让我们波罗的海的军队前往古老的日耳曼地区。异端已经控制了[ShowReligionAdjective('catholic')]的人民，如果我们不迅速果断地行动，它可能会蔓延开来，并使我们所有在东方的努力变得毫无意义。"
 MBHW_hussite_wars.92.a: "为了上帝！准备战斗！"
 MBHW_hussite_wars.92.b: "我们没空处理这事……"
 MBHW_hussite_wars.999.title: "大败"
 MBHW_hussite_wars.999.desc: "我们之中，无论是[ShowReligionAdjective('hussite')]还是[ShowReligionName('catholic')]，有多少人惨遭敌人屠戮？多少城市化为焦土？整个波希米亚尸横遍野，而天主教秃鹫正撕裂我们的尸体。"
 MBHW_hussite_wars.999.a: "我们总有一天会再次崛起。"
 MBHW_hussite_wars.999.a.tt1: "#color_red 我们在波希米亚地区以外的所有领土都将成为我们天主教邻国的核心！#!"
 MBHW_hussite_wars.999.a.tt2: "#color_red 天主教徒将摧毁我们剩余的土地！#!"
 MBHW_austria.1.title: "奥地利崛起"
 MBHW_austria.1.desc: "随着[ShowReligionAdjective('hussite')]势力的溃败及其强大王国的瓦解，该区域出现了权力真空。我们正处在绝佳位置，能够填补他们留下的空白，在其废墟之上崛起。"
 MBHW_austria.1.a: "一人倒下，另一人崛起。"
 MBHW_austria.1.a.tt: "这些修正将在120年后被替换。"
 MBHW_austria.2.title: "我们放松努力"
 MBHW_austria.2.desc: "[ShowReligionAdjective('hussite')]战败后的大规模发展与征服终于告一段落。虽然我们的影响力依然巨大，国力依然强盛，但那种快速且持续扩张的时代已然远去。"
 MBHW_austria.2.a: "让我们放松一下。"
