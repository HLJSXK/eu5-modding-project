l_simp_chinese:
 provincial_capital_1: "执达官议会"
 provincial_capital_1_desc: "一个简朴的司法和行政中心，地方执达官代表王室主持法庭、征税并维持秩序。该建筑是区域治理的基础。"
 provincial_capital_2: "城堡府邸"
 provincial_capital_2_desc: "一个由城堡长官管理的扩展行政综合体，负责管理该地区事务。记录员负责详细账目，信使则在全省传递信件"
 provincial_capital_3: "总督官邸"
 provincial_capital_3_desc: "这是一个设施精良的官邸和政府所在地，任命的总督对周边土地行使权力。法院、税务机关和军事协调机构都在这个庞大的结构中运作。"
 provincial_capital_4: "地区首府"
 provincial_capital_4_desc: "一座宏伟的议会大厦，作为地区权力的中心。任命官员在这些宏伟的殿堂中统治，对周边领土拥有重大权力。"
 provincial_capital_5: "首府官邸"
 provincial_capital_5_desc: "这是一座宏伟的庄园综合体，气势可与首都媲美。地方精英聚集于此处理国家事务，扩大君主的影响力"
 provincial_capital_6: "帝国行政中心"
 provincial_capital_6_desc: "地区行政的巅峰 —— 一个庞大的政府综合体，代表了帝国官僚体系的全部力量与复杂性。从这里开始，整个地区将被精确且权威地治理。"
 provincial_capital_construction_1: "法警法庭建筑"
 provincial_capital_construction_2: "城堡府邸建筑"
 provincial_capital_construction_3: "总督官邸建筑"
 provincial_capital_construction_4: "地区首府建筑"
 provincial_capital_construction_5: "首府官邸建筑"
 provincial_capital_construction_6: "帝国行政中心建筑"
 provincial_capital_1_advance: "行省行政机构"
 provincial_capital_1_advance_desc: "在各省设立正式行政机构有助于更好地治理和税收征收。"
 provincial_capital_2_advance: "扩大的行省治理"
 provincial_capital_2_advance_desc: "更复杂的行政结构使行省事务能够更好地被监督。"
 provincial_capital_3_advance: "行省总督辖区"
 provincial_capital_3_advance_desc: "任命的总督将中央集权带到遥远的领土"
 provincial_capital_4_advance: "地区首府"
 provincial_capital_4_advance_desc: "宏伟的行政中心巩固了我们对整个地区的权威。"
 provincial_capital_5_advance: "行省官邸"
 provincial_capital_5_advance_desc: "宏伟的官邸是权力的象征和行省治理中心。"
 provincial_capital_6_advance: "帝国行政体系"
 provincial_capital_6_advance_desc: "完备的官僚组织将我们的影响力延伸到整个国家。"
 provincial_capital.1.t: "新的可用功能"
 provincial_capital.1.desc: "我们的行政能力得到了扩展，使我们能够构建更为复杂的行省治理结构。"
 provincial_capital.1.ok: "非常好"
 provincial_capital_unlocked_1_tt: "我们现在可以建造[provincial_capital_1]建筑"
 provincial_capital_unlocked_2_tt: "我们现在可以建造[provincial_capital_2]建筑"
