 provincial_capital_unlocked_6_tt: "我们现在可以建造[provincial_capital_6]建筑"
 only_one_provincial_capital_per_region_tt: "我们目前在这个[region|e]还没有省会"
 only_one_provincial_capital_per_market_tt: "我们目前在这个[market|e]还没有省会。"
 only_one_provincial_capital_by_population_tt: "我们尚未达到按[population|e]计算的最大省会数 "
 provincial_capital_maintenance: "行省行政机构"
 provincial_capital_maintenance_desc: "省会的行政机构。书记员负责记录，官员处理信件，守卫保护场所，简朴的宴会为来访贵宾举行"
 provincial_capital_maintenance_1: "法警管理机构"
 provincial_capital_maintenance_1_desc: "一个简朴的行政运作机构。书记员负责基本记录，小型警卫队保护场所，偶尔接待当地贵宾。"
 provincial_capital_maintenance_2: "城堡长官行政处"
 provincial_capital_maintenance_2_desc: "扩大了的行政机构。更多的书记员详细记录，守卫维持秩序，定期聚会促进地区治理。"
 provincial_capital_maintenance_3: "总督行政厅"
 provincial_capital_maintenance_3_desc: "复杂的政府相关机构。详尽的记录保存、训练有素的警卫和正式接待活动展示了总督官邸的权威。"
 provincial_capital_maintenance_4: "地区行政厅"
 provincial_capital_maintenance_4_desc: "一个堪称地区首府的宏伟行政体系。众多书记员管理复杂事务，守卫展示权力，并以隆重仪式给来访官员留下深刻印象。"
 provincial_capital_maintenance_5: "首府官邸行政部"
 provincial_capital_maintenance_5_desc: "这是一座堪比首都的宏伟官僚机构。大量的人员通过严谨的记录、安全的护卫和奢华的娱乐活动，维护了官邸的声望"
 provincial_capital_maintenance_6: "帝国行政体系"
 provincial_capital_maintenance_6_desc: "完备的行省治理机关。庞大的行政机器运作精准，耗费大量资源以维持帝国官僚体系的卓越标准。"
 rule_provincial_capital_restriction: "省会限制"
 setting_provincial_capital_by_market: "每个市场一个"
 setting_provincial_capital_by_market_desc: "每个国家可为每个市场区建造一座省会。这使得在每个经济势力范围内都能设立行政中心。"
 setting_provincial_capital_by_region: " 每个地区一个"
 setting_provincial_capital_by_region_desc: "每个国家可为每个地理区域建造一个省会。这创造了一个更分散的行政网络。"
 setting_provincial_capital_by_population: " 按人口规模划分"
 setting_provincial_capital_by_population_desc: "一个国家能建造的省会数量取决于其人口。起始有一个省会，然后每1000万人口增加一个名额。"