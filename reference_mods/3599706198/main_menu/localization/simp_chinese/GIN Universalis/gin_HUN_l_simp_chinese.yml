l_simp_chinese:
 new_name_magyar_tengri: "马扎尔"
 HNN: "匈人"
 HNN_ADJ: "匈人"
 HNN_f: "匈人帝国"
 HNN_f_desc: "一个于公元4世纪迁入欧洲的中亚游牧民族。他们在阿提拉统治时期势力达到顶峰，迫使东西罗马帝国进贡。匈人以其高超的骑术和令人闻风丧胆的战术而闻名。"
 hunnic_language: "匈语"
 hunnic_culture: "匈"
 hunnic_dynasty: "匈"
 return_of_the_huns: "匈人归来"
 return_of_the_huns_desc: "[GetCharacter('hun_lajos_i').GetName]正式皈依[ShowReligionName('tengri')]信仰的举动，使王国踏上了一场前所未有的变革之路。朝廷与军队大多乐见君主重归祖先传统，神职人员却视此举为对既有秩序的直接威胁。民众立场分化：有人欢庆古老草原精神的复苏，亦有人对王国前途渐生忧虑。\n\n这场信仰变革的影响远不止于宗教层面——它正重塑着文化、律法、外交乃至王权本身。要将这场精神层面的转变转化为真正的“国家改革”尚需时日，而流逝的每时每刻都在推动王国走向统一，或是危险的内部动荡。\n\n只剩下关键一问：拉约什为通往“长生天”开启的这道大门，究竟将赋予王国崭新的身份认同，还是带领国家走向分裂动荡？"
 hun_situation_event.1.title: "匈人归来"
 hun_situation_event.1.a: "我们有很多工作要做！"
 roh_press_rightful_hun_claims: "索取宣称"
 roh_press_rightful_hun_claims_desc: "提出领土宣称以扩张我们的疆界，重现昔日辉煌。"
 roh_convert_people_to_tengrism: "弘扬腾格里信仰"
 roh_convert_people_to_tengrism_desc: "在我们选定的省份传播[ShowReligionName('tengri')]，并巩固我们民族的精神统一。"
 roh_muster_our_horses: "集结战马"
 roh_muster_our_horses_desc: "为了在最严峻的条件下保持战斗意志，军队正在进行严格的纪律改革。与此同时，我军骑兵部队正通过专门训练，最大限度地提升作战能力。"
 roh_the_meeting_of_the_tengri_brotherhood: "腾格里兄弟会议"
 roh_the_meeting_of_the_tengri_brotherhood_desc: "在长生天的庇佑下，我们正与遍布[ShowSubContinentName('central_asia')]的腾格里信仰同胞重建联系。这场会晤将巩固我们之间的纽带，强化外交关系，迈出团结草原的第一步。"
 distance_from_hun_common: "[THIS.GetLocation.GetName]距离[ShowLocationName(HUN)]有[THIS.ScriptValue('distance_from_hun')|2~]远。"
 imminent_calamity: "$distance_from_hun_common$\n\n该[location|e]即将面临一场浩劫。"
 impending_doom: "$distance_from_hun_common$\n\n该[location|e]面临着迫在眉睫的厄运。"
 illusion_of_safety: "$distance_from_hun_common$\n\n该[location|e]沉溺于安全幻觉之中。"
 hungarian_gin_rebels: "匈牙利反叛天主教"
 hungarian_gin_rebels_country: "$hungarian_gin_rebels$"
 hungarian_gin_rebels_country_adjective: "$hungarian_gin_rebels$"
 hint_huns: "匈人归来"
 hint_huns_hint_text: "[GetCharacter('hun_lajos_i').GetName]正式皈依[ShowReligionName('tengri')]信仰，使王国踏上了一条前所未有的变革之路。"
 legacy_of_attila: "阿提拉的遗产"
 legacy_of_attila_desc: "阿提拉的精神依然在草原上回响，也萦绕于自称继承其血脉者的心中。这个政权从“上帝之鞭”的遗产中汲取力量，将权力统一于一位铁腕统治者之下，同时秉承匈人军队的机动性、训练度与威名。在阿提拉的阴影下统治，意味着必须肩负起征服、坚韧与不屈意志的期许。"
 scourge_of_god_command: "上帝之鞭军团"
 scourge_of_god_command_desc: "令人畏惧的阿提拉军事遗产已成为我们治国理政的核心。我们的军队如风般掠过草原，铁骑所向披靡，敌军未及交锋便已士气溃散。这场改革巩固了我们作为匈奴真正军事继承者的身份。"
 sky_arrow_cavalry_doctrine: "天箭骑兵"
 sky_arrow_cavalry_doctrine_desc: "草原战术结合腾格里信仰带来的激励，使我们的骑兵部队在战场上获得难以预测的速度与冲击力。"
 decree_of_the_ancestors_council: "先祖议会法令"
 decree_of_the_ancestors_council_desc: "基于腾格里信仰建立的新行政体系确保中央政府的命令能迅速传达到国家最偏远的角落，但削弱了贵族阶层的传统权力。"
 secret_lore_of_the_steppe: "草原秘报"
 secret_lore_of_the_steppe_desc: "古代腾格里萨满与欧亚部落获得的制图学及旅行知识，结合西方新兴数学技法，形成了独特的勘探与谍报情报体系。"
 danube_central_banking: "多瑙河中央银行"
 danube_central_banking_desc: "将早期西方金融与建立在喀尔巴阡盆地矿藏基础上的中央国库体系相结合。"
 firearm_cavalry_training: "以财政为核心的陆军管理"
 firearm_cavalry_training_desc: "新的军事行政系统与国库整合，规范了补给和军饷发放，减少了浪费并降低了常备军的维持成本。"
 the_khans_path: "可汗之道"
 the_khans_path_desc: "部落议会的所有权力都集中于可汗一人之手，这种中央集权和王室领地的权力终结了内部纷争，确保我军能以专注统一的上气与训练度踏上战场。"
 clan_lords_mobilization: "氏族动员令"
 clan_lords_mobilization_desc: "贵族阶层的军事义务已被增加，这项法令显著提高了向可汗军队提供的兵力数量。"
 gin_hun.1.title: "草原之血"
 gin_hun.1.desc: "在研读史料时，[GetCharacter('hun_lajos_i').GetName]偶然发现了记载首批马扎尔人定居[ShowRegionName('carpathia_region')]盆地的古老编年史，其中述说他们的根源可追溯至辽阔草原上强大的匈人。\n\n那些关于铁骑奔腾的故事唤醒了他心中某种深藏的东西。对拉约什而言，这不再只是历史，更是映照出他的人民曾经的模样以及未来可能重拾的荣光。宫廷中开始流传低语：年轻的王子正谈论着要复兴草原传统，重铸古马扎尔人的精神。有人视此为天命所归，亦有人视其为危险的怀旧情绪。"
 gin_hun.1.a: "拥抱我们的草原传统。"
 gin_hun.1.b: "我们是匈牙利人，不是游牧民族。"
 gin_hun.2.title: "回归长生天"
 gin_hun.2.desc: "登基之后，[GetCharacter('hun_lajos_i').GetName]开始质疑长久以来指引王国的信仰。在宫殿的孤寂中，他耗费无数个不眠之夜研读草原古经——那些关于长生天、万物之灵、先祖与平衡的传说。\n\n这些文字以前所未有的明晰叩击着他的心灵。如今，拉约什伫立群臣面前，宣告自己将摒弃旧信仰，重归祖辈之路：皈依[ShowReligionName('tengri')]——长生天的信仰。有人跪地膜拜……亦有人窃议君王疯癫。"
 gin_hun.2.a: "上苍乃我们唯一的神。"
 gin_hun.2.b: "国王绝不能背弃教会。"
 gin_hun.3.title: "斯卡利茨之战"
 gin_hun.3.desc: "在[GetCountry('BOH').GetName]腹地的斯卡里茨，这片见证过无数历史战役的土地上，经过激烈战斗终于取胜，波西米亚军队被成功击退。\n\n这场胜利极大地鼓舞了我军士气，巩固了我们对这片土地的统治权，捷报传遍整个王国。胜利的喜悦在民众间蔓延，使人们充满自豪与信心。我军展现出的勇气与决心将成为未来战役的精神楷模，为王国增添荣耀与声望。如今斯卡里茨已牢牢掌控在我们手中，这既是领土的收复，更是将被世代传颂的历史功绩。"
 gin_hun.3.a: "掠夺土地"
 gin_hun.3.b: "这种行为有失我们的身份。"
 gin_hnn.1.title: "匈人帝国的复兴"
 gin_hnn.1.desc: "沉睡已久的游牧之魂终于苏醒。伟大氏族后裔已收复昔日故土池，正待宣告那个曾撼动罗马根基的恐怖帝国即将复兴，是时候从草原上铸就新的命运了。"
 gin_hnn.1.a: "我们重现阿提拉的辉煌！"
 STATIC_MODIFIER_NAME_hun_heretic_conversions_modifier: "匈人传教士"
 STATIC_MODIFIER_NAME_hun_cav_power_modifier: "匈人骑兵"
 return_of_the_hun_flag: "匈人归来"
 gin_hun.4.title: "古老名号的低语"
 gin_hun.4.desc: "边境省份近期的考古发掘与古籍研究发现了早于现有编年史的风化铭文与遗物。\n\n学者声称这些标记指向一个仅存于半被遗忘的歌谣与传说中的民族——匈人。这些发现已传入平民贵族耳中，质疑声渐起：\n\n这些石头所言非虚，这对我们的名号与血脉意味着什么？我们仅是顶着马扎尔之名的族群，抑或有更古老的血缘在血管中流淌？\n\n继承人还是个孩子，但刻在石头上的过去不容忽视。"
 gin_hun.4.a: "让石头发声。鼓励探究。"
 gin_hun.4.b: "这是危险的揣测。予以压制。"
 gin_hun.5.title: "被遗忘语言所传唱的歌谣"
 gin_hun.5.desc: "从边境归来的旅人说起一桩奇事。在小村庄与炉火旁的交集中，古老的歌谣正被重新传唱——那些无人能溯源的旋律，那些比记忆本身更古老的词句。\n\n歌者声称这些诗句是祖辈代代相传而来。有人说这是另一个时代的摇篮曲，源自几乎被历史抹去的民族。\n\n无人能断言这些歌谣是否真属于匈人，或只是渐逝民间传说中的碎片。但它们依然在蔓延，从村庄到村庄，从炉边到炉边。"
 gin_hun.5.a: "让人民歌唱。"
 gin_hun.5.b: "民间故事改变不了什么。"
