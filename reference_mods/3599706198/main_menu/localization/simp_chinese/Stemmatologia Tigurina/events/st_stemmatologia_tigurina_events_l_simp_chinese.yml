 stemmatologia_tigurina.10.tt5: "好奇者与时尚人士对[ShowGoodsNameWithNoTooltip('tobacco')]的需求增加了。"
 stemmatologia_tigurina.10.historical_info: "#bold 《烟草，论极有益之创伤草药烟草或骨草：上帝为医药与疾病之故，于数年前亦在我等地域为诸多病患之益而赐予》#!于1616年在苏黎世由市议员兼药剂师 #bold 雅各布·[ShowDynastyName('st_zur_ziegler_dynasty')]#! 出版。与欧洲其他地方兴起的道德和医学批评形成鲜明对比，齐格勒热情捍卫烟草的使用，将其描绘成一种具有治疗、精神乃至神赐属性的奇迹创伤草药。他的论文主张烟草能缓解头部和胸部疾病，增强身体抵御瘟疫和忧郁的能力，并在适当使用时具有治疗价值。\n\n齐格勒的著作反映了苏黎世知识与商业生活，当时烟草这类异域商品正进入公民讨论，不仅作为消遣品，更成为医学、神学和经济辩论的对象。当诸如英格兰的#bold 詹姆斯六世及一世#!等君主谴责烟草为有害恶习时，齐格勒却将其定位为植根于自然哲学、工匠知识和神圣天意的合法疗法。他的文本促进了烟草在瑞士城镇社会日益增长的接受度，并帮助苏黎世置身于近代早期欧洲医学与商业思想的更广阔市场之中。\n\n#bold 事件插图#!：一幅男子吸烟斗的绘图，见于#bold 雅各布·齐格勒的《烟草，论极有益之创伤草药烟草或骨草：上帝为医药与疾病之故，于数年前亦在我等地域为诸多病患之益而赐予》#!，1616年。"
 stemmatologia_tigurina.11.title: "埃舍尔·冯·卢赫斯"
 stemmatologia_tigurina.11.desc: "一位出身于[ShowDynastyName('st_zur_escher_dynasty')]家族的成员，其家族长期在[ShowLocationName('baden_im_aargau')]附近的凯泽施图尔地区担任[ShowDynastyName('habsburg_dynasty')]伯爵的随从，现已申请成为[ShowLocationName('zurich')]的公民。这位候选人[target_character.GetName]声称自己是[st_zur_johannes_iii_escher.GetName]的儿子。\n\n若获接纳，[target_character.GetSheHe]及其亲属将被纳入[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]精英阶层，此举将增强本城的贵族血统，并将我们的联盟网络扩展至阿尔高及莱茵边境的更广阔地域。"
 stemmatologia_tigurina.11.historical_info: "[ShowDynastyName('st_zur_escher_dynasty')]家族起源于[ShowLocationName('baden_im_aargau')]附近的凯泽斯图尔，12世纪末的文献记载显示他们是[ShowDynastyName('habsburg_dynasty')]的封臣。自13世纪初起，他们在莱茵河两岸拥有封地，并担任凯泽斯图尔的行政长官一职。苏黎世支系始于[target_character.GetName]，他于1384年8月4日获得市民权，建立了后来被称为#bold 埃舍尔·冯·卢克斯#!的分支。\n\n[ShowDynastyName('st_zur_escher_vom_luchs_dynasty')]迅速跻身城市统治精英阶层。#bold 格茨·埃舍尔#!是他那一代人中最富有者之一，于1433年在[ShowLocationName('rome')]#bold 西吉斯蒙德皇帝#!的加冕典礼上受封为骑士，并获得纹章。该家族积累了包括#bold 乌蒂孔#!、#bold 伊尔歇尔山贝格#!和#bold 维尔夫林根#!在内的多处地产，并涌现出众多官员：到旧制度末期，他们已为共同辖区提供了十名地方总督，为苏黎世乡村地区提供了二十二名地方总督和四十五名高级行政官，还培养出数位军事领袖。\n\n他们的显赫地位一直延续到19世纪，#bold 约翰·康拉德·埃舍尔#!和#bold 汉斯·康拉德·埃舍尔#!曾相继担任市长。[ShowDynastyName('st_zur_escher_vom_luchs_dynasty')]通过与[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]和[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]缔结婚姻，在19世纪衰落之前始终保持着苏黎世最富有家族之一的地位。"
 stemmatologia_tigurina.11.a: "欢迎他成为公民。"
 stemmatologia_tigurina.11.a.tt: "[ShowDynastyName('st_zur_escher_vom_luchs_dynasty')]家族被苏黎世政治精英阶层接纳。"
 stemmatologia_tigurina.11.b: "我们已无需更多崇高的抱负。"
 stemmatologia_tigurina.11.b.tt: "让[ShowDynastyName('st_zur_escher_dynasty')]家族的这一支系留在[ShowLocationName('baden_im_aargau')]。"
 stemmatologia_tigurina.12.title: "埃舍尔·冯·格拉茨"
 stemmatologia_tigurina.12.desc: "尊贵的[ShowDynastyName('st_zur_escher_dynasty')]家族又一支系寻求成为[ShowLocationName('zurich')]市民。[target_character.GetName]的[st_zur_johannes_i_escher_vom_luchs.GetName]的胞弟呈递的家谱可追溯至凯泽斯图尔行政长官之职，并宣称其先祖与[ShowDynastyName('habsburg_dynasty')]存在古老的臣属关系。若获接纳，[ShowDynastyName('st_zur_escher_vom_glas_dynasty')]将为我们的城市带来财富、商业经验以及联姻收益。"
 stemmatologia_tigurina.12.historical_info: "[ShowDynastyName('st_zur_escher_vom_glas_dynasty')]家族在苏黎世的起源可追溯至[target_character.GetName]，他于1385年7月20日获得市民权。通过联姻——先与#bold 玛格蕾塔·楚姆·托尔#!结合，后娶#bold 雷古拉·马内瑟·冯·马内格#!——[target_character.GetShortName]将家族深深融入了苏黎世的贵族与商业网络。自中世纪晚期至近代早期，他们始终位列#bold 商人#!阶层，也是城市最显赫的贵族世家之一。\n\n其影响既广泛又持久：直至1798年，[ShowDynastyName('st_zur_escher_vom_glas_dynasty')]家族共诞生了五位市长、四十五名小议会议员及八十二名大议会议员。他们深度参与对外贸易与军事承包，并在16至18世纪间输送了数十名地方行政官与省督。尽管曾遭遇竞争——最著名的是与#bold 汉斯·瓦尔德曼#!的对抗，以及后期与改革家#bold 乌尔里希·茨温利#!的冲突。\n\n近代早期，该家族分化出多个支系，包括#bold “潘分‑埃舍尔”支系#!以及在[GetCountry('FRA').GetName]颇具影响力的#bold 埃舍尔‑拉恩支系#!。其遗产远不止于政治领域：#bold 汉斯·卡斯帕·埃舍尔#!创立了#bold 埃舍尔‑维斯公司#!，成为瑞士工业化的基石；家族后代中更涌现出工程师、实业家、学者与国际商人。即便部分成员在18世纪至19世纪初涉足大西洋奴隶经济，[ShowDynastyName('st_zur_escher_vom_glas_dynasty')]家族依然是苏黎世最具影响力的宗族之一。"
 stemmatologia_tigurina.12.a: "授予公民身份，正如我们对其兄弟[st_zur_johannes_i_escher_vom_luchs.GetName]所做的那样。"
 stemmatologia_tigurina.12.a.tt: "[ShowDynastyName('st_zur_escher_vom_glas_dynasty')]家族被苏黎世[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]政治精英阶层接纳。"
 stemmatologia_tigurina.12.b: "他们的野心威胁到了力量平衡。"
 stemmatologia_tigurina.12.b.tt: "让[ShowDynastyName('st_zur_escher_dynasty')]家族的这一支系留在[ShowLocationName('baden_im_aargau')]。"
 stemmatologia_tigurina.13.title: "从磨坊主到地方法官"
 stemmatologia_tigurina.13.desc: "一个野心勃勃的[ShowLocationName('zurich')]磨坊主家族正致力于跻身本城[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]阶级行列。尽管其确切起源已不可考，韦德米勒家族自14世纪起便活跃于[ShowLocationName('zurich')]，家族财富与利马特河畔的磨坊及谷物运输息息相关。\n\n该家族由#bold 厄滕巴赫#!修道院的#bold 欣特堡磨坊#!租赁者[st_zur_otto_i_werdmuller.GetName]及其妻子[st_zur_agnes_i_dietrich.GetShortName]领导，家中几个儿子：[st_zur_hans_i_werdmuller.GetShortName]、[st_zur_heinrich_i_werdmuller.GetShortName]、[st_zur_heinrich_ii_werdmuller.GetShortName]、[st_zur_otto_ii_werdmuller.GetShortName]、[st_zur_cuno_i_werdmuller.GetShortName]以及尚在襁褓的[st_zur_kleinhans_i_werdmuller.GetNickname]。\n\n这个勤勉的家族与城市各行当联系紧密，若获得许可，他们必将稳居[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]之列。这个新兴家族或许很快就能从磨盘之轮，转向驱动我们共和国运转的机枢。"
 stemmatologia_tigurina.13.historical_info: "[ShowDynastyName('st_zur_werdmuller_dynasty')]家族，最早有确切记载的是磨坊主[st_zur_otto_i_werdmuller.GetShortName]（1462年），其于15世纪崛起，成为[ShowLocationName('zurich')]最具影响力的工匠世家之一，家族发迹始于对磨坊权利和谷物供应的控制，为日后在商业、行政和政治上的抱负奠定了基础。\n\n从奥托的曾孙#bold 奥托#!和#bold 贝亚特·韦尔德米勒#!开始分裂为两个主要支系。奥托支系涌现多位神职人员和政府官员，其最后一位男性代表，#bold 汉斯·乌尔里希·韦尔德米勒#!牧师，于1742年去世。贝亚特是韦尔德米勒磨坊的磨坊主，他创立了第二个、也是更具活力的支系，该支系又在他的儿子们中进一步分化为四条发家于商业的支系。\n\n首先是bold 大卫#!和#bold 海因里希#!两兄弟，他们于1575年建立了一家羊毛布匹工场，后来扩展到[ShowGoodsName('silk')]生产。大卫支系为商人、丝绸商和军人提供支持；海因里希的后代则在纺织贸易和银行业占据主导地位一直至19世纪。\n\n第三条支系源自#bold 克里斯托夫·韦尔德米勒#!，其继承了韦尔德米勒磨坊，并诞生了磨坊主、锯木工、木材商人以及杰出的官员，其中包括上校#bold 康拉德·韦尔德米勒（1606‑1674）#!，他曾在1646年的韦登斯维尔事件和1653年针对阿尔高叛乱者的农民战争中指挥苏黎世军队。\n\n第四条支系由#bold 托马斯（1562‑1614）#!创立，通过在[ShowGoodsName('iron')]贸易中积累巨额财富，并派遣多名成员到外国军队服役，其中最著名的是将军#bold 汉斯·费利克斯·韦尔德米勒（1658‑1725）#!。\n\n几个世纪以来，韦尔德米勒家族始终位列城市最重要的统治家族之中。他们提供了78名大议会成员、35名小议会成员，并担任[ShowBuildingTypeName('bailiff')]职务36次；这一存在感仅次于[ShowDynastyName('st_zur_escher_vom_glas_dynasty')]和[ShowDynastyName('st_zur_hirzel_dynasty')]家族。尽管从未产生过一位[ROOT.GetCountry.GetGovernment.GetRulerTitle]，但至少从1545年起，他们就在贵族社团“#bold 施尼根盾徽会#!”中拥有盾徽，到18世纪初，他们同时控制的盾徽数量多达五个。1715年，该家族以信托继承方式获得了#bold 埃尔格城堡#!，巩固了其贵族地位。\n\n联姻策略巩固了他们的影响力：韦尔德米勒家族几乎只与苏黎世的主要商人和贵族世家通婚，从而加强了他们在经济和政治精英中的地位。\n\n#bold 事件插图#!：部分韦尔德米勒家族纹章"
 stemmatologia_tigurina.13.a: "他们属于我们的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]。"
 stemmatologia_tigurina.13.a.at: "韦尔德米勒家族被授予完全市民身份，并登记为[GetCountry('ZUR').GetName]的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]成员。"
 stemmatologia_tigurina.13.b: "他们的野心与我们无关。"
 stemmatologia_tigurina.13.b.at: "我们拒绝授予[ShowDynastyName('st_zur_werdmuller_dynasty')]家族在城市事务中更大的角色。"
 stemmatologia_tigurina.13.b.at2: "[ShowDynastyName('st_zur_werdmuller_dynasty')]家族仅被视为[GetCountry('ZUR').GetName]的[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]。"
 stemmatologia_tigurina.14.title: "布匹、信用与议会席位"
 stemmatologia_tigurina.14.desc: "[ShowDynastyName('st_zur_hirzel_dynasty')]家族的成员已抵达[ShowLocationName('zurich')]，他们试图在我们的市民中站稳脚跟。该家族在#bold 普费菲孔#!起家，长期从事[ShowGoodsName('cloth')]贸易。家族族长[st_zur_hans_i_hirzel.GetName]已在[ShowLocationName('lucerne')]立足，他与妻子[st_zur_anna_i_erni.GetShortName]打算在那里长居。\n\n如今站在我们当局面前的，是两位雄心勃勃的儿子：[ShowGoodsName('cloth')]商人[st_zur_peter_i_hirzel.GetShortName]（携妻子及五名子女）及其兄弟[st_zur_felix_i_hirzel.GetShortName]，他们都渴望获得[ShowLocationName('zurich')]公民权，跻身市民精英阶层。他们的商业关系、资本实力与婚姻纽带，有望增强本城日益壮大的纺织经济。\n\n与此同时，他们的姐妹[st_zur_sara_i_hirzel.GetShortName]及其丈夫[st_zur_johannes_i_gruner.GetShortName]和他们的子女不久将启程前往[GetCountry('BRN').GetName]，希望在那里获得他们自己的公民权利与机遇。尽管家族分散于整个邦联各地，但每一支都试图通过勤勉、商业和战略联盟谋求地位与繁荣。\n\n如果我们接纳这些希尔策尔家族成员进入我们的公民社群，他们的勤奋习惯与商业经验，或许能为我们的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]增色添彩。"
 stemmatologia_tigurina.14.historical_info: "[ShowDynastyName('st_zur_hirzel_dynasty')]家族首次见于记载是在1318年弗劳明斯特修道院的租金名册中。该家族发家始于普费菲孔镇的布匹商人#bold 彼得·希尔策尔#!，他在[ShowLocationName('lucerne')]生活十年后，于1540年获得了[ShowLocationName('zurich')]的公民权。虽然15世纪早期的记录中已出现希尔策尔姓氏，但他们与彼得的亲缘关系尚不确定。\n\n从彼得开始，一个庞大的世系诞生，其分支很快遍布苏黎世高地及更远地区。四个主要支系源自彼得的孙子#bold 萨洛蒙·希尔策尔#!，也是家族中首位担任[ROOT.GetCountry.GetGovernment.GetRulerTitle]的成员。第五个关联较松散的支系可追溯至#bold 彼得·希尔策尔‑海德格尔（1554‑1613）#!。自16世纪起，希尔策尔家族扩展至德国、英国、法国、意大利和奥斯曼帝国。\n\n希尔策尔家族成员常在政府、军队或教会机构任职。1574年至1798年间，他们在#bold 大议会中占据83席#!，在#bol d小议会中占据40席#!，仅次于[ShowDynastyName('st_zur_escher_vom_glas_dynasty')]家族。他们在16世纪有1位，17世纪有6位，18世纪有12位出任[ShowBuildingTypeName('bailiff')]，并且自1582年起在贵族团体“#bold 施内根盾徽持有者#!”中拥有代表，到18世纪末已持有不少于六面盾徽。\n\n通过审慎投资和精明联姻，希尔策尔家族积累了巨额土地财富，在政治上，希尔策尔家族不固守单一派系。其成员中既有坚定的保守派，也有改革者：在1839年的“#bold 苏黎世暴动#!”中，市长#bold康拉德·梅尔希奥·希尔策尔#!为颇具争议的神学家#bold 大卫·弗里德里希·施特劳斯#!投下了决定性支持票，而教士#bold 伯恩哈德·希尔策尔#!则召集了抗议的上地州农民。\n\n数个世纪以来，该家族通过定期聚会、“#bold 希尔策尔家族纪事#!”期刊以及1652年创立至今尚存的基金，维系着集体记忆与凝聚力。\n\n#bold 事件插图：希尔策尔家族纹章#!"
 stemmatologia_tigurina.14.a: "欢迎他们加入我们的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]。"
 stemmatologia_tigurina.14.a.at: "[ShowDynastyName('st_zur_hirzel_dynasty')]家族被授予公民权，并登记为[GetCountry('ZUR').GetName]的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]。"
 stemmatologia_tigurina.14.b: "他们的野心与我们无关。"
 stemmatologia_tigurina.14.b.at: "该城市拒绝授予[ShowDynastyName('st_zur_hirzel_dynasty')]家族参与其事务的职权。"
 stemmatologia_tigurina.14.b.at2: "[ShowDynastyName('st_zur_hirzel_dynasty')]仅被视为[GetCountry('ZUR').GetName]的[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]。"