 stemmatologia_tigurina.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
 stemmatologia_tigurina.8.a.tt: "我们已与[GetCountry('SFC').GetLongName]缔结了[GetInternationalOrganizationType('defensive_league').GetName]。"
 stemmatologia_tigurina.9.title: "从屠夫到执达吏"
 stemmatologia_tigurina.9.desc: "一个富有进取心的屠夫与牲畜贩子家族已在[ShowLocationName('zurich')]定居，意图将他们的命运更牢固地与我们城市联结。早在14世纪中叶之前便已获得[ShowLocationName('zurich')]市民身份的霍尔茨哈尔布家族，如今从#bold 邦施泰滕#!周边迁来，目着眼于公会的晋升和为城市提供稳定的服务。\n\n家族长辈[st_zur_hans_ulrich_i_holzhalb.GetName]、其儿子[st_zur_ulrich_i_holzhalb.GetShortName]以及日渐壮大的家庭成员——[st_zur_elisabeth_i_holzhalb.GetShortName]、[st_zur_ulrich_ii_holzhalb.GetShortName]、[st_zur_andreas_i_holzhalb.GetShortName]与尚在襁褓的[st_zur_johannes_i_holzhalb.GetShortName]——此刻正立于我们的市政官面前。他们勤劳、守纪，在肉类贸易行业中已享有良好声誉，若被接纳为城市社群的一员，或将成为#bold 维德行会#!的宝贵支柱，并成为我们[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]的忠诚成员。"
 stemmatologia_tigurina.9.historical_info: "[ShowDynastyName('st_zur_holzhalb_dynasty')]家族，日后成为[ShowLocationName('zurich')]最显赫的世家之一，在1350年之前便已获得公民权。该家族随着肉商[st_zur_ulrich_ii_holzhalb.GetShortName]（死于1489年）而稳固确立，他于1464至1465年间担任#bold 公羊公会#!的#bold 公会会长#!。\n\n随着时间的推移，该家族分裂为三个主要支系。一支源自#bold 莱昂哈德·霍尔茨哈尔布#!，其16世纪的后代主要是肉商和官吏，包括众多[ShowBuildingTypeName('bailiff')]和公会会长。另外两支则由莱昂哈德的兄弟#bold 雅各布#!的儿子们建立。\n\n自1416年起，霍尔茨哈尔布家族在#bold 大议会#!中有记载，并从1464年起，也出现在#bold 小议会#!中。他们在17世纪上半叶达到了经济和政治的巅峰。几代人以来，他们提供的[ShowLocationName('zurich')][ShowBuildingTypeName('bailiff')]数量超过任何其他家族，尤其在16和17世纪尤为集中，此外还有大约三十名#bold 小议会#!成员，其中包括十五位公会会长和三位[ROOT.GetCountry.GetGovernment.GetRulerTitle]。\n\n他们的财富和地位体现在其拥有的财产上：#bold 邦施泰滕#!、#bold 维尔登#!以及部分#bold 特吕利孔#!的管辖权；#bold 戈尔登贝格#!、#bold 苏森贝格#!和#bold 沙菲斯海姆#!城堡，还有一系列城镇住宅。\n\n在17世纪，他们在贵族社团#bold 施尼根盾徽会#!中拥有多达七个盾徽。#bold 莱昂哈德·霍尔茨哈尔布（1578‑1619）#!于1610年购买了#bold 萨尔门药房#!，创立了一个药剂师分支；他去世后，药房传给了他的侄子#bold 汉斯·乌尔里希（1605‑1654）#!。另一位#bold 莱昂哈德·霍尔茨哈尔布#!与亲属#bold 海因里希#!和#bold 汉斯·海因里希#!，以及#bold 汉斯·雅各布·格斯纳#!和#bold 康拉德·洛赫尔#!一起，在[ShowLocationName('zurich')]的#bold 稻草场#'建立了一家酒馆和丝绸工坊；他的儿子#bold 康拉德#!于1604年开设了第二家工坊。到大约1610年，这家纺织工坊缴纳的税款已位居全市第二。\n\n从16世纪末到17世纪，霍尔茨哈尔布家族的婚姻模式反映了他们提升的社会地位。他们几乎只与[ShowLocationName('zurich')]的主要商人家庭联姻；例如，市长兼制造商#bold 莱昂哈德·霍尔茨哈尔布#!的六个孩子中，有四个与强大的企业家家族#bold 韦德米勒#!联姻。\n\n然而，到18世纪中叶，该家族的政治重要性逐渐减弱：一些支系绝嗣，另一些则滑入较低的市民阶层。尽管霍尔茨哈尔布这个姓氏如今在[ShowLocationName('zurich')]已不复存在，但其印记仍留存在该市的公会记录、其城堡和庄园中，以及那些曾拥有此姓氏的屠夫、地方法官、[ShowBuildingTypeName('bailiff')]和公会会长的长长名单里。\n\n在此事件中，我们遇到的是该家族较早的阶段：[st_zur_hans_ulrich_i_holzhalb.GetShortName]、他的屠夫儿子[st_zur_ulrich_i_holzhalb.GetShortName]以及他们的孩子们，包括未来的公会会长和[ShowBuildingTypeName('bailiff')][st_zur_johannes_i_holzhalb.GetShortName]，作为新兴市民进入城市。他们在[GetCountry('ZUR').GetName]受到的欢迎，为霍尔茨哈尔布姓氏日后的显赫铺平了道路。\n\n#bold 事件插图#!：霍尔茨哈尔布家族纹章，见于#bold 埃哈德·迪尔斯泰勒的《Stemmatologia Tigurina：即苏黎世家族谱系书》#!，1706–1724年。"
 stemmatologia_tigurina.9.a: "欢迎他们成为尊贵的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]。"
 stemmatologia_tigurina.9.a.at: "霍尔茨哈尔布家族被授予完全公民权，并登记为[GetCountry('ZUR').GetName]的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]成员。"
 stemmatologia_tigurina.9.b: "他们的野心与我们无关。"
 stemmatologia_tigurina.9.b.at: "我们拒绝给予[ShowDynastyName('st_zur_holzhalb_dynasty')]家族在城市事务中更大的角色。"
 stemmatologia_tigurina.9.b.at2: "[ShowDynastyName('st_zur_holzhalb_dynasty')]家族仅被视为[GetCountry('ZUR').GetName]的[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]。"
 stemmatologia_tigurina.10.title: "[ShowGoodsNameWithNoTooltip('tobacco')]，源自药用植物烟草属"
 stemmatologia_tigurina.10.desc: "身为尊贵的[ShowDynastyName('st_zur_ziegler_dynasty')]家族一员，博学的市民[target_character.GetName]撰写了一篇为[ShowGoodsName('tobacco')]辩护的激昂文章，并把烟草视之为能愈合创口、缓解疼痛、振奋倦怠之躯的神奇药草。\n\n他的手稿如今在行会大厅与酒馆间流传，既引发热议，也招来阵阵呛咳。这座城市是否该就此表明立场？"
 stemmatologia_tigurina.10.a: "公开推广这篇论文。"
 stemmatologia_tigurina.10.tt1: "齐格勒的论著在医生和学者间迅速传播，他们引用其内容来为[ROOT.GetCountry.GetName]日益流行的[ShowGoodsNameWithNoTooltip('tobacco')]风尚提供正当性依据。"
 stemmatologia_tigurina.10.b: "允许发行，但限制销售。"
 stemmatologia_tigurina.10.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]欣赏可预测的商业活动。"
 stemmatologia_tigurina.10.tt3: "经营[ShowGoodsNameWithNoTooltip('tobacco')]的商人对这种干预感到不满。"
 stemmatologia_tigurina.10.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]欢迎[ShowGoodsNameWithNoTooltip('tobacco')]贸易带来的新机遇，只要利润能够高就足以盖过道德上的顾虑。"
