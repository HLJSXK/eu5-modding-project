l_simp_chinese:
 st_zur_ziegler_hyperlink: "[ShowDynastyName('st_zur_ziegler_dynasty')]"
 stemmatologia_tigurina.1.title: "$st_zur_ziegler_hyperlink$家族抵达"
 stemmatologia_tigurina.1.desc: "一个受人尊敬的工匠家族已进入[ShowLocationName('zurich')]，在我们的城市内寻求新机遇与未来。他们来自[ShowProvinceDefinitionName('aargau_province')]的故乡布雷姆加滕，他们自称$st_zur_ziegler_hyperlink$家族从事炉窑工匠，这一行业对任何繁荣的[urban_location|e]都至关重要。\n\n他们的族长[target_character.GetName]和[target_character.GetHisHer]的儿子[target_character2.GetShortName]及其家族成员站在我们的当局面前，渴望将他们的命运与[GetCountry('ZUR').GetName]紧密相连。他们勤劳、虔诚，并以勇气和抱负闻名，若获得公民身份，并跻身于我们的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]之中，他们或许能成为城市行会和议会有价值的补充。"
 stemmatologia_tigurina.1.historical_info: "该家族最初被称为“来自韦德”，其根源可追溯至[ShowProvinceDefinitionName('aargau_province')]的布伦姆加滕，他们在1419年通过面包师[target_character.GetName]获得苏黎世的公民权，此后家族的影响力迅速扩大并在1445年成为面包师行会会长，1454年家族成员[target_character.GetShortName]成为#bold 衡格#!的[ShowBuildingTypeName('bailiff')]，1455年家族成员成为#bold 衡格#!的首席地方法官，最终于1460年成为[ShowLocationName('zurich')]的副市长。\n\n[target_character.GetShortName]的儿子[target_character2.GetShortName]与其兄弟共通建立了一家砖厂，这促使他们从旧名改为职业姓氏[ShowDynastyName('st_zur_ziegler_dynasty')]（意为“#bold 制砖匠#!”或），因为他们的手艺对城市日益增长的建设需求变得不可或缺。据说[target_character2.GetShortName]是[ShowLocationName('zurich')]第一个想到用烧制黏土瓦片取代当时常见的木瓦和石片屋顶的人。\n\n苏黎世第一批齐格勒家族的早期几代子孙，将勤劳与虔诚、尚武精神以及对城市行会理解与参与结合在一起，并逐渐发展壮大，在随后几个世纪，齐格勒家族在苏黎世的市政委员会（包括大议会和小议会）中涌现出数十位代表，巩固了其在苏黎世最具影响力的市民阶层和贵族阶层中的地位，还源源不断地为这座城市输送工匠、商人、法官、士兵、官员和政治家。"
 stemmatologia_tigurina.1.a: "欢迎他们成为尊贵的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]。"
 stemmatologia_tigurina.1.a.at: "[target_character.GetName]及其家人将被授予[GetCountry('ZUR').GetName]的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]身份。"
 stemmatologia_tigurina.1.b: "我们不能冒险产生让人出现野心，处决[target_character.GetShortName]！"
 stemmatologia_tigurina.1.b.at: "我们将处决[target_character.GetName]。"
 stemmatologia_tigurina.1.c: "[target_character.GetShortName]必须成为[ROOT.GetCountry.GetGovernment.GetRulerTitle]，不惜一切代价！"
 stemmatologia_tigurina.1.c.at: "这肯定会引发叛乱。"
 stemmatologia_tigurina.2.title: "旧秩序的终结"
 stemmatologia_tigurina.2.desc: "[ShowDynastyName('st_zur_brun_dynasty')]家族为弗劳明斯特[ShowBuildingTypeName('monastery')]提供骑士支持，因此长期在城中拥有影响力，然而他们的命运已通过与受人尊敬的[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]‑[ShowDynastyName('st_zur_futschi_dynasty')]家族的联姻——[target_character.GetName]与[st_zur_margaretha_i_futschi.GetName]的结合，变得紧密相连。随着颇具影响力的议员[st_zur_ulrich_i_futschi.GetName]及其子嗣退出政治，[ShowDynastyName('st_zur_brun_dynasty')]家族已走上前台，谋求在城市事务中扮演更重要的角色。\n\n如今，[ShowLocationName('zurich')]铺着鹅卵石的广场上回荡着变革的议论。行会成员将[target_character.GetShortName]视为能够挑战旧有[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]统治地位的领袖，而他的儿子们——[st_zur_bruno_i_brun.GetShortName]和[st_zur_herdegen_i_brun.GetShortName]均在教会担任职务，[st_zur_ulrich_i_brun.GetShortName]及其妹妹[st_zur_margaretha_i_brun.GetShortName]则可以出嫁，为家族的崛起争取潜在的支持。"
 stemmatologia_tigurina.2.historical_info: "[ShowDynastyName('st_zur_brun_dynasty')]家族属于一个古老的骑士世家，其家谱可追溯至13世纪早期，活跃于[ShowLocationName('zurich')]和[ShowLocationName('basel')]两座城市。\n\n最早有记载的家族始祖是[st_zur_heinrich_i_brun.GetName]，他娶了[st_zur_adelheid_mulner.GetShortName]，后者是颇具影响力的政治家[st_zur_jakob_i_mulner.GetName]的女儿。他们的儿子[st_zur_jakob_brun_elder.GetName]（老雅各布）曾担任首席行政官，其与妻子[st_zur_mechthild_brun.GetShortName]育有三个孩子：[st_zur_jakob_brun_younger.GetShortName]、[st_zur_ita_i_brun.GetShortName]以及[target_character.GetShortName]。\n\n鲁道夫娶了[st_zur_margaretha_i_futschi.GetName]，她是[st_zur_felix_i_futschi.GetShortName]和[st_zur_hartmann_i_futschi.GetShortName]的姐妹，也是议员[st_zur_ulrich_i_futschi.GetName]的女儿，这位议员在1336年的动荡中放弃了所有政治诉求。\n\n1336年，在商人阶层与被排斥的贵族和手工业者之间的冲突中，资深骑士格茨·穆尔纳突然去世，布伦脱颖而出成为领袖。在方济各会修道院举行的一次民众集会宣布他为终身市长，旧议会则被罢黜或流放。\n\n他的统治充满了与流亡反对派的冲突，这些反对派得到了[ShowDynastyName('habsburg_dynasty')]的支持，冲突在诸如[ShowLocationName('toggenburg')]附近的#bold 格里瑙#!战役（1337年）以及失败的#bold 苏黎世谋杀之夜#!政变（1350年）中达到顶峰。尽管遭遇军事挫折，但他的[ShowGovernmentReformName('zur_guild_constitution')]在后来的条约中得到确认，并一直是苏黎世政治秩序的基础，直至1798年。\n\n[target_character.GetShortName]于1360年去世，留下四个孩子：[st_zur_bruno_i_brun.GetShortName]（后成为大教堂[ShowBuildingTypeName('monastery')]的院长）、[st_zur_herdegen_i_brun.GetShortName]（后来成为教士）、[st_zur_ulrich_i_brun.GetShortName]（于1361年成为骑士）以及[st_zur_margaretha_i_brun.GetShortName]（后来与冯·屈斯纳赫特家族联姻）。"
 stemmatologia_tigurina.2.a: "支持[target_character.GetShortName]。"
 stemmatologia_tigurina.2.b: "处决独裁官！"
 stemmatologia_tigurina.2.b.at: "我们将处决[target_character.GetName]。"
 stemmatologia_tigurina.2.c: "[st_zur_ulrich_i_futschi.GetName]必须成为[ROOT.GetCountry.GetGovernment.GetRulerTitle]，让誓言见鬼去吧！"
 stemmatologia_tigurina.2.c.at: "[st_zur_ulrich_i_futschi.GetName]较为温和的手段或许能安抚[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]并维持旧秩序。尽管乌尔里希·菲奇曾宣称放弃权力，但他仍需挺身而出——这一举动可能比更为激进的[target_character.GetShortName]更容易被贵族与显贵们接受。"
 stemmatologia_tigurina.3.title: "收购[ShowLocationName('kyburg')]"
 stemmatologia_tigurina.3.desc: "[ShowDynastyName('habsburg_dynasty')]对[ShowLocationName('kyburg')]的控制近年来已经削弱。受债务拖累、[control|e]低下困扰以及叛乱不断，[GetCountry('HAB').GetAdjective]在此地的统治日益难以为继。\n\n如果我们提出收购提议，或许能和平获得这些土地，从而加强我们在该区域的地位，而且无需诉诸武力。"
 stemmatologia_tigurina.3.historical_info: "1424年，[GetCountry('ZUR').GetName]城邦从[ShowDynastyName('habsburg_dynasty')]手中购得[ShowLocationName('kyburg')]伯国，这是其最重要的领土收购之一。以[ShowLocationName('zurich')]东部宏伟的#bold 基堡#!为中心的基堡，长期以来一直是哈布斯堡家族的主要行政中心，也是他们在[ShowProvinceDefinitionName('thurgau_province')]最后的关键领地之一。\n\n此次出售发生在哈布斯堡家族势力衰弱之际。在1415年领土被[GetUniqueInternationalOrganization('swiss_confederation').GetName]夺取，并面临日益加剧的债务和内部政治压力后，哈布斯堡家族越来越依赖出售或抵押土地来筹措资金以履行义务。[ShowLocationName('kyburg')]尽管具有重要的历史意义，但对他们而言已变得难以防御和维护。\n\n对[GetCountry('ZUR').GetName]而言，这次收购是一次战略上的胜利。该城邦旨在巩固其在该区域的权力，将其影响力扩展到#bold 利马特河谷#!之外，并确立自己作为[GetUniqueInternationalOrganization('swiss_confederation').GetName]主要成员的地位。购买[ShowLocationName('kyburg')]使苏黎世得以和平扩张，而无需冒公开战争的风险。这笔交易也说明了中世纪晚期瑞士一个更广泛的趋势：封建王朝的逐渐退却，以及城镇共和国和公社制邦国的兴起。\n\n[GetCountry('ZUR').GetName]对基堡的控制持续了数个世纪，将其纳入行政管理体系，并将城堡用作区域治理中心。因此，这次收购既标志着苏黎世领土扩张的一个转折点，也是[ShowDynastyName('habsburg_dynasty')]在后来成为现代瑞士的土地上影响力长期衰退的又一步。"
 stemmatologia_tigurina.3.a: "提出我们的报价。"
 stemmatologia_tigurina.3.a.tt: "我们将提供六个月的收入来换取[ShowLocationName('kyburg')]，前提是[GetCountry('HAB').GetNameWithNoTooltip]接受。"
 stemmatologia_tigurina.3.b: "这不再符合我们的利益。"
 stemmatologia_tigurina.4.title: "[GetCountry('ZUR').GetNameWithNoTooltip]提出购买[ShowLocationName('kyburg')]"
 stemmatologia_tigurina.4.desc: "[GetCountry('ZUR').GetName]向我们提出购买[ShowLocationName('kyburg')]的提议。接受这一提议将为我们带来可观的黄金收入，但这也会进一步削弱我们在[ShowProvinceDefinitionName('thurgau_province')]的地位。"
