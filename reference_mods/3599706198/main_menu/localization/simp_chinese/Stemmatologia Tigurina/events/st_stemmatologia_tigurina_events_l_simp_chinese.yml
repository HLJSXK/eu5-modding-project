 stemmatologia_tigurina.4.a: "我们接受他们慷慨的付款。"
 stemmatologia_tigurina.4.b: "我们不会放弃这些土地！"
 stemmatologia_tigurina.5.title: "[GetCountry('HAB').GetNameWithNoTooltip]接受我们的提议"
 stemmatologia_tigurina.5.desc: "[GetCountry('HAB').GetName]已接受我方购买[ShowLocationName('kyburg')]的提议。尽管部分手续仍在进行中，但条约已获批准并立即生效。"
 stemmatologia_tigurina.5.historical_info: "1424年，[GetCountry('ZUR').GetName]城邦从[ShowDynastyName('habsburg_dynasty')]手中购得[ShowLocationName('kyburg')]伯国，这是其最重要的领土收购之一。以[ShowLocationName('zurich')]东部宏伟的#bold 基堡#!为中心的基堡，长期以来一直是哈布斯堡家族的主要行政中心，也是他们在[ShowProvinceDefinitionName('thurgau_province')]最后的关键领地之一。\n\n此次出售发生在哈布斯堡家族势力衰弱之际。在1415年领土被[GetUniqueInternationalOrganization('swiss_confederation').GetName]夺取，并面临日益加剧的债务和内部政治压力后，哈布斯堡家族越来越依赖出售或抵押土地来筹措资金以履行义务。[ShowLocationName('kyburg')]尽管具有重要的历史意义，但对他们而言已变得难以防御和维护。\n\n对[GetCountry('ZUR').GetName]而言，这次收购是一次战略上的胜利。该城邦旨在巩固其在该区域的权力，将其影响力扩展到#bold 利马特河谷#!之外，并确立自己作为[GetUniqueInternationalOrganization('swiss_confederation').GetName]主要成员的地位。购买[ShowLocationName('kyburg')]使苏黎世得以和平扩张，而无需冒公开战争的风险。这笔交易也说明了中世纪晚期瑞士一个更广泛的趋势：封建王朝的逐渐退却，以及城镇共和国和公社制邦国的兴起。\n\n[GetCountry('ZUR').GetName]对基堡的控制持续了数个世纪，将其纳入行政管理体系，并将城堡用作区域治理中心。因此，这次收购既标志着苏黎世领土扩张的一个转折点，也是[ShowDynastyName('habsburg_dynasty')]在后来成为现代瑞士的土地上影响力长期衰退的又一步。"
 stemmatologia_tigurina.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
 stemmatologia_tigurina.6.title: "燕麦粥航行"
 stemmatologia_tigurina.6.desc: "在[ShowLocationName('strasbourg')]的一次射击节上，我们的使者宣称，倘若[GetCountry('SFC').GetLongName]遭遇[siege|e]或危难，[GetCountry('ZUR').GetLongName]能沿[rivers|e]迅速驰援，甚至一锅刚煮好的燕麦粥到达时都还热乎乎的。阿尔萨斯人对此嗤之以鼻，打赌没有[ships|e]能在如此短的时间内穿越蜿蜒的#bold 利马特河#!、#bold 阿勒河#!与#bold 莱茵河#!。\n\n如今我们的市议会准备兑现这一诺言。一支精干的[ship|e]队已整装待发，补给装载完毕，船首牢牢固定着一#bold 锅热气腾腾的粥#!。倘若我们此番勇闯[ShowLocationName('strasbourg')]的壮举成功，不仅能让质疑者哑口无言，还将为我们赢得广泛的[prestige|e]与赞誉——世人将称颂我们城市的训练度、船技与胆识，甚至可能最终促成我们与[GetCountry('SFC').GetLongName]缔结[GetInternationalOrganizationType('defensive_league').GetName]。"
 stemmatologia_tigurina.6.historical_info: "1456年的#bold 燕麦粥航行#!，是中世纪晚期瑞士市民最自豪且生动的传说之一。此前数十年间，[ShowLocationName('zurich')]的射手们常前往[ShowLocationName('strasbourg')]参加射击节，友好的竞争与豪言壮语在那里司空见惯。在一次这样的聚会上，[GetCountry('ZUR').GetAdjective]代表宣称：倘若[GetCountry('SFC').GetLongName]遭遇[siege|e]，[GetCountry('ZUR').GetLongName]能沿[rivers|e]急速驰援，甚至一锅新煮好的燕麦粥送达时仍能保持温热。阿尔萨斯人对此深表怀疑，这场赌约于是成为半挑战半荣誉的考验。\n\n1456年，苏黎世人将他们的豪言（和船只）付诸实践。一支队伍在黎明前出发，沿利马特河而下，进入阿勒河，然后沿着莱茵河驶向[ShowLocationName('strasbourg')]。经过大约22小时不间断的划行，他们抵达了该城，粥果然还是温的——赌约赢了，这个故事也从此铭刻在这座城市的记忆之中。\n\n这一壮举广受欢迎，以至于1576年再次举行。其主要组织者之一是#bold 汉斯·齐格勒（1533–1609）#!，他是当时苏黎世公共生活中的重要人物[st_zur_hans_iii_ziegler.GetNickname]的孙子。他不仅领导了这次航行，还带上了他的两个弟弟——#bold 汉斯·海因里希·齐格勒（1537–1616）#!和#bold 阿德里安·齐格勒（1546–1632）#!，他们一同帮助引导船只抵达[ShowLocationName('strasbourg')]。1576年的航行激发了#bold 约翰·菲沙尔特#!著名的1174行诗篇#bold 《来自苏黎世的幸运之船》#!，并巩固了#bold 燕麦粥航行#!作为市民团结与决心的象征。\n\n几个世纪以来，这一航行从传说演变为传统。自1946年起大约每十年举行一次的现代重演活动，融合了历史盛况与当代河道航行的挑战。尽管如今水坝、堰和船闸迫使部分河段不得不通过陆路绕行，但在[ShowLocationName('strasbourg')]的象征性抵达仍然是备受喜爱的节庆时刻，庆祝着那份最初载着苏黎世粥锅顺莱茵河而下的速度、决心与友谊。\n\n#bold 事件插画#!：#bold 1576年燕麦粥航行#!参与者肖像，由#bold 马蒂亚斯·施通普夫#!绘制于1792年–1797年。从左至右：#bold 汉斯#!·[ShowDynastyName('st_zur_ziegler_dynasty')]#bold （1533–1609）#!、#bold 汉斯·布雷姆#!和#bold 康拉德·格罗斯曼#!。"
 stemmatologia_tigurina.6.a: "操起桨来，伙计们！目标——[ShowLocationName('strasbourg')]。"
 stemmatologia_tigurina.6.a.tt: "这可能导致与[GetCountry('SFC').GetLongName]结成[GetInternationalOrganizationType('defensive_league').GetName]。"
 stemmatologia_tigurina.6.b: "这不符合我们的利益。"
 stemmatologia_tigurina.7.title: "来自[GetCountry('ZUR').GetNameWithNoTooltip]的幸运之船"
 stemmatologia_tigurina.7.desc: "来自[GetCountry('ZUR').GetLongName]的代表团已抵达我市，他们虽疲惫不堪却难掩喜悦——这支队伍完成了众人眼中不可能的任务，其[ship|e]仅用不到一日便抵达[ShowLocationName('strasbourg')]，船上载着的燕麦粥仍带着余温。\n\n我们在射击节上的豪言壮语，如今已毋庸置疑地得到验证。为表彰这项惊人壮举，[GetCountry('ZUR').GetAdjective]使者提议与我们城市缔结[GetInternationalOrganizationType('defensive_league').GetName]。此盟约将使我们在共同防御中紧密相连，但也可能将我们卷入他们的纷争之中。"
 stemmatologia_tigurina.7.historical_info: "1456年的#bold 燕麦粥航行#!，是中世纪晚期瑞士市民最自豪且生动的传说之一。此前数十年间，[ShowLocationName('zurich')]的射手们常前往[ShowLocationName('strasbourg')]参加射击节，友好的竞争与豪言壮语在那里司空见惯。在一次这样的聚会上，[GetCountry('ZUR').GetAdjective]代表宣称：倘若[GetCountry('SFC').GetLongName]遭遇[siege|e]，[GetCountry('ZUR').GetLongName]能沿[rivers|e]急速驰援，甚至一锅新煮好的燕麦粥送达时仍能保持温热。阿尔萨斯人对此深表怀疑，这场赌约于是成为半挑战半荣誉的考验。\n\n1456年，苏黎世人将他们的豪言（和船只）付诸实践。一支队伍在黎明前出发，沿利马特河而下，进入阿勒河，然后沿着莱茵河驶向[ShowLocationName('strasbourg')]。经过大约22小时不间断的划行，他们抵达了该城，粥果然还是温的——赌约赢了，这个故事也从此铭刻在这座城市的记忆之中。\n\n这一壮举广受欢迎，以至于1576年再次举行。其主要组织者之一是#bold 汉斯·齐格勒（1533–1609）#!，他是当时苏黎世公共生活中的重要人物[st_zur_hans_iii_ziegler.GetNickname]的孙子。他不仅领导了这次航行，还带上了他的两个弟弟——#bold 汉斯·海因里希·齐格勒（1537–1616）#!和#bold 阿德里安·齐格勒（1546–1632）#!，他们一同帮助引导船只抵达[ShowLocationName('strasbourg')]。1576年的航行激发了#bold 约翰·菲沙尔特#!著名的1174行诗篇#bold 《来自苏黎世的幸运之船》#!，并巩固了#bold 燕麦粥航行#!作为市民团结与决心的象征。\n\n几个世纪以来，这一航行从传说演变为传统。自1946年起大约每十年举行一次的现代重演活动，融合了历史盛况与当代河道航行的挑战。尽管如今水坝、堰和船闸迫使部分河段不得不通过陆路绕行，但在[ShowLocationName('strasbourg')]的象征性抵达仍然是备受喜爱的节庆时刻，庆祝着那份最初载着苏黎世粥锅顺莱茵河而下的速度、决心与友谊。\n\n#bold 事件插画#!：#bold 1576年燕麦粥航行#!参与者肖像，由#bold 马蒂亚斯·施通普夫#!绘制于1792年–1797年。从左至右：#bold 汉斯#!·[ShowDynastyName('st_zur_ziegler_dynasty')]#bold （1533–1609）#!、#bold 汉斯·布雷姆#!和#bold 康拉德·格罗斯曼#!。"
 stemmatologia_tigurina.7.a: "我们欢迎他们的提议。"
 stemmatologia_tigurina.7.a.tt: "我们将与[GetCountry('ZUR').GetLongName]组建一个[GetInternationalOrganizationType('defensive_league').GetName]。"
 stemmatologia_tigurina.7.b: "我们必须保持自由，避免陷入斗争。"
 stemmatologia_tigurina.7.b.tt: "我们拒绝与[GetCountry('ZUR').GetLongName]建立[GetInternationalOrganizationType('defensive_league').GetName]。"
 stemmatologia_tigurina.8.title: "在[ShowLocationName('strasbourg')]品味热燕麦粥"
 stemmatologia_tigurina.8.desc: "消息在[ShowLocationName('strasbourg')]迅速传开——来自[ShowLocationName('zurich')]的[ship|e]竟在短短一日内抵达，船员们虽精疲力竭却难掩喜悦。阿尔萨斯人被这般神速惊得目瞪口呆，纷纷聚拢品尝那传说中的燕麦粥，岂料第一口便被滚烫的粥烫伤了嘴唇。\n\n斯特拉斯堡市议会被这种决心和对水道的控制所震撼，当即提议与[GetCountry('ZUR').GetLongName]缔结[GetInternationalOrganizationType('defensive_league').GetName]，因为他们相信一天之内就能渡过半条莱茵河的[allies|e]在[war|e]时期不会让他们失望。"
