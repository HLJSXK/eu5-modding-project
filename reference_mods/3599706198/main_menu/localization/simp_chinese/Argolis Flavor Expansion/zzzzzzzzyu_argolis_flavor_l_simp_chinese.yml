 ARGOLIS000001: "阿尔戈利斯王国"
 ARGOLIS000001_ADJ: "阿尔戈利斯"
 ARGOLIS000001_desc: "威尼斯在第四次十字军东征后于伯罗奔尼撒建立的附庸国。阿尔戈利斯以其丰富的历史和战略位置而闻名，是该地区的文化与商业中心，此乃架空国家"
