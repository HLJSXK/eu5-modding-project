l_simp_chinese:
 flavor_heh.01.title: "[target_location.GetNameWithNoTooltip]封邑的再分封"
 flavor_heh.01.desc: "自腓特烈大帝的时代以来，[target_location.GetName]一直由冯·海伦斯坦家族统治。然而在1273年，这一家族血脉绝嗣，遵从天意而终结。自此以后，海登海姆成为由上巴伐利亚统治者所授予的封地，而[target_character.GetName]则是最近的一位受封者。\n\n现在，是时候再次分配[target_location.GetName]封邑了。[target_overlord_country.GetName]已决定，让他们奴颜婢膝的追随者[gundelfingen_ruler.GetName]在未来数年中，成为[target_country.GetName]的领主。"
 flavor_heh.01.a: "就这样决定了。"
 flavor_heh.01.b: "此封邑仍将属于[target_character.GetName]。"
 flavor_heh.02.title: "[helfenstein_erblehen.GetNameWithNoTooltip]宣称对位于[target_location.GetNameWithNoTooltip]的世袭封地拥有合法继承权。"
 flavor_heh.02.desc: "[helfenstein_erblehen.GetName]巧妙地将其在[target_overlord_country.GetName]宫廷中积累的财富与影响力转化为筹码，说服了整个[target_overlord_country.GetName]，认为应当将[target_location.GetName]作为世袭封地授予他们。凭借这项要求背后所汇聚的强大权势，[helfenstein_erblehen.GetName]几乎已然注定，将在未来数个世纪中左右[target_location.GetName]的宗主—封臣格局与王朝统治。"
 flavor_heh.02.a: "就这样决定了。"
 flavor_heh.02.b: "此封邑仍将属于[target_character.GetName]。"