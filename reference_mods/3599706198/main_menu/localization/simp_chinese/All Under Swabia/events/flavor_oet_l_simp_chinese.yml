l_simp_chinese:
 flavor_oet.01.title: "有影响力的修道院希望购买[target_subject_country.GetNameWithNoTooltip]的监护官权利。"
 flavor_oet.01.desc: "自14世纪早期起，厄廷根的统治者便一直担任[target_subject_country.GetName]的监护官一职。我们对埃尔旺根修道院的世俗管辖，自然是仁慈而公正的。由于近期的精明政策，该修道院已积累了可观的财富与影响力，如今他们正试图借此扩大权势。\n\n[target_subject_country.GetName]已与我们接洽，意图从我们手中购买埃尔旺根的监护官职位。他们提出支付一大笔钱，以换取我们放弃对该地的领主地位。"
 flavor_oet.01.a: "这笔交易很划算。"
 flavor_oet.01.b: "不，我们拒绝！"