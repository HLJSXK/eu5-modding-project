l_simp_chinese:
 hundred_years_war.220.title: "[ShowLocationNameWithNoTooltip('ghent')]的酿酒师"
 hundred_years_war.220.desc: "在这场[GetCountry('FRA').GetAdjective]贵族与[GetCountry('FLA').GetName]市民阶层的斗争中，一位人物崭露头角。在[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]中，一位来自[ShowLocationNameWithNoTooltip('ghent')]的酿酒师[target_character2.GetName]赢得了工匠与商人们的共同敬重。随着[GetCountry('FRA').GetName]与[GetCountry('ENG').GetName]战事一触即发，这位酿酒师呼吁重新审视我国[ROOT.GetCountry.GetFlavorRank]的立场，并调整[target_character.GetName]对[GetCountry('ENG').GetAdjectiveWithNoTooltip][GetCountry('ENG').GetFlavorRank]的政策。他的呼声日益高涨，力主必须捍卫我国经济的命脉——[ShowGoodsName('wool')]贸易，即便这意味着违抗我们[GetCountry('FRA').GetAdjective]宗主国的意志。"
 hundred_years_war.220.historical_info: "雅各布·范·阿特费尔德，一位来自根特的富商兼酿酒商，在百年战争初期崭露头角成为政治领袖。尽管佛兰德斯是法国王室的附庸，但其强大的纺织经济极度依赖英格兰的羊毛供应。随着法英关系日趋紧张，范·阿特费尔德力主亲英政策，在抵制法国直接控制的同时确保了贸易往来与内部自治。他的领导曾短暂稳定了佛兰德斯各城邦，但日益增长的权力也使他成为众矢之的。1345年，他被根特暴民刺杀，罪名是试图过于直接地推行英格兰统治。"
 hundred_years_war.220.a: "[target_character2.GetShortNameWithNoTooltip]说得对，我们必须优先保护我们的产业。"
 hundred_years_war.220.b: "这是一场迫在眉睫的灾难……"
 flabrit.1.title: "战争织机"
 flabrit.1.desc: "当[GetCountry('FRA').GetName]与[GetCountry('ENG').GetName]即将使[ShowSubContinentName('western_europe')]陷入战火时，[ROOT.GetCountry.GetName]的诸城邦正面临政治抉择的关头。我们虽名义上效忠于[GetCountry('FRA').GetAdjective]，但[ShowLocationName('ghent')]、[ShowLocationName('bruges')]与[ShowLocationName('ypres')]的繁荣实则系于更遥远的势力——若无[GetCountry('ENG').GetAdjective]的[ShowGoodsName('wool')]，我们的织机将归于沉寂，市场亦将崩溃。然而[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]仍坚定效忠于[GetCountry('FRA').GetName]君主。[GetCountry('FRA').GetAdjective]贵族与佛兰德城邦市民间的利益博弈，将决定我们的命运。"
 flabrit.1.historical_info: "在百年战争的爱德华阶段（1337-1360年），佛兰德斯因其战略地位及纺织业对英格兰羊毛的依赖而扮演了关键角色。根特、布鲁日和伊普尔的繁荣度建立在这项贸易之上，使它们的经济命运与英格兰紧密相连，哪怕该地区的贵族阶层仍效忠于法国王室。政治忠诚与经济需求之间的这种张力，在佛兰德斯内部形成了脆弱的平衡，市民阶层与贵族常常就伯爵领地的未来立场相左。"
 flabrit.1.a: "我们依然效忠于[GetCountry('FRA').GetGovernment.GetRuler.GetShortName]。"
 flabrit.1.a.tt: "英格兰可能会以战争努力为由，针对我们之间的共同贸易。"
 flabrit.1.start: "开启佛兰德冒险事件链"
 flabrit.2.title: "羊毛贸易"
 flabrit.2.desc: "[GetCountry('FLA').GetAdjective]城市凭借[ShowGoodsName('wool')]贸易而繁荣兴旺。这种关系长久以来将其市场与[GetCountry('ENG').GetName]紧密相连，然而在[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]的统治下，他们却背弃了我们，坚定地效忠于[GetCountry('FRA').GetGovernment.GetRuler.GetShortName]。\n尽管如此，许多城市仍对我们的目标抱有同情，只要施加适当的压力，[GetCountry('FLA').GetAdjectiveWithNoTooltip]的立场便可能动摇。确保我们主张的道路始于[GetCountry('FLA').GetNameWithNoTooltip]……"
 flabrit.2.historical_info: "在百年战争的爱德华阶段（1337-1360年），佛兰德斯因其战略地位及纺织业对英格兰羊毛的依赖而扮演了关键角色。根特、布鲁日和伊普尔的繁荣度建立在这项贸易之上，使它们的经济命运与英格兰紧密相连，哪怕该地区的贵族阶层仍效忠于法国王室。政治忠诚与经济需求之间的这种张力，在佛兰德斯内部形成了脆弱的平衡，市民阶层与贵族常常就伯爵领地的未来立场相左。"
 flabrit.2.a: "封锁[ShowGoodsName('wool')]的贸易。我们将改道经由[ShowLocationName('antwerp')]运输。"
 flabrit.2.b: "忘记商人的勾当，让我们在战场上见分晓。"
 end_event_chain: "这将结束佛兰德冒险事件链。"
 flabrit.4.title: "[GetCountry('FLA').GetName]支持[GetCountry('ENG').GetAdjective]"
 flabrit.4.a: "铲除叛徒，我们绝不能重蹈克特雷特的覆辙。"
 flabrit.4.a.tt: "佛兰德现已加入英格兰，参与百年战争。"
 flabrit.5.title: "[GetCountry('ENG').GetName]禁止[ShowGoodsName('wool')]贸易"
 flabrit.5.desc: "随着敌对行动的开始以及我们对[GetCountry('FRA').GetGovernment.GetRuler.GetName]的效忠，[GetCountry('ENG').GetName]已单方面终止了与我国港口的所有羊毛贸易。其影响几乎是立竿见影的，[GetCountry('FLA').GetName]各地的商人陷入恐慌。三大城市的领导人已紧急会面，商讨危机并寻求解决方案。"
 flabrit.5.historical_info: "1337年，英格兰国王爱德华三世将羊毛贸易武器化，对佛兰德地区实施出口禁运。依赖英格兰羊毛的佛兰德纺织业立即陷入混乱。根特、布鲁日和伊普尔等城镇相继爆发骚乱。禁运动摇了佛兰德对法兰西的忠诚——许多商人迫于压力转而支持英格兰以恢复贸易。对爱德华而言，禁运不仅巩固了其政治筹码、增加了财政收入，为其争夺法兰西王位提供资金，更成为点燃百年战争的重要导火索。"
 flabrit.5.a: "令人担忧。"
 flabrit.5.a.tt: "这可能会导致对[GetCountry('FRA').GetName]产生抵触情绪。"
 flabrit.5.a.tta: "我们的布匹产业已被摧毁，许多市民的生计也因此被破坏。"
 flabrit.6.title: "三城共和国力主干预百年战争"
 flabrit.6.desc: "[ShowLocationName('ghent')]、[ShowLocationName('bruges')]和[ShowLocationName('ypres')]的领袖们，已召开会议商讨战争走向。随着[GetCountry('ENG').GetAdjective]新一轮禁运可能重创纺织产业、恐慌情绪在市民阶层蔓延的消息传来，他们主张中立已不可行。许多人要求[GetCountry('FLA').GetName]直接介入百年战争，将我们的命运与那些能够恢复贸易并保障我们城市繁荣的人联系在一起。"
 flabrit.6.historical_info:0 "1340年1月，佛兰德斯的根特、布鲁日和伊普尔等城市正式与英格兰的爱德华三世结盟。羊毛禁运导致的经济崩溃，以及雅各布·范·阿特维尔德掌权，迫使佛兰德斯放弃了效忠路易一世的立场。这一同盟为爱德华提供了关键的大陆支持，并使其获得佛兰德斯港口的使用权，为同年稍后在斯勒伊斯海战中取得海军胜利铺平了道路，也加深了佛兰德斯在百年战争中的卷入程度。"
 flabrit.6.a: "不再中立。我们为[GetCountry('FRA').GetName]的[GetCountry('FRA').GetGovernment.GetRulerTitle][target_eng_ruler.GetName]而战！"
 flabrit.6.b: "我们不能冒公开冲突的风险，当前的道路是唯一可行的道路。"
 flabrit.7.title: "佛兰德酿酒师起义"
 flabrit.7.desc: "经济战已见成效，我们长期的封锁促使[GetCountry('FLA').GetName]的封臣摆脱了[GetCountry('FRA').GetAdjective]统治者的枷锁，在[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]的领导下，他们现已宣布支持我们的事业。"
 flabrit.7.historical_info: "1337年的英格兰羊毛禁运重创了佛兰德斯的布匹产业，引发了商人与行会的普遍不满。在“根特酿酒师”雅各布·范·阿特维尔德领导下，根特、布鲁日和伊普尔等城镇联合反抗路易一世。1339至1340年间，这场商人起义迫使佛兰德放弃对法兰西的效忠，转而与英格兰结盟，此举不仅为爱德华三世赢得了关键的大陆支持，更使佛兰德斯深陷百年战争的漩涡。"
 flabrit.7.a: "欢迎加入我们。"
 flabrit.8.title: "[GetCountry('ENG').GetAdjective]的[GetCountry('FLA').GetName]"
 flabrit.8.desc: "随着[GetCountry('FLA').GetAdjective]商人抛弃了效忠[GetCountry('FRA').GetAdjective]，[GetCountry('ENG').GetName]如今有机会巩固其对[GetCountry('FLA').GetName]的影响力。国王的继承人[eng_heir.GetName]提议任命他统治佛兰德斯，确保该郡与王室利益保持紧密一致。布匹贸易再次流通，但这一举措将使佛兰德与我们的王权紧密相连。"
 flabrit.8.a: "[eng_heir.GetShortNameWithNoTooltip]将代替我执行[GetCountry('FLA').GetName]命令。"
 flabrit.9.title: "[GetCountry('ENG').GetShortName]寻求任命[GetCountry('ENG').GetGovernment.GetHeir.GetShortName]"
 flabrit.9.desc: "[GetCountry('ENG').GetGovernment.GetRuler.GetShortName]代表[GetCountry('ENG').GetName]请求任命其继承人来统治[GetCountry('FLA').GetName]。该提议承诺在英格兰的保护下，我们的布匹贸易将重获繁荣，但也威胁到我们的独立地位。三方城市成员激烈辩论，有人认为与英格兰结盟能带来安全，另一些人则警告，接受外国继承人将使佛兰德与英格兰王室绑定过紧。"
 flabrit.9.a: "接受[GetCountry('ENG').GetGovernment.GetHeir.GetShortName]作为[GetCountry('FLA').GetName]的统治者。"
 flabrit.9.b: "拒绝英格兰干扰，捍卫佛兰德的独立。"
 flabrit.9.tt: "这将会严重激怒除市民阶层外的所有民众，他们视此为换汤不换药的统治更迭。"
 flabrit.9.ta: "将生成一个名为“大佛兰德叛乱”的反叛组织。"
 flabrit.10.title: "[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]面对酿酒师"
 flabrit.10.desc: "在[GetCountry('ENG').GetAdjective]禁运引发的内乱之后，[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]在国内面临着充满敌意的环境。他的许多盟友正敦促他趁早撤退到他在[GetCountry('FRA').GetName]的领地。三级会议的权力持续增长，[GetCountry('FLA').GetGovernment.GetRuler.GetShortNameWithNoTooltip]在自己领地的事务中已被边缘化。更糟的是，他们开始聚集在一位根特的酿酒师——[target_character2.GetName]的麾下……"
 flabrit.10.historical_info: "佛兰德伯爵路易一世被迫离开他的领地，当时根特、布鲁日和伊普尔这三大城市在：根特酿酒师雅各布·范·阿特维尔德的主导下掌控了局势。退至法国后，路易再未重返佛兰德。1346年克雷西会战中，路易与法国国王腓力六世并肩作战时阵亡——此役法军被英格兰长弓兵击溃。他的去世终结了其动荡的统治，也凸显了佛兰德政局在更广阔的百年战争中所起的关键作用。"
 flabrit.10.a: "[GetCountry('FLA').GetGovernment.GetRuler.GetShortNameWithNoTooltip]已经不再掌权。将权力移交给三个城市。"
 flabrit.10.b: "与生俱来的权利，岂能轻易授予。"
 flabrit.11.title: "[GetCountry('FLA').GetName]的继承"
 flabrit.11.desc.dampierre: "随着反抗[GetCountry('FRA').GetAdjective]的起义告终，[GetCountry('FLA').GetName]的统治问题依然悬而未决。“根特的酿酒师”[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]已证明自己是“三级会议”的能干领袖，但许多贵族要求恢复路易二世伯爵的统治。另有人私下提议邀请邻国王公，如布拉班特公爵，以确保稳定。我们伯国的命运如今系于这一抉择之上。"
 flabrit.11.desc: "随着反抗[GetCountry('FRA').GetAdjective]的叛乱结束，[GetCountry('FLA').GetName]的统治问题依然悬而未决。“根特的酿酒师”[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]已证明是\"三级会议\"的能干领袖，但[ShowDynastyName('dampierre_dynasty')]家族已无后嗣。有人私下提议邀请邻国王公，如布拉班特公爵，以确保稳定。我们伯国的命运如今系于这一抉择。"
 flabrit.11.historical_info: "佛兰德继承危机在百年战争和羊毛禁运的背景下展开。根特、布鲁日和伊普尔切断了法国的影响，推举雅各布·范·阿特维尔德为三城市联盟的领袖。他的统治依赖于市民支持和英格兰贸易，但随着贵族与敌对派系对其权势日益不满，紧张局势不断加剧。至1345年，阿特维尔德意图将佛兰德拱手让与外国家族控制的传言四起，进一步激化了民愤。"
 flabrit.11.a: "还是路易的继任者，[GetCharacter('fla_louis_ii_dampierre').GetShortName]吧"
 flabrit.11.a.tt: "路易的继承人将使我们能够与[GetCountry('FRA').GetAdjective]建立更紧密的联系。"
 flabrit.11.b: "上一条血脉已断，任命一位与[GetCountry('FLA').GetName]有联系的贵族。"
 flabrit.11.b.tt: "这将使我们能够任命邻国的现任君主或当地贵族"
 flabrit.11.c: "我们无法信任贵族，酿酒师将引领我们前行。"
 flabrit.11.c.tta: "通过这个选择，我们可以寻求与英格兰建立更紧密的联系，或者追求三成员共和国……"
 flabrit.11.c.ttb: "贵族们会对我们的决定感到不满，很可能引发叛乱。"
 flabrit.12.title: "任命贵族"
 flabrit.12.desc: "许多来自[ShowSubContinentName('western_europe')]的贵族候选人已向三级会议提交了他们的候选资格，并各自组建了支持者团体。外国家族正等待结果，以便有机会控制富有的[GetCountry('FLA').GetAdjective]。此外，一些当地贵族也获得了一定的支持，尽管他们的支持基础相对薄弱。"
 flabrit.12.b: "[brabant_contender.GetShortName]将统一大[GetCountry('FLA').GetNameWithNoTooltip]的土地。"
 flabrit.12.d: "[GetCountry('HAB').GetGovernment.GetRuler.GetDynasty.GetName]家族将是明智的盟友。"
 flabrit.12.e: "[ShowLocationNameWithNoTooltip('ghent')]是一个强有力的竞争对手。"
 flabrit.12.e.tt: "百年战争的老兵已重返家园，保卫[GetCountry('FLA').GetNameWithNoTooltip]。"
 flabrit.12.f: "也许这个外部候选人，就是这位母狮……"
 flabrit.12.f.tt: "一个出身低微的贵族，但技艺高超，不过选择一个女人会不受欢迎……"
 flabrit.13.title: "酿酒师的决定"
 flabrit.13.desc: "[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]现已暂时压制了对手，巩固了他作为三城市领袖的地位。随着各城市统一于其麾下，[GetCountry('FLA').GetName]面临着一个决定性的选择。我们是否应该通过任命[eng_heir.GetName]为[GetCountry('FLA').GetGovernment.GetRulerTitle]来与[GetCountry('ENG').GetName]结盟，通过家族联合确保保护与繁荣？抑或是摒弃外国王冠，宣告一个仅由市民和行会治理的[ShowLocationNameWithNoTooltip('ghent')]、[ShowLocationNameWithNoTooltip('bruges')]与[ShowLocationNameWithNoTooltip('ypres')]共和国？"
 flabrit.13.historical_info: "雅各布·范·阿特维尔德在14世纪30年代的羊毛禁运期间崛起于根特，他团结佛兰德各城市对抗法国影响，并将其贸易转向与英格兰结盟。他领导三大城市联盟，赋予市民阶层前所未有的权力，但这同时也引发了贵族和敌对派系的不满。\n\n到1345年，传言称阿特维尔德企图将佛兰德交由外国控制。根特的暴民冲进他的住所并将其杀害，终结了市民政府的实验。尽管历史学家推测，他可能考虑过将伯爵领地交给爱德华三世的继承人，或是让市民政权无限期延续。他的死为路易二世伯爵宣示主权扫清了道路，但这一事件揭示了佛兰德曾多么接近走上一条截然不同的道路。"
 flabrit.13.a: "接受[GetCountry('ENG').GetGovernment.GetHeir.GetShortName]作为[GetCountry('FLA').GetName]的统治者。"
 flabrit.13.a.tta: "此举将严重激怒除市民阶层外的所有民众，市民阶层则认为这不过是换了个统治者而已。"
 flabrit.13.b: "组建一个由三城市成员领导的共和国"
 flabrit.13.b.tt: "贵族们不会轻易接受让市民阶层篡夺他们的权力。"
 flabrit.13.b.tu: "最终很可能引发贵族叛乱。"
 flabrit.100.title: "[ShowLocationNameWithNoTooltip('bruges')]大教堂"
 flabrit.100.desc: "布鲁日是佛兰德的明珠，欧洲最繁荣的中心之一，却仍无一座大教堂来彰显其地位。市民们渴望纠正这一状况，提升城市的威望，已制定计划将教区教堂扩建为一座宏伟的大教堂。他们现在向[GetCountry('FLA').GetGovernment.GetRuler.GetShortName]请求财政援助，希望政府能共享这一不朽事业的荣光。"
 flabrit.100.historical_info: "布鲁日的圣多纳廷教堂最初是一座教区教堂，1559年教宗保禄四世重组低地国家主教区后，随着布鲁日教区的建立而扩建为主教座堂。几个世纪以来，它矗立于集市广场旁，是这座城市的精神中心。1799年法国革命占领期间，圣多纳廷教堂被拆毁，该教区本身也根据1801年《教务专约》被撤销。教区于1834年恢复后，圣救主教堂被提升为主教座堂，而后延续至今。"
 flabrit.100.a: "他们将得到我们的帮助！"
 flabrit.100.b: "让市民们自己出钱吧。"
 flabrit.101.title: "[ShowLocationNameWithNoTooltip('bruges')]的淤积问题"
 flabrit.101.desc: "数个世纪以来，[ShowLocationName('bruges')]作为欧洲最重要的港口之一繁荣发展，其商人通过兹温河口进行跨海贸易。然而如今，沙砾与淤泥如今阻塞了水道，切断了[ShowLocationNameWithNoTooltip('bruges')]与海洋的联系，扼杀了其商业命脉。市民们警告说，除非投入巨资进行治理工程，否则这座城市的黄金时代将逐渐消逝，而[ShowLocationName('antwerp')]将取而代之崛起。"
 flabrit.101.historical_info: "布鲁日的繁荣得益于兹温河口，这条水道于1134年因风暴冲刷形成，使城市直通北海。数个世纪以来，欧洲各地的商人涌入布鲁日，使其成为欧洲大陆最重要的贸易中心之一。然而，从15世纪末开始，兹温河口逐渐淤塞，航道不断萎缩。到16世纪，布鲁日已基本与海洋隔绝，商业随之衰落，安特卫普由此崛起成为低地地区最重要的港口。如今，布鲁日仍与海洋隔绝，需依赖泽布吕赫港获得海上通道。"
 flabrit.101.a: "我们没有多余的资源可以浪费。"
 flabrit.101.b: "不惜一切代价，保住港口！"
 flabrit.101.c: "[ShowLocationNameWithNoTooltip('antwerp')]是未来的港口。将利润转移以援助[ShowLocationNameWithNoTooltip('bruges')]。"
 flabrit.102.title: "圣马丁大教堂即将竣工"
 flabrit.102.desc: "高耸于[ShowLocationName('ypres')]建筑群之上的圣马丁大教堂即将竣工。新教区已开始组织筹备，市民们正热切期待着这座哥特式大教堂的祝圣仪式。"
 flabrit.102.historical_info: "圣玛尔定大教堂，现称圣玛尔定教堂，是一座传统欧洲哥特式大教堂，自特伦托会议改革至1801年《教务专约》签订期间，一直是伊普尔教区的主教座堂。教堂始建于1230年，竣工于1370年，建成时高达102米（335英尺），是当时比利时最高的建筑。\n\n管辖过此教堂最有名的主教是科尼利厄斯·詹森，他于1635年至1638年在伊普尔任职，并安葬于教堂墓地。他的教义催生了詹森主义神学运动，对天主教会产生了深远的影响，尤其是在法国和西班牙尼德兰地区。"
 flabrit.102.a: "国家持续繁荣。"
 flabrit.103.title: "圣约翰医院的扩建"
 flabrit.103.desc: "位于[ShowLocationName('bruges')]的圣约翰医院，长久以来一直是病人与穷人的庇护所，如今它正处于该城慈善生活的核心。市民们为其市政机构感到自豪，提议扩建其厅堂与病房，以满足布鲁日日益增长的需求。他们现正请求王室支持，希望[GetCountry('FLA').GetName]能分享壮大这一古老机构的荣誉。"
 flabrit.103.historical_info: "圣约翰医院建于12世纪中期，是欧洲现存最古老的医院建筑群之一。由修士和修女运营，它曾是该城抵御黑死病灾祸的堡垒。在此后的数个世纪里，它照料朝圣者、旅人与贫民，并随着修道院建筑的扩展而壮大，更因汉斯·梅姆林的艺术作品而闻名。医院于19世纪现代化，于1977年关闭，如今作为布鲁日历史的见证留存于世。"
 flabrit.103.a: "城市的健康是首要任务。"
 flabrit.103.b: "这座城市可以自己出资。"
 three_members_reform:0 "三城共和国"
 three_members_reform_desc:0 "由[ShowLocationName('ghent')]，[ShowLocationName('bruges')]，和[ShowLocationName('ypres')]为首的市民共和国。在此体制中，市民和行会领袖将代替封建领主领导各阶层，通过商业议会以及城镇议会颁布国家政策。这个共和国依靠纺织业、商业、市场和工业繁荣发展。"
 flemish_urban_militia:0 "佛兰德城镇民兵"
 guild_brotherhood:0 "佛兰德行会"
 guild_brotherhood_desc:0 "行会兄弟会将佛兰德的市民联结于共同事业之中，使织工、酿酒师与商人在共享特权与城市自豪感下团结一致。通过其议事会与兄弟组织，行会不断强化着城市的凝聚力。"
 flemish_waterways:0 "佛兰德水道"
 flemish_waterways_desc:0 "佛兰德水道是由一个个运河组成的水道系统，它构成了一张充满活力的商业网络，将弗拉芒城镇与其他的低地区域联系起来。布匹和粮食能通过这些水道运往市场，船只也能够抵达内陆城镇。同时，各个行会也因稳定的贸易流水得到了繁荣发展。"
 flemish_belfries:0 "佛兰德钟楼"
 flemish_belfries_desc:0 "弗拉芒钟楼制度是一套基于弗拉芒城镇自12世纪起建造的钟楼而设立的市政保卫及警报系统。钟楼一般来说是高耸的石塔，内设钟、市政宪章，有时还被当作军火库。它们既是城市自治的象征，也是防御和通讯的实用工具。"
 anti_english_revolt:0 "佛兰德大叛乱"
 bra_burghers_revolt:0 "三城共和国的反叛"
 nick_the_brewer:0 "酿酒师"
 nick_cap_ghent:0 "[ShowLocationNameWithNoTooltip('ghent')]之盾"
 nick_lioness:0 "雌狮"
 brewer_artevelde:0 "范·阿特维尔德"
 noble_revolt:0 "贵族叛乱"
 STATIC_MODIFIER_NAME_english_wool_embargo:0 "英格兰羊毛禁运"
 STATIC_MODIFIER_NAME_english_wool_monopoly:0 "羊毛垄断"
 STATIC_MODIFIER_NAME_north_sea_wool_trade:0 "英格兰-佛兰德羊毛联盟"
 flabrit.4.desc: "[GetCountry('FLA').GetAdjective]在[GetCountry('FLA').GetGovernment.GetRuler.GetName]的统治下背弃了他们的效忠誓言，并引来了金雀花家族。[GetCountry('ENG').GetGovernment.GetRuler.GetName]率领大军登陆，并在[ShowLocationName('ghent')]被宣布为[GetCountry('FRA').GetName]的[GetCountry('FRA').GetFlavorRank]。佛兰德的另外两个城市[ShowLocationName('bruges')]和[ShowLocationName('ypres')]迅速效仿，如今正集结军队来对抗我们。"
 flabrit.4.historical_info: "在百年战争的爱德华阶段（1337-1360年），佛兰德斯因其战略地位及纺织业对英格兰羊毛的依赖而扮演了关键角色。根特、布鲁日和伊普尔的繁荣度建立在这项贸易之上，使它们的经济命运与英格兰紧密相连，哪怕该地区的贵族阶层仍效忠于法国王室。政治忠诚与经济需求之间的这种张力，在佛兰德斯内部形成了脆弱的平衡，市民阶层与贵族常常就伯爵领地的未来立场相左。"
 flabrit.namur.tt: "[GetCountry('NAM').GetName]脱离了我们的控制，并效忠于[GetCountry('FRA').GetName]"
 flabrit.11.d: "让皮耶尔家族回归，[GetCharacter('fla_louis_i_dampierre').GetShortName]将统治[GetCountry('FLA').GetNameWithNoTooltip]。"
 flabrit.11.b.ttb: "若前任伯爵或其继承人尚在人世，新统治者的正统性将受到削弱。"
 flabrit.13.a.ttb: "享受[GetCountry('ENG').GetAdjective]羊毛的全部益处"
 flabrit.104.title: "圣伊丽莎白日洪水"
 flabrit.104.desc: "深夜，一场猛烈的风暴从北海席卷而来，带来了倾盆大雨和呼啸狂风。临近[ShowLocationName('hulst')]村时，凌雷雨交加，多处堤坝决口。洪水汹涌淹过低洼的圩田，数个村庄被完全吞没而消失。该地区遭受的破坏极为严重，救援工作已紧急展开。"
 flabrit.104.historical_info: "在近现代时期，[ShowAreaName('flanders_area')]，[ShowAreaName('brabant_area')]，和[ShowAreaName('holland_area')]深受一系列洪灾的摧残，大片荷兰海岸线也因此被摧毁。大量小城镇被洪水吞没，数以万计的人丧生。在[GetCountry('FLA').GetName]和荷兰，分别于1404和1421年发生的两次被称为“圣伊丽莎白洪水”尤其具有破坏性：它们席卷海岸，彻底抹去了西斯海尔德河口的诸多岛屿。\n\n整个尼德兰地区因此遭遇了永久性的地理变化。须德海的面积显著扩大，在位于[GetCountry('FLA').GetName]的特尔纳曾以西形成了一个巨大的海湾，名为布拉克曼。为了防止海湾的进一步扩张，荷兰人在数百年的努力之后最终将其于1952年彻底封闭——荷兰人面对大海的又一次胜利。"
 flabrit.104.a: "围湖造田。我们必须确保此事不再发生。"
 flabrit.104.a.tt: "这将减轻未来洪灾的影响。"
 flabrit.104.b: "不幸至极，我们将力所能及的进行救助。"
 flabrit.2.b.tt: "无论伯爵的忠诚如何，佛兰德斯都难以承受经济压力。"
 flabrit.8.b: "允许[GetCountry('FLA').GetName]实行自治。"
 flabrit.12.a: "追随[GetCountry('BUR').GetGovernment.GetRulerTitle]的[GetCountry('BUR').GetGovernment.GetRuler.GetDynasty.GetName]家族。"
 flabrit.12.c: "与[GetCountry('HOL').GetName]建立联系是明智之举。"
 fla_magna_carta:0 "城镇自治特许状"
 fla_magna_carta_desc:0 "1128年，[GetCountry('FLA').GetName]的城镇获得了广泛的自由特许状，随后在1312年，[GetCountry('BRB').GetName]也获得了同样的特许状。这些特权赋予了城镇司法管辖权、免税权、财政自主权、贸易保护以及公民代表权等。随着时间的推移，它们巩固了城镇自治，削弱了[ShowEstateTypeName('nobles_estate')]的地位，并为后来几个世纪里定义佛兰德政治的反叛与谈判周期奠定了基础。"
 fla_magna_carta.tt:0 "城市的王室领地影响力较低"