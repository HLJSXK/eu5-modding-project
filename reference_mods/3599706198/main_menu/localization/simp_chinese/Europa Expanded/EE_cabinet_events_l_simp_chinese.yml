l_simp_chinese:
 EE_cabinet_events.1.title: "经验孕育成功"
 EE_cabinet_events.1.desc: "连续几个月完善如何执行[target_character.GetHerHis]当前的任务——[target_action.GetName]，如今有了一些好消息。[target_character.GetName]不仅适应了[target_character.GetHerHis]新任务，而且还在这方面表现出色。[target_character.GetHerHis|U]的能力高超，很少有人敢质疑[target_character.GetHerHis]在这方面的权威。"
 EE_cabinet_events.1.a: "真是一个人才啊！"
 STATIC_MODIFIER_NAME_cabinet_fascination_bonus: "偏好"
 STATIC_MODIFIER_NAME_EE_cabinet_utter_disappointment: "大失败"
 STATIC_MODIFIER_NAME_EE_reduced_workload: "工作量减少"
 STATIC_MODIFIER_NAME_EE_cabinet_taking_a_break: "倦怠"
 STATIC_MODIFIER_NAME_EE_cabinet_decisive_HoC: "强有力的内阁首脑"
 STATIC_MODIFIER_NAME_EE_cabinet_weakness_of_royal_power: "被忽视的地方政权"
 EE_cabinet_shorthand_HoC_name: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')]"
 EE_cabinet_events.2.title: "对激进的改革的需求"
 EE_cabinet_events.2.desc: "“听我说！听我说！城里颁布了新法令！”\n\n[target_character.GetName]的任期内实施了许多政策，但并非所有政策都广受欢迎。看来[target_character.GetNameWithNoTooltip]在这方面颇有天赋，[target_character.GetHerHis]的野心远超其所被允许的范围。或许在[target_character.GetHerHis]的支持下，我们可以在[ROOT.GetCountry.GetName]实现一些重大变革？"
 EE_cabinet_events.2.a: "赋予[target_character.GetHerHim]所需的权力。"
 EE_cabinet_events.2.b: "任何人都不应掌握如此大的权力！"
 radical_reforms_action_tt: "[target_character.GetName]将解锁[target_action.GetName][character_interaction|e]，允许我们以消耗#g 10#!@stability![stability|e]为代价更改一项[policy|e]。\n\n但可供选择的[policies|e]必须符合[target_character.GetName]所属的[target_character.GetEstateType.GetName][estate|e]偏好。\n\n该[character_interaction|e]仅可使用三次。"
 radical_reforms_action: "实行激进改革"
 radical_reforms_action_desc_specific: "[recipient.GetName]将支持改革[target_law.GetName]以推动[target_policy.GetName]的实施。"
 radical_reforms_select_policies_title: "选择一个[policy|e]，[recipient.GetName]将会支持。"
 radical_reforms_action_desc: "我们将授予[recipient.GetName]协助修改我们的法律。"
 radical_reforms_action_past: "[recipient.GetName]获准协助改革国家法律。"
 radical_reforms_action_act: "授予[recipient.GetName]改革[actor.GetLongName]法律的权限。"
 radical_reforms_action_act_past: "授予[recipient.GetName]改革[actor.GetLongName]法律。"
 recipient_estate_does_not_support: "[recipient.GetName]的[recipient.GetEstateType.GetName][estate|e]不支持[THIS.GetPolicy.GetName]。"
 EE_cabinet_events.3.title: "令人失望……"
 EE_cabinet_events.3.desc: "我们的一位部长[target_character.GetName]在努力掌握[target_action.GetName]，不过未能取得太大进展。我们无法判断[target_character.GetSheHe]是正处于艰难时期，还是过度劳累，亦或缺乏天赋。但有一点可以肯定——[target_character.GetShortName]确实需要更多时间。"
 EE_cabinet_events.3.a: "真丢人……"
 EE_cabinet_events.4.title: "新偏好"
 EE_cabinet_events.4.desc: "我们的部长[target_character.GetName]找到了新的兴趣。几周来，[target_character.GetSheHe]一直在研究如何有效地[target_action.GetName]，结果也没有让人失望。[target_character.GetShortName]保证，[target_character.GetSheHe]已掌握新能力，我们只需要让[target_character.GetHerHim]“施展”就可以了。"
 EE_cabinet_events.4.a: "让我们在实践中看看。"
 EE_cabinet_events.4.b: "追求知识本身就有价值。"
 EE_cabinet_events.4.c: "我们立刻需要你！"
 EE_cabinet_events.5.title: "辛苦的[target_character.GetName]"
 EE_cabinet_events.5.desc: "那个傻瓜[target_character.GetName]今天在[ROOT.GetCountry.GetGovernment.GetCourtTitle]大发脾气，抱怨每天要处理的各种任务。据说，如果不给[target_character.GetSheHe]放假，[target_character.GetHeShe]扬言[target_character.GetSheHe]只能辞职不干了。"
 EE_cabinet_events.5.a: "加薪能让[target_character.GetHerHim]闭嘴吗？"
 EE_cabinet_events.5.b: "给[target_character.GetHerHim]放个“长假”。"
 EE_cabinet_events.5.c: "减少[target_character.GetHerHis]工作量。"
 EE_cabinet_events.6.title: "令人厌恶的事情"
 EE_cabinet_events.6.desc: "一件极为棘手的事情被曝光！\n\n原来[target_spouse.GetName]对婚姻的忠诚，仅次对君主的忠诚。虽然事小，但倘若此事曝光——[target_ruler.GetName]与[ROOT.GetCountry.GetName]的威望将受损。"
 EE_cabinet_events.6.a: "这个没事！"
 EE_cabinet_events.6.b: "悄悄处理掉[target_character.GetShortNameWithNoTooltip]。"
 EE_cabinet_events.6.c: "让他们尝尝自己的苦果！"
 EE_cabinet_events.7.title: "情比水浓"
 EE_cabinet_events.7.desc: "感觉到有人企图暗杀[target_character.GetName]，[target_character.GetHerHis]秘密联系了情人并私奔到了[target_country.GetName]。这是一个感人的爱情故事，也是对[ROOT.GetCountry.GetName]的莫大羞辱。"
 EE_cabinet_events.7.a: "我希望他们享受爱情。"
 EE_cabinet_events.8.title: "知识分享"
 EE_cabinet_events.8.desc: "看来我们的两位内阁成员，[target_character.GetName]和[target_character2.GetName]相处得十分融洽。经过长期共事，他们紧密的联系让彼此受益，提升了各自的能力。"
 EE_cabinet_events.8.a: "真是个好消息。"
 EE_cabinet_events.9.title: "羽翼之下"
 EE_cabinet_events.9.desc: "我们内阁成员能力上的差距并非仅是错觉，而是切实影响着[ROOT.GetCountry.GetAdjective]国家日常运作。不过这种情况或许不会持续太久，因为我们最优秀的内阁成员之一[target_character.GetName]已向[target_character2.GetName][target_character2.GetHerHim]传授诸多技能。\n\n[target_character2.GetName]如今比以往任何时候都更能胜任[target_character2.GetHerHis]的职责。"
 EE_cabinet_events.9.a: "令人满意的进展。"
 EE_cabinet_events.9.scaled_on_improvement: "[target_character2.GetShortName]的[abilities|e]提升幅度取决于与[target_character.GetName]的技能差距。"
 EE_cabinet_events.10.title: "一个不受欢迎的人物"
 EE_cabinet_events.10.desc: "我们的一位内阁成员[target_character.GetName]最近卷入了一桩危险事件。具体细节仍不明朗，但有一点可以肯定：[target_character.GetNameWithNoTooltip]已经被社会排斥，外界正施压要求我们将[target_character.GetHerHim]逐出内阁。当被问及此事时，[target_character.GetSheHe]否认有任何不当行为，尽管[target_character.GetHerHis]的说法越来越站不住脚。"
 EE_cabinet_events.10.a: "为了[ROOT.GetCountry.GetFlavorRank]的利益，[target_character.GetNameWithNoTooltip]必须离开。"
 EE_cabinet_events.10.b: "这也是没办法的事。"
 EE_cabinet_events.11.title: "迟来的晋升？"
 EE_cabinet_events.11.desc: "[target_character.GetName]是我们麾下一位杰出的部长，多年来一直是内阁的常任成员。[target_character.GetHerHis|U]的才能鲜有其他内阁成员能及，显然[target_character.GetSheHe]已展现出卓越的才干。或许[target_character.GetNameWithNoTooltip]理应获得晋升，晋升为[ROOT.GetCountry.Custom('GetHeadOfCabinetName')]。"
 EE_cabinet_events.11.a: "这样的功绩必须得到奖励。"
 EE_cabinet_events.11.b: "能力与信任并非成为[ROOT.GetCountry.Custom('GetHeadOfCabinetName')]所需的全部条件。"
 EE_cabinet_events.12.title: "压力之下"
 EE_cabinet_events.12.desc: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')]的职责绝非轻松，我们的[target_character.GetName]始终承受着巨大压力，需要应对层出不穷的新问题。\n\n正是这种长期压力让[target_character.GetShortNameWithNoTooltip]下定决心，今天我们已收到[target_character.GetHerHis]的辞职声明。"
 EE_cabinet_events.12.a: "全国都需要你！"
 EE_cabinet_events.12.b: "每个人都需要休息。"
 EE_cabinet_events.13.title: "别有用心？"
 EE_cabinet_events.13.desc: "[ROOT.GetCountry.GetAdjective][ROOT.GetCountry.GetGovernment.GetCourtName]内部的舆论风向自[target_character.GetName]掌权以来就不断变化，只需与任何一位廷臣简短交谈，便能迅速之道[target_character.GetShortNameWithNoTooltip]的所作所为。\n\n看来[target_character.GetSheHe]一直在兜售[target_character.GetHerHis]的主张——[target_societal_value.GetName]议程的一项。众所周知，[target_character.GetHerHis]行动确实会引发深远影响。"
 EE_cabinet_events.13.a: "[target_character.GetHerHis]的议程也符合我们的利益。"
 EE_cabinet_events.13.b: "我们将散播[target_character.GetHerHis]“辞职”的消息！"
 EE_cabinet_events.14.title: "对[target_policy.GetNameWithNoTooltip]的支持度上升"
 EE_cabinet_events.14.desc: "[target_estate.GetName]的一位成员最近在[ROOT.GetCountry.GetGovernment.GetParliament.GetName]会议上非常有趣的演讲，据其主张，我国现行法律[target_law.GetName]亟需全面修订，并应颁布新政策[target_policy.GetName]。\n\n这情形似曾相识，因为[target_character.GetName]此前就曾公开力挺该政策。莫非[target_character.GetSheHe]正暗中运用[target_character.GetHerHis]的影响力推动新政实施？"
 EE_cabinet_events.14.a: "确保此类议程能够得到持续的支持。"
 EE_cabinet_events.14.b: "我们也越来越支持监禁[target_character.GetShortNameWithNoTooltip]"
 EE_cabinet_events.14.c: "一定是[target_estate.GetNameWithNoTooltip]贿赂了[target_character.GetHerHim]！"
 EE_cabinet_events.15.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle]的随从"
 EE_cabinet_events.15.desc: "无论何种场合，总能看到某个身影伴随在我们的[ROOT.GetCountry.GetGovernment.GetRulerTitle][target_character.GetName]左右。[target_character.GetHeShe]究竟是[target_character2.GetName]的挚友还是单纯的政治盟友尚不可知，但有一件事可以确定——[target_character.GetNameWithNoTooltip]已然承担起$EE_cabinet_shorthand_HoC_name$的职责，即便尚未正式任命。\n\n可惜[target_character2.GetShortNameWithNoTooltip]刚刚任命[target_character2.GetShortNameWithNoTooltip]为$EE_cabinet_shorthand_HoC_name$，不然[target_character.GetSheHe]就会是了。"
 EE_cabinet_events.15.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle]的意愿必须得到实现。"
 EE_cabinet_events.15.b: "这里有些不对劲……"
 EE_cabinet_events.16.title: "偏爱"
 EE_cabinet_events.16.desc: "最近，[ROOT.GetCountry.GetGovernment.GetRulerTitle]的内阁招募工作涌现出许多雄心勃勃且才华横溢的人选，他们完全可以胜任内阁的组建。然而[target_character.GetName]却利用其[target_character.GetHerHis]的$EE_cabinet_shorthand_HoC_name$职级，否决了所有这些候选人，转而选择了[target_character2.GetName]。这种赤裸裸的权力滥用和裙带关系令内阁震惊不已，他们对此感到无比愤怒。"
 EE_cabinet_events.16.a: "我们的$EE_cabinet_shorthand_HoC_name$完全有权利这样做。"
 EE_cabinet_events.16.b: "把那些候选人带回来！"
 EE_cabinet_events.17.title: "冲突"
 EE_cabinet_events.17.desc: "我们的$EE_cabinet_shorthand_HoC_name$已经让[target_character.GetHerselfHimself]与[target_estate.GetName]陷入了严重冲突，这冲突根深蒂固于民众心中。不同阶层代表们公开批评[target_character.GetName]，在他们看来[target_character.GetName]简直就是撒旦的化身。如果$EE_cabinet_shorthand_HoC_name$不能平息这些声音，[target_character.GetShortNameWithNoTooltip]可能被迫放弃[target_character.GetHerHis]的职位或面临武装对抗。"
 EE_cabinet_events.17.a: "我们必须在冲突无法挽回的地步之前平息它。"
 EE_cabinet_events.17.b: "这不关我们的事。"
 EE_cabinet_events.18.title: "独裁者的崛起"
 EE_cabinet_events.18.desc: "在一次重要典礼中，[target_estate.GetName]的众多代表齐聚[target_location.GetName]，向[ROOT.GetCountry.GetGovernment.GetRuler.GetName]表达敬意并重新宣誓效忠。他们确实表达了敬意，但对象不仅是我们的[ROOT.GetCountry.GetGovernment.GetRulerTitle]，更重要的是向幕后真正统治这个国家的暴君[target_character.GetName]致敬。\n\n近几个月来，越来越多的权力下放到了$EE_cabinet_shorthand_HoC_name$手中，他们甚至可能拥有足够的影响力来争夺王位。"
 EE_cabinet_events.18.a: "如此被赋予的权力是我们对[target_character.GetName]信任的象征。"
 EE_cabinet_events.18.b: "束缚我的弱点……"
 EE_cabinet_events.19.title: "仇杀"
 EE_cabinet_events.19.desc: "在$EE_cabinet_shorthand_HoC_name$任期内的大部分时间里，[target_character.GetHerHis]试图通过制造恐惧与威慑来扩大[target_character.GetHerHis]影响力。虽然这成功压制反对者，却也在此过程中为[target_character.GetHerselfHimself]树敌众多。\n\n如今这些敌人取得了胜利——人们发现[target_character.GetName]被发现身首异处，躺在沟里，[target_character.GetHerHis]身躯如腐尸般溃烂。刺客仍在逃，但行凶动机似乎已昭然若揭。"
 EE_cabinet_events.19.a: "多么可怕……"
 EE_cabinet_events.20.title: "能力出众"
 EE_cabinet_events.20.desc: "[target_character.GetName]的任期展现了[target_character.GetHerHis]能力的真实水平。无论什么任务，[target_character.GetShortNameWithNoTooltip]总能迅速行动，全身心投入工作。[target_character.GetHeShe|U]能力并非卓越非凡，也不是声名显赫的[target_character.GetWomanMan]，但[target_character.GetSheHe]确实默默耕耘，不为追求荣耀的同时维系着[ROOT.GetCountry.GetLongName]的运转。"
 EE_cabinet_events.20.a: "这就是一个成功的故事！"
 EE_cabinet_events.21.title: "光说不练"
 EE_cabinet_events.21.desc: "当[target_character.GetName]来到我们的[ROOT.GetCountry.GetGovernment.GetCourtTitle]时，总能听见[target_character.GetSheHe]抱怨办事效率低下、其他人粗心大意。[target_character.GetSheHe]终日吹嘘[target_character.GetSheHe]的能力，最终竟真混进了内阁——这让所有曾被[target_character.GetSheHe]惹恼的大臣都深感绝望。即便到了现在，[target_character.GetShortNameWithNoTooltip]仍是一边持续抱怨，一边不断把事情搞砸。\n\n坦白说，所有人都受够了[target_character.GetHerHim]。"
 EE_cabinet_events.21.a: "这种无能让我非常恼火。"
 EE_cabinet_events.21.b: "我们没有时间再雇用其他人了。"
 STATIC_MODIFIER_NAME_EE_cabinet_incompetent: "悲剧的无能"
 EE_cabinet_events.22.title: "察言观色"
 EE_cabinet_events.22.desc: "大多数国家依赖少数识字的文员来执行政府指令。然而[ROOT.GetCountry.GetLongName]并非如此，因为我们卓越的识字率使得能够将行政事务委托给更多政府文员。凭借这样的官僚体系，我们的法令得以以最高精度和时效执行。"
 EE_cabinet_events.22.a: "我们在扫盲上的投资是值得的。"
 STATIC_MODIFIER_NAME_EE_cabinet_literacy_efficiency: "有文化的内阁职员"
 EE_cabinet_events.23.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]的尼禄"
 EE_cabinet_events.23.desc: "我们$EE_cabinet_shorthand_HoC_name$的政策令[target_location.GetName]的民众极为不满，他们曾多次试图发动叛乱反抗[ROOT.GetCountry.GetAdjective]统治，尤其是针对[target_character.GetName]。\n\n虽然所有叛乱皆被平息，但仍有最后一个反抗村落负隅顽抗，那里聚集了穷凶极恶的叛乱分子，正试图煽动当地民众对抗$EE_cabinet_shorthand_HoC_name$。面对如此激烈的反抗，[target_character.GetShortName]正在考虑用一种激烈的手段来解决这个困境——将村庄夷为平地，不留活口。"
 EE_cabinet_events.23.a: "这样的恐惧应该让叛军明白他们面对的是谁。"
 EE_cabinet_events.23.b: "这是犯罪！"
 EE_cabinet_events.100.title: "珍奇屋"
 EE_cabinet_events.100.desc: "[target_character.GetName]已证明是一位极其杰出的大臣。作为其领域的奇才，[target_character.GetSheHe]在整个[ROOT.GetCountry.GetLongName]被尊为无与伦比的学者。\n\n然而，[target_character.GetHerHis|U]对知识的追求代价不菲，人们相信[target_character.GetShortNameWithNoTooltip]可以从[ROOT.GetCountry.GetAdjectiveWithNoTooltip]国库额外获得资金，这样会受益匪浅。"
 EE_cabinet_events.100.a: "给[target_character.GetHerHim]拨款！"
 EE_cabinet_events.100.b: "我们重视[target_character.GetHerHis]对知识的追求，我们能力有限。"
 EE_cabinet_events.100.tt: "[target_character.GetName]将在我们的指导下投身于知识，并从中获益良多。\n\n随后将发生一系列[events|e]，在[event|e]链结束时，你将有机会选择[target_character.GetName]要学习的[modifiers|e]。"