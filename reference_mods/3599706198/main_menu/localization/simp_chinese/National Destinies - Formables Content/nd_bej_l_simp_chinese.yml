l_simp_chinese:
 nd_bej.1.t: "贝贾的崛起"
 nd_bej.1.d: "贝贾人的各个部落终于在一面旗帜下团结起来。从瓦迪阿拉基的金矿到萨瓦金的珊瑚码头，从红海丘陵到厄立特里亚低地，说贝达维耶语的民族如今团结为一个国家。\n\n现在的问题是，这个统一的贝贾国家将选择何种道路。红海沿岸通过与阿拉伯和印度洋世界的贸易提供了惊人的财富——萨瓦金作为中转港已经能与吉达匹敌。但沙漠本身是贝贾人的核心地带，自远古以来，骑骆驼的战士们就在这些土地上劫掠与守卫。\n\n#bold 此选择将在传统标签中解锁一条命运之路。#!"
 nd_bej.1.a: "掌控红海贸易航线！"
 nd_bej.1.b: "沙漠是我们的堡垒和利剑！"
 nd_bej.2.t: "红海之珠"
 nd_bej.2.d: "萨瓦金已发展成为红海西岸最繁荣的港口。其独特的砖房在蜿蜒狭窄的街道旁拔地而起，高达四层，见证了港口涌流的财富。来自吉达、亚丁和斯瓦希里海岸的船只挤满锚地，贝贾族商队则将港口与内陆金矿相连。\n\n港口的关税收入现已与非洲之角任何城市相匹敌。前往麦加的朝圣者、交易珍珠的商人、北上的奴隶商队，皆需经过我们的关税站。"
 nd_bej.2.a: "萨瓦金必将成为我们领地的瑰宝！"
 nd_bej.2.b: "萨瓦金将成为我们舰队的锚点。"
 nd_bej.3.t: "西利夫屹立不倒"
 nd_bej.3.d: "几代以来，贝贾人通过一种不成文的习惯法体系——西利夫来管理自己，这种法律规范了从放牧权到血仇、从婚姻契约到贸易争端等生活的各个方面。每个部落的长者在集会上调解冲突，他们的判决具有祖先传统的权威。\n\n现在，随着我们的联盟不断壮大并面临新的挑战，西利夫已经被正式化和扩展。过去只有口头记忆保存法律，而现在被认可的部落长者集会能够在整个贝贾领土上做出一致的判决。"
 nd_bej.3.a: "祖先的智慧将指引我们。"
 nd_bej.3.b: "法律必将得到严格执行。"
 nd_bej.4.t: "哈登多瓦崛起"
 nd_bej.4.d: "哈登多瓦人是贝贾人分支联盟中最强大的一支，现已巩固了他们对东部低地的统治。他们的战士以精心梳理的提法发型为标志，手持直刃剑与皮盾，令整个区域闻风丧胆。\n\n哈登多瓦人展现出远超贝贾人以往任何时期的军事组织能力，能够在数百公里的沙漠地带协调突袭与防御作战。"
 nd_bej.4.a: "哈登多瓦人将成为我们的利剑。"
 nd_bej_desert_riders: "沙漠骑手"
 nd_bej_desert_riders_desc: "贝贾人古老的骆驼骑兵传统，历经数千年沙漠劫掠与商队护卫的磨砺而臻于完美。"
 nd_bej_wadi_allaqi_mines: "阿拉吉干河金矿"
 nd_bej_wadi_allaqi_mines_desc: "阿拉吉旱谷是埃及东部沙漠中一个拥有多个金矿的矿区中心，自古埃及时代起便由贝贾人开采。"
 nd_bej_camel_breeding: "骆驼养殖"
 nd_bej_camel_breeding_desc: "贝贾牧民财富是通过选育骆驼来提高其耐力和速度。"
 nd_bej_caravan_guardians: "商队护卫者"
 nd_bej_caravan_guardians_desc: "贝贾瞭望塔与武装护卫，守护着穿越红海丘陵的重要贸易路线。"
 nd_bej_tribal_custom: "部落习俗"
 nd_bej_tribal_custom_desc: "最早形式的“西利夫”——规范氏族行为、放牧权与争端解决的口头传统。"
 nd_bej_salt_routes: "盐路"
 nd_bej_salt_routes_desc: "掌控盐矿资源以及穿越东部沙漠、输送这一重要物资的商队路线。"
 nd_bej_sword_and_shield: "剑与盾"
 nd_bej_sword_and_shield_desc: "贝贾人可怕的战斗风格结合了直刃剑和小型圆形皮木盾，在近战中极具毁灭性。"
 nd_bej_suakin_entrepot: "萨瓦金贸易中心"
 nd_bej_suakin_entrepot_desc: "萨瓦金发展成为红海首要贸易港口，其独特的珊瑚岩建筑群与繁荣的商人社群交相辉映。"
 nd_bej_red_sea_dhows: "红海单桅帆船"
 nd_bej_red_sea_dhows_desc: "贝贾人驾驶的单桅帆船，在非洲、阿拉伯半岛和印度洋世界之间的红海贸易航线上穿梭往来。"
 nd_bej_islamic_integration: "伊斯兰整合"
 nd_bej_islamic_integration_desc: "通过与阿拉伯商人通婚及参与红海贸易，伊斯兰教逐渐被接受。"
 nd_bej_emerald_trade: "翡翠贸易"
 nd_bej_emerald_trade_desc: "对东方沙漠绿宝石矿藏的开采，该矿藏自托勒密时代以来就被称为传说中的克利奥帕特拉矿藏。"
 nd_bej_clan_alliances: "氏族联盟"
 nd_bej_clan_alliances_desc: "贝贾人的跨表亲联姻体系将各氏族紧密联结，在严酷的沙漠环境中有效防止了社会结构的碎片化。"
 nd_bej_desert_scouts: "沙漠斥候"
 nd_bej_desert_scouts_desc: "精锐斥候熟知红海山中的每一个洼地、河谷和水源——他们是贝贾联盟的眼睛和耳朵。"
 nd_bej_silif_codification: "西利夫法典"
 nd_bej_silif_codification_desc: "贝贾古代习惯法西里夫的正式化，该法律管理所有次级联盟之间的争端、联盟和资源共享。"
 nd_bej_sambuk_trade: "三角帆单桅贸易船"
 nd_bej_sambuk_trade_desc: "用于长途红海贸易的大型三角帆三桅帆船，将货物从非洲港口运往阿拉伯半岛。"
 nd_bej_hajj_facilitators: "朝觐服务者"
 nd_bej_hajj_facilitators_desc: "贝贾人控制着从尼罗河谷到红海港口的陆路通道，既便利了前往麦加的朝圣之旅，也从过往商旅中获利。"
 nd_bej_desert_warfare: "沙漠作战"
 nd_bej_desert_warfare_desc: "沙漠作战战术的精髓——速度、奇袭与冲击，这些战术通过几代人的劫掠和部落战争不断完善。"
 nd_bej_port_customs: "港口海关"
 nd_bej_port_customs_desc: "对贝贾人控制下的红海港口，特别是萨瓦金港，过往货物实行系统化征税。"
 nd_bej_hadendowa_confederation: "哈登多瓦联盟"
 nd_bej_hadendowa_confederation_desc: "哈登多瓦人崛起为贝贾人中最强大的分支联盟，在苏丹东部组织起了一支最令人生畏的战士力量。"
 nd_bej_mountain_refuge: "山间避难所"
 nd_bej_mountain_refuge_desc: "红海山脉及其难以到达的河谷作为坚不可摧的避难所令奥斯曼帝国和丰吉苏丹国的征服企图屡屡受挫。"
 nd_bej_tribal_commerce: "部落贸易"
 nd_bej_tribal_commerce_desc: "部落间贸易网络正式形成，将沙漠腹地与红海沿岸连接起来。"
 nd_bej_khor_strongholds: "科尔要塞"
 nd_bej_khor_strongholds_desc: "红海丘陵地带狭窄的峡谷与干涸河床中的坚固据点，使小股部队得以抵御规模远超己方的敌军。"
 nd_bej_desert_smiths: "沙漠铁匠"
 nd_bej_desert_smiths_desc: "贝贾金属加工传统，生产其战士使用的特色直刃剑与矛头。"
 nd_bej_pastoral_wealth: "畜牧财富"
 nd_bej_pastoral_wealth_desc: "贝贾牧民多样化养殖，除了骆驼、绵羊和山羊外，还包括牛，从而扩展了畜牧经济。"
 nd_bej_elite_desert_cavalry: "精锐沙漠骑兵"
 nd_bej_elite_desert_cavalry_desc: "最精锐的贝贾骆驼骑兵，经训练可执行持久沙漠作战，并能以高速跨越广袤距离。"
 nd_bej_hijaz_gateway: "希贾兹门户"
 nd_bej_hijaz_gateway_desc: "萨瓦金作为非洲与希贾兹之间的主要通道，连接尼罗河谷与麦加和麦地那。"
 nd_bej_desert_logistics: "沙漠后勤"
 nd_bej_desert_logistics_desc: "在东部沙漠地区拥有无与伦比的沙漠导航、水源管理和长途行进的专业知识。"
 nd_bej_confederal_diplomacy: "联邦外交"
 nd_bej_confederal_diplomacy_desc: "源自管理哈登多瓦、比沙林、阿马拉尔和阿巴巴达等高度独立部族联盟的外交手腕。"
 nd_bej_eastern_desert_resources: "东部沙漠资源"
 nd_bej_eastern_desert_resources_desc: "扩大对东部沙漠地区铜、镍等矿产资源的开发规模，并采用木炭冶炼技术。"
 nd_bej_unbroken_warriors: "不屈战士"
 nd_bej_unbroken_warriors_desc: "贝贾人的尚武精神一直延续到现代——这些勇士曾在塔迈战役中突破了英军的方阵。"
 nd_bej_red_sea_modernization: "红海现代化"
 nd_bej_red_sea_modernization_desc: "贝贾贸易方式适应现代红海商业格局的变化。"
 nd_bej_bedawiye_identity: "贝都因人身份"
 nd_bej_bedawiye_identity_desc: "贝都因语系民族的文化认同历经千年外来压力与变迁，依然生生不息。"
 nd_bej_eastern_sudan: "东苏丹"
 nd_bej_eastern_sudan_desc: "贝贾人巩固了对苏丹东部的控制，范围从埃及边境延伸至厄立特里亚低地。"
 nd_bej_pastoral_endurance: "游牧韧性"
 nd_bej_pastoral_endurance_desc: "贝贾游牧经济展现出非凡的韧性，历经数世纪干旱、战乱与贸易格局变迁仍能不断调适存续。"
 a_nd_bej_camel_raiders: "贝贾骆驼骑兵"
 a_nd_bej_camel_raiders_desc: "迅捷的沙漠骑手骑着骆驼，这些战士在毫无预警的情况下发动袭击，并在任何有组织的反应之前消失在无边的荒漠中。"
 a_nd_bej_swordsmen: "贝贾剑士"
 a_nd_bej_swordsmen_desc: "手持直刃剑和小圆皮木盾的贝贾剑士在近战中极具毁灭性。"
 a_nd_bej_mounted_scouts: "贝贾骑兵斥候"
 a_nd_bej_mounted_scouts_desc: "熟悉东部沙漠每一条干谷和水源的精英骑手，他们既是斥候、突袭者，也是贝贾联盟的第一道防线。"
 a_nd_bej_hadendowa_warriors: "哈登多瓦战士"
 a_nd_bej_hadendowa_warriors_desc: "哈登多瓦人是贝贾人分支联盟中最令人畏惧的一支——这些留着精致发型的战士，其集群冲锋甚至能击溃训练有素的军阵。"
 n_nd_bej_dhow: "贝贾单桅帆船"
 n_nd_bej_dhow_desc: "一种由贝贾水手操控的三角帆船，专为红海贸易航线的速度而打造。轻快迅捷，但在海战中较为脆弱。"
 n_nd_bej_sambuk: "红海三角帆单桅"
 n_nd_bej_sambuk_desc: "一种大型的三角帆船，专为红海长途贸易设计，用于在非洲海岸与阿拉伯地区之间运输货物。"
 a_nd_bej_desert_cavalry: "贝贾沙漠骑兵"
 a_nd_bej_desert_cavalry_desc: "绝对主义时代的精英骆驼骑兵，融合了贝贾沙漠的作战专长与改良的武器战术。"
 nd_bej_gold_camp: "金矿营地"
 nd_bej_gold_camp_desc: "一处由贝贾氏族管理的东部沙漠金矿开采点，延续着可追溯至法老时代的采矿传统。"
 nd_bej_camel_market: "骆驼市场"
 nd_bej_camel_market_desc: "贝贾骆驼繁育与交易的中心繁荣兴旺，这里是东北非最优良骑乘与驮运用骆驼易手之地。"
 nd_bej_coral_house: "珊瑚石屋"
 nd_bej_coral_house_desc: "一座用红海海底开采的珊瑚块建造的独特多层贸易房屋，风格类似于萨瓦金的商业区。"
 nd_bej_desert_watchtower: "沙漠瞭望塔"
 nd_bej_desert_watchtower_desc: "一座由贝贾战士驻守的加固观察哨，守卫着穿越红海丘陵的商队路线。"
 nd_bej_tribal_assembly: "部落会议"
 nd_bej_tribal_assembly_desc: "贝贾部落长老们聚集于此，依据西利夫法典解决争端、分配牧场权并进行裁决的集会场所。"
 nd_bej_hajj_hostel: "朝觐招待所"
 nd_bej_hajj_hostel_desc: "前往麦加朝圣路线上的一个驿站，为从尼罗河谷穿越至红海沿岸的旅行者提供住宿与补给。"
 nd_bej_khor_fortress: "霍尔要塞"
 nd_bej_khor_fortress_desc: "在红海丘陵的狭窄峡谷中建造的堡垒阵地，地形本身成为最坚固的壁垒。"
 nd_bej_smithy: "贝贾铁匠铺"
 nd_bej_smithy_desc: "一处沙漠金属加工坊，专门生产为贝贾战士配备的独特直刃剑与矛头。"
 nd_bej_salt_trade: "红海盐业贸易"
 nd_bej_salt_trade_desc: "红海沿岸的盐加工与分销，是东非沙漠游牧社群赖以生存的重要物资流通命脉。"
 nd_bej_emerald_polishing: "翡翠抛光"
 nd_bej_emerald_polishing_desc: "来自东方沙漠矿井的祖母绿切割和抛光，受到地中海和伊斯兰世界的珍视。"
 nd_bej_charcoal_production: "木炭生产"
 nd_bej_charcoal_production_desc: "在东部沙漠中，用沙漠灌木和金合欢木生产木炭，用于冶炼铜和其他金属。"
 nd_bej_gold_camp_upkeep: "金矿营地运作"
 nd_bej_gold_camp_upkeep_desc: "维持黄金开采作业需要木材支撑和石制工具。"
 nd_bej_camel_market_upkeep: "骆驼市场运作"
 nd_bej_camel_market_upkeep_desc: "骆驼交易中心运营所需的牲畜饲料和设施。"
 nd_bej_coral_house_upkeep: "珊瑚屋维护"
 nd_bej_coral_house_upkeep_desc: "维持珊瑚岩交易站所需的石料与木材。"
 nd_bej_watchtower_upkeep: "瞭望塔驻军"
 nd_bej_watchtower_upkeep_desc: "为驻守沙漠瞭望塔的卫戍部队配备石料筑成的防御工事与武器。"
 nd_bej_assembly_upkeep: "集会规定"
 nd_bej_assembly_upkeep_desc: "用于招待部族长老集会时所需传统礼仪的牲畜。"
 nd_bej_hajj_hostel_upkeep: "旅馆供给"
 nd_bej_hajj_hostel_upkeep_desc: "为前往麦加的朝圣者提供食物以示款待。"
 nd_bej_khor_fortress_upkeep: "要塞驻军"
 nd_bej_khor_fortress_upkeep_desc: "用于维持霍尔要塞驻军的石料与武器。"
 nd_bej_smithy_upkeep: "沙漠武器锻造"
 nd_bej_smithy_upkeep_desc: "贝贾铁匠使用木炭燃料锻造铁，制成直刃剑和矛头，武装沙漠战士。"
 levy_nd_bej_camel_raiders: "贝贾骆驼骑兵征召兵"
 levy_nd_bej_camel_raiders_desc: "贝贾部落成员自幼被培养成骆驼骑兵，采用传统的沙漠作战方式。"
 levy_nd_bej_hadendowa_warriors: "哈登多瓦征召勇士"
 levy_nd_bej_hadendowa_warriors_desc: "来自东部低地的登多瓦步兵战士手持剑与盾。"
 nd_bej_formed_tt: "贝贾已成立"
 nd_bej_path_a_tt: "选择红海之主"
 nd_bej_path_b_tt: "选择沙漠之子"
 STATIC_MODIFIER_NAME_nd_bej_lords_of_the_red_sea: "红海之主"
 STATIC_MODIFIER_DESC_nd_bej_lords_of_the_red_sea: "贝贾人已宣称对红海沿岸拥有统治权，将数个世纪以来的海上贸易财富汇聚于萨瓦金及散布于海岸线的珊瑚港口。来自阿拉伯、印度乃至更远地区的商人络绎不绝地涌入我们的港口。"
 STATIC_MODIFIER_NAME_nd_bej_sons_of_the_desert: "沙漠之子"
 STATIC_MODIFIER_DESC_nd_bej_sons_of_the_desert: "东方沙漠的子孙如先祖般驰骋——迅捷、无情且不可征服。贝贾战士或骑骆驼或徒步，发动突袭后便消失在红海丘陵之中，令任何敌人都来不及做出反应。"
 STATIC_MODIFIER_NAME_nd_bej_suakin_ascendant: "萨瓦金崛起"
 STATIC_MODIFIER_DESC_nd_bej_suakin_ascendant: "由珊瑚建成的萨瓦金港已崛起为红海西部首要的贸易枢纽，吸引了来自希贾兹及更远地区的商人。"
 STATIC_MODIFIER_NAME_nd_bej_law_of_the_silif: "Law of the Silif"
 STATIC_MODIFIER_DESC_nd_bej_law_of_the_silif: "The ancient unwritten code of the Beja, the silif, has been codified and universally accepted across the clans, bringing order and stability to the confederation."
 STATIC_MODIFIER_NAME_nd_bej_naval_power: "Beja Naval Power"
 STATIC_MODIFIER_DESC_nd_bej_naval_power: "Suakin's wealth funds a fleet of armed dhows and sambuks that project Beja power across the Red Sea, protecting trade routes and establishing maritime authority."
 STATIC_MODIFIER_NAME_nd_bej_silif_enforcement: "Silif Enforcement"
 STATIC_MODIFIER_DESC_nd_bej_silif_enforcement: "The codified silif is enforced with firm authority across all clans, bringing order and predictability to governance throughout the Beja confederation."
 nd_bej_destiny: "Beja Destiny"
 nd_bej_destiny_desc: "The Beja stand united — a nation forged from the desert clans. Now the question is whether to look outward across the Red Sea or inward across the sands."
 nd_bej_dest_red_sea_ports: "Red Sea Ports"
 nd_bej_dest_red_sea_ports_desc: "Secure the great Red Sea harbors of Suakin and Aydhab, establishing Beja control over the western coast's maritime trade."
 nd_bej_dest_arabian_trade: "Arabian Trade"
 nd_bej_dest_arabian_trade_desc: "Extend Beja commercial influence across the Red Sea to Jeddah, tapping into the pilgrim and pearl trades that connect Africa to Arabia."
 nd_bej_dest_red_sea_hegemony: "Red Sea Hegemony"
 nd_bej_dest_red_sea_hegemony_desc: "Command the entire Red Sea from Aden to Dahlak, becoming the undisputed masters of the world's most strategic waterway."
 nd_bej_dest_nubian_conquest: "Nubian Conquest"
 nd_bej_dest_nubian_conquest_desc: "March into the Nubian heartland and seize Dongola and Kassala, extending Beja power over the upper Nile corridor."
 nd_bej_dest_nile_march: "Nile March"
 nd_bej_dest_nile_march_desc: "Push south along the Nile to Sennar and west to the Ethiopian highlands, forging a desert empire from the Red Sea Hills to the Blue Nile."
 nd_bej_dest_desert_empire: "Desert Empire"
 nd_bej_dest_desert_empire_desc: "Conquer the entire eastern Sudan from Berber to Soba, uniting the Nile corridor under Beja rule in an empire stretching from the cataracts to the confluence."
 nd_bej.5.t: "A Nation Forged in Sand"
 nd_bej.5.d: "The Beja confederation has proven its strength. From the Red Sea Hills to the coastal lowlands, the Bedawiye-speaking clans have found common purpose. Our elders have spoken, and the silif binds us as one people.\n\nThe path ahead is ours to choose, and the destiny we forge shall echo through the ages."
 nd_bej.5.a: "Our destiny awaits."
 nd_bej.6.t: "The Coral Ports"
 nd_bej.6.d: "The great ports of the western Red Sea now fly the Beja banner. Suakin, with its coral-block houses rising from the turquoise waters, and ancient Aydhab, the old pilgrim port, are ours. Merchant dhows from Arabia and India crowd our harbors, and the customs revenues swell our treasury.\n\nThe Beja have transformed from desert raiders into masters of maritime commerce. The wealth of the Red Sea flows through our hands."
 nd_bej.6.a: "The sea is our road to greatness."
 nd_bej.7.t: "Across the Red Sea"
 nd_bej.7.d: "Beja merchants have crossed the Red Sea to establish themselves in Jeddah, the great port of the Hijaz. Our sambuks carry pearls, gold, and incense to Arabia and return laden with dates, textiles, and the wealth of the Islamic world.\n\nThis trade transforms us. We are no longer a coastal power but a node in a vast commercial network spanning two continents. The question is how to shape this new wealth — shall we invest in institutions and learning, or build a fleet to protect and expand our trade routes?"
 nd_bej.7.a: "Invest in learning and trade houses."
 nd_bej.7.b: "Build a fleet worthy of our ambitions."
 nd_bej.8.t: "Masters of the Red Sea"
 nd_bej.8.d: "From Aden at the mouth of the Red Sea to the Dahlak Archipelago, Beja power is unchallenged on these waters. No ship crosses from Africa to Arabia without our consent, and no caravan reaches the coast without paying our tolls.\n\nThe Red Sea, which the ancients called Mare Erythraeum, has become a Beja lake. Our coral ports gleam in the tropical sun, our sambuks rule the waves, and our merchants are welcomed from Cairo to Calicut. How shall we wield this unprecedented power?"
 nd_bej.8.a: "Foster scholars and institutions of learning."
 nd_bej.8.b: "Project our power across the sea."
 nd_bej.9.t: "Into the Nubian Heartland"
 nd_bej.9.d: "Beja warriors have swept out of the Red Sea Hills and into the Nile corridor. Dongola, the ancient capital of Makuria, and Kassala, guardian of the eastern approach, have fallen to our cavalry. The people of the Nile Valley, long accustomed to Nubian and Funj rule, now look upon Beja banners with a mixture of awe and apprehension.\n\nThe desert warriors have proven they can take cities as well as raid caravans."
 nd_bej.9.a: "The desert breeds conquerors."
 nd_bej.10.t: "The March Along the Nile"
 nd_bej.10.d: "Our armies have pushed deep into the Sudan. Sennar, seat of the Funj sultanate, has been taken, and our scouts have reached the Ethiopian highlands at Axum. The Beja realm now stretches from the Red Sea coast to the Blue Nile, encompassing peoples and lands our ancestors knew only as distant trading partners.\n\nGoverning this sprawling domain requires new approaches. Shall we rule through fear and force of arms, or build the institutions of centralized command?"
 nd_bej.10.a: "Strike fast, negotiate from strength."
 nd_bej.10.b: "Centralize command of our domains."
 nd_bej.11.t: "Empire of Sand and Stone"
 nd_bej.11.d: "From the cataracts of the Nile to the confluence of the Blue and White Niles at Soba, the Beja flag flies over a vast desert empire. The ancient trading town of Berber, the fortress of Atbara, the ruins of Meroe — all are ours. No power in eastern Africa can challenge the warriors of the Eastern Desert.\n\nThis empire is unprecedented in Beja history. Our ancestors raided and traded; we have conquered and ruled. How shall we consolidate this achievement?"
 nd_bej.11.a: "Maintain our war machine at all costs."
 nd_bej.11.b: "Absorb the conquered into our nation."
 STATIC_MODIFIER_NAME_nd_bej_dest_suakin_gateway_a: "Suakin Gateway"
 STATIC_MODIFIER_DESC_nd_bej_dest_suakin_gateway_a: "The wealth of the Arabian trade fuels institutional growth and commercial expansion across the Beja realm, though maintaining our armies strains the treasury."
 STATIC_MODIFIER_NAME_nd_bej_dest_suakin_gateway_b: "Fleet of the Red Sea"
 STATIC_MODIFIER_DESC_nd_bej_dest_suakin_gateway_b: "A powerful fleet of dhows and sambuks projects Beja influence across the Red Sea, backed by the piety of Islamic scholarship."
 STATIC_MODIFIER_NAME_nd_bej_dest_red_sea_masters_a: "Scholars of the Sea"
 STATIC_MODIFIER_DESC_nd_bej_dest_red_sea_masters_a: "The wealth of Red Sea trade is invested in literacy and learning, though our scholars view war with distaste."
 STATIC_MODIFIER_NAME_nd_bej_dest_red_sea_masters_b: "Maritime Dominion"
 STATIC_MODIFIER_DESC_nd_bej_dest_red_sea_masters_b: "Beja maritime dominion attracts loyal subjects and settlers to the Red Sea coast, elevating the confederation among the great powers."
 STATIC_MODIFIER_NAME_nd_bej_dest_nile_conquerors_a: "Desert Raiders"
 STATIC_MODIFIER_DESC_nd_bej_dest_nile_conquerors_a: "Swift raids and intelligence networks give the Beja leverage in negotiations, though rapid expansion strains our finances."
 STATIC_MODIFIER_NAME_nd_bej_dest_nile_conquerors_b: "Central Command"
 STATIC_MODIFIER_DESC_nd_bej_dest_nile_conquerors_b: "A centralized military command structure coordinates desert campaigns and reduces the cost of declaring war."
 STATIC_MODIFIER_NAME_nd_bej_dest_desert_empire_a: "Unbroken Legions"
 STATIC_MODIFIER_DESC_nd_bej_dest_desert_empire_a: "The Beja war machine is sustained by cheap reinforcements, mercenary auxiliaries, and a wide diplomatic network."
 STATIC_MODIFIER_NAME_nd_bej_dest_desert_empire_b: "Lords of the Conquered"
 STATIC_MODIFIER_DESC_nd_bej_dest_desert_empire_b: "The Beja absorb conquered peoples through tolerance and assimilation, though the empire grows complacent with success."
 nd_bej_red_sea_trading_house: "Red Sea Trading House"
 nd_bej_red_sea_trading_house_desc: "A grand coral-and-stone trading house commanding the Red Sea commerce, the jewel of Beja mercantile power."
 nd_bej_trading_house_upkeep: "Trading House Operations"
 nd_bej_trading_house_upkeep_desc: "Stone, timber, cloth, and paper required to maintain the grand trading house and its commercial records."
 nd_bej_desert_war_camp: "Desert War Camp"
 nd_bej_desert_war_camp_desc: "A fortified forward base for desert campaigns, where Beja warriors muster, resupply, and prepare for the next assault."
 nd_bej_war_camp_upkeep: "War Camp Garrison"
 nd_bej_war_camp_upkeep_desc: "Weapons, leather, livestock, and stone required to maintain the desert war camp and its garrison."