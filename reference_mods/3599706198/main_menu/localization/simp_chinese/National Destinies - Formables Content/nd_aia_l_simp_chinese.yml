l_simp_chinese:
 nd_aia.1.t: "阿拉伯半岛的统一"
 nd_aia.1.d: "经历了数代人的部落割据后，阿拉伯半岛自早期哈里发时代以来，首次统一在了一面旗帜之下。麦加与麦地那的圣城、也门的乳香港口、海湾盛产珍珠的海岸，以及广袤的内志腹地，如今皆听命于同一位君主。\n\n这是一个具有深远意义的时刻。这片孕育了伊斯兰教、并曾作为古代贸易路线十字路口的土地，终于再次完整。但这重生的阿拉伯将走向何方？是该像初代哈里发们那样，高举圣战之旗，以武力开疆拓土、弘扬信仰？还是向内探索，深耕那曾让各大帝国艳羡不已的贸易网络与学术传统？\n\n#bold 此选择将在传统标签页中解锁一条命运之路。#! "
 nd_aia.1.a: "高举信仰之旗，出征！"
 nd_aia.1.b: "我们将再次成为世界的十字路口。"
 nd_aia.2.t: "摩卡咖啡"
 nd_aia.2.d: "红海沿岸的摩卡港已成为一项非凡的新兴贸易中心。咖啡最早由也门高地的苏菲派修士为了在夜间祈祷时保持清醒而种植，如今却已征服了更广阔世界的味蕾。欧洲、印度与奥斯曼的商贾们挤满了港口，他们的船只满载白银与货物，只为换取一袋袋深色且芳香四溢的咖啡豆。\n\n咖啡馆在阿拉伯半岛及周边地区如雨后春笋般涌现，成为了交谈、经商与政治辩论的中心。摩卡的总督们因出口关税而盆满钵满，高地的农夫们则如视珍宝般小心翼翼地照料着这些作物，严禁出口可育的咖啡种子，以防竞争对手建立起自己的种植园。"
 nd_aia.2.a: "摩卡将成为我们贸易帝国的明珠。"
 nd_aia.2.b: "控制了种植园，就控制了财富。"
 nd_aia.3.t: "瓦哈比宗教改革"
 nd_aia.3.d: "一位来自内志的宗教学者，穆罕默德·伊本·阿卜杜勒·瓦哈卜，点燃了一场正在彻底改变这座半岛的运动。他宣扬回归其所认为的纯粹、原始的伊斯兰教派实践，强烈谴责对圣徒的崇拜、苏菲派繁复的仪式，以及他眼中几个世纪以来积累的迷信与异端创新。\n\n他与一位地方统治者的结盟，缔造了一股势不可挡的宗教政治运动。受其教义鼓舞的勇士们横扫沙漠，推倒圣祠，并要求所有人屈服于他们那严苛的信仰愿景。这场运动的狂热能量无可否认，但其对教义的僵化解读，也面临着疏远温和派臣民与周边强权国家的风险。\n\n我们该如何应对这场精神层面的剧变？"
 nd_aia.3.a: "拥抱这净化一切的改革烈焰。"
 nd_aia.3.b: "以务实的治国之道引导改革。"
 nd_aia.4.t: "伊赫万的崛起"
 nd_aia.4.d: "一种新型的勇士正在内志沙漠的定居点中崛起。伊赫万，意为兄弟会，他们是昔日的贝都因部落民，如今却放弃了游牧生活，定居在专事宗教学习与军事操练的农业社区中。\n\n在强烈的宗教热忱驱使下，他们将祖辈在沙漠中磨砺出的耐力与骑术，同狂热的纪律性结合在一起，这使他们在战场上令人闻风丧胆。他们拔剑不为劫掠或部落的虚荣，而是为了真主的荣耀与真理信仰的扩张。他们的定居点——希吉拉，不仅是武装驻军的要塞，更是传播教义的中心。"
 nd_aia.4.a: "这些勇士将成为我们成就霸业的先锋。"
 nd_aia_bedouin_raiders: "贝都因劫掠传统"
 nd_aia_bedouin_raiders_desc: "贝都因人的加兹乌——这种横跨沙漠的闪电突袭——既是一门战争艺术，也是一种生活方式。它在阿拉伯荒原数个世纪的部落冲突中，被淬炼得炉火纯青。"
 nd_aia_incense_route: "乳香之路"
 nd_aia_incense_route_desc: "数千年来，阿拉伯南部的财富沿着商队路线一路向北流淌，将佐法尔与哈德拉毛林地出产的乳香与没药，源源不断地运往地中海的繁华集市。"
 nd_aia_falaj_irrigation: "法拉吉水利"
 nd_aia_falaj_irrigation_desc: "巧妙的法拉吉系统利用重力自流的暗渠，将地下含水层中的水流引导而出，从而在干旱的阿拉伯大地上维系着农业生机。这是一项历经数千年淬炼与改良的精妙技术。"
 nd_aia_tribal_confederacy: "部落联盟"
 nd_aia_tribal_confederacy_desc: "阿拉伯半岛的统治根基维系于部落联盟间微妙的平衡。在这里，最高谢赫必须依靠个人的无上威望、彼此的互惠义务，以及对劫掠战利品的慷慨分配，方能维持其统治权威。"
 nd_aia_pearl_diving: "潜水采珠"
 nd_aia_pearl_diving_desc: "阿拉伯湾的浅水区盛产光泽非凡的珍珠。采珠人们仅凭一块配重石与皮质护指，便毅然潜入海底进行采摘。"
 nd_aia_desert_navigation: "沙漠导航"
 nd_aia_desert_navigation_desc: "贝都因领航员如同水手洞悉海洋般解读着沙漠——凭借星辰的指引、沙地上的风纹，以及地形中那些标示着遥远绿洲间通途的微妙起伏。"
 nd_aia_dhow_shipbuilding: "达乌帆船建造"
 nd_aia_dhow_shipbuilding_desc: "这种装备着标志性大三角帆的达乌帆船，凭借其缝线拼接的船壳与极浅的吃水，完美契合了印度洋的季风气候与阿拉伯湾的浅水海域。"
 nd_aia_hajj_economy: "朝觐经济"
 nd_aia_hajj_economy_desc: "每年数以百万计前往麦加与麦地那的朝觐者，催生了一台由商队客栈、物资供应商、向导与商贾构成的庞大经济引擎，正是它维系着整个汉志地区的运转。"
 nd_aia_qadi_courts: "卡迪法庭"
 nd_aia_qadi_courts_desc: "精通伊斯兰教法学的卡迪负责裁决各项民事与刑事纠纷，以此构建起一套根植于《古兰经》与《圣训》的法度与秩序框架。"
 nd_aia_date_palm_groves: "椰枣栽培"
 nd_aia_date_palm_groves_desc: "椰枣树堪称阿拉伯的生命之树——它不仅提供食物、木材与编织绳索的纤维，更为其他农作物撑起了一片荫蔽。在灌溉绿洲中悉心栽培椰枣，构成了阿拉伯人定居生活的基石。"
 nd_aia_arabian_horse_breeding: "阿拉伯马繁育"
 nd_aia_arabian_horse_breeding_desc: "纯种阿拉伯马历经数千年的精心选育，铸就了其无与伦比的耐力、忠诚与速度，是当今世上最受推崇的骑兵坐骑。贝都因部落像捍卫自身荣誉一般，狂热地守护着这些母马的血统。"
 nd_aia_sufi_mysticism: "苏菲派神秘主义"
 nd_aia_sufi_mysticism_desc: "伊斯兰教的神秘主义教团在阿拉伯半岛根基深厚。在这里，苏菲派的谢赫们引领信众进行精神修炼、吟诵诗歌，并通过直接的体悟来探求神圣真知。"
 nd_aia_mocha_coffee: "摩卡咖啡贸易"
 nd_aia_mocha_coffee_desc: "也门的摩卡港已成为全球咖啡供应的唯一门户。这种商品不仅催生了遍布全球的咖啡馆网络，更缔造了一场一本万利的垄断贸易。"
 nd_aia_indian_ocean_trade: "印度洋海上贸易"
 nd_aia_indian_ocean_trade_desc: "数百年来，阿拉伯的三角帆船始终航行在季风航线上，将红海、波斯湾与印度、东非以及东南亚的香料群岛紧密相连。"
 nd_aia_imamate_governance: "伊玛目政体"
 nd_aia_imamate_governance_desc: "阿曼的伊巴德派伊玛目国与也门的宰德派伊玛目国，代表了阿拉伯半岛独特的宗教政治权威传统。在此体制下，伊玛目集精神领袖与世俗统治权于一身。"
 nd_aia_desert_fortresses: "沙漠要塞"
 nd_aia_desert_fortresses_desc: "卡斯尔——这种由泥砖与石块筑就的坚固沙漠堡垒——扼守着内陆腹地的贸易路线与生命水源。它不仅是军队驻防的要塞，更是彰显部落权威的核心。"
 nd_aia_spice_middlemen: "香料中间商"
 nd_aia_spice_middlemen_desc: "长期以来，阿拉伯商贾始终在香料贸易中扮演着中间商的角色。他们从印度与东南亚的产地收购胡椒、肉桂与丁香，随后以极其高昂的溢价转卖给欧洲与奥斯曼的买家。"
 nd_aia_musket_adoption: "阿拉伯火器列装"
 nd_aia_musket_adoption_desc: "阿拉伯勇士对火器的列装彻底改变了沙漠战争的形态。他们将游牧骑兵的高机动性，与火绳枪毁灭性的火力完美地结合在了一起。"
 nd_aia_sharif_authority: "谢里夫权威"
 nd_aia_sharif_authority_desc: "麦加的谢里夫们因拥有先知穆罕默德后裔的头衔，掌握着一种足以超越部落界限的至高权威。任何能够获得他们背书的统治者，都将获得无可争辩的统治合法性。"
 nd_aia_aden_entrepot: "亚丁转口港"
 nd_aia_aden_entrepot_desc: "亚丁的天然良港扼守着红海与印度洋之间的海峡，自古以来便是海上贸易至关重要的转口枢纽。"
 nd_aia_tribal_cavalry_reform: "部落骑兵改革"
 nd_aia_tribal_cavalry_reform_desc: "传统的贝都因劫掠战法经过正规化整编，化作了纪律严明的骑兵阵列。他们在保留沙漠高机动性与精湛骑术的同时，更被赋予了严密的战术协同能力与明确的战略目标。"
 nd_aia_camel_corps: "骆驼兵团"
 nd_aia_camel_corps_desc: "单峰骆驼凭借其无需饮水便可长途跋涉的绝佳耐力，使我们得以组建出一种特殊的军事建制。这支大军能够自如地穿越那些让传统军队望而却步的绝境险地。"
 nd_aia_wahhabi_reform: "瓦哈比改革运动"
 nd_aia_wahhabi_reform_desc: "1744年，宗教改革家穆罕默德·伊本·阿卜杜勒·瓦哈卜与沙特家族正式结盟。这场同盟缔造了一股势不可挡的宗教政治运动，彻底重塑了整个阿拉伯半岛的格局。"
 nd_aia_ikhwan_warriors: "伊赫万勇士"
 nd_aia_ikhwan_warriors_desc: "伊赫万——这些潜心于宗教研习与武装服役的定居贝都因勇士——将沙漠游牧民的坚韧耐力与狂热信徒的严明纪律完美融为一体。"
 nd_aia_arabian_modernization: "阿拉伯现代化"
 nd_aia_arabian_modernization_desc: "与奥斯曼帝国及欧洲列强的接触，为半岛引入了关于治理、技术与教育的新理念，促使人们在不摒弃传统的前提下，致力于推动半岛的现代化图强之路。"
 nd_aia_oasis_agriculture: "绿洲农业"
 nd_aia_oasis_agriculture_desc: "先进的灌溉技术将散落的绿洲改造成了富饶的农业中心。它不仅供养了更为庞大的人口，更构筑起建立中央集权国家的经济基石。"
 nd_aia_pearl_trade_boom: "珍珠贸易繁荣"
 nd_aia_pearl_trade_boom_desc: "全球对海湾珍珠那永不满足的需求，已将沿海社区蜕变为繁华的贸易中心。珍珠商贾们所积聚的财富，甚至足以与那些垄断沙漠商路的商队巨头相媲美。"
 nd_aia_gulf_patrol: "海湾巡防舰队"
 nd_aia_gulf_patrol_desc: "武装巡防舰扼守着波斯湾与红海的海上生命线。它们不仅保护着阿拉伯的贸易免遭海盗侵扰，更向这片广阔的海洋边疆投射着强大的力量。"
 nd_aia_modern_arab_army: "现代阿拉伯陆军"
 nd_aia_modern_arab_army_desc: "建立一支接受欧洲军事体系训练的常备军，标志着阿拉伯完成了从松散的部落勇士联盟，向能够投射中央集权力量的现代国家的华丽蜕变。"
 nd_aia_arab_nationalism: "阿拉伯民族觉醒"
 nd_aia_arab_nationalism_desc: "一种对阿拉伯共同身份的全新认同意识——深深根植于共同的语言、历史与文化之中——正激发着一场席卷整个半岛、追求政治统一与民族自决的宏大运动。"
 nd_aia_port_modernization: "港口现代化"
 nd_aia_port_modernization_desc: "通过引入欧式码头、仓储网络与修造船设施，阿拉伯港口的现代化改造成功将这座半岛与工业时代的全球经济体系紧密相连。"
 nd_aia_desert_infrastructure: "沙漠基础设施"
 nd_aia_desert_infrastructure_desc: "修筑横跨广袤阿拉伯内陆的公路与通讯网络，史无前例地将那些散落的绿洲与部落领地紧密联结在一起，铸就了一个真正统一的近代国家。"
 nd_aia_tribal_conscription: "部落征召制"
 nd_aia_tribal_conscription_desc: "传统的部落按需提供勇士的义务，如今被正式确立为一套成文的兵役征召体系。这确保了每一个定居点都能为保卫这个统一的国家贡献出自己的一份力量。"
 nd_aia_unified_arab_state: "统一的阿拉伯国家"
 nd_aia_unified_arab_state_desc: "这是数百年心血的终极结晶——一个超越了部落隔阂的中央集权阿拉伯国家已然诞生。它将形形色色的族群，完美地融合在统一的行政管理与共同的身份认同之下。"
 a_nd_aia_bedouin_raider: "贝都因掠袭骑兵"
 a_nd_aia_bedouin_raider_desc: "这些快如闪电的沙漠骑兵由部落征召而来。他们深谙“拉齐亚”之道——这种传统的贝都因劫掠突袭战法，自古以来便让往来商队与定居民闻风丧胆。"
 a_nd_aia_musketeer: "阿拉伯火枪手"
 a_nd_aia_musketeer_desc: "这些纪律严明的步兵列装了火绳枪。他们受过严格的操练，能够先向敌军倾泻毁灭性的排枪齐射，随后拔出标志性的阿拉伯弯刀，以传统的沙漠武德与敌人展开近战肉搏。"
 a_nd_aia_najdi_cavalry: "内志骑兵"
 a_nd_aia_najdi_cavalry_desc: "这支历经整编的部落骑兵来自内志腹地，他们将传统的沙漠骑术与纪律严明的战术阵列完美结合。在干旱与沙漠战争中，他们堪称绝对的霸主。"
 a_nd_aia_camel_rider: "骆驼骑兵"
 a_nd_aia_camel_rider_desc: "这支辅助部队驾驭着吃苦耐劳的单峰骆驼，能够横跨广袤无垠的无水荒原。在任何马匹骑兵都望尘莫及的绝地中，他们能够完美胜任侦察兵、辎重运输队以及轻装战士的角色。"
 a_nd_aia_ikhwan: "伊赫万勇士"
 a_nd_aia_ikhwan_desc: "这些极度狂热的步兵脱胎于定居的贝都因社区。伊赫万勇士的战斗意志源于内心深处那无比坚定的宗教信仰，这股狂热使他们化身为战场上令人胆寒的突击部队。"
 a_nd_aia_modern_infantry: "现代阿拉伯步兵"
 a_nd_aia_modern_infantry_desc: "这些正规步兵接受了欧洲军事体系的严格操练，列装了现代化武器，并被整编为纪律严明的战术阵列。他们已经完全具备了执行持久战役的强大能力。"
 a_nd_aia_tribal_conscript: "部落征召兵"
 a_nd_aia_tribal_conscript_desc: "这些由定居部落社区应征入伍的勇士，为保卫不断扩张的阿拉伯国家版图，提供了不可或缺的海量步兵兵源。"
 n_nd_aia_dhow: "阿拉伯达乌帆船"
 n_nd_aia_dhow_desc: "作为阿拉伯世界标志性的三角帆商船，达乌帆船乘着季风航行时极为轻巧敏捷。不过，与欧洲的正规战舰相比，它们的武装火力则显得较为单薄。"
 n_nd_aia_ocean_dhow: "印度洋达乌帆船"
 n_nd_aia_ocean_dhow_desc: "作为传统达乌帆船的大型远洋升级版，它们能够驾驭漫长的季风航线，在阿拉伯、印度与东非之间穿梭自如。"
 n_nd_aia_patrol_ship: "海湾巡防舰"
 n_nd_aia_patrol_ship_desc: "这是一款专为巡视波斯湾与红海浅水区而设计的武装近海舰只。它们日夜守护着帝国的贸易航线，令其免受海盗与外来闯入者的侵扰。"
 nd_aia_incense_warehouse: "熏香货栈"
 nd_aia_incense_warehouse_desc: "一座为存放珍贵的乳香与没药树脂而建的设防货栈。这些阿拉伯南部的古老财富，曾沿着漫漫商路源源不断地流入地中海世界。"
 nd_aia_falaj_system: "法拉吉灌溉系统"
 nd_aia_falaj_system_desc: "这是一种巧妙利用重力，将深层地下水通过暗渠引至遥远农田的灌溉工程。正是它，让地球上最干旱的土地也能孕育出繁茂的农业。"
 nd_aia_hajj_caravanserai: "朝觐商队驿站"
 nd_aia_hajj_caravanserai_desc: "通往麦加的朝觐路线上的中转驿站，为络绎不绝、前来履行朝觐义务的信徒们提供食物、淡水、庇护所，以及进行贸易的机会。"
 nd_aia_coffeehouse: "摩卡咖啡馆"
 nd_aia_coffeehouse_desc: "这里是商人、学者与旅行者们的聚集地。在此，人们一边品尝着产自也门高地、深邃而醇香的咖啡，一边交流着各地的见闻与思想。"
 nd_aia_desert_qasr: "沙漠营堡"
 nd_aia_desert_qasr_desc: "这是一座由泥砖与石块筑成的坚固沙漠要塞。它扼守着阿拉伯内陆的商路与水源，以抵御劫掠者与外敌的侵犯。"
 nd_aia_entrepot: "转口货栈"
 nd_aia_entrepot_desc: "位于港口城市的大型贸易货栈。来自印度、非洲与欧洲的商品在此进行仓储、分拣与转售，构成了阿拉伯海上贸易的绝对骨干。"
 nd_aia_pearl_house: "采珠商行"
 nd_aia_pearl_house_desc: "一家专门从事海湾地区珍珠贸易的商行，负责对这些数千年来一直是阿拉伯海岸主要财富来源的璀璨珍宝进行分拣、定级与发售。"
 nd_aia_modern_port: "现代化港口"
 nd_aia_modern_port_desc: "一座配备了现代化码头、起重机与修船厂的港口设施，将阿拉伯地区与工业时代的蒸汽海运贸易紧密相连。"
 nd_aia_pearl_harvest: "采珠季"
 nd_aia_pearl_harvest_desc: "采珠人潜入阿拉伯湾的珠母贝海床，采收着那些数千年来令海湾沿岸富甲一方的璀璨珍珠。"
 nd_aia_date_processing: "椰枣加工"
 nd_aia_date_processing_desc: "对半岛广袤椰枣林中产出的果实进行采收、晾晒与包装，以便将其销往整个伊斯兰世界。"
 nd_aia_oasis_farming: "绿洲农业"
 nd_aia_oasis_farming_desc: "在沙漠绿洲中采用金属农具与畜力牵引的先进灌溉耕作体系。该体系生产的小麦、蔬菜与饲料创造出了充沛的农业盈余，足以养活更大规模的定居社区。"
 nd_incense_storage: "熏香库房"
 nd_incense_storage_desc: "储藏与分拣来自阿拉伯熏香商路的乳香与没药，并用布匹将其层层包裹，以妥善保存这些珍贵的树脂以便出口外销。"
 nd_falaj_maintenance: "法拉吉维护"
 nd_falaj_maintenance_desc: "使用石质衬里与木质支架对地下水渠进行维护。"
 nd_hajj_provisions: "朝觐补给"
 nd_hajj_provisions_desc: "为前往麦加的朝觐商队筹备牲畜与谷物等物资，以保障其漫长的神圣旅途。"
 nd_coffee_service: "咖啡供应"
 nd_coffee_service_desc: "采购并烘焙来自摩卡的咖啡豆，将其盛放在精致的陶瓷杯中，呈给那些频繁光顾咖啡馆的商贾与学者们。"
 nd_qasr_garrison: "营堡驻军"
 nd_qasr_garrison_desc: "武装并补给沙漠营堡的驻军，为他们提供武器、用于修缮城墙的石料，以及用于维护盔甲与装备的皮革。"
 nd_entrepot_operations: "转口运营"
 nd_entrepot_operations_desc: "在大型转口港管理进口纺织品、陶器及腌制货物的仓储与转运。在这里，盐被用于为货物防腐，以抵御漫长的海上航行。"
 nd_pearl_sorting: "珍珠分拣"
 nd_pearl_sorting_desc: "使用细布对海湾珍珠进行分拣、定级与抛光，并借助采珠业的专门工具进行加工，以备将其出售给国际商贾。"
 nd_port_operations: "港口运营"
 nd_port_operations_desc: "运营一座配备木制码头与海军军需品的现代化港口设施。"
 nd_aia_formed_tt: "阿拉伯已成立"
 nd_aia_path_a_tt: "已选择“先知之剑”路线"
 nd_aia_path_b_tt: "已选择“文明摇篮”路线"
 STATIC_MODIFIER_NAME_nd_sword_of_the_prophet: "先知之剑"
 STATIC_MODIFIER_DESC_nd_sword_of_the_prophet: "统一的阿拉伯国家必将由信仰之剑铸就，其铁骑席卷大漠，将一盘散沙的部落归于同一面旗帜之下。从麦加到最遥远的绿洲，战斗的号角必将响彻云霄。"
 STATIC_MODIFIER_NAME_nd_cradle_of_civilization: "文明摇篮"
 STATIC_MODIFIER_DESC_nd_cradle_of_civilization: "阿拉伯地处三大洲的十字路口，是熏香商路、朝觐贸易以及曾照亮从巴格达到科尔多瓦的学术传统的继承者。这一商业与学术的遗产，必将成为建立更伟大国家的基石。"
 STATIC_MODIFIER_NAME_nd_aia_mocha_trade_boom: "摩卡贸易繁荣"
 STATIC_MODIFIER_DESC_nd_aia_mocha_trade_boom: "摩卡港商旅穿梭，一派繁荣景象。来自欧洲、印度与非洲的商人们汇聚于此，只为交易那些早已征服了世界味蕾、散发着浓郁香气的深色豆子。"
 STATIC_MODIFIER_NAME_nd_aia_wahhabi_zeal: "瓦哈比狂热"
 STATIC_MODIFIER_DESC_nd_aia_wahhabi_zeal: "这种严苛的改革信条席卷了整个半岛，清除了其信徒眼中的异端创新，并引导信众回归到早期世代纯正的信仰实践之中。"
 STATIC_MODIFIER_NAME_nd_aia_wahhabi_pragmatism: "务实改革"
 STATIC_MODIFIER_DESC_nd_aia_wahhabi_pragmatism: "宗教复兴的冲动已受到了政治现实主义的节制，由此缔造了一个既看重教义纯洁，又能保持统治这片多元化半岛所需之外交灵活性的国家。"
 STATIC_MODIFIER_NAME_nd_aia_coffee_monopoly: "咖啡垄断"
 STATIC_MODIFIER_DESC_nd_aia_coffee_monopoly: "对也门高地咖啡种植园与摩卡出口设施的严格控制，造就了对这一全球最风靡商品的垄断地位。"
 nd_aia_destiny: "阿拉伯的命运"
 nd_aia_destiny_desc: "随着阿拉伯完成统一，其未来的走向已成为最受瞩目的焦点。这座半岛究竟该向外寻求征服与信仰，还是向内发展商业与文明？但在踏上任何一条道路之前，必须首先确保国家的稳定。"
 nd_aia_dest_crescent: "新月沃地"
 nd_aia_dest_crescent_desc: "新月沃地——伍麦叶王朝的都城大马士革与阿拔斯王朝的名城巴格达——曾是阿拉伯文明的核心地带。为了复兴哈里发国，阿拉伯必须首先收复这些古老的都城，并打造一支足以担此重任的大军。"
 nd_aia_dest_jihad: "信士的圣战"
 nd_aia_dest_jihad_desc: "圣城耶路撒冷与古老的埃及大地必须被纳入复兴的阿拉伯国家麾下。坐拥开罗的财富与耶路撒冷的神圣，哈里发国领导穆斯林世界的宣称将变得无可撼动。"
 nd_aia_dest_caliphate: "哈里发国复兴"
 nd_aia_dest_caliphate_desc: "从阿勒颇到巴士拉，从摩苏尔到大漠边缘，初代哈里发国的全境必须在阿拉伯的统治下重新统一。这是终极的雄心壮志——一个由阿拉伯统治并以强权捍卫的伊斯兰文明新黄金时代。"
 nd_aia_dest_gulf: "海湾霸主"
 nd_aia_dest_gulf_desc: "霍尔木兹海峡与阿曼的诸多港口控制着印度洋与波斯湾之间的贸易动脉。若要成为世界的十字路口，阿拉伯必须首先掌控这些至关重要的咽喉要道，并积累由其产生的巨额财富。"
 nd_aia_dest_monsoon: "季风航线"
 nd_aia_dest_monsoon_desc: "阿拉伯商贾乘着季风航行已有数千年之久，但现代商业需要现代化的体制。银行业、成熟的市场以及曾让阿拉伯富甲一方的熏香，必须被统统加以利用，以建立一个足以与世上任何国家匹敌的贸易文明。"
 nd_aia_dest_crossroads: "大洲十字路口"
 nd_aia_dest_crossroads_desc: "亚丁扼守着红海与印度洋之间的航道，是连接三大洲的枢纽。随着对全球贸易体制的接纳以及巨额财富的积累，阿拉伯终能宣示其最终的天命——并非作为征服者，而是作为全球商业流动不可或缺的绝对枢纽。"
 nd_aia.5.t: "阿拉伯的崛起"
 nd_aia.5.d: "半岛已经统一，诸部落皆已宣誓效忠，圣城也处于我们的保护之下。几个世纪以来，首次有一个阿拉伯国家赢得了世界列强的敬畏。如今的问题已不再是阿拉伯是否会崛起，而是它能达到怎样的高度。"
 nd_aia.5.a: "天命在前。"
 nd_aia.6.t: "收复新月沃地"
 nd_aia.6.d: "大马士革与巴格达，这两颗阿拉伯文明的璀璨明珠，再次听命于一位阿拉伯君王。昔日回荡着历代哈里发旨意的宏伟清真寺，将再次响彻复兴的阿拉伯国家之权威。新月沃地，这个帝国的粮仓正如同昔日哺育阿拔斯王朝一般，滋养着我们的雄心壮志。"
 nd_aia.6.a: "古老的都城再次归我们所有。"
 nd_aia.7.t: "圣地已入掌控"
 nd_aia.7.d: "耶路撒冷已处于我们的保护之下，埃及的财富正源源不断地流入我们的国库。复兴的阿拉伯国家如今不仅掌握着圣地的精神权威，更坐拥尼罗河流域的物质资源。然而，一个问题摆在面前：我们是该带着尚武的狂热继续推进，攻克沿途的每一座堡垒？还是该依靠驻军与耐心来巩固这些广袤的战果，让我们的力量在坚固的城墙后茁壮成长？"
 nd_aia.7.a: "毫不留情地继续进攻！"
 nd_aia.7.b: "巩固现有疆土，积蓄实力。"
 nd_aia.8.t: "哈里发国重生"
 nd_aia.8.d: "从地中海的海岸到底格里斯河的源头，从西奈的沙漠到库尔德斯坦的群山——哈里发国重生了。自哈伦·拉希德时代以来，还从未有过哪位阿拉伯君主能够统治如此广袤的疆域。当阿拉伯在历史上伟大帝国的行列中占据一席之地时，全世界都在拭目以待。\n\n但这个复兴的哈里发国将如何定义自身？是作为以武力扩张信仰的利剑？还是作为以智慧统治多元族群，并以公正的手段赢得其忠诚的贤明统治者？\""
 nd_aia.8.a: "我们将凭真主之剑夺取胜利！"
 nd_aia.8.b: "正义与智慧将成为我们的遗产。"
 nd_aia.9.t: "海峡霸主"
 nd_aia.9.d: "霍尔木兹这一重要咽喉已归我们所有，古老的马斯喀特港也飘扬着阿拉伯的旗帜。如今，每一艘航行于印度洋与波斯湾之间的船只都必须承认阿拉伯的霸权。印度、波斯与东非的财富，皆流经由我们掌控的海域。"
 nd_aia.9.a: "这片海湾即是阿拉伯之海。"
 nd_aia.10.t: "季风"
 nd_aia.10.d: "我们的商贾乘着季风从海湾远航至印度乃至更远的地方，而我们的银行则为途经我国港口的贸易提供资金支持。古老的熏香商路已让位于现代化的商业网络，但阿拉伯依然稳居其中心。\n\n我们是该建立一支海军，以武力来保护并强行维持我们的海上霸权？还是该专注于贸易体制的建设——银行、交易所与商行——让我们的港口变得不可或缺，无论谁在海上称霸？"
 nd_aia.10.a: "用阿拉伯战舰称霸海洋！"
 nd_aia.10.b: "建立让我们致富的体制。"
 nd_aia.11.t: "世界的十字路口"
 nd_aia.11.d: "阿拉伯屹立于三大洲的交汇处，全球贸易皆流经我国港口。从亚丁到霍尔木兹，从吉达到马斯喀特，阿拉伯商贾将欧洲与亚洲、非洲与东方紧密相连。我们的银行为跨洋探险提供资金，我们的市场所定下的价格甚至在遥远的异国国都引起回响。\n\n这正是阿拉伯商业的极盛时期。我们是该利用这一地位来孕育一个在艺术、学术与外交上焕然一新的黄金时代？还是该将我们的商业优势发挥到极致，确保阿拉伯始终是所有贸易必须经过的、不可或缺的十字路口？"
 nd_aia.11.a: "开启一个崭新的黄金时代！"
 nd_aia.11.b: "我们即是十字路口。让全世界向我们付钱。"
 STATIC_MODIFIER_NAME_nd_aia_dest_militant_jihad: "尚武圣战"
 STATIC_MODIFIER_DESC_nd_aia_dest_militant_jihad: "哈里发国的勇士们以狂热的勇气猛攻敌方堡垒，凭借纯粹的凌厉攻势与战术主动性彻底压垮守军。"
 STATIC_MODIFIER_NAME_nd_aia_dest_caliphal_garrison: "哈里发卫戍"
 STATIC_MODIFIER_DESC_nd_aia_dest_caliphal_garrison: "密集的要塞驻军网络守卫着哈里发国广袤的新疆土，凭借加固的城墙与训练有素的军队，在被征服的土地上维持着秩序。"
 STATIC_MODIFIER_NAME_nd_aia_dest_sword_of_islam: "伊斯兰之剑"
 STATIC_MODIFIER_DESC_nd_aia_dest_sword_of_islam: "哈里发国的战争机器以冷酷无情的极高效率运转着，支撑着跨越无垠疆域的漫长远征；与此同时，虔诚的信士们正以不知疲倦的献身精神奋勇杀敌。"
 STATIC_MODIFIER_NAME_nd_aia_dest_just_caliph: "公正的哈里发"
 STATIC_MODIFIER_DESC_nd_aia_dest_just_caliph: "哈里发以智慧与公平治国，通过公正的行政管理与精明的情报网络，赢得了多元族群的忠诚。"
 STATIC_MODIFIER_NAME_nd_aia_dest_maritime_dominion: "海上霸权"
 STATIC_MODIFIER_DESC_nd_aia_dest_maritime_dominion: "阿拉伯战舰牢牢掌控着至关重要的海上航线，不仅封锁竞争对手，更护卫着那些满载三大洲财富的商船队。"
 STATIC_MODIFIER_NAME_nd_aia_dest_trading_empire: "贸易帝国"
 STATIC_MODIFIER_DESC_nd_aia_dest_trading_empire: "一张庞大的商船网络将阿拉伯的港口与遍布整个印度洋的市场紧密相连，而这一切全赖于经验丰富的船长与优渥的金融信贷支持来维系。"
 STATIC_MODIFIER_NAME_nd_aia_dest_golden_age: "阿拉伯黄金时代"
 STATIC_MODIFIER_DESC_nd_aia_dest_golden_age: "一场横跨艺术、学术与外交领域的复兴正从阿拉伯半岛辐射开来，贸易所带来的巨额财富资助着已知世界各地的学者、艺术家与外交使节。"
 STATIC_MODIFIER_NAME_nd_aia_dest_worlds_crossroads: "世界的十字路口"
 STATIC_MODIFIER_DESC_nd_aia_dest_worlds_crossroads: "阿拉伯已成为全球商业不可或缺的枢纽，每一条贸易路线皆交汇于此，每一位商贾都必须向扼守海峡的卫士进贡。"
 nd_aia_caliphal_diwan: "哈里发政务院"
 nd_aia_caliphal_diwan_desc: "复兴的哈里发国的中央行政机构。书记官在此记录法令，保管税务名册，并以有条不紊的严密方式处理着统治庞大帝国的各项政务。"
 nd_aia_trade_exchange: "阿拉伯贸易交易所"
 nd_aia_trade_exchange_desc: "这是一座宏伟的商贸集市，来自三大洲的商贾汇聚于此洽谈生意。这里建有永久性的交易大厅与固若金汤的货栈，并驻扎着代表从印度到欧洲各地商业利益的常驻代理商。"
 nd_aia_diwan_administration: "政务院行政体系"
 nd_aia_diwan_administration_desc: "维持哈里发官僚机构的运转需要成卷的纸张来记录档案，需要精美的布料来裁制官服，还需要蜂蜡来为帝国的法令加盖封印以明真伪。"
 nd_aia_exchange_operations: "交易所运营"
 nd_aia_exchange_operations_desc: "维持一座大型贸易交易所的运转需要纸张来拟定契约与登记账册，需要布匹来打包货物，还需要称重、计量以及妥善保管商品的各类器具。"