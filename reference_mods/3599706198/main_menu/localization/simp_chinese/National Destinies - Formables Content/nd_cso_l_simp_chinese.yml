l_simp_chinese:
 nd_cso.1.t: "大宋复兴"
 nd_cso.1.d: "大宋的旗帜再次飘扬在杭州上空。昔日这个王朝曾在女真人的猛攻下被迫南渡，如今它却统治着世界上最富庶、最开化的领土。长江流域商业繁荣，沿岸都会令欧洲任何城市相形见绌，其在纸币、火药和印刷术上的革新更是无人能及。\n\n但大宋面临着一个自开国以来就一直决定其命运的抉择：它究竟该成为何种强权？帝国的力量向来不在于军队，而在于商贾与学者。这个复兴的王朝是该在无可匹敌的海上贸易之上继续筑基，还是该转向内求，去完善那将治国理政本身化作一门艺术的理学官僚制度？\n\n#bold 这一抉择将在传统界面中解锁一条天命路线。#!"
 nd_cso.1.a: "我们的船队将载着大宋的财富驶向四海。"
 nd_cso.1.b: "科场乃帝国之基石。"
 nd_cso.2.t: "纸币革命"
 nd_cso.2.d: "在杭州与成都的集市上，商贾们交易着由大宋国库作保的纸质票券——世界上最早由官方发行的纸币“交子”。其发轫之初不过是私人商贾间的汇票，如今却已掀起了一场金融革命。徽州与杭州的印钞局各自雇佣了逾千名工匠，他们印制的货币为这空前庞大的商业经济提供了运转的润滑剂。\n\n然而，纸币亦是一把双刃剑。流通泛滥会滋生通货膨胀、侵蚀信任；供给匮乏又会令商业失去繁荣所需的流动性。宫廷必须做出决断：是扩张货币供应以刺激贸易，还是施加严格监管以维系财政稳定？"
 nd_cso.2.a: "增印货币——商业必须自由流转。"
 nd_cso.2.b: "管控供应——稳定重于一切。"
 nd_cso.3.t: "长江上的惊雷"
 nd_cso.3.d: "1161年的采石之战中，大宋的车船在长江上伏击了一支规模远超己方的金国运输舰队。甲板上的抛石机投掷出霹雳炮，将敌舰轰得粉碎；与此同时，大宋水师驾驶着车船以传统桨帆船无法匹敌的速度穿梭于残骸之间。金军全军覆没，长江防线岿然不动。\n\n这场胜利证明了革新胜于数量。我们的水师工匠已然掌握了车船的机械结构，制造出的舰船能够逆流而上、在狭窄水道中灵活机动，并迅速逼近敌舰。现在的问题在于该如何利用这一优势。"
 nd_cso.3.a: "打造一支进攻型舰队，将战火烧向北方。"
 nd_cso.3.b: "巩固长江防线——让我们的腹地坚不可摧。"
 nd_cso.4.t: "朱子理学之集大成"
 nd_cso.4.d: "大儒朱熹已完成了他对儒家传统典籍《四书》（即《论语》、《孟子》、《大学》与《中庸》）的宏篇注疏。他将早先的理学思想融汇成一个严密的哲学体系，强调“理”乃塑造宇宙的秩序法则，而“格物”则是通达真理之途。\n\n朱熹的著作将在未来数个世纪中重塑中国的思想界。其注疏可化作科举取士的正统基石，以此培养深谙道德伦理的官员；抑或，他对于“格物”的重申也能被引向经世致用与实证探究之道。"
 nd_cso.4.a: "奉《四书》为治学之唯一圭臬。"
 nd_cso.4.b: "鼓励于万事万物中践行格物致知。"
 nd_cso.5.t: "火枪研制大成"
 nd_cso.5.d: "大宋的方士与军器监匠人已将火枪臻于完善——这是一种将装填有火药与弹丸的竹管或金属管绑缚于枪杆之上的兵器。临阵之时，士卒点燃火药，向敌阵喷吐出烈焰与金属破片，随后再以长枪与敌近战。此等利器威力骇人，堪称世所罕见。\n\n我们的兵法总集《武经总要》中已载明了不同威力的火药配方。如今，火枪正陆续配发给驻守长江防线的步兵部曲，令大宋将士在面对占据优势的北方骑兵时，能于近战中斩获决定性的优势。"
 nd_cso.5.a: "火枪必将成为我军之标志。"
 nd_cso.6.t: "活字与印本"
 nd_cso.6.d: "匠人毕昇发明了一种全新的印刷术：将一枚枚泥活字排列于铁板之上，并敷以松脂与黄蜡的混合物。加热后字模便牢牢固定；冷却后又可拆解重排，以印制下一页。尽管在印制大批典籍时，雕版印刷仍占主流，但毕昇的活字术却令印制任何文本皆成为可能，免去了耗资雕刻整块木板的糜费。\n\n如今，杭州各大印书坊一年内刊印的书籍，已然胜过多数王国皇家书库的全部馆藏。此等技艺，辅以大宋精湛的造纸术，正在缔造一个世所罕见的文教昌盛之世。"
 nd_cso.6.a: "知识乃大宋国力之基石。"
 nd_cso_paddle_wheel_fleet: "车船传统"
 nd_cso_paddle_wheel_fleet_desc: "大宋水师首创了以人力踏车驱动的车船战舰，使其在江河与沿海水域皆具备卓越的速度与机动性。"
 nd_cso_jiaozi_system: "交子币制"
 nd_cso_jiaozi_system_desc: "世界上最早由官方发行的纸币，造就了规模空前的商业经济。"
 nd_cso_iron_smelting: "大宋冶铁业"
 nd_cso_iron_smelting_desc: "至1078年，得益于燃煤高炉的应用，大宋的年铁产量已高达125,000吨——较以往激增了六倍。"
 nd_cso_civilian_supremacy: "崇文抑武"
 nd_cso_civilian_supremacy_desc: "大宋奉行“重文轻武”之国策——即以文官统御武将——由此缔造了同时代最为精密完善的官僚制国家。"
 nd_cso_river_navy_levy: "内河水师征召兵"
 nd_cso_river_navy_levy_desc: "自1132年起，大宋维持着一支常备的内河水师。作为中国历史上的首支常备水军，其兵员皆由征召的江河船夫充任。"
 nd_cso_yangtze_defense: "长江防线"
 nd_cso_yangtze_defense_desc: "这条大江构成了南宋首要的防御屏障，沿线部署着驻军、烽燧与巡江水师以巩固防务。"
 nd_cso_fire_lance_corps: "火枪营"
 nd_cso_fire_lance_corps_desc: "大宋士卒所装备的火枪，乃是一种装填火药、能喷吐烈焰与破片的长枪；这些将士也由此构成了世上最早的火器步兵。"
 nd_cso_fire_lance_levies: "火枪征召兵"
 nd_cso_fire_lance_levies_desc: "从平民中征募的火枪士卒，将早期的火器引入了大宋的征召兵制之中。"
 nd_cso_movable_type: "活字印刷术"
 nd_cso_movable_type_desc: "约1040年，毕昇发明的泥活字引发了印书业的革命，使大宋成为了当时世上文教最为昌盛的国度。"
 nd_cso_zhuxi_synthesis: "理学集大成"
 nd_cso_zhuxi_synthesis_desc: "朱熹对《四书》的注疏将理学思想融会贯通，并在随后七个世纪中，成为了中国治国理政的思想基石。"
 nd_cso_commercial_revolution: "商业革命"
 nd_cso_commercial_revolution_desc: "大宋的经济转型——在城市化、纸币与海上贸易的推动下，从传统的农业贡赋之国蜕变为了商业强权。"
 nd_cso_tea_trade: "茶叶贸易网"
 nd_cso_tea_trade_desc: "茶叶成为了大宋最重要的商贸大宗，而那些获官府特许的茶肆则化作了贸易往来与文化交融的枢纽。"
 nd_cso_tower_ships: "楼船营造"
 nd_cso_tower_ships_desc: "这是一种设有多层甲板的重甲战舰，能够搭载数百名甲士并在甲板上架设抛石机，足以主宰江河与沿海的水战。"
 nd_cso_thundercrash_weapons: "震天雷"
 nd_cso_thundercrash_weapons_desc: "这是一种由抛石机抛射的铁壳火药弹，因其爆裂时发出骇人的巨响而得名——此乃早期爆炸型火炮之雏形。"
 nd_cso_compass_navigation: "罗盘航海"
 nd_cso_compass_navigation_desc: "大宋水手首创了将磁罗盘应用于航海导航之举，使得前往南洋乃至更远海域的远洋航行变得切实可靠。"
 nd_cso_porcelain_mastery: "瓷器外销大成"
 nd_cso_porcelain_mastery_desc: "大宋的青瓷与白瓷成为了风靡整个亚洲与环印度洋世界、最为抢手的奢华奇珍。"
 nd_cso_legal_codification: "律法编纂"
 nd_cso_legal_codification_desc: "对大宋律法进行系统性的修定与汇编，由此造就了中世纪世界最为完备的律法体系之一。"
 nd_cso_maritime_silk_route: "海上丝绸之路"
 nd_cso_maritime_silk_route_desc: "由于陆上商道被敌对的草原政权所阻断，大宋商贾开辟了海上商路，满载着丝绸、瓷器与茶叶横跨印度洋。"
 nd_cso_ironclad_vessels: "铁甲车船"
 nd_cso_ironclad_vessels_desc: "及至1203年，大宋的工匠已开始尝试为车船装裹铁甲，由此缔造了世上最早的铁甲战舰。"
 nd_cso_trade_junk_fleet: "杭州远航商船队"
 nd_cso_trade_junk_fleet_desc: "这些以杭州为母港的海舶航速轻捷且稳健耐波，兼具庞大的载货量与自卫武备，专为横跨大洋的远洋商贸而造。"
 nd_cso_iron_bombs: "铁火炮"
 nd_cso_iron_bombs_desc: "从易碎软壳向铸铁外壳的跨越，令火药弹的杀伤力与爆炸波及范围得到了飞跃式的提升。"
 nd_cso_waterway_mastery: "河渠经略"
 nd_cso_waterway_mastery_desc: "大宋于运河、船闸及内河运输方面的深厚造诣，造就了当时世上无出其右的对内贸易网络。"
 nd_cso_examination_reform: "科举改制"
 nd_cso_examination_reform_desc: "对科举取士之制进行扩容与完善，拓宽了入仕之途，令选官任能真正做到了唯才是举。"
 nd_cso_rice_intensification: "水稻精耕细作"
 nd_cso_rice_intensification_desc: "早熟占城稻的引进与双季稻法的推广，令长江流域的粮食产量得以激增。"
 nd_cso_naval_supremacy: "大宋水师霸权"
 nd_cso_naval_supremacy_desc: "这是数百年来水师革新的集大成之作。凭借着车船、火器武备与铁甲装裹，大宋由此确立了无可撼动的水上霸权。"
 nd_cso_monetary_policy: "钱钞经略"
 nd_cso_monetary_policy_desc: "对纸钞发行、息钱利率及国库储备进行精细运筹，由此开创了近代财政运作之先河。"
 nd_cso_industrial_iron: "规模化铁冶"
 nd_cso_industrial_iron_desc: "燃煤高炉被扩容至了产业化规模，由此产出的大量钢铁，足以维系海内武备、器械及各项土木营造之需。"
 nd_cso_literary_tradition: "典籍编纂"
 nd_cso_literary_tradition_desc: "大宋历来奉行纂修巨秩类书之传统，将从天文历算乃至农桑水利等诸般领域的学识予以妥善保存与系统梳理。"
 nd_cso_coastal_defense: "海防革新"
 nd_cso_coastal_defense_desc: "于南方沿岸修筑炮台与烽堠，并广布巡海水师，以此巩固沿海防务，护卫大宋的海路商贸。"
 nd_cso_industrial_modernization: "实业维新"
 nd_cso_industrial_modernization_desc: "将大宋百工之传统技艺融入近代的实业生产之中，令传统工坊实现机械化运转，进而大幅扩充产能。"
 nd_cso_maritime_modernization: "船政维新"
 nd_cso_maritime_modernization_desc: "大宋的商舶与水师全面迈向近代化，将造船与航海技术的最新成果尽数融入其中。"
 nd_cso_constitutional_reform: "立宪改制"
 nd_cso_constitutional_reform_desc: "将大宋唯才是举的传统正式编纂成典，确立为治国理政与依法治世的宪政基石。"
 nd_cso_modern_education: "新式学制"
 nd_cso_modern_education_desc: "将传统的理学书院改组为新式学堂网络，由此延续了大宋文教昌盛、普及识字的传统。"
 nd_cso_delta_industry: "江南实业"
 nd_cso_delta_industry_desc: "长江三角洲本就是世上物产最为丰饶之地，如今更是化作了驱动近代实业经济轰鸣向前的核心引擎。"
 n_nd_cso_paddle_warship: "车船战舰"
 n_nd_cso_paddle_warship_desc: "这是一种由人力踏车驱动、航速奇快的战舰，甲板上架设有专门抛射火药弹的抛石机。大宋车船的机动性足以令同时代的任何桨帆战船望尘莫及。"
 n_nd_cso_paddle_warship_levy: "征召车船"
 n_nd_cso_paddle_warship_levy_desc: "一艘征调自大宋内河水师的车船。"
 a_nd_cso_fire_lance: "突火枪兵"
 a_nd_cso_fire_lance_desc: "这些精锐步卒装备着突火枪——这是一种将装填火药的火筒绑缚于长枪前端的兵器。在短兵相接之前，士卒可借此向敌军喷射烈焰与破片。这是大宋军阵中独步天下的骇人利器。"
 a_nd_cso_fire_lance_levy: "突火枪乡兵"
 a_nd_cso_fire_lance_levy_desc: "这是一群装备了突火枪的征召步卒，令大宋的乡兵与征召体系也得以列装火器。"
 n_nd_cso_tower_ship: "楼船"
 n_nd_cso_tower_ship_desc: "这是一种设有多层船楼并装裹铁甲的巨型战舰，足可搭载数百名甲士与舰载抛石机。凭借着庞大的体量与凶猛的火力，大宋楼船在内河与沿岸的水战中确立了绝对的统治力。"
 a_nd_cso_thundercrash: "震天雷炮"
 a_nd_cso_thundercrash_desc: "这是一种能够抛射铁壳火药弹的早期火炮，杀伤力极具毁灭性。因其爆裂时会发出宛如雷震的骇人巨响而得名。"
 n_nd_cso_ironclad_galley: "铁甲快船"
 n_nd_cso_ironclad_galley_desc: "这是一种以铆接铁板作为装甲的车船战舰。它不仅拥有媲美传统桨帆船的奇快航速，更能在面对敌军火力时，展现出史无前例的防护力。"
 n_nd_cso_trade_junk: "杭州海舶"
 n_nd_cso_trade_junk_desc: "这是一种出自杭州的商贸海舶，航速轻捷且稳健耐波。为了在海上丝绸之路上防身自卫，船上特意配有武备。这些海舶满载着大宋的奇珍异货，最远甚至能航行至东非之滨。"
 nd_cso_iron_foundry: "大宋铁冶监"
 nd_cso_iron_foundry_desc: "这处庞大的设施群采用燃煤高炉，能够以产业化规模量产钢铁。及至1078年，大宋各处铁冶的钢铁产量，甚至超越了七个世纪后的英格兰。"
 nd_cso_currency_bureau: "交子务"
 nd_cso_currency_bureau_desc: "这是一处印造交子纸钞的官办印钞局。署内雇佣了上千名工匠，由此发行了世界上最早的法定纸币。"
 nd_cso_naval_shipyard: "大宋水师船坞"
 nd_cso_naval_shipyard_desc: "这是一处专门营建车船战舰的官办船坞。其内不仅设有测试人力踏车的校场，更配备了专司装配铁甲的作坊。"
 nd_cso_printing_house: "大宋印书坊"
 nd_cso_printing_house_desc: "这处印书坊兼采雕版与活字之术刊印典籍，源源不断地为这个世上文教最为昌盛的国度供给书卷。"
 nd_cso_gunpowder_arsenal: "大宋火药作"
 nd_cso_gunpowder_arsenal_desc: "这是一处专司火器研制与督造的军工重地。署内工匠皆严格遵照《武经总要》所载之秘方，大批量产突火枪、震天雷以及各类火药。"
 nd_cso_tea_house: "大宋茶坊"
 nd_cso_tea_house_desc: "这是一处领有官凭的商贾与文雅之所。客商们在繁复讲究的点茶仪式间洽谈营生，令此地一跃成为商贸往来与文人雅集的交汇枢纽。"
 nd_cso_riverine_fort: "长江要塞"
 nd_cso_riverine_fort_desc: "这是一处扼守长江战略要冲的坚固戍堡，亦是南宋江防体系的重要一环。正是凭借这道防线，大宋在百余年间成功将北方的入侵者拒之于大江之外。"
 nd_cso_academy: "理学书院"
 nd_cso_academy_desc: "这是一处尊崇朱子之学的理学重镇。大宋的士大夫们在此潜心格物致知，并借此涵养自身的德性。"
 nd_cso_blast_furnace: "Coal-Fired Blast Furnace"
 nd_cso_blast_furnace_desc: "Industrial iron smelting using coal fuel and water-powered bellows, producing steel at unprecedented scale."
 nd_cso_advanced_smelting: "Advanced Steel Production"
 nd_cso_advanced_smelting_desc: "Refined smelting techniques using copper alloys and higher-grade coal, producing superior steel for weapons and tools."
 nd_cso_currency_printing: "Currency Printing"
 nd_cso_currency_printing_desc: "Specialized printing of paper money using multi-color ink, silk fiber paper, and complex designs to prevent counterfeiting."
 nd_cso_shipyard_upkeep: "Shipyard Operations"
 nd_cso_shipyard_upkeep_desc: "Maintenance of paddle-wheel construction facilities, including timber yards, iron workshops, and treadmill assembly areas."
 nd_cso_book_printing: "Book Printing"
 nd_cso_book_printing_desc: "Mass production of books using woodblock and movable type techniques, spreading literacy and knowledge throughout the realm."
 nd_cso_arsenal_upkeep: "Arsenal Operations"
 nd_cso_arsenal_upkeep_desc: "Production and storage of gunpowder weapons, including the mixing of saltpeter, sulfur, and charcoal according to classified formulas."
 nd_cso_tea_service: "Tea Service"
 nd_cso_tea_service_desc: "The elaborate preparation and service of tea using fine pottery and beeswax-sealed containers, central to Song commercial and cultural life."
 nd_cso_fort_garrison: "Fort Garrison"
 nd_cso_fort_garrison_desc: "Provisioning and arming of Yangtze river fortifications with weapons, stone for repairs, and rice for the garrison."
 nd_cso_academy_upkeep: "Academy Maintenance"
 nd_cso_academy_upkeep_desc: "Supply of paper, books, and lamp oil for Neo-Confucian academies where scholars study the classics and prepare for examinations."
 levy_nd_cso_fire_lance: "Fire Lance Levy"
 levy_nd_cso_fire_lance_desc: "Conscripted fire lance infantry from Song garrison towns."
 levy_nd_cso_paddle_warship: "Paddle-Wheel Levy"
 levy_nd_cso_paddle_warship_desc: "Conscripted paddle-wheel vessels from Song river towns, crewed by rivermen and fishermen."
 nd_cso_silk_workshop: "Song Silk Workshop"
 nd_cso_silk_workshop_desc: "A specialized weaving facility producing the finest silk textiles in the world. Song silk workshops combined traditional techniques with new loom designs to create fabrics traded as far as the Mediterranean."
 nd_cso_porcelain_kiln: "Song Porcelain Kiln"
 nd_cso_porcelain_kiln_desc: "A celadon firing facility producing the distinctive jade-green porcelain that became the most sought-after luxury commodity across Asia and the Indian Ocean world."
 nd_cso_silk_weaving: "Silk Weaving"
 nd_cso_silk_weaving_desc: "Transformation of raw silk into fine cloth using advanced loom techniques and natural dyes, producing textiles of unmatched quality."
 nd_cso_celadon_production: "Celadon Production"
 nd_cso_celadon_production_desc: "Firing of refined clay with coal to produce Song celadon porcelain, prized for its translucent jade-green glaze."
 STATIC_MODIFIER_NAME_nd_cso_maritime_supremacy: "Treasure of the Southern Seas"
 STATIC_MODIFIER_DESC_nd_cso_maritime_supremacy: "With Hangzhou as its glittering capital, the restored Song commands the greatest maritime trade network in the known world, its harbors teeming with junks bearing silk, porcelain, and tea to every shore."
 STATIC_MODIFIER_NAME_nd_cso_confucian_meritocracy: "Mandate of the Brush"
 STATIC_MODIFIER_DESC_nd_cso_confucian_meritocracy: "The Song restoration places scholarship above all else. Through rigorous civil examinations and the wisdom of Neo-Confucian philosophy, the realm is governed by the learned rather than the powerful."
 STATIC_MODIFIER_NAME_nd_cso_paper_money_expansion: "Currency Proliferation"
 STATIC_MODIFIER_DESC_nd_cso_paper_money_expansion: "Paper money flows freely through Song markets, lubricating commerce and enriching merchants across the Yangtze."
 STATIC_MODIFIER_NAME_nd_cso_paper_money_regulation: "Fiscal Discipline"
 STATIC_MODIFIER_DESC_nd_cso_paper_money_regulation: "Careful regulation of paper currency prevents inflation and strengthens the treasury's reserves."
 STATIC_MODIFIER_NAME_nd_cso_yangtze_offensive: "River Dragons Unleashed"
 STATIC_MODIFIER_DESC_nd_cso_yangtze_offensive: "The Song fleet strikes from the Yangtze, paddle-wheels churning and thundercrash bombs falling upon the enemy like hail."
 STATIC_MODIFIER_NAME_nd_cso_yangtze_consolidation: "The River Wall"
 STATIC_MODIFIER_DESC_nd_cso_yangtze_consolidation: "The Yangtze becomes an impassable barrier, fortified positions and patrol fleets denying any crossing to northern invaders."
 STATIC_MODIFIER_NAME_nd_cso_zhuxi_orthodoxy: "The Four Books Ascendant"
 STATIC_MODIFIER_DESC_nd_cso_zhuxi_orthodoxy: "Zhu Xi's commentaries become the foundation of all learning, unifying the realm under a single moral philosophy."
 STATIC_MODIFIER_NAME_nd_cso_zhuxi_pragmatism: "The Investigation of Things"
 STATIC_MODIFIER_DESC_nd_cso_zhuxi_pragmatism: "The Neo-Confucian emphasis on gewu — the investigation of things — drives practical scholarship and administrative efficiency."
 nd_cso_formed_tt: "Southern Song has been formed"
 nd_cso_path_a_tt: "Chose Maritime Prosperity"
 nd_cso_path_b_tt: "Chose Imperial Examinations"
 nd_cso_destiny: "Destiny of the Song"
 nd_cso_destiny_desc: "The Song dynasty has risen again. Now the restored empire must chart its future -- will it look outward across the seas, or inward to perfect the art of governance?"
 nd_cso_dest_fujian_ports: "The Fujian Entrepots"
 nd_cso_dest_fujian_ports_desc: "Quanzhou and Zhangzhou are the greatest ports in the world. Secure them, fill the treasury, and the oceans shall open before us."
 nd_cso_dest_nanyang_trade: "Lords of the Nanyang"
 nd_cso_dest_nanyang_trade_desc: "The spice islands and the Strait of Malacca are the chokepoints of maritime Asia. Song treasure fleets must command these waters."
 nd_cso_dest_ocean_hegemony: "Masters of Every Sea"
 nd_cso_dest_ocean_hegemony_desc: "From the Malabar Coast to the Persian Gulf, Song merchants shall trade in every port. No sea shall be closed to our fleets."
 nd_cso_dest_southern_order: "Order of the Southern Realm"
 nd_cso_dest_southern_order_desc: "Before the Song can look north, it must perfect governance in the south. Establish modern banking, develop the land, and forge a bureaucracy without equal."
 nd_cso_dest_northern_recovery: "Reclaiming the Central Plains"
 nd_cso_dest_northern_recovery_desc: "Kaifeng and Luoyang, the old Song capitals, must be returned to the dynasty. The northern frontier must be secured by force of arms."
 nd_cso_dest_mandate_perfected: "The Mandate Perfected"
 nd_cso_dest_mandate_perfected_desc: "With the old capitals restored and Dadu itself under Song control, the dynasty must achieve a level of development and prestige that proves the Mandate of Heaven is truly theirs."
 nd_cso.7.t: "The Song Endures"
 nd_cso.7.d: "Against all odds, the Song dynasty has survived its crises and emerged stronger than before. The scholars of the Academy speak of a renewed Mandate -- a dynasty that has proven itself through perseverance and good governance. Whether the future lies upon the waves or within the examination halls, the Song shall write the next chapter of its long history."
 nd_cso.7.a: "The Song shall endure for ten thousand years."
 nd_cso.8.t: "The Ports of Fujian"
 nd_cso.8.d: "The great harbor of Quanzhou -- known to Arab merchants as Zayton -- and the bustling entrepot of Zhangzhou are now firmly under Song control. Together with the workshops of Hangzhou, they form a commercial triangle of unmatched wealth. Foreign merchants from Arabia, India, and the Spice Islands crowd the wharves, trading pepper and incense for Song silk and porcelain.\n\nThe Superintendent of Maritime Trade reports customs revenues beyond anything the treasury has seen. The oceans themselves seem to beckon."
 nd_cso.8.a: "Let the Song banner fly above every mast."
 nd_cso.9.t: "Mastery of the Nanyang"
 nd_cso.9.d: "Song influence now stretches across the South China Sea to the Strait of Malacca. Our merchants dominate the trade in spices, camphor, and tropical hardwoods that flows through these waters. The great entrepots of Palembang and Malacca, once independent kingdoms, now operate under Song commercial supervision.\n\nThis achievement has no precedent in Chinese history. The dynasty that was mocked for retreating south has built something no northern empire ever possessed -- a maritime sphere of influence spanning thousands of li."
 nd_cso.9.a: "Monopolize the spice trade at its source."
 nd_cso.9.b: "Bind these kingdoms to the Song as tributaries."
 nd_cso.10.t: "The Song Oceans"
 nd_cso.10.d: "Song treasure fleets now anchor in the harbors of India and the Persian Gulf. The compass-guided junks of Hangzhou carry porcelain and silk to markets that once seemed impossibly distant. At Calicut, Song merchants negotiate alongside Arab traders. At Hormuz, the gateway to the Mediterranean trade, Song goods command premium prices.\n\nThis is a commercial empire without parallel -- built not on conquest alone, but on the superiority of Song navigation, shipbuilding, and the sheer volume of luxury goods our workshops produce."
 nd_cso.10.a: "Continue Zheng He's vision of peaceful exploration."
 nd_cso.10.b: "Assert the Song Mandate over these waters."
 nd_cso.11.t: "A Well-Ordered Realm"
 nd_cso.11.d: "The southern provinces have been transformed. Where once there was frontier wilderness and restive minorities, there are now thriving cities connected by canals, governed by examination-selected magistrates, and linked to the capital through an efficient postal system. The banking houses of Hangzhou finance development across the realm.\n\nThe scholars say that this is what the ancient sages envisioned -- governance through moral example and bureaucratic competence, not through force. The south is ready to serve as the foundation for greater things."
 nd_cso.11.a: "The south is well-ordered. What comes next?"
 nd_cso.12.t: "The Return to the North"
 nd_cso.12.d: "Song banners fly once more over Kaifeng and Luoyang -- the ancient capitals where the dynasty was born. The restoration of the northern heartland has been the dream of every Song patriot since the Jurchen invasion drove the court south. The old Imperial Way in Kaifeng is being rebuilt, its marketplaces and pleasure quarters restored to their former glory.\n\nBut the north has changed in the centuries of foreign rule. Its people have adopted different customs, its fields lie partially fallow, and its cities have shrunk. The question is whether to reconquer aggressively or integrate patiently."
 nd_cso.12.a: "Press the reconquest -- the north must be freed."
 nd_cso.12.b: "Integrate the north gradually into Song order."
 nd_cso.13.t: "The Perfect Dynasty"
 nd_cso.13.d: "From Hangzhou in the south to Dadu in the north, the Song dynasty now governs the most developed, most literate, and most prosperous realm the world has ever known. The civil examination system selects the best minds regardless of birth. The imperial library preserves the accumulated wisdom of three millennia. The land produces more rice, iron, silk, and porcelain than any other civilization.\n\nScholars speak of a new golden age -- one that surpasses even the legendary era of the Three Sovereigns. The Song has not merely restored the Mandate of Heaven; it has perfected it."
 nd_cso.13.a: "Build an eternal bureaucracy to outlast any dynasty."
 nd_cso.13.b: "Patronize a renaissance of arts and learning."
 STATIC_MODIFIER_NAME_nd_cso_dest_spice_monopoly: "Spice Trade Monopoly"
 STATIC_MODIFIER_DESC_nd_cso_dest_spice_monopoly: "Song control of the Nanyang trade routes has created a near-monopoly on the flow of spices to East Asian markets."
 STATIC_MODIFIER_NAME_nd_cso_dest_tributary_network: "Nanyang Tributary Network"
 STATIC_MODIFIER_DESC_nd_cso_dest_tributary_network: "The maritime kingdoms of Southeast Asia acknowledge Song suzerainty, sending tribute missions and receiving trade privileges in return."
 STATIC_MODIFIER_NAME_nd_cso_dest_zheng_he_legacy: "Legacy of the Treasure Fleets"
 STATIC_MODIFIER_DESC_nd_cso_dest_zheng_he_legacy: "Song treasure fleets range across the Indian Ocean, projecting maritime power and commercial influence to every shore."
 STATIC_MODIFIER_NAME_nd_cso_dest_maritime_mandate: "Maritime Mandate"
 STATIC_MODIFIER_DESC_nd_cso_dest_maritime_mandate: "The Song claim sovereignty over the seas themselves, enforcing trading standards and collecting tolls at every chokepoint."
 STATIC_MODIFIER_NAME_nd_cso_dest_reconquest_fervor: "Reconquest Fervor"
 STATIC_MODIFIER_DESC_nd_cso_dest_reconquest_fervor: "The liberation of the old capitals has ignited patriotic fervor across the realm. Song armies march north with the zeal of a righteous cause."
 STATIC_MODIFIER_NAME_nd_cso_dest_northern_integration: "Northern Integration"
 STATIC_MODIFIER_DESC_nd_cso_dest_northern_integration: "Patient administration and cultural outreach gradually restore Song identity in the long-alienated northern provinces."
 STATIC_MODIFIER_NAME_nd_cso_dest_eternal_bureaucracy: "The Eternal Bureaucracy"
 STATIC_MODIFIER_DESC_nd_cso_dest_eternal_bureaucracy: "A perfected examination system and comprehensive legal code create a bureaucracy that can govern effectively regardless of who sits upon the throne."
 STATIC_MODIFIER_NAME_nd_cso_dest_renaissance_court: "Song Renaissance"
 STATIC_MODIFIER_DESC_nd_cso_dest_renaissance_court: "The Song court becomes the patron of a new golden age of arts, letters, and natural philosophy, attracting scholars from across the known world."
 nd_cso_treasure_fleet_harbor: "Treasure Fleet Harbor"
 nd_cso_treasure_fleet_harbor_desc: "A massive purpose-built harbor facility capable of constructing, outfitting, and supplying the enormous treasure fleet junks that project Song power across every ocean."
 nd_cso_treasure_fleet_maintenance: "Treasure Fleet Maintenance"
 nd_cso_treasure_fleet_maintenance_desc: "Provisioning and upkeep of the great treasure fleet harbor, consuming vast quantities of lumber, naval stores, and iron fittings."
 nd_cso_imperial_library: "Imperial Library"
 nd_cso_imperial_library_desc: "The greatest repository of knowledge in the world, housing millions of volumes covering every branch of learning. The Imperial Library preserves and systematizes the accumulated wisdom of Chinese civilization."
 nd_cso_imperial_library_maintenance: "Library Maintenance"
 nd_cso_imperial_library_maintenance_desc: "Maintaining the vast collections of the Imperial Library requires constant supplies of paper, ink, and expert care to preserve ancient texts."