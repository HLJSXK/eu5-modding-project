l_simp_chinese:
 nd_rus.1.t: "俄罗斯的诞生"
 nd_rus.1.d: "罗斯诸公国已变成统一的帝国。莫斯科、诺夫哥罗德、特维尔、梁赞皆向唯一的君主俯首称臣，双头鹰的羽翼覆盖着广袤疆域。但这将是一个怎样的帝国？东正教教士将莫斯科称为第三罗马，视其为正教会的最后堡垒，注定要引领信徒直至末日。他们主张，沙皇的权威仅源于上帝，帝国的使命便是成为东正教的守护者。\n\n然而，也有人将目光投向东方——望向无垠的草原与西伯利亚的冰封荒野，那里的财富以毛皮计量，新土地延展至想象之外。那些不断开拓边界的哥萨克与拓荒者需要的不是神父，而是火药与补给。他们眼中的帝国并非建立在神圣使命之上，而是凭借征服与贸易，从波罗的海一直延伸到太平洋。\n\n#bold 此选择将在传统标签页中解锁一条命运之路。#!"
 nd_rus.1.a: "莫斯科是第三罗马！绝不会有第四个！"
 nd_rus.1.b: "我们的命运在东方，太平洋及更远的地方。"
 nd_rus.2.t: "射击军军团"
 nd_rus.2.d: "莫斯科街头行进着一支新型士兵。装备着火绳枪与重型钺斧的射击军，是俄罗斯第一支常备步兵部队——他们领取军饷、身着统一制服，并接受火器使用训练。与波雅尔贵族的封建骑兵不同，这些士兵直接效忠于沙皇。最初规模约三千人的军团，现已发展至驻守每座主要城市，其标志性的彩色长袍成为中央集权军事力量的象征。\n\n如今的问题在于如何运用这支力量。是将其训练为纪律严明的野战部队，掌握欧式齐射战术，能够抗衡欧洲大陆任何军队？还是作为卫戍部队，驻守俄罗斯城市与边境要塞的城墙，构成帝国防御网络的支柱？"
 nd_rus.2.a: "将他们训练成一支专业的野战军。"
 nd_rus.2.b: "将他们部署为帝国的驻防中坚力量。"
 nd_rus.3.t: "特辖制"
 nd_rus.3.d: "沙皇将王国一分为二。一半仍由旧有的波雅尔贵族管理，另一半则完全归属沙皇，由禁卫军管辖。这些身着黑衣的骑兵在马鞍旁挂着狗头和扫帚，象征他们嗅出并扫除叛徒的使命。\n\n禁卫军不受任何法庭、法律或波雅尔约束。他们已屠戮诺夫哥罗德的贵族，摧毁庄园，恐吓一切被怀疑不忠之人。旧贵族们瑟瑟发抖。但代价是什么？最精锐的部队调往国内，边疆防御空虚；经济在没收重压下呻吟。这是专制安全的代价吗？抑或克制才是通往稳定的更可靠道路？"
 nd_rus.3.a: "让特辖区管去执行他们的任务，必须将叛乱连根拔起。"
 nd_rus.3.b: "适度进行清洗，帝国需要的是稳定，而非恐怖。"
 nd_rus.4.t: "官秩表"
 nd_rus.4.d: "沙皇颁布了一项新的官秩表，将所有文职和军职分为十四个等级，这一举措动摇了俄罗斯社会的根基。从今以后，国家服务中的晋升将不再取决于出身，而是取决于功绩和资历。达到第八级的平民将自动获得世袭贵族身份。\n\n旧贵族家族对此感到愤怒，认为他们的祖先特权被剥夺了。但沙皇的愿景很明确：俄罗斯需要的是有能力的行政官员和军官，而不是世袭的寄生虫。官秩表为有才能的人打开了政府的大门，不论其出身如何，从而创造了一个新的服务贵族阶层，他们的忠诚是针对国家而非宗族或传统。"
 nd_rus.4.a: "功绩应是衡量一个人的标准。"
 nd_rus.5.t: "制胜的科学"
 nd_rus.5.d: "亚历山大·苏沃洛夫将军以其著作《制胜的科学》彻底革新了俄军军事学说。他的原则残酷且简明：严酷训练、快速机动、刺刀决胜。『刺刀是好汉，子弹是笨蛋”』——他这样教导麾下的掷弹兵。其征战历程已证明这套学说的正确性：历经六十余场战役未尝败绩的苏沃洛夫军团，总以更快的行军速度、更强的打击力量席卷战场。\n\n他的战术强调速度优于谨慎、进攻重于防守，注重单兵主动性而非僵化的阵型操练。经他学派训练的俄国掷弹兵，已成为欧洲最精锐的步兵部队之一。"
 nd_rus.5.a: "刺刀从不撒谎。"
 nd_rus_druzhina_tradition: "伙伴卫队传统"
 nd_rus_druzhina_tradition_desc: "伙伴卫队是效忠于王公的私人骑兵卫队，构成了早期俄罗斯军事力量的核心，这一传统后来演变为边疆地区的哥萨克军团。"
 nd_rus_veche_assemblies: "市民议会"
 nd_rus_veche_assemblies_desc: "市民议会为俄罗斯城市提供了集体决策的论坛，通过公民参与来制衡王公的权力。"
 nd_rus_fur_trade: "毛皮贸易基础"
 nd_rus_fur_trade_desc: "俄罗斯北部的森林盛产黑貂、狐狸和白鼬，这些毛皮构成了早期俄罗斯贸易的支柱，吸引了远至君士坦丁堡和伊斯兰世界的商人前来。"
 nd_rus_gathering_of_lands: "统一罗斯之地"
 nd_rus_gathering_of_lands_desc: "在伊凡三世的统治下，莫斯科系统性地吞并了诺夫哥罗德、特维尔、雅罗斯拉夫尔、罗斯托夫等罗斯公国，将中世纪封邑的拼图锻造成一个统一的国家。"
 nd_rus_third_rome: "第三罗马"
 nd_rus_third_rome_desc: "1453年君士坦丁堡陷落后莫斯科宣称自己是第三罗马，是东正教的最后守护者，而沙皇作为上帝在人间的代表。"
 nd_rus_sudebnik: "全俄罗斯法典"
 nd_rus_sudebnik_desc: "1497年的《全俄罗斯法典》为所有俄罗斯土地确立了统一的法律体系，以由大公法庭执行的中央集权司法取代了各地零散的习惯法。"
 nd_rus_merchant_courts: "会展传统"
 nd_rus_merchant_courts_desc: "会展是俄国商业生活的基石，由国家监管以维持秩序并增加财政收入。"
 nd_rus_stone_kremlins: "石制城堡"
 nd_rus_stone_kremlins_desc: "俄罗斯城市以石料取代了原本的木栅防御，构筑起兼具军事防卫与政治权威的坚固要塞。"
 nd_rus_pomestye_system: "波梅斯季耶服役阶层"
 nd_rus_pomestye_system_desc: "波梅斯季耶制度将有条件的土地庄园授予军事服役人员，以换取骑兵服务，从而创建了一个新的服务于沙皇军队的贵族阶层。"
 nd_rus_boyar_duma: "波雅尔杜马"
 nd_rus_boyar_duma_desc: "波雅尔杜马是由最高级别贵族和教士组成的顾问会议，根据沙皇的意愿商讨国家、战争和法律事务。"
 nd_rus_streltsy_corps: "射击军军团"
 nd_rus_streltsy_corps_desc: "伊凡四世建立了射击军，这是俄罗斯第一支常备火枪步兵部队。他们领取薪饷并统一着装，标志着俄罗斯向职业化军队迈出了决定性的一步。"
 nd_rus_oprichnina: "特辖制"
 nd_rus_oprichnina_desc: "伊凡四世创立了特辖制，这是一个由身着黑衣的特辖区管组成的私人卫队统治的国中之国，他们通过恐怖手段和财产没收来强制执行沙皇的绝对权威。"
 nd_rus_siberian_conquest: "西伯利亚征服"
 nd_rus_siberian_conquest_desc: "征服西伯利亚汗国打开了通往乌拉尔山脉以外广袤荒野的道路，哥萨克探险家与毛皮商人将边疆不断向东推进，直抵太平洋沿岸。"
 nd_rus_orthodox_arts: "东正教文化复兴"
 nd_rus_orthodox_arts_desc: "俄罗斯圣像画、教堂建筑与礼拜音乐达到艺术成就的新高峰，形成了足以与拜占庭艺术相媲美的独特东正教文化传统。"
 nd_rus_smuta_resilience: "动荡时期的坚韧"
 nd_rus_smuta_resilience_desc: "动荡时期将俄罗斯推向了崩溃的边缘——饥荒、外敌入侵、内战与王位觊觎者轮番来袭，但最终挺了过来，并在磨难中淬炼出更强烈的民族认同感与坚韧品格。"
 nd_rus_grain_spirits: "谷物烈酒工业"
 nd_rus_grain_spirits_desc: "俄罗斯酿酒师完善了谷物蒸馏酒的生产工艺，建立起国内产业体系，通过国家专卖垄断销售为国家财政创造了可观的收入。"
 nd_rus_cossack_hosts: "哥萨克军团"
 nd_rus_cossack_hosts_desc: "顿河、扎波罗热和亚伊克的半自治哥萨克社区被正式确立为军事组织，以提供帝国精锐的轻骑兵为代价，换取土地和自治权。"
 nd_rus_prikazy_system: "指挥司系统"
 nd_rus_prikazy_system_desc: "指挥司系统从临时委员会演变为永久性的官僚机构，每个部门负责国家的特定职能——外交、军需供应、财政、司法。"
 nd_rus_patriarch: "莫斯科牧首区"
 nd_rus_patriarch_desc: "1589年莫斯科牧首区的建立，使俄罗斯教会获得完全独立，确立了莫斯科对所有东正教徒的精神权威。"
 nd_rus_new_regiments: "新编军团"
 nd_rus_new_regiments_desc: "欧洲训练的军官以西方军事方法操练俄国士兵，组建起由步兵、龙骑兵和黑骑兵构成的“新式”军团，补充了传统的射击军与封建骑兵力量。"
 nd_rus_ural_ironworks: "乌拉尔炼铁厂"
 nd_rus_ural_ironworks_desc: "乌拉尔山脉蕴藏着丰富的铁矿资源，随着国家资助的铸造厂建立，俄罗斯一跃成为欧洲最大的铁与火炮生产国之一。"
 nd_rus_ulozheniye: "《会议法典》"
 nd_rus_ulozheniye_desc: "《会议法典》确立了俄罗斯国家的社会等级制度，将农民永久束缚于土地成为农奴，并构建了延续两个世纪的专制统治法律框架。"
 nd_rus_don_host: "顿河哥萨克军"
 nd_rus_don_host_desc: "顿河哥萨克被正式承认为帝国的军事阶层，他们为沙皇的征战提供精锐轻骑兵，以换取在顿河沿岸祖传土地上的自治权。"
 nd_rus_petrine_navy: "彼得海军改革"
 nd_rus_petrine_navy_desc: "彼得大帝曾在荷兰和英国的造船厂当过学徒，回国后他从零开始建设俄国海军——建立了海军学院、造船厂，并将新首都圣彼得堡作为面向大海的窗口。"
 nd_rus_baltic_fleet: "波罗的海舰队"
 nd_rus_baltic_fleet_desc: "波罗的海舰队的建立将俄罗斯从一个内陆国家转变为一支能够在波罗的海上竞争的海军力量，挑战瑞典的主导地位，并确保俄罗斯能够进入欧洲贸易。"
 nd_rus_table_of_ranks: "官秩表"
 nd_rus_table_of_ranks_desc: "彼得大帝的官秩表用基于功绩的服务取代了世袭特权，将所有文职和军事职位分为十四个等级，并允许有才能的人不论出身都能晋升。"
 nd_rus_guberniya: "行省制度"
 nd_rus_guberniya_desc: "帝国被重新组织成由中央政府直接任命的总督管理的省区，取代了旧的地方行政体系。"
 nd_rus_military_colonies: "军事殖民"
 nd_rus_military_colonies_desc: "军屯士兵在边疆地区建立，将军事职责与农业生产结合起来，为不断扩张的帝国提供防御和给养。"
 nd_rus_suvorov_school: "苏沃洛夫军事学校"
 nd_rus_suvorov_school_desc: "亚历山大·苏沃洛夫的速度、侵略性和刺刀突击的战术理论培养了一代精英掷弹兵，他们以无与伦比的凶猛和战术主动性作战。"
 nd_rus_great_power_diplomacy: "强权外交"
 nd_rus_great_power_diplomacy_desc: "俄罗斯作为欧洲大国的崛起，需要一支成熟的外交使团。如今帝国已在各主要宫廷派驻大使，从巴黎到君士坦丁堡皆能施展其影响力。"
 nd_rus_enlightenment: "俄罗斯启蒙运动"
 nd_rus_enlightenment_desc: "叶卡捷琳娜大帝与伏尔泰和狄德罗保持通信往来，创立自由经济协会，并在帝国境内广设学校。俄罗斯的文学、科学与哲学迎来了前所未有的繁荣时期。"
 nd_rus_industrial_dawn: "工业黎明"
 nd_rus_industrial_dawn_desc: "The first stirrings of industrialization reach Russia as mechanized production begins in textiles and metalworking, and state-sponsored factories multiply across the Urals and around Moscow."
 a_nd_rus_streltsy: "Streltsy"
 a_nd_rus_streltsy_desc: "Moscow's standing musket infantry, uniformed and salaried, armed with matchlock firearms and heavy bardiches. The backbone of Russian military power in the age of gunpowder."
 a_nd_rus_cossack_cavalry: "Cossack Light Cavalry"
 a_nd_rus_cossack_cavalry_desc: "Steppe horsemen from the frontier communities, expert riders and raiders who serve as the empire's eyes and ears across the vast southern borderlands."
 a_nd_rus_oprichnik: "Oprichnik Cavalry"
 a_nd_rus_oprichnik_desc: "The Tsar's personal enforcers, black-clad horsemen who carry a dog's head and broom at their saddle -- symbols of their mission to sniff out and sweep away treason."
 a_nd_rus_don_cossack: "Don Cossack"
 a_nd_rus_don_cossack_desc: "Elite horsemen of the Don Cossack Host, veteran cavalrymen who combine steppe riding traditions with disciplined military service to the empire."
 a_nd_rus_suvorov_grenadier: "Suvorov Grenadier"
 a_nd_rus_suvorov_grenadier_desc: "Elite infantry trained in Suvorov's doctrine of speed and bayonet assault. 'The bullet is a fool, the bayonet a fine fellow' -- these men embody that creed."
 n_nd_rus_baltic_frigate: "Baltic Frigate"
 n_nd_rus_baltic_frigate_desc: "A fast warship of the Russian Baltic Fleet, built in the new dockyards of St. Petersburg to contest Swedish dominance of the northern seas."
 nd_rus_gostiny_dvor: "Gostiny Dvor"
 nd_rus_gostiny_dvor_desc: "A merchant court where traders from across Russia and foreign lands gather to sell their wares under state regulation, fostering orderly commerce and tax collection."
 nd_rus_gostiny_dvor_upkeep: "Gostiny Dvor Maintenance"
 nd_rus_gostiny_dvor_upkeep_desc: "Upkeep costs for maintaining the merchant court: timber for construction, stone for repairs, paper for trade records and contracts, and cloth for display and merchant needs."
 nd_rus_kreml: "Stone Kremlin"
 nd_rus_kreml_desc: "A fortified stone citadel at the heart of a Russian city, combining military defense with the seat of political authority and Orthodox worship."
 nd_rus_kreml_garrison: "Kremlin Garrison"
 nd_rus_kreml_garrison_desc: "The permanent garrison that maintains the kremlin's defenses, consuming weapons, stone for repairs, firearms for the soldiers, and tools for construction and maintenance."
 nd_rus_ural_foundry: "乌拉尔炼铁厂"
 nd_rus_ural_foundry_desc: "A state-sponsored iron foundry in the Ural Mountains, smelting the region's vast ore deposits into iron and steel for the empire's arsenals."
 nd_rus_iron_smelting: "Ural Iron Smelting"
 nd_rus_iron_smelting_desc: "Industrial-scale smelting of Ural iron ore into high-quality steel using charcoal and coke-fired blast furnaces."
 nd_rus_naval_academy: "Naval Academy"
 nd_rus_naval_academy_desc: "A school of navigation and shipbuilding established in the Petrine tradition, training officers and craftsmen to build and sail Russia's growing fleet."
 nd_rus_naval_academy_upkeep: "Naval Academy Upkeep"
 nd_rus_naval_academy_upkeep_desc: "Maintenance costs for the naval academy: timber and naval supplies for training vessels, tools for shipwright instruction, and paper for navigation charts and curriculum."
 nd_rus_fur_post: "Fur Trading Post"
 nd_rus_fur_post_desc: "A frontier trading station where trappers bring pelts of sable, fox, and ermine to be collected, graded, and shipped to markets in Moscow and beyond."
 nd_rus_fur_post_upkeep: "Trading Post Upkeep"
 nd_rus_fur_post_upkeep_desc: "Maintenance of the frontier trading post: tools for trappers and repair work, lumber for the post structure, and salt for preserving pelts before shipment to market."
 nd_rus_vodka_distillery: "Vodka Distillery"
 nd_rus_vodka_distillery_desc: "A grain spirit distillery producing the distinctive Russian liquor that generates significant revenue through state-controlled monopoly sales."
 nd_rus_vodka_production: "Vodka Distilling"
 nd_rus_vodka_production_desc: "The distillation of wheat grain into high-proof spirits for domestic consumption and export."
 levy_nd_rus_cossack_cavalry: "Cossack Levy"
 levy_nd_rus_cossack_cavalry_desc: "Light cavalry raised from the Cossack frontier communities."
 levy_nd_rus_don_cossack: "Don Cossack Levy"
 levy_nd_rus_don_cossack_desc: "Elite cavalry raised from the Don Cossack Host."
 nd_rus_formed_tt: "Russia has been formed"
 nd_rus_path_a_tt: "Chose the #bold Third Rome Ascendant#! destiny"
 nd_rus_path_b_tt: "Chose the #bold Empire of the Steppe#! destiny"
 nd_rus_destiny: "Imperial Mandate"
 nd_rus_destiny_desc: "Russia has been forged from the scattered principalities of the Rus. Now the Tsar must demonstrate that this new state possesses the stability and authority to endure. Only a realm at peace with itself can pursue the great ambitions that lie ahead."
 nd_rus_dest_mother_cities: "Return of the Mother Cities"
 nd_rus_dest_mother_cities_desc: "Reclaim Kyiv, the baptismal cradle of the Rus, and Vilnius, capital of the Grand Duchy that challenged Moscow's claim to Orthodox supremacy. Embrace modern banking to fund the western campaigns."
 nd_rus_dest_baltic_window: "The Baltic Window"
 nd_rus_dest_baltic_window_desc: "Seize the great Baltic ports of Riga and Tallinn to break through to European maritime trade. Amass the treasury required to sustain a westward-facing empire."
 nd_rus_dest_third_rome_fulfilled: "The Third Rome Ascends"
 nd_rus_dest_third_rome_fulfilled_desc: "Take Constantinople itself and restore the Hagia Sophia to Orthodox worship. Only a powerful and prestigious empire can claim the mantle of Rome."
 nd_rus_dest_eastern_road: "The Eastern Road"
 nd_rus_dest_eastern_road_desc: "Conquer Kazan, which blocks the route east, and seize Tobolsk, gateway to Siberia. Establish banking institutions to finance the vast enterprise of eastern expansion."
 nd_rus_dest_siberian_wealth: "Siberian Wealth"
 nd_rus_dest_siberian_wealth_desc: "Develop the empire's vast territories through institutional progress and economic growth. Build a fur trade network that feeds the markets of Moscow and the world. The printing press must reach the frontier."
 nd_rus_dest_continental_colossus: "Continental Colossus"
 nd_rus_dest_continental_colossus_desc: "Transform Russia into the most developed land empire in history. The Enlightenment must illuminate even the furthest provinces, the treasury must overflow, and the world must recognize Russian greatness."
 nd_rus.6.t: "The Imperial Mandate"
 nd_rus.6.d: "The Russian state has achieved a measure of stability that few thought possible in these turbulent lands. The boyars have been brought to heel, the Church blesses the Tsar's authority, and the common people look to Moscow as the center of their world. This stability is not an end but a beginning -- the foundation upon which a great empire may be built.\n\nThe question now is what kind of empire Russia shall become."
 nd_rus.6.a: "The empire stirs."
 nd_rus.7.t: "The Return of the Mother Cities"
 nd_rus.7.d: "Kyiv, where Grand Prince Vladimir received baptism and brought Christianity to the Rus, has been restored to the Russian realm. Vilnius, capital of the Grand Duchy of Lithuania -- Russia's oldest rival for dominion over the Orthodox east -- has fallen to the Tsar's armies. These are not mere conquests but the assertion of a civilizational claim.\n\nPilgrims flock to the Monastery of the Caves in Kyiv, and the churches ring with celebration. Russia's claim as the guardian of Orthodoxy is strengthened immeasurably by the return of these cities to her sphere."
 nd_rus.7.a: "The western lands acknowledge the Tsar."
 nd_rus.8.t: "The Baltic Breakthrough"
 nd_rus.8.d: "The great ports of Riga and Tallinn are now Russian. For the first time, the empire has direct access to European maritime trade routes, and Russian merchants can deal with Hamburg, Amsterdam, and London without intermediaries. The Baltic is no longer a Swedish or Hanseatic lake.\n\nThis breakthrough poses a fundamental question for the empire. Should Russia embrace the ways of Europe -- its courts, its fashions, its diplomatic culture -- and take its place as a European great power? Or should the Third Rome stand apart, a fortress of Orthodox faith and Russian tradition, drawing strength from its distinctiveness rather than conformity?"
 nd_rus.8.a: "Open the doors to European civilization."
 nd_rus.8.b: "We are the fortress of the true faith."
 nd_rus.9.t: "The Third Rome Ascends"
 nd_rus.9.d: "The unthinkable has been achieved. The double-headed eagle flies above the walls of Constantinople, and the great dome of the Hagia Sophia once again resounds with Orthodox liturgy. The prophecy of the monk Filofey is fulfilled -- Moscow, the Third Rome, has reclaimed the Second.\n\nThe Tsar now stands as the supreme leader of the Orthodox world, protector of millions of believers from the Balkans to the Caucasus. But how shall this universal authority be exercised? Through the spiritual prestige of the Ecumenical Throne, absorbing the Orthodox peoples into a commonwealth of faith? Or through the iron authority of a new Caesar, whose military might enforces the peace of the empire?"
 nd_rus.9.a: "We shall unite the faithful under one throne."
 nd_rus.9.b: "Let the world tremble before the new Caesar."
 nd_rus.10.t: "The Eastern Road Opens"
 nd_rus.10.d: "Russian forces have crossed the Ural Mountains and seized Tobolsk, capital of the Siberian Khanate. The Khanate of Kazan, which long blocked the eastern road, has been subdued. The way into the boundless Siberian wilderness lies open.\n\nCossack scouts report rivers teeming with fish, forests dark with sable, and vast grasslands stretching to horizons beyond counting. An entire continent awaits not merely the Tsar's flag but Russian settlers, institutions, and commerce."
 nd_rus.10.a: "Eastward! Ever eastward!"
 nd_rus.11.t: "The Wealth of Siberia"
 nd_rus.11.d: "The empire's vast eastern territories have begun to yield their riches in earnest. Fur caravans stretch from the taiga to Moscow, the printing press has reached provincial capitals, and Russian settlements dot the river systems from the Urals to the Yenisey. Siberia is no longer merely conquered -- it is becoming productive.\n\nThe question now is how to extract and organize this wealth. The yasak system of fur tribute, imposed on native peoples in exchange for nominal protection, funnels enormous wealth to the treasury but at the cost of local stability. Alternatively, encouraging mass Russian settlement would permanently integrate Siberia but require a different investment in roads, farms, and administration."
 nd_rus.11.a: "Impose the yasak. Siberia shall pay its tribute."
 nd_rus.11.b: "Send settlers. Siberia shall become Russia."
 nd_rus.12.t: "The Continental Colossus"
 nd_rus.12.d: "Russia has achieved what no empire in history has matched -- a continental domain stretching across eleven time zones, developed and administered, its institutions reaching from the Baltic to the Pacific watershed. The Enlightenment has penetrated even the remotest guberniyas, and the empire's treasury reflects the wealth of a hundred peoples and a thousand rivers.\n\nThis colossus faces a fundamental choice in how to wield its continental mass. As a land empire par excellence, Russia can dominate the Eurasian heartland through sheer territorial depth and military doctrine. Or Russia can look beyond the continent, building a Pacific fleet to project power across the ocean and engage with the maritime civilizations of East Asia."
 nd_rus.12.a: "We are the lords of the continent."
 nd_rus.12.b: "Build a Pacific fleet -- the ocean is next."
 nd_rus_cathedral_of_east: "Cathedral of the East"
 nd_rus_cathedral_of_east_desc: "A magnificent Orthodox cathedral built to consecrate Russia's claim as the Third Rome, rivaling the great churches of Constantinople and Rome in splendor."
 nd_rus_cathedral_of_east_upkeep: "Cathedral Liturgy"
 nd_rus_cathedral_of_east_upkeep_desc: "The solemn liturgical services that sustain the cathedral's spiritual authority, requiring incense for censing, gems for icon adornment, fine cloth for priestly vestments, and beeswax candles for the nave."
 nd_rus_ostrog_fort: "Ostrog Fortress"
 nd_rus_ostrog_fort_desc: "A fortified wooden stockade on the Siberian frontier, serving as a base for fur traders, garrison for soldiers, and anchor for Russian settlement in the wilderness."
 nd_rus_ostrog_fort_upkeep: "Ostrog Garrison"
 nd_rus_ostrog_fort_upkeep_desc: "The small garrison that mans the ostrog's walls and patrols the surrounding frontier, requiring weapons and firearms, lumber for repairs, leather for winter gear, and salt for provisioning in the wilderness."
 STATIC_MODIFIER_NAME_nd_rus_third_rome_ascendant: "Third Rome Ascendant"
 STATIC_MODIFIER_DESC_nd_rus_third_rome_ascendant: "Moscow stands as the successor to Rome and Constantinople, the last guardian of true Orthodox Christianity. The Tsar rules as God's chosen vessel on earth, and from this sacred authority flows the power to unite all Russian lands under a single, unshakeable crown."
 STATIC_MODIFIER_NAME_nd_rus_empire_of_the_steppe: "Empire of the Steppe"
 STATIC_MODIFIER_DESC_nd_rus_empire_of_the_steppe: "Russia's destiny lies not in the cramped courts of Europe but in the boundless expanses stretching east to the Pacific. The Cossack and the fur trapper carry the Tsar's banner into the wilderness, and every river crossed, every ostrog raised, extends the dominion of the empire."
 STATIC_MODIFIER_NAME_nd_rus_streltsy_discipline: "Streltsy Field Discipline"
 STATIC_MODIFIER_DESC_nd_rus_streltsy_discipline: "The Streltsy corps is trained as a professional field army, drilled in volley fire and disciplined maneuver."
 STATIC_MODIFIER_NAME_nd_rus_streltsy_garrison: "Streltsy Garrison Network"
 STATIC_MODIFIER_DESC_nd_rus_streltsy_garrison: "The Streltsy garrisons provide a permanent defensive backbone across the empire's cities and fortresses."
 STATIC_MODIFIER_NAME_nd_rus_oprichnina_terror: "Oprichnina Terror"
 STATIC_MODIFIER_DESC_nd_rus_oprichnina_terror: "The Tsar's oprichniki enforce absolute loyalty through fear. No boyar, no city, no province is safe from their reach."
 STATIC_MODIFIER_NAME_nd_rus_oprichnina_restraint: "Moderated Autocracy"
 STATIC_MODIFIER_DESC_nd_rus_oprichnina_restraint: "The Tsar has chosen to govern firmly but without the excesses of unchecked terror, building loyalty through competent administration."
 STATIC_MODIFIER_NAME_nd_rus_dest_european_window: "European Window"
 STATIC_MODIFIER_DESC_nd_rus_dest_european_window: "Russia opens its doors to European culture, commerce, and ideas, embracing the wider world beyond the Orthodox sphere."
 STATIC_MODIFIER_NAME_nd_rus_dest_orthodox_bastion: "Orthodox Bastion"
 STATIC_MODIFIER_DESC_nd_rus_dest_orthodox_bastion: "The Third Rome stands apart from the Latin and Protestant West, drawing strength from the purity of its Orthodox faith and the unity of its people."
 STATIC_MODIFIER_NAME_nd_rus_dest_ecumenical_throne: "Ecumenical Throne"
 STATIC_MODIFIER_DESC_nd_rus_dest_ecumenical_throne: "The Tsar sits upon the Ecumenical Throne, spiritual father of all Orthodox Christians, wielding the soft power of faith to bind nations in a commonwealth of believers."
 STATIC_MODIFIER_NAME_nd_rus_dest_new_caesar: "The New Caesar"
 STATIC_MODIFIER_DESC_nd_rus_dest_new_caesar: "A new Roman Emperor has risen in the East, and the world trembles before the military might of the Third Rome restored."
 STATIC_MODIFIER_NAME_nd_rus_dest_yasak_tribute: "Yasak Tribute System"
 STATIC_MODIFIER_DESC_nd_rus_dest_yasak_tribute: "The yasak system extracts fur tribute from Siberian peoples, funneling vast wealth to Moscow at the cost of local relations with the conquered."
 STATIC_MODIFIER_NAME_nd_rus_dest_settler_wave: "Settler Colonization"
 STATIC_MODIFIER_DESC_nd_rus_dest_settler_wave: "Russian settlers pour eastward in great waves, establishing permanent villages and farms that bind Siberia irrevocably to the motherland."
 STATIC_MODIFIER_NAME_nd_rus_dest_heartland_power: "Heartland Power"
 STATIC_MODIFIER_DESC_nd_rus_dest_heartland_power: "Russia commands the Eurasian heartland, its armies sustained by continental depth and strategic doctrine that renders naval power irrelevant."
 STATIC_MODIFIER_NAME_nd_rus_dest_pacific_horizon: "Pacific Horizon"
 STATIC_MODIFIER_DESC_nd_rus_dest_pacific_horizon: "Russia builds a Pacific fleet and looks beyond the continent, engaging with the maritime civilizations of East Asia while neglecting some domestic construction."