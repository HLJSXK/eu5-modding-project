l_simp_chinese:
 nd_ita.1.t: "意大利的诞生"
 nd_ita.1.d: "意大利半岛终于在一面旗帜下统一了。数个世纪以来，这片诞生了但丁、马基雅维利和达·芬奇的土地，一直分裂于互相征战的城邦、外国领主和教宗领地之间。如今这种分裂终于结束了。\n\n但统一带来了一个根本性问题：这将是一个怎样的意大利？半岛的传统将我们引向两个方向。一条道路通向中央集权的王国——一个拥有统一法律、国家军队和单一首都的现代民族国家，效仿欧洲列强的模式。另一条道路则尊重意大利人市政自治的天赋——即创造了佛罗伦萨、威尼斯和热那亚的公社传统，每个城邦都曾是财富与文化空前繁荣的共和国。\n\n这个选择将塑造意大利未来数代的命运。\n\n#bold 此选择将在传统标签页中解锁一条命运之路。#!"
 nd_ita.1.a: "统一且不可分割的国家！建立意大利王国！"
 nd_ita.1.b: "让每个城市贡献其智慧，成立其共和国。"
 nd_ita.2.t: "共和国的军械库"
 nd_ita.2.d: "在威尼斯，横跨城市东岸四十五公顷的军械库——能在一天内完成整艘战列舰的装配，这项工业壮举在欧洲无出其右。一万六千名工匠在其高墙内劳作，他们被组织成专业行会：锯木匠、捻缝工、船桨匠与制绳匠各司其职。\n\n这种工业化造船传统已传播至其他意大利港口。热那亚、那不勒斯与里窝那纷纷效仿威尼斯模式，建立起各自的军械库。如今的问题在于，该如何运用这股海上力量。"
 nd_ita.2.a: "扩充舰队！地中海是我们的海洋。"
 nd_ita.2.b: "投资商船航运！商贸是我们的力量所在。"
 nd_ita.3.t: "佛罗伦萨的银行家"
 nd_ita.3.d: "在佛罗伦萨的账房里，一场金融革命彻底改变了欧洲的商业运作方式。美第奇、巴尔迪、佩鲁齐、斯特罗齐等银行家族创造了信用工具，使得财富能够跨越遥远距离流转，而无需触碰一枚金币。\n\n汇票、信用证以及复式记账法，让意大利银行家能以数学般的精确追踪每笔交易。他们的分行网络从伦敦延伸到君士坦丁堡，弗罗林币已成为国际贸易的通用货币。无论是国王还是教皇，都依赖着意大利的信贷来支撑他们的宏图大业。"
 nd_ita.3.a: "各国的财富正流经我们的银行。"
 nd_ita.4.t: "意大利统一运动"
 nd_ita.4.d: "一场伟大的觉醒席卷了意大利半岛。在秘密会所与公共广场，在宣传册与诗歌中，意大利建国的梦想已如野火燎原。朱塞佩·马志尼的“青年意大利”运动播下的种子，如今已成长为跨越王国与公国疆界的群众政治运动。\n\n烧炭党的密谋者、加里波第红衫军的志愿者、加富尔的外交智慧——所有力量已汇聚于同一目标。外族的枷锁被挣脱，零散的邦国被统一。这片曾为世界带来文艺复兴与罗马法的土地，如今正重归伟大民族之列。\n\n这是一个需要对未来有愿景的时刻。"
 nd_ita.4.a: "前进！必须收复未收复的意大利领土。"
 nd_ita.4.b: "建设学校、铁路与思潮。"
 nd_ita.5.t: "加莱赛战船"
 nd_ita.5.d: "意大利的海军工程师们完善了加莱赛战船——这是一种革命性的战舰，它结合了桨帆船的机动性和帆船的火力。这些浮动堡垒在划桨手上方设置了连续甲板，搭载重型火炮，既能发动毁灭性的舷侧齐射，又能在风势多变的地中海浅水区域灵活作战。\n\n在1571年勒班陀海战中，六艘威尼斯加莱赛战船锚定了基督教联军的战线，其密集的炮火在舰队尚未进入接舷战距离前就击溃了奥斯曼的阵型。加莱赛战船证明了决定海战胜负的关键不仅是冲撞和接舷，火力同样至关重要。"
 nd_ita.5.a: "我们的舰船是意大利的城墙。"
 nd_ita_communal_governance: "公社治理"
 nd_ita_communal_governance_desc: "意大利公社是中世纪世界最具特色的政治创新之一。像佛罗伦萨、锡耶纳和卢卡这样的城市发展出了复杂的选举议会、成文宪法和市政官制度。"
 nd_ita_maritime_republics: "海上共和国"
 nd_ita_maritime_republics_desc: "威尼斯、热那亚、比萨和阿马尔菲这四个海上共和国，其商船舰队与战列舰曾主宰地中海贸易数世纪之久，从黑海到大西洋遍布着它们建立的贸易据点与殖民地。"
 nd_ita_guelf_ghibelline: "教廷派和皇室派"
 nd_ita_guelf_ghibelline_desc: "教廷派与皇帝派之间长达两个世纪的激烈斗争塑造了意大利的政治格局，形成了由于不断在竞争势力之间进行谈判而产生的强烈市民忠诚和政治精明的传统。"
 nd_ita_florentine_banking: "佛罗伦萨银行业"
 nd_ita_florentine_banking_desc: "佛罗伦萨的各大银行家族开创了现代金融体系：汇票、复式记账法以及遍布欧洲的国际分支机构网络，它们让资本在欧洲大陆流动起来。"
 nd_ita_silk_trade: "意大利丝绸贸易"
 nd_ita_silk_trade_desc: "卢卡、佛罗伦萨和威尼斯的丝绸作坊生产了品质极佳的织物，将从东方进口的生丝与意大利的染色和编织技术相结合，创造出欧洲最受欢迎的纺织品。"
 nd_ita_condottiero_tradition: "佣兵传统"
 nd_ita_condottiero_tradition_desc: "雇佣军首领及其部队将意大利战争变成了一种高超的艺术。像斯福尔扎、科莱奥尼和霍克伍德这样的领袖指挥着装甲枪骑兵和弩手，为出价最高的城邦效力。"
 nd_ita_venetian_shipcraft: "威尼斯造船术"
 nd_ita_venetian_shipcraft_desc: "威尼斯军械库是前工业时代规模最大的工业复合体，能在一天内造出全副武装的战舰。其流水线生产方式比工业革命早了整整四个世纪。"
 nd_ita_humanist_learning: "人文主义学术"
 nd_ita_humanist_learning_desc: "人文研究是对古典拉丁与希腊文献、修辞学、历史及道德哲学的研究，始于意大利的彼特拉克和薄伽丘，这一思想运动重塑了欧洲文明。"
 nd_ita_galleass_warfare: "加莱赛战船战术"
 nd_ita_galleass_warfare_desc: "加莱赛战船诞生于威尼斯兵工厂，是一种革命性的战舰，它在多层桨座上安装了重型舷侧火炮。1571年勒班陀海战中，六艘威尼斯加莱赛战船甚至在舰队接舷前就击溃了奥斯曼舰队的阵型。"
 nd_ita_murano_glasscraft: "穆拉诺玻璃产业"
 nd_ita_murano_glasscraft_desc: "穆拉诺岛的玻璃工匠们被隔离在岛上以保护行业机密，他们开发出无与伦比的精妙工艺——水晶玻璃、千花玻璃、乳白玻璃使威尼斯玻璃成为欧洲最受珍视的奢侈品。"
 nd_ita_commedia_dell_arte: "即兴喜剧"
 nd_ita_commedia_dell_arte_desc: "意大利即兴喜剧的戏剧传统，以其固定的角色风靡欧洲，使意大利表演者成为大陆上最受赞誉的娱乐人物。"
 nd_ita_palazzo_civic_tradition: "市政厅传统"
 nd_ita_palazzo_civic_tradition_desc: "市政厅是意大利公社政府的建筑表达，从佛罗伦萨旧宫到威尼斯的总督府，这些建筑物容纳了管理欧洲最先进城镇政府的议会、法庭和档案馆。"
 nd_ita_counter_reformation: "反宗教改革"
 nd_ita_counter_reformation_desc: "意大利站在天主教反宗教改革的核心地带。特利腾大公会议、耶稣会的创立以及罗马宗教裁判所皆发源于这片土地，它们重申天主教正统教义，并掀起了一场精神复兴运动。"
 nd_ita_accademia_tradition: "学术传统"
 nd_ita_accademia_tradition_desc: "意大利开创了现代学术机构的先河：秕糠学会规范了意大利语，山猫学院推动了自然科学的发展（伽利略亦是其成员），而无数艺术院校则培养了欧洲最杰出的画家与雕塑家。"
 nd_ita_grand_tour: "大巡礼"
 nd_ita_grand_tour_desc: "到18世纪，没有哪位欧洲绅士的教育会缺少意大利。罗马的废墟、佛罗伦萨的艺术、那不勒斯的音乐以及威尼斯的水道，吸引了成千上万的富裕旅行者，使意大利成为文明世界的文化之都。"
 nd_ita_enlightened_reforms: "开明改革"
 nd_ita_enlightened_reforms_desc: "意大利启蒙思想家切萨雷·贝卡里亚的《论犯罪与刑罚》、加埃塔诺·菲兰杰里的《立法科学》重塑了欧洲关于正义、治理与个人权利的思考。他们的思想影响了从叶卡捷琳娜大帝到托马斯·杰斐逊等众多改革者。"
 nd_ita_risorgimento: "复兴运动"
 nd_ita_risorgimento_desc: "意大利民族统一的伟大运动在马志尼的理想主义、加里波第的军事天才与加富尔外交谋略的共同推动下——将一个“地理概念”转变为了民族国家。头戴独特羽饰帽的精英轻步兵“狙击兵”，成为了这场运动的象征。"
 nd_ita_carbonari_networks: "烧炭党网络"
 nd_ita_carbonari_networks_desc: "烧炭党是意大利最具影响力的秘密革命社团。他们通过遍布半岛的暗号仪式和秘密支部开展活动，组织反抗外国统治的起义，为意大利民族主义播下了种子。"
 nd_ita_industrial_awakening: "工业觉醒"
 nd_ita_industrial_awakening_desc: "皮埃蒙特和伦巴第引领了意大利的工业转型：加富尔的铁路建设计划、热那亚的安萨尔多钢铁厂以及波河流域的纺织厂，将现代工业带入了这片长期以农业和手工业为主的土地。"
 nd_ita_national_education: "国民教育"
 nd_ita_national_education_desc: "1859年的《卡萨蒂法》及后续教育改革建立了统一的意大利学校体系，通过教授标准意大利语，有效遏制了半岛上严重的地区性文盲现象，并构建起共同的国家认同。"
 nd_ita_irredentism: "尚未收复的意大利"
 nd_ita_irredentism_desc: "尚未收复的意大利要求将所有意大利语区域，特别是特伦蒂诺、的里雅斯特、伊斯特拉半岛和达尔马提亚并入意大利国家，这一主张驱动着外交野心与军事计划。"
 a_nd_ita_condottiero_lances: "佣兵长枪骑兵"
 a_nd_ita_condottiero_lances_desc: "这些遵循佣兵队长传统的重骑兵，身披重甲手持长矛，以合同形式服役，以其毁灭性的冲锋和战术灵活性而闻名。"
 a_nd_ita_condottiero_lances_levy: "佣兵长枪骑兵"
 a_nd_ita_condottiero_lances_levy_desc: "意大利雇佣兵传统中征召的骑兵，这些身披铠甲的骑手拥有数世纪的雇佣兵战争经验。"
 n_nd_ita_galleass: "加莱赛战船"
 n_nd_ita_galleass_desc: "一种结合了桨动力和舷侧火炮的大型战舰。加莱赛战船在威尼斯开发，其在划桨手上方设有一层连续的火炮甲板，装备重型火炮，能够在地中海水域中保持机动性的同时提供毁灭性的火力。"
 a_nd_ita_bersaglieri: "神射手部队"
 a_nd_ita_bersaglieri_desc: "意大利复兴时期的精锐轻步兵，以迅捷、精准的枪法和进攻性战术闻名，其标志性特征是饰有松鸡羽毛的宽檐帽。"
 nd_ita_banco: "银行"
 nd_ita_banco_desc: "一家遵循佛罗伦萨传统的意大利银行机构，通过汇票、信用证以及遍布欧洲的分支网络，为国际贸易提供便利。"
 nd_ita_setificio: "丝绸厂"
 nd_ita_setificio_desc: "一个意大利丝绸作坊，技艺精湛的织工将生丝和染料转化为品质非凡的布匹，延续了卢卡、佛罗伦萨和威尼斯完善的传统。"
 nd_ita_arsenale: "军械库"
 nd_ita_arsenale_desc: "一座仿照威尼斯兵工厂建造的大型造船厂综合体，数千名专业工匠在这里以无与伦比的效率制造战舰和商船。"
 nd_ita_palazzo_comunale: "市政厅"
 nd_ita_palazzo_comunale_desc: "一个容纳了市政政府的机构包括选举产生的议会、法院和行政档案馆，体现了意大利城镇自治的传统。"
 nd_ita_accademia: "学院"
 nd_ita_accademia_desc: "意大利传统中的艺术与科学学院，学者、艺术家和自然哲学家在此推动人类知识进步，并精炼意大利语言与文化。"
 nd_ita_vetreria: "玻璃工坊"
 nd_ita_vetreria_desc: "一座穆拉诺风格的玻璃工坊，技艺精湛的工匠使用威尼斯严格保密技术生产水晶玻璃、千花玻璃和乳白玻璃。"
 nd_ita_manifattura: "工坊"
 nd_ita_manifattura_desc: "一家生产钢铁和成品的意大利工业制造厂，代表着伴随国家统一而来的工业转型。"
 nd_ita_carbonari_lodge: "烧炭党会所"
 nd_ita_carbonari_lodge_desc: "碳烧党革命社团的秘密集会地点，爱国者们在此聚集，密谋反抗外国统治并推进意大利国家事业。"
 nd_ita_silk_weaving: "意大利丝绸纺织业"
 nd_ita_silk_weaving_desc: "意大利将生丝和染料编织成高品质布匹的著名技术，在佛罗伦萨、卢卡和威尼斯的作坊中得到了完善。"
 nd_ita_banking_operations: "银行业务"
 nd_ita_banking_operations_desc: "意大利银行家族的行政机构，职员们采用复式记账法维护账本，处理汇票业务，并以精装布面账簿管理国际往来信函。"
 nd_ita_arsenale_maintenance: "军械库维护"
 nd_ita_arsenale_maintenance_desc: "维持大型造船厂运转并建造战舰，需要持续供应木材、焦油、工具及船用物资。"
 nd_ita_venetian_glassmaking: "威尼斯玻璃制造"
 nd_ita_venetian_glassmaking_desc: "穆拉诺岛的秘密玻璃制造技艺，生产水晶玻璃、千花玻璃等精美玻璃制品，其核心技术始终由威尼斯当局严密守护。"
 nd_ita_palazzo_upkeep: "宫殿维护"
 nd_ita_palazzo_upkeep_desc: "石料、行政文件和精美的布匹家具，这些都是维持市政厅及其官僚职能所需的，以保持其适当的市民尊严。"
 nd_ita_accademia_upkeep: "学院维护"
 nd_ita_accademia_upkeep_desc: "维持学院研究所需的书籍、纸张和玻璃科学仪器。"
 nd_ita_steel_forging: "意大利钢铁锻造"
 nd_ita_steel_forging_desc: "采用意大利方法的现代钢铁制造，结合伦巴第铁匠传统和工业技术，生产用于建筑和军备的高质量钢材。"
 nd_ita_carbonari_upkeep: "烧炭党维持"
 nd_ita_carbonari_upkeep_desc: "维持革命网络运转的小册子、宣言和美酒——爱国者们聚集在酒馆里，就着政治哲学书籍辩论解放之路。"
 levy_nd_ita_condottiero_lances: "雇佣军长枪兵"
 levy_nd_ita_condottiero_lances_desc: "以意大利佣兵队长传统征召的骑兵。"
 nd_ita_formed_tt: "意大利已经成立"
 nd_ita_path_a_tt: "选择#bold 祖国统一#!的路线"
 nd_ita_path_b_tt: "选择#bold 城市共和国#!路线"
 nd_ita_destiny: "意大利的命运"
 nd_ita_destiny_desc: "意大利已实现统一——但统一仅仅是开端。这片曾为世界带来罗马帝国、文艺复兴与现代文明基石的土地，如今必须在列强中抉择自己的未来。巩固新生国家，规划你的航向。"
 nd_ita.6.t: "意大利的命运"
 nd_ita.6.d: "意大利统一的梦想已经实现。从阿尔卑斯山脉到西西里岛，从利古里亚海岸到亚得里亚海沿岸，整个半岛已融为一体。但关键问题依然存在：意大利将走向何方？\n\n地中海乃至整个欧洲的未来，都取决于我们在这个决定性时刻所作出的选择。"
 nd_ita.6.a: "意大利的命运从现在开始。"
 nd_ita.7.t: "未收复的领土"
 nd_ita.7.d: "三色旗终于飘扬在的里雅斯特和特伦托上空。数十年来，意大利爱国者始终谈论着那些讲着意大利语却飘扬着外国旗帜的土地。如今，它们已归属意大利。\n\n完成这一壮举的军队在收复领土的战争中经受锤炼。我们的士兵深知是为了民族荣誉而战；总参谋部已证明其具备对抗欧洲强国的联合作战能力。意大利已向世界宣告：历史舞台迎来了新的主角。"
 nd_ita.7.a: "意大利的每一寸土地都属于我们。"
 nd_ita.8.t: "第四海岸"
 nd_ita.8.d: "意大利的军靴踏上了北非的沙地。突尼斯与的黎波里塔尼亚曾被誉为罗马帝国粮仓的土地如今已飘扬着意大利旗帜。地中海不再是天堑，而是连接祖国与非洲新省份的桥梁。\n\n然而海外帝国的经营需要抉择。有人主张快速军事扩张——征召殖民军团、建立驻防体系，为下一场扩张战争做好准备。另一些人则看到制海权的价值——掌控连接意大利与新领土的海上通道，通过舰队而非兵营来投射力量。"
 nd_ita.8.a: "征召军团，非洲需要士兵。"
 nd_ita.8.b: "掌控海洋！舰队就是我们的力量。"
 nd_ita.9.t: "我们的海"
 nd_ita.9.d: "古罗马人的话语再次成真——我们的海。从马耳他到埃及海岸，从塞萨洛尼基到利比亚沿岸，意大利旗帜在整个地中海范围内赢得了敬畏。\n\n这不仅是领土的帝国，更是影响力的帝国——掌控贸易航线与战略要冲，兼具文化威望与军事实力。意大利已达成自罗马覆灭以来任何意大利邦国未曾企及的成就：对这片内海的统治权。\n\n如今的问题在于如何运用这股力量。有人主张建立新罗马帝国——实行中央集权、大规模征召兵，并凭借真正强国的外交影响力行事；另一些人则倡导堡垒战略——通过意大利工程师开创的棱堡防御体系，使意大利在地中海的据点固若金汤。"
 nd_ita.9.a: "恢复罗马帝国"
 nd_ita.9.b: "加固每一处阵地，意大利固若金汤。"
 nd_ita.10.t: "海上共和国"
 nd_ita.10.d: "圣马可雄狮的旗帜曾飘扬在亚得里亚海的商站与爱奥尼亚海岸的堡垒上空。如今意大利继承了这份遗产——并非作为单一的海上共和国，而是伟大城邦的联盟，每座城市都将自己的智慧奉献给共同的商业命运。\n\n威尼斯商人经营香料贸易，热那亚银行家为远航提供资金，佛罗伦萨工坊将生丝织成精美布匹，那不勒斯造船师建造运输这一切的桨帆船。海洋霸权正在重生——这是一个商业至上的意大利地中海。"
 nd_ita.10.a: "大海就是我们的市场。"
 nd_ita.11.t: "意大利银行"
 nd_ita.11.d: "意大利银行业已重拾其古老卓越地位。美第奇与巴尔迪家族的传统以现代形式得以延续——统一的意大利银行体系掌控着整个欧洲的资金流动。从伦敦到君士坦丁堡，意大利银行签发的汇票皆可承兑，意大利央行的黄金储备足以匹敌任何国家。\n\n随着地中海核心中转站克里特岛的稳固掌控，意大利商业网络现已从西地中海延伸至黎凡特地区绵延不绝。现在的问题在于：如何将这种金融实力转化为实际影响力？"
 nd_ita.11.a: "外交与影响力是美第奇家族之道。"
 nd_ita.11.b: "垄断航线，掌控贸易。"
 nd_ita.12.t: "普世文艺复兴"
 nd_ita.12.d: "数字不会说谎。意大利城邦在人口、财富、精细与普通商品的生产方面引领世界。意大利银行掌控着从波罗的海到黎凡特的资本流动。意大利的学术机构树立了所有其他地区渴望达到的标准。\n\n这不仅仅是繁荣——这是第二次文艺复兴。如果说第一次文艺复兴复兴了古代的艺术与文学，那么这次“普世文艺复兴”创造了全新的事物：一种从意大利半岛向外辐射、正在改变世界的商业、文化与革新文明。现在的问题在于如何延续这个黄金时代。"
 nd_ita.12.a: "投资于知识，思想是永恒的。"
 nd_ita.12.b: "建设繁荣的基础设施。"
 nd_ita_fortezza_moderna: "现代堡垒"
 nd_ita_fortezza_moderna_desc: "一座采用意大利式棱堡设计的先进意大利堡垒群，这种角形堡垒设计由意大利军事工程师首创，并彻底改变了整个欧洲的防御战方式。"
 nd_ita_fortezza_maintenance: "要塞维护"
 nd_ita_fortezza_maintenance_desc: "维持一座现代化意大利要塞战斗准备状态所需的石料、铁和火器。"
 nd_ita_conservatorio: "音乐学院"
 nd_ita_conservatorio_desc: "一所意大利音乐与艺术学院，作曲家、音乐家和表演者在这里接受训练，传承了产生维瓦尔第、蒙特威尔第和征服欧洲舞台的歌剧形式的传统。"
 nd_ita_conservatorio_upkeep: "音乐学院维护费用"
 nd_ita_conservatorio_upkeep_desc: "维持意大利音乐学院及其艺术家所需的纸张、优质布匹和玻璃仪器。"
 nd_ita_dest_irredenta: "尚未收复的意大利"
 nd_ita_dest_irredenta_desc: "的里雅斯特、特伦托以及仍然处于外国统治下的意大利语地区必须收复失地。组建一支配得上这一事业的军队，解放每一寸意大利土地。"
 nd_ita_dest_quarta_sponda: "第四海岸"
 nd_ita_dest_quarta_sponda_desc: "突尼斯与的黎波里塔尼亚曾是罗马帝国的粮仓。凭借我们身后的职业军队，意大利将能建立其非洲帝国，掌控地中海中心。"
 nd_ita_dest_mare_nostrum: "我们的海"
 nd_ita_dest_mare_nostrum_desc: "我们的海——地中海。从塞萨洛尼基到亚历山大，从士麦那到墨西拿海峡，意大利必须掌控整个地中海盆地。唯有如此，罗马的继承者才能真正重建帝国。"
 nd_ita_dest_stato_da_mar: "海洋之国"
 nd_ita_dest_stato_da_mar_desc: "威尼斯的海上国家是建立在亚得里亚海贸易霸权之上的。确保拉古萨的安全，保证意大利丝绸通过我们的市场流通，并为一个能与威尼斯共和国匹敌的商业帝国奠定基础。"
 nd_ita_dest_banca_italia: "意大利银行"
 nd_ita_dest_banca_italia_desc: "意大利银行业必须重拾美第奇时代的辉煌地位。夺取克里特岛作为地中海中部的关键枢纽，充盈国库，并拥抱意大利金融家开创的银行业革命。"
 nd_ita_dest_rinascimento: "文艺复兴"
 nd_ita_dest_rinascimento_desc: "意大利必须成为世界上最富有、最发达、商业联系最紧密的国家。掌控全球贸易，充盈国库，发展这片半岛，直至它无可争议地成为文明的中心。"
 STATIC_MODIFIER_NAME_nd_ita_patria_unita: "Patria Unita"
 STATIC_MODIFIER_DESC_nd_ita_patria_unita: "Italy has been forged into a single nation-state under centralized rule. The dream of Mazzini and Garibaldi has become reality — one people, one government, one destiny."
 STATIC_MODIFIER_NAME_nd_ita_repubblica_delle_citta: "Repubblica delle Città"
 STATIC_MODIFIER_DESC_nd_ita_repubblica_delle_citta: "Italy has embraced its heritage as a constellation of great cities — Venice, Florence, Milan, Naples — each contributing its genius to a federated republic that prizes liberty, commerce, and learning above all."
 STATIC_MODIFIER_NAME_nd_ita_arsenale_naval_supremacy: "Arsenale Naval Supremacy"
 STATIC_MODIFIER_DESC_nd_ita_arsenale_naval_supremacy: "The great arsenals of Italy produce war galleys at a pace unmatched in the Mediterranean, and our captains know how to use them."
 STATIC_MODIFIER_NAME_nd_ita_arsenale_merchant_fleet: "Arsenale Merchant Fleet"
 STATIC_MODIFIER_DESC_nd_ita_arsenale_merchant_fleet: "The Italian shipbuilding tradition has been turned toward commerce, producing a merchant fleet that carries goods from the Levant to Flanders."
 STATIC_MODIFIER_NAME_nd_ita_irredenta_march: "Italia Irredenta March"
 STATIC_MODIFIER_DESC_nd_ita_irredenta_march: "The fires of national awakening burn across the peninsula. Volunteers flock to the banner of a united Italy, marching to reclaim every inch of Italian-speaking territory."
 STATIC_MODIFIER_NAME_nd_ita_nation_building: "Nation Building"
 STATIC_MODIFIER_DESC_nd_ita_nation_building: "The dream of Italian nationhood has been won on the battlefield; now it must be cemented through schools, railways, and institutions that bind the peninsula into a true nation."
 STATIC_MODIFIER_NAME_nd_ita_dest_legioni_africane: "Legioni Africane"
 STATIC_MODIFIER_DESC_nd_ita_dest_legioni_africane: "Italy's African legions — colonial regiments recruited, trained, and garrisoned to hold the Fourth Shore and prepare for further expansion across the Mediterranean littoral."
 STATIC_MODIFIER_NAME_nd_ita_dest_dominio_dei_mari: "Dominio dei Mari"
 STATIC_MODIFIER_DESC_nd_ita_dest_dominio_dei_mari: "The Italian fleet rules the waves between Sicily and the African coast, projecting power through naval dominance rather than garrisons — a maritime strategy worthy of the Venetian and Genoese tradition."
 STATIC_MODIFIER_NAME_nd_ita_dest_imperium_romanum: "Novum Imperium Romanum"
 STATIC_MODIFIER_DESC_nd_ita_dest_imperium_romanum: "A new Roman Empire — Italy wields the aggressive military power of a true Mediterranean hegemon, projecting force rapidly across its dominions, though the strain of perpetual campaigning takes its toll."
 STATIC_MODIFIER_NAME_nd_ita_dest_traccia_italiana: "Traccia Italiana"
 STATIC_MODIFIER_DESC_nd_ita_dest_traccia_italiana: "The trace italienne — angular bastion fortifications pioneered by Italian military engineers — makes every Italian position across the Mediterranean an impregnable stronghold defended by modern artillery."
 STATIC_MODIFIER_NAME_nd_ita_dest_diplomazia_medicea: "Diplomazia Medicea"
 STATIC_MODIFIER_DESC_nd_ita_dest_diplomazia_medicea: "The Medici way — influence through finance, diplomacy through generosity, power through the cultivation of friends. Italian ambassadors are welcomed in every court, and Italian credit opens every door."
 STATIC_MODIFIER_NAME_nd_ita_dest_monopolio_rotte: "Monopolio delle Rotte"
 STATIC_MODIFIER_DESC_nd_ita_dest_monopolio_rotte: "Italian merchants and bankers have cornered the most profitable trade routes in the Mediterranean, extracting wealth from every transaction — though such aggressive commerce drives prices upward."
 STATIC_MODIFIER_NAME_nd_ita_dest_rinascimento_universale: "Rinascimento Universale"
 STATIC_MODIFIER_DESC_nd_ita_dest_rinascimento_universale: "A universal rebirth — Italian institutions, academies, and workshops drive the advancement of human knowledge, attracting talent from across the world and ensuring that ideas born in Italy reshape civilization."
 STATIC_MODIFIER_NAME_nd_ita_dest_crocevia_continenti: "Crocevia dei Continenti"
 STATIC_MODIFIER_DESC_nd_ita_dest_crocevia_continenti: "Italy stands at the crossroads of continents — a cosmopolitan commercial empire where diverse peoples are welcomed, infrastructure is built to last, and the loyalty of subjects is earned through prosperity rather than force."