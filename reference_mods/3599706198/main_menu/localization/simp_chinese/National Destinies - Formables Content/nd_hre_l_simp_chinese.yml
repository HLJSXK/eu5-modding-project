l_simp_chinese:
 nd_hre_reichshofkanzlei: "帝国宫廷府"
 nd_hre_reichshofkanzlei_desc: "帝国宫廷府作为核心行政机构，是皇帝统治神圣罗马帝国的中枢。这个由训练有素的法学家和教士组成的机构，负责处理帝国往来文书、颁布诏令，并维系着将数百个半自治领地凝聚为统一政体的法律框架。"
 nd_hre_imperial_knights: "帝国骑士团"
 nd_hre_imperial_knights_desc: "帝国骑士直接效忠于皇帝，而非任何中间封臣，这些骑兵战士构成了帝国封建军事传统的支柱，维系着重骑兵的尚武习俗——这种军事传统自查理曼时代起就定义了中欧的战争形态。"
 nd_hre_feudal_hierarchy: "帝国封建等级制"
 nd_hre_feudal_hierarchy_desc: "由选帝侯、封臣、伯爵和骑士构成的帝国阶层体系，形成了错综复杂的忠诚网络、义务关系与特权结构。尽管这套体系时常显得臃肿低效，却为皇帝提供了治理框架，其多样性是欧洲其他君主国难以企及的。"
 nd_hre_reichstag_origins: "帝国议会起源"
 nd_hre_reichstag_origins_desc: "帝国议会从帝国封臣的非正式集会逐渐演变为结构化的立法机构。至十五世纪末，已形成由选帝侯、封臣及帝国自由城市代表组成的独立议事会，各自拥有就税收、战争及帝国改革等事务进行审议的权力。"
 nd_hre_bergregal: "帝国采矿权"
 nd_hre_bergregal_desc: "《矿山特权法》确立了皇帝在全帝国范围内对矿产资源的最高主权。该法最初于1158年由腓特烈一世在《龙卡利亚宪法》中编纂确立，这些采矿特权使得中欧地区丰富的银矿和铜矿得以系统性开采，特别是在萨克森、波希米亚和蒂罗尔等地。"
 nd_hre_landfrieden: "禁止复仇条例传统"
 nd_hre_landfrieden_desc: "中世纪的复仇条例旨在限制私人战争，维护帝国分裂领土上的公共秩序。尽管这些和平宣言往往被违背多于被遵守，但它们确立了一项原则：皇帝负有维护整个领地秩序的责任。"
 nd_hre_messeplatz: "贸易广场"
 nd_hre_messeplatz_desc: "法兰克福和莱比锡的贸易集市吸引了来自欧洲乃至更远地区的商人。这些由帝国特权批准的定期市场，成为大陆贸易网络中的关键节点，商品、信贷和信息在此跨越政治边界自由流通。"
 nd_hre_bergakademie: "工业学院"
 nd_hre_bergakademie_desc: "工业学院代表了中欧数百年矿物开采积累知识的制度化。这些学院在地质学、冶金学和矿山管理方面培养工匠与学者，将手工艺采矿转变为系统化的科学。"
 nd_hre_maximilian_court: "马克西米利安的文艺复兴宫廷"
 nd_hre_maximilian_court_desc: "马克西米利安一世皇帝将帝国宫廷转变为文艺复兴时期学术与艺术赞助的中心，使得宫廷吸引了众多学者、艺术家和音乐家，而他对骑士竞技、谱系学以及通过艺术进行自我宣传的热忱，共同塑造了文艺复兴时期理想君主的典范。"
 nd_hre_reichspost: "帝国邮政系统"
 nd_hre_reichspost_desc: "自1490年起，帝国邮政由图恩和塔克西斯家族掌管，建立了欧洲首个覆盖神圣罗马帝国的系统性邮政网络。定期骑马信使连接了数千里范围内的主要城市，彻底改变了通信、商业和帝国治理方式。"
 nd_hre_handelsmesse: "梅斯贸易网络"
 nd_hre_handelsmesse_desc: "帝国贸易集市的制度化体系构建了一个周期性市场网络，将整个帝国的生产者、商人与消费者紧密相连。从莱比锡的布匹商到法兰克福的书商，这些集市不仅促进了商品流通，更成为思想交流的重要枢纽。"
 nd_hre_reichsmatrikel: "帝国陆军名册"
 nd_hre_reichsmatrikel_desc: "《帝国兵役名册》确立了各帝国阶层的军事义务，详细规定了每个领地为共同防御必须提供的军队数量及财政贡献。这种分担军事负担的体系，将帝国的封建征召兵转变为更可预测的军事力量，尽管仍保持着分散化。"
 nd_hre_reichskammergericht: "帝国枢密法院"
 nd_hre_reichskammergericht_desc: "1495年在议会成立的帝国枢密法院，作为帝国的最高司法机构，由训练有素的法律专家组成。它负责裁决帝国各阶层之间的争端，执行《禁止复仇条例》，并为数百年来困扰帝国的仇杀与私战提供了和平的替代解决方案。"
 nd_hre_ewiger_landfriede: "永久公共和平"
 nd_hre_ewiger_landfriede_desc: "1495年颁布的《禁止复仇条例》标志着神圣罗马帝国内中世纪血亲复仇权的彻底终结。在马克西米利安一世主持的帝国议会上颁布的这项法令规定，自此所有争端必须通过法庭解决，不得再诉诸武力。"
 nd_hre_reichskreise: "帝国行政区"
 nd_hre_reichskreise_desc: "帝国于1500年至1512年间设立的十个帝国行政区，将帝国领土划分为区域性行政。每个行政区负责征收帝国税赋、维护公共和平、执行法庭裁决以及动员军事力量——这种联邦治理结构在欧洲政治体系中独树一帜。"
 nd_hre_druckkunst: "印刷术的遗产"
 nd_hre_druckkunst_desc: "1440年左右，古腾堡在美因茨发明的活字印刷术将神圣罗马帝国锻造成欧洲的思想熔炉。日耳曼印刷工坊迅速扩展至斯特拉斯堡、纽伦堡与奥格斯堡，以手抄本文化无法企及的速度传播着人文主义学术、宗教论辩与实践知识。"
 nd_hre_imperial_pikeman: "帝国枪刺兵团"
 nd_hre_imperial_pikeman_desc: "帝国改革后的步兵部队融合了在瑞士战争中屡试不爽的长矛队形，以及新帝国军事体系所要求的组织结构。这些训练有素的长矛兵代表了帝国对十六世纪军事革命的回应。"
 nd_hre_universitaeten: "帝国大学传统"
 nd_hre_universitaeten_desc: "神圣罗马帝国拥有基督教世界最密集的大学网络，从布拉格、维也纳和海德堡的古老学府，到日耳曼各地新兴的学术机构。这些学府培养出的法学家、神学家和行政官员，维系着帝国复杂的宪政体系运转。"
 nd_hre_augsburger_religionsfriede: "奥格斯堡和约"
 nd_hre_augsburger_religionsfriede_desc: "1555年的《奥格斯堡宗教和约》确立了“教随君定”原则——谁的领地，就信奉谁的宗教。这一划时代的和解方案赋予路德宗封臣决定其领土信仰的合法权利，终结了帝国内持续数十年的宗教战争，为不同教派共存建立了制度框架。"
 nd_hre_reichsheer: "帝国陆军分遣队"
 nd_hre_reichsheer_desc: "帝国军队正式确立了帝国各级政府根据帝国军编制组建和装备军事力量的体系。虽然这些地方部队并非常备军，但它们可以被动员起来进行共同防御，代表了帝国数百个组成领土的集体军事力量。"
 nd_hre_zeughaus: "军械库"
 nd_hre_zeughaus_desc: "军械库既是帝国军事装备的兵工厂，也是制造中心。从柏林、维也纳和奥格斯堡的大型军械库中，帝国储备了大量武器、盔甲和火药，足以在短时间内装备帝国军队。"
 nd_hre_reichshandelsordnung: "帝国贸易治理"
 nd_hre_reichshandelsordnung_desc: "帝国商业法规旨在统一整个帝国分散经济体系中的度量衡与贸易惯例。尽管执行力度参差不齐，但这些法令为帝国数百个市场与集市间的长途贸易提供了通用框架。"
 nd_hre_konfessionspolitik: "教派外交"
 nd_hre_konfessionspolitik_desc: "帝国在宗教上分裂为天主教与新教两大阵营，催生出独特的教派政治形态。帝国政治家们逐渐掌握在宗教集团间周旋的技巧，他们运用外交手腕、法律先例以及帝国宪政机制，维系着各教派间脆弱的平衡。"
 nd_hre_metallverarbeitung: "帝国金属工坊"
 nd_hre_metallverarbeitung_desc: "帝国丰富的铁、铜、银矿藏支撑起以萨克森、哈尔茨山脉和施蒂利亚阿尔卑斯地区为中心的庞大金属加工业。帝国的冶金师们开发出先进的冶炼与锻造技术，使中欧的铁器与武器装备闻名整个大陆。"
 nd_hre_westfaelischer_friede: "威斯特伐利亚和约"
 nd_hre_westfaelischer_friede_desc: "1648年的《威斯特伐利亚和约》结束了灾难性的三十年战争，重塑了帝国的宪政秩序。加尔文宗与天主教和路德宗一同获得承认，帝国各阶层获得了更大的主权，宗教宽容原则被写入帝国的根本大法。"
 nd_hre_kaiserliche_kurassiere: "帝国胸甲骑兵"
 nd_hre_kaiserliche_kurassiere_desc: "帝国胸甲骑兵代表了威斯特伐利亚和约后帝国重骑兵的巅峰。他们身披胸甲头戴钢盔，手持长剑与手枪，这些精锐骑兵发起的毁灭性冲锋足以击溃步兵方阵。帝国各大骑兵学院培养了一代又一代精通骑战艺术的军官。"
 nd_hre_reichsarmee: "帝国常备军"
 nd_hre_reichsarmee_desc: "帝国军队正式化成为一个更为持久的制度，使帝国拥有了能够保卫边境并投射力量的军事力量。尽管兵员仍来自各地区的分遣队，但通过帝国圈层改善的协调机制，形成了一支整体实力超越各部分简单相加的军队。"
 nd_hre_barockkultur: "帝国巴洛克文化"
 nd_hre_barockkultur_desc: "巴洛克时代将帝国的宫廷与城市转变为艺术辉煌的展示舞台。从维也纳和德累斯顿的宏伟宫殿，到巴伐利亚的朝圣教堂，巴洛克风格既彰显了帝国传统的权威，也展现了日耳曼地区蓬勃的文化生命力。"
 nd_hre_rathaus: "市政厅"
 nd_hre_rathaus_desc: "帝国自由市的宏伟市政厅体现了在帝国宪法框架下的公民自豪感与城镇自治。这些宏伟建筑作为市政管理、司法和商业中心，容纳着治理欧洲最富裕城市的议会机构。"
 nd_hre_postwesen: "帝国邮政网络"
 nd_hre_postwesen_desc: "图尔恩与塔克西斯邮政系统的扩张，形成了覆盖帝国领土的完整网络，构建了近代早期欧洲最高效的通信基础设施。定期邮政路线甚至将各省城镇与重要的商业和政治中心紧密相连。"
 nd_hre_aufklaerung: "日耳曼启蒙运动"
 nd_hre_aufklaerung_desc: "启蒙运动将理性、宽容与系统化知识的理念带入了帝国的制度之中。从莱布尼茨到康德的德国哲学家革新了欧洲思想，而普鲁士、奥地利及德意志诸邦的开明行政官员则推动了治理、教育和司法体系的现代化进程。"
 nd_hre_imperial_fusilier: "帝国燧发枪兵"
 nd_hre_imperial_fusilier_desc: "帝国燧发枪兵团代表了帝国晚期步兵作战的专业化。这些士兵接受启蒙时代的操练与战术训练，配备标准化火枪和刺刀，体现了十八世纪军事革命中理性化的战争理念。"
 nd_hre_manufaktur: "帝国工场"
 nd_hre_manufaktur_desc: "帝国范围内集中制造业的普及，将传统手工艺生产转变为原始工业形态。国家资助的瓷器、纺织和金属加工工场，将日耳曼技术专长与启蒙运动的理性组织原则相结合。"
 nd_hre_polizeiwissenschaft: "警察学"
 nd_hre_polizeiwissenschaft_desc: "警察学是日耳曼的治理与公共行政学，致力于将国家管理的方方面面系统化。凭借数百年的帝国宪政经验，日耳曼官僚学派发展出涵盖财政政策、人口管理和公共福利的完整理论体系，其影响遍及欧洲各国的行政实践。"
 nd_hre_reichsverfassung: "帝国宪政传统"
 nd_hre_reichsverfassung_desc: "从《金玺诏书》到《威斯特伐利亚和约》乃至更远，帝国在欧洲治理中形成了独一无二的判例与原则体系。这一宪法传统在皇权与诸侯自由之间取得平衡，为联邦治理提供了框架，并对后世宪法思想产生了深远影响。"
 nd_hre_kavallerieschule: "骑兵学校"
 nd_hre_kavallerieschule_desc: "帝国军官团的训练学府，传授骑术、骑兵战术与军事科学。诸如维也纳西班牙骑术学校等机构，保存并精炼了数百年的马术传统，培养出引领帝国骑兵部队的杰出骑兵军官。"
 a_nd_hre_imperial_reiter: "帝国骑兵"
 a_nd_hre_imperial_reiter_desc: "帝国骑兵作为直接效忠于皇帝的骑士，延续了定义中欧数百年战争的封建军事传统。他们手持长矛与利剑，身披重甲，代表着帝国最精锐的军事力量。"
 a_nd_hre_imperial_pikeman: "帝国长枪兵"
 a_nd_hre_imperial_pikeman_desc: "纪律严明的长矛步兵，经帝国改革后的军事体系训练而成。他们组成密集方阵，既能抵御骑兵冲锋，又能作为帝国战阵的中流砥柱。"
 a_nd_hre_reichsheer_infantry: "帝国陆军步兵"
 a_nd_hre_reichsheer_infantry_desc: "通过帝国军事体系征召的步兵部队，来自帝国各领地。尽管缺乏常备军的专业凝聚力，但帝国军的庞大规模和地域多样性使其成为一支强大的防御力量。"
 a_nd_hre_kaiserliche_kurassiere: "帝国胸甲骑兵"
 a_nd_hre_kaiserliche_kurassiere_desc: "帝国精锐重骑兵，身披胸甲，手持剑与手枪，经训练可发动毁灭性冲锋，足以击溃敌军阵型，将帝国骑士的尚武传统延续至火药时代。"
 a_nd_hre_imperial_fusilier: "帝国火枪手"
 a_nd_hre_imperial_fusilier_desc: "帝国晚期专业的线列步兵，接受启蒙时代操典训练，配备标准化燧发枪。帝国燧发枪兵团体现了理性化的军事改革，旨在从帝国悠久的军事传统中锻造出一支现代常备军。"
 nd_hre_universitas: "大学"
 nd_hre_universitas_desc: "一所汇聚日耳曼各地学者的帝国大学，培养着帝国治理所依赖的法学家、神学家、医师与行政官员。"
 nd_hre_barockpalast: "巴洛克宫殿"
 nd_hre_barockpalast_desc: "一座宏伟的巴洛克式宫殿，以帝国晚期宫廷标志性的华丽风格建造，成为贵族文化、艺术赞助与政治展示的中心。"
 nd_hre_imperial_mining: "帝国采矿作业"
 nd_hre_imperial_mining_desc: "根据《矿山法》系统性地开采银矿与铜矿，这是皇帝对矿产财富的君主特权。"
 nd_hre_fair_trade: "贸易博览会商业"
 nd_hre_fair_trade_desc: "帝国贸易盛会上的规范商业活动，汇集了来自欧洲各地的布匹、染料与奢侈品。"
 nd_hre_metalworks: "帝国金属工坊"
 nd_hre_metalworks_desc: "先进的冶炼与锻造工艺将中欧的铁矿石转化为维持帝国运转的武器装备与工具。"
 nd_hre_manufaktur_pm: "集中化工厂"
 nd_hre_manufaktur_pm_desc: "结合日耳曼技术专长与启蒙运动理性组织原则的前工业化制造模式。"
 levy_nd_hre_imperial_reiter: "帝国骑兵征召"
 levy_nd_hre_imperial_reiter_desc: "从帝国贵族阶层中征召的封建骑兵骑士。"
 levy_nd_hre_reichsheer: "帝国陆军征召"
 levy_nd_hre_reichsheer_desc: "通过帝国军事贡献制度征召的步兵部队。"
 nd_hre.2.t: "永久和平"
 nd_hre.2.d: "在帝国会议上，各阶层代表共同颁布了《永久和平条例》并永远废除了困扰帝国数个世纪的古老复仇权。自此，任何封臣、骑士或城市都不得再以武力解决私人争端，所有纠纷必须交由帝国法庭裁决。\n\n《禁止复仇条例》不仅是对私战的禁令，更是宣告帝国已成为法治共同体——维系各邦的不仅是刀剑，更有共同的制度与对正义的追求。新设立的帝国最高法院已准备就绪，将裁决那些曾经只能诉诸战场的纷争。\n\n我们应当将这一新秩序视为帝国治理的基石，还是仅将其当作暂时摆脱混乱的权宜之计？"
 nd_hre.2.a: "此和平将成为我们领地的基石。"
 nd_hre.2.b: "和平必须用力量来捍卫。"
 nd_hre.3.t: "帝国最高法院"
 nd_hre.3.d: "帝国最高法院已被确立为神圣罗马帝国的最高司法机构。与皇帝个人的宫廷枢密院不同，该法院的权力源于帝国议会本身，由精通罗马法的博学法学家组成，并由帝国各阶层提名产生。\n\n其司法管辖权涵盖帝国所有领土间的争端——包括破坏公共和平、违反帝国法令、封臣间的财产冲突以及臣民对领主的申诉。这是帝国首次拥有一个常设司法机构，能够解决那些世代以来动摇帝国根基的冲突。\n\n该法院的建立标志着帝国治理方式的重大变革。司法不再仅仅依赖于皇帝的意志与亲临——如今它已根植于法律机构之中。"
 nd_hre.3.a: "让正义成为帝国权威的支柱。"
 nd_hre.3.b: "让宫廷的影响力遍及整个帝国。"
 nd_hre.4.t: "奥格斯堡宗教和约"
 nd_hre.4.d: "历经数十年威胁帝国分裂的教派冲突后，各阶层代表终于达成了一项影响深远的和解。《奥格斯堡和约》确立了“教随君定”原则——每位统治者可决定其领地以天主教或路德宗作为官方信仰。\n\n这并非个人宗教自由的宣言，而是务实妥协。无法接受统治者所选教派的臣民可出售财产，迁往信奉心仪信仰的领地。教会财产受《教产保留条款》保护，《费迪南德声明》则允许特定教会领地保留现存的路德宗实践。\n\n这份和约并不完美——加尔文宗仍未获承认，各教派间的真理主张仅被管控而未彻底解决。但它为帝国提供了最需要的东西：公开宗教战争的终结，以及共存的框架。"
 nd_hre.4.a: "让每位封臣凭良心治理。"
 nd_hre.4.b: "一个信仰，一个帝国，绝无妥协余地。"
 nd_hre.5.t: "《威斯特伐利亚和约》"
 nd_hre.5.d: "一场持续三十年、夺走百万生命并重创欧洲腹地的战争后，列强终于在明斯特与奥斯纳布吕克双城缔结了《威斯特伐利亚和约》。这份协议重塑了神圣罗马帝国自身的宪政秩序。\n\n加尔文宗如今与天主教、路德宗获得同等承认。帝国各阶层的自主权得到确认与扩展——只要不违背皇帝或帝国利益，他们可自主开展外交政策。帝国议会获得新权力，皇帝与各阶层间的宪政平衡以法典形式确立，其影响将延续数代。\n\n对更广阔的世界而言，威斯特伐利亚体系确立了定义新兴国际秩序的原则：主权国家平等、领土边界不可侵犯、不干涉他国内政的义务。帝国在某些方面虽显衰微，但其宪政框架的精妙程度仍冠绝欧陆。"
 nd_hre.5.a: "帝国与欧洲的新秩序。"
 nd_hre.5.b: "让我们重建战争所摧毁的一切。"
 nd_hre.6.t: "日耳曼启蒙运动"
 nd_hre.6.d: "启蒙运动已席卷帝国的大学、宫廷与沙龙。从莱布尼茨的理性哲学到沃尔夫的系统形而上学，日耳曼思想家正在重塑欧洲的思想生活。帝国大学构成的密集网络、拥有印刷机的帝国自由市，以及竞相追求文化卓越的诸侯宫廷，共同为启蒙理想的传播创造了得天独厚的沃土。\n\n帝国各地的开明官员正将理性原则运用于治理——改革法典、建立公共教育、倡导宗教宽容、推动国家行政现代化。源于数百年帝国宪政实践的官房学传统，正演变为一套欧洲诸国争相研习效仿的综合性治理科学。\n\n日耳曼启蒙运动不仅是一场思想革命。它正从内部深刻改变着帝国的制度、法律与行政体系。"
 nd_hre.6.a: "理性将指引我们前行。"
 nd_hre_chancellery_maintenance: "总理府维护"
 nd_hre_chancellery_maintenance_desc: "维护帝国总理府的行政记录、法律书籍和往来信函。"
 nd_hre_fair_maintenance: "场地维护费用"
 nd_hre_fair_maintenance_desc: "筹备并维护帝国贸易集市的场地、摊位及相关设施。"
 nd_hre_mining_operations: "采矿作业"
 nd_hre_mining_operations_desc: "为矿业学院运营提供木材支架和铁制工具。"
 nd_hre_court_maintenance: "宫廷维护"
 nd_hre_court_maintenance_desc: "维护帝国宫廷的记录、印章、法律典籍及法律文书往来。"
 nd_hre_university_maintenance: "大学维护"
 nd_hre_university_maintenance_desc: "向帝国大学提供书籍、纸张与学术资料。"
 nd_hre_arsenal_maintenance: "军械库维护"
 nd_hre_arsenal_maintenance_desc: "在帝国兵工厂制造并储存武器和装备。"
 nd_hre_palace_maintenance: "宫殿维护"
 nd_hre_palace_maintenance_desc: "维护一座宏伟巴洛克宫殿的石雕与玻璃。"
 nd_hre_rathaus_maintenance: "市政厅维护"
 nd_hre_rathaus_maintenance_desc: "维持帝国市政厅的民用建筑与行政运作。"
 nd_hre_academy_maintenance: "学院维护"
 nd_hre_academy_maintenance_desc: "为骑兵训练学院提供马匹、装备与教官。"
 STATIC_MODIFIER_NAME_nd_hre_pax_imperii: "Pax Imperii"
 STATIC_MODIFIER_DESC_nd_hre_pax_imperii: "The Perpetual Public Peace has been proclaimed throughout the Empire. The medieval right of vendetta is abolished, and all disputes must henceforth be settled through the courts."
 STATIC_MODIFIER_NAME_nd_hre_imperial_justice: "Imperial Justice"
 STATIC_MODIFIER_DESC_nd_hre_imperial_justice: "The Imperial Chamber Court has been established, providing a supreme judicial institution where the disputes of princes and the grievances of subjects can be adjudicated according to Roman law."
 STATIC_MODIFIER_NAME_nd_hre_cuius_regio: "Cuius Regio, Eius Religio"
 STATIC_MODIFIER_DESC_nd_hre_cuius_regio: "The principle that each ruler may determine the religion of their territory has brought an end to open religious warfare within the Empire, establishing a framework for confessional coexistence."
 STATIC_MODIFIER_NAME_nd_hre_westphalian_order: "Westphalian Order"
 STATIC_MODIFIER_DESC_nd_hre_westphalian_order: "The Peace of Westphalia has recast the constitutional foundations of the Empire. Religious toleration is enshrined in law, sovereign rights are clarified, and a new era of diplomatic order begins."
 STATIC_MODIFIER_NAME_nd_hre_armed_peace: "Armed Peace"
 STATIC_MODIFIER_DESC_nd_hre_armed_peace: "The Perpetual Public Peace is maintained not by law alone but by the military readiness of the Imperial estates. Peace is preserved because all know the cost of breaking it."
 STATIC_MODIFIER_NAME_nd_hre_imperial_diplomacy: "Imperial Diplomacy"
 STATIC_MODIFIER_DESC_nd_hre_imperial_diplomacy: "The Imperial Chamber Court extends the Empire's diplomatic influence, as its legal authority resolves disputes that once would have required ambassadors and armies."
 STATIC_MODIFIER_NAME_nd_hre_religious_conformity: "Religious Conformity"
 STATIC_MODIFIER_DESC_nd_hre_religious_conformity: "One faith, one Empire. The insistence on religious uniformity strengthens state authority and social cohesion, even at the cost of tolerating no dissent."
 STATIC_MODIFIER_NAME_nd_hre_postwar_recovery: "Postwar Recovery"
 STATIC_MODIFIER_DESC_nd_hre_postwar_recovery: "The devastation of war gives way to reconstruction. Trade resumes, fields are replanted, and the economy slowly recovers from the catastrophe."