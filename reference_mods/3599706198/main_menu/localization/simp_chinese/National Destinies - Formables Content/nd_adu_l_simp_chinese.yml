l_simp_chinese:
 nd_adu.1.t: "安达卢斯的复兴"
 nd_adu.1.d: "新月旗帜再次飘扬在整个伊比利亚上空。在基督教王国曾经瓜分半岛的地方，一个统一的伊斯兰国家已从泰法时代的废墟中崛起。科尔多瓦在哈里发时代的记忆是欧洲最博学、最繁荣的地方，这在每个学者和士兵心中知晓。\n\n但安达卢斯面临着一个自伍麦叶时代以来就定义其自身的抉择。我们是复兴共存的传统，让清真寺与犹太会堂、教堂并存，让伊本·鲁世德与亚里士多德辩论，让迈蒙尼德在穆斯林的统治下找到庇护？还是追随穆瓦希德人和穆拉比特人的道路，他们带着纪律严明的柏柏尔骑兵跨越海峡，通过军事虔诚和宗教正统建立了一个帝国？\n\n#bold 此选择将在传统标签页中解锁一条命运之路。#!"
 nd_adu.1.a: "让科尔多瓦再度闪耀，成为世界的瑰宝。"
 nd_adu.1.b: "马格里布之剑必将团结信众。"
 nd_adu.2.t: "和睦共存的繁荣"
 nd_adu.2.d: "在安达卢斯的各大城市中，一种非凡的气象正在生根发芽。穆斯林学者与犹太哲学家在科尔多瓦的图书馆里高谈阔论。基督教抄写员誊录着关于数学与天文学的阿拉伯语文献。格拉纳达的优素福一世伊斯兰学校不仅教授《古兰经》与圣训，还传授医学、几何学以及自然哲学。\n\n这绝非单纯的宽容，而是在用心培育一种从多元中汲取力量的文明。当欧洲早已将亚里士多德的著作遗忘时，它们借由阿拉伯语得以保存，如今又通过安达卢斯的翻译家们重新回流至更广阔的世界。基督教世界的学者们纷纷跋涉至此求学，被这片知识跨越信仰界限的土地之盛名所吸引。"
 nd_adu.2.a: "让所有渴求知识之人都能在我们的殿堂中寻得所愿。"
 nd_adu.3.t: "翻译运动"
 nd_adu.3.d: "安达卢斯的各处译书院已然成为世界的学术十字路口。在托莱多、科尔多瓦与塞维利亚，有关医学、天文学、数学和哲学的阿拉伯语文献正被不断译为拉丁语、希伯来语及罗曼语。宰赫拉威的外科学著作、扎尔卡利的天文仪器论述，以及伊本·鲁世德的亚里士多德哲学篇章，正在重塑远超伊斯兰世界边界的学术版图。\n\n然而，一个问题在我们的学者间引发了分歧。我们是否应当保持学术传统中纯粹的阿拉伯本色，继续撰写推动人类知识进步的原创著作？亦或我们应该拥抱“普世译者”的身份，让所有知识跨越语言与宗教的藩篱变得触手可及——哪怕这要以淡化我们独特的学术特质为代价？"
 nd_adu.3.a: "我们的传统早已彰显其价值——让我们在此之上继续建树。"
 nd_adu.3.b: "知识属于全人类。"
 nd_adu.4.t: "阿尔罕布拉宫的辉煌"
 nd_adu.4.d: "雄踞于格拉纳达城之上，以内华达山脉为背景，阿尔罕布拉宫拔地而起，宛若天堂幻景。其夯土城墙内隐藏着美得不可思议的庭院——狮子院中，十二尊大理石兽守护着清澈的喷泉；使节厅里，钟乳拱顶象征着七重天；而在赫内拉利费宫，层叠的梯田花园顺着山坡倾泻而下，谱写出一曲水与石的交响乐。\n\n这绝不仅仅是一座宫殿。它是安达卢斯理想的具象化体现——艺术、建筑与工程学能够将粗糙的泥土转化为美得动人心魄的杰作。每一寸表面都覆满了几何阿拉伯式花纹，每一座喷泉都是水利工程的精妙实践，每一处花园皆为灌溉科学的绝佳典范。阿尔罕布拉宫证明了，安达卢斯能够创造出足以媲美世上任何文明的奇观。"
 nd_adu.4.a: "让这份辉煌世代激励我们的人民。"
 nd_adu_jinete_tradition: "希内特传统"
 nd_adu_jinete_tradition_desc: "安达卢斯的骑兵采用柏柏尔式的骑术风格——轻装、迅捷，能在全速疾驰的马鞍上投掷标枪，极为致命。"
 nd_adu_ribat_frontier: "里巴特边防"
 nd_adu_ribat_frontier_desc: "里巴特戍守着信徒的边防，将堡垒的坚固与修道院般的严明纪律融为一体。"
 nd_adu_acequia_irrigation: "阿塞基亚灌溉"
 nd_adu_acequia_irrigation_desc: "安达卢斯的阿塞基亚水渠系统运用了伊斯兰文明数个世纪以来的水利学识，将贫瘠的旱地化作了丰饶的园圃。"
 nd_adu_islamic_jurisprudence: "伊斯兰教法学"
 nd_adu_islamic_jurisprudence_desc: "安达卢斯的教法学家们依托马立克学派的学说，发展出了一套精深的教法传统，从而建立起井然有序的治理体系。"
 nd_adu_urban_civilization: "城市文明"
 nd_adu_urban_civilization_desc: "安达卢斯的各大城市树立了城市生活的标杆，公共浴场、铺砌街道与活水系统在此一应俱全。"
 nd_adu_mosque_network: "清真寺网络"
 nd_adu_mosque_network_desc: "从科尔多瓦大清真寺到简陋的乡村祈祷室，一张由聚礼清真寺构筑的网络维系着整个安达卢斯的宗教生活。"
 nd_adu_zenata_warriors: "泽纳塔近卫骑兵"
 nd_adu_zenata_warriors_desc: "来自泽纳塔部落的柏柏尔精锐骑兵构成了安达卢斯重骑兵的核心，他们纪律严明，冲锋时令人胆寒。"
 nd_adu_madrasa_tradition: "经学院传统"
 nd_adu_madrasa_tradition_desc: "经学院作为正规的伊斯兰学术机构，其设立为安达卢斯的诸多城市带来了系统化的教育。"
 nd_adu_mediterranean_trade: "地中海贸易网络"
 nd_adu_mediterranean_trade_desc: "安达卢斯商人通过阿尔梅里亚、马拉加与阿尔赫西拉斯港口交易丝绸、蔗糖与干果，将伊斯兰伊比利亚与更广阔的地中海世界紧密相连。"
 nd_adu_convivencia: "和睦共存"
 nd_adu_convivencia_desc: "穆斯林、基督教徒与犹太教徒和睦共处的传统，使安达卢斯成为了学术交流与文化繁荣的灯塔。"
 nd_adu_naval_arsenal: "海军造船厂"
 nd_adu_naval_arsenal_desc: "位于阿尔梅里亚与阿尔赫西拉斯的“达尔·西纳”造船厂出产了众多桨帆战舰，它们掌控着整个西地中海的霸权"
 nd_adu_caliphal_administration: "哈里发行政体系"
 nd_adu_caliphal_administration_desc: "哈里发国中央集权的行政机构由维齐尔、卡迪与行省总督构成，确保了国家统治的高效运转。"
 nd_adu_ghazi_warriors: "加齐武士"
 nd_adu_ghazi_warriors_desc: "安达卢斯的加齐们作为戍边武士，将宗教狂热与战场骁勇融为一体，捍卫着“伊斯兰之家”。"
 nd_adu_alcazar_fortification: "阿尔卡扎要塞"
 nd_adu_alcazar_fortification_desc: "安达卢斯的阿尔卡扎城堡是兼具防御功能的宫殿建筑群，它们既是权力的中枢，亦是坚不可摧的壁垒。"
 nd_adu_translation_movement: "翻译运动"
 nd_adu_translation_movement_desc: "将阿拉伯语学术文献系统性地译为拉丁语与希伯来语，使安达卢斯化作连接伊斯兰文明与基督教文明的学术桥梁；而虹彩陶器则彰显了这场交融所孕育的物质文化。"
 nd_adu_silk_industry: "丝织业"
 nd_adu_silk_industry_desc: "格拉纳达与阿尔梅里亚的丝织工坊出产全欧洲最上乘的织物，其织造的锦缎与塔夫绸在整个地中海地区备受推崇。"
 nd_adu_diplomatic_survival: "卓越外交"
 nd_adu_diplomatic_survival_desc: "数个世纪以来在强邻环伺中的不断周旋，使得安达卢斯的外交官们深谙通过谈判求存的艺术。"
 nd_adu_port_cities: "安达卢斯的港口城市"
 nd_adu_port_cities_desc: "阿尔梅里亚、马拉加与塞维利亚等大港，支撑起了一张从摩洛哥延伸至黎凡特的海上贸易网络。"
 nd_adu_alhambra_legacy: "阿尔罕布拉的遗产"
 nd_adu_alhambra_legacy_desc: "阿尔罕布拉宫的建筑传统，促成了伊斯兰艺术与建筑在整个安达卢斯的繁荣。"
 nd_adu_corsair_tradition: "私掠传统"
 nd_adu_corsair_tradition_desc: "迅捷的奈斯尔私掠者巡弋于直布罗陀海峡与西地中海，他们在护卫贸易航线的同时，亦对敌方船只进行劫掠。"
 nd_adu_fiscal_innovation: "财政创新"
 nd_adu_fiscal_innovation_desc: "安达卢斯发展出了完善的财政工具与规范的交易市场，苏克集市更是成为了每座城市商业生活的核心。"
 nd_adu_waqf_system: "瓦克夫捐赠"
 nd_adu_waqf_system_desc: "“瓦克夫”作为一种旨在兴办公共事业的伊斯兰慈善捐赠制度，为医院、学校与基础设施的建设提供了资金支持"
 nd_adu_military_reform: "柏柏尔-安达卢斯军事融合"
 nd_adu_military_reform_desc: "北非柏柏尔诸王朝的军事传统与伊比利亚的战术技艺交融，孕育出了一种独特的安达卢斯战争艺术，并造就了众多闻名遐迩的铸剑师与制甲师。"
 nd_adu_taifa_governance: "泰法治理"
 nd_adu_taifa_governance_desc: "汲取了泰法诸国分崩离析的教训，安达卢斯建立起了一套旨在遏制地方分离主义的制度。"
 nd_adu_centralized_sultanate: "中央集权苏丹国"
 nd_adu_centralized_sultanate_desc: "苏丹巩固了对各行省的直接控制，以皇家行政长官取代了半自治的总督。"
 nd_adu_infrastructure_renewal: "基础设施复兴"
 nd_adu_infrastructure_renewal_desc: "一项公共工程计划使安达卢斯的行政机构焕然一新，通过设立各行省的文书院，统筹协调着整个疆土的治理。"
 nd_adu_maritime_expansion: "海上扩张"
 nd_adu_maritime_expansion_desc: "安达卢斯扩充了其海军实力，通过新建造船厂与招募经验丰富的水手，将力量投射至整个地中海。"
 nd_adu_standing_army: "常备军"
 nd_adu_standing_army_desc: "安达卢斯不再依赖部族征召兵与加齐志愿者，转而建立起一支受皇家直接指挥、纪律严明的专业常备步兵部队。"
 nd_adu_majlis_council: "马吉利斯议会"
 nd_adu_majlis_council_desc: "由名流显贵组成的协商议会负责在法律与施政事务上向统治者建言献策，从而在王权与社群共识之间维持平衡。"
 nd_adu_islamic_enlightenment: "伊斯兰启蒙运动"
 nd_adu_islamic_enlightenment_desc: "新一代的安达卢斯学者推崇实证探索与理性思辨，延续了伊本·鲁世德的学术传统。"
 nd_adu_industrial_modernization: "工业现代化"
 nd_adu_industrial_modernization_desc: "安达卢斯在汲取现代制造工艺的同时，依然立足于其传承数个世纪的精湛手工艺传统。"
 nd_adu_modern_army: "近代军队"
 nd_adu_modern_army_desc: "安达卢斯军队全面引进了近代化的操练规范、战术阵型与火器技术，足以与同时代的任何列强军队相抗衡。"
 nd_adu_andalusi_renaissance: "安达卢斯文艺复兴"
 nd_adu_andalusi_renaissance_desc: "一场文化的繁荣再现了哈里发国的黄金时代，安达卢斯再度化身为艺术、文学与哲学的中心。"
 nd_adu_urban_renewal: "城市复兴"
 nd_adu_urban_renewal_desc: "安达卢斯的各大城市迎来了扩张与现代化，吸引了来自整个伊斯兰世界的移民与商旅。"
 nd_adu_global_trade_mastery: "全球贸易霸权"
 nd_adu_global_trade_mastery_desc: "安达卢斯凭借其地处大西洋与地中海交汇处的枢纽地位，主宰了全球贸易网络。"
 a_nd_adu_jinete: "希内特轻骑兵"
 a_nd_adu_jinete_desc: "这些柏柏尔风格的轻骑兵装备着标枪与小圆盾。他们驾驭着矮小灵活的珍妮特马，是精通游击与袭扰战术的大师。"
 a_nd_adu_zenata_guard: "泽纳塔近卫骑兵"
 a_nd_adu_zenata_guard_desc: "这支选拔自柏柏尔泽纳塔部落的精锐重骑兵披坚执锐且纪律严明。作为战场上的突击部队，他们构成了安达卢斯骑兵武装的核心力量。"
 a_nd_adu_ghazi: "加齐"
 a_nd_adu_ghazi_desc: "作为戍守安达卢斯边疆、为信仰而战的神圣勇士，他们将宗教狂热与在崎岖地形中致命的战斗技艺完美结合。"
 a_nd_adu_nizam_infantry: "尼扎姆新军"
 a_nd_adu_nizam_infantry_desc: "这些接受过欧洲战术操练的近代化专业步兵，构成了安达卢斯改革后常备军的核心骨干。"
 n_nd_adu_war_galley: "安达卢斯战桨帆船"
 n_nd_adu_war_galley_desc: "这种建造于阿尔梅里亚‘达尔·西纳’造船厂的地中海战桨帆船，其体型与速度均优于标准桨帆船，专为掌控西地中海而设计。"
 n_nd_adu_nasrid_corsair: "奈斯尔私掠船"
 n_nd_adu_nasrid_corsair_desc: "这是一款源自奈斯尔海军传统的迅捷轻型袭掠舰，专为猎杀商船与护卫直布罗陀海峡而设计。"
 nd_adu_madrasa: "马德拉萨"
 nd_adu_madrasa_desc: "这所伊斯兰高等学府致力于教授神学、法学、医学、数学与哲学。"
 nd_adu_acequia: "阿塞基亚水渠"
 nd_adu_acequia_desc: "这套精密的灌溉渠道系统将山涧溪流引至农田与庭院，从而支撑起了集约化农业的发展。"
 nd_adu_alcazar: "阿尔卡萨尔宫堡"
 nd_adu_alcazar_desc: "这座以独特的安达卢斯风格建造的要塞化宫殿群，兼具着行政中心与防御堡垒的双重职能。"
 nd_adu_dar_al_tiraz: "达尔·提拉兹"
 nd_adu_dar_al_tiraz_desc: "这家皇家织造坊生产着欧洲最顶级的丝绸织物——其出产的塔夫绸、暗花缎与织锦在整个地中海地区都备受推崇。"
 nd_adu_funduq: "丰杜克商站"
 nd_adu_funduq_desc: "这座兼具商行与货栈功能的建筑，是热那亚、加泰罗尼亚与摩洛哥商贾们交易地中海各地货物的集散地。"
 nd_adu_ribat: "里巴特要塞"
 nd_adu_ribat_desc: "这座将军事防御与宗教修行融为一体的边疆要塞修道院，驻扎着誓言捍卫伊斯兰疆界的勇士。"
 nd_adu_hammam: "哈曼浴场"
 nd_adu_hammam_desc: "这座公共浴场集日常盥洗、社交集会与宗教净身功能于一体——它是安达卢斯城市文化的基石。"
 nd_adu_dar_al_sinaa: "达尔·西纳造船厂"
 nd_adu_dar_al_sinaa_desc: "这座国家级海军兵工厂负责建造战桨帆船与商船，构成了安达卢斯海上力量的绝对支柱。"
 nd_adu_waqf: "瓦克夫基金会"
 nd_adu_waqf_desc: "这项伊斯兰慈善捐赠基金永久性地资助着医院、学校与公共工程，以造福整个社群。"
 nd_adu_lusterware_kiln: "光泽彩陶窑"
 nd_adu_lusterware_kiln_desc: "这家陶瓷作坊出产著名的安达卢斯虹彩陶器——这种施釉陶器闪耀着金铜交织的绚丽虹彩，从塞维利亚到开罗皆备受推崇。"
 nd_adu_forge: "安达卢斯锻造坊"
 nd_adu_forge_desc: "这座传承了托莱多钢工艺传统的武器工坊中，铸剑大师们打造出的刀剑因其刚柔并济的品质而饮誉整个地中海。"
 nd_adu_suq: "苏克集市"
 nd_adu_suq_desc: "作为每一座安达卢斯城市的商业心脏，这处中央市场与室内巴扎汇聚了四方商贾、能工巧匠以及征收赋税的官员。"
 nd_adu_diwan: "迪万官署"
 nd_adu_diwan_desc: "作为国家的行政秘书处，书记官与官僚们在此管理着王国的档案、往来信函以及财政账目。"
 nd_adu_madrasa_upkeep: "学术赞助"
 nd_adu_madrasa_upkeep_desc: "纸张、典籍与烛火维系着马德拉萨的教育使命。"
 nd_adu_acequia_maintenance: "水渠维护"
 nd_adu_acequia_maintenance_desc: "石材、木料与修缮工具确保了阿塞基亚水渠的清澈畅通。"
 nd_adu_alcazar_garrison: "宫堡卫队"
 nd_adu_alcazar_garrison_desc: "武器、石材与皮甲维持着阿尔卡萨尔宫堡的防御战备状态。"
 nd_adu_silk_weaving: "丝绸织造"
 nd_adu_silk_weaving_desc: "生丝与染料在这里被转化为全欧洲最顶级的织物。"
 nd_adu_mechanized_weaving: "机械化织造"
 nd_adu_mechanized_weaving_desc: "现代化的机械设备不仅提升了丝绸的产量，还引入了棉混纺工艺，从而开拓了更广阔的市场。"
 nd_adu_funduq_operations: "商贸运作"
 nd_adu_funduq_operations_desc: "布匹、纸张与盐巴便利了跨国商贾们的贸易往来。"
 nd_adu_ribat_upkeep: "边疆驻军"
 nd_adu_ribat_upkeep_desc: "武器、粮秣、皮质马具与各类工具，维系着里巴特要塞中苦修勇士们的战备与修行。"
 nd_adu_hammam_operations: "浴场运作"
 nd_adu_hammam_operations_desc: "木材、陶瓦与煤炭燃料维系着哈曼浴场的供暖与日常修缮。"
 nd_adu_shipyard_maintenance: "海军维护"
 nd_adu_shipyard_maintenance_desc: "木材、铁器与沥青维系着兵工厂的舰船建造作业。"
 nd_adu_waqf_endowment: "慈善事业"
 nd_adu_waqf_endowment_desc: "粮食、布匹与纸张维系着瓦克夫基金会的慈善与教育使命。"
 nd_adu_lusterware_production: "光泽彩陶烧制"
 nd_adu_lusterware_production_desc: "陶土与金属颜料在此被烧制成闪耀着绚丽虹彩的施釉陶器，在整个地中海地区都备受推崇。"
 nd_adu_sword_forging: "刀剑锻造"
 nd_adu_sword_forging_desc: "铁与煤炭供给着不熄的锻炉，在此铸就了传承托莱多传奇工艺的安达卢斯刀剑。"
 nd_adu_suq_operations: "集市运作"
 nd_adu_suq_operations_desc: "布匹、盐巴与纸张维系着中央集市的商业运作。"
 nd_adu_diwan_administration: "官署运作"
 nd_adu_diwan_administration_desc: "纸张、典籍、官员的华美官服与办公陈设，维系着官署档案记录与往来信函的日常流转。"
 levy_nd_adu_jinete: "希内特骑兵"
 levy_nd_adu_jinete_desc: "这支柏柏尔风格的轻骑兵，广泛征召自安达卢斯的军事世家与贵族庄园。"
 levy_nd_adu_ghazi: "加齐志愿军"
 levy_nd_adu_ghazi_desc: "这些受召捍卫信仰疆界的边疆护教勇士。"
 nd_adu_formed_tt: "安达卢斯已成立"
 nd_adu_path_a_tt: "选择“世界之饰”路线"
 nd_adu_path_b_tt: "选择“马格里布之剑”路线\""
 STATIC_MODIFIER_NAME_nd_adu_ornament_of_the_world: "世界之饰"
 STATIC_MODIFIER_DESC_nd_adu_ornament_of_the_world: "安达卢斯宛如一座熠熠生辉的学术灯塔。在这里，穆斯林、基督徒与犹太教学者们自由地交流着学识；而科尔多瓦那浩如烟海的图书馆，更是足以与世上任何一座学术殿堂相媲美。"
 STATIC_MODIFIER_NAME_nd_adu_sword_of_the_maghreb: "马格里布之剑"
 STATIC_MODIFIER_DESC_nd_adu_sword_of_the_maghreb: "在圣战的烈焰中百炼成钢，安达卢斯的勇士们高举着纯粹信仰的旗帜大举进军。他们麾下的柏柏尔骑兵与圣战勇士，正令整个半岛闻风丧胆。"
 STATIC_MODIFIER_NAME_nd_adu_house_of_wisdom_west: "西方智慧之家"
 STATIC_MODIFIER_DESC_nd_adu_house_of_wisdom_west: "受巴格达传奇的智慧之家启发，安达卢斯的学者们建立起了属于他们自己的、包罗万象的学术殿堂。在这里，无数珍贵典籍被精心翻译、自由探讨，并得以永世长存。"
 STATIC_MODIFIER_NAME_nd_adu_arabic_scholarship: "阿拉伯学术传统"
 STATIC_MODIFIER_DESC_nd_adu_arabic_scholarship: "安达卢斯传承并拓展了阿拉伯的学术传统，这里孕育出的无数原创巨著，足以与巴格达和开罗的最伟大成就比肩而立。"
 STATIC_MODIFIER_NAME_nd_adu_universal_knowledge: "普世学识交流"
 STATIC_MODIFIER_DESC_nd_adu_universal_knowledge: "安达卢斯的各大翻译院化作了连接不同文明的坚实桥梁，将古人的智慧结晶，无私地传递给世间所有渴求真知的人。"
 STATIC_MODIFIER_NAME_nd_adu_alhambra_splendor: "阿尔罕布拉宫的辉煌"
 STATIC_MODIFIER_DESC_nd_adu_alhambra_splendor: "阿尔罕布拉宫建筑群堪称伊斯兰文明艺术造诣的绝佳证明。其精雕细琢的蜂窝穹顶与几何蔓藤花纹交相辉映，令全世界为之叹为观止。"
 nd_adu_destiny: "安达卢斯的天命"
 nd_adu_destiny_desc: "随着伊比利亚在新月旗下重归一统，安达卢斯已然站在了学术启蒙与武力征服的十字路口。"
 nd_adu_dest_knowledge: "学识之复兴"
 nd_adu_dest_knowledge_desc: "重建科尔多瓦的传奇图书馆，并将世界各地的学者招致麾下。需要接纳“银行业”思潮，首都市场中拥有“丝绸”商品，并花费1000金币。"
 nd_adu_dest_translators: "文明之桥"
 nd_adu_dest_translators_desc: "将安达卢斯的学术影响力扩展至奥克西塔尼亚。需要拥有图卢兹，接纳“印刷术”思潮，国家总发展度达到7500，并花费2000金币。"
 nd_adu_dest_golden_age: "第二黄金时代"
 nd_adu_dest_golden_age_desc: "通过建立一个横跨地中海的普世文明，去超越曾经那不可一世的科尔多瓦哈里发国。需要拥有巴勒莫，接纳“科学革命”思潮，威望达到75，花费3000金币，并且国家总发展度达到10000。"
 nd_adu_dest_reconquest: "光复马格里布"
 nd_adu_dest_reconquest_desc: "跨过海峡，为安达卢斯收复马格里布地区。需要拥有非斯与特莱姆森，并拥有一支规模达到30,000人的陆军。"
 nd_adu_dest_caliphate: "重建哈里发国"
 nd_adu_dest_caliphate_desc: "在安达卢斯的旗帜下，统合整个西部伊斯兰世界。需要拥有突尼斯与马拉喀什，拥有一支规模达到50,000人的陆军，并且威望达到50。"
 nd_adu_dest_empire: "新月帝国"
 nd_adu_dest_empire_desc: "建立一个从大西洋一路延伸至尼罗河的庞大帝国。需要拥有的黎波里与开罗，拥有一支规模达到75,000人的陆军，威望达到75，并花费3,000金币。"
 nd_adu.5.t: "安达卢斯的天命"
 nd_adu.5.d: "随着半岛的平定与疆域的巩固，科尔多瓦的学者与边境的勇士们都在仰望我们，等待着下一步的指引。我们在建国之初所笃定的道路，如今已开始结出丰硕的果实。无论是通过传播学识，还是凭借大军的征伐，安达卢斯都必将在世界舞台上留下属于自己的深刻印记。"
 nd_adu.5.a: "我们的天命，就在前方。"
 nd_adu.6.t: "学识之复兴"
 nd_adu.6.d: "科尔多瓦的伟大图书馆正在重建。从巴格达一直到拜占庭的学者们纷纷奔赴我们的宫廷，吸引他们的是慷慨的赞助，以及无论真理指向何方都能自由追寻的特权。安达卢斯的各大银号纷纷出资组建探险队，去寻回散落的珍贵手稿；而丝绸商人们则沿着漫长的贸易路线，不仅运送着华美的布匹，更传播着新颖的思想。那个曾令这片土地成为世界奇迹的学术传统正在涅槃重生。"
 nd_adu.6.a: "让求知的明灯再次闪耀。"
 nd_adu.7.t: "文明之桥"
 nd_adu.7.d: "我们的学者已在图卢兹与奥克西塔尼亚的诸城市站稳了脚跟，在伊斯兰世界与基督教世界之间开辟出了一条学术交流的走廊。关于天文学、医学与哲学的阿拉伯文典籍源源不断地向北流传，而欧洲在工程学与航海术上的创新则一路南下。安达卢斯已然成为连接不同文明不可或缺的桥梁。\n\n然而，这座桥梁可以有不同的功用。一些人主张，我们应当利用作为知识译介者与调停者的特殊地位，进一步扩大我们的外交影响力，将我们所接触到的各族人民同化入这个四海一家的寰宇文明之中。另一些人则认为，我们应当趁此良机，将资源倾注于本国的艺术与都城的美化建设上，将安达卢斯打造成一个令全世界歆羡的地上乐园。"
 nd_adu.7.a: "我们将成为连接万邦的桥梁。"
 nd_adu.7.b: "让我们建立一个配得上这份学识的地上乐园。"
 nd_adu.8.t: "第二黄金时代"
 nd_adu.8.d: "伟业已成。从科尔多瓦的列柱到巴勒莫的马赛克镶嵌画，从图卢兹的葡萄园到瓦伦西亚的图书馆，安达卢斯已经建立起了一个足以媲美世上已知最伟大存在的超级文明。我们的学者不仅保存了古人的智慧——他们更超越了前人，在光学、化学与医学领域取得了古人做梦都不敢想的伟大发现。\n\n如今的问题是，该如何为这项伟业加冕。我们是该将国内的诸大学院整合为一所面向所有信仰与国家开放的普世最高学府，以此塑造人类未来的思想格局？还是该转向内求，臻善臻美我们疆域内的园林与宫殿，直到安达卢斯本身化作一件惊世骇俗的艺术品——一个足以让后世传颂千年的地上乐园？"
 nd_adu.8.a: "建立普世科学院。"
 nd_adu.8.b: "营建人间极乐园。"
 nd_adu.9.t: "光复马格里布"
 nd_adu.9.d: "安达卢斯的大军已经跨过海峡，将旗帜插在了非斯（Fez）与特莱姆森（Tlemcen）的城头。当年穆拉比特王朝与穆瓦希德王朝北上拯救伊比利亚穆斯林的路线，如今被彻底逆转——安达卢斯人挥师南下，将整个马格里布统合在他们的统治之下。那些昔日为伊比利亚伊斯兰政权提供突击骑兵的柏柏尔部落，如今纷纷向科尔多瓦的苏丹宣誓效忠。西地中海已经开始呈现出安达卢斯“内湖”的特质。"
 nd_adu.9.a: "海峡已在我们掌控之中。让我们继续高歌猛进。"
 nd_adu.10.t: "重建哈里发国"
 nd_adu.10.d: "从马拉喀什到突尼斯，从阿特拉斯山脉到伊比利亚的海岸，整个西部伊斯兰世界已在安达卢斯的旗帜下重归一统。伍麦叶王朝在科尔多瓦开启的伟业，穆瓦希德王朝在马拉喀什尝试的壮举，如今终于大功告成——一个统治着整个穆斯林西部领土的统一哈里发国赫然挺立。\n\n然而，这个哈里发国的特质仍有待确立。一些人敦促我们引导加齐勇士们的狂热，保持为我们赢得这个帝国的尚武精神，并为进一步的征服做好准备。另一些人则建议我们休养生息，巩固统治——从我们广袤的疆域中攫取贡赋，并建立起统治如此庞大帝国所需的行政管理机构。"
 nd_adu.10.a: "信仰之剑，永不归鞘。"
 nd_adu.10.b: "让帝国的财富涌入我们的国库。"
 nd_adu.11.t: "新月帝国"
 nd_adu.11.d: "安达卢斯的旗帜飘扬在开罗上空。金字塔与阿尔罕布拉宫，科尔多瓦的图书馆与凯鲁万的清真寺，直布罗陀海峡与尼罗河口——所有这一切，都统一在了一位苏丹的治下。自早期伍麦叶王朝以来，还从未有任何一位穆斯林统治者能在西方统御如此辽阔且多元的帝国。\n\n我们该如何统治这个庞大的帝国？是作为“诸苏丹之苏丹”，成为一个麾下大军能从大西洋一路开拔至红海的绝对陆军霸主？还是作为“西部哈里发”，成为一个旗下舰队称霸地中海、外交触角延伸至从里斯本到亚历山大港每一个港口的海权帝国？"
 nd_adu.11.a: "我们是诸苏丹之苏丹。"
 nd_adu.11.b: "我们是西部哈里发国。"
 STATIC_MODIFIER_NAME_nd_adu_dest_intellectual_bridge: "智识之桥"
 STATIC_MODIFIER_DESC_nd_adu_dest_intellectual_bridge: "安达卢斯充当了连接不同文明的智识之桥，其学者们翻译并传播的学识，正在重塑整个世界。"
 STATIC_MODIFIER_NAME_nd_adu_dest_patron_of_arts: "艺术赞助者"
 STATIC_MODIFIER_DESC_nd_adu_dest_patron_of_arts: "皇室的慷慨赞助将安达卢斯化作了建筑、诗歌与音乐的天堂，然而这种极致的文雅，却是以牺牲尚武精神为代价的。"
 STATIC_MODIFIER_NAME_nd_adu_dest_universal_academy: "普世科学院"
 STATIC_MODIFIER_DESC_nd_adu_dest_universal_academy: "安达卢斯的普世科学院吸引了来自已知世界各地的学者与外交官，通过知识的力量不断扩展着整个国度的影响力。"
 STATIC_MODIFIER_NAME_nd_adu_dest_garden_of_paradise: "人间极乐园"
 STATIC_MODIFIER_DESC_nd_adu_dest_garden_of_paradise: "安达卢斯的园林、宫殿与图书馆已然化作人间的天堂。它在吸引着无尽财富与才俊的同时，也在军队阶层中滋长了安逸享乐之风。"
 STATIC_MODIFIER_NAME_nd_adu_dest_ghazi_fervor: "加齐狂热"
 STATIC_MODIFIER_DESC_nd_adu_dest_ghazi_fervor: "加齐勇士们的尚武精神在整个哈里发国内熊熊燃烧，激励着将士与水兵们奋勇杀敌，立下赫赫战功。"
 STATIC_MODIFIER_NAME_nd_adu_dest_imperial_tribute: "帝国贡赋"
 STATIC_MODIFIER_DESC_nd_adu_dest_imperial_tribute: "哈里发广阔的疆域进贡着黄金与士兵，为持续扩张提供资金，并巩固边疆防线。"
 STATIC_MODIFIER_NAME_nd_adu_dest_sultan_of_sultans: "众苏丹之苏丹"
 STATIC_MODIFIER_DESC_nd_adu_dest_sultan_of_sultans: "安达卢斯苏丹统领着西方世界最强大的军队，凭借严明的纪律与主动出击，将力量投射至遥远疆域。"
 STATIC_MODIFIER_NAME_nd_adu_dest_western_caliphate: "西方哈里发国"
 STATIC_MODIFIER_DESC_nd_adu_dest_western_caliphate: "西哈里发国凭借海军霸权掌控地中海，并高效地吸收所征服的领土。"
 nd_adu_bayt_al_hikma: "智慧宫"
 nd_adu_bayt_al_hikma_desc: "一所效仿巴格达智慧宫的建筑，来自不同信仰与地区的学者汇聚于此，翻译典籍、辩论思想，共同推动知识的进步。"
 nd_adu_hikma_endowment: "学术赞助"
 nd_adu_hikma_endowment_desc: "纸张、书籍、蜡烛与玻璃仪器，共同维系着学院的科研与教学工作。"
 nd_adu_dar_al_jihad: "圣战之国"
 nd_adu_dar_al_jihad_desc: "一个坚固的指挥中心和军械库，哈里发国的军事行动在此策划，士兵在此集结。"
 nd_adu_jihad_provisioning: "军事补给"
 nd_adu_jihad_provisioning_desc: "武器、战马、皮革马具与谷物维系着驻军的给养，并支撑着哈里发远征大军的后勤补给。"