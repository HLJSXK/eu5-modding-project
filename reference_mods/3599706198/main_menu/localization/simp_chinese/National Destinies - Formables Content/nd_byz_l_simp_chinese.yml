l_simp_chinese:
 nd_byz.1.t: "拜占庭的复兴"
 nd_byz.1.d: "罗马的雄鹰再次翱翔于君士坦丁堡上空。这座千年帝都、历代皇帝的宝座，已重归希腊文明与东正教信仰的怀抱。圣索菲亚大教堂的穹顶，正沐浴着新纪元的曙光。\n\n然而，这个重生的帝国将走向何方？是建立一个效仿查士丁尼与凯撒们追求律法、训练度与征服的普世帝国；还是建立一个追随普世牧首与沙漠教父的足迹的神圣共同体。\n\n#bold 此选择将在传统标签页中解锁一条命运之路。#!"
 nd_byz.1.a: "我们是重生的罗马——以法律与利剑，我们将统治一切。"
 nd_byz.1.b: "我们是正教之光，信仰将铸就我们的帝国"
 nd_byz.2.t: "皇帝武器"
 nd_byz.2.d: "能在水面上燃烧的液态火焰或许是整个历史上守护得最严密的国家机密。它由7世纪赫利奥波利斯的卡利尼科斯发明，通过安装在德罗蒙战舰船首的青铜虹吸管喷射而出，使拜占庭战舰化身为浮动的火焰喷射器。\n\n其配方仅由少数工匠掌握，这些工匠家族世代相传，秘而不宣。从未有任何敌人成功复制过它。只要传闻某支拜占庭舰队装备了喷射管，往往就足以令敌军彻底放弃交战。阿拉伯人、罗斯人和保加尔人的舰队都深知那句“放出火焰！”的可怕呼喊，随之而来的便是大片液态火焰掠过海面，令人闻风丧胆。"
 nd_byz.2.a: "帝国之火，永恒不熄。"
 nd_byz.3.t: "君士坦丁堡光复"
 nd_byz.3.d: "千年来，君士坦丁堡始终是基督教世界又或许是全世界最伟大的城市。它的三重城墙抵御了所有围攻；地下蓄水池储存的淡水足以支撑全城人口度过数月封锁；坐拥博斯普鲁斯海峡要冲，掌控着欧亚大陆与地中海之间的交通命脉。\n\n如今这座城市正在重建。工程师修复瓦伦斯水道桥，工人清理各大广场的废墟，梅塞大道两侧集市重新汇聚来自遥远国度的商品。现在的问题是：是将君士坦丁堡打造成坚不可摧的堡垒，还是令人无法抗拒的贸易中心？"
 nd_byz.3.a: "让城墙坚不可摧，任何敌人都无法逾越"
 nd_byz.3.b: "敞开贸易之门，让黄金如流水般涌入"
 nd_byz.4.t: "查士丁尼法典的复兴"
 nd_byz.4.d: "《民法大全》是查士丁尼最伟大的丰碑，其影响甚至比圣索菲亚大教堂更为深远。由法学家特里波尼安及其团队于529至534年间编纂而成，它将千年罗马法律思想凝练成一套涵盖婚姻、财产、继承、刑法及公民权利的完整体系。\n\n尽管缔造这部杰作的帝国早已倾覆，其法律原则却得以传承。它们在博洛尼亚与巴黎的大学中被研习，塑造了半个欧洲的民法传统。如今，复兴的拜占庭国家正汲取这份遗产，构建起一套既能体现古罗马行政效率，又能满足现代帝国需求的治理体系。"
 nd_byz.4.a: "正义乃帝国的基石"
 nd_byz_greek_fire: "希腊火"
 nd_byz_greek_fire_desc: "这是一种能够在水面上燃烧的液态火秘方，可由桨帆战舰上的青铜虹吸管喷射而出。"
 nd_byz_thematic_administration: "军区行政体系"
 nd_byz_thematic_administration_desc: "军区制将帝国划分为若干军政合一的行政区，在这些地区，农兵负责保卫他们亲自耕种的土地。"
 nd_byz_pronoia_system: "普罗尼亚制"
 nd_byz_pronoia_system_desc: "将土地封赐给军官以换取其提供骑兵兵役，这是拜占庭对西方封建制度的回应。"
 nd_byz_silk_monopoly: "帝国丝绸垄断"
 nd_byz_silk_monopoly_desc: "官营的丝绸作坊出产着世界上最精美的丝织品，而其中的提尔紫更是唯有皇帝方可使用的御用之色。"
 nd_byz_stradioti_tradition: "斯特拉迪奥蒂传统"
 nd_byz_stradioti_tradition_desc: "这是源自希腊与阿尔巴尼亚轻骑兵劫掠者的军事传统，他们凭借着无与伦比的速度与凶悍闻名于整个欧洲。"
 nd_byz_imperial_neoria: "帝国船坞"
 nd_byz_imperial_neoria_desc: "位于金角湾的庞大造船厂，德罗蒙舰队便是在此建造与维护的。"
 nd_byz_cistern_engineering: "蓄水池工程"
 nd_byz_cistern_engineering_desc: "建造庞大地下水库的技艺，正是这些水库支撑君士坦丁堡度过了围城与干旱的考验。"
 nd_byz_book_of_the_eparch: "城市总督书"
 nd_byz_book_of_the_eparch_desc: "这部拜占庭的贸易管制手册统辖着君士坦丁堡的各大行会，从丝织工到香水匠人皆受其约束。"
 nd_byz_hippodrome_tradition: "大竞技场传统"
 nd_byz_hippodrome_tradition_desc: "大竞技场曾是帝国的政治核心，在这里，战车竞技派系充当着政党雏形的角色，而皇帝们则借此来确保民众赋予的统治合法性。"
 nd_byz_justinianic_revival: "查士丁尼法律复兴"
 nd_byz_justinianic_revival_desc: "汲取《民法大全》的精髓，建立一个扎根于罗马法传统的高效中央集权行政体系。"
 nd_byz_phanariote_diplomacy: "法纳尔外交"
 nd_byz_phanariote_diplomacy_desc: "法纳尔希腊人在整个东地中海地区担任行政长官、翻译官与外交使节，他们是深谙权谋与谈判的大师。"
 nd_byz_neo_byzantine_enlightenment: "新拜占庭启蒙运动"
 nd_byz_neo_byzantine_enlightenment_desc: "一场汲取了古典与拜占庭学术精髓的学术复兴，彻底改变了帝国的教育与治理体系。"
 nd_byz_imperial_naval_modernization: "帝国海军现代化"
 nd_byz_imperial_naval_modernization_desc: "从基于桨帆战舰的战争模式向现代舰队过渡，将古老的航海传统与当代的舰船设计相结合。"
 n_nd_byz_dromon: "德罗蒙战舰"
 n_nd_byz_dromon_desc: "德罗蒙战舰是拜占庭海军的绝对骨干——这是一种速度极快、以划桨为动力的桨帆战舰，舰首装备有用于喷射希腊火的青铜虹吸管。其配备的划桨手与海军陆战队，使其在爱琴海与海峡的狭窄水域中，成为了一件极其全能的制海利器。"
 a_nd_byz_stradioti: "斯特拉迪奥蒂骑兵"
 a_nd_byz_stradioti_desc: "斯特拉迪奥蒂是从阿尔巴尼亚与希腊边境地带招募的轻骑兵。作为敏捷的劫掠者与侦察兵，他们手持标枪发起的冲锋能够轻易粉碎敌人暴露的侧翼。他们曾作为雇佣兵活跃于整个欧洲，受雇于威尼斯、法国与西班牙。"
 n_nd_byz_fire_dromon: "帝国喷火德罗蒙战舰"
 n_nd_byz_fire_dromon_desc: "拜占庭海军设计的巅峰之作——这是一种拥有加固船体与先进希腊火虹吸系统的重型德罗蒙战舰。这些战舰牢牢掌控着博斯普鲁斯与达达尼尔的狭窄海峡，其喷射的液态火使它们在近战中几乎无可阻挡。"
 nd_byz_imperial_cistern: "帝国蓄水池"
 nd_byz_imperial_cistern_desc: "这是一座庞大的地下水库，仿照君士坦丁堡传奇的地下水宫殿建造。数以百计的大理石圆柱支撑着拱形穹顶，其下方蓄积着数百万加仑的淡水。"
 nd_byz_silk_ergasterion: "丝绸工坊"
 nd_byz_silk_ergasterion_desc: "一座皇家丝绸工坊，生丝在这里被纺捻、用珍贵的颜料染色，并织造成为世界上最精美的纺织品。巴西琉斯专属的紫绸便产自此处。"
 nd_byz_hippodrome: "帝国大竞技场"
 nd_byz_hippodrome_desc: "这是一座用于举办战车竞技与公共庆典的宏伟竞技场。大竞技场曾是帝国的政治核心，在这里，各大派系激烈交锋，而皇帝们则在此接受民众的欢呼与拥戴。"
 nd_byz_neorion: "拜占庭尼奥里翁船坞"
 nd_byz_neorion_desc: "一座仿照君士坦丁堡金角湾兵工厂模式建造的帝国海军船坞。在这里，德罗蒙战舰被建造、修缮，并装配上致命的液态火虹吸管。"
 nd_byz_cistern_maintenance: "蓄水池维护"
 nd_byz_cistern_maintenance_desc: "维护地下蓄水池的石制结构、引水渠连接处以及过滤系统。"
 nd_byz_silk_weaving: "帝国丝织"
 nd_byz_silk_weaving_desc: "将生丝与异域染料加工成整个基督教世界最精美的纺织品。"
 nd_byz_hippodrome_upkeep: "大竞技场运营"
 nd_byz_hippodrome_upkeep_desc: "维护帝国竞技场的战车车队、赛道表面以及宏伟的石制建筑。"
 nd_byz_neorion_operations: "船坞运营"
 nd_byz_neorion_operations_desc: "为德罗蒙舰队的建造与修缮提供木材、沥青、铁钉以及各项海军物资。"
 levy_nd_byz_stradioti: "斯特拉迪奥蒂征召骑兵"
 levy_nd_byz_stradioti_desc: "从希腊与阿尔巴尼亚边境地带征召的轻骑兵。他们秉承了斯特拉迪奥蒂雇佣兵的传统，在军中充当着敏捷的劫掠者与侦察兵。"
 levy_nd_byz_dromon: "德罗蒙征召战舰"
 levy_nd_byz_dromon_desc: "从沿海行省征召的桨帆战舰。舰上配备了经验丰富的海员，秉承了拜占庭海军古老的航海传统。"
 STATIC_MODIFIER_NAME_nd_byz_renovatio_imperii: "帝国复兴"
 STATIC_MODIFIER_DESC_nd_byz_renovatio_imperii: "罗马帝国业已复兴。凭借律法、行政与军事强权，作为奥古斯都与查士丁尼继承者的巴西琉斯，宣告了对整个文明世界的统治权。"
 STATIC_MODIFIER_NAME_nd_byz_orthodox_ecumene: "正教普世"
 STATIC_MODIFIER_DESC_nd_byz_orthodox_ecumene: "君士坦丁堡再次屹立为基督教世界的精神中心。普世牧首的权威自圣索菲亚大教堂辐射四方，将天下信徒皆拥入东正教的怀抱。"
 STATIC_MODIFIER_NAME_nd_byz_greek_fire_mastery: "希腊火专精"
 STATIC_MODIFIER_DESC_nd_byz_greek_fire_mastery: "液态火的秘方已臻于完善。我们的桨帆战舰装备了虹吸管，能够在波涛之间喷射出无法扑灭的烈焰，将每一场海战都化作无尽的火海。"
 STATIC_MODIFIER_NAME_nd_byz_city_reclaimed: "众城之女皇复兴"
 STATIC_MODIFIER_DESC_nd_byz_city_reclaimed: "君士坦丁堡的城墙再次岿然屹立。庞大的蓄水池重新注满淡水，引水渠将生命之源输送至各个街区，这座城市恢复了其作为世界上最坚固大都会的古老地位。"
 STATIC_MODIFIER_NAME_nd_byz_new_golden_age: "新黄金时代"
 STATIC_MODIFIER_DESC_nd_byz_new_golden_age: "君士坦丁堡的市场再次因横跨三大洲的贸易而熙熙攘攘。来自威尼斯、热那亚、埃及与罗斯的商贾们汇聚于金角湾，帝国的国库也因这座世界十字路口所带来的财富而日益充盈。"
 STATIC_MODIFIER_NAME_nd_byz_justinianic_legacy: "查士丁尼遗产"
 STATIC_MODIFIER_DESC_nd_byz_justinianic_legacy: "《查士丁尼法典》的复兴为帝国的行政管理带来了秩序。法庭遵循成文法度，税务官听命于裁判官，罗马的治理机器再次轰鸣运转。"
 nd_byz_formed_tt: "拜占庭已成立"
 nd_byz_path_a_tt: "已选择罗马继承者"
 nd_byz_path_b_tt: "已选择正教之光"
 nd_byz_destiny: "拜占庭的命运"
 nd_byz_destiny_desc: "帝国业已复兴。如今，它必须证明自己无愧于罗马之名。"
 nd_byz_dest_exarchate: "收复总督区"
 nd_byz_dest_exarchate_desc: "拉文纳总督区曾在数个世纪里作为拜占庭在西方的支柱。夺取拉文纳与巴里，以重新确立帝国在意大利的权威。"
 nd_byz_dest_africa: "光复阿非利加"
 nd_byz_dest_africa_desc: "查士丁尼从汪达尔人手中收复北非是他最伟大的胜利之一。追随他的脚步，夺取突尼斯与的黎波里吧。"
 nd_byz_dest_renovatio: "帝国复兴"
 nd_byz_dest_renovatio_desc: "罗马帝国的全面光复：罗马、安条克、亚历山大。古代五大牧首区中的三个已统一于同一面鹰旗之下。这是罗马继承者的终极成就。"
 nd_byz_dest_ecumene: "普世圣座"
 nd_byz_dest_ecumene_desc: "作为陪都的塞萨洛尼基，以及整个基督教世界最神圣的城市耶路撒冷。夺得这些神圣的驻地，以确立正教普世的精神权威。"
 nd_byz_dest_commonwealth: "东正教共同体"
 nd_byz_dest_commonwealth_desc: "建立一个繁荣的经济与文化共同体。接纳银行业，在首都市场主导丝绸贸易，并发展你的领土，以媲美古代帝国的繁荣。"
 nd_byz_dest_new_rome: "新罗马"
 nd_byz_dest_new_rome_desc: "君士坦丁堡名副其实地成为了新罗马——世界文化、精神与学术的中心。接纳印刷术，发展你广袤的疆域，并证明拜占庭的光芒令所有对手黯然失色。"
 nd_byz.5.t: "拜占庭的命运"
 nd_byz.5.d: "复兴的帝国正站在历史的十字路口。君士坦丁堡的城墙已然重建，圣索菲亚大教堂再次回荡起东正教的颂歌，鹰旗也重新飘扬在博斯普鲁斯海峡上空。但光复仅仅是个开始。这个疆域曾横跨西班牙至美索不达米亚的伟大帝国，绝不会满足于既有的领土。拜占庭的命运究竟将驶向何方？"
 nd_byz.5.a: "命运在召唤"
 nd_byz.6.t: "光复总督区"
 nd_byz.6.d: "拉文纳总督区建立于公元584年，作为拜占庭在意大利的行政中心，管辖着查士丁尼光复运动的残存领土。在近两个世纪的时间里，它抵御了伦巴第人与法兰克人的侵袭，在西方保全了罗马文明。公元751年其被伦巴第人攻陷，标志着拜占庭在意大利中部统治的终结。\n\n如今，拉文纳与巴里再次飘扬起帝国的旗帜。圣维塔莱大教堂中描绘查士丁尼与提奥多拉无上荣耀的马赛克镶嵌画，几个世纪以来首次俯瞰着拜占庭的士兵们。"
 nd_byz.6.a: "意大利回想起了她的罗马主人"
 nd_byz.7.t: "光复阿非利加"
 nd_byz.7.d: "公元533年，贝利撒留仅率一万五千人登陆阿非利加，并在数月内以一场无比辉煌的战役摧毁了汪达尔王国。阿非利加行省再次成为罗马的粮仓，其出产的谷物在此后的一个世纪里持续哺育着君士坦丁堡。\n\n如今历史重演。拜占庭的旗帜飘扬在迦太基的废墟与的黎波里的港口上空。问题在于应当如何利用这片光复的土地——是将其作为进一步扩张的军事跳板，还是作为农业腹地来养活帝国日益增长的人口。"
 nd_byz.7.a: "为接下来的战役组建阿非利加军团"
 nd_byz.7.b: "让阿非利加哺育帝国，一如它昔日哺育罗马"
 nd_byz.8.t: "帝国复兴"
 nd_byz.8.d: "罗马。安条克。亚历山大。古代基督教五大牧首区中的三个如今已听命于君士坦丁堡。地中海再次成为了罗马的内湖。这是查士丁尼梦寐以求的成就，是希拉克略为之奋战的目标，也是巴列奥略家族曾哀叹永远逝去的辉煌。\n\n帝国的全面复兴已然完成。但每一个伟大的帝国都必须选择如何维系其伟大。业已复兴的罗马，是通过律法与行政为她的子民带来和平与秩序？还是通过为她赢下这片江山的无敌军团来维持其统治？"
 nd_byz.8.a: "让罗马法为世界带来秩序"
 nd_byz.8.b: "军团不朽——他们即是帝国"
 nd_byz.9.t: "普世圣座"
 nd_byz.9.d: "帝国第二大城市塞萨洛尼基，以及基督教世界最神圣的土地耶路撒冷，如今都已承认普世牧首的权威。东正教的精神疆域正从君士坦丁堡向四方辐射——向西抵达巴尔干，向南远及圣地，向北延伸至斯拉夫世界。\n\n修道院香火繁盛，朝圣之路络绎不绝，东正教信徒们纷纷将新罗马视为他们的精神中心。一个神圣共同体的根基已然奠定。"
 nd_byz.9.a: "信徒们汇聚于牧首的羽翼之下"
 nd_byz.10.t: "东正教共同体"
 nd_byz.10.d: "帝国的市场充盈着丝绸、香料以及来自三大洲的物产。曾经令威尼斯与热那亚致富的银行机构，如今转而服务于拜占庭的商业。曾让君士坦丁堡成为中世纪世界最富庶城市的古老丝绸之路已然复兴，首都的市场主导了整个东地中海。\n\n这份繁荣可以被引向不同的发展方向。贸易的财富能够将拜占庭文化传播至整个已知世界，亦或修道院可以利用这个黄金时代来推进东正教的学术与研究。"
 nd_byz.10.a: "让我们的文化与贸易一同流布四方"
 nd_byz.10.b: "修道院将成为学术的灯塔"
 nd_byz.11.t: "新罗马"
 nd_byz.11.d: "君士坦丁堡已不再仅仅是一个复兴帝国的首都——它是世界的学术与精神中心。牧首学院培养出的学者与神学家，足以媲美欧洲任何一所顶尖学府的精英。印刷术将东正教典籍与希腊哲学传播至整个大陆。拜占庭的艺术、建筑与思想，为文明本身树立了标杆。\n\n这正是君士坦丁堡的建立者们所梦想的新罗马——不仅是政治上的首都，更是文明的灯塔。如今面临的问题是，应当强化其作为东正教神圣中心的地位，还是突出其作为已知世界商业十字路口的作用。"
 nd_byz.11.a: "正教将照亮世界"
 nd_byz.11.b: "君士坦丁堡是万国交汇的十字路口"
 STATIC_MODIFIER_NAME_nd_byz_dest_african_legions: "阿非利加军团"
 STATIC_MODIFIER_DESC_nd_byz_dest_african_legions: "光复的阿非利加行省为帝国军队补充了生力军，秉承贝利撒留阿非利加远征的传统，组建起全新的军团。"
 STATIC_MODIFIER_NAME_nd_byz_dest_african_granary: "阿非利加粮仓"
 STATIC_MODIFIER_DESC_nd_byz_dest_african_granary: "阿非利加肥沃的平原恢复了其作为帝国粮仓的古老地位，其丰收的谷物哺育着君士坦丁堡，并为帝国的发展提供着源源不断的动力。"
 STATIC_MODIFIER_NAME_nd_byz_dest_pax_romana: "罗马和平"
 STATIC_MODIFIER_DESC_nd_byz_dest_pax_romana: "罗马的律法与行政为复兴帝国广袤的疆域带来了和平与秩序。它不仅平息了动乱，更以公正而非纯粹的武力将臣民们维系在了一起。"
 STATIC_MODIFIER_NAME_nd_byz_dest_eternal_legions: "不朽军团"
 STATIC_MODIFIER_DESC_nd_byz_dest_eternal_legions: "曾征服三大洲的军团依然是帝国强权的中坚力量，其严明的纪律与迅捷的行动令任何敌军皆望尘莫及。"
 STATIC_MODIFIER_NAME_nd_byz_dest_silk_road_restored: "丝绸之路复兴"
 STATIC_MODIFIER_DESC_nd_byz_dest_silk_road_restored: "曾让君士坦丁堡富甲天下的古老贸易路线再次川流不息，将拜占庭的文化与财富播撒至整个已知世界。"
 STATIC_MODIFIER_NAME_nd_byz_dest_monastic_learning: "修道院学术"
 STATIC_MODIFIER_DESC_nd_byz_dest_monastic_learning: "阿索斯、西奈与斯图迪奥斯的宏伟修道院成为了学术中心，秉承东正教的传统，守护并推进着知识的发展。"
 STATIC_MODIFIER_NAME_nd_byz_dest_beacon_of_faith: "信仰灯塔"
 STATIC_MODIFIER_DESC_nd_byz_dest_beacon_of_faith: "东正教犹如一座精神灯塔，自君士坦丁堡向外辐射光芒。其道德权威吸引着天下信徒，并深深震慑着异教徒。"
 STATIC_MODIFIER_NAME_nd_byz_dest_crossroads_of_worlds: "万国十字路口"
 STATIC_MODIFIER_DESC_nd_byz_dest_crossroads_of_worlds: "君士坦丁堡扼守着欧亚大陆的交汇处，其港口与市场连通了整个世界的贸易。"
 nd_byz_imperial_triumph: "帝国凯旋"
 nd_byz_imperial_triumph_desc: "一座旨在庆祝罗马光复的宏伟凯旋建筑群，它将古代帝国广场的恢弘气势与拜占庭高效的行政体系完美融合。"
 nd_byz_patriarchal_academy: "牧首学院"
 nd_byz_patriarchal_academy_desc: "作为东正教神学与哲学的学术中心，它继承了古老的帝国大学之衣钵，源源不断地培养着学者、书记员与外交官。"
 nd_byz_triumph_maintenance: "帝国凯旋维护"
 nd_byz_triumph_maintenance_desc: "维护帝国凯旋建筑群的大理石外墙、铭文、马赛克镶嵌画以及行政办公区。"
 nd_byz_academy_maintenance: "学院维护"
 nd_byz_academy_maintenance_desc: "为牧首学院的书记员、导师以及宗教仪式提供所需的纸张、书籍、蜡烛与法衣。"