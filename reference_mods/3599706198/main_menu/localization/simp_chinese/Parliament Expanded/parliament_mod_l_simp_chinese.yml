l_simp_chinese:
 preserve_cultural_traditions: "保护文化传统"
 preserve_cultural_traditions_desc: "议会致力于在整个领地内维护既定的习俗、传统和文化实践。"
 accelerate_integration: "加速整合"
 accelerate_integration_desc: "提出措施以加速将新纳入的人口融入国家。"
 intensify_religious_instruction: "加强宗教教育"
 intensify_religious_instruction_desc: "议会支持加大力度，在信仰事务上引导和教化民众。"
 improve_public_health: "提升公共卫生"
 improve_public_health_desc: "请求投资以加强卫生、疫病预防和公共福祉。"
 expand_diplomatic_corps: "扩充外交使团"
 expand_diplomatic_corps_desc: "议会呼吁扩大并专业化国家的外交服务。"
 reorganise_state_intelligence: "重组国家情报机构"
 reorganise_state_intelligence_desc: "提议重组情报与反情报机构，以更好地维护国家利益。"
 support_exploration_efforts: "支持探索行动"
 support_exploration_efforts_desc: "议会同意拨付资源，用于筹备和执行探索性远征。"
 encourage_overseas_settlement: "鼓励海外殖民"
 encourage_overseas_settlement_desc: "推行政策以促进海外领土的移民与定居。"
 expand_public_education: "普及公共教育"
 expand_public_education_desc: "议会主张扩大教育普及范围，提升全民识字率。"
 fund_scholarly_endeavours: "资助学术研究"
 fund_scholarly_endeavours_desc: "向致力于学习与创新的学者、研究人员及机构提供支持。"
 improve_levy_training: "提升征召兵训练"
 improve_levy_training_desc: "提议进行改革，以提升征召部队的组织性和战备状态。"
 modernise_military_doctrine: "现代化军事学说"
 modernise_military_doctrine_desc: "议会批准了旨在更新战术、训练度和军事组织的改革。"
 optimise_military_upkeep: "优化军队维持费"
 optimise_military_upkeep_desc: "在保持战备状态的同时，正努力使军费开支合理化。"
 reinforce_fortifications: "加固防御工事"
 reinforce_fortifications_desc: "资源被调配用于加强防御工事和驻军力量。"
 appease_subject_populations: "安抚属国民众"
 appease_subject_populations_desc: "议会试图通过向属国人民做出让步来缓解紧张局势。"
 reform_tributary_contributions: "改革朝贡贡献"
 reform_tributary_contributions_desc: "提议修订朝贡义务，以增加从属国的国家收入。"
 suppress_internal_dissent: "镇压内部异议"
 suppress_internal_dissent_desc: "议会批准了旨在遏制叛乱并防止叛乱的措施。"
 expand_naval_production: "Expand Naval Production"
 expand_naval_production_desc: "The assembly supports increased shipbuilding capacity to strengthen naval power."
 secure_sea_lanes: "Secure Sea Lanes"
 secure_sea_lanes_desc: "Naval efforts are prioritised to protect trade routes and maritime communications."
 improve_trade_administration: "Improve Trade Administration"
 improve_trade_administration_desc: "Administrative reforms are proposed to improve efficiency and oversight of trade."
 enhance_state_prestige: "Enhance State Prestige"
 enhance_state_prestige_desc: "Actions are taken to elevate the standing and reputation of the state."
 reform_court_expenditure: "Reform Court Expenditure"
 reform_court_expenditure_desc: "The assembly seeks to regulate court spending and improve fiscal stability."
 patronise_the_arts: "Patronise the Arts"
 patronise_the_arts_desc: "Support is extended to artists and cultural projects to enrich the state's cultural life."
 streamline_legislative_process: "Streamline Legislative Process"
 streamline_legislative_process_desc: "Procedural reforms are proposed to improve legislative efficiency and coordination."
 reform_the_taxation_system: "Reform Taxation System"
 reform_the_taxation_system_desc: "The parliament approves changes aimed at improving the efficiency and yield of taxation."
 force_recruit_heathens: "Force Recruit Heathens"
 force_recruit_heathens_desc: "The assembly endorses policies to conscript non-believers into the military."
 civic_development_program: "Civic Development Program"
 civic_development_program_desc: "A comprehensive program is proposed to improve urban infrastructure and public services."
 ask_for_societal_value_change: "Start a Debate on Principle Issues"
 ask_for_societal_value_change_desc: "Petitions urge parliament to assess the situation of the country."
 reaffirm_estate_privileges: "Reaffirm Estate Privileges"
 reaffirm_estate_privileges_desc: "The parliament is urged to reaffirm and protect the traditional privileges of the estates."
 strengthen_central_authority: "Strengthen Central Authority"
 strengthen_central_authority_desc: "The parliament is called upon to support measures that enhance the power and authority of the central government."
 standardise_construction: "Standardise Construction"
 standardise_construction_desc: "The parliament is requested to endorse regulations that standardise construction practices and materials."
 regulate_material_supply: "Regulate Material Supply"
 regulate_material_supply_desc: "The parliament is petitioned to implement controls over the supply and distribution of key materials."
 call_emergency_parliament: "Force the parliament to gather"
 call_emergency_parliament_desc: "The parliament is called into emergency session to address a crisis or urgent matter facing the state."
 confirm_a_crown_appointment: "Confirm a Crown Appointment"
 confirm_a_crown_appointment_desc: "The parliament is asked to confirm a royal appointment to a high office."
 board_of_trade: "Board of Trade"
 board_of_trade_desc: "A legislative body focused on commercial interests, trade policies, and economic development."
 chamber_of_commerce: "Chamber of Commerce"
 chamber_of_commerce_desc: "An assembly representing merchants and business interests, dedicated to promoting commerce and industry."
 sanctified_tribunal: "Sanctified Tribunal"
 sanctified_tribunal_desc: "A religiously oriented legislative body that integrates spiritual judgement with governance."
 civic_convention: "Civic Convention"
 civic_convention_desc: "A representative assembly focused on urban development, public services, and civic welfare."
 representative_union: "Representative Union"
 representative_union_desc: "A legislative body that brings together representatives from various regions and constituencies to deliberate on national matters."
 council_of_savants: "Council of Savants"
 council_of_savants_desc: "No longer confined to the clergy or the nobility, learned individuals may now be drawn from every stratum of society. From royal kin to common folk, any person who has shown exceptional mastery in a given field may be called to serve under the authority of the parliament."
 high_war_council: "High War Council"
 high_war_council_desc: "The High War Council is the supreme authority over war and expansion. Composed of those who command armies, resources, and strategic will, it exists to ensure that conflict is not reactionary, but deliberate and continuous. War is treated as a permanent instrument of statecraft, planned in advance and executed with calculated resolve.\n\n••• Has access to a special kind of casus belli that strengthens with every passing age."
 bulwark_assembly: "Bulwark Assembly"
 bulwark_assembly_desc: "Our lands are surrounded by dangers too great to be defeated in open battle. If we are to remain independent, the cost of invading our territory must be so severe that only those truly prepared to pay it would dare to try. The only way to achieve this is by exploiting the strategic nature of our terrain—its chokepoints, fortresses, and natural defenses. The nation must repel threats before it ever becomes one itself. In this principle lies the very foundation of our survival."
