 war_goal_war_mandate_traditions: "Show Superiority"
 war_goal_war_mandate_renaissance: "Show Superiority"
 war_goal_war_mandate_discovery: "Show Superiority"
 war_goal_war_mandate_reformation: "Show Superiority"
 war_goal_war_mandate_absolutism: "Show Superiority"
 war_goal_war_mandate_revolutions: "Show Superiority"
 war_goal_parliament_subjugation: "Show Superiority"
 war_goal_war_mandate_traditions_desc: "The High War Council asserts that these lands fall within the ancient sphere of our authority. Custom, memory, and inherited order grant us the right to enforce what time itself has sanctioned. Resistance is not rebellion against us, but against tradition."
 war_goal_war_mandate_renaissance_desc: "The High War Council proclaims that fragmented rule invites chaos. These lands must be placed under a unified authority capable of law, order, and administration. War is the instrument through which reason prevails."
 war_goal_war_mandate_discovery_desc: "As the world opens and borders lose their meaning, the Council declares these territories essential to our strategic reach. Control is not sought for conquest alone, but to secure routes, horizons, and the balance of power."
 war_goal_war_mandate_reformation_desc: "In an age of fracture and competing truths, the Council asserts a supreme mandate to impose unity. Whether by faith, doctrine, or state authority, division is intolerable. War becomes an act of enforced coherence."
 war_goal_war_mandate_absolutism_desc: "The High War Council determines that the security of the state demands expansion. Sovereignty is indivisible, and necessity recognizes no moral restraint. Opposition is not a grievance, but an inefficiency to be resolved."
 war_goal_war_mandate_revolutions_desc: "The Council declares that history itself moves in our favour. Borders that resist progress will be corrected. War is no longer a choice, but the mechanism through which the inevitable is realized."
 war_goal_parliament_subjugation_desc: "Under the banner of the Union, we offer an invitation framed in cooperation and shared governance. This act presents integration as a choice rather than a conquest, where legitimacy replaces force and consent masks compulsion. Through influence, assurances, and carefully applied pressure, the target is drawn into the Union not as a defeated foe, but as a member within a broader political order."
 PARLIAMENT_EMERGENCY_TITLE: "Call the Parliament into Emergency Session"
 PARLIAMENT_EMERGENCY_DESC: "Summon the parliament for an emergency session to address an urgent matter facing the state.\n\nThis action comes at a cost:\n• Some gold\n• Reduced base parliament support\n• Lower estate satisfaction\n• Increased estate privilege revocation cost"