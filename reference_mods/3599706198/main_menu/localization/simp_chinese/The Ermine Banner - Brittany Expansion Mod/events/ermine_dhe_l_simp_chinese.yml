l_simp_chinese:
 ermine_dhe.1.title: "白鼬旗帜"
 ermine_dhe.1.desc: "欢迎来到《白鼬旗帜》mod。本模组目前仍在开发中。但我已提供了一个初始事件，让你可以选择从一开始就让[GetCountry('BRI').GetName]获得独立。"
 ermine_dhe.1.a: "我们将选择留在法国"
 ermine_dhe.1.b: "独立，选择自己的道路"
 ermine_longbowmen:0 "海峡长弓手"
 ermine_longbowmen_desc:0 "在[GetCountry('BRI').GetAdjective]继承战争期间，蒙福尔派系采用了[GetCountry('ENG').GetAdjective]长弓手。这些长弓手在拉罗什德里安和欧赖战役中发挥了决定性作用。尽管此后[GetCountry('BRI').GetName]回归了依赖重骑兵和重装步兵的[GetCountry('FRA').GetAdjective]式作战风格，但在这段与[GetCountry('ENG').GetAdjectiveWithNoTooltip]结盟的时期，长弓手在布列塔尼地区曾颇为盛行。"
 ermine_blackfleet:0 "布列塔尼雌狮"
 ermine_blackfleet_desc:0 "寡妇让娜·德·克利松在丈夫于1343年被[GetCountry('FRA').GetAdjective]王室处决后转而从事海盗活动。她组建了一支拥有黑色船体的柯克船、桨帆船与巴卡船的舰队，配以深红船帆，在1343年至1356年间持续袭扰英吉利海峡的[GetCountry('FRA').GetAdjectiveWithNoTooltip]商船。这支“黑色舰队”虽非正式的海军，却成为[GetCountry('BRI').GetAdjective]反抗精神与航海传统的象征。"
 ermine_saintmalo_corsairs:0 "海盗之城"
 ermine_saintmalo_corsairs_desc:0 "以[ShowLocationName('saint_malo')]港为基地，这些“海盗之城”的私掠船在世界各地的海洋上袭击商船，从[ShowAreaName('english_channel_area')]到[ShowRegionName('caribbean_region')]，甚至远至[ShowRegionName('bengal_region')]。[GetCountry('BRI').GetAdjective]海盗建立了令人闻风丧胆的威名，其恶名从12世纪一直延续到1815年维也纳会议。"
 ermine_brest_arsenal:0 "布雷斯特兵工厂"
 erm_brest_arsenal:0 "布雷斯特兵工厂"
 erm_brest_arsenal_desc:0 "这座位于[GetCountry('BRI').GetName]彭菲尔德河畔的兵工厂，已发展成为集干船坞、绳索厂、铸造厂和车间于一体的庞大建筑群。在扩建后，它成为一座防御型港口，厚重的石料城墙、棱堡与海岸炮台构筑起抵御海陆攻击的双重防线。尽管面对进攻者的全力进攻下仍显脆弱，但兵工厂的防御工事足以支撑短期的围困。"
 erm_convert_transports_to_light:0 "将运输船转换为轻型战舰"
 erm_convert_light_to_transports:0 "将轻型战舰转换为运输船"
 MODIFIER_TYPE_NAME_erm_can_convert_transports_to_light:0 "可将运输船转换为轻型战舰"
 ermine_convert_transports_to_light.tt:0 "舰队中的运输船将被转换为轻型战舰。"
 ermine_convert_light_to_transports.tt:0 "舰队中的轻型战舰将被转换为运输船。"