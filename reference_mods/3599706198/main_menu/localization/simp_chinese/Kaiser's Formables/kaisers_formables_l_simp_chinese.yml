l_simp_chinese:
 BNN_f: "布列塔尼亚"
 BNN_f_desc: "终于冲出半岛的布列塔尼人将建立一个由闪亮盔甲骑士组成的伟大帝国，注定要统治西欧。"
 BNN: "布列塔尼亚"
 BNN_ADJ: "布列塔尼亚"
 bretonnian_longbows_advance: "布列塔尼亚长弓手"
 bretonnian_longbows_advance_desc: "让我们的农民配备更强的弓箭，固然会让我们的骑士略有不安，但更会让敌人闻风丧胆！"
 bretonnian_gallant_knights_advance: "侠义骑士"
 bretonnian_gallant_knights_advance_desc: "凭借其坚固闪亮的盔甲、坚定的道德操守与数千农民征召兵，布列塔尼亚骑士必将让整个欧洲颤抖！"
 bretonnian_peasant_waves_advance: "农民浪潮"
 bretonnian_peasant_waves_advance_desc: "让我们用农民的人海淹没敌军。"
 bretonnian_better_levies_advance: "更好的征召兵"
 bretonnian_better_levies_advance_desc: "给我们的征召兵配备更精良的盔甲和武器，理论上应该能让他们活得更久。"
 bretonnian_strong_chivalric_code_advance: "强烈的骑士准则"
 bretonnian_strong_chivalric_code_advance_desc: "布列塔尼骑士精神是全世界最优秀的。"
 bretonnian_knights_errant_advance: "游侠骑士"
 bretonnian_knights_errant_advance_desc: "我们有着游侠骑士四处铲除邪恶之徒的光荣传统，同时通过小规模远征不断扩张疆域。"
 PRS_f: "希腊化波斯"
 PRS_f_desc: "早在基督诞生之前，希腊人就统治过波斯。随着希腊统治的回归，古老的思潮与国家将得以自然复兴。"
 PRS: "波西斯"
 PRS_ADJ: "波西斯"
 romania: "罗马尼亚"
 romania_ADJ: "罗马尼亚"
 STATIC_MODIFIER_NAME_hellenic_persia_assimilation: "赞助同化"
 STATIC_MODIFIER_NAME_hellenic_persia_conversion: "赞助皈依"
 STATIC_MODIFIER_NAME_hellenic_persia_tolerance: "鼓励宗教宽容"
 hellenic_persia.1.title: "文化交织"
 hellenic_persia.1.desc: "随着希腊统治重返波斯，促进波斯人与希腊人之间文化交流正变得日益可行。亚历山大大帝曾鼓励士兵迎娶波斯人，同时采纳部分波斯行政惯例，甚至有人因此视他为亲波斯者。我们是否应当效仿他的做法？"
 hellenic_persia.1.a: "我们既是波斯人，也是希腊人！"
 hellenic_persia.1.b: "我们首先、也永远都是罗马人。"
 hellenic_persia.1.c: "维持现状就好。"
 hellenic_persia.2.title: "宗教方向"
 hellenic_persia.2.desc: "古老王国的复兴使我们处于一个独特的位置。哲学家、艺术家和作家都在探索并浪漫化渲染古代世界，这也引发了人们对琐罗亚斯德古老信仰以及拜占庭晚期哲学家卜列东的希腊主义思想的重新关注。这场讨论现已蔓延至王室宫廷——我们既可以支持，也可以压制任何宗教复兴的企图。"
 hellenic_persia.2.a: "让我们拥抱古希腊的智慧。"
 hellenic_persia.2.b: "重燃祆祠！我们现在追随琐罗亚斯德！"
 hellenic_persia.2.c: "异端不可容忍！"
 hellenic_persia.2.d: "宗教宽容的新时代已经到来。"
 hellenic_persian_culture: "波西斯"
 romano_persian_culture: "罗马尼亚"
 greco_persian_language: "希腊‑波斯语"
 name_mithridates: "米特里达梯"
 name_artemon: "阿特莫恩"
 name_phratakes: "弗拉塔克斯"
 name_bagadatos: "巴格达托斯"
 name_stratonike: "斯特拉托尼刻"
 name_stateira: "斯妲忒拉"
 name_pharandzem: "帕兰泽姆"
 hellenic_persian_cataphract_traditions_advance: "甲胄骑兵传统"
 hellenic_persian_cataphract_traditions_advance_desc: "通过融合波斯与拜占庭的重骑兵传统，我们就能用势不可挡的铁蹄碾碎敌人。"
 hellenic_persian_fusion_administration_advance: "融合管理体系"
 hellenic_persian_fusion_administration_advance_desc: "希腊与古波斯德万官僚体系的融合将创造出注定成为全世界最高效、最稳固的行政系统。"
 hellenic_persian_heirs_of_seleukos_advance: "塞琉古的继承者"
 hellenic_persian_heirs_of_seleukos_advance_desc: "作为一个以波斯为中心的希腊化国家，我们自然会被拿来与塞琉古帝国作比较，我们应当欣然接受这种对比，这能让我们不仅承袭塞琉古王朝的威望，更承袭亚历山大帝国的荣光。"
 hellenic_persian_alexandrian_aspirations_advance: "亚历山大的雄心"
 hellenic_persian_alexandrian_aspirations_advance_desc: "正如亚历山大大帝一般，我们将征服已知世界。"
 hellenic_persian_heirs_of_rome_advance: "罗马的继承者"
 hellenic_persian_heirs_of_rome_advance_desc: "我们是罗马的真正继承者，我们的地理位置并不重要。"
 hellenic_persian_foideratoi_advance: "新蛮盟军"
 hellenic_persian_foideratoi_advance_desc: "新蛮盟军是古罗马蛮盟军的自然演变。这些忠诚的、主要由蛮族组成的属民，负责守卫罗马边境。"
 hellenic_persian_modern_phalanx_advance: "现代方阵"
 hellenic_persian_modern_phalanx_advance_desc: "随着长矛与火枪的出现，古老的战术可能再次派上用场。"
 hellenic_persian_reformed_tagmata_advance: "近卫新军"
 hellenic_persian_reformed_tagmata_advance_desc: "古老的拜占庭近卫军体系曾发挥过良好作用，但修正其某些缺陷的改革时机已经到来。"
 hellenic_persian_zoroastrian_persia: "祆教波斯"
 hellenic_persian_zoroastrian_persia_desc: "波斯是祆教的发源地，既然该教派现已重掌大权，神职人员自然会服从琐罗亚斯德信仰的捍卫者。"
 hellenic_persian_hellenic_persia: "希腊化波斯"
 hellenic_persian_hellenic_persia_desc: "古希腊信仰对波斯而言本是陌生存在，但这并非说它在波斯毫无历史渊源。马其顿人通过征战将其带入波斯，塞琉古王朝见证了信仰融合现象的萌发。如今，基于古希腊哲学并汲取祆教影响的卜列东希腊主义已在波斯扎根，塞琉古时期的融合景象似乎正重现于世。而今守护这小型信仰免受非信徒侵扰的重任，已落在我们肩头。"
 hellenic_persian_greek_settlements_advance: "希腊定居点"
 hellenic_persian_greek_settlements_advance_desc: "通过资助建立新的城镇作为希腊定居点，我们可以鼓励希腊文化和知识的传播。"
 hellenic_persian_colonia_advance: "殖民地"
 hellenic_persian_colonia_advance_desc: "殖民地代表着在某一区域为巩固控制及传播罗马文化而建立的新定居点。"
 hellenic_persian_roman_roads_advance: "罗马道路"
 hellenic_persian_roman_roads_advance_desc: "罗马人一直以其卓越的道路建设而闻名，通过道路施工技术的革新，我们的精湛工艺将得以进一步提升。"
 hellenic_persian_rome_aeterna_advance: "永恒罗马"
 hellenic_persian_rome_aeterna_advance_desc: "作为罗马的继承者，我们延续了其永恒的理念。"
 hellenic_persian_neo_sassanian_themes_advance: "新萨珊军区"
 hellenic_persian_neo_sassanian_themes_advance_desc: "通过融合古代萨珊、拜占庭及现代行政管理技术，我们能够继续有效治理辽阔疆域，确保边疆安全并守护核心领地。"
 hellenic_persian_aggressive_romanization_advance: "激进罗马化"
 hellenic_persian_aggressive_romanization_advance_desc: "一个帝国的灭亡，始于少数族裔和地区认同萌生独立念头，我们绝不会允许这种情况发生。相反，我们应让罗马语言与文化推广至国境内的每个角落。"
 hellenic_persian_imperial_backbone_advance: "帝国脊梁"
 hellenic_persian_imperial_backbone_advance_desc: "帝国军队的核心力量是普通步兵。"
 hellenic_persian_aqueducts_sanitation_advance: "渡槽和卫生设施"
 hellenic_persian_aqueducts_sanitation_advance_desc: "古典世界曾拥有通过完善的卫生系统和渡槽来控制水源的悠久传统。这一传统近几十年来已被忽视，但在波斯干旱地区可能更为实用。"
 hellenistic_ancient_philosophy_advance: "古代哲学"
 hellenistic_ancient_philosophy_advance_desc: "希腊哲学虽古老却历久弥新。直至今日，人们仍在争论柏拉图与亚里士多德的思想价值，而希腊德性伦理学至今仍是大学研究的课题。"
 hellenistic_local_governance_advance: "本地统治"
 hellenistic_local_governance_advance_desc: "亚历山大每征服一处领土，通常不会全盘重建行政体系，而是保留原有治理框架，同时将忠诚的希腊追随者安插至核心职位，以此确保地方顺服与希腊文化的渗透。"
 panslavism_advance: "泛斯拉夫主义"
 panslavism_advance_desc: "斯拉夫人民必须团结在一面旗帜下。"
 YUG_f: "南斯拉夫"
 YUG_f_desc: "南斯拉夫代表着南斯拉夫各民族的统一政治实体。"
 YUG: "南斯拉夫"
 YUG_ADJ: "南斯拉夫"
 yugoslav_resilience_advance: "南斯拉夫韧性"
 yugoslav_resilience_advance_desc: "南斯拉夫人历经诸多统治者与帝国，却始终坚韧不屈，保持着强烈的独立精神。"
 yugoslav_ingenuity_advance: "南斯拉夫才智"
 yugoslav_ingenuity_advance_desc: "巴尔干地区虽不似莱茵河或英吉利海峡那般拥有优越的运输路线，也未蕴藏丰富资源。但居住于此的人民却展现出非凡才智，善于将有限的资源物尽其用。"
 yugoslav_gun_making_advance: "南斯拉夫枪械制造"
 yugoslav_gun_making_advance_desc: "通过主导军火市场，我们不仅能发展经济，更能巩固国防。"
 BYZ_ALT_f: "拜占庭"
 BYZ_ALT_f_desc: "尽管我们并非希腊人，但我们的东正教信仰仍赋予我们继承东罗马遗产的权利。"
 MCD: "希腊尼亚"
 MCD_ADJ: "希腊尼亚"
 MCD_f: "希腊化帝国"
 MCD_f_desc: "既然已收复了阿吉德王朝的大部分领土，我们理应宣告自己为其正统继承者。"
 FRK_f: "法兰克帝国"
 FRK_f_desc: "虔诚者路易去世后，法兰克王国被他的儿子们瓜分，从此再未统一——直到如今。我们已收复旧帝国的大部分疆域，那么我们有权主张继承权。"
 FRK: "法兰克"
 FRK_ADJ: "法兰克"
 francia_cavalry_advance: "法兰克骑兵"
 francia_cavalry_advance_desc: "法兰克骑兵在加洛林王朝时期蓬勃发展，重装骑兵成为法兰克军队不可或缺的组成部分，这在很大程度上是查理曼取得诸多军事胜利的重要原因之一。"
 francia_german_and_latin_advance: "日耳曼人与拉丁人"
 francia_german_and_latin_advance_desc: "法兰克帝国最初仅代表日耳曼法兰克人，但在其存在过程中，主要由于加洛林文艺复兴的影响，它逐渐超越了日耳曼的局限，并宣称自己是西罗马帝国的继承者。"
 francia_german_boldness_advance: "日耳曼悍勇"
 francia_german_boldness_advance_desc: "我军为日耳曼的勇武精神所鼓舞。"
 francia_roman_fortitude_advance: "罗马坚韧"
 francia_roman_fortitude_advance_desc: "即使首都沦陷，我们也将如最英勇的罗马军团般坚守边境。"
 francia_second_frankish_renaissance_advance: "第二次法兰克文艺复兴"
 francia_second_frankish_renaissance_advance_desc: "随着古老智慧的复兴与思维拓展带来的新知识，第二次法兰克文艺复兴的时机已经到来。"
 francia_maior_domus_advance: "宫相的遗产"
 francia_maior_domus_advance_desc: "宫相是前加洛林时代法兰克王国政府中的一个职位，经常掌握着超越国王的最高实权。随着宫相“矮子”丕平推翻墨洛温王朝，该职位最终被废除，其职能实质上也不复存在。"
 francia_holy_warriors_advance: "圣战士"
 francia_holy_warriors_advance_desc: "法兰克人始终坚守信仰，勇敢深入异教之地，镇压异端与异教。"
 francia_carolingian_restoration_advance: "加洛林复辟"
 francia_carolingian_restoration_advance_desc: "加洛林王朝复辟后，已经确立了对法兰克王国不容置疑的统治。"
 francia_carolingian_splendor_advance: "加洛林王朝的辉煌"
 francia_carolingian_splendor_advance_desc: "加洛林王朝声名远播，备受尊崇。"
 francia_imperial_cities_advance: "帝国城市"
 francia_imperial_cities_advance_desc: "法兰克帝国将由帝国城市治理，如亚琛。"
 CZS_f: "捷克斯洛伐克"
 CZS_f_desc: "捷克和斯洛伐克民族虽历经隔阂，但其文化相似性始终牢固，不久后统一的捷克斯洛伐克民族梦想便蓬勃绽放。如今这一梦想终于化为现实。"
 CZS: "捷克斯洛伐克"
 CZS_ADJ: "捷克斯洛伐克"
 ZPD_f: "西斯拉夫"
 ZPD_f_desc: "那个更宏大的梦想——建立一个统一的西斯拉夫民族国家，囊括波兰人、斯洛伐克人、捷克人、波拉比亚人、西里西亚人、卡舒比人和索布人。"
 ZPD: "西斯拉夫"
 ZPD_ADJ: "西斯拉夫"
 zapadoslav_defying_odds_advance: "挑战不可能"
 zapadoslav_defying_odds_advance_desc: "尽管被更多人口且敌对的邻国所包围，但我们最终还是取得了胜利，并统一了西斯拉夫人。"
 zapadoslav_between_two_giants_advance: "两大巨头之间"
 zapadoslav_between_two_giants_advance_desc: "我国位于德国与俄罗斯之间。这两个地区常受扩张主义帝国统治，频繁入侵我国领土，为了抵御这些侵略，我们必须时刻保持警惕。"
 GMA_f: "日耳曼尼亚"
 GMA_f_desc: "各日耳曼部族如今终可统一于同一旗帜之下。斯拉夫人与罗马人皆应为此等强大的联盟而战栗。"
 GMA: "日耳曼尼亚"
 GMA_ADJ: "日耳曼尼亚"
 germania_amber_trade_advance: "琥珀贸易"
 germania_amber_trade_advance_desc: "自古以来，波罗的海周边的日耳曼部落就与缺乏琥珀资源的民族进行琥珀贸易。"
 germania_germanic_pride_advance: "日耳曼人的骄傲"
 germania_germanic_pride_advance_desc: "日耳曼人是骄傲的民族，他们从不知“投降”为何物。"
 germania_hard_work_advance: "辛苦劳动"
 germania_hard_work_advance_desc: "日耳曼民族崇尚高效勤奋的工作精神。"
 germania_germanic_christianity_advance: "日耳曼基督教世界"
 germania_germanic_christianity_advance_desc: "日耳曼人与基督教的关系向来耐人寻味。从阿里乌斯派信徒、条顿骑士团到新教改革运动，日耳曼人接纳了基督教，并将其烙上自己的印记。"
 germania_raiders_advance: "劫掠传统"
 germania_raiders_advance_desc: "古典时代时，日耳曼部落如苏维汇人或斯堪的纳维亚维京人以劫掠与奴役而恶名昭彰；即便到了中世纪，弗里斯兰人仍是北海海域频繁肆虐的海盗势力。"
 gothic_group: "哥特团体"
 gothic_language: "哥特语"
 true_gothic_culture: "哥特"
 ostrogothic_culture: "东哥特"
 visigothic_culture: "西哥特"
 GTH: "哥特"
 GTH_ADJ: "哥特"
 GTH_f: "哥特"
 GTH_f_desc: "克里米亚的哥特人长期受希腊文化影响，近来又持续遭受蒙古人的压迫。如今哥特人已征服克里米亚及周边地区，哥特文化复兴的时机已然到来。"
 OGT: "东哥特"
 OGT_ADJ: "东哥特"
 OGT_f: "东哥特"
 OGT_f_desc: "公元488年，东哥特国王狄奥多里克大帝根据与芝诺皇帝的协议入侵意大利。仅仅五年后，他便成为意大利国王。如今哥特人再度统治意大利，延续着先辈未竟的事业。"
 VGT: "西哥特"
 VGT_ADJ: "西哥特"
 VGT_f: "西哥特"
 VGT_f_desc: "西哥特人于418年定居在高卢南部，并由此征服了伊比利亚半岛大部，直至被撒拉森人击败并最终灭亡。"
 STATIC_MODIFIER_NAME_gothicization: "哥特化"
 gothic_arian_heritage_advance: "阿里乌斯派遗产"
 gothic_arian_heritage_advance_desc: "许多哥特基督徒曾属于阿里乌斯派的基督教异端，该派否认三位一体教义。如今哥特人虽归属迦克墩基督教，但阿里乌斯派的影响仍隐约可见。"
 gothic_gothic_armies_advance: "哥特军队"
 gothic_gothic_armies_advance_desc: "哥特人以令人畏惧的重骑兵闻名，加之狂热的忠诚，对任何与哥特人为敌者而言都是可怕的对手。"
 ostrogothic_restorers_of_italy_advance: "意大利光复者"
 ostrogothic_restorers_of_italy_advance_desc: "狄奥多里克为恢复意大利付出巨大努力。他重建城墙、扩建城市、修复引水渠，使意大利重获大量衰落前的荣光。"
 ostrogothic_administration_advance: "东哥特行政体系"
 ostrogothic_administration_advance_desc: "日耳曼法与哥特法的融合催生了一个高效的行政体系，其水准足以媲美罗马帝国鼎盛时期的官僚制度。"
 visigothic_never_again_advance: "永不重演"
 visigothic_never_again_advance_desc: "摩尔人再也不能摧毁西哥特王国。"
 visigothic_visigothic_code_advance: "西哥特法典"
 visigothic_visigothic_code_advance_desc: "《西哥特法典》是一部融合罗马法与日耳曼习俗的庞大法律体系。这部法典至今仍影响着伊比利亚半岛的法律，是西哥特人最伟大的成就之一。"
 gothic_gothic_alphabet_advance: "哥特字母"
 gothic_gothic_alphabet_advance_desc: "由于哥特字母的出现，哥特语成为最早被书写的日耳曼语言之一，这推动了日耳曼民族的基督教化以及文字的普及。"
 SL4_f: "斯拉维亚"
 SL4_f_desc: "斯拉夫人已经打败了所有的压迫者，斯拉夫人你崛起吧！"
 SL4: "斯拉维亚"
 SL4_ADJ: "斯拉维亚"
 slavia_scythian_mysticism_advance: "斯基泰神秘主义"
 slavia_scythian_mysticism_advance_desc: "尽管斯拉夫人是斯基泰人后裔的说法非常可疑，但通过接受这一观点，我们仍能促进更强大的民族神话构建，为斯拉夫人提供一个共同的神秘起源点以增强凝聚力，从而获得民族正统性。"
 slavia_slavic_families_advance: "斯拉夫家庭"
 slavia_slavic_families_advance_desc: "斯拉夫人普遍与家庭有着紧密联系，经常与所有家庭成员共同庆祝活动，这有助于构建更强大、更稳定的社会。"
 STATIC_MODIFIER_NAME_italian_merchants: "意大利商人关系"
 STATIC_MODIFIER_NAME_standalone_economy: "自给自足经济"
 trebizond_theodoro.1.title: "帝国的遗产"
 trebizond_theodoro.1.desc: "我们曾经辽阔的帝国留下了许多遥远的据点，它们依然保持着罗马的传统。我们理应援助海外那些血脉相连的兄弟姐妹们。"
 trebizond_theodoro.1.a: "帮助他们。"
 trebizond_theodoro.1.b: "我们还有其他优先事项。"
 trebizond_theodoro.2.title: "拜占庭援助"
 trebizond_theodoro.2.desc: "我们在君士坦丁堡的兄弟们慷慨地表示愿意帮助我们抵御蛮族的入侵，接受这份援助无疑是明智之举。"
 trebizond_theodoro.2.a: "我们依然是罗马人。"
 trebizond_theodoro.2.b: "我们不需要他们的怜悯。"
 ROM_f_alt: "罗马帝国"
 ROM_f_alt_desc: "自二世纪以来，再无强大如罗马的帝国能掌控整个地中海及更远疆域，若我们占领这片土地，便可蔑视君士坦丁堡或神圣罗马帝国的任何僭越者，并宣告我们才是罗马帝国#italic 真正#!的继承者。#italic 我们是罗马公民！#!"
 gothic_group_desc: "哥特"
 gothia_gothic_migration_advance: "哥特迁徙"
 gothia_gothic_migration_advance_desc: "哥特人有着悠久的迁徙历史，他们跨越欧洲的草原与平原，广阔的草原已成为他们的家园。"
 gothia_settle_the_steppe_advance: "定居草原"
 gothia_settle_the_steppe_advance_desc: "草原是一片广阔而原始的土地，见证了无数民族的来去。如今，文明开化的时刻终于到来。"
 gothia_people_on_the_brink_advance: "绝境民族"
 gothia_people_on_the_brink_advance_desc: "我们曾在克里米亚一角濒临灭绝，而后奋力挣脱困境；我们绝不允许自己的人民再次经历这般苦难。"
 gothia.1.title: "邀请德意志人"
 gothia.1.desc: "随着我们转向接纳日耳曼传承，邀请德国定居者来到我国或许能让我们从中获益，从而进一步巩固区别于希腊人的哥特认同。"
 gothia.1.a: "一个伟大的创举！"
 gothia.1.b: "我们会考虑的！"
 gothia.2.title: "阿里乌斯派的传播"
 gothia.2.desc: "随着宗教改革持续发展并站稳脚跟，阿里乌斯派也再度兴起，许多贵族乃至前神职人员已开始公开主张回归阿里乌斯派。"
 gothia.2.a: "异端！"
 gothia.2.b: "我们应当再次聆听阿里乌斯的教诲。"
 gothia.2.c: "阿里乌斯派将被容忍，但仅此而已。"
 gothia.3.title: "阿里乌斯派复兴"
 gothia.3.desc: "随着宗教改革的传播，异端思想开始在民众中蔓延。这导致一群神职人员宣布复兴阿里乌斯的教义。这是一种古老的、反对尼西亚信经的基督教异端，反对神圣三位一体，曾在日耳曼部落中最为流行。这一事态发展令人不安，并可能在未来引发宗教冲突。"
 gothia.3.a: "我们会关注他们的动向。"
 gothia.4.title: "哥得兰人的迁徙"
 gothia.4.desc: "哥特兰岛上的居民——哥得兰人，被许多人视为我们远方的兄弟，他们已开始向哥提亚迁移，在欧洲的边疆寻求自由与新生。"
 gothia.4.a: "我们应鼓励更多人前来。"
 gothia.4.b: "我们欢迎他们。"
 a_gothic_cavalry_base: "哥特骑兵基地"
 a_gothic_cavalry_base_desc: "哥特民族曾以其骁勇坚毅的骑兵，纵横驰骋于欧洲与地中海广袤的土地上。"
 a_gothic_cavalry: "哥特骑兵"
 a_gothic_cavalry_desc: "哥特民族曾以其骁勇坚毅的骑兵，纵横驰骋于欧洲与地中海广袤的土地上。"
 a_gothic_cavalry_levy: "哥特骑兵"
 a_reformed_gothic_cavalry: "改良哥特骑兵"
 a_reformed_gothic_cavalry_desc: "在适应现代骑兵作战的同时，哥特人仍保持着由数百年古老骑兵传统磨砺而成的技艺。"
 a_late_gothic_cavalry: "晚期哥特骑兵"
 a_late_gothic_cavalry_desc: "在适应现代骑兵作战的同时，哥特人仍保持着由数百年古老骑兵传统磨砺而成的技艺。"
 a_gothic_cavalry_levy_desc: "哥特民族曾以其骁勇坚毅的骑兵，纵横驰骋于欧洲与地中海广袤的土地上。"
 gothic_cavalry_advance: "哥特骑兵"
 gothic_cavalry_advance_desc: "哥特民族曾以其骁勇坚毅的骑兵，纵横驰骋于欧洲与地中海广袤的土地上。"
 reformed_gothic_cavalry_advance: "改良哥特骑兵"
 reformed_gothic_cavalry_advance_desc: "在适应现代骑兵作战的同时，哥特人仍保持着由数百年古老骑兵传统磨砺而成的技艺。"
 late_gothic_cavalry_advance: "晚期哥特骑兵"
 late_gothic_cavalry_advance_desc: "在适应现代骑兵作战的同时，哥特人仍保持着由数百年古老骑兵传统磨砺而成的技艺。"
 gothia_german_settlers_tt: "我们现在解锁了$gothic_invite_german_settlers$特权。"
 gothic_invite_german_settlers: "邀请德意志定居者"
 gothic_invite_german_settlers_desc: "当我们在移民引以为豪的肩膀上建设一个高大的国家时，移民的潮流以及我们国家内部和周边领土政治的动态变化都将从中受益！"
 lots_of_arians: "我们的许多[ROOT.GetCountry.GetCulture.GetName][ShowReligionAdjective('orthodox')][pops|e]会改信[ShowReligionName('arianism')]"
 arianism: "阿里乌斯派"
 arianism_ADJ: "阿里乌斯派"
 arianism_desc: "$arianism$得名于阿里乌斯，是一种基督教神学运动，主张耶稣基督具有神性，但并非与上帝同质、永恒且非受造的神。该思想曾盛行于多个日耳曼部落，尤其是哥特人和汪达尔人之中，但最终被尼西亚基督教彻底清除。"
 STATIC_MODIFIER_NAME_arian_conversion: "皈依阿里乌斯派"
 name_arius: "阿里乌斯"
 constantinople_episcopal_see_arian: "阿里乌斯派君士坦丁堡牧座"
 jerusalem_episcopal_see_arian: "阿里乌斯派耶路撒冷牧座"
 ravenna_episcopal_see_arian: "阿里乌斯派拉文纳牧座"
 carthage_episcopal_see_arian: "阿里乌斯派迦太基牧座"
 toledo_episcopal_see_arian: "阿里乌斯派托莱多牧座"
 alexandria_episcopal_see_arian: "阿里乌斯派亚历山大牧座"
 arian_barbarian_popularity: "野蛮人的救赎"
 arian_barbarian_popularity_desc: "阿利乌斯主义在古代蛮族部落中非常流行，例如哥特人、勃艮第人和汪达尔人。"
 arian_shunned_faith: "被排斥的信仰"
 arian_shunned_faith_desc: "我们的信仰被尼西亚大公会议定为异端，导致被迫害，最终使古老的阿利乌斯主义走向终结。如今我们既已归来，即便流血牺牲，也绝不让历史重演。"
 arian_translators: "阿里乌斯派译者"
 arian_translators_desc: "我们的传教士们总是勤勉地学习外语，甚至创造新的字母系统，以传播上帝的福音。"
 arian_the_true_church: "真教会"
 arian_the_true_church_desc: "尼西亚派信徒或许会拒绝我们，但我们知道阿里乌斯主义代表了耶稣基督和天父的真正意愿。"
 arian_glorious_churches: "辉煌的教堂"
 arian_glorious_churches_desc: "通过推动建造教堂和绘制宗教艺术，我们能够传播信仰，并一窥神圣之美。"
 arian_inquisition: "阿里乌斯派宗教裁判所"
 arian_inquisition_desc: "尽管没有统一的阿里乌斯派教会，各地主教仍应发起宗教审判以确保信仰统一。"
 arian_unwitting_reformers: "无意的改革者"
 arian_unwitting_reformers_desc: "尽管新教信仰与我们之间存在诸多分歧，但不可否认的是，阿里乌斯主义确实已成为宗教改革的一部分。"
 trebizond_theodoro.3.title: "被遗弃！"
 trebizond_theodoro.3.desc: "帝国已经抛弃了我们！当敌人四面逼近之际，君士坦丁堡的贵族们认定我们不值得他们费心，我们必须独自面对这场风暴，或是寻找新的盟友。"
 trebizond_theodoro.3.a: "投向意大利人。"
 trebizond_theodoro.3.b: "反正我们也不需要他们。"
 SRT_f: "萨尔马提亚"
 SRT_f_desc: "萨尔马提亚是斯基泰人的一个古老部落联盟。如今，其中一些萨尔马提亚部落的后裔被称为奄蔡人或阿兰人。"
 SRT: "萨尔马提亚"
 SRT_ADJ: "萨尔马提亚"
 sarmatian_culture: "萨尔马提亚"
 scythian_group: "斯基泰集团"
 scythian_group_desc: "斯基泰集团"
 STATIC_MODIFIER_NAME_scythianization: "斯基泰化"
 sarmatia.1.title: "萨尔马提亚归来"
 sarmatia.1.desc: "随着萨尔马提亚的复兴，我们有机会通过教育与宣传相结合的方式，重现古代萨尔马提亚文化的近似面貌。这将有助于确保文化统一，并巩固我们对草原地区的掌控。"
 sarmatia.1.a: "萨尔马提亚重现人间！"
 sarmatia.1.b: "我们将走得更远！"
 sarmatia.1.c: "这简直荒谬至极。"
 sarmatia_scythian_cavalry_advance: "斯基泰骑兵"
 sarmatia_scythian_cavalry_advance_desc: "斯基泰人在那个时代曾是草原上的恐怖象征。"
 sarmatia_cultivate_the_steppe_advance: "垦殖草原"
 sarmatia_cultivate_the_steppe_advance_desc: "草原这片土地对于定居者来说近乎不宜居住，但凭借足够的毅力和决心，我们能够改变这一现状。"
 sarmatia_return_of_the_scythians_advance: "斯基泰人归来"
 sarmatia_return_of_the_scythians_advance_desc: "斯基泰人被突厥人赶出了草原。如今我们回来了，是时候将突厥人赶回阿尔泰山了。"
 WRE_f: "西罗马帝国"
 WRE_f_desc: "长久以来，西部的皇帝一直由神圣罗马帝国皇帝担任，但通过征服足够多的领土，我们便能挑战这一宣称。"
 WRE: "西罗马"
 WRE_ADJ: "西罗马"
 west_rome_rhine_border_advance: "莱茵边境"
 west_rome_rhine_border_advance_desc: "莱茵河是一道天然边界，为高卢提供了安全保障，却同时也是帝国面临的最大威胁，必须时刻严防。"
 west_rome_divide_et_impera_advance: "分而治之"
 west_rome_divide_et_impera_advance_desc: "“分而治之”是罗马获取与整合新领土的经典方式。"
 west_rome_latin_excellence_advance: "拉丁优越性"
 west_rome_latin_excellence_advance_desc: "罗马文明是有史以来最伟大的文明，远超其希腊导师，令世界各地蛮族目眩神迷，拉丁文明的威望与精神无与伦比。"
 west_rome_gallic_legions_advance: "高卢军团"
 west_rome_gallic_legions_advance_desc: "高卢军团为我军提供了坚实的核心步兵。"
 west_rome_numidian_equites_advance: "努米底亚骑士"
 west_rome_numidian_equites_advance_desc: "北非为我们提供了大量经验丰富的熟练骑兵，巩固了我军侧翼。"
 west_rome_conquestio_paradisi_advance: "征服天堂"
 west_rome_conquestio_paradisi_advance_desc: "西方大海的彼岸，有大片肥沃的无主之地，已经准备好成为罗马的一部分。"
 west_rome_propagatio_linguae_advance: "传播语言"
 west_rome_propagatio_linguae_advance_desc: "确保帝国人民识字至关重要，尤其是掌握官方语言。"
 west_rome_dictator_and_imperium_advance: "独裁官与帝权"
 west_rome_dictator_and_imperium_advance_desc: "独裁官与帝权是古老的罗马制度，授予特定人物在军事或政治上暂时的绝对权力，以应对重大危机。"
 west_rome_modern_legion_advance: "现代军团"
 west_rome_modern_legion_advance_desc: "军团士兵的威望与精神将始终令人神往，但重要的是不要沉湎于昔日荣耀，而应保持一支现代化且强大的军队。"
 west_rome_academiaromana_advance: "罗马学院"
 west_rome_academiaromana_advance_desc: "通过资助和鼓励建立学院，我们可以确保技术优势。"
 west_rome_eternal_west_advance: "永恒西部"
 west_rome_eternal_west_advance_desc: "帝国西部的复兴，证明了罗马及其西部心脏地带的不朽。"
 GRC_f: "大哥伦比亚"
 GRC_f_desc: "击败了殖民势力，美洲的西班牙语民族成功地抵抗了来自内外的所有分裂力量。为一个伟大的西班牙语美洲联盟奠定了基础。"
 GRC: "大哥伦比亚"
 GRC_ADJ: "大哥伦比亚"
 HISPAM: "西班牙美洲"
 HISPAM_ADJ: "西美"
 gran_colombia.1.title: "我们联盟的名称"
 gran_colombia.1.desc: "有些人觉得“大哥伦比亚”这个名字不够包容，更倾向于使用“西班牙美洲”这个名称，将其作为美洲所有西班牙语民族国家真正具有统一性的称谓。"
 gran_colombia.1.a: "我们国家的名字维持现状就好。"
 gran_colombia.1.b: "西班牙美洲是更好的名字。"
 gran_colombia_unite_the_nation_advance: "团结国家"
 gran_colombia_unite_the_nation_advance_desc: "我国人民生活的环境差异巨大，涵盖山地、草原、森林和雨林。要真正团结人民，最直接的方式就是建设大型道路工程，征服地理障碍，便利陆上通行。"
 gran_colombia_libertad_advance: "自由"
 gran_colombia_libertad_advance_desc: "我们的国家建立在摆脱旧世界束缚的自由之上，我们应当永远铭记这一点。"
 gran_colombia_la_patria_grande_advance: "伟大祖国"
 gran_colombia_la_patria_grande_advance_desc: "“伟大的祖国”，这一对我们强大国家诗意的称谓，体现了我们雄心勃勃的精神和对团结的不懈追求。"
 DTS_f: "迪茨兰"
 DTS_f_desc: "居住在波罗的海和北海南岸平原的人们有许多共同点，无论是他们对海洋的依赖、经商的倾向，还是相似的方言。一个统一这些群体的国家将成为陆地和海洋上的强大力量，也是迈向更广泛德意志统一的重要一步。"
 DTS: "迪茨兰"
 DTS_ADJ: "迪茨"
 Thiois: "条伊斯兰"
 Thiois_ADJ: "条伊斯"
 dietsland.1.title: "荷兰人与低地德意志人的国度"
 dietsland.1.desc: "关于国家名称的争论正愈演愈烈，部分人认为“迪茨兰”这一名称包容性不足，更倾向于使用“条伊斯兰”一词。“条伊斯”是古法语术语，指代法兰西东北部的日耳曼民族，其词源可追溯至古日耳曼语，与“德意志”和“迪茨”同根同源。由于该词具有外来性与古老渊源，因而被认为更具普适性。"
 dietsland.1.a: "维持“迪茨兰”之名。"
 dietsland.1.b: "“条伊斯兰”是更合适的名称。"
 dietsland_netherlanders_advance: "低地之民"
 dietsland_netherlanders_advance_desc: "由于低地家园无法仅凭地势固守，我们被迫成为勇敢而坚韧的战士。与此同时，我们还变得十分精于农耕。"
 dietsland_mercantile_meritocracy_advance: "商业精英制"
 dietsland_mercantile_meritocracy_advance_desc: "我们社会的商业特质催生了精英制度，从而加强与商人阶层的联系与依赖。"
 dietsland_saxon_cattle_advance: "萨克森牧群"
 dietsland_saxon_cattle_advance_desc: "下萨克森以其健康繁盛的牧群在欧洲享有盛誉，畜牧业堪称我们经济的基石。"
 dietsland_new_world_adventurism_advance: "新大陆冒险"
 dietsland_new_world_adventurism_advance_desc: "新大陆许诺冒险与财富，对勇敢的年轻人而言是一项极具诱惑的事业。"
 dietsland_amphibious_expertise_advance: "两栖作战专长"
 dietsland_amphibious_expertise_advance_desc: "对强大陆军与强大海军的双重需求，催生了我国独步天下的两栖作战创新。"
 dietsland_renowned_mercenaries_advance: "著名佣兵"
 dietsland_renowned_mercenaries_advance_desc: "我国人民尚武重商的特性，孕育了许多锐意进取的雇佣兵团，他们必将在未来的冲突中大有用武之地。"
 dietsland_stoic_soldiers_advance: "坚忍士兵"
 dietsland_stoic_soldiers_advance_desc: "我军战士经过战斗的锤炼，从不退缩，即使面对数量上占优势的敌军也绝不畏惧。"
 dietsland_mare_nostrum_germanicum_advance: "我们德意志人的海"
 dietsland_mare_nostrum_germanicum_advance_desc: "北海是我们的海， 是我国经济命脉与军事要冲，无论是否有人反对，我们都将主宰这片海域。"
 dietsland_pan_germanism_advance: "泛德意志主义"
 dietsland_pan_germanism_advance_desc: "一种情绪在德语区日益高涨，那便是对建立一个统一强大的德意志国家的渴望，而我们正处在担负这一使命的最佳位置。"
 dietsland_capitalistic_traditions_advance: "资本主义传统"
 dietsland_capitalistic_traditions_advance_desc: "我们正迎来一个创业与工业的时代，这个时代与我们的人民格外契合。"
 RMA: "鲁密尼亚"
 RMA_ADJ: "鲁密"
 RMA_f: "$RMA$"
 RMA_f_desc: "土耳其人长久以来一直致力于成为罗马的继承者，罗姆苏丹国便是首次尝试，但它失败了，因为它仅仅是一个突厥‑‑波斯国家改换名称而已。我们绝不能重蹈覆辙，而要将罗马与突厥交织融合，贯通我们的历史，确立真正一脉相承的罗马谱系。"
 rumi_culture: "鲁密"
 rumi_dialect: "鲁密"
 RMA_RUMI_ASSIMILATION_CONSTANTINOPLE: "[ShowLocationName('constantinople')]的人民采用[ShowCultureName('rumi_culture')]文化。"
 RMA_RUMI_ASSIMILATION_BURSA: "[ShowLocationName('bursa')]的人民采用[ShowCultureName('rumi_culture')]文化。"
 RMA_RUMI_ASSIMILATION: "安纳托利亚地区的许多人将采用[ShowCultureName('rumi_culture')]文化。"
 RMA_CONVERT_ANGRY: "尽管部分人会随我们一同改宗，但许多旧信仰的信徒将会不满。"
 STATIC_MODIFIER_NAME_rma_romanization: "罗马化"
 STATIC_MODIFIER_NAME_rma_early_secularism: "早期世俗主义"
 STATIC_MODIFIER_NAME_rma_spreading_the_faith: "传播信仰"
 rma_sharia_law_hint: "如果我们重新实施伊斯兰教法，就将失去世俗地位，且再也无法恢复。"
 RMA_roman_provinces: "罗马行省"
 RMA_roman_provinces_desc: "罗马行省是由总督管辖的行政区域，总督负责地方的法律、政务及军事职责。总督由皇帝或元老院直接任命，他们大多在城镇中心进行治理。"
 RMA_roman_law: "鲁密法律"
 RMA_roman_law_desc: "尽管需要做出一些调整，鲁密法律主要建立在古罗马和拜占庭法律基础之上，并受到少量波斯及伊斯兰教法的影响。只要公民遵守法律且不试图破坏帝国完整，该法律就能一视同仁地对待不同宗教的臣民，并保障其法律地位上的平等。"
 rumi_events.1.title: "文化罗马化"
 rumi_events.1.desc: "既然我们已经宣称自己为罗马的统治者与合法继承者，并开始采用如“罗姆凯撒”之类的头衔进行仪式性宣告。\n\n这种举措虽无不可，但很大程度上只是一种表象。我们的社会与治理实质上仍基于伊斯兰化的突厥‑波斯传统。要真正成为罗马精神与生活方式的继承者，我们必须积极为我们的新罗马推广一种新文化：促进希腊人与土耳其人之间的良好关系，延续拜占庭的制度，并如同对待自身历史般研习与尊重罗马历史。\n\n这将是一项艰巨的长期任务，我们将面临来自双方传统主义者的诸多阻力，但凭借意志力与毅力，我们必能建立一个真正意义上的罗马国家。"
 rumi_events.1.a: "我们是罗马人！"
 rumi_events.1.b: "我们还是不要走得太远。"
 rumi_events.2.title: "召开宗教会议"
 rumi_events.2.desc: "采纳罗马特性后，宗教问题随之而来。我们统治着一个宗教面貌极其多元的疆域，而自称为罗马人的群体主要信奉基督教。与此同时，我们的国家及大多数土耳其人则信仰伊斯兰教。\n\n这些宗教差异在过去已引发诸多问题，如今更对我们的合法性造成困扰。多数基督徒根本不尊重我们对罗马的宣称，因为近千年来罗马身份一直与基督教紧密相连；而许多穆斯林臣民，特别是乌理玛阶层，将我们的国家视为伊斯兰的延伸，罗马之名仅是一种形式。因此，我们应当召开一次宗教会议，正如昔日的迦克墩或尼西亚大公会议曾用以解决当时的宗教问题一样，它们现在也能为我们发挥同样的作用。"
 rumi_events.2.a: "邀请所有信仰的学者前往[ShowLocationName('constantinople')]。"
 rumi_events.2.b: "伊斯兰教不容置疑。"
 rumi_events.3.title: "[ShowLocationName('constantinople')]大公会议 "
 rumi_events.3.desc: "各方学者齐聚一堂，在鲁姆凯撒的保护下，开始就上帝的本质、耶稣基督、何为美德何为罪恶进行公开的宗教辩论。此次会议出现了许多不同的面孔，包括像卜列东的新柏拉图主义门徒那样通常不被认真对待的群体。天色渐晚，到了我们的统治者做出决定的时刻，他邀请每个群体选出其内部最杰出者，然后向他陈述各自的理由。基督徒阐释了三位一体和基督的神性，穆斯林学者论证了阿布·伯克尔或阿里继承权的正当性，而卜列东的追随者则颂扬古代德性伦理。在所有陈词听取完毕后，大厅一片寂静，等待鲁姆凯撒做出最终裁决。"
 rumi_events.3.a: "“我感谢所有到场者，但我对安拉的信仰一如既往地坚定。”"
 rumi_events.3.b: "“我现在看到了真理与基督的神性，我将尽快接受洗礼。”"
 rumi_events.3.c: "“我对安拉的信仰依然炽热，但我相信阿里的追随者掌握了真理。”"
 rumi_events.3.d: "“这片土地应由古人和卜列东的智慧教导来治理，以确保所有公民的美德。”"
 rumi_events.4.title: "律法罗马化"
 rumi_events.4.desc: "尽管宣称承袭罗马帝国衣钵，我们的法律体系仍主要基于波斯法与伊斯兰教法，而非罗马法或拜占庭法。然而，近来的法律进展有望改变这一现状——但前提是我们选择接纳罗马法律体系。"
 rumi_events.4.a: "法律确实需要改革！"
 rumi_events.4.b: "我们应该考虑一下……"
 rumi_imperial_system_advance: "帝国体制"
 rumi_imperial_system_advance_desc: "我们的帝国体制，基于古代法典与现代革新，以严惩失败来崇尚功绩，从而塑造勤勉的官僚体系。"
 rumi_roman_romanticism_advance: "罗马浪漫主义"
 rumi_roman_romanticism_advance_desc: "作为罗马的正统继承者，传播罗马的知识以彰显辉煌过往，符合我们的利益。"
 rumi_caesar_of_rome_advance: "罗马凯撒"
 rumi_caesar_of_rome_advance_desc: "“鲁姆凯撒”是我国君主的头衔，昭示我们对罗马帝位的宣称。"
 rumi_between_east_and_west_advance: "东西方之间"
 rumi_between_east_and_west_advance_desc: "我们帝国的核心疆域正处欧亚交界，得以受益于多种不同思维的交汇。"
 rumi_receptio_romana_advance: "收复罗马故土"
 rumi_receptio_romana_advance_desc: "罗马帝国是一个统治辽阔疆域的庞大国家，因此，我们的许多征服行为在某种程度上可以被视为收复本就合法属于我们的领土。"
 rumi_modern_fusion_army_advance: "现代融合军队"
 rumi_modern_fusion_army_advance_desc: "我们历史上融合了突厥、波斯与拜占庭的战术与编制。这仍是坚实的核心基础，但我们也应改革战略中某些较为过时的部分。"
 rumi_hellenoturkism_advance: "希腊土耳其主义"
 rumi_hellenoturkism_advance_desc: "民族主义正威胁撕裂帝国根基，而我们依赖的是古典浪漫主义、法治主义与纯粹武力的混合。然而，新兴的民族主义哲学家提出“希腊土耳其主义”，主张希腊人与土耳其人彼此共通之处多于分歧，应团结在同一旗帜下战斗。尽管这与我们的罗马议程不尽吻合，但仍优于希腊或土耳其的民族主义。"
 rumi_renewed_purpose_advance: "天命重铸"
 rumi_renewed_purpose_advance_desc: "迈入启蒙时代，我们必须重塑民族目标。"
 roman_group: "罗马"
 roman_group_desc: "罗马"
 STATIC_MODIFIER_NAME_donetsk_coal: "顿涅茨克煤矿"
 gothia.5.title: "顿涅茨克煤矿"
 gothia.5.desc: "一位威尔士探险家在我国旅行时发现了极其丰富的煤矿资源。他承诺从家乡带来矿工和技术，帮助在这些矿藏周围建立一个大型采矿集镇，这对我们国家来说只会是有益的。"
 gothia.5.a: "找到多尼泰姆"
 gothia.5.b: "发现顿涅茨克"
 nobles_estate_gothic: "贵族"
 burghers_estate_gothic: "市民"
 clergy_estate_gothic: "教士"
 peasants_estate_gothic: "农民"
 a_early_gothic_cavalry_base: "哥特骑兵基地"
 a_early_gothic_cavalry_base_desc: "哥特人曾以其勇猛果敢的骑兵纵横欧洲和地中海地区。"
 a_early_gothic_cavalry: "早期哥特骑兵"
 a_early_gothic_cavalry_desc: "哥特人曾以其勇猛果敢的骑兵纵横欧洲和地中海地区。"
 a_early_gothic_cavalry_levy: "早期哥特骑兵"
 a_early_gothic_cavalry_levy_desc: "哥特人曾以其勇猛果敢的骑兵纵横欧洲和地中海地区。"
 STATIC_MODIFIER_NAME_byzantine_aid: "拜占庭援助"
 STATIC_MODIFIER_NAME_TRE_preparing_for_independence: "为独立做准备"
 STATIC_MODIFIER_NAME_TRE_turkomen_allies: "土库曼盟友"
 trebizond_theodoro.2.c: "接近意大利人。"
 trebizond_theodoro.3.c: "拥抱我们的传统。"
 trebizond_theodoro.4.title: "希腊影响力减弱"
 trebizond_theodoro.4.desc: "随着君士坦丁堡的陷落，帝国的影响力已从我们的疆域消退。如今渐起的流言认为，将未来托付给罗马人是个错误，我们应当追随祖先的足迹前行。"
 trebizond_theodoro.4.a: "我们是哥特人！"
 trebizond_theodoro.4.b: "我们依然是罗马人。"
 trebizond_theodoro.5.title: "煽动不忠"
 trebizond_theodoro.5.desc: "札剌亦儿人盘踞在本都山脉以南，对我国构成严重威胁。然而他们内部部落林立、各自为政，这让我们有机会在其阵营中制造不忠，从而为我们争取时间和机遇。"
 trebizond_theodoro.5.a: "我们应该这样做。"
 trebizond_theodoro.5.b: "我们不能如此下作。"
 trebizond_theodoro.6.title: "特拉比松的提议"
 trebizond_theodoro.6.desc: "特拉比松向我们提供了一些\"礼物\"，以换取我们背叛札剌亦儿苏丹。虽然这是个大胆且非常阴险的提议，但如果计划成功，我们可能将统治伊儿汗国。"
 trebizond_theodoro.6.a: "我们将准备推翻札剌亦儿苏丹。"
 trebizond_theodoro.6.b: "我们将保留黄金，但不会继续执行该计划。"
 trebizond_theodoro.7.title: "联合土库曼人"
 trebizond_theodoro.7.desc: "我国境内居住着一些土库曼部落，目前我们与他们保持着不稳定的休战状态。但通过与部落首领进行会谈，并赠送礼物以示友好，我们或许能争取到他们的支持，让这些强大的部落战士为我们而战。"
 trebizond_theodoro.7.a: "邀请所有土库曼部落首领。"
 trebizond_theodoro.7.b: "我们不会与野蛮人结盟。"
 a_hetaireia: "伙友近卫"
 a_hetaireia_desc: "东罗马帝国军队使用精锐雇佣兵部队来保护其偏远前哨站免受蛮族入侵。"
 a_genoese_mercenaries: "热那亚雇佣兵"
 a_genoese_mercenaries_desc: "为任何出得起足够酬金的基督教统治者而效力的意大利弩手。"
 RMS_f: "罗曼诺斯拉维亚"
 RMS_f_desc: "南斯拉夫人与罗马人有着悠久而复杂的历史，时而为盟友，时而为敌人，但斯拉夫人始终承认东罗马帝国。如今他们统治了君士坦丁堡，是时候完全继承罗马衣钵了。"
 RMS: "罗曼诺斯拉维亚"
 RMS_ADJ: "罗曼诺斯拉维亚"
 romanoslavic: "罗马斯拉夫"
 romnanoslavic_dialect: "罗马斯拉夫"
 romanoslavia.1.title: "斯拉夫与罗马帝国"
 romanoslavia.1.desc: "通过征服，我们巩固了所获得的东罗马核心领土，我们对其遗产拥有了坚实的宣称。当新旗帜在君士坦丁堡的宫殿上空升起时，我们已经面临问题。希腊人和斯拉夫人仍视自己为不同的民族，此外，不同的斯拉夫族群虽然承认彼此的相似之处，但仍视对方为异类，有时甚至彼此敌对。解决方案很简单：我们推广一种更为罗马化的文化，通过有意识地采纳东罗马的传统、借用词汇、着装风格，我们可以逐渐消除希腊人与各斯拉夫族群之间的差异，创造一个超越其各个部分的伟大民族。"
 romanoslavia.1.a: "让我们共同培育一种新文化。"
 romanoslavia.1.b: "荒谬的提议。"
 romanoslavia.2.title: "三色旗？"
 romanoslavia.2.desc: "近年来三色旗的流行让我们的国旗显得有些过时，因此有人开始提议采用蓝白紫三色旗，中央饰以帝国鹰徽的设计方案。我们是否应该采用这个设计作为新国旗？"
 romanoslavia.2.a: "三色旗真是太棒了！"
 romanoslavia.2.b: "我们将保留我们的旗帜。"
 a_romanoslav_cataphracts: "罗马斯拉夫重骑兵"
 a_romanoslav_akritai: "罗曼诺斯拉夫边防军"
 romanoslavia_heirs_to_constantine_advance: "君士坦丁的继承者"
 romanoslavia_heirs_to_constantine_advance_desc: "我们的统治者是遵循法律且承袭君士坦丁大帝的正统继承者，拥有完全的正统性与影响力。"
 romanoslavia_cyrillic_alphabet_advance: "西里尔字母"
 romanoslavia_cyrillic_alphabet_advance_desc: "西里尔字母由希腊传教士为教化斯拉夫人而创，这完美体现了斯拉夫民族与希腊民族之间内在的统一性。"
 romanoslavia_imperial_triumphs_advance: "帝国凯旋"
 romanoslavia_imperial_triumphs_advance_desc: "帝国凯旋仪式是罗马的一种传统，胜利的军队会游行展示战利品，参战老兵并肩行进。这一仪式既能彰显胜利，又能取悦罗马民众。恢复这一传统将提升我们的国家威望，并更清晰地标志我们的罗马传承。"
 romanoslavia_reverse_the_decline_advance: "扭转颓势"
 romanoslavia_reverse_the_decline_advance_desc: "拜占庭帝国在其历史长河中几乎持续衰落，后期尤为艰难。人口与经济崩溃使这片曾经繁荣的核心地带沦为废墟，如今我们必须重建它。"
 romanoslavia_slavic_cavalry_advance: "斯拉夫骑兵"
 romanoslavia_slavic_cavalry_advance_desc: "斯拉夫战士向来擅长运用轻骑兵进行侧翼包抄与袭扰战术。"
 romanoslavia_western_silk_road_advance: "西方丝绸之路"
 romanoslavia_western_silk_road_advance_desc: "君士坦丁堡的城门标志着丝绸之路最西端的目的地之一，引领我们收获了诸多好处。"
 romanoslavia_aegean_dominance_advance: "爱琴海霸权"
 romanoslavia_aegean_dominance_advance_desc: "爱琴海对我们的经济和人民至关重要，必须保护它，我们必须提升海军实力，以确保我们对这片海域的控制权。"
 romanoslavia_legionary_discipline_advance: "军团纪律"
 romanoslavia_legionary_discipline_advance_desc: "拥有强大的战士是一回事，但能否有效运用他们则另当别论。通过效仿罗马的训练体系和坚忍克己的风范，我们可以更有效地发挥士兵的作用。"
 romanoslavia_silver_mining_advance: "白银开采"
 romanoslavia_silver_mining_advance_desc: "巴尔干地区为我们提供了大量白银，使得银矿开采成为我们经济的基石。"
 romanoslavia_new_imperial_army_advance: "新帝国军"
 romanoslavia_new_imperial_army_advance_desc: "随着时代变迁，军事战术也在不断演变，但有时古老的作战单位反而能在当下展现出前所未有的价值。"
 romanoslavia_supreme_autocrat_advance: "至高专制者"
 romanoslavia_supreme_autocrat_advance_desc: "我们的统治者是罗马人与斯拉夫人的至高专制者，他的话语不容置疑。"
 romanoslavia_harass_and_destroy_advance: "骚扰与摧毁"
 romanoslavia_harass_and_destroy_advance_desc: "通过骑兵骚扰战术消耗敌军，一旦他们与我方步兵接触，我们便能彻底击溃其军队。"
 romanoslavia_westernization_advance: "西方化"
 romanoslavia_westernization_advance_desc: "随着新思潮涌入我国，许多年轻贵族和富商阶层正逐渐接纳更多西方观念，有时甚至更倾向于学习英语、西班牙语、日耳曼语或法语，而非拉丁语和希腊语。"
 romanoslavia_great_reforms_advance: "大改革"
 romanoslavia_great_reforms_advance_desc: "我们古老的制度虽好，却亟需改革，周遭世界正在变化，我们必须通过广泛的法律与政治改革来跟上时代。"
 romanoslavia_merchants_to_industrialists_advance: "商人到实业家"
 romanoslavia_merchants_to_industrialists_advance_desc: "我们地处丝绸之路西端，因此我们一直拥有繁荣的商人阶层。如今丝绸之路已近乎终结，工业与全球海上贸易正开创着新的经济时代，我们的中产阶级正通过远离对外贸易，转向创办工厂和大型企业来适应这一变革。"
 a_reformed_gothic_cavalry_base: "改良哥特骑兵"
 a_reformed_gothic_cavalry_base_desc: "在适应现代骑兵作战的同时，哥特人仍保持着由数百年古老骑兵传统磨砺而成的技艺。"
 a_reformed_gothic_cavalry_levy: "改良哥特骑兵"
 a_reformed_gothic_cavalry_levy_desc: "在适应现代骑兵作战的同时，哥特人仍保持着由数百年古老骑兵传统磨砺而成的技艺。"
 formed_rumi_empire_variable: "已成立鲁密帝国"