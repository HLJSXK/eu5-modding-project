 gc_promote_regional_culture_tt: "选择要推广的文化"
 gc_has_selected_core_region_tt: "需要先选定核心区域。"
 gc_empire: "征服者的帝国"
 gc_empire_desc: "一次次军事征服铸造的中央集权君主制帝国；忠诚的附庸，纪律严明的军队，以及团结一心的宫廷使其能够统治庞大的疆域。"
 cb_gc_conquests: "征服者入侵"
 cb_gc_conquests_desc: "一次正当性来源于伟大征服者的扩张性战争。胜利将迫使目标屈服，为帝国的崛起添砖加瓦。"
