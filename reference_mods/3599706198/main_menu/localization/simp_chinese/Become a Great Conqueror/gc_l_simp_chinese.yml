l_simp_chinese:
 STATIC_MODIFIER_NAME_gc_st: "伟大征服者"
 STATIC_MODIFIER_DESC_gc_st: "该角色是枪炮与钢铁的掌握者，以坚定不移的意志和运筹帷幄的战略所向披靡。他率领的军队所到之处皆能激发胜利。"
 become_gc: "成为伟大征服者"
 become_gc_desc_specific: "将该角色提升为伟大征服者，赋予他们强大的战略眼光与无可匹敌的战术能力。"
 become_gc_past: "被认定为伟大征服者"
 become_gc_act_past: "该角色正立在命运的悬崖之上，心中充满决意与野心。尽管世间尚未目睹其全部伟力，但关于其恐怖潜力的低语已深深烙印在人们的脑海里。一位伟大的征服者正在崛起，他的意志将引领即将到来的新时代。"
 become_gc_concept: "使该角色成为伟大征服者"
 gc_rise_of_conqueror: "征服者的崛起"
 gc_rise_of_conqueror_desc: "一位天命所归的君主将目光锁定在一处战略腹地，欲以此为基奠立帝国霸业：选定核心区域，策划入侵，扩张国土。"
 hint_gc_rise_of_conqueror: "伟大征服者：征服者的崛起"
 hint_gc_rise_of_conqueror_desc: "利用局势行动选择一个核心区域，计划入侵，改革为帝国，并推广地区宫廷文化。"
 gc_conqueror_legend_conqueror: "伟大征服者"
 gc_plan_invasion: "策划入侵"
 gc_plan_invasion_desc: "选定入侵目标。这个选项会标记此国并赋予你相应的宣战理由。"
 gc_select_core_region: "选择核心区域"
 gc_select_core_region_desc: "选定一块区域作为帝国的战略腹地。你在此区域中所控制的省份将会被整合并标记为核心区域。"
 gc_reform_into_monarchy: "改革为帝国"
 gc_reform_into_monarchy_desc: "将体制改为君主制，同时将国家等级提升至帝国级。解锁帖木儿君主制改革。"
 gc_promote_regional_culture: "推广区域文化"
 gc_promote_regional_culture_desc: "接纳区域宫廷文化以稳定快速扩张的边疆。"
 gc_plan_invasion_select_country: "选择入侵目标"
