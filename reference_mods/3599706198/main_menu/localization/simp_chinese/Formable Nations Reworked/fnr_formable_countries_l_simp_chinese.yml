l_simp_chinese:
 KSORB_desc: "索布王国是一个更为中央集权化的统一索布人国家，它与虎视眈眈的邻国及语言与宗教错综交织的地区相抗衡。"
 HUNGARIANEMPIRE_desc: "匈牙利人曾一度是欧洲的主要民族，并拥有成为大国的潜力，但遭黑死病重创，随后被奥地利人征服，导致奥匈帝国联盟的形成。\n\n这般命运对历史上的马扎尔王国而言是无法接受的，只要我们意志坚定，就能建立一个属于匈牙利人的匈牙利帝国。"
 BALCH: "俾路支斯坦"
 BALCH_ADJ: "俾路支"
 BALCH_desc: "俾路支既是一个地区也是一个民族，历史上拥有独特的身份认同，这片土地蕴藏着丰富的自然资源。"
 POLBA: "波拉比亚"
 POLBA_ADJ: "波拉比亚"
 POLBA_desc: "波拉比亚是奥博特利特人的一支西斯拉夫列基特部落，居住在特拉沃河与易北河之间。波拉比亚人的主要聚居点是拉齐斯堡（今拉策堡），其名称源自他们的统治者拉蒂博尔大公。"
 GSORB: "大索比亚"
 GSORB_ADJ: "大索比亚"
 GSORB_desc: "长期被周边列强笼罩的索布人，始终以坚韧的民族姿态存续，在数百年异族统治中守住了语言与信仰。索布诸地的统一标志着一个曾被历史湮没的国度重生，她高擎着斯拉夫精神与民族认同的火炬。大索比亚赫然崛起，矢志重振昔日荣光，固守疆域边防。"
 KSORB: "索布王国"
 KSORB_ADJ: "索布"
 KOFHN: "汉诺威王国"
 KOFHN_ADJ: "汉诺威"
 KOFHN_desc: "汉诺威王国是一个存在于1814至1866年间的德意志邦国，由维也纳会议促成建立。该国由汉诺威王朝统治，并与英国维持共主邦联关系直至1837年，因两国继承法产生分歧，英国君主自此不再兼任汉诺威国王。作为德意志邦联成员国的汉诺威，在1866年普奥战争中战败后丧失独立地位，最终被普鲁士吞并。"
 POLNE: "波利尼西亚"
 POLNE_ADJ: "波利尼西亚"
 POLNE_desc: "波利尼西亚是大洋洲的一个分区，由散布在太平洋中南部的一千多个岛屿组成，形成一个大三角，三个角点分别位于夏威夷群岛、新西兰和复活节岛。该地区的原住民波利尼西亚人拥有共同的语言文化特征，独立国家包括新西兰、萨摩亚和图瓦卢。"
 HAWAI: "夏威夷"
 HAWAI_ADJ: "夏威夷"
 HAWAI_desc: "历史上的夏威夷王国（1795‑1893年）是一个独立主权国家，拥有深厚的文化底蕴和完备的社会体系，在被美国吞并前始终保持着自治政权；而现代“夏威夷国”则是当今主张恢复主权的独立运动组织。"
 YGOSL: "南斯拉夫"
 YGOSL_ADJ: "南斯拉夫"
 YGOSL_desc: "南斯拉夫是一个存在于1918年至1992年间的中东南欧联邦制国家，国名意为“南方斯拉夫人的土地”。这个多民族、多宗教的联邦最初称为“塞尔维亚‑克罗地亚‑斯洛文尼亚王国”，二战后更名为南斯拉夫社会主义联邦共和国。该国由六个共和国、两个自治省及多个民族构成复杂认同，最终在1990年代初因民族主义情绪高涨而解体。"
 JAPAN: "日本"
 JAPAN_ADJ: "日本"
 JAPAN_desc: "日本是一个东亚岛国，融合了古老传统与先进科技的独特气质。这个群岛国家由四大主岛——北海道、本州、四国和九州——及数千个小岛组成，实行以天皇与首相共同领导的议会制君主立宪政体。该国地形多山，人口集中分布在沿海平原地区，首都及最大城市为东京。"
 AGEVN: "安茹帝国"
 AGEVN_ADJ: "安茹"
 AGEVN_desc: "安茹帝国是1154至1216年间由金雀花王朝统治的一系列领土，涵盖英格兰及法兰西的大片区域，包括诺曼底、安茹和阿基坦。这个由亨利二世及其继任者理查一世与约翰王建立的强大政权，实则是一个松散联合的\"复合君主国\"。"
 BLTST: "波罗的诸国"
 BLTST_ADJ: "波罗的"
 BLTST_desc: "波罗的海三国——爱沙尼亚、拉脱维亚和立陶宛，是位于北欧东北部、波罗的海东岸的国家，其地貌平坦，以森林、湖泊和河流为主。"
 ALSLO: "阿尔萨斯‑洛林"
 ALSLO_ADJ: "阿尔萨斯‑洛林"
 ALSLO_desc: "阿尔萨斯‑‑洛林是法国东北部的一个历史地区，并非现代国家，以其在法德两国间错综复杂的归属变迁及独特的文化融合而闻名。该地区于1871年普法战争后由法国割让给德国，又在1919年一战后回归法国。如今作为大东部大区的一部分，该地区仍保留特殊的法律地位，其鲜明的文化特征始终深受法德双重文化遗产的塑造。"
 AQUIT: "阿基坦王国"
 AQUIT_ADJ: "阿基坦"
 AQUIT_desc: "阿基坦是法国西南部的一个历史区域，也是昔日的行政大区——凭借恰当的关系网和有效的军事行动，我们可以建立阿基坦王国作为独立国家，直接抗衡法国的统一。"
 RCONF: "莱茵邦联"
 RCONF_ADJ: "莱茵"
 RCONF_desc: "莱茵邦联是1806至1813年间法兰西第一帝国的德意志附庸国联盟，由拿破仑·波拿巴在奥斯特利茨战役获胜后建立。该邦联囊括了除奥地利和普鲁士外的大多数德意志邦国，作为法兰西东部边界的缓冲地带，并于拿破仑在第六次反法同盟中战败后解体。虽名为邦联，它并非统一国家，而是以拿破仑担任“保护人”的松散同盟，这一体制使法兰西得以主导中欧，并调集邦联资源为其战争服务。"
 BLRUS: "白罗斯"
 BLRUS_ADJ: "白罗斯"
 BLRUS_desc: "白罗斯是东欧的一个内陆国家，地势平坦，森林茂密，与俄罗斯、乌克兰、波兰、立陶宛和拉脱维亚接壤。首都为明斯克，人口约910万。历史上曾是苏联加盟共和国，现为威权主义国家，实行强力的政府主导型经济，并对公民自由实施严格限制。"
 BLGUM: "比利时"
 BLGUM_ADJ: "比利时"
 BLGUM_desc: "比利时是西欧的一个联邦议会制君主立宪国，与法国、德国、卢森堡和荷兰接壤。该国以其基于语言区（弗拉芒区、瓦隆区和布鲁塞尔首都区）的复杂联邦结构、官方语言荷兰语、法语和德语以及首都布鲁塞尔而著称。"
 BNLUX: "比荷卢"
 BNLUX_ADJ: "比荷卢"
 BNLUX_desc: "比荷卢是指比利时、荷兰与卢森堡三个西欧邻国组成的政治经济联盟。该名称由三国国名的前两个字母组合而成。这一联盟始于1948年的关税同盟，在人员、商品、资本和服务自由流动等诸多领域推动合作。"
 BMNVD: "不来梅‑凡尔登"
 BMNVD_ADJ: "不来梅‑凡尔登"
 BMNVD_desc: "不来梅‑凡尔登，正式名称为不来梅和凡尔登公国，是神圣罗马帝国的两片领土和直辖采邑，这些领土于1180年形成并获得了帝国直辖权。"
 BLGEM: "保加利亚帝国"
 BLGEM_ADJ: "保加利亚"
 BLGEM_desc: "保加利亚曾是东南欧的一个强大王国，常与拜占庭帝国角逐。第一保加利亚帝国（公元681年至1018年）起源于定居在多瑙河南部的保加尔人，逐渐发展成为文化政治强国，尤其在鲍里斯一世与西美昂大帝统治时期达到鼎盛。第二保加利亚帝国在经历拜占庭统治后于1185年崛起，持续至1396年。"
 BISHE: "大英帝国"
 BISHE_ADJ: "不列颠"
 BISHE_desc: "大英帝国曾是幅员辽阔的全球领地，始于16世纪，至19世纪和20世纪初达到鼎盛，成为史上最大帝国，统治着四亿多人口，覆盖全球24%的陆地面积。它由自治领、殖民地、保护国及其他受英国统治的区域构成，其扩张动力源于经济、民族主义与探索驱动等多重因素。"
 CSPNA: "奇萨尔皮纳"
 CSPNA_ADJ: "奇萨尔皮纳"
 CSPNA_desc: "奇萨尔皮纳共和国是法国在意大利北部的一个姊妹共和国及附庸国，存续于1797年至1799年，后再度成立至1802年。"
 ENGCM: "英格兰联邦"
 ENGCM_ADJ: "英格兰联邦"
 ENGCM_desc: "英格兰联邦指1649至1660年间的历史时期，在英国内战后建立，当时的英格兰是沒有君主的共和政体。这一政治实体由国家护国公和议会共同治理，其国家元首为奥利弗·克伦威尔。"
 CZSLO: "捷克斯洛伐克"
 CZSLO_ADJ: "捷克斯洛伐克"
 CZSLO_desc: "捷克斯洛伐克由波希米亚、摩拉维亚和斯洛伐克这些历史地区组成，这一构成使其得以在欧洲动荡不安的区域中成为一个民主繁荣的国家。"
 DCLPR: "普鲁士公国"
 DCLPR_ADJ: "普鲁士"
 DCLPR_desc: "普鲁士公国是位于普鲁士地区的一个公国，建立于1525年宗教改革期间对修道院普鲁士进行世俗化的结果，该领土此前一直处于条顿骑士团国控制之下直至当时。"
 UKRNE: "乌克兰"
 UKRNE_ADJ: "乌克兰"
 UKRNE_desc: "乌克兰是一个幅员辽阔、历史悠久的东欧国家，以其坚韧精神与肥沃土地（常被称为“欧洲粮仓”）而闻名。\n\n乌克兰位于东南欧，与多个国家接壤，东邻俄罗斯，南濒黑海。地形以平坦平原（草原）为主，西部坐落着喀尔巴阡山脉。该国拥有丰富的自然资源，尤其是广袤肥沃的“黑钙土”以及铁、煤、锰等重要矿藏。"
 DNTPR: "顿涅茨克人民共和国"
 DNTPR_ADJ: "顿涅茨克人民共和国"
 DNTPR_desc: "顿涅茨克人民共和国是乌克兰东部顿巴斯地区一个自行宣布成立、现被俄罗斯兼并的政治实体，于2014年政治动荡期间建立。"
 LUHPR: "卢甘斯克人民共和国"
 LUHPR_ADJ: "卢甘斯克人民共和国"
 LUHPR_desc: "卢甘斯克人民共和国是乌克兰东部顿巴斯地区一个自行宣布成立、现被俄罗斯兼并的政治实体，于2014年政治动荡期间建立。"
 ILYRA: "伊利里亚"
 ILYRA_ADJ: "伊利里亚"
 ILYRA_desc: "伊利里亚是巴尔干半岛西部的一个古代区域，毗邻亚得里亚海，曾是多个部落（统称为伊利里亚人）的聚居地。其疆域涵盖今阿尔巴尼亚、黑山和克罗地亚地区，后扩张成为罗马的伊利里库姆行省，范围从亚得里亚海延伸至多瑙河。该名称亦常见于后世历史记载与文学创作中。"
 EASRE: "东罗马帝国"
 EASRE_ADJ: "罗马"
 EASRE_desc: "东罗马帝国，亦称拜占庭帝国，是罗马帝国在其东部诸行省的延续，以君士坦丁堡（今伊斯坦布尔）为都城。其国民自称为“罗马人”，该帝国作为东正教信仰、希腊文化与古典学术的重要中心，在西罗马帝国灭亡后的一千余年间，持续影响着欧亚大陆的艺术、法律与政治制度的发展。"
 WESRE: "西罗马帝国"
 WESRE_ADJ: "罗马"
 WESRE_desc: "西罗马帝国是罗马帝国的西半部分，在公元395年正式分裂后与东部分治。其特点是首都从梅迪奥兰努姆迁至拉文纳，疆域涵盖意大利、高卢、西班牙等行省，但因经济动荡、政治腐败，以及哥特人、勃艮第人、苏维汇人等族群的频繁入侵而日渐衰颓。"
 EMLRO: "艾米利亚‑罗马涅"
 EMLRO_ADJ: "艾米利亚‑罗马涅"
 EMLRO_desc: "艾米利亚-罗马涅是意大利的一个区域，以其丰富的美食、悠久的历史和强劲的经济而闻名。由于盛产帕马森干酪、帕尔马火腿和香醋等著名农产品。"
 EUROP: "欧洲联盟"
 EUROP_ADJ: "欧盟"
 EUROP_desc: "欧洲在同一面旗帜下实现了统一。诞生于数个世纪的对抗、战争与脆弱和平之中，欧盟如今作为合作与共同命运的灯塔巍然屹立。不再被边界与王权割裂的欧洲，如今正以同一个声音前行，掌握着无与伦比的经济和军事力量。"
 FNCEM: "法兰西帝国"
 FNCEM_ADJ: "法兰西"
 FNCEM_desc: "历史上有两个不同的时期法国曾占据主导地位，即法兰西第一殖民帝国（16世纪至19世纪）和拿破仑帝国（1804年至1815年）。殖民帝国在其巅峰时期是当时世界第二大帝国，拥有包括北美、加勒比地区和印度在内的广阔领土，但大部分最终丧失。相比之下，拿破仑帝国是以法国为中心的欧洲帝国，由拿破仑·波拿巴建立，曾征服欧洲大陆的大部分地区。"
 GMNEM: "德意志帝国"
 GMNEM_ADJ: "德意志"
 GMNEM_desc: "德意志帝国是一个存在于1871年至1918年间的德意志国家，由普鲁士主导的德意志诸邦统一而成。这是一个由普鲁士主导的联邦制君主国，普鲁士提供了世袭的皇帝，并占据了帝国人口和领土的绝大部分。帝国设有两院制议会（帝国议会和联邦议会），但实权集中于皇帝及其宰相奥托·冯·俾斯麦手中，尤其是在他的领导下。\n\n新宪法于4月16日生效，将联邦国名更改为德意志帝国，并为普鲁士国王威廉一世（来自霍亨索伦家族）引入德意志皇帝的头衔。柏林仍是其首都，普鲁士总理奥托·冯·俾斯麦成为政府首脑——帝国宰相。1850年后，德意志各邦国迅速实现了工业化。"
 GMNRE: "德意志国"
 GMNRE_ADJ: "德意志"
 GMNRE_desc: "“德意志国”是1871至1945年间德国民族国家的官方名称，涵盖三种不同政治体制：德意志帝国（1871‑1918）、魏玛共和国（1919‑1933）和纳粹德国（1933‑1945）。“德意志国”这一称谓最常与第三帝国（即纳粹德国）相关联。"
 GTRGM: "大德意志国"
 GTRGM_ADJ: "德意志"
 GTRGM_desc: "大德意志国是由阿道夫·希特勒领导的极权国家试图扩张其在欧洲的领土控制，吞并了奥地利和苏台德地区等领土。该国家的意识形态建立在纳粹种族优越论原则之上，旨在确立对东欧的统治地位。"
 HNSLG: "汉萨同盟"
 HNSLG_ADJ: "汉萨"
 HNSLG_desc: "汉萨同盟是中世纪一个强大的商业和防御联盟，由商人行会和城镇组成，在13至17世纪间掌控了波罗的海和北海的贸易。它虽非统一国家，却通过保护成员共同贸易利益、规范商业活动甚至行使政治与军事影响力发挥着类似作用，吕贝克常被视为其非正式首都。随着民族国家的兴起和贸易路线的改变，该联盟最终走向衰落。"
 HESNA: "黑森‑拿骚"
 HESNA_ADJ: "黑森‑拿骚"
 HESNA_desc: "黑森‑拿骚建立于1866年普奥战争之后，由先前独立的黑森‑卡塞尔、拿骚公国、法兰克福自由市、从巴伐利亚王国获得的领土，以及从黑森大公国获得的区域（包括达姆施塔特黑森州原有的黑森-霍姆堡部分领地）合并而成。"
 ITNEM: "意大利帝国"
 ITNEM_ADJ: "意大利帝国"
 ITNEM_desc: "意大利帝国是一个殖民帝国，存在于1882年至1960年间，其疆域包括由意大利王国控制的非洲、地中海地区及中国境内的领土。在其巅峰时期（1936‑1941），帝国版图囊括北非和东非的殖民地（如利比亚、厄立特里亚、索马里和埃塞俄比亚组成的意属东非），以及十二群岛，并在阿尔巴尼亚设有保护国。该帝国的存在与意大利政府的扩张政策密切相关，尤其是贝尼托·墨索里尼领导下的法西斯政权时期。"
 KLMUN: "卡尔马联盟"
 KLMUN_ADJ: "卡尔马联盟"
 KLMUN_desc: "卡尔马联盟（1397至1523）是一个共主邦联，它将丹麦、瑞典（包括现今芬兰大部分地区）和挪威（包括冰岛、格陵兰、法罗群岛、奥克尼和设得兰群岛）这三个主权王国联合在一位君主之下。"
 LTNEM: "拉丁帝国"
 LTNEM_ADJ: "拉丁帝国"
 LTNEM_desc: "拉丁帝国是一个封建十字军国家，由第四次十字军东征的领袖于1204年在拜占庭帝国征服的土地上建立，旨在以天主教统治者取代拜占庭。"
 LMBYV: "伦巴第‑威尼托"
 LMBYV_ADJ: "伦巴第‑威尼托"
 LMBYV_desc: "伦巴第‑威尼托王国是1815至1866年间奥地利帝国的皇室领地，涵盖意大利北部的伦巴第和威尼托地区。该王国在拿破仑的意大利王国覆灭后由维也纳会议建立，由奥地利哈布斯堡王朝君主统治，其首都存续期间从米兰迁至威尼斯。随着奥普战争后威尼斯于1866年被意大利王国吞并，该王国宣告解体。"
 LWSXY: "下萨克森"
 LWSXY_ADJ: "下萨克森"
 LWSXY_desc: "下萨克森是德国西北部的一个联邦州，其地貌丰富多样，北临北海海岸，南接哈尔茨山脉。该州面积位居德国第二，人口数量排名第四，历史上深受汉诺威等地区影响，工农业领域地位显著。"
 MALTA: "马耳他"
 MALTA_ADJ: "马耳他"
 MALTA_desc: "马耳他是一个地小人稠的岛国，位于地中海中部，由马耳他岛、戈佐岛、科米诺岛等岛屿组成的群岛国家。因其战略位置而具有重要历史意义，历经数百年外国统治的塑造，形成了融合阿拉伯、西西里、意大利和法国影响的独特文化。该国地势低洼多岩石，海岸线崎岖，无河流山脉，经济以金融服务、旅游业为主，并秉持前瞻性发展方针。"
 MRCIA: "麦西亚"
 MRCIA_ADJ: "麦西亚"
 MRCIA_desc: "麦西亚是英格兰中部地区一个强大的盎格鲁‑撒克逊王国，在7至9世纪处于支配地位。其名称源自古英语，意为“边疆民”，反映了该王国西接凯尔特部落的地理位置。这个王国以七国时代期间的强盛而闻名，涌现了彭达、奥法等著名统治者，其中奥法修建了标志威尔士边界的奥法堤。"
 NAZIG: "纳粹德国"
 NAZIG_ADJ: "德意志"
 NAZIG_desc: "纳粹德国指1933年至1945年间的德国政权，由阿道夫·希特勒及纳粹党统治，将其转变为极权独裁国家。该政权又被称为第三帝国，此称谓暗示其承袭自神圣罗马帝国与德意志帝国。其主要特征包括极端民族主义、狂热反犹主义、扩张主义外交政策，以及对犹太人和其他少数群体的迫害，这些行径最终引发了第二次世界大战。"
 RUSEM: "俄罗斯帝国"
 RUSEM_ADJ: "俄罗斯"
 RUSEM_desc: "俄罗斯帝国（1721年至1917年）是一个横跨欧亚大陆的辽阔专制国家，其特点包括实行绝对君主制（沙皇统治）、大量农奴处于普遍贫困状态，以及在西伯利亚、中亚乃至阿拉斯加的大规模领土扩张。尽管进行了一定程度的现代化改革，但相比西欧国家，该国在政治、社会和经济方面仍处于落后状态，直至1917年二月革命爆发王朝覆灭。"
 RUFED: "俄罗斯联邦"
 RUFED_ADJ: "俄罗斯"
 RUFED_desc: "俄罗斯联邦是世界上领土面积最大的国家，横跨东欧和北亚，涵盖11个时区。该国采用联邦半总统共和制，人口超过1.4亿，首都为莫斯科。俄罗斯拥有丰富的自然资源，包括矿产和能源储备，人口高度城市化，其历史脉络可从留里克王朝延续至现代俄罗斯联邦。"
 SRBEM: "塞尔维亚帝国"
 SRBEM_ADJ: "塞尔维亚"
 SRBEM_desc: "从黑山的山峦到伏伊伏丁那的平原，统一塞尔维亚疆域的梦想长久燃烧在人民心中。重生的“大塞尔维亚”渴望汇聚所有塞尔维亚人于同一旗帜下，重现斯蒂芬·杜尚中世纪帝国曾展现的辉煌。然这样的统一代价沉重，帝国的冠冕伴随着统治多片土地、多种语言与信仰的挑战。无论通过解放或征服铸就，这个塞尔维亚帝国都将准备好塑造巴尔干的命运。"
 SOVET: "苏维埃联盟"
 SOVET_ADJ: "苏联"
 SOVET_desc: "苏维埃社会主义共和国联盟（简称苏联），是1922年至1991年间横跨欧亚大陆的国家，以其辽阔疆域及世界首个社会主义国家而闻名。该国名义上是由十五个苏维埃社会主义共和国组成的联邦制国家，实则实行高度中央集权制度，政府与经济均由莫斯科的共产党核心掌控。苏联以计划经济和一党制政治体系为特征，虽以建立共产主义为奋斗目标，但最终未能实现该目标并走向解体。"
 SDNNW: "瑞典‑挪威"
 SDNNW_ADJ: "北欧"
 SDNNW_desc: "“瑞典‑挪威”一词最准确地指代1814至1905年存在的瑞典与挪威联合王国（共主邦联），同时也指现代意义上的瑞典和挪威这两个不同的独立国家，它们拥有共同的历史文化，但地理特征差异显著。"
 SWDEM: "瑞典帝国"
 SWDEM_ADJ: "瑞典"
 SWDEM_desc: "瑞典帝国是瑞典历史上的一段时期，大致从1611年持续至1721年。在此期间，瑞典作为欧洲主要强国掌控着波罗的海周边领土。该国以其强大军力著称，疆域曾扩展至现代德国、俄罗斯和乌克兰地区，并在北美建立了海外殖民地。随着1721年大北方战争结束，瑞典帝国逐渐衰落。"
 TURKY: "土耳其"
 TURKY_ADJ: "土耳其"
 TURKY_desc: "土耳其是一个横跨西亚和东南欧的跨大陆国家，官方名称为土耳其共和国。它是一个共和制国家，实行混合经济体制，作为世俗国家，人口以穆斯林为主。首都为安卡拉，最大城市是伊斯坦布尔。该国以连接两大洲的独特地理、作为奥斯曼帝国继承者的悠久历史、多元文化以及从山脉到海岸线的多样地貌而闻名。"
 UKKDM: "联合王国"
 UKKDM_ADJ: "不列颠"
 UKKDM_desc: "英国是一个位于欧洲西北部的主权岛国，由英格兰、苏格兰、威尔士和北爱尔兰四个构成国组成。该国实行议会民主制和君主立宪制，总面积约93,630平方英里（242,500平方公里），人口超过6700万，首都为伦敦。"
 WNDEM: "文德帝国"
 WNDEM_ADJ: "文德"
 WNDEM_desc: "“文德人”是对居住在现代德国东北部斯拉夫人的历史称谓。它并非指一个同质民族，而是根据使用时空的不同，指代不同的族群、部落或群体。"
 AMNAE: "亚美尼亚帝国"
 AMNAE_ADJ: "亚美尼亚"
 AMNAE_desc: "亚美尼亚帝国，亦称大亚美尼亚王国，是存在于公元前331年至公元428年的古代大帝国。其最辉煌的时期在提格兰大帝统治下，疆域扩张至涵盖高加索、土耳其、叙利亚和黎巴嫩部分地区，横跨里海至地中海。该帝国以相继统治的王朝（奥龙特、阿尔塔克西、阿尔沙克）为脉络，约公元301年将基督教定为国教，并以其以骑兵著称的强大军事力量而闻名。"
 ARABE: "阿拉伯帝国"
 ARABE_ADJ: "阿拉伯"
 ARABE_desc: "一个历史术语，通常指公元7世纪起源于阿拉伯半岛的庞大伊斯兰哈里发帝国（具体指正统哈里发、倭马亚及阿拔斯王朝）。该帝国鼎盛时期曾是世界历史上疆域最广阔的帝国之一，以其迅速的军事扩张、重大的文化科学进步（即伊斯兰黄金时代）、以及阿拉伯语与伊斯兰教的广泛传播为显著特征。"
 CCASA: "高加索"
 CCASA_ADJ: "高加索"
 CCASA_desc: "高加索位于东欧与西亚之间，是一片被黑海和里海环绕的山脉地带，该地区有着多元的民族与语言、独特的文化以及壮丽的地貌，其中厄尔布鲁士峰是欧洲最高峰。高加索地处战略要冲，历史上曾是帝国交汇的十字路口，这一地位塑造了其丰富而复杂的文化特征与地缘政治格局。"
 CNAEM: "中华帝国"
 CNAEM_ADJ: "中国"
 CNAEM_desc: "短命的“洪宪帝国”（1915‑1916）与绵延千年的“中华帝国”——前者是清王朝崩溃后袁世凯复辟帝制的失败尝试，后者则是对秦汉明清等延续数百年的历代王朝统治的统称。"
 GGURY: "高句丽"
 GGURY_ADJ: "高句丽"
 GGURY_desc: "高句丽是一个强大的军事化王国，存在于公元前37年至公元668年，疆域涵盖中国东北与朝鲜半岛北部。高句丽在五世纪经由广开土大王与长寿王的统治达到鼎盛，成为东亚重要势力。该王国以军事实力著称，曾击退隋朝的大规模入侵，并将疆域扩张至中国东北及朝鲜半岛部分地区，最终为唐朝与新罗的联军所灭。"
 MNCRA: "满洲"
 MNCRA_ADJ: "满洲"
 MNCRA_desc: "满洲是东北亚的一个历史地理区域，通常指现代中国的三个东北省份：辽宁、吉林和黑龙江。历史上，该地区也曾包含俄罗斯远东的部分领土，这片区域于19世纪割让给俄国，即现今的外东北。该地区是满族的祖居地，也是蒙古族、朝鲜族和汉族等多个族群的历史交汇地。"
 KOREA: "朝鲜"
 KOREA_ADJ: "朝鲜"
 KOREA_desc: "朝鲜是东亚的一个半岛区域，地形多山，四季分明，与黄海和日本海接壤。"
 HMLAY: "喜马拉雅帝国"
 HMLAY_ADJ: "喜马拉雅"
 HMLAY_desc: "喜马拉雅帝国是往世书中提及的位于喜马拉雅山脉的山地国家。往世书记载，其统治者名为希马万特，其女帕尔瓦蒂便是来自此王国的公主。"
 AFGAN: "阿富汗"
 AFGAN_ADJ: "阿富汗"
 AFGAN_desc: "阿富汗是一个位于中亚和南亚十字路口的内陆多山国家，拥有多元民族人口，官方语言为普什图语和达利语。其地理以兴都库什山脉和沙漠为主，其间分布着肥沃的山谷与平原。该国悠久的历史因其位于贸易路线上的战略位置而备受关注，吸引了众多入侵者。阿富汗的文化深受伊斯兰价值观的影响，同时也强调个人荣誉、好客和忠诚。"
 ISISS: "伊斯兰国"
 ISISS_ADJ: "伊斯兰国"
 ISISS_desc: "伊斯兰国是奉行极端保守的伊斯兰原教旨主义瓦哈比派所建立的政权，目的是要在中东地区建立政教合一的伊斯兰国家，并实行伊斯兰教法"
 MNGRL: "萨梅格列罗"
 MNGRL_ADJ: "萨梅格列罗"
 MNGRL_desc: "萨梅格列罗位于格鲁吉亚西部，萨梅格列罗地处黑海沿岸，属亚热带气候，降雨比格鲁吉亚其他地区更多。"
 NKORA: "朝鲜"
 NKORA_ADJ: "朝鲜"
 NKORA_desc: "朝鲜，是位于朝鲜半岛南部的东亚国家，国内多以多山地地形为主。"
 SKORA: "韩国"
 SKORA_ADJ: "韩国"
 SKORA_desc: "韩国，是位于朝鲜半岛南部的东亚国家，以其强劲的出口导向型经济、先进的科技产业和充满活力的文化而闻名。该国实行总统制民主共和政体，人口逾5100万，拥有独特的韩文。韩国四季分明，多山地地形，并因流行音乐等文化产品及对教育的重视而享誉全球。"
 OMANE: "阿曼帝国"
 OMANE_ADJ: "阿曼"
 OMANE_desc: "阿曼帝国是17至19世纪统治印度洋贸易路线的主要海上强国，其疆域在鼎盛时期从波斯湾延伸至当今的巴基斯坦，南至莫桑比克。与许多陆地帝国不同，其力量基于一系列港口和强大的海军，而不是庞大的陆军，还包括对海上贸易的控制，但向东非的扩张、多民族人口结构，以及欧洲崛起而最终衰落。"
 PRCCN: "中华人民共和国"
 PRCCN_ADJ: "中国"
 PRCCN_desc: "中国，全称中华人民共和国，是位于东亚的国家。其人口超过14亿，是仅次于印度的世界第二人口大国，占全球总人口的17%。"
 ROCCN: "中华民国"
 ROCCN_ADJ: "中国"
 ROCCN_desc: "中华民国是辛亥革命后建立的国家，辛亥革命推翻了满清王朝，结束了中国的帝制历史。从1927年起，中华民国统一了全国，并最初以南京为首都实行一党统治。"
 FILPN: "菲律宾"
 FILPN_ADJ: "菲律宾"
 FILPN_desc: "菲律宾是东南亚的一个群岛国家，以其独特的地理特征而闻名，拥有超过7000个岛屿，有着多元文化，并受马来西亚、西班牙和美国影响而闻名。它位于西太平洋，首都为马尼拉，政府体系基于美国模式。"
 SAUDI: "沙特阿拉伯"
 SAUDI_ADJ: "沙特"
 SAUDI_desc: "沙特阿拉伯占据阿拉伯半岛大部分地区，拥有伊斯兰教的发源地两大圣城麦加和麦地那。它是中东地区面积最大的国家，境内多为沙漠地貌，同时也是全球重要的石油生产国，经济高度依赖石油产业。"
 SULAW: "苏拉威西"
 SULAW_ADJ: "苏拉威西"
 SULAW_desc: "苏拉威西岛位于印度尼西亚群岛的中心地带，其四个突出的半岛向各个方向延伸，在苏拉威西海、爪哇海和班达海之间勾勒出引人入胜的轮廓。正因为如此，苏拉威西岛上的任何地方距离海洋都不超过100公里。"
 TPING: "太平天国"
 TPING_ADJ: "太平天国"
 TPING_desc: "太平天国是1851至1864年间存在于中国南方和中部的一个神权君主政体，定都南京。该政权由洪秀全领导，旨在通过基于基督教形式的信仰、土地公有制以及废除缠足、赋予妇女平等权利等激进社会改革来推翻清朝。尽管初期成功攻占主要城市，但因内部分裂和清军镇压最终失败，于1864年覆灭。"
 TLBAN: "塔利班"
 TLBAN_ADJ: "塔利班"
 TLBAN_desc: "阿富汗塔利班是一个神权国家，以严格执行强硬派伊斯兰教法而闻名。"
 TNGKU: "天国"
 TNGKU_ADJ: "天国"
 TNGKU_desc: "在内乱的灰烬与异邦信仰的余烬中，新的黎明正从东瀛群岛升起。这片曾因军阀割裂、信仰纷争而支离破碎的土地，如今正在十字旗号下重获新生。天国王朝作为神之恩典的见证，让刀剑与经文在此携手并行。在信仰与圣化的统治指引下，这个国度不仅要统一列岛，更要将天国之光遍照亚洲。"
 HORDE: "可汗庭"
 HORDE_ADJ: "可汗庭"
 HORDE_desc: "这片无垠荒原曾回荡着千百位可汗的铁蹄，他们都自称是远古征服者的后裔，都梦想主宰整个世界。而今，所有喧嚣都已沉寂。从伏尔加河到黄海，从西伯利亚冻原到波斯沙海，唯余一面旌旗猎猎作响：可汗庭。\n\n草原终获一统，各部族被熔铸成铁与火的共同意志。最后那位可汗屹立于世，承继着每个从草原跃马而出的骑手遗产——成吉思汗、帖木儿、拔都，乃至历代枭雄。马背上的部族再无对手……只有等待征服的世界。"
 TBETE: "吐蕃帝国"
 TBETE_ADJ: "吐蕃"
 TBETE_desc: "吐蕃帝国是一个强大统一的帝国，存在于7至9世纪，以青藏高原为中心。其疆域最广时，西起今阿富汗部分地区，东抵孟加拉湾与云南，在松赞干布、赤松德赞和赤祖德赞等赞普统治时期达到鼎盛。9世纪末，因内部冲突与领土分裂，帝国最终瓦解。"
 UNARR: "阿拉伯联合共和国"
 UNARR_ADJ: "阿拉伯"
 UNARR_desc: "阿拉伯联合共和国（UAR）是埃及与叙利亚于1958至1961年结成的短暂政治联盟，由泛阿拉伯民族主义推动。埃及持续使用“阿拉伯联合共和国”这一国名直至1971年。该联盟因叙利亚军事政变而瓦解，但其曾是更宏大的阿拉伯统一愿景的组成部分，该愿景还包含与北也门建立的松散邦联。"
 VTNAM: "越南"
 VTNAM_ADJ: "越南"
 VTNAM_desc: "越南是东南亚形国家，北邻中国，西接老挝和柬埔寨，东濒南海，其地理环境多样，既有山脉也有肥沃的冲积平原。"
 BURMA: "缅甸"
 BURMA_ADJ: "缅甸"
 BURMA_desc: "缅甸是东南亚多元文化国家，与中国、印度、孟加拉国、老挝和泰国接壤。作为东南亚大陆面积最大的国家，其深厚的上座部佛教文化在遍布全国的寺庙佛塔中得以体现。该国地理特征丰富，拥有伊洛瓦底江河谷、崎岖山地和沿海区域，人口由众多民族构成。经济以农业为主，同时蕴藏着丰富的自然资源。"
 CHOLA: "朱罗帝国"
 CHOLA_ADJ: "朱罗"
 CHOLA_desc: "朱罗帝国是印度南部的中世纪海洋帝国（约848‑1279年），以强大海军和东南亚的海外影响力闻名。该帝国以中央集权政府、纪律严明的官僚体系为特征，并在艺术、建筑和文学领域取得显著发展。在罗阇罗阇·朱罗一世等国王统治时期达到鼎盛，通过扩张领土并兴建如坦贾武尔的布里哈迪希瓦拉神庙等不朽建筑而著称。"
 CYLON: "锡兰"
 CYLON_ADJ: "锡兰"
 CYLON_desc: "锡兰是岛国斯里兰卡的旧称，该国于1948年脱离英国统治获得独立，并于1972年成为共和国。它位于印度洋，紧邻印度南部，是一个拥有多元文化、语言和民族的热带岛国。其立法首都是斯里贾亚瓦德纳普拉科特，行政首都是科伦坡。"
 ABYSA: "阿比西尼亚"
 ABYSA_ADJ: "阿比西尼亚"
 ABYSA_desc: "阿比西尼亚是非洲之角一个地区的古代及中世纪名称，对应现今埃塞俄比亚和厄立特里亚的北部高地。该术语亦常作为埃塞俄比亚帝国的同义词使用——这个主权国家存在于约1270年至1974年，以其古老的埃塞俄比亚正统基督教传统和悠久的国家历史而闻名。此称谓多为外国人所用，而当地人民自称为埃塞俄比亚。"
 ACHAD: "乍得"
 ACHAD_ADJ: "乍得"
 ACHAD_desc: "乍得是非洲中北部的一个内陆国家，与利比亚、苏丹、中非共和国、喀麦隆、尼日利亚和尼日尔接壤。其地理特征丰富多样，从北部的撒哈拉沙漠延伸到南部的热带草原，气候因地区和季节差异显著，涵盖干旱至多雨类型。乍得境内生活着200多个民族和语言群体，官方语言为法语和阿拉伯语。"
 MDGSC: "马达加斯加"
 MDGSC_ADJ: "马达加斯加"
 MDGSC_desc: "马达加斯加是非洲东南岸印度洋上的大型岛国，以独特的生物多样性著称。由于与大陆隔绝，岛上进化出众多特有物种，其中相当大比例的物种为地球独有。该国经济以农业为支柱，人口面临高度贫困和结构性挑战。地理特征多样，涵盖热带海岸、气候温和的高原及干旱区域，政治体制采用半总统共和制。"
 RHDSA: "罗得西亚"
 RHDSA_ADJ: "罗得西亚"
 RHDSA_desc: "罗得西亚是1965至1979年间存在于南部非洲的未被普遍承认的国家，前身是英国殖民地南罗得西亚。该国由白人少数政府统治，单方面宣布独立并经历内部冲突，最终成为现代津巴布韦。"
 PLSTN: "巴勒斯坦"
 PLSTN_ADJ: "巴勒斯坦"
 PLSTN_desc: "通常而言，巴勒斯坦指代的地理区域东起地中海，西至约旦河。历史上的巴勒斯坦由现今加沙地带与约旦河西岸的巴勒斯坦领土组成，即巴勒斯坦国。"
 ISREL: "以色列"
 ISREL_ADJ: "以色列"
 ISREL_desc: "以色列被亚伯拉罕信仰定义为具有重要的宗教和文化意义地区，根据犹太神学和历史，以色列被视为应许之地，是上帝为犹太人选定的土地。"
 ALSKA: "阿拉斯加"
 ALSKA_ADJ: "阿拉斯加"
 ALSKA_desc: "阿拉斯加以其壮丽的地貌、广袤的荒野和原住民文化而闻名，其地理特征包括从北极苔原到沿海雨林，拥有丰富的野生动物和自然现象。"
 ARPIT: "阿尔卑坦尼亚"
 ARPIT_ADJ: "阿尔卑坦尼亚"
 ARPIT_desc: "阿尔卑坦尼亚是西阿尔卑斯山脉的一个文化语言区，横跨法国、瑞士及意大利部分地区，以使用阿尔皮坦语（又称法兰克‑普罗旺斯语）为界定标准。该地区历史上以萨伏依公国为中心，但从未形成统一的政治实体。主要阿尔皮坦区域包括法国安省、萨瓦省、上萨瓦省，瑞士罗曼迪地区以及意大利奥斯塔谷。"
 ADREM: "亚得里亚帝国"
 ADREM_ADJ: "亚得里亚帝国"
 ADREM_desc: "亚得里亚帝国诞生于贸易，经受战争的磨砺，统治着这片曾将各地分隔的水域。从威尼斯到拉古萨，从伊斯特拉海岸到达尔马提亚群岛，商人与海军共同编织了这个黄金与盐、商业与征服的国度，，其强盛并非仰仗军事而是源于对海洋的绝对掌控。"
 ALPLN: "阿尔卑兰"
 ALPLN_ADJ: "阿尔卑兰"
 ALPLN_desc: "在巍峨群山与嶙峋峭壁之间，一股新生力量已扎根成长。由阿尔卑斯坚韧的子民——牧人、商贾、战士与城邦共和政体共同锻造的阿尔卑兰，犹如磐石冰雪中屹立的团结堡垒。世人眼中唯有严寒险峻之地，阿尔卑斯人看见的却是力量、自由与机遇。他们的关隘输送着欧洲的财富，他们的峰峦抵御着外敌入侵。\n\n阿尔卑兰既非帝国亦非松散联邦，这是一个属于山巅的国度——坚韧不拔、纪律严明，永恒守望。"
 ANDUH: "英荷联盟"
 ANDUH_ADJ: "英荷"
 ANDUH_desc: "英荷联盟是英国与荷兰之间的一段共主邦联时期，自1692年持续至1712年，由国王威廉三世统治。在此期间，两国由同一位君主统治，形成了强大的海上联盟并共享殖民帝国，伦敦与海牙成为实际意义上的双首都。这一联盟随着威廉三世于1712年逝世而终结，两国随之分离，不过帕拉蒂纳特与荷兰仍保持独立的共主邦联关系直至1744年。"
 AUSEM: "奥地利帝国"
 AUSEM_ADJ: "奥地利"
 AUSEM_desc: "奥地利帝国是一个多民族的欧洲列强，存续于1804至1867年，由哈布斯堡王朝统治，并成为后来奥匈帝国的基础。这个幅员辽阔的国家汇聚了众多民族与语言，但始终受到内部民族主义紧张关系的困扰。1867年，帝国重组为奥匈二元君主国，匈牙利获得更高自治权，但两国仍由同一君主统治。"
 ASTBV: "奥地利‑巴伐利亚"
 ASTBV_ADJ: "奥地利‑巴伐利亚"
 ASTBV_desc: "奥地利与巴伐利亚——曾因骄傲、信仰与野心素有嫌隙，如今却在欧洲腹地融为一体。这个新王国既继承了维也纳的帝国衣钵，又注入了慕尼黑的文化活力，雄踞意大利与德国、东方与西方之间的要冲，掌控四方通衢。"
 BLKLG: "巴尔干联盟"
 BLKLG_ADJ: "巴尔干"
 BLKLG_desc: "巴尔干同盟是由保加利亚、塞尔维亚、希腊和黑山组成的军事联盟，成立于1912年，旨在将奥斯曼帝国驱逐出东南欧并夺取领土。该联盟在第一次巴尔干战争中虽初战告捷，却因瓜分占领地的争议迅速瓦解，最终导致1913年第二次巴尔干战争的爆发。"
 BASQU: "巴斯克地区"
 BASQU_ADJ: "巴斯克"
 BASQU_desc: "巴斯克地区由七个省份组成，从比利牛斯山脉延伸至该国北部的比斯开湾，还包括一小片延伸至法国西南部的区域。"
 BSSER: "波斯尼亚‑塞尔维亚"
 BSSER_ADJ: "波斯尼亚‑塞尔维亚"
 BSSER_desc: "波斯尼亚与塞尔维亚现已统一，成为雄踞巴尔干腹地的斯拉夫堡垒。\n\n这个新王国继承了波斯尼亚的坚韧与塞尔维亚的尚武传统，将东西方文明熔铸为不可撼动的整体。它们共同守护着帝国交错的十字路口，在欧陆风云变幻中开辟自己的命运征程。"
 CATRU: "天主教俄罗斯"
 CATRU_ADJ: "天主教俄罗斯"
 CATRU_desc: "“俄罗斯公教”（或称俄罗斯天主教）指俄罗斯希腊礼天主教会，这是一个小型自治东仪天主教个别教会，与教宗及普世天主教会完全共融。"
 CTUNN: "凯尔特联盟"
 CTUNN_ADJ: "凯尔特"
 CTUNN_desc: "“凯尔特联盟”是一个假想性的政治实体，旨在联合现代凯尔特地区。在这类虚构描述中，通常包括苏格兰、爱尔兰、威尔士、马恩岛、康沃尔和布列塔尼，有时也会纳入加利西亚等自称拥有凯尔特遗产的地区。这些构想差异很大，但普遍侧重于通过经济、文化或政治纽带联合这些区域，尽管在现实层面该构想实施难度复杂，且未得到相关地区多数民众的支持。"
 CAROL: "加洛林帝国"
 CAROL_ADJ: "加洛林"
 CAROL_desc: "加洛林帝国是公元800至888年间统治西欧和中欧的法兰克人主导国家，由教皇加冕的查理曼大帝创立。作为当时西欧最强大的帝国，其疆域从西班牙延伸至今日的德国地区，为后来的神圣罗马帝国及现代法国与德国奠定了基础。"
 CDOBA: "科尔多瓦"
 CDOBA_ADJ: "科尔多瓦"
 CDOBA_desc: "科尔多瓦哈里发国是一个以西班牙科尔多瓦为中心的伊斯兰国家，存续时间为公元929年至1031年。这一时期标志着穆斯林在伊比利亚半岛（称为安达卢斯）统治的巅峰，是文化、科学与建筑蓬勃发展的“”黄金时代”，被视为穆斯林西班牙的鼎盛时期。该哈里发国在其全盛期拥有繁荣先进的城市文明，经济体系完善，其首都科尔多瓦不仅是西欧最大城市，也是当时最重要的都市。"
 DACIA: "达契亚"
 DACIA_ADJ: "达契亚"
 DACIA_desc: "达契亚是位于今罗马尼亚境内的古王国，素以丰富的黄金资源和骁勇善战的武士闻名，曾与罗马帝国兵戎相见。这片土地的主人达契亚人属色雷斯族系，于公元2世纪初期被图拉真皇帝征服，成为罗马行省。罗马统治持续约一百七十年，直至公元271年撤离，为该地区留下了深远的文化与历史遗产。"
 DLMON: "二元君主国"
 DLMON_ADJ: "二元君主国"
 DLMON_desc: "~~架空历史~~\n\n1422年至1453年间存在的英格兰‑法兰西二元君主国，期间幼主亨利六世同时继承两国王位（尽管其宣称存在争议）。该政体根据《特鲁瓦条约》确立，源于亨利五世入侵并在百年战争中掌控法兰西北部。王太子查理控制着法国南部，始终质疑其合法性，随着查理七世率军逐步将英国人驱逐出除加来外的全部领土，二元君主国最终瓦解。"
 ESLAV: "东斯拉维亚"
 ESLAV_ADJ: "东斯拉维亚"
 ESLAV_desc: "一个假设的国家与一个现实中的族群。这个虚构的国家是一个单一制共和国，首都设于基辅，通用语言包括乌克兰语、白俄罗斯语和俄语，人口约5400万。现实中的东斯拉夫人是斯拉夫人的一个亚群，包括白罗斯人、俄罗斯人和乌克兰人，他们使用东斯拉夫语支语言。"
 FNCIB: "法兰西‑伊比利亚帝国"
 FNCIB_ADJ: "法兰西‑伊比利亚"
 FNCIB_desc: "~~架空历史~~\n\n1579年，法兰西与西班牙结盟，建立法兰西‑伊比利亚帝国（即三王冠联盟——西班牙、法兰西与葡萄牙）。殖民活动以三种语言（葡萄牙语、西班牙语与法语）在新总督辖区展开，各殖民地最终于1732年合并为法兰西‑伊比利亚帝国。同年，大不列颠及爱尔兰联合王国在苏格兰女王统治下形成二元君主制政体，改称英格兰、苏格兰与爱尔兰联合王国。1776年墨西哥独立战争与美国独立战争相继爆发，并于1778年结束。"
 FIESL: "弗里斯兰"
 FIESL_ADJ: "弗里斯兰"
 FIESL_desc: "弗里斯兰是荷兰北部的一个省份，以其独特的文化、独立的语言（西弗里斯兰语）以及与航海历史紧密相连的传统而闻名。该地区以平坦低洼的圩田、星罗棋布的湖泊与运河为典型特征，农业尤其是乳制品业尤为发达。"
 GLCEM: "高卢帝国"
 GLCEM_ADJ: "高卢"
 GLCEM_desc: "高卢帝国是罗马帝国分裂出去的政权，存在于公元260年至274年，即三世纪危机期间。由罗马指挥官波斯图穆斯建立，疆域涵盖高卢、不列颠与西班牙地区。该帝国拥有独立的政府和铸币厂。"
 HNGEM: "匈牙利帝国"
 HNGEM_ADJ: "匈牙利"
 IBNEM: "伊比利亚联盟"
 IBNEM_ADJ: "伊比利亚"
 IBNEM_desc: "伊比利亚联盟指的是1580年至1640年这段时期，其间由哈布斯堡王朝统治的西班牙王国，即当时卡斯蒂利亚与阿拉贡王国的共主邦联，通过与葡萄牙王国形成共主邦联，将除安道尔外的整个伊比利亚半岛纳入其统治。"
 ITMCH: "意大利商人联盟"
 ITMCH_ADJ: "意大利"
 ITMCH_desc: "海上共和国，亦称商人共和国，是指那些从中世纪开始凭借海洋活动获得政治自治与经济繁荣的意大利海洋霸权港口城市。这一术语首创于19世纪，通常指代四个意大利城市——其纹章自1947年起便出现在意大利海军与意大利商船队的旗帜上。\n\n若能将这些共和国联合为单一实体，我们便可建立史上最强大的贸易帝国之一。"
 JGLNN: "雅盖隆帝国"
 JGLNN_ADJ: "雅盖隆"
 JGLNN_desc: "“雅盖隆帝国”指14至16世纪期间由雅盖隆王朝统治的广阔疆域，涵盖波兰王国、立陶宛大公国，并曾一度包括匈牙利和波西米亚王国。尽管并非由单一君主统治的帝国，但波兰与立陶宛形成的共主邦联逐渐发展为波兰‑立陶宛联邦，因其辽阔疆域与巨大影响力，常被视为帝国，其统治范围包括当今的波兰、立陶宛、白俄罗斯及西乌克兰地区。"
 KYVRU: "基辅罗斯"
 KYVRU_ADJ: "基辅"
 KYVRU_desc: "基辅罗斯是一个存在于东欧的中世纪国家，由统一了东斯拉夫各部落的北欧（瓦兰吉）定居者建立，自9世纪末至13世纪中叶以基辅为统治中心。该国是由众多公国组成的联邦，凭借贸易路线积累财富，其疆域在极盛时期北起波罗的海、南至黑海，西临喀尔巴阡山脉、东抵伏尔加河流域。"
 UMAYA: "伍麦叶哈里发国"
 UMAYA_ADJ: "伍麦叶"
 UMAYA_desc: "伍麦叶王朝（661‑750年）是第一个主要伊斯兰教王朝，将穆斯林社群转变为疆域辽阔、中央集权的阿拉伯‑伊斯兰帝国。该王朝以大马士革为都城，建立起史上最庞大的统一政权之一，其疆域西起伊比利亚半岛（今西班牙与葡萄牙），东至印度与中亚地区。"
 KOGER: "东法兰克"
 KOGER_ADJ: "东法兰克"
 KOGER_desc: "东法兰克王国，也被称为“德意志王国”，是《凡尔登条约》缔结后建立的加洛林帝国东部疆域。该王国主要使用德语，由加洛林王朝统治至911年，此后成为选举君主制国家，并最终发展成为神圣罗马帝国。"
 KOGOD: "天主的国"
 KOGOD_ADJ: "天国"
 KOGOD_desc: "天主的国主要被描述为上帝动态的统治、掌管和权能，而非当前时代一个物质性的地理国族政权。它既是信徒所经历的现存属灵实境，也是基督第二次降临时将在地上完全建立的未来物质实境。"
 LNGBD: "郎哥巴底"
 LNGBD_ADJ: "郎哥巴底"
 LNGBD_desc: "伦巴第人（拉丁语：郎哥巴底人）是日耳曼民族的一支，于568年至774年间征服了意大利半岛的大部分地区。"
 LUSIT: "卢西塔尼亚帝国"
 LUSIT_ADJ: "卢西塔尼亚"
 LUSIT_desc: "卢西塔尼亚人是一支居住在伊比利亚半岛最西部的印欧语系民族，位于现今的葡萄牙中部以及西班牙的埃斯特雷马杜拉和卡斯蒂利亚‑莱昂地区。目前尚无定论卢西塔尼亚人究竟属于凯尔特人，还是与卢松人相关的凯尔特化伊比利亚人。"
 MACED: "马其顿"
