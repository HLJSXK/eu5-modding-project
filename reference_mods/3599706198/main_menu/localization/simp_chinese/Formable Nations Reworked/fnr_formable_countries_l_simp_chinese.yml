 MCDEM: "马其顿帝国"
 MCDEM_ADJ: "马其顿"
 MCDEM_desc: "该地区的边界曾多次变动。古代马其顿王国以亚历山大大帝等叱咤风云的人物而闻名于世，曾是这片区域的霸主，后在罗马帝国衰落后分崩离析。"
 NOSEM: "北海帝国"
 NOSEM_ADJ: "盎斯"
 NOSEM_desc: "北海帝国是1013年至1042年间英格兰、丹麦与挪威共同隶属于北欧国王统治的历史性个人联合政权，由“八字胡”斯温、克努特大帝等维京君主统治。这个以海洋为纽带维系的海上霸权，是维京时代晚期的产物。该帝国实为个人联合体而非统一国家，各领地始终保持着自身的自治权与法律体系。"
 OCCIT: "奥克西塔尼亚"
 OCCIT_ADJ: "奥克"
 OCCIT_desc: "欧洲西南部的历史与文化区域，由历史上奥克语的使用范围界定。其疆域涵盖法国南部大部、西班牙（阿兰谷）、摩纳哥及意大利（奥克西塔尼亚山谷）的部分地区。如今，法国的一个行政大区以其命名，但该行政区并未完全覆盖传统的奥克西塔尼亚地区。"
 PONTU: "本都"
 PONTU_ADJ: "本都"
 PONTU_desc: "本都是一个希腊化王国，位于今土耳其境内的本都历史区域，由波斯裔的米特里达梯王朝统治，该家族可能与阿契美尼德王朝的大流士大帝有直接血缘关系。该王国由米特里达梯一世于公元前281年建立，直至公元前63年被罗马共和国征服。本都王国在米特里达梯六世大帝统治下达到鼎盛，吞并了科尔基斯、卡帕多西亚、比提尼亚、陶里克的克森尼索的希腊殖民地，并曾短期占领罗马的亚细亚行省。经过与罗马漫长的米特里达梯战争，本都最终战败。"
 LMBDY: "伦巴第"
 LMBDY_ADJ: "伦巴第"
 LMBDY_desc: "伦巴第是意大利北部领先的工业和文化区域，其人口与经济规模堪比小型国家。作为意大利人口最稠密的地区，它拥有多样化的地貌，包括阿尔卑斯山脉及科莫湖、加尔达湖等湖泊。"
 RUS: "俄罗斯沙皇国"
 RUS_ADJ: "俄罗斯"
 NED_UP: "联合省"
 NED_UP_ADJ: "联合省"
 NED_DR: "尼德兰共和国"
 NED_DR_ADJ: "尼德兰"
 ASYRI: "亚述"
 ASYRI_ADJ: "亚述"
 ASYRI_desc: "亚述是美索不达米亚地区的重要王国，也是古代中东最早的大帝国之一，位于今伊拉克北部和土耳其东南部。这一名称同时指代亚述人的故土（位于上美索不达米亚境内的区域），现今分属伊拉克、土耳其、伊朗和叙利亚。该帝国以其强大的军事实力和辽阔疆域著称，在公元前900至600年间其领土从波斯湾一直延伸至地中海，其名称来源于最早的首都亚述城。"
 RSHDN: "正统哈里发国"
 RSHDN_ADJ: "哈里发国"
 RSHDN_desc: "“正统哈里发国”是存在于公元632年至661年的早期伊斯兰帝国，由最初的四位哈里发——阿布·伯克尔、欧麦尔、奥斯曼和阿里领导。这一时期通过迅速的军事胜利，实现了横跨中东、北非和阿拉伯半岛的快速领土扩张。该哈里发国还建立了影响后世伊斯兰国家发展的关键行政、法律和军事体制。"
 FTMID: "法蒂玛哈里发国"
 FTMID_ADJ: "法蒂玛"
 FTMID_desc: "法蒂玛哈里发国是一个中世纪伊斯兰王朝，于公元909至1171年间统治北非和中东部分地区，后迁都至埃及开罗。作为伊斯玛仪派什叶穆斯林，他们自称源自先知穆罕默德之女法蒂玛的血脉，并与逊尼派阿拔斯王朝争夺伊斯兰世界的领导权。该王朝以开罗先进的城市规划、宗教宽容政策以及对学术与贸易的贡献而闻名。"
 ABSID: "阿拔斯哈里发国"
 ABSID_ADJ: "阿拔斯"
 ABSID_desc: "阿拔斯哈里发国是一个强大的伊斯兰王朝，于公元750年至1258年间统治伊斯兰世界，继倭马亚王朝之后兴起。该王朝以开创伊斯兰黄金时代而闻名，此期间文化、科学与知识领域取得重大进展，并定都巴格达。尽管后期势力衰微、帝国疆土分裂，该哈里发国仍保持其宗教权威，直至1258年遭蒙古入侵而灭亡。"