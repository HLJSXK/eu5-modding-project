 RHLND: "莱茵兰"
 RHLND_f: "莱茵兰"
 RHLND_ADJ: "莱茵"
 RHLND_f_desc: "莱茵河曾滋养了无数主君，却从未向任何一人独效忠诚。数个世纪以来，采邑主教区、帝国自由市与蕞尔小邦将这条欧洲最伟大的贸易动脉切割得支离破碎。凭借征服，我们将莱茵兰统一于同一个权杖之下。昔日被数百家势力瓜分的关税、贸易与战略要地，如今皆为我一国所用。法兰西无法再无视我们，德意志诸侯必须与我们谈判，而低地国家则需仰仗我们的合作。掌控莱茵，即掌控财富。"
 RHLND_ducal: "联合公国"
 RHLND_ducal_ADJ: "联合公国"
 RHLND_comital: "联合伯国"
 RHLND_comital_ADJ: "联合伯国"
 RHLND_republic: "联合共和国"
 RHLND_republic_ADJ: "联合共和国"
 BALCH_f: "俾路支斯坦"
 BALCH_f_desc: "俾路支斯坦不仅是一个地理概念，更代表着一个历来拥有独特认同的族群。这里存在着一股声势浩大的独立运动，旨在从巴基斯坦争取高度自治乃至完全独立。尽管这片土地蕴藏着丰富的自然资源，但在现代巴基斯坦的版图中，它却是面积最为辽阔、经济却最为凋敝的省份。"
 POLBA_f: "波拉比亚"
 POLBA_f_desc: "波拉布人（德语：Polaben；拉丁语：Polabi）是奥博特里特联盟旗下的一支莱赫部落，其生活疆域位于特拉沃河与易北河之间。波拉布人的核心聚落为拉齐斯堡（即现代的拉策堡），该城得名于他们的领袖拉蒂博尔亲王。"
 GSORB_f: "大索比亚"
 GSORB_f_desc: "索比亚人长期生活在周边列强的阴影之下，却以坚韧不拔的意志顽强生存，在数个世纪的异族统治中守护着自己的语言与信仰。索比亚诸地的统一，标志着一个曾被认为已湮没于历史长河的国度得以重生。它如同一座明灯，昭示着斯拉夫民族的坚忍与认同。一个大索比亚正以此崛起，誓要重光伟大的先祖基业，并捍卫其疆土。"
 BDALS: "巴登‑阿尔萨斯"
 BDALS_f: "巴登‑阿尔萨斯"
 BDALS_ADJ: "巴登‑阿尔萨斯"
 BDALS_f_desc: "莱茵河分隔了共享语言、文化与商贸的土地。通过征服，我们将巴登与阿尔萨斯统一于同一旗帜之下，修正了分离同源民族的政治边界。我们的领地掌控着法兰西与日耳曼之间的关键十字路口，既从莱茵贸易中获利，又捍卫着我们的独立。绝不让巴黎或维也纳掌控我们的命运。"
 ZPDSL: "西斯拉夫"
 ZPDSL_f: "西斯拉夫"
 ZPDSL_ADJ: "西斯拉夫"
 ZPDSL_f_desc: "波兰人、捷克人、斯洛伐克人和索布族人共享着语言、文化及数个世纪抵抗日耳曼与俄罗斯扩张的斗争历程。通过征服，我们将西斯拉夫各民族统一，我们在中欧的战略位置使我们成为连接东西方的桥梁，强大到足以抵御外族统治。我们的祖先曾兵戎相见，而我们如今团结一致，西斯拉夫人已经觉醒。"
 KSORB_f: "索布王国"
 KSORB_ALT: "索布利亚"
 KSORB_ALT_f: "索布利亚"
 KSORB_f_desc: "索布王国是一个更加中央集权化的统一索布人领地，它与邻国敌对势力对抗，并面临语言和宗教多元化的区域挑战。"
 KOFHN_f: "汉诺威王国"
 KOFHN_f_desc: "汉诺威王国是存在于1814年至1866年间的一个德意志邦国，于维也纳会议后建立。该国由汉诺威王朝统治，并与联合王国维持着共主邦联关系，直至1837年。彼时，由于两国宪制（继承法）的差异，英国君主不再兼任汉诺威国王。作为德意志邦联的成员国，汉诺威在1866年的普奥战争中丧失了独立地位，并最终被普鲁士吞并。"
 POLNE_f: "波利尼西亚"
 POLNE_f_desc: "波利尼西亚是大洋洲的一个次区域，由散布在中太平洋与南太平洋上的1000多座岛屿组成。 这些岛屿构成了一个巨大的三角形，其三个顶点分别位于夏威夷群岛、新西兰和复活节岛。该地区的原住民波利尼西亚人，拥有共同的语言与文化特征；区域内的独立国家包括新西兰、萨摩亚和图瓦卢。"
 HAWAI_f: "夏威夷"
 HAWAI_f_desc: "夏威夷既指历史上的夏威夷王国（1795–1893年），一个曾被美国吞并的主权国家；也指现代的“夏威夷国”，一个致力于恢复夏威夷主权的独立运动组织。在被推翻与吞并之前，夏威夷王国曾是一个拥有高度发达文化与严密社会体系的统一自治国家。"
 YGOSL_f: "南斯拉夫"
 YGOSL_f_desc: "南斯拉夫（意为“南斯拉夫人的土地”）是曾存在于1918年至1992年间、位于中欧与东南欧的一个联邦国家。它最初被称为“塞尔维亚人、克罗地亚人和斯洛文尼亚人王国”，是一个多民族、多宗教的联邦；二战后，它转型为“南斯拉夫社会主义联邦共和国”。 这个国家由六个共和国、两个自治省及众多族群构成，其复杂的身份认同最终导致它在20世纪90年代初，随着民族主义的抬头而走向解体。"
 JAPAN_f: "日本"
 JAPAN_f_desc: "日本，这座东亚岛国，完美融合了古老的传统与先进的科技。其国土由北海道、本州、四国、九州四大主岛及数千座小岛组成，实行以天皇与首相为核心的议会君主立宪制。尽管境内山峦叠嶂，但人口却高度集中于沿海平原，而首都东京则是这座群岛国家最大的都市。"
 AGEVN_f: "安茹帝国"
 AGEVN_f_desc: "安茹帝国是指1154年至1216年间，由金雀花王朝统治的一系列领土集合。其版图囊括了英格兰以及法兰西大部（包括诺曼底、安茹和阿基坦）。 这一由亨利二世及其继任者理查一世与约翰所建立的政权，实质上是一个虽强盛一时，内部联系却相对松散的“复合君主国”。"
 BLTST_f: "波罗的诸国"
 BLTST_f_desc: "波罗的诸国——爱沙尼亚、拉脱维亚和立陶宛，是位于东北欧、波罗的海东岸的国家。 这里的地势平坦，森林、湖泊与河流星罗棋布。在历史上，三国曾于一战后获得独立，后遭苏联占领，最终于1991年重获主权。"
 ALSLO_f: "阿尔萨斯‑洛林"
 ALSLO_f_desc: "阿尔萨斯-洛林并非一个现代国家，而是位于法国东北部的一个历史地区。它因在法德两国间反复易手的复杂历史，以及独特的文化交融而闻名遐迩。1871年普法战争结束后，该地区由法国割让给德国； 直至1919年第一次世界大战结束后，才回归法国版图。如今，尽管它已作为大东部大区的一部分被重新并入法国，但受法德双重历史渊源的影响，该地仍保留着特殊的法律地位与鲜明的文化认同。"
 AQUIT_f: "阿基坦王国"
 AQUIT_f_desc: "阿基坦是位于法兰西西南部的一片历史区域，亦曾作为旧时的行政大区存在。 若能通过长袖善舞的外交手段，辅以行之有效的军事行动，我们便能将阿基坦王国建立为一个独立自主的国度，从而与法兰西的统一大业分庭抗礼。"
 RCONF_f: "莱茵邦联"
 RCONF_f_desc: "莱茵邦联是1806年至1813年间，拿破仑·波拿巴在奥斯特里茨大捷后建立的一个附庸于法兰西第一帝国的德意志邦联。它囊括了除奥地利与普鲁士之外的绝大多数德意志邦国，旨在作为法兰西东部边境的战略缓冲区，并最终随着拿破仑在第六次反法同盟战争中的战败而分崩离析。 尽管名义上为邦联，但它并非一个统一的民族国家，而是一个置于拿破仑“保护人”头衔之下的松散联盟。这一架构使法国得以主宰中欧，并能随意征调邦联的资源以供其战争之需。"
 BLRUS_f: "白俄罗斯"
 BLRUS_f_desc: "白俄罗斯是位于东欧的一个内陆国家，地势平坦，森林茂密，与俄罗斯、乌克兰、波兰、立陶宛和拉脱维亚接壤。首都为明斯克，人口约910万。历史上曾是苏联的一部分，如今则是一个实行强力国家统制经济的威权国家，且公民自由受到严格限制。"
 BLGUM_f: "比利时"
 BLGUM_f_desc: "比利时是位于西欧的一个联邦制议会君主立宪国，与法国、德国、卢森堡和荷兰接壤。 该国因其基于语言区域（佛兰德、瓦隆和布鲁塞尔首都大区）的复杂联邦体制而闻名，拥有荷兰语、法语和德语三种官方语言，首都为布鲁塞尔。"
 PAP_HRE_EMPIRE_1: "基督教帝国"
 PAP_HRE_EMPIRE_1_f: "基督教帝国"
 PAP_HRE_EMPIRE_1_ADJ: "教宗国"
 PAP_HRE_EMPIRE_2: "神圣帝国"
 PAP_HRE_EMPIRE_2_f: "神圣帝国"
 PAP_HRE_EMPIRE_2_ADJ: "教宗国"
 PAP_HRE_EMPIRE_3: "至圣帝国"
 PAP_HRE_EMPIRE_3_f: "至圣帝国"
 PAP_HRE_EMPIRE_3_ADJ: "教宗国"
 PAP_HRE_EMPIRE_4: "君临欧罗巴"
 PAP_HRE_EMPIRE_4_f: "君临欧罗巴"
 PAP_HRE_EMPIRE_4_ADJ: "教宗国"
 PAP_HRE_EMPIRE_5: "基督教世界帝国"
 PAP_HRE_EMPIRE_5_f: "基督教世界帝国"
 PAP_HRE_EMPIRE_5_ADJ: "教宗国"
 PAP_HRE_EMPIRE_6: "圣彼得统辖区"
 PAP_HRE_EMPIRE_6_f: "圣彼得统辖区"
 PAP_HRE_EMPIRE_6_ADJ: "教宗国"
 NED_UP_f: "联合省"
 NED_DR_f: "尼德兰共和国"
 BNLUX_f: "比荷卢"
 BNLUX_f_desc: "比荷卢是指由比利时、荷兰与卢森堡这三个毗邻的西欧国家所组成的政治经济联盟。该名称是由三国英文国名的前两个字母组合而成的混成词。 该联盟始于1948年建立的关税同盟，旨在推动包括人员、货物、资本与服务自由流动在内的广泛领域合作。"
 BMNVD_f: "不来梅‑凡尔登"
 BMNVD_f_desc: "不来梅-费尔登，全称为不来梅与费尔登公国。作为神圣罗马帝国的两块领地与帝国直辖封地，它们于1180年正式建制，并由此获得了帝国直辖权。"
 BLGEM_f: "保加利亚帝国"
 BLGEM_f_desc: "保加利亚曾是东南欧的一大强权，常与拜占庭帝国争锋相对。保加利亚第一帝国（公元681–1018年）始于保加尔人南渡多瑙河定居。在鲍里斯一世与西蒙大帝等统治者的治下，该国在文化与政治层面迅速崛起，成为一方霸主。 保加利亚第二帝国则在摆脱拜占庭的统治后重新崛起，其国祚始于1185年，终于1396年。"
 BISHE_f: "大英帝国"
 BISHE_f_desc: "大英帝国是一个幅员辽阔的全球性帝国，其历史始于16世纪。至19世纪和20世纪初，帝国达到极盛，成为人类历史上版图最大的国家——其治下人口逾4亿，领土覆盖了全球陆地面积的24%。 这个由英国统治的庞大体系囊括了自治领、殖民地、保护国及其他属地，而经济利益、民族主义与探索精神正是推动其不断扩张的原动力。"
 CSPNA_f: "奇萨尔皮纳"
 CSPNA_f_desc: "奇萨尔皮纳共和国是法国在北意大利建立的一个姊妹共和国或附庸国。该政权初建于1797年至1799年间，后经重建，一直存续至1802年。"
 ENGCM_f: "英格兰联邦"
 ENGCM_f_desc: "英格兰联邦是指1649年至1660年间，即英国内战结束后，英格兰建立的一个没有君主的共和时期。 在这一政治实体中，国家由护国公与议会共同治理，而奥利弗·克伦威尔则作为国家元首执掌大权。"
 CZSLO_f: "捷克斯洛伐克"
 CZSLO_f_desc: "捷克斯洛伐克由波希米亚、摩拉维亚与斯洛伐克这三大历史地域构成。正是这种结合，使其得以在欧洲这片充满敌意与纷争的土地上，建立起一个民主且繁荣的国度。"
 DCLPR_f: "普鲁士公国"
 DCLPR_f_desc: "普鲁士公国是位于普鲁士地区的一个公国，其建立源于僧侣普鲁士（即教会统治下的普鲁士）的世俗化。在1525年宗教改革浪潮席卷之前，这片领土一直处于条顿骑士团国的控制之下。"
 BNDPR: "勃兰登堡-普鲁士"
 BNDPR_f: "勃兰登堡-普鲁士"
 BNDPR_ADJ: "勃兰登堡-普鲁士"
 BNDPR_f_desc: "勃兰登堡-普鲁士是由勃兰登堡选侯国与普鲁士公国组成的共主邦联，处于霍亨索伦家族的统治之下。它是日后普鲁士王国乃至德意志帝国的雏形。在此期间，国家经历了毁灭性的三十年战争，也见证了“大选帝侯”腓特烈·威廉的崛起，他建立起一支精锐军队并扩张疆土（如波美拉尼亚）。最终，在1701年腓特烈一世的治下，该国正式升格为王国，确立了其在中欧的强权地位。"
 UKRNE_f: "乌克兰"
 UKRNE_f_desc: "乌克兰是一个幅员辽阔、历史悠久的东欧国家，以其坚韧不拔的民族性格和肥沃的土地（常被誉为“欧洲粮仓”）而闻名。\n\n乌克兰位于欧洲东南部，与包括东部的俄罗斯在内的多个国家接壤，南临黑海。其地形主要由平原（大草原）构成，西部则横亘着喀尔巴阡山脉。乌克兰拥有丰富的自然资源，特别是广袤肥沃的“黑土”（黑钙土）以及包括铁、煤、锰在内的重要矿藏。\n\n只要辅以适当的征服，我们便能在基辅的领导下，建立起一个实质上的现代民族国家。"
 DNTPR_f: "顿涅茨克人民共和国"
 DNTPR_f_desc: "顿涅茨克人民共和国（DPR）是位于乌克兰东部顿巴斯地区的一个自行宣布建立的政权，现已被俄罗斯吞并，于2014年政治动荡之际成立。作为俄罗斯联邦的一个共和国，其首府设于顿涅茨克，其领土于2022年9月被非法吞并。在被吞并之前，它曾作为一个仅获有限国际承认的分离主义政权存在。其意识形态深受俄罗斯极端民族主义、东正教原教旨主义以及苏维埃时代理想的混合影响。"
 LUHPR_f: "卢甘斯克人民共和国"
 LUHPR_f_desc: "卢甘斯克人民共和国（LPR）是位于乌克兰东部顿巴斯地区的一个分离主义政权，于2014年宣布成立，后于2022年实质上被俄罗斯吞并。这是一片存在主权争议的领土，几乎所有联合国成员国仍视其为乌克兰的一部分。LPR是在“广场革命”爆发后，由受俄罗斯支持的分离主义势力所建立；尽管它得到了俄罗斯的强力援助，但获得的国际承认却寥寥无几。"
 ILYRA_f: "伊利里亚"
 ILYRA_f_desc: "伊利里亚是位于巴尔干半岛西部、濒临亚得里亚海的一个古老地区，众多被统称为“伊利里亚人”的部落曾在此繁衍生息。其版图涵盖了现代阿尔巴尼亚、黑山及克罗地亚的领土，随后扩张演变为罗马的伊利里库姆行省，疆域横跨亚得里亚海至多瑙河。这一名称亦常见于后世的历史语境与文学作品之中。"
 EASRE_f: "东罗马帝国"
 EASRE_f_desc: "东罗马帝国，亦称拜占庭帝国，是罗马帝国在东方诸省的延续，定都君士坦丁堡（今伊斯坦布尔）。其臣民自称“罗马人”；作为东正教、希腊文化与古典学术的重镇，帝国在西罗马覆灭后的千余年间，深刻影响了欧洲及中东在艺术、法律与政制方面的发展。"
 WESRE_f: "西罗马帝国"
 WESRE_f_desc: "西罗马帝国是公元395年正式分裂后，独立于东方分治的罗马帝国西部疆域。其定都曾由梅迪奥拉农迁至拉文纳，辖境涵盖意大利、高卢与伊斯帕尼亚等行省；然而，经济动荡、政治腐败以及哥特人、勃艮第人与苏维汇人等部族的频繁入侵，使其国势日渐衰微。"
 EMLRO_f: "艾米利亚-罗马涅"
 EMLRO_f_desc: "艾米利亚-罗马涅是意大利的一个大区，以其丰富的美食、悠久的历史和雄厚的经济实力而闻名。因盛产帕米吉阿诺-雷吉阿诺干酪、帕尔马火腿和香醋等著名农产品，这里常被誉为“美食之谷”，同时也是食品创新领域的领军者。"
 EUROP_f: "欧洲联盟"
 EUROP_f_desc: "欧洲在同一面旗帜下实现了统一。诞生于数个世纪的纷争、战火与脆弱和平之中，欧盟如今作为合作与共同命运的灯塔巍然屹立。不再为疆界与王权所分割，欧洲此刻发出同一个声音，以此掌控着举世无双的经济与军事力量。"
 FNCEM_f: "法兰西帝国"
 FNCEM_f_desc: "法兰西帝国由拿破仑·波拿巴于1804年建立，通过军事征服与政治重组主宰了欧洲大陆。拿破仑的帝国在其全盛时期控制了西欧大部分地区，不仅建立了众多附庸王国，还传播了法国大革命的理念与法律改革。尽管国祚短暂——随着1815年拿破仑的战败而终结——但拿破仑帝国彻底重塑了欧洲政治格局，并为整个大陆带来了影响深远的行政与法律创新。"
 NGCFD: "北德意志邦联"
 NGCFD_f: "北德意志邦联"
 NGCFD_ADJ: "北德意志邦联"
 NGCFD_f_desc: "这是一个由普鲁士主导的联邦制国家，统合了美因河以北除奥地利以外的所有德意志邦国。它建立于普奥战争普鲁士告捷之后，确立了由普鲁士掌控军事与外交的联邦体制，为德意志的最终统一奠定了基石。在奥托·冯·俾斯麦的领导下，这一作为德意志帝国雏形的政权，先于帝国四年而诞生。"
 BDWTB: "巴登-符腾堡"
 BDWTB_f: "巴登-符腾堡"
 BDWTB_ADJ: "巴登-符腾堡"
 BDWTB_f_desc: "这是一个由巴登与符腾堡合并而成的统一德意志西南部邦国，构建了一个强大的施瓦本联盟。这一联合将巴登的工业实力与自由主义传统，同符腾堡的高效行政能力完美融合，在普鲁士的军国主义与巴伐利亚的保守主义之间，开辟了一条“第三条道路”。作为一个区域强权，它正宣示着德意志西南部的自治权与影响力。"
 SSNID: "萨珊"
 SSNID_f: "萨珊"
 SSNID_ADJ: "萨珊"
 SSNID_f_desc: "这是一场力图复兴前伊斯兰时期末代伊朗帝国荣光的民族主义运动。在波斯的领导下，该运动确立祆教为国教，誓要收复从美索不达米亚至中亚的故土，并彻底摒弃数百年来阿拉伯与突厥带来的影响。这个新萨珊国家继承了沙普尔、霍斯劳以及古代“万王之王”们的法统，致力于复兴波斯的语言、文化与帝国行政体制。"
 MGGCA: "大希腊"
 MGGCA_f: "大希腊"
 MGGCA_ADJ: "大希腊"
 MGGCA_f_desc: "这是一场由那不勒斯或意大利南部强权发起的文化复兴运动，旨在光复南意大利的古希腊传统。承袭了曾经繁荣于卡拉布里亚至西西里的希腊殖民地遗产，该政权大力推行希腊化政策，复兴希腊语言，并采用拜占庭式的治理模式，誓要重塑该地区作为“大希腊”这一希腊文明西方瑰宝的身份认同。"
 SGCFD: "南德意志邦联"
 SGCFD_f: "南德意志邦联"
 SGCFD_ADJ: "南德意志邦联"
 SGCFD_f_desc: "这是一个以天主教为主导的南德意志诸邦（巴伐利亚、符腾堡、巴登及黑森南部）邦联，旨在作为对抗北方普鲁士影响力的平衡力量。由奥地利或巴伐利亚领导，它代表了德意志统一的另一条道路——在维护天主教利益的同时，抵制新教普鲁士的霸权。该邦联在捍卫南德意志自治权的同时，维持着与哈布斯堡势力范围的紧密联系。"
 GMNEM_f: "德意志帝国"
 GMNEM_f_desc: "德意志帝国是存在于1871年至1918年间的德意志国家，由普鲁士领导下的德意志诸邦统一而成。这是一个由普鲁士主导的联邦君主制国家，其世袭皇帝人选以及绝大部分的人口与领土皆出自普鲁士。帝国虽设有两院制议会（帝国议会与联邦议会），但实权始终集中在皇帝及其帝国宰相手中，尤其是在奥托·冯·俾斯麦执政期间。\n\n随着新宪法于4月16日正式生效，该联邦国号变更为“德意志帝国”，来自霍亨索伦家族的普鲁士国王威廉一世加冕为“德意志皇帝”。柏林依旧作为首都，而普鲁士首相奥托·冯·俾斯麦则出任帝国宰相，成为政府首脑。自1850年起，德意志各邦已迅速完成了工业化转型。"
 GMNRE_f: "德意志国"
 GMNRE_f_desc: "德意志国是1871年至1945年间德意志民族国家的正式国号，涵盖了三种截然不同的政治体制：德意志帝国（1871-1918）、魏玛共和国（1919-1933）以及纳粹德国（1933-1945）。尽管如此，“德意志国”这一术语最常被联想到的还是“第三帝国”，即纳粹德国，一个阿道夫·希特勒与纳粹党统治下的极权独裁政权。"
 GTRGM_f: "大德意志国"
 GTRGM_f_desc: "大德意志国是纳粹德国自1938年起使用的正式国号，亦被称为“德意志民族的大日耳曼帝国”。这一由阿道夫·希特勒领导的极权国家试图在整个欧洲扩张其领土控制权，并吞并了奥地利与苏台德等地区。该国的意识形态建立在纳粹种族优越论的基础之上，旨在确立其在东欧的统治地位。"
 HNSLG_f: "汉萨同盟"
 HNSLG_f_desc: "汉萨同盟是一个由北欧的商人行会与商业城镇组成的强大中世纪商业与防御同盟。从13世纪至17世纪，该同盟掌控了波罗的海与北海的贸易。"
 HESNA_f: "黑森‑拿骚"
 HESNA_f_desc: "黑森-拿骚是1866年普奥战争的产物，由先前独立的黑森-卡塞尔、拿骚公国、法兰克福自由市，以及从巴伐利亚王国和黑森大公国（含黑森-达姆施塔特下辖的原黑森-洪堡伯国部分地区）获得的领土合并而成。"
 ITNEM_f: "意大利帝国"
 ITNEM_f_desc: "意大利帝国是指1882年至1960年间，由意大利王国统辖的殖民帝国，其疆域横跨非洲、地中海及中国。在其全盛时期（1936–1941），帝国版图囊括了利比亚、厄立特里亚、索马里与埃塞俄比亚（合称“意属东非”）等北非及东非殖民地，以及多德卡尼斯群岛和阿尔巴尼亚保护国。该帝国的兴衰与意大利政府的扩张主义政策，尤其是贝尼托·墨索里尼领导下的法西斯政权紧密相连。"
 KLMUN_f: "卡尔马联盟"
 KLMUN_f_desc: "卡尔马联盟（1397–1523）是一个将丹麦、瑞典（含今芬兰大部）及挪威（含冰岛、格陵兰、法罗群岛、奥克尼群岛与设得兰群岛）这三个主权王国置于同一位君主统治之下的共主邦联。它并非一个单一的统一民族国家，而是一种特殊的政治架构：各国在法理上仍保留独立的法律与枢密院，但在外交政策上保持一致，并共同效忠于同一位统治者。"
 LTNEM_f: "拉丁帝国"
 LTNEM_f_desc: "拉丁帝国是建立于1204年的一个封建十字军国家。第四次十字军东征的领袖们在征服拜占庭帝国的土地上建立了该政权，旨在以一位天主教统治者取代原有的东正教皇权。该帝国定都君士坦丁堡，由鲍德温一世（于1204年加冕）等天主教皇帝统治，但国祚短暂。在内忧外患的侵蚀下，帝国日渐衰微，最终随着1261年拜占庭人收复君士坦丁堡而宣告灭亡。"
 LMBDY_f: "伦巴第"
 LMBDY_f_desc: "伦巴第是意大利北部处于领先地位的工业与文化大区，其人口数量与经济体量堪比一个小型国家。作为意大利人口最稠密的大区，这里地貌丰富多样，不仅坐拥阿尔卑斯山脉，还星罗棋布着科莫湖与加尔达湖等秀丽湖泊。伦巴第也是欧洲主要的经济枢纽，以制造业、金融业以及时尚产业而闻名遐迩。"
 LMBYV_f: "伦巴第-威尼托"
 LMBYV_f_desc: "伦巴第-威尼托王国是1815年至1866年间奥地利帝国辖下的一块皇室领地，其疆域涵盖了意大利北部的伦巴第与威尼托地区。该王国系维也纳会议在拿破仑的意大利王国覆灭后所设立，由奥地利哈布斯堡皇帝实行君主统治，其首府曾由米兰迁往威尼斯。1866年普奥战争结束后，随着威尼斯被并入意大利王国，该王国也随之宣告终结。"
 LWSXY_f: "下萨克森"
 LWSXY_f_desc: "下萨克森是位于德国西北部的一个联邦州，以其北起北海沿岸、南至哈茨山脉的丰富地貌而著称。作为德国面积第二大、人口第四大的州，其历史深受汉诺威地区的影响，并拥有实力雄厚的工农业基础。"
 MALTA_f: "马耳他"
 MALTA_f_desc: "马耳他是一个位于地中海中部、人口稠密的小型岛国，其领土主要由马耳他岛、戈佐岛及科米诺岛组成的群岛构成。凭借其极其重要的战略位置，马耳他在历史上一直备受瞩目。数个世纪的异族统治深刻塑造了这里，使其孕育出一种融合了阿拉伯、西西里、意大利与法兰西风情的独特文化。岛上多为岩石低地，海岸线蜿蜒崎岖，境内既无高山也无河流。尽管如此，马耳他经济强劲，以金融服务业、旅游业以及极具前瞻性的发展策略而著称。"
 MRCIA_f: "麦西亚"
 MRCIA_f_desc: "麦西亚是英格兰中部一个强大的盎格鲁-撒克逊王国，曾于7世纪至9世纪称霸一方。其名称源自古英语，意为“边区之民”，反映了其作为西部凯尔特部落边境的地理位置。该王国在“七国时代”以武力强盛著称，涌现了彭达与奥法等极具影响力的统治者，后者更是修建了著名的“奥法长堤”，以此确立了与威尔士的边界。"
 NAZIG_f: "纳粹德国"
 NAZIG_f_desc: "纳粹德国是指1933年至1945年间，处于阿道夫·希特勒与纳粹党统治之下的德意志国家；在此期间，德国被改造为一个极权独裁政体。该政权亦被称为“第三帝国”，这一称谓暗示了其作为神圣罗马帝国与德意志帝国法统继承者的地位。其核心特征包括极端民族主义、狂热的反犹主义、扩张主义外交政策，以及对犹太人和其他少数群体的残酷迫害，这一切最终引爆了第二次世界大战。"
 RUSEM_f: "俄罗斯帝国"
 RUSEM_f_desc: "俄罗斯帝国（1721–1917）是一个横跨欧亚大陆、幅员辽阔的专制国家。其统治特征包括拥有绝对权力的君主（沙皇）、庞大且普遍贫困的农奴群体，以及向西伯利亚、中亚乃至阿拉斯加进行的规模浩大的领土扩张。尽管经历了一定程度的现代化改革，但与西欧相比，该国在政治、社会及经济层面依然落后，直至1917年爆发二月革命，这一帝国最终走向了覆灭。"
 RUFED_f: "俄罗斯联邦"
 RUFED_f_desc: "俄罗斯联邦是世界上面积最大的国家，其疆域横跨东欧与北亚，涵盖了11个时区。作为一个实行联邦半总统制的共和国，俄罗斯拥有超过1.4亿人口，首都为莫斯科。该国坐拥庞大的自然资源，尤以矿产与能源储备为最；其人口高度城市化，历史脉络更是从古老的留里克王朝一直延伸至现代的俄罗斯联邦。"
 SRBEM_f: "塞尔维亚帝国"
 SRBEM_f_desc: "从黑山的崇山峻岭到伏伊伏丁那的广袤平原，建立一个统一塞尔维亚国度的梦想，长久以来都在其子民心中炽热燃烧。一个复兴的“大塞尔维亚”誓要将所有塞尔维亚人汇聚于同一面旗帜之下，重现中世纪斯特凡·杜尚帝国时期的辉煌荣光。然而，统一的代价亦是不菲：伴随帝国冠冕而来的，是统御广袤疆土、庞杂语言与多元信仰的严峻挑战。无论是由解放还是征服所铸就，这个塞尔维亚帝国都已蓄势待发，准备主宰巴尔干半岛的未来命运。"
 SOVET_f: "苏维埃联盟"
 SOVET_f_desc: "苏联，全称为苏维埃社会主义共和国联盟（USSR），是1922年至1991年间横跨欧亚大陆的超级大国，以其辽阔的疆域和作为世界上第一个社会主义国家的地位而著称。名义上，它是由15个苏维埃社会主义共和国组成的联邦，但在实际运行中，其政府与经济命脉皆由位于莫斯科的共产党实施高度中央集权式的掌控。苏联的典型特征包括计划经济体制与一党专政的政治体系，尽管其终极目标是实现共产主义，但这以尝试最终归于失败，并导致了联盟的解体。"
 SDNNW_f: "瑞典‑挪威"
 SDNNW_f_desc: "“瑞典-挪威”这一术语最准确地指代了1814年至1905年间的瑞典与挪威联合王国，一个由瑞典和挪威组成的共主邦联。此外，该词亦可指代现代的瑞典与挪威：尽管两国拥有共同的历史渊源与文化传统，且地理环境各异，但它们如今已是两个截然不同的主权国家。"
 SWDEM_f: "瑞典帝国"
 SWDEM_f_desc: "瑞典帝国是指瑞典历史上大致处于1611年至1721年间的一段时期；在此期间，瑞典跻身欧洲列强之列，掌控着波罗的海周边的广阔领土。该帝国以其强大的军事力量而闻名，其版图不仅扩张至今日的德国、俄罗斯及乌克兰境内，还囊括了位于北美的海外殖民地。随着1721年大北方战争的结束，帝国的霸权最终走向了衰落。"
 TURKY_f: "土耳其"
 TURKY_f_desc: "土耳其共和国（通称土耳其）是一个横跨西亚与东南欧的跨洲国家。作为拥有混合型经济体制的共和制国家，土耳其虽以穆斯林人口为主，却坚持世俗化的立国原则。其首都为安卡拉，而最大城市则是伊斯坦布尔。凭借其连接欧亚大陆的独特地缘优势、作为奥斯曼帝国继承者的深厚历史底蕴、多元包容的文化，以及从崇山峻岭到绵延海岸的丰富地貌，土耳其在国际舞台上享有盛誉。"
 UKKDM_f: "联合王国"
 UKKDM_f_desc: "联合王国（通称英国）是位于欧洲西北部的一个主权岛国，由英格兰、苏格兰、威尔士及北爱尔兰四个构成国组成。该国实行议会民主制与君主立宪制，国土总面积约为93,630平方英里（242,500平方公里），人口超过6700万，首都为伦敦。"
 WNDEM_f: "文德帝国"
 WNDEM_f_desc: "“文德人”是对曾居住于现今德国东北部的斯拉夫人的历史称谓。这一术语并非指代某个单一的同质民族，而是根据地域与时代的不同，被用来泛指各类不同的族群、部落或团体。"
 AMNAE_f: "亚美尼亚帝国"
 AMNAE_f_desc: "亚美尼亚帝国是存在于公元前331年至公元428年间的庞大古代王国。其最辉煌的时期在提格兰大帝统治下，疆域曾扩张至高加索、土耳其、叙利亚和黎巴嫩部分地区，横跨里海至地中海沿岸。该帝国以连续更迭的王朝、约公元301年皈依基督教，以及强大的军事力量尤其是其骑兵部队而著称。"
 ARABE_f: "阿拉伯帝国"
 ARABE_f_desc: "一个历史术语，通常指公元7世纪兴起于阿拉伯半岛、由阿拉伯王朝（特指正统哈里发、伍麦叶及阿拔斯王朝）统治的庞大伊斯兰哈里发帝国。其鼎盛时期曾是历史上疆域最广阔的陆地帝国之一，以军事扩张迅猛、文化与科学成就显著（伊斯兰黄金时代）以及阿拉伯语和伊斯兰教的广泛传播为特征。"
 CCASA_f: "高加索"
 CCASA_f_desc: "高加索地区位于东欧与西亚之间的山脉地带，濒临黑海与里海，涵盖俄罗斯南部、格鲁吉亚、亚美尼亚和阿塞拜疆部分地区。该地区以多元的民族语言、独特的文化以及壮丽的地形而闻名，其中厄尔布鲁士峰为欧洲最高峰。高加索地处战略要冲，历史上曾是各大帝国的交汇之处，这种地理特质塑造了其丰富而复杂的文化底蕴与地缘政治格局。"
 CNAEM_f: "中华帝国"
 CNAEM_f_desc: "短暂的“洪宪帝制”（1915–1916）与由历代王朝统治、历史悠久的“中华帝国” —— 洪宪帝制是袁世凯在清朝灭亡后试图复辟君主制的失败尝试，而“中华帝国”则是对秦、汉、明、清等跨越数个世纪的历代王朝统治的统称。"
 GGURY_f: "高句丽"
 GGURY_f_desc: "高句丽是公元前37年至公元668年间盘踞于满洲及朝鲜半岛北部的尚武强国。作为“朝鲜三国”之一，高句丽在5世纪的广开土大王与长寿王治下臻于全盛，确立了东亚霸主的地位。该国以武功赫赫闻名，不仅挫败了隋朝的大举入侵，更将疆域扩张至满洲及朝鲜半岛部分地区。高句丽最终为唐朝与新罗联军所灭。"
 MNCRA_f: "满洲"
 MNCRA_f_desc: "满洲是东北亚的一个历史地理区域，通常指代现代中国的东北三省：辽宁、吉林和黑龙江。历史上，其范围曾涵盖俄罗斯远东的部分地区，这片领土于19世纪割让予俄罗斯，现称“外满洲”。该地区不仅是满人的祖居地，也是蒙古人、朝鲜人及汉人等各族群的历史交汇之地。"
 KOREA_f: "朝鲜"
 KOREA_f_desc: "朝鲜是东亚的一个半岛区域，现今沿北纬38度线在政治上分裂为朝鲜与韩国两国。韩国（正式国号大韩民国）是一个民主共和国，经济强盛、地形多山且四季分明，其疆域北接朝鲜，并濒临黄海与日本海。"
 HMLAY_f: "喜马拉雅帝国"
 HMLAY_f_desc: "喜马拉雅帝国是《往世书》中记载的一个位于喜马拉雅山脉的崇山之国。书中称喜马瓦特为其统治者，其女帕尔瓦蒂则是该国的公主。虽然印度史诗《摩诃婆罗多》中未见名为“喜马拉雅”的国度，但确有提及库宁达、帕尔瓦塔、尼帕、基拉塔、金普鲁沙以及紧那罗等诸多位于喜马拉雅山区的王国。"
 AFGAN_f: "阿富汗"
 AFGAN_f_desc: "阿富汗是一个位于中亚与南亚交汇处的内陆山国，拥有多元的民族构成，官方语言为普什图语和达里语。其地貌以兴都库什山脉与沙漠为主，肥沃的河谷与平原散布其间。该国凭借扼守商路的战略位置及随之而来的无数入侵者，书写了其悠久的历史，其文化深受伊斯兰价值观熏陶，并极度推崇个人荣誉、好客之道与忠诚品质。"
 ISISS_f: "伊斯兰国"
 ISISS_f_desc: "ISIS（亦称ISIL）是一个激进的逊尼派穆斯林武装与恐怖组织，于2014年6月单方面宣布建立一个全球性的“哈里发国”（即伊斯兰国家）。这一未获任何国家或国际社会承认的自封政权，企图建立一个奉行其对伊斯兰教法极端解读的跨国极权伊斯兰国家。"
 MNGRL_f: "萨梅格列罗"
 MNGRL_f_desc: "萨梅格列罗人集中居住在黑海沿岸的西部省份萨梅格列罗。在阿布哈兹冲突爆发前，他们曾是当地格鲁吉亚人口中的绝对主体，尤其在阿布哈兹最南端的加利区占据压倒性多数。"
 NKORA_f: "朝鲜"
 NKORA_f_desc: "朝鲜（全称朝鲜民主主义人民共和国）是位于东亚的一个极权国家，占据着朝鲜半岛的北半部。该国实行一党专政与世袭独裁统治，其政权以压迫手段、严重侵犯人权以及极度重视军事和核武器计划为特征。政府严格管控所有媒体与自由，其经济则实行中央计划体制，且面临着严峻的挑战。"
 SKORA_f: "韩国"
 SKORA_f_desc: "韩国（亦称大韩民国）是位于朝鲜半岛南部的东亚国家，凭借其强劲的出口导向型经济、先进的科技产业及充满活力的文化而闻名。该国实行总统制民主共和政体，人口逾5100万，并使用被称为谚文的独特书写系统。韩国四季分明、地形多山，且因其流行音乐、电视剧及对教育的重视而享誉全球。"
 OMANE_f: "阿曼帝国"
 OMANE_f_desc: "阿曼帝国是17至19世纪间主宰印度洋贸易路线的主要海洋强权。其疆域在全盛时期北起波斯湾与现代巴基斯坦，南抵莫桑比克。与诸多陆权帝国不同，阿曼的实力倚仗于庞大的港口网络与强大的海军，而非大规模的陆军。该国的主要特征包括对海上贸易的掌控、向东非的扩张、多元的民族构成，以及最终随着欧洲列强崛起而走向衰落。"
 PRCCN_f: "中华人民共和国"
 PRCCN_f_desc: "中国（全称中华人民共和国）是位于东亚的国家。其人口逾14亿，约占世界总人口的17%，是仅次于印度的世界第二人口大国。"
 ROCCN_f: "中华民国"
 ROCCN_f_desc: "继辛亥革命推翻满清王朝、终结中国帝制历史后，中华民国于1912年1月1日作为主权国家在中国大陆成立。1927年起，中国国民党完成国家统一，定都南京，并实行一党专政。"
 FILPN_f: "菲律宾"
 FILPN_f_desc: "菲律宾是位于东南亚的群岛国家，因其坐拥七千余座岛屿的独特地貌、多元的文化，以及深受马来、西班牙与美国影响的历史而著称。该国地处西太平洋，定都马尼拉，其政府体制沿袭了美国模式。"
 FLPNN: "萨里巴扬"
 FLPNN_f: "萨里巴扬"
 FLPNN_ADJ: "萨里巴扬"
 FLPNN_f_desc: "我们的群岛长期分裂为无数个描笼涯，各自由达图统领，遵循着各自的习俗。然则，我们血脉相连，同扼沧海，休戚与共。虽借由与中国、暹罗及远邦的贸易而日渐繁荣，但分裂使我们至今仍旧脆弱。\n\n如今，我们将这些零散的社群合而为一，共建萨里巴扬这一统一国度。"
 BNDSM: "文莱达鲁萨兰"
 BNDSM_f: "文莱达鲁萨兰"
 BNDSM_ADJ: "文莱达鲁萨兰"
 BNDSM_f_desc: "文莱苏丹国曾统治婆罗洲沿岸，令远方诸岛纳贡称臣。我们的舰队掌控着至关重要的贸易航线，载满樟脑、香料与奇珍异宝，纵横于东南亚海域。\n\n伊斯兰律法与苏丹的权威为国家带来了繁荣与稳定，也为我们赢得了“达鲁萨兰”——即“和平之邦”的尊号。尽管外强入侵与内部纷争削弱了我们的统治，但我们从未遗忘这份遗产。通过收复昔日向文莱俯首的领土，我们将重振苏丹国的辉煌。凭借战略要冲与海军实力，我们将再次成为这片海域的霸主。和平之邦归来，必将重获其应有的敬畏。"
 SAUDI_f: "沙特阿拉伯"
 SAUDI_f_desc: "沙特阿拉伯是位于西亚的君主制国家，占据了阿拉伯半岛的绝大部分。作为伊斯兰教的发源地，其境内坐落着麦加与麦地那这两座至圣之城。它是中东幅员最辽阔的国家，地貌以广袤沙漠为主；同时也是全球主要的石油生产国，经济高度依赖石油产业。现代沙特王国由阿卜杜勒-阿齐兹·阿勒沙特于1932年建立。"
 SULAW_f: "苏拉威西"
 SULAW_f_desc: "苏拉威西岛坐落于印度尼西亚群岛的中心，其向四面八方伸展的四座狭长半岛，在苏拉威西海、爪哇海与班达海之间勾勒出了奇特的轮廓。受此地貌影响，岛上没有任何地点距海岸线超过100公里。"
 TPING_f: "太平天国"
 TPING_f_desc: "太平天国是1851年至1864年间盘踞于中国南部及中部、定都南京的一个神权君主国。在洪秀全的领导下，该政权试图通过一场基于基督教义、土地公有制以及诸如废除缠足、赋予女性平权等激进社会改革的起义来推翻清朝。尽管初期连克重镇，但太平天国最终因内部内讧与清军镇压而失败，并于1864年彻底覆灭。"
 TLBAN_f: "塔利班"
 TLBAN_f_desc: "在塔利班统治下，阿富汗成为了一个被称为“阿富汗伊斯兰酋长国”的事实上的神权国家。该政权以对伊斯兰教法的严苛解读与强制实施、严重侵犯人权（特别是针对妇女与女童）以及缺乏国际承认而著称。"
 TNGKU_f: "天国"
 TNGKU_f_desc: "在内战与异邦信仰的余烬中，一道新的曙光于东方诸岛冉冉升起。昔日因军阀割据而支离破碎、因信仰分歧而四分五裂的日本，如今已在十字架的旗帜下浴火重生。“天国”，这一神圣国度乃是天命眷顾的明证，于此，利剑与经文并肩同行。受信仰与圣治的指引，这一国度不只意在统一群岛，更誓将天主的光辉普照全亚洲。"
 HORDE_f: "可汗庭"
 HORDE_f_desc: "无垠草原曾因千百位汗王的铁蹄雷动而震颤，他们皆自诩古老征服者之苗裔，各怀囊括四海之野望。如今，万籁俱寂。从伏尔加河到黄海，从西伯利亚冻土到波斯黄沙，唯有一面旗帜屹立不倒：大帐。\n\n草原终归一统，诸部已在铁与火中熔铸为同一个意志。这位最终的汗王，承袭了自成吉思汗、帖木儿、拔都以来，每一位曾驰出草原的征服者之遗志。马背诸王中已无敌手……唯余这天下待我征服。"
 TBETE_f: "吐蕃帝国"
 TBETE_f_desc: "吐蕃帝国是7至9世纪间一个以青藏高原为中心的强大统一帝国。其疆域在极盛时期西起今阿富汗部分地区，东至孟加拉湾及云南，并在松赞干布、赤松德赞与赤祖德赞等赞普的统治下臻于全盛。9世纪末，该帝国因内部动乱与领土割据而最终瓦解。"
 UNARR_f: "阿拉伯联合共和国"
 UNARR_f_desc: "阿拉伯联合共和国（UAR）是埃及与叙利亚于1958年至1961年间组成的短暂政治联盟，其成立受泛阿拉伯民族主义推动。埃及继续使用“阿拉伯联合共和国”这一国号直至1971年。该联盟虽因叙利亚发生军事政变而终结，但它曾是阿拉伯统一宏大愿景的一部分，该愿景还包括与北也门组建松散邦联。"
 VTNAM_f: "越南"
 VTNAM_f_desc: "越南位于东南亚，疆域狭长呈S形，北接中国，西邻老挝与柬埔寨，东濒中国南海，拥有漫长的海岸线。作为一个拥有一亿多人口的一党制共产主义国家，其地理环境多样，崇山峻岭与肥沃的河流三角洲并存。尽管经济迅猛增长，但该国仍面临着腐败与人权问题的挑战。"
 BURMA_f: "缅甸"
 BURMA_f_desc: "缅甸（现官方英语名称为Myanmar）是一个多元化的东南亚国家，与中国、印度、孟加拉国、老挝和泰国接壤。它是中南半岛幅员最辽阔的国家，拥有深深植根于上座部佛教的丰富文化，星罗棋布的寺庙与佛塔便是明证。该国地理地貌多样，涵盖伊洛瓦底江流域、崎岖高地及沿海地区，且由众多族群组成。尽管以农耕为主，其自然资源亦十分丰富。"
 CHOLA_f: "朱罗帝国"
 CHOLA_f_desc: "朱罗帝国是南印度的一个中世纪海权帝国（约848年–1279年），以其强大的海军及在东南亚的深远影响力而闻名。该帝国拥有中央集权的政府与训练有素的官僚体系，并在艺术、建筑及文学领域取得了非凡成就。在罗茶罗乍·朱罗一世等君主的统治下，帝国达致极盛；他不仅扩张了疆域，还敕造了位于坦贾武尔的布里哈迪希瓦拉神庙等宏伟建筑。"
 CYLON_f: "锡兰"
 CYLON_f_desc: "锡兰为岛国斯里兰卡的旧称。该国于1948年脱离英国独立，并于1972年改制为共和国。其地处印度洋，毗邻印度南端，是一座拥有多元文化、语言及族群的热带岛屿。其立法首都设于斯里查亚瓦德纳普拉-科特，行政首都则位于科伦坡。"
 ABYSA_f: "阿比西尼亚"
 ABYSA_f_desc: "阿比西尼亚是非洲之角某区域在古代及中世纪的旧称，其范围大致对应现代埃塞俄比亚与厄立特里亚的北部高地。该词亦常被用作埃塞俄比亚帝国的代称——这一主权国家存在于约1270年至1974年间，以其古老的埃塞俄比亚正教会传承及悠久的建国史而闻名。此名称多为外人所用，而当地民众则自称为“埃塞俄比亚”。"
 ACHAD_f: "乍得"
 ACHAD_f_desc: "乍得是位于非洲中北部的内陆国家，与利比亚、苏丹、中非共和国、喀麦隆、尼日利亚及尼日尔接壤。其地理风貌极具多样性，北至撒哈拉沙漠，南达热带稀树草原；气候亦因时因地而异，干湿差别显著。该国境内居住着200多个民族与语言群体，通用法语和阿拉伯语为官方语言。"
 MDGSC_f: "马达加斯加"
 MDGSC_f_desc: "马达加斯加是位于非洲海岸外印度洋上的大型岛国，因其在孤立环境中演化出的独特生物多样性而闻名——其中极高比例的物种为地球上所独有。该国经济以农业为主，民众深受贫困与结构性难题的困扰。其地理面貌丰富多样，涵盖热带海岸、温带高原及干旱地区；现行政治体制为半总统制共和国。"
 RHDSA_f: "罗得西亚"
 RHDSA_f_desc: "罗德西亚是南部非洲一个存在于1965年至1979年间的未受承认国家，系英国殖民地南罗德西亚事实上的继承者。该国由发表了《单方面独立宣言》（UDI）的白人少数政权统治，并深陷内部冲突之中；其领土最终演变为现代的津巴布韦。"
 PLSTN_f: "巴勒斯坦"
 PLSTN_f_desc: "一般来说，巴勒斯坦用以指称从东边的地中海延至西边的约旦河之间的地理区域。历史上的巴勒斯坦由当前的巴勒斯坦领土加沙地带和约旦河西岸——即“巴勒斯坦国”——组成。"
 ISREL_f: "以色列"
 ISREL_f_desc: "以色列地处中东，濒临地中海东岸，幅员虽小，却是一个现代化且高度发达的议会制民主国家。作为世上唯一的犹太国家，它亦是犹太民族的历史与文化故土。"
 SDPDM: "撒丁尼亚"
 SDPDM_f: "撒丁尼亚"
 SDPDM_ADJ: "撒丁尼亚-皮埃蒙特"
 SDPDM_f_desc: "萨丁尼亚-皮埃蒙特是由萨伏伊王朝统治的强盛意大利国家。1720年后，它将萨丁尼亚岛与大陆上的皮埃蒙特领地合二为一。在维托里奥·埃马努埃莱二世的领导下，尽管历经法国的干扰与对奥地利的战争，该国仍成为了意大利统一运动（复兴运动）的关键推手，并最终于1861年奠定了统一的意大利王国之基石。"
 NITAC: "北意大利邦联"
 NITAC_f: "北意大利邦联"
 NITAC_ADJ: "北意大利"
 NITAC_f_desc: "“北意大利邦联”通常指的是假设性或历史替代情景，而不是一个长期存在的历史国家。在实际历史中，在1861年意大利统一之前，北意大利是由各种独立国家、城邦和外国控制的领土（尤其是奥地利）组成的。"
 SITAC: "南意大利邦联"
 SITAC_f: "南意大利邦联"
 SITAC_ADJ: "南意大利"
 SITAC_f_desc: "“南意大利邦联”通常指的是假设性过度，而不是一个长期存在的历史国家。实际上，在1861年意大利统一之前，南意大利是由各种独立的国家、城市国家和外国控制的领土（尤其是奥地利）组成的。"
 MEXCO: "墨西哥第一帝国"
 MEXCO_f: "墨西哥第一帝国"
 MEXCO_ADJ: "墨西哥"
 MEXCO_f_desc: "从北方的荒漠到南方的丛林，从两大洋的海岸到内陆的高原，这片土地见证了伟大文明的兴衰更迭。墨西卡、玛雅以及无数民族的遗产深深根植于此。\n\n通过团结这片广阔区域内的多元民族与领土，我们铸就了墨西哥——一个银矿富饶、物产丰沛、文化遗产无与伦比的国度。古老的城邦与殖民聚落在此并存，大地的财富在我们手中流淌。让列强知晓墨西哥必将主宰自身命运，成为值得敬畏的独立主权领地。"
 OKLAH: "俄克拉荷马"
 OKLAH_f: "俄克拉荷马"
 OKLAH_ADJ: "俄克拉荷马"
 OKLAH_f_desc: "红河与阿肯色河之间的土地横跨草原、林地和丘陵——这里是卡多、威奇托、奥萨格以及众多其他民族的故土。这片领土位于各方势力角逐的十字路口，却拥有肥沃的土壤、丰富的猎物和战略性的河谷地带。\n\n通过联合该区域的定居点与部落，我们将建立一个掌控大平原与森林东部之间重要贸易路线的国家。俄克拉荷马其名源自乔克托语，意为“红色之人”，将作为一个主权国家屹立于此，从其居民的多样性与土地的丰饶中汲取力量。"
 FLRDA: "佛罗里达"
 FLRDA_f: "佛罗里达"
 FLRDA_ADJ: "佛罗里达"
 FLRDA_f_desc: "佛罗里达，其名源于西班牙探险家对其茂密植被的赞叹，数百年来一直是欧洲列强争夺的焦点。这片战略要地以半岛之姿扼守加勒比海与墨西哥湾的通道，对海上霸权与贸易至关重要。亚热带气候孕育了北方领土无法企及的特色农业，绵长的海岸线则提供了无数天然良港。尽管地广人稀且常受飓风侵袭，佛罗里达的地理战略价值与经济潜力，始终使其成为值得夺取的宝地。"
 MRYLN: "马里兰"
 MRYLN_f: "马里兰"
 MRYLN_ADJ: "马里兰"
 MRYLN_f_desc: "马里兰以王后法兰西的亨利埃塔·玛丽亚命名，最初是为新教美洲的天主教徒建立的避难所，后来发展成为由烟草种植园主、商人和船工组成的多元殖民地。切萨皮克湾塑造了马里兰的地理与经济格局，提供了丰富的渔业资源和天然避风港。巴尔的摩的深水良港使其成为天然贸易中心，而烟草丰产的乡野则为种植园主创造了财富。马里兰横跨南北，却从未完全属于任何一方，在两种极端之间始终保持着独特的自我认同。"
 PNSLV: "宾夕法尼亚"
 PNSLV_f: "宾夕法尼亚"
 PNSLV_ADJ: "宾夕法尼亚"
 PNSLV_f_desc: "宾夕法尼亚州，作为威廉·佩恩推行宗教宽容的“圣洁试验”，吸引了贵格会教徒、德意志移民以及来自各地的拓荒者涌入其肥沃的河谷地带。费城则逐渐崛起为北美殖民地的知识与政治中心，曾在此召开大陆会议，并一度成为临时首都。宾夕法尼亚州拥有丰饶的农田、丰富的煤炭和铁矿资源，使其成为经济重镇；而其倡导的宗教自由政策，更孕育出独具多元特色的社会风貌。该州既保留着贵格会的和平主义传统，又兼具边疆地区的坚韧气质；既有国际化大都市费城的繁华与开放，也有乡村腹地的质朴与淳厚。"
 NWJSY: "新泽西"
 NWJSY_f: "新泽西"
 NWJSY_ADJ: "新泽西"
 NWJSY_f_desc: "新泽西州虽小，却战略地位关键，坐落于纽约与费城两大都市之间，成为美国商业与冲突的十字路口。独立战争期间，这里发生的战役比任何其他殖民地都多，因而赢得了“革命十字路口”的称号。尽管面积不大，但地处两大主要港口之间且自身濒临大西洋的地理优势，使新泽西成为制造业与运输业枢纽。稠密的人口和发达的经济，令其紧凑的地理格局显得尤为不凡。"
 LOSNA: "路易斯安那"
 LOSNA_f: "路易斯安那"
 LOSNA_ADJ: "路易斯安那"
 LOSNA_f_desc: "路易斯安那曾在法国与西班牙之间几经易手，最终被拿破仑售予美国，使这个新生国家的疆域一夜之间扩大了一倍。密西西比河河口使新奥尔良成为掌控内陆贸易的关键港口，而河湾沼泽与种植园则盛产蔗糖、棉花和水稻。路易斯安那独特文化融合了法国、西班牙、非洲与加勒比海的多重影响，形成了与盎格鲁‑撒克逊社会截然不同的风貌。这场购地案确保了美国对这片大陆最庞大水系的主导权。"
 ARKNS: "阿肯色"
 ARKNS_f: "阿肯色"
 ARKNS_ADJ: "阿肯色"
 ARKNS_f_desc: "阿肯色州是由路易斯安那购地划建而成，地处南部低地与西部高地的过渡地带。阿肯色河谷为棉花和水稻种植提供了肥沃农田，而欧扎克与沃希托山脉则蕴藏着木材、矿产资源，并分布着与世隔绝的山地社区。早在建州之前，温泉城就以其疗愈性泉水吸引着定居者。阿肯色州体现了深南部与西部边疆的文化分界，兼具两地特征却又不完全属于任何一方。"
 IOWAU: "艾奥瓦"
 IOWAU_f: "艾奥瓦"
 IOWAU_ADJ: "艾奥瓦"
 IOWAU_f_desc: "爱荷华州曾从法国手中购得，并从当地原住民部落手中夺取，如今已成为典型的美国腹地——无边无际的草原被改造为全球最肥沃、产量最高的农田。深厚肥沃的黑土孕育出惊人的玉米和大豆产量，不仅喂养着庞大的牲畜群，还源源不断地向世界各地出口谷物。爱荷华州的地貌起伏平缓，不见巍峨高山，境内也罕有大都市的喧嚣。这里便是农业美国的缩影：星罗棋布的小城镇、世代相承的家庭农场，以及深深扎根于土地的保守价值观。无论是爱荷华州的党团会议，还是金黄遍野的丰收季节，都在深刻影响着美国的国家走向。"
 CLFRN: "加利福尼亚"
 CLFRN_f: "加利福尼亚"
 CLFRN_ADJ: "加利福尼亚"
 CLFRN_f_desc: "加利福尼亚在短暂战争后从墨西哥夺取，通过黄金发现、铁路贯通和纯粹的创业雄心，从偏远疆域蜕变为经济巨人。淘金热吸引全球寻梦者前来，塑造了这片机遇驱动、文化多元的土地。地中海气候使这里全年可种植他处罕见的水果蔬菜，太平洋港口则将美国与亚洲贸易紧密相连。从旧金山的国际都会繁华到南部的沙漠景观，加利福尼亚凭借辽阔疆域与天然资源，俨然自成国度。"
 CSCDA: "卡斯卡迪亚"
 CSCDA_f: "卡斯卡迪亚"
 CSCDA_ADJ: "卡斯卡迪亚"
 CSCDA_f_desc: "卡斯卡迪亚代表着太平洋西北地区的一种生物区域认同，它以喀斯喀特山脉、太平洋海岸线以及共同的环境价值观为纽带，而非政治边界。这个地区的温带雨林、盛产鲑鱼的河流以及火山峰，塑造出一片与北美其他地区截然不同的景观。卡斯卡迪亚独立的概念源于其与内陆地区的文化差异——环境主义而非资源开采，城市主义而非乡村生活，面向环太平洋而非大西洋。卡斯卡迪亚更多是作为一种文化认同而非政治现实而存在，然而这一理念却经久不衰。"
 WYMNG: "怀俄明"
 WYMNG_f: "怀俄明"
 WYMNG_ADJ: "怀俄明"
 WYMNG_f_desc: "怀俄明州虽幅员辽阔，却是美国人口最少的州之一。它横跨落基山脉主脊与大陆分水岭以东的高原地带。黄石国家公园的地热奇观和大提顿山吸引了大量游客，而广袤的牧场与能源开采则支撑着当地经济。怀俄明州的政治文化崇尚拓荒精神下的独立自主：政府干预最小化、个人自由最大化，并坚决捍卫持枪权与财产权。该州至今仍保持着浓厚的乡村气息，抗拒城市化与联邦政府的介入，堪称美国西部神话的化身。"
 TEXAS: "得克萨斯"
 TEXAS_f: "得克萨斯"
 TEXAS_ADJ: "得克萨斯"
 TEXAS_f_desc: "得克萨斯州在革命斗争后从墨西哥手中夺取，作为独立共和国度过了十年，随后加入美国——这段历史得克萨斯人从未忘记。该州幅员辽阔，涵盖沙漠、森林、草原和海岸线，而石油的发现使其从牧牛之乡转变为能源超级大州。得克萨斯保持着独特的身份认同，融合了南方、西部和墨西哥的影响，形成了一种自视卓越的文化。该州的独立精神、军事传统和经济实力使其在美国独树一帜。"
 MCHGN: "密歇根"
 MCHGN_f: "密歇根"
 MCHGN_ADJ: "密歇根"
 MCHGN_f_desc: "密歇根州被五大湖中的四座环绕，拥有全美最长的淡水海岸线，这塑造了它作为美国内陆海洋强国的独特身份。上半岛与下半岛风光迥异：下半岛多为工业城市和农田，而上半岛则以广袤荒野和矿业区为主。底特律崛起为汽车之都，使密歇根州一度成为美国制造业的代名词，但如今其工业霸主地位已大不如前。五大湖不仅调节着当地气候、提供便捷的水运通道，还为人们提供了丰富的休闲娱乐机会，因此密歇根州的地理条件堪称其最大的优势。"
 WSCNS: "威斯康星"
 WSCNS_f: "威斯康星"
 WSCNS_ADJ: "威斯康星"
 WSCNS_f_desc: "威斯康星州最初因其毛皮贸易和铅矿资源而受到重视，后发展成为乳制品重镇。日耳曼与斯堪的纳维亚移民在此建立家庭农场，生产出定义该州特色的奶酪与啤酒。五大湖区提供了港口并调节气候，内陆则拥有肥沃农田与森林。该州源自移民激进主义与农业改革运动的进步政治传统，为美国带来了劳工权利和直接民主制度。威斯康星州在乡村保守主义与城镇进步主义之间保持平衡，从未完全倒向任何一方阵营。"
 WSHNT: "华盛顿"
 WSHNT_f: "华盛顿"
 WSHNT_ADJ: "华盛顿"
 WSHNT_f_desc: "华盛顿州以首任总统命名，却与原初十三州地理悬隔，地貌从太平洋雨林到内陆干旱高原变化万千。喀斯喀特山脉在气候与文化上将州域一分为二——西部湿润自由，东部干燥保守。普吉特湾的天然屏障造就西雅图良港，使其从伐木小镇蜕变为科技枢纽。哥伦比亚河水系提供灌溉与水力发电，将内陆化为丰饶农田。华盛顿州西望环太平洋地区，串联起美国与亚洲的贸易及移民通道。"
 OREGN: "俄勒冈"
 OREGN_f: "俄勒冈"
 OREGN_ADJ: "俄勒冈"
 OREGN_f_desc: "俄勒冈，曾是拓荒者穿越俄勒冈小径寻求自由土地与机遇的终点，至今仍以其自然风光和独立精神为标志。威拉米特河谷以肥沃土壤和温和气候吸引农民定居，连绵森林则提供了无尽的木材资源。俄勒冈的政治文化崇尚环保主义、通过公投实现的直接民主，并对外部干预保持警惕。该州不设销售税，允许医助安乐死，并较早将大麻合法化。从波特兰的都市风貌到喀斯喀特山脉东侧的高地荒漠，俄勒冈拒绝被简单定义，始终保持着强烈的在地自豪感。"
 MISSR: "密苏里"
 MISSR_f: "密苏里"
 MISSR_ADJ: "密苏里"
 MISSR_f_desc: "密苏里州，作为通往西部的门户，坐落于密西西比河与密苏里河这两大美洲巨流的交汇处，使其成为西进运动的天然起点。圣路易斯曾为前往边疆的捕兽者、商人和定居者提供装备，而堪萨斯城则发展成为重要的铁路枢纽。南北战争期间，密苏里州因地处南北之间成为边境州，在对立忠诚中撕裂，饱受游击战暴力之苦。该州至今仍保持着政治上的分化、文化上的交融与地理上的过渡性——东南部的\"靴跟地\"带有南方特色，北部属中西部风貌，而其精神内核则始终闪耀着西部拓荒的光芒。"
 GRGUS: "佐治亚"
 GRGUS_f: "佐治亚"
 GRGUS_ADJ: "佐治亚"
 GRGUS_f_desc: "佐治亚州以国王乔治二世命名，最初是债务人的避难所和抵御西班牙佛罗里达的缓冲地，后来发展成为建立在奴隶劳动基础上的棉花王国。沿海低地的种植园生产水稻和靛蓝，而内陆皮埃蒙特地区则成为\"棉花之王\"领地的核心。亚特兰大在内战期间及战后的毁灭与重生，使其成为\"新南方\"的象征——重建、工业化，却仍被邦联历史所萦绕。佐治亚州在乡村保守主义与亚特兰大的国际影响力之间、传统与进步之间、记忆与重塑之间保持着平衡。"
 ALBMA: "阿拉巴马"
 ALBMA_f: "阿拉巴马"
 ALBMA_ADJ: "阿拉巴马"
 ALBMA_f_desc: "阿拉巴马州，这片从克里克族割让的土地上崛起的土地，在东部农田耗尽后迅速被寻求处女地的棉花种植园主填满。被称为\"黑土带\"的深色肥沃土壤区成为棉花王国的核心，被奴役的劳动力在此劳作，为白人种植园主创造财富。阿拉巴马州的河流提供了通往墨西哥湾莫比尔港的运输通道，将内陆种植园与全球市场相连。该州的历史与奴隶制、内战和民权斗争密不可分——这段过往塑造了阿拉巴马作为典型深南州的身份认同，无论好坏皆然。"
 SCRLA: "南卡罗来纳"
 SCRLA_f: "南卡罗来纳"
 SCRLA_ADJ: "南卡罗来纳"
 SCRLA_f_desc: "南卡罗来纳州是第一个脱离联邦的州，它正是旧南方贵族及其以棉花为基础的种植园经济的典型代表。低地沿海地区的种植园大规模种植水稻和靛蓝，需要大量奴隶劳动力，从而形成了一个黑奴数量多于白人的社会。查尔斯顿因此成为南方最富裕、最精致的城市，其种植园主精英自视为天然的贵族阶层。南卡罗来纳州对州权和奴隶制的坚定捍卫，使其成为南方最为激进的州，绝不肯在这一“特殊制度”上作出任何妥协。"
 NCRLA: "北卡罗来纳"
 NCRLA_f: "北卡罗来纳"
 NCRLA_ADJ: "北卡罗来纳"
 NCRLA_f_desc: "北卡罗来纳州比其南方邻州更具多样性且贵族气息较淡，沿海种植园、皮埃蒙特农场和阿巴拉契亚山区社群在此共存，各自拥有独特的身份认同与利益诉求。该州是最后加入邦联的成员，虽不情愿却最终选择效忠南方。皮埃蒙特地区的烟草种植业创造了财富，却无需像棉花州那样依赖大规模奴隶劳动，从而形成了更为温和的社会结构。外滩群岛凶险的海岸线为其赢得了\"大西洋坟场\"的绰号，而群山则隔绝了沿海精英与自给自足的山区农民及私酒酿造者之间的文化联系。"
 TNNSS: "田纳西"
 TNNSS_f: "田纳西"
 TNNSS_ADJ: "田纳西"
 TNNSS_f_desc: "田纳西州从北卡罗来纳州的西部领土中划出，地跨阿巴拉契亚山脉高峰与密西西比河，囊括三个截然不同的区域，除同属一州外几无共同之处。东田纳西在南北战争期间始终拥护联邦，其山区居民对奴隶主的政治毫无兴趣。中田纳西的蓝草地带和种植园经济则与南方步调一致，而西田纳西的棉田几乎与密西西比州别无二致。纳什维尔作为文化中心的崛起，将乡村音乐传统与“新南方”的雄心融为一体，使田纳西成为连接山地南方与深南的桥梁。"
 KNTKY: "肯塔基"
 KNTKY_f: "肯塔基"
 KNTKY_ADJ: "肯塔基"
 KNTKY_f_desc: "肯塔基州是阿巴拉契亚山脉以西的第一个州，曾被丹尼尔·布恩誉为沃野千里、猎物丰饶的“应许之地”。该州农业以烟草、大麻和纯种赛马繁育为主，而非棉花种植，因此奴隶制社会相对南方腹地更为温和。南北战争期间，作为边境州的肯塔基州呈现出复杂的忠诚分裂——支持联邦与支持邦联的势力将许多家庭和社区一分为二。如今，波本威士忌、赛马文化与煤炭资源构成了肯塔基经济与身份认同的核心；而其地处南北、东西交汇之处的位置，则使其成为独具特色的过渡地带。"
 OHIOU: "俄亥俄"
 OHIOU_f: "俄亥俄"
 OHIOU_ADJ: "俄亥俄"
 OHIOU_f_desc: "俄亥俄，作为首个从西北领地划分出来的州，成为通往中西部的门户和美国多元文化的缩影。俄亥俄河不仅提供了运输通道，还曾是自由州与蓄奴州的分界线，使这里成为逃亡奴隶的避难所和决定其命运的战场。辛辛那提的猪肉加工、克利夫兰的钢铁厂和托莱多的制造业使俄亥俄成为工业重镇。该州融合了南方裔农民、北方移民和欧洲定居者，形成了政治竞争激烈的摇摆州，常在总统大选中成为关键决定力量。"
 VRGNA: "弗吉尼亚"
 VRGNA_f: "弗吉尼亚"
 VRGNA_ADJ: "弗吉尼亚"
 VRGNA_f_desc: "弗吉尼亚州是十三个殖民地中历史最悠久、影响力最大的一个，孕育的美国总统人数之多、对美国历史的塑造之深，均居各州之首。切萨皮克湾沿岸的种植园凭借烟草和奴隶制积累巨额财富，形成了以种植主为核心的贵族阶层——他们既领导了独立革命，又始终维护奴隶制度。南北战争期间，弗吉尼亚曾作为邦联首都，并成为无数激战之地，致使全境满目疮痍。然而，华盛顿、杰斐逊、麦迪逊、李等历史巨擘所留下的精神遗产，至今仍是美国国家认同的核心。如今，弗吉尼亚州在对往昔的尊崇与北弗吉尼亚地区蓬勃发展的联邦公务体系及多元化的郊区现实之间寻求平衡。"
 WVGNA: "西弗吉尼亚"
 WVGNA_f: "西弗吉尼亚"
 WVGNA_ADJ: "西弗吉尼亚"
 WVGNA_f_desc: "西弗吉尼亚州诞生于南北战争期间弗吉尼亚州的分裂，代表着与切萨皮克湾沿岸的种植园贵族截然不同的阿巴拉契亚山地文化。这些以自给农业为主、奴隶极少的山区居民拒绝加入邦联，自行组建了一个亲联邦的州。煤炭开采既成为西弗吉尼亚州经济的支柱，也为其带来了沉重的负担：它提供了就业机会和能源，却严重破坏了生态环境，并危害矿工的健康。如今，该州仍面临贫困、阿片类药物成瘾和人口流失等严峻挑战，但始终坚守着对独立建州历史与山地传统的强烈自豪感。"
 PLHUN: "波兰‑匈牙利"
 PLHUN_f: "波兰‑匈牙利"
 PLHUN_ADJ: "波兰‑匈牙利"
 PLHUN_f_desc: "波兰‑匈牙利联合王国曾两次形成共主邦联，即由同一位君主统治两个王国但未合并其行政体系。第一次联合发生于1370至1382年，由匈牙利的路易一世统治；第二次则在1440至1444年间，由波兰的瓦迪斯瓦夫三世统治。这两次联合均因继承问题或君主逝世而告终，具有临时性特征。"
 SWBIA: "施瓦本王国"
 SWBIA_f: "施瓦本王国"
 SWBIA_ADJ: "施瓦本"
 SWBIA_f_desc: "施瓦本作为中世纪德意志的重要部族公国之一，横跨黑森林与阿尔卑斯山之间的丰饶土地。尽管霍亨斯陶芬王朝曾将施瓦本打造为帝国权力的核心，这片区域后来却分裂为自由市、诸侯领地和教会辖地交织的拼图。通过重建施瓦本王国，我们将重聚这些分散的疆域，在单一王冠下复兴德意志西南部的荣光。"
 FLVDK: "费尔维戴克"
 FLVDK_f: "费尔维戴克"
 FLVDK_ADJ: "匈牙利"
 FLVDK_f_desc: "费尔维戴克是匈牙利人对这片北部山区领土的称呼，数个世纪以来它一直是匈牙利王国的一部分。这片主要由斯洛伐克人居住的高地为王国提供了矿产资源、防御工事以及通往波兰的贸易路线。尽管在民族构成上与马扎尔核心地区存在差异，费尔维代克始终是匈牙利民族认同和经济体系中不可或缺的组成部分。这一可成立国家形态象征着匈牙利对这些历史性北部领土的统治权。"
 HPEMP: "嚈哒"
 HPEMP_f: "嚈哒"
 HPEMP_ADJ: "嚈哒"
 HPEMP_f_desc: "嚈哒人，被敌人们称为“白匈奴”，在5至6世纪间于中亚建立起强大的游牧帝国。这些凶猛的战士以巴克特里亚为基地，掌控丝绸之路，令萨珊王朝俯首，并威胁着波斯与印度。尽管他们留下的文字记载寥寥无几，但其军事才能和对重要贸易路线的控制，使他们成为该地区的霸主，直至被突厥入侵者击溃。嚈哒人的遗产留存于中亚各民族的血脉中，那段曾统治从草原到兴都库什山脉的帝国记忆亦永不磨灭。"
 HNRMN: "匈牙利​­‑罗马尼亚"
 HNRMN_f: "匈牙利​­‑罗马尼亚"
 HNRMN_ADJ: "匈牙利​­‑罗马尼亚"
 HNRMN_f_desc: "匈牙利与罗马尼亚虽常为特兰西瓦尼亚领土互为宿敌，却共享着喀尔巴阡盆地深厚的历史文化纽带。两国若能联合，将融合匈牙利的行政传统与罗马尼亚的人口资源，缔造一个强大的多瑙河强国。这个二元君主国将如昔日的奥匈帝国般，雄踞阿尔卑斯山与黑海之间的区域，将马扎尔与罗马尼亚的利益凝聚于一体，形成足以抵御俄罗斯与奥斯曼扩张的统一国家。"
 CMLOT: "卡美洛"
 CMLOT_f: "卡美洛"
 CMLOT_ADJ: "卡美洛"
 CMLOT_f_desc: "卡美洛是亚瑟王的传奇宫廷，象征着以圆桌骑士为核心、公正而乌托邦式的理想王国。   故事常围绕卡美洛的理想遭到来自格温娜维尔王后与兰斯洛特爵士之间三角恋情，以及亚瑟王私生子莫德雷德背叛的威胁展开。最终，这场纷争导致亚瑟王构建完美王国的梦想破灭，但这一传说仍作为伟大与理想时代的象征流传于世。"
 GLD_f: "加利西亚‑洛多梅里亚"
 GLCLD: "加利西亚‑洛多梅里亚"
 GLCLD_f: "加利西亚‑洛多梅里亚"
 GLCLD_ADJ: "加利西亚‑洛多梅里亚"
 GLCLD_f_desc: "加利西亚和洛多梅里亚王国是哈布斯堡君主国的一大直辖领地，于1772年第一次瓜分波兰后，由波兰立陶宛联邦领土划设而成，涵盖现今乌克兰西部和波兰南部部分地区。作为奥地利的主要省份，它融合了鲁塞尼亚（乌克兰）与波兰领土，以利沃夫（伦贝格）为首都，直至1918年第一次世界大战后奥匈帝国解体。此后其领土被波兰和乌克兰两国分割。"
 GCOLM: "大哥伦比亚"
 GCOLM_f: "大哥伦比亚"
 GCOLM_ADJ: "大哥伦比亚"
 GCOLM_f_desc: "大哥伦比亚共和国是由西蒙·玻利瓦尔创建的短暂存在的南美共和国，它统一了现今的哥伦比亚、巴拿马、委内瑞拉和厄瓜多尔，以及秘鲁和巴西的部分地区，形成了一个强大的统一国家。尽管怀有拉美统一的雄心壮志，但它饱受政治动荡、地区对立（中央集权派与联邦派）和内部冲突的困扰，最终于1831年解体为多个独立国家（委内瑞拉、厄瓜多尔和新格拉纳达——现代哥伦比亚的前身），巴拿马后来也从新格拉纳达分离出去。"
 ELBNF: "易北联邦"
 ELBNF_f: "易北联邦"
 ELBNF_ADJ: "易北"
 ELBNF_f_desc: "从克尔科诺谢山脉的源头到汉堡繁忙的港口，易北河长久以来都是中欧的商业命脉。易北联邦通过一部将贸易、文化自治与共同繁荣置于军事扩张之上的特许状，将萨克森的商人贵族、波希米亚的工业城市与北方的汉萨传统凝聚为一体。\n\n这个联邦既非纯粹的日耳曼亦非完全的斯拉夫，它拥抱自身的多元文化特质。德意志市民、捷克工匠与索布族农民在一部保障语言与宗教自由的宪法下共存。首都设于[ShowLocationName('dresden')]或[ShowLocationName('prague')]（#color_yellow具体取决于建国时的选择#!），让这座巴洛克瑰宝坐落于欧洲文化的十字路口，承担着联邦首都的职能。\n\n经济强大而军事审慎的易北联邦志在成为欧洲的瑞士：一个凭借河流贸易、矿业与先进制造业繁荣起来的中立调停者与金融中心。当普鲁士提供利剑、奥地利彰显王权之时，易北联邦呈现的是账册与织机。"
 GMORV: "大摩拉维亚"
 GMORV_f: "大摩拉维亚"
 GMORV_ADJ: "摩拉维亚"
 GMORV_f_desc: "大摩拉维亚是约833年至907年间存在于中欧的一个重要西斯拉夫国家，其核心区域位于现今的捷克共和国和斯洛伐克境内。作为斯拉夫人基督教化的重要中心，该王国因西里尔与美多德两位传教士的杰出贡献而闻名，并为后世斯拉夫文学与文化的发展奠定了基础。在统治者斯瓦托普卢克一世统治的鼎盛时期，大摩拉维亚曾是法兰克帝国与游牧部落之间的强大缓冲国。其衰落主要由内部分裂与外部入侵引发，其中马扎尔人的进攻尤为关键。"
 GOTIA: "哥提亚"
 GOTIA_f: "哥提亚"
 GOTIA_ADJ: "哥提亚"
 GOTIA_f_desc: "历史上，“哥特亚”一词曾指代罗马时代和古典时代晚期日耳曼哥特人定居并统治的多个领土。这些区域包括今罗马尼亚、摩尔多瓦和乌克兰境内多瑙河下游以北的地区，以及公元4世纪时的一个罗马省份。"
 ALSKA_f: "阿拉斯加"
 ALSKA_f_desc: "阿拉斯加被誉为“最后的边疆”，是美国一个幅员辽阔、地貌多样的州，以其壮丽的景观、丰富的荒野资源和充满活力的阿拉斯加原住民文化而闻名。其地理环境包罗万象，从北极苔原到沿海雨林应有尽有，拥有丰富的野生动植物资源以及北极光等自然奇观。"
 ARPIT_f: "阿尔卑坦尼亚"
 ARPIT_f_desc: "阿尔卑坦尼亚位于西阿尔卑斯山脉，是一个以阿尔卑坦语（又称法兰克‑普罗旺斯语）使用为标志的文化语言区域，涵盖法国、瑞士和意大利的部分领土。该地区历史上以萨沃伊公国为核心，但从未形成统一的政治实体。主要覆盖范围包括：法国的安省、萨沃伊省和上萨沃伊省，瑞士的罗曼迪地区，以及意大利的奥斯塔谷。"
 ADREM_f: "亚得里亚帝国"
 ADREM_f_desc: "生于商贸，炼于战火，潮汐为纽带，亚得里亚帝国统御着曾将其分隔的海域。从威尼斯到拉古萨，从伊斯特拉海岸到达尔马提亚群岛，商贾与海军统帅共同编织了一个黄金与盐、贸易与征服的国度。帝国并非倚仗强权而兴盛，而是凭借对海洋的驾驭之道。"
 ALPLN_f: "阿尔卑兰"
 ALPLN_f_desc: "在巍峨群山的云雾与峭壁之间，一股新兴力量已然扎根。由阿尔卑斯坚韧的子民——牧羊人、商人、战士与城邦共和国共同铸就的阿尔普兰，如同磐石与冰雪中屹立的团结堡垒。当旁人只看见严寒与险阻时，阿尔普兰人却看见了力量、自由与机遇。他们的关隘汇聚着欧洲的财富，他们的峰峦抵御着外敌的侵袭。\n\n阿尔普兰既非帝国亦非松散联邦，她是属于高地的国度——坚韧、自律，且永远警醒。"
 ANDUH_f: "英荷联盟"
 ANDUH_f_desc: "英荷联盟是英国与尼德兰之间的一段共主邦联时期，自1692年持续至1712年，由君主威廉三世统治。在这段时期，同一位国王统治着两个国家，形成了强大的海上联盟并共享殖民帝国，伦敦与海牙成为实际上的双首都。这一联盟在1712年威廉三世去世后终结，两国随之分离，不过普法尔茨与尼德兰仍保持独立的共主邦联关系，直至1744年。"
 GSCTL: "大苏格兰"
 GSCTL_f: "大苏格兰"
 GSCTL_ADJ: "苏格兰"
 GSCTL_f_desc: "几个世纪以来，苏格兰始终是桀骜不驯的北方王国，虽浴血却从不屈服。如今苏格兰已不满足于仅仅生存下去，而是要开创属于自己的伟大时代。\n\n大斯科舍王国统合高低lands于王冠之下，将苏格兰的治理延伸至所有凯尔特领地、争议边境与海外疆域。从爱丁堡到克莱德造船厂，从设得兰群岛到阿尔斯特，苏格兰民族正在扩张。\n\n我们的长老会奠定道德根基，学府孕育欧洲最杰出英才，军团在每片战场证明其英勇。苏格兰人向来以少搏多，而今我们终将拥有与之相称的磅礴力量。\n\n苏格兰不再是北方边陲之地。我们是大苏格兰，绝不对任何人俯首称臣。"
 ASHNG: "奥匈帝国"
 ASHNG_f: "奥匈帝国"
 ASHNG_ADJ: "奥匈"
 ASHNG_f_desc: "奥匈帝国是中欧的双元君主制国家，由奥地利帝国与匈牙利王国在哈布斯堡君主弗朗茨·约瑟夫皇帝统治下联合组成。通过1867年《奥匈折衷方案》建立，帝国设有奥地利和匈牙利两个独立政府，但共享外交政策、军事和财政体系，管辖着多民族聚居的疆域。作为主要强国，其内部民族矛盾与民族主义问题因第一次世界大战激化，最终导致帝国于1918年解体，分裂为多个新兴国家。"
 ASHNG_NAME_SHORT: "奥匈"
 ASHNG_NAME_SHORT_f: "奥匈"
 ASHNG_NAME_SHORT_ADJ: "奥匈"
 ASHNG_NAME_LONG: "奥匈帝国"
 ASHNG_NAME_LONG_f: "奥匈帝国"
 ASHNG_NAME_LONG_ADJ: "奥匈"
 AUSEM_f: "奥地利帝国"
 AUSEM_f_desc: "奥地利帝国是一个从1804年至1867年存在的多民族欧洲大国，由哈布斯堡王朝统治，并成为后来奥匈帝国的基础。这是一个幅员辽阔、民族与语言多元的国家，但长期受到内部民族主义紧张关系的困扰。1867年，帝国重组为奥匈二元君主国，匈牙利获得更多自治权，但两国仍由同一位君主统治。"
 ASTBV_f: "奥地利‑巴伐利亚"
 ASTBV_f_desc: "奥地利与巴伐利亚曾因傲慢、信仰与野心长久分裂，如今在欧洲心脏地带团结一致。这个新兴的领地融合了维也纳的帝国传统与慕尼黑的文化活力，掌控着意大利与德意志、东方与西方之间的交通要冲。"
 BLKLG_f: "巴尔干联盟"
 BLKLG_f_desc: "巴尔干同盟是保加利亚、塞尔维亚、希腊和黑山组成的军事联盟，成立于1912年，旨在将奥斯曼帝国逐出东南欧并获取领土。该联盟在第一次巴尔干战争中虽初战告捷，却因战利品分配争端迅速瓦解，最终在1913年引发了第二次巴尔干战争。"
 BASQU_f: "巴斯克国"
 BASQU_f_desc: "巴斯克地区由七个省份组成，从比利牛斯山脉延伸至该国北部的比斯开湾，另有一小片区域延伸至法国西南部。"
 BSSER_f: "波斯尼亚‑塞尔维亚"
 BSSER_f_desc: "波斯尼亚与塞尔维亚如今携手共进——在巴尔干半岛的心脏地带，筑起一道斯拉夫力量的坚固堡垒。   这个新生的王国承袭了波斯尼亚的坚韧不拔与塞尔维亚的尚武传统，将西方与东方的文化精髓融为一体，锻造出一个坚定不移的国家。他们并肩守护着列强交汇的要冲，在欧洲大陆风云变幻的权力格局中，自主书写属于自己的命运篇章。"
 CATRU_f: "天主教俄罗斯"
 CATRU_f_desc: "天主教俄罗斯指的是俄罗斯希腊礼天主教会，这是一个规模较小、享有自治权的东方天主教会，与教宗及全球天主教会完全共融。"
 CTUNN_f: "凯尔特联盟"
 CTUNN_f_desc: "凯尔特联盟是一个假设或虚构的政治实体，旨在联合现代凯尔特民族国家。在这类虚构描述中，它通常包括苏格兰、爱尔兰、威尔士、马恩岛、康沃尔和布列塔尼，有时也会纳入加利西亚等其他宣称拥有凯尔特传统的地区。这些构想差异很大，但普遍着眼于通过经济、文化或政治原因联合这些区域，尽管在现实世界中实施起来非常复杂，且未得到相关地区大多数公众的支持。"
 CAROL_f: "加洛林帝国"
 CAROL_f_desc: "加洛林帝国是公元800年至888年间存在于西欧和中欧的一个以法兰克人为主导的国家，由查理曼建立，并由教宗为其加冕为皇帝。它是当时西欧最强大的帝国，疆域从西班牙延伸至今日的德国，堪称神圣罗马帝国以及现代法国和德国的前身。"
 CDOBA_f: "科尔多瓦"
 CDOBA_f_desc: "科尔多瓦哈里发国是一个以西班牙科尔多瓦为中心的伊斯兰国家，存在于公元929年至1031年。这一时期是穆斯林在伊比利亚半岛（即安达卢斯）统治的巅峰，也是文化、科学和建筑取得巨大进步的“黄金时代”。在其鼎盛时期，哈里发国拥有繁荣先进的城镇文明、发达的经济体系，其首都科尔多瓦是当时西欧最大、最重要的城市。"
 DACIA_f: "达契亚"
 DACIA_f_desc: "达契亚是位于今罗马尼亚境内的一个古老王国，以其丰富的金矿和曾与罗马帝国交锋的骁勇战士而闻名。这片土地属于色雷斯血统的达契亚人，公元2世纪初被图拉真皇帝征服，成为罗马行省。罗马统治持续约170年，直至公元271年撤离，为该地区留下了深远的文化与历史遗产。"
 SROAU: "澳大利亚尊贵共和国"
 SROAU_f: "澳大利亚尊贵共和国"
 SROAU_ADJ: "澳大利亚"
 SROAU_f_desc: "这片南方大陆，长久以来与全球贸易隔绝，如今已在商人统治下团结一致。从澳大利亚到新西兰的各个港口，我们的舰队掌控着太平洋和印度洋的贸易航线，将羊毛、矿产和异域商品运往遥远的市场。\n\n与其他地方的封建王国不同，我们的共和国由各大贸易家族选出的商人王公治理。政治权力源于财富，确保政策服务于商业而非王朝。我们战略上的孤立使我们免受外国军队侵扰，而星罗棋布的港口在太平洋上构筑起坚固的防御网络。\n\n我们是商人，而非战士，更看重利润而非征服。然而，当必要时，我们的武装商船队和私人驻军会捍卫商业利益。让他人为王位而战吧。我们仅凭贸易就建立了一个帝国。"
 DLMON_f: "二元君主国"
 DLMON_f_desc: "英格兰与法兰西的双重君主制时期始于1422年，止于1453年。在此期间，尚在襁褓中的英格兰国王亨利六世被承认为英格兰和法兰西的共同君主，尽管其宣称权存在争议。这一体制由《特鲁瓦条约》确立，源于亨利五世在百年战争期间入侵法国并控制了法国北部地区。法国王太子查理控制着法国南部，始终质疑这一宣称权的合法性。随着查理七世领导的法军逐步将英格兰势力驱逐出除加莱外的所有领土，双重君主制最终走向终结。"
 ESLAV_f: "东斯拉维亚"
 ESLAV_f_desc: "一个假想的国家与现实世界中的一个族群。作为虚构国家，它是一个以基辅为首都的单一制共和国，官方语言包括乌克兰语、白俄罗斯语和俄语，人口约5400万。而现实中的东斯拉夫人群体则是斯拉夫民族的一个亚群，由白俄罗斯人、俄罗斯人和乌克兰人组成，他们使用东斯拉夫语族的语言。"
 FNCIB_f: "法兰西‑伊比利亚帝国"
 FNCIB_f_desc: "1579年，法兰西与西班牙结盟，组建法兰西‑伊比利亚帝国。此后，以葡萄牙语、西班牙语和法语为官方语言的殖民势力分别在新总督辖区展开殖民活动。1732年，这些殖民地合并为法兰西‑伊比利亚帝国。1776年，墨西哥独立战争与美国独立战争相继爆发，并于1778年同时告终。"
 BBLON: "巴比伦"
 BBLON_f: "巴比伦"
 BBLON_ADJ: "巴比伦"
 BBLON_f_desc: "巴比伦"
 ASYRI_f: "亚述"
 ASYRI_f_desc: "亚述是美索不达米亚地区的一个重要王国，也是古代中东最早的伟大帝国之一，位于今伊拉克北部和土耳其东南部。它同时也是亚述人的家园之名，这一区域属于上美索不达米亚，如今分属伊拉克、土耳其、伊朗和叙利亚。该帝国以其强大的军事力量和辽阔的疆域著称，在公元前900年至600年间，其版图从波斯湾一直延伸至地中海。帝国得名于其首府城市亚述城。"
 ASYRE: "亚述帝国"
 ASYRE_f: "亚述帝国"
 ASYRE_ADJ: "亚述"
 ASYRE_f_desc: "在底格里斯河畔的古城#color_yellow 亚述#!，曾诞生过凭借军事力量与行政智慧称霸近东的#color_yellow 亚述帝国#!。"
 HPBRA: "许珀耳玻瑞亚"
 HPBRA_f: "许珀耳玻瑞亚"
 HPBRA_ADJ: "许珀耳玻瑞亚"
 HPBRA_f_desc: "许珀耳玻瑞亚是希腊神话中的一片传说之地，被描绘为位于极北、阳光普照的理想乐土。在那里，人们长寿而幸福，远离北风之神玻瑞阿斯的侵扰。"
 FIESL_f: "弗里斯兰"
 FIESL_f_desc: "弗里斯兰是尼德兰北部的一个省份，以其独特的文化、独立的语言（西弗里斯兰语）以及作为航海民族的深厚历史渊源而闻名。该省地势平坦低洼，遍布圩田、众多湖泊和运河，农业发达，尤以奶业为主。"
 GLCEM_f: "高卢帝国"
 GLCEM_f_desc: "高卢帝国是在三世纪危机时期，于260年至274年脱离罗马帝国而建立的一个政权。它由罗马指挥官波斯图穆斯创立，领土包括高卢、不列颠尼亚和西班牙。该帝国拥有自己的政府和铸币厂。"
 TRCNS: "塔拉科"
 TRCNS_f: "塔拉科"
 TRCNS_ADJ: "塔拉科"
 TRCNS_f_desc: "塔拉科是罗马帝国在伊比利亚半岛设立的三个行省之一，其疆域涵盖半岛东北部及东部沿海地区。行省以首府塔拉科（今塔拉戈纳）命名，后发展成为罗马最富庶的领地之一，所产橄榄油、葡萄酒及贵金属源源不断输送至帝国腹地。凭借濒临地中海的战略区位与发达的农业经济，该地区成为罗马经略伊比利亚的关键支点。整个帝国时期，塔拉科西班牙始终保持着繁荣景象，境内各城市兴建的高架引水渠、角斗场与广场等建筑，至今仍镌刻着罗马文明在此地留下的深刻印记。"
 BRTNA: "不列颠尼亚"
 BRTNA_f: "不列颠尼亚"
 BRTNA_ADJ: "不列颠尼亚"
 BRTNA_f_desc: "不列颠尼亚，罗马最北端的行省，象征着帝国征服已知世界的雄心——即使是被大洋环绕的迷雾笼罩的偏远岛屿也未能幸免。尽管从未被完全征服，喀里多尼亚（苏格兰）始终在哈德良长城以外保持着自由，罗马治下的不列颠尼亚还是发展出了城镇、道路和庄园，将地中海文明带到了凯尔特人居住的北方。这个行省向帝国提供粮食、金属和士兵，同时作为军团据守蛮族部落的前线。当罗马撤离后，罗马-不列颠文化虽短暂存续，终难逃撒克逊人入侵的劫难，然而罗马秩序的遗响始终萦绕不散。"
 JRSLM: "耶路撒冷王国"
 JRSLM_f: "耶路撒冷王国"
 JRSLM_ADJ: "耶路撒冷"
 JRSLM_f_desc: "由十字军于1099年建立的耶路撒冷王国，代表着基督教世界在圣地最辉煌的胜利与最彻底的失败。在近两个世纪里，法兰克骑士统治着一个由沿海城市、城堡和争议领土拼凑而成的国度，虽不断受到穆斯林势力威胁，却依靠意大利海洋共和国与欧洲援军维系生存。这个王国发展出独特的文化体系，将欧洲封建制度与东方元素相融合，形成了拉丁天主教徒统治东正教徒、穆斯林与犹太人的社会格局。1189年萨拉丁收复耶路撒冷开启了王国漫长的衰落期，尽管其残存势力仍持续苟延，直至十字军最后堡垒陷落。"
 BISRA: "贝塔以色列"
 BISRA_f: "贝塔以色列"
 BISRA_ADJ: "贝塔以色列"
 BISRA_f_desc: "贝塔以色列（埃塞俄比亚犹太社区）在隔绝中保持信仰长达数世纪，实践着独特的犹太教形式——既保留了古老传统，又发展出其他犹太群体未知的特色习俗。关于其起源始终存在争议：传统认为他们来自所罗门王与示巴女王的后裔，另有说法指其为古代皈依者。世代以来，贝塔以色列在埃塞俄比亚高原践行信仰，直至现代才与主流犹太世界重建联系。其独特的宗教仪轨，包括动物献祭与严格的洁净律法，反映了拉比改革前犹太教的原始形态。"
 HNGEM_f: "匈牙利帝国"
 HUNGARIANEMPIRE_f_desc: "匈牙利人曾一度是欧洲的主要民族，并具备成为大国的潜力，但黑死病的肆虐使其国力衰微，随后被奥地利人征服，最终形成了奥匈联合体。\n\n对于历史上的马扎尔王国而言，这样的命运是不可接受的。凭借正确的决心，我们能够建立一个属于匈牙利人的帝国。"
 IBNEM_f: "伊比利亚联盟"
 IBNEM_f_desc: "伊比利亚联盟指1580年至1640年间伊比利亚半岛的一个政治时期。当时西班牙哈布斯堡王朝统治下的西班牙王国（当时为卡斯蒂利亚和阿拉贡两个王国的共主邦联）将葡萄牙王国纳入为共主邦联，从而统一了整个伊比利亚半岛（安道尔除外）。"
 ITMCH_f: "意大利商人联盟"
 ITMCH_f_desc: "意大利商人联盟指中世纪以来凭借海上活动获得政治自治与经济繁荣的意大利海洋霸权港口城市。这一19世纪创造的术语通常指代四个意大利城市，自1947年起其纹章便出现在意大利海军及意大利商船队的旗帜上。\n\n若能将这些共和国统一为单一实体，我们将能建立史上最强大的贸易帝国之一。"
 FROCA: "中美洲联邦共和国"
 FROCA_f: "中美洲联邦共和国"
 FROCA_ADJ: "中美洲"
 FROCA_f_desc: "中美洲联邦共和国，诞生于独立战争与西班牙美洲解体的历史洪流中，于1823至1841年间将危地马拉、萨尔瓦多、洪都拉斯、尼加拉瓜和哥斯达黎加联合为统一的联邦国家。这场自由主义政治实验试图打造一个能够实现经济发展与政治稳定的中美洲统一国家，然而地区对立、保守派阻挠与地理障碍注定了它的失败。各省份利益诉求各异——危地马拉城的保守势力与其他地区的自由改革派持续对抗，而落后的基础设施更阻碍了真正的融合。共和国的解体使本可强盛的统一国家裂变为五个孱弱政权，永远改变了地峡的政治格局。"
 JGLNN_f: "雅盖隆帝国"
 JGLNN_f_desc: "雅盖隆帝国指的是14至16世纪期间由雅盖隆王朝统治的广阔疆域，其版图涵盖波兰王国、立陶宛大公国，并一度包括匈牙利王国和波希米亚王国。虽然并非由单一皇帝统治的统一帝国，但波兰与立陶宛的共主邦联逐渐发展为波兰‑立陶宛联邦。因其庞大的领土规模和对现代波兰、立陶宛、白俄罗斯及西乌克兰地区的统治影响力，该政体常被视为帝国形态。"
 KYVRU_f: "基辅罗斯"
 KYVRU_f_desc: "基辅罗斯是一个存在于东欧的中世纪国家，由统一东斯拉夫各部落的北欧（瓦良格）移民建立，自9世纪末至13世纪中叶以基辅城为中心统治。它是一个由诸多公国组成的联盟，凭借贸易路线积累财富，在鼎盛时期疆域从波罗的海延伸至黑海，从喀尔巴阡山脉跨越至伏尔加河流域。"
 UMAYA_f: "伍麦叶哈里发国"
 UMAYA_f_desc: "倭马亚哈里发国（公元661至750年）是首个重要的伊斯兰王朝，它将穆斯林社群转变为一个庞大而中央集权的阿拉伯伊斯兰帝国。该王朝以叙利亚大马士革为都城，建立了历史上规模最大的统一政权之一，其疆域西起伊比利亚半岛（今西班牙与葡萄牙），东至印度及中亚地区。"
 RSHDN_f: "正统哈里发国"
 RSHDN_f_desc: "拉希德哈里发国，意为“正统哈里发时期”，是公元632年至661年存在的早期伊斯兰帝国，由前四位哈里发——阿布·伯克尔、欧麦尔、奥斯曼和阿里领导。这一时期，帝国以迅猛的军事胜利为基础，在中东、北非和阿拉伯半岛实现了快速的领土扩张。该哈里发国还建立了关键的行政、法律和军事制度，深刻影响了未来伊斯兰国家的发展轨迹。"
 FTMID_f: "法蒂玛哈里发国"
 FTMID_f_desc: "法蒂玛哈里发国是中世纪伊斯兰王朝，于公元909年至1171年统治北非和中东部分地区，后将都城迁至埃及开罗。作为伊斯玛仪派什叶派的信徒，他们自称源自先知穆罕默德之女法蒂玛，并挑战逊尼派阿拔斯王朝对穆斯林世界的领导地位。该王朝以开罗先进的城镇规划、宗教宽容以及在学术和贸易领域的贡献而闻名。"
 ABSID_f: "阿拔斯哈里发国"
 ABSID_f_desc: "阿拔斯帝国是公元750年至1258年间统治的强盛伊斯兰王朝，继承了伍麦叶王朝的基业。它最为人所知的是引领了伊斯兰黄金时代——这一时期文化、科学与思想领域取得了巨大成就——并定都于巴格达。尽管其势力逐渐衰落、帝国多地分崩离析，阿拔斯哈里发仍保有精神权威，直至1258年被蒙古大军攻陷并摧毁。"
 KOGER_f: "东法兰克"
 KOGER_f_desc: "东法兰克王国是《凡尔登条约》签订后加洛林帝国分裂形成的东部政权。该王国以日耳曼语族人口为主，在911年之前一直由加洛林王朝统治，此后转变为选帝侯君主制，并最终演变为神圣罗马帝国。"
 KOGOD_f: "天主的国"
 KOGOD_f_desc: "天主的国主要被描述为上帝动态的掌权、治理与权柄，而非一个实体的、地理意义上的国家。它既是信徒当下所经历的属灵现实，也是将来在耶稣基督再临之时，完全降临于地上的肉身性现实。"
 LNGBD_f: "郎哥巴底"
 LNGBD_f_desc: "伦巴第人是日耳曼民族的一支，于568年至774年间征服了意大利半岛的大部分地区。"
 LUSIT_f: "卢西塔尼亚帝国"
 LUSIT_f_desc: "卢西塔尼亚人是居住在伊比利亚半岛最西端的印欧语系民族，位于现今葡萄牙中部及西班牙的埃斯特雷马杜拉和卡斯蒂利亚-莱昂地区。卢西塔尼亚人究竟是凯尔特人，还是与卢松人相关的凯尔特化伊比利亚人，至今尚无定论。"
 MACED_f: "马其顿"
 MACED_f_desc: "马其顿，这个孕育了腓力二世及其子亚历山大大帝的王国，从希腊世界边缘的半蛮荒之地蜕变为历史上最成功的征服帝国。腓力的军事改革创造了马其顿方阵与职业军队，以此征服希腊；而亚历山大则驾驭这部战争机器，征服波斯帝国并直抵印度。尽管亚历山大帝国在其死后分崩离析，但马其顿的遗产——希腊化文化、向东传播的希腊语言，以及\"一人可征服已知世界\"的雄心——深刻塑造了古代文明。马其顿证明了军事天才与铁血野心足以跨越任何障碍。"
 MCDEM_f: "马其顿帝国"
 MCDEM_f_desc: "该区域的边界随时间不断变化。以亚历山大大帝等人物闻名的古马其顿王国，在罗马帝国衰落后分裂之前，曾是该区域的主导力量。"
 NOSEM_f: "北海帝国"
 NOSEM_f_desc: "北海帝国是1013年至1042年间英格兰、丹麦和挪威之间的一个历史性的共主邦联，由斯文·叉须王和克努特大帝等诺斯国王统治。它是一个海权国家，其联系与统一完全依赖海洋。该帝国诞生于维京时代的晚期，属于共主邦联而非单一的统一国家；各领土仍保有各自的自治权和法律体系。"
 OCCIT_f: "奥克西塔尼亚"
 OCCIT_f_desc: "欧洲西南部的一个历史与文化区域，其界定标准是历史上对奥克语的使用。它覆盖了法国南部的大部分地区，以及西班牙（阿兰谷地）、摩纳哥和意大利（奥克西塔尼山谷）的部分区域。如今，法国的一个行政大区以这一历史区域命名，称为“奥克西塔尼大区”，但它并未涵盖传统的奥克西塔尼全境。"
 PONTU_f: "本都"
 PONTU_f_desc: "本都王国是一个希腊化国家，以今土耳其境内的历史区域本都为核心，由波斯裔的米特里达梯王朝统治。该王朝可能与阿契美尼德王朝的大流士大帝有直接血缘关系。公元前281年，米特里达梯一世宣布建立本都王国，直至公元前63年被罗马共和国征服为止。本都王国在其最盛时期由米特里达梯六世统治，他征服了科尔基斯、卡帕多西亚、比提尼亚、陶里克·刻尔松尼斯的希腊殖民地，并曾在短时间内占领罗马的亚细亚行省。经过与罗马在米特里达梯战争中的长期较量，本都最终战败。"