 RHLND_formable_trigger_3_tt: "50至100年后，我们将获得#color_yellow 社会与宗教支柱#!事件，该事件将用[ShowEstatePrivilegeName('fnr_RHLND_pillar_that_is_the_church')]特权取代[ShowEstatePrivilegeName('fnr_RHLND_high_church_influence')]特权。\n我们也可以通过以下方式手动移除[ShowEstatePrivilegeName('fnr_RHLND_high_church_influence')]：要么使[ShowEstateTypeName('clergy_estate')][estate_power|e]低于#G 10%#!，要么确保至少#G 10%#!的人口属于[ShowEstateTypeName('clergy_estate')]。"
