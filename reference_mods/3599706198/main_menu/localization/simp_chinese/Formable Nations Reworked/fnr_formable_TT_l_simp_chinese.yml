 PAPAL_KINGDOM_OF_GOD_INFO: "#Y #color_yellow 教宗国#!在世界上占据着独特的地位。与其他国家不同，我们肩负着牧养#color_yellow 基督教世界#!的神圣职责，而非追求世俗统治——我们不能建立新国家或放弃我们神授的使命。然而，通过神圣的旨意与正义的征服，我们可以将精神权威转化为世俗主权，建立#color_yellow 地上天国#!——一个基督代理人的权威超越精神事务，延伸至对所有#color_yellow 天主教#!领地进行世俗统治的国度。当信徒们充分集结于我们的旗帜下并支持我们的主张时，一个事件将会呈现。#!\n\n#Y #color_yellow 教宗国#!在征服至少#G 50%#!的#color_yellow 意大利领土#!后，我们将迎来#color_pure_white “地上天国”#!事件，届时我们将被授予新宣告的#color_yellow 天国#!之下的#color_yellow 神选之王#!头衔。#!"
