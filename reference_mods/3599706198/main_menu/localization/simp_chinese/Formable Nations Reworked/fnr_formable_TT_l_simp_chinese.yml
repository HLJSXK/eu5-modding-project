 FNCEM_formable_trigger_1_tt: "成立时，[GetCountry('FRA').GetNameWithFlag]将收到一个包含两条路径的事件：\n\n※#color_yellow 历史路径：#!通过一系列历史事件，从#color_yellow 攻占巴士底狱#!开始体验拿破仑时代\n\n#color_yellow 历史命名结构：#!\n法兰西王国（截至1792年9月21日）\n法兰西第一共和国（1792年9月22日‑1799年11月9日）\n法兰西执政府（1799年11月10日‑1804年5月18日）\n法兰西第一帝国（1804年5月18日‑1814年4月6日）\n\n※#color_yellow 替代路径：#!绕过历史事件，立即在#color_yellow 拿破仑·波拿巴#!领导下建立法兰西帝国。"
 FNCEM_formable_trigger_2_tt: "我们拥有[ShowLocationName('paris')]。"
