l_simp_chinese:
 fnr_sudnyj_ludem_policy: "《人民审判法》"
 fnr_sudnyj_ludem_policy_desc: "由圣徒西里尔和梅福季撰写的《人民审判法》共三十二章，为我们的祖先提供了法律指导。虽然以现代标准来看已显陈旧，但这部基础法典可以通过扩充和调整，为平民创建统一的法律体系，取代目前治理我们领地的零散地方习俗。\n\n我们将授予贵族司法权，允许他们在各自领土内施行审判。但为防止权力滥用并确保法律适用的一致性，王室法律监督官将作为共同司法者与贵族法官协同办案。这些王室代表将监督诉讼程序、审理上诉案件，并将违法行为直接禀报领主。如此既实现了司法权下放又保障了问责机制，将地方经验与王室监督完美结合。"
 fnr_unified_rhenish_code_policy: "《莱茵统一法典》"
 fnr_unified_rhenish_code_policy_desc: "各地零散的法律条文不符合我们对国家的构想。我们将制定一部统一的法典，以理性有效治理整个疆域。"
 gmorv_professional_army_policy: "摩拉维亚的职业军队"
 gmorv_professional_army_policy_desc: "我们的军队规模并非最大，士兵、骑兵或炮兵的单兵素质也非顶尖。我们的优势在于别处：普遍执行的严苛标准。每名士兵都接受全面训练，每个单位都保持严格纪律，每位指挥官都遵循成熟条令。当敌人将精锐部队与未经训练的征召兵混编时，我们确保所有层级都具备稳定可靠的战斗力。我们最弱的营级单位也能匹敌敌军的平均水准。更高的基础标准将普通军队转化为可靠的战争工具，稳定性胜过卓越性。"
 rhlnd_rheinwachtgesetz_policy: "莱茵河守护法"
 rhlnd_rheinwachtgesetz_policy_desc: "我们在工业与防御工事上的投入已打下基础，但仅凭钢铁与石料无法赢得战争——训练有素的士兵才是关键。通过全面的军事改革与强化训练，我们将把将士锻造成一支精锐之师，足以守护家园，抵御任何来犯之敌。"
 fnr_state_unions_policy: "国家工会"
 fnr_state_unions_policy_desc: "为加强对工人的控制，我们将允许政府主导的工会存在。我们必须确保妥善管理这些工会并倾听其诉求，以免给我们自身带来任何麻烦。"