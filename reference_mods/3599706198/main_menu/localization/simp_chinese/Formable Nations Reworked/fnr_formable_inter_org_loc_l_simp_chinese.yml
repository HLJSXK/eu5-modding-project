l_simp_chinese:
 moravian_patriarchate: "摩拉维亚牧首区"
 moravian_patriarchate_name: "摩拉维亚牧首区"
 moravian_patriarchate_SEAT_NAME: "摩拉维亚自主牧首区"
 moravian_patriarchate_desc: "摩拉维亚牧首区代表着以大摩拉维亚为中心的自立东正教会，秉承圣西里尔和美多德的传统，并采用教会斯拉夫语进行礼拜仪式。"
 moravian_patriarch_name: "摩拉维亚牧首区"
 moravian_patriarchate_list_who_tt: "$WHO$是摩拉维亚宗主教区的一员，拥有$LIST$。"
 game_concept_moravian_patriarchate: "摩拉维亚牧首区"
 game_concept_moravian_patriarchates: "摩拉维亚自主教会"
 diplomatic_status_moravian_patriarchate_name: "摩拉维亚牧首区"
 diplomatic_status_moravian_patriarchate_tooltip: "#T 摩拉维亚牧首区#!\n该国是摩拉维亚牧首区的成员。"
 fnr_moravia_patriarchate_influence_hre_members: "影响神圣罗马帝国成员"
 fnr_moravia_patriarchate_influence_hre_members_desc: "通过有效的谋划与贿赂，我们或许能影响[GetInternationalOrganizationType('hre').GetName]的成员加入[GetInternationalOrganizationType('moravian_patriarchate').GetName]，并改信[ShowReligionName('orthodox')]，迫使他们同时放弃[ShowReligionName('catholic')]以及所谓的“[GetInternationalOrganizationType('hre').GetName]”。"
 fnr_moravia_patriarchate_polish_coalition: "组建波兰联盟"
 fnr_moravia_patriarchate_polish_coalition_desc: "[GetCountry('POL').GetNameWithFlag]对我们牧首区乃至整个国家的稳定构成了严重威胁。只要集结足够多的成员，我们或许能组建统一联盟，以对抗其持续扩张和边境摩擦——他们正企图侵占我们大片领土。"
 fnr_moravia_patriarchate_expand_authority: "扩张权威"
 fnr_moravia_patriarchate_expand_authority_desc: "当[GetInternationalOrganizationType('moravian_patriarchate').GetName]拥有足够多的成员时，我们将能够以类似于[GetInternationalOrganizationType('hre').GetName]内部权力不断扩张的方式，扩大我们在该组织中的权威——甚至可能利用这种获得的权威，宣布我们的统治者成为名副其实的皇帝，直接与[GetInternationalOrganizationType('hre').GetName]历史上所拥有的影响力相抗衡。"
 fnr_moravia_patriarchate_unificatio_unionis: "统一联盟"
 fnr_moravia_patriarchate_unificatio_unionis_desc: "通过加冕[GetInternationalOrganizationType('moravian_patriarchate').GetName]的领袖为[ShowCountryRankName('rank_empire')]，我们将建立与[GetInternationalOrganizationType('hre').GetName]抗衡的体系，从而解锁独特的事件链。该事件链允许我们为[GetInternationalOrganizationType('moravian_patriarchate').GetName]制定全新的法律与政策，其终极目标可能是将整个国家彻底重组为#color_yellow 斯拉夫帝国#!，使[GetInternationalOrganizationType('moravian_patriarchate').GetName]的领袖成为[GetInternationalOrganizationType('hre').GetName]的直接对手。"
 fnr_cc_language_laws: "语言法"
 fnr_cc_language_laws_desc: "[GetInternationalOrganizationType('moravian_patriarchate').GetName]拥有独特权力，可以决定所有成员的官方[liturgical_language|e]和[court_language|e]，但这必须通过正式法律程序予以确立。"
 fnr_church_slavoric_policy: "教会斯拉夫语"
 fnr_church_slavoric_policy_desc: "圣徒西里尔与美多德兄弟将基督教传入摩拉维亚，并创立古教会斯拉夫语，使我们的子民得以用母语敬拜上帝。有别于其他将经文局限于拉丁语的教会，我们全民识字，让教会斯拉夫语同时成为我们的礼仪语言与行政语言。如今，我们重拾这一神圣传统。"
 MORAVIAN_AUTHORITY_DISPLAY: "$VAL$"
 papal_hre: "神圣罗马帝国"
 papal_hre_name: "神圣罗马帝国"
 papal_hre_desc: "神圣同盟与神圣罗马帝国不同，它存在纯粹是为了捍卫基督教世界。枢机主教们以牧羊人而非君主的身份治理领地。神圣王国向教宗而非皇帝宣誓效忠。这个神权联盟在教宗直接指挥下组织十字军、打击异端并保护信徒。旧帝国以宗教语言包装日耳曼政治，而这个同盟则以军事力量践行神的旨意。"