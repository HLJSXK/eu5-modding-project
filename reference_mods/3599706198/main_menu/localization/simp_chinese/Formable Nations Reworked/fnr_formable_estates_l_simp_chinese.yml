 nobles_estate_LUSIT_fidalgo: "伊达尔戈"
 burgers_estate_LUSIT_burgueses: "资产阶级"
 clergy_estate_LUSIT_clerigo: "牧师"
 commoners_estate_LUSIT_compartes: "康帕特斯"
 fnr_RHLND_agricultural_concessions_and_investments: "农业特许权与投资"
 fnr_RHLND_agricultural_concessions_and_investments_desc: "为了支撑庞大的人口，我们将向农民做出让步，并支持他们在田间的辛勤劳作。授予他们粮食生产自主权虽会使其掌握重要权力，但我们可以通过提高税收来平衡这一局面。"
 fnr_RHLND_innovative_investments_weavery_tannery: "纺织与制革业的创新投资"
 fnr_RHLND_innovative_investments_weavery_tannery_desc: "我们已经见识过固守旧法会带来什么后果。为了确保人民的稳定与富足，我们必须引入这些新方法。"
 fnr_RHLND_squabbles_of_the_nobility: "贵族纷争"
 fnr_RHLND_squabbles_of_the_nobility_desc: "尽管在纸面上我们是一个完整的国家，但事实却大相径庭。在莱茵兰地区冲突的历史源远流长，贵族们之间的争执与相互干涉只增不减。我们必须迅速找到解决之道。\n\n[ShowEstatePrivilegeName('fnr_RHLND_squabbles_of_the_nobility')] 将在#color_yellow “前进之路”#!事件中被移除，并由[ShowEstatePrivilegeName('fnr_RHLND_cooperative_nobles')]取代。"
 fnr_RHLND_cooperative_nobles: "贵族合作"
 fnr_RHLND_cooperative_nobles_desc: "经过不懈努力，长期困扰我国贵族阶层的纷争终于得以平息。曾经因野心角逐与历史积怨而分裂的贵族阶层，如今已团结一致，共同支持王权与国家利益。"
 fnr_RHLND_high_church_influence: "至高教会影响力"
 fnr_RHLND_high_church_influence_desc: "莱茵河畔众多的采邑主教区与修道院，已将教会铸就为一股不可小觑的政治势力。尽管教会的权柄尚有其用武之地，但我们绝不能再任由其掣肘我方的主权。我们必须有计划地削弱其干预国事的能力。\n\n我们可以通过达成特定条件来手动撤销此特权，但这将#R 极大激怒#![ShowEstateTypeName('clergy_estate')]，从而可能引发#color_yellow 冲突#!甚至#R 叛乱#!；反之，若我们静待#color_yellow “社会与宗教的支柱”#!事件发生，则能以和平方式收场，并将[ShowEstatePrivilegeName('fnr_RHLND_high_church_influence')]替换为[ShowEstatePrivilegeName('fnr_RHLND_pillar_that_is_the_church')]。"
 fnr_RHLND_pillar_that_is_the_church: "教会这一支柱"
 fnr_RHLND_pillar_that_is_the_church_desc: "教会昔日的权势与影响力已成过眼云烟。即便我们想将其彻底铲除也绝非易事，但如今已无此必要。我们将利用其身份，使其成为支撑我们国家文化与神学的脊梁。"
 fnr_RHLND_bier_das_blut_des_volkes: "啤酒——人民的血液"
 fnr_RHLND_bier_das_blut_des_volkes_desc: "自古以来，我们德意志人便以世间顶尖的酿酒师而闻名。鉴于啤酒已成为我们要身份认同中不可或缺的一部分，我们将对其产业投入重金并改良酿造工艺，确保我们的国度只供应最上乘的佳酿。"
 fnr_great_moravia_winemakers_of_balaton: "巴拉顿的美酒"
 fnr_great_moravia_winemakers_of_balaton_desc: "巴拉顿湖的佳酿，足以跻身欧洲顶尖之列。 唯有勃艮第、意大利与那遥远的格鲁吉亚所产之珍品，方能与其媲美。我们那得天独厚的火山土壤与宜人气候，孕育出了令全欧鉴赏家都为之垂涎的葡萄。"
 fnr_great_moravia_druzhina: "伙伴卫队"
 fnr_great_moravia_druzhina_desc: "在往昔岁月里，权贵与王公们常豢养着被称为“伙伴卫队”的私人卫队。这是一支由领主亲自供养且训练有素的精锐武力。 通过允许贵族自费维持一定规模的武装随从，我们将复兴这一古老的传统。当然，这些职业军人必须时刻准备响应王室的征召，投身沙场。早在10世纪，阿拉伯学者易卜拉欣·伊本·雅库布便曾记载，波兰大公麾下拥有一支多达3000人的伙伴卫队，这足以佐证该军事制度的卓越价值。"
 fnr_great_moravia_shepherds: "农牧传统"
 fnr_great_moravia_shepherds_desc: "自亘古以来，这片土地便以乡野为主，这种特质也深深烙印在我们的子民身上。绝大多数人聚居在紧密相连的村落与社区之中，邻里乡亲皆彼此熟识。 在这里，最为普遍的营生便是务农与放牧，农户耕作于肥沃的平原，牧民则游牧于崇山峻岭与幽深河谷之间。妄图改变这种根深蒂固的生活方式，实乃愚不可及。"
 fnr_great_moravia_laborer_protection: "劳工保护"
 fnr_great_moravia_laborer_protection_desc: "如今，劳工之于国家经济，恰如农夫之于田野般至关重要。他们在作坊、矿井与手工工场中终日劳作，生产着为我们创造财富的商品。 我们决定将王室的庇护延伸至这些工人身上，为他们提供免受过度剥削的基本保障，并开启反抗虐待的法律申诉之门。这些微不足道的让步，不仅能确保我们拥有一支顺从且高产的劳动力大军，更能防患于未然，避免那曾令敌国陷入瘫痪的动乱在此重演。"
 fnr_HNSLG_federal_trade_monopolies: "联邦贸易垄断"
 fnr_HNSLG_federal_trade_monopolies_desc: "授予商人阶层在我们领土内对战略出口商品的专属控制权，与旧商站制度下垄断仅适用于外国飞地不同，我们的领土允许在整个省份范围内实施贸易限制。波美拉尼亚的木材、普鲁士的谷物、荷尔斯泰因的鱼类所有货物都将通过汉萨商人流通，他们以缴纳丰厚税款换取有保障的利润。"
 fnr_HNSLG_urban_development_authority: "城镇发展局"
 fnr_HNSLG_urban_development_authority_desc: "授权富裕商人主导城市扩张与基础设施建设，商人阶层获准动用私人资本修建市场、港口和仓库，将我们征服的省份转变为繁荣的商业中心。不同于旧体系下办事处作为孤立据点存在于外国城市的模式，如今我们重塑整个城市景观以服务我们的经济愿景。"
 fnr_HNSLG_integrated_guild_regulations: "行会综合规章"
 fnr_HNSLG_integrated_guild_regulations_desc: "在所有领地内，由商人行会强制执行统一的生产标准与质量控制。昔日汉萨同盟仅能通过商站监管流通货物，而今我们的领土管辖权实现了对制造业的全面监督，确保所有带有汉萨印章的产品皆符合严苛标准。此举既捍卫我们的商业信誉，亦能杜绝成员城市间的不正当竞争。"
 fnr_HNSLG_territorial_fleet_requisition: "领土舰队征用"
 fnr_HNSLG_territorial_fleet_requisition_desc: "要求商人行会根据其财富比例，向我国海军提供船只。与旧时城市可能拒绝海军合作的自愿制度不同，我们的领土政府能够强制参与集体防御。作为交换，参与的商人将优先获得新征服港口的准入权，并免除某些港口费用，从而确保私人利益与国家安全保持一致。"
 fnr_HNSLG_provincial_trading_companies: "地方贸易公司"
 fnr_HNSLG_provincial_trading_companies_desc: "授权成立拥有特定征服区域贸易垄断权的合股贸易公司。这些属地公司的运作方式不同于旧商站网络——它们不再维持外国城市的飞地，而是将整个省份作为经济企业进行管理。商人股东从区域贸易中获利，同时承担地方行政与发展的成本。"