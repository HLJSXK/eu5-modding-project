l_simp_chinese:
 swedish_administration_major: "瑞典王室的行政管理"
 swedish_administration_major_desc: "瑞典与挪威的统一需要对两国贵族作出重大让步。然而，通过将这些特权编纂成典并将贵族支持与王室利益绑定，我们可以利用他们维护这些特殊权利的诉求。通过保障贵族特权换取他们的忠诚和国家建设资源，最终实现王权的巩固。"
 norwegian_administration_minor: "挪威王室行政机构"
 norwegian_administration_minor_desc: "与瑞典的联合使挪威贵族在联合王国中获得了前所未有的影响力。虽然授予这些特权会削弱我们的自主权，但挪威王室可以利用贵族来巩固自身地位。通过保障贵族的地位和权利，我们能够确保贵族支持王室，并让挪威的利益在联盟最高层面得到代表。"
 swedish_administration_minor: "瑞典王室的行政管理"
 swedish_administration_minor_desc: "瑞典与挪威的统一需要对两国贵族作出重大让步。然而，通过将这些特权编纂成典并将贵族支持与王室利益绑定，我们可以利用他们维护这些特殊权利的诉求。通过保障贵族特权换取他们的忠诚和国家建设资源，最终实现王权的巩固。"
 norwegian_administration_major: "挪威王室行政机构"
 norwegian_administration_major_desc: "与瑞典的联合使挪威贵族在联合王国中获得了前所未有的影响力。虽然授予这些特权会削弱我们的自主权，但挪威王室可以利用贵族来巩固自身地位。通过保障贵族的地位和权利，我们能够确保贵族支持王室，并让挪威的利益在联盟最高层面得到代表。"
 fnr_GSCTL_rheinkonfoderation: "莱茵邦联"
 fnr_GSCTL_rheinkonfoderation_desc: "历经莱茵兰地区数个世纪的冲突，无论是我们同胞之间还是与外来者的对抗，我们终于建立起一个统一的国家。由于国家尚处雏形，目前更像是一个松散的邦联。这意味着如果我们不能稳定我们的领地，它很容易就会分崩离析。\n\n我们可以在#color_yellow 莱茵兰#!成立后20至30年内随机触发的#color_yellow 前进之路#!事件中，选择[ShowGovernmentReformName('fnr_GSCTL_das_rheinische_konigreich')]或[ShowGovernmentReformName('fnr_GSCTL_der_rheinbund')]，从而#G 降低#!此项改革带来的#R 负面#!修正。\n\n若在#color_yellow 前进之路#!事件触发前的任何时刻，我们的[stability|e]降至#R -75#!，将会引发一场可能瓦解这个松散邦联的灾难。"
 fnr_GSCTL_das_rheinische_konigreich: "莱茵王国"
 fnr_GSCTL_das_rheinische_konigreich_desc: "莱茵王国在市民议会代表权与强大的中央集权之间取得了平衡。这种双重策略提升了行政效率，促进了文化包容，并为持续发展与繁荣提供了必要的制度框架。"
 fnr_GSCTL_der_rheinbund: "莱茵邦联"
 fnr_GSCTL_der_rheinbund_desc: "莱茵邦联通过各阶层共同治理运作。市民与农民均拥有议会席位，同时分散的行政管理赋予成员国高度自治权。这种邦联模式优先考虑高效治理与文化包容性，而非中央集权的王室权威。"
 fnr_GSCTL_rhenish_commerce_diplomatic_network: "莱茵商业与外交网络"
 fnr_GSCTL_rhenish_commerce_diplomatic_network_desc: "随着莱茵河贸易地位的日益重要，我们必须建立一个网络来管理贸易，并处理与合作伙伴及潜在对手的关系，这些对手可能试图破坏我们对该地区的掌控。"
 fnr_GSCTL_die_wacht_am_rhein: "莱茵河卫士"
 fnr_GSCTL_die_wacht_am_rhein_desc: "显然，战争已经改变。因此，我们必须重新调整我们的军事能力。既然工业与防御工事是根基，我们将致力于加强和扩展这些方面。"
 fnr_GSCTL_rhenish_manufacturing: "莱茵制造业"
 fnr_GSCTL_rhenish_manufacturing_desc: "没有莱茵河，就没有我们的今天。我们必须善加利用它及其赋予的优势，这条河流是我们存在的根基。因此，我们将借助它提升生产能力，并连通我们的领地。"
 fnr_CAROL_centers_of_realm: "领地中心"
 fnr_CAROL_centers_of_realm_desc: "古时，我们的领地并无固定都城。君王在全国各地设有行宫，视情势所需而移居驻跸。我们将复兴这一传统，设立一座主都及若干陪都。通过一年四季巡幸于各都城之间，君主的威仪将遍及整个王国。此举使我们得以亲临疆土视察、直面地方关切，并通过定期的巡幸维系边远省份的忠诚。"
 fnr_HNSLG_territorial_hanseatic_federation: "汉萨领土联邦"
 fnr_HNSLG_territorial_hanseatic_federation_desc: "散落各地的贸易站与松散联盟的时代已经终结。我们已将汉萨同盟从一个由自治商人飞地组成的网络，转型为一个统一的领土国家。成员城市如今宣誓效忠的不再仅是共同的商业利益，更是一个能以军队而非账簿来保卫国土的主权联邦。尽管贸易仍是我们的优势，但我们现在拥有的政治凝聚力和军事力量，足以让我们通过征服，而非仅凭契约来贯彻我们的意志。"
 fnr_HNSLG_centralized_merchant_republic: "集权商业共和国"
 fnr_HNSLG_centralized_merchant_republic_desc: "政治权力已集中于大议会手中，其成员由核心城市的各大商业家族选出。不同于旧时各城皆握有否决权的汉萨大会，我们的新政府能够颁布具有约束力的法律、征收统一税赋，并统辖集体的军事力量。曾经竞逐私利的商业巨贾，如今作为统一国家的统治者通力合作；他们的财富与才智正致力于国家的繁荣，而非仅局限于一城的兴旺。"
 fnr_HNSLG_unified_baltic_command: "波罗的海联合指挥部"
 fnr_HNSLG_unified_baltic_command_desc: "我们的商船队不再悬挂各城的旗帜，而是作为一支统一的国家海军航行。吕贝克、汉堡与但泽分散的海上民兵已被整合为一支职业海军力量，足以为波罗的海与北海投射军力。昔日我们依赖武装商船与雇佣私掠船，如今我们维持着常备战舰巡视海疆，并凭借优势火力确立我们的商业霸权。"
 fnr_HNSLG_guild_integration_reforms: "行会整合改革"
 fnr_HNSLG_guild_integration_reforms_desc: "昔日执掌各城的强大商人行会，如今已化身为联邦的经济部委。行会首领不仅就贸易政策向大议会建言，还负责协调全境生产，并确立汉萨商品的质量标准。通过将行会的专业才智引入国家行政体系，而非耗费于狭隘的竞争，我们既实现了经济效率的最大化，又避免了成员城市间破坏性的内耗。"
 fnr_GMORV_heirs_of_nitra: "尼特拉的继承人"
 fnr_GMORV_heirs_of_nitra_desc: "依照古老传统，长子与继承人会被送往尼特拉——这一位于斯洛伐克的尼特拉公国旧都，通过亲自统治该地来研习治国之道。在那里，他们将远离宫廷的纷扰，在治理这一战略重地的同时，掌握行政、司法与统兵的艺术。这段作为统治者的历练，确保了未来的君主在登基之前，便能深谙臣民之需与治国之难。如今我们恢复这一古制，旨在培养英明的君主，并确保王国的繁荣昌盛。"
 fnr_royal_free_cities: "皇家自由城市"
 fnr_royal_free_cities_desc: "为了遏制贵族的势力，我们将赋予关键城市及其居民特权，允许他们在缴纳更多税赋的前提下，自由掌控城市的经济与行政。通过建立这些皇家自由城市，我们既能防止贵族染指重要的商业与生产中心，又能提振城市繁荣、充实国库。它们之所以“自由”，在于其居民拥有自治之权；之所以“皇家”，则因其直接受命于王权之下。"
 fnr_royal_mint_cities: "皇家铸币城市（Bánské Mestá）"
 fnr_royal_mint_cities_desc: "我们将把铸造国币的专营权，授予那些位于北部领土、邻近富饶金银矿藏的特定城市。这些矿业城市的名称中带有前缀“Bánske”（源自词根“baňa”，意为“矿”），它们将在王室的严密监管下铸造本国货币。通过将铸币作业集中于这些专业中心，我们既能确保钱币的成色与真伪，又能大幅减少伪币的流通。矿业城镇的繁荣，将与我们货币体系的稳健信誉相得益彰。"
 fnr_shepherds_farmers_culture: "农牧传统"
 fnr_shepherds_farmers_culture_desc: "自古以来，我们的土地便以乡村为主，这一特质也深深烙印在人民的性格之中。大多数人生活在关系紧密的村社里，邻里之间彼此熟识。在常见的行当中，最重要的莫过于农夫与牧人：农家在肥沃的平原耕耘，牧民则在山峦谷地间放牧。这绝非单纯的生计，而是世代相传的古老生活方式。若要铲除这些根深蒂固的传统，不仅愚蠢至极，更将对我们的社会基石造成毁灭性打击。"
 fnr_great_moravia_church_slavic: "教会斯拉夫语"
 fnr_great_moravia_church_slavic_desc: "9世纪时，西里尔与美多德兄弟创制了古教会斯拉夫语，旨在让摩拉维亚人能用本族语言进行礼拜。这种用于经文与行政的语言，是大摩拉维亚黄金时代的标志。通过在圣仪与治国中复兴教会斯拉夫语，我们不仅尊崇了先贤，更拥抱了我们的东正教传统。"
 fnr_GMORV_council_of_free_moravians: "自由摩拉维亚人议会"
 fnr_GMORV_council_of_free_moravians_desc: "国王与其被称为“克涅兹”的伯爵们共设议会，后者构成了上层贵族阶级；而下层贵族则被称为“亲兵”或“武士”。在此议会中，国王是“诸伯之首”，他将治理土地的职责授予上层贵族，而下层贵族则受命管理城市与“格拉迪斯科”（即要塞）。他们在各自的领地内享有行政与司法权，并向国王缴纳贡赋。"
 fnr_GMORV_palantir: "宫相"
 fnr_GMORV_palantir_desc: "宫相是大摩拉维亚最高级别的行政职衔，兼具半贵族性质。宫相负责掌管宫廷财政、治理国家，并有权在君主缺席时代行君权。这一职位享有极高的威望，它不仅象征着统治者的深厚信任，也彰显了任职者的卓越才能。"
 fnr_GMORV_moravian_unitary_federation: "摩拉维亚统一联邦"
 fnr_GMORV_moravian_unitary_federation_desc: "我们的领土囊括了众多民族——波希米亚人、摩拉维亚人、斯洛伐克人、德意志人以及其他族群。若要王国繁荣昌盛，我们必须尊重这些文化。我们建立了一套基于族裔的行省制度，各民族可选举自己的总督，并向我们的议会与内阁各派遣两名代表。为确保治理有方，我们强制实行儿童义务教育，并为天资卓越者提供大学津贴。通过代议权与教育，我们多元的王国终将实现和谐与繁荣。"
 fnr_BISHE_imperial_federation: "帝国联邦"
 fnr_BISHE_imperial_federation_desc: "帝国联邦运动旨在将我们辽阔的帝国转型为一个统一的联邦制国家。各殖民地的立法机构将选派代表前往伦敦的帝国议会，从而通过共同治理将各自治领与不列颠紧密维系在一起，而非仅凭对王室的效忠。\n\n这一宏伟的改制计划有望在帝国当局的统一调度下，充分整合各领地的人力、资源与忠诚，发挥其全部潜力。"
 fnr_BISHE_accelerated_domain_status: "加速自治领地位"
 fnr_BISHE_accelerated_domain_status_desc: "与其维持严苛的殖民控制，我们不如赋予成熟的定居地“自治领”的地位。这些领土将在获得内部自治权的同时，继续作为帝国的忠诚一员，在王权治下自主管理其事务。\n\n这一政策承认：相比远方的管理者，殖民地人民能更有效地治理自身；此举将巩固而非削弱帝国的纽带。"
 fnr_BISHE_economic_development_charter: "经济发展宪章"
 fnr_BISHE_economic_development_charter_desc: "帝国的繁荣，仰赖于开发完善且富庶的殖民地。通过对铁路、港口与工场等殖民地基础设施的系统性投资，我们将把单纯的资源产地转型为繁荣的经济伙伴。伴随殖民地生产与贸易的扩张，流入帝国国库的税收亦将水涨船高。此项开发将同时惠及殖民地与宗主国。"
 fnr_BISHE_racial_equality_act: "种族平等法案"
 fnr_BISHE_racial_equality_act_desc: "数百年的帝国扩张，已将多元族群纳入不列颠的治下。这项开明的立法赋予所有臣民平等的法律地位，无论其出身如何；它废除了那些曾滋生怨恨与叛乱的歧视性法律。统一的帝国无法立足于不平等之上。当所有臣民在不列颠法律下皆获公正待遇时，忠诚自会油然而生；帝国的文化多样性也将化作力量的源泉，而非分裂的祸根。"
 fnr_BISHE_constitutional_monarchy_of_nations: "万国君主立宪制"
 fnr_BISHE_constitutional_monarchy_of_nations_desc: "大英帝国已转型为一个由自治国家组成的自愿联合体，各成员国通过王权与共同利益紧密维系。各自治领对内部事务保有主权，同时在防务、贸易与外交政策上通力合作。\n\n这一英联邦模式摒弃了帝国支配，转而追求平等的伙伴关系；它通过合作而非强迫，维系着英国的影响力。王权将长存，但不再作为专制统治的象征，而是作为我们共同传承的纽带。"
 fnr_GSCTL_nova_scotian_charter: "新斯科舍特许状"
 fnr_GSCTL_nova_scotian_charter_desc: "苏格兰的未来在于大西洋彼岸。凭借皇家特许状与有组织的垦殖，我们要于北美的蛮荒之地建立一个新的苏格兰。纽芬兰的渔场与圣劳伦斯河谷，终将成为苏格兰基业的坚实堡垒。当英格兰还在那些如一盘散沙般的冒险中笨拙摸索时，我们要将长老会的严律与高地人的坚韧，注入这拓殖大业之中。"
 fnr_ASHNG_hungarian_compromise: "匈牙利妥协"
 fnr_ASHNG_hungarian_compromise_desc: "匈牙利王国保留了其古老的宪法与议会传统，马扎尔贵族在内部事务上享有高度自治。尽管我们共戴一君，并统合了军队与外交政策，但匈牙利仍通过其位于布达佩斯的议会实行自治。这一微妙的安排在维系帝国统一的同时，也保全了匈牙利人的自尊；但这不仅赋予了马扎尔精英过大的权势，也限制了我们作为中央集权国家施政的能力。"
 fnr_ASHNG_imperial_and_royal_administration: "帝国与皇家行政"
 fnr_ASHNG_imperial_and_royal_administration_desc: "我们的帝国是由德意志人、匈牙利人、捷克人、波兰人、克罗地亚人、意大利人、罗马尼亚人、斯洛伐克人、斯洛文尼亚人、鲁塞尼亚人及其他民族交织而成的集合体——涵盖十一个主要民族，使用八种语言，信仰四种宗教。相比于强行推行单一制，我们更推崇行政上的灵活性。各王冠领地皆保留了其传统的体制、法律与语言。这种务实的宽容虽遏制了民族主义叛乱，却也催生了拜占庭般错综复杂的官僚体系，在此体系下，每一项决策都必须在十几种相互博弈的利益之间进行谈判。"