l_simp_chinese:
 AUSEM_habsburg_empire: "哈布斯堡帝国"
 AUSEM_habsburg_empire_desc: "哈布斯堡帝国通过巧妙平衡自治与中央集权，治理着无数文化，包容多样性而非强求统一。我们凭借数世纪战略联姻与结盟建立的外交声誉，使谈判与征服同样有效。与此同时，专业化的行政管理通过卓越的组织与后勤能力降低了步兵成本，在维持军事实力的同时避免了财政崩溃。"
 fnr_german_imperial_roads: "帝国道路网络"
 fnr_german_imperial_roads_desc: "数个世纪以来，欧洲腹地的道路不断修建、拓展与完善。从罗马时代直至今日，纵横德意志境内的诸多帝国大道不仅使商贸往来与人员流动更为便捷通畅，更在物流运输——特别是军队调度方面——展现出无可替代的战略价值。"
 fnr_german_fair_towns: "帝国贸易博览会城市"
 fnr_german_fair_towns_desc: "由皇帝陛下亲自授予少数帝国城市的重大特权，允许众多商人聚集并参与全欧洲规模最大的市场活动，这些城市无疑是帝国商业的核心所在。这些大型市场的集中性特质，使得商人们能在充满自由与多样性的环境中更便捷地规划交易、洽谈合作，从而获得更广泛的商品渠道。"
 fnr_german_biedermeier: "比德迈尔时期"
 fnr_german_biedermeier_desc: "比德迈尔时期标志着社会保守思潮的兴起，源自上层阶级对往昔的怀念。这导致许多自由思考与创造活动只能在私人空间中进行，远离公众视野。虽然这无意中强化了市民阶级的文化认同，却也迫使许多自由思想者移居海外，继续他们的追求。"
 fnr_dutch_education: "荷兰语教育"
 fnr_dutch_education_desc: "尽管我国一直以来都在所有阶层中享有较高的识字率，但在我们面前正在形成的世界中，这一优势变得更加明显。只有那些理解有限的人才不会利用这一优势，并加以扩大。"
 HORDE_domination_of_the_steppes: "称霸草原"
 HORDE_domination_of_the_steppes_desc: "我们是草原帝国最后的正统继承者——是将整片草原统一于同一面旗帜下的最后一支游牧部落。旁人皆已定居城郭，背弃了祖先的道路，唯有我们仍旧主宰着骑兵作战。我们的战士以马鞍为家，大军行进疾如风，战马专为耐力与厮杀而生。在开阔的草原上，火炮与工事毫无意义，步兵也绝无可能捕获他们追之不及的敌人。然而，游牧传统也令我们难以长久定居——我们不筑宏伟城池，也不以此广辟良田。草原负责供养，部落负责征服，而定居生活只会消磨战士的斗志。"
 HPEMP_cavalric_values: "尚马之风"
 HPEMP_cavalric_values_desc: "嚈哒人是马背上的民族，生来便在马上驰骋征战。每一位战士自幼便习得在疾驰中弯弓射箭，以完美的阵型回旋冲锋，仅凭战马与兵刃便能在行伍中生存数周。我军铁骑动若雷霆，在敌军组织反击前便已遁去，凭借卓越的机动性主宰着中亚的广袤疆域。步兵只能龟缩于堡垒之中，而我们掌控着开阔的草原。战马不仅是战争的工具——它是我们力量的基石，也是衡量战士价值的尺度。"
 HPEMP_hunnic_traditions: "匈人传统"
 HPEMP_hunnic_traditions_desc: "尽管那些只能目睹我们铁骑之威的定居民族称我们为“白匈奴”，但我们其实是数百年来横扫草原的那些伟大游牧帝国的正统继承者。从昔日的匈奴到阿提拉麾下的匈人，我们的祖先早已精通草原战争的艺术：强力的复合弓、诡诈的佯败战术、迅捷的机动能力，以及即便部族林立却仍能合力一击的严明纪律。这些匈人传统——历经数代人与波斯大军及印度诸国的征伐锤炼——使我们成为了世上最令人胆寒的骑兵劲旅。帝国终有兴衰，唯草原战士之道长存。"
 RUFED_federalized_pseudo_democratic_values: "联邦制伪民主价值观"
 RUFED_federalized_pseudo_democratic_values_desc: "俄罗斯联邦保留了民主制度的架构——选举、议会、地方政府及宪法权利——却同时确保一切结果皆在掌控之中，不出所料。联邦主体享有名义上的自治权，公民参与定期投票，反对党在杜马中占有一席之地，新闻媒体亦可在心照不宣的界限内自由运作。然而，在这层民主表象之下，权力通过非正式网络流动，关键决策往往制定于官方渠道之外，而任何对中央权威的挑战都会遭到迅速回击。这一体系既提供了民主制度所带来的国际合法性与国内稳定，又摒弃了其不可预测的风险。民众参与政治，地方实行自治，异议也得到容忍——只要这一切都不威胁到既定秩序。民主确乎存在，但这是受控的、被引导的、主权至上的民主。"
 JGLNN_monarchy_of_nations: "诸国君主制"
 JGLNN_monarchy_of_nations_desc: "雅盖隆王朝的疆域将波兰人、立陶宛人、鲁塞尼亚人、捷克人和匈牙利人团结在同一顶王冠之下。与那些建立在征服和强制同化之上的帝国不同，我们的联盟保留了各个成员国独特的身份认同、法律与特权。波兰的瑟姆、立陶宛大公国、波希米亚的等级议会以及匈牙利的国会——所有这些机构都保留了其传统的权利与代表权。这个由共同君主制而非中央集权暴政所维系的诸国联邦，在欧洲创造了一种独特的政体：一个通过协商而非压迫来治理，并通过尊重多样性来维持统一的帝国。"
 RUSEM_tsarist_absolutism: "沙皇专制主义"
 RUSEM_tsarist_absolutism_desc: "沙皇不仅是一国之君，更是专制君主——是唯独对上帝负责的至高主宰。没有议会能掣肘他的意志，没有等级能局限他的权力，亦无宪章能约束他的权威。沙皇所诏即为法律，沙皇所令必被遵行，而抗命者将面临鞭笞或流放西伯利亚的命运。这种集于皇权一身的高度集权，消除了削弱他国的派系倾轧与政治瘫痪。这里没有贵族阻挠改革，没有议会延误动员，也没有相互冲突的管辖权来制造混乱。俄罗斯以此单一的目标行动，因为只有一个意志在指引着它——那就是沙皇的意志，绝对且不容置喙。"
 SOVET_rise_of_the_proletariat: "无产阶级的崛起"
 SOVET_rise_of_the_proletariat_desc: "十月革命推翻了数百年来剥削俄国工农的寄生阶级。那些靠压榨农民为生的贵族、从工厂工人身上榨取剩余价值的资产阶级资本家、以及宣扬顺从尘世主子的教士——通通被无产阶级专政一扫而空。在工人的国家里，没有贵族，没有资本家，没有教士——只有共同劳动建设社会主义的同志。这种群众的解放释放出了前所未有的动员力量。工人们再也不会为了沙皇的野心或地主的贪婪而白白送死。如今，他们为自己的国家、自己的未来而战，且是心甘情愿地投身战斗，其规模之大，绝非任何封建政权所能征召。"
 UKRNE_a_home_for_ukrainians: "乌克兰人的家园"
 UKRNE_a_home_for_ukrainians_desc: "乌克兰长久以来便是波兰、俄国、奥斯曼与奥地利诸帝国争夺的边疆，它们皆对我们肥沃的平原宣示主权。然而，历经数个世纪的异族统治，乌克兰人民坚韧不拔，在村落与草原间守护着原本的语言与身份认同。如今，我们将建立一个真正的家园：乌克兰人将在此当家作主，并欢迎所有愿投身我邦之人。哥萨克人接纳难民与流亡者进入谢契的传统将在我们的国策中延续，而我们传奇的骑兵亦将凭举世无双的技艺捍卫乌克兰的疆土。"
 UKRNE_breadbasket_of_europe: "欧洲粮仓"
 UKRNE_breadbasket_of_europe_desc: "乌克兰的黑土是世界上最肥沃的土壤之一，所产谷物之丰，不仅能养活我们自己，更供应了半个欧洲。一望无际的麦田在草原上铺展开来，每逢收获季粮仓便盈满充溢，商人们则将粮食运往远方的市场。这份农业财富是乌克兰最宝贵的资产，也是我们繁荣昌盛的保障。哪怕他国饥馑遍野，乌克兰仍能饱食无忧——并从那些食不果腹者手中赚取利润。"
 ESLAV_eastern_slavic_unifier: "东斯拉夫统一者"
 ESLAV_eastern_slavic_unifier_desc: "东斯拉夫各族——鲁塞尼亚人、莫斯科人与白俄罗斯人——虽长久以来被政治疆界所阻隔，却因语言、信仰与共同的血脉而紧密相连。通过征服与外交，我们将这些离散的部族重新统一于同一个国家之下。蒙古入侵曾将一切打碎，而今我们将其重铸。我们的统治横跨波罗的海至乌拉尔山脉，从北方森林延伸至黑海草原，将所有东斯拉夫人凝聚为一个民族。"
 KYVRU_restoration_of_the_original_rus: "光复初始罗斯"
 KYVRU_restoration_of_the_original_rus_desc: "基辅曾是罗斯众城之母，是东斯拉夫文明与东正教信仰的摇篮。昔日，王公们曾以此为中心，统治着一片横跨东方林海与川泽的广袤疆域。尽管蒙古入侵粉碎了这一黄金时代，致使罗斯分崩离析，沦为相互攻伐的诸公国，但如今我们已重获先祖基业。基辅罗斯的复兴不仅意味着国家的重生，更意味着一种传承的苏醒——即重现罗斯民族在这一切肇始之城治下的原始统一。"
 ARABE_united_tribes_of_arabia: "阿拉伯诸部联盟"
 ARABE_united_tribes_of_arabia_desc: "数个世纪以来，阿拉伯诸部为了水源、牧场与荣誉争斗不休。通过征服与外交，我们将这些桀骜不驯的氏族凝聚为一个统一的阿拉伯国度。部落征召兵听命于中央，商路在各地间畅通无阻，而共同的阿拉伯认同已凌驾于狭隘的地方忠诚之上。昔日四分五裂的沙漠诸部，如今已步调一致，齐心进军。"
 ISREL_jewish_historical_populace: "犹太历史族群"
 ISREL_jewish_historical_populace_desc: "历经数千年的大流散，犹太民族终于回归其祖先的故土。散居于欧洲、北非及中东各地的犹太社群，如今重返这片列祖列宗曾熟知的土地定居。这场大回归汇聚了形形色色的技能、语言与传统——无论是塞法迪商人、阿什肯纳兹学者，还是米兹拉希农夫——皆因共同的文化遗产与重建失落家园的决心而紧密相连。"
 UNARR_egyptian_syrian_alliance: "埃及-叙利亚联盟"
 UNARR_egyptian_syrian_alliance_desc: "身为阿拉伯世界天然领袖的埃及与叙利亚，如今汇聚于同一面旗帜之下。埃及的行政管理能力与叙利亚的商业网络及战略地位相结合，建立起一个足以抵御外来统治的泛阿拉伯国家。尽管相隔茫茫大漠，尼罗河与黎凡特如今却共尊同一个政府，共享同一个关于阿拉伯统一与独立的愿景。"
 UMAYA_caliphal_hegemony: "哈里发霸权"
 UMAYA_caliphal_hegemony_desc: "哈里发不仅是政治统治者，更是信士的长官，是先知权威的继承者。在伍麦叶王朝的统治下，宗教法统与世俗权力完全融为一体。非穆斯林臣民需缴纳吉兹亚税并接受齐米身份，而信徒则享有特权地位。通过这种信仰与治国之术的结合，哈里发国在整个伊斯兰世界确立了霸权。"
 CSPNA_cisalpine_legitimacy: "山南政权合法性"
 CSPNA_cisalpine_legitimacy_desc: "奇萨尔皮纳共和国诞生于法国大革命的狂热浪潮之中，是拿破仑大军一手扶植的姊妹共和国。然而，这一起初源于外来强权的产物，如今已演变为真正的民族认同。北意大利的爱国者们依托共和体制实行自治，在法国革命理想与意大利本土传统之间寻求平衡。尽管我们源于征服，但如今这一政权的合法性已建立在民众支持与有效治理的基础之上。"
 LMBYV_austrian_influence: "奥地利的影响力"
 LMBYV_austrian_influence_desc: "伦巴第-威尼西亚曾是奥地利帝国的领地，其主权已完全纳入哈布斯堡的行政体系之中。维也纳高效的官僚机构带来了秩序与发展，却也牺牲了意大利人的自治权。奥地利式的治理手段实现了基础设施的现代化与行政的合理化，而奥地利的驻军则确保了民众的顺从。我们虽受益于哈布斯堡的资源与庇护，却也因身处异族统治之下而倍感愤懑。"
 SDPDM_house_of_savoy: "萨伏伊家族"
 SDPDM_house_of_savoy_desc: "萨伏伊家族统治这片阿尔卑斯边陲之地已有数个世纪，将曾经零散的山口转变为了一个受人敬重的欧洲强权。通过精心的王朝联姻、战略性的中立政策，以及对山地战争无与伦比的理解，萨伏伊人以一种与其有限版图极不相称的坚韧捍卫着他们的国度。他们的宫廷在君主权威与协商治理之间维持着平衡，既依靠王室血统，也通过对地方议会做出务实让步来维系统治合法性。在堡垒林立的皮埃蒙特山谷中，萨伏伊屹立不倒。"
 OCCIT_english_french_traditions: "英格兰-法兰西传统"
 OCCIT_english_french_traditions_desc: "奥克西塔尼亚地处两大势力范围之间——一方是英格兰的高效行政，另一方是法兰西的宫廷雅致。我们并未拒斥这些北方传统，而是将其融入奥克式的治理之中。英格兰的普通法原则与法兰西的官僚体制在此交汇，孕育出既能满足我们需求、又不致磨灭独特认同的混合机构。这种文化融合吸引了来自两地的能臣与商贾，巩固了奥克西塔尼亚作为连接南北之桥梁的地位。"
 SWDEM_swedish_tradition: "瑞典传统"
 SWDEM_swedish_tradition_desc: "瑞典的卓越军事奠基于纪律严明的步兵、推陈出新的战术，以及一支能在历次战役中汲取教训的职业军官团。我军即便撤退亦能保持井然有序，绝不溃散，并能随战局变化而灵活调整战略。这种军事职业素养亦延伸至文官行政领域，凭借严谨的档案制度与高效的官僚体系，瑞典已成为开明统治的典范。强敌虽有兴替，唯瑞典制度屹立不倒。"
 SWDEM_great_northern_crusaders: "伟大的北方十字军"
 SWDEM_great_northern_crusaders_desc: "数个世纪以来，瑞典历代君主皆以北欧新教信仰的捍卫者自居。这一圣战传统赋予了我们发动战争的正当理由，使其被视为义举而非侵略，从而降低了军事行动的外交代价。其他新教列强并未将瑞典的扩张视为赤裸裸的帝国主义行径，反而将其视作在波罗的海抵御天主教复辟的坚实壁垒——这一声望缓和了国际社会对我们勃勃野心的敌视。"
 SWDEM_rulers_of_bremen_verden: "不来梅-费尔登的统治者"
 SWDEM_rulers_of_bremen_verden_desc: "瑞典对不来梅-费尔登的掌控，确保了对威悉河与易北河入海口的控制权，从而将瑞典的势力投射至神圣罗马帝国的心脏地带。这一战略立足点不仅使我们能更有效地监视敌对势力，为我军在北德意志提供安全的退路，更确立了瑞典在帝国政治中举足轻重的地位。我们在帝国境内的存在吸引了众多学者与行政干才，进而提升了我们的行政效能。"
 GMNEM_the_reich_of_germans: "德意志人的帝国"
 GMNEM_the_reich_of_germans_desc: "统一的德意志帝国依靠实力而非外交辞令来赢得尊重。我们的国策将德意志的文化主导权与领土诉求置于国际认可之上。境内的少数族裔文化将被同化，而我们的外交方针将理直气壮地谋求德意志的利益。列强或许会忌恨我们的崛起，但绝无法否认我们的霸主地位。"
 NAZIG_nationalsozialistische_deutsche_arbeiterpartei: "德国国家社会主义工人党"
 NAZIG_nationalsozialistische_deutsche_arbeiterpartei_desc: "国家社会主义国家通过对社会的全面动员，竭力实现其意识形态目标。该政权将国家生活的方方面面——无论是经济、文化还是军事——皆置于党的控制之下，以此推行侵略性的扩张政策，完全无视国际准则或外交后果。这种极权主义手段使其能够在被征服的领土上迅速实施文化同化与经济重组，尽管其代价是招致国际社会的普遍谴责。"
 HNSLG_hansa_traders: "汉萨商人"
 HNSLG_hansa_traders_desc: "从波罗的海到北海，汉萨商人们行动一致，如同一体。凭借我们的商馆网络与共享航线，我们的贸易触角得以延伸至他人无法企及之地，从而将同盟从一个松散的联盟蜕变为北欧的主宰商业强权。"
 NGCFD_united_german_confederation: "联合德意志邦联"
 NGCFD_united_german_confederation_desc: "尽管名义上仍是邦联，但北德意志诸邦的联合标志着迈向真正中央集权的决定性一步。通过统筹军事指挥、统一行政管理并集中人力资源，我们创造出了一个远超各部分总和的实体——一个能够将力量投射至全欧洲的统一德意志强权。"
 CAROL_restoring_the_empire: "光复帝国"
 CAROL_restoring_the_empire_desc: "公元800年教宗利奥三世授予查理曼的帝号，绝非仅代表着单纯的征服——它象征着罗马权威在西方的复辟。通过推行中央集权、编纂法典，并建立起由忠诚伯爵与边境伯组成的统治网络，我们便能重获凯撒们的制度遗产，同时兼顾那些曾令罗马伟大的共和理想。"
 CAROL_carolingian_legacy: "加洛林遗产"
 CAROL_carolingian_legacy_desc: "查理曼的血脉所承载的，绝不仅是尊贵的世系，更是神圣的天命。为了维护王朝的纯正与威望，我们必须确保继承人仅与门当户对的皇室成员联姻。加洛林之名必将永远成为正统统治的代名词，而我们要以配得上这注定万世长存之帝国的高效，来治理我们的王室直辖领。"
