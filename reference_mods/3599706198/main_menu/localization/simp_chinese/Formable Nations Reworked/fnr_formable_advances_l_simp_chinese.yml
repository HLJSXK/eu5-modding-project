 GMORV_cross_road_europe: "欧洲十字路口"
 GMORV_cross_road_europe_desc: "数个世纪以来，我们的国度一直屹立于欧洲的十字路口，德意志、法兰克、拜占庭与拉丁文化在此交汇融合。来自整个大陆的商路在我们的土地上汇聚，使我们成为了商业的重要枢纽与文明的熔炉。"
 GMORV_slavic_zeal: "斯拉夫狂热"
 GMORV_slavic_zeal_desc: "我们的传说歌颂着那些先古勇士，尽管最终难逃战败的命运，却曾屠戮数倍于己的罗马大军，令历史上最伟大的征服者亦为之胆寒。这种不屈的意志如今在我军将士身上得以延续。当旁人溃败奔逃之时，我军将士却坚守阵地；当旁人面对优势敌军屈膝投降之时，我们唯有死战到底。昔日令罗马军团对斯拉夫利刃闻风丧胆的那股狂热，如今正激励着我军去创造那些超越常理与数据的战争奇迹。"
 GMORV_balaton_winemakers: "巴拉顿酿酒师"
 GMORV_balaton_winemakers_desc: "巴拉顿湖的葡萄酒堪称欧洲顶级佳酿。唯有勃艮第久负盛名的陈酿、意大利声名远扬的葡萄园，以及远方格鲁吉亚古老的酿酒传统，方能与我们葡萄的品质相媲美。巴拉顿地区的火山土壤与温和气候，孕育出了令全欧鉴赏家备受追捧的佳酿。"
 GMORV_fnr_hradiska: "丘堡"
 GMORV_fnr_hradiska_desc: "大摩拉维亚的繁荣根植于丘堡——一种毗邻领主庄园的设防乡村定居点。它们既是受庇护的市场，也是工匠的作坊。通过复兴这一制度，我们将生产分散化，把经济活力重新带回乡野。领主们得以高效统筹地方资源，同时为工匠与商贾提供安全保障。古老的智慧在此复苏，转化为当下的财富。"