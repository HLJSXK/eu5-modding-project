l_simp_chinese:
 flavor_SDNNW.1.title: "瑞典‑挪威联合王国"
 flavor_SDNNW.1.desc: "我们国旗的决定取决于瑞典与挪威各地区联盟的优先顺序——我们能够决定哪种设计更适合我们的联盟。"
 flavor_SDNNW.1.a: "瑞典风格旗帜"
 flavor_SDNNW.1.b: "挪威风格旗帜"
 SDNNW_S: "瑞典国旗（1844‑1905年）"
 SDNNW_N: "挪威国旗（1844‑1899年）"
 flavor_DUTCH.1.title: "关于联合省的决议"
 flavor_DUTCH.1.desc: "联合省是分权治理的典范，每个省份都有自治和传统权利。然而，随着我国国力日益强盛，国内外挑战也日益增多，要求建立更强大、更统一国家的声音开始出现。\n\n有人认为，只有通过中央集权，我们才能有效协调国防、简化商业流程，并在国际事务统一立场。他们指出当前制度的低效性——每个省份都可能否决关乎国家利益的重要决策。\n\n另一些人则警告，放弃我们现在的制度将违背联邦建立的初衷。他们坚持认为，联合省恰恰在于平衡各省份之间的权力——这既是抵御专制的屏障，也是创新活力的源泉。\n\n现在问题摆在我们面前：是建立一个中央集权的荷兰共和国，还是保留我们平等的联邦原则？"
 flavor_DUTCH.1.a: "我们将宣布荷兰共和国成立！"
 flavor_DUTCH.1.b: "联合省在平等中依然强大！"
 flavor_RHLND.1.title: "前进之路"
 flavor_RHLND.1.desc: "莱茵联邦已存续数十年，但关于我们未来的问题已不容再拖延。自建国以来，我们一直通过临时协议与妥协进行治理——这在建国初期虽属必要之恶，却终究难以长久维系。\n\n关于前进的道路，目前浮现出两种愿景。有人主张建立莱茵王国，这是一个中央集权的君主制国家，凭借强大的王权通过果断领导将各领土紧密联结。另一些人则拥护莱茵邦联，这是一个共和制联邦，在维护地方自治的同时促进我们多元阶层间的合作。\n\n今日我们所作的选择，不仅将决定政体形态，更会塑造未来数代人的民族特质。"
 flavor_RHLND.1.a: "国王应当被赋予权力。"
 flavor_RHLND.1.b: "人民有权对国家事务发表意见。"
 flavor_RHLND.2.title: "从经验中学习"
 flavor_RHLND.2.desc: "战争的性质已然改变，我们必须相应调整军事策略。现代冲突需要坚实的基础——强大的工业与坚固的防御工事。我们将集中力量，致力于强化并拓展这两大支柱。"
 flavor_RHLND.2.a: "我们从这些冲突中学到了很多。"
 flavor_RHLND.3.title: "引进创新投资"
 flavor_RHLND.3.desc: "墨守成规而不与时俱进只会导致毁灭——我们已经亲眼目睹了这一真理。为了生存和繁荣，我们必须采用现代化的治理方式，无论旧方法多么令人感到舒适。"
 flavor_RHLND.3.a: "投资是关键！"
 flavor_RHLND.4.title: "社会与宗教支柱"
 flavor_RHLND.4.desc: "我们已成功削弱教会的政治权力，但彻底压制既不现实也无必要。相反，我们将引导其影响力转向他们最擅长的领域：作为凝聚多元民族的文化与神学支柱。"
 flavor_RHLND.4.a: "教士维持着民众的秩序。"
 flavor_RHLND.5.title: "联邦状态"
 flavor_RHLND.5.desc: "莱茵兰地区长久以来都是主教区、自由城市和小领地的拼凑之地——它们为自己的自治权而自豪，却又因地理和商业而紧密相连。我们在邦国的联合旗帜下实现了统一，保留了地方主权的传统，每个组成部分都维持着其古老的特权。然而，这种碎片化恰恰削弱了我们。\n\n外国势力视我们并非一个统一的公国，而是仅靠条约维系、争吵不休的邻邦。我们的使节缺乏真正的权威，我们的军队因指挥权分散而举步维艰，而领土扩张也因成员国间需要达成共识而变得复杂。如今有人主张我们必须做出选择：要么接受公爵王冠下的中央集权，在欧洲诸公国中争取一席之地；要么接受自身的局限，保留使莱茵兰独一无二的自由。无论哪条道路，都需付出牺牲。"
 flavor_RHLND.5.a: "保持为莱茵兰联合邦国。"
 flavor_RHLND.5.b: "赐予我公爵头衔！"
 flavor_NGCFD.1.title: "日耳曼帝国国旗标准"
 flavor_NGCFD.1.desc: "北德意志邦联已经统一，我们必须为国家宣布官方旗帜。我们可以使用历史上的旗帜作为官方旗帜，或是沿用黑白红三色旗设计。"
 flavor_NGCFD.1.a: "我们将使用帝国战争旗！"
 flavor_NGCFD.1.b: "黑白红三色旗正合适。"
 NGCFD_flag_alternate: "黑白红"
 flavor_KSORB.1.title: "索布命名标准"
 flavor_KSORB.1.desc: "我们统一了索布人的土地，但该如何称呼我们的王国呢？索布王国彰显了王室正统性与外交威严，而索尔比亚则唤醒了我们古老的传承与文化认同。选择权在我们手中。"
 flavor_KSORB.1.a: "索布王国个名字相当合适。"
 flavor_KSORB.1.b: "我们是索布人！"
 flavor_PAPAL.1.title: "神圣罗马帝国法令"
 flavor_PAPAL.1.desc: "[GetInternationalOrganizationType('hre').GetName]已匍匐在我们脚下。通过征服与外交，教宗国对德意志诸侯及其领地确立了前所未有的统治地位。帝位空悬，若无我们的祝福，无人胆敢觊觎。\n\n数个世纪以来，教宗与皇帝一直在为基督教世界的最高权力而争斗。叙任权之争、亨利四世在卡诺莎的屈辱，以及教皇党与皇帝党之间无数的战争，皆源于这一根本冲突。如今，我们有能力彻底解决这一争端。\n\n摆在我们面前的有两条路：彻底解散这个麻烦的帝国，宣布我们自己为合法的欧洲皇帝，将神权与俗权集于一冠；或是保留帝国架构并攫取皇号，但令其完全臣服于教廷的意志之下。无论如何，那个桀骜不驯的皇帝挑战圣座的时代已经结束了。"
 flavor_PAPAL.1.a: "解散神圣罗马帝国！"
 flavor_PAPAL.1.b: "我们即是帝国，我们即是神圣国度！"
 flavor_PAPAL.1.c: "皇帝头衔属于[GetCountry('PAP').GetNameWithFlag]。"
 flavor_PAPAL.1.d: "我们必须解散这个碍手碍脚的制度。"
 flavor_PAPAL.1.e: "面见上帝者，必心存谦卑。"
 flavor_PAPAL.2.title: "膺受皇号"
 flavor_PAPAL.2.desc: "随着神圣罗马帝国的疆域尽入囊中，我们必须确立一个新的正式头衔，以示天下。"
 flavor_PAPAL.2.a: "我们即是基督教帝国——Imperium Christianum"
 flavor_PAPAL.2.b: "神圣帝国，继承自那些失败的德意志伪帝"
 flavor_PAPAL.2.c: "至圣帝国，由上帝亲自敕封"
 flavor_PAPAL.2.d: "归于基督代表治下的普世君主国"
 flavor_PAPAL.2.e: "基督教世界帝国，统合所有虔信者"
 flavor_PAPAL.2.f: "圣彼得的辖域，此乃天命所归"
 flavor_PAPAL.2.g: "维持教宗国旧制。"
 flavor_PAPAL.3.title: "正式更易旗帜"
 flavor_PAPAL.3.desc: "我们已征服神圣罗马帝国，并宣布即位为合法的统治者。如今，我们需要决定采用何种旗帜来象征我们的权柄。\n\n天国之钥与三重冕象征着我们至高无上的神权，却略显缺乏帝国的威仪。四元鹰——那只饰有帝国各组成领地纹章的双头鹰，象征着法统的延续与正统性。而那只简约的帝国鹰则彰显着纯粹的力量与古老的传统。或者，我们可以设计一种全新的图样，一种超越教廷与旧帝国、象征我们所建立的这种独特权力融合体的标志。\n\n我们的抉择将决定欧洲如何看待我们的统治。我们应当侧重于传承还是变革？神权还是俗权？旧秩序亦或是新纪元？"
 flavor_PAPAL.3.a: "采用全新样式。"
 flavor_PAPAL.3.b: "采用四元鹰旗。"
 flavor_PAPAL.3.c: "采用神圣罗马帝国旗。"
 flavor_PAPAL.3.d: "保留教宗国旗帜。"
 flavor_PAPAL.4.title: "[GetInternationalOrganizationType('hre').GetName]的重组"
 flavor_PAPAL.4.desc: "我们已征服神圣罗马帝国。现在，我们必须决定它的命运。\n\n当下的帝国本质上是一个世俗机构。选帝侯、诸侯和帝国议会依靠俗权统治着德意志的领土。我们可以保留这一制度，在维持其传统架构的同时，确保教皇对其运作机制的掌控。帝国将继续履行其历史使命，只是其对罗马的悖逆将被纠正。\n\n或者，我们可以将其彻底解散，建立一个新的事物：一个致力于保卫基督教世界的神圣邦联。枢机亲王将取代世俗选帝侯，神圣王国将取代普通的诸侯国。该组织将不再局限于管理德意志的土地，而是致力于组织十字军、打击异端并保护信徒。它将是战斗教会的具象化，一个在教皇权威下的神圣同盟，追求神性目标而非世俗利益。\n\n我们是改革帝国，还是将其替换为一个神权秩序？"
 flavor_PAPAL.4.a: "建立一个新的、由教宗主导且专注于神权价值观的神圣罗马帝国。"
 flavor_PAPAL.4.b: "维持现状"
 flavor_ASHNG.1.title: "国号的确立"
 flavor_ASHNG.1.desc: "“折衷方案”已经缔结，我们的二元君主国已然成为了妥协与实用主义的见证。然而，即便是在命名这类事务上，政治考量依然无处不在。我们将如何称呼这个将奥地利诸地与匈牙利王国结合在一起的新政治实体呢？\n\n有些人偏爱直截了当的“奥地利-匈牙利”，强调两顶王冠之间的平等伙伴关系。这种带连字符的形式暗示了一种平等的联合——两个独特的领域由共同的君主和共同的利益紧密相连。它直接、清晰，并承认了我们体制的二元本质。\n\n另一些人则更喜欢宏大的“奥匈帝国”，它唤起了帝国传统的威严与延续性。这一表述将我们的国家呈现为一个统一的整体，而不仅仅是分离实体的单纯结合。它诉说着伟大、永恒，以及一个恰好囊括了多个王国的单一帝国。\n\n在外人看来，这个选择或许微不足道，但在我们的廷议中，它却举足轻重。我们的自称决定了我们如何看待自己，以及世界如何看待我们。匈牙利代表团正密切注视着，对任何可能损害其得来不易的自治权的轻慢都极其敏感。奥地利官僚则考量着帝国名号的声望。驻外的外交官们正等待着我们的决定，不知道该用哪种信头。\n\n帝国与皇家使徒陛下必须做出决断：我们是奥地利-匈牙利，还是奥匈帝国？"
 flavor_ASHNG.1.a: "“奥地利-匈牙利”反映了我们的二元本质。"
 flavor_ASHNG.1.b: "“奥匈帝国”维护了我们的帝国尊严。"
 flavor_GLCEM.1.title: "高卢问题"
 flavor_GLCEM.1.desc: "战事已毕，诸部一统。从莱茵河到比利牛斯山，胜利的旌旗迎风招展。然而，在这凯旋时刻，我们面临的选择超越了单纯的名称之争。我们是该成为**高卢帝国**……一个象征着军团、桂冠与永恒统治的名字？亦或是仅仅称为**高卢**——唤起那雾霭深林、骄傲的酋长以及先祖们不屈的精神？这一决定将在历史的长河中久久回响。"
 flavor_GLCEM.1.a: "保持为高卢帝国！"
 flavor_GLCEM.1.b: "高卢是我们的家园！"
 flavor_GLCEM.2.title: "罗马领土光复的潜能 - 1"
 flavor_GLCEM.2.desc: ""
 flavor_GLCEM.2.a: "设立塔拉科西班牙行省"
 flavor_GLCEM.2.b: "我们还是算了吧。"
 flavor_GLCEM.3.title: "罗马领土光复的潜能 - 2"
 flavor_GLCEM.3.desc: ""
 flavor_GLCEM.3.a: "设立不列颠尼亚行省"
 flavor_GLCEM.3.b: "我们还是算了吧。"
 flavor_GMORV.1.title: "教会斯拉夫语"
 flavor_GMORV.1.desc: "9世纪时，来自塞萨洛尼基的西里尔与美多德兄弟将东方基督教的光辉带到了摩拉维亚。为了确保我们的人民能用一种他们听得懂的语言来敬拜上帝，而不是晦涩难懂的拉丁语，他们创造了古教会斯拉夫语和格拉哥里字母，以此翻译经文与礼仪。这种神圣的语言不再局限于神职人员之间，更成为了摩拉维亚的行政语言，象征着我们在基督教世界中独特的身份。\n\n尽管拉丁语最终在我们的土地上取代了教会斯拉夫语，但恢复这一遗产的时刻已经到来。通过复兴古教会斯拉夫语作为礼拜和行政语言，我们在纪念圣西里尔与圣美多德传教使命的同时，也宣示了我们与东正教东方的紧密联系。让祖先的语言再次回荡在教堂与官署之中吧。"
 flavor_GMORV.1.a: "拥抱东正教并恢复教会斯拉夫语！"
 flavor_GMORV.1.b: "我们将继续效忠罗马。"
 flavor_GMORV.2.title: "光复大摩拉维亚疆界"
 flavor_GMORV.2.desc: "我们祖先的疆域曾绵延于波希米亚高地至喀尔巴阡山谷之间，横跨多瑙河畔至波兰平原。在9世纪斯瓦托普卢克一世的统治下，大摩拉维亚曾作为欧洲最强大的斯拉夫国家之一屹立于世。它是基督教、文化与学术的灯塔，也是圣西里尔与圣美多德传播其神圣使命之地。然而，随着帝国在马扎尔人的入侵与内乱中分崩离析，这份荣耀终成陈迹。\n\n如今，历经数个世纪的分裂与异族统治，我们终于收复了失地。大摩拉维亚的古老疆界得以重现，我们的人民再次团结在同一面旗帜之下。让全欧洲拭目以待：斯瓦托普卢克的遗志长存，摩拉维亚王国已然归来，誓要在基督教世界的列强中夺回其应有的一席之地。"
 flavor_GMORV.2.a: "大摩拉维亚浴火重生。"
 flavor_GMORV.3.title: "斯瓦托普卢克一世之墓"
 flavor_GMORV.3.desc: "陛下，我们发现了疑似斯瓦托普卢克一世的陵墓，这位伟大的统治者曾引领大摩拉维亚走向极盛。我们的探险家在墓中发掘出了一顶王冠与一把宝剑——那正是我们古代诸王的王权象征。这些神圣的遗物将再次成为王权与正统性的象征，将您的统治与先祖的荣耀紧密相连。"
 flavor_GMORV.3.a: "圣物重现！"