l_simp_chinese:
 fnr_stahlwagen: "钢制马车"
 fnr_stahlwagen_desc: "在胡斯战争期间，胡斯军队主要由农民组成，但他们通过使用车堡和早期火器，甚至能够击败传说中的骑马骑士。我们得出了同样的结论：这些车堡确实有用。但与他们的不同，我们的车堡是为战争量身定制的，覆以钢甲，结构设计可容纳火绳枪和长矛。它们将成为我们的盾牌。"
 fnr_druzhina: "伙伴卫队"
 fnr_druzhina_desc: "伙伴卫队是斯拉夫古老传统中由王公贵族豢养的精英亲兵卫队。这些职业士兵由领主支付薪饷，既担任贴身护卫，也充当突击部队。阿拉伯旅行家易卜拉欣·伊本·雅古布曾目睹波兰公爵指挥着三千名这样的战士。如今贵族们可以自筹军费组建这支效忠王室的传统武装力量。"