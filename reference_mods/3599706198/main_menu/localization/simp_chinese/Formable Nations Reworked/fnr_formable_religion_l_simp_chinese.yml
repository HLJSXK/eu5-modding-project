l_simp_chinese:
 fnr_god_worshipping_society_taiping: "拜上帝会"
 fnr_god_worshipping_society_taiping_ADJ: "拜上帝会"
 fnr_god_worshipping_society_taiping_desc: "这一受新教基督教影响、融合中国民间宗教与佛教观念的多神论中国宗教运动由洪秀全于1843年创立。该教派奉上帝为最高神祇，视洪秀全为上帝的次子，最终引发了规模浩大的太平天国运动。这场反抗清朝统治的起义以社会平等为旗帜，推行激进改革，建立了太平天囯政权，最终在惨烈的镇压中覆灭。"
 fnr_gallo_roman_religion: "高卢‑罗马多神教"
 fnr_gallo_roman_religion_ADJ: "高卢‑罗马多神教"
 fnr_gallo_roman_religion_desc: "高卢‑罗马多神教是原说高卢语的高卢人传统宗教实践，与罗马帝国统治下传入该地区的罗马及希腊化宗教相融合的产物，这种融合是选择性文化适应的结果。"
 fnr_great_moravia_orthodox: "摩拉维亚东正教"
 fnr_great_moravia_orthodox_ADJ: "摩拉维亚东正教"
 fnr_great_moravia_orthodox_desc: "$orthodox_ADJ$植根于早期基督教大公会议的传统，强调使徒教导与神圣传承的连续性。以拜占庭礼仪为核心，其高度重视礼拜仪式、圣像与神秘主义。东正教信仰由牧首领导，其中君士坦丁堡普世牧首享有荣誉上的首席地位。\n\n#color_yellow 这是东正教的特殊形态，其自治牧首区机制并不适用，因为该组织架构更近似于神圣罗马帝国。#!"
 fnr_cult_of_personality: "个人崇拜"
 fnr_cult_of_personality_desc: "洪秀全的拜上帝会被历史学家广泛描述为一个利用强烈个人崇拜的教派，其核心在于他自称耶稣基督之弟的弥赛亚身份。这一救世主身份不仅是该团体神学思想的基石，也是他作为太平天国运动领袖权威的根本来源。"
 fnr_god_worshipping_society_taiping_expand_cult: "发展个人崇拜"
 fnr_god_worshipping_society_taiping_expand_cult_desc: "咕咕咕"