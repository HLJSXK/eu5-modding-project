 STATIC_MODIFIER_NAME_pmcm_loc_bandit_stronghold_ser: "塞尔维亚的法外之徒"
 STATIC_MODIFIER_DESC_pmcm_loc_bandit_stronghold_ser: "14世纪在拜占庭边境地区活动的塞尔维亚强盗或土匪通常被称为海杜克（hajduks或hajduci），这是对不法叛乱分子的称呼。这些团伙会伏击官员，抢劫商队，有时还会充当雇佣兵，他们的活动在16-17世纪达到顶峰，但在此之前已作为非正规军活跃。"
 STATIC_MODIFIER_NAME_pmcm_loc_bandit_stronghold_latin: "拉丁海盗"
 STATIC_MODIFIER_DESC_pmcm_loc_bandit_stronghold_latin: "拉丁（西欧）海盗和强盗经常在拜占庭水域活动，特别是在12-13世纪，通常包括热那亚、比萨和威尼斯的冒险家或水手。拜占庭当局经常称他们为pirata（拉丁语）或peiratai/leistai（希腊语），他们有时既参与贸易又参与非法抢劫。"
 STATIC_MODIFIER_NAME_pmcm_loc_bandit_stronghold_tur: "突厥加齐"
 STATIC_MODIFIER_DESC_pmcm_loc_bandit_stronghold_tur: "早期的奥斯曼突厥袭击者，常被拜占庭人视为“强盗”或\"边境战士\"，主要被称为加齐（为信仰而战的袭击者）。尽管帝国方面的史料常将他们视作一群乌合之众，但他们实际上是一场有序扩张行动的一部分。随着拜占庭势力的衰退，这些突袭活动逐步演变为有组织的征服行动。"
 STATIC_MODIFIER_NAME_pmcm_loc_bandit_stronghold_bul: "保加尔土匪"
 STATIC_MODIFIER_DESC_pmcm_loc_bandit_stronghold_bul: "海杜特（Hayduts或haiduks）是抵抗巴尔干东北部外国统治的非正规游击战士和不法分子。这些群体通常是由流离失所的农民、地方贵族和利用两大势力之间边界不断变化的机会主义袭击者组成的混合体。"
 STATIC_MODIFIER_NAME_pmcm_loc_bandit_stronghold_albania: "阿尔巴尼亚山贼"
 STATIC_MODIFIER_DESC_pmcm_loc_bandit_stronghold_albania: "阿尔巴尼亚山区与巴尔干的匪患是一个持续且根深蒂固的问题，常在拜占庭及后来的奥斯曼时期中央权威薄弱、战乱或经济困顿之时达到高峰。这些团伙被希腊人称为克莱夫特，被土耳其人称为基尔卡利，通常在山区活动，以商队和地方当局为目标，有时充当社会反抗者，但更多是受经济所迫。"
