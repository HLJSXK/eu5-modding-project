 name_alexios: "斯蒂利亚诺斯"
 pmcm_cop.1.title: "最后的士兵皇帝"
 pmcm_cop.1.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName]（生于1328年），常被称为拜占庭“最后的士兵皇帝”，在其短暂而充满活力的统治期间，试图通过亲率军队和在希腊收复领土来阻止帝国的衰亡。他在动荡的青年时代及随后的内战（1321-1328年）中废黜了其祖父安德罗尼科斯二世，从而登上权力巅峰。\n\n在其挚友兼首席大臣约翰六世·坎塔库泽努斯的辅佐下，他稳定了边疆，改革了法律体系，并从热那亚人手中收复了岛屿领土。尽管英勇过人，他仍未能阻止奥斯曼土耳其在安纳托利亚的扩张，失去了尼西亚（1331年）和尼科米底亚（1337年）等关键城市。尽管他专注于重要的行政与财政改革，却依然延续了其前任拜占庭统治者的趋势：边疆领土不断丧失，且始终无力阻止土耳其贝伊国对赫勒斯滂对岸希腊飞地的整合。"
 pmcm_cop.1.a: "帝国真正的利剑。"
 pmcm_cop.2.t: "紫衣之争"
 pmcm_cop.2.d: "安德罗尼科斯三世与约翰·坎塔库泽努斯之间的亲密情谊，加上权贵集团的支持，巩固了前者的皇位。然而，有效治理需要与君士坦丁堡的世俗官僚机构、普世牧首区以及城市行会维持微妙的平衡，以保持财政稳定。\n\n其结果是，巴列奥略王朝的宫廷滑向了一种危险的极化：一个派系围绕着大统领坎塔库泽努斯集结，其权威源于皇命与贵族地产；另一个派系则以紫衣贵族约翰五世为中心，其正统性诉诸于体制教会及那些被军事精英边缘化的人群。\n\n然而，安德罗尼科斯一如既往地乐观。他依赖自己与坎塔库泽努斯的私人情谊以及自身的强健体魄，低估了继承计划的制度性脆弱——该计划缺乏对其宠臣日益膨胀的权力的制度性制衡。这一决定将为帝国带来新的灾难……"
 pmcm_cop.2.a: "只要[GetCountry('BYZ').GetGovernment.GetRuler.GetName]还活着，我们就会享有和平。"
 pmcm_cop.100.title: "收复安纳托利亚"
 pmcm_cop.100.desc: "在13世纪衰落之后，拜占庭在[ShowRegionName('anatolia_region')]的领土要求被大幅缩减为沿海碎片，特别是在西北部（比提尼亚），之后在大约1337年完全被奥斯曼突厥人占领。1261年后，对这些亚洲领地的忽视导致了各种突厥埃米尔国迅速永久地吞并了迈安德河谷和爱琴海地区。\n\n我们重新夺回失去的帝国领地的尝试，提供了将昔日拜占庭的心脏地带归还给其前主人的机会。现在是时候让那些土耳其僭越者尝尝刀剑的滋味了。"
 pmcm_cop.51.title: "执笔之人与披甲之士"
 pmcm_cop.51.desc: "在宫廷中，旧时的礼节仍保持着练达的优雅，但如今每一个头衔之下都潜藏着一方阵营。以精明的约翰六世·坎塔库泽努斯为首的文房尚书们辩称，帝国的生存取决于秩序的重建、严密的财政审计以及精妙的外交艺术。他们坚信，稳固的国库与外交斡旋能为这个满目疮痍的罗马国家赢回最宝贵的喘息之机。\n\n然而，随着军事派系的势头愈发强劲，布拉赫奈宫内的空气因无声的抗命而变得愈发沉重。追随阿莱克修斯·阿波考科斯——这位曾是大书记官最亲密的盟友、如今却是他最切骨之仇——的将军们对这种“文职逻辑”嗤之以鼻。他们反唇相讥：饥肠辘辘的官僚既守不住城池的缺口，也挡不住那些企图瓜分拜占庭最后腹地的外邦铁骑。\n\n君士坦丁堡的大殿已成了一座政治效忠不断更迭的迷宫。请愿者、修士、商贾与百战将官在各显贵门户间摇摆游走，他们的选择既出自信仰，也源于生存。尽管冲突尚未公开，名义上仍维持着新皇治下的和平，但每一次公开觐见，与其说是国家政事，倒不如说是一场即将来临的内战动员。"
 pmcm_cop.51.fallback: "随着安德洛尼卡三世驾崩，帝国的大分裂瞬间被点燃。旧时的宫廷礼节虽仍维持着练达的优雅，但如今每一个头衔背后都潜藏着派系的阵营。\n\n以精明的约翰六世·坎塔库泽努斯为首的文房尚书们坚称：帝国的生存取决于秩序的恢复、严密的财政审计以及精妙的外交艺术。他们相信，稳定的国库与外交斡旋能为这个满目疮痍的罗马国家赢下最急需的时间。\n\n然而，随着军事派系的势头愈发强劲，布拉赫奈宫内的空气因这种无声的抗命而变得沉重。追随阿莱克修斯·阿波考科斯——这位曾是大书记官最亲密的盟友、如今却是他最切骨之仇——的将军们对这种“文职逻辑”嗤之以鼻。他们反唇相讥：饥饿的官僚既守不住城池的缺口，也挡不住那些企图瓜分拜占庭最后腹地的外邦入侵者。\n\n君士坦丁堡的大殿已成了一座派系效忠不断更迭的迷宫。请愿者、修士、商贾与百战将官在各豪门官邸间徘徊游走，他们的选择既出自信仰，也源于生存。尽管矛盾尚未公开化，新皇治下的和平在名义上依然维持，但每一次公开觐见，与其说是国家政事，倒不如说是一场即将来临的内战动员。"
 pmcm_cop.51.a: "让双方在我们的注视下竞争吧。"
 pmcm_cop.51.b: "文书房应优先。"
 pmcm_cop.51.c: "军队必须优先发言。"
 pmcm_cop.52.title: "奥古斯都广场的请愿"
 pmcm_cop.52.desc: "群众聚集在圣索菲亚大教堂耸立的阴影下，身旁是大皇宫绵延的废墟；他们发出的咆哮声嘈杂刺耳，震撼着官僚机构紧绷的神经。这呐喊并非全为了支持哪一派系，而是为了终结那场令拜占庭国家瘫痪、让人窒息的动荡局势。\n\n倘若布拉赫奈宫的各方势力无法提供“面包与马戏”般的稳定，亦或决出一个明确的胜者，那么街道本身或许会暴动，亲手选出一位救世主——或是毁灭者。金角湾已不再是和平的避风港，而是一个火药桶，正等待着一点火星，去引爆这积压了一个世纪的挫败与愤懑。"
 pmcm_cop.52.a: "承诺通过各部进行改革。"
 pmcm_cop.52.b: "承诺通过将军们提供安全保障。"
 pmcm_cop.52.c: "驱散他们。"
 pmcm_cop.53.title: "伟大的文房尚书崛起"
 pmcm_cop.53.desc: "一位证明了自己忠诚的朝臣，将印章、备忘录和使节汇聚于自己手中，引起了帝国领导层的注意。\n\n随着这样的人继续在为帝国服务中脱颖而出，文书房大尚书这一职位再次成为治理的核心只是时间问题。有些人甚至开始说，帝国或许不仅可以由马鞍统治，也可以由书桌统治。"
 pmcm_cop.53.a: " 将权力集于文书房。"
 pmcm_cop.53.b: "以军事让步缓和其崛起。"
 pmcm_cop.54.title: "将领们的索求"
 pmcm_cop.54.desc: "那些显赫的军事世家提醒朝廷，帝国的边疆并非虚无的抽象概念。他们要求补发欠薪、执掌统帅权并获得行动自由。其部曲扈从充斥于军营与港口门外的街道；他们的言辞尚称忠诚，其姿态却绝非谦卑。\n\n这些权贵世家，其血脉可追溯至意志坚如钢铁的福卡斯与杜卡斯家族。他们来到都城，并非以祈求者的姿态，而是以债主之身。他们要求补发沉重的欠薪，要求对各军区征召兵拥有绝对统率权，并要求一种危险的行动自由——无需等待迟缓的御旨便可痛击塞尔维亚与土耳其的入侵。\n\n其言辞依然恪守忠诚，点缀着对皇帝的传统赞颂，但其气焰已毫无顺服之态。"
 pmcm_cop.54.a: "授予他们指挥权和薪水。"
 pmcm_cop.54.b: "拒绝并倚重各部。"
 pmcm_cop.55.title: "营中欠饷"
 pmcm_cop.55.desc: "将领们抱怨俸禄即便发下来也总是迟到。战马无草，扈从流散至私人麾下，士卒们私下窃声：朝廷有银钱赏赐使节，却无分毫犒赏兵丁。文房尚书回答说国库空虚乃迫于无奈；将军们则反唇相讥不发军饷的无奈纯属怠政。"
 pmcm_cop.55.a: "优先支付卫戍军饷。"
 pmcm_cop.55.b: "重整账目，延缓军费。"
 pmcm_cop.55.c: "强令各省提供军饷。"
 pmcm_cop.56.title: "登记册遭挑战"
 pmcm_cop.56.desc: "一群财政文书重新审查了旧有的免税权与争议封赏。修道院、权贵与军事世家一致抗议重启已结的账目。文书房坚称，若每位显贵都视其收入为不可侵犯的神圣财产，而所有负担皆由弱者承担，帝国便无法存续。\n\n由新一代律法专家领导的文书房坚决认为：只要每个“大人物”都称其收入神圣且免税，导致灶火税与财产税的沉重枷锁全部落在日益贫困的农民身上时，帝国将无法作为一个职能国家生存。"
 pmcm_cop.56.a: "审计免税特权。"
 pmcm_cop.56.b: "免除军事地产的审查。"
 pmcm_cop.56.c: "暂缓审查。"
 pmcm_cop.57.title: "在城市中选边站队"
 pmcm_cop.57.desc: "在其中一座大城市里，行会成员、水手、下级神职人员和家庭附属人员聚集在敌对的口号下。一些人谴责显贵们的傲慢；另一些人则嘲笑宫廷官员是企图用印章和修辞来保卫城墙的人。\n\n在其中一座大城市里，行会成员、水手、下级神职人员和家庭附属人员聚集在敌对的口号下。一些人谴责显贵们的傲慢；另一些人则嘲笑宫廷官员是企图用印章和修辞来保卫城墙的人。最初的派系之争已经变成了公共闹剧。"
 pmcm_cop.57.a: "支持城市部门和大臣们。"
 pmcm_cop.57.b: "在军事监督下恢复秩序。"
 pmcm_cop.57.c: "让市民们筋疲力尽。"
 pmcm_cop.58.title: "赛马场暴乱"
 pmcm_cop.58.desc: "原本的体育竞技最终演变成了狂怒。在赛马场，在帝国仪式的阴影下，对立的派系拿起了旧的颜色和新的怨恨。绿党诅咒部长们让城市挨饿；蓝党高喊只有士兵才能保卫城市。很快，呼喊声失去了所有的游戏伪装。石头乱飞，摊位燃烧，人群涌向奥古斯都广场。\n\n即使是现在，宫廷也存在分歧：文房尚书呼吁秩序和克制，警告暴民暴力将摧毁帝国仅存的尊严。将军们要求立即使用武力，以免首都本身从帝国手中滑落。其他人则私下议论，如果引导得当，这种愤怒可以一劳永逸地解决这场争端。"
 pmcm_cop.58.a: "通过公告和让步恢复秩序。"
 pmcm_cop.58.b: "派遣驻军清理竞技场。"
 pmcm_cop.58.c: "将两派的怒火转向我们的敌人。"
 pmcm_cop.59.title: "牧首的低语"
 pmcm_cop.59.desc: "据说牧首和高级神职人员倾向于和平，但并非所有人都指同一种和平。一些人更喜欢能够维持仪式秩序和教义稳定的官僚；另一些人则被似乎有能力保卫基督徒的指挥官所吸引。布道变得谨慎，但私下的建议却变得尖锐。"
 pmcm_cop.59.a: "为文书房寻求教会的认可。"
 pmcm_cop.59.b: "将将军们描绘成信徒的捍卫者。"
 pmcm_cop.59.c: "让教会置身于争端之外。"
 pmcm_cop.60.title: "中介从者的崛起"
 pmcm_cop.60.desc: "这位大臣已经开始垄断所有的请愿、觐见和外交往来。廷臣们说，没有他的知晓，任何印玺都盖不下去，不经过他的指点，任何外宾都得不到答复。将军们则冷嘲热讽，说现在的帝国全靠走廊里的私下授意和办公桌上的备忘录在统治。"
 pmcm_cop.60.a: "将权力集中在有能力的人手中。"
 pmcm_cop.60.b: "迫使他与指挥官分享权力。"
 pmcm_cop.60.c: "在他变得不可或缺之前解雇他。"
 pmcm_cop.61.title: "港口大门外的雇佣兵"
 pmcm_cop.61.desc: "外籍战士已抵达并寻求效劳。将军们认为他们能立即增强阵线的防御力；大臣们则警告说，被拖欠军饷的雇佣兵会变成土匪，而拿不到钱的雇佣兵则永远无法控制。然而，敌人并不会等待完美的方案出现。"
 pmcm_cop.61.a: "将他们置于军队统帅之下招募。"
 pmcm_cop.61.b: "仅让他们承担有限的防御性任务。"
 pmcm_cop.61.c: "拒绝他们；我们承担不起额外的风险。"
 pmcm_cop.62.title: "港口商人的请愿"
 pmcm_cop.62.desc: " 港口和集市贸易区的商人向皇帝请愿。他们不在乎最终是笔墨还是钢铁获胜，只在乎道路是否安全、税收是否可控，以及船只是否不受骚扰。他们抱怨征用物资、私设关卡和突如其来的征税正勒死残存的商业。"
 pmcm_cop.62.a: "通过各部保障商业特权。"
 pmcm_cop.62.b: "派军队保护道路和港口。"
 pmcm_cop.62.c: "再征收一次紧急税。"
 pmcm_cop.63.title: "港口商人的请愿"
 pmcm_cop.63.desc: " 港口和集市贸易区的商人向皇帝请愿。他们不在乎最终是笔墨还是钢铁获胜，只在乎道路是否安全、税收是否可控，以及船只是否不受骚扰。他们抱怨征用物资、私设关卡和突如其来的征税正勒死残存的商业。"
 pmcm_cop.63.a: "通过各部保障商业特权。"
 pmcm_cop.63.b: "派军队保护道路和港口。"
 pmcm_cop.63.c: "再征收一次紧急税。"
 pmcm_cop.65.title: "指责的编年史"
 pmcm_cop.65.desc: "各种小册子、书信和私下流传的历史在宫廷走廊、修道院和贵族府邸中传阅。一种说法指责傲慢的权贵及其私兵；另一种则谴责那些在行省饱受战火时却只顾数钱的贪婪文吏。\n\n每一方不仅想赢得胜利，更想争夺定义权，好让后世记住帝国所遭受的苦难。"
 pmcm_cop.65.a: "委派人员为政府的治有序理辩护。"
 pmcm_cop.65.b: "颂扬将领们是罗马人的救星。"
 pmcm_cop.65.c: "查禁各派系的著作。"
 pmcm_cop.67.title: "残阳下的统治"
 pmcm_cop.67.desc: "这场争端已不再局限于宫廷和营帐。在作坊、市场、码头和乡村法庭，人们都在问同一个痛苦的问题：谁在统治？现在，给出答案本身比答案是什么更重要。拖延对人民来说已无法忍受，他们要求一个结果。\n\n几十年来，君士坦丁堡文官体系的文房尚书们固守着古罗马集权国家的理想，试图通过残存的普罗尼亚制度为皇室金库筹款。反对他们的是地方豪强和军人阶层。这些土地贵族和边境将军掌握着地方征召兵的忠诚，长期对文官行政机构施加的束缚感到不满。\n\n随着各大势力交锋，帝国在瘫痪边缘挣扎。我们必须选择让谁的声音和建议留在皇帝耳畔，否则在我们争论礼仪程序时，行省就会落入拉丁人和土耳其人之手。"
 pmcm_cop.67.a: "以文官的解决方案结束不确定性。"
 pmcm_cop.67.b: "以军事统治终结不确定性。"
 pmcm_cop.67.c: "呼吁耐心与互相克制。"
 pmcm_cop.800.title: "残阳下的统治"
 pmcm_cop.800.desc: "这场争端已不再局限于宫廷和营帐。在作坊、市场、码头和乡村法庭，人们都在问同一个痛苦的问题：谁在统治？现在，给出答案本身比答案是什么更重要。拖延对皇帝来说已无法忍受。\n\n几十年来，君士坦丁堡文官体系的文房尚书们固守着古罗马集权国家的理想，试图通过残存的普罗尼亚制度为皇室金库筹款。反对他们的是地方豪强和军人阶层。这些土地贵族和边境将军掌握着地方征召兵的忠诚，长期对文官行政机构施加的束缚感到不满。\n\n随着各大势力交锋，帝国在瘫痪边缘挣扎。我们必须选择让谁的声音和建议留在皇帝耳畔，否则在我们争论礼仪程序时，行省就会落入拉丁人和土耳其人之手。"
 pmcm_cop.800.a: "以文官的解决方案结束不确定性。"
 pmcm_cop.800.b: "以军事统治终结不确定性。"
 pmcm_cop.800.c: "呼吁耐心与互相克制。"
 pmcm_cop.68.title: "文官的统治"
 pmcm_cop.68.desc: "执笔之人赢了，布拉赫奈宫的走廊里现在回荡着羽毛笔的沙沙声，而非盔甲的碰撞声。\n\n在文书房大尚书重振的影响力下，一个更严密的朝廷从近期权力斗争的阴影中浮现。为了追求类似阿莱克修斯一世·科穆宁改革时的中央集权，互不统属的办公室被整合为强大的部委，大批使节被派往各国，试图通过外交而非流血来保卫边境。长期被边境需求耗尽的金库现在受到了极度的守护；每一枚海培伦（金币）都登记在册，包税人们正面临着自巴西尔二世时代以来从未有过的严密监察。\n\n然而，军队在营房里窃窃私语，他们感受到了津贴削减以及“饥饿的书记官”对资深战略家日益增长的影响力。虽然边境目前尚且平静，但老练的军事贵族们看着文官泛滥，心中既蔑视又愤恨。尽管他们怨声载道，文官的手现在正稳住国家的舵柄，引领帝国走向财政稳健和行政有序的未来。刀剑已经入鞘，这是整整一代人以来，账本第一次被认为比盾牌对罗马的生存更为重要。\""
 pmcm_cop.68.a: "这些麻烦终于过去了。"
 pmcm_cop.69.title: "军官的统治"
 pmcm_cop.69.desc: "铁血之人赢了，文房尚书们温柔的耳语已被宫廷地板上整齐划一的靴子踏地声所淹没。\n\n布拉赫奈宫现在屈从于殿内主帅和地方领主的意志，这些人如殿内军大主帅或大都督认为利剑的分量远胜于修辞学家的优雅陈词。残存的皇权现在公开套在战争机器上，呼应着几个世纪前军区制那种绝望的军事化。曾是帝国政策架构师的文官部委，如今只剩空壳；他们成了军营的仆人，唯一的目的就是从行省榨取最后一枚硬币和最后一粒粮食，以喂饱边境那填不满的胃口。\n\n统帅权现在高于口才，国家的要职由那些在血染的巴尔干山谷或安纳托利亚边境证明过价值的人担任。皇帝本人身穿铠甲而非丝绸祭袍出现的次数更加频繁，标志着向尼基弗鲁斯二世·福卡斯般武士皇帝理想的回归。虽然这种尚武活力有望遏制拉丁人和土耳其人的入侵，但它是以法治的沉重代价换来的。地方豪强掌握了权力大权，君士坦丁堡的中央权威日益沦为昔日的影子，完全依赖于那些手持铁刃之人的忠诚。"
 pmcm_cop.69.a: "让我们拥抱尚武之国。"
 pmcm_cop.70.title: "分歧上升为战争"
 pmcm_cop.70.desc: " 双方都无法征服对方，而民众对一个定论的渴望，最终成了点燃这场争端的火炬。\n\n随着君士坦丁堡的文官与军事贵族之间的僵持拖延，帝国脆弱的平衡终于崩塌，坠入了内战的深渊。\n\n从季季莫蒂霍的城墙到首都的金门，被沉重税收和权贵傲慢耗尽耐心的民众，已经投身于各自支持的继位者麾下，将每一个城市广场都变成了潜在的战场。\n\n罗马皇室及其东方继承者的悲剧，成了其竞争对手的丰收季。每一个邻居都在显而易见地幸灾乐祸，看着双头鹰撕扯自己的胸膛；斯特凡·杜尚治下的塞尔维亚帝国和奥尔汗治下兴起的奥斯曼贝伊国，看着色雷斯燃烧的乡村，眼中没有同情，只把它当作一场等待收割的宴席。\n\n学者和战略家的时代已经结束；僭越者的时代已经开始。"
 pmcm_cop.70.a: "我们将用钢铁开辟前路。"
 pmcm_cop.100.a: "上帝的旨意！"
 pmcm_cop.101.title: "巴尔干边境"
 pmcm_cop.101.desc: "拜占庭帝国为了维持对[ShowRegionName('balkan_region')]的控制，抵御斯拉夫定居者、保加利亚帝国以及后来的塞尔维亚人，进行了一场长达几个世纪、起伏不定的战斗（大约7-15世纪）。关键时期包括对保加利亚人残酷的领土丧失，巴西尔二世在11世纪的大规模收复，以及第四次十字军东征后的最终崩溃。\n\n虽然这些土地也许拥有最悠久的帝国存在历史，但它们也是最难以驾驭的地区之一，充斥着众多强盗王国和多波野蛮人迁徙的残余。我们重新夺回这些土地的努力将再次确保边境的稳定。"
 pmcm_cop.101.a: "我们将完成巴西尔未竟的事业。"
 pmcm_cop.102.title: "塞尔维亚战争"
 pmcm_cop.102.desc: "拜占庭-塞尔维亚战争（6-14世纪）是巴尔干半岛一系列长期的冲突，从早期的塞尔维亚附庸转变为后期的统治。最初，拜占庭利用塞尔维亚作为对抗竞争对手的缓冲，但尼曼雅王朝在1180年后积极向马其顿扩张，并在1340年代斯特凡·杜尚统治下达到顶峰，征服了拜占庭在巴尔干半岛的大部分地区。\n\n尽管在名义上被君士坦丁堡的皇帝们视为强盗王国，但实际上与塞尔维亚的战争往往代价高昂，并且多次将帝国推向毁灭的边缘。我们应该用火与剑提醒他们自己的位置。"
 pmcm_cop.102.a: "他们将被迫屈服。"
 pmcm_cop.103.title: "重新与保加尔人开战"
 pmcm_cop.103.desc: "拜占庭-保加利亚战争是一系列持续了670多年（约680-1355年）的激烈冲突，目的是争夺巴尔干半岛的控制权。拜占庭帝国为保卫其领土而战，而保加利亚则寻求扩张其国家，经常威胁君士坦丁堡。冲突的特点是保加利亚征服的戏剧性循环，例如在克鲁姆汗（813年）和西蒙一世沙皇（913-927年）的统治下，随后是拜占庭的恢复期。一个主要的转折点发生在1018年，当时皇帝巴西尔二世在1014年毁灭性的克雷迪昂战役后彻底征服了保加利亚，结束了第一个国家。保加利亚在1185年恢复了独立，导致重新发生冲突，直到两个帝国都被削弱，并发现自己任由土耳其的威胁摆布。\n\n随着拜占庭在更具野心的管理下，摧毁保加尔人只是时间和意志的问题。"
 pmcm_cop.103.a: "巴西尔的复仇将属于我们。"
 pmcm_cop.502.title: "赢得一场伟大的战役"
 pmcm_cop.700.title: "文书房大尚书的册封"
 pmcm_cop.700.desc: "到15世纪，文书房大尚书的册封在日益衰落的拜占庭帝国是一项极具仪式感的最高级别任命。随着这个角色演变成荣誉头衔或首席部长职位，册封仪式包括皇帝向被任命者颁发特定的徽章，通常在大皇宫内举行。仪式反映了该职位作为最高帝国顾问的角色，并在晚期拜占庭经常由著名学者担任。\n\n恢复这一职位的重要性是振兴拜占庭国家机器的关键一步。"
 pmcm_cop.700.a: "这个职位将为帝国带来巨大的回报。"
 pmcm_cop.701.title: "殿内军大主帅的册封"
 pmcm_cop.701.desc: "在15世纪的拜占庭帝国，殿内军大主帅担任陆军最高总司令，仅服从于皇帝。\n\n作为军事管理的负责人，该职位负责监督部队的部署，并在战役期间担任参谋长。虽然这个职位通常纯粹是军事性质的，但在晚期，它也经常作为高级荣誉头衔授予高级官员。"
 pmcm_cop.701.a: "荣耀将属于我们。"
 pmcm_cop.702.title: "大都督的册封"
 pmcm_cop.702.desc: "到15世纪，大都督是拜占庭海军的最高指挥官，负责在帝国衰落期间管理帝国舰队的残余。\n\n尽管海军力量大大减弱，该官员的任务是维持仅存的海军防御，与意大利海洋共和国协调，并监督海岸防御工事。除了积极的军事指挥外，他们还经常受托协调地方海军资源，特别是在爱琴海和伯罗奔尼撒半岛周围，以抵御奥斯曼帝国的威胁。"
 pmcm_cop.702.a: "我们将再次成为海洋的主人。"
 pmcm_cop.703.title: "殿中执事的册封"
 pmcm_cop.703.desc: "在15世纪的拜占庭帝国，家中亲丁作为高级文官，通常直接在皇帝的授权下管理帝国财产并监督货物的生产。他们通过实施规章制度、征收税款和执行质量标准来控制行会活动，以保护国家利益。\n\n在帝国的最后日子里，这些官员在维持首都工匠行会和贸易的后勤及经济稳定方面发挥了关键作用，特别是对于丝绸等重要物资。\n\n殿中执事的册封标志着一位政要进入了皇帝信任的朝臣核心圈子。\n\n这项高级荣誉是通过正式的宫廷仪式授予的，强调忠诚、家族联系以及接受者与君主之间的直接关系。这标志着剩余精英群体的深刻巩固，这些头衔促进了社会地位的提升以及宫廷资金在日益减少的官僚机构中的重新分配。"
 pmcm_cop.703.a: "人民将对此表示欢迎。"
 pmcm_cop.1000.title: "塞尔维亚袭击"
 pmcm_cop.1000.desc: "大祸害斯特凡·杜尚再次放任他的劫掠者越过边境，在防守薄弱的领土上烧杀抢掠。\n\n尽管塞尔维亚人只是在骚扰帝国，但我们的人民绝不容忍这种持续的掠夺。必须尽快采取行动应对这一威胁。"
 pmcm_cop.1000.a: "这是一个令人不安的进展。"
 pmcm_cop.1001.title: "大规模塞尔维亚袭击"
 pmcm_cop.1001.desc: "一群狡诈的塞尔维亚督军率领一支破坏性的骑兵突击队深入我们的边境行省，纵火焚烧了许多村庄和城镇。\n\n由于当地驻军溃不成军，粮仓被入侵者劫掠一空，我们必须决定是投入帝国主力进行代价高昂的追击，还是吞下苦果，忍受威望的损失。"
 pmcm_cop.1001.a: "这是战争行为……"
 pmcm_cop.9000.title: "称霸爱琴海"
 pmcm_cop.9000.desc: "在马其顿王朝统治下，海军曾重获新生，肃清了爱琴海的海盗并确保了物资供应。然而，后世统治者的怠慢导致海军在1284年被裁撤，使得威尼斯和热那亚商人攫取了统治地位。后来的拜占庭统治者虽试图重建控制权，但爱琴海已大体分裂为若干拉丁小邦（如群岛公国），即便奥斯曼在该地区的势力稳步增长，这些小邦仍在地区继业者国家与外国势力之间摇摆不定。\n\n经过多年的精心准备，我们现在终于有了手段和机会，重新将拜占庭的主权扩展到这些迷失的岛屿上。"
 pmcm_cop.9000.a: "恢复罗马人的内湖！"
 pmcm_cop.9906.t: "帕拉马斯会议"
 pmcm_cop.9906.d: "14世纪的静修争议代表了拜占庭东方神秘主义传统与拉丁西方新兴经院哲学之间的重大分歧。它发展成一种“心灵”祈祷的苦修体系，其根源可追溯至4世纪的沙漠教父，特别是本都的埃瓦格里乌斯和埃及的圣马卡里乌斯的著作，并由阿索斯山的修士们系统化。\n\n1330年代后期，这一传统面临着来自南意大利希腊裔僧侣[GetCharacter('byz_barlaam_of_seminara').GetName]的严峻智慧挑战。在遇到阿索斯山僧侣后，巴拉姆撰写了一系列论著，蔑称他们的心理生理修行方法为“凝视肚脐者”。\n\n修士们的辩护由圣[GetCharacter('byz_gregory_palamas').GetName]领导，他提出的复杂神学框架区分了上帝超然的本质与可供信徒参与的神能。这场辩论超出了单纯的僧侣争端，演变为在君士坦丁堡举行的一系列异常激烈的宗教会议（1341、1347和1351年）。其结果动摇了东正教会的教义，也可能标志着与西方拉丁神学方法的彻底决裂。"
 pmcm_cop.9906.a: "我们难道不能找到某种妥协吗？"
 cm_tyrian_divide_conclusion: "要求解决冲突"
 cm_tyrian_divide_conclusion_desc: "皇帝已经对派系之间的争吵和动荡感到疲惫。他们决定与其听之任之，不如采取行动，在冲突彻底破坏国家的雄心之前强行解决冲突。"
 cm_force_divide_end_tt: "选择此操作将强行结束该情况。\n\n结果将根据冲突的当前状态而有所不同。"
 cm_sop_press_claims: "主张帝国宣称"
 cm_sop_press_claims_desc: "拜占庭对巴尔干半岛和安纳托利亚失去领土的宣称植根于一种普遍的罗马主权意识形态，将失去的土地不视为外国的，而是视为“叛乱”的省份。虽然帝国经常专注于收复巴尔干核心地带以保卫君士坦丁堡，但它在黎凡特的宣称是断断续续的，并且主要受安全需求、十字军互动或保护基督教圣地的愿望驱使。"
 cm_sop_press_claims_tt: "获得对所选省份的宣称。"
 cm_sop_press_claims_tt1: "因主张复兴帝国主义而受到中等程度的地区敌意。"
 cm_sop_island_press_claims: "称霸爱琴海"
 cm_sop_island_press_claims_desc: "尽管经常受到外国势力和野心勃勃的继承国的争夺，但拜占庭对爱琴海岛屿的宣称可以追溯到罗马最早的征服。虽然当前形式的拜占庭的直接根源可以追溯到第四次十字军东征解散后的尼西亚帝国，但它仍然主张对整个群岛拥有控制的古老权利和特权。"
 cm_sop_island_press_tt: "获得对所选省份的宣称。"
 cm_sop_island_press_tt1: "因主张复兴帝国主义而受到中等程度的地区敌意。"
 cm_sop_destroy_bandits: "遏制匪患"
 cm_sop_destroy_bandits_desc: "拜占庭皇帝通过结合迅速的军事干预、法律改革和地方治安来镇压匪患，目标群体是那些转向抢劫的士兵和农民。国家雇佣地方总督来识别和惩罚强盗，而在查士丁尼一世和狄奥多西二世等皇帝统治下，法律法规执行严格的惩罚，通常使用致残（如致盲或割鼻）来使罪犯和叛乱分子丧失能力或起到威慑作用。"
 cm_sop_destroy_bandits_tt: "消除所选省份每个地点的土匪负面影响。"
 cm_sop_root_out_corruption: "根除腐败"
 cm_sop_root_out_corruption_desc: "帝国宫廷根除在各省巩固权力的腐败官员和傲慢贵族的努力应迅速进行，以确保黄金的流动畅通无阻，同时向地方精英“保证”叛乱是愚蠢的举动。只许成功，不许失败"
 cm_sop_root_out_corruption_tt: "消除所选省份每个地点的腐败负面影响。"
 cm_sop_settle_vets: "安置老兵"
 cm_sop_settle_vets_desc: "拜占庭为了安全而安置老兵的努力集中在7世纪的“军区制”上，该制度将指定地区（军区）的土地授予士兵，以换取世袭的军事服役。\n\n这建立了一支本地化、具有成本效益的农民士兵民兵队伍，加强了边防，抵御了阿拉伯人和斯拉夫人的入侵，同时鼓励了地方防御。"
 cm_sop_settle_vets_tt: "所选省份的每个地点将获得临时增益效果。"
 cm_sop_send_admins: "派遣帝国行政官"
 cm_sop_send_admins_desc: "拜占庭行省行政依赖于从君士坦丁堡文官行政机构派遣有权势的官员，以监督其广阔领土的发展、税收和司法。\n\n这种方法，特别是在7至10世纪之间，结合了民政和军事权力，以确保中央控制，加强当地基础设施，并最大限度地从农村地区榨取收入。"
 cm_sop_send_admins_tt: "所选省份的每个地点将获得临时增益效果。"
 cm_sop_improve_navy: "提高海军战备状态"
 cm_sop_improve_navy_desc: "在7世纪阿拉伯人征服之后，拜占庭重建了海岸防御并重组了海军部队，以确保海上航线的安全，这对于保护君士坦丁堡和支持海军行动至关重要。\n\n关键举措包括加强港口（例如在爱琴海），升级城墙，并为军区舰队建立海军基地，这通常得到战略性使用希腊火的支持。"
 cm_sop_improve_navy_tt: "拥有一支比热那亚和威尼斯更大的海军。"
 cm_sop_delegate_autonomy: "将自治权移交将军"
 cm_sop_delegate_autonomy_desc: "从7世纪开始，拜占庭皇帝授予军区将军极大的地方自治权，以加强地区防御。\n\n这些指挥官拥有集中的军政权力，以迅速应对威胁，尽管皇帝经常重组或分裂大军区，以防止他们变得过于强大，特别是在8至11世纪之间。"
 cm_sop_delegate_autonomy_tt: "所选省份的每个地点将获得临时效果。"
 cm_sop_bestow_honor: "授予大臣荣誉"
 cm_sop_bestow_honor_desc: "拜占庭皇帝通过授予高级宫廷大臣（通常是宦官或受信任的贵族）重大权力来维持权威，以换取忠诚和行政控制。\n\n这些受宠的官员——如中介从者或侍寝内官——控制着觐见皇帝的渠道，并管理国家财政、官僚机构和军队。"
 cm_sop_persecute_heretics: "迫害异端教派"
 cm_sop_persecute_heretics_desc: "拜占庭皇帝镇压宗教分歧，以强制政治统一和正统一致性，将宗教异议视为对国家稳定的威胁。\n\n他们利用法律、教会会议和帝国武力来针对异教、非迦克墩派基督徒以及圣像破坏运动，通常采取强迫改信，或通过流放与迫害来惩罚异端。"
 cm_sop_persecute_heretics1_tt: "将$cm_polarization_var$减少5点"
 cm_sop_aggressive_impressment: "强制征兵运动"
 cm_sop_aggressive_impressment_desc: "在危机期间，拜占庭皇帝（特别是从7至10世纪）利用激进的国家强制征兵来补充军队，当标准的职业士兵或基于军区拥有土地的士兵不足时，他们经常强迫农民、农夫甚至城市居民服役。\n\n这通常涉及没收农业劳动力，这可能会危及经济，但确保了为了防御而进行的快速、强制的补充。"
 cm_sop_aggressive_impressment1_tt: "将$cm_soldier_power_var$增加2点"
 cm_sop_aggressive_impressment2_tt: "将$cm_elan_var$增加2点"
 cm_sop_emergency_tax: "紧急税收评估"
 cm_sop_emergency_tax_desc: "拜占庭的紧急税收评估通常由战争或贡品需求引发，是与常规土地税一起征收的专门性重税。\n\n这些被称为特别税或附加税的评估（如12世纪的日耳曼税）经常遭到抵抗，迫使皇帝动用教会资金或没收财产。"
 cm_sop_dominate_sea: "称霸爱琴海"
 cm_sop_dominate_sea_desc: "拜占庭试图控制爱琴海的重点是确保连接君士坦丁堡和地中海的重要海上航线，主要是在与阿拉伯海盗和拉丁国家的竞争中作战。关键战略包括在9世纪建立爱琴海军区，利用“希腊火”摧毁敌方舰队，以及发起成功但缓慢的战役，如公元961年收复克里特岛，这在威尼斯势力崛起之前短暂地将爱琴海变成了一个安全的“拜占庭内湖”。"
 cm_sop_dominate_sea_over: "局势行动‘称霸爱琴海’已完成"
 cm_grand_logothete: "册封文书房大尚书"
 cm_grand_logothete_desc: "文书房大尚书的册封涉及皇帝的仪式性任命，确认他们为民政部门首脑和首席外交部长。\n\n这一高级官员职位主要在尼西亚和巴列奥略时期设立，被授予象征其对国家部门权威的徽章。该职位经常授予顶尖学者或高级官僚，充当事实上的首相或调解人。"
 cm_unlock_unlock_logothete_tt: "这将花费50 $cm_admin_effic_var$。"
 cm_grand_oikeiakon: "册封殿中文房尚书"
 cm_grand_oikeiakon_desc: "拜占庭殿中文房尚书（高级家臣之首）的授职是宫廷内部的一种正式任命，通常兼具司法、财政或外交职责。\n\n大约在10世纪出现，这位高级官员是皇帝管辖下负责国家工场、行会合同和仓库的专业化、等级森严的行政机构的一部分。"
 cm_unlock_unlock_oikeiakon_tt: "这将花费50 $cm_admin_effic_var$。"
 cm_megas_domestikos: "册封殿内军大主帅"
 cm_megas_domestikos_desc: "在拜占庭晚期（1204-1453年），高级军事领导层由职业化但在政治上分裂的精英主导，他们严重依赖外国雇佣兵如加泰罗尼亚人和因普罗尼亚制度获得土地分封的骑兵。高级指挥官，通常拥有如殿内军大主帅等头衔，经常是皇室成员或忠诚的贵族，尽管他们不断与日益增长的奥斯曼威胁以及内部的内战作斗争。"
 cm_unlock_megas_domestikos_tt: "这将花费50 $cm_elan_var$。"
 cm_megas_doux: "册封大都督"
 cm_megas_doux_desc: "拜占庭大都督的册封是由阿莱克修斯一世·科穆宁设立的一项高级仪式，任命海军最高指挥官，在帝国等级中通常排名第六。\n\n它涉及皇帝的正式提拔，授予对舰队的指挥权，并经常控制沿海省份。"
 cm_unlock_megas_doux_tt: "这将花费50 $cm_elan_var$。"
