l_simp_chinese:
 tyrian_divide: "紫衣之争"
 tyrian_divide_desc: "[GetCountry('BYZ').GetName]已不再庞大到足以容纳所有的野心，也不再富裕到足以奖赏每一位仆从。在宫廷里，#bold #R 文房尚书#!#!谈论着户口、使节和精打细算的分配；在军营和行省领地中，#bold #R 将军#!#!谈论着城墙、战马和统帅的残酷必然。双方都自称为罗马人土地的守护者，且互不退让。与此同时，城市里的平民、色雷斯乡村的农夫、港口的商贾以及首都的神职人员，都在要求结束这种阴谋与动荡。如果这场争斗不能得到控制，帝国可能会再次从内部消耗殆尽。"
 hint_tyrian_divide: "[GetSituationByKey('tyrian_divide').GetNameWithNoTooltip]提示"
 hint_tyrian_divide_hint_text: "$hint_tyrian_divide_hint_text_1$\n\n$hint_tyrian_divide_hint_text_2$"
 hint_tyrian_divide_hint_text_1: "这场[situation|e]标志着#italic 最强贝伊国#!的崛起，注定将缔造历史上最伟大的帝国之一。通过独特的[events|e]和[actions|e]，我们必须确保对其他贝伊国的统治地位，跨越[ShowProvinceDefinitionName('marmara_sea_province')]，并夺取[ShowLocationName('constantinople')]的财富。永恒的荣耀在等待着我们！"
 hint_tyrian_divide_hint_text_2: "#T 推荐行动：#!\n@arrow_bonus_tier_2! 我们崛起的时刻已经到来。通过使用诸如[ShowGenericActionName('press_claims')]等强大的[actions|e]，并从加快[integration|e]的[events|e]中获益，我们的崛起将被载入史册。\n@arrow_bonus_tier_1! 如果我们控制了#Y 120#!个[locations|e]并在[ShowRegionName('balkan_region')]站稳脚跟，我们也可以将[ShowGenericActionNameWithNoTooltip('press_claims')] [action|e]扩展到该[region|e]。"
 hint_tyrian_divide_diplomatic: "\"在[situation|e]的早期，明智的做法是使用提供的[actions|e]，例如[ShowGenericActionName('seek_relations_with_the_byzantines')]。利用他们日渐式微的声望作为$ROM$最后的堡垒，我们将建立自己的基业。\""
 hint_tyrian_divides_administrative: "\"虽然我们肯定会在征服方面表现出色，但我们必须关注我们的内部和王国的核心。在追求海外荣耀的同时，不要忽视我们的内政！\""
 hint_tyrian_divide_military: "\"我们必须设法征服敌人的[towns_and_cities|e]。这些战役将成为世代强权的基础。\""
 pmcm_GUI_header_byzantine_empire: "#color_yellow 拜占庭帝国#!"
 pmcmc_GUI_spacer: ""
 sop_GUI_breakdown_txt: "#bold #R 帝国国情#!#! - $cm_imperial_authority_var$: $cm_imperial_authority_counter$/3\n $cm_elan_var$: $cm_elan_counter$/100\n $cm_admin_effic_var$: $cm_admin_effic_counter$/100\n#bold #color_yellow 权力平衡：\n#!#! $cm_soldier_power_var$: $cm_soldier_power_counter$ \n $cm_clerk_power_var$: $cm_clerk_power_counter$\n#bold #color_yellow 情绪：#!#!\n $cm_polarization_var$: $cm_polarization_counter$\n\n[GetCountry('BYZ').GetName]可获得以下增益：\n@trigger_yes! 增加或减少派系影响力的[events|e]，$cm_elan_var$和$cm_admin_effic_var$，以及获得对[provinces|e]的宣称\n@trigger_yes! 独特的[situation|e] [actions|e]\n@trigger_yes! 从赢得战斗和战争中获得$cm_elan_var$的能力。\n\n#bold 备注：#!\n*$cm_polarization_var$每年增加1点\n*$cm_elan_var$与$cm_admin_effic_var$每年衰减1点。"
 cm_struggle_of_the_purple: "紫衣之争"
 cm_struggle_of_the_purple_desc: "[GetCountry('BYZ').GetName]已不再庞大到足以容纳所有的野心，也不再富裕到足以奖赏每一位仆从。在宫廷里，#bold #R 文房尚书#!#!谈论着户口、使节和精打细算的分配；在军营和行省领地中，#bold #R 将军#!#!谈论着城墙、战马和统帅的残酷必然。双方都自称为罗马人土地的守护者，且互不退让。与此同时，城市里的平民、色雷斯乡村的农夫、港口的商贾以及首都的神职人员，都在要求结束这种阴谋与动荡。如果这场争斗不能得到控制，帝国可能会再次从内部消耗殆尽。"
