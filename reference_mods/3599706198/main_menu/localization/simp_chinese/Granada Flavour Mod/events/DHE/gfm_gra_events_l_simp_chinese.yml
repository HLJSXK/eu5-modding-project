l_simp_chinese:
 gfm_GRA.1.title: "格拉纳达黄金时代"
 gfm_GRA.1.desc: "年轻的[ROOT.GetCountry.GetGovernment.GetRuler.GetName]登上格拉纳达王位，民众十分乐观。我们新任的[ROOT.GetCountry.GetGovernment.GetRulerTitle]虽年少却智慧超群，其子嗣[muhammad_v.GetNameWithNoTooltip]的诞生更确保了王位传承。尽管强大的基督教王国正觊觎我们的土地，但安达卢斯最后的堡垒正迈入繁荣时代，若蒙真主眷顾，和平亦将随之而来。"
 gfm_GRA.1.a: "尽管困难重重，我们依然光芒四射！"
 gfm_GRA.1.historical_info: "优素福一世及其子穆罕默德五世的统治时期被公认为纳斯里德泰法国的黄金时代。他们的统治以相对和平稳定为特征，与再征服运动中大多数伊斯兰泰法诸侯国经历的内乱和破坏形成鲜明对比。尤其是穆罕默德统治时期，格拉纳达迎来了文化与建筑成就的高峰，兴建了诸多至今犹存的著名纪念建筑。"
 gfm_GRA.2.title: "优素福伊斯兰学院"
 gfm_GRA.2.desc: "许多饱学之士光临我国宫廷，然而我们伟大的首都却缺少一所官方的高等学府。廷臣们建议君主出资在[ROOT.GetCountry.GetCapital.GetName]兴建一座宏伟的伊斯兰学院，以便在本土培养未来的学者、科学家与圣职人员。"
 gfm_GRA.2.a: "一项值得的努力。"
 gfm_GRA.2.b: "浪费资源……"
 gfm_GRA.2.historical_info: "优素福经学院由纳斯里德王朝君主优素福一世于1349年创立，坐落于格拉纳达市中心，毗邻主清真寺。其教育核心通常涵盖伊斯兰教法、阿拉伯语语法及相关学科。格拉纳达被西班牙征服后，经学院曾持续运作一段时间，但在1499年的一场起义后遭洗劫关闭，后被改造为市政厅。原建筑主体在18世纪被拆除，如今该遗址已成为格拉纳达大学的一部分。"
 gfm_GRA.3.title: "优素福一世之死"
 gfm_GRA.3.desc: "今日，我们的王国陷入动荡。就在他如往常一样在清真寺完成每日祈祷时，一名男子突然冲向我们的[ROOT.GetCountry.GetGovernment.GetRulerTitle]并用刀袭击了他！尽管行凶者被愤怒的民众撕成碎片，[ROOT.GetCountry.GetGovernment.GetRulerTitle]也被火速送回阿尔罕布拉宫，但我们最精湛的外科医师也未能挽救他的生命……"
 gfm_GRA.3.a: "这真是太糟糕了！"
 gfm_GRA.3.historical_info: "1354年10月19日，正值伊斯兰教开斋节期间，优素福在格拉纳达大清真寺祈祷时遇刺身亡。现存的当代记载无法确定他被谋杀的动机，只是将凶手描述为一个“疯子”，此后由16岁的儿子穆罕默德五世继位。"
 gfm_GRA.4.title: "宫廷政变！"
 gfm_GRA.4.desc: "我们的[ROOT.GetCountry.GetGovernment.GetRulerTitle]遭遇了背叛！阴谋者曾试图废黜[ROOT.GetCountry.GetGovernment.GetRuler.GetName]，拥立其弟[usurper_brother.GetName]为王。在短暂流亡后，我们英勇的统治者成功回归并夺回王座。这场愚蠢的政变被粉碎后，我们[ROOT.GetCountry.GetGovernment.GetRulerTitle]的权威已不容置疑！"
 gfm_GRA.4.a: "叛徒当诛！"
 gfm_GRA.4.historical_info: "穆罕默德五世即位仅数年，便因宫廷政变被迫让位于同父异母的兄弟伊斯玛仪二世。然而伊斯玛仪二世在位仅数月即遭政变同谋者刺杀，由其堂兄继位称穆罕默德六世。1362年，在卡斯蒂利亚国王佩德罗的支持下，穆罕默德五世重返格拉纳达夺回王位。他的第二次统治持续近三十年，将格拉纳达王国的文化与外交推向了顶峰。"
 gfm_GRA.5.title: "狮庭"
 gfm_GRA.5.desc: "宏伟的[ShowBuildingTypeName('alhambra')]是[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]王朝的巅峰成就。这座建筑本身就是一座独立完整的城池，我们的[ROOT.GetCountry.GetGovernment.GetRulerTitle]已下令对权力中枢进行新一轮扩建，这将是漫长扩建史上的最新篇章。他构想了一座极尽奢华的宫殿与庭院，以彰显我国建筑技艺的至高境界。尽管这项工程耗资不菲，但一旦落成，必将令整个伊斯兰世界为之倾倒！"
 gfm_GRA.5.a: "[ShowBuildingTypeName('alhambra')]的又一颗璀璨明珠！"
 gfm_GRA.5.b: "国库根本无法承受这些奢侈的开支……"
 gfm_GRA.6.title: "格拉纳达马里斯坦医院"
 gfm_GRA.6.desc: "黑死病的破坏与恐怖仍在我们的人民心中记忆犹新，包括我们的[ROOT.GetCountry.GetGovernment.GetRulerTitle]。宫廷的数位建筑师已提交了“玛里斯坦”的伊斯兰医院设计方案，其建造将有助于抵御未来的疫情爆发。"
 gfm_GRA.6.a: "最近的事件表明，这至关重要。"
 gfm_GRA.6.b: "医疗事务交由[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]处理。"
 gfm_GRA.6.historical_info: "马里斯坦（或称比玛里斯坦）是伊斯兰世界历史上医院的对应机构，最初起源于波斯地区，后传播至摩洛哥和安达卢斯地区。格拉纳达的马里斯坦可能受到了摩洛哥建立的类似机构（如13世纪非斯的西迪·弗雷杰玛里斯坦）的启发或影响。格拉纳达马里斯坦逐渐转型为精神病院，成为欧洲最早收治精神疾病患者的医疗机构之一。在西班牙统治时期，该建筑先后被改造为铸币厂、酿酒厂，最终在18或19世纪被废弃。"
 gfm_GRA.7.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]‑[GetCountry('MOR').GetGovernment.GetRuler.GetDynasty.GetName]关系"
 gfm_GRA.7.desc: "[ROOT.GetCountry.GetName]与[GetCountry('MOR').GetName]的历史关系向来错综复杂。我们曾是挚友、宿敌与盟友，有时甚至同时兼具多重身份！[ROOT.GetCountry.GetName]长期是流亡的[GetCountry('MOR').GetGovernment.GetRuler.GetDynasty.GetName]王公们的庇护所，而[GetCountry('MOR').GetCapital.GetName]则始终是[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]贵族们钟意的驰骋之地。这种关系在我们军队中体现得最为鲜明——军中大量成员正是被称为#italic 加齐#!的信仰志愿军，这些来自海峡对岸的战士为协助我们抗击基督教入侵者而战。近年来，他们的规模已膨胀到远超本土军队的程度！"
 gfm_GRA.7.a: "无论好坏，我们的命运已经交织在一起。"
 gra_the_berbers_are_coming_tt: "柏柏尔部落的战士们将开始向我们的首都区域迁移，准备拿起武器捍卫我们的信仰！"
 gfm_GRA.7.historical_info: "在格拉纳达的大部分历史中，它与摩洛哥的马林苏丹国保持着密切的关系，马林苏丹国的王公指挥格拉纳达军队的情况并不少见。“穆贾希丁”是格拉纳达埃米尔国的一个军事思潮，由许多马林苏丹国的流亡者和志愿者组成，主要是泽纳塔柏柏尔人。随着时间的推移，这些志愿者超过了格拉纳达当地的部队，成为其主要的军事力量，在穆罕默德二世统治末期达到了一万人。"
 gfm_GRA.8.title: "伊本·哈提卜"
 gfm_GRA.8.desc: "今日，一位显赫人物被带至我们的宫廷中。作为新建的#italic 优素福经学院#!的首批毕业生之一，[target_character.GetNameWithNoTooltip]是一位学识渊博、才华横溢的学者。这样有才华的人埋头于经文研究岂不是浪费了吗？"
 gfm_GRA.8.a: "一位非常能干的顾问！"
 gfm_GRA.8.b: "我们不需要更多狡猾的权力追求者……"
 gra_khatib_writing_tt: "[target_character.GetNameWithNoTooltip]将加入我们的宫廷，并继续发表他的著作。"
 gra_khatib_rekt_tt: "若无赞助者，[target_character.GetNameWithNoTooltip]与其作品恐将湮没无闻……"
 gfm_GRA.8.historical_info: "利桑·阿丁·伊本·哈提卜是安达卢西亚的博学者，活跃于格拉纳达黄金时代，集诗人、作家、历史学家、哲学家、医师与政治家于一身。他长期担任优素福一世及其继任者穆罕默德五世宫廷的维齐尔，也是优素福经学院的首批毕业生之一。其最著名的著作包括关于黑死病的论文（其中探讨了疾病通过接触传播的观点）以及名为《格拉纳达通史》的历史编年体自传，哈提卜最终因卷入宫廷阴谋被指控为异端，于1374年被处决。"
 gfm_GRA.9.title: "[ibn_al_khatib.GetName]出版#italic 《论瘟疫》"
 gfm_GRA.9.desc: "[ibn_al_khatib.GetName]今日完成了他最伟大的著作之一——一部关于曾肆虐世界的黑死病的研究。该文本记录了关于症状、死亡人数以及疾病为何传播如此迅速的可能理论的观察。"
 gfm_GRA.9.a: "一本眼光独到的书籍。。"
 gfm_GRA.9.historical_info: "《论瘟疫》是伊本·哈提卜最著名的作品之一，其显著之处在于它是最早承认疾病通过接触传播的医学论著之一。"
 gfm_GRA.10.title: "一个机遇"
 gfm_GRA.10.desc: "[ShowRegionName('iberia_region')]的南端具有巨大的战略价值，直到不久前还是我们王国的一部分。我们被迫将重要的[ShowLocationName('algeciras')]集镇及其周边地区割让给[GetCountry('MOR').GetName]，以换取在我们与[GetCountry('CAS').GetName]的众多冲突中的一次援助。目前，占据我们合法领土的势力正因他处战事而分心，如果我们有意，很可能可以几乎不遇抵抗地收复这一区域。但此举并非没有风险，因为我们无疑会激怒当前控制它的势力……"
 gfm_GRA.10.a: "立即派兵围攻[ShowLocationName('algeciras')]！"
 gfm_GRA.10.b: "这真是个糟糕的主意……"
 gfm_GRA.10.historical_info: "伊比利亚半岛南端的战略要地，包括阿尔赫西拉斯及邻近的直布罗陀地区，在13至14世纪间历经多次易主。格拉纳达曾于1320年代末将该地区割让给摩洛哥，却在1342年落入卡斯蒂利亚之手。1369年，趁卡斯蒂利亚深陷内战之际，穆罕默德五世率军围攻阿尔赫西拉斯。由于缺乏王室支援，该城仅坚守三日便告陷落。连年战火使阿尔赫西拉斯元气大伤，至1379年，居民几乎全部迁往更易防守的直布罗陀定居点。"
 gfm_GRA.11.title: "格拉纳达人围攻阿尔赫西拉斯！"
 gfm_GRA.11.desc: "趁我们目前处于战争状态，那些懦弱的[dirty_thief.GetAdjectiveWithNoTooltip]人已经进军战略要地阿尔赫西拉斯及周边地区，并宣称其为他们的领土。我们必须如何应对这种公然且毫无道理的侵略行为？"
 gfm_GRA.11.a: "他们会为此付出代价的！"
 gfm_GRA.11.b: "暂且不管他们，他们可能很快就会自己失去它……"
 gra_siege_mentality: "格拉纳达围城"
 gra_siege_mentality_desc: "被比我们大得多的敌对国家包围，我们的人民已经做好准备。我们的士兵知道，当他们参战时，他们是在为伊比利亚所有穆斯林的命运而战！"
 adu_iberian_melting_pot: "伊比利亚熔炉"
 adu_iberian_melting_pot_desc: "安达卢斯是一个拥有多种信仰和民族的土地，虽然我们在许多事情上与犹太人和基督徒存在分歧，但他们仍然是有经者，因此应该允许他们自由地信仰宗教而不受恐惧或伤害。"
 adu_new_horizons: "新视野"
 adu_new_horizons_desc: "我国的基督教商人提到了一个充满富饶和未开发土地的新世界，我们应该鼓励探险精神，去开发利用这些富饶的新土地！"
 adu_scholarly_patronage: "学术赞助"
 adu_scholarly_patronage_desc: "安达卢斯的苏丹和埃米尔以其对艺术和科学的赞助而闻名。除非我们也资助这些高尚的追求，否则我们不能声称自己是这些国家的继承者。"
 gra_art_court_of_lions: "狮庭"
 gra_art_court_of_lions_desc: "一座宏伟壮丽的宫殿建筑群，由四座殿堂环绕着一个巨大的长方形庭院构成。庭院中央最引人注目的是一座大理石喷泉，其上雕刻着十二尊雄狮雕像。"
 gra_art_on_the_plague: "论瘟疫"
 gra_art_on_the_plague_desc: "一部记录黑死病观察与理论的医学论著。"
 gra_ghazi_privilege: "信仰志愿者"
 gra_ghazi_privilege_desc: "许多[ShowCultureName('zenati')]柏柏尔人和其他马林苏丹国的流亡者已在我国找到家园，他们渴望以真主之名效力。通过将他们组织成一支有建制的战斗力量，我们可以用这些坚定信仰的真正战士来增强我们自己的军队！"
 nasrid_patronage_reform: "纳斯里德赞助"
 nasrid_patronage_reform_desc: "我们的统治者以资助艺术与科学而闻名，苏丹国中许多成员本身就是作家和诗人！"