l_simp_chinese:
 st_meg: "大都市圈"
 st_meg_desc: "一座远超普通城市规模的大都市圈，是人口、贸易与权力的广阔枢纽，其影响力足以塑造整个区域乃至国家的命运。"
 FOUND_st_meg: "建立大都市圈"
 FOUND_st_meg_effect: "该省份将转变为大都市圈，大幅提升其人口容量、移民吸引力、生产力、建设能力和行政影响力。"
 ACTIVE_st_meg: "大都市圈状态"
 st_met: "大都会"
 st_met_desc: "大都会是一个地区的主导中心，集商业、手工业与市民生活于一体的大超市。它的影响力辐射周边地域，将人口、文化与财富尽数吸纳至其引力范围中。"
 FOUND_st_met: "建立一个大都会"
 FOUND_st_met_effect: "该省份将升格为大都会，大幅提升其人口容量、移民吸引力、生产力、建设能力和行政影响力。 "
 ACTIVE_st_met: "大都会状态"