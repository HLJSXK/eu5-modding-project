l_simp_chinese:
 expanded_irrigation_systems: "地方灌溉工程"
 expanded_irrigation_systems_desc: "一个由沟渠、运河和水井组成的有序网络，将水引至原本干旱的田地，使得内陆地区也能维持更大的农村人口规模。"
 ducal_capital: "公国首都"
 ducal_capital_desc: "一个地区性的治理中心，公爵与官员在此处理事务，其巩固地方权威，并将行政影响力辐射至周边定居点。"
 expanded_irrigation_input: "本地灌溉需求："
 ducal_capital_input: "公国首都需求："
 metropolitan_port_authority: "都会港务局"
 metropolitan_port_authority_desc: "一个庞大的沿海管理机构，负责监管海关、关税及商船航运。它集中征收税费，并在整个区域增强海上影响力。"
 metropolitan_port_authority_input: "港务局维护费："
 central_industrial_district: "中央工业区"
 central_industrial_district_desc: "一个以大型工坊与制造厂聚集的区域。它能加速生产与建造速度，但会加剧粮食供应压力并恶化居住条件。"
 central_industrial_district_input: "工业维护费："
 metropolitan_academy_of_sciences: "大都会科学院"
 metropolitan_academy_of_sciences_desc: "这座城市的科学院成为吸引学者与商人的磁石，是数学、天文学与应用科学的中心，学者们渴求创新与威望。"
 metropolitan_academy_of_sciences_input: "科学院维护费："
 imperial_stock_exchange: "帝国证券交易所"
 imperial_stock_exchange_desc: "这里是帝国的金融命脉，商人们在此投机贸易、工业与主权信贷。财富在此迅速积累，野心亦随之膨胀。"
 imperial_stock_exchange_input: "证券交易所维护费："
 complex_transport_network: "复杂交通网"
 complex_transport_network_desc: "一个由道路、隧道和水道组成的多层系统，旨在支撑巨大的交通流量，让每个角落都变得可达且高效。"
 complex_transport_network_input: "运输网络维护费："
 metropolitan_guard_headquarters: "都市警卫队总部"
 metropolitan_guard_headquarters_desc: "精英警卫队的中央指挥中心，负责维护和平与快速响应，这些专业士兵的存在既安抚了民众，也震慑了犯罪分子。"
 metropolitan_guard_headquarters_input: "警卫队总部维护费："
 metropolitan_council_hall: "都会市政厅"
 metropolitan_council_hall_desc: "一座庄严建筑，贵族与官员在此商议城市政策。行政影响力向外辐射，强化对周边领土的控制。"
 metropolitan_council_hall_input: "市政厅维护费："
 metropolitan_tax_office: "都会税务局"
 metropolitan_tax_office_desc: "一个专门负责城市税收与财政改革的财政机构，让地方财富汲取变得高效——或许过于高效了。"
 metropolitan_tax_office_input: "税务局维护费："
 grand_opera_house: "大歌剧院"
 grand_opera_house_desc: "一座具有里程碑意义的音乐和文化殿堂。艺术家、贵族和富有的市民蜂拥而至，增强了这座城市的魅力与国际威望。"
 grand_opera_house_input: "歌剧院维护费："
 urban_sewer_network: "下水道网络"
 urban_sewer_network_desc: "防止疫病和污秽的地下管道网络迷宫，对维持极高人口密度至关重要。"
