 nea_moni_mosaic_cycle: "新修道院镶嵌画"
 dionysiou_fresco_cycle: "狄奥尼修湿壁画组画"
 nerezi_fresco_cycle: "内雷齐湿壁画组画"
 leo_bible: "利奥的《圣经》"
 menologion_of_basil: "巴西尔二世圣徒月历"
