 kontakia_of_romanos: "罗曼诺斯的赞歌"
 kontakion_hymn_tradition: "大教堂圣歌传统"
 imperial_consular_diptych: "帝国执政官双联画"
 loros_imperial_regalia: "帝国礼仪长袍"
 relics_of_saint_basil: "圣大巴西略圣髑"
 church_of_saint_nicholas_myra: "米拉的圣尼各老教堂"
 red_basilica_pergamon: "佩加蒙红色大殿"
 sumela_monastery: "苏梅拉圣母修道院"
 cappadocian_church_frescoes: "卡帕多西亚岩凿教堂湿壁画"
 trebizond_hagia_sophia_frescoes: "特拉比松圣索菲亚大教堂湿壁画"
 cappadocian_monastic_scriptoria: "卡帕多西亚修道院缮写室"
 eastern_theme_fortifications: "东部军区要塞"
 church_of_chora_desc: "一座晚期帝国修道院教堂，以其精美的马赛克和壁画闻名，代表了君士坦丁堡圣艺与神学思想成熟期的最后辉煌。"
 monastery_of_stoudios_desc: "众城之女王的伟大修道院建筑之一，长久以来都是是学术、礼仪改革与手抄本制作的中心。"
 great_palace_triklinos_desc: "皇宫的礼仪大厅，建筑、仪式与等级制度在此结合，彰显罗马皇帝的普世权威。"
 rotunda_of_galerius_desc: "一座继承自古代晚期并改造用于基督教崇拜的巨型穹顶建筑，体现了罗马帝国建筑的连续性。"
 church_of_hagia_sophia_nicaea_desc: "尼凯亚的主教堂，与宗教会议、教义及皇权行使密切相关。"
 vladimir_icon_of_mary_desc: "一幅备受尊崇的君士坦丁堡圣像，以其情感的深度和对东正教虔敬艺术的持久影响而著称。"
 theo_metochites_donor_mosaic_desc: "一幅宫廷镶嵌画，描绘了皇家赞助，通过视觉象征将谦卑、学识与权威融为一体。"
 daphni_christ_pantokrator_desc: "一幅主宰穹顶的图像，呈现基督为宇宙统治者，以平衡、克制和庄严的皇权为特征。"
 nea_moni_mosaic_cycle_desc: "一项皇家镶嵌画项目，以其明亮的色彩、精致的人物形象和神学上的连贯性而闻名。"
 dionysiou_fresco_cycle_desc: "一系列宏伟的壁画，反映了成熟的修道院绘画风格和严谨的叙事构图。"
 nerezi_fresco_cycle_desc: "以情感强度、流畅的动态和精致的圣像肖像画为特色的表现性壁画。"
 leo_bible_desc: "一本华丽的皇家抄本，体现了精湛的书法、仪式性的呈现与宫廷的赞助。"
 menologion_of_basil_desc: "一本插图丰富的礼仪历书，将圣徒与节庆呈现在一个统一的皇家视觉项目中。"
 alexiad_desc: "一部融合个人见证与政治分析的宫廷历史叙事，提供对帝国治理与战争的详细记述。"
 synopsis_historion_desc: "一部简明的编年史，通过有序的叙事和道德反思呈现了数个世纪的历史。"
 theophanes_continuatus_desc: "一部宫廷赞助的罗马史编撰续作，保存了关于国家和王朝的皇家视角。"
 chronographia_desc: "一部复杂的历史著作，结合了传记、道德反思与政治评论。"
 taktika_of_leo_desc: "一部帝国军事论文，概述了职业化罗马军队内部的战略、纪律与指挥。"
 strategikon_desc: "一部关于战争的基础性手册，强调适应性、情报与组织纪律。"
 syntagma_canonum_desc: "一部全面的法律与教会汇编，整理了数个世纪的教规传统。"
 kontakia_of_romanos_desc: "礼仪赞美诗，以其诗意的力量、戏剧性的结构和神学的深度而闻名。"
 kontakion_hymn_tradition_desc: "一种发展的城市赞美诗传统，塑造了公共崇拜和神圣表演。"
 imperial_consular_diptych_desc: "一件象征官职、等级制度和罗马国家传统连续性的礼仪物品。"
 loros_imperial_regalia_desc: "在皇家仪式中穿戴的神圣礼袍，通过形式、传统和象征体现权威。"
 relics_of_saint_basil_desc: "因其灵性权威和持久的神学遗产而受到崇敬的圣物。"
 church_of_saint_nicholas_myra_desc: "一座重要的朝圣教堂，与一位广受尊敬的圣徒和赞助人崇拜相关。"
 red_basilica_pergamon_desc: "一座古代晚期的巨大建筑，后被改用于基督教崇拜，以其宏大的规模著称。"
 sumela_monastery_desc: "一座引人注目的修道院建筑群，坐落于本都的悬崖之上，结合了与世隔绝、虔敬修行和皇家赞助。"
 cappadocian_church_frescoes_desc: "装饰岩石教堂的壁画，以其叙事的清晰性和地区性的修道院特征而著称。"
 trebizond_hagia_sophia_frescoes_desc: "一项精致的壁画项目，反映了晚期帝国的宫廷文化和地区艺术传统。"
 cappadocian_monastic_scriptoria_desc: "保存神圣与学术文本的省级手抄本生产中心。"
 eastern_theme_fortifications_desc: "反映了罗马帝国东部行省战略组织和军事优先级的防御工事。"
 san_vitale_ravenna: "拉文纳圣维塔莱教堂"
 san_vitale_ravenna_desc: "一座集中式规划的皇家教堂，以宏伟的镶嵌画和建筑的和谐而闻名。"
 sant_apollinare_classe: "圣阿波利纳雷教堂"
 sant_apollinare_classe_desc: "一座以明亮的后殿镶嵌画和早期帝国基督教象征主义著称的长方形教堂。"
 cappella_palatina: "巴勒莫行宫礼拜堂"
 cappella_palatina_desc: "座皇家礼拜堂，将罗马礼仪艺术与本地及东方的影响融为一体。"
 monreale_mosaic_cycle: "蒙雷阿莱镶嵌画组画"
 monreale_mosaic_cycle_desc: "一个巨大而统一的马赛克项目，在墙壁和拱顶上描绘了神圣历史。"
 ravenna_imperial_mosaics: "拉文纳帝国镶嵌画"
 ravenna_imperial_mosaics_desc: "描绘皇权、仪式和神圣合法性的宫廷镶嵌画。"
 san_marco_mosaic_program: "圣马可镶嵌画项目"
 san_marco_mosaic_program_desc: "一个广阔的内部马赛克组画，直接借鉴了罗马艺术传统。"
 studenica_monastery: "斯图代尼察修道院"
 studenica_monastery_desc: "一座宏伟的修道院，融合了罗马建筑形式与地区的石工技艺。"
 gracanica_monastery: "格拉查尼察修道院"
 gracanica_monastery_desc: "一座精致的十字穹顶教堂，代表了罗马教会设计在中世纪晚期的繁荣。"
 holy_apostles_thessaloniki: "塞萨洛尼基圣彼得与圣保罗教堂"
 holy_apostles_thessaloniki_desc: "一座装饰丰富的大都会教堂，反映了成熟的都市宗教建筑风格。"
 ohrid_fresco_cycle: "奥赫里德湿壁画组画"
 ohrid_fresco_cycle_desc: "一个具有影响力的壁画组画，将表现性的人物形象与正式的罗马构图相结合。"
 hosios_loukas_monastery: "圣路加修道院"
 hosios_loukas_monastery_desc: "一座中世纪中期罗马建筑的杰作，以其和谐的比例和镶嵌画而闻名。"
 alahan_monastery: "阿拉罕修道院"
 alahan_monastery_desc: "一座早期的宏伟建筑群，反映了从古代晚期到中世纪神圣建筑的过渡。"
 latmos_frescoes: "拉特莫斯湿壁画"
 latmos_frescoes_desc: "罕见的省级壁画，保存了早期中世纪的宗教图像。"
 lycia_church_mosaics: "吕西亚教堂镶嵌画"
 lycia_church_mosaics_desc: "展示了罗马艺术语言在小亚细亚传播的地区性镶嵌画。"
 nativity_church_mosaics: "圣诞教堂镶嵌画"
 nativity_church_mosaics_desc: "饰基督教世界最受尊崇圣地之一的帝国时代修复镶嵌画。"
 saint_catherine_monastery: "西奈的圣凯瑟琳修道院"
 saint_catherine_monastery_desc: "一座要塞化的修道院建筑群，保存了极其古老的建筑、圣像和手抄本。"
 sinai_christ_pantokrator: "西奈的全能者基督像"
 sinai_christ_pantokrator_desc: "一幅具有深远影响的图像，定义了基督在圣像艺术中的规范表现"
 sinai_icon_collection: "西奈圣像收藏"
 sinai_icon_collection_desc: "在数个世纪的动荡中保存下来的早期宗教图像的独特遗存。"
 red_monastery_sohag: "索哈杰红色修道院"
 red_monastery_sohag_desc: "一座宏伟的砖砌修道院，以其雕塑般的内饰和彩绘装饰而著称。"
 white_monastery_sohag: "索哈杰白色修道院"
 white_monastery_sohag_desc: "一座令人印象深刻的石构建筑群，将古典形式与当地的宗教传统相结合。"
 coptic_roman_icon_tradition: "埃及罗马圣像传统"
 coptic_roman_icon_tradition_desc: "一个融合了继承的罗马圣像画法与本地艺术表现的地区性流派。"
 bagrati_cathedral: "巴格拉季主教座堂"
 bagrati_cathedral_desc: "一座皇家大教堂，象征着罗马建筑理念向高加索地区的传播。"
 gelati_monastery: "格拉特修道院"
 gelati_monastery_desc: "一处建筑、学术与圣像艺术交汇的学问与艺术殿堂。"
 great_palace_of_constantinople: "大皇宫"
 great_palace_of_constantinople_desc: "罗马帝国的主要皇宫与国家仪式中心，包含觐见大厅、礼拜堂、皇室居所及园林，是皇帝行使统治权并举行帝国仪典的场所。"
 blachernae_palace: "布拉奇奈宫"
 blachernae_palace_desc: "一座靠近陆地城墙的后期帝国宫殿，因其易守难攻的位置与不断发展的礼仪功能而备受皇帝青睐。"
 bucoleon_palace: "布科勒翁宫"
 bucoleon_palace_desc: "坐拥马尔马拉海美景的海滨宫殿，曾作为皇室举行仪式和私人休憩的场所。"
 palace_of_the_despots_mystras: "摩里亚专制君主宫殿"
 palace_of_the_despots_mystras_desc: "一处授予皇族成员的府邸与理政宫廷，象征着罗马行省体系中被授予的代理权力。"
 trebizond_palace: "特拉比松皇宫"
 trebizond_palace_desc: "东黑海沿岸的一个地区性皇家住所，是罗马当局的礼仪和行政中心。"
 thessaloniki_imperial_palace: "塞萨洛尼基皇宫"
 thessaloniki_imperial_palace_desc: "一个体现塞萨洛尼基作为重要行政、军事与礼仪中心地位的行省帝国宫廷。。"
 nicaea_imperial_residence: "尼凯亚皇宫"
 nicaea_imperial_residence_desc: "一座行政宫殿，供皇帝在小亚细亚西部长期居住时使用。"
 magnaura_palace: "马格瑙拉豪宅"
 magnaura_palace_desc: "紧邻君士坦丁堡皇宫区的贵族府邸，长久以来与学术、外交及精英教育紧密相连。玛格瑙拉宫虽非皇家宫殿，却是学者、官员及外国使节的聚会场所。"
 boukoleon_villa: "布科莱翁海滨别墅群"
 boukoleon_villa_desc: "俯瞰马尔马拉海的一群精英住宅，深受高级朝臣和皇室成员青睐，他们在此寻求远离首都正式礼仪空间的隐私。"
 senatorial_hill_residences: "元老山宅邸"
 senatorial_hill_residences_desc: "君士坦丁堡古老元老家族拥有的城市豪宅，反映了罗马公民贵族在帝国首都内持久不衰的威望。"
 athenian_aristocratic_estates: "雅典贵族庄园"
 athenian_aristocratic_estates_desc: "雅典拥有土地和学识的精英阶层的精致住所，融合了古典传统与罗马行政文化，并作为教育和地方赞助的中心。"
 thessaloniki_urban_villas: "塞萨洛尼基城市别墅"
 thessaloniki_urban_villas_desc: "由商业巨头和地方贵族拥有的装修精良的豪宅，反映了塞萨洛尼基作为罗马世界主要商业和行政中心的角色。"
 ohrid_episcopal_residence: "奥赫里德主教官邸"
 ohrid_episcopal_residence_desc: "一座兼具宗教和贵族功能的、坚固而精致的官邸，象征着奥赫里德作为西巴尔干地区宗教和文化中心的重要性。"
 nicaea_governors_residence: "尼凯亚总督官邸"
 nicaea_governors_residence_desc: "一座供行省总督和高级官员使用的精英行政宅邸，反映了尼凯亚长期以来作为治理、法律和神学中心的角色。"
 cappadocian_estate_villas: "卡帕多基亚庄园别墅"
 cappadocian_estate_villas_desc: "卡帕多基亚独特地貌中凿刻并建造的乡间府邸，曾作为地主精英、寺院赞助者和军事行政官员的居所。"
 latmos_aristocratic_residences: "拉特莫斯贵族宅邸"
 latmos_aristocratic_residences_desc: "拉特莫斯山附近僻静的精英庄园，深受寻求退隐与冥想的学者、修道团体赞助人及地方显贵青睐。"
 ravenna_court_residences: "拉文纳宫廷宅邸"
 ravenna_court_residences_desc: "高级官员与廷臣居住的优雅宅邸，体现了拉文纳作为意大利罗马政权行政与礼仪中心持续的重要性。"
 palatine_aristocratic_houses: "帕拉蒂尼贵族宅邸"
 palatine_aristocratic_houses_desc: "位于帕拉蒂尼山及周边的显赫宅邸，维系着罗马元老院精英的遗产及其对古老城市声望的持久主张。"
 jerusalem_patriarchal_residence: "耶路撒冷牧首官邸"
 jerusalem_patriarchal_residence_desc: "这座位于罗马世界最神圣的城市之一的显赫宅邸，服务于本城最高神职权威，将属灵威望与贵族雅致融为一体。"
 alexandrian_scholarly_villas: "亚历山大里亚学者别墅"
 alexandrian_scholarly_villas_desc: "哲学家、医师及知识精英的居所，延续了亚历山大里亚作为学术、科学及思想交流中心的古老传统。"
 icon_of_saint_thekla: "德克拉圣像"
 icon_of_saint_thekla_desc: "一幅地方圣像画，描绘了圣德克拉，体现了当地对圣徒的崇敬传统以及罗马行省的圣像艺术风格。"
 anatolian_theme_chronicle: "安纳托利亚军区编年史"
 anatolian_theme_chronicle_desc: "一部关于安纳托利亚中部罗马军区行政管理、战争与社会生活的省级历史记载。"
 ecclesiastical_liturgical_codex: "伊科尼翁教会礼仪法典"
 ecclesiastical_liturgical_codex_desc: "一本由大教堂制作的礼仪手稿，保存了地方仪式、圣歌和仪轨习俗。"
 christ_enthroned_iconium: "伊科尼翁的基督升座"
 christ_enthroned_iconium_desc: "一幅描绘了庄严基督的大都会圣像，结合了古典的构图平衡与地域性的神学侧重。"
 anatolian_ecclesiastical_law: "安纳托利亚教会法"
 anatolian_ecclesiastical_law_desc: "一部汇编了教会法传统、并适应罗马安纳托利亚地区教会实际情况的教会法律文献。"
 sivas_military_manual: "塞巴斯忒亚军事手册"
 sivas_military_manual_desc: "一部反映罗马东部诸行省边境作战、后勤保障与指挥传统的实用军事论著。"
 armenian_notable_mansion: "亚美尼亚显贵宅邸"
 armenian_notable_mansion_desc: "一座城镇精英住宅，象征着亚美尼亚地方精英融入罗马行政与社会生活的标志。"
 theotokos_of_tarsus: "塔尔苏斯圣母像"
 theotokos_of_tarsus_desc: "备受崇敬的圣母像，彰显了西里西亚地区的地方虔敬文化及其持久传承的神学传统。"
 cilician_court_annals: "奇里乞亚宫廷编年史"
 cilician_court_annals_desc: "记录奇里乞亚罗马行省治理、外交及贵族事务的宫廷历史档案。"
 antalya_prayer_book: "安塔利亚彩绘祈祷书"
 antalya_prayer_book_desc: "一本精美彩绘的宗教手抄本，融合了地方艺术风格与成熟的罗马礼仪形式。"
 saint_nicholas_of_tarsus: "圣尼古拉斯大数"
 saint_nicholas_of_tarsus_desc: "强调圣尼古拉斯及其地方信仰传统的地方性圣像。"
 aphrodisias_temple_church: "阿芙洛狄西亚斯神殿教堂"
 aphrodisias_temple_church_desc: "一座经过改造的宏伟建筑，体现了基督教对古典宗教建筑的改造与融合。"
 cappadocian_merchant_villas: "卡帕多基亚商人别墅"
 cappadocian_merchant_villas_desc: "富裕的住宅区反映了卡帕多基亚贸易网络和城市社会的繁荣。"
 arkadi_monastery: "阿尔卡季修道院"
 arkadi_monastery_desc: "一座坚固的修道院建筑群，体现了罗马宗教建筑的坚毅传承与岛屿修道主义的精神权威。"
 panagia_kardiotissa: "卡迪奥提萨圣母教堂"
 panagia_kardiotissa_desc: "与奇迹般的虔诚和中世纪克里特岛独特艺术风格相关的备受尊崇的圣像传统。"
 paphos_basilicas: "帕福斯早期基督教大殿"
 paphos_basilicas_desc: "反映帝国赞助以及罗马基督教建筑在塞浦路斯早期建立的宏伟大殿。"
 panagia_kykkos: "基科斯圣母修道院"
 panagia_kykkos_desc: "罗马世界最受尊崇的圣像之一，象征着塞浦路斯自主教会的独立地位与绵延不绝的虔诚信仰文化。"
 rhodes_early_christian_basilicas: "罗得岛早期基督大殿"
 rhodes_early_christian_basilicas_desc: "城市大殿展现了罗马建筑形式在爱琴海诸岛间的传播。"
 panagia_filerimos: "费乐摩斯圣母"
 panagia_filerimos_desc: "一尊长久以来备受尊崇的圣母像，与朝圣、庇护及岛屿宗教认同紧密相连。"
 taxiarches_mantamados: "泰克西尔吉斯守护天使"
 taxiarches_mantamados_desc: "一处独具特色的圣地，以其强大的神像和将地方信仰与罗马宗教传统相融合而闻名。"
 lesbos_icon_tradition: "莱斯博斯岛圣像画传统"
 lesbos_icon_tradition_desc: "一种区域圣像画派，保留了根植于罗马艺术的表现形式与虔敬仪轨。"
 monastery_of_saint_john_patmos: "圣约翰修道院神学家"
 monastery_of_saint_john_patmos_desc: "一座恢宏的帝国级建筑群，将神学、朝圣与设防融为一体，矗立于神圣之岛之上。"
 nea_moni_chios: "希俄斯修道院"
 nea_moni_chios_desc: "罗马镶嵌艺术与建筑的杰作，以其精妙的比例和辉煌的帝国意象而闻名于世。"
 santa_maria_antiqua_frescoes: "圣玛利亚古教堂壁画"
 santa_maria_antiqua_frescoes_desc: "现存最早的中世纪罗马壁画系列之一，维系了古罗马艺术的传承脉络。"
 lateran_palace: "拉特兰宗座宫"
 lateran_palace_desc: "罗马主教的主要礼仪和行政居所，是罗马世界的政治和宗教中心。"
 rossano_gospels: "罗萨诺福音书"
 rossano_gospels_desc: "一本年代久远的彩绘手稿，以其生动的细密画和早期基督教图像而闻名。"
 cattolica_di_stilo: "斯蒂洛教堂"
 cattolica_di_stilo_desc: "一座紧凑的圆顶教堂，体现了意大利南部罗马建筑形式的耐久性。"
 boyana_church_frescoes: "博亚纳教堂湿壁画"
 boyana_church_frescoes_desc: "一幅以其情感写实主义与精妙肖像技法而闻名的著名湿壁画群。"
 preslav_ceramic_icons: "普雷斯拉夫陶瓷圣像传统"
 preslav_ceramic_icons_desc: "一种运用釉面陶瓷砖创作圣像的独特地域艺术传统。"
 osios_david_mosaic: "圣大卫镶嵌画"
 osios_david_mosaic_desc: "一幅早期的后殿镶嵌画，具有非凡的神学象征意义与精湛的艺术造诣。"
 sardis_gymnasium_church: "萨迪斯教堂"
 sardis_gymnasium_church_desc: "一座由晚期古罗马市政建筑改造而成的纪念性教堂，体现了罗马城市空间的转型。"
 basilica_of_saint_john_ephesus: "圣若望大殿"
 basilica_of_saint_john_ephesus_desc: "一座建于据称是圣约翰使徒墓地上的重要朝圣大教堂。"
 amasya_rock_cut_churches: "阿玛西亚岩凿教堂"
 amasya_rock_cut_churches_desc: "一系列凿刻于悬崖之上的教堂，将罗马殡葬传统与基督教信仰融为一体。"
 gangra_episcopal_complex: "甘格拉主教座堂建筑群"
 gangra_episcopal_complex_desc: "重要的教区中心，也是早期基督教建筑的发源地。"
 qalat_seman: "圣西门修道院"
 qalat_seman_desc: "一座以圣西蒙立柱为中心的宏伟朝圣建筑群。"
 antioch_mosaic_tradition: "安条克镶嵌画传统"
 antioch_mosaic_tradition_desc: "以丰富的具象镶嵌画和古典精致而闻名的城市艺术传统。"
 damous_el_karita: "达穆斯·埃尔·卡里塔大教堂"
 damous_el_karita_desc: "一座大教堂建筑群，彰显了罗马基督教在非洲的强大影响力。"
 african_christian_mosaics: "阿非利加基督教镶嵌画传统"
 african_christian_mosaics_desc: "一种独具特色的地方镶嵌画艺术流派，融合了罗马艺术形式与本土象征元素。"
 visigothic_roman_icon_tradition: "伊比利亚罗马圣像传统"
 visigothic_roman_icon_tradition_desc: "伊比利亚半岛后帝国时代保留罗马圣象的地区传统。"
 san_vicente_complex: "圣文森特大殿建筑群"
 san_vicente_complex_desc: "一座重要的晚期古基督教建筑群，体现了伊比利亚半岛上罗马建筑的延续性。"
 san_saturnino_cagliari: "圣萨图尼努斯大殿"
 san_saturnino_cagliari_desc: "撒丁岛上最古老的基督教纪念堂之一，体现了该岛悠久的罗马遗产。"
 sardinian_ecclesiastical_annals: "撒丁岛教会年鉴"
 sardinian_ecclesiastical_annals_desc: "记载罗马岛屿社区教会生活与行政管理的行省档案。"
 cathedral_of_syracuse: "锡拉库扎主教座堂"
 cathedral_of_syracuse_desc: "一座由古典神庙改造而成的纪念性教堂，象征着罗马神圣空间的转型。"
 sicilian_roman_icon_tradition: "西西里罗马圣像传统"
 sicilian_roman_icon_tradition_desc: "一所融合了罗马肖像画和地中海影响的地区学校。"
 florentine_roman_frescoes: "佛罗伦萨早期罗马湿壁画"
 florentine_roman_frescoes_desc: "中世纪早期的壁画保留了后来风格出现之前的罗马艺术形式。"
 torcello_cathedral: "托尔切洛主教座堂"
 torcello_cathedral_desc: "一座以巨型马赛克和早期罗马式礼拜空间闻名遐迩的泻湖大教堂。"