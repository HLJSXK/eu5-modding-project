l_simp_chinese:
 popular_sovereignty_advance: "主权在民"
 popular_sovereignty_advance_desc: "主权在民是一项政治原则，即治理的合法性源于被统治者的同意，被统治者是一切政治权力的来源。"
 constitutional_republic: "宪政共和国"
 constitutional_republic_desc: "宪政共和国是一种政府形式，其政治权利与权力由成文宪法明确规定，并通过建立由选举产生官员治理的共和国来实现。"
 an_agreement_of_the_people: "人民公约"
 an_agreement_of_the_people_desc: "《人民公约》是1647至1649年间为英国政体提出宪政改革的一系列宣言文件。首版公约的主要纲领包括：宗教自由、议会定期改选以及法律面前人人平等。该文献虽最常被视作平等派的纲领性文件，但亦曾由新模范军的士兵代表及总理事会共同发布。"
 levelling_the_land: "平均土地"
 levelling_the_land_desc: "掘地派是英格兰一群宗教与政治异见者，1649年因与平均派决裂而被称为“真正平均派”，后因尝试在公地上垦殖得名“掘地派”，他们试图通过“平均土地”改革现有社会秩序，依据他们关于建立小型平等主义农村社区的理念，推行相应的农业生活方式。"
 republic_5_year_terms: "宪政共和国5年任期制"
 republic_5_year_terms_desc: "这是[ShowGovernmentTypeName('republic')]的一种[heir_selection|e]，[ruler|e]通过所有阶层参与的[election|e]产生，任期五年。"
 federal_state: "联邦联盟"
 puritan_austerity: "清教徒式简朴"
 puritan_austerity_desc: "英格兰教会将彻底摆脱天主教荼毒，法衣、吟唱、香火与钟声都将成为过去，我们无需教宗，因为人人皆为上帝子民。"
 the_commons: "公地"
 the_commons_desc: "英格兰公地是根据[ShowEstateTypeName('crown_estate')]授予的庄园组成部分。[ShowEstateTypeName('peasants_estate')]的独立附属权利应受保护，以便任何英格兰自由人都能按照他们的权利在土地上放牧、捕鱼、耕作、放牧、挖矿和进行公共活动。"
 the_english_revolution: "不安分的共和国"
 the_english_revolution_desc: "君主制已被废除，一个崭新的英格兰即将诞生。是让新的贵族阶层仅凭武力统治[ShowGovernmentTypeName('republic')]，还是英格兰人民会完成未竟的事业，最终实现自治？"
 noble_land_confiscation: "没收前保皇党人的土地"
 noble_land_confiscation_desc: "必须没收保皇派地主的土地，直到他们向联邦政府缴纳扣押费为止。这既能筹集急需的财政收入，又能将那些地主牢牢束缚在我们的统治之下，从而巩固和稳定我们的新政权。"
 instrument_of_government: "颁布《政府约法》"
 instrument_of_government_desc: "《政府约法》是英格兰、苏格兰及爱尔兰联邦的首部宪法，也是英格兰第一部成文法典式宪法。该约法由约翰·兰伯特少将于1653年起草完成。"
 rule_of_the_major_generals: "宣告少将统治"
 rule_of_the_major_generals_desc: "少将统治时期是指1655年8月至1657年1月，由奥利弗·克伦威尔护国公时期实行直接军事统治的阶段。英格兰与威尔士被划分为十个区域，每个区域由一位直接向护国公负责的少将管辖。"
 STATIC_MODIFIER_NAME_the_republic_is_restless: "不安分的共和国"
 STATIC_MODIFIER_NAME_noble_lands_impounded: "贵族土地被没收"
 STATIC_MODIFIER_NAME_instrument_enacted: "政府约法"
 restless_republic_price: "共和国的动荡代价"
 the_english_revolution.1.title: "不安分的共和国"
 the_english_revolution.1.desc: "“我从一个易腐的王冠前往一个不易腐的王冠，在那里没有任何扰乱。”——查理一世，1649年"
 the_english_revolution.1.a: "不列颠的王室已经倒下。"
 the_english_revolution.2.a: "为了共和国！"
 the_english_revolution.10.title: "帕特尼辩论"
 the_english_revolution.10.desc: "“……因为我确实认为，英格兰最卑微的人，也拥有与最显贵者同等生活的权利……”——托马斯·雷恩斯伯勒上校，1647年"
 the_english_revolution.10.a: "这场讨论已经拖得够久了，该结束了！"
 the_english_revolution.10.b: "我们将制定一份人民公约。"
 the_english_revolution.20.title: "普莱德清洗"
 the_english_revolution.20.desc: "弑君前的清洗。"
 the_english_revolution.20.a: "禁止那些对新模范军怀有敌意的议员出席会议。"
 the_english_revolution.20.b: "我们不会发动军事政变。"
 the_english_revolution.30.title: "谦卑的请愿和建议"
 the_english_revolution.30.desc: "“我告诉你们，我们必须连同王冠一起斩首。”——奥利弗·克伦威尔，1648年"
 the_english_revolution.30.a: "胜者为王。"
 the_english_revolution.30.b: "拿走这个华而不实的东西！"
 the_english_revolution.100.title: "定居共和国"
 the_english_revolution.100.desc: "“先生，我认为显而易见的是，任何要生活在政府统治下的人，首先应当自愿同意接受政府的统治。”——托马斯·雷恩斯伯勒上校，1647年"
 the_english_revolution.100.a: "英格兰，一个联邦与自由之地……"
 the_english_revolution_historical_info: "英格兰联邦于1653年扩展为英格兰、苏格兰及爱尔兰联邦，是1649年至1660年间存在的政治实体。在第二次英国内战结束、查理一世受审并被处决后，英格兰王国解体为共和国。1649年5月19日，议会通过《宣布英格兰为共和国的法案》，正式宣告这一共和政体的成立。早期联邦的权力主要掌握在议会和国务委员会手中。在此期间，议会军与反对势力之间的战斗仍在持续，尤其是在爱尔兰和苏格兰地区，具体表现为克伦威尔征服爱尔兰以及1650年至1652年的盎格鲁‑苏格兰战争。"
 the_putney_debates_historical_info: "帕特尼辩论于1647年10月28日至11月8日举行，是围绕议会军在第一次英国内战中战胜查理一世后应建立何种政治体系的一系列讨论。主要参与者包括支持在君主立宪框架内保留查理王位的新模范军高级军官，以及以平等派为代表的激进改革者——后者主张推行更彻底的变革，包括实现一人一票制、保障信仰自由（尤其在宗教领域）等诉求。"
 prides_purge_historical_info: "普莱德清洗1648年12月6日英国内战期间发生的事件，事件中在新模范军军官托马斯·普莱德的带领下一些士兵阻止英格兰议会中对新模范军持敌对态度的议员进入议会下议院，在总共489名下议员中，仅有71人被允许进入议会，另有45人被捕，83人在被迫表态支持对查理一世进行审判后得以返回议会。普莱德清洗被认为是英国历史上唯一一次军事政变。"
 the_humble_petition_historical_info: "1657年2月23日，在第二届护国公枢密院召开期间，克里斯托弗·帕克爵士（国会议员兼前伦敦市长）向护国公奥利弗·克伦威尔呈递了一份请愿书，即后世所称的《谦卑的请愿和建议》。该文件旨在向奥利弗·克伦威尔提议建立世袭君主制，确立议会对新征税项目的控制权，设立独立咨询委员会辅佐君主，保障议会每三年召开一次的制度，并通过缩减常备军规模等措施节省开支。这些条款实际上限制了而非增强了克伦威尔的权力。然而，对许多激进派而言，真正的症结在于第十至十二条条款：这些条款严苛限制了第五王国派和浸信会等教派的发展，同时试图按照长老会模式重建国教体系。"
 republican_virtue_advance: "共和美德"
 republican_virtue_advance_desc: "共和美德，亦称公民美德，指的是一种理念，即共和政体的成功与稳定取决于公民为共同利益和公共利益无私奉献的精神。"
 provincial_assemblies: "省议会"
 provincial_assemblies_desc: "[ShowEstateTypeName('peasants_estate')]在我们的[ShowGovernmentTypeName('republic')]中众多省份中过着迥异多样的生活。这一现实已通过宪法认可的省级议会得到承认。"