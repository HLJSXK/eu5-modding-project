 RUS_SOUTHWEST_LEADER_TITLE_WITH_SCORE: "得分：[SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('southwest_leader_score').GetValue|2]"
 RUS_PARTICIPANTS_LABEL: "其他参与者："
 STATIC_MODIFIER_NAME_rus_gathering_ai_participant: "罗斯统一"
 STATIC_MODIFIER_NAME_rus_kie_tatar_yoke: "鞑靼的枷锁"
 RUS_GATHERING_TT_MILITARY_STRENGTH: "军事力量："
 RUS_GATHERING_TT_MONTHLY_INCOME: "月度收入："
 RUS_GATHERING_TT_PRESTIGE_10: "威望(10%):"
 RUS_GATHERING_TT_TOTAL_SCORE: "总分："
 cb_rus_gathering: "统一罗斯"
 war_goal_wg_rus_gathering_unification: "罗斯将统一在我们的旗帜下！"
 war_goal_wg_rus_gathering_unification_desc: "除了我们，还有谁有资格统一这片广袤的土地？"
 rusgathering_pllit.1.title: "互助条约"
 rusgathering_pllit.1.desc: "西方的战争和东方的混乱已经表明，我们各自为战是脆弱的。条顿骑士团威胁迫在眉睫，罗斯诸公国也在蠢蠢欲动。现在是时候放下我们的分歧，重振波兰与立陶宛之间的联盟了。"
 rusgathering_pllit.1.a: "我们团结一致。"
 STATIC_MODIFIER_NAME_rus_litpol_anti_teuton: "抵抗条顿骑士团"
 STATIC_MODIFIER_NAME_rus_boh_low_tsupport: "不愿支持条顿骑士团"
 rusgathering_expansion.1.title: "贵族阶层中的动荡"
 rusgathering_expansion.1.desc: "加利奇的贵族们公开密谋摆脱枷锁，有人主张立即行动，也有人畏惧宗主国的怒火。如果我们想为自由而赌一把，外国的支持可能会决定结果。"
 rusgathering_expansion.1.a: "向波兰寻求支持。"
 rusgathering_expansion.1.b: "我们必须等待时机。"
 rusgathering_expansion.2.title: "立陶宛的援助"
 rusgathering_expansion.2.desc: "随着为加利奇的自由而斗争的开始，沃里尼亚可以寻求一个强大的庇护者来确保战争的结果。使者建议接近立陶宛，以长期的义务换取军事支持。"
 rusgathering_expansion.2.a: "派遣使者说服他们参战。"
 rusgathering_expansion.2.b: "我们不能再冒险卷入更多纷争了。"
 rusgathering_expansion.3.title: "解放的代价"
 rusgathering_expansion.3.desc: "自由并非独自赢得。波兰的援助伴随着期望，如今已是决定时刻——是兑现承诺，还是尝试真正独立自主。"
 rusgathering_expansion.3.a: "履行我们的承诺：接受波兰的宗主权。"
 rusgathering_expansion.4.title: "维尔纽斯的新领主"
 rusgathering_expansion.4.desc: "立陶宛的支持让沃里尼亚挺过了风暴。随着战争结束，立陶宛的使者们前来收取当初的承诺：一份将沃里尼亚与维尔纽斯捆绑在一起的正式关系。"
 rusgathering_expansion.4.a: "履行我们的承诺：接受立陶宛的宗主权。"
 rusgathering_expansion.5.title: "西线僵局"
 rusgathering_expansion.5.desc: "条顿骑士团的攻势已被挫败。虽然他们未能突破我方防线，但要深入其设防严密的领土，必将面临漫长而血腥的战役。达成无条件和平既能确保边境安全，也可让我们将精力转向其他方向。"
 rusgathering_expansion.5.a: "提议无条件和平。"
 rusgathering_expansion.5.b: "不！我们要击溃十字军！"
 rusgathering_expansion.7.title: "鲁塞尼亚问题"
 rusgathering_expansion.7.desc: "随着沃里尼亚牢牢掌握在我们手中，剩下的鲁塞尼亚领土问题也随之而来。波兰觊觎加利奇，而我们的目光转向了基辅。或许划分势力范围是个好主意？"
 rusgathering_expansion.7.a: "提议瓜分，加利奇归他们，基辅归我们。"
 rusgathering_expansion.7.b: "我们不需要盟友，罗斯的土地属于我们！"
 rusgathering_expansion.8.title: "立陶宛提案"
 rusgathering_expansion.8.desc: "立陶宛提出一项交易，他们承认我们对加利奇的主权要求，以换取我们支持其对基辅的主张。宫廷中有人建议，我们应要求将沃里尼亚的边境领土作为担保。"
 rusgathering_expansion.8.a: "同意，但要求将沃里尼亚部分地区作为报酬。"
 rusgathering_expansion.8.b: "同意现有条款。"
 rusgathering_expansion.8.c: "我们不会为理应属于我们的东西讨价还价！"
 rusgathering_expansion.9.title: "波兰的要求"
 rusgathering_expansion.9.desc: "波兰接受我们关于基辅的条件，但要求从我们的属国沃里尼亚手中获得贝尔兹地区，以完善其加利西亚领地。"
 rusgathering_expansion.9.a: "为确保联盟，这点代价不算什么。割让这些土地吧。"
 rusgathering_expansion.9.b: "他们太过分了！联盟到此为止。"
 rusgathering_expansion.10.title: "汗国衰微"
 rusgathering_expansion.10.desc: "随着金帐汗国陷入混乱，而立陶宛在北方巩固了其影响力，基辅摆脱鞑靼人桎梏的时机已然到来。立陶宛大公已表示愿意支持我们的解放事业——前提是我们接受他的保护。"
 rusgathering_expansion.10.a: "派遣使者前往维尔纽斯。"
 rusgathering_expansion.10.b: "我们可以等。"
 rusgathering_expansion.11.title: "鲁塞尼亚之战"
 rusgathering_expansion.11.desc: "基辅请求我们援助对抗鞑靼人。现在是实现我们雄心、将鲁塞尼亚土地统一在维迪斯旗下的时刻了，战争不可避免。"
 rusgathering_expansion.11.a: "向南进军！基辅将属于我们。"
 rusgathering_expansion.11.b: "我们现在不能冒险与汗国开战。"
 rusgathering_expansion.13.title: "南方的雄心"
 rusgathering_expansion.13.desc: "基辅独立了，脱离了金帐汗国，但处境脆弱。大公看到了一个历史性的机遇，要将立陶宛的保护延伸到古罗斯的首都。"
 rusgathering_expansion.13.a: "我们将把他们纳入麾下。"
 rusgathering_expansion.12.title: "基辅的新领主"
 rusgathering_expansion.12.desc: "汗国军队被击退，基辅摆脱了统治——却转而向维尔纽斯俯首称臣。根据协议，公国归入了立陶宛的版图。"
 rusgathering_expansion.12.a: "接受立陶宛宗主权。"
 rusgathering_expansion.20.title: "北方的统治权"
 rusgathering_expansion.20.desc: "我们的波莫尔人和贡品征收者早已踏足特雷（科拉）与科雷拉的土地。过去的条约承认了我们的权利，但现在是时候将法理主张转化为实际统治了。我们将建立永久的行政区，让北方部落完全臣服于伟大的诺夫哥罗德大公的统治之下。"
 rusgathering_expansion.20.a: "这片土地是我们与生俱来的权利！"
 rusgathering_expansion.20.b: "不值得为此激怒瑞典和挪威的国王。"
 rusgathering_expansion.21.title: "枷锁破碎"
 rusgathering_expansion.21.desc: "数十年的停滞与朝贡削弱了我们，但汗国的掌控已非绝对。时光流转与内部变迁侵蚀了古老的义务。枷锁已从我们肩头滑落。"
 rusgathering_expansion.21.a: "终于有了喘息的空间……"
 rusgathering_expansion.22.title: "立陶宛进军斯摩棱斯克"
 rusgathering_expansion.22.desc: "斯摩棱斯克尚未纳入我们的直接掌控，边境依然暴露在外，其归属问题悬而未决。是时候让斯摩棱斯克归顺于立陶宛的统治之下了——若外交途径可行则以外交解决，若有必要则不惜动用武力。"
 rusgathering_expansion.22.a: "向斯摩棱斯克进军。"
 rusgathering_expansion.22.b: "我们现在太弱了。"
 rus_kie_tatar_yoke: "鞑靼枷锁"
 desc_rus_kie_tatar_yoke: "沉重的纳贡负担和对金帐汗国的政治附庸，扼杀了我们的经济和军事发展。"
 rus_gathering_force_annexation: "武力统一"
 rus_gathering_force_annexation_desc: "通过军事力量迫使一个小公国加入我们的阵营。"
 rus_gathering_assert_claims: "宣称领土"
 rus_gathering_assert_claims_desc: "对宿敌的领地提出领土要求。"
 rus_gathering_buy_allegiance: "购买效忠"
 rus_gathering_buy_allegiance_desc: "用黄金换取他们成为附庸国的同意。"
 ANNEX_DESC: "奉全能上帝之命，这片土地回归其真正的主人"
 rus_gathering_annex_entry_short: "吞并公国"
 rus_gathering_annex_entry: "该公国将被吞并。"
 rusgathering_situation.6.t: "王公纷争"
 rusgathering_situation.6.d: "统一罗斯之地是崇高的理想，但天下只能有一位沙皇。随着我们的势力日益强盛，邻国的嫉恨也与日俱增。与其他主要公国间的紧张关系已到临界点，旧怨新仇交织，争端一触即发。"
 rusgathering_situation.6.a: "唯有一位真正的君主！"
 opinion_rival_gathering_leader: "敌对宣称者"
 cb_abyss: "大草原的征服"
 war_goal_wg_rus_gathering_abyss: "大草原的征服"
 war_goal_wg_rus_gathering_abyss_desc: "是时候彻底根除这个威胁了。"
 rusgatheringevents.103.t: "分裂的终结"
 rusgatheringevents.103.d: "1382年，一个转折之年。依附于莫斯科的各公国已实质融合为统一整体，是时候正式确立这一联合，将那些较小的王公置于直接统治之下了。"
 rusgatheringevents.103.a: "团结这片土地！"
 rusgatheringevents.103.b: "允许他们保留自治权。"
 rusgathering_situation.1.t: "武力征服"
 rusgathering_situation.1.desc: "外交手段已然失败。[SCOPE.sCulture('target').GetAdjective]的统治者们拒绝听从，不愿俯首称臣。我们必须以武力夺取本应属于我们的一切，用铁与血统一这片土地。"
 rusgathering_situation.1.a: "准备军队！（获得宣战理由）"
 rusgathering_situation.3.t: "要求附庸"
 rusgathering_situation.3.desc: "[SCOPE.sCountry('actor').GetName]的使者已抵达，并带来一项提议。他们提出为我们提供保护与庇护，以换取我们的效忠。此举虽能确保我国边境安全，却也意味着我们将彻底失去真正的独立。"
 rusgathering_situation.3.a: "我们别无选择。我们接受。"
 rusgathering_situation.3.b: "我们绝不向任何人低头！"
 LIT_RUS: "立陶宛‑罗斯联邦"
 LIT_RUS_ADJ: "立陶宛‑罗斯联邦"
 LIT_RUS_trigger_mos: "莫斯科不存在或为我们的属国"
 POL_RUS: "波兰‑罗斯联邦"
 POL_RUS_ADJ: "波兰‑罗斯联邦"
 POL_RUS_trigger_mos: "莫斯科不存在或为我们的属国"
 integrate_russian_steppe: "整合大草原地区"
 integrate_russian_steppe_desc: "我们凝视深渊，深渊亦回望我们。从今往后，我们即是深渊。"
 integrate_russian_steppe_active: "整合大草原地区"
 rusgathering_expansion.30.title: "是时候向草原扩张了！"
 rusgathering_expansion.30.desc: "我方斥候回报，[SCOPE.sCountry('steppe_target').GetAdjective]部族正在边境游荡且缺乏有力防护。这些游牧部族虽构成威胁，但其内部松散亦有机可乘。我们是该趁其虚弱即刻出击，还是静待更佳时机？"
 rusgathering_expansion.30.a: "草原必将成为罗斯人的土地！"
 rusgathering_expansion.30.b: "和平比仓促的征服更为珍贵。"
 rus_gathering_end_condition_text: "罗斯（或其他可成立国家）已成立且参与者不超过5人，或年份已达1620年"
 rusgathering_expansion.25.title: "立陶宛的终结"
 rusgathering_expansion.25.desc: "如今立陶宛人已不再是阻碍，我们可以重新考虑广袤的罗斯土地问题了。是否该重新审视我们先前不插手那些西方蛮族的决定？"
 rusgathering_expansion.25.a: "将西方文明带入那熊穴，是我们的宿命！（波兰将重返“统一罗斯”局势）"
 rusgathering_expansion.25.b: "不，我们依然不在乎。"
 rusgathering_start.2.t: "统一罗斯之地"
 rusgathering_start.2.desc: "十四世纪中叶。曾经强大的罗斯领地已四分五裂，陷入诸侯纷争。俄罗斯的土地世代承受着鞑靼桎梏，其主权在金帐汗国的铁蹄下支离破碎。然而，无论是波雅尔议会还是农民集会，都流传着变革的低语——时代正在变迁，统一的时刻即将来临。\n\n分裂王公与贵族的问题简单却至关重要：罗斯诸国将在谁的旗帜下统一？是莫斯科将执掌领导权，还是会有敌对王公集结起本应属于俄罗斯的一切？"
 rusgathering_start.2.a: "我们的命运掌握在自己手中。"
 rusgathering_start.3.t: "言语的尽头"
 rusgathering_start.3.desc: "1450年已至，东欧紧张局势已达临界点。传统的外交最后通牒与威胁手段，对我们的宿敌已不再奏效。\n\n优柔寡断的时代已经结束。自今日起，任何强行合并（“强制联合”）的企图都将立即引发宣战。不再有前期试探性的书信往来，唯余刀剑相向。"
 rusgathering_start.3.a: "让刀剑来说话。"
 rusgathering_start.4.t: "大统一已完成"
 rusgathering_start.4.desc: "数个世纪以来，罗斯之地饱受内乱、王公野心与邻国贪婪的摧残。从喀尔巴阡山脉到乌拉尔山脉，鲜血横流，命运决定着谁将执掌权力的权杖。\n\n如今，这场纷争已然平息，分裂的时代已渐行渐远，帝国的时代正迎面而来。我们是这片土地唯一合法的继承者与统治者，无人敢再质疑我们的权利。"
 rusgathering_start.4.a: "历史将铭记胜利者。"
 STATIC_MODIFIER_NAME_rus_gathering_victory_modifier: "统一者的胜利"
 desc_rus_gathering_victory_modifier:0 "这个国家在争夺罗斯遗产的漫长斗争中脱颖而出，确保了众多民族在同一顶王冠下的繁荣昌盛。"
 rusgathering_expansion.101.title: "哈利奇的召唤"
 rusgathering_expansion.101.desc: "[SCOPE.sCountry('actor').GetName]大公已奋起反抗鞑靼人的桎梏！他深知独木难支，特遣使前来恳求我方援助。\n\n作为换取军事支持与抵御金帐汗国保护的交换条件，加利奇承诺承认波兰王国的最高权威，并成为我们忠实的附庸。"
 rusgathering_expansion.101.a: "我们将保护我们的兄弟（加入战争）"
 rusgathering_expansion.101.b: "这不是我们的战争。"
 rusgathering_expansion.103.title: "沃里尼亚的恳求"
 rusgathering_expansion.103.desc: "效仿加利奇的先例，沃里尼亚也揭竿而起。[SCOPE.sCountry('actor').GetName]的统治者深知自己正处在暴怒的汗国与野心勃勃的邻邦之间，处境岌岌可危。\n\n沃里尼亚的使者提出一项交易：若立陶宛大公国愿以武力支持他们打赢这场战争，他们将永远向我们宣誓效忠。"
 rusgathering_expansion.103.a: "沃里尼亚将属于我们！（加入战争）"
 rusgathering_expansion.103.b: "让他们自己解决战斗。"
 rus_gathering_challenge_horde: "击退汗国"
 rus_gathering_challenge_horde_desc: "汗国正在衰落。我们可以向边境上的某个附庸提供保护。如果他们接受，一场独立战争将会开始，而他们将向我们宣誓效忠。"
 rusgathering_situation.50.t: "保护提议"
 rusgathering_situation.50.d: "[SCOPE.sCountry('actor').GetName]的统治者提出保护我们免受鞑靼人的压迫。他们承诺，如果我们立即挣脱奴役的枷锁并向汗国宣战，将提供军事支援。作为回报，我们必须承认他们为我们的新宗主。"
 rusgathering_situation.50.a: "打倒可汗！我们向[SCOPE.sCountry('actor').GetName]宣誓效忠！"
 rusgathering_situation.50.b: "可汗太强了……我们不能轻举妄动。"
 rusgathering_situation.51.t: "求援得到回应"
 rusgathering_situation.51.d: "使者带来消息：[SCOPE.sCountry('actor').GetName]已接受我方提议！他们已向压迫者宣战，如今正翘首企盼西方承诺的援助。拔剑出鞘的时刻到了。"
 rusgathering_situation.51.a: "保护我们的新臣民！（加入战争）"
 rusgathering_situation.52.t: "提议被拒"
 rusgathering_situation.52.d: "我们的使者空手而归。[SCOPE.sCountry('actor').GetName]的统治者因畏惧可汗的怒火而畏缩不前，不敢接受我们的庇护。他们选择了继续戴着枷锁。"
 rusgathering_situation.52.a: "懦夫！他们活该有此下场。"
 rusgathering_expansion.21.b: "还没到时候……"
 rusgathering_expansion.26.title: "哈利奇的整合"
 rusgathering_expansion.26.desc: "多年来，加利奇公国一直处于我们的保护之下。当地贵族大多已接纳我们的习俗，行政体系也与我们的交织在一起。如今时机已成熟，应正式结束其自治状态，将罗斯土地完全纳入波兰王冠的统治之下。"
 rusgathering_expansion.26.a: "一个国王，一部律法。"
 rusgathering_expansion.35.title: "彼尔姆的征服"
 rusgathering_expansion.35.desc: "战局已对我们极为不利。[SCOPE.sCountry('attacking_slav').GetName]的军队已深入彼尔姆的广袤森林，击溃了我们的防线。形势日益明朗：若继续抵抗，我们的土地恐将彻底荒芜，而林地将被逐步蚕食吞并。\n\n然而，入侵者提出了和解方案。他们意识到直接统治这片北方荒野的困难，愿意接受我们的臣服。倘若此刻俯首称臣，我们或可以附庸国的身份保留内部自治权。"
 rusgathering_expansion.35.a: "俯首称臣，以保疆土。"
 rusgathering_expansion.35.b: "我们绝不投降！战斗到底！"
 rusgathering_expansion.37.title: "大彼尔姆的洗礼"
 rusgathering_expansion.37.desc: "我们的附庸国彼尔姆的土地仍笼罩在异教的黑暗之中。当地部落崇拜偶像与自然神灵，拒绝真理之光的照耀。\n\n一位名叫斯德望（彼尔姆的斯德望）的修士向我们提议，由他率领一支传教团深入这片森林。他建议不仅要为彼尔姆人施洗，更要为他们创造独特的字母，翻译《圣经》，让上帝的话语永远扎根于他们心中。\n\n我们是否要根除旧信仰，让我们的疆域归于唯一的神？"
 rusgathering_expansion.37.a: "神像必须被打倒！派遣传教任务。"
 rusgathering_expansion.37.b: "统治的智慧在于宽容，随他们去吧。"
 rusgathering_situation.4.t: "傲慢的拒绝"
 rusgathering_situation.4.d: "派往[SCOPE.sCountry('target').GetName]的使者们空手而归。他们的统治者断然拒绝了我们慷慨提供的保护，声称他们那微不足道的独立比我们领土的统一更为重要。\n\n这种短视令人失望，但对于那些看不清大局的人来说或许也在意料之中。现在仅凭言语不足以让他们归顺。"
 rusgathering_situation.4.a: "他们会后悔的……"
 rusgathering_situation.6.b: "也许我们该重新考虑一下……"
 rusgathering_wedding.1.title: "克雷沃联合"
 rusgathering_wedding.1.desc: "波兰王位正面临一场王朝危机。立陶宛大公雅盖沃提出了一项将改变历史进程的解决方案——联合宗族与国家。\n\n作为换取波兰王冠的条件，他承诺将携全体臣民皈依天主教，收复波兰失地，并使立陶宛的命运与我们永远紧密相连。这将形成一个强大的联盟，共同对抗北方的条顿骑士团与东方崛起的莫斯科势力。"
 rusgathering_wedding.1.a: "君权弥足珍贵。瓦迪斯瓦夫二世·雅盖沃万岁！"
 rusgathering_wedding.1.b: "不，我们会另寻人选。"
 rusgathering_wedding.2.title: "卢布林联合"
 rusgathering_wedding.2.desc: "一个多世纪以来，波兰和立陶宛虽由同一王朝统治，却始终保持着独立的国家形态。然而面对东方日益严峻的威胁，仅靠君主间的个人联盟已远远不够。\n\n立陶宛贵族阶层已接纳了我们的习俗与信仰，他们要求获得与波兰施拉赫塔贵族同等的权利。如今正是消除最后隔阂的时刻——让我们将两个国家融合为统一而不可分割的联邦。"
 rusgathering_wedding.2.a: "从今往后，我们合为一体。（吞并与文化统一）"
 rusgathering_wedding.3.title: "格迪米纳斯家族的命运"
 rusgathering_wedding.3.desc: "我们伟大的血脉正面临危机。大公国的王位摇摇欲坠，而东西两方的敌人都在伺机而动。\n\n波兰权贵们洞察了我们的困境，提出了一个出人意料的解决方案：联姻与合并。他们愿意派遣一位王室代表来接受我们的王冠。这需要我们皈依拉丁礼，但将确保与克拉科夫缔结永恒的联盟。"
 rusgathering_wedding.3.a: "接受王冠与十字架。联邦万岁！"
 rusgathering_wedding.3.b: "立陶宛必须保持自由与自己的信仰！"
 rusgathering_wedding.4.title: "大联邦"
 rusgathering_wedding.4.desc: "数个世纪以来，立陶宛与波兰始终携手同行，但维尔纽斯已成为我们联合力量真正的中心。曾引以为傲的波兰王冠，如今已完全仰赖我们的庇护与智慧。\n\n是时候完成我们先辈开创的事业了。不应再有两个国家，而应建立一个统一且不可分割的两国联邦——由立陶宛的钢铁意志引领前行。"
 rusgathering_wedding.4.a: "从波罗的海到黑海，王国统一！"
