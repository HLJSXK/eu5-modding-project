l_simp_chinese:
 rusgathering_start.1.title: "罗斯的统一可能？"
 rusgathering_start.1.desc: "南方诸公国传来流言。人们谈论着“大团结”——即分裂的罗斯土地将在单一统治者下统一。有人瞩目莫斯科，有人倾向特维尔或立陶宛，诺夫哥罗德则独树一帜，富庶而自由，但变革之风已然吹起。"
 rusgathering_start.1.a: "统一的罗斯？你一定是在开玩笑，没有我们！"
 rusgathering_start.1.b: "让我们试试看，或许会有转机。"
 rus_gathering: "收复罗斯之地"
 rus_gathering_desc: "罗斯之地应当再次统一！但谁的命运是将它统一在一面旗帜之下？"
 rus_northeast_unifier: "东北罗斯统一者"
 rus_northeast_unifier_desc: "该国领导着东北罗斯诸公国的集结。"
 rus_southwest_unifier: "西南罗斯统一者"
 rus_southwest_unifier_desc: "该国领导着西南罗斯诸公国的集结。"
 NORTHEAST_LEADER_TOOLTIP: "东北罗斯统一者"
 SOUTHWEST_LEADER_TOOLTIP: "西南罗斯统一者"
 hint_rus_gathering: "两个罗斯公国集团争夺主导地位。"
 STATIC_MODIFIER_NAME_rus_northeast_unifier: "东北罗斯统一者"
 STATIC_MODIFIER_NAME_rus_southwest_unifier: "西南罗斯统一者"
 RUS_NORTHEAST_LEADER_TITLE: "东北罗斯统一者"
 RUS_SOUTHWEST_LEADER_TITLE: "西南罗斯统一者"
