l_simp_chinese:
 immersive_formables.1.title: "统一西班牙"
 immersive_formables.1.desc: "从加利西亚的翠绿丘陵到安达卢西亚的金色平原，我们的土地如今用一个声音说话。数世纪共同的斗争、竞争、盟约与信仰，将伊比利亚诸国编织在一起，引导我们来到这一时刻。\n\n随着王冠的统合，一个新的国家已经崛起——她有力量主宰自己的命运，亦有远见塑造海外世界。商人、贵族、士兵与平民共同欢庆这一崭新身份，整个欧洲的目光也带着期待、忌妒与敬畏投向我们。"
 immersive_formables.1.a: "新时代的曙光。"
 immersive_formables.2.title: "统一的意大利诞生了"
 immersive_formables.2.desc: "几个世纪以来，意大利半岛都是列国林立的拼图，每个邦国都自豪而独特，却又被共同的传统所维系。如今，凭借决心与团结，这些分裂的领地终于站在了一起。\n\n广场与市镇的钟声在欢庆中敲响，旧的边界逐渐淡出记忆。诗人谈论着重生的意大利，商人期待着新的繁荣，士兵则宣誓效忠于一个超越任何城邦的伟大命运。"
 immersive_formables.2.a: "我们终于团结起来了。"
 immersive_formables.3.title: "斯堪的纳维亚的诞生"
 immersive_formables.3.desc: "从挪威的峡湾到瑞典的森林，再到丹麦那风扫过的平原，北方诸国长久以来都以其独特的风姿傲然屹立。然而在差异之下，蕴藏着共同的传统——传奇史诗、航海精神，以及在漫长凛冬中淬炼出的坚韧魂灵。\n\n如今，凭借团结与决心，这些曾经分离的王国聚拢在同一面旗帜之下。整个北方大地，教堂钟声齐鸣，厅堂欢庆满溢，旧日恩怨就此消弭。农人、商贾与战士都以崭新的目光望向未来。世界屏息瞩目，带着审慎的敬意——因为一个统一的北方，将展现出前所未见的力量。"
 immersive_formables.3.a: "我们终于团结起来了。"
 immersive_formables.4.title: "低地国家联合"
 immersive_formables.4.desc: "低地诸国几个世纪以来始终处于分裂状态，然而商业、信仰与共同的抗争，让这些土地逐年紧密相连。\n\n如今，荷兰、泽兰、乌得勒支乃至更广阔土地上的人民，终于在同一面旗帜下团结起来。教堂钟声在繁忙的港口回荡，商人与水手们谈论着崭新的希望。从风拂沙丘到莱茵河与斯海尔德河的辽阔河口，一种共同的身份认同正在生根发芽。"
 immersive_formables.4.a: "荷兰崛起，世界将为之瞩目。"
 immersive_formables.5.title: "德意志国家崛起"
 immersive_formables.5.desc: "几个世纪以来，德语地区一直处于分裂状态，破碎为公国、主教领地、自由市和骄傲的诸侯邦国。每一片土地都承载着自身的传统与纷争，却又因语言、文化和历史记忆而血脉相连。\n\n如今，通过外交斡旋、坚定意志与历史风向的转变，这片土地上的人们终于团结在同一旗帜之下。从阿尔卑斯山到波罗的海，钟声响彻；在繁华的市镇与坚固的城邦中，民众无不谈论着这新生的统一。\n\n这是一个诞生于诗人与哲人、工匠与士兵、商人与改革者之手的国家。今日德意志的崛起，是坚韧精神的见证，世界即将感受其复兴的力量。"
 immersive_formables.5.a: "德意志民族觉醒了。"
 immersive_formables.6.title: "俄罗斯的崛起"
 immersive_formables.6.desc: "罗斯人的土地曾被王公、外国征服者以及严冬所塑造。然而，通过斗争、信仰与意志，一股统一的力量已然崛起，将这些广袤的土地凝聚在一起。\n\n从莫斯科的森林到诺夫哥罗德的河流，再到远方的草原，如今人民在同一面旗帜下，钟声响彻城镇与修道院，这是一个充满力量与目标的新时代来临。曾经分裂的土地，如今紧密相连。\n\n俄罗斯现在已然崛起，世界终将认识并尊重这个国家！"
 immersive_formables.6.a: "罗斯人再次团结为一个民族。"
 immersive_formables.7.title: "蓝白王冠"
 immersive_formables.7.desc: "南德意志的土地长久以来由敌对的公爵、自由城邦和野心勃勃的主教们所割据。直至今日，无人能宣称对整个巴伐利亚拥有真正的权威。\n\n随着这些领地统一在巴伐利亚王冠之下，昔日领主的拼凑版图已消逝在历史中。人民自豪地谈论着一种新的认同，它植根于共同的语言、传统，以及如今飘扬在这片土地上的蓝白旗帜。"
 immersive_formables.7.a: "巴伐利亚统一了。"
 immersive_formables.8.title: "孤岛同心"
 immersive_formables.8.desc: "爱尔兰岛曾因敌对部族、地方伯爵及外来君主而四分五裂，爱尔兰统一之梦始终在歌谣与记忆里回荡。\n\n如今，这个梦想已不再是遥不可及的期盼。通过结盟、外交或是战争，如今爱尔兰诸岛已在同一君主下。从阿尔斯特到芒斯特，从伦斯特到康诺特，人们都在谈论一个崭新的黎明——一个由自己决定命运的爱尔兰。"
 immersive_formables.8.a: "这座岛屿终于团结一致了。"
 immersive_formables.9.title: "鲁塞尼亚之地"
 immersive_formables.9.desc: "在东方广阔的平原与林间河流之地，罗斯民族长分裂。王公、盖特曼与异国领主各自宣称对土地的统治，而人民则在战火与变迁的边界中艰难求生。\n\n但如今，一种崭新的身份已然成形，编年史则记载着一个国家的崛起——它或许将重拾早期罗斯的遗产，也可能开辟一条全然属于自己的道路。"
 immersive_formables.9.a: "鲁塞尼亚团结一致，决心主宰自己的命运。"
 immersive_formables.10.title: "帝国重光"
 immersive_formables.10.desc: "自查理曼时代以来，帝国的理念始终笼罩着德意志诸邦，时而强盛，时而分崩，却从未被遗忘。诸侯、选帝侯与城邦为此争论数代，然无人能否认其所承载的遗产。\n\n如今，纷争已经平息。帝国诸邦团结于唯一威权之下。旌旗扬起，宫廷汇聚，欧洲注视着这个久被视为遗迹的力量再度觉醒。"
 immersive_formables.10.a: "神圣罗马帝国重现人间。"
 immersive_formables.11.title: "托斯卡纳之心"
 immersive_formables.11.a: "文艺再复兴！"
 immersive_formables.12.title: "帝国重生"
 immersive_formables.12.desc: "罗马的理念从未消亡。在军团覆灭、皇帝陨落很久之后，它的法律、语言与记忆依然塑造着各大洲。从帝王到学者，从入侵者到继业者，无数统治者都宣称接过罗马的衣钵，却无人能真正恢复其荣光。\n\n然而今天，不可能已化为现实。古老的行省再度臣服于同一权威之下。鹰徽高悬于我们的旗帜之上，道路与城市重焕生机，人们谈论着这个从史上最伟大的帝国遗产中铸就的新时代。罗马帝国再度矗立于世。"
 immersive_formables.12.a: "我们是罗马的继承者！"
 immersive_formables.13.title: "瑞士邦联"
 immersive_formables.13.desc: "巍峨的阿尔卑斯群山之间，世代追求自由的人们聚居的山谷里，一种新的格局已然形成。山区社群间朴素的防御盟约，如今已发展成一个目标统一、意志坚定的邦联。\n\n各州曾因地理与争斗彼此隔绝，如今却以神圣誓言结盟，决心共同守护自由、抵御一切威胁。这片土地上早已融入血脉的独立精神，终于凝聚成一个国家，瑞士就此诞生。她并非由征服锻造，而是由人民钢铁般的意志铸就。"
 immersive_formables.13.a: "自由人的联盟！"
 immersive_formables.14.title: "威斯特伐利亚的崛起"
 immersive_formables.14.desc: "在日耳曼腹地，昔日由主教、伯爵与市议会割据统治的土地，如今正凝聚一体。历经数百年纷争，这些日耳曼人民通过外交手腕、历史传承以及对稳定生活的渴望，终于站在同一面旗帜之下。\n\n分裂的威斯特伐利亚，今已崛起为统一的主权国家，它的诞生预示着帝国间重新平衡，以及威斯特伐利亚人对安定繁荣未来的共同向往。"
 immersive_formables.14.a: "威斯特伐利亚团结一心！"
 immersive_formables.15.title: "施瓦本的重建"
 immersive_formables.15.desc: "施瓦本公国曾是日耳曼五大部落公国，但随时间流逝逐渐衰败，沦为领主、骑士与自由城邦狂欢之地。\n\n如今，历经数代分裂之后，施瓦本的旗帜和身份认同再度重生，重返历史舞台。"
 immersive_formables.15.a: "施瓦本重生！"
 immersive_formables.16.title: "萨克森民族"
 immersive_formables.16.desc: "数个世纪以来，萨克森之名总能唤起人们对这个民族的美好想象，然而，政治斗争让这个地区分裂，如今一个统一的萨克森再度在日耳曼地区崛起。\n\n凭借决心与团结，萨克森民族得以重生，古老传统重焕生机，人民以崭新的力量与目标展望未来。"
 immersive_formables.16.a: "萨克森崛起！"
 immersive_formables.17.title: "马来亚的诞生"
 immersive_formables.17.desc: "几个世纪以来世界各地的商船曾在这片半岛与海岸线上停靠，这里纷争不断，但是如今一种通过共同的信仰、文化和传统而塑造的崭新身份认同——马来亚在此崛起。\n\n马来亚掌控至关重要的海峡，并成为区域大国。曾经吹向外国商人的季风，如今带着一股新消息传遍世界各地。"
 immersive_formables.17.a: "新马来亚崛起！"
 immersive_formables.18.title: "努山塔拉之梦"
 immersive_formables.18.desc: "从苏门答腊到摩鹿加群岛，努山塔拉统一之梦始终在传说、史诗与记忆中生生不息。统治者与学者世代都想将这里打造为一个共同的血脉、语言与传统的国度\n\n如今，梦想已成现实。曾经无数孤立的岛屿，如今凝聚成一个国度。努山塔拉已做好准备，开创崭新的时代。"
 immersive_formables.18.a: "群岛归一！"
 immersive_formables.19.title: "马六甲的新生"
 immersive_formables.19.desc: "马六甲之名曾经从中国到阿拉伯的宫廷，无人不知无人不晓，满载香料、丝绸与黄金的商船在这里交汇，但在殖民、入侵与时间变迁下，逐渐黯然失色。\n\n此时此刻，随着主权重振与影响力复兴，马六甲正重回主宰海峡的角色。"
 immersive_formables.19.a: "马六甲重生！"
 immersive_formables.20.title: "日本崛起"
 immersive_formables.20.desc: "在武士、城堡和幕府时代之前，天皇本来就是权力中心，象征着团结、权威以及文化起源。\n\n如今，当分散的土地归于统一天皇治理，古老的身份认同再度苏醒，人们都意识到一个新时代已然到来——一个由天皇的意志引领的时代。"
 immersive_formables.20.a: "天皇万岁！"
 immersive_formables.21.title: "罗马尼亚的诞生"
 immersive_formables.21.desc: "瓦拉几亚、摩尔达维亚和特兰西瓦尼亚人在几个世纪前说着相同语言、信仰相同信仰与有着共通传承，却因疆界划定与帝国摆布而长久分裂。因此当地人历史写满了抗争、坚韧与统一的希望。\n\n今日，这份期望终成现实——他们共通形成了罗马尼亚身份认同，这个国家由共同的记忆、共同的奋斗与共同的命运熔铸而成。"
 immersive_formables.21.a: "一个民族再统一"
 immersive_formables.22.title: "波斯复兴"
 immersive_formables.22.desc: "从扎格罗斯山脉到克尔曼沙漠，这片土地历经征服、分裂与重生，曾崛起辉煌帝国，也留下知识传承、建筑瑰宝，以及曾统治世界中心的帝王传说。\n\n今日，伊朗高原再度统一于同一旗帜之下。城市繁荣兴盛，商路往来不绝，昔日万王之王重新归来指引国家前行。波斯已经重生，准备好再次书写历史篇章。"
 immersive_formables.22.a: "帝国重生！"
 immersive_formables.23.title: "阿拉伯的统一"
 immersive_formables.23.desc: "阿拉伯的部落与民族在信仰、语言和传统上同根同源，然而只因沙漠而被迫分隔。\n\n如今，新的秩序正在崛起。散落的绿洲、部族与商队已联合为一个国家——阿拉伯。"
 immersive_formables.23.a: "一个阿拉伯，一个民族！"
 immersive_formables.24.title: "暹罗崛起"
 immersive_formables.24.desc: "各大古国在半岛森林之间曾历经辉煌、冲突与复兴的兴衰，但各族群共有的传承，比任何王国都更为古老。\n\n一股新生力量已然崛起——暹罗，凭借决心与团结，让力量得以凝聚，文化日益繁荣。\n\n从遥远的高地到繁华的都市，人民共同展望没有分裂的未来，暹罗将作为东南亚腹地的灯塔与荣耀象征而屹立。"
 immersive_formables.24.a: "伊斯兰的新纪元！"
 immersive_formables.25.title: "埃及归来"
 immersive_formables.25.desc: "文明诞生于尼罗河畔，数千年来，埃及诞生许多知识、农业与力量的奇迹。尽管征服和外国统治一度遮蔽了它的辉煌，但法老从未真正消逝。\n\n如今尼罗河重归统一，从亚历山大港的海岸到南方的瀑布群，一个崭新的埃及正带着力量而崛起。"
 immersive_formables.25.a: "埃及再次崛起！"
 immersive_formables.26.title: "普鲁士的崛起"
 immersive_formables.26.desc: "凭借纪律、决心与不可动摇的意志，一个新势力已在日耳曼世界崛起。北方曾散落于公国、边疆领与骑士领之间的分裂疆土，如今已在唯一且崛起的普鲁士旗帜下凝聚统一。\n\n从波罗的海沿岸的堡垒到我们威武军队的训练场，一种高效与使命必达的文化正开始铸就我们的民族性格。立足于此基础，王国准备跨越边界崛起，确立其作为足以开创中欧乃至更广阔地域未来的力量之地位。"
 immersive_formables.26.a: "普鲁士崛起！"
 immersive_formables.27.title: "安达卢西亚的诞生"
 immersive_formables.27.desc: "在阳光普照的内华达山脉与安达卢斯绵延海岸之间的土地上，文化、学术、艺术与贸易曾在此交织。历经数世纪的冲突、疆域变迁与身份割裂后，一种崭新的认同——安达卢西亚已经出现，安达卢西亚这些承载传奇的土地统一于同一旗帜之下，重振那些曾名扬大陆的城市的辉煌。\n\n从科尔多瓦到格拉纳达，安达卢西亚人已准备好塑造属于自己的未来。"
 immersive_formables.27.a: "安达卢西亚的新黎明！"
 immersive_formables.28.title: "成立大不列颠"
 immersive_formables.28.desc: "历经数代的对抗、冲突与不稳定的联盟，这些岛屿终于合而为一。古老王国间的纷争、王朝更迭的动荡、宗教变迁，最终统一一个不列颠王国。\n\n从崎岖的高地到连绵的英格兰乡野，从威尔士山谷到贸易路线的港口，一种新的身份正在形成。"
 immersive_formables.28.a: "一顶王冠，一个不列颠！"
 immersive_formables.29.title: "欧罗巴的黎明"
 immersive_formables.29.desc: "数个世纪以来，这片大陆始终被纷争所定义——王国兴衰，帝国战争，疆域变迁。然而在这些冲突之下，潜藏着共同的传承：思想、信仰、语言、哲学，以及早已逝去的文明记忆。\n\n由远见与外交塑造欧罗巴，将作为一个联盟屹立于世，将大陆交织成一幅完整的画卷。\n\n从北境冰封的峡湾到阳光普照的地中海沿岸，从喧嚣市集到古老宫廷，整片大陆终于发出同一个声音。崭新的篇章已然开启，或将定义未来数百年的世界格局。"
 immersive_formables.29.a: "新的世界秩序！"
 immersive_formables.30.title: "索科托的崛起"
 immersive_formables.30.desc: "在这片辽阔的草原上，曾经分裂的古老酋长国如今已迎来新的秩序。学者、法学家与战士们将信仰与权力交织融合，把疆土统一，如今旗帜已飘扬在村庄、河流与商路上空，为所有沐浴其荣光的人们，昭示着团结与使命的新纪元。"
 immersive_formables.30.a: "索科托将领导这片土地。"
 immersive_formables.31.title: "统一的索马里"
 immersive_formables.31.desc: "索马里人世世代代，跨越海岸、平原、沙漠与繁华的贸易枢纽，相同的语言与传统将他们相连，却又因部族而分隔。如今，那些在诗歌中被传颂、在记忆中被珍藏、在艰难岁月中被期盼的统一梦想，终于成为现实。\n\n从印度洋沿岸到内陆狂风呼啸的高原，一个统一的索马里国家屹立，誓将守护其文化遗产，并为非洲之角开拓崭新的未来。"
 immersive_formables.31.a: "索马里人民团结一致。"
 immersive_formables.32.title: "耶路撒冷的重建"
 immersive_formables.32.desc: "这座先知、帝王与朝圣者永恒的圣城——耶路撒冷，再度重生成为至高无上的荣耀之地。\n\n这座城市的守护者誓言保卫它的圣所、城墙与记忆。耶路撒冷的重生，是一个跨越大陆、信仰与世纪的时刻，为所有仰望圣城的人们重新点燃希望。"
 immersive_formables.32.a: "让耶路撒冷重现光辉"
 immersive_formables.33.title: "刚果的复兴"
 immersive_formables.33.desc: "在非洲中部深处，刚果王国曾是一个强大而文明的国度，其首都曾是外交、贸易和信仰的中心。尽管历经苦难、冲突与外来干涉，其影响力逐渐式微，但其遗产仍在人民心中生生不息。\n\n如今，刚果重归统一并再度崛起，自信地迈向新时代。"
 immersive_formables.33.a: "刚果重生！"
 immersive_formables.34.title: "法兰克尼亚的统一"
 immersive_formables.34.desc: "数个世纪以来，法兰克尼亚地区一直处于分裂状态。如今，这片土地终于在同一面旗帜下实现了统一。曾经支离破碎的法兰克尼亚领土已被编织成一个紧密的整体并做好准备，开创属于自己的命运。"
 immersive_formables.34.a: "法兰克尼亚必将团结一致。"
 immersive_formables.35.title: "重振北境雄风"
 immersive_formables.35.desc: "布立吞人曾遍布不列颠北部，他们顽强抵抗着罗马人、撒克逊人和盖尔人的入侵。然而，他们的语言与文化却逐渐消逝，只存在于记忆深处。\n\n今日一场复兴已然开启，古老北方的王国再度崛起，布立吞人在一面旗帜下团结一致，恢复那本就属于他们的王国的时刻。"
 immersive_formables.35.a: "古老的北方再度苏醒。"
 immersive_formables.36.title: "汉诺威的崛起"
 immersive_formables.36.desc: "北德意志的分散诸侯国已在汉诺威的旗帜下集结统一。曾经相互竞争的诸多公国与选侯领统一并崛起为一个稳定而充满活力的国家，如今汉诺威将目光投向远方，准备在列强中占据一席之地。"
 immersive_formables.36.a: "汉诺威，开创未来。"
 immersive_formables.37.title: "北海帝国重生"
 immersive_formables.37.desc: "在遥远的过去，斯堪的纳维亚、英格兰及北海诸国的海岸曾统一于同一王冠之下。如今，这个传奇帝国重新铸成。历史的潮流已经改变，北方诸国聚集在同一统治者麾下，随时准备主宰海洋，塑造北欧的命运。"
 immersive_formables.37.a: "北海将臣服于我们的统治。"
 immersive_formables.38.title: "蒙古的复兴"
 immersive_formables.38.desc: "无尽的草原之上，斩旗再次在一位统治者的麾下升起。分裂且散落的部族重归一统，让人忆起蒙古铁骑曾席卷大陆的峥嵘岁月，古老帝国必将再度驰骋草原。"
 immersive_formables.38.a: "草原统一了。"
 immersive_formables.39.title: "努比亚归来"
 immersive_formables.39.desc: "尼罗河以南的古老王国——库施、马库里亚、诺巴提亚，曾是非洲力量与独立的堡垒。如今，努比亚再度统一，成为那些曾抵御帝国与入侵的壁垒，并准备在这条伟大河流沿岸重获应有的地位。"
 immersive_formables.39.a: "努比亚再次崛起。"
 immersive_formables.40.title: "喜马拉雅王国"
 immersive_formables.40.desc: "与天空相接的高山之巅，众多部族已交织成统一国度，尼泊尔王国崛起为喜马拉雅的守护者——坚定、坚韧，傲然屹立于次大陆。"
 immersive_formables.40.a: "尼泊尔团结一心。"
 immersive_formables.41.title: "摩尔多瓦的统一"
 immersive_formables.41.desc: "在喀尔巴阡山脉与德涅斯特河之间，有一片长期因敌对纷争和外部势力干预而分裂的土地。然而今日，摩尔达维亚终于实现了世代未竟的统一。这片土地不再是大国博弈的战场，而是准备亲手谱写自己的命运篇章。"
 immersive_formables.41.a: "摩尔达维亚已重生。"
 immersive_formables.42.title: "建立特兰西瓦尼亚公国"
 immersive_formables.42.desc: "长久以来，这片土地被山间堡垒、森林覆盖的峡谷和帝国的野心所塑造，特兰西瓦尼亚始终独善其身。如今，历经数代人之后，其各族民众首次聚集于统一统治之下，建立起一个足够强大的公国，足以在中欧变幻莫测的势力格局中，开创属于自己的命运。"
 immersive_formables.42.a: "特兰西瓦尼亚终于统一了！"
 immersive_formables.43.title: "掸邦统一"
 immersive_formables.43.desc: "傣族人长久以来被众多土司分割管辖，各自为政。然而无论王朝如何更迭，共同的语言、习俗与血脉传承始终绵延不绝。而今，当掸邦在锣鼓声中团结一致，一个地区强国的王国已然崛起。"
 immersive_formables.43.a: "一个新的掸族国家诞生了。"
 immersive_formables.44.title: "西里西亚的诞生"
 immersive_formables.44.desc: "西里西亚长久以来一直是夹在波兰、波希米亚和日耳曼诸王之间的土地。它的矿藏曾为各国君主增添财富，哪怕主权在数个世纪更迭，这片土地自身的认同始终延续。如今西里西亚已崛起为统一国家，不再是附庸，而是独立屹立于世。"
 immersive_formables.44.a: "西里西亚崛起。"
 immersive_formables.45.title: "斯洛伐克国家"
 immersive_formables.45.desc: "在喀尔巴阡山脉下，斯洛伐克人民历经数百年异族统治，任凭周遭帝国兴衰更迭依然守护着自己的语言、传统与信仰，如今斯洛伐克团结一心，准备以独立国家的姿态开创自己的命运。"
 immersive_formables.45.a: "斯洛伐克傲然屹立。"
 immersive_formables.46.title: "撒丁王国"
 immersive_formables.46.desc: "在撒丁岛人民长久以来抵御着腓尼基人、罗马人、阿拉伯人和阿拉贡人等外来势力的统治。如今，岛上的各个城邦与社群终于统一于同一旗帜之下。随着身份认同的巩固，撒丁岛正以主权国家的姿态昂首前行。"
 immersive_formables.46.a: "撒丁岛重拾昔日荣光。"
 immersive_formables.47.title: "波美拉尼亚联合"
 immersive_formables.47.desc: "波美拉尼亚坐落在波罗的海与奥得河之间，这片土地上的公爵与城邦曾历经数个世纪邻国野心的洗礼。然而无论是斯拉夫人还是日耳曼人，波美拉尼亚人民始终保持着对这片海岸的共同归属感，视其为家园。如今，分裂的公国已重归统一。波美拉尼亚以强盛大国之姿崛起，成为其海岸线的真正主宰。"
 immersive_formables.47.a: "波美拉尼亚重归统一。"
 immersive_formables.48.title: "玛雅重生"
 immersive_formables.48.desc: "数个世纪以来，玛雅文明的火种在分散的城邦、高地王国以及坚守古老传统的坚韧社群中延续。自伟大先祖的时代之后，玛雅的土地第一次团结在同一面旗帜下。这个曾经四分五裂的文明，如今重获新生，它自豪而坚韧，已经准备好重拾那份筑就古老神庙的精神。"
 immersive_formables.48.a: "玛雅再次崛起！"
 immersive_formables.49.title: "勃艮第国"
 immersive_formables.49.desc: "勃艮第曾一度是欧洲最强大的公国之一——富饶、文明且令人敬畏。尽管曾被敌对王国分割，但勃艮第的土地从未失去其身份认同，也未曾遗忘昔日的辉煌。如今，低地国家、弗朗什‑孔泰与勃艮第核心地区再次统一于单一权威之下。一个崭新的勃艮第正在崛起，准备回到历史应有的地位。"
 immersive_formables.49.a: "勃艮第崛起！"