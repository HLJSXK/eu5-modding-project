l_simp_chinese:
 IRA_zoroastrian: "伊朗沙赫尔"
 IRA_zoroastrian_ADJ: "伊朗沙赫尔"
 zoroastrian_fire_temple: "圣火庙"
 zoroastrian_fire_temple_desc: "祆教圣所，少数从蒙古与伊斯兰入侵中幸存的庙宇，如今或许能迎来辉煌的复兴。"
 fire_temple: "祆教火庙"
 fire_temple_desc: "祆教圣所，少数从蒙古与伊斯兰入侵中幸存的庙宇，如今或许能迎来辉煌的复兴。"
 zoroastrian_summit_pyre: "山顶烈焰"
 zoroastrian_summit_pyre_desc: "许多古老的祆教礼拜场所、圣地和朝圣地都位于山区，我们必须为这些礼拜场所提供便利。"
 summit_pyre: "祆教山顶烈焰"
 summit_pyre_desc: "许多古老的祆教礼拜场所、圣地和朝圣地都位于山区，我们必须为这些礼拜场所提供便利。"
 navjote: "入教礼"
 navjote_desc: "入教礼是为儿童接受圣衣的典礼，标志着父母开始向孩子传授祆教教义的起点。"
 yasna: "亚斯纳"
 yasna_desc: "亚斯纳仪式是一种布道，旨在传播并强化阿胡拉·马兹达的真理。"
 haoma: "豪麻"
 haoma_desc: "一种神圣的植物，曾被用于孕育琐罗亚斯德，同时也用于治疗和净化。“他于拂晓时分（依照古老仪式惯例）为豪麻仪式取水。他涉入河流深处汲取最纯净之水；正当他返回岸边时——自身必然处于仪式洁净状态，从纯净元素水中浮现，沐浴在春日黎明的清新中——他获得了异象。”，《琐罗亚斯德教史》第一卷，第185页。"
 dakhma: "达赫马"
 dakhma_desc: "达赫马的建造是为了让死者自然分解，从而避免尸体污染土壤。"
 manthra: "圣歌"
 manthra_desc: "在《迦特》中，琐罗亚斯德被描述为圣歌的知晓者，圣歌都是简短的祈祷文。"
 asha: "阿莎"
 asha_desc: "“此术语，如今已被普遍接受，代表了一种无法用其他语言中的单一词汇精确传达的概念。它似乎代表着最广泛意义上的'秩序'：宇宙秩序，使黑夜让位于白昼，四季更迭；祭祀秩序，借此自然节律得以巩固与维系；社会秩序，使人类能在和谐与繁荣中共存；以及道德秩序或真理。”《琐罗亚斯德教史》第一卷，第27页。"
 avestan_resurgence: "阿维斯陀复兴"
 avestan_resurgence_desc: "通过重新引入阿维斯陀语和文字教学，并在该地区搜寻发掘被遗忘的古老文献，我们终有一日能重拾昔日的荣光。"
 faravahar: "法拉瓦哈"
 faravahar_desc: "法拉瓦哈是祆教最具标志性的符号，用以象征神圣统治权。尽管该符号被祆教徒和伊朗人共同使用，其起源可追溯至亚述文明中描绘主神阿舒尔的形象。"
 crossroads_caravans: "丝绸之路商队"
 crossroads_caravans_desc: "通过将丝绸之路的贸易从草原转向波斯，我们将能够凭借新发现的贸易来充实自己。"
 grand_school_reopened: "大学堂重开"
 grand_school_reopened_desc: "得益于丝绸之路带来的财富涌入，我们现在能够投资兴建规模更大、更宏伟的学校，同时还能增加学校的数量。"
 firewood_forestry: "柴薪林业"
 firewood_forestry_desc: "由于圣火所需木柴的需求增加，必须建立标准化的林业体系以作补偿。"
 holy_atar_cannon: "圣火加农炮"
 holy_atar_cannon_desc: "这门火炮专为追求极致伤害而非速度而设计，向敌人倾泻净化之火。"
 a_atar_cannon: "火焰加农炮"
 a_atar_cannon_desc: "这门火炮专为追求极致伤害而非速度而设计，向敌人倾泻净化之火。"
 new_nask_editions: "新经文"
 new_nask_editions_desc: "时光流逝，我们对古老经文的记忆日渐模糊。我们必须让神圣的经文与时俱进，并具备翻译能力，以便也能感化他人。"
 diaspora_reintegration: "侨民重新融合"
 diaspora_reintegration_desc: "祆教社群分裂为伊朗祆教徒与印度帕西人。我们必须将这些民众团结于共同的事业与信仰之下。"
 silk_road_infrastructure: "丝绸之路基础设施"
 silk_road_infrastructure_desc: "通过改善基础设施，我们得以出口诸如咖啡豆、棉质衣物、靛蓝与紫色染料、檀香、装饰性象牙、胡椒或藏红花等香料，以及玉石、青金石、绿松石、珍珠等宝石，还有最顶级的丝绸织物。"
 zoroastrian_religious_state: "祆教国家"
 zoroastrian_religious_state_desc: "历史上，在帕提亚帝国时期，祆教曾分裂，直至埃兰沙赫尔崛起并强制推行正统祆教。如今，在蒙古入侵后，这一信仰再度分裂，亟待复兴。"
 defensive_preparations: "防御准备"
 defensive_preparations_desc: "随着火炮被引入围城与防御作战，必须持续积累并储备充足的物资，方能做好万全准备。"
 holy_cloth_demand: "圣布需求"
 holy_cloth_demand_desc: "随着丝绸与棉布出口需求的增长和利润的提升，降低低效环节变得至关重要。"
 threefold_path_of_asha: "阿莎三途"
 threefold_path_of_asha_desc: "善念、善言、善行被视为祆教的核心准则。"
 a_modern_immortal: "现代化长生军"
 a_modern_immortal_desc: "在现代，长生军的用途与装备已全然不同。火枪与火炮的加入使我们的军队焕然一新，但我们依然能坚守古老的不朽传说。"
 mountain_trails_expanded: "山径拓展"
 mountain_trails_expanded_desc: "通过复制丝绸之路的货物运输体系，并将其应用于古老的朝圣路线，我们能够更经济地运输货物。"
 zoroastrian_iconoclasm: "祆教圣像破坏运动"
 zoroastrian_iconoclasm_desc: "祆教历来融合了文化与地方仪式。虽然部分波斯帝国未曾遵循此规，但我们必须将其编纂成典，以期减少未来的宗教争端。"
 soldier_clerics: "武装教士"
 soldier_clerics_desc: "让我们的士兵也深度参与宗教活动，以便我们能够启迪他们。"
 pantheism_integration: "泛神论整合"
 pantheism_integration_desc: "通过与其他泛神论宗教找到共同点，我们可以和平地融合它们。"
 zoroastrian_history: "祆教历史"
 zoroastrian_history_desc: "祆教是现存最古老的宗教之一，拥有极为深厚的历史积淀。如今，比以往任何时候都更需要保存并传播这段历史与故事。"
 immortal_barracks: "长生军兵营"
 immortal_barracks_desc: "随着长生军军团的重新建立，现在需要在领地各处建造足够的兵营，以确保他们能在任何地方有效作战。"
 immortals: "重装长生军"
 immortals_desc: "为了重现传说中长生军\"的威名，必须效法他们坚韧不拔的纪律性，同时掌握其灵活多变的作战方式。"
 an_immortal: "重装长生军"
 an_immortal_desc: "为了重现传说中长生军\"的威名，必须效法他们坚韧不拔的纪律性，同时掌握其灵活多变的作战方式。"
 a_renaissance_immortal_advance: "长生军骑士"
 a_renaissance_immortal_advance_desc: "由于频繁与游牧民族及其他拥有大规模骑兵部队的入侵者交战，我们必须训练重装长矛兵，使其擅长两项任务：以超长矛抵御骑兵冲锋，并能抵挡骑射手的攻击。"
 a_renaissance_immortal: "反步兵长生军"
 a_renaissance_immortal_desc: "由于频繁与游牧民族及其他拥有大规模骑兵部队的入侵者交战，我们必须训练重装长矛兵，使其擅长两项任务：以超长矛抵御骑兵冲锋，并能抵挡骑射手的攻击。"
 a_discovery_immortal_advance: "火绳枪长生军"
 a_discovery_immortal_advance_desc: "在长矛兵后方部署火枪手作为第二道防线，我们就能用密集的火力有效遏制骑兵冲锋。"
 a_discovery_immortal: "火绳枪长生军"
 a_discovery_immortal_desc: "在长矛兵后方部署火枪手作为第二道防线，我们就能用密集的火力有效遏制骑兵冲锋。"
 a_reformation_immortal_advance: "火绳枪长生军"
 a_reformation_immortal_advance_desc: "波斯山地地形与高机动性火枪手的结合，使得游击战术几乎所向披靡。"
 a_reformation_immortal: "火绳枪长生军"
 a_reformation_immortal_desc: "波斯山地地形与高机动性火枪手的结合，使得游击战术几乎所向披靡。"
 a_absolutism_immortal_advance: "线列长生军"
 a_absolutism_immortal_advance_desc: "随着火枪在战争中占据主导地位，优化其伤害产出的需求催生了线列步兵的诞生。"
 a_absolutism_immortal: "线列长生军"
 a_absolutism_immortal_desc: "随着火枪在战争中占据主导地位，优化其伤害产出的需求催生了线列步兵的诞生。"
 a_revolutions_immortal_advance: "步行长生军"
 a_revolutions_immortal_advance_desc: "线膛枪与米尼弹的结合，因其射程提升超过四倍，彻底击溃了线列步兵的战术体系。同时，训练有素的步枪手能轻松歼灭骑兵，使得骑兵部队也失去了战场优势。"
 a_revolutions_immortal: "步行长生军"
 a_revolutions_immortal_desc: "线膛枪与米尼弹的结合，因其射程提升超过四倍，彻底击溃了线列步兵的战术体系。同时，训练有素的步枪手能轻松歼灭骑兵，使得骑兵部队也失去了战场优势。"
 zoroastrian_theocracy: "波斯祆教神权国"
 zoroastrian_theocracy_desc: "波斯神权政体是一种与祆教紧密融合的君主制，两者密不可分。"
 shahanshah: "万王之王"
 shahanshah_desc: "万王之王既是波斯帝国的政治领袖，也是宗教领袖。万王之王居于世界中心，日月皆围绕其运行。"
 wuzurgan: "乌祖尔甘"
 wuzurgan_desc: "王室、小领主、大地主及祭司共同构成了特权阶层，他们被统称为“乌祖尔甘”。"
 arteshtaran: "阿特史塔兰"
 arteshtaran_desc: "旧埃兰沙赫尔的武士阶层，凭借此特权，贵族精英们古老的军事义务得以恢复，以换取更为有利可图且报酬更高的普什提班职位——即万王之王的精英卫队。"
 asronan: "阿斯罗南"
 asronan_desc: "古埃兰沙赫尔祭司阶级，凭借此特权，旧祭司阶层在典籍与教义阐释上获得更大掌控权，但这亦导致对异端信仰的压制更为严苛。"
 hutukhshan: "胡图赫珊"
 hutukhshan_desc: "旧埃兰沙赫尔的手工业者与商人阶层，凭借此项特权，小商人的贸易成本得以降低，以期促进更多贸易活动。然而，由于传统上万王之王是最大的贸易商，此举损害了他们宏伟的形象。"
 wastaryoshan: "瓦斯塔里奥申"
 wastaryoshan_desc: "旧伊朗行省的平民阶层，凭借此特权享有更低的平民最高税率，以期更多农民能跻身中产阶级。"
 zoroastrian_holy_site: "祆教圣地"
 zoroastrian_holy_site_desc: "祆教的重要圣地。"
 atash_behram_holy_fire: "拜火教祆祠"
 atash_behram_holy_fire_desc: "胜利之火是祆教火庙中可奉为永恒圣火的最高等级火焰。这些便是古老圣殿的所在。"
 yazd_atashkadeh: "胜利之火"
 iranshah_atash_behram: "伊朗沙赫火庙"
 atashgah_fire_temple: "巴库火祠"
 takht_i_sangin: "塔赫季-桑金"
 mt_ushi_darena: "乌希达雷纳山"
 adur_burzen_mihr: "阿杜尔·布尔曾‑米尔"
 adur_gushnasp: "阿杜尔·古什纳斯普"
 adur_farnbag: "阿杜尔·法尔恩巴格"
