l_simp_chinese:
 flavor_lom.1.title: "重铸王国"
 flavor_lom.1.desc: "历代维斯孔蒂的目光始终越过米兰边界，投向意大利北部更广阔的土地。他们渴望将这些领土统一在一顶王冠之下，夺回属于他们的王室头衔，这一野心历经战争、外交斡旋与联盟更迭，始终未曾动摇。\n\n但这样的抱负并非孤立存在。神圣罗马帝国皇帝不容许境内有其他国王，除他自己之外。任何复兴伦巴第王国的尝试，都将直接挑战他的权威。获得认可的可能性微乎其微，遭遇反对则几乎是必然。\n\n若我们选择坚持这一古老诉求，便需明白：这绝非仅靠请愿便能实现的目标。倘若我们要争夺王冠，就必须做好捍卫它的准备。"
 flavor_lom.1.a: "向皇帝求取伦巴第铁王冠"
 flavor_lom.1.b: "我们必须打消这些野心。"
 flavor_lom.2.title: "伦巴第请愿"
 flavor_lom.2.desc: "[target_country.GetName]使节已抵达宫廷，携官方请愿书前来，请求授予其君主古老的伦巴第王冠。他们称，米兰日益增长的影响力与稳定性，使其成为帝国监管下北意大利名正言顺的守护者。这一理由并非毫无可取之处，但授予此类头衔将开创危险先例——可能促使其他诸侯追逐王冠而非尽责治理。\n\n然而，直接拒绝或会疏远忠诚的帝国臣民，其抱负本可引导至服务帝国整体利益的方向。经审慎考量，大臣们提出折中方案：不授予王冠本身，但将米兰君主晋升为大公爵位。此举既肯定其在帝国体系中的重要地位，又不赋予完整王室头衔。"
 flavor_lom.2.a: "很好，将[target_character.GetNameWithNoTooltip]升格为大公。"
 flavor_lom.3.title: "令人不安的妥协"
 flavor_lom.3.desc: "帝国对我们请愿书的回应已然送达，结果却不如我们所愿。皇帝虽认可米兰日益增长的影响力及为帝国所做的卓越贡献，却坚决拒绝授予我们伦巴第铁王冠。其使节在文书中称，此举是为维护帝国主权的尊严，同时避免开创可能引发诸侯更多动荡的先例。\n\n作为善意的表示，皇帝提出一项次级奖赏：将米兰升格为神圣罗马帝国内的大公国。这固然是一份荣誉——彰显了我们在帝国等级中的地位——但却远未达到我们所追求的王室认可。"
 flavor_lom.3.a: "时机已到。我们将以武力索取宣称！"
 flavor_lom.3.b: "违抗得来的王冠只会招致毁灭；我们应该继续增强自身的实力。"
 flavor_lom.4.title: "米兰违抗皇帝"
 flavor_lom.4.desc: "米兰已正式宣布退出神圣罗马帝国，并自立为伦巴第王国。此举未经商议、未获帝国批准，且直接违反了既定法律与惯例。其统治者如今所宣称的王室尊号，正是皇帝此前明确拒绝授予的头衔。\n\n此类行径显然无视帝国权威。若放任这一先例存续，必将引发诸侯反叛，进而动摇帝国本身的根基。为维护帝国治理的完整性，必须作出坚决回应。\n\n宫廷已达成一致结论：必须纠正米兰的非法分裂行为，并通过军事行动迫使这个自封的 “伦巴第王国” 恢复臣服。"
 flavor_lom.4.a: "僭位称王，即是谋反！"
 flavor_lom.5.title: "帝国反击"
 flavor_lom.5.desc: "神圣罗马皇帝颁布正式敕令，严正谴责我们脱离帝国及宣告建立伦巴第王国的行为。帝国法庭宣称我们的举动公然违背帝国法律，并对既定权威构成不可接受的挑战。\n\n敕令最终声明，帝国将不予承认我们的分离行为及新宣称的王室头衔。帝国军队已受命采取行动，“以恢复伦巴第地区的合法统治”。\n\n皇帝已正式宣战。"
 flavor_lom.5.a: "皇帝不能容忍叛逆！"
 flavor_lom.6.title: "民族认同"
 flavor_lom.6.desc: "近年来，我们的政府愈发团结，机构更为稳定，共同目标感也达到了前所未有的高度。顾问与学者们一致认为，“伦巴第王国” 这一称号已不再反映我们倾力构建的政治现实。\n\n他们提议采用“意大利王国”这一名称，并启用一面新国旗——它象征统一的身份认同，而非单纯的地区传承。这一变革将认可我们的疆域已从一系列历史领地，演变为一个更现代化、中央集权的国家，肩负着更广泛的责任与愿景。\n\n然而，宫廷中另一些人则呼吁谨慎行事。伦巴第的名号承载着数世纪的传统，更改它可能会让重视传统延续性与既定权威象征的人感到不安。是重塑现代化的国家身份，还是保留历史传承，这一抉择将决定我们向世界展现的国家特质。"
 flavor_lom.6.a: "接受新认同"
 flavor_lom.6.b: "传统必须延续"
 flavor_lom.7.title: "伦巴第铁王冠"
 flavor_lom.7.desc: "世代相传的伦巴第铁王冠一直安奉于蒙扎，是历代君王与皇帝共同尊崇的圣物。神圣罗马帝国的皇帝们翻越阿尔卑斯山前来取得它，坚信唯有将此冠加冕，他们对意大利的统治才具合法性。王冠的铁环据信含有一枚圣钉的碎片，长久以来既是俗世权柄的象征，亦是神圣权威的化身。\n\n今日，这顶王冠被请出圣殿，呈现在我们面前。没有异邦君王伸手攫取，没有远方皇帝行使其古老特权。当[ROOT.GetCountry.GetGovernment.GetRuler.GetName]戴上王冠时，铁质冠环的重量远超其金属本身：这是数个世纪以来，这顶王冠第一次不再属于外来者，而是归于真正的意大利继承者。\n\n大教堂内贵族与神职人员躬身行礼，现场一片肃静。其中象征意义不言自明——昔日由远方皇帝主张的王权，如今已回归这片土地真正子民的掌中。此次加冕礼标志着历史重任与复兴意大利疆域的使命，已完全托付于[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]家族。"
 flavor_lom.7.a: "虽承王冠，心犹难安。"