l_simp_chinese:
 leidang_law: "莱当法"
 leidang_law_desc: "“莱当”是一种北欧征兵传统，通过征召组建沿海舰队，用于季节性出征和王国防卫。几个世纪以来，这一制度不断演变：在丹麦和瑞典逐渐演变为税收形式，而挪威则始终保持着军事征兵性质。"
 leidang_traditional: "传统莱当制"
 leidang_traditional_desc: "传统形式的莱当制度以舰船为核心，其组织单位是舰船本身，船上人员需自备装备与战役给养。该单位由拥有农场的自由民组成，与传统封建制度不同的是，单位首领根据军事才能而非贵族地位进行选拔。"
 leidang_tax: "莱当税"
 leidang_tax_desc: "在丹麦和瑞典王国，莱当传统最终逐渐演变为一种税收形式，而非军事征召制度，不过在整个中世纪时期，船舶征召仍时常被启用。承担这项税赋的是王国的自由农民。"
 leidang_reformed: "革新莱当制"
 leidang_reformed_desc: "经过改革和现代化的莱当制度，侧重于招募和训练职业士兵，用于海陆作战。"
 landsloven: "土地法"
 landsloven_desc: "《土地法》由被称为“立法者”的马格努斯六世国王颁布。这部法律是欧洲首批由中央权威制定的综合性国家法规之一，适用于整个挪威王国。该法律影响深远，但最重要的在于它通过剥夺地区民众大会的权力，使城市和贸易中心直接对中央政权负责，从而强化了国王及中央政府的权威。然而，为换取教会的支持，神职人员被授予了诸多特权。"
 nor_resources_events.1.title: "农民发现铜矿资源"
 nor_resources_events.1.desc: "在邻近[ShowLocationName('nidaros')]的[ShowLocationName('skaun')]，一位有地农民最近在他的农场地下发现了潜在的硫化铜矿源。我们对此潜在资源进行投资将是明智之举，以便日后开采。当然，那位农民也需要从这片土地上清退，不过这只需些许钱财便能解决。"
 nor_resources_events.1.a: "掘地三尺！"
 nor_resources_events.1.b: "我们需要更多农民。"
 nor_resources_events.2.title: "扩展铜矿产业"
 nor_resources_events.2.desc: "半个世纪以来，[ShowLocationName('meraker')]地区一直进行着小规模的铜矿和铅矿开采，主要由自由人经营。位于[ShowLocationName('nidaros')]附近的商人已请求[GetCountry('NOR').GetGovernment.GetRuler.GetName]进一步投资该区域的铜矿，因为目前的矿场效率极为低下。"
 nor_resources_events.2.a: "投资新式基础设施"
 nor_resources_events.2.b: "铅矿会更有用"
 nor_resources_events.3.title: "钴蓝"
 nor_resources_events.3.desc: "在布斯克吕发现了一处大型钴矿。如果我们投资于这种资源，这种资源将非常适合制作彩瓷和钴玻璃。"
 nor_resources_events.3.a: "掘地三尺！"
 nor_resources_events.3.b: "钴？还有这种玩意儿？"
 nor_resources_events.4.title: "在耶姆特兰发现高纯铜矿"
 nor_resources_events.4.desc: "尽管耶姆特兰区域已知含有各种矿藏，但大规模采矿作业一直因矿物分布分散和人口稀少而受阻。然而，最近一位来自[ShowLocationName('offerdal')]的农妇向当地勘探者展示了纯铜矿石样本，这些样本纯度相当高。或许投资建设一个正规的矿山会是明智之举？"
 nor_resources_events.4.a: "这可能值得一试"
 nor_resources_events.4.b: "邀请德意志矿工！"
 nor_resources_events.5.title: "哈德兰矿产"
 nor_resources_events.5.desc: "我们的一位官员注意到，位于[ShowLocationName('eidsvoll')]的一座小型、经营困难的矿山具有巨大的扩张潜力。如果我们购买这座矿山并将其纳入王家领地，就能轻松调派经验丰富的矿工进驻，以确保铁矿得到妥善开采和利用。"
 nor_resources_events.5.a: "开个价吧。"
 nor_resources_events.5.b: "既然这矿场经营惨淡，我们又何必费心？"
 nor_resources_events.6.title: "北方发现铁矿"
 nor_resources_events.6.desc: "已在[ShowLocationName('rana')]的敦德兰谷地发现一处潜在的铁矿源。然而，由于其位置极其偏远，在该地区建立正规开采作业的成本可能高昂到令人望而却步。"
 nor_resources_events.6.a: "好事多磨！"
 nor_resources_events.6.b: "邀请德意志矿工！"
 nor_infantry_warfare: "希德曼"
 nor_infantry_warfare_desc: "从古老的维京人，到拜占庭宫廷的瓦兰吉卫队，再到“十字军战士”西古尔德的虔诚远征军，骑兵在挪威军队中一向罕见。"
 nor_ski_infantry: "滑雪作战"
 nor_ski_infantry_desc: "据说挪威人生来脚上就穿着滑雪板，这项独特的技能在侦察和骚扰敌军方面大有用处。"
 nor_german_miners: "德意志采矿技术"
 nor_german_miners_desc: "通过邀请德意志采矿专家，我们可以积累如何开采斯堪的山脉丰富矿产的集体知识。"
 nor_literacy: "乡村教会学校"
 nor_literacy_desc: "挪威地域辽阔，乡村分散，但我们的神职人员确保无论人们住在哪里，都能学习阅读上帝的言语。"
 nor_grunnloven: "挪威宪法"
 nor_grunnloven_desc: "挪威宪法受法国第一部宪法、美国宪法和法国大革命的启发，是现今仍在使用的第二古老宪法。"
 STATIC_MODIFIER_NAME_blaafarveverket: "钴蓝工厂"
 fishing_village_nor: "北欧渔村"
 fishing_village_nor_desc: "鳕鱼干，一种在高架木架上风干的鱼制品，是挪威民族最古老的出口商品。这种看似简单的鱼类保存法通过舍弃盐渍等替代性保鲜手段，反而造就了效益惊人的产业。"
 fishing_village_hjell: "晒鱼架村庄"
 nor_resources_events.100.title: "[target_location.GetNameWithNoTooltip]银矿"
 nor_resources_events.100.desc: "随着[ShowContinentName('europe')]大步迈向现代，对[ShowGoodsName('silver')]的贪婪需求持续增长，推动着贸易与货币流通。在[ROOT.GetCountry.GetLongName]的腹地，[target_location.GetName]发现的大量银矿，已引起了[ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]的注意。这些矿藏预示着巨大的财富，或将能有力提升[ROOT.GetCountry.GetNameWithNoTooltip]在欧洲大陆的金融地位。然而，开采这种贵金属却充满挑战，从矿井透水到塌方风险不一而足，需要大量的资金投入与熟练劳动力。"
 nor_resources_events.100.historical_info: "萨拉银矿的开采始于15世纪中叶，但直到16世纪初才引起王室的兴趣。矿工们于1511年圣诞节期间开始与斯瓦特·尼尔松·斯图雷谈判，并于1512年成功签署了皇家特许状。"
 nor_resources_events.100.a: "是我们的，也是[ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]的。"
 nor_resources_events.100.b: "我们不需要[ShowGoodsNameWithNoTooltip('silver')]。"
 land_owning_farmers_nor: "自耕农传统"
 land_owning_farmers_nor_desc: "[GetCountry('NOR').GetAdjective]和[GetCountry('SWE').GetAdjective]的农民相比其他[ShowContinentName('europe')]封建制农民拥有独特而稳固的地位。他们完全拥有自己的土地，直接向王室缴纳税收，并常在地方议会中拥有发言权，这赋予了他们一定程度的自治权和法律保护。这些农民并非农奴，许多人持有武器并作为征召兵。他们的权利来自古老的习惯法，其相对独立性是北欧乡村社会的基石。"
 odelsrett: "奥德尔法"
 odelsrett_desc: "奥德尔法在[GetCountry('SWE').GetName]亦被称为奥德尔权利，是一项古老的斯堪的纳维亚法律。该法规定，当一处农场待售时，任何家族成员依据长子继承原则，均享有优先购买土地的权利。即使农场已售予外人，原所有者的家族成员仍有权在特定期限内，以原购价格赎回土地。有观点认为，这项法律是[GetCountry('NOR').GetName]与[GetCountry('SWE').GetName]形成相对强大的农民阶层，并延续悠久农耕文化的部分原因。此项法律起源于维京时代，至今仍在[GetCountry('NOR').GetName]存续。"
 lappkodicillen: "拉普附录"
 lappkodicillen_desc: "萨米人生活在遥远的北方，历史上一直被挪威和瑞典人民忽视，有时甚至受到剥削。《拉普附录》是一份重要文件，正式确认了萨米人继续进行传统迁徙驯鹿放牧的权利，并包含了有关公民身份和税收的规定。"
 STATIC_MODIFIER_NAME_sami_meeting_grounds: "萨米议会"
 STATIC_MODIFIER_NAME_sami_meeting_grounds_2: "萨米议会"
