 haugeanism: "豪格主义"
 haugeanism_desc: "豪格主义是一种虔敬主义的宗教运动，它强调个人勤奋、进取、节俭、男女平等以及所有信徒皆为教士的理念。"
 kristiansand_fjord: "克里斯蒂安桑峡湾"
 nor_leidangskip: "莱当船"
 unlock_leidangskip_tt: "解锁莱当船"
 nor_resources_events.1.historical_info: "洛克恩矿以附近一处农庄命名，17世纪初那里首次发现了铜矿痕迹，当时是[GetCountry('NOR').GetName]最大的单一硫化铜矿来源。"
 nor_resources_events.2.c: "我们不需要任何一种。"
 nor_resources_events.2.historical_info: "“皇家莫杜姆蓝矿厂”是17世纪末由丹麦国王克里斯蒂安七世资助的钴矿，运营了大约一个世纪。钴主要用于生产瓷器所需的钴蓝色颜料以及被称为“熔炉”的蓝色钴玻璃。由于游戏中没有钴资源，因此用黏土代替。"
 nor_resources_events.4.historical_info: "耶姆特兰（挪威语：Jämtland）历史上曾有多处矿场，但真正具有开采价值的仅有弗勒奥矿和胡索矿。这两座矿藏的发现，主要归功于一位名叫安娜·拉尔斯多特的女子带来的铜矿样本。"
 nor_resources_events.4.c: "这根本不值得费那个劲。"
 nor_resources_events.5.historical_info: "哈德兰矿山已知最早的采矿活动可追溯至16世纪初。当时，在丹麦‑挪威联合王国统治下，国王克里斯蒂安三世派遣其官员汉斯·格拉斯尔巡查[GetCountry('NOR').GetName]南部地区，以收购、扩建或新建矿山。国王随后购入了哈德兰矿山，该矿在此后一直归王室所有，直至联合王国终结。17世纪后期，艾兹沃尔德的矿山也在此区域陆续开采。"
 nor_resources_events.6.historical_info: "铁矿石于1799年在敦德兰谷地首次被正式发现，但由于地处偏远山区，直到20世纪初人们才在该地区正式启动采矿作业。"
 nor_resources_events.6.c: "还是算了吧！"
 nor_resources_events.7.title: "矿业整合"
 nor_resources_events.7.desc: "随着新采矿技术的出现，[ShowLocationName('skien')]周边涌现了许多私人铁矿。其中最大的是弗里茨厄矿，但周边地区还有十几处其他矿场。为了提高效率，整合这些采矿业务或许是个好主意。"
 nor_resources_events.7.historical_info: "尽管该地区开设的许多铁矿并不一定对应希恩的具体位置，但出于游戏性考虑，韦斯特福尔和阿格德尔东部的各矿场已被归入希恩，因为弗里茨厄矿场是最重要的。"
 nor_resources_events.7.a: "一项值得付出的事业"
 nor_resources_events.7.b: "我们无需为此事费心。"
 nor_resources_events.8.title: "重开旧铜矿"
 nor_resources_events.8.desc: "位于[ShowLocationName('tynset')]的古老克维克内铜矿早已不复往日辉煌。虽然它比[ShowLocationName('roros')]那些利润更丰厚的矿场更早开采，但近年来多数矿工已另谋高就。不过，随着采矿技术的进步，只要我们愿意投资改造这座老矿，或许就能有效开采更深层的铜矿脉。"
 nor_resources_events.8.historical_info: "克维克内铜矿不仅是挪威历史上最古老的铜矿，有时也是规模最大的铜矿。然而，它后来却被利润更为丰厚的勒罗斯铜矿所超越。"
 nor_resources_events.8.a: "进行投资！"
 nor_resources_events.8.b: "邀请德意志矿工！"
 nor_resources_events.8.c: "罗罗斯矿场为我们提供了充足的资源。"
 nor_resources_events.9.title: "开局不利"
 nor_resources_events.9.desc: "过去几年里，[ROOT.GetCountry.GetLongName]曾尝试在贝鲁姆附近的[ShowLocationName('bragernes')]地区启动采矿和冶炼业务。初期成果相当令人失望，目前正讨论是否应完全放弃这一尝试。部分矿场和冶炼设施的经营者声称，只要获得更多资金支持，他们很快就能实现盈利。"
 nor_resources_events.9.historical_info: "17世纪初，在丹麦国王克里斯蒂安四世的推动下，该地区多个小型采矿和冶炼作业点进行了整合，但十年后便被废弃，并移交给了私人商人。这座矿山又经过了几十年才实现盈利。"
 nor_resources_events.9.a: "继续努力！"
 nor_resources_events.9.b: "邀请德意志矿工！"
 nor_resources_events.9.c: "是时候放弃了。"
 nor_resources_events.20.title: "萨米人的首都？"
 nor_resources_events.20.desc: "我们与北方萨米人日益友好的关系，以及随之而来的贸易与思想交流，使得[ShowLocationName('kautokeino')]逐渐成为萨米人的政治经济中心。每隔数年，游牧萨米人便会带着他们的驯鹿群聚集于此，进行内部及与外部世界的贸易，商讨政治事务、解决争端，同时了解外部世界的动态。在萨米长老、酋长及政治精英中，已有人提议将这一集会地正式确立为萨米人的“首都”，并由此在[Player.GetGovernment.GetParliament.GetName]中为他们争取一席之地。"
 nor_resources_events.20.a: "支持这项事业！"
 nor_resources_events.20.b: "目前的情况正合我们心意。"
 nor_resources_events.101.title: "在[ROOT.GetCountry.GetNameWithNoTooltip]的[ShowCultureNameWithNoTooltip('walloon')]"
 nor_resources_events.101.desc: "许多富有进取心的[ShowCultureName('walloon')]矿工和金属工匠正纷纷涌入[ROOT.GetCountry.GetName]。虽然他们奇特的外来习俗可能令一些人反感，但如此大量技艺精湛的工匠涌入，或许能重振我国的金属加工业。我们或许应当允许更多这些才华横溢的[ShowCultureNameWithNoTooltip('walloon')]人定居在我们的土地上。"
 nor_resources_events.101.historical_info: "1614年，瓦隆企业家路易斯·德海尔在瑞典设厂，着手开发瑞典北部的铁矿开采和铸造业。此前已有来自埃诺、布拉班特和卢森堡地区的瓦隆工匠为逃避失业潮而移居瑞典。大量金属加工大师和矿石精炼师的涌入，为该行业注入了活力，并大幅提升了钢铁质量——这在武器制造方面是一大优势。短短几十年间，瑞典便成为钢铁、大炮以及铜和铁的主要出口国。"
 nor_resources_events.101.a: "鼓励瓦隆移民！"
 nor_resources_events.101.b: "我们不感兴趣"
 nor_other_events.1.title: "诡计多端的主教"
 nor_other_events.1.desc: "主历1523年5月30日，奥拉夫·恩格尔布雷克特松神父当选为[GetCountry('NOR').GetName]第28任大主教。在这个宗教纷争不断、异端邪说横行的时代，奥拉夫大主教已证明自己是天主教信仰的坚定捍卫者。毋庸赘言，他的敌人绝不在少数。"
 nor_other_events.1.historical_info: "奥拉夫·恩格尔布雷克特松，出生于富裕地主家庭，后来成为[GetCountry('NOR').GetName]第28任也是最后一任大主教。在丹麦-挪威联盟早期，他既反对丹麦的影响，也抵制当时正在进行的宗教改革。1523年至1536年间，他实际上是挪威的领导者，因不信任丹麦国王弗雷德里克而拒绝为其加冕挪威王位，转而支持国王的侄子。然而，他试图让[GetCountry('NOR').GetName]摆脱丹麦束缚的努力最终失败，被迫流亡至哈布斯堡统治下的尼德兰。后世学者曾对他评价颇低，但现代历史学家对其持更为积极的看法。"
 nor_other_events.1.a: "尽管他是个异教徒，或许对我们仍有利用价值。"
 nor_other_events.1.b: "主啊，在这艰难时刻拯救我们吧！"
 nor_other_events.1.c: "这些土地上没有天主教的容身之地！"
 nor_other_events.2.title: "有前途的年轻人"
 nor_other_events.2.desc: "克里斯蒂安·马格努斯·法尔森，一位才华横溢的年轻法学家，经我们的一位顾问推荐，希望在政府中任职。他已证明自己学识渊博，并对启蒙思想有着深刻的理解。"
 nor_other_events.2.historical_info: "克里斯蒂安·马格努斯·法尔森是挪威的政治家、法学家和历史学家，他被认为是挪威宪法的主要起草者之一，常被称为“宪法之父”。"
 nor_other_events.2.a: "雇佣他。"
 nor_other_events.2.b: "有才华，但我们用不上他。"
 nor_other_events.3.title: "豪根运动"
 nor_other_events.3.desc: "一位名叫汉斯·尼尔森·豪根的平信徒近来引起了我们的注意。他被指控传播异端教义，与我们现行的宗教政策直接相悖。尽管屡遭逮捕和罚款，他及其追随者仍持续举行秘密聚会。我们的神职人员对这种公然无视基督真道的行径感到愤怒，然而豪格教义的信徒却声称他们的运动才是真正的信仰，强调所有信徒皆可为教士，并崇尚个人勤勉、进取和节俭等基督教美德。"
 nor_other_events.3.a: "也许我们应该听听这个人的话，他可能有道理。"
 nor_other_events.3.a.bt: "我们将解锁新的宗教派别——“豪格主义”。"
 nor_other_events.3.b: "这个疯子兼骗子，滚去牢房！"
 nor_other_events.10.title: "桀骜不驯的海军军官"
 nor_other_events.10.desc: "我方一名海军统帅[target_character.GetName]屡次与外国舰船发生冲突，并使我国陷入和睦邻友好国家直接交战的风险。[target_character.GetNameWithNoTooltip]坚称，其所有行动均符合[ROOT.GetCountry.GetAdjective]海军条令，并表示最近一次海上冲突是出于保卫国家的必要之举。他毫不掩饰地为自己的所作所为辩护，这种大胆的姿态令宫廷许多人钦佩，然而，也有人担忧，继续重用此人恐怕会损害我们传统的治军价值观。"
 nor_other_events.10.a: "无论如何，予以重用。"
 nor_other_events.10.b: "此人不足称道！"
 nor_other_events.11.title: "[target_artist.GetNameWithNoTooltip]"
 nor_other_events.11.desc: "在一次对[ShowLocationName('oslo')]的[ShowBuildingTypeName('theater')]访问中，我们的一位顾问发现了[target_artist.GetName]的卓越才华，并向我们极力推荐此人。[target_artist.GetNameWithNoTooltip]擅长讲述引人入胜的故事，他的作品融合了[ROOT.GetCountry.GetCulture.GetName]文化的本土传说，以及[ShowContinentName('europe')]各地的民间故事，展现出无与伦比的艺术魅力。若能获得我们的赞助，他便可全身心投入创作，为世人献上这些瑰丽的篇章。"
 nor_other_events.11.a: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip]文学的新时代即将开启！"
 nor_other_events.12.title: "德意志移民"
 nor_other_events.12.desc: "挪威的土地广阔，资源丰富，但大部分地区由于缺乏劳动力，尤其缺乏熟练工人。然而，[GetCountry('NOR').GetGovernment.GetRuler.GetName]提出了一种可能的解决方案。鉴于日耳曼地区的持续冲突，该地区的许多熟练矿工可以很容易地说服他们来到我们的土地上工作。"
 nor_other_events.12.historical_info: "17世纪之交，由于宗教迫害、战争和经济机遇的驱使，日耳曼人开始持续迁往当时处于丹麦统治下的[GetCountry('NOR').GetName]。这些工人主要来自萨克森区域，他们前往矿区求职，并带来了采矿专业技术。这些日耳曼移民对采矿业的深远影响一直延续到19世纪，当时德语已成为该行业的主要使用语言。"
 nor_other_events.12.a: "敞开大门！"
 nor_other_events.12.b: "算了，他们只会把麻烦带过来"
 nor_other_events.13.title: "建在沙上的城市"
 nor_other_events.13.desc: "在[ShowLocationName('oddernes')]，这个俗称“沙地”的村庄，因其沙质土壤而得名，长期以来一直被汉萨同盟的商人所忽视，他们更青睐[ShowLocationName('bergen')]和[ShowLocationName('oslo')]。然而，最近有报告称，从这个港出口到荷兰市场的鱼类和木材有所增加。其位于斯卡格拉克海峡的战略位置，以及适合建设港口的沙滩与河流，使其成为建立新集镇的理想战略地点。我们的顾问还指出，给这个集镇起一个新名字可能对我们有利。"
 nor_other_events.13.historical_info: "1641年，克里斯蒂安四世国王下令建立并以自己名字命名的克里斯蒂安镇正式成立。该地最初名为“桑登”，建镇之际，国王下令要求阿格德尔地区的众多商人迁往这座新兴城镇。"
 nor_other_events.13.a: "克里斯蒂安具有一种皇家气质"
 nor_other_events.13.b: "主持桑登的命名"
 nor_other_events.13.c: "当前名称可以接受。"
 nor_other_events.13.d: "我们对这项事业没有兴趣。"
 nor_other_events.14.title: "日耳曼码头"
 nor_other_events.14.desc: "汉萨同盟希望在卑尔根开设一个新的商站。"
 nor_other_events.14.a: "他们得到了我们的许可！"
 nor_other_events.14.b: "我们不需要外国人挤满我们的城镇。"
 nor_other_events.15.title: "卑尔根扩建"
 nor_other_events.15.desc: "位于卑尔根的汉萨同盟商站，被称为“日耳曼码头”，其盈利状况足以支持扩建卑尔根港口的计划，汉萨同盟亦有意为此项扩建提供资金支持。"
 nor_other_events.15.a: "太好了！"
 nor_other_events.30.title: "高尔达伦滑坡"
 nor_other_events.30.desc: "我们收到了关于[ShowLocationName('holtalen')]发生一系列可怕山体滑坡和洪水的报告。据收集到的信息，起初只是一场普通的山体滑坡，却恰好在河上形成了一个至少十几人高的堤坝。随后堤坝溃决，洪水席卷了整个区域，冲走了数百条生命，至少有45处农庄和数座教堂。"
 nor_other_events.30.a: "悲剧啊！"
 nor_other_events.31.title: "斯塔德上的飓风"
 nor_other_events.31.desc: "我们收到消息，[ShowLocationName('eid')]近海突发飓风，而且事发时正值当日航运最繁忙的时段。15艘满载乘客的船只已在海上失事，而尝试救援行动的风险实在太高。"
 nor_other_events.31.a: "我们只能清点损失，然后祈祷。"
 nor_other_events.32.title: "灾祸之夜"
 nor_other_events.32.desc: "[ShowLocationName('sunnmore')]传来了难过的消息。该地区的村庄接连遭遇雪崩袭击，虽然此类灾害通常伤亡不大，但这次恐怕是天降惩罚。已有超过百人遇难，许多人至今下落不明，救援人员正在全力搜寻。"
 nor_other_events.32.a: "我们只能祈祷了。"
 nor_other_events.33.title: "第一次吉亚斯林事故"
 nor_other_events.33.desc: "我们收到报告，在[ShowLocationName('orland')]海岸附近发生了一起悲惨事故。一场突如其来的旋风让当地渔民措手不及，尽管大部分渔船及时靠岸，但仍有数百人丧生。幸运的是，当地农民找到了这场旋风的可能元凶；一位名叫巴尔博·哈斯菲约德的当地妇女显然在施展某种巫术！"
 nor_other_events.33.a: "烧死她！"
 northern_union_war_event.1.title: "叙德雷姆叛乱"
 northern_union_war_event.1.desc: "叛乱的开始是一个没有流血的事件。毕竟，联合并不是占领，[GetCountry('NOR').GetLongName]仍然名义上是独立的，除了驻扎在王宫的皇家卫队外，几乎没有瑞典士兵。唯一需要做的就是驱逐国内少数瑞典官员，并占领奥斯陆的王宫。但无论是否流血，打破联合仍然是对[GetCountry('SWE').GetGovernment.GetRuler.GetName]的公然侵略和侮辱，这几乎没有和平结束的希望。"
 northern_union_war_event.1.a: "我们只能等待瑞典采取行动"
 northern_union_war_event.2.title: "瑞典的回应"
 northern_union_war_event.2.desc: "不出所料，尽管统治者无能，但瑞典人并未在此等挑战面前退缩。从斯德哥尔摩派来的外交官带来了正式宣战书——并非针对[GetCountry('NOR').GetName]，而是针对他们口中叛国的苏德雷姆家族，战争的时候到了。"
 northern_union_war_event.2.a: "拿起武器！"
 northern_union_war_event.3.title: "挪威胜利！"
 northern_union_war_event.3.desc: "随着对[GetCountry('SWE').GetName]的胜利，挪威再次独立，并由挪威人治理。"
 northern_union_war_event.3.a: "毫无疑问，一个新的挪威黄金时代已经到来！"
 northern_union_war_event.4.title: "瑞典胜利"
 northern_union_war_event.4.desc: "叛乱已被镇压，[GetCountry('SWE').GetName]与[GetCountry('NOR').GetName]之间的联盟关系得以再度巩固。"
 northern_union_war_event.4.a: "第二次就成功。"
 northern_union_war_event.5.title: "继承问题"
 northern_union_war_event.5.desc: "尽管反抗[GetCountry('SWE').GetName]的起义由苏德雷姆家族领导，但其宣称权源自阿涅丝·哈康斯多塔对王位的继承。虽然这种做法极不寻常，但或许为了巩固这一宣称，我们可以更进一步——不仅承认其合法性，更直接宣称自身源自斯韦雷家族？此举可能会引起苏德雷姆家族剩余成员及其友好贵族的不满，但这确实不失为一种选择。"
 northern_union_war_event.5.a: "我们是斯韦雷国王的直系后裔！"
 northern_union_war_event.5.b: "经过内斗，如今苏德雷姆执掌大权！"
 northern_union_war_event.20.title: "瑞典人的同情心暴露无遗"
 northern_union_war_event.20.desc: "我们的间谍已经揭露了一个支持瑞典的阴谋中的关键人物，这个阴谋是针对[target_character_2.GetName]的。叛徒[target_character_1.GetName]一直在暗中破坏我们的统治，但现在[target_character_1.GetHerHis]的命运掌握在我们手中。我们是要严惩[target_character_1.GetHerHim]以儆效尤，还是宽大处理？"
 northern_union_war_event.20.a: "处决[target_character_1.GetHerHim]！"
 northern_union_war_event.20.b: "饶[target_character_1.GetHerHis]一命。"
 target_character_1_flees_swe: "[target_character_1.GetSheHe|U]逃往[GetCountry('SWE').GetLongName]"
 northern_union_war_event.21.title: "不满的农民阶层"
 northern_union_war_event.21.desc: "人们常说，战争中最受苦的往往是平民百姓，而平民百姓对此也心知肚明。因此当战事初起时，民间远未像贵族阶层那样欢欣鼓舞。这种不满情绪已逐渐演变为公开的怨愤，我们收到建议应在事态失控前妥善处理这一问题。"
 northern_union_war_event.21.a: "农民和渔民的看法与我们无关。"
 northern_union_war_event.21.b: "支付村庄节庆活动的组织费用"
 northern_union_war_event.22.title: "贵族要求特权"
 northern_union_war_event.22.desc: "世间万物皆有代价，推翻君主与发动战争尤其如此。苏德雷姆家族是[GetCountry('NOR').GetLongName]贵族中的一员，正是凭借世代积累的人脉，我们才得以说服贵族阶层支持我们争夺王位。然而，目前许多贵族正表达不满，认为我们未对其付出给予足够回报。或许我们可以利用这种情绪，通过授予他们宫廷要职来为战争争取更多资金？"
 northern_union_war_event.22.a: "很好。"
 northern_union_war_event.22.b: "一位公正的国王难道不就是最好的奖赏吗？"
 northern_union_war_event.23.title: "贸易中断"
 northern_union_war_event.23.desc: "[GetCountry('NOR').GetLongName]与[GetCountry('SWE').GetLongName]之间战争的爆发，导致波罗的海地区的贸易严重放缓。青壮年劳动力应征入伍，当局的注意力从经济事务上转移，商人们则为他们运输货物的安全而忧心忡忡。"
 northern_union_war_event.23.a: "懦夫！"
 northern_union_war_event.24.title: "教士不满"
 northern_union_war_event.24.desc: "教士开始表达不满，他们认为这场信徒间的战争毫无必要，不仅浪费虔诚基督徒的生命，更消耗了本可用于侍奉信仰的资源。部分顾问建议以神的名义投资公共工程来安抚他们。"
 northern_union_war_event.24.a: "修建一座大教堂，以彰显我们的虔诚。"
 northern_union_war_event.24.b: "修建一座新的修道院或许能让他们满意。"
 northern_union_war_event.24.c: "这并非教士需要关心的事务。"
 northern_union_war_event.100.title: "苏德雷姆宣称"
 northern_union_war_event.100.desc: "当国王马格努斯七世继承[GetCountry('NOR').GetLongName]王位时，其合法性源于他的母亲——[GetCountry('SWE').GetLongName]公主兼前摄政阿涅丝·哈康斯多塔。然而，阿涅丝还有一位姐姐艾格尼丝·哈康斯多特，她是[GetCountry('NOR').GetName]前国王哈康五世虽非婚生但获承认的女儿。艾格尼丝后来嫁入苏德雷姆家族的哈夫托雷，并育有两子——约恩与西居尔·哈夫托雷松。尽管王室存在其他宣称者并非罕见，但我们获得情报显示，许多挪威贵族对这位被他们视为无能的外国统治者深感不满，更渴望拥立一位本土挪威君主。而艾格尼丝之子似乎正与这些势力密切接触，积极密谋动摇我们的统治。"
 northern_union_war_event.100.b.bt: "这可能导致苏德雷姆宗族发起叛乱。"
 northern_union_war_event.100.a: "他们终将徒劳无功。"
 northern_union_war_event.100.b: "没收这些叛国贵族的财产！"
 northern_union_war_event.101.title: "叛乱的低语"
 northern_union_war_event.101.desc: "[GetCountry('NOR').GetLongName]正处于危险的躁动中。乡民们痛斥[GetCountry('SWE').GetGovernment.GetRuler.GetName]的无能。瑞典官员及其同情者遭到公然的蔑视。贵族们正在备战。毫无疑问，这一切的背后是哈夫托兄弟在操控。除非采取行动，否则挪威人民无疑将爆发公开叛乱，这可能会终结与瑞典之间短暂的联合。"
 northern_union_war_event.101.a: "没有贵族的支持，叛乱难以成功。收买他们！"
 northern_union_war_event.101.b: "他们能这么做吗？"
 northern_union_war_event.101.b.bt: "挪威人民准备起义"
