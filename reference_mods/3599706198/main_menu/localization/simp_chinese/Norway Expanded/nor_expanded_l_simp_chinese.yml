 adeler_dynasty: "阿德勒尔"
 sca_leidang: "莱当制"
 sca_leidang_desc: "“莱当”是一种北欧征兵传统，通过征召组建沿海舰队，用于季节性出征和王国防卫。"
 bordsratt: "博尔兹拉特法"
 bordsratt_desc: "博尔兹拉特法在[GetCountry('NOR').GetName]亦被称为奥德尔法，是一项古老的斯堪的纳维亚法律。该法规定，当一处农场待售时，任何家族成员依据长子继承原则，均享有优先购买土地的权利。即使农场已售予外人，原所有者的家族成员仍有权在特定期限内，以原购价格赎回土地。有观点认为，这项法律是[GetCountry('NOR').GetName]与[GetCountry('SWE').GetName]形成相对强大的农民阶层，并延续悠久农耕文化的部分原因。此项法律起源于维京时代，至今仍在[GetCountry('NOR').GetName]存续。"
 riksradet: "王国议会"
 riksradet_desc: "王国议会是由贵族、教士及内阁重臣组成的议事机构，其职责在于处理国家政务并与国王共同治理国家。王国议会的权力与影响力随时代变迁而起伏，因此其职责范围也常随之扩展，例如从王室成员中选举国王，或确保国王遵循王国法律行事。"
 rigsradet: "丹麦国事院"
 rigsradet_desc: "丹麦国事院，或称国家议会，是由贵族、神职人员及内阁重臣组成的议事机构，其职责在于协同国王治理国家事务。王国议会的权力与影响力随时间起伏，因此常被赋予额外职能，例如从王室成员中推选国王，或确保国王遵循王国律法行事。"
 STATIC_MODIFIER_NAME_marselis_brothers: "马塞利斯兄弟"
 name_vidkunsson: "维德孔松"
 name_erling: "埃林"
 name_selius: "塞利乌斯"
 bjarkoy_dynasty: "比亚克"
 nor_other_events.4.title: "马塞利斯兄弟"
 nor_other_events.4.desc: "随着与低地国家贸易的繁荣，越来越多雄心勃勃的商人进入我们的领土。其中包括马塞利斯兄弟——塞利乌斯和加布里埃尔，这两位富有的商人已在新兴的[ShowLocationName('oddernes')]集镇站稳脚跟。他们最近提出了一项诱人的提议：提供一笔可观的贷款和优厚的合同，以换取一系列特殊特权。"
 nor_other_events.4.a: "当然！"
 nor_other_events.4.b: "他们的提议不符合我们的利益。"