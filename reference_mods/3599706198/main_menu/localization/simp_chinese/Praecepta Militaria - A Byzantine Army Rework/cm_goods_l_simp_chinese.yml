 military_focus: "军事"
 civilian_focus: "民政"
 military_vs_civilian: "军事权威VS文官政权"
 military_vs_civilian_desc: "军事权威强大的国家可在战争期间获得加成，而文官政权强大的国家则能提升行政效率。"
 pmcm_rural_magistrate: "乡间司法署"
 pmcm_rural_magistrate_desc: "乡官是派往各省的乡村官员，与均平监督一同确保小规模法律纠纷得到公正解决。根据其职责，他们的司法权仅限于乡村而非城市，通常在农村村庄设有半常设办公点，并在执行任务期间派驻当地。"
 pmcm_archon_office: "乡村法庭"
 pmcm_archon_office_desc: "乡村法庭是派驻在农村军区的法官之常设机构。随着帝国试图通过《农业法》来规范农村法律，乡村法官逐渐成为帝国各地更为常见的常设职位。"
 pmcm_praetor_office: "总督宫"
 pmcm_praetor_office_desc: "在14世纪的拜占庭省份，总督宫是帝国主权的实体象征。虽然这个术语起源于罗马将军的营帐，但到了巴列奥略王朝时期，它已成为地区总督或行政长官的主要行政中心和法院所在地。\n\n在小城镇和偏远乡村地区，总督宫是唯一能让《帝国法典》凌驾于地方习俗之上的场所。它既是地契的中央登记处，也是处理乡村长老无权裁决的民事纠纷的高级法庭。"
 pm_city_hall: "机要秘阁"
 pm_city_hall_desc: "巴列奥略时代，什长已成为城区的主要调解者。他们是帝国律法在街头的体现，在城市事务中扮演着主要调解人的角色。\n\n与高级别的行政长官不同，什长处理城市生活的细枝末节：建筑违规、轻微盗窃以及公共基础设施维护。在接待请愿者时，什长常在城镇宅邸或机要秘阁内开设法庭。"
 pm_genikon: "总务机关"
 pm_genikon_desc: "总务机关（或称总务秘阁）是拜占庭帝国的中央财政机构与最高税务部门。在总务文房尚书的主持下，它作为帝国官僚体系的核心引擎，负责核算、评估并征收土地税——这一维系国家命脉的财政支柱。"
 byz_magistrate_advance: "地方法官"
 byz_magistrate_advance_desc: "法律守护者代表着《农业法》在乡村层面的传统执行力量。在这一早期阶段，帝国治安官被视为基层官员，其主要职责是调解农民之间的地界纠纷与牲畜盗窃案件。"
 byz_archon_advance: "军区法庭"
 byz_archon_advance_desc: "随着帝国官僚机构的行政范围扩大，地方法官被授权成为行省总督的正式代表。军区法庭作为常设机构，为巡回于各农村军区的法官提供办公场所。"
 byz_praetor_advance: "大公长法庭"
 byz_praetor_advance_desc: "为了重现14世纪安德罗尼卡三世改革鼎盛时期的荣光，帝国宫廷致力于推行“罗马人全境大法官”制度。这使得精英法官被授予了最高权力，足以否决腐败的地方官员与军务将领的裁决。"
 byz_city_hall_advance: "城市长官的机要秘阁"
 byz_city_hall_advance_desc: "随着城镇发展成为区域中心，机要秘阁成为城市长官的正式行政机构，其主要职责是管理税收并裁决《城市长官法典》的执行。"
 byz_genikon_advance: "土地总登记簿"
 byz_genikon_advance_desc: "总务机关的主要职能是维护土地总登记簿，即帝国境内所有应税土地的庞大总登记册。每隔几年，该机构的官员便会进行勘测，重新评估边界及农村阶层的生产力。"
 byz_vassal_control_advance: "薪俸审计"
 byz_vassal_control_advance_desc: "虽然总务机关本质上是一个财政部门，但它对于管理 14 世纪帝国所依赖的附庸国（如伊庇鲁斯专制国或各类拉丁残余政权）至关重要。\n\n值得注意的是，该部门负责管理支付给外国领袖或附庸的年金薪酬。通过掌控这些账目，总务文房尚书能够确保附庸国的贡金已足额缴纳，并根据其领地产出情况对金额进行调整。"
 pmcm_clerk_oversight: "总务处"
 pmcm_clerk_oversight_desc: "总务文房尚书负责管理帝国的主要财政与司法档案，确保君权旨意得以精准执行。"
 pmcm_clerk_treasurers: "改革黄金税吏"
 pmcm_clerk_treasurers_desc: "通过授予衣库登录书记对公共国库黄金的监管权，国家能更有效地追踪和征收各类财政收入。"
 pmcm_clerk_postal_network: "驰道邮驿网络"
 pmcm_clerk_postal_network_desc: "驰道文房尚书负责监管帝国邮政与情报系统，确保首都与各省份之间的通信更为迅捷。"
 pmcm_clerk_meritocracy: "官僚精英制"
 pmcm_clerk_meritocracy_desc: "建立严格的行政晋升标准，减少了对裙带关系和世袭头衔的依赖。我们废除了旧制度，该制度曾过度偏袒世袭地位与普遍腐败，却以牺牲真才实学为代价。"
 pmcm_clerk_legal_standards: "标准化法官"
 pmcm_clerk_legal_standards_desc: "在拜占庭帝国，尤其是11至14世纪期间，法官是负责司法的官员，通常兼具司法、行政与财政职责。\n\n许多法官选自君士坦丁堡受过教育的官僚家族，而非地方军事贵族，这确保了他们成为职业法学家，而非仅仅是军事指挥官。这些官员的任命政策从军事监督逐渐演变为中央集权的专业文官体系，旨在保障法律专业能力及对皇帝的忠诚。"
 pmcm_clerk_mines: "金板随行总管"
 pmcm_clerk_mines_desc: "作为旧时伊利里亚矿务官的继任者，该职位负责监管矿物开采（尤其是金锭），并且经常坐在总务文房尚书的右边。"
 pmcm_clerk_herd: "牧群文房尚书"
 pmcm_clerk_herd_desc: "指派专业管理人员负责王室牲畜与农业资产的管理，可提升乡村物资的产出。"
 pmcm_clerk_admiralty: "舰船文房尚书"
 pmcm_clerk_admiralty_desc: "通过授予掌玺大臣对海军造船厂和水手登记册的管辖权，中央官僚机构确保了德罗蒙战舰与海上补给线的战备状态。"
 pmcm_clerk_workshops: "贸易主管"
 pmcm_clerk_workshops_desc: "负责生产丝绸、香料等精美商品的商会管理权，将委托给受文房书吏等高级官僚，确保国家对最珍贵奢侈品保持绝对垄断。"
 pmcm_clerk_army_oversight: "军事尚书文房"
 pmcm_clerk_army_oversight_desc: "集中支付士兵薪饷并审计各省军区部队，减少了地方指挥官的腐败现象，确保了他们对皇帝的忠诚。"
 pmcm_clerk_orphanges: "孤儿院长"
 pmcm_clerk_orphanges_desc: "国家官僚机构接管了慈善思潮的管理以及“国家之子”的教育，从而建立起一条忠于宫廷的文官输送渠道。"
 pmcm_clerk_state_auditors: "秘阁稽核"
 pmcm_clerk_state_auditors_desc: "授予高级文房书吏审计所有政府机要秘阁的权力，确保堵塞地方税收漏洞，并将财富重新引回首都。"
 pmcm_clerk_secretariat: "头等秘阁部属呈文"
 pmcm_clerk_secretariat_desc: "头等秘阁部属负责掌管呈递给皇帝的呈文，使官僚体系能够优先处理国家利害，而非私人的贵族纠纷。"
 pmcm_clerk_foreign_ministry: "驰道尚书官署"
 pmcm_clerk_foreign_ministry_desc: "驰道文房尚书实际上充当着外交尚书的角色，负责接见外邦使节，并主持繁复的礼宾仪轨，以确保各藩属国对巴西琉斯心怀敬畏。"
 pmcm_clerk_petitions: "请愿协议"
 pmcm_clerk_petitions_desc: "通过将帝国请愿程序正式化，官僚体系确保附庸必须通过复杂的法律框架来请求自治，从而有效延缓了分离主义情绪。"
 pmcm_clerk_xenia: "宣赐发放"
 pmcm_clerk_xenia_desc: "拜占庭的文房书吏负责管理赠予邻国“蛮族”或边境国家的客礼与补贴，通过经济手段确保这些国家的顺从。"
 pmcm_land_grants: "军役地产"
 pmcm_land_grants_desc: "拜占庭士兵常被授予在军区内的土地进行耕种。这种土地通常是世袭的；父亲会将土地传给儿子，而儿子也需继承服兵役的义务。这些地产被称为“军役地产”。"
 pmcm_border_charters: "边防军地产"
 pmcm_border_charters_desc: "与更广泛的军区制类似，边防军通常是亦农亦兵的战士或小土地持有者。他们通过向帝国提供忠诚服务来换取土地，这意味着他们通常居住在自己守护的土地上。\n\n随着中央政府转向更专业化、中央化的军队，而非依赖地方民兵，这一制度开始面临问题。到了13世纪，在经历多次叛乱（例如1262年反对米海尔八世·帕里奥洛加斯的起义）后，边防军单位被并入正规军，从而失去了免税特权，导致他们的土地所有权逐渐被侵蚀。"
 pmcm_tax_rights: "授予监领（普罗尼亚）"
 pmcm_tax_rights_desc: "军区士兵通常免缴某些个人税，并且对其与兵役义务绑定的土地享有免税或减税待遇，这种制度被称为“军役地产制”。\n\n帝国后期，士兵（或军官）会被授予监领——即从特定土地区域征税的权利，以此作为他们军役的报酬。"
 pmcm_hereditary_ranks: "世袭服役"
 pmcm_hereditary_ranks_desc: "在戴克里先统治期间的某个时期，军役开始变为世袭制，士兵和退伍军人的儿子们必须继承父业。\n\n随着时间的推移，富裕家族往往能够将获得的军衔传给子孙和亲属，这导致了军区士兵的质量和训练度逐渐下降。"
 pmcm_veteran_satisfaction: "老兵定居点"
 pmcm_veteran_satisfaction_desc: "拜占庭政策承袭罗马传统，将退役士兵安置在新征服或边疆领土（特别是小亚细亚的军区），以建立忠诚且自给自足的军事精英阶层。\n\n退伍军人被授予土地，条件是世袭兵役，由此形成了\"兵农合一\"的阶层。他们负责地方防御、管理行政事务，并减少了对昂贵常备军的需求。"
 pmcm_soldiers_pensions: "边疆军养老金"
 pmcm_soldiers_pensions_desc: "退役的军事阶层成员会获得定期津贴，作为对其多年服役的奖赏。若他们选择迁往边疆定居，这份津贴可能格外优厚。\n\n这使得他们即便因年迈或伤病无法从事专业工作，也能生活无忧，同时有更多闲暇时间参与国家事务与政治活动。"
 pmcm_soldiers_expanded_fortifications: "督军"
 pmcm_soldiers_expanded_fortifications_desc: "随着领地建立起一支专业的常备军，其境内的防御工事与要塞均得到妥善维护与充足资金支持——扩大的军事存在不仅提升了军队阶层在公众心目中的权威，更实质性地增强了其力量的投射能力。"
 pmcm_soldiers_expanded_military_autonomy: "扩大的军事自治权"
 pmcm_soldiers_expanded_military_autonomy_desc: "职业军人阶层日益独立自主。尽管仍处于统治者的管辖之下，他们却拥有独立的内部司法体系和指挥架构。虽然这在名义上是为了提高效率并受到军队成员的欢迎，但也导致士兵们越发难以管束——如今他们的违纪行为往往面临更少的惩处。"
 pmcm_soldiers_elevated_legal_status: "提升法律地位"
 pmcm_soldiers_elevated_legal_status_desc: "在我们社会中最重要的角色莫过于士兵，毕竟，当敌人兵临城下时，其他任何职业又有什么意义呢？正因如此，军队在领地各阶层中享有特殊的法律权利与地位。"
 pmcm_soldiers_rural_settlement: "鼓励军区制"
 pmcm_soldiers_rural_settlement_desc: "通过在领地内较为偏远和未开发的土地上优先建立专门的军事存在，更多民众受到鼓舞，前往边疆地区寻求机遇。"
 pmcm_soldiers_quartering_of_troops: "地方驻军"
 pmcm_soldiers_quartering_of_troops_desc: "根据法律规定，领地的地方当局必须为所在地区的军事人员提供住所和食物。尽管这项政策在当地民众中极不受欢迎，但它大大降低了维持军队的成本。"
 pmcm_soldiers_intense_drilling: "密集操练"
 pmcm_soldiers_intense_drilling_desc: "军队致力于对士兵进行高强度训练，以提升军事战斗力，确保他们时刻为冲突做好充分准备。"
 pmcm_soldiers_slackened_recruiting_standards: "放宽征兵标准"
 pmcm_soldiers_slackened_recruiting_standards_desc: "军队征兵机构如今奉行“重数量、轻质量”的方针，训练时长也被大幅缩短，以加快士兵和海军兵力的快速部署。"