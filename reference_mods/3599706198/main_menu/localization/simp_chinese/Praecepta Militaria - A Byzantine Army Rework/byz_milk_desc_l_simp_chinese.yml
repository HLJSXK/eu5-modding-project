l_simp_chinese:
 byz_varangian_gunners_early_desc: "虽然火药本身很早就被宫廷炼金术士所知晓，但其有组织的军事应用却是在巴列奥略王朝晚期的复兴期间才出现。尽管这些早期的火器很粗糙、容易走火，且操作人员和对手一样容易受到惊吓；但希腊人的聪明才智和从东方借来的秘密技术已经取得了成果。现在，这些火器被发放给最精锐的部队——基尼戈伊（Kynigoi），当代的报道描述了这种雷鸣般的装置在争夺边境的小规模冲突中造成了足够的混乱和破坏，使帝国不仅仅获得了一种短暂的战术新奇。"
 byz_palatine_grenadiers_desc: "“宫廷掷弹兵”，是拜占庭帝国近卫军的精锐军团。他们通常作为列线步兵团的侧翼连队部署，或为重大战役组成专门的突击营集中使用。\n\n作为突击部队，他们被部署用于在火力下带头冲击设防阵地、执行突破任务和推进。他们为主战线提供优质、纪律严明的火力，其定义特征与其说是使用手掷爆炸物（这在当时已基本不再普遍使用），不如说其作为皇帝麾下体型最魁梧、最健壮、最可靠的突击部队的地位。"
 byz_infantry_crossbowmen: "负弩者"
 pm_limes_late_desc: "此术语大致意为“伟大边疆”，它指由城墙、防御壕沟、要塞哨所与瞭望塔构成的一系列令人印象深刻的线性防御工事，明显是在致敬哈德良长城与安东尼长城等更古老的罗马工程。尽管在火炮与爆炸性弹药的时代其效能已大打折扣，但这些工事仍能有效威慑流寇与匪盗。若将其与更坚固的城防工事及专用棱堡相连，这些相互交织的障碍，将为企图在帝国疆域内自由机动的敌军带来不小的麻烦"
 byz_military_warehouse_advance_desc: "拜占庭的军事仓库，被称为 “阿波泰凯” ，是至关重要的国有仓储设施，用于装备士兵，储备从武器盔甲到食物，以及骡马、车辆、帐篷等后勤物资的一切军需。\n\n它们被视为关键的基础设施，构成了庞大而有组织的拜占庭军事体系的核心节点。帝国军队正是依赖这些中央仓库的储备，结合地方的贡献与私人补给，才得以维持运转。"