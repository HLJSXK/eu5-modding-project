l_simp_chinese:
 byz_tagmata_advance: "巴列奥略皇家近卫军"
 byz_tagmata_advance_desc: "拜占庭帝国鼎盛时期能够集结数千名精锐重骑兵，但在巴列奥略王朝统治下，其规模还是战斗力上都大幅缩减，更多的是担任礼仪性角色，如今雇佣兵和旧部队残余组成但近卫军仍然体现了拜占庭曾经引以为豪的军事传统。"
 byz_reform_tagmata_advance: "现代近卫军"
 byz_reform_tagmata_advance_desc: "随着拜占庭军队全面推行改革，近卫军已经重铸荣光，成为帝国的核心精锐。"
 byz_kastron_advance: "总督堡区建筑"
 byz_kastron_advance_desc: "拜占庭城堡具有多样功能，如军事基地、行政中心和避难所。它们经常与地形融为一体，并随着时间的推移演变成复杂的防御系统。"
 byz_despotates_advance: "专制要塞建筑"
 byz_despotates_advance_desc: "与君士坦丁堡这类庞大城市要塞不同，专制要塞是结构复杂的建筑群，既是地方皇权的象征，也是能够抵御新式攻城技术的防御设施。"
 byz_burgi_advance: "边哨"
 byz_burgi_advance_desc: "帝国依靠由地方部队驻守的小型哨所来控制乡野后方、守卫边疆。这些哨所的主要用途在于防范当地盗匪、保护重要通道，而非抵御装备精良的军队。尽管如此，它们的存在仍在一定程度上确保了帝国的影响力能够覆盖至最偏远的地点。"
 byz_thema_advance: "军务总枢制度"
 byz_thema_advance_desc: "现代组织的发展已经使军区的基层结构过时。帝国决定以更高效的行政与后勤机制取而代之。"
 byz_greek_fire: "希腊火"
 byz_greek_fire_desc: "“希腊火”是拜占庭帝国自公元7世纪至14世纪使用的一种燃烧武器系统。其配方曾是国家机密，历史学家对其成分有不同推测，或认为基于硝石、硫磺，或认为基于生石灰。但现代学界普遍认为其主要成分为石油与树脂的混合物，成分与现代凝固汽油相似。\n\n陆战时该武器多用于攻防战，在围城战中尤为常见。在海上，拜占庭水兵常将装填希腊火的燃烧弹投向敌舰，或通过管状装置喷射火焰。因其具备水面持续燃烧的特性，这种海战燃烧武器威力巨大，当时各方势力曾试图仿制均未成功。"
 byz_greek_fire_advance: "火屁股"
 byz_greek_fire_advance_desc: "作为现代帝国陆军核心突击部队建制已达数十年之久，指挥携带希腊火的“喷火器营”的将军们已将战术锤炼至极致，既致命又骇人。这些被戏称为“火屁股”的士兵，终究在战场上赢得了令人胆寒的地位。"
 byz_reformed_varangians_advance: "贴身卫队"
 byz_reformed_varangians_advance_desc: "形成于古老的瓦兰吉卫队重装化后。尽管仍沿用传统瓦兰吉编制模式，但其成员已融合外籍战士与本土希腊精英。"
 byz_varangian_gunners_early_advance: "帝国猎手"
 byz_varangian_gunners_early_advance_desc: "选自拜占庭宫廷卫队中的精锐步兵，配备希腊火绳枪与燧发步枪。因其尚武传统，他们不畏惧与敌军展开残酷的白刃战。"
 byz_varangian_gunners_late_advance: "值宿守卫"
 byz_varangian_gunners_late_advance_desc: "值宿守卫是拜占庭帝国卫队中最为精锐的卫队。只有帝国训练最精良、战力最出众的士兵才有资格加入值宿守卫。这些战士配备火枪与战斧，不仅是战场上的恐怖存在，还能高效承担多种作战与后勤职能，使其能在常规补给线之外进行长期作战。"
 byz_immortal_guard_advance: "不朽者"
 byz_immortal_guard_advance_desc: "不朽者是拜占庭帝国最老练强悍的精锐部队。他们配备现代火枪与战斧，足以与最顶尖的军团正面抗衡。这些战士常以迎着枪林弹雨冲锋陷阵，还能在绝境中发起突袭，令对手措手不及。"
 byz_expand_varangians_advance: "瓦兰吉新军"
 byz_expand_varangians_advance_desc: "数个世纪以来，最精锐的瓦兰吉卫队一直优先接纳外族战士，这很大程度上牺牲了以希腊人为主的士兵群体。随着帝国卫队的持续现代化，我们已着手通过允许任何有功绩的帝国公民证明自己配得上该军团辉煌历史的方式，来扩充瓦兰吉卫队的规模。"
 byz_reorganize_varangians_advance: "重组卫队"
 byz_reorganize_varangians_advance_desc: "为规范瓦兰吉部队在帝国近卫军中的编制，其战场职能与指挥权限均得以扩展。兵团规模日益壮大，敌军畏惧也随之增加。"
 byz_integrate_varangians_advance: "整合卫队"
 byz_integrate_varangians_advance_desc: "拜占庭帝国卫队的精锐军团在战场上既无处不在，战功卓著。通过采用现代化的组织与后勤结构，卫队得以在多个战线同时展现其存在。"
 byz_expand_tagmata_advance: "拜占庭标准化"
 byz_expand_tagmata_advance_desc: "随着拜占庭军区作战规模的扩大，其行政、装备与后勤体系的改进催生了更为统一化的组织架构。"
 byz_reorganize_tagmata_advance: "标准化军团"
 byz_reorganize_tagmata_advance_desc: "火器的普及以及长矛火枪混合阵型等新型合成战术的有效性，预示着高度结构化、常设性、专业化的军事单位，以及健全的指挥体系与职业军官团的出现。面对这些紧迫的军事发展，拜占庭军区的编制被迫演进，如今已能部署自查士丁尼时代以来前所未见的大规模精锐部队。"
 byz_integrate_tagmata_advance: "瓦兰吉旅"
 byz_integrate_tagmata_advance_desc: "随着拜占庭军官体系日益专业化——形成从军士到将军的明确等级制度，瓦兰吉卫队的组织架构也同步完善。这些精锐部队如今已经完全融入帝国军队体系，因而能够以大型全职业化旅团的建制开展线性战争。"
 byz_athanatoi_advance: "首领子弟枪骑兵"
 byz_athanatoi_advance_desc: "这些精锐骑兵虽为适应不利地形而卸除部分层压板甲以提升速度与机动性，却仍代表着古典重骑兵传统的巅峰，同时也在积极顺应现代战场条件推动骑兵战术的与时俱进。"
 byz_mounted_dragoons_advance: "希佩斯骑兵"
 byz_mounted_dragoons_advance_desc: "这些拜占庭骑兵既装备长矛也配备了火绳枪，同时卸下了旧式甲胄骑兵的重甲。他们本身就是新旧军事思想、东西方技术与传统的奇特融合。"
 pm_militant_religion: "军事交响论"
 pm_militant_religion_desc: "交响论是东正教神学与政治思想中的一种规范性理论或概念，尤其盛行于东罗马帝国和俄罗斯帝国，主张教会与国家应相互补充，彼此尊重，任何一方都不应企图主导另一方。\n\n然而，随着君士坦丁堡屡遭外敌洗劫、圣索菲亚大教堂被亵渎等生存危机接踵而至，一种新的神学观点应运而生——在这种视角下，军队与国家必须相互扶持才能存续。"
 orthodox_crusader_advance: "神罚敕令"
 orthodox_crusader_advance_desc: "历经数代的屈辱与伤害，是上帝的正义让我们将这些榨干我们土地、迫害我们同胞之人推向毁灭。"
 byz_soldier_estates_increase1: "延长租约"
 byz_soldier_estates_increase2: "边防军补助"
 byz_soldier_estates_increase1_desc: "拜占庭军区土地授予制度与传统封建组织的一个关键区别在于所有权归属。国家并未将土地所有权转移给土地持有者，而是以服军役为条件将土地租赁给他们，这与西欧封建制度下封地常由封臣持有并世袭有着显著差异。"
 byz_soldier_estates_increase3: "扩展法典"
 byz_soldier_estates_increase3_desc: "拜占庭财政官名册上所列的名字通常至关重要，因为它还决定了哪些人有权基于家族贡献（而非个人功绩）获得国家授予的田产。当然，有些总督和皇帝会作出慷慨承诺，为军区土地承租者减免义务，甚至将额外地产赐予未服役的家族成员，以换取他们的忠诚。"
 byz_peasant_laws_advance: "农民法"
 byz_peasant_laws_advance_desc: "拜占庭帝国通过推广自由农耕和土地改革，直接扶持农民，以确保稳定的农业基础和可靠的税收收入。然而，随着时间的推移，帝国的支持方向发生了转变，逐渐从支持自由农转向支持大庄园制度，尤其是在拜占庭帝国晚期。"
 pm_religious_justification: "正统训令"
 pm_religious_justification_desc: "没有人比巴西琉斯更清楚宗教圣徒传记能在争夺民心的外交斗争中提供多大助力。牧首区不仅在我们境内具有影响力，在仍受异教徒统治的信徒聚居地也同样如此——那些地区的人心可能被煽动起来支持我们的事业，或将我们的真实意图传播到海外。"
 byz_justinian_code: "查士丁尼法典"
 byz_justinian_code_desc: "《查士丁尼法典》是拜占庭皇帝查士丁尼下令编纂的罗马法汇编。作为《民法大全》的重要组成部分，该法典通过消除矛盾与冲突，对延续数百年的罗马成文法进行了体系化梳理。它对欧洲法律发展产生了深远影响，在系统化整理与保存罗马法方面具有重大意义。"
 byz_de_re_strategica: "论战略"
 byz_de_re_strategica_desc: "叙利亚军事家马吉斯特罗的纲要首部《论战略》成书于七世纪，随后三百年间被众多拜占庭军略引用。全书涵盖陆战领域，包括筑垒据点的构建与防御、野战行动、作战战术、武器装备及军事训练等内容。"
 byz_rhetorica_militaris: "军事修辞学"
 byz_rhetorica_militaris_desc: "萨伊亚诺斯·马吉斯特罗斯的第二篇论文《军事修辞学》是一部全面的将领指南，阐述了如何在战前直至临战阶段撰写并发表激励军队的演说。公元10世纪时，利奥六世曾大量引用该著作，作为其复兴战争研究以扭转对抗阿拉伯人战局努力的一部分。"
 byz_naumachiae: "海战演习"
 byz_naumachiae_desc: "萨伊亚诺斯·马吉斯特罗斯所著《海战演习》涵盖了海上战略与战术的诸多主题，直至13世纪仍深受拜占庭皇帝与将领的青睐。"
 byz_new_coins: "新币"
 byz_new_coins_desc: "拜占庭帝国皇帝铸造钱币用于支付内部开支（如士兵军饷）和外部支出（如避免战争或确保和平），这是当时常见的策略，皇帝有时会通过降低货币成色或发行更轻的新币来管理政府财政。虽然日常开支和大额交易都使用钱币支付，但国库的黄金储备对于向外部敌人支付巨额款项至关重要。"
 orthodox_crusader_advance2: "正交让位"
 orthodox_crusader_advance2_desc: "属于上帝的归还上帝，将余下的一切交予世人，我们的职责是用火和剑保护朝圣者和真正的信徒的安全。"
 byz_tagmata_raider_advance: "奔行骑手"
 byz_tagmata_raider_advance_desc: "尽管装甲骑兵曾是尼基弗鲁斯二世和约翰一世军队的核心力量，但在11世纪初开始逐渐被淘汰。尽管在巴西尔二世征伐巴尔干半岛的战役中仍有突出表现，但在崎岖山地间以小规模冲突为主的作战环境中，他们的作用日益减弱。\n\n至13世纪，拜占庭军队的主力骑兵角色已由突袭骑兵接替——这类骑兵有时被称作轻装化的装甲骑兵，阿普利亚的威廉在《罗贝尔·吉斯卡尔事迹》中描述他们以“诺曼人装备”来装备自身。"
 byz_lancer_advance: "短枪骑兵"
 byz_lancer_advance_desc: "经过现代化战场改造的枪骑兵部队在交战区域外围潜行，伺机寻找敌军防线的薄弱环节，并与敌方骑兵展开对决。"
 byz_modern_lancer_advance: "胸甲骑卫"
 byz_modern_lancer_advance_desc: "在速度与力量之间取得平衡的盾卫骑士利用最新武器和战术，既能远程使用步枪骚扰固定步兵，又能通过冲锋奇袭敌军。"
 byz_soldier_estates_increase2_desc: "五世纪中叶后，拜占庭军队的征兵主要转为自愿性质，但边防军通常因世袭制而强制服役。国家常将其服役视为对现有土地租约的实物抵偿而非“新增”兵役，这逐渐导致中央权威的削弱。\n\n为应对此问题，其中一项政策是将服役授地按户而非按人分配。因此，边防军退伍军人的子女或兄弟姐妹即使未实际履行帝国兵役，亦可获得租地资格。"
 byz_late_roman_army: "军区制"
 byz_late_roman_army_desc: "拜占庭军区制是一种军政体系，它取代了旧式罗马军队，建立起由农业区及后期海事区征召的世袭农民士兵组成的体系。每个军区既是军事辖区也是行政省份，由一名将军担任总督兼指挥官。作为土地授予的交换，士兵承诺履行兵役义务——这种半军事化征召辅以职业军人核心，形成能快速组建地方防御力量的灵活体系。"
 byz_late_roman_army2: "《训诫》"
 byz_late_roman_army2_desc: "《训诫》是一部由蒙费拉托侯爵、拜占庭皇子狄奥多尔·巴列奥略撰写的军事论著，约成书于14世纪20年代中期的君士坦丁堡，最初以希腊文写成。该书通过系列沉思录的形式，论述了当时意大利诸邦实践的军事战术本质与组织方式——这些战术在当时被视为军事理论与发展的前沿。\n\n由于西奥多一生大部分时间均在蒙费拉托度过，其军事生涯也于此展开，故文本反映的是意大利北方的军事文化，而非拜占庭军事传统。可将本书理解为旨在帮助拜占庭军事统帅将现代战术引入其军队的指导手册，不过该著作在拜占庭本土产生的实际影响尚难定论。"
 byz_imperial_army: "新军"
 byz_imperial_army_desc: "十五世纪末叶，拜占庭帝国在奥斯曼铁骑的长期进逼与国库枯竭的夹缝中，展开了一项格外大胆的改革，将古罗马的纪律与手持火器这新事物融合起来。帝国战略家们援引君士坦丁的余荫与尼基弗鲁斯·福卡斯的战策，将精选的塔格玛塔部队重组为轻装火绳枪兵，一支在火绳枪精准排射上严加操练的轻步兵。\n\n尽管这些喷吐硫磺的武器最初被保守的廷臣们视作炼金术士的把戏，不配用于帝国战争，但其雷鸣般的齐射在敌军的冲锋尚未触及矛与盾之前便将其瓦解，迅速重塑了战场格局。\n\n至世纪之交，编年史家们记载道：帝国的存续既赖于条约，亦仰仗这些硝烟缭绕的阵列。火药与传统出人意表的结合，帮助重燃了拜占庭日渐黯淡的星辰。"
 byz_imperial_army2: "静态射击线"
 byz_imperial_army2_desc: "相较于自土耳其人那里借鉴而来的火绳枪设计，燧发枪具有更轻的重量和更快的射速。尽管这种武器传入帝国军队的时间晚于多数对手，随之而来的新步兵战术——静态射击线也推行得颇为缓慢，但它终究取代了标志着火药武器初登战场时那种略显杂乱的轮射方式。\n\n尽管如此，这一技术飞跃使拜占庭野战军重获机动优势，短暂重塑了其在欧洲军事变革中创新者而非守旧者的声威。"
 byz_imperial_army3: "列线火铳兵"
 byz_imperial_army3_desc: "火铳步兵战术的发展，使得帝国战术家得以创制出一套“层叠机动”战法：多列士兵如呼吸风箱般循环进退——首列射击后，次列穿过间隙接替射击，首列则退后装填，第三列随时策应两翼薄弱之处。\n\n随着战术日益精熟——排级部队依次定时齐射，营级单位旋身展开斜角弹幕——火铳兵逐渐成为帝国那种独特韧性的化身，将拜占庭昔日的典礼华彩与现代战争的实用雷霆融为一体。"
 byz_imperial_army4: "列线燧发枪兵"
 byz_imperial_army4_desc: "至十八世纪黎明之际，随着帝国采用线膛铳管与燧发枪式的严整操典，火铳兵完成了最终蜕变。这些新式铳——刻有膛线、射程更远、并装配套筒刺刀——要求更精细的火力调度，促使拜占庭军队采用“燧发枪阵战术”：紧密的双列横队实施受控的排级齐射，听令旋身倾泻斜向铅雨，其稳步推进的沉着姿态甚至令心存疑虑的西方观察者为之侧目。"
 byz_greek_grenadier: "掷火兵"
 byz_greek_grenadier_desc: "希腊喷火兵营经历了各种演变，融合了拜占庭海军陆战单位主要使用的火药榴弹，从而在陆战战场上制造更严重的破坏。尽管他们数量稀少，但战场主流的仍是长距离排枪射击，所以这些突击部队在近战交锋中依然令人胆寒。"
 byz_military_warehouse_advance: "军事仓库"
 byz_military_warehouse_late_advance: "帝国仓储综合体系"
 byz_military_warehouse_late_advance_desc: "拜占庭的 “瓦西利卡·科梅尔基亚”（皇室仓库综合体系）是关键的国有后勤枢纽，尤其在7-8世纪帝国重组的关键时期，既掌控着至关重要的丝绸贸易，也为军区（地方部队）提供军事补给。它们作为征税、物资再分配和战略军事供应的中心，通常位于或连接着新兴的军区。\n\n这些仓库由“科梅尔基阿里奥伊”（贸易主管）管理，其存在揭示了拜占庭行政体系从晚期罗马模式向军区制的转变，对于国家在领土挑战中维持控制至关重要。"
 byz_roman_frontiers_advance: "重振罗马边疆"
 byz_roman_frontiers_advance_desc: "历经多年凯旋征战，君士坦丁堡的旌旗再次飘扬在古罗马边疆的破碎石垣之上。昔日的零散哨所与维护不善的木栅，已被技艺精湛的石砌瞭望塔、复杂的土木工事、相互衔接的边墙以及足以抵御最猛烈入侵和密集炮火的、如地下墓穴般坚固的堡垒所取代。"
 domestic_mil_law_advance: "改革殿内主帅"
 domestic_mil_law_advance_desc: "“殿内主帅”的渊源可追溯至3世纪末建立的晚期罗马军队近卫单位 “殿内保护守卫”。这是一个服务于罗马皇帝、同时兼具军官学校职能的军团。该建制在东罗马/拜占庭帝国持续存在至6世纪末。\n\n其中最重要者，即 “军团学院主帅”，后来崛起为皇帝之下的军队总司令。至12-13世纪被 “殿内军大主帅’” 取代，而普通的殿内主帅头衔则在巴列奥略时期成为授予中级官员的荣誉称号。"
 byz_logothete_offices_increase1: "《琼筵序次》"
 byz_logothete_offices_increase1_desc: "《菲洛塞奥斯的琼筵序次》 是拜占庭官职与宫廷序位名录中最详尽、最重要的一部。它由时任 “头等佩剑侍卫” 兼 “宫廷筵席总管” 的菲洛提奥斯，于智者利奥六世皇帝在位期间（886-912年）的公元899年9月颁布。\n\n尽管其名目为 “御宴座次精确指南”，其真正的时代价值在于它详尽罗列了宫廷头衔及其在帝国等级体系中的相对序位。此书清晰地揭示，各类文房尚书的地位在不断发展演变，最终趋向于权力向 “文书房大尚书” 一职集中，至巴列奥略时期，该职位已囊括了其他大多数官职的权责。"
 byz_logothete_offices_increase2: "扩大尚书文房"
 byz_logothete_offices_increase2_desc: "昔日的罗马近卫大区及其他大型官署，被分解为若干更小的尚书文房或机要秘阁，即专门化的财政管理部门，这些部门后来逐渐演变为尚书省。这一改革旨在应对拜占庭疆域缩小的局面，以期通过更高效、精干的行政管理体系受益。\n\n然而，随着近期领土扩张与人口，尤其是边防军的增长，建立一个更加强大的行政机构的需求已变得至关重要。"
 byz_logothete_offices_increase3: "皇家尚书"
 byz_logothete_offices_increase3_desc: "时至巴列奥略王朝中期，控制大幅缩水的帝国疆域所需的庞大官僚体系，反而削弱了传统行政机构本身的重要性。尽管文书房大尚书一职在国内事务上仍保有相当影响力，但其后勤与人事管理的职责已大都下放至其他官署。如今，帝国版图再度横跨两洲，国力更显强韧与生机，肩负起整饬此等帝国事务之责，扩张皇家尚书的职权已成一项至关重要的国策。"
 byz_logothete_office_advance: "尚书文房"
 byz_logothete_office_advance_desc: "“尚书文房”，或称“尚书官署”，是总管国家政务、财政、军饷与元老俸禄及外交政策的部门之统称。担任这些官职的官员，例如驰道文房尚书与总务文房尚书，通常是拜占庭帝国文官体系中的高阶成员。\n\n各大文房尚书的派驻机构可见于拜占庭各城市中心，常为当地的都督或总督服务，协助处理行政事务。战时，这些官员可受将军征调，为军队安排后勤支持，尽管他们独立于传统的军事建制之外。"
 byz_palatine_grenadier_advance: "宫廷掷弹兵"
 byz_palatine_grenadier_advance_desc: "拜占庭宫廷掷弹兵是一支精锐的军事编队，将罗马的纪律与拜占庭的巧思应用于火药时代。其选拔标准为身高、体魄与实战经验——这与当时全欧洲掷弹兵的通行做法一致。他们的座右铭骄傲地宣示：“艰险无畏”。"
 byz_successor_units: "尼西亚传统"
 byz_successor_units_desc: "1204年第四次十字军东征后，希腊后继国家（尼西亚、伊庇鲁斯、特拉比松）的军队由零散的拜占庭士兵、地方民兵、雇佣军（包括拉丁人/土耳其人）以及后来的专业化尼西亚职业部队组成，从无组织的残余力量演变为结构化的、小规模的、专注于复国的拜占庭式军队。"
 byz_footmen_advance: "步兵战术"
 byz_footmen_advance_desc: "在14世纪的拜占庭军队中，‘佩佐伊’（步兵）是本地征召兵与外国雇佣军的混合体，通常装备长矛、重枪及投射武器。他们是军队的重要组成部分，与骑兵协同作战于混合编队中，尽管整体军力已大不如前，且主要采取防御态势。"
 byz_pike_advance: "双刃重矛"
 byz_pike_advance_desc: "尽管拜占庭军队并未广泛使用当时西欧（如瑞士和佛兰德）步兵标志性的、密集的长矛方阵，但有记载显示他们在10世纪曾使用一种名为‘双刃重矛’的较短粗重的类矛武器来对抗重骑兵。此类武器的部署最著名的记录见于哥特战争期间，当时帝国被迫在平原或丘陵地形上应对劫掠的骑兵部队。"
 byz_billhook_advance: "多吕佩勒基斯斧"
 byz_billhook_advance_desc: "13世纪末至15世纪中叶的巴列奥略王朝时期军队，受到意大利与法兰克武器装备的影响日增，将一种名为‘多吕佩勒基斯’（意为‘矛-斧’）的戟类长柄武器纳入了他们的作战装备。此类武器旨在对抗长矛方阵并挫败骑兵冲锋，然而其相对成效难以估量，因为拜占庭军队在将这些武器大规模用于野战之前便已基本瓦解。"
 byz_imperial_hagiographers: "武勋圣传"
 byz_imperial_hagiographers_desc: "作为中世纪世界最流行的文学体裁，我们最尊崇的征服者们的传记中竟包含如此多对当今统治者的有利比较，这实属幸事。"
 byz_crossbow_advance: "轻装手弩"
 byz_crossbow_advance_desc: "拜占庭军队在其历史上的不同时期曾使用过早期的弩，有诸如“索莱纳里昂”或“赞格拉”等各种名称，但直到后期才成为一种主要或广泛使用的武器。传统复合弓在帝国大部分历史中通常是更受青睐的投射武器，然而此类“手持箭矢发射机械”的使用早在6世纪的《战略》等军事手册中已被提及。"
 byz_ochyroma_advance: "复合塞堡建筑"
 byz_ochyroma_advance_desc: "在15世纪，拜占庭的“奥奇罗玛”设计标志着对中世纪帝国宏大、攻防兼备的防御体系的逐步重新采用，同时还在火炮方面进行了更多的改进，比如加厚的、较低的城墙以及更坚固、圆润的塔楼，以更好地抵御爆炸物和炮弹的冲击。\n\n由于资源日益匮乏，晚期拜占庭的“奥奇罗玛”常常采用“复用材料”（从更古老的废墟中回收的石料和大理石）来迅速加固关键区域。"
 byz_dioikitiroi_advance: "军政堡垒建筑"
 byz_dioikitiroi_advance_desc: "拜占庭的'迪奥伊基提洛伊'已更全面地适应了现代军事管理与防御体系，体现了当时相当先进的建筑工艺与技术。\n\n其中包括采用'混合砌筑术'——交替铺设石层与砖层、建造坚实的土质护堤（缓坡工事），并引入了棱堡几何结构（借鉴自意大利式城防体系的创新设计）。"
 byz_varangian_quarters_advance: "瓦兰吉军营"
 byz_varangian_quarters_advance_desc: "尽管瓦兰吉卫队传统上驻扎于君士坦丁堡以直接护卫皇帝，但在首都各处、下色雷斯及博斯普鲁斯海岸发现的如'哈夫丹铭文'等卢恩文字碑刻表明，这些外籍战士偶尔也会被派驻至帝国其他地区驻扎。"
 byz_stratekon_advance: "君士坦丁堡大学"
 byz_stratekon_advance_desc: "通过君士坦丁堡大学为有志成为将军者提供正规军事教育，此举开创了一个贯穿帝国最黑暗时期的拜占庭军事科学时代。"
 byz_staff_college_advance: "皇室亲训"
 byz_staff_college_advance_desc: "皇室家臣系统参与培训年轻军官的做法，现已正式发展为了一所早期的军事学院。由文职教官和经验丰富的老兵共同督导，这套培养新一代拜占庭指挥官的新方法，有望让萎靡的帝国军队重振活力。"
 byz_staff_college_late_advance: "贤将制"
 byz_staff_college_late_advance_desc: "和大多数中世纪军队不同，拜占庭人极度依赖成文的“战争科学”。从将军到百夫长，所有军官都必须识字，并且精通《战略》或《战术》这类军事典籍。"
 byz_war_college_advance: "总参谋学院"
 byz_war_college_advance_desc: "改革后的拜占庭军队通过其总参谋学院为军官学员提供军事科学与战略的深造教育。该学院坐落于君士坦丁堡，是各军种高级军官进行联合培训的核心机构。"