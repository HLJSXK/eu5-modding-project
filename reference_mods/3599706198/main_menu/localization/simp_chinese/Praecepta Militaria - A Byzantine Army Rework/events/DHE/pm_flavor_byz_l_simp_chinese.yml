l_simp_chinese:
 pm_flavor_byz.1.title: "改革[target_character.GetDynasty.GetNameWithNoTooltip]近卫军"
 pm_flavor_byz.1.desc: "[target_character.GetName]及其[target_character.GetHerHis]内阁为复兴并改革陈旧的近卫军制度所付出的不懈努力已卓见成效。尽管军区制度曾一度足以确保帝国边疆无虞，但如今我们亟需建立完全职业化的军队——既要彰显[target_character.GetDynasty.GetName]皇帝陛下的威望，又须镇压国内[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]与[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]的叛乱势力。\n\n为此，国家正以此立于十字路口。11世纪以后，如同军区军队一样，原本的近卫军逐渐衰落，以致“帝国”军队与地方武装之分野几近消亡。尽管旧制之残余，如瓦兰吉卫队，依旧忠诚且坚韧惊人，但后继的拜占庭王朝仍被迫倚重昂贵的外籍佣兵，而非本土兵士来充实其最可靠的部队，哪怕前者代价高昂亦在所不惜。"
 pm_flavor_byz.1.a: "用钱吸引国外最优秀的士兵。"
 pm_flavor_byz.1.b: "我们不应忽视[ROOT.GetCountry.GetCulture.GetName]人民的力量。"
 BYZ_ALL_THEMATA_PROVINCES_GAIN_NOBLE_LOYALTY: "拥有[ShowBuildingTypeName('thema_headquarters')]的[locations|e]的所有[ShowPopTypeName('nobles')][pops|e]获得[ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%][pop_satisfaction|e]。"
 BYZ_ALL_THEMATA_PROVINCES_GAIN_PEASANT_LOYALTY: "拥有[ShowBuildingTypeName('thema_headquarters')]的[locations|e]的所有[ShowPopTypeName('peasants')][pops|e]获得[ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%][pop_satisfaction|e]。"
 pm_flavor_byz.2.title: "正在铲除首领辖区腐败"
 pm_flavor_byz.2.desc: "首领辖区制度的兴起是向地方分权迈出的一步。在帝国早期的“黄金时代”，以自由农兵和强大的中央官僚机构为基础的高度集权和高效的军区制度曾是常态。\n\n后来的制度则涉及了权力从帝国中心向地方巨头和贵族转移。拜占庭晚期封建制度逐渐发展，贵族们抵制皇帝的权威。任命包括皇室成员或高级贵族家族成员在内的地方权贵作为监督多个省份的高级“普遍首领”，助长了这一趋势。\n\n[target_character.GetName]已采取重大措施解决普罗尼亚和首领长期存在的腐败问题，剥夺了安格洛斯王朝统治时期赋予权贵的诸多礼仪特权，并重组了首领辖区军事行政管理，注重才能而非裙带关系。"
 pm_flavor_byz.2.a: "能力必须优先于血统。"
 pm_flavor_byz.3.title: "帝国陆军重振雄风"
 pm_flavor_byz.3.desc: "历经几代人受外族征服者与僭主的屈辱后，帝国军队终于恢复了昔日的一丝力量。征卒粮饷时有不继、后勤体系几近废弛、军官阶层高度分化且被异族佣兵和贪婪贵族把持等棘手问题，依然困扰着国家的捍卫者。然则，十四世纪重重危机中帝国军队的顽强存续，已然锻造出科穆宁时代以来未有的忠诚与凝聚力。这种时运的逆转是否足以收复帝国在过去数百年间失去的一切，仍有待观察。"
 pm_flavor_byz.3.a: "愿十字圣架扶助我们。"
 pm_flavor_byz.4.title: "重振帝国军队"
 pm_flavor_byz.4.desc: "拜占庭军队的全面重建，如同这个厄运缠身的帝国写就的壮丽篇章。伟大的巴西琉斯继承罗马军事传统的遗风，推行全面重组，将经验丰富的近卫军老兵与仓促征召的行省部队整合为一体。外国雇佣兵——加泰罗尼亚人、亚美尼亚人，甚至还有土耳其叛军——被混编入军队行列，他们迥异的战术被熔铸成一个不稳定却有效的整体。这些迥异的战术体系虽彼此掣肘，终被锻造成锋芒逼人的战争机器。尽管帝国疆域仍处于威胁之下，但这支重建的军队重新点燃了拜占庭的尚武精神，在外敌步步紧逼狄奥多西城墙之际，依然投射出帝国坚韧不屈的形象。"
 pm_flavor_byz.4.a: "凤凰涅槃！"
 pm_flavor_byz.5.title: "手持喷火器标准化"
 pm_flavor_byz.5.desc: "君士坦丁堡的大炼金术士早已熟知石脑油的特性，并在攻城战中持续使用手持喷火器。然而，由于黑海石油供给缩减及帝国整体国运衰落，此前一直缺乏对该武器进行战场现代化的意愿与资源。\n\n随着拜占庭国运回升，最杰出的军事家们正重新投入精力，设计能将此技术应用于当代战场的新型毁灭性武器。"
 pm_flavor_byz.5.a: "我们的将军始终欢迎新式武器。"
 pm_flavor_byz.5.b: "我们不需要他们的发明。"
 pm_flavor_byz.6.title: "重返[ShowAreaNameWithNoTooltip('marmara_area')]"
 pm_flavor_byz.6.desc: "当拜占庭再度陷入内乱与动荡之际，土耳其诸贝伊国也陷入内斗——每个统治者都自诩为下一任苏丹。在此混乱中，若干受困省份中仍占多数的希腊子民的悲鸣甚至传到了[ShowLocationName('constantinople')]混乱的宫廷。这场权力的盛大洗牌，以便我们能够回应那些在伊斯兰统治下感到不满的同胞们的呼声。"
 pm_flavor_byz.6.a: "我们必须保护我们的人民。"
 pm_flavor_byz.6.b: "我们最好积蓄力量。"
 pm_flavor_byz.7.title: "将军的低语"
 pm_flavor_byz.7.desc: "关于[ROOT.GetCountry.GetFlavorRank]的将军们心中不满的传言悄悄但明显地增长着领地，因为长期由他们掌控的省份任命权已经落入宫廷宠臣的手中，而不是军事人员。\n\n尽管帝国的大将军们表面上仍然对巴西琉斯保持应有的敬意，但在私下里，他们的会议中充满了怨恨，表达他们对影响力衰退的隐忧，以及君士坦丁堡的不信任。"
 pm_flavor_byz.7.a: "也许黄金能让他们闭嘴。"
 pm_flavor_byz.7.b: "我们必须在事情失控之前解决这个问题。"
 pm_flavor_byz.8.title: "将军们的臣服"
 pm_flavor_byz.8.desc: "数个世纪以来，拜占庭皇帝始终权衡——既要通过指定代理人建立强大的地方统治，又需防范这些人权势过大对帝国构成的威胁。\n\n经过数十载励精图治的改革与精妙的政治运作，新体制应运而生——将军职权被削弱为完全临时的军区任命，其所有行动经费与后勤保障均由皇室直接供给。这项新机制连同打破帝国军队世袭权力结构的其他举措，最终缔造出稳定而完全职业化的军事体系。\n\n这一新安排，以及其他削弱帝国军队内部世袭权力掮客的努力，是自曼努埃尔二世改革以来，朝着建立一支稳定、完全职业化的军队迈出的第一步。"
 pm_flavor_byz.8.a: "这些人将只为巴西琉斯效力。"
 byz_palaiologos_dynasty_hyperlink: "[ShowDynastyName('palaiologos_dynasty')]"
 byz_palaiologos_dynasty_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('palaiologos_dynasty')]"
 byz_variable_counter: "（当前：#Y [GetCountry('BYZ').MakeScope.GetVariable('pm_byz_imperial_authority_var').GetValue]#!）"
 pm_byz_imperial_authority_var: "#Y 帝国权威#!"
 byz_change_control_score_add: "我们获得$VALUE|G0$$pm_byz_imperial_authority_var$$byz_variable_counter$"
 byz_change_control_score_subtract: "我们失去$VALUE|R0$$pm_byz_imperial_authority_var$$byz_variable_counter$"
 pm_flavor_byz.101.title: "$byz_palaiologos_dynasty_hyperlink_no_tt$的黄昏"
 pm_flavor_byz.101.desc.start: "随着1328年[GetCharacter('byz_andronikos_ii_palaiologos').GetShortNameWithNoTooltip]被废黜，[ROOT.GetCountry.GetAdjectiveWithNoTooltip]领土的命运落入了他的孙子[GetCharacter('byz_andronikos_iii_palaiologos').GetName]手中。尽管他通过频繁的征战在维持将领忠诚方面取得了一定成功，但在对抗北方的塞尔维亚人和奥斯曼苏丹方面缺乏进展，导致局势不安。\n\n1333年，皇帝的表亲、塞萨洛尼基总督西尔吉安尼斯·巴列奥略叛逃至塞尔维亚帝国。一年后，他率军入侵马其顿，攻占了奥赫里德和斯特鲁米察的领土。这只是不忠的总督和将领挑战皇权的一系列事件中的又一例证。\n\n虽然西尔吉安尼斯的野心最终因巧妙的欺骗和暗杀而破灭，但要重振[ROOT.GetCountry.GetNameWithNoTooltip]应有的地位，最终取决于拜占庭皇帝能否将军事和行政机构牢牢掌控在自己手中。"
 pm_flavor_byz.101.desc: "$pm_flavor_byz.101.desc.start$\n\n这是$byz_palaiologos_dynasty_hyperlink$统治[ROOT.GetCountry.GetNameWithNoTooltip]的黄昏时代，也是一个动荡的时期。正如[GetCharacter('byz_andronikos_iii_palaiologos').GetName]驱逐了他的祖父[GetCharacter('byz_andronikos_ii_palaiologos').GetShortNameWithNoTooltip]，将大部分政务交由他的大都督约翰·坎塔库泽努斯处理一样，这位体弱多病的巴赛勒斯现在面临着来自国内外的背叛。\n\n与此同时，他年幼的儿子[GetCharacter('byz_john_v_palaiologos').GetName]的命运掌握在[GetCharacter('byz_anna_of_savoy').GetName]和一群奸诈的宫廷顾问手中。$byz_palaiologos_dynasty_hyperlink$尚存的子嗣对改变帝国现状显得兴味阑珊。\n\n放荡的帝国尚书、桀骜不驯的将军、异族之敌、经济问题以及民众对[ROOT.GetCountry.GetGovernment.GetRulerTitle]的普遍不满，如瘟疫般笼罩着这个国家。\n\n难怪许多人觉得$byz_palaiologos_dynasty_hyperlink_no_tt$似乎正在主持罗马帝国的末日。"
 pm_flavor_byz.101.desc.fallback: "$pm_flavor_byz.101.desc.start$\n\n[GetCharacter('byz_andronikos_ii_palaiologos').GetShortNameWithNoTooltip]的统治像他的许多前任一样，在内战和国家的废墟中结束。击败祖父后，[GetCharacter('byz_andronikos_iii_palaiologos').GetName]接管了[ROOT.GetCountry.GetNameWithNoTooltip]。然而，经济问题、反复无常的将领以及渴望从帝国金库中窃取的堕落贵族仍然玷污着[ROOT.GetCountry.GetGovernment.GetRulerTitle]的权威。他年幼的儿子[GetCharacter('byz_john_v_palaiologos').GetName]的命运掌握在皇室配偶[GetCharacter('byz_anna_of_savoy').GetName]和一群奸诈的宫廷顾问手中。$byz_palaiologos_dynasty_hyperlink$尚存的子嗣对改变帝国现状显得兴味阑珊。有一点毋庸置疑，混乱正等待着帝国。"
 pm_flavor_byz.101.a: "[ROOT.GetCountry.GetNameWithNoTooltip]是永恒的！"
 pm_flavor_byz.101.a.at: "此修正会持续到[event|e]“#Y $pm_flavor_byz.108.title$#!”触发。"
 pm_flavor_byz.101.a.bt: "要完成这一事件，我们需要使$pm_byz_imperial_authority_var$的倾向达到#Y 20#! $byz_variable_counter$。"
 pm_flavor_byz.101.a.ct: "我们将触发一系列向任意方向调整权力分数的[events|e]。当这一分数达到#Y ‑10#!，将满足事件“#Y $pm_flavor_byz.1100.title$#!”的条件。"
 pm_flavor_byz.101.b: "我听够了这些废话。"
 pm_flavor_byz.101.b.at: "这将禁用所有与“#Y $pm_flavor_byz.101.title$#!”相关的事件。"
 pm_flavor_byz.108.title: "$byz_palaiologos_dynasty_hyperlink$的黄昏：王朝永存"
 pm_flavor_byz.108.desc: "经历多年的贫困萧条，多年的阶层自治与叛乱将军割据，多年的觊觎者挑战之后，$byz_palaiologos_dynasty_hyperlink$家族终于扫清弊病，但[ROOT.GetCountry.GetFlavorRank][ROOT.GetCountry.GetName]的公民们开始燃起希望，他们的国家或许能再次成为世界之明珠。\n\n接下来的路或许并不平坦，因为仍有许多障碍。但目前，帝国的权威已开始在全境扎根。\n\n[target_character.GetName]的统治万岁！"
 pm_flavor_byz.108.a: "[ROOT.GetCountry.GetNameWithNoTooltip]会是$byz_palaiologos_dynasty_hyperlink_no_tt$的骄傲。"
 pm_flavor_byz.1100.title: "[root_country.GetNameWithNoTooltip]的衰退"
 pm_flavor_byz.1100.desc: "[root_country.GetName]的土地几十年来一直饱受冲突和破坏的蹂躏。然而，即使在最糟糕的时候，[root_country.GetNameWithNoTooltip]也从未像在$byz_palaiologos_dynasty_hyperlink$手中那样破败不堪。\n\n四面受敌，内乱不断，[root_ruler.GetName]和[root_ruler.GetHisHer]对这些土地统治的命运已是岌岌可危……"
 pm_flavor_byz.1100.a: "我们完了。"
 pm_flavor_byz.102.title: "$byz_palaiologos_dynasty_hyperlink$时代终结"
 pm_flavor_byz.102.desc: "由于$byz_palaiologos_dynasty_hyperlink$家族没有任何成员持有对[ROOT.GetCountry.GetName]的君主权力，经济萧条和持续忽视的时代终于结束了。\n\n尽管他们的离世使帝国陷入混乱，但现在新的统治者已经接手，试图为民众带来新的繁荣时期。"
 pm_flavor_byz.102.a: "希望这能成为更美好时代的开端。"
 pm_flavor_byz.2000.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]叛乱"
 pm_flavor_byz.2000.desc: "帝国在[ROOT.GetCountry.GetName]乡村省份的存在感薄弱，导致匪患猖獗，地方精英滥用职权。不出所料，许多[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]生活苦不堪言进而满腔怒火。他们拒绝下田干活，除非他们摆脱自私的[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]的暴政，改善他们的处境的要求得到满足……"
 pm_flavor_byz.2000.a: "动用武力虽代价高昂，却是必要之举。"
 pm_flavor_byz.2000.a.at: "我们当前的$pm_byz_imperial_authority_var$倾向为#Y 20#! $byz_variable_counter$。"
 pm_flavor_byz.2000.b: "区区农民翻不了天。"
 byz_change_control_score_add_text: "我们获得$VALUE|G0$$pm_byz_imperial_authority_var$$byz_variable_counter$"
 byz_change_control_score_subtract_text: "我们失去$VALUE|R0$$pm_byz_imperial_authority_var$$byz_variable_counter$"
 byz_peasants_revolt: "拜占庭农民起义"
 pm_flavor_byz.108.a.at: "这将结束所有与“#Y $pm_flavor_byz.101.title$#!”相关的事件。"
 pm_flavor_byz.102.a.at: "这将禁用所有与“#Y $pm_flavor_byz.101.title$#!”相关的事件。"
 pm_flavor_byz.2001.title: "士兵们颂扬[ROOT.GetCountry.GetGovernment.GetRulerTitle]"
 pm_flavor_byz.2001.desc: "[target_location.GetName]的士兵们坚定地宣誓效忠于[ROOT.GetCountry.GetGovernment.GetRulerTitle]和统治的$byz_palaiologos_dynasty_hyperlink$王朝，此举令那些同样试图拉拢他们的当地野心权贵懊恼不已。"
 pm_flavor_byz.2001.a: "他们的忠诚将不会没有回报。"
 pm_flavor_byz.2001.a.at: "我们当前的$pm_byz_imperial_authority_var$倾向为#Y 20#! $byz_variable_counter$。"
 pm_flavor_byz.2002.title: "士兵们拥戴[ROOT.GetCountry.GetGovernment.GetRulerTitle]"
 pm_flavor_byz.2002.desc: "我们在农村地区安置帝国士兵及授予其垦殖荒地的投资已见成效。\n\n[target_location.GetName]的士兵已联名上书其指挥官，坚决申明他们只效忠于[ROOT.GetCountry.GetGovernment.GetRulerTitle]。\n\n这份赤诚亦感染了当地乡民，他们乐见乡邑建设兴旺，也对通达的商机与安稳的境况深表欢迎。"
 pm_flavor_byz.2002.a: "这是极好的消息。"
 pm_flavor_byz.2002.a.at: "我们当前的$pm_byz_imperial_authority_var$倾向为#Y 20#! $byz_variable_counter$。"
 pm_flavor_byz.2003.title: "兵士质询[ROOT.GetCountry.GetGovernment.GetRulerTitle]"
 pm_flavor_byz.2003.desc: "多年来的疏于关怀与对外籍军官和雇佣兵的偏袒，已在驻守[target_location.GetName]的兵士中滋生了不满。搁在以往，这些怨气或许还会关起门来悄悄议论；可如今他们对[ROOT.GetCountry.GetGovernment.GetRulerTitle]的威信已失望至极，连表面功夫都懒得做了，不满情绪公然流露。\n\n有人担心，若放任这种怨气不管，恐怕会蔓延开来，严重打击全军的士气。"
 pm_flavor_byz.2003.a: "有关不忠的传言令人深感不安。"
 pm_flavor_byz.2003.a.at: "我们当前的$pm_byz_imperial_authority_var$倾向为#Y 20#! $byz_variable_counter$。"
 pm_flavor_byz.2004.title: "士兵们拥戴其将军"
 pm_flavor_byz.2004.desc: "关于不满情绪不断发酵的传言已经演变成令人不安的新事态。驻守[target_location.GetName]的士兵们没有寻求[ROOT.GetCountry.GetCapital.GetName]和[ROOT.GetCountry.GetGovernment.GetRulerTitle]的支持，反而向一位野心勃勃的当地指挥官，[strategos_character.GetName]将军宣誓效忠。\n\n虽然没有迹象表明即将发生叛乱，但这位新崛起的权威将领，足以让任何对帝国历史上那几十年动荡内乱仍心存余悸的人感到警觉。"
 pm_flavor_byz.2004.a: "We will keep a close eye on this situation。"
 pm_flavor_byz.2004.a.at: "我们当前的$pm_byz_imperial_authority_var$倾向为#Y 20#! $byz_variable_counter$。"
 pm_flavor_byz.2005.title: "权将求进"
 pm_flavor_byz.2005.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle]与其最高军事领导人之间的关系一直微妙。[GetCharacter('byz_andronikos_iii_palaiologos').GetName]的频繁征战以及军区系统对权力的整体稀释，一直抑制着将领们滋生野心、乃至聚势对抗统治王朝的能力。\n\n最近，[target_character2.GetName]向[ROOT.GetCountry.GetGovernment.GetRulerTitle]提出建议，以重金贿赂换取军阶晋升。虽将其纳为可靠支持者或可极大保障帝国军队对王室的忠诚，但默许这种赤裸裸的腐败可能会给日后带来麻烦。"
 pm_flavor_byz.2005.a: "敌人要跟紧，他的钱袋子更要捏死。"
 pm_flavor_byz.2005.b: "接受这种提议，实在有失体面。"
 pm_flavor_byz.2006.title: "比济的士兵田产"
 pm_flavor_byz.2006.desc: "负责向帝国老兵分配土地的总务文房尚书已在[ShowLocationName('vize')]附近的领土上找到了适合耕种的土地。\n\n他们认为，只需王室进行少量投资，就能吸引边防军及其家人来到该区域，从而促进其生产力和发展。"
 pm_flavor_byz.2006.a: "善待老兵，其值千金。"
 pm_flavor_byz.2006.b: "改聘其为教官。"
 pm_flavor_byz.2007.title: "投资军事管理"
 pm_flavor_byz.2007.desc: "希腊城市[ShowLocationName('edessa')]位于一条至关重要的罗马-君士坦丁堡路网，埃格纳提亚大道上，故而对拜占庭帝国具有战略意义。近年来，该地区的防御工事及其他安全设施因疏于维护而破败，导致区域防务效率下降。\n\n此刻正是对该地区进行再投资的良机，尤其是以适中的代价重振曾是帝国骄傲的军事行政中心。"
 pm_flavor_byz.2007.a: "重铸古堡！"
 pm_flavor_byz.2007.b: "这些钱用在行政部门的其他地方更好。"
 pm_flavor_byz.2008.title: "保护卡尔西顿的商人"
 pm_flavor_byz.2008.desc: "安纳托利亚领土的持续丧失削弱了帝国保障商人和朝圣者安全渡过赫勒斯滂(达达尼尔)海峡的能力。在帝国最后残存的领地中靠近[ShowLocationName('uskudar')]的几条道路上修建小型守卫哨所，不仅有助于为未来的收复行动重新立足，还能保护通往首都的重要贸易路线。"
 pm_flavor_byz.2008.a: "必须确保商路安全。"
 pm_flavor_byz.2008.b: "商业已经蒸蒸日上，我们该把钱投在自家附近。"
 pm_flavor_byz.2009.title: "阿德里安波利斯的训练场"
 pm_flavor_byz.2009.desc: "[ShowLocationName('edirne')]因其位于关键十字路口的位置，在拜占庭帝国具有重要战略意义。这使其成为抵御北方入侵者的重要防御堡垒，经历了无数战役，甚至在拜占庭内战时期曾作为备选首都。\n\n在过去的时代，它曾是拜占庭军队的关键后勤枢纽，是进一步投资军事基础设施的理想地点。"
 pm_flavor_byz.2009.a: "修建军营。"
 pm_flavor_byz.2009.b: "我们应该雇佣更优秀的文房尚书。"
 pm_flavor_byz.2010.title: "雇佣兵劫掠"
 pm_flavor_byz.2010.desc: "奉[ROOT.GetCountry.GetGovernment.GetRulerTitle]之命、途径[target_location.GetName]的外籍士兵，其行径已让当地民众忍无可忍。这群军纪败坏的雇佣兵，干尽了各种放纵暴虐的勾当，导致多人受伤、财产受损，乃至公然抢劫。当地居民已受够了，他们要求帝国在这些外族恶棍酿成更大祸事之前，予以严惩，以儆效尤。"
 pm_flavor_byz.2010.a: "我们无能为力。"
 pm_flavor_byz.2010.b: "立刻把这群祸害轰出去！"
 pm_flavor_byz.2011.title: "军区制式微"
 pm_flavor_byz.2011.desc: "到科穆宁王朝时期，由于小亚细亚的丧失以及数代财力拮据的皇帝长期疏于管理，军区制已支离破碎。\n\n训练营的严重匮乏，导致新兵们毫无操练经验和战术协同，便仓促奔赴战场。随着边境在外敌压力下苦苦支撑，可用的选择越来越少，难以避免帝国大军瓦解为一群未经训练、七拼八凑的乌合之众。"
 pm_flavor_byz.2011.a: "看来，我们只能勒紧裤腰带了。"
 pm_flavor_byz.2011.b: "好装备固然有用，可终究替代不了真刀真枪的训练。"
 pm_flavor_byz.2012.title: "稳固的军事基础设施"
 pm_flavor_byz.2012.desc: "尽管军区制已显露出急需彻底改革的疲态，但巴西琉斯对其基础设施的投资努力，已为这一制度注入了新的活力。如今，帝国正拭目以待：这些重筑的根基，是会催生持久的强盛，抑或仅仅是推迟了一场更彻底的清算。"
 pm_flavor_byz.2012.a: "优秀的规划带来卓越的成果。"
 pm_flavor_byz.2012.b: ""
 pm_flavor_byz.2013.title: "匪寇猖獗"
 pm_flavor_byz.2013.desc: "由于帝国在腹地和内陆行省缺乏军队驻扎，各类盗匪活动与无法无天的行径已然生根。商人与市民都在抱怨，皇帝的目光过分聚焦于首都这颗明珠，而国家的其余部分正走向衰败。或许，一次武力展示能提醒臣民：帝国关于提供保护的承诺，并非全是空谈。"
 pm_flavor_byz.2013.a: "这已经脱离我们的掌控。"
 pm_flavor_byz.2013.b: "出动军队。"
 pm_flavor_byz.2014.title: "道路安全得到确保"
 pm_flavor_byz.2014.desc: "随着新的边哨沿着帝国道路拔地而起，商人们如释重负地交头接耳，那些火炬通明的塔楼，终于护卫着曾消失在匪患山口下的商队。有了这些设防的前哨站守卫着商业动脉，巴西琉斯必须决定是继续投资边疆的稳定，还是将宝贵资源调拨给那需求永无止境的军队。"
 pm_flavor_byz.2014.a: "常设巡逻，有助整肃军纪。"
 pm_flavor_byz.2014.b: ""
 pm_flavor_byz.2015.title: "军事管理人手不足"
 pm_flavor_byz.2015.desc: "帝国的战争官署里，办公桌空了一半，卷宗半开半合，训练有素的管理人员日渐稀少，指挥机制也因令人不安的犹豫而运转不灵。战事迫在眉睫，军令却错递拖延，巴西琉斯必须直面抉择，是改革官僚机构，还是眼睁睁看着帝国军队从内部瓦解。"
 pm_flavor_byz.2015.a: "一个不幸的现实。"
 pm_flavor_byz.2015.b: "我们必须立刻解决这一局面。"
 pm_flavor_byz.2016.title: "优秀的军事管理"
 pm_flavor_byz.2016.desc: "帝国近来的投入已锻造出一个无愧于其古老威名的军事管理体系：机要秘阁秩序井然，文书吏员往来迅捷，军令传递清晰分明。随着军需官恪守时限、后勤调配精准无误，巴西琉斯如今麾下的是一支行动如精心编撰的史册般精准的军队，而非仅凭昔日荣光残响混乱行事的队伍。"
 pm_flavor_byz.2016.a: "我们必须保持卓越的标准。"
 pm_flavor_byz.2016.b: ""
 pm_flavor_byz.2017.title: "君士坦丁堡大学"
 pm_flavor_byz.2017.desc: "尽管君士坦丁堡大学本质上是一所世俗高等教育学府，而非纯粹的军事院校，但其毕业生通常被期望进入国家与军事机构任职。\n\n这所大学由狄奥多西二世皇帝于公元425年在[ShowLocationName('constantinople')]创立，专注于法学、哲学与人文通识教育，延续了希腊-罗马的教育传统。\n\n在其存续的多个时期，拜占庭皇帝们曾资助设立各类专门学院并聘请名师，其目的常在于系统整理军事历史或发展军事理论。这是一个由国家正式设立的机构，拥有31名国家资助的教授，它在罗马帝国的官僚体系与军事行政管理中扮演了至关重要的角色。"
 pm_flavor_byz.2017.a: "知识就是强大的武器。"
 pm_flavor_byz.2017.b: ""
 pm_flavor_byz.9.title: "将军候选人"
 pm_flavor_byz.9.desc: "我军最高层级的例行人员更迭，使得[ROOT.GetCountry.GetFlavorRank]的将军团中出现了一个空缺。我们德高望重的臣仆[aspiring_strategos.GetName]多年来虽居虚职但始终尽忠职守，他将是我们地方部队的优秀领导者。\n\n然而，我们王权派内部也推举了另一位候选人——[crown_strategos.GetName]，他虽潜力可观却未经考验。\n\n选择这位忠诚的廷臣，将向全军传递一个信息：功绩必得公正奖赏。但为确保国家安全，或许更稳妥的做法是让绝大多数最高军事职位牢牢掌握在统治王朝手中。"
 pm_flavor_byz.9.a: "从本派系内部提拔更为可靠。"
 pm_flavor_byz.9.b: "我们应当奖赏他多年的效劳。"
 pm_flavor_byz.11.title: "将军们对军政分离政策怨声载道"
 pm_flavor_byz.11.a: "或许我们该重新考虑我们的政策了。"
 pm_flavor_byz.11.b: "允许这些人积聚更多权力实在过于危险。"
 pm_flavor_byz.109.title: "帝国[target_location.GetName]地产出售"
 pm_flavor_byz.109.desc: "为筹集资金以挽救日益衰落的帝国国库，巴西琉斯已授权将[target_location.GetName]的皇室地产出售给当地的[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]。此举虽令人蒙羞，但通过出售所得黄金将有助于国家摆脱沉重的债务困境。"
 pm_flavor_byz.109.a: "即刻充入国库"
 pm_flavor_byz.109.b: "拨出部分款项犒赏将士"
 pm_flavor_byz.110.title: "没收 [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] 地产"
 pm_flavor_byz.110.desc: "各地不满与叛乱的流言再度传至首都。[root_ruler.GetName] 迅速行动，果决地没收了 [target_character.GetName] 及其他几名在 [target_location.GetName] 谋反的 [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] 的地产。这些产业可以悄然归还以换取效忠誓言，亦可为充实国库而公开拍卖。"
 pm_flavor_byz.110.a: "以儆效尤。"
 pm_flavor_byz.110.b: "它在我们手里总比在别人手里好。"
 pm_flavor_byz.110.c: "杀鸡儆猴。"
 pm_flavor_byz.111.title: "[GetCharacter('byz_andronikos_iii_palaiologos').GetName] 驾崩"
 pm_flavor_byz.111.desc: "[GetCharacter('byz_andronikos_iii_palaiologos').GetName] 的驾崩令 [ROOT.GetCountry.GetFlavorRank] 举国哀悼。尽管其统治生涯以同室操戈、内乱不息及[ROOT.GetCountry.GetAdjectiveWithNoTooltip]在小亚细亚地位的普遍瓦解为特征，但他重整希腊故土、成功抵御塞尔维亚人与保加利亚人入侵的功绩将被永世铭记。\n\n身着黑丝绸的送葬人群挤满了君士坦丁堡的街道，目送皇帝灵柩安葬于圣使徒陵墓下的皇室墓穴；与此同时，另一些人则聚集在市场与酒馆中，窃窃私语着帝国未卜的命运。\n\n国内外廷臣与外国权贵献上的奢华丧礼堆积如山，而悬而未决的问题很简单：这个国家与其子民的未来将走向何方？"
 pm_flavor_byz.111.a: "我们必须为未来做好准备。"
 pm_flavor_byz.112.title: "新皇加冕"
 pm_flavor_byz.112.desc: "新近成年的[ROOT.GetCountry.GetGovernment.GetRulerTitle]登上宝座，来自遥远宫廷的贺礼车队在金殿堆积如山——异域丝绸、珍稀香料与珠宝珍玩，皆旨在博取新皇青睐。廷臣们怀着希冀与猜疑低声议论，异邦这般的奉承，究竟会巩固他的统治，还是诱使他踏入危险的外交泥潭？\n\n在行省，首领与将军们悄然重新权衡自己的忠诚，他们感到[ROOT.GetCountry.GetName]的未来如今系于这位仍在学习冠冕与条约之重量的统治者的判断。所有人都在等待他的第一个决策，并希望能从中窥见，这些异国贡品预示的究竟是帝国的复兴，还是隐秘的纠葛。"
 pm_flavor_byz.112.a: "皇帝万岁"
 pm_flavor_byz.2020.title: "希俄斯领"
 pm_flavor_byz.2020.desc: "希俄斯领成立于1304年，当时热那亚贵族贝内代托一世·扎卡里亚夺取了拜占庭岛屿[ShowLocationName('chios')]。贝内代托已为小亚细亚海岸福西亚的统治者，他向拜占庭朝廷辩称此举是为防止该岛被土耳其海盗夺取。拜占庭皇帝安德洛尼卡二世·巴列奥略无力军事干预，只得接受既成事实，并将该岛作为封地授予他，起初为期10年，后以五年为期续约。\n\n1328年，希俄斯岛贵族领袖之一[leokalothetos_character.GetName]代表岛上居民面见新皇安德洛尼卡三世及其首席大臣约翰·坎塔库泽诺斯，提议收复该岛。拜占庭人以未经授权建造堡垒为由找到借口，率领庞大舰队航行至该岛，废黜了贝内代托家族的统治，改立卡洛塞托斯为统治者。\n\n岛上的使者现已抵达，带来了五年期的租金，以及现任统治者的一项提议：请求放松帝国监管，以换取未来对帝国更有利的租约条款。我们应如何回应？"
 pm_flavor_byz.2020.a: "我们需要黄金。"
 pm_flavor_byz.2020.b: "提醒他们注意自己的地位"
 pm_flavor_byz.2021.title: "修复[ShowLocationName('chios')]城堡"
 pm_flavor_byz.2021.desc: "希俄斯城堡坐落于[ShowLocationName('chios')]主港旁，建于中世纪，其第一期工程始于10世纪的拜占庭人，后由14至16世纪统治该岛的热那亚人扩建。\n\n自[leokalothetos_character.GetName]受封为该岛领主以来，已投入大量精力修复旧结构，以恢复其往日威严，抵御肆虐该地区的海盗。\n\n现在或许是进一步确立帝国对该地控制的良机，可派遣一支更永久的驻军进驻城堡。尽管此举无疑会激怒领主及其众多珍视独立的热那亚臣民。"
 pm_flavor_byz.2021.a: "让统治者拥有他的城堡吧。"
 pm_flavor_byz.2021.b: "应将该岛更紧密地纳入版图。"
 pm_flavor_byz.2022.title: "[leokalothetos_character.GetName]之死"
 pm_flavor_byz.2022.desc: "随着[ShowLocationName('chios')]的统治者[leokalothetos_character.GetName]的离世，该岛的控制权重归拜占庭皇帝。虽然新的领主封号将授予一位希俄斯岛的次要贵族，但卡洛塞托斯在岛上拥有的大量可耕地现已归皇室所有。\n\n如何处置这些地产，是一个机会。"
 pm_flavor_byz.2022.a: "应将地产分给忠诚的老兵。"
 pm_flavor_byz.2022.b: "土地应留在我们手中，收益拨给军队。"
 pm_flavor_byz.2022.c: "或许可以出售以充实国库。"
 pm_flavor_byz.2023.title: "对[ShowLocationName('chios')]的军事投资"
 pm_flavor_byz.2023.desc: "经过多年对巩固[ShowLocationName('chios')]海岸的持续军事投资，根据文书房大尚书的建议，改善该岛军事设施的规划已拟定并呈交[ROOT.GetCountry.GetGovernment.GetRulerTitle]。若有适当的监管，该岛可成为进一步抵御爱琴海海盗、支持小亚细亚和黎凡特海岸战役的理想据点。"
 pm_flavor_byz.2023.a: "建造军港设施以支持我们的征服。"
 pm_flavor_byz.2023.b: "扩展现有的后勤设施以支持更大的驻军。"
 pm_flavor_byz.2024.title: "[ShowLocationName('leuktron')]城堡"
 pm_flavor_byz.2024.desc: "[ShowLocationName('leuktron')]城堡建于1249年，坐落于海岸边一块巨大的岩石上。当时马尼半岛是亚该亚公国（伯罗奔尼撒的一个十字军国家）的一部分。亚该亚亲王威廉二世·维尔阿杜安建造此堡是为了镇压居住在泰格特斯山上的斯拉夫部落。尽管这是一个相对较小且年久失修的遗址，但其位置极佳，足以控制通往麦西尼亚湾的通道。\n\n利用从当地贵族处征集的资金，军务文房尚书的官员提出了一项适度的建议：翻新防御工事并扩建设施，以支持更持久的帝国军事存在。"
 pm_flavor_byz.2024.a: "它将成为军事行动的枢纽。"
 pm_flavor_byz.2024.b: "这些资金应用于其他项目。"
 pm_flavor_byz.2025.title: "[ShowAreaName('macedonia_area')]的边防军"
 pm_flavor_byz.2025.desc: "世代以来，[ShowAreaName('macedonia_area')]的边防军户以卓越的功绩和忠诚为帝国服务。随着北方掠夺加剧，许多原本计划出租的土地已脱离帝国控制，导致士兵贫困潦倒，无力支付装备费用。\n\n有人建议，在[ShowLocationName('giannitsa')]原属皇室的地产上开辟新的租地，以相对较低的国家成本重新安置这些士兵及其家属。"
 pm_flavor_byz.2025.a: "将提供新的土地。"
 pm_flavor_byz.2025.b: "将他们迁至首都。"
 pm_flavor_byz.2026.title: "热那亚对[ShowLocationName('chios')]的图谋"
 pm_flavor_byz.2026.desc: "自1328年被安德洛尼卡三世夺取以来，[ShowLocationName('chios')]一直处于拜占庭帝国旗帜之下，但这并未阻止外国势力对该岛图谋不轨。\n\n热那亚船长西蒙内·维尼奥索利用我国的混乱局势，在岛上登陆了一支军队，并威胁称，如果不采取任何措施挫败他的野心，他将以总督的名义占领该岛。\n\n我们有机会避免失去这个关键港口，但这需要从其他关键战线抽调资源。"
 pm_flavor_byz.2026.a: "立即动员该地区的部队。"
 pm_flavor_byz.2026.b: "该岛已落入意大利人之手。"
 pm_flavor_byz.200.title: "巩固保加利亚边境"
 pm_flavor_byz.200.desc: "帝国朝廷将目光投向北方，派遣新征士兵和老练军官增援因长期疏于管理且联盟关系变动而受到侵蚀的保加利亚边境。多瑙河沿线要塞因新驻军的到来而重现生机，帝国鹰旗在新建的哨所上空骄傲飘扬，向友敌双方宣告君士坦丁堡意欲恢复其在巴尔干山脉以外的影响力。\n\n然而，随着资源流入这些边境地区，顾问们争论着这种重新焕发的警惕是会恢复稳定，还是仅仅会挑起一场危险的意志较量。"
 pm_flavor_byz.200.a: "是时候巩固我们的北方领土了。"
 pm_flavor_byz.201.title: "重建季季莫蒂霍要塞"
 pm_flavor_byz.201.desc: "这座要塞建筑群坐落于山顶，战略位置重要，部分原因是其可俯瞰季季莫蒂霍城镇、埃里特罗波塔莫斯河以及通往君士坦丁堡的道路，是色雷斯和巴尔干地区最重要的拜占庭时代城堡之一。\n\n由于长期疏于维护和内顾政策，该要塞早已被废弃。帝国军队内部的规划者已提出方案，拟动用国家日益枯竭的国库重建这座宏伟要塞，希望其高耸的城墙能再次稳固脆弱的保加利亚边境。此举有望吸引工匠、士兵和进一步的帝国投资进入该地区，并带来北方安全复兴的承诺。\n\n然而，随着项目雄心日益增长，一些顾问私下议论，如此宏大的工程对帝国资源的消耗可能比保加利亚人带来的压力更甚。"
 pm_flavor_byz.201.a: "让它宏伟的城墙再次崛起。"
 pm_flavor_byz.201.b: "我们没有必要激怒邻国。"
 pm_flavor_byz.202.title: "祖先的宣称"
 pm_flavor_byz.202.desc: "保加利亚人与拜占庭帝国之间的关系长期充满冲突与征服。970年至1018年的拜占庭-保加利亚战争以拜占庭人重新征服保加利亚告终，从而自7世纪斯拉夫人入侵以来首次重建了对整个巴尔干半岛的控制。然而，这些成果在13世纪几乎完全逆转，复兴的保加利亚帝国巩固了对北方行省的控制，并不断威胁拜占庭的希腊属地。\n\n经过多年的暗中准备，帝国宫廷再次磨砺笔锋与刀剑，准备对理应属于罗马的土地提出长期宣称。使者们四处传播精心炮制的理由，边境指挥官则在古罗马里程碑的阴影下集结军队。\n\n然而，随着野心的战鼓开始回响，帝国不禁思索，这场期待已久的行动是会恢复其在巴尔干的威望，还是会引发一场远超想象的严酷冲突。"
 pm_flavor_byz.202.a: "军队严阵以待。"
 pm_flavor_byz.202.b: "或许可与保加利亚国王谈判。"
 pm_flavor_byz.203.title: "查士丁尼与贝利撒留的遗产"
 pm_flavor_byz.203.desc: "弗拉维乌斯·贝利撒留公元500年出生于默西亚，是查士丁尼一世皇帝麾下的拜占庭帝国军事指挥官，可说是拜占庭乃至整个历史上最成功的将军之一。关于这位将军的确切出生地存在许多争论，普遍认为在古罗马默西亚行省，该地区的几个社区都声称拥有这份遗产。\n\n无论如何，为纪念日耳曼尼亚地区土地重归帝国版图，巴西琉斯决定在奥尔梅尼奥附近，紧靠旧保加利亚边境的色雷斯-希腊一侧，以这位传奇将军的名义建立一处定居点。\n\n愿他的荣耀永世长存。"
 pm_flavor_byz.203.a: "我们的确是贝利撒留遗产的继承者。"
 pm_flavor_byz.204.title: "马其顿的命运"
 pm_flavor_byz.204.desc: "尽管马其顿长期是罗马在伯罗奔尼撒半岛的权力堡垒，但几个世纪以来也遭受了许多打击帝国的厄运之风侵袭。13世纪，该地区被各个外国十字军国家和拜占庭继承国（如尼西亚帝国、伊庇鲁斯专制国）瓜分，后来，在1204年第四次十字军东征后，拜占庭帝国陷入困境，又相继落入保加利亚和塞尔维亚的控制之下。该地区权力更迭不断，且仍面临再次被塞尔维亚征服的紧迫威胁。\n\n如何优先考虑该地区的防御，尤其是在安纳托利亚土耳其贝伊国日益巩固的背景下，是一个持续的难题。"
 pm_flavor_byz.204.a: "一座守卫卡斯托里亚隘口的要塞应能阻止未来入侵。"
 pm_flavor_byz.204.b: "沿卢迪亚斯河建立一道防线将守卫核心地带。"
 pm_flavor_byz.205.title: "收复奥赫里德"
 pm_flavor_byz.205.desc: "13世纪，奥赫里德在保加利亚和伊庇鲁斯之间争夺；后重归拜占庭控制，最终根据1334年8月的条约让渡给斯蒂芬·乌若什四世·杜尚。以牺牲塞尔维亚人为代价恢复该行省的各种努力，要么彻底失败，要么因其他战线的事态发展而无果而终，使该地区成为拜占庭皇帝们直至国运黄昏之际的遥远梦想。\n\n尽管如此，随着国内局势趋于稳定，边境地区的防御问题大体解决，现在再次考虑重启收复品都斯山脉以北帝国属地的战役。"
 pm_flavor_byz.205.a: "收复失地的时机已经成熟。"
 pm_flavor_byz.205.b: "或许可与国王讲道理。"
 pm_flavor_byz.205.c: "维持和平优先于复仇。"
 pm_flavor_demanded_ser_provinces_tt: "我们将要求[target_country.GetName]将[ShowProvinceDefinitionName('prilep_province')]和[ShowProvinceDefinitionName('vardar_province')]两省割让给我们。"
 pm_flavor_byz.300.title: "[target_ruler.GetDynasty.GetNameWithNoTooltip]的后裔"
 pm_flavor_byz.300.desc: "我朝宗室旁支的一位才俊，携一位可信亲族的举荐，前来觐见[ROOT.GetCountry.GetGovernment.GetRulerTitle]。此人迄今的才干与成就，虽不广为人知，却无可否认。若任其才华在默默无闻中消逝，甚或落入敌手，实属可惜。"
 pm_flavor_byz.300.a: "我们应将其纳入本宗。"
 pm_flavor_byz.300.b: "为其安排一个次要的行政职位。"
 pm_flavor_byz.300.c: "派其担任一个低阶指挥职务。"
 pm_flavor_byz.300.d: "以其僭越之罪将其流放。"
 pm_flavor_byz.415.title: "[GetCurrentYear]默西亚叛乱"
 pm_flavor_byz.415.desc: "默西亚地区长久以来便是[GetCountry('BYZ').GetName]与[ROOT.GetCountry.GetName]交战的战场。即便在1018年第一次保加利亚帝国臣服后，保加利亚人仍再度反叛，于1185年建立第二保加利亚王国，此后便与拜占庭战事不断，尽管双方共同面临的土耳其威胁与日俱增。\n\n在此期间，拜占庭多次试图在多瑙河地区建立立足点，最终在[ShowLocationName('edirne')]附近建立并加固了一道边境防御工事，试图维持其在该地区的影响力。当然，这并不能阻止其与[ROOT.GetCountry.GetAdjective]在默西亚、多瑙河以南领土上的前哨站持续冲突，该地区至今仍居住着说希腊语的人口。这再次引发了两国间的战争，并最终于1327年以彻尔诺门条约告终。\n\n然而近来，默西亚的希腊人显然受到[GetCountry('BYZ').GetGovernment.GetRuler.GetName]行动的煽动，意图起事反抗我们，以削弱我们的国家。"
 moesian_independence_fighter: "默西亚独立战士"
 pm_flavor_byz.415.a.tt: "#R [byzantium_country.GetName]可能会支持[moesian_independence_fighter.GetName]…#!"
 pm_flavor_byz.415.b: "让他们和同胞团聚吧。"
 pm_flavor_byz.416.title: "[GetCurrentYear]默西亚叛乱——拜占庭的支援"
 pm_flavor_byz.416.desc: "默西亚地区长久以来便是[ROOT.GetCountry.GetName]与[GetCountry('BUL').GetName]交战的战场。即便在1018年第一次保加利亚帝国臣服后，保加利亚人仍再度反叛，于1185年建立第二保加利亚王国，此后便与拜占庭战事不断，尽管双方共同面临的土耳其威胁与日俱增。\n\n在此期间，拜占庭多次试图在多瑙河地区建立立足点，最终在[ShowLocationName('edirne')]附近建立并加固了一道边境防御工事，试图维持其在该地区的影响力。当然，这并不能阻止其与[ROOT.GetCountry.GetAdjective]在默西亚、多瑙河以南领土上的前哨站持续冲突，该地区至今仍居住着说希腊语的人口。这再次引发了两国间的战争，并最终于1327年以彻尔诺门条约告终。\n\n然而近来，默西亚的希腊人显然受到[GetCountry('BYZ').GetGovernment.GetRuler.GetName]行动的煽动，意图起事反抗他们的保加利亚统治者。"
 pm_flavor_byz.416.a: "我们应该抓住这个机会！"
 pm_flavor_byz.416.a.tt: "我们将支持[moesian_independence_fighter.GetName]对抗[bulgaria_country.GetName]\n#R 此举可能导致两国关系进一步恶化#!"
 pm_flavor_byz.416.b: "我们从中无利可图。"
 pm_flavor_byz.417.title: "[GetCurrentYear]默西亚叛乱"
 pm_flavor_byz.417.desc: "[GetCountry('BYZ').GetAdjective]正公开支持默西亚叛乱势力，我国应该如何回应他们的行径？"
 pm_flavor_byz.417.a: "我们需要缓和默西亚叛乱。"
 pm_flavor_byz.417.b: "叛徒！这是开战的理由！"
 pm_flavor_byz.418.title: "[GetCurrentYear]默西亚叛乱"
 pm_flavor_byz.418.desc: "[GetCountry('BUL').GetLongName]已经升级了局势，声称我们对默西亚叛乱的支持为他们提供了对我们开战的正当理由。"
 pm_flavor_byz.418.a: "真是不幸..."
 pm_flavor_byz.419.title: "[GetCurrentYear]默西亚叛乱"
 pm_flavor_byz.419.desc: "[GetCountry('BUL').GetLongName]已经缓和了局势，选择不对我们支持默西亚叛乱的行为提出挑战。"
 pm_flavor_byz.419.a: "他们是懦夫，哈哈！"
 pm_flavor_byz.2027.title: "雅典的加泰罗尼亚人之命运"
 pm_flavor_byz.2027.desc: "雅典的[guillem_character.GetName]意外身亡，一个机会随之出现。一名自称[guydebrienne_character.GetName]的人来到[ROOT.GetCountry.GetAdjective]宫廷，声称自己是布里耶纳的瓦尔特尚存的儿子，并持有雅典公爵印章。尽管此人的说辞与来历颇为可疑，但他得到了几位雅典权贵显要的支持，他们承诺，若帝国协助驱逐可恨的加泰罗尼亚人，便拥护此人的宣称。\n\n虽然我们通常避免卷入与希腊境内残存的阿拉贡人和法兰克人的纠葛，但此次情形或许是个良机，能以较小的风险对他们取得重大战果。"
 pm_flavor_byz.2027.historical_info: "雅典公国原由拉罗什家族掌控，直至1308年传予布里耶纳的瓦尔特五世。瓦尔特雇佣了由罗杰·德·弗洛尔创立的雇佣兵团加泰罗尼亚军团来对抗拜占庭继承国伊庇鲁斯，但当他于1311年克扣军饷并试图遣散他们时，该军团在阿尔米罗斯战役中将他及大部分法兰克贵族击杀，并接管了公国。\n\n公国的控制权随后落入西西里国王腓特烈三世手中，他任命自己的儿子为公爵，尽管从法理上讲，该头衔仍属阿拉贡王室。关于加泰罗尼亚人控制公国合法性的各种争议在欧洲上演，并且公国几经易手，甚至在1456年君士坦丁堡陷落前的1444年，曾短暂重归拜占庭版图。"
 pm_flavor_byz.2027.a: "我们应充分利用这个机会。"
 pm_flavor_byz.2027.b: "转而支持雅典独立。"
 pm_flavor_byz.2027.c: "将这鼠辈赎卖给西西里人。"
 pm_flavor_byz.206.title: "与[danubian_target.GetNameWithNoTooltip]的边境争端"
 pm_flavor_byz.206.desc: "几十年来，我们一直试图在下多瑙河动荡的土地以及[ShowRegionName('balkan_region')]的叛逆诸邦中强制推行我们的宗主权。在那里，变幻的联盟、野心勃勃的波雅尔以及崛起的地区势力不断侵蚀着[ShowLocationName('constantinople')]的权威。\n\n边境已成为劫掠军队、争夺中的要塞和脆弱附庸关系的熔炉，需要不懈的外交周旋和代价高昂的军事干预。而如今，与[danubian_target.GetName]的边境摩擦再次激化，可能演变为公开的战争，这样的机会正在眼前。"
 pm_flavor_byz.206.historical_info: "14世纪拜占庭、塞尔维亚和保加利亚之间的边境争端，源于拜占庭衰落造成的权力真空，以及邻近君主国为控制战略堡垒、贸易路线和肥沃河谷而迅速扩张。斯蒂芬·杜尚统治下的塞尔维亚积极向南和向东推进，利用拜占庭内战夺取了马其顿和色雷斯的关键领土，而保加利亚则试图沿多瑙河和争议的扎戈拉地区重振其影响力。这些重叠的野心造就了一条多变且常常动荡的边境线，在那里，变换的联盟、王朝联姻和投机性的军事行动不断重塑着巴尔干的政治格局。"
 pm_flavor_byz.206.a: "向他们施压。"
 pm_flavor_byz.206.b: "战争于我不利。"
 pm_flavor_byz.208.title: "色雷斯边墙"
 pm_flavor_byz.208.desc: "我们稳步推进以恢复色雷斯北部边境的努力已见成效。面对羸弱的保加利亚诸王陷入混乱的军队，我们终于可以确信，通往首都的脆弱走廊将不再受到北方侵略的威胁。\n\n在将敌人驱赶至巴尔干山脉以北后，我们已开始认真着手巩固那些至关重要的隘口，以防范未来的入侵。尽管这项工程将耗费巨大的后勤力量，但它对我们安全的裨益以及未来北方战争的潜在效率不容忽视。"
 pm_flavor_byz.208.historical_info: "中世纪时期，拜占庭为恢复‘色雷斯边墙’所做的努力，反映了其试图重新控制连接君士坦丁堡与巴尔干关键走廊的持久战略目标，但这些尝试屡次因保加利亚的抵抗而受挫。保加利亚国家，特别是在西美昂一世及后来的伊凡·阿森二世等统治下，视色雷斯为其领土完整和经济实力的关键，导致双方在边境堡垒和设防隘口上展开激烈争夺。因此，帝国重建或加强防线的战役常常引发新的冲突，将色雷斯变成了一个军事化的边疆地带，政治主导权随着每一次重大战役或外交重组而转移。"
 pm_flavor_byz.208.a: "不惜一切代价巩固边疆。"
 pm_flavor_byz.208.b: "我们应更专注于基础设施建设。"
 pm_flavor_byz.209.title: "恢复东部多瑙河边墙"
 pm_flavor_byz.209.desc: "几十年来，我们一直试图在下多瑙河动荡的土地以及[ShowRegionName('balkan_region')]的叛逆诸邦中强制推行我们的宗主权。在那里，变幻的联盟、野心勃勃的波雅尔以及崛起的地区势力不断侵蚀着君士坦丁堡的权威。\n\n边境已成为劫掠军队、争夺中的要塞和脆弱附庸关系的熔炉，需要不懈的外交周旋和代价高昂的军事干预。而如今，与[danubian_target.GetName]的边境摩擦再次激化，可能演变为公开的战争，这样的机会正在眼前。"
 pm_flavor_byz.209.historical_info: "14世纪拜占庭、塞尔维亚和保加利亚之间的边境争端，源于帝国衰落造成的权力真空，以及邻近君主国为控制战略堡垒、贸易路线和肥沃河谷而迅速扩张。斯蒂芬·杜尚统治下的塞尔维亚积极向南和向东推进，利用拜占庭内战夺取了马其顿和色雷斯的关键领土，而保加利亚则试图沿多瑙河和争议的扎戈拉地区重振其影响力。这些重叠的野心造就了一条多变且常常动荡的边境线，在那里，变换的联盟、王朝联姻和投机性的军事行动不断重塑着巴尔干的政治格局。"
 pm_flavor_byz.209.a: "恢复古罗马的边境防御工事。"
 pm_flavor_byz.209.b: "经历如此残酷的冲突后，投资于恢复建设方为上策。"
 pm_flavor_byz.210.title: "恢复西部多瑙河边墙"
 pm_flavor_byz.210.desc: "自封的塞尔维亚皇帝所做的征服为多瑙河南岸古罗马防御工事的修复开辟了道路。这些工事如今已沦为土堆和石块，但它们仍是跨越多瑙河天然防御屏障的重要据点和渡口。修复这些土垒和堡垒，可以封锁一条重要入侵通道，无论是来自匈牙利平原上的马扎尔后继者，还是任何企图威胁拜占庭核心领土的野心勃勃的欧洲君主，都无法从这里入侵。"
 pm_flavor_byz.210.historical_info: "中世纪时期，拜占庭试图跨越塞尔维亚北部领土重建‘多瑙河边墙’，其驱动力源于帝国重夺多瑙河走廊控制权的愿望，这条走廊是在早期衰落时期失去的关键防御和商业轴线。随着塞尔维亚国家在斯蒂芬·德章斯基和斯蒂芬·杜尚等统治下扩张，帝国重建防御工事或收复河流要塞的努力，越来越多地遭到有组织的抵抗、外交阻挠或塞尔维亚的迅速反制。这些相互竞争的野心将北部边境变成了一个争夺区，在那里，拜占庭的防御性重建常常成为更广泛的区域对抗的催化剂。"
 pm_flavor_byz.210.a: "巩固西部通道。"
 pm_flavor_byz.210.b: "专注于山地防御工事。"
 pm_flavor_byz.400.title: "异邦同宗"
 pm_flavor_byz.400.historical_info: "在其鼎盛时期，拜占庭帝国的文化影响力横跨两大洲，随着当地传统对罗马与希腊价值观的适应，创造了无数混合文化。"
 pm_flavor_byz.400.desc: "[target_province.GetName]省的许多民族，虽非希腊或意大利血统，仍尊崇其罗马传承，并长期在其[target_country.GetAdjective]领主的沉重枷锁下生活，因惧怕社会歧视而不敢充分表达自我。然而，新近复兴的[ROOT.GetCountry.GetName]之威仪，激起了他们对共同罗马传承的新生自豪感，无论这传承多么遥远。\n\n关于拜占庭辉煌与强盛的故事，再次点燃了对一个‘新罗马’的向往。[my_border_location.GetName]的居民如今公开采用拜占庭的言谈举止与服饰风尚，这令[target_country.GetAdjective]的传统主义者大为光火。时间将证明，这种文化影响是否会引发冲突。"
 pm_flavor_byz.400.a: "支持我们的罗马同胞。"
 pm_flavor_byz.400.b: "最好让异邦人自行其是。"
 pm_flavor_byz.415.a: "麻烦的日子就在前面。"
 pm_flavor_byz.215.title: "奥斯曼威胁的终结"
 pm_flavor_byz.215.desc: "拜占庭屹立于胜利之巅，直面了自曼齐刻尔特战役以来近乎无止境的灾祸与外部威胁的洪流。那个备受诟病的奥斯曼突厥现已匍匐在地，一败涂地。尽管付出了巨大努力，他们的军队已然溃散，那些曾被他们以诡诈手段从我们手中撬走的土地，如今重归帝国版图。\n\n此次胜利虽使君士坦丁堡得以收复安纳托利亚沿岸一度被认为永世沦丧的领土，但关于如何处理曾经强大的奥斯曼军事和国家机器在彻底失败后留下的残余势力，这一问题仍悬而未决。"
 pm_flavor_byz.215.a: "我们应将其力量纳为己用。"
 pm_flavor_byz.215.b: "我们应尝试向敌人学习。"
 pm_flavor_byz.216.title: "拜占庭统治重临马尔马拉"
 pm_flavor_byz.216.desc: "复兴的拜占庭帝国向安纳托利亚的稳步推进，终以收复马尔马拉地区告捷。自君士坦丁堡上一次统治触及该地以来，岁月流转，沧海桑田，这片土地早已物是人非。\n\n希腊与突厥文化以及宗教传统的交融并存向来是此地的现实，但帝国的命运将取决于在近期胜利后所采取的政策。"
 pm_flavor_byz.216.a: "我们将使这片土地恢复和谐。"
 pm_flavor_byz.216.b: "整个安纳托利亚将再次成为罗马的领土。"
 pm_flavor_byz.12.title: "蒙费拉托的巴列奥略"
 pm_flavor_byz.12.desc: "值此[ROOT.GetCountry.GetAdjective]行政与财政陷入混乱之际，亟需采取果断措施以避免彻底崩溃。为此，一些[ShowDynastyName('palaiologos_dynasty')]成员开始私下议论，认为确实到了向海外旁支宗亲寻求援助的时候。\n\n此事虽有辱国格，但或许我们可以向[target_country.GetName]的表亲们求援。"
 pm_flavor_byz.12.historical_info: "巴列奥略-蒙费拉托家族是一个意大利贵族世家，也是拜占庭帝国末代统治王朝——巴列奥略王朝的一个旁支。该旁支成立于1306年，当时拜占庭皇帝安德洛尼卡二世·巴列奥略的第四子西奥多·巴列奥略，通过其母亲（安德洛尼卡二世的第二任妻子、蒙费拉托的约兰德）继承了蒙费拉托边疆伯国。\n\n约兰德的家族——阿勒拉美奇家族，曾是塞萨洛尼卡王国（1204年第四次十字军东征后围绕塞萨洛尼卡城建立的十字军国家）的统治者。尽管复兴的拜占庭人于1224年重新征服了塞萨洛尼卡，阿勒拉美奇家族仍保有对该头衔的宣称。由于安德洛尼卡二世渴望在西欧眼中确立自身的正统性，他娶了约兰德，试图将其家族的宣称与他自己对塞萨洛尼卡的实际统治正式合并，以规避未来潜在僭主举兵入侵帝国的威胁。"
 pm_flavor_byz.12.a: "让我们与蒙费拉托的表亲取得联系。"
 pm_flavor_byz.12.b: "我们必须独自经受这次考验。"
 pm_flavor_byz.12.a.tt: "信使将立即被派往[target_country.GetName]的[montferrat_ruler.GetName]处。"
 pm_flavor_byz.13.title: "来自拜占庭巴列奥略的信函"
 pm_flavor_byz.13.desc: "我们在[byz_country.GetName]的尊贵表亲正面临绝境，并已请求我们的援助。他们请求黄金，以及我们在意大利诸显贵中的美言，以便募集军队来保卫其边境，抵御土耳其人和保加利亚人的持续侵扰。尽管这对他们来说无疑是种屈辱，但提供如此救助，我们所能获得的回报相对微薄……至少眼下如此。"
 pm_flavor_byz.13.historical_info: "蒙费拉托边疆伯国与拜占庭帝国之间的关系错综复杂，历经数世纪演变，主要通过战略性的王朝联姻和相互竞争的政治利益维系。这种联系最终以拜占庭皇室巴列奥略王朝的一个旁支继承并统治蒙费拉托超过200年而达到顶峰。\n\n两者的关系并非总是合作无间。蒙费拉托分支偶尔也怀有拜占庭的野心：14世纪中叶，蒙费拉托的约翰二世曾试图利用一场拜占庭内战入侵并宣称拥有塞萨洛尼卡。他甚至请求教皇支持他作为‘合法’拜占庭皇帝的宣称，辩称帝国的主支血脉系属僭越。"
 pm_flavor_byz.13.a: "我们可以为他们的诉求提供一些金钱和影响力。"
 pm_flavor_byz.13.b: "让他们听天由命吧。"
 pm_flavor_byz.13.a.tt: "[byz_country.GetName]将欠我们一份人情……"
 pm_flavor_byz.13.b.tt: "[byz_country.GetName]会记住我们的决定。"
 pm_flavor_byz.14.title: "蒙费拉托伸出援手"
 pm_flavor_byz.14.desc: "我们向[montferrat_country.GetName]的族人求援已见成效。除了耀眼的赠礼，一支打着[montferrat_ruler.GetName]印记的意大利战士分队已抵达首都，准备与我们的敌人开战。\n\n这确实超出了我们原本的期望。"
 pm_flavor_byz.14.a: "或许血真的浓于水。"
 gain_2_a_footmen: "在[ROOT.GetCountry.GetCapital.GetName]获得200个[ShowUnitDefinitionName('a_footmen')]。"
 pm_flavor_byz.15.title: "蒙费拉托拒绝我们的恳求"
 pm_flavor_byz.15.desc: "我们在[target_country.GetName]的族人对我们的求助置若罔闻。尽管这并不出人意料，但此举已在我们两国间埋下深仇，并再次点燃了主支与意大利旁支家族之间的敌对情绪。"
 pm_flavor_byz.15.a: "此等侮辱必将得到回应。"
 pm_flavor_byz.21.title: "瓦兰吉卫队"
 pm_flavor_byz.21.desc: "Tágma tōn Varángōn，即瓦兰吉卫队，是10至14世纪[ROOT.GetCountry.GetAdjective]军队中的一支精锐部队，担任拜占庭皇帝的个人护卫。瓦兰吉卫队以其兵员主要来自北欧而闻名，包括斯堪的纳维亚的北欧人以及来自英格兰的盎格鲁-撒克逊人。\n\n征募拜占庭境外的遥远战士作为皇帝的个人卫队，是一项深思熟虑的政策，因为他们缺乏地方性的政治忠诚，可被信赖以镇压不忠的拜占庭派系发动的叛乱。\n\n尽管在先前统治时期已沦落至近乎仅具礼仪性质，但近期对这支备受尊崇的军团进行的重新投资，已开始改变其他国家对于[ROOT.GetCountry.GetName]军事能力的看法。"
 pm_flavor_byz.21.a: "他们将再次成为一支不可小觑的力量。"
 pm_flavor_byz.21.b: "这些外族战士为[ROOT.GetCountry.GetNameWithNoTooltip]带来了荣耀。"
 pm_flavor_byz.22.title: "重建内院卫队"
 pm_flavor_byz.22.desc: "自查士丁尼一世皇帝治下的鼎盛时期以来，历经数世纪变迁，[ROOT.GetCountry.GetAdjective]的内院卫队禁军在帝国近卫军中的存在感逐渐减弱，随着该部队被降格为大皇宫建筑群内外的仪仗部队，其基础设施也遭废弃。\n\n内院卫队的兵营最初位于两个主要区域：一是[ShowLocationName('constantinople')]城内的多处地点，二是在比提尼亚和色雷斯的城镇中（亦有定期轮调至首都周边更广阔地区的任务）。然而，随着部队规模缩减及小亚细亚关键领土沦丧于土耳其人之手，这些营地已大部分废弃。\n\n随着我们重建精英近卫军部队的努力重新展开，对专用军营的需求也随之而来。有人提议在黄铜大门后其旧日的首都营地上兴建新营。"
 pm_flavor_byz.22.a: "内院卫队将为我们的军队树立典范。"
 pm_flavor_byz.401.title: "保加利亚的袭掠在威胁首都"
 pm_flavor_byz.401.historical_info: "保加利亚的袭掠（7-11世纪）是保加利亚帝国对拜占庭帝国频繁发动的毁灭性军事入侵，常以色雷斯、马其顿及君士坦丁堡周边地区为目标。主要战役包括克鲁姆攻占萨尔底卡（809年）、西蒙一世扩张及塞缪尔洗劫塞萨洛尼基。"
 pm_flavor_byz.401.desc: "卑劣的保加利亚匪徒持续不断的跨境袭掠，再次在多瑙河以南的[ROOT.GetCountry.GetAdjective]领土上煽动起混乱。背信弃义的[bul_country.GetAdjective]的[GetCountry('BUL').GetGovernment.GetRuler.GetName]不仅拒绝谴责这些行径，竟还敢索要钱财以减少敌对行动。\n\n虽然此等安排或可平息首都的部分恐慌，但对缓解边境紧张局势恐无甚助益。"
 pm_flavor_byz.401.a: "我们别无选择，只能屈从其要求。"
 pm_flavor_byz.401.b: "是时候让这些走狗认清自己的地位了。"
 pm_flavor_byz.402.title: "拜占庭贡金"
 pm_flavor_byz.402.historical_info: "拜占庭向保加利亚诸王的支付包括定期年贡、黄金、奢侈品及领土让步，主要为确保和平、防止对君士坦丁堡的袭击并获取联盟支持。这些支付始于681年，延续至10世纪，是保加利亚军事胜利后条约所强制执行的结果。"
 pm_flavor_byz.402.desc: "在察觉到我们南部边境旁希腊领土的脆弱性后，我们默许雄心勃勃的边境伯爵每年通过拜占庭领土进行突袭的政策已见成效。[GetCountry('BUL').GetGovernment.GetRuler.GetName]精明地谈判以换取报酬，以约束其桀骜不驯的封臣，从而在我们两国间达成了一项有效的休战协议，尽管只是暂时的。"
 pm_flavor_byz.402.a: "真是好消息。"
 pm_flavor_byz.403.title: "拜占庭拒绝要求"
 pm_flavor_byz.403.historical_info: "拜占庭向保加利亚诸王的支付包括定期年贡、黄金、奢侈品及领土让步，主要为确保和平、防止对君士坦丁堡的袭击并获取联盟支持。这些支付始于681年，延续至10世纪，是保加利亚军事胜利后条约所强制执行的结果。"
 pm_flavor_byz.403.desc: "在察觉到我们南部边境旁希腊领土的脆弱性后，我们默许雄心勃勃的边境伯爵每年通过拜占庭领土进行突袭的政策已见成效。拜占庭拒绝了[GetCountry('BUL').GetGovernment.GetRuler.GetName]索要报酬以约束其桀骜不驯的封臣的要求，反而提出以政治人质来表达善意。这无疑是虚弱的表现，正可为我所用。"
 pm_flavor_byz.403.a: "这也许是出击的时机。"
 pm_flavor_byz.500.title: "哥特联盟"
 pm_flavor_byz.500.historical_info: "12世纪末，克里米亚半岛脱离拜占庭帝国，建立狄奥多罗公国（或称哥提亚）。1204年君士坦丁堡陷落后不久，其部分领土被并入特拉比松帝国的加扎里亚佩拉提亚。然此依附关系从未牢固，终为入侵的蒙古人所取代，后者满足于收取贡赋而非直接统治。\n\n虽大体已在拜占庭大幅缩减的势力范围之外，双方仍数次尝试更正式的和解，最终在1425年达成两国对抗奥斯曼的短暂联盟。"
 pm_flavor_byz.500.desc: "我们在哥提亚的外交努力，已使[GetCountry('FEO').GetNameWithNoTooltip]与[GetCountry('BYZ').GetNameWithNoTooltip]间的关系显著升温。[feo_monarch.GetName]的使节已抵达宫廷，谋求以可观的补偿金交换结盟，来抵御我们共同的敌人。\n\n虽然我们通常会轻视小国的提议，但以我们的处境来看，与一个小国签订平等条约可能有利于我们的利益。"
 pm_flavor_byz.500.a: "愿这次机会结出吉利的果实。"
 pm_flavor_byz.500.b: "我们应该避免这种遥远纠葛。"
 pm_flavor_byz.501.title: "哥提亚的血脉联系"
 pm_flavor_byz.501.historical_info: "14世纪早期，几位有野心的狄奥多罗专制君主曾多次尝试通过与巴列奥略和科穆宁家族的王朝联姻，来建立与拜占庭更持久的关系。这些举动主要是为了提升狄奥多罗的正统性，可能并不代表其真有意愿重新进入拜占庭的势力范围。\n\n其中一次联姻发生在1425年，当时狄奥多罗的统治者娶了君士坦丁堡最后一个统治王朝，巴列奥略家族的一位公主。这场婚姻巩固了狄奥多罗作为拜占庭继承国的高阶地位，并使其采用了双头鹰作为官方徽章。"
 pm_flavor_byz.501.desc: "拜占庭帝国与狄奥多罗公国宫廷之间多年的接触，已经导致当前皇室的几个旁系分支与公国的统治王朝通过婚姻交织在一起。\n\n帝国目前仍受蒙古霸权威胁以及与意大利人持续冲突困扰，[dying_monarch.GetName]提出了一个建议：支持现任拜占庭继承人[byzantine_heir.GetName]，而不是他自己的直系后代，以此换取拜占庭帮助他们收复在哥提亚的失地。\n\n这种承诺往往靠不住，并且也会使我们卷入复杂的外部冲突，但这个安排可能会让我们在黑海北岸建立一个王朝立足点，"
 pm_flavor_byz.501.a: "我们应该接受[dying_monarch.GetName]的提议。"
 pm_flavor_byz.501.tt1: "如果[dying_monarch.GetName]在我们现任继承人还在世时去世，则将在[dying_monarch.GetSheHe]去世时实现哥特联合。"
 pm_flavor_byz.501.tt2: "联合将使[GetCountry('FEO').GetNameWithNoTooltip]成为从属一方"
 pm_flavor_byz.501.tt3: "联合将使[GetCountry('BYZ').GetNameWithNoTooltip]成为从属一方"
 pm_flavor_byz.501.b: "把我们的命运和他们绑在一起是愚蠢的。"
 pm_flavor_byz.501.tt4: "将不会实现联合"
 pm_flavor_byz.502.title: "哥特联合"
 pm_flavor_byz.502.desc: "[dying_monarch.GetName]最近去世后，根据条约，[inherited_country.GetName]王位将传给[inheriting_monarch.GetName]。尽管双方对此安排都有些抱怨，但[inheriting_country.GetName]和[inherited_country.GetName]同意暂时保持有限的独立。"
 pm_flavor_byz.502.a: "终于联合起来了。"
 pm_flavor_byz.401.c: "或许以政治人质代替黄金就够了。"
 pm_flavor_byz.403.b: "我们最好静待时机"
 pm_flavor_byz.2205.title: "拜占庭要求奥赫里德与斯科普里"
 pm_flavor_byz.2205.desc: "君士坦丁堡那些反复无常、自命不凡的罗马僭越者们，又在图谋陷害我国子民了。这一次，他们竟然厚颜无耻地传唤我们的摄政王，仿佛他只是个卑微的小军阀，并要求归还不久前才在上帝见证下通过条约割让给我们的领土。\n\n奥赫里德长期以来一直是塞尔维亚的王室驻地，而斯科普里省更是我们领地中最富庶的地区之一。\n\n对于这些贪婪的走狗，我们该回以怎样的口信？"
 pm_flavor_byz.2205.a: "我们无力抵抗他们的进犯。"
 pm_flavor_byz.2205.b: "就让他们再次尝尝战败的苦果吧。"
 pm_flavor_byz.2206.title: "塞尔维亚拒绝我方要求"
 pm_flavor_byz.2206.desc: "那位塞尔维亚国王，真是可笑至极，其回应不过是粗鄙的辱骂与好战之言。他以自己的言辞书写着自身的命运。"
 pm_flavor_byz.2206.a: "他们会对这一天感到后悔。"
 pm_flavor_byz.401.a.tt: "这或许能让保加利亚人感到满意。"
 pm_flavor_byz.401.c.tt: "保加利亚人的袭击恐怕还会继续……"