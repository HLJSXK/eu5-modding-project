 logothete_office: "尚书文房"
 logothete_office_desc: "隶属于行尚书台的小型综合建筑群，内设官署及帝国职员与仆役的住所。这些派驻机构是帝国至关重要的行政基础设施，协助地方民政与军事长官处理组织及后勤事务。"
