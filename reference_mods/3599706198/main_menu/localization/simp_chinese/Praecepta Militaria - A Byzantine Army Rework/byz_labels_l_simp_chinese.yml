l_simp_chinese:
 MODIFIER_TYPE_NAME_num_of_tagmata_units: "近卫军单位数量"
 MODIFIER_TYPE_NAME_allow_soldier_estates: "启用军役土地"
 MODIFIER_TYPE_NAME_allow_kastrons: "启用总督堡区"
 tagmata_cataphracts: "近卫重骑兵"
 tagmata_cataphracts_desc: "虽然与巴西尔二世时期的威名和强大相去甚远，但14世纪的帝国骑兵若能正确部署那么其重装冲锋仍非常强大。"
 byz_army_late: "安德洛尼卡的遗产"
 byz_army_late_desc: "巴列奥略王朝军队继承自尼西亚帝国军队，而尼西亚军队则是12世纪强大的科穆宁王朝军队的一支。在米海尔八世统治下，军队日益侧重进攻作战，同时帝国的海军力量也得到了增强，招募了数千名熟练水手并拥有约80艘战舰，由于缺乏足够土地维持军队，帝国不得不大量雇佣外籍兵团。1282年安德洛尼卡二世即位后，军队素质恶化，拜占庭军队在东方强敌面前屡战屡败，但在对抗希腊境内的拉丁势力时仍能取得胜利。\n\n至14世纪中期，帝国低效的财政体系与无能的中枢政府使得征兵与军需补给几乎成为不可能完成的任务，在接下来大半个世纪中，拜占庭皇帝几乎完全依赖塞尔维亚人、保加利亚人、威尼斯人、拉丁人、热那亚人和土耳其人提供的军队来应对持续困扰帝国的内战。"
 tagmata_late: "巴列奥略皇家近卫军"
 tagmata_late_desc: "在巴列奥略王朝的皇帝统治下（尤其是安德罗尼卡二世时期），帝国近卫军从一支精锐快速反应部队逐渐转变为皇宫礼仪卫队。曾经著名的军团主要由外国雇佣兵组成，已经失去了昔日的辉煌。"
 reformed_tagmata: "精锐蛮盟军"
 reformed_tagmata_desc: "拜占庭军队的现代化改革使帝国近卫军恢复到了莫里斯皇帝时代的状态。拜占庭骑兵的铁蹄声再次在安纳托利亚和伯罗奔尼撒半岛回荡。"
 byz_mil_admin_lv1: "总督堡区"
 byz_mil_admin_lv1_desc: "总督堡区作为拜占庭总督的驻地，通常是小型堡垒或要塞，周围环绕着村庄，充当该总督辖区的军事和行政中心。这种布局在许多方面预示着从古代城邦向其他社会中看到的中世纪城镇的变迁。"
 military_settlements: "军役地产"
 military_settlements_desc: "拜占庭的“军役土地”或士兵地产对军区制至关重要，这些土地为士兵提供收入以自备装备和服役，国家无需支付军饷，形成与军事义务绑定的世袭责任体系。\n\n实际上这是以土地供养士兵的制度，而非通过服役授予土地，该制度源自地方传统，后经皇帝限制以防权贵阶层侵占土地。"
 soldier_estates: "军役土地"
 soldier_estates_desc: "拜占庭的士兵地产，通过“军役地产”确立，这一制度使士兵通过耕种自有土地来维持生计和负担装备，形成了与领土紧密相连的地方防御力量，尤其盛行于拜占庭7至11世纪时期。\n\n这些土地可世袭传承，但军事义务随之延续。随着时间的推移，强大的地主阶层开始兼并这些军役田产，导致土地逐渐向大庄园集中，最终推动军事体系向贵族化转型。"
 byz_inept_administration: "首领辖区"
 byz_inept_administration_desc: "首领取代了科穆宁时期的公爵，成为被称为首领辖区的民事和军事长官。在14世纪，上级首领被任命监督多个省份。这些人通常是皇帝的亲属或大贵族家族的成员，他们常将这些职位视为以牺牲当地民众为代价来敛财的机会。\n\n实际上，这些地区的管理演变成了一种仅服务于贵族利益、进一步削弱拜占庭影响力和税收榨取制度。"
 byz_pronoia_muster: "改革后的首领辖区"
 byz_pronoia_muster_desc: "尽管越来越依赖雇佣军，拜占庭改革者还是认为有必要解决首领辖区辖区长期存在的腐败问题，他们取消了许多在安格洛斯王朝统治下授予的特权，并重新组织了军事行政体系，更多的是依据能力而非裙带关系。"
 soldier_estates_tt: "拜占庭的“军役土地”或士兵地产对军区制至关重要，这些土地为士兵提供收入以自备装备和服役，国家无需支付军饷，形成与军事义务绑定的世袭责任体系。实际上这是以土地供养士兵的制度，而非通过服役授予土地，该制度源自地方传统，后经皇帝限制以防权贵阶层侵占土地。"
 byz_pronoia_muster_tt: "皇帝不是赐予现金，而是授予了一种名为“普罗尼亚”的权利，即从特定地区或人群征收特定税款和费用的权利。“普罗尼亚”持有者会从居住在土地上的农民那里收取这些收入，保留一部分作为报酬，其余部分上交给国家。持有者有义务提供军事服务，特别是在科穆宁王朝之后，通常根据其授予权利的价值提供一定数量的士兵（如重骑兵）。"
 byz_reformed_tagmata_tt: "新模范军团是整片大陆艳羡的对象。"
 byz_late_tagmata_tt: "拜占庭近卫军的衰落是一个渐进过程，在11世纪末达到顶峰，在1081年底拉西乌姆会战失利后，他们逐渐被不可靠的雇佣兵取代。随着帝国丧失安纳托利亚征兵基地、资源日益枯竭及政权分裂，这支军队最终式微，直至1453年奥斯曼帝国完成征服。"
 integrated_regiments: "整编近卫军团"
 integrated_regiments_desc: "遵循巴西琉斯的智慧，拜占庭的军区已向所有愿为帝国荣耀而战的有志公民敞开大门。"
 integrated_regiments_tt: "通过向所有背景和文化的本国公民开放近卫军军官职位，拜占庭军队实现了前所未有的凝聚力和高涨士气。"
 stratekon: "君士坦丁堡大学"
 stratekon_desc: "拜占庭帝国拥有精密的军事训练体系，其战略思想、精锐部队以及用于军事教育的系统化手册，常与君士坦丁堡大学等大型学府相衔接。这些体系融合罗马传统与创新，创造出高度纪律化的军队，特别是在步兵战术方面，如空心方阵。"
 MODIFIER_TYPE_DESC_allow_soldier_estates: "允许建造军役土地"
 MODIFIER_TYPE_DESC_allow_kastrons: "允许建造总督堡区"
 MODIFIER_TYPE_NAME_unlocked_good_administration: "解锁改革后的首领辖区"
 MODIFIER_TYPE_DESC_unlocked_good_administration: ""
 MODIFIER_TYPE_NAME_unlocked_excellent_administration: "优秀的管理者"
 MODIFIER_TYPE_DESC_unlocked_excellent_administration: ""
 MODIFIER_TYPE_NAME_unlocked_army_recovering: "军队重组"
 MODIFIER_TYPE_DESC_unlocked_army_recovering: "通过事件改革替换“安德洛尼卡的遗产”"
 MODIFIER_TYPE_NAME_unlocked_army_recovered: "伟大复兴"
 byz_army_recovering: "军队重组"
 byz_army_recovering_desc: "在皇帝及其谋臣的巧妙运筹下，拜占庭军队在经历近一个世纪的灾难、内斗与分裂后，终于迈出了重组重建的第一步。任重而道远，但凤凰必将重生。"
 byz_army_recovered: "伟大复兴"
 byz_army_recovered_desc: "与11、12世纪的前身相似，复兴后的拜占庭军事力量通过皇室影响力、现已沉寂的贵族阶层以及外籍雇佣兵来构建其武装体系。这支军队再度成为纪律严明的劲旅，如同科穆宁王朝时期收复地中海和小亚细亚地区时那般所向披靡。"
 MODIFIER_TYPE_NAME_allow_despotates: "启用专制要塞"
 MODIFIER_TYPE_DESC_allow_despotates: "允许建造专制要塞"
 byz_mil_admin_lv2: "总督要塞"
 byz_mil_admin_lv2_desc: "与君士坦丁堡这类庞大城市要塞不同，总督要塞是结构复杂的建筑群，既是地方皇权的象征，也是能够抵御新式攻城技术的防御设施。"
 burgi: "边哨"
 burgi_desc: "由当地武装驻守的小型哨所，用以控制乡野边陲、守卫帝国边疆。其作用主要在于防范当地匪患、保障要道安全，而非抵御装备精良的军队。尽管如此，这些哨站的存在仍足以昭示：即便在最偏远的省份，依然能感受到巴西琉斯的庇护泽被。"
 kentrika: "军务总枢"
 kentrika_desc: "军务总枢作为旧式军区治所的现代演进，利用帝国专业化军官团与国家一体化军队，为重要军事基础设施提供支持并提高部队训练度。"
 pm_martial_tradition: "拜占庭传承"
 pm_martial_tradition_desc: "尽管我们仍是罗马的正统继承者，但拜占庭及其后继国家拥有兼具东西方特色的丰富军事传统。"
 fabian_law: "贝利撒留的遗产"
 fabian_law_desc: "敌人践踏我们的合法领土，我们绝不容他们有喘息之机。我们的城墙坚不可摧，我们的军队意志坚定，我们的人民为战争做好了准备。"
 maurician_law: "莫里斯的遗产"
 maurician_law_desc: "我们总在自主选定的时机和地点开战，令敌人徒呼奈何。"
 komnenoi_law: "科穆宁王朝的遗产"
 komnenoi_law_desc: "拜占庭军队曾经是全世界羡慕的对象。我们最大的优势永远在于我们的准备和筹划。"
 phokas_law: "福卡斯的遗产"
 phokas_law_desc: "我们的军队是一把锤子，它将敲碎所有不屈服之人的脊梁。"
 justinian_law: "查士丁尼的遗产"
 justinian_law_desc: "我们开辟道路，向最后一位真正的罗马人致敬。"
 michael_law: "米海尔的遗产"
 michael_law_desc: "爱琴海之主，何惧风浪。"
 pm_martial_favor: "军官特权"
 pm_martial_favor_desc: "尽管军事法律已在很大程度上法典化，但阶级划分和政治关系仍在军官任命中发挥作用。随着军队开始专业化，军官团的编制往往沿袭既有的社会与经济等级结构。"
 pm_favor_veterans: "重用老兵"
 pm_favor_veterans_desc: "久经沙场与英勇无畏，才能造就最适合领兵作战的人选。"
 pm_favor_nobles: "重用贵族"
 pm_favor_nobles_desc: "唯有血统纯正者方可指挥军队。"
 pm_favor_yeoman: "重用自耕农"
 pm_favor_yeoman_desc: "还有谁能比亲手耕耘这片土地的人更适合带领我们保家卫国？"
 pm_favor_mercenaries: "重用雇佣兵"
 pm_favor_mercenaries_desc: "才能和忠诚一样，都可以用金钱买到。"
 pm_favor_clergy: "重用武装教士"
 pm_favor_clergy_desc: "上帝的仆人将成为指引我军走向胜利的明灯。"
 byz_flamethrower_infantry: "喷火兵"
 byz_flamethrower_infantry_desc: "便携式手持喷火器，是现代喷火器的早期类似装置，在10世纪的军事文献中多有记载，常用于海战与陆战。这种武器最早见于自称其发明者的智者利奥六世皇帝所著《战术学》一书。后世军事作家持续提及手持喷火器，尤推荐其用于对抗攻城塔；尼基弗鲁斯二世·福卡斯还建议野战部队配备此种武器，以期瓦解敌军阵型。"
 pm_favor_equality: "唯才是举"
 pm_favor_equality_desc: "让他们仅凭自身能力决定升降沉浮。"
 pm_strategos_favor: "将军特权"
 pm_strategos_favor_desc: "拜占庭帝国长期面临强大将领叛乱与篡位引发的严重动荡，这一致命内患屡屡导致内战，甚至几近倾覆。厘清皇室与帝国军队高层的关系，是避免在外部威胁关键时期频发的内部权力斗争的重要举措。"
 pm_favor_regional_leaders: "擢用杜卡斯宗族"
 pm_favor_regional_leaders_desc: "杜卡斯家族是一个拜占庭希腊贵族世家，其不同支系在9至11世纪为拜占庭帝国孕育了多位著名将领与统治者。该家族通过母系延续的科穆宁‑杜卡斯支系于13世纪建立了伊庇鲁斯专制国，另一分支则统治了色萨利地区。尽管他们已不在帝国皇位继承序列之中，但始终涌现出众多杰出的领袖与治理者。\n\n或许将部分行政职权委托给这些最忠诚的宗亲，能使我们更有效地将帝国权威延伸至目前尚未覆盖的区域。"
 pm_favor_crown_advisors: "赐授凯撒荣誉"
 pm_favor_crown_advisors_desc: "拜占庭皇帝极为倚重才能出众的将领作为重要顾问，尤其在军事和战略决策方面。贝利撒留曾效力于查士丁尼一世，纳尔西斯从宫廷谋士晋升为将领，而像尼基弗鲁斯·布里恩尼乌斯等人则在阿莱克修斯一世麾下成为位高权重、受封“凯撒”头衔的顾问。\n\n通过向最贤能者授予这些头衔，我们可确保皇帝获得最卓越的军事与行政谋略。"
 pm_favor_governors: "军事使馆"
 pm_favor_governors_desc: "拜占庭外交几乎不区分文职与军职。将军、受封贵族乃至皇帝本人，都会通过帝国复杂的附庸国、朝贡国与盟友网络直接开展外交，战场并非我军发挥影响力的唯一场所。"
 pm_internal_security: "内部安全法"
 pm_exclude_generals: "军政分离"
 pm_exclude_generals_desc: "这些军区规模庞大且拥有自主权力，意味着将军们往往实力强大到足以挑战皇帝。\n\n最好将这些野心勃勃之人与文官职权的运作机制分离开来，并尽可能将其孤立。"
 pm_internal_security_desc: "拜占庭情报系统的特点是制度化程度高，且与国家行政管理体系高度融合，将信息收集视为持续且具有必要性的工作。"
 pm_favor_secret_police: "资助主官耳目"
 pm_favor_secret_police_desc: "主官耳目是罗马晚期及拜占庭帝国早期的主要国家驿传机构，但其成员也被用作中央政府的普通代理人。他们在外省传统权力结构之外运作，负责监督行省行政、逮捕贪腐官员，并充当皇帝的秘密巡查员。他们以进行监视活动而闻名，并享有起诉豁免权。"
 pm_favor_patrols: "建立定期巡逻制度"
 pm_favor_patrols_desc: "尽管花费昂贵，但动用行省军队在社区中展示存在感并保障重要道路和定居点的安全，能够缓和动荡局势。"
 pm_favor_military_police: "军事化司务长官"
 pm_favor_military_police_desc: "由查士丁尼一世皇帝设立，司务长官是君士坦丁堡的城镇长官（或总督），负责维护公共秩序、控制进入首都的人流、调查旅行者的出行，并处理流浪者及某些犯罪活动。将科伊阿斯特的职责纳入帝国军事体系，最有利于对首都及周边城镇中心实施严密管控。"
 pm_favor_independent_police: "维持司务长官独立"
 pm_favor_independent_police_desc: "一位独立的司务长官有助于维护我们在法律面前平等受约束的形象。"
 pm_favor_lax_policies: "监管不力"
 pm_favor_lax_policies_desc: "为何允许军队干涉民众事务？比起敌人或叛徒，军队的铁腕统治更能扼杀我们的命运。"
 MODIFIER_TYPE_NAME_num_of_flamethrower_units: "喷火兵单位数量"
 byz_varangians_reformed: "贴身卫队"
 byz_varangians_reformed_desc: "贴身卫队首次出现于9世纪，当时他们与伙友近卫卫队共同负责皇帝的人身安全。这些手持剑斧的卫兵在典礼中为皇帝开道，并负责每日清晨开启君士坦丁堡皇宫的特定宫门。\n\n随着11至14世纪各类宫廷卫队的重组，他们或被并入侍奉皇帝的常规护卫军团，或被整编为近卫军精锐野战部队。如今贴身卫队已转型为拜占庭帝国的精锐军团。"
 byz_varangian_gunners_early: "猎兵"
 byz_varangian_gunners_late: "值宿守卫"
 byz_varangian_gunners_late_desc: "该军团最初于460年由拜占庭“色雷斯人”利奥一世创立，作为帝国宫廷卫队，直至1081年德拉克里乌姆战役中最后一次以正式编制参战。然而，随着帝国军队不懈重组与现代化，该军团已被重建为精挑细选的精英部队，旨在镇守巴西琉斯皇帝认定的任何最关键战场。"
 byz_immortal_guard: "不朽者"
 byz_immortal_guard_desc: "不朽者最初组建于10世纪末期。拜占庭历史学家小尼基弗鲁斯·布里恩尼奥斯记载这支部队编制为一万人，但这很可能是在模仿古波斯的“长生军”。\n\n该部队首次作战是在1078年的‌卡拉维里战役中，由未来的皇帝阿莱克修斯一世·科穆宁率领，对抗叛军将领老尼基弗鲁斯·布里恩尼奥斯，其现代化身代表着拜占庭军事传统的绝对巅峰。"
 byz_athanatoi: "首领子弟"
 byz_athanatoi_desc: "首领子弟是科穆宁王朝时期拜占庭军队的一支精锐军事编制。这支部队由阿莱克修斯一世皇帝在其军事改革中创建，其兵源主要从阵亡军官的遗孤中招募，经武装训练后组建为两千人的精锐骑兵部队。\n\n后期的首领子弟可分为两类密切相关的人群：一类是在帝国宫廷服役并承担军事职能的年轻贵族，另一类则是持有帝国军功田产、为正规军提供兵役的地方普罗尼亚贵族。"
 byz_mounted_dragoon: "希佩斯骑兵"
 byz_mounted_dragoon_desc: "这些骑兵既能马战也能步战，技艺娴熟。骑马时他们使用长矛和重型马刀，下马作战时同样擅长使用受火绳枪进行远程攻击。这类骑兵部队精通多种任务，包括侦察、突袭和正面作战。"
 byz_flamethrower_infantry_late: "掷火兵"
 byz_flamethrower_infantry_late_desc: "希腊喷火兵经历了各种演变，融合了拜占庭海军陆战单位主要使用的火药榴弹，从而在陆战战场上制造更严重的破坏。尽管他们数量稀少，但战场主流的仍是长距离排枪射击，所以这些突击部队在近战交锋中依然令人胆寒。"
 MODIFIER_TYPE_NAME_allow_burgi: "启用边哨"
 MODIFIER_TYPE_DESC_allow_burgi: "允许建造边哨"
 MODIFIER_TYPE_NAME_allow_kentrika: "启用军务总枢"
 MODIFIER_TYPE_DESC_allow_kentrika: "允许建造军务总枢。"
 pm_religious_warfare: "宗教战争法"
 pm_religious_warfare_desc: "随着宗教权威与国家权威之间的界限不再那么绝对，我们应如何探讨教会参与军事事务的问题？"
 pm_imperial_chaplains: "随军牧师"
 pm_imperial_chaplains_desc: "即使在最黑暗的时刻，随军牧师慷慨激昂的劝诫也比炮火更能激荡士气。当然，由于与战士们如此亲近，这些神职人员皆由皇室亲自甄选。"
 pm_monk_sergeants: "允许修士军官"
 pm_monk_sergeants_desc: "修士军官既是司祭也是战斗人员，在许多历史上著名的事件中，他们都是积极的战士，例如亚历山大·佩列斯韦特与金帐汗国勇士切鲁贝的决斗。\n\n尽管历史上东正教信仰领袖大多恪守修道条约，但拜占庭皇帝的召唤与牧首对抗击十字架之敌的号召，仍激励着众多神职人员手持圣经的同时也握起利剑。"
 pm_clerical_generals: "教士军官"
 pm_clerical_generals_desc: "尽管教会与拜占庭交织，东正教教士名义上被禁止担任作战部队的军事职务。但这并未阻止高阶神职人员获得军事指挥权。\n\n例如亚历山大的居鲁士便是这样一位显赫人物——他同时担任亚历山大港牧首及拜占庭埃及行省总督的职务。作为总督，他深度参与该行省的民事与军事防御事务，虽从未被正式授予将军头衔。"
 pm_secular_army: "世俗军队"
 pm_secular_army_desc: "教士可能发誓不直接参与世俗冲突，但这并不意味着他们不能作为君主在前线的代理人。毕竟，即使是拜占庭最伟大的捍卫者也深受内乱之苦。"
 MODIFIER_TYPE_NAME_soldier_estates_cap_level: "军役土地上限"
 MODIFIER_TYPE_DESC_soldier_estates_cap_level: "每个地点允许建造的额外军役土地数量。"
 MODIFIER_TYPE_NAME_soldier_estates_max_level: "军役土地上限"
 MODIFIER_TYPE_DESC_soldier_estates_max_level: "每个地点允许建造的军役土地总数。"
 MODIFIER_TYPE_DESC_unlocked_army_recovered: "通过事件改革替换“军队重组”"
 MODIFIER_TYPE_NAME_unlocked_modern_tagmata: "近卫新军"
 MODIFIER_TYPE_DESC_unlocked_modern_tagmata: "通过事件改革替换“巴列奥略皇家近卫军”"
 byz_thema_infantry: "持盾步兵"
 byz_thema_infantry_desc: "这支重装步兵是军区制军队的中坚力量，常配备鳞甲或札甲、长矛与大盾。他们构成了军区的主力防线。"
 pm_favor_crown_appointments: "王室钦定"
 pm_favor_crown_appointments_desc: "团结你的朋友，让敌人畏惧你的军队。"
 pm_favor_generals: "提拔将军"
 pm_favor_generals_desc: "尽管拜占庭的历史充斥着对不忠将领的记载，但同样不可否认的是，其最辉煌的胜利往往源自精明的君主擢拔可信赖的能臣，委以统率军队捍卫疆土、开疆拓土的重任。我们将凭借这样的睿智判断，引领国家渡过动荡岁月。"
 byz_military_order_reform: "建立军事修会"
 byz_military_order_reform_desc: "关于宗教军事修会的事务一直令巴西琉斯深感困扰。拜占庭历史上一直遭独立的军事势力困扰——当帝国外患频仍之际，这些势力煽动叛乱从内部削弱帝国。然而正统军事修会致力于在圣地作战，并将政务交予我们掌管。因此将其纳入帝国体系远比任其自行其是更为妥当。"
 orthodox_military_orders: "军事修会"
 orthodox_military_orders_desc: "在第四次十字军东征后，君士坦丁堡宗牧首议会颁布法令，正式授权军事修道团体直接负责保护来自安纳托利亚的正教朝圣者与难民。\n\n君士坦丁骑士团与德米特里安修会大约于此时成立，旨在支持军事目标与慈善事业，两个组织均获得了拜占庭皇帝和君士坦丁堡普世牧首的官方认可与规章制定。然而这一举措遭到其他牧首区的谴责，他们认为这种对世俗事务分工原则的背离是一种令人震惊的异端行为。"
 orthodox_crusaders: "正教西征"
 orthodox_crusaders_desc: "关于天主教教宗号召十字军东征，给拜占庭造成屡次灾难，以及对东正教信众施加的难以言表的恐怖，如今正是以其人之道还治其人之身的时候，所有上帝与真信的敌人都将付出代价，圣地与伟大之城必将不惜一切代价重归我们之手。"
 STATIC_MODIFIER_NAME_naft_factories: "资助希腊火生产"
 STATIC_MODIFIER_DESC_naft_factories: "我们将用烈火与复仇洗涤战场。"
 MODIFIER_TYPE_NAME_allow_flamethrowers: "允许使用希腊火单位"
 MODIFIER_TYPE_DESC_allow_flamethrowers: "允许训练希腊火单位"
 STATIC_MODIFIER_NAME_strategos_fort_command_modifier: "将军已分配"
 STATIC_MODIFIER_DESC_strategos_fort_command_modifier: "该地点由一位将军管辖，根据角色能力获得加成与减益。"
 STATIC_MODIFIER_NAME_strategos_fort_influence_modifier: "军事管理"
 STATIC_MODIFIER_DESC_strategos_fort_influence_modifier: "帝国军队对此地点有管辖权。"
 STATIC_MODIFIER_NAME_strategos_active: "活跃的将军"
 STATIC_MODIFIER_DESC_strategos_active: "该角色当前被授予将军头衔。"
 STATIC_MODIFIER_NAME_strategos_command: "杰出的指挥官"
 STATIC_MODIFIER_DESC_strategos_command: "该角色近期在国家军队体系中担任高级职务。"
 STATIC_MODIFIER_NAME_strategos_experienced: "军事经验"
 STATIC_MODIFIER_DESC_strategos_experienced: "该角色在军队中学到了许多指挥与行政事务的经验。"
 STATIC_MODIFIER_NAME_strategos_influential: "富有影响力的将军"
 STATIC_MODIFIER_DESC_strategos_influential: "该角色因为将军的身份而在该国军队与政治家间建立了良好的连接"
 MODIFIER_TYPE_NAME_unlocked_strategos_reform: "授予将军行政权"
 MODIFIER_TYPE_DESC_unlocked_strategos_reform: "允许贵族指挥城堡"
 MODIFIER_TYPE_NAME_byz_can_assume_fort_command: "允许任命将军"
 MODIFIER_TYPE_DESC_byz_can_assume_fort_command: "国家可任命角色担任区域军事总督。"
 byz_assume_fort_command_concept: "将军"
 byz_assume_fort_command: "任命为将军"
 byz_assume_fort_command_desc_specific: "任命角色为某区域的将军。"
 pm_thema_levy: "军区士兵"
 pm_thema_levy_desc: "拜占庭的民兵，他们以土地租赁为交换条件提供军事服务。"
 pm_thema_levy_late: "晚期军区士兵"
 pm_thema_levy_late_desc: "拜占庭军区征召步兵"
 pm_imperial_conscript: "边防轻步兵"
 pm_imperial_conscript_desc: "边防军改革后的拜占庭征召兵。"
 pm_imperial_arquebus_conscript: "边防列兵"
 pm_imperial_arquebus_conscript_desc: "装备火绳枪的拜占庭民兵步兵。由于训练有限，他们在正面交战中的战斗意志偏低。"
 pm_imperial_flintlock_conscript: "阿尔马托洛伊征召民兵"
 pm_imperial_flintlock_conscript_desc: "装备燧发枪的拜占庭民兵。每半年一次的强制训练确保了高于平均水平的射击速度，但他们无法在战斗中坚持太久。"
 pm_imperial_musket_conscript: "埃夫佐内斯征召精兵"
 pm_imperial_musket_conscript_desc: "拜占庭民兵步兵装备滑膛枪，但其纪律与训练水平，与帝国常备军相比十分可疑。"
 byz_thema_akritai: "边民卫士"
 byz_thema_akritai_desc: "边民卫士是拜占庭帝国的边防军，该术语指代公元9至11世纪期间驻扎于帝国东部边境的精锐轻步兵。他们由职业士兵、当地公民民兵和非正规轻步兵混合组成，以击退阿拉伯人袭击而闻名。\n\n边民卫士的事迹催生了一系列边军歌及史诗《狄吉尼斯·阿克里特》，后者成为拜占庭民众的一种“民族史诗”。"
 byz_thema_infantry_late: "守卫者"
 byz_thema_infantry_late_desc: "作为拜占庭坚定的捍卫者，这些由农民转变而成的士兵，在帝国日渐衰微的岁月里构成了战场兵力的中坚。"
 byz_imperial_handgonner: "轻装火卒"
 byz_imperial_handgonner_desc: "身穿肩部和胸部加固锁子甲的填絮长袍，轻装火卒携带简单的装备：一支受意大利风格启发的火绳枪，一把用于近战的直刃军刀，以及一个刻有双头鹰标志以示皇家配发的火药壶。他们的火绳枪——笨重、暴躁且容易走火——却因其能在标枪无法企及的距离上穿透札甲而备受珍视，特别是当从军需官强制要求的木制支架上射击时。\n\n色雷斯帝国营地的训练是无情的，新兵们要忍受数周的同步操练、硝烟纪律和“星夜行军”，旨在磨练他们在自己缓慢燃烧的火绳微弱闪烁的光线下进行协调的能力。"
 byz_imperial_trooper: "执火兵"
 byz_imperial_trooper_desc: "到16世纪中叶，燧发枪的引入将火铳从可靠的线列步兵转变为帝国最令人垂涎的突击部队，执火兵，最终将他们从易燃火绳的反复无常的束缚中解放出来。这种新型步枪——更轻便、更可靠、点火更快——使拜占庭指挥官能够编织出流动的散兵掩护网，并执行有纪律的连续齐射，这对他们那些背负火绳枪的前辈来说是不可想象的。"
 byz_imperial_musketeer: "火械士"
 byz_imperial_musketeer_desc: "“mousketophoroi”，即帝国火枪手，融合了古希腊语后缀“携带者”和定义这个时代武器的新希腊化名称。他们的装备体现了这种混合身份：一把带有加固枪托以用于刺刀战的长管滑膛枪；一条挂满被称为“拜占庭使徒”的木制火药包的弹带；一把短叶形随身匕首，让人回想起步兵仍以盾墙作战的时代；以及一顶缝有镀金凯乐(XP)符号以便在战场上识别的宽边毡帽。"
 byz_imperial_fusiliers: "皇家步枪兵"
 byz_imperial_fusiliers_desc: "经过改革后的拜占庭步枪部队，或称“皇家步枪兵”，携带抛光的线膛枪、印有帝国花押的弹药盒，以及专为快速机动设计的轻型背包，这支军队虽然已褪去中世纪盔甲，但仍承载着千年帝国记忆的重担——比紫袍皇座曾经派出的任何步兵部队都更精干、更迅捷、更致命。"
 tagmata_raiders: "奔行骑手"
 tagmata_raiders_desc: "到了13世纪，甲胄骑兵（kataphractoi）逐渐被有时被称为“库尔索雷斯（koursores）”或“袭击者”的骑兵部队所取代，当代编年史家形容他们“武装像诺曼人”。这并不令人惊讶，因为拜占庭与欧洲风格军队的冲突暴露了重装骑兵在平坦开阔地形之外的战场交锋中的诸多弱点。\n\n此外，随着拜占庭在安纳托利亚的领土在与阿拉伯人和贪婪的十字军国家的冲突中不断受到侵蚀，维持该阶层战士所需的昂贵费用和土地要求变得难以为继。\n\n在战斗中，奔行骑手主要用于与敌方骑兵交战，通常被部署在主战线的侧翼。"
 byz_lancer: "短枪骑兵"
 byz_lancer_desc: "“lonchoforoi”或“枪骑兵”这一俗称可能会引起误解，因为这些重骑兵主要使用手枪和军刀作战，而非传统的长矛。这些部队采用了游击战术，这一战术灵感来源于帝国历史上土耳其人的闪电式突袭以及来自东部草原的周期性入侵，尽管由于使用了现代武器和后勤保障，他们的战术更加多样且致命。"
 byz_modern_lancer: "胸甲骑卫"
 byz_modern_lancer_desc: "“胸甲骑卫”（Thorakofóroi）是现代帝国近卫部队的精锐力量。这支重骑兵部队以他们独特的紫色骑兵装甲而闻名，装备有军刀和手枪，根据地形或任务的不同，偶尔也会将手枪换成骑枪。"
 byz_strategos_early: "将军辖制"
 byz_strategos_early_desc: "将军乃拜占庭帝国权倾一方的军事长官，于各自辖境代行君权，由皇帝直接任命。在某些时期，特别是随着强权军事皇帝的崛起，这些将军既能锻造出高效善战的军队，亦可能培植出足以抗衡君士坦丁堡文官体系的权力根基。一位强横的将军可沦为叛将，数名权重的将军更可结为敌对集团，从而引发叛乱、内战，自内部动摇帝国根基。"
 byz_strategos_late: "皇权独御"
 byz_strategos_late_desc: "在拜占庭军队高层中，对皇帝的绝对忠诚通过多重机制平衡得以确保：复杂的恩庇网络、基于战略与才能的擢升体系，以及所有高位皆实行短期轮换任命。加之帝国军事指挥结构的“联邦化”特性，即便最具影响力的将领也几乎无法积聚足以抗衡皇座的力量。"
 STATIC_MODIFIER_NAME_byz_imperial_neglect: "帝国的衰落"
 STATIC_MODIFIER_DESC_byz_imperial_neglect: "拜占庭帝国正处于无可挽回的衰落状态。"
 MODIFIER_TYPE_NAME_byz_imperial_neglect: "拜占庭皇权衰落"
 MODIFIER_TYPE_DESC_byz_imperial_neglect: "由于缺乏强有力的中央权威，拜占庭正处于混乱之中。"
 MODIFIER_TYPE_NAME_pm_byz_imperial_authority: "拜占庭帝国权威等级"
 MODIFIER_TYPE_DESC_pm_byz_imperial_authority: "帝国王室对其将军们的控制程度。"
 STATIC_MODIFIER_NAME_strategos_denied: "拒绝晋升"
 STATIC_MODIFIER_DESC_strategos_denied: "该角色最近被拒绝晋升至更高的军事职位。"
 STATIC_MODIFIER_NAME_strategos_corruption: "腐败的将军"
 STATIC_MODIFIER_DESC_strategos_corruption: "这个角色熟练使用不正当手段来获取影响力和权力。"
 STATIC_MODIFIER_NAME_strategos_loyal: "忠诚的将军"
 STATIC_MODIFIER_DESC_strategos_loyal: "该角色已宣誓对帝国效忠不二。"
 STATIC_MODIFIER_NAME_strategos_promoted: "接受晋升"
 STATIC_MODIFIER_DESC_strategos_promoted: "该角色于其生涯中被晋升至现役高级军阶"
 STATIC_MODIFIER_NAME_strategos_content: "知足"
 STATIC_MODIFIER_DESC_strategos_content: "该角色对自身职位感到满意。"
 STATIC_MODIFIER_NAME_strategos_discontent: "不满"
 STATIC_MODIFIER_DESC_strategos_discontent: "该角色对自身职位感到不满。"
 STATIC_MODIFIER_NAME_byz_imperial_turmoil: "动荡的帝国"
 STATIC_MODIFIER_DESC_byz_imperial_turmoil: "在巴列奥略王朝的统治草草结束之后，拜占庭的土地陷入了混乱。"
 STATIC_MODIFIER_NAME_byz_imperial_restoration: "帝国复兴"
 STATIC_MODIFIER_DESC_byz_imperial_restoration: "拜占庭帝国正处于积极复苏的状态。"
 STATIC_MODIFIER_NAME_byz_veterans_satisfied: "资深教官"
 STATIC_MODIFIER_DESC_byz_veterans_satisfied: "聘请老兵充任募兵官和教官。"
 STATIC_MODIFIER_NAME_byz_army_investments: "军事管理投资"
