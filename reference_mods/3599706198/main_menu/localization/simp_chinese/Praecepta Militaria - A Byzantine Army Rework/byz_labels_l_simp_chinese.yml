 STATIC_MODIFIER_NAME_pm_phoenix_rises: "凤凰涅槃"
 pm_urban_barracks: "城市兵营"
 pm_urban_barracks_desc: "拜占庭帝国拥有精密的军事与防御体系，包括帝国卫队（如内院卫队与值宿守卫等近卫军部队）及由城市长官统辖的都市警察部队。尽管帝国驻军并无标准化的统一营房安排，其部署常因时因地制宜，但有时会使用'astikoí-stratónes'这一直白术语来指代专用军事驻地，其大意可译为‘城市兵营’。"
 pm_military_warehouse: "军事仓库"
 pm_military_warehouse_desc: "拜占庭军事仓库，用于储存武器、装备，有时也存粮。其在贸易主管等官员监管下运营，这些官员使用特殊印章标记货物并管控国家垄断商品。"
 pm_military_warehouse_late: "皇室商栈"
 pm_military_warehouse_late_desc: "作为国家贸易与税收征管的关键机构，这些帝国海关/仓库在7至12世纪间充当着灵活的行政治理中心，常与军区及重要港口绑定。这些财政官署管理者国家垄断专营、关税及后勤事务，其地理分布亦随阿拉伯征服等地缘政治变迁而调整。"
 pm_cisterns: "要塞蓄水池"
 pm_cisterns_desc: "拜占庭人尤为擅长建造覆顶或地下的蓄水池系统。由数百个水库（如巴西利卡水池与阿斯帕尔水池）构成的庞大网络，确保了主要城市在围城战与干旱夏季期间的供水。这些对军民生存至关重要的宏伟建筑，常使用回收的柱材建造，可储存巨量水源。"
 pm_limes: "边墙防区"
 pm_limes_desc: "拜占庭的'边墙'防御体系，是对罗马同名边境防御系统的延续与改造。它依托静态边防军、独立城墙、小型堡垒、哨所以及盟约，在7世纪前用以保护东部及多瑙河边境，抵御波斯人、阿拉伯人与蛮族。该体系从早期大规模石土屏障（如哈德良长城、多瑙河边墙）逐渐演变为晚期更灵活的防御工事以及与盟友部落联盟的协约。\n\n著名范例包括阿拉伯边墙与日耳曼边墙，两者最终均因年久失修，在帝国军事凝聚力瓦解时被迅速攻破。"
 pm_limes_late: "巨垒边墙"
 pm_limes_late_desc:: "此术语大致意为‘伟大边疆’，它指由城墙、防御壕沟、要塞哨所与瞭望塔构成的一系列令人印象深刻的线性防御工事，明显是在致敬哈德良长城与安东尼长城等更古老的罗马工程。尽管在火炮与爆炸性弹药的时代其效能已大打折扣，但这些工事仍能有效威慑流寇与匪盗。若将其与更坚固的城防工事及专用棱堡相连，这些相互交织的障碍，将为企图在帝国疆域内自由机动的敌军带来不小的麻烦。"
 pm_imperial_arsenal: "帝国兵工厂"
 pm_imperial_arsenal_desc: "规模庞大的海军综合设施，包括军港、仓库、建造工场、堡垒及海墙。这些海事设施为拜占庭海军提供支持，利用舰队与战略性防御工事来保护关键沿海区域。著名范例包括君士坦丁堡的孔托斯卡利昂港、狄奥多西港以及附近的加拉塔要塞。"
 pm_domestikos_mil: "殿内帅府"
 pm_domestikos_mil_desc: "该头衔由罗马的‘殿内保护守卫’演化而来，‘殿内主帅’（及后期的’殿内军大主帅’）指的是位高权重的军事行政长官，其地位仅次于皇帝，是拜占庭军队的实际总指挥官。\n\n该职位最初是内院卫队的指挥官，到9世纪时实质上已成为军队的最高统帅，后其权威被‘殿内军大主帅’超越，至巴列奥略时期已沦为纯粹荣誉性的中级宫廷头衔。"
 pm_split_offices: "分区统帅制"
 pm_split_offices_desc: "由于拜占庭控制的领土广阔（极盛时期横跨两大洲），经常出现多人同时持有‘殿内主帅’头衔，但职责被限定在特定战区或地理区域的情况。这类分任制暗含了同僚关系，每位统领都直接对皇帝负责。\n\n12世纪晚期文献中出现的‘东/西大统领’，可能表明直到科穆宁时期，分割最高野战指挥权的既定做法仍在延续。"
 pm_ceremonial_titles: "荣衔殿帅"
 pm_ceremonial_titles_desc: "然而到13世纪，‘殿内军大主帅’与‘殿内主帅’间的分野已泾渭分明：殿内军大主帅是整个军队的总司令，也是国家最高官职之一；而‘军团学院主帅’则被降为无实权的虚衔，授予行省总督等中级官员。用14世纪中叶《伪科迪诺斯官职志》的话说，'军团学院主帅'过去拥有的职掌，与今日殿内军大主帅相当，如今却已无职可掌。"
 pm_logistics_offices: "专务主管集权"
 pm_logistics_offices_desc: "“专务府库掌管”，亦简称“专务主管”，意为“特命秘书”，自11世纪起亦作“专务府库尚书”，是拜占庭帝国掌控“专务府库”的官员，此部门乃特殊国库与仓库。\n\n虽在宫廷等级中通常被视作低位，专务府库却兼具帝国国库、仓库及管理国家军械工场（晚期的罗马兵工厂）的双重职能。它还负责为远征供应必要物资，从武器、海军补给乃至帝国间谍所需的阿拉伯服饰皆囊括其中。与“最佳菁英”一样，专务主管在文献中显著记载持续至约1081年，但可能此后不久便被裁撤。"
 pm_castle_management: "堡卫联邦化"
 pm_castle_management_desc: "行省防务常下放予受民政节制的军事长官‘督军’或‘都督’。其下，设防据点或堡垒则由‘堡卫’级军官指挥。随帝国官僚体系日益集权，野战军及其指挥体系与行省防御部队间已进一步分离。\n\n故此，担任此类职责的军官已被重组至一个专设司令部麾下，以更高效地督导军事要塞的补给驻防及其他行省防御工事。"
 pm_grand_domestic: "帝国殿内主帅"
 pm_grand_domestic_desc: "第四次十字军东征后，“殿内军大主帅”头衔被用作西方“大总管”的希腊语对应词。直至1320年代该头衔授予约翰·坎塔库泽诺斯，此职方重稳居最高非皇室头衔之位，列宫廷等级第四席。\n\n在巴列奥略时期（1261‑1453），除非皇帝御驾亲征，殿内军大主帅便是军队无可争议的总司令；皇帝亲征时，其则行使类似总参谋长之职能。"
 pm_female_commanders: "双系晋阶"
 pm_female_commanders_desc: "尽管殿内军大主帅是极高的军事/宫廷官职，但由女性担任此衔也并非绝无可能。紫衣公主狄奥多拉作为女皇统治者，实质上便担任了拜占庭国家的最高统帅（二把手），与其姊佐伊共治，而后独立统治。狄奥多拉皇后（查士丁尼一世之妻）亦曾行使巨大权力，虽常居于皇帝身后，却实为帝国的统治者。\n\n虽推行时不免令人有所顾虑，但正式移除军事人事与领导层中的性别壁垒，将在人才质量与可选范围上带来显著回报。"
 MOE: "默西亚"
 MOE_ADJ: "默西亚"
 country_history_MOE: "罗马帝国的[GetCountry('MOE').GetName]行省是多瑙河以南一处重要的巴尔干边疆区，由奥古斯都皇帝建立，后为加强防御与管理而分为上默西亚（西）与下默西亚（东），其疆域涵盖今[GetCountry('SER').GetName]、[GetCountry('BUL').GetName]和罗马尼亚的部分地区。该行省以其战略军事地位、丰富资源和肥沃土地而闻名，以多瑙河为北部边界，并驻有重兵军团以抵御北方部族侵扰。"
