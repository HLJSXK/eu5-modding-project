 STATIC_MODIFIER_DESC_pm_skilled_turks: "我国留用了土耳其炮兵与后勤军官。"
 STATIC_MODIFIER_NAME_pm_ottoman_traditions: "驿站体系模式"
 STATIC_MODIFIER_DESC_pm_ottoman_traditions: "奥斯曼的军事遗产将被保留。"
 STATIC_MODIFIER_NAME_pm_triumph_for_marmara: "马尔马拉凯旋"
 STATIC_MODIFIER_DESC_pm_triumph_for_marmara: "我军在马尔马拉凯旋的回响必将响彻帝国。"
 byz_tribal_federated: "授予蛮盟地位"
 byz_tribal_federated_desc: "拜占庭帝国常授予部落“蛮盟”地位，例如狄奥多西一世统治时期的哥特人。这标志着他们成为定居在帝国境内的盟友，其首领统领自治单位在罗马军队中作战，以换取土地或补助金。"
 byz_tribal_romanization: "罗马化"
 byz_tribal_romanization_desc: "东方“蛮族”被鼓励采用罗马生活方式，包括法律、语言（最终采用希腊语）和行政体系。当个人或群体进入罗马社会时，他们需要在某种程度上放弃原有的隶属关系，成为“罗马人”。东罗马的社会结构和强大的希腊文化认同使同化过程比在西方更为高效。"
 byz_varangian_camps: "瓦兰吉军营"
 byz_varangian_camps_desc: "将异族个体吸纳进入军队，是帝国的一项主要策略。尽管西罗马帝国因此陷入动荡，东罗马帝国却在此方面取得了更大成功。著名的瓦兰吉卫队，一支主要由外族（早期为日耳曼人，后期主要为维京人/罗斯人及盎格鲁-撒克逊人）组成的精英军团便是这一成功融合的典范。"
 pm_kalothetos_dynasty: "卡洛塞托斯"
 pm_palatine_barracks: "内院卫队军营"
 pm_palatine_barracks_desc: "“宫廷御卫军”（或称“宫学禁军”）是一支精锐皇家近卫部队，通常被认为是罗马皇帝君士坦丁大帝为取代奥古斯都亲卫骑兵（即禁卫军的骑兵部队）而设立的。\n\n拜占庭时期的宫廷御卫军主要驻扎在君士坦丁堡、比提尼亚和加拉太等地的半永久性营地，其中始终有一支分队驻守于首都城内。\n\n该部队持续服务于罗马及后来的拜占庭帝国，直至11世纪末期阿莱克修斯一世·科穆宁统治期间从历史记载中消失。"
 byz_medium_footmen: "中装步兵"
 byz_medium_footmen_desc: "术语‘佩佐伊’在希腊语中意为‘步兵’，在拜占庭军队中泛指步战士兵，其具体职能与装备随时代差异巨大。第四次十字军东征后，该词在其希腊后继者中的含义演变为涵盖各类下马作战的轻装或中装步兵。"
 byz_pike: "长矛盾阵兵"
 byz_pike_desc: "术语‘福尔孔’最早见于莫里斯皇帝于公元590年代所著的军事手册《战略学》中，很可能是对一个假想的拉丁词‘fulcum’（意为‘盾墙’）的希腊语音译。\n\n在拜占庭军队中，该术语通常指代持长矛、配盾牌的士兵所运用的战术，其阵型与中世纪末期的长矛方阵极为相似，尽管这常是在被包围或面对重骑兵（如东哥特人）时的最后手段。\n\n虽然帝国所使用的长矛长度短于传统意义上的长矛，但盔甲与武器的进步意味着拜占庭指挥官在必要时也能采用与其欧洲对手相似的阵型。"
 byz_billhook: "钩镰枪兵"
 byz_billhook_desc: "钩镰枪由农具演变而来，其形制为装有弧形刃刀的长杆武器。其功能与戟相近，能有效将骑兵拖拽下马，或在对抗重甲目标时发挥威力。\n\n为应对西方军队长矛战术的变革，晚期拜占庭军队开始采用这种武器。它能够钩缠或缴械敌方长矛手，从而为近战创造机会，因此在应对此类方阵时尤为实用。随着时间推移，为抗衡更长的矛戟，标准镰钩枪的长度逐渐增加，以致其形态与战场功能在某些方面几乎与长柄兵器难以区分。"
 byz_infantry_bowmen: "归化射手"
 byz_infantry_bowmen_desc: "这些步兵弓箭手通常源于当地拜占庭希腊人与突厥人通婚所生的后代，其先祖可能是曾被俘虏、叛逃或定居于拜占庭领土的突厥士兵。\n\n其名称本身被认为源于阿拉伯语/土耳其语词汇“murtedd”或“murtat”，意为“叛教者”或“变节者”，这暗示他们可能与自身的突厥出身有着复杂的关系，或其祖先是由伊斯兰教改宗而来。"
 byz_infantry_crossbowmen: "负弩者"
 byz_infantry_crossbowmen_desc: "“赞格拉托伊”（即“负弩者”）虽非拜占庭本土军队的常备力量，却是其晚期（12至15世纪）发展出的一种特殊兵种，主要被用于攻城战与海战。与更为好战的意大利城邦频繁接触，使拜占庭对这种武器及其在特定战术条件下的杀伤力有了一定的认识。\n\n拜占庭弩手沿袭了热那亚的传统，但将重型大盾改为改良后的船用圆盾——这种盾顶部带有矩形凹口，便于弩手在摇晃的甲板上架稳武器，实施更稳定的齐射。在陆地上，这种额外防护的代价则是因盾牌沉重而导致部署与机动速度相对缓慢。"
 byz_palatine_grenadiers: "宫廷掷弹兵"
 STATIC_MODIFIER_NAME_pm_proud_leadership: "卓越领导"
 STATIC_MODIFIER_DESC_pm_proud_leadership: "我们用纯粹的意志团结我们的国家"
 STATIC_MODIFIER_NAME_pm_family_subsidies: "宗族接济"
 STATIC_MODIFIER_DESC_pm_family_subsidies: "我们正获得海外亲族的援助。"
 not_in_capital_province: "不能在[capital|e]所处的[province|e]内建造"
 pm_mp_precinct: "巡防辖区"
 pm_mp_precinct_desc: "尽管拜占庭帝国并无专设的中央‘警察’部队，此类职能由步兵卫队或骑兵卫队等城防治安队履行，他们隶属城市长官麾下，负责内部安保、看管要犯及在城市中执行法律。历史上，步兵卫队的组织大体仅限于首都范围，在君士坦丁堡以外，类似职能由阿尔马托洛伊承担。在军事监督下，这些巡防官的职权范围已扩展至狄奥多西城墙之外，并在重振活力的总督府领导下，正式纳入更广泛的安全体系。"
 pm_mp_rural: "民兵防区"
 pm_mp_rural_desc: "阿尔马托洛伊(Armatoles)是起源于拜占庭时代（称阿尔马托洛伊莫斯）的希腊地方民兵，在奥斯曼统治下延续了其军事/治安职能。人员常从当地的阿尔马托利基（民兵防区）招募，以守卫山口、保护商旅或官员，这些区域通常是中央政府难以直接管控的。"
 STATIC_MODIFIER_NAME_pm_borders_ravaged: "边境遭到蹂躏"
 STATIC_MODIFIER_DESC_pm_borders_ravaged: "我们的国家无力抵抗外国势力的掠夺。"
 STATIC_MODIFIER_NAME_pm_byzantine_hostages: "拜占庭人质"
 STATIC_MODIFIER_DESC_pm_byzantine_hostages: "我们目前关押着来自拜占庭帝国的“贵宾”。"
 STATIC_MODIFIER_NAME_pm_allowed_raids: "边境劫掠无人制止"
 STATIC_MODIFIER_DESC_pm_allowed_raids: "我们已对边境领主的劫掠行为视而不见。"
 byz_mil_admin_lv3: "复合塞堡"
 byz_mil_admin_lv3_desc: "除了提供更完善的防御工事，复合塞堡也是后勤补给、兵员招募和税收征收的中心。建于城市中心时，它们常兼具‘城中之城’的功能，内部设有半公开的礼仪大厅、储存地方农产品的仓库以及卫队营房。"
 byz_mil_admin_lv4: "军政堡垒"
 byz_mil_admin_lv4_desc: "作为服务于拜占庭军队的现代化区域行政与军事综合体，军政堡垒既是地方军事行动的指挥枢纽，也是负责统筹民防与安全事务的行政管理中心。"
 MODIFIER_TYPE_NAME_varangian_barracks_max_level: "瓦兰吉军营上限"
 MODIFIER_TYPE_DESC_varangian_barracks_max_level: "每个地点允许建造的瓦兰吉军营总数。"
 MODIFIER_TYPE_NAME_varangian_barracks_cap_level: "瓦兰吉军营上限"
 MODIFIER_TYPE_DESC_varangian_barracks_cap_level: "每个地点允许建造的瓦兰吉军营数量。"
 pm_staff_college_early: "御训院"
 pm_staff_college_early_desc: "在某些皇帝治下，皇室家臣系统成了一种非正式的军官学堂，有潜力的年轻军官会在这里接受皇帝本人的亲自指导。"
 pm_staff_college_late: "将校院"
 pm_staff_college_late_desc: "拜占庭的军事教育在这里被体系化为三条培养路径：战略科：学习为将之道，属于高层指挥的科学。战术科：研究“战场运动之学”，军官在此研习布阵与部队调动。工械科：军官需掌握攻城器械、筑城工事与技术化战争的相关知识。"
 pm_war_college: "总参谋学院"
 pm_war_college_desc: "总参谋学院是拜占庭陆军主要的军官候补生学校。其训练内容集中于高层战略研究，以及为新任军官提供战略、战术与领导力等基础领域教育。该项目的毕业生将进入帝国最优职位的候选名单，通常在军区将军处任职参谋，并常被快速提拔以承担更高级别的指挥职责。"
 pm_slave_market: "官奴市场"
 pm_slave_market_desc: "官奴市场，即交易公共奴隶的场所，是买卖战俘或因债务被变卖至官府的奴隶劳工的中心。尽管奴隶制在拜占庭帝国合法，但从4世纪起其形态已发生重大变化，并与宗教界线挂钩。基督教奴隶不得在基督教奴隶市场出售，穆斯林奴隶亦不得在穆斯林奴隶市场出售。"
 varangian_barracks: "瓦兰吉军营"
 varangian_barracks_desc: "早期的瓦兰吉/罗斯商人被限制在圣马马斯区活动，该区位于博斯普鲁斯海岸的城墙之外。自公元988年瓦兰吉卫队被正式确立为皇帝的精锐近卫军后，他们便居住在皇宫建筑群内，以确保能提供即时保护。瓦兰吉人随后建立了自己的教堂，并在君士坦丁堡城内及其他附近的集结地点留下了诸多实物印记。"
 pm_imperial_preserve: "皇家禁苑"
 pm_imperial_preserve_desc: "皇家禁苑，或称‘皇家森林’，是拜占庭帝国为皇帝和高等贵族专门划出、受到严格律法保护的专属区域（包括森林、荒野、湿地等）。帝国官员会强制执行专门的‘森林法’，严禁未经许可的狩猎活动，对偷猎者的处罚从罚款到致盲或残肢不等。"
 pm_officer_training: "军官训练"
 pm_officer_training_desc: "数次重大的军事改革塑造了拜占庭的军官训练体系，推动帝国军队从晚期罗马模式转型为一支专业的中世纪作战力量。这些改革强调行政管理的多面性、依托军事手册的专业化，以及精锐特种部队的建设。"
 pm_thematic_officers: "贵族裙带"
 pm_thematic_officers_desc: "在‘军区制’下，行省总督通过总管辖区的民政与军政事务得以晋升。在14世纪的拜占庭帝国，‘出身低微’的将军极为罕见，因为当时的社会被严格区隔于精英‘权贵’阶层与普通平民之间。\n\n尽管由师团长、团级及百夫长组成的下级军官常从地方指挥体系中选拔，但军队的领导权仍被贵族家族所垄断。"
 pm_officer_schools_early: "近卫教官团"
 pm_officer_schools_early_desc: "以君士坦丁堡为基地的精英常备军团也充当着职业军官的训练场，军官们在此演练‘空心方阵’等复杂战术。除了作战协同，拜占庭军官还需掌握先进武器的部署，包括‘希腊火’（一种海军纵火武器）以及投石机等复杂的攻城器械。"
 pm_officer_schools_late: "标准化操典"
 pm_officer_schools_late_desc: "数次重大的军事改革塑造了拜占庭的军官训练体系，推动帝国军队从晚期罗马模式转型为一支专业的中世纪作战力量。随着现代操典模式的采用，拜占庭军队再次系统性地拥抱了从日常操练、营地规划到心理战的全方位体系化训练方法。"
 pm_universal_training: "贤将制"
 pm_universal_training_desc: "永久性、中央化的军事训练机构的建立，催生了强调行政管理多面性、依托手册实现专业化以及建设精锐特种部队的改革。这一发展的一个副产品，是拓宽了军事指挥职务的选拔范围，更注重才能而非阶级出身。"
 pm_elite_training: "参谋学院"
 pm_elite_training_desc: "拜占庭军事教育为其军官提供军事科学、战略、战术与领导力的高等及深造培训。现代化的帝国军队受益于高水平战略研究以及精英军官候补生学校的培养。"