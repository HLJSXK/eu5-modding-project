l_simp_chinese:
 blot_law: "血祭"
 blot_law_desc: "血祭是以宰杀动物并向诸神献祭为核心的宗教仪式，在极端情况下甚至会献祭人类，以此表达对神明的尊崇与膜拜。这些仪式在宗教与世俗生活中占据核心地位，通常由区域统治者亲自执行。"
 restricted_blot_law: "限制血祭"
 restricted_blot_law_desc: "血祭仅需象征性地献祭，浪费宝贵资源，反正神明也不会在意凡人的这些小玩意儿。"
 blot_regular_law: "规范血祭"
 blot_regular_law_desc: "通过法律加以规范，从血祭标准，再到血祭贡品，以免我们堕落。"
 extreme_blot_law: "无限制血祭"
 extreme_blot_law_desc: "这是战争与纷争、动荡与危险的时代，唯有通过大血祭来取悦众神，我们才能避免诸神黄昏的到来。"
 seidr: "占卜"
 desc_seidr: "预言和占卜"
 ARTIST_TYPE_NAME_skald: "吟游诗人"
 ARTIST_TYPE_DESC_skald: "吟游诗人兼任诗人、讲故事的人、音乐家、作家和哲学家，都是挪威社会不可或缺的一部分。"
 defilers_of_christendom: "基督教的亵渎者"
 defilers_of_christendom_desc: ""
 informal_priesthood: "非正式神职"
 informal_priesthood_desc: "由于北欧信仰的乡村性和多元性，它没有专业的教士阶层或宗教等级制度。"
 berserkir: "狂战士"
 berserkir_desc: "狂战士是据说会在恍惚般的狂怒中战斗的北欧勇士，这一点在众多萨迦中都有记载。无论这些传说是否夸大其词，对我们的战士而言都无关紧要——因为这些故事在他们心中激发的狂热之情确实真实不虚。"
 varangian_veterans: "瓦兰吉老兵"
 varangian_veterans _desc: "瓦兰吉卫队曾在辉煌的君士坦丁堡服役，为他们的皇帝征战四方。这些老兵如今衣锦还乡，虽比以往任何时候都更富有，却绝不甘于平静地退隐。"
 skalds_advance: "吟唱诗人复兴"
 skalds_advance _desc: "在南方的土地上，文艺复兴带来了艺术的黄金时代，尽管我们的人中很少有人亲眼见过这些，但它仍然激发了吟唱诗人诗歌的复兴。"
 vinlandic_sagas: "文兰萨迦"
 vinlandic_sagas_desc: "新世界实则是个旧世界，我们的祖先曾踏足“文兰”之地并回来讲述传奇，这些故事随后被记载为萨迦史诗。"
 codified_practices: "成文惯例"
 codified_practices_desc: "基督教的土地正在改变，信仰在分裂并引发巨大变革，无论是为了生存还是进步。作为一个整体上非正式的信仰体系，或许是时候将我们的习惯法规范化，以确保我们国度内的凝聚力与稳定。"
 pluralistic_faith: "多元信仰"
 pluralistic_faith_desc: "基督徒声称他们的救世主是上帝之子，为基督徒罪孽而死。我们没有理由怀疑这一事实，不过“独一神”这一概念应有问题，诸神的领域无疑广阔无垠，充满众多神明，我们虽坚守自己的信仰，但我们也没有理由不尊重其他的神。"
 sacral_kingship: "圣礼王权"
 sacral_kingship_desc: "国王不仅是世俗权威，他还履行宗教职责以敬奉神明。正是通过这些职责，我们统治的权利才得到了神明的授予。"
 shieldmaidens: "盾女"
 shieldmaidens_desc: "从女武神到盾女，古老传说与神话中不乏女性战士建立丰功伟绩的记载。这些故事的真实性虽无从考证，在过去也不足以说服父亲们让女儿奔赴战场。但在这个以智谋而非武力决胜的启蒙时代，难道我们不应该倾听这些故事，给女性一个证明自己能力并获得荣耀的机会吗？"
 norse_hof: "大厅"
 norse_hof_desc: "用于举行宗教仪式的异教神殿。"
 hof_maintenance: "大厅维护费"
 uppsala_temple: "乌普萨拉神庙"
 kyiv_norse: "基辅罗斯的中心"
 jorvik_norse: "约维克"
 ranaheim: "拉纳海姆圣殿"
 paderborn_norse: "伊尔明苏尔"
 preikestolen: "布道石"
 helgafell: "海尔加费尔"
 torghatten: "托尔哈滕"