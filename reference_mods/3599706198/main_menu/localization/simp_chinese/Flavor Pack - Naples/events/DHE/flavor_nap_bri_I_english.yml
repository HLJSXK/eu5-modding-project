l_simp_chinese:
 flavor_nap_bri.100.title: "布卢瓦家族喜添女儿"
 flavor_nap_bri.100.desc: "布卢瓦的玛丽诞生于布卢瓦，她是布卢瓦的夏尔与庞蒂耶夫尔的让娜之女。尽管布列塔尼王国正因继承权之争而四分五裂，但这孩子的血脉中同时流淌着布列塔尼公爵世系与沙蒂隆家族的血脉。她的未来，如同布列塔尼的命运一般，依然悬而未决。"
 flavor_nap_bri.100.historical_info: "布卢瓦的玛丽（1345-1404）出生于1345年9月28日，是布列塔尼公国宣称者布卢瓦的夏尔与庞蒂耶夫尔的让娜之女。1360年，她与法兰西国王约翰二世次子安茹的路易一世成婚，成为安茹女公爵及普罗旺斯女伯爵。其子安茹的路易二世曾宣称那不勒斯王位。"
 flavor_nap_bri.100.a: "布卢瓦家族的福星。"