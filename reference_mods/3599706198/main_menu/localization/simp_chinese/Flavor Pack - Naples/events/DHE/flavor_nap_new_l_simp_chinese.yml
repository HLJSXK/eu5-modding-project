l_simp_chinese:
 sanseverino_dynasty: "圣塞韦里诺"
 anjou_valois_dynasty: "安茹‑瓦卢瓦"
 anjou_valois_dynasty.south_italian_language: "安茹‑瓦卢瓦"
 flavor_nap.448.title: "王室联合"
 flavor_nap.448.desc: "Charles of Durazzo, Duke of Durazzo and Count of Gravina, has abducted Maria of Calabria, daughter of the late Charles Duke of Calabria and sister of Queen Joan I, forcing her into marriage with the complicity of his own mother Agnes of Périgord. This union brings the House of Durazzo dangerously close to the throne of Naples."
 flavor_nap.448.historical_info: "Charles of Durazzo (1323-1348) married Maria of Calabria on April 21, 1343 in Naples. Maria had been intended for Louis I of Hungary or John II of France, but was seized by force by the Durazzo family to strengthen their claim to the Neapolitan succession. Charles maintained an ambiguous position during the crisis following the assassination of Andrew of Hungary, husband of Joan I, but was captured and beheaded by the Hungarians at Aversa in January 1348."
 flavor_nap.448.a: "May this union bring prosperity to our kingdom."
 flavor_nap.449.title: "A Noble Alliance"
 flavor_nap.449.desc: "Louis of Durazzo, younger brother of Duke Charles and Count of Gravina, takes Margaret of Sanseverino as his wife, daughter of one of the most powerful baronial families of the Mezzogiorno. The union with the Sanseverino strengthens the territorial foothold of the House of Durazzo across Calabria and Campania."
 flavor_nap.449.historical_info: "Louis of Durazzo (1324-1364), son of John of Gravina and Agnes of Périgord, married Margaret of Sanseverino around 1343-1344. The Sanseverino were one of the most influential feudal families of the kingdom, with vast holdings throughout the Mezzogiorno. From this union was born in 1345 Charles, the future Charles III of Naples, who would conquer the Neapolitan throne in 1381 and the crown of Hungary in 1385."
 flavor_nap.449.a: "A powerful alliance for the House of Durazzo."
 STATIC_MODIFIER_NAME_nap_no_children: "Awaiting an Heir"
 STATIC_MODIFIER_DESC_nap_no_children: "The time is not yet right for children."
 flavor_nap.450.title: "A Pretender is Born"
 flavor_nap.450.desc: "In Cosenza, Margaret of Sanseverino gives birth to a son by Louis of Durazzo. The child, baptized Charles, carries Angevin blood through descent from Charles II of Naples. He will grow up at the court of Joan I, unaware that one day it will be he who claims that crown."
 flavor_nap.450.historical_info: "Charles of Durazzo, the future Charles III of Naples (1345-1386), was born in Cosenza on January 15, 1345, son of Louis of Durazzo and Margaret of Sanseverino. Orphaned of his father in 1364, he was received at the court of Joan I of Naples. In 1369 he married Margaret of Durazzo, daughter of Charles of Durazzo and niece of Joan herself. Deposed by Pope Urban VI in 1381, Charles III conquered Naples and was then crowned King of Hungary as Charles II in 1385. He died in February 1386 in captivity in Buda from wounds sustained during an assassination attempt."
 flavor_nap.450.a: "May the child grow to be worthy of his bloodline."
 flavor_nap.451.title: "A Daughter for the House of Durazzo"
 flavor_nap.451.desc: "Maria of Calabria has given birth to a daughter in Naples. The child, baptized Margaret, is born of the union between Charles of Durazzo and the sister of Queen Joan I. Though a girl, she carries the blood of both the Durazzo branch and the main Angevin line — a precious piece in the game of dynastic politics."
 flavor_nap.451.historical_info: "Margaret of Durazzo (1347-1412) was born in Naples on July 28, 1347, daughter of Charles of Durazzo and Maria of Calabria. After the death of her father in 1348 and her mother in 1366, she was raised at the court of Queen Joan I. In 1369 she married her cousin Charles, son of Louis of Durazzo, who would become Charles III of Naples. As queen consort, she played a decisive role in defending the Durazzo dynasty, ruling as regent for her son Ladislaus after Charles III's assassination in 1386."
 flavor_nap.451.a: "A blessed addition to our royal lineage."
 flavor_nap.452.title: "A Dynastic Union Within the House of Durazzo"
 flavor_nap.452.desc: "Charles, son of Louis of Durazzo, weds his cousin Margaret, daughter of Charles of Durazzo and Maria of Calabria. The marriage unites the two branches of the Durazzo line, consolidating their claim to the throne of Naples and putting an end to the internal rivalries that have long weakened the dynasty."
 flavor_nap.452.historical_info: "Charles III of Naples (1345-1386) married his cousin Margaret of Durazzo (1347-1412) in February 1369 at the court of Queen Joan I of Naples. The marriage united the two branches of the Durazzo family and strengthened their dynastic claim to the Neapolitan throne. From this union were born Ladislaus, future King of Naples, and Joan II, who would succeed her brother on the throne. Margaret played a crucial role as regent after Charles III's assassination in 1386, defending the rights of her young son Ladislaus against Angevin rivals."
 flavor_nap.452.a: "May this union seal the future of our dynasty."
 flavor_nap.453.title: "The Magnanimous is Born"
 flavor_nap.453.desc: "Margaret of Durazzo has given birth to a son in Naples. The child, baptized Ladislaus, is the fruit of the union between Charles of Durazzo and his cousin Margaret. Born of two Angevin bloodlines, he carries within him the full weight of the dynasty's claims — to Naples, to Jerusalem, to Sicily, and perhaps one day even to Hungary."
 flavor_nap.453.historical_info: "Ladislaus I of Naples, known as the Magnanimous (1377-1414), was born in Naples on February 15, 1377, son of Charles III and Margaret of Durazzo. He became King of Naples in 1386 at the age of nine, following his father's assassination in Buda, under the regency of his mother Margaret. After years of exile and struggle against the French Angevin claimant Louis II, Ladislaus recaptured Naples in 1399 and went on to pursue an ambitious campaign to dominate the Italian peninsula. He died in Naples on August 6, 1414, leaving no heirs, and was succeeded by his sister Joan II."
 flavor_nap.453.a: "May he grow to be the king this dynasty deserves."
 flavor_nap.454.title: "The Pope Has Spoken — March on Naples"
 flavor_nap.454.desc: "Pope Urban VI has declared Queen Joan I deposed, accusing her of supporting the Antipope Clement VII and of complicity in the murder of her first husband Andrew of Hungary. He has invested us, Charles of Durazzo, as the rightful King of Naples. Our Hungarian allies stand ready. The road to Naples lies open."
 flavor_nap.454.historical_info: "In 1381, Pope Urban VI declared Joan I of Naples deposed for her support of Antipope Clement VII and invested Charles of Durazzo as King of Naples. Backed by Hungarian troops provided by King Louis I of Hungary, his maternal great-uncle, Charles marched on Naples and entered the city on July 16, 1381. Joan, besieged in Castel dell'Ovo, surrendered and was later strangled at the Castle of Muro Lucano in 1382."
 flavor_nap.454.a: "For God, the Pope, and the House of Durazzo!"
 flavor_nap.455.title: "The Kingdom Turns Against Its Queen"
 flavor_nap.455.desc: "News of Pope Urban VI's investiture of Charles of Durazzo has spread like wildfire across the kingdom. In the countryside and among the lesser nobility, voices rise in favor of the Durazzo claimant. Riots break out, local lords barricade their castles, and royal officers are driven from their posts. Joan's grip on her own kingdom is slipping."
 flavor_nap.455.historical_info: "The Western Schism severely undermined Joan I's legitimacy among the Roman-obedient population of the Kingdom of Naples. Pope Urban VI's support for Charles of Durazzo triggered widespread defections among the Neapolitan nobility, many of whom saw in Charles a more legitimate and capable ruler. This internal fragmentation fatally weakened Joan's ability to resist Charles's invasion in 1381."
 flavor_nap.455.a: "Crush these traitors before they cost us the kingdom."
 flavor_nap.456.title: "The Duke of Durazzo is Dead"
 flavor_nap.456.desc: "Charles of Durazzo has died, leaving behind a kingdom in turmoil and a young wife with a daughter to protect. His brother Louis now steps forward to claim the Duchy of Durazzo and carry on the family's ambitions toward the throne of Naples."
 flavor_nap.456.historical_info: "Charles of Durazzo (1323-1348) died in January 1348, likely a victim of the Black Death that was ravaging Europe. He was succeeded as Duke of Durazzo by his younger brother Louis (1324-1364), who would go on to marry Margaret of Sanseverino and father the future Charles III of Naples."
 flavor_nap.456.a: "Long live Louis, Duke of Durazzo."
 flavor_nap.457.title: "A New Consort for the Queen"
 flavor_nap.457.desc: "With the shadow of Andrew's death behind her and papal absolution secured, Queen Joan turns her attention to the future of the kingdom. Louis of Taranto, a prince of royal blood and a capable commander, has long been close to the court. A marriage between them would strengthen Joan's position, silence her critics, and provide the kingdom with a strong male consort."
 flavor_nap.457.historical_info: "Joan I married Louis of Taranto on August 20, 1347, just months after the murder of her first husband Andrew of Hungary. Louis, a member of the Angevin branch of Taranto, was a skilled military commander who would later lead the defense of Naples against the Hungarian invasion of Louis I. He was crowned co-ruler of Naples in 1352 and effectively governed alongside Joan until his death in 1362."
 flavor_nap.457.a: "Louis of Taranto shall be our king-consort."
 flavor_nap.457.b: "Naples does not need a new consort at this time."
 flavor_nap.458.title: "The King-Consort is Dead"
 flavor_nap.458.desc: "Louis of Taranto, King-Consort of Naples and husband of Queen Joan I, has died in Naples. Though his reign was marked by conflict and controversy, Louis proved himself a capable military commander and a stabilizing force for the kingdom. His death leaves Joan once again alone on the throne, facing the jealousy of her rivals and the instability of the realm."
 flavor_nap.458.historical_info: "Louis of Taranto (1320-1362) died in Naples on May 26, 1362, likely from illness. He had ruled as co-king of Naples alongside Joan I since 1352, having been instrumental in driving out the Hungarian forces of Louis I of Hungary. His death left Joan vulnerable, and she would go on to marry twice more — first James IV of Majorca and then Otto IV of Brunswick — in an attempt to secure the succession and stability of the kingdom."
 flavor_nap.458.a: "Naples mourns the loss of its king-consort."
 flavor_nap.459.title: "A Princess is Born in Zara"
 flavor_nap.459.desc: "Far from the shores of Naples, in the city of Zara on the Adriatic coast, Margaret of Durazzo has given birth to a daughter. The child, baptized Joan, is born under the auspices of the Hungarian court, where her father Charles spends much of his time under the protection of King Louis I. Though born far from Naples, her blood is pure Angevin — and one day, should fate so will it, she may yet sit upon the throne of the Mezzogiorno."
 flavor_nap.459.historical_info: "Joan II of Naples (1371-1435) was born in Zara on June 25, 1371, daughter of Charles III of Naples and Margaret of Durazzo. She spent the first years of her life at the Hungarian court of Louis I the Great, who was grooming Charles as his successor. She returned to Naples in 1376 with her mother. After the death of her brother Ladislaus I in 1414, she became Queen of Naples, ruling until her death in 1435. With her death, the House of Anjou-Durazzo became extinct."
 flavor_nap.459.a: "May she bring glory to the House of Durazzo."
 flavor_nap.461.title: "A New Heir for Naples"
 flavor_nap.461.desc: "The Western Schism has torn the Church apart and left our kingdom vulnerable. With no legitimate heir of our own blood, we must look to the House of Valois-Anjou. Louis of Anjou, son of King John II of France, has long coveted the crown of Naples. By adopting him as our heir, we secure French support and papal legitimacy — but at the cost of alienating the House of Durazzo, who will never accept this arrangement."
 flavor_nap.461.historical_info: "In 1380, facing the turbulence of the Western Schism and lacking a clear successor, Queen Joan I of Naples formally adopted Louis I of Anjou as her heir. This decision directly triggered the conflict with Charles of Durazzo, who had his own claim to the Neapolitan throne through his Angevin bloodline and the support of Pope Urban VI. Louis I invaded Naples in 1382 but died in Bari in 1384 without achieving his goal."
 flavor_nap.461.a: "Let Louis of Anjou be our heir. Naples needs a strong protector."
 flavor_nap.461.b: "We cannot make such a decision lightly. Naples must find another way."
 flavor_nap.500.title: "The [ROOT.GetCountry.GetAdjective] Studium Generale"
 flavor_nap.500.desc: "The ancient university founded in [ShowLocationName('naples')] stands as a beacon of learning in [ShowRegionName('italy_region')]. Scholars of law, medicine, and philosophy walk its halls — the first institution of higher learning founded by a secular sovereign rather than a pope or emperor.\n\nYet many students must travel abroad to [GetCountry('PAP').GetName] or [GetCountry('FLO').GetName] for advanced study. Our advisors urge us to invest in expanding the Studium — or risk losing our finest minds to foreign courts."
 flavor_nap.500.a: "Expand the Studium and endow new chairs."
 flavor_nap.500.b: "Keep learning in the hands of the Church."
 flavor_nap.500.c: "Open the university to laymen and merchants' sons."
 flavor_nap.500.historical_info: "The University of Naples Federico II, founded in 1224 by Holy Roman Emperor Frederick II, was the first university in the world explicitly founded by a secular state. Its purpose was practical: to train administrators and lawyers for the imperial bureaucracy. Over the medieval and early modern period, it fluctuated in importance, sometimes outshone by rival Italian universities, but remained the principal seat of learning in southern Italy."
 STATIC_MODIFIER_NAME_nap_studium_generale: "Studium Generale of Naples"
 STATIC_MODIFIER_NAME_nap_studium_open_to_laity: "Studium Open to the Laity"
 flavor_nap.501.title: "The Silk of Calabria"
 flavor_nap.501.desc: "The mulberry groves of our southern provinces have given rise to a thriving silk industry. [ROOT.GetCountry.GetAdjective] raw silk is highly prized in the markets of [GetCountry('FLO').GetName] and [GetCountry('GEN').GetName], and our weavers in [target_location.GetName] have mastered fine textile production.\n\nA consortium of merchants proposes that we invest directly in expanding the silk production — building new looms, training weavers, and creating a [ROOT.GetCountry.GetAdjective] quality standard that will command premium prices across the Mediterranean."
 flavor_nap.501.a: "Invest in the silk industry — a jewel of the Mezzogiorno."
 flavor_nap.501.b: "Tax the trade and let merchants take the risk."
 flavor_nap.501.c: "Invest in peasant training and weavers' guilds."
 flavor_nap.501.historical_info: "The silk industry of Calabria was one of the economic pillars of the Kingdom of Naples from the late Middle Ages through the early modern period. Calabrian raw silk was exported across the Mediterranean and was essential to the textile industries of Florence, Genoa, and Venice. The industry employed tens of thousands of peasant families and generated substantial customs revenue for the Crown."
 STATIC_MODIFIER_NAME_nap_calabrian_silk_center: "Calabrian Silk Production Center"
 flavor_nap.502.title: "The Merchants of the Levant"
 flavor_nap.502.desc: "The port of [target_location.GetName] buzzes with traders from [ShowReligionGroupName('muslim')] lands. Spices, dyes, cotton, and fine fabrics pass through our docks on their way to northern Europe, and [ROOT.GetCountry.GetAdjective] merchants grow rich as middlemen in this intercontinental trade.\n\nOur ship captains urge us to stake a more direct claim in the Levantine routes — either through diplomatic agreements with eastern trading partners or by outfitting our own trading fleets to operate further east."
 flavor_nap.502.a: "Establish formal trading houses in Levantine ports."
 flavor_nap.502.b: "Extract maximum revenue through port duties."
 flavor_nap.502.c: "Send a royal fleet to protect our merchant ships."
 flavor_nap.502.historical_info: "The Kingdom of Naples maintained active trading relations with the eastern Mediterranean throughout the medieval and early modern period. Neapolitan merchants operated in ports across the Levant and North Africa, trading grain, silk, and wool for eastern spices and luxury goods. The port of Naples was one of the busiest in the Mediterranean, serving as a vital hub in the trade between western Europe and the east."
 STATIC_MODIFIER_NAME_nap_levantine_trade_network: "Levantine Trading Network"
 flavor_nap.503.title: "Brigands in the Mezzogiorno"
 flavor_nap.503.desc: "Reports reach us from [target_location.GetName]: armed bands of [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] — some desperate, some merely criminal — have taken to the hills and are preying on travelers and taxmen alike. The local [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] are either unable or unwilling to suppress them.\n\nThis is no mere nuisance. Brigandage has long been the scourge of the Mezzogiorno, thriving wherever poverty and resentment of authority take root. We must act decisively — or accept that the law runs only as far as our garrison's muskets can reach."
 flavor_nap.503.a: "Send troops and royal officials to restore order."
 flavor_nap.503.b: "Delegate suppression to local barons."
 flavor_nap.503.c: "Look the other way — some problems solve themselves."
 flavor_nap.503.historical_info: "Brigandage was an endemic social phenomenon in the Kingdom of Naples throughout its history, rooted in poverty, feudal exploitation, and the weakness of royal authority in remote mountainous regions. Bands of outlaws — often composed of displaced peasants, deserters, and escaped serfs — operated in the Apennines and Calabria, sometimes with the tacit support of local barons who used them as a tool against royal power."
 STATIC_MODIFIER_NAME_nap_brigandage_ignored: "Brigandage Tolerated"
 flavor_nap.504.title: "The Holy League Against the Turk"
 flavor_nap.504.desc: "His Holiness [GetRuler('PAP').GetName] has called upon all faithful Christian princes to contribute to a great Holy League against the [ShowReligionGroupAdjective('muslim')] fleets that threaten the shores of Christendom. The [ROOT.GetCountry.GetAdjective] fleet would form a vital component of this enterprise.\n\nThe battle will be costly in men and ships, but the prestige of a great Christian victory — and the gratitude of Rome — could define our place in Christendom for a generation."
 flavor_nap.504.a: "Contribute our finest galleys — the faith demands it."
 flavor_nap.504.b: "Send a token force — duty fulfilled, treasury preserved."
 flavor_nap.504.c: "Build a defensive fleet instead — protect our own coasts."
 flavor_nap.504.historical_info: "The Kingdom of Naples contributed significantly to the Holy League that fought at the Battle of Lepanto on October 7, 1571 — one of the largest naval battles in history. The combined Christian fleet, under Don John of Austria, decisively defeated the Ottoman fleet, halting Ottoman naval expansion in the western Mediterranean. Neapolitan galleys and soldiers played an important role in this victory, which was celebrated across Catholic Europe."
 STATIC_MODIFIER_NAME_nap_lepanto_veterans: "Veterans of Lepanto"
 STATIC_MODIFIER_NAME_nap_defensive_fleet: "Defensive Mediterranean Fleet"
 nap_crusade_contribution: "Contributed to the Holy League"
 nap_refused_crusade: "Refused the Crusade Call"
 flavor_nap.505.title: "The Jews of [ShowLocationNameWithNoTooltip('naples')]"
 flavor_nap.505.desc: "The expulsion of the Jews from [GetCountry('SPA').GetName] and its dominions has placed [ROOT.GetCountry.GetName] at a crossroads. A sizable Jewish community has long thrived in [ShowLocationName('naples')] as physicians, financiers, and traders — their skills and capital forming an important thread of the city's commercial fabric.\n\nThe [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] demands expulsion in line with [GetCountry('SPA').GetAdjective] policy. But our merchants warn that driving them out will impoverish the city and drive their wealth to our rivals."
 flavor_nap.505.a: "Expel the Jews — we cannot defy Rome and Madrid."
 flavor_nap.505.b: "Grant them protection — their skills are worth more than theology."
 flavor_nap.505.c: "Impose restrictions but allow them to remain."
 flavor_nap.505.historical_info: "Following the Spanish Expulsion of 1492, the Jews of the Kingdom of Naples faced increasing pressure. Charles V ultimately ordered their expulsion from the kingdom in 1541, after several failed attempts to enforce earlier orders. The Jewish community of Naples had been significant since ancient times, and their expulsion had notable economic consequences for the city's commercial life."
 nap_expelled_jews: "Expelled the Jewish Community"
 nap_harbors_jews: "Harbors the Jewish Community"
 flavor_nap.506.title: "The Mountain of Fire Awakens"
 flavor_nap.506.desc: "The great mountain that looms over [ShowLocationName('naples')] has begun to stir. Thick clouds of ash billow from its peak, and the earth trembles underfoot. Farmers in the surrounding villages flee in panic, abandoning their crops and livestock.\n\nThe citizens of [target_location.GetName] are gripped by terror. The [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] lead processions through the streets, carrying the relics of San Gennaro in hopes of halting the volcano's fury. We must decide how the Crown will respond."
 flavor_nap.506.a: "Open the royal coffers — organize relief and rebuilding."
 flavor_nap.506.b: "Pray with the people — God's will must be endured."
 flavor_nap.506.historical_info: "Mount Vesuvius erupted numerous times during the medieval and early modern period, most notably in 1631 when a major eruption killed thousands and devastated towns around the Bay of Naples. The eruptions of Vesuvius were a constant backdrop to Neapolitan life, shaping popular religiosity — most famously the cult of San Gennaro, whose liquefied blood was believed to protect the city from volcanic catastrophe."
 flavor_nap.507.title: "The Neapolitan School of Music"
 flavor_nap.507.desc: "The streets of [target_location.GetName] ring with music. From the humble street singers of the [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] to the glittering opera houses that rival anything in Venice or Rome, [ROOT.GetCountry.GetName] has become the undisputed capital of musical life in Europe.\n\nOur conservatories train hundreds of musicians from across the continent. Foreign kings send their court composers here to study. Shall we formalize and expand this extraordinary cultural heritage, or let private patronage take its course?"
 flavor_nap.507.a: "Establish a Royal Conservatory — codify our musical supremacy."
 flavor_nap.507.b: "Patronize individual masters — let genius flourish freely."
 flavor_nap.507.c: "Commission sacred music to glorify God and the Church."
 flavor_nap.507.historical_info: "From the late seventeenth century through the eighteenth, Naples was widely regarded as the musical capital of Europe. The Neapolitan conservatories — originally charitable institutions for orphan children — became the most important music schools on the continent, producing such masters as Alessandro Scarlatti, Giovanni Battista Pergolesi, and Domenico Cimarosa. The 'Neapolitan school' of opera was influential across Europe for over a century."
 STATIC_MODIFIER_NAME_nap_musical_conservatory: "Royal Conservatory of Naples"
 flavor_nap.508.title: "The Palace of [ROOT.GetCountry.GetName]"
 flavor_nap.508.desc: "The great architect Luigi Vanvitelli has presented us with a magnificent design: a royal palace at [ShowLocationName('naples')] to surpass even Versailles in grandeur. Vast gardens, cascading fountains, and hundreds of rooms would announce to all of Europe that [ROOT.GetCountry.GetName] is a sovereign power of the first rank.\n\nThe [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] are thrilled by the prospect of a glittering court life. Our treasury officials blanch at the estimates. What shall we build — and how grandly?"
 flavor_nap.508.a: "Build the great palace — [ROOT.GetCountry.GetName] deserves nothing less."
 flavor_nap.508.b: "Build in a more practical spirit — comfort over spectacle."
 flavor_nap.508.c: "We cannot afford such vanities."
 flavor_nap.508.historical_info: "The Royal Palace of Caserta, commissioned by Charles III of Naples and designed by Luigi Vanvitelli, was begun in 1752. Intended to rival Versailles, it became one of the largest palaces in the world, with 1,200 rooms and vast formal gardens fed by a monumental aqueduct. Construction continued for decades and the palace was not completed until after Charles had become King of Spain. It is today a UNESCO World Heritage Site."
 STATIC_MODIFIER_NAME_nap_royal_palace_caserta: "Royal Palace of Caserta"
 flavor_nap.509.title: "Reform of the Port and Customs"
 flavor_nap.509.desc: "The customs system of [target_location.GetName] is a labyrinth of overlapping privileges, tolls, and exemptions inherited from Norman, Angevin, Aragonese, and Spanish rule. Merchants complain that legitimate goods sit for weeks awaiting clearance, while contraband flows freely through the hands of corrupt officials.\n\nOur treasury advisors have proposed a thorough reform of port administration — streamlining duties, breaking the influence of the great trading guilds that have monopolized port access, and creating a modern customs service answerable directly to the Crown."
 flavor_nap.509.a: "Implement a complete customs reform."
 flavor_nap.509.b: "Sell the customs rights to a private consortium."
 flavor_nap.509.c: "Minor improvements — avoid disrupting existing arrangements."
 flavor_nap.509.historical_info: "The customs system of the Kingdom of Naples was a perennial source of controversy throughout the early modern period. The port of Naples handled an enormous volume of Mediterranean trade, and the revenues from customs duties were critical to royal finances. Successive attempts at reform were made, particularly under the Bourbon government, though entrenched interests — both noble and mercantile — frequently frustrated comprehensive change."
 STATIC_MODIFIER_NAME_nap_reformed_customs: "Reformed Customs Administration"
 flavor_nap.510.title: "[vico_scope.GetNameWithNoTooltip] and the Science of History"
 flavor_nap.510.desc: "[vico_scope.GetName] is a professor of rhetoric at our university who has developed a startling new theory: that all human civilizations pass through the same recurring cycles of barbarism, heroism, and reason. He calls his method the #italic Scienza Nuova#! — the New Science.\n\nHis work is unlike anything produced by the French philosophers — it is peculiarly [ROOT.GetCountry.GetAdjective] in its learning, drawing on Roman law, ancient poetry, and the study of myth. Some at court find it brilliant; others find it incomprehensible. The [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] eyes it with suspicion."
 flavor_nap.510.a: "Welcome [vico_scope.GetShortNameWithNoTooltip] to court and sponsor his research."
 flavor_nap.510.b: "Let him teach — but keep him away from court."
 flavor_nap.510.historical_info: "Giambattista Vico (1668–1744) was a Neapolitan philosopher and jurist widely regarded as one of the founders of the philosophy of history and the social sciences. His masterwork, the #italic Scienza Nuova#! (1725, revised 1730 and 1744), proposed a cyclical theory of historical development and pioneered the study of mythology, language, and law as social phenomena. Though largely unrecognized in his own lifetime, Vico's influence on later historians, philosophers, and social scientists was profound."
 flavor_nap.511.title: "The Barons Against the Crown"
 flavor_nap.511.desc: "The great feudal lords of [ROOT.GetCountry.GetName] have once again overstepped their bounds. Reports arrive from the provinces of arbitrary taxation, private courts dispensing their own justice, and noble retinues that amount to private armies beyond Crown authority.\n\nThis is the ancient disease of the Mezzogiorno: a feudal class so deeply entrenched that royal authority dissolves outside the walls of [ShowLocationName('naples')]. We must choose how to reassert the Crown's primacy — by force, by law, or by patient negotiation."
 flavor_nap.511.a: "Strike hard — make an example of the most defiant barons."
 flavor_nap.511.b: "Buy their compliance with new privileges."
 flavor_nap.511.c: "Seek papal support to legitimize crown authority over the barons."
 flavor_nap.511.historical_info: "The conflict between the Crown and the feudal baronage was one of the defining themes of Neapolitan political history from the Angevin period through the Bourbon reform era. The Neapolitan aristocracy controlled enormous territorial lordships, exercised quasi-sovereign powers within their domains, and persistently resisted royal centralization. Successive dynasties — Angevin, Aragonese, Spanish, and Bourbon — each attempted with varying success to curb baronial power."
 nap_papal_feudal_mediation: "Sought Papal Mediation Against Barons"
 flavor_nap.512.title: "The Granary of the Mezzogiorno"
 flavor_nap.512.desc: "The great plains of [target_location.GetName] are among the most productive grain-growing lands in all of Christendom. Each year, vast quantities of wheat are harvested, loaded aboard ships in the ports of Puglia, and exported across the Mediterranean — to [GetCountry('GEN').GetName], [GetCountry('VEN').GetName], and beyond.\n\nThe administration of the Tavoliere di Puglia — the system by which royal rights over the transhumance routes are managed and revenues collected — is due for review. The barons, the peasants, and the merchants all desire different things from us."
 flavor_nap.512.a: "Maximize royal grain revenues — expand the royal granary system."
 flavor_nap.512.b: "Liberalize the grain trade — enrich the peasants and merchants."
 flavor_nap.512.c: "Invest in agricultural infrastructure — drain marshes, build roads."
 flavor_nap.512.historical_info: "The Tavoliere di Puglia, the great plain of Apulia, was administered by a special royal institution called the Dogana delle Pecore di Puglia — the Customs Office of the Apulian Sheep — which managed the seasonal movement of flocks and collected revenues from grazing rights. The region was also a major grain exporter. Control of Apulian agricultural revenues was critical to royal finances and a constant source of tension between the Crown, the baronage, and the merchant class."
 STATIC_MODIFIER_NAME_nap_tavoliere_grain_revenues: "Tavoliere Grain Revenues"
 flavor_nap.513.title: "Barbary Corsairs on the Coast"
 flavor_nap.513.desc: "Dark sails on the horizon. The corsairs of North Africa have struck again: the coastal village of [target_location.GetName] was raided at dawn, its people taken for the slave markets of Tunis and Algiers. Church bells ring in alarm along a hundred miles of coast.\n\nThe terror is ancient and unrelenting. Our coastal villages live in constant fear of the corsair raids. The [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] beg the Crown for protection. We must act — or watch our coastline empty of people."
 flavor_nap.513.a: "Build a chain of watchtowers and coastal forts."
 flavor_nap.513.b: "Station a permanent patrol galley fleet."
 flavor_nap.513.c: "Launch a punitive expedition against the corsair bases."
 flavor_nap.513.historical_info: "Barbary corsair raids on the coasts of the Kingdom of Naples were an enduring menace from the fourteenth through the eighteenth centuries. Entire coastal villages were depopulated by raids, and tens of thousands of southern Italians were enslaved in North Africa over this period. In response, the Kingdom built an extensive network of coastal watchtowers — many still standing today — and maintained galley fleets for coastal defense."
 STATIC_MODIFIER_NAME_nap_coastal_watchtowers: "Coastal Watchtower Network"
 flavor_nap.514.title: "The Onciario: A Modern Land Register"
 flavor_nap.514.desc: "Our treasury advisors have completed a proposal for a radical reform of taxation: the Catasto Onciario, a comprehensive survey of all taxable wealth in the kingdom — noble, clerical, and common alike. For the first time, the immense properties of the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] and [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] would be assessed and taxed on equal terms with those of the [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')].\n\nThe screams of protest from the privileged estates can already be heard. But the logic is undeniable: the burden of taxation has rested on those least able to bear it for far too long."
 flavor_nap.514.a: "Implement the Catasto Onciario — all must pay their share."
 flavor_nap.514.b: "Preserve the fiscal privileges of nobles and clergy."
 flavor_nap.514.c: "A partial reform — extend the survey but exempt the Church."
 flavor_nap.514.historical_info: "The Catasto Onciario was a comprehensive land and wealth register implemented throughout the Kingdom of Naples beginning in 1741, under Charles III. It was one of the most ambitious fiscal reforms of eighteenth-century Europe, extending property assessment to all social classes including the nobility and clergy, who had previously enjoyed sweeping exemptions. Although its implementation was uneven and the privileged estates resisted strenuously, it provided valuable data for royal administration and laid the groundwork for later fiscal reforms."
 STATIC_MODIFIER_NAME_nap_catasto_onciario: "Catasto Onciario in Effect"
 flavor_nap.515.title: "Revolt in Calabria"
 flavor_nap.515.desc: "Word reaches court from the mountains of Calabria: the peasants of [target_location.GetName] have risen. Years of crushing taxation, feudal abuse by the local barons, and chronic hunger have finally broken their patience. Armed bands are roaming the hills, burning manor houses, and blocking the mountain passes.\n\nThe [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] demand swift and brutal repression. But some voices at court counsel restraint — heavy-handed violence has a way of spreading revolt rather than extinguishing it."
 flavor_nap.515.a: "Send the army — make an example of these rebels."
 flavor_nap.515.b: "Offer amnesty — conciliation is cheaper than war."
 flavor_nap.515.c: "Let the barons deal with their own peasants."
 flavor_nap.515.historical_info: "Peasant revolts were a recurring feature of Neapolitan history, driven by the extreme concentration of land ownership in the hands of a small feudal nobility, heavy taxation, and the fundamental vulnerability of the peasant economy to harvest failure. Calabria, the poorest and most isolated of the kingdom's provinces, was a perennial hotbed of rural unrest throughout the medieval and early modern periods."
 STATIC_MODIFIER_NAME_nap_after_calabrian_revolt: "Aftermath of the Calabrian Revolt"
 flavor_nap.516.title: "The Calabrian Amnesty: One Year Later"
 flavor_nap.516.desc.success: "The decision to offer amnesty to the Calabrian rebels has paid dividends. The mountain communities of [target_location.GetName] have returned to something approaching normalcy — harvests are being brought in, the passes are open again, and the most extreme rebel leaders have quietly melted back into the hills. The [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] are not happy, but they are no longer burning things."
 flavor_nap.516.desc.failure: "The amnesty was met with contempt. The Calabrian rebels interpreted our mercy as weakness and have grown bolder, their demands more radical. The barons are furious and the situation on the ground remains deeply unstable. We must decide how to proceed."
 flavor_nap.516.a: "Consolidate the peace — invest in the region."
 flavor_nap.516.b: "Note the lesson and move on."
 flavor_nap.516.historical_info: "Post-revolt pacification in the Mezzogiorno typically required a combination of coercion and limited concession. The most durable settlements usually involved some reduction in immediate fiscal pressure rather than structural reforms, as the feudal system itself was never seriously challenged until the Napoleonic era."
 STATIC_MODIFIER_NAME_nap_southern_pacification: "Southern Pacification"
 flavor_nap.517.title.generic: "Venice Proposes a Naval Accord"
 flavor_nap.517.title.trade_context: "Venice Seeks to Formalize Our Trade Partnership"
 flavor_nap.517.desc: "The envoys of the Most Serene Republic have arrived in [target_location.GetName] bearing a proposal from the Doge [target_character.GetName]: a formal naval accord between our two great maritime states. Venice controls the Adriatic; [ROOT.GetCountry.GetName] commands the Tyrrhenian approaches. Together, we could dominate the central Mediterranean lanes.\n\nThe proposal carries mutual defense obligations and provisions for joint patrols against pirates. It is, in every sense, an attractive arrangement — if we are willing to commit."
 flavor_nap.517.a: "Conclude the defensive league with Venice."
 flavor_nap.517.b: "Our interests do not align closely enough — decline politely."
 flavor_nap.517.c: "A trade agreement suits us better than a military commitment."
 flavor_nap.517.historical_info: "The relationship between Naples and Venice was complex and often competitive, as both states had significant interests in Mediterranean trade and naval supremacy. At various points their interests aligned — particularly against Ottoman expansion — and at others they clashed over trade routes and the control of Adriatic ports. The two republics signed several limited cooperation agreements during the fifteenth and sixteenth centuries."
 nap_venetian_naval_accord: "Venetian Naval Accord"
 nap_refused_venetian_accord: "Refused Venetian Accord"
 flavor_nap.518.title: "The Legacy of the Angelic Doctor"
 flavor_nap.518.desc.a: "A young theologian at the University of Naples has proposed a great project: a complete edition and commentary of the works of Thomas Aquinas — the kingdom's most celebrated son — to be published under royal patronage. The timing is auspicious: the great universities of Europe are hungry for such a work, and our prestige would soar."
 flavor_nap.518.desc.b: "The Dominicans of [target_location.GetName] have petitioned the Crown to endow a new chair of Thomist philosophy at the Studium Generale. The tradition of Aquinas is the finest intellectual inheritance of this kingdom, and with proper royal support it could become the envy of Christendom."
 flavor_nap.518.desc.c: "A visiting scholar has brought new manuscript copies of Aquinas's Summa Theologiae from Rome, annotated by some of the finest minds in the Church. The [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] urges us to sponsor their reproduction and distribution across the kingdom's monasteries and schools."
 flavor_nap.518.a: "Commission a royal edition of the works of Aquinas."
 flavor_nap.518.b: "Support the new chair of philosophy — learning enriches the state."
 flavor_nap.518.c: "We have more pressing expenses — decline the petition."
 flavor_nap.518.historical_info: "Thomas Aquinas (1225–1274) was born in the County of Aquino, in the Kingdom of Sicily, and studied at the University of Naples before entering the Dominican order. His intellectual legacy remained a point of enormous pride for the Kingdom of Naples throughout the medieval and early modern period. The Dominican intellectual tradition was closely tied to the Neapolitan court and the University of Naples, which had been founded specifically to train royal administrators."
 STATIC_MODIFIER_NAME_nap_thomist_intellectual_heritage: "Thomist Intellectual Heritage"
 flavor_nap.519.title: "Scholars of the Fallen Empire Seek Refuge"
 flavor_nap.519.desc.welcomed: "The fall of Constantinople has sent a wave of Greek scholars, artists, and theologians fleeing westward. Several have already arrived in [target_location.GetName], their arms full of manuscripts — Plato, Aristotle, Archimedes — texts unknown in the Latin West. [scope:greek_scholar.GetName], a scholar of remarkable breadth, has specifically requested the patronage of our court. This is an extraordinary opportunity."
 flavor_nap.519.desc.cautious: "The fall of Constantinople has sent a flood of Orthodox refugees westward. Among them are scholars of great learning, but also — our clergy warns — men of suspect theology. [scope:greek_scholar.GetName] seems trustworthy enough, and his manuscripts are undeniably valuable. But the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] is watching closely."
 flavor_nap.519.desc.generic: "The fall of Constantinople in 1453 has sent scholars and refugees pouring into the ports of southern Italy. Among them is [scope:greek_scholar.GetName], a learned man of the former Empire who carries manuscripts of incalculable value and seeks a patron worthy of his knowledge."
 flavor_nap.519.a: "Welcome [scope:greek_scholar.GetShortNameWithNoTooltip] with full royal patronage."
 flavor_nap.519.b: "Accept the manuscripts but keep our distance from this Orthodox scholar."
 flavor_nap.519.c: "Sponsor [scope:greek_scholar.GetShortNameWithNoTooltip] and use this to deepen ties with Rome."
 flavor_nap.519.historical_info: "The fall of Constantinople in 1453 triggered a diaspora of Byzantine Greek scholars westward, particularly to Italy. Naples was an important destination, as the Aragonese court was a major center of humanist learning. Greek manuscripts brought by these refugees played a crucial role in the Italian Renaissance, providing Latin scholars with direct access to Platonic and Neoplatonic philosophy, Greek mathematics, and medical texts that had been lost to Western Europe."
 STATIC_MODIFIER_NAME_nap_greek_intellectual_diaspora: "Greek Intellectual Diaspora"
 nap_orthodox_refugee_tolerance: "Tolerates Orthodox Scholars"
 flavor_nap.520.title: "A Network of Eyes and Ears"
 flavor_nap.520.desc: "A trusted counselor has laid before us a detailed proposal: a royal intelligence service, with paid agents in every major port and court of the Mediterranean. [ROOT.GetCountry.GetName]'s position at the crossroads of east and west makes us uniquely placed to gather information — and to sell it, or to use it to anticipate our enemies' moves.\n\nThe cost is substantial. The risks, if exposed, are considerable. But in the treacherous waters of [ROOT.GetContinent.GetName] diplomacy, knowledge is the sharpest weapon."
 flavor_nap.520.a: "Establish a royal intelligence network — knowledge is power."
 flavor_nap.520.b: "Too risky — we will not meddle in such schemes."
 flavor_nap.520.c: "Focus our intelligence efforts against our most dangerous neighbor."
 flavor_nap.520.historical_info: "The Kingdom of Naples was a significant center of Mediterranean intelligence gathering, particularly during its period under Spanish viceregal rule when it served as a critical node in the Habsburgs' information network. The kingdom's position between the eastern and western Mediterranean made it a natural listening post, and Neapolitan agents were active in the courts of North Africa, the Ottoman Empire, and the Italian city-states."
 STATIC_MODIFIER_NAME_nap_royal_intelligence_network: "Royal Intelligence Network"
 STATIC_MODIFIER_NAME_nap_spy_against_enemy: "Intelligence Operation Against Enemy"
 flavor_nap.521.title: "The Black Death Comes to [ShowLocationNameWithNoTooltip('naples')]"
 flavor_nap.521.desc: "It came from the east, on the Genoese trading ships from Caffa. They say the sailors were already dying when the ships limped into the harbor at [target_location.GetName], throwing the corpses of their dead into the sea as they came. Within days, people were falling ill across the city — the buboes, the blackening skin, the unstoppable death.\n\nNothing in living memory has prepared us for this. The clergy pray without ceasing. The physicians flee. The [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] are dying by the hundreds. This is God's judgment upon the world."
 flavor_nap.521.a: "There is nothing to do but pray and endure."
 flavor_nap.521.historical_info: "The Black Death reached Naples in 1347, having spread westward from the Crimea. Contemporary accounts describe scenes of mass panic, the breakdown of normal social order, and the overwhelming of the city's limited medical and religious resources. Naples lost between one third and one half of its population during the initial wave of the epidemic, which returned periodically throughout the second half of the fourteenth century."
 STATIC_MODIFIER_NAME_nap_black_death_aftermath: "Aftermath of the Black Death"
 flavor_nap.522.title: "The Great Earthquake of the Mezzogiorno"
 flavor_nap.522.desc: "The earth has spoken with a terrible voice. On a December evening, a series of devastating tremors tore through the Apennine hills of [target_location.GetName], collapsing towns, rupturing aqueducts, and sending hillsides sliding into valleys. The death toll is catastrophic. Entire villages have simply ceased to exist.\n\nSurvivors are streaming toward [ShowLocationNameWithNoTooltip('naples')] and any city that still stands, carrying nothing but the clothes they wear and news of communities utterly destroyed. The reconstruction task is immense — and the treasury is already strained."
 flavor_nap.522.a: "Begin emergency reconstruction — the Crown must act."
 flavor_nap.522.b: "We lack the means — each province must recover as it can."
 flavor_nap.522.historical_info: "The earthquake of December 5, 1456 is considered the most destructive seismic event in the history of southern Italy before the modern era. With an estimated magnitude of 7.2, it devastated an enormous area of the Apennine mountains across what is now Campania, Basilicata, and Molise. Contemporary chroniclers estimated the death toll at between 30,000 and 60,000. The disaster severely strained the kingdom's resources and contributed to a prolonged economic contraction in the affected regions."
 STATIC_MODIFIER_NAME_nap_earthquake_reconstruction: "Earthquake Reconstruction Efforts"
 flavor_nap.523.title: "The Schola Medica Salernitana"
 flavor_nap.523.desc: "For centuries, the medical school of Salerno has been the greatest center of medical learning in the Christian world — the place where Arab medicine, Greek learning, and Latin scholarship converge. But its fortunes have declined as newer universities have grown, and its masters seek royal support to restore its former glory.\n\nA delegation of physicians and scholars has arrived at court, bearing the famous Regimen Sanitatis Salernitanum and proposals for a comprehensive renewal of the school's curriculum and facilities. The investment would be considerable. The prestige — and the practical benefits — would be considerable too."
 flavor_nap.523.a: "Fund a full restoration of the Schola Medica — science serves the kingdom."
 flavor_nap.523.b: "Provide modest support — enough to preserve the institution."
 flavor_nap.523.c: "The treasury cannot support such luxuries."
 flavor_nap.523.historical_info: "The Schola Medica Salernitana was the first organized medical school in medieval Europe, active from at least the 10th century and reaching its height in the 11th-12th centuries. Its unique blend of Latin, Arab, Greek, and Hebrew medical traditions made it the principal source of medical education in the western world for several centuries. Located within the Kingdom of Naples, it received periodic royal support and remained a symbol of the kingdom's intellectual heritage throughout the medieval period."
 STATIC_MODIFIER_NAME_nap_salerno_medical_school: "Schola Medica Salernitana"
 flavor_nap.524.title: "The Genoese Bankers Come Calling"
 flavor_nap.524.desc: "Representatives of the great Genoese banking houses — the Grimaldi, the Spinola, the Doria — have arrived in [target_location.GetName] with a proposition: a substantial loan, at terms they describe as 'generous', though our treasury officials are reading the fine print with increasing alarm. The interest rates are punishing, the collateral demanded is extensive, and the repayment schedule is designed to keep us dependent.\n\nBut the coffers are nearly empty, and the kingdom's needs are pressing. Sometimes one borrows from the devil because the alternative is worse."
 flavor_nap.524.a: "Accept the loan — we have no choice."
 flavor_nap.524.b: "Refuse — we will manage our finances without usurious bankers."
 flavor_nap.524.historical_info: "Genoese banking houses were among the most important creditors of the Kingdom of Naples throughout the medieval and early modern period. The relationship was simultaneously symbiotic and exploitative: the kingdom needed credit to fund its chronic military expenditures, while the Genoese needed the kingdom's customs revenues and trading privileges as collateral and return. The terms were almost always unfavorable to Naples, creating a cycle of indebtedness that persisted for centuries."
 STATIC_MODIFIER_NAME_nap_genoese_debt_burden: "Genoese Debt Burden"
 nap_took_genoese_loan: "Took Genoese Loan"
 nap_refused_genoese_loan: "Refused Genoese Loan"
 flavor_nap.525.title: "The Royal Palace of [ShowLocationNameWithNoTooltip('naples')]"
 flavor_nap.525.desc.ambitious: "The old Castel Nuovo is magnificent, but it speaks of a more martial age. [ROOT.GetCountry.GetName] is now a great power, the dominant state of southern Italy, and its royal residence should reflect that status. Architects from across Italy have submitted plans for a new palazzo reale — one that would rival the greatest courts of Europe.\n\nThe cost is staggering. But what cost is too great for the glory of the Crown?"
 flavor_nap.525.desc.modest: "The royal residences of [target_location.GetName] have grown somewhat shabby, and the viceroy's court projects a less than majestic image to visiting ambassadors. A renovation project has been proposed — not a palace on the scale of Versailles, but a dignified upgrade to our existing facilities."
 flavor_nap.525.desc.poor: "Even in these straitened circumstances, our architects have presented a minimum viable proposal for improving the appearance of the royal residence in [target_location.GetName]. It will not be magnificent, but at least our guests will not notice the ceiling plaster falling."
 flavor_nap.525.a: "Build a palace worthy of the Crown of Naples — spare no expense."
 flavor_nap.525.b: "Commission a dignified renovation within our means."
 flavor_nap.525.c: "We cannot afford this vanity — the project is cancelled."
 flavor_nap.525.historical_info: "The Royal Palace of Naples (Palazzo Reale di Napoli) was begun in 1554 under the Spanish viceroy Fernández de Castro, on the orders of Philip III of Spain who was expected to visit — though in the event he never did. The palace became one of the defining monuments of Spanish-era Naples, expressing the grandeur and ambition of viceregal rule while also serving as the principal seat of Neapolitan government."
 STATIC_MODIFIER_NAME_nap_royal_palace_naples: "Royal Palace of Naples"
 flavor_nap.526.title: "The Aragonese Court and the Humanist Legacy"
 flavor_nap.526.desc.humanist: "Since Alfonso the Magnanimous seized [target_location.GetName] in 1442, the court of [ROOT.GetCountry.GetName] has become a magnet for the finest humanist minds of Italy. Latin scholars, Greek refugees, poets, historians, philosophers — all have flocked to a court where learning is valued and generously rewarded.\n\nNow [scope:beccadelli.GetName], the greatest prose stylist of the age, proposes to formalize this tradition: a royal academy, regular patronage stipends, and a library that would become the envy of Europe. This is a chance to make Naples the intellectual capital of the Mediterranean."
 flavor_nap.526.desc.conservative: "[scope:beccadelli.GetName], the Aragonese humanist, has arrived at court with proposals for expanded royal patronage of learning. The [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] eyes the project with suspicion — too many of these humanists read pagan authors with unseemly enthusiasm. But the prestige benefits of such a court cannot be denied."
 flavor_nap.526.a: "Embrace the humanist programme — found the Royal Academy."
 flavor_nap.526.b: "Accept [scope:beccadelli.GetShortNameWithNoTooltip]'s advice but keep the clergy reassured."
 flavor_nap.526.c: "Use this to strengthen the Aragonese cultural connection."
 flavor_nap.526.historical_info: "Antonio Beccadelli (1394–1471), known as 'il Panormita', was a Sicilian humanist who became the central figure of the Aragonese court in Naples after Alfonso I's conquest in 1442. He founded the Accademia Alfonsina, organized the royal library, and recruited humanists from across Italy to the Neapolitan court, transforming it into one of the major centers of Renaissance culture. His protégé Giovanni Pontano would later found the Accademia Pontaniana, which remained active for centuries."
 STATIC_MODIFIER_NAME_nap_aragonese_renaissance_court: "Aragonese Renaissance Court"
 nap_aragonese_cultural_bond: "Shared Aragonese Cultural Heritage"
 flavor_nap.527.title: "Paying for Spain's Wars"
 flavor_nap.527.desc: "The count's ledgers do not lie. Between 1631 and 1636 alone, [ROOT.GetName] sent fifty-three thousand soldiers and three and a half million scudi north to serve the Spanish crown. We fund a third of the military costs in Milan. We garrison Tuscany. We pay an annual subsidy for wars we did not choose and would not win.\n\nFrom 1612 to 1646, our taxes have tripled and our public debt has quintupled — fifty-seven percent of all revenue now goes to interest payments. Spain's wars are crushing us. The viceroy has arrived with another request."
 flavor_nap.527.a: "Sell crown assets to the barons — generate the cash Madrid demands."
 flavor_nap.527.b: "Raise taxes on the population — they will suffer, but the alternative is worse."
 flavor_nap.527.c: "Negotiate quietly with the viceroy to reduce our quota."
 STATIC_MODIFIER_NAME_nap_sold_crown_assets: "Crown Assets Sold to Barons"
 flavor_nap.528.title: "Raiders in the Bay"
 flavor_nap.528.desc: "They came before dawn, slipping past our watch-fires in the hills above [target_location.GetName]. Algerian corsairs — dozens of fast galleys — sailed directly into the bay without opposition. By the time our garrison was roused, they had already taken what they came for.\n\nSeven thousand men, women, and children dragged from the coastal villages and loaded onto ships. By sunrise, the bay was empty. Our warships were nowhere near. Seven thousand of our people are somewhere on the Mediterranean, heading toward the slave markets of Algiers."
 flavor_nap.528.a: "Pay the ransom — every day's delay costs lives."
 flavor_nap.528.b: "Build a coastal tower network — ensure this never happens again."
 flavor_nap.528.c: "We cannot respond — we do not have the means."
 STATIC_MODIFIER_NAME_nap_algerian_raid_coastal_towers: "Coastal Defense Towers"
 flavor_nap.529.title: "The Pestilence of 1656"
 flavor_nap.529.desc: "It began in the eastern quarters, among the tanners and the fishmongers, and within three weeks it had reached every corner of [target_location.GetName]. The physicians cannot agree on the source — a ship from Sardinia, they say, or a merchant from Genoa, or simply God's judgment on the city.\n\nThe dead are too many to bury properly. There are neighborhoods where the living are outnumbered. The city that was once the largest in Italy is emptying. Whatever decisions are made now will shape the kingdom for a generation."
 flavor_nap.529.a: "Seal the port — impose a full sanitary blockade."
 flavor_nap.529.b: "Leave it to the Church — processions and prayers are the true remedy."
 flavor_nap.529.c: "Open emergency hospitals and conscript able-bodied men to handle the dead."
 STATIC_MODIFIER_NAME_nap_plague_quarantine_1656: "Post-Plague Sanitary Measures"
 flavor_nap.530.title: "Masaniello's Republic"
 flavor_nap.530.desc: "His name is Tommaso Aniello — Masaniello — and he sells fish in the Piazza del Mercato. Yesterday he was nobody. Today he stands atop a fountain and the entire city of [target_location.GetName] listens to him.\n\nWhat began as a riot over a new tax on fruit has become something else entirely. The crowds have burned the customs house. The nobles have fled to their country estates. The Spanish viceroy is barricaded in the Castel Nuovo. And now a delegation of burghers has arrived at our gates, demanding that we recognize a free commune of Naples — with French protection already offered."
 flavor_nap.530.a: "Abolish the tax — grant them what they demand before this becomes a war."
 flavor_nap.530.b: "Use Spanish troops to crush the revolt immediately."
 flavor_nap.530.c: "Negotiate — recognize the commune temporarily and wait for the moment to pass."
 flavor_nap.531.title: "The Republic Falls"
 flavor_nap.531.desc: "The French fleet that was supposed to protect the Neapolitan Republic never came in sufficient strength. The Spanish forces, reinforced from Sicily and from the Presidii, have retaken [target_location.GetName] district by district over the past three months.\n\nMasaniello himself was murdered — by his own people, in the end, when his erratic behavior during the days of power turned the crowd against him. The republic is over. The question now is what kind of kingdom we want to be on the other side of this."
 flavor_nap.531.a: "Offer a general amnesty — close the wound as quickly as possible."
 flavor_nap.531.b: "Execute the ringleaders — let the example prevent the next uprising."
 flavor_nap.532.title: "The World's Greatest Stage"
 flavor_nap.532.desc: "The commission has delivered its final plans. What they propose for [target_location.GetName] is not merely a theatre — it is a declaration. A horseshoe of gilded tiers, six rows deep, capable of holding an audience that no other house in the world can match. The architect assures us it will be the largest opera house on earth.\n\nIt will be expensive. It will take years. And it will announce to every court in Europe that [ROOT.GetName] is not merely a kingdom — it is a civilization."
 flavor_nap.532.a: "Build the San Carlo in full — no compromises on scale or splendor."
 flavor_nap.532.b: "Build something worthy but more modest — the treasury has limits."
 flavor_nap.532.c: "Defer — the kingdom needs roads and ports before opera houses."
 STATIC_MODIFIER_NAME_nap_teatro_san_carlo: "Real Teatro di San Carlo"
 flavor_nap.533.title: "The Composer from Pesaro"
 flavor_nap.533.desc: "He arrived in [target_location.GetName] with the reputation of a comet: Gioachino Rossini, twenty-three years old and already the most performed composer in Europe. The impresario Barbaja brought him south as a calculated gamble — give him a contract, a company, and an audience, and see what happens.\n\nWhat has happened, in the weeks since his arrival, is that he has reorganized the entire orchestra, rewritten the libretto of the opening season, and charmed every noblewoman in the city. He has also, we are told, already begun sketching a new opera. He wants to know if the Crown intends to make his stay... permanent."
 flavor_nap.533.a: "Engage him as exclusive court composer — make Naples the center of opera."
 flavor_nap.533.b: "Offer a light patronage — let him work freely without total commitment."
 flavor_nap.533.c: "Decline — we have no need to import foreign composers."
 flavor_nap.534.title: "The British Constitution"
 flavor_nap.534.desc: "Lord William Bentinck has made his position quite clear: the British fleet currently defending Sicily from the French will continue to do so — provided that the Crown accepts a constitutional settlement modelled on the British Parliament. A bicameral legislature. Guaranteed rights. Limits on royal prerogative.\n\nBentinck is not a man who makes idle threats. The fleet is real, the French are real, and we are in Palermo because Naples itself has fallen. The document is on the table. Our signature would make this the most liberal state in southern Europe. Our refusal might cost us the island entirely."
 flavor_nap.534.a: "Accept — British support is worth the constitutional concession."
 flavor_nap.534.b: "Refuse — sovereignty cannot be bargained away under duress."
 flavor_nap.534.c: "Negotiate a watered-down version — enough to satisfy London without binding us."
 STATIC_MODIFIER_NAME_nap_sicilian_constitution_1812: "Sicilian Constitution of 1812"
 nap_accepted_sicilian_constitution: "Accepted Our Constitutional Demand"
 nap_refused_british_pressure: "Defied Our Constitutional Pressure"
 nap_partial_constitution_compromise: "Partially Met Our Constitutional Demand"
 flavor_nap.535.title: "The Rimini Proclamation"
 flavor_nap.535.desc: "Joachim Murat, King of Naples, has addressed himself not to his own subjects but to all Italians. From Rimini he has issued a proclamation calling on the peoples of the peninsula to rise against foreign domination and unite under a single Italian state — with himself, he implies, as its leader.\n\nMetternich has already responded privately: if Murat moves north, Austria will march south. The proclamation has thrilled the liberals and terrified every legitimate monarch in Europe. It has also, in practical terms, committed [ROOT.GetName] to a war we almost certainly cannot win without allies we do not have."
 flavor_nap.535.a: "March north — Italy or death."
 flavor_nap.535.b: "Negotiate with Austria — save the throne at the cost of the proclamation."
 flavor_nap.535.c: "Abandon the kingdom and go into exile."
 STATIC_MODIFIER_NAME_nap_murat_italian_gamble: "Murat's Italian Gamble"
 nap_rimini_proclamation_defiance: "Issued the Rimini Proclamation Against Us"
 nap_murat_capitulated: "Abandoned the Rimini Proclamation"
 flavor_nap.536.title: "Watching the Mountain"
 flavor_nap.536.desc: "The proposal has been on our desk for two years: a permanent scientific station on the slopes of Vesuvius — the first of its kind anywhere in the world — staffed by naturalists who would observe, record, and attempt to understand the mountain's behavior.\n\nThe practical argument is simple: Vesuvius has erupted seven times in the last two centuries. A system of early warning could save thousands of lives. The scientific argument is harder to make to a court that is already suspicious of too much independent inquiry. But the prestige of being first — that argument, at least, is universally understood."
 flavor_nap.536.a: "Found the observatory and open it to European scholars."
 flavor_nap.536.b: "Found it but keep it under military supervision."
 flavor_nap.536.c: "Refuse — Vesuvius answers to God, not to naturalists."
 STATIC_MODIFIER_NAME_nap_vesuvius_observatory: "Osservatorio Vesuviano"
 flavor_nap.537.title: "Gladstone's Letters"
 flavor_nap.537.desc: "The British statesman William Ewart Gladstone visited [target_location.GetName] and inspected our prisons. He has since sent to the Parliament in London a pair of letters describing, in considerable detail, the conditions he observed. He calls the kingdom 'the negation of God erected to a system of government.'\n\nThe letters have been reprinted across Europe. Britain and France have now jointly demanded the release of our political prisoners, framing it as a matter of civilized governance. Their ambassadors are waiting for an answer. Our prisons hold several hundred men. Some are genuine criminals. Many are simply inconvenient."
 flavor_nap.537.a: "Release the prisoners — the diplomatic cost of refusing is too high."
 flavor_nap.537.b: "Refuse — foreign powers have no right to dictate our internal affairs."
 flavor_nap.537.c: "Release some — keep the most dangerous, free the rest."
 STATIC_MODIFIER_NAME_nap_diplomatic_isolation_1856: "British-French Diplomatic Isolation"
 nap_released_political_prisoners: "Released Political Prisoners Under Our Pressure"
 nap_refused_prisoner_release: "Refused to Release Political Prisoners"
 nap_partial_prisoner_release: "Partially Released Political Prisoners"
 flavor_nap.538.title: "The Pietrarsa Works"
 flavor_nap.538.desc: "The site at Pietrarsa, east of [target_location.GetName] along the shore of the bay, has been proposed for a major expansion. The engineers have come from England — the same men who designed the machinery for our railway — and their plans are ambitious: a factory capable of producing iron rails, steam engines, artillery pieces, and naval fittings, all under one roof.\n\nIf built as described, it would be the largest industrial installation in the Italian peninsula. It would also train a generation of Neapolitan engineers who could, eventually, replace the English technicians entirely. The cost is substantial. The argument for it is that without this kind of investment, the kingdom will fall behind Europe permanently."
 flavor_nap.538.a: "Expand Pietrarsa fully — military and civil production."
 flavor_nap.538.b: "Build but open part to private management."
 flavor_nap.538.c: "The cost is too high — defer."
 STATIC_MODIFIER_NAME_nap_pietrarsa_works: "Officina di Pietrarsa"
 flavor_nap.539.title: "Cholera in Palermo"
 flavor_nap.539.desc: "The epidemic arrived on a merchant ship from Malta, they say, though no one is entirely sure. What is certain is that it has spread through [target_location.GetName] with terrible speed. The count of dead, still incomplete, already exceeds thirty thousand for the city alone. In the countryside the situation is worse — no physicians, no medicines, no organization.\n\nThe popular anger has taken a predictable form: rumors that the wealthy poisoned the wells to reduce the poor population. Several doctors have been lynched. The authorities are losing control of the streets. Whatever response we offer must be fast enough to be visible."
 flavor_nap.539.a: "Send physicians and emergency funds from Naples immediately."
 flavor_nap.539.b: "Leave it to local authorities — Naples cannot manage Sicily at this distance."
 flavor_nap.539.c: "Close all Sicilian ports — hard quarantine."
 flavor_nap.540.title: "The Pamphlets"
 flavor_nap.540.desc: "Our censors have confiscated another batch — forty-three printed pages, no printer's mark, found in a box at the university. The content is familiar by now: a denunciation of the Bourbon government, comparisons to Piedmont and Tuscany, calls for a constitution.\n\nThe problem is not these forty-three pages. The problem is that for every pamphlet we find, three more are circulating that we have not. The ideas are spreading regardless of what we do — the question is whether our response makes them spread faster."
 flavor_nap.540.a: "Strengthen censorship — raid printshops and expel suspicious academics."
 flavor_nap.540.b: "Ignore them — censorship only creates martyrs."
 flavor_nap.540.c: "Infiltrate — monitor the networks rather than attacking them openly."
 flavor_nap.541.title: "The Education Question"
 flavor_nap.541.desc: "The statistics are difficult to argue with. For nine million subjects, [ROOT.GetName] maintains two thousand primary schools with sixty-seven thousand pupils and three thousand teachers — most of whom are clergy with the power to veto any appointment they find objectionable.\n\nThe literacy rate is fourteen percent. In Piedmont it is forty. In France it is seventy. One of our ministers has submitted a report arguing that this gap is not a coincidence — that an illiterate population is easier to govern but impossible to industrialize, to tax efficiently, or to mobilize for war. He wants reform. The bishops have sent a counter-proposal."
 flavor_nap.541.a: "Maintain the existing system — the Church educates who needs educating."
 flavor_nap.541.b: "Secular reform — state schools, state-appointed teachers."
 flavor_nap.541.c: "Expand schools but keep them under Church supervision."
 STATIC_MODIFIER_NAME_nap_secular_education_reform: "Secular Education Reform"
 flavor_nap.542.title: "The Siege of Gaeta"
 flavor_nap.542.desc: "The fortified port of Gaeta is the last position we hold. Garibaldi's volunteers have taken [target_location.GetName]. The Piedmontese army has crossed the Volturno. Francesco II has retreated to the walls of this city with the remnants of the royal guard and a number of loyal officers who chose not to surrender.\n\nThe Bourbon flag still flies over Gaeta. A French squadron sits offshore — officially neutral, its presence a faint suggestion of diplomatic possibility. Inside the walls, provisions are running low. The Piedmontese artillery is being positioned. We have perhaps weeks before the situation becomes untenable."
 flavor_nap.542.a: "坚守加埃塔，为荣誉而战，至死方休。"
 flavor_nap.542.b: "Negotiate the surrender — end this without further bloodshed."
 flavor_nap.542.c: "Appeal to Napoleon III — one last chance for French intervention."
 STATIC_MODIFIER_NAME_nap_siege_of_gaeta: "Besieged at Gaeta"
 nap_appeal_to_napoleon_iii_gaeta: "Appealed to Us During the Siege of Gaeta"
 STATIC_MODIFIER_NAME_nap_casa_santa_annunziata: "Casa Santa dell'Annunziata"
 STATIC_MODIFIER_DESC_nap_casa_santa_annunziata: "The Casa Santa dell'Annunziata manages a public deposit box, providing the kingdom's merchants and the poor with a trustworthy institution for the safekeeping of coin."
 STATIC_MODIFIER_NAME_nap_monte_di_pieta: "Monte di Pietà"
 STATIC_MODIFIER_DESC_nap_monte_di_pieta: "Three Neapolitan noblemen have founded a Monte di Pietà offering interest-free loans on collateral. The poor have somewhere to turn other than the usurers."
 STATIC_MODIFIER_NAME_nap_fedi_di_credito: "Fedi di Credito"
 STATIC_MODIFIER_DESC_nap_fedi_di_credito: "The Monte di Pietà issues deposit receipts — fedi di credito — that merchants accept as payment in lieu of coin. The 'girata' allows them to be transferred, creating the kingdom's first paper money."
 STATIC_MODIFIER_NAME_nap_sette_banchi_pubblici: "The Eight Public Banks"
 STATIC_MODIFIER_DESC_nap_sette_banchi_pubblici: "Naples now operates eight public banks — the Pietà, the Poveri, the Annunziata, the Popolo, the Spirito Santo, Sant'Eligio, San Giacomo e Vittoria, and the Santissimo Salvatore. The city has the most sophisticated banking network in Europe."
 STATIC_MODIFIER_NAME_nap_banchi_dopo_masaniello: "Banks Recovering After the Revolt"
 STATIC_MODIFIER_DESC_nap_banchi_dopo_masaniello: "The public banks were raided during the revolt and their reserves depleted. The remaining institutions are slowly reconstituting their capital."
 STATIC_MODIFIER_NAME_nap_banchi_distrutti_masaniello: "Banks Devastated by the Revolt"
 STATIC_MODIFIER_DESC_nap_banchi_distrutti_masaniello: "The revolt left the public banking system in ruins. Several institutions have effectively ceased operations. Commerce in Naples is severely disrupted."
 STATIC_MODIFIER_NAME_nap_banchi_parzialmente_ricostruiti: "Banks Partially Rebuilt"
 STATIC_MODIFIER_DESC_nap_banchi_parzialmente_ricostruiti: "The banking institutions have been partially reconstituted through private initiative, but they lack the depth and reliability they had before 1647."
 STATIC_MODIFIER_NAME_nap_banchi_borbonici_attivi: "Public Banks Under Bourbon Patronage"
 STATIC_MODIFIER_DESC_nap_banchi_borbonici_attivi: "The Bourbon court has made the public banks active instruments of royal policy. They finance the great building projects — Portici, Caserta, the San Carlo — and function as the financial arm of the new regime."
 STATIC_MODIFIER_NAME_nap_banchi_sotto_pressione: "Banks Under Crown Pressure"
 STATIC_MODIFIER_DESC_nap_banchi_sotto_pressione: "The Crown has drawn heavily on the public banks to finance its wars. Reserves are strained and public confidence in the institutions is fragile."
 STATIC_MODIFIER_NAME_nap_banchi_esauriti_guerra: "Banks Exhausted by War Finance"
 STATIC_MODIFIER_DESC_nap_banchi_esauriti_guerra: "The public banks have been drained to fund the anti-French coalition wars. Their reserves are effectively exhausted, and the system faces an existential restructuring."
 STATIC_MODIFIER_NAME_nap_banco_nazionale_ferdinando: "Banco Nazionale di Napoli"
 STATIC_MODIFIER_DESC_nap_banco_nazionale_ferdinando: "Ferdinand IV has merged all public banks into a single Banco Nazionale di Napoli. The experiment is administratively ambitious but politically fragile — the institution has never achieved full autonomous operation."
 STATIC_MODIFIER_NAME_nap_banco_due_sicilie_murat: "Banco delle Due Sicilie"
 STATIC_MODIFIER_DESC_nap_banco_due_sicilie_murat: "Joachim Murat has founded the Banco delle Due Sicilie — a joint-stock company modelled on the Banque de France. It is authorized to issue banknotes and has absorbed all surviving public banking institutions."
 STATIC_MODIFIER_NAME_nap_prestito_dai_banchi: "Public Bank Loan Outstanding"
 STATIC_MODIFIER_DESC_nap_prestito_dai_banchi: "The Crown has borrowed from the public banks to finance a major construction project. The loan is being repaid from tax revenues, but reduces available credit in the system."
 nap_closed_monte_di_pieta: "Closed Our Monte di Pietà"
 flavor_nap.543.title: "The Annunziata's Strongbox"
 flavor_nap.543.desc: "The Casa Santa della Santissima Annunziata has served Naples for generations — an institution that cares for abandoned children, provides dowries for poor girls, and tends to the destitute dying. Its governors are respected men. Its reputation is, as they say, beyond reproach.\n\nThree of those governors have come with a proposal: the Casa Santa already holds coin in trust for the poor. Why not open a proper deposit box — a cassa — to the city's merchants as well? The deposits would fund the institution's charitable work. The merchants would have a safe place for their money. And the poor of Naples would benefit from both.\n\nThe year is 1463. No such institution exists anywhere in the Italian peninsula. They are asking for permission to create something that has never existed before."
 flavor_nap.543.a: "Support the cassa and guarantee deposits with royal authority."
 flavor_nap.543.b: "Permit it, but the Crown takes no responsibility for their funds."
 flavor_nap.543.c: "Refuse — the poor's alms should not become merchants' capital."
 flavor_nap.544.title: "Three Noblemen Against the Usurers"
 flavor_nap.544.desc: "Their names are Aurelio Paparo, Gian Domenico di Lega, and Nardo di Palma Castiglione. They are not churchmen. They are not theologians. They are Neapolitan noblemen who have watched, for years, the money-lenders of [target_location.GetName] destroy the lives of the poor — charging interest so high that a single bad harvest means losing everything.\n\nTheir solution is practical: a public lending institution that will accept articles of value as collateral and lend money against them at no interest. No profit. No exploitation. The institution will sustain itself on voluntary donations and on the honor of its founders.\n\nThey are asking for a viceregal charter to operate legally. The usurers of the city are already sending petitions against it."
 flavor_nap.544.a: "Grant the charter — issue a viceregal bando recognizing the Monte."
 flavor_nap.544.b: "Let them operate, but without formal recognition."
 flavor_nap.544.c: "Refuse — interest-free loans distort the natural price of money."
 flavor_nap.545.title: "A Receipt Worth More Than Coin"
 flavor_nap.545.desc: "A proposition has arrived from the directors of the Monte di Pietà. It is, on the surface, modest: when a merchant deposits coin with the Monte, he receives a written receipt — a fede — confirming the deposit. The Monte's directors now wish to allow these receipts to be transferred: the merchant can sign them over to a creditor, who can use them as payment to someone else, who can eventually redeem them at the Monte for coin.\n\nThe director calls this the 'girata.' The proposal makes the fede di credito equivalent to money — perhaps more reliable than money, since the Monte is more trustworthy than most mints in [ROOT.GetName].\n\nThe implications are considerable. This is, in effect, the creation of paper money."
 flavor_nap.545.a: "Authorize the girata — let the fedi circulate as money."
 flavor_nap.545.b: "Authorize them only for large merchants — not for general circulation."
 flavor_nap.545.c: "Refuse — only the Crown's coin should have legal force."
 flavor_nap.546.title: "The Banks of the City of God"
 flavor_nap.546.desc: "They are named after saints. They are governed by priests and noblemen. They distribute alms on feast days and lend money to the city's artisans at rates that would make a Florentine banker weep.\n\nIn the half-century since the Monte di Pietà opened its doors, six more institutions have followed its example: the Poveri, the Annunziata, the Popolo, the Spirito Santo, Sant'Eligio, San Giacomo e Vittoria. Each is slightly different — different rules, different clientele, different degrees of royal oversight. Together they have created something unique in Europe: a city where eight public banks operate simultaneously, their fedi di credito circulating through every market and counting-house in [target_location.GetName].\n\nThe question now is what relationship the Crown wants with this system."
 flavor_nap.546.a: "Actively encourage the banks' growth — make them instruments of royal policy."
 flavor_nap.546.b: "Permit them but assert strict viceregal oversight."
 flavor_nap.546.c: "Halt the proliferation — the Pietà is sufficient."
 flavor_nap.547.title: "Madrid's Hand in the Strongbox"
 flavor_nap.547.desc: "The accounts are unambiguous. From 1631 to 1636 alone, [ROOT.GetName] dispatched fifty-three thousand soldiers and three and a half million scudi to support the Spanish war effort. Public debt has quintupled. Fifty-seven percent of revenue now goes to service interest payments.\n\nThe viceroy has arrived with a message from Madrid: the Crown requires a further loan from the public banks. The amount is substantial. The directors of the banks — the governors of the Pietà, the Poveri, the Annunziata, the Spirito Santo — are standing outside this room, and their faces are not encouraging.\n\nThe banks were always understood to be available to the Crown in time of need. This, it would appear, is time of need."
 flavor_nap.547.a: "Force the banks to lend — their public function demands it."
 flavor_nap.547.b: "Request voluntary loans at modest rates of interest."
 flavor_nap.547.c: "Refuse to burden the banks — find other revenue."
 flavor_nap.548.title: "The Banks Are Being Stormed"
 flavor_nap.548.desc: "It began at the customs house, as these things always do. By midday the crowd had grown beyond anything the city watch could manage. By evening, Masaniello — the fishmonger, the nobody, the voice of the Piazza del Mercato — was leading twenty thousand people through the streets of [target_location.GetName].\n\nThe banks came next. The crowds know, with the particular clarity of the very poor, where the money is. The Monte della Pietà. The Banco del Popolo. The Banco dell'Annunziata. Their doors are being broken down as this message is delivered. The governors are fleeing out the back.\n\nThe accumulated deposits of generations — coin, jewelry, pledged goods, fedi di credito — are being taken or destroyed."
 flavor_nap.548.a: "Deploy troops to protect the banks — save what reserves can be saved."
 flavor_nap.548.b: "Do not intervene — let the crowd exhaust itself on the strongboxes."
 flavor_nap.548.c: "The vaults were already emptied last night — we anticipated this."
 flavor_nap.549.title: "Rebuilding After the Storm"
 flavor_nap.549.desc: "Three years have passed since the revolt. The bodies have long been cleared from the streets of [target_location.GetName]. The Spanish have reasserted control. Masaniello is dead — killed, in the end, by the same crowd that had made him king for a week.\n\nWhat remains of the public banking system is a question that the governors of what survives are pressing us to answer. Some institutions are functioning again on reduced reserves. Others have not reopened. The city's merchants have been conducting transactions with promissory notes of uncertain value.\n\nThe system will not rebuild itself. Someone must decide what it should look like."
 flavor_nap.549.a: "Invest public funds to rebuild the banking system fully."
 flavor_nap.549.b: "Allow private reconstruction to proceed at its own pace."
 flavor_nap.550.title: "New Life for the Old Banks"
 flavor_nap.550.desc: "Naples has a new king for the first time in over two centuries — one who actually lives here, governs from here, and seems to regard the city not as a province to be taxed but as a capital to be built.\n\nCharles of Bourbon is thirty-eight years old and in a hurry. The Reggia di Portici is already rising. The plans for Caserta are on his desk. The Teatro San Carlo is being commissioned. All of this requires money, and the public banks of [target_location.GetName] — still only partially recovered from the disasters of the previous century — are the deepest wells available.\n\nThe directors of the surviving banks have requested an audience to discuss the role they should play in the new reign."
 flavor_nap.550.a: "Use the banks as active instruments of Bourbon building policy."
 flavor_nap.550.b: "Keep the banks independent — their credibility depends on autonomy."
 flavor_nap.551.title: "The Cost of Coalition"
 flavor_nap.551.desc: "The Revolution has reached the Neapolitan border, in spirit if not yet in body. Ferdinand IV has decided: [ROOT.GetName] joins the coalition against France. The army must be equipped. The navy must be readied. The fortifications along the coast must be reinforced.\n\nThere is, as usual, a gap between what must be done and what the treasury holds. The directors of the public banks have been summoned. Their accounts are not empty — but they are not deep enough to absorb what the king requires without consequences that all parties can see coming.\n\nThe French ambassador, still present in the city, has requested an immediate audience. He is presumably not here to offer help."
 flavor_nap.551.a: "Draw down the bank reserves fully — war takes precedence."
 flavor_nap.551.b: "Take only partial reserves — preserve some public confidence."
 flavor_nap.551.c: "Leave the banks untouched — find other revenue sources."
 flavor_nap.552.title: "One Bank for All Naples"
 flavor_nap.552.desc: "The proposal from our financial counselors is, on its face, elegant: instead of eight separate institutions — each with its own directors, its own rules, its own reserves, its own jealously guarded privileges — we unify them into a single Banco Nazionale di Napoli. One set of accounts. One board. One institution answerable directly to the Crown.\n\nThe arguments in favor are those of the Enlightenment: rationalization, efficiency, legibility. The arguments against are those of history: the eight banks have survived for two centuries precisely because their plurality made the whole system more resilient.\n\nThe directors of each bank have submitted separate memoranda. Predictably, none of them favor absorption."
 flavor_nap.552.a: "Proceed with unification — found the Banco Nazionale di Napoli."
 flavor_nap.552.b: "Attempt a merger while preserving institutional autonomy."
 flavor_nap.552.c: "Abandon the idea — plurality is a feature, not a flaw."
 flavor_nap.553.title: "The Bank of the Two Sicilies"
 flavor_nap.553.desc: "Joachim Murat has spent two years governing a kingdom he inherited from his brother-in-law's political calculations. He is an administrator of the Napoleonic school: he believes in codified law, unified institutions, and the power of example.\n\nHis proposal for the banking system is decisive: abolish the surviving remnants of the old public banks and replace them with a single joint-stock institution modelled directly on the Banque de France. It will be called the Banco delle Due Sicilie. It will be authorized to issue banknotes. Its capital will be provided by private shareholders and the state in equal parts.\n\nThe Bourbons will not appreciate it when they return. But Murat is not planning for the Bourbon return."
 flavor_nap.553.a: "Found the Banco delle Due Sicilie — joint-stock, modelled on the Banque de France."
 flavor_nap.553.b: "Found it, but as a public foundation rather than a joint-stock company."
 flavor_nap.554.title: "A Loan for the Kingdom's Glory"
 flavor_nap.554.desc.caserta: "The architects have delivered their plans. The new royal palace will be the largest building in Europe — larger than Versailles, larger than the Escorial. It will require an army of workers, an ocean of stone, and a sum of money that the treasury cannot currently provide in full without borrowing.\n\nThe directors of the public banks of [target_location.GetName] are waiting. Their institutions were built for exactly this kind of moment: large projects that require patient capital and a lender that will not demand repayment before the foundation is even laid."
 flavor_nap.554.desc.flotta: "Our admirals have returned from a survey of the harbor facilities. The verdict is damaging: the kingdom's naval infrastructure is decades behind its neighbors. New docks, new shipyards, new wharves — the cost is substantial. The directors of the public banks have indicated they can provide a medium-term loan at rates that reflect the institution's charitable origins."
 flavor_nap.554.desc.generic: "A major investment in the kingdom's infrastructure has been proposed. The public banks of [target_location.GetName] are the natural source of credit for an undertaking of this scale. The terms they are offering are modest by the standards of private lenders."
 flavor_nap.554.a: "Take the bank loan — use public credit for public works."
 flavor_nap.554.b: "Finance directly from the treasury — avoid the debt."
 flavor_nap.554.c: "Defer — this is not the moment."
 flavor_nap.555.title: "The Run on the Banks"
 flavor_nap.555.desc: "It starts with rumors, as these things always do. Someone in the Piazza del Mercato says the Monte della Pietà has run out of coin. Someone else says they tried to redeem a fede di credito and were told to come back next week.\n\nBy afternoon, there are queues outside every public bank in [target_location.GetName]. Merchants and artisans and small-holders, all holding their fedi di credito and demanding coin in exchange. The directors are sending messengers to the palace. The banks are not, technically, insolvent — but if everyone tries to withdraw at once, no institution on earth can honor every claim simultaneously.\n\nSomething must be done in the next few hours or the confidence that makes the system work will be gone."
 flavor_nap.555.a: "Inject royal coin into the banks — guarantee deposits personally."
 flavor_nap.555.b: "Declare a temporary moratorium on redemptions."
 flavor_nap.555.c: "Do nothing — the market corrects itself."
 flavor_nap.556.title: "A Payment Through the Bank"
 flavor_nap.556.desc.caravaggio: "Among the papers that have arrived from the Banco del Popolo's registrar is a routine payment order — but the name of the recipient is anything but routine: Michelangelo Merisi da Caravaggio, currently working in [target_location.GetName] after fleeing Rome under a death sentence. The payment is from a Neapolitan nobleman commissioning an altarpiece for his family chapel.\n\nThe bank's registrar has flagged it for our attention. Caravaggio is a wanted man. He is also, by general agreement, the greatest living painter in Europe. The commission has been submitted. Does the Crown wish to add a second, larger commission while the opportunity presents itself?"
 flavor_nap.556.desc.gentileschi: "The registrar of the Banco dell'Annunziata has brought an unusual matter to our attention: Artemisia Gentileschi, the painter — a woman, which is itself remarkable — has been commissioned by a Neapolitan nobleman for a large-scale work depicting Judith. She has deposited the advance payment at the bank and is actively seeking further patronage from the court.\n\nShe comes with a reputation that precedes her in every sense: technically formidable, personally difficult, and the subject of a celebrated lawsuit in Rome that she won. Her work is, by any fair assessment, extraordinary."
 flavor_nap.556.desc.giordano: "The Banco dello Spirito Santo has processed a payment to the painter Luca Giordano for a series of ceiling frescoes in a nobleman's palazzo. Giordano's speed of execution is legendary — the Romans call him 'Luca fa presto.' He completes in weeks what other painters take years to finish.\n\nThe commission was private, but the nobleman's secretary has let it be known that the painter is available for larger, more public work — and that the fees he asks, given the speed with which he works, amount to less per square foot than any comparable artist in the city."
 flavor_nap.556.a: "Commission the work through the bank — a formal, guaranteed payment."
 flavor_nap.556.b: "Leave it to private patrons — the court has other priorities."
 STATIC_MODIFIER_NAME_nap_ospedale_incurabili: "Ospedale degli Incurabili"
 STATIC_MODIFIER_DESC_nap_ospedale_incurabili: "The Ospedale degli Incurabili treats the city's most desperate cases — syphilis, leprosy, epilepsy. Founded by Maria Longa after a vision of Saint Francis, it is the first institution in Europe dedicated entirely to diseases formerly considered beyond medicine's reach."
 STATIC_MODIFIER_NAME_nap_spezieria_incurabili: "Spezieria degli Incurabili"
 STATIC_MODIFIER_DESC_nap_spezieria_incurabili: "The Ospedale's pharmacy — open to the public — and its Medicinal Garden have become among the foremost centers of pharmaceutical science in Europe. Remedies are prepared, sold, and studied here that are unavailable anywhere else in the kingdom."
 STATIC_MODIFIER_NAME_nap_albergo_poveri: "Albergo dei Poveri"
 STATIC_MODIFIER_DESC_nap_albergo_poveri: "The largest welfare institution in Europe — or intended to be. Designed by Ferdinando Fuga on the orders of Charles of Bourbon, the Albergo dei Poveri was conceived to house eight thousand paupers. In practice, only a fifth was ever completed; the rest remains the most magnificent architectural ambition in the kingdom's history."
 STATIC_MODIFIER_NAME_nap_real_accademia_militare: "Real Accademia Militare — La Nunziatella"
 STATIC_MODIFIER_DESC_nap_real_accademia_militare: "Opened on 18 November 1787 in the former Jesuit novitiate of Pizzofalcone, the Nunziatella trains the kingdom's future officers in mathematics, engineering, military science, and the humanities. In 1792 the writer Giuseppe Maria Galanti declared its educational model unparalleled anywhere in Europe."
 STATIC_MODIFIER_NAME_nap_accademia_soppressa: "Nunziatella Suppressed"
 STATIC_MODIFIER_DESC_nap_accademia_soppressa: "Following the participation of its professors and cadets in the revolutionary movement of 1799, Ferdinand IV has ordered the Nunziatella closed for 'repeated and manifest proof of failure to answer the benevolent aims of the king.'"
 STATIC_MODIFIER_NAME_nap_istoria_civile_published: "Istoria Civile del Regno di Napoli"
 STATIC_MODIFIER_DESC_nap_istoria_civile_published: "Pietro Giannone's four-volume history of the Kingdom of Naples has been published — and immediately condemned by the Church, which has placed it on the Index and excommunicated its author. The work is being read across Protestant Europe and has made Giannone one of the most famous — and most controversial — historians in the world."
 STATIC_MODIFIER_NAME_nap_genovesi_economics: "Genovesi's Chair of Economics"
 STATIC_MODIFIER_DESC_nap_genovesi_economics: "Antonio Genovesi holds the first university chair of political economy in Europe — funded by Bartolomeo Intieri, conducted in Italian rather than Latin. His lectures on commerce and civil economy are shaping an entire generation of Neapolitan reformers."
 STATIC_MODIFIER_NAME_nap_galiani_paris: "Galiani in Paris"
 STATIC_MODIFIER_DESC_nap_galiani_paris: "Ferdinando Galiani serves as secretary of the Neapolitan embassy in Paris, where he has become the most popular foreign presence in the salons of the philosophes. His wit, his learning, and his economic arguments have made Naples unexpectedly fashionable among the Parisian intelligentsia."
 STATIC_MODIFIER_NAME_nap_galiani_napoli: "Galiani at Court"
 STATIC_MODIFIER_DESC_nap_galiani_napoli: "Ferdinando Galiani advises the Crown on monetary policy. His treatise Della Moneta — written at twenty-three — remains one of the most sophisticated analyses of currency ever produced. The court benefits from his counsel on a daily basis."
 STATIC_MODIFIER_NAME_nap_scienza_legislazione: "La Scienza della Legislazione"
 STATIC_MODIFIER_DESC_nap_scienza_legislazione: "Gaetano Filangieri's multi-volume masterwork on the science of legislation proposes the rational reform of every aspect of the state — criminal law, agriculture, education, feudal privilege. Condemned by the Inquisition in 1784, it has become one of the most widely read political texts in Europe. Benjamin Franklin read it before drafting the American Constitution."
 STATIC_MODIFIER_NAME_nap_pagano_giudice: "Pagano as Magistrate"
 STATIC_MODIFIER_DESC_nap_pagano_giudice: "Mario Pagano serves as a judge of the Gran Corte della Vicaria, applying the rationalist principles of his legal philosophy to the kingdom's criminal courts. His rulings on the rights of the accused are among the most progressive in Europe."
 STATIC_MODIFIER_NAME_nap_pagano_riforma_penale: "Pagano's Criminal Law Reform"
 STATIC_MODIFIER_DESC_nap_pagano_riforma_penale: "Mario Pagano has been tasked with reforming the kingdom's criminal code. Influenced by Beccaria and by his own philosophical work, he is proposing the abolition of torture, limits on preventive imprisonment, and uniform sentencing standards."
 STATIC_MODIFIER_NAME_nap_martiri_della_repubblica: "Memory of the Martyrs"
 STATIC_MODIFIER_DESC_nap_martiri_della_repubblica: "The execution of the Partenopean intellectuals has not closed the wound — it has opened it wider. The names of Pagano, Cirillo, Baffi, and their companions are becoming symbols. The educated classes remember."
 STATIC_MODIFIER_NAME_nap_della_porta_legacy: "Della Porta's Architectural Legacy"
 STATIC_MODIFIER_DESC_nap_della_porta_legacy: "The influence of Giacomo della Porta — who completed the dome of St. Peter's and designed the façade of the Gesù — is being felt in the kingdom's new building projects. His structural innovations have reached Naples through the architects he trained."
 nap_founded_incurabili: "Founded the Ospedale degli Incurabili"
 nap_refused_incurabili: "Refused the Ospedale degli Incurabili"
 nap_tolerated_giannone: "Tolerated Giannone's Publication"
 nap_condemned_giannone: "Condemned Giannone's History"
 nap_protected_filangieri: "Protected Filangieri from the Index"
 nap_galiani_diplomat: "Galiani's Diplomatic Presence"
 STATIC_MODIFIER_NAME_nap_master_architect: "Master Architect"
 STATIC_MODIFIER_DESC_nap_master_architect: "This character has mastered the architectural principles of the Roman school — the double-shell dome, the two-register church façade, the integration of sculpture and structure."
 STATIC_MODIFIER_NAME_nap_radical_historian: "Radical Historian"
 STATIC_MODIFIER_DESC_nap_radical_historian: "This character has written a history of the kingdom that traces ecclesiastical power to its worldly, political origins. The Church considers him an enemy. The Enlightenment considers him a hero."
 STATIC_MODIFIER_NAME_nap_first_economics_chair: "First Professor of Economics in Europe"
 STATIC_MODIFIER_DESC_nap_first_economics_chair: "This character holds the first university chair of political economy ever established — teaching in the vernacular, opening the science of wealth to students who would otherwise never have encountered it."
 STATIC_MODIFIER_NAME_nap_galiani_economist: "Monetary Theorist"
 STATIC_MODIFIER_DESC_nap_galiani_economist: "This character's treatise on money — written at twenty-three — challenged every received assumption about currency and value. Adam Smith read it. The philosophes quoted it. The European monetary debate has not been the same since."
 STATIC_MODIFIER_NAME_nap_filangieri_jurist: "Enlightenment Jurist"
 STATIC_MODIFIER_DESC_nap_filangieri_jurist: "This character is writing a systematic science of legislation — an attempt to replace the arbitrary, feudal, ecclesiastical patchwork of existing law with a rational framework built on natural right and the happiness of individuals."
 STATIC_MODIFIER_NAME_nap_constitutional_theorist: "Constitutional Theorist"
 STATIC_MODIFIER_DESC_nap_constitutional_theorist: "This character has developed the theoretical foundations of a republican constitution. His work on the rights of the accused, the separation of powers, and the sovereignty of the people is the most radical produced in the kingdom."
 STATIC_MODIFIER_NAME_nap_military_reformer: "Military Reformer"
 STATIC_MODIFIER_DESC_nap_military_reformer: "This officer spent two years visiting European military academies and has returned with a vision for the complete transformation of how the kingdom trains its officers — in mathematics, engineering, philosophy, and the art of war simultaneously."
 flavor_nap.557.title: "The Lady of the Incurables"
 flavor_nap.557.desc: "Her name is Maria Longa. She is a Flemish noblewoman — wealthy, widowed, and recently recovered from an illness that her physicians had declared beyond hope. She says she was healed by a vision of Saint Francis.\n\nShe has come before the court with a petition: she wishes to found a hospital in [target_location.GetName] specifically for those suffering from the diseases for which medicine has no cure — syphilis, leprosy, epilepsy, plague. The diseases of the poor. The diseases that other hospitals refuse.\n\nShe is asking for a plot of land on the Pendino, royal approval, and nothing else. She will fund it herself. She asks only for the kingdom's blessing and the right to build."
 flavor_nap.557.a: "Grant her the land and give the institution royal recognition."
 flavor_nap.557.b: "Permit the foundation as a private institution — no royal involvement."
 flavor_nap.557.c: "Refuse — the incurably ill are in God's hands, not medicine's."
 flavor_nap.558.title: "The Medicine Garden"
 flavor_nap.558.desc: "The Ospedale degli Incurabili has developed something the physicians call the Giardino Medicinale — a cultivated garden of medicinal plants attached to the hospital's pharmacy. The Spezieria, already open to the public for the sale of remedies, wishes to expand it into a formal laboratory and teaching space.\n\nThe apothecary who runs it is proposing what amounts to the first publicly accessible school of pharmaceutical science in the kingdom. He wants to train apprentices, document what the plants actually do rather than what ancient authorities say they do, and share the results.\n\nThe proposal is modest in cost. The implications, if it works as described, are considerable."
 flavor_nap.558.a: "Invest in the Medicinal Garden and pharmaceutical school."
 flavor_nap.558.b: "Allow it to open to the public with self-funding through remedy sales."
 flavor_nap.559.title: "A Palace for the Poor"
 flavor_nap.559.desc: "The architect Ferdinando Fuga has brought the plans. They are extraordinary.\n\nThe building would be the largest welfare institution ever constructed — a palace for the poor. Eight thousand people: beggars, vagabonds, orphans, the elderly, the destitute, all gathered from the streets of [target_location.GetName] and given shelter, work, and instruction. The structure on Piazza Carlo III would have a façade two hundred and seventy meters long — longer than any palace in Europe.\n\nFuga says he can begin construction immediately. The cost of the full project is, to be candid, very large. But this would be the most visible proof in Europe that the Bourbon monarchy governs not just for the nobility, but for every one of its subjects."
 flavor_nap.559.a: "Build the full vision — eight thousand places, the greatest welfare building in Europe."
 flavor_nap.559.b: "Build a scaled version — still impressive, but financially sustainable."
 flavor_nap.559.c: "Approve the project but defer construction — the treasury is not ready."
 flavor_nap.560.title: "The Academy on the Hill"
 flavor_nap.560.desc: "The hill of Pizzofalcone rises above [target_location.GetName] like a prow. From its heights one can see the bay, the islands, and, on clear days, the outline of Sicily. The Jesuits built their novitiate there in 1573; when the Order was suppressed in 1767, the building passed to the Crown and sat largely empty.\n\nTenente Giuseppe Parisi has returned from two years visiting the great military academies of Europe — the École Militaire in Paris, the Military Academy of Vienna, the school at Woolwich. He has brought back detailed reports and a conviction: the kingdom needs a single, unified institution to train its officers, combining military science with mathematics, engineering, philosophy, and character formation.\n\nParisi proposes the old Jesuit novitiate as the site. On 18 November, if the decision is made today, the Real Accademia Militare could open its first course."
 flavor_nap.560.a: "Found the Nunziatella in the former Jesuit novitiate on Pizzofalcone."
 flavor_nap.560.b: "Found the academy with a more conservative, purely military curriculum."
 flavor_nap.561.title: "The Academy Has Chosen Its Side"
 flavor_nap.561.desc: "The list of names on the desk is longer than expected.\n\nProfessors Clino Roselli, Pasquale Baffi, Michele Granata — all of the Nunziatella, all patriots of the Republic. Among the cadets, dozens joined the revolutionary militia when the French arrived. The academy that was built to defend the kingdom has, it appears, spent the last decade training its finest minds to overthrow it.\n\nMinister Acton is demanding the institution be suppressed immediately. The Academy's commander argues that the institution itself is not the problem — that the ideas would have spread regardless, and that destroying the finest military school in Europe because some of its graduates chose wrong is a mistake that cannot be undone."
 flavor_nap.561.a: "Suppress the Nunziatella — 'repeated proof of failure to answer the King's aims.'"
 flavor_nap.561.b: "Punish those responsible but preserve the institution."
 flavor_nap.561.c: "Amnesty all — the ideas cannot be punished with the sword."
 flavor_nap.562.title: "The Architect of the Dome"
 flavor_nap.562.desc: "Word has reached the court about the man who completed the great dome of St. Peter's after Michelangelo's death — the architect Giacomo della Porta. His collaborator Domenico Fontana, who worked alongside him in Rome, has now been working in [target_location.GetName] for some years, and speaks of Della Porta in terms that leave no doubt: there is no finer builder of churches and public spaces in the world.\n\nDella Porta is old now, past seventy, and working near the end of his life on a great villa in the hills above Rome. But he has indicated, through intermediaries, that the right commission from the right patron might still draw him south.\n\nThe kingdom has been building rapidly. The new churches in [target_location.GetName] are adequate. They are not great. A commission from Giacomo della Porta would change that."
 flavor_nap.562.a: "Commission him to design the new cathedral façade."
 flavor_nap.562.b: "Invite him as master architect and teacher for Neapolitan builders."
 flavor_nap.562.c: "Decline — the kingdom has architects enough."
 flavor_nap.563.title: "The Book That Shook Rome"
 flavor_nap.563.desc: "For twenty years Pietro Giannone has been working in the law courts of [target_location.GetName], compiling sources, reading in every archive he could access, building, volume by volume, what he calls the Istoria Civile del Regno di Napoli.\n\nThe book has just been published in four volumes. It is, by any fair assessment, remarkable — the most comprehensive history of this kingdom ever written, tracing the accumulation of ecclesiastical power through the centuries and demonstrating, with primary sources, that much of what the Church claims as divine right is in fact the product of specific historical decisions made by specific popes for specific political reasons.\n\nThe Archbishop of Naples is already preparing a formal condemnation. Rome is drafting a response. The book will be on the Index within months unless we act. Giannone is asking for royal protection."
 flavor_nap.563.a: "Protect Giannone — the state's history belongs to the state, not the Church."
 flavor_nap.563.b: "Take no position — let the Church act as it will."
 flavor_nap.563.c: "Condemn the work — our relations with Rome matter more."
 flavor_nap.564.title: "The Cobbler's Son and the Chair of Economy"
 flavor_nap.564.desc: "He was born in Castiglione, in Salerno province, the son of a shoemaker. He came to [target_location.GetName] as a young priest, heard the last lectures of the aged Giambattista Vico, and has spent the twenty years since arguing with every received idea in natural philosophy, theology, and now economics.\n\nBartolomeo Intieri — a Tuscan merchant who has made a fortune from our grain trade — has offered to fund, from his own pocket, a permanent university chair for Antonio Genovesi. The conditions: Genovesi must hold the chair, and he must teach in Italian rather than Latin, so that the sons of merchants and artisans can follow.\n\nNo university in Europe has ever had a chair dedicated entirely to political economy. If we accept Intieri's offer, we will be the first."
 flavor_nap.564.a: "Accept Intieri's offer and found the chair — the first in Europe."
 flavor_nap.564.b: "Let Genovesi lecture informally without an official position."
 flavor_nap.564.c: "Refuse — theology must remain the core of university education."
 flavor_nap.565.title: "The Abbé of All Parties"
 flavor_nap.565.desc: "He is small, quick, dark-eyed, and twenty-three years old. He has just written what may be the most sophisticated analysis of monetary theory ever published — Della Moneta — and he wrote it, apparently, between dinners.\n\nFerdinando Galiani is the nephew of Celestino Galiani, who saved Antonio Genovesi from an accusation of heresy twenty years ago. He is also, by general consensus, the cleverest mind in [target_location.GetName]. He is equally capable of charming an archbishop and demolishing a mercantilist economist before the same audience.\n\nThe ambassador to Paris has requested him as secretary of legation. It is an unusual use for a monetary theorist. But Galiani's gift is not just for economics — it is for being, wherever he is, completely indispensable."
 flavor_nap.565.a: "Send him to Paris as secretary of the embassy — our man in the salons."
 flavor_nap.565.b: "Keep him in [ROOT.GetName] as a royal economic adviser."
 flavor_nap.566.title: "The Science of Legislation"
 flavor_nap.566.desc: "He is twenty-eight years old. He comes from one of the oldest noble families in the kingdom — Cesare Filangieri, prince of Arianiello, is his father. He trained as a lawyer, briefly served as a military officer, and has spent the last several years writing something he calls La Scienza della Legislazione.\n\nThe first volumes have just been completed. They propose, with meticulous argument, that the entire legal structure of the kingdom must be rebuilt from rational first principles: the abolition of feudal privilege, reform of criminal procedure, equitable distribution of landed property, universal public education. He has sent copies to d'Alembert, to Goethe, to Benjamin Franklin.\n\nThe Congregation of the Index has written to us. They wish to know what action we intend to take."
 flavor_nap.566.a: "Protect Filangieri from the Church — the Scienza is a work of reform, not heresy."
 flavor_nap.566.b: "Appoint him to the Supreme Council of Finance — use his brilliance."
 flavor_nap.566.c: "Allow the Index to proceed — we will not interfere."
 flavor_nap.567.title: "The Jurist of the Republic"
 flavor_nap.567.desc: "Mario Pagano was born in Brienza, in the Basilicata, in 1748, to a family of modest but educated background. He came to [target_location.GetName] to study law, stayed to teach it, and has spent twenty years producing a body of philosophical and legal work that represents, in the opinion of those qualified to judge it, the most systematically developed theory of republican constitutionalism in Europe.\n\nHe is a student of Vico, a colleague of Filangieri, a frequenter of the salons where Galiani's ideas are still discussed. He is also, by reputation, the most honest judge on the Gran Corte della Vicaria — a court not generally known for honesty.\n\nHe has come before us with a request: he wishes to dedicate his energies to reforming the kingdom's criminal code. The proposal is detailed, rigorous, and deeply inconvenient for everyone who currently benefits from its ambiguities."
 flavor_nap.567.a: "Appoint him judge of the Gran Corte della Vicaria."
 flavor_nap.567.b: "Task him with reforming the criminal code."
 flavor_nap.567.c: "Decline — his ideas are too dangerous for a royal commission."
 flavor_nap.568.title: "The Letter from Franklin"
 flavor_nap.568.desc: "Gaetano Filangieri is dying at Vico Equense. The doctors say there is nothing more to be done. He is thirty-six years old.\n\nA courier arrived last week from Paris — Luigi Pio, the Neapolitan legation secretary, forwarding a package from Benjamin Franklin. Inside is a copy of the Constitution of the United States of America, signed by Franklin himself, with a covering letter.\n\nFilangieri is too weak to read it. His wife, Charlotte Frendel, has read it to him. The letter says that in drafting the Constitution, Franklin consulted the Scienza della Legislazione as a model. He considers Filangieri one of the founding minds of the American republic.\n\nFilangieri has asked that his unfinished manuscripts be published after his death. He died before we could reply to Franklin's letter. His wife wrote to Philadelphia in his place."
 flavor_nap.568.a: "Commission a public memorial and publish all his manuscripts."
 flavor_nap.568.b: "Arrange a private funeral — his ideas were controversial enough."
 flavor_nap.569.title: "The Sentence of Piazza del Mercato"
 flavor_nap.569.desc: "Mario Pagano was arrested after the fall of the Partenopean Republic. He did not hide. When the cardinal's men came to the Castel dell'Ovo, he was found at a desk, still writing.\n\nHe has been tried by the military commission. The charge is treason. The evidence — his authorship of the Republic's constitutional draft — is beyond dispute. The sentence is death by hanging.\n\nThe date is set: 29 October 1799. The place: Piazza del Mercato, where Masaniello danced and Conradin died and the city has always settled its accounts with history.\n\nThe king has signed a letter of pardon this morning. The courier is riding. No one is certain the pardon will arrive before the sentence is carried out."
 flavor_nap.569.a: "Let the sentence proceed — treason has only one price."
 flavor_nap.569.b: "Commute to perpetual exile."
 flavor_nap.569.c: "Grant the pardon — magnanimity is a royal virtue."
 STATIC_MODIFIER_NAME_nap_condottiero_bonus: "The Condottiero King"
 STATIC_MODIFIER_DESC_nap_condottiero_bonus: "The ruler's exceptional military reputation has drawn the kingdom's finest officers to his standard. Morale, discipline, and tactical coordination are all elevated."
 STATIC_MODIFIER_NAME_nap_war_plan_ready: "War Plan Prepared"
 STATIC_MODIFIER_DESC_nap_war_plan_ready: "The high military council has prepared a detailed campaign plan. Supply routes are mapped, troop dispositions are set, and the opening moves have been rehearsed."
 nap_insulting_purchase_offer: "Insulted by Purchase Offer"
 nap_refused_purchase_insult: "Refused and Insulted Us"
 nap_border_dispute_aggressor: "Border Dispute — Naples is Aggressive"
 nap_border_protest: "Border Protest from Naples"
 nap_demanded_satisfaction: "Demanded Satisfaction Over an Affront"
 nap_accepted_apology: "Accepted Our Apology"
 nap_settled_diplomatically: "Settled an Incident Diplomatically"
 nap_protection_claim: "Neapolitan Protection Claim on Our Subjects"
 nap_treaty_violation_claim: "Claims Our Treaty Was Violated"
 flavor_nap.570.title: "An Offer Worth Considering"
 flavor_nap.570.desc: "[ROOT.Ruler.GetName] has called the council's senior diplomat to the map room. The frontier with [scope:nap_target_country.GetName] runs along [scope:nap_target_province.GetName] — a territory that produces little for its current masters, costs them men to garrison, and separates our kingdom from a more defensible natural boundary.\n\nThe calculation is simple: [scope:nap_target_country.GetName] is struggling financially. A direct offer of gold, delivered through quiet channels before any rumor reaches their court, might achieve in weeks what a war would take years to accomplish — and at a fraction of the cost in blood.\n\nThe price our treasurers have calculated: [local_var:nap_purchase_price] ducats."
 flavor_nap.570.a: "Send the embassy — place the offer before [scope:nap_target_country.GetName]."
 flavor_nap.570.b: "Sound out their ambassador first — no commitments yet."
 flavor_nap.570.c: "The time is not right. Wait."
 flavor_nap.571.title: "Naples Has Made an Offer"
 flavor_nap.571.desc: "The Neapolitan embassy arrived at court three days ago. Their proposal is formal and well-funded: the Kingdom of Naples offers to purchase [scope:nap_target_province.GetName] at a price our treasurers call generous — [from.local_var:nap_purchase_price] ducats in coin, delivered within the month.\n\nThe ambassador presents the offer as a matter of practical statecraft. He notes, without apparent menace, that [scope:nap_target_province.GetName] lies exposed on a difficult frontier, that maintaining it costs more than it produces, and that the gold being offered could fund considerably better uses.\n\nThe council is divided."
 flavor_nap.571.a: "Accept — gold serves us better than a distant province."
 flavor_nap.571.b: "Decline politely — our borders are not for sale."
 flavor_nap.571.c: "Decline with contempt — the offer itself is an insult."
 flavor_nap.572.title: "Word from the Embassy"
 flavor_nap.572.desc_success: "[scope:nap_selling_country.GetName] has accepted. [scope:nap_target_province.GetName] now belongs to the Kingdom of Naples. The gold has been transferred; the transition of authority proceeded without incident. Our frontier is better aligned, and we did not fire a single shot."
 flavor_nap.572.desc_failure: "[scope:nap_selling_country.GetName] has declined. The ambassador was received with courtesy and dismissed without a commitment. The province remains in foreign hands — but the channels are open. A better offer, or a worse financial season for them, may yet change the calculation."
 flavor_nap.572.desc_insult: "[scope:nap_selling_country.GetName] has not merely declined — they have declared our offer an insult to their sovereignty. The ambassador was sent back with a letter that our secretary describes, diplomatically, as 'pointed.' The border remains where it was. The relationship is considerably worse."
 flavor_nap.572.a: "A sound investment. [scope:nap_target_province.GetName] is ours."
 flavor_nap.572.b: "Disappointing, but the door is not closed."
 flavor_nap.572.c: "They will regret the tone of that letter."
 flavor_nap.573.title: "Another Opportunity at the Frontier"
 flavor_nap.573.desc: "The situation at the border with [scope:nap_target_country.GetName] has evolved. Our intelligence reports that their treasury is under greater strain than before, and that the governor of [scope:nap_target_province.GetName] has been complaining in letters to his king about the cost of frontier upkeep.\n\nOur treasurer has recalculated the offer: [local_var:nap_purchase_price] ducats — slightly more favorable to them than before. [ROOT.Ruler.GetName] has the reputation, the funds, and the diplomatic standing to make this work. The window may be brief."
 flavor_nap.573.a: "Send the embassy again — this time with a sweeter price."
 flavor_nap.573.b: "Wait further — the moment has not yet arrived."
 flavor_nap.574.title: "A Grievance at the Border"
 flavor_nap.574.desc: "The frontier with [scope:nap_cb_target.GetName] has never been fully settled. The boundary runs through terrain that different maps — and different lawyers — describe differently. The situation has deteriorated: our border garrisons report encroachments, disputed tolls on the mountain roads, and at least two incidents involving the arrest of Neapolitan merchants on what we consider our territory.\n\n[ROOT.Ruler.GetName] has studied the reports. His assessment, delivered at the morning council, was characteristically direct: the ambiguity itself is the problem. It invites continued bad behavior. The only language [scope:nap_cb_target.GetName] will understand is the language of formal grievance — backed, if necessary, by the language of arms."
 flavor_nap.574.a: "Formalize the dispute — establish a legal basis for war if needed."
 flavor_nap.574.b: "File a formal protest — pressure without war preparation."
 flavor_nap.574.c: "Leave it — the border disputes resolve themselves eventually."
 flavor_nap.575.title: "An Affront That Cannot Go Unanswered"
 flavor_nap.575.desc: "The incident has been described to us in three separate accounts, and all three agree on the essential facts: the ambassador of [scope:nap_cb_target.GetName] made a remark at a public dinner that was — depending on whose interpretation one prefers — either a clumsy joke or a deliberate slight against the honor of [ROOT.Ruler.GetName] and the dignity of the Crown.\n\nThe remark has circulated. It has been repeated in the marketplaces. The nobles of the court have heard it and are waiting to see how the king responds.\n\n[ROOT.Ruler.GetName] has been unusually quiet since receiving the report. He has asked for the dispatches on the current military disposition of [scope:nap_cb_target.GetName]. He has also, it is noted, been spending considerable time at the exercise yard."
 flavor_nap.575.a: "Demand formal satisfaction — a public apology or consequences."
 flavor_nap.575.b: "Accept the ambassador's private apology — move on."
 flavor_nap.575.c: "Leverage the incident for a favorable commercial treaty."
 flavor_nap.576.title: "Our People Beyond the Border"
 flavor_nap.576.desc_catholic: "Reports from our clergy near the frontier with [scope:nap_cb_target.GetName] describe a situation that cannot be ignored: communities of Catholic faithful living under the jurisdiction of [scope:nap_cb_target.GetName] are being subjected to pressures that the local bishop describes as persecution. Churches have been closed. Priests have been expelled. The sacraments are being denied to people who have practiced the faith for generations.\n\n[ROOT.Ruler.GetName] has received a formal petition from the Archbishop of Naples asking the Crown to act. The Pope has written separately. The situation provides both a moral obligation and, our secretary observes quietly, a legal basis for intervention."
 flavor_nap.576.desc_subjects: "There are Neapolitan-born subjects and their descendants living in the border territories of [scope:nap_cb_target.GetName] — merchants, craftsmen, families who settled there when the frontier was drawn differently. Reports reaching the court describe them as poorly treated: subject to arbitrary taxation, excluded from local guild membership, and unable to appeal to Neapolitan courts for protection.\n\n[ROOT.Ruler.GetName] considers the protection of subjects, wherever they may live, to be a fundamental duty of the Crown. The council notes that this principle also provides a formal basis for diplomatic — and if necessary military — action."
 flavor_nap.576.a: "Declare formally that we extend royal protection — prepare a legal basis for action."
 flavor_nap.576.b: "Send envoys to negotiate better treatment — avoid escalation."
 flavor_nap.576.c: "Let the matter rest — it falls outside our jurisdiction."
 flavor_nap.577.title: "The Generals Ask to Be Led"
 flavor_nap.577.desc: "The council of war has assembled without being summoned. The five senior generals of the kingdom — men who between them have directed campaigns across three decades — are standing at the map table when [ROOT.Ruler.GetName] enters.\n\nTheir spokesman, the oldest among them, delivers the message directly: they have watched the king train, studied the dispatches he annotates, followed the decisions he makes in the field. They believe the kingdom has not had a commander of this quality in living memory. And the situation on the frontier with [scope:nap_cb_target.GetName] presents an opportunity that — in their collective professional judgment — should not be missed.\n\nThey are not asking permission to plan. They have already planned. They are asking the king to lead."
 flavor_nap.577.a: "Take command — glory and expansion await."
 flavor_nap.577.b: "Honor the generals but counsel patience."
 flavor_nap.578.title: "A Treaty Torn in Practice"
 flavor_nap.578.desc: "The treaty with [scope:nap_cb_target.GetName] — signed with ceremony and ratified by both courts — has been honored by us and ignored by them. Our merchants report that their goods are subject to tolls the treaty explicitly forbids. Our envoys have raised the matter formally on three occasions; each time they received assurances that were not followed by action.\n\n[ROOT.Ruler.GetName] has read the correspondence with the focused attention he normally reserves for campaign maps. His assessment: a treaty that one party does not honor is not a treaty — it is a document that confers all the obligations on one side and all the advantages on the other. That arrangement is finished."
 flavor_nap.578.a: "Declare the treaty void — establish a casus belli for redress."
 flavor_nap.578.b: "Negotiate a revised agreement — preserve the relationship."
 flavor_nap.578.c: "Overlook it — the trade is still profitable enough."
 flavor_nap.579.title: "The War Plan"
 flavor_nap.579.desc: "The maps have been spread on the table since before dawn. [ROOT.Ruler.GetName] has been standing over them for two hours, asking questions that his generals find unusually precise: distances between water sources on the march route, the condition of the roads after autumn rains, the size of the garrison at [scope:nap_cb_target.GetCapital.GetName].\n\nThe plan the council has developed is elegant. It exploits the weakness of [scope:nap_cb_target.GetName]'s western frontier, uses the mountain passes before winter closes them, and places the main force between their capital and their nearest ally within the first two weeks. The casus belli is established. The season is favorable. The army is ready.\n\nAll that remains is the decision."
 flavor_nap.579.a: "Approve the plan — we march when the council advises."
 flavor_nap.579.b: "Modify the plan — move more cautiously, reduce the risks."
 flavor_nap.579.c: "Not yet — wait for the right moment."