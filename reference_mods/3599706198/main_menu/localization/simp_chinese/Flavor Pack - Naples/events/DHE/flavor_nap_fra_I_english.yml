l_simp_chinese:
 flavor_nap_fra.3000.title: "法兰西国王的次子"
 flavor_nap_fra.3000.desc: "卢森堡的博娜王后在文森城堡诞下了第二个儿子。这个受洗名为路易的孩子是法兰西国王约翰二世的次子。尽管他无法继承法兰西的王位，但其王室血统与父亲的宠爱，或许仍将为他开启通往显赫爵位与遥远王座的大门。"
 flavor_nap_fra.3000.historical_info: "Louis I of Anjou (1339-1384) was born at Vincennes on July 23, 1339, the second son of King John II of France and Bona of Luxembourg. He was created Duke of Anjou and Count of Maine in 1356 by his father. In 1382 he was adopted by Queen Joan I of Naples as her heir and invaded the Kingdom of Naples to claim the throne, dying in Bari in 1384 without achieving his goal. His son Louis II would continue the Angevin claim to Naples."
 flavor_nap_fra.3000.a: "May he bring glory to the House of Valois."
 flavor_nap_fra.3001.title: "The Duke of Anjou Takes a Wife"
 flavor_nap_fra.3001.desc: "Louis of Anjou, second son of King John II of France, has taken Mary of Blois as his bride. The marriage unites the cadet branch of the Valois with the ducal house of Brittany, strengthening the ties between the French crown and the turbulent western duchy. For Louis, the union brings not only a wife but a claim — through Mary's Breton blood — to lands and titles that may one day prove invaluable."
 flavor_nap_fra.3001.historical_info: "Louis I of Anjou married Mary of Blois in 1360. The marriage was arranged by King John II of France as part of his broader dynastic policy. Mary brought to the union her claim to the Duchy of Brittany through her mother Joan of Penthièvre, as well as significant lands in Maine and Anjou. Together they would have several children, the most notable being Louis II of Anjou, who continued his father's claim to the throne of Naples."
 flavor_nap_fra.3001.a: "A strong union for the House of Anjou."
 flavor_nap_fra.3002.title: "An Heir for the House of Anjou"
 flavor_nap_fra.3002.desc: "Mary of Blois has given birth to a son in Toulouse. The child, baptized Louis like his father, is born into a dynasty with grand ambitions and distant claims. His father Louis I holds the Duchy of Anjou and dreams of the crown of Naples — a dream that, if fortune favors the bold, may yet fall to this newborn child to fulfill."
 flavor_nap_fra.3002.historical_info: "Louis II of Anjou (1377-1417) was born in Toulouse on October 5, 1377, son of Louis I of Anjou and Mary of Blois. Following his father's death in 1384, he inherited the Angevin claim to Naples and the title of Duke of Anjou. In 1389 he invaded Naples but was defeated by Charles III's son Ladislaus. He married Yolande of Aragon in 1400, and their son Louis III would continue the Neapolitan claim, while their younger son René of Anjou would eventually inherit all Angevin titles."
 flavor_nap_fra.3002.a: "May he succeed where his father could not."