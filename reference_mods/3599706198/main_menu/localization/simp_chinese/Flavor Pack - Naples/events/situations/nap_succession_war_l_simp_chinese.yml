 nap_succession_war: "The Neapolitan Succession"
 nap_succession_war_desc: "The [GetCountry('NAP').GetLongName] stands at a crossroads. Queen Joan I's decision to adopt a son of the House of Valois-Anjou as her heir has ignited a conflict that will determine the future of the kingdom. The House of Durazzo, led by [GetCountry('ALB').GetLongName] and invested by Pope Urban VI, refuses to yield its bloodline claim to the throne of Naples.\n\nTwo dynasties, two popes, two visions for the kingdom — the [ShowSituationName('nap_succession_war')] will decide which house shall rule [ShowRegionName('italy_region')] for generations to come. [GetCountry('FRA').GetLongName] and [GetCountry('HUN').GetLongName] watch closely, ready to throw their weight behind their chosen claimant.\n\nThe throne of Naples awaits its rightful king.\""
 nap_succession_durazzo_tt: "The House of Durazzo claims the throne of Naples by right of blood and papal investiture."
 nap_succession_valois_tt: "The House of Valois-Anjou claims Naples through the adoption by Queen Joan I."
 nap_succession_durazzo_ally_tt: "Ally of the House of Durazzo in the Neapolitan succession conflict."
 nap_succession_valois_ally_tt: "Ally of the House of Valois-Anjou in the Neapolitan succession conflict."
 flavor_nap.461.title: "A New Heir for Naples"
 flavor_nap.461.desc: "The Western Schism has torn the Church apart. With no legitimate heir, we must look to the House of Valois-Anjou. By adopting Louis of Anjou as our heir, we secure French support — but at the cost of alienating the House of Durazzo."
 flavor_nap.461.historical_info: "In 1380, Joan I formally adopted Louis I of Anjou as her heir. This triggered the conflict with Charles of Durazzo, backed by Pope Urban VI."
 flavor_nap.461.a: "Let Louis of Anjou be our heir."
 flavor_nap.461.b: "We cannot make such a decision lightly."
 nap_succession_war.1.title: "The Durazzo Claim"
 nap_succession_war.1.desc: "Joan I has betrayed our bloodline by adopting Louis of Anjou as her heir. The throne of Naples belongs to the House of Durazzo by right of blood and papal investiture. We will not yield."
 nap_succession_war.1.a: "Naples is ours by right. We will fight for what is ours."
 nap_succession_war.2.title: "The Anjou Claim"
 nap_succession_war.2.desc: "Queen Joan I has chosen wisely. By adopting us as her heir, she has secured French support and Avignonese legitimacy for the throne of Naples. The Durazzo pretenders will not stand in our way."
 nap_succession_war.2.a: "Naples awaits. We shall claim what is rightfully ours."
 nap_succession_war.3.title: "The Neapolitan Succession Crisis"
 nap_succession_war.3.desc: "The Kingdom of Naples is torn between two rival dynasties. The House of Durazzo, backed by Rome, faces the House of Valois-Anjou, supported by France and Avignon. The outcome will reshape the balance of power in Italy."
 nap_succession_war.3.a: "We shall watch this conflict carefully."
 nap_succession_war.10.title: "The Pope Takes Sides"
 nap_succession_war.10.desc: "The Pope has declared his support in the Neapolitan succession crisis. His backing will grant legitimacy and resources to whichever claimant he favors."
 nap_succession_war.10.a: "Support the House of Durazzo — they are the rightful heirs."
 nap_succession_war.10.b: "Support the House of Valois-Anjou — they have French backing."
 nap_succession_war.20.title: "A Claim Renewed"
 nap_succession_war.20.desc: "Our advisors have presented new grounds to press our claim against the Anjou pretenders. The moment to act may soon be at hand."
 nap_succession_war.20.a: "Prepare the legal case. Naples must be ours."
 nap_succession_war.20.b: "Not yet. The time is not right."
 nap_succession_war.21.title: "The Anjou Claim Strengthened"
 nap_succession_war.21.desc: "Our lawyers have found new grounds to press our claim against the Durazzo usurpers. The adoption by Joan I gives us every right to the throne."
 nap_succession_war.21.a: "Press the claim. Naples awaits."
 nap_succession_war.21.b: "Not yet. We must strengthen our position first."
 nap_succession_war.30.title: "The Durazzo Banner Marches South"
 nap_succession_war.30.desc: "The time for diplomacy is over. Our armies stand ready and our claim is just. The House of Durazzo shall take by force what has been denied by treachery."
 nap_succession_war.30.a: "March on Naples. God and the Pope are with us."
 nap_succession_war.30.b: "Hold back. We are not yet ready."
 nap_succession_war.31.title: "The Lilies of Anjou March on Naples"
 nap_succession_war.31.desc: "The moment has come. Our armies are ready, our claim is just, and France stands behind us. The throne of Naples shall be ours."
 nap_succession_war.31.a: "March on Naples. Joan's adoption gives us every right."
 nap_succession_war.31.b: "Hold back. We must wait for a better moment."
 nap_succession_war.40.title: "Unrest in the Kingdom"
 nap_succession_war.40.desc: "Supporters of the Anjou pretenders have stirred up trouble in the provinces. Local nobles sympathetic to the French cause are undermining royal authority."
 nap_succession_war.40.a: "Let them stew in their discontent. We have bigger concerns."
 nap_succession_war.40.b: "Crush this unrest immediately. We cannot afford instability."
 nap_succession_war.41.title: "Durazzo Sympathizers Rise Up"
 nap_succession_war.41.desc: "In our territories, voices loyal to the House of Durazzo are growing louder. The papal blessing given to Charles of Durazzo has emboldened our enemies within."
 nap_succession_war.41.a: "Let them grumble. Our claim is stronger."
 nap_succession_war.41.b: "Spend gold to buy their loyalty back."
 nap_succession_war.50.title: "Hungarian Support for Durazzo"
 nap_succession_war.50.desc: "King Louis of Hungary, ever watchful of Italian affairs, has offered his support to the House of Durazzo. Hungarian troops and gold could tip the balance in our favor."
 nap_succession_war.50.a: "Accept the Hungarian offer. Their soldiers are formidable."
 nap_succession_war.50.b: "We do not need foreign soldiers to win our throne."
 nap_succession_war.51.title: "French Support for Anjou"
 nap_succession_war.51.desc: "The French crown has reaffirmed its support for our claim to Naples. Gold, troops, and diplomatic pressure from Paris will strengthen our position considerably."
 nap_succession_war.51.a: "Accept French support. With them behind us, victory is assured."
 nap_succession_war.51.b: "We must win Naples on our own terms."
 nap_succession_war.60.title: "Battle for the Mediterranean"
 nap_succession_war.60.desc: "Our fleets have encountered Anjou ships in the waters off Naples. Control of the sea lanes is crucial for supplying our armies and cutting off the enemy."
 nap_succession_war.60.a: "Press the attack. Drive their ships from our waters."
 nap_succession_war.60.b: "Fall back. We cannot afford to lose our fleet."
 nap_succession_war.70.title: "An Offer of Peace"
 nap_succession_war.70.desc: "Both sides have bled enough. Our advisors suggest that a negotiated settlement might be possible. Perhaps a partition of territories or a guarantee of succession rights could end this costly conflict."
 nap_succession_war.70.a: "Send envoys. Peace may serve us better than war."
 nap_succession_war.70.b: "No negotiations. Naples must be ours entirely."
 nap_succession_war.71.title: "The Anjou Response"
 nap_succession_war.71.desc: "Naples has reached out with a proposal for negotiations. How shall we respond to this offer?"
 nap_succession_war.71.a: "Accept the offer. A negotiated peace may preserve our gains."
 nap_succession_war.71.b: "Reject it. We will not settle for less than Naples itself."
 nap_succession_war.100.title: "The Succession Crisis Ends"
 nap_succession_war.100.desc.durazzo: "The House of Durazzo has prevailed. Naples remains under Durazzo rule and the Valois-Anjou claim has been extinguished. A new chapter begins for the kingdom."
 nap_succession_war.100.desc.valois: "The House of Valois-Anjou has triumphed. The Durazzo pretenders have been defeated and Naples falls to the Anjou claimants. The French connection will reshape the kingdom."
 nap_succession_war.100.desc.neutral: "The succession crisis has come to an end without a clear victor. The kingdom of Naples enters a new era of uncertainty."
 nap_succession_war.100.a: "A new era begins for Naples."