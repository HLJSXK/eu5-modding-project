 EXPANSION_DESC: "入侵详情"
 OHLINVASION1DETAIL: "@trigger_yes!每48个月，[GetCountry('TUR').GetLongName]将对目标地区内拥有最多[locations|e]的[country|e]获得一个[ShowCasusBelliName('cb_OHL_ottoman_conquest_1')][casus_belli|e]\n\n@trigger_yes!目标[country|e]的最强[rival|e]将被[GetCountry('TUR').GetName]邀请加入入侵\n\n@trigger_yes!任何其他[country|e]均可使用[ShowPeaceTreatyTypeName('OHL_halt_ottoman_invasion')][peace_treaty|e]提前终止入侵"
 OHLINVASION2DETAIL: "@trigger_yes!每48个月，[GetCountry('TUR').GetLongName] 将对 [ShowRegionName('crescent_region')]和[ShowAreaName('armenian_highlands_area')]发动一次特殊入侵。\n\n@trigger_yes!每个拥有目标[location|e]的[country|e]将自动作为防御方被召唤参战。\n\n@trigger_yes!任何其他[country|e]可以使用[ShowPeaceTreatyTypeName('OHL_halt_ottoman_invasion')][peace_treaty|e]来提前终止此次入侵。"
 OHLINVASION3DETAIL: "@trigger_yes!每48个月，[GetCountry('TUR').GetLongName]将获得一个针对目标地区内拥有最多[locations|e]的[country|e]的[ShowCasusBelliName('cb_OHL_ottoman_conquest_3')][casus_belli|e]\n\n@trigger_yes!任何其他[country|e]可以使用[ShowPeaceTreatyTypeName('OHL_halt_ottoman_invasion')][peace_treaty|e]来提前终止入侵"
 OHLPHASEDISPLAYEDTEXT: "[SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('ohl_phase_display_text').GetFlagName]"
 OHLCONQUEST0: "#color_white 突厥崛起目前正处于#!#color_yellow 贝伊国统一阶段：#!\n\n@trigger_yes!每48个月，我们将获得对最弱的安纳托利亚邻国的[ShowCasusBelliName('cb_OHL_anatolian_conquest')][casus_belli|e]\n\n@trigger_yes!当我们及附庸国拥有超过100个[locations|e]时，阶段将推进"
 OHLCONQUEST1: "#color_white 突厥崛起目前处于#!#color_yellow 驱逐拜占庭阶段：#!\n\n@trigger_yes!每48个月，我们将获得对最弱的安纳托利亚邻国的[ShowCasusBelliName('cb_OHL_anatolian_conquest')][casus_belli|e]\n\n@trigger_yes!我们将获得对[GetCountry('BYZ').GetLongName]的[ShowCasusBelliName('cb_OHL_anatolian_conquest')][casus_belli|e]\n\n@trigger_yes!一旦[GetCountry('BYZ').GetLongName]在[ShowRegionName('anatolia_region')]不拥有任何[locations|e]，该阶段将推进"
 OHLCONQUEST2: "#color_white 突厥崛起目前处于#! #color_yellow 巴尔干立足阶段：#!\n\n@trigger_yes!每48个月，我们将获得一个对最弱小的安纳托利亚邻国的[ShowCasusBelliName('cb_OHL_anatolian_conquest')]宣战理由\n\n@trigger_yes!我们将获得一个对[ShowRegionName('balkan_region')]沿岸最近[country|e]的[ShowCasusBelliName('cb_OHL_byzantine_foothold')]宣战理由\n\n@trigger_yes!一旦我们拥有[ShowRegionName('balkan_region')]内任何不在[ShowAreaName('aegean_archipelago_area')]的[location|e]，此阶段将推进"
 OHLCONQUEST3: "#color_white 突厥崛起目前正处于#!#color_yellow 巴尔干征服阶段：#!\n\n@trigger_yes!每60个月，我们将获得对[ShowRegionName('balkan_region')]中最大邻国的[ShowCasusBelliName('cb_OHL_balkan_conquest')][casus_belli|e]\n\n@trigger_yes!一旦我们在[ShowRegionName('balkan_region')]拥有超过80个[locations|e]，该阶段将向前推进"
 OHLCONQUEST4: "#color_white 奥斯曼的崛起目前正处于#! #color_yellow 故土整合阶段：#!\n\n@trigger_yes!每36个月，我们将在[ShowRegionName('balkan_region')]或[ShowRegionName('anatolia_region')]区域内，对最弱的邻国获得一个[ShowCasusBelliName('cb_OHL_consolidation')][casus_belli|e]\n\n@trigger_yes!一旦我们及我们的附庸国拥有超过330个[locations|e]，此阶段将向前推进"
 OHLCONQUEST5: "#color_white 突厥崛起目前处于#! #color_yellow 征服君士坦丁堡阶段：#!\n\n@trigger_yes!我们将获得对[ShowLocationName('constantinople')][province|e]的[ShowCasusBelliName('cb_conquer_province')]宣战理由\n\n@trigger_yes!一旦我们拥有[ShowLocationName('constantinople')]，阶段将推进"
 OHLCONQUEST6: "#color_white 突厥的崛起目前正处于#!#color_yellow 最终扩张阶段：#!\n\n@trigger_yes!每36个月，我们将获得一个针对[ShowRegionName('balkan_region')]或[ShowRegionName('anatolia_region')]中最弱邻国的[ShowCasusBelliName('cb_OHL_consolidation')][casus_belli|e]\n\n@trigger_yes!一旦我们及我们的附庸国拥有超过500个[locations|e]，整个[situation|e]便会结束"
 OHLGTW0: "#color_white 大土耳其战争目前处于#!#color_yellow 喀尔巴阡战争阶段：#!\n\n@trigger_yes![GetUniqueInternationalOrganization('ohl_holy_league').GetName]的领袖可以创建[ShowCasusBelliName('cb_OHL_drive_out_ottomans_1')][casus_belli|e]\n\n@trigger_yes!当[GetCountry('TUR').GetLongName]在[ShowRegionName('carpathia_region')][region|e]中不再拥有任何[locations|e]时，阶段将推进\n\n@trigger_yes![GetCountry('TUR').GetName]可以使用[ShowPeaceTreatyTypeName('OHL_destroy_holy_league')][peace_treaty|e]来解散[GetUniqueInternationalOrganization('ohl_holy_league').GetName]"
 OHLGTW1: "#color_white 大土耳其战争目前处于#!#color_yellow 巴尔干战争阶段：#!\n\n@trigger_yes![GetUniqueInternationalOrganization('ohl_holy_league').GetName]的领袖可以创建[ShowCasusBelliName('cb_OHL_drive_out_ottomans_2')][casus_belli|e]\n\n@trigger_yes! 一旦[GetCountry('TUR').GetLongName]在[ShowAreaName('serbia_area')]、[ShowAreaName('bulgaria_area')]、[ShowAreaName('albania_area')]、[ShowAreaName('morea_area')]和[ShowAreaName('aegean_archipelago_area')][areas|e]中不拥有任何[locations|e]，该阶段将推进\n\n@trigger_yes![GetCountry('TUR').GetName]可以使用[ShowPeaceTreatyTypeName('OHL_destroy_holy_league')][peace_treaty|e]来解散[GetUniqueInternationalOrganization('ohl_holy_league').GetName]"
 OHLGTW2: "#color_white 大土耳其战争目前处于#! #color_yellow 君士坦丁堡战役阶段：#!\n\n@trigger_yes![GetUniqueInternationalOrganization('ohl_holy_league').GetName]的领袖可以创建[ShowCasusBelliName('cb_OHL_drive_out_ottomans_3')] [casus_belli|e]\n\n@trigger_yes!一旦[GetCountry('TUR').GetLongName]在[ShowRegionName('balkan_region')][region|e]中没有任何[locations|e]，整个局势将结束\n\n@trigger_yes![GetCountry('TUR').GetName]可以使用[ShowPeaceTreatyTypeName('OHL_destroy_holy_league')] [peace_treaty|e]来解散[GetUniqueInternationalOrganization('ohl_holy_league').GetName]"
 WE_ARE_AFRAID_OF_THE_OTTOMANS: "我们畏惧[GetCountry('TUR').GetLongName]。"
 OHL_ottoman_expansion_1st: "巴尔干入侵"
 OHL_ottoman_expansion_1st_desc: "在品尝了先前迅速征服富饶的[ShowRegionName('anatolia_region')]和[ShowAreaName('thrace_area')]所带来的成果后，[GetCountry('TUR').GetLongName]将目光投向了地势崎岖、四分五裂的上[ShowRegionName('balkan_region')]地区。\n\n虽然征服这片区域的进程将充满血腥且难以彻底完成，但它为最终征服[GetCountry('HUN').GetName]以及入侵的土耳其人与[GetUniqueInternationalOrganization('hre').GetName]诸多南方成员之间的冲突奠定了基础。"
 ohl_religious_propoganda_start: "宗教宣传"
 ohl_religious_propoganda_start_desc: "精心措辞的布道和夸大敌人的残忍行为将使这场战争被描绘成一场宗教存亡之战，从而激励我们的士兵奋勇作战。"
 ohl_religious_propoganda_stop: "结束宗教宣传"
 ohl_religious_propoganda_stop_desc: "我们不再需要教条式的说教了。"
 ohl_defensive_measures_start: "颁布防御措施"
 ohl_defensive_measures_start_desc: "扩充驻军！加高城墙！每座城堡都将成为坚不可摧的堡垒。若[GetCountry('TUR').GetLongName]妄图夺取我们的土地，必将让他们为每一寸领土付出血的代价！"
 ohl_defensive_measures_stop: "结束防御措施"
 ohl_defensive_measures_stop_desc: "我们已无需再龟缩。"
 ohl_arm_the_peasantry_start: "向民兵分发武器"
 ohl_arm_the_peasantry_start_desc: "我们的税务官或许会不高兴，但若将精良武器配发给现有民兵组织，必将让入侵者尝到更苦涩的滋味。"
 ohl_arm_the_peasantry_stop: "没收民兵武器"
 ohl_arm_the_peasantry_stop_desc: "这些高度武装的民兵带来的麻烦远超其价值。"
 OHL_ottoman_expansion_2nd: "东征"
 OHL_ottoman_expansion_2nd_desc: "在向[ShowRegionName('balkan_region')]扩张并夺取[ShowLocationName('cairo')]之后，[GetCountry('TUR').GetLongName]将其注意力从西方转向了东方和北方。\n\n[ShowAreaName('armenian_highlands_area')]的土地，虽然不如他们先前征服的地区那样富庶发达，但对于向东延伸控制力和影响力具有至关重要的战略意义。而[ShowRegionName('crescent_region')]的土地，特别是[ShowLocationName('baghdad')]这座城市，不仅蕴藏着惊人的财富，对其土耳其征服者而言还具有无比重要的文化意义。"
 OHL_ottoman_expansion_3rd: "征服匈牙利"
 OHL_ottoman_expansion_3rd_desc: "先前向[ShowRegionName('balkan_region')]的扩张以及在东部夺取的宝贵领土，为[GetCountry('TUR').GetLongName]向[ShowRegionName('carpathia_region')][region|e]发动更深入的远征提供了绝佳基地。\n\n当地民众对奥斯曼入侵者进行了激烈抵抗，但宗教改革引发的混乱使[ShowContinentName('europe')]诸国陷入严重动荡，导致[GetCountry('HUN').GetLongName]难以争取到支持其防御的盟友。"
 OHL_great_turkish_war: "大土耳其战争"
 OHL_great_turkish_war_desc: "[GetCountry('TUR').GetAdjective]向[ShowContinentName('europe')]的扩张最终引发了东南欧[ShowReligionAdjective('catholic')]大国的联合反应。\n\n尽管[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的许多成员将其塑造成一场圣战，但对抗[GetCountry('TUR').GetLongName]并不需要宗教理由。面对[GetCountry('TUR').GetAdjective]压倒性的军事，维持自身势力范围和国家主权的渴望，与任何追求宗教至高地位的崇高愿望同样至关重要。"
 ohl_repulse_ottomans: "准备战争"
 ohl_repulse_ottomans_desc: "[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的军队必须准备对[GetCountry('TUR').GetLongName]发动新一轮攻势。"
 OHL_greece_liberated: "解放者"
