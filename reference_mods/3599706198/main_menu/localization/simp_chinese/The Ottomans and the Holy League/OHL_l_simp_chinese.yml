 ohl_ottomans.1.title: "入侵安纳托利亚"
 ohl_ottomans.1.desc: "[ShowRegionName('anatolia_region')]的邻邦软弱可欺，那片土地本身富饶丰腴，唾手可得，以我们[ShowReligionAdjective('sunni')][faith|e]之名，我们将征服此地。"
 ohl_ottomans.1.a: "开战！"
 ohl_ottomans.1.b: "让我们开始准备吧。"
 ohl_ottomans.2.title: "多管闲事的罗马人"
 ohl_ottomans.2.desc: "[ShowRegionName('anatolia_region')]的巩固无法完成，除非剩余的[GetCountry('BYZ').GetLongName]势力被逐出[region|e]。唯有将他们彻底驱逐，我们才能真正占据主导，摆脱那位古老且衰弱的罗马。"
 ohl_ottomans.2.a: "打倒这只罗马！"
 ohl_ottomans.2.b: "很快，我们就要出击了。"
 ohl_ottomans.3.title: "拜占庭被驱逐"
 ohl_ottomans.3.desc: "所有残存的拜占庭据点已被彻底清除。如今我们才真正称得上是[ShowRegionName('anatolia_region')]最强大的势力。无论是[ShowReligionAdjective('sunni')]还是其他信仰的[country|e]，都无法与我们匹敌。"
 ohl_ottomans.3.a: "我们将统治这片大地。"
 ohl_ottomans.4.title: "巴尔干立足点"
 ohl_ottomans.4.desc: "向西进一步扩张需要一个横跨博斯普鲁斯海峡的稳固立足点。[ShowLocationName('gallipoli')]是绝佳的[location|e]，我们可以在此登陆并发起对[ShowRegionName('balkan_region')][region|e]的首次进攻。"
 ohl_ottomans.4.a: "前进，跨越海峡！"
 ohl_ottomans.4.b: "很快，我们就要出击了。"
 ohl_ottomans.5.title: "巴尔干立足点已稳固"
 ohl_ottomans.5.desc: "在[ShowContinentName('europe')]站稳脚跟后，向西扩张变得事半功倍。后续战役的补给物资可以储存在我们新征服的据点中。"
 ohl_ottomans.5.a: "终有一日，整个欧洲都将属于我们。"
 ohl_ottomans.6.title: "巴尔干扩张"
 ohl_ottomans.6.desc: "没有哪个[country|e]比我们更有资格统治这片土地。我们是最强大且最正义的。以$muslim_god_name$之名，我们将征服一切！"
 ohl_ottomans.6.a: "开战！"
 ohl_ottomans.6.b: "让士兵们做好准备。"
 ohl_ottomans.7.title: "巴尔干地区已落入我们手中"
 ohl_ottomans.7.desc: "他们都在我们的威势下颤抖！不久之后，我们的旗帜必将飘扬于世界之巅！"
 ohl_ottomans.7.a: "万岁！"
 ohl_ottomans.8.title: "征服时代"
 ohl_ottomans.8.desc: "随着我们的力量日益壮大，我们必须将目光投向那些尚未臣服于我们事业的弱小残余势力。他们的软弱显而易见，而他们的土地理应由是我们所拥有。"
 ohl_ottomans.8.a: "他们将在我们面前倒下。"
 ohl_ottomans.8.b: "让他们畏惧我们的到来。"
 ohl_ottomans.9.title: "奥斯曼的崛起"
 ohl_ottomans.9.desc: "我们的旗帜从[ShowRegionName('anatolia_region')]到[ShowRegionName('balkan_region')]四处飘扬。如今我们甚至无需动武，那些烦人的邻国便已争相臣服。"
 ohl_ottomans.9.a: "他们明白我们的力量。"
 ohl_ottomans.9.a.tt: "在[ShowAreaName('marmara_area')]、[ShowAreaName('west_anatolia_area')]、[ShowAreaName('central_anatolia_area')]及[ShowAreaName('pontus_area')][areas|e]中的[locations|e]将被吞并。"
 ohl_ottomans.10.title: "宝石之城"
 ohl_ottomans.10.desc: "[ShowLocationName('constantinople')]的城墙固然森严，但墙后的宝藏将赋予我们征服世界所需的力量与威望。"
 ohl_ottomans.10.a: "把火炮推上来！"
 ohl_ottomans.10.b: "他们很快就会得到应有的报应。"
 ohl_ottomans.11.title: "基督教的瑰宝"
 ohl_ottomans.11.desc: "[ShowLocationName('constantinople')]已落入我们手中。征服了她，便再没有什么能阻挡我们的道路了。"
 ohl_ottomans.11.a: "世界在颤抖。"
 ohl_ottomans.100.title: "北方入侵"
 ohl_ottomans.100.desc: "迄今为止，我们在[ShowContinentName('europe')]的存在一直有限。尽管我们征服了[ShowLocationName('constantinople')]，但我们的领土仍主要集中于[ShowRegionName('anatolia_region')]。\n\n但这一切即将改变。今天，一个新时代的黎明已经到来——届时所有人都将畏惧我们的威名，以及我们辉煌的枪炮与钢铁所展现的力量。"
 ohl_ottomans.100.a: "让征服开始吧！"
 ohl_ottomans.101.title: "奥斯曼入侵"
 ohl_ottomans.101.desc: "[GetCountry('TUR').GetLongName]已开始了一系列旨在夺上取[ShowRegionName('balkan_region')]地区的战役。尽管我们目前尚未受到影响，但有些人担心这个巨大的[GetCountry('TUR').GetAdjective]问题可能会失控。"
 ohl_ottomans.101.a: "令人担忧。"
 ohl_ottomans.102.title: "入侵！"
 ohl_ottomans.102.desc: "[GetCountry('TUR').GetLongName]正显露出侵略意图，已开始在我国边境集结大量军队和资源！他们征服了[ShowLocationName('constantinople')]并攫取了[ShowRegionName('anatolia_region')]的财富，这还不够？现在竟将矛头对准了我们！"
 ohl_ottomans.102.a: "我们必须做好准备！"
 ohl_ottomans.103.title: "西进"
 ohl_ottomans.103.desc: "[ShowContinentName('europe')]的土地唾手可得。[ShowAreaName('serbia_area')]、[ShowAreaName('bosnia_area')]、[ShowAreaName('bulgaria_area')]和[ShowAreaName('wallachia_area')]尤其邻近且脆弱，正是我们的绝佳猎物。"
 ohl_ottomans.103.a: "让他们尝尝钢铁的滋味。"
 ohl_ottomans.103.b: "着手准备"
 ohl_ottomans.104.title: "奥斯曼征服"
 ohl_ottomans.104.desc: "[GetCountry('TUR').GetLongName]在入侵[ShowRegionName('balkan_region')]北部地区方面取得了相当显著的成功。经过多次战役，他们已成功将整个区域纳入掌控之中。"
 ohl_ottomans.104.a: "真让人不安。"
 ohl_ottomans.105.title: "征服成功"
 ohl_ottomans.105.desc: "上[ShowRegionName('balkan_region')]地区已被彻底征服！\n\n尽管敌人进行了激烈抵抗，但难以匹敌。此次战役足以载入我们新生帝国的辉煌史册。"
 ohl_ottomans.105.a: "我们势不可挡！"
 ohl_ottomans.106.title: "奥斯曼停滞"
 ohl_ottomans.106.desc: "[GetCountry('TUR').GetLongName]未能成功征服整个上[ShowRegionName('balkan_region')]地区。局部抵抗依然顽强，尽管有所进展，但整个地区仍处于奥斯曼控制之外。"
 ohl_ottomans.106.a: "至少他们也会流血。"
 ohl_ottomans.107.title: "势头受阻"
 ohl_ottomans.107.desc: "尽管我们竭尽全力，整个上[ShowRegionName('balkan_region')]地区仍顽固地脱离我们的掌控。\n\n无论是由于当地抵抗力量出人意料的顽强、内部的背叛行为，还是单纯因为时间流逝，我们都未能如愿将整个区域彻底置于掌控之下。"
 ohl_ottomans.107.a: "真不幸"
 ohl_ottomans.108.title: "来自欧洲的援助"
 ohl_ottomans.108.desc_1: "在我们准备入侵上[ShowRegionName('balkan_region')]之际，或许值得利用[target_country.GetName]与其[rivals|e]之间的紧张关系，以最大限度地提高我们的胜算。"
 ohl_ottomans.108.desc_2: "遗憾的是，[ShowContinentName('europe')]内没有任何国家愿意协助我们入侵[target_country.GetName]，我们只能独自进行这项行动。"
 ohl_ottomans.108.a: "向[rival_country.GetNameWithNoTooltip]送去消息"
 ohl_ottomans.108.b: "我们不需要帮助。"
 ohl_ottomans.108.c: "我们本来也不需要帮助。"
 ohl_ottomans.109.title: "一个奇怪的请求"
 ohl_ottomans.109.desc: "我们收到了来自[GetCountry('TUR').GetLongName]的信函，请求我们加入他们即将对[rival|e][target_country.GetName]发动的战争。\n\n尽管有人可能认为与异教徒结盟有失体面，但[GetCountry('TUR').GetAdjective]的提议确实为我们提供了一个削弱厌恶对手的独特良机。"
 ohl_ottomans.109.a: "我们将向他们做出承诺。"
 ohl_ottomans.109.a.tt: "当[GetCountry('TUR').GetLongName]向[target_country.GetName]宣战时，我们将加入他们的行列。"
 ohl_ottomans.109.b: "我们绝不会如此卑劣！"
 ohl_ottomans.110.title: "召唤参战"
 ohl_ottomans.110.desc: "[GetCountry('TUR').GetAdjective]对我们[rival|e]的入侵已经开始，我军已准备介入。"
 ohl_ottomans.110.a: "我们必将确保[GetCountry('TUR').GetAdjective]的成功。"
 ohl_ottomans.200.title: "东征"
 ohl_ottomans.200.desc: "[ShowRegionName('anatolia_region')]以东的土地遍布宝藏。从[ShowLocationName('baghdad')]到印度洋，财富等待着那些有胆识去夺取的人。我们将动用之前在[ShowRegionName('egypt_region')]及海外征服中所取得的一切力量，并将它们全部倾泻于东方的敌人身上！"
 ohl_ottomans.200.a: "我们将征服一切！"
 ohl_ottomans.201.title: "第二次奥斯曼入侵"
 ohl_ottomans.201.desc: "[GetCountry('TUR').GetLongName]已开始一系列军事行动，意图夺取远东及黑海沿岸地区。虽然我们目前并非其目标，但[GetCountry('TUR').GetAdjective]可能进一步扩张的前景已令许多人深感忧虑。"
 ohl_ottomans.201.a: "他们何时才会满意？"
 ohl_ottomans.202.title: "入侵！"
 ohl_ottomans.202.desc: "这些背信弃义的[GetCountry('TUR').GetLongName]恶犬，他们明确表露了全面入侵的意图！只要我们仍占据他们觊觎的领土，就必将遭受持续而残酷的打击！"
 ohl_ottomans.202.a: "准备防御！"
 ohl_ottomans.203.title: "东征"
 ohl_ottomans.203.desc: "幼发拉底河彼岸的土地富饶丰裕，[ShowAreaName('armenian_highlands_area')]地区更是具有重大的战略价值。那里的人民软弱涣散，为了$muslim_god_name$的荣光，将他们尽数纳入我们麾下应当并非难事。"
 ohl_ottomans.203.a: "他们将会畏惧我们的枪炮与钢铁。"
 ohl_ottomans.203.b: "着手准备"
 ohl_ottomans.204.title: "奥斯曼征服"
 ohl_ottomans.204.desc: "[GetCountry('TUR').GetLongName]在东方的扩张以及对[ShowAreaName('armenian_highlands_area')]的征服取得了显著成功。尽管战事漫长而血腥，他们仍成功地将整个区域纳入了掌控之中。"
 ohl_ottomans.204.a: "他们会被阻止吗？"
 ohl_ottomans.205.title: "征服成功"
 ohl_ottomans.205.desc: "[ShowRegionName('crescent_region')]已被彻底征服！\n\n这片土地又将成为我们皇帝皇冠上的一颗明珠。此地的资源将推动我们进一步的征服，无疑让我们朝着完全征服整个[ShowContinentName('europe')]和[ShowContinentName('asia')]的目标更近了一步。"
 ohl_ottomans.205.a: "我们势不可挡！"
 ohl_ottomans.206.title: "奥斯曼停滞"
 ohl_ottomans.206.desc: "[GetCountry('TUR').GetLongName]未能成功驯服整个[ShowRegionName('crescent_region')]和[ShowAreaName('armenian_highlands_area')]。尽管他们已被击退，但其力量依然强大，我们最好做好准备，以防有朝一日他们的目光转向我们。"
 ohl_ottomans.206.a: "他们若敢来犯，我们必将严阵以待。"
 ohl_ottomans.207.title: "征服受阻"
 ohl_ottomans.207.desc: "尽管我们竭尽全力，但[ShowRegionName('crescent_region')]和[ShowAreaName('armenian_highlands_area')]仍未能在我军攻势衰竭前完全掌控。\n\n虽然未能实现全面征服的目标，但我们绝不会让此次挫折阻碍未来的扩张之路。"
 ohl_ottomans.207.a: "教训已经吸取。"
 ohl_ottomans.300.title: "入侵匈牙利"
 ohl_ottomans.300.desc: "我们早已进军[ShowRegionName('carpathia_region')][region|e]，与[GetCountry('HUN').GetLongName]进行过数次血战。但今天，我们将完成先祖开启的征服伟业。整个[ShowRegionName('carpathia_region')]都将在[GetCountry('TUR').GetLongName]的旗帜下俯首称臣！"
 ohl_ottomans.300.a: "我们将征服一切！"
 ohl_ottomans.301.title: "奥斯曼入侵匈牙利"
 ohl_ottomans.301.desc: "[GetCountry('TUR').GetLongName]对早先侵入[ShowRegionName('carpathia_region')]的成果并不满足，如今又在[ShowRegionName('carpathia_region')]边境集结了另一支入侵大军。看来土耳其人的野心永无止境。"
 ohl_ottomans.301.a: "必须阻止他们。"
 ohl_ottomans.302.title: "奥斯曼入侵！"
 ohl_ottomans.302.desc: "[GetCountry('TUR').GetLongName]又卷土重来了！看来之前的教训还不够深刻！如今，又一支庞大的军队集结在我们的边境。我们必须为新一轮的战争做好准备！"
 ohl_ottomans.302.a: "准备就绪！"
 ohl_ottomans.303.title: "征服匈牙利"
 ohl_ottomans.303.desc: "[ShowRegionName('carpathia_region')]已门户大开。我们必须集结兵力驱逐敌人，唯有通过荣耀与财富，方能确保我们族群的存续。"
 ohl_ottomans.303.a: "他们将知晓何为恐惧！"
 ohl_ottomans.303.b: "集结我们的部队。"
 ohl_ottomans.304.title: "奥斯曼征服匈牙利"
 ohl_ottomans.304.desc: "[GetCountry('TUR').GetLongName]已成功占领了整个[ShowRegionName('carpathia_region')]。这是一场漫长而残酷的战役，但最终结果明确."
 ohl_ottomans.304.a: "他们的优势已经足够深入了。"
 ohl_ottomans.305.title: "征服成功"
 ohl_ottomans.305.desc: "整个[ShowRegionName('carpathia_region')]现已归我们所有。\n\n自伍麦叶王朝时代以来，[ShowContinentName('europe')]还从未有过我们[faith|e]的国家如此深入[ShowContinentName('europe')]腹地！历史在此刻被改写，而我们正是这辉煌的胜利者。"
 ohl_ottomans.305.a: "我们的崛起无可匹敌！"
 ohl_ottomans.306.title: "奥斯曼征服停滞"
 ohl_ottomans.306.desc: "[GetCountry('TUR').GetLongName]未能成功夺取整个[ShowRegionName('carpathia_region')]。然而尽管遭遇挫折，其财富与疆域依然庞大，我们应当警惕其未来的侵略意图。"
 ohl_ottomans.306.a: "我们已准备就绪。"
 ohl_ottomans.307.title: "征服受阻"
 ohl_ottomans.307.desc: "[ShowRegionName('carpathia_region')]的居民拒绝臣服于我们的统治！不过我们的征服版图依然辽阔，但若想在未来的进攻中取得成功，我们必须从中汲取教训并调整策略。"
 ohl_ottomans.307.a: "他们迟早会向我们屈膝。"
 ohl_ottomans.308.title: "大叛变"
 ohl_ottomans.308.desc: "我们被背叛了！\n\n面对[GetCountry('TUR').GetAdjective]的侵略，我们所有的[allies|e]都决定抛弃我们！他们非但没有团结一致对抗[GetCountry('TUR').GetAdjective]这个庞然大物，反而决定背叛我们，在我们背后捅刀，让我们独自面对敌人！\n\n这些蠢货！如果我们并肩作战，本有可能击败他们的！"
 ohl_ottomans.308.a: "背信弃义！"
 mamluk_rebels: "不忠的马穆鲁克"
 mamluk_rebels_country: "不忠的马穆鲁克"
 OHL_mamluk_disaster.1.title: "勒索！"
 OHL_mamluk_disaster.1.desc: "马穆鲁克阶层早已从其最初作为精英奴隶士兵组织的形态蜕变，如今对宫廷事务的影响力与日俱增。这种日益膨胀的权势，竟驱使他们公然进行令人震惊的勒索——他们要求大幅提高俸禄，并威胁若我们不从就将实施报复！"
 OHL_mamluk_disaster.1.a: "满足他们的要求！"
 OHL_mamluk_disaster.1.b: "你为国家服务，而非国家为你服务！"
 OHL_mamluk_disaster.1.b.tt: "[target_province.GetName][pops|e]加入了[mamluk_rebels.GetName]，并损失了[ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%]的[pop_satisfaction|e]。"
 OHL_mamluk_disaster.2.title: "宫廷政变"
 OHL_mamluk_disaster.2.desc: "我们马穆鲁克军队中的相当一部分已被[target_character.GetName]的言辞所动摇，这位极具魅力的马穆鲁克怀揣着宏大的野心。如今，他们对新指挥官的忠诚已超越了对[former_ruler.GetName]的效忠！\n\n他们中的许多人正在攻打王宫，企图推翻[former_ruler.GetNameWithNoTooltip]，并拥立[target_character.GetNameWithNoTooltip]登上王位！"
 OHL_mamluk_disaster.2.a: "他们被击退，其队伍也遭到了清洗。"
 OHL_mamluk_disaster.2.b: "他们占领了宫殿！"
 OHL_mamluk_disaster.3.title: "谋杀！"
 OHL_mamluk_disaster.3.desc: "今晨，内阁成员[target_advisor.GetName]被发现身亡。\n\n显然，一个腐败的马穆鲁克士兵派系感到受到威胁或冒犯，在前一天晚上将这个可怜的人勒死了。"
 OHL_mamluk_disaster.3.a: "该死"
 OHL_mamluk_disaster.3.b: "找出责任人！"
 OHL_mamluk_disaster.4.title: "马穆鲁克的衰落"
 OHL_mamluk_disaster.4.desc: "我们曾经伟大的国家正在衰落。马穆鲁克，这个曾给我们带来军事成功和辉煌胜利的阶层，现在却成了我们的祸根。他们变得臃肿、肥胖、满足，而我们的政府无力阻止他们的放纵。\n\n北方的狼群正对我们无能为力的局面露出獠牙微笑。"
 OHL_mamluk_disaster.4.a: "我们必须坚持住。"
 OHL_mamluk_disaster.5.title: "饱经风霜"
 OHL_mamluk_disaster.5.desc: "尽管困难重重，我们的国家终究从动荡中挺了过来。诚然，如今的境况比往昔更为艰难——军队建制受损，体制机构衰败，但那段极度动荡的时期已然过去，我们终将踏上全面复兴之路。"
 OHL_mamluk_disaster.5.a: "我们继续前进。"
 ohl_ottomans_dhe.1.title: "大都市"
 ohl_ottomans_dhe.1.desc: "我们的人民涌入新占领的城市[ShowLocationName('constantinople')]。它的财富不仅在于其规模和货物，更在于其伟大的历史与文化。我们将在此建立我们的首都，并从这里打造征服世界的军队。"
 ohl_ottomans_dhe.1.a: "宝石恒久闪耀。"
 ohl_ottomans_dhe.1.a.tt1: "我们将免费研究[ShowAdvanceName('a_renaissance_janissaries_advance')][advance|e]。"
 ohl_ottomans_dhe.1.a.tt2: "四座[ShowBuildingTypeName('armory')]与[ShowBuildingTypeName('gun_smith')][buildings|e]将在[ShowLocationName('constantinople')]免费建造完成。"
 ohl_ottomans_dhe.1.a.tt3: "[ShowLocationName('constantinople')]的大量[pops|e]将皈依我们的[faith|e]并接受我们的[culture|e]。"
 ohl_ottomans_dhe.1.a.tt4: "数支[ShowUnitDefinitionName('a_renaissance_janissaries')]部队将聚集到我们在[ShowLocationName('constantinople')]的旗帜下。"
 ohl_ottomans_dhe.2.title: "过度扩张"
 ohl_ottomans_dhe.2.desc: "自亚历山大大帝以来，从未有过如此规模的快速征服。尽管迄今为止，我们的行政体系已娴熟地将新获领土纳入管辖，但管理如此多元且辽阔的帝国所带来的后勤重负，已然成为深重的惩罚。"
 ohl_ottomans_dhe.2.a: "我们必须适应并生存下去。"
 ohl_ottomans_dhe.3.title: "耶尼切里"
 ohl_ottomans_dhe.3.desc: "自从我们在[ShowRegionName('balkan_region')][region|e]的征服行动以来，我们一直依赖从新征服省份征召的男孩，他们自幼接受训练，成为纪律严明的精英士兵。\n\n然而，随着帝国人口结构的变化，这支核心部队的性质也发生了转变。它作为纯粹军事组织的地位已经异化，时至今日，耶尼切里军团已自成一种阶层，对[nation|e]的政策拥有巨大影响力。\n\n随着他们影响力的增长，其作为士兵的战斗力却在减弱，而他们的薪饷却持续攀升。"
 ohl_ottomans_dhe.3.a: "傲慢贪婪的暴发户！"
 ohl_ottomans_dhe.100.title: "入侵埃及"
 ohl_ottomans_dhe.100.desc: "[GetCountry('MAM').GetLongName]因内乱而严重削弱。长久以来，他们一直困扰着我们，自诩为全世界最伟大的[ShowReligionAdjective('sunni')][nation|e]。就让我们用钢铁与枪炮，向他们展示其真正的武力吧。\n\n我们将征服这个垂死帝国的残余，并凭借[ShowRegionName('egypt_region')]的财富，让我们崛起得更高！"
 ohl_ottomans_dhe.100.a: "开战！"
 ohl_ottomans_dhe.100.b: "我们迟早会与他们相遇。"
 ohl_ottomans_dhe.101.title: "征服埃及"
 ohl_ottomans_dhe.101.desc: "整个[ShowRegionName('egypt_region')]都归我们所有！从尼罗河到远方的海洋，我们军队在行进。显然，$muslim_god_name$对我们的眷顾远胜于对败敌的垂青。\n\n这片土地富饶，人民顺从。通过掌控现有的权力结构并安排我们的人担任要职，我们就能最有效地治理这片新领土。"
 ohl_ottomans_dhe.101.a: "攀登新高"
 ohl_ottomans_dhe.101.a.tt: "整个[ShowRegionName('egypt_region')]都将被设为核心领土。"
 ohl_holy_league.2.title: "神圣同盟"
 ohl_holy_league.2.desc: "为应对先前[GetCountry('TUR').GetAdjective]的侵略行径，[GetCountry('PAP').GetName]曾多次发起神圣同盟——即以遏制[GetCountry('TUR').GetAdjective]扩张为首要目标的联合阵线。\n\n这些努力均以失败告终。但如今，接过这一使命似乎比以往任何时候都更为紧迫。无论是出于信仰，还是为维护自身主权的现实考量，组建一个由[ShowReligionAdjective('catholic')]势力组成的防御同盟，共同抵御未来的进犯，实为明智之举。"
 ohl_holy_league.2.a: "让我们来领导这个新的神圣同盟！"
 ohl_holy_league.2.a.tt: "#color_yellow 神圣联盟#!即将成立，我们将作为其领导者"
 ohl_holy_league.2.b: "我们不需要这样的组织。"
 ohl_holy_league.3.title: "神圣同盟"
 ohl_holy_league.3.desc: "我们收到了来自[GetUniqueInternationalOrganization('ohl_holy_league').GetLeaderCountry.GetName]的函件。\n\n他们正在寻求成员加入[GetUniqueInternationalOrganization('ohl_holy_league').GetName]，这是一个[ShowReligionAdjective('catholic')]国家间的共同防御联盟，旨在抵御[GetCountry('TUR').GetAdjective]的侵略。"
 ohl_holy_league.3.a: "多么崇高的事业！"
 ohl_holy_league.3.b: "过时的垃圾。"
 ohl_holy_league.4.title: "神圣同盟"
 ohl_holy_league.4.desc: "我方间谍获悉，一个新的[ShowReligionAdjective('catholic')]防御联盟已经成立，名为[GetUniqueInternationalOrganization('ohl_holy_league').GetName]，由[GetUniqueInternationalOrganization('ohl_holy_league').GetLeaderCountry.GetName]领导。他们承诺在应对我方进一步的征服行动时相互提供保护。"
 ohl_holy_league.4.a: "真是别致。"
 ohl_holy_league.5.title: "匈牙利的命运"
 ohl_holy_league.5.desc: "被奥斯曼入侵征服并严重破坏的[GetCountry('HUN').GetName][nation|e]，正急需我们的援助。\n\n若没有更#italic 永久性#!的驻军，他们将极易遭受[GetCountry('TUR').GetAdjective]的进一步侵略。而作为[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的领袖，保护基督教世界终究#italic 是#!我们的职责！"
 ohl_holy_league.5.a: "我们将视其为朋友，而非臣属！"
 ohl_holy_league.5.b: "我们的统治者将同时登上两个王座，如同守护本国子民般捍卫它们！"
 ohl_holy_league.5.c: "我们将在匈牙利全境设立永久驻军！"
 great_turkish_war.900.title: "欧洲战败"
 great_turkish_war.900.desc: "[GetUniqueInternationalOrganization('ohl_holy_league').GetName]已击溃我军，将我们逐出了[ShowRegionName('carpathia_region')][region|e]！我军阵脚大乱，高级指挥官们仍在互相推诿责任！\n\n与此同时，我们在[ShowRegionName('balkan_region')]以北的大部分战果也已付诸东流！"
 great_turkish_war.900.a: "无能！"
 great_turkish_war.900.a.tt.1: "我们在[ShowRegionName('carpathia_region')]的领土将归还给其前所有者。"
 great_turkish_war.900.a.tt.2: "[ShowAreaName('bosnia_area')]的土地将被[GetUniqueInternationalOrganization('ohl_holy_league').GetName]占领。"
 great_turkish_war.901.title: "巴尔干半岛战败"
 great_turkish_war.901.desc: "我们再次在[GetUniqueInternationalOrganization('ohl_holy_league').GetName]手中遭受了耻辱的失败！\n\n[ShowAreaName('aegean_archipelago_area')]的岛屿已被占领，我们被掠夺的土地上还重新建立了数个先前被征服的国家！"
 great_turkish_war.901.a: "不可接受！"
 great_turkish_war.901.a.tt: "我们在[ShowRegionName('balkan_region')]的大部分领土将归还给其前所有者。"
 great_turkish_war.902.title: "希腊的命运"
 great_turkish_war.902.desc: "[ShowLocationName('constantinople')]已落入我军之手，整个[ShowRegionName('balkan_region')]现已尽在掌控。\n\n作为[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的领袖，我们有权按照我们的蓝图重塑这片土地。"
 great_turkish_war.902.a: "这一切都将属于我们！"
 great_turkish_war.902.a.tt: "我们将吞并[ShowRegionName('balkan_region')]地区所有剩余的[GetCountry('TUR').GetAdjective]领土。"
 great_turkish_war.902.b: "我们将保留色雷斯，其余地区将予以解放。"
 great_turkish_war.902.b.tt: "我们将吞并[ShowAreaName('thrace_area')]地区，并以剩余的[locations|e]为基础建立一个独立的新国家。"
 great_turkish_war.902.c: "全希腊必将获得自由！"
 great_turkish_war.902.c.tt: "所有剩余的[GetCountry('TUR').GetAdjective]在[ShowRegionName('balkan_region')]的领土将授予一个新的、独立的希腊国家。"
 great_turkish_war.903.title: "奇耻大辱"
 great_turkish_war.903.desc: "历经数世纪的繁荣统治，[ShowLocationName('constantinople')]已被[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的军队攻占。\n\n我们的政府陷入混乱，许多人声称我们的黄昏时刻已然降临。"
 great_turkish_war.903.a: "我们将共同度过这场悲剧。"
 great_turkish_war.906.title: "匈牙利的命运"
 great_turkish_war.906.desc: "[GetCountry('HUN').GetName][nation|e]已重生，被我们从[GetCountry('TUR').GetAdjective]统治下解放。\n\n若任其孤立无援，缺乏强有力的保护以抵御未来侵略，实属不负责任之举。作为[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的领导者，在其领土驻扎永久驻军以震慑[GetCountry('TUR').GetAdjective]，或许是明智之策。"
 great_turkish_war.906.a: "我们将视其为朋友，而非臣属！"
 great_turkish_war.906.b: "我们的统治者将同时登上两个王座，如同守护本国子民般捍卫它们！"
 great_turkish_war.906.c: "我们将在匈牙利全境设立永久驻军！"
 great_turkish_war.907.title: "结盟的必要性"
 great_turkish_war.907.desc: "尽管[GetUniqueInternationalOrganization('ohl_holy_league').GetName]本质上是一个[ShowReligionAdjective('catholic')]组织，但我们的成员已认识到需要更多火枪和火炮。\n\n[holy_league_target.GetName][nation|e]虽属[ShowReligionAdjective('orthodox')]信仰，却有充分理由反对[GetCountry('TUR').GetAdjective]向黑海以外的扩张，或许愿意将其军队与我们的力量联合起来。"
 great_turkish_war.907.a: "派遣使团！"
 great_turkish_war.907.b: "我们不需要更多盟友！"
 great_turkish_war.908.title: "神圣同盟"
 great_turkish_war.908.desc: "我们收到了来自[GetUniqueInternationalOrganization('ohl_holy_league').GetLeaderCountry.GetName]的信函。\n\n由于深陷与[GetCountry('TUR').GetLongName]的一系列冲突，他们正在为其所谓的[GetUniqueInternationalOrganization('ohl_holy_league').GetName]寻求更多成员。\n\n尽管我们信仰不同的[faith|e]，但眼下正是遏制[GetCountry('TUR').GetAdjective]扩张的最佳时机，或许还能在此过程中为我们自己夺取领土。"
 great_turkish_war.908.a: "我们接受！"
 great_turkish_war.908.b: "这次冲突我们就不参与了。"
 great_turkish_war.1.title: "大土耳其战争"
 great_turkish_war.1.desc: "[GetUniqueInternationalOrganization('ohl_holy_league').GetName]已察觉我们的虚弱，如今正采取行动对抗我们！我们必须巩固边境，并牢牢守住我们在[ShowRegionName('carpathia_region')]新获得的领土，以免他们试图将我们驱逐出去！"
 great_turkish_war.1.a: "准备防御！"
 great_turkish_war.2.title: "新一轮攻势"
 great_turkish_war.2.desc: "[GetCountry('TUR').GetLongName]的势力日益壮大。然而，其军队与国家之间的内部冲突引发了一波不稳定浪潮，这可能正是我们所需的良机——我们可以借此攻入其占领区，将他们赶回博斯普鲁斯海峡对岸。"
 great_turkish_war.2.a: "准备开战。"
 great_turkish_war.3.title: "新一轮攻势"
 great_turkish_war.3.desc: "[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的领袖[GetUniqueInternationalOrganization('ohl_holy_league').GetLeaderCountry.GetName]已向所有成员国发出号召，要求为对[GetCountry('TUR').GetLongName]的战争做好准备。\n\n这是我们遏制[GetCountry('TUR').GetAdjective]扩张、阻止其进一步称霸的最后也是最佳良机。"
 great_turkish_war.3.a: "我们已准备就绪。"
 great_turkish_war.4.title: "大土耳其战争"
 great_turkish_war.4.desc: "[GetUniqueInternationalOrganization('ohl_holy_league').GetName]的士兵们集结备战。察觉到[GetCountry('TUR').GetLongName]内部的虚弱，联军已在边境整军待发，誓要击垮这个[GetCountry('TUR').GetAdjective]巨人。"
 great_turkish_war.4.a: "我们将密切关注。"
 great_turkish_war.5.title: "大土耳其战争"
 great_turkish_war.5.desc.1: "经过数十年的频繁战争，大土耳其战争终于落下帷幕。敌人未能将我们逐出博斯普鲁斯海峡，而我们亦未能摧毁他们的联盟。无数生灵涂炭，如今我们只能期盼紧张局势得以平息，让我们获得喘息之机。"
 great_turkish_war.5.desc.2: "历经数次冲突，我们被迫撤离[ShowLocationName('constantinople')]！数百年来，我们一直掌握着这颗世界瑰宝，如今却被赶回了[ShowRegionName('anatolia_region')]。我们的[nation|e]陷入混乱，蒙受屈辱，为这无法估量的损失而哀恸。"
 great_turkish_war.5.a: "战火暂时平息。"
 great_turkish_war.6.desc.1: "尽管我们竭尽全力，仍未能将[GetCountry('TUR').GetLongName]完全驱逐出[ShowContinentName('europe')]。双方兵力均已过度损耗，无法立即再战，我们必须让士兵休整，为未来的冲突做好准备。"
 great_turkish_war.6.desc.2: "我们取得了辉煌的胜利！远超我们最狂野的期望，[GetCountry('TUR').GetLongName]已被逐出[ShowLocationName('constantinople')]！\n\n我们永远地羞辱了[GetCountry('TUR').GetAdjective]，捍卫了我们[nation|e]和我们[faith|e]的主权。"
 great_turkish_war.7.desc.1: "不出所料，神圣同盟与[GetCountry('TUR').GetLongName]之间的战事以无果告终。双方均未取得压倒性优势，而伤亡数字已攀升至难以承受的程度。\n\n战火在[ShowRegionName('carpathia_region')]全境逐渐平息。"
 great_turkish_war.7.desc.2: "出乎意料的是，[GetCountry('TUR').GetLongName]不仅在大土耳其战争中败北，甚至被迫撤离了[ShowLocationName('constantinople')]本土。\n\n对所有反对[GetCountry('TUR').GetAdjective]势力的人来说，这真是无比美妙的一天。"
 great_turkish_war.8.desc: "我们取得了一场伟大而迅速的胜利。那些愚蠢到胆敢结盟对抗我们的敌人已被击败，他们的军队被摧毁，战旗被缴获，成为我们日益增长的战利品堆中的一部分。\n\n即便我们的帝国疆域辽阔、治理不易，但我们的士兵依然如往日般锐不可当。"
 great_turkish_war.8.a: "光荣的胜利"
 great_turkish_war.9.desc: "神圣同盟已经瓦解。[GetCountry('TUR').GetAdjective]军队成功击退了进攻者，并造成重大伤亡，使得任何将其逐出[ShowContinentName('europe')]的后续行动都变得绝无可能。"
 great_turkish_war.100.title: "鲁莽政变"
 great_turkish_war.100.desc: "我们在[GetUniqueInternationalOrganization('ohl_holy_league').GetName]手下的惨败，已在军队内部引发剧烈震荡。早已腐败堕落、内斗不休的耶尼切里军团，正无休止地寻找着能为他们自身无能担责的替罪者或借口。\n\n最终，他们将矛头指向了国家本身。此刻，成千上万的叛军已在其首领[target_character.GetName]的率领下集结于乡野，正蓄势待发准备突袭首都，妄图夺取政权！"
 great_turkish_war.100.a: "打倒叛徒！"
 great_turkish_war.100.b: "打开宫门，让他们的阴谋得逞。"
