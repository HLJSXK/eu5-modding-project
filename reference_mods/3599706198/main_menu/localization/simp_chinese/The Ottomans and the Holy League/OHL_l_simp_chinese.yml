 STATIC_MODIFIER_NAME_OHL_ottoman_preparing_for_invasion: "准备入侵"
 STATIC_MODIFIER_NAME_OHL_holy_league_buff: "神圣同盟领袖"
 STATIC_MODIFIER_NAME_OHL_greek_liberator: "希腊解放者"
 STATIC_MODIFIER_NAME_OHL_invasion_ender: "奥斯曼入侵征服者"
 STATIC_MODIFIER_NAME_OHL_religious_propoganda: "宗教宣传"
 STATIC_MODIFIER_NAME_OHL_defensive_measures: "防御措施"
 STATIC_MODIFIER_NAME_OHL_armed_peasants: "民兵肆虐"
 ohl_janissary_corruption: "耶尼切里军团腐化"
 ohl_janissary_corruption_desc: "原本的禁卫军组织已蜕变为一个半贵族化的精英阶层，他们既是薪酬过高的精锐士兵，也是通过财富购买身份以获取更大影响力的富商。"
 ohl_mamluk_corruption: "广泛的马穆鲁克腐败"
 ohl_mamluk_corruption_desc: "马穆鲁克已在政府内部形成如此强大的派系，以至于他们能够左右政策，甚至在受到威胁时实施#italic 弑君#!之举。最糟糕的是，他们已沦为战斗力无限低下的军队，其堕落程度甚至拖累了我们整个军队的素质。"
 ohl_holy_league: "神圣同盟"
 ohl_holy_league_desc: "神圣联盟是一个主要由[ShowReligionAdjective('catholic')][countries|e]组成的团体，它们签订了共同防御条约，以保护彼此免受[GetCountry('TUR').GetAdjective]的侵略。以往的神圣联盟由[GetCountry('PAP').GetLongName]召集，但这是第一个得到[GetUniqueInternationalOrganization('hre').GetName]范围内各大列强实质性军事支持的联盟。"
 ohl_holy_league_leader: "神圣同盟领袖"
 OHL_seize_holy_league_leader: "接过领袖的重任"
 OHL_seize_holy_league_leader_desc: "[GetUniqueInternationalOrganization('ohl_holy_league').GetLeaderCountry.GetLongName]不配领导[GetUniqueInternationalOrganization('ohl_holy_league').GetName]。凭借我们更强大的军队，我们才是更合适的领导者。"
 OHL_mamluk_decline: "马穆鲁克的衰落"
 OHL_mamluk_decline_desc: "马穆鲁克阶层的权力是一把双刃剑。它曾让[GetCountry('MAM').GetName]凭借军事优势繁荣了三个世纪。但如今，这个强大的战士阶层已渗透到政府的各个层级，严重侵蚀了国家有效行动的能力。倘若马穆鲁克苏丹国无法拨乱反正、渡过这段动荡时期，北方的土耳其贝伊国必将趁其虚弱大举进犯。"
 cb_OHL_anatolian_conquest: "安纳托利亚征服"
 cb_OHL_anatolian_conquest_desc: "我们的疆土将很快如海洋般辽阔。\n\n使用此[casus_belli|e]进行征服将仅限于[ShowRegionName('anatolia_region')][region|e]。"
 war_goal_OHL_war_goal_antaolian_conquest: "安纳托利亚优势"
 war_goal_OHL_war_goal_antaolian_conquest_desc: "[war_goal|e]的目标是要比敌人赢得更多的战斗。"
 cb_OHL_byzantine_foothold: "欧洲立足点"
 cb_OHL_byzantine_foothold_desc: "我们的疆土将很快如海洋般辽阔。\n\n使用此[casus_belli|e]进行征服将仅限于[ShowAreaName('thrace_area')]、[ShowAreaName('macedonia_area')]、[ShowAreaName('northern_greece_area')]和[ShowAreaName('morea_area')][areas|e]。"
 cb_OHL_byzantine_foothold_PROV: "[PROVINCE.GetName]的立足点征服"
 war_goal_OHL_war_goal_byzantine_foothold: "欧洲立足点"
 war_goal_OHL_war_goal_byzantine_foothold_desc: "[war_goal|e]的目标是占领[PROVINCE.GetName]。"
 cb_OHL_balkan_conquest: "征服巴尔干"
 cb_OHL_balkan_conquest_desc: "我们的疆土将很快如海洋般辽阔。\n\n使用此[casus_belli|e]进行征服将仅限于[ShowRegionName('balkan_region')][region|e]。"
 war_goal_OHL_war_goal_balkan_conquest: "巴尔干优势"
 war_goal_OHL_war_goal_balkan_conquest_desc: "[war_goal|e]的目标是要比敌人赢得更多的战斗。"
 cb_OHL_consolidation: "突厥合并"
 cb_OHL_consolidation_desc: "我们的疆土将很快如海洋般辽阔。\n\n使用此[casus_belli|e]进行征服将仅限于[ShowRegionName('balkan_region')]和[ShowRegionName('anatolia_region')][regions|e]"
 war_goal_OHL_war_goal_consolidation: "霸权"
 war_goal_OHL_war_goal_consolidation_desc: "[war_goal|e]的目标是要比敌人赢得更多的战斗。"
 cb_OHL_mamluk_conquest: "奥斯曼入侵埃及"
 cb_OHL_mamluk_conquest_desc: "我们的疆土将很快如海洋般辽阔。\n\n启用[ShowPeaceTreatyTypeName('OHL_ottoman_conquest_of_mamluks')][peace_treaty|e]。"
 war_goal_OHL_war_goal_mamluk_conquest: "霸权"
