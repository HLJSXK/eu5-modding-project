l_simp_chinese:
 mission_subjugate_germiyanids:0 "降服盖尔米扬"
 mission_subjugate_germiyanids_desc:0 "盖尔米扬贝伊国，曾经是我国的劲敌，如今不过是安纳托利亚统一的垫脚石。无论通过外交途径还是武力手段，我们都必须使其归于奥斯曼家族的崇高庇护之下，将其土地与资源并入我们日益壮大的国家。"
 mission_expel_byzantium:0 "驱逐拜占庭人"
 mission_expel_byzantium_desc:0 "往日的阴魂仍在安纳托利亚游荡。苟延残喘的拜占庭帝国，仍占据着本应属于信士的土地。我们必须将他们彻底驱逐出我们的海岸，将小亚细亚完整统一在我们的旗帜之下。"
 mission_conquer_gallipoli:0 "夺取加里波利"
 mission_conquer_gallipoli_desc:0 "加里波利要塞扼守通往色雷斯的要道，是欧洲之钥。夺取这一战略要地，不仅能确保我军通行无阻，更将成为我们向巴尔干地区进行光荣扩张的跳板。"
 mission_settle_rumelia:0 "定居鲁米利亚"
 mission_settle_rumelia_desc:0 "仅靠征服还远远不够。要永久巩固这些新领土，我们必须鼓励安纳托利亚可靠的土耳其家庭和约鲁克游牧民向鲁米利亚迁移。唯有让我们的文化在这片土地上扎根，才能打下千秋万代的基业。"
 mission_conquer_west_anatolia:0 "统一西安纳托利亚"
 mission_conquer_west_anatolia_desc:0 "西海岸四分五裂于各个小贝伊国，他们在帝国崛起时为残羹剩饭争吵不休。统一诸邦是我们的天命。掌控安纳托利亚西部，我们将控制爱琴海沿岸，并在西征时消除后方一切威胁。"
 mission_advance_into_balkans:0 "挺进巴尔干"
 mission_advance_into_balkans_desc:0 "欧洲的大门已经敞开。塞尔维亚与保加利亚的王公贵族们四分五裂，羸弱不堪。我军将挥师北上，为巴尔干之地重建秩序与正义。从多瑙河到亚得里亚海，世人必将见识奥斯曼帝国的威名。"
 mission_take_greece:0 "征服希腊"
 mission_take_greece_desc:0 "伯罗奔尼撒和奥林匹斯在召唤。我们必须将文明的摇篮置于我们的保护之下。"
 mission_marching_east:0 "进军东方"
 mission_marching_east_desc:0 "我们将目光转向安纳托利亚的中心地带。必须巩固我们在中部平原和卡帕多西亚的势力，以确保东部安全，并召集土库曼部落加入我们的事业。"
 mission_control_black_sea:0 "控制黑海"
 mission_control_black_sea_desc:0 "本都海岸对贸易和安全至关重要。我们必须确保黑海成为奥斯曼帝国的内湖。"
 mission_take_constantinople:0 "世界渴望之城"
 mission_take_constantinople_desc:0 "第二罗马君士坦丁堡，傲然屹立。其城墙历经千年围攻而岿然不动。但预言昭示，一位伟大的统帅将征服此地。我们必须完成天命，使其成为帝国之都。"
 mission_diplomatic_relations:0 "扩大外交影响"
 mission_diplomatic_relations_desc:0 "我们日益增长的威望吸引了小国的忠诚。我们必须确保至少三个附庸国服从苏丹的意志，通过忠诚臣属的网络来巩固我们的边疆。"
 mission_cultural_boom:0 "文化主导"
 mission_cultural_boom_desc:0 "为了确保我们帝国的长治久安，土耳其文化必须成为国家的基石。我们必须鼓励文化繁荣与同化进程，直到我们的人民成为多数群体。"
 mission_turks_in_pontus:0 "本都定居点"
 mission_turks_in_pontus_desc:0 "长期以来由希腊人占据的本都海岸必须完全整合。通过鼓励土耳其人在此区域定居，我们将为子孙后代确保黑海沿岸的安全。"
 mission_subjugate_karaman:0 "征服卡拉曼"
 mission_subjugate_karaman_desc:0 "卡拉曼人自称继承了塞尔柱的正统，这一主张我们绝不能容忍。他们必须臣服并接受奥斯曼的宗主权，否则将承受后果。"
 mission_greater_diplomacy:0 "主权霸权国"
 mission_greater_diplomacy_desc:0 "仅有几个附庸国还不够，必须确保他们绝对忠诚。当臣民既爱戴又畏惧我们时，我们的外交影响力才能延伸到更远的地方。"
 mission_seeking_alliances:0 "战略联盟"
 mission_seeking_alliances_desc:0 "即便是伟大的帝国也需要盟友。与强国建立可靠的联盟，将巩固我们的统治合法性，并抵御敌对联盟的威胁。"
 tur_expel_byzantium_trigger_tt:0 "拜占庭不得在安纳托利亚区域拥有任何领土。"
 tur_gallipoli_turkish_majority_tt:0 "加利波利必须拥有至少25%的土耳其文化人口。"
 tur_conquer_west_anatolia_trigger_tt:0 "至少拥有西安纳托利亚地区44%的份额。"
 tur_advance_into_balkans_trigger_tt:0 "至少拥有整个巴尔干地区的10%。"
 tur_take_greece_trigger_tt:0 "100%控制希腊北部和摩里亚（直接控制或附庸国）"
 tur_marching_east_trigger_tt:0 "控制至少66%的安纳托利亚中部和卡帕多西亚地区（直接控制或通过附庸国）"
 tur_control_black_sea_trigger_tt:0 "控制至少80%的本都地区"
 tur_develop_silk_trigger_tt:0 "布尔萨必须拥有布匹或优质布匹行会（3级或以上）或任何更高级的纺织建筑。"
 tur_control_marmara_trigger_tt:0 "在巴勒克埃西尔，如布尔萨和伊兹密特拥有并至少控制80%"
 tur_turks_in_pontus_trigger_tt:0 "本都地区必须拥有至少40%的土耳其文化人口。"
 STATIC_MODIFIER_NAME_tur_subjugated_germiyanids_reward:0 "整合格尔米扬"
 STATIC_MODIFIER_DESC_tur_subjugated_germiyanids_reward:0 "对格尔米扬的整合，巩固了我们的合法性，并确保了当地臣民的忠诚。"
 STATIC_MODIFIER_NAME_tur_expelled_byzantium_reward:0 "巩固安纳托利亚"
 STATIC_MODIFIER_DESC_tur_expelled_byzantium_reward:0 "随着拜占庭人被驱逐，安纳托利亚的伊斯兰化和突厥化进程在无干扰的情况下加速推进。"
 STATIC_MODIFIER_NAME_tur_conquer_gallipoli_reward:0 "控制达达尼尔海峡"
 STATIC_MODIFIER_DESC_tur_conquer_gallipoli_reward:0 "掌握欧洲的关键是对贸易和海上通道施加重要控制。"
 STATIC_MODIFIER_NAME_tur_settle_rumelia_reward:0 "鲁米利亚定居点"
 STATIC_MODIFIER_DESC_tur_settle_rumelia_reward:0 "我们人民定居在巴尔干地区打造了忠诚的基础，这有助于简化行政管理。"
 STATIC_MODIFIER_NAME_tur_conquer_west_anatolia_reward:0 "安纳托利亚霸权"
 STATIC_MODIFIER_DESC_tur_conquer_west_anatolia_reward:0 "贝伊国的统一使我们的军事指挥得以集中，从而提升了训练度。"
 STATIC_MODIFIER_NAME_tur_advance_into_balkans_reward:0 "大战役"
 STATIC_MODIFIER_DESC_tur_advance_into_balkans_reward:0 "我们不懈的扩张从新领土上招募了大量新兵加入我们的旗帜之下。"
 STATIC_MODIFIER_NAME_tur_cavalry_power_bonus:0 "土库曼骑兵优势"
 STATIC_MODIFIER_DESC_tur_cavalry_power_bonus:0 "土库曼部落的融入为奥斯曼军队带来了强大的轻骑兵，他们擅长运用游击战术。"
 STATIC_MODIFIER_NAME_tur_take_greece_reward:0 "希腊围城战术"
 STATIC_MODIFIER_DESC_tur_take_greece_reward:0 "从希腊要塞围城战中获得的经验，提升了我们的攻城战能力。"
 STATIC_MODIFIER_NAME_tur_patriarchate_tax_bonus:0 "奥斯曼帝国权威的确立"
 STATIC_MODIFIER_DESC_tur_patriarchate_tax_bonus:0 "国家机器的重组与伊斯兰法的确认，提升了税收效率并强化了信仰。"
 STATIC_MODIFIER_NAME_tur_patriarchate_tolerance_reward:0 "牧首区合作"
 STATIC_MODIFIER_DESC_tur_patriarchate_tolerance_reward:0 "牧首区的合作确保了与我们的基督教臣民之间更顺畅的关系。"
 STATIC_MODIFIER_NAME_tur_cultural_boom_reward:0 "内阁和谐"
 STATIC_MODIFIER_DESC_tur_cultural_boom_reward:0 "随着共同文化打造出官僚体系，国家行政管理的效率得到了提升。"
 STATIC_MODIFIER_NAME_tur_pop_conversion_speed_reward:0 "快速突厥化"
 STATIC_MODIFIER_DESC_tur_pop_conversion_speed_reward:0 "国家支持并加速民众的文化转变。"
 STATIC_MODIFIER_NAME_tur_turks_in_pontus_reward:0 "整合本都"
 STATIC_MODIFIER_DESC_tur_turks_in_pontus_reward:0 "本都的成功殖民给外国宫廷留下了深刻印象，提升了我们的外交地位。"
 STATIC_MODIFIER_NAME_tur_subjugate_karaman_reward:0 "尕勒莽人归顺"
 STATIC_MODIFIER_DESC_tur_subjugate_karaman_reward:0 "尕勒莽人的归顺为我们的朝贡体系带来了财富与稳定。"
 STATIC_MODIFIER_NAME_tur_greater_diplomacy_reward:0 "外交霸权"
 STATIC_MODIFIER_DESC_tur_greater_diplomacy_reward:0 "我们的臣民已完全融入我们，彻底吸收他们不过是走个形式罢了。"
 STATIC_MODIFIER_NAME_tur_seeking_alliances_reward:0 "强权外交"
 STATIC_MODIFIER_DESC_tur_seeking_alliances_reward:0 "我们广泛的外交网络使我们能够同时与多个宫廷保持联系。"
 tur_conquest.1.title:0 "加里波利陷落"
 tur_conquest.1.desc:0 "加利波利要塞已陷落！摧毁城墙的地震无疑是神恩的征兆。我们的勇士已冲入城中，控制了城堡。如今，我们掌握了连接亚欧大陆的桥梁。通往鲁米利亚的道路已经敞开！"
 tur_conquest.1.a:0 "为入侵部队扩建码头。"
 tur_conquest.2.title:0 "巴尔干半岛的定居"
 tur_conquest.2.desc:0 "成千上万的游牧民和家庭正跨越达达尼尔海峡，在鲁米利亚的肥沃土地上建立村庄和城镇。人口结构的平衡正朝着有利于我们的方向转变，巩固了我们对半岛的控制。"
 tur_conquest.2.a:0 "他们的忠诚是我们的力量"
 tur_conquest.3.title:0 "西方世界的整合"
 tur_conquest.3.desc:0 "安纳托利亚西部的独立贝伊已被征服。他们的土地、贸易和军队如今尽归我们所有。后方稳固，苏丹得以将目光完全投向欧洲的财富。"
 tur_conquest.3.a:0 "军队日益壮大。"
 tur_conquest.4.title:0 "欧罗巴战争"
 tur_conquest.4.desc:0 "我们的旗帜高高飘扬在巴尔干要塞之上，当地领主已学会畏惧我们。我们在欧洲开辟了领地，而这仅仅是我们统治的开端。"
 tur_conquest.4.a:0 "耶尼切里因新兵加入而壮大。"
 tur_conquest.5.title:0 "希腊的臣服"
 tur_conquest.5.desc:0 "从奥林匹斯的山峰到摩里亚的港口，希腊人已经接受了我们的统治。从攻占他们的山顶堡垒中吸取的教训将在未来的围攻中为我们提供很好的帮助。"
 tur_conquest.5.a:0 "我们的攻城技艺无人能及。"
 tur_conquest.6.title:0 "土库曼骑兵"
 tur_conquest.6.desc:0 "随着安纳托利亚贝伊国的臣服和控制安纳托利亚高原，凶猛的土库曼部落纷纷投奔我们的旗帜。这些以速度和箭术闻名的骑术大师，已准备好为苏丹的征服事业效力。"
 tur_conquest.6.a:0 "土库曼骑手已准备就绪！"
 tur_conquest.7.title:0 "黑海霸权"
 tur_conquest.7.desc:0 "黑海的贸易航线如今已归我们所有，本都的财富正源源不断地流入我们的国库。"
 tur_conquest.7.a:0 "黑海是奥斯曼的内湖。"
 tur_conquest.8.title:0 "牧首区的命运"
 tur_conquest.8.desc:0 "随着君士坦丁堡的征服，如今我们决定普世牧首区的命运。我们可以允许它在我们的保护下存续，以维系东正教臣民的忠诚；也可以削弱其影响力，以巩固我们自身的制度。"
 tur_conquest.8.a:0 "允许牧首区存在。"
 tur_conquest.8.b:0 "取缔牧首区并没收其财产。"
 tur_diplomacy.1.title:0 "卡拉曼问题"
 tur_diplomacy.1.desc:0 "尕勒莽人自诩为塞尔柱的继承者，公然挑战我们在安纳托利亚的统治。然而我们的外交网络正逐渐收紧。随着忠诚的附庸国稳固了我们的侧翼，现在是时候通过外交或武力让尕勒莽人屈服了。"
 tur_diplomacy.1.a:0 "他们必将向奥斯曼家族俯首称臣！"
 tur_diplomacy.2.title:0 "文化黄金时代"
 tur_diplomacy.2.desc:0 "土耳其的语言和文化已成为这片土地上的主导。诗人、工匠和学者纷纷涌向我们的宫廷，行政运转也比以往任何时候都更加顺畅。"
 tur_diplomacy.2.a:0 "“身为土耳其人是何等光荣（Ne mutlu Türk'üm diyene）”"
 tur_diplomacy.3.title:0 "本都地区的突厥化"
 tur_diplomacy.3.desc:0 "曾经是希腊文化堡垒的本都多山海岸，现在已经迎来了一波土耳其人的定居。该区域现在已牢固地融入奥斯曼帝国，确保了我们北部海岸的安全。"
 tur_diplomacy.3.a:0 "黑海沿岸已确保安全。"
 tur_diplomacy.4.title:0 "卡拉曼的归顺"
 tur_diplomacy.4.desc:0 "卡拉曼贝伊终于接受了奥斯曼的宗主地位。他们宣誓效忠，将财富与军队尽数献予我们。"
 tur_diplomacy.4.a:0 "安纳托利亚离统一更近了一步。"
 tur_diplomacy.5.title:0 "外交精通"
 tur_diplomacy.5.desc:0 "我们的附庸网络稳固可靠，通过定期派遣使节、联姻以及馈赠礼物，我们确保了附属国不仅顺从，更对我们忠心耿耿。如今，将这些领地纳入帝国版图已是水到渠成之事。"
 tur_diplomacy.5.a:0 "他们是我们意志的延伸。"
 tur_diplomacy.6.title:0 "一位值得信赖的盟友"
 tur_diplomacy.6.desc:0 "我们的外交取得了成果。我们基于互信和尊重建立了一个强大的联盟，这一伙伴关系将成为动荡世界中的稳定支柱。"
 tur_diplomacy.6.a:0 "愿此友谊地久天长。"
 mission_develop_silk:0 "重振丝绸产业"
 mission_develop_silk_desc:0 "布尔萨和阿克亚泽地理位置优越，非常适合发展成为丝绸生产中心。投资这些产业，我们便能与东方最精良的工坊一较高下，并为国库带来大量黄金。"
 mission_control_marmara:0 "马尔马拉霸权"
 mission_control_marmara_desc:0 "马尔马拉海是我们领地的核心，完全掌控这片水域至关重要。我们必须扩大海军力量，确保没有敌舰胆敢未经许可驶入这片海域。"
 mission_stabilize_country:0 "内部稳定"
 mission_stabilize_country_desc:0 "一个伟大的帝国不能建立在松散的基础上。我们必须确保国家稳定，让所有人都承认我们统治的合法性，从而为宏伟的建设工程铺平道路。"
 mission_build_libraries:0 "学术中心"
 mission_build_libraries_desc:0 "知识就是力量，通过在城镇中建立图书馆，我们将培养一代学者与管理者，他们将引领帝国进入一个崭新的启蒙时代。"
 mission_commercial_hegemony:0 "商业霸权"
 mission_commercial_hegemony_desc:0 "科斯坦丁尼耶坐落于世界的十字路口，我们必须积极扩大在这座城市的商业存在，超越外国商人，使其成为无可争议的全球贸易中心。"
 STATIC_MODIFIER_NAME_tur_develop_silk_reward:0 "布尔萨丝绸业"
 STATIC_MODIFIER_DESC_tur_develop_silk_reward:0 "国家对丝绸工坊的投资为当地经济注入了活力。"
 STATIC_MODIFIER_NAME_tur_control_marmara_reward:0 "马尔马拉海上霸权"
 STATIC_MODIFIER_DESC_tur_control_marmara_reward:0 "我们对马尔马拉海的绝对掌控，巩固了我们的海军实力与海洋传统。"
 STATIC_MODIFIER_NAME_tur_stabilize_country_reward:0 "繁荣稳定"
 STATIC_MODIFIER_DESC_tur_stabilize_country_reward:0 "王国的稳定为快速高效地建设国家基础设施提供了保障。"
 STATIC_MODIFIER_NAME_tur_build_libraries_reward:0 "文学觉醒"
 STATIC_MODIFIER_DESC_tur_build_libraries_reward:0 "图书馆的普及带动了识字率与文化素养的显著提升。"
 STATIC_MODIFIER_NAME_tur_commercial_hegemony_reward:0 "商业大师"
 STATIC_MODIFIER_DESC_tur_commercial_hegemony_reward:0 "我们的商人主宰了市场，为国家带来了巨大的财富。"
 TUR_ottoman_missions:0 "奥斯曼使命"
 TUR_ottoman_missions_BUTTON_DETAILS:0 "崇高志向"
 TUR_ottoman_missions_BUTTON_TOOLTIP:0 "点击开始奥斯曼任务树"
 TUR_ottoman_missions_CRITERIA_DESCRIPTION:0 "奥斯曼注定要走向伟大。完成这些任务，带领国家进入黄金时代。"
 TUR_ottoman_missions_DESCRIPTION:0 "奥斯曼正站在十字路口。西边是鲁米利亚和衰败的拜占庭帝国；东边则是安纳托利亚兵革不休的贝伊国。我们必须统一这些土地，确保贸易路线的安全，建立一个横跨三大洲的帝国。"
 STATIC_MODIFIER_NAME_tur_mission_tree_completion_reward:0 "奥斯曼黄金时代"
 STATIC_MODIFIER_DESC_tur_mission_tree_completion_reward:0 "我们宏伟目标的成功实现迎来了一个稳定和高效的黄金时代。"
 tur_economy.1.title:0 "安纳托利亚丝绸织工"
 tur_economy.1.desc:0 "在布尔萨和阿克亚齐的投资得到了回报。织布机的声响如今不绝于耳，我们的丝绸从威尼斯到大不里士的市场都备受追捧。"
 tur_economy.1.a:0 "献给苏丹的华丽织物！"
 tur_economy.2.title:0 "奥斯曼湖"
 tur_economy.2.desc:0 "我们的桨帆船巡逻于马尔马拉海的每一处海湾与河口。这片海域已成为奥斯曼的内湖，免受任何威胁。"
 tur_economy.2.a:0 "这片海洋属于我们。"
 tur_economy.3.title:0 "稳固的基础"
 tur_economy.3.desc:0 "各省秩序井然，人民安居乐业，政府的正统性无可置疑，现在正是建设的最佳时机。"
 tur_economy.3.a:0 "现在我们开始建设。"
 tur_economy.4.title:0 "学术黄金时代"
 tur_economy.4.desc:0 "图书馆在各个城镇中涌现。学者们正在讨论哲学、法律和科学，我国人民的识字率正在迅速提高。"
 tur_economy.4.a:0 "知识照亮前路。"
 tur_economy.5.title:0 "世界市场"
 tur_economy.5.desc:0 "我们的商人已经在科斯坦丁尼耶市场上挤走了威尼斯人和热那亚人，现在世界财富尽归奥斯曼。"
 tur_economy.5.a:0 "黄金如流水般涌来。"