l_simp_chinese:
 flavor_otto.2000.title: "征服[GetCountry('MAM').GetNameWithNoTooltip]！"
 flavor_otto.2000.a: "对马穆鲁克发起战役势在必行，扬起战旗！！"
 flavor_otto.2000.historical_info: "奥斯曼帝国与马穆鲁克王朝的关系处于敌对状态，其原因在于两国都通过丝绸之路和香料之路获取财富。此外，奥斯曼帝国希望控制伊斯兰圣城。两个强国之间存在着四个缓冲土库曼国家（卡拉曼侯国、拉马赞侯国、白羊王国和杜勒卡迪尔侯国）。这四个国家经常根据奥斯曼与马穆鲁克关系的现状而改变立场。"
 flavor_otto.2001.title: "再次征服[GetCountry('MAM').GetNameWithNoTooltip]！"
 flavor_otto.2001.a: "我们必须消灭马穆鲁克，夺取埃及。"