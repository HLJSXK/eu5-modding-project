l_simp_chinese:
 super_vassal:0 "超级附庸"
 super_vassal_desc:0 "一位极度忠诚的臣属，其统治者生来只为效忠。该臣属能为宗主国大幅提升内阁效率，同时为其征召纪律严明、士气高昂的军队。"
 subjecttype_super_vassal:0 "超级附庸"
