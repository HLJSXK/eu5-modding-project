 hyper_aggressive_military_stance:0 "超级激进"
 hyper_aggressive_military_stance_desc:0 "该立场的持有者会无情地追杀敌军部队，并对敌方领土实施地毯式围城，几乎不考虑保卫友方领土。"
 hyper_defensive_military_stance:0 "极度防御"
 hyper_defensive_military_stance_desc:0 "该立场的持有者优先考虑保卫己方及盟军领土、支援围城作战与坚守战线，而非深入敌境追击敌军。"
