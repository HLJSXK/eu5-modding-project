 press_persian_claims: "索取宣称"
 press_persian_claims_desc: "[ShowRegionName('persia_region')]现已摆脱异族统治，然而，地方军阀正磨刀霍霍，意图重掌波斯权柄。我们必须将他们全部统一在#italic 我们#!的旗帜之下！"
 claim_persian_mantle: "宣布我们为波斯正统继承人"
 claim_persian_mantle_desc: "我们终于积蓄了足够的力量，宣告自己为波斯正统继承者。我们的军队整装待发，国库充盈，我们的威名响彻伊朗高原。是时候昭告天下——我们才是天命所归的万王之王，注定要将波斯大地统一于同一旗帜之下。让所有僭越者臣服于王座前，否则便会被历史的洪流席卷而去。"
 annex_persian_amir: "整合波斯附庸国"
 annex_persian_amir_desc: "昔日将波斯割裂为诸多封地的弱小埃米尔与地方总督，如今已臣服于我们的权威。通过授予他们宫廷荣誉职位、承诺其家族延续财富与影响力，并逐步将其行政体系纳入我们麾下，我们便能和平地将这些附庸整合为统一的波斯国家。这一进程将迅速推进，因为他们已然认识到——他们的未来不在于独立，而在于重振伊朗的荣光之中。"
 persia_rise_cores_tt: "我们将获得对波斯的核心领土。"
 restore_persian_cities: "恢复波斯城市"
 restore_persian_cities_desc: "诗人曾吟咏过那些辉煌堪比天堂花园的城市——丝绸商队从遥远国度抵达，学者们在宏伟殿堂中辩论，喷泉为喧嚣市集带来清凉。那些日子虽已逝去，但不必只存于回忆。让我们重建失落的荣光，为永恒波斯的故事书写新的篇章。"
