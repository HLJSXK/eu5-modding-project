l_simp_chinese:
 ERA_f: "埃兰沙赫尔"
 ERA_f_desc: "埃兰沙赫尔是伊朗人的领地，在5世纪的阿拉伯征服浪潮中日渐衰微，然而伊朗帝国并未消亡，而是在伊朗文化和伊斯兰神学的双重影响下，重塑为一个新的帝国。随着祆教再度成为国教，我们将能够扭转帝国所经历的变迁，使其重回更为传统的轨道。"
 rule_rise_of_the_turkomen: "土库曼人的崛起"
 setting_historical_turkomen: "史实崛起"
 setting_ahistorical_turkomen: "非史实崛起"
 setting_historical_turkomen_desc: "土库曼人将如史实上那样征服并扩张。"
 setting_ahistorical_turkomen_desc: "土库曼人将不会在其扩张区域内修建铁路。"
 rule_rise_of_the_safavids: "萨法维的崛起"
 setting_historical_safavids: "史实的萨法维王朝"
 setting_ahistorical_safavids: "非史实的萨法维王朝"
 setting_ahistorical_safavids_desc: "伊斯梅尔的征服之路将不受任何限制。"
 setting_historical_safavids_desc: "伊斯玛仪将如历史上那样，重新统一伊朗。"