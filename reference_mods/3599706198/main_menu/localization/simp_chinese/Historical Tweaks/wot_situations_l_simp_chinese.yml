 WOT_OTTOMAN_ALLIES: "我们的盟友"
 WOT_OTTOMAN_SUBJECTS: "我们的臣民"
 WOT_CURRENTLY_INVADED: "目前正在被入侵"
 WOT_FUTURE_INVASION_TARGET: "未来入侵目标"
 decline_of_mamluks: "马穆鲁克的衰落"
 decline_of_mamluks_desc: "曾经强盛的马穆鲁克苏丹国，作为伊斯兰世界数世纪以来的首要力量与圣城守护者，如今正步入衰落时代。内部分裂、经济停滞以及对新军事技术的不适应，已削弱了他们对埃及和黎凡特地区的掌控。缔造这个国家的奴隶武士精英阶层日渐自满，其传统骑兵战术在火药军队面前愈发过时。曾经充盈国库的贸易路线如今要么绕开他们的领土，要么落入宿敌掌控。当马穆鲁克统治阶级竭力维持统治权威时，邻国正以日益增长的兴趣觊觎着他们富庶的省份。问题已不再是马穆鲁克领地是否会崩塌，而在于谁将继承这个摇摇欲坠帝国的残片。"
 rise_of_mughals: "莫卧儿帝国的崛起"
 rise_of_mughals_desc: "莫卧儿帝国是当时世界上最强大、文化最繁荣的国家之一。它由巴布尔在帕尼帕特战役获胜后建立，此后迅速崛起，主宰了整个印度次大陆——其宫廷汇聚了波斯艺术、伊斯兰学术与印度教传统。然而，庞大的帝国也滋生出无限问题，贵族的忠诚、各省份的财富以及宗教信仰的统一，都始终充满变数，绝非理所当然。"
