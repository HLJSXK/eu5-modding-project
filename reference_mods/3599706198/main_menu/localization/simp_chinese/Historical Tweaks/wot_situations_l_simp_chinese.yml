 wot_turkish_plan_invasion_select_country: "选择要入侵的国家"
 wot_turkish_expansion: "土耳其征服"
 wot_turkish_expansion_desc: "统一了安纳托利亚的分裂贝伊国并将巴尔干半岛置于奥斯曼统治之下后，这个国家已经准备好实现其成为伟大帝国的命运。不再满足于地区霸权，奥斯曼的野心转向了四周富饶的土地。南部是古老的黎凡特城市和东西方贸易交汇处的埃及财富。更远的地方，希贾兹的圣城和盛产香料的也门港口在召唤。东部是亚美尼亚高地和与波斯接壤的边境地带等待关注。越过黑海，克里米亚半岛和广阔的草原提供了新的征服和定居的前沿。甚至北非海岸，从的黎波里到阿尔及尔，都落入了不断扩大的奥斯曼势力范围。\n\n这不仅仅是领土扩张，而是打造一个横跨三大洲并控制连接这些大陆的战略水道的帝国。每次战役不仅带来新的土地和臣民，还带来了管理和维持如此多样化领土凝聚力的新挑战。奥斯曼军队久经沙场，国库充裕，但问题仍然存在：这个国家在达到有效治理的极限之前能扩展多远？目前，机会正在召唤，国家将以钢铁般的意志和决心回应这一召唤。"
 wot_turkish_plan_invasion_tt: "无可用入侵目标"
