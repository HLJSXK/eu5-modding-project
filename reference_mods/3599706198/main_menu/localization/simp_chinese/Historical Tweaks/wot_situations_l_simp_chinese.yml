 rise_of_persia: "波斯崛起"
 rise_of_persia_desc: "数个世纪以来，波斯大地始终笼罩在外族统治的阴影之下——突厥征服者、蒙古后继者以及那些对伊朗古老荣光漠不关心的远方领主相继主宰着这片土地。然而在屈辱的表象之下，波斯之魂从未熄灭。从呼罗珊到阿塞拜疆，波斯贵族们正磨砺刀剑，集结武士。是时候让波斯的继承者们夺回与生俱来的权利，重塑故土的命运了。问题不在于波斯是否会再度崛起，而在于谁将引领她走向崭新的辉煌时代。"
