 crisis_of_the_timurids.1.title: "帖木儿帝国的危机"
 crisis_of_the_timurids.1.desc: "由帖木儿亲自征战建立起的伟大帖木儿帝国，在内部分裂的重压下开始瓦解。长期臣服于帖木儿统治的地方势力察觉到中央的衰弱，纷纷开始夺回先祖的土地。那些曾令从安纳托利亚到印度斯坦的王公们俯首称臣的大汗们，如今发现自己的权威备受挑战，掌控力正随着季节更迭不断流失。\n\n随着帖木儿中央政权分崩离析，帝国境内的属民将迎来解放的契机。"
 crisis_of_the_timurids.1.a: "乌云笼罩在我们的帝国上空……"
 crisis_of_the_timurids.2.title: "帝国永存"
 crisis_of_the_timurids.2.desc: "凭借力量与决心，我们已安然渡过那场险些撕裂帖木儿帝国的内乱风暴。各地兴起的叛乱势力或被镇压，或被安抚，帝国如今重归统一，中央权威坚如磐石。危机已然过去，我们的疆域依然完整——这正是伟大帖木儿不朽遗产的明证。"
 crisis_of_the_timurids.2.a: "世界将在我们的帝国脚下颤抖！"
 crisis_of_the_timurids.4.title: "建立附庸国"
 crisis_of_the_timurids.4.desc: "帖木儿已逝，领地日益动荡，不如将其分封给附庸，让他们代我们治理。"
 crisis_of_the_timurids.4.a: "为了我们的存续，必须采取这些措施。"
 crisis_of_the_timurids.4.b: "或许我们的未来在别处。"
 crisis_of_the_timurids.4.c: "不必担心，我们能挺过去。"
 crisis_of_the_timurids.5.title: "不安分的属国"
 crisis_of_the_timurids.5.desc: "[target_subject.GetName] 对我们的统治日益不忠。他们的总督公开谈论独立，叛乱在其领土上蔓延。我们必须决定是给予他们自由，还是采取严厉措施确保他们继续臣服。"
 crisis_of_the_timurids.5.a: "准予独立。我们无法掌控无法控制之地。"
 crisis_of_the_timurids.5.b: "以厚礼与承诺笼络人心，确保其忠诚。"
 crisis_of_the_timurids.6.title: "一个获取人情的机会"
 crisis_of_the_timurids.6.desc: "我们的附庸国[target_subject.GetName]至今表现忠诚，但其宫廷中的流言暗示他们期待我们展现善意姿态。一份慷慨的馈赠或许能进一步巩固他们对事业的奉献值。"
 crisis_of_the_timurids.6.a: "送去黄金，并重申我们的盟约。"
 crisis_of_the_timurids.6.b: "他们足够忠诚，把我们的国库资金留给更紧迫的事务吧。"
 crisis_of_the_timurids.7.title: "附庸国的要求"
 crisis_of_the_timurids.7.desc: "[target_subject.GetName]已派遣使节提出大胆要求——减少贡赋、扩大自治权并承认其地方统治权威。他们声称此举对维持其领地秩序至关重要。若我们拒绝，其忠诚恐将动摇。"
 crisis_of_the_timurids.7.a: "答应他们的要求，重金安抚以维持和平。"
 crisis_of_the_timurids.7.b: "拒绝他们的无礼，他们不过是我们的臣仆。"
 establish_governor: "设立总督"
 establish_governor_desc: "让我们将亲属安排到治理职位上，以缓解困扰国家的诸多问题。"
 choose_area: "选择地区"