l_simp_chinese:
 historical_tweaks_union.1.title: "[ROOT.GetCountry.GetName]"
 historical_tweaks_union.1.desc: "咕咕嘎嘎的看什么呢，玩就是了！"
 historical_tweaks_union.1.a: "太好了！"
 historical_tweaks_union.2.title: "哈布斯堡之网"
 historical_tweaks_union.2.desc: "我们的影响力跨越国界，家族的威望保障了盟友的忠诚与稳定。"
 historical_tweaks_union.2.a: "强制宗族统一"
 historical_tweaks_union.2.b: "颂扬我们的血脉"
 historical_tweaks_union.3.title: "[target.GetNameWithNoTooltip]归于我们的王权之下"
 historical_tweaks_union.3.desc: "如今我们的家族统治着[target.GetName]。宗族纽带确保了两地的影响力与荣耀。"
 historical_tweaks_union.3.a: "联合王冠"
 historical_tweaks_union.3.b: "一顶王冠，一个宗族！"
 historical_tweaks_union.4.title: "[TIR.GetCountry.GetNameWithNoTooltip]臣服于王权之下"
 historical_tweaks_union.4.desc: "经过精心的宗族运作，[TIR.GetCountry.GetName]已和平并入我国版图。这一宝贵收获确保了关键阿尔卑斯山隘口的控制权，巩固了我们对中欧腹地的统治。"
 historical_tweaks_union.4.historical_info: "1363年，随着蒂罗尔最后一位女伯爵玛格丽特去世，哈布斯堡家族获得了蒂罗尔伯国的控制权。这次主权转移是哈布斯堡权力扩张的关键一步，使其获得了对阿尔卑斯地区贸易与军事路线的重大影响力。"
 historical_tweaks_union.4.a: "联合王冠"
 historical_tweaks_union.4.b: "我们不需要这些人。"