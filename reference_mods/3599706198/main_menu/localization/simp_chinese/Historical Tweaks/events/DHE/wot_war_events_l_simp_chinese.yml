l_simp_chinese:
 wot_war_events.1.title: "帖木儿帝国寻求和平！"
 wot_war_events.1.desc: "昔日威震中东、横扫全境的帖木儿帝国，如今已成往昔荣光的残影。我军对其征伐可谓大获全胜，他们正为乞求宽恕而来求和。我们该如何回应？"
 wot_war_events.1.a: "战争已胜，和平将至。"
 wot_war_events.1.b: "前进！绝不手软！"
 wot_war_events.2.title: "马穆鲁克苏丹国瓦解"
 wot_war_events.2.desc: "曾经强大的马穆鲁克苏丹国，因内部腐朽和固守过时的军事传统而衰落，现已臣服于我军铁蹄之下。他们的骑兵虽骁勇善战，却难敌我军纪律严明的耶尼切里军团与火炮之威。埃及、黎凡特及阿拉伯圣城如今皆承认奥斯曼宗主权。我们将从马穆鲁克统治的废墟中，铸造出效忠高门的新省份，同时通过委任忠诚的总督治理边远领地，以维系疆域稳定。"
 wot_war_events.2.a: "将他们全部吞并！"
 wot_war_events.2.b: "他们终将消逝。"
 wot_war_events.3.title: "入侵匈牙利"
 wot_war_events.3.desc: "我军向匈牙利进军，这片土地上变幻莫测的联盟与争议不断的领土主张将我们卷入战火。前路未卜，但此次战役或将重塑区域的力量平衡。胜负将取决于决心、谋略与一往无前的意志。"
 wot_war_events.3.a: "为了胜利"
 wot_war_events.4.title: ""
 wot_war_events.5.title: "帖木儿帝国入侵"
 wot_war_events.5.desc: "强大的帖木儿帝国已真正失势，内斗使其国力衰微。我军正跨越边境，给予其致命一击。"
 wot_war_events.5.a: "我们现在就出击！"
 wot_war_events.6.title: ""
 wot_war_events.7.title: "奥斯曼帝国入侵马穆鲁克苏丹国"
 wot_war_events.7.desc: "马穆鲁克苏丹国做出了令人难以置信的举动，他们开始与我们的敌人结盟以遏制我们的崛起。他们的愚蠢简直没有边界，是时候让我们从他们手中“解放”圣城了。"
 wot_war_events.7.a: "我们将让他们毁灭！"
 wot_war_events.8.title: ""
 qara_timurid_peace_tt: "我们将从摇摇欲坠的帖木儿帝国手中夺取波斯的大部分领土。"
 mamluk_collapse_tt: "马穆鲁克苏丹国彻底崩溃。奥斯曼帝国夺取了埃及、黎凡特和赫吉拉的控制权，而其他区域则摆脱了马穆鲁克的统治。"