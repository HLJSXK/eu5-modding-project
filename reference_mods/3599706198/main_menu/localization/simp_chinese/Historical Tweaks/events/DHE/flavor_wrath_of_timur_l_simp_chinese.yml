 wrath_of_timur.1.title: ""
 wrath_of_timur.2.title: "帖木儿与萨拉伊·穆尔克·汗尼姆的联姻"
 wrath_of_timur.2.desc: "我们的君主帖木儿迎娶了一位孛儿只斤家族、成吉思汗的直系后裔——萨拉伊·穆尔克·汗尼姆。这场联姻不仅是政治便利，更是一则宣言。通过与大可汗的血脉联姻，帖木儿宣告了自己作为蒙古遗产继承者的正统性。他的后代将拥有新名号「古列干」，正是这神圣血统的见证。借此婚姻，我们的统治者将自身与昔日的征服者紧密相连，而他的子嗣血脉中将传承两大帝国。"
 wrath_of_timur.2.a: "一个将世代回响的联盟。"
 wrath_of_timur.2.b: "他愿娶谁就娶谁。"
 wrath_of_timur.7.title: ""
 wrath_of_timur.8.title: "帖木儿帝国向我们进军了！"
 wrath_of_timur.8.desc: "该国主动表示效忠。我们是否应该接受，以便让征服之路更加顺畅？"
 wrath_of_timur.8.a: "我们应该臣服而不是抵抗。"
 wrath_of_timur.8.b: "满足他们的要求，避免这场冲突……"
 wrath_of_timur.13.title: ""
 muzaffarids_injuids_flavor.1.title: "入侵克尔曼"
 muzaffarids_injuids_flavor.1.desc: "我们应该入侵克尔曼，将其纳入我们的版图。凭借其财富，我们的国家必将繁荣昌盛。"
 muzaffarids_injuids_flavor.1.a: "集结军队，我们向战场进军！"
 muzaffarids_injuids_flavor.1.b: "我们应该静待时机，"
 muzaffarids_injuids_flavor.2.title: "因莫扎法尔王朝入侵以夺取克尔曼"
 muzaffarids_injuids_flavor.2.desc: "穆扎法尔王朝已占领克尔曼！我们绝不能容忍其侵略行径继续蔓延，让我们发起进攻，最终在我们区域赢得至高无上的地位。"
 muzaffarids_injuids_flavor.2.historical_info: "自1347年起，穆扎法尔王朝的穆巴里兹·丁与因贾王朝的阿布·伊沙克为争夺克尔曼的控制权爆发冲突。尽管双方曾保持友好关系，但阿布·伊沙克的野心引发了这场旷日持久的战争。在攻占亚兹德失败（1350-1351年）并遭遇战役失利（1353年）后，阿布·伊沙克退守设拉子并最终投降。他逃往伊斯法罕，但穆巴里兹·丁追击至此并将其俘获，处决了这位统治者，将法尔斯和伊朗西部并入穆扎法尔王朝的版图。"
 muzaffarids_injuids_flavor.2.a: "他们休想得到怜悯。"
 muzaffarids_injuids_flavor.2.b: "算了，他们对我们构不成威胁。"
 muzaffarids_injuids_flavor.3.title: "因贾侵略"
 muzaffarids_injuids_flavor.3.desc: "那些蠢货竟为我们的土地向我们宣战。我们必须奋起抵抗！"
 muzaffarids_injuids_flavor.3.historical_info: "自1347年起，穆扎法尔王朝的穆巴里兹·丁与因贾王朝的阿布·伊沙克为争夺克尔曼的控制权爆发冲突。尽管双方曾保持友好关系，但阿布·伊沙克的野心引发了这场旷日持久的战争。在攻占亚兹德失败（1350-1351年）并遭遇战役失利（1353年）后，阿布·伊沙克退守设拉子并最终投降。他逃往伊斯法罕，但穆巴里兹·丁追击至此并将其俘获，处决了这位统治者，将法尔斯和伊朗西部并入穆扎法尔王朝的版图。"
 muzaffarids_injuids_flavor.3.a: "我们必将胜利。"
 muzaffarids_injuids_flavor.4.title: "我们的胜利"
 muzaffarids_injuids_flavor.4.desc: "敌人已败，我们取得了对法尔斯的统治权，现在是时候清理那些小领主了。"
 muzaffarids_injuids_flavor.4.historical_info: "在摧毁因贾王朝后，穆扎法尔王朝以设拉子为都，成为伊朗中部的统治力量。穆巴里兹丁实力雄厚，足以拒绝金帐汗国可汗札尼别的附庸提议，甚至在札尼别于1357年征服阿塞拜疆后，仍成功向该地区扩张。"
 muzaffarids_injuids_flavor.4.a: "我们的统治地位无可撼动。"
 muzaffarids_injuids_flavor.5.title: "帖木儿兵临城下"
 muzaffarids_injuids_flavor.5.desc: "帖木儿大军已兵临城下，我们必须为未来做出抉择。他们的军队已蹂躏波斯大地，且毫无止步之意。"
 muzaffarids_injuids_flavor.5.historical_info: ""
 muzaffarids_injuids_flavor.5.a: "我们必须向他们展现忠诚才能生存！"
 muzaffarids_injuids_flavor.5.b: "我们的命运，绝不由外人掌控。"
 muzaffarids_injuids_flavor.6.title: "穆扎法尔王朝宣誓效忠"
 muzaffarids_injuids_flavor.6.desc: "穆扎法尔王朝目睹了我们的伟大，并希望宣誓效忠。"
 muzaffarids_injuids_flavor.6.a: "接受他们的效忠。"
 muzaffarids_injuids_flavor.6.b: "他们的愚蠢臣服于我毫无意义。"
 muzaffarids_injuids_flavor.7.title: "抗命之举"
 muzaffarids_injuids_flavor.7.desc: "帖木儿帝国似乎正忙于四处征战，或许我们可以借此机会寻求脱离他们的掌控。"
 muzaffarids_injuids_flavor.7.a: "时机正好，我们必须趁他们还没察觉迅速行动。"
 muzaffarids_injuids_flavor.7.b: "不，我们不能拿人民的生命去冒险。"
 muzaffarids_injuids_flavor.8.title: "穆扎法尔王朝背叛了我们！"
 muzaffarids_injuids_flavor.8.desc: "那些不自量力的蠢货竟敢妄图脱离我们的掌控！"
 muzaffarids_injuids_flavor.8.a: "我们要碾碎那些傲慢的蠢货！"
 rise_of_safavids_flavor.1.title: "萨法维王朝的崛起"
 rise_of_safavids_flavor.1.desc: "曾经和平的苏菲派萨法维教团，在伊斯玛仪领导下已转变为强大的军事力量。凭借狂热的战士，这位年轻沙阿开始以什叶派为旗帜统一波斯。该地区的旧势力如今面临着一个坚定而强大的挑战者。"
 rise_of_safavids_flavor.1.a: "新的挑战者已然崛起。"
 rise_of_safavids_flavor.1.b: "新的挑战者已然崛起。"
 rise_of_safavids_flavor.2.title: "萨法维教团"
 rise_of_safavids_flavor.2.desc: "在阿尔达比勒崎岖的高地上，一位名叫伊斯玛仪的年轻神秘主义者从萨法维苏菲教团中崭露头角。他的个人魅力和宗教热忱吸引了成千上万忠实的追随者，他们视其为命中注定要以什叶派信仰统一波斯的神圣人物。他的支持者日益大胆，流言四起，说他可能很快就要在[ROOT.GetName]宣称统治权。宫廷中有人力劝我们接纳这场运动，将伊斯玛仪推上王位，相信他的热忱能重振我们的王国。也有人警告说，赋予宗教极端分子权力可能会释放出我们无法控制的力量。"
 rise_of_safavids_flavor.2.a: "拥立年轻的萨菲派神秘主义者"
 rise_of_safavids_flavor.2.b: "我们将维持当前王朝的统治。"
 rule_historical_timur: "帖木儿扩张"
