 setting_historical_timur_conquests_desc: "帖木儿将被迫征服其帝国的历史疆域。"
 setting_ahistorical_timur_conquests: "非史实性征服"
 setting_ahistorical_timur_conquests_desc: "帖木儿将征服他想要的一切，并在全世界范围内扩张。"
