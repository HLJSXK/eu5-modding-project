 crisis_of_the_timurids_desc: "帖木儿帝国正摇摇欲坠，地方势力纷纷崛起对抗中央集权。曾经在伟大征服者铁腕下统一的帝国，如今分裂为敌对派系与相互竞逐的利益集团。随着属国子民意识到自身力量并要求脱离遥远可汗的统治，帝国正从内部不断失血。"
