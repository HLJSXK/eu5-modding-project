 flavor_sheep_turkomen.1.title: "黑羊崛起"
 flavor_sheep_turkomen.1.desc: "黑羊土库曼人已从草原崛起，成为一股不可小觑的力量。在其宗族的领导下，他们从前伊儿汗国四分五裂的土地上开辟出了一片疆域。历经与宿敌部落及周边势力的连年征战，他们的战士已淬炼成钢，誓要缔造功业。是时候让黑羊王朝在东方列强中占据其应有的一席之地了。"
 flavor_sheep_turkomen.1.a: "我们将留下我们的印记。"
 flavor_sheep_turkomen.2.title: "黑羊崛起"
 flavor_sheep_turkomen.2.a: "历史中的另一位玩家。"
 flavor_sheep_turkomen.2.b: "我很好奇命运为他们准备了怎样的安排。"
 flavor_sheep_turkomen.3.title: "帖木儿帝国入侵"
 flavor_sheep_turkomen.3.desc: "帖木儿帝国因继位纷争与内乱而衰微，这为我们提供了不容错失的良机。曾令世界在帖木儿铁蹄下颤抖的强大军队，如今已分裂。斥候回报其边境防御空虚，总督们正沉溺于宫廷权谋。若趁其虚弱时出击，我们不仅能夺取富饶疆域，更可确立在此区域的霸主地位。然亦有人谏言谨慎，倘若远征失利，恐将招致帝国倾力反击。"
 flavor_sheep_turkomen.3.a: "向着胜利前进！"
 flavor_sheep_turkomen.3.b: "时机尚未成熟。"
 flavor_sheep_turkomen.4.title: "白羊王朝的崛起"
 flavor_sheep_turkomen.4.a: "历史中的另一位玩家。"
 flavor_sheep_turkomen.4.b: "我很好奇命运为他们准备了怎样的安排。"
 flavor_sheep_turkomen.10.title: "白羊王朝的崛起"
 flavor_sheep_turkomen.10.desc: "白羊土库曼人在安纳托利亚和阿塞拜疆的土地上崛起。他们以血缘与野心结盟的部落联盟，历经与基督徒和穆斯林的无数次战斗，证明了自身的实力。在白色绵羊的旗帜下，他们团结了分散的部族，形成了一支令君士坦丁堡至里海沿岸都肃然起敬的力量。民族的未来正在召唤，他们将以钢铁般的意志与决心作出回应。"
 flavor_sheep_turkomen.10.a: "我们将留下我们的印记。"
 flavor_sheep_turkomen.12.title: "白羊崛起"
 flavor_sheep_turkomen.12.desc: "数代以来，黑羊王朝统治着阿塞拜疆与伊拉克的土地，其权势看似坚不可摧。然而他们的力量已开始衰退，统治者们安于现状，又因继承权之争而四分五裂。我们的联盟日益壮大，战士们渴求荣耀与战利品。是时候统一所有土库曼土地，彻底了结白羊与黑羊之间古老的恩怨了。"
 flavor_sheep_turkomen.12.a: "白羊必将战胜黑羊！"
 flavor_sheep_turkomen.12.b: "我们之间应尽量避免争斗。"
 flavor_sheep_turkomen.100.title: ""
 flavor_sheep_turkomen.101.title: ""
 flavor_sheep_turkomen.99.title: ""
 turkomen_federation: "土库曼联邦"
 turkomen_federation_desc: "一个由突厥部落组成的松散联邦，基于共同的血脉传承与相互防卫而结盟。其权力结构依赖于协商与忠诚，而非严格的中央集权，各氏族首领保持着高度的自治权。"