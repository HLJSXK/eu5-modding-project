l_simp_chinese:
 flavor_mamluk_stagnation.1.title: "停滞"
 flavor_mamluk_stagnation.1.desc: "我们的马穆鲁克是马背与长矛的主宰，将采用火药武器视为有失身份。一个手持火枪的普通士兵竟能击倒训练有素的骑兵，这一观念侮辱了维系我们王国数代的尚武传统。当欧洲军队进行现代化改革，我们的奥斯曼宿敌也接纳火器之时，我们的军事机构却固执地坚守着旧传统。"
 flavor_mamluk_stagnation.1.a: "传统是我们的力量。"
 flavor_mamluk_stagnation.1.b: "也许我们应该重新考虑一下……"
 flavor_mamluk_stagnation.2.title: "变革的低语"
 flavor_mamluk_stagnation.2.desc: "我们队伍中已有少数声音开始质疑，传统战法能否应对日新月异的战争形态。尽管马穆鲁克精英阶层依然极度保守，但部分年轻军官指出，若对世界范围内兴起的军事革新视而不见，恐将使我们陷入被动。然而，任何改革都会遭到那些依靠旧方式建立权力的人的强烈抵制。"
 flavor_mamluk_stagnation.2.a: "旧方式对我们很有帮助。"
 flavor_mamluk_stagnation.2.b: "我们必须适应才能生存。"
 flavor_mamluk_stagnation.100.title: "马穆鲁克苏丹国崩溃"
 flavor_mamluk_stagnation.100.desc: "曾经强大的马穆鲁克苏丹国，因内部腐朽与固守过时军事传统而衰败，最终被我们的军队击败。他们的骑兵虽然辉煌，但无法抵挡我们纪律严明的耶尼切里和火炮。埃及、黎凡特以及阿拉伯的圣城现在都承认奥斯曼的主权。在马穆鲁克统治的灰烬中，我们将锻造出忠于高门的新省份，并通过在外围领土上任命忠诚的总督来维护稳定。"
 flavor_mamluk_stagnation.100.a: "东方迎来了一个新的时代。"
 flavor_mamluk_stagnation.100.b: "他们的土地将巩固我们的王国。"
 mamluk_collapse_tt: "马穆鲁克苏丹国覆灭，奥斯曼帝国夺取了埃及、黎凡特和汉志地区的控制权。"
