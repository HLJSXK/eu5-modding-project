l_simp_chinese:
 rise_of_persia.1.title: "波斯重生"
 rise_of_persia.1.desc: "[target_character.GetName]诞生于入侵者的灰烬之中，起初被更强大的邻国所掩盖。然而，[target_country.GetName]的远见与雄心将被证明影响深远——他们最近已踏上扩张与巩固之路，在这片支离破碎的[ShowRegionNameWithNoTooltip('persia_region')]动荡图景中，刻下了属于自己的位置。\n\n[target_character.GetShortNameWithNoTooltip]与[target_character.GetHerHis]继任者巧妙地利用了该地区普遍存在的混乱与分裂。随着每一次胜利，这个[target_country.GetAdjectiveWithNoTooltip]公国日益强大，吸引了战士、学者与雄心勃勃之辈。他们通过联姻、结盟与军事才能，逐步将一个不起眼的国家转变为正在成型的帝国。"
 rise_of_persia.1.a: "又一个区域陷入战火。"
 rise_of_persia.2.title: "[target_country.GetNameWithNoTooltip]的崛起"
 rise_of_persia.2.a: "这是我们的天命！"
 rise_of_persia.3.title: "波斯僵局"
 rise_of_persia.3.desc: "[ShowRegionName('persia_region')]残余诸公国的梦想从未实现，其中为首者因扩张未能成功，如今已无限期推迟。想必再不会有任何帝国能填补他们的空缺了……"
 rise_of_persia.3.a: "这是最好的选择！"
 rise_of_persia.4.title: "[target_country.GetNameWithNoTooltip]的崛起"
 rise_of_persia.4.desc: "[target_character.GetName]的梦想如今已然实现，世界在[target_country.GetLongName]的威势下颤抖。还有谁能与之抗衡？"
 rise_of_persia.4.a: "$common_string_what_can_we_do$"
 rise_of_persia.5.title: "波斯的崛起"
 rise_of_persia.5.desc: "我们甚至已经超越了我们王朝祖先世系最狂野的雄心和梦想。我们接下来将剑指何处？"
 rise_of_persia.5.a: "这将会亘古永恒！"
 rise_of_persia.100.title: "与[target_country.GetNameWithNoTooltip]的战争"
 rise_of_persia.100.desc: "在[ROOT.GetCountry.GetGovernment.GetRulerTitle]摊开[ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis]的地图并着手策划下一次的征服时，[ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe]依然看见[ROOT.GetCountry.GetAdjective]的旗帜已经胜利地遍地摇曳。现在看来，毗邻的领地并入这个日渐强大的[ROOT.GetCountry.GetFlavorRank]的条件已经成熟。\n\n如果我们正式对[target.GetProvince.GetName]提出声索，我们对[target.GetArea.GetName]的控制力与影响力将得到空前强化。开始新一场军事征服的时机已到！"
 rise_of_persia.100.a: "[target.GetNameWithNoTooltip]很快将归于我手！"
 rise_of_persia.101.title: "[target_country.GetLongNameWithNoTooltip]与[target_country2.GetNameWithNoTooltip]"
 rise_of_persia.101.desc: "不是每一次[ROOT.GetCountry.GetFlavorRank]的领土扩张都需要让通过武力征服。有时只需要通过使者同对方谈判并提出一个对双方都有利的条约，这样便能兵不血刃地延长我们的边界。"
 rise_of_persia.101.a: "给他们一个无法拒绝的条件……"
 rise_of_persia.101.b: "我们不关心他们的事！"
 rise_of_persia.101.tt: "[target_country.GetName]可以被说服成为我们的[ShowSubjectTypeName('vassal')]"
 rise_of_persia.102.title: "[target_country2.GetName]要求臣服"
 rise_of_persia.102.desc: "[target_country2.GetAdjective][target_country2.GetGovernment.GetFullRulerName]派遣使者来到我国，并要求我们向他们表示臣服，并成为他们[target_country2.GetFlavorRank]实质上的[ShowSubjectTypeName('vassal')]。"
 rise_of_persia.102.a: "接受要求。"
 rise_of_persia.102.b: "我们不会考虑这些提议。"
 rise_of_persia.103.title: "[target_country.GetAdjectiveWithNoTooltip]的回应"
 rise_of_persia.103.desc: "使者从[target_country.GetCapital.GetName]返回，带来了消息称[target_country.GetLongName]愿意向我们臣服成为我们的[ShowSubjectTypeName('vassal')]。面对日益增长的威胁并认识到我们[ROOT.GetCountry.GetFlavorRank]的力量，[target_country.GetAdjectiveWithNoTooltip]统治者选择宣誓效忠以换取我们的保护。\n\n这标志着我们向统一[ShowRegionName('persia_region')]分裂的埃米尔国迈出了决定性的一步。随着我们的影响力不断扩大，我们作为该区域主导力量的命运变得无比清晰。"
 rise_of_persia.103.a: "最终，全天下都将归顺于我！"
 rise_of_persia.104.title: "[target_country.GetLongNameWithNoTooltip]拒绝了！"
 rise_of_persia.104.desc: "很显然，[target_country.GetCapital.GetName]的盗匪并不识相。我们已经足够仁慈开出了自愿臣服的价码，他们却不自量力地拒绝了这一条件！"
 rise_of_persia.104.a: "我们会在战场上让他们屈膝！"
 rise_of_persia.105.title: "整合[target_province.GetNameWithNoTooltip]"
 rise_of_persia.105.desc: "随着[target_province.GetName]现在处于我们的控制之下，朝廷发现自己正处于一个关键时刻。将这片被征服的土地融入帝国广袤的版图这一微妙的过程必须精确驾驭，高瞻远瞩。该省份的命运岌岌可危，有可能成为[ROOT.GetCountry.GetLongName]不可分割的一部分，也有可能成为动乱和不满的根源。\n\n宫廷就确保成功融合的最佳方法展开了辩论。各种声音此起彼伏，为前进之路献计献策。一些人建议迅速实施奥斯曼的法律和制度，以建立中央控制，在民众中培养团结和忠诚的意识。其他人则主张采取更加谨慎的方式，敦促尊重当地习俗和传统，以赢得被征服人民的信任。"
 rise_of_persia.105.a: "培养团结和忠诚意识。"
 rise_of_persia.105.b: "采取更加谨慎的方法。"
 rise_of_persia.500.title: "波斯停滞"
 rise_of_persia.500.desc: "政治阴谋与外交斡旋终究未能填补帝国野心与扩张现实之间的巨大鸿沟。在边境线数十年未变的今日，曾经令全[ShowRegionName('persia_region')]闻风丧胆的军队如今却折戟沉沙。外部势力的联合干预不仅浇熄了我们开疆拓土的熊熊烈焰，更使我们丧失了作为区域强国的合法地位。\n\n我们当前的现实处境使我们处于岌岌可危的境地。这场失败的崛起尝试不仅带来了前所未有的脆弱性，更招致周边强邻的虎视眈眈。是浴火重生还是沦为史书中的注脚——只能交由时间来揭晓。"
 rise_of_persia.500.a: "令人感叹的事态转变。"
 rise_of_persia.900.title: "蒙古时代的终结"
 rise_of_persia.900.desc: "曾经如风暴般席卷已知世界的强大蒙古帝国，最终化为尘埃消散。伟大的可汗们已逝，他们的旌旗破碎，军队四散。数个世纪以来，草原铁骑曾以钢铁之握掌控波斯，但今非昔比。蒙古霸权的时代已然终结，从他们统治的灰烬中，新的力量将崛起，去争夺那曾属于他们的一切。波斯的未来，如今掌握在波斯人自己手中。"
 rise_of_persia.900.a: "一个新时代开始了。"