l_simp_chinese:
 rise_of_mughals.1.title: "莫卧儿帝国的崛起"
 rise_of_mughals.1.desc: "印度斯坦大地新兴一股强权——莫卧儿帝国。他们怀揣雄心，不断征战，旧有的秩序已然动摇，那些历经数代、屹立不倒的王国，如今正面对着前所未见的劲敌。"
 rise_of_mughals.1.a: "我们会获得胜利！"
 rise_of_mughals.2.title: "莫卧儿帝国的崛起"
 rise_of_mughals.2.a: "令人警觉……"
 rise_of_mughals.100.title: "莫卧儿征服完成"
 rise_of_mughals.100.desc: "战役已告终结，硝烟散尽。如今，印度次大陆匍匐于莫卧儿王权之下，莫卧儿帝国在这片土地上拉开新时代帷幕。"
 rise_of_mughals.100.a: "如今，我们的未来将何去何从？"
 rise_of_mughals.101.title: "莫卧儿征服完成"
 rise_of_mughals.101.a: "我们终于可以松一口气了。"