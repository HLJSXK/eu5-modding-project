l_simp_chinese:
 fate_of_mesopotamia.1.title: "我们在美索不达米亚的雄心"
 fate_of_mesopotamia.1.desc: "我们将目光投向美索不达米亚，旨在扩大影响力并确立对该区域的正当统治。然而我们并非孤军奋战，这份雄心必将与那些阻挠我们崛起的力量产生冲突。"
 fate_of_mesopotamia.1.a: "我们将夺回属于我们的东西。"
 fate_of_mesopotamia.2.title: "我们对美索不达米亚的宣称"
 fate_of_mesopotamia.2.desc: "我们决心重振在美索不达米亚的权威，誓要夺回影响力并击退步步紧逼的宿敌。奥斯曼帝国是我们最大的阻碍，这片区域即将成为决定我们斗争胜负的舞台。"
 fate_of_mesopotamia.2.a: "我们绝不屈服。"
 fate_of_mesopotamia.3.title: "夹缝求生"
 fate_of_mesopotamia.3.desc: "我们正身处强大帝国之间，各方都在争夺美索不达米亚的控制权。为了生存，我们必须审慎周旋，在外交手腕与机会主义间取得平衡。若能巧妙应对，我们不仅能存续——更可崛起。"
 fate_of_mesopotamia.3.a: "我们必须明智行事。"
 fate_of_mesopotamia.4.title: "美索不达米亚已稳固"
 fate_of_mesopotamia.4.desc: "我们已在美索不达米亚的争夺中取得胜利。宿敌已被击退，我们的权威如今在整个区域无可撼动。这片曾经的争议之地现已牢牢掌握在我们手中，这正是我们力量与决心的明证。"
 fate_of_mesopotamia.4.a: "我们的霸主地位毋庸置疑。"
 fate_of_mesopotamia.5.title: "美索不达米亚收复"
 fate_of_mesopotamia.5.desc: "我们战胜了宿敌，重新夺回了在美索不达米亚的地位。他们的野心已被粉碎，我们的影响力再次遍布这片区域。凭借力量与决心，我们捍卫了本就属于我们的一切。"
 fate_of_mesopotamia.5.a: "我们已恢复正当统治。"
 fate_of_mesopotamia.6.title: "破碎的抗争"
 fate_of_mesopotamia.6.desc: "我们与宿敌均未能掌控美索不达米亚。连年征战耗尽了我们的力量，已无力维持对该地区的控制，最终被迫撤离，使其彻底脱离掌控。这场争夺战没有赢家，所有试图主宰这片土地的努力都以失败告终。"
 fate_of_mesopotamia.6.a: "我们已经失去了筹码。"
 fate_of_mesopotamia.10.title: "宿敌有所行动！"
 fate_of_mesopotamia.10.desc: "我们的宿敌已采取行动，派军进入美索不达米亚以扩张其势力。这一大胆举动挑战了我们的地位，绝不能坐视不理。"
 fate_of_mesopotamia.10.a: "我们将进行干预！"
 fate_of_mesopotamia.10.b: "我们还有更紧迫的事情要处理……"
 fate_of_mesopotamia.11.title: "我们的宿敌要求和平"
 fate_of_mesopotamia.11.desc: "我们的宿敌得知我们在美索不达米亚的行动后，要求我们立即停止，我们该如何回应？"
 fate_of_mesopotamia.11.a: "我们别无选择。"
 fate_of_mesopotamia.11.b: "让他们见鬼去吧！"