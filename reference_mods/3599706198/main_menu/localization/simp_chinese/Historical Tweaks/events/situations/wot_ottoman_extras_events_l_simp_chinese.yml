l_simp_chinese:
 wot_ottoman_extras.1.title: "与[target_country.GetNameWithNoTooltip]的战争"
 wot_ottoman_extras.1.desc: "在[ROOT.GetCountry.GetGovernment.GetRulerTitle]摊开[ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis]的地图并着手策划下一次的征服时，[ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe]依然看见[ROOT.GetCountry.GetAdjective]的旗帜已经胜利地遍地摇曳。现在看来，毗邻的领地并入这个日渐强大的[ROOT.GetCountry.GetFlavorRank]的条件已经成熟。\n\n如果我们正式对[target.GetProvince.GetName]提出声索，我们对[target.GetArea.GetName]的控制力与影响力将得到空前强化。开始新一场军事征服的时机已到！"
 wot_ottoman_extras.1.a: "[target.GetNameWithNoTooltip]很快将归于我手！"
 wot_ottoman_extras.9.title: "崇高国度崛起"
 wot_ottoman_extras.9.desc: "随着安纳托利亚统一于我们的旗帜之下，巴尔干地区也已稳固，[ROOT.GetCountry.GetNameWithNoTooltip]领地正站在命运的十字路口。我们的军队历经战火洗礼，国库充盈着征服的战利品，尽管臣民多元，但已开始认同我们统治的智慧。东方是亚美尼亚与波斯的古老土地，南方是黎凡特与埃及的富庶省份，黑海之外，克里米亚的草原正召唤着我们。此刻正是将我们的国家从区域性强权转变为横跨大陆的帝国之时。我们的加齐战士渴望着新的边疆，而世界很快将学会在奥斯曼之名前颤抖。"
 wot_ottoman_extras.9.a: "征服继续！"
 wot_ottoman_extras.10.title: "崇高国度崛起"
 wot_ottoman_extras.10.desc: "[ottoman_country.GetCountry.GetNameWithNoTooltip]领地已统一安纳托利亚并稳固了巴尔干，如今成为该区域最强大的势力之一，其军队开始倾向于扩张。从黑海到地中海，从波斯边境到匈牙利门户，这个新兴帝国的邻国必须面对新的现实。他们已从一个边陲贝伊国转型为一个能够在多条战线上投射力量的国家。曾经支离破碎的安纳托利亚领土，如今已凝聚成一股统一的力量，准备重塑权力格局。"
 wot_ottoman_extras.10.a: "一股新势力崛起。"
 wot_ottoman_extras.11.title: "征服时代落幕"
 wot_ottoman_extras.11.desc: "我们时代的伟大战役已落下帷幕，从安纳托利亚的统一到巴尔干的征服，从遥远的战场到来之不易的条约，[ROOT.GetCountry.GetNameWithNoTooltip]的疆域已焕然一新。我们的国境辽阔，臣民众多，威名远扬。然而每个征服的时代终将让位于治理的时代，未来的重任不在于火炮的轰鸣与刀剑的交击，而在于对我们所赢得的一切进行耐心的管理。我们的帝国稳固屹立，其基石由先辈的热血与勇毅铸就。如何继承这份遗产，正是我们如今面临的课题。"
 wot_ottoman_extras.11.a: "新的篇章即将开启"
 wot_ottoman_extras.12.title: "奥斯曼扩张停滞"
 wot_ottoman_extras.12.desc: "可能是因国力衰竭、战线过长，抑或单纯满足于既得疆域，如今奥斯曼帝国扩张似乎已至极限，并已停止其的征服战役。这片横跨安纳托利亚、巴尔干及更远疆域的庞大帝国，如今正进入巩固时期。对于毗邻此帝国的诸国而言，这带来些许喘息之机——尽管无人能断言这份和平将长久维系，或仅是下一场风暴前的暂歇。"
 wot_ottoman_extras.12.a: "但愿和平能长久"
 wot_ottoman_extras.100.title: "与[target_country.GetNameWithNoTooltip]的战争"
 wot_ottoman_extras.100.desc: "[target_country.GetName]的领土位于我们天然的势力范围之内，将其纳入奥斯曼领地已是水到渠成。征服此地既能巩固我们的边疆，又能强化我们在该区域的地位。如今正是我们对这些领土宣示正当主权之时。我国已做好准备，将为其带来应有的治理。"
 wot_ottoman_extras.100.a: "[target_country.GetNameWithNoTooltip]很快就是我们的了！"
 wot_ottoman_extras.1000.title: "奥斯曼帝国入侵我们"
 wot_ottoman_extras.1000.desc: "奥斯曼人正在入侵我们，我们可以选择暂时臣服，以待未来时机。"
 wot_ottoman_extras.1000.a: "派出使者！"
 wot_ottoman_extras.1000.b: "战斗到最后一刻！"
