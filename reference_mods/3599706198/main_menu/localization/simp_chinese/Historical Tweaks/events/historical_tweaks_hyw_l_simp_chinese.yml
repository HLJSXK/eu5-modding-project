 historical_tweaks_hyw.1.title: "[ROOT.GetCountry.GetName]的叛乱"
 historical_tweaks_hyw.1.desc: "王国正濒临崩溃。数十年的昏庸统治、贵族纷争与农民苦难已侵蚀了王权根基。王室的号令在宫墙之外几乎毫无分量，各阶层的不满日益加剧。若不恢复秩序，法兰西恐将再度陷入动荡年代。"
 historical_tweaks_hyw.1.historical_info: "1336至1446年间，法国深陷百年战争泥潭，经历了农民起义频发、贵族割据，王权遭受巨大动荡。随着王位争夺者与叛乱公爵不断蚕食王室权力，瓦卢瓦王朝的正统性遭到严重削弱。"
 historical_tweaks_hyw.1.a: "安抚各阶层，共渡难关。"
 historical_tweaks_hyw.1.b: "压制贵族，贯彻王权意志。"