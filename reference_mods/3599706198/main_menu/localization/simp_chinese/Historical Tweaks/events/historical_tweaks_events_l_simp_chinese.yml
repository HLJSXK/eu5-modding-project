l_simp_chinese:
 STATIC_MODIFIER_NAME_ht_russian_unification_buff: "俄罗斯统一"
 historical_tweaks.1.title: "[GetCharacter('bul_ivan_alexander').GetName]之死"
 historical_tweaks.1.desc: "保加利亚沙皇伊凡·亚历山大的统治已经结束，使第二保加利亚帝国陷入混乱的继承危机。王国被他的儿子们分裂，半自治的沿海地区多布罗加宣布独立。这个曾经是巴尔干主要强国的帝国如今四分五裂、脆弱不堪，而奥斯曼的威胁恰恰在地平线上最为迫近。"
 historical_tweaks.1.historical_info: "1371年，沙皇伊凡·亚历山大去世后，保加利亚第二帝国分裂为维丁王国、特尔诺沃王国和多布罗加专制公国，这极大地削弱了抵抗奥斯曼帝国的力量。"
 historical_tweaks.1.a: "为了特尔诺沃之狮！"
 historical_tweaks.1.b: "维护维丁的遗产"
 historical_tweaks.4.title: "俄罗斯的统一"
 historical_tweaks.4.desc: "罗斯正走向统一。随着我们影响力的扩大，旧日的敌对逐渐消逝，贵族与平民之间开始形成共同的认同感。在整合推进的过程中，国家变得越发自信与强大，准备进一步迈向一个统一而强大的罗斯。"
 historical_tweaks.4.a: "为了祖国！"
 historical_tweaks.4.b: "我们没有这样的野心。"
 historical_tweaks.1.c: "确保多布罗加沿海地区的控制权"
 historical_tweaks.2.title: "保加利亚领土的统一"
 historical_tweaks.2.desc: "自沙皇伊凡·亚历山大逝世后的大分裂已过去数十年。凭借不懈努力与强大军力，我们已统一维丁与多布罗加。如今整个国家再次统一于一位沙皇治下，保加利亚曾经所有疆域皆在掌控之中。此刻，我们应当抉择：是继续沿用都城特尔诺沃之名，还是彻底重拾古老而辉煌的保加利亚称号。"
 historical_tweaks.2.a: "恢复帝国名号"
 historical_tweaks.2.b: "让特尔诺沃之狮成为我们的旗帜"
 historical_tweaks.3.title: "保加利亚领土的统一"
 historical_tweaks.3.desc: "自沙皇伊凡·亚历山大逝世后的大分裂已过去数十年。凭借不懈努力与强大军力，我们已统一维丁与多布罗加。如今整个国家再次统一于一位沙皇治下，保加利亚曾经所有疆域皆在掌控之中。此刻，我们应当抉择：是继续沿用都城特尔诺沃之名，还是彻底重拾古老而辉煌的保加利亚称号。"
 historical_tweaks.3.a: "恢复帝国名号"
 historical_tweaks.3.b: "于多瑙河畔荣耀崛起。"
 STATIC_MODIFIER_NAME_ht_bulgarian_debuff: "分裂的沙皇国"
 historical_tweaks.4.historical_info: "1371年，沙皇伊凡·亚历山大去世后，保加利亚第二帝国分裂为维丁王国、特尔诺沃王国和多布罗加专制公国，这极大地削弱了抵抗奥斯曼帝国的力量。"
 historical_tweaks.5.title: "狄奥多西城墙屹立不倒"
 historical_tweaks.5.desc: "千年屹立的长城，今日亦不会倾颓。尽管围攻者狂热如潮，君士坦丁之城仍被其古老的防御工事与厚重的罗马历史所庇佑。陷落之时尚未到来，进攻者在城墙之下只寻得精疲力尽与溃败收场。"
 historical_tweaks.5.historical_info: "尽管历经保加利亚人、阿拉伯人和土耳其人的多次围攻，君士坦丁堡的狄奥多西城墙在超过一千年间始终固若金汤。直至1453年超重型火炮出现之前，这座城市在面对传统中世纪攻城技术时始终被视为战略上不可征服的存在。"
 historical_tweaks.5.a: "城墙屹立不倒"
 historical_tweaks.5.b: "我们帝国的时代已经终结"
 historical_tweaks.8.title: "我们的宿敌很弱"
 historical_tweaks.8.desc: ""
 historical_tweaks.8.a: "我们将彻底击溃他们！"
 historical_tweaks.8.b: "今日无需流血。"