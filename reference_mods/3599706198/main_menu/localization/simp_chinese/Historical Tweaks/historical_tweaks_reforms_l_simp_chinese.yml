l_simp_chinese:
 ht_custom_name_prefix: "国家前缀"
 ht_custom_name_prefix_desc: "我国自封了一个不同寻常的称号。"
 ht_hungarian_malaise: "匈牙利之困"
 ht_hungarian_malaise_desc: "贵族势力凌驾于王权之上，使得王国困于自身疆界之内，各阶层拒绝批准必要的税收或征召，以扩张喀尔巴阡山脉之外的疆域。"
 ht_bohemian_borders: "波西米亚身份"
 ht_bohemian_borders_desc: "我们是天然堡垒的主人，我们的土地被环绕四周的山脉完美地界定。越过苏台德山脉或波希米亚森林向外看，就是将不稳定性引入大自然本身已经宣告完整的领域。"
 ht_custom_name_noprefix: "无国家前缀"
 ht_custom_name_noprefix_desc: "我们认为自己不属于那些普通的王国和帝国。"
 STATIC_MODIFIER_NAME_ht_lithuanian_expansion: "向罗斯地区的扩张"
 ht_english_colonies: "大英帝国"
 ht_english_colonies_desc: "大陆帝国的梦想在法兰西破灭，催生了新的命运。我们将目光从欧洲变幻的疆界转向地平线，要缔造的并非土石构筑的疆域，而是盐与帆主宰的国度。"
 ht_rus_debuff: "金帐汗国的遗产"
 ht_rus_debuff_desc: "基辅的荣光如今不过一缕幽魂，徘徊于焦黑的地平线与空寂的村落之间。在步步逼近的草原与教堂废墟之间，罗斯人的精神已被一个世纪的纳贡压榨得化作尘土。"
 ht_lithania: "波罗的海十字军的遗产"
 ht_lithania_desc: "数十年不间断的圣战已使立陶宛愈发坚韧。为抵御条顿骑士团与利沃尼亚兄弟会的猛攻，我们建立起中央集权的军事体制，将古老传统与常备防御体系融为一体。"