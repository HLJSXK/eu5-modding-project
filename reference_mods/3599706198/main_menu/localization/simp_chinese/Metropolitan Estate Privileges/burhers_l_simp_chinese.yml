l_simp_chinese:
 burghers_grand_commercial_charters: "大型商业包办处"
 burghers_grand_commercial_charters_desc: "商业特许状授予市民对市场和合同的优先控制权。在他们的指导下，贸易变得更加协调且利润丰厚，尽管城镇资本正悄然崛起。"
 burghers_metropolitan_guild_councils: "城市行会理事会"
 burghers_metropolitan_guild_councils_desc: "大型行会在城镇治理中被授予正式席位。识字的市民负责监督税收与财政，这虽然强化了我们的财政体系，却也使得行会得以规避更沉重的王室税负。"
 burghers_urban_logistics_concessions: "城镇物流特许"
 burghers_urban_logistics_concessions_desc: "城市中的关键路线、仓库和货栈被租赁给市民行会，这些行会组织货物运输的效率远超任何官方机构。通过城市枢纽的贸易日益繁荣，而被忽视的乡村则逐渐失去重要性。"
 burghers_municipal_banking_privileges: "市级银行特权"
 burghers_municipal_banking_privileges_desc: "城镇银行机构因资助国家项目而获得特殊担保和豁免。利率下降，铸币厂持续运转，但市民阶层由此获得抵制军事赋税和直接课税的筹码。"
 burghers_urban_autonomy_charters: "城镇自治特许权"
 burghers_urban_autonomy_charters_desc: "城市被确认享有自治特许权。市民议会为此更加忠诚，但每一份签署的特许状都在削弱王室对国家整体权威的直接掌控。"
 burghers_metropolitan_trade_hegemony: "都市贸易特权"
 burghers_metropolitan_trade_hegemony_desc: "首都的市民精英被公认为商业的最高仲裁者。从这座唯一的都市出发，他们协调着整个王国的商人、特权与关税体系，使这座城市成为贸易霸主，而相比之下，君权影响力正逐渐衰退。"
 burghers_megalopolis_trade_directorate: "大都市圈贸易管理局"
 burghers_megalopolis_trade_directorate_desc: "在大都市圈中，杰出的市民被提拔为常设的贸易理事会成员。他们掌控着庞大的商船舰队，主导着各大市场，并支配着最强大的贸易中心，使官员沦为城镇商业的旁观者。"
 burghers_megalopolis_urban_infrastructure_rights: "大都市圈基础设施特许"
 burghers_megalopolis_urban_infrastructure_rights_desc: "大都市圈的城镇行会被委以规划和资助道路、区划及地标工程的重任。随着乡村被牺牲以供养这座都市巨兽，城市边界内的建筑成本下降，开发热潮高涨。"
 burghers_megalopolis_financial_cartel_charters: "大都市圈金融特许"
 burghers_megalopolis_financial_cartel_charters_desc: "这大都市圈中最强大的银行机结成特许垄断联盟，它们以冷酷高效的作风承销国家财政收入、优化税收体系并操纵货币铸造，但作为回报，这些银行不仅获得了免遭重税剥削的保护，其金融权势几乎已能与君权并驾齐驱。"
 clergy_local_sermons: "本地布道"
 clergy_local_sermons_desc: "小规模布道和公开宗教课程强化了民众对信仰的忠诚，并培养了共同信仰的概念。"
 clergy_minor_diocesan_courts: "次级教区"
 clergy_minor_diocesan_courts_desc: "次级教区被授予有限的司法权限，既处理行政事务，又悄然扩大教会对市政管理的影响力。"
 clergy_scriptural_schools: "教义学校"
 clergy_scriptural_schools_desc: "专门研究教义的学校提高了识字率和宗教教育水平，强化了教士在文化生活方面的权威。"
 clergy_metropolitan_high_synod: "都会高级宗教会议"
 clergy_metropolitan_high_synod_desc: "首都举办了一场盛大的宗教会议，最高教会代表在此颁布教义并对城镇生活实施道德监督，既强化了内部团结，也加剧了对外部教派的敌视。"
 clergy_urban_university_endowments: "城镇大学捐赠基金"
 clergy_urban_university_endowments_desc: "大学的捐赠使教士获得学术代表权。识字率迅速提升，行政能力也随之增长，然而在教士的支配下，普通公民的晋升渠道却陷入停滞。"
 clergy_megalopolis_universal_concord: "大都市圈普世和谐"
 clergy_megalopolis_universal_concord_desc: "在这座都市中，信仰成为公民认同的基石。教士大规模地调解着文化、教育与社会稳定问题，但这种统一性也催生了对异见信仰毫不妥协的排斥态度。"
 clergy_megalopolis_hierophantic_council: "大都会圣职议会"
 clergy_megalopolis_hierophantic_council_desc: "最高教士组成的裁决议会引导着这座都市的精神与文化方向。他们的影响力遍及国家行政与宗教政策，但其特权地位使他们得以豁免赋税与约束。"
 peasants_harvest_commons_rights: "收割公地权利"
 peasants_harvest_commons_rights_desc: "农民被授予在共享公地上耕作权力，只取用土地所能承载的产出。收成虽不丰硕但稳定可靠，人们依靠自己收获的粮食得以更安稳地生活。"
 peasants_village_grain_stipends: "乡村谷物补贴"
 peasants_village_grain_stipends_desc: "地方当局向最贫困家庭分发粮食补贴，缓解饥荒问题。虽然部分生产积极性有所削弱，但乡村间的纽带变得更加紧密。"
 peasants_rural_communal_farming: "乡村集体耕作"
 peasants_rural_communal_farming_desc: "田地以社区为基础进行组织和管理，村民大会指导着耕地的扩展。农村人口围绕这些共享地块聚集增长，从而强化了一种分散的农业秩序。"
 peasants_smallholder_protection_acts: "小农保护法案"
 peasants_smallholder_protection_acts_desc: "法律保障小农免受贵族任意侵权，限制领主权力并规范义务。被征召服役的人数减少，同时庄园的财政负担通过农民阶层进行重新分配。"
 peasants_metropolitan_rural_supply_office: "都市农村物资供应处"
 peasants_metropolitan_rural_supply_office_desc: "首都的中央供应办公室协调农村物资输送，从而加强了对基础原材料的管控。尽管采购成本上升和粮食失衡问题令整个国家承受压力，农村地区仍加倍努力为大城市供给粮食。"
 peasants_metropolitan_grain_reserve_charters: "大都会粮食储备特许权"
 peasants_metropolitan_grain_reserve_charters_desc: "特许粮食储备的设立旨在为首都防范饥荒。大量粮食库存和仓储被预留用于城市需求，但农村地区的生产活力有很大部分被束缚在这些体系中。"
 peasants_megalopolis_pensions: "大都会农民养老金"
 peasants_megalopolis_pensions_desc: "长期劳作的农民获得养老金并摆脱最沉重的负担。赋税得以减轻，家族日渐兴旺，然而他们应征入伍的意愿却日渐消退。"
 peasants_megalopolis_rural_levy_compromise: "大都市农村税妥协方案"
 peasants_megalopolis_rural_levy_compromise_desc: "为换取阶层扩大、税收减免及王室补贴，乡村承诺在需要时提供大规模[levies|e]。日常的人力与国库因此受损，但服务于城市的农田与原材料生产机器却日益壮大。"
 nobles_capital_garrison_rights: "首都卫戍权"
 nobles_capital_garrison_rights_desc: "贵族们获得了向首都派遣兵力和军官的正式授权。他们的私人武装增强了城防力量，但同时也提升了其在军事中的政治影响力。"
 nobles_regional_courts: "地方法院"
 nobles_regional_courts_desc: "贵族法官们主持着地方法院和仲裁庭。他们对当地习俗的熟悉加速了法律程序——同时也巩固了贵族特权。"
 nobles_extended_hunting_rights: "扩大狩猎权"
 nobles_extended_hunting_rights_desc: "贵族被授予在广阔领地内专享的狩猎与放牧特权。其领地日益繁荣，但拥有土地的精英阶层对乡村政策的影响力也随之增强。"
 nobles_martial_fiefs: "军事封地"
 nobles_martial_fiefs_desc: "大庄园被重组为军事封地，负责在战时提供士兵。征召兵变得更廉价、更迅速——然而贵族的军事身份认同却进一步加深。"
 nobles_high_council_seats: "最高议会席位"
 nobles_high_council_seats_desc: "显贵们获得最高议会的永久席位。决策过程因此获得经验与威望，但王室日益依赖贵族的参与。"
 nobles_metropolitan_guard_command: "大都会卫队司令部"
 nobles_metropolitan_guard_command_desc: "首都的精英卫队由统一的贵族指挥统辖。训练与协同作战能力显著提升，贵族阶层亦由此获得对军队的更大话语权。"
 nobles_metropolitan_military_academies: "都市军事学院"
 nobles_metropolitan_military_academies_desc: "首都拥有庞大的贵族学院网络，将才华横溢的军官锻造军事家。创新精神与训练伴随着贵族影响力同步提升。"
 nobles_metropolitan_trade_concessions: "大都会贸易特许权"
 nobles_metropolitan_trade_concessions_desc: "贵族们确保了对首都商业的垄断特权。他们的投资虽刺激了全国贸易，却将国家与贵族商业利益紧密捆绑。"
 nobles_metropolitan_court_bloc: "大都会法院集团"
 nobles_metropolitan_court_bloc_desc: "在大都市中，贵族家族在宫廷内部形成了强大的势力集团。政策变得更为尖锐、迅速且高效——却日益向贵族的目标倾斜。"
 nobles_metropolitan_infrastructure_charters: "大都会基础设施特许权"
 nobles_metropolitan_infrastructure_charters_desc: "贵族阶层资助并监管首都区域的道路建设与城镇改造工程。发展进程加速，但物流管理权逐渐向贵族圈层集中。"
 nobles_megalopolis_autonomous_marchs: "自主军事权"
 nobles_megalopolis_autonomous_marchs_desc: "最显赫的贵族家族掌控着军事自主权。他们的私人军队构成了帝国战争的中坚力量——代价是贵族阶层获得无与伦比的权势。"
 nobles_megalopolis_mercantile_oligarchy: "商业寡头"
 nobles_megalopolis_mercantile_oligarchy_desc: "贵族商人集团掌控着这座大都市的关键贸易与金融领域。财富与影响力急剧膨胀，但国家却逐渐依赖贵族资本。"
 nobles_megalopolis_court_hegemony: "宫廷霸权"
 nobles_megalopolis_court_hegemony_desc: "贵族掌控着大都市中的各个部门、文化机构与政府席位。他们决定着国家的命运——走向繁荣，或坠入深渊。"
 nobles_megalopolis_urban_fortress_rights: "城镇堡垒权利"
 nobles_megalopolis_urban_fortress_rights_desc: "贵族获得了加固街区、住宅及城镇阶层的合法权利。这座城市变得几乎坚不可摧——然而贵族军事化的趋势已不容忽视。"
 nobles_megalopolis_imperial_directors: "帝国监事"
 nobles_megalopolis_imperial_directors_desc: "最强大的贵族设立了掌控官僚体系、威望与政策的职位。治理因此变得更迅速、更严苛，并深受贵族影响。"