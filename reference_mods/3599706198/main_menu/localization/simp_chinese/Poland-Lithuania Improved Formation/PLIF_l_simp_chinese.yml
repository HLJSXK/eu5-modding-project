l_simp_chinese:
 PLIF.100.title: "一封来自立陶宛的信函"
 PLIF.100.desc.1: "我们接待了来自[GetCountry('LIT').GetLongName]年轻统治者的使团，他们带来了一个引人入胜的提议。自北方十字军开始以来，[lithuanian_queen.GetName]深知在[ShowReligionAdjective('catholic')]与[ShowReligionAdjective('orthodox')]势力的持续夹击下，改变信仰既是不可避免的，也是确保[GetCountry('LIT').GetNameWithNoTooltip]作为独立国家存续的关键。\n\n他们没有选择向[GetCountry('TEU').GetLongName]或其他十字军修会求助，而是转向我们，并提出了一个能同时解决我们双方继承困境的方案。她将与[marriage_target.GetName]联姻，将我们的[nations|e]紧密联结，以共同防御。作为回报，我们将协助[GetCountry('LIT').GetNameWithNoTooltip]改宗皈依[ShowReligionName('catholic')]。"
 PLIF.100.desc.2: "我们接待了来自[GetCountry('LIT').GetLongName]年轻统治者的使团，他们带来了一个有趣的提议。鉴于她的[nation|e]继承问题悬而未决，[lithuanian_queen.GetName]提议与[marriage_target.GetName]联姻，将我们两国紧密联结，共同抵御那些伺机而动的邻国。"
 PLIF.100.a: "我们接受她的提议！"
 PLIF.100.b: "一个极其愚蠢的念头。"
 PLIF.200.title: "一封来自立陶宛的信函"
 PLIF.200.desc.1: "我们接待了来自[GetCountry('LIT').GetLongName]年轻统治者的使团，他们带来了一个引人入胜的提议。自北方十字军开始以来，[lithuanian_king.GetName]深知在[ShowReligionAdjective('catholic')]与[ShowReligionAdjective('orthodox')]势力的持续夹击下，改变信仰既是不可避免的，也是确保[GetCountry('LIT').GetNameWithNoTooltip]作为独立国家存续的关键。\n\n他们没有选择向[GetCountry('TEU').GetLongName]或其他十字军修会求助，而是转向我们，并提出了一个能同时解决我们双方继承困境的方案。他将与[marriage_target.GetName]联姻，将我们的[nations|e]紧密联结，以共同防御。作为回报，我们将协助[GetCountry('LIT').GetNameWithNoTooltip]改宗皈依[ShowReligionName('catholic')]。"
 PLIF.200.desc.2: "我们接待了来自[GetCountry('LIT').GetLongName]年轻统治者的使团，他们带来了一个有趣的提议。鉴于她的[nation|e]继承问题悬而未决，[lithuanian_king.GetName]提议与[marriage_target.GetName]联姻，将我们两国紧密联结，共同抵御那些伺机而动的邻国。"
 PLIF.200.a: "我们接受他的提议！"
