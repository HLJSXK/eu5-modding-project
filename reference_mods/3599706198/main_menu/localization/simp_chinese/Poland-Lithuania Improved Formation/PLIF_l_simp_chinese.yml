 PLIF.1.title: "波兰立陶宛联邦"
 PLIF.1.desc.1: "我们的命运与[annexed_ally.GetName]的命运紧密相连，这一点许多人记忆犹新。经过几代人的努力，我们两个[nations|e]的行政和文化中心逐渐融合在一起，今天我们决定让我们的联合更加正式。从此不再有两个国家，而是一个！"
 PLIF.1.desc.2: "通过征服和整合，我们在这个[ShowContinentName('europe')]逐渐建立了一个强大的国家。在我们的旗帜下有许多民族，我们不能永远忽视他们的代表。作为一个联盟，我们将共同崛起，为自己创造一个辉煌的新联邦！"
 PLIF.1.a: "我们共同迈向未来！"
 STATIC_MODIFIER_NAME_PLIF_second_capital: "第二首都"
 PLIF_form_tt: "我们必须成为我们[union|e]中的主导。"