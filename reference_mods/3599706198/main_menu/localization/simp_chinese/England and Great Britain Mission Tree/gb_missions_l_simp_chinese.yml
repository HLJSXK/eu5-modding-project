l_simp_chinese:
 gb_mission_pack: "不列颠帝国的崛起"
 gb_mission_pack_DESCRIPTION: "从解决法国争端到塑造统一的英格兰身份，这些任务指引着英格兰走向帝国。"
 gb_mission_pack_CRITERIA_DESCRIPTION: "壮大军事力量，统一不列颠群岛，培育不列颠认同，并建立帝国强权。"
 gb_mission_pack_BUTTON_TOOLTIP: "通过征服、外交与文化融合，将英格兰转变为统一的大英帝国。"
 gb_mission_pack_BUTTON_DETAILS: "$gb_mission_pack_BUTTON_TOOLTIP$"
 mission_gb_raise_an_army: "组建军队"
 mission_gb_raise_an_army_desc: "传统上，议会反对任何为王室建立常备军的尝试。相反，我们依靠的是民兵、雇佣兵和贵族的征召兵努力。由于百年战争正在经历最后阶段，又有苏格兰人对我们的安全构成了威胁，我们自然需要以某种合理的方式组建军队。"
 mission_gb_raise_an_army_CRITERIA_DESCRIPTION: "拥有80%的兵力上限，且满足以下任一条件：拥有2个贵族阶层特权，或拥有6支辅助军团。"
 mission_gb_subjugate_scotland: "征服苏格兰"
 mission_gb_subjugate_scotland_desc: "「苏格兰人之锤」爱德华一世发现通过征服苏格兰人来确保我们王国安全是行之有效的手段。我们必须效仿。"
 mission_gb_subjugate_scotland_CRITERIA_DESCRIPTION: "拥有（直接拥有或通过非朝贡附庸国）珀斯、阿盖尔、内赫布里底群岛、因弗内斯、萨瑟兰、外赫布里底群岛以及所有低地地区。"
 mission_gb_conquer_ireland: "征服爱尔兰"
 mission_gb_conquer_ireland_desc: "爱尔兰的盖尔人在历史上被称为「国王陛下的爱尔兰敌人」，长期游离于英格兰的统治之外。是时候让他们屈服了。"
 mission_gb_conquer_ireland_CRITERIA_DESCRIPTION: "（直接或通过非朝贡属国）拥有明斯特、康诺特、阿尔斯特和伦斯特地区的所有省份。"
 gb_conquer_ireland_munster_tt: "控制明斯特的所有省份（直接拥有或通过非朝贡附庸国）。"
 gb_conquer_ireland_connacht_tt: "控制康诺特的所有省份（直接拥有或通过非朝贡附庸国）。"
 gb_conquer_ireland_ulster_tt: "控制阿尔斯特地区的所有省份（直接拥有或通过非朝贡附庸国）。"
 gb_conquer_ireland_leinster_tt: "控制伦斯特的所有省份（直接拥有或通过非朝贡附庸国）。"
 mission_gb_unify_the_isles: "统一群岛"
 mission_gb_unify_the_isles_desc: "不列颠群岛是英格兰和苏格兰两个王国以及爱尔兰的许多小王国的家园。我们有责任将各岛统一在英国的统治之下。"
 mission_gb_unify_the_isles_CRITERIA_DESCRIPTION: "在不列颠区域拥有至少50个地点（自身或非朝贡国附庸）。"
 gb_unify_isles_50_britain_tt: "在不列颠区域控制至少50个地点（直接拥有或通过非朝贡附庸国）。"
 mission_gb_acts_of_union: "联合法案"
 mission_gb_acts_of_union_desc: "不列颠群岛诸王国没有统一的立法机关，原有的机构也是错综复杂。虽然这些国家的君主是同一个人，但其法律和议会并没有统一在一部宪法之下。我们不能让这种情况继续下去。"
 mission_gb_acts_of_union_CRITERIA_DESCRIPTION: "成为（或已成为）大不列颠。"
 gb_subjugate_scotland_perth_tt: "拥有珀斯（250）或一个非朝贡属国拥有。"
 gb_subjugate_scotland_argyll_tt: "拥有阿尔盖尔或一个非朝贡属国拥有。"
 gb_subjugate_scotland_inner_hebrides_tt: "拥有内赫布里底群岛或一个非朝贡属国拥有。"
 gb_subjugate_scotland_inverness_tt: "拥有因弗内斯或一个非朝贡属国拥有。"
 gb_subjugate_scotland_sutherland_tt: "拥有萨瑟兰或一个非朝贡属国拥有。"
 gb_subjugate_scotland_outer_hebrides_tt: "拥有外赫布里底群岛或一个非朝贡属国拥有。"
 gb_subjugate_scotland_lowlands_tt: "拥有低地地区的所有省份（由你持有或非朝贡属国拥有）。"
 STATIC_MODIFIER_NAME_gb_raise_army_modifier: "扩张军队"
 STATIC_MODIFIER_DESC_gb_raise_army_modifier: "扩编的征召兵与训练有素的军官提升了人力与士气。"
 STATIC_MODIFIER_NAME_gb_subjugate_scotland_modifier: "北方战役经验"
 STATIC_MODIFIER_DESC_gb_subjugate_scotland_modifier: "苏格兰战争中的后勤减少了维护费用并保留了传统。"
 STATIC_MODIFIER_NAME_gb_unify_isles_modifier: "统一群岛行政"
 STATIC_MODIFIER_DESC_gb_unify_isles_modifier: "随着不列颠统一于一个王权之下，威望与外交影响力也随之增长。"
 STATIC_MODIFIER_NAME_gb_acts_of_union_modifier: "联合法案"
 STATIC_MODIFIER_DESC_gb_acts_of_union_modifier: "统一的英国国家享有持久的繁荣、安宁与影响力。"
 gb_recently_humiliated_rival_tt: "最近羞辱了一个宿敌"
 gb_no_country_rivals_tt: "无人能与我们匹敌。"
 owns_15_low_countries_provinces_tt: "我们在低地国家至少拥有15个省份。"
 subject_owns_15_low_countries_provinces_tt: "一个非朝贡属国在低地国家拥有至少15个省份"
 ally_owns_15_low_countries_provinces_tt: "任何首都位于低地国家区域，且主流文化为“低地法兰克”、“弗里斯兰”或“瓦隆”的盟友在低地国家拥有至少15个省份。"
 gb_war_of_the_roses_disaster_tt: "玫瑰战争已经发生"
 gb_war_of_roses_info_tt: "已完成玫瑰战争！\n（在1430年至1500年间触发，如果你扮演英格兰并且有一个不育或无子女的金雀花王朝统治者，并且约克和兰开斯特两个王朝都有成年统治者）"
 gb_mediterranean_authority_cb_tt: "获得对巴利阿里群岛、爱琴海群岛、西西里岛东部、科孚岛和凯法利尼亚岛的宣战理由。"
 gb_welcome_to_america_tt: "获得招募征服者或提升殖民地增长的能力。"
 gb_three_kingdoms_wars_info_tt: "三国之战已终结。"
 gb_internal_affairs_mission_pack: "内政"
 gb_internal_affairs_mission_pack_DESCRIPTION: "稳定议会与阶层，掌控英吉利海峡，并推动国内工业与金融的崛起。"
 gb_internal_affairs_mission_pack_CRITERIA_DESCRIPTION: "平衡阶层，增加贸易收入，工业化关键枢纽，并通过海陆力量投送实力。"
 gb_internal_affairs_mission_pack_BUTTON_TOOLTIP: "推动内部改革和经济主导地位。"
 gb_internal_affairs_mission_pack_BUTTON_DETAILS: "$gb_internal_affairs_mission_pack_BUTTON_TOOLTIP$"
 mission_gb_house_divided: "兄弟阋墙"
 mission_gb_house_divided_desc: "通过满足各阶层的要求并制定特权法，使各阶层都团结在王室和平民之后。"
 mission_gb_house_divided_CRITERIA_DESCRIPTION: "阶层满意度高，拥有合法稳定的王权及活跃的阶层特权。"
 mission_gb_monopolize_channel: "垄断海峡"
 mission_gb_monopolize_channel_desc: "渠道贸易必须经由英国人之手及港口进行，并得到港口设施和护航舰队的支持。"
 mission_gb_monopolize_channel_CRITERIA_DESCRIPTION: "强劲的贸易收入、充足的港口与船只，以及升级的市场设施。"
 mission_gb_early_industry: "早期工业"
 mission_gb_early_industry_desc: "将资本注入原始工业行会与城镇发展，以在本土培育制造业基础。"
 mission_gb_early_industry_CRITERIA_DESCRIPTION: "经济稳健发展，家具行业公会林立。"
 mission_gb_centers_world_trade: "世界贸易中心"
 mission_gb_centers_world_trade_desc: "以国家能力为后盾，将我们的商业中心提升为世界首选市场。"
 mission_gb_centers_world_trade_CRITERIA_DESCRIPTION: "广泛的贸易建筑、高额的贸易收入以及稳固的本土区域控制。"
 mission_gb_renaissance: "英格兰文艺复兴"
 mission_gb_renaissance_desc: "崇尚学识与威望，让我们的首都体现文艺复兴的理想。"
 mission_gb_renaissance_CRITERIA_DESCRIPTION: "声望卓著、稳定繁荣的首都，拥有一所大学和大量城镇投资。"
 mission_gb_renovate_oxbridge: "修缮牛津剑桥"
 mission_gb_renovate_oxbridge_desc: "翻新顶尖学院，确保牛津与剑桥始终走在学术前沿。"
 mission_gb_renovate_oxbridge_CRITERIA_DESCRIPTION: "拥有并升级牛津和贝德福德郡，增设大学并推动坚实发展。"
 mission_gb_expand_royal_navy: "扩编皇家海军"
 mission_gb_expand_royal_navy_desc: "资助码头和港口，以部署一支能够保护英吉利海峡贸易的现代化舰队。"
 mission_gb_expand_royal_navy_CRITERIA_DESCRIPTION: "强大的海军、众多港口以及升级的海军基础设施。"
 mission_gb_royal_marines: "皇家海军陆战队"
 mission_gb_royal_marines_desc: "锻造精英海军陆战队，以主导沿海战役并保卫海外领地。"
 mission_gb_royal_marines_CRITERIA_DESCRIPTION: "强大的海军传统与严明的本土区域控制"
 mission_gb_found_standing_army: "设立常备军"
 mission_gb_found_standing_army_desc: "超越封建征召制度，建立由王室统领的训练有素的常备军。"
 mission_gb_found_standing_army_CRITERIA_DESCRIPTION: "维持军队规模上限、王室正统性及国内控制。"
 mission_gb_redcoats: "红衫军"
 mission_gb_redcoats_desc: "规范训练与装备，以打造闻名欧洲的专业红衫军。"
 mission_gb_redcoats_CRITERIA_DESCRIPTION: "全力上限，强大威望，以及对本土区域的高度掌控。"
 mission_gb_empire: "大英帝国"
 mission_gb_empire_desc: "将繁荣、学术、贸易与军事联合起来，构建一个横跨全球的帝国伟业。"
 mission_gb_empire_CRITERIA_DESCRIPTION: "大规模发展、收入、正统性和控制力，以限制内部改革。"
 STATIC_MODIFIER_NAME_gb_empire_modifier: "帝国崛起"
 STATIC_MODIFIER_DESC_gb_empire_modifier: "随着王权控制深入全境，正统性与宗教影响力逐月增强。"
 STATIC_MODIFIER_NAME_gb_royal_marines_modifier: "皇家海军陆战队"
 STATIC_MODIFIER_DESC_gb_royal_marines_modifier: "精锐海军陆战队从海上发起突袭，士气高昂，海战攻势更为凌厉。"
 STATIC_MODIFIER_NAME_gb_redcoats_modifier: "红衫军"
 STATIC_MODIFIER_DESC_gb_redcoats_modifier: "标准化的训练和装备，使得我们的步兵无论出现在哪片战场，都更具杀伤力。"
 STATIC_MODIFIER_NAME_gb_monopolize_channel_modifier: "主导海峡"
 STATIC_MODIFIER_DESC_gb_monopolize_channel_modifier: "英国对海峡贸易的控制加速了全境造船业的发展。"
 STATIC_MODIFIER_NAME_gb_recovering_prestige_modifier: "恢复声望"
 STATIC_MODIFIER_DESC_gb_recovering_prestige_modifier: "尽管法国仍在坚持，但我们的战役已向全欧洲展示了英格兰的决心与军事才能。"
 mission_gb_hundred_years_war: "百年战争"
 mission_gb_hundred_years_war_desc: "《图尔条约》给英格兰和法兰西带来了一段不稳定的休战时期。双方都意识到，和平不太可能持续太久，我们必须决定是履行条约、等待时机，还是准备开战。\n英格兰的命运全由此举决定。"
 mission_gb_end_the_french_conflict: "结束法国冲突"
 mission_gb_end_the_french_conflict_desc: "我们与法国在欧陆的冲突必须结束：不管是通过在军事上击败法国人、声索其宝座，抑或是放弃大陆、成为海上强权。"
 mission_gb_end_the_french_conflict_CRITERIA_DESCRIPTION: "百年战争局势已经结束。"
 mission_gb_develop_british_identity: "建立不列颠身份认同"
 mission_gb_develop_british_identity_desc: "不列颠群岛孕育了各种文化和语言，像是北方的苏格兰人和高地人、绿宝石之岛上的爱尔兰人、南方的威尔士人和英格兰人。自然，这么多文化共存，若是不加管教，定会出现问题。我们应该建立不列颠身份认同，从而制霸不列颠群岛。"
 mission_gb_develop_british_identity_CRITERIA_DESCRIPTION: "控制不列颠群岛，接受或容忍苏格兰与爱尔兰文化。"
 STATIC_MODIFIER_NAME_gb_unified_british_identity_modifier: "统一不列颠认同"
 STATIC_MODIFIER_DESC_gb_unified_british_identity_modifier: "共同的不列颠认同增强了群岛各地的团结，缓解了文化紧张，并加强了对王室的忠诚。"
 mission_gb_english_superiority: "英格兰至上"
 mission_gb_english_superiority_desc: "我们的对手众多且强大，但也傲慢自负。他们以为能在海上与我们抗衡，在异国他乡与我们争夺主权，对我们构成威胁。我们必须让他们明白，这种想法错得多么致命。"
 mission_gb_english_superiority_CRITERIA_DESCRIPTION: "通过羞辱宿敌或没有宿敌来彰显优越。"
 STATIC_MODIFIER_NAME_gb_english_superiority_modifier: "英格兰至上"
 STATIC_MODIFIER_DESC_gb_english_superiority_modifier: "我们最近战胜宿敌的胜利，增强了我们的民族自豪感和力量投射能力。"
 mission_gb_the_royal_court: "帝王宫廷"
 mission_gb_the_royal_court_desc: "君主一日不可无顾问辅佐，无论未来会是什么样子，都需要有合格的顾问。"
 mission_gb_the_royal_court_CRITERIA_DESCRIPTION: "通过羞辱宿敌或没有宿敌来彰显优越。"
 STATIC_MODIFIER_NAME_gb_the_royal_court_modifier: "帝王宫廷"
 STATIC_MODIFIER_DESC_gb_the_royal_court_modifier: "明智的君主通过采纳良策与有效治理来巩固国家。"
 mission_gb_mainland_alliances: "大陆联盟"
 mission_gb_mainland_alliances_desc: "敌人的敌人就是我们的朋友，尽管我们注重发展远洋事业，也不能忘记保卫本岛不受威胁。"
 mission_gb_mainland_alliances_CRITERIA_DESCRIPTION: "与至少三个与英格兰接壤的欧洲大陆国家结盟。"
 mission_gb_influence_the_lowlands: "影响低地国家"
 mission_gb_influence_the_lowlands_desc: "低地的荷兰人与佛兰德人在方方面面与我们无不相似：我们都从贸易获取财富，我们都坐拥壮观的海军，我们都反对法国和西班牙的统治。我们应当对低地施加影响，改善我们在此地的形象，此举或许能为我们赢来盟友或者属国。"
 mission_gb_influence_the_lowlands_CRITERIA_DESCRIPTION: "对低地地区具有强大的影响力。"
 OPINION_MODIFIER_NAME_gb_opinion_lowlands_trade_partners: "低地贸易伙伴关系"
 OPINION_MODIFIER_DESC_gb_opinion_lowlands_trade_partners: "我们共同的贸易利益和文化亲和力，在两国之间缔造了牢固的纽带。"
 mission_gb_the_european_trade: "欧洲贸易"
 mission_gb_the_european_trade_desc: "无数新世界货物流入英吉利海峡，可欧洲不止这一个有利可图的贸易中心。我们得强化在欧洲的存在，确保对欧洲商业的主导地位。"
 mission_gb_the_european_trade_CRITERIA_DESCRIPTION: "在欧洲市场拥有强大的贸易影响力。"
 STATIC_MODIFIER_NAME_gb_european_trade_modifier: "欧洲贸易"
 STATIC_MODIFIER_DESC_gb_european_trade_modifier: "我们遍布欧洲的广泛贸易网络提升了我们的收入和经济影响力。"
 mission_gb_issue_the_royal_warrant: "授予皇家认证"
 mission_gb_issue_the_royal_warrant_desc: "通过向宫廷和王室成员供应优良商品，商人可以获得由王室授予的皇家委任认证书。我们应该明智地选择向哪些贸易伙伴授予该特许状，从而获得有利的交易。"
 mission_gb_issue_the_royal_warrant_CRITERIA_DESCRIPTION: "通过颁发皇家特许状来支持市民和商人。"
 STATIC_MODIFIER_NAME_gb_royal_warrant_modifier: "授予皇家认证"
 STATIC_MODIFIER_DESC_gb_royal_warrant_modifier: "授予皇家特许状能巩固我们的贸易伙伴关系，并提升我们市民阶层的影响力。"
 mission_gb_abolish_villeinage: "废除封建庄园制"
 mission_gb_abolish_villeinage_desc: "从前，驱使佃农劳作行之有效，但那也只是老黄历了。像我们这样一个声威卓著的国家，应该废除这一体系，用高效的公簿登记田产租赁取而代之。"
 mission_gb_abolish_villeinage_CRITERIA_DESCRIPTION: "给予农民更多自由，同时避免激怒贵族。"
 STATIC_MODIFIER_NAME_gb_villeinage_ended_modifier: "封建庄园制的终结"
 STATIC_MODIFIER_DESC_gb_villeinage_ended_modifier: "废除农奴制提升了我们的繁荣度与发展。"
 mission_gb_found_the_royal_navy: "建立皇家海军"
 mission_gb_found_the_royal_navy_desc: "我们目前所保有的海军不过是从市民那里征召上来的，动员缓慢不说，价格还昂贵。\n我们得建设一支常备海军，保卫岛屿免受外敌入侵，保障国家未来。"
 mission_gb_found_the_royal_navy_CRITERIA_DESCRIPTION: "建立常备海军。"
 STATIC_MODIFIER_NAME_gb_exploration_spirit_modifier: "探索精神"
 STATIC_MODIFIER_DESC_gb_exploration_spirit_modifier: "探索精神拓展了我们的视野，增强了我们的海军实力。"
 mission_gb_war_of_the_roses: "玫瑰战争"
 mission_gb_war_of_the_roses_desc: "这是一场许多人早就预料到的冲突。我们的人民必须以某种方式安全地度过这一不确定时期。"
 mission_gb_war_of_the_roses_CRITERIA_DESCRIPTION: "成功摆脱“玫瑰战争”灾难。"
 STATIC_MODIFIER_NAME_gb_a_house_united_modifier: "团结的王室"
 STATIC_MODIFIER_DESC_gb_a_house_united_modifier: "随着玫瑰战争的结束，贵族们空前团结，各阶层间的敌意也随之减弱。"
 STATIC_MODIFIER_NAME_gb_dynastic_security_modifier: "王朝稳定"
 STATIC_MODIFIER_DESC_gb_dynastic_security_modifier: "王室血脉的强化提升了子嗣繁衍能力与家族成员的寿命。"
 mission_gb_handle_the_reformation: "处理宗教改革"
 mission_gb_handle_the_reformation_desc: "宗教混乱笼罩着欧洲。曾几何时，教宗是我们的指路明灯，如今却只剩混乱。我们必须控制局势，并决定我们在神性问题上的立场。"
 mission_gb_handle_the_reformation_CRITERIA_DESCRIPTION: "参与宗教改革运动或对其进行抵制。"
 STATIC_MODIFIER_NAME_gb_a_new_religious_destiny: "新宗教命运"
 STATIC_MODIFIER_DESC_gb_a_new_religious_destiny: "拥抱新的宗教道路能激发国家活力，提升宗教统一度并降低叛乱度。"
 STATIC_MODIFIER_NAME_gb_absent_from_the_reformation: "置身宗教改革之外"
 STATIC_MODIFIER_DESC_gb_absent_from_the_reformation: "置身于宗教改革之外，能够提升宗教容忍度与国家稳定。"
 STATIC_MODIFIER_NAME_gb_loyalty_to_the_pope: "向教宗效忠"
 STATIC_MODIFIER_DESC_gb_loyalty_to_the_pope: "忠于教宗能增强宗教影响力并改善与天主教会的关系。"
 STATIC_MODIFIER_NAME_gb_one_state_one_church: "一个国家，一个教会"
 STATIC_MODIFIER_DESC_gb_one_state_one_church: "建立国教可以增强宗教统一并减少叛乱度。"
 STATIC_MODIFIER_NAME_gb_head_of_anglican_church: "领导圣公宗教会"
 STATIC_MODIFIER_DESC_gb_head_of_anglican_church: "成为英国国教会的领袖会增加宗教影响力和国家威望。"
 mission_gb_piety_of_the_state: "国家的虔诚"
 mission_gb_piety_of_the_state_desc: "我们是一片被主亲自赐福的土地。但教士机构对如何处理宗教事务有着天壤之别的想法。我们必须确保国家的虔诚，并确保对教会的控制。"
 mission_gb_piety_of_the_state_CRITERIA_DESCRIPTION: "通过政府改革和基础设施建设，平衡宗教权威与国家权力。"
 mission_gb_strengthen_the_crown: "巩固王权"
 mission_gb_strengthen_the_crown_desc: "统治者将其专制权力视作为神所授，可是中央权威一直遭到挑战，如今，议会试图限制君主的权力。\n专制主义的思潮在欧洲宫廷中滋长，我们也不例外，必须顺应潮流，强化政府权威。"
 mission_gb_strengthen_the_crown_CRITERIA_DESCRIPTION: "通过改革与特权，平衡王权正统性与阶层势力。"
 STATIC_MODIFIER_NAME_gb_strong_crown_modifier: "强权王权"
 STATIC_MODIFIER_DESC_gb_strong_crown_modifier: "强化的王权能提升正统性并削弱阶层影响力。"
 mission_gb_acts_of_the_parliament: "议会法案"
 mission_gb_acts_of_the_parliament_desc: "议会是治国之工具，唯有指导得当，才能发挥功效。 "
 mission_gb_acts_of_the_parliament_CRITERIA_DESCRIPTION: "通过议会法案来平衡阶层权力和王权。"
 STATIC_MODIFIER_NAME_gb_strong_burghers_modifier: "强大的市民阶层"
 STATIC_MODIFIER_DESC_gb_strong_burghers_modifier: "繁荣的市民阶层能够提升贸易收入和城镇发展。"
 mission_gb_the_three_kingdoms_wars: "三国之战"
 mission_gb_the_three_kingdoms_wars_desc: "王权与议会权力的统治形成鲜明对比，保王党与议会派之间的冲突已不可避免。"
 mission_gb_the_three_kingdoms_wars_CRITERIA_DESCRIPTION: "成功从三国之战中脱身。"
 STATIC_MODIFIER_NAME_gb_weathered_absolutism_modifier: "抵御专制主义"
 STATIC_MODIFIER_DESC_gb_weathered_absolutism_modifier: "历经内战的洗礼，王权的统治更为稳固，正统性与治理能力均得到加强。"
 STATIC_MODIFIER_NAME_gb_restored_order_modifier: "秩序恢复"
 STATIC_MODIFIER_DESC_gb_restored_order_modifier: "平定内乱恢复秩序有助于提升稳定性和改善阶层关系。"
 mission_gb_rule_britannia: "统治吧，不列颠尼亚"
 mission_gb_rule_britannia_desc: "海军是我们的力量；海洋是我们的家园。从岛屿上统治四海是我们的使命，用海军优势主宰世界是我们的归宿！"
 mission_gb_rule_britannia_CRITERIA_DESCRIPTION: "维持海军优势，称霸世界。"
 STATIC_MODIFIER_NAME_gb_naval_dominance_modifier: "海上霸权"
 STATIC_MODIFIER_DESC_gb_naval_dominance_modifier: "保持海军优势能够加强我们对海洋的控制，并提升我们的海上力量。"
 mission_gb_mediterranean_authority: "地中海霸权"
 mission_gb_mediterranean_authority_desc: "虽然我们最初认为我们的地中海资产是对我们邻国的战争中的一个战略工具，但我们显然可以对该区域的贸易流动施加力量。我们的目标应该是增加这一点。"
 mission_gb_mediterranean_authority_CRITERIA_DESCRIPTION: "在地中海地区拥有强大的贸易影响力。"
 mission_gb_discover_the_americas: "发现美洲"
 mission_gb_discover_the_americas_desc: "关于遥远西方的神秘土地的传言四起。据说，它生机勃勃，充满了无法想象的奇迹。若此言不虚，它必将属于我们。"
 mission_gb_discover_the_americas_CRITERIA_DESCRIPTION: "探索美洲区域。"
 STATIC_MODIFIER_NAME_gb_unknown_frontier_modifier: "未知的边疆"
 STATIC_MODIFIER_DESC_gb_unknown_frontier_modifier: "对未知的探索激发国家雄心与航海专长。"
 mission_gb_colonize_canada: "殖民加拿大"
 mission_gb_colonize_canada_desc: "加拿大的土地比南方的领土更加的严寒恶劣，尽管如此，开发的时机已经成熟。雪山中有着异国毛皮、木材，矿藏也十分丰富。"
 mission_gb_colonize_canada_CRITERIA_DESCRIPTION: "殖民加拿大区域。"
 STATIC_MODIFIER_NAME_gb_established_shipping_lanes_modifier: "既定航线"
 STATIC_MODIFIER_DESC_gb_established_shipping_lanes_modifier: "通往殖民地的固定航线提升了贸易收入与海军后勤效率。"
 mission_gb_settle_in_america: "定居美洲"
 mission_gb_settle_in_america_desc: "美洲的土地似乎适合开展许多事业。在北方人们谈及皮毛和造船材料；南方的土地则看起来适合种植许多作物。我们必须在那里建立基地以获利。"
 mission_gb_settle_in_america_CRITERIA_DESCRIPTION: "定居北美"
 STATIC_MODIFIER_NAME_gb_welcome_to_america_modifier: "欢迎来到美洲"
 STATIC_MODIFIER_DESC_gb_welcome_to_america_modifier: "在美洲建立定居点能提升国家威望并带来经济机遇。"
 mission_gb_colonize_the_caribbean: "殖民加勒比地区"
 mission_gb_colonize_the_caribbean_desc: "加勒比海的岛屿为种植园主提供了丰厚的机会，他们愿意攫取这些土地，也有人手好好利用这片沃土。我们正好有这种类型的绅士。"
 mission_gb_colonize_the_caribbean_CRITERIA_DESCRIPTION: "安居加勒比地区"
 STATIC_MODIFIER_NAME_gb_a_useful_workforce_modifier: "可靠的劳动力"
 STATIC_MODIFIER_DESC_gb_a_useful_workforce_modifier: "通过同化原住民，我们可以为殖民地提供稳定的劳动力，从而提高生产效率和资源开采能力。"
 mission_gb_dominate_the_new_world: "主导新大陆"
 mission_gb_dominate_the_new_world_desc: "我们应控制新大陆，辽阔的土地、丰富的资源，都应该是我们政府的囊中物。我们必须确保新大陆的绝对统治权，并将一切对手和敌人驱逐出去。"
 mission_gb_dominate_the_new_world_CRITERIA_DESCRIPTION: "掌控新世界区域"
 STATIC_MODIFIER_NAME_gb_new_world_domination_modifier: "新大陆霸业"
 STATIC_MODIFIER_DESC_gb_new_world_domination_modifier: "主宰新世界将提升我们的贸易实力与效率，巩固我们的经济霸权。"
 STATIC_MODIFIER_NAME_gb_colonial_investment_modifier: "殖民投资"
 STATIC_MODIFIER_DESC_gb_colonial_investment_modifier: "投资我们的殖民地可提高生产效率和贸易，从而加强我们的经济基础。"
 mission_gb_sail_around_africa: "绕行非洲"
 mission_gb_sail_around_africa_desc: "在好望角之外，会有怎样的大千世界等待着我们？"
 mission_gb_sail_around_africa_CRITERIA_DESCRIPTION: "探索好望角周边的非洲海岸。"
 mission_gb_seize_the_cape: "夺取海角"
 mission_gb_seize_the_cape_desc: "好望角是通往东印度路线上的一个至关重要的航点，不消说，谁控制了此地，谁就控制了其他大国的亚洲野心。\n好望角必须是我们的！"
 mission_gb_seize_the_cape_CRITERIA_DESCRIPTION: "控制好望角省份。"
 STATIC_MODIFIER_NAME_gb_the_cape_of_good_hope_modifier: "好望角"
 STATIC_MODIFIER_DESC_gb_the_cape_of_good_hope_modifier: "控制好望角增强了我们的海军能力和贸易路线，确保我们在该地区的统治地位。"
 mission_gb_chart_the_southern_isles: "绘制南岛地图"
 mission_gb_chart_the_southern_isles_desc: "勇者们带着真正的英国人特有的勇气，正在寻求政府的支持，来绘制南大洋广阔的空旷地带。据说那里也有我们可以夺取的土地，在别人抓住机会之前，我们应该赶快建立一个繁荣昌盛的殖民地。"
 mission_gb_chart_the_southern_isles_CRITERIA_DESCRIPTION: "探索南方群岛区域。"
 STATIC_MODIFIER_NAME_gb_terra_australis_modifier: "南方大陆"
 STATIC_MODIFIER_DESC_gb_terra_australis_modifier: "控制澳大利亚区域增强了我们的海军能力和贸易航线，确保我们在该区域的主导地位。"
 mission_gb_colonize_spice_islands: "殖民香料群岛"
 mission_gb_colonize_spice_islands_desc: "在世界最遥远处有一个产出奇妙香料、精美服饰，还有着异国情调的女人的地方。为了我们社会的利益，我们应该在这里建立一个据点。"
 mission_gb_colonize_spice_islands_CRITERIA_DESCRIPTION: "定居于香料群岛区域。"
 mission_gb_settle_australia: "定居澳大利亚"
 mission_gb_settle_australia_desc: "我们的探索揭示了一座大小难以想象的岛屿的存在，虽然这不是我们希望找到的南方大陆，但还是应该成为我们]的正当领土。"
 mission_gb_settle_australia_CRITERIA_DESCRIPTION: "定居澳大利亚地区"
 STATIC_MODIFIER_NAME_gb_penal_colony_modifier: "罪犯流放地"
 STATIC_MODIFIER_DESC_gb_penal_colony_modifier: "在遥远的土地上建立一个流放地，既减轻了我们本土的罪犯负担，又增强了我们在殖民地的存在。"
 STATIC_MODIFIER_NAME_gb_british_india_established_modifier: "英属印度成立"
 STATIC_MODIFIER_DESC_gb_british_india_established_modifier: "我们在印度的殖民管理为我们提供了丰富的资源和人力。"
 STATIC_MODIFIER_NAME_gb_direct_rule_india_modifier: "直接统治印度"
 STATIC_MODIFIER_DESC_gb_direct_rule_india_modifier: "我们将直接统治印度，无需殖民中介。"
 gb_trade_company_charter_tt: "你现在可以在南亚地区建造贸易公司总部！以建立东印度公司。  \n\n建造方法如下：  \n※在南亚地区寻找一个由你或英属印度控制的沿海地点  \n※打开建筑菜单，建造贸易公司总部！  \n※东印度贸易公司事件将在1773年之后且建造完成时触发"
 gb_trade_company_charter_can_build_tt: "我们可以在南亚建立贸易公司总部！"
 gb_british_india_west_cb_tt: "英属印度获得对西印度地区的宣战理由。"
 gb_britain_india_west_cb_tt: "大不列颠获得了对西印度区域的宣战理由。"
 gb_own_location_in_inland_india_tt: "我们或我们的非朝贡国附庸拥有该地点\n※该地点位于内陆印度区域。"
 gb_british_india_hindustan_cb_tt: "英属印度获得对印度斯坦区域的宣战理由。"
 gb_britain_hindustan_cb_tt: "大不列颠获得了对印度斯坦区域的宣战理由。"
 gb_own_location_in_bengal_tt: "我们或我们的非朝贡国属国拥有该地点\n※该地点位于孟加拉区域。"
 gb_british_india_bengal_cb_tt: "英属印度获得对孟加拉区域的宣战理由。"
 gb_britain_bengal_cb_tt: "大不列颠获得了针对孟加拉区域的宣战理由。"
 gb_own_location_in_india_tt: "我们或我们的非朝贡国属国拥有该地点\n※该地点位于印度。"
 STATIC_MODIFIER_NAME_gb_lowlands_trade_partners_modifier: "低地贸易伙伴"
 STATIC_MODIFIER_DESC_gb_lowlands_trade_partners_modifier: "我们与低地国家的商业联系加强了我们的贸易地位和海军实力。"
 STATIC_MODIFIER_NAME_gb_integrated_lowlands_modifier: "低地整合"
 STATIC_MODIFIER_DESC_gb_integrated_lowlands_modifier: "我们与低地国家建立了牢固的联系。"
 STATIC_MODIFIER_NAME_gb_dynastic_power_modifier: "宗族威望"
 STATIC_MODIFIER_DESC_gb_dynastic_power_modifier: "稳固的宗族能提升正统性并减少阶层敌意。"
 STATIC_MODIFIER_NAME_gb_anglican_reform_progress_modifier: "圣公宗改革进度"
 STATIC_MODIFIER_DESC_gb_anglican_reform_progress_modifier: "英国国教改革的进展为政府重组与宗教政策开辟了新的道路。"
 STATIC_MODIFIER_NAME_gb_religious_stability_modifier: "宗教稳定"
 STATIC_MODIFIER_DESC_gb_religious_stability_modifier: "平衡处理宗教事务有助于维护稳定，并缓解各教派间的紧张关系。"
 STATIC_MODIFIER_NAME_gb_anglican_state_church_modifier: "圣公宗国教会"
 STATIC_MODIFIER_DESC_gb_anglican_state_church_modifier: "建立英国国教作为国家教会，将宗教集中于王权之下，削弱了教士的独立性。"
 STATIC_MODIFIER_NAME_gb_clergy_land_confiscation_modifier: "征用教产土地"
 STATIC_MODIFIER_DESC_gb_clergy_land_confiscation_modifier: "没收教会土地虽能充实国库，却会恶化与教士的关系。"
 STATIC_MODIFIER_NAME_gb_conciliarism_of_churches_modifier: "公会议至上"
 STATIC_MODIFIER_DESC_gb_conciliarism_of_churches_modifier: "采用协商主义平衡了教会和国家的权力，促进合作的同时保持传统结构。"
 STATIC_MODIFIER_NAME_gb_clergy_approval_anglican_settlement_modifier: "圣公会教士对和解方案的批准"
 STATIC_MODIFIER_DESC_gb_clergy_approval_anglican_settlement_modifier: "教士对我们宗教和解的认可，增强了他们对王权的支持，并提升了阶层满意度。"
 mission_gb_discover_india: "发现印度"
 mission_gb_discover_india_desc: "与印度的贸易已经要追溯到远古，但是因为贸易路线过长，我们很难和其他人竞争。我们必须组织一次远征来找到前往印度的海上路线。"
 mission_gb_discover_india_CRITERIA_DESCRIPTION: "发现通向印度的航线"
 mission_gb_east_indies_company: "东印度公司"
 mission_gb_east_indies_company_desc: "印度次大陆特产无数珍奇方物，欧陆强国已经多年在对印贸易中获利，我们是时候和它们并驾齐驱，在印度开设属于我们的贸易公司了。"
 mission_gb_east_indies_company_CRITERIA_DESCRIPTION: "在印度建立贸易站"
 STATIC_MODIFIER_NAME_gb_east_india_company_modifier: "东印度公司"
 STATIC_MODIFIER_DESC_gb_east_india_company_modifier: "建立东印度公司将提升贸易效率，并巩固我们在印度次大陆的经济影响力。"
 british_india_name: "英属印度"
 british_india_name_ADJ: "英属印度"
 mission_gb_trade_company_charter: "准备公司特许状"
 mission_gb_trade_company_charter_desc: "我们应当为授予特许状做好准备，以便成立贸易公司来管理我们在印度的商业利益。一旦满足条件，我们就可以通过在印度建造贸易公司总部来建立东印度公司。"
 mission_gb_trade_company_charter.tt: "你现在可以在南亚建立一个贸易公司总部来创建东印度公司。当你建造总部建筑时，游戏将自动创建贸易公司。"
 gb_british_india.1.title: "英属印度的建立"
 gb_british_india.1.desc: "我们在印度次大陆的疆域已超越单纯的贸易据点。是时候建立正式的殖民统治体系了。英属印度将作为王权下的自治领，在维持我们总体主权的同时管理地方事务。"
 gb_british_india.1.a: "宣告英属印度成立"
 gb_british_india.1.b: "我们将直接统治印度"
 gb_british_india.1.tt: "英属印度将作为殖民属国建立，负责治理我们在南亚的领土。"
 gb_british_india.1.historical_info: "英属印度，指1858年至1947年间英国对印度次大陆实施直接统治的时期。该统治体系建立于1857年印度民族起义之后，英国王室从东印度公司手中接管了对印度的直接控制权。"
 gb_british_india_established: "英属印度建立"
 gb_british_india_established_desc: "我们在印度的殖民管理为我们提供了丰富的资源和人力。"
 gb_direct_rule_india: "直接统治印度"
 gb_direct_rule_india_desc: "我们直接统治印度，无需殖民中介。"
 mission_gb_seize_ceylon: "占据锡兰"
 mission_gb_seize_ceylon_desc: "锡兰是印度附近的一座岛屿，对于确保印度洋贸易至关重要。我们的宿敌深知与印度及香料群岛贸易的丰厚利润，正图谋占领锡兰，我们绝不能允许这种情况发生。"
 mission_gb_seize_ceylon_CRITERIA_DESCRIPTION: "控制锡兰省。"
 STATIC_MODIFIER_NAME_gb_coromandel_presence_modifier: "立足科罗曼德"
 STATIC_MODIFIER_DESC_gb_coromandel_presence_modifier: "在科罗曼德尔海岸建立稳固的贸易据点，将提升我们在该区域的贸易效率与影响力。"
 STATIC_MODIFIER_NAME_gb_strategic_port_modifier: "战略港口"
 STATIC_MODIFIER_DESC_gb_strategic_port_modifier: "控制战略港口可以提高当地生产效率并增强我们的海军实力。"
 mission_gb_take_west_indian_coast: "取得印度西海岸地区"
 mission_gb_take_west_indian_coast_desc: "毫无疑问，控制西印度沿海地区将使我们对整个印度拥有更大的控制权。以英国的名义占领这片土地。"
 mission_gb_take_west_indian_coast_CRITERIA_DESCRIPTION: "控制西印度海岸区域。"
 mission_gb_push_into_inland_india: "向印度内陆推进"
 mission_gb_push_into_inland_india_desc: "印度内陆地区以其利润丰厚的矿藏和稀有宝石而闻名。毋庸置疑，该地区的原住民在我们的治理下将过上更好的生活。"
 mission_gb_push_into_inland_india_CRITERIA_DESCRIPTION: "控制印度内陆区域。"
