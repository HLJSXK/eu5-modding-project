l_simp_chinese:
 wotd_flora_and_fauna.1.title: "被鸮鹦鹉强暴"
 wotd_flora_and_fauna.1.desc: "在探索[ROOT.GetExploration.GetLocation.GetName]海岸沿线峡湾时，[explorer.GetName]决定深入内陆搜寻补给。当队伍夜间穿越森林时，一名船员遭到形似大型绿色鹦鹉的鸟类袭击。这只鸟似乎误将头戴绿帽的船员当成了潜在配偶。刺耳且洪亮的尖鸣声响彻整片森林，船员痛苦不堪且狼狈不堪。\n\n随行向导告知，这种鸟因肉质鲜美、羽毛保暖而深受当地人珍视。正如谚语所言：“只有不知足的人才会穿着鸮鹦鹉的皮毛抱怨冷。”"
 wotd_flora_and_fauna.1.a: "快把那个可怜的人从那鸟手里救出来吧！"
 wotd_flora_and_fauna.1.a.tt: "#italic 这只鸟试图继续与船员交配#!。"
 wotd_flora_and_fauna.1.b: "抓住它！我们可以用它来和当地人换取好处。"
 wotd_flora_and_fauna.1.c: "抓来当我们的船鹦鹉！希望它乖乖的。"
 wotd_flora_and_fauna.2.title: "海牛出没！"
 wotd_flora_and_fauna.2.desc: "[ROOT.GetExploration.GetLocation.GetName]的凛冽北风已让船员们疲惫不堪，[explorer.GetName]声称在海岸边看到会移动的岩石后便去休息了——直到瞭望员高喊：鲸鱼！\n\n结果这些生物并非鲸鱼，而是在浅滩觅食的巨型海牛。饥肠辘辘且焦躁不安的船员们放下小艇，展开了狩猎。\n\n经过漫长搏斗，他们终于捕获了一头近九米长的巨型雄海牛。其肉质尝起来像咸牛肉且耐储存，白色的骨骼坚硬如钢。\n但该如何处理剩下的海牛群呢？"
 wotd_flora_and_fauna.2.a: "继续前进，前方还有更多值得探索！"
 wotd_flora_and_fauna.2.b: "下锚停航，为漫长旅程储备肉食。"
 wotd_flora_and_fauna.2.c: "打包成“美人鱼骨架”卖给外国宫廷。"
 wotd_flora_and_fauna.2.d: "海牛？它们？可以做出美味的奶酪吗？"
 STATIC_MODIFIER_NAME_wotd_mermaid_skeleton_modifier: "“美人鱼”骨架"
 STATIC_MODIFIER_DESC_wotd_mermaid_skeleton_modifier: "远方探险家的宝物，据说是美人鱼的骨架，它吸引了好奇的贵族与商人，但其真实性值得怀疑。"
 STATIC_MODIFIER_NAME_wotd_sea_whale_meat_modifier: "大量涌入的鲸肉"
 STATIC_MODIFIER_DESC_wotd_sea_whale_meat_modifier: "这种肥美的肉类深受水手喜爱，而且经得起长途运输，与返港补给的昂贵成本相比，捕猎它的代价几乎微不足道。"
 wotd_flora_and_fauna.3.title: "巨型蝾螈"
 wotd_flora_and_fauna.3.desc: "日本大鲵被日本人称为“大山椒鱼”，栖息于清澈溪流与河流中。它们常在夜间发出类似孩童啼哭的奇特叫声，故被称为“山间哭泣的孩童”。当受到威胁时，它们会释放出强烈的山椒味，甚至能透过水流传播。日本大鲵因长寿而备受尊崇，身上布满了深深的褶皱和皱纹，处处可见岁月的痕迹。\n\n在日本民间传说中，妖怪河童的灵感据说正是来源于此生物。但与神话中不同的是，它并不会将粗心者拖入水下，我们的孩子们无需畏惧。"
 wotd_flora_and_fauna.3.desc.european: "巨型蝾螈，被当地部落称为“大山椒鱼”，栖息在这片遥远土地的清澈溪流与河川中。因其夜晚会发出奇特的、类似孩童啼哭的声音，原住民称它们为“山间哭泣的孩童”。当受到威胁时，它们会释放出一股强烈的刺鼻辛辣气味，甚至能透过水传播。\n\n我们探险队的博物学家注意到它们非凡的长寿特征，以及那布满古老躯体的深深褶皱与皱纹。当地民间传说中提及一种名为“河童”的水灵，据说这些顽皮的生物外形酷似此类蝾螈——尽管与传说所言不同，这些蝾螈对人类并无威胁。"
 wotd_flora_and_fauna.3.a: "抓捕它们以获取药用价值。"
 wotd_flora_and_fauna.3.b: "举办一场小型聚会来庆祝"
 wotd_flora_and_fauna.3.c: "保留一份样本并送回我们的宫廷。"
 wotd_flora_and_fauna.4.title: "风暴骤起"
 wotd_flora_and_fauna.4.desc: "乌云在地平线上聚集，阴影吞噬了前方的海面。狂风呼啸，巨浪猛烈拍打着船体，船员们争先恐后地固定索具。海图显示附近没有港口，最近的海岸也远在视线之外。\n\n雷声渐近，在风暴降临前，[explorer.GetName]必须决定我们的航向。"
 wotd_flora_and_fauna.4.a: "向南航行。"
 wotd_flora_and_fauna.4.b: "向北航行。"
 wotd_flora_and_fauna.4.c: "向西航行。"
 wotd_flora_and_fauna.4.d: "向东航行。"
 wotd_flora_and_fauna.5.title: "不会飞的怪鸟"
 wotd_flora_and_fauna.5.desc: "在风暴中漂流数日后，风浪终于平息，地平线上出现了一座新的岛屿。怀着看到陆地的感激之情，[explorer.GetName]的船员登陆上岸，收集物资并勘察海岸。在内陆探索时，他们遇到了一种前所未见的怪鸟。它对我们毫无惧意，反而好奇地啄着我们的头盔和靴子。\n\n这种生物体型有天鹅的两倍大，身体沉重圆胖，翅膀小而无法飞行。从它温顺的性情来看，似乎生活在没有天敌的环境里——船员们已经开始琢磨这种鸟类的滋味了。"
 wotd_flora_and_fauna.5.desc.colonized: "在风暴中漂流数日后，风浪终于平息，地平线上出现了一座新的岛屿。怀着看到陆地的感激之情，[explorer.GetName]的船员登陆上岸，收集物资并勘察海岸。遭遇的岛屿似乎有人居住，但我们无法判断其居民是敌是友。眼下只好将船藏匿在礁湖中静观其变。附近或许生长着某些果实。"
 wotd_flora_and_fauna.5.a: "它一定很好吃！"
 wotd_flora_and_fauna.5.a.tt: "#Italic 船员们迫不及待想尝试这种鸟肉，认为可能是难得的美味。#!"
 wotd_flora_and_fauna.5.b: "杀了它们！竟敢玷污我们的头盔！"
 wotd_flora_and_fauna.5.b.tt: "#warning 杀几只这种蠢鸟能有什么坏处？这岛上到处都是……#!"
 wotd_flora_and_fauna.5.c: "带些标本回去。"
 wotd_flora_and_fauna.5.d: "别管这些鸟了！找点水果回船上去！"
 wotd_flora_and_fauna.5.e: "我刚才是不是看到一只大鸟？"
 wotd_flora_and_fauna.6.title: "猎杀渡渡鸟"
 wotd_flora_and_fauna.6.desc: "我们的探险队在[explorer.GetName]率领下报告，岛上的奇特鸟类丝毫不畏惧人类。即便部分同类遭捕杀，其余仍若无其事地四处徘徊。它们笨重的身躯与短小的翅膀使得任何手持木棍或捕网者都能轻松捕获。\n\n[explorer.GetFirstNameWithNoTooltip]记载，船员们如今耗费大量时间追猎这些生物，海滩上处处洋溢着笑声与纷飞的羽毛。这些生物究竟是如何存活至今的？"
 wotd_flora_and_fauna.6.a: "正好拿来打牙祭。"
 wotd_flora_and_fauna.7.title: "渡渡鸟的末日"
 wotd_flora_and_fauna.7.desc: "[explorer.GetName]报告说，岛上那些奇特的鸟儿已消失殆尽。船员们毫无节制地追猎，直至最后一只倒下。这些鸟的肉苦涩难当，令人作呕。曾经喧嚣的岛屿，如今只剩寂寥的海滩与零散的骸骨。\n\n船员们在最后一只鸟死去前称它们为“渡渡鸟”。这个名字成了它们存在过的唯一痕迹。唉，这就是最后一只了。"
 wotd_flora_and_fauna.7.a: "总算清静了。"
 wotd_flora_and_fauna.8.title: "渡渡鸟与独角兽"
 wotd_flora_and_fauna.8.desc: "这种被当地人称为“渡渡鸟”的禽类引起了轰动。它与附近发现的所谓独角兽共同吸引着远方来客。其温顺的性情使其成为惹人怜爱的宠物，尽管它的食性颇为奇特——既拒绝肉类也不愿食用多数水果。"
 wotd_flora_and_fauna.8.a: "也许它喜欢洋葱？"
 wotd_flora_and_fauna.9.title: "糟糕的味道"
 wotd_flora_and_fauna.9.a: "没用的鸟，别管它了！"
 wotd_flora_and_fauna.9.b: "带几只回去吧，它们长得还挺可爱。"
 wotd_flora_and_fauna.10.title: "继续航行"
 wotd_flora_and_fauna.10.desc: "船员们不去打扰那些奇特的鸟儿，转而关注岛上的果树与溪流。物资储备得到补充，当启程准备工作就绪时，士气也随之高涨。\n\n船帆迎风扬起时，鸟群在灌木丛中静静注视着，却浑然不知自己终有一天只会在故事中被人铭记。"
 wotd_flora_and_fauna.10.a: "这座岛屿之外还有更多等待发现。"
 wotd_flora_and_fauna.11.title: "渡渡鸟之道"
 wotd_flora_and_fauna.11.desc: "前往[mauritius.GetName]的旅人曾说起一种奇特且对人类毫无戒备的鸟，它们漫步时既不畏惧人类也不惧怕天敌。自[discovery_country.GetAdjective]探险家[explorer.GetName]发现这种鸟类多年后，如今已无迹可寻。殖民者记载，从海外带来的动物——狗、猪、老鼠——捣毁鸟巢，捕食幼雏。短短几代鸟的时间，渡渡鸟便已绝迹。\n\n昔日令首批探险者惊奇的景象，如今只剩水手间的传说和古旧地图上的标注。这种鸟现在只活在记忆中。"
 wotd_flora_and_fauna.11.a: "一个安静生灵的死寂结局。"
 STATIC_MODIFIER_NAME_wotd_dodo_extinct_modifier: "渡渡鸟灭绝"
 STATIC_MODIFIER_DESC_wotd_dodo_extinct_modifier: "渡渡鸟曾栖息于该省份，但由于物种入侵和定居者的过度捕猎，现在已经彻底灭绝。它的消失改变了当地生态系统。"
 STATIC_MODIFIER_NAME_wotd_exotic_menagerie_modifier: "珍禽异兽"
 STATIC_MODIFIER_DESC_wotd_exotic_menagerie_modifier: "我国建起了一座异域动物园，展出来自遥远毛里求斯岛的奇异之鸟——渡渡鸟。这座动物园吸引了众多好奇的贵族和商人。"
 wotd_flora_and_fauna.12.title: "游泳的傻鸟"
 wotd_flora_and_fauna.12.desc: "在[ROOT.GetExploration.GetLocation.GetName]附近航行时，[explorer.GetName]与船员们遇见了成群浮在水上的鸟。这些不会飞的鸟类已完全适应海洋生活，它们在我们船边捕鱼。虽然它们不敢靠近，但与附近的海豚相比，它们的叫声却能传得很远。这些鸟儿实在太吵了，船员们根据驴叫般的嘶鸣，开始称它们为“驴鸟”。\n\n不过它们的蛋全年都可采集，且是难得的美味。这些鸟类过于胆小且从不护巢，因此采集过程十分顺利。或许应当对这些群岛屿提出宣称。"
 wotd_flora_and_fauna.12.a: "宣称群岛"
 wotd_flora_and_fauna.12.a.claim.tt: "因鸟的存在而宣称拥有此地。"
 wotd_flora_and_fauna.12.b: "带些回我们的宫廷，孩子们会喜欢的。"
 wotd_flora_and_fauna.12.c: "外套毛皮有新来源了……"
 STATIC_MODIFIER_NAME_wotd_exotic_penguins_modifier: "珍奇企鹅"
 STATIC_MODIFIER_DESC_wotd_exotic_penguins_modifier: "你的国家从近期的探索中抓捕数只非洲企鹅，这些独特的鸟类已成为贵族与学者们喜爱的热门景观。"
 wotd_flora_and_fauna.13.title: "迷途的丛林厨师"
 wotd_flora_and_fauna.13.desc: "穿越[ROOT.GetExploration.GetLocation.GetName]低地丛林的旅途艰辛，途中我们的厨师还失踪了，当地向导认为其被“森林民”——大猩猩掳走了。\n\n这些大型猿类独居在树冠层中，难得一见却常能听到它们的动静。部落人相信它们会说话，伤害它们会带来毁灭。[explorer.GetName]和他的船员们意见不一：一些人怀疑向导们另有所图，另一些人则认为是厨师因为发烧而迷路了。\n\n一个敌对部落主动提出帮忙猎捕据称掳走厨师的生物，但这样做可能会在当地人中引发冲突。"
 wotd_flora_and_fauna.13.a: "将厨师的失踪归咎于当地人。"
 wotd_flora_and_fauna.13.b: "或许因病走丢了。"
 wotd_flora_and_fauna.13.c: "猎杀那些“森林民”"
 STATIC_MODIFIER_NAME_wotd_rescued_cook_modifier: "获救的厨师"
 STATIC_MODIFIER_DESC_wotd_rescued_cook_modifier: "从丛林中获救的厨师已成为探险队中不可或缺的一员，其智慧和厨艺远近闻名，甚至因为这趟经历丰富了探险队的物资储备，也鼓舞了士气。"
 wotd_flora_and_fauna.14.title: "臭鸟麝雉"
 wotd_flora_and_fauna.14.desc: "这只外形奇特、色彩鲜艳的鸟儿对[explorer.GetName]的探险队毫不在意。它很难被吓走，尤其是在夜晚。队员们决定宰杀几只炖汤，结果沮丧地发现鸟肉根本无法食用。即便经过烹煮，依然散发着粪便般的恶臭，在尝试多种烹饪方法后，探险队彻底放弃了享用这种臭鸟的念头。\n\n或许这种臭味源于它以植物为食的习性？"
 wotd_flora_and_fauna.14.a: "糟糕……"
 STATIC_MODIFIER_NAME_wotd_disgusted_explorer_modifier: "士气低落的探险者"
 STATIC_MODIFIER_DESC_wotd_disgusted_explorer_modifier: "探险者对这次远征日益感到失望，尤其是在尝试烹饪麝雉失败后，新增探险队士气低落，执行任务时效率也大打折扣。"
 wotd_flora_and_fauna.17.title: "画家的心血来潮？"
 wotd_flora_and_fauna.17.desc: "多年来，我们的宫廷画师[painter_artist.GetName]一直恳求随同由王室资助的探险家[explorer.GetName]前往[ROOT.GetExploration.GetName]写生，以求精进画艺。他那爱冒险——甚至有人会说莽撞——的性子是出了名的，我们最终只好随他去，也算图个清静。在丛林中，他遇见了一只攫住他全部想象力的生物。他的日记这般写道：\n\n“瞧他那身小斑点，还有那簇状的耳朵。条纹与斑点的交错，仿佛是他奔跑时被仓促画就的。当地人与我们的队员都对他喜爱有加。甚至有只从我手上吃过东西。船长明令禁止，但我实在忍不住。我给它起名叫巴布。”\n\n[painter_artist.GetFirstNameForEditbox]后来在试图将巴布带上船时被逮了个正着。船长勒令将其留下或者卖掉。"
 wotd_flora_and_fauna.17.a: "允许豹猫巴布与画家一同回家。"
 wotd_flora_and_fauna.17.b: "把它卖掉！这是船长的命令。"
 STATIC_MODIFIER_NAME_wotd_ocelot_companion_modifier: "豹猫伙伴"
 STATIC_MODIFIER_DESC_wotd_ocelot_companion_modifier: "这位画家与一只名叫巴布的豹猫建立了深厚情谊，它常陪伴其四处游历。"
 wotd_gifted_kakapo: "赠送鸮鹦鹉"
 wotd_gifted_kakapo_desc: "[discovery_country.GetName]向[target_country.GetName]赠送了一只鸮鹦鹉作为外交姿态。"
 STATIC_MODIFIER_NAME_wotd_pet_parrot_kakapo: "宠物鸮鹦鹉"
 STATIC_MODIFIER_DESC_wotd_pet_parrot_kakapo: "你把一只鸮鹦鹉当作自己的私人鹦鹉来养。"
 wotd_flora_and_fauna.9.desc: "[explorer.GetName]写道，船员们终究没能按捺住好奇心。他们将一只怪鸟烤熟后，满心期待地围坐在锅边，准备享用美餐。然而炖菜刚端上来，光是那股气味就熏退了好几个人。凡是尝过的，都立刻吐了出来。\n\n据说这种鸟的肉质又干又柴，味道极其恶心。甚至有水手声称看见过几只这种鸟在吞石子。你不禁心想：也许那些石子还更好吃些。"
 wotd_flora_and_fauna.18.title: "盗贼狨猴"
 wotd_flora_and_fauna.18.desc: "[explorer.GetFirstNameForEditbox]眼睁睁看着营地的补给以惊人的速度减少，在搜查了所有人的随身物品却一无所获后，他依然毫无头绪。\n\n[explorer.GetName]因怀疑船员蓄意违抗而震怒，开始亲自把守仓库。虽然物资失窃有所减少，但人的精力终有极限，整日的看守不仅拖慢了[explorer.GetHisHer]的行程，更将全队的士气推向崩溃边缘。\n\n数日后，一名士兵瞥见补给堆中闪过一抹橙光，满心以为能当场擒住窃贼，他猛冲上前，却绊倒在地——真正的元凶终于现身：一群金鬃猴正有条不紊地翻捡着我们的物资；而随着他的跌倒，猴群瞬间窜入林中逃遁。当他上报所见时，[explorer.GetFirstNameForEditbox]的军官们却以“公然撒谎”为由惩罚了他。\n\n然而几天后的傍晚，猴群再次归来。这一次，它们在全队用餐时公然出现于众人眼前。营地里怨声四起，令领队们颜面尽失——必须在纪律崩溃前采取行动。"
 wotd_flora_and_fauna.18.a: "“是时候换人领导了！谁跟我一起？！”"
 DEATH_REASON_crew_mutiny: "[CHARACTER.GetHeSheFormal|U]在手下船员发动的哗变中被杀"
 DEATH_REASON_crew_mutiny_killer: "[CHARACTER.GetHeSheFormal|U]在由[SCOPE.sCharacter('killer').GetName]及其他船员发动的哗变中丧生。"
 wotd_flora_and_fauna.18.b: "[explorer.GetFirstNameForEditbox]的命令不容质疑！"
 wotd_flora_and_fauna.19.title: "词源谬误还是闹剧"
 wotd_flora_and_fauna.19.desc: "在澳大利亚海岸停留时，[explorer.GetName]派船员上岸为船上的病患射猎鸽子。船员归来后报告说，他们看到一种动物，体型如灵缇犬般大小，鼠灰色，行动迅捷。几天后，[explorer.GetFirstNameForEditbox]也看到了这些动物，于是派我们的博物学家与四名同伴上岸考察，博物学家在一封信中记录了如下内容：\n\n“走了许多英里后，我们遇到了四只同样的动物。其中两只被我的灵缇犬追逐。这些动物以长而快速的跳跃逃入高密的草丛中消失了。它们并非四肢着地行走，而是像跳鼠一样用后腿跳跃。当我们向当地人询问这些生物叫什么时，他们只回答了一个词……”\n#tooltip_label “Kangaroo”#!。"
 wotd_flora_and_fauna.19.a: "提议们船员去捕捉一只以作消遣。"
 wotd_kangaroo_chase_success_tt: "#italic 经过一番漫长而疲惫的追逐，船员们设法困住并捕获了一只幼袋鼠……虽然只成功了一会儿。#!"
 wotd_kangaroo_chase_fail_tt: "#italic 尽管竭尽全力，船员们还是没能抓住幼袋鼠，袋鼠们跳着消失在远方……好歹试过了。#!"
 wotd_flora_and_fauna.20.title: "聒噪的应和"
 wotd_flora_and_fauna.20.desc: "当探险队接近[ROOT.GetExploration.GetLocation.GetName]的一处海湾时，树冠层中挤满了白眶亮绿色的鹦鹉。船只靠岸时，[explorer.GetName]指挥船员们卸下物资，计划在岛上停留数日再启航出海。\n\n一只鹦鹉俯冲到低枝上，“当心那个木箱，里面装着价值上千八片币的财宝！”[explorer.GetFirstNameForEditbox]咧嘴笑道。#T “八片币！八片币！”#!头顶的鹦鹉尖声学舌，惊得几名船员手忙脚乱。一人失手掉落铁锤，另一人踉跄后退， “这些鸟儿竟会说话？”"
 wotd_flora_and_fauna.20.a: "说得比路易还清楚！你被雇用了，鸟儿！"
 STATIC_MODIFIER_NAME_wotd_parrot_companion_modifier: "鹦鹉伙伴"
 STATIC_MODIFIER_DESC_wotd_parrot_companion_modifier: "应和着指令的呼唤，这只鹦鹉已成为我们探险路上可靠的伙伴。"
 wotd_flora_and_fauna.21.title:0 "是魔，是虎，还是狼？"
 wotd_flora_and_fauna.21.desc:0 "[ROOT.GetExploration.GetLocation.GetName]的夜晚正变得愈发令人不安。在探险期间，[explorer.GetName]不断收到报告，称有一种奇怪的食肉动物在营地周围游荡。船员们描述这种生物长着狼一样的口鼻、短而直立的耳朵、僵硬的尾巴，以及黄褐色皮毛上带有深色条纹沿着脊背分布。\n\n虽然体型太小不足以威胁人类，但它会撕毁陷阱、洗劫食物储备，并叼走任何能捕获的小动物。就连带上岸作为补给品的羊群也未必安全。它的夜行习性令人难以追踪，而其顽固的侵扰开始阻碍我们在岛上的工作。\n如果不将这些条纹野兽驱逐，这里的进展将持续受阻。"
 wotd_flora_and_fauna.21.a: "我们的故土也曾经有狼。曾经。"
 wotd_thylacine_eradication_success_tt: "#italic 在彻底搜索该地区后，船员们成功追踪并清除了困扰此次探索的袋狼种群。#!"
 wotd_thylacine_eradication_failure_tt: "#italic 尽管竭尽全力，船员们仍未能找到并清除困扰此次探索的袋狼种群。#!"
 wotd_flora_and_fauna.21.b: "畜牧？哈！往深处挖，贪婪地挖吧。"
 wotd_flora_and_fauna.21.c: "倒要看看它们能不能放倒一头牛……"
 wotd_flora_and_fauna.22.title: "最后的恐鸟"
 wotd_flora_and_fauna.22.desc: "[explorer.GetName]与船员们抵达这片海岸，踏入这片曾食物丰饶、猎物遍地的土地。当毛利人最初在此定居时，他们遇到了一种被称为“特库拉”的红色巨鸟。这些高大而不会飞行的生物，曾为人类提供用长矛、陷阱和坑穴猎取的肉食。它们与哈斯特巨鹰共享这座岛屿，但沿海部落几乎无需担忧危险，因为这种鸟数量众多且十分机警。\n\n如今，仅有少数恐鸟幸存于偏远山谷。仍狩猎它们的部落也节制有度，目击记录日渐稀少。有人带来恐鸟骨头和羽毛制成的小饰物交易，但大多数村民谈起这些鸟时都带着谨慎，形容它们脆弱且濒临灭绝。\n\n此次航行本为测绘未知的南方大陆与研究麦哲伦星云，然而关于红色巨鸟的传说激起了大家的好奇心。绘图师们力劝[explorer.GetName]深入内陆，前往最后的恐鸟可能隐匿的山谷探察。"
 wotd_flora_and_fauna.22.a: "我们只是来补给的。日落时分就起航。"
 wotd_flora_and_fauna.22.b: "你刚才说……巨型鸟类？"
 wotd_flora_and_fauna.23.title: "猎手与猎物"
 wotd_flora_and_fauna.23.desc: "探险队向内陆推进，沿着村民描述的狭窄小径前行。森林沿着长坡向上延伸，林间空地不时出现——泥土被翻动过，灌木丛被某种庞然大物压弯了腰。\n\n在下一道山谷的幽静凹地里，一只恐鸟正在进食，它身形高大，背脊宽阔，专注地埋头于灌木丛中。绘图师还没来得及勾勒它的形态，一道黑影便掠过空地。巨鹰猛扑向恐鸟，羽毛四散飞舞。这场搏斗激烈而有种残忍的精准。\n\n[explorer.GetName]示意队员保持静止。村民们曾提起过这种巨大的猛禽，但亲眼目睹才真正证实了这些内陆山谷潜藏的危险。探险队如何应对，将决定此事是被详尽记录，还是仅作为一则警示流传下去。"
 wotd_flora_and_fauna.23.a: "观察捕猎过程并记录细节"
 wotd_flora_and_fauna.23.b: "尝试驱赶巨鹰，拯救恐鸟"
 STATIC_MODIFIER_NAME_wotd_moa_science_modifier: "恐鸟野外观察记录"
 STATIC_MODIFIER_DESC_wotd_moa_science_modifier: "通过对恐鸟及其与捕食者互动的仔细观察，我们的宫廷获得了关于这种生物习性以及内陆地区状况的新实用知识。"
 wotd_moa_hunt_success_desc: "[explorer.GetName]介入了这场捕猎，成功赶走了哈斯特巨鹰，救下了恐鸟。"
 wotd_moa_hunt_fail_desc: "[explorer.GetName]出手干预，但哈斯特巨鹰仍成功完成了捕猎，杀死了恐鸟，并在此过程中使[explorer.GetName]受了伤。"
 brave_explorer: "勇敢的探险家"
 desc_brave_explorer: "这位探险家以无畏精神和冒险天性著称，经常冒险进入未知领域，直面危险。"
 brave_explorer_die_desc: "[CHARACTER.GetHerHis|U]的姓名将永远铭刻于[CHARACTER.GetSheHe]勇敢探索过的无数海岸、森林、丛林与群山之间。"
 wotd_flora_and_fauna.24.title: "婆罗洲侏儒象"
 wotd_flora_and_fauna.24.desc: "在穿越婆罗洲热带雨林时，[explorer.GetName]和船员们遇到了一群矮象。这些脸庞似幼象的生物有着超大号的耳朵、圆鼓鼓的肚子，以及长到行走时拖在地上的尾巴。它们比我们所知的大型亚洲象要温顺得多。\n\n它们的样貌表明，其祖先可能是爪哇罗阇赠予苏禄罗阇的驯化象。这类馈赠在当时地位崇高的统治者之间十分普遍，动物常经海路运送——尽管这些礼物有时带来的负担多过荣耀。\n\n这种习俗现在已经式微。爪哇再也没有大象的踪迹，而运送全尺寸的亚洲象也从未引起我们商人的兴趣。但这些小型变种，或许能成为宝贵的外交工具。"
 wotd_flora_and_fauna.24.a: "迎合东亚人的情怀。"
 wotd_flora_and_fauna.24.b: "我们在欧洲的朋友或许会欣赏这些礼物。"
 wotd_gifted_borneo_pygmy_elephant: "赠送婆罗洲侏儒象"
 wotd_gifted_borneo_pygmy_elephant_desc: "[discovery_country.GetName]向[target_country.GetName]赠送了一头婆罗洲侏儒象作为外交姿态。"
 wotd_flora_and_fauna.25.title: "新大陆河狸"
 wotd_flora_and_fauna.25.desc: "在新大陆的河流中航行时，[explorer.GetName]目睹了一幅奇景：一只体型庞大、勤勉的啮齿动物正忙于修筑水坝。他原以为河狸不过是欧洲水域中一种日渐稀少的古老生物，可眼前它们却在美洲的森林中生机勃勃。\n\n[explorer.GetFirstNameWithNoTooltip]仔细观察，注意到了其中的差异。美洲河狸体型更大，尾巴更宽，皮毛更厚、颜色更深；它们构筑巢穴的技艺尤为惊人，能横跨整个河岸。在这个过程中，它们重塑了地貌，创造出遍布鱼群与水禽的池塘与水道。"
 wotd_flora_and_fauna.25.a: "研究它们的筑坝技术。"
 wotd_beaver_comforting.tt: "#italic 在异域漂泊数月后，这种家乡的生灵让船员们倍感亲切。#!"
 wotd_flora_and_fauna.26.title: "河狸的最后手段"
 wotd_flora_and_fauna.26.desc: "我们的动物寓言集中有记载，河狸曾因其睾丸而备受追捧，人们相信其中蕴含多种药用价值，河狸香便是一例。故事称，河狸深知猎人珍视此物，便想出了一个狡猾的脱身之法。倘若它发现自己被追捕且无法逃脱，便会咬下自己的睾丸扔在地上，好让猎人取得战利品，放弃追逐。故事还说，如果再次被猎，河狸会停下脚步，展示自己已无物可献，从而再次幸免于难。\n\n虽然这个故事是虚构的，但它令人想起那场几乎使欧洲河狸灭绝的捕猎。它们曾是我们河流边熟悉的景象，如今却已罕见。尽管贸易已被禁止，河狸香依然价值不菲。随着对古老文献研究的重新兴起，蓖麻籽重新受到关注，其油脂的许多用途正与昔日河狸香的功效相同。有了这种替代品，美洲河狸或许能被重新引入我们的水域，为修复河流与振兴衰退的鱼类种群带来希望。"
 wotd_flora_and_fauna.26.a: "将河狸重新引入我们的水域。"
 wotd_flora_and_fauna.26.b: "继续猎杀仅存的欧洲河狸。"
 STATIC_MODIFIER_NAME_wotd_beaver_reintroduction_modifier: "重新引入河狸"
 STATIC_MODIFIER_DESC_wotd_beaver_reintroduction_modifier: "为恢复自然生态系统，我们开始在河流水域重新引入河狸。它们的筑坝活动有望改善水质，促进当地野生动植物的繁衍生息。"
 STATIC_MODIFIER_NAME_wotd_focusing_on_the_classics_modifier: "研究古籍"
 STATIC_MODIFIER_DESC_wotd_focusing_on_the_classics_modifier: "对古典文献的重新关注，尤其是老普林尼的《自然史》，为我们理解自然疗法和稀有物质的替代品提供了指引。这种学术研究方法在强调传统知识的同时，也促进了审慎的创新。"
 wotd_flora_and_fauna.27.title: "红色的吉祥饰物"
 wotd_flora_and_fauna.27.desc: "在[ROOT.GetExploration.GetLocation.GetName]雾气弥漫的竹林深处，[explorer.GetName]看见一只“火狐”拨开面前的枝叶，显露出身影。\n\n这头野兽的重要性在下方山谷中变得清晰起来。当地婚礼的鼓声擂动，新郎将一张鞣制好的红熊猫皮紧紧抱在胸前，视作神圣的护身符。然而这场景却有一种奇特的并置。我们被告知这是一项悠久的习俗，而外交官们站在宾客之中，笨拙地调整着自己皮毛头饰，试图模仿这些南方风俗……"
 wotd_flora_and_fauna.27.a: "多么鲜活的文化。"
 wotd_flora_and_fauna.27.b: "观看婚礼。"
 wotd_attended_red_panda_wedding: "参加了红熊猫婚礼"
 wotd_attended_red_panda_wedding_desc: "[discovery_country.GetName]的探险家参加了一场当地婚礼，红熊猫在那里被尊为幸运与繁荣的象征。"
 wotd_flora_and_fauna.28.title: "肆虐的山魈群"
 wotd_flora_and_fauna.28.desc: "继续深入[ROOT.GetExploration.GetLocation.GetName]，[explorer.GetName]与[explorer.GetHisHer]的队伍远远望见成千上万的猴子正涌向一个茅草屋村落的外围。\n\n船员们保持距离观察，发现猴群的前锋正在袭击一群当地村民。几个小时后，兽群终于散去，队员们靠近村民，看到成排的庄稼在这场所谓#Italic 山魈#!的袭击中被连根拔起、毁坏殆尽。\n\n面对如此庞大、且对农业发展充满敌意的游荡动物群体，如果我们考虑在此建立殖民地，恐怕很难对付这些野兽。"
 wotd_flora_and_fauna.28.a: "暂时避开这片土地"
 wotd_flora_and_fauna.29.title: "此处有龙"
 wotd_flora_and_fauna.29.desc: "在探索[ROOT.GetExploration.GetLocation.GetName]的火山群岛时，[explorer.GetName]和船员们偶然听到了关于这片密林中栖息着巨大蜥蜴的传闻。这些庞大的爬行动物可长达三米，拥有强壮的尾巴、锋利的爪子，以及令人难以置信的锯齿状牙齿。\n\n当地人对这些生物怀着深深的敬畏，流传着关于“龙之公主”的古老传说：她诞下一对双生子，一人一龙，并教导子民与这些巨兽和谐共处。“莫要杀她，那是你的姐妹，”长者如此告诫，解释了为何他们从不猎杀这些巨蜥。\n\n当[explorer.GetFirstNameWithNoTooltip]望着这些活生生的“龙”潜行于灌木丛中时，他不禁沉思：我们的土地上是否也曾徘徊过这样的生物？或许威尔士的红龙、撒克逊传说中的双足飞龙，以及骑士们斩杀过的巨兽并非全然虚构。在那些被遗忘的远古迷雾中，我们的祖先，或许也曾面对过如此怪物。"
 wotd_flora_and_fauna.29.a.default: "好奇，真是好奇。"
 wotd_flora_and_fauna.29.a.dragon_coa: "我们将夺取那些岛屿！以匹配我们的纹章！"
 wotd_flora_and_fauna.29.a.claim.tt: "此处有龙"
 wotd_flora_and_fauna.30.title: "长胡子的蜥蜴"
 wotd_flora_and_fauna.30.desc: "[explorer.GetName]深入[ROOT.GetExploration.GetLocation.GetName]干旱腹地的途中，偶遇一番奇特景象：一只长着蓬松尖刺状“胡须”的蜥蜴，在受威胁时会将其鼓胀开来。这种被当地人称为“中部胡子龙”的生物是伪装高手，能完美融入嶙峋岩地。\n\n队员们着迷地观察这只蜥蜴进行一连串点头与摆臂动作——这是它们族群独特的交流方式。[explorer.GetFirstNameWithNoTooltip]指出，这些行为可能是划定领地或求偶的方式。\n\n该生物卓越的适应力与社会互动行为令[explorer.GetName]深感着迷，开始考虑进一步研究与记录的可能性。"
 wotd_flora_and_fauna.30.a: "适应性演化的极致体现"