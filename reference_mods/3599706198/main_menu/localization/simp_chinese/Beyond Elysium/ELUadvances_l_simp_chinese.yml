l_simp_chinese:
 elu_heart_of_hellenism_advance: "希腊文明之心"
 elu_heart_of_hellenism_advance_desc: "新罗马已成为希腊文化的新中心，这里的土地尚未开化，正待我们的人民去征服。"
 elu_legionaries_advance: "罗马元老院和人民！"
 elu_legionaries_advance_desc: "我们的战斗口号长久以来意味着“元老院与罗马人民在我们心中”。如今我们已在这片新土地上扎根，我们将以生命捍卫他们，重铸一支前所未有的军团。"
 elu_roman_road_advance: "前进"
 elu_roman_road_advance_desc: "道路乃我伟大民族之血脉，保障安全快捷的通行是国家应尽之责。"
 elu_reformed_legionaries_advance: "改革军团"
 elu_reformed_legionaries_advance_desc: "在我们开始探索这片新土地的过程中，我们吸取了严酷的军事教训，必须以此改革我们的常备军团。"
 elu_gov_bureaucracy_law_advance: "文官职位"
 elu_gov_bureaucracy_law_advance_desc: "长久以来，传统观念认为维护法律是每位公民的公民义务。若在军队或政府中服役，则责任加倍。这项法律将把这一责任正式载入法典。"
 elu_supply_advance: "辎重"
 elu_supply_advance_desc: "由主要是骡子的驮畜、马车和仆役组成，负责运输帐篷、装备、额外食物以及攻城器械。"
 elu_roman_peasant_uplift_advance: "颂扬民众"
 elu_roman_peasant_uplift_advance_desc: "人民由我们引领，摆脱贫困，成为公民。每位公民的职责是筑起基石，帮助后来者也能攀登阶梯。"
 roman_policy: "人民法"
 roman_policy_desc: "定居于这片新土地后，我们摒弃了传统的阶级观念，融合为统一的罗马民族。这并不意味着各族群间的差异完全消失，但对国家而言，每位公民的人格尊严皆平等。他们理应获得同等对待。"
 elu_legal_code_advance: "人民法"
 elu_legal_code_advance_desc: "定居于这片新土地后，我们摒弃了传统的阶级观念，融合为统一的罗马民族。这并不意味着各族群间的差异完全消失，但对国家而言，每位公民的人格尊严皆平等。他们理应获得同等对待。"