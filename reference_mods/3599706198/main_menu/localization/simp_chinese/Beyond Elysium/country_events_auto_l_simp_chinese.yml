 COUNTRY_EVENTS_AUTO_FLAVOR_ELU_1_DESC:0 "热切的探险者们偶然发现了一艘偏离航线的贸易船，罗马水手们对商人们保持警惕，经过长时间讨论该如何应对。与商人交谈后，他们意识到帝国早在几个世纪前就已逐渐衰落，而如今残留的所谓罗马不过是昔日辉煌的苍白模仿。这促使他们决定扣押这艘船并将其带回港口。现在，轮到我们决定这些人的命运了。"
 COUNTRY_EVENTS_AUTO_FLAVOR_ELU_1_OUTCOMES:0 "※历史抉择：放他们走\n※备选方案：他们必须被迫与我们同住\n※备选方案：杀死他们"
 COUNTRY_EVENTS_AUTO_FLAVOR_ELU_1_REQUIREMENTS:0 "历史窗口期：1375年1月1日 → 1600年1月1日，月度触发概率：100%\n\n解读要求：\n※旧大陆与新大陆之间的海域必须由非罗马势力发现。"
