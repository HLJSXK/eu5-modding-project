 COUNTRY_EVENTS_AUTO_FLAVOR_ELU_1_TITLE:0 "旧世界的来信"
 COUNTRY_EVENTS_AUTO_FLAVOR_ELU_2_DESC:0 "如今，我们已在新大陆掌握了自己的命运，理应着手确定军队的编制与征兵政策。无论是推行更为严格的训练与征兵标准，还是放宽门槛、敞开大门以吸纳更多兵员，都有其充分的理由；但眼下亟需作出抉择：为了军团的崭新未来，我们究竟要打造一支怎样的军队？"
 COUNTRY_EVENTS_AUTO_FLAVOR_ELU_2_OUTCOMES:0 "※历史抉择：采用精英训练。  \n※备选方案：依赖大规模军队政策。"
 COUNTRY_EVENTS_AUTO_FLAVOR_ELU_2_REQUIREMENTS:0 "历史窗口期：1300年1月1日→1600年1月1日\n每月触发概率：5%\n\n解读要求：\n※必须拥有征兵革新与罗马崛起局势。"
