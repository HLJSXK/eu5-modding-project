 a_reformed_roman_legionaries_desc: "一支由训练有素的重甲公民士兵组成的强大军团，构成了我们步兵部队的核心。他们配备短剑、匕首以及两支标枪，身披铠甲，在高大的盾牌掩护下，令敌人闻风丧胆。这支坚不可摧的人墙，必将碾碎一切企图践踏我们民族的敌人，为了元老院与罗马人民。"