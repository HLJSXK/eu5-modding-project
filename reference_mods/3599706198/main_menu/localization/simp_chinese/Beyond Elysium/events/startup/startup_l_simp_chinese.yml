l_simp_chinese:
 start_up.1.title: "罗马的极乐净土"
 start_up.1.desc: "就在戴克里先统治前夕，经历了五十年的动荡危机后，许多罗马公民将帝国的分裂、持续的外族入侵威胁，以及来自东哥特人、西哥特人、法兰克人等部族的实际劫掠，视为永无止境的灾厄。这使许多人开始恐惧帝国的终结，以及他们生活方式的消亡。不愿随帝国沉沦的一小群人包括元老、贵族、农民甚至禁卫军成员逐渐聚集起来，密谋策划一场大胆的逃亡，前往帝国西陲。随着越来越多人在风暴中寻求庇护，这支队伍日益壮大，最终达到数千之众。他们原本计划抵达伊比利亚半岛的现代波尔图地区，但当时正值罗马气候适宜期（亦称罗马温暖期），异常猛烈的热带风暴迫使船队漂向远海。\n\n历经近三个月的航行，他们最终在切萨皮克湾以北沿岸登陆。幸存者因南瑟蒙德得天独厚的天然港湾条件，在此建立了聚居地。在这片新土地上，罗马人通过与北方诸多部落贸易迅速站稳脚跟，数十年间从几千人发展壮大。尽管饥荒、战争与疫病仍不断侵袭这个聚居地，但他们的冒险精神始终不灭。如今时近1337年，埃律西昂城熙攘繁华、人满为患，新一代拓荒者已整装待发，准备深入蛮荒之地开疆拓土。"
 start_up.1.a: "罗马治下的和平"