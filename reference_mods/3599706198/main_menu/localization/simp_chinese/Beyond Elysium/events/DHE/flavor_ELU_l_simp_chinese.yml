l_simp_chinese:
 flavor_elu.1.title: "来自旧大陆的消息"
 flavor_elu.1.desc: "急切探索的水手们意外发现一艘偏离航道的商船，[ROOT.GetCountry.GetAdjective]船员们对这些商人心存警惕，经过长时间商议后决定与其交涉。通过与商人对话，他们意识到那个帝国早在数个世纪前就已逐渐衰亡，而如今残存的罗马不过是昔日辉煌的苍白倒影。这最终促使他们决定扣押该船并将其带回港口。现在轮到我们决定该如何处置这些人了。"
 flavor_elu.1.a: "放他们走"
 flavor_elu.1.b: "他们必须和我们一起生活在这里。"
 flavor_elu.1.c: "杀掉他们"
 flavor_elu.2.title: "军团的前景"
 flavor_elu.2.desc: "既然我们已是[ShowContinentName('america')]命运的主宰，就应当决定军队的组成与征募方式。对于[ShowPolicyName('elite_training_policy')]和[ShowPolicyName('levee_en_masse_policy')]双方都有充分理由，但此刻必须为军团的新未来确定我们追求的军队类型。"
 flavor_elu.2.a: "采用[ShowPolicyNameWithNoTooltip('elite_training_policy')]。"
 flavor_elu.2.b: "依靠[ShowPolicyNameWithNoTooltip('levee_en_masse_policy')]。"