l_simp_chinese:
 rise_of_the_romans: "罗马复兴"
 rise_of_the_romans_desc: "诞生于垂死罗马帝国灰烬中的[GetCountry('ELU').GetLongName]，最初被更强大的本土邻国所掩盖。然而，这些新罗马人的远见与雄心将被证明影响深远——他们最近踏上了扩张与巩固的道路，在这片四分五裂的动荡疆域中开辟出自己的天地。\n\n最初的凯撒将头衔转化为姓氏，她的继任者们巧妙地利用了区域内普遍存在的混乱与分裂。随着每一次胜利，这个罗马公国日益强大，吸引了本土战士，培养了学者，并孕育着渴望参与这股崛起势力的雄心勃勃之辈。他们通过战略联姻、精明结盟与军事才能，逐步将一个谦逊小国转变为正在成型的帝国。"
 rise_of_the_romans.1.title: "罗马复兴"
 rise_of_the_romans.1.desc: "诞生于垂死罗马帝国灰烬中的[GetCountry('ELU').GetLongName]，最初被更强大的本土邻国所掩盖。然而，这些新罗马人的远见与雄心将被证明影响深远——他们最近踏上了扩张与巩固的道路，在这片四分五裂的动荡疆域中开辟出自己的天地。\n\n最初的凯撒将头衔转化为姓氏，她的继任者们巧妙地利用了区域内普遍存在的混乱与分裂。随着每一次胜利，这个罗马公国日益强大，吸引了本土战士，培养了学者，并孕育着渴望参与这股崛起势力的雄心勃勃之辈。他们通过战略联姻、精明结盟与军事才能，逐步将一个谦逊小国转变为正在成型的帝国。"
 rise_of_the_romans.1.a: "他们是帝国的英雄！"
 roman_colonization_efforts: "开始殖民努力"
 roman_colonization_efforts_desc: "我们必须开拓进取，扩大疆域，以确保我们人民的持续繁荣。"
 roman_progress: "罗马扩张主义"
 ROMAN_DOMINANCE: "$roman_progress$"
 ROMAN_PROGRESS_GROWTH_TOOLTIP_TITLE: "$roman_progress$提升"
 ROMAN_PROGRESS_GROWTH_TITLE: "$roman_progress$"
 ROMAN_PROGRESS_GROWTH_TOOLTIP: "$roman_progress$衡量了罗马人民日益增长的不安情绪。派遣殖民者以满足罗马人对探索与征服的渴望。"
 ROMAN_PROGRESS_REQUIRED_PERCENT: "$roman_progress$必须超过20%才能派遣殖民者"