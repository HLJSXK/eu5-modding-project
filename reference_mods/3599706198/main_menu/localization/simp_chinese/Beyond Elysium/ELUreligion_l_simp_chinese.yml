l_simp_chinese:
 worship_zeus: "宙斯"
 worship_zeus_desc: "希腊神话中的主神，祂是古希腊宗教与神话中的天空与雷电之神，作为众神之王统治着奥林匹斯山。宙斯是克洛诺斯与瑞亚之子，虽是其兄弟姐妹中最晚出生者，但有时被视为长子，因为其他兄弟姐妹需要从克洛诺斯腹中吐出。他被尊为「天父」，既是众神之首又为诸神分派职司。即便是非其亲生的神祇也尊称祂为父亲，所有神明在祂面前皆需起身致意。"
 worship_poseidon: "波塞冬"
 worship_poseidon_desc: "在古希腊宗教和神话中，波塞冬是十二位奥林匹斯神之一，掌管海洋、风暴、地震和马匹。祂是航海者的保护神，也是许多希腊城市和殖民地的守护者。在前奥林匹斯时代的青铜时代希腊，波塞冬在皮洛斯和底比斯被尊为至高神祇，神话中他被称为“大地震撼者”。在与世隔绝的阿卡迪亚神话中，祂与得墨忒尔和德斯波伊娜有关，并被尊为马和水之神。"
 worship_hades: "哈迪斯"
 worship_hades_desc: "哈迪斯是死神和财富之神，冥界的国王，祂的名字与冥界同义。哈迪斯是克洛诺斯和瑞亚的长子，尽管这也使他成为最后一个被父亲吐出来的儿子，与其兄弟宙斯和波塞冬击败、推翻并取代了祂们父亲那一代的神祇——提坦神，并共同宣称对宇宙的主权。哈迪斯获得了冥界，宙斯获得了天空，波塞冬获得了海洋，而大地则一直属于盖亚，三者可以同时拥有。"