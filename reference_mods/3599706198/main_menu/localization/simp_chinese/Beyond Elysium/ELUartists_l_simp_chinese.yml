l_simp_chinese:
 colosseum_of_nansemond: "$ORIGIN$斗兽场"
 colosseum_of_nansemond_desc: "公元1021年在提图斯·凯撒的主持下完成的楠西蒙德斗兽场是罗马飞地最宏伟的圆形剧场。它可以容纳多达5000名观众观看角斗士战斗、公共表演和模拟军队战斗。它由混凝土和石料建造而成，是罗马工程技术和社会组织的伟大典范。它的建造是为了模仿原版斗兽场，但规模较小且更加现代化。"
 statue_of_caesar: "凯撒雕像"
 statue_of_caesar_desc: "这座雕像建于公元751至789年间，坐落于楠西蒙德最大的石料地基之上，用以纪念这片新土地上的首位凯撒，他后来成为后世统治者的守护神。雕像由建筑师马库斯和卡西乌斯设计，在雕塑家科妮莉亚的监督下完成，其设计遵循古典罗马建筑的理念。雕像的比例和雕刻装饰既体现了市民的自豪感，也表达了对带领他们走出黑暗的领袖近乎宗教般的虔诚。在中世纪后期，这里既是举行加冕典礼的场所，也是疲惫或患病之人的避难所。"