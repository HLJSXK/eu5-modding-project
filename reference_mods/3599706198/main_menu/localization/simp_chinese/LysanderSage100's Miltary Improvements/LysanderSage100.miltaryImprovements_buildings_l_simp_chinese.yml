l_simp_chinese:
 lysandersage100s_noble_country_manor: "贵族乡村庄园"
 lysandersage100s_noble_country_manor_desc: "贵族以与普通民众保持距离并自视甚高为荣。因此，他们喜欢将宅邸建在远离主要城镇区域的地方，但这些居所依然会建造得宏伟华丽、装饰奢华。贵族们积累了大量财富和渴望保护的资产，故而往往拥有私人卫队，甚至从当地征召民众，组建起堪比正规军的部队。"
 lysandersage100s_nobles_townhouse: "贵族联排庄园"
 lysandersage100s_nobles_townhouse_desc: "贵族以与平民隔绝并自视甚高为荣。因此，他们乐于将宅邸建于远离主要城镇区域之处，而且会修建得宏伟壮观、装饰奢华。"
 lysandersage100s_town_militia: "集镇民兵组织"
 lysandersage100s_town_militia_desc: "城镇民兵训练的集合地点。"
 lysandersage100s_suburban_bailiff: "城镇执法官"
 lysandersage100s_suburban_bailiff_desc: "任由民众自行其是只会滋生邪恶与懒惰。因此，国家治理必须通过地方代表来实施，由他们负责维持每个定居点的法律与秩序。"
 lysandersage100s_castle_urban_walls: "城墙"
 lysandersage100s_castle_urban_walls_desc: "早期城墙"
 lysandersage100s_bastion_urban_walls: "堡垒外围工事"
 lysandersage100s_bastion_urban_walls_desc: "堡垒扩建从而环绕城市。"
 lysandersage100s_star_fort_urban_walls: "星形要塞扩建"
 lysandersage100s_star_fort_urban_walls_desc: "星形要塞建筑群的延伸部分环绕着整座城市。"
 lysandersage100s_fortress_urban_walls: "堡垒防御网络"
 lysandersage100s_fortress_urban_walls_desc: "堡垒延伸将城市完全包围起来。"