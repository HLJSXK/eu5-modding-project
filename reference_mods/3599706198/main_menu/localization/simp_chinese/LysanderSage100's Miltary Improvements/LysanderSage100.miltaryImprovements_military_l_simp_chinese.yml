l_simp_chinese:
 a_feudal_horseman_levy: "征召骑手"
 a_feudal_horseman_levy_desc: "骑在快马上的轻装战士，$a_feudal_horseman_levy$队伍具备骚扰、冲锋和追击所需的机动性。"
 a_cavalrymen_levy: "征召骑兵"
 a_crossbowmen_levy: "征召弩手"
 a_crossbowmen_levy_desc: "$a_crossbowmen_levy$是一种远程火力单位，依靠弩的强大威力进行攻击。虽然装填速度较慢，但弩的杀伤力远超普通投射武器。"
 a_lancers_levy: "征召枪骑兵"
 a_lancers_levy_desc: "这些装备长矛的强大骑兵，用来突破敌方防线并摧毁敌军的有生力量。"
 a_matchlock_levy: "长矛火枪征召兵"
 a_matchlock_levy_desc: "火绳枪的发展使得用火药武器武装大量士兵成为可能，这在中世纪是不可能的。"
 levy_a_flintlock_levy: "黑火药征召兵"
 levy_a_flintlock_levy_desc: "在15世纪末的意大利战争期间，一种新型的战争形式得以发展。在中世纪晚期，一方面，以火绳枪和滑膛枪为主的便携式火器得以发展；一方面，长枪兵取代了短兵器步兵，这种擅于抵抗重骑兵冲锋的兵种被广泛使用。士兵们现在采取了一种新的阵型，即长枪兵排列方阵，火枪手在阵型两翼和正前方分散射击，并在敌方逼近时退回方阵内或方阵后寻求掩护，以防军阵进入近距离搏斗。这种新型军阵被称为“长枪与射击方阵”，首先被德意志国土佣仆和西班牙大方阵所青睐，并很快被其他军队所采用。这种方阵统治了欧陆战场将近两个世纪，直到18世纪被装配新型燧发火枪和刺刀的线列步兵阵型所取代。"
 a_heavy_lancers_levy: "征召重型枪骑兵"
 a_heavy_lancers_levy_desc: "$a_heavy_lancers_levy$是最具冲击力的骑兵类型，全身披甲并配备精良的长矛。他们的冲锋能够彻底打乱敌方阵型，同时还能在远距离抵御敌方火力。"
 a_order_knights_levy: "$a_order_knights$"
 a_order_knights_levy_desc: "$a_order_knights_desc$"
 a_cavalrymen_levy_desc: "$a_cavalrymen_levy$是轻骑兵，通常装备远程武器，用于袭扰敌方阵线。必要时，他们也能发起近战冲锋。"
 a_order_knights_2_levy: "$a_order_knights_2$"
 a_order_knights_2_levy_desc: "$a_order_knights_2_desc$"