l_simp_chinese:
 laborers_estate: "劳工"
 laborers_estate_desc: "产业工人在近代初期规模尚小，但随着时间推移，其重要性将超越农民阶层。"
 laborers_estate_french: "工人"
 STATIC_MODIFIER_NAME_laborers_estate_less_tax_burden: "对$laborers_estate$减税"
 expand_food_stockpiles_laborer: "扩大食物储备"
 expand_food_stockpiles_laborer_desc: "我国人民正就粮食短缺的急迫问题向我们请愿。我们应该尝试扩大我们的[ShowBuildingTypeName('granary')]网络，从而防止将来再出现同样的问题。"
 expand_officer_lists_laborer: "扩编军官团"
 expand_officer_lists_laborer_desc: "在军方高层提拔有识之士是确保领导有能的必由之路。"
 sponsor_conscription_center_laborer: "扩建$conscription_center$设施"
 sponsor_conscription_center_laborer_desc: "$finance_the_armory_desc$"
 sponsor_regimental_camp_laborer: "扩建$regimental_camp$设施"
 sponsor_regimental_camp_laborer_desc: "$finance_the_armory_desc$"
 sponsor_training_fields_laborer: "扩建$training_fields$设施"
 sponsor_training_fields_laborer_desc: "$finance_the_armory_desc$"
 expand_gathering_operations_laborer: "扩大采集产业"
 expand_gathering_operations_laborer_desc: "我们应该扩大我们的采集和收集业务，以满足这些商品在建设和维护我们更广泛的经济中的需求。"
 sponsor_urban_development_laborer: "开发内陆"
 sponsor_urban_development_laborer_desc: "我们不应该忽视内陆地区，而应该予以相应开发。"
 promote_laborers_member_laborer: "提拔市民成员"
 promote_laborers_member_laborer_desc: "作为商会和行会成员的劳工对我国至关重要。我们应该将有能之士引荐进入我国政府。"
 balance_the_budget_laborer: "平衡预算"
 balance_the_budget_laborer_desc: "沉重的财政危机问题高悬在我国人民头顶，这亟需尽快解决。"
 expand_mining_operations_laborer: "扩大采矿作业"
 expand_mining_operations_laborer_desc: "采矿业可以在我们的经济中发挥重要作用，但目前的经营状况并不令人满意。"
 grant_city_rights_laborer: "授予城市权"
 grant_city_rights_laborer_desc: "为了维持领土的繁荣，我们需要扩大城市地区的权利，授予更多城市权。"
 promote_urbanization_laborer: "促进城市化"
 promote_urbanization_laborer_desc: "显然，发展的道路在于促进我们主要城镇的城市化，以此作为扩大我们权力基础的一种手段。"
 gravel_road_development_laborer: "$gravel_road_development$"
 gravel_road_development_laborer_desc: "$gravel_road_development_desc$"
 paved_road_development_laborer: "$paved_road_development$"
 paved_road_development_laborer_desc: "$gravel_road_development_desc$"
 modern_road_development_laborer: "扩展$modern_road$网络"
 modern_road_development_laborer_desc: "$gravel_road_development_desc$"
 railroad_development_laborer: "扩展$railroad$网络"
 railroad_development_laborer_desc: "$gravel_road_development_desc$"
 MODIFIER_TYPE_NAME_laborers_estate_max_tax: "$laborers_estate$最高税率"
 MODIFIER_TYPE_DESC_laborers_estate_max_tax: "这影响可以向$laborers_estate$征收的[maximum_tax|e]。"
 MODIFIER_TYPE_NAME_laborers_estate_levy_size: "这影响来自$laborers_estate$的[army_levies|e]和[navy_levies|e]的规模。"
 laborers_represented_in_parliament: "议会代表权"
 laborers_represented_in_parliament_desc: "允许我国下层民众进入主要议会，将赋予[ShowEstateTypeName('laborers_estate')]发言权，并为他们争取更多权利。"
 laborers_free_peasantry: "平民迁徙权"
 laborers_free_peasantry_desc: "人民是国家最宝贵的财富。没有他们，国家将笼罩在动荡与饥荒中。然而，国家的精英们却把他们视为私产；有人提出，是时候结束将农民拘束在土地上的不公了。\n通过赋予民众自由流动性，他们的命运再次掌握在自己手中，允许他们离开前主人的土地，迁往新的、更好的沃土。"
 laborers_fewer_levies: "减少征召义务"
 laborers_fewer_levies_desc: "[ShowEstateTypeName('laborers_estate')]是我们国家的命脉。他们喂饱我们的人民，制造我们的建筑材料，为我们的[ShowEstateTypeName('laborers_estate')]提供原料。\n虽然战争会给我们的国家带来巨大的困难，但如果我们想避免战后的饥荒和经济崩溃，就必须让大部分[ShowEstateTypeName('laborers_estate')]远离战火。"
 laborers_allowed_weapons_privilege: "民兵"
 laborers_allowed_weapons_privilege_desc: "普通民众被允许保留他们的武器，并在受征召时携带用于战斗。这增加了市场对武器的需求。"
 laborers_no_labor_sunday: "周日休息"
 laborers_no_labor_sunday_desc: "最好遵循教[ShowReligiousGroupName('christian_group')]的教导，让农奴和农民在周日这天休息，作为虔诚和怜悯的象征。"
 laborers_access_to_royal_and_ecclesiastical_courts: "宫廷和教会法庭上诉权"
 laborers_access_to_royal_and_ecclesiastical_courts_desc: "为不幸者提供法律代表是一个公正和平衡的社会的重要方面。因此，公共法庭和宗教法庭应尽可能公平地处理[ShowEstateTypeName('peasants_estate')]和精英之间的法律纠纷。"
 laborers_in_administration: "平民参政"
 laborers_in_administration_desc: "通过吸纳[ShowEstateTypeName('peasants_estate')]中最具才能的成员，我们能够优化并扩展行政管理的覆盖范围，将其深入至领土的偏远地区。"
 laborers_autonomous_villages: "村社自治"
 laborers_autonomous_villages_desc: "在我国的农村聚落流传着“王法不进村”的俗语。我们聚居地的人们自行组织管理，不受国家中央集权的管辖。"
 laborers_guild_investments: "行会产业注资"
 laborers_guild_investments_desc: "行会已批准部分资金用于优化生产流程。虽然多数尝试可能以失败告终，但只要其中几个项目能取得突破性进展，就足以革新我们的资本运作模式。"
 laborers_factories_privilege: "王室工厂"
 laborers_factories_privilege_desc: "王室工厂是由国家资助但私人所有的企业，享有王室特许权并接受官方监督，在政府批准下运营以促进国内工业发展，同时保持商业自主性。"
 laborers_formal_guilds: "承认行会正式地位"
 laborers_formal_guilds_desc: "在我国历史上，商人的组织往往以商会和友商的形式松散存在。然而，我们可以通过使他们正式参与一个中央组织、官方认可的总商会，从而安抚我们市场上的巨商。这一特权无疑会对我们的外交和国内政策产生影响。"
 laborers_building_rights: "建筑权"
 laborers_building_rights_desc: "开发我们的城市和农村地区无疑是一项耗资巨大的工作。通过利用居住在这些地区的现有民众来资助我们的部分建设工作，我们将降低许多发展计划的最终成本。然而，签署同意这样的立法举措将大大增加他们的影响力。"
 laborers_royal_burgh_commissioners: "市民王室代表权"
 laborers_royal_burgh_commissioners_desc: "王家自治市专员代表着[GetCountry('SCO').GetName]获得[ShowEstateTypeName('crown_estate')]特许的自治市集会，他们聚集在一起保护自身特权、规范商业活动并向王室提供建议。通过他们在王家自治市代表大会中的集体权威，他们确保了[GetCountry('SCO').GetNameWithNoTooltip]的贸易城镇在治理、经济和法律方面保持重要地位，成为$nobles_estate$和[ShowEstateTypeName('clergy_estate')]权力的平衡力量。"
 laborers_land_rights: "$laborers_estate$土地权"
 laborers_land_rights_desc: "土地所有权的合法性一直是我国政府内的热点问题。通过扩大[ShowEstateTypeName('laborers_estate')]在土地所有权方面的特权，我们将确保各个行会更加配合我们的权威，以加强我们的中央权力。"
 laborers_commercial_advisory_council: "商业顾问委员会"
 laborers_commercial_advisory_council_desc: "贸易是我国经济的命脉。因此，我们必须重视贸易，并确保我们的国家元首只由最有能力、最有知识、最精通海上和陆地贸易事务的人辅佐。这将有利于我们在国内外的商业能力。"
 laborers_building_roads_rights: "筑路权"
 laborers_building_roads_rights_desc: "允许[ShowEstateTypeName('laborers_estate')]通过修建[roads|e]来发展我们的基础设施，从而让国家和商人都能从经济的增长中获利。"
 laborers_protected_faith: "保护富人的信仰"
 laborers_protected_faith_desc: "我们社会中的富人阶层信仰宗教的自由得到了保护，因此国家不会尝试劝说他们皈依。"
 laborers_urban_development_grants: "城市发展补助"
 laborers_urban_development_grants_desc: "我们清楚地认识到，城市聚落的坚固城墙中蕴藏着未来。为了推动和开创这个新时代，市民将获得多项补助金，以促进整个国家的城市化进程。"
 laborers_shipwright_contracts: "船匠合同"
 laborers_shipwright_contracts_desc: "向社会上的富裕阶层颁布由国家背书的优惠合同，将使我们能够更有效地掌握造船流程，减少行业监管的繁文缛节。"
 laborers_shooting_societies: "民间火枪操练"
 laborers_shooting_societies_desc: "由[ShowEstateTypeName('laborers_estate')]和手工业者组成的民兵组织，旨在练习操练和保卫城市，抵御所有外来入侵者。这些协会得到[ShowEstateTypeName('crown_estate')]的许可，可以穿上只有[ShowEstateTypeName('nobles_estate')]才可以穿的特殊制服并佩戴徽章。"
 laborers_state_run_pension: "国家养老金"
 laborers_state_run_pension_desc: "在历史长河中，若家族或慈善组织不予照料，年迈或残疾的农民往往只能自生自灭。然而我们可选择通过发放养老金来安抚农民——此举虽耗资不菲，但定能提升整体生产力，因为许多家庭由此卸下了照料老弱成员的重担。"
 STATIC_MODIFIER_NAME_laborers_estate_less_levy_obligations: "对$laborers_estate$减少征召义务"
 curb_central_authority_laborers: "压制中央权威"
 curb_central_authority_laborers_desc: "[Player.GetGovernment.GetParliament.GetName]的权威不能被议会之外的任何权威所压倒。即便王室敕令压在头顶，为了我们的理想，我们也应该行使这一光荣的权利！"
 revoke_privilege_of_the_nobles_laborers: "撤销贵族特权"
 revoke_privilege_of_the_nobles_laborers_desc: "对于那些靠平民的劳动和汗水过活的人们，想想看当他们得知自己可怜的特权将被剥夺时将会多么瑟瑟发抖！"
 reduce_laborers_taxation: "削减农民租税"
 reduce_laborers_taxation_desc: "大众的一生就是被领主收税的一生。为了推动我们解放人民的议程，我们必须将这一税目压低再压低！"
 establish_a_constitution_laborers: "编纂宪法"
 establish_a_constitution_desc_laborers: "人民的意志必须浓缩为一部为众人广为接受的书面文件，从而在巩固我们权利的同时约束中央的权威。"
 random_noble_privilege_revoked_tt: "将为[ShowEstateTypeName('nobles_estate')]阶层撤销一项随机[estate_privilege|e]"
 laborers_state_protected_lower_guilds: "国家保护下层行会"
 laborers_state_protected_lower_guilds_desc: "鉴于劳工行会在我国经济中扮演的重要角色，必须受到国家保护。"
 MODIFIER_TYPE_NAME_laborers_estate_target_satisfaction: "劳工阶层满意度均衡点"
 CIVILWAR_FACTION_laborers_estate_NAME: "$ADJ$劳工"
 CIVILWAR_FACTION_laborers_estate_ADJECTIVE: "劳工"
 MODIFIER_TYPE_NAME_laborers_estate_allowed_to_build_roads: "$laborers_estate$允许修建道路"
 MODIFIER_TYPE_DESC_laborers_estate_allowed_to_build_roads: "这允许$laborers_estate$修建[roads|e]。"
 MODIFIER_TYPE_NAME_laborers_estate_allowed_in_cabinet: "$laborers_estate$允许在内阁任职"
 MODIFIER_TYPE_DESC_laborers_estate_allowed_in_cabinet: "这允许[ShowEstateTypeName('laborers_estate')][estate|e][characters|e]在[cabinet|e]任职。"
 laborers_autonomous_suburbs: "郊区自治"
 laborers_autonomous_suburbs_desc: "在我国的城市流传着“城法不进郊”的俗语。我们郊区的人们自行组织管理，不受城市的管辖。"