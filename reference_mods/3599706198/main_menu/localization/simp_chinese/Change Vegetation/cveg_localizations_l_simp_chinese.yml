 cveg_veg_forest_to_woods_desc: "将此[location|e]的本地[vegetation|e]从[ShowVegetationName('forest')]更改为[ShowVegetationName('woods')]。\n\n可在任何地方建造。\n\n不会改变当前的[rgo|e]商品。"
 cveg_veg_forest_to_woods_maintenance: "该建筑一旦建成，将在月度结算时被移除。"
 cveg_veg_forest_to_woods_price: "砍伐森林花费"
 cveg_veg_forest_to_woods_construction: "砍伐森林建设"
 cveg_veg_woods_to_grasslands: "砍伐[ShowVegetationName('woods')]"
 cveg_veg_woods_to_grasslands_desc: "将此[location|e]的本地[vegetation|e]从[ShowVegetationName('woods')]变更为[ShowVegetationName('grasslands')]。\n\n可在任意地点建造。\n\n不会改变当前的[rgo|e]。"
