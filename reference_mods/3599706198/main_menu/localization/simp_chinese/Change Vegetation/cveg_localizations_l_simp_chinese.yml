 cveg_veg_woods_to_grasslands_price: "砍伐树林花费"
 cveg_veg_woods_to_grasslands_construction: "砍伐林地建造"
 cveg_veg_grasslands_to_woods: "种植[ShowVegetationName('woods')]以获取[ShowGoodsName('lumber')]"
 cveg_veg_grasslands_to_woods_desc: "将此[location|e]的本地[vegetation|e]从[ShowVegetationName('grasslands')]更改为[ShowVegetationName('woods')]，并将本地[rgo|e]产品设置为[ShowGoodsName('lumber')]。\n\n可在任何地方建造，但在[ShowClimateName('arid')]和[ShowClimateName('cold_arid')]气候区，仅能在[ShowTopographyName('mountains')]和[ShowTopographyName('hills')]上建造。\n\n由于以下[rgo|e]的重要性和稀缺性，无法在其上建造：\n\n[ShowGoodsName('iron')]、[ShowGoodsName('goods_gold')]、[ShowGoodsName('silver')]、[ShowGoodsName('tin')]、[ShowGoodsName('copper')]、[ShowGoodsName('coal')]、[ShowGoodsName('saltpeter')]、[ShowGoodsName('lead')]、[ShowGoodsName('gems')]、[ShowGoodsName('amber')]、[ShowGoodsName('mercury')]、[ShowGoodsName('pearls')]、[ShowGoodsName('marble')]、[ShowGoodsName('alum')]、[ShowGoodsName('silk')]和[ShowGoodsName('dyes')]。"
 cveg_veg_grasslands_to_woods_maintenance: "该建筑一旦建成，将在月度结算时被移除。"
 cveg_veg_grasslands_to_woods_price: "植树造林花费"
 cveg_veg_grasslands_to_woods_construction: "植树造林建设"
 cveg_veg_grasslands_to_farmland: "开垦[ShowVegetationName('farmland')]"
 cveg_veg_grasslands_to_farmland_desc: "将此[location|e]的本地[vegetation|e]从[ShowVegetationName('grasslands')]改为[ShowVegetationName('farmland')]。\n\n无法在[ShowClimateName('arctic')]气候或[ShowTopographyName('mountains')]地形上建造。\n需要邻近[river|e]、淡水湖（非[ShowTopographyName('salt_pans')]）、[ShowTopographyName('wetlands')]地形，或位于[ShowClimateName('mediterranean')]气候的[ShowTopographyName('flatland')]地形。\n\n不会改变当前的[rgo|e]。"
 cveg_veg_grasslands_to_farmland_maintenance: "该建筑一旦建成，将在月度结算时被移除。"
 cveg_veg_grasslands_to_farmland_price: "开垦农田花费"
 cveg_veg_grasslands_to_farmland_construction: "开垦农田建设"
 cveg_veg_sparse_to_grasslands: "开垦[ShowVegetationName('grasslands')]"
 cveg_veg_sparse_to_grasslands_desc: "将此[location|e]的本地[vegetation|e]从[ShowVegetationName('sparse')]变更为[ShowVegetationName('grasslands')]。\n\n可在[ShowClimateName('arctic')]气候区以外的[ShowVegetationName('sparse')]地形上建造。\n\n需要满足以下条件之一：邻近[river|e]或淡水湖（非[ShowTopographyName('salt_pans')]）、[ShowTopographyName('wetlands')]地形、[ShowClimateName('mediterranean')]气候、[ShowClimateName('cold_arid')]气候，或处于[ShowClimateName('arid')]气候且具备[ShowTopographyName('mountains')]、[ShowTopographyName('hills')]或[ShowTopographyName('plateau')]地形。\n\n不会改变当前的[rgo|e]。"
 cveg_veg_sparse_to_grasslands_maintenance: "该建筑一旦建成，将在月度结算时被移除。"
 cveg_veg_sparse_to_grasslands_price: "开垦草原（稀疏）花费"
 cveg_veg_sparse_to_grasslands_construction: "开垦草原（稀疏）建设"
 cveg_veg_desert_to_grasslands: "开垦[ShowVegetationName('grasslands')]"
 cveg_veg_desert_to_grasslands_desc: "将此[location|e]的本地[vegetation|e]从[ShowVegetationName('desert')]更改为[ShowVegetationName('grasslands')]。\n\n可在[ShowClimateName('arctic')]气候区之外的[ShowVegetationName('desert')]上建造。\n\n需要满足以下条件之一：邻近[river|e]或淡水湖（不包括[ShowTopographyName('salt_pans')]）、[ShowTopographyName('wetlands')]地形、[ShowClimateName('mediterranean')]气候、[ShowClimateName('cold_arid')]气候，或具有[ShowTopographyName('mountains')]、[ShowTopographyName('hills')]或[ShowTopographyName('plateau')]地形的[ShowClimateName('arid')]气候区。\n\n不会改变当前的[rgo|e]。"
 cveg_veg_desert_to_grasslands_maintenance: "该建筑一旦建成，将在月度结算时被移除。"
 cveg_veg_desert_to_grasslands_price: "开垦草原（沙漠）花费"
 cveg_veg_desert_to_grasslands_construction: "开垦草原（沙漠）建设"