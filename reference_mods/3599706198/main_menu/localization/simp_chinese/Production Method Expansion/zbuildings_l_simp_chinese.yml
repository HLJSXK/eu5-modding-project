l_simp_chinese:
 nbe_smoke_plant_farm: "烟叶种植农场"
 nbe_smoke_plant_farm_desc: "经过一天的辛勤劳作，人们往往希望通过吸食烟草来放松身心。因此，烟草的种植与加工已成为乡村聚落的重要产业，既为农民提供了就业机会，也为当地领主带来了可观收入。"
 nbe_sheep_farm: "牧羊场"
 nbe_sheep_farm_desc: "养羊长期以来一直是农村经济的支柱，其为纺织业提供羊毛，为人们提供肉食。建立专门的养羊场能让农民有效管理羊群，从而促进定居点的繁荣，改善居民的生活福祉。"
 nbe_coppice_pollard: "矮林"
 nbe_coppice_pollard_desc: "矮林作业和截头作业是传统的林地管理技术，能促进可持续木材生产。通过这种方式培育树木，农民既能确保建筑和燃料用木材的稳定供应，又能维护森林生态系统的健康。"
 nbe_pepper_farm: "胡椒种植园"
 nbe_pepper_farm_desc: "胡椒常被誉为“香料之王”，在历史上一直是备受追捧的商品。"
 nbe_cloves_farm: "丁香种植园"
 nbe_cloves_farm_desc: "丁香，以其独特的香气和风味，数百年来一直被视为珍贵的香料。"
 nbe_chilli_farm: "辣椒种植园"
 nbe_chilli_farm_desc: "辣椒以其火辣的口感和独特的风味而闻名，已成为全球各地菜肴中不可或缺的食材。"
 nbe_coffee_farm: "咖啡种植园"
 nbe_coffee_farm_desc: "咖啡种植已成为一项重要的农业活动，既为农村居民提供了经济机遇，也成为全球人民钟爱的饮品。"
 nbe_saffron_farm: "藏红花种植园"
 nbe_saffron_farm_desc: "藏红花，被誉为香料界的“红色黄金”，是全球最珍贵且备受追捧的商品之一。其培育过程需要极其细致的照料，而且娇嫩的花柱头必须手工采摘。"
 nbe_olives_farm: "橄榄种植园"
 nbe_olives_farm_desc: "橄榄种植数千年来一直是地中海农业的基石。橄榄树因其顽强的生命力和丰产性而备受尊崇，不仅提供了主要食物来源，还生产出烹饪、照明和宗教仪式中不可或缺的橄榄油。"
