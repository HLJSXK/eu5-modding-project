l_english:

# Missions - Titles & Descriptions
holland_expansion_mission_pack:0 "Holland: Territorial Expansion"
holland_expansion_mission_pack_desc:0 "Expand Dutch territory and unite the Low Countries under Holland's banner."
holland_expansion_mission_pack_BUTTON_TOOLTIP:0 "Complete missions to expand Holland's territory and influence in the Low Countries."
holland_expansion_mission_pack_CRITERIA_DESCRIPTION:0 "Expand Holland's territory and influence in the Low Countries. Form the Netherlands to unlock a new government type and military traditions."

# Mission names and descriptions
mission_test_development:0 "Develop Amsterdam"
mission_test_development_desc:0 "Reach 10 development in our capital to strengthen our economic base."

mission_conquer_utrecht:0 "Conquer Utrecht"
mission_conquer_utrecht_desc:0 "Bring the locations of Utrecht and Amersfoort under Dutch control to secure our eastern borders."
 
mission_war_preparation:0 "Prepare for Expansion"
mission_war_preparation_desc:0 "Maintain stability and a strong economy to prepare for further territorial expansion into Gelderland."
 
mission_frisian_dominance:0 "Frisian Dominance" 
mission_frisian_dominance_desc:0 "Ensure Frisian lands are either under our control or the Republic of Frisia no longer exists as an independent threat."
 
mission_dutch_unification:0 "Unite the Dutch Lands"
mission_dutch_unification_desc:0 "Build a strong army and control the heartland of Dutch culture to pave the way for a unified Netherlands."
 
mission_form_netherlands:0 "Forge the Netherlands"
mission_form_netherlands_desc:0 "As a united Dutch state of at least duchy rank, establish the military traditions of the Netherlands."

# Tooltips
netherlands_republican_reform_tt:0 "The Netherlands may reform its government into a republic"
became_republican_government_tt:0 "Our government has been reformed into a republic"
remained_monarchy_tt:0 "We have maintained our monarchical traditions"

# Static modifier names and descriptions
STATIC_MODIFIER_NAME_holland_territorial_expansion:0 "Territorial Expansion"
STATIC_MODIFIER_DESC_holland_territorial_expansion:0 "Recent conquests have reduced army maintenance costs and strengthened crown authority."

STATIC_MODIFIER_NAME_holland_war_preparation:0 "War Preparation"
STATIC_MODIFIER_DESC_holland_war_preparation:0 "Military reforms have improved discipline and morale in preparation for future campaigns."

STATIC_MODIFIER_NAME_holland_regional_dominance:0 "Regional Dominance"
STATIC_MODIFIER_DESC_holland_regional_dominance:0 "Our control over the region reduces internal tensions and building maintenance costs."

STATIC_MODIFIER_NAME_holland_dutch_unification:0 "Dutch Unification"
STATIC_MODIFIER_DESC_holland_dutch_unification:0 "The unification of Dutch lands has increased estate satisfaction and improved tax efficiency."

STATIC_MODIFIER_NAME_netherlands_military_traditions:0 "Dutch Military Traditions"
STATIC_MODIFIER_DESC_netherlands_military_traditions:0 "The military traditions of the Netherlands provide permanent discipline bonuses."

STATIC_MODIFIER_NAME_netherlands_monarchist_army:0 "Monarchist Traditions"
STATIC_MODIFIER_DESC_netherlands_monarchist_army:0 "Monarchical structure have increased our control, food production and army maintenance cost."

# Event texts
holland_expansion_events.1.t:0 "Amsterdam Grows Prosperous"
holland_expansion_events.1.d:0 "Our capital has reached new heights of development! The merchants and citizens celebrate this achievement. How shall we commemorate this milestone?"
holland_expansion_events.1.a:0 "Celebrate the Victory"
holland_expansion_events.1.b:0 "United We Are Strong"

holland_expansion_events.10.t:0 "The Dutch Republic"
holland_expansion_events.10.d:0 "With the formation of the Netherlands complete, we stand at a crossroads. Shall we embrace the republican ideals that have made our merchants wealthy and our cities prosperous, or maintain the traditional monarchical structure that has served us well in military matters?"
holland_expansion_events.10.a:0 "Establish Republican Reforms"
holland_expansion_events.10.b:0 "Maintain Monarchical Traditions"

# Additional tooltips for mission requirements
mission_conquer_utrecht_trigger:0 "We must control both Utrecht and Amersfoort"
mission_war_preparation_trigger:0 "We need at least 30 stability and §Y30§! monthly income"
mission_frisian_dominance_trigger:0 "Frisia must either not exist or be our subject"
mission_dutch_unification_trigger:0 "We need 40 capital development, 280 total development, 30 prestige, and 40% crown power"
mission_form_netherlands_trigger:0 "We must be the Netherlands with at least duchy rank"

# Mission completion tooltips
mission_conquer_utrecht_completion:0 "Integration progress increased in North Holland"
mission_war_preparation_completion:0 "Gained conquest casus belli against Gelderland"
mission_frisian_dominance_completion:0 "Frisian lands are being integrated into our realm"
mission_dutch_unification_completion:0 "Control has been strengthened across Dutch territories"
mission_form_netherlands_completion:0 "The Netherlands has been established with strong military traditions"