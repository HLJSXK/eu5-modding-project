# === UNIFICATION & INTERNAL DEVELOPMENT EVENTS ===
polish_mission_events.1.t:0 "Consolidation of the Polish Heartland"
polish_mission_events.1.d:0 "The Polish heartland stands united under our banner. The foundations of a strong state have been laid, with royal authority firmly established across our core territories. This unity provides the stability needed for future expansion and development."
polish_mission_events.1.a:0 "Focus on Economic Development"
polish_mission_events.1.b:0 "Strengthen Central Authority"

polish_mission_events.2.t:0 "Development of Kraków"
polish_mission_events.2.d:0 "Kraków has flourished into a true royal capital. The city's markets bustle with trade, its cultural institutions attract scholars and artists, and its fortifications stand strong. Our capital now reflects the growing prestige of the Polish crown."
polish_mission_events.2.a:0 "Invest in Urban Prosperity"
polish_mission_events.2.b:0 "Promote Cultural Excellence"

polish_mission_events.3.t:0 "Strengthening the Szlachta"
polish_mission_events.3.d:0 "The Polish nobility have proven instrumental in consolidating our realm. Their military service and political support have been invaluable, but they now seek greater privileges in return for their continued loyalty."
polish_mission_events.3.a:0 "Maintain Royal Prerogatives"
polish_mission_events.3.b:0 "Expand Noble Privileges"

# === WESTERN EXPANSION EVENTS ===
polish_mission_events.4.t:0 "Securing Silesia"
polish_mission_events.4.d:0 "The rich lands of Silesia are now firmly under Polish control. The region's mines and fertile fields will significantly boost our economy, while its population provides valuable manpower for our armies."
polish_mission_events.4.a:0 "Focus on Integration and Development"
polish_mission_events.4.b:0 "Promote Economic Growth"

polish_mission_events.5.t:0 "Challenge to Bohemian Authority"
polish_mission_events.5.d:0 "Our successful assertion of Polish claims in Silesia has sent shockwaves through Central Europe. The Bohemian crown is weakened, and other powers are taking notice of Poland's growing influence."
polish_mission_events.5.a:0 "Pursue Further Ambitions"
polish_mission_events.5.b:0 "Consolidate Our Gains"

polish_mission_events.6.t:0 "Victory over the Teutonic Order"
polish_mission_events.6.d:0 "The Teutonic Knights have been brought to heel. Their once-mighty order now answers to the Polish crown, securing our northern borders and eliminating a long-standing threat."
polish_mission_events.6.a:0 "Rule with Their Support"
polish_mission_events.6.b:0 "Demand the rest of their Territories"

polish_mission_events.60.t:0 "The Fall of the Black Cross"
polish_mission_events.60.d:0 "For centuries, the shadow of the Teutonic Knights has loomed over our northern borders, their crusading zeal long since replaced by a hunger for our lands. Today, that shadow has finally lifted. With their fortresses dismantled and their banners trodden into the mud, the Order of Saint Mary exists only in the annals of history. The Baltic coast is secure, and our people may finally look to the sea without fear of the iron-clad monks."
polish_mission_events.60.a:0 "A glorious day for the Crown!"

polish_mission_events.68.t:0 "Gold of the North"
polish_mission_events.68.d:0 "Our dominance over the Baltic coast has yielded a most precious fruit. The amber workshops in our coastal cities are bustling with activity as merchants from as far as Italy and Byzantium clamor for our 'Northern Gold.' The Burghers have organized a formal guild system to manage the flow of this resin, ensuring that our ports become the undisputed centers of the global amber trade. Prosperity follows the scent of the sea."
polish_mission_events.68.a:0 "The Baltic yields its riches."

# === EASTERN EXPANSION EVENTS ===
polish_mission_events.9.t:0 "Securing the Eastern Marches"
polish_mission_events.9.d:0 "Our eastern territories in Volhynia have been secured, providing a buffer against eastern threats. These lands offer ample manpower and strategic defensive positions."
polish_mission_events.9.a:0 "Secure the Marches"
polish_mission_events.9.b:0 "Develop Economic Resources"

polish_mission_events.10.t:0 "Integration of Red Ruthenia"
polish_mission_events.10.d:0 "The Ruthenian lands have been brought under Polish control, but their integration presents both challenges and opportunities. The local nobility seeks to preserve their traditions, while our administrators push for full assimilation."
polish_mission_events.10.a:0 "Implement Integration Policies"
polish_mission_events.10.b:0 "Accommodate Local Traditions"

# === LITHUANIAN DIPLOMACY EVENTS ===
polish_mission_events.14.t:0 "Forging the Commonwealth"
polish_mission_events.14.d:0 "The Union of Lublin stands ready to be finalized, creating the Polish-Lithuanian Commonwealth. This historic union will create one of Europe's largest and most powerful states, uniting Polish and Lithuanian interests under a single banner."
polish_mission_events.14.a:0 "Establish the Commonwealth"

polish_mission_events.65.t:0 "Union of Krewo"
polish_mission_events.65.d:0 "The historic Union of Krewo has been signed, creating a personal union between Poland and Lithuania. This alliance strengthens both realms against common threats and lays the foundation for greater cooperation."
polish_mission_events.65.a:0 "Strengthen the Union"

polish_mission_events.66.t:0 "Expanding the Commonwealth"
polish_mission_events.66.d:0 "The Polish-Lithuanian Commonwealth continues to grow, integrating new territories and peoples. Our multicultural realm becomes stronger with each expansion, though managing diverse populations presents ongoing challenges."
polish_mission_events.66.a:0 "Continue Expansion"

# === ECONOMIC DEVELOPMENT EVENTS ===
polish_mission_events.15.t:0 "Agricultural Development"
polish_mission_events.15.d:0 "Poland's fertile lands have been transformed into Europe's breadbasket. With proper investment and innovation, our agricultural output now feeds nations and drives our economy."
polish_mission_events.15.a:0 "Focus on Agricultural Growth"
polish_mission_events.15.b:0 "Invest in Rural Development"

polish_mission_events.16.t:0 "Grain Trade Dominance"
polish_mission_events.16.d:0 "Our grain exports have made us essential to European food supplies. Control of this trade brings immense wealth and influence, with merchants from across the continent competing for Polish grain."
polish_mission_events.16.a:0 "Focus on Export Profits"
polish_mission_events.16.b:0 "Develop Trade Infrastructure"

polish_mission_events.17.t:0 "Baltic Marine Development"
polish_mission_events.17.d:0 "Our Baltic ports have become vital hubs for European trade. With proper investment, we dominate Baltic commerce and project naval power throughout the region."
polish_mission_events.17.a:0 "Develop Naval Power"
polish_mission_events.17.b:0 "Expand Port Facilities"

polish_mission_events.59.t:0 "Securing the Vistula Trade"
polish_mission_events.59.d:0 "The Vistula River now serves as Poland's economic lifeline, carrying grain and goods from our heartlands to Baltic ports. Control of this vital waterway ensures our economic dominance in the region."
polish_mission_events.59.a:0 "Strengthen Trade Control"

polish_mission_events.67.t:0 "Developing Polish Manufactories"
polish_mission_events.67.d:0 "Polish manufactories are springing up across the realm, producing quality goods for both domestic use and export. This industrial development reduces our dependence on foreign imports and creates new sources of wealth."
polish_mission_events.67.a:0 "Support Industrial Growth"

# === MILITARY REFORM EVENTS ===
polish_mission_events.21.t:0 "Army Reform Progress"
polish_mission_events.21.d:0 "Our military reforms are showing promising results. The army is becoming more professional and effective, though further changes are needed to maintain our edge against emerging threats."
polish_mission_events.21.a:0 "The Hussar Reforms"
polish_mission_events.21.b:0 "The Quarter Army System"

polish_mission_events.62.t:0 "Establishing the Winged Hussars"
polish_mission_events.62.d:0 "The elite Winged Hussars have been formally established as the pride of the Polish army. These heavily armored cavalrymen, with their distinctive wings and lances, strike fear into the hearts of our enemies and embody the martial spirit of the Polish nobility."
polish_mission_events.62.a:0 "Appoint a Hussar Commander"

polish_mission_events.69.t:0 "Reforming Polish Infantry"
polish_mission_events.69.d:0 "Our infantry forces have been modernized with new training, equipment, and tactics. These reforms ensure our foot soldiers can hold the line while our elite cavalry delivers the decisive blow."
polish_mission_events.69.a:0 "Complete the Reforms"

# === CULTURAL & RELIGIOUS EVENTS ===
polish_mission_events.24.t:0 "Cultural Promotion"
polish_mission_events.24.d:0 "Polish culture is flourishing, with artists, writers, and scholars producing works that rival those of any European nation. Royal patronage could elevate our cultural achievements to unprecedented heights."
polish_mission_events.24.a:0 "Sarmatian Cultural Movement"
polish_mission_events.24.b:0 "Renaissance Humanism"

polish_mission_events.25.t:0 "Establishing Jagiellonian University"
polish_mission_events.25.d:0 "The Jagiellonian University has been established as a center of learning and scholarship. This institution will train future generations of Polish leaders, scientists, and artists, spreading knowledge throughout our realm."
polish_mission_events.25.a:0 "Appoint a Renowned Scholar"
polish_mission_events.25.b:0 "Focus on Research"

polish_mission_events.26.t:0 "Defender of the Faith"
polish_mission_events.26.d:0 "As the Catholic faith faces challenges from the Reformation and eastern religions, Poland stands as a bastion of traditional Christianity. Our defense of the faith earns us the Pope's favor and divine blessing for our endeavors."
polish_mission_events.26.b:0 "Jesuit Missions"

polish_mission_events.35.t:0 "Champion of the Counter-Reformation"
polish_mission_events.35.d:0 "Poland has emerged as the leading defender of Catholicism in Eastern Europe. Our missionaries work tirelessly, and our support for the Church has earned us the Pope's favor."
polish_mission_events.35.a:0 "Intensify Religious Zeal"
polish_mission_events.35.b:0 "Promote Religious Unity"

polish_mission_events.55.t:0 "Promoting Sarmatism"
polish_mission_events.55.d:0 "The Sarmatian ideal has taken root among the Polish nobility, blending eastern and western influences into a unique cultural identity. This ideology emphasizes the szlachta's ancient origins and special role in defending Polish liberty."
polish_mission_events.55.a:0 "The Golden Liberty"
polish_mission_events.55.b:0 "Sarmatian Cosmopolitanism"

polish_mission_events.71.t:0 "Establishing Polish Baroque"
polish_mission_events.71.d:0 "A distinctive Polish Baroque style is emerging in our arts and architecture. This new aesthetic blends Western European influences with local traditions, creating works of stunning beauty that reflect the glory of the Commonwealth."
polish_mission_events.71.a:0 "Patronize Baroque Artists"

# === ESTATE MANAGEMENT EVENTS ===
polish_mission_events.40.t:0 "Noble Estate Demands"
polish_mission_events.40.d:0 "The szlachta grow restless, demanding greater privileges and influence in government. Their support is crucial for maintaining stability, but their demands increasingly constrain royal authority."
polish_mission_events.40.a:0 "Appease the Nobility"
polish_mission_events.40.b:0 "Ignore Their Demands"

polish_mission_events.41.t:0 "Burgher Estate Concerns"
polish_mission_events.41.d:0 "The merchant class seeks greater trade privileges and representation. Their wealth fuels our economy, but their demands often conflict with noble interests."
polish_mission_events.41.a:0 "Balance Burgher Interests"
polish_mission_events.41.b:0 "Focus on Trade Growth"

polish_mission_events.42.t:0 "Peasant Estate Issues"
polish_mission_events.42.d:0 "The peasantry, while having little political power, forms the backbone of our agricultural economy. Their productivity could be improved with better conditions, but such reforms might anger the nobility."
polish_mission_events.42.a:0 "Enforce Traditional Serfdom"
polish_mission_events.42.b:0 "Improve Rural Conditions"

polish_mission_events.43.t:0 "Estate Balance Achieved"
polish_mission_events.43.d:0 "Through careful management, we have achieved a stable balance between the competing interests of our various estates. This equilibrium promotes efficient governance and reduces internal conflicts."
polish_mission_events.43.a:0 "Consolidate the Balance"

polish_mission_events.45.t:0 "The Liberum Veto"
polish_mission_events.45.d:0 "The Sejm has formally established the liberum veto, giving any single noble the power to block legislation. This unprecedented privilege for the szlachta fundamentally changes how our Commonwealth is governed."
polish_mission_events.45.a:0 "Do not grant extra privileges"
polish_mission_events.45.b:0 "Take a Cautious Approach"

polish_mission_events.46.t:0 "Rural Development Boom"
polish_mission_events.46.d:0 "Investment in our agricultural heartland is paying remarkable dividends. New farming techniques, improved infrastructure, and better rural conditions are transforming the countryside."
polish_mission_events.46.a:0 "Promote Rural Prosperity"
polish_mission_events.46.b:0 "Focus on Agricultural Innovation"

polish_mission_events.56.t:0 "Consolidating Golden Liberty"
polish_mission_events.56.d:0 "The system of Golden Liberty is now fully established, with the nobility's privileges firmly enshrined in law. The liberum veto, free election of monarchs, and other noble rights create a unique political system that balances royal authority with aristocratic freedom."
polish_mission_events.56.a:0 "Complete the System"

# === SOUTHERN EXPANSION & OTTOMAN THREAT EVENTS ===
polish_mission_events.63.t:0 "Defending Against Ottomans"
polish_mission_events.63.d:0 "The Ottoman threat looms large on our southern borders. Our elite cavalry stands ready to defend Christendom, but we must prepare carefully for the coming conflict with this powerful empire."
polish_mission_events.63.a:0 "Prepare for Holy War"

polish_mission_events.70.t:0 "Securing the Danube Frontier"
polish_mission_events.70.d:0 "Our forces have secured positions along the Danube River, establishing a defensive line against further Ottoman expansion. These territories provide strategic depth and new recruitment grounds for our armies."
polish_mission_events.70.a:0 "Consolidate Our Gains"

# === MAJOR ACHIEVEMENT EVENTS ===
polish_mission_events.50.t:0 "The Polish Golden Age"
polish_mission_events.50.d:0 "We stand at the zenith of Polish power and prosperity. Our cities flourish with artistic and scientific achievement, our fields produce abundant harvests, and our armies are unmatched. This is truly Poland's golden age."
polish_mission_events.50.a:0 "Invest in Cultural Legacy"
polish_mission_events.50.b:0 "Focus on Economic Prosperity"

polish_mission_events.75.t:0 "Control of the Baltic Sea"
polish_mission_events.75.d:0 "The Baltic Sea is now a Polish lake. Our fleets patrol these waters unchallenged, our ports dominate regional trade, and our naval supremacy secures our northern borders for generations to come."
polish_mission_events.75.a:0 "Establish Naval Dominance"

# === RELIGIOUS TOLERANCE EVENT ===
polish_mission_events.77.t:0 "Promoting Religious Tolerance"
polish_mission_events.77.d:0 "In our diverse Commonwealth, religious tolerance has proven to be a source of strength rather than weakness. By allowing different faiths to coexist peacefully, we maintain internal stability and attract skilled people from across Europe."
polish_mission_events.77.a:0 "Formalize Religious Tolerance"
polish_mission_events.77.b:0 "Promote Interfaith Cooperation"

# === BALTIC TRADE LEAGUE EVENT ===
polish_mission_events.78.t:0 "Establishing the Baltic Trade League"
polish_mission_events.78.d:0 "Polish merchants now dominate Baltic commerce through a formal trade league. This network controls the flow of goods throughout Northern Europe, bringing immense wealth to our ports and strengthening our economic influence."
polish_mission_events.78.a:0 "Consolidate Trade Dominance"
polish_mission_events.78.b:0 "Develop Port Infrastructure"

# === HRE CHALLENGE EVENT ===
polish_mission_events.80.t:0 "Triumph over the Emperor"
polish_mission_events.80.d:0 "Our victory over the Holy Roman Emperor has shattered Imperial prestige and established Poland as the dominant power in Central Europe. The balance of power has shifted decisively in our favor."
polish_mission_events.80.a:0 "Consolidate Our Victory"

