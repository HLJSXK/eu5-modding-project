mission_promote_religious_tolerance:0 "Promote Religious Tolerance"
mission_promote_religious_tolerance_desc:0 "Foster an atmosphere of religious tolerance to maintain stability in our multicultural realm."

# === ESTATE MANAGEMENT & GOLDEN LIBERTY MISSIONS ===
mission_balance_szlachta_power:0 "Balance Szlachta Power"
mission_balance_szlachta_power_desc:0 "Manage the competing interests of the nobility while maintaining royal authority."

mission_implement_liberum_veto:0 "Implement Liberum Veto"
mission_implement_liberum_veto_desc:0 "Establish the noble privilege that gives any single noble the power to veto legislation."

mission_consolidate_golden_liberty:0 "Consolidate Golden Liberty"
mission_consolidate_golden_liberty_desc:0 "Complete the establishment of the noble privileges that define the Polish political system."

# === MAJOR ACHIEVEMENTS & GOLDEN AGE MISSIONS ===
