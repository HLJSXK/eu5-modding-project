l_english:

# === MISSION PACK HEADER ===
polish_mission_pack:0 "Poland: Rise of the Commonwealth"
polish_mission_pack_desc:0 "Unite the Polish lands, expand eastward, and forge the mighty Polish-Lithuanian Commonwealth."
polish_mission_pack_BUTTON_TOOLTIP:0 "Complete missions to strengthen Poland and establish dominance in Eastern Europe."
polish_mission_pack_CRITERIA_DESCRIPTION:0 "Strengthen the Polish crown, expand your territories, and establish the Polish-Lithuanian Commonwealth to unlock powerful modifiers and traditions."

# === POLISH UNIFICATION & INTERNAL DEVELOPMENT MISSIONS ===
mission_consolidate_polish_heartland:0 "Consolidate the Polish Heartland"
mission_consolidate_polish_heartland_desc:0 "Secure control over the core Polish territories to establish a strong foundation for the Polish state."

mission_develop_krakow:0 "Develop Kraków"
mission_develop_krakow_desc:0 "Transform our capital into a thriving cultural and economic center worthy of the Polish crown."

mission_expand_krakow_influence:0 "Expand Kraków's Influence"
mission_expand_krakow_influence_desc:0 "Establish Kraków as a major European center of culture, learning, and commerce."

mission_strengthen_szlachta:0 "Strengthen the Szlachta"
mission_strengthen_szlachta_desc:0 "Secure the support of the Polish nobility, whose privileges form the backbone of our state."

mission_establish_royal_treasury:0 "Establish Royal Treasury"
mission_establish_royal_treasury_desc:0 "Create a secure royal treasury to fund our ambitions and stabilize the economy."

mission_promote_polish_culture:0 "Promote Polish Culture"
mission_promote_polish_culture_desc:0 "Foster a golden age of Polish arts, learning, and culture."

# === WESTERN EXPANSION & HRE RELATIONS MISSIONS ===
mission_secure_silesia:0 "Secure Silesia"
mission_secure_silesia_desc:0 "Bring the rich lands of Silesia under Polish control to strengthen our economy and manpower."

mission_challenge_bohemian_suzerainty:0 "Challenge Bohemian Influence"
mission_challenge_bohemian_suzerainty_desc:0 "Assert Polish dominance in Central Europe by challenging Bohemian authority."

mission_subjugate_teutonic_order:0 "Subjugate the Teutonic Order"
mission_subjugate_teutonic_order_desc:0 "Bring the Teutonic Knights to heel and secure our northern borders."

mission_eliminate_teutonic_order:0 "The Final Settlement"
mission_eliminate_teutonic_order_desc:0 "For too long, the Teutonic Order has acted as a thorn in the side of the Polish Crown. By dismantling their state and reclaiming the lands of the Vistula and the Baltic, we ensure that no foreign crusader will ever again dictate terms to the Polish people."

mission_develop_baltic_ports:0 "Develop Baltic Ports"
mission_develop_baltic_ports_desc:0 "Establish Polish control over Baltic trade routes and develop maritime infrastructure."

mission_establish_baltic_navy:0 "Establish Baltic Navy"
mission_establish_baltic_navy_desc:0 "Build a powerful fleet to protect our Baltic interests and project naval power."

mission_secure_pomerania:0 "Secure Pomerania"
mission_secure_pomerania_desc:0 "Gain access to the Baltic Sea by securing the Pomeranian coast."

mission_establish_amber_trade:0 "The Amber Monopoly"
mission_establish_amber_trade_desc:0 "The shores of the Baltic hold a treasure more precious than silver the Gold of the North. By securing the primary extraction sites and streamlining the trade routes, we can ensure that every piece of worked amber passing through Europe fills the Polish treasury."

mission_rival_hre_emperor:0 "Rival the Holy Roman Emperor"
mission_rival_hre_emperor_desc:0 "Establish Poland as a counterweight to Imperial authority in Central Europe."

mission_invest_into_the_army:0 "Invest into the Army"
mission_invest_into_the_army_desc:0 "Modernize and expand our military forces to defend our realm and pursue our ambitions."

# === EASTERN EXPANSION & RUTHENIAN INTEGRATION MISSIONS ===
mission_secure_galicia_volhynia:0 "Secure Galicia-Volhynia"
mission_secure_galicia_volhynia_desc:0 "Expand Polish influence into the eastern borderlands to secure our frontiers."

mission_expand_into_red_ruthenia:0 "Expand into Red Ruthenia"
mission_expand_into_red_ruthenia_desc:0 "Integrate the Ruthenian lands and their people into the Polish realm."

mission_integrate_ruthenian_culture:0 "Integrate Ruthenian Culture"
mission_integrate_ruthenian_culture_desc:0 "Embrace Ruthenian culture and traditions to strengthen our multicultural state."

mission_secure_eastern_frontier:0 "Secure the Eastern Frontier"
mission_secure_eastern_frontier_desc:0 "Fortify our eastern borders against Orthodox neighbors and secure the frontier."

mission_fortify_eastern_border:0 "Fortify Eastern Border"
mission_fortify_eastern_border_desc:0 "Build a formidable line of fortifications to protect our eastern frontiers."

mission_integrate_the_cossacks:0 "Integrate the Cossacks"
mission_integrate_the_cossacks_desc:0 "Incorporate the fierce Cossack warriors into our military structure to bolster our cavalry forces."

# === LITHUANIAN DIPLOMACY & COMMONWEALTH MISSIONS ===
mission_forge_lithuanian_alliance:0 "Forge Lithuanian Alliance"
mission_forge_lithuanian_alliance_desc:0 "Establish strong diplomatic ties with Lithuania to secure our eastern flank."

mission_union_of_krewo:0 "Union of Krewo"
mission_union_of_krewo_desc:0 "Form a personal union with Lithuania through dynastic marriage and political agreement."

mission_form_polish_lithuanian_commonwealth:0 "Form the Polish-Lithuanian Commonwealth"
mission_form_polish_lithuanian_commonwealth_desc:0 "Create one of Europe's largest and most powerful states through union with Lithuania."

mission_expand_the_commonwealth:0 "Expand the Commonwealth"
mission_expand_the_commonwealth_desc:0 "Extend the influence and territories of the Polish-Lithuanian Commonwealth."

# === ECONOMIC DEVELOPMENT & TRADE MISSIONS ===
mission_develop_agricultural_heartland:0 "Develop Agricultural Heartland"
mission_develop_agricultural_heartland_desc:0 "Maximize the productivity of Poland's fertile farmlands."

mission_establish_grain_trade:0 "Establish Grain Trade"
mission_establish_grain_trade_desc:0 "Become Europe's breadbasket by dominating the grain trade through Baltic ports."

mission_develop_rural_economy:0 "Develop Rural Economy"
mission_develop_rural_economy_desc:0 "Improve the productivity of Poland's vast agricultural lands."

mission_secure_vistula_trade:0 "Secure Vistula Trade"
mission_secure_vistula_trade_desc:0 "Control the vital Vistula River trade route to dominate commerce in the region."

mission_develop_polish_manufactories:0 "Develop Polish Manufactories"
mission_develop_polish_manufactories_desc:0 "Establish industrial production to reduce dependence on foreign goods."

mission_establish_baltic_trade_league:0 "Establish Baltic Trade League"
mission_establish_baltic_trade_league_desc:0 "Create a trading network to dominate Baltic commerce."

mission_establish_polish_arsenal:0 "Establish Polish Arsenal"
mission_establish_polish_arsenal_desc:0 "Build military production facilities to equip our armies with domestic weapons."

# === MILITARY REFORMS & EXPANSION MISSIONS ===
mission_establish_winged_hussars:0 "Establish the Winged Hussars"
mission_establish_winged_hussars_desc:0 "Create Europe's most feared cavalry force to dominate the battlefield."

mission_reform_polish_army:0 "Reform the Polish Army"
mission_reform_polish_army_desc:0 "Modernize our military forces to maintain our edge against emerging threats."

mission_reform_polish_infantry:0 "Reform Polish Infantry"
mission_reform_polish_infantry_desc:0 "Modernize our foot soldiers to complement our elite cavalry."

mission_develop_polish_artillery:0 "Develop Polish Artillery"
mission_develop_polish_artillery_desc:0 "Build a powerful artillery corps to shatter enemy formations and fortifications."

# === SOUTHERN EXPANSION & OTTOMAN THREAT MISSIONS ===
mission_control_black_sea_coast:0 "Control Black Sea Coast"
mission_control_black_sea_coast_desc:0 "Secure access to the Black Sea to expand our trade and naval influence."

mission_defend_against_ottomans:0 "Defend Against Ottomans"
mission_defend_against_ottomans_desc:0 "Prepare our defenses against the growing Ottoman threat from the south."

mission_secure_danube_frontier:0 "Secure Danube Frontier"
mission_secure_danube_frontier_desc:0 "Fortify our southern borders along the Danube River."

