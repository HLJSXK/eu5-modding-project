l_english:
 # ========== MISSION TITLES AND DESCRIPTIONS ==========
 
 wales_independence_mission_pack: "Welsh Independence Struggle"
 wales_independence_mission_pack_desc: "Lead the Welsh people to independence and establish a sovereign Welsh kingdom."
 wales_independence_expansion_mission_pack_BUTTON_TOOLTIP:0 "Complete missions to secure the control of the Welsh land and unite it under one strong kingdom."
 wales_independence_mission_pack_CRITERIA_DESCRIPTION:0 "Achieve Welsh independence from English rule and establish a strong, united Welsh kingdom."
 
 mission_develop_welsh_heartland: "Develop the Welsh Heartland"
 mission_develop_welsh_heartland_desc: "Strengthen our capital and build a solid economic foundation for the Welsh cause."
 
 mission_unite_welsh_principalities: "Unite the Welsh Principalities"  
 mission_unite_welsh_principalities_desc: "Bring together the fractured Welsh lords under a single banner and purpose."
 
 mission_centralize_welsh_rule: "Centralize Welsh Rule"
 mission_centralize_welsh_rule_desc: "Establish strong central authority to effectively govern a united Wales."
 
 mission_fortify_welsh_borders: "Fortify the Welsh Borders"
 mission_fortify_welsh_borders_desc: "Build castles and fortifications along our mountainous borders to deter English aggression."
 
 mission_raise_welsh_levies: "Raise Welsh Levies"
 mission_raise_welsh_levies_desc: "Muster the famed Welsh longbowmen and prepare our forces for the coming struggle."
 
 mission_strengthen_welsh_identity: "Strengthen Welsh Identity"
 mission_strengthen_welsh_identity_desc: "Promote Welsh culture, language, and traditions to unite our people against foreign domination."
 
 mission_declare_welsh_independence: "Declare Welsh Independence"
 mission_declare_welsh_identity_desc: "Formally break free from English rule and assert Welsh sovereignty."
 
 mission_secure_welsh_borders: "Secure Welsh Borders"
 mission_secure_welsh_borders_desc: "Consolidate our territorial gains and ensure the security of an independent Wales."
 
 mission_establish_welsh_kingdom: "Establish the Welsh Kingdom"
 mission_establish_welsh_kingdom_desc: "Crown a Welsh monarch and establish a proper kingdom that will stand the test of time."

 # ========== EVENT TITLES AND DESCRIPTIONS ==========
 
 wales_independence_events.1.t: "Development of the Welsh Heartland"
 wales_independence_events.1.d: "With our capital growing stronger, we must decide how to best develop the Welsh economy. Should we focus on trade with our neighbors or invest in our domestic infrastructure and mining operations?"
 
 wales_independence_events.2.t: "Uniting the Welsh Lords"
 wales_independence_events.2.d: "As we bring the Welsh principalities together, we face the question of how to integrate them into our realm. Should we use diplomacy and negotiation, or demonstrate military strength to ensure their loyalty?"
 
 wales_independence_events.10.t: "The War for Independence"
 wales_independence_events.10.d: "The struggle for Welsh independence has begun! How shall we conduct our campaign against the English? Should we use our knowledge of the terrain for guerrilla warfare, or rely on our fortified mountain positions?"
 
 wales_independence_events.11.t: "The Welsh Crown"
 wales_independence_events.11.d: "With independence secured, we must decide the future of Welsh governance. Should we establish a council of princes to rule collectively, or crown a strong monarch to lead our new kingdom?"

 # ========== EVENT OPTIONS ==========
 
 wales_independence_events.1.a: "Focus on Trade"
 wales_independence_events.1.b: "Develop Infrastructure"
 
 wales_independence_events.2.a: "Diplomatic Approach"
 wales_independence_events.2.b: "Military Coercion"
 
 wales_independence_events.10.a: "Guerrilla Tactics"
 wales_independence_events.10.b: "Mountain Defense"
 
 wales_independence_events.11.a: "Council of Princes"
 wales_independence_events.11.b: "Strong Monarchy"

 # ========== CUSTOM TOOLTIPS ==========
 
 boosted_trade_tt: "Our trade routes will be strengthened, increasing our commercial income."
 developed_mining_tt: "Our mining operations will be expanded, boosting production and manpower."
 diplomatic_annexation_tt: "We will gain diplomatic advantages for peaceful integration of Welsh lands."
 military_coercion_tt: "Our military tradition and morale will be boosted through demonstrations of strength."
 guerrilla_warfare_tt: "Our forces will excel at hit-and-run tactics and living off the land."
 mountain_warfare_tt: "Our mountain defenses will be enhanced, making Wales impregnable."
 welsh_council_tt: "The treasury will be filled and stability ensured through collective rule."
 welsh_monarchy_tt: "A strong central government will be established with efficient administration."
 welsh_kingdom_established_tt: "The Kingdom of Wales has been established, securing our place among the nations of Europe."

 # ========== MISSION COMPLETION MESSAGES ==========
 
 mission_develop_welsh_heartland_comp: "Our heartland has been developed, providing a strong foundation for the Welsh cause."
 mission_unite_welsh_principalities_comp: "The Welsh principalities are united under our banner, strengthening our position."
 mission_centralize_welsh_rule_comp: "Central authority has been established, allowing for effective governance of Wales."
 mission_fortify_welsh_borders_comp: "Our borders are now fortified with strong castles and defensive positions."
 mission_raise_welsh_levies_comp: "The Welsh levies have been raised, including our famed longbowmen."
 mission_strengthen_welsh_identity_comp: "Welsh culture and identity have been strengthened, uniting our people."
 mission_declare_welsh_independence_comp: "Welsh independence has been declared! The struggle begins."
 mission_secure_welsh_borders_comp: "Our borders are secure and Welsh sovereignty is recognized."
 mission_establish_welsh_kingdom_comp: "The Kingdom of Wales has been established! Long live the Welsh crown!"

 # ========== MODIFIER DESCRIPTIONS ==========
 
 welsh_cultural_revival_desc: "Welsh Cultural Revival - Cultural influence and tradition are flourishing."
 welsh_trade_development_desc: "Welsh Trade Development - Trade income and efficiency have improved."
 welsh_infrastructure_development_desc: "Welsh Infrastructure - Production and local manpower have increased."
 welsh_unification_desc: "Welsh Unification - The estates are satisfied and control is improving."
 centralized_welsh_rule_desc: "Centralized Welsh Rule - Crown power and government efficiency are enhanced."
 welsh_diplomatic_annexation_desc: "Diplomatic Annexation - Our diplomatic reputation and annexation capabilities are strengthened."
 welsh_military_coercion_desc: "Military Coercion - Army tradition, morale, and infantry combat ability are boosted."
 welsh_mountain_defenses_desc: "Welsh Mountain Defenses - Our fortifications are maintained at lower cost and provide superior defense."
 welsh_longbow_traditions_desc: "Welsh Longbow Traditions - Our infantry is disciplined and morale is high, honoring our archery heritage."
 welsh_independence_fervor_desc: "Welsh Independence Fervor - Morale is exceptional and war exhaustion decreases rapidly."
 welsh_guerrilla_warfare_desc: "Welsh Guerrilla Warfare - Our forces excel at irregular warfare and living off the land."
 secure_welsh_borders_desc: "Secure Welsh Borders - Migration, control, and prosperity are increasing throughout Wales."
 kingdom_of_wales_desc: "Kingdom of Wales - Our diplomatic standing and crown authority reflect our royal status."
 welsh_strong_monarchy_desc: "Strong Welsh Monarchy - Government efficiency and building capabilities are enhanced."

