# ========== WELSH THEMATIC FLAVOR ==========

welsh_mountains_flavor: "The mountains of Wales stand as silent sentinels, guarding our ancient traditions and newfound independence."
welsh_longbows_flavor: "From the valleys echo the twang of longbows, a sound that has struck fear into the hearts of invaders for centuries."
welsh_bards_flavor: "The bards sing of ancient kings and heroes, their poetry weaving the tapestry of Welsh identity and resilience."
welsh_dragon_flavor: "The red dragon banner flies proudly, symbolizing the fiery spirit of a people determined to rule their own land."