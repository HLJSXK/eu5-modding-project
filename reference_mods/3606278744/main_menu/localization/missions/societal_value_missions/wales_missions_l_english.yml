 # ========== MISSION PACK DESCRIPTIONS ==========
 
 wales_independence_mission_pack_tooltip: "This mission pack guides Wales through the struggle for independence from English rule and the establishment of a sovereign Welsh kingdom."
 
 # ========== EVENT FLAVOR TEXT ==========
 
 wales_independence_events.1.flavor: "The hills of Wales echo with the sounds of construction and commerce. Our people look to the future with hope."
 wales_independence_events.2.flavor: "The ancient Welsh lords gather, their banners fluttering in the mountain winds. Unity or domination - the choice is ours."
 wales_independence_events.10.flavor: "The dragon standard flies high! From Snowdonia to the Marches, the cry for freedom rings through the valleys."
 wales_independence_events.11.flavor: "In the halls of our ancestors, we decide the fate of a nation. Shall Wales be ruled by council or crown?"

 # ========== MISSION FLAVOR TEXT ==========
 
 mission_develop_flavor: "From the rugged mountains to the coastal plains, we must build an economy that can sustain our dream of independence."
 mission_unite_flavor: "For too long, the Welsh have been divided among squabbling princes. Unity is our strength against the English crown."
 mission_centralize_flavor: "A strong central authority will allow us to speak with one voice and govern our lands effectively."
 mission_fortify_flavor: "Our mountains are our greatest defense. Let us make them impenetrable with stone and steel."
 mission_raise_levies_flavor: "The longbow has long been the terror of our enemies. Let us raise an army worthy of our heritage."
 mission_strengthen_identity_flavor: "Our language, our poetry, our laws - these are what make us Welsh and separate us from the English."
 mission_declare_independence_flavor: "The time for submission is over. Let the world know that Wales will be free!"
 mission_secure_borders_flavor: "Independence is won on the battlefield but secured through strong borders and prosperous lands."
 mission_establish_kingdom_flavor: "From the ashes of struggle rises a kingdom that will stand for centuries. Long live Wales!"

