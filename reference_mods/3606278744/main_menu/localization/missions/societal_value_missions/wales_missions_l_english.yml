STATIC_MODIFIER_DESC_welsh_trade_development:0 "Investment in trade infrastructure has boosted our commercial income and trade efficiency."

STATIC_MODIFIER_NAME_welsh_infrastructure_development:0 "Welsh Infrastructure Development"
STATIC_MODIFIER_DESC_welsh_infrastructure_development:0 "Development of mines and infrastructure has improved production efficiency and local manpower."

STATIC_MODIFIER_NAME_welsh_unification:0 "Welsh Unification"
STATIC_MODIFIER_DESC_welsh_unification:0 "The unification of Welsh principalities has increased estate satisfaction and strengthened regional control."

STATIC_MODIFIER_NAME_centralized_welsh_rule:0 "Centralized Welsh Rule"
STATIC_MODIFIER_DESC_centralized_welsh_rule:0 "Strong central authority has enhanced crown power, government efficiency, and parliamentary support."

STATIC_MODIFIER_NAME_welsh_diplomatic_annexation:0 "Diplomatic Annexation"
STATIC_MODIFIER_DESC_welsh_diplomatic_annexation:0 "Our diplomatic reputation and annexation capabilities have been strengthened through careful negotiation."

STATIC_MODIFIER_NAME_welsh_military_coercion:0 "Military Coercion"
STATIC_MODIFIER_DESC_welsh_military_coercion:0 "Demonstrations of military strength have boosted army tradition, morale, and infantry combat effectiveness."

STATIC_MODIFIER_NAME_welsh_mountain_defenses:0 "Welsh Mountain Defenses"
STATIC_MODIFIER_DESC_welsh_mountain_defenses:0 "Our mountainous terrain provides natural defenses, reducing fort maintenance costs and increasing hostile attrition."

STATIC_MODIFIER_NAME_welsh_fortification_effort:0 "Welsh Fortification Effort"
STATIC_MODIFIER_DESC_welsh_fortification_effort:0 "Concentrated efforts on fortifications have accelerated construction and enhanced local defensiveness."

STATIC_MODIFIER_NAME_welsh_longbow_traditions:0 "Welsh Longbow Traditions"
STATIC_MODIFIER_DESC_welsh_longbow_traditions:0 "The legendary Welsh longbowmen provide superior discipline, infantry power, and morale in battle."

STATIC_MODIFIER_NAME_welsh_independence_fervor:0 "Welsh Independence Fervor"
STATIC_MODIFIER_DESC_welsh_independence_fervor:0 "The passion for Welsh independence boosts morale, reduces war exhaustion, and increases levy sizes."

STATIC_MODIFIER_NAME_welsh_guerrilla_warfare:0 "Welsh Guerrilla Warfare"
STATIC_MODIFIER_DESC_welsh_guerrilla_warfare:0 "Our forces excel at irregular warfare, living off the land while inflicting heavy losses on enemies."

STATIC_MODIFIER_NAME_secure_welsh_borders:0 "Secure Welsh Borders"
STATIC_MODIFIER_DESC_secure_welsh_borders:0 "Secure borders encourage migration, improve regional control, and increase prosperity throughout Wales."

STATIC_MODIFIER_NAME_kingdom_of_wales:0 "Kingdom of Wales"
STATIC_MODIFIER_DESC_kingdom_of_wales:0 "The established Welsh kingdom commands diplomatic respect, crown authority, and efficient fort maintenance."

STATIC_MODIFIER_NAME_welsh_princely_council:0 "Welsh Princely Council"
STATIC_MODIFIER_DESC_welsh_princely_council:0 "The council of Welsh princes provides strong parliamentary support and diplomatic advantages for annexation."

STATIC_MODIFIER_NAME_welsh_strong_monarchy:0 "Strong Welsh Monarchy"
STATIC_MODIFIER_DESC_welsh_strong_monarchy:0 "A powerful centralized monarchy enhances government efficiency and reduces building construction costs."

