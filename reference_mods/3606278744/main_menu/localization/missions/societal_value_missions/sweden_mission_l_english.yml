l_english:
 # Mission Pack
 sweden_mission_pack: "Swedish Mission Tree"
 sweden_mission_pack_desc: "A comprehensive mission tree focusing on Sweden's independence, military reforms, and dominance in the Baltic region."

 # === SWEDISH INDEPENDENCE & CONSOLIDATION ===
 mission_secure_swedish_crown: "Secure the Swedish Crown"
 mission_secure_swedish_crown_desc: "We must secure our independence from foreign domination and establish a stable Swedish monarchy that can guide our nation to greatness."
 mission_secure_swedish_crown_tooltip: "Maintain stability and legitimacy while being independent from Denmark."

 mission_consolidate_svealand: "Consolidate Svealand"
 mission_consolidate_svealand_desc: "The heartland of Sweden must be firmly under our control. By securing Svealand, we establish a strong base from which to expand our influence."
 mission_consolidate_svealand_tooltip: "Secure control over the Svealand region."

 mission_unite_gotaland: "Unite Götaland"
 mission_unite_gotaland_desc: "The southern lands of Götaland are essential for a unified Sweden. We must bring these territories under our rule and gain the support of the local nobility."
 mission_unite_gotaland_tooltip: "Control Götaland region and maintain noble satisfaction."

 mission_develop_stockholm: "Develop Stockholm"
 mission_develop_stockholm_desc: "Our capital should become a center of trade and administration worthy of a great power. Let us develop Stockholm into a city that rivals the great capitals of Europe."
 mission_develop_stockholm_tooltip: "Develop Stockholm into a prosperous capital with strong commercial infrastructure."

 # === MILITARY REFORMS & ARMY DEVELOPMENT ===
 mission_reform_swedish_army: "Reform the Swedish Army"
 mission_reform_swedish_army_desc: "Our military must be modernized and professionalized to compete with the great powers of Europe. Let us implement reforms that will make our army feared across the continent."
 mission_reform_swedish_army_tooltip: "Maintain a strong army and crown estate power."

 mission_establish_caroleans: "Establish the Caroleans"
 mission_establish_caroleans_desc: "The Carolean army will become an elite fighting force, known for its discipline and ferocity in battle. These professional soldiers will be the backbone of our military might."
 mission_establish_caroleans_tooltip: "Achieve high army tradition and build armories across the country."

 mission_implement_indelta_system: "Implement the Indelta System"
 mission_implement_indelta_system_desc: "The Indelta system will provide us with a reliable source of trained soldiers by assigning specific farms to support specific regiments. This will ensure we never lack for manpower."
 mission_implement_indelta_system_tooltip: "Maintain sufficient manpower reserves and crown estate influence."

 # === NAVAL DEVELOPMENT PATH ===
 mission_build_swedish_navy: "Build a Swedish Navy"
 mission_build_swedish_navy_desc: "To secure our interests in the Baltic, we need a powerful navy. Let us construct a fleet that can protect our coasts and project our power across the sea."
 mission_build_swedish_navy_tooltip: "Build a substantial navy and develop port infrastructure."

 mission_establish_naval_dominance: "Establish Naval Dominance"
 mission_establish_naval_dominance_desc: "The Baltic Sea should be a Swedish lake. With a powerful fleet and strong naval tradition, we can ensure that no foreign power challenges our control of these waters."
 mission_establish_naval_dominance_tooltip: "Achieve high navy tradition and maintain a large fleet."

 # === BALTIC DOMINANCE PATH ===
 mission_secure_baltic_coast: "Secure the Baltic Coast"
 mission_secure_baltic_coast_desc: "The Baltic coastlines are vital for trade and security. By controlling these shores, we can dominate regional commerce and protect our heartland from naval threats."
 mission_secure_baltic_coast_tooltip: "Control strategic locations along the Baltic coast."

 mission_challenge_danish_hegemony: "Challenge Danish Hegemony"
 mission_challenge_danish_hegemony_desc: "The Danes have long dominated Scandinavia. It is time to challenge their position and establish Swedish preeminence in the Nordic region."
 mission_challenge_danish_hegemony_tooltip: "Rival Denmark and achieve military parity."

 mission_dominate_baltic_sea: "Dominate the Baltic Sea"
 mission_dominate_baltic_sea_desc: "Complete control of the Baltic Sea will make Sweden the undisputed power of Northern Europe. Let us ensure that all trade and navigation in these waters answers to Stockholm."
 mission_dominate_baltic_sea_tooltip: "Achieve naval supremacy in the Baltic region."

 # === ECONOMIC DEVELOPMENT PATH ===
 mission_develop_mining_industry: "Develop Mining Industry"
 mission_develop_mining_industry_desc: "Our lands are rich in copper and iron. By developing these resources, we can build a powerful economic base that will fund our military ambitions and make Sweden wealthy."
 mission_develop_mining_industry_tooltip: "Develop copper and iron production to target levels."

 mission_establish_iron_exports: "Establish Iron Exports"
 mission_establish_iron_exports_desc: "Swedish iron is among the finest in Europe. Let us establish a monopoly on its export, making our nation essential to the arms industries of the continent."
 mission_establish_iron_exports_tooltip: "Dominate the iron trade and maintain burgher satisfaction."

 mission_develop_lumber_industry: "Develop Lumber Industry"
 mission_develop_lumber_industry_desc: "Our vast forests provide excellent timber for shipbuilding and construction. A developed lumber industry will support our navy and provide valuable exports."
 mission_develop_lumber_industry_tooltip: "Develop lumber production and processing facilities."

 # === RELIGIOUS REFORMATION PATH ===
 mission_embrace_reformation: "Embrace the Reformation"
 mission_embrace_reformation_desc: "The Protestant Reformation offers an opportunity to break with Rome and establish a national church. Let us embrace Lutheranism and guide our people in this new religious direction."
 mission_embrace_reformation_tooltip: "Adopt Lutheranism and maintain religious unity."

 mission_establish_state_church: "Establish State Church"
 mission_establish_state_church_desc: "A national Lutheran church under royal control will strengthen the state and reduce foreign religious influence. Let us build the Church of Sweden as a pillar of our nation."
 mission_establish_state_church_tooltip: "Build cathedrals and convert the population to Lutheranism."

 mission_protestant_leadership: "Protestant Leadership"
 mission_protestant_leadership_desc: "As a leading Protestant power, we should form alliances with other reformed nations and protect the cause against Catholic powers. Sweden shall become the shield of Protestantism."
 mission_protestant_leadership_tooltip: "Form alliances with Protestant nations and maintain high prestige."

 # === CULTURAL & EDUCATIONAL DEVELOPMENT ===
 mission_promote_swedish_culture: "Promote Swedish Culture"
 mission_promote_swedish_culture_desc: "A strong national identity will unite our people and distinguish us from our neighbors. Let us promote Swedish language, customs, and traditions throughout our realm."
 mission_promote_swedish_culture_tooltip: "Establish Swedish cultural dominance and build cultural infrastructure."

 mission_establish_uppsala_university: "Establish Uppsala University"
 mission_establish_uppsala_university_desc: "A great university will advance knowledge, train administrators, and enhance our prestige. Let us make Uppsala a center of learning that attracts scholars from across Europe."
 mission_establish_uppsala_university_tooltip: "Develop Uppsala with a university and high development."

 mission_promote_nordic_science: "Promote Nordic Science"
 mission_promote_nordic_science_desc: "Scientific advancement will propel Sweden into modernity. By supporting research and education, we can achieve technological superiority over our rivals."
 mission_promote_nordic_science_tooltip: "Build multiple universities and achieve high literacy rates."

 # === EXPANSION & EMPIRE BUILDING ===
 mission_secure_finland: "Secure Finland"
 mission_secure_finland_desc: "Finland is our eastern shield and a source of valuable resources and manpower. We must secure complete control over this territory to protect our heartland."
 mission_secure_finland_tooltip: "Establish firm control over Finland."

 mission_expand_into_baltics: "Expand into the Baltics"
 mission_expand_into_baltics_desc: "The Baltic provinces offer rich trading cities and strategic positions. By expanding eastward, we can control the entire Baltic coastline and its lucrative trade routes."
 mission_expand_into_baltics_tooltip: "Gain territory in the eastern Baltic region."

 mission_intervene_in_germany: "Intervene in Germany"
 mission_intervene_in_germany_desc: "The German states are divided and weak. This presents an opportunity for Swedish intervention to gain influence, territory, and prestige in the heart of Europe."
 mission_intervene_in_germany_tooltip: "Establish a foothold in Germany with high army tradition and prestige."

 # === GREAT POWER DIPLOMACY ===
 mission_counter_russian_expansion: "Counter Russian Expansion"
 mission_counter_russian_expansion_desc: "The growing power of Russia threatens our eastern borders. We must contain their expansion and maintain Swedish dominance in the Baltic region."
 mission_counter_russian_expansion_tooltip: "Rival Russia and achieve military parity."

 mission_establish_protestant_alliances: "Establish Protestant Alliances"
 mission_establish_protestant_alliances_desc: "As a leading Protestant power, we should form a network of alliances with other reformed states to counter Catholic hegemony and protect our religious interests."
 mission_establish_protestant_alliances_tooltip: "Form multiple alliances with Protestant nations."

 # === MAJOR ACHIEVEMENTS ===
 mission_swedish_empire: "Swedish Empire"
 mission_swedish_empire_desc: "Through military might, economic development, and strategic expansion, Sweden has risen to become a true empire. Let us consolidate our gains and prepare for even greater achievements."
 mission_swedish_empire_tooltip: "Achieve great power status with high prestige and development."

 mission_baltic_hegemony: "Baltic Hegemony"
 mission_baltic_hegemony_desc: "The Baltic Sea is ours to command. With undisputed control over these waters and their shores, Sweden stands as the dominant power of Northern Europe."
 mission_baltic_hegemony_tooltip: "Achieve complete dominance in the Baltic region."

 # === EVENT TITLES AND DESCRIPTIONS ===
 # Event 1: Securing the Swedish Crown
 sweden_mission_events.1.t: "The Swedish Crown Secured"
 sweden_mission_events.1.d: "With the crown firmly placed upon our head and the nobility's support secured, Sweden stands united under a single monarch. The path to independence and greatness lies open before us."
 sweden_mission_events.1.a: "Reward the supportive nobility"
 sweden_mission_events.1.b: "Strengthen royal authority"

 # Event 2: Swedish Military Reforms
 sweden_mission_events.2.t: "Military Reforms Implemented"
 sweden_mission_events.2.d: "Our army has been thoroughly reformed with new tactics, training methods, and organization. The Swedish military is becoming a professional force that can stand against any European power."
 sweden_mission_events.2.a: "Focus on quality and innovation"
 sweden_mission_events.2.b: "Expand the professional corps"

 # Event 3: Challenging Danish Hegemony
 sweden_mission_events.3.t: "Challenging Danish Dominance"
 sweden_mission_events.3.d: "The time has come to openly challenge Danish hegemony in Scandinavia. Our growing strength allows us to contest their control of the region and establish Swedish preeminence."
 sweden_mission_events.3.a: "Prepare for confrontation"
 sweden_mission_events.3.b: "Consolidate our position first"

 # Event 4: Mining Industry Development
 sweden_mission_events.4.t: "Mining Industry Boom"
 sweden_mission_events.4.d: "Our mining operations have expanded dramatically, with new techniques and infrastructure making Swedish copper and iron production the envy of Europe. The wealth from these resources flows into our treasury."
 sweden_mission_events.4.a: "Invest in mining communities"
 sweden_mission_events.4.b: "Focus on technological advancement"

 # Event 5: Swedish Empire Achievement
 sweden_mission_events.5.t: "The Swedish Empire"
 sweden_mission_events.5.d: "Sweden has risen from a regional power to a true empire. Our territories span the Baltic, our armies are feared, and our influence extends across Europe. We stand among the great powers of the continent."
 sweden_mission_events.5.a: "Embrace imperial grandeur"
 sweden_mission_events.5.b: "Focus on military supremacy"

 # Event 6: Uniting Gotaland
 sweden_mission_events.6.t: "Götaland United"
 sweden_mission_events.6.d: "The integration of Götaland into the Swedish realm is complete. The southern provinces now contribute their resources and manpower to the strength of the unified kingdom."
 sweden_mission_events.6.a: "Promote regional integration"
 sweden_mission_events.6.b: "Encourage economic development"

 # Event 7: Implementing the Indelta System
 sweden_mission_events.7.t: "The Indelta System"
 sweden_mission_events.7.d: "The Indelta system has been successfully implemented, providing us with a reliable source of trained soldiers. Each regiment is now supported by specific farms, ensuring a steady flow of manpower."
 sweden_mission_events.7.a: "Focus on efficiency"
 sweden_mission_events.7.b: "Build trained reserves"

 # Event 8: Embracing the Reformation
 sweden_mission_events.8.t: "The Swedish Reformation"
 sweden_mission_events.8.d: "Sweden has officially embraced the Lutheran Reformation, breaking with Rome and establishing a national church. This religious transformation has profound implications for our state and society."
 sweden_mission_events.8.a: "Embrace Lutheran zeal"
 sweden_mission_events.8.b: "Promote religious tolerance"

 # Event 9: Protestant Leadership
 sweden_mission_events.9.t: "Protestant Leadership"
 sweden_mission_events.9.d: "Sweden has emerged as a leader of the Protestant cause in Europe. Other reformed nations look to us for guidance and protection against Catholic powers."
 sweden_mission_events.9.a: "Become the Protestant champion"
 sweden_mission_events.9.b: "Build international Protestant solidarity"

 # Event 10: Intervention in Germany
 sweden_mission_events.10.t: "Intervention in Germany"
 sweden_mission_events.10.d: "Our armies have marched into Germany, establishing a Swedish presence in the heart of Europe. This intervention brings both opportunities for expansion and risks of entanglement in complex conflicts."
 sweden_mission_events.10.a: "Pursue an aggressive campaign"
 sweden_mission_events.10.b: "Focus on strategic occupation"

