l_english:
 # Mission Pack
 portugal_mission_pack: "Portuguese Mission Tree"
 portugal_mission_pack_desc: "A comprehensive mission tree focusing on Portugal's consolidation, maritime expansion, and global empire building."

 # === PORTUGUESE CONSOLIDATION PATH ===
 mission_secure_portuguese_order: "Secure Portuguese Order"
 mission_secure_portuguese_order_desc: "With the turmoil of the past behind us, we must secure our homeland and establish firm control over all Portuguese territories to ensure our future prosperity and security."
 mission_secure_portuguese_order_tooltip: "Maintain stability with noble support."

 mission_develop_lisbon: "Develop Lisbon"
 mission_develop_lisbon_desc: "Our capital Lisbon stands at the crossroads of Europe and the Atlantic. By developing it into a major commercial hub, we can establish Portugal as a center of trade and commerce."
 mission_develop_lisbon_tooltip: "Develop Lisbon into a prosperous capital with strong commercial infrastructure."

 mission_strengthen_monarchy: "Strengthen the Monarchy"
 mission_strengthen_monarchy_desc: "The Avis dynasty must consolidate its power and establish firm control over the kingdom. By balancing the interests of the nobility with royal authority, we can build a stable and powerful monarchy."
 mission_strengthen_monarchy_tooltip: "Strengthen royal authority and maintain noble support."

 # === MARITIME EXPANSION PATH ===
 mission_build_portuguese_navy: "Build the Portuguese Navy"
 mission_build_portuguese_navy_desc: "To explore the unknown seas and protect our trade routes, we must build a powerful navy capable of projecting Portuguese power across the oceans."
 mission_build_portuguese_navy_tooltip: "Establish a formidable naval force with proper shipbuilding infrastructure."

 mission_explore_african_coast: "Explore the African Coast"
 mission_explore_african_coast_desc: "The African coast holds untold riches and opportunities. By sending expeditions southward, we can establish trading posts and discover new routes to the wealth of the East."
 mission_explore_african_coast_tooltip: "Discover and chart the West African coastline."

 mission_establish_trading_posts: "Establish Trading Posts"
 mission_establish_trading_posts_desc: "With knowledge of the African coast comes opportunity. By establishing fortified trading posts, we can monopolize the trade in gold, ivory, and slaves, bringing immense wealth to Portugal."
 mission_establish_trading_posts_tooltip: "Establish a network of trading posts along the African coast."

 # === NORTH AFRICAN EXPANSION PATH ===
 mission_ceuta_expedition: "The Ceuta Expedition"
 mission_ceuta_expedition_desc: "The strategic city of Ceuta controls access to the Mediterranean. Capturing this stronghold from the Moroccans would give us a foothold in North Africa and demonstrate our military prowess."
 mission_ceuta_expedition_tooltip: "Capture the strategic city of Ceuta from Moroccan control."

 mission_secure_strait_of_gibraltar: "Secure the Strait of Gibraltar"
 mission_secure_strait_of_gibraltar_desc: "With Ceuta under our control, we must expand our influence along the coast. Establishing forts and securing key ports will protect our interests and provide bases for future expeditions."
 mission_secure_strait_of_gibraltar_tooltip: "Establish Portuguese control over the Strait of Gibraltar."

 # === ATLANTIC EXPLORATION PATH ===
 mission_discover_azores: "Discover the Azores"
 mission_discover_azores_desc: "Venture into the deep Atlantic to discover and claim the Azores archipelago. These islands will serve as vital waystations for our future voyages and colonies."
 mission_discover_azores_tooltip: "Discover and claim the Azores islands."

 mission_colonize_kongo: "Colonize Kongo"
 mission_colonize_kongo_desc: "It is time to extend our reach further into Africa. By establishing a colony in the area of Kongo, we can secure valuable resources and create a foothold for further expansion into the continent."
 mission_colonize_kongo_tooltip: "Time to claim our African foothold in Kongo."

 # === ECONOMIC DEVELOPMENT PATH ===
 mission_develop_port_wine: "Develop Port Wine Production"
 mission_develop_port_wine_desc: "Our unique fortified wine has gained popularity across Europe. By expanding vineyards and improving production, we can turn this local specialty into a major export commodity."
 mission_develop_port_wine_tooltip: "Expand wine production and establish Portugal as a major wine exporter."

 mission_establish_fishing_industry: "Establish Fishing Industry"
 mission_establish_fishing_industry_desc: "The rich fishing grounds off our coast provide both food and economic opportunity. Developing a proper fishing industry will feed our people and create valuable trade goods."
 mission_establish_fishing_industry_tooltip: "Develop a robust fishing industry along the Portuguese coast."

 # === DIPLOMATIC PATH ===
 mission_english_alliance: "The English Alliance"
 mission_english_alliance_desc: "England shares our maritime interests and opposes our common rivals. A strong alliance with the English would provide security and open new opportunities for cooperation."
 mission_english_alliance_tooltip: "Forge a lasting alliance with England."

 mission_counter_castilian_influence: "Counter Castilian Influence"
 mission_counter_castilian_influence_desc: "Our larger neighbor Castile has long eyed our kingdom. By strengthening our position and maintaining good relations while asserting our independence, we can ensure Portugal remains sovereign."
 mission_counter_castilian_influence_tooltip: "Maintain Portuguese independence against Castilian ambitions."

 # === COLONIAL EXPANSION PATH ===
 mission_establish_brazilian_colony: "Establish Brazilian Colony"
 mission_establish_brazilian_colony_desc: "The vast lands across the Atlantic offer unprecedented opportunities. By establishing colonies in Brazil, we can secure valuable resources and expand Portuguese influence in the New World."
 mission_establish_brazilian_colony_tooltip: "Establish Portuguese colonies in Brazil."

 # === TRADE EXPANSION PATH ===
 mission_establish_india_trade: "Establish India Trade"
 mission_establish_india_trade_desc: "The riches of India - spices, silks, and gems - are legendary. By establishing direct trade relations and securing trading posts, we can bypass intermediaries and bring immense wealth to Portugal."
 mission_establish_india_trade_tooltip: "Establish direct trade routes and posts in India."

 # === MAJOR ACHIEVEMENTS ===
 mission_route_to_indies: "Route to the Indies"
 mission_route_to_indies_desc: "We have established the sea route to the Indies, connecting Europe directly with the wealth of Asia. This monumental achievement cements Portugal's position as a global maritime power."
 mission_route_to_indies_tooltip: "Complete the establishment of the sea route to Asia."

 mission_portuguese_empire: "The Portuguese Empire"
 mission_portuguese_empire_desc: "From the shores of Europe to the coasts of Africa, Asia, and the Americas, Portuguese influence spans the globe. We have built an empire upon which the sun never sets."
 mission_portuguese_empire_tooltip: "Establish Portugal as a global empire spanning multiple continents."

 # === EVENT LOCALIZATION ===
 portugal_mission_events.1.t: "Consolidation of the Realm"
 portugal_mission_events.1.d: "With internal stability achieved, we must decide how to focus our efforts. Some advocate for infrastructure development to strengthen our economy, while others argue for military preparedness to defend our gains."
 portugal_mission_events.1.a: "Focus on Infrastructure"
 portugal_mission_events.1.b: "Strengthen the Military"

 portugal_mission_events.2.t: "The Call of the Sea"
 portugal_mission_events.2.d: "Our naval capabilities have grown significantly, opening new possibilities. Some advisors urge us to focus on exploration and discovery, while others emphasize the immediate profits from expanded trade networks."
 portugal_mission_events.2.a: "Embrace Exploration"
 portugal_mission_events.2.b: "Focus on Trade"

 portugal_mission_events.3.t: "Atlantic Ambitions"
 portugal_mission_events.3.d: "The discovery of the Azores has revealed the potential of Atlantic colonization. We must decide whether to focus on developing these new settlements for long-term growth or strengthening our naval presence to protect our expanding interests."
 portugal_mission_events.3.a: "Develop Settlements"
 portugal_mission_events.3.b: "Strengthen Naval Presence"

 portugal_mission_events.10.t: "The Moroccan Question"
 portugal_mission_events.10.d: "Our foothold in North Africa presents both opportunities and challenges. Some commanders advocate for aggressive expansion and religious fervor, while others prefer consolidating our gains with strong defensive positions."
 portugal_mission_events.10.a: "Crusading Zeal"
 portugal_mission_events.10.b: "Strategic Fortifications"

 portugal_mission_events.11.t: "The Spice Route"
 portugal_mission_events.11.d: "We stand at the threshold of controlling the spice trade. The choice is before us: should we focus on maximizing our economic gains through trade monopolies, or ensure our naval supremacy to protect these valuable routes from competitors?"
 portugal_mission_events.11.a: "Trade Monopoly"
 portugal_mission_events.11.b: "Naval Supremacy"

 portugal_mission_events.12.t: "A Global Empire"
 portugal_mission_events.12.d: "Portugal has achieved what few nations could dream of - a truly global empire. As we look to the future, we must decide how to govern this vast domain. Some advocate for strong centralized administration, while others believe our trade networks should be the priority."
 portugal_mission_events.12.a: "Imperial Administration"
 portugal_mission_events.12.b: "Global Trade Network"

 portugal_mission_events.13.t: "Reach Across the Straits"
 portugal_mission_events.13.d: "The Portuguese standard now flies over a new Moroccan city and we secured control of the Strait of Gibraltar. However, this solitary foothold is not enough to truly secure the Faith or our trade interests. Our field commanders urge us to press our momentum, arguing that these coastal lands are ours by divine right and strategic necessity. Their demands are costly, but the reward is complete dominance over the Straits. Our burghers urge us to consider the economic strain this war could impose on our growing empire. We must choose our next steps wisely."
 portugal_mission_events.13.a: "We will control the coast, the price is small."
 portugal_mission_events.13.b: "We are in no need of that land, we shall consolidate our hold."


