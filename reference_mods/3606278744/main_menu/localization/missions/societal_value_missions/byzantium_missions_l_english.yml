# NEW EVENT 50: The Eagle Rises Again (Forming Rome Decision)
byz_mission_events.50.t: "The Eagle Rises Again"
byz_mission_events.50.d: "After centuries of struggle the time has come to decide whether Byzantium will claim the legacy of Rome. This monumental decision will reshape our place in Christendom and the world."
byz_mission_events.50.a: "Proclaim the Roman Empire"
byz_mission_events.50.a.tt: "Declare the restoration of the Roman Empire—gain prestige, legitimacy, and military might, but expect rivals to react strongly."
byz_mission_events.50.b: "Put Forward an Imperial Claimant"
byz_mission_events.50.b.tt: "Name a pretender to the Roman throne to rally support while avoiding the immediate costs and risks of full restoration."
byz_mission_events.50.c: "Delay and Consolidate"
byz_mission_events.50.c.tt: "Postpone the declaration to strengthen our internal position and ensure the empire can withstand the consequences of such a claim."