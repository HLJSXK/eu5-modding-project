l_english:

# ============================================================================
# MISSION PACK
# ============================================================================

byzantium_mission_pack: "Byzantine Restoration"
byzantium_mission_pack_desc: "A comprehensive mission tree focusing on the survival, consolidation, and restoration of the Eastern Roman Empire to its former glory."
byzantium_mission_pack_BUTTON_TOOLTIP:0 "Complete missions to strengthen the Byzantine Empire."
byzantium_mission_pack_CRITERIA_DESCRIPTION:0 "Complete missions as the Byzantine Empire and restore its former glory."

# ============================================================================
# BYZANTINE SURVIVAL & CONSOLIDATION
# ============================================================================

mission_secure_constantinople: "Secure Constantinople"
mission_secure_constantinople_desc: "Our capital, the New Rome, must be made impregnable. Restore the Theodosian Walls to their former glory and ensure that Constantinople remains the jewel of Christendom."
mission_secure_constantinople_tooltip: "Restore the defenses of Constantinople and ensure its security."

mission_consolidate_thrace: "Consolidate Thrace"
mission_consolidate_thrace_desc: "The hinterlands of Constantinople are vital for our survival. By securing the Thracian countryside, we ensure a steady supply of food and manpower for our capital."
mission_consolidate_thrace_tooltip: "Secure control over the Thracian countryside."

mission_curtail_nobles_power: "Curtail the Nobles' Power"
mission_curtail_nobles_desc: "The powerful landed aristocracy has long challenged imperial authority. By restoring the power of the Crown, we can reassert central control and strengthen the monarchy."
mission_curtail_nobles_tooltip: "Reduce noble influence and strengthen imperial authority."

mission_restore_greek_fire: "Restore Greek Fire"
mission_restore_greek_fire_desc: "The secret weapon of our ancestors, Greek Fire, gave us mastery of the seas. Rediscover this technology and restore our naval supremacy in the Mediterranean."
mission_restore_greek_fire_tooltip: "Rediscover the secret of Greek Fire for naval dominance."

# ============================================================================
# NAVAL REVIVAL & TRADE
# ============================================================================

mission_repair_golden_horn: "Repair the Golden Horn"
mission_repair_golden_horn_desc: "The natural harbor of the Golden Horn was once the greatest shipbuilding center in the world. Restore its docks and shipyards to rebuild our naval might."
mission_repair_golden_horn_tooltip: "Restore the shipbuilding facilities of the Golden Horn."

mission_rebuild_byzantine_navy: "Rebuild the Byzantine Navy"
mission_rebuild_byzantine_navy_desc: "The sea has always been our domain. Construct a new fleet worthy of the Roman Empire, capable of projecting power across the Mediterranean and defending our trade."
mission_rebuild_byzantine_navy_tooltip: "Construct a powerful fleet to control the seas."

mission_dominate_bosporus: "Dominate the Bosporus"
mission_dominate_bosporus_desc: "Who controls the Bosporus controls the trade between East and West. Secure both shores of this vital strait to collect tolls and control maritime traffic."
mission_dominate_bosporus_tooltip: "Secure control of the Bosporus Strait."

mission_secure_aegean: "Secure the Aegean"
mission_secure_aegean_desc: "The Aegean Sea is the heart of our empire. Clear it of pirates and rivals to restore our dominance over these ancient shipping lanes."
mission_secure_aegean_tooltip: "Establish Byzantine control over the Aegean Sea."

# ============================================================================
# RECONQUEST OF GREECE
# ============================================================================

mission_recover_thessaloniki: "Recover Thessaloniki"
mission_recover_thessaloniki_desc: "Thessaloniki, the co-capital of our empire, must be liberated from foreign occupation. Restoring this great city will provide us with a second power base."
mission_recover_thessaloniki_tooltip: "Liberate and restore the great city of Thessaloniki."

mission_secure_athens: "Secure Athens"
mission_secure_athens_desc: "Athens, the birthplace of philosophy and learning, has fallen into decline. Restore its academy and make it a center of Hellenic culture once more."
mission_secure_athens_tooltip: "Restore Athens as a center of learning and culture."

mission_reconstruct_hexamilion: "Reconstruct the Hexamilion"
mission_reconstruct_hexamilion_desc: "The great wall across the Isthmus of Corinth protected the Peloponnese for centuries. Rebuild this formidable defensive line to secure southern Greece."
mission_reconstruct_hexamilion_tooltip: "Rebuild the Hexamilion wall to defend the Peloponnese."

mission_unite_morea: "Unite Morea"
mission_unite_morea_desc: "The Peloponnese, known as Morea, is our breadbasket and fortress. Unite its fractious lords under imperial authority to create a secure southern stronghold."
mission_unite_morea_tooltip: "Unite the Peloponnese under Byzantine control."

# ============================================================================
# ANATOLIAN RECONQUEST
# ============================================================================

mission_cross_into_anatolia: "Cross into Anatolia"
mission_cross_into_anatolia_desc: "Asia Minor, the heartland of our empire, lies just across the Bosporus. Re-establish our presence in Anatolia to begin the reconquest of our eastern provinces."
mission_cross_into_anatolia_tooltip: "Establish a foothold in Anatolia."

mission_liberate_nicaea: "Liberate Nicaea"
mission_liberate_nicaea_desc: "Nicaea, the site of two great church councils, is a city of immense religious significance. Liberating it will inspire our people and demonstrate our commitment to Orthodoxy."
mission_liberate_nicaea_tooltip: "Liberate the holy city of Nicaea."

mission_recover_bithynia: "Recover Bithynia"
mission_recover_bithynia_desc: "Bithynia was once among the wealthiest and most loyal provinces of the empire. Restore imperial control over this strategic region on the Asian shore."
mission_recover_bithynia_tooltip: "Secure the province of Bithynia."

mission_secure_aegean_coast: "Secure the Aegean Coast"
mission_secure_aegean_coast_desc: "The Aegean coast of Anatolia, with its ancient Greek cities and prosperous ports, must be brought back under our control to secure our trade routes."
mission_secure_aegean_coast_tooltip: "Secure the Anatolian Aegean coast."

mission_break_ottoman_power: "Break Ottoman Power"
mission_break_ottoman_power_desc: "The Ottoman Turks have been our greatest enemy. Crush their power completely, either by destroying their state or reducing them to a subject, to ensure they never threaten us again."
mission_break_ottoman_power_tooltip: "Permanently neutralize the Ottoman threat."

mission_restore_anatolian_themes: "Restore the Anatolian Themes"
mission_restore_anatolian_themes_desc: "The theme system was the backbone of our military and administrative strength. Restore this ancient system in Anatolia to provide for our defense and governance."
mission_restore_anatolian_themes_tooltip: "Re-establish the theme system in Anatolia."

# ============================================================================
# BALKAN RECONQUEST
# ============================================================================

mission_subjugate_bulgaria: "Subjugate Bulgaria"
mission_subjugate_bulgaria_desc: "The Bulgarians have been both allies and enemies through the centuries. Bring them firmly under our control, either by conquest or vassalage, to secure our northern border."
mission_subjugate_bulgaria_tooltip: "Bring Bulgaria under Byzantine control."

mission_secure_serbia: "Secure Serbia"
mission_secure_serbia_desc: "The Serbian principalities control vital mountain passes and resources. Secure their loyalty or subjugation to protect our western flank."
mission_secure_serbia_tooltip: "Establish Byzantine influence over Serbia."

mission_secure_bosnia: "Secure Bosnia"
mission_secure_bosnia_desc: "Bosnia's strategic position makes it crucial for controlling the western Balkans. Extend our influence into this region to complete our dominance of the peninsula."
mission_secure_bosnia_tooltip: "Secure control over Bosnia."

# ============================================================================
# RELIGIOUS & CULTURAL REVIVAL
# ============================================================================

mission_restore_hagia_sophia: "Restore Hagia Sophia"
mission_restore_hagia_sophia_desc: "The Great Church, Hagia Sophia, stands as the supreme achievement of Byzantine architecture. Restore it to its former glory as the spiritual center of Orthodoxy."
mission_restore_hagia_sophia_tooltip: "Restore the Great Church to its former glory."

mission_protect_mount_athos: "Protect Mount Athos"
mission_protect_mount_athos_desc: "The Holy Mountain of Athos is the spiritual heart of Orthodox monasticism. Ensure its independence and prosperity as a center of prayer and learning."
mission_protect_mount_athos_tooltip: "Protect and support the monastic community of Mount Athos."

mission_revive_constantinople_university: "Revive the University of Constantinople"
mission_revive_constantinople_university_desc: "The University of Constantinople was once the greatest center of learning in Christendom. Re-establish it to train administrators, scholars, and theologians for our empire."
mission_revive_constantinople_university_tooltip: "Re-establish the University of Constantinople."

mission_restore_orthodox_patriarchates: "Restore the Orthodox Patriarchates"
mission_restore_orthodox_patriarchates_desc: "As the successor to Rome, Constantinople must reassert its leadership over the Orthodox world. Restore our influence over the ancient patriarchates."
mission_restore_orthodox_patriarchates_tooltip: "Re-establish Byzantine leadership of Orthodoxy."

# ============================================================================
# TRADE & ECONOMIC DEVELOPMENT
# ============================================================================

mission_develop_silk_trade: "Develop the Silk Trade"
mission_develop_silk_trade_desc: "Constantinople sits at the crossroads of the Silk Road. Revive and control this lucrative trade to fill our coffers with gold."
mission_develop_silk_trade_tooltip: "Control and profit from the silk trade."

mission_control_black_sea_trade: "Control Black Sea Trade"
mission_control_black_sea_trade_desc: "The Black Sea provides access to the riches of the steppes and Russia. Dominate its trade to secure grain, furs, and other valuable commodities."
mission_control_black_sea_tooltip: "Establish Byzantine dominance over Black Sea trade."

# ============================================================================
# GRAND RECONQUEST & EMPIRE BUILDING
# ============================================================================

mission_recover_antioch: "Recover Antioch"
mission_recover_antioch_desc: "Antioch, the ancient capital of Syria and seat of a patriarchate, must be restored to Orthodox hands. Its liberation will signal our resurgence in the East."
mission_recover_antioch_tooltip: "Liberate the great city of Antioch."

mission_recover_alexandria: "Recover Alexandria"
mission_recover_alexandria_desc: "Alexandria, with its great library and strategic port, was the gateway to Egypt. Reclaim this ancient center of learning and commerce."
mission_recover_alexandria_tooltip: "Liberate the city of Alexandria."

mission_recover_jerusalem: "Recover Jerusalem"
mission_recover_jerusalem_desc: "Jerusalem, the holiest city in Christendom, must be freed from infidel rule. Its liberation would be the greatest triumph of our faith and empire."
mission_recover_jerusalem_tooltip: "Liberate Jerusalem for Christendom."

mission_restore_pentarchy: "Restore the Pentarchy"
mission_restore_pentarchy_desc: "The five ancient patriarchates of Christendom - Rome, Constantinople, Alexandria, Antioch, and Jerusalem - must be united under Orthodox leadership once more."
mission_restore_pentarchy_tooltip: "Restore the ancient Pentarchy under Orthodox unity."

mission_restore_roman_empire: "Restore the Roman Empire"
mission_restore_roman_empire_desc: "The dream of every Byzantine emperor: to restore the Roman Empire in its entirety. Unite Italy, the Balkans, and Anatolia under our rule to make this dream a reality."
mission_restore_roman_empire_tooltip: "Reunite the core territories of the Roman Empire."

# ============================================================================
# RELIGIOUS & DIPLOMATIC BRANCHES
# ============================================================================

mission_establish_orthodox_hegemony: "Establish Orthodox Hegemony"
mission_establish_orthodox_hegemony_desc: "Make Constantinople the undisputed center of Orthodox Christianity, leading all true believers against the infidel and heretic."
mission_establish_orthodox_hegemony_tooltip: "Establish Byzantine leadership of the Orthodox world."

mission_counter_islamic_threat: "Counter the Islamic Threat"
mission_counter_islamic_threat_desc: "The Muslim powers that surround us threaten our very existence. Take the fight to them and push back the tide of Islam."
mission_counter_islamic_threat_tooltip: "Counter the expansion of Muslim powers."

mission_purge_anatolian_heretics: "Purge Anatolian Heretics"
mission_purge_anatolian_heretics_desc: "Anatolia has fallen into heresy and apostasy. Return it to the true faith through conversion and, where necessary, force."
mission_purge_anatolian_heretics_tooltip: "Restore Orthodox Christianity throughout Anatolia."

mission_consolidate_orthodox_subjects: "Consolidate Orthodox Subjects"
mission_consolidate_orthodox_subjects_desc: "Our Orthodox vassals should be loyal extensions of our power. Strengthen their ties to the empire and ensure their cooperation."
mission_consolidate_orthodox_subjects_tooltip: "Strengthen relations with Orthodox vassals."

mission_promote_greek_culture: "Promote Greek Culture"
mission_promote_greek_culture_desc: "The Greek language and culture are the foundation of our civilization. Promote Hellenism throughout our lands to strengthen our identity."
mission_promote_greek_culture_tooltip: "Spread Greek culture throughout the empire."

mission_spread_greek_culture_anatolia: "Spread Greek Culture in Anatolia"
mission_spread_greek_culture_anatolia_desc: "Anatolia was once thoroughly Greek. Re-Hellenize this land through settlement, education, and cultural revival."
mission_spread_greek_culture_anatolia_tooltip: "Re-establish Greek culture in Anatolia."

mission_improve_subject_relations: "Improve Subject Relations"
mission_improve_subject_relations_desc: "A content vassal is a loyal vassal. Strengthen the bonds with our subject states to ensure their continued support."
mission_improve_subject_relations_tooltip: "Improve relations with all subject states."

# ============================================================================
# EVENT LOCALIZATION - UPDATED TOOLTIPS
# ============================================================================

byz_mission_events.1.t: "The Theodosian Walls Restored"
byz_mission_events.1.d: "The great Theodosian Walls of Constantinople, long damaged and neglected, now stand restored to their former glory. The triple line of defenses, with their towers and gates, once again makes Constantinople impregnable. As the last mortar sets, we must decide how to celebrate this monumental achievement and what strategic focus to emphasize in our renewed security."
byz_mission_events.1.a: "The Grand Restoration"
byz_mission_events.1.b: "Practical Repairs"
byz_mission_events.1.c: "Reinforce the Sea Walls"
byz_mission_events.1.a.tt: "A magnificent restoration that will build bastion fortifications in Constantinople if we have the technology, or a castle otherwise, strengthening our capital's defenses."
byz_mission_events.1.b.tt: "A practical, cost-effective restoration that will add fortification improvements to Constantinople for the next years."
byz_mission_events.1.c.tt: "Focus on reinforcing the sea walls against naval threats, adding specialized maritime defenses to Constantinople."

byz_mission_events.2.t: "The Hexamilion Reconstructed"
byz_mission_events.2.d: "Across the Isthmus of Corinth, the great Hexamilion wall has been reconstructed. This formidable barrier, stretching from the Gulf of Corinth to the Saronic Gulf, now protects the Peloponnese from northern invasion. The engineers report different approaches to the fortification system, each with its own advantages and costs."
byz_mission_events.2.a: "The Historical Hexamilion"
byz_mission_events.2.b: "Fortified Isthmus"
byz_mission_events.2.c: "Watchtower Network"
byz_mission_events.2.a.tt: "Reconstruct the Hexamilion as it historically stood, building or upgrading a fort in Corinth to guard the passage into the Peloponnese."
byz_mission_events.2.b.tt: "Build a network of forts across the isthmus, constructing bastion fortifications or castles in up to three coastal locations in Morea for more flexible defense."
byz_mission_events.2.c.tt: "Construct a network of watchtowers for early warning, adding defensive improvements to up to five hill locations throughout the Peloponnese."

byz_mission_events.3.t: "Nicaea Liberated"
byz_mission_events.3.d: "Nicaea, the city of the great councils, has been liberated from foreign occupation. The churches that once hosted the fathers of the Church now ring with Orthodox hymns once more. As we reclaim this holy city, we must decide how to commemorate its liberation and what role it will play in our restored empire."
byz_mission_events.3.a: "Re-establish the Patriarchate"
byz_mission_events.3.b: "Fortify the City"
byz_mission_events.3.c: "Re-settle with Greeks"
byz_mission_events.3.a.tt: "Restore Nicaea as a major religious center with its own patriarchate, building a cathedral and converting the population to Orthodoxy."
byz_mission_events.3.b.tt: "Make Nicaea a fortified bridgehead for further Anatolian campaigns, building castle fortifications and claiming Ottoman territories in the Marmara region."
byz_mission_events.3.c.tt: "Encourage Greek settlement to re-Hellenize the city, building a library and attracting Greek burghers to resettle in Nicaea."

byz_mission_events.4.t: "The Ottoman Threat Ended"
byz_mission_events.4.d: "The Ottoman Turks, our greatest enemy for centuries, have been decisively defeated. Their power is broken, their armies scattered, and their ambitions crushed. As we stand victorious over the ruins of their empire, we must decide the fate of the Turkish lands and people, and how to secure our hard-won victory for generations to come."
byz_mission_events.4.a: "The Final Campaign"
byz_mission_events.4.b: "The Humiliating Peace"
byz_mission_events.4.c: "Divide and Rule"
byz_mission_events.4.a.tt: "Completely destroy the Ottoman state, developing Bursa and claiming their core Turkish lands throughout Anatolia."
byz_mission_events.4.b.tt: "Reduce the Ottomans to a tributary vassal state, extracting wealth and concessions while claiming their capital province."
byz_mission_events.4.c.tt: "Break up the Turkish lands into smaller, manageable vassal states while improving relations with our Christian neighbors."

byz_mission_events.5.t: "Antioch Reclaimed"
byz_mission_events.5.d: "Antioch, the ancient capital of Syria and one of the five patriarchates, has returned to Roman rule after centuries of foreign domination. The great city on the Orontes, with its strategic position on the Silk Road, is ours once more. We must now determine how to integrate this prize into our empire and what role it will play in our eastern strategy."
byz_mission_events.5.a: "Restore the Patriarchate of Antioch"
byz_mission_events.5.b: "Make Antioch a Trade Hub"
byz_mission_events.5.c: "Fortress of the East"
byz_mission_events.5.a.tt: "Restore the Orthodox Patriarchate of Antioch, building cathedral fortifications and converting the local population to Orthodoxy."
byz_mission_events.5.b.tt: "Develop Antioch as the eastern terminus of the Silk Road trade, building marketplaces and entrepot facilities to control the lucrative trade routes."
byz_mission_events.5.c.tt: "Fortify Antioch as the eastern bulwark of our empire against Muslim powers, building fortress defenses and claiming territories throughout the Levant."

byz_mission_events.6.t: "Alexandria Restored"
byz_mission_events.6.d: "Alexandria, the great city of the Ptolemies and the seat of the Patriarch of Alexandria, has been liberated. The famous lighthouse, the Great Library, and the city's strategic port are once again under Roman control. We must decide how to restore this ancient center of learning and commerce to its former glory."
byz_mission_events.6.a: "Restore the Library & Patriarchate"
byz_mission_events.6.b: "The Granary of the Empire"
byz_mission_events.6.c: "Naval Base of the South"
byz_mission_events.6.a.tt: "Restore Alexandria's libraries and patriarchal seat, building educational facilities and a cathedral while attracting Greek settlers to the city."
byz_mission_events.6.b.tt: "Develop Alexandria as the primary grain exporter for the empire, building granaries and port facilities to control Egyptian grain production."
byz_mission_events.6.c.tt: "Make Alexandria the main naval base for our Mediterranean fleet, building dry docks, wharves, and bastion defenses while claiming strategic islands."

byz_mission_events.7.t: "Jerusalem Liberated"
byz_mission_events.7.d: "Jerusalem, the Holy City, has been liberated from infidel rule. The Church of the Holy Sepulchre, the Temple Mount, and all the holy sites are now in Christian hands for the first time in centuries. This is the greatest triumph of our faith and empire, but it brings with it great responsibilities and challenges."
byz_mission_events.7.a: "Restore Orthodox Control"
byz_mission_events.7.b: "Open City for All Christians"
byz_mission_events.7.c: "Fortress of Faith"
byz_mission_events.7.a.tt: "Establish firm Orthodox control over Jerusalem, building multiple cathedrals and converting all inhabitants to the true faith."
byz_mission_events.7.b.tt: "Make Jerusalem an open city for all Christian denominations, developing pilgrimage infrastructure and improving relations with all Christian nations."
byz_mission_events.7.c.tt: "Fortify Jerusalem as an impregnable Christian fortress, building extensive fortifications and claiming all territories throughout the Levant region."

byz_mission_events.8.t: "The Pentarchy Restored"
byz_mission_events.8.d: "All five ancient patriarchates of Christendom - Rome, Constantinople, Alexandria, Antioch, and Jerusalem - are now under Orthodox control. The unity of the ancient Church has been restored under Byzantine leadership. This monumental achievement forces us to consider the future structure of Christian authority and our relationship with the Catholic West."
byz_mission_events.8.a: "Supreme Authority"
byz_mission_events.8.b: "Reconciliation with Rome"
byz_mission_events.8.c: "Decentralized Authority"
byz_mission_events.8.a.tt: "Assert Constantinople as the supreme authority over all Christendom, developing all patriarchate cities."
byz_mission_events.8.b.tt: "Seek reconciliation and unity with the Catholic Church, forming an alliance with the Papal States and improving relations with all Christian nations."
byz_mission_events.8.c.tt: "Establish a decentralized system of autocephalous churches, enhancing ecclesiastical authority in all major cathedral cities throughout the empire."

byz_mission_events.9.t: "The Roman Empire Restored"
byz_mission_events.9.d: "The dream of centuries has been realized. The Roman Empire has been restored in all its glory, with Italy, the Balkans, and Anatolia united under our rule. As we stand at the pinnacle of achievement, we must decide what form our restored empire will take and how we will govern this vast domain."
byz_mission_events.9.a: "The New Augustus"
byz_mission_events.9.b: "Reform the Senate"
byz_mission_events.9.c: "Christian Empire"
byz_mission_events.9.a.tt: "Establish a new imperial monarchy with the emperor as absolute ruler, developing our capital and claiming territories throughout Western Europe and North Africa."
byz_mission_events.9.b.tt: "Restore elements of the Roman Republic with a powerful senate, developing major cities and claiming territories throughout Italy."
byz_mission_events.9.c.tt: "Establish a Christian theocratic empire with the Church at its center, converting all populations to Orthodoxy and claiming territories throughout the Levant."

byz_mission_events.11.t: "Hellenization of Anatolia"
byz_mission_events.11.d: "Our efforts to restore Greek culture in Anatolia are bearing fruit. The land that was once thoroughly Hellenic is slowly returning to its cultural roots. We must decide how to approach this cultural transformation - whether through aggressive assimilation, gradual synthesis, or educational expansion."
byz_mission_events.11.a: "Cultural Assimilation"
byz_mission_events.11.b: "Cultural Synthesis"
byz_mission_events.11.c: "Educational Expansion"
byz_mission_events.11.a.tt: "Aggressively promote Greek culture by converting local populations, building theaters, and spreading Hellenization throughout Anatolian cities."
byz_mission_events.11.b.tt: "Encourage a gradual cultural synthesis by promoting tolerance, encouraging Greek settlement, and developing centers of cultural exchange."
byz_mission_events.11.c.tt: "Focus on education and literacy by building universities and libraries throughout Anatolia to spread Greek culture over generations."

byz_mission_events.31.t: "The Council of Nicaea Revisited"
byz_mission_events.31.d: "With Nicaea liberated and its churches restored, the time has come to consider holding a new ecumenical council in this historic city. Such a gathering could strengthen Orthodox unity and address theological questions, but it would be costly and politically complex."
byz_mission_events.31.a: "Hold the Council"
byz_mission_events.31.b: "Postpone the Council"
byz_mission_events.31.a.tt: "Hold a new ecumenical council in Nicaea to strengthen Orthodox unity and religious authority throughout the empire."
byz_mission_events.31.b.tt: "Postpone the council for a more opportune time, disappointing the clergy but avoiding the immediate costs."

byz_mission_events.41.t: "Dividing the Ottoman Spoils"
byz_mission_events.41.d: "The vast wealth captured from the Ottomans - gold, jewels, weapons, and territories - must be distributed. Different factions within the empire have strong opinions about how these spoils should be allocated to best strengthen our realm."
byz_mission_events.41.a: "Distribute to the Army"
byz_mission_events.41.b: "Fund Reconstruction"
byz_mission_events.41.c: "Reward the Nobles"
byz_mission_events.41.a.tt: "Use the spoils to reward and strengthen our military forces, increasing our army's capabilities and manpower reserves."
byz_mission_events.41.b.tt: "Invest the wealth in rebuilding and developing conquered territories, improving control and prosperity throughout Anatolia."
byz_mission_events.41.c.tt: "Distribute the wealth to the nobility to secure their loyalty and maintain their support for imperial rule."

byz_mission_events.71.t: "The Pilgrimage to Jerusalem Begins"
byz_mission_events.71.d: "With Jerusalem liberated, pilgrims from across Christendom are beginning to flock to the Holy City. This influx presents both opportunities and challenges - economic benefits from the pilgrim trade, but also security concerns and the need for infrastructure."
byz_mission_events.71.a: "Encourage Pilgrimages"
byz_mission_events.71.b: "Regulate Pilgrimages"
byz_mission_events.71.a.tt: "Actively encourage pilgrimages to boost Jerusalem's economy and strengthen Christian unity, improving relations with Orthodox nations."
byz_mission_events.71.b.tt: "Implement regulations to manage the flow of pilgrims, building hospices and ensuring security in the Holy City."

byz_mission_events.100.t: "The Byzantine Restoration Complete"
byz_mission_events.100.d: "We have achieved what many thought impossible. The Eastern Roman Empire has not only survived but has been restored to greatness. Our territories stretch from Italy to Syria, our faith is strong, and our people are prosperous. This is truly a new golden age for Byzantium."
byz_mission_events.100.a: "Proclaim the Restoration"
byz_mission_events.100.a.tt: "Celebrate our achievements and claim our rightful place as the true Roman Empire, with outcomes based on our greatest accomplishments - whether restoring the Roman Empire itself, unifying the Pentarchy, or completing other monumental tasks."

