STATIC_MODIFIER_NAME_secure_hinterland: "Secure Hinterland"
STATIC_MODIFIER_DESC_secure_hinterland_desc: "The countryside around Constantinople is firmly under imperial control, providing steady supplies and security."

STATIC_MODIFIER_NAME_hexamilion_wall: "Hexamilion Wall"
STATIC_MODIFIER_DESC_hexamilion_wall_desc: "The great wall across the Isthmus of Corinth protects the Peloponnese from northern invasion."

STATIC_MODIFIER_NAME_morea_secure: "Morea Secured"
STATIC_MODIFIER_DESC_morea_secure_desc: "The Peloponnese is united and loyal, providing manpower and resources for the empire."

STATIC_MODIFIER_NAME_anatolian_bridgehead: "Anatolian Bridgehead"
STATIC_MODIFIER_DESC_anatolian_bridgehead_desc: "A secure foothold in Anatolia provides a base for further eastern campaigns."

STATIC_MODIFIER_NAME_bithynia_secure: "Bithynia Secured"
STATIC_MODIFIER_DESC_bithynia_secure_desc: "The wealthy province of Bithynia is fully under imperial control."

# B. Naval & Trade Modifiers
STATIC_MODIFIER_NAME_golden_horn_shipyards: "Golden Horn Shipyards"
STATIC_MODIFIER_DESC_golden_horn_shipyards_desc: "The great shipyards of the Golden Horn produce vessels at an unprecedented rate."

STATIC_MODIFIER_NAME_restored_byzantine_navy: "Restored Byzantine Navy"
STATIC_MODIFIER_DESC_restored_byzantine_navy_desc: "The Byzantine navy once again dominates the Mediterranean seas."

STATIC_MODIFIER_NAME_bosporus_control: "Bosporus Control"
STATIC_MODIFIER_DESC_bosporus_control_desc: "Control of the Bosporus generates immense wealth from trade tolls."

