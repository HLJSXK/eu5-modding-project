l_english:

# ============================================================================
# MISSION PACK
# ============================================================================

england_mission_pack: "English Ascendancy"
england_mission_pack_desc: "A comprehensive mission tree focusing on the consolidation, expansion, and global dominance of England and Great Britain, from securing the crown to establishing a world-spanning empire."
england_mission_pack_BUTTON_TOOLTIP:0 "Complete missions to strengthen the Kingdom of England and build the British Empire."
england_mission_pack_CRITERIA_DESCRIPTION:0 "Complete missions as England or Great Britain to achieve imperial greatness."

# ============================================================================
# PHASE 1: ENGLISH CONSOLIDATION
# ============================================================================

mission_secure_the_english_crown: "Secure the English Crown"
mission_secure_the_english_crown_desc: "Our claim to the throne must be made indisputable. Strengthen royal authority, ensure stability, and secure our position as the rightful rulers of England."
mission_secure_the_english_crown_tooltip: "Establish firm control over the English monarchy and secure our legitimacy."

mission_develop_london: "Develop London"
mission_develop_london_desc: "London, our capital, must grow into a thriving center of trade and governance. Expand its markets, improve its infrastructure, and make it worthy of a great kingdom."
mission_develop_london_tooltip: "Transform London into a major economic and cultural center."

mission_control_english_channel: "Control the English Channel"
mission_control_english_channel_desc: "The waters separating us from the continent are both a barrier and a highway. Establish naval supremacy in the Channel to protect our shores and dominate trade."
mission_control_english_channel_tooltip: "Achieve naval dominance in the English Channel."

mission_establish_wool_trade: "Establish the Wool Trade"
mission_establish_wool_trade_desc: "English wool is renowned throughout Europe. Develop this valuable trade into a cornerstone of our economy through efficient production and export networks."
mission_establish_wool_trade_tooltip: "Build a prosperous wool industry and trade network."

mission_summon_model_parliament: "Summon a Model Parliament"
mission_summon_model_parliament_desc: "A strong monarchy requires the support of the realm's estates. Create a representative parliament that can advise the crown and legitimize our rule."
mission_summon_model_parliament_tooltip: "Establish a functional parliament with broad support."

# ============================================================================
# PHASE 2: BRITISH ISLES EXPANSION
# ============================================================================

mission_subjugate_wales: "Subjugate Wales"
mission_subjugate_wales_desc: "The Welsh principalities have long resisted English authority. Bring them firmly under our control to secure our western border and incorporate their manpower."
mission_subjugate_wales_tooltip: "Bring Wales under English control."

mission_develop_cornwall: "Develop Cornwall"
mission_develop_cornwall_desc: "Cornwall's rich tin mines and strategic position make it a valuable addition to our kingdom. Secure this peninsula and its resources for the crown."
mission_develop_cornwall_tooltip: "Develop and integrate Cornwall."

mission_pacify_the_north: "Pacify the North"
mission_pacify_the_north_desc: "Northern England has been a source of rebellion and unrest. Establish firm control through military presence and loyal local governance."
mission_pacify_the_north_tooltip: "Secure northern England against rebellion."

mission_invade_ireland: "Invade Ireland"
mission_invade_ireland_desc: "Across the Irish Sea lies a land ripe for conquest. Establish a foothold in Ireland as the first step toward bringing the entire island under our control."
mission_invade_ireland_tooltip: "Begin the conquest of Ireland."

mission_complete_irish_conquest: "Complete the Irish Conquest"
mission_complete_irish_conquest_desc: "Ireland must be fully subdued. Complete the conquest of the island and integrate it into our domains."
mission_complete_irish_conquest_tooltip: "Fully conquer and control Ireland."

mission_claim_scottish_throne: "Claim the Scottish Throne"
mission_claim_scottish_throne_desc: "Our historical claims to Scotland must be pressed. Assert our right to rule north of the border through diplomacy or force."
mission_claim_scottish_throne_tooltip: "Establish a claim to the Scottish throne."

mission_unite_british_isles: "Unite the British Isles"
mission_unite_british_isles_desc: "All of Britain must be united under one crown. Bring England, Wales, Scotland, and Ireland together into a single, powerful kingdom."
mission_unite_british_isles_tooltip: "Unite all of the British Isles under English rule."

mission_form_great_britain: "Form Great Britain"
mission_form_great_britain_desc: "With the British Isles united, we must forge a new identity. Transform our kingdom into the united Kingdom of Great Britain, stronger than the sum of its parts."
mission_form_great_britain_tooltip: "Form the united Kingdom of Great Britain."

# ============================================================================
# PHASE 3: FRENCH WARS BRANCH
# ============================================================================

mission_secure_calais: "Secure Calais"
mission_secure_calais_desc: "Calais is our last continental foothold and vital for trade with Europe. Fortify this bridgehead and ensure it remains firmly in English hands."
mission_secure_calais_tooltip: "Secure and fortify English control of Calais."

mission_claim_french_throne: "Claim the French Throne"
mission_claim_french_throne_desc: "Our Plantagenet ancestors ruled France, and we have never relinquished our claim. Assert our right to the French crown and renew the Hundred Years' War."
mission_claim_french_throne_tooltip: "Assert England's claim to the French throne."

mission_conquer_normandy: "Conquer Normandy"
mission_conquer_normandy_desc: "Normandy, the ancestral home of William the Conqueror, must be reclaimed. Restore English rule to this historic duchy."
mission_conquer_normandy_tooltip: "Conquer and control Normandy."

mission_conquer_guyenne: "Conquer Guyenne"
mission_conquer_guyenne_desc: "Guyenne's wine trade and strategic position make it a valuable possession. Secure this region and its lucrative commerce."
mission_conquer_guyenne_tooltip: "Establish control over Guyenne."

mission_control_gascony: "Control Gascony"
mission_control_gascony_desc: "The great duchy of Gascony was once held by English kings. Reclaim this rich territory in southwestern France."
mission_control_gascony_tooltip: "Conquer and control Gascony."

mission_win_hundred_years_war: "Win the Hundred Years' War"
mission_win_hundred_years_war_desc: "The centuries-long struggle for France must be resolved in our favor. Either conquer France or establish a personal union to create a dual monarchy."
mission_win_hundred_years_war_tooltip: "Achieve decisive victory in the Hundred Years' War."

# ============================================================================
# PHASE 4: NAVAL SUPREMACY BRANCH
# ============================================================================

mission_build_royal_navy: "Build the Royal Navy"
mission_build_royal_navy_desc: "England's security and prosperity depend on the sea. Construct a powerful navy capable of defending our shores and projecting power abroad."
mission_build_royal_navy_tooltip: "Establish a strong professional navy."

mission_develop_portsmouth: "Develop Portsmouth"
mission_develop_portsmouth_desc: "Portsmouth must become our premier naval base. Expand its shipyards, fortifications, and facilities to support our growing fleet."
mission_develop_portsmouth_tooltip: "Develop Portsmouth into a major naval base."

mission_dominate_north_sea: "Dominate the North Sea"
mission_dominate_north_sea_desc: "Control of the North Sea is vital for trade with northern Europe and defense against Scandinavian powers. Establish naval supremacy in these waters."
mission_dominate_north_sea_tooltip: "Achieve naval dominance in the North Sea."

mission_establish_royal_marines: "Establish the Royal Marines"
mission_establish_royal_marines_desc: "A specialized force of naval infantry will give us unparalleled amphibious capabilities. Create the Royal Marines to support our naval operations worldwide."
mission_establish_royal_marines_tooltip: "Found the Royal Marines for amphibious operations."

mission_control_gibraltar: "Control Gibraltar"
mission_control_gibraltar_desc: "The Rock of Gibraltar commands the entrance to the Mediterranean. Secure this strategic position to control access between the Atlantic and Mediterranean seas."
mission_control_gibraltar_tooltip: "Secure control of Gibraltar."

mission_secure_suez: "Secure the Suez"
mission_secure_suez_desc: "The Suez isthmus is the key to quick passage between Europe and Asia. Establish control over this vital shortcut to our eastern possessions."
mission_secure_suez_tooltip: "Establish control over the Suez region."

mission_rule_the_waves: "Rule the Waves"
mission_rule_the_waves_desc: "Britain must command the world's oceans. Build a navy so powerful that no rival can challenge our control of the seas."
mission_rule_the_waves_tooltip: "Achieve undisputed global naval supremacy."

# ============================================================================
# PHASE 5: TRADE AND ECONOMY BRANCH
# ============================================================================

mission_establish_merchant_companies: "Establish Merchant Companies"
mission_establish_merchant_companies_desc: "Organized trade companies can expand our commerce and establish English dominance in foreign markets. Charter these companies to promote our economic interests."
mission_establish_merchant_companies_tooltip: "Charter powerful merchant companies."

mission_develop_banking: "Develop Banking"
mission_develop_banking_desc: "A modern banking system is essential for financing trade and government. Establish reliable banking institutions to support our growing economy."
mission_develop_banking_tooltip: "Develop a sophisticated banking system."

mission_control_baltic_trade: "Control Baltic Trade"
mission_control_baltic_trade_desc: "The Baltic Sea provides access to valuable northern resources. Establish English dominance in this important trading region."
mission_control_baltic_trade_tooltip: "Dominate trade in the Baltic region."

mission_monopolize_spice_trade: "Monopolize the Spice Trade"
mission_monopolize_spice_trade_desc: "Spices from the East are among the most valuable commodities in the world. Establish control over this lucrative trade to enrich our kingdom."
mission_monopolize_spice_trade_tooltip: "Establish a monopoly on the spice trade."

mission_establish_london_stock_exchange: "Establish the London Stock Exchange"
mission_establish_london_stock_exchange_desc: "London must become the financial capital of the world. Create a stock exchange to facilitate investment and economic growth."
mission_establish_london_stock_exchange_tooltip: "Found the London Stock Exchange."

# ============================================================================
# PHASE 6: COLONIAL EXPANSION BRANCH
# ============================================================================

mission_sponsor_exploration: "Sponsor Exploration"
mission_sponsor_exploration_desc: "The world beyond Europe holds untold riches. Sponsor explorers to discover new lands and establish England's claim to territories overseas."
mission_sponsor_exploration_tooltip: "Fund voyages of exploration and discovery."

mission_establish_colonial_office: "Establish a Colonial Office"
mission_establish_colonial_office_desc: "As our colonial possessions grow, we need a dedicated administration to manage them. Create a colonial office to efficiently govern our overseas territories."
mission_establish_colonial_office_tooltip: "Establish centralized colonial administration."

mission_colonize_north_america: "Colonize North America"
mission_colonize_north_america_desc: "Vast, fertile lands await across the Atlantic. Establish colonies in North America to secure resources and expand English influence."
mission_colonize_north_america_tooltip: "Establish colonies in North America."

mission_secure_caribbean: "Secure the Caribbean"
mission_secure_caribbean_desc: "The Caribbean islands produce valuable sugar and other tropical goods. Establish control over these lucrative colonies."
mission_secure_caribbean_tooltip: "Establish colonies in the Caribbean."

mission_establish_east_india_company: "Establish the East India Company"
mission_establish_east_india_company_desc: "The riches of India and the East Indies are legendary. Charter a company to establish English trade and influence in Asia."
mission_establish_east_india_company_tooltip: "Found the East India Company."

mission_secure_cape_colony: "Secure the Cape Colony"
mission_secure_cape_colony_desc: "The Cape of Good Hope is the gateway to the Indian Ocean. Establish a colony here to secure our trade routes to the East."
mission_secure_cape_colony_tooltip: "Establish a colony at the Cape of Good Hope."

mission_colonize_australia: "Colonize Australia"
mission_colonize_australia_desc: "A vast, sparsely populated continent lies in the southern seas. Claim Australia for the crown and establish colonies there."
mission_colonize_australia_tooltip: "Establish colonies in Australia."

mission_empire_where_sun_never_sets: "An Empire Where the Sun Never Sets"
mission_empire_where_sun_never_sets_desc: "Establish colonies and territories across the globe so that somewhere in the British Empire, the sun is always shining."
mission_empire_where_sun_never_sets_tooltip: "Establish a global empire spanning multiple continents."

# ============================================================================
# PHASE 7: RELIGIOUS REFORMATION BRANCH
# ============================================================================

mission_break_with_rome: "Break with Rome"
mission_break_with_rome_desc: "The Pope's interference in English affairs cannot be tolerated. Establish the Church of England with the monarch as its supreme head."
mission_break_with_rome_tooltip: "Establish an independent Church of England."

mission_dissolve_monasteries: "Dissolve the Monasteries"
mission_dissolve_monasteries_desc: "The monastic orders hold vast wealth and land. Dissolve them and seize their assets for the crown, redistributing their resources."
mission_dissolve_monasteries_tooltip: "Seize monastic lands and wealth."

mission_establish_church_of_england: "Establish the Church of England"
mission_establish_church_of_england_desc: "Create a national church loyal to the crown, establishing its doctrines and organization throughout the realm."
mission_establish_church_of_england_tooltip: "Formally establish the Church of England."

mission_promote_protestantism: "Promote Protestantism"
mission_promote_protestantism_desc: "As a Protestant power, we should support fellow reformers abroad and promote Protestant causes throughout Europe."
mission_promote_protestantism_tooltip: "Support Protestantism internationally."

mission_suppress_catholic_rebels: "Suppress Catholic Rebels"
mission_suppress_catholic_rebels_desc: "Catholic resistance to our religious reforms must be crushed. Ensure religious conformity throughout our domains."
mission_suppress_catholic_rebels_tooltip: "Eliminate Catholic resistance."

# ============================================================================
# PHASE 8: GOVERNMENT REFORMS BRANCH
# ============================================================================

mission_pass_magna_carta: "Pass Magna Carta"
mission_pass_magna_carta_desc: "Establish the Great Charter, limiting royal power and guaranteeing certain rights, creating a foundation for English law and government."
mission_pass_magna_carta_tooltip: "Establish constitutional limits on royal power."

mission_establish_common_law: "Establish Common Law"
mission_establish_common_law_desc: "Develop a system of common law based on precedent and custom, creating a stable legal framework for the kingdom."
mission_establish_common_law_tooltip: "Develop the English common law system."

mission_pass_petition_of_right: "Pass the Petition of Right"
mission_pass_petition_of_right_desc: "Further limit royal authority by establishing that the king cannot levy taxes without parliamentary consent or imprison subjects without cause."
mission_pass_petition_of_right_tooltip: "Establish parliamentary control over taxation."

mission_glorious_revolution: "Glorious Revolution"
mission_glorious_revolution_desc: "Overthrow tyrannical rule and establish a constitutional monarchy with clear limits on royal power and parliamentary supremacy."
mission_glorious_revolution_tooltip: "Establish a constitutional monarchy."

mission_establish_constitutional_monarchy: "Establish Constitutional Monarchy"
mission_establish_constitutional_monarchy_desc: "Complete the transition to a constitutional monarchy where the monarch rules with parliament, not above it."
mission_establish_constitutional_monarchy_tooltip: "Fully establish constitutional government."

# ============================================================================
# PHASE 9: CULTURAL AND EDUCATIONAL BRANCH
# ============================================================================

mission_promote_english_culture: "Promote English Culture"
mission_promote_english_culture_desc: "Foster a distinctive English cultural identity through patronage of arts, literature, and architecture."
mission_promote_english_culture_tooltip: "Develop and promote English culture."

mission_found_oxford_university: "Found Oxford University"
mission_found_oxford_university_desc: "Establish a great university at Oxford to train scholars, clergy, and administrators for the realm."
mission_found_oxford_university_tooltip: "Establish the University of Oxford."

mission_establish_cambridge_colleges: "Establish Cambridge Colleges"
mission_establish_cambridge_colleges_desc: "Expand the University of Cambridge with new colleges to make it a rival to Oxford in learning and prestige."
mission_establish_cambridge_colleges_tooltip: "Develop the University of Cambridge."

mission_shakespearean_theater: "Shakespearean Theater"
mission_shakespearean_theater_desc: "Patronize the dramatic arts, supporting playwrights like Shakespeare to create a golden age of English theater."
mission_shakespearean_theater_tooltip: "Support the development of English theater."

mission_establish_royal_society: "Establish the Royal Society"
mission_establish_royal_society_desc: "Create a society dedicated to scientific inquiry and experimentation, advancing knowledge in all fields."
mission_establish_royal_society_tooltip: "Found the Royal Society for scientific advancement."

mission_promote_english_literature: "Promote English Literature"
mission_promote_english_literature_desc: "Support writers and poets to create a rich literary tradition that will define English culture for centuries."
mission_promote_english_literature_tooltip: "Develop a rich English literary tradition."

# ============================================================================
# PHASE 10: MILITARY REFORMS BRANCH
# ============================================================================

mission_establish_standing_army: "Establish a Standing Army"
mission_establish_standing_army_desc: "Create a professional standing army, always ready for deployment, rather than relying on feudal levies."
mission_establish_standing_army_tooltip: "Create a professional permanent army."

mission_develop_professional_army: "Develop professional army"
mission_develop_professional_army_desc: "Train specialized units, continuing England's dominance."
mission_develop_professional_army_tooltip: "Develop professional units."

mission_modernize_artillery: "Modernize Artillery"
mission_modernize_artillery_desc: "Invest in modern cannon and artillery training to ensure our armies have the most advanced firepower available."
mission_modernize_artillery_tooltip: "Develop modern artillery forces."

mission_redcoat_regiments: "Redcoat Regiments"
mission_redcoat_regiments_desc: "Create the iconic red-coated line infantry that will become the backbone of British land forces around the world."
mission_redcoat_regiments_tooltip: "Establish professional redcoat infantry regiments."

mission_establish_military_academies: "Establish Military Academies"
mission_establish_military_academies_desc: "Found academies to train officers in modern tactics, strategy, and leadership."
mission_establish_military_academies_tooltip: "Create professional military education."

# ============================================================================
# PHASE 11: INDUSTRIAL REVOLUTION BRANCH
# ============================================================================

mission_develop_coal_mining: "Develop Coal Mining"
mission_develop_coal_mining_desc: "Exploit England's rich coal deposits to fuel industry and provide energy for manufacturing."
mission_develop_coal_mining_tooltip: "Develop the coal mining industry."

mission_develop_iron_industry: "Develop the Iron Industry"
mission_develop_iron_industry_desc: "Build a modern iron industry to produce the metal needed for machinery, weapons, and construction."
mission_develop_iron_industry_tooltip: "Develop iron production and manufacturing."

mission_establish_factories: "Establish Factories"
mission_establish_factories_desc: "Build factories to mass-produce goods efficiently, revolutionizing manufacturing and creating wealth."
mission_establish_factories_tooltip: "Establish modern factory production."

mission_build_railroads: "Build Railroads"
mission_build_railroads_desc: "Construct a railway network to transport goods and people quickly across the country, boosting the economy."
mission_build_railroads_tooltip: "Build a national railway network."

mission_industrial_revolution: "Industrial Revolution"
mission_industrial_revolution_desc: "Lead the world into the industrial age with technological innovation, factory production, and economic transformation."
mission_industrial_revolution_tooltip: "Become the world's first industrial power."

# ============================================================================
# PHASE 12: FINAL ULTIMATE MISSIONS
# ============================================================================

mission_british_world_hegemony: "British World Hegemony"
mission_british_world_hegemony_desc: "Establish Britain as the undisputed global superpower, dominant in industry, trade, military might, and culture."
mission_british_world_hegemony_tooltip: "Establish Britain as the world's dominant power."

mission_pax_britannica: "Pax Britannica"
mission_pax_britannica_desc: "Establish a period of relative peace and stability maintained by British naval and economic supremacy, with Britain as the world's policeman."
mission_pax_britannica_tooltip: "Establish global peace under British leadership."

# ============================================================================
# TEST MISSIONS
# ============================================================================

mission_test_event_one: "Test Event Group 1"
mission_test_event_one_desc: "Testing mission to trigger the first group of mission events."
mission_test_event_one_tooltip: "Trigger events 1-7 for testing purposes."

mission_test_event_two: "Test Event Group 2"
mission_test_event_two_desc: "Testing mission to trigger the second group of mission events."
mission_test_event_two_tooltip: "Trigger events 8-14 for testing purposes."

mission_test_event_three: "Test Event Group 3"
mission_test_event_three_desc: "Testing mission to trigger the third group of mission events."
mission_test_event_three_tooltip: "Trigger events 15-21 for testing purposes."

mission_test_event_four: "Test Event Group 4"
mission_test_event_four_desc: "Testing mission to trigger the fourth group of mission events."
mission_test_event_four_tooltip: "Trigger events 22-28 for testing purposes."

# ============================================================================
# EVENT LOCALIZATION
# ============================================================================

# EVENT 1: Secure the English Crown
england_mission_events.1.t: "The English Crown Secured"
england_mission_events.1.d: "Our position on the throne is now unassailable. The nobility has accepted our rule, the succession is clear, and the kingdom is at peace. With the crown firmly on our head, we must decide how to consolidate our power and build a lasting legacy."
england_mission_events.1.a: "Assert Plantagenet Authority"
england_mission_events.1.b: "Expand Royal Prerogative"
england_mission_events.1.a.tt: "Emphasize our dynastic heritage, strengthening royal authority and building a strong centralized monarchy for the next fifteen years."
england_mission_events.1.b.tt: "Expand the powers of the monarchy, increasing crown authority and control over the realm for twelve years."

# EVENT 2: Develop London
england_mission_events.2.t: "London Transformed"
england_mission_events.2.d: "London has grown from a crowded medieval city into a thriving metropolis. Its markets bustle with trade, its buildings reach ever higher, and its population swells with merchants, craftsmen, and scholars. Now we must decide what direction to take our capital's development."
england_mission_events.2.a: "Focus on Commerce"
england_mission_events.2.b: "Promote Culture"
england_mission_events.2.a.tt: "Make London a commercial powerhouse, expanding its markets and trade networks for increased prosperity over twenty-five years."
england_mission_events.2.b.tt: "Make London a cultural center, patronizing arts and learning to enhance our prestige and cultural influence."

# EVENT 3: Establish Wool Trade
england_mission_events.3.t: "The Golden Fleece"
england_mission_events.3.d: "English wool has become the finest in Europe, sought after by clothmakers from Flanders to Florence. Our sheep dot the hillsides, our merchants grow wealthy, and the trade routes hum with activity. We must now decide how to develop this lucrative industry further."
england_mission_events.3.a: "Expand Trade Networks"
england_mission_events.3.b: "Develop Manufacturing"
england_mission_events.3.a.tt: "Expand our wool export networks, increasing trade income and satisfying the burgher estate for twenty years."
england_mission_events.3.b.tt: "Develop domestic cloth manufacturing, keeping more of the profits at home and boosting production income."

# EVENT 4: Summon Model Parliament
england_mission_events.4.t: "Parliament Assembled"
england_mission_events.4.d: "Lords spiritual and temporal, knights of the shires, and burgesses from the towns have gathered at Westminster. This representative assembly can legitimize our rule, provide counsel, and approve taxes. But what form should this parliament take, and how much power should it wield?"
england_mission_events.4.a: "Create a Powerful Parliament"
england_mission_events.4.b: "Balance Power with the Crown"
england_mission_events.4.a.tt: "Establish a strong parliamentary tradition that will increase legitimacy and create a stable government for twenty years."
england_mission_events.4.b.tt: "Create a balanced constitution that maintains stability while strengthening the crown's position."

# EVENT 5: Subjugate Wales
england_mission_events.5.t: "Wales Subdued"
england_mission_events.5.d: "The Welsh princes have bent the knee, their castles now fly the English banner, and the laws of England extend to the mountains of Snowdonia. With Wales firmly under our control, we must decide how to integrate this new territory into our kingdom."
england_mission_events.5.a: "Full Integration"
england_mission_events.5.b: "Gradual Assimilation"
england_mission_events.5.a.tt: "Fully integrate Wales, adding English cores to all Welsh territories and gaining significant manpower."
england_mission_events.5.b.tt: "Pursue gradual assimilation, increasing integration progress in Welsh territories while maintaining stability."

# EVENT 6: Pacify the North
england_mission_events.6.t: "The North Secured"
england_mission_events.6.d: "Rebellion has been crushed, castles rebuilt, and loyal lords installed throughout northern England. The once-restive region now stands firmly behind the crown. We must now decide how to ensure its continued loyalty and security."
england_mission_events.6.a: "Reward Loyalty"
england_mission_events.6.b: "Maintain Martial Presence"
england_mission_events.6.a.tt: "Reward northern loyalty with privileges and autonomy, ensuring stability and support for fifteen years."
england_mission_events.6.b.tt: "Maintain a strong military presence in the north, reinforcing castles and keeping the region secure through martial law."

# EVENT 7: Invade Ireland
england_mission_events.7.t: "The Irish Campaign Begins"
england_mission_events.7.d: "Our armies have landed on the Emerald Isle, ready to begin the conquest of Ireland. The Irish kings are divided and weak, unable to resist our disciplined troops. But how should we approach this campaign?"
england_mission_events.7.a: "Full Conquest"
england_mission_events.7.b: "Establish a Bridgehead"
england_mission_events.7.a.tt: "Launch a full-scale invasion, gaining claims on key Irish territories and a significant boost to army tradition."
england_mission_events.7.b.tt: "Establish a secure bridgehead, preparing for future expansion while improving relations with Irish rulers."

# EVENT 8: Complete Irish Conquest
england_mission_events.8.t: "Ireland Conquered"
england_mission_events.8.d: "The last Irish resistance has been crushed. The entire island now acknowledges English rule. But the question remains: how should we govern this newly conquered land?"
england_mission_events.8.a: "Plantation of Ireland"
england_mission_events.8.b: "Gaelic Accommodation"
england_mission_events.8.a.tt: "Establish English plantations, settling loyal colonists on Irish lands to secure control and generate wealth."
england_mission_events.8.b.tt: "Accommodate Gaelic customs and rulers, maintaining stability through cooperation rather than confrontation."

# EVENT 9: Claim Scottish Throne
england_mission_events.9.t: "Claim to Scotland"
england_mission_events.9.d: "Our genealogists have documented our legitimate claim to the Scottish throne through marriage and descent. The Stuart kings have weakened, and Scotland stands vulnerable. We must decide how to press our claim."
england_mission_events.9.a: "Invest into the Scottish lands"
england_mission_events.9.b: "England shall rule, Scotland will follow"
england_mission_events.9.a.tt: "It will cost us a lot, but in the long term, we will invest into the Scottish lands that will help our whole economy."
england_mission_events.9.b.tt: "We will use resources of the new aquired lands to strengthen our military and economy."

# EVENT 10: Unite British Isles
england_mission_events.10.t: "Britain United"
england_mission_events.10.d: "For the first time since the Romans, all of Britain is united under a single ruler. The separate kingdoms of England, Scotland, and Wales are now one. How should we govern this newly united realm?"
england_mission_events.10.a: "Forge a United Kingdom"
england_mission_events.10.b: "Embrace Island Identity"
england_mission_events.10.a.tt: "The heart of the British Isles lays in London, we will center our power."
england_mission_events.10.b.tt: "Embrace our island identity, strengthening our navy and gaining legitimacy as rulers of all Britain."

# EVENT 11: Form Great Britain
england_mission_events.11.t: "The United Kingdom"
england_mission_events.11.d: "The Act of Union has been signed, merging the crowns and parliaments of England and Scotland. The Kingdom of Great Britain is born. What should be the character of this new nation?"
england_mission_events.11.a: "Constitutional Monarchy"
england_mission_events.11.b: "United Identity"
england_mission_events.11.a.tt: "Establish a constitutional monarchy, gaining permanent bonuses and potentially changing government type if not already Great Britain."
england_mission_events.11.b.tt: "Promote a united British identity, accelerating cultural integration and gaining significant legitimacy."

# EVENT 12: Claim French Throne
england_mission_events.12.t: "The French Crown Claimed"
england_mission_events.12.d: "Our heralds have proclaimed our right to the French throne before the court at Westminster. The fleur-de-lis belongs on our banner alongside the lions of England. Now we must decide how to pursue this ancient claim."
england_mission_events.12.a: "Renew the Hundred Years' War"
england_mission_events.12.b: "Diplomatic Pressure"
england_mission_events.12.a.tt: "Renew the war for France, gaining a powerful casus belli, cores on key French territories, and increased army tradition."
england_mission_events.12.b.tt: "Apply diplomatic pressure, strengthening our claim legitimacy while maintaining better relations with France."

# EVENT 13: Conquer Normandy
england_mission_events.13.t: "Normandy Restored"
england_mission_events.13.d: "William the Conqueror's homeland is once again in English hands. The towns of Rouen, Caen, and Bayeux fly our banner. How should we govern this reconquered duchy?"
england_mission_events.13.a: "Embrace Norman Heritage"
england_mission_events.13.b: "Secure Our Control"
england_mission_events.13.a.tt: "Embrace our Norman heritage, integrating Normandy more quickly."
england_mission_events.13.b.tt: "Focus on securing control, increasing integration progress and satisfying the nobility."

# EVENT 14: Win Hundred Years' War
england_mission_events.14.t: "Victory in France"
england_mission_events.14.d: "The long war is over. Our banners fly over Paris, and the French king has acknowledged our supremacy. England stands triumphant after centuries of conflict. What should be the nature of our victory?"
england_mission_events.14.a: "Dual Monarchy"
england_mission_events.14.b: "Continental Hegemony"
england_mission_events.14.a.tt: "Establish a dual monarchy, creating a personal union with France and gaining cores on key French territories."
england_mission_events.14.b.tt: "Establish continental hegemony, extracting reparations from France and gaining claims on the entire region."

# EVENT 15: Build Royal Navy
england_mission_events.15.t: "The Royal Navy"
england_mission_events.15.d: "Ships of the line now ride at anchor in our ports, their white sails emblazoned with the red cross of St. George. England has a navy worthy of a great power. How should we continue our naval development?"
england_mission_events.15.a: "Expand the Fleet"
england_mission_events.15.b: "Shipbuilding Program"
england_mission_events.15.a.tt: "Focus on fleet expansion, increasing navy tradition and prosperity in coastal shipbuilding centers."
england_mission_events.15.b.tt: "Launch a major shipbuilding program, gaining immediate ships and significant gold from production."

# EVENT 16: Establish Royal Marines
england_mission_events.16.t: "The Royal Marines"
england_mission_events.16.d: "Our new amphibious force stands ready - soldiers who can fight at sea and storm enemy shores. The Royal Marines will give us capabilities no other nation possesses. How should we deploy this new force?"
england_mission_events.16.a: "Amphibious Specialists"
england_mission_events.16.b: "Naval Infantry"
england_mission_events.16.a.tt: "Focus on amphibious operations, establishing permanent marine bases and gaining significant navy tradition."
england_mission_events.16.b.tt: "Develop as naval infantry, improving army tradition and gaining combined operations capability."

# EVENT 17: Rule the Waves
england_mission_events.17.t: "Britannia Rules the Waves"
england_mission_events.17.d: "From the Caribbean to the Indian Ocean, our ships patrol the seas. No foreign fleet dares challenge us. Britain truly rules the waves. How should we exercise this naval supremacy?"
england_mission_events.17.a: "Naval Hegemony"
england_mission_events.17.b: "Maritime Supremacy"
england_mission_events.17.a.tt: "Establish complete naval hegemony, gaining permanent bonuses and exploring new sea routes."
england_mission_events.17.b.tt: "Focus on maritime supremacy, gaining ultimate navy tradition and increased sailor capacity."

# EVENT 18: Establish Merchant Companies
england_mission_events.18.t: "Merchant Companies Chartered"
england_mission_events.18.d: "With royal charters in hand, our merchant companies set out to dominate world trade. They will establish factories, negotiate treaties, and bring back wealth from distant lands. What should be their focus?"
england_mission_events.18.a: "Trade Monopolies"
england_mission_events.18.b: "Commercial Expansion"
england_mission_events.18.a.tt: "Establish trade monopolies, satisfying the burghers and increasing merchant power in our capital for twenty years."
england_mission_events.18.b.tt: "Focus on commercial expansion, gaining significant gold and increasing prosperity in market towns."

# EVENT 19: Monopolize Spice Trade
england_mission_events.19.t: "Spice Trade Dominance"
england_mission_events.19.d: "The spices of the East now flow primarily through English hands. Pepper, cinnamon, nutmeg, and cloves fill our warehouses and enrich our merchants. How should we manage this lucrative trade?"
england_mission_events.19.a: "Complete Dominance"
england_mission_events.19.b: "Oriental Expansion"
england_mission_events.19.a.tt: "Establish complete dominance, satisfying the burghers immensely and developing spice-producing territories."
england_mission_events.19.b.tt: "Expand our oriental trade, gaining significant gold and establishing claims in the East Indies."

# EVENT 20: Establish London Stock Exchange
england_mission_events.20.t: "The London Stock Exchange"
england_mission_events.20.d: "Under the sign of the three crowns, merchants and bankers gather to trade shares and securities. London has become the financial capital of the world. How should we develop this financial center?"
england_mission_events.20.a: "Global Financial Capital"
england_mission_events.20.b: "Banking Hub"
england_mission_events.20.a.tt: "Make London the global financial capital, significantly developing the city and gaining substantial gold."
england_mission_events.20.b.tt: "Develop as a banking hub, gaining prestige and satisfying the burgher estate."

# EVENT 21: Sponsor Exploration
england_mission_events.21.t: "Age of Discovery"
england_mission_events.21.d: "With royal backing, explorers set sail into unknown waters. New lands await discovery, and with them, wealth and glory for England. What should be our focus in this age of discovery?"
england_mission_events.21.a: "Exploration and Discovery"
england_mission_events.21.b: "Merchant Adventurers"
england_mission_events.21.a.tt: "Focus on exploration, gaining an explorer admiral and discovering new sea routes."
england_mission_events.21.b.tt: "Support merchant adventurers, gaining gold and satisfying the burgher estate."

# EVENT 22: Colonize North America
england_mission_events.22.t: "The New World"
england_mission_events.22.d: "Colonies have taken root along the Atlantic coast. Settlers clear land, build towns, and establish English law in the wilderness. How should we develop these New World possessions?"
england_mission_events.22.a: "New England Settlements"
england_mission_events.22.b: "Transatlantic Network"
england_mission_events.22.a.tt: "Establish stable New England settlements, reducing colonial liberty desire and expanding colonial administration."
england_mission_events.22.b.tt: "Develop transatlantic trade, gaining significant gold and improving colonial trade networks."

# EVENT 23: Establish East India Company
england_mission_events.23.t: "The Honourable East India Company"
england_mission_events.23.d: "With its flag of red and white stripes, the East India Company sets out to establish English trade and influence in Asia. The riches of India await. What should be the company's mission?"
england_mission_events.23.a: "Trade Dominance"
england_mission_events.23.b: "Territorial Expansion"
england_mission_events.23.a.tt: "Focus on trade dominance, satisfying the burghers immensely and increasing trade power in India."
england_mission_events.23.b.tt: "Pursue territorial expansion, gaining significant gold and establishing claims in India."

# EVENT 24: Empire Where Sun Never Sets
england_mission_events.24.t: "The Sun Never Sets"
england_mission_events.24.d: "From Canada to Australia, India to Africa, our empire spans the globe. Truly, the sun never sets on British territory. How should we govern this vast empire?"
england_mission_events.24.a: "Global Empire"
england_mission_events.24.b: "Imperial Zenith"
england_mission_events.24.a.tt: "Establish a global imperial system, reducing colonial liberty desire and gaining key strategic cores worldwide."
england_mission_events.24.b.tt: "Reach our imperial zenith, gaining legitimacy and establishing cores across our territories."

# EVENT 25: Break with Rome
england_mission_events.25.t: "The Break with Rome"
england_mission_events.25.d: "The Pope's authority in England is at an end. We are now Supreme Head of the Church in England. This momentous break will reshape our kingdom. How should we proceed with the Reformation?"
england_mission_events.25.a: "Royal Supremacy"
england_mission_events.25.b: "Religious Settlement"
england_mission_events.25.a.tt: "Assert royal supremacy fully, converting to Anglicanism, seizing monastic wealth, and breaking with the Papal States."
england_mission_events.25.b.tt: "Seek a religious settlement, maintaining crown authority while keeping better relations with the Papacy."

# EVENT 26: Dissolve Monasteries
england_mission_events.26.t: "Dissolution of the Monasteries"
england_mission_events.26.d: "The great monasteries stand empty, their treasures seized for the crown. Vast lands and wealth have been redistributed. How should we use these resources?"
england_mission_events.26.a: "Seize the Wealth"
england_mission_events.26.b: "Educational Reform"
england_mission_events.26.a.tt: "Seize the monastic wealth for the crown, gaining significant gold and increasing crown estate power."
england_mission_events.26.b.tt: "Use monastic resources for education, converting monasteries to schools and advancing research."

# EVENT 27: Promote Protestantism
england_mission_events.27.t: "Protestant Leadership"
england_mission_events.27.d: "As a leading Protestant power, we have influence over the religious direction of Europe. Our support can strengthen fellow reformers abroad. How should we exercise this influence?"
england_mission_events.27.a: "Protestant Solidarity"
england_mission_events.27.b: "Religious Influence"
england_mission_events.27.a.tt: "Build Protestant solidarity, improving relations with all Protestant nations and gaining diplomatic reputation."
england_mission_events.27.b.tt: "Exercise religious influence, gaining prestige and converting Catholic provinces to Protestantism."

# EVENT 28: Pass Magna Carta
england_mission_events.28.t: "Magna Carta"
england_mission_events.28.d: "The Great Charter has been sealed at Runnymede, establishing that even the king is subject to the law. This document will shape English government for centuries. What should be its emphasis?"
england_mission_events.28.a: "Constitutional Legacy"
england_mission_events.28.b: "Feudal Rights clarified!"
england_mission_events.28.a.tt: "Establish a strong constitutional legacy, gaining legitimacy and satisfying the nobility while decentralizing power."
england_mission_events.28.b.tt: "Clarify feudal rights, while increasing crown estate power."

# EVENT 29: Pass Petition of Right
england_mission_events.29.t: "Petition of Right"
england_mission_events.29.d: "Parliament has passed the Petition of Right, establishing that the king cannot levy taxes without its consent or imprison subjects without cause. How should we implement these new limitations?"
england_mission_events.29.a: "Parliamentary Rights"
england_mission_events.29.b: "Constitutional Progress"
england_mission_events.29.a.tt: "Embrace parliamentary rights, increasing stability and parliamentary support."
england_mission_events.29.b.tt: "Make constitutional progress, gaining legitimacy and satisfying both nobility and burghers."

# EVENT 30: Glorious Revolution
england_mission_events.30.t: "Glorious Revolution"
england_mission_events.30.d: "Tyranny has been overthrown without bloodshed. William of Orange lands with an army, and the people welcome him as a liberator. A constitutional monarchy is established. What form should it take?"
england_mission_events.30.a: "Constitutional Settlement"
england_mission_events.30.b: "Bill of Rights"
england_mission_events.30.a.tt: "Establish a full constitutional settlement, installing William as king and creating permanent constitutional government."
england_mission_events.30.b.tt: "Focus on the Bill of Rights, gaining legitimacy and empowering the burgher and noble estates."

# EVENT 31: Promote English Culture
england_mission_events.31.t: "English Cultural Renaissance"
england_mission_events.31.d: "A flowering of English arts, literature, and architecture is transforming our kingdom. Patronage and creativity are making England a cultural leader. How should we support this renaissance?"
england_mission_events.31.a: "Cultural Renaissance"
england_mission_events.31.b: "Literary Tradition"
england_mission_events.31.a.tt: "Support a full cultural renaissance, increasing cultural tradition and developing cities across the realm."
england_mission_events.31.b.tt: "Build a literary tradition, advancing research and constructing libraries in major cities."

# EVENT 32: Found Oxford University
england_mission_events.32.t: "Oxford University"
england_mission_events.32.d: "The University of Oxford has grown into a great center of learning, attracting scholars from across Europe. Its colleges and libraries are renowned. How should we develop this institution?"
england_mission_events.32.a: "Academic Excellence"
england_mission_events.32.b: "Educational Center"
england_mission_events.32.a.tt: "Pursue academic excellence, significantly developing Oxford and gaining a scholar advisor."
england_mission_events.32.b.tt: "Develop as an educational center, gaining prestige and implementing educational reforms."

# EVENT 33: Shakespearean Theater
england_mission_events.33.t: "Shakespeare's Globe"
england_mission_events.33.d: "The Globe Theatre stands on the Bankside, where the plays of William Shakespeare and others entertain Londoners from all walks of life. English drama has reached new heights. How should we support this art form?"
england_mission_events.33.a: "Theatrical Legacy"
england_mission_events.33.b: "English Drama"
england_mission_events.33.a.tt: "Create a lasting theatrical legacy, establishing Shakespeare in London and increasing cultural tradition."
england_mission_events.33.b.tt: "Develop English drama more broadly, gaining prestige and building theaters in major cities."

# EVENT 34: Establish Royal Society
england_mission_events.34.t: "The Royal Society"
england_mission_events.34.d: "Natural philosophers gather to conduct experiments and debate new theories. The Royal Society will advance knowledge in all fields, from physics to biology. How should we support scientific inquiry?"
england_mission_events.34.a: "Scientific Advancement"
england_mission_events.34.b: "Enlightenment Ideas"
england_mission_events.34.a.tt: "Focus on scientific advancement, gaining Isaac Newton as an advisor and embracing the Scientific Revolution."
england_mission_events.34.b.tt: "Promote Enlightenment ideas, increasing cultural tradition and moving toward innovation."

# EVENT 35: Establish Standing Army
england_mission_events.35.t: "Professinal Longbowmen"
england_mission_events.35.d: "No longer reliant on feudal levies, we now have a professional army always ready for service. These trained, disciplined troops give us a military advantage. How should we organize this new force?"
england_mission_events.35.a: "Professional Forces"
england_mission_events.35.b: "Military Expansion"
england_mission_events.35.a.tt: "Develop professional forces, increasing army tradition and developing armory centers."
england_mission_events.35.b.tt: "Focus on military expansion, increasing manpower and building new armory centers."

# EVENT 36: Redcoat Regiments
england_mission_events.36.t: "The Redcoats"
england_mission_events.36.d: "In their distinctive red coats, our line infantry regiments stand ready. These professional soldiers will become the backbone of British land forces around the world. How should we develop this new military system?"
england_mission_events.36.a: "Disciplined Infantry"
england_mission_events.36.b: "Global Deployment"
england_mission_events.36.a.tt: "Focus on disciplined infantry, gaining permanent discipline bonuses and strong line infantry capabilities."
england_mission_events.36.b.tt: "Prepare for global deployment, increasing army tradition and global operational capabilities."

# EVENT 37: Develop Coal Mining
england_mission_events.37.t: "Coal Mining Industry"
england_mission_events.37.d: "The black gold from our mines fuels industry and heats homes. Coal mining has become a major industry, employing thousands and generating wealth. How should we develop this resource?"
england_mission_events.37.a: "Industrial Coal"
england_mission_events.37.b: "Coal Production"
england_mission_events.37.a.tt: "Develop industrial coal production, gaining significant gold and increasing prosperity in mining regions."
england_mission_events.37.b.tt: "Invest in coal production, advancing research and building new Kiln."

# EVENT 38: Build Railroads
england_mission_events.38.t: "The Railway Age"
england_mission_events.38.d: "Steam locomotives pull trains along iron rails, connecting cities and transforming transport. The railway revolution is underway. How should we develop this new technology?"
england_mission_events.38.a: "Railway Network"
england_mission_events.38.b: "Transportation Revolution"
england_mission_events.38.a.tt: "Build a comprehensive railway network, gaining significant gold and constructing railroads in major cities."
england_mission_events.38.b.tt: "Lead a transportation revolution, gaining prestige and improving industrial transport."

# EVENT 39: Industrial Revolution
england_mission_events.39.t: "Industrial Revolution"
england_mission_events.39.d: "Factories belch smoke, machines clatter, and production soars. England has entered the industrial age, becoming the workshop of the world. How should we lead this transformation?"
england_mission_events.39.a: "Industrial Powerhouse"
england_mission_events.39.b: "Technological Leadership"
england_mission_events.39.a.tt: "Become an industrial powerhouse, gaining immense gold and embracing industrialization."
england_mission_events.39.b.tt: "Focus on technological leadership, advancing research significantly and developing industrial technology."

# EVENT 40: British World Hegemony
england_mission_events.40.t: "World Hegemony"
england_mission_events.40.d: "Britain stands unchallenged as the world's dominant power. Our industry leads, our navy rules the seas, our empire spans the globe. How should we exercise this unprecedented global leadership?"
england_mission_events.40.a: "Global Superpower"
england_mission_events.40.b: "Imperial Zenith"
england_mission_events.40.a.tt: "Establish global superpower status and establishing cores across our global empire."
england_mission_events.40.b.tt: "Reach imperial zenith, gaining overall satisfaction across our people."

# EVENT 41: Pax Britannica
england_mission_events.41.t: "Pax Britannica"
england_mission_events.41.d: "A period of relative peace and stability prevails, maintained by British naval and economic supremacy. The world looks to Britain for leadership and order. What should be the character of this British peace?"
england_mission_events.41.a: "Global Peacekeeper"
england_mission_events.41.b: "Imperial Legacy"
england_mission_events.41.a.tt: "Serve as global peacekeeper, gaining ultimate stability and reducing colonial liberty desire completely."
england_mission_events.41.b.tt: "Build an imperial legacy, gaining ultimate legitimacy and cultural tradition."

# EVENT 260: Dissolution of Monasteries (Follow-up)
england_mission_events.260.t: "Monastic Lands Redistributed"
england_mission_events.260.d: "The dissolution of the monasteries continues, with more religious houses being closed and their assets seized. The redistribution of this wealth and land is ongoing."
england_mission_events.260.a: "Keep some monasteries"
england_mission_events.260.b: "Fund Education"
england_mission_events.260.a.tt: "Continue seizing monastic wealth, but remain some freedom for the clergy."
england_mission_events.260.b.tt: "Use seized resources to fund education, converting monasteries to schools and advancing research."

