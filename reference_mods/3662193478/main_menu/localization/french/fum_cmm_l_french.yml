l_french:
 # Mod
 fum_name: "Faster Universalis"
 fum_desc: "Améliore les performances d'EU5 sans aucun effet sur le gameplay ou la qualité graphique."

 # Performance (performance) Tab
 fum__performance_name: "Performances"
 ## Removals (removals) Group
 fum__performance__removals_name: "Suppressions"
 fum__sop_removal_name: "Supprimer les pays basés sur les populations"
 fum__sop_removal_desc: "Supprime tous les SOP."
 fum__nation_removal_name: "Suppression des nations"
 fum__nation_removal_desc: "Supprime les nations selon le paramètre spécifié ; survolez le menu déroulant pour plus de détails."
 fum__nation_removal_option_1_name: "Aucune suppression"
 fum__nation_removal_option_1_desc: "Toutes les nations seront présentes dans le jeu."
 fum__nation_removal_option_2_name: "Nations à faible impact"
 fum__nation_removal_option_2_desc: "Supprime toutes les nations de ces sous-continents : Amérique du Nord, Amérique du Sud, Îles du Pacifique"
 fum__nation_removal_option_3_name: "Centré sur l'Europe"
 fum__nation_removal_option_3_desc: "Supprime toutes les nations dans ces sous-continents : Asie de l'Est, Asie du Sud, Asie du Sud-Est, Australasie, Îles du Pacifique, Amérique du Sud."
 fum__nation_removal_option_4_name: "Centré sur l'Asie"
 fum__nation_removal_option_4_desc: "Supprime toutes les nations dans ces sous-continents : Europe de l'Ouest, Europe de l'Est, Afrique du Nord, Afrique de l'Ouest, Afrique centrale, Amérique du Nord, Amérique du Sud"
 fum__block_recolonization_name: "Bloquer la recolonisation"
 fum__block_recolonization_desc: "Supprimera les populations et empêchera la recolonisation de tous les sous-continents désactivés lors de l'utilisation des paramètres Europe Centrique ou Asie Centrique. Ne bloquera pas la colonisation et ne supprimera pas les populations des sous-continents n'ayant jamais été colonisés, comme l'Amérique du Sud."
 fum__pop_removal_name: "Supprimer les populations sans propriétaire"
 fum__pop_removal_desc: "Supprime les populations des localisations sans propriétaire (y compris les pays basés sur les populations). Améliore les performances, mais accélère la colonisation en raison de l'absence de populations locales. Se cumule avec la suppression des nations."
 fum__apply_performance_settings_name: "Appliquer les paramètres de performance"
 fum__apply_performance_settings_desc: "Appliquera tous les paramètres sélectionnés."
 fum__apply_performance_settings_text: "Appliquer"

 # QoL (qol) Tab
 fum__qol_name: "Qualité de vie"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Vitesses"
 fum__army_movement_speed_name: "Vitesse de déplacement des armées"
 fum__army_movement_speed_desc: "Modifie la vitesse de déplacement des armées. 0 % correspond au jeu de base."
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "Vitesse de déplacement de la flotte"
 fum__navy_movement_speed_desc: "Modifie la vitesse de déplacement navale. 0 % correspond au jeu de base."
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "Durée de la bataille"
 fum__battle_length_desc: "Détermine la durée des batailles."
 fum__battle_length_option_1_name: "Vanilla"
 fum__battle_length_option_1_desc: "Les batailles auront la même durée que dans le jeu de base."
 fum__battle_length_option_2_name: "2x plus rapide"
 fum__battle_length_option_2_desc: "Les batailles dureront deux fois moins longtemps que dans la configuration par défaut."
 fum__battle_length_option_3_name: "Par défaut"
 fum__battle_length_option_3_desc: "Paramètre recommandé par défaut du mod. Les batailles dureront 3,91x plus longtemps, mais les pertes et les issues seront identiques à la version vanilla."
 fum__battle_length_option_4_name: "2x plus lent"
 fum__battle_length_option_4_desc: "Les batailles dureront deux fois plus longtemps que le paramètre par défaut."

 # Other (other) Tab
 fum__other_name: "Autres"
 ## General (general) Group
 fum__other__general_name: "Général"
 fum__enable_save_game_compatability_name: "Activer la compatibilité des sauvegardes"
 fum__enable_save_game_compatability_desc: "Lorsqu'il est activé, le mod effectuera des corrections pour assurer la compatibilité avec les sauvegardes existantes. Le mod tentera de configurer cela automatiquement. Cependant, si vous avez commencé la partie avec Faster Universalis, assurez-vous qu'il est désactivé ; si vous avez chargé une sauvegarde existante, assurez-vous qu'il est activé."

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
