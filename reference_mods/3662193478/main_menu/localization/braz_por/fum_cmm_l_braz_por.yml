l_braz_por:
 # Mod
 fum_name: "Faster Universalis"
 fum_desc: "Melhora o desempenho do EU5 sem qualquer efeito na jogabilidade ou na qualidade gráfica."

 # Performance (performance) Tab
 fum__performance_name: "Desempenho"
 ## Removals (removals) Group
 fum__performance__removals_name: "Remoções"
 fum__sop_removal_name: "Remover Países Baseados em População"
 fum__sop_removal_desc: "Remove todos os SOPs."
 fum__nation_removal_name: "Remoção de Nações"
 fum__nation_removal_desc: "Remove nações com base na configuração especificada; passe o cursor sobre o menu suspenso para obter detalhes."
 fum__nation_removal_option_1_name: "Sem Remoção"
 fum__nation_removal_option_1_desc: "Todas as nações estarão presentes no jogo."
 fum__nation_removal_option_2_name: "Nações de Baixo Impacto"
 fum__nation_removal_option_2_desc: "Remove todas as nações nestes subcontinentes: América do Norte, América do Sul, Ilhas do Pacífico"
 fum__nation_removal_option_3_name: "Centrado na Europa"
 fum__nation_removal_option_3_desc: "Remove todas as nações nestes subcontinentes: Ásia Oriental, Ásia Meridional, Sudeste Asiático, Australásia, Ilhas do Pacífico, América do Sul"
 fum__nation_removal_option_4_name: "Centrado na Ásia"
 fum__nation_removal_option_4_desc: "Remove todas as nações nestes subcontinentes: Europa Ocidental, Europa Oriental, Norte da África, África Ocidental, África Central, América do Norte, América do Sul"
 fum__block_recolonization_name: "Bloquear Recolonização"
 fum__block_recolonization_desc: "Excluirá as populações e impedirá a recolonização de todos os subcontinentes desativados quando usado com as configurações Centrado na Europa ou Centrado na Ásia. Não bloqueará a colonização nem removerá as populações de subcontinentes nunca colonizados, como a América do Sul."
 fum__pop_removal_name: "Remover Pops Sem Dono"
 fum__pop_removal_desc: "Exclua as populações de locais sem proprietários (incluindo países baseados em populações). Melhor desempenho, mas tornará a colonização mais rápida, pois não haverá populações locais. Isso se acumula com a remoção de nações."
 fum__apply_performance_settings_name: "Aplicar Configurações de Desempenho"
 fum__apply_performance_settings_desc: "Aplicará todas as configurações selecionadas."
 fum__apply_performance_settings_text: "Aplicar"

 # QoL (qol) Tab
 fum__qol_name: "Qualidade de Vida"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Velocidades"
 fum__army_movement_speed_name: "Velocidade de Movimento do Exército"
 fum__army_movement_speed_desc: "Altera a velocidade de movimento do exército. 0% é o valor original."
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "Velocidade de Movimento Naval"
 fum__navy_movement_speed_desc: "Altera a velocidade de movimento naval. 0% é o padrão."
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "Duração da Batalha"
 fum__battle_length_desc: "Determina a duração das batalhas."
 fum__battle_length_option_1_name: "Vanilla"
 fum__battle_length_option_1_desc: "As batalhas durarão o mesmo tempo que no vanilla."
 fum__battle_length_option_2_name: "2x Mais Rápido"
 fum__battle_length_option_2_desc: "As batalhas durarão metade do tempo em relação à configuração padrão."
 fum__battle_length_option_3_name: "Padrão"
 fum__battle_length_option_3_desc: "A configuração padrão recomendada do mod. As batalhas durarão 3,91x mais, mas as baixas/resultados serão idênticos ao vanilla."
 fum__battle_length_option_4_name: "2x Mais Lento"
 fum__battle_length_option_4_desc: "As batalhas durarão o dobro do tempo da configuração padrão."

 # Other (other) Tab
 fum__other_name: "Outros"
 ## General (general) Group
 fum__other__general_name: "Geral"
 fum__enable_save_game_compatability_name: "Ativar Compatibilidade de Jogo Salvo"
 fum__enable_save_game_compatability_desc: "Quando ativado, o mod fará correções para ser compatível com jogos salvos existentes. O mod tentará configurar isso automaticamente. No entanto, se você iniciou o jogo com o Faster Universalis, certifique-se de que esteja desativado; se você carregou um jogo existente, certifique-se de que esteja ativado."

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
 fum__performance: "fum__performance"
 fum__qol: "fum__qol"
 fum__other: "fum__other"
