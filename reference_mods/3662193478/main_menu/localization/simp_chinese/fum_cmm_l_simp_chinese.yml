l_simp_chinese:
 # Mod
 fum_name: "快速风云"
 fum_desc: "提高 EU5 性能，且不影响游戏性或画质。"

 # Performance (performance) Tab
 fum__performance_name: "性能"
 ## Removals (removals) Group
 fum__performance__removals_name: "移除项"
 fum__sop_removal_name: "移除基于人口的国家"
 fum__sop_removal_desc: "移除所有 SOP。"
 fum__nation_removal_name: "国家移除"
 fum__nation_removal_desc: "根据所选设置移除国家，将鼠标悬停在下拉菜单上以查看详情。"
 fum__nation_removal_option_1_name: "不移除"
 fum__nation_removal_option_1_desc: "所有国家都将出现在游戏中。"
 fum__nation_removal_option_2_name: "低影响国家"
 fum__nation_removal_option_2_desc: "移除以下次大陆的所有国家：北美洲、南美洲、太平洋诸岛"
 fum__nation_removal_option_3_name: "以欧洲为中心"
 fum__nation_removal_option_3_desc: "移除以下次大陆中的所有国家：东亚、南亚、东南亚、澳大拉西亚、太平洋诸岛、南美洲"
 fum__nation_removal_option_4_name: "亚洲中心"
 fum__nation_removal_option_4_desc: "移除以下次大陆的所有国家：西欧、东欧、北非、西非、中非、北美、南美"
 fum__block_recolonization_name: "禁止重新殖民"
 fum__block_recolonization_desc: "在使用“以欧洲为中心”或“以亚洲为中心”设置时，将清除所有已禁用次大陆的人口并防止其被重新殖民。不会阻止从未被殖民的次大陆（如南美洲）的殖民或移除其中的人口。"
 fum__pop_removal_name: "移除无主人口"
 fum__pop_removal_desc: "删除无主地（包括基于人口的国家）的人口。这能提高性能，但由于没有当地人口，殖民速度会变快。此项效果可与移除国家叠加。"
 fum__apply_performance_settings_name: "应用性能设置"
 fum__apply_performance_settings_desc: "将应用所有选定设置。"
 fum__apply_performance_settings_text: "应用"

 # QoL (qol) Tab
 fum__qol_name: "体验优化"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "速度"
 fum__army_movement_speed_name: "陆军移动速度"
 fum__army_movement_speed_desc: "调整陆军移动速度。0% 为原版数值。"
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "海军移动速度"
 fum__navy_movement_speed_desc: "更改海军移动速度。0% 为原版数值。"
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "战斗时长"
 fum__battle_length_desc: "决定战斗的持续时间。"
 fum__battle_length_option_1_name: "原版"
 fum__battle_length_option_1_desc: "战斗时长将与原版保持一致。"
 fum__battle_length_option_2_name: "2倍速"
 fum__battle_length_option_2_desc: "战斗持续时间将仅为默认设置的一半。"
 fum__battle_length_option_3_name: "默认"
 fum__battle_length_option_3_desc: "模组默认推荐设置。战斗持续时间将延长至 3.91 倍，但伤亡与结果将与原版完全一致。"
 fum__battle_length_option_4_name: "2 倍慢速"
 fum__battle_length_option_4_desc: "战斗持续时间将是默认设置的两倍。"

 # Other (other) Tab
 fum__other_name: "其他"
 ## General (general) Group
 fum__other__general_name: "常规"
 fum__enable_save_game_compatability_name: "启用存档兼容性"
 fum__enable_save_game_compatability_desc: "启用后，本模组将进行修正以兼容现有的存档。模组将尝试自动设置此项。然而，如果您是在启用 Faster Universalis 的情况下开始的新游戏，请确保将其禁用；如果您加载的是现有存档，请确保将其启用。"

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
 fum__performance: "fum__performance"
 fum__qol: "fum__qol"
 fum__other: "fum__other"
 fum__performance__removals: "fum__performance__removals"
