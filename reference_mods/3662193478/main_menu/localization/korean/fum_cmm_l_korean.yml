l_korean:
 # Mod
 fum_name: "패스터 유니버설리스"
 fum_desc: "게임플레이나 그래픽 품질에 영향을 주지 않고 EU5의 성능을 향상시킵니다."

 # Performance (performance) Tab
 fum__performance_name: "성능"
 ## Removals (removals) Group
 fum__performance__removals_name: "제거"
 fum__sop_removal_name: "팝 기반 국가 제거"
 fum__sop_removal_desc: "모든 SOP를 제거합니다."
 fum__nation_removal_name: "국가 제거"
 fum__nation_removal_desc: "지정된 설정에 따라 국가를 제거합니다. 자세한 내용은 드롭다운 메뉴에 마우스를 올리십시오."
 fum__nation_removal_option_1_name: "제거 안 함"
 fum__nation_removal_option_1_desc: "모든 국가가 게임 내에 포함됩니다."
 fum__nation_removal_option_2_name: "영향이 적은 국가들"
 fum__nation_removal_option_2_desc: "다음 아대륙의 모든 국가를 제거합니다: 북아메리카, 남아메리카, 태평양 제도"
 fum__nation_removal_option_3_name: "유럽 중심"
 fum__nation_removal_option_3_desc: "다음 아대륙에 위치한 모든 국가를 제거합니다: 동아시아, 남아시아, 동남아시아, 오스트랄라시아, 태평양 제도, 남아메리카"
 fum__nation_removal_option_4_name: "아시아 중심"
 fum__nation_removal_option_4_desc: "다음 아대륙에 있는 모든 국가를 제거합니다: 서유럽, 동유럽, 북아프리카, 서아프리카, 중앙아프리카, 북아메리카, 남아메리카"
 fum__block_recolonization_name: "재식민화 차단"
 fum__block_recolonization_desc: "유럽 중심 또는 아시아 중심 설정을 사용할 때 비활성화된 모든 아대륙의 팝을 삭제하고 재식민화를 방지합니다. 남아메리카와 같이 식민화된 적이 없는 아대륙의 식민화는 차단하지 않으며 팝도 제거하지 않습니다."
 fum__pop_removal_name: "소유주 없는 팝 제거"
 fum__pop_removal_desc: "소유주가 없는 지역(팝 기반 국가 포함)의 팝을 삭제합니다. 성능이 향상되지만, 현지 인구가 사라져 식민 개척 속도가 빨라집니다. 국가 제거 옵션과 중첩하여 적용됩니다."
 fum__apply_performance_settings_name: "성능 설정 적용"
 fum__apply_performance_settings_desc: "선택한 모든 설정을 적용합니다."
 fum__apply_performance_settings_text: "적용"

 # QoL (qol) Tab
 fum__qol_name: "편의성"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "속도"
 fum__army_movement_speed_name: "육군 이동 속도"
 fum__army_movement_speed_desc: "육군 이동 속도를 변경합니다. 0%는 바닐라입니다."
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "해군 이동 속도"
 fum__navy_movement_speed_desc: "해군 이동 속도를 변경합니다. 0%가 바닐라 설정입니다."
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "전투 기간"
 fum__battle_length_desc: "전투가 얼마나 오래 지속될지를 결정합니다."
 fum__battle_length_option_1_name: "바닐라"
 fum__battle_length_option_1_desc: "전투는 바닐라와 동일한 시간 동안 지속됩니다."
 fum__battle_length_option_2_name: "2배 더 빠르게"
 fum__battle_length_option_2_desc: "전투가 기본 설정의 절반의 시간 동안 지속됩니다."
 fum__battle_length_option_3_name: "기본"
 fum__battle_length_option_3_desc: "모드의 기본 권장 설정입니다. 전투가 3.91배 더 오래 지속되지만, 사상자 및 결과는 바닐라와 동일합니다."
 fum__battle_length_option_4_name: "2배 느림"
 fum__battle_length_option_4_desc: "전투가 기본 설정보다 두 배 더 오래 지속됩니다."

 # Other (other) Tab
 fum__other_name: "기타"
 ## General (general) Group
 fum__other__general_name: "일반"
 fum__enable_save_game_compatability_name: "세이브 호환성 활성화"
 fum__enable_save_game_compatability_desc: "활성화 시, 모드는 기존의 저장된 게임과 호환되도록 수정 작업을 수행합니다. 모드는 이를 자동으로 설정하려고 시도합니다. 하지만 Faster Universalis를 활성화한 상태로 게임을 시작했다면 이 기능이 비활성화되어 있는지 확인하십시오. 기존의 저장된 게임을 불러온 경우라면 이 기능이 활성화되어 있는지 확인하십시오."

