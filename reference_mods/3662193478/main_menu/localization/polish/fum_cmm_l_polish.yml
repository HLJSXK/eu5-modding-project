l_polish:
 # Mod
 fum_name: "Szybszy Universalis"
 fum_desc: "Poprawia wydajność EU5 bez wpływu na rozgrywkę lub jakość grafiki."

 # Performance (performance) Tab
 fum__performance_name: "Wydajność"
 ## Removals (removals) Group
 fum__performance__removals_name: "Usunięcia"
 fum__sop_removal_name: "Usuń państwa oparte na populacji"
 fum__sop_removal_desc: "Usuwa wszystkie SOP."
 fum__nation_removal_name: "Usuwanie państw"
 fum__nation_removal_desc: "Usuwa państwa na podstawie wybranego ustawienia, najedź kursorem na listę rozwijaną, aby poznać szczegóły."
 fum__nation_removal_option_1_name: "Bez usuwania"
 fum__nation_removal_option_1_desc: "Wszystkie narody będą obecne w grze."
 fum__nation_removal_option_2_name: "Narody o niskim wpływie"
 fum__nation_removal_option_2_desc: "Usuwa wszystkie państwa w tych subkontynentach: Ameryka Północna, Ameryka Południowa, Wyspy Pacyfiku"
 fum__nation_removal_option_3_name: "Eurocentryczne"
 fum__nation_removal_option_3_desc: "Usuwa wszystkie państwa z tych subkontynentów: Azja Wschodnia, Azja Południowa, Azja Południowo-Wschodnia, Australazja, Wyspy Pacyfiku, Ameryka Południowa"
 fum__nation_removal_option_4_name: "Azjocentryczny"
 fum__nation_removal_option_4_desc: "Usuwa wszystkie państwa na tych subkontynentach: Europa Zachodnia, Europa Wschodnia, Afryka Północna, Afryka Zachodnia, Afryka Środkowa, Ameryka Północna, Ameryka Południowa"
 fum__block_recolonization_name: "Blokowanie rekolonizacji"
 fum__block_recolonization_desc: "Usunie populacje i uniemożliwi ponowną kolonizację wszystkich wyłączonych subkontynentów przy użyciu ustawień Europe Centric lub Asia Centric. Nie zablokuje kolonizacji ani nie usunie populacji z subkontynentów nigdy nieskolonizowanych, takich jak Ameryka Południowa."
 fum__pop_removal_name: "Usuń nieposiadane populacje"
 fum__pop_removal_desc: "Usuwa populacje z lokacji bez właścicieli (w tym państwa oparte na populacji). Zapewnia lepszą wydajność, ale przyspieszy kolonizację ze względu na brak lokalnej ludności. Opcja ta kumuluje się z usuwaniem państw."
 fum__apply_performance_settings_name: "Zastosuj ustawienia wydajności"
 fum__apply_performance_settings_desc: "Zastosuje wszystkie wybrane ustawienia."
 fum__apply_performance_settings_text: "Zastosuj"

 # QoL (qol) Tab
 fum__qol_name: "Komfort gry"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Prędkości"
 fum__army_movement_speed_name: "Szybkość ruchu armii"
 fum__army_movement_speed_desc: "Zmienia prędkość ruchu armii. 0% to wartość podstawowa."
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "Prędkość ruchu floty"
 fum__navy_movement_speed_desc: "Zmienia prędkość ruchu floty. 0% to wartość podstawowa."
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "Długość bitwy"
 fum__battle_length_desc: "Określa, jak długo będą trwały bitwy."
 fum__battle_length_option_1_name: "Wersja podstawowa"
 fum__battle_length_option_1_desc: "Bitwy będą trwały tyle samo czasu, co w wersji podstawowej."
 fum__battle_length_option_2_name: "2x szybciej"
 fum__battle_length_option_2_desc: "Bitwy będą trwać o połowę krócej niż w ustawieniach domyślnych."
 fum__battle_length_option_3_name: "Domyślne"
 fum__battle_length_option_3_desc: "Domyślne zalecane ustawienie modyfikacji. Bitwy będą trwać 3,91x dłużej, ale straty i wyniki będą identyczne jak w wersji podstawowej gry."
 fum__battle_length_option_4_name: "2x wolniej"
 fum__battle_length_option_4_desc: "Bitwy będą trwały dwa razy dłużej niż przy ustawieniach domyślnych."

 # Other (other) Tab
 fum__other_name: "Inne"
 ## General (general) Group
 fum__other__general_name: "Ogólne"
 fum__enable_save_game_compatability_name: "Włącz kompatybilność zapisów gry"
 fum__enable_save_game_compatability_desc: "Po włączeniu modyfikacja dokona korekt, aby zapewnić kompatybilność z istniejącymi zapisami gry. Mod spróbuje ustawić tę opcję automatycznie. Jeśli jednak gra została rozpoczęta z Faster Universalis, upewnij się, że jest ona wyłączona; jeśli wczytano istniejący zapis gry, upewnij się, że jest ona włączona."

