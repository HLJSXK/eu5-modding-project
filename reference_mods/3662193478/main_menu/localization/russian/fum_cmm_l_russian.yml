l_russian:
 # Mod
 fum_name: "Ускоренная Universalis"
 fum_desc: "Улучшает производительность EU5, не влияя на игровой процесс или качество графики."

 # Performance (performance) Tab
 fum__performance_name: "Производительность"
 ## Removals (removals) Group
 fum__performance__removals_name: "Удаление"
 fum__sop_removal_name: "Удалить страны на основе населения"
 fum__sop_removal_desc: "Удаляет все SOP."
 fum__nation_removal_name: "Удаление стран"
 fum__nation_removal_desc: "Удаляет страны согласно выбранной настройке. Наведите курсор на выпадающий список для подробностей."
 fum__nation_removal_option_1_name: "Без удаления"
 fum__nation_removal_option_1_desc: "Все страны будут присутствовать в игре."
 fum__nation_removal_option_2_name: "Страны с низким влиянием"
 fum__nation_removal_option_2_desc: "Удаляет все страны в этих субконтинентах: Северная Америка, Южная Америка, Океания"
 fum__nation_removal_option_3_name: "Европоцентричный"
 fum__nation_removal_option_3_desc: "Удаляет все страны в этих субконтинентах: Восточная Азия, Южная Азия, Юго-Восточная Азия, Австралазия, Острова Тихого океана, Южная Америка"
 fum__nation_removal_option_4_name: "Фокус на Азии"
 fum__nation_removal_option_4_desc: "Удаляет все страны в этих субконтинентах: Западная Европа, Восточная Европа, Северная Африка, Западная Африка, Центральная Африка, Северная Америка, Южная Америка"
 fum__block_recolonization_name: "Запрет реколонизации"
 fum__block_recolonization_desc: "Удаляет население и предотвращает повторную колонизацию всех отключенных субконтинентов при использовании настроек Europe Centric или Asia Centric. Не блокирует колонизацию и не удаляет население субконтинентов, которые не были колонизированы изначально, таких как Южная Америка."
 fum__pop_removal_name: "Удалить попов без владельца"
 fum__pop_removal_desc: "Удаление населения из локаций без владельцев (включая страны на основе населения). Повышает производительность, но ускоряет колонизацию, так как местное население будет отсутствовать. Сочетается с удалением стран."
 fum__apply_performance_settings_name: "Применить настройки производительности"
 fum__apply_performance_settings_desc: "Применит все выбранные настройки."
 fum__apply_performance_settings_text: "Применить"

 # QoL (qol) Tab
 fum__qol_name: "Качество жизни"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Скорости"
 fum__army_movement_speed_name: "Скорость передвижения армий"
 fum__army_movement_speed_desc: "Изменяет скорость передвижения армий. 0% — стандартное значение."
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "Скорость движения флота"
 fum__navy_movement_speed_desc: "Изменяет скорость перемещения флота. 0% — значение из оригинальной игры."
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "Длительность сражения"
 fum__battle_length_desc: "Определяет длительность сражений."
 fum__battle_length_option_1_name: "Ванилла"
 fum__battle_length_option_1_desc: "Сражения будут длиться столько же времени, сколько и в оригинальной игре."
 fum__battle_length_option_2_name: "В 2 раза быстрее"
 fum__battle_length_option_2_desc: "Сражения будут длиться в два раза меньше, чем при стандартных настройках."
 fum__battle_length_option_3_name: "По умолчанию"
 fum__battle_length_option_3_desc: "Рекомендуемая настройка мода по умолчанию. Сражения будут длиться в 3,91 раза дольше, но потери и результаты будут идентичны оригинальной игре."
 fum__battle_length_option_4_name: "2x медленнее"
 fum__battle_length_option_4_desc: "Сражения будут длиться в два раза дольше, чем по умолчанию."

 # Other (other) Tab
 fum__other_name: "Прочее"
 ## General (general) Group
 fum__other__general_name: "Общее"
 fum__enable_save_game_compatability_name: "Включить совместимость сохранений"
 fum__enable_save_game_compatability_desc: "При включении мод внесет исправления для обеспечения совместимости с существующими сохранениями. Мод попытается настроить это автоматически. Однако, если вы начали игру с Faster Universalis, убедитесь, что этот параметр отключен; если же вы загрузили существующее сохранение, убедитесь, что он включен."

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
 fum__performance: "fum__performance"
 fum__qol: "fum__qol"
 fum__other: "fum__other"
 fum__performance__removals: "fum__performance__removals"
 fum__qol__speeds: "fum__qol__speeds"
 fum__other__general: "fum__other__general"
 fum__sop_removal: "fum__sop_removal"
 fum__nation_removal: "fum__nation_removal"
 fum__block_recolonization: "fum__block_recolonization"
 fum__pop_removal: "fum__pop_removal"
 fum__apply_performance_settings: "fum__apply_performance_settings"
 fum__army_movement_speed: "fum__army_movement_speed"
 fum__navy_movement_speed: "fum__navy_movement_speed"
 fum__battle_length: "fum__battle_length"
 fum__enable_save_game_compatability: "fum__enable_save_game_compatability"
