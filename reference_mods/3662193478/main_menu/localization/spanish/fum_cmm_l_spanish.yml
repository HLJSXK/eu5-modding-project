l_spanish:
 # Mod
 fum_name: "Faster Universalis"
 fum_desc: "Mejora el rendimiento de EU5 sin afectar a la jugabilidad ni a la calidad gráfica."

 # Performance (performance) Tab
 fum__performance_name: "Rendimiento"
 ## Removals (removals) Group
 fum__performance__removals_name: "Eliminaciones"
 fum__sop_removal_name: "Eliminar países basados en poblaciones"
 fum__sop_removal_desc: "Elimina todos los SOP."
 fum__nation_removal_name: "Eliminación de naciones"
 fum__nation_removal_desc: "Elimina naciones según el ajuste especificado, pasa el cursor sobre el desplegable para ver los detalles."
 fum__nation_removal_option_1_name: "Sin eliminación"
 fum__nation_removal_option_1_desc: "Todas las naciones estarán presentes en el juego."
 fum__nation_removal_option_2_name: "Naciones de bajo impacto"
 fum__nation_removal_option_2_desc: "Elimina todas las naciones en estos subcontinentes: Norteamérica, Sudamérica, Islas del Pacífico"
 fum__nation_removal_option_3_name: "Centrado en Europa"
 fum__nation_removal_option_3_desc: "Elimina todas las naciones de estos subcontinentes: Asia Oriental, Asia Meridional, Sudeste Asiático, Australasia, Islas del Pacífico, Sudamérica."
 fum__nation_removal_option_4_name: "Centrado en Asia"
 fum__nation_removal_option_4_desc: "Elimina todas las naciones en estos subcontinentes: Europa Occidental, Europa Oriental, Norte de África, África Occidental, África Central, Norteamérica, Sudamérica"
 fum__block_recolonization_name: "Bloquear recolonización"
 fum__block_recolonization_desc: "Eliminará las poblaciones de todos los subcontinentes desactivados y evitará su recolonización cuando se use con los ajustes Europe Centric o Asia Centric. No bloqueará la colonización ni eliminará las poblaciones de subcontinentes que nunca hayan sido colonizados, como Sudamérica."
 fum__pop_removal_name: "Eliminar Pops sin propietario"
 fum__pop_removal_desc: "Elimina las poblaciones de las localizaciones sin dueño (incluidos los países basados en poblaciones). Mejor rendimiento, pero hará que la colonización sea más rápida, ya que no habrá poblaciones locales. Esto se acumula con la eliminación de naciones."
 fum__apply_performance_settings_name: "Aplicar ajustes de rendimiento"
 fum__apply_performance_settings_desc: "Se aplicarán todos los ajustes seleccionados."
 fum__apply_performance_settings_text: "Aplicar"

 # QoL (qol) Tab
 fum__qol_name: "Calidad de vida"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Velocidades"
 fum__army_movement_speed_name: "Velocidad de movimiento del ejército"
 fum__army_movement_speed_desc: "Cambia la velocidad de movimiento del ejército. 0% es el valor original."
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "Velocidad de movimiento naval"
 fum__navy_movement_speed_desc: "Cambia la velocidad de movimiento de la armada. 0% es el valor original."
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "Duración de la batalla"
 fum__battle_length_desc: "Determina cuánto tiempo durarán las batallas."
 fum__battle_length_option_1_name: "Vainilla"
 fum__battle_length_option_1_desc: "Las batallas durarán el mismo tiempo que en vanilla."
 fum__battle_length_option_2_name: "2 veces más rápido"
 fum__battle_length_option_2_desc: "Las batallas durarán la mitad de tiempo que en la configuración predeterminada."
 fum__battle_length_option_3_name: "Predeterminado"
 fum__battle_length_option_3_desc: "La configuración recomendada por defecto del mod. Las batallas durarán 3,91 veces más, pero las bajas y los resultados serán idénticos a los de la versión vanilla."
 fum__battle_length_option_4_name: "2x más lento"
 fum__battle_length_option_4_desc: "Las batallas durarán el doble que en la configuración predeterminada."

 # Other (other) Tab
 fum__other_name: "Otros"
 ## General (general) Group
 fum__other__general_name: "General"
 fum__enable_save_game_compatability_name: "Habilitar compatibilidad de partidas guardadas"
 fum__enable_save_game_compatability_desc: "Cuando está activado, el mod realizará correcciones para ser compatible con partidas guardadas existentes. El mod intentará configurar esto automáticamente. Sin embargo, si comenzaste la partida con Faster Universalis, asegúrate de que esté desactivado; si cargaste una partida existente, asegúrate de que esté activado."

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
