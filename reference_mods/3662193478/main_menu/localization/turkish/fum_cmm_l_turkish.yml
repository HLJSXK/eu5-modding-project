l_turkish:
 # Mod
 fum_name: "Daha Hızlı Universalis"
 fum_desc: "Oynanış veya grafik kalitesini etkilemeden EU5 performansını iyileştirir."

 # Performance (performance) Tab
 fum__performance_name: "Performans"
 ## Removals (removals) Group
 fum__performance__removals_name: "Kaldırılanlar"
 fum__sop_removal_name: "Nüfus Tabanlı Ülkeleri Kaldır"
 fum__sop_removal_desc: "Tüm SOP'ları kaldırır."
 fum__nation_removal_name: "Ulus Kaldırma"
 fum__nation_removal_desc: "Belirlenen ayara göre ülkeleri kaldırır, detaylar için açılır menünün üzerine gelin."
 fum__nation_removal_option_1_name: "Kaldırma Yok"
 fum__nation_removal_option_1_desc: "Tüm uluslar oyunda yer alacak."
 fum__nation_removal_option_2_name: "Düşük Etkili Uluslar"
 fum__nation_removal_option_2_desc: "Şu alt kıtalardaki tüm ulusları kaldırır: Kuzey Amerika, Güney Amerika, Pasifik Adaları"
 fum__nation_removal_option_3_name: "Avrupa Merkezli"
 fum__nation_removal_option_3_desc: "Şu alt kıtalardaki tüm ulusları kaldırır: Doğu Asya, Güney Asya, Güneydoğu Asya, Avustralasya, Pasifik Adaları, Güney Amerika"
 fum__nation_removal_option_4_name: "Asya Merkezli"
 fum__nation_removal_option_4_desc: "Şu alt kıtalardaki tüm ülkeleri kaldırır: Batı Avrupa, Doğu Avrupa, Kuzey Afrika, Batı Afrika, Orta Afrika, Kuzey Amerika, Güney Amerika"
 fum__block_recolonization_name: "Yeniden Kolonileştirmeyi Engelle"
 fum__block_recolonization_desc: "Avrupa Merkezli veya Asya Merkezli ayarlarıyla birlikte kullanıldığında, devre dışı bırakılan tüm alt kıtalardaki popları silecek ve buraların yeniden kolonize edilmesini önleyecektir. Güney Amerika gibi hiç kolonize edilmemiş alt kıtaların poplarını kaldırmayacak veya kolonizasyonunu engellemeyecektir."
 fum__pop_removal_name: "Sahipsiz Nüfusları Kaldır"
 fum__pop_removal_desc: "Sahibi olmayan konumlardaki nüfusları (nüfus tabanlı ülkeler dahil) siler. Daha iyi performans sağlar ancak yerel nüfus olmayacağı için kolonileşmeyi hızlandırır. Bu özellik, ülke kaldırma ile birleşir."
 fum__apply_performance_settings_name: "Performans Ayarlarını Uygula"
 fum__apply_performance_settings_desc: "Seçilen tüm ayarlar uygulanacak."
 fum__apply_performance_settings_text: "Uygula"

 # QoL (qol) Tab
 fum__qol_name: "Yaşam Kalitesi"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Hızlar"
 fum__army_movement_speed_name: "Ordu Hareket Hızı"
 fum__army_movement_speed_desc: "Ordu hareket hızını değiştirir. %0 vanilya değeridir."
 fum__army_movement_speed_format: "%[CMMV('fum__army_movement_speed')]"
 fum__navy_movement_speed_name: "Donanma Hareket Hızı"
 fum__navy_movement_speed_desc: "Donanma hareket hızını değiştirir. %0 vanilla değeridir."
 fum__navy_movement_speed_format: "%[CMMV('fum__navy_movement_speed')]"
 fum__battle_length_name: "Muharebe Süresi"
 fum__battle_length_desc: "Muharebelerin ne kadar süreceğini belirler."
 fum__battle_length_option_1_name: "Vanilla"
 fum__battle_length_option_1_desc: "Muharebeler vanilla ile aynı uzunlukta sürecektir."
 fum__battle_length_option_2_name: "2x Daha Hızlı"
 fum__battle_length_option_2_desc: "Muharebeler, varsayılan sürenin yarısı kadar sürecek."
 fum__battle_length_option_3_name: "Varsayılan"
 fum__battle_length_option_3_desc: "Modun varsayılan önerilen ayarı. Muharebeler 3,91 kat daha uzun sürecek, ancak kayıplar/sonuçlar vanilla ile aynı kalacaktır."
 fum__battle_length_option_4_name: "2 Kat Daha Yavaş"
 fum__battle_length_option_4_desc: "Muharebeler varsayılan ayardan iki kat daha uzun sürecek."

 # Other (other) Tab
 fum__other_name: "Diğer"
 ## General (general) Group
 fum__other__general_name: "Genel"
 fum__enable_save_game_compatability_name: "Kayıtlı Oyun Uyumluluğunu Etkinleştir"
 fum__enable_save_game_compatability_desc: "Etkinleştirildiğinde mod, mevcut kayıtlı oyunlarla uyumluluk sağlamak için düzeltmeler yapacaktır. Mod, bu ayarı otomatik olarak yapmaya çalışacaktır. Ancak oyuna Faster Universalis ile başladıysanız devre dışı olduğundan; mevcut bir oyunu yüklediyseniz etkin olduğundan emin olun."

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
