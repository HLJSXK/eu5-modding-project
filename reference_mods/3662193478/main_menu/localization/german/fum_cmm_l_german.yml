l_german:
 # Mod
 fum_name: "Schnelleres Universalis"
 fum_desc: "Verbessert die EU5-Performance ohne jegliche Auswirkungen auf Gameplay oder Grafikqualität."

 # Performance (performance) Tab
 fum__performance_name: "Performance"
 ## Removals (removals) Group
 fum__performance__removals_name: "Entfernungen"
 fum__sop_removal_name: "Pop-basierte Länder entfernen"
 fum__sop_removal_desc: "Entfernt alle SOPs."
 fum__nation_removal_name: "Nationenentfernung"
 fum__nation_removal_desc: "Entfernt Nationen basierend auf der festgelegten Einstellung. Bewege den Mauszeiger für Details über das Dropdown-Menü."
 fum__nation_removal_option_1_name: "Keine Entfernung"
 fum__nation_removal_option_1_desc: "Alle Nationen werden im Spiel vorhanden sein."
 fum__nation_removal_option_2_name: "Nationen mit geringen Auswirkungen"
 fum__nation_removal_option_2_desc: "Entfernt alle Nationen in diesen Subkontinenten: Nordamerika, Südamerika, Pazifische Inseln"
 fum__nation_removal_option_3_name: "Europazentriert"
 fum__nation_removal_option_3_desc: "Entfernt alle Nationen in diesen Subkontinenten: Ostasien, Südasien, Südostasien, Australasien, Pazifische Inseln, Südamerika"
 fum__nation_removal_option_4_name: "Asien-zentriert"
 fum__nation_removal_option_4_desc: "Entfernt alle Nationen in diesen Subkontinenten: Westeuropa, Osteuropa, Nordafrika, Westafrika, Zentralafrika, Nordamerika, Südamerika"
 fum__block_recolonization_name: "Rekolonisierung blockieren"
 fum__block_recolonization_desc: "Entfernt die Pops in allen deaktivierten Subkontinenten und verhindert deren Neukolonialisierung, wenn die Einstellungen "Europe Centric" oder "Asia Centric" verwendet werden. Blockiert nicht die Kolonialisierung und entfernt keine Pops von niemals kolonialisierten Subkontinenten wie Südamerika."
 fum__pop_removal_name: "Nicht besessene Pops entfernen"
 fum__pop_removal_desc: "Löscht Pops von Standorten ohne Besitzer (einschließlich pop-basierter Länder). Bessere Performance, beschleunigt jedoch die Kolonialisierung, da keine lokale Bevölkerung vorhanden sein wird. Dies ist mit der Entfernung von Nationen kombinierbar."
 fum__apply_performance_settings_name: "Leistungseinstellungen anwenden"
 fum__apply_performance_settings_desc: "Wendet alle ausgewählten Einstellungen an."
 fum__apply_performance_settings_text: "Anwenden"

 # QoL (qol) Tab
 fum__qol_name: "QoL"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Geschwindigkeiten"
 fum__army_movement_speed_name: "Armeebewegungsgeschwindigkeit"
 fum__army_movement_speed_desc: "Ändert die Bewegungsgeschwindigkeit von Armeen. 0 % entspricht dem Standardspiel."
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "Flottenbewegungsgeschwindigkeit"
 fum__navy_movement_speed_desc: "Ändert die Flottenbewegungsgeschwindigkeit. 0 % entspricht dem Standardspiel."
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "Schlachtdauer"
 fum__battle_length_desc: "Bestimmt, wie lange Schlachten andauern."
 fum__battle_length_option_1_name: "Vanilla"
 fum__battle_length_option_1_desc: "Schlachten dauern genauso lange wie in Vanilla."
 fum__battle_length_option_2_name: "2x schneller"
 fum__battle_length_option_2_desc: "Schlachten dauern nur halb so lange wie in der Standardeinstellung."
 fum__battle_length_option_3_name: "Standard"
 fum__battle_length_option_3_desc: "Die vom Mod empfohlene Standardeinstellung. Schlachten dauern 3,91-mal länger, aber Verluste und Ergebnisse sind identisch mit der Vanilla-Version."
 fum__battle_length_option_4_name: "2x Langsamer"
 fum__battle_length_option_4_desc: "Schlachten dauern doppelt so lange wie in der Standardeinstellung."

 # Other (other) Tab
 fum__other_name: "Sonstiges"
 ## General (general) Group
 fum__other__general_name: "Allgemein"
 fum__enable_save_game_compatability_name: "Spielstand-Kompatibilität aktivieren"
 fum__enable_save_game_compatability_desc: "Wenn aktiviert, nimmt die Mod Korrekturen vor, um die Kompatibilität mit bestehenden Spielständen zu gewährleisten. Die Mod wird versuchen, dies automatisch einzustellen. Falls Sie das Spiel jedoch mit Faster Universalis begonnen haben, stellen Sie sicher, dass dies deaktiviert ist; wenn Sie einen bestehenden Spielstand geladen haben, stellen Sie sicher, dass es aktiviert ist."

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
 fum__performance: "fum__performance"
 fum__qol: "fum__qol"
 fum__other: "fum__other"
