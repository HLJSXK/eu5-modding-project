l_japanese:
 # Mod
 fum_name: "ファスター・ユニバーサリス"
 fum_desc: "ゲームプレイやグラフィックの品質に影響を与えることなく、EU5のパフォーマンスを向上させます。"

 # Performance (performance) Tab
 fum__performance_name: "パフォーマンス"
 ## Removals (removals) Group
 fum__performance__removals_name: "削除"
 fum__sop_removal_name: "ポップベースの国家を削除"
 fum__sop_removal_desc: "すべてのSOPを削除します。"
 fum__nation_removal_name: "国家の削除"
 fum__nation_removal_desc: "指定された設定に基づき、国家を削除します。詳細についてはドロップダウンにカーソルを合わせてください。"
 fum__nation_removal_option_1_name: "削除しない"
 fum__nation_removal_option_1_desc: "すべての国家がゲーム内に登場します。"
 fum__nation_removal_option_2_name: "影響の少ない国家"
 fum__nation_removal_option_2_desc: "以下の亜大陸にある全ての国家を削除します：北アメリカ、南アメリカ、太平洋諸島"
 fum__nation_removal_option_3_name: "欧州中心"
 fum__nation_removal_option_3_desc: "以下の亜大陸にあるすべての国家を削除します: 東アジア、南アジア、東南アジア、オーストララシア、太平洋諸島、南アメリカ"
 fum__nation_removal_option_4_name: "アジア中心"
 fum__nation_removal_option_4_desc: "以下の亜大陸にあるすべての国家を削除します：西ヨーロッパ、東ヨーロッパ、北アフリカ、西アフリカ、中央アフリカ、北アメリカ、南アメリカ"
 fum__block_recolonization_name: "再入植の禁止"
 fum__block_recolonization_desc: "「欧州中心」または「アジア中心」設定で使用した場合、無効化されたすべての亜大陸のPopを削除し、再入植を防止します。南アメリカなどの未入植の亜大陸において、入植をブロックしたりPopを削除したりすることはありません。"
 fum__pop_removal_name: "非所有POPの削除"
 fum__pop_removal_desc: "所有者のいない立地（Popベースの国家を含む）からPopを削除します。パフォーマンスが向上しますが、現地住民がいなくなるため入植が早まります。これは国家の削除と併用可能です。"
 fum__apply_performance_settings_name: "パフォーマンス設定を適用"
 fum__apply_performance_settings_desc: "選択したすべての設定を適用します。"
 fum__apply_performance_settings_text: "適用"

 # QoL (qol) Tab
 fum__qol_name: "QoL"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "速度"
 fum__army_movement_speed_name: "陸軍の移動速度"
 fum__army_movement_speed_desc: "陸軍の移動速度を変更します。0%がバニラの設定です。"
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "海軍の移動速度"
 fum__navy_movement_speed_desc: "海軍の移動速度を変更します。0%はバニラと同じです。"
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "戦闘期間"
 fum__battle_length_desc: "戦闘の継続時間を決定します。"
 fum__battle_length_option_1_name: "バニラ"
 fum__battle_length_option_1_desc: "戦闘の継続時間はバニラと同じです。"
 fum__battle_length_option_2_name: "2倍速"
 fum__battle_length_option_2_desc: "戦闘の所要時間はデフォルト設定の半分になります。"
 fum__battle_length_option_3_name: "デフォルト"
 fum__battle_length_option_3_desc: "モッドのデフォルトの推奨設定です。戦闘時間は3.91倍長くなりますが、損害や結果はバニラと同じになります。"
 fum__battle_length_option_4_name: "2倍遅い"
 fum__battle_length_option_4_desc: "戦闘の継続時間は、デフォルト設定の2倍になります。"

 # Other (other) Tab
 fum__other_name: "その他"
 ## General (general) Group
 fum__other__general_name: "全般"
 fum__enable_save_game_compatability_name: "セーブデータの互換性を有効にする"
 fum__enable_save_game_compatability_desc: "有効にすると、既存のセーブデータとの互換性を維持するための修正が行われます。本Modはこの設定を自動的に行おうとしますが、Faster Universalisを適用した状態でゲームを開始した場合は「無効」に、既存のセーブデータをロードした場合は「有効」に設定されていることを確認してください。"

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
 fum__performance: "fum__performance"
 fum__qol: "fum__qol"
 fum__other: "fum__other"
 fum__performance__removals: "fum__performance__removals"
 fum__qol__speeds: "fum__qol__speeds"
 fum__other__general: "fum__other__general"
 fum__sop_removal: "fum__sop_removal"
 fum__nation_removal: "fum__nation_removal"
 fum__block_recolonization: "fum__block_recolonization"
 fum__pop_removal: "fum__pop_removal"
 fum__apply_performance_settings: "fum__apply_performance_settings"
 fum__army_movement_speed: "fum__army_movement_speed"
 fum__navy_movement_speed: "fum__navy_movement_speed"
 fum__battle_length: "fum__battle_length"
 fum__enable_save_game_compatability: "fum__enable_save_game_compatability"
