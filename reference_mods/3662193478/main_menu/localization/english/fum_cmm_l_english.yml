l_english:
 # Mod
 fum_name: "Faster Universalis"
 fum_desc: "Improves EU5 performance without any effect on gameplay or graphical quality."

 # Performance (performance) Tab
 fum__performance_name: "Performance"
 ## Removals (removals) Group
 fum__performance__removals_name: "Removals"
 fum__sop_removal_name: "Remove Pop-Based Countries"
 fum__sop_removal_desc: "Removes all SOPs. "
 fum__nation_removal_name: "Nation Removal"
 fum__nation_removal_desc: "Removes nations based on the specified setting, hover over the dropdown for details."
 fum__nation_removal_option_1_name: "No Removal"
 fum__nation_removal_option_1_desc: "All nations will be present in the game."
 fum__nation_removal_option_2_name: "Low Impact Nations"
 fum__nation_removal_option_2_desc: "Removes all nations in these subcontinents: North America, South America, Pacific Islands"
 fum__nation_removal_option_3_name: "Europe Centric"
 fum__nation_removal_option_3_desc: "Removes all nations in these subcontinents: East Asia, South Asia, South East Asia, Australasia, Pacific Islands, South America"
 fum__nation_removal_option_4_name: "Asia Centric"
 fum__nation_removal_option_4_desc: "Removes all nations in these subcontinents: Western Europe, Eastern Europe, North Africa, West Africa, Central Africa, North America, South America"
 fum__block_recolonization_name: "Block Recolonization"
 fum__block_recolonization_desc: "Will delete the pops in and prevent recolonization of all disabled subcontinents when used with Europe Centric, or Asia Centric settings. Will not block colonization or remove pops of never colonized subcontinents such as South America."
 fum__pop_removal_name: "Remove Unowned Pops"
 fum__pop_removal_desc: "Delete pops from locations without owners (including pop-based countries). Better performance, but will make colonization faster, as there will be no local populations. This stacks with nation removal."
 fum__apply_performance_settings_name: "Apply Performance Settings"
 fum__apply_performance_settings_desc: "Will apply all the selecting settings."
 fum__apply_performance_settings_text: "Apply"

 # QoL (qol) Tab
 fum__qol_name: "QoL"
 ## Speeds (speeds) Group
 fum__qol__speeds_name: "Speeds"
 fum__army_movement_speed_name: "Army Movement Speed"
 fum__army_movement_speed_desc: "Changes army movement speed. 0% is vanilla. "
 fum__army_movement_speed_format: "[CMMV('fum__army_movement_speed')]%"
 fum__navy_movement_speed_name: "Navy Movement Speed"
 fum__navy_movement_speed_desc: "Changes navy movement speed. 0% is vanilla. "
 fum__navy_movement_speed_format: "[CMMV('fum__navy_movement_speed')]%"
 fum__battle_length_name: "Battle Length"
 fum__battle_length_desc: "Determines how long battles will last. "
 fum__battle_length_option_1_name: "Vanilla"
 fum__battle_length_option_1_desc: "Battles will last the same amount of time as vanilla."
 fum__battle_length_option_2_name: "2x Faster"
 fum__battle_length_option_2_desc: "Battles will last half the time as the default setting."
 fum__battle_length_option_3_name: "Default"
 fum__battle_length_option_3_desc: "The mods default recommended setting. Battles will last 3.91x longer, but losses/outcomes will be identical to vanilla."
 fum__battle_length_option_4_name: "2x Slower"
 fum__battle_length_option_4_desc: "Battles will last twice as long as the default setting."

 # Other (other) Tab
 fum__other_name: "Other"
 ## General (general) Group
 fum__other__general_name: "General"
 fum__enable_save_game_compatability_name: "Enable Save Game Compatibility"
 fum__enable_save_game_compatability_desc: "When enabled, the mod will make corrections to be compatible with existing save games. The mod will attempt to set this automatically. However, if you started the game with Faster Universalis, make sure it is disabled; if you loaded an existing game, make sure it's enabled."

 # Optional: self-referencing flag keys to suppress IDE warnings (safe to remove if you want)
 fum: "fum"
 fum__performance: "fum__performance"
 fum__qol: "fum__qol"
 fum__other: "fum__other"
 fum__performance__removals: "fum__performance__removals"
 fum__qol__speeds: "fum__qol__speeds"
 fum__other__general: "fum__other__general"
 fum__sop_removal: "fum__sop_removal"
 fum__nation_removal: "fum__nation_removal"
 fum__block_recolonization: "fum__block_recolonization"
 fum__pop_removal: "fum__pop_removal"
 fum__apply_performance_settings: "fum__apply_performance_settings"
 fum__army_movement_speed: "fum__army_movement_speed"
 fum__navy_movement_speed: "fum__navy_movement_speed"
 fum__battle_length: "fum__battle_length"
 fum__enable_save_game_compatability: "fum__enable_save_game_compatability"
