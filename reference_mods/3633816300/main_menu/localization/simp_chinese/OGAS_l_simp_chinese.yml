l_simp_chinese:
 OGAS: "OGAS"
 OGAS_desc: "OGAS"
 OGAS_Complete_desc: "[proximity]：[THIS.GetLocation.GetProximityToOwnerCapital|2W]\n无需$build_roads$"
 OGAS_Ongoing_desc: "[proximity]：[THIS.GetLocation.GetProximityToOwnerCapital|2W] (当前) / [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Ongoing').GetValue|2W] (最优)\n目标：向[THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Source').GetLocation.GetName]$build_roads$"
 OGAS_Cannot_Reach_desc: "无法将[proximity]提升至0以上"
 OGAS_Complete_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n[market_access]：[THIS.GetLocation.GetMarketAccess|2%V]\n无需$build_roads$"
 OGAS_Ongoing_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n[market_access]：[THIS.GetLocation.GetMarketAccess|2%V] (当前) / [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Ongoing').GetValue|2%V] (最优)\n目标：向[THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Source').GetLocation.GetName]$build_roads$"
 OGAS_Cannot_Reach_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n无法将[market_access]提升至0以上"
 OGAS_Introduction_Title: "OGAS"
 OGAS_Introduction: "OGAS 激活后，将评估境内所有[locations|e]，制定最优[road|e]规划，并根据潜在收益$build_roads$。\n只有在手动点击$RESET_BUTTON$后，才会重新规划[roads]。\n注意：鼠标放在[locations]上，会显示[road]规划。"
 OGAS_Auto_Road_Initialize_Button: "$RESET_BUTTON$[road]规划"
 OGAS_Auto_Road_Initialize_TT: "每当您的[proximity|e]有更新时（例如新的[road|e]建成、[maritime_presence|e]变化等），可以点击此处重新计算，获取更优[road|e]规划。请务必在[road][advance|e]更新后点击！！"
 OGAS_Auto_Road_Proximity_Button: "[proximity]模式"
 OGAS_Auto_Road_Market_Access_Button: "[market_access]模式"
 OGAS_Auto_Road_Construct_Button_Text: "自动$build_roads$"
 OGAS_Auto_Road_Construct_Toggle_Enable: "自动$build_roads$"
 OGAS_Auto_Road_Construct_Toggle_Disable: "停止自动$build_roads$"
 OGAS_Auto_Road_Min_Gold_Text: "储备金：[GetPlayer.MakeScope.GetVariable('OGAS_Auto_Road_Min_Gold').GetValue|0Y]@gold!"