l_english:
 OGAS: "OGAS"
 OGAS_desc: "OGAS"
 OGAS_Complete_desc: "[proximity]: [THIS.GetLocation.GetProximityToOwnerCapital|2W]\nNo further roads required"
 OGAS_Ongoing_desc: "[proximity]: [THIS.GetLocation.GetProximityToOwnerCapital|2W] (Current) / [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Ongoing').GetValue|2W] (Optimal)\nTarget: $build_roads$ toward [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Source').GetLocation.GetName]"
 OGAS_Cannot_Reach_desc: "Cannot raise [proximity] above 0"
 OGAS_Complete_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n[market_access]: [THIS.GetLocation.GetMarketAccess|2%V]\nNo further roads required"
 OGAS_Ongoing_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n[market_access]: [THIS.GetLocation.GetMarketAccess|2%V] (Current) / [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Ongoing').GetValue|2%V] (Optimal)\nTarget: $build_roads$ toward [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Source').GetLocation.GetName]"
 OGAS_Cannot_Reach_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\nCannot raise [market_access] above 0"
 OGAS_Introduction_Title: "OGAS"
 OGAS_Introduction: "Once activated, OGAS evaluates every owned [location|e] to determine an optimal [road|e] plan, and begins to $build_roads$ based on potential benefits.\nThe road plan only recalculates after you manually click $RESET_BUTTON$.\nNote: Hover [locations] to preview the road plan."
 OGAS_Auto_Road_Initialize_Button: "$RESET_BUTTON$ [road] Plan"
 OGAS_Auto_Road_Initialize_TT: "If [proximity|e] changes (e.g., new [road|e] completed, [maritime_presence|e] changes, etc.), click here to recalculate for a better road plan. Note: Make sure to click this after a Road [advance|e] update!!"
 OGAS_Auto_Road_Proximity_Button: "[proximity] Mode"
 OGAS_Auto_Road_Market_Access_Button: "[market_access] Mode"
 OGAS_Auto_Road_Construct_Button_Text: "Automate Road Construction"
 OGAS_Auto_Road_Construct_Toggle_Enable: "Automate your road construction"
 OGAS_Auto_Road_Construct_Toggle_Disable: "Deactivate automation of your road construction"
 OGAS_Auto_Road_Min_Gold_Text: "Gold to Save: [GetPlayer.MakeScope.GetVariable('OGAS_Auto_Road_Min_Gold').GetValue|0Y]@gold!"