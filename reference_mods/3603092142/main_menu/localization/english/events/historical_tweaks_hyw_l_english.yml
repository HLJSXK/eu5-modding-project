 historical_tweaks_hyw.1.title: "Unrest in [ROOT.GetCountry.GetName]"
 historical_tweaks_hyw.1.desc: "The kingdom teeters on the brink of collapse. Decades of misrule, noble feuds, and peasant misery have eroded the foundation of royal authority. The crown's word carries little weight beyond its walls, and the estates grumble with growing discontent. Unless order is restored, France may once again fall into an age of turmoil."
 historical_tweaks_hyw.1.historical_info: "Between 1336 and 1446, France endured immense instability marked by the Hundred Years' War, recurring peasant revolts, and fractious nobility undermining royal control. The monarchy's legitimacy weakened as rival claimants and rebellious dukes carved away at royal power."
 historical_tweaks_hyw.1.a: "Appease the estates and weather the storm."
 historical_tweaks_hyw.1.b: "Defy the nobles and assert the crown's will."