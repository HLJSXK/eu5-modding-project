l_english:
 wot_ottoman_extras.1.title: "Campaign Against [target_country.GetNameWithNoTooltip]"
 wot_ottoman_extras.1.desc: "As the [ROOT.GetCountry.GetGovernment.GetRulerTitle] is contemplating the next move in [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] grand design, [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] watches the triumphant [ROOT.GetCountry.GetAdjective] banners flutter in the wind.Even now, neighboring territories look ripe for incorporation into the growing [ROOT.GetCountry.GetFlavorRank].\n\nShould we claim [target.GetProvince.GetName], it would solidify our control over [target.GetArea.GetName] and further extend our influence in the region. The time has come to start a new military campaign!"
 wot_ottoman_extras.1.a: "[target.GetNameWithNoTooltip] will soon be ours!"
 
 wot_ottoman_extras.9.title: "The Sublime State Ascendant"
 wot_ottoman_extras.9.desc: "With Anatolia unified under our banner and the Balkans secured, the [ROOT.GetCountry.GetNameWithNoTooltip] realm stands at a crossroads of destiny. Our armies are battle-hardened, our treasury filled with the spoils of conquest, and our subjects—though diverse—begin to see the wisdom of our rule. To the east lie the ancient lands of Armenia and Persia, to the south the wealthy provinces of the Levant and Egypt, and beyond the Black Sea, the steppes of the Crimea beckon. The time has come to transform our state from a regional power into an empire that spans continents. Our ghazis hunger for new frontiers, and the world shall soon learn to tremble at the name of Osman."
 wot_ottoman_extras.9.a: "The conquest continues!"
 wot_ottoman_extras.10.title: "The Sublime State Ascendant"
 wot_ottoman_extras.10.desc: "The [ottoman_country.GetCountry.GetNameWithNoTooltip] realm, having unified Anatolia and secured the Balkans, now stands as one of the most formidable powers in the region. Their armies are battle-hardened and their ambitions clear—consolidation has given way to expansion. From the Black Sea to the Mediterranean, from the borders of Persia to the gates of Hungary, the neighbors of this rising empire must reckon with a new reality. They have transformed from a frontier beylik into a state capable of projecting power across multiple fronts. What was once a patchwork of Anatolian territories is now a unified force poised to reshape the balance of power."
 wot_ottoman_extras.10.a: "A new power emerges."
 wot_ottoman_extras.11.title: "The Age of Conquest Concludes"
 wot_ottoman_extras.11.desc: "The great campaigns that defined our era have drawn to a close. From the unification of Anatolia to the subjugation of the Balkans, from distant battlefields to hard-won treaties, the [ROOT.GetCountry.GetNameWithNoTooltip] realm has been transformed beyond recognition. Our borders are vast, our subjects numerous, and our reputation fearsome. Yet every age of conquest must eventually give way to an age of governance. The work ahead lies not in the thunder of cannons and the clash of steel, but in the patient administration of what we have won. Our empire stands secure, its foundations laid by the blood and valor of those who came before. What we do with this legacy is now the question that faces us."
 wot_ottoman_extras.11.a: "A new chapter begins"
 wot_ottoman_extras.12.title: "The Ottoman Expansion Halts"
 wot_ottoman_extras.12.desc: "The relentless Ottoman advance that reshaped the map of our world appears to have reached its limits. Whether through exhaustion, overextension, or simply satisfaction with their gains, the Ottomans have ceased their aggressive campaigns of conquest. Their vast realm—stretching across Anatolia, the Balkans, and beyond—now enters a period of consolidation. For the nations that border this empire, this brings a measure of relief, though none can say whether this peace will endure or merely serve as respite before another storm. The Ottoman state remains powerful, but for now at least, its armies rest."
 wot_ottoman_extras.12.a: "Let us hope it lasts"
 
 wot_ottoman_extras.100.title: "Campaign Against [target_country.GetNameWithNoTooltip]"
 wot_ottoman_extras.100.desc: "The lands of [target_country.GetName] lie within our natural sphere of influence, ripe for incorporation into the Ottoman realm. Their conquest would secure our borders and strengthen our position in the region. The time has come to assert our rightful claim to these territories. Our state stands ready to bring them under proper governance."
 wot_ottoman_extras.100.a: "[target_country.GetNameWithNoTooltip] will soon be ours!"