l_english:
 rise_of_persia.1.title: "Persia Reborn"
 rise_of_persia.1.desc: "Born from the ashes of invaders, the small territory of [target_character.GetName] was initially overshadowed by more powerful neighbors. However, the vision and ambition of [target_country.GetName] would prove far-reaching, as they have recently embarked on a path of expansion and consolidation, carving out their place in the tumultuous tapestry of a fragmented [ShowRegionNameWithNoTooltip('persia_region')].\n\n[target_character.GetShortNameWithNoTooltip] and [target_character.GetHerHis] successors skillfully capitalized on the prevailing chaos and divisions within the region. With each victory, the [target_country.GetAdjectiveWithNoTooltip] principality grows stronger, attracting warriors, scholars, and ambitious minds eager to participate in this rising power. Their strategic marriages, shrewd alliances, and military prowess gradually turned a modest state into an empire in the making."
 rise_of_persia.1.a: "Another region in flames."
 rise_of_persia.2.title: "The Rise of [target_country.GetNameWithNoTooltip]"
 rise_of_persia.2.a: "It is our destiny!"

 rise_of_persia.3.title: "The Persian Stalemate"
 rise_of_persia.3.desc: "The dream of the remnant principalities in [ShowRegionName('persia_region')] was never achieved, as the first among them has now been delayed indefinitely after their expansion failed to match their ambition. Surely there will be no Empire that could ever fill their void..."
 rise_of_persia.3.a: "This was for the best!"
 rise_of_persia.4.title: "The Rise of the [target_country.GetNameWithNoTooltip]"
 rise_of_persia.4.desc: "The dream of [target_character.GetName] has now been achieved, and the world trembles at the might of the [target_country.GetLongName]. Who will ever be able to stand against them?"
 rise_of_persia.4.a: "$common_string_what_can_we_do$"
 rise_of_persia.5.title: "The Rise of Persia"
 rise_of_persia.5.desc: "We have reached even beyond the wildest ambitions and dreams of the founding father of our dynasty. Where can we go from here?"
 rise_of_persia.5.a: "This will last forever!"

 rise_of_persia.100.title: "Campaign Against [target_country.GetNameWithNoTooltip]"
 rise_of_persia.100.desc: "As the [ROOT.GetCountry.GetGovernment.GetRulerTitle] is contemplating the next move in [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] grand design, [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] watches the triumphant [ROOT.GetCountry.GetAdjective] banners flutter in the wind.Even now, neighboring territories look ripe for incorporation into the growing [ROOT.GetCountry.GetFlavorRank].\n\nShould we claim [target.GetProvince.GetName], it would solidify our control over [target.GetArea.GetName] and further extend our influence in the region. The time has come to start a new military campaign!"
 rise_of_persia.100.a: "[target.GetNameWithNoTooltip] will soon be ours!"
 rise_of_persia.101.title: "The [target_country.GetLongNameWithNoTooltip] & [target_country2.GetNameWithNoTooltip]"
 rise_of_persia.101.desc: "Not every expansion of our [ROOT.GetCountry.GetFlavorRank] requires a military conquest. Sometimes an emissary can negotiate a treaty that is beneficial to both, that without bloodshed would expand our borders."
 rise_of_persia.101.a: "Give them a proposal they cannot refuse..."
 rise_of_persia.101.b: "We care not for their affairs!"
 rise_of_persia.101.tt: "[target_country.GetName] may be convinced to become our [ShowSubjectTypeName('vassal')]"
 rise_of_persia.102.title: "Demand from The [target_country2.GetName]"
 rise_of_persia.102.desc: "The [target_country2.GetAdjective] [target_country2.GetGovernment.GetFullRulerName] has sent an emissary that demands our submission to them, effectively joining their [target_country2.GetFlavorRank] as a [ShowSubjectTypeName('vassal')]."
 rise_of_persia.102.a: "Accept the demands."
 rise_of_persia.102.b: "We will not entertain these advances."
 rise_of_persia.103.title: "The [target_country.GetAdjectiveWithNoTooltip] Response"
 rise_of_persia.103.desc: "An emissary has returned from [target_country.GetCapital.GetName], bearing news that the [target_country.GetLongName] has agreed to submit to our authority and become our [ShowSubjectTypeName('vassal')]. Facing growing threats and recognizing the might of our [ROOT.GetCountry.GetFlavorRank], the [target_country.GetAdjectiveWithNoTooltip] rulers have chosen to swear fealty in exchange for our protection.\n\nThis marks a decisive step toward unifying the fractured Amirs of [ShowRegionName('persia_region')] under our banner, as our influence spreads and our destiny as the dominant power in the region becomes ever clearer."
 rise_of_persia.103.a: "Everyone will bend their knee eventually!"
 rise_of_persia.104.title: "[target_country.GetLongNameWithNoTooltip] Refuses!"
 rise_of_persia.104.desc: "It was always clear that the scoundrels in [target_country.GetCapital.GetName] lacked foresight. It was only our merciful hearts that forced us to give them the option to submit willingly, an option that they now have refused!"
 rise_of_persia.104.a: "We will meet them on the battlefield!"
 rise_of_persia.105.title: "The Integration of [target_province.GetNameWithNoTooltip]"
 rise_of_persia.105.desc: "With [target_province.GetName] now under our control, the Court finds itself at a critical juncture. The delicate process of assimilating the conquered land into the empire's vast tapestry must be navigated with precision and foresight. The fate of the province hangs in the balance, with the potential to become an integral part of our land or a source of unrest and discontent.\n\nThe Court debates the best approach to ensure a successful integration. Various voices emerge, offering counsel on the path forward. Some advise swift imposition of Ottoman laws and institutions to establish centralized control, fostering a sense of unity and loyalty among the populace. Others argue for a more cautious approach, urging respect for local customs and traditions to gain the trust of the conquered people."
 rise_of_persia.105.a: "Foster a sense of unity and loyalty"
 rise_of_persia.105.b: "Take a more cautious approach"

 rise_of_persia.500.title: "Stagnation of Persia"
 rise_of_persia.500.desc: "Political intrigue and diplomatic plays have failed to bridge the gap between out outward ambitions and our dreams of conquest. After decades of territorial stagnation, the once fearsome march of the armies of [ShowRegionName('persia_region')] has grinded to a halt. Through the combination of foreign interference, the might of our foes has extinguished what was once a bright flame, our rightful seat among the great powers.\n\nThe reality of our situation places us in a precarious position. Our failed attempt to ascend now opens the door for instability under the ever-watchful eye of our rivals. Only time will tell if we are meant to survive or become a footnote in the books of history."
 rise_of_persia.500.a: "A regretful turn of events."

 rise_of_persia.900.title: "End of The Mongol Age"
 rise_of_persia.900.desc: "The once-mighty Mongol Empire, which swept across the known world like a storm, has finally crumbled into dust. The great khans are gone, their banners torn, their armies scattered. For centuries, the steppes horsemen held Persia in their iron grip, but no more. The age of Mongol supremacy has ended, and from the ashes of their dominion, new powers shall rise to claim what was once theirs. The future of Persia now rests in Persian hands."
 rise_of_persia.900.a: "A new era begins."
