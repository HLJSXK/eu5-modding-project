l_english:
 STATIC_MODIFIER_NAME_ht_russian_unification_buff: "Russian Unification"
 STATIC_MODIFIER_NAME_ht_bulgarian_debuff: "Fractured Tsardom"
 historical_tweaks.1.title: "The Death of [GetCharacter('bul_ivan_alexander').GetName]"
 historical_tweaks.1.desc: "The long and successful reign of Tsar Ivan Alexander of Bulgaria has come to an end, plunging the Second Bulgarian Empire into a chaotic succession crisis. The kingdom is divided between his sons and the semi-autonomous coastal region of Dobruja asserts its independence. The Empire, once a major Balkan power, now stands fragmented and vulnerable, precisely when the Ottoman menace looms largest over the horizon"
 historical_tweaks.1.historical_info: "Upon the death of Tsar Ivan Alexander in 1371, the Second Bulgarian Empire fractured into the Tsardom of Vidin, the Tsardom of Tărnovo, and the Despotate of Dobruja, significantly weakening the Bulgarian resistance to the rising Ottoman Empire."
 historical_tweaks.1.a: "For the Lion of Tărnovo!"
 historical_tweaks.1.b: "Uphold the legacy of Vidin"
 historical_tweaks.1.c: "Secure the coastal domains of Dobruja"
 historical_tweaks.2.title: "The Reunion of the Bulgarian Lands"
 historical_tweaks.2.desc: "Decades have passed since the great division following the death of Tsar Ivan Alexander. Through great effort and military might, we have successfully brought the rebellious states of Vidin and Dobruja back into the fold. The nation is once again unified under a single Tsar, controlling all the ancient Bulgarian lands. It is time to decide whether we should continue to be known by the name of our capital, Tărnovo, or fully reclaim the ancient, glorious title of Bulgaria."
 historical_tweaks.2.a: "Restore the Imperial Name"
 historical_tweaks.2.b: "Let the Lion of Tărnovo be our standard"
 historical_tweaks.3.title: "The Reunion of the Bulgarian Lands"
 historical_tweaks.3.desc: "Decades have passed since the great division following the death of Tsar Ivan Alexander. Through great effort and military might, we have successfully brought the rebellious states of Vidin and Dobruja back into the fold. The nation is once again unified under a single Tsar, controlling all the ancient Bulgarian lands. It is time to decide whether we should continue to be known by the name of our capital, Tărnovo, or fully reclaim the ancient, glorious title of Bulgaria."
 historical_tweaks.3.a: "Restore the Imperial Name"
 historical_tweaks.3.b: "Where the Danube bends, our glory rises."
 historical_tweaks.4.title: "Towards Russian Unification"
 historical_tweaks.4.desc: "The lands of the Rus are drawing steadily toward unity. Old rivalries fade as our influence expands, and a shared identity begins to take hold among nobles and common folk alike. With consolidation underway, the state grows more confident and capable, ready to push further toward a single, powerful Rus."
 historical_tweaks.4.historical_info: "Upon the death of Tsar Ivan Alexander in 1371, the Second Bulgarian Empire fractured into the Tsardom of Vidin, the Tsardom of Tărnovo, and the Despotate of Dobruja, significantly weakening the Bulgarian resistance to the rising Ottoman Empire."
 historical_tweaks.4.a: "For the Motherland!"
 historical_tweaks.4.b: "We have no such ambitions."