l_english:
 crisis_of_the_timurids.1.title: "The Crisis of The Timurid Empire"
 crisis_of_the_timurids.1.desc: "The great Timurid Empire, built on the conquests of Timur himself, begins to crumble under the weight of internal strife. Regional powers, long subjugated beneath Timurid rule, sense the weakness at the center and move to reclaim their ancestral lands. The great khans who once commanded the loyalty of princes from Anatolia to Hindustan now find their authority contested and their grip loosening with each passing season.\n\nAs the central authority of the Timurids fractures, the subject peoples of our realm see an opportunity for liberation."
 crisis_of_the_timurids.1.a: "Dark clouds form over our empire..."
 crisis_of_the_timurids.2.title: "The Empire Endures"
 crisis_of_the_timurids.2.desc: "Through strength and determination, we have weathered the storm of internal strife that threatened to tear apart the Timurid realm. The regional powers that rose in rebellion have been subdued or appeased, and the empire stands once more united under firm central authority. The crisis has passed, and our domain remains intact—a testament to the enduring legacy of the great Timur himself."
 crisis_of_the_timurids.2.a: "The world shall tremble under our empire!"
 crisis_of_the_timurids.4.title: "Create A Vassal"
 crisis_of_the_timurids.4.desc: "With the death of Timur, our lands have grown increasingly unstable, we should give it to a vassal so they can govern in our stead."
 crisis_of_the_timurids.4.a: "Such measures must be taken for our preservation."
 crisis_of_the_timurids.4.b: "Maybe our future lies elsewhere."
 crisis_of_the_timurids.4.c: "There is no need, we will survive."
 crisis_of_the_timurids.5.title: "A Restless Subject"
 crisis_of_the_timurids.5.desc: "[target_subject.GetName] has grown increasingly disloyal to our rule. Their governors speak openly of independence, and unrest spreads through their lands. We must decide whether to grant them their freedom or take drastic measures to ensure their continued submission."
 crisis_of_the_timurids.5.a: "Grant them independence. We cannot hold what we do not control."
 crisis_of_the_timurids.5.b: "Shower them with gifts and promises to secure their loyalty."
 crisis_of_the_timurids.6.title: "An Opportunity for Favor"
 crisis_of_the_timurids.6.desc: "Our vassal [target_subject.GetName] has proven loyal thus far, but whispers from their court suggest they would welcome a gesture of goodwill from us. A generous gift could further cement their devotion to our cause."
 crisis_of_the_timurids.6.a: "Send them gold and reaffirm our bond."
 crisis_of_the_timurids.6.b: "They are loyal enough. Save our treasury for more pressing matters."
 crisis_of_the_timurids.7.title: "Demands from a Vassal"
 crisis_of_the_timurids.7.desc: "[target_subject.GetName] has sent envoys with bold demands—reduced tribute, greater autonomy, and recognition of their local authority. They claim this is necessary to maintain order in their lands. If we refuse, their loyalty may waver."
 crisis_of_the_timurids.7.a: "Grant their demands and pay them handsomely to keep the peace."
 crisis_of_the_timurids.7.b: "Reject their insolence. They serve at our pleasure."
 
 establish_governor: "Establish A Governor"
 establish_governor_desc: "Let us establish our relatives into roles of governance to ease the issues plaguing our state."

 choose_area: "Choose Area"