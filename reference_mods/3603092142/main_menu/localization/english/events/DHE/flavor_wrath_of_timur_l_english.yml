l_english:
 wrath_of_timur.1.title: ""
 wrath_of_timur.2.title: "Timur's Marriage to Saray Mulk Khanum"
 wrath_of_timur.2.desc: "Our lord Timur has taken a new bride—Saray Mulk Khanum, a princess of the Borjigin dynasty and descendant of Genghis Khan himself. This union is more than political convenience; it is a declaration. By marrying into the line of the great Khans, Timur claims legitimacy as heir to the Mongol legacy. His descendants shall bear a new name, the Gurkani—'son-in-law'—a testament to this sacred bloodline. Through this marriage, our ruler binds himself to the conquerors of old, and his children shall carry the weight of two empires in their veins."
 wrath_of_timur.2.a: "A union that will echo through the ages."
 wrath_of_timur.2.b: "Let him marry who he wishes."
 wrath_of_timur.7.title: ""
 wrath_of_timur.8.title: "[actor.GetName] offers loyalty"
 wrath_of_timur.8.desc: "A nation is offering their loyalty. Shall we accept to make our conquests easier?"
 wrath_of_timur.8.a: "Accept it."
 wrath_of_timur.8.b: "Refuse."
 wrath_of_timur.13.title: ""

 muzaffarids_injuids_flavor.1.title: "Invasion of Kerman"
 muzaffarids_injuids_flavor.1.desc: "We should invade Kerman and bring it into our fold. With it's wealth, our nation shall prosper."
 muzaffarids_injuids_flavor.1.a: "Gather the armies, we march for war!"
 muzaffarids_injuids_flavor.1.b: "No we should bide our time,"
 muzaffarids_injuids_flavor.2.title: "Injuid Invasion of Muzaffarids for Kerman"
 muzaffarids_injuids_flavor.2.desc: "The Muzaffarids have taken over Kerman! We cannot let their aggression continue, let us attack them and finally gain supremacy in our region."
 muzaffarids_injuids_flavor.2.historical_info: "The Muzaffarids under Mubariz al-Din clashed with the Injuids led by Abu Esshaq over control of Kirman starting in 1347. Despite their previous friendly relations, Abu Esshaq's ambitions sparked a prolonged conflict. After failing to capture Yazd (1350-1351) and suffering defeat in battle (1353), Abu Esshaq retreated to Shiraz and eventually surrendered. He escaped to Isfahan, but Mubariz al-Din pursued and captured him there, executing the Injuid ruler and annexing Fars and western Iran to Muzaffarid control."
 muzaffarids_injuids_flavor.2.a: "They shall know no mercy."
 muzaffarids_injuids_flavor.2.b: "Forget it, they are no threat to us."
 muzaffarids_injuids_flavor.3.title: "Injuid Aggression"
 muzaffarids_injuids_flavor.3.desc: "Those Injuid fools declared war upon us for our land. We must defend against them!"
 muzaffarids_injuids_flavor.3.historical_info: "The Muzaffarids under Mubariz al-Din clashed with the Injuids led by Abu Esshaq over control of Kirman starting in 1347. Despite their previous friendly relations, Abu Esshaq's ambitions sparked a prolonged conflict. After failing to capture Yazd (1350-1351) and suffering defeat in battle (1353), Abu Esshaq retreated to Shiraz and eventually surrendered. He escaped to Isfahan, but Mubariz al-Din pursued and captured him there, executing the Injuid ruler and annexing Fars and western Iran to Muzaffarid control."
 muzaffarids_injuids_flavor.3.a: "We will prevail."
 muzaffarids_injuids_flavor.4.title: "Our Victory"
 muzaffarids_injuids_flavor.4.desc: "Our enemies have fallen and we have gained supremacy over Fars. It's time to clean up the petty lords."
 muzaffarids_injuids_flavor.4.historical_info: "After destroying the Injuids, the Muzaffarids became the dominant power in central Iran with Shiraz as their capital. Mubariz al-Din was strong enough to reject a vassalization offer from Jani Beg, khan of the Golden Horde, and even expanded into Azerbaijan despite Jani Beg having conquered it in 1357."
 muzaffarids_injuids_flavor.4.a: "Our dominance is assured."
 muzaffarids_injuids_flavor.5.title: "Timur At Our Doorsteps"
 muzaffarids_injuids_flavor.5.desc: "The Timurids are at our border, we must make a choice for our future. Their armies have ravaged Persia, and they don't seem to stop"
 muzaffarids_injuids_flavor.5.historical_info: ""
 muzaffarids_injuids_flavor.5.a: "We must show them loyalty to survive!"
 muzaffarids_injuids_flavor.5.b: "Our fate will not be controlled by outsiders."
 muzaffarids_injuids_flavor.6.title: "Muzaffarids Offer Loyalty"
 muzaffarids_injuids_flavor.6.desc: "The Muzaffarids have seen our greatness, and wish to swear fealty."
 muzaffarids_injuids_flavor.6.a: "Haha! Accept their loyalty."
 muzaffarids_injuids_flavor.6.b: "Their foolish submission mean nothing to me."
 muzaffarids_injuids_flavor.7.title: "Act of Defiance"
 muzaffarids_injuids_flavor.7.desc: "The Timurids seem busy on their conquests, maybe we can use this opportunity to seek indepedence from them."
 muzaffarids_injuids_flavor.7.a: "The time is right, we must work fast before they realize."
 muzaffarids_injuids_flavor.7.b: "No, we cannot risk the lives of our people."
 muzaffarids_injuids_flavor.8.title: "Muzaffarids Betray Us!"
 muzaffarids_injuids_flavor.8.desc: "Those unworthy fools have decided to seek indepndence from us!"
 muzaffarids_injuids_flavor.8.a: "We will crush those insolent fools!"

 rise_of_safavids_flavor.1.title: "The Rise of the Safavids"
 rise_of_safavids_flavor.1.desc: "The Safavid Order, once a peaceful Sufi movement, has transformed into a formidable military force under the leadership of Ismail. With fervent Qizilbash warriors at his command, the young Shah has begun his campaign to unite Persia under the banner of Shia Islam. The old powers of the region now face a new and determined challenger."
 rise_of_safavids_flavor.1.a: "A new contender rises."
 rise_of_safavids_flavor.1.b: "A new contender rises."
 rise_of_safavids_flavor.2.title: "The Safavid Order"
 rise_of_safavids_flavor.2.desc: "In the rugged highlands of Ardabil, a young mystic named Ismail has emerged from the Safavid Sufi order. His charisma and religious fervor have attracted thousands of devoted followers—the Qizilbash—who see him as a divine figure destined to unite Persia under the Shia faith. His supporters grow bolder by the day, and whispers spread that he may soon claim rulership in [ROOT.GetName]. Some at court urge us to embrace this movement and place Ismail on the throne, believing his zeal could revitalize our realm. Others warn that empowering religious extremists may unleash forces beyond our control."
 rise_of_safavids_flavor.2.a: "Enthrone the young Safavid mystic"
 rise_of_safavids_flavor.2.b: "We shall maintain our current dynasty"
 rise_of_safavids_flavor.500.title: ""

