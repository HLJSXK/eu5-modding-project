 crisis_of_the_timurids: "Crisis of The Timurids"
 crisis_of_the_timurids_desc: "The Timurid Empire teeters on the brink of collapse as regional powers rise up against central authority. What was once unified under the iron fist of the great conqueror now splinters into rival factions and competing interests. The empire bleeds from within as subject peoples awaken to their own strength and demand independence from the distant khans."
 
