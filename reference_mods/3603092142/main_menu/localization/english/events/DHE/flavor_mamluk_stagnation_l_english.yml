 flavor_mamluk_stagnation.10.desc: ""
 flavor_mamluk_stagnation.10.a: ""
 flavor_mamluk_stagnation.100.title: "The Mamluk Sultanate Crumbles"
 flavor_mamluk_stagnation.100.desc: "The once-mighty Mamluk Sultanate, weakened by internal decay and clinging to outdated military traditions, has fallen before our armies. Their horsemen, magnificent as they were, could not withstand our disciplined janissaries and artillery. Egypt, the Levant, and the holy cities of Arabia now recognize Ottoman sovereignty. From the ashes of Mamluk rule, we shall forge new provinces loyal to the Sublime Porte, while preserving stability through loyal governors in the outlying territories."
 flavor_mamluk_stagnation.100.a: "A new era dawns in the East."
 flavor_mamluk_stagnation.100.b: "Their lands shall strengthen our realm."

 mamluk_collapse_tt: "The Mamluk Sultanate collapses. The Ottoman Empire seizes control of Egypt, the Levant, and Hedjaz."

