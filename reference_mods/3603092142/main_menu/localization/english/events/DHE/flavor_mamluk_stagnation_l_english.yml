l_english:
 flavor_mamluk_stagnation.1.title: "The Stagnation"
 flavor_mamluk_stagnation.1.desc: "Our Mamluk warriors, proud masters of the horse and lance, view the adoption of gunpowder weapons as beneath their station. The very notion that a common soldier with a musket could fell a trained cavalryman insults the martial traditions that have sustained our realm for generations. While European armies modernize and our Ottoman rivals embrace firearms, our military establishment clings stubbornly to the methods of old."
 flavor_mamluk_stagnation.1.a: "The future is uncertain."
 flavor_mamluk_stagnation.2.title: "Whispers of Change"
 flavor_mamluk_stagnation.2.desc: "A few voices among our ranks have begun to question whether our traditional methods can withstand the changing nature of warfare. Though the Mamluk elite remains deeply conservative, some younger officers suggest that ignoring the innovations spreading across the world may leave us vulnerable. Yet any reform faces fierce resistance from those who have built their power on the old ways."
 flavor_mamluk_stagnation.2.a: "The old ways have served us well."
 flavor_mamluk_stagnation.2.b: "We must adapt to survive."
 flavor_mamluk_stagnation.3.title: "The Mamluks Demand Their Due"
 flavor_mamluk_stagnation.3.desc: "The Mamluk emirs have grown accustomed to a certain standard of wealth and privilege, one that their military service—in theory—justifies. Yet as the state's coffers tighten and revenues decline, their expectations have not diminished in the slightest. A delegation of senior emirs now stands before the court, demanding increased stipends, land grants, and monetary gifts befitting their status. They frame it as compensation for their loyal service, but the reality is clear: the warrior elite believes itself entitled to the state's wealth regardless of circumstance. To refuse would be to challenge the very foundation of Mamluk power, yet to acquiesce is to drain what little remains in the treasury."
 flavor_mamluk_stagnation.3.a: "Grant them what they demand"
 flavor_mamluk_stagnation.3.b: "The treasury cannot bear this burden"
