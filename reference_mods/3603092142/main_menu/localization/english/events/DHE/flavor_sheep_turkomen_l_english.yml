l_english:
 flavor_sheep_turkomen.1.title: "Rise of Qara Qoyunlu"
 flavor_sheep_turkomen.1.desc:  "The Black Sheep Turkomens have emerged from the steppes as a formidable power. Under the leadership of their dynasty, they have carved out a realm from the fragmented lands of the former Ilkhanate. Their warriors, hardened by constant warfare against rival tribes and neighboring powers, now stand ready to forge a lasting legacy. The time has come for the Qara Qoyunlu to take their rightful place among the great powers of the East."
 flavor_sheep_turkomen.1.a: "We shall make our mark."
 flavor_sheep_turkomen.2.title: "Rise of Qara Qoyunlu"
 flavor_sheep_turkomen.2.a: "Another player in history."
 flavor_sheep_turkomen.2.b: "I wonder what fate has in store for them."
 flavor_sheep_turkomen.3.title: "Invasion of the Timurids"
 flavor_sheep_turkomen.3.desc: "The Timurid Empire, weakened by succession struggles and internal strife, presents an opportunity too great to ignore. Their once-mighty armies that terrorized the world under Timur now stand divided among squabbling princes. Our scouts report their borders are poorly defended, their governors distracted by court intrigues. Should we strike now while they are vulnerable, we could seize valuable territories and establish ourselves as the dominant power in the region. Yet some counsel caution—the Timurids, even weakened, remain dangerous, and a failed invasion could invite their full wrath upon us."
 flavor_sheep_turkomen.3.a: "Onwards to victory!"
 flavor_sheep_turkomen.3.b: "The time is not right."
 flavor_sheep_turkomen.4.title: "Rise of Aq Qoyunlu"
 flavor_sheep_turkomen.4.a: "Another player in history."
 flavor_sheep_turkomen.4.b: "I wonder what fate has in store for them."
 flavor_sheep_turkomen.10.title: "Rise of Aq Qoyunlu"
 flavor_sheep_turkomen.10.desc: "The White Sheep Turkomens have risen to prominence in the lands of Anatolia and Azerbaijan. Their confederation of tribes, bound by blood and ambition, has proven itself through countless battles against both Christian and Muslim foes. Under the banner of the white sheep, they have united disparate clans into a force that commands respect from Constantinople to the Caspian. The future of their people beckons, and they shall answer with steel and determination."
 flavor_sheep_turkomen.10.a: "We shall make our mark."
 flavor_sheep_turkomen.12.title: "The White Sheep Ascendant"
 flavor_sheep_turkomen.12.desc: "For generations, the Black Sheep have lorded over the lands of Azerbaijan and Iraq, their power seeming unassailable. But their strength has begun to wane, their rulers grown complacent and divided by succession disputes. Our confederation has grown strong in Anatolia and Diyarbakır, our warriors eager for glory and plunder. The time has come to settle the ancient rivalry between the White Sheep and the Black Sheep once and for all. Under our banner, we shall unite all Turkomen lands and prove that the Aq Qoyunlu are destined to rule where the Qara Qoyunlu have failed."
 flavor_sheep_turkomen.12.a: "White shall triumph over Black!"
 flavor_sheep_turkomen.12.b: "We should seldom fight between us."
