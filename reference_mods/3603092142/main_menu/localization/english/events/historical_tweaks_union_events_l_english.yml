 historical_tweaks_union.1.title: "[ROOT.GetCountry.GetName]"
 historical_tweaks_union.1.desc: "desc"
 historical_tweaks_union.1.a: "Great!"
 historical_tweaks_union.2.title: "The Habsburg Web"
 historical_tweaks_union.2.desc: "Our influence extends beyond borders, and the prestige of our line ensures loyalty and stability among our partners."
 historical_tweaks_union.2.a: "Enforce Dynastic Unity"
 historical_tweaks_union.2.b: "Celebrate Our Lineage"
 historical_tweaks_union.3.title: "[target.GetNameWithNoTooltip] Under Our Crown"
 historical_tweaks_union.3.desc: "Our house now rules over [target.GetName]. The bonds of dynasty secure our influence and honor across both lands."
 historical_tweaks_union.3.a: "Unite the Crowns"
 historical_tweaks_union.3.b: "One Crown, One Dynasty"
 historical_tweaks_union.4.title: "[TIR.GetCountry.GetNameWithNoTooltip] Under Our Crown"
 historical_tweaks_union.4.desc: "Through careful dynastic maneuvering, the Princely County of [TIR.GetCountry.GetName] has passed peacefully into our hands. This invaluable acquisition secures the vital Alpine passes, solidifying our control over the heart of Central Europe."
 historical_tweaks_union.4.historical_info: "The County of Tyrol was secured by the Habsburgs upon the death of its last ruling countess, Margaret of Tyrol, in 1363. The transfer of sovereignty was a key step in the expansion of Habsburg power, granting them critical influence over the Alpine trade and military routes."
 historical_tweaks_union.4.a: "Unite the Crowns"
 historical_tweaks_union.4.b: "We have no need of them."