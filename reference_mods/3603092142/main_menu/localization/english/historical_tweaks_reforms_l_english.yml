l_english:
 ht_custom_name_prefix: "Country Prefix"
 ht_custom_name_prefix_desc: "Our state styles itself with an unusual rank."
 ht_custom_name_noprefix: "No Country Prefix"
 ht_custom_name_noprefix_desc: "We do not consider ourselves among the standard kingdoms and empires."
 ht_hungarian_malaise: "Hungarian Malaise"
 ht_hungarian_malaise_desc: "The ascendancy of the nobility over the Crown has rendered the kingdom a prisoner of its own borders, where the estates refuse to authorize the taxes or levies necessary to expand beyond the Carpathian frontier."
 ht_bohemian_borders: "Bohemian Identity"
 ht_bohemian_borders_desc: "We are the masters of a natural citadel, a land perfectly defined by the mountain ranges that encircle us. To look beyond the Sudetes or the Bohemian Forest is to invite instability into a realm that nature herself has declared complete."