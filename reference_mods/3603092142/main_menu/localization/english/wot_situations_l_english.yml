 rise_of_persia: "Rise of Persia"
 rise_of_persia_desc: "For generations, the Persian lands have languished under foreign dominion—ruled by Turkic conquerors, Mongol successors, and distant overlords who care little for the ancient glories of Iran. Yet beneath this subjugation, the spirit of Persia endures. From Khorasan to Azerbaijan, Persian nobles sharpen their swords and rally their warriors. The time has come for the heirs of the Persia to reclaim their birthright and reshape the destiny of their homeland. The question is not whether Persia will rise again, but who shall lead it into a new age of greatness."
