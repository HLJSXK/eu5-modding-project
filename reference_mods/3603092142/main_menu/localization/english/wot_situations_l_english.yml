 wot_turkish_expansion: "The Turkish Conquests"
 wot_turkish_expansion_desc: "Having unified the fractured beyliks of Anatolia and brought the Balkans under Ottoman dominion, the state stands poised to fulfill its destiny as a great empire. No longer content with regional supremacy, Ottoman ambitions turn to the rich lands that surround them on all sides. To the south lie the ancient cities of the Levant and the wealth of Egypt, crossroads of trade between East and West. Beyond them, the holy cities of the Hijaz and the spice-rich ports of Yemen beckon. To the east, the Armenian highlands and the borderlands with Persia await attention. Across the Black Sea, the Crimean Peninsula and the vast steppes beyond offer new frontiers for conquest and settlement. Even the shores of North Africa, from Tripoli to Algiers, fall within the expanding Ottoman sphere of influence.\n\nThis is no mere territorial aggrandizement, but the forging of an empire that will span three continents and command the strategic waterways that connect them. Each campaign brings not only new lands and subjects, but also new challenges to administration and the ability to maintain cohesion across such diverse territories. The Ottoman armies are battle-hardened and the treasury robust, yet the question remains: how far can the realm extend before it reaches the limits of what can be effectively governed? For now, opportunity beckons, and the state shall answer the call with steel and determination."
 
 wot_turkish_plan_invasion: "Plan Invasion"
 wot_turkish_plan_invasion_desc: "Identify a suitable target for conquest and prepare to extend Ottoman dominion over their lands."

