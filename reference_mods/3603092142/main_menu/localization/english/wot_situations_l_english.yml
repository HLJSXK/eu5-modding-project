 press_persian_claims: "Press Claims"
 press_persian_claims_desc: "[ShowRegionName('persia_region')] now lies free from foreign rule, however, local warlords sharpen their blades to retake the mantle of Persia. It is up to us to unite them all under #italic our#! banner!"
 claim_persian_mantle: "Declare Ourselves The True Heirs of Persia"
 claim_persian_mantle_desc: "We have finally gained enough strength to declare ourselves the heirs to Persia. Our armies stand ready, our treasury overflows, and our name commands respect across the Iranian plateau. The time has come to proclaim what all can see—that we are the rightful Shahanshah, the King of Kings, destined to unite the Persian lands under one banner. Let all pretenders bow before our throne, or be swept aside by the tide of history."
 annex_persian_amir: "Integrate Persian Vassals"
 annex_persian_amir_desc: "The petty amirs and regional governors who once carved up Persia into fragmented fiefdoms now bend the knee to our authority. By granting them honorary positions at court, promising their families continued wealth and influence, and gradually absorbing their administrations into our own, we can peacefully integrate these vassals into a unified Persian state. The process will be swift, for they recognize that their future lies not in independence, but in the glory of a restored Iran."
 persia_rise_cores_tt: "We will gain cores upon Persia."
 restore_persian_cities: "Restore Persian Cities"
 restore_persian_cities_desc: "The poets once sang of cities whose splendor rivaled the gardens of paradise—where silk-laden caravans arrived from distant lands, where scholars debated in marble halls, where fountains cooled bustling bazaars. Those days have passed, but they need not remain merely memories. Let us rebuild what was lost and write a new chapter in Persia's eternal story."
