l_simp_chinese:
 nwip_exploration.1.title: "本地勘探者绘制内陆地图"
 nwip_exploration.1.desc: "一位来自[launch_location.GetName]的居民近日声称自己收集到了[target.getName]附近区域的信息，并愿意有偿分享其绘制的地图。如果我们想要向大陆深处持续探索，[character.getName]也表示愿意受雇担任勘探者。"
 nwip_exploration.1.a: "你说[target.getName]的地图？听起来很有意思！"
 nwip_exploration.1.b: "何时勘探、如何勘探、是否勘探——都由我们决定"