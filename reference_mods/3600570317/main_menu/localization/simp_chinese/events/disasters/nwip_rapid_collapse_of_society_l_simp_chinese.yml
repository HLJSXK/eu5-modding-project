l_simp_chinese:
 rapid_collapse_of_society: "社会的迅速崩溃"
 rapid_collapse_of_society_desc: "瘟疫、饥荒、亲缘纽带日渐崩解，我们的聚居地正被侵蚀。酋长反目争斗，田地荒芜废弃，整家整户遁入森林。除非我们让出土地重组政权，否则国家将分崩离析。"
 rcs_has_not_happened_tt: "此地尚未经历过该灾难。"
 an_event_occurs_tt: "灾变正在发生……"
 no_event_occurs_tt: "本月没有发生重大事件。"
 rapid_collapse_of_society.1.title: "分崩离析"
 rapid_collapse_of_society.1.desc: "病痛与匮乏的低语沿着一处处篝火传递。村落沉入黄昏，再未亮起。信使带来长老逝去、粮仓空竭、仪式中断的消息。长者恳求退守休养，热血青年却主张奋起抗争。"
 rapid_collapse_of_society.1.a: "我们必须渡过难关。"
 rapid_collapse_of_society.1.tt: "灾难降临，稳定动摇，人心惶惶。"
 rapid_collapse_of_society.2.title: "鬼村"
 rapid_collapse_of_society.2.desc: "一片棚屋空空荡荡——炉床积灰冰冷，编织草席弃置原地。寥寥数人守着炊烟。我们是否该任其消亡，饶过残存之人？"
 rapid_collapse_of_society.2.a: "随它去吧。"
 rapid_collapse_of_society.2.b: "坚定维持，就有办法。"
 rapid_collapse_of_society.3.title: "遁入荒野"
 rapid_collapse_of_society.3.desc: "家家户户趁着星光沿鹿径潜行，背负着锅釜与传说。他们追寻猎物、寻觅清泉，只为远离悲恸。"
 rapid_collapse_of_society.3.a: "我们束缚不了风。"
 rapid_collapse_of_society.4.title: "权座倾颓"
 rapid_collapse_of_society.4.desc: "就连议事会的篝火也渐趋微弱。议事厅中鼓声稀疏，酋长之声在空荡厅堂间回响。"
 rapid_collapse_of_society.4.a: "熄灭余烬，另寻前路。"
 rapid_collapse_of_society.4.b: "守护烟火，矢志不移。"
 rapid_collapse_of_society.101.title: "另一场“出谷纪”"
 rapid_collapse_of_society.101.desc: "日复一日，足迹踏出了路径。我们在暮色的寂静中清点失踪者。"
 rapid_collapse_of_society.101.a: "人们悄然离去。"
 rapid_collapse_of_society.101.b: "这里留不住他们。"
 rapid_collapse_of_society.10.title: "寂静之后"
 rapid_collapse_of_society.10.desc: "最糟的时期已经过去。沉寂笼罩之下，我们盘点现状：寥寥无几的人声，还有新的道路和深刻的教训。聚落终将重聚。"
 rapid_collapse_of_society.10.a: "召集幸存者。"
 rapid_collapse_of_society.10.tt: "灾难结束了。假以时日，秩序自会回归。"