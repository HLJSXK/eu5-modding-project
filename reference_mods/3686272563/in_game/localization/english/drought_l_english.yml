l_english:
 # Popup titles and descriptions with region name
 drought_start.t:0 "Drought Strikes [SCOPE.sRegion('drought_affected_region').GetName]"
 drought_start.desc:0 "Reports from across [SCOPE.sRegion('drought_affected_region').GetName] speak of failing crops and dying livestock. Wells are running dry, rivers shrinking to trickles. The skies remain pitilessly clear, day after day.\n\nLocal governors warn that food reserves are dwindling. Farmers speak of fields that yield only dust. Without rain, famine looms on the horizon."
 drought_start.opt_acknowledge:0 "We must endure."
 
 drought_end.t:0 "The Rains Return to [SCOPE.sRegion('drought_affected_region').GetName]"
 drought_end.desc:0 "At long last, clouds have gathered over [SCOPE.sRegion('drought_affected_region').GetName]. Rain falls steadily across the parched lands. Wells refill, rivers swell, and the earth drinks deeply.\n\nFarmers plant new seeds with hope renewed. The worst has passed, though it will take years for the region to fully recover from the devastation. The dead are buried, but not forgotten."
 drought_end.opt_relief:0 "Nature shows mercy at last."
 
 # Modifier names - MUST match the modifier key exactly
 STATIC_MODIFIER_NAME_drought_effect_mild:0 "Mild Drought"
 drought_effect_mild_desc:0 "Persistent water shortage strains agricultural yields. All farming activities suffer from moisture stress.\n\n§YNote: Only goods actually produced in affected locations are impacted.§!"
 
 STATIC_MODIFIER_NAME_drought_effect_moderate:0 "Moderate Drought"
 drought_effect_moderate_desc:0 "A sustained agricultural crisis grips this region. Food production has fallen significantly. Emergency measures are being implemented, but hunger spreads.\n\n§YNote: Only goods actually produced in affected locations are impacted.§!"
 
 STATIC_MODIFIER_NAME_drought_effect_severe:0 "Severe Drought"
 drought_effect_severe_desc:0 "Brutal conditions prevail. Crops fail entirely in many areas. Livestock die by the hundreds. Famine threatens entire provinces as desperate populations begin to migrate.\n\n§YNote: Only goods actually produced in affected locations are impacted.§!"
 
 STATIC_MODIFIER_NAME_drought_effect_catastrophic:0 "Catastrophic Drought"
 drought_effect_catastrophic_desc:0 "An apocalyptic event turns fertile land to desert. Mass starvation. Society teeters on collapse. This drought will be remembered for generations as a time of unspeakable suffering.\n\n§YNote: Only goods actually produced in affected locations are impacted.§!"
 
 STATIC_MODIFIER_NAME_drought_region_marker:0 "Drought Region Marker"
 drought_region_marker_desc:0 "Internal tracking: This region experienced a recent drought."
 
 STATIC_MODIFIER_NAME_drought_cooldown_effect:0 "Drought Cooldown"
 drought_cooldown_effect_desc:0 "This region is temporarily protected from new droughts while recovering from the previous event."
 drought.1.t:0 "Drought Poll Start"
 drought.2.t:0 "Drought Poll End"
