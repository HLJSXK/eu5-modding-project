l_english:
  estate_loan_via_parliament:0 "Emergency Loan to the Crown"
  estate_loan_via_parliament_desc:0 "Borrow 25% of each Estate's gold as an interest-free loan."
  estate_loan_via_parliament_req_support_tt:0 "Requires at least 50% Parliament Support for the current issue."
  estate_loan_via_parliament_req_once_tt:0 "Can only be used once per Parliament session."
  estate_loan_via_parliament_req_estates_tt:0 "Requires at least one non-Crown Estate with gold."
  estate_loan_via_parliament_req_credit_tt:0 "Blocked while Estate Credit Ruined is active."
  estate_loan_via_parliament_effect_tt:0 "Control and Tax Income Efficiency are reduced by 5% for 60 months."
  estate_loan_via_parliament_inflation_tt:0 "We gain #Y [GetPlayer.MakeScope.GetVariable('estate_loan_inflation_preview').GetValue|%Y]#! Inflation"

  estate_loan_hidden_title:0 " "

  STATIC_MODIFIER_NAME_estate_loan_penalty:0 "Emergency Loan"
  STATIC_MODIFIER_DESC_estate_loan_penalty:0 "An interest-free loan has been taken from the Estates via Parliament.\n\nOutstanding principal: #Y [GetPlayer.MakeScope.GetVariable('estate_loan_principal').GetValue|V2]#!@gold!\nMonths remaining: #Y [GetPlayer.MakeScope.GetVariable('estate_loan_months_left').GetValue|V0]#!"

  estate_loan_repayment_title:0 "Emergency Loan Due"
  estate_loan_repayment_desc:0 "The interest-free loan taken from the Estates via Parliament has reached maturity.\n\nOutstanding principal: #Y [ROOT.GetVariable('estate_loan_principal').GetValue|V2]#!@gold!\n\nIf we fail to repay, our legitimacy and stability will collapse and the Estates' satisfaction will plummet."
  estate_loan_repayment_pay:0 "Repay the loan"
  estate_loan_repayment_default:0 "Refuse to repay"
  estate_loan_repayment_pay_tt:0 "Repay the full principal to the Estates (#Y [ROOT.GetVariable('estate_loan_principal').GetValue|V2]#!@gold!). The treasury may go negative; the usual borrowing and bankruptcy rules apply."
  estate_loan_repayment_default_tt:0 "Default on the loan: lose 50% legitimacy, 50 Stability, and 25% Estate Satisfaction (all estates). Gain Estate Credit Ruined for 10 years."
  STATIC_MODIFIER_NAME_estate_credit_ruined:0 "Estate Credit Ruined"
  STATIC_MODIFIER_DESC_estate_credit_ruined:0 "The Crown has repudiated an Emergency Loan. The Estates will not extend further interest-free credit, and lenders demand harsher terms.\n\nEffects:\n- Blocks 'Emergency loan to the Crown'\n- Increased loan interest (approx. +3% yearly)"
