l_english:
 TAKE_ESTATE_LOAN: "Take out a [loan|e] of $AMOUNT|V$@gold! for $MONTHS|Y$ months with a yearly [interest|e] of [COUNTRY.GetModifierValue('bank_interest')].\n\nTaking this loan increases [inflation |e] by 0.1%. \n\nThe [estates|e] have made [COUNTRY.GetEconomy.GetRemainingLoanCapacity|V2]@gold! available for us to borrow."

ASK_REPAY_LOAN_DESC: "My Lord, our national bank [loan|E] of $AMOUNT|Y$[gold_i] has expired.\n\nWe can repay the loan immediately in its full amount, or we may choose to extend this loan for a period of $DURATION|Y$ month and continue paying the interest of $INTEREST|Y$. Extension of the loan will cause additional 0.1% inflation."