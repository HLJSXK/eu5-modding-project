l_english:
 # Budget panel strings
 VI_BUREAUCRACY_COST_LABEL:0 "[vi_bureaucracy_cost|e]"
 VI_BUREAUCRACY_COST_TITLE:0 "Bureaucracy Cost"
 VI_BUREAUCRACY_COST_TOOLTIP:0 "Governing a state requires an ever-expanding apparatus of clerks, magistrates, provincial administrators, and tax officials.\n\nAs the realm grows, so too does the expense of maintaining order, enforcing laws, and collecting revenues."
 AUTO_MODIFIER_NAME_vi_bureaucracy_cost_auto:0 "Bureaucracy Cost"
 game_concept_vi_bureaucracy_cost:0 "Bureaucracy Cost"
 game_concept_vi_bureaucracy_cost_desc:0 "Governing a state requires an ever-expanding apparatus of clerks, magistrates, provincial administrators, and tax officials.\n\nAs the realm grows, so too does the expense of maintaining order, enforcing laws, and collecting revenues.\n\nFormula: Owned Locations x Age Multiplier x Tier Multiplier x Average Control (Home Region)\n\nAge Multipliers:\nAge 1 Traditions: 0.25 gold per location\nAge 2 Renaissance: 0.50 gold per location\nAge 3 Discovery: 1.00 gold per location\nAge 4 Reformation: 1.50 gold per location\nAge 5 Absolutism: 2.50 gold per location\nAge 6 Revolutions: 3.00 gold per location\n\nTier Multipliers:\nTier 1 Negligible Bureaucracy: 25% of full cost\nTier 2 Minimal Bureaucracy: 50% of full cost\nTier 3 Standard Bureaucracy: 75% of full cost\nTier 4 Expanded Bureaucracy: 100% of full cost\n\nControl Multiplier:\nHigher average control in the home region increases bureaucracy cost. A well-governed realm requires more administrators."

 # Bureaucracy Size Law
 vi_bureaucracy_size_law:0 "Bureaucracy Size"
 vi_bureaucracy_size_law_desc:0 "Determines the scale and ambition of the state's administrative apparatus. A larger bureaucracy imposes greater costs on the treasury but provides meaningful governance advantages — better control over distant provinces, stronger tax collection, and a more capable cabinet.\n\nChoose wisely: a skeleton administration may suffice in the early ages, but a vast empire demands a proper civil service."
 vi_bureaucracy_size_law_CATEGORY:0 "ADMINISTRATIVE_LAW_CATEGORY"

 # Tier 1
 vi_skeleton_bureaucracy_policy:0 "Negligible Bureaucracy"
 vi_skeleton_bureaucracy_policy_desc:0 "The state maintains only the bare minimum of administrative offices. Tax collectors are few, local enforcement is sporadic, and the Crown's writ grows faint at the borders. The treasury benefits — but so do rebels."

 # Tier 2
 vi_minimal_bureaucracy_policy:0 "Minimal Bureaucracy"
 vi_minimal_bureaucracy_policy_desc:0 "A lean administration covers the basic functions of governance. Adequate for smaller realms, this approach begins to show strain as the realm expands and provinces grow restless without proper oversight."

 # Tier 3
 vi_standard_bureaucracy_policy:0 "Standard Bureaucracy"
 vi_standard_bureaucracy_policy_desc:0 "A properly organized civil service administers the realm with consistency and reliability. Provincial governors answer to the Crown, tax collection is systematic, and the cabinet operates with professional efficiency."

 # Tier 4
 vi_expanded_bureaucracy_policy:0 "Expanded Bureaucracy"
 vi_expanded_bureaucracy_policy_desc:0 "An ambitious, deeply embedded administrative apparatus permeates every corner of the state. Roads are patrolled, rebels are suppressed before they grow, distant provinces feel the Crown's authority, and a literate official class accelerates the adoption of new knowledge.\n\nExpensive — but for a great empire, indispensable."

 # Cost preview custom_tooltip keys - shown in the Effects section of the policy card.
 # ROOT = the viewing country (scope is valid here, unlike in _desc strings).
 vi_bureaucracy_cost_preview_t1_tt:0 "Bureaucracy Cost when enacted: [ROOT.GetVariable('vi_bureaucracy_cost_t1').GetValue|V2][gold_i] / month"
 vi_bureaucracy_cost_preview_t2_tt:0 "Bureaucracy Cost when enacted: [ROOT.GetVariable('vi_bureaucracy_cost_t2').GetValue|V2][gold_i] / month"
 vi_bureaucracy_cost_preview_t3_tt:0 "Bureaucracy Cost when enacted: [ROOT.GetVariable('vi_bureaucracy_cost_t3').GetValue|V2][gold_i] / month"
 vi_bureaucracy_cost_preview_t4_tt:0 "Bureaucracy Cost when enacted: [ROOT.GetVariable('vi_bureaucracy_cost_t4').GetValue|V2][gold_i] / month"

 # Redistribution demand basket
 vi_bur_base:0 "Bureaucracy Expenses"
 demand_vi_bur_base_desc:0 "The administrative apparatus consumes paper for records, books for law and procedure, cloth for officials' dress, and furniture for offices and courtrooms across the realm."
