l_english:

 ##################################################
 # Coin Debasement
 ##################################################
 coin_debasement:0 "Coin Debasement"
 coin_debasement_desc:0 "Order the minting of debased coinage, flooding the treasury with silver-clad copper. A fast source of funds, but one that erodes trust in the currency and merchant confidence."
 coin_debasement_req_once_tt:0 "Can only be used once per Parliament session."
 coin_debasement_effect_tt:0 "Treasury gains gold equal to 12× the tax base (minimum 50). Inflation rises proportionally. Trade Efficiency is reduced for 25 years."

 STATIC_MODIFIER_NAME_coin_debasement_trade_penalty:0 "Debased Coinage"
 STATIC_MODIFIER_DESC_coin_debasement_trade_penalty:0 "Merchants have lost confidence in the currency following a debasement of the coinage, reducing the efficiency of trade throughout the realm."

 ##################################################
 # Recoinage
 ##################################################
 recoinage:0 "Recoinage"
 recoinage_desc:0 "Recall old or debased coins and remint them at full weight and purity. This restores public confidence in the currency and improves tax collection, but demands a significant upfront expenditure."
 recoinage_req_once_tt:0 "Can only be used once per Parliament session."
 recoinage_req_gold_tt:0 "Requires gold equal to 12× the tax base to fund the reminting operation."
 recoinage_req_no_bankruptcy_tt:0 "Cannot be performed while the country is bankrupt."
 recoinage_req_precious_metals_tt:0 "Requires gold or silver to be produced in the country."
 recoinage_effect_tt:0 "Spend gold equal to 12× the tax base. Gain 3 Prestige. Reduce inflation by -0.001/month. Tax Income Efficiency +2% and minting threshold raised for 10 years."

 STATIC_MODIFIER_NAME_recoinage_combined_effects:0 "Recoinage — Crown Currency Reform"
 STATIC_MODIFIER_DESC_recoinage_combined_effects:0 "The realm's coinage has been recalled and reminted at full weight and purity. Confidence in the currency improves tax collection, reduces monthly inflation, and permits greater minting throughput before inflation pressure kicks in."

 ##################################################
 # Selling Government Offices
 ##################################################
 sell_government_offices:0 "Sell Government Offices"
 sell_government_offices_desc:0 "Auction appointments to government posts and administrative positions to the highest-bidding estate. A lucrative short-term measure that embeds estate interests deep into the bureaucracy."
 sell_offices_req_once_tt:0 "Can only be used once per Parliament session."
 sell_offices_req_no_cooldown_tt:0 "Blocked for 10 years following a previous sale of offices."
 sell_offices_select_estate:0 "Select an estate to sell offices to."
 sell_offices_no_estates:0 "No eligible estates available."
 trigger_no_sell_offices_no_estates:0 "No eligible estates available."
 sell_offices_req_estate_power_tt:0 "Only estates with more than 10% Estate Power can purchase government offices."
 sell_government_offices_cooldown:0 "Sell Government Offices (10-year cooldown)"
 sell_offices_effect_tt:0 "Gain 50% of the chosen estate's gold. That estate gains Satisfaction and Power — at the cost of Cabinet Efficiency, Prestige, and military morale for 10 years. Other estates lose satisfaction."

 STATIC_MODIFIER_NAME_sell_offices_nobles_power:0 "Nobles — Office Appointments"
 STATIC_MODIFIER_DESC_sell_offices_nobles_power:0 "Nobles have been granted government offices, extending their influence into the administration."

 STATIC_MODIFIER_NAME_sell_offices_clergy_power:0 "Clergy — Office Appointments"
 STATIC_MODIFIER_DESC_sell_offices_clergy_power:0 "Clergy have been granted government offices, extending their influence into the administration."

 STATIC_MODIFIER_NAME_sell_offices_burghers_power:0 "Burghers — Office Appointments"
 STATIC_MODIFIER_DESC_sell_offices_burghers_power:0 "Burghers have been granted government offices, extending their influence into the administration."

 STATIC_MODIFIER_NAME_sell_offices_peasants_power:0 "Peasantry — Office Appointments"
 STATIC_MODIFIER_DESC_sell_offices_peasants_power:0 "Peasant representatives have been granted government offices, extending their influence into the administration."

 STATIC_MODIFIER_NAME_sell_offices_dhimmi_power:0 "Dhimmi — Office Appointments"
 STATIC_MODIFIER_DESC_sell_offices_dhimmi_power:0 "Dhimmi communities have been granted government offices, extending their influence into the administration."

 STATIC_MODIFIER_NAME_sell_offices_penalties:0 "Office Sale — Bureaucratic Patronage"
 STATIC_MODIFIER_DESC_sell_offices_penalties:0 "Government offices filled by patronage rather than merit reduce cabinet efficiency, accelerate the natural decay of stability, and sap the professionalism of the officer corps."

 ##################################################
 # Confiscate Estate Wealth
 ##################################################
 confiscate_estate_wealth:0 "Confiscate Estate Wealth"
 confiscate_estate_wealth_desc:0 "Seize the accumulated reserves of an estate by parliamentary decree. A drastic act of expropriation that fills the treasury but shatters trust between the Crown and its subjects."
 confiscate_wealth_req_once_per_estate_tt:0 "Each estate can only be confiscated once per Parliament session."
 confiscate_wealth_req_has_gold_tt:0 "The estate must hold gold to confiscate."
 confiscate_wealth_select_estate:0 "Select an estate to confiscate wealth from."
 confiscate_wealth_no_estates:0 "No eligible estates available."
 trigger_no_confiscate_wealth_no_estates:0 "No eligible estates available."
 confiscate_wealth_effect_tt:0 "Seize 90% of the chosen estate's gold. Gain Prestige and suffer Stability loss, both scaled by the estate's Power. The chosen estate suffers lasting satisfaction penalties. All other estates suffer solidarity resentment. Estate-specific penalties apply."

 STATIC_MODIFIER_NAME_confiscate_wealth_nobles_target_sat:0 "Confiscation — Noble Grievance"
 STATIC_MODIFIER_DESC_confiscate_wealth_nobles_target_sat:0 "The nobility's coffers have been seized by Crown decree. Their cooperation with governance will be limited for years to come."

 STATIC_MODIFIER_NAME_confiscate_wealth_clergy_target_sat:0 "Confiscation — Church Grievance"
 STATIC_MODIFIER_DESC_confiscate_wealth_clergy_target_sat:0 "Sacred funds taken by the Crown have left the clergy unwilling to lend their full cooperation to royal policy."

 STATIC_MODIFIER_NAME_confiscate_wealth_burghers_target_sat:0 "Confiscation — Merchant Grievance"
 STATIC_MODIFIER_DESC_confiscate_wealth_burghers_target_sat:0 "Merchant reserves seized by decree have shaken commercial confidence in the Crown's respect for property."

 STATIC_MODIFIER_NAME_confiscate_wealth_peasants_target_sat:0 "Confiscation — Peasant Grievance"
 STATIC_MODIFIER_DESC_confiscate_wealth_peasants_target_sat:0 "The seizure of communal reserves has bred deep resentment among the common people toward the Crown."

 STATIC_MODIFIER_NAME_confiscate_wealth_dhimmi_target_sat:0 "Confiscation — Dhimmi Grievance"
 STATIC_MODIFIER_DESC_confiscate_wealth_dhimmi_target_sat:0 "Protected community funds taken by the Crown have strained the relationship between dhimmi communities and royal authority."

 STATIC_MODIFIER_NAME_confiscate_wealth_other_estates_target_sat:0 "Confiscation — Solidarity Resentment"
 STATIC_MODIFIER_DESC_confiscate_wealth_other_estates_target_sat:0 "Other estates are alarmed by the Crown's willingness to seize wealth by decree, reducing their long-term satisfaction expectations."

 STATIC_MODIFIER_NAME_confiscate_wealth_nobles_penalty:0 "Confiscation — Noble Obstruction"
 STATIC_MODIFIER_DESC_confiscate_wealth_nobles_penalty:0 "Aggrieved nobles obstruct tax collection in their domains, reducing the efficiency of tax income across the realm."

 STATIC_MODIFIER_NAME_confiscate_wealth_clergy_penalty:0 "Confiscation — Church Defiance"
 STATIC_MODIFIER_DESC_confiscate_wealth_clergy_penalty:0 "With Church funds seized, scholars and institutions withdraw cooperation, slowing research and intellectual progress."

 STATIC_MODIFIER_NAME_confiscate_wealth_burghers_penalty:0 "Confiscation — Merchant Withdrawal"
 STATIC_MODIFIER_DESC_confiscate_wealth_burghers_penalty:0 "The seizure of merchant capital has caused fear among traders, contracting commercial activity and reducing trade efficiency."

 STATIC_MODIFIER_NAME_confiscate_wealth_peasants_penalty:0 "Confiscation — Peasant Unrest"
 STATIC_MODIFIER_DESC_confiscate_wealth_peasants_penalty:0 "Seizing the peasantry's reserves has fuelled unrest across the countryside, reducing the available manpower of the realm."

 STATIC_MODIFIER_NAME_confiscate_wealth_dhimmi_penalty:0 "Confiscation — Dhimmi Flight"
 STATIC_MODIFIER_DESC_confiscate_wealth_dhimmi_penalty:0 "Fearing further expropriation, Dhimmi merchants, scholars, and administrators withdraw from public life, reducing trade, taxation, and research across the realm."
 # ---- PARLIAMENT SESSION COURT COSTS ----
 AUTO_MODIFIER_NAME_parliament_session_court_costs:0 "Parliament in Session"
 AUTO_MODIFIER_DESC_parliament_session_court_costs:0 "The estates have convened at court. The ceremonies, feasts, and accommodation required to host the session increase the cost of maintaining the court."

