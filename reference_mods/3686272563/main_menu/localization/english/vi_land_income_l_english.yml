 vi_share_dhimmi_t2:0 "Dhimmi minority landholders bring merchant expertise, legal tolerance, and cross-cultural diplomatic connections.\n\n#bold Modifiers#!\n#G Heretic Tolerance: +0.1#!\n#R Pop Conversion Speed: -5%#!\n\n#flavor Non-Muslim minorities under dhimma protection often served as traders and diplomats, making the realm more tolerant of religious difference. However, their prominent landowning presence made them resistant to religious conversion.#!"
 vi_share_dhimmi_t3:0 "Dhimmi minority landholders bring merchant expertise, legal tolerance, and cross-cultural diplomatic connections.\n\n#bold Modifiers#!\n#G Heretic Tolerance: +0.2#!\n#R Pop Conversion Speed: -10%#!\n\n#flavor Non-Muslim minorities under dhimma protection often served as traders and diplomats, making the realm more tolerant of religious difference. However, their prominent landowning presence made them resistant to religious conversion.#!"
 vi_share_dhimmi_t4:0 "Dhimmi minority landholders bring merchant expertise, legal tolerance, and cross-cultural diplomatic connections.\n\n#bold Modifiers#!\n#G Heretic Tolerance: +0.3#!\n#R Pop Conversion Speed: -20%#!\n\n#flavor Non-Muslim minorities under dhimma protection often served as traders and diplomats, making the realm more tolerant of religious difference. However, their prominent landowning presence made them resistant to religious conversion.#!"
 vi_share_dhimmi_t5:0 "Dhimmi minority landholders bring merchant expertise, legal tolerance, and cross-cultural diplomatic connections.\n\n#bold Modifiers#!\n#G Heretic Tolerance: +0.5#!\n#R Pop Conversion Speed: -35%#!\n\n#flavor Non-Muslim minorities under dhimma protection often served as traders and diplomats, making the realm more tolerant of religious difference. However, their prominent landowning presence made them resistant to religious conversion.#!"
 vi_share_dhimmi_t6:0 "Dhimmi minority landholders bring merchant expertise, legal tolerance, and cross-cultural diplomatic connections.\n\n#bold Modifiers#!\n#G Heretic Tolerance: +0.7#!\n#R Pop Conversion Speed: -50%#!\n\n#flavor Non-Muslim minorities under dhimma protection often served as traders and diplomats, making the realm more tolerant of religious difference. However, their prominent landowning presence made them resistant to religious conversion.#!"
 vi_share_tribes_t2:0 "Tribal clans holding land shows their importance for the realm.\n\n#bold Modifiers#!\n#G Monthly War Exhaustion: -0.01#!\n#R Monthly Food Modifier: -1%#!\n\n#flavor Tribal confederates fought for their pastures and clan honor rather than pay, reducing the exhaustion of protracted campaigns. But nomadic land use is extensive rather than intensive — tribal grazing displaces the settled agriculture that feeds the realm.#!"
