 vi_share_clergy_chr_t6:0 "Church landholdings fund monasteries, cathedrals, and scriptoria — the centers of learning and spiritual authority.\n\n#bold Modifiers#!\n#G Research Speed: +20%#!\n#G Monthly Religious Influence: +0.20#!\n#R Estate Enrichment: +20%#!\n\n#flavor In Christian realms, the institutional Church wielded its landed wealth to sponsor scholarship and ecclesiastical influence. Yet a wealthy, land-holding Church develops vested interests of its own, accumulating vast riches and hence stimulating corruption within the church and wider society.#!"
 vi_share_clergy_oth_t2:0 "Religious institution landholdings fund centers of scholarship and theological study.\n\n#bold Modifiers#!\n#G Research Speed: +2.5%#!\n#R Estate Enrichment: +2.5%#!\n\n#flavor Across faiths, institutionalized religious bodies that hold substantial land have historically been patrons of learning. However, such institutional wealth invariably leads to corruption and debauchery.#!"
 vi_share_clergy_oth_t3:0 "Religious institution landholdings fund centers of scholarship and theological study.\n\n#bold Modifiers#!\n#G Research Speed: +5%#!\n#R Estate Enrichment: +5%#!\n\n#flavor Across faiths, institutionalized religious bodies that hold substantial land have historically been patrons of learning. However, such institutional wealth invariably leads to corruption and debauchery.#!"
