 # ============================================================
 # VI LAND INCOME MOD - Localization
 # ============================================================

 # Location panel: rename "R.G.O. Level:" to "Land Level:"
 RAW_MATERIAL_LOCATION_TABLE_START_TT:0 "Land Capacity:"
 RAW_MATERIAL_LOCATION_TABLE_MAX_LEVEL_T:0 "Maximum Land Capacity in [Location.GetNameWithNoTooltip]"
 RAW_MATERIAL_LOCATION_TABLE_MAX_LEVEL_TT_TITLE:0 "Land Capacity is [Location.GetMaximumMaxRGOWorkersValueForUI|0W] due to:"

 # Estate Power tooltip: Land Ownership section
 VI_LAND_OWNERSHIP_HEADER:0 "Land Ownership"
 VI_LAND_OWNERSHIP_LAND_SIZE_COL:0 "Land size owned"
 VI_LAND_OWNERSHIP_GOLD_COL:0 "Rent/Land tax"
 VI_LAND_TUL_LABEL:0 "Total Used Land:"
 VI_LAND_TAL_LABEL:0 "Total Available Land:"

 # Budget UI: Demesne Income and Land Tax
 # [vi_land_dilt_income|e] renders as blue clickable concept link
 VI_LAND_DILT_LABEL:0 "[vi_land_dilt_income|e]"

 # Game concept name and description
 game_concept_vi_land_dilt_income:0 "Demesne Income & Land Tax"
 game_concept_vi_land_dilt_income_desc:0 "Income the state derives as rent from the Crown lands and as fixed tax from the lands owned by other Estates."

 # Auto-modifier name (shown in Income of Egypt breakdown popup)
 AUTO_MODIFIER_NAME_vi_land_dilt_auto:0 "Demesne Income & Land Tax"

 # Budget tooltip breakdown rows
 VI_LAND_SCL_LABEL:0 "State Income from Crown Lands:"
 VI_LAND_SLT_LABEL:0 "State Income from Land Tax:"
 VI_LAND_BLC_LABEL:0 "Crown Land (BLC):"

 # ── Land Actions: single parliament button ─────────────────
 land_actions:0 "Land Actions"
 land_actions_desc:0 "Conduct a land transaction between the Crown and [SCOPE.sEstate('vi_la_estate').GetName] through Parliament."

 # ── Land Actions: mode issue names (step 1 picker) ─────────
 vi_la_mode_confiscation:0 "Land Confiscation"
 vi_la_mode_confiscation_desc:0 "The Crown seizes land from a chosen Estate without compensation."

 vi_la_mode_grant:0 "Land Grant"
 vi_la_mode_grant_desc:0 "The Crown freely grants a portion of its own land to a chosen Estate."

 vi_la_mode_purchase:0 "Land Purchase"
 vi_la_mode_purchase_desc:0 "The Crown purchases land from a chosen Estate at a DCF-based price. Paid from treasury to Estate gold."

 vi_la_mode_sale:0 "Land Sale"
 vi_la_mode_sale_desc:0 "The Crown sells land to a chosen Estate at a DCF-based price. Estate gold paid to the Crown."

 # ── Land Actions: picker step titles ──────────────────────
 vi_la_select_mode:0 "Choose Action Type"
 vi_la_select_estate:0 "Choose Target Estate"
 vi_la_select_amount:0 "Land to transfer (mln. acres)"

 # ── Land Actions: none_available fallback (@trigger_no! required) ─
 vi_la_no_modes_available:0 "@trigger_no! No land action modes available."
 vi_la_no_valid_estates:0 "@trigger_no! No valid estates available."

 # ── Land Actions: per-mode once-per-session tooltips ───────
 vi_la_confiscation_req_once_tt:0 "Land Confiscation may only be used once per Parliament session."
 vi_la_grant_req_once_tt:0 "Land Grant may only be used once per Parliament session."
 vi_la_purchase_req_once_tt:0 "Land Purchase may only be used once per Parliament session."
 vi_la_sale_req_once_tt:0 "Land Sale may only be used once per Parliament session."

 # ── Land Actions: estate enabled tooltips ─────────────────
 vi_la_req_estate_has_land_tt:0 "This Estate must hold land."
 vi_la_req_estate_exists_tt:0 "This Estate must exist in your country."

 # ── Land Actions: effect tooltips ─────────────────────────
 vi_la_purchase_crown_pays_tt:0 "#R Crown pays to [SCOPE.sEstate('vi_la_estate').GetName]:#!"
 vi_la_sale_crown_receives_tt:0 "#G Crown receives from [SCOPE.sEstate('vi_la_estate').GetName]:#!"
 vi_la_purchase_insufficient_gold_tt:0 "#R Insufficient gold in Crown treasury.#!"
 vi_la_sale_insufficient_estate_gold_tt:0 "#R [SCOPE.sEstate('vi_la_estate').GetName] has insufficient gold.#!"

 # ── Estate Land-Share Effect Tooltips ──────────────────────────────────────
 vi_share_tt_header:0 "Land Share Effects"
 vi_share_crown_t2:0 "A large royal demesne demonstrates centralized authority, wealth of the royal family and feeds the dynasty's reputation.\n\n#bold Modifiers#!\n#G Monthly Prestige: +0.02#!\n#R Stability Decay: +0.10%#!\n\n#flavor Historically, monarchs who consolidated land in the Crown projected greater prestige — but a realm where the Crown crowds out all other landholders becomes difficult to govern, increasing discontent among the people.#!"
 vi_share_crown_t3:0 "A large royal demesne demonstrates centralized authority, wealth of the royal family and feeds the dynasty's reputation.\n\n#bold Modifiers#!\n#G Monthly Prestige: +0.04#!\n#R Stability Decay: +0.20%#!\n\n#flavor Historically, monarchs who consolidated land in the Crown projected greater prestige — but a realm where the Crown crowds out all other landholders becomes difficult to govern, increasing discontent among the people.#!"
 vi_share_crown_t4:0 "A large royal demesne demonstrates centralized authority, wealth of the royal family and feeds the dynasty's reputation.\n\n#bold Modifiers#!\n#G Monthly Prestige: +0.06#!\n#R Stability Decay: +0.40%#!\n\n#flavor Historically, monarchs who consolidated land in the Crown projected greater prestige — but a realm where the Crown crowds out all other landholders becomes difficult to govern, increasing discontent among the people.#!"
 vi_share_crown_t5:0 "A large royal demesne demonstrates centralized authority, wealth of the royal family and feeds the dynasty's reputation.\n\n#bold Modifiers#!\n#G Monthly Prestige: +0.08#!\n#R Stability Decay: +1.00%#!\n\n#flavor Historically, monarchs who consolidated land in the Crown projected greater prestige — but a realm where the Crown crowds out all other landholders becomes difficult to govern, increasing discontent among the people.#!"
 vi_share_crown_t6:0 "A large royal demesne demonstrates centralized authority, wealth of the royal family and feeds the dynasty's reputation.\n\n#bold Modifiers#!\n#G Monthly Prestige: +0.10#!\n#R Stability Decay: +1.50%#!\n\n#flavor Historically, monarchs who consolidated land in the Crown projected greater prestige — but a realm where the Crown crowds out all other landholders becomes difficult to govern, increasing discontent among the people.#!"
 vi_share_nobles_t2:0 "Noble landholding establishes the aristocratic networks that underpin diplomacy and royal administration.\n\n#bold Modifiers#!\n#G Diplomatic Reputation: +0.5#!\n#G Cabinet Efficiency: +5%#!\n#R Monthly Legitimacy: -0.10#!\n\n#flavor Landed nobility formed the backbone of statecraft — their estates hosted courts, funded embassies, and supplied the educated administrators who kept the realm running. However, their territorial independence weakens the monarch's legal and dynastic standing, eroding legitimacy over time.#!"
 vi_share_nobles_t3:0 "Noble landholding establishes the aristocratic networks that underpin diplomacy and royal administration.\n\n#bold Modifiers#!\n#G Diplomatic Reputation: +1.0#!\n#G Cabinet Efficiency: +10%#!\n#R Monthly Legitimacy: -0.25#!\n\n#flavor Landed nobility formed the backbone of statecraft — their estates hosted courts, funded embassies, and supplied the educated administrators who kept the realm running. However, their territorial independence weakens the monarch's legal and dynastic standing, eroding legitimacy over time.#!"
 vi_share_nobles_t4:0 "Noble landholding establishes the aristocratic networks that underpin diplomacy and royal administration.\n\n#bold Modifiers#!\n#G Diplomatic Reputation: +1.5#!\n#G Cabinet Efficiency: +18%#!\n#R Monthly Legitimacy: -0.50#!\n\n#flavor Landed nobility formed the backbone of statecraft — their estates hosted courts, funded embassies, and supplied the educated administrators who kept the realm running. However, their territorial independence weakens the monarch's legal and dynastic standing, eroding legitimacy over time.#!"
 vi_share_nobles_t5:0 "Noble landholding establishes the aristocratic networks that underpin diplomacy and royal administration.\n\n#bold Modifiers#!\n#G Diplomatic Reputation: +2.0#!\n#G Cabinet Efficiency: +25%#!\n#R Monthly Legitimacy: -0.75#!\n\n#flavor Landed nobility formed the backbone of statecraft — their estates hosted courts, funded embassies, and supplied the educated administrators who kept the realm running. However, their territorial independence weakens the monarch's legal and dynastic standing, eroding legitimacy over time.#!"
 vi_share_nobles_t6:0 "Noble landholding establishes the aristocratic networks that underpin diplomacy and royal administration.\n\n#bold Modifiers#!\n#G Diplomatic Reputation: +3.0#!\n#G Cabinet Efficiency: +35%#!\n#R Monthly Legitimacy: -1.00#!\n\n#flavor Landed nobility formed the backbone of statecraft — their estates hosted courts, funded embassies, and supplied the educated administrators who kept the realm running. However, their territorial independence weakens the monarch's legal and dynastic standing, eroding legitimacy over time.#!"
 vi_share_clergy_chr_t2:0 "Church landholdings fund monasteries, cathedrals, and scriptoria — the centers of learning and spiritual authority.\n\n#bold Modifiers#!\n#G Research Speed: +2.5%#!\n#G Monthly Religious Influence: +0.025#!\n#R Estate Enrichment: +2.5%#!\n\n#flavor In Christian realms, the institutional Church wielded its landed wealth to sponsor scholarship and ecclesiastical influence. Yet a wealthy, land-holding Church develops vested interests of its own, accumulating vast riches and hence stimulating corruption within the church and wider society.#!"
 vi_share_clergy_chr_t3:0 "Church landholdings fund monasteries, cathedrals, and scriptoria — the centers of learning and spiritual authority.\n\n#bold Modifiers#!\n#G Research Speed: +5%#!\n#G Monthly Religious Influence: +0.05#!\n#R Estate Enrichment: +5%#!\n\n#flavor In Christian realms, the institutional Church wielded its landed wealth to sponsor scholarship and ecclesiastical influence. Yet a wealthy, land-holding Church develops vested interests of its own, accumulating vast riches and hence stimulating corruption within the church and wider society.#!"
