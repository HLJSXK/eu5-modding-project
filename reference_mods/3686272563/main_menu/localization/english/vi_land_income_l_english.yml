 vi_share_cossacks_t2:0 "Cossack host territories produce self-sufficient warriors who serve eagerly, reducing the realm's war weariness.\n\n#bold Modifiers#!\n#G Monthly War Exhaustion: -0.01#!\n#R Monthly Food Modifier: -1%#!\n\n#flavor Cossack communities fought for their Host's autonomy and traditions rather than wages, sustaining morale across long campaigns. Yet their independent military culture and territorial claims prevent intensive farming, reducing the food output of their lands.#!"
