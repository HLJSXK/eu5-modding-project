 vi_share_clergy_oth_t6:0 "Religious institution landholdings fund centers of scholarship and theological study.\n\n#bold Modifiers#!\n#G Research Speed: +20%#!\n#R Estate Enrichment: +20%#!\n\n#flavor Across faiths, institutionalized religious bodies that hold substantial land have historically been patrons of learning. However, such institutional wealth invariably leads to corruption and debauchery.#!"
 vi_share_burghers_t2:0 "Merchant capital invested in rural land drives cash-crop agricultural improvement and proto-industrial production.\n\n#bold Modifiers#!\n#G Production Efficiency: +2%#!\n#R Monthly Inflation: +0.02%#!\n\n#flavor When urban merchants acquired rural estates, they brought capital and market connections that raised output. However, mercantile money supply and land speculation historically drove up the general price level across the realm.#!"
 vi_share_burghers_t3:0 "Merchant capital invested in rural land drives cash-crop agricultural improvement and proto-industrial production.\n\n#bold Modifiers#!\n#G Production Efficiency: +5%#!\n#R Monthly Inflation: +0.05%#!\n\n#flavor When urban merchants acquired rural estates, they brought capital and market connections that raised output. However, mercantile money supply and land speculation historically drove up the general price level across the realm.#!"
 vi_share_burghers_t4:0 "Merchant capital invested in rural land drives cash-crop agricultural improvement and proto-industrial production.\n\n#bold Modifiers#!\n#G Production Efficiency: +8%#!\n#R Monthly Inflation: +0.08%#!\n\n#flavor When urban merchants acquired rural estates, they brought capital and market connections that raised output. However, mercantile money supply and land speculation historically drove up the general price level across the realm.#!"
 vi_share_burghers_t5:0 "Merchant capital invested in rural land drives cash-crop agricultural improvement and proto-industrial production.\n\n#bold Modifiers#!\n#G Production Efficiency: +12%#!\n#R Monthly Inflation: +0.12%#!\n\n#flavor When urban merchants acquired rural estates, they brought capital and market connections that raised output. However, mercantile money supply and land speculation historically drove up the general price level across the realm.#!"
 vi_share_burghers_t6:0 "Merchant capital invested in rural land drives cash-crop agricultural improvement and proto-industrial production.\n\n#bold Modifiers#!\n#G Production Efficiency: +15%#!\n#R Monthly Inflation: +0.15%#!\n\n#flavor When urban merchants acquired rural estates, they brought capital and market connections that raised output. However, mercantile money supply and land speculation historically drove up the general price level across the realm.#!"
 vi_share_peasants_t2:0 "Peasant smallholders enfranchise the rural population, increasing their participation in civic and economic life.\n\n#bold Modifiers#!\n#G Peasant Enfranchisement: +15%#!\n#R Pop Promotion Speed: -15%#!\n\n#flavor A large class of independent peasant landowners historically created a more engaged rural population. However, when the peasantry occupies most of the land, the social hierarchy stagnates — less incentives to move to the urban areas or develop as skilled labourer.#!"
 vi_share_peasants_t3:0 "Peasant smallholders enfranchise the rural population, increasing their participation in civic and economic life.\n\n#bold Modifiers#!\n#G Peasant Enfranchisement: +30%#!\n#R Pop Promotion Speed: -30%#!\n\n#flavor A large class of independent peasant landowners historically created a more engaged rural population. However, when the peasantry occupies most of the land, the social hierarchy stagnates — less incentives to move to the urban areas or develop as skilled labourer.#!"
 vi_share_peasants_t4:0 "Peasant smallholders enfranchise the rural population, increasing their participation in civic and economic life.\n\n#bold Modifiers#!\n#G Peasant Enfranchisement: +40%#!\n#R Pop Promotion Speed: -40%#!\n\n#flavor A large class of independent peasant landowners historically created a more engaged rural population. However, when the peasantry occupies most of the land, the social hierarchy stagnates — less incentives to move to the urban areas or develop as skilled labourer.#!"
 vi_share_peasants_t5:0 "Peasant smallholders enfranchise the rural population, increasing their participation in civic and economic life.\n\n#bold Modifiers#!\n#G Peasant Enfranchisement: +60%#!\n#R Pop Promotion Speed: -60%#!\n\n#flavor A large class of independent peasant landowners historically created a more engaged rural population. However, when the peasantry occupies most of the land, the social hierarchy stagnates — less incentives to move to the urban areas or develop as skilled labourer.#!"
