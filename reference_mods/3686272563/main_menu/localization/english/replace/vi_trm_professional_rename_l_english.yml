l_english:

 ###############################################
 # VI TRM — Rename "Regular" to "Professional"
 # File: main_menu/localization/english/replace/
 # vi_trm_professional_rename_l_english.yml
 ###############################################

 # -----------------------------------------------
 # CORE GAME CONCEPTS
 # Changing these 6 keys cascades the rename to
 # every UI string that uses [regular|e],
 # [regulars|e], [regular_regiment|e], etc.
 # -----------------------------------------------

 game_concept_regular: "Professional"
 game_concept_regulars: "Professionals"
 game_concept_regular_regiment: "Professional Regiment"
 game_concept_regular_regiments: "Professional Regiments"
 game_concept_regular_ship: "Professional Ship"
 game_concept_regular_ships: "Professional Ships"

 # -----------------------------------------------
 # STATIC MODIFIER NAMES
 # Applied to subunits — shown in army tooltips
 # -----------------------------------------------

 STATIC_MODIFIER_NAME_is_army_regular: "Professionals"
 STATIC_MODIFIER_NAME_is_navy_regular: "Professionals"

 # -----------------------------------------------
 # AUTO MODIFIER NAMES
 # Shown in country overview panels
 # -----------------------------------------------

 AUTO_MODIFIER_NAME_regular_army_size: "[regular|e] [army|e] Size"
 AUTO_MODIFIER_NAME_regular_navy_size: "[regular|e] [navy|e] Size"
 AUTO_MODIFIER_NAME_navy_size: "[regular|e] [navy|e] Size"

 # -----------------------------------------------
 # TRIGGER DISPLAY STRINGS
 # Shown in mission/event conditions tooltips
 # -----------------------------------------------

 REGULAR_ARMY_SIZE_TRIGGER: "Has $COMPARATOR$ $NUM|V0$ @army_strength! [regulars|e] when fully reinforced"
 NOT_REGULAR_ARMY_SIZE_TRIGGER: "Does NOT have $COMPARATOR$ $NUM|V0$ @army_strength! [regulars|e] when fully reinforced"
