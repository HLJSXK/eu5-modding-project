 NOT_THIRD_REGULAR_ARMY_SIZE_TRIGGER: "[COUNTRY.GetName] does NOT have $COMPARATOR$ $NUM|V0$ @army_strength! [regulars|e] when fully reinforced"

 # -----------------------------------------------
 # INTERFACES — hardcoded "Regular" literal text
 # -----------------------------------------------

 regular_army_size: "[regular|e] [army|e] Size"
 regular_navy_size: "[regular|e] [navy|e] Size"
 target_regular_army_size_simple: "#T Professional Army Size#! This is the expected total [strength|e] of target country [army|e] [regulars|e]"
 UNIT_STRENGTH_ITEM_ARMY_REGULARS: "The [max_strength|e] of all professional armies would be [Country.GetRegularArmySize|V] if they restore their [strength|e] completely."
