 CT_IMPACT_ON_LEVY_VS_REGULAR: "$VAL|+=%$ [levy|e] vs [regulars|e]: $DAMAGE$"
 CT_IMPACT_ON_REGULAR_VS_LEVY: "$VAL|+=%$ [regular|e] vs [levy|e]: $DAMAGE$"
