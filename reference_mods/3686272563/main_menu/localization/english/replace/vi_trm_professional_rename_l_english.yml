 # -----------------------------------------------
 # UNITS PANEL — hardcoded "Regular" literal text
 # -----------------------------------------------

 SUBUNITCOUNT_ARMY_REGULARS: "#T Number of Professional Regiments#!\nThere is a total amount of $VAL|Y$ [regular|e] [regiments|e] in this [army|e]."
