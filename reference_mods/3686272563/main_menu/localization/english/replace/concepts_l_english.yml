l_english:
 # Levy: insert historical context paragraph between the two vanilla sentences
 game_concept_levy_desc: "A levy is a military unit that a [pop|e] will raise when called.\n\nInitially levies were primarily composed of feudal retainers and semi-professional soldiers tied to nobles. However, as the centuries passed levies were raised through voluntary, paid, obligatory or mandatory conscriptions from wider population.\n\nIt is either an [army_levy|e] or a [navy_levy|e]."

 # Regular Regiment: vanilla text + new italic paragraph below
 game_concept_regular_regiment_desc: "Professional Regiments are recruited manually by a [country|e] using most commonly [manpower|e] and [gold|e]. These form the standing [armies|e], and are rather limited in numbers until you get the [advances|e] from later [ages|e].\n\n#italic Unlike levies professional regiments were made up from career soldiers who were expected to serve the monarch or the state for life. Commanded by professional officer corps, trained non-stop, supplied and paid handsomely, veterans of many campaigns they were considered as elite troops of the state.#!"

 # Manpower: first sentence replaced, remaining two sentences vanilla verbatim
 game_concept_manpower_desc: "Populace which has seen formal military training.\n\nManpower is expended when training and maintaining professional [regiments|e], which are usually more effective than [army_levies|e].\n\nThe rate at which Manpower is gained can be increased by constructing Manpower [buildings|e] or researching certain [advances|e]."
