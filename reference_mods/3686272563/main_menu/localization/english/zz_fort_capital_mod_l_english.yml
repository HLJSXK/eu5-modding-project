l_english:
 castle: "City Walls"
 castle_desc: "City Walls are a fortified defensive perimeter encircling an urban settlement, constructed and maintained by the town's burgher community. Unlike a noble's private stronghold, City Walls belong to the city itself — protecting its citizens, its trade, and its accumulated wealth from hostile forces."
 toll_castle: "Noble Castle"
 toll_castle_desc: "A fortified residence and seat of power for the local nobility, the Noble Castle serves both as a place of protection for the noble household and as a symbol of their authority over the surrounding lands. As cities grow and gunpowder reshapes warfare, these private fortifications fall out of use after the onset of the Age of Reformation."
