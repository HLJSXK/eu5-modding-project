 ROYAL_MARRIAGE_TOOLTIP_HEADER:0 "Propose a Royal Marriage with [TARGET_COUNTRY.GetName]. Royal marriages are expensive endeavours, either in the form of the wedding costs or dowry costs, frequently equaling to 6-9 months of income of a country."
 
 ROYAL_MARRIAGE_ACCEPTED_EFFECTS:0 "Our proposal to [marry|e] $FIRST$ with $SECOND$ was accepted by $OTHER$. They are now legally married, and this will hopefully benefit both of our [nations|e] immensely."
 
 wedding_costs.5.t:0 "Royal Marriage - Wedding Costs"
 wedding_costs.5.desc:0 "The royal marriage with [SCOPE.sCharacter('target_2').GetName] has been arranged. As our character [SCOPE.sCharacter('target_1').GetName] is male, we must now pay the traditional wedding costs to formalize this union. The prestige gained from this marriage depends on the rank of [SCOPE.sCharacter('target_2').GetName]'s country: County = 0.5, Duchy = 1, Kingdom = 1.5, Empire = 2."
 wedding_costs.5.a:0 "Proceed with payment"
 
 wedding_costs.6.t:0 "Royal Marriage - Dowry Costs"
 wedding_costs.6.desc:0 "The royal marriage with [SCOPE.sCharacter('target_2').GetName] has been arranged. As our character [SCOPE.sCharacter('target_1').GetName] is female, we must now provide a substantial dowry to formalize this union. The prestige gained from this marriage depends on the rank of [SCOPE.sCharacter('target_2').GetName]'s country: County = 0.75, Duchy = 1.5, Kingdom = 2.25, Empire = 3."
 wedding_costs.6.a:0 "Proceed with payment"
