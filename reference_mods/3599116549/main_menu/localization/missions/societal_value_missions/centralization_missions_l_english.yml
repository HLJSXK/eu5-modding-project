 centralization_missions.1.title: "Centralization Efforts"
 centralization_missions.1.desc: "The increasing need of centralization within [target_area.GetName] has led our [ROOT.GetCountry.GetGovernment.GetCourtTitle] trying to find solutions on this matter. One suggestion is setting [target_location.GetName] as the capital of of the area, where our bureaucrats would administer the people of the distant towns and cities. Another suggestion is a more traditional approach, where smaller administration would be set up in each location within [target_area.GetNameWithNoTooltip]."
 centralization_missions.1.a: "Centralize everything to [target_location.GetNameWithNoTooltip]."
 centralization_missions.1.b: "Put effort in the entirety of [target_area.GetNameWithNoTooltip]."

 mission_no_area: "@trigger_no! No [area|e] available"

