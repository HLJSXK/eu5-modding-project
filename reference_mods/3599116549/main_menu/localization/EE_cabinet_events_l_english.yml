l_english:
 EE_cabinet_events.1.title: "Experience Breeds Success"
 EE_cabinet_events.1.desc: "Successive months spent perfecting how to perform [target_character.GetHerHis] current task - [target_action.GetName] - has finally lead to some great news. [target_character.GetName] has not only adapted to [target_character.GetHerHis] new assignment, but has also managed to excel at it. [target_character.GetHerHis|U] skills are unparalleled and few dare to question [target_character.GetHerHis] authority in this matter."
 EE_cabinet_events.1.a: "An excellent minister indeed!"
 STATIC_MODIFIER_NAME_cabinet_fascination_bonus: "Fascination"
 STATIC_MODIFIER_NAME_EE_cabinet_utter_disappointment: "Catastrophic Failure"
 STATIC_MODIFIER_NAME_EE_reduced_workload: "Reduced Workload"
 STATIC_MODIFIER_NAME_EE_cabinet_taking_a_break: "Burnout"
 STATIC_MODIFIER_NAME_EE_cabinet_decisive_HoC: "Strong Head of Cabinet"
 STATIC_MODIFIER_NAME_EE_cabinet_weakness_of_royal_power: "Overshadowed Local Power"

 EE_cabinet_shorthand_HoC_name: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')]"

 EE_cabinet_events.2.title: "A Need For Radical Reforms"
 EE_cabinet_events.2.desc: "\"Hear me! Hear me! New law in the city!\"\n\nThe tenure of [target_character.GetName] has seen the implementation of many policies, not all of them strictly popular. It would seem that [target_character.GetNameWithNoTooltip] has a knack for such, and [target_character.GetHerHis] ambition surpasses much of what [target_character.GetSheHe] is permitted to do. Perhaps with [target_character.GetHerHis] support we could achieve some great change in [ROOT.GetCountry.GetName]?"
 EE_cabinet_events.2.a: "Grant [target_character.GetHerHim] the power he needs."
 EE_cabinet_events.2.b: "No single minister should hold such power!"
 radical_reforms_action_tt: "[target_action.GetName] [character_interaction|e] will be unlocked on [target_character.GetName], allowing us to change a [policy|e] for the cost of #g 10.0#! @stability! [stability|e].\n\nHowever, the only [policies|e] that can be picked must be preferred by the [estate|e] of [target_character.GetName], the [target_character.GetEstateType.GetName].\n\nThis [character_interaction|e] can only be used three times."
 radical_reforms_action: "Enact Radical Reform"
 radical_reforms_action_desc_specific: "[recipient.GetName] will support reforming the [target_law.GetName] to push [target_policy.GetName] through."
 radical_reforms_select_policies_title: "Select a [policy|e] that [recipient.GetName] will support."
 radical_reforms_action_desc: "We will give permission to [recipient.GetName] to help change our laws."
 radical_reforms_action_past: "[recipient.GetName] was given permission to help reform laws of the country."
 radical_reforms_action_act: "Give [recipient.GetName] permission to reform the laws of the [actor.GetLongName]."
 radical_reforms_action_act_past: "Gave [recipient.GetName] permission to reform the laws of the [actor.GetLongName]."

 recipient_estate_does_not_support: "The [estate|e] of [recipient.GetName], the [recipient.GetEstateType.GetName], does not support [THIS.GetPolicy.GetName]."

 EE_cabinet_events.3.title: "A Disappointing Performance"
 EE_cabinet_events.3.desc: "One of our ministers, [target_character.GetName], has failed to make much progress while working to master one of [target_character.GetHerHis] skills, the task of [target_action.GetName]. We cannot discern whether [target_character.GetSheHe] is going through a tough time, has overextended [target_character.GetHerselfHimself] or if [target_character.GetSheHe] is simply a no-talent. One thing is certain however - [target_character.GetShortName] does need more time."
 EE_cabinet_events.3.a: "A shameful display."

 EE_cabinet_events.4.title: "A New Fascination"
 EE_cabinet_events.4.desc: "One of our ministers, [target_character.GetName], has found a new interest. For several weeks, [target_character.GetSheHe] has studied much about how to [target_action.GetName] effectively and the results have not been disappointing. [target_character.GetShortName] assures - [target_character.GetSheHe] is more than capable in [target_character.GetHerHis] new craft - we just have to let [target_character.GetHerHim] 'cook'."
 EE_cabinet_events.4.a: "Let us see it in practice."
 EE_cabinet_events.4.b: "Pursuit of knowledge is valued in of itself."
 EE_cabinet_events.4.c: "We need you here and now!"

 EE_cabinet_events.5.title: "Cut Me Some Slack!"
 EE_cabinet_events.5.desc: "[target_character.GetName], that fool, has lashed out in [ROOT.GetCountry.GetGovernment.GetCourtTitle] today over all the different tasks [target_character.GetSheHe] has to attend everyday. Reportedly, if [target_character.GetSheHe] is not given a break, [target_character.GetHeShe] claims that [target_character.GetSheHe] will have to quit."
 EE_cabinet_events.5.a: "Will a raise shut [target_character.GetHerHim] up?"
 EE_cabinet_events.5.b: "Give [target_character.GetHerHim] a 'lengthy' break."
 EE_cabinet_events.5.c: "Reduce [target_character.GetHerHis] workload."

 EE_cabinet_events.6.title: "An Abhorrent Affair"
 EE_cabinet_events.6.desc: "A most problematic affair has been discovered! It turns out that the marital loyalty of [target_spouse.GetName] is second only to the devotion of [target_character.GetName] to [target_character.GetHerHis] monarch. Their little secret is a matter of great concern, for should this information come to light - the prestige of [target_ruler.GetName] and [ROOT.GetCountry.GetName] will be tarnished for years to come."
 EE_cabinet_events.6.a: "Ignore this."
 EE_cabinet_events.6.b: "Quietly dispose of [target_character.GetShortNameWithNoTooltip]."
 EE_cabinet_events.6.c: "Give them a taste of their own medicine."

 EE_cabinet_events.7.title: "Love is Thicker than Water"
 EE_cabinet_events.7.desc: "Sensing an attempt on [target_character.GetHerHis] life, [target_character.GetName] has secretly contacted [target_spouse.GetName] and eloped with [target_character.GetHerHis] paramour to [target_country.GetName]. A touching love story and a massive humiliation for [ROOT.GetCountry.GetName]."
 EE_cabinet_events.7.a: "I hope they drown in their love."

 EE_cabinet_events.8.title: "Knowledge Sharing"
 EE_cabinet_events.8.desc: "It seems that two of our cabinet members, [target_character.GetName], and [target_character2.GetName] are very much getting along together. Having spent much time working together, their close ties have had mutual benefit for each, improving their skill. "
 EE_cabinet_events.8.a: "Truly splendid news."

 EE_cabinet_events.9.title: "Under My Wing"
 EE_cabinet_events.9.desc: "The disparity of skill in our cabinet is not a mere illusion, but a real occurrence that affects the daily operations of the [ROOT.GetCountry.GetAdjective] state. However, this might not remain the case for too long, for one of our finest cabinet members, [target_character.GetName], has taken [target_character2.GetName] under [target_character.GetHerHis] wing, teaching [target_character2.GetHerHim] many skills in the progress.\n\nThanks to this development, [target_character2.GetName] is now more able than ever to take on [target_character2.GetHerHis] responsibilities."
 EE_cabinet_events.9.a: "A much welcome development."
 EE_cabinet_events.9.scaled_on_improvement: "The improvement of [target_character2.GetShortName]'s [abilities|e] is scaled on the difference in skill with [target_character.GetName]."

 EE_cabinet_events.10.title: "An Unpopular Figure"
 EE_cabinet_events.10.desc: "One of our cabinet members, [target_character.GetName], has recently gotten [target_character.GetHerselfHimself] involved in a dangerous affair. The details remain murky, yet one thing is certain: [target_character.GetNameWithNoTooltip] has been socially ostracized and pressure has been placed on us to remove [target_character.GetHerHim] from the cabinet. When confronted about this issue, [target_character.GetSheHe] denied any wrongdoing, despite [target_character.GetHerHis] increasingly untenable position."
 EE_cabinet_events.10.a: "[target_character.GetNameWithNoTooltip] has to go - for the good of the [ROOT.GetCountry.GetFlavorRank]."
 EE_cabinet_events.10.b: "Such cases do happen."

 EE_cabinet_events.11.title: "A Long Overdue Promotion?"
 EE_cabinet_events.11.desc: "[target_character.GetName], an excellent minister in our employment, has been a standard member of our cabinet for many years now. [target_character.GetHerHis|U] skills are rarely matched by other cabinet members and it is clear that [target_character.GetSheHe] has distinguished [target_character.GetHerselfHimself]. Perhaps [target_character.GetNameWithNoTooltip] is due a promotion - a promotion to a [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]."
 EE_cabinet_events.11.a: "Such merit must be rewarded."
 EE_cabinet_events.11.b: "Skills and trust is not all that is needed to become the [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]."

 EE_cabinet_events.12.title: "Under Pressure"
 EE_cabinet_events.12.desc: "The responsibilities of a [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] are not few and far between. On the contrary, our [target_character.GetName] is perpetually stressed out, having to deal with constant onslaught of new issues to tackle.\n\nIt is that chronic stress that made [target_character.GetShortNameWithNoTooltip] decide - enough. Today we have been informed of [target_character.GetHerHis] resignation."
 EE_cabinet_events.12.a: "The entire country needs you!"
 EE_cabinet_events.12.b: "Everyone is due a break."

 EE_cabinet_events.13.title: "A Hidden Agenda?"
 EE_cabinet_events.13.desc: "The voices in the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtName] have been shifting ever since [target_character.GetName] got into power. It is no mere speculation, a short dialogue with the average courtier will quickly reveal what [target_character.GetShortNameWithNoTooltip] has been up to. Seems like [target_character.GetSheHe] has been peddling [target_character.GetHerHis] own hidden agenda - one of [target_societal_value.GetName]. And it is known that [target_character.GetHerHis] actions do have profound consequences."
 EE_cabinet_events.13.a: "[target_character.GetHerHis] agenda also suits ours."
 EE_cabinet_events.13.b: "And we shall peddle the news of [target_character.GetHerHis] 'resignation'!"

 EE_cabinet_events.14.title: "Rising Support for [target_policy.GetNameWithNoTooltip]"
 EE_cabinet_events.14.desc: "A member of the [target_estate.GetName] has come forward with a most interesting oration to the [ROOT.GetCountry.GetGovernment.GetParliament.GetName] during its last meeting. According to his opinion, one of our laws - [target_law.GetName] - must be revised thoroughly and a new policy be enacted - [target_policy.GetName]. This is rather familiar, for [target_character.GetName], a member of our cabinet, has been heard speaking strongly in favor of that policy before. Could [target_character.GetSheHe] be using [target_character.GetHerHis] influence to champion the implementation of new policies behind everyone else's back?"
 EE_cabinet_events.14.a: "Ensure that such motions will get continuous support."
 EE_cabinet_events.14.b: "Our support for [target_character.GetShortNameWithNoTooltip]'s imprisonment is rising too."
 EE_cabinet_events.14.c: "It must have been the [target_estate.GetNameWithNoTooltip] that bribed [target_character.GetHerHim]!"

 EE_cabinet_events.15.title: "A Companion to the [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
 EE_cabinet_events.15.desc: "No matter the occasion, a certain character can always be seen accompanying our [ROOT.GetCountry.GetGovernment.GetRulerTitle] - [target_character.GetName]. Whether [target_character.GetHeShe] is a close friend of [target_character2.GetName] or simply a political ally is unknown, but one thing is for certain - [target_character.GetNameWithNoTooltip] is already serving a role of a $EE_cabinet_shorthand_HoC_name$, even if unofficial.\n\nWell, [target_character.GetSheHe] would be, if [target_character2.GetShortNameWithNoTooltip] had not just decreed [target_character.GetShortNameWithNoTooltip] to be the $EE_cabinet_shorthand_HoC_name$."
 EE_cabinet_events.15.a: "The wishes of the [ROOT.GetCountry.GetGovernment.GetRulerTitle] must be fulfilled."
 EE_cabinet_events.15.b: "Something foul is at play here..."

 EE_cabinet_events.16.title: "Playing Favorites"
 EE_cabinet_events.16.desc: "Recent recruitment for the cabinet held by the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s chancery has revealed many ambitious and talented individuals who could be a great fit for our cabinet. Yet, despite the effort to find the most able, [target_character.GetName] has dismissed all of those candidates in order to pick [target_character2.GetName] instead with the use of the power of [target_character.GetHerHis] rank of $EE_cabinet_shorthand_HoC_name$. Such a vulgar display of power and favoritism has shocked the chancery, who are outraged by such audacity."
 EE_cabinet_events.16.a: "Our $EE_cabinet_shorthand_HoC_name$ is well within [target_character.GetHerHis] right to do so."
 EE_cabinet_events.16.b: "Bring me back those candidates!"

 EE_cabinet_events.17.title: "Putrid Hatred"
 EE_cabinet_events.17.desc: "Our $EE_cabinet_shorthand_HoC_name$ has gotten [target_character.GetHerselfHimself] into a deep conflict with the [target_estate.GetName] which is entrenched in the minds of our populace. Representatives of the estate are outspoken in their critique of [target_character.GetName], who is, in their minds, the embodiment of Lucifer himself. If the $EE_cabinet_shorthand_HoC_name$ will not be able to quell such voices, [target_character.GetShortNameWithNoTooltip] might be forced to relinquish [target_character.GetHerHis] position, or worse, face an armed opposition."
 EE_cabinet_events.17.a: "We must quell this conflict before it runs deep - deeper than we can imagine."
 EE_cabinet_events.17.b: "This is not of our concern."

 EE_cabinet_events.18.title: "Rise of a Despot"
 EE_cabinet_events.18.desc: "As part of an important ceremony, many representatives from the [target_estate.GetName] have gathered in [target_location.GetName] to pay respect and renew their homage to [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Pay homage they have, but not just to our [ROOT.GetCountry.GetGovernment.GetRulerTitle], but more importantly to [target_character.GetName], the despot in the shadows who really rules in the country.\n\nRecent months have seen more and more power be devolved in the hands of the $EE_cabinet_shorthand_HoC_name$, who might even possess enough influence to claim the throne."
 EE_cabinet_events.18.a: "Such vested power is a sign of our trust towards [target_character.GetName]."
 EE_cabinet_events.18.b: "Weakness imprisoning me..."

 EE_cabinet_events.19.title: "Live by the Sword, Die by the Sword"
 EE_cabinet_events.19.desc: "For much of [target_character.GetHerHis] tenure, our $EE_cabinet_shorthand_HoC_name$ strove to increase [target_character.GetHerHis] influence by a campaign of dread and intimidation. Though that has succeeded in keeping [target_character.GetHerHis] contemporary opponents in check, it has also managed to earn [target_character.GetHerselfHimself] many enemies in the process. Today, those foes triumph, for [target_character.GetName] has been found beheaded, lying in a ditch, [target_character.GetHerHis] body rotting like a carcass. The assassin is still at large, but the supposed motivation seems rather clear."
 EE_cabinet_events.19.a: "What a dreadful demise."

 EE_cabinet_events.20.title: "Jack of All Trades"
 EE_cabinet_events.20.desc: "The tenure of [target_character.GetName] has revealed the true extent of [target_character.GetHerHis] skills. No matter the task, [target_character.GetShortNameWithNoTooltip] is quick to the action, pouring [target_character.GetHerHis] heart into [target_character.GetHerHis] task. [target_character.GetHeShe|U] may not be a truly exceptional character or an illustrious states[target_character.GetWomanMan], but what [target_character.GetSheHe] is, is definitely a silent workhorse that keeps the [ROOT.GetCountry.GetLongName] going while seeking no glory."
 EE_cabinet_events.20.a: "That is a success story in its own right!"

 EE_cabinet_events.21.title: "All Talk No Skill"
 EE_cabinet_events.21.desc: "When [target_character.GetName] arrived in our [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetSheHe] could always be heard complaining about how slow things were done and how careless our ministers were. Always boasting about [target_character.GetHerHis] superiority, [target_character.GetSheHe] did eventually find [target_character.GetHerselfHimself] in our cabinet, much to the dismay of all the ministers that [target_character.GetSheHe] annoyed prior. And even now, [target_character.GetShortNameWithNoTooltip] continues to complain even as [target_character.GetSheHe] constantly underperforms.\n\nFrankly, everyone is sick of [target_character.GetHerHim]."
 EE_cabinet_events.21.a: "Such gross incompetence vexes me."
 EE_cabinet_events.21.b: "We do not have time to hire someone else."

 STATIC_MODIFIER_NAME_EE_cabinet_incompetent: "Tragic Incompetence"

 EE_cabinet_events.22.title: "Reading the Room"
 EE_cabinet_events.22.desc: "Most countries rely on a tiny number of literate clerks to do their governmental bidding. The [ROOT.GetCountry.GetLongName] is not one of those countries however, for our extraordinary literacy rates allow for us to delegate our bureaucracy to a higher number of government subordinates. With such bureaucracy, the decrees of our chancery are executed with utmost precision and timing."
 EE_cabinet_events.22.a: "Our investments into literacy were worth it."
 STATIC_MODIFIER_NAME_EE_cabinet_literacy_efficiency: "Literate Cabinet Clerks"

 EE_cabinet_events.23.title: "The [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Nero"
 EE_cabinet_events.23.desc: "The policies of our $EE_cabinet_shorthand_HoC_name$ have greatly displeased the population of [target_location.GetName], which has, at multiple times, tried to stage small-scale rebellions against [ROOT.GetCountry.GetAdjective] rule, and especially the one of [target_character.GetName]. All quelled, one small village of opposition remains, filled to the brim with nasty rebels who are trying to rally the local population against the $EE_cabinet_shorthand_HoC_name$. Faced with such fierce opposition, [target_character.GetShortName] is considering a fiery resolution to this dilemma.\n\nRaze the village and leave just ashes."
 EE_cabinet_events.23.a: "Such a display of dread should show the rebels just who they are dealing with."
 EE_cabinet_events.23.b: "This is a crime!"

 EE_cabinet_events.100.title: "Cabinet of Curiosities"
 EE_cabinet_events.100.desc: "[target_character.GetName] has turned out to be a most exceptional minister. A prodigy in [target_character.GetHerHis] craft, [target_character.GetSheHe] is revered across the [ROOT.GetCountry.GetLongName] as a peerless savant. However, [target_character.GetHerHis|U] pursuit of knowledge does not come cheap, and it is believed that [target_character.GetShortNameWithNoTooltip] could benefit greatly from additional funds granted from the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] treasury."
 EE_cabinet_events.100.a: "Shower [target_character.GetHerHim] in gold!"
 EE_cabinet_events.100.b: "We value [target_character.GetHerHis] pursuit of knowledge, but no more than our gold."
 EE_cabinet_events.100.tt: "[target_character.GetName] will engage in [target_character.GetHerHis] pursuit of knowledge, learning much with our guidance.\n\nSeveral [events|e] will follow, where you will be able to pick what [modifiers|e] [target_character.GetName] will learn. At the end of the [event|e] chain, "