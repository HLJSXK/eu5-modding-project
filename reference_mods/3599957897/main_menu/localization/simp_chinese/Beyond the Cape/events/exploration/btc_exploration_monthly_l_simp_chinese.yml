l_simp_chinese:
 exploration_failure.1.title: "探索失败"
 exploration_failure.1.desc: "我们的探险队消失得无影无踪。数月过去，既不见他们的船帆，也没有讯息传来，更无残骸漂至海岸。不论是被风暴吞噬，因饥荒覆灭，遭遇敌对海岸，还是陷入某种未知的命运，这次远征已彻底失败——连同船上所有成员随之罹难。"
 deep_ocean_exploration_fail_tt: "深海地点的探索难度更大。研究早起克拉克帆船[advance|e]可降低难度。"
 cape_exploration_fail_tt: "海角地点的探索难度更大。研究通往东印度群岛的航线[advance|e]可降低难度。"
 exploration_failure.1.cape_title: "探索失败 ‑ 海角"
 exploration_failure.1.deep_ocean_title: "探索失败 ‑ 深海"
 exploration_failure.1.cape_desc: "我们对这一区域的勘测工作在一处海角被迫中止。猛烈的海风、变幻莫测的海流以及复杂的海岸条件使船队无法继续前行。尽管经过多次尝试，至今尚无探险队能成功绕过此处，后续区域的勘探工作仍不完整。\n\n我们必须研究出一项能够克服这种不利条件的革新。"
 exploration_failure.1.deep_ocean_desc: "我们的勘测在深海边缘达到了极限。极端的深度、变幻莫测的天气以及合适设备的缺乏，使团队无法继续向更远的海域推进。尽管多次尝试，至今仍没有考察队能成功探索该区域以外的海域，这片领域在很大程度上仍是未知的。\n\n我们必须研究出一种能够克服这一困境的革新。"
 exploration_failure.1.a.a: "我们应当研究出一种能够突破当前困局的革新。"
 exploration_failure.1.a.b: "我们的雄心壮志付出了沉重的代价。"
 exploration_failure.1.great_cape_title: "探索失败 ‑ 大海角"
 exploration_failure.1.arctic_title: "探索失败 ‑ 北极"
 exploration_failure.1.hot_arid_title: "探索失败 ‑ 炎热干旱区"
 exploration_failure.1.tropical_title: "探索失败 ‑ 热带"
 exploration_failure.1.great_cape_desc: "我们对这片区域的勘测行动在一处大海角戛然而止。高耸的悬崖、肆虐的暴风雨和汹涌的狂浪不断冲击着我们的船队，使得前行寸步难行。这座海岬以巍峨之姿与暴烈之威，挫败了所有试图征服它的远征，致使彼端水域至今仍是无图可循的险境。\n\n我们必须研发出能够突破此种困境的革新。"
 exploration_failure.1.arctic_desc: "我们对这片区域的勘测努力被严酷的北极环境所阻挠。暴风雪、浮冰和严寒迫使探险队在取得重大进展前折返。尽管多次尝试，仍未有队伍能深入这片冰封之地，该区域至今仍基本处于未知状态。\n\n我们必须研究一项能克服这种逆境的革新。"
 exploration_failure.1.arid_desc: "我们对这片区域的勘测努力被酷热干旱所阻挠。极端高温、水源匮乏和沙尘暴迫使探险队在取得重大进展前折返。尽管多次尝试，仍未有队伍能深入这片酷热之地，该区域至今仍基本处于未知状态。\n\n我们必须研究一项能克服这种逆境的革新。"
 exploration_failure.1.tropical_desc: "我们对这片区域的勘测努力被茂密的热带区域所阻挠。茂密的植被、高湿环境和危险的野生动物迫使探险队在取得重大进展前折返。尽管多次尝试，仍未有队伍能深入这片丛林，该区域至今仍基本处于未知状态。\n\n我们必须研究一项能克服这种逆境的革新。"
 great_cape_exploration_fail_tt: "探索具有大海角地形的探索难度更大。研究经验丰富的船长[advance|e]可降低难度。"
 arctic_exploration_fail_tt: "北极气候地点的探索难度更大。研究探险者委员[advance|e]可降低难度。"
 hot_arid_exploration_fail_tt: "炎热干旱气候地点的探索难度更大。研究探险者委员[advance|e]可降低难度。"
 tropical_exploration_fail_tt: "热带气候地点的探索难度更大。研究探险者委员[advance|e]可降低难度。"