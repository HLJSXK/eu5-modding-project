l_simp_chinese:
 n_great_carrack: "巨型克拉克帆船"
 n_great_carrack_desc: "$n_great_carrack$是$n_carrack$设计的巅峰，用大规模建造，能够承受漫长的航行。凭借其庞大的船体和增加的载货量，它既是贸易船只，也是海上堡垒，确保了其在远洋的统治地位。"
 n_flagship: "旗舰"
 n_flagship_desc: "$n_flagship$不仅是舰队中最强大的旗舰，更是我们海军威望的象征。它配备了最先进的装备，由我们最值得信赖的军官指挥，在任何海战中都是协调和鼓舞士气的核心支柱。"
 n_corvette: "轻护卫舰"
 n_corvette_desc: "$n_corvette$是一种迅捷灵活的军舰，专为快速猛烈的打击而设计。它装备了轻便但有效的火炮，在袭击敌方贸易路线、迂回大型船只以及在小规模战斗和沿海战斗中表现出色。"
 n_great_frigate: "大护卫舰"
 n_great_frigate_desc: "作为$n_frigate$的升级版，$n_great_frigate$在保留机动性的同时升级了更强的火力。这些船只专为压制小型舰艇并甩开大型战舰而设计，完美平衡了速度、射程和火力。"
 n_man_of_war: "僧帽军舰"
 n_man_of_war_desc: "$n_man_of_war$是海军力量的巅峰，这种令人敬畏的舰船在多层甲板上布满重炮。它们专为摧毁敌军阵线和主宰海洋而设计，在风帆时代堪称海上霸权的化身。"
 n_nau: "卡拉维尔帆船"
 n_nau_desc: "$n_nau$是一种大型远洋船只，有着强大的载货能力和重型武装。由葡萄牙人研发，专为横跨大西洋和印度洋的持久航行而建造，既能承载财富也能向海外输送武力。"
 n_nau_de_armada: "卡拉维尔旗舰"
 n_nau_de_armada_desc: "$n_nau_de_armada$是$n_nau$的军事升级版本，配备了更重的火炮和更坚固船体。这些战舰作为葡萄牙舰队的中坚力量，在商业和战争中都展现了海上霸权。"
 n_portuguese_galleon: "葡萄牙盖伦帆船"
 n_portuguese_galleon_desc: "$n_portuguese_galleon$是对伊比利亚盖伦帆船的改良，在火力与机动性之间取得了平衡，既能作为战舰，也能为深入重洋的葡萄牙帝国充当财宝运输船。"
 n_spanish_galleon: "西班牙盖伦帆船"
 n_spanish_galleon_desc: "$n_spanish_galleon$是西班牙海军的骄傲，设计用于保护横跨大西洋的白银和货物。它比之前的船只更大、更坚固，强大的舷侧火力和可长时间战斗而令人畏惧。"
 n_bomb_vessel: "轰炸船"
 n_bomb_vessel_desc: "$n_bomb_vessel$是一种专门建造的舰船，配备重型迫击炮而非传统舷侧火炮。其设计目的是从海上轰击沿海防御工事和城镇，为此牺牲了航速与机动性，以换取毁灭性的远程火力。"
 n_fire_ship: "火船"
 n_fire_ship_desc: "$n_fire_ship$是一种构造简单却杀伤力惊人的武器：这种一次性船只满载易燃物，点燃后直冲敌方舰队。这种船只造价低廉且实战中极具威慑力，能通过制造混乱与恐慌扭转战局。"
 n_heavy_fire_ship: "重型火船"
 n_heavy_fire_ship_desc: "$n_heavy_fire_ship$是$n_fire_ship$的强化版本，体积更大且装载了更多沥青、焦油与爆炸物。其设计能承受敌方攻击直至抵达目标，一旦引燃，威力惊人。"
 n_demolition_ship: "毁灭舰"
 n_demolition_ship_desc: "$n_demolition_ship$是一种实验性船只，装载大量火药桶并设计用于撞击敌舰后引爆。虽然对船员而言危险且往往意味着自杀式攻击，但其毁灭性潜力使其成为海战中令人畏惧的武器。"
 n_heavy_demolition_ship: "重型毁灭舰"
 n_heavy_demolition_ship_desc: "$n_heavy_demolition_ship$将$n_demolition_ship$的残酷概念提升到了一个新的层次，拥有加固的船体和更大的爆炸装药。它被设计用来突破敌方防线并摧毁旗舰，是一种绝望且极具破坏力的武器。"
 n_explosion_ship: "爆破舰"
 n_explosion_ship_desc: "$n_explosion_ship$是一种装满火药并设计在敌军阵型中引爆的船只。与$n_fire_ship$不同，它依靠毁灭性的爆炸同时可以摧毁多艘船只，使其成为当时最极端的海军武器之一。"
 n_heavy_explosion_ship: "重型爆破舰"
 n_heavy_explosion_ship_desc: "$n_heavy_explosion_ship$强化了$n_explosion_ship$的设计理念，装载巨量炸药以实现更具毁灭性的爆炸效果。若能成功突入敌方舰队，仅需一次引爆就足以歼灭整支中队。"
 n_hellburner: "地狱火"
 n_hellburner_desc: "$n_hellburner$是爆破舰的终极形态，以毁灭性的力量而闻名。诞生于佛兰德战役期间，它在加固的船舱中装载了大量火药，爆炸威力之强足以媲美现代火炮齐射。"
