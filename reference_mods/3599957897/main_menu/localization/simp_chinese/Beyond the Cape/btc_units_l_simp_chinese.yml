 n_early_iberian_caravel: "早期卡拉维尔帆船"
 n_early_iberian_caravel_desc: "$n_early_iberian_caravel$是葡萄牙造船业的早期创新成果之一，船体轻便灵活，配备的三角帆使其能够迎风航行。尽管船身小巧，它却为后来的远洋探索与发现开辟了道路。"