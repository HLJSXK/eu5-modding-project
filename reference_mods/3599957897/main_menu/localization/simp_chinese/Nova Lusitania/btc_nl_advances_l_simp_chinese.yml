l_simp_chinese:
 advance_besteiros_do_conto: "$a_besteiros_do_conto$"
 advance_besteiros_do_conto_desc: "$a_besteiros_do_conto_desc$"
 a_besteiros_do_conto: "征召弩兵"
 a_besteiros_do_conto_desc: "葡萄牙皇家弩兵军团始建于中世纪晚期，从免除部分赋税的平民中征召，以终身服役为代价换取特权。他们以纪律严明、箭无虚发著称，成为当时葡萄牙军事体系的重要基石。"
 advance_portuguese_arquebusiers: "$a_portuguese_arquebusiers$"
 advance_portuguese_arquebusiers_desc: "$a_portuguese_arquebusiers_desc$"
 a_portuguese_arquebusiers: "葡萄牙火绳枪手"
 a_portuguese_arquebusiers_desc: "$a_portuguese_arquebusiers$将长矛与火枪方阵的威力同自身精湛的火器技艺相融合，以卓越的适应性闻名于世，是葡萄牙纵横欧非亚三大洲军队的中流砥柱。"
 advance_aventureiros: "$a_aventureiros$"
 advance_aventureiros_desc: "$a_aventureiros_desc$"
 a_aventureiros: "冒险者"
 a_aventureiros_desc: "$a_aventureiros$出自葡萄牙的低级贵族阶层，是自愿参战的绅士，他们不为军饷而战，只为荣誉、战利品和荣耀。他们身披精良铠甲，手持令人胆寒的双手巨剑，在海外征战中组成了凶悍的突击先锋。他们所秉承的骑士精神准则，将不计后果的勇猛和英雄式的单挑置于战术与安全之上。"