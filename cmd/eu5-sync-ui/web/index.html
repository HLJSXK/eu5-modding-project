<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EU5 一键同步</title>
  <style>
    :root {
      --bg: #0f1418;
      --panel: #182027;
      --panel2: #1f2a33;
      --text: #e7f0f7;
      --sub: #9fb2c2;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --accent: #23a6d5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, #1f3b4d 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(1080px, 96vw);
      margin: 24px auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .card {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid #2f3f4d;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 32px rgba(0,0,0,.25);
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { margin: 0; font-size: 24px; }
    .sub { color: var(--sub); font-size: 13px; }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 14px 24px;
      color: white;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, #0ea5e9, #16a34a);
      min-width: 180px;
    }
    .btn[disabled] { opacity: .55; cursor: not-allowed; }
    .status { font-size: 13px; color: var(--sub); }
    .status .ok { color: var(--ok); }
    .status .err { color: var(--err); }
    .log {
      background: #0c1116;
      border: 1px solid #2e3c48;
      border-radius: 10px;
      min-height: 420px;
      max-height: 62vh;
      overflow: auto;
      padding: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
    }
    details summary {
      cursor: pointer;
      color: var(--sub);
      font-weight: 600;
      user-select: none;
    }
    .cfg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .cfg label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--sub);
    }
    .cfg input[type="text"] {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #344b5a;
      background: #101920;
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }
    .cfg .full { grid-column: 1 / -1; }
    .cfg .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .save {
      margin-top: 12px;
      border: 1px solid #2f95bf;
      background: #143547;
      color: #cceeff;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      width: fit-content;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div>
          <h1>EU5 一键同步</h1>
          <div class="sub">点击下面按钮：自动部署 Goldberg + 从 COS 同步 Mod</div>
        </div>
        <button id="syncBtn" class="btn">开始同步</button>
      </div>
      <div class="status" id="status">就绪</div>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom: 10px;">
        <strong>同步日志</strong>
        <span class="sub">实时显示执行过程</span>
      </div>
      <div id="log" class="log"></div>
    </div>

    <div class="card">
      <details>
        <summary>高级参数配置（一般不需要改）</summary>
        <div class="cfg">
          <label class="full">Manifest URL
            <input id="manifestURL" type="text" />
          </label>
          <label>Project Root
            <input id="projectRoot" type="text" />
          </label>
          <label>EU5 Path
            <input id="eu5Path" type="text" />
          </label>
          <label class="full">Mod Path
            <input id="modPath" type="text" />
          </label>
          <label>Account Name
            <input id="accountName" type="text" />
          </label>
          <label>Steam ID
            <input id="steamID" type="text" />
          </label>
          <label class="check full">
            <input id="deleteManagedMissing" type="checkbox" />
            删除远端已移除的受管 Mod
          </label>
        </div>
        <button id="saveCfg" class="save">保存配置</button>
      </details>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let offset = 0;
    let polling = null;

    async function loadConfig() {
      const res = await fetch('/api/config');
      const c = await res.json();
      $('manifestURL').value = c.manifest_url || '';
      $('projectRoot').value = c.project_root || '';
      $('eu5Path').value = c.eu5_path || '';
      $('modPath').value = c.mod_path || '';
      $('accountName').value = c.account_name || 'EU5Player';
      $('steamID').value = c.steam_id || '76561197960287930';
      $('deleteManagedMissing').checked = !!c.delete_managed_missing;
    }

    async function saveConfig() {
      const payload = {
        manifest_url: $('manifestURL').value.trim(),
        project_root: $('projectRoot').value.trim(),
        eu5_path: $('eu5Path').value.trim(),
        mod_path: $('modPath').value.trim(),
        account_name: $('accountName').value.trim() || 'EU5Player',
        steam_id: $('steamID').value.trim() || '76561197960287930',
        delete_managed_missing: $('deleteManagedMissing').checked,
      };
      const res = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const t = await res.text();
        alert('保存失败: ' + t);
        return;
      }
      setStatus('配置已保存', 'ok');
    }

    function setStatus(text, cls='') {
      $('status').innerHTML = cls ? `<span class="${cls}">${text}</span>` : text;
    }

    async function startSync() {
      $('syncBtn').disabled = true;
      $('log').textContent = '';
      offset = 0;
      setStatus('正在启动同步任务...');

      const res = await fetch('/api/start-sync', { method: 'POST' });
      if (!res.ok) {
        $('syncBtn').disabled = false;
        setStatus('启动失败', 'err');
        const t = await res.text();
        alert(t);
        return;
      }
      setStatus('同步进行中...');
      beginPolling();
    }

    async function poll() {
      const lr = await fetch('/api/log?from=' + offset);
      const logData = await lr.json();
      if (logData.chunk) {
        $('log').textContent += logData.chunk;
        $('log').scrollTop = $('log').scrollHeight;
      }
      offset = logData.next;

      const sr = await fetch('/api/status');
      const st = await sr.json();
      if (st.running) {
        setStatus('同步进行中...');
        return;
      }
      if (st.done) {
        if (st.last_err) {
          setStatus('同步失败: ' + st.last_err, 'err');
        } else {
          setStatus('同步完成', 'ok');
        }
      } else {
        setStatus('就绪');
      }
      $('syncBtn').disabled = false;
      stopPolling();
    }

    function beginPolling() {
      stopPolling();
      polling = setInterval(() => {
        poll().catch(err => {
          console.error(err);
          setStatus('日志轮询失败', 'err');
          $('syncBtn').disabled = false;
          stopPolling();
        });
      }, 600);
    }

    function stopPolling() {
      if (polling) {
        clearInterval(polling);
        polling = null;
      }
    }

    $('syncBtn').addEventListener('click', () => startSync().catch(err => {
      console.error(err);
      $('syncBtn').disabled = false;
      setStatus('启动失败', 'err');
    }));
    $('saveCfg').addEventListener('click', () => saveConfig().catch(err => {
      console.error(err);
      alert('保存配置失败');
    }));

    loadConfig().catch(err => {
      console.error(err);
      setStatus('加载配置失败', 'err');
    });
  </script>
</body>
</html>
