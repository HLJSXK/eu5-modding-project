<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>EU5 Sync</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1E1E1E;
            --primary: #BB86FC;
            --primary-hover: #9b59b6;
            --text: #E0E0E0;
            --text-muted: #9E9E9E;
            --border: #333;
            --success: #03DAC6;
            --error: #CF6679;
            --warning: #FFB300;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--surface);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tabs {
            display: flex;
            gap: 16px;
        }

        .tab {
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .tab:hover {
            color: var(--text);
            background-color: rgba(255,255,255,0.05);
        }

        .tab.active {
            color: var(--bg);
            background-color: var(--primary);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 24px;
            gap: 20px;
        }

        .view.active {
            display: flex;
        }

        .dash-top {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .name-box {
            min-width: 260px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .name-box label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .name-box input[type="text"] {
            background-color: #2c2c2c;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .name-box input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-sync {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: var(--bg);
            border: none;
            padding: 16px 48px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(187, 134, 252, 0.3);
        }

        .btn-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(187, 134, 252, 0.4);
        }

        .btn-sync:active {
            transform: translateY(0);
        }

        .btn-sync:disabled {
            background: #555;
            color: #999;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            flex: 1;
        }

        .stat-card {
            background-color: var(--surface);
            padding: 12px 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-val {
            font-size: 18px;
            font-weight: bold;
        }

        .progress-box {
            width: 100%;
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .bottom-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .log-container {
            flex: 1;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .mod-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .mod-table th, .mod-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            user-select: text;
        }

        .mod-table th {
            top: 0;
            background-color: var(--surface);
            position: sticky;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 5;
            box-shadow: 0 1px 0 var(--border);
        }

        .mod-table tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            text-transform: uppercase;
            text-align: center;
            min-width: 80px;
        }

        .action-add { background-color: rgba(3, 218, 198, 0.15); color: var(--success); }
        .action-update { background-color: rgba(255, 179, 0, 0.15); color: var(--warning); }
        .action-delete { background-color: rgba(207, 102, 121, 0.15); color: var(--error); }
        .action-unmanaged { background-color: rgba(158, 158, 158, 0.15); color: #BDBDBD; }
        .action-noop, .action-exist { background-color: rgba(255,255,255,0.05); color: #9E9E9E; }
        
        .status-box {
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-left: 6px solid var(--border);
            transition: all 0.3s ease;
        }

        .status-box.success {
            border-left-color: var(--success);
            background-color: rgba(3, 218, 198, 0.05);
        }

        .status-box.error {
            border-left-color: var(--error);
            background-color: rgba(207, 102, 121, 0.05);
        }

        .status-box.syncing {
            border-left-color: var(--primary);
            background-color: rgba(187, 134, 252, 0.05);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group input[type="text"] {
            background-color: #2c2c2c;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .btn-save {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            align-self: flex-start;
            margin-top: 10px;
        }

        .btn-save:hover {
            background-color: #333;
        }
        
        .empty-state {
            color: var(--text-muted);
            text-align: center;
            margin-top: 60px;
            font-size: 14px;
            padding: 20px;
        }

        .sys-log-box {
            width: 100%;
            height: 300px;
            background-color: #111;
            color: #ccc;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            font-family: Consolas, monospace;
            font-size: 12px;
            resize: vertical;
            margin-top: 10px;
            outline: none;
            user-select: text;
        }
        
        .sys-log-box:focus {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <h1>
            <span style="color:var(--primary); font-size:24px;">&#9881;</span> 
            EU5 Sync
        </h1>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('sync')">同步视图</div>
            <div class="tab" onclick="switchTab('settings')">高级模式</div>
        </div>
    </header>

    <div class="container">
        <!-- 同步视图页 -->
        <div id="view-sync" class="view active">
            <div class="dash-top">
                <button id="btnSync" class="btn-sync" onclick="doSync()">同步</button>
                <div class="name-box">
                    <label>Display Name (游戏中显示名字)</label>
                    <input type="text" id="cfgDisplayName">
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">添加 (Added)</span>
                        <span id="stAdded" class="stat-val" style="color: var(--success)">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">更新 (Updated)</span>
                        <span id="stUpdated" class="stat-val" style="color: var(--warning)">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">删除 (Deleted)</span>
                        <span id="stDeleted" class="stat-val" style="color: var(--error)">0</span>
                    </div>
                </div>
            </div>

            <div class="progress-box">
                <div id="progBar" class="progress-fill"></div>
            </div>

            <!-- 数据表格 -->
            <div class="bottom-area">
                <div class="log-container">
                    <table class="mod-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th style="width: 25%;">Local</th>
                                <th style="width: 15%; text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="logList">
                            <tr id="emptyRow">
                                <td colspan="3">
                                    <div class="empty-state">点击“同步”以查看Mod修改情况</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="statusBox" class="status-box">
                    状态：等待操作，点击同步即可一键联机同步
                </div>
            </div>
        </div>

        <!-- 高级模式页 -->
        <div id="view-settings" class="view" style="overflow-y:auto;">
            <div style="max-width: 800px;">
                <h2 style="font-size:18px; margin-bottom: 20px;">系统配置</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Manifest URL (远程配置表)</label>
                        <input type="text" id="cfgManifest">
                    </div>
                    <div class="form-group">
                        <label>Project Root (可选)</label>
                        <input type="text" id="cfgProject">
                    </div>
                    <div class="form-group">
                        <label>EU5 Path (可选)</label>
                        <input type="text" id="cfgEU5">
                    </div>
                    <div class="form-group">
                        <label>Mod Path (可选)</label>
                        <input type="text" id="cfgMod">
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="cfgDel">
                    <label for="cfgDel">自动删除本地多余的受管Mod文件 (Delete Managed Missing)</label>
                </div>

                <button class="btn-save" onclick="saveConfig()" style="margin-bottom: 30px;">保存配置</button>

                <h2 style="font-size:18px; margin-bottom: 10px; border-top: 1px solid var(--border); padding-top: 20px;">系统日志</h2>
                <textarea id="sysLogOutput" class="sys-log-box" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('view-' + tabId).classList.add('active');
        }

        let isSyncing = false;
        let knownLogCount = 0;
        let isSyncingStateWasActive = false;

        async function init() {
            const cfg = await goLoadConfig();
            document.getElementById('cfgManifest').value = cfg.manifest_url || "";
            document.getElementById('cfgProject').value = cfg.project_root || "";
            document.getElementById('cfgEU5').value = cfg.eu5_path || "";
            document.getElementById('cfgMod').value = cfg.mod_path || "";
            document.getElementById('cfgDisplayName').value = cfg.display_name || cfg.account_name || "";
            document.getElementById('cfgDel').checked = cfg.delete_managed_missing || false;

            setInterval(pollStatus, 300);
        }

        async function saveConfig(silent = false) {
            const cfg = {
                manifest_url: document.getElementById('cfgManifest').value,
                project_root: document.getElementById('cfgProject').value,
                eu5_path: document.getElementById('cfgEU5').value,
                mod_path: document.getElementById('cfgMod').value,
                display_name: document.getElementById('cfgDisplayName').value,
                delete_managed_missing: document.getElementById('cfgDel').checked
            };
            const err = await goSaveConfig(cfg);
            if(err) {
                if(!silent) {
                    alert("保存失败: " + err);
                }
                return false;
            } else {
                if(!silent) {
                    alert("配置已保存");
                }
                return true;
            }
        }

        async function doSync() {
            if(isSyncing) return;
            isSyncing = true;
            isSyncingStateWasActive = true;
            document.getElementById('btnSync').disabled = true;
            document.getElementById('btnSync').innerText = "同步中...";

            // Sync button also applies latest display-name/config changes.
            const saved = await saveConfig(true);
            if(!saved) {
                isSyncing = false;
                isSyncingStateWasActive = false;
                document.getElementById('btnSync').disabled = false;
                document.getElementById('btnSync').innerText = "同步";
                updateStatusBox("配置保存失败，请检查高级模式中的路径配置", "error");
                return;
            }
            
            // clear both table and logs
            document.getElementById('logList').innerHTML = "";
            document.getElementById('sysLogOutput').value = "";
            knownLogCount = 0;
            updateStatusBox("正在同步，请稍候...", "syncing");
            
            await goStartSync();
        }

        function updateStatusBox(text, typeClass) {
            const box = document.getElementById('statusBox');
            box.className = "status-box " + typeClass;
            box.innerText = typeClass === 'success' ? `✅ 成功：${text}` : 
                            typeClass === 'error' ? `❌ 错误：${text}` : 
                            `⏳ 状态：${text}`;
        }

        function getActionClass(action) {
            const a = action.toLowerCase();
            if(a.includes('add')) return 'action-add';
            if(a.includes('update')) return 'action-update';
            if(a.includes('delete')) return 'action-delete';
            if(a.includes('unmanaged')) return 'action-unmanaged';
            return 'action-noop';
        }

        async function pollStatus() {
            const st = await goGetStatus();
            
            document.getElementById('stAdded').innerText = st.Added;
            document.getElementById('stUpdated').innerText = st.Updated;
            document.getElementById('stDeleted').innerText = st.Deleted;

            // Update System Logs in advanced settings tab
            if (st.FullLog) {
                const sysLog = document.getElementById('sysLogOutput');
                if (sysLog.value !== st.FullLog) {
                    sysLog.value = st.FullLog;
                    sysLog.scrollTop = sysLog.scrollHeight;
                }
            }

            if(isSyncing && st.IsDone) {
                isSyncing = false;
                document.getElementById('btnSync').disabled = false;
                document.getElementById('btnSync').innerText = "同步";
                document.getElementById('progBar').style.width = "100%";
                
                if(st.LastError !== "") {
                    updateStatusBox(st.LastError, "error");
                } else {
                    updateStatusBox("所有资产和Mod包校验通过，已可以进入游戏！", "success");
                }
            }

            if(isSyncing && !st.IsDone) {
                let perc = 10;
                if((st.Updated + st.Added + st.Deleted) > 0) {
                    perc = Math.min(90, 10 + ((st.Updated + st.Added + st.Deleted) * 5));
                }
                document.getElementById('progBar').style.width = perc + "%";
            }

            if(st.Ops && st.Ops.length > knownLogCount) {
                const list = document.getElementById('logList');
                if(document.getElementById('emptyRow')) {
                    list.innerHTML = "";
                }

                for(let i=knownLogCount; i<st.Ops.length; i++) {
                    const op = st.Ops[i];
                    const tr = document.createElement('tr');

                    let alpha = op.Action === "NoOp" || op.Action === "Exist" ? "opacity: 0.5;" : "";
                    tr.style = alpha;
                    
                    tr.innerHTML = `
                        <td style="font-weight: 500;">${op.Name}</td>
                        <td style="color: var(--text-muted);">${op.Local}</td>
                        <td style="text-align: right;">
                            <span class="badge ${getActionClass(op.Action)}">${op.Action}</span>
                        </td>
                    `;
                    list.appendChild(tr);
                }

                if(st.Ops.length > knownLogCount) {
                    const container = list.parentElement.parentElement;
                    container.scrollTop = container.scrollHeight;
                }
                knownLogCount = st.Ops.length;
            }

            if(st.IsDone && isSyncingStateWasActive) {
                isSyncingStateWasActive = false;
                const list = document.getElementById('logList');
                if(list.children.length === 0) {
                    list.innerHTML = `<tr><td colspan="3"><div class="empty-state" style="color:var(--success)">🎉 同步完成，所有 Mod 已是最新状态，无需任何修改！</div></td></tr>`;
                }
            }
        }

        window.onload = () => {
            init().catch(e => console.error(e));
        };
    </script>
</body>
</html>
