name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时触发正式发布
  workflow_dispatch:  # 允许在 GitHub 网页上手动触发

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }} )
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
            label: windows-amd64
          - goos: linux
            goarch: amd64
            suffix: ""
            label: linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: ""
            label: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: ""
            label: darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build eu5-detector
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" \
            -o build/eu5-detector-${{ matrix.label }}${{ matrix.suffix }} \
            ./cmd/eu5-detector

      - name: Build eu5-deployer
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" \
            -o build/eu5-deployer-${{ matrix.label }}${{ matrix.suffix }} \
            ./cmd/eu5-deployer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.label }}
          path: build/
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## EU5 Modding Project ${{ github.ref_name }}

            根据你的操作系统下载对应文件：

            | 文件 | 系统 |
            |------|------|
            | `eu5-deployer-windows-amd64.exe` | Windows 64位（主要工具） |
            | `eu5-detector-windows-amd64.exe` | Windows 64位（检测工具） |
            | `eu5-deployer-linux-amd64` | Linux 64位 |
            | `eu5-deployer-darwin-amd64` | macOS Intel |
            | `eu5-deployer-darwin-arm64` | macOS Apple Silicon (M1/M2/M3) |
          files: dist/*
