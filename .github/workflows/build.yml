name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时触发正式发布
  workflow_dispatch:  # 允许在 GitHub 网页上手动触发

jobs:
  build:
    name: Build Windows Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build eu5-detector
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" \
            -o build/eu5-detector-windows-amd64.exe \
            ./cmd/eu5-detector

      - name: Build eu5-deployer
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" \
            -o build/eu5-deployer-windows-amd64.exe \
            ./cmd/eu5-deployer

      - name: Build eu5-modsync
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" \
            -o build/eu5-modsync-windows-amd64.exe \
            ./cmd/eu5-modsync

      - name: Build eu5-sync-ui
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" \
            -o build/eu5-sync-ui-windows-amd64.exe \
            ./cmd/eu5-sync-ui

      - name: Create direct-use package
        run: |
          mkdir -p build/eu5-tools-windows-amd64
          cp build/eu5-deployer-windows-amd64.exe build/eu5-tools-windows-amd64/eu5-deployer.exe
          cp build/eu5-detector-windows-amd64.exe build/eu5-tools-windows-amd64/eu5-detector.exe
          cp build/eu5-modsync-windows-amd64.exe build/eu5-tools-windows-amd64/eu5-modsync.exe
          cp build/eu5-sync-ui-windows-amd64.exe build/eu5-tools-windows-amd64/eu5-sync-ui.exe
          cp cmd/eu5-sync-ui/eu5-sync-ui.exe.manifest build/eu5-tools-windows-amd64/eu5-sync-ui.exe.manifest
          cp -r goldberg_emulator build/eu5-tools-windows-amd64/goldberg_emulator

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eu5-tools-windows-amd64
          path: build/eu5-tools-windows-amd64/
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: eu5-tools-windows-amd64
          path: dist/eu5-tools-windows-amd64

      - name: Create release zip
        run: |
          cd dist/eu5-tools-windows-amd64
          zip -r ../eu5-tools-windows-amd64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## EU5 Modding Project ${{ github.ref_name }}

            下载并解压以下文件即可直接使用：

            - `eu5-tools-windows-amd64.zip`

            压缩包内容：
            - `eu5-deployer.exe`
            - `eu5-detector.exe`
            - `eu5-modsync.exe`
            - `eu5-sync-ui.exe`
            - `eu5-sync-ui.exe.manifest`
            - `goldberg_emulator/`（完整目录）
          files: dist/eu5-tools-windows-amd64.zip
