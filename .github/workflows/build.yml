name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时触发正式发布
  workflow_dispatch:  # 允许在 GitHub 网页上手动触发

jobs:
  build:
    name: Build Windows Sync UI Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Prepare icon resources
        run: |
          go install github.com/tc-hib/go-winres@latest
          go run ./tools/gen_sync_ui_icon.go -out build/sync-ui-icon.png
          "$(go env GOPATH)/bin/go-winres" simply --arch amd64 --icon build/sync-ui-icon.png --manifest gui --out cmd/eu5-sync-ui/rsrc --product-name "EU5 Sync UI" --file-description "EU5 Sync UI" --original-filename "eu5-sync-ui.exe"

      - name: Build eu5-sync-ui
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-H windowsgui -s -w" \
            -o build/eu5-sync-ui-windows-amd64.exe \
            ./cmd/eu5-sync-ui

      - name: Create direct-use package
        run: |
          mkdir -p build/eu5-tools-windows-amd64
          cp build/eu5-sync-ui-windows-amd64.exe build/eu5-tools-windows-amd64/eu5-sync-ui.exe
          cp -r goldberg_emulator build/eu5-tools-windows-amd64/goldberg_emulator
          rm -f cmd/eu5-sync-ui/rsrc_windows_amd64.syso

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eu5-tools-windows-amd64
          path: build/eu5-tools-windows-amd64/
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: eu5-tools-windows-amd64
          path: dist/eu5-tools-windows-amd64

      - name: Create release zip
        run: |
          cd dist/eu5-tools-windows-amd64
          zip -r ../eu5-tools-windows-amd64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## EU5 Modding Project ${{ github.ref_name }}

            下载并解压以下文件即可直接使用：

            - `eu5-tools-windows-amd64.zip`

            压缩包内容：
            - `eu5-sync-ui.exe`
            - `goldberg_emulator/`（完整目录）
          files: dist/eu5-tools-windows-amd64.zip
