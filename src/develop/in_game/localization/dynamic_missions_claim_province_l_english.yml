l_english:
 # =============================================================================
 # CLAIM PROVINCE MISSION (SIMPLIFIED CORE FLOW)
 # =============================================================================

 # Main menu option in mission picker
 dynamic_missions.1.option_e: "Claim a neighboring province"
 dynamic_missions.1.option_e.tooltip: "Start a focused claim mission on a neighboring foreign location."

 # Event 40: Claim mission intro
 dynamic_missions.40.title: "Claim Province: Prepare a Claim"
 dynamic_missions.40.desc: "We can now press a formal claim beyond our current borders. In this debug-phase implementation, the mission will auto-select one neighboring foreign location as the claim target."
 dynamic_missions.40.option_a: "Proceed with target selection"
 dynamic_missions.40.option_a.tooltip: "Continue and pick one neighboring foreign location automatically."
 dynamic_missions.40.option_b: "Cancel this mission"
 dynamic_missions.40.option_b.tooltip: "Abort claim setup and return to normal operations."

 # Event 41: Auto-selected target confirmation
 dynamic_missions.41.title: "Claim Province: Confirm Target"
 dynamic_missions.41.desc: "A neighboring foreign location candidate has been identified. Confirm to start the 5-year claim mission timer."
 dynamic_missions.41.option_province: "Start claim mission on the selected target"
 dynamic_missions.41.option_province.tooltip: "Sets the selected location as the claim target and starts mission tracking."
 dynamic_missions.41.option_cancel: "Cancel this mission"
 dynamic_missions.41.option_cancel.tooltip: "Abort and clear claim setup."

 # Event 50: Success (target ownership achieved)
 dynamic_missions.50.title: "Claim Mission Succeeded"
 dynamic_missions.50.desc: "The claimed location is now under our control. Our objective has been fulfilled within the mission window."
 dynamic_missions.50.option_a: "The claim has been secured"
 dynamic_missions.50.option_a.tooltip: "§GGain 10 prestige§!"

 # Event 51: Failure (timeout)
 dynamic_missions.51.title: "Claim Mission Failed"
 dynamic_missions.51.desc: "Time has expired before we secured the claimed location. The mission is considered unsuccessful."
 dynamic_missions.51.option_a: "We must reconsider our approach"
 dynamic_missions.51.option_a.tooltip: "§RLose 10 prestige§!"

 # Claim mission decision (minimal debug set)
 dm_claim_border_reconnaissance_decision: "Conduct Border Reconnaissance"
 dm_claim_border_reconnaissance_decision_desc: "Send scouts to collect immediate military information near the claimed border."
 dm_claim_border_reconnaissance_tooltip: "§RCost: 200 manpower§!\n§G+5 Army Tradition§!\n§RCooldown: 1 year§!"

 # Modifiers used by simplified claim mission
 dm_claim_province_active: "Claim Mission Active"
 dm_claim_province_active_desc: "A claim mission target has been set and is currently being tracked."

 dm_border_reconnaissance_cooldown: "Border Reconnaissance Cooldown"
 dm_border_reconnaissance_cooldown_desc: "Scouts are reorganizing after the previous reconnaissance mission."

 # Legacy placeholders kept because static modifiers still define these keys
 dm_fabricated_legitimacy: "Fabricated Legitimacy"
 dm_fabricated_legitimacy_desc: "Legacy placeholder modifier kept during migration cleanup."

 dm_incited_panic_province: "Incited Panic"
 dm_incited_panic_province_desc: "Legacy placeholder modifier kept during migration cleanup."
