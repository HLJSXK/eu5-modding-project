 DM_PANEL_TITLE: "动态任务"
 DM_PANEL_IDLE_TITLE: "状态：空闲"
 DM_PANEL_MISSION_ACTIVE_TITLE: "状态：任务进行中"
 DM_PANEL_IDLE_DESC: "当前没有进行中的任务。等待任务选择事件后再开始。"
 DM_PANEL_MISSION_HINT_DEVELOP: "“发展城市”任务进行中。重点观察任务标记、月计数和目标相关变量。"
 DM_PANEL_MISSION_HINT_RESEARCH: "“大型科研”任务进行中。核心中间变量：dm_research_progress。"
 DM_PANEL_MISSION_HINT_ESTABLISH: “”促进城市化”任务进行中。首都繁荣度目标：75。重点观察任务标记、月计数和投资决议状态。”
 DM_PANEL_MISSION_HINT_CLAIM: "“宣称省份”任务进行中。重点观察任务标记、月计数和宣称状态变量。"
 DM_PANEL_DEBUG_BLOCK_TITLE: "调试变量（玩家作用域）"
 DM_PANEL_DEBUG_LINE_MISSION_TYPE: "dm_gui_mission_type = [Player.MakeScope.GetVariable('dm_gui_mission_type').GetValue|0]"
 DM_PANEL_DEBUG_LINE_ACTIVE: "dm_active_mission = [Player.MakeScope.GetVariable('dm_active_mission').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_DEVELOP: "dm_mission_develop_city = [Player.MakeScope.GetVariable('dm_mission_develop_city').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_RESEARCH: "dm_mission_large_research = [Player.MakeScope.GetVariable('dm_mission_large_research').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_ESTABLISH: "dm_mission_promote_urbanization = [Player.MakeScope.GetVariable('dm_mission_promote_urbanization').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_CLAIM: "dm_mission_claim_province = [Player.MakeScope.GetVariable('dm_mission_claim_province').GetValue|0]"
 DM_PANEL_DEBUG_LINE_MONTHS: "dm_months_elapsed = [Player.MakeScope.GetVariable('dm_months_elapsed').GetValue|0]"
 DM_PANEL_DEBUG_LINE_RESEARCH_PROGRESS: "dm_research_progress = [Player.MakeScope.GetVariable('dm_research_progress').GetValue|0]"
