l_simp_chinese:
 # =============================================================================
 # 统一局势
 # =============================================================================
 dynamic_missions_situation: "动态任务"
 dynamic_missions_situation_desc: "用于调试动态任务状态的统一任务管理面板。"

 # =============================================================================
 # 任务选择
 # =============================================================================
 dynamic_missions.1.title: "动态任务：选择专注方向"
 dynamic_missions.1.desc: "国家一次只专注一个任务。当前为调试阶段，只启用核心任务流程。"
 dynamic_missions.1.option_a: "发展一座城市"
 dynamic_missions.1.option_a.tooltip: "选择一个城市或城镇，推进其繁荣度。"
 dynamic_missions.1.option_b: "启动大型科研项目"
 dynamic_missions.1.option_b.tooltip: "开启一个有进度追踪的限时科研任务。"
 dynamic_missions.1.option_c: "暂不选择"
 dynamic_missions.1.option_c.tooltip: "暂时跳过任务选择。"
 dynamic_missions.1.option_d: "建立新城市"
 dynamic_missions.1.option_d.tooltip: "选择一个城镇，尝试提升为城市。"
 dynamic_missions.1.option_e: "宣称邻近省份"
 dynamic_missions.1.option_e.tooltip: "对一个邻近外国地点发起简化宣称任务。"

 # =============================================================================
 # 发展城市
 # =============================================================================
 dynamic_missions.2.title: "发展城市：选择目标"
 dynamic_missions.2.desc: "选择目标确定方式。当前简化实现支持“首都优先”或“自动选择”。"
 dynamic_missions.2.option_a: "使用首都（若有效）"
 dynamic_missions.2.option_a.tooltip: "若首都是符合条件且未满繁荣的城镇/城市，则将其设为目标。"
 dynamic_missions.2.option_b: "自动选择有效城镇/城市"
 dynamic_missions.2.option_b.tooltip: "自动选择一个符合条件的自有地点。"
 dynamic_missions.2.option_c: "取消任务设置"
 dynamic_missions.2.option_c.tooltip: "不启动该任务。"

 dynamic_missions.3.title: "发展城市：成功"
 dynamic_missions.3.desc: "目标地点已达到要求的繁荣度。"
 dynamic_missions.3.option_a: "很好"
 dynamic_missions.3.option_a.tooltip: "目标地点获得 +1 发展度。"

 dynamic_missions.4.title: "发展城市：失败"
 dynamic_missions.4.desc: "在时限内未达到繁荣度要求。"
 dynamic_missions.4.option_a: "下次再试"
 dynamic_missions.4.option_a.tooltip: "清除任务状态。"

 # =============================================================================
 # 大型科研项目
 # =============================================================================
 dynamic_missions.23.title: "大型科研项目：成功"
 dynamic_missions.23.desc: "科研进度在时限内达到目标。"
 dynamic_missions.23.option_a: "重大突破"

 dynamic_missions.24.title: "大型科研项目：失败"
 dynamic_missions.24.desc: "任务到期时科研进度不足。"
 dynamic_missions.24.option_a: "总结经验"

 # =============================================================================
 # 建立新城市
 # =============================================================================
 dynamic_missions.30.title: "建立新城市：选择目标城镇"
 dynamic_missions.30.desc: "选择一个城镇进行长期建设。本任务保留简化且便于调试的辅助决议。"
 dynamic_missions.30.option_capital: "使用首都（若为城镇）"
 dynamic_missions.30.option_capital.tooltip: "若首都是城镇，则选为目标。"
 dynamic_missions.30.option_first_town: "自动选择有效城镇"
 dynamic_missions.30.option_first_town.tooltip: "自动选择一个符合条件的城镇。"
 dynamic_missions.30.option_cancel: "取消任务设置"
 dynamic_missions.30.option_cancel.tooltip: "不启动该任务。"

 dynamic_missions.33.title: "建立新城市：成功"
 dynamic_missions.33.desc: "目标城镇已提升为城市。"
 dynamic_missions.33.option_a: "新城市诞生"
 dynamic_missions.33.option_a.tooltip: "目标获得永久“国家明珠”修正。"

 dynamic_missions.34.title: "建立新城市：失败"
 dynamic_missions.34.desc: "任务到期时目标仍未成为城市。"
 dynamic_missions.34.option_a: "结束本次尝试"
 dynamic_missions.34.option_a.tooltip: "清除任务状态。"

 # =============================================================================
 # 宣称省份（简化核心流程）
 # =============================================================================
 dynamic_missions.40.title: "宣称省份：准备宣称"
 dynamic_missions.40.desc: "我们现在可以向边境外正式提出宣称。在当前调试实现中，系统会自动选择一个邻近外国地点作为目标。"
 dynamic_missions.40.option_a: "继续并选择目标"
 dynamic_missions.40.option_a.tooltip: "继续并自动挑选一个邻近外国地点。"
 dynamic_missions.40.option_b: "取消此任务"
 dynamic_missions.40.option_b.tooltip: "中止宣称流程并返回。"

 dynamic_missions.41.title: "宣称省份：确认目标"
 dynamic_missions.41.desc: "已识别一个邻近外国地点候选目标。确认后将启动 5 年宣称任务计时。"
 dynamic_missions.41.option_province: "对所选目标启动宣称任务"
 dynamic_missions.41.option_province.tooltip: "将该地点设为宣称目标并开始任务追踪。"
 dynamic_missions.41.option_cancel: "取消此任务"
 dynamic_missions.41.option_cancel.tooltip: "中止并清理宣称设置。"

 dynamic_missions.50.title: "宣称任务：成功"
 dynamic_missions.50.desc: "宣称目标地点现已归我方所有，任务目标在时限内完成。"
 dynamic_missions.50.option_a: "宣称已落实"
 dynamic_missions.50.option_a.tooltip: "§G获得 10 威望§!"

 dynamic_missions.51.title: "宣称任务：失败"
 dynamic_missions.51.desc: "在任务时限结束前未能控制宣称目标地点。"
 dynamic_missions.51.option_a: "需要调整策略"
 dynamic_missions.51.option_a.tooltip: "§R失去 10 威望§!"

 # =============================================================================
 # 决议（当前核心集合）
 # =============================================================================
 dm_encourage_migration_decision: "鼓励迁徙"
 dm_encourage_migration_decision_desc: "为当前“建立新城市”目标切换迁徙支持。"

 dm_encourage_proselytization_decision: "鼓励传教"
 dm_encourage_proselytization_decision_desc: "为当前“建立新城市”目标切换宗教转化支持。"

 dm_encourage_folk_culture_decision: "鼓励民俗文化"
 dm_encourage_folk_culture_decision_desc: "为当前“建立新城市”目标切换文化同化支持。"

 dm_requisition_materials_decision: "征调建设材料"
 dm_requisition_materials_decision_desc: "为“建立新城市”任务切换国家资源征调支持。"

 dm_increase_research_funding_decision: "增加科研经费"
 dm_increase_research_funding_decision_desc: "切换额外科研投入以加速科研任务进度。"

 dm_claim_border_reconnaissance_decision: "进行边境侦察"
 dm_claim_border_reconnaissance_decision_desc: "派出侦察队收集宣称边境附近的即时军事信息。"
 dm_claim_border_reconnaissance_tooltip: "§R消耗：200 人力§!\n§G+5 陆军传统§!\n§R冷却：1 年§!"

