l_simp_chinese:
 # 启动事件：选择你的目标
 dynamic_missions.1.title: "动态任务：选择你的专注方向"
 dynamic_missions.1.desc: "国家正处于十字路口。与其同时追求所有目标，我们可以将精力集中在一个雄心勃勃的目标上。这种集中的努力将带来更大的回报，但需要奉献和牺牲。\n\n我们应该专注于什么？"
 dynamic_missions.1.option_a: "发展一座伟大的城市"
 dynamic_missions.1.option_a.tooltip: "开始一项任务，将选定的城市发展到前所未有的繁荣程度。"
 dynamic_missions.1.option_c: "现在还不是时候"
 dynamic_missions.1.option_c.tooltip: "我们将继续目前的做法。"
 
 # 选择目标城市事件
 dynamic_missions.2.title: "动态任务：选择目标城市"
 dynamic_missions.2.desc: "哪座城市将获得我们的重点关注？被选中的定居点将受益于集中的资源和努力，但这将以牺牲其他地方的发展为代价。\n\n我们的目标：在5年内达到100%繁荣度，并建造至少10座新建筑。"
 dynamic_missions.2.option_a: "选择一座城市"
 dynamic_missions.2.option_a.tooltip: "选择要发展的城市。"
 dynamic_missions.2.option_b: "取消此任务"
 dynamic_missions.2.option_b.tooltip: "也许下次吧。"
 
 # 成功事件
 dynamic_missions.3.title: "动态任务：城市发展完成！"
 dynamic_missions.3.desc: "我们的专注努力已经结出硕果！目标城市取得了显著的繁荣和增长。新建筑点缀着天际线，人口繁荣昌盛。这一成功证明了集中努力的力量。"
 dynamic_missions.3.option_a: "这是我们国家的胜利！"
 dynamic_missions.3.option_a.tooltip: "该城市获得+1发展度作为奖励。"
 
 # 失败事件
 dynamic_missions.4.title: "动态任务：时间已到"
 dynamic_missions.4.desc: "尽管我们付出了努力，但我们未能在规定时间内实现雄心勃勃的目标。这座城市确实有所改善，但没有达到我们希望的程度。也许采用不同的方法，或者有更多的时间，我们可能会成功。"
 dynamic_missions.4.option_a: "我们将再次尝试"
 dynamic_missions.4.option_a.tooltip: "从这次经历中吸取教训，选择一个新目标。"
 
 # Situation名称和描述
 develop_city_situation: "城市发展任务"
 develop_city_situation_desc: "专注于将选定的城市发展到最大繁荣度的努力。"
 
 # Situation提示
 dynamic_missions.situation.target_city_tooltip: "§G目标城市§! - 发展努力的重点"
 dynamic_missions.situation.legend_target: "目标城市"
 dynamic_missions.situation.legend_other_cities: "其他城市"
 
 # 玩家行动
 dm_convene_builders: "召集建筑工人"
 dm_convene_builders_desc: "从全国各地召集建筑工人，专注于目标城市。"
 dm_convene_builders.allow.tooltip: "需要没有激活的冷却时间。"
 dm_convene_builders.effect.tooltip: "§Y-50%§!全局建设速度，目标城市§G+100%§!建设速度，持续1年。\n§R冷却时间：1年§!"
 
 dm_public_works: "民生工程计划"
 dm_public_works_desc: "大力投资基础设施和公共设施以提高繁荣度。"
 dm_public_works.allow.tooltip: "需要500 £gold且没有激活的冷却时间。"
 dm_public_works.effect.tooltip: "花费500 £gold，目标城市获得§G+1%月度繁荣度§!，持续1年。\n§R冷却时间：1年§!"
 
 dm_demand_contributions: "要求其他城市贡献"
 dm_demand_contributions_desc: "要求其他城市为发展工作贡献资源。"
 dm_demand_contributions.allow.tooltip: "需要没有激活的冷却时间。"
 dm_demand_contributions.effect.tooltip: "所有其他城市：§R-10%控制力§!\n目标城市：§G+100%最大控制力上限§!，持续1年。\n§R冷却时间：1年§!"
 
 # 附属国行动
 dm_steal_progress: "窃取发展资源"
 dm_steal_progress_desc: "秘密转移原本用于宗主国项目的资源到我们自己的首都。"
 dm_steal_progress.allow.tooltip: "需要不忠诚且没有激活的冷却时间。"
 dm_steal_progress.effect.tooltip: "目标城市：§R-1%月度繁荣度§!\n你的首都：§G+1%月度繁荣度§!，持续1年。\n§R冷却时间：1年§!\n§Y你的宗主国将收到通知！§!"
 
 dm_contribute_development: "为发展做出贡献"
 dm_contribute_development_desc: "自愿从我们的首都贡献资源以帮助宗主国的项目。"
 dm_contribute_development.allow.tooltip: "需要忠诚且没有激活的冷却时间。"
 dm_contribute_development.effect.tooltip: "目标城市：§G+1%月度繁荣度§!\n你的首都：§R-1%月度繁荣度§!，持续1年。\n§R冷却时间：1年§!\n§Y你的宗主国将收到通知！§!"
 
 # Modifier名称
 dm_global_construction_penalty: "建筑工人已召集"
 dm_global_construction_penalty_desc: "我们的建筑工人已被召集专注于一个特定项目。"
 
 dm_target_construction_bonus: "集中建设努力"
 dm_target_construction_bonus_desc: "来自全国各地的建筑工人在这里不知疲倦地工作。"
 
 dm_prosperity_boost: "民生工程计划"
 dm_prosperity_boost_desc: "对基础设施和公共设施的重大投资。"
 
 dm_control_penalty: "资源已转移"
 dm_control_penalty_desc: "资源已被转移到另一座城市的发展。"
 
 dm_control_cap_bonus: "集中管理权力"
 dm_control_cap_bonus_desc: "行政重点已集中在这座城市。"
 
 dm_prosperity_drain: "资源被窃取"
 dm_prosperity_drain_desc: "一个不忠诚的附属国正在秘密转移发展资源。"
 
 dm_prosperity_gain: "窃取的资源"
 dm_prosperity_gain_desc: "从宗主国项目转移的资源使我们受益。"
 
 dm_prosperity_contribution: "附属国贡献"
 dm_prosperity_contribution_desc: "一个忠诚的附属国为我们的发展贡献资源。"
 
 dm_prosperity_sacrifice: "已贡献的资源"
 dm_prosperity_sacrifice_desc: "我们为宗主国的发展项目贡献资源。"
