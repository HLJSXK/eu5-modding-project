 dm_increased_funding_modifier: "科研经费增加"
 dm_increased_funding_modifier_desc: "当前大型科研项目获得了额外资金。"

 dm_encourage_migration_modifier: "鼓励迁徙中"
 dm_encourage_migration_modifier_desc: "国家政策正在引导人口向目标地点迁移。"

 dm_encourage_proselytization_modifier: "鼓励传教中"
