 dm_requisition_materials_modifier: "征调建设材料中"
 dm_requisition_materials_modifier_desc: "资源正在被重定向用于城市建设任务。"

 dm_migration_boost: "迁徙加成"
 dm_migration_boost_desc: "任务效果：提升该地点的迁徙吸引与速度。"

 dm_conversion_boost: "转化加成"
 dm_conversion_boost_desc: "任务效果：提升该地点的宗教转化效率。"

 dm_assimilation_boost: "同化加成"
 dm_assimilation_boost_desc: "任务效果：提升该地点的文化同化效率。"

 dm_governor_control_bonus: "总督控制加成"
 dm_governor_control_bonus_desc: "迁移清理阶段保留的兼容修正。"

 dm_country_pearl: "国家明珠"
 dm_country_pearl_desc: "建立新城市任务成功后的永久奖励。"

 dm_claim_province_active: "宣称任务进行中"
 dm_claim_province_active_desc: "宣称任务目标已设定，正在追踪进度。"

 dm_border_reconnaissance_cooldown: "边境侦察冷却"
 dm_border_reconnaissance_cooldown_desc: "侦察队正在整编，暂时无法再次执行侦察。"

 dm_fabricated_legitimacy: "伪造合法性"
 dm_fabricated_legitimacy_desc: "迁移清理阶段保留的兼容修正。"

 dm_incited_panic_province: "煽动恐慌"
 dm_incited_panic_province_desc: "迁移清理阶段保留的兼容修正。"

