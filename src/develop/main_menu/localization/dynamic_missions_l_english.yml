 DM_PANEL_TITLE: "Dynamic Missions"
 DM_PANEL_IDLE_TITLE: "Status: Idle"
 DM_PANEL_MISSION_ACTIVE_TITLE: "Status: Mission Active"
 DM_PANEL_IDLE_DESC: "No active mission. Wait for the mission picker event, then select one mission."
 DM_PANEL_MISSION_HINT_DEVELOP: "Develop City mission active. Watch mission flags, month counter, and target-related variables."
 DM_PANEL_MISSION_HINT_RESEARCH: "Large Research mission active. Main intermediate variable: dm_research_progress."
 DM_PANEL_MISSION_HINT_ESTABLISH: "Establish New City mission active. Track mission flag, month counter, and decision toggles."
 DM_PANEL_MISSION_HINT_CLAIM: "Claim Province mission active. Track mission flag, month counter, and claim-related state."
