 DM_PANEL_PROGRESS_TITLE: "Mission Progress"
 DM_PANEL_ACTIONS_TITLE: "Available Actions"
 DM_PANEL_MONTHS_ELAPSED: "Months Elapsed"
 DM_PANEL_TIME_LIMIT: "Time Limit (months)"
 DM_PANEL_PROGRESS_LABEL: "Progress"
 DM_PANEL_GOAL_LABEL: "Goal"
 DM_PANEL_PROSPERITY_TARGET: "Prosperity Target"

 # Mission action hints (shown in actions card body)
 DM_RESEARCH_ACTION_HINT: "§YIncrease Research Funding§! (Decisions panel)\nWhen active, adds +2 research progress per month. Costs court spending."
 DM_URBANIZE_ACTION_HINT: "§YInvest in Urban Development§! (Decisions panel)\nWhen active, boosts capital prosperity and development each month. Costs court spending."
 DM_CLAIM_ACTION_HINT: "§YConduct Border Reconnaissance§! (Decisions panel)\nCosts 200 manpower. Grants +5 army tradition. 1-year cooldown."
