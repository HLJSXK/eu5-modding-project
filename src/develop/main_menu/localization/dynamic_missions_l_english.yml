l_english:
 # =============================================================================
 # UNIFIED SITUATION
 # =============================================================================
 dynamic_missions_situation: "Dynamic Missions"
 dynamic_missions_situation_desc: "Unified mission manager panel for debugging dynamic mission state."

 # =============================================================================
 # MISSION PICKER
 # =============================================================================
 dynamic_missions.1.title: "Dynamic Missions: Choose Your Focus"
 dynamic_missions.1.desc: "We can focus national effort on one mission at a time. During this debug phase, only core mission flow is enabled."
 dynamic_missions.1.option_a: "Develop the capital"
 dynamic_missions.1.option_a.tt: "Directly set the capital as mission target and push it toward full prosperity."
 dynamic_missions.1.option_b: "Launch a large research project"
 dynamic_missions.1.option_b.tt: "Start a time-limited research mission with progress tracking."
 dynamic_missions.1.option_c: "Not now"
 dynamic_missions.1.option_c.tt: "Skip mission selection for now."
 dynamic_missions.1.option_d: "Promote urbanization"
 dynamic_missions.1.option_d.tt: "Invest in the capital to raise its prosperity and elevate it to the next rank."
 dynamic_missions.1.option_e: "Claim a neighboring province"
 dynamic_missions.1.option_e.tt: "Launch a simplified claim mission against a neighboring foreign location."

 # =============================================================================
 # DEVELOP CITY
 # =============================================================================
 dynamic_missions.2.title: "Develop City: Select Target"
 dynamic_missions.2.desc: "Select how to choose the development target. This simplified version supports capital-first or automatic selection."
 dynamic_missions.2.option_a: "Use capital (if valid)"
 dynamic_missions.2.option_a.tt: "Use the capital as target if it is a valid city/town below full prosperity."
 dynamic_missions.2.option_b: "Auto-select a valid city/town"
 dynamic_missions.2.option_b.tt: "Automatically pick one eligible owned location."
 dynamic_missions.2.option_c: "Cancel mission setup"
 dynamic_missions.2.option_c.tt: "Do not start this mission."

 dynamic_missions.3.title: "Develop City: Success"
 dynamic_missions.3.desc: "The target location has reached the required prosperity level."
 dynamic_missions.3.option_a: "Excellent"
 dynamic_missions.3.option_a.tt: "Gain +5 prestige."

 dynamic_missions.4.title: "Develop City: Failed"
 dynamic_missions.4.desc: "The mission timer expired before reaching the prosperity requirement."
 dynamic_missions.4.option_a: "We will try again"
 dynamic_missions.4.option_a.tt: "Mission state is cleared."

 # =============================================================================
 # LARGE RESEARCH PROJECT
 # =============================================================================
 dynamic_missions.23.title: "Large Research Project: Success"
 dynamic_missions.23.desc: "Research progress reached the target threshold in time."
 dynamic_missions.23.option_a: "A major breakthrough"

 dynamic_missions.24.title: "Large Research Project: Failed"
 dynamic_missions.24.desc: "The mission expired before sufficient research progress was accumulated."
 dynamic_missions.24.option_a: "Document the lessons learned"

 # =============================================================================
 # PROMOTE URBANIZATION
 # =============================================================================
 dynamic_missions.33.title: "Urbanization: Success"
 dynamic_missions.33.desc: "The capital's prosperity has flourished. The settlement grows to the next rank."
 dynamic_missions.33.option_a: "The city rises"
 dynamic_missions.33.option_a.tt: "Capital rank is elevated by one tier. Gains the Urbanization Legacy modifier for 20 years."

 dynamic_missions.34.title: "Urbanization: Failed"
 dynamic_missions.34.desc: "Time ran out before the capital reached the required prosperity threshold."
 dynamic_missions.34.option_a: "We will try again"
 dynamic_missions.34.option_a.tt: "Mission state is cleared."

 # =============================================================================
 # CLAIM PROVINCE MISSION
 # =============================================================================
 dynamic_missions.40.title: "Claim Province: Prepare Claim"
 dynamic_missions.40.desc: "We can now formally press a claim beyond our border. The system will automatically select a neighboring foreign location as the target."
 dynamic_missions.40.option_a: "Proceed and select target"
 dynamic_missions.40.option_a.tt: "Continue — a neighboring foreign location will be chosen automatically."
 dynamic_missions.40.option_b: "Cancel this mission"
 dynamic_missions.40.option_b.tt: "Abort the claim process and return."

 dynamic_missions.41.title: "Claim Province: Confirm Target"
 dynamic_missions.41.desc: "A candidate neighboring foreign location has been identified. Confirming will start a 5-year claim mission timer."
 dynamic_missions.41.option_province: "Start claim mission on selected target"
 dynamic_missions.41.option_province.tt: "Set this location as the claim target and begin mission tracking."
 dynamic_missions.41.option_cancel: "Cancel this mission"
 dynamic_missions.41.option_cancel.tt: "Abort and clean up the claim setup."

 dynamic_missions.50.title: "Claim Mission: Success"
 dynamic_missions.50.desc: "The claimed target location is now under our control. Mission objective completed within the time limit."
 dynamic_missions.50.option_a: "The claim is secured"
 dynamic_missions.50.option_a.tt: "§GGain 10 prestige§!"

 dynamic_missions.51.title: "Claim Mission: Failed"
 dynamic_missions.51.desc: "The mission time limit expired before we could take control of the claimed target."
 dynamic_missions.51.option_a: "We must adjust our strategy"
 dynamic_missions.51.option_a.tt: "§RLose 10 prestige§!"

 # =============================================================================
 # DECISIONS (ACTIVE CORE SET)
 # =============================================================================
 dm_invest_urbanization_decision: "Invest in Urban Development"
 dm_invest_urbanization_decision_desc: "Toggle state investment in the capital's urbanization. Costs court spending; improves local prosperity and development."

 dm_increase_research_funding_decision: "Increase Research Funding"
 dm_increase_research_funding_decision_desc: "Toggle additional funding to accelerate research mission progress."

 dm_claim_border_reconnaissance_decision: "Conduct Border Reconnaissance"
 dm_claim_border_reconnaissance_decision_desc: "Send scouts to gather immediate military intelligence near the claimed border."
 dm_claim_border_reconnaissance_tooltip: "§RCost: 200 manpower§!\n§G+5 army tradition§!\n§RCooldown: 1 year§!"

 # =============================================================================
 # MODIFIERS
 # =============================================================================
 STATIC_MODIFIER_NAME_dm_increased_funding_modifier: "Increased Research Funding"
 STATIC_MODIFIER_DESC_dm_increased_funding_modifier: "Adds §G+2§! research progress per month while active (on top of the base +1/month)."

 STATIC_MODIFIER_NAME_dm_migration_boost: "Migration Boost"
 STATIC_MODIFIER_DESC_dm_migration_boost: "The capital is attracting settlers."

 STATIC_MODIFIER_NAME_dm_urbanization_investment_active: "Urban Investment Active"
 STATIC_MODIFIER_DESC_dm_urbanization_investment_active: "The state is actively funding urban development."

 STATIC_MODIFIER_NAME_dm_urbanization_investment_bonus: "Urban Investment"
 STATIC_MODIFIER_DESC_dm_urbanization_investment_bonus: "State investment is accelerating local prosperity and development."

 STATIC_MODIFIER_NAME_dm_urbanization_legacy: "Urbanization Legacy"
 STATIC_MODIFIER_DESC_dm_urbanization_legacy: "The capital's growth has attracted a wave of settlers."

 STATIC_MODIFIER_NAME_dm_claim_province_active: "Claim Mission Active"
 STATIC_MODIFIER_DESC_dm_claim_province_active: "A claim mission target has been set and is being tracked."

 STATIC_MODIFIER_NAME_dm_border_reconnaissance_cooldown: "Border Reconnaissance Cooldown"
 STATIC_MODIFIER_DESC_dm_border_reconnaissance_cooldown: "Scouts are regrouping and cannot conduct another reconnaissance yet."

 STATIC_MODIFIER_NAME_dm_fabricated_legitimacy: "Fabricated Legitimacy"
 STATIC_MODIFIER_DESC_dm_fabricated_legitimacy: "Compatibility placeholder."

 STATIC_MODIFIER_NAME_dm_incited_panic_province: "Incited Panic"
 STATIC_MODIFIER_DESC_dm_incited_panic_province: "Compatibility placeholder."

 # Toggle button state labels
 DM_STATUS_ACTIVE: "§G● Active§!"
 DM_STATUS_INACTIVE: "§Y○ Inactive§!"

 # =============================================================================
 # GUI PANEL
 # =============================================================================
 DM_PANEL_TITLE: "Dynamic Missions"
 DM_PANEL_IDLE_TITLE: "Status: Idle"
 DM_PANEL_IDLE_DESC: "No active mission. Wait for the mission picker event to appear, then select one mission to begin."

 # Mission names (used in header subtitle and description card)
 DM_DEVELOP_NAME: "Develop City"
 DM_RESEARCH_NAME: "Large Research Project"
 DM_URBANIZE_NAME: "Promote Urbanization"
 DM_CLAIM_NAME: "Claim Province"

 # Mission description hints (shown in description card body)
 DM_DEVELOP_HINT: "Develop the capital into a prosperous city. Goal: capital prosperity reaches 100. Time limit: 60 months. Success grants +5 prestige."
 DM_RESEARCH_HINT: "Drive a major research initiative. Progress increases by 1 each month; the funding decision adds +2. Reach 100 to succeed (+10 prestige). Timeout costs 5 prestige."
 DM_URBANIZE_HINT: "Accelerate capital urbanization. When capital prosperity reaches 75, the capital advances one rank and gains the Urbanization Legacy modifier for 20 years. Time limit: 120 months."
 DM_CLAIM_HINT: "Claim a neighboring foreign province. Take ownership of the target location within 60 months to succeed (+10 prestige). Failure costs 10 prestige."

