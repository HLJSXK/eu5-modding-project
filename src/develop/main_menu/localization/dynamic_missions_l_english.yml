l_english:
 # =============================================================================
 # UNIFIED SITUATION
 # =============================================================================
 dynamic_missions_situation: "Dynamic Missions"
 dynamic_missions_situation_desc: "Unified mission manager panel for debugging dynamic mission state."

 # =============================================================================
 # MISSION PICKER
 # =============================================================================
 dynamic_missions.1.title: "Dynamic Missions: Choose Your Focus"
 dynamic_missions.1.desc: "We can focus national effort on one mission at a time. During this debug phase, only core mission flow is enabled."
 dynamic_missions.1.option_a: "Develop a city"
 dynamic_missions.1.option_a.tooltip: "Pick a city or town and push it toward full prosperity."
 dynamic_missions.1.option_b: "Launch a large research project"
 dynamic_missions.1.option_b.tooltip: "Start a time-limited research mission with progress tracking."
 dynamic_missions.1.option_c: "Not now"
 dynamic_missions.1.option_c.tooltip: "Skip mission selection for now."
 dynamic_missions.1.option_d: "Establish a new city"
 dynamic_missions.1.option_d.tooltip: "Choose a town and attempt to elevate it to city rank."

 # =============================================================================
 # DEVELOP CITY
 # =============================================================================
 dynamic_missions.2.title: "Develop City: Select Target"
 dynamic_missions.2.desc: "Select how to choose the development target. This simplified version supports capital-first or automatic selection."
 dynamic_missions.2.option_a: "Use capital (if valid)"
 dynamic_missions.2.option_a.tooltip: "Use the capital as target if it is a valid city/town below full prosperity."
 dynamic_missions.2.option_b: "Auto-select a valid city/town"
 dynamic_missions.2.option_b.tooltip: "Automatically pick one eligible owned location."
 dynamic_missions.2.option_c: "Cancel mission setup"
 dynamic_missions.2.option_c.tooltip: "Do not start this mission."

 dynamic_missions.3.title: "Develop City: Success"
 dynamic_missions.3.desc: "The target location has reached the required prosperity level."
 dynamic_missions.3.option_a: "Excellent"
 dynamic_missions.3.option_a.tooltip: "Target location gains +1 development."

 dynamic_missions.4.title: "Develop City: Failed"
 dynamic_missions.4.desc: "The mission timer expired before reaching the prosperity requirement."
 dynamic_missions.4.option_a: "We will try again"
 dynamic_missions.4.option_a.tooltip: "Mission state is cleared."

 # =============================================================================
 # LARGE RESEARCH PROJECT
 # =============================================================================
 dynamic_missions.23.title: "Large Research Project: Success"
 dynamic_missions.23.desc: "Research progress reached the target threshold in time."
 dynamic_missions.23.option_a: "A major breakthrough"

 dynamic_missions.24.title: "Large Research Project: Failed"
 dynamic_missions.24.desc: "The mission expired before sufficient research progress was accumulated."
 dynamic_missions.24.option_a: "Document the lessons learned"

 # =============================================================================
 # ESTABLISH NEW CITY
 # =============================================================================
 dynamic_missions.30.title: "Establish New City: Select Target Town"
 dynamic_missions.30.desc: "Choose a town to develop into a city. This mission uses a long timer and simple debug-friendly support actions."
 dynamic_missions.30.option_capital: "Use capital (if town)"
 dynamic_missions.30.option_capital.tooltip: "Select capital if it is a town."
 dynamic_missions.30.option_first_town: "Auto-select an eligible town"
 dynamic_missions.30.option_first_town.tooltip: "Automatically pick one eligible town."
 dynamic_missions.30.option_cancel: "Cancel mission setup"
 dynamic_missions.30.option_cancel.tooltip: "Do not start this mission."

 dynamic_missions.33.title: "Establish New City: Success"
 dynamic_missions.33.desc: "The target town has reached city rank."
 dynamic_missions.33.option_a: "A new city rises"
 dynamic_missions.33.option_a.tooltip: "The target gains a permanent city-pearl modifier."

 dynamic_missions.34.title: "Establish New City: Failed"
 dynamic_missions.34.desc: "The mission timer expired before the target reached city rank."
 dynamic_missions.34.option_a: "End this attempt"
 dynamic_missions.34.option_a.tooltip: "Mission state is cleared."

 # =============================================================================
 # DECISIONS (ACTIVE CORE SET)
 # =============================================================================
 dm_encourage_migration_decision: "Encourage Migration"
 dm_encourage_migration_decision_desc: "Toggle migration support for the active establish-city target."

 dm_encourage_proselytization_decision: "Encourage Proselytization"
 dm_encourage_proselytization_decision_desc: "Toggle religious conversion support for the active establish-city target."

 dm_encourage_folk_culture_decision: "Encourage Folk Culture"
 dm_encourage_folk_culture_decision_desc: "Toggle assimilation support for the active establish-city target."

 dm_requisition_materials_decision: "Requisition Development Materials"
 dm_requisition_materials_decision_desc: "Toggle national requisition support for the establish-city mission."

 dm_increase_research_funding_decision: "Increase Research Funding"
 dm_increase_research_funding_decision_desc: "Toggle additional funding to accelerate research mission progress."

 # =============================================================================
 # MODIFIERS (ACTIVE + LEGACY PLACEHOLDERS STILL IN STATIC FILE)
 # =============================================================================
 dm_increased_funding_modifier: "Increased Research Funding"
 dm_increased_funding_modifier_desc: "Additional funding is allocated to the active large research project."

 dm_encourage_migration_modifier: "Encouraging Migration"
 dm_encourage_migration_modifier_desc: "National policy supports migration toward the target location."

 dm_encourage_proselytization_modifier: "Encouraging Proselytization"
 dm_encourage_proselytization_modifier_desc: "National policy supports conversion in the target location."

 dm_encourage_folk_culture_modifier: "Encouraging Folk Culture"
 dm_encourage_folk_culture_modifier_desc: "National policy supports assimilation in the target location."

 dm_requisition_materials_modifier: "Requisitioning Materials"
 dm_requisition_materials_modifier_desc: "Resources are redirected to support city-establishment work."

 dm_migration_boost: "Migration Boost"
 dm_migration_boost_desc: "Mission effect improving migration flow toward this location."

 dm_conversion_boost: "Conversion Boost"
 dm_conversion_boost_desc: "Mission effect improving conversion in this location."

 dm_assimilation_boost: "Assimilation Boost"
 dm_assimilation_boost_desc: "Mission effect improving assimilation in this location."

 dm_governor_control_bonus: "Governor Control Bonus"
 dm_governor_control_bonus_desc: "Legacy placeholder modifier kept during migration cleanup."

 dm_country_pearl: "Country Pearl"
 dm_country_pearl_desc: "Permanent reward granted for successful city-establishment mission."

