l_english:
 # =============================================================================
 # UNIFIED SITUATION
 # =============================================================================
 dynamic_missions_situation: "Dynamic Missions"
 dynamic_missions_situation_desc: "Unified mission manager panel for debugging dynamic mission state."

 # =============================================================================
 # MISSION PICKER
 # =============================================================================
 dynamic_missions.1.title: "Dynamic Missions: Choose Your Focus"
 dynamic_missions.1.desc: "We can focus national effort on one mission at a time. During this debug phase, only core mission flow is enabled."
 dynamic_missions.1.option_a: "Develop the capital"
 dynamic_missions.1.option_a.tooltip: "Directly set the capital as mission target and push it toward full prosperity."
 dynamic_missions.1.option_b: "Launch a large research project"
 dynamic_missions.1.option_b.tooltip: "Start a time-limited research mission with progress tracking."
 dynamic_missions.1.option_c: "Not now"
 dynamic_missions.1.option_c.tooltip: "Skip mission selection for now."
 dynamic_missions.1.option_d: "Promote urbanization"
 dynamic_missions.1.option_d.tooltip: "Invest in the capital to raise its prosperity and elevate it to the next rank."

 # =============================================================================
 # DEVELOP CITY
 # =============================================================================
 dynamic_missions.2.title: "Develop City: Select Target"
 dynamic_missions.2.desc: "Select how to choose the development target. This simplified version supports capital-first or automatic selection."
 dynamic_missions.2.option_a: "Use capital (if valid)"
 dynamic_missions.2.option_a.tooltip: "Use the capital as target if it is a valid city/town below full prosperity."
 dynamic_missions.2.option_b: "Auto-select a valid city/town"
 dynamic_missions.2.option_b.tooltip: "Automatically pick one eligible owned location."
 dynamic_missions.2.option_c: "Cancel mission setup"
 dynamic_missions.2.option_c.tooltip: "Do not start this mission."

 dynamic_missions.3.title: "Develop City: Success"
 dynamic_missions.3.desc: "The target location has reached the required prosperity level."
 dynamic_missions.3.option_a: "Excellent"
 dynamic_missions.3.option_a.tooltip: "Gain +5 prestige."

 dynamic_missions.4.title: "Develop City: Failed"
 dynamic_missions.4.desc: "The mission timer expired before reaching the prosperity requirement."
 dynamic_missions.4.option_a: "We will try again"
 dynamic_missions.4.option_a.tooltip: "Mission state is cleared."

 # =============================================================================
 # LARGE RESEARCH PROJECT
 # =============================================================================
 dynamic_missions.23.title: "Large Research Project: Success"
 dynamic_missions.23.desc: "Research progress reached the target threshold in time."
 dynamic_missions.23.option_a: "A major breakthrough"

 dynamic_missions.24.title: "Large Research Project: Failed"
 dynamic_missions.24.desc: "The mission expired before sufficient research progress was accumulated."
 dynamic_missions.24.option_a: "Document the lessons learned"

 # =============================================================================
 # PROMOTE URBANIZATION
 # =============================================================================
 dynamic_missions.33.title: "Urbanization: Success"
 dynamic_missions.33.desc: "The capital's prosperity has flourished. The settlement grows to the next rank."
 dynamic_missions.33.option_a: "The city rises"
 dynamic_missions.33.option_a.tooltip: "Capital rank is elevated by one tier. Gains the Urbanization Legacy modifier for 20 years."

 dynamic_missions.34.title: "Urbanization: Failed"
 dynamic_missions.34.desc: "Time ran out before the capital reached the required prosperity threshold."
 dynamic_missions.34.option_a: "We will try again"
 dynamic_missions.34.option_a.tooltip: "Mission state is cleared."

 # =============================================================================
 # DECISIONS (ACTIVE CORE SET)
 # =============================================================================
 dm_invest_urbanization_decision: "Invest in Urban Development"
 dm_invest_urbanization_decision_desc: "Toggle state investment in the capital's urbanization. Costs court spending; improves local prosperity and development."

 dm_increase_research_funding_decision: "Increase Research Funding"
 dm_increase_research_funding_decision_desc: "Toggle additional funding to accelerate research mission progress."

 # =============================================================================
 # MODIFIERS
 # =============================================================================
 dm_increased_funding_modifier: "Increased Research Funding"
 dm_increased_funding_modifier_desc: "Additional funding is allocated to the active large research project."

 dm_migration_boost: "Migration Boost"
 dm_migration_boost_desc: "The capital is attracting settlers. Migration attraction and speed are improved."

 dm_urbanization_investment_active: "Urban Investment Active"
 dm_urbanization_investment_active_desc: "The state is actively funding urban development. Court spending is increased."

 dm_urbanization_investment_bonus: "Urban Investment"
 dm_urbanization_investment_bonus_desc: "State investment is accelerating local prosperity and development."

 dm_urbanization_legacy: "Urbanization Legacy"
 dm_urbanization_legacy_desc: "The capital's growth has attracted a wave of settlers. Migration attraction, migration speed, and monthly prosperity are all improved."

 # =============================================================================
 # GUI PANEL (DEBUG-FIRST)
 # =============================================================================
 DM_PANEL_TITLE: "Dynamic Missions"
 DM_PANEL_IDLE_TITLE: "Status: Idle"
 DM_PANEL_MISSION_ACTIVE_TITLE: "Status: Mission Active"
 DM_PANEL_IDLE_DESC: "No active mission. Wait for the mission picker event, then select one mission."
 DM_PANEL_MISSION_HINT_DEVELOP: "Develop City mission active. Watch mission flags, month counter, and target-related variables."
 DM_PANEL_MISSION_HINT_RESEARCH: "Large Research mission active. Main intermediate variable: dm_research_progress."
 DM_PANEL_MISSION_HINT_ESTABLISH: "Promote Urbanization mission active. Capital prosperity target: 75. Track mission flag, month counter, and investment decision."
 DM_PANEL_MISSION_HINT_CLAIM: "Claim Province mission active. Track mission flag, month counter, and claim-related state."
 DM_PANEL_DEBUG_BLOCK_TITLE: "Debug Variables (Player Scope)"
 DM_PANEL_DEBUG_LINE_MISSION_TYPE: "dm_gui_mission_type = [Player.MakeScope.GetVariable('dm_gui_mission_type').GetValue|0]"
 DM_PANEL_DEBUG_LINE_ACTIVE: "dm_active_mission = [Player.MakeScope.GetVariable('dm_active_mission').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_DEVELOP: "dm_mission_develop_city = [Player.MakeScope.GetVariable('dm_mission_develop_city').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_RESEARCH: "dm_mission_large_research = [Player.MakeScope.GetVariable('dm_mission_large_research').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_ESTABLISH: "dm_mission_promote_urbanization = [Player.MakeScope.GetVariable('dm_mission_promote_urbanization').GetValue|0]"
 DM_PANEL_DEBUG_LINE_FLAG_CLAIM: "dm_mission_claim_province = [Player.MakeScope.GetVariable('dm_mission_claim_province').GetValue|0]"
 DM_PANEL_DEBUG_LINE_MONTHS: "dm_months_elapsed = [Player.MakeScope.GetVariable('dm_months_elapsed').GetValue|0]"
 DM_PANEL_DEBUG_LINE_RESEARCH_PROGRESS: "dm_research_progress = [Player.MakeScope.GetVariable('dm_research_progress').GetValue|0]"
