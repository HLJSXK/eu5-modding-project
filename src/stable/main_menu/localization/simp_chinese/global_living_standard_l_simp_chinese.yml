ip] ([situation:global_living_standard.var:gls_tribesmen_top5_value|+=2])\n\n#E 当前国家#!\n贵族: [Root.MakeScope.ScriptValue('gls_nobles_score_display')|+=2]\n教士: [Root.MakeScope.ScriptValue('gls_clergy_score_display')|+=2]\n市民: [Root.MakeScope.ScriptValue('gls_burghers_score_display')|+=2]\n平民: [Root.MakeScope.ScriptValue('gls_commoners_score_display')|+=2]\n部落民: [Root.MakeScope.ScriptValue('gls_tribesmen_score_display')|+=2]"
