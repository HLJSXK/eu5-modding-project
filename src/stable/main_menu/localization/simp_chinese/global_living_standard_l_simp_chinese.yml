 # ── GLS 分数 tooltip 标题 ────────────────────────────────────────────────
 GLS_SCORE_TT_ALL_TITLE: "全民生活水平分数"
 GLS_SCORE_TT_NOBLES_TITLE: "@nobles! 贵族生活水平分数"
 GLS_SCORE_TT_CLERGY_TITLE: "@clergy! 教士生活水平分数"
 GLS_SCORE_TT_BURGHERS_TITLE: "@burghers! 市民生活水平分数"
 GLS_SCORE_TT_COMMONERS_TITLE: "@peasants! 平民生活水平分数"
 GLS_SCORE_TT_TRIBESMEN_TITLE: "@tribesmen! 部落民生活水平分数"

 # ── GLS 分数 tooltip 正文 ────────────────────────────────────────────────
 GLS_SCORE_TT_ALL_BODY: "#Y 全民生活水平分数 #!\n\n衡量#Y所有阶层合计#!的平均经济福祉。\n\n#bold 第一步 — 各地点分阶层收入：#!\n对每个拥有的地点和每个阶层：\n  #E 阶层收入 = 税基 × (1 − 阶层税率) × 阶层份额 / 总份额#!\n  外加低管控额外收入：#E + 税基 × (1/管控 − 1)#!\n\n各阶层每pop单位权重：\n  @nobles! 贵族 ×150  @clergy! 教士 ×25  @burghers! 市民 ×20\n  @peasants! 平民 ×1  @tribesmen! 部落民 ×0.01\n  （贵族还通过农民压迫机制吸收平民的未税份额）\n\n#bold 第二步 — 地点贡献：#!\n  #E 贡献值 = 阶层收入 × 地点发展度#!\n\n#bold 第三步 — 标准化：#!\n  #E 分数 = Σ(所有贡献值) ÷ 总人口 ÷ 地点数量#!\n\n#bold 提升分数的因素：#!\n  更高的税基、更高的发展度、更低的阶层税率、更高的农民参政权。\n\n#R 每月更新。 #!"

 GLS_SCORE_TT_NOBLES_BODY: "#Y 贵族生活水平分数 #!\n\n衡量@nobles! #Y贵族阶层#!的平均经济福祉。\n\n#bold 各地点贵族收入：#!\n  #E 贵族收入 = 税基 × (1 − 贵族税率) × 有效贵族份额 / 总份额#!\n  有效贵族份额 = #E 150 × 贵族人口 + 未税平民份额#!（农民压迫将平民收入转移给贵族）\n  外加低管控额外收入：#E 税基 × (1/管控 − 1)#!\n\n#bold 地点贡献：#!\n  #E 贡献值 = 贵族收入 × 地点发展度#!\n\n#bold 标准化：#!\n  #E 分数 = Σ(贵族贡献值) ÷ 贵族人口 ÷ 地点数量#!\n\n#bold 提升分数的因素：#!\n  更低的贵族税率、更高的农民压迫程度、更多的贵族人口、更高的发展度。\n\n#R 每月更新。 #!"

 GLS_SCORE_TT_CLERGY_BODY: "#Y 教士生活水平分数 #!\n\n衡量@clergy! #Y教士阶层#!的平均经济福祉。\n\n#bold 各地点教士收入：#!\n  #E 教士收入 = 税基 × (1 − 教士税率) × 教士份额 / 总份额#!\n  教士份额 = #E 25 × 教士人口#!\n  外加低管控额外收入：#E 税基 × (1/管控 − 1)#!\n\n#bold 地点贡献：#!\n  #E 贡献值 = 教士收入 × 地点发展度#!\n\n#bold 标准化：#!\n  #E 分数 = Σ(教士贡献值) ÷ 教士人口 ÷ 地点数量#!\n\n#bold 提升分数的因素：#!\n  更低的教士税率、教士人口占比更大、更高的发展度。\n\n#R 每月更新。 #!"

 GLS_SCORE_TT_BURGHERS_BODY: "#Y 市民生活水平分数 #!\n\n衡量@burghers! #Y市民阶层#!的平均经济福祉。\n\n#bold 各地点市民收入：#!\n  #E 市民收入 = 税基 × (1 − 市民税率) × 市民份额 / 总份额#!\n  市民份额 = #E 20 × 市民人口#!\n  外加低管控额外收入：#E 税基 × (1/管控 − 1)#!\n\n#bold 地点贡献：#!\n  #E 贡献值 = 市民收入 × 地点发展度#!\n\n#bold 标准化：#!\n  #E 分数 = Σ(市民贡献值) ÷ 市民人口 ÷ 地点数量#!\n\n#bold 提升分数的因素：#!\n  更低的市民税率、更多的市民人口、更强的贸易（更高税基）、更高的发展度。\n\n#R 每月更新。 #!"

 GLS_SCORE_TT_COMMONERS_BODY: "#Y 平民生活水平分数 #!\n\n衡量@soldiers!@laborers!@peasants! #Y平民#!（士兵＋劳工＋农民）的平均经济福祉。\n\n#bold 各地点平民收入：#!\n  #E 平民收入 = 税基 × (1 − 平民税率) × 参政平民份额 / 总份额#!\n  参政平民份额 = #E 平民人口 × 农民参政权（限10%–100%）#!\n  剩余部分通过农民压迫机制转给贵族。\n  外加低管控额外收入：#E 税基 × (1/管控 − 1)#!\n\n#bold 地点贡献：#!\n  #E 贡献值 = 平民收入 × 地点发展度#!\n\n#bold 标准化：#!\n  #E 分数 = Σ(平民贡献值) ÷ (士兵+劳工+农民) ÷ 地点数量#!\n\n#bold 提升分数的因素：#!\n  更高的农民参政权、更低的平民税率、更高的发展度、更强的地方管控。\n\n#R 每月更新。 #!"

 GLS_SCORE_TT_TRIBESMEN_BODY: "#Y 部落民生活水平分数 #!\n\n衡量@tribesmen! #Y部落民#!的平均经济福祉。\n\n#bold 各地点部落民收入：#!\n  #E 部落收入 = 税基 × (1 − 部落税率) × 部落份额 / 总份额#!\n  部落份额 = #E 0.01 × 部落民人口#!（权重极低——部落民对税基贡献极少）\n  外加低管控额外收入：#E 税基 × (1/管控 − 1)#!\n  （低管控时该项相对收益更大）\n\n#bold 地点贡献：#!\n  #E 贡献值 = 部落收入 × 地点发展度#!\n\n#bold 标准化：#!\n  #E 分数 = Σ(部落贡献值) ÷ 部落民人口 ÷ 地点数量#!\n\n#bold 提升分数的因素：#!\n  更低的部落税率、更高的部落民人口占比、更高的发展度、低管控（部落民从低管控额外收入中获益较多）。\n\n#R 每月更新。 #!"
