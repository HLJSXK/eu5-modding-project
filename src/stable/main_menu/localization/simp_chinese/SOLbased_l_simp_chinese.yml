Value('local_tribesmen_gdp_display')|+2]\n千均：   [Location.MakeScope.ScriptValue('local_noble_gdp_per_capita_display')|+2]    |    [Location.MakeScope.ScriptValue('local_clergy_gdp_per_capita_display')|+2]    |    [Location.MakeScope.ScriptValue('local_burghers_gdp_per_capita_display')|+2]    |    [Location.MakeScope.ScriptValue('local_commoner_gdp_per_capita_display')|+2]    |    [Location.MakeScope.ScriptValue('local_tribesmen_gdp_per_capita_display')|+2]\n   #E ×#!          0.05    |    0.15   |    0.15   |    1.5    |    1.5\n   #E -#!                                       0.2 \n=SOL： [Location.MakeScope.ScriptValue('local_noble_sol_pressure')|+=0%]    |   [Location.MakeScope.ScriptValue('local_clergy_sol_pressure')|+=0%]   |   [Location.MakeScope.ScriptValue('local_burghers_sol_pressure')|+=0%]   |   [Location.MakeScope.ScriptValue('local_commoner_sol_pressure')|+=0%]   |   [Location.MakeScope.ScriptValue('local_tribesmen_sol_pressure')|+=0%]\n                                        <非线性映射> \n需求：  [Location.MakeScope.ScriptValue('local_noble_gdp_nonlinear_component')|+=0%]    |   [Location.MakeScope.ScriptValue('local_clergy_gdp_nonlinear_component')|+=0%]   |   [Location.MakeScope.ScriptValue('local_burghers_gdp_nonlinear_component')|+=0%]   |   [Location.MakeScope.ScriptValue('local_commoner_gdp_nonlinear_component')|+=0%]   |   [Location.MakeScope.ScriptValue('local_tribesmen_gdp_nonlinear_component')|+=0%]\n\n#E 人群进一步根据阶层积累的财富增减需求：#!\n\n存款：  [Location.MakeScope.ScriptValue('local_nobles_savings')|+0]    |    [Location.MakeScope.ScriptValue('local_clergy_savings')|+0]    |    [Location.MakeScope.ScriptValue('local_burghers_savings')|+0]    |    [Location.MakeScope.ScriptValue('local_commoner_savings')|+0]    |    [Location.MakeScope.ScriptValue('local_tribesmen_savings')|+0]\n目标：                  国家的税收和贸易收入[Location.MakeScope.ScriptValue('local_country_wealth_anchor')|+0]\n   #E ×#!          10     |     6     |     6     |     4     |     3\n  #E ≈#!        