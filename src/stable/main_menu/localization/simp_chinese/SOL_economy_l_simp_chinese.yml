 # === AE: 时代经济递增事件字符串 ===
 sol_ae.1.title: "年轻世界的重量"
 sol_ae.1.desc: "您的国家迈出了第一步，繁荣在这片土地上仍然稀缺。世界尚年轻，建设与扩张的成本依然低廉——但增长迟缓，富足尚是遥远的希望。"
 sol_ae.1.a: "前路漫漫。"

 sol_ae.2.title: "进步的代价"
 sol_ae.2.desc: "文艺复兴为艺术、贸易与国政注入了新的活力——但也带来了新的复杂性。随着生活水平提升、贸易网络深化，建设、资源开采和城市发展的成本已显著上升。您的子民期望更多，满足这些期望也需要更多投入。"
 sol_ae.2.a: "繁荣的时代需要投资。"

 sol_ae.3.title: "更广阔世界的代价"
 sol_ae.3.desc: "大发现时代开辟了新的视野，也引发了对资源的激烈争夺。随着各国争相抢占贸易路线与领土，每座矿山、农场和建筑的成本都被推高。世界变大了——它的需求也随之增大。"
 sol_ae.3.a: "扩张需要付出代价。"

 sol_ae.4.title: "动荡与攀升的成本"
 sol_ae.4.desc: "宗教与社会动荡重塑了您国家的经济结构。随着人口迁移和机构重组，维持增长所需的基础设施变得更加昂贵。进步的代价持续攀升。"
 sol_ae.4.a: "稳定有其代价。"

 sol_ae.5.title: "集权的代价"
 sol_ae.5.desc: "专制主义时代已将权力集中于您的手中，随着国家能力的提升，繁荣开始回归。然而集权统治的机器——其官僚体系、军队与野心——推高了每一项新事业的成本。国家更加富裕，但扩张如今是一项昂贵的事业。"
 sol_ae.5.a: "权力从不廉价。"

 sol_ae.6.title: "新时代的爆炸性经济"
 sol_ae.6.desc: "革命时代释放了世界从未见过的变革力量。工业化与社会动荡使扩张比以往任何时候都更加昂贵——然而这个时代的活力也创造出前所未有的繁荣。成本高昂，但回报丰厚。"
 sol_ae.6.a: "新世界需要新资源。"

