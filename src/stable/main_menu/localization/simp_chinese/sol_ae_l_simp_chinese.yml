 # SOL 时代经济递增 — 自动修正值显示名称
 AUTO_MODIFIER_NAME_sol_ae_age_1_mod: "中世纪经济（SOL-时代修正1）"
 AUTO_MODIFIER_DESC_sol_ae_age_1_mod: "年轻世界的繁荣仍然稀缺。随着经济体艰难产生盈余，每月繁荣度略有衰减。"
 AUTO_MODIFIER_NAME_sol_ae_age_2_mod: "精神的复杂性（SOL-时代修正2）"
 AUTO_MODIFIER_DESC_sol_ae_age_2_mod: "生活水平提升与贸易网络深化，推高了建设、资源开采与城市发展的成本。"
 AUTO_MODIFIER_NAME_sol_ae_age_3_mod: "竞争性扩张（SOL-时代修正3）"
 AUTO_MODIFIER_DESC_sol_ae_age_3_mod: "大发现时代的资源争夺，使各类发展成本全面攀升。"
 AUTO_MODIFIER_NAME_sol_ae_age_4_mod: "动荡年代（SOL-时代修正4）"
 AUTO_MODIFIER_DESC_sol_ae_age_4_mod: "宗教与社会动荡重塑经济结构，推高了所有基础设施的成本。"
 AUTO_MODIFIER_NAME_sol_ae_age_5_mod: "权力的机器（SOL-时代修正5）"
 AUTO_MODIFIER_DESC_sol_ae_age_5_mod: "集权统治需要更多投入，但繁荣开始回归。"
 AUTO_MODIFIER_NAME_sol_ae_age_6_mod: "工业变革（SOL-时代修正6）"
 AUTO_MODIFIER_DESC_sol_ae_age_6_mod: "革命与工业力量将成本推至峰值，但繁荣也随之激增。"

