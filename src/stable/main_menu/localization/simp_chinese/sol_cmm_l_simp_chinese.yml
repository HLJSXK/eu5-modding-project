l_simp_chinese:
 # Mod
 sol_name: "Standard of Living 生活品质需求"
 sol_desc: "Standard of Living 生活品质需求是一款面向多人游戏与深度策略爱好者的全面经济与平衡改版模组。"

 # Features (feat) Tab
 sol__feat_name: "功能模块"
 ## SOL-based pop demands (sol) Group
 sol__feat__sol_name: "基于SOL的人口需求"
 sol__feat__sol_desc: "本模组中设定人口需求随生活水平动态缩放的部分"
 sol__sol_on_name: "启用？"
 sol__sol_on_desc: "启用此功能"
 ## Anti-snowballing (as) Group
 sol__feat__as_name: "经济平衡"
 sol__feat__as_desc: "本模组中通过经济微调减缓滚雪球速度的部分"
 sol__as_on_name: "启用？"
 sol__as_on_desc: "启用此功能"
 sol__bte_name: "基础税收效率"
 sol__bte_desc: "设置国家的基础税收效率加成/惩罚。"
 sol__bte_format: "[CMMV('sol__bte')]%"
 sol__cts_name: "稳定化花费折扣"
 sol__cts_desc: "国家根据文化传统获得稳定度投资折扣，最大折扣为此值。"
 sol__cts_format: "[CMMV('sol__cts')]%"
 sol__ds_name: "外交花费调整"
 sol__ds_desc: "国家根据已使用外交容量获得外交投资加成/惩罚，最大值为此值。"
 sol__ds_format: "[CMMV('sol__ds')]%"
 sol__iwe_name: "更高的厌战"
 sol__iwe_desc: "启用后，国家在战争期间产生更高的厌战度。"
 sol__hwe_name: "更严重的厌战"
 sol__hwe_desc: "启用后，战争疲惫将严重破坏国家稳定并摧毁要塞防御。"
 sol__rwe_name: "禁止战时使用降低厌战行动"
 sol__rwe_desc: "启用后，战争期间无法使用降低战争疲惫的内阁行动。"
 sol__ae_name: "时代经济递增"
 sol__ae_desc: "启用后，建筑费用、RGO扩张费用、城市升级费用、粮食消耗及全球繁荣度将随时代推进逐步提升，每次时代更替时由事件自动应用。"
 sol__difficulty_name: "难度税收削弱"
 sol__difficulty_desc: "启用后，AI困难/极难以及玩家简单/极简难度下的税收效率加成将减半，以适配模组的税收效率数值。"
 sol__gdp_dev_name: "GDP转化发展度"
 sol__gdp_dev_desc: "启用后，每个地区每月根据当地GDP获得发展度加成。"
 ## Harsher War Consequences (hw) Group
 sol__feat__hw_name: "严苛战争后果"
 sol__feat__hw_desc: "使战争对地区产生更严重直接影响的修正"
 sol__hw_we_name: "完全被占领厌战度"
 sol__hw_we_desc: "完全被占领时的每月厌战度。原版：0.4/月。滑块值x0.1为额外叠加值（默认16 = +1.6，合计2.0/月）。设为0则与原版相同。"
 sol__hwc_name: "严苛战争后果"
 sol__hwc_desc: "启用后，封锁、围攻、占领、敌军驻扎、劫掠、掠夺及烧毁对地区产生更严重的效果。"
 sol__hfd_name: "严苛粮食需求"
 sol__hfd_desc: "启用后，冬季和征召兵役将对粮食供应和原材料产出施加更大惩罚。"
 ## Little Ice Age Mitigation (lia) Group
 sol__feat__lia_name: "小冰河期"
 sol__feat__lia_desc: "小冰河期事件强度开关"
 sol__lia_name: "小冰河期缓和"
 sol__lia_desc: "启用后，小冰河期事件（严寒、恶劣冬季、羊毛减产、渔业减少等）的惩罚将有所降低。省级缓和（歉收、白色风暴）无论此开关状态始终生效。"
 ## Location Modifiers (loc) Group
 sol__feat__loc_name: "地区修正"
 sol__feat__loc_desc: "影响地区基础属性与控制经济的修正"
 sol__lb_name: "地区基础值重平衡"
 sol__lb_desc: "启用后，每个地区的基础RGO规模减半（由原版的2降为1），且基于人口的RGO缩放幅度略微降低。"
 sol__ic_name: "低控制区建筑成本"
 sol__ic_desc: "启用后，低控制度地区的建筑费用更高（随控制度反比缩放）。注意：此开关已注册供未来使用，目前效果始终以正确控制度缩放生效。"

