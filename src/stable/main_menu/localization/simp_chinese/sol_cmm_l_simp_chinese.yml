 SOL_RWE_IS_ON_TT: "战争期间禁止消除厌战度"
 SOL_AE_IS_ON_TT: "时代经济递增已启用"
 SOL_DIFFICULTY_IS_ON_TT: "难度税收削弱已启用"
 SOL_GDP_DEV_IS_ON_TT: "GDP转化发展度功能已启用"
 SOL_HWC_IS_ON_TT: "严苛战争后果已启用"
 SOL_HFD_IS_ON_TT: "严苛粮食需求已启用"
 SOL_LIA_IS_ON_TT: "小冰河期缓和已启用"
 SOL_LB_IS_ON_TT: "地区基础值重平衡已启用"
 SOL_IC_IS_ON_TT: "低控制区建筑成本已启用"

