 # === AE: Age Escalation Event Strings ===
 sol_ae.1.title: "The Weight of a Young Economy"
 sol_ae.1.desc: "As your realm takes its first steps, prosperity is scarce across the land. The world is still young, and the costs of building and expansion remain modest — but growth is slow, and plenty is a distant hope."
 sol_ae.1.a: "The road ahead is long."

 sol_ae.2.title: "The Rising Cost of Progress"
 sol_ae.2.desc: "The Renaissance has breathed new life into art, trade, and statecraft — but it has also brought new complexity. As living standards rise and trading networks deepen, the cost of construction, resource extraction, and civic development has grown noticeably. Your subjects expect more, and more must be spent to meet those expectations."
 sol_ae.2.a: "A prosperous age demands investment."

 sol_ae.3.title: "The Price of a Wider World"
 sol_ae.3.desc: "The Age of Discovery has opened new horizons and unleashed fierce competition for resources. As nations scramble to claim trade routes and territories, the cost of every mine, farm, and building has been pushed upward. The world is larger now — and so are its demands."
 sol_ae.3.a: "Expansion comes at a price."

 sol_ae.4.title: "Upheaval and Escalating Costs"
 sol_ae.4.desc: "Religious and social upheaval has reshaped your realm's economic fabric. As populations migrate and institutions reorganize, the infrastructure required to sustain growth has become more expensive to build and maintain. The costs of progress continue to mount."
 sol_ae.4.a: "Stability has its price."

 sol_ae.5.title: "The Cost of Centralized Power"
 sol_ae.5.desc: "The Age of Absolutism has concentrated power in your hands, and prosperity begins to return as state capacity improves. Yet the machinery of centralized governance — its bureaucracies, its armies, its ambitions — drives up the cost of every new venture. The realm is wealthier, but expansion is now a costly affair."
 sol_ae.5.a: "Power is never cheap."

 sol_ae.6.title: "The Explosive Economy of a New Era"
 sol_ae.6.desc: "The Revolutionary Age has unleashed forces of transformation the world has never seen before. Industrialization and social upheaval have made expansion more costly than ever — yet this era's dynamism also generates unprecedented prosperity. The costs are steep, but so are the rewards."
 sol_ae.6.a: "A new world demands new resources."

