 # SOL Auto-modifier display names and descriptions

 ## Harsher Wars (A_SOL_harsher_wars.txt)
 AUTO_MODIFIER_NAME_sol_hw_total_occupied_we: "Total Occupation"
 AUTO_MODIFIER_DESC_sol_hw_total_occupied_we: "War exhaustion accelerates sharply when all territories are occupied by the enemy."

 ## Harsher War Consequences (SOL_harsher_war_consequences.txt)
 AUTO_MODIFIER_NAME_sol_hwc_blockade_extras: "Enemy Blockade"
 AUTO_MODIFIER_DESC_sol_hwc_blockade_extras: "Blockaded ports suffer reduced maritime presence, slower construction, and increased emigration."
 AUTO_MODIFIER_NAME_sol_hwc_siege_prosperity: "Under Siege"
 AUTO_MODIFIER_DESC_sol_hwc_siege_prosperity: "A besieged location loses prosperity at a steady flat rate rather than accelerating proportional decay."
 AUTO_MODIFIER_NAME_sol_hwc_occupied_extras: "Enemy Occupation"
 AUTO_MODIFIER_DESC_sol_hwc_occupied_extras: "Occupied locations suffer weakened control recovery, development regression, and reduced garrison growth."
 AUTO_MODIFIER_NAME_sol_hwc_hostile_troops_extras: "Hostile Forces Present"
 AUTO_MODIFIER_DESC_sol_hwc_hostile_troops_extras: "Hostile troops suppress prosperity while their foraging no longer directly damages food supplies."
 AUTO_MODIFIER_NAME_sol_hwc_raided_extras: "Recently Raided"
 AUTO_MODIFIER_DESC_sol_hwc_raided_extras: "In the aftermath of a horde raid, raw material output and food production are reduced."
 AUTO_MODIFIER_NAME_sol_hwc_razed_extras: "Recently Razed"
 AUTO_MODIFIER_DESC_sol_hwc_razed_extras: "In the aftermath of razing, raw material output and food production are reduced."
 AUTO_MODIFIER_NAME_sol_hwc_looted_prosperity: "Looted"
 AUTO_MODIFIER_DESC_sol_hwc_looted_prosperity: "A looted location loses prosperity at a steady flat rate rather than a harsher proportional decay."

 ## Harsher Food Demand (SOL_harsher_food_demand.txt)
 AUTO_MODIFIER_NAME_sol_hfd_winter_mild: "Mild Winter Hardship"
 AUTO_MODIFIER_DESC_sol_hfd_winter_mild: "Even a mild winter places additional strain on food supplies."
 AUTO_MODIFIER_NAME_sol_hfd_winter_normal: "Winter Hardship"
 AUTO_MODIFIER_DESC_sol_hfd_winter_normal: "The bitter cold sharply reduces food supply while preventing stored food from drying out."
 AUTO_MODIFIER_NAME_sol_hfd_raised_levies: "Levies Raised"
 AUTO_MODIFIER_DESC_sol_hfd_raised_levies: "Raised levies consume more food and further disrupt raw material production."

 ## Little Ice Age Mitigation (SOL_little_ice_age.txt)
 AUTO_MODIFIER_NAME_sol_lia_livestock_relief: "Little Ice Age: Livestock Relief"
 AUTO_MODIFIER_DESC_sol_lia_livestock_relief: "Mitigation measures soften the impact of the Little Ice Age on livestock output."
 AUTO_MODIFIER_NAME_sol_lia_wineries_relief: "Little Ice Age: Winery Relief"
 AUTO_MODIFIER_DESC_sol_lia_wineries_relief: "Mitigation measures soften the impact of the Little Ice Age on wine production."
 AUTO_MODIFIER_NAME_sol_lia_great_frost_relief: "Little Ice Age: Great Frost Relief"
 AUTO_MODIFIER_DESC_sol_lia_great_frost_relief: "Mitigation measures soften the worst effects of the Great Frost on food production."
 AUTO_MODIFIER_NAME_sol_lia_harsh_winters_relief: "Little Ice Age: Harsh Winter Relief"
 AUTO_MODIFIER_DESC_sol_lia_harsh_winters_relief: "Mitigation measures reduce the damage from harsh winters on food capacity and supply."
 AUTO_MODIFIER_NAME_sol_lia_wool_relief: "Little Ice Age: Wool Relief"
 AUTO_MODIFIER_DESC_sol_lia_wool_relief: "Mitigation measures partially restore raw material output reduced by the Little Ice Age."
 AUTO_MODIFIER_NAME_sol_lia_fisheries_relief: "Little Ice Age: Fishery Relief"
 AUTO_MODIFIER_DESC_sol_lia_fisheries_relief: "Mitigation measures partially restore fishing yields and food supply reduced by the Little Ice Age."

 ## Location Base Rebalance (SOL_location_base.txt)
 AUTO_MODIFIER_NAME_sol_lb_base_values_delta: "Location Base Rebalance"
 AUTO_MODIFIER_DESC_sol_lb_base_values_delta: "Base RGO size is reduced while base monthly control recovery is improved."
 AUTO_MODIFIER_NAME_sol_lb_population_delta: "Population RGO Scaling"
 AUTO_MODIFIER_DESC_sol_lb_population_delta: "Population-based RGO expansion is slightly reduced."
