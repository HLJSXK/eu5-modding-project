l_english:
 rule_SOL_pop_demand_refresh_rule: "SOL: Pop Demand Refresh Rate"
 setting_SOL_pop_demand_refresh_20: "Minimal (20/day)"
 setting_SOL_pop_demand_refresh_20_desc: "Updates exactly 20 pops' demands per day. Lowest performance impact, but demand cycles are slow and less reactive."
 setting_SOL_pop_demand_refresh_40: "Low (40/day)"
 setting_SOL_pop_demand_refresh_40_desc: "Updates exactly 40 pops' demands per day. Reduced performance load at the cost of demand update frequency."
 setting_SOL_pop_demand_refresh_60: "Moderate (60/day) (Default)"
 setting_SOL_pop_demand_refresh_60_desc: "Updates exactly 60 pops' demands per day. Balanced between performance and demand simulation accuracy."
 setting_SOL_pop_demand_refresh_80: "High (80/day)"
 setting_SOL_pop_demand_refresh_80_desc: "Updates exactly 80 pops' demands per day. More responsive demand simulation with a moderate performance cost."
 setting_SOL_pop_demand_refresh_100: "Standard (100/day)"
 setting_SOL_pop_demand_refresh_100_desc: "Updates exactly 100 pops' demands per day. Full demand realism as intended by the mod. Higher CPU load in late game."
