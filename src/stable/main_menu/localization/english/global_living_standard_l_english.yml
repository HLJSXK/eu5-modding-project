 # ── GLS score tooltip titles ─────────────────────────────────────────────
 GLS_SCORE_TT_ALL_TITLE: "All-Population SOL Score"
 GLS_SCORE_TT_NOBLES_TITLE: "@nobles! Nobles SOL Score"
 GLS_SCORE_TT_CLERGY_TITLE: "@clergy! Clergy SOL Score"
 GLS_SCORE_TT_BURGHERS_TITLE: "@burghers! Burghers SOL Score"
 GLS_SCORE_TT_COMMONERS_TITLE: "@peasants! Commoners SOL Score"
 GLS_SCORE_TT_TRIBESMEN_TITLE: "@tribesmen! Tribesmen SOL Score"

 # ── GLS score tooltip bodies ─────────────────────────────────────────────
 GLS_SCORE_TT_ALL_BODY: "#Y All-Population Living Standard Score #!\n\nMeasures the average economic welfare of #Yall social classes#! combined.\n\n#bold Step 1 — Per-location class income:#!\nFor each owned location and each class:\n  #E class_income = tax_base × (1 − class_tax_rate) × class_share / total_share#!\n  Plus income from low control: #E + tax_base × (1/control − 1)#!\n\nEstate shares by weight per pop unit:\n  @nobles! Nobles ×150  @clergy! Clergy ×25  @burghers! Burghers ×20\n  @peasants! Commoners ×1  @tribesmen! Tribesmen ×0.01\n  (Nobles also absorb untaxed commoner share via peasant oppression)\n\n#bold Step 2 — Location contribution:#!\n  #E contribution = class_income × location_development#!\n\n#bold Step 3 — Normalise:#!\n  #E score = Σ(all contributions) ÷ total_population ÷ num_locations#!\n\n#bold What raises this score:#!\n  Higher tax base, higher development, lower class tax rates, more enfranchised commoners.\n\n#R Updated every month. #!"

 GLS_SCORE_TT_NOBLES_BODY: "#Y Nobles Living Standard Score #!\n\nMeasures the average economic welfare of the @nobles! #Ynobles estate#!.\n\n#bold Per-location noble income:#!\n  #E nobles_income = tax_base × (1 − noble_tax_rate) × effective_noble_share / total_share#!\n  Effective noble share = #E 150 × nobles + untaxed_commoner_share#! (peasant oppression transfers commoner income to nobles)\n  Plus control-loss income: #E tax_base × (1/control − 1)#!\n\n#bold Location contribution:#!\n  #E contribution = nobles_income × location_development#!\n\n#bold Normalise:#!\n  #E score = Σ(noble contributions) ÷ noble_population ÷ num_locations#!\n\n#bold What raises this score:#!\n  Lower noble tax rate, higher peasant oppression, more nobles, more development.\n\n#R Updated every month. #!"

 GLS_SCORE_TT_CLERGY_BODY: "#Y Clergy Living Standard Score #!\n\nMeasures the average economic welfare of the @clergy! #Yclergy estate#!.\n\n#bold Per-location clergy income:#!\n  #E clergy_income = tax_base × (1 − clergy_tax_rate) × clergy_share / total_share#!\n  Clergy share = #E 25 × clergy_count#!\n  Plus control-loss income: #E tax_base × (1/control − 1)#!\n\n#bold Location contribution:#!\n  #E contribution = clergy_income × location_development#!\n\n#bold Normalise:#!\n  #E score = Σ(clergy contributions) ÷ clergy_population ÷ num_locations#!\n\n#bold What raises this score:#!\n  Lower clergy tax rate, larger clergy population relative to other estates, higher development.\n\n#R Updated every month. #!"

 GLS_SCORE_TT_BURGHERS_BODY: "#Y Burghers Living Standard Score #!\n\nMeasures the average economic welfare of the @burghers! #Yburghers estate#!.\n\n#bold Per-location burghers income:#!\n  #E burghers_income = tax_base × (1 − burgher_tax_rate) × burgher_share / total_share#!\n  Burgher share = #E 20 × burgher_count#!\n  Plus control-loss income: #E tax_base × (1/control − 1)#!\n\n#bold Location contribution:#!\n  #E contribution = burghers_income × location_development#!\n\n#bold Normalise:#!\n  #E score = Σ(burgher contributions) ÷ burgher_population ÷ num_locations#!\n\n#bold What raises this score:#!\n  Lower burgher tax rate, larger burgher population, stronger trade (higher tax base), more development.\n\n#R Updated every month. #!"

 GLS_SCORE_TT_COMMONERS_BODY: "#Y Commoners Living Standard Score #!\n\nMeasures the average economic welfare of @soldiers!@laborers!@peasants! #Ycommoners#! (soldiers + laborers + peasants).\n\n#bold Per-location commoner income:#!\n  #E commoner_income = tax_base × (1 − commoner_tax_rate) × enfranchised_commoner_share / total_share#!\n  Enfranchised commoner share = #E commoner_count × peasant_enfranchisement_rate#! (clamped 10%–100%)\n  The rest is transferred to nobles via peasant oppression.\n  Plus control-loss income: #E tax_base × (1/control − 1)#!\n\n#bold Location contribution:#!\n  #E contribution = commoner_income × location_development#!\n\n#bold Normalise:#!\n  #E score = Σ(commoner contributions) ÷ (soldiers+laborers+peasants) ÷ num_locations#!\n\n#bold What raises this score:#!\n  Higher peasant enfranchisement, lower commoner tax rate, more development, stronger local control.\n\n#R Updated every month. #!"

 GLS_SCORE_TT_TRIBESMEN_BODY: "#Y Tribesmen Living Standard Score #!\n\nMeasures the average economic welfare of @tribesmen! #Ytribesmen#!.\n\n#bold Per-location tribesmen income:#!\n  #E tribesmen_income = tax_base × (1 − tribe_tax_rate) × tribe_share / total_share#!\n  Tribe share = #E 0.01 × tribesmen_count#! (very low weight — tribesmen contribute minimally to tax base)\n  Plus control-loss income: #E tax_base × (1/control − 1)#!\n\n#bold Location contribution:#!\n  #E contribution = tribesmen_income × location_development#!\n\n#bold Normalise:#!\n  #E score = Σ(tribesmen contributions) ÷ tribesmen_population ÷ num_locations#!\n\n#bold What raises this score:#!\n  Lower tribe tax rate, high tribesmen population relative to other estates, higher development, low control (tribesmen benefit disproportionately from control-loss income).\n\n#R Updated every month. #!"
