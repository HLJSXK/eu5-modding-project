l_english:
 # Mod
 sol_name: "Standard of Living"
 sol_desc: "Standard of Living (SOL) is a comprehensive economy and balance overhaul mod designed for multiplayer and deep-strategy enthusiasts."

 # Features (feat) Tab
 sol__feat_name: "Features"
 ## SOL-based pop demands (sol) Group
 sol__feat__sol_name: "SOL-Pop Demands"
 sol__feat__sol_desc: "The pop demand scaling part of this mod"
 sol__sol_on_name: "Enable SOL-Pop Demands?"
 sol__sol_on_desc: "When enabled, pop demands scale with GDP per capita and the SOL situation runs its monthly computations. Disabling this master toggle pauses all computation and hides the situation."
 sol__sol_map_name: "Enable map coloring?"
 sol__sol_map_desc: "When enabled, provinces are colored by their SOL value. Disabling this saves a small amount of performance by skipping province color evaluation. Computations continue regardless."
 ## Economic Balance (as) Group
 sol__feat__as_name: "SOL-Economic Balance"
 sol__feat__as_desc: "Economic tweaks for balance — disabling this master toggle disables all sub-features."
 sol__as_on_name: "Enable SOL-Economic Balance?"
 sol__as_on_desc: "Turn on this feature. Disabling this switch disables all sub-features below."
 sol__bte_name: "Base tax efficiency"
 sol__bte_desc: "Set the base tax efficiency buff / debuff of a country."
 sol__bte_format: "[CMMV('sol__bte')]%"
 sol__ae_name: "Age economic escalation"
 sol__ae_desc: "When enabled, building costs, RGO expansion costs, city/town upgrade costs, food consumption, and global prosperity scale up with each age — applied automatically via events at each age transition."
 sol__cts_name: "Stabilization cost discount"
 sol__cts_desc: "Country receive a buff on stabilization investment according to their cultural tradition, maximum to this value."
 sol__cts_format: "[CMMV('sol__cts')]%"
 sol__ds_name: "Diplomatic cost adjustment"
 sol__ds_desc: "Country receive a buff / debuff on diplomatic investment according to used diplomatic capacity, maximum to this value."
 sol__ds_format: "[CMMV('sol__ds')]%"
 sol__difficulty_name: "Difficulty tax nerf"
 sol__difficulty_desc: "When enabled, the tax efficiency bonus granted on AI Hard/Very Hard and Player Easy/Very Easy difficulties is halved, in line with the mod's tax efficiency values."
 sol__gdp_dev_name: "GDP-to-development"
 sol__gdp_dev_desc: "When enabled, each location gains a monthly development bonus scaled by its local GDP."
 ## War Acceleration (hw) Group
 sol__feat__hw_name: "SOL-War Acceleration"
 sol__feat__hw_desc: "Modifiers that increase the pressure of war — disabling this master toggle disables all sub-features."
 sol__hw_on_name: "Enable SOL-War Acceleration?"
 sol__hw_on_desc: "Turn on this feature. Disabling this switch disables all sub-features below."
 sol__iwe_name: "Higher war exhaustion"
 sol__iwe_desc: "When enabled, country receive higher war exhaustion during wars."
 sol__hwe_name: "More severe war exhaustion"
 sol__hwe_desc: "When enabled, war exhaustion greatly destabilizes country and destroys fortress defense."
 sol__rwe_name: "Forbid reducing war exhaustion during war"
 sol__rwe_desc: "When enabled, war exhaustion reduction cabinet action cannot be used during wars."
 # Trigger localization display keys (mapped from trigger_localization/sol_cmm_triggers.txt)
 SOL_AS_IS_ON_TT: "Economic balance is enabled"
 SOL_HW_IS_ON_TT: "War acceleration is enabled"
 SOL_IWE_IS_ON_TT: "Higher war exhaustion is enabled"
 SOL_HWE_IS_ON_TT: "More severe war exhaustion is enabled"
 SOL_RWE_IS_ON_TT: "War exhaustion reduction restriction is enabled"
 SOL_AE_IS_ON_TT: "Age economic escalation is enabled"
 SOL_DIFFICULTY_IS_ON_TT: "Difficulty tax nerf is enabled"
 SOL_GDP_DEV_IS_ON_TT: "GDP-to-development bonus is enabled"
 SOL_SOL_IS_ON_TT: "SOL pop demands is enabled"
 SOL_MAP_IS_ON_TT: "SOL map coloring is enabled"
