l_english:
 # Mod
 sol_name: "Standard of Living"
 sol_desc: "Standard of Living (SOL) is a comprehensive economy and balance overhaul mod designed for multiplayer and deep-strategy enthusiasts."

 # Features (feat) Tab
 sol__feat_name: "Features"
 ## SOL-based pop demands (sol) Group
 sol__feat__sol_name: "SOL-based pop demands"
 sol__feat__sol_desc: "The pop demand scaling part of this mod"
 sol__sol_on_name: "ON?"
 sol__sol_on_desc: "Turn on this feature"
 ## Anti-snowballing (as) Group
 sol__feat__as_name: "Anti-snowballing"
 sol__feat__as_desc: "The economic tweak part of this mod"
 sol__as_on_name: "ON?"
 sol__as_on_desc: "Turn on this feature"
 sol__bte_name: "Base tax efficiency"
 sol__bte_desc: "Set the base tax efficiency buff / debuff of a country."
 sol__bte_format: "[CMMV('sol__bte')]%"
 sol__cts_name: "Stabilization cost reduction"
 sol__cts_desc: "Country receive a buff on stabilization investment according to their cultural tradition, maximum to this value."
 sol__cts_format: "[CMMV('sol__cts')]%"
 sol__ds_name: "Diplomatic cost modification"
 sol__ds_desc: "Country receive a buff / debuff on diplomatic investment according to used diplomatic capacity, maximum to this value."
 sol__ds_format: "[CMMV('sol__ds')]%"
 sol__iwe_name: "Increased war exhaustion"
 sol__iwe_desc: "When enabled, country receive higher war exhaustion during wars."
 sol__hwe_name: "Harsher war exhaustion"
 sol__hwe_desc: "When enabled, war exhaustion greatly destabilizes country and destroys fortress defense."
 sol__rwe_name: "Forbid reducing war exhaustion during war."
 sol__rwe_desc: "When enabled, war exhaustion reduction cabinet action cannot be used during wars."
 sol__ae_name: "Age escalation"
 sol__ae_desc: "When enabled, building costs, RGO expansion costs, city/town upgrade costs, food consumption, and global prosperity scale up with each age — applied automatically via events at each age transition."
 sol__difficulty_name: "Difficulty tax nerf"
 sol__difficulty_desc: "When enabled, the tax efficiency bonus granted on AI Hard/Very Hard and Player Easy/Very Easy difficulties is halved, in line with the mod's tax efficiency values."
 sol__gdp_dev_name: "GDP-to-development"
 sol__gdp_dev_desc: "When enabled, each location gains a monthly development bonus scaled by its local GDP."
 ## Harsher War Consequences (hw) Group
 sol__feat__hw_name: "Harsher War Consequences"
 sol__feat__hw_desc: "Modifiers that make the direct effects of war on locations more severe"
 sol__hw_we_name: "Total occupation WE"
 sol__hw_we_desc: "Monthly war exhaustion when totally occupied. Vanilla: 0.4/month. Slider value x0.1 = delta added on top (default 16 = +1.6, net 2.0/month). Set to 0 for vanilla."
 sol__hwc_name: "Harsher war consequences"
 sol__hwc_desc: "When enabled, blockades, sieges, occupation, hostile troops, raids, looting, and razing have harsher effects on locations."
 sol__hfd_name: "Harsher food demand"
 sol__hfd_desc: "When enabled, winter seasons and raised levies impose greater penalties on food supply and raw material output."
 ## Little Ice Age Mitigation (lia) Group
 sol__feat__lia_name: "Little Ice Age"
 sol__feat__lia_desc: "Toggles for Little Ice Age event severity"
 sol__lia_name: "Little Ice Age mitigation"
 sol__lia_desc: "When enabled, Little Ice Age events (great frost, harsh winters, reduced wool, fewer fisheries, etc.) are less punishing. Province-level mitigation (short harvest, white storm) is always active regardless of this toggle."
 ## Location Modifiers (loc) Group
 sol__feat__loc_name: "Location Modifiers"
 sol__feat__loc_desc: "Modifiers that affect base location stats and control economics"
 sol__lb_name: "Location base rebalance"
 sol__lb_desc: "When enabled, base RGO size per location is halved (1 instead of vanilla 2) and population-based RGO scaling is slightly reduced."
 sol__ic_name: "Inverse control building cost"
 sol__ic_desc: "When enabled, buildings are more expensive in low-control locations (scales with inverse control level). Note: this toggle is registered for future use; the effect is currently always active with correct control scaling."

 # Trigger localization display keys (mapped from trigger_localization/sol_cmm_triggers.txt)
 SOL_AS_IS_ON_TT: "Anti-snowballing is enabled"
 SOL_IWE_IS_ON_TT: "War exhaustion pressure is enabled"
 SOL_HWE_IS_ON_TT: "Capital siege exhaustion is enabled"
 SOL_RWE_IS_ON_TT: "War exhaustion reduction restriction is enabled"
 SOL_AE_IS_ON_TT: "Age escalation is enabled"
 SOL_DIFFICULTY_IS_ON_TT: "Difficulty tax nerf is enabled"
 SOL_GDP_DEV_IS_ON_TT: "GDP-to-development bonus is enabled"
 SOL_HWC_IS_ON_TT: "Harsher war consequences is enabled"
 SOL_HFD_IS_ON_TT: "Harsher food demand is enabled"
 SOL_LIA_IS_ON_TT: "Little Ice Age mitigation is enabled"
 SOL_LB_IS_ON_TT: "Location base rebalance is enabled"
 SOL_IC_IS_ON_TT: "Inverse control building cost is enabled"

