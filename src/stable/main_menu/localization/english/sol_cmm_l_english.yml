 SOL_AE_IS_ON_TT: "Age economic escalation is enabled"
 SOL_DIFFICULTY_IS_ON_TT: "Difficulty tax nerf is enabled"
 SOL_GDP_DEV_IS_ON_TT: "GDP-to-development bonus is enabled"
 SOL_HWC_IS_ON_TT: "More severe defeat consequences is enabled"
 SOL_HFD_IS_ON_TT: "Harsher food production is enabled"
 SOL_LIA_IS_ON_TT: "Harsher food production is enabled"
 SOL_LB_IS_ON_TT: "Fewer native ranks is enabled"
