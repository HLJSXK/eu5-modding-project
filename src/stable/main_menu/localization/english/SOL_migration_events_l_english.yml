 sol_migration.1.desc: "The Standard of Living mod has been updated to a new version.\n\nThis save was created without SOL, or with an older version. Most changes apply automatically, but some values may have been  rebalanced.\n\nPlease check the Steam Workshop changelog for details before continuing.\n\nIf you encounter any compatibility issues, please submit feedback on the Workshop, the author is highly active."
