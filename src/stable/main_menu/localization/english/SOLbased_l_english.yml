l_english:
 STATIC_MODIFIER_NAME_gdp_to_development_modifier: "Monthly local development growth from local tax potential"
 STATIC_MODIFIER_DESC_gdp_to_development_modifier: "0.002 per 100 tax potential, Update yearly."
 LOCATION_SOL_GUI_TITLE: "Standard of Living in [Location.GetNameWithNoTooltip]"
 LOCATION_SOL_GUI_SUMMARY: "[Location.GetNameWithNoTooltip] has GDP of [Location.MakeScope.ScriptValue('local_gdp')|+], this is calculated from [Location.MakeScope.ScriptValue('local_tax_base_display')|+2] tax base and [Location.MakeScope.ScriptValue('local_effective_control')|+%] control. When control is below 1%, It's calculated as 1%. Thus location with 0 control will always have 0 GDP, when control is above 1%, GDP=tax potential."
 LOCATION_SOL_GUI_BODY: "There are [Location.MakeScope.ScriptValue('local_noble_pop_display')|+0] @nobles! nobles here, due to nobles #E 0.15#! tax base factor, they take [Location.MakeScope.ScriptValue('local_nobles_tax_share')|+1] share of tax base, compared with local [Location.MakeScope.ScriptValue('local_total_tax_share')|+1] total share of tax base, nobles take [Location.MakeScope.ScriptValue('local_nobles_gdp_display')|+2] from total local GDP [Location.MakeScope.ScriptValue('local_gdp')|+2]. Therefore, GDP per 1000 nobles is [Location.MakeScope.ScriptValue('local_noble_gdp_per_capita_display')|+3]. Leading to local nobles' all demands are multiplied by [Location.MakeScope.ScriptValue('local_noble_gdp_per_capita')|+3], due to nobles #E 0.05#! scaling factor and #E 0.5#! base value.\n\nThere are [Location.MakeScope.ScriptValue('local_clergy_pop_display')|+0] @clergy! clergy here, due to clergy #E 0.025#! tax base factor, they take [Location.MakeScope.ScriptValue('local_clergy_tax_share')|+1] share of tax base, compared with local [Location.MakeScope.ScriptValue('local_total_tax_share')|+1] total share of tax base, clergy take [Location.MakeScope.ScriptValue('local_clergy_gdp_display')|+2] from total local GDP [Location.MakeScope.ScriptValue('local_gdp')|+2]. Therefore, GDP per 1000 clergy is [Location.MakeScope.ScriptValue('local_clergy_gdp_per_capita_display')|+3]. Leading to local clergy' all demands are multiplied by [Location.MakeScope.ScriptValue('local_clergy_gdp_per_capita')|+3], due to clergy #E 0.15#! scaling factor and #E 0.5#! base value.\n\nThere are [Location.MakeScope.ScriptValue('local_burghers_pop_display')|+0] @burghers! burghers here, due to burghers #E 0.02#! tax base factor, they take [Location.MakeScope.ScriptValue('local_burghers_tax_share')|+1] share of tax base, compared with local [Location.MakeScope.ScriptValue('local_total_tax_share')|+1] total share of tax base, burghers take [Location.MakeScope.ScriptValue('local_burghers_gdp_display')|+2] from total local GDP [Location.MakeScope.ScriptValue('local_gdp')|+2]. Therefore, GDP per 1000 burghers is [Location.MakeScope.ScriptValue('local_burghers_gdp_per_capita_display')|+3]. Leading to local burghers' all demands are multiplied by [Location.MakeScope.ScriptValue('local_burghers_gdp_per_capita')|+3], due to burghers #E 0.15#! scaling factor and #E 0.5#! base value.\n\nThere are [Location.MakeScope.ScriptValue('local_commoner_pop_display')|+0] @soldiers!@laborers!@peasants! commoners here, due to commoners #E 0.001#! tax base factor, they take [Location.MakeScope.ScriptValue('local_commoner_tax_share')|+1] share of tax base, compared with local [Location.MakeScope.ScriptValue('local_total_tax_share')|+1] total share of tax base, commoners take [Location.MakeScope.ScriptValue('local_commoner_gdp_display')|+2] from total local GDP [Location.MakeScope.ScriptValue('local_gdp')|+2]. Therefore, GDP per 1000 commoners is [Location.MakeScope.ScriptValue('local_commoner_gdp_per_capita_display')|+3]. Leading to local commoners' all demands are multiplied by [Location.MakeScope.ScriptValue('local_commoner_gdp_per_capita')|+3], due to commoners #E 1.5#! scaling factor and #E 0.5#! base value.\n\nThere are [Location.MakeScope.ScriptValue('local_tribesmen_pop_display')|+0] @tribesmen! triblesmen here, due to triblesmen #E 0.00001#! tax base factor, they take [Location.MakeScope.ScriptValue('local_tribesmen_tax_share')|+1] share of tax base, compared with local [Location.MakeScope.ScriptValue('local_total_tax_share')|+1] total share of tax base, triblesmen take [Location.MakeScope.ScriptValue('local_tribesmen_gdp_display')|+2] from total local GDP [Location.MakeScope.ScriptValue('local_gdp')|+2]. Therefore, GDP per 1000 triblesmen is [Location.MakeScope.ScriptValue('local_tribesmen_gdp_per_capita_display')|+3]. Leading to local triblesmen' all demands are multiplied by [Location.MakeScope.ScriptValue('local_tribesmen_gdp_per_capita_display')|+3], due to triblesmen #E 1.5#! scaling factor and #E 0.5#! base value."
 LOCATION_SOL_GUI_FOOTER: "#R Be aware that all information here are up to date. However pop demand display on market and effect on market price are not always up to date, with a delay up to 3 years. #!"



