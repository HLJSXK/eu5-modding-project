l_english:
 # =============================================================================
 # CLAIM PROVINCE MISSION LOCALIZATION
 # =============================================================================
 
 # Main Menu Option
 dynamic_missions.1.option_e: "Claim a neighboring province"
 dynamic_missions.1.option_e.tooltip: "Stake a claim on a neighboring province, creating a diplomatic crisis that may lead to war or capitulation."
 
 # Event 40: Start Claim Province Mission
 dynamic_missions.40.title: "Claim Province: Select Your Target"
 dynamic_missions.40.desc: "Our realm has grown strong enough to assert claims beyond our current borders. By formally declaring our intent to claim a neighboring province, we create a situation that must be resolved—through diplomacy, intimidation, or war.\n\nThis claim will last for 5 years, during which we may use espionage, seek support from rivals of the target nation, and prepare for potential conflict. At the end of this period, we must either press our claim through force or back down."
 dynamic_missions.40.option_a: "Select a province to claim"
 dynamic_missions.40.option_a.tooltip: "Choose which neighboring province to claim."
 dynamic_missions.40.option_b: "Cancel this mission"
 dynamic_missions.40.option_b.tooltip: "Perhaps another time."
 
 # Event 41: Select Province to Claim
 dynamic_missions.41.title: "Claim Province: Choose Your Target"
 dynamic_missions.41.desc: "Which province shall we claim? This decision will determine our adversary and the potential allies we might rally to our cause. Consider carefully—some targets may have powerful friends."
 dynamic_missions.41.option_province: "Claim [Province.GetName] from [Country.GetName]"
 dynamic_missions.41.option_province.tooltip: "Begin a 5-year claim situation against this province."
 dynamic_missions.41.option_cancel: "Cancel this mission"
 dynamic_missions.41.option_cancel.tooltip: "Return to the main menu."
 
 # Event 42: Rival Support Request (To Potential Supporter)
 dynamic_missions.42.title: "Request for Support: Claim on [Province.GetName]"
 dynamic_missions.42.desc: "[Player.GetName] has formally claimed [Province.GetName] from [Target.GetName], our rival. They seek our support in this endeavor, promising to include us in any military action that results.\n\nShould we join their cause against our mutual enemy?"
 dynamic_missions.42.option_accept: "We shall support their claim"
 dynamic_missions.42.option_accept.tooltip: "Join [Player.GetName]'s coalition. If war breaks out, we will fight alongside them."
 dynamic_missions.42.option_decline: "We must decline"
 dynamic_missions.42.option_decline.tooltip: "Refuse to support this claim."
 dynamic_missions.42.willingness_tooltip: "Our willingness to support: [support_willingness]\n\nFactors:\n• Opinion of target: [opinion_of_target]\n• Opinion of claimant: [opinion_of_player]\n• Claimant's diplomatic reputation: [diplomatic_reputation]\n• Alliance status: [alliance_bonus]"
 
 # Event 43: Rival Accepted Support (Notification to Player)
 dynamic_missions.43.title: "Support Secured: [Country.GetName] Joins Our Cause"
 dynamic_missions.43.desc: "Excellent news! [Country.GetName] has agreed to support our claim on [Province.GetName]. Should we press this claim to war, they will fight alongside us against [Target.GetName]."
 dynamic_missions.43.option_a: "Their support strengthens our position"
 dynamic_missions.43.option_a.tooltip: "[Country.GetName] added to our coalition."
 
 # Event 44: Target Seeks Rival Support (Notification to Player)
 dynamic_missions.44.title: "Warning: [Target.GetName] Seeks Allies"
 dynamic_missions.44.desc: "Our intelligence reports that [Target.GetName] is actively seeking support from our rivals in response to our claim on [Province.GetName]. They are building a defensive coalition to oppose us."
 dynamic_missions.44.option_a: "We must prepare accordingly"
 dynamic_missions.44.option_a.tooltip: "Be aware that [Target.GetName] is rallying support."
 
 # Event 45: Ultimatum - Player Decision
 dynamic_missions.45.title: "Ultimatum: Press the Claim or Back Down"
 dynamic_missions.45.desc: "Five years have passed since we first claimed [Province.GetName]. The time for diplomacy has ended—now we must decide whether to press our claim through force or back down and accept the loss of prestige.\n\n§YOur Coalition:§!\n• Our military strength: [player_strength]\n• Supporters: [player_supporters_count] nations\n• Total coalition strength: [player_coalition_strength]\n\n§YTheir Coalition:§!\n• [Target.GetName]'s military strength: [target_strength]\n• Their allies and supporters: [target_coalition_count]\n• Total coalition strength: [target_coalition_strength]\n\nIf we declare war, [Target.GetName] will decide whether to fight or surrender based on the balance of power."
 dynamic_missions.45.option_war: "Declare war and press our claim"
 dynamic_missions.45.option_war.tooltip: "We will declare war with a Claim Province casus belli, giving us -25% conquest and annexation costs for this province. All our supporters will join the war."
 dynamic_missions.45.option_backdown: "Back down and abandon the claim"
 dynamic_missions.45.option_backdown.tooltip: "§RWe lose 10 prestige§!\n§G[Target.GetName] gains 10 prestige§!"
 dynamic_missions.45.supporters_tooltip: "§YYour Supporters:§!\n[player_supporters_list]\n\n§YTheir Coalition:§!\n[target_coalition_list]"
 
 # Event 46: Ultimatum - Target Decision
 dynamic_missions.46.title: "Ultimatum from [Player.GetName]"
 dynamic_missions.46.desc: "[Player.GetName] has issued an ultimatum: surrender [Province.GetName] immediately, or face war. They have spent five years preparing for this moment, gathering allies and building their strength.\n\n§YTheir Coalition:§!\n• Total military strength: [player_coalition_strength]\n• Supporters: [player_supporters_list]\n\n§YOur Coalition:§!\n• Total military strength: [target_coalition_strength]\n• Our allies and guarantors: [target_coalition_list]\n\nThe balance of power will determine the outcome of this crisis."
 dynamic_missions.46.option_fight: "We will not surrender—prepare for war!"
 dynamic_missions.46.option_fight.tooltip: "[Player.GetName] will declare war with a Claim Province casus belli. All their supporters will join as attackers."
 dynamic_missions.46.option_surrender: "We cannot win this fight—surrender the province"
 dynamic_missions.46.option_surrender.tooltip: "§R[Province.GetName] is transferred to [Player.GetName]§!\n§RWe lose 10 prestige§!\n§G[Player.GetName] gains 10 prestige§!"
 
 # Event 47: War Declared (Notification)
 dynamic_missions.47.title: "War: The Claim is Pressed"
 dynamic_missions.47.desc: "The die is cast. [Player.GetName] has declared war on [Target.GetName] to press their claim on [Province.GetName]. All supporters on both sides have joined the conflict.\n\nThis war will determine the fate of the disputed province."
 dynamic_missions.47.option_a: "To arms!"
 dynamic_missions.47.option_a.tooltip: "The war has begun."
 
 # Event 48: Reconciliation Achieved
 dynamic_missions.48.title: "Reconciliation: Claim Withdrawn"
 dynamic_missions.48.desc: "Through patient diplomacy and mutual understanding, we have reached an accord with [Target.GetName]. Our claim on [Province.GetName] is withdrawn, and both nations agree to improve relations rather than pursue conflict."
 dynamic_missions.48.option_a: "Peace serves us better than war"
 dynamic_missions.48.option_a.tooltip: "§GBoth nations gain +20 opinion of each other§!"
 
 # Event 49: Claim Province Success
 dynamic_missions.49.title: "Victory: Province Claimed Successfully"
 dynamic_missions.49.desc: "Our claim on [Province.GetName] has been successfully pressed! The province now belongs to our realm, and our prestige has grown significantly. This victory demonstrates our strength and resolve to all who would challenge us."
 dynamic_missions.49.option_a: "A glorious addition to our realm!"
 dynamic_missions.49.option_a.tooltip: "§GWe gain 10 prestige§!\n§R[Target.GetName] loses 10 prestige§!"
 
 # Event 50: Player Backed Down
 dynamic_missions.50.title: "Retreat: Claim Abandoned"
 dynamic_missions.50.desc: "We have chosen to back down from our claim on [Province.GetName]. While this preserves peace, it comes at a cost to our prestige and reputation. Our rivals will see this as a sign of weakness."
 dynamic_missions.50.option_a: "Sometimes discretion is the better part of valor"
 dynamic_missions.50.option_a.tooltip: "§RWe lose 10 prestige§!\n§G[Target.GetName] gains 10 prestige§!"
 
 # Event 51: Target Surrendered
 dynamic_missions.51.title: "Capitulation: [Target.GetName] Surrenders"
 dynamic_missions.51.desc: "Faced with overwhelming force, [Target.GetName] has chosen to surrender [Province.GetName] without a fight. Our show of strength and the coalition we assembled has convinced them that resistance would be futile."
 dynamic_missions.51.option_a: "Victory without bloodshed—the best kind"
 dynamic_missions.51.option_a.tooltip: "§G[Province.GetName] is now ours§!\n§GWe gain 10 prestige§!\n§R[Target.GetName] loses 10 prestige§!"
 
 # Event 52: Reconciliation Completed
 dynamic_missions.52.title: "Peace Achieved: Claim Resolved Diplomatically"
 dynamic_missions.52.desc: "Through skillful diplomacy, we have resolved our claim on [Province.GetName] without resorting to war. Both nations have agreed to improve relations and move forward in peace."
 dynamic_missions.52.option_a: "Diplomacy triumphs over force"
 dynamic_missions.52.option_a.tooltip: "§GBoth nations gain +20 opinion of each other§!"
 
 # Situation Name and Description
 claim_province_situation: "Provincial Claim Crisis"
 claim_province_situation_desc: "A formal claim has been made on a neighboring province, creating a diplomatic crisis that will be resolved through war, capitulation, or reconciliation."
 
 # Situation Tooltips
 dynamic_missions.claim_province.target_province_tooltip: "§RClaimed Province§! - Target of our claim"
 dynamic_missions.claim_province.legend_target: "Claimed Province"
 dynamic_missions.claim_province.legend_player: "Claimant Territory"
 dynamic_missions.claim_province.legend_target_country: "Target Country Territory"
 
 # Decision Names and Descriptions
 dm_claim_seek_rival_support_decision: "Seek Rival Support"
 dm_claim_seek_rival_support_decision_desc: "Invite all rivals of [Target.GetName] to join our cause, promising them a share in the spoils if war breaks out."
 dm_claim_seek_rival_support_tooltip: "§RCost: 10 prestige§!\n\nAll rivals of [Target.GetName] will receive an invitation to support our claim. Their acceptance depends on:\n• Their opinion of [Target.GetName] (negative is better)\n• Their opinion of us (positive is better)\n• Our diplomatic reputation\n• Whether they are already our ally\n\n§YThis action can only be used once per claim.§!"
 
 dm_claim_fabricate_legitimacy_decision: "Fabricate Legitimacy"
 dm_claim_fabricate_legitimacy_decision_desc: "Use our spy network in [Target.GetName] to fabricate historical documents and legal precedents that support our claim."
 dm_claim_fabricate_legitimacy_tooltip: "§G+1 Diplomatic Reputation§! (until claim ends)\n\n§YThis action can only be used once per claim.§!"
 dm_claim_requires_spy_network_20: "Requires 20 spy network in [Target.GetName]"
 
 dm_claim_incite_panic_decision: "Incite Panic"
 dm_claim_incite_panic_decision_desc: "Use our spies to spread rumors and fear among the defenders of [Province.GetName], weakening their resolve."
 dm_claim_incite_panic_tooltip: "All locations in [Province.GetName]: §R-30% Fort Defense§! (until claim ends)\n\n§YThis action can only be used once per claim.§!"
 dm_claim_requires_spy_network_30: "Requires 30 spy network in [Target.GetName]"
 
 dm_claim_contact_surrender_faction_decision: "Contact Surrender Faction"
 dm_claim_contact_surrender_faction_decision_desc: "Make contact with peace-minded factions in [Target.GetName] who might be willing to surrender the province without a fight."
 dm_claim_contact_surrender_faction_tooltip: "[Target.GetName]: §R+5 War Exhaustion§!\n\n§YThis action can only be used once per claim.§!"
 dm_claim_requires_spy_network_40: "Requires 40 spy network in [Target.GetName]"
 
 dm_claim_border_reconnaissance_decision: "Conduct Border Reconnaissance"
 dm_claim_border_reconnaissance_decision_desc: "Send scouts to survey the border region and gather military intelligence."
 dm_claim_border_reconnaissance_tooltip: "§RCost: 200 manpower§!\n§G+5 Army Tradition§!\n\n§RCooldown: 1 year§!"
 
 # Modifier Names and Descriptions
 dm_claim_province_active: "Provincial Claim Active"
 dm_claim_province_active_desc: "We have an active claim on a neighboring province."
 
 dm_fabricated_legitimacy: "Fabricated Legitimacy"
 dm_fabricated_legitimacy_desc: "Our spies have created convincing historical documents supporting our territorial claim."
 
 dm_incited_panic_province: "Panic and Fear"
 dm_incited_panic_province_desc: "Enemy agents have spread fear and rumors among the defenders, weakening their resolve."
 
 dm_border_reconnaissance_cooldown: "Border Reconnaissance Cooldown"
 dm_border_reconnaissance_cooldown_desc: "Our scouts are still analyzing intelligence from the last reconnaissance mission."
