l_english:
 # Start Event: Choose Your Goal
 dynamic_missions.1.title: "Dynamic Missions: Choose Your Focus"
 dynamic_missions.1.desc: "The realm stands at a crossroads. Rather than pursuing all goals simultaneously, we could focus our efforts on a single, ambitious objective. Such concentrated effort would yield greater rewards, though it requires dedication and sacrifice.\n\nWhat shall be our focus?"
 dynamic_missions.1.option_a: "Develop a great city"
 dynamic_missions.1.option_a.tooltip: "Begin a mission to develop a chosen city to unprecedented prosperity."
 dynamic_missions.1.option_c: "Not at this time"
 dynamic_missions.1.option_c.tooltip: "We shall continue with our current approach."
 
 # Select Target City Event
 dynamic_missions.2.title: "Dynamic Missions: Select Target City"
 dynamic_missions.2.desc: "Which city shall receive our focused attention? The chosen settlement will benefit from concentrated resources and effort, but this will come at the cost of development elsewhere.\n\nOur goal: Achieve 100% prosperity and construct at least 10 new buildings within 5 years."
 dynamic_missions.2.option_a: "Select a city"
 dynamic_missions.2.option_a.tooltip: "Choose which city to develop."
 dynamic_missions.2.option_b: "Cancel this mission"
 dynamic_missions.2.option_b.tooltip: "Perhaps another time."
 
 # Success Event
 dynamic_missions.3.title: "Dynamic Missions: City Development Complete!"
 dynamic_missions.3.desc: "Our focused efforts have borne fruit! The target city has achieved remarkable prosperity and growth. New buildings dot the skyline, and the population thrives. This success demonstrates the power of concentrated effort."
 dynamic_missions.3.option_a: "A triumph for our realm!"
 dynamic_missions.3.option_a.tooltip: "The city gains +1 development as a reward."
 
 # Failure Event
 dynamic_missions.4.title: "Dynamic Missions: Time Has Run Out"
 dynamic_missions.4.desc: "Despite our efforts, we have not achieved our ambitious goals within the allotted time. The city has improved, certainly, but not to the degree we had hoped. Perhaps with a different approach, or more time, we might have succeeded."
 dynamic_missions.4.option_a: "We shall try again"
 dynamic_missions.4.option_a.tooltip: "Learn from this experience and choose a new goal."
 
 # Situation Name and Description
 develop_city_situation: "City Development Mission"
 develop_city_situation_desc: "A focused effort to develop a chosen city to maximum prosperity."
 
 # Situation Tooltips
 dynamic_missions.situation.target_city_tooltip: "§GTarget City§! - Focus of development efforts"
 dynamic_missions.situation.legend_target: "Target City"
 dynamic_missions.situation.legend_other_cities: "Other Cities"
 
 # Player Actions
 dm_convene_builders: "Convene Builders"
 dm_convene_builders_desc: "Summon builders from across the realm to focus on the target city."
 dm_convene_builders.allow.tooltip: "Requires no active cooldown."
 dm_convene_builders.effect.tooltip: "§Y-50%§! global construction speed, §G+100%§! construction speed in target city for 1 year.\n§RCooldown: 1 year§!"
 
 dm_public_works: "Public Works Program"
 dm_public_works_desc: "Invest heavily in infrastructure and public amenities to boost prosperity."
 dm_public_works.allow.tooltip: "Requires 500 £gold and no active cooldown."
 dm_public_works.effect.tooltip: "Spend 500 £gold to grant §G+1% monthly prosperity§! in target city for 1 year.\n§RCooldown: 1 year§!"
 
 dm_demand_contributions: "Demand Contributions"
 dm_demand_contributions_desc: "Require other cities to contribute resources to the development effort."
 dm_demand_contributions.allow.tooltip: "Requires no active cooldown."
 dm_demand_contributions.effect.tooltip: "All other cities: §R-10% control§!\nTarget city: §G+100% max control cap§! for 1 year.\n§RCooldown: 1 year§!"
 
 # Subject Actions
 dm_steal_progress: "Steal Development Resources"
 dm_steal_progress_desc: "Secretly divert resources meant for the overlord's project to our own capital."
 dm_steal_progress.allow.tooltip: "Requires disloyalty and no active cooldown."
 dm_steal_progress.effect.tooltip: "Target city: §R-1% monthly prosperity§!\nYour capital: §G+1% monthly prosperity§! for 1 year.\n§RCooldown: 1 year§!\n§YYour overlord will be notified!§!"
 
 dm_contribute_development: "Contribute to Development"
 dm_contribute_development_desc: "Willingly contribute resources from our capital to aid the overlord's project."
 dm_contribute_development.allow.tooltip: "Requires loyalty and no active cooldown."
 dm_contribute_development.effect.tooltip: "Target city: §G+1% monthly prosperity§!\nYour capital: §R-1% monthly prosperity§! for 1 year.\n§RCooldown: 1 year§!\n§YYour overlord will be notified!§!"
 
 # Modifier Names
 dm_global_construction_penalty: "Builders Convened"
 dm_global_construction_penalty_desc: "Our builders have been summoned to focus on a specific project."
 
 dm_target_construction_bonus: "Focused Construction Effort"
 dm_target_construction_bonus_desc: "Builders from across the realm work tirelessly here."
 
 dm_prosperity_boost: "Public Works Program"
 dm_prosperity_boost_desc: "Major investments in infrastructure and public amenities."
 
 dm_control_penalty: "Resources Diverted"
 dm_control_penalty_desc: "Resources have been diverted to another city's development."
 
 dm_control_cap_bonus: "Concentrated Authority"
 dm_control_cap_bonus_desc: "Administrative focus has been concentrated on this city."
 
 dm_prosperity_drain: "Resources Stolen"
 dm_prosperity_drain_desc: "A disloyal subject is secretly diverting development resources."
 
 dm_prosperity_gain: "Stolen Resources"
 dm_prosperity_gain_desc: "Resources diverted from the overlord's project benefit us."
 
 dm_prosperity_contribution: "Subject Contribution"
 dm_prosperity_contribution_desc: "A loyal subject contributes resources to our development."
 
 dm_prosperity_sacrifice: "Resources Contributed"
 dm_prosperity_sacrifice_desc: "We contribute resources to our overlord's development project."

 # =============================================================================
 # LARGE RESEARCH PROJECT MISSION
 # =============================================================================
 
 # Main Event Option
 dynamic_missions.1.option_b: "Start a Large Research Project"
 dynamic_missions.1.option_b.tooltip: "Embark on a 5-year research project to gain a significant technology boost."
 
 # Situation Name and Description
 large_research_project_situation: "Large Research Project"
 large_research_project_situation_desc: "A focused national effort to advance our technological capabilities through intensive research."
 
 # Events
 dynamic_missions.21.title: "Select University to Conscript"
 dynamic_missions.21.desc: "To accelerate our research project, we must dedicate one of our universities entirely to this endeavor. Which institution shall we conscript?\n\n§YWarning: The selected location will suffer penalties to control, literacy, and satisfaction.§!"
 
 dynamic_missions.22.title: "Appoint Lead Scientist"
 dynamic_missions.22.desc: "Every great research project needs a brilliant mind to guide it. We must select a character from our court to serve as the lead scientist.\n\n§YWarning: The appointed character will be unsuitable for other positions and will suffer reduced life expectancy for the duration of the project.§!"
 
 dynamic_missions.23.title: "Research Project: Breakthrough Achieved!"
 dynamic_missions.23.desc: "Our dedicated research efforts have borne fruit! The project has achieved its goals ahead of schedule, and our scholars have made significant breakthroughs. The knowledge gained will propel our nation forward in the technological race."
 dynamic_missions.23.option_a: "A triumph of intellect!"
 
 dynamic_missions.24.title: "Research Project: Time Expired"
 dynamic_missions.24.desc: "Despite our best efforts, the research project has not achieved its ambitious goals within the allotted timeframe. While we have made some progress, the breakthrough we sought remains elusive. Perhaps with a different approach or more resources, we might succeed in the future."
 dynamic_missions.24.option_a: "We shall learn from this setback"
 
 # Actions
 dm_conscript_university: "Conscript University"
 dm_conscript_university_desc: "Dedicate a university entirely to the research project, increasing progress but imposing penalties on the location."
 dm_conscript_university.allow.tooltip: "Requires at least one university and no active cooldown."
 dm_conscript_university.effect.tooltip: "Select a university to conscript. The location will receive:\n§R-5% Control§!\n§R-5% Max Literacy§!\n§R-10% Satisfaction§!\nResearch progress: §G+1 per month§!\n§RCooldown: 1 year§!"
 
 dm_appoint_lead_scientist: "Appoint Lead Scientist"
 dm_appoint_lead_scientist_desc: "Select a brilliant character to lead the research project, providing an immediate boost to progress."
 dm_appoint_lead_scientist.allow.tooltip: "Can only be used once per project."
 dm_appoint_lead_scientist.effect.tooltip: "Select a character from your court to lead the project.\nImmediate progress boost based on character skills.\nThe character will be:\n§RUnsuitable for council§!\n§RUnsuitable as general/admiral§!\n§R-10 years life expectancy§!"
 
 dm_increase_research_funding: "Increase Research Funding"
 dm_increase_research_funding_desc: "Allocate additional funds to accelerate the research project."
 dm_increase_research_funding.allow.tooltip: "Can be toggled on or off at any time."
 dm_increase_research_funding.effect.tooltip: "While active:\n§R+5% Court Expenses§!\n§G+0.10 Innovativeness Gain§!\n§G+1 Research Progress per month§!"
 
 # Modifiers
 dm_increased_funding_modifier: "Increased Research Funding"
 dm_increased_funding_modifier_desc: "Additional resources have been allocated to our research project."
 
 dm_conscripted_university_debuff: "University Conscripted"
 dm_conscripted_university_debuff_desc: "This university has been entirely dedicated to a national research project, disrupting normal activities."
 
 dm_lead_scientist_debuff: "Leading Research Project"
 dm_lead_scientist_debuff_desc: "This character is fully occupied leading a major research initiative."

 # =============================================================================
 # ESTABLISH NEW CITY MISSION
 # =============================================================================
 
 # Main Event Option
 dynamic_missions.1.option_d: "Establish a New City"
 dynamic_missions.1.option_d.tooltip: "Transform a town into a thriving city through focused development over 10 years."
 
 # Situation Name and Description
 establish_new_city_situation: "Establishing a New City"
 establish_new_city_situation_desc: "We are nurturing a town to become a great city, a shining jewel in our realm."
 
 # Situation Tooltips
 dynamic_missions.establish_city.target_town_tooltip: "§GTarget Town§! - Future city in development"
 dynamic_missions.establish_city.legend_target: "Target Town"
 dynamic_missions.establish_city.legend_other_towns: "Other Towns"
 
 # Events
 dynamic_missions.30.title: "Establish a New City: Select Target Town"
 dynamic_missions.30.desc: "Which town shall we develop into a great city? This will be a long-term project requiring dedication and strategic choices over the next 10 years.\n\n§YGoal: Transform the selected town into a city.§!"
 dynamic_missions.30.option_capital: "Develop our capital (if it is a town)"
 dynamic_missions.30.option_capital.tooltip: "Focus on elevating our capital to city status."
 dynamic_missions.30.option_first_town: "Select an eligible town"
 dynamic_missions.30.option_first_town.tooltip: "Choose from available towns in our realm."
 dynamic_missions.30.option_cancel: "Not at this time"
 dynamic_missions.30.option_cancel.tooltip: "Perhaps we should focus on other priorities."
 
 dynamic_missions.31.title: "Appoint Regional Governor"
 dynamic_missions.31.desc: "To guide the development of our future city, we should appoint a capable character as regional governor. The governor's skills will directly influence the city's control and stability.\n\n§YThe appointed character will be unsuitable for other high positions and will suffer reduced life expectancy for the mission's duration.§!"
 dynamic_missions.31.option_cancel: "Cancel appointment"
 dynamic_missions.31.option_cancel.tooltip: "We can try again later."
 dynamic_missions.31.effect.tooltip: "The governor's total skills will provide control bonuses to the target location."
 
 dynamic_missions.33.title: "A New City is Born!"
 dynamic_missions.33.desc: "Our long-term efforts have finally borne fruit! The town we selected has grown into a magnificent city, a testament to our realm's prosperity and ambition. This achievement will be remembered for generations, and the city shall forever be known as a pearl of our nation."
 dynamic_missions.33.option_a: "A glorious achievement!"
 dynamic_missions.33.option_a.tooltip: "The city receives the permanent modifier '[Country.GetName]'s Pearl'."
 
 dynamic_missions.34.title: "City Development Stalled"
 dynamic_missions.34.desc: "Despite a decade of effort, the town has not yet achieved city status. While progress has been made, the transformation we envisioned remains incomplete. We must accept this setback and consider new approaches for future development."
 dynamic_missions.34.option_a: "We shall try again someday"
 dynamic_missions.34.option_a.tooltip: "The mission ends without reward, but we can attempt other missions."
 
 # Decisions
 dm_encourage_migration_decision: "Encourage Migration"
 dm_encourage_migration_decision_desc: "Promote migration to the target town to accelerate its growth and development."
 dm_encourage_migration_decision.tooltip: "§YToggleable Action§!\n\nWhile active:\n§R+5% Court Expenses§!\n§G+0.10 Freemen Value per month§!\n\nTarget location:\n§G+1 Migration Attraction§!\n§G+50% Migration Speed§!"
 
 dm_encourage_proselytization_decision: "Encourage Proselytization"
 dm_encourage_proselytization_decision_desc: "Support religious conversion efforts in the target town to strengthen spiritual unity."
 dm_encourage_proselytization_decision.tooltip: "§YToggleable Action§!\n\nWhile active:\n§R+5% Court Expenses§!\n§G+0.10 Spiritual Value per month§!\n\nTarget location:\n§G+20 Monthly Conversion§!\n§G+50% Conversion Speed§!"
 
 dm_encourage_folk_culture_decision: "Encourage Folk Culture"
 dm_encourage_folk_culture_decision_desc: "Promote cultural assimilation in the target town to create a unified population."
 dm_encourage_folk_culture_decision.tooltip: "§YToggleable Action§!\n\nWhile active:\n§R+5% Court Expenses§!\n§G+0.10 Humanist Value per month§!\n\nTarget location:\n§G+20 Monthly Assimilation§!\n§G+50% Assimilation Speed§!"
 
 dm_requisition_materials_decision: "Requisition Development Materials"
 dm_requisition_materials_decision_desc: "Demand materials from estates to fund city development, at the cost of their satisfaction."
 dm_requisition_materials_decision.tooltip: "§YToggleable Action§!\n\nWhile active:\n§R-5% All Estates' Satisfaction§!\n§G+5% Taxation Cap§!"
 
 # Actions
 dm_appoint_regional_governor: "Appoint Regional Governor"
 dm_appoint_regional_governor_desc: "Select a character to govern the developing city, providing control bonuses based on their skills."
 dm_appoint_governor.allow.tooltip: "Requires at least one character in court. Can only be used once per mission."
 dm_appoint_governor.effect.tooltip: "Select a character to govern the target location.\n§R-5 Legitimacy§!\n\nTarget location receives:\n§G+(Total Skills/10) Control§!\n§G+(Total Skills/10)% Monthly Prosperity§!\n\nThe character will be:\n§RUnsuitable for council§!\n§RUnsuitable as general/admiral§!\n§R-10 years life expectancy§!"
 
 # Modifiers
 dm_encourage_migration_modifier: "Encouraging Migration"
 dm_encourage_migration_modifier_desc: "We are actively promoting migration to develop our future city."
 
 dm_encourage_proselytization_modifier: "Encouraging Proselytization"
 dm_encourage_proselytization_modifier_desc: "Religious authorities are working to convert the population of our developing city."
 
 dm_encourage_folk_culture_modifier: "Encouraging Folk Culture"
 dm_encourage_folk_culture_modifier_desc: "We are promoting cultural unity in our developing city."
 
 dm_requisition_materials_modifier: "Requisitioning Materials"
 dm_requisition_materials_modifier_desc: "Estates are being taxed to provide materials for city development."
 
 dm_migration_boost: "Migration Campaign"
 dm_migration_boost_desc: "Active efforts to attract migrants to this location."
 
 dm_conversion_boost: "Proselytization Campaign"
 dm_conversion_boost_desc: "Religious conversion efforts are intensified here."
 
 dm_assimilation_boost: "Cultural Assimilation Campaign"
 dm_assimilation_boost_desc: "Active promotion of cultural unity in this location."
 
 dm_governor_control_bonus: "Regional Governor"
 dm_governor_control_bonus_desc: "A capable governor oversees this location's development."
 
 dm_country_pearl: "[Country.GetName]'s Pearl"
 dm_country_pearl_desc: "This city stands as a shining jewel in our realm, a testament to our ambition and prosperity."
 
 dm_regional_governor_debuff: "Serving as Regional Governor"
 dm_regional_governor_debuff_desc: "This character is fully occupied governing a developing city."
 
 dm_appoint_governor_used: "Governor Already Appointed"
 dm_appoint_governor_used_desc: "A regional governor has already been appointed for this mission."

 # =============================================================================
 # NOTIFICATION EVENTS
 # =============================================================================
 
 # Subject Stole Progress
 dynamic_missions.10.title: "Subject Undermines Development!"
 dynamic_missions.10.desc: "Reports from our target city indicate that one of our subjects has been secretly diverting resources meant for our development project. This treachery has set back our progress and enriched their own capital at our expense."
 dynamic_missions.10.option_a: "This betrayal will not be forgotten!"
 dynamic_missions.10.option_a.tooltip: "The disloyal subject has stolen development resources."
 
 # Subject Contributed
 dynamic_missions.11.title: "Subject Supports Development"
 dynamic_missions.11.desc: "A loyal subject has voluntarily contributed resources from their own capital to support our city development project. This generous act demonstrates their dedication to our realm's prosperity."
 dynamic_missions.11.option_a: "Their loyalty is commendable"
 dynamic_missions.11.option_a.tooltip: "The loyal subject has aided our development efforts."
 
 # AI Evaluation (hidden event)
 dynamic_missions.100.title: "AI Evaluation"
 dynamic_missions.100.desc: "Internal AI decision-making process."
