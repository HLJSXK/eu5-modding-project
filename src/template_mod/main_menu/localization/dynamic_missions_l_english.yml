l_english:
 # Start Event: Choose Your Goal
 dynamic_missions.1.title: "Dynamic Missions: Choose Your Focus"
 dynamic_missions.1.desc: "The realm stands at a crossroads. Rather than pursuing all goals simultaneously, we could focus our efforts on a single, ambitious objective. Such concentrated effort would yield greater rewards, though it requires dedication and sacrifice.\n\nWhat shall be our focus?"
 dynamic_missions.1.option_a: "Develop a great city"
 dynamic_missions.1.option_a.tooltip: "Begin a mission to develop a chosen city to unprecedented prosperity."
 dynamic_missions.1.option_c: "Not at this time"
 dynamic_missions.1.option_c.tooltip: "We shall continue with our current approach."
 
 # Select Target City Event
 dynamic_missions.2.title: "Dynamic Missions: Select Target City"
 dynamic_missions.2.desc: "Which city shall receive our focused attention? The chosen settlement will benefit from concentrated resources and effort, but this will come at the cost of development elsewhere.\n\nOur goal: Achieve 100% prosperity and construct at least 10 new buildings within 5 years."
 dynamic_missions.2.option_a: "Select a city"
 dynamic_missions.2.option_a.tooltip: "Choose which city to develop."
 dynamic_missions.2.option_b: "Cancel this mission"
 dynamic_missions.2.option_b.tooltip: "Perhaps another time."
 
 # Success Event
 dynamic_missions.3.title: "Dynamic Missions: City Development Complete!"
 dynamic_missions.3.desc: "Our focused efforts have borne fruit! The target city has achieved remarkable prosperity and growth. New buildings dot the skyline, and the population thrives. This success demonstrates the power of concentrated effort."
 dynamic_missions.3.option_a: "A triumph for our realm!"
 dynamic_missions.3.option_a.tooltip: "The city gains +1 development as a reward."
 
 # Failure Event
 dynamic_missions.4.title: "Dynamic Missions: Time Has Run Out"
 dynamic_missions.4.desc: "Despite our efforts, we have not achieved our ambitious goals within the allotted time. The city has improved, certainly, but not to the degree we had hoped. Perhaps with a different approach, or more time, we might have succeeded."
 dynamic_missions.4.option_a: "We shall try again"
 dynamic_missions.4.option_a.tooltip: "Learn from this experience and choose a new goal."
 
 # Situation Name and Description
 develop_city_situation: "City Development Mission"
 develop_city_situation_desc: "A focused effort to develop a chosen city to maximum prosperity."
 
 # Situation Tooltips
 dynamic_missions.situation.target_city_tooltip: "§GTarget City§! - Focus of development efforts"
 dynamic_missions.situation.legend_target: "Target City"
 dynamic_missions.situation.legend_other_cities: "Other Cities"
 
 # Player Actions
 dm_convene_builders: "Convene Builders"
 dm_convene_builders_desc: "Summon builders from across the realm to focus on the target city."
 dm_convene_builders.allow.tooltip: "Requires no active cooldown."
 dm_convene_builders.effect.tooltip: "§Y-50%§! global construction speed, §G+100%§! construction speed in target city for 1 year.\n§RCooldown: 1 year§!"
 
 dm_public_works: "Public Works Program"
 dm_public_works_desc: "Invest heavily in infrastructure and public amenities to boost prosperity."
 dm_public_works.allow.tooltip: "Requires 500 £gold and no active cooldown."
 dm_public_works.effect.tooltip: "Spend 500 £gold to grant §G+1% monthly prosperity§! in target city for 1 year.\n§RCooldown: 1 year§!"
 
 dm_demand_contributions: "Demand Contributions"
 dm_demand_contributions_desc: "Require other cities to contribute resources to the development effort."
 dm_demand_contributions.allow.tooltip: "Requires no active cooldown."
 dm_demand_contributions.effect.tooltip: "All other cities: §R-10% control§!\nTarget city: §G+100% max control cap§! for 1 year.\n§RCooldown: 1 year§!"
 
 # Subject Actions
 dm_steal_progress: "Steal Development Resources"
 dm_steal_progress_desc: "Secretly divert resources meant for the overlord's project to our own capital."
 dm_steal_progress.allow.tooltip: "Requires disloyalty and no active cooldown."
 dm_steal_progress.effect.tooltip: "Target city: §R-1% monthly prosperity§!\nYour capital: §G+1% monthly prosperity§! for 1 year.\n§RCooldown: 1 year§!\n§YYour overlord will be notified!§!"
 
 dm_contribute_development: "Contribute to Development"
 dm_contribute_development_desc: "Willingly contribute resources from our capital to aid the overlord's project."
 dm_contribute_development.allow.tooltip: "Requires loyalty and no active cooldown."
 dm_contribute_development.effect.tooltip: "Target city: §G+1% monthly prosperity§!\nYour capital: §R-1% monthly prosperity§! for 1 year.\n§RCooldown: 1 year§!\n§YYour overlord will be notified!§!"
 
 # Modifier Names
 dm_global_construction_penalty: "Builders Convened"
 dm_global_construction_penalty_desc: "Our builders have been summoned to focus on a specific project."
 
 dm_target_construction_bonus: "Focused Construction Effort"
 dm_target_construction_bonus_desc: "Builders from across the realm work tirelessly here."
 
 dm_prosperity_boost: "Public Works Program"
 dm_prosperity_boost_desc: "Major investments in infrastructure and public amenities."
 
 dm_control_penalty: "Resources Diverted"
 dm_control_penalty_desc: "Resources have been diverted to another city's development."
 
 dm_control_cap_bonus: "Concentrated Authority"
 dm_control_cap_bonus_desc: "Administrative focus has been concentrated on this city."
 
 dm_prosperity_drain: "Resources Stolen"
 dm_prosperity_drain_desc: "A disloyal subject is secretly diverting development resources."
 
 dm_prosperity_gain: "Stolen Resources"
 dm_prosperity_gain_desc: "Resources diverted from the overlord's project benefit us."
 
 dm_prosperity_contribution: "Subject Contribution"
 dm_prosperity_contribution_desc: "A loyal subject contributes resources to our development."
 
 dm_prosperity_sacrifice: "Resources Contributed"
 dm_prosperity_sacrifice_desc: "We contribute resources to our overlord's development project."
