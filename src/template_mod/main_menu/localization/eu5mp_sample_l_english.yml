l_english:
 # Event Titles
 eu5mp_sample.1.title: "Welcome to EU5 Multiplayer Project"
 eu5mp_sample.2.title: "A Prosperous Era"
 
 # Event Descriptions
 eu5mp_sample.1.desc: "This is a sample event demonstrating the structure of EU5 events. Events in EU5 must be explicitly triggered and cannot use mean_time_to_happen like in EU4."
 eu5mp_sample.2.desc: "Our nation has reached a period of prosperity and peace. Our treasury is full and our technology advances rapidly."
 
 # Event Options
 eu5mp_sample.1.option_a: "Accept the gold and prestige"
 eu5mp_sample.1.option_b: "Recruit more soldiers instead"
 eu5mp_sample.2.option_a: "Excellent news!"
 
 # Tooltips
 eu5mp_sample.1.option_a.tooltip: "We gain gold and prestige to strengthen our position."
 eu5mp_sample.1.option_b.tooltip: "We recruit additional manpower and gain legitimacy."
