l_english:
  # Large Research Project
  dm_large_research_project: "Large Research Project"
  dm_large_research_project_desc: "Embark on a focused 5-year research project to gain a significant boost in technology."

  # Actions
  dm_conscript_university.t: "Conscript University"
  dm_conscript_university.d: "Force a university to contribute to the research project, increasing progress at the cost of local stability."
  dm_appoint_lead_scientist.t: "Appoint Lead Scientist"
  dm_appoint_lead_scientist.d: "Appoint a character to lead the research, providing a one-time progress boost based on their skills."

  # Modifiers
  dm_increased_funding_modifier: "Increased Research Funding"
  dm_conscripted_university_debuff: "Conscripted University"
  dm_lead_scientist_debuff: "Lead Scientist"

  # Events
  dm_large_research_project_success.t: "Research Project Successful!"
  dm_large_research_project_success.d: "Our dedicated efforts have paid off, and the research project has yielded significant results."
  dm_large_research_project_failure.t: "Research Project Failed"
  dm_large_research_project_failure.d: "Despite our best efforts, the research project has failed to produce the desired breakthrough."

  # =============================================================================
  # ESTABLISH NEW CITY MISSION
  # =============================================================================
  
  # Situation
  establish_new_city_situation: "Establishing a New City"
  establish_new_city_situation_desc: "We are nurturing a town to become a great city, a shining jewel in our realm."
  
  # Main Event - Choose Your Goal (Option D)
  dynamic_missions.1.option_d: "Establish a New City"
  dynamic_missions.1.option_d.tooltip: "Transform a town into a thriving city over 10 years. This mission can only be completed once."
  
  # Event 30: Select Target Town
  dynamic_missions.30.title: "Establish a New City"
  dynamic_missions.30.desc: "Our realm is growing, and the time has come to elevate one of our towns to the status of a great city. Which settlement shall we choose for this honor?"
  dynamic_missions.30.option_capital: "Develop Our Capital"
  dynamic_missions.30.option_capital.tooltip: "Focus our efforts on transforming our capital into a magnificent city."
  dynamic_missions.30.option_first_town: "Select a Promising Town"
  dynamic_missions.30.option_first_town.tooltip: "Choose one of our towns with the greatest potential for growth."
  dynamic_missions.30.option_cancel: "Not Now"
  dynamic_missions.30.option_cancel.tooltip: "Perhaps another time would be more suitable."
  
  # Event 31: Select Regional Governor
  dynamic_missions.31.title: "Appoint a Regional Governor"
  dynamic_missions.31.desc: "To ensure the successful development of our new city, we should appoint a capable administrator to oversee the project. Who shall we send?"
  dynamic_missions.31.effect.tooltip: "The appointed character will provide control bonuses based on their skills, but will become unsuitable for other roles and suffer reduced life expectancy."
  dynamic_missions.31.option_cancel: "Cancel Appointment"
  dynamic_missions.31.option_cancel.tooltip: "We shall reconsider this decision."
  
  # Event 33: Success
  dynamic_missions.33.title: "A New City is Born!"
  dynamic_missions.33.desc: "After years of dedicated effort, our town has blossomed into a magnificent city! It now stands as a shining pearl in our realm, attracting settlers and prosperity from far and wide."
  dynamic_missions.33.option_a: "A Glorious Achievement!"
  dynamic_missions.33.option_a.tooltip: "The city receives the permanent modifier '[Country.GetName]'s Pearl'."
  
  # Event 34: Failure
  dynamic_missions.34.title: "City Development Stalled"
  dynamic_missions.34.desc: "Despite our best efforts over the past decade, the town has not yet achieved the status of a true city. Perhaps with more time and resources, we may try again in the future."
  dynamic_missions.34.option_a: "A Setback, But Not the End"
  dynamic_missions.34.option_a.tooltip: "We may attempt this mission again in the future."
  
  # Decisions (Toggleable Actions)
  dm_encourage_migration_decision: "Encourage Migration"
  dm_encourage_migration_decision_desc: "Implement policies to attract settlers to our developing city, increasing migration speed and attraction at the cost of increased court expenses."
  
  dm_encourage_proselytization_decision: "Encourage Proselytization"
  dm_encourage_proselytization_decision_desc: "Support religious missionaries in converting the population to our faith, increasing conversion speed at the cost of increased court expenses."
  
  dm_encourage_folk_culture_decision: "Encourage Folk Culture"
  dm_encourage_folk_culture_decision_desc: "Promote our cultural traditions to assimilate foreign populations, increasing assimilation speed at the cost of increased court expenses."
  
  dm_requisition_materials_decision: "Requisition Development Materials"
  dm_requisition_materials_decision_desc: "Demand contributions from the estates to fund city development, increasing taxation capacity but reducing estate satisfaction."
  
  # Generic Action
  dm_appoint_regional_governor: "Appoint Regional Governor"
  dm_appoint_regional_governor_desc: "Send a capable administrator to oversee the city's development. This can only be done once per mission."
  dm_appoint_governor.allow.tooltip: "Requires at least one character in court and can only be used once."
  dm_appoint_governor.effect.tooltip: "Opens a menu to select a character. The character will provide control bonuses but become unsuitable for other roles."
  
  # Modifiers - Country
  dm_encourage_migration_modifier: "Encouraging Migration"
  dm_encourage_migration_modifier_desc: "We are actively attracting settlers to our developing city."
  
  dm_encourage_proselytization_modifier: "Encouraging Proselytization"
  dm_encourage_proselytization_modifier_desc: "We are supporting religious conversion efforts in our developing city."
  
  dm_encourage_folk_culture_modifier: "Encouraging Folk Culture"
  dm_encourage_folk_culture_modifier_desc: "We are promoting our cultural traditions in our developing city."
  
  dm_requisition_materials_modifier: "Requisitioning Development Materials"
  dm_requisition_materials_modifier_desc: "We are demanding contributions from the estates to fund city development."
  
  # Modifiers - Location
  dm_migration_boost: "Migration Encouragement"
  dm_migration_boost_desc: "This location is receiving special support to attract settlers."
  
  dm_conversion_boost: "Proselytization Efforts"
  dm_conversion_boost_desc: "Religious missionaries are actively working to convert the population."
  
  dm_assimilation_boost: "Cultural Promotion"
  dm_assimilation_boost_desc: "Cultural programs are helping to assimilate foreign populations."
  
  dm_governor_control_bonus: "Regional Governor"
  dm_governor_control_bonus_desc: "A capable administrator is overseeing this location's development."
  
  dm_country_pearl: "[Country.GetName]'s Pearl"
  dm_country_pearl_desc: "This city stands as a shining jewel in our realm, a testament to our dedication and vision."
  
  # Modifiers - Character
  dm_regional_governor_debuff: "Regional Governor"
  dm_regional_governor_debuff_desc: "This character is serving as a regional governor, overseeing the development of a new city."
  
  # Map Mode
  dynamic_missions.establish_city.target_town_tooltip: "This is the target town for the Establish New City mission."
  dynamic_missions.establish_city.legend_target: "Target Town"
  dynamic_missions.establish_city.legend_other_towns: "Other Towns"
